personas:
  professional: Jose Cabrera, an emerging mini architect, delights in constructing LEGO sets with precision and imagination, balancing curiosity for new designs with practical building methods, while their
    reserved nature lets them focus on solitary projects and their cooperative side shines when sharing builds with friends.
  sports: Jose Cabrera, a budding soccer enthusiast who practices dribbling with the local 'Sunrise Soccer Club' and cheers for the nearby minor-league baseball team the 'Riverside Bats' while also rooting
    for the city's NBA squad the 'Metro Raptors', approaches fitness with focused practice sessions on weekends and joyful, spirited play.
  arts: Jose Cabrera, an avid reader of bilingual picture books featuring dinosaurs, rockets, and Mexican folklore, enjoys drawing vibrant scenes of space adventures and legendary characters while dancing
    to the lively tunes of mariachi singer Vicente Fernandez and cumbia group Los Tigres del Norte during family gatherings.
  travel: Jose Cabrera, who loves family road trips to the Grand Canyon and beach outings in Cancun, dreams of exploring the ancient pyramids of Teotihuacan and enjoys planning simple itineraries with parents,
    balancing a desire for adventure with the comfort of familiar routines.
  culinary: Jose Cabrera, a budding chef in the kitchen, proudly assembles mild cheese quesadillas, prepares chicken noodle soup with extra carrots, and delights in fruit salads topped with pineapple and
    mango, while their occasional impatience leads them to sneak a bite of chocolate before the dish is fully cooked.
  core: Jose Cabrera, a curious, organized, and quietly adventurous six-year-old, builds worlds from LEGO bricks, saves coins for the next set, navigates allergies with diligent medicine use, dribbles soccer
    balls with steady focus, and dances to folk rhythms while cherishing family celebrations.
background:
  cultural: Jose grows up in a Mexican‑American household in Sparks, NV, where Spanish is spoken alongside English, and family traditions from Mexico are honored. His parents teach him about Mexican holidays,
    cuisine, and values such as respect for elders and the importance of family gatherings. Community events at the local cultural center expose him to mariachi performances, folk dances, and shared stories
    of Mexican heritage, shaping his identity and fostering a bilingual, bicultural perspective that enriches his daily life and interests.
attributes:
  skills: '[''reading simple sight words (English & Spanish)'', ''counting to 20'', ''basic addition'', ''drawing and coloring'', ''building with LEGO blocks'', ''solving simple puzzles'', ''using tablet
