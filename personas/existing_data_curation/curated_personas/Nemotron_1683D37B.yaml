  hobbies: '[''building LEGO sets'', ''drawing and coloring'', ''reading bilingual picture books'', ''playing soccer with a small group of friends'', ''listening to Mexican folk music'', ''celebrating cultural
    holidays (e.g., Cinco de Mayo, Día de los Muertos)'', ''solving jigsaw puzzles'', ''exploring nature (collecting leaves, rocks)'']'
  career_goals: 'Jose imagines himself as a future explorer‑engineer: he dreams of traveling to space like an astronaut while also building clever machines that help people, inspired by his love for rockets
    and robots. He also expresses a caring side, saying he wants to help animals as a veterinarian, reflecting his compassion and desire to be useful. Though these ambitions are playful, they reveal a blend
    of curiosity, practical problem‑solving, and a wish to make a positive impact.'
