persona_description: A PHD student from Heriot Watt University who specializes in 3D printing and biomedical engineering. Alan J Faulhner-Jones won the Inspirational individual award in the 3Dprintshow
  annual awards ceremony for his groundbreaking work in creating a bioprinter that can 3Dprint human cells with the aim of curing some of the worlds most common diseases. He has a background in Robotics
  & Cybertronics and has used his expertise to create the Bioprinter that forms the core element of his PHD studies. Alan's project has the potential to revolutionize the medical industry and has the biggest
  impact of them all. He is passionate about his work and believes that this project will help the masses.
