personas:
  professional: Shelly Pautz, a property‑and‑casualty claims adjuster with fifteen years of field experience, blends meticulous Xactimate estimations and data‑driven loss‑ratio analysis with a naturally
    compassionate bedside‑manner, turning complex policy language into clear guidance for claimants while mentoring junior adjusters and championing AI‑driven triage to streamline department workflows,
    they constantly seek ways to balance precision with empathy.
  sports: Shelly Pautz, who enjoys gentle morning walks with the Sandhills Birdwatching Society and occasional community 5K runs, roots for the Charlotte Hornets in winter and the Carolina Panthers in fall,
    and follows the NC State Wolfpack football schedule, balancing a low‑impact fitness routine with a steady enthusiasm for local sports fandom.
  arts: Shelly Pautz, an abstract watercolorist and mixed‑media collage enthusiast, draws inspiration from the bold color fields of Helen Frankenthaler, the textural layering of Mark Bradford, and the lyrical
    storytelling of Joni Mitchell, while regularly attending exhibitions of local artists at the Greensboro Fine Arts Museum and savoring performances by the North Carolina Symphony.
  travel: Shelly Pautz, who prefers leisurely road‑trip itineraries over rushed tours, has explored the Blue Ridge Parkway’s fall foliage, the historic squares of Savannah, the art colonies of Santa Fe,
    and dreams of a week‑long cultural immersion in Kyoto, balancing a modest travel budget with a desire for enriching artistic experiences.
  culinary: Shelly Pautz, an adept home cook, favors Southern‑rooted dishes such as smoked pork shoulder with a honey‑glazed pecan crust, pan‑seared trout garnished with fresh garden herbs like rosemary
    and thyme, and experimental watermelon‑pistachio sorbet, frequently incorporating native North Carolina ingredients like pawpaw and sweet‑grass into her flavorful creations.
  core: Shelly Pautz blends analytical rigor with a vivid imagination, turning insurance claims into opportunities for compassion, while navigating life with a garden‑sprinkled studio, an ever‑growing collection
    of watercolor pigments, and a habit of humming obscure folk tunes during claim investigations.
background:
  cultural: Shelly was born and raised in the eastern part of North Carolina, growing up in a close‑knit, working‑class white community that valued Southern hospitality and self‑reliance. She attended the
    local public schools and later completed some coursework at a community college, focusing on business and liberal arts before entering the insurance field. The region’s traditions of church involvement,
    community service, and a strong connection to the land have shaped her sense of duty and compassion. While rooted in these Southern cultural norms, Shelly’s curiosity has led her to explore broader
    artistic and intellectual currents, giving her a blended perspective that honors her heritage while embracing new ideas.
attributes:
  skills: '[''Insurance claims assessment'', ''Property appraisal'', ''Policy interpretation'', ''Risk analysis'', ''Investigative interviewing'', ''Evidence gathering'', ''Report writing'', ''Negotiation
