    and mentoring'', ''Emergency response coordination'']'
  hobbies: '[''Abstract painting'', ''Watercolor landscapes'', ''Mixed‑media collage'', ''Visiting art galleries'', ''Attending art workshops'', ''Reading speculative fiction'', ''Creative writing (short
    stories)'', ''Birdwatching'', ''Photography (rural architecture)'', ''Gardening (native NC plants)'', ''Volunteer work at senior center (insurance assistance)'']'
  career_goals: Shelly hopes to become a senior claims supervisor within the next three years, earn the Associate in Claims (AIC) and Certified Professional Claims Adjuster (CPCA) credentials, and lead
    a mentorship program for new adjusters. She also wants to integrate emerging technologies like AI‑driven claim triage into her department to improve efficiency. In the longer term, Shelly envisions
    transitioning to a consulting role that helps small‑town insurers develop fair‑claims practices and community outreach education programs.
