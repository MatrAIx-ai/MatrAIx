personas:
  professional: Betty Overton is a budding junior game creator who mixes her love of bayou landscapes with Scratch programming, channeling a curious and competitive mind into story-driven games while maintaining
    organized project notes and skeptically reviewing every design choice.
  sports: Betty Overton plays forward for the Baton Rouge Youth Soccer Club, idolizes the LSU Tigers football team and the New Orleans Pelicans basketball squad, and they train after school with competitive
    intensity, using each drill to boost stamina and sharpen teamwork despite occasionally preferring to dominate the ball.
  arts: Betty Overton fills sketchbooks with bayou vistas and Mardi Gras parades, drawing inspiration from zydeco legend Clifton Chenier and jazz trumpeter Wynton Marsalis while they create comic strips
    that echo Jeff Smith's Bone style, all of which feed a competitive drive to perfect every panel and a curious appetite for new visual storytelling techniques.
  travel: Betty Overton loves weekend road trips to the French Quarter of New Orleans and family vacations to Washington, D.C., where they sketch monuments in their notebook, planning itineraries meticulously
    yet reserving time for spontaneous detours to hidden bayou trails, reflecting a curious yet organized travel style.
  culinary: Betty Overton favors gumbo loaded with Andouille sausage and okra, tries their hand at simple jambalaya and mac‑and‑cheese, often snacking on beignets while listening to zydeco, though they
    remain at an entry‑level cooking skill and sometimes forget to wash dishes after meals.
  core: Betty Overton is a curious, competitive 12‑year‑old artist‑gamer who balances organized schoolwork with spontaneous sketching, fiercely guards a postcard collection, and occasionally skips antihistamines
    when allergies flare, yet they always return to their sketchbook for comfort.
background:
  cultural: Betty is a white adolescent raised in Baton Rouge, Louisiana, where Southern hospitality and a rich blend of French‑Creole traditions shape daily life. Her family attends a local Baptist church,
    providing a community network that values education, service, and modest celebrations of regional customs. She grows up with exposure to Cajun and Creole cuisine—gumbo, jambalaya, and crawfish boils—and
    hears the rhythms of zydeco, jazz, and hip‑hop in neighborhood festivals. School curricula introduce her to Louisiana’s history, including the legacy of the French colonial era and the state’s diverse
    cultural tapestry. This environment nurtures her appreciation for varied experiences, fuels her curiosity about art and new ideas, and inspires her to incorporate local cultural motifs into her creative
    pursuits.
