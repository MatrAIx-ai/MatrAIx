  hobbies: '[''drawing Louisiana landscapes'', ''reading graphic novels'', ''creating Scratch games'', ''listening to zydeco and jazz'', ''playing piano basics'', ''youth soccer'', ''attending Mardi Gras
    parades'', ''collecting postcards of local architecture'']'
  career_goals: Betty dreams of attending a high school that offers a strong visual‑arts program and eventually earning a scholarship to a university where she can study graphic design or video‑game development.
    She aims to win regional science‑fair competitions by integrating art and technology, creating visually engaging scientific presentations. Long‑term, she envisions a career as a multimedia artist or
    game designer who can weave Louisiana’s cultural motifs—such as Mardi Gras imagery and bayou scenery—into digital experiences. She also hopes to mentor younger students in her community, encouraging
    them to explore both creative and analytical pursuits.
