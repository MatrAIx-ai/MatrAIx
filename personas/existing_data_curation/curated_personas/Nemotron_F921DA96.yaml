personas:
  professional: Lisa Parks, a budding community organizer, leverages their detail‑oriented planning skills, compassionate mediation style, and disciplined work ethic to coordinate youth‑focused events,
    volunteer teams, and fundraising projects with precision and heart.
  sports: Lisa Parks, a high‑school volleyball player and cheerleader, trains five days a week, competes in regional tournaments, and passionately cheers for the Chicago Bulls while also volunteering as
    a sideline assistant for the local youth soccer league, blending their competitive spirit with team camaraderie.
  arts: Lisa Parks, an avid scrapbooker and DIY décor creator, draws inspiration from Annie Leibovitz’s striking portraits, Ariana Grande’s upbeat pop anthems, and classic Disney animation, weaving these
    influences into their Instagram reels and event‑design projects.
  travel: Lisa Parks, a budget‑conscious teen traveler, prefers meticulously planned weekend road trips to nearby state parks such as Shenandoah and dreams of an immersive cultural exchange in Kyoto, Japan,
    once financial scholarships allow them to pursue it.
  culinary: Lisa Parks, a budding home chef, delights in baking gooey chocolate chip cookies with a pinch of sea‑salt, mastering fresh basil pesto pasta, and crafting seasonal veggie stir‑fry using locally
    sourced zucchini and bell peppers for their friends and community gatherings.
  core: Lisa Parks, a hyper‑organized 17‑year‑old who can schedule a fundraiser in a single night but habitually forgets to water their garden, blends boundless energy with a relentless quest for perfection.
background:
  cultural: Lisa was raised in a white, working‑class family in Umatilla, a small town in Lake County, Florida. Her upbringing reflects Southern Gulf‑Coast values such as strong community ties, church involvement,
    and family‑centered traditions. Local festivals, high‑school sports, and volunteer service are central to community life, reinforcing a collective spirit and a practical work ethic. These cultural influences
    have shaped Lisa’s emphasis on responsibility, cooperation, and a desire to contribute positively to her neighborhood.
attributes:
  skills: '[''Event planning and coordination'', ''Peer mediation and conflict resolution'', ''Basic budgeting and financial management'', ''Time management and scheduling'', ''Volunteer coordination'',
