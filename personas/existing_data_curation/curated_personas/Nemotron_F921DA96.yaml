  hobbies: '[''Volleyball'', ''Cheerleading'', ''Community theater'', ''Organizing neighborhood events'', ''Cooking and baking for friends'', ''Scrapbooking'', ''Gardening'', ''Volunteer work at local food
    bank'', ''Social media content creation'']'
  career_goals: Lisa’s immediate goal is to earn her General Educational Development (GED) credential within the next year, followed by enrollment in a community‑college program that offers a certification
    in health‑care assistance or nonprofit management. She aspires to work in a role that blends her organizational talent with her desire to support others, such as a community health worker, a youth mentor,
    or a project coordinator for a local charity. Long‑term, she dreams of launching her own event‑planning business that specializes in affordable celebrations for families and fundraising events for community
    organizations, allowing her to maintain high standards while making a positive impact.
