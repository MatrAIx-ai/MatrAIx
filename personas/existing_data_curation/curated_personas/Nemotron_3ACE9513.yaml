  hobbies: '[''Reading historical biographies'', ''Gardening'', ''Traditional Guatemalan cooking'', ''Attending cultural festivals'', ''Church participation'', ''Bird-watching'', ''Walking coastal trails'',
    ''Playing chess'', ''Learning digital tools'', ''Community storytelling'']'
  career_goals: Although retired, Norberto aims to stay mentally active and socially useful. He hopes to document his family's migration story and preserve Guatemalan culinary traditions by writing a small
    cookbook for his grandchildren. He aspires to volunteer as a financial advisor for the local senior center, offering simplified budgeting workshops. He also wishes to learn basic digital tools—such
    as video calling and online banking—so he can stay connected with relatives abroad. Ultimately, he dreams of fostering intergenerational bridges in his community, encouraging young people to appreciate
    both practical business skills and cultural heritage.
