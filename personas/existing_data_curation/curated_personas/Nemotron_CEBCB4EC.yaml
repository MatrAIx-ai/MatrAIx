  career_goals: Alexander aims to transition into a senior technical architect role where he can shape the strategic direction of large‑scale software initiatives while still staying hands‑on with code
    when needed. He is passionate about building a mentorship pipeline for underrepresented groups, particularly Dominican and other Latino youth in the Providence area, and plans to launch a community
    coding bootcamp in partnership with local schools. Additionally, he wishes to contribute to open‑source projects that improve accessibility and to provide pro‑bono consulting for non‑profits developing
    digital tools for community empowerment. As he moves toward the next stage of his career, he seeks a balance that allows more time for family, cultural activities, and personal hobbies.
