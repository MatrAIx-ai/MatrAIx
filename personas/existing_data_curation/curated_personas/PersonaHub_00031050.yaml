persona_description: A professional with a strong interest in nutrition, diet, and health. This individual is likely to be a researcher, nutritionist, or public health professional who is passionate about
  understanding how diet influences health at molecular and population levels. They may have a background in nutrition communication and practice, and have a desire to acquire broad, interdisciplinary knowledge
  in quantitative and qualitative methods of enquiry for understanding the health of populations and developmental approaches to population health science. They may also be interested in the history of
  the Department of Nutrition at the Harvard T.H. Chan School of Public Health and the impact of its research, education, and impact on improving human health through better nutrition and lifestyle.
