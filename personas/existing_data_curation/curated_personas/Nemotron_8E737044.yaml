personas:
  professional: Mirza Beltran is a 47‑year‑old aspiring handyman entrepreneur who leverages meticulous project planning, bilingual communication, and mechanical troubleshooting skills to build a community‑focused
    home‑improvement business, and they channel their competitive streak into out‑performing local rivals while securing OSHA certification.
  sports: Mirza Beltran follows Major League Baseball loyally, cheering for the San Francisco Giants on game nights, participates in a local adult softball league, and occasionally watches the Miami Heat,
    and they channel that same competitive energy into weekend fishing trips and friendly domino contests.
  arts: Mirza Beltran is an avid salsa dancer who frequents weekly club nights, draws inspiration from the sounds of Celia Cruz, Tito Puente, and Marc Anthony, and they also enjoy attending community theater
    performances, melding rhythmic passion with cultural appreciation.
  travel: Mirza Beltran prefers road‑trip adventures that blend fishing opportunities in Biscayne Bay with cultural exploration, having visited their island hometown for family gatherings, dreaming of a
    culinary tour through Andalusia in Spain, and they routinely escape to Key West for weekend retreats.
  culinary: Mirza Beltran delights in preparing traditional island fare like arroz con gandules, pernil, and hand‑rolled pasteles, skillfully crafting sofrito from scratch, and they often share generous
    meals with friends while occasionally indulging in late‑night leftover pernil sandwiches that clutter the kitchen counter.
  core: Mirza Beltran blends methodical entrepreneurship, a competitive spirit, and salsa rhythm into a life where toolboxes, spreadsheets, and dance floors coexist, and they occasionally wrestle with impulse
    purchases and missed doctor appointments that tip the balance.
background:
  cultural: Mirza grew up in a tight-knit Puerto Rican family in Hialeah, where Spanish was spoken at home and community traditions were celebrated with vigor. He was raised on the values of hard work,
    family solidarity, and respect for heritage, participating in annual events such as the Puerto Rican Day Parade and Three Kings Day celebrations. The blend of island culture and South Florida’s multicultural
    environment shaped his identity, giving him fluency in both Spanish and English and a deep appreciation for music, food, and communal support.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Mechanical troubleshooting (automotive and small engines)'', ''Home renovation and carpentry'', ''Basic electrical and plumbing repairs'', ''Budgeting
    and project planning'', ''Event coordination for community festivals'', ''Computer literacy (Microsoft Office, email, basic troubleshooting)'']'
  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Salsa dancing'', ''Fishing in Biscayne Bay'', ''Playing dominoes'', ''Volunteer mentorship at community youth center'', ''Following baseball
    (San Francisco Giants)'']'
  career_goals: Mirza aims to re-enter the labor market by founding a small, locally-focused handyman and home-improvement business that serves the Hialeah community. He plans to obtain OSHA certification
    and a state-licensed contractor credential within the next year. Long-term, he aspires to become a community liaison, using his organizational skills and bilingual abilities to connect residents with
    municipal resources, and eventually mentor younger adults in trade skills.
