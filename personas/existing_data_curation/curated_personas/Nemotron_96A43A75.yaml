personas:
  professional: Derek Pillai is an aspiring comic book creator who blends hand‑drawn fantasy characters with digital illustration tools, publishing weekly short comic pages for his friends while juggling
    school projects with a relaxed, often disorganized schedule.
  sports: Derek Pillai shuttles between after‑school pickup basketball games with the neighborhood Mustangs squad and weekend soccer scrimmages for the River City Rovers, cheers on the Los Angeles Lakers
    and Seattle Sounders FC, and constantly challenges friends to outscore him on the court and field.
  arts: Derek Pillai immerses himself in drawing fantastical characters, digital art experiments, and short comics inspired by Neil Gaiman and Jim Lee, while his soundtrack features Bad Bunny, Daddy Yankee,
    and Arcade Fire, creating a vibrant blend of visual and auditory inspiration.
  travel: Derek Pillai loves spontaneous weekend bike rides on nearby forest trails and day trips to local state parks, while dreaming of backpacking through Zion National Park’s red rock canyons and exploring
    Barcelona’s historic streets, though family budget limits most adventures to low‑cost local outings.
  culinary: Derek Pillai enjoys helping prepare traditional tamales and saffron‑infused arroz con pollo, and in his free time experiments with spicy chili‑lime popcorn and pancake art, showcasing a budding
    culinary curiosity that balances family recipes with playful snack creations.
  core: Derek Pillai is a wildly imaginative teen who channels his competitive spirit into comics, video games, and backyard sports, all while juggling a chaotic schedule, impulsive spending, and a habit
    of turning everyday meals into creative experiments.
background:
  cultural: Derek comes from a Hispanic/Latino family with roots that span several Latin American countries, and his household blends Spanish and English daily. He celebrates cultural traditions such as
    Día de los Muertos, Christmas posadas, and local Latino festivals in Marcy, often helping with music, decorations, and cooking. The family values close-knit community ties, often gathering with extended
    relatives for large meals featuring dishes like tamales, plantains, and arroz con pollo. While he enjoys mainstream American pop culture, his Latin heritage influences his artistic palette—vibrant colors,
    rhythmic patterns, and storytelling motifs drawn from folklore. This bicultural environment nurtures his curiosity, creativity, and sense of belonging in both his local town and broader Latino community.
