  career_goals: Derek dreams of turning his love for art and technology into a career as a concept artist for video games or animated films, hoping to study visual arts at a specialized high school and
    later pursue a degree in interactive media design. He also envisions creating his own indie games, combining his coding skills with his imaginative storytelling. Occasionally, he imagines becoming an
    inventor or participating in robotics competitions, channeling his curiosity for novel gadgets. Ultimately, he aims to share his creations through a personal YouTube channel or a community art blog,
    inspiring other kids to think creatively.
