personas:
  professional: Rosana Page, a 28‑year‑old community services program manager in New York City, merges a detail‑oriented, data‑driven approach to grant writing and budget oversight with a relaxed, adaptable
    mindset that lets her pivot projects on the fly, while her reserved yet empathetic style shines in one‑on‑one counseling and small‑group facilitation.
  sports: Rosana Page enjoys leisurely jogs through Central Park, follows the New York Knicks and New York Rangers, attends a weekly yoga class at a local studio, and participates in a seasonal community
    garden volleyball league, preferring low‑impact activities that fit her flexible schedule.
  arts: Rosana Page spends evenings sketching Manhattan streets, immerses herself in literary fiction by authors like Zadie Smith and Haruki Murakami, and regularly attends off‑Broadway productions such
    as "The 47th" and "The Ocean at the End of the Lane", while drawing inspiration from street artists like Banksy and musicians like Sufjan Stevens.
  travel: Rosana Page favors weekend getaways to the Hudson Valley’s artisan farms, dreams of exploring Lisbon’s mural‑filled neighborhoods for one‑week artist residencies, and occasionally joins group
    hikes in the Catskills, balancing a modest travel budget with a penchant for culturally immersive experiences.
  culinary: Rosana Page experiments with eclectic dishes like miso‑marinated cauliflower tacos, homemade kimchi, and saffron‑infused risotto, cultivates basil, mint, and cherry tomatoes on her balcony garden,
    and rates herself as an intermediate home‑cook who loves the challenge of blending Asian and Mediterranean flavors.
  core: Rosana Page is a detail‑driven community program leader who channels her quiet, flexible nature into creative problem‑solving, modest financial habits, holistic self‑care, and a love for off‑beat
    art, food, and low‑key adventure.
background:
  cultural: Rosana grew up in a middle‑class, white family with Irish‑German ancestry in the suburban outskirts of New York City. Her upbringing emphasized education, civic responsibility, and appreciation
    for the arts, values reinforced by her liberal arts college experience. Living and working in Manhattan’s culturally diverse environment has broadened her perspective, fostering a strong sense of social
    equity and cultural humility. She is aware of her own privilege and actively strives to honor and uplift the varied cultural narratives of the communities she serves, blending her Western heritage with
    the multicultural fabric of New York.
attributes:
  skills: '["Community Program Management", "Grant Writing", "Volunteer Coordination", "Needs Assessment", "Budget Management", "Data Analysis & Reporting", "Crisis Intervention", "Conflict Mediation",
