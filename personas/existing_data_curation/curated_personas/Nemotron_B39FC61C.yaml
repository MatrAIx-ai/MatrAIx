  hobbies: '["Reading literary fiction", "Sketching and drawing", "Yoga and meditation", "Gardening", "Walking in Central Park", "Cooking and baking", "Attending off‑Broadway shows", "Journaling", "Volunteer
    work at a animal shelter", "Playing the piano"]'
  career_goals: Rosana aims to advance to a senior leadership role, such as Director of Community Services for a municipal agency or a nonprofit, where she can shape city‑wide initiatives that integrate
    arts and social support. She plans to earn a Master’s in Social Work or Public Administration to deepen her policy expertise, and she aspires to develop a sustainable, community‑driven arts center that
    provides mental‑health resources and skill‑building workshops for underserved neighborhoods. Long‑term, she hopes to influence public policy to secure stable funding for community‑based programs and
    to mentor emerging social‑service professionals, fostering a collaborative and inclusive sector.
