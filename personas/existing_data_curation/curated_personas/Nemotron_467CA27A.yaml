personas:
  professional: Keosha Belcher is a seasoned healthcare billing and posting clerk who leverages three decades of mastery over Epic and Athenahealth, CPT/HCPCS/ICD‑10 coding, and Excel analytics to deliver
    near‑perfect claim accuracy, while their organized, methodical nature and curious mindset drive them to mentor junior staff and continuously refine workflow processes toward a future supervisory role.
  sports: Keosha Belcher enjoys low‑impact cardio walks along Pacific Beach, follows the San Diego Padres with faithful spring‑training attendance, plays in a senior softball league with the San Diego Golden
    Orioles, and practices gentle yoga at Sunset Cliffs Yoga Studio to balance activity with the ocean breeze.
  arts: Keosha Belcher immerses themselves in San Diego’s vibrant art scene, frequenting the Museum of Art’s exhibitions featuring Georgia O’Keeffe and local painter Maria K., painting abstract acrylics
    inspired by the rhythm of Miles Davis, and volunteering with a community theater that stages productions of 'Our Town' and 'The Glass Menagerie', all of which fuel their creative expression.
  travel: Keosha Belcher prefers thoughtfully planned journeys that blend cultural enrichment with relaxation, often weekend‑hopping to nearby Joshua Tree and Solvang for desert stargazing and wine tasting,
    dreaming of a spring pilgrimage to New Orleans for Creole cuisine, and envisioning an international art pilgrimage to Paris’s Musée d’Orsay, always budgeting the trips with an Excel travel tracker.
  culinary: Keosha Belcher is an avid home chef who blends Creole flair—gumbo, jambalaya—and Southern comfort staples like chicken‑and‑dumplings, masters seasoning with paprika, thyme, and cayenne, experiments
    with California ingredients such as prickly pear and heirloom tomatoes, and despite occasional over‑seasoning and generous portion sizes, turns leftovers into impromptu lunches.
  core: Keosha Belcher blends meticulous billing expertise with a boundless curiosity for art, gardening, and seasoned cooking, balancing disciplined routines with occasional impulsive splurges on acrylic
    paints, all while navigating mild hypertension and a stubborn wrist arthritis with spreadsheets and yoga.
background:
  cultural: Keosha identifies as African American and grew up in a close‑knit, multigenerational family in San Diego's historic Black neighborhoods. Her upbringing emphasized community service, church involvement,
    and the celebration of African American cultural traditions such as Juneteenth and Kwanzaa. Music—especially jazz, blues, and contemporary R&B—has been a soundtrack to her life and often inspires her
    artistic pursuits. She values storytelling, resilience, and the collective spirit of her community, which she brings into her workplace by fostering collaborative, respectful relationships. Keosha remains
    active in local cultural events, mentors youth from her neighborhood, and incorporates the richness of her heritage into both her personal and professional endeavors.
attributes:
  skills: '[''Medical billing and coding'', ''Insurance verification'', ''Claim submission and follow‑up'', ''Data entry accuracy'', ''Financial reconciliation'', ''Microsoft Excel (pivot tables, formulas)'',
    ''Medical billing software (Epic, Athenahealth)'', ''HIPAA compliance'', ''Customer service and patient communication'', ''Training and mentorship'', ''Report generation and analysis'']'
  hobbies: '[''Visiting art museums and galleries'', ''Community theater attendance'', ''Acrylic painting'', ''Participating in an artists\'' collective'', ''Attending public lectures on history and philosophy'',
    ''Gardening (succulents and native plants)'', ''Beach walking and birdwatching'', ''Cooking Creole and Southern cuisine'', ''Volunteering at a youth art program'', ''Doing crossword puzzles'', ''Reading
    historical fiction'']'
  career_goals: Keosha aims to transition into a senior supervisory role within the billing department, where she can lead a team, streamline workflow processes, and implement best practices for claim accuracy.
    She plans to obtain her GED and pursue an associate degree in Health Information Management to formalize her expertise. Long‑term, she hopes to become a part‑time consultant for local clinics, offering
    guidance on billing efficiency and compliance. Additionally, she wants to integrate her love of art by organizing wellness workshops that incorporate creative expression for patients and staff, fostering
    a more human‑centered workplace culture.
