  career_goals: Diana aims to leverage her operational expertise to move into a supervisory role within the next two years, targeting a Customer Service Team Lead position. She plans to complete an online
    Bachelor’s degree in Business Administration while obtaining a Certified Customer Service Manager (CCSM) credential and Six Sigma Yellow Belt certification to enhance her process-optimization capabilities.
    Long-term, she envisions becoming a Customer Service Manager overseeing a regional support center, where she can implement data-driven service strategies, mentor a high-performing team, and drive continuous
    improvement initiatives. Her ambition is also tied to achieving recognized performance awards and contributing to the company's customer satisfaction goals.
