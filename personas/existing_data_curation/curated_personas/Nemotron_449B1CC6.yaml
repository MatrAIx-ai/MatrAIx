personas:
  professional: Diana Frazin thrives as a customer‑support specialist in a high‑volume call‑center, leveraging her mastery of Salesforce and Zendesk, razor‑sharp verbal and written communication, methodical
    troubleshooting, and competitive drive to consistently exceed service‑level agreements while championing process documentation and peer training as she prepares for a team‑lead role.
  sports: Diana Frazin fuels her active lifestyle by racing with the Springfield Striders running club, attending weekly Zumba classes, cheering on the St. Louis Cardinals and Kansas City Chiefs, and joining
    a co‑ed recreational softball league each summer.
  arts: Diana Frazin delights in community‑theater productions, often marveling at the musical energy of Broadway’s Hamilton while humming Adele’s soulful ballads and discussing Maya Angelou’s poetry at
    her city book‑club meetings.
  travel: Diana Frazin prefers meticulously planned weekend getaways, favoring road trips to Colorado’s Rocky Mountain National Park and the vibrant streets of New Orleans, while eyeing an overseas adventure
    to Kyoto, Japan, where she hopes to blend cultural exploration with culinary tastings.
  culinary: Diana Frazin showcases her intermediate baking talent by crafting buttery apple pies, crunchy pecan tarts, and chocolate‑chip cookies spiced with a pinch of sea‑salt, often pairing them with
    a robust espresso at church potlucks and family gatherings.
  core: Diana Frazin’s life is a blend of methodical organization, competitive drive, and community‑centered energy, balanced by a sweet tooth for baked treats and a habit of double‑checking every spreadsheet
    before hitting send.
background:
  cultural: Diana is a fourth-generation Midwestern American of German-Irish ancestry, born and raised in Springfield, Illinois. She grew up in a close-knit suburb where community values, modesty, and a
    strong work ethic were emphasized. Her family follows a Lutheran tradition and celebrates typical American holidays such as Thanksgiving, Fourth of July parades, and local festivals. The regional culture
    of practicality and friendliness influences her preference for structure and reliability, while the vibrant local community scene fuels her sociable and outgoing nature. She is an avid fan of the Chicago
    Cubs and stays involved in neighborhood initiatives that reflect the collaborative spirit of the Sangamon County area.
