  career_goals: Even at 92, Yol aims to stay active in her community by leading intergenerational storytelling circles, documenting her family’s history for future generations, and assisting the local senior
    center with volunteer training. She also hopes to complete a memoir that captures her experiences from the Great Migration to the civil‑rights era, preserving the cultural legacy of Philadelphia’s Black
    neighborhoods.
