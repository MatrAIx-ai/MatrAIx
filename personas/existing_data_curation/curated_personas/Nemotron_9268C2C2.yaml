personas:
  professional: Ixchel Perez is a senior computer systems analyst known for meticulously translating healthcare and manufacturing business needs into precise system specifications, leveraging advanced SQL,
    Python automation, SAP Business One, and AWS monitoring while fluently bridging English and Spanish teams, and they bring a competitive drive that ensures projects finish under budget and ahead of schedule.
  sports: Ixchel Perez thrives on the competitive energy of forwarding for a women’s community soccer league each Saturday, cheering for San Antonio FC and following the Texas Rangers during baseball season,
    while also dancing salsa three times a week at their local club, where they organize social events and stay fit through a blend of cardio and team tactics.
  arts: Ixchel Perez captures the vivid street scenes of San Antonio’s Market Square through black‑and‑white photography, draws inspiration from the works of Dorothea Lange and renowned muralist Diego Rivera,
    and unwinds by listening to Carlos Santana’s guitar riffs and reading mystery thrillers by Gillian Flynn and Tana French, while they occasionally procrastinate editing their photo portfolio.
  travel: Ixchel Perez’s travel style blends structured itinerary planning with spontaneous culinary detours, having explored Oaxaca’s mole traditions, the historic streets of Mexico City, and a road trip
    to Austin’s music festivals, while a dream destination remains Barcelona for its architecture and tapas culture, balanced against family commitments and a modest travel budget, and they always book
    flights at least three months in advance.
  culinary: Ixchel Perez excels at preparing mole poblano and pozole, meticulously selecting ancho chilies, cacao nibs, and hominy, while leading cooking workshops that teach the art of slow‑cooked sauces
    and corn‑husk wrappings, and they often experiment with new ingredient pairings like pineapple‑chipotle glazes for tacos.
  core: Ixchel Perez is a fiercely organized, sociable technologist who balances a competitive edge with community‑focused passions—from leading soccer attacks and salsa nights to cooking layered mole and
    documenting city life through a camera lens, and they never miss a deadline.
background:
  cultural: Ixchel grew up in a close‑knit Mexican‑American family in the South Side of San Antonio, where Spanish was spoken at home and community festivals punctuated the calendar. Her upbringing emphasized
    family loyalty, respect for elders, and collective celebration, which she carries into her professional life through strong teamwork and mentorship. She celebrates Día de los Muertos and Mexican Independence
    Day with traditional altars and feasts, and she often integrates cultural symbols into her cooking classes and community events. Being bilingual, she seamlessly navigates both Mexican and mainstream
    American cultural expectations, using this dual perspective to foster inclusive workplaces and to bridge communication gaps between technical staff and Spanish‑speaking users.
attributes:
  skills: '[''Systems Analysis'', ''Requirements Engineering'', ''Process Optimization'', ''SQL Query Development'', ''Python Scripting'', ''ERP Configuration (SAP Business One)'', ''AWS Cloud Monitoring'',
