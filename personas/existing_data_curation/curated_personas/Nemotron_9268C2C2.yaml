  hobbies: '[''Salsa dancing and event organizing'', ''Women’s community soccer league'', ''Mexican cooking and workshop facilitation'', ''Street photography'', ''STEM mentorship with Tech Unidos'', ''Yoga'',
    ''Reading mystery thrillers'']'
  career_goals: Ixchel aims to transition from a senior analyst role to a technology manager position within the next three years, focusing on leading cross‑functional teams that drive digital transformation
    initiatives. She plans to earn a PMP certification and deepen her expertise in cloud security to position herself as a strategic advisor for enterprise‑wide migration projects. With her strong competitive
    drive, she wants to spearhead a company‑wide process‑improvement program that reduces system downtime by 15 % and mentors at least five junior analysts each year, particularly encouraging women and
    Hispanic talent to enter the tech field.
