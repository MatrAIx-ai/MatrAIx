    art workshops'']'
  career_goals: Scott dreams of turning his love for imaginative art into a career. He hopes to attend a specialized high‑school program or summer intensive focused on illustration, eventually studying
    concept art, graphic novel creation, or animation at a liberal‑arts university. He envisions working as a concept artist for video games or animated films, while keeping flexibility to explore interdisciplinary
    roles that blend storytelling, visual design, and emerging media. He also wants to share his creations through self‑published comics or an online portfolio, staying open to evolving his path as new
    opportunities arise.
