  hobbies: '["Playing basketball", "Attending live music events (jazz, hip‑hop)", "Cooking soul‑food meals", "Exploring Kansas City’s food scene", "Traveling to new cities", "Community service volunteering",
    "Reading business and self‑help books", "Photography", "Participating in local cultural festivals"]'
  career_goals: Alvin aims to rise to a senior sales manager position within the next three years, eventually becoming a regional sales director overseeing multiple Kansas City market segments. He plans
    to earn the Certified Professional Sales Leader (CPSL) credential and develop expertise in strategic account management. Long‑term, he envisions launching his own consultancy that helps small businesses
    improve their sales processes while also mentoring young sales talent from underrepresented backgrounds.
