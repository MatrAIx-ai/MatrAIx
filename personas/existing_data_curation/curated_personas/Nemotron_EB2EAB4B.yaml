personas:
  professional: Alvin Wiley is a seasoned sales professional who leverages persuasive negotiation, data‑driven decision‑making, and advanced CRM expertise to exceed quotas while building lasting client
    relationships, balancing a practical, organized approach with the flexibility required for dynamic market demands.
  sports: Alvin Wiley is an avid pick‑up basketball player who follows the Kansas City Chiefs, supports Sporting Kansas City, regularly joins the local recreation league’s summer basketball circuit, and
    balances weekend runs with a membership at the Midtown Athletic Club to stay fit.
  arts: Alvin Wiley is a devoted fan of live jazz and hip‑hop, regularly attending shows at the Blue Room featuring artists like Kamasi Washington and Kendrick Lamar, documents each concert with street‑style
    photography, and draws creative inspiration from the improvisational energy of music for both sales pitches and personal projects.
  travel: Alvin Wiley is a culturally curious traveler who blends meticulous itinerary planning with spontaneous photo‑journalism, favoring vibrant city breaks such as New Orleans for its music and cuisine,
    Chicago for its architecture, and Portland for its indie coffee scene, while budgeting trips through a dedicated travel fund.
  culinary: Alvin Wiley is a passionate home cook who perfects soul‑food classics like fried chicken, collard greens, and sweet potato pie, experiments with spice rubs for ribs, enjoys sourcing fresh produce
    at the City Market, and frequently hosts dinner gatherings where they showcase their signature jambalaya.
  core: Alvin Wiley is an energetic, socially driven sales leader who balances data‑driven ambition with a love for jazz, basketball, and soul‑food cooking, yet often wrestles with stress‑induced worry
    and occasional impulsive spending.
background:
  cultural: Alvin grew up as part of the African‑American community in Kansas City, Kansas, where church, music, and family gatherings were central to his upbringing. He celebrates cultural milestones like
    Juneteenth and supports local Black-owned businesses. His heritage influences his communication style—both expressive and respectful—and fuels his commitment to community uplift. While navigating a
    Midwestern environment, he integrates traditional African‑American customs with the pragmatic values of his hometown, shaping a balanced worldview that blends curiosity, practicality, and a strong sense
    of belonging.
attributes:
  skills: '["Negotiation", "Customer Relationship Management (CRM)", "Sales Forecasting", "Public Speaking", "Team Collaboration", "Conflict Resolution", "Data Analysis with Excel", "Microsoft Office Suite",
