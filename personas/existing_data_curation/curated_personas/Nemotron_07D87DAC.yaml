personas:
  professional: Patricia Harshman, a 22‑year‑old teacher‑in‑training, designs and delivers structured lesson plans that blend state standards with flexible, tech‑enhanced strategies, using Google Classroom
    and interactive whiteboards while fostering a predictable yet collaborative classroom atmosphere that reflects their small‑town emphasis on community and responsibility.
  sports: Patricia Harshman enjoys hiking the Farmington River trails in spring and fall, participates in a community swing‑dance class for cardio, runs with the West Hartford 5K club during summer, and
    they cheer for the Boston Red Sox and New England Patriots, often wearing their caps during weekend games.
  arts: Patricia Harshman fuels her creative side by attending swing‑dance socials, reading contemporary fiction like Celeste Ng’s *Little Fires Everywhere* and Sally Rooney’s *Normal People* in her book
    club, listening to folk‑rock bands such as The Avett Brothers, and they volunteer as a literacy tutor, deepening her appreciation for storytelling.
  travel: Patricia Harshman prefers modest, well‑planned road trips that combine scenic hiking and small‑town charm, having explored Mystic, Connecticut; the historic lighthouses of Newport, Rhode Island;
    and Acadia National Park, while they dream of a summer backpacking adventure through a rolling green countryside in Europe once a scholarship‑funded study abroad program becomes viable.
  culinary: Patricia Harshman loves baking rustic apple crumble with a hint of cinnamon and nutmeg, preparing herb‑infused roasted chicken using fresh basil, thyme, and rosemary from her porch garden, and
    they often contribute homemade quickbread and butternut squash soup to neighborhood potlucks, delighting friends with seasonal flavors.
  core: Patricia Harshman is a detail‑oriented, community‑focused educator who balances a love for structured lesson planning with a zest for group activities, though they sometimes overcommit to events,
    leaving a trail of half‑finished knitting projects and a stack of paper‑clips on her desk.
background:
  cultural: Patricia grew up in Wolcott, Connecticut, a close‑knit New England town with deep roots in farming and small‑industry traditions. Her family lineage includes Irish and German ancestry, and the
    household emphasized community involvement, modesty, and a strong work ethic. Seasonal town events such as the summer fair, autumn harvest festivals, and holiday parades have shaped her sense of belonging.
    She values the region’s emphasis on education and civic responsibility, often participating in local church activities and neighborhood service projects.
attributes:
  skills: '["Classroom management", "Lesson planning", "Curriculum alignment", "Differentiated instruction", "Student assessment", "Educational technology integration", "Parent and colleague communication",
    "Conflict resolution", "Time management", "Mentorship and peer coaching"]'
  hobbies: '["Hiking", "Swing dancing", "Cooking and baking", "Reading (book club)", "Volunteer tutoring", "Gardening"]'
  career_goals: Patricia aims to deepen her pedagogical expertise by earning a Master’s degree in Education with a focus on curriculum design and instructional leadership. She aspires to become a lead teacher
    and later serve as a department chair or vice principal, where she can influence school-wide initiatives and mentor new teachers. Her long‑term ambition includes developing a school‑based community
    outreach program that integrates project‑based learning with local service, and obtaining a special‑education endorsement to better support diverse learners.
