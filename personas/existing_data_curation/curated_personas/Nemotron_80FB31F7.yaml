personas:
  professional: Keith Huneycutt is a seasoned call center representative who leverages sharp verbal communication, active listening, and conflict‑resolution expertise to de‑escalate tense calls while balancing
    a practical curiosity for product knowledge with a personable, assertive coaching style that prepares new hires for fast‑paced customer service.
  sports: Keith Huneycutt cheers the local high school football team, follows the Kansas City Chiefs and St. Louis Cardinals, belongs to a county hunting club, and spends his free weekends fishing the Missouri
    River, embodying a community‑rooted enthusiasm for both team sports and outdoor competition.
  arts: Keith Huneycutt's evenings are soundtracked by classic rock legends like Bruce Springsteen and country icons such as Johnny Cash while he flips through practical self‑help titles by Brené Brown,
    mixing a nostalgic soundtrack with a quest for personal growth.
  travel: Keith Huneycutt prefers road‑trip adventures in his restored vintage pickup—recently exploring the Ozarks for a weekend fishing retreat and dreaming of a summer hunting excursion in Texas—yet
    balances these outings with a modest budget that often prioritizes family visits over distant leisure travel.
  culinary: Keith Huneycutt enjoys cooking his fresh‑caught catfish with a pepper‑garlic crust, smoking brisket seasoned with paprika and brown sugar, and topping homemade chili with shredded cheddar, reflecting
    moderate cooking skills that blend comfort‑food traditions with his love of outdoor bounty.
  core: Keith Huneycutt is a gregarious, stress‑prone problem‑solver who channels his practical curiosity into community service, vintage truck restoration, and a steady pursuit of a future hardware store,
    all while juggling a love for classic rock, hunting, and occasional over‑spending on gear.
background:
  cultural: Keith comes from a multi‑generational working‑class white family rooted in the rural Midwest, with ancestors primarily of German and Scandinavian descent who settled in South Dakota in the early
    1900s. He was raised in a small‑town environment where church attendance, local sports, and neighborly support were central to daily life. The community emphasizes hard work, self‑reliance, modesty,
    and practical problem solving, values that have shaped his outlook and interactions. Although his formal education ended before ninth grade, the cultural emphasis on hands‑on skills, responsibility,
    and community involvement remains a core part of his identity.
