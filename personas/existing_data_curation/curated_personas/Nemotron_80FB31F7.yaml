  career_goals: Keith aims to earn his GED within the next year to broaden his qualifications, and he is working toward a team lead or supervisory role in the call center to leverage his experience and
    mentoring strengths. He hopes to develop stronger stress‑management techniques to improve his well‑being and eventually transition to a small business venture, such as a family‑run hardware store, that
    would allow him to serve his community while gaining greater control over his schedule and income.
