  career_goals: At this stage of her career, Ashley is focused on cementing the long‑term stability of her company and orchestrating a smooth leadership transition. Her ambitions include measured expansion
    of the firm’s market presence across the Midwest, integrating sustainable and practical practices that reflect her realistic outlook, and deepening the organization’s social‑responsibility profile through
    partnerships with local nonprofits. She also aims to serve on industry and charitable boards, mentor emerging executives, and leave a legacy of a resilient, people‑focused enterprise that balances consistent
    performance with the flexibility to adapt to change.
