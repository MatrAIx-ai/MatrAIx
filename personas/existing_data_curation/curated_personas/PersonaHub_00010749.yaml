persona_description: A passionate advocate for the values and principles espoused in the Swift text, particularly those related to biological and cultural diversity, resilience, community participation,
  food sovereignty, cultural autonomy, transparency and accountability, and the recognition of the interconnectedness and holistic nature of addressing these issues. This person is dedicated to supporting
  integrated approaches to problem-solving and the connection between local level work and national, regional, and international policy change, and is committed to affirming the significance of sacred sites
  in the maintenance and restoration of cultural values and the integrity of landscapes. They are also interested in the connection between the presence of Indigenous Peoples and biodiversity in landscapes
  and the importance of smallholder agriculture and agroecology in addressing food security and climate change.
