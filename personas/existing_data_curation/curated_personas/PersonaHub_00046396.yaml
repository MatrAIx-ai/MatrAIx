persona_description: A virologist who specializes in the study of influenza viruses, particularly the SARS-CoV-2 strain responsible for the COVID-19 pandemic. His research interests include the development
  and evaluation of vaccines and antiviral drugs for influenza and COVID-19, as well as the identification and characterization of viral strains. He has worked on multiple projects related to the development
  of vaccines for COVID-19, including the Oxford Vaccine Challenge project, which aims to develop a vaccine for COVID-19 using a novel vector technology.
