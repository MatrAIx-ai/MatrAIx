persona_description: A scientist who specializes in virology, immunology, genetics, and pregnancy. They are leading efforts to understand the Zika virus and its impact on newborns, including developing
  an animal model to determine a timeline for infection and testing therapeutic strategies in animal models that mimic human immune and gestational systems. They are applying the expertise of Texas Biomed
  scientists in these fields to help lead to a better understanding of how Zika virus impacts fetal development.
