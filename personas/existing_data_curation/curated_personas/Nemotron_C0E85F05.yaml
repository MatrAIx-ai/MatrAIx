personas:
  professional: Dorothy Raheja, a fledgling storyteller who loves to arrange picture books into narrative sequences, channels her vivid imagination and competitive streak into early pretend‑play presentations,
    showing surprising organization for a toddler while delighting peers at story‑time circles.
  sports: Dorothy Raheja, an energetic participant in the local park’s “toddler tumble” sessions, loves sprinting across the sandpit, proudly wears a miniature jersey of the Mississippi State Bulldogs,
    and eagerly cheers for the New Orleans Saints during family game nights, channeling her competitive nature into friendly races with other kids.
  arts: Dorothy Raheja, a budding blues enthusiast who taps rhythm on kitchen counters to B.B. King’s “The Thrill Is Gone” and imitates gospel harmonies from Sunday services, crafts crayon masterpieces
    of riverboats and fireflies, and insists on listening to Muddy Waters before bedtime, letting music fuel her endless curiosity.
  travel: Dorothy Raheja, an adventurous stroller‑rider who has explored the Vicksburg National Military Park, taken weekend trips to her aunt’s farm along the levee, and dreams of visiting the historic
    French Quarter in New Orleans for Mardi Gras, preferring spontaneous family outings over meticulously planned vacations.
  culinary: Dorothy Raheja, a picky but enthusiastic eater who adores golden fried chicken nuggets, buttery cornbread, sweet tea in a sippy cup, and squeals with delight at the smell of fresh peaches, yet
    often refuses broccoli, mastering the art of smearing honey on toast with her small fingers.
  core: Dorothy Raheja, a two‑year‑old whirlwind of imagination, competition, and Southern charm, delights in music, storytelling, and occasional stubbornness that keeps her caregivers on their toes.
background:
  cultural: Dorothy is being raised in a white, Southern family in Vicksburg, Mississippi. Her home life blends traditional Southern values—hospitality, close‑knit family ties, and regular attendance at
    a local Baptist church—with the cultural richness of the Mississippi Delta. The rhythmic sounds of blues, gospel, and river‑front festivals are part of her daily soundtrack, and she often hears stories
    about the historic river and local folklore. Family gatherings feature Southern comfort foods such as fried chicken, cornbread, and sweet tea, shaping her sensory experiences. Growing up in Warren County,
    she enjoys the warm climate, outdoor play along the levee, and community events that celebrate the region's musical and storytelling heritage.
