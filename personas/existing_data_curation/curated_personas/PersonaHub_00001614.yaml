persona_description: A cardiovascular researcher who specializes in the study of the interactions among various branches of the cardiovascular system, including the heart, microcirculation, and peripheral
  resistance. She is particularly interested in the complex feedback loops that control cardiovascular parameters and how they interact with noncardiovascular controls. She is skilled in the use of mathematical
  models and computer simulations to evaluate the reliability and validity of these models and to test the hypothesis that certain parameters are crucial for regulating the cardiovascular system. She is
  also knowledgeable about the interrelationships among the various subsystems and the importance of considering all subsystems in an integrated fashion when analyzing the cardiovascular system.
