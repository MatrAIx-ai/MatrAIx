  career_goals: Natali aims to become a certified master floor installer within the next three years, earn additional OSHA and green‑building certifications, and eventually launch her own independent flooring
    business focused on eco‑friendly materials. She wants to improve her organizational skills to handle larger projects, increase her client base in Huntsville and surrounding areas, and secure financial
    stability that reduces her anxiety. She also aspires to mentor other young women in trades, showcasing the value of practical curiosity and competitive drive.
