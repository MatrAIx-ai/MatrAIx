personas:
  professional: Natali, a 26‑year‑old flooring installer in Huntsville, blends meticulous manual dexterity and blueprint expertise with a fiercely competitive streak, and they often improvise solutions
    on the fly despite a habit of juggling disorganized schedules, channeling their curiosity into eco‑friendly installation techniques and rapid, high‑quality finishes.
  sports: Natali, a 26‑year‑old outdoor enthusiast, hikes the hill‑country trails with the Huntsville Hiking Club on weekends, roots for the Alabama Crimson Tide and the Huntsville Havoc during football
    and hockey seasons, and balances that competitive spirit with regular yoga sessions to temper their high‑energy drive.
  arts: Natali, a 26‑year‑old creative hobbyist, sketches floor‑plan concepts while they unwind to the soulful ballads of Lila Downs and the indie folk sounds of Calexico, and they frequently browse local
    galleries to admire the work of emerging muralists like Jorge González.
  travel: Natali, a 26‑year‑old adventure seeker, enjoys spontaneous road trips to the Texas Hill Country and weekend getaways in Asheville, while dreaming of eco‑tourism excursions to Costa Rica’s cloud
    forests and a design‑focused tour of Copenhagen’s sustainable architecture scene.
  culinary: Natali, a 26‑year‑old home‑cooking enthusiast, masters family‑style dishes such as mole poblano, chiles en nogada, and grilled corn elote, relishing the smoky depth of ancho chilies and the
    freshness of cilantro, and they balance these culinary experiments with occasional visits to farm‑to‑table taco spots that feature locally sourced corn and cheese.
  core: Natali, a 26‑year‑old flooring prodigy who mixes a competitive edge with a laid‑back, sometimes chaotic schedule, combats intense anxiety through yoga, and swaps tile patterns for tacos, lives at
    the intersection of hands‑on craftsmanship and restless curiosity.
background:
  cultural: Natali grew up in a Mexican‑American household in Texas, speaking both English and Spanish at home. Her family celebrated Día de los Muertos, Cinco de Mayo, and other Mexican traditions, fostering
    a strong sense of cultural identity. The rich flavors of Mexican cooking influence her culinary hobby, and the communal values of her community shaped her competitive yet independent work ethic. She
    maintains ties with extended family in the region, occasionally attends church services, and incorporates Mexican aesthetic motifs into her design ideas, blending heritage with her practical trade.
