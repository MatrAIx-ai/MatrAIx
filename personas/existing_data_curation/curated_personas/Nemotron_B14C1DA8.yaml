  hobbies: '["Cooking traditional Mexican dishes", "Gardening vegetables and herbs", "Participating in church choir", "Volunteer work at local food bank", "Knitting and crocheting", "Storytelling and oral
    history", "Attending community dance classes"]'
  career_goals: Although retired, Ana remains goal‑oriented. She aspires to document her family’s stories and recipes in a handwritten memoir that can be passed down to grandchildren. She aims to expand
    her digital literacy so she can lead virtual workshops on cooking and gardening for the senior center. Maintaining her health and mobility is a priority, so she plans to join a local walking group and
    continue attending community dance classes. Ultimately, she hopes to keep fostering harmony and cultural pride within her neighborhood by mentoring younger volunteers and organizing intergenerational
    cultural events.
