    tools'']'
  career_goals: Alejandro aims to become a senior maintenance manager overseeing multiple plant sites in Puerto Rico and the Caribbean, earning advanced certifications such as Certified Maintenance & Reliability
    Professional (CMRP) and a PLC specialist credential. He plans to spearhead the adoption of smart‑factory IoT solutions within his organization, positioning himself as a regional authority on refractory
    equipment reliability. In the long term, he envisions launching his own consulting firm that provides strategic maintenance planning and training for industrial facilities, while also mentoring the
    next generation of mechanics through apprenticeships and workshops.
