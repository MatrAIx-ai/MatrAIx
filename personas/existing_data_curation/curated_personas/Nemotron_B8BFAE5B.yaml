personas:
  professional: Alejandro Herrera, a master industrial maintenance engineer, applies their deep expertise in PLC programming, predictive IoT monitoring, and precision MIG/TIG welding to keep large-scale
    refractory furnaces operating flawlessly, while their disciplined, competitive nature drives them to set rigorous performance benchmarks and mentor apprentices with a data‑driven mindset.
  sports: Alejandro Herrera cycles the coastal bike path with the Club Ciclista San Juan five mornings a week, joins pick‑up soccer games with friends during the summer, and faithfully follows the Cangrejeros
    de Santurce basketball team, using their disciplined schedule to balance cardio, strength, and flexibility.
  arts: Alejandro Herrera captures the kinetic colors of street murals by artists such as Bross and Eduardo Leturque, spends evenings riffing on acoustic guitar to the rhythms of salsa legend Willie Colón,
    and regularly attends museum openings featuring contemporary painters like Noelia Ledesma, all while they continuously seek fresh visual inspiration.
  travel: Alejandro Herrera prefers meticulously planned short getaways that blend cultural immersion with adventure, such as cycling the historic streets of Old San Juan, exploring the colonial architecture
    of Cartagena, Colombia, and hiking the volcanic trails of St. Lucia, while their limited vacation days reserve longer trips for occasional weekend flights to Miami for family gatherings.
  culinary: Alejandro Herrera, an adept home cook, reimagines classic mofongo by infusing it with roasted garlic‑scented quinoa and braised pork shoulder, delights in alcapurrias topped with ahi tuna tartare,
    and regularly enjoys fresh ceviche seasoned with lime, cilantro, and habanero, all while they experiment with modern plating techniques.
  core: Alejandro Herrera blends methodical engineering precision with restless artistic curiosity, juggling a toolbox of vintage wrenches and a camera on every bike ride, yet they habitually forget to
    water their indoor succulents.
background:
  cultural: Alejandro grew up in a working‑class neighborhood of San Juan, son of a nurse mother and a line worker father in the island’s petrochemical sector. Bilingual in Spanish and English, he attended
    Catholic school but now identifies as secular. His upbringing instilled a strong sense of Puerto Rican resilience, communal pride, and a love for music, dance, and food. The vibrant street art scene
    and annual festivals like Noche de San Juan have shaped his appreciation for visual expression, while salsa, bomba, and plena remain staples of his social life. He celebrates traditional holidays with
    his extended family, values the island’s culinary heritage, and remains connected to local community initiatives, seeing his mechanical expertise as a contribution to Puerto Rico’s essential industrial
    infrastructure.
