personas:
  professional: Jose Fontao, a seasoned construction specialist with two decades of concrete finishing, framing, and heavy‑equipment operation, channels their curiosity and hands‑on creativity into mentoring
    crews while their relaxed, flexible approach sometimes leads to a scattered project schedule, yet their compassion ensures safety and teamwork remain top priorities.
  sports: Jose Fontao enjoys fishing at the nearby lake, hiking the rolling trails of local state parks, and playing weekend soccer with the Sidney Latino Community Center’s team, while cheering on the
    Cleveland Browns, Cincinnati Reds, and Cleveland Cavaliers, and they approach fitness with a laid‑back philosophy that blends social activity with occasional solo runs.
  arts: Jose Fontao, an avid watercolorist of Ohio’s farmlands, draws inspiration from Frida Kahlo and Diego Rivera, crafts acoustic renditions of traditional folk songs like 'Cielito Lindo,' frequents
    the Sidney Art Gallery to view works by Sarah Collins, supports community theater productions such as 'Our Town,' and they often share their creations at local cultural festivals, reflecting a deep
    appreciation for both heritage and contemporary art.
  travel: Jose Fontao prefers road‑trip adventures that balance cultural immersion with family time, having driven to Oaxaca for Día de los Muertos celebrations, explored New Orleans’ music scene, and planned
    a future pilgrimage to Patagonia, while budgeting constraints and a teenage child’s school schedule steer them toward shorter, off‑season getaways.
  culinary: Jose Fontao showcases moderate cooking prowess by preparing classic mole poblano, tamales, and chiles en nogada for gatherings, harvesting zucchini and tomatoes from their garden to toss into
    fresh salsas, and relishes local Ohio diners’ pork tenderloin sandwiches, all while favoring ingredients like corn masa, poblano peppers, and rosemary, and they love to experiment with new spice blends
    whenever time permits.
  core: Jose Fontao blends a hands‑on construction career with a love of watercolor, guitar, and community service, navigating life with flexible plans, occasional disorganization, and a steadfast commitment
    to helping others, and they maintain an infectious optimism.
background:
  cultural: Jose was born to Mexican immigrant parents and grew up speaking Spanish at home while learning English at school. He maintains strong ties to his heritage through celebrations of Día de los
    Muertos, Cinco de Mayo, and traditional Mexican cuisine, often cooking tamales and mole for family gatherings. Living in Sidney, Ohio, he blends Mexican cultural values—family, community, and respect
    for elders—with Midwestern sensibilities of modesty and hard work. He participates in the local Latino community center, helping organize cultural festivals, and his Catholic faith informs his appreciation
    for communal rituals and charitable service.
attributes:
  skills: '[''Concrete pouring'', ''Carpentry'', ''Equipment operation (forklift, cement mixer, pneumatic drill)'', ''Safety compliance (OSHA standards)'', ''Team coordination'', ''Basic blueprint reading'',
