  hobbies: '[''Watercolor painting'', ''DIY woodworking'', ''Acoustic guitar playing (Mexican folk music)'', ''Visiting art galleries and community theater'', ''Reading architecture documentaries'', ''Gardening'',
    ''Fishing'', ''Hiking nature trails'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Jose aspires to move from laborer to foreman within the next few years, taking on more responsibility for crew leadership and project planning. He is working toward earning his GED to qualify
    for certification courses in green building and solar panel installation, hoping to specialize in sustainable residential renovations. Long‑term, he dreams of launching a small, community‑focused contracting
    business that offers affordable home‑repair services while providing training opportunities for other under‑served workers. He also wants to dedicate regular time to volunteer with Habitat for Humanity
    and to support local arts initiatives.
