personas:
  professional: Mark Earls, a retired small‑engine mechanic and master woodturner, leverages their meticulous hands‑on expertise in tractor repair and woodworking to keep his family's farm equipment humming
    while preferring solitary, routine‑driven work that lets them avoid the noise of group projects.
  sports: Mark Earls channels their athletic energy into early‑morning fishing on the lake, seasonal deer hunting trips, and supports the New Orleans Saints and Mississippi State Bulldogs, while quietly
    participating in the Quitman Bass Anglers Club, which satisfies their preference for solitary, low‑key competition.
  arts: Mark Earls immerses themselves in classic country legends like Johnny Cash, Merle Haggard, and early rock ’n’ roll icons such as Elvis Presley, letting the twang of the guitar and the steady rhythm
    of bluegrass accompany their evenings on the porch as they sip sweet tea and reflect on Civil War biographies.
  travel: Mark Earls favors low‑key road trips to nearby historic sites like the Vicksburg National Military Park and the blues towns of the Mississippi Delta, while dreaming of a guided tour of Gettysburg,
    but their travel plans stay modest due to limited finances and a desire to keep close to family.
  culinary: Mark Earls enjoys preparing Southern comfort dishes such as fried catfish, buttery cornbread, and slow‑cooked collard greens seasoned with smoked turkey, confidently seasoning their garden tomatoes
    and beans with fresh herbs, though they admit they rarely experiment beyond the familiar family recipes.
  core: Mark Earls is a solitary, routine‑driven craftsman who blends self‑reliant woodworking, frugal budgeting, and a love of classic country into a steadfast, quietly critical approach to life, and they
    rarely stray from their trusted routines.
background:
  cultural: Mark grew up in a traditional, working‑class Southern family in rural Clarke County, Mississippi. His upbringing emphasized self‑reliance, respect for the land, and adherence to Southern Baptist
    values, though his personal disposition leans toward quiet reflection rather than communal worship. He maintains close ties to family gatherings that feature Southern cuisine like fried catfish, cornbread,
    and collard greens, and he respects regional customs such as church socials and community potlucks, attending them primarily to support relatives. His cultural identity is shaped by the modest, practical
    lifestyle of the Deep South, valuing hard work, personal responsibility, and a deep connection to his local community and its history.
attributes:
  skills: '[''Small‑engine repair'', ''Woodworking'', ''Basic electrical troubleshooting'', ''Plumbing repairs'', ''Land and livestock management'', ''DIY home maintenance'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodturning'', ''Model building'', ''Gardening'', ''Reading Civil War history'', ''Listening to classic country music'']'
  career_goals: Although retired from formal employment, Mark is determined to maintain his independence and the integrity of his family property. He aims to expand his vegetable garden into a self‑sustaining
    plot, preserve his workshop for future generations, and create a handwritten guide on maintaining farm equipment for his grandchildren. He also hopes to mentor a local youth interested in hands‑on trades,
    offering one‑on‑one instruction that aligns with his preference for solitude. Ultimately, his ambition is to stay physically active, avoid reliance on assisted living, and ensure his practical knowledge
    is passed down within his family.
