  hobbies: '["landscape sketching", "photography", "folk music listening", "guitar playing", "hiking", "home brewing", "preserving/canning", "reading agriculture literature", "DIY woodworking", "community
    gardening"]'
  career_goals: Nicholas aims to transition from a miscellaneous farm worker to a sustainable farm manager, eventually owning a small specialty organic farm on the outskirts of Greensburg. He plans to enroll
    in extension courses and pursue an associate degree in horticulture to formalize his knowledge. His long‑term ambition includes integrating agritourism and a modest on‑site art gallery that showcases
    local artists and his own photography, creating a community hub for weekend markets and seasonal festivals. He also hopes to diversify income by selling his photographic prints and handcrafted wooden
    items. Achieving these goals is motivated by a desire for greater financial stability, reduced stress, and the ability to shape his work environment on his own terms.
