  hobbies: '[''Metal sculpture'', ''Scale model building'', ''Jewelry making'', ''Reading science-fiction and philosophy'', ''Sketching'', ''Nature walks'', ''Birdwatching'', ''Gardening'', ''Ambient music
    listening'', ''Puzzle solving'']'
  career_goals: Michael aspires to achieve master welder certification and to transition his extensive technical expertise into a full‑time practice as an artistic metal sculptor. He plans to open a modest
    studio on the outskirts of New Port Richey where he can produce and sell abstract metal artworks, mentor apprentices, and eventually exhibit his pieces in regional galleries and craft fairs. Over the
    next five years he also hopes to author a guidebook that merges welding techniques with artistic design, and to secure a small grant from the Florida Arts Council to support his studio’s creation while
    building a financially secure retirement.
