  hobbies: '[''Sketching and watercolor painting'', ''Poetry writing'', ''Speculative fiction reading'', ''Metal sculpture and jewelry making'', ''Hiking and nature walks'', ''Acoustic guitar playing'',
    ''Mindfulness meditation by streams'']'
  career_goals: Gianna aims to achieve master pipefitter certification within the next two years and eventually launch her own eco‑focused plumbing business that combines reliable service with artistic
    pipe installations for community spaces. She hopes to mentor other women and apprentices entering the trades, using her own unconventional path to demonstrate that formal schooling is not the only route
    to expertise. Long‑term, she dreams of designing sustainable water‑circulation systems for local schools and churches that incorporate subtle artistic elements, allowing her to merge technical skill
    with her love of abstract design while maintaining a flexible schedule that supports her emotional well‑being.
