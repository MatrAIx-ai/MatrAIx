  hobbies: '[''Beach Volleyball'', ''Fishing'', ''Running'', ''Youth Soccer Coaching'', ''Photography'', ''Reading True‑Crime Books'', ''Listening to Classic Rock'', ''Community Volunteering'']'
  career_goals: Christopher aspires to advance to a leadership position within the Duval County Sheriff's Office, aiming for the rank of Lieutenant within the next five years. He seeks to leverage his educational
    background to develop and lead a comprehensive community outreach and training program that enhances police‑community relations and improves de‑escalation skills across the department. He also envisions
    establishing a mentorship initiative for at‑risk youth in Atlantic Beach, eventually transitioning to a role as a police academy instructor or a consultant in law‑enforcement training as he approaches
    retirement.
