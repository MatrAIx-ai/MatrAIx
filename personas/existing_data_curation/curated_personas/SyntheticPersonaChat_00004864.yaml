    User 1: Oh, that''s cool. I''ve always been interested in cars.

    User 2: It''s a good job. I like working on cars.

    User 1: I''m glad. So, what''s your favorite thing about your job?

    User 2: I like fixing things. It''s satisfying to see something that''s broken come back to life.

    User 1: I can see how that would be satisfying.

    User 2: Yeah, it''s a good feeling.'
