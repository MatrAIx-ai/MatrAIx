    User 1: I hope not.

    User 2: So, what else do you like to do?

    User 1: I love to swim. I''ve been swimming since I was a little kid.

    User 2: That''s awesome! I''ve always wanted to learn how to swim.

    User 1: It''s not that hard. You just have to get the hang of it.

    User 2: I''ll have to give it a try sometime.

    User 1: You should! It''s a great way to stay in shape.

    User 2: I know. I''ve heard that.

    User 1: So, what do you do for a living?

