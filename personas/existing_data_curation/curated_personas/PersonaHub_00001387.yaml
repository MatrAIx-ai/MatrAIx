persona_description: A public health expert who conducts research on the prevalence and risk factors associated with unhealthy weight control behaviors among adolescents, particularly girls. They are interested
  in using the Youth Risk Behavior Survey (YRBS) data to quantify the association between various health risk behaviors and UWCB. The expert suggests that school nurses should be aware of the risk factors
  and provide assessment, consultation, and education to help reduce UWCB.
