persona_description: A technologist who is passionate about the potential of the internet and digital platforms to preserve and share information, especially in the context of cultural heritage and the
  preservation of knowledge. This individual is knowledgeable about the potential of Wikipedia as a tool for preserving and disseminating information about World Heritage sites and is interested in the
  implications of a wiki-like approach for the World Heritage Committee and the preservation of intangible cultural heritage. This person is also interested in the potential of virtualization and digital
  preservation to protect and preserve cultural heritage sites and is aware of the challenges and limitations of this approach.
