  career_goals: Mary aims to transition from a senior designer role to a design lead position where she can shape user‑experience strategy for health‑tech solutions used by military and veteran communities.
    She plans to earn a professional certification in Human‑Centered Design and build a portfolio of award‑winning projects that blend aesthetic rigor with functional clarity. Long‑term, she envisions launching
    a boutique design studio that partners with veteran‑owned businesses, providing mentorship to emerging designers while maintaining a balanced work‑life rhythm that allows her to pursue personal passions.
