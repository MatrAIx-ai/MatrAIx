personas:
  professional: Judith Woody is a 14‑year‑old aspiring digital content creator who combines quick wit and scientific curiosity to produce short TikTok videos that explain quirky experiments while navigating
    the chaos of middle‑school schedules, and they love to share their findings with friends.
  sports: Judith Woody thrives as a midfielder on the school’s soccer team, idolizes the Kansas City Current and follows the Kansas City Chiefs for extra competitive inspiration, while they also join a
    local youth soccer club that meets after school for extra drills.
  arts: Judith Woody immerses themselves in the Kansas City music crawl, frequently streaming live sets by local jazz ensembles, blasting Billie Eilish’s latest album while editing TikTok sketches, and
    cites actors like Millie Bobby Brown as inspiration for dramatic flair.
  travel: Judith Woody loves spontaneous weekend road trips to the St. Louis Gateway Arch and the Ozark National Forest, prefers budget‑friendly rides with friends over meticulously planned itineraries,
    and they dream of a future trip to Japan’s anime districts after finishing high school.
  culinary: Judith Woody favors Kansas City’s signature burnt‑end barbecue, loves crafting homemade nachos with jalapeños and queso, attempts simple science‑themed recipes like volcano cupcakes, yet they
    often rely on fast‑food pizza when a school project runs late.
  core: Judith Woody is a witty, curiosity‑driven teen who balances impromptu TikTok fame with a laid‑back streak, competitive soccer hustle, and a habit of splurging on gadgets while forgetting to file
    homework on time, and they constantly seek the next viral moment.
background:
  cultural: Judith comes from a white, middle‑class family rooted in the Midwestern suburb of Kansas City, Missouri. Her upbringing reflects typical Midwestern values—friendliness, self‑reliance, and a
    strong community ethic—while also exposing her to the city’s rich cultural mix of jazz, barbecue, and sports fandom. She attends a public middle school that emphasizes both academic achievement and
    extracurricular involvement, and her family participates in local traditions such as county fairs and community service events, giving her a grounded yet open‑minded view of her regional heritage.
