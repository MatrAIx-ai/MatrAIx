  career_goals: Judith envisions a future where she leverages her communication flair and analytical mindset to become a journalist or digital‑media influencer, focusing on investigative stories and content
    that captivates a broad audience. She aims to win national debate competitions and earn scholarships that support her media ambitions. Long‑term, she aspires to lead a media or public‑relations agency,
    crafting campaigns that blend creativity with data‑driven decisions, and she also dreams of serving as a student‑council president and eventually a civic leader who can champion youth voices in her
    community.
