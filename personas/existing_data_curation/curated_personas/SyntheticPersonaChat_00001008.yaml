    User 1: Me too! I love watching movies. What are some of your favorite movies?

    User 2: I love the Blues Brothers, Pulp Fiction, and The Big Lebowski.

    User 1: Oh, those are all great movies! I love the Blues Brothers too.

    User 2: Me too! It''s such a classic.

    User 1: What are some of your favorite books?

    User 2: I love The Lord of the Rings, The Hitchhiker''s Guide to the Galaxy, and The Catcher in the Rye.

    User 1: Oh, those are all great books! I love The Lord of the Rings too.

    User 2: Me too! It''s such a great fantasy series.

    User 1: What kind of music do you like to listen to?

    User 2: I like listening to blues music, jazz, and rock and roll.

    User 1: Oh, those are all great genres! I love listening to blues music too.

    User 2: Me too! It''s such a soulful genre.

    User 1: What are some of your favorite blues artists?

    User 2: I love B.B. King, Muddy Waters, and Howlin'' Wolf.

    User 1: Oh, those are all great artists! I love B.B. King too.

    User 2: Me too! He''s such a legend.

    User 1: What are some of your favorite jazz artists?

    User 2: I love John Coltrane, Miles Davis, and Ella Fitzgerald.

    User 1: Oh, those are all great artists! I love John Coltrane too.

    User 2: Me too! He''s one of the greatest jazz musicians of all time.'
