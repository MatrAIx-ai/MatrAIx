persona_description: Sally Ride was an American physicist and astronaut who was born in 1951 in California, U.S. She was interested in science and tennis as a child and read a newspaper advertisement about
  NASA's space program when she was 17. She was selected for NASA's astronaut program in 1978 and became the first American woman in space aboard the space shuttle Challenger in 1983. She later served on
  the Rogers Commission Report and founded her own company, Sally Ride Science, to create entertaining science programs and publications. She won many awards for her contributions to the field of science
  and space exploration and died in 2012 at the age of 61 from pancreatic cancer.
