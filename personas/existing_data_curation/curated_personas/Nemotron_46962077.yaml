personas:
  professional: Paulette Perezrodriguez, a 40‑year‑old veteran bartender with 15 years in high‑volume venues, they combine bilingual fluency, a strict routine, and a competitive mindset to deliver precise
    cocktails while meticulously managing inventory and training staff toward a bar‑manager promotion.
  sports: Paulette Perezrodriguez, an early‑morning jogger at Riverside Park, they also play in a small‑group adult soccer league and loyally follow the Jacksonville Jumbo Shrimp and the Florida Gators,
    blending a competitive spirit with a low‑key, routine‑driven fitness regimen.
  arts: Paulette Perezrodriguez, an avid reader of Jane Austen and Tana French, they immerse themselves in Violeta Parra’s folk melodies and contemporary jazz at local venues, regularly attending Jacksonville
    Shakespeare Company productions and community dance nights where they share their love of music and movement.
  travel: Paulette Perezrodriguez, a meticulous planner, they have trekked through Valparaíso and explored Mendoza’s vineyards, and now they dream of a weekend retreat to Napa Valley’s wine country while
    balancing travel costs within family responsibilities.
  culinary: Paulette Perezrodriguez, a seasoned home cook, they routinely prepare empanadas and pastel de choclo using fresh basil, cilantro, and oregano from their indoor herb garden, delighting in creative
    twists like smoked paprika or mango salsa, and they craft signature pisco‑based cocktails to accompany each meal.
  core: Paulette Perezrodriguez is a disciplined, routine‑oriented bartender who channels their competitive drive and anxiety into meticulous cocktail craft, punctuated by solitary reading, herb‑infused
    cooking experiments, and a tendency to overspend on rare spirits.
background:
  cultural: Paulette grew up in a Chilean immigrant household, where Spanish was spoken at home and family gatherings centered around shared meals, music, and storytelling. Her parents emphasized humility,
    hard work, and maintaining cultural traditions, such as celebrating Chilean national holidays and preparing cuisine from southern Chile. The bicultural experience of preserving her heritage while adapting
    to life in Florida shapes her values of practicality, community, and hospitality, which she brings to both her work and personal life.
