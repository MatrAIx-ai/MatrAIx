  career_goals: Paulette aims to advance to a bar manager position within the next two years, leveraging her organizational strengths to streamline operations and staff training. She also dreams of eventually
    opening a small, family‑run bar that showcases Chilean culinary and beverage traditions to the Jacksonville community. In the interim, she seeks to compete in regional mixology contests to refine her
    craft and gain recognition.
