personas:
  professional: Oral Miller is a diligent high school junior who channels their love of order and hands‑on problem solving into coordinating schedules for a community garden, handling inventory for a local
    bike‑shop volunteer program, and shadowing a technician at a nearby auto repair, all while planning a future trade‑school career in automotive service technology.
  sports: Oral Miller rides a mountain bike with the Ogden Trail Blazers club on weekend loops, hikes the Wasatch foothills for cardio, follows the Utah Jazz and BYU Cougars for basketball inspiration,
    and maintains a disciplined workout schedule that includes twice‑weekly body‑weight circuits to stay fit for future trade work.
  arts: Oral Miller strums an acoustic guitar in the style of John Denver and The Avett Brothers during quiet evenings, curates a modest collection of folk vinyl, builds intricate aircraft model kits for
    the satisfaction of precise detail, and occasionally codes simple Scratch animations inspired by classic Pixar shorts, finding creative release in solitary, methodical projects.
  travel: Oral Miller prefers meticulously planned road trips, having mapped a weekend getaway to Antelope Island and a multi‑day hike through Zion National Park using a spreadsheet itinerary, while dreaming
    of a future solo cross‑country drive to the Pacific Northwest to photograph mountain ranges, all balanced against a limited teen budget and school commitments.
  culinary: Oral Miller enjoys preparing wholesome meals such as huckleberry pancakes for breakfast, baked salmon with quinoa and roasted vegetables for dinner, and a custom trail mix of dried apricots,
    almonds, and dark chocolate for on‑the‑go snacks, cooking with a methodical step‑by‑step approach that mirrors their model‑building precision, though they sometimes skip meals when absorbed in a new
    LEGO set.
  core: Oral Miller is a 16‑year‑old organizer‑obsessed teen who balances quiet hobbies, community service, and lingering anxiety with a steadfast commitment to structured routines and modest, goal‑driven
    living.
background:
  cultural: Oral grew up in Ogden, Utah, within a predominantly white, middle‑class community that blends traditional Intermountain West values with a strong emphasis on community service and self‑reliance.
    His family’s background includes generations of small‑business owners and outdoor enthusiasts, fostering an appreciation for practical work, modest living, and volunteerism. The local culture—characterized
    by a respect for routine, a modest conservative outlook, and opportunities for outdoor recreation—shapes his preference for structure, his cooperative nature, and his desire to contribute quietly and
    reliably to his surroundings.
