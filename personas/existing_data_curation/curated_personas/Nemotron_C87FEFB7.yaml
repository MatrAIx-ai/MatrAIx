    volunteering'']'
  career_goals: Oral aims to complete his high school education—either by earning a diploma or a GED—and then enroll in a technical trade program, such as automotive service technology or HVAC certification,
    to secure a stable, structured career. He is motivated to work in a role that offers predictable routines and clear responsibilities, like a logistics coordinator or project assistant at a local company.
    Long‑term, he hopes to combine his organizational talents with a community‑focused position, perhaps managing youth outreach programs or serving as a liaison for neighborhood improvement projects, allowing
    him to apply his planning skills while contributing to a harmonious environment.
