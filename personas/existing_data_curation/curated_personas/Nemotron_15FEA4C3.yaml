  hobbies: '[''Cooking family recipes'', ''Senior garden club participation'', ''Playing Mahjong'', ''Attending cultural festivals'', ''Volunteer tutoring in Mandarin'', ''Reading historical novels'', ''Practicing
    Tai Chi'', ''Walking in local parks'']'
  career_goals: Although officially retired, Jiayun is motivated to deepen her impact on the Fresno community. She aims to become a senior liaison for the local Asian cultural center, helping to design
    programs that bridge generations. She aspires to document and publish a family cookbook that preserves her heritage recipes while integrating modern health insights. Additionally, she seeks to mentor
    younger volunteers in event planning and cultural advocacy, and to advocate for better access to health and social services for older adults in her county.
