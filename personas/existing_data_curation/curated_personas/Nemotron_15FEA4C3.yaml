personas:
  professional: Jiayun Zheng, a retired community organizer turned senior liaison at the local cultural center, leverages her expertise in event coordination, budgeting, and bilingual communication to design
    intergenerational programs that celebrate tradition while embracing modern health insights.
  sports: Jiayun Zheng enjoys low‑impact fitness through morning Tai Chi in the park, regular walks along the Fresno River Trail, cheers on the Fresno State Bulldogs and the Fresno Grizzlies, and participates
    in a senior badminton club at the local recreation center.
  arts: Jiayun Zheng spends evenings immersed in historical novels such as Ken Follett's Pillars of the Earth, attends productions by the Fresno Playhouse featuring recorded screenings of actors like Meryl
    Streep, and delights in traditional instrumental performances by virtuoso violinist Hilary Hahn during cultural festivals, allowing the arts to enrich her sense of identity.
  travel: Jiayun Zheng prefers carefully planned road trips, having explored Yosemite National Park, the vineyards of Napa Valley, and the coastal town of Monterey, while dreaming of a future visit to her
    ancestral hometown abroad to reconnect with her family's roots.
  culinary: Jiayun Zheng crafts health‑focused renditions of heritage dishes such as steamed fish with ginger‑scallion sauce, low‑sodium pork dumplings, and stir‑fried bok choy with shiitake mushrooms,
    skillfully balancing flavors with ingredients like garlic, sesame oil, tofu, and jasmine rice, and delights in sharing these creations at community potlucks.
  core: Jiayun Zheng is a socially vibrant, detail‑oriented senior who intertwines cultural stewardship, health‑conscious cooking, and a restless curiosity, all tempered by a habit of worry that fuels meticulous
    planning.
background:
  cultural: Jiayun is a second‑generation Chinese‑American whose parents immigrated from Zhejiang province in the 1950s. Raised in Fresno’s vibrant multicultural environment, she grew up celebrating both
    traditional Lunar New Year rituals and American holidays, giving her a bicultural perspective. Her family maintains strong ties to Chinese language, cuisine, and values such as respect for elders and
    community harmony, while also embracing Californian openness and volunteerism. This blended heritage shapes her identity, informing her cooking, language skills, and dedication to fostering cross‑cultural
    understanding among diverse community members.
