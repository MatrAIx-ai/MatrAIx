  hobbies: '["Hiking", "Nature Photography", "Science Fiction Reading", "Indie Video Gaming", "Coding Puzzles", "Cooking Honduran Cuisine", "Yoga", "Board Games", "Community Tech Volunteering"]'
  career_goals: Marisol aims to transition into a technical leadership role within the next three years, aspiring to become a lead developer or solutions architect who guides small, agile teams toward delivering
    high‑impact products. She is pursuing AWS Solutions Architect and Certified Scrum Master certifications to bolster her credibility. Her long‑term ambition is to launch a consultancy that creates affordable,
    culturally relevant tech solutions for Hispanic small businesses in the Bay Area and Central California. She also hopes to mentor junior developers from underrepresented backgrounds, combining her competitive
    drive with a desire to give back to the community while maintaining a stable work‑life balance for her family.
