persona_description: Lisa Dion is a psychologist and educator who specializes in the development of cognitive behavioral play therapy techniques for children and teens struggling with emotional dysregulation.
  She is known for her work in the field of neuroscience and interpersonal neurobiology, and her expertise in the Gross Model of Emotion Regulation. Lisa is also an advocate for the use of antecedent focused
  and response focused activities in therapy, and her work has been featured in various publications. She is a highly respected figure in the field of play therapy, and her contributions to the field have
  been recognized with numerous awards and honors.
