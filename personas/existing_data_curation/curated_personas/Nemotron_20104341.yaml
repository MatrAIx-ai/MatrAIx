  hobbies: '[''Adult soccer league'', ''Ice hockey games'', ''Fishing on the Fox River'', ''DIY woodworking'', ''Grilling and barbecuing'', ''Volunteering for community clean-ups'', ''Attending local classic
    rock concerts'', ''Reading home-improvement guides'', ''Camping and hiking trips'']'
  career_goals: Steven aims to progress to a crew foreman role within the next few years, pursuing an OSHA 30‑hour certification and a state‑issued construction supervisor license. He also envisions eventually
    launching his own small‑scale residential remodeling business that would allow him to schedule work around his family while maintaining the collaborative, hands‑on environment he enjoys. In the longer
    term, he hopes to mentor younger workers and contribute to community building projects in Oshkosh.
