personas:
  professional: Steven Ledoux, a 33‑year‑old construction specialist with hands‑on expertise in framing, drywall, concrete finishing, and basic electrical and plumbing, leverages their calm, cooperative
    demeanor and strong spatial awareness to keep crew activities structured yet flexible, while casually navigating paperwork disorganization as they work toward a foreman position and ultimately their
    own remodeling business.
  sports: Steven Ledoux, a forward on the Fox River FC adult soccer league, a regular participant in weekend ice‑hockey games at the Oshkosh Ice Center, and an avid fisherman on the Fox River, cheers for
    the Milwaukee Bucks, Green Bay Packers, and Chicago Blackhawks while maintaining memberships with the local recreational sports club.
  arts: Steven Ledoux, a classic‑rock aficionado who devours live shows at the Miller Community Center featuring The Rolling Stones, Led Zeppelin tributes, and AC/DC covers, frequently spins vinyl collections
    of Stevie Ray Vaughan and Lynyrd Skynyrd, and occasionally dabbles on a rented electric guitar during jam sessions.
  travel: Steven Ledoux, who prefers spontaneous road trips over rigid itineraries, has explored Door County, the Upper Peninsula of Michigan, and Lake Geneva, and dreams of a summer fishing expedition
    to the Pacific Northwest while balancing their travel plans around family commitments and modest vacation savings.
  culinary: Steven Ledoux, a grill‑master at neighborhood potlucks, delights in searing river‑caught trout with lemon‑dill butter, smoking bratwurst on mesquite chips using a homemade rub of paprika, brown
    sugar, and garlic, and occasionally overcooks due to lingering conversations, yet proudly serves their friends with hearty side dishes like roasted corn and baked beans.
  core: Steven Ledoux, a calm yet flexible 33‑year‑old builder, blends leadership on construction sites with community soccer, woodworking, and a perpetual grill, all while navigating life with a laid‑back
    but organized spirit.
background:
  cultural: Steven was raised in Oshkosh, Wisconsin, in a middle‑class family with deep Midwestern roots. His surname reflects French‑Canadian ancestry, and his upbringing blended traditional Catholic values
    with the region’s Protestant‑influenced work ethic. He grew up celebrating local traditions such as the Oshkosh AirVenture and the county fair, participating in community service through his church
    and school. The culture of the Upper Midwest shaped his practical outlook, friendly demeanor, and strong emphasis on teamwork, self‑reliance, and contributing to the well‑being of his neighbors.
attributes:
