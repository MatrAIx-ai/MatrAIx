  career_goals: She aims to study visual arts or graphic design in college, with a long‑term ambition to become a freelance illustrator/graphic novelist or a creative director for a socially‑focused media
    studio. She also dreams of using her artistic talents to support mental‑health initiatives, perhaps designing therapeutic art programs for teens. She seeks a career that balances creative freedom with
    community impact, allowing her to collaborate with diverse teams while maintaining a flexible schedule that reduces stress.
