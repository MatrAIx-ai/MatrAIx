personas:
  professional: Doris Monroe, an aspiring nursing student and budding digital content creator, blends compassionate care with a knack for quick TikTok videos, yet they often rely on last‑minute cramming
    and spontaneous project sketches, balancing their practical ambition with a laid‑back planning style.
  sports: Doris Monroe spends weekends shooting hoops at the Maumee River park with neighborhood kids; they root for the local Mud Hens baseball team and the Toledo Rockets football squad, and occasionally
    jog along the river trail, favoring flexible, community‑oriented fitness over regimented training.
  arts: Doris Monroe channels creative energy into watercolor doodles and mixed‑media sketches while curating R&B playlists featuring H.E.R., SZA, Kendrick Lamar, and local spoken‑word poet Rashad H., they
    often post short performance clips on TikTok, reflecting an artistic soul rooted in contemporary music and community storytelling.
  travel: Doris Monroe dreams of a coastal getaway to New Orleans for jazz and gumbo, they have already taken a weekend road trip to Chicago’s museum district and a spring‑break visit to Orlando’s theme
    parks, and they prefer spontaneous, budget‑friendly adventures over meticulously planned itineraries, though family responsibilities sometimes limit travel scope.
  culinary: Doris Monroe loves baking sweet potato pie and peach cobbler, experiments with fragrant cinnamon‑spiced rolls using brown butter, and enjoys cooking collard greens seasoned with smoked turkey,
    they often share these soul‑food creations at family gatherings while occasionally ordering fast‑food tacos for quick comfort.
  core: Doris Monroe, balancing a compassionate drive toward nursing, an impulsive flair for TikTok content, mild anxiety, and a love for soulful desserts, they navigate life with relaxed organization,
    occasional worry, and a steadfast commitment to community.
background:
  cultural: Doris comes from an African‑American family rooted in Toledo’s vibrant Black community. Her upbringing includes regular attendance at a historically Black Baptist church, where gospel music,
    community service, and family reunions play central roles. She celebrates cultural traditions such as Juneteenth, Kwanzaa, and family cookouts featuring dishes like collard greens and fried chicken.
    Her family’s history in the industrial Midwest provides her with a strong sense of resilience and solidarity, and she often draws inspiration from local Black artists, spoken‑word poets, and community
    leaders. This cultural foundation informs her values of cooperation, assertiveness when advocating for herself, and an acute awareness of social inequalities, which fuels her interest in health‑related
    careers.
attributes:
  skills: '["Basic computer literacy (Microsoft Office, Google Workspace)", "Social media content creation (TikTok, Instagram)", "Youth mentorship and event assistance", "Basic first aid and CPR knowledge",
    "Baking and simple cooking", "Effective interpersonal communication"]'
  hobbies: '["Listening to R&B and hip‑hop music", "Sketching and watercolor art", "Playing basketball and walking in local parks", "Creating and viewing TikTok content", "Baking and cooking soul food desserts",
    "Volunteering at church youth group"]'
  career_goals: Doris aspires to pursue a career that blends her compassionate nature with a stable income. She is interested in attending a community college to study nursing or allied health, aiming to
    become a registered nurse who can support her community. At the same time, she is curious about digital media and hopes to develop a side hustle creating content for local businesses. She wants to finish
    high school with good grades, secure a scholarship, and later work toward a bachelor's degree while maintaining flexibility to care for her family. She also dreams of eventually opening a small bakery-café
    that can serve as a community gathering spot.
