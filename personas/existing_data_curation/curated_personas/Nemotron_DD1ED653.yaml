personas:
  professional: Bradley Weston is a meticulous aspiring graphic designer who leverages their Adobe Photoshop and Canva skills to craft polished visual campaigns for local non‑profits, while their strong
    organizational abilities ensure every volunteer event runs like clockwork, and their curiosity drives them to merge art with psychology in future therapeutic work.
  sports: Bradley Weston enjoys solo weekend hikes on the foothills surrounding Lake Cunningham and occasional kayaking on the lake, occasionally cheering on the Carolina Panthers on game nights and supporting
    the Greenville Drive, while they balance these low‑impact activities with a membership in the local Trails and Tides outdoor club that keeps them accountable to regular cardio.
  arts: Bradley Weston channels their love for visual storytelling by painting acrylics inspired by the bold colors of Georgia O’Keeffe, photographing misty lakescapes in the style of Ansel Adams, strumming
    acoustic renditions of Sufjan Stevens while penning original lyrics, and regularly attending open‑mic nights featuring up‑and‑coming singer‑songwriters and indie film screenings of Greta Gerwig’s works,
    which together shape their eclectic artistic identity.
  travel: Bradley Weston prefers meticulously planned weekend getaways that blend hiking in the Blue Ridge Mountains of Asheville and cultural immersion in Charleston’s historic districts, while they dream
    of an extended art retreat in Taos, New Mexico, and a future solo trip to Florence to study Renaissance frescoes, balancing modest budgets with a desire for both adventure and reflective solitude.
  culinary: Bradley Weston enjoys experimenting with Southern‑influenced dishes such as shrimp‑and‑grits with a bourbon‑infused glaze, collard greens seasoned with smoked paprika, and homemade peach cobbler,
    often improvising with fresh herbs from the community garden while they occasionally over‑salt their sauces in the pursuit of bold flavor.
  core: Bradley Weston is a creatively driven, hyper‑organized 21‑year‑old whose relentless curiosity fuels a blend of art, volunteerism, and self‑reflection, even as they wrestle with anxiety and a penchant
    for occasional indulgent splurges.
background:
  cultural: Bradley grew up in Greer, South Carolina, immersed in a predominantly white, Southern community that emphasizes hospitality, family, and church involvement. He was raised with traditional Southern
    values—respect for personal responsibility, a strong work ethic, and a love for community gatherings such as high‑school football games and neighborhood barbecues. The region's natural beauty, from
    the Blue Ridge foothills to local lakes, shaped his appreciation for outdoor recreation. While maintaining these roots, he has also been exposed to the growing cultural diversity and technological influences
    of the Upstate, which fuels his curiosity about new ideas and experiences. His cultural upbringing blends modesty and neighborliness with a desire to explore beyond the familiar.
attributes:
  skills: '[''Organizational & time‑management'', ''Microsoft Office & Google Workspace'', ''Basic graphic design (Adobe Photoshop, Canva)'', ''Digital photography & editing'', ''Art history knowledge'',
    ''Team collaboration & assertive communication'', ''Volunteer coordination'', ''DIY woodworking'', ''Reflective journaling & creative writing'', ''Social media content creation'']'
  hobbies: '[''Sketching and acrylic painting'', ''Digital photography (nature and urban)'', ''Acoustic guitar and songwriting'', ''Reading contemporary fiction, philosophy, self‑help'', ''Hiking and outdoor
    exploration'', ''Volunteering at animal shelter'', ''Attending open‑mic nights and indie film screenings'', ''Cooking Southern‑inspired meals'']'
  career_goals: Bradley aims to enroll in a community‑college associate program in graphic design to deepen his visual communication skills while working part‑time to gain financial independence. Over the
    next five years he hopes to build a freelance portfolio focused on non‑profit and community art projects, leveraging his organizational strengths to manage campaigns and events. Ultimately, he aspires
    to pursue a bachelor's degree in psychology and become a certified art therapist, blending his love of art with a desire to help others navigate anxiety and emotional distress. He also plans to develop
    leadership roles in local arts nonprofits, fostering inclusive creative spaces in his hometown.
