personas:
  professional: Maria Lozada, a veteran facilities manager with 25 years of experience on the Gulf Coast, leverages meticulous budgeting, lean maintenance planning and a curiosity for IoT smart‑building
    sensors while weaving aesthetic, culturally resonant details into industrial spaces, aiming for a regional director role and green‑building leadership.
  sports: Maria Lozada follows the Houston Astros in baseball, the San Antonio Spurs in basketball, and the Houston Texans in football, participates in morning beach‑side walks with the Corpus Christi Coastal
    Walkers, and occasionally joins a mixed‑age softball league at the local community center.
  arts: Maria Lozada attends gallery openings that showcase works by Georgia O'Keeffe, James Turrell, and local artisans, finds inspiration in the poetry of Maya Angelou and the piano compositions of Ludovico
    Einaudi, and often incorporates the subtle color palettes and spatial rhythms she observes into her own home décor and workplace design projects.
  travel: Maria Lozada prefers meticulously planned cultural getaways that blend museum tours with quiet coastal retreats; they have explored the historic districts of Santa Fe, New Mexico and the art‑laden
    streets of Barcelona, Spain, and they aim to discover the seaside villages of Portugal’s Algarve next year, balancing careful budgeting with a desire for immersive local experiences.
  culinary: Maria Lozada enjoys cooking complex dishes such as mole sauce, hand‑rolled tamales, and fresh salsas, often using heirloom chilies, roasted corn, dark chocolate, and local herbs like cilantro
    and epazote, treating each meal as a creative project, though they occasionally indulge in spontaneous orders of upscale sushi to break the routine.
  core: Maria Lozada blends meticulous organization with a deep love for visual arts, using yoga and journaling to soothe a constant worry that fuels both disciplined work performance and occasional impulsive
    art‑spending.
background:
  cultural: Maria grew up in a Mexican‑American household in the Rio Grande Valley before moving to Corpus Christi for college. She is bilingual in Spanish and English and maintains close ties with extended
    family on both sides of the border. Her identity blends traditional Mexican customs—such as Día de los Muertos altars, quinceañera celebrations, and regional cuisine—with the coastal Texan lifestyle.
    Maria actively participates in local Hispanic community organizations, celebrates Charro Days and Fiestas Patrias, and values the communal spirit of family gatherings. Her Mexican heritage influences
    her aesthetic preferences, favoring vibrant colors, folk motifs, and warm hospitality in both personal spaces and the environments she manages professionally.
attributes:
  skills: '[''Facilities Management'', ''Maintenance Planning & Scheduling'', ''Budgeting & Cost Control'', ''Vendor & Contract Negotiation'', ''HVAC, Electrical, Plumbing Systems Knowledge'', ''Energy
