    ''Project Management'', ''Team Leadership & Coaching'', ''Documentation & Record‑Keeping'', ''Integration of Art and Aesthetics in Facility Design'']'
  hobbies: '[''Visiting art museums and galleries'', ''Collecting Mexican folk art'', ''Cooking traditional Mexican cuisine'', ''Reading historical fiction and poetry'', ''Small‑group book club'', ''Yoga
    and mindfulness meditation'', ''Journaling'', ''Gardening (vegetable & herb garden)'', ''Coastal walking and birdwatching'', ''Volunteering for community cultural events'']'
  career_goals: Maria aims to advance to a Regional Facilities Director role overseeing multiple sites across Texas and the Gulf region. She plans to earn the Certified Facility Manager (CFM) credential
    and become a LEED Accredited Professional to champion green building certifications. Her ambition includes leading a company‑wide sustainability program that cuts overall carbon emissions by at least
    25% in five years. She also intends to complete her bachelor's degree in Business Administration, mentor emerging Mexican‑American women in facilities management, and cultivate a workplace culture that
    prioritizes employee wellbeing to mitigate stress and burnout.
