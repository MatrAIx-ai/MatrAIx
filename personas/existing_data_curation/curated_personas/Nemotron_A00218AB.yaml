    and De‑escalation'']'
  hobbies: '[''Listening to R&B, Hip Hop, and Jazz'',''Urban Photography'',''Strategy Video Gaming'',''Kayaking'',''Hiking'',''Cooking Soul Food'',''Attending Live Music Events'',''Reading Speculative Fiction
    and Social Psychology'',''Community Volunteering'']'
  career_goals: Lynette aims to advance to a shift supervisor role within the next three to five years, obtaining certifications such as the National Academy of Dispatch and completing a bachelor's degree
    in Emergency Management. She envisions a future as an Emergency Management Coordinator for Sioux Falls, where she can shape community response plans, improve dispatch efficiency through technology upgrades,
    and mentor new telecommunicators. Her long‑term ambition includes developing outreach programs that bridge first‑responder services with underserved neighborhoods, leveraging her competitive drive to
    become a recognized leader in public safety communications.
