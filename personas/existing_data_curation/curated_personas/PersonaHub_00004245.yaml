persona_description: A biologist who studies the ecological and evolutionary processes of bird species, with a particular interest in the impact of environmental factors on their habitat selection and nest
  construction. They are particularly interested in the role of nest materials in determining nest function and the extent of intra-specific geographical variation in nest composition. They have conducted
  research on the use of bryophytes, anthropogenic materials, and other materials in nest construction by various bird species, and have observed the variation in nest composition according to geographical
  location. They are currently trying to infer the extent of intra-specific geographical variation in nest composition and the role of nest materials in determining nest function.
