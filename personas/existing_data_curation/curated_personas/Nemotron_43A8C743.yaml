personas:
  professional: Kenneth Carroll, a master carpenter with 35+ years in residential and commercial construction, blends meticulous blueprint planning and calm crew leadership to launch a community‑focused
    contracting firm that emphasizes historic restoration, apprenticeship mentorship, and high‑quality custom homes; they apply the same structured precision to every project.
  sports: Kenneth Carroll spends his Saturdays fishing on Lake Gaston with hand‑crafted rods, joins a weekly bowling league at the local alley, and roots for the Carolina Panthers and Charlotte Hornets
    while they also enjoy occasional pickup softball with the church group.
  arts: Kenneth Carroll entertains community gatherings with acoustic renditions of songs by John Denver and Bob Dylan, enjoys board‑game nights featuring Settlers of Catan, and appreciates the craftsmanship
    of folk artists like Gillian Welch, all while they occasionally hum while sanding wood.
  travel: Kenneth Carroll prefers relaxed road trips that blend fishing excursions to the Outer Banks with scenic drives through the Blue Ridge Mountains, and they have a lingering wish to explore the historic
    fishing villages of Nova Scotia while keeping travel costs within their modest retirement budget.
  culinary: Kenneth Carroll favors Southern comfort food—grilled catfish with lemon‑pepper rub, fried green tomatoes, and a garden salad of heirloom tomatoes and fresh basil—cooking at a moderate skill
    level and they often pair meals with a locally brewed amber ale.
  core: Kenneth Carroll is a calm, competitive carpenter who transforms reclaimed wood into art, leads community projects with a talkative flair, and never misses a board‑game night, even if it means staying
    up past their bedtime, which they consider a small price for staying connected.
background:
  cultural: Kenneth grew up in a traditional Southern white family that has lived in the coastal plain of eastern North Carolina for generations. His upbringing emphasized self‑reliance, hard work, and
    Southern hospitality, values that still shape his interactions and business ethics. He was raised Baptist, which fosters his involvement in church‑based community service. The region’s deep appreciation
    for craftsmanship and preservation of historic farmhouses influences his dedication to quality woodworking and historic restoration. Though never married, his strong ties to family, church, and local
    networks provide a sense of belonging and support.
attributes:
  skills: '[''Structural framing'', ''Custom cabinetry'', ''Finish carpentry'', ''Furniture making'', ''North Carolina building code compliance'', ''Project scheduling'', ''Cost estimation'', ''Apprentice
