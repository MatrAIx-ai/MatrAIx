  hobbies: '[''Fishing on Lake Gaston'', ''Hand‑crafted furniture making'', ''Acoustic guitar playing at community events'', ''Habitat for Humanity volunteering'', ''Weekly bowling league'', ''Vegetable
    gardening'', ''Hosting board‑game nights'', ''Participating in local music festivals'']'
  career_goals: Kenneth aims to transition from full‑time job sites to establishing a small, community‑focused contracting firm that specializes in high‑quality custom homes and historic restoration projects
    in Martin County. He plans to formalize a mentorship program for young carpenters, leveraging his sociable nature to build a supportive network. Over the next five years he hopes to win a regional woodworking
    competition, expand his workshop to offer weekend classes, and eventually secure a partnership with the local community college to teach a short‑term carpentry course. While looking toward semi‑retirement,
    he intends to stay actively involved in projects that preserve the region’s architectural heritage.
