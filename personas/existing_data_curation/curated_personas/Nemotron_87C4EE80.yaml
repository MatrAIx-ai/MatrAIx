  hobbies: '["Hiking and trail walking in the Blue Ridge Mountains", "Herb and vegetable gardening", "Reading (science‑fiction and historical novels)", "DIY home‑improvement projects", "Wine and craft‑beer
    tasting with spouse", "Mentoring youth STEM programs", "Cooking and recipe experimentation", "Listening to Appalachian folk and indie music", "Board‑game nights with friends"]'
  career_goals: Miriam aims to move into a regional sales management role within the next three years, where she can lead a team of reps, mentor junior colleagues, and drive revenue growth for manufacturing
    clients by integrating emerging technologies into the sales process. She is interested in bridging the gap between sales and product development, potentially taking on a product‑liaison position that
    utilizes her technical background. Long‑term, she envisions launching her own consultancy that helps mid‑size manufacturers refine their go‑to‑market strategies while maintaining a flexible schedule
    that supports her family life.
