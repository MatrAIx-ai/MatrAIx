  career_goals: Marcelino aims to transition from a contract carpenter to the owner of a small, family‑run woodworking workshop that specializes in high‑quality, custom furniture and heritage‑style restorations.
    Over the next five years he plans to obtain his Master Carpenter certification, expand his client network beyond Mason County, and establish an apprenticeship program to pass on his skills to younger
    tradespeople. He also hopes to secure a stable retirement by building a modest portfolio of rental properties funded through his business profits.
