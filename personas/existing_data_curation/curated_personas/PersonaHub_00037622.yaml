persona_description: A microbiologist or immunologist who specializes in the study of tuberculosis and its mechanisms of progression. They are interested in understanding how the bacteria Mycobacterium
  tuberculosis hijack host metabolism to drive the progression of the disease, and how this process can be targeted for the development of innovative strategies for treating the disease. They are likely
  to be familiar with the work of Professor David Russell and his team at Cornell University, as well as the broader field of tuberculosis research.
