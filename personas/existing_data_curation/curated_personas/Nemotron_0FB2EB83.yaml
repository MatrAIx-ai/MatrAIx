personas:
  professional: Tyler Overman, a 15‑year‑old aspiring mechanical engineer from Shepherdsville, channels a meticulous, solitary work ethic into building scale wooden models, coding Python scripts, and dissecting
    engineering manuals, treating each project like a chess opening—planned several moves ahead and executed under strict personal timelines.
  sports: Tyler Overman, a 15‑year‑old from Shepherdsville, follows the Louisville Cardinals men’s basketball team and the Indianapolis Colts, occasionally joining a local winter treadmill club for solitary
    cardio, but prefers early‑morning runs to keep the discipline needed for their model‑building schedule.
  arts: Tyler Overman, a 15‑year‑old from Shepherdsville, curates a focused artistic palate, listening to the intricate compositions of Johann Sebastian Bach and Hans Zimmer while sketching blueprint‑style
    drawings of aircraft, watching Christopher Nolan’s meticulously plotted films, and collecting limited‑edition model‑train boxes for their precise aesthetic appeal.
  travel: Tyler Overman, a 15‑year‑old from Shepherdsville, plans trips with the same rigor as a programming project, favoring structured itineraries to destinations like the Kennedy Space Center in Florida,
    the historic streets of Boston for colonial architecture, and a weekend road‑trip to Mammoth Cave, always booking accommodations and transport months in advance to avoid surprise variables.
  culinary: Tyler Overman, a 15‑year‑old from Shepherdsville, structures their culinary routine around precise, repeatable meals such as a perfectly timed spaghetti carbonara, homemade pepperoni pizza where
    each topping is measured, and a morning bowl of oatmeal with blueberries and almonds, while occasionally snacking on protein bars during debugging sessions.
  core: Tyler Overman, a 15‑year‑old from Shepherdsville, is a disciplined, solitary teen who blends meticulous model‑building with competitive coding, obsessively tracks every penny, and channels their
    competitive edge into chess, strategic video games, and a rigorously planned life.
background:
  cultural: 'He grew up in Shepherdsville, a small community in Bullitt County, Kentucky, within a family that has lived in the region for several generations. His upbringing reflects the values common
    in many parts of rural‑suburban Kentucky: a strong work ethic, self‑reliance, and an appreciation for practical skills. The local culture emphasizes community gatherings such as county fairs, church
    services (he attends a Southern Baptist congregation), and support for local tradespeople. While his household is predominantly White American, his family’s traditions include cooking regional dishes,
    listening to country and bluegrass music, and participating in community service. These influences have reinforced his preference for structure, discipline, and solitary, goal‑oriented pursuits.'
