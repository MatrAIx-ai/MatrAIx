persona_description: A scientist or researcher interested in the study of livestock production, particularly in the areas of nutrient management, antibiotic use, and the impact of manure management practices
  on the environment. They are interested in understanding the efficacy of composting and anaerobic digestion techniques, and the potential for reducing methane, nitrous oxide, and ammonia emissions during
  composting. They are also interested in comparing and evaluating different treatment strategies for manure management, and assessing the costs and benefits of different options. They are likely to be
  familiar with the principles of biogas production, and have experience with conducting research on manure management and its environmental impact.
