  career_goals: Elizabeth aims to pursue a career that merges her artistic talents with a desire to make a positive impact on others. She aspires to study visual communication or graphic design at college,
    eventually working as a multimedia artist or UX/UI designer for socially‑conscious brands. She also considers a path in art therapy, leveraging her empathy and personal experience with stress to help
    peers manage emotional well‑being through creative expression. In the short term, she plans to build a strong portfolio, learn advanced digital tools like Adobe Illustrator and After Effects, and seek
    mentorship through local art workshops and summer programs.
