  hobbies: '[''Playground games with friends'', ''Dancing to music'', ''Coloring and drawing'', ''Singing Spanish lullabies'', ''Storytime at the library'', ''Sticker collecting'', ''Simple matching and
    counting board games'', ''Puzzle solving'']'
  career_goals: Sonia dreams of becoming a teacher because she loves helping friends learn new things, and she imagines caring for animals as a veterinarian after visiting the local animal shelter. She
    also hopes to lead a dance class for kids, reflecting her love of movement, structure, and sharing knowledge with others.
