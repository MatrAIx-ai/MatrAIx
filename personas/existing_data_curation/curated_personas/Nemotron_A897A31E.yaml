personas:
  professional: Sonia Mendez, a 5-year-old budding LEGO architect, constructs intricate building sets with meticulous order, yet delights in spontaneous play and prefers collaborating with friends rather
    than rigid solo plans.
  sports: Sonia Mendez, a 5-year-old energetic member of the Little League Tigers baseball team and the neighborhood dance club, avidly follows the Chicago Cubs and the USA Women's Soccer Team, preferring
    quick, organized practice drills over lengthy free play.
  arts: Sonia Mendez, a 5-year-old fan of animated movies like 'Moana' and 'Frozen', sings along to Disney songs, draws characters from 'Sesame Street' and loves the whimsical books of Dr. Seuss, channeling
    her sociable spirit into group art projects.
  travel: Sonia Mendez, a 5-year-old with boundless curiosity, loves family trips to the local aquarium and Grandma's farm, and dreams of visiting Disneyland in California and the tropical beaches of Cancun,
    preferring guided tours with familiar faces over solo wandering.
  culinary: Sonia Mendez, a 5-year-old picky eater who adores mac and cheese with extra cheddar, chicken nuggets, and strawberry smoothies, can assemble a simple PB&J sandwich unaided, yet often insists
    on chicken-shaped crackers and resists trying new vegetables.
  core: Sonia Mendez, a 5-year-old bundle of structured playfulness, swings between meticulous LEGO building and spontaneous sticker trades, navigating childhood with a competitive spark, cheerful sociability,
    and occasional forgetfulness about chores.
background:
  cultural: Sonia is a Mexican-American raised in Marion, Texas, within Bexar County’s vibrant Hispanic community. At home she hears both Spanish and English, celebrates traditions such as Día de los Muertos,
    Cinco de Mayo, and family reunions with homemade tacos and tamales. Her family places strong emphasis on close‑knit relationships, respect for elders, and sharing cultural stories, which shape her daily
    life and values.
