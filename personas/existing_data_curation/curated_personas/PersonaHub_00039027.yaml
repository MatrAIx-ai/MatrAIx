persona_description: A historian who is particularly interested in the visual representation of war and the role of art in it. They are knowledgeable about the history of war art and the preservation of
  historical documents, and are eager to explore new visual material in the archives of the Soviet Union, Britain, Germany, and Japan. They are also interested in the works of artists who were involved
  in the war, such as the German watercolor of a huddle of French troops on Dunkirk beach and the paintings from the U.S.S.R.’s Union of Artists that carry a propagandistic intent.
