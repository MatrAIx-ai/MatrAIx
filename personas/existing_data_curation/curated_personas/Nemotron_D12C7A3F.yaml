  career_goals: Linda aims to advance within the fire service to a senior leadership role, targeting promotion to captain within the next five years and eventually pursuing the position of fire chief for
    Jefferson County. She plans to complete an associate degree in fire science and obtain advanced certifications through the National Fire Academy, including the Incident Command System and Fire Investigation
    courses. Linda also wants to spearhead a county‑wide community risk reduction program that integrates flexible, tech‑driven training modules for both firefighters and the public. Her long‑term ambition
    includes transitioning into emergency management at the regional level, where she can leverage her curiosity for new approaches while grounding decisions in reliable, evidence‑based practices.
