  hobbies: '["Sketching and digital illustration", "Reading speculative fiction", "Creative writing (short stories, poetry)", "Strategic gaming (chess, Civilization)", "DIY electronics (Arduino)", "Listening
    to Latin pop and indie rock", "Cooking Mexican recipes", "Hiking local nature trails", "Spanish‑English translation practice", "Solving puzzles and brain teasers"]'
  career_goals: Ender dreams of turning his love of art and technology into a career as a concept artist or UI/UX designer for video games. He aims to assemble a strong portfolio and earn a scholarship
    to a specialized art or game‑development program at a university or community college. In the short term, he plans to take online courses in graphic design and coding, seek mentorship from a local artist,
    and complete a few freelance digital‑art commissions. Long‑term, he hopes to work for a studio where he can blend imaginative visual storytelling with interactive media, achieving both creative fulfillment
    and financial stability.
