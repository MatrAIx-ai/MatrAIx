personas:
  professional: Rodney Haynes is a budding LEGO architect and junior coder who channels his love for structure into meticulous model construction, approaching each build with a methodical, solitary mindset
    and a competitive streak that drives them to perfect every piece.
  sports: Rodney Haynes is a member of the Batavia Junior Soccer Club, enjoys watching the Chicago Cubs and Chicago White Sox on game nights, and channels their competitive spirit into weekly soccer drills
    while preferring the predictable routine of scheduled practices over spontaneous playground games.
  arts: Rodney Haynes delights in playing simple melodies on their small keyboard, often humming along to Stevie Wonder’s ‘Isn’t She Lovely’ and Beyoncé’s upbeat tracks, while their love for storytelling
    shines when they watch animated classics like ‘Moana’ and attend their church’s lively gospel choir performances.
  travel: Rodney Haynes enjoys meticulously planned day trips, having explored Chicago’s Adler Planetarium and Starved Rock State Park for rock‑collecting expeditions, and they harbor a big‑screen dream
    of a future family visit to the Kennedy Space Center in Florida, where the scheduled tours align with their love of order.
  culinary: Rodney Haynes helps in the kitchen by whisking together macaroni and cheese, seasoning fried chicken, and sprinkling cheddar on sweet potato fries, while they especially love the buttery, corn‑meal
    flavor of homemade cornbread and the bright zest of fresh lemon in their occasional fruit‑topped pancakes.
  core: Rodney Haynes is a meticulous six‑year‑old who transforms their love for LEGO, puzzles, and space into a quiet, competitive drive, often worrying about perfecting every detail while finding solace
    in structured routines and gentle rhythms.
background:
  cultural: Rodney grows up in a Black family in Batavia, Illinois, where cultural traditions blend Southern‑rooted culinary flavors with Midwestern community values. Family gatherings often feature soul
    music, storytelling about African‑American heritage, and celebrations of holidays such as Juneteenth. His parents emphasize education and resilience, drawing on local community programs and mentorship
    opportunities from nearby Chicago‑area cultural centers. He regularly attends a local church that offers youth activities, strengthening his connection to his cultural roots and supportive community
    networks.
