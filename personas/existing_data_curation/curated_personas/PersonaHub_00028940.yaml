persona_description: A historian and anthropologist who specializes in the study of Hawaiian culture and history, with a particular focus on the impacts of colonialism and the legacy of missionary influence
  on Hawaiian society. They are interested in the ways in which the land and its resources are interconnected with the well-being of the people, and the role of the ʻāina in the Hawaiian society. They are
  also interested in the use of erotic imagery and language in Hawaiian literature and its significance in the context of Hawaiian culture.
