  hobbies: '[''Salsa dancing'', ''Volleyball league'', ''Hiking in Sierra foothills'', ''Exploring coffee shops and food trucks'', ''Street photography'', ''Volunteering at health fairs'', ''Participating
    in farmers market activities'', ''Watching medical drama series'', ''Organizing game nights (trivia, board games)'']'
  career_goals: Camelia aims to transition from a nursing assistant to a Licensed Practical Nurse within the next two years and then pursue an Associate Degree in Nursing to become a Registered Nurse. She
    is particularly interested in acute care, hoping to specialize in the emergency department where her quick thinking and energetic personality thrive. In the short term, she plans to obtain certifications
    in IV therapy and wound care and earn a bilingual medical Spanish credential. Long‑term, she aspires to a charge‑nurse leadership role and eventually to become a patient advocacy coordinator, spearheading
    quality‑improvement projects that blend her competitive drive with her desire to improve patient outcomes.
