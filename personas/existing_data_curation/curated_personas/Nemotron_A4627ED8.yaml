personas:
  professional: Adrian Perry is a seasoned community historian and volunteer organizer who leverages carpentry, storytelling, and a deep love of Lincoln heritage to lead senior‑center workshops, orchestrate
    church potlucks, and mentor younger neighbors, though their relaxed attitude toward planning sometimes leads to missed appointments.
  sports: Adrian Perry avidly follows the Kentucky Wildcats basketball team and Louisville City FC soccer club, enjoys weekly brisk walks through the Abraham Lincoln Birthplace National Historical Park,
    participates in senior‑center dance nights, and occasionally joins a local bowling league, treating activity as a social connector rather than a competitive pursuit.
  arts: Adrian Perry is an enthusiastic watercolor painter of Kentucky countryside scenes, a folk‑bluegrass guitarist who jams at community gatherings, a regular visitor of regional galleries showcasing
    American folk art, and a devoted fan of artists like Doc Watson, The Carter Family, and Howard Finster, letting these influences shape both their creative output and storytelling.
  travel: Adrian Perry favors road‑trip pilgrimages to American cultural landmarks, having visited the Smithsonian American Art Museum in Washington, D.C., and the Gettysburg National Military Park, while
    dreaming of a workshop retreat at the Asheville Art Museum, and they plan trips around senior‑friendly schedules, often combining travel with family visits and community events.
  culinary: Adrian Perry is a passionate home cook of Southern cuisine who regularly prepares fried catfish, collard greens with smoked turkey, cornbread, and heirloom tomato gazpacho, experiments with
    bourbon‑glazed peach desserts, and sources fresh herbs and produce from their own garden and the local farmers’ market.
  core: Adrian Perry blends lifelong curiosity for history, art, and community with a relaxed, slightly disorganized approach, turning every garden, jam session, and volunteer project into a vibrant, socially‑rich
    tapestry of Southern heritage.
background:
  cultural: Adrian is a white Kentuckian who was born and raised in Hodgenville, a small town steeped in Southern‑Appalachian heritage and the legacy of Abraham Lincoln. He grew up in a tight‑knit, family‑oriented
    community where church (a Baptist congregation), county fairs, bluegrass music, and storytelling were everyday staples. The culture of Southern hospitality, respect for the land, and appreciation for
    folk arts shaped his values of kindness, cooperation, and a relaxed, flexible lifestyle. While rooted in traditional Midwestern and Southern values—hard work, community service, and reverence for local
    history—Adrian remains open to new ideas, continually seeking learning opportunities and embracing unconventional thinking within his cultural framework.
