personas:
  professional: Carrie Davis is a line cook at a family‑friendly coastal restaurant who excels at seafood grilling, inventory management, and simple menu planning, and their relaxed, flexible nature lets
    them keep the kitchen humming while fostering a harmonious team environment as they work toward a sous‑chef promotion.
  sports: Carrie Davis enjoys breezy walks along the Scarborough shoreline, participates in a summer beach‑volleyball league with the Scarborough Harbor Club, plays pick‑up softball on weekends, and faithfully
    follows the Boston Red Sox, New England Patriots, and Boston Celtics while occasionally cheering at local high‑school soccer matches.
  arts: Carrie Davis finds creative release in listening to folk duo The Milk Carton Kids, attending the Boston Symphony Orchestra’s summer pops concerts, and devouring contemporary mystery novels by Tana
    French, while also appreciating the coastal watercolor paintings of local artist Sarah Whitcomb, which inspire their own culinary plating.
  travel: Carrie Davis prefers low‑key road trips with their husband, often planning loosely for weekend getaways to nearby coastal gems such as Martha’s Vineyard, Acadia National Park, and the historic
    town of Portsmouth, while dreaming of a spring culinary tour of San Sebastián, Spain, though family responsibilities sometimes constrain longer vacations.
  culinary: Carrie Davis, a proficient home cook, delights in preparing New England clam chowder, lobster rolls, and baked cod with fresh thyme and lemon zest, while also experimenting with simple pastries
    like blueberry scones and lemon curd tarts, often sourcing ingredients from local farmers’ markets and sharing them at casual potluck dinners.
  core: Carrie Davis blends a love for routine comfort foods and community gatherings with a laid‑back, occasionally disorganized lifestyle, dreaming of a modest seaside bistro while secretly hoarding spice
    jars and polishing off pastry leftovers before guests arrive.
background:
  cultural: Carrie comes from a white New England background, with family roots tracing back to English and Irish ancestors who settled in coastal Maine generations ago. Growing up in Scarborough’s close‑knit
    community, she absorbed the region’s practical, down‑to‑earth values and a strong emphasis on local seafood, seasonal produce, and traditional holiday meals. Her upbringing emphasized harmony, helping
    neighbors, and preserving community rituals such as the annual lobster bake and Fourth‑of‑July fireworks, all of which shape her grounded, collaborative approach both at work and in her personal life.
attributes:
