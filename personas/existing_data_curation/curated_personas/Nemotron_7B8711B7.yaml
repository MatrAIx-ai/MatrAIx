  hobbies: '[''Community volunteering'', ''Farmers market trips'', ''Garden gardening'', ''Potluck hosting'', ''Dancing at local festivals'', ''Coastal walks'', ''Reading mystery novels'', ''Simple pastry
    baking'', ''Boat fishing'', ''Local music events'']'
  career_goals: Looking ahead, Carrie hopes to move from line cook to sous chef within the next two years, eventually earning a head chef position at a family‑friendly restaurant that emphasizes local,
    seasonal seafood and comfort cuisine. She plans to complete a culinary certification at a community college to deepen her technical knowledge while balancing her responsibilities at home. Long‑term,
    she dreams of opening a modest coastal bistro with her husband, offering a relaxed atmosphere where regular patrons feel like part of an extended family, and she wishes to mentor young cooks in a supportive,
    low‑pressured setting.
