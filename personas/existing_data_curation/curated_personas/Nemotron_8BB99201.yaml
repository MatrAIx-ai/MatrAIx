    drama club'']'
  career_goals: She aims to finish her high‑school education by earning a GED and then study digital media or marketing at a community college. In the short term, Stephanie hopes to build a personal brand
    on TikTok and Instagram that showcases her music, fashion sense, and lifestyle tips, eventually turning it into a full‑time influencer career. She also envisions herself performing as a local rapper
    or actress, using her charisma to inspire other teens in Roanoke Rapids. Long‑term, she wants to create a youth mentorship program that combines creative arts with entrepreneurship, giving other young
    people a practical pathway to success.
