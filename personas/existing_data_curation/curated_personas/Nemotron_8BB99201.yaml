personas:
  professional: An aspiring digital media influencer, Stephanie Thorpe leverages their flair for improvisational rap, quick‑witted video editing, and street‑ball charisma to craft TikTok content that blends
    fashion hacks, hip‑hop beats, and lifestyle tips, while balancing a pragmatic plan to earn a GED and study marketing.
  sports: Stephanie Thorpe dominates the community center’s street‑ball court with flashy crossover moves, proudly wears a Roanoke Rapids Rec League jersey, and they follow the Charlotte Hornets and the
    Carolina Panthers for professional inspiration while occasionally joining weekend pickup games at the local gym.
  arts: Stephanie Thorpe channels their love for Southern soul by freestyling to SZA and J. Cole tracks, rehearses choir harmonies at church, idolizes actress Zendaya for her fashion daring, and they immerse
    in drama club skits that let them embody characters from urban fiction best‑seller ‘The Coldest Winter’.
  travel: Stephanie Thorpe prefers spontaneous road trips to nearby beach towns like Virginia Beach and weekend escapes to Atlanta’s music scene, but they dream of a future backpacking adventure through
    London’s thrift markets and Tokyo’s neon‑lit fashion districts, planning trips on a shoestring budget with friends.
  culinary: Stephanie Thorpe’s palate leans toward spicy soul food—devouring chicken‑and‑waffles with hot sauce, mastering DIY avocado toast with feta, and experimenting with glitter‑ed sugar cookies for
    Instagram, while their cooking skills hover at quick, Instagram‑ready snack level and they enjoy sharing bite‑size creations with followers.
  core: Stephanie Thorpe is a charismatic teen who blends freestyle rap, thrift‑store fashion, and TikTok flair into a hustle‑driven dream, yet they wrestle with disorganization, anxiety, and a relentless
    need for social applause.
background:
  cultural: Stephanie grew up in a close‑knit African‑American community in Roanoke Rapids, where family, church, and local traditions play a central role. Her family traces its roots to the Great Migration
    and carries Southern culinary customs like fried chicken, collard greens, and sweet tea. Weekly church services and gospel music have shaped her love for singing and community performance. She draws
    inspiration from prominent Black artists in hip‑hop and R&B and feels a strong sense of pride in her heritage, which she expresses through her fashion, music, and community involvement.
