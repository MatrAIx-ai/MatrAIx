  career_goals: Although still five, Kerry often talks about the people who help her—teachers, doctors, and firefighters—and says she wants to be "someone who helps others" when she grows up. She loves
    animal pictures and dreams of becoming a veterinarian, enjoys storytime and imagines being a teacher, and is fascinated by simple science demonstrations, hinting at an aspiring scientist or community
    caretaker. Her caring nature and desire for order shape these early ambitions.
