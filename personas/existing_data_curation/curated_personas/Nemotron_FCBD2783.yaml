  career_goals: Julian aims to become a lead design engineer on a commercial launch vehicle program within the next five years, eventually stepping into a senior project‑manager role overseeing end‑to‑end
    development of satellite‑deployment systems. He plans to pursue a master’s degree in aerospace engineering or an MBA to blend technical expertise with strategic leadership. Long‑term, he is motivated
    to contribute to Puerto Rico’s emerging aerospace sector by mentoring local talent, establishing a research partnership with the nearby university, and possibly launching a startup focused on low‑cost
    small‑satellite launch services that leverage the island’s geographic advantage.
