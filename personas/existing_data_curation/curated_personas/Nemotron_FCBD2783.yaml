personas:
  professional: Julian Cruz, a 31‑year‑old propulsion system engineer at an aerospace firm, leverages their expertise in CFD and CAD modeling to refine launch vehicle components, applying a methodical,
    competitive mindset that pushes them to benchmark designs against industry best practices while leading interdisciplinary teams with meticulous organization.
  sports: Julian Cruz balances a passion for high‑octane drone racing at the local Corozal Aero Club with regular hikes in the Cordillera Central, while cheering on the Cangrejeros de Santurke baseball
    team and the Santeros de Aguada basketball squad during the summer months, and they maintain a fitness regimen that mixes cardio runs with weekend strength training.
  arts: Julian Cruz unwinds by strumming an acoustic guitar to improvised salsa and bolero riffs inspired by Celia Cruz and Marc Anthony, while their playlists also feature hard science‑fiction soundtracks
    from Hans Zimmer and the ambient electronica of Ólafur Arnalds, and they regularly attend the annual Plena Festival in nearby towns.
  travel: Julian Cruz plans trips with meticulous itineraries, favoring a mix of aerospace‑related stops like NASA’s Kennedy Space Center and leisure escapes such as Vieques’s bioluminescent bays, and they
    dream of hiking the coffee terraces of Guatemala’s highlands and exploring Tokyo’s Tsukuba Space Center.
  culinary: Julian Cruz, an avid home cook, perfects classic mofongo with plantains and chicharrón while experimenting with modern twists like quinoa‑infused arroz con gandules, and they never start a meal
    without a strong cup of locally sourced coffee brewed from beans harvested in the mountains surrounding Corozal.
  core: Julian Cruz blends a relentless, data‑driven drive for aerospace innovation with a love for island rhythms, drone‑racing thrills, and late‑night coffee, often juggling meticulous project plans and
    spontaneous gadget splurges, while they never miss a chance to share a fresh batch of coffee with friends.
background:
  cultural: Julian was raised in Corozal, a close‑knit town in the Naranjito municipality, where family gatherings, music, and seasonal festivals shaped his identity. Bilingual in Spanish and English, he
    navigates both the island’s Afro‑Caribbean heritage and the global aerospace community. His upbringing on a coffee‑producing region instilled an appreciation for diligent work and collaborative community
    support. He celebrates traditions such as the Fiesta de la Fiesta, enjoys plena and salsa rhythms, and maintains strong ties with his extended family, which provides a grounding network that balances
    his competitive professional drive. This cultural foundation fuels his commitment to give back to Puerto Rico’s growing STEM ecosystem.
