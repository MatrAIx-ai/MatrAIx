personas:
  professional: A full‑stack software developer with a flair for artistic UI design, Susila Giroux leverages modern cloud platforms and agile leadership to turn abstract ideas into interactive, user‑centric
    prototypes while mentoring junior engineers with the same talkative enthusiasm that lights up improv stages.
  sports: An avid hiker and weekend photographer, Susila Giroux regularly tackles New England trail sections of the Appalachian Trail, roots for the Boston Celtics and New England Patriots, and participates
    in the Boston Running Club’s Friday night runs, treating fitness as a playful exploration of patterns in nature.
  arts: A multidisciplinary creator, Susila Giroux paints abstract acrylics inspired by Yayoi Kusama, designs digital illustrations echoing the neon aesthetic of James Turrell, writes short sci‑fi flash
    fiction reminiscent of Ted Chiang, plays acoustic guitar covers of Joni Mitchell, and shines on improv nights with the Boston Improv Collective, letting each medium inform the next.
  travel: A spontaneous explorer who blends itinerary planning with last‑minute decisions, Susila Giroux has trekked the rugged coast of Acadia, snapped street photos in Tokyo’s Shibuya, dreams of chasing
    the Northern Lights in Iceland, and prefers weekend road trips that seed ideas for new interactive media experiences.
  culinary: A self‑taught home chef who fuses flavors, Susila Giroux often whips up miso‑glazed salmon with smoked paprika, experiments with fermented kimchi tacos, and savors a perfectly brewed pour‑over
    using Ethiopia Yirgacheffe beans, while maintaining a modest skill level that leans heavily on online video tutorials.
  core: A charismatic tech‑artist, Susila Giroux balances cloud‑certification studies with midnight painting sessions, habit‑driven coffee binges, and a relentless drive to turn imaginative concepts into
    tangible digital experiences.
background:
  cultural: Susila grew up in a middle‑class family in the Boston suburbs, where her parents—both educators—encouraged a love of learning, curiosity, and community involvement. Attending a progressive public
    high school in Weston, she participated in robotics clubs and the school theater, fostering both her technical aptitude and her sociable, performative side. Her white New England heritage blends traditional
    New England cultural values of self‑reliance and civic duty with a modern, inclusive outlook shaped by the diverse academic environment of her university. This background fuels her appreciation for
    both the analytical rigor of STEM and the expressive potential of the arts.
