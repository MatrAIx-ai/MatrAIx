  career_goals: Susila aims to transition into a technical leadership role where she can shape product strategy at the intersection of technology and art. She envisions launching innovative digital experiences
    that leverage AI-driven creativity, and eventually founding a startup focused on immersive, interactive media. In the near term, she plans to obtain a professional certification in cloud architecture,
    lead cross‑functional squads, and become a regular speaker at industry conferences and local maker events.
