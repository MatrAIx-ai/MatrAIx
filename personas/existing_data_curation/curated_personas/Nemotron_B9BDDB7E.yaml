personas:
  professional: Kacie Ficht, a self‑directed visual arts enthusiast, blends their modest watercolor and photography skills with a meticulous yet occasionally lax approach to small‑scale entrepreneurship,
    channeling their critical thinking and love of unconventional ideas into an online boutique for handcrafted home‑decor while volunteering as a docent‑in‑training at the Saint Joseph Art Museum.
  sports: Kacie Ficht supports the Kansas City Chiefs and the St. Louis Cardinals while participating in the Sunrise Yoga Club’s weekend gentle‑flow sessions and the Midwest Women’s Walking Group, favoring
    low‑impact activities that fit into their relaxed schedule and rarely pursues competitive sports, preferring the tranquility of a morning stroll through the local park.
  arts: Kacie Ficht immerses themselves in the works of Monet and O’Keeffe, critiques contemporary pieces by Basquiat, curates their own small exhibitions of thrift‑upcycled décor, and finds inspiration
    while listening to Miles Davis, John Coltrane, and Debussy during their sketching sessions, often spending afternoons at the Saint Joseph Art Museum and local galleries to fuel their eclectic artistic
    palate.
  travel: Kacie Ficht favors low‑key, art‑focused getaways such as a weekend in Florence to study Renaissance frescoes, a quiet week in Kyoto’s historic gardens, and occasional trips to the Colorado Rockies
    for landscape photography, planning most travel on a spreadsheet but sometimes letting anxiety stall bookings, and always prioritizing destinations where they can explore local antique markets and sketch
    serene scenes.
  culinary: Kacie Ficht enjoys cooking simple Mediterranean meals like basil‑pesto pasta, rosemary‑seasoned roasted vegetables, and thyme‑infused lemon chicken, often harvesting fresh herbs from their indoor
    garden, occasionally baking lemon‑scented scones for book‑club meetings, and relishes tasting artisanal cheeses and dark chocolate while sipping chamomile tea brewed with home‑grown lavender.
  core: Kacie Ficht is a curious, solitary creator who balances a love for quiet artistic pursuits with a competitive streak that fuels their meticulous yet occasionally chaotic DIY ventures, all while
    wrestling with a tendency toward worry and a cherished habit of nurturing an indoor herb sanctuary.
background:
  cultural: Kacie grew up in a small Midwestern town in Missouri, steeped in the region’s values of modesty, self‑reliance, and community involvement. Her family’s cultural roots are primarily white, Protestant,
    and middle‑class, emphasizing hard work, practicality, and an appreciation for simple, everyday pleasures. Living in Saint Joseph has exposed her to a modestly diverse community and a vibrant local
    arts scene, which she embraces alongside her traditional Midwestern upbringing. This blend of modest, grounded values with an openness to new artistic ideas shapes her worldview and daily life.
