  career_goals: Kacie hopes to turn her artistic interests and DIY expertise into a modest home‑based venture, such as an online shop selling handcrafted home‑decor pieces and prints. She also aspires to
    become a volunteer curator or docent at the Saint Joseph Art Museum, sharing her curiosity for art with small groups. To support these ambitions she plans to enroll in a part‑time online course in art
    history or community arts facilitation, improve her organizational habits, and build a modest, flexible income stream that reduces financial stress while preserving her preferred solitary and low‑pressure
    lifestyle.
