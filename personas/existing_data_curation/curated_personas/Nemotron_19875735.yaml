  hobbies: '[''Sketching and drawing'', ''Creative writing (short stories, memoir)'', ''Attending art workshops and community lectures'', ''Documentary and podcast consumption (astronomy, philosophy, history)'',
    ''Walking club'', ''Yoga and mindfulness practice'', ''Volunteering at the local library (reading program, arts-and-craft sessions)'', ''Photography of local scenery'']'
  career_goals: Sandra aims to transition from daily route driving to a mentorship and training role within the school district, where she can share her safety expertise and help new drivers develop both
    technical skills and interpersonal strategies. She is working toward obtaining her GED, with the long‑term ambition of qualifying for a part‑time position in curriculum support, such as coordinating
    extracurricular field trips or developing safety education programs for students. Additionally, she hopes to showcase her artistic side by organizing a community art exhibit featuring works inspired
    by her routes and to write a memoir documenting her experiences as a school bus driver.
