personas:
  professional: Sandra Pegg, a seasoned school bus driver with 25 years of experience, blends defensive driving mastery and meticulous route planning with an imaginative, competitive edge to mentor novice
    drivers, craft safety‑focused curriculum modules, and champion community art initiatives rooted in her daily routes, all while they maintain a carefully balanced schedule.
  sports: Sandra Pegg, an active participant in a seniors’ walking club and regular yoga practitioner, cheered the Cleveland Guardians during spring baseball games at Progressive Field and supported the
    Ohio State Buckeyes football team in the fall, while they also enjoy occasional community pickleball matches.
  arts: Sandra Pegg, a passionate sketcher of Ohio’s rolling farmland and an avid short‑story writer inspired by the children she reads to, frequently attends workshops featuring artists like Andrew Wyeth
    and authors such as Mitch Albom, and they find solace in the melodic works of Joan Baez and the visual poetry of Grant Wood.
  travel: Sandra Pegg, favoring road‑trip adventures over air travel, often explores nearby destinations such as the Hocking Hills State Park and the historic streets of Gettysburg, while they dream of
    a future pilgrimage to the ancient ruins of Machu Picchu and a serene weekend retreat in Asheville’s Blue Ridge Mountains.
  culinary: Sandra Pegg, an intermediate home cook, loves preparing hearty Midwestern comfort meals like chicken pot pie with flaky crust and rosemary gravy, paired with seasonal side dishes such as roasted
    root vegetables drizzled in balsamic glaze, and they delight in the occasional indulgence of a slice of New York‑style cheesecake topped with fresh strawberries.
  core: Sandra Pegg, a curious yet anxious 58‑year‑old, channels a competitive drive into community art while juggling a habit of over‑committing to volunteer projects and an occasional neglect of personal
    self‑care.
background:
  cultural: Sandra comes from a white, working‑class Midwestern background in the industrial town of Warren, Ohio. Her family has deep roots in the region, with generations of labor‑intensive occupations
    such as manufacturing and trades. The community’s emphasis on reliability, neighborly support, and modesty shaped her values, while the local Protestant church provided early exposure to communal service.
    Growing up during the economic shifts of the 1970s and 1980s, she learned to balance self‑reliance with a strong sense of community responsibility, which now informs her dedication to student safety
    and her involvement in local cultural activities.
attributes:
  skills: '[''Defensive driving'', ''Vehicle inspection and maintenance'', ''Route planning and schedule management'', ''Emergency response and first aid'', ''Student behavior management'', ''Effective
