  career_goals: Although retired, Amanda aims to stay intellectually and physically active by mentoring younger volunteers at the Phoenixville library, contributing oral histories to the local historical
    society, and completing a family genealogy manuscript. She also hopes to maintain her health through regular senior yoga classes, preserve her financial stability, and travel with her husband to sites
    connected to their family’s European roots.
