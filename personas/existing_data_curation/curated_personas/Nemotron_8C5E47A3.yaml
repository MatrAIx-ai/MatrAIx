  career_goals: Kenneth aims to translate his reliability and organizational talent into a stable part‑time position within a local nonprofit or community center, where he can coordinate programs for seniors
    and organize neighborhood events. He also hopes to launch a modest home‑based handyman service to supplement his income, leveraging his practical skill set. Long‑term, he wants to achieve enough financial
    stability to ease his worries while continuing to contribute to community harmony and improve his mental well‑being through regular counseling and stress‑reduction practices.
