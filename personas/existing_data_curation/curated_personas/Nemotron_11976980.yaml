    live music and theater performances'', ''Board‑game nights and trivia contests'', ''Volunteering for financial‑literacy workshops'', ''Traveling to cultural festivals'']'
  career_goals: Linda aims to step into a senior audit manager role within the next three years, leveraging her CPA credential and pursuing the Certified Fraud Examiner (CFE) designation. She wants to lead
    cross‑functional projects that integrate creative thinking into financial reporting, especially for arts‑focused nonprofits and cultural institutions in the Charlotte region. Long‑term, she envisions
    launching a boutique consultancy that offers strategic finance and risk advisory tailored to creative enterprises, while also establishing a mentorship program that promotes flexible work practices
    and innovative problem‑solving among emerging accountants. She hopes to publish thought‑leadership pieces on blending imagination with audit rigor and to serve on the board of a local arts nonprofit.
