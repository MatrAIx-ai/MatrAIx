personas:
  professional: Linda Thomas, a seasoned CPA and forensic accountant, leverages their advanced Excel, Tableau, and SAP expertise to transform audit findings into visually compelling narratives, while their
    imaginative, flexible mindset drives innovative reporting solutions for arts nonprofits despite a habit of juggling multiple projects and occasionally misplacing work documents.
  sports: Linda Thomas energizes their weeks by playing in a community salsa club, hiking with the Blue Ridge Trailblazers group, and cheering for the Charlotte Hornets, Carolina Panthers, and Charlotte
    FC, while they prefer a mix of cardio dance workouts and leisurely mountain treks over gym‑based strength training.
  arts: Linda Thomas immerses themselves in the arts by painting abstract watercolors inspired by Yayoi Kusama, dissecting contemporary installations by Banksy at gallery openings, performing in a community
    theater revue of Lin‑Manuel Miranda’s works, and attending live concerts by Adele and the National, using each experience to fuel their creative problem‑solving at work.
  travel: Linda Thomas prefers curated cultural escapes, combining weekend drives to Asheville’s art districts and Savannah’s historic squares with long‑haul trips to Barcelona’s Gothic Quarter and Kyoto’s
    temples, and they often plan trips loosely around seasonal festivals while reserving extra budget for spontaneous cooking classes abroad.
  culinary: Linda Thomas approaches cooking as a culinary adventure, mastering dishes like saffron‑infused paella, kimchi fried rice with gochujang, and potato gnocchi tossed in sage‑butter, and they relish
    dining out at farm‑to‑table bistros that spotlight locally sourced heirloom tomatoes and heritage grains.
  core: Linda Thomas is a curiosity‑driven accountant who blends artful imagination with audit rigor, thrives on social interaction, and despite a lovable habit of losing sticky notes, consistently seeks
    novel ways to merge numbers and creativity.
background:
  cultural: Linda grew up in a middle‑class suburb of Raleigh, North Carolina, immersed in traditional Southern hospitality while also being exposed to the region’s evolving cultural scene. Her family’s
    Anglo‑American heritage emphasized hard work, community involvement, and a respect for punctuality, though she later gravitated toward a more flexible, creative outlook. Relocating to Charlotte in her
    twenties for college and her accounting career, she embraced the city’s blend of corporate dynamism and vibrant arts districts. This mix of Southern roots, professional rigor, and a growing appreciation
    for contemporary art and multicultural experiences shapes her worldview, fostering both a pragmatic approach to finance and an imaginative curiosity about diverse cultural expressions.
