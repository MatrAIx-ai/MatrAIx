  hobbies: '[''Playing soccer'', ''Building LEGO models'', ''Reading picture books'', ''Organizing action figures and stickers'', ''Playing board games (Candy Land, Chutes & Ladders)'', ''Watching Spanish-language
    cartoons'']'
  career_goals: Jorge dreams of becoming a soccer player who competes at a professional level, appreciating the clear rules, team strategies, and disciplined training routines. He also expresses interest
    in engineering, especially designing and building structures with LEGO, hoping one day to become a civil engineer who creates safe, organized spaces. His ambition is to master skills through practice
    and achieve measurable success in whichever field he chooses.
