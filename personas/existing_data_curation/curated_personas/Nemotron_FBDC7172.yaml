personas:
  professional: Jorge is a budding soccer strategist who loves structured drills and LEGO architecture, showing an early penchant for planning, precision, and competition; they often map out game strategies
    on paper before play.
  sports: Jorge is a focused young soccer player who practices with the Little Tigers Soccer Club, idolizes the local professional team, the City Hawks, and competes fiercely in weekend matches, always
    keeping scoreboards neat and following the coach’s drill schedule; they relish the feeling of scoring the winning goal.
  arts: Jorge is an enthusiastic LEGO artist who devours picture books by Eric Carle, enjoys animated shows like 'Pocoyo' and 'Masha and the Bear' in Spanish, and collects action figures of superheroes
    such as Spider‑Man, which they arrange by color and storyline.
  travel: Jorge is an organized mini‑traveler who loves weekend trips to the nearby zoo and beach, dreams of visiting Disneyland and the historic castles of Europe, and prefers itineraries with clear activities
    and snack breaks, often packing their own sticker‑themed travel journal.
  culinary: Jorge is a selective eater who favors crunchy carrot sticks, cheesy pizza slices, tacos with mild salsa, and builds snack plates with LEGO‑shaped cutters, while they sometimes refuse vegetables
    unless they’re arranged in neat rows.
  core: Jorge is a meticulous six‑year‑old who blends structure with creativity, excels at organized play, saves money in jars, and occasionally rebels with spontaneous candy cravings, reflecting their
    competitive yet practical nature.
background:
  cultural: Jorge comes from a Hispanic/Latino family with roots in Mexico, living in Houston’s vibrant multicultural community. Spanish is spoken at home, and he regularly hears traditional music like
    mariachi and bachata. Family gatherings often feature homemade tacos, guacamole, and arroz con pollo, reflecting his cultural heritage. He celebrates holidays such as Día de los Muertos and Cinco de
    Mayo with colorful decorations and storytelling. The blend of his family's Mexican traditions and the diverse influences of Houston – including exposure to various cuisines, festivals, and bilingual
    education – shape his worldview and sense of identity.
attributes:
  skills: '[''Following multi-step routines'', ''Early reading (sight words)'', ''Counting to 100'', ''Basic addition/subtraction'', ''Organizing toys and backpack'', ''Building with LEGO'', ''Playing structured
