    techniques"]'
  hobbies: '["Visiting local art galleries and murals", "Acrylic painting", "Cooking traditional Salvadoran dishes", "Salsa dancing at community events", "Reading contemporary fiction", "Hiking in North
    Georgia trails", "Knitting scarves", "DIY home decor projects"]'
  career_goals: Elsa hopes to step into a lead‑hand or shift‑supervisor role within the next two years by completing a logistics certification program at the nearby community college. She is working toward
    a Certified Logistics Associate credential to deepen her understanding of supply‑chain analytics and safety compliance. While she values stability for her family, she also wants to carve out a creative
    outlet, planning to launch a small online boutique that sells hand‑painted ceramics inspired by Salvadoran motifs. Long‑term, Elsa envisions blending her operational expertise with her artistic passion
    by coordinating community art workshops at local employment centers, promoting both workforce development and cultural expression.
