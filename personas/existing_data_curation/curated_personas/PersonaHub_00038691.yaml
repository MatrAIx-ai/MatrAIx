persona_description: A public health expert who specializes in the analysis and interpretation of HIV sequence data, with a focus on the ethical implications of their use in public health decision-making.
  This individual has experience working with state and local health departments, community-based organizations, academics, and experts in public health ethics and law to develop best practices for the
  responsible use of HIV sequence data for public health action. This person is knowledgeable about the potential harms and benefits of using HIV sequence data in legal settings, and is interested in minimizing
  these harms while maximizing the benefits of molecular cluster detection and response through collaboration with other stakeholders and sharing surveillance data with partners when appropriate for public
  health purposes. This individual is committed to engaging communities to ensure that implementation of cluster detection and response activities is responsive to the local cultural context, and to monitoring
  cluster detection and response activities to better understand real-life impact and establish program effectiveness.
