  career_goals: Jessica hopes to transition into a part‑time mentorship and community‑education role, formalizing a mentorship program for new dental hygienists within her clinic and expanding outreach
    to Brooklyn senior centers by integrating artistic elements into health workshops. She plans to launch a consulting service offering infection‑control audits and best‑practice training for small dental
    offices. Additionally, she aspires to curate an annual "Smile & Art" fundraiser exhibition that partners local galleries with oral‑health charities, and to write a memoir or blog that weaves together
    her career in dental hygiene with the evolving cultural tapestry of Brooklyn, inspiring younger women to pursue health professions.
