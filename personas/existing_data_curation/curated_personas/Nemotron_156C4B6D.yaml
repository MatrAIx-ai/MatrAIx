  hobbies: '["Woodworking", "Gardening", "Reading (history & biographies)", "Chess", "Classic rock music listening", "Dallas Cowboys fandom", "Volunteering at senior center", "Photography", "Walking club",
    "Birdwatching"]'
  career_goals: Andrew’s primary career ambition is to remain an active and valued contributor in his workplace for as long as his health permits, while gradually transitioning into a mentorship role. Over
    the next few years he hopes to obtain a certified office‑administration credential, document his institutional knowledge in a handbook for future staff, and volunteer as an information guide at the
    Plano Public Library. He also intends to reduce his scheduled hours to achieve a better work‑life balance and dedicate more time to community service projects.
