  hobbies: '["Rowing", "Historical Book Club", "Woodworking", "Youth Robotics Coaching", "Classic Car Restoration", "Mindfulness Meditation", "Gardening", "Family Road Trips"]'
  career_goals: Thomas aims to become the principal investigator of a multidisciplinary research program that integrates advanced analytics with the energy and manufacturing sectors in the Midwest. Over
    the next five years, he plans to secure a major national research grant, publish high‑impact papers, and develop a publicly accessible data repository for regional economic and environmental data. He
    also aspires to mentor junior scientists, formalize a structured workflow framework for his department, and transition into a senior advisory role that bridges academia, industry, and policy makers.
    To balance his competitive drive with personal well‑being, Thomas intends to adopt systematic stress‑management practices and champion mental‑health initiatives within his professional community.
