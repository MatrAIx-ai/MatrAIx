personas:
  professional: Laura Diaz, a veteran library technician with over twenty years of cataloging expertise, combines meticulous MARC21 and RDA metadata management, bilingual reference services, and data‑driven
    reporting to craft culturally resonant digital programs, while their competitive drive pushes them toward strategic leadership and digital transformation in library management.
  sports: Laura Diaz enjoys salsa dancing at community events, belongs to the San Juan running club that trains for the annual Carolina 5K, follows the local soccer team Puerto Rico Sol and the New York
    Mets, and maintains a structured weekly fitness routine while sometimes skipping workouts when grant deadlines loom.
  arts: Laura Diaz frequents the Museo de Arte de San Juan to admire works by Rafael Ferrer, attends Plena Libre concerts, participates in productions at Teatro del Centro, and captures vibrant street murals
    through photography, weaving these experiences into library programming that celebrates the island’s artistic legacy.
  travel: Laura Diaz plans cultural pilgrimages to Caribbean festivals such as Trinidad’s Carnival and the Saint Lucia Jazz Festival, prefers boutique stays in historic Old San Juan and Culebra, and harbors
    a bucket‑list desire to trek to Machu Picchu, balancing travel budgeting with scholarship grants and family commitments.
  culinary: Laura Diaz masters the art of cooking mofongo, arroz con gandules, and tembleque, often layering garlic‑infused sofrito with fresh plantains, cilantro, and a splash of rum, and enjoys hosting
    family gatherings where these dishes are the centerpiece, though they sometimes over‑season in pursuit of authentic flavor.
  core: Laura Diaz is a meticulous, art‑loving library strategist who blends competitive ambition with deep community devotion, balancing disciplined finance, proactive health habits, and a salsa‑spiced
    lifestyle.
background:
  cultural: Laura was born and raised in San Juan and identifies strongly with her Puerto Rican heritage. She grew up in a bilingual household, celebrating traditions such as Noche de San Juan, plena music,
    and the Feria de Artesanía. Her family values community solidarity, respect for elders, and a deep appreciation for the island’s artistic and literary legacy. These cultural roots influence her professional
    focus on inclusive services, promotion of local authors, and programming that highlights Puerto Rico’s diverse histories and contemporary expressions.
attributes:
  skills: '[''Cataloging (MARC21/RDA)'', ''Collection Development'', ''Reference and Research Services'', ''Bilingual Information Services (Spanish/English)'', ''Integrated Library Systems (Alma, SirsiDynix)'',
    ''Digital Resource Management'', ''Information Literacy Instruction'', ''Community Outreach and Program Development'', ''Event Planning and Coordination'', ''Project Management'', ''Data Analysis and
    Reporting'', ''Grant Writing'', ''Archival Preservation'', ''Staff Training and Mentorship'', ''Cultural Programming (art exhibitions, author talks)'', ''Technology Integration (e‑books, maker spaces)'',
    ''Customer Service'', ''Conflict Resolution'', ''Public Speaking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing'', ''Reading contemporary Latin American literature'', ''Cooking traditional Puerto Rican dishes'', ''Community volunteering'', ''Gardening'',
    ''Photography'', ''Traveling to cultural festivals across the Caribbean'', ''Attending live theater performances'', ''Learning emerging digital tools and platforms'']'
  career_goals: Laura aspires to move into a library management position where she can shape strategic direction, champion digital transformation, and expand culturally resonant programming. She aims to
    develop a community hub that integrates art, literature, and technology, securing sustainable grant funding and partnerships with local schools and cultural institutions. Her competitive drive fuels
    a desire to be recognized as a leader in innovative library services across Puerto Rico. Laura also plans to mentor emerging library professionals, possibly pursue a Master of Library and Information
    Science, and contribute scholarly work on preserving Puerto Rican literary heritage in digital archives.
