  career_goals: Kevin dreams of becoming a multimedia artist who blends technology and storytelling, perhaps as a video game designer or animator. He also imagines exploring space as an astronaut, inspired
    by his love for novelty and abstract concepts. In the short term, he aims to win his school's art competition, lead his class's science fair project, and become captain of his soccer team, reflecting
    his drive for achievement and leadership.
