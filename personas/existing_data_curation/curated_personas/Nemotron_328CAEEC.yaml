personas:
  professional: A budding coder and comic storyteller, Kevin Cabreja channels their imagination through Scratch projects and hand‑drawn panels, while their innate discipline drives them to meet tight self‑set
    deadlines and showcase their work at school talent shows.
  sports: A spirited soccer player, Kevin Cabreja stars on the local youth team that emulates the Alabama Crimson Tide’s fierce defense, spends weekend afternoons practicing free‑kicks on the neighborhood
    field, and cheers passionately for the Nashville Predators during the hockey season.
  arts: A vibrant sketch artist, Kevin Cabreja spends afternoons drawing comic heroes inspired by Neil Gaiman’s whimsical narratives and the dynamic panels of "One Piece," while their drumming rhythm, borrowed
    from traditional folk tunes and contemporary pop beats, often adds a soundtrack to their creative storytelling.
  travel: An adventurous road‑trip enthusiast, Kevin Cabreja has already visited the Gulf Coast beaches of Mississippi, the historic streets of Santa Fe during school field trips, and dreams of exploring
    the ancient ruins of Teotihuacan, preferring itineraries that mix cultural festivals with a splash of candy‑store stops.
  culinary: A budding kitchen aide, Kevin Cabreja loves helping prepare tamales and pan de muerto for family celebrations, while also mastering Southern comfort dishes like fried chicken and homemade peach
    cobbler, often seasoning their experiments with a pinch of cumin and a dash of hot sauce.
  core: Kevin Cabreja is a disciplined, imaginative ten‑year‑old who fuses comic‑making, soccer, and family traditions into a lively, organized, and socially‑charged worldview, occasionally forgetting tasks
    when excitement spikes.
background:
  cultural: Kevin is a first-generation Mexican-American raised in Florence, Alabama. He grows up bilingual, speaking Spanish at home with his parents and grandparents while using English at school and
    in the community. He participates in cultural celebrations such as Día de los Muertos and Mexican Independence Day, helping to set up altars and prepare foods like tamales and pan de muerto. The Southern
    hospitality of Lauderdale County also shapes his social interactions, and he enjoys local festivals, school events, and community sports. His family emphasizes respect for elders, the value of hard
    work, and the melding of Mexican traditions with Southern customs, which inform his identity and worldview.
