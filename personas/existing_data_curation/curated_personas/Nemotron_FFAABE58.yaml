personas:
  professional: Bryan Dettlaff is a senior correctional officer and graduate educator who combines over a decade of inmate supervision, crisis de‑escalation, and curriculum design expertise to run structured
    rehabilitation programs, while applying his practical, steady demeanor to maintain safety, mentor new staff, and pursue a path toward sergeant and ultimately correctional administration.
  sports: Bryan Dettlaff enjoys solitary early‑morning jogs along the Mississippi River, follows the Minnesota Vikings (NFL) and the Minnesota Wild (NHL) with a disciplined fan routine, plays recreational
    softball for the St. Paul Community League’s Northshore Softball Club, and participates in a local fishing club that hosts monthly bass‑tournament meet‑ups each summer, all while using a structured
    training plan to stay fit.
  arts: Bryan Dettlaff finds quiet resonance in classic American folk storytellers like Bob Dylan and the modern lyricism of The Avett Brothers, regularly reads historical nonfiction by Doris Kearns Goodwin,
    enjoys the cinematic performances of Daniel Day‑Lewis in period dramas, and occasionally attends community theatre productions of 'Our Town' at the St. Paul Public Theatre, which satisfy his reserved
    yet appreciative artistic palate.
  travel: Bryan Dettlaff plans meticulously organized road trips, favoring mid‑week getaways to the North Shore of Lake Superior for fishing and hiking, dreaming of a winter pilgrimage to the icy fjords
    of Reykjavik and a historical tour of Gettysburg, while balancing these ambitions against a modest vacation budget and family obligations.
  culinary: Bryan Dettlaff prefers hearty Midwestern fare, often cooking walleye fillets brushed with lemon‑dill butter, wild rice pilaf with mushrooms, maple‑glazed pork chops, and spinach‑and‑white‑bean
    soup, yet habitually over‑salts his stew when distracted by podcasts, reflecting his practical approach to nourishment and occasional absent‑mindedness.
  core: Bryan Dettlaff is a methodical, structure‑loving correctional mentor who blends quiet solitude with a relentless drive for safety, a habit of over‑checking locks before bedtime, and a secret stash
    of premium coffee for those late‑night report write‑ups.
background:
  cultural: 'Bryan was raised in a middle‑class, predominantly white suburb of Minneapolis, steeped in the values of the Upper Midwest: modesty, reliability, and community service. His family’s cultural
    roots trace back to German‑Scandinavian immigrants, and he grew up attending a Lutheran church that emphasized hard work, education, and reciprocity. The “Minnesota nice” ethos—politeness, respect for
    personal space, and a focus on consensus—shapes his interactions both at work and in his personal life. This background, combined with his graduate training in education, informs his pragmatic approach
    to correctional work and his commitment to structured, fair processes.'
attributes:
  skills: '[''Inmate supervision'', ''Crisis de‑escalation'', ''Conflict resolution'', ''Security operations'', ''Report writing'', ''Regulatory compliance'', ''Adult education curriculum development'',
