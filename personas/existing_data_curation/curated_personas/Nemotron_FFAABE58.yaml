  hobbies: '[''Fishing'', ''Carpentry'', ''Home gardening'', ''Reading historical nonfiction'', ''Self‑improvement books'', ''Volunteer community service'', ''Strategy board games'', ''Attending small church
    gatherings'']'
  career_goals: Bryan aims to advance within the corrections system to a supervisory role such as Sergeant or Lieutenant, where he can influence policy and oversee staff development. He is also interested
    in expanding correctional education programs, eventually becoming a Correctional Education Coordinator or a district‑level training manager. Long‑term, he envisions a transition into a corrections administration
    position that integrates his educational background with operational leadership, allowing him to improve inmate rehabilitation outcomes while maintaining a safe, structured environment.
