    at local community center'', ''Model kit building'']'
  career_goals: Scott aims to earn his GED within the next year and then enroll in a community college program focusing on information technology or computer networking. He is motivated to become a certified
    IT support specialist who can provide affordable tech assistance to neighbors and small local businesses in Oakland. In the longer term, he envisions launching a community‑based tech repair shop that
    blends his practical skills with his desire to help others, while also having the flexibility to continue his creative writing and occasional freelance design work.
