personas:
  professional: Scott Sigman is a budding IT support enthusiast who blends hands‑on troubleshooting of computers with a methodical, puzzle‑solving mindset, applying his practical tech skills to help neighbors
    and small Oakland businesses while quietly sketching ideas for a future community‑focused repair shop.
  sports: Scott Sigman enjoys regular cycling through Oakland’s varied neighborhoods, joining the local Bike and Bean club, and follows the Oakland Athletics and Golden State Warriors, preferring low‑impact
    cardio over team sports, and maintains a DIY fitness routine of bike maintenance workouts and occasional skate sessions at Lake Merritt.
  arts: Scott Sigman channels creativity through digital illustration inspired by Studio Ghibli’s aesthetic and fan‑fiction set in the universe of The Expanse, while listening to Daft Punk and Tame Impala
    during sketch sessions, blending sci‑fi storytelling with a love for vibrant, atmospheric art.
  travel: Scott Sigman prefers low‑budget, self‑planned getaways, cycling along the Pacific Coast Highway to Santa Cruz and taking occasional family road trips to Yosemite, while dreaming of a future solo
    backpacking adventure through Japan’s anime districts and Berlin’s tech startup scene.
  culinary: Scott Sigman enjoys quick, budget‑friendly meals like spicy tuna sushi rolls, avocado toast, and instant ramen topped with soft‑boiled eggs, wielding a modest cooking skill set centered on microwave
    hacks, while occasionally experimenting with homemade granola using rolled oats, honey, and chopped almonds.
  core: Scott Sigman is a quietly driven teen who balances a love for puzzle‑style video games and digital art with a practical knack for fixing bikes and computers, often staying up late crafting model
    kits while neglecting regular sleep.
background:
  cultural: Scott is a white teenager raised in Oakland, California, a city known for its cultural diversity and progressive atmosphere. His family’s roots trace back to the Midwest, where values of self‑reliance
    and community support were emphasized. Growing up in the Bay Area, he has been exposed to a mosaic of cultures, languages, and artistic expressions, which have broadened his worldview while his own
    cultural identity remains grounded in typical suburban American norms. He participates in local youth programs that celebrate multiculturalism, and his experiences reflect a blend of the region’s inclusive
    spirit with the practical, down‑to‑earth attitudes passed down by his family.
