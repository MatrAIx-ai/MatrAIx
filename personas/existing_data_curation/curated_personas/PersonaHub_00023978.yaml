persona_description: A medical equipment technician who specializes in the use and maintenance of surgical instruments, particularly those used for endoscopy, biopsy, and repair of body cavities or hollow
  organs. She has extensive knowledge of the various types of instruments used in OR, including those that are run by compressed air, electricity, or batteries. She is also skilled in the use of suction
  systems, irrigation/ascpiration devices, and tourniquets. She is responsible for ensuring that all necessary instruments from each category are included in the set being used.
