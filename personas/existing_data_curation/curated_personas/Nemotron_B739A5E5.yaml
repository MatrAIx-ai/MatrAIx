personas:
  professional: Hung Li, a 13-year-old budding roboticist and student programmer, channels a love for structured teamwork into building and coding simple devices for the school robotics club, bringing practical
    problem-solving and reliable execution to every project while juggling schoolwork and soccer practice.
  sports: Hung Li plays for the Pikes Peak United U‑13 soccer team, follows Colorado Springs Switchbacks FC with fervor, and integrates a disciplined warm‑up routine before every match, while also cheering
    on the LA Lakers during the basketball season as a secondary sports interest.
  arts: Hung Li draws comics inspired by the stylized panels of Akira Toriyama and the whimsical animation of Hayao Miyazaki, spends weekend evenings sketching characters alongside listening to the cello
    music of Yo‑Yo Ma, and occasionally watches live theater performances at the Pikes Peak Center to feed creative imagination.
  travel: Hung Li dreams of backpacking through the Rocky Mountain National Park’s alpine trails and savoring street food in Tokyo, while having already visited the historic Old Town of Santa Fe and the
    family’s Lunar New Year trip to Taipei, always planning trips with a mix of cultural immersion and outdoor adventure.
  culinary: Hung Li enjoys the hands‑on experience of preparing jiaozi (dumplings) with family, mastering the balance of soy sauce, ginger, and scallion in mapo tofu, and experimenting with homemade fried
    rice topped with a splash of sesame oil, while often swapping recipes on a school cooking forum.
  core: Hung Li, a meticulous teen with a penchant for structured teamwork, balances robotics tinkering, soccer drills, comic‑drawing, and diligent savings, yet wrestles with stress‑induced worry and occasional
    impulsive gaming splurges.
background:
  cultural: Hung’s family originates from East Asia, and they maintain many cultural traditions, such as celebrating Lunar New Year, valuing education, and sharing home‑cooked meals. Growing up in Colorado
    Springs, Hung blends these customs with American life, attending local community events while preserving his heritage through language practice at home and participation in cultural clubs at school.
    His upbringing emphasizes respect for elders, collective responsibility, and a practical approach to solving everyday challenges.
attributes:
  skills: '[''Organizational coordination'', ''Basic Python programming'', ''Public speaking'', ''Teamwork'', ''Problem solving'', ''Peer mentoring'']'
