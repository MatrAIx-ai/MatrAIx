  career_goals: He dreams of a career that blends practicality with teamwork, such as becoming a software engineer or a civil engineer who designs community projects. Hung also hopes to stay involved in
    mentorship programs at his future high school, using his reliable nature to help younger students navigate school life. While he remains open to other possibilities, his long‑term ambition is to work
    on technology that improves everyday life.
