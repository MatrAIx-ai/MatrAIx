  hobbies: '[''Gardening'', ''Bridge'', ''Cooking traditional Honduran dishes'', ''Storytelling'', ''Church participation'', ''Volunteering at senior center'', ''Genealogy research'', ''Traveling to Honduras'']'
  career_goals: Although retired, Rosalino aims to preserve his technical legacy by creating a series of short instructional videos on simple home repairs for seniors in his community. He also hopes to
    compile his life stories and family recipes into a small memoir that can be passed down to his grandchildren. In addition, he aspires to mentor at least two younger members of the local Hispanic outreach
    program each year, guiding them in both practical skills and cultural heritage. Maintaining good health and staying socially active remain primary personal ambitions, as does making a memorable trip
    back to Honduras to reconnect with family and celebrate cultural festivals.
