personas:
  professional: Yoko Johnson, an organized seven‑year‑old aspiring engineer, channels their curiosity and methodical planning into building intricate LEGO bridges while scripting simple animations in Scratch
    Jr., showing early signs of a future career in STEM where critical thinking meets practicality.
  sports: Yoko Johnson thrives on the soccer field with the local 'Tiny Tigers' team, where they balance competitive drive with teamwork, practicing drills after school and proudly cheering for the Premier
    League club Manchester United as an inspiration.
  arts: Yoko Johnson’s voice shines in the church choir, where they blend gospel harmonies with contemporary R&B influences from artists like Beyoncé, finding confidence and cultural connection through
    music while also drawing on their competitive spirit to perfect each performance.
  travel: Yoko Johnson explores the world primarily through neighborhood parks and weekend nature hikes, collecting leaves and rocks, while dreaming of a family trip to the Grand Canyon and a future adventure
    to Tokyo's science museums, balancing meticulous planning with spontaneous curiosity.
  culinary: Yoko Johnson partners with their grandmother to bake sweet treats such as chocolate chip cookies and banana bread, mastering the precise measurements of flour, sugar, and cocoa while occasionally
    sneaking extra chocolate chips, demonstrating patience and a sweet tooth.
  core: Yoko Johnson is a methodical, competition‑driven seven‑year‑old who blends scientific curiosity with practical LEGO engineering, disciplined savings, diligent health monitoring, spirited soccer
    play, soulful choir singing, adventurous park exploring, and a love for baking sweet treats.
background:
  cultural: Yoko is an African‑American girl raised in the historically rich Southern town of Valdosta, Georgia. Her family cherishes traditions rooted in the Black community, such as attending Sunday services
    at a local Baptist church, celebrating Juneteenth, and participating in community festivals that honor African‑American heritage. Her grandparents share stories of the Great Migration and the civil‑rights
    movement, instilling a strong sense of resilience, pride, and a commitment to service. Soul food meals prepared by her mother and grandmother, like collard greens and cornbread, connect her to culinary
    traditions, while gospel music and contemporary R&B shape her musical tastes. Through school programs and community events, Yoko learns about local Black history and the contributions of African‑American
    leaders, reinforcing her identity and motivating her to give back to her community.
