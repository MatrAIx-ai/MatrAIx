  career_goals: Inspired by her love of building and problem‑solving, Yoko dreams of becoming a civil engineer who designs safe, sustainable community spaces—like playgrounds and bike paths—right here in
    Valdosta. She is also eager to share her enthusiasm for STEM with younger kids and envisions a future as a mentor or teacher who makes science approachable and fun. Her competitive spirit fuels a desire
    to tackle challenging projects, while her practical mindset ensures she wants a career that benefits her neighborhood and reflects her organized, reliable nature.
