persona_description: A scientist or environmental engineer who is interested in the study of acid mine drainage and its impact on hydrologic transport and chemical reactions. They are likely to be interested
  in the results of the experiments conducted in St. Kevin Gulch, particularly in the subreaches affected by acidic inflows, and in the comparison between hydrologic transport and chemical reactions in
  determining metal concentrations. They would also be interested in the processes that occur on a stream-reach scale, such as the removal of SO4, Mn, Fe, and Al with first-order reactions, and the simulation
  of these processes to reproduce the steady-state profiles.
