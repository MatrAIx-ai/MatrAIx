persona_description: A University of Houston professor who studies consumer behavior and perceptions about athletes with disabilities, particularly wheelchair athletes. His research interests include promoting
  the sport of wheelchair rugby and increasing resources and support for athletes with disabilities. He is conducting a study to measure consumer perception of wheelchair athletes and their athletic abilities,
  and is directing a summer camp for young athletes with disabilities.
