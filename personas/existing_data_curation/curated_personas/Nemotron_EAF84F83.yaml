personas:
  professional: Lingling Choi is a data‑driven HR specialist who harnesses meticulous planning, multilingual cross‑cultural communication, and a competitive drive to design streamlined onboarding processes,
    generate actionable people analytics, and spearhead inclusive talent initiatives.
  sports: Lingling Choi hits the American River Parkway trails for weekend hikes, cycles with the Sacramento Cycling Club, follows the Sacramento Kings for basketball, and occasionally joins a co‑ed recreational
    volleyball league at the local community center.
  arts: Lingling Choi immerses themselves in contemporary indie music, frequently streaming artists like Phoebe Bridgers and Khruangbin, attends local gallery openings featuring works by Yayoi Kusama and
    Kehinde Wiley, and enjoys strategic board games such as Settlers of Catan with friends on Friday nights.
  travel: Lingling Choi prefers meticulously planned trips that balance cultural immersion with outdoor adventure, having explored the historic streets of Kyoto, trekked the Redwood National Park, and now
    dreams of a solo road trip along the Pacific Coast Highway from San Luis Obispo to Mendocino.
  culinary: Lingling Choi experiments in the kitchen by perfecting tangy kimchi and aromatic pho broth, frequently layering gochujang, lemongrass, and fresh herbs, and enjoys hosting fusion dinner parties
    where they combine rice‑paper rolls with bibimbap‑style fillings.
  core: Lingling Choi blends a methodical, data‑focused HR mindset with a love for solo hikes, strategic board games, and homemade fermented foods, all while juggling a competitive edge and a habit of double‑checking
    every spreadsheet before hitting send.
background:
  cultural: Lingling is a second-generation East Asian American with Korean heritage on her father’s side and Vietnamese roots from her mother. Raised in Sacramento’s vibrant Asian-American community, she
    grew up bilingual, speaking Korean and Vietnamese at home while mastering English in school. Family values of hard work, respect for elders, and community service shaped her outlook, yet her California
    upbringing fostered independence and a pragmatic mindset. She celebrates Lunar New Year, Korean Chuseok, and Vietnamese Tet, often sharing traditional foods and customs with friends. This bicultural
    experience informs her cross-cultural sensitivity at work and fuels her interest in fostering inclusive workplaces.
attributes:
