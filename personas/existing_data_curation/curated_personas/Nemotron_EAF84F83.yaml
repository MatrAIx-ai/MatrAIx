    Improvement (Lean/Six Sigma)'', ''Cross-cultural Communication'', ''Language Proficiency (English, Korean, Vietnamese)'', ''Strategic Workforce Planning'']'
  hobbies: '[''Hiking and Trail Biking'', ''Cooking Korean & Vietnamese Cuisine'', ''Yoga and Meditation'', ''Reading Business & Psychology Literature'', ''Strategic Board Games (e.g., Settlers of Catan)'',
    ''Language Learning (Korean, Vietnamese)'', ''Volunteer Mentoring for Youth'', ''Attending Local Cultural Festivals'', ''Podcast Listening (HR, Tech, Self-Improvement)'', ''Organizing Personal Productivity
    Systems'']'
  career_goals: Lingling aims to progress from her current HR specialist role to an HR manager position within the next three years, eventually becoming a director of People Operations. She plans to earn
    the SHRM‑CP and later the SHRM‑SAP certifications, deepen her expertise in people analytics, and lead organization-wide diversity, equity, and inclusion initiatives. In the longer term, she envisions
    launching a boutique HR consultancy that helps Sacramento’s growing small-business sector build data-informed talent strategies while preserving a people-first culture.
