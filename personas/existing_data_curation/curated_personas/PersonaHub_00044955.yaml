persona_description: A historian who specializes in the study of Irish and Irish-American history, particularly the events leading up to and during the Easter Rising of 1916 and the role of Irish ex-servicemen
  in the Great War. His research interests include the political and social context of these events, the impact of the Easter Rising on public opinion and the emergence of Sinn Féin as a major political
  party, and the role of the Irish ex-servicemen in the Great War in shaping Irish national identity and memory.
