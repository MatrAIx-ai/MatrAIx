    projects'']'
  career_goals: Nyamekyer aims to advance to a production supervisor role within the next three years, earn a Six Sigma Green Belt certification, and complete an associate’s degree in industrial technology.
    He is driven to lead process‑improvement projects that boost efficiency and quality, eventually moving into a plant‑manager position overseeing multiple production lines. In parallel, he dreams of launching
    a small workshop that creates handcrafted furniture, blending his production expertise with his artistic interests, and providing mentorship opportunities for younger workers in his community.
