  hobbies: '["Cooking Mexican cuisine", "Salsa dancing", "Karaoke", "Volunteering at community events", "Road trips and scenic drives", "DIY car maintenance", "Reading contemporary fiction", "Hiking local
    trails"]'
  career_goals: Nora aims to move into a senior transportation coordinator role within the Rockford School District, where she can design safer, more efficient bus routes and mentor new drivers. She plans
    to complete her associate degree in transportation logistics and obtain a commercial driver’s license endorsement for larger vehicles. Long‑term, she hopes to become a certified trainer for the district’s
    driver training program and perhaps serve as a union representative, advocating for better working conditions and safety resources for fellow bus operators. Nora also dreams of launching a community‑focused
    after‑school ride program that provides reliable transportation for students in underserved neighborhoods.
