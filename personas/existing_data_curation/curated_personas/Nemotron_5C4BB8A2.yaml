personas:
  professional: Nora Capdevilla leverages over a decade of safely operating a Rockford school bus, her bilingual communication and first‑aid certification, and her naturally talkative, people‑centered demeanor
    to keep students secure, mentor new drivers, and lead on‑board safety talks while casually juggling route planning.
  sports: Nora Capdevilla enjoys weekend hikes on the Rock River trails, follows the Chicago Cubs and Bears, participates in the local Rockford Trail Runners club, and they incorporate active dance warm‑ups
    into community kids’ classes as a fun way to stay fit.
  arts: Nora Capdevilla energizes community events by teaching salsa and cumbia dance, leading lively karaoke nights, and immersing in classic Latin pop icons like Celia Cruz and romantic authors such as
    Nicholas Sparks, all of which they use to fuel their expressive and outgoing nature.
  travel: Nora Capdevilla prefers spontaneous road trips in their sedan, planning weekend getaways to nearby spots like the Wisconsin Dells, Minnesota’s lake region, or a music‑filled weekend in Austin,
    and they balance modest budget constraints with a love for scenic drives and cultural experiences.
  culinary: Nora Capdevilla masterfully prepares tamales, pozole, and mole using masa harina, dried ancho chiles, Mexican chocolate, fresh cilantro, and roasted tomatillos for salsa, and they regularly
    host potlucks that showcase these traditional dishes for family and neighbors.
  core: Nora Capdevilla is a sociable bus driver and community dance leader who blends curiosity with practical hands‑on skills, juggling a love for cooking, car tinkering, and spontaneous road trips while
    occasionally forgetting to keep a tight schedule, and they embrace every moment with vibrant enthusiasm.
background:
  cultural: Nora was raised in a close‑knit Mexican-American family in Rockford; her parents emigrated from Jalisco and kept many traditions alive at home. She grew up speaking Spanish with her grandparents
    and celebrating holidays like Día de los Muertos, Cinco de Mayo, and the Feast of Our Lady of Guadalupe, often hosting community gatherings with music, dance, and homemade foods. This bicultural upbringing
    gave her a strong sense of pride in her heritage while also integrating into the broader Midwestern lifestyle. Nora participates in the local Mexican cultural society, helping organize annual festivals
    and teaching younger members about traditional crafts and stories. Her bilingual ability and cultural fluency are a daily asset in her role as a school bus driver, where she bridges the gap between
    the school district and the diverse families she serves.
