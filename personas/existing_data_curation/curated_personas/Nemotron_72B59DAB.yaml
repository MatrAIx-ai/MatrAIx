  hobbies: '[''gallery visits'', ''community theater attendance'', ''art postcard collecting'', ''cooking Mexican cuisine'', ''guitar playing'', ''open‑mic performances'', ''evening walks'', ''reading historical
    fiction'', ''vegetable gardening'']'
  career_goals: Juan aims to advance from a material mover to a supervisory role within the next three years, seeking certification as a Certified Forklift Trainer and completing a Supply Chain Management
    certificate program at a local community college. He aspires to become a warehouse shift lead, where he can apply his methodical planning skills to improve workflow efficiency and safety. Long‑term,
    Juan envisions starting a small logistics consulting firm that helps regional warehouses adopt lean processes while also advocating for mental‑health support programs for manual‑labor workers, reflecting
    his personal experience with anxiety and distress.
