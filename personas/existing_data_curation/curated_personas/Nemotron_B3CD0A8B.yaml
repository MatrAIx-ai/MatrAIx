  hobbies: '[''Hiking'', ''Bird-watching'', ''Photography'', ''Reading (historical nonfiction, contemporary fiction)'', ''Knitting'', ''Pottery'', ''Community gardening'', ''Small-group book club'']'
  career_goals: She plans to obtain her GED within the next year and enroll in a hospitality certification program at a nearby community college. In the medium term, Dena aims to progress to a supervisory
    or floor manager role at a larger restaurant or lodge that serves tourists in Eastern Oregon, allowing her to blend practical experience with her interest in culinary trends. Long term, she envisions
    opening a small farm-to-table café that showcases locally sourced ingredients while preserving the flexible schedule she values.
