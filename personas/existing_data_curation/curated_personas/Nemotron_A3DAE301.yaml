    Video Gaming'']'
  career_goals: Jeremiah aims to build a long‑term career in facilities management. In the next two years he plans to earn a Certified Building Service Manager (CBSM) credential and complete an OSHA 30‑hour
    safety course. He hopes to be promoted to shift supervisor, overseeing a team of cleaners and handling scheduling, training, and quality control. Over the longer term—five to eight years—he aspires
    to become a facilities coordinator or building manager, where he can incorporate his practical maintenance knowledge, improve energy‑efficiency programs, and ensure a safe, well‑kept environment for
    tenants. He also dreams of eventually starting his own small cleaning business that serves local schools and churches, allowing him to use his reliable work ethic while providing steady jobs for his
    community.
