personas:
  professional: Jeremiah Tray is a disciplined building cleaner in Bridgeport, MI, who leverages his mastery of routine cleaning protocols, equipment maintenance, and minor repairs to pursue Certified Building
    Service Manager certification, a shift‑supervisor role, and eventually launch a community‑focused cleaning business.
  sports: Jeremiah Tray is an avid weekend angler on the Cass River, a faithful fan of the Detroit Tigers and his local high school football team, and a regular participant in a Saturday softball league
    with coworkers.
  arts: Jeremiah Tray’s artistic side shines through a curated collection of classic rock vinyl—spinning Led Zeppelin, The Who, and Pink Floyd—and a Saturday night ritual of watching retro comedies like
    Airplane! and The Big Lebowski with friends, while his woodworking hobby adds a tactile dimension to his appreciation of functional art.
  travel: Jeremiah Tray prefers low‑key road trips that blend fishing and camping, having explored Michigan’s Sleeping Bear Dunes and Upper Peninsula’s Pictured Rocks, taken a weekend drive to Chicago’s
    lakefront, and dreaming of a fall foliage tour through New England’s White Mountains, all organized with meticulous itineraries and a modest budget.
  culinary: Jeremiah Tray enjoys cooking practical, farm‑to‑table meals—grilling freshly caught catfish seasoned with smoked paprika, tossing home‑grown tomatoes, peppers, and basil into a rustic salsa,
    and preparing hearty meatloaf with rosemary potatoes—showcasing a solid yet modest culinary skill set that mirrors his hands‑on hobbies.
  core: Jeremiah Tray is a methodical hands‑on fixer who balances reliable routine with quiet passions for classic rock, fishing, and modest woodworking, turning everyday tasks into steady progress.
background:
  cultural: Jeremiah comes from a modest, working‑class family in Bridgeport, a small town in Saginaw County, Michigan. His ancestry is primarily of German and Irish descent, common in the region. He was
    raised in a community that values hard work, practicality, and neighborly support—traits reflected in the region’s industrial‑manufacturing history and the “Rust Belt” culture. Raised in a Protestant
    (Methodist) household, he attended local public schools and participated in community events such as high‑school football games, the summer county fair, and Fourth‑of‑July fireworks. The cultural emphasis
    on reliability, routine, and cooperation has shaped his worldview and everyday habits.
