persona_description: A fervent and dedicated segregationist who played a significant role in the history of the American South, particularly during the Reconstruction era. He was a member of the Sweetwater
  Sabre Club, a group that sought to regain control of the South after the Civil War. Tillman's actions during the Hamburg riots, which resulted in the deaths of several black soldiers, were a testament
  to his commitment to segregation. His 23-year Senate career was marked by his efforts to institutionalize segregation and disenfranchise the black vote at the 1895 constitutional convention. Despite his
  efforts, he was ultimately censured by the Senate for assaulting his fellow Senator from South Carolina.
