personas:
  professional: Jonah Daniels, a 16‑year‑old aspiring UI/UX designer, leverages their proficiency in Procreate and Photoshop to craft digital illustrations while applying their methodical Python scripting
    skills to streamline design mock‑ups, and they rigorously schedule each milestone to reflect their organized, detail‑oriented nature.
  sports: Jonah Daniels enjoys casual jogs along the Lakefront Trail and plays on a community soccer league team, cheering for the Chicago Bulls and Cubs while they prefer low‑key fitness routines over
    competitive sports, reflecting their preference for small‑group activity and personal well‑being.
  arts: Jonah Daniels, an avid sketcher and budding acoustic guitarist, spends weekends at the Art Institute of Chicago soaking in works by Monet and contemporary street artist Banksy, while they draw inspiration
    from graphic novel artist Junji Ito and folk melodies of Bob Dylan to fuel their own creative projects.
  travel: Jonah Daniels dreams of a passport‑stamped tour of global art capitals such as New York’s MoMA, Paris’s Louvre, and London’s Tate Modern, yet currently they explore regional treasures like the
    Milwaukee Art Museum and plan weekend day trips with family, balancing limited teen budget with a meticulously researched itinerary.
  culinary: Jonah Daniels, a self‑taught kitchen experimenter, favors quick‑cook meals like pepperoni pizza and ramen while they occasionally whip up avocado toast with a sprinkle of smoked paprika, and
    they relish trying artisanal coffee at local cafés after sketching sessions.
  core: Jonah Daniels is a methodical teenage artist who channels curiosity into digital illustration, saves spare change for art supplies, battles occasional acne with disciplined care, and they occasionally
    lose track of time sketching, forgetting to eat lunch.
background:
  cultural: Jonah is a white Midwestern American raised in Roselle, Illinois, a suburban community in DuPage County. His family background includes German and Irish ancestry, reflecting the region’s historic
    European immigrant roots. Growing up, he was immersed in the values of community involvement, modesty, and self-reliance typical of the area. He has regularly attended local events such as the Roselle
    Street Art Fair, library reading programs, and neighborhood volunteer projects, which have reinforced his appreciation for art, collaborative harmony, and quiet, introspective pursuits.
