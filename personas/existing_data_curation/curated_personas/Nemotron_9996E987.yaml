  career_goals: Jonah aims to earn his GED within the next year and enroll in a community college program focused on graphic design or visual arts. He plans to build a professional portfolio that showcases
    his illustration and UI/UX concepts, seek an internship at a local design studio, and eventually secure a role as a junior UI/UX designer or museum exhibit coordinator. He also hopes to travel to major
    art hubs to broaden his artistic perspective and to mentor younger students in his community through art workshops.
