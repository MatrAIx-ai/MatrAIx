persona_description: A teacher who specializes in Geography Fieldwork, particularly in the areas of fieldwork assessment, teaching skills, and ensuring that fieldwork is fit for purpose and exam ready.
  This teacher has experience in leading fieldwork teaching in real-world locations and has expertise in the six stages of the fieldwork enquiry process. They have developed fieldwork enquiries rooted within
  the specification content of individual awarding organisations, and have designed fieldwork skills courses for A Level Geography, which help students prepare for their independent investigation.
