personas:
  professional: Bennett Perez, a 24‑year‑old network administrator in a small Alabama firm, leverages his methodical troubleshooting, Cisco and Linux expertise, and his love for creative problem‑solving
    to design resilient LAN/WAN infrastructures while volunteering his clear documentation skills to teach seniors, though his worry about hidden bugs sometimes keeps him up late fine‑tuning scripts.
  sports: Bennett Perez plays midfield for the Clanton Thunder soccer league in the spring, follows Birmingham Legion FC and the New Orleans Pelicans for professional inspiration, and keeps fit by organizing
    post‑match barbecues at the local diner while also squeezing in weekend hikes at Oak Mountain, balancing competitive play with community camaraderie.
  arts: Bennett Perez brightens the Clanton community theater by designing lighting cues and building set props, sketches downtown Birmingham skylines inspired by the urban photography of Edward Burtynsky,
    and spends his free evenings listening to country storytellers like Sturgill Simpson and attending live shows by Luke Bryan, weaving tech‑savvy precision into his artistic pursuits.
  travel: Bennett Perez prefers carefully planned road trips with curated playlists, often weekend‑driving to the Appalachian foothills for drone photography, dreaming of a future hike through the Great
    Smoky Mountains and a cultural immersion in Nashville’s music scene, yet balances these ambitions with a modest travel budget that favors nearby state parks and occasional visits to Austin’s tech‑art
    festivals.
  culinary: Bennett Perez is a competent backyard griller who swears by smoked pork shoulder with a sweet tea glaze, delights in making pimento cheese dip for theater crew gatherings, experiments with chipotle‑marinated
    shrimp for weekend dinners, and occasionally ventures into baking cornbread muffins, showcasing a love for Southern comfort foods with a dash of tech‑inspired precision.
  core: Bennett Perez is a tech‑savvy Southern optimist who balances meticulous network engineering with a restless curiosity for art, community, and new challenges, even as lingering worries and occasional
    over‑caffeination keep his evenings lively.
background:
  cultural: Bennett grew up in a modest, middle‑class family in Clanton, Alabama, where Southern hospitality, close‑knit community ties, and a strong work ethic were daily norms. His upbringing was shaped
    by early Saturday mornings at church, family barbecues featuring smoked pork and sweet tea, and a deep respect for local traditions and histories. While his cultural roots are firmly Southern—reflected
    in his love for country music, regional cuisine, and storytelling—his career in network administration and his curiosity about art have broadened his perspective beyond the local enclave. He balances
    the values of humility and generosity learned from his community with an openness to unconventional ideas, often bringing a fresh, technologically‑savvy outlook to town events and volunteering initiatives.
attributes:
  skills: '[''Network design and implementation'', ''Cisco IOS configuration'', ''Windows Server administration (Active Directory, Group Policy)'', ''Linux server management (Ubuntu, CentOS)'', ''Virtualization
    (VMware ESXi, Hyper‑V)'', ''Cloud services basics (AWS, Azure)'', ''Network security fundamentals (firewalls, VPN, IDS/IPS)'', ''Scripting and automation (PowerShell, Bash, Python)'', ''Remote monitoring
    and troubleshooting (SNMP, RMM tools)'', ''Technical documentation and change management'', ''Project coordination and ticketing'', ''Customer support and communication'', ''Team training and mentorship'',
    ''Stress‑aware incident response'', ''Time‑management and systematic planning'']'
  hobbies: '[''Community theater lighting and set design'', ''Digital photography and sketching'', ''Soccer league participation'', ''Custom PC building'', ''Arduino/Raspberry Pi tinkering'', ''Drone piloting'',
    ''Live music concerts'', ''Board‑game nights'', ''Teaching computer basics to seniors'', ''Hiking in Oak Mountain State Park'', ''Fishing at Cahaba River'']'
  career_goals: In the next 2‑3 years, Bennett aims to earn Cisco CCNP and CompTIA Security+ certifications and transition into a senior network engineer role where he can lead design projects and mentor
    junior staff. He plans to deepen his expertise in cloud networking and obtain an AWS Solutions Architect or Azure Administrator credential, positioning himself for a future move into hybrid cloud infrastructure
    or network security architecture. Over the longer term, Bennett envisions becoming an IT manager or running a boutique consulting practice that helps small businesses in rural Alabama modernize their
    networks while integrating creative technology solutions such as interactive art installations or community Wi‑Fi projects. He also hopes to contribute to local workforce development by teaching networking
    fundamentals at his county’s community college.
