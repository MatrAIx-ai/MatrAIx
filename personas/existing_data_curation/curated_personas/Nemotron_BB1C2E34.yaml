  hobbies: '["Reading Contemporary Fiction and Historical Biographies","Gardening (Vegetable and Herb Garden)","Lake Erie Shoreline Walks and Nature Photography","Yoga and Mindfulness Practice","Cooking
    Midwestern Comfort Food","Small-Group Book Club"]'
  career_goals: Miranda aims to transition into an instructional leadership role within the next five years. She plans to earn a master’s degree in Educational Leadership, become a lead teacher or curriculum
    specialist for her district, and eventually serve as an assistant principal. She is passionate about fostering a culture of inquiry and practical problem‑solving among teachers, developing STEAM initiatives
    that draw on the local environment of Lake Erie, and mentoring new educators. Long‑term, she hopes to influence district‑wide policy to support inclusive, evidence‑based practices while maintaining
    a hands‑on connection to classroom teaching.
