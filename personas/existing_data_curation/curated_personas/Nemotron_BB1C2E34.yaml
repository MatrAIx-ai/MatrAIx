personas:
  professional: Miranda Mills, a 32‑year‑old elementary and middle‑school teacher in Ohio, leverages her curiosity and practical organization to design differentiated curricula, manage classrooms with calm
    authority, and integrate technology like Google Classroom while they mentor peers through collaborative planning.
  sports: Miranda Mills stays active by walking the Lake Erie shoreline with the Lake Erie Trail Hiking Club each spring, attending weekly yoga sessions, cheering for the Cleveland Guardians in baseball
    and the Ohio State Buckeyes during college football season, and they occasionally join a community kayaking group in summer.
  arts: Miranda Mills enriches her quiet evenings with contemporary literary fiction like Sally Rooney’s 'Normal People' and historical biographies of Frederick Douglass, captures birdlife through photography
    inspired by Audubon, enjoys concerts by the Cleveland Orchestra, and they often study the cinematography of Greta Gerwig’s films.
  travel: Miranda Mills prefers low‑stress, off‑peak travel, having taken weekend retreats to Mackinac Island’s car‑free streets and a sabbatical in the British countryside to explore historic estates,
    while they dream of a springtime garden tour of Kyoto’s temple grounds.
  culinary: Miranda Mills delights in cooking comfort meals with a Midwestern twist, often preparing tomato‑basil chicken stew using garden‑grown tomatoes and herbs, hearty bean chili with locally sourced
    kale, and they bake cornbread topped with fresh garlic chives.
  core: Miranda Mills blends quiet curiosity with practical organization, tending a garden, shaping inclusive curricula, and planning for instructional leadership while savoring nightly reads, a penchant
    for budgeting spreadsheets, and a quirky habit of talking to their houseplants.
background:
  cultural: Miranda comes from a white, Midwestern American background with roots in German and Irish ancestry. Raised in a small community near Cleveland, she grew up with the values of hard work, modesty,
    and community service that characterize the Lake Erie region. Her family has a tradition of attending church (Methodist), celebrating holidays such as Thanksgiving and Fourth of July with communal potlucks,
    and supporting local high‑school sports and county fairs. These cultural influences shape her emphasis on reliability, practical problem‑solving, and a collaborative yet respectful approach to both
    her personal and professional life.
attributes:
  skills: '["Curriculum Development","Differentiated Instruction","Classroom Management","Educational Technology Integration","Reading and Math Interventions","Assessment Design","Data-Driven Instruction","Parent-Teacher
