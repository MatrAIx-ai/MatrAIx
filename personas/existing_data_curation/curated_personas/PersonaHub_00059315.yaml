persona_description: A professional in the field of environmental radiation, focusing on the evaluation of potential radiological doses in the near (<10 km) environment of radioactive releases, especially
  postulated accident releases. They are knowledgeable in the use of the COMRADEX_IV code, which is available from the National Energy Software Center, Argonne National Laboratory, and Rockwell International,
  Atomics International Division. They are skilled in coding in Fortran IV and IBM 360/370 computers, and have experience with numerical methods for solving quasi-linear equations. They are also proficient
  in meteorological dispersion calculations and have expertise in the use of the Gaussian cloud model for calculating gamma-ray doses. They have a strong understanding of the limitations and restrictions
  of the COMRADEX_IV code, and are familiar with the typical running time and computer hardware requirements. They have a detailed knowledge of the contents of the code package, including the source codes
  and sample problem input and output, and are familiar with the date of the abstract.
