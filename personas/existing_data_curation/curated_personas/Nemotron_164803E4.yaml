personas:
  professional: Amanda Bonner, a seasoned industrial engineer specializing in occupational health and safety, merges rigorous audit expertise and ergonomic design with a relaxed, adaptable problem-solving
    style, allowing them to champion mental-health-aware safety programs, mentor emerging engineers, and pursue Certified Safety Professional credentials.
  sports: Amanda Bonner stays active through the Hudson Valley Walking Group's early-morning hikes, follows the New York Rangers on ice and the New York Giants during football season, and occasionally joins
    a community yoga class, preferring steady, solitary movement over competitive sports.
  arts: Amanda Bonner channels their creative side through DSLR landscape photography inspired by Ansel Adams, savors the prose of Rachel Carson and John Muir, knits while listening to folk-rock legends
    like The Avett Brothers, and attends the modest annual Saratoga Arts & Crafts Fair to support local artisans.
  travel: Amanda Bonner prefers quiet, small-group trips, relishing weekend drives to the Catskills and seasonal visits to Acadia National Park, while dreaming of a slower-paced pilgrimage through England's
    Lake District to study historic industrial sites and write in a cottage by the water.
  culinary: Amanda Bonner loves farm-to-table cooking, often baking apple-cinnamon crumble from orchard harvest, simmering heirloom tomato soup with fresh basil and mozzarella, and perfecting a rustic sourdough
    loaf, yet occasionally succumbs to the comfort of reheated chicken pot pie from a local diner.
  core: Amanda Bonner is a meticulous yet easy-going safety engineer who balances a deep love for nature and quiet contemplation with an earnest drive to protect workers' well-being, even as anxiety and
    a habit of misplacing keys keep life delightfully unpredictable.
background:
  cultural: Amanda comes from a multi‑generational white American family that settled in upstate New York in the early 20th century. Raised in a small town near Saratoga County, she absorbed the region’s
    values of hard work, self‑reliance, and community stewardship. Her upbringing blended traditional Protestant ethics with a pragmatic, hands‑on approach to problem solving common among the industrial
    towns of the Northeast. Though she respects these roots, she embraces progressive ideas about workplace well‑being and environmental stewardship, reflecting the evolving cultural fabric of her suburban‑rural
    community.
attributes:
  skills: '[''Process Optimization'', ''Industrial Safety Audits'', ''Regulatory Compliance (OSHA, ISO 45001)'', ''Ergonomic Assessment'', ''Risk Management'', ''Data Analysis (Excel, Minitab)'', ''Lean
    Six Sigma (Green Belt)'', ''Project Coordination'', ''Technical Report Writing'', ''Team Training and Mentorship'', ''Incident Investigation'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Hiking'', ''Reading'', ''Photography'', ''Knitting'', ''Baking'', ''Mindfulness meditation'', ''Community safety workshops'']'
  career_goals: She aims to obtain Certified Safety Professional (CSP) credentials within the next two years and transition into a senior safety manager role that oversees both physical and psychosocial
    risk programs. Amanda wants to champion mental‑health‑aware safety policies, mentor emerging engineers and safety officers, and lead a company‑wide sustainability initiative that reduces workplace injuries
    while lowering environmental impact. In the longer term, she envisions consulting part‑time for small manufacturers in upstate New York, helping them adopt flexible, evidence‑based safety practices.
