persona_description: A geologist who specializes in the study of the geology and oceanography of the western Arctic Ocean, specifically focusing on the distribution and faunal associations of benthic foraminifers.
  Their research interests include the quantitative analysis of benthic foraminifer distribution data from box core-top samples, the identification of distinct depth distributions of three dominant benthic
  foraminifer assemblages, and the comparison of these distributions with observations from other regions within the Arctic Ocean. They are likely to be familiar with the U.S. Geological Survey 1992 and
  1993 Arctic Cruise, the Polar Star icebreaker, and the collection of geophysical data, piston cores, and hydrographic data to address the geologic and oceanographic history of the western Arctic Ocean.
