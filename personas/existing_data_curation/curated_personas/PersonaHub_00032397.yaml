persona_description: A rice farmer who is interested in developing drought-tolerant, submergence-tolerant, and flood-tolerant varieties of rice, as well as varieties tolerant to salt stress and other problem
  soils. They are seeking opportunities to at least double the yield in these areas through the use of stress-tolerant varieties, and they are willing to use a wide range of genetic resources and advanced
  breeding techniques to achieve this goal. They are also interested in learning about the latest research and developments in rice breeding and genetics, and they are eager to contribute to the global
  effort to improve rice productivity and sustainability.
