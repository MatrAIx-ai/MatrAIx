  career_goals: Griselda aims to attend a specialized art high school where she can deepen her skills in illustration and interactive media. She envisions studying visual arts or game design at a university,
    ultimately working as a concept artist for video games or as an art director for a museum. She hopes to blend her love of art with community service, creating public art projects and workshops that
    engage youth in Philadelphia and give a voice to underrepresented perspectives.
