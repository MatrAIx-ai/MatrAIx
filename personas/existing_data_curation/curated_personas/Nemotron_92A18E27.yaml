personas:
  professional: An emerging visual artist and young coder, Griselda Kline merges watercolor sketches with digital art experiments in Scratch, the disciplined organization of their Moleskine notebook contrasting
    with bold, unconventional storyboarding in community craft workshops, and they often share progress updates on a school art blog.
  sports: An avid fan of the Philadelphia 76ers and a participant in the local high school track club, Griselda Kline enjoys weekend morning runs, occasionally joins a community yoga class for flexibility,
    and they support the Philadelphia Union soccer team while preferring low‑impact activities that fit their reserved, balanced lifestyle.
  arts: A dedicated art enthusiast, Griselda Kline frequents the Philadelphia Museum of Art, draws inspiration from graphic novelists like Neil Gaiman and Marjane Satrapi, admires painters such as Hayao
    Miyazaki's anime aesthetics, and they unwind to piano pieces by Debussy and Yiruma, letting these influences shape their own sketching and storytelling.
  travel: A thoughtful explorer, Griselda Kline visits local historic neighborhoods like Old City on First Fridays, dreams of a summer trip to Paris to see the Louvre and sip café au lait, has already taken
    a school field trip to Washington, D.C., and they prefer carefully planned itineraries over spontaneous backpacking, balancing family budget constraints with a love for cultural immersion.
  culinary: A budding home cook, Griselda Kline delights in making avocado toast topped with radish slices, perfecting blueberry pancakes on Sunday mornings, enjoys savoring pepperoni pizza with extra cheese
    after art projects, and they experiment with simple sushi rolls like the California roll, all while favoring fresh strawberries and carrots as snack staples.
  core: Griselda Kline blends a disciplined love for sketching with a quiet curiosity for digital art, often staying up late perfecting watercolor washes while they occasionally neglect chores in favor
    of museum strolls.
background:
  cultural: Griselda was raised in a middle‑class white family in Philadelphia, with roots tracing back to European‑American (German and Irish) ancestry. Her family places a high value on education, community
    involvement, and the arts, and they regularly participate in local traditions such as First Friday art walks and enjoying regional foods like cheesesteaks. Living in a culturally diverse city, she has
    been exposed to a wide range of artistic expressions and perspectives, which has broadened her appreciation for different cultures while maintaining a strong connection to her own family’s heritage.
