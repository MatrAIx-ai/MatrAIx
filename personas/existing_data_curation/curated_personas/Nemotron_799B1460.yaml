  hobbies: '[''Mixed‑media art'', ''Street mural exploration'', ''Contemporary art gallery visits'', ''Reading philosophy and science fiction'', ''Playing tabla'', ''Electronic music production'', ''Cooking
    South Indian dishes'', ''Cooking Middle Eastern dishes'', ''Hiking in Santa Clarita hills'', ''Meditation and yoga'', ''Photography'', ''Indie filmmaking'']'
  career_goals: Jayaraman aspires to become a senior creative lead at a boutique agency that values experimental design and cultural storytelling. In the next five years he aims to launch his own freelance
    studio focused on immersive branding for South Asian diaspora startups and social impact projects. He wants to be recognized in design circles for integrating abstract concepts with culturally resonant
    imagery, mentor emerging designers, and eventually teach workshops on creative spontaneity and emotional expression in visual communication. Improving his project management and deadline‑orientation
    while maintaining his artistic freedom is a personal growth target.
