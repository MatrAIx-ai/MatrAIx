personas:
  professional: Jayaraman Khalid is a 26‑year‑old graphic designer who blends South Asian calligraphy with contemporary visual storytelling, leveraging Photoshop, Illustrator, After Effects, and basic HTML/CSS
    to craft immersive branding, and they thrive on spontaneous rapid prototyping even as it sometimes clashes with tight client deadlines.
  sports: Jayaraman Khalid channels kinetic energy into weekend hikes through the Santa Clarita hills, plays pickup basketball with the local Santa Clarita Hornets, and follows the Los Angeles Lakers and
    LA Galaxy with fervor, and they maintain a flexible fitness routine that leans more toward mindful movement than regimented training.
  arts: Jayaraman Khalid immerses themselves in LA's vibrant art scene, drawing inspiration from street murals by Banksy, mixed‑media installations at the Museum of Contemporary Art, and the experimental
    sounds of Tycho, and they curate indie film playlists while documenting candid moments with a Nikon Z6.
  travel: Jayaraman Khalid prefers spontaneous, culturally immersive trips, having explored the bustling souks of Marrakech, the neon streets of Tokyo, and the serene backwaters of Kerala, and they often
    plan last‑minute itineraries that blend photography expeditions with visits to local art studios.
  culinary: Jayaraman Khalid enjoys cooking at a moderate skill level, mastering South Indian dishes like dosa with fermented rice‑lentil batter and Middle Eastern staples such as hummus infused with smoked
    paprika, and they often experiment with fusion aromas of curry leaves and za'atar in their kitchen.
  core: Jayaraman Khalid is a creatively restless 26‑year‑old designer who balances vivid cultural expression with bouts of anxiety, impulsive spending, and a love for spontaneous art, travel, and culinary
    experiments, and they constantly seek harmony between freedom and responsibility.
background:
  cultural: Jayaraman was raised in a multicultural South Asian household in Southern California. His father, a Tamil‑speaking immigrant from Sri Lanka, instilled an appreciation for classical Indian art,
    festivals like Diwali, and the Tamil language, while his mother, of Indian Muslim descent, introduced him to Arabic calligraphy, Eid celebrations, and Urdu poetry. Bilingual in English and Tamil, he
    grew up navigating both South Asian traditions and the diverse cultural landscape of Los Angeles County. Community gatherings at local temples and mosques, participation in cultural festivals, and family
    meals centered on traditional cuisine shaped his values of harmony, respect for elders, and collaborative spirit. These influences permeate his design aesthetic, where he often blends Tamil motifs and
    Islamic geometric patterns with contemporary graphic trends.
