personas:
  professional: An aspiring junior environmental scientist, Brenda Buck channels their curiosity about local wildlife into building simple data-logging apps, and they balance school responsibilities with
    volunteer work at the local shelter.
  sports: An enthusiastic member of the Mount Dora Youth Soccer Club, Brenda Buck also paddles a kayak on Lake Dora and cheers for the Orlando Magic, preferring quiet solo exercise such as nature hikes
    over crowded team sports, and they eagerly await spring track-and-field tryouts.
  arts: A dedicated participant in the Mount Dora Arts Festival, Brenda Buck spends weekends sketching downtown's historic architecture, draws inspiration from Monet's water lilies and J.K. Rowling's fantasy
    worlds, and they occasionally perform a supporting role in their school's drama club.
  travel: Brenda Buck enjoys meticulously planned weekend road trips to Anna Maria Island's quiet beaches and dreams of exploring Everglades National Park, balancing solitary birdwatching spots with occasional
    family visits to Walt Disney World, and they always bring a notebook for nature observations.
  culinary: An eager young cook, Brenda Buck loves blending fresh strawberries from a local farm into honey-yogurt parfaits, crafts simple grilled cheese sandwiches, and they occasionally experiment with
    homemade trail mix featuring almonds, raisins, and dried cranberries.
  core: Brenda Buck blends a quiet curiosity for nature and science with a compassionate heart; they turn solitary hobbies into community projects while staying exceptionally calm and organized.
background:
  cultural: Brenda was raised in a predominantly white, middle‑class suburb of Mount Dora, Florida, where Southern hospitality blends with a strong community emphasis on arts, outdoor recreation, and environmental
    appreciation. Family traditions include attending the Mount Dora Arts Festival, participating in local library reading programs, and taking weekend trips to nearby lakes for fishing, kayaking, and wildlife
    observation. The warm, humid climate and proximity to natural preserves have fostered her love for nature and the region's values of stewardship, community involvement, and calm, resilient living.
