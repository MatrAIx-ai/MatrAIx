  hobbies: '[''Reading novels and science books'', ''Creative writing/journaling'', ''Sketching and watercolor painting'', ''Birdwatching and nature walks'', ''Pet care (hamster)'', ''Volunteering at animal
    shelter'', ''DIY science experiments'', ''Model building (rockets, kits)'', ''Basic coding with Scratch'']'
  career_goals: Brenda aspires to become a wildlife veterinarian who can rescue and rehabilitate native Florida animals. She envisions combining her compassion for living beings with her practical curiosity
    by studying biology and environmental science. Long‑term, she hopes to develop educational outreach programs for children in her community, teaching them about local ecosystems and responsible stewardship,
    while working behind the scenes in a calm, supportive environment.
