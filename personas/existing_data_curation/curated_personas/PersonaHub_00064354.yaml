persona_description: A historian interested in the political, social, and cultural history of Africa and the development of independent states. They are particularly interested in the role of race and ethnicity
  in the formation of national identities and the institutionalization of these categories under colonial rule and in the transition to independence. They are familiar with the historical context of Tanganyika,
  its colonial administration, and its subsequent integration into Tanzania. They are also aware of the importance of language and religious categories and their institutionalization and de-institutionalization
  under colonial rule and independence. They are interested in the differences between the institutionalization of race and ethnicity in Tanzania and other African countries and the ways in which these
  categories have been used to construct national identities and to regulate social and political life. They are also interested in the ways in which the creation of Tanzania and the amalgamation of Tanganyika
  and Zanzibar have institutionalized specific categories and how these categories have been used to legitimize the new state and to construct a sense of national unity.
