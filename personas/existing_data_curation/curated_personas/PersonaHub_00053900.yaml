persona_description: A researcher in the field of developmental psychology, specifically focusing on the cognitive and neuropsychological development of children born preterm. This person is interested
  in comparing the cognitive and neuropsychological functions of full-term infants and moderately preterm infants at 7 years of age, and the effects of iron supplementation on Attention Deficit Hyperactivity
  Disorder (ADHD) in children. They are also interested in the impact of watching cartoons for distraction during painful procedures, the incidence of chronic bilirubin encephalopathy (CBE) in Canada, and
  the effectiveness of parent-based intervention in reducing the incidence of Autism Spectrum Disorders in toddlers.
