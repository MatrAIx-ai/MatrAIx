personas:
  professional: Dorothy Willis, an aspiring community health worker still in her freshman year of a Social Work degree, leverages her meticulous bullet‑journal planning, mastery of Notion and Trello, and
    natural empathy to coordinate small outreach events, draft grant‑ready reports, and provide peer counseling, all while holding herself to high standards of measurable impact.
  sports: Dorothy Willis follows the Houston Astros and Houston Rockets avidly, participates in a local weekend yoga class, takes evening jogs through Hermann Park, and joins a small community running club
    that meets twice a month, favoring low‑key, routine‑based fitness over competitive sports.
  arts: Dorothy Willis immerses herself in contemporary literature, quoting Jesmyn Ward and Ta‑Nahesi Coates, while also finding solace in the acoustic melodies of H.E.R., attending a quarterly poetry slam
    featuring spoken‑word artists like Danez Smith, and curating simple graphic flyers for local nonprofits using Canva.
  travel: Dorothy Willis enjoys thoughtfully planned short getaways, having spent a weekend exploring the historic French Quarter of New Orleans for its music and cuisine, dreaming of a solo hike through
    the Great Smoky Mountains, and balancing travel with a limited student budget.
  culinary: Dorothy Willis’s culinary repertoire centers on comfort dishes such as smoked collard greens, sweet‑potato pie, and black‑eyed peas stew, which she refines with nutrient‑dense twists like quinoa‑based
    salads and homemade ginger‑turmeric smoothies, reflecting a therapeutic blend of tradition and health consciousness.
  core: Dorothy Willis is a disciplined introvert whose curiosity fuels organized community‑service projects, mindful self‑care routines, and a quiet passion for soul‑food cooking and literary exploration.
background:
  cultural: Dorothy grew up in a close‑knit African‑American family in Humble, Texas, where church, family gatherings, and community solidarity are central pillars. Southern Black cultural traditions—gospel
    music, storytelling, and soul‑food cuisine—inform her daily life and values. Exposure to the diverse fabric of the greater Houston area has broadened her perspective, fostering an inclusive worldview
    while preserving a strong sense of cultural pride. Her family's legacy of resilience and mutual support underlies her compassionate nature and commitment to service, and she identifies with both historic
    civil‑rights movements and contemporary social‑justice activism, which shape her aspirations and community‑focused mindset.
attributes:
  skills: '["Time management", "Project planning and coordination", "Academic research", "Written communication", "Empathetic peer counseling", "Event organization", "Budget tracking", "Microsoft Office
    Suite", "Google Workspace", "Basic data analysis (Excel)", "Social media content curation", "Bullet journaling"]'
  hobbies: '["Reading contemporary and historical fiction", "Creative writing (poetry)", "Bullet journaling", "Cooking soul food and healthy meals", "Volunteering at community center", "Yoga and mindfulness
    practice", "Nature walks", "Listening to R&B/neo‑soul", "Digital art and graphic design", "Participating in small book clubs"]'
  career_goals: Dorothy aims to complete a bachelor's degree in Social Work or Public Health and obtain certification as a Community Health Worker. Her long‑term ambition is to lead a youth‑empowerment
    program within a Houston‑area nonprofit, designing evidence‑based outreach that blends innovative health‑promotion ideas with trusted community practices. She envisions advancing to a program‑director
    role, eventually pursuing a master's in Social Work to deepen her impact on health equity for underserved Black families in the region. Throughout her career, she seeks to maintain high standards, achieve
    measurable outcomes, and foster collaborative, harmonious team environments.
