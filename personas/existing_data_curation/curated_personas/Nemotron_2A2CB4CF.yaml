personas:
  professional: Costello Davis is a budding young engineer in preschool, turning building‑block projects into meticulously organized mini‑structures while delighting in discovering how magnets work.
  sports: Costello Davis loves weekend soccer practice with the Little Lions Soccer Club, splashes through swim lessons at the community pool, and cheers for the New York Yankees during baseball season.
  arts: Costello Davis bursts with creativity during preschool art hour, painting with washable watercolors, proudly displaying a crayon portrait of Elsa from Frozen, and enjoys listening to Disney’s “Let
    It Go” and the classic children’s album “Sing Along with The Wiggles.”
  travel: Costello Davis dreams of revisiting the marine world at the local aquarium, has already taken a family road trip to Grandma’s farmhouse in the countryside, and hopes to someday explore the ancient
    pyramids of Giza on a future school field trip.
  culinary: Costello Davis adores cheesy pizza slices, peanut butter and banana sandwiches, and takes pride in stirring batter for blueberry pancakes, while sometimes forgetting to finish vegetables like
    steamed broccoli on their plate.
  core: Costello Davis is a methodical, curious five‑year‑old who balances play with planning, saves sticker‑tuned pocket money, keeps a gentle eye on mild skin and allergy issues, delights in soccer and
    Disney melodies, and dreams of big‑world adventures while navigating the whimsical ups and downs of childhood.
background:
  cultural: Costello is raised in a Black family on Cleveland’s historic East Side, where his parents and grandparents celebrate African American traditions. He attends a local Baptist church that emphasizes
    gospel music, community service, and holiday gatherings. The family observes Juneteenth and Kwanzaa, enjoys soul‑food meals such as collard greens and cornbread, and often visits the Cleveland Museum
    of Natural History and the Museum of Art’s African American exhibits. These experiences give him a strong sense of cultural identity and community belonging.
attributes:
  skills: '[''Organizing toys and puzzles'', ''Letter recognition'', ''Counting to twenty'', ''LEGO Duplo building'', ''Following step‑by‑step instructions'', ''Asking exploratory questions'', ''Cooperative
    play'', ''Listening and following directions'']'
  hobbies: '[''LEGO Duplo building'', ''Drawing and coloring'', ''Reading picture books'', ''Playing soccer'', ''Singing songs'', ''Exploring nature trails'', ''Listening to family stories'']'
  career_goals: Costello dreams of becoming an architect so he can design the big buildings he imagines while playing with blocks, and he also hopes to be a teacher to help other children learn new things.
    He is fascinated by space and sometimes mentions wanting to be an astronaut, but he also expresses a desire to work in a community garden or a local library, reflecting his practical wish to contribute
    to his neighborhood and support others.
