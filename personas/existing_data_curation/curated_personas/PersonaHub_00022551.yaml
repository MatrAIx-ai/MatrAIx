persona_description: A researcher and author who specializes in studying the impact of social media on young people's behavior and online engagement. Her research has focused on the evolution of social
  media use among young technology users, particularly in the transition from college to life after college. Her most recent study, "Got Facebook?" examines how social media behaviors change in this transition
  and how they impact young people's lives. She is interested in understanding the nuances of social media behavior and the social consequences of social media use.
