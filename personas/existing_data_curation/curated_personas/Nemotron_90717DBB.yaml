  career_goals: Jeremy dreams of a future where he can combine his love of building, science, and leadership. He is fascinated by space and engineering, imagining himself as an aerospace engineer who designs
    rockets, but he also enjoys the idea of guiding a team, perhaps as a captain of a school robotics club or a future coach for a sports team. He aspires to be a problem‑solver who can plan projects from
    start to finish, mentor peers, and turn imaginative ideas into practical results. In the long term, he hopes to work on real‑world technology that helps people while also inspiring younger kids to explore
    science and teamwork.
