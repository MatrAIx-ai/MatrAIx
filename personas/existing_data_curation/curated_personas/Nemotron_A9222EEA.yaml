  hobbies: '[''Reading historical fiction'', ''Nature walks and bird‑watching'', ''Canoeing on local lakes'', ''Knitting and crocheting'', ''Genealogical research'', ''Participating in a small library study
    group'', ''Crossword puzzles'', ''Sudoku'', ''Mindfulness breathing exercises'']'
  career_goals: Despite being at a stage where many consider retirement, Tammy wishes to remain actively engaged in her work while shaping a smoother transition to a lighter schedule. Her short‑term goal
    is to take on a senior information‑clerk role that includes mentoring newer receptionists, sharing best practices in record‑keeping, and helping implement a modest digital archiving system for the county’s
    historical documents. She plans to complete an online certificate in archival management within the next year, reflecting her curiosity about preserving local heritage. In the medium term, Tammy hopes
    to shift to a part‑time arrangement that affords her flexibility for health appointments and personal projects. Ultimately, she aspires to retire from full‑time employment but stay connected to the
    community by volunteering as a genealogical‑research facilitator at the Lac du Flambeau public library, using her practical knowledge of municipal resources to assist others.
