personas:
  professional: Angela, an accounting clerk proficient in QuickBooks, Sage 50, and Excel macro automation, brings a curious design‑thinking mindset to financial reporting, often reorganizing spreadsheets
    into visually intuitive dashboards, while their relaxed approach to deadlines sometimes leads to a cluttered inbox that they later declutter during late‑night creative sketch sessions.
  sports: Angela, an enthusiastic hiker of Michigan’s state parks, joins the weekend Lakefront Striders running club, follows the Detroit Lions in the NFL and the Milwaukee Bucks in the NBA with casual
    devotion, and embraces cross‑country skiing during winter months to keep fit.
  arts: Angela, a frequent visitor of Detroit’s Museum of Contemporary Art, draws inspiration from Yayoi Kusama’s immersive installations, James Turrell’s light work, and photographer Alec Soth’s Great
    Lakes series, while listening to Sufjan Stevens and attending community theater productions by The Midwest Stage Company, which fuel her watercolor paintings and reflective blog posts.
  travel: Angela, who favors spontaneous weekend escapes over rigid itineraries, has toured the art districts of New York City and Barcelona, longs to capture autumn’s glow in Kyoto’s temple gardens, and
    often retreats to Door County’s lakeside cabins for a blend of nature, photography, and low‑cost artistic inspiration.
  culinary: Angela, whose kitchen skills hover between confident and experimental, routinely crafts quinoa bowls topped with lemon‑dill salmon and roasted asparagus, bakes an apple‑cinnamon crisp using
    fresh Michigan apples, but on hectic days opts for take‑out sushi or a quick espresso while she sketches.
  core: Angela, eccentrically curious yet charmingly disorganized, intertwines spreadsheets with sketchbooks, letting a competitive drive push ambitious CPA goals while occasional procrastination leads
    to last‑minute coffee‑fueled data crunches.
background:
  cultural: Angela grew up in a predominantly white, middle‑class suburb of the greater Detroit area, where the blend of industrial heritage and a supportive local arts community shaped her worldview. Her
    family emphasized hard work, self‑reliance, and community involvement, values that are reflected in her professional ethic and civic engagement. The Midwestern cultural traits of practicality and friendliness,
    combined with exposure to the region’s vibrant arts festivals and community events, fostered her appreciation for both numbers and creative expression.
