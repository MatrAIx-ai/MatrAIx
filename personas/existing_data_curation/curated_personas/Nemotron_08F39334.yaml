  career_goals: Angela aims to advance from her current clerk role to a senior accountant position within the next three years, pursuing a Certified Public Accountant (CPA) designation to deepen her analytical
    capabilities. She envisions eventually managing the finance department of a nonprofit arts organization, merging her passion for art with her accounting expertise. In the longer term, she hopes to open
    a boutique consulting practice that offers bookkeeping and financial advisory services to small creative enterprises, leveraging her competitive drive and desire for flexible, purpose‑driven work.
