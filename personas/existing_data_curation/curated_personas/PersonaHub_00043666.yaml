persona_description: A scientist who specializes in lipid metabolism and cell biology, particularly in the study of lipid synthesis and its regulation. The scientist has developed a method to isolate and
  analyze lipid synthesis organelles, including endoplasmic reticulum (ER) and lipid droplets (LDs). The scientist has also developed a high-throughput screening assay to rapidly validate the toxicity of
  e-liquids used in electronic cigarettes. The scientist has conducted research on the transfer of environmentally relevant concentrations of triclocarban (TCC) from mother to offspring in the mouse model
  and evaluated its bio-distribution after exposure using accelerator mass spectrometry (AMS).
