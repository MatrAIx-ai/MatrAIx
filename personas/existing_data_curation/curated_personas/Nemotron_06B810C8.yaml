    organization'', ''Community outreach'', ''Data entry automation'', ''Online scheduling platforms'']'
  hobbies: '[''Volunteering at senior center'', ''Organizing craft afternoons'', ''Health‑information sessions'', ''Water aerobics'', ''Community fitness classes'', ''Reading mystery and historical fiction'',
    ''Neighborhood book club'', ''Gardening (tomatoes, herbs, native flowers)'', ''Attending music festivals'', ''Food fairs'', ''Cooking classes (Southern and Caribbean cuisine)'']'
  career_goals: Brandi aims to leverage her extensive front‑office experience to move into a supervisory or office‑manager role within the next two to three years. She plans to earn a certificate in office
    administration and deepen her proficiency with advanced scheduling software and basic project‑management tools. Her long‑term ambition is to mentor new reception staff, develop streamlined onboarding
    processes, and eventually oversee a small team that supports a community‑focused organization, such as a senior center or local non‑profit. She also wishes to explore part‑time consulting, helping small
    businesses improve their front‑desk efficiency and customer‑service standards.
