personas:
  professional: Brandi Moore, a seasoned front‑desk specialist with expert proficiency in multi‑line phone management, Microsoft Office, and CRM tools, leverages her meticulous organization and assertive
    communication to streamline office operations, mentor new receptionists, and spearhead community outreach initiatives.
  sports: Brandi Moore participates in weekly water aerobics at the Riverview community pool, is a member of the local senior walking club that meets for early‑morning strolls along the river, and avidly
    follows the Miami Marlins and Orlando Magic, integrating low‑impact fitness into her routine while cheering on her favorite teams.
  arts: Brandi Moore immerses herself in the mystery and historical fiction world of authors like Agatha Christie and Hilary Mantel, enjoys live performances by local folk musicians at the Florida Folk
    Festival, and regularly discusses the latest novels with her neighborhood book club, which fuels her creative spirit.
  travel: Brandi Moore prefers planned, moderate‑duration trips that blend cultural exploration and relaxation, having recently toured Savannah’s historic district and the Bahamas, while dreaming of a culinary
    pilgrimage to New Orleans and a scenic drive through the Great Smoky Mountains.
  culinary: Brandi Moore delights in cooking Southern‑Caribbean fusion dishes such as jerk‑spiced shrimp over grits, peach cobbler with a hint of ginger, and herb‑infused tomato sauces using garden‑grown
    basil and cilantro, often experimenting in cooking classes that expand her palate.
  core: Brandi Moore is a meticulously organized, community‑driven front‑desk veteran who balances curiosity with practicality, thrives on social interaction, and occasionally overcommits to crafting projects,
    all while maintaining a disciplined financial and health regimen.
background:
  cultural: Brandi was raised in a middle‑class, white family in Central Florida, where Southern hospitality and a strong sense of community were emphasized. Her upbringing blended traditional Mid‑Southern
    values—respect for elders, personal responsibility, and a love of outdoor activities—with the multicultural flavor of modern Florida, exposing her to diverse cuisines and seasonal festivals. Although
    she identifies with mainstream American cultural norms, she has embraced the inclusive spirit of Riverview, participating in church gatherings, local fairs, and volunteer initiatives that reflect the
    region’s emphasis on neighborly support and civic engagement.
attributes:
  skills: '[''Front‑desk management'', ''Multi‑line phone handling'', ''Visitor reception'', ''Information triage'', ''Microsoft Office Suite'', ''Google Workspace'', ''Basic CRM tools'', ''Appointment
