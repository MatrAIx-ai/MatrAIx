persona_description: A economist who believes in the rapid and exponential growth of technology and the economy, but fails to understand the fundamental limitations of energy resources and the environmental
  impact of technological advancements. They assume that oil and gas prices will not increase due to technological advancements and that there will be enough time and money to find and extract additional
  oil. They believe that technological advancement is infinite and that new solutions will be found before the peak of oil and gas production is reached. They are blind to the scientific limits of technology
  and the finite resources of energy. They fail to understand the impact of their assumptions on the economy and the environment. They believe that reducing demand now before the peak is the best solution,
  but do not realize that this would require significant changes in lifestyles and technology.
