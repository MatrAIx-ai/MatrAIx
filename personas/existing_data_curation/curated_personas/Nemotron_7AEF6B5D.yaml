  career_goals: Jonas hopes to channel his artistic talent into a community‑focused venture. He aims to open a small gallery‑studio in Healdsburg where he can exhibit his own work, host rotating shows for
    local artists, and run creative‑writing workshops for teenagers. Parallel to that, he plans to earn a certified sommelier credential through a flexible program, allowing him to lead educational wine‑tasting
    sessions at the gallery and at community events. Over the next five years he aspires to become a recognized cultural catalyst in Sonoma County, facilitating collaborations between artists, vintners,
    and civic groups, and eventually mentor emerging creatives through a nonprofit arts program.
