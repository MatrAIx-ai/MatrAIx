  hobbies: '[''Reading adventure books'', ''Building LEGO sets'', ''Playing soccer'', ''Solving puzzles'', ''Drawing and coloring'', ''Exploring the local park'', ''Listening to music'', ''Watching documentaries'']'
  career_goals: Leonora dreams of becoming an astronaut or a mechanical engineer because she loves building things, figuring out how they work, and imagining journeys to space. She wants to win a school
    science fair with a project that demonstrates how rockets launch, and she hopes to earn a trophy in her soccer league to prove she can excel both mentally and physically. Occasionally she mentions wanting
    to be a veterinarian, combining her competitive drive to be the best at caring for animals with her curiosity about biology. Her ambitious goals are tempered by a realistic awareness that she needs
    to practice her math and reading regularly, especially when she worries about upcoming tests.
