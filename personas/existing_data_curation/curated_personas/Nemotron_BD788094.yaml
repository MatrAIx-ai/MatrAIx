personas:
  professional: Leonora Zinnermon is an aspiring astronaut in training whose love for adventure books, LEGO space stations, and puzzle solving fuels a practical, hands-on approach to learning about science,
    while their competitive streak pushes them to master each new concept even when their schedule feels a bit chaotic.
  sports: Leonora Zinnermon plays forward for the under-8 River Raptors soccer team, practices dribbling and footwork alone in the driveway, idolizes stars such as Alex Morgan and Lionel Messi, and their
    competitive nature drives them to strive for the captain's armband while they sometimes feel frustrated when teammates misplace passes.
  arts: Leonora Zinnermon is a budding visual storyteller who sketches original cartoon heroes, colors them with bright markers, and selects soundtracks ranging from classic Motown hits by The Supremes
    to contemporary hip-hop tracks by Lil Nas X, while nature documentaries about whales and galaxies inspire the fantastical worlds they draw.
  travel: Leonora Zinnermon enjoys spontaneous weekend trips to the nearby Rouge River park to hunt for interesting leaves and rocks, imagines a school field trip to the Kennedy Space Center in Florida,
    and daydreams about seeing the Northern Lights in Iceland, preferring hands-on exploration over tightly scheduled tours.
  culinary: Leonora Zinnermon loves helping to make pepperoni pizza from scratch, assembling fresh fruit salads with strawberries, bananas, and a drizzle of honey, and creating rainbow veggie wraps with
    carrots, cucumber, and hummus, yet they often skip the broccoli because they favor the crunch of apple slices.
  core: Leonora Zinnermon is a curious, competitive seven-year-old who blends imagination with practicality, dreaming of space while juggling LEGO builds, soccer drills, and occasional worry-filled moments.
background:
  cultural: Leonora’s cultural background is rooted in the African‑American community of Redford, a Detroit suburb. Her family celebrates traditions such as Sunday church services, neighborhood barbecues,
    and cultural holidays like Juneteenth and Kwanzaa, which emphasize unity, heritage, and resilience. She grows up listening to a blend of classic soul, Motown hits, and contemporary hip‑hop, a soundtrack
    that shapes her sense of rhythm and storytelling. Her parents encourage curiosity by taking her to the Detroit Public Library’s Children’s Programs, local science fairs, and community art workshops.
    The close‑knit neighborhood fosters a sense of belonging and mutual support, while also teaching her to navigate social dynamics with a healthy dose of skepticism—learning to "test" new friends through
    games before fully trusting them. These cultural influences complement her competitive drive, practical curiosity, and the occasional worry she feels about fitting in and succeeding academically.
attributes:
