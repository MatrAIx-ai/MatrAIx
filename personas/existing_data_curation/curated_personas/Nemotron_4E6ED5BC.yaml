personas:
  professional: A self‑directed teen web developer, Shelia Wright blends curiosity with practicality, using Python and HTML/CSS to build modest personal sites while methodically planning projects to secure
    a remote junior position that fits their preference for quiet, independent work.
  sports: A solitary fitness enthusiast, Shelia Wright enjoys early‑morning bird‑watching hikes across the Amarillo plains, participates in a local archery club on weekends, and follows the Dallas Cowboys
    and Texas Tech Red Raiders from the comfort of their room, preferring low‑impact, self‑paced activities over crowded team sports.
  arts: An imaginative creator, Shelia Wright sketches tranquil prairie landscapes, experiments with digital illustration in Procreate, reads Brandon Sanderson and Ursula K. Le Guin for narrative inspiration,
    and finds ambient solace in Ólafur Arnalds and indie folk tunes by Sufjan Stevens.
  travel: A methodical teen explorer, Shelia Wright plans low‑budget solo trips that combine quiet nature retreats, such as a weekend road trip to Carlsbad Caverns, a spring hike in the Guadalupe Mountains,
    and a study‑focused visit to Seattle’s technology museums, always mapping logistics in advance while avoiding crowded tourist hotspots.
  culinary: A modest home chef, Shelia Wright tends a small herb garden of basil, mint, and rosemary, assembles herb‑infused quinoa bowls with roasted vegetables, and occasionally treats themselves to a
    lavender‑flavored latte, preferring quick, low‑stress meals that align with their organized routine.
  core: A solitary, methodical teen anchored in curiosity, Shelia Wright balances diligent self‑learning with occasional over‑planning driven by worry, finding calm in coding, sketching, and quiet nature
    escapes.
background:
  cultural: Shelia was raised in Amarillo, Texas, within the Texas Panhandle’s blend of small‑town and rural culture. Her family background reflects a predominantly Anglo‑American heritage typical of the
    region, emphasizing practical self‑reliance, modesty, and a respect for the open landscape. Community values include quiet perseverance, modest social interaction, and an appreciation for regional traditions
    such as local cuisine and outdoor recreation. While she leans toward solitary pursuits, she remains aware of the communal spirit of West Texas, which influences her desire to contribute online resources
    that support other youths in the area.
