  career_goals: Shelia aims to earn her GED within the next year and then enroll in a community‑college program focused on information technology or web development. She aspires to secure a remote, low‑stress
    position such as junior web developer, technical support specialist, or freelance content creator, allowing her to work independently in a quiet environment. In the longer term, she hopes to build a
    modest portfolio of client websites and eventually transition into UI/UX design, where she can combine her methodical mindset with creative problem‑solving while maintaining a flexible schedule that
    minimizes social strain.
