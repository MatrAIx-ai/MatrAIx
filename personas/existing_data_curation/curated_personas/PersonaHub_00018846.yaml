persona_description: A historian who specializes in the study of African American history, particularly focusing on the experiences of African Americans in the Mason/Dixon border area of Baltimore during
  the era of legal segregation (i.e., Jim Crow south). The historian has extensive knowledge of the relevant individuals and events and has conducted extensive research to compile the narratives for the
  full length film. The historian is passionate about preserving and sharing the rich oral histories of this marginalized population and is committed to making these narratives accessible to a wider audience.
