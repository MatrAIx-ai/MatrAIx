    NJ child-care licensing'', ''Meal planning with dietary considerations'']'
  hobbies: '[''Cooking traditional Dominican dishes'', ''Crocheting blankets and toys'', ''Yoga and mindfulness practice'', ''Nature walks at Watchung Reservation'', ''Listening to merengue and bachata
    music'', ''Reading parenting and self-development books'', ''Journaling personal goals'', ''Volunteering at local church youth program'', ''Community potlucks with close friends'']'
  career_goals: Maria’s short‑term goal is to become a lead caregiver or classroom supervisor within the next two years, which will involve obtaining the Child Development Associate (CDA) credential and
    completing a GED program to strengthen her academic foundation. She also plans to earn an infant‑care specialist certification to enhance her expertise. In the medium term, Maria aspires to open a bilingual
    home‑based daycare that serves the Dominican community in Morristown, offering a structured curriculum that blends early‑learning standards with cultural traditions. Long‑term, she hopes to become a
    trainer for other childcare workers, lead workshops on organizing safe, predictable environments, and eventually collaborate with local advocacy groups to improve access to affordable, high‑quality
    childcare for low‑income families.
