  hobbies: '[''Soccer'', ''LEGO building'', ''Bilingual storytime reading'', ''Drawing and painting'', ''Exploring desert trails with family'', ''Playing educational games on tablet'', ''Participating in
    school group projects'', ''Celebrating cultural festivals (Cinco de Mayo, Día de los Muertos)'', ''Singing and dancing to mariachi music'']'
  career_goals: Alejandro dreams of growing up to design and build things that help his community. He imagines becoming an engineer or architect who creates playgrounds, homes, and bridges that are both
    functional and beautiful. He also talks about wanting to be a teacher one day so he can share his love of learning and bilingual skills with other kids. His practical side pushes him to focus on school
    subjects like math and science, while his curiosity fuels a desire to understand how everyday objects work. Though he sometimes worries about making mistakes, he is motivated to keep improving his grades
    and develop the skills he needs for his future career.
