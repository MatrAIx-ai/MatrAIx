  career_goals: Karl aims to advance from his current receptionist role to a supervisory administrative position such as Office Manager or Records Manager within a municipal office or small private firm
    in the Houston County area. Over the next two to three years, he plans to obtain an Associate’s degree in Business Administration or the Certified Administrative Professional (CAP) credential to solidify
    his expertise. His long‑term ambition is to lead a small team, streamline office workflows, and ensure a stable, predictable work environment that aligns with his practical values and desire for routine.
    He also envisions eventually leveraging his experience to manage community‑focused services, possibly overseeing a local records department or a modest county‑level facility.
