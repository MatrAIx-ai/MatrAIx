personas:
  professional: Amanda Dick, a dedicated classroom support specialist, leverages her organized, methodical nature and vivid imagination to seamlessly integrate "Google Classroom" and "Smartboard" technology,
    differentiate instruction for diverse learners, embed visual arts and crafts into curricula, and skillfully manage parent‑teacher communication and conflict resolution.
  sports: Amanda Dick, an avid hiker who belongs to the Henderson Trails Club and plays on a local adult softball league, combines weekend walks on the Hill Country trails with seasonal participation in
    community fitness classes, while cheering on the Dallas Cowboys and Dallas Mavericks as her favorite Texas sports teams.
  arts: Amanda Dick, a prolific watercolor and acrylic painter, pottery enthusiast, and quilt maker, regularly attends community theater productions, draws creative inspiration from speculative fiction
    authors like N.K. Jemisin and Margaret Atwood, and finds artistic resonance in the works of Frida Kahlo, Georgia O'Keeffe, and the music of Joni Mitchell, all while playing piano for personal enjoyment.
  travel: Amanda Dick, a curious explorer who balances meticulous trip planning with a love for spontaneous road trips, frequently visits nearby Texas Hill Country vineyards and the annual Santa Fe arts
    festival, dreams of strolling through Kyoto’s zen gardens and tasting authentic sushi, and opts for budget‑friendly accommodations that still allow immersive cultural experiences.
  culinary: Amanda Dick, an enthusiastic home cook, delights in crafting Tex‑Mex staples like chicken enchiladas with homemade salsa, juicing fresh cilantro and jalapeño from her garden, and preparing Southern
    comfort dishes such as chicken‑fried steak with creamy mashed potatoes, often experimenting with new spice blends in her cast‑iron skillet while occasionally overcooking a batch of cornbread when she
    gets caught up in a new quilting project.
  core: Amanda Dick blends imaginative artistry with methodical organization, channeling her community‑centric spirit, occasional worry, and love of learning into a life rich with creative projects, supportive
    teaching, and heartfelt gatherings.
background:
  cultural: Amanda grew up as a white Texan in the close‑knit, moderately rural community of Henderson, Rusk County. Her upbringing was steeped in Southern values of hospitality, family, faith, and community
    involvement, with frequent participation in church gatherings, county fairs, and holiday celebrations. She attended public schools in Texas and earned her bachelor's degree in education at a state university,
    where she broadened her worldview while maintaining strong ties to regional traditions. The cultural blend of traditional Southern customs, a deep appreciation for community service, and an enthusiasm
    for artistic expression informs her personal and professional life.
attributes:
  skills: '[''Classroom management support'', ''Lesson planning assistance'', ''Educational technology integration (Google Classroom, Smartboard)'', ''Differentiated instruction for diverse learners'',
    ''Special needs support and accommodations'', ''Arts integration (visual arts, crafts)'', ''Curriculum development assistance'', ''Student assessment and data analysis'', ''Parent‑teacher communication'',
    ''Event planning and coordination'', ''Project management'', ''Time management'', ''Conflict resolution'', ''Creative problem solving'']'
  hobbies: '[''Watercolor painting'', ''Acrylic painting'', ''Pottery'', ''Quilting'', ''Reading speculative fiction'', ''Writing short stories'', ''Gardening'', ''Hiking'', ''Attending community theater'',
    ''Playing piano'', ''Cooking and experimenting with recipes'', ''Volunteering at the library'', ''Leading a book club'', ''Participating in arts and crafts fairs'', ''Organizing community potlucks'']'
  career_goals: Amanda aims to become a fully certified teacher and pursue a master's degree in special education, positioning herself for a lead instructional coordinator role within her school district.
    She aspires to design and implement a district‑wide arts integration program that fosters creativity across subjects, and to mentor new teaching assistants through a structured professional development
    series. In the longer term, she envisions transitioning to part‑time adult education instruction or community arts facilitation after retirement, while also authoring a series of educational resource
    guides that blend imaginative, interdisciplinary approaches with practical classroom strategies. Additionally, she hopes to champion student mental‑health initiatives that incorporate stress‑management
    and well‑being practices.
