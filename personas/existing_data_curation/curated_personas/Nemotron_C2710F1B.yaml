personas:
  professional: Scott Capo, a 16‑year‑old robotics club captain and budding software tinkerer, blends methodical problem‑solving with a competitive edge, turning their love of custom PC builds and Python
    scripting into designing autonomous mechanisms for school projects while meticulously documenting each iteration.
  sports: Scott Capo, a 16‑year‑old from the White Mountains area, hikes the Franconia Ridge Trail each summer, rides their mountain bike along the Kancamagus Highway in autumn, and roots for the New Hampshire
    Wildcats while occasionally joining pick‑up basketball games at the community center, yet prefers solo endurance challenges over organized team sports.
  arts: Scott Capo, an intermediate guitarist, practices classic rock riffs from The Beatles and modern anthems by Muse, streams lo‑fi hip‑hop beats while coding, and devours sci‑fi novels like Isaac Asimov’s
    Foundation and Liu Cixin’s The Three‑Body Problem, drawing creative inspiration for their robotics designs.
  travel: Scott Capo, an avid explorer of both natural and tech‑centric destinations, has camped under the stars on Mount Washington, visited Boston’s MIT Museum and the New England Robot Expo, and dreams
    of a future trip to Japan’s Tsukuba Science City for a robotics symposium, while budgeting a summer road‑trip to the Canadian Rockies.
  culinary: Scott Capo, a teenage gamer and budding chef, fuels late‑night coding marathons with chicken‑and‑broccoli stir‑fry seasoned with soy sauce, pepperoni pizza with extra cheese, and spicy ramen
    topped with chili oil, while snacking on salted almonds and craft soda during PC builds.
  core: Scott Capo is a methodical 16‑year‑old tech enthusiast who balances competitive gaming, robotics leadership, and cautious yet occasional splurges on gadgets, all while wrestling with anxiety‑driven
    perfectionism.
background:
  cultural: Scott grew up in Concord, New Hampshire, a predominantly white, middle-class community in New England. His family reflects a blend of traditional New England values—self-reliance, modesty, and
    community involvement—and a subtle Italian heritage hinted by his surname. Local culture emphasizes outdoor recreation, education, and a pragmatic approach to life, shaping Scott's organized, practical
    mindset. He participates in community events such as town clean-up days, enjoys seasonal activities like skiing in winter and hiking in summer, and attends a local public school where he interacts with
    a diverse group of peers.
