  career_goals: Scott aspires to become a software or mechanical engineer focused on robotics and automation. He plans to earn a GED, enroll in a technical community college, and eventually work for a tech
    firm or launch his own custom PC building business. He also hopes to develop a mobile app that helps peers manage stress and anxiety, combining his curiosity for new technology with his practical, reliable
    approach. Long-term, he aims to contribute to innovative, well-designed solutions that improve everyday life.
