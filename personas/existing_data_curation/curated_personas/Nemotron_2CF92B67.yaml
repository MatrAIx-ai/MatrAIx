    ''Additive manufacturing basics'', ''Quality control and test instrumentation'', ''Team mentorship and on‑the‑job training'']'
  hobbies: '[''Acrylic painting'', ''Sketching industrial scenes'', ''Photography'', ''Hiking in Chester County'', ''Urban gardening'', ''Woodworking'', ''DIY electronics and robotics projects'', ''Reading
    speculative and science‑fiction novels'', ''Playing piano'', ''Volunteer STEAM tutoring for children'']'
  career_goals: Mary aspires to transition from hands‑on mechanic to senior maintenance engineer and eventually lead a multidisciplinary maintenance team at a forward‑thinking manufacturing firm. She wants
    to champion the adoption of automation, robotics, and sustainable practices within her workplace, positioning herself as a bridge between traditional machining expertise and emerging Industry 4.0 technologies.
    Pursuing professional certifications such as Certified Maintenance & Reliability Professional (CMRP) is a priority, as is developing stronger organizational and project‑management skills to offset her
    natural preference for flexibility. Long‑term, Mary envisions launching a consultancy that helps small‑to‑mid‑size factories implement predictive‑maintenance programs while also advocating for worker
    safety and mental‑health resources on the shop floor.
