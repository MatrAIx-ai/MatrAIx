  career_goals: Dawson aspires to transition from his current managerial role into a senior position that merges business leadership with creative innovation—such as Director of Innovation or Creative Operations
    Manager at a mid‑size company or a community‑focused enterprise. He aims to launch a cross‑disciplinary hub in Santa Barbara County that supports local artists, provides mentorship for emerging professionals,
    and integrates artistic thinking into corporate culture. Additionally, he plans to obtain a professional certification in project management (PMP) and complete coursework in organizational psychology
    to deepen his ability to design workplaces that prioritize mental health and emotional wellbeing.
