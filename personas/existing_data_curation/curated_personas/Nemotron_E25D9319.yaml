personas:
  professional: Kathy Dhungana is a senior AV technician renowned for her systematic troubleshooting, precise cable management, and meticulous documentation, leveraging her disciplined mindset to mentor
    apprentices while driving toward CTS‑D and CTS‑I certifications and planning to launch a boutique consulting firm in the Ohio River Valley, and they consistently apply the same rigor to every project.
  sports: Kathy Dhungana enjoys seasonal fitness through early‑morning jogs along the Ohio River, follows the Cincinnati Reds and Cleveland Cavaliers, participates in a local pickleball league each summer,
    and maintains a membership with the regional hiking club, though they prefer solitary workouts over team sports.
  arts: Kathy Dhungana immerses herself in classic rock and folk records, revering albums by Pink Floyd, Bob Dylan, and Fleetwood Mac on her high‑fidelity system while occasionally attempting her own analog
    synth improvisations, and they actively contribute thoughtful reviews to their book club’s discussions on technology and craftsmanship literature.
  travel: Kathy Dhungana plans her travel meticulously, favoring road trips to the Great Lakes region and weekend retreats in Asheville’s Blue Ridge Mountains, while dreaming of a future visit to the historic
    streets of Edinburgh and the vineyards of Tuscany, and they balance these aspirations against retirement budgeting constraints.
  culinary: Kathy Dhungana enjoys cooking with the herbs from her garden, frequently preparing rosemary‑infused grilled lamb, basil pesto pasta, and lavender‑scented shortbread, displaying a moderate skill
    level that leans toward precise, measured recipes, yet they occasionally forget to pre‑heat the oven, causing a minor delay in the otherwise disciplined kitchen workflow.
  core: Kathy Dhungana approaches life like a perfectly calibrated AV system, valuing structure, precision, and solitary mastery, while they occasionally indulge in impulse purchases of high‑end speakers
    despite a tightly‑run budget.
background:
  cultural: Kathy grew up in a middle‑class family in the Midwest, attending public schools in Ohio where values of hard work, self‑reliance, and community were emphasized. Although she identifies as white
    and embraces traditional Midwestern cultural norms—such as a practical outlook, modesty, and participation in local events—her marriage to a partner of South Asian heritage has introduced her to diverse
    culinary traditions and multilingual celebrations, enriching her household with a blend of Ohio and broader cultural perspectives. She remains actively involved in her local church and community volunteer
    projects, reflecting a balanced integration of her personal heritage and the influences of her married life.
attributes:
  skills: '["AV system installation","Audio signal troubleshooting","Video equipment calibration","Networked AV integration","Cable management and conduit routing","Preventive maintenance planning","Technical
    documentation and schematics","Compliance with building and safety codes","Project scheduling and resource allocation","Inventory control and equipment procurement","Team mentorship and training","Competitive
    bid preparation"]'
  hobbies: '["Model kit building","Jigsaw puzzles","Gardening (herbs and native perennials)","Listening to classic rock and folk music","High-fidelity audio system evaluation","Reading non-fiction technology
    books","Local book club participation"]'
  career_goals: Kathy aims to achieve the highest industry certifications (CTS‑D and CTS‑I) within the next two years, positioning herself as a senior lead technician in her region. She aspires to oversee
    larger commercial AV projects, mentor a dedicated team of apprentices, and eventually establish her own boutique AV consulting firm focused on small‑venue solutions in the Ohio River Valley. Balancing
    her desire for professional mastery with a stable path to retirement, she seeks to embed her expertise into a sustainable business model while maintaining the high standards she set for herself.
