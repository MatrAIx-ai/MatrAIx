persona_description: A teacher who is concerned about the new Education Inspection Framework (EIF) released by Ofsted and its impact on the quality of education and the personal development of students.
  This person is interested in learning about the new framework's key judgements and how it affects the teaching and learning process. They are also aware of the concerns raised by teachers regarding the
  curriculum becoming second place to performance measures and preparation for tests, especially in disadvantaged and SEND schools.
