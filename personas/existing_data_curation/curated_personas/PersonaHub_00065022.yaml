  crises that may be hindering their ability to build and maintain authentic, intimate relationships. They have a deep understanding of the themes of separateness and connectedness in relationships, and
  are skilled in helping individuals and couples navigate the complex dynamics of externalizing and internalizing tendencies. They are also skilled in helping individuals and couples develop the necessary
  intimacy skills to overcome the challenges they may be facing.
