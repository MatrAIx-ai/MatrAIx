  hobbies: '[''Salsa and bachata dancing'', ''Cooking and sharing Mexican cuisine'', ''Hosting potluck gatherings'', ''Attending cultural festivals'', ''Volunteering at community centers'', ''Yoga'', ''Creating
    cultural vlogs on social media'', ''Reading personal‑development books'', ''Exploring Tampa waterfront parks'', ''Listening to regional Mexican and pop music'']'
  career_goals: Yohandri aims to transition from volunteer work to a full‑time role as a community outreach coordinator for a Tampa non‑profit that serves Hispanic families, leveraging her bilingual skills
    and event‑planning experience. She plans to earn a certification in community health or project management while pursuing an associate’s degree in communications. Long‑term, she hopes to launch a boutique
    catering business that offers modern twists on traditional Mexican fare, using her culinary expertise and social‑media savvy to build a brand that celebrates her cultural heritage.
