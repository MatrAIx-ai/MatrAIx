personas:
  professional: Yohandri Mendoza is a bilingual community outreach coordinator in training, melding their natural charisma and meticulous event‑planning expertise to design volunteer programs that empower
    families, while they channel a curiosity for digital tools and a practical, organized approach to modest budgets.
  sports: Yohandri Mendoza enjoys weekend yoga at Curtis Hixon Waterfront Park, competes in a co‑ed recreational soccer league with the Tampa Bay Hawks, and follows the Tampa Bay Lightning and Tampa Bay
    Rays, balancing social exercise with team spirit.
  arts: Yohandri Mendoza channels their love for dance into weekly salsa and bachata nights while curating playlists that blend regional Latin artists such as Vicente Fernández with contemporary pop stars
    like Dua Lipa, and they produce short vlogs inspired by the storytelling style of creator Casey Neistat.
  travel: Yohandri Mendoza prefers spontaneous weekend getaways, having explored the vibrant streets of New Orleans and the sunlit beaches of Key West, and they dream of attending the Rio de Janeiro Carnival
    and the Edinburgh Fringe Festival, balancing a love for cultural immersion with budget‑conscious planning.
  culinary: Yohandri Mendoza delights in crafting homemade tamales and pozole, mastering the art of masa and long‑simmered broth, while they experiment with modern twists like chipotle‑infused quinoa stuffing
    and serve their creations at community potlucks.
  core: Yohandri Mendoza is a charismatic connector who thrives on dance floors and community gatherings, often staying up late editing vlogs, and has a habit of over‑booking events, yet balances it with
    disciplined budgeting and daily yoga.
background:
  cultural: Yohandri is the daughter of Mexican immigrants from Jalisco who settled in Tampa, Florida. She grew up bilingual, speaking Spanish at home and English at school, and maintains deep ties to Mexican
    traditions such as Día de los Muertos, festive family meals, and Catholic observances. The vibrant Hispanic community in Tampa shapes her social network, and she actively participates in local Latin
    festivals, supporting cultural preservation while embracing the Floridian beach lifestyle. Her background gives her a strong sense of hospitality, family cohesion, and community responsibility.
attributes:
  skills: '[''Effective verbal communication'', ''Public speaking'', ''Event planning and coordination'', ''Community liaison (Spanish‑English bilingual)'', ''Social media content creation'', ''Basic graphic
