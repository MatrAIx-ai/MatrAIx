  career_goals: Tyra aspires to turn her artistic talent and technical curiosity into a career in visual communication. She plans to complete her GED and enroll in a community college program in graphic
    design, where she hopes to develop a professional portfolio that blends traditional art with interactive media. Her long‑term ambition is to earn a bachelor’s degree in UI/UX design or illustration,
    secure a position at an innovative creative agency, and eventually launch her own design studio that offers digital branding services to small businesses in rural communities. She also hopes to mentor
    other young artists from her hometown, creating workshops that encourage creative expression and digital literacy.
