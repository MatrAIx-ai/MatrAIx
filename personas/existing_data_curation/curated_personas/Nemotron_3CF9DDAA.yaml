personas:
  professional: Austin Pinckney is a hands‑on aspiring landscape architect who blends a curiosity for sustainable design with a pragmatic, budget‑focused mindset, using their expertise with irrigation systems,
    skid steers, and digital sketch tools to deliver low‑water native‑plant projects for Southern California clients while juggling client quotes and on‑site logistics with a laid‑back, sometimes disorganized
    approach.
  sports: Austin Pinckney spends weekends carving the concrete bowls at the local skate park with the OC Skate Crew, hiking the coastal trails of Laguna Beach in a member‑only hill climbing club, and rooting
    for the Los Angeles Lakers, Anaheim Ducks, and LA Galaxy, balancing their competitive edge on the board with a relaxed loyalty to their hometown teams.
  arts: Austin Pinckney captures macro photographs of beetles and succulents with a 100mm lens, DJs lo‑fi hip‑hop sets at friends’ backyard parties featuring tracks by Tame Impala and Clairo, and decompresses
    playing indie titles like Hades, Celeste, and Stardew Valley, all of which stitch together a visual and auditory collage that fuels their creative spark.
  travel: Austin Pinckney favors spur‑of‑the‑moment road trips along the Pacific Coast Highway, has already hiked the redwoods of Big Sur, camped under the desert sky of Joshua Tree, and dreams of backpacking
    through Hanoi and Da Nang to deep‑dive into the cuisine that inspires their kitchen experiments, balancing tight student budgets with a love for both adventure and chill beach hangs.
  culinary: Austin Pinckney is an intermediate home chef who reimagines classic pho broth with avocado‑lime garnish and charred corn, rolls banh mi tacos seasoned with lemongrass, cilantro, and jalapeño,
    and frequently experiments with fresh basil, fish sauce, and local produce to fuse Vietnamese family recipes with sunny Californian flavors.
  core: Austin Pinckney is a 20‑year‑old horticulture enthusiast who skateboards between client sites, obsessively photographs insects, and debates irrigation efficiency while habitually forgetting to file
    their taxes on time.
background:
  cultural: Austin is a second‑generation Vietnamese American raised in the diverse neighborhoods of Costa Mesa, California. He grew up bilingual, speaking both English and Vietnamese at home, and was immersed
    in cultural traditions such as celebrating Tet, the Mid‑Autumn Festival, and family gatherings centered around food. His heritage influences his aesthetic sensibility, often favoring tropical foliage,
    bamboo, and subtle nods to Vietnamese garden design in his landscaping work. While he values the strong work ethic and community ties passed down by his family, his independent and competitive nature
    guides him toward carving his own professional path.
attributes:
  skills: '["Plant identification", "Irrigation system design and maintenance", "Heavy equipment operation (e.g., skid steer, riding lawn mower)", "Basic landscape design", "Organic fertilization and soil
    amendment", "Sustainable landscaping practices (e.g., xeriscaping)", "Basic horticulture", "Customer service and quote preparation", "Time management for field work", "Use of digital tools (e.g., landscape
    design software, drone mapping)"]'
  hobbies: '["Skateboarding", "Hiking coastal trails", "Macro photography of plants and insects", "Cooking Vietnamese fusion meals", "Playing indie video games", "DIY electronics projects", "DJing/ music
    mixing", "Attending community cultural festivals"]'
  career_goals: Austin aims to deepen his horticultural knowledge by earning an associate degree in horticulture or landscape design within the next two years. He aspires to become a certified landscape
    architect and eventually launch his own eco‑friendly landscaping business that specializes in low‑water and native‑plant designs for residential clients in Southern California. He also hopes to lead
    a small crew, develop a reputation for innovative yet practical solutions, and integrate technology such as drone mapping and smart irrigation into his services.
