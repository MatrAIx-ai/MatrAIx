personas:
  professional: Erum Imam, a budding game developer and aspiring choreographer, harnesses curiosity and practicality to craft Scratch games that fuse fantasy storytelling with rhythm‑inspired mechanics,
    while they keep meticulous project folders and allow flexible iteration during development.
  sports: Erum Imam, a forward on the Riverdale Tigers youth soccer team, loves the fast‑paced after‑school matches and cheerfully roots for Manchester United and the national women's team; they also follow
    the Riverdale Ravens high‑school basketball squad for inspiration and attend community yoga sessions to improve flexibility.
  arts: Erum Imam, an enthusiastic manga illustrator, spends weekends sketching characters inspired by Akira Toriyama and Naoko Takeuchi, while they dance to modern choreography set to BTS tracks and Bollywood
    numbers choreographed to A.R. Rahman’s songs; they regularly watch Studio Ghibli films and devour fantasy series like "Harry Potter" and "Percy Jackson" for creative fuel.
  travel: Erum Imam, an adventurous traveler whenever family trips arise, has explored the historic forts of Jaipur, the bustling streets of Hong Kong, and a beach resort in Bali, and dreams of discovering
    Tokyo’s anime districts and the snowy slopes of the Swiss Alps; they prefer mixed itineraries that balance museum visits with active outings like hiking, yet often worry about missing school assignments.
  culinary: Erum Imam, a budding home chef, loves helping her mother prepare fragrant biryani with basmati rice, cumin, and saffron, and crisp samosas filled with spiced potatoes, while they also experiment
    with ramen broth, homemade sushi rolls, and chocolate chip pancakes; their favorite ingredient is fresh cilantro, and they sometimes over‑season dishes in their excitement to impress friends.
  core: Erum Imam is a bright, socially‑driven 12‑year‑old who channels curiosity into coding, drawing, and soccer, yet wrestles with anxiety that fuels meticulous saving habits and a vigilant, sometimes
    over‑cautious approach to health and school.
background:
  cultural: Erum comes from a South Asian family that immigrated to the United States from Pakistan and settled in the diverse neighborhood of South Philadelphia. At home, English is spoken alongside Urdu,
    and the family maintains cultural traditions such as celebrating Eid and Diwali, preparing home‑cooked meals like biryani, dal, and roti, and sharing stories from their heritage. Her parents place a
    strong emphasis on education, respect for elders, and community service, values that shape her daily life and future aspirations. While she embraces American school culture and friendships from many
    backgrounds, she also participates in local South Asian community events, attends cultural festivals, and learns traditional dance and music, giving her a blended bicultural identity.
attributes:
  skills: '["problem‑solving in math puzzles", "reading comprehension", "creative writing", "team leadership and group project coordination", "event planning for school activities", "basic Scratch programming",
