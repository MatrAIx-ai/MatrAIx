  hobbies: '["soccer", "school dance team (modern and Bollywood routines)", "coding with Scratch", "reading fantasy and science‑fiction books", "drawing manga‑style illustrations", "cooking South Asian
    dishes (e.g., biryani, samosas)", "volunteering at community center (tutoring younger children)", "participating in school science club", "listening to music (Bollywood and pop)", "playing family‑friendly
    video games"]'
  career_goals: Erum aspires to a future where she can combine her curiosity for science with her desire to help others. She dreams of becoming a pediatrician or a biomedical researcher, motivated by her
    interest in the human body and a wish to care for children like herself. She also envisions working as a teacher or youth mentor, where she can share knowledge in an encouraging environment. In the
    long term, she hopes to advocate for mental‑health awareness among her peers, using her own experiences with anxiety to foster a supportive community.
