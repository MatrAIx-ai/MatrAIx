  career_goals: Although she is only six, Sueann already dreams of a future where she can blend imagination with discovery. She expresses a desire to become an astronaut who travels among the stars, a children’s
    book illustrator whose pictures bring stories to life, a scientist who uncovers new facts about the natural world, or a teacher who nurtures other curious minds. She also hopes to contribute to her
    community by helping at the local library or church.
