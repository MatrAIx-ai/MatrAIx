personas:
  professional: Sueann Swanson is a budding junior naturalist and LEGO architect who spends afternoons building intricate models of the solar system while sketching watercolor illustrations of wildlife,
    demonstrating meticulous planning and a vivid imagination.
  sports: Sueann Swanson joins the local community Little League baseball team, cheers for the Oklahoma City Thunder on Saturday night games, and spends summer afternoons biking around the county fairgrounds
    and practicing soccer drills with the neighborhood youth soccer club, balancing structured play with spontaneous backyard races.
  arts: Sueann Swanson delights in painting watercolor landscapes of wide Oklahoma plains while listening to Mozart's Symphony No. 40 and the soundtrack of Disney's Frozen, often mimicking Idina Menzel’s
    "Let It Go" during art sessions, and they frequently attend the nearby community theater’s family‑friendly performances of classic fairy tales.
  travel: Sueann Swanson loves family road trips to the Grand Canyon and scenic drives to the Tallgrass Prairie Preserve, dreams of visiting the Smithsonian National Air and Space Museum in Washington,
    D.C., and prefers itineraries planned by their parents that mix campground adventures with structured museum visits, balancing excitement with a need for familiar routines.
  culinary: Sueann Swanson enjoys devouring cheesy mac and cheese, chicken nuggets with ketchup, and strawberry‑banana smoothies they help blend, while they proudly wash vegetables for a family taco night
    featuring soft tortillas seasoned with cumin and cilantro, and they often request extra carrot sticks as a crunchy snack.
  core: Sueann Swanson is a curious six‑year‑old who mixes meticulous LEGO engineering with watercolor daydreams, stashes spare change for glittery stickers, and forgets to take their antihistamine after
    a thrilling backyard adventure.
background:
  cultural: Sueann was born and raised in El Reno, a small city in Canadian County, Oklahoma. She is part of a white, middle‑class family that values community, hard work, and outdoor life. Her family celebrates
    traditional American holidays such as Thanksgiving, Fourth of July, and local county‑fair traditions, and attends a nearby Methodist church where she participates in Sunday school and community service.
    The regional culture, with its open plains, strong sense of neighborliness, and blend of Native‑American and settler histories, informs her appreciation for wide‑open spaces and storytelling.
