  career_goals: Now retired, Kevin's ambition is to leave a lasting intellectual and artistic imprint on his community. He plans to author a popular‑science book that weaves together physics concepts with
    storytelling, aiming to inspire younger generations. He hopes to co‑found a makerspace in Auburn where seniors and youth can collaborate on electronics, woodworking, and art projects. He seeks to mentor
    high‑school students in STEM through after‑school clubs, and contribute to the local history museum by curating an exhibit on the intersection of science and art in upstate New York. He also wishes
    to document his personal memoirs, preserving the perspective of a post‑war generation of lifelong learners.
