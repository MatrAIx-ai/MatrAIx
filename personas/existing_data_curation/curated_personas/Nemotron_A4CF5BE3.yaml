  career_goals: He aspires to pursue a career that combines his love of structure, problem‑solving, and tangible results. He envisions studying engineering—particularly civil or mechanical engineering—to
    design and construct reliable infrastructure. In the short term, he aims to join his middle‑school robotics club, earn a basic computer‑science certification, and maintain top grades to secure a spot
    in a competitive high‑school STEM program.
