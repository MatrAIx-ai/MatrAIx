personas:
  professional: Araceli Hernandezreyes is a production operations specialist in a Texas manufacturing plant, merging lean Six Sigma expertise with bilingual communication to champion safety, efficiency,
    and mentorship while balancing curiosity for new methods with a pragmatic, detail‑oriented work style.
  sports: Araceli Hernandezreyes plays second base for a community softball league in Austin, hikes the Texas Hill Country trails every other weekend, and avidly follows the Dallas Cowboys and the San Antonio
    Spurs, combining competitive spirit with a love for team camaraderie.
  arts: Araceli Hernandezreyes dances salsa and folklórico twice a week, draws inspiration from performers like Celia Cruz and Carlos Santana, and regularly attends local theater productions featuring works
    by playwrights such as Lin‑Manuel Miranda, using these artistic experiences to recharge after demanding shifts.
  travel: Araceli Hernandezreyes enjoys planned road trips, having explored the Texas Hill Country vineyards, the historic towns of Marfa and Fredericksburg, and a long‑awaited family vacation to New Orleans
    for its music scene, while dreaming of a future getaway to the coastal cliffs of Portugal, all balanced against a tight family schedule and a modest travel budget.
  culinary: Araceli Hernandezreyes excels at cooking classic dishes like chicken mole poblano, savory tamales, and chiles en nogada, while creatively fusing Tex‑Mex flavors into brisket tacos and poblano‑pepper
    queso fundido, often using fresh cilantro, roasted corn, and ancho chilies harvested from their own garden.
  core: Araceli Hernandezreyes is a detail‑driven production leader who channels their social energy and culinary curiosity into community, while wrestling with a persistent worry that fuels both meticulous
    planning and occasional impulsive splurges.
background:
  cultural: Araceli is a first‑generation Mexican‑American who grew up in a close‑knit, bilingual household. Her family traditions—celebrating Día de los Muertos, Cinco de Mayo, and Holy Week—remain central
    to her identity. She maintains strong ties to her extended family, often hosting large gatherings where music, dance, and home‑cooked meals reinforce cultural heritage. While deeply rooted in Mexican
    customs, she also embraces Texan influences, from attending local rodeos to enjoying the vibrant music scene in Round Rock. Her fluency in Spanish and English enables her to navigate both cultural spheres
    comfortably, and she often serves as a cultural liaison at work, fostering inclusive communication and community spirit.
