  career_goals: Araceli aims to move into a supervisory role within the next two years, leveraging her associate’s degree in Industrial Technology to become a production shift leader. She plans to pursue
    a bachelor’s degree in Industrial Engineering part‑time to deepen her knowledge of systems optimization. Her long‑term ambition is to lead a plant‑wide lean Six Sigma initiative that improves efficiency
    while enhancing worker safety and morale. She also hopes to develop a mentorship program that supports new employees, especially those from bilingual backgrounds, and to become a certified safety officer.
