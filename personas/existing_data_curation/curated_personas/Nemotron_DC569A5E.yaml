  hobbies: '[''Building LEGO sets'', ''Reading mystery and adventure books'', ''Girl Scouts (badge earning and community projects)'', ''Scratch coding and robotics club'', ''Garden journaling and plant
    tracking'', ''Piano practice with structured routine'', ''Meal planning and grocery list creation'']'
  career_goals: Mckalyn dreams of a future where she can combine her love of order, compassion, and helping others. She is drawn to careers that provide a clear structure and allow her to support people
    in practical ways—such as becoming a school librarian who curates resources and creates organized learning environments, a teacher who designs predictable lesson plans, or a veterinary assistant who
    follows precise care routines for animals. She also imagines herself working in a community‑focused role like a youth program coordinator, where her reliability and planning skills can make local events
    run smoothly. While she is still exploring options, her ambition is to pursue a path that lets her make a tangible, well‑structured difference in people’s lives.
