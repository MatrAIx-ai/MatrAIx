persona_description: A history and archaeology enthusiast who is deeply interested in the temples of Angkor, the Khmer Empire, and the cultural and historical significance of the region. They are particularly
  drawn to the restoration efforts and the ongoing efforts to preserve and reconstruct the monuments. They appreciate the technical and theoretical aspects of the restoration process and the impact it has
  had on the temples. They are also interested in the inscriptions on the temples and the gods and kings who built them. They are aware of the threats to Angkor, such as the illegal trade of artifacts on
  the world art market, and the long interruption of restoration work during the Khmer Rouge era. They are aware of the UNESCO World Heritage Site status of Angkor and the ongoing efforts to preserve and
  reconstruct the monuments. They are also aware of the unique and special knowledge and skills required to study and understand the inscriptions on the temples.
