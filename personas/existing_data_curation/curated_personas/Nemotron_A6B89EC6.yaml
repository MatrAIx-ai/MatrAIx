personas:
  professional: John Daughtry, a seasoned self‑taught accountant in his mid‑forties, they leverage two decades of double‑entry bookkeeping, QuickBooks, Sage 50, and advanced Excel macros to keep Greer County’s
    farms and municipal finances running like clockwork, while their penchant for routine and detail makes them the go‑to person for audit trails and seasonal cash‑flow forecasts.
  sports: John Daughtry, an avid supporter of local Friday night high‑school football and a lifelong fan of the Oklahoma Sooners, they spend free weekends in the tailgate seats of Greer High School Eagles
    games, follow the Dallas Cowboys for NFL action, and stay fit with early‑morning fishing trips on Tomoka Lake and occasional turkey hunting, though they rarely join formal gyms.
  arts: John Daughtry, a devoted lover of classic westerns, they regularly revisit Louis L’Amour novels and watch John Wayne films while spinning Johnny Cash and Merle Haggard on the old vinyl player, and
    they occasionally attend the county’s annual quilting exhibition to appreciate folk art.
  travel: John Daughtry, a methodical planner who prefers road‑trips that blend fishing, hunting, and family time, they have driven the backroads of Colorado’s Rocky Mountain National Park for trout fishing,
    hunted elk in the mountains of Montana, and keep a list of nearby state parks like Arkansas River Valley as future weekend escapes, though their travel budget remains modest due to meticulous saving
    habits.
  culinary: John Daughtry, a competent home cook who harvests tomatoes, beans, and squash from a modest garden, they love to slow‑cook pork shoulder into smoky barbecue ribs with a rub of brown sugar, paprika,
    and garlic, pair it with cornbread and creamed spinach, and they often experiment with fresh herbs like rosemary and thyme while occasionally ordering a steak‑house ribeye for a rare treat.
  core: John Daughtry, a 45‑year‑old accountant who thrives on routine, they find peace in hunting, fishing, and woodworking, worry about finances, and balance a modest, methodical lifestyle with occasional
    indulgences in poker and classic western culture.
background:
  cultural: John comes from a multi‑generational white family rooted in the agricultural heritage of southwestern Oklahoma. Growing up in Lone Wolf, he was immersed in a close‑knit community where Protestant
    (Baptist) values, self‑reliance, and modesty are central. The region’s culture emphasizes hard work, routine, and a practical approach to life—principles reflected in John’s own worldview. Community
    events such as county fairs, church gatherings, and high‑school football are cornerstones of social life, reinforcing a sense of belonging and mutual support. This cultural backdrop has shaped John’s
    conservative outlook, his dedication to family, and his respect for traditional, straightforward communication.
attributes:
  skills: '[''Double-entry bookkeeping'', ''Financial statement preparation'', ''Payroll processing'', ''Tax preparation (state and federal)'', ''Internal audit procedures'', ''QuickBooks'', ''Sage 50'',
    ''Microsoft Excel (including pivot tables and macros)'', ''Budgeting for agribusiness'', ''Cash flow management'', ''Regulatory compliance'', ''Risk assessment'', ''Client communication'', ''Data organization'']'
  hobbies: '[''Deer hunting'', ''Turkey hunting'', ''Fishing'', ''Vegetable gardening'', ''Woodworking'', ''Church volunteering (finance committee)'', ''Attending high school football games'', ''Reading
    finance and self-improvement books'', ''Playing poker with friends'', ''Listening to classic western radio shows'']'
  career_goals: John aims to solidify his reputation as the trusted senior accountant for Greer County’s small‑business community, obtain a Certified Bookkeeper designation, and eventually earn a GED so
    he can pursue CPA licensure. Over the next five years he hopes to transition into an advisory role, offering tax‑planning and budgeting services tailored to local farms, while gradually building his
    own boutique bookkeeping practice. He also seeks to mentor younger staff at the county office, improve the efficiency of financial reporting through automation, and secure a stable, low‑stress position
    that ensures financial security for his family.
