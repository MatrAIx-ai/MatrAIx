  hobbies: '[''Running club'', ''Hiking'', ''Community theater'', ''Women‑in‑tech meet‑up organizer'', ''Volunteer at food pantry'', ''Mentoring high‑school coders'', ''Cooking experimental meals'', ''Board
    game nights with friends'']'
  career_goals: Ara aims to advance into a technical leadership role, such as Engineering Manager or Director of Software Development, where she can combine her organizational strengths with her passion
    for team cohesion and mentorship. She aspires to champion inclusive, socially responsible tech projects—particularly those that improve education, healthcare, or community services in the Midwest. Long‑term,
    she envisions launching a nonprofit tech‑education program that offers coding workshops and mentorship to underrepresented youth, leveraging her industry experience to create pathways for the next generation
    of developers.
