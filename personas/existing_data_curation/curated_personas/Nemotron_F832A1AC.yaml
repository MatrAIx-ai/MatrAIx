personas:
  professional: Ara Mcfarland, a seasoned full‑stack software developer, blends meticulous engineering—spanning Python, React, and cloud‑native CI/CD pipelines—with a hands‑on, user‑centric mindset, leading
    agile teams to deliver accessible community‑focused platforms while mentoring junior talent.
  sports: Ara Mcfarland is an avid runner with the Columbus Running Club, tackles weekend hikes in Hocking Hills, follows the Cleveland Browns and the Cincinnati Reds, and incorporates CrossFit sessions
    twice weekly to balance endurance with strength, yet often forgets to stretch after workouts.
  arts: Ara Mcfarland, a community‑theater enthusiast, relishes performing in local productions of "Les Misérables" and improvisational workshops, draws inspiration from Lin‑Manuel Miranda and Meryl Streep,
    and regularly attends concerts by the Ohio Symphony Orchestra, while secretly collecting vintage Playbills.
  travel: Ara Mcfarland favors purposeful travel, planning weekend escapes to Hocking Hills State Park and Lake Erie Islands, dream‑ing of a culinary pilgrimage to Kyoto, Japan, and mixing business trips
    to Austin, Texas with spontaneous road trips to Asheville, North Carolina, balancing curiosity with budget‑conscious itineraries.
  culinary: Ara Mcfarland experiments with globally inspired dishes like miso‑glazed salmon, Moroccan chicken tagine with apricots, and homemade kimchi, skillfully handling ingredients such as shiso leaves,
    tahini, and fermented black beans, while hosting weekly potlucks and proudly misplacing the sourdough starter in the fridge.
  core: Ara Mcfarland channels boundless curiosity and compassionate leadership into tech, community service, and experimental cooking, juggling relentless schedule, occasional overcommitment, and a secret
    stash of dark chocolate.
background:
  cultural: Ara grew up in a middle‑class, Irish‑German household in central Ohio, where values like hard work, community service, and humility were emphasized. Her family attended a local Protestant church,
    fostering a sense of collective responsibility and compassion. The Midwest’s blend of practicality and neighborly spirit shaped her pragmatic approach to problem‑solving and her outgoing, cooperative
    nature. She maintains strong ties to her hometown through participation in regional festivals, supporting local businesses, and celebrating traditional holidays with family gatherings.
