persona_description: A dermatologist with expertise in the management of ocular cicatricial pemphigoid. The dermatologist has published extensively on the use of immunosuppressive and immunomodulatory medications
  for the treatment of cicatricial pemphigoid, and has identified the "susceptibility gene" for developing the disease and the target antigen that gets attacked by the patient's white blood cells. The dermatologist
  is working on developing diagnostic tests for the disease and treatment strategies that re-educate the patient's white blood cells, enabling them to do their job of attacking and killing germs without
  attacking and damaging the patient's own body tissues.
