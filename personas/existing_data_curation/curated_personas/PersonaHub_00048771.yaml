persona_description: A librarian who specializes in collecting, annotating, and providing access to materials related to ethnic studies, multicultural education, and educational resources. They are interested
  in collecting and annotating materials from a variety of ethnic groups and cultures, and are looking for resources on topics such as behavior problems in the multi-ethnic classroom, language problems
  of non-English speaking students, and folklore of various ethnic groups. They are also interested in collecting materials related to the women's movement, immigration, and cross-cultural communication.
