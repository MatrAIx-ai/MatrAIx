personas:
  professional: Zachary Fisher is a curious little builder who spends hours constructing intricate block towers, applying early problem‑solving skills while balancing a love for quiet solo play with occasional
    willingness to follow simple instructions.
  sports: Zachary Fisher dabbles in toddler soccer with the Bright Horizons Mini‑Kickers club, cheers on the Seattle Sounders FC during weekend broadcasts, and favours the rhythmic bounce of a small trampoline
    for their daily dose of kinetic play.
  arts: Zachary Fisher delights in drawing whimsical dinosaurs with Crayola crayons, idolizes the playful melodies of children’s musician Raffi, and curls up for nightly episodes of Sesame Street, where
    characters like Elmo inspire their budding storytelling.
  travel: Zachary Fisher loves family road trips to the towering red rocks of Sedona, the glittering lights of Disneyland in Anaheim, and the sandy shores of Clearwater Beach, preferring meticulously planned
    itineraries that include plenty of quiet nap breaks between adventures.
  culinary: Zachary Fisher enjoys helping parents stir mac and cheese with cheddar cubes, has a particular fondness for peanut butter and banana sandwiches, and can proudly name the ingredients in a classic
    grilled cheese, though they often sneak extra chocolate chips into their snack bowl.
  core: Zachary Fisher is a quietly curious four‑year‑old who balances a meticulous love for solo exploration with a gentle, worry‑prone heart, often channeling their energy into building block kingdoms
    and careful savings in their piggy bank.
background:
  cultural: Zach is a White American child raised in Laramie, Wyoming, a small city surrounded by prairie and mountain landscapes. His family embraces a lifestyle that blends modest suburban living with
    frequent outdoor activities such as hiking, wildlife watching, and community events like the county fair. The local culture values self-reliance, respect for nature, and quiet personal space, which
    aligns with Zach's preference for solitude and his cooperative, considerate nature. He attends a local preschool that emphasizes independent play, early literacy, and a supportive community environment.
