personas:
  professional: Shelton Thomas, a veteran production worker in industrial manufacturing, leverages his mechanical troubleshooting expertise and creative flair for woodworking to lead shift teams, implement
    safety‑driven process tweaks, and mentor colleagues toward future supervisor roles.
  sports: Shelton Thomas is an avid hiker who trails the Great Smoky Mountains with the Smoky Trailblazers club, follows the Tennessee Volunteers football team with Sunday‑day devotion, and enjoys weekend
    fishing outings while occasionally cheering on the Nashville Predators during the hockey season.
  arts: Shelton Thomas blends his admiration for Ansel Adams’ black‑and‑white landscapes and Andy Warhol’s pop‑art boldness with a spontaneous habit of snapping candid family photos, restores vintage radios
    like treasured relics, crafts simple wood furniture, and mentors youth in drawing while soaking up the sounds of Johnny Cash and the local bluegrass ensemble The Hillbilly Moon.
  travel: Shelton Thomas prefers low‑key, road‑trip style getaways, often spontaneous detours to regional art festivals such as Asheville’s River Arts District Fair, Knoxville’s Dogwood Arts Festival, and
    the Santa Fe Indian Market, while dreaming of a future cross‑country drive to Yellowstone to photograph its geysers.
  culinary: Shelton Thomas is a devoted pitmaster who perfects hickory‑smoked brisket and pulled pork at local barbecue contests, seasons his fresh‑caught trout with lemon‑dill rub, pairs dishes with buttery
    cornbread and sweet tea, and enjoys swapping recipe tips over a well‑worn iron skillet.
  core: Shelton Thomas is a calm, curiosity‑driven mechanic‑artist who seamlessly blends heavy‑machine expertise with a love for vintage radios and spontaneous barbecue battles, all while habitually misplacing
    his favorite screwdriver.
background:
  cultural: Shelton grew up in the Appalachian region of East Tennessee, immersed in Southern hospitality, close‑knit family ties, and a strong work ethic rooted in blue‑collar traditions. His community
    values self‑reliance, church involvement, and communal gatherings such as potlucks, county fairs, and music festivals. The area's tourism‑driven economy and natural beauty have fostered his appreciation
    for the outdoors and local crafts, shaping a worldview that blends traditional Southern values with an openness to new ideas and artistic expression.
attributes:
  skills: '[''Industrial machinery operation'', ''Mechanical troubleshooting'', ''Quality inspection'', ''Safety compliance'', ''Team coordination and shift leadership'', ''Process improvement'', ''Basic
