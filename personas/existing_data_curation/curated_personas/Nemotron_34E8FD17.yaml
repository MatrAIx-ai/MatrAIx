  hobbies: '[''Hiking in the Great Smoky Mountains'', ''Fishing'', ''Attending local craft fairs and live music events'', ''Photography'', ''Barbecue cooking'', ''Weekly card game sessions with friends'',
    ''Volunteering at church youth art program'', ''Restoring vintage radios'', ''Model train building'']'
  career_goals: Shelton aims to advance to a supervisory or training position within his plant, earning certifications such as OSHA 30‑hour and forklift operation to qualify for a shift manager or safety
    officer role. He also dreams of launching a modest side business creating handcrafted furniture and custom metal art, merging his production expertise with his artistic interests. In the long term he
    hopes for a comfortable retirement that allows him to travel to regional art festivals, mentor younger workers, and continue exploring creative projects.
