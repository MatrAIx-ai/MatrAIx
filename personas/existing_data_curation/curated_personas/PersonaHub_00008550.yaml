persona_description: A French mathematician and astronomer who was appointed professor of mathematics at the Collège Mazarin in Paris, supervised Cassini's thesis on optics, and contributed to the scientific
  work of his father. He was interested in both astronomical observations and accurate surveys and undertook projects with his father. After completing his education, he travelled with his father in Italy
  and England, met Newton, Flamsteed, and Halley, and was elected to the Royal Society of London. He published the astronomical and geodesic data he gathered on his travels and proposed a new method for
  determining longitude by means of the eclipses of the stars and planets by the moon. He was appointed to the Chambre des Comptes in 1706, gained a high reputation for honesty, and took on more responsibilities
  as the head of the Paris Observatory from his father. He married Suzanne-Françoise Charpentier and had three sons.
