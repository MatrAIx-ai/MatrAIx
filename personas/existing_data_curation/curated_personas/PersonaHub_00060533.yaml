persona_description: A scientist who is interested in the integration of scientific knowledge through the use of open networks and the potential for scientific revolutions. This individual is passionate
  about the use of technology to improve scientific research and believes that the cost of research and its control by "old-boys clubs" encourages researchers to stick to tiny and "safe" questions that
  fit in with existing tracks of thinking. This person is also interested in the potential of synthetic biology, which builds 'designer life', and relies on sharing DNA information on the web. They are
  also interested in the idea of harnessing the power of machines to help them make the best sense of all the data we're generating.
