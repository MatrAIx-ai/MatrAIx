  career_goals: Although retired, Rick aims to remain an active contributor by volunteering his technical expertise to local high school STEM programs, assisting Marathon County in modest infrastructure
    upgrades, and leading a community historical documentation project. He also aspires to compile a memoir of his engineering career and life lessons to inspire future generations, while maintaining a
    balanced focus on practical community needs and personal curiosity.
