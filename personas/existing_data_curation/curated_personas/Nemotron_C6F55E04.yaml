  hobbies: '[''Painting'', ''Creative writing'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Visiting art galleries'', ''Reading poetry'', ''Gardening'', ''Hosting cultural gatherings'', ''Traveling'']'
  career_goals: Patrice envisions channeling her imagination into a flexible, community‑focused art career. She aims to launch a small boutique studio that offers workshops, exhibitions, and handcrafted
    Cuban‑inspired artworks, allowing her to balance creativity with family life. She also hopes to serve as a guest lecturer or mentor at local colleges, sharing her humanities background and fostering
    artistic curiosity in younger generations. Long‑term, she dreams of curating a collaborative cultural space in Miami that celebrates Afro‑Cuban heritage and encourages interdisciplinary collaboration.
