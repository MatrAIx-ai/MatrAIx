personas:
  professional: Patrice Ahumada, a 44‑year‑old Miami‑based cultural event planner and mixed‑media artist, channels a vivid imagination and bilingual fluency into community workshops and boutique studio
    projects, thriving on spontaneous collaboration while often juggling loose schedules.
  sports: Patrice Ahumada stays active through weekly salsa‑dance cardio classes, sunrise yoga on the Miami beachfront, and occasional beach‑volleyball leagues, proudly cheering the Miami Heat and Miami
    Dolphins as a season ticket holder while they treat fitness as a social ritual rather than a regimented routine.
  arts: Patrice Ahumada channels a love for the vibrant brushwork of Frida Kahlo, the rhythmic poetry of Langston Hughes, and the soulful salsa of Celia Cruz into their mixed‑media canvases and nightly
    open‑mic readings, while regularly attending exhibitions featuring contemporary Latin American artists like Tania Bruguera and drawing inspiration from the improvisational energy of New York’s Broadway
    shows.
  travel: Patrice Ahumada favors spontaneous, culture‑rich getaways, having explored the street art of Mexico City, the historic cafés of Havana, and the tango salons of Buenos Aires, while dreaming of
    a future immersion in Barcelona’s modernist architecture and Kyoto’s serene gardens, all planned on a flexible budget that leaves room for last‑minute festival tickets.
  culinary: Patrice Ahumada cooks with earnest enthusiasm, mastering classic Cuban staples like ropa vieja and arroz con pollo while reinventing them with smoked paprika, coconut milk, and tropical fruit
    salsa, and they relish discovering fresh plantains, yuca, and local lime markets to create vibrant, aromatic plates that blend tradition with bold, experimental flair.
  core: Patrice Ahumada, a 44‑year‑old Miami creative, fuses spontaneous imagination with community‑focused art, juggling a penchant for colorful chaos with a deep love for Cuban‑infused cuisine, salsa
    rhythms, and mentoring emerging talent.
background:
  cultural: Patrice’s Cuban roots are central to her identity, shaped by family traditions, music, food, and the rhythmic storytelling of her heritage. Growing up in a bilingual household in Miami, she
    blends Afro‑Cuban rhythms with the city’s multicultural energy, celebrating festivals like Carnaval and Día de los Muertos with equal enthusiasm. Her cultural perspective emphasizes community solidarity,
    reverence for oral histories, and a passion for preserving and reinventing Cuban artistic expressions within a diasporic context.
