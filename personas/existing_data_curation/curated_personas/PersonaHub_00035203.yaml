persona_description: A historian who specializes in the study of the history of tourism and its impact on the development of Italian coastal towns, particularly those in the Veneto region. He is particularly
  interested in the role of the middle and high society families in shaping the culture and lifestyle of Riccione and its surrounding areas. He is also interested in the impact of the arrival of the first
  group of children for sea therapies in 1867 and the subsequent establishment of the first hospices in 1877. He is also interested in the development of the town of Riccione and its cultural and economic
  impact on the surrounding areas.
