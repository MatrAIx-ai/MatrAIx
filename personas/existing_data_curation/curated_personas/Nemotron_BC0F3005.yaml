personas:
  professional: Jinny Newsome, a seasoned service‑sales representative in rural Kansas, combines three decades of relationship‑focused selling, Salesforce pipeline expertise, and a practical curiosity for
    emerging cloud‑based utility platforms to mentor junior reps and craft tailored proposals that blend innovative technology with the trusted, community‑first approach her clients value.
  sports: Jinny Newsome supports the Kansas City Chiefs and Royals, participates in a weekend walking club that explores the prairie trails around her hometown, and occasionally joins a community softball
    league for light recreation, balancing her love of gentle movement with seasonal enthusiasm for spectator sports.
  arts: Jinny Newsome weaves Midwest folk art into her quilts, sings in her church choir while listening to the harmonies of Pete Seeger, devours historical fiction novels about the American heartland,
    and often pauses to admire the regional charm of Grant Wood’s paintings, letting these artistic threads shape her leisure and sense of identity.
  travel: Jinny Newsome prefers leisurely road trips that trace historic Route 66 through Kansas, Missouri, and Oklahoma, delights in weekend getaways to the Badlands National Park and a vineyard in the
    Missouri River Valley, and budgets careful savings for occasional splurges to New Orleans for its jazz scene, balancing her love of familiar small‑town charm with occasional cultural adventures.
  culinary: Jinny Newsome favors home‑cooked, farm‑to‑table meals featuring heirloom tomatoes, sweet corn, and fresh basil, skillfully crafts chicken pot pie with a flaky crust, bakes cornbread studded
    with honey and jalapeño, and delights in making zucchini fritters seasoned with garlic and parmesan, reflecting her intermediate cooking chops and love of seasonal produce.
  core: Jinny Newsome blends a practical curiosity with a deep‑rooted community spirit, nurturing both gardens and junior sales talent while juggling modest budgeting, steady health management, and a love
    for Midwest arts and gentle adventures.
background:
  cultural: Jinny grew up in a small town in central Kansas, steeped in traditional Midwestern values of self‑reliance, community service, and modesty. Her family’s white, Protestant background emphasized
    integrity, hard work, and a deep connection to the land, which is reflected in her love for gardening and local agricultural fairs. While she respects the region’s conservative heritage, Jinny also
    embraces a modest openness to new ideas—especially those that can improve everyday life—mirroring the practical curiosity celebrated in her community. As a widowed resident of Abilene, she balances
    the close‑knit social fabric of small‑town life with a personal need for independence and reflective solitude.
