persona_description: A business owner who is interested in the history and development of the cotton industry in Bolton, England. They are particularly interested in the contributions of Richard Arkwright,
  Samuel Crompton, and the early industrialists who established Bolton as a center for cotton production. They are also interested in the role of transportation in the development of the industry, and how
  the routes from Liverpool to Bolton were influenced by the established spinning industry in Leigh.
