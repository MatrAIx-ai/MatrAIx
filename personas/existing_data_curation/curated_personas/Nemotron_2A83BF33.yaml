personas:
  professional: Jose Flauta is a 25-year-old industrial technology associate who works as a fabricator, expertly interpreting blueprints, operating CNC machines, and welding components, while applying an
    artistic eye to product finishes and fostering collaborative, harmony-focused teamwork in a small manufacturing shop.
  sports: Jose Flauta enjoys hiking the Rattlesnake Hills on weekends, follows the Seattle Seahawks and the Spokane Indians, and participates in a local trail-running club that meets twice weekly, preferring
    low-impact cardio over team sports.
  arts: Jose Flauta spends free evenings sketching Columbia Plateau vistas and painting watercolor scenes inspired by community ceremonies, attending workshops at the Northwest Museum of Arts & Culture,
    listening to the ambient soundscapes of Sigur Rós, and crafting beadwork and small wooden objects modeled after traditional motifs, while admiring the works of Georgia O’Keeffe and contemporary artist
    Shaun Tan.
  travel: Jose Flauta prefers solo or small-group road trips that blend outdoor adventure with cultural immersion, having explored the Columbia River Gorge, the volcanic landscapes of Crater Lake, a weekend
    art retreat in Santa Fe, and dreaming of a future pilgrimage to the ancient ruins of Machu Picchu.
  culinary: Jose Flauta loves cooking with locally sourced salmon, huckleberries, and heirloom tomatoes, often preparing grilled trout with rosemary and a side of wild rice pilaf, while their go-to comfort
    dish is a hearty bean stew seasoned with smoked paprika, and they occasionally experiment with making their own sourdough starter.
  core: Jose Flauta is a curious, detail-oriented fabricator who balances a creative soul with a habit of over-thinking finances and occasional stress-induced insomnia, channeling worry into meticulous
    craftsmanship and community-focused art.
background:
  cultural: Jose is a member of the Yakama Nation, raised in a family that balances modern life in Richland with tribal traditions. He grew up hearing oral histories, participating in seasonal pow‑wows,
    and learning the Yakama language basics. The community’s emphasis on harmony, respect for the land, and collaborative problem‑solving informs his personal values and his approach to work. He maintains
    strong ties with the tribal council and volunteers at cultural preservation projects, such as restoring traditional artworks and teaching youth about tribal crafts.
attributes:
  skills: '["Mechanical assembly", "Fabrication and welding (MIG/TIG)", "Technical blueprint reading", "CNC machine operation", "Quality inspection and testing", "Troubleshooting and equipment maintenance",
    "Basic CAD design (SolidWorks)", "Occupational safety compliance (OSHA)", "Team collaboration and mentorship", "Empathy and conflict resolution"]'
  hobbies: '["Sketching and watercolor painting", "Landscape and cultural photography", "Beadwork and traditional crafts", "Woodworking small projects", "Hiking in the Columbia Plateau", "Visiting art galleries
    and museums", "Reading speculative fiction and science non-fiction", "Attending small digital art workshops", "Playing tribal drums with friends", "Model building (e.g., model rockets)"]'
  career_goals: Jose aims to become a lead fabricator or production supervisor within the next five years, obtaining additional certifications in advanced welding (AWS Certified Welder) and CNC programming.
    He plans to enroll in a bachelor’s program in industrial engineering, focusing on sustainable manufacturing practices that align with his tribe’s environmental values. He also hopes to mentor newer
    employees, create a workshop that blends traditional tribal crafts with modern fabrication techniques, and eventually contribute to community‑based manufacturing projects that generate employment for
    the local American Indian population.
