personas:
  professional: Jose Lizarazu, a 33‑year‑old early‑childhood education administrator and STEM curriculum specialist, leverages their data‑driven planning, calm crisis management, charismatic leadership,
    and competitive drive to design equitable pre‑K programs while juggling a relaxed, often spontaneous approach to daily obligations.
  sports: Jose Lizarazu coaches the U‑12 team at the Will County Soccer Club, plays pickup basketball at the Boardwalk gym while cheering for the Chicago Bulls, and roots for the Chicago Bears each fall,
    balancing personal fitness with a laid‑back, spontaneous trail‑hiking routine on weekends.
  arts: Jose Lizarazu channels their love of performance into playing guitar at community festivals—often covering songs by Juanes and José González—while attending improv shows at The Second City, dabbling
    in spontaneous comedy sketches, and enjoying trivia nights inspired by Stephen Fry’s witty banter.
  travel: Jose Lizarazu prefers family‑focused road trips to national parks such as Zion and the Great Smoky Mountains, yet also plans occasional overseas escapes to the historic streets of Seville and
    the colorful markets of Marrakech, balancing spontaneous photo‑stops with a loose itinerary that leaves room for off‑script adventures.
  culinary: Jose Lizarazu, an avid home chef, whips up festive tamales, smoky mole with chilhuacle peppers, and hearty pozole for family gatherings, and they pride themselves on mastering the perfect charred
    corn tortilla while still indulging in spontaneous taco nights at local street‑food stalls.
  core: Jose Lizarazu blends a calm, data‑driven professional mind with an outgoing, talkative soul who thrives on community improv, yet habitually forgets to file expense reports on time, preferring last‑minute
    spontaneity over rigid order.
background:
  cultural: Jose is a first‑generation Mexican‑American who grew up bilingual, speaking Spanish at home and English at school. He maintains strong family ties and actively celebrates Mexican traditions
    such as Día de los Muertos, Mexican Independence Day, and regional holidays. Living in Mokena, IL, he blends the warmth and hospitality of Mexican culture with the Midwestern work ethic, often serving
    as a cultural bridge for Latino families navigating the local education system. His cultural insight informs his advocacy for inclusive curricula, community outreach, and the promotion of Mexican heritage
    within the broader school community.
attributes:
  skills: '["STEM curriculum design", "Early childhood program administration", "Data analysis and assessment", "Budget and financial management", "Staff supervision and mentorship", "Grant writing and
