    partnership development"]'
  hobbies: '["Playing soccer", "Coaching youth soccer", "Cooking Mexican cuisine", "Playing guitar", "Participating in improv theater", "Hosting trivia and game nights", "Volunteering at after‑school STEM
    clubs", "Traveling with family", "Photography of cultural events and nature", "Hiking local trails", "Attending Mexican cultural festivals"]'
  career_goals: Jose aims to become a district‑wide Director of Early Childhood Education, championing equitable access to high‑quality STEM learning for all children in Will County. He plans to earn a
    Master’s degree in Educational Leadership, eventually pursue a superintendent role, and develop a regional network of STEM‑focused childcare centers. Additionally, he envisions launching a consulting
    practice that helps schools create flexible, data‑driven curricula that respect cultural diversity and foster competitive excellence among educators.
