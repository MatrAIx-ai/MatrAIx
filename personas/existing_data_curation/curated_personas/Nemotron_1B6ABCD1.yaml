  career_goals: Seeking stability and professional growth, Chandra aims to advance to a supervisory role within the next two years, pursuing a shift-leader position that will let her mentor newer staff
    and oversee daily operations. She plans to enroll in a part-time hospitality management certificate program at a nearby community college, which will equip her with formal leadership and budgeting skills.
    Long-term, she hopes to become a restaurant manager and eventually open a modest café-bistro that highlights locally sourced produce, providing a steady income for her family and a venue for her love
    of Southern comfort food. Her competitive nature drives her to achieve top-performer recognitions, such as 'Employee of the Month', and to build a reputation for consistently high service standards.
