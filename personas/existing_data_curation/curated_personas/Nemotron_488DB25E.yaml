  career_goals: Nelda dreams of helping others in ways that combine her love of learning and caring. She says she wants to become a teacher because she enjoys sharing knowledge and organizing classroom
    activities. She is also fascinated by animals and imagines herself as a veterinarian, caring for farm animals she sees around town. Occasionally she mentions wanting to be an astronaut, reflecting her
    curiosity about the world beyond Earth. In the short term, she aims to lead her class science project, join the school's animal care club, and earn a higher level piano certificate.
