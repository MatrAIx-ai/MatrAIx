personas:
  professional: Nelda Preston is an aspiring young engineer who channels her love for intricate LEGO constructions into early lessons in spatial reasoning and project planning, and they consistently document
    each build with detailed sketches.
  sports: Nelda Preston loves playing midfield in her local kids’ soccer league, cheers for the Houston Dynamo when not on the field, and they also follow the Dallas Cowboys football season with family
    on Sundays, often practicing dribbling drills after school.
  arts: Nelda Preston spends weekend afternoons dancing to the upbeat pop hits of Taylor Swift and the country twang of Luke Bryan, and they enjoy reading mystery novels like the Nancy Drew series while
    sketching scenes from their favorite books.
  travel: Nelda Preston looks forward to annual trips to the Lubbock County Fair, dreams of riding the Ferris wheel in Orlando’s Disney World, and they love exploring nearby state parks such as Caprock
    Canyons on her family's bike rides.
  culinary: Nelda Preston delights in mixing trail‑mix recipes that combine almonds, chocolate chips, and dried cranberries, helps bake chocolate‑chip cookies with a pinch of sea‑salt, and they are learning
    to whisk batter without making a mess.
  core: Nelda Preston is a meticulously organized, curiosity‑driven 8‑year‑old who balances making elaborate LEGO worlds with soccer, dancing, and a fearless appetite for adventure, all while keeping a
    tidy piggy bank and a well‑planned schedule, and they never miss a chance to add a new twist to any project.
background:
  cultural: Nelda grows up in Tahoka, a small town in West Texas, where community ties and family traditions are central. Her family participates in local church gatherings, Sunday potlucks, and celebrates
    holidays with classic American customs like fireworks on Independence Day and Thanksgiving feasts featuring turkey and pumpkin pie. The regional culture includes an appreciation for country music, barbecue,
    and the annual county fair, where rodeos and farm exhibitions highlight the area's ranching heritage. These influences blend with the broader American school experience, shaping Nelda’s values of hard
    work, friendliness, and community service.
