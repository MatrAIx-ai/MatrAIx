personas:
  professional: Donnie Harris, a 46‑year‑old EMT with two decades of rapid trauma triage, airway management, and crisis communication, leverages their vivid imagination and improv‑honed quick‑thinking to
    devise creative on‑scene solutions, lead multidisciplinary debriefs, and deliver engaging public health workshops that blend medical precision with artistic storytelling.
  sports: Donnie Harris, an avid hiker of the Ice Age Trail and seasonal member of the Madison River Runners club, plays pick‑up soccer in the summer, follows the Milwaukee Brewers and the Wisconsin Badgers,
    and incorporates weekly yoga to keep the body supple for demanding EMT shifts.
  arts: Donnie Harris, a regular performer with the Madison Thursday Night Improv troupe, paints abstract watercolors inspired by the surrounding prairies, creates digital collages that fuse medical imaging
    with surrealist motifs reminiscent of Kandinsky, and strums acoustic renditions of Bon Iver during open‑mic nights, channeling their boundless curiosity into every artistic outlet.
  travel: Donnie Harris, a weekend explorer, loves spontaneous drives to Door County’s cherry orchards and meticulously planned trips to Paris’ Musée d’Orsay, balancing a modest travel budget with a yearning
    for artistic immersion, and always carries a sketchbook to document fleeting landscapes.
  culinary: Donnie Harris, a self‑taught home cook, blends locally sourced Wisconsin cheese into a hearty lentil chili, crafts a signature beet‑and‑orange watercolor salad with goat cheese and fresh herbs,
    and fuels late‑night creative sessions with bold espresso from a downtown roaster, though they sometimes order takeout when the sketchbook calls.
  core: Donnie Harris, a 46‑year‑old EMT‑turned‑creative‑visionary, fuses emergency medicine with avant‑garde art, habitually chats up strangers at health fairs, worries about the next shift, hoards vintage
    camera lenses in a cluttered studio, and fuels late‑night painting marathons with strong black coffee.
background:
  cultural: Donnie grew up in a Midwestern white family with deep German‑Polish roots typical of Dane County, raised in a modest, community‑oriented environment that values hard work and civic participation.
    His upbringing was shaped by the progressive, university‑town culture of Madison, exposing him to a blend of liberal arts education, activist organizing, and a strong appreciation for local arts scenes.
    While his family’s heritage includes Lutheran traditions, Donnie’s adult worldview is largely secular, though he retains a respect for the ritual and communal aspects of his cultural background. The
    region’s emphasis on public service, outdoor recreation, and collaborative problem‑solving informs his approach to both his EMT career and his artistic endeavors.
