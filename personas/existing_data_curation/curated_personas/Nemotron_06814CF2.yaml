  career_goals: Donnie aims to transition from field EMT to EMS management, pursuing certification as a paramedic and later a Master of Public Health. He envisions leading a regional emergency response
    unit that integrates artistic therapeutic practices into post‑incident care, creating programs where patients and first responders use visual art to process trauma. He also wants to author a guidebook
    blending emergency medicine best practices with creative coping strategies, and to become a recognized speaker at national EMS conferences on innovative, human‑centered emergency care. Ultimately, he
    hopes to influence state policy for mental‑health support for EMS personnel.
