  career_goals: Isamar aspires to evolve into a senior data leadership role—such as Chief Data Officer or Head of Data Architecture—where she can shape enterprise‑wide data strategies that fuse cutting‑edge
    AI, cloud scalability, and sustainability. She aims to champion a culture of data literacy across the organization, mentor the next generation of DB professionals, and become a recognized speaker at
    industry conferences on innovative data architectures. In the longer term, she envisions launching a boutique consultancy that helps midsize companies transition to modern, ethics‑first data ecosystems.
