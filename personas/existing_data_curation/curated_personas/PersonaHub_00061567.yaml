persona_description: A Microsoft Certified Solutions Architect who specializes in the implementation and management of Microsoft's Certificate Services, including the creation, management, and protection
  of self-signed certificates for security devices. They are experienced in creating and configuring SSL/TLS connections, and are skilled in implementing 802.1x and PKI protocols for network security. They
  are familiar with the use of Subject Alternative Names (SAN) in certificate management and have experience with the creation and management of user certificates for network access. They are knowledgeable
  about the use of private key protection and have experience with enforcing password requirements for specific certificate templates.
