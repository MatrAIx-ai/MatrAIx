personas:
  professional: Corena Marion, a 37‑year‑old health informatics specialist, leverages their expertise in Epic and Cerner EHRs, SQL, Python, and Tableau to transform raw clinical data into visually compelling
    dashboards while using their collaborative, outgoing nature and keen eye for design to bridge the gap between clinicians and IT leaders, driving Lean Six Sigma quality projects and mentorship of junior
    staff.
  sports: Corena Marion fuels their love for outdoor activity by running along the Smale Riverfront Park with the Cincinnati Running Club, cheering on the Cincinnati Bengals in the fall, attending Cincinnati
    Reds games in the summer, and participating in a community basketball league for women during the winter, all while using a fitness tracker to log mileage and set progressive goals.
  arts: Corena Marion immerses themselves in Cincinnati’s vibrant arts scene, sketching watercolors inspired by the Cincinnati Art Museum’s collection of works by Kehinde Wiley and Georgia O’Keeffe, capturing
    street portraits of musicians like Robert Glasper and Lawson ‘Pop’ Jennings, and attending monthly jazz performances featuring D’Angelo and Esperanza Spalding, which fuel both their creative outlet
    and professional visual storytelling.
  travel: Corena Marion prefers purposeful weekend getaways that blend cultural immersion and relaxation, having explored the historic districts of New Orleans, the music scene of Nashville, and the coastal
    charm of Charleston, while dreaming of an extended trip to the Caribbean island of Jamaica to sample local cuisine and attend a reggae festival, all planned around their work schedule and modest travel
    budget.
  culinary: Corena Marion delights in cooking Southern comfort dishes such as smoked collard greens, shrimp and grits, and sweet potato pie, while also experimenting with Afro‑Caribbean flavors like jerk
    chicken seasoned with Scotch bonnet peppers and allspice, and they often incorporate fresh okra, plantains, and homemade gumbo roux into communal meals for friends.
  core: Corena Marion balances a relentless curiosity and community‑focused ambition with a penchant for late‑night data visualizations and a habit of over‑booking social events, often leaving a trail of
    half‑finished paint palettes and unfinished podcasts.
background:
  cultural: Corena is an African-American woman raised in Cincinnati’s diverse neighborhoods, with deep family roots in the Midwest that trace back to the Great Migration. Her upbringing in a close-knit
    church community emphasized collective responsibility, music, and storytelling, shaping her sociable and collaborative nature. She celebrates Black cultural traditions through food, music, and participation
    in local festivals like the African World Festival. The city’s rich history of civil-rights activism and vibrant Black arts scene informs her commitment to community health equity and her desire to
    mentor the next generation of Black professionals in health informatics.
attributes:
  skills: '["EHR system administration (Epic, Cerner)", "Medical coding (ICD-10-CM, CPT)", "Health information governance & HIPAA compliance", "Data analysis (SQL, Python)", "Data visualization (Tableau,
    design-focused dashboards)", "Lean Six Sigma quality improvement", "Clinical documentation optimization", "Staff training & mentorship", "Cross-functional project coordination", "Emerging health informatics
    trends (AI-assisted coding, telehealth integration)"]'
  hobbies: '["Visiting art museums and galleries", "Watercolor painting and sketching", "Urban street photography", "Attending live jazz and R&B concerts", "African dance and contemporary movement classes",
    "Running/jogging at Smale Riverfront Park", "Cooking Southern and Afro-Caribbean cuisine", "Volunteering at community health fairs and health-literacy workshops", "Reading science fiction and popular
    science books", "Hosting a monthly book club"]'
  career_goals: Corena aims to transition from a specialist role to a strategic leadership position in health informatics, such as Director of Health Information Management or Clinical Informatics Lead.
    She plans to earn a CHIME certification and pursue a master's degree in Health Informatics to deepen her expertise in data interoperability and AI-driven clinical decision support. Her long-term ambition
    is to spearhead community-focused data initiatives that improve health outcomes for underserved populations in Cincinnati, while establishing a mentorship program for African-American women entering
    the health-tech field. Balancing professional growth with personal well-being, she also seeks to integrate creative problem-solving into her work to keep stress at manageable levels.
