  hobbies: '[''Community gardening'', ''Bird watching'', ''Cooking Tex‑Mex cuisine'', ''Reading contemporary fiction'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Volunteering at local library'',
    ''Nature hiking in the King Ranch'', ''DIY electronics projects (Arduino)'']'
  career_goals: Martina aims to expand the scope of STEM enrichment across the Kleberg County early childhood network, securing sustainable grant funding and establishing a district‑wide Innovation Lab
    that blends hands‑on science with cultural relevance. She aspires to become a regional director of early childhood programs, championing mental‑health supports for educators and integrating mindfulness
    practices into daily routines. Additionally, she seeks to mentor emerging administrators, publish a guide on flexible curriculum design, and achieve a work‑life balance that reduces her own anxiety.
