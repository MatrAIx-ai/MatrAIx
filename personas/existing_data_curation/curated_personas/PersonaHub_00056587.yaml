persona_description: A health policy expert who is passionate about the eradication of antibiotic resistance and has a deep understanding of the scientific and medical aspects of the issue. They are committed
  to advocating for action to prevent the emergence and spread of antibiotic-resistant bacteria, and are actively involved in global efforts to combat this crisis. They are also knowledgeable about the
  current state of research in this field, including the slow pace of discovery of new antibiotics and the increasing resistance of bacteria to existing drugs. They are likely to be familiar with the World
  HAI Forum and the recommendations made by its participants to address the problem of antibiotic resistance.
