personas:
  professional: Edward Swan is a high school junior who channels their competitive drive into aspiring to become a video game developer, spending evenings coding simple shooters while balancing schoolwork
    with their practical curiosity.
  sports: Edward Swan dominates the neighborhood basketball court as the point guard for the Oakwood Youth Hoops Club, avidly follows the Los Angeles Lakers, and spends weekends skateboarding at Riverbend
    Skate Park while training with a focus on agility drills.
  arts: 'Edward Swan crafts hip‑hop beats on Ableton, drawing inspiration from Metro Boomin, while devouring graphic novels like "Saga" and "Batman: The Dark Knight Returns," and they frequently attend
    local open‑mic nights to showcase their tracks.'
  travel: Edward Swan dreams of attending a basketball camp in New York City and has already taken weekend trips to the nearby amusement park and a summer excursion to Canada’s Niagara Falls, preferring
    organized tours but sometimes sneaking away for spontaneous street‑food adventures.
  culinary: Edward Swan favors protein‑rich meals such as grilled chicken teriyaki bowls and pepperoni pizza, experiments with quick ramen hacks, but they occasionally skip breakfast, relying on energy
    drinks before late‑night gaming sessions.
  core: Edward Swan is a competitively spirited teen who balances a love for basketball, gaming, and beat‑making with a skeptical edge, occasional overspending, and a habit of staying up late to perfect
    their next track.
background:
  cultural: Edward grew up in the diverse suburb of Silver Spring, where a vibrant Black community and the broader multicultural environment of the D.C. metro area shape his worldview. His family maintains
    ties to Southern traditions and celebrates African‑American holidays and music, while also participating in local cultural festivals that highlight the area's Afro‑Caribbean influences. He is proud
    of his heritage, often discussing civil‑rights history and contemporary social‑justice movements with his peers, and he draws on the strong sense of community and resilience fostered by his family and
    neighborhood.
attributes:
  skills: '["basketball","basic Python programming","event planning and coordination","public speaking","basic carpentry and repairs"]'
  hobbies: '["playing basketball","video gaming","beat‑making with digital audio software","skateboarding","reading graphic novels","volunteering at community center"]'
  career_goals: Edward hopes to earn a scholarship to play collegiate basketball while pursuing a degree in computer science or a technical field such as engineering. He also dreams of using his tech skills
    to develop programs that help middle‑school students in his neighborhood learn coding and critical‑thinking, eventually founding a youth mentorship initiative that combines sports and STEM education.
