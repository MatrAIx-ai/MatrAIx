personas:
  professional: Richard Davis is a budding junior engineer who transforms LEGO instructions into original skyscrapers, applying their practical curiosity to tinker with simple science kits while preferring
    quiet, small‑group projects over noisy classroom presentations.
  sports: Richard Davis plays T‑ball with the Willow Creek Little League, idolizing the Chicago Cubs during televised games and often practicing a quick swing in the backyard, favoring the focused competition
    of small‑team play over sprawling school sports.
  arts: Richard Davis immerses themselves in drawing cartoon dinosaurs inspired by the works of Dr. Seuss and the colorful animation of Pixar’s “Toy Story,” enjoys bedtime picture books like “The Dino Dig”
    and “Space Explorers,” and occasionally sings along to songs from “The Backyardigans,” letting creative storytelling shape their solitary play.
  travel: Richard Davis dreams of visiting the towering dinosaur fossils at the Smithsonian’s National Museum of Natural History after a weekend road trip to Washington, D.C., while they also love annual
    family camping outings in the nearby state forest, where they map out secret bug‑finding routes with a hand‑drawn compass.
  culinary: Richard Davis loves helping bake chocolate‑chip cookies, often sneaking in extra sprinkles for extra flair, delights in dinosaur‑shaped chicken nuggets and mac and cheese, and prefers snack
    combos of apple slices with peanut butter, though they occasionally forget to brush their teeth after sugary treats.
  core: Richard Davis blends a fierce curiosity for building and bugs with a laid‑back, competitive spirit, turning solitary LEGO projects into mini‑engineer challenges while habitually misplacing their
    crayons and forgetting to tidy up.
background:
  cultural: Richard comes from a white, Midwestern family in Newburgh, Indiana, a small town in Warrick County. His family observes typical American holidays such as Thanksgiving, Christmas, and Fourth
    of July celebrations, often with community barbecues and local fireworks. They attend a local church, which reinforces values of modesty, hard work, and community service. The region’s agricultural
    roots influence family outings to nearby farms and a respect for outdoor activities. Local country and classic rock music often play in the background at home, and community events like county fairs
    shape his sense of belonging.
