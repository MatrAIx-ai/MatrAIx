  career_goals: Richard dreams of becoming someone who can both explore new ideas and create practical solutions. He often talks about being an astronaut who builds rockets, an engineer who designs cool
    inventions, or a firefighter who helps his community. He also imagines growing up to run a family farm or a small business in Newburgh, where he can apply his hands‑on skills and stay close to his hometown.
    His competitive nature fuels a desire to be the best at building projects and sports in his future career.
