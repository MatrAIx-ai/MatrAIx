  hobbies: '[''Reading science‑fiction novels'', ''Solo hiking in local parks'', ''Meditation and mindfulness practice'', ''Cooking traditional Vietnamese dishes'', ''Solving puzzles (Sudoku, crosswords,
    logic games)'', ''Contributing to open‑source software projects'']'
  career_goals: Phan aims to advance to a senior systems analyst role within the next three years, positioning himself to lead complex integration projects and mentor junior analysts. He plans to earn professional
    certifications such as AWS Solutions Architect, ITIL, and PMP to deepen his expertise in cloud architecture and service management. Ultimately, he aspires to become a solutions architect who designs
    technology that improves everyday life—particularly tools that support mental health and stress management. While he values professional growth, he also seeks a work environment that offers flexibility,
    remote work options, and a collaborative yet low‑noise culture, allowing him to maintain his well‑being and continue helping colleagues through empathetic problem‑solving.
