  hobbies: '[''Reading Historical Fiction'',''Cooking Cuban Cuisine'',''Beach Walking and Birdwatching'',''Gardening'',''Yoga'',''Salsa Dancing'',''Small-Group Book Club'',''Volunteer Adult Literacy Tutoring'',''Knitting'',''Watercolor
    Painting'']'
  career_goals: She aims to advance into a lead teacher or curriculum coordinator role within the Manatee County School District, obtain a Master’s in Educational Leadership, and design a district-wide
    bilingual after-school reading program that serves the growing Cuban-American community. Long-term, Elizabeth hopes to become an instructional consultant focusing on culturally responsive pedagogy and
    to share her expertise through professional-development workshops.
