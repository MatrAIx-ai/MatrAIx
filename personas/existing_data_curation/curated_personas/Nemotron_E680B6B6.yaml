personas:
  professional: Elizabeth Guevara, a seasoned elementary educator with twenty‑plus years in literacy development and bilingual instruction, they balance curiosity with practicality by designing culturally
    responsive curricula, leverage interactive whiteboards and data‑driven assessments to keep classrooms organized yet adaptable, and mentor new teachers with a calm, cooperative approach that prioritizes
    harmony and student well‑being.
  sports: Elizabeth Guevara, an avid walker who spends sunrise strolls along Bradenton Beach and practices gentle yoga three times a week, they support the Tampa Bay Rays and join a local bird‑watching
    club that meets at the Myakka River State Park, while occasionally cheering on the Florida Gators during college football season.
  arts: Elizabeth Guevara, a dedicated member of a close‑knit book club, they immerse themselves in historical fiction by authors such as Isabel Allende and Leonardo Padura, unwind with watercolor landscapes
    of Floridian mangroves, knit intricate pastelitos‑inspired scarves while listening to Celia Cruz’s salsa classics, and occasionally take the floor at community salsa nights, finding artistic expression
    a calming counterbalance to a structured teaching career.
  travel: Elizabeth Guevara, who prefers tranquil getaways over crowded tours, they plan small‑group trips that blend cultural immersion and natural beauty—such as a weekend exploring the historic cobblestones
    of St. Augustine, a sunrise bird‑watching excursion to the Everglades, and an annual family visit to Havana to savor classic architecture—while budgeting carefully to keep travel costs within a modest
    annual allowance.
  culinary: Elizabeth Guevara, a passionate home cook who effortlessly prepares ropa vieja with caramelized onions, garlic, and a tangy mojo sauce, rolls flaky pastelitos filled with sweet plantain and
    cream cheese, and experiments with adobo‑marinated grilled fish, they often host intimate dinner evenings for friends, though they admit to occasionally over‑seasoning dishes and leaving a half‑baked
    pastelito cooling on the countertop for too long.
  core: Elizabeth Guevara, a methodical yet curiosity‑driven educator who balances meticulous planning with spontaneous salsa steps, finds solace in quiet gardens and book clubs, and habitually over‑spices
    their cooking while meticulously tracking every cent.
background:
  cultural: Elizabeth is a first-generation Cuban-American, raised bilingual in Spanish and English. Her family maintains strong ties to Cuban traditions—celebrating Noche de San Juan, listening to son
    and salsa music, and preserving culinary customs. She participates in the local Cuban diaspora community in Florida, attending cultural festivals and supporting community initiatives that promote heritage
    preservation. The values of family solidarity, hospitality, and resilience inherited from her Cuban roots shape her personal and professional life.
