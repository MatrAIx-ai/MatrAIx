  career_goals: Although he is still an infant, Demarius's caregivers envision future aspirations shaped by his community's traditions. They hope he will grow into a role that honors Alaska Native heritage—perhaps
    as a hunter‑gatherer, a guide who shares the land's stories, or a cultural storyteller who preserves native language and customs. His early curiosity about nature and routine suggests a long‑term interest
    in contributing to his community's subsistence practices.
