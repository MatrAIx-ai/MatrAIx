  career_goals: Dat aims to advance from his current cashier position to a supervisory or store-manager role within the next three years, leveraging his hands-on retail experience and his growing business
    knowledge. He plans to complete his associate degree in Business Administration, with a focus on marketing or supply-chain management. In the longer term, he dreams of opening a small family-run convenience
    store that highlights South Asian groceries and snacks, blending his cultural heritage with the local Texas market. To support this, he is developing technical competencies in data analysis and Python
    programming, hoping to transition into a data-driven retail analyst role. His competitive nature fuels his ambition to exceed performance metrics, while his desire for stability guides him toward a
    career that balances professional growth with family responsibilities.
