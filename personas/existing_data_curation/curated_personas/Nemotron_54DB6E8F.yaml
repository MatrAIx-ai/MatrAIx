personas:
  professional: Dat Peterson, a 22‑year‑old retail associate proficient in POS systems, inventory control, and Excel‑based sales tracking, channels their pragmatic work ethic and curiosity into a rapid
    climb toward store‑manager responsibilities while self‑teaching Python automation to become a data‑driven retail analyst, balancing competitive performance targets with a cautious approach to team dynamics,
    and they consistently seek feedback to improve.
  sports: Dat Peterson divides time between weekend cricket matches with the Savoy Youth Cricket Club, pickup basketball games at the local gym, and enthusiastic support for the Dallas Cowboys, Dallas Mavericks,
    and Texas Rangers, while they keep a casual subscription to ESPN for highlights, embodying a competitive spirit tempered by community‑focused sport.
  arts: Dat Peterson immerses themselves in a vibrant mix of cultural beats, listening to Bhangra legends like Gurdas Maan alongside country icons such as Dolly Parton, binge‑watching Bollywood dramas and
    classic Westerns, and they occasionally strum guitar chords to create fusion playlists for friends’ gatherings.
  travel: Dat Peterson favors budget‑friendly road trips across Texas—exploring Austin’s live‑music scene and the Hill Country’s wineries—while they save for a future solo backpacking adventure to Kyoto’s
    temple festivals and a culinary pilgrimage to Mexico City’s street‑taco markets, balancing wanderlust with family expectations and financial prudence.
  culinary: Dat Peterson’s cooking skill sits between confident home‑chef and experimental tinkerer, often fusing butter chicken with taco shells, seasoning brisket with garam masala, and perfecting a jalebi‑style
    churro dessert, and they keep a spice rack that boasts cumin, fenugreek, and chipotle, reflecting a palate that blends traditional flavors with Texan comfort food.
  core: Dat Peterson is a fiercely competitive 22‑year‑old with restless curiosity, who balances intense anxiety with nightly yoga, juggles a caffeine‑filled schedule, and they can’t resist a late‑night
    PC upgrade even when a looming deadline looms.
background:
  cultural: Dat is a second-generation South Asian American whose parents emigrated from India (specifically the Punjab region) before settling in Savoy, Texas. He grew up in a bilingual household, speaking
    English at school and Hindi at home, and was immersed in South Asian traditions such as celebrating Diwali, Eid, and family weddings. While retaining strong ties to his cultural roots—through food,
    music, and communal gatherings—he also embraces the rural Texan way of life, participating in local festivals, high-school sports events, and community service. This blend of cultural influences informs
    his values of family responsibility, respect for elders, and a pragmatic work ethic, while also encouraging curiosity about the broader world.
attributes:
  skills: '["Cash handling", "Customer service", "POS system operation", "Inventory management", "Basic bookkeeping", "Excel data analysis", "Business fundamentals", "Self-taught Python basics", "Digital
