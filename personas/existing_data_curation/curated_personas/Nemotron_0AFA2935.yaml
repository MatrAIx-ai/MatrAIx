  hobbies: '[''Reading (fiction & African‑American history)'', ''Photography'', ''Cooking Southern cuisine'', ''Yoga & mindfulness'', ''Hiking'', ''Attending Blues & Jazz festivals'', ''Volunteering at
    community arts center'', ''Mentoring youth in filmmaking'']'
  career_goals: Brianna aims to transition from producing regional documentaries to directing her first feature film that centers on the lived experiences of Black families in the Deep South, using authentic
    storytelling to broaden national perceptions of Southern culture. Over the next five years she plans to launch an independent production company headquartered in Hattiesburg, dedicated to nurturing
    underrepresented voices and providing hands‑on training for local aspiring filmmakers. She also aspires to secure a recurring slot at major film festivals (e.g., Sundance, SXSW) for her projects, develop
    a community media hub that offers resources and workshops, and eventually serve as a mentor and advocate for women of color seeking leadership roles in the industry.
