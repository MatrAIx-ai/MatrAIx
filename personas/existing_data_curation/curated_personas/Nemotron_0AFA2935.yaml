personas:
  professional: Brianna Anthony, a 35‑year‑old independent film producer in Hattiesburg, blends her knack for narrative development and grant‑writing expertise with a relaxed, adaptable on‑set style, allowing
    her to shepherd community‑focused documentaries from script to screen while navigating occasional disorganization with creative spontaneity.
  sports: Brianna Anthony follows the Mississippi State Bulldogs football and the New Orleans Saints, plays on a weekend co‑ed softball league with the Hattiesburg Community Sports Club, and hikes with
    the Hattiesburg Trails Collective, using these activities to stay fit while balancing her social calendar.
  arts: Brianna Anthony curates her creative life around contemporary fiction by authors like Colson Whitehead, photographs everyday life inspired by Dorothea Lange, immerses herself in the blues and jazz
    of B.B. King and Wynton Marsalis at the annual Hattiesburg Blues & Jazz Festival, and mentors young filmmakers through the local community arts center, often referencing the storytelling techniques
    of Ava DuVernay and the visual style of Sean Baker.
  travel: Brianna Anthony prefers flexible, low‑key road trips that blend nature hikes with cultural stops, such as weekend escapes to Natchez, a culinary tour of New Orleans, and a weekend hike in the
    Great Smoky Mountains, while dreaming of attending Cannes and Toronto film festivals to network and showcase her future feature film.
  culinary: Brianna Anthony enjoys cooking Southern comfort food with a modern flair, perfecting dishes like shrimp and grits with a miso‑butter glaze, collard greens sautéed with smoked paprika and garlic,
    and jalapeño‑cheddar cornbread, often sourcing heirloom tomatoes, fresh okra, and locally milled cornmeal from the Hattiesburg farmers market.
  core: Brianna Anthony is a curious yet easy‑going film producer who balances community storytelling with spontaneous creativity, often juggling a thriving production schedule while forgetting where she
    placed her keys.
background:
  cultural: Brianna grew up in a close‑knit Black family in the Deep South, where storytelling was woven into church sermons, family gatherings, and the rhythmic cadence of gospel music. Her heritage blends
    the rich traditions of African‑American oral history with the distinctive flavors of Southern culture—from the soulful sounds of blues and jazz to the communal spirit of church and neighborhood festivals.
    Educated at a historically Black college before transferring to a broader liberal arts program, she carries a deep appreciation for the resilience and creativity of Black communities in Mississippi.
    This cultural foundation informs her artistic vision, fueling a commitment to amplify marginalized voices and preserve the nuanced narratives of her community through film.
attributes:
  skills: '[''Film Production Management'', ''Directing'', ''Script Development'', ''Budgeting & Financial Planning'', ''Location Scouting'', ''Team Leadership'', ''Negotiation'', ''Grant Writing'', ''Community
