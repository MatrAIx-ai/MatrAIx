personas:
  professional: Sheryl Dagostino is a high‑school visual artist who fuses digital illustration, photography, and interactive coding to create experimental UI concepts, leveraging strong research and debate
    skills to pitch their projects while maintaining a meticulous yet adaptable workflow that balances solo studio time with collaborative community art installations.
  sports: Sheryl Dagostino finds balance in the foothills of Colorado Springs by hiking with the local Pikes Peak Trail Running Club during spring and fall, cheering on the Colorado Springs Switchbacks
    FC in the USL Championship and the Colorado Rockies during baseball season, while using weekly yoga sessions to counteract the tension from competitive chess matches and art deadlines.
  arts: Sheryl Dagostino immerses themselves in a spectrum of creative influences, from dissecting the narrative subversions of Wes Anderson and Greta Gerwig at indie film screenings to sketching alongside
    the bold visuals of Banksy and the immersive installations of Yayoi Kusama, while curating late‑night playlists featuring Arcade Fire, Tame Impala, and Mitski that fuel their digital illustration sessions.
  travel: Sheryl Dagostino prefers meticulously planned, low‑budget road trips that blend tranquil hikes in places like Rocky Mountain National Park and Moab with culturally rich stops at indie film festivals
    in Austin, while dreaming of future solo journeys to the tea gardens of Kyoto and the street art districts of Barcelona once college scholarships free up travel funds.
  culinary: Sheryl Dagostino enjoys crafting wholesome vegetarian meals—such as quinoa bowls topped with roasted cherry tomatoes, avocado toast sprinkled with hemp seeds, and homemade sweet‑potato tacos
    drizzled with chipotle aioli—though they occasionally skip dinner after late‑night art sessions, balancing a budding kitchen confidence with a love for strong espresso made with oat milk.
  core: Sheryl Dagostino is a fiercely curious teen artist who channels competitive ambition and a lingering undercurrent of anxiety into meticulously organized creative projects, often fueled by late‑night
    playlists and occasional over‑caffeinated snack binges.
background:
  cultural: Sheryl comes from an Italian‑American family rooted in the Midwest, now settled in Colorado Springs. Family traditions include Sunday pasta meals, occasional celebrations of Italian holidays,
    and a strong emphasis on self‑reliance and perseverance. Growing up in a multicultural Colorado environment, she has been exposed to a blend of Western American outdoor culture and diverse artistic
    scenes, shaping an open‑minded outlook that values both her heritage and the eclectic influences of the American West.
attributes:
  skills: '[''Digital illustration (Photoshop, Procreate)'', ''Photography and photo editing'', ''Basic coding (Scratch, HTML)'', ''Critical research and source evaluation'', ''Public speaking and debate'',
    ''Competitive art contest participation'', ''Time management and project organization'', ''Collaborative workshop facilitation'', ''DIY craft and mixed‑media techniques'', ''Video editing (iMovie)'']'
  hobbies: '[''Hiking and plein‑air sketching in the Colorado foothills'', ''Indie film watching and analysis'', ''Creative journaling and short story writing'', ''Curating alternative music playlists'',
    ''Chess club participation'', ''Volunteering at an animal shelter'', ''DIY craft projects (e.g., resin art, collage)'', ''Exploring experimental cooking recipes'']'
  career_goals: Sheryl aspires to attend a reputable college art program, ultimately earning a Bachelor of Fine Arts with a focus on visual communication and interactive media. She dreams of working as
    a freelance illustrator and UI/UX designer, creating immersive digital experiences that challenge conventional aesthetics. Her competitive nature fuels a desire to showcase her work in national juried
    exhibitions and to win emerging artist awards. Simultaneously, she hopes to leverage her art to raise awareness about teen mental health, perhaps developing community murals or an online platform where
    creative expression becomes a coping tool for youth experiencing stress and anxiety.
