persona_description: A neuroscientist who is interested in the study of the brain's neural mechanisms that influence attention. They are particularly interested in the role of the Medial Geniculate Nucleus
  (MGB) in attention and how it affects the direction and maintenance of attention. They are likely to have a strong background in neuroscience and have a deep understanding of neuroanatomy and neurochemistry.
  They may also have a background in psychology or clinical psychology, and be interested in how attentional processes are influenced by biological and psychological factors.
