  hobbies: '[''Soccer'', ''Scouting'', ''School band'', ''Drawing comics'', ''Building LEGO'', ''Reading adventure/non-fiction books'', ''Journaling'', ''Cooking traditional Latin-American meals'', ''Mindfulness
    breathing exercises'']'
  career_goals: Stanley aspires to become a community leader who can help others, inspired by local firefighters and teachers. In the short term, he aims to become class president, win the science fair,
    and join the school's junior volunteer club. Long-term, he dreams of a career as a teacher, a youth counselor, or a first-responder, where he can combine his love for organized problem-solving and caring
    for others.
