personas:
  professional: Angeline Johnson, a 20‑year‑old CNC machine technician in Winston‑Salem, blends their strong mathematical sense and Lean Six Sigma Yellow Belt certification with a vivid imagination, turning
    routine machine set‑ups and process optimization into opportunities for artistic experimentation, while mentoring new operators with clear communication and an improvisational problem‑solving flair.
  sports: Angeline Johnson stays active through community drumming circles and weekly dance workshops, supporting the Carolina Hurricanes and the Charlotte Hornets on game nights, and occasionally joining
    a local co‑ed recreational soccer league, with their preference for the fluid movement of dance over the static nature of a gym routine.
  arts: Angeline Johnson immerses themselves in the visual and performing arts, drawing inspiration from street‑art legend Banksy, abstract sculptor Anish Kapoor, digital illustrators like Loish, and the
    soulful sounds of Janelle Monáe, while regularly attending open‑mic nights at the Winston‑Salem Arts Café to both perform spoken‑word pieces and cheer on fellow creators.
  travel: Angeline Johnson favors spontaneous weekend trips to nearby Asheville for its vibrant art scene, night‑time graffiti tours in Philadelphia, and occasional long‑haul adventures to Tokyo to explore
    cutting‑edge robotics exhibitions, balancing a tight student budget with a love for budget hostels and local street food, and their itinerary always leaves room for impromptu art installations they
    discover along the way.
  culinary: Angeline Johnson loves experimenting in the kitchen, mixing industrial aesthetics with flavor by plating kimchi‑infused tacos on reclaimed copper trays, whipping up beet‑root hummus with smoked
    paprika, and relishing the bold kick of sriracha, while their cooking skill hovers between confident sauté master and occasional over‑salting disaster.
  core: Angeline Johnson is a 20‑year‑old technologist‑artist whose boundless imagination fuels both machine optimization and midnight sketch sessions, yet their laid‑back, worry‑prone nature often leads
    to last‑minute projects and spontaneous creative bursts.
background:
  cultural: Angeline's cultural background is rooted in the African American community of the Piedmont region of North Carolina. Growing up in Winston‑Salem, she has been immersed in a neighborhood where
    church gatherings, music, and storytelling play vital roles in communal life. Her family celebrates traditions that blend Southern cuisine with African American culinary heritage, and she carries forward
    a legacy of resilience and creativity that has long characterized Black communities in the area. Angeline draws inspiration from the rich history of Black artisans and entrepreneurs in the region, valuing
    mentorship and collective uplift. This cultural foundation informs her artistic sensibility, her commitment to community service, and her ambition to create work that reflects both technical mastery
    and the expressive spirit of her heritage.
