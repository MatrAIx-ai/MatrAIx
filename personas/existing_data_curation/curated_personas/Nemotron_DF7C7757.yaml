    at a youth robotics club","Cooking Southern comfort dishes with family and friends"]'
  career_goals: Angeline aims to become a lead machine technician, gaining advanced certifications such as CNC programming and Six Sigma Green Belt. She envisions transitioning into product design and process
    engineering, where she can merge her technical expertise with her artistic imagination to develop novel, aesthetically‑driven manufacturing solutions. In the medium term, she plans to complete her associate
    degree in industrial technology and later pursue a bachelor’s in industrial design. Ultimately, she dreams of launching a boutique studio that creates custom metal and plastic art pieces, blending functional
    engineering with expressive art, while also mentoring youth from her community in vocational and creative skills.
