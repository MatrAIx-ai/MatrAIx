  career_goals: Travis dreams of becoming a teacher or a school principal one day, where he can create structured, predictable learning environments and guide his classmates. He also imagines being a community
    organizer or a firefighter who helps keep people safe. His competitive streak fuels a desire to excel in any role he chooses.
