personas:
  professional: Travis Whittaker, a five-year-old classroom helper who loves organizing snack times and leading story circles, applying their methodical nature to keep the kindergarten schedule on track.
  sports: Travis Whittaker, a five-year-old enthusiastic participant on the neighborhood Little League T‑ball team and a devoted fan of the city’s professional baseball club, the Tigers, who thrives on
    structured practice drills and competes fiercely in mini obstacle courses at the local community center.
  arts: Travis Whittaker, a five-year-old who enjoys drawing precise geometric shapes, collecting stickers of Van Gogh’s starry night and Pixar’s Toy Story characters, and singing along to Raffi’s songs
    while proudly showing off their artwork during playdates.
  travel: Travis Whittaker, a five-year-old who loves family road trips to the nearby state park and a summer vacation to Disney World, preferring meticulously planned itineraries with clear schedules,
    and dreaming of visiting the Eiffel Tower in Paris one day.
  culinary: Travis Whittaker, a five-year-old who favors crunchy carrot sticks, peanut butter and jelly sandwiches, and building mini pizzas topped with pepperoni and mozzarella, often arranging the food
    on their plate like a puzzle while occasionally sneaking extra cookies before dinner.
  core: Travis Whittaker, a five-year-old whirlwind of organized energy who loves leading play, counting coins, and mapping out adventures, yet can be stubbornly competitive and occasionally forgets to
    tidy up after fun.
background:
  cultural: Travis comes from an African American family in Tallahassee. His family celebrates cultural traditions such as Juneteenth and visits the local African American Heritage Museum. He attends a
    church community where gospel music and storytelling are part of his upbringing. The supportive neighborhood and extended family emphasize education, community involvement, and pride in cultural heritage,
    influencing his love for organized group activities and his desire to give back.
