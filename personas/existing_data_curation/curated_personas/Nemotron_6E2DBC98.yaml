personas:
  professional: Loubna Calhoun, an 11‑year‑old aspiring game developer, channels their love of intricate LEGO builds, Scratch programming, and chess strategy into designing interactive story‑based games,
    using systematic planning, meticulous debugging, and a competitive mindset to turn playful ideas into polished prototypes.
  sports: Loubna Calhoun, a dedicated member of the Moravia Eagles U12 soccer team and Moravia Aquatics swim club, follows a rigorously scheduled training regimen, logs game statistics in a notebook, and
    cheers for professional teams such as the Chicago Cubs and Chicago Bulls, treating fitness as a structured project with clear milestones and performance metrics.
  arts: Loubna Calhoun, a creative LEGO architect and origami enthusiast, spends evenings listening to the Hamilton soundtrack, devouring Agatha Christie mystery novels, and drawing inspiration from Hayao
    Miyazaki’s animated worlds and Billie Eilish’s lyrical storytelling, weaving these artistic influences into their own narrative‑driven Scratch projects.
  travel: Loubna Calhoun, a planning‑oriented traveler, loves family road trips that blend hiking in the Great Smoky Mountains with museum visits in Washington, D.C., and dreams of a meticulously organized
    itinerary for a future excursion to Kyoto, Japan, where they hope to explore historic temples, cherry‑blossom parks, and local tea ceremonies.
  culinary: Loubna Calhoun, a budding home chef, enjoys crafting Margherita pizza topped with fresh basil harvested from their garden, whipping up a vegetable stir‑fry featuring bell peppers, carrots, and
    snap peas, and baking perfectly crisp chocolate chip cookies, always following a step‑by‑step checklist to ensure each dish meets their exacting standards.
  core: Loubna Calhoun is a calm, methodical 11‑year‑old who fuses systematic LEGO building, competitive chess, and organized hobbies into a life driven by precision, quiet confidence, and an occasional
    habit of hoarding paper‑clips for future projects.
background:
  cultural: Loubna is raised in Moravia, a small town in Cayuga County, Upstate New York. Her family’s heritage includes Scottish and Irish ancestry, reflecting the broader white, rural demographic of the
    region. The community emphasizes self‑reliance, neighborliness, and participation in local events such as county fairs and school gatherings. Growing up in a close‑knit environment, she internalizes
    values of hard work, modesty, and responsibility, while also benefiting from the supportive public school system and the natural surroundings that encourage outdoor activities.
