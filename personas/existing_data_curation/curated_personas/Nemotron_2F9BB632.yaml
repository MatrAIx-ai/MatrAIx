personas:
  professional: Harry Cutler, a retired mechanical engineer and systems analyst, leverages his mastery of CAD, Python automation, and statistical analysis to provide pragmatic, data‑driven consultancy on
    sustainable engineering for small businesses, while his competitive streak drives meticulous, evidence‑based designs despite occasional procrastination.
  sports: Harry Cutler follows the Seattle Seahawks and the Tacoma Rainiers, belongs to a local fly‑fishing club that competes in seasonal trout tournaments, and maintains fitness through weekly hikes in
    the Columbia River Gorge and occasional senior softball games with retired engineers.
  arts: Harry Cutler, an avid woodworker and model‑railroad enthusiast, finds inspiration in the landscape paintings of Albert Bierstadt, listens to folk legends like Joni Mitchell and the contemporary
    band The Decemberists, and attends the annual logging festival’s craft demonstrations where they appreciate traditional timber art.
  travel: Harry Cutler prefers self‑planned road trips that blend fishing and forestry, recently drove the Pacific Coast Highway to explore Redwood National Park, and dreams of a guided tour of Norway’s
    stave churches for timber‑architecture insights, all balanced against a modest travel budget and a desire for low‑key relaxation.
  culinary: Harry Cutler enjoys cooking cedar‑plank salmon with dill, pan‑searing trout almondine, foraging for morels, and pairing meals with locally brewed Pacific Northwest IPAs, while their cooking
    skill is solid enough to craft hearty stews but occasionally results in over‑salting due to a love of bold flavors.
  core: Harry Cutler is a meticulous, competition‑driven retiree who balances structured engineering consultancy with spontaneous woodworking projects, yet their chronic worry and preference for solitude
    often lead to procrastination and over‑analysis.
background:
  cultural: Harry is a white Pacific Northwestern American whose family has deep roots in the logging and farming communities of western Washington. Raised in the Seattle suburbs, he absorbed a regional
    ethos of self‑reliance, pragmatism, and a strong respect for nature. He identifies with local traditions such as the annual logging festival and the outdoors‑oriented lifestyle of Cowlitz County, while
    maintaining a skeptical, evidence‑based worldview shaped by his STEM education.
attributes:
  skills: '[''Mechanical Engineering'', ''Computer‑Aided Design (SolidWorks)'', ''Systems Analysis'', ''Statistical Data Analysis'', ''Python Programming'', ''Project Management'', ''Technical Writing'',
    ''Electronics Troubleshooting'', ''Woodworking'', ''Home Energy‑Efficiency Assessment'']'
  hobbies: '[''Fly fishing'', ''Woodworking'', ''Model railroading'', ''Reading scientific journals'', ''Crossword puzzles'', ''Sudoku'', ''Hiking'', ''Gardening'', ''Attending small‑group engineering meetups'']'
  career_goals: 'Even in retirement, Harry aims to channel his competitive drive into a part‑time consultancy focused on sustainable engineering solutions for small businesses in Cowlitz County. He hopes
    to author a practical guide on retrofitting rural homes for off‑grid energy, and to complete a personal project: designing and building a custom, insulated cabin that serves as a weekend retreat. Maintaining
    mental sharpness and independence remains his core ambition.'
