  hobbies: '["gardening", "reading historical fiction", "knitting", "quilting", "volunteering at food pantry", "playing bridge", "light hiking", "cooking family recipes", "attending community events"]'
  career_goals: Catherine aims to build on her decades of retail experience by strengthening the store’s culture of teamwork and customer focus. She hopes to mentor a new generation of supervisors, implement
    a streamlined performance‑tracking system that reduces stress for both staff and management, and eventually transition into a part‑time consulting role that allows her to share best‑practice insights
    with other stores in the region. While she values stability and predictability, she also wants to create a more flexible work schedule for herself as she approaches retirement, ensuring she can maintain
    her well‑being and manage the worries that occasionally accompany change.
