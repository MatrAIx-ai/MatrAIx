personas:
  professional: Mariacristina Kolster is a budding technical support enthusiast who channels their meticulous, solitary approach into troubleshooting hardware issues, drafting bilingual help‑desk documentation,
    and automating routine diagnostics with Python scripts while eyeing future roles as a CAD drafter or computer technician.
  sports: Mariacristina Kolster finds solace on the trails around Moses Lake, logs 6‑kilometer runs with the Washington State Trail Club, and watches Seattle Seahawks football every Sunday, preferring solo
    cardio over organized team sports.
  arts: Mariacristina Kolster channels creative energy into digital photography of mist‑shrouded lakes, immerses in science‑fiction novels by Ursula K. Le Guin, and drifts to the mellow strains of João Gilberto
    and Sigur Rós, allowing solitary artistry to balance analytical pursuits.
  travel: Mariacristina Kolster plans meticulous weekend road trips to the California desert for family reunions and dreams of a solo hike through Yellowstone, favoring budget‑friendly routes and detailed
    itineraries over spontaneous globe‑trotting.
  culinary: Mariacristina Kolster masters the art of homemade mole, hand‑rolled tamales, and cilantro‑lime rice, skillfully blending roasted chile‑powder, masa harina, and fresh lime into family meals while
    also perfecting a simple avocado‑toast breakfast for solo brunches.
  core: Mariacristina Kolster is a 16‑year‑old solitary strategist who blends structured tech ambitions with cultural cooking, meticulous budgeting, and a quiet love for nature and indie arts.
background:
  cultural: Mariacristina is of Mexican heritage, raised in a bilingual household where Spanish is spoken daily and Mexican traditions are celebrated through food, music, and family gatherings. Though she
    lives in the small, predominantly white community of Moses Lake, WA, her cultural identity remains a core part of her life, influencing her culinary interests, language skills, and occasional visits
    to extended family in California. Her upbringing blends the close‑knit, family‑oriented values of Mexican culture with the independent, self‑reliant mindset cultivated by her environment.
