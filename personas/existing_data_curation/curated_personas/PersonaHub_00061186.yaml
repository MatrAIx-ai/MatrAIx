persona_description: A veterinarian who specializes in the treatment and management of equine diseases, particularly those related to parasites and skin conditions such as chorioptic mange. They have extensive
  knowledge and experience in administering various treatments and medications for horses with mange, including the use of doramectin, fipronil, moxidectin gel, and oral ivermectin paste. They are skilled
  in identifying and treating the underlying causes of the disease, as well as in providing preventative care to prevent recurrence. They are knowledgeable about the effects of weather changes on the severity
  of the disease and have developed effective treatment protocols for chronic cases. They are also skilled in managing the psychological and behavioral aspects of horses with mange, including grooming and
  trimming the affected areas, as well as providing comfort and support to the horse.
