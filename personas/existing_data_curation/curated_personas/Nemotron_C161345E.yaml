personas:
  professional: An experienced community event planner and senior arts advisor, Qumeshia Cooper channels their meticulous organization, curious eye for the arts, and sociable leadership into coordinating
    festivals, crafting persuasive grant proposals, curating local exhibitions, and mentoring younger volunteers while they assertively champion intergenerational collaboration in Eastern North Carolina.
  sports: As a dedicated member of the Greenville Walking Club, Qumeshia Cooper enjoys brisk morning walks that keep their joints supple, follows the North Carolina Tar Heels basketball season with enthusiasm,
    and quietly roots for the Carolina Panthers during football weekends, and they often share walking tips with fellow members.
  arts: An avid patron of the arts, Qumeshia Cooper regularly attends Greenville’s monthly art walks, watches community theater productions of Shakespeare’s plays, sings in the church choir, draws creative
    inspiration from the intricate quilts of William Morris and the vibrant landscapes of Georgia O’Keeffe, and they often share their curatorial insights with fellow volunteers while organizing local exhibitions.
  travel: Preferring well‑planned, culturally rich journeys over spontaneous adventures, Qumeshia Cooper has visited historic sites in Washington, D.C., Savannah, Georgia, and New Orleans, Louisiana, and
    dreams of tracing family roots through a genealogical tour of Historic Charleston, while budgeting each trip with careful savings and senior travel discounts, and they always spend hours researching
    archives before departing.
  culinary: An accomplished home cook, Qumeshia Cooper delights in preparing Southern classics such as collard greens simmered with smoked turkey, buttermilk‑fried chicken, and sweet‑potato pie with a pecan
    crust, while experimenting with heirloom tomatoes and okra from their garden, showcasing a seasoned yet adventurous palate, and they often share recipes with neighbors during garden gatherings.
  core: Qumeshia Cooper is a vivacious, organized septuagenarian whose curiosity fuels a lifelong dedication to community arts, garden stewardship, and intergenerational mentorship, all balanced by a disciplined
    yet occasionally indulgent retirement lifestyle, and they never miss a chance to lead a choir rehearsal.
background:
  cultural: Qumeshia is a lifelong African‑American resident of eastern North Carolina, raised in a close‑knit Black community where church, family, and oral tradition formed the core of daily life. Growing
    up during the civil‑rights era, she witnessed the power of collective action and the resilience of her ancestors who worked the land as sharecroppers. Her cultural identity blends Southern hospitality,
    gospel and blues music, storytelling, and a deep reverence for community service. These influences shape her values, celebrations, and the way she engages with both the local Black heritage and the
    broader multicultural fabric of Macclesfield.
attributes:
  skills: '["Event planning and coordination", "Volunteer recruitment and management", "Community outreach and advocacy", "Art exhibition curation", "Fundraising and grant writing", "Mentoring and coaching",
    "Public speaking", "Conflict mediation", "Culinary arts (Southern cooking)", "Gardening and horticulture", "Quilting and textile arts", "Genealogy research"]'
  hobbies: '["Attending art exhibitions and theater", "Church choir participation", "Quilting", "Reading historical fiction and biographies", "Gardening (heirloom vegetables)", "Cooking Southern cuisine",
    "Walking club", "Genealogy research", "Senior book club facilitation"]'
  career_goals: Even in retirement, Qumeshia aims to serve as a senior advisor for the Pitt County Arts Council, guiding program development and fostering intergenerational collaborations. She aspires to
    launch a community oral‑history project that records the stories of Black elders in Eastern North Carolina, and hopes to publish a memoir that intertwines her personal journey with the region’s cultural
    heritage. Additionally, she plans to host a podcast series highlighting local artists, historic sites, and the evolving narrative of Black Southern identity.
