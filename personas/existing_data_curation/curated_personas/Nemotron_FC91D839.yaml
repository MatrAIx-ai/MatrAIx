  career_goals: She dreams of becoming a scientist‑engineer who invents new technologies, inspired by her love for discovering how things work. She imagines working in a research lab or designing interactive
    museum exhibits, where she can combine her curiosity about science with her appreciation for art. In the near future, she hopes to enter science fairs and win competitions, feeding her competitive drive.
