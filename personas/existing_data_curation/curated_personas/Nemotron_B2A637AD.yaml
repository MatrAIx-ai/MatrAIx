  career_goals: Myong aims to transition into a technical leadership role—such as lead engineer or product manager—where she can steer projects that prioritize inclusive design and ethical AI. She wants
    to mentor junior developers, champion accessibility standards across the company, and contribute to open‑source tools that support multilingual users. Long‑term, she envisions influencing industry best
    practices on cultural representation in technology and possibly launching a startup that merges storytelling with interactive media.
