personas:
  professional: Myong Chiu harnesses fifteen years of full‑stack development experience in Python, JavaScript, and Java to lead agile teams that deliver ethically‑aligned, accessible web applications, pairing
    a disciplined, structured workflow with an open, collaborative culture that mirrors their sociable and flexible personality.
  sports: Myong Chiu fuels their energetic lifestyle with weekend hikes in the Hudson Valley, regular salsa‑dance nights at the Manhattan Salsa Society, a committed fanhood for the New York Knicks and Yankees,
    occasional runs in support of the NYC Marathon, and winter sessions at a local indoor climbing gym.
  arts: Myong Chiu immerses themselves in the city’s cultural pulse by frequenting the Moore Street Gallery for contemporary installations, catching indie shows at Brooklyn’s Music Hall featuring artists
    like Mitski and Tame Impala, and drawing narrative inspiration from filmmakers such as Bong Joon‑ho and comic‑artist Sarah Glidden.
  travel: Myong Chiu prefers spontaneous yet budget‑conscious travel, often escaping for weekend getaways to Hudson Valley wineries, planning annual cultural immersions in Barcelona’s modernist architecture,
    and dreaming of a spring visit to Kyoto’s cherry‑blossom festivals while maintaining a modest travel fund alongside family commitments.
  culinary: Myong Chiu delights in crafting bold fusion dishes like miso‑glazed short‑rib tacos topped with kimchi slaw and a drizzle of sriracha, while their pantry staples—fermented black beans, smoked
    paprika, lemongrass, and Sichuan peppercorn—reflect a love for blending East‑Asian flavors with New York’s eclectic culinary scene.
  core: Myong Chiu is a sociable tech leader who blends disciplined code with spontaneous salsa steps, quietly battles a habit of over‑booking social events, and habitually pours a third cup of coffee while
    brainstorming inclusive product ideas.
background:
  cultural: Myong was raised in a multicultural East Asian household—her parents immigrated from Taiwan and brought with them a deep appreciation for family gatherings, traditional festivals, and bilingual
    communication (Mandarin and English). Growing up in New York, she blended these values with the city's fast‑paced, diverse environment, celebrating Chinese New Year with community events while also
    immersing herself in the city's multicultural neighborhoods. This dual heritage informs her empathetic approach to teamwork and her commitment to creating technology that respects and reflects cultural
    nuance.
