  career_goals: Jerry aims to blend his business expertise with his passion for art by launching a boutique consulting firm that helps small arts organizations develop sustainable revenue streams. Within
    the next two years he plans to earn a nonprofit management certification and secure a board position with the Collin County Arts Council. He envisions transitioning to a full-time arts economic development
    advisor for the region, mentoring emerging entrepreneurs, and eventually authoring a book on integrating creativity into business strategy.
