personas:
  professional: Jerry Cable is a strategic business consultant specializing in arts organizations, leveraging his expertise in market research, data visualization with Excel and Tableau, digital marketing,
    and graphic design to craft sustainable revenue models, while they channel their highly imaginative curiosity and methodical planning into creative yet reliable solutions for cultural nonprofits.
  sports: Jerry Cable is an avid outdoor enthusiast who hikes the North Texas trail system most weekends, plays midfield for the Collin County Soccer Club, roots for the Dallas Mavericks, FC Dallas, and
    the Texas Rangers, and follows the Dallas Stars during hockey season, while they schedule regular cardio runs to stay fit.
  arts: Jerry Cable is a passionate arts aficionado who paints abstract canvases, experiments with analog photography, performs acoustic guitar covers of John Mayer and Joshua Bell for friends, regularly
    visits exhibitions featuring works by Yayoi Kusama and Thomas Kinkade, and supports local theater productions at the Dallas Theater Center, while they draw creative inspiration from these experiences.
  travel: Jerry Cable is a culturally curious traveler who prefers meticulously planned trips that blend art immersion and adventure, having explored the street murals of Oaxaca, the historic temples of
    Kyoto, and the Renaissance galleries of Florence, while they dream of a future pilgrimage to the Smithsonian’s Renwick Gallery and always book boutique accommodations that double as creative retreats.
  culinary: Jerry Cable is an experimental home chef who combines sous‑vide techniques with Tex‑Mex flavors, frequently cooking dishes like chipotle‑infused duck confit with black garlic aioli and quinoa‑rose‑water
    salad, sourcing ingredients such as fresh lavender, smoked paprika, and heirloom tomatoes, and enjoys hosting tasting evenings for friends, though they sometimes over‑season their creations in the pursuit
    of boldness.
  core: Jerry Cable is a methodical free‑spirit who merges business acumen with artistic flair, juggling community soccer league duties, late‑night photography, and relentless budgeting, all while battling
    a habit of falling asleep at their desk after too many espresso shots.
background:
  cultural: Jerry was raised in the suburban Texas community of Lavon, reflecting a blend of Southern hospitality, independent spirit, and strong community values typical of the area. His white American
    heritage includes roots in German and Irish ancestry, and he grew up with a mix of Midwestern work ethic and Texan cultural influences such as country music, barbecue traditions, and a love for outdoor
    activities. He is active in his local church and participates in community events, while his curiosity drives an appreciation for broader global art and literature.
