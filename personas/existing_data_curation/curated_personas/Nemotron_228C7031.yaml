personas:
  professional: Jose Harvey, an eager sandbox architect and junior storyteller, channels a blend of curiosity and practicality by constructing elaborate block forts while insisting on using the precise
    blue piece for the roof, reflecting their balanced approach to creativity and order within the world of play‑based learning.
  sports: Jose Harvey, a sprightly participant in the Oakwood Cubs toddler soccer group each spring and a regular enrollee in the community pool's mini‑swim lessons during summer, proudly dons a tiny Yankees
    cap while cheering for the local minor‑league baseball team, embodying an early but varied affinity for organized play, team spirit, and active movement.
  arts: Jose Harvey, captivated by the playful melodies of the Sesame Street theme and the vivid illustrations of Dr. Seuss, often mimics Muppet dance moves, recites verses from 'Green Eggs and Ham', and
    delights in animated Pixar shorts, weaving a budding love for performance, storytelling, and visual art into daily play.
  travel: Jose Harvey, who recently embarked on a family road trip to Orlando’s Magic Kingdom and enjoys short weekend visits to Grandma’s farm in the countryside, prefers car journeys over long flights,
    delights in traveling with a stuffed dinosaur as a comfort companion, and dreams of one day exploring the sandy beaches of Cancun, reflecting a balance of adventure, routine, and family‑centered exploration.
  culinary: Jose Harvey, a fan of cheesy macaroni, chicken nuggets, and banana pancakes, delights in dipping foods into ketchup or honey, enjoys helping stir batter with a plastic spoon, and prefers meals
    that feature cheddar cheese, sweet potatoes, and apple slices, showcasing a developing palate coupled with enthusiastic, if sometimes messy, participation in mealtime.
  core: Jose Harvey, a three‑year‑old with an unquenchable curiosity, a penchant for arranging toys by color, a habit of insisting on the exact blue block for every structure, and an occasional stubborn
    refusal to share a favorite snack, embodies a charming blend of practicality, creativity, and endearing quirks.
background:
  cultural: Jose grows up in a white, middle‑class family in Hagerstown, Maryland. His family participates in community traditions such as neighborhood barbecues, seasonal celebrations like Halloween and
    Thanksgiving, and attends a local preschool that reflects the region’s Mid‑Atlantic values of friendliness and civic engagement. He is exposed to a blend of American cultural customs and regional Maryland
    heritage, including occasional visits to local farms and county fairs, which shape his early sense of community and belonging.
attributes:
  skills: '["Running", "Climbing", "Kicking a ball", "Crayon drawing", "Block building", "Counting to ten", "Simple storytelling", "Following two-step instructions", "Basic self‑care (washing hands)"]'
  hobbies: '["Duplo block building", "Coloring with crayons", "Listening to picture books", "Nature walks at the park", "Singing nursery rhymes", "Dancing", "Pretend cooking"]'
  career_goals: Although not yet in the workforce, Jose imagines future roles that satisfy both his curiosity and a sense of practicality. He often says he wants to be a firefighter to help people, an astronaut
    to explore space, and a teacher to share stories. He also mentions building things, hinting at an ambition to become a construction worker or engineer, and values any role where he can discover, create,
    and contribute to his community.
