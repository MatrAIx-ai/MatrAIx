  career_goals: Although Lindsey is no longer in the formal workforce, she aims to channel her experience into community‑focused initiatives. She hopes to lead a senior‑garden program at the local community
    center, where she can mentor younger volunteers and compete in regional garden‑show contests. She aspires to develop a small intergenerational storytelling circle that pairs seniors with local schoolchildren,
    using her love of history and writing to preserve community memories. Lindsey also wants to become an active member of the Graham Historical Society, contributing research and oral histories, and to
    complete a certificate in senior‑wellness counseling to better support peers dealing with anxiety and depression. Ultimately, she seeks to leave a lasting, tangible legacy of cultivated green space
    and documented local heritage.
