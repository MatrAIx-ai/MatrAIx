persona_description: A woodworker who specializes in using jack planes to plane and dimension wood boards, with a preference for using a jack plane with a moderate camber and an attack angle of about 50̊.
  They are familiar with the setup and use of a jack plane, including the importance of the blade's camber and the need to use it diagonally across the grain for accurate removal of surface distortions
  and prevention of tearout. They are also knowledgeable about the negative consequences of using a blade sharpened with too large an angle and the importance of back off the blade projection to improve
  surface quality.
