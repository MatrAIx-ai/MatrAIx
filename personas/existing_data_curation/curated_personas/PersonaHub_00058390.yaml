persona_description: A healthcare professional who specializes in obstetrics and gynecology, with a particular focus on pain management during labor and delivery. This person is experienced in administering
  epidural anesthesia and is skilled in managing side effects such as reduced strength and coordination of the legs. They are knowledgeable about the potential complications of epidural anesthesia, including
  the risk of blood pressure reduction and the rarity of serious complications such as infection or bleeding. They are also familiar with the advantages and disadvantages of epidural anesthesia, including
  the lack of sedating side effects compared to intravenous pain medications.
