  hobbies: '[''visiting art galleries'', ''folk museums'', ''craft fairs'', ''landscape photography'', ''birdwatching'', ''hiking'', ''organic gardening'', ''seasonal cooking'', ''playing acoustic guitar'',
    ''acrylic painting'', ''volunteering in community projects'']'
  career_goals: Brian aims to move from his current non‑employment status into a role that blends his compassion with his creative interests. He plans to obtain his GED and subsequently volunteer as a mentor
    for at‑risk youth in Hickory, with the longer‑term goal of becoming a part‑time coordinator for a local community arts center or garden. He also dreams of launching a modest home‑based studio where
    he can teach woodworking and photography workshops, sharing his love for art, nature, and community building.
