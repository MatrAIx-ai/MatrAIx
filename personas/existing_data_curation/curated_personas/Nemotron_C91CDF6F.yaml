personas:
  professional: An experienced early childhood program director, Dorothy Vaughn leverages their business acumen, data‑driven budgeting, and conflict‑resolution skills while channeling a relaxed, flexible
    work style and a natural curiosity that blends innovative tech with time‑tested teaching methods.
  sports: Dorothy Vaughn is a devoted fan of the Dallas Cowboys and the Texas Rangers, joins a local YMCA fitness class for low‑impact cardio, hikes with the East Texas Trail Runners club each fall, and
    plays recreational softball on a community co‑ed league team.
  arts: Dorothy Vaughn immerses themselves in country music and Southern storytelling, regularly dancing to Carrie Underwood and George Strait at line‑dancing nights, attending the East Texas Community
    Theatre’s productions of "Our Town" and "The Miracle Worker," and swapping book club picks that range from Toni Morrison to local historian memoirs.
  travel: Dorothy Vaughn prefers short, spontaneous road trips that blend nature and nostalgia, having explored the Sabine National Forest, a weekend in Austin’s live‑music scene, and a planned visit to
    Santa Fe’s art markets to draw inspiration for future community projects.
  culinary: Dorothy Vaughn delights in cooking Texan comfort food, skillfully frying chicken‑fried steak, simmering a hearty chili with black beans, and perfecting peach cobbler, while sprinkling garden‑fresh
    basil and smoked paprika into homemade sauces, often sharing meals at potlucks.
  core: Dorothy Vaughn is a big‑hearted, slightly scatter‑brained community champion who balances a love for Texan comfort, yoga, and data‑driven early‑learning with a perpetual worry that fuels both meticulous
    grant writing and occasional over‑commitment.
background:
  cultural: Dorothy grew up in a close‑knit, white, Southern‑Texas family that emphasized hospitality, faith, and community involvement. She was raised in a modest Baptist household, attending church services
    and local high‑school football games, which reinforced her sociable and cooperative disposition. The blend of rural Texas traditions and a pragmatic business education shapes her balanced view of embracing
    new ideas while honoring established practices. Her cultural roots inform her commitment to family, neighborly service, and preserving the community spirit of Harleton and Harrison County.
attributes:
  skills: '["Program administration", "Staff supervision", "Budget management", "Curriculum development", "Community outreach", "Conflict resolution", "Grant writing", "Public speaking", "Event planning",
