  hobbies: '["Community volunteering", "Organizing local events", "Gardening", "Cooking Texas cuisine", "Reading contemporary fiction", "Hiking in East Texas forests", "Yoga for stress relief", "Participating
    in a book club", "Line dancing", "DIY home projects"]'
  career_goals: Dorothy aims to advance to a district-level education administrator role, where she can shape policies that balance innovative early‑learning approaches with the stable traditions valued
    by her community. She aspires to earn a master’s degree in educational leadership, spearhead a regional partnership program linking schools with local businesses, and eventually launch a nonprofit focused
    on providing affordable, high‑quality childcare in rural Texas. Her goals reflect a desire to create supportive environments for both children and staff while maintaining fiscal responsibility.
