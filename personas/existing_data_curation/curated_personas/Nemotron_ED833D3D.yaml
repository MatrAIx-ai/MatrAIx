  career_goals: Pedrito dreams of a future where he can combine his love for structure and achievement. He wants to become an astronaut or a robotics engineer because he enjoys building and solving complex
    problems. He is also fascinated by firefighting, admiring the disciplined training and teamwork of firefighters in his community, and hopes to join the local fire department one day. Academically, he
    aims to win his school’s science fair and maintain top grades, seeing those milestones as stepping stones toward a career in STEM or public service.
