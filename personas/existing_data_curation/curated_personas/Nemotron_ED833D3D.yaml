personas:
  professional: Pedrito Cabrera is a budding tech tinkerer who channels their love for order into building intricate LEGO robots, mastering Scratch programming, and excelling in the school’s robotics club,
    where their disciplined approach sets them apart, and they always strive for precision.
  sports: Pedrito Cabrera thrives on the neighborhood soccer field playing for the Madera Youth Hawks, idolizes the San Francisco Giants and Los Angeles Lakers, and maintains a structured training routine
    that balances weekday practice with weekend family hikes, though they sometimes skip a stretch to keep up with competitive video‑game tournaments.
  arts: Pedrito Cabrera immerses themselves in the creative world of The LEGO Movie, draws inspiration from the whimsical illustrations of Dr. Seuss, enjoys listening to the lively tunes of Los Tigres del
    Norte during family cooking nights, and they craft Scratch games that echo the mystery of Sherlock Holmes novels.
  travel: Pedrito Cabrera dreams of exploring the towering cliffs of Yosemite National Park, revisits the family’s seasonal farm in the Central Valley every summer, and saves pocket money for a future trip
    to the historic streets of a neighboring border town where they can witness the vibrant Día de los Muertos celebrations.
  culinary: Pedrito Cabrera loves helping slice fresh jalapeños and mash avocados for guacamole, perfecting the crunch of homemade taco shells, and occasionally adds a dash of cilantro to a classic pepperoni
    pizza, though they often sneak a bite of cheese before the dish is finished.
  core: Pedrito Cabrera is a meticulously organized eight‑year‑old whose competitive spark fuels LEGO engineering, soccer drills, and baseball‑card hustles, even if a touch of stubbornness sometimes sparks
    sibling squabbles over snack time, and they often debate rules with friends.
background:
  cultural: Pedrito comes from a Mexican‑American family living in Madera, California. Spanish is spoken at home, and his family celebrates cultural traditions such as Día de los Muertos, Mexican holidays,
    and communal cooking of regional foods. The agricultural setting of Madera County reinforces values of hard work and community support. While embracing his Mexican heritage, Pedrito also experiences
    the multicultural environment of California, attending a bilingual elementary school where he interacts with peers from diverse backgrounds, blending his cultural roots with broader American influences.
