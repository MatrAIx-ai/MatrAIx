  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Strategy video games (e.g., Minecraft Education)'', ''Bicycle riding'', ''Drawing superheroes'', ''Collecting baseball cards'', ''Youth soccer practice'',
    ''Scratch coding for kids'']'
  career_goals: Michael is fascinated by systems that have clear rules and ways to compete within them. He dreams of someday creating his own video games or building robots, so he hopes to become a software
    developer or a robotics engineer. He also enjoys the challenge of mastering strategy games, which fuels an ambition to be a competitive e-sports player when he is older. For now, he looks forward to
    learning basic coding with Scratch, winning school science-fair projects, and excelling in any activity that lets him test his skills against others.
