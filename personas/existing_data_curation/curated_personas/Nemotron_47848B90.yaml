personas:
  professional: Michael Smith, an aspiring young engineer, uses their love for step-by-step LEGO kits, jigsaw puzzles, and strategic tablet games to hone early spatial reasoning and systematic problem-solving
    skills, channeling their preference for predictable structures into methodical builds while their laid-back habit of leaving pieces scattered and their competitive drive to finish projects faster than
    peers reveal a relaxed approach to obligations, and they remain emotionally steady when a model topples.
  sports: Michael Smith, a member of the Maple Grove Strikers U-7 soccer squad, relishes the focused, competitive drills over chaotic scrimmages, pedals their bike to the local park for extra stamina, and
    roots for the Chicago Cubs and MLS's LA Galaxy, channeling their competitive streak into every sprint and kick.
  arts: Michael Smith, a budding visual storyteller, spends hours sketching Marvel superheroes in the bold style of Jack Kirby and Stan Lee while also constructing intricate LEGO cityscapes inspired by
    the Creator Expert line; they let their reserved yet creative nature flourish in solitary artistic sessions.
  travel: Michael Smith, guided by their parents' detailed road-trip itineraries, has explored Disneyland, the Grand Canyon, and the interactive science museum in Washington, D.C., favoring structured day-by-day
    plans yet occasionally slipping off-script to chase a giant LEGO-themed souvenir; they balance their love of predictability with bursts of spontaneous adventure.
  culinary: Michael Smith, a picky eater who adores pepperoni pizza, macaroni and cheese, and tiny LEGO-shaped chicken nuggets, can assemble a perfect PB&J sandwich with laser-precision, yet often leaves
    a half-finished bowl of carrots untouched; they reflect a selective taste and occasional disorganized snack habits.
  core: Michael Smith, a 6-year-old LEGO architect with a competitive edge, blends a love for orderly building and strategic gaming with a laid-back habit of scattering half-finished projects across the
    living room; they stay emotionally steady and remain skeptical of every trade offer.
background:
  cultural: Michael was raised in a predominantly white, middle-class suburban family in Flemington, New Jersey, part of Hunterdon County. His family values education, community involvement, and seasonal
    celebrations such as Thanksgiving, Fourth of July fireworks, and local fairs. He attends the nearby public elementary school, where he participates in after-school programs like the library's story
    hour and the community's youth sports league. The Flemington area's mix of historic small-town charm and proximity to New York City gives him exposure to both local traditions and broader cultural experiences,
    shaping a balanced, pragmatic outlook.
