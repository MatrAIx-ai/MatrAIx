persona_description: A physicist who specializes in space science research, particularly in atmospheric, ionospheric, auroral, magnetospheric, planetary, interplanetary, solar, astrophysics and cosmology.
  He/she is a professor at UC Berkeley and has organized a symposium to celebrate the 50th anniversary of the Space Sciences Laboratory (SSL). The physicist has conducted pioneering work at SSL and has
  been involved in several research projects, including the Cosmic Origins Spectrograph (COS) and the Mars Atmosphere and Volatile EvolutioN (MAVEN) satellite. The physicist is also involved in the design
  of a proposed Joint Dark Energy Mission (JDEM) to precisely measure the expansion of the universe.
