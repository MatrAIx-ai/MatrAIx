  career_goals: At 70, Riley's primary ambition is to cement the company's legacy by guiding a smooth leadership transition to his designated successor, ensuring long-term financial stability and continued
    community impact. He aims to strengthen the firm's sustainable practices, expand its regional partnerships, and establish a charitable endowment that supports local education and veteran services. Personal
    goals include reducing stress through a balanced schedule, maintaining his health, and spending more quality time with his wife and family.
