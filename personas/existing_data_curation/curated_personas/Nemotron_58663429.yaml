  hobbies: '[''Sailing'', ''Landscape Photography'', ''Watercolor Painting'', ''Community Theater (Improv)'', ''Hackathons'', ''Generative Music'', ''Art Center Volunteering'', ''Coding‑for‑Creatives Workshops'',
    ''Seasonal Foraging'', ''Lobster Cooking'', ''Board Games'']'
  career_goals: Joshua aims to transition from senior development to a hybrid leadership role where he can shape product vision while remaining hands‑on with technology. He plans to launch a community‑focused
    tech incubator on Peaks Island that supports local artists and craftspeople in creating digital experiences, leveraging his expertise in creative coding and cloud services. Concurrently, he aspires
    to become a sought‑after speaker at regional tech and art conferences, mentor the next generation of developers through workshops, and author a book on integrating artful design principles into enterprise
    software development.
