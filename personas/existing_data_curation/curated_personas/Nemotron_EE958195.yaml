personas:
  professional: Isaac Corbitt is a budding junior engineer who blends their love of LEGO construction, Scratch programming, and marine science into playful problem‑solving projects, and their methodical,
    organized nature ensures every prototype is meticulously documented.
  sports: Isaac Corbitt is an energetic youth soccer enthusiast who plays forward for the local Bayou Bears youth league, idolizes FIFA star Kylian Mbappé, cheers for the New Orleans Saints on Sundays,
    and incorporates daily backyard sprint drills into their routine to stay fit.
  arts: Isaac Corbitt is a creative cartoonist who spends afternoons sketching characters inspired by Adventure Time and Calvin and Hobbes, collects stickers of Pixar’s Toy Story crew, and enjoys listening
    to the upbeat tunes of Kidz Bop while drawing.
  travel: Isaac Corbitt is an inquisitive traveler who has explored the swamps of the nearby bayou, visited the marine exhibits at the Audubon Aquarium, dreams of a family road trip to the Grand Canyon,
    and keeps a scrapbook of postcards from each destination.
  culinary: Isaac Corbitt is a budding home chef who loves whipping up peanut butter‑banana sandwiches, assembling simple macaroni‑and‑cheese bowls with hidden broccoli florets, and occasionally experiments
    with shrimp tacos after watching cooking videos about marine cuisine.
  core: Isaac Corbitt is a curious, organized eight‑year‑old who balances Lego engineering, soccer, and a secret stash of crayons, yet often forgets to put away their snack wrappers.
background:
  cultural: Isaac was born and raised in Orange, Texas, a modest city on the Gulf Coast with a blend of Southern and coastal influences. His family is white American, and they embody typical Texan values
    such as friendliness, respect for neighbors, and a strong sense of community. Weekend family gatherings often feature BBQ, country music, and football games, reflecting the local culture. The proximity
    to the Mississippi River and Gulf marshes has given Isaac an early appreciation for the natural environment, and he has learned about regional wildlife and the importance of conservation. He attends
    the local public elementary school, where he participates in community service projects and learns about the diverse cultural mix of nearby Hispanic and Cajun communities, fostering openness and respect.
    Religious traditions in his household, likely centered around a Protestant church, emphasize kindness, cooperation, and service to others.
