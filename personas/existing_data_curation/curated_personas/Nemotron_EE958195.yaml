  career_goals: Isaac dreams of turning his curiosity and practical mindset into a future career that helps his community. He is fascinated by how things work and hopes to become an engineer—perhaps a civil
    or mechanical engineer—so he can design structures that improve life in his hometown, such as bridges over the nearby waterways. He also expresses interest in marine biology, inspired by the bayous
    and Gulf coast wildlife, and imagines protecting marine ecosystems. Additionally, his kindness and desire for harmony lead him to consider becoming a teacher, where he could share knowledge and support
    classmates. He aims to continue learning, staying organized, and applying his methodical approach to achieve these goals.
