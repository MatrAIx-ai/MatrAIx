  hobbies: '[''Cooking traditional Mexican dishes'',''Listening to regional Mexican music'',''Gardening'',''Hiking local trails'',''Bullet journaling and planning'',''Reading personal development books'',''Photography'',''Volunteering
    at community center'',''Practicing yoga and mindfulness'',''Watching documentaries'']'
  career_goals: Maria aims to leverage her strong work ethic and love of learning to move from cashier to supervisory roles within the next three years. She plans to enroll in an associate degree program
    in Business Administration at Columbia Basin College, targeting certifications in bookkeeping and supply‑chain fundamentals. Her long‑term ambition is to become a store manager, eventually overseeing
    multiple locations, and to one day open her own neighborhood market that offers both mainstream goods and traditional Mexican products for the local Latino community. She is motivated by a desire for
    financial stability, professional achievement, and the ability to give back to her cultural community.
