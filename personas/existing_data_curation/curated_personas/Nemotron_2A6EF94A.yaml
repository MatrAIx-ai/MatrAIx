  hobbies: '[''Running (structured 5K training)'', ''Crossword and Sudoku puzzles'', ''DIY electronics projects'', ''Mentoring girls in local STEM outreach programs'', ''Reading non‑fiction (history, psychology)'',
    ''Precise baking (recipe experimentation)'', ''Hiking in the Potomac region'']'
  career_goals: Sharlette aims to translate her methodical work style and technical expertise into a data analyst or research scientist role within a federal research agency such as the NIH or the Department
    of Defense. In the next two years, she plans to complete a professional certification in data analytics (e.g., Google Data Analytics or AWS Certified Data Analytics) and build a portfolio of real‑world
    projects that demonstrate her ability to clean, visualize, and interpret complex datasets. Long‑term, she aspires to lead a multidisciplinary team where she can set clear performance metrics, drive
    evidence‑based decision making, and eventually obtain a master’s degree in biomedical informatics to deepen her analytical capabilities.
