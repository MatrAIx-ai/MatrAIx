personas:
  professional: Sharlette Posey, a meticulous data analyst in training, leverages her Python, R, and MATLAB expertise to execute structured, reproducible analyses for federal research projects while applying
    rigorous project‑management tools and a competitive drive to exceed performance metrics.
  sports: Sharlette Posey, a dedicated 5K runner, trains with the downtown Striders running club and regularly tracks progress via Garmin, while cheering on the Chicago Bulls and occasionally volunteering
    as a timekeeper for community track meets, illustrating her love for competitive, structured fitness.
  arts: Sharlette Posey finds creative balance in listening to the minimalist compositions of Philip Glass and the analytical lyrics of Fiona Apple, attending monthly science‑themed art exhibitions at the
    Museum of Contemporary Art, and solving intricate crosswords that mirror her love for structured artistic challenges.
  travel: Sharlette Posey plans every trip with an exhaustive spreadsheet, favoring research‑oriented destinations like Washington, D.C.’s National Institutes of Health and Kyoto’s tea‑ceremony tours in
    Japan, while keeping expenses within a modest student‑budget framework.
  culinary: Sharlette Posey treats baking like a lab experiment, perfecting a lemon‑curd tart using freshly squeezed lemons, fine‑grain sea salt, and measured portions of unsalted butter, while relying
    on a digital kitchen scale and a timer to ensure reproducible results each weekend.
  core: Sharlette Posey is a 23‑year‑old detail‑driven analyst‑to‑be who turns structured puzzles, data, and recipes into competitive achievements, yet sometimes lets her relentless schedule eclipse spontaneous
    joy.
background:
  cultural: Sharlette grew up in a suburban Midwestern community where practicality, self‑reliance, and a strong emphasis on education were core family values. Moving to the Washington, D.C. metro area
    for college exposed her to a culturally diverse environment, blending her Midwestern work ethic with the fast‑paced, collaborative atmosphere of Arlington, VA. Her white ethnic background reflects a
    blend of Northern European ancestry (German and Irish roots), and she identifies with mainstream American cultural norms that prioritize meritocracy, individual achievement, and civic responsibility,
    while also appreciating the multicultural perspectives she encounters in her city.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''SQL database querying'', ''MATLAB modeling'', ''Laboratory techniques (PCR, gel electrophoresis, spectrophotometry)'', ''Technical report
