  career_goals: Beth often talks about wanting to help others and caring for animals. She imagines becoming a teacher like her mom's friend, a veterinarian who looks after dogs at the park, and sometimes
    a 'sand architect' who builds elaborate beach castles. These budding ambitions reflect her curiosity about how things work and a practical desire to contribute in caring ways.
