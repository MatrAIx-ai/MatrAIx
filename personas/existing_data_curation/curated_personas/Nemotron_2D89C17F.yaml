personas:
  professional: Beth Jones, a three‑year‑old budding engineer who loves assembling interlocking blocks, balances her boundless curiosity with a practical knack for reusing familiar pieces, and they approach
    every play session like a tiny problem‑solver.
  sports: Beth Jones, an enthusiastic toddler fan of the Chicago Cubs and the Chicago Bulls, participates in a local Kids Soccer Club and enjoys weekend trips to the community swimming pool, balancing energetic
    play with occasional quiet cuddle time on the couch while watching highlight reels with her family.
  arts: Beth Jones, a lively admirer of The Wiggles and Sesame Street, spends afternoons dancing to “Fruit Salad” and drawing colorful pictures of dinosaurs, often quoting the line “I’m a good cop, we’re
    all in this together” from her favorite cartoon, and they use art time to express curiosity while staying grounded in familiar tunes.
  travel: Beth Jones, a curious explorer who has already visited Disneyland in California and the historic forts of Williamsburg, Virginia, prefers short trips with a packed snack bag and a favorite stuffed
    bear, and they delight in collecting souvenir postcards while their parents handle the logistics.
  culinary: Beth Jones, a picky‑but‑adventurous eater, loves creamy mac and cheese, banana slices, and peanut butter & jelly sandwiches, enjoys helping stir batter for pancakes with a tiny wooden spoon,
    and they occasionally sneak a bite of broccoli when it’s hidden among cheese, showcasing a balance of practicality and curiosity in the kitchen.
  core: Beth Jones, a calm and resilient three‑year‑old, balances relentless curiosity with a love of routine, hoards stickers in a piggy bank, and leaves a trail of scattered blocks wherever she explores,
    reflecting both her practical side and charming disorganization.
background:
  cultural: Beth comes from a white American family living in San Diego, California. Her household reflects typical Southern‑California middle‑class values, blending a love of outdoor activities, beach
    outings, and community events with a respect for holidays such as Thanksgiving, Christmas, and the Fourth of July. While her primary cultural identity is rooted in mainstream Anglo‑American traditions
    that emphasize resilience, friendliness, and a laid‑back coastal lifestyle, her parents expose her to the multicultural environment of San Diego, so she occasionally hears Spanish words and sees diverse
    cultural celebrations in the neighborhood.
