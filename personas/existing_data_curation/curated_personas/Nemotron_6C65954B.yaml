  career_goals: Although retired from formal teaching, Mary is focused on mentoring emerging educators through informal coaching and guest lectures at the local community college. She intends to complete
    a memoir that weaves her teaching experiences with reflections on lifelong learning and creativity. Mary also aims to expand the senior art workshop she started, securing funding to provide supplies
    and exhibit participants' works. Additionally, she plans to take a leadership role on the board of the Bradenton Arts Council and to champion intergenerational bridge programs that combine her competitive
    spirit with community building.
