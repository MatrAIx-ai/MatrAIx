persona_description: A materials scientist who specializes in the field of materials science and metallurgy, focusing on toughness, a measure of a material's ability to absorb energy and plastically deform
  without fracturing. They are experienced in testing and measuring the toughness of materials using various methods, including the Charpy and Izod notched impact strength tests. They have a deep understanding
  of the relationship between strength and toughness and the importance of balance between these two properties in materials design. They are also familiar with the various definitions and formulas used
  to calculate toughness and are able to interpret results from testing.
