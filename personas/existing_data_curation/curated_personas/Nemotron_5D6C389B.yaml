  career_goals: As she approaches retirement, Roberta’s primary goal is to transition into a part‑time crew lead role where she can formalize her mentorship of younger laborers and ensure safety compliance
    on every job. She plans to earn an OSHA 30‑hour construction safety certification and to obtain a small‑business permit so she can offer hand‑yman services to neighbors and local churches. In the longer
    term, she hopes to use her earnings to fund a modest retirement nest egg, purchase a wheelchair‑accessible van for community outreach, and eventually volunteer full‑time at the local food pantry while
    still staying active on construction sites as a consultant for safety audits.
