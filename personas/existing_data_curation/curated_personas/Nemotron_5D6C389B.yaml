personas:
  professional: Roberta Mohamed, a seasoned construction laborer in Putnam County, leverages three decades of concrete finishing, scaffolding inspection, and bobcat operation to mentor crews, enforce safety,
    and keep worksites orderly, channeling her practical problem‑solving and compassionate, outgoing nature into a part‑time crew lead role, and they inspire younger workers with steady optimism.
  sports: Roberta Mohamed enjoys low‑impact cardio by strolling Putnam County’s nature trails with her grandchildren three times a week, participates in the senior center’s gentle yoga class, faithfully
    roots for the Tampa Bay Buccaneers and Miami Heat, and they occasionally join a community baseball pick‑up game during the summer months.
  arts: Roberta Mohamed sings soul‑stirring gospel with her church choir, drawing inspiration from Mahalia Jackson, spends festival evenings swaying to the blues of B.B. King and folk storytelling of Joan
    Baez, while their quilting circle recreates classic William Morris motifs, making the arts a communal lifeline, and they cherish the sense of shared creativity.
  travel: Roberta Mohamed prefers organized group road trips that blend heritage sightseeing with family time, having already toured the historic streets of Savannah and the Smithsonian museums in Washington,
    D.C., they dream of a soulful pilgrimage to New Orleans for its jazz and to hike the Great Smoky Mountains, and they always pack extra soul‑food for the journey.
  culinary: Roberta Mohamed embraces hearty Southern cuisine, mastering collard greens simmered with smoked turkey hocks, sweet‑potato casserole, and a peppery jambalaya, they often contribute their signature
    cornbread to town potlucks, and they’re known for seasoning every dish with a pinch of cayenne and a dash of nostalgia.
  core: Roberta Mohamed is a community‑centered, 60‑year‑old construction veteran who blends routine‑driven practicality with warm, outspoken generosity, even as they battle daily worries and occasionally
    misplace their calendar.
background:
  cultural: Roberta is a Black woman raised in rural Central Georgia during the civil‑rights era. Her family’s roots trace back to the Great Migration, and she grew up steeped in Southern church traditions,
    gospel music, and the strong sense of community that characterizes the Black neighborhoods of Putnam County. The values of perseverance, hospitality, and mutual aid were reinforced by her mother’s teachings
    and by church mentors who emphasized service to others. These cultural threads shape Roberta’s everyday life—her love of soul food, her commitment to community service, her respect for elders, and her
    pride in maintaining the practical skills that have supported her family for decades.
