personas:
  professional: Carlos Santos is a musculoskeletal physical therapist who integrates advanced manual therapy, gait analysis, and rhythmic movement techniques into rehabilitation, approaching each case with
    meticulous documentation, disciplined organization, and a competitive drive that they apply to achieve optimal outcomes.
  sports: Carlos Santos plays in a local adult soccer league, follows the Orlando Magic and Tampa Bay Rays, and schedules early morning swims and weekend hikes through the Florida wetlands as part of a
    disciplined yet competitive fitness routine that they strictly maintain.
  arts: Carlos Santos frequently visits the Orlando Museum of Art, sketches watercolor studies inspired by Georgia O'Keeffe, collects vintage vinyl including albums by Celia Cruz and Juan Luis Guerra, and
    channels their love of salsa dancing into expressive movement therapy for patients, weaving cultural rhythm into healing practices that they passionately promote.
  travel: Carlos Santos enjoys short getaways to the Florida Keys, annual cultural tours of historic Spain, and plans a future adventure to explore the Andean highlands, balancing meticulous trip planning
    with spontaneous photo walks in the wetlands that they eagerly undertake.
  culinary: Carlos Santos loves cooking family recipes such as cheese‑filled arepas, plantain fritters, and coconut rice, experimenting with aromatic spices like cumin and achiote while they master the
    art of a perfectly balanced salsa verde.
  core: Carlos Santos is a disciplined, art‑infused therapist whose competitive streak fuels innovative patient care, even if they sometimes sacrifice personal leisure for perfection.
background:
  cultural: Carlos was born to Colombian parents who immigrated to the United States in the 1980s; his household blended Spanish language, Catholic traditions, and vibrant Afro‑Caribbean rhythms. Growing
    up in a bilingual environment fostered his appreciation for Colombian music, dance, and cuisine, which he maintains through regular family gatherings and community festivals in Osceola County. His cultural
    identity informs his therapeutic approach, encouraging the inclusion of culturally resonant activities—such as rhythmic movement and music—into rehabilitation plans. He remains connected to his heritage
    by participating in local Colombian cultural events and supporting youth programs that promote bilingual education.
attributes:
  skills: '[''Musculoskeletal assessment'', ''Manual therapy'', ''Therapeutic exercise prescription'', ''Sports injury rehabilitation'', ''Ergonomic evaluation'', ''Evidence‑based practice'', ''Patient
    education'', ''Documentation and outcome tracking'', ''Health coaching'', ''Use of gait analysis and wearable sensor technology'']'
  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Salsa dancing'', ''Photography of nature and architecture'', ''Hiking in Central Florida'', ''Playing chess'', ''Reading
    medical and scientific journals'', ''Volunteer work at community health fairs'', ''Cooking traditional Colombian cuisine'', ''Collecting vintage vinyl records'']'
  career_goals: Driven by his competitive streak and high standards, Carlos aims to launch a boutique physical‑therapy clinic in Central Florida that specializes in sports‑related and arts‑related injuries,
    integrating art‑therapy techniques to enhance patient motivation. He plans to obtain board‑certification in orthopedic manual therapy and complete a fellowship in neurorehabilitation. Over the next
    five years, he also aspires to become a guest lecturer at a local college, mentor junior therapists, and lead community wellness programs targeting seniors and underserved populations.
