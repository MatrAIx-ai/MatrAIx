persona_description: A paleontologist who specializes in the study of the Ordovician mass extinction and the environmental stress that led to its occurrence. She/He is interested in understanding the fine
  details of the community of graptolites that inhabited the oceans during that time and how it changed over time, as well as the impact of these changes on the ecosystem. The paleontologist is likely to
  be involved in research and analysis of the fossil record, and is interested in the potential for similar mass extinctions to occur in our modern world.
