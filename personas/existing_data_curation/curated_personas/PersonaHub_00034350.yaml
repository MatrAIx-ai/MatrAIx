persona_description: A scientist who specializes in studying the biology and behavior of killer whales, particularly their social structure and reproductive patterns. They are interested in understanding
  why female killer whales have the longest menopause of any non-human species and how this behavior contributes to the survival of their offspring. They are also interested in exploring the specific ways
  in which mother killer whales may aid their adult sons in the hunt for food and in dangerous situations, and how this may affect the transmission of genes within the group.
