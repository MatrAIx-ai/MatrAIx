personas:
  professional: Edwardo Vega, a 42‑year‑old consultative sales expert, leverages bilingual fluency in Spanish and English, deep CRM mastery in Salesforce, HubSpot, and Microsoft Dynamics, and a meticulously
    organized pipeline design to consistently close high‑value service contracts, while their outgoing, team‑oriented nature fuels engaging client presentations and mentorship aspirations.
  sports: Edwardo Vega captains a local adult soccer team in Charlotte, cheers for Charlotte FC and the US Men’s National Team, joins a hiking club for weekend treks in the Blue Ridge Mountains, and participates
    in salsa dance socials that double as cardio, embodying a competitive yet community‑centric athletic spirit.
  arts: Edwardo Vega immerses themselves in salsa dancing on weekend nights, attends Latin music concerts featuring artists like Marc Antonio, Celia Cruz, and Shakira, frequents cultural festivals celebrating
    Latin arts, and draws storytelling inspiration from historical biographies for their sales pitches, merging cultural appreciation with creative communication.
  travel: Edwardo Vega prefers meticulously planned trips, alternating between family reunions in Cuba, cultural tours of Cartagena, and weekend getaways to Asheville’s craft breweries, balancing a desire
    for authentic Latin American experiences with the practical constraints of a busy sales career and a family budget.
  culinary: Edwardo Vega’s kitchen is a rehearsal stage for traditional dishes such as ropa vieja, sweet plantains, and flan, flavored with cumin, oregano, and freshly crushed garlic, and while they excel
    at home cooking for friends, they sometimes over‑indulge in fried plantains, leading to occasional guilt‑inducing cravings.
  core: Edwardo Vega marries a methodical, organized sales mindset with a lively love for salsa, soccer, and heritage cooking, yet occasionally lets spontaneous travel and indulgent fried foods throw off
    their otherwise disciplined routine.
background:
  cultural: Edwardo was born to Cuban immigrants who first settled in Florida before moving to Charlotte, North Carolina. Growing up bilingual, he celebrated Cuban traditions such as Carnaval de La Habana,
    holiday meals featuring ropa vieja, lechón, and flan, and the rhythm of salsa and son music. His family’s strong emphasis on hospitality, community, and respect for elders shaped his cooperative and
    considerate nature. He participates in local Cuban-American associations, where he helps organize cultural events and supports community initiatives. While maintaining his Cuban heritage, he embraces
    the entrepreneurial spirit and structured professionalism of his American environment, blending warm hospitality with a methodical approach to work and life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Consultative selling'', ''CRM management (Salesforce, HubSpot, Microsoft Dynamics)'', ''Negotiation and contract closure'', ''Strategic territory
