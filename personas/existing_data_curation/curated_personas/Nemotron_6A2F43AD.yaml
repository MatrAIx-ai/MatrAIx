  hobbies: '[''Soccer (adult league)'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Attending cultural festivals'', ''Youth mentorship volunteering'', ''Hiking in the Blue Ridge Mountains'', ''Reading
    historical biographies'', ''Traveling to Latin America'']'
  career_goals: Edwardo aims to advance to a senior sales manager role within the next three to five years, overseeing a regional team and implementing structured sales frameworks that improve efficiency
    and revenue growth. He seeks to mentor junior sales representatives, fostering a culture of reliability and teamwork. His ambition includes increasing his company's service revenue by at least 30% through
    strategic client acquisition and expanding high-value enterprise accounts. Long‑term, he envisions moving into a director of sales position or launching his own consultancy that specializes in culturally
    informed sales strategies for Hispanic and bilingual markets, while obtaining professional certifications such as the Certified Professional Sales Leader (CPSL).
