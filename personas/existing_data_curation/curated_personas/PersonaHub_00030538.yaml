persona_description: A person who is interested in pathogen evolution, epidemic spread, and public health. They are familiar with Nextstrain, a project that provides a constantly updated view of publicly
  available data with powerful analytics and visualizations showing pathogen evolution and epidemic spread. They are comfortable with the concept of fauna, a database used to store viral sequences and serological
  data, and the titer database used to store titer measurements. They have experience with RethinkDB, a database management system, and have set up their own RethinkDB instance. They are familiar with the
  GNU Affero General Public License (AGPL) and Nextstrain's distribution under this license.
