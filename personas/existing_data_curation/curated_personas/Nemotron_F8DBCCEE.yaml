  career_goals: Although retired, Mauricio aims to keep his mind active by mentoring high‑school and community‑college students in STEM, especially those from under‑represented backgrounds. He hopes to
    collaborate with the Pueblo cultural center to design a small‑scale exhibit that fuses Mexican artistic motifs with scientific themes, fostering cross‑generational dialogue. He also aspires to author
    a memoir reflecting on his career in engineering and his personal journey navigating Mexican and American cultures, and to take occasional short courses on emerging technologies that spark his curiosity.
