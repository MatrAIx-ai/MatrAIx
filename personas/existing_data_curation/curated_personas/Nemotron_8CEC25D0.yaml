personas:
  professional: Sheila Wilson, a seasoned electrician with over twenty years of hands-on experience, blends meticulous code compliance with a spontaneous, curiosity-driven approach to custom lighting design,
    mentoring apprentices while occasionally wrestling with schedule organization.
  sports: Sheila Wilson enjoys early-morning walks through the rolling farmland, participates in a local senior cycling club that rides the county’s scenic trails on weekends, cheerfully supports the Cincinnati
    Bengals and the Cleveland Guardians, and incorporates gardening as a low-impact fitness routine, though they sometimes skip scheduled workouts when a new Arduino project captures their attention.
  arts: Sheila Wilson finds artistic refuge in watercolor painting of folk-inspired motifs, frequently studies the works of Andrew Wyeth and the vibrant patterns of traditional Pennsylvania Dutch hex signs,
    attends intimate folk-music sessions featuring artists like Gillian Welch at the community center, and occasionally visits the Holmes County Art Gallery to view exhibits by regional painter Sarah Mitchell.
  travel: Sheila Wilson prefers low-key road trips to nearby state parks such as Shenandoah and the Cuyahoga Valley, plans itineraries around seasonal harvest festivals and local farm stays, dreams of a
    sun-lit Mediterranean retreat in Santorini to study natural lighting, yet balances travel ambitions with family commitments and a tight budget.
  culinary: Sheila Wilson, a competent home cook, relishes creating garden-to-table dishes like heirloom tomato bruschetta with fresh basil, smoked paprika-seasoned roasted carrots, and a rustic sourdough
    loaf, often experimenting with recipes that blend Midwestern comfort foods and Mediterranean flavors, while occasionally over-salting dishes when distracted by a new electronics project.
  core: Sheila Wilson is a curious, solitary-leaning electrician-artist who blends hands-on electrical mastery with a spontaneous love of photography, painting, and tinkering, while battling organization
    challenges and a habit of over-caffeinating after sunset.
background:
  cultural: Sheila grew up in a predominantly white, rural community in Holmes County, Ohio, a region known for its agricultural heritage and proximity to Amish settlements. Her family’s values emphasize
    hard work, self‑reliance, and modesty, which shaped her choice of a trade over formal schooling. While she identifies with Midwestern cultural norms—participating in church gatherings, community fairs,
    and neighbourly reciprocity—she also embraces a broader curiosity for art and new ideas, often seeking inspiration from regional folk crafts and contemporary sustainable‑technology trends.
attributes:
  skills: '["Residential wiring", "Commercial wiring", "Circuit troubleshooting", "Interpretation of electrical schematics", "Panel upgrades", "Installation of lighting fixtures", "Solar panel mounting",
    "Battery backup system integration", "Safety compliance and inspections", "Basic carpentry", "Tool maintenance"]'
  hobbies: '["Landscape photography", "Watercolor painting", "Gardening (heirloom vegetables)", "Tinkering with hobby electronics (Arduino)", "Experimenting with cooking recipes", "Visiting local art galleries",
    "Attending small folk-music sessions", "Volunteering for senior safety workshops", "Exploring local hiking trails", "Collecting vintage tools", "Reading about sustainable energy"]'
  career_goals: Sheila aims to become a licensed master electrician and eventually open her own small contracting firm that specializes in energy‑efficient retrofits and custom lighting design for homes
    in Holmes County. She is also interested in leading community workshops that teach safe electrical practices and basic home‑maintenance skills to neighbors, especially seniors. Over the next five years
    she hopes to secure the master electrician certification, expand her client base, and hire a handful of apprentices—providing both a stable income for her family and a platform to share her knowledge.
