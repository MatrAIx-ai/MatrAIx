personas:
  professional: An aspiring digital illustrator and LEGO architect named Bruce Lerma turns curious sketches, Procreate experiments, and streamed gaming sessions into vibrant visual stories, using their
    laid‑back, sociable style to collaborate with friends while occasionally losing track of deadlines.
  sports: A basketball‑loving, outdoors‑enthusiast named Bruce Lerma shoots hoops at the local community park, they cheer for the Charlotte Hornets and the Carolina Panthers, they join pickup games with
    classmates, they fish at Lake Waccamaw on weekends, and they hike the Sandhills, balancing their energetic social nature with a laid‑back approach to competition.
  arts: A creative storyteller named Bruce Lerma spends hours sketching comic‑style characters, they produce digital art in Procreate, they watch indie rock bands like Tame Impala and hip‑hop artists such
    as Kendrick Lamar for inspiration, they read graphic novels like Saga and Watchmen, and they contribute set designs to school drama productions, embodying their curiosity and love for diverse cultural
    expressions.
  travel: A spontaneous explorer named Bruce Lerma enjoys road trips to the Great Smoky Mountains, weekend hikes in the Sandhills, family visits to historic Savannah, occasional trips to Washington D.C.,
    and they dream of a future adventure to Mexico’s coastal towns, reflecting their preference for flexible, experience‑rich travel over rigid planning.
  culinary: A budding home chef named Bruce Lerma loves Southern barbecue—pulled pork, fried chicken, and collard greens—augmented by spicy tacos al pastor with fresh cilantro and lime, they often whip
    up nachos with cheddar, jalapeños, and sour cream while gaming, and they occasionally bake biscuits and gravy with their mom, showcasing their eclectic palate and relaxed cooking style.
  core: Bruce Lerma is a curious, sociable 13‑year‑old who juggles sketching, LEGO building, and streaming, they navigate anxiety with a laid‑back outlook, and they thrive on community gatherings, spontaneous
    creativity, and occasional bouts of disorganization.
background:
  cultural: Bruce grew up in Pembroke, a small town in Robeson County, North Carolina. His family is part of the longstanding white community in the area, and his upbringing reflects traditional Southern
    values of hospitality, close-knit family ties, and church involvement. At the same time, living in one of the most culturally diverse counties in the state—home to the Lumbee Nation and a growing Hispanic
    community—has exposed him to a broader mix of music, food, and storytelling traditions. He celebrates holidays such as Thanksgiving and the Fourth of July with backyard barbecues and community parades,
    and he has attended local Lumbee cultural events that feature pow-wows and crafts, which sparked his interest in varied artistic expressions. The local school’s arts program and community festivals
    have nurtured his curiosity and helped him appreciate both his Southern roots and the multicultural fabric of the region.
