  career_goals: Bruce hopes to turn his love of art and technology into a career that lets him create experiences that bring people together. Over the next few years he aims to deepen his skills in digital
    illustration and game design, with a long-term goal of becoming a multimedia artist or indie video-game developer who focuses on inclusive storytelling. He dreams of attending a high-school arts program
    or a college where he can study graphic design and computer science, and eventually he wants to run community workshops in Pembroke that teach kids how to express themselves through art and technology.
    He also aspires to mentor younger students, using his empathetic nature to help them navigate stress and develop confidence.
