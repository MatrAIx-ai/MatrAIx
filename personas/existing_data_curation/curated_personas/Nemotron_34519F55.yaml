personas:
  professional: David Donahoo, a veteran front‑desk administrator known for streamlining high‑volume call traffic and meticulous record‑keeping, they combine their practical, structure‑loving mindset with
    a sociable, conflict‑de‑escalating style to create a welcoming environment while pursuing a supervisory role in healthcare or municipal administration.
  sports: David Donahoo plays in a Mesa adult basketball league on Thursday nights, roots for the Phoenix Suns and Arizona Diamondbacks, and maintains weekend stamina through hikes in the Superstitions
    and membership in the Mesa Trail Runners club, where they often lead group warm‑ups.
  arts: David Donahoo captures the stark beauty of Arizona’s desert with their Canon EOS R5, visits the Mesa Arts Center’s photography exhibitions, and relishes trivia nights while humming along to John
    Mayer and the Desert Empire Band, weaving their love for visual storytelling into social life.
  travel: David Donahoo favors road‑trip itineraries that blend adventure and photo opportunities, frequently exploring Sedona’s red rocks, the Grand Canyon, or weekend getaways to Albuquerque’s art districts,
    yet saves for longer European tours only after budgeting for their family’s next barbecue gathering.
  culinary: David Donahoo masters a mesquite‑smoked brisket rub of brown sugar, chipotle powder, and cumin, often grilling for neighborhood potlucks, yet admits to over‑seasoning steaks when the competition
    at trivia night gets intense, revealing their penchant for bold flavors and occasional over‑enthusiasm.
  core: David Donahoo is a competitively spirited, organized community‑minded professional who channels their love for desert photography, basketball, and barbecue into a disciplined yet sociable lifestyle,
    occasionally over‑committing to projects and under‑sleeping.
background:
  cultural: David was raised in a middle‑class white family in the Southwest, absorbing a blend of traditional American values and the unique desert culture of Arizona. Growing up near Mesa, he was exposed
    to the region's strong community spirit, a pragmatic work ethic, and a multicultural environment that includes significant Hispanic influences. This background informs his practicality, respect for
    structure, and appreciation for community events, while also fostering an openness to diverse social interactions and a love for outdoor activities typical of the Sonoran desert.
