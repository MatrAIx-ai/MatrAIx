    nights'', ''DIY home improvement projects'']'
  career_goals: David aspires to move into a supervisory or office‑manager role within the next five years, leveraging his reliability and organizational strengths. He plans to complete his bachelor's degree
    in Business Administration, earn a certification in Office Management, and eventually oversee a multi‑location administrative team, possibly in the healthcare or municipal sector where his experience
    with visitor services and record handling will be valuable.
