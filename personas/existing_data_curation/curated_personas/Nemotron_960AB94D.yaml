personas:
  professional: Annette Ellinwood, a three‑year‑old with a budding passion for organizing playtime, already shows the hallmarks of a future kindergarten teacher, blending curiosity about colors, methodical
    sorting of toys, and a friendly, cooperative nature to lead her small circle of friends through imaginative projects.
  sports: Annette Ellinwood dashes through the community playground with the same enthusiasm they bring to toddler soccer drills at the local park, often wearing a miniature jersey of the Seattle Mariners
    while proudly shouting the team’s chant during weekend games.
  arts: Annette Ellinwood immerses themselves in a vivid world of crayons, eagerly recreating scenes from Eric Carle's The Very Hungry Caterpillar while dancing to the upbeat tunes of The Wiggles and giggling
    at the animated antics of Sesame Street’s Elmo, making art time a daily celebration of color and rhythm.
  travel: Annette Ellinwood loves the sensory adventure of family road trips, delighting in the splashy exhibits at the local aquarium, the pine‑scented breezes of a mountain cabin weekend, and eagerly
    drawing pictures of Paris’s Eiffel Tower after watching travel videos about France.
  culinary: Annette Ellinwood shows a budding palate for creamy macaroni and cheese, sweet strawberry slices, and crunchy carrot sticks, often helping stir pancake batter with a wooden spoon and proudly
    insisting on a dash of cinnamon before breakfast.
  core: Annette Ellinwood is a curious, meticulously organized little explorer whose boundless energy and love for sharing are balanced by a habit of leaving toys scattered in the wake of an imaginative
    adventure.
background:
  cultural: Annette is raised in Rockford, a small town in Coosa County, Alabama. Her family embraces Southern hospitality and community values, often gathering for church services, local picnics, and seasonal
    festivals. She experiences traditional Southern family meals, enjoys sweet tea and homemade biscuits, and participates in community events such as the county fair and church Sunday school. These cultural
    influences nurture her appreciation for group activities, kindness toward others, and a sense of belonging in a close‑knit rural community.
