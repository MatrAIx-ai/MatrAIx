  career_goals: Annette often talks about growing up to be someone who helps other children learn and feel happy, such as a teacher or a caring classroom assistant. She also dreams of creating bright, colorful
    pictures that make people smile, hinting at a future as an artist. These ambitions reflect her love of art, her desire to support others, and her natural curiosity about new ideas.
