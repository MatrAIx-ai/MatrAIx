  hobbies: '[''Fishing'', ''Hunting'', ''Classic car restoration'', ''Listening to classic‑rock podcasts'', ''Collecting vintage truck memorabilia'', ''Book club'', ''Volunteer fire department work'', ''Family
    camping trips'']'
  career_goals: Christopher aims to move from a driver‑sales hybrid role into a supervisory logistics position within the next five years, eventually overseeing a small regional fleet. He plans to earn
    a HazMat endorsement and a fleet‑manager certification, positioning himself to start his own family‑owned delivery business that balances hands‑on driving with strategic operations.
