persona_description: A successful illustrator and artist who specialized in pastel illustrations of confident and proud women. McMein's work was highly sought after for its ability to convey the essence
  of the "New Woman" and was commissioned by prestigious magazines such as McCall's, Collier's, and Woman's Home Companion. Her ability to capture the spirit of the women of the time through her pastel
  portraits is a testament to her talent as an artist. McMein's work was also recognized by the Illustrator's Hall of Fame, and she is remembered as one of the most talented women in the field of illustration.
