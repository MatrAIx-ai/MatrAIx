    & Conflict Resolution", "Change Management"]'
  hobbies: '["Organic Gardening", "Hiking Green Mountain Trail", "Birdwatching & Photography", "Reading Historical Fiction and Business Non-Fiction", "Knitting Seasonal Items", "Jigsaw Puzzles and Sudoku",
    "Cooking Farm-to-Table Meals", "Volunteering at Local Farmer’s Market Co-op", "Attending Small-Group Agile Meet-ups"]'
  career_goals: Driven by a blend of curiosity and practicality, Myrna aims to transition from her current specialist role to a senior project‑manager position within the next two years, followed by a director‑level
    role overseeing a regional Project Management Office. She plans to earn her Project Management Professional (PMP) certification and an Agile Certified Practitioner (PMI-ACP) credential to formalize
    her expertise. Recognizing the growing importance of sustainable operations, she intends to pursue a part‑time MBA with a focus on Operations & Environmental Management, positioning herself to lead
    cross‑sector initiatives that improve community infrastructure while minimizing ecological impact. Long‑term, Myrna aspires to mentor emerging project managers, develop in‑house training curricula,
    and champion a flexible work model that balances productivity with well‑being for herself and her team.
