personas:
  professional: Myrna Rexrode, a methodical project management specialist with eight years of public and nonprofit experience, leverages Agile‑Scrum and Lean‑Six‑Sigma tools like JIRA and Tableau to design
    data‑driven roadmaps while maintaining a calm, organized presence that reassures stakeholders even as they navigate complex risk analyses.
  sports: Myrna Rexrode, an avid hiker and member of the Green Mountain Trail club, spends weekends tackling the Green Mountain Trail while cheering on the Boston Celtics and the New England Patriots, and
    they also practice yoga twice weekly to maintain flexibility and reduce project‑related tension.
  arts: Myrna Rexrode, a lover of historical fiction such as Michael Forster's 'The Long Road Home' and a regular listener of indie folk musician Iron & Wine, channels the storytelling craft into knitting
    seasonal scarves while they savor the lyrical introspection of Sufjan Stevens.
  travel: Myrna Rexrode, a planner who prefers low‑key, nature‑focused trips, has mapped weekend getaways to Acadia National Park and a summer road‑trip through the White Mountains, and they dream of backpacking
    the geothermal landscapes of Iceland while balancing travel costs with their savings goals.
  culinary: Myrna Rexrode, an intermediate home cook who delights in organic garden harvests, frequently prepares roasted beet and goat‑cheese salads, quinoa‑stuffed peppers, and seasonal apple crumble,
    and they season dishes with fresh thyme and rosemary while experimenting with fermentation for sauerkraut.
  core: Myrna Rexrode blends meticulous project leadership with quiet garden rituals, and they navigate stress through structured routines while occasionally succumbing to over‑thinking.
background:
  cultural: Born and raised in the small-town fabric of East Hardwick, Vermont, Myrna embodies the New England values of self-reliance, modesty, and community stewardship. Her family’s roots trace back
    several generations to early settlers who farmed the rolling hills of Orleans County, instilling an ingrained respect for the land and seasonal rhythms. Local customs—such as town meetings, autumn harvest
    festivals, and a strong DIY ethic—have shaped her pragmatic outlook and collaborative spirit. While she celebrates universally American holidays, she also partakes in regional traditions like the Vermont
    Maple Sugar Season and seasonal community potlucks, which reinforce her connection to place and the people around her.
attributes:
  skills: '["Project Planning & Scheduling", "Quantitative Risk Analysis", "Budget Forecasting & Cost Control", "Stakeholder Management", "Agile-Scrum & Lean-Six-Sigma Methodologies", "Process Optimization",
