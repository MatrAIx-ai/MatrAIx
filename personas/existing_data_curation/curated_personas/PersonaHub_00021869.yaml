persona_description: A network administrator who is responsible for maintaining and managing the routing information in a large and complex Internet network. This person is skilled in using the hierarchical
  core router model to distribute routing information and has experience with the Exterior Gateway Protocol (EGP) for passing reachability information between autonomous systems. They are familiar with
  the new routing model based on co-equal collections of autonomous systems using the Border Gateway Protocol (BGP) and have experience with the Routing Arbiter (RA) servers located at each Network Access
  Point (NAP) to validate the reachability information advertised by an autonomous system. They are also knowledgeable about the European Reseaux IP Europeens (RIPE) Network Control Center (NCC) for providing
  the routing registry for European IP networks and the registries provided by big network carriers like MCI and ANS. The person is skilled in creating an effective routing architecture and is continuously
  working on improving the efficiency and scalability of the Internet network.
