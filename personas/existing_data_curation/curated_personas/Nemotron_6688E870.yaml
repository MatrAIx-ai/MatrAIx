personas:
  professional: Lisa Diep, a 1‑year‑old who spends their mornings in a structured daycare routine, excels at organized block‑building and follows a predictable schedule, turning their innate practicality
    and methodical approach into early leadership during group play.
  sports: Lisa Diep participates in a local toddler gymnastics class at the Smyrna community center and enjoys weekly parent‑child swim sessions at the Atlanta Aquatic Club, cheering for the Atlanta Falcons
    on family game nights while they favor bright‑colored soft balls for crawl‑and‑throw play.
  arts: Lisa Diep delights in the melodic chimes of classic children’s songs like Twinkle, Twinkle Little Star, the animated antics of Sesame Street, and the colorful illustrations of Eric Carle’s books,
    often drawing with crayon while their parents play soft jazz records by Miles Davis.
  travel: Lisa Diep has already visited the family’s grandparents in Savannah, taken a short road trip to the Georgia Aquarium in Atlanta, and experienced a first lunar new year parade in San Francisco,
    preferring car trips with a packed snack bag over long flights.
  culinary: Lisa Diep loves the aromatic steam of pho broth simmering with star anise and the crisp crunch of fresh cucumber in bánh mì, while also savoring Southern staples like biscuits with honey butter
    and collard greens, often reaching for a soft rice cake during snack time.
  core: Lisa Diep is a bright, routine‑loving infant who thrives on structured play, counts coins with glee, and balances a budding competitive streak with a warm, sociable smile.
background:
  cultural: Lisa is of Vietnamese heritage, raised in a household that blends Southeast Asian traditions with Southern U.S. culture. Her family celebrates Vietnamese holidays such as Tết, prepares traditional
    dishes like pho and bánh mì, and emphasizes respect for elders and community bonds. Growing up in Smyrna, GA, she experiences a multicultural environment while maintaining strong ties to her family's
    cultural values and language.
