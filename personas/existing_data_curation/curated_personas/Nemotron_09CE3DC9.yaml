personas:
  professional: Jean Medeiros is a budding game designer and aspiring mechanical tinkerer; they channel their curiosity and practicality into crafting intricate redstone contraptions in Minecraft, while
    their competitive edge honed in chess and LEGO building translates into disciplined prototype development and strategic problem solving.
  sports: Jean Medeiros plays forward on the school’s soccer team, hits the local hiking club’s weekend trail outings, follows the national women’s soccer squad, the US Women’s National Team, and they energetically
    balance rigorous practice with strategic conditioning, using a mix of organized drills and spontaneous scrimmages to stay fit.
  arts: Jean Medeiros dives into the imaginative worlds of sci‑fi and mystery novels by authors such as Isaac Asimov and Agatha Christie, crafts short stories inspired by the narrative depth of these reads,
    builds elaborate LEGO sculptures while listening to the melodic guitar riffs of Tommy Emmanuel, and they find artistic motivation from the cinematic scores of composer Hans Zimmer.
  travel: Jean Medeiros love for exploration shines during family hikes in the nearby Blue Ridge Mountains, weekend road trips to the historic lighthouse town of Cape Cod, and aspirations to tour Tokyo’s
    Akihabara district and the futuristic architecture of Dubai, they balance carefully planned itineraries with spontaneous photo‑scavenger hunts.
  culinary: Jean Medeiros experiments in the kitchen by baking rainbow‑colored macarons, custom‑spiced chocolate chip banana bread, and savory pizza pockets, boasting a budding sous‑chef skill set that
    blends precise measurements with creative improvisation, often under the watchful yet indulgent eye of their dad, and they relish sharing their creations with friends.
  core: Jean Medeiros is a relentlessly curious 12‑year‑old who expertly balances structured LEGO architecture with spontaneous Minecraft inventions, tackles challenges with competitive fire, yet they habitually
    forget to turn off bedtime screens, leading to late‑night gaming marathons.
background:
  cultural: Jean is a white American with Portuguese heritage growing up in Fort Wayne, Indiana. Her family blends Midwestern values—hard work, community involvement, and modesty—with Portuguese traditions
    such as celebrating the Feast of St. John and enjoying pastries like pastel de nata. The local culture of county fairs, high school sports, and a supportive school environment encourages both practicality
    and curiosity, shaping her balanced approach to life.
