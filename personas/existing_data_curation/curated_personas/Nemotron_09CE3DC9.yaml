  hobbies: '[''Soccer'', ''Minecraft'', ''Robotics club'', ''Chess'', ''Reading sci-fi and mystery novels'', ''Baking (experimental recipes)'', ''Hiking with family'', ''Creative writing (short stories)'']'
  career_goals: Jean aspires to become a robotics or aerospace engineer, aiming to create sustainable technology that can address real‑world challenges. She plans to compete in regional and state science
    fairs, attend summer STEM camps, and eventually earn a scholarship to study engineering at a university. In the meantime, she hopes to lead a youth robotics team at her school and develop a prototype
    for a low‑cost solar‑powered charging device, merging her curiosity with practical impact.
