  career_goals: Wayne aims to transition into a senior supervisory role within the next five years, overseeing a larger team of maintenance technicians at his facility. He intends to earn certifications
    in HVAC (EPA), advanced electrical safety, and facilities management to boost his credentials. Ultimately, he considers starting his own small maintenance consulting business that provides reliable,
    cost-effective services to local businesses. He also wants to mentor younger apprentices, sharing his practical expertise while ensuring high-quality standards.
