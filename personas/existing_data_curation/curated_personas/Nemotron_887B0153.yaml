personas:
  professional: Heydi Serrano is a detail‑oriented construction specialist who leverages years of on‑site labor experience, blueprint expertise, and heavy‑equipment operation to coordinate daily schedules
    and safety compliance, while channeling their vivid imagination into innovative design solutions and aspiring to become a foreman and eventually launch a boutique firm merging sustainable builds with
    artistic installations.
  sports: Heydi Serrano finds balance on weekend hikes with the local Trailblazers Hiking Club, supports the Los Angeles FC soccer team as a devoted fan, and incorporates regular cardio runs into their
    schedule to maintain stamina for demanding construction days.
  arts: Heydi Serrano channels their imagination into abstract murals inspired by the bold colors of Frida Kahlo and the dynamic forms of Diego Rivera while also listening to avant‑garde composers like
    Aphex Twin and John Zorn during late‑night digital illustration sessions, and they regularly study the street art of Banksy for conceptual spark.
  travel: Heydi Serrano prefers meticulously planned solo trips that blend architectural tours of Barcelona’s Gaudí masterpieces with nature hikes in Iceland’s volcanic landscapes, and they dream of exploring
    the ancient ruins of Oaxaca to study indigenous mural techniques.
  culinary: Heydi Serrano enjoys cooking homemade tamales, pozole, and chiles en nogada with fresh corn masa, poblano peppers, and epazote, mastering intermediate-level techniques while occasionally experimenting
    with molecular gastronomy twists like espuma de cilantro to elevate traditional flavors.
  core: Heydi Serrano is a solitary, methodical builder with an artist’s soul, who balances heavy‑equipment expertise and avant‑garde creativity while relentlessly pursuing a future boutique firm and occasionally
    indulging in late‑night art‑fuelled snack runs.
background:
  cultural: Heydi is a first‑generation Mexican‑American who grew up in a bilingual household in Southern California. Her family celebrates traditions such as Día de los Muertos and values the rich visual
    legacy of Mexican muralists, which fuels her artistic inclinations. While she identifies strongly with her Mexican heritage—maintaining fluency in Spanish and often preparing authentic cuisine—she also
    embraces the multicultural environment of Orange County, navigating both the vibrant Latino community and the broader American workplace. Her cultural roots reinforce a blend of independence, resilience,
    and a deep appreciation for creative expression, all of which shape her personal and professional identity.
attributes:
