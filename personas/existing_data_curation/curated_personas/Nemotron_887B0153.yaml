  hobbies: '["Abstract painting", "Architectural sketching", "Scale model building", "Science fiction reading", "Philosophy literature", "Hiking on local trails", "Nature photography", "Digital illustration",
    "Mexican cooking", "Listening to experimental music"]'
  career_goals: Heydi aims to leverage her reliable work ethic and creative mindset to advance into a supervisory role, such as site foreman or project manager, within the next three years. She plans to
    obtain OSHA certification and pursue a small‑business management course to prepare for eventually launching her own boutique construction firm that specializes in sustainable builds with artistic installations,
    merging her technical expertise with her passion for abstract and culturally inspired design. Her competitive drive pushes her to seek mentorship opportunities and lead small teams, positioning herself
    as a trusted problem‑solver on complex projects.
