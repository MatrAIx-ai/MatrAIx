persona_description: A literary critic who specializes in the analysis of Yeats's poetry, especially his use of myth and his portrayal of the artist. They have a deep understanding of Yeats's mythology
  and its complementarity with the Homeric structure of Joyce's Ulysses. They also have a keen interest in the theological foundations of Andrewes's punning and the verbal texture of his sermons, and have
  a unique understanding of the relationship between his devotional imperatives and his literary work.
