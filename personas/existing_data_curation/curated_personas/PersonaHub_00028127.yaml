persona_description: A conservation biologist who specializes in the study of rare and threatened regional ecosystems and species in the Bukkulla Regional Park. She is responsible for monitoring the park's
  flora and fauna, evaluating human impact, and managing and conserving the park's remnant bushland. She has a deep understanding of the park's unique geological features, including the poorly conserved
  central Queensland serpentinite landscape, and has a passion for preserving the park's biodiversity for future generations.
