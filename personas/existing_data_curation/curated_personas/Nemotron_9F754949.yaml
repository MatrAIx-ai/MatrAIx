  hobbies: '[''Beach Volleyball'', ''Cycling Club'', ''STEM Tutoring for Middle‑School Girls'', ''Cooking Classes'', ''Hosting Dinner Parties'', ''Live Music Events'', ''Coding Side Projects (Inventory
    Dashboards)'']'
  career_goals: Natalia aims to transition from a store‑level supervisor to a regional manager role within the next five years, overseeing multiple locations across the Southeast. She plans to complement
    her experience with an MBA focused on Operations Management, enabling her to design and implement system‑wide initiatives that boost sales efficiency and employee engagement. Long‑term, she envisions
    a senior leadership position where she can shape corporate retail strategy, mentor emerging managers, and champion data‑centric decision making. She also aspires to develop a mentorship program that
    supports entry‑level retail staff, especially women, in building career pathways.
