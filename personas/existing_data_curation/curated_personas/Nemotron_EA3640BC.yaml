  career_goals: John aims to solidify his legacy as a trusted caregiver while easing into a phased retirement. Over the next few years he plans to obtain a Certified Nursing Assistant (CNA) credential to
    formalize his expertise and qualify for supervisory roles. He hopes to mentor younger aides at his agency, sharing best practices for routine‑based care and stress‑management techniques. Long‑term,
    he envisions starting a small, family‑run home‑care service that emphasizes consistency, compassion, and community connection, allowing him to stay engaged without the pressures of full‑time employment.
    He also wishes to allocate more time for his health, reducing job‑related stress and ensuring a stable financial foundation for his wife's retirement.
