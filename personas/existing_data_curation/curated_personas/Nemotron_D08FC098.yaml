  career_goals: Heena dreams of becoming a scientist or engineer who can design sustainable solutions for her community. She hopes to attend a top STEM-focused high school, then pursue a degree in environmental
    engineering or robotics. She also envisions leading a youth mentorship program that encourages other girls, especially from South Asian backgrounds, to explore science and technology. Her long-term
    ambition includes contributing to innovative projects that combine her cultural heritage with modern technology, such as developing affordable renewable-energy devices for families in India.
