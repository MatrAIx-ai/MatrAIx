personas:
  professional: Heena Majmudar, as an aspiring junior game developer, combines meticulous coding habits learned from her disciplined habit of organizing school projects with her energetic love of teamwork,
    leading her coding club to prototype sci‑fi themed interactive games that often showcase her cartoon art and story‑telling flair.
  sports: Heena Majmudar thrills on the local park pitch as a forward for the Eastside Youth Soccer Club, follows FC Barcelona’s matches closely, and stretches her flexibility through weekly Bharatanatyam
    practice, completing each season with a proud grin while balancing school assignments.
  arts: Heena Majmudar channels her imagination into vibrant cartoon sketches inspired by Studio Ghibli’s Hayao Miyazaki and Looney Tunes, writes bite‑sized sci‑fi stories for her school’s literary magazine,
    and perfects expressive hand gestures in Bharatanatyam routines taught by her grandmother, often humming classic film songs while drawing.
  travel: Heena Majmudar’s travel scrapbook already includes family trips to the Grand Canyon, a weekend visit to Toronto’s science museum, and a wish‑list of a future adventure to Japan’s Ghibli Museum
    and Peru’s Machu Picchu, preferring organized itineraries with plenty of museum stops but secretly dreaming of spontaneous stargazing camps.
  culinary: Heena Majmudar loves the bold flavor of homemade paneer tacos topped with fresh cilantro, the comforting taste of buttery pizza slices, and whipping up quick fruit smoothies with mango and a
    splash of matcha, though they often forget to wash the dishes until bedtime, leaving a lingering scent of garlic in the kitchen.
  core: Heena Majmudar, a ten‑year‑old dynamo, juggles soccer, Bharatanatyam, cartoon art, and beginner game coding with a disciplined schedule, a habit of over‑saving for cleats, occasional allergy‑related
    sniffles, and a notorious tendency to leave laundry in the hallway for weeks.
background:
  cultural: Heena is a second-generation Indian-American of Gujarati heritage. Her family maintains South Asian traditions such as celebrating Diwali, Navratri, and Eid with festive meals, music, and communal
    gatherings. Gujarati language and cultural values, including respect for education, family cohesion, and community service, are part of her upbringing. Growing up in San Fernando, a diverse community
    in Los Angeles County, Heena blends her South Asian roots with American cultural experiences, attending school events, participating in multicultural festivals, and navigating a bicultural identity.
