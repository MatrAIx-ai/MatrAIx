  hobbies: '[''Art Gallery Visits'', ''Museum Exhibitions'', ''Reading Contemporary Non-Fiction'', ''Historical Biography Reading'', ''Gardening'', ''Hiking'', ''Cooking'', ''Volunteer Work at Food Pantry'',
