  career_goals: Helen aims to steer her company toward carbon‑neutral manufacturing within the next five years, expanding its market reach across the Mid‑Atlantic while maintaining high operational efficiency.
    She is passionate about creating a formal mentorship pipeline for emerging female leaders, increasing corporate philanthropy for local arts programs, and embedding sustainable practices into every facet
    of the business. Long‑term, she envisions a smooth succession plan that preserves the company’s culture of compassion and collaboration, and hopes to serve on regional economic development boards to
    influence broader community prosperity.
