  hobbies: '["Abstract painting", "Poetry writing", "Cuatro (Puerto Rican string instrument) playing", "Native‑plant gardening", "Fusion Puerto Rican cooking", "Hiking and birdwatching in Gurabo", "Volunteering
    for community business workshops", "Attending art exhibitions and cultural festivals", "Reading contemporary fiction and philosophy", "Yoga and tai chi", "Digital sketching and illustration", "Casual
    chess at the local library"]'
  career_goals: Ariel aims to transition into a senior advisory role that shapes economic development initiatives for micro‑ and small‑enterprise owners in the Gurabo region. She plans to launch a mentorship
    network for emerging women entrepreneurs, publish a guidebook that weaves business strategy with artistic thinking, and serve on the board of a non‑profit that promotes cultural arts and community empowerment.
    While partially stepping back from day‑to‑day responsibilities, she intends to continue consulting on projects that align with her passion for social harmony, and to establish a scholarship fund for
    Puerto Rican students pursuing business education.
