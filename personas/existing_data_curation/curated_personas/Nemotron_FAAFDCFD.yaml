  hobbies: '["gardening", "birdhouse woodworking", "knitting", "reading historical fiction", "genealogy research", "birdwatching", "bridge (card game)", "crossword puzzles", "hiking in state parks", "volunteering
    at the local library"]'
  career_goals: Although retired, Carolyn aims to stay independent and mentally active by continuing her learning and volunteering. She wants to document and preserve her family's genealogy, contribute
    her organizational talents to the local historical society, mentor younger volunteers in event planning, and eventually write a memoir that captures the life and traditions of rural Centre County. Maintaining
    financial stability and a safe, comfortable home remains a practical priority.
