personas:
  professional: Carlos Benitez, a retired handyman and former small hardware store owner, blends decades of carpentry, basic plumbing, and HVAC maintenance expertise with a practically structured yet easygoing
    demeanor to lead volunteer workshops on home repairs, where they balance predictable planning with occasional improvisational fixes.
  sports: Carlos Benitez enjoys regular mountain walks with the Kingman Hiking Club, avid bird‑watching along desert trails, and leisurely dominos games at the senior center, while cheering on the Arizona
    Cardinals and the Phoenix Suns.
  arts: Carlos Benitez finds artistic inspiration while hand‑crafting small furniture pieces to the rhythms of Celia Cruz, Tito Puente and the Buena Vista Social Club, and frequently attends local cultural
    festivals where they admire murals by regional artists such as Diego Escobedo.
  travel: Carlos Benitez prefers low‑key road trips that blend gentle adventure with family connections, having driven to Santa Fe for its adobe charm, taken a short cruise to San Juan’s historic Old Town,
    and dreaming of a pilgrimage to Havana to capture ancestral stories, all while staying within a fixed retirement budget.
  culinary: Carlos Benitez excels at preparing aromatic stews like ropa vieja and picadillo, crisp tostones, and citrus‑marinated chicken using fresh garden herbs such as cilantro, oregano, and mint, and
    their experienced cooking skills consistently impress friends at community potlucks.
  core: Carlos Benitez balances a warm, community‑driven spirit with a habit of misplacing their favorite screwdriver, a love for midday naps, and an endearing tendency to over‑season every dish.
background:
  cultural: Carlos was born in Santiago de Cuba and immigrated to the United States with his family in the early 1970s, first settling in Miami before moving to Arizona in the 1990s. He grew up in a bilingual
    household where Catholic traditions, family gatherings, and the rhythms of Cuban music were central. Though he has lived in Kingman for over three decades, he retains strong ties to his Cuban heritage
    through language, cuisine, and community involvement, often serving as a cultural bridge between newer Hispanic residents and the broader town. His identity blends the warmth and collectivism of Cuban
    culture with the independence and desert‑oriented lifestyle of the American Southwest.
