  career_goals: Although retired from full‑time work, Carlos aims to stay active and purposeful. He plans to expand his volunteer work at the Kingman senior center, offering weekly workshops on simple home
    repairs and bilingual computer basics. He also hopes to document his family’s migration story in a short memoir that could be shared with local cultural organizations. Another ambition is to refine
    his woodworking hobby into small handcrafted furniture pieces that he can sell at local craft fairs, providing a modest supplemental income while preserving his craftsmanship. Maintaining his health
    through regular walking and a balanced diet remains a central personal goal.
