  hobbies: '["Reading philosophy and art history", "Sketching and drawing", "Photographing natural landscapes", "Hiking local trails", "Playing acoustic guitar", "Meditation and mindfulness", "Journaling",
    "Visiting art galleries and museums", "Exploring new educational technologies", "Writing reflective essays"]'
  career_goals: Looking ahead, Adam aims to secure a tenure-track position at a community college or regional university, where he can develop an interdisciplinary program that bridges visual arts and critical
    thinking within the liberal arts curriculum. He hopes to publish research on the experiences of introverted adult learners and on the efficacy of quiet learning spaces. Over the next five years, he
    aspires to become a department chair or program director, leading curriculum innovation and mentoring junior faculty. He also envisions creating open-access educational resources that incorporate digital
    art tools, making arts-integrated pedagogy more widely available.
