    work at senior center'',''Local history tours'',''Mindfulness and meditation classes'']'
  career_goals: Donna hopes to deepen her role as a community mentor by leading senior‑center activity programs and organizing local genealogy workshops. She dreams of turning her quilting hobby into a
    modest online boutique that showcases her hand‑made designs. Travel is another ambition; she wants to join a small group of friends on historic road‑trip tours of the South and beyond. On a personal
    level, she aims to build a sustainable self‑care routine—incorporating mindfulness classes and a support group—to better manage her anxiety and emotional reactivity, ensuring she can remain a steady,
    caring presence for her family and neighbors.
