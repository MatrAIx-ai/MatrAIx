persona_description: A climate scientist who specializes in projecting future temperature trends and heat index levels, particularly in the tropics and mid-latitudes. They are a co-author of a study published
  in the journal Science that combines population growth, economic development patterns, energy choices, and climate models to project how heat index levels will change over time. The persona is likely
  to be interested in understanding how future climate change will impact daily life, particularly in the tropics where heat is a more serious problem for a large percentage of the population. They may
  also be concerned about the potential for dangerous and life-threatening temperatures and the need for air conditioning to be affordable and accessible in poorer countries.
