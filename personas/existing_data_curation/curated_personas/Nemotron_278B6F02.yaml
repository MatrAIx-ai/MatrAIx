  career_goals: Edward aims to transition from his current hiatus into a sustainable freelance creative consultancy, offering visual storytelling, branding, and content production services to small businesses
    and cultural institutions in Tulsa. He plans to complete a bachelor’s degree in Fine Arts or Visual Communication to solidify his credentials. In the medium term, he hopes to establish a modest gallery
    or art collective that showcases emerging regional artists and hosts community workshops. He also envisions occasional part‑time roles in museum education or cultural programming, combining his competitive
    drive with his passion for the arts.
