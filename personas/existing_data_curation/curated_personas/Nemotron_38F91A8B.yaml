personas:
  professional: Roberto Burgos is a veteran mechanical engineer with over 40 years of experience, whose meticulous CAD and finite‑element expertise is consistently blended with an artist’s eye for aesthetic
    detail, and who now channels that disciplined yet creative mindset into part‑time consulting for green startups and mentorship at local universities.
  sports: Roberto Burgos enjoys low‑impact fitness, regularly hiking the Laguna Coast Wilderness Trail and tending a small garden, while cheering for the Los Angeles Dodgers and the LA Galaxy, and participates
    in the Orange County Senior Cycling Club on weekend rides, though they sometimes skip sessions when stress spikes.
  arts: Roberto Burgos frequents contemporary galleries and the Laguna Art Museum, often inspired by artists such as Georgia O'Keeffe, David Hockney, and local ceramicist Josie Burgess, while sketching
    design concepts during visits and winding down with evenings of classical piano recordings by Chopin and jazz standards from Ella Fitzgerald.
  travel: Roberto Burgos plans trips with meticulous itineraries, having already explored the historic streets of Quito and the Andean highlands to assist family, and eyes a future journey to Kyoto’s precision
    engineering museums and a leisurely cruise along the California coastline, all while balancing budget constraints with a desire for purposeful travel.
  culinary: Roberto Burgos prepares traditional dishes such as ceviche with fresh lime and cilantro, empanadas stuffed with cheese and plantains, and quinoa salads featuring roasted corn and avocado, while
    their watercolor hobby seeps into plating, and they delight in sourcing heirloom tomatoes and peppercorns at the farmer’s market.
  core: Roberto Burgos blends a lifetime of mechanical precision with an artistic soul, juggling model steam locomotives, cautious financial spreadsheets, and a lingering worry that nudges them to double‑check
    every detail, from engineering projects to the perfect citrus balance in ceviche.
background:
  cultural: Roberto was born in Guayaquil, Ecuador, to a family of modest means that prized education and community. He moved to the United States in his early twenties to pursue a STEM degree, eventually
    settling in Cypress, California. His Ecuadorian upbringing instilled a deep appreciation for familial bonds, traditional festivals such as Carnaval de Guaranda, and a cuisine rich in seafood and Andean
    staples. While fully integrated into Californian life—celebrating local holidays, engaging with the diverse Orange County community, and adopting an active, health‑conscious lifestyle—Roberto maintains
    bilingual fluency and regularly hosts gatherings featuring Ecuadorian music and dishes. This bicultural identity informs both his professional perspective, encouraging cross‑cultural collaboration,
    and his personal interests, where he intertwines Latin American artistic motifs with his engineering projects.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''ANSYS (Finite Element Analysis)'', ''MATLAB'', ''Project Management (Lean, Six Sigma)'', ''Additive Manufacturing (3D Printing)'', ''Thermal and Fluid Systems
    Design'', ''Technical Writing'', ''Bilingual Communication (Spanish/English)'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Watercolor painting'', ''Woodworking and small‑scale sculpture'', ''Building model steam locomotives'', ''Hiking in the Laguna Coast Wilderness'',
    ''Cooking traditional Ecuadorian dishes (ceviche, empanadas, quinoa salads)'', ''Reading historical biographies'', ''Participating in senior engineering mentorship clubs'']'
  career_goals: Now approaching retirement, Roberto aims to transition from full‑time industry work to a part‑time consulting role that allows him to guide startups developing eco‑friendly mechanical products.
    He aspires to mentor the next generation of engineers through local university outreach and senior‑engineer mentorship programs, emphasizing disciplined design practices and the value of creative thinking.
    Roberto also hopes to author a series of case‑study articles that document the intersection of engineering precision and artistic inspiration, and to organize a community makerspace in Orange County
    where seasoned professionals can collaborate with hobbyists on interdisciplinary projects. A personal ambition is to travel back to Ecuador to assist his extended family in modernizing a small family‑run
    hydro‑electric plant, applying his expertise to a project that merges his cultural roots with his professional passions.
