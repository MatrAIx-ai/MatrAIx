persona_description: A world expert on the future availability of energy supplies, particularly the world oil and gas supply situation. This person has a deep understanding of the complex forces at work
  in the world today and how they may impact the future availability of energy supplies. They are well-versed in the issues related to climate change, population growth, and mass migrations, as well as
  the economic problems associated with too many people and dwindling reserves of natural resources. This person is also knowledgeable about the potential disruptions to the world's oil supply from political
  turmoil in the Mideast, global warming, and the outcomes of political struggles in Washington. They are well-versed in the complexities of weather patterns and the frequency of specific events, and they
  have a unique ability to predict the future availability of energy supplies based on this knowledge.
