  hobbies: '[''Woodworking'', ''Gardening'', ''Reading historical non‑fiction'', ''Reading technology magazines'', ''Chess'', ''Bridge'', ''Golf (light)'', ''Fishing'', ''Volunteer event planning'', ''Traveling
