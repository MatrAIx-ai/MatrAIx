  career_goals: Shaan aims to transition into a senior technical advisor role where he can shape sustainable agricultural practices for the Pacific Northwest while maintaining a largely independent work
    style. He plans to lead a research initiative on low‑input, climate‑resilient crop varieties and to publish a practitioner guide that blends modern food‑science methods with traditional South‑Asian
    fermentation techniques. Over the next few years, he intends to obtain Certified Food Safety Professional credentials and, if feasible, a master's‑level qualification through distance learning. Ultimately,
    he would like to establish a boutique consultancy focused on food‑safety audits and sustainable farming, allowing him to mentor a select group of technologists without the pressures of large‑scale management.
