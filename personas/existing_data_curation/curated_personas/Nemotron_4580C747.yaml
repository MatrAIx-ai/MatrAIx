  career_goals: Although he is currently not employed, Tanay aims to complete a memoir that weaves his family’s migration story with Detroit’s cultural history. He plans to volunteer regularly as a docent
    at the Detroit Historical Museum, focusing on African American contributions to the city. He also seeks to launch a small neighborhood garden with his wife, providing a structured yet adaptable space
    for sustainable food growing. Mentoring high‑school students in historical research and helping them develop disciplined study habits is another ambition, reflecting his competitive drive to see others
    succeed.
