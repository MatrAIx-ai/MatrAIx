  career_goals: He dreams of becoming a wildlife artist who can illustrate animals and ecosystems, and envisions one day working as a park ranger protecting the lakes and forests around Nisswa. He also
    expresses a budding fascination with space exploration, hoping to be an astronaut who discovers new worlds. His competitive streak fuels a desire to earn top honors in school science fairs and art contests.
