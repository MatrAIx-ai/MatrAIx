personas:
  professional: Brannen Brown is a budding junior naturalist who merges meticulous sketching skills with an organized, methodical approach to field observations, turning each lake hike into a mini‑research
    exercise that fuels their curiosity and competitive drive to produce the most detailed wildlife drawings among peers.
  sports: Brannen Brown participates in a community Little League baseball team in the spring, enjoys weekly swim lessons at the local pool, practices ice‑skating during the winter, and cheers for the Minnesota
    Twins and Minnesota Wild while occasionally trading baseball cards with friends.
  arts: Brannen Brown spends afternoons sketching loons, deer, and turtles after hikes, drawing inspiration from John James Audubon’s precise bird illustrations and Beatrix Potter’s whimsical animal art,
    and listens to folk‑rock tunes by The Lumineers while humming the chorus of “Ho Hey.”
  travel: Brannen Brown prefers family‑planned mini‑adventures, having explored Cass Lake, the Boundary Waters Canoe Area, and a weekend trip to Chicago’s Museum of Science and Industry, while dreaming
    of a road trip to Yellowstone National Park and an international sailing tour of the Norwegian fjords.
  culinary: Brannen Brown delights in tasting pan‑fried walleye after lake outings, helping stir a cheesy casserole at family potlucks, mastering the whisking of batter for Swedish lussekatter during St. Lucia
    celebrations, and crafting pine‑nut and honey trail mixes for snack time.
  core: Brannen Brown is a methodical, curiosity‑driven 7‑year‑old who sketches wildlife, hoards pinecones, fiercely competes in board games, and rigorously budgets their allowance for LEGO sets.
background:
  cultural: He grows up in a typical Midwestern white family in Nisswa, Minnesota, where community values, outdoor recreation, and seasonal traditions shape daily life. Family gatherings often feature potluck
    meals with casseroles and fresh fish from the lakes, and holidays reflect Swedish‑Lutheran customs such as St. Lucia celebrations. The local school emphasizes work ethic and kindness, while nearby lakes
    and state parks provide frequent opportunities for fishing, camping, and wildlife observation, all of which nurture his love for nature and art.
