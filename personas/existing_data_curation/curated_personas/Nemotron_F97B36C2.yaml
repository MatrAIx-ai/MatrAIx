personas:
  professional: Di Oneal, a four‑year‑old pretend‑office manager, lines up toy blocks into orderly rows and scribbles pretend invoices, balancing a natural curiosity about how things work with a practical
    eye for building stable towers, while their relaxed attitude toward tidy desks shows up in the occasional scattered crayons and spontaneously reorganized workstations.
  sports: Di Oneal joins the local toddler soccer club on Saturday mornings, watches the River City Runners baseball team on TV with keen interest, and prefers brief, high‑energy play sessions with a small
    group of friends at the community splash pad rather than long, structured workouts.
  arts: Di Oneal loves drawing bright dinosaur sketches, sings loudly along to The Wiggles’ Fruit Salad, and is mesmerized by the vibrant animation of Toy Story, often requesting storytime reenactments
    at the neighborhood library.
  travel: Di Oneal’s favorite trips include a weekend visit to the seaside aquarium to watch sea turtles glide, a short family road‑trip to the nearby state park for a picnic and leaf‑collecting adventure,
    and they dream of building sandcastles on Clearwater Beach, preferring low‑stress, bite‑sized getaways over long flights.
  culinary: Di Oneal’s go‑to meals are chicken nuggets with honey mustard, creamy mac‑and‑cheese, and strawberry‑banana smoothies they help blend, yet they famously refuse broccoli and any overly spicy
    dishes, making their palate a blend of comfort foods and selective taste.
  core: Di Oneal is a curious, slightly disorganized four‑year‑old who balances solo block‑building with cooperative soccer, saves coins in a pink piggy bank, belts out The Wiggles, and prefers quick splashy
    fun over long schedules, while occasionally forgetting to brush teeth.
background:
  cultural: Di Lynne comes from a white family living in Boulder, Colorado, a community known for its outdoor recreation and environmental consciousness. Her parents often take her on short hikes on the
    foothills, teach her about local wildlife, and encourage sustainable habits like recycling and caring for plants. The family values a balance of structured learning and free exploration, reflecting
    the broader Boulder culture that blends academic curiosity with practical, nature‑based experiences. Community events such as library story hours and small neighborhood playdates provide gentle social
    settings that suit her reserved, yet cooperative personality.
