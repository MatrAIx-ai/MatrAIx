  career_goals: Even at four, Di Lynne dreams of a future where she can explore the natural world and help living things. She frequently talks about becoming a veterinarian who cares for animals in the
    mountains, or a forest ranger who protects the woodlands around Boulder. She also imagines being a storyteller or a children's book illustrator, combining her love for quiet, solitary creativity with
    the desire to share gentle stories. Her ambitions lean toward roles that allow small‑group interactions, practical problem‑solving, and a balance of curiosity with steady routine.
