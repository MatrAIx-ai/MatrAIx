  career_goals: Elizabeth plans to earn her GED and enroll in a culinary certification program to formalize her cooking expertise. She aims to launch a home‑based catering service specializing in traditional
    Creole dishes, with the long‑term goal of opening a small community‑focused eatery. In parallel, she seeks a part‑time role with a local nonprofit where she can apply her event‑planning and outreach
    skills, positioning herself for future leadership in community development. Ultimately, she hopes to become a mentor for youth in her neighborhood, encouraging entrepreneurship and skill development.
