personas:
  professional: Elizabeth Mayweather leverages strong budgeting and event‑coordination skills to manage church outreach projects while pursuing a future in community‑focused catering, and they balance a
    practical, organized approach with a willingness to experiment on the fly.
  sports: Elizabeth Mayweather watches the New Orleans Saints every fall, follows the Pelicans during basketball season, joins a weekend community kickball league at a local park, and fits in morning jogs
    through the city’s Riverfront Trail to stay active without sacrificing family time; they view fitness as a flexible complement to their busy schedule.
  arts: Elizabeth Mayweather attends the annual Baton Rouge Jazz & Zydeco Festival, revels in the music of Wynton Marsalis and Clifton Chenier, streams H.E.R. and Beyoncé for contemporary R&B, and often
    rehearses gospel pieces with the church choir; they find that music shapes their evenings and inspires their cooking creativity.
  travel: Elizabeth Mayweather prefers short, budget‑friendly road trips—having explored the historic charm of New Orleans during Mardi Gras, the cobblestone streets of Charleston, and the swamp tours of
    Atchafalaya—while dreaming of a future family vacation to Savannah’s riverfront and a cultural getaway to New York City’s Broadway district; they plan trips carefully to balance costs and family commitments.
  culinary: Elizabeth Mayweather, an avid home cook, perfects classics like shrimp étouffée, crawfish jambalaya, and gumbo leveraging filé powder and Andouille sausage, while also experimenting with quinoa‑based
    salads and plant‑forward twists on Creole recipes; they showcase an intermediate skill set that balances tradition with culinary curiosity.
  core: Elizabeth Mayweather blends a competitive edge with community devotion, expertly juggling budgeting, garden chores, and choir rehearsals, yet they often forget to water their indoor succulents and
    have a habit of scrolling social media for recipe ideas late into the night.
background:
  cultural: Elizabeth is a Black woman raised in Baton Rouge, steeped in the rich African‑American Southern culture of the region. Her upbringing was shaped by close‑knit family ties, active involvement
    in the local Baptist church, and community traditions such as Mardi Gras celebrations, Creole cooking, and the music of jazz and zydeco. She carries forward the values of resilience, mutual support,
    and pride in her heritage, which inform both her daily life and her aspirations to uplift her neighborhood.
