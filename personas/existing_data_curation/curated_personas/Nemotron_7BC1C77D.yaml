personas:
  professional: Valerie Jenkins, a 28‑year‑old middle‑school STEM teacher, designs data‑driven curricula that blend rigorous standards with inventive problem‑solving, leverages educational technology and
    analytics to fine‑tune instruction, and brings a calm, competitive edge to mentorship and professional development, always balancing curiosity for new tools with pragmatic classroom goals.
  sports: Valerie Jenkins hikes the Flint Hills trails weekly, participates in a local 5K running club, supports the Kansas City Chiefs and Kansas City Royals with quiet enthusiasm, and incorporates weekend
    rock‑climbing sessions at a nearby crag to stay fit while still valuing solitary reflection.
  arts: Valerie Jenkins finds artistic balance in listening to Philip Glass's minimalist compositions, binge‑watching the documentary series "Cosmos" by Neil deGrasse Tyson, and reading popular science
    authors like Carl Sagan, while occasionally attending a small local theater production of "Proof" to celebrate logical narrative.
  travel: Valerie Jenkins plans meticulously structured trips that mix stargazing at dark‑sky sites—like Mauna Kea and Chile’s Atacama Desert—with short hikes in national parks such as Grand Canyon and
    Bryce Canyon, using reward points to keep travel costs low while satisfying her curiosity about the cosmos.
  culinary: Valerie Jenkins enjoys preparing quick, nutrient‑dense meals like quinoa‑black bean bowls with cumin and roasted vegetables, occasionally experiments with sous‑vide salmon for a healthy protein
    boost, and treats herself to a specialty coffee from local roasters after a long coding session, though she admits to neglecting dessert making due to limited patience.
  core: Valerie Jenkins is a data‑driven, quietly competitive STEM educator who channels her calm resilience and balanced curiosity into meticulously organized curricula, disciplined finances, health‑focused
    routines, and a love for solitary intellectual pursuits.
background:
  cultural: Valerie grew up in the suburban Midwest, raised in Olathe, Kansas, a community that blends small‑town sensibility with the resources of the Kansas City metropolitan area. Her cultural background
    reflects the values of Midwestern pragmatism, self‑reliance, and a strong emphasis on education and civic participation. Family gatherings often centered around shared meals and community events, reinforcing
    respect for tradition while encouraging individual curiosity. This environment cultivated her balanced outlook—valuing both new ideas and proven methods—and fostered a calm, resilient demeanor that
    she brings to her professional and personal life.
