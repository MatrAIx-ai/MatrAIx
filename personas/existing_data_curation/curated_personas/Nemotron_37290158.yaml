  hobbies: '[''Brunch gatherings'', ''Dinner party hosting'', ''Weekly trivia night'', ''Hiking'', ''Paddle‑boarding'', ''Cycling'', ''Yoga'', ''HIIT workouts'', ''Cooking (Mexican, Mediterranean)'', ''Food
