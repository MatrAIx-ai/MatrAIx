  career_goals: Laura aims to advance to a senior management‑analyst role within the next three years, positioning herself to lead strategic initiatives for a technology or sustainability‑focused firm.
    To broaden her business perspective, she plans to enroll in an MBA program within the next two to three years. Her long‑term ambition is to become a director of strategy or operations, overseeing cross‑functional
    teams and driving data‑informed decision‑making at the enterprise level. She also hopes to mentor junior analysts, champion continuous‑improvement cultures, and contribute to community STEM outreach
    programs that encourage underrepresented youth to pursue technical careers.
