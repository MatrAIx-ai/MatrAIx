  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Creative writing'', ''Photography'', ''Group hiking'', ''Community theater'', ''Board game nights'', ''Volunteering
    at animal shelter'', ''Creative cooking'']'
  career_goals: Eager to advance her career, Elizabeth plans to earn her GED, followed by an associate degree in Nursing at a community college, and eventually obtain a bachelor's degree in Nursing. She
    aims to become a Registered Nurse with a focus on pediatric or community health, where she can combine clinical expertise with her passion for creative health education. Long‑term, she envisions leading
    community outreach programs that use visual art and storytelling to promote preventive health, and possibly pursuing a certification in healthcare administration to shape patient‑centered policies.
