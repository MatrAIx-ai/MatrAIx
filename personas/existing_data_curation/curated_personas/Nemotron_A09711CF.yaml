personas:
  professional: Tessa Johnson is a 30‑year‑old freelance art writer and aspiring digital marketing specialist who leverages their methodical research abilities, Adobe Lightroom expertise, and solitary work
    ethic to produce in‑depth exhibition critiques, curated photo essays, and remote project coordination for small creative enterprises.
  sports: Tessa Johnson enjoys low‑impact fitness such as yoga classes at a local studio and weekend hikes along the Natchez Trace, follows the Middle Tennessee State Blue Raiders basketball team for seasonal
    excitement, and tracks steps and heart rate with a Fitbit to maintain a modest fitness routine without the social pressures of team sports.
  arts: Tessa Johnson immerses themselves in visual culture, photographing historic Murfreesboro neighborhoods, painting delicate watercolors inspired by Georgia O’Keeffe and Annie Leibovitz, and curating
    weekly playlists of art podcasts featuring interviews with curators from the Frist Art Museum and discussions of Vivian Maier’s street photography, a habit they find both soothing and intellectually
    stimulating.
  travel: Tessa Johnson plans meticulously priced road trips to quiet destinations like Asheville’s Blue Ridge Parkway, Savannah’s historic squares, and the Great Smoky Mountains, favoring solo exploration,
    modest accommodations, and a blend of nature hikes and visits to local galleries, while budgeting each outing to preserve flexibility for family responsibilities that they value.
  culinary: Tessa Johnson, an amateur herb gardener, they enjoy crafting herb‑infused dishes such as rosemary‑roasted potatoes, basil pesto pasta, and buttermilk biscuits with thyme, balancing experimental
    flavors with reliable Southern comfort foods at a modest cooking skill level.
  core: Tessa Johnson is a solitary, analytically curious art enthusiast whose disciplined organization, lingering anxiety, and habit of over‑analyzing both creative projects and daily decisions shape a
    life lived mostly in quiet contemplation, punctuated by occasional academic perfectionism and late‑night coffee binges that they indulge in.
background:
  cultural: Tessa grew up in a middle‑class, predominantly white community on the outskirts of Murfreesboro, Tennessee. Her upbringing was shaped by Southern cultural motifs—strong ties to family, an appreciation
    for regional history, and exposure to church‑based community events—yet her parents encouraged independent thought and academic curiosity. The local university atmosphere, with its occasional art lectures
    and museum tours, sparked her early fascination with visual culture. While she respects traditional Southern hospitality, her introverted nature led her to seek solitary spaces—public libraries, quiet
    parks, and her own home studio—where she could explore ideas uninterrupted. This blend of Southern roots, a modest educational background, and a personal drive toward self‑directed learning informs
    her worldview and artistic sensibilities.
attributes:
  skills: '[''Household budgeting'', ''Schedule and project planning'', ''Digital photography'', ''Photo editing (Lightroom, Photoshop)'', ''Research & fact‑checking'', ''Genealogy research'', ''DIY home
    improvement'', ''Content management (WordPress)'', ''Spreadsheet analysis (Excel/Google Sheets)'', ''Creative writing (blogging)'']'
  hobbies: '[''Reading (art history, philosophy, investigative nonfiction)'', ''Digital photography'', ''Watercolor painting'', ''Herb gardening'', ''Crossword and logic puzzles'', ''Art podcast listening'',
    ''Solo gallery visits'', ''Historical society cataloguing'']'
  career_goals: Tessa aims to turn her solo, skill‑based pursuits into a sustainable part‑time freelance career. She plans to launch an art‑focused blog and accompanying Instagram channel where she writes
    critical reviews of exhibitions and curates themed photo essays, eventually monetizing through affiliate partnerships and commissioned content. Parallel to that, she intends to secure a certification
    in digital marketing or UX writing through online courses, positioning herself as a remote virtual assistant specializing in project coordination for small creative businesses. Long‑term, she dreams
    of opening a modest online shop that sells prints of her own photography and curated vintage art pieces, allowing her to blend her love of art, meticulous organization, and entrepreneurial spirit while
    maintaining a flexible schedule that honors her need for solitude and family commitments.
