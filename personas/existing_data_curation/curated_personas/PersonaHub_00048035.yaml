persona_description: A historian and literary scholar who is interested in the politics and social dynamics of the American Revolution and the early years of the United States. They are particularly drawn
  to the role of women and African Americans in this period, and are looking for new and innovative approaches to understanding their contributions and impact. They are likely to be knowledgeable about
  the works of Phillis Wheatley and her contemporaries, and are interested in exploring the ways in which they engaged with political and social issues of the time. They may also be interested in the role
  of art and literature in shaping public perceptions of slavery and the American Revolution, and how these works were used to advance or undermine nationalist agendas.
