  career_goals: Although retired from full‑time work, David aims to stay mentally and physically active while preserving his family’s legacy. He wants to finish documenting his family’s genealogical records,
    organize a small oral‑history project for his community, and become a regular volunteer at the local historical society. He also hopes to learn enough tablet skills to join video calls with his grandchildren
    and eventually share his woodworking projects on a modest online platform. Maintaining his health and independence is a practical priority, so he seeks regular low‑impact exercise and a balanced diet.
