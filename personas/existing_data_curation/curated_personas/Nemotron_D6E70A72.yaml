personas:
  professional: Ethan Vazquez is a seasoned first‑line supervisor in food preparation who leverages his practical STEM knowledge, rigorous food‑safety expertise, and calm, cooperative demeanor to keep kitchen
    operations running smoothly, though his love for routine sometimes makes him resist rapid changes to processes.
  sports: Ethan Vazquez enjoys cheering on the local high‑school football team during fall, follows the Dallas Cowboys and St. Louis Cardinals loyally, and spends weekend mornings on the river with the
    Midwest Bass Club, preferring low‑impact fishing as his primary form of exercise.
  arts: Ethan Vazquez regularly attends classic‑rock shows featuring The Rolling Stones tribute bands and enjoys listening to Led Zeppelin on vinyl, while his evenings often include watching classic movies
    like ‘The Godfather’ and reading biographies of chefs such as Anthony Bourdain, which fuel his culinary creativity.
  travel: Ethan Vazquez favors relaxed road trips with loose itineraries, has taken scenic drives through Yellowstone and the Great Smoky Mountains, dreams of a culinary pilgrimage to New Orleans, and usually
    stays at familiar motor inns to keep costs predictable.
  culinary: Ethan Vazquez excels at grilling, often prepping smoked brisket, corn on the cob, and herb‑marinated trout using fresh rosemary and thyme from his garden, enjoys swapping recipes at community
    barbecues, and prefers home‑cooked comfort meals over dining out.
  core: Ethan Vazquez balances a love for routine and community with a penchant for spontaneous barbecues, a chronic worry about health, and a habit of misplacing his gardening tools.
background:
  cultural: Ethan grew up in a traditional Midwestern family in Kansas, where self‑reliance, community involvement, and practical work ethic are core values. He was raised in a Protestant household that
    emphasized kindness, cooperation, and helping neighbors. The small‑town environment of Jetmore has fostered his love for routine, familiarity, and group activities such as local fairs and communal meals.
    His white, rural Kansas heritage informs his straightforward communication style, respect for established customs, and dedication to preserving the local community's close‑knit character.
attributes:
  skills: '[''Food safety compliance (ServSafe)'', ''Team leadership and staff training'', ''Inventory control and cost management'', ''Menu planning and recipe standardization'', ''Scheduling and labor
    management'', ''POS and ordering system operation'', ''Basic equipment maintenance and troubleshooting'', ''Quality assurance and product consistency'', ''Customer service orientation'', ''Conflict
    resolution and effective communication'']'
  hobbies: '[''Gardening'', ''Woodworking and small carpentry projects'', ''Organizing community barbecues'', ''Cheering at local high‑school sports events'', ''Volunteering at the town food bank'', ''Fishing
    trips in nearby lakes'', ''Listening to classic rock concerts'', ''Attending county fairs and festivals'']'
  career_goals: Ethan aims to earn an advanced HACCP certification and become a regional supervisor overseeing multiple kitchen locations, allowing him to implement the supportive, low‑stress work culture
    he values. He also hopes to develop a mentorship program for younger food‑service workers in his community and, eventually, transition into a part‑time culinary instructor role at the local community
    college before retirement. Maintaining stability while introducing modest, positive changes in his workplace is central to his ambitions.
