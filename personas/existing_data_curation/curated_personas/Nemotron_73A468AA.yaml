personas:
  professional: Kacee Grant, a seasoned business educator with three decades of experience, leverages their love of routine and practical curriculum design to deliver clear, project‑based finance, marketing,
    and management courses for adult learners, consistently integrating real‑world budgeting exercises through Excel and Moodle.
  sports: Kacee Grant enjoys weekly hikes up the Sandia Mountains, prefers low‑impact cardio over competitive sports, supports the New Mexico State Aggies football team, and participates in a local walking
    club that meets every Thursday.
  arts: Kacee Grant is an avid reader of historical fiction by Hilary Mantel and biographies of business leaders like Warren Buffett, contributes to a neighborhood book club, and crafts practical garments
    in a knitting circle where they often recreate traditional southwestern patterns.
  travel: Kacee Grant favors structured road trips to nearby destinations such as Santa Fe, Sedona, and Taos, meticulously planning each itinerary around museum visits and gardening fairs, while occasionally
    saving for a once‑in‑a‑lifetime cruise to the Pacific Northwest when the budget permits.
  culinary: Kacee Grant delights in cooking traditional southwestern dishes like green chile stew and carne adovada, hand‑growing epazote, varita peppers, and Mexican oregano in their garden, and demonstrates
    a competent yet sometimes improvisational kitchen style when a preferred herb is out of season.
  core: Kacee Grant blends methodical business acumen with a love for native gardens, routine hikes, and community mentorship, living a disciplined yet warmly compassionate life that balances practicality
    with a sprinkle of adventurous flavor.
background:
  cultural: Kacee is a white American descended from Midwestern farming families who relocated to New Mexico in the 1960s seeking new opportunities. She identifies with mainstream American values of hard
    work, self‑reliance, and community service, while also embracing the distinctive cultural mix of Albuquerque. She enjoys local traditions such as the Balloon Fiesta and respects the region’s Native
    American and Hispanic heritage, often incorporating southwestern flavors into her cooking. Her upbringing emphasized practicality and routine, shaping a traditional yet adaptable cultural perspective.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Business fundamentals teaching'', ''Student advising'', ''Mentorship'', ''Data analysis (Excel, basic statistics)'', ''Project management
