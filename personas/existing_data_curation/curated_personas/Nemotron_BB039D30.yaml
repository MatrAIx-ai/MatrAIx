  career_goals: Sandy aspires to pursue a career that combines her love for structure, problem‑solving, and helping her community. She dreams of becoming a civil engineer or architect, designing safe and
    sustainable buildings in her hometown, and also envisions studying education to become a science teacher who can inspire younger students, especially those from Mexican‑American backgrounds. In the
    short term, she plans to join her middle school’s STEM club, seek mentorship in engineering, and maintain a high GPA to qualify for advanced math and science courses.
