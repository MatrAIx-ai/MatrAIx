personas:
  professional: Sandy Demera, an aspiring investigative writer who blends a love of mystery novels with methodical bullet‑journal planning, channels their organized mindset into school newspaper reporting
    and coordinating community events at the local parish.
  sports: Sandy Demera, a midfield dynamo on the middle‑school soccer team who idolizes LAFC and the US Women’s National Team, trains five days a week, joins the community center’s weekend futsal league,
    and never misses the Friday night match screenings with friends.
  arts: Sandy Demera, a piano enthusiast who practices Beethoven’s Moonlight Sonata alongside traditional folk ballads like La Llorona, reads Agatha Christie and Becky Chambers, binge‑watches classic films
    such as Coco, and streams Lila Downs for inspiration.
  travel: Sandy Demera, a travel‑savvy planner who has hiked the Angeles National Forest, dreams of visiting Oaxaca for Día de los Muertos, hopes to see the cherry blossoms in Washington, D.C., and keeps
    a bullet‑journal map of future road trips across California.
  culinary: Sandy Demera, a budding home cook who helps their grandmother assemble tamales and simmer salsa, perfects guacamole with ripe avocados, experiments with ramen broth spiked with chipotle, and
    records each recipe tweak in a colorful journal.
  core: Sandy Demera, a structured teen who balances bullet‑journal schedules, soccer drills, piano practice, and family traditions, yet sometimes overbooks themselves and forgets to unwind.
background:
  cultural: Sandy was born and raised in San Gabriel, a city with a vibrant Mexican‑American community. Her parents immigrated from Michoacán, and they speak Spanish at home while she attends an English‑medium
    school, making her fluently bilingual. Her family celebrates Mexican holidays such as Día de los Muertos, La Posada, and Mexican Independence Day with traditional foods, music, and altar‑making. She
    attends a local Catholic parish where she participates in community service, and she grows up with strong family ties, respecting elders and valuing cultural heritage, which influences her daily life,
    language, and aspirations.
