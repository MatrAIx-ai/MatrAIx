personas:
  professional: An aspiring classroom coordinator, James Morgan organizes the preschool block corner with meticulous order, and they use their practical focus, sociable energy, and compassionate nature
    to keep peers happy, though sudden schedule changes often trigger anxious moments.
  sports: A spirited participant in the local Tiny Kickers soccer squad and the community kids' swimming class, James Morgan also roots for the New York Yankees, energetically mimicking their cheering chants
    during games while they relish group play and the routine of practice.
  arts: A creative youngster who loves drawing Disney's Frozen characters, singing along to The Wiggles, and watching Peppa Pig, James Morgan channels their outgoing energy into colorful finger paintings
    and dramatic pretend‑play, and they often perform mini‑concerts for family using a toy microphone.
  travel: A curious explorer who enjoys family road trips to grandparents' countryside farm and a sunny beach day in Florida, James Morgan dreams of visiting Disneyland Paris and seeing giant pandas in
    Chengdu, and they prefer familiar itineraries with plenty of scheduled playtime, balancing adventure with the comfort of routine.
  culinary: A picky yet adventurous eater who adores mac and cheese, chicken nuggets, strawberry slices, and carrot sticks, James Morgan often helps stir pancake batter and loves the crunch of apple slices,
    while they occasionally resist broccoli, preferring meals that are both familiar and colorful.
  core: James Morgan is a gregarious, structure‑loving five‑year‑old who obsessively lines up toys, thrives on group play, but they can become overwhelmed by sudden changes, often seeking comfort from a
    favorite stuffed bunny.
background:
  cultural: James comes from a typical Midwestern white family in Saint Joseph, Missouri. His community emphasizes close‑knit family ties, politeness, and participation in local events such as church gatherings,
    neighborhood playgroups, and town fairs. His upbringing includes routine‑focused daycare schedules, Saturday family meals, modest celebrations of holidays, and a strong sense of community responsibility
    that shapes his compassionate and cooperative nature.
