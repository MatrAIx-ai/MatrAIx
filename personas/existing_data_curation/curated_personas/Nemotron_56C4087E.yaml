  career_goals: Edwin dreams of becoming a civil engineer who designs safe bridges and sustainable parks in his hometown, merging his love for building with a desire to help his community. He also imagines
    creating video games or interactive apps using his Scratch coding skills, reflecting his interest in the digital world. Edwin hopes his future education will let him explore both physical structures
    and computer programming, and he looks forward to mentoring younger kids in science clubs, sharing his curiosity and practical problem‑solving approach.
