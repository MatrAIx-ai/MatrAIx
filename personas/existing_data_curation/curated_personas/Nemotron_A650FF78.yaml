personas:
  professional: Micah Ranck, an 81‑year‑old veteran of mid‑size manufacturing and retail operations, applies data‑driven strategic planning, rigorous budgeting, and savvy supply‑chain optimization to mentor
    local entrepreneurs, while they maintain a skeptical, competitive edge that keeps every proposal under a microscope before endorsement.
  sports: Micah Ranck, a devoted fan of the St. Louis Cardinals baseball team and a seasonal member of the Mississippi Riverwalkers senior walking club, plays weekly pickleball at the Edwardsville community
    center and, when it comes to fitness, they bring the same disciplined, competitive edge that once drove their corporate turnarounds.
  arts: Micah Ranck, an avid jazz aficionado, spends evenings listening to Miles Davis, John Coltrane, and Ella Fitzgerald on vinyl and occasionally attends concerts at the St. Louis Symphony Hall, letting
    the improvisational spirit of the music balance their analytically skeptical mind, while they find the unexpected chord changes inspire fresh strategic ideas.
  travel: Micah Ranck plans road trips in their lovingly restored 1965 Mustang, charting routes along the Great River Road to historic river towns like Hannibal, Missouri, while they also recall a solo
    train journey to New Orleans for a jazz festival and dream of a leisurely cruise through the Swiss Alps.
  culinary: Micah Ranck cultivates heirloom tomatoes, sweet corn, and kale in a vegetable garden they tend year‑round, then transforms the harvest into rustic ratatouille, grilled pork chops with apple
    glaze, and a signature carrot‑ginger soup, all prepared in a modest wood‑burned stove they built themselves.
  core: Micah Ranck blends an 81‑year‑old’s disciplined pragmatism with relentless curiosity, constantly weighing new ideas against hard‑won experience, while they worry over every detail from financial
    markets to garden weeds.
background:
  cultural: Micah identifies as a White Midwestern American with German-Irish ancestry, raised in the post-World War II era in the St. Louis metropolitan area before settling in Alton, Illinois. The river
    town’s blend of French colonial heritage and tight-knit community traditions has reinforced Midwestern values of practicality, self-reliance, and civic duty. He grew up in a predominantly Protestant
    household but participates in local cultural events such as the Great River Balloon Race and the Apple Festival, shaping his perspective on work, family, and community involvement.
