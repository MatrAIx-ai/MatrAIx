  hobbies: '[''Salsa dancing'', ''Community volunteering'', ''Cooking Puerto Rican cuisine'', ''Hiking in the Palisades'', ''Recreational soccer'', ''DIY woodworking'', ''Latin music listening'', ''Attending
    cultural festivals'', ''Reading contemporary fiction'']'
  career_goals: Joannie aims to earn an OSHA 30‑hour certification and a Construction Management certificate within the next two years, positioning herself for a foreman role on larger projects. She is
    motivated to become a leader who mentors other women and Latinx workers, promotes safe and environmentally friendly building practices, and eventually launches her own small contracting firm focused
    on community‑centered renovations and green retrofits in Teaneck and neighboring towns.
