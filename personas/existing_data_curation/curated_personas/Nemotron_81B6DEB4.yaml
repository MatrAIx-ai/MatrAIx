personas:
  professional: Joannie Saldana, a 23‑year‑old construction worker in Teaneck, NJ, blends hands‑on expertise in concrete formwork, framing and equipment operation with a curiosity for sustainable building
    methods, coordinating bilingual crews with clear communication, and aims to become a foreman who mentors women and launches a community‑focused contracting firm dedicated to green retrofits and neighborhood
    revitalization.
  sports: Joannie Saldana enjoys playing recreational soccer on Sundays with the local club, dancing salsa and merengue at neighborhood Latin clubs for cardio, hiking the Palisades for endurance, and cheering
    for the New York Giants and New York Knicks, blending team spirit with personal fitness while staying socially engaged.
  arts: Joannie Saldana immerses herself in Latin music, streaming Bad Bunny, Marc Anthony, and J Balvin, attends the annual community cultural festival featuring traditional dance troupes, and unwinds
    with contemporary fiction by authors such as Colson Whitehead and Chimamanda Ngozi Adichie, often quoting favorite lines while cooking for friends.
  travel: Joannie Saldana prefers weekend getaways that mix adventure and cultural immersion, planning hikes in the Hudson Valley, short trips to New York City’s museum districts, and dreaming of future
    visits to Caribbean island festivals and Barcelona’s vibrant plazas, all while balancing a limited travel budget with group travel discounts and careful itinerary planning.
  culinary: Joannie Saldana’s kitchen showcases seasoned pork shoulder (pernil) paired with citrus‑marinated rice and pigeon peas, flan caramel custard, and fried plantains, reflecting her family’s island
    culinary roots; they cook at an intermediate level, love experimenting with sustainable ingredients like locally sourced vegetables, but sometimes burn sauces when a lively playlist distracts them.
  core: Joannie Saldana is a hands‑on, socially‑driven construction enthusiast who balances practical ambition with community‑focused compassion, spicing her life with salsa beats, green building dreams,
    and occasional tool‑shopping splurges.
background:
  cultural: Joannie grew up in a close‑knit Puerto Rican family in Teaneck, NJ, where both Spanish and English were spoken daily. Family gatherings feature classic dishes like arroz con gandules, pernil,
    and flan, and holidays are marked by music such as bomba, plena, and reggaetón. She participates in the annual Puerto Rican Day Parade in nearby New York City and maintains strong ties to the local
    Latino community center and her Catholic parish. Her cultural heritage instills a sense of collectivism, hospitality, and pride that informs her compassionate approach at work and her commitment to
    uplifting her community.
attributes:
