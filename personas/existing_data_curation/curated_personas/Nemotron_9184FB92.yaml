personas:
  professional: Marcel Leverson, a seasoned pipefitter and steamfitter with over a decade of hands‑on experience, blends meticulous blueprint interpretation and MIG/TIG welding expertise with a spontaneous,
    problem‑solving mindset that often lets him improvise on‑site when timelines tighten, though his aversion to rigid schedules sometimes leads to last‑minute rushes in project planning.
  sports: Marcel Leverson regularly hits the courts for pickup basketball at the Norfolk Community Center, follows the Norfolk Tides in baseball and the Washington Commanders in football, and keeps fit
    through early‑morning jogs along the Elizabeth River, balancing a competitive spirit with a laid‑back approach that values team camaraderie over solitary training.
  arts: Marcel Leverson’s evenings often echo with the soulful vibes of Mary J. Blige, the lyrical flow of Kendrick Lamar, and the uplifting choruses of Kirk Franklin, while he routinely attends Norfolk’s
    street festivals to soak in live jazz, blues, and spoken‑word performances that reinforce his love for community‑centered artistic gatherings.
  travel: Marcel Leverson prefers spontaneous weekend getaways—like impromptu fishing excursions on the Chesapeake Bay and quick road trips to Williamsburg’s historic districts—while dreaming of a music‑filled
    pilgrimage to New Orleans and a relaxed family vacation on the sandy shores of Aruba, balancing his love of adventure with budget constraints and a busy work schedule.
  culinary: Marcel Leverson enjoys channeling his hands‑on expertise into the kitchen, expertly whipping up soul‑food classics like fried catfish, collard greens spiced with smoked paprika, and a well‑seasoned
    jambalaya simmered with okra and Andouille sausage, while also savoring occasional take‑out tacos and craft beers with friends.
  core: Marcel Leverson fuses a craftsman’s curiosity with a love for spontaneous problem‑solving, even if it means juggling bills at the last minute and forgetting paperwork until deadlines loom.
background:
  cultural: Marcel grew up as an African American in Norfolk, Virginia, immersed in the city’s blend of Southern heritage and naval culture. His family placed a strong emphasis on community, church gatherings,
    and storytelling, fostering a deep sense of pride in his heritage. He learned the value of hard work early on, watching relatives in skilled trades and participating in neighborhood block parties where
    soul‑food and music were central. The local Black community's resilience and mutual support shaped his cooperative yet assertive demeanor, while the city's proximity to maritime industries sparked his
    interest in pipefitting and steam systems. He carries forward traditions of mentorship and communal uplift, aspiring to serve as a role model for the next generation of Black tradespeople.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''MIG/TIG welding'', ''Blueprint reading'', ''Hydraulic system troubleshooting'', ''Pneumatic system maintenance'', ''OSHA safety compliance'', ''Project cost
    estimation'', ''Customer service'', ''Team coordination'', ''Adaptability'']'
  hobbies: '[''Fishing on the Elizabeth River'', ''Pickup basketball'', ''Classic car restoration'', ''DIY home improvement'', ''Cooking soul‑food'', ''Listening to R&B, hip‑hop, and gospel'', ''Tutoring
    high‑school students'', ''Attending local street festivals'', ''Road trips along the coast'']'
  career_goals: Marcel aims to achieve journeyman certification as a steamfitter and eventually earn a master plumber/pipefitter license. He envisions leading a small crew on large‑scale projects at the
    Norfolk Naval Base, leveraging his curiosity for new technologies to specialize in energy‑efficient steam systems. Long‑term, he hopes to launch his own contracting business that offers mentorship programs
    for aspiring Black tradespeople, providing stable income for his family and a platform to give back to his community.
