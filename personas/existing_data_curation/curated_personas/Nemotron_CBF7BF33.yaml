personas:
  professional: Madison Priddy, a 23‑year‑old barber in Nelson, Virginia, blends classic fading techniques with meticulous inventory management and client consultation, channeling their methodical, organized
    nature and preference for structure into a consistently reliable grooming experience.
  sports: Madison Priddy enjoys early‑morning hikes along Shenandoah National Park trails and occasional weekend pick‑up soccer with the Nelson Recreational League, follows the Washington Commanders and
    the University of Virginia Cavaliers football teams, and incorporates a disciplined, schedule‑driven strength‑training routine at the local gym to counterbalance the physical demands of standing behind
    the barber chair.
  arts: Madison Priddy finds relaxation in listening to classic rock vinyl—spinning Led Zeppelin, The Rolling Stones, and Fleetwood Mac—while devouring mystery novels by Agatha Christie and classic literature
    by Jane Austen, and occasionally attends community theater productions featuring local actors such as Sarah Miller in the annual Shenandoah Playhouse’s rendition of Our Town.
  travel: Madison Priddy prefers meticulously planned road trips, such as the weekend escape to Asheville’s Blue Ridge Parkway or a day‑long pilgrimage to Washington, D.C. museums, and dreams of a future
    cultural pilgrimage to Edinburgh’s historic Old Town, balancing a modest travel budget with a desire for both scenic relaxation and exposure to international literary heritage.
  culinary: Madison Priddy relishes home‑cooked Southern fare—perfecting a low‑sugar peach cobbler and a garden‑fresh tomato‑and‑basil bruschetta—while confidently grilling smoked pulled pork using a dry
    rub of paprika, brown sugar, and local Virginia pepper mash, and often treats herself to a modest weekly splurge at the nearby farm‑to‑table bistro for a shrimp and grits plate.
  core: Madison Priddy is a detail‑obsessed barber who blends classic fades with a love of vintage vinyl and backyard gardening, while secretly juggling a habit of double‑checking every schedule and a lingering
    reluctance to book routine dental cleanings.
background:
  cultural: Madison grew up in Nelson, a small town in Mecklenburg County, Virginia, embedded in a Southern, white, working‑class culture. Her upbringing emphasized community ties, church attendance, and
    self‑reliance. Family gatherings often revolved around home‑cooked meals, religious celebrations, and local festivals. The region’s historical ties to agriculture and craftsmanship have influenced her
    appreciation for hands‑on work and practicality. While she identifies with Southern hospitality, she values the predictability and order of small‑town life, which shapes her personal and professional
    outlook.
