  hobbies: '[''Gardening'', ''Reading mystery and classic literature'', ''DIY home projects'', ''Woodworking'', ''Hiking'', ''Listening to classic rock on vinyl'']'
  career_goals: Madison aims to open her own barbershop within the next three years, focusing on a welcoming, structured environment that reflects her organized personality. She plans to obtain a Master
    Barber certification and develop a line of premium grooming products tailored to the local community. In the longer term, she hopes to mentor young barbers, particularly women, and perhaps expand to
    a second location in nearby Williamsburg, while ensuring financial stability for her marriage.
