personas:
  professional: Gabriel Elias is a 17‑year‑old budding technologist who blends desert‑navigation know‑how with hands‑on coding in Python and Arduino to design low‑cost solar‑charging stations for remote
    trailheads, while volunteering to organize community tech workshops and using their bilingual fluency to coordinate with local volunteers.
  sports: Gabriel Elias is a competitive midfielder for the Joshua Tree Strikers youth soccer team, trains three times a week, follows LAFC and the Mexican national team, and spends weekends tackling the
    Desert Trails while tracking progress with a fitness smartwatch and joining a local hiking club that meets at the Cholla Canyon trailhead.
  arts: Gabriel Elias channels creative energy into sketching vibrant street‑art murals that blend modern graffiti with folklore‑inspired symbols, designs flyers in GIMP for community events, and draws
    inspiration from reggaeton icon Bad Bunny, cumbia legend Celso Piña, and the surrealist works of Salvador Dali.
  travel: Gabriel Elias dreams of road‑tripping across the Southwest, already logged visits to Sedona’s red rock canyons, the historic ghost towns of the Mojave, and a spring break excursion to the bustling
    streets of Oaxaca, while planning a future backpacking trek through Patagonia’s Patagonian steppe.
  culinary: Gabriel Elias perfects family‑style pupusas stuffed with cheese and refried beans, whips up corn‑based tamales on weekend afternoons, and experiments with fresh cactus pickles and serrano chilies,
    all while proudly serving the dishes at neighborhood potlucks and documenting recipes on a shared blog.
  core: Gabriel Elias is a high‑energy teen who balances desert‑hiking adventures, competitive soccer, and tech tinkering with a vigilant eye on finances and an ever‑present undercurrent of anxiety.
background:
  cultural: Gabriel’s family emigrated from El Salvador when he was a child, bringing with them traditions of family‑centered celebrations, Spanish language, and a deep appreciation for Salvadoran food,
    music, and folklore. He grew up speaking both Spanish and English, celebrating holidays like Día de la Madre and the annual Festival de las Flores with extended relatives in the local Salvadoran diaspora.
    These cultural roots shape his identity, making him proud of his heritage while encouraging him to serve as a cultural liaison within his diverse Joshua Tree community.
attributes:
  skills: '["Basic programming (Python, Scratch)", "DIY electronics (Arduino, Raspberry Pi)", "Smartphone and laptop troubleshooting", "Graphic design with GIMP/Canva", "Desert navigation and wilderness
    first‑aid", "Bilingual communication (Spanish‑English)", "Community event coordination", "Culinary skills (Salvadoran dishes)", "Team leadership in school clubs"]'
  hobbies: '["Hiking and desert photography", "Competitive soccer", "Cooking Salvadoran cuisine", "Multiplayer video gaming", "Street‑art sketching", "Listening to cumbia and reggaeton", "Building DIY electronics
    projects"]'
  career_goals: He aims to earn his GED within the next year and then enroll in a community college program in environmental engineering or computer networking. Gabriel wants to combine his love of the
    desert landscape with his technical background to work on renewable‑energy projects that serve the Joshua Tree region. In the longer term, he hopes to start a bilingual tech‑training hub for other young
    Salvadoran‑American residents, giving them a pathway into skilled trades and STEM careers while preserving cultural ties.
