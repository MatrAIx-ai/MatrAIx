persona_description: A planner or policy maker who is responsible for creating a more forgiving road system and promoting safe and efficient networks, especially in mixed-use communities. They are committed
  to reducing travelling distances and the safety risks people incur when they travel to access services, facilities and social networks, and aim for consistent treatments within each level of the hierarchy
  to help users understand different kinds of road environment, what speeds are appropriate for different kinds of roads, and which modes have priority within each route. They also prioritize walking and
  cycling facilities to be separated from heavy vehicles and high-speed traffic environments wherever possible, and especially when traffic volumes are high. They advocate for lower speed in built-up environments
  to encourage and improve the safety of active modes and collect development and financial contributions to fund road safety projects that mitigate adverse safety effects.
