persona_description: A geneticist who is interested in understanding the complex genetics behind eye color and the role of specific genes in influencing eye color variation. Sturm's recent study on the
  OCA2 gene, which is involved in the production of melanin pigment, sheds light on the complexity of eye color genetics and suggests a more nuanced model than the traditional blue-recessive/brown-dominant
  model. This study could be of interest to geneticists, researchers, and anyone interested in understanding the genetics of eye color.
