persona_description: A policy analyst who is interested in comparative budgetary practices and the role of budget agencies in the American state governmental context. This person has a background in economics
  and budgeting, and is familiar with the parliamentary and congressional systems of government. They are interested in the methods used in budget preparation and the influence of British practice on American
  budgeting. They are also interested in the organizational and procedural aspects of budget formulation, as well as the effectiveness of the budget process. This person is likely to have a strong interest
  in understanding the variety of budgetary practices in different countries and how they can be applied in the context of American state governmental structure.
