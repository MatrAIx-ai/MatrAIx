personas:
  professional: Todd Lorch is a budding mini scientist who spends his preschool days building elaborate block structures, cataloguing his collections, and meticulously following step‑by‑step experiment
    kits, balancing his love of new discoveries with a preference for tried‑and‑true routines.
  sports: Todd Lorch is a member of the Maple Grove T‑ball team in the local Little League, enjoys practicing soccer with the KidKickers club after school, cheers loudly for the nearby professional baseball
    team, the Cleveland Guardians, yet prefers solitary bike rides on quiet neighborhood streets.
  arts: Todd Lorch is an avid fan of the animated musical 'Frozen', loves drawing Elsa on his sketchpad, sings along to The Wiggles and Raffi, and collects Disney character stickers, letting his imagination
    shape his playtime.
  travel: Todd Lorch is a curious little explorer who prefers short, well‑planned family road trips to places like the nearby state park and the Monterey Bay Aquarium, dreaming of one day visiting the grand
    castles of Europe but feeling anxious about flying.
  culinary: Todd Lorch is a picky eater who adores cheesy macaroni, peanut butter‑banana sandwiches, and strawberry yogurt, can expertly spread peanut butter with a kid‑sized knife, but stubbornly refuses
    broccoli and anything that isn’t shaped like a dinosaur.
  core: Todd Lorch is a methodical, introverted five‑year‑old who mixes quiet curiosity with a worry‑prone need for order, turning everyday tasks—from building block towers to counting coins—into perfectly
    planned adventures.
background:
  cultural: Todd is raised in a white, working‑class family in Nash, a small community in Bowie County, Texas. His upbringing reflects the region’s emphasis on community, self‑reliance, and respect for
    nature. Family gatherings often involve backyard barbecues and outdoor activities, and his parents value practical skills and quiet, focused learning. The local culture, with its blend of Southern hospitality
    and rural sensibility, shapes his appreciation for order, reliability, and personal responsibility.
attributes:
