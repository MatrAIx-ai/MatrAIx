    mentorship'', ''Curriculum design for radiologic education'', ''Data analysis for imaging protocol improvement'', ''Patient anxiety reduction techniques'']'
  hobbies: '[''Reading historical non‑fiction'', ''Genealogy research'', ''Yoga and mindfulness meditation'', ''Gardening'', ''Hiking in state parks'', ''Birdwatching'', ''Black‑and‑white photography'',
    ''Quilting'', ''Volunteer STEM outreach'', ''Cooking seasonal Midwestern dishes'']'
  career_goals: Karen aims to earn advanced certifications in MRI and CT to deepen her technical expertise, and she aspires to become a lead technologist or department manager at a teaching hospital where
    she can influence safety standards and protocol development. Leveraging her graduate education in education, she plans to transition into an academic role, developing accredited radiologic technology
    programs and mentoring the next generation of technologists. Her competitive drive pushes her toward leadership positions that allow her to shape departmental strategy while maintaining a practical
    focus on patient outcomes.
