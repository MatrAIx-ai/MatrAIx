personas:
  professional: Victor Banks is a seasoned long‑haul driver turned logistics strategist; they leverage their Class A CDL, route‑optimization expertise, and persuasive auto‑parts sales skills to methodically
    improve fleet efficiency while eyeing a coordinator role.
  sports: Victor Banks is a die‑hard Atlanta Hawks fan who joins pickup basketball games at the neighborhood park every Tuesday; they follow the Hawks’ season on the NBA app, spend Sundays fishing at Lake
    Lanier to unwind, and occasionally root for the Atlanta United soccer team during the MLS season.
  arts: Victor Banks fills their garage with classic R&B vinyl from Marvin Gaye, hip‑hop mixtapes by Nas, and gospel hymns from their church choir; they often play these tracks while cooking barbecue or
    polishing vintage cars, and they attend local live blues nights at the downtown club to recharge their creative spirit.
  travel: Victor Banks prefers road‑trip adventures that combine work and leisure; they have mapped out a memorable drive along the Blue Ridge Parkway, a weekend fishing excursion to the Florida Keys, and
    a future plan to explore the historic streets of Savannah, always balancing fuel costs with the desire for new scenery.
  culinary: Victor Banks is a self‑taught pitmaster who masters smoked pork shoulder with a sweet‑spicy hickory rub, slow‑cooked collard greens seasoned with smoked turkey, and homemade bourbon‑infused
    barbecue sauce; they often pair their meals with fresh cornbread and sweet tea while swapping recipes with friends at church potlucks.
  core: Victor Banks blends a mechanical mind with a competitive spirit, turning long‑haul routes into a chessboard of logistics, while their love for classic cars, gospel beats, and backyard BBQs fuels
    their relentless drive toward a future delivery empire.
background:
  cultural: Victor grew up in the African‑American community of Stockbridge, Georgia, where church, family, and Southern traditions are central. His upbringing was shaped by gospel music, communal potlucks,
    and strong support for high‑school sports, especially football and basketball. He carries a sense of resilience rooted in the civil‑rights legacy of the region and values the close‑knit network of friends
    and relatives that provide mutual support. Soul‑food and Southern barbecue, storytelling, and mentorship within his community have deeply influenced his worldview. While he embraces new technology and
    ideas, Victor remains grounded in the values of hard work, respect, and community service that define his cultural heritage.
attributes:
  skills: '[''Commercial Driving (Class A CDL)'', ''Route Planning & Optimization'', ''Vehicle Maintenance & Minor Repairs'', ''DOT Compliance & Log Keeping'', ''Inventory & Freight Management'', ''Customer
    Relationship Management'', ''Sales Negotiation'', ''Fleet Management Software (e.g., KeepTruckin, Samsara)'', ''Time Management'', ''Mechanical Troubleshooting'']'
  hobbies: '[''Car Restoration & Modification'', ''Basketball (playing & watching)'', ''Fishing'', ''Southern Barbecue Cooking'', ''Church Community Volunteering'', ''Listening to Classic R&B, Hip‑Hop,
    and Gospel'', ''Attending Local Car Meets'', ''Road Trip Exploration'']'
  career_goals: Victor aims to move from driver to logistics coordinator within the next two years, leveraging his hands‑on experience to oversee route scheduling and fleet operations. He plans to complete
    an associate degree in Business Administration or Logistics, obtain the Certified Transportation Broker (CTB) credential, and eventually launch his own small‑scale delivery business serving local companies
    in Henry County. In parallel, he seeks to advance to a regional sales manager role for an auto‑parts distributor, combining his driving expertise with refined sales leadership. His competitive drive
    pushes him to become the top performer in both logistics efficiency and sales targets.
