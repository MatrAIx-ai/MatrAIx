  hobbies: '["Sketching and drawing", "Digital painting", "Soccer", "Reading graphic novels", "Coding with Scratch", "Listening to Bollywood and pop music", "Learning Bharatanatyam/ Bollywood dance", "Cooking
    Indian dishes", "Volunteering at community center", "Photography"]'
  career_goals: Vandana dreams of attending a high‑school program that blends STEAM and the arts, ultimately aiming to become a graphic designer and illustrator who can weave stories from her Indian heritage
    with modern visual media. She is also interested in environmental advocacy, hoping to study environmental science in college and later design sustainable community art installations. In the short term,
    she plans to join a youth mentorship program in Los Angeles that focuses on coding and visual storytelling, and she aspires to lead a school cultural‑heritage project that celebrates diversity.
