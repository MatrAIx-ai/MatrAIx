personas:
  professional: Vandana Shah, a budding coder and digital illustrator, merges curiosity with methodical planning to craft Scratch games that blend mythic story arcs from graphic novels, and they thrive
    in collaborative school clubs.
  sports: Vandana Shah, a passionate midfielder for the Sunset Park Soccer Club, cheers for the LA Galaxy and Los Angeles Dodgers, balances school workouts with weekend matches, and they practice dribbling
    drills after homework, yet sometimes forget their water bottle during hot practices.
  arts: Vandana Shah, an enthusiastic sketcher and digital painter, draws inspiration from graphic novel artists like Jillian Tamaki and Bollywood composer A.R. Rahman, refines Bharatanatyam steps at a
    local cultural center, and they regularly volunteer to lead weekend art workshops for younger children, even if they occasionally lose track of time and finish late.
  travel: Vandana Shah, who loves family road trips to the California coast and annual visits to Disneyland, plans each journey by mapping out stops at local museums and cultural festivals, dreams of exploring
    Tokyo’s anime districts, yet often packs too many sketchbooks, leaving limited space for souvenirs.
  culinary: Vandana Shah, a budding home chef, delights in preparing crispy samosas and tangy mango lassi with family, experiments with matcha latte and pesto pizza for friends, and they can flawlessly
    draw colorful fruit patterns on desserts, although they sometimes over‑salt the dish when excited.
  core: Vandana Shah blends mythic storytelling, rhythmic dance, and tech tinkering into a colorful, organized life, while occasionally letting a love for stickers and sweets distract them from schoolwork.
background:
  cultural: Vandana is a first‑generation American of Indian descent, raised in a bilingual household where Hindi is spoken alongside English. Her family celebrates traditional festivals such as Diwali,
    Holi, and Navratri, and they maintain customs like lighting diyas, preparing festive sweets, and performing classical dance. She regularly attends a local Indian cultural center where she learns Bollywood
    and Bharatanatyam dance forms and participates in community events that showcase Indian music, art, and cuisine. Growing up in Valley Village, Los Angeles, she also engages with the city’s diverse cultural
    scene, attending museum workshops, multicultural festivals, and interacting with peers from various backgrounds. This blend of Indian heritage and Los Angeles multiculturalism shapes her worldview,
    fostering appreciation for both her roots and the broader community.
