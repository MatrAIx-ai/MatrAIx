personas:
  professional: Dong Shim, a 39‑year‑old restaurant operations leader in Durham, leverages meticulous scheduling, data‑driven cost control and cross‑cultural team communication to run seamless service while
    quietly infusing minimalist art concepts into each venue, they prefer solitary strategic sessions over bustling meetings.
  sports: Dong Shim, a solitary fitness enthusiast, enjoys early‑morning trail walks on Durham’s countryside paths, occasionally rows with the local Durham Rowing Club for low‑impact cardio, and they follow
    the Durham County Cricket Club and the nearby rugby union side as their primary team loyalties.
  arts: Dong Shim, an avid visitor of contemporary galleries, sketches ambiance ideas while absorbing installations by Olafur Eliasson, Yayoi Kusama and the photographic narratives of Annie Leibovitz, and
    they curate a personal playlist of minimalist instrumental compositions featuring plucked strings and bamboo flutes.
  travel: Dong Shim, a methodical solo traveler, plans extended stays in Kyoto’s historic tea houses and the remote lodges of the Scottish Highlands, balancing artistic immersion with a modest budget while
    they seek quiet, contemplative experiences over bustling tourist hotspots.
  culinary: Dong Shim, a home‑chef experimentalist, they perfect a miso‑braised short rib with fermented chili and roasted shiso leaves, garnish the plate with micro‑greens from their herb garden, and meticulously
    document each creation through carefully composed food photography for a personal visual journal.
  core: Dong Shim, a 39‑year‑old restaurant strategist, they blend solitary curiosity with meticulous design, navigate daily stress through mindfulness, and dream of a quiet art‑centric café, while occasionally
    succumbing to over‑analysis and impulse art purchases.
background:
  cultural: Dong Shim was raised in an East Asian household where Korean cultural values of respect, collectivism, and diligent work ethic shaped his early life. Family gatherings centered around shared
    meals, fostering his deep appreciation for food as a conduit of culture and community. The emphasis on education led him to earn a bachelor's degree in business, while his exposure to both Korean and
    broader East Asian culinary traditions sparked his lifelong curiosity about flavors and presentation. Relocating to Durham, NC, Dong blends his heritage with the city's vibrant, multicultural food scene,
    often infusing Korean culinary techniques and aesthetic sensibilities into his managerial approach and personal artistic pursuits.
attributes:
  skills: '["Restaurant Operations Management", "Team Leadership", "Budgeting and Financial Analysis", "Menu Development (East Asian Fusion)", "Supply Chain & Vendor Negotiation", "Food Safety & HACCP Compliance",
    "POS System Implementation", "Data-Driven Decision Making", "Cross-Cultural Communication (Korean/English)", "Creative Concept Design for Dining Spaces"]'
  hobbies: '["Visiting Contemporary Art Exhibits", "Reading Philosophy and Business Literature", "Home Cooking – East Asian Fusion", "Food Photography", "Gardening – Small Herb Gardens", "Meditation and
    Mindfulness Practice", "Listening to Traditional Asian Music", "Walking Trails in the Durham Countryside"]'
  career_goals: Dong aims to progress from managing a single establishment to a regional food‑service director role, overseeing multiple venues while championing sustainable sourcing and innovative culinary
    concepts. Ultimately, he envisions opening a boutique café in Durham that functions as an intimate art‑focused kitchen, offering a quiet sanctuary for patrons to experience thoughtfully curated dishes
    and visual art. He also seeks to mentor emerging hospitality professionals in low‑stress, high‑quality service practices, and to contribute to industry publications on the intersection of design, culture,
    and food service.
