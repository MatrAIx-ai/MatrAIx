personas:
  professional: Linda Ramirez is a full‑stack software developer who marries a practical mindset with boundless curiosity, leading agile teams to build scalable, accessible cloud applications on AWS while
    mentoring junior engineers in Brooklyn’s collaborative tech scene.
  sports: Linda Ramirez balances energetic salsa dancing sessions with weekday jogs through Prospect Park, roots for the New York Knicks and Brooklyn Nets, and plays recreational volleyball at a local community
    center, embodying a sociable and team‑oriented approach to fitness.
  arts: Linda Ramirez frequently visits Brooklyn’s art galleries, draws inspiration from the vibrant murals of street artists like Kehinde Wiley, enjoys the rhythmic pulse of plena music, and reads sci‑fi
    novels by Octavia Butler, letting these artistic experiences inform their creative problem‑solving in code.
  travel: Linda Ramirez favors culturally immersive trips, having explored Old San Juan’s historic streets, Oaxaca’s bustling markets, and New Orleans’s jazz districts, and meticulously plans itineraries
    that balance budget constraints with the desire for authentic community engagement.
  culinary: Linda Ramirez delights in cooking traditional dishes such as arroz con gandules, empanadillas, and lechón, while also experimenting with ramen using miso and fresh cilantro, often hosting lively
    dinner parties that double as networking events for fellow developers.
  core: Linda Ramirez is a curiosity‑driven engineer who balances disciplined investing with spontaneous brunch splurges, mentors with a cooperative spirit, and fuels life with salsa steps, hearty cooking
    nights, and a relentless drive to make tech inclusive.
background:
  cultural: Linda grew up in a bilingual household in Brooklyn’s vibrant Puerto Rican community, celebrating traditions such as Three Kings Day parrandas, plena music, and family gatherings that blend Caribbean
    flavors with urban New York life. Fluent in both Spanish and English, she carries the island’s values of warmth, cooperation, and a strong sense of community into her daily interactions. Her cultural
    heritage fuels her commitment to give back, particularly through tech education initiatives that empower other Puerto Rican and Latinx youth. While firmly rooted in her roots, she also embraces the
    multicultural mosaic of New York City, integrating diverse perspectives into her personal and professional life.
