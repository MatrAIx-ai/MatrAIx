  career_goals: Linda aims to progress to a senior engineering role within the next three years, focusing on leading projects that create inclusive digital products for underserved communities. She plans
    to mentor junior developers, especially women and Latinx technologists, and contribute to open‑source accessibility libraries. Long‑term, she envisions moving into a technical leadership position—such
    as engineering manager or principal engineer—where she can shape product strategy around social impact, possibly launching her own startup that leverages technology to improve educational outcomes for
    youth in Brooklyn.
