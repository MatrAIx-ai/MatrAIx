personas:
  professional: Darla Annesley is a seasoned nonprofit project manager who blends meticulous budgeting, grant‑writing expertise, and a compassionate, collaborative approach to launch community arts and
    wellness programs, harnessing their curiosity and flexible organization to navigate both strategic planning and spontaneous creative opportunities.
  sports: Darla Annesley stays active with sunrise beach yoga, weekend hikes along the Anna Maria Island Trail, and follows the Tampa Bay Rays, Tampa Bay Buccaneers, and Inter Miami CF, while participating
    in the Bradenton Beach Runners club’s weekly runs and joining a local pickleball league during the cooler months.
  arts: Darla Annesley curates watercolor exhibitions at the Manatee Art Center, attends Sarasota Opera performances of works by Lin‑Manuel Miranda, enjoys concerts featuring Joni Mitchell and Alabama Shakes,
    and draws inspiration from the vibrant canvases of Georgia O'Keeffe and contemporary painter Amy Sherald.
  travel: Darla Annesley prefers thoughtfully planned trips that blend cultural immersion with seaside relaxation, having explored the historic charm of Savannah, the sun‑kissed streets of Barcelona, the
    island serenity of Santorini, and weekend getaways to Key West, they now dream of wandering the bustling souks of Marrakech.
  culinary: Darla Annesley enjoys experimenting at a moderate skill level with Mediterranean cuisine, mastering dishes like grilled branzino drizzled with lemon‑olive oil, roasted vegetable shakshuka seasoned
    with cumin and paprika, and homemade rosemary focaccia, while occasionally treating themselves to sushi rolls at the downtown waterfront bistro.
  core: Darla Annesley blends a compassionate nonprofit drive with a love for watercolor and beach yoga, yet they have a habit of collecting bright paint tubes they rarely finish, and they often lose track
    of time during sunrise photo walks.
background:
  cultural: Raised in a middle‑class family in the southeastern United States, Darla’s cultural background blends traditional Southern hospitality with the diverse, multicultural fabric of coastal Florida.
    Her Anglo‑American heritage emphasized education, community service, and an appreciation for the arts. Living in Bradenton, she has been shaped by the region’s beach lifestyle, the vibrant local arts
    scene, and the mix of Latino, Caribbean, and African‑American cultures that influence community festivals, cuisine, and social values.
attributes:
  skills: '["Project Management", "Community Outreach", "Conflict Mediation", "Financial Budgeting", "Grant Writing", "Digital Marketing", "Public Speaking", "Mentorship", "Art Curation", "Event Planning",
