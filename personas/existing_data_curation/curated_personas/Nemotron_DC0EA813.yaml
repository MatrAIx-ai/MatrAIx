  hobbies: '["Visiting art galleries", "Watercolor painting", "Theater attendance", "Native plant gardening", "Yoga", "Coastal trail hiking", "Cooking Mediterranean meals", "Reading contemporary fiction",
    "Volunteering at community shelter", "Photography of local landscapes", "Attending poetry readings", "DIY home decor projects"]'
  career_goals: Darla aims to launch a community‑focused arts and wellness nonprofit that provides workshops, artist residencies, and mental‑health support. She aspires to serve on the board of the local
    arts council, mentor emerging female entrepreneurs through a small‑business incubator, and develop grant‑writing programs to empower grassroots projects. Long‑term, she hopes to integrate her compassion
    and business acumen to create sustainable, inclusive cultural initiatives throughout Manatee County.
