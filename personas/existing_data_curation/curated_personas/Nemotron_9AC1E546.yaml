  hobbies: '[''Fishing'', ''Paddleboarding'', ''Golf'', ''Live music events'', ''Community theater'', ''Southern BBQ cooking'', ''Home brewing'', ''Beach clean-up volunteering'', ''Softball league'', ''Historical
    nonfiction reading'', ''Woodworking'']'
  career_goals: Mohamad aims to advance to a senior claims analyst or team lead role within the next few years, pursuing the Chartered Property Casualty Underwriter (CPCU) designation to deepen his expertise.
    He envisions managing a regional claims department, where he can implement process improvements that reduce turnaround times and boost customer satisfaction. Additionally, he hopes to expand his mentorship
    responsibilities, creating structured onboarding programs for new staff, and to contribute to community outreach initiatives that educate the public about insurance literacy.
