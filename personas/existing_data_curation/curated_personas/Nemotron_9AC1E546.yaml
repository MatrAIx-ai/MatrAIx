personas:
  professional: Mohamad Butler is a meticulous insurance claims analyst who leverages Guidewire and Duck Creek expertise, advanced Excel reporting, and a mentorship mindset to ensure compliance and customer
    satisfaction while charting a path toward a senior team lead position.
  sports: Mohamad Butler plays weekly softball with the Myrtle Beach Mariners, hits the links at Myrtle Beach National Golf Club, follows the Carolina Panthers and Charlotte Hornets, and joins a local paddle‑boarding
    club that hits the surf each sunrise.
  arts: Mohamad Butler enjoys live music at the Carolina Opry and the annual Beach Music Festival, regularly streams classic Southern rock from the Allman Brothers and contemporary hits by the Zac Brown
    Band, and spends evenings reading historical nonfiction about World War II and the Civil Rights era.
  travel: Mohamad Butler prefers road trips along the Atlantic coast, having explored Charleston’s historic district, Savannah’s riverfront, the Florida Keys for fishing, and plans a pilgrimage to the battlefields
    of Gettysburg next summer, balancing travel with family commitments.
  culinary: Mohamad Butler masters Southern BBQ, perfecting a smoky dry‑rubbed pork shoulder with applewood chips, pairs it with sweet‑potato collards, and experiments with home‑brewing a hoppy pale ale
    using Cascade hops and a malted barley blend.
  core: Mohamad Butler blends methodical professionalism with a coastal social life, balancing structured insurance work, disciplined finances, health vigilance, and a love for outdoors, music, and BBQ,
    all while occasionally overindulging in gear and craft beer.
background:
  cultural: Mohamad is a white Southern American with deep roots in the coastal communities of South Carolina. His family heritage traces back to Anglo‑German ancestors who settled in the Lowcountry generations
    ago, embracing the region’s traditions of hospitality, family gatherings, and church participation. While raised in a predominantly Christian environment, his parents chose the first name 'Mohamad'
    to honor cultural openness and global awareness, fostering his respect for diverse perspectives. He enjoys regional customs such as shrimp boils, beach festivals, and Southern cuisine, and he actively
    contributes to local community initiatives, reflecting a blend of traditional Southern values and an inclusive, worldly outlook.
attributes:
  skills: '[''Claims processing'', ''Policy administration'', ''Insurance software (Guidewire, Duck Creek)'', ''Data entry and verification'', ''Regulatory compliance'', ''Customer service'', ''Effective
