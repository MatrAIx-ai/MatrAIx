persona_description: A historian who specializes in the study of the Angolan struggle for independence, particularly the Baixa de Kassange uprising in the 1960's. His research interests include the causes,
  strategies, and outcomes of the uprising, as well as the role of the Angolan people in the struggle for dignity and freedom. He has a unique understanding of the importance of the date of the Colonial
  Repression Martyrs Day, and the significance of the revolt of the peasants against ill-treatment in the 1960's. He is interested in the role of the youth in the struggle for social justice and the accomplishment
  of their objectives, rights, and duties.
