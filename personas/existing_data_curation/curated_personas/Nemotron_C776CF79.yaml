  career_goals: Latoya aspires to earn her Certified Public Accountant (CPA) license within the next two years and advance to a senior audit manager position at a leading firm in Orlando. She aims to lead
    multidisciplinary audit teams, implement data‑driven audit methodologies, and mentor junior staff. Long‑term, she envisions establishing a boutique financial consulting practice that focuses on financially
    empowering minority-owned small businesses and nonprofit arts organizations, integrating her passion for art and community development with her accounting expertise.
