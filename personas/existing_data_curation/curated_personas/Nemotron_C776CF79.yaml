personas:
  professional: Latoya Hyppolite is an audit professional who blends rigorous GAAP compliance and internal‑controls expertise with Python‑powered data analytics, turning detailed risk assessments into clear,
    collaborative presentations while eagerly mentoring junior auditors and weaving her love for community outreach into every client engagement.
  sports: Latoya Hyppolite fuels their weekend fitness routine by hiking in Wekiwa Springs State Park, participating in a local Afro‑Caribbean dance troupe, and cheering on the Orlando Magic and Orlando
    City SC, while also joining a recreational co‑ed soccer league whenever the schedule permits.
  arts: Latoya Hyppolite immerses themselves in Orlando’s vibrant arts scene, frequenting the CityArts Factory for contemporary gallery openings, attending avant‑garde theater at the Showcase, and creating
    mixed‑media canvases that intertwine Afro‑diasporic patterns with bold abstract forms inspired by artists such as Mark Bradford and Kara Walker.
  travel: Latoya Hyppolite curates a travel style that blends purposeful cultural immersion with weekend getaways, having trekked the Blue Ridge Parkway during fall foliage, explored the historic streets
    of New Orleans for its soul‑food scene, and planning future visits to Haiti to study its culinary heritage and to Barcelona for its avant‑garde museums.
  culinary: Latoya Hyppolite delights in cooking soulful dishes such as Haitian griot with Scotch bonnet pepper, Southern collard greens flavored with smoked turkey, and experiments with artisanal beef
    brisket, all while skillfully juggling a high‑tech kitchen that features a sous‑vide circulator and a collection of vintage spice tins.
  core: Latoya Hyppolite is a methodical audit ace who merges data‑driven finance with a passionate love for art, community mentorship, and late‑night coffee‑fueled canvas sessions, all while juggling a
    habit of over‑committing to volunteer projects.
background:
  cultural: Latoya is a first‑generation Haitian‑American whose family emigrated from Port‑au‑Prince in the early 1990s. Growing up in a bilingual household, she speaks English and Haitian Creole, and her
    upbringing infused her with Caribbean rhythms, Creole culinary traditions, and a strong sense of communal responsibility rooted in the Catholic church. In Orlando, she maintains close ties with the
    Haitian community, celebrating annual festivals such as Haitian Flag Day, while also embracing broader African‑American cultural experiences. Her cultural heritage informs her values of resilience,
    family cohesion, and a commitment to uplift underrepresented groups through both her professional work and personal initiatives.
