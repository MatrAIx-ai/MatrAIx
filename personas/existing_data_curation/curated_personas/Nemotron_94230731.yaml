  career_goals: Margaret dreams of becoming a teacher or a community librarian when she grows up, envisioning a future where she can share knowledge, organize learning activities, and help other children
    discover new ideas while maintaining order. She also expresses a strong desire to care for animals, imagining a career as a veterinarian. Her goals reflect her love of curiosity, kindness, and her natural
    talent for keeping things organized and reliable.
