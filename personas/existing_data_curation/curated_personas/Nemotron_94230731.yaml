personas:
  professional: Margaret Wickensimer is an aspiring junior illustrator who channels their organized curiosity into bright watercolor drawings, eagerly sharing them with classmates and teachers while methodically
    planning each composition.
  sports: Margaret Wickensimer energizes the Susquehanna Valley Little Kickers youth soccer team as a spirited forward, thrives in recess games of tag, and attends after‑school gymnastics classes, always
    cheering for the Philadelphia Eagles and the Philadelphia Phillies as their favorite professional teams.
  arts: Margaret Wickensimer immerses themselves in the colorful worlds of Eric Carle and Mo Willems, recreates the iconic animal illustrations with watercolors, builds intricate LEGO scenes inspired by
    Star Wars, and curates a sticker scrapbook that showcases their love for bright, organized creativity.
  travel: Margaret Wickensimer enjoys family hikes along the Susquehanna River, weekend trips to Hersheypark, and annual visits to the local fall fair, while dreaming of a future adventure to the Grand
    Canyon after seeing vibrant photos in a children's travel book.
  culinary: Margaret Wickensimer delights in crafting peanut‑butter‑and‑jelly sandwiches, twirling mac & cheese with extra cheddar, and assembling fruit kebabs of grapes, strawberries, and banana slices,
    although they sometimes sneak an extra cookie before dinner.
  core: Margaret Wickensimer is a bright, organized six‑year‑old whose boundless curiosity and meticulous habit of planning turn everyday activities into playful discoveries, even if they occasionally leave
    paint splatters on the kitchen table.
background:
  cultural: Margaret is raised in a predominantly white, middle‑class family in Shamokin Dam, Pennsylvania, a small river town in Snyder County. Her upbringing reflects the values of a close‑knit community
    that emphasizes neighborly cooperation, church involvement, and traditional American celebrations such as Thanksgiving, Halloween, and Fourth of July fireworks. Local customs include outdoor activities
    along the Susquehanna River, participation in regional fairs, and a strong emphasis on school and community service. These influences nurture her sociable, kind, and organized personality.
