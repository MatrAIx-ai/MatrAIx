  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Guitar'', ''Live Music'', ''Improv Theater'', ''Hiking'', ''Volunteer Teaching Art'', ''Board Games'', ''Podcast Listening'', ''LEGO Building'']'
  career_goals: James plans to enroll in a Bachelor of Fine Arts or Graphic Design program within the next year, building a professional portfolio that showcases his interdisciplinary work. He aims to secure
    internships at creative agencies to gain industry experience, eventually becoming a junior designer and progressing to senior designer or art director. In the longer term, he hopes to launch a community
    arts collective in Woonsocket that offers workshops and mentorship for local youth, merging his creative passion with his commitment to community harmony.
