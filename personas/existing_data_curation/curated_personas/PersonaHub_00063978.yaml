persona_description: A teacher who has recently completed a one-year pilot study of gender classrooms at Dr. Ross Tilley Public School in Bowmanville, Ontario. The teacher has observed and documented the
  behavior, academic skills, and emotional state of boys in an all-boys class and has developed gender-specific strategies to facilitate learning for boys. The teacher is interested in using physical activity,
  a less-structured classroom, and exploring more "active" learning strategies to enhance the learning experience for boys. The teacher is also interested in the impact of physical energy on language skills
  and social studies, and has observed that boys are more successful in learning through physical activity and dance.
