personas:
  professional: Kerry Hove, a 22‑year‑old manufacturing technician in Bemidji, blends hands‑on expertise with CNC programming, inventory management, and a curiosity for lean processes, and they use their
    talkative, team‑focused style to train new hires, troubleshoot line bottlenecks, and keep the shop floor both safe and lively while eyeing a shift‑supervisor promotion.
  sports: Kerry Hove, a 22‑year‑old outdoor enthusiast from Bemidji, spends winter snowmobiling with the Northwoods Snowmobile Club, follows the Bemidji State Beavers hockey team and the Minnesota Vikings,
    joins the local community pool for lap swimming, and they balance these passions with yoga classes that keep their muscles limber for occasional pickup basketball at the town gym.
  arts: Kerry Hove, a 22‑year‑old who thrives on community gatherings, regularly belts out karaoke classics from Dolly Parton to Ed Sheeran, attends live‑music festivals featuring Bon Iver and The Avett
    Brothers, and they craft DIY décor inspired by folk artist Keith Haring, all of which fuels their creative swagger during game‑night evenings.
  travel: Kerry Hove, a 22‑year‑old adventure‑seeker from northern Minnesota, plans road‑trip getaways by mapping routes on a paper atlas, prefers camping under the Northern Lights in Minnesota’s Boundary
    Waters, dreams of hiking Iceland’s volcanic craters, and they squeeze in weekend trips to Mackinac Island and the Upper Peninsula for lakeside fishing.
  culinary: Kerry Hove, a 22‑year‑old kitchen tinkerer, loves cooking walleye fish tacos with fresh lime, cilantro, and smoked paprika, perfects blueberry‑cheesecake bars using locally sourced wild berries,
    and they experiment with classic meatballs seasoned with allspice and nutmeg, often pairing meals with craft beers from local microbreweries.
  core: Kerry Hove, a 22‑year‑old who balances a love for loud karaoke, lean‑process efficiency, and weekend snowmobile thrills, often forgets to schedule dentist appointments, but they never miss a shift‑supervisor
    training session.
background:
  cultural: Kerry was raised in Bemidji, a tight‑knit town in northern Minnesota with a predominantly white, working‑class population. Her family’s heritage includes Scandinavian and German roots, reflected
    in Lutheran traditions, seasonal celebrations like Midsummer and Thanksgiving, and a strong emphasis on community service. Growing up surrounded by lakes and forests, she developed a love for outdoor
    activities such as fishing, hunting, and snowmobiling, while also participating in high school sports and local festivals. The Midwestern work ethic of reliability, practicality, and teamwork has shaped
    her values, and she carries a blend of modesty and confidence that balances curiosity with a down‑to‑earth approach to life.
