  hobbies: '[''Karaoke'', ''Live music festivals'', ''Hiking'', ''Snowmobiling'', ''Ice fishing'', ''DIY crafts'', ''Cooking'', ''Reading tech blogs'', ''Yoga'', ''Volunteer mentoring'']'
  career_goals: Kerry aims to become a shift supervisor within the next two years, gaining additional certifications in safety leadership and lean process improvement. She plans to complete an associate’s
    degree in industrial technology and eventually earn a bachelor’s in supply chain management. Her long‑term ambition is to advance to a production manager role, overseeing multiple lines and leading
    automation initiatives, and eventually launch her own small‑scale, sustainable manufacturing business that provides local jobs and supports the Bemidji community. She also hopes to mentor younger workers
    and contribute to workforce development programs in Cass County.
