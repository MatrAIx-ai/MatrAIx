personas:
  professional: Brendon Simmons, a veteran computer support specialist with a decade of troubleshooting Windows, macOS, and network environments, leverages his PowerShell and Bash scripting prowess to automate
    routine tickets while methodically documenting solutions, positioning himself for a senior IT service management role where his calm, structured mindset can drive process improvement and team leadership.
  sports: Brendon Simmons, an outdoor‑oriented enthusiast, spends weekends fishing on Lake Michigan and hiking the Kettle Moraine State Forest, follows the Milwaukee Brewers and Green Bay Packers for seasonal
    excitement, and participates in a local hiking club that meets monthly for trail challenges.
  arts: Brendon Simmons, a sci‑fi devotee, devours novels by Isaac Asimov and Neal Stephenson, attends occasional screenings of Blade Runner and Interstellar at the Riverside Theater, and curates a personal
    soundtrack featuring Hans Zimmer, Pink Floyd, and local indie folk band The Milk Carton Kids while hosting board‑game nights that blend strategy with storytelling.
  travel: Brendon Simmons, a meticulous planner, enjoys road‑trip getaways to Door County and Mackinac Island, has explored Reykjavik’s geothermal pools on a solo winter adventure, and dreams of a tech‑focused
    pilgrimage to Tokyo’s Akihabara district, always crafting detailed itineraries that balance budget constraints with hands‑on experiences.
  culinary: Brendon Simmons, a moderately skilled home‑brewer, experiments with hop varieties to craft a crisp American pale ale, pairs it with smoked trout and garlic‑infused fish tacos, and frequently
    refines recipes using fresh herbs like dill and cilantro from the local farmer’s market.
  core: Brendon Simmons, a composed, structure‑loving technophile, merges methodical problem‑solving at work with solitary DIY projects, weekend fishing, and home‑brewing, all while quietly navigating occasional
    budget quirks and health monitoring lapses.
background:
  cultural: Brendon was raised in Milwaukee, Wisconsin, in a family of German‑Polish descent that reflects the city’s historic immigrant roots. The Midwestern values of reliability, modesty, and community
    service that permeated his upbringing are evident in his practical, calm demeanor. He grew up celebrating local traditions such as Summerfest, enjoying Wisconsin cheese curds and supporting the Milwaukee
    Brewers. His Catholic upbringing emphasized punctuality and respect for privacy, reinforcing his preference for structured environments. These cultural influences shape his love for orderly problem‑solving,
    his appreciation for small‑group gatherings, and his commitment to helping neighbors, especially through his volunteer tech‑assistance work.
attributes:
  skills: '[''Windows troubleshooting'', ''macOS support'', ''Linux system administration'', ''Network configuration (Cisco)'', ''LAN/WAN troubleshooting'', ''Help desk ticket management (Jira)'', ''Remote
