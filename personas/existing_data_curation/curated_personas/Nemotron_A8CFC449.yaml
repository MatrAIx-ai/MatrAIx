    service'']'
  hobbies: '[''Custom PC building'', ''Arduino and Raspberry Pi tinkering'', ''Home automation projects'', ''Reading science‑fiction'', ''Technical manual study'', ''Crossword and Sudoku puzzles'', ''Fishing
    on Lake Michigan'', ''Hiking Kettle Moraine trails'', ''Board game nights (Catan, Pandemic)'', ''Home‑brewing craft beer'', ''Volunteer tech support for seniors'']'
  career_goals: Brendon aims to transition into a senior IT service management role where he can combine his technical expertise with process improvement and team leadership. Over the next five years he
    plans to obtain ITIL Foundation and Practitioner certifications, as well as advanced Microsoft (MCSE) and Cisco (CCNA) credentials, to reinforce his structured approach to service delivery. He envisions
    leading a small support team at a midsize organization, implementing standardized troubleshooting workflows, and developing a comprehensive knowledge base to enhance efficiency. Ultimately, he aspires
    to become an IT Operations Manager, guiding strategic initiatives while maintaining the predictable, reliable environment he values.
