personas:
  professional: A community arts coordinator in training, Ramon Donado leverages their disciplined event‑planning skills, self‑taught visual‑arts expertise, and bilingual communication to design inclusive
    cultural festivals and public art installations in rural Tennessee, all while juggling a GED study schedule.
  sports: Ramon Donado follows the Tennessee Volunteers football team with seasonal enthusiasm, participates in a community center’s spring soccer league, volunteers as a water‑boy for the local youth baseball
    club, and maintains a personal routine of early‑morning jogs along the Harpeth River trail to stay fit.
  arts: Ramon Donado channels their imaginative spirit into painting vibrant folk‑inspired canvases, crafting speculative poetry that nods to Jorge Luis Borges, and performing acoustic guitar at open‑mic
    nights where they often reinterpret songs by Johnny Cash and Carlos Vives, drawing visual inspiration from Frida Kahlo and Diego Rivera.
  travel: Ramon Donado’s travel style blends purposeful cultural immersion with budget‑conscious planning, having trekked the ruins of Chichén Itzá, explored the historic streets of Guanajuato, road‑tripped
    through the Great Smoky Mountains, and dreaming of a future solo pilgrimage to the artisan villages of Oaxaca.
  culinary: Ramon Donado delights in cooking, expertly crafting hand‑made tamales with masa and pork, simmering slow‑cooked brisket seasoned with a Southern barbecue rub, and preparing fresh salsa with
    roasted tomatillos, often pairing meals with a chilled craft lager or sweet tea.
  core: Ramon Donado is a disciplined dreamer who balances community‑focused art projects, nightly guitar sessions, and a perpetual quest for new recipes, all while occasionally losing track of sleep after
    late‑night paint‑splatter experiments.
background:
  cultural: Born to Mexican immigrant parents, Ramon grew up in a household where Spanish was spoken, and traditional celebrations such as Día de los Muertos and quinceañeras were observed with gusto. Relocating
    to Decherd, Tennessee, he absorbed the rhythms of rural Southern life, developing an appreciation for country music, regional cuisine, and tight-knit community values. His Mexican heritage remains central
    to his identity, influencing his art's vivid palette, his cooking, and his commitment to preserving cultural traditions. At the same time, he actively participates in local events, bridging cultural
    gaps by sharing Mexican customs with his neighbors and incorporating Southern hospitality into his hosting. This blend of Mexican and Southern influences informs his worldview, interpersonal style,
    and creative output.
