  hobbies: '[''Painting'', ''Sketching'', ''Creative writing'', ''Reading speculative fiction and philosophy'', ''Playing acoustic guitar'', ''Community volunteering'', ''Organizing local cultural events'',
    ''Cooking Mexican dishes'', ''DIY woodworking'', ''Spanish-English language practice'']'
  career_goals: Ramon aims to formalize his education by obtaining a GED within the next year and pursue a certificate in community arts management. He envisions a career as a community arts coordinator
    for a local nonprofit, where he can design public art installations and cultural events that celebrate Mexican heritage while fostering inclusion in rural Tennessee. In parallel, he plans to launch
    a small workshop offering handcrafted home décor and cooking classes, generating a steady income and providing mentorship to at-risk youth. His long-term ambition is to become a recognized cultural
    liaison, bridging the Mexican-American community with the broader Franklin County population, while achieving financial stability and personal fulfillment.
