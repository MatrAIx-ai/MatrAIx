personas:
  professional: A budding young inventor and aspiring engineer, Diogenes Pedrojuan transforms LEGO instructions into original contraptions, applying a curious yet practical mindset and a meticulous yet
    flexible approach to problem‑solving that hints at future scientific pursuits.
  sports: An avid young soccer player on the Greenville United U9 squad, Diogenes Pedrojuan balances disciplined practice with occasional rhythmic clapping games and enjoys cheering on the Atlanta Braves
    and the Carolina Panthers on game days, reflecting a modest competitive spirit rooted in small‑group teamwork.
  arts: An avid young sketch artist and budding musician, Diogenes Pedrojuan follows Mark Crilley's drawing tutorials to craft intricate invention concepts and practices simple melodies on his keyboard
    inspired by the gentle piano arrangements from the 'Harry Potter' soundtrack and classic video game themes like the 'Legend of Zelda' overture, merging solitary curiosity with expressive creativity.
  travel: A nature‑curious explorer, Diogenes Pedrojuan enjoys weekend hikes in nearby Paris Mountain State Park, dreams of seeing the geysers of Yellowstone and wandering the historic streets of Washington,
    D.C., while balancing a love for adventure with family budgeting that keeps most trips within a few hours’ drive.
  culinary: A budding kitchen helper, Diogenes Pedrojuan loves assembling homemade cheese pizza topped with mozzarella, pepperoni, and oregano, whipping up easy mac‑and‑cheese with cheddar and butter, and
    occasionally crafting peanut‑butter‑banana rolls for school snacks, though their tendency to over‑season sometimes leads to extra spicy bites.
  core: Diogenes Pedrojuan is an inquisitive, organized eight‑year‑old who blends solitary invention with cooperative play, cataloguing rocks while forgetting to tidy up their LEGO pieces, a mix of curiosity
    and practicality that guides their daily adventures.
background:
  cultural: Diogenes grows up in a bilingual Mexican-American household where Spanish is spoken at home and English at school, exposing him to both cultures daily. Holiday traditions such as Dia de los
    Muertos, celebrating with homemade pan de muerto and papel picado, and attending the local Cinco de Mayo parade keep his Mexican heritage vivid. At the same time, his life in Greenville, SC, introduces
    him to Southern customs like community barbecues and the local high school soccer culture, creating a blended identity that honors his roots while embracing his Southern environment.
