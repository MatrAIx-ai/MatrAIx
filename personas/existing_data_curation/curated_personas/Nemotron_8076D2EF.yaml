  career_goals: Diogenes dreams of becoming an engineer or architect who designs structures that improve his community, a goal inspired by his love of building and his practical mindset. He aspires to earn
    a scholarship to a strong STEM program in high school and eventually study civil engineering, hoping to combine his technical skills with his desire to give back to both his Mexican heritage and the
    Greenville community. As he grows, he also envisions mentoring younger kids in science clubs, reflecting his cooperative nature.
