  career_goals: Linda aims to transition into senior program management within a cultural nonprofit or museum, where she can design and lead community-focused initiatives that celebrate Asian heritage and
    foster intercultural dialogue. In the next five years, she hopes to obtain a Master’s in Public Administration or Nonprofit Management to deepen her strategic planning expertise. Ultimately, she envisions
    directing a multicultural arts center in Brooklyn, creating accessible programming, securing sustainable funding, and mentoring emerging artists and community leaders. She also desires to establish
    a mentorship network for Asian-American youth interested in the arts and public service.
