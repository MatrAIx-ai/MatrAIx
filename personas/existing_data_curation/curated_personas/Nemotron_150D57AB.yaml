personas:
  professional: Linda Phanitdasack blends their managerial acumen with a humanities‑infused curiosity, leading cross‑cultural teams through fluid project planning while often improvising around strict deadlines,
    and is poised to pivot into senior program management at a cultural nonprofit.
  sports: Linda Phanitdasack practices yoga thrice weekly, jogs along the Brooklyn waterfront in the spring, and follows the Brooklyn Nets and New York City FC, occasionally joining a local co‑ed volleyball
    league on weekends.
  arts: Linda Phanitdasack spends evenings devouring contemporary literary fiction by authors like Sally Rooney and poetry by Ocean Vuong, frequents independent film screenings by directors such as Kelly
    Reichardt, and captures the eclectic streets of Brooklyn through street photography inspired by Alec Soth.
  travel: Linda Phanitdasack prefers deliberately curated weekend getaways—like a farm stay in Hudson Valley or a culinary tour of Chiang Mai—while dreaming of a longer immersion in Bangkok to practice
    Thai, balancing modest travel budgets with occasional splurges on boutique hostels.
  culinary: Linda Phanitdasack enjoys cooking aromatic Thai dishes such as Pad Thai, Tom Yum Soup, and Green Curry using herbs from their balcony garden like Thai basil and cilantro, while occasionally
    yielding to the convenience of late‑night takeout ramen after late‑night project deadlines.
  core: Linda Phanitdasack is a curious yet pragmatic Brooklyn‑based planner who juggles spontaneous creativity, mindful self‑care, and occasional impulsive spending, all while nurturing a quiet devotion
    to community arts.
background:
  cultural: Linda is a first-generation Asian-American of Thai descent. Raised in Queens by immigrant parents, she grew up navigating both Thai cultural traditions—such as Songkran celebrations, Buddhist
    temple visits, and family cooking rituals—and the multicultural fabric of New York City. This dual heritage informs her appreciation for harmony, community service, and intercultural exchange. She participates
    in local Thai community events, celebrates both Thai and American holidays, and often incorporates her bilingual abilities (English and Thai) in professional and volunteer settings.
