  hobbies: '[''Rotary Club volunteering'', ''Attending Chicago Cubs games'', ''Playing bridge'', ''Cooking Balkan cuisine'', ''Walking the lakefront trail with his dog'', ''Mindfulness meditation'', ''Traveling
    to the Balkans'', ''Hosting community fundraisers'', ''Networking at local business events'', ''Reading business and finance publications'']'
  career_goals: Edward aims to advance to a senior procurement leadership role, such as Procurement Manager or Director of Strategic Sourcing, where he can shape company-wide sourcing policies and champion
    sustainability initiatives. He plans to obtain the Certified Professional in Supply Management (CPSM) credential and lead a regional cost-saving program that cuts spend by at least 10% over three years.
    Mentoring is a personal ambition; he wants to formalize a mentorship pipeline for early-career buyers in his organization. Over the longer term, Edward envisions launching a boutique consulting firm
    that advises small-to-mid-size manufacturers in the Chicago corridor on efficient purchasing practices, allowing him to leverage his experience while achieving a more flexible schedule to manage his
    stress and family commitments.
