personas:
  professional: Katelynn Daswani is a mid‑level visual designer who deftly wields Adobe Creative Suite and Figma to craft crisp brand identities and print collateral, excels at presenting concepts with
    engaging storytelling, manages small projects with a competitive eye for standout work, and balances a love of structured processes with a spontaneous flair as they work toward a creative director role
    at a boutique agency or their own Gulf‑Coast studio.
  sports: Katelynn Daswani fuels their competitive streak by joining local 5‑k runs, beach volleyball leagues, and occasional CrossFit challenges, while cheering for the Houston Astros, Texas Rangers, and
    Dallas Cowboys, and sometimes testing poker strategy alongside athletic pursuits.
  arts: Katelynn Daswani shines as a lead actress in community theater productions of Neil Simon’s ‘The Odd Couple,’ hosts weekly trivia nights featuring pop‑culture references from the likes of Beyoncé
    and The Beatles, and regularly visits the Texas Art Festival where they admire works by Kehinde Wiley, Amy Sherald, and the street‑art provocateur Banksy, infusing their design sensibility with fresh
    artistic inspiration.
  travel: Katelynn Daswani prefers spontaneous weekend road trips that trace the Texas Gulf Coast to Galveston, the historic River Walk of San Antonio, and the jazz‑filled streets of New Orleans, while
    also dreaming of a summer retreat in Barcelona’s Gothic Quarter, balancing their flexible itinerary with occasional use of travel‑planning apps to snag boutique B&Bs and hidden diners.
  culinary: Katelynn Daswani, an avid cooking‑class participant, blends creativity and flavor by mastering Cajun‑Mexican fusion dishes such as shrimp étouffée tacos, miso‑glazed salmon, and matcha tiramisu,
    while often treating themselves to artisan coffee lattes and occasionally over‑seasoning meals in a quest for bold taste.
  core: Katelynn Daswani is a talkative, competition‑driven visual designer who thrives on social spotlight, juggles structured design processes with spontaneous creativity, and copes with persistent anxiety
    through yoga, journaling, and the occasional midnight poker game.
background:
  cultural: Katelynn grew up in a middle‑class, predominantly white suburban community in the Texas Gulf Coast region. Her upbringing emphasized Southern hospitality, family barbecues, and a strong sense
    of local community. She attended a public high school where she was involved in the art club and student council, and later earned an associate’s degree in graphic design at a community college in Victoria.
    Although her surname reflects a multicultural family connection through marriage, she identifies culturally with the Texan values of independence, hardworking pragmatism, and a love for regional traditions
    such as country music and community festivals.
