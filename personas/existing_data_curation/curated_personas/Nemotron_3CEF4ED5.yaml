  hobbies: '[''Community theater'', ''Trivia nights'', ''Board games'', ''Local poker tournaments'', ''Yoga'', ''Journaling'', ''Road trips'', ''Art festivals'', ''Cooking classes'']'
  career_goals: Katelynn aims to move from a senior designer role to a creative director position within the next five years, ideally at a boutique agency or by launching her own design studio that serves
    local businesses in Victoria and the broader Gulf Coast region. She is driven to earn industry accolades for innovative branding campaigns, expand her portfolio into UI/UX, and mentor junior designers.
    Balancing her desire for structure with her love of flexibility, she plans to implement systematic design processes that still allow creative spontaneity, ensuring reliable client delivery while maintaining
    a competitive edge.
