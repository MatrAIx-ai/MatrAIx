persona_description: A physician who is committed to life long learning and has mastered proven skills and strategies to create predictable success for their life and career. They have honed their current
  skills and developed new skills to complement their new level of achievement. They are skilled at performing diagnostic tests to order, reviewing all data and developing a treatment plan. They have a
  passion for medicine and are dedicated to providing the best care to their patients. They are constantly seeking out new knowledge and are willing to put in the time and effort to master new skills. They
  are a leader in their field and are respected by their peers. They are a role model for other physicians and are always looking for ways to improve their skills and knowledge. They are a true physician
  who is committed to their patients and to the field of medicine.
