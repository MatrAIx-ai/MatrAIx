personas:
  professional: Mariaelena Fernandez is a seasoned retail supervisor with three decades of frontline leadership who uses their bilingual communication, meticulous scheduling, and conflict mediation skills
    to keep store operations predictable while injecting competitive energy into their team, and they are driven to develop a mentorship program for aspiring supervisors.
  sports: Mariaelena Fernandez enjoys watching baseball, especially when players of Caribbean heritage are highlighted, follows the Richmond Flying Squirrels and Washington Nationals, participates in morning
    walks with their husband at Belle Isle, and occasionally joins a local adult recreational volleyball league, while they keep a casual fitness routine by tending to a small garden as a low-impact exercise.
  arts: Mariaelena Fernandez is an avid fan of Latin dance music, often dancing merengue and bachata at community events, and they collect vinyl records from artists such as Juan Luis Guerra, Marc Anthony,
    and classic salsa legend Celia Cruz, while also attending theater productions featuring works by Lin-Manuel Miranda and community cultural festivals that showcase folk dance.
  travel: Mariaelena Fernandez prefers organized group tours to Caribbean islands like Puerto Rico and family-friendly road trips through the Blue Ridge Mountains, enjoys planning itineraries months ahead,
    balancing adventure and relaxation, and they dream of visiting historic sites in Granada, Spain, after retiring to fund their boutique dream.
  culinary: Mariaelena Fernandez loves cooking traditional island dishes such as sancocho, mangú with fried cheese, and arroz con guandules, demonstrates a proficient skill level as their family thinks
    the seasoning is unbeatable, and they enjoy sourcing fresh plantains, yucca, and aji peppers at the farmer's market before hosting weekend feasts, while also treating themselves to occasional dinner
    at upscale seafood eateries.
  core: Mariaelena Fernandez blends pragmatic structure with vibrant sociability, rigorously managing retail operations while lighting up community dances, and they have a habit of double-checking schedules
    even at home, sometimes to the point of micromanaging friends' party plans.
background:
  cultural: Mariaelena is a first‑generation Dominican‑American. Raised in a close‑knit Dominican community in Richmond, she grew up bilingual and retains strong ties to her heritage through music, dance,
    and cuisine. She celebrates Dominican holidays such as Carnaval and Día de la Independencia, and she maintains active involvement in local Dominican cultural organizations, sharing traditions with her
    family and neighbors.
attributes:
  skills: '[''Retail supervision'', ''Team leadership'', ''Scheduling and staffing'', ''Inventory management'', ''Visual merchandising'', ''Sales performance analysis'', ''POS system operation'', ''Bilingual
