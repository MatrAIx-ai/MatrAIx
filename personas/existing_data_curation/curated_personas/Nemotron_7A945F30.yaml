  hobbies: '[''Merengue and bachata dancing'', ''Cooking Dominican cuisine'', ''Church and cultural festivals'', ''Gardening'', ''Walking in parks'', ''Attending baseball games'', ''Volunteering at senior
    center'']'
  career_goals: Mariaelena aims to step up to a store manager position within the next two years, positioning herself for future advancement to district manager overseeing multiple locations. She is driven
    to improve store sales metrics and develop a mentorship program for aspiring supervisors. Long‑term, she envisions opening a boutique that showcases Dominican crafts and cuisine, blending her retail
    expertise with her cultural roots.
