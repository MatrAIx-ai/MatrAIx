personas:
  professional: Ruby Montoto, a statistical assistant with a talent for advanced Excel, SQL, and R, turns raw data into clear, actionable reports and, thanks to her love of routine and dependable communication,
    serves as the trusted liaison between technical teams and business stakeholders.
  sports: Ruby Montoto, a casual fitness enthusiast, follows the Charlotte Hornets and Carolina Panthers, plays on a community softball league in summer, and joins the Concord Trail Runners for weekend
    dog walks and steady cardio.
  arts: Ruby Montoto, an avid reader of contemporary fiction by Celeste Ng and historical novels by Hilary Mantel, enjoys the blue‑grass sounds of Alison Krauss and attends local community theater productions
    of classic plays, letting the arts provide emotional balance to her analytical work.
  travel: Ruby Montoto, a meticulous trip planner, prefers short road trips to Asheville’s Blue Ridge Mountains and Charleston’s historic waterfront, while dreaming of a well‑organized cultural tour of
    Kyoto and Barcelona that balances adventure with her modest travel budget.
  culinary: Ruby Montoto, a competent home cook, delights in comfort dishes such as chicken pot pie and shrimp‑and‑grits flavored with garden‑fresh basil, thyme, and sweet corn, and regularly shares these
    meals at neighborhood potlucks.
  core: Ruby Montoto, a diligent data‑driven professional, blends Southern hospitality with a love for routine, yet secretly over‑waters her garden and procrastinates on her certification goals.
background:
  cultural: Ruby grew up in a middle‑class family in Concord, North Carolina, where Southern hospitality and community involvement are integral parts of everyday life. Her upbringing emphasized hard work,
    respect for tradition, and a cooperative spirit, values reinforced by regular participation in local events such as seasonal festivals, high school sports games, and church gatherings. Although she
    identifies as white, her cultural experience reflects the blend of modesty, practicality, and neighborly support common to the region. These influences shape her preference for routine, her focus on
    harmonious relationships, and her dedication to contributing positively to her community.
attributes:
  skills: '[''Statistical analysis'', ''Data cleaning'', ''Microsoft Excel (advanced)'', ''SQL querying'', ''R programming'', ''Data visualization (Tableau)'', ''Report writing'', ''Project coordination'',
    ''Attention to detail'', ''Time management'', ''Effective communication'']'
  hobbies: '[''Gardening'', ''Cooking comfort meals'', ''Reading contemporary fiction'', ''Crossword and Sudoku puzzles'', ''Walking the dog'', ''Yoga'', ''Volunteer work at local food bank'', ''Coffee
    meet‑ups with friends'']'
  career_goals: Ruby aims to build a stable, progressive career within the field of data analytics. In the next few years she plans to earn a professional certification such as the Certified Analytics Professional
    (CAP) and to deepen her expertise in predictive modeling. Her short‑term goal is to become a senior data analyst, taking on more complex projects and mentoring junior staff while maintaining the structured,
    reliable work environment she values. Long‑term, Ruby envisions stepping into a lead analytics role or a data‑driven decision‑making position within a mid‑size company, where she can shape data strategy,
    oversee a small team, and ensure that analytical outputs consistently support business objectives.
