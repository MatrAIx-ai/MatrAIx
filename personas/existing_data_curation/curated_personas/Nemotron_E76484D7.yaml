  hobbies: '[''Engine tinkering and truck maintenance'', ''Fishing'', ''Hunting'', ''Reading technical manuals on roofing and construction'', ''Online roofing forums and discussion groups'', ''Woodworking
    (birdhouses, tool racks)'']'
  career_goals: Ryan aims to transition from crew member to foreman within the next two years, securing a supervisory role that leverages his organizational strengths. He plans to acquire formal certifications—such
    as an OSHA 30‑hour construction safety course and a state roofing contractor license—to reinforce his credibility. Long‑term, he envisions launching his own roofing business focused on sustainable materials
    and integrating solar‑roof technology, allowing him to stay at the forefront of industry innovation while maintaining the reliable, methodical service his clients expect.
