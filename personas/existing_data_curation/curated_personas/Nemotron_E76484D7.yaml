personas:
  professional: An experienced roofer in western Kansas, Ryan Harvey combines extensive expertise in asphalt shingles, metal panels, and flat commercial roofs with precise blueprint interpretation, rigorous
    safety compliance, and a methodical, curiosity‑driven leadership style that constantly questions conventional methods while delivering reliable results.
  sports: A practical outdoorsman, Ryan Harvey spends weekends fishing at Tuttle Creek Reservoir, participates in fall deer hunts with his local hunting club, keeps his fitness sharp through routine strength
    training and occasional pickup basketball games, and passionately follows the Kansas City Chiefs and the Kansas State Wildcats during football season.
  arts: A hands‑on creator, Ryan Harvey channels his curiosity into woodworking projects while unwinding to the storytelling strains of Johnny Cash, the wilderness‑inspired melodies of John Denver, and
    the modern folk harmonies of The Avett Brothers, often pairing his evenings with classic western films like ‘The Good, the Bad and the Ugly.’
  travel: A methodical planner, Ryan Harvey prefers self‑driven road trips that balance work and leisure, having explored the Nebraska Sandhills and Colorado Springs on weekend getaways, while eyeing future
    adventures to Iceland’s geothermal marvels and the Grand Canyon’s rugged trails for both inspiration and a break from the Kansas plains.
  culinary: A down‑to‑earth food lover, Ryan Harvey gravitates toward hearty Kansas‑style barbecue—savoring smoked brisket, burnt ends, and a signature chili spiced with smoked paprika, cumin, and a splash
    of rye whiskey—while occasionally flexing his kitchen skills with a well‑executed chicken fried steak and a weekend campfire feast of foil‑wrapped potatoes.
  core: Ryan Harvey, a 29‑year‑old roofer with a curiosity‑driven, methodical mindset, balances meticulous work, disciplined finances, solitary outdoor hobbies, and a habit of stashing spare screws in every
    pocket, all while contending with occasional back‑pain episodes.
background:
  cultural: Ryan grew up in the Midwestern small‑town environment of Garden City, Kansas, a region shaped by agricultural roots and a strong work ethic. His family background is primarily of German and
    Scandinavian descent, reflecting the broader white ethnic composition of western Kansas. The local culture values self‑reliance, practicality, and community cooperation—principles that are evident in
    his organized, methodical approach to work and life. While he attends a local Protestant church sporadically, his cultural identity is more closely tied to the region's emphasis on independence, honesty,
    and straightforward communication.
attributes:
