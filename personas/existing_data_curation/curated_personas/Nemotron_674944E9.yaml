personas:
  professional: Sheri Morton, a veteran transportation supervisor with a Class A CDL and two decades of DOT-certified expertise, leverages their methodical inspection routines, meticulous log-keeping, and
    competitive drive to keep their fleet on schedule while mentoring a small team of drivers.
  sports: Sheri Morton supports the Alabama Crimson Tide football team and follows the Birmingham Barons baseball club, enjoys morning walks along the Cahaba River during bird-watching season, and joins
    a seasonal beginner's tennis group at the local community center each summer.
  arts: Sheri Morton channels their creativity through quilting, drawing inspiration from classic Amish patterns, while devouring mystery novels by Agatha Christie and Tana French, and they unwind to the
    soulful blues of B.B. King and the storytelling country sounds of Dolly Parton.
  travel: Sheri Morton prefers well-planned road trips in their own truck, often driving to nearby historic towns like Savannah and Charleston for weekend getaways, while dreaming of a leisurely cruise
    down the Gulf Coast after retirement, always booking accommodations months in advance to ensure routine and comfort.
  culinary: Sheri Morton delights in cooking traditional Southern dishes such as fried chicken, collard greens simmered with smoked turkey, and sweet-potato pie, skillfully incorporating fresh tomatoes,
    collard greens, and sweet potatoes from their garden and insisting on using butter-flavored corn oil for authentic flavor.
  core: Sheri Morton is a detail-driven logistics professional whose love of routine, garden-fresh meals, and patchwork quilts blends competitive ambition with a quiet, skeptical charm, even as they battle
    occasional forgetfulness about health appointments.
background:
  cultural: Sheri grew up in a middle‑class, working‑class white family in rural Alabama, where community and faith played central roles. Her upbringing emphasized practicality, self‑reliance, and respect
    for tradition, values that still guide her daily decisions. She regularly attends a Baptist congregation in Chelsea, where she participates in church events and charitable outreach. The local Southern
    culture—family gatherings, high school football weekends, and regional culinary traditions—has shaped her sense of identity. While she embraces the warmth of small‑town connections, she also values
    the orderly, predictable rhythm of her professional life, reflecting the blend of cultural heritage and personal disposition.
attributes:
  skills: '["Class A Commercial Driver’s License (CDL)", "Vehicle inspection and preventive maintenance", "Route planning and optimization", "DOT safety compliance and record‑keeping", "Fleet scheduling
    and shift coordination", "Team supervision and mentorship", "Emergency response coordination"]'
  hobbies: '["Vegetable gardening", "Southern cooking", "Quilting", "Bird watching", "Reading mystery novels", "Church kitchen volunteering"]'
  career_goals: Sheri aims to advance into a supervisory management position within the next three years, ideally as a fleet manager for a regional logistics firm. She wants to deepen her knowledge of supply‑chain
    analytics and earn a certification in transportation management to become a go‑to resource for improving efficiency and safety metrics. Long‑term, she envisions transitioning to a part‑time consulting
    role, helping small businesses in Shelby County set up compliant transportation operations before she retires. Throughout, she seeks stability, the ability to maintain her routine, and opportunities
    to mentor younger workers, reflecting her competitive yet practical drive.
