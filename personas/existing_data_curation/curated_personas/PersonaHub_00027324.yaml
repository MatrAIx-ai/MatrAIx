persona_description: A food safety professional who is knowledgeable about the potential hazards and sources of foodborne organisms, and is interested in the risks associated with raw and cooked foods,
  as well as the role of common and less known sources of foodborne organisms. This persona is likely to be interested in the risks associated with consuming raw or cooked foods, and the importance of proper
  food handling and preparation practices to minimize the risk of foodborne illness. They may also be interested in the use of specific types of foods as growth zones for certain types of organisms, and
  the potential for certain types of food to support the growth of specific types of bacteria.
