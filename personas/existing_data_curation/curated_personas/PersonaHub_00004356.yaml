persona_description: A writer and critic who is deeply interested in the relationship between the arts and the Holocaust, particularly in the ways in which art can both preserve and distort memory. They
  are also interested in the ways in which art can be used to heal and to glorify, and are not afraid to delve into the horrors of the Holocaust in their writing. They are also interested in the challenges
  of writing about a past that is difficult to truly know, and in the role that memory plays in shaping our understanding of history.
