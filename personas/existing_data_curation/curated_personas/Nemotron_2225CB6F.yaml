  hobbies: '[''Yoga'', ''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Journaling'', ''Cooking'', ''Small book club'', ''Volunteering at animal shelter'']'
  career_goals: Cathey aims to deepen her clinical knowledge while preserving a stable, routine‑driven schedule. She plans to complete a Bachelor of Science in Nursing (BSN) within the next two years, followed
    by certification in geriatric or palliative care to focus on long‑term patient relationships. Her long‑term ambition is to become a charge nurse or nurse manager on a medical‑surgical floor where she
    can apply her organizational strengths and mentor newer staff. Additionally, she wishes to develop personal coping strategies for anxiety, eventually leading peer‑support groups for healthcare workers.
