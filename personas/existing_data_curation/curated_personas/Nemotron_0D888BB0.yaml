  hobbies: '["Fishing at Lake County", "Cooking Filipino cuisine", "Playing card games (poker, bridge)", "Attending community festivals and potlucks", "Participating in church choir", "Volunteering as a
    driver for seniors", "Walking and light exercise", "Listening to classic rock music"]'
  career_goals: At 71, Diosdado aims to transition to a part‑time driving role that allows him to stay active while giving him the flexibility to spend more time with his community. He hopes to obtain a
    driver‑trainer certification so he can mentor younger drivers, share his safety knowledge, and possibly start a small consulting service for local logistics firms. He also wants to establish a modest
    side business delivering groceries and prescription meds to seniors in Lake County, blending his driving expertise with his desire to help others.
