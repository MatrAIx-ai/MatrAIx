personas:
  professional: Wilbur Roberson, a budding young game developer, channels their curiosity and practical problem‑solving into programming simple tablet games while simultaneously applying the same logic
    to elaborate LEGO builds, and their competitive nature pushes them to out‑design friends’ levels and win digital challenges.
  sports: Wilbur Roberson dominates the after‑school youth basketball league at the local recreation center, cheering for the Memphis Grizzlies while sprinting through neighborhood treasure hunts, and balances
    a fiercely competitive drive on the court with relaxed bike rides along the Mississippi River banks during the summer.
  arts: Wilbur Roberson immerses themselves in creative worlds, constructing intricate LEGO sculptures inspired by David Attenborough’s dinosaur documentaries, jamming to Taylor Swift’s pop hits and Kidz Bop’s
    upbeat tracks, and leading craft projects for the church youth group that echo the bright, playful style of Pixar’s The Incredibles.
  travel: Wilbur Roberson loves spontaneous family excursions along the Mississippi River’s wetlands, collecting shells and learning ecosystems, and dreams of visiting the Space Center in Houston and the
    Grand Canyon, though current allowance limits trips to nearby adventures like the Gateway Arch in St. Louis and a weekend ferry ride to the historic French Quarter in New Orleans.
  culinary: Wilbur Roberson prefers finger foods such as pepperoni pizza slices, chicken nuggets, and mac and cheese, yet enjoys experimenting with simple recipes like homemade trail mix featuring pretzels,
    dried mango, and chocolate chips, and proudly bakes LEGO‑shaped sugar cookies topped with vanilla icing and rainbow sprinkles.
  core: Wilbur Roberson is a high‑energy, curiosity‑driven nine‑year‑old whose competitive spirit fuels LEGO builds, Pokémon trades, and basketball games, while a laid‑back attitude and occasional disorganization
    keep life delightfully unpredictable.
background:
  cultural: Wilbur is raised in a close‑knit African‑American family in Baton Rouge, where church, community, and family traditions play a central role. Sundays are spent at a Black Baptist church that
    emphasizes gospel music, storytelling, and communal service, influencing his love for group activities and performance. The vibrant culture of Louisiana—Mardi Gras parades, Creole cuisine like gumbo
    and collard greens, and the local jazz and zydeco sounds—adds flavor to his upbringing and sparks his interest in rhythm and movement, seen in his enthusiasm for basketball and dance. Family gatherings
    often feature lively games and shared meals, reinforcing his sociable nature while also teaching him the value of resilience and adaptability. The neighborhood’s strong sense of pride and competitive
    spirit, especially around high school sports, fuels his ambition to excel and represent his community in future pursuits.
