  hobbies: '[''Playing basketball'', ''LEGO building and design'', ''Scratch game programming'', ''Collecting Pokémon cards'', ''Watching dinosaur and space documentaries'', ''Exploring local parks and
    riverbanks'', ''Organizing youth group activities'']'
  career_goals: Wilbur dreams of becoming someone who can blend imagination with real-world impact. He often talks about building rockets like an astronaut, designing video games that let players explore
    new worlds, or playing professional basketball for his city. He also imagines teaching younger kids how to code and create, seeing himself as a future mentor who can inspire curiosity while delivering
    practical skills. His ambitions are shaped by his love of competition, a desire to solve puzzles, and a wish to be a role model in his community.
