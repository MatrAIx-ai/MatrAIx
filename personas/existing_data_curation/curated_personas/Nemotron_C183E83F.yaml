  career_goals: David’s immediate career goals focus on preserving his life’s work and ensuring his family’s stability. He aims to compile a comprehensive memoir and a detailed family genealogy that can
    be archived at the local historical society. He plans to mentor his grandson in woodworking and mechanical repair, passing on his practical skills. He also intends to volunteer his expertise in budgeting
    and record‑keeping for the community senior center, helping other retirees manage their finances. Finally, he wants to secure his wife’s financial wellbeing by finalising estate documents and ensuring
    all assets are properly titled.
