  career_goals: Although retired from formal employment, Yvette aims to channel her expertise into flexible, low‑commitment roles that align with her love of solitude and curiosity. She aspires to mentor
    young entrepreneurs from underrepresented backgrounds through volunteer programs, offering strategic guidance on a project basis. She also wishes to curate a series of small community art exhibitions
    that highlight Mexican heritage and contemporary art, allowing her to blend business organization with artistic expression. A personal long‑term ambition is to author a collection of essays and memoir
    reflections that weave together her experiences in business, art, and cultural identity, and to maintain a modest consulting side‑venture that provides strategic advice without the constraints of a
    traditional workplace.
