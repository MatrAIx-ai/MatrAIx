  career_goals: Although retired from formal employment, Michael’s ambition is to remain a pillar of his community. He aims to expand his volunteer work at the Portsmouth senior center, establishing a mentorship
    program that pairs seniors with local youth for skill‑sharing and storytelling. He also hopes to collaborate with the city’s historical society to document and present the African‑American maritime
    heritage of Portsmouth, ensuring that the stories of his generation are preserved. Additionally, Michael plans to take a leadership role in his church’s outreach initiatives, coordinating food‑bank
    drives and health‑screening events for underserved families.
