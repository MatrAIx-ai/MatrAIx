personas:
  professional: Jenell Power is a hands‑on maintenance professional who deftly blends mechanical, electrical, and plumbing expertise with a structured yet flexible approach, using a CMMS to streamline work
    orders while assertively negotiating resources and mentoring teammates to embed safety protocols and predictability into facility operations.
  sports: Jenell Power supports the Dallas Cowboys in the NFL, the Texas Rangers in MLB, and the San Antonio Spurs in the NBA, and she participates in a local hiking club that organizes weekend trail runs
    and occasionally joins a co‑ed recreational softball league with her coworkers.
  arts: Jenell Power finds creative release in playing acoustic guitar—often covering John Mayer and Neil Young—painting watercolor landscapes inspired by Frederic Edwin Church, and attending live performances
    by local folk singer‑songwriter groups, while she also enjoys the cinematic works of Greta Gerwig and the theatrical flair of Lin‑Manuel Miranda’s musical Broadway shows.
  travel: Jenell Power loves weekend escapes to the Texas Hill Country’s Enchanted Rock, has taken a road trip to New Mexico’s Santa Fe for its art scene, dreams of hiking the Patagonian Andes, and plans
    a future visit to Kyoto to explore its serene temples and garden design.
  culinary: Jenell Power delights in preparing Tex‑Mex favorites such as pork carnitas tacos with fresh cilantro, lime, and jalapeño, mastering homemade salsa verde with tomatillos, and she enjoys experimenting
    with smoked chipotle in slow‑cooked enchiladas, while her cooking skill level ranges from confident skillet work to occasional over‑spicing during stressful evenings.
  core: Jenell Power blends a pragmatic maintenance career with a love for DIY, outdoor exploration, and music, all while juggling a tendency toward worry, a flexible schedule, and a habit of splurging
    on tools when stress peaks.
background:
  cultural: Jenell is a White Texan who grew up in a suburban neighborhood on the outskirts of San Antonio. Her mother hails from a small Texas town with deep Catholic roots, while her father served in
    the U.S. Army before transitioning to a construction career. The multicultural environment of San Antonio exposed her to Hispanic influences, and she has a conversational level of Spanish from community
    interactions. Her cultural identity emphasizes self‑reliance, community service, and a strong sense of Texas pride. She participates in local traditions such as Fourth of July barbecues, attends occasional
    rodeos, and enjoys regional foods like brisket and tamales.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical system repair'', ''Plumbing maintenance'', ''HVAC servicing'', ''Preventive maintenance scheduling'', ''CMMS data entry'', ''Safety inspections'',
    ''Inventory management'', ''Basic carpentry'', ''MIG welding (introductory)'', ''Equipment diagnostics'', ''Vendor negotiations'']'
  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''DIY home projects'', ''Acoustic guitar playing'', ''Cooking Tex‑Mex dishes'', ''Yoga'', ''Watercolor painting'', ''Strategy video gaming (Factorio)'']'
  career_goals: Jenell aims to formalize her expertise by earning EPA 608 certification and an HVAC technician license within the next two years. Her long‑term ambition is to become a lead facilities coordinator
    or maintenance supervisor, where she can embed more structured processes, improve safety protocols, and mentor new staff. She seeks a role that offers a predictable schedule to help manage stress, while
    still allowing enough flexibility to maintain her work‑life balance. Additionally, she plans to develop a small mentorship program for entry‑level maintenance workers in her company.
