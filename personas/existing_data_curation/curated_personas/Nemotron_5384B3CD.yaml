personas:
  professional: Mark Kinneman, a 35‑year‑old art historian and digital‑humanities specialist, leverages his imaginative curiosity and methodical project‑management skills—alongside a healthy dose of competitive
    skepticism—to curate cutting‑edge exhibitions, secure ambitious grant funding, and orchestrate interdisciplinary public programs that push museum conventions.
  sports: Mark Kinneman renews his stamina by hiking the Lakefront Trail three times weekly, participates in the Chicago Rowing Club’s spring regatta, joins pick‑up basketball games while cheering for the
    Chicago Bulls, and follows the Blackhawks and Bears with the same analytical zeal he brings to curatorial research.
  arts: Mark Kinneman fuels his creative soul by dissecting Agnes Martin’s minimalist canvases, attending Theaster Gates’ community‑based installations, losing himself in Sun Ra’s avant‑garde jazz and Ornette
    Coleman’s free improvisations, and regularly witnessing experimental productions at Chicago’s Steppenwolf and Lookingglass theatres featuring actors like Jeremy O. Harris and John Malkovich.
  travel: Mark Kinneman meticulously plans art‑focused sabbaticals—having trekked the galleries of Berlin’s Kunsthalle, the contemporary installations at Tokyo’s Mori Museum, and the street murals of Valparaíso,
    Chile—while dreaming of an Icelandic road‑trip that balances avant‑garde music festivals with rugged lake‑side hikes.
  culinary: Mark Kinneman, an intermediate home cook, alternates between perfecting a buttery Chicago deep‑dish pizza and crafting miso‑glazed salmon with sumac‑spiced roasted carrots, while unabashedly
    indulging in late‑night espresso shots and seeking out venison tartare at the city’s avant‑garde pop‑up restaurants.
  core: Mark Kinneman channels a relentless curiosity and competitive perfectionism into every curatorial venture, yet habitually fuels his late‑night brainstorming sessions with triple‑shot espressos and
    an ever‑growing stack of unread exhibition catalogues.
background:
  cultural: Mark grew up in a middle‑class, white family of Irish‑German descent in the Chicago suburbs, where he was exposed early to the city's vibrant cultural scene. His graduate studies in the humanities
    at a local university deepened his appreciation for Chicago's rich artistic heritage, including the legacy of the Chicago School of Architecture, the blues and jazz traditions, and the city's dynamic
    contemporary art community. While his upbringing emphasized individual achievement and self‑reliance, his experiences in diverse neighborhoods and multicultural institutions have fostered a nuanced
    perspective that blends European intellectual traditions with the eclectic, progressive spirit of modern Chicago.
attributes:
  skills: '[''art historical research'', ''critical theory analysis'', ''digital humanities'', ''archival investigation'', ''curatorial project planning'', ''grant writing'', ''academic writing'', ''public
