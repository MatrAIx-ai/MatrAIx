  hobbies: '[''visiting art galleries'', ''experimental theater'', ''avant‑garde jazz'', ''abstract painting'', ''mixed media art'', ''reading contemporary philosophy'', ''writing poetry'', ''maintaining
    an art critique blog'', ''chess'', ''puzzle solving'', ''hiking the Lakefront Trail'', ''volunteering at community art workshops'']'
  career_goals: Mark aspires to secure a curatorial position at a major museum or contemporary art institution in Chicago, where he can develop innovative exhibitions that blend abstract concepts with emerging
    media. He also aims to launch a nonprofit platform that supports underrepresented artists through grant funding and mentorship, leveraging his grant‑writing expertise. In the longer term, he hopes to
    author a seminal book on the intersection of modern philosophy and visual art, establishing himself as a thought leader in the humanities. To achieve these goals, he plans to complete a fellowship in
    museum studies, expand his digital curation skills, and build strategic partnerships within the city's cultural network.
