personas:
  professional: Brian Elhag is an elementary/middle school teacher who blends his STEM bachelor's training with hands‑on inquiry‑driven science and math instruction, designing low‑cost labs and robotics
    projects while using meticulous organization and a flexible, curiosity‑fuelled approach that lets student questions steer lessons.
  sports: Brian Elhag is a weekend hiker who tackles Adirondack trails, a seasonal angler on the St. Lawrence River, a member of the local cross‑country skiing club that races for the Champlain Valley,
    and they cheer the Buffalo Bills, Montreal Canadiens, and the nearby Adirondack Thunder hockey team.
  arts: Brian Elhag finds creative refuge in nature photography inspired by Ansel Adams, listens to folk legends like Bob Dylan while coding simple Python games, and reads science‑fiction authors such as
    Andy Weir and Liu Cixin, which together shape their teaching metaphors and weekend leisure.
  travel: Brian Elhag prefers low‑key road trips that blend scenic drives along the St. Lawrence with cultural stops at bilingual festivals in Montreal and the historic sites of Quebec City, while dreaming
    of a future backpacking adventure in Iceland to chase the northern lights.
  culinary: Brian Elhag enjoys hearty meals like pan‑fried perch with lemon butter, homemade potato soup seasoned with thyme, and rustic apple crumble, cooking at a moderate skill level that balances precise
    recipe‑following with improvisation born from their DIY tinkering mindset.
  core: Brian Elhag is a meticulously organized yet quietly curious educator who worries often, fixes broken tech by night, and channels nervous energy into building rockets, fishing, and snapping photos
    of changing seasons.
background:
  cultural: Brian was raised in Massena, a small, close‑knit community in St. Lawrence County, New York, where the rhythm of life is shaped by the nearby St. Lawrence River and the border with Canada. His
    family’s Northern‑European ancestry—primarily English and Dutch roots—reflects the broader white, working‑class demographic of the region. The local culture values modesty, self‑reliance, and community
    support, traits that influence his practical approach to teaching and his willingness to volunteer for after‑school programs. Exposure to the French‑Canadian presence across the border has given him
    an appreciation for bilingual signage and occasional cross‑border cultural festivals, adding a subtle multicultural awareness to his otherwise mainstream American upbringing.
attributes:
  skills: '[''STEM curriculum design'', ''Differentiated instruction'', ''Classroom technology integration (Google Classroom, interactive whiteboards)'', ''Project‑based learning facilitation'', ''Data‑driven
    assessment and analytics'', ''Arduino and robotics programming'', ''Python and Scratch coding'', ''DIY hands‑on experiments'', ''Student mentorship and counseling'']'
  hobbies: '[''Model rocket building'', ''Arduino and robotics projects'', ''Reading science‑fiction and popular‑science books'', ''Hiking in the Adirondacks'', ''Fishing on the St. Lawrence River'', ''Nature
    photography'', ''Woodworking'', ''Indie video‑game development'', ''Community volunteer tutoring'']'
  career_goals: Brian aspires to become the district’s lead STEM coordinator, where he can shape curriculum across multiple schools and secure grant funding for state‑of‑the‑art labs. He plans to earn a
    master’s degree in educational leadership within the next three years, positioning himself for future roles as an assistant principal and eventually a principal who champions inquiry‑based learning.
    In the longer term, he hopes to develop a regional after‑school STEM outreach program that partners with local businesses and nearby Canadian institutions, giving rural students exposure to emerging
    technologies.
