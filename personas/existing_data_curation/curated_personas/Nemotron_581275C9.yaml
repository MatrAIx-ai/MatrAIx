  hobbies: '[''Watercolor painting'', ''Sketching abstract art'', ''Poetry writing'', ''Reading speculative fiction'', ''Astronomy hobby (stargazing)'', ''Volunteering to teach computer basics'', ''Mindfulness
    meditation'', ''Nature walks'', ''Indoor herb gardening'', ''Analog photography'']'
  career_goals: Stefanie aims to evolve her role toward a hybrid position that blends her administrative strengths with her creative and compassionate passions. She envisions becoming a program coordinator
    for a local arts nonprofit, where she can organize workshops, manage budgets, and contribute her design skills to promotional materials. She also hopes to mentor younger staff members, sharing both
    her technical knowledge and her approach to fostering a harmonious workplace. To support this transition, she plans to take a short certification in project management (CAPM) and a digital media workshop,
    allowing her to lead community initiatives while preserving the flexible, low‑stress schedule she values.
