personas:
  professional: Stefanie Ward is a veteran administrative professional with three decades of office management experience who leverages advanced Excel, Microsoft Access, and graphic design skills to translate
    complex technical concepts into clear, visually appealing presentations, while her spontaneous, compassion‑driven nature fuels her ambition to become a program coordinator at a local arts nonprofit
    despite occasional deadline challenges.
  sports: Stefanie Ward enjoys low‑impact fitness, joining the Hudson Valley walking club for weekly nature strolls, attending a senior‑center Tai Chi class in the spring, cheering for the New York Knicks
    during basketball season, and occasionally playing pickleball at the community center, though she prefers solitary movement over organized team sports.
  arts: Stefanie Ward immerses herself in creative pursuits, painting watercolors inspired by nebulae in Hubble images, sketching abstract forms while listening to ambient compositions by Brian Eno, photographing
    analog grainy cityscapes, and regularly attending Manhattan gallery openings featuring artists like Yayoi Kusama and James Turrell, which fuels her poetic explorations of technology and humanity.
  travel: Stefanie Ward favors quiet, contemplative travel, planning trips with ample time for sketching, having recently visited the serene fjords of Norway to photograph sunrise reflections, exploring
    the historic gardens of Kyoto for herb‑inspired recipes, and often day‑tripping to the Catskill Mountains for solitary hikes, while budgeting modestly to keep her retirement funds intact.
  culinary: Stefanie Ward enjoys simple Mediterranean cuisine, often crafting fresh basil pesto from herbs harvested from her indoor garden, preparing slow‑cooked ratatouille with tomatoes, zucchini, and
    thyme, and indulging in a cup of jasmine tea while experimenting with watercolor‑inspired plating, though she admits to over‑seasoning dishes with extra salt when distracted.
  core: Stefanie Ward is a 59‑year‑old imaginative admin‑turned‑arts‑enthusiast who blends analytical precision with poetic wonder, thrives in quiet solitude, volunteers to teach seniors tech, yet habitually
    battles deadline procrastination and a persistent love for late‑night watercolor marathons.
background:
  cultural: Stefanie is a white American raised in the suburban environment of Rockland County, New York, with family roots in the Northeastern United States. She grew up during the social changes of the
    1970s, which fostered a progressive outlook and a strong sense of community involvement. Her cultural identity reflects mainstream American values—celebrating holidays like Thanksgiving and Christmas—while
    also appreciating the multicultural richness of nearby New York City, often attending museum exhibits and cultural festivals. She values independence, lifelong learning, and the arts, and she integrates
    the Hudson Valley’s appreciation for nature and modest living into her daily routines.
attributes:
  skills: '[''Office administration'', ''Technical troubleshooting'', ''Database management (MS Access)'', ''Advanced Microsoft Excel'', ''Graphic design (Canva, basic Photoshop)'', ''Presentation design'',
