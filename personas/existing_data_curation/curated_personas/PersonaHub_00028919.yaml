persona_description: Miren Vizcaino, a climate scientist and physicist, is interested in the evolution of the Greenland ice sheet throughout the centuries, in response to anthropogenic climate change. She
  is studying the physics processes that play a role in melting surface ice, and integrating observations into various computer models to gain insight into which processes will gain the upper hand over
  the coming centuries. Her research is important for predicting the future of the ice sheet and its impact on global sea levels.
