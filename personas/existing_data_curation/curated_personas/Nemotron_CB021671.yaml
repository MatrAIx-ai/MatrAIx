  career_goals: Rosemarie aspires to advance from her current customer service representative role to a team lead or floor supervisor within the next two years, leveraging her organizational talent to boost
    team productivity and satisfaction scores. She plans to obtain a Certified Customer Service Professional (CCSP) credential and pursue part‑time studies in management or an MBA to prepare for a future
    Customer Service Manager position. In the long term, she envisions moving into operations or training management within the telecommunications or utilities sector, or launching her own consultancy helping
    small businesses improve customer experience, while maintaining a work‑life balance that supports her family.
