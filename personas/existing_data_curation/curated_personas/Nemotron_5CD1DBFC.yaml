  hobbies: '[''Woodworking'', ''Gardening'', ''Model Railroading'', ''Cycling'', ''Reading Historical Non-Fiction'', ''Cooking'', ''Volunteer STEM Workshops'']'
  career_goals: Although retired from full‑time employment, Nickolay aims to remain active in his field by mentoring high‑school and college students through local STEM clubs, leading volunteer workshops
    that demystify engineering basics, and completing a personal renewable‑energy retrofit for his home using solar panels and battery storage. He also hopes to compile his decades of experience into a
    memoir that blends technical anecdotes with life lessons, and to serve on the board of the Hudson community garden to promote sustainable practices.
