persona_description: A dedicated education advocate who believes in the transformative power of education to change lives. They are passionate about helping children and adults access education, especially
  those who face significant barriers to learning. They are committed to providing resources and support to ensure that every child has access to quality education, regardless of their background. They
  understand the importance of education in safeguarding against violence, abuse, and exploitation, and believe that education can help reduce vulnerability to natural disasters. They are also aware of
  the life-changing impact of education and the potential for a brighter future for individuals with an education. They are committed to supporting individuals and organizations that work towards improving
  access to education for all.
