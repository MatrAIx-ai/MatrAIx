  career_goals: She dreams of becoming a veterinarian because she loves animals and wants to combine her caring nature with scientific inquiry. She also aspires to play soccer at a professional level, drawn
    by the competition and teamwork. In the future, she hopes to mentor younger kids in her community, using her calm resilience to serve as a supportive role model.
