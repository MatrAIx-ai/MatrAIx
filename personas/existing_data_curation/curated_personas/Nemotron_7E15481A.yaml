personas:
  professional: Chantal Filmore is a budding youth soccer midfielder who blends structured tactical drills with the spontaneous flair of dance choreography, using their calm, competitive edge to lead the
    school's soccer team while dabbling in Scratch game design during free periods.
  sports: Chantal Filmore plays for the Riverdale Rovers youth soccer club, idolizes the Portland Thorns of the NWSL, passionately follows the Cityville Chargers in the NFL, and never misses a home game
    of the Riverdale Bears baseball team, channeling their competitive spirit into both practice drills and weekend watch parties.
  arts: Chantal Filmore choreographs school talent show routines to Beyonce's 'Love on Top' and Kirk Franklin's 'Stomp', draws inspiration from Misty Copeland's ballet artistry, curates a mini-collection
    of classic R&B posters featuring Marvin Gaye and Aretha Franklin, and weaves these influences into imaginative Scratch stories that blend music and movement.
  travel: Chantal Filmore treasures weekend trips to the nearby coastal boardwalk and an annual family adventure at Disney World, prefers a loosely plotted itinerary that leaves room for spontaneous rides
    and snack hunts, and dreams of one day strolling through the historic streets of London and climbing the towers of Neuschwanstein Castle in Germany.
  culinary: Chantal Filmore delights in cheesy mac and cheese, pepperoni pizza, and builds playful 'LEGO sushi' tabletop meals, often helps stir tomato sauce for spaghetti while carefully adding fresh basil
    and mozzarella for a favorite caprese salad, but habitually forgets to eat vegetables unless they're hidden in the sauce.
  core: Chantal Filmore is a calm, competitively spirited nine-year-old who blends disciplined soccer strategy with spontaneous dance creativity, tames disorganized habits with humor, and adores LEGO-inspired
    cooking experiments.
background:
  cultural: Chantal is a Black girl growing up in Powder Springs, a suburban community in Cobb County, Georgia. She is raised in a close‑knit African‑American family where church, extended‑family gatherings,
    and community events are central to daily life. Her family celebrates cultural traditions such as Juneteenth, attends a local Baptist church, and prepares soul‑food meals together. At her public elementary
    school, she experiences a diverse student body while also drawing strength from the supportive Black neighborhood community, participating in after‑school programs that emphasize academic achievement,
    sports, and cultural pride.
attributes:
  skills: '[''Elementary mathematics'', ''Reading comprehension'', ''Basic science concepts'', ''Teamwork and leadership'', ''Soccer (midfielder)'', ''LEGO building and spatial reasoning'', ''Scratch programming'']'
