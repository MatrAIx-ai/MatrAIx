personas:
  professional: Myriam Mccants, a veteran retail associate with decades of cash-handling experience, leverages their methodical precision on point-of-sale systems, meticulous inventory control, and calm
    conflict resolution to lead shift teams, while they use their outgoing nature to train new hires and foster a cooperative workplace.
  sports: Myriam Mccants, a devoted fan of the New Orleans Saints and LSU Tigers, joins the Hammond Community Walking Club for early-morning riverwalk jogs each spring, participates in a senior-center low-impact
    aerobics class during summer, and follows the NBA season to cheer on the New Orleans Pelicans, because they enjoy staying active without high-intensity pressure.
  arts: Myriam Mccants, whose heart beats to gospel legends like Kirk Franklin and Yolanda Adams, regularly performs with their local choir, devours mystery novels by Agatha Christie and Tana French, and
    attends community theater productions starring the Hammond Players, as they find artistic expression essential to their vibrant social life.
  travel: Myriam Mccants, who enjoys structured weekend getaways, frequently visits nearby New Orleans for its music festivals, has taken a road trip to Savannah to explore historic squares, and dreams
    of a leisurely Caribbean cruise while staying within their modest retirement budget, because they balance adventure with financial prudence.
  culinary: Myriam Mccants, a confident home cook, delights friends with soul-food classics like smoked collard greens, baked sweet potato casserole, and spicy gumbo seasoned with cayenne and smoked paprika,
    while they experiment with seasonal produce from their community garden to keep meals fresh and flavorful.
  core: Myriam Mccants blends disciplined organization with vibrant community spirit, balancing meticulous bookkeeping and budget-savvy habits with a love for gospel singing, gardening, and weekly bridge
    games, though they sometimes procrastinate on completing their associate degree.
background:
  cultural: Myriam is an African‑American woman whose family migrated north during the Great Migration, settling in Indiana's Lake County. Growing up during the civil‑rights era, she absorbed a strong sense
    of community, resilience, and pride in Black cultural traditions. The local black church has been a central pillar in her life, influencing her love for gospel music and community service. She maintains
    close ties with extended family and the broader Black community in Hammond, celebrating cultural holidays, sharing traditional recipes, and participating in neighborhood events that honor her heritage.
