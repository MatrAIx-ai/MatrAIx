  hobbies: '[''Gospel Choir'', ''Senior Center Dance Classes'', ''Community Gardening'', ''Soul‑Food Cooking'', ''Mystery Novel Reading'', ''Riverwalk Walking'', ''Quilting Circles'', ''Bridge Club'', ''Juneteenth
