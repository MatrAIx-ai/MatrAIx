  career_goals: Looking ahead, Myriam aims to transition into a shift‑lead or supervisory role where she can apply her organized approach to staff scheduling and performance coaching. She also plans to
    complete her associate degree, focusing on business administration, to deepen her managerial knowledge. In the longer term, she hopes to secure a stable retirement by optimizing her savings and possibly
    consulting part‑time for small retail businesses in the Hammond area. Community involvement remains important, so she envisions volunteering to mentor younger workers and supporting local senior‑center
    programs.
