personas:
  professional: Cassandra Raines is an aspiring teenage visual storyteller who sketches Texas sunsets with watercolor, crafts digital illustrations on an iPad, and weaves short narratives into graphic novel
    concepts, using their curious yet organized mindset to blend meticulous technique with spontaneous creativity.
  sports: Cassandra Raines enjoys casual skateboarding at a local Dallas skate park, supports the Dallas Mavericks and the Texas Rangers, and participates in a co‑ed youth volleyball league that offers
    gentle social interaction while keeping them active.
  arts: Cassandra Raines draws inspiration from the vivid palettes of Frida Kahlo, the narrative depth of Marjane Satrapi’s graphic novels, and the acoustic folk sounds of Sufjan Stevens, frequently attending
    Dallas Museum of Art exhibitions and neighborhood open‑mic nights to enrich their artistic identity.
  travel: Cassandra Raines prefers curated road trips to the rolling hills of Texas Hill Country and the art‑filled streets of Marfa, plans each outing with hand‑drawn itineraries, and they daydream about
    an upcoming student exchange in Kyoto to explore traditional ukiyo‑e woodblock techniques.
  culinary: Cassandra Raines delights in preparing simple Tex‑Mex meals like chicken enchiladas topped with fresh cilantro and lime, experiments with herb‑infused olive oil for watercolor‑inspired salads,
    and they often snack on matcha‑flavored granola while sketching sunsets.
  core: Cassandra Raines is a quietly curious teen who melds pastel sunsets on canvas with heartfelt stories, saves diligently for art supplies, navigates occasional acne flare‑ups, and they balance a love
    of low‑key skate sessions with an organized, harmonious approach to life.
background:
  cultural: Cassandra grew up in Carrollton, Texas, a suburban community within Denton County that blends traditional Texan values with the cultural diversity of the Dallas‑Fort Worth metroplex. Her family
    celebrates classic regional customs—such as community barbecues, Saturday football games, and participation in county fairs—while also encouraging exposure to broader artistic experiences, including
    visits to the Dallas Museum of Art and local indie music venues. The community's emphasis on hospitality, cooperation, and modesty aligns with her kind and considerate personality, and the area's vibrant
    youth art programs have nurtured her curiosity and openness to unconventional creative ideas. Her white ethnic background and middle‑class upbringing provide a familiar American cultural framework,
    which she balances with a growing appreciation for diverse artistic perspectives and collaborative community initiatives.
