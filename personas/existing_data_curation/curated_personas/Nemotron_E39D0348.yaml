    mixed‑media projects'']'
  career_goals: Cassandra aspires to attend a specialized arts high school in the Dallas area, where she can further develop a robust portfolio of both traditional and digital artwork. In the long term,
    she aims to study visual communications or illustration at the collegiate level and eventually work as a concept artist for video games or as a freelance illustrator creating socially conscious graphic
    novels. She also hopes to give back to her community by organizing youth art workshops and contributing murals that reflect local Texan heritage, blending her creative passions with a desire to foster
    harmony and artistic expression in small groups.
