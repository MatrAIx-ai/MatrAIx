persona_description: A researcher or historian who is interested in the history of the Canadian government, the United Church of Canada, and the Indian Residential Schools in Canada. This person is particularly
  interested in the context and significance of the documents and records held in the United Church General Council Archives in Toronto. They are also interested in the Truth and Reconciliation Commission
  and the University of Manitoba National Research Centre for Truth and Reconciliation. This person is looking for a comprehensive understanding of the Indian Residential Schools and the complex nature
  of their existence.
