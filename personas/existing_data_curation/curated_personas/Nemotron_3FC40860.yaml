  hobbies: '["Hiking in the Santa Cruz Mountains", "Yoga and meditation", "Cooking Mexican cuisine", "Salsa dancing", "Reading sci‑fi and mystery novels", "Arduino and maker projects", "Volunteering as
    a coding mentor for youth"]'
  career_goals: Aida aims to transition into a technical leadership role, such as Lead Engineer or Software Architect, within the next five years. She is driven to shape scalable product architectures while
    championing diversity and inclusion initiatives that mentor Latina engineers. To support this trajectory, she plans to pursue an advanced degree or leadership certification and publish articles on best
    practices in secure cloud development. Balancing ambition with well‑being, she seeks a supportive organization that values mental health and offers flexible work arrangements to manage her anxiety.
