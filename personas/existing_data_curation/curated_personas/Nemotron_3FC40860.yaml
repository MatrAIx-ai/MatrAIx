personas:
  professional: Aida Perez is a full‑stack software engineer in Silicon Valley, excelling in Java, Python, and React while leading Scrum ceremonies and using their methodical, organized approach to mentor
    teams, and they channel their community‑centric values into championing inclusive engineering practices.
  sports: Aida Perez hikes the Santa Cruz Mountains with the Trailblazers Hiking Club, follows the San Jose Sharks and Golden State Warriors, practices yoga three times a week at a community studio, and
    joins a weekend ultimate frisbee league whenever the weather permits, balancing a competitive drive with a structured fitness regimen.
  arts: Aida Perez spends evenings salsa dancing at a downtown studio, collects albums by Carlos Santana and Natalia Lafourcade, watches films directed by Guillermo del Toro, reads sci‑fi by William Gibson
    and mystery thrillers by Gillian Flynn, and draws creative inspiration from Frida Kahlo’s vibrant self‑portraits for personal projects.
  travel: Aida Perez prefers meticulously planned weekend trips to Lake Tahoe for winter skiing and to Mendocino’s cliffs for coastal hikes, yet dreams of an immersive cultural visit to Oaxaca during Día
    de los Muertos and a tech‑conference tour through Tokyo, balancing budget constraints with a desire for both relaxation and adventure.
  culinary: Aida Perez finds solace in cooking enchiladas rojas, mole poblano, and tamales al vapor, expertly seasoning with ancho chilies, epazote, and a hint of cinnamon, experiments with Arduino‑controlled
    sous‑vide setups for precision, and regularly hosts family gatherings where homemade salsa and fresh guacamole take center stage.
  core: Aida Perez is a methodical tech leader who balances fierce ambition with a nurturing community spirit, yet battles intense anxiety that fuels both creative bursts and occasional impulsive spending.
background:
  cultural: Aida was raised in a Mexican‑immigrant family in California, growing up bilingual and immersed in traditions such as Día de los Muertos, family gatherings centered around homemade food, and
    a strong sense of community. Her cultural heritage instills values of perseverance, family responsibility, and pride, which influence her professional drive and desire to serve as a role model for other
    Latina technologists. She actively participates in local Latinx tech meetups and community events, bridging her cultural roots with her career in Silicon Valley.
attributes:
  skills: '["Full-stack development (Java, Python, JavaScript)", "React", "Node.js", "AWS cloud services", "CI/CD pipeline design", "Test‑driven development", "Agile Scrum methodology", "Technical documentation",
