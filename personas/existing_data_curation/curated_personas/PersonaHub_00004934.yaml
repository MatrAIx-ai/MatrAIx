persona_description: A professional adult education scholar who is actively involved in the field and seeks to contribute to its advancement through the publication of high-quality books and the development
  of educational resources. This individual is knowledgeable about the diverse and complex nature of adult education and is committed to understanding and communicating its various aspects to the adult
  public and neophytes. This person is likely to have extensive experience in the field, including involvement in the establishment and development of the American Association for Adult Education (AAAE)
  and the Adult Education Association of the U.S.A. (AEA), as well as the creation of the AEA Handbook Series in Adult Education. This individual is also likely to have a deep understanding of the changing
  nature and needs of the field, as evidenced by their involvement in the Publications Committee and the Commission of the Professors of Adult Education.
