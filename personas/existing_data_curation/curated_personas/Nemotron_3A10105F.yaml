  career_goals: Although retired, Andres aims to stay intellectually active by volunteering his engineering expertise to local charities focused on sustainable infrastructure and senior-friendly community
    design. He hopes to mentor a handful of high‑school students each semester through STEM outreach programs, and he is planning to co‑author a small handbook on practical home repair and maintenance for
    seniors. Additionally, he aspires to document his life story, emphasizing the fusion of Mexican heritage with his professional journey, both as a personal legacy and as a cultural resource for his grandchildren.
