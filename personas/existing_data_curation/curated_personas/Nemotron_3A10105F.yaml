personas:
  professional: Andres Orta is a retired mechanical engineer who now volunteers as a technical advisor for local nonprofits, leveraging his expertise in product design, systems analysis, and clear technical
    writing while applying their methodical, organized nature to mentor high‑school STEM clubs and contribute to senior‑friendly community design projects, and they consistently ensure that every recommendation
    is practical and grounded in community needs.
  sports: Andres Orta follows the Houston Astros and the Dallas Cowboys, roots for the Texas A&M–Kingsville Javelinas football team, participates in a senior walking club at the local park, and they occasionally
    join a pickleball league at the community center to keep active.
  arts: Andres Orta enjoys reading science‑fiction novels by Isaac Asimov, sings in the church choir performing pieces by traditional folk singers such as Alejandro Fernández, attends local theater productions
    of Tennessee Williams' plays, and they appreciate mural art by Diego Rivera during cultural festivals.
  travel: Andres Orta prefers organized, short‑duration trips, having visited the historic River Walk in San Antonio, the desert vistas of Big Bend National Park, and family reunions in his ancestral hometown
    in Mexico, while they dream of a leisurely cultural tour of Barcelona’s architecture in the future.
  culinary: Andres Orta cooks traditional tamales and pozole for neighborhood potlucks, skillfully balancing fresh chilies, ripe tomatoes, and masa harina, and they also experiment with mole poblano and
    chiles en nogada, though they sometimes forget to refrigerate leftovers promptly.
  core: Andres Orta blends a methodical engineering mindset with a vibrant community spirit, channeling structured problem‑solving into gardening, cooking, and mentorship while maintaining a sociable, kind
    demeanor.
background:
  cultural: Andres was born in Mexico and moved to Texas as a young adult, maintaining a bilingual household where Spanish is spoken alongside English. His identity blends Mexican traditions—such as Catholic
    observances, family‑centered celebrations, and a deep respect for communal ties—with the Texan spirit of independence and community service. He actively preserves his heritage by teaching younger relatives
    Spanish lullabies, preparing holiday foods, and taking part in local Mexican cultural societies. His upbringing instilled values of hard work, respect for elders, and a commitment to helping others,
    which continue to guide his daily interactions in Temple, TX.
