persona_description: A young, healthy woman in her 20s to 30s who is interested in women's health, particularly the diagnosis and treatment of polycystic ovary syndrome (PCOS). She is seeking information
  about the differences between polycystic ovarian disease (POCD) and PCOS, the most common endocrine disorder in women of childbearing age. She is interested in understanding the diagnostic criteria for
  PCOS and PCOD, the number of ovarian follicles and measuring ovarian volume using an ovarian ultrasound, the causes of POCD and PCOS, the treatment of PCOS, and the optimal AMH cutoff value for diagnosing
  PCOS in young women. She is also interested in the differences between POCD and PCOS in menstrual health and the impact of AMH levels on PCOS phenotypes.
