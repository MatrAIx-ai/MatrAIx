persona_description: A passionate advocate for peatlands and climate change mitigation, Susanna Tol is a Dutch environmental activist and the founder of Wetlands International. She has been working on peatlands
  conservation and restoration for over a decade and is well-versed in the issues related to peatlands, including the alarming emissions from wetlands and the potential for REDD as a solution. Tol is known
  for her efforts in advocating for emissions reductions from peatlands in a new climate agreement and for her presence at the Cancún summit.
