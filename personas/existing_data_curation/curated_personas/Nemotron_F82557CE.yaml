personas:
  professional: Calvin Pendelton, a 91-year-old community historian and volunteer guide at the National Museum of African American History and Culture, uses their calm, methodical public-speaking and event-planning
    skills to organize intergenerational storytelling programs while meticulously managing modest budgets for a scholarship fund and senior-center activities, and they always ensure each event runs on schedule.
  sports: Calvin Pendelton follows the Washington Wizards, the Washington Capitals, and DC United, enjoys attending senior-friendly games at Capital One Arena, and they stay active through daily walks in
    Rock Creek Park and by participating in the Rock Creek Walking Club’s seasonal nature hikes.
  arts: Calvin Pendelton is an avid jazz and blues enthusiast who regularly attends live performances on U Street, delighting in the sounds of Miles Davis, John Coltrane, B.B. King, and contemporary saxophonist
    Kamasi Washington, and they often capture the ambiance with their analog 35 mm camera.
  travel: Calvin Pendelton, who favors meticulously planned trips, has visited historic sites such as Gettysburg, the French Quarter in New Orleans, and the Montreal Jazz Festival, and they dream of touring
    the civil rights landmarks of Birmingham while balancing limited mobility and a modest travel budget.
  culinary: Calvin Pendelton enjoys cooking classic Southern comfort food - fried chicken, collard greens, cornbread, and peach cobbler - using garden-fresh okra and smoked pork, and they take pride in
    sharing these dishes at family gatherings, though they sometimes forget to refrigerate leftovers promptly.
  core: Calvin Pendelton is a calm, methodical 91-year-old who blends community stewardship, a love for jazz, disciplined budgeting, and a penchant for over-planning into a life of intergenerational storytelling
    and Southern cooking, all while keeping a steady walk in the park and a camera at the ready, and they radiate quiet confidence in every interaction.
background:
  cultural: Calvin was born in 1934 in a small town in the Deep South and migrated to Washington, DC with his family during the Great Migration of the 1940s. He grew up in a tight‑knit African‑American
    community on the Southwest quadrant, where the church, family ties, and the vibrant cultural scene of U Street shaped his identity. His formative years were marked by segregation, the civil‑rights movement,
    and a strong tradition of community activism. These experiences, combined with the rich history of the District’s black neighborhoods, underpin his cultural perspective and inform his ongoing commitment
    to preserving African‑American heritage.
