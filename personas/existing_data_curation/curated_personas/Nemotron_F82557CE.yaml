  career_goals: Even at 91, Calvin remains driven by a desire to give back. He aims to complete a memoir documenting his experiences during the civil‑rights era and the evolution of Washington, DC’s African‑American
    neighborhoods. He hopes to establish a small scholarship fund for local high‑school students interested in public service. He also plans to continue volunteering as a mentor in senior‑center programs
    and to organize intergenerational storytelling events that preserve cultural memory. Maintaining his health and mental sharpness through regular walks and learning new technology also features among
    his personal goals.
