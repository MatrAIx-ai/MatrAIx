personas:
  professional: Sylvia Ward, a retired home‑management professional turned senior‑program coordinator, leverages their love of routine, meticulous budgeting, and caring nature to design predictable church
    events and volunteer schedules that keep the community running smoothly while quietly battling a tendency to worry over every detail.
  sports: Sylvia Ward is a regular participant in the Golden Years Walkers, a senior walking club that meets three times a week for gentle strolls along the Riverbend Trail, and they passionately cheer
    for the nearby Midland Mariners baseball team during the summer season.
  arts: Sylvia Ward, a devoted member of her church choir, finds joy singing hymns inspired by Mahalia Jackson and Aretha Franklin, while their evenings are filled with reading timeless novels by Harper
    Lee and William Faulkner and drawing quilting design ideas from the textile works of Faith Ringgold.
  travel: Sylvia Ward prefers carefully planned, short road trips, such as annual visits to the historic town of Savannah, leisurely weekend stays at their daughter’s seaside cottage in Myrtle Beach, and
    a cherished pilgrimage to Washington, D.C.’s National Cathedral, always traveling with a printed itinerary and a travel journal to keep their schedule orderly.
  culinary: Sylvia Ward, an accomplished home cook, delights in preparing classic comfort dishes such as buttermilk biscuits, shrimp and grits, and pecan pie, meticulously using fresh garden produce like
    heirloom tomatoes, sweet potatoes, and okra, while their methodical approach to canning preserves these flavors for months, and they relish sharing these meals with family and church gatherings.
  core: Sylvia Ward, a 73‑year‑old guardian of tradition, blends meticulous organization with a nurturing spirit, yet quietly battles a habit of over‑worrying about every detail, from garden yields to church
    event budgets.
background:
  cultural: Sylvia is a lifelong resident of the Upstate South, rooted in a white, Southern-American cultural tradition that values family, faith, and community. Raised in a rural area of South Carolina,
    she grew up with Protestant (likely Baptist) teachings, Southern hospitality, and an emphasis on self-reliance and practical skills. Her upbringing instilled a respect for tradition, a preference for
    routine, and a strong sense of duty toward her family and neighbors. While she embraces modern conveniences, she maintains many customs of the mid-20th-century South, such as home-cooked meals, seasonal
    canning, and participation in church-centered social life.
attributes:
  skills: '["traditional Southern cooking", "preserving and canning", "vegetable gardening", "sewing and quilting", "home budgeting", "basic first aid", "childcare and elder care", "church volunteer coordination",
