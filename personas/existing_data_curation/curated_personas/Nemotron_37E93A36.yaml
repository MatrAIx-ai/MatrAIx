  hobbies: '[''Urban sketching'', ''Street photography'', ''Playing basketball with friends'', ''Skateboarding'', ''Listening to alternative and hip‑hop music'', ''Exploring local art galleries'', ''Experimenting
    with 3D printing designs'', ''Customizing mechanical keyboards'', ''Watching anime'', ''Gaming (multiplayer shooters)'']'
  career_goals: Dong aims to become a certified CNC programmer within the next three years, earning credentials such as the NIMS CNC Level I certification. He dreams of eventually opening a small boutique
    shop that blends precision machining with artistic metalwork, creating custom sculptures and functional art for local businesses and collectors. He is also interested in pursuing an associate degree
    in industrial technology to broaden his knowledge and increase his earning potential. Competitive by nature, he hopes to participate in regional machining competitions to benchmark his skills and gain
    recognition. He also wants to develop coping strategies for his anxiety, seeking a stable work environment that offers both creative freedom and supportive mentorship.
