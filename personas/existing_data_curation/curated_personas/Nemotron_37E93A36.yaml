personas:
  professional: A curious machinist turned aspiring CNC programmer, Dong Idos blends multi‑axis CNC routing, CAD modeling, and hands‑on welding to craft precision‑driven yet avant‑garde metal art, thriving
    in a flexible shop environment where their competitive edge pushes them into regional machining contests, even as their laid‑back approach sometimes leaves tool changes to chance.
  sports: A street‑savvy athlete, Dong Idos spends weekends shooting hoops at the community court while cheering for the hometown NBA team, the Phoenix Suns, and rides with the downtown skate crew 'Urban
    Grind' for adrenaline‑fueled sessions whenever the weather permits.
  arts: An urban sketcher and street‑art photographer, Dong Idos devotes weekends to capturing murals inspired by Banksy and KAWS, curates playlists that blend Tame Impala's psychedelic rock with Kendrick
    Lamar's sharp verses, and immerses in anime classics like Spirited Away, while tinkering on mechanical keyboards influenced by the aesthetic of the mecha genre.
  travel: A spontaneous wanderer with a modest stipend, Dong Idos favors short trips to nearby creative hubs like Portland’s art districts and quarterly pilgrimages to Tokyo’s Akihabara for anime and tech
    immersion, while dreaming of a future road trip across Europe’s metal‑craft capitals of Munich and Milan to scout design influences for their boutique shop.
  culinary: An adventurous palate drives Dong Idos toward bold umami dishes such as miso‑infused ramen, spicy Korean bibimbap, and peppery tofu stir‑fry, often assembled with a DIY 3D‑printed noodle holder
    and a love for ingredients like soy sauce, gochujang, and roasted seaweed.
  core: Dong Idos is a creatively restless 20‑year‑old CNC enthusiast who juggles artistic metalwork, competitive gaming, and bouts of anxiety, thriving on flexible chaos while occasional disorganization
    and self‑doubt threaten the execution of their grand plans.
background:
  cultural: Dong is a second‑generation East Asian American, growing up in a bilingual household where Mandarin (or another East Asian language) was spoken alongside English. He celebrates traditional holidays
    such as Lunar New Year and the Mid‑Autumn Festival, often sharing these customs with his friends in the diverse Bay Area. His family values diligence and respect for craftsmanship, which dovetails with
    his precision‑focused work as a machinist. At the same time, the vibrant multicultural environment of San Leandro and the broader Bay Area has exposed him to a blend of Asian and Western artistic influences,
    fostering his appreciation for contemporary art, street culture, and creative experimentation.
attributes:
