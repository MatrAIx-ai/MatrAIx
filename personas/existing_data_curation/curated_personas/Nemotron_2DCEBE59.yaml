  career_goals: Fredric aims to advance to a senior network architect role where he can lead strategic initiatives that integrate cutting‑edge automation and sustainability into enterprise networks. He
    plans to earn certifications such as CCIE, AWS Certified Advanced Networking, and a certification in AI‑driven network management. Over the next five years, he hopes to mentor junior engineers, spearhead
    a multidisciplinary team focused on resilient, eco‑friendly network design, and eventually transition into a chief networking officer position or launch his own consultancy that emphasizes both technical
    excellence and humane workplace culture.
