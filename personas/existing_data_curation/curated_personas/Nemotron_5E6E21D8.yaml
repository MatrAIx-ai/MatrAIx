personas:
  professional: Maxie Eltantawy, a four‑year‑old architect of imaginary fortresses, channels boundless curiosity into constructing elaborate cardboard castles and crayon‑drawn blueprints, but frequently
    abandons structured plans for spontaneous redesigns.
  sports: Maxie Eltantawy, a budding soccer enthusiast, kicks a mini ball at the local kindergarten soccer club, cheers for the Chicago Cubs during family game nights, and revels in the fast‑paced excitement
    of watching the Miami Heat on television.
  arts: Maxie Eltantawy, a pint‑size creative, fills sketchbooks with whimsical creatures inspired by Dr. Seuss, sings loudly to The Wiggles and Disney soundtracks, and stages dramatic reenactments of Moana
    scenes for delighted family audiences.
  travel: Maxie Eltantawy, an eager explorer, prefers family road trips to sandy Florida beaches and magical days at Disneyland, dreams of seeing the Eiffel Tower someday, and thrives on hands‑on discovery
    rather than rigid itineraries.
  culinary: Maxie Eltantawy, a developing foodie, adores chicken nuggets, mac and cheese, and strawberry‑banana smoothies, can skillfully stir batter in a play kitchen, yet often refuses broccoli, favoring
    crunchy carrot sticks.
  core: Maxie Eltantawy, a four‑year‑old whirlwind of imagination, social energy, and occasional worry, transforms everyday moments into vivid adventures while battling a habit of losing socks and forgetting
    bedtime.
background:
  cultural: Maxie lives in Denver, Colorado, a city that blends mountain‑outdoor culture with a vibrant urban arts scene. His family’s white American background includes participation in typical celebrations
    such as holiday festivals, community parades, and local events like the Denver County Fair. Exposure to these diverse cultural activities supports his curiosity, creativity, and social engagement.
