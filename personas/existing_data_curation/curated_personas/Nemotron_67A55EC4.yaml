  career_goals: Rickey aims to advance into senior leadership, targeting a regional sales manager position within the next two years and eventually a director of sales role overseeing multiple product lines.
    He plans to deepen his expertise in digital sales enablement and wants to earn an MBA to complement his business degree. Long‑term, he envisions launching his own consulting firm that blends data‑driven
    sales strategy with creative branding, leveraging his appreciation for art and unconventional thinking to help B2B companies differentiate in crowded markets.
