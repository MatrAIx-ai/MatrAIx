  career_goals: Shivram aspires to move into a store management position where he can shape the store’s visual identity and foster a supportive environment for staff. He hopes to integrate his passion for
    art by curating themed product displays and occasional in‑store art events. Additionally, he dreams of launching a modest side business selling handcrafted decorative items inspired by South Asian motifs,
    and mentoring younger employees to develop both sales and creative skills.
