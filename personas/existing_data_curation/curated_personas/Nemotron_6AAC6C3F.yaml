personas:
  professional: Joseph Mendiola, a hands‑on mechanical engineer at a regional manufacturing firm, leverages SolidWorks, CNC expertise, and Lean principles to design robust components while using his natural
    preference for structure to keep projects on track—yet his relaxed attitude toward deadlines sometimes leads to last‑minute revisions.
  sports: Joseph Mendiola hits the community center three evenings a week for pickup basketball, roots for the Oklahoma City Thunder and follows the Dallas Cowboys during the football season, and incorporates
    weekend hikes in the Wichita Mountains to maintain stamina and clear his mind.
  arts: Joseph Mendiola unwinds with regional Mexican music from groups like Los Tigres del Norte and also streams indie rock bands such as The Strokes, attending occasional live gigs at downtown venues
    and volunteering to curate cultural festival performances to showcase local talent.
  travel: Joseph Mendiola prefers spontaneous road trips that blend adventure with budget‑friendly stops, having explored Santa Fe’s art scene, hiked the Ozark Trail, and dreaming of a culinary pilgrimage
    to Oaxaca while balancing his part‑time studies and weekend projects.
  culinary: Joseph Mendiola enjoys cooking traditional Mexican dishes like chiles en nogada and carnitas tacos, experimenting with fusion recipes such as coconut‑lime shrimp tacos, and values fresh cilantro,
    dried ancho chilies, and locally sourced corn masa in his kitchen.
  core: Joseph Mendiola is a mechanically minded tinkerer who balances structured engineering rigor with a laid‑back, sometimes disorganized lifestyle, fueled by a love for classic cars, basketball, and
    spicy home‑cooked meals.
background:
  cultural: Joseph was raised in a Mexican‑American household in Weatherford, Oklahoma, where Spanish was spoken alongside English, giving him bilingual fluency. His family maintains strong ties to Mexican
    traditions, celebrating holidays such as Día de los Muertos and Cinco de Mayo with home‑cooked meals, music, and community gatherings. At the same time, he embraces the broader Oklahoma culture, participating
    in local sports, outdoor recreation, and the close‑knit community spirit of Custer County. This blend of Mexican heritage and Midwestern values shapes his worldview, fostering a respect for family,
    a love of cultural expression, and a practical, down‑to‑earth approach to both work and leisure.
attributes:
  skills: '[''SolidWorks CAD'', ''AutoCAD drafting'', ''CNC programming and operation'', ''Hydraulic/pneumatic system troubleshooting'', ''Blueprint and schematic interpretation'', ''Material stress analysis
    basics'', ''Lean manufacturing principles'', ''Diagnostic instrumentation (multimeter, vibration analyzer)'', ''Team collaboration and communication'', ''Project scheduling (MS Project)'']'
  hobbies: '[''Classic car and motorcycle restoration'', ''Woodworking'', ''Hiking in the Wichita Mountains'', ''Cooking Mexican cuisine and fusion dishes'', ''Basketball'', ''Listening to regional Mexican
    music'', ''Simulation video games'', ''Volunteering at community cultural festivals'']'
  career_goals: Joseph aims to supplement his high‑school background with a part‑time bachelor's degree in mechanical engineering, paving the way to earn his Professional Engineer (PE) license within the
    next five years. He seeks to advance to a senior engineer or project lead role at a regional manufacturing or oil‑field services firm, while also obtaining a Six Sigma Green Belt to deepen his process‑improvement
    expertise. Long‑term, he envisions founding a small mechanical design consultancy that serves local producers, balancing professional growth with ample time for his personal interests and community
    involvement.
