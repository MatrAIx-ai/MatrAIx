personas:
  professional: Anthony Paz, a retired civil engineer turned community garden coordinator, blends his analytical mindset and methodical project‑management skills with a compassionate, socially‑engaged spirit
    to design low‑maintenance planting systems and mentor budding engineers, all while juggling widespread family gatherings.
  sports: Anthony Paz stays active through daily park walks, weekly shuffleboard matches at the senior center, membership in the local Golden Age Walking Club, and enthusiastic support of the nearby minor
    league baseball team, the River City Rangers, occasionally joining cultural dance workshops that double as light cardio sessions.
  arts: Anthony Paz nourishes a love of the arts by listening to classic crooner Frank Sinatra, flipping through Scientific American for pop‑science inspiration, attending church choir rehearsals, admiring
    the lively performances of the local folkloric dance troupe, and visiting the city museum to study the vibrant still‑lifes of Georgia O'Keeffe.
  travel: Anthony Paz prefers short road trips to historic towns like Santa Fe and natural wonders such as the Grand Canyon, enjoys occasional weekend cruises to the Caribbean where they can relax on deck,
    yet hesitates to embark on longer voyages due to concerns about mobility and health.
  culinary: Anthony Paz delights in crafting tamales, slow‑cooked pork carnitas, and fresh salsa verde using home‑grown cilantro, ripe heirloom tomatoes, and fire‑roasted chilies, often over‑seasoning in
    moments of excitement while sharing the steaming plates with grandchildren and neighbors.
  core: Anthony Paz, an 88‑year‑old retired engineer, fuses scientific curiosity, meticulous planning, and heartfelt community service, all while wrestling with occasional bouts of anxiety that drive a
    relentless pursuit of a lasting, compassionate legacy.
background:
  cultural: Anthony was born in Michoacán, Mexico, and moved to the United States with his family when he was ten. He grew up in a bilingual household that honored Mexican traditions, Catholic values, and
    strong family ties. Throughout his life he has celebrated Día de los Muertos, Las Posadas, and Mexican Independence Day, often preparing traditional foods and sharing stories with his community in Huntsville.
    Although he has adapted to life in Alabama, he maintains fluency in Spanish, regularly attends the local Hispanic Heritage Council meetings, and supports Mexican cultural events in the region. His heritage
    influences his cooking, his emphasis on hospitality, and his commitment to intergenerational solidarity.
