persona_description: A healthcare professional with expertise in water safety and management, particularly in the context of healthcare facilities. This individual is responsible for understanding and controlling
  the risks associated with Legionnaires' disease in water systems used in hospitals, care homes, and other healthcare facilities. They possess a deep understanding of water systems, their complexities,
  and the potential for Legionella bacteria to colonize them. This persona is skilled in conducting in-depth assessments of water systems, identifying areas of risk, and implementing effective control measures
  to prevent outbreaks of Legionnaires' disease. They are also knowledgeable about regular water testing and legionella control programs.
