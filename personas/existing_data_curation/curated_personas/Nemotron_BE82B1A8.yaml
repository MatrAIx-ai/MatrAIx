  career_goals: Approaching retirement, Juancarlos aims to transition into a supervisory role within his cleaning team, where he can share his knowledge and ensure high standards of safety and quality.
    He hopes to obtain an official certification in occupational safety to solidify his expertise. At the same time, he envisions starting a modest home‑based vehicle detailing service for family and friends,
    allowing him to work reduced hours while maintaining a steady income for his grandchildren’s education. Ultimately, his ambition is to secure a comfortable retirement that honors his family obligations,
    preserves his health, and keeps him connected to the community he values.
