personas:
  professional: Lorena Rocha is a hands‑on automotive technician who excels at diagnosing complex engine and electrical issues—including hybrid and electric powertrains—while their methodical yet adaptable
    approach and natural concern for team harmony make them a reliable mentor in a bustling Bronx garage.
  sports: Lorena Rocha enjoys casual basketball at their local Bronx Parks Basketball League and weekly runs with the Bronx Parks Running Club, while cheering for the New York Knicks, New York Yankees,
    and New York City FC as their seasonal sports anchors.
  arts: Lorena Rocha relaxes to the rhythms of bachata and merengue, frequently playing tracks by Romeo Santos, Aventura, and Juan Luis Guerra, and occasionally attends off‑Broadway shows starring Lin‑Manuel
    Miranda, letting music and theater fuel their creative spark.
  travel: Lorena Rocha favors spontaneous weekend getaways to nearby spots like the Jersey Shore and Philadelphia, yet dreams of a future road‑trip through Detroit’s automotive museums and a relaxing escape
    to Puerto Rico’s beaches, balancing tight student‑budget constraints with a love for hands‑on exploration.
  culinary: Lorena Rocha whips up comforting sancocho and arroz con pollo—infused with sofrito, plantains, and cilantro—while experimenting with occasional ramen bowls, using cooking as both a culinary
    hobby and a mindful antidote to workshop stress.
  core: Lorena Rocha is a worry‑prone, car‑obsessed 20‑year‑old who balances revving engines with yoga, sancocho simmering on the stove, and mentoring Bronx teens, all while juggling a tight budget and
    a habit of double‑checking every repair.
background:
  cultural: Lorena grew up in a vibrant Dominican household in the Bronx, speaking both Spanish and English and celebrating traditions like Día de la Independencia and family gatherings centered around
    music and food. Her heritage instills a strong sense of community, respect for hard work, and a collaborative spirit that she carries into her professional life. The mix of Caribbean rhythms and the
    urban energy of New York has shaped her eclectic tastes—from bachata dancing to the fast‑paced rhythm of city life. She values family bonds, often helping relatives with car repairs, and she aims to
    give back by empowering other young Dominicans in her neighborhood through mentorship and skill sharing.
attributes:
  skills: '["Automotive Diagnostic Troubleshooting", "Engine Rebuilding and Overhaul", "Transmission Repair", "Hybrid/Electric Vehicle Systems Maintenance", "Brake and Suspension Service", "Welding and
