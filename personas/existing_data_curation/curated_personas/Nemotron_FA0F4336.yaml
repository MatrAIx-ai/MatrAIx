  hobbies: '["Attending Car Meets and Shows", "Cooking Dominican Cuisine", "Bachata and Merengue Dancing", "Yoga and Mindfulness Practice", "Hiking and Exploring Bronx Parks", "Racing Video Games", "Volunteer
    Car Maintenance Workshops for Youth", "Listening to Automotive Podcasts"]'
  career_goals: Lorena aims to earn ASE Master Technician certification and specialize in electric‑vehicle maintenance within the next three years. She envisions becoming a shop manager who mentors apprentices,
    especially from the Dominican community in the Bronx, and eventually opening her own small, community‑focused garage offering affordable, high‑quality service and technical training for youth.
