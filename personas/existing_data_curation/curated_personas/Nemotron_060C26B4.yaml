  hobbies: '["Book club", "Volunteer work at community shelter", "Organizing local festival", "Gardening", "Cooking classes", "Line dancing", "Hiking (Missouri River Trail)", "Hosting dinner parties", "Participating
    in community theater"]'
  career_goals: Emily aims to transition into a sales leadership role within the next three years, aspiring to become a regional sales manager where she can mentor junior reps and design training programs
    that emphasize compassionate client care. She also hopes to launch a community-focused initiative that partners her company’s services with local non-profits, thereby leveraging her sales network to
    support charitable causes. Long-term, she envisions starting her own consultancy that helps small businesses improve customer service and build sustainable client relationships.
