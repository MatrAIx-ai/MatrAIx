personas:
  professional: Jun Cruz, a budding junior scientist in preschool, delights in sorting colored beads by size and shape, applying their habit of balancing curiosity with practical rules to lead small-group
    discovery projects.
  sports: Jun Cruz, a small-group enthusiast on the Mini Aces Soccer Club, prefers the rhythm of kicking a ball with two teammates, idolizes the Chicago Cubs for their disciplined play while practicing
    short bursts of sprinting at the neighborhood playground.
  arts: Jun Cruz, who spends afternoons drawing vibrant scenes of dragons inspired by the animated film Spirited Away and humming the tunes of child-friendly singer Raffi, channels their balance of imagination
    and structure into weekly coloring book sessions.
  travel: Jun Cruz, whose travel style is a parent-guided day trip to kid-friendly spots like the city zoo and a yearning for a family vacation to Disneyland, craves short, well-structured outings that
    blend new sights with familiar routines.
  culinary: Jun Cruz, who proudly declares mac and cheese with hidden peas as their favorite dinner and insists on a sprinkle of cinnamon on toast, enjoys the tactile fun of stirring pancake batter and
    occasionally sneaks an extra cookie when no one is watching, reflecting their blend of practical taste preferences and spontaneous curiosity.
  core: Jun Cruz, a curious yet practical four-year-old, balances a love of solitary play with occasional assertive bursts, approaches new experiences with measured enthusiasm, and navigates everyday routines
    with a charming mix of organization and spontaneity.
background:
  cultural: Jun lives in a lively Dominican community in Brooklyn, where Spanish and English are spoken daily at home. Family gatherings feature traditional dishes like mangú, fried plantains, and sancocho,
    and the rhythms of merengue and bachata fill the house. He participates in neighborhood celebrations such as the Dominican Independence Day parade and hears stories of his grandparents' island heritage,
    which foster a strong sense of cultural identity alongside his American upbringing.
