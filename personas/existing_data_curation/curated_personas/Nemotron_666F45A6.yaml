personas:
  professional: Jessica Young, a 33‑year‑old HVAC mechanic, blends meticulous troubleshooting of refrigeration cycles with a safety‑first mindset and a curiosity for emerging energy‑efficiency technologies,
    while they steadily step into a lead‑technician role that mentors apprentices and champions underrepresented talent.
  sports: Jessica Young stays fit by jogging through nearby pine forests twice weekly, participates in a pickup basketball league at the Orangeburg community center, and avidly follows the Columbia Fireflies,
    the South Carolina Gamecocks, and the Atlanta Falcons during baseball, football, and NFL seasons.
  arts: Jessica Young finds solace in gospel choirs at their neighborhood church, regularly streams Kirk Franklin and H.E.R., and attends intimate R&B shows at Charleston's Music Hall, letting soulful melodies
    balance the technical demands of their trade.
  travel: Jessica Young enjoys weekend road trips to historic Southern cities like Charleston, Savannah, and New Orleans, dreams of a solo summer retreat in Asheville’s Blue Ridge Mountains, and carefully
    budgets travel to keep it a stress‑relief outlet rather than a financial burden.
  culinary: Jessica Young’s kitchen revolves around collard greens simmered with smoked ham hocks, perfectly fried chicken seasoned with garlic powder and cayenne, sweet potato pie spiced with nutmeg, and
    fresh herb‑infused sauces made from tomatoes, basil, and cilantro harvested from their backyard garden.
  core: Jessica Young channels restless curiosity into practical HVAC expertise, mitigates daily worries with journaling and garden strolls, mentors aspiring tradespeople, and never skips a Sunday gospel
    service or a slice of sweet potato pie.
background:
  cultural: Jessica grew up in a close‑knit African‑American community in the Lowcountry of South Carolina, where church, family gatherings, and shared meals are central to daily life. Her upbringing was
    steeped in the oral traditions of storytelling, the rich heritage of Southern soul‑food, and the resilience of Black communities navigating social and economic challenges. This background instilled
    in her a strong sense of communal responsibility, pride in her cultural identity, and a desire to see more Black women thrive in skilled‑trade professions.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration repair and maintenance'', ''Refrigerant recovery and charging (EPA Section 608 certified)'', ''Blueprint and schematic interpretation'', ''Electrical
    wiring and safety compliance'', ''Diagnostics using multimeters and manifold gauges'', ''Energy‑efficiency upgrades and smart thermostat integration'', ''Customer communication and service documentation'',
    ''Time management and project scheduling'']'
  hobbies: '[''Soul‑food cooking'', ''Gospel and R&B music appreciation'', ''Church choir participation'', ''Journaling for stress relief'', ''Nature walks and hiking'', ''Home gardening (herbs and vegetables)'',
    ''Volunteering to teach home‑maintenance basics'']'
  career_goals: Jessica aims to obtain full EPA certification and become a master HVAC technician within the next two years. She aspires to take on a lead technician role, mentoring apprentices—particularly
    women and people of color—while championing workplace safety and sustainable practices. Long‑term, she dreams of launching her own small HVAC service business in Orangeburg, offering community‑focused
    services and training programs that empower underrepresented youth to enter skilled trades.
