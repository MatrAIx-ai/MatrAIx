  hobbies: '[''Reading mystery and historical fiction'', ''Knitting and crocheting'', ''Gardening'', ''Birdwatching'', ''Listening to true-crime podcasts'', ''Home yoga'', ''Journaling'', ''Baking'', ''Nature
    walks'', ''Volunteering at the local food pantry'']'
  career_goals: Vivi aims to advance into a supervisory role, such as assistant manager or store manager, where she can shape store culture around empathy and operational efficiency. She plans to complete
    a bachelor's degree in business administration on a part‑time basis to deepen her managerial knowledge. Long‑term, she envisions opening a small boutique that emphasizes locally sourced products and
    offers a calm, quiet shopping experience for the community. Parallel to her professional growth, she hopes to develop a volunteer mentorship program for younger retail employees in Carver County, leveraging
    her compassionate nature to support others in their career development.
