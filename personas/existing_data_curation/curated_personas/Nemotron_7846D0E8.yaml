personas:
  professional: Kyong To leverages a strong quantitative modeling skill set and a design‑thinking mindset to craft data‑driven optimization solutions, while their relaxed approach to deadlines fuels a flexible
    leadership style as they mentor junior analysts and push for sustainable AI‑enhanced supply‑chain strategies.
  sports: Kyong To spends weekends hiking the Santa Monica Mountains with the local Trailblazers Hiking Club, follows the Los Angeles Lakers and LA Galaxy for seasonal excitement, and unwinds with regular
    Vinyasa yoga classes at a downtown studio.
  arts: Kyong To frequents contemporary art galleries such as LACMA and MOCA, creates digital collages that fuse traditional Korean motifs with the glitch aesthetics of Refik Anadol, and draws inspiration
    from artists like Do Ho Suh and musicians such as Sufjan Stevens when curating their personal creative space.
  travel: Kyong To prefers off‑the‑beaten‑path travel, planning impromptu trips to places like the Azores, Patagonia’s Torres del Paine, and the historic villages of the Albanian Riviera, while balancing
    remote work flexibility with occasional weekend getaways to Joshua Tree.
  culinary: Kyong To enjoys experimenting in the kitchen, mastering dishes such as kimchi‑fried rice, bulgogi tacos, and gochujang‑glazed salmon, while sourcing fresh herbs from the farmers’ market and
    occasionally swapping recipes at Korean language exchange meet‑ups.
  core: Kyong To is a curiosity‑driven data strategist who blends analytical rigor with artistic flair, embraces flexible schedules, and occasionally lets a disorganized inbox win over meticulous budgeting.
background:
  cultural: Kyong is a first‑generation Korean‑American. She grew up bilingual in Korean and English, celebrating Korean holidays such as Chuseok and Seollal while also embracing American traditions. The
    strong emphasis on education and collective responsibility in her family shaped her work ethic, yet her upbringing in Temple City’s vibrant Asian‑American community introduced her to a mix of cultures,
    fostering openness to new ideas. She remains connected to her heritage through regular visits to Korean churches, community festivals, and by cooking family recipes. At the same time, she identifies
    with the broader multicultural fabric of Los Angeles County, drawing inspiration from both Korean and Western artistic and professional influences.
