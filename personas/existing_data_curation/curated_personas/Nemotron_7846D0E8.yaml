  career_goals: Kyong aspires to transition from project‑level analyst work to a senior leadership role where she can shape enterprise‑wide analytics strategy. Over the next five years she plans to earn
    a professional certification in data science and complete a Lean Six Sigma Black Belt, positioning herself to become a Director of Operations Research or Chief Analytics Officer. She is motivated to
    mentor junior analysts—particularly women and Asian‑American professionals—and to champion the use of sustainable, AI‑enhanced optimization in supply‑chain and logistics. Flexibility is key to her vision,
    so she seeks roles that support remote collaboration while maintaining a healthy work‑life balance.
