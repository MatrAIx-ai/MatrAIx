  hobbies: '[''Visiting art galleries and museums'', ''Attending cultural festivals'', ''Gardening'', ''Traditional Mexican cooking'', ''Reading historical fiction and biographies'', ''Crocheting'', ''Playing
    bingo'', ''Genealogy research'']'
  career_goals: 'At this stage, Suamy focuses on leaving a lasting legacy: she aims to document her family’s history, mentor younger members of the community in cultural traditions, offer cooking workshops
    that celebrate Mexican heritage, and contribute oral histories to local museums. She also aspires to publish a memoir that intertwines personal reflections with insights on art and culture, thereby
    preserving her experiences for future generations.'
