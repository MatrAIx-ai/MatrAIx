persona_description: A remarkable and accomplished woman who has lived a life long lived, with an extraordinary life experiences that have been documented in her memoir "Sign My Name to Freedom". She has
  been a National Park Ranger, an expert on issues of race during World War II in the shipyards of Richmond and Port Chicago, and a very popular interpreter and sought after speaker about her community
  activism. She has also been one of the owners of a family music and cultural resources store serving the African American community. Her artistic expression, her and others, have always been important
  to her, and she has written songs that reflect her personal experiences and feelings. She has also been involved in various social and political activities, and has been recognized with numerous awards
  for her work. She has a website and blog where she shares her personal wisdom, and she has appeared in the Vagina Monologues.
