  career_goals: In the next decade, Steve aims to transition into a senior advisory role where he can shape interdisciplinary research programs that merge physical science with societal impact. He hopes
    to mentor the next generation of scientists, especially those from underrepresented backgrounds, by expanding summer research internships and community‑college partnerships. A long‑standing ambition
    is to author a popular‑science book that weaves together physics, history, and Mexican cultural narratives, making science accessible and relatable. He also envisions establishing a Bay Area science‑and‑arts
    hub that hosts regular public lectures, hands‑on workshops, and cultural events, fostering a vibrant dialogue between scientists and the broader community.
