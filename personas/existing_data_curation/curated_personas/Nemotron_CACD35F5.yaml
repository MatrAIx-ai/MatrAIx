personas:
  professional: Steve Valencia is a senior experimental physicist who designs and calibrates sophisticated instruments, translates raw data into actionable insights, and passionately mentors underrepresented
    students through bilingual outreach, balancing deep curiosity with a pragmatic, flexible work style.
  sports: Steve Valencia enjoys casual weekend hikes with the Sierra Club Bay Area Chapter, follows the San Jose Sharks with loyal enthusiasm, and participates in a senior softball league at Guadalupe River
    Park, favoring low‑impact activity that fits their flexible schedule.
  arts: Steve Valencia strums an acoustic guitar at neighborhood gatherings while reveling in the vibrant rhythms of Celia Cruz and Carlos Santana, frequently admiring Frida Kahlo’s paintings and Diego
    Rivera murals during local art walks, and volunteers as a bilingual translator for community theater productions.
  travel: Steve Valencia favors spontaneous road trips along California’s coast, revisits family in Jalisco during festive holidays, dreams of a cultural immersion in Oaxaca’s bustling markets, and plans
    a future relaxed escape to Tuscany’s vineyards, balancing budget constraints with a love for authentic experiences.
  culinary: Steve Valencia is an accomplished home cook who masterfully prepares mole poblano with dried chiles, chocolate, and spices, rolls tamales using fresh masa and pork, delights in tasting street‑style
    tacos al pastor, and occasionally splurges on high‑quality avocados and queso fresco at the local farmers’ market.
  core: Steve Valencia blends scientific rigor with community flair, juggling experiments, salsa nights, and spontaneous cooking, all while habitually misplacing their keys and embracing a laid‑back approach
    to planning.
background:
  cultural: Steve was born to Mexican immigrant parents who settled in San Jose in the 1970s. Raised bilingual, he grew up celebrating Día de los Muertos, Semana Santa, and local Mexican‑American festivals,
    while also absorbing the multicultural tapestry of the Bay Area. Family gatherings revolve around shared meals, traditional music, and storytelling, instilling in him a strong sense of community and
    respect for heritage. His Mexican roots influence his culinary passions, his love for rhythmic dance, and his commitment to serve as a cultural bridge—especially in science outreach where he often translates
    technical concepts into Spanish for community workshops. Though fully integrated into American society, Steve remains connected to his Mexican identity through regular visits to relatives in Jalisco
    and participation in local Latino networks.
