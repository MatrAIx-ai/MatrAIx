persona_description: A music educator who believes in the power of music to enrich and enhance human life, and who advocates an experience-based approach to teaching music that emphasizes singing, learning
  through singing, and the development of the inner musical ear. They believe in the importance of folk music as the most representative and representative of a culture, and advocate the use of quality
  music in teaching, while also emphasizing the development of all skill areas, including music reading, writing, part-singing, part-hearing, improvisation, intonation, listening, memory, phrasing, and
  understanding of form. They believe in the development of the complete musician, and advocate a comprehensive and comprehensive approach to music education that meets the National Standards for Arts Education.
