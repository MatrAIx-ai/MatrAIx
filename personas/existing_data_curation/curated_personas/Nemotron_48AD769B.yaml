personas:
  professional: A budding architect of the living room, Caonabo Parmenter uses LEGO Duplo bricks to master spatial reasoning and methodical organization, balancing boundless curiosity with the practical
    habit of sorting pieces by color after each play session.
  sports: An active playground explorer, Caonabo Parmenter joins a toddler soccer circle on Saturday mornings, cheers for the local baseball team the Harbor Hawks during family outings, and prefers climbing
    the jungle gym over swinging on swings.
  arts: An avid picture-book lover, Caonabo Parmenter delights in drawing crayon dinosaurs while humming the tunes of 'Baby Einstein' and eagerly re-watching episodes of 'Blue's Clues' and 'Mickey Mouse
    Clubhouse,' often citing the voice of Tom Hanks in 'Toy Story' as a favorite.
  travel: An inquisitive explorer, Caonabo Parmenter has already visited the city aquarium and a family beach trip to Clearwater, dreams of a future trip to Disneyland, and prefers short car rides with
    a planned nap stop at the next rest area.
  culinary: With a burgeoning palate for cheesy macaroni, sweet banana pancakes, and crunchy apple slices, Caonabo Parmenter helps stir batter with a plastic spoon, insists on adding a dash of cinnamon
    to oatmeal, and proudly declares broccoli as 'green treasure.'
  core: Caonabo Parmenter is a curious yet methodical three-year-old who balances imaginative building with tidy habits, stays calm under pressure, and quietly asserts preferences in a reserved, cooperative
    manner.
background:
  cultural: Caonabo was born and raised in Roseville, Michigan, within a predominantly white, middle‑class suburban environment typical of the Midwest. Her family observes American holidays such as Thanksgiving,
    Christmas, and Independence Day, emphasizing values of practicality, community, and self‑reliance. She attends a local preschool that introduces basic multicultural awareness, but her immediate cultural
    influences remain rooted in Midwestern Anglo‑American traditions and family‑centered celebrations.
attributes:
  skills: '[''articulation of simple words'', ''color and shape sorting'', ''block stacking'', ''crayon drawing'', ''basic counting (1-10)'', ''following simple instructions'', ''cooperative play with small
