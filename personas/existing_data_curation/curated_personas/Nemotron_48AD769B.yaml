  hobbies: '[''exploring backyard nature'', ''collecting leaves'', ''building block towers'', ''listening to picture books'', ''drawing with crayons'', ''solving shape-sorting puzzles'', ''playing with
    a small group of friends'']'
  career_goals: Even at her young age, Caonabo delights in imagining future roles. She often talks about helping others, expressing a wish to become a teacher who tells stories to children, and showing
    a fascination with caring for animals, dreaming of being a veterinarian. These ambitions reflect her balance of curiosity about how things work and a practical desire to assist others.
