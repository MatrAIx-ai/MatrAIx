  hobbies: '[''Fishing'', ''Boating'', ''Kayaking'', ''Pickup basketball'', ''Strength training'', ''Woodworking'', ''DIY home improvement'', ''Community volunteering'']'
  career_goals: John aims to progress into a supervisory role within the manufacturing plant, targeting a shift lead or production manager position within the next five years. He plans to complete an associate
    degree in Manufacturing Technology and obtain certifications in Lean Six Sigma and advanced welding. Ultimately, he hopes to open his own custom metal‑fabrication shop, leveraging his expertise in precision
    assembly and process improvement.
