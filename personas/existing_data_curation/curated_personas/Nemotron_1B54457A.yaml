  hobbies: '[''Pickup basketball'', ''Hiking in the San Gabriel Mountains'', ''Car meets and custom motorcycle projects'', ''Electronics tinkering and soldering hobby projects'', ''Playing guitar'', ''Sci‑fi
    movies'', ''Volunteer community clean‑up events'', ''DIY home‑improvement projects'', ''Metal art sculpting'']'
  career_goals: Kenneth aims to become a certified journeyman welder and obtain American Welding Society certifications such as Certified Welder and Certified Welding Engineer. He plans to pursue further
    technical education at a community college to deepen his knowledge of advanced welding processes, including robotic and underwater welding. Over the next five years, he hopes to take on a supervisory
    role on a high‑tech manufacturing line and eventually launch his own custom metal‑fabrication business, combining his practical skills with his creative interest in metal art.
