personas:
  professional: Kenneth Amadio, a 24‑year‑old aspiring journeyman welder, blends meticulous MIG, TIG, and oxy‑acetylene techniques with a curious‑yet‑practical mindset, reliably leads team builds, flexibly
    weaves creative metal‑art ideas into every project, and they consistently balance precision with imaginative problem‑solving.
  sports: Kenneth Amadio regularly joins Sunday pickup basketball games at the local park, hikes the San Gabriel Mountains in the cooler months, proudly cheers for the Los Angeles Lakers and Dodgers, and
    they train twice a week with the SoCal Trail Runners club to keep their endurance sharp.
  arts: Kenneth Amadio spends evenings strumming classic rock riffs à la John Mayer, cranks the Red Hot Chili Peppers on repeat while tinkering with DIY guitar pedals, immerses themselves in sci‑fi favorites
    like Blade Runner and Arrival, and they draw aesthetic inspiration from modern metal sculptors such as Tom Reilly.
  travel: Kenneth Amadio favors DIY road trips along the Pacific Coast Highway to Big Sur, has trekked the Grand Canyon and surf‑checked Maui, enjoys weekend escapes to Yosemite’s high country, and they
    dream of a cycling adventure across New Zealand’s South Island once their welding certification earnings fund the journey.
  culinary: Kenneth Amadio relishes Sunday family lunches featuring homemade spaghetti carbonara with pancetta and pecorino, delights in grilled fish tacos topped with fresh cilantro and lime, and they
    can whip up a quick miso ramen bowl with soft‑boiled eggs after a night shift, showcasing a palate that spans Italian comfort, Mexican zest, and Japanese umami.
  core: Kenneth Amadio is a sociable, hands‑on welder who balances a relentless curiosity for metalcraft with a love for group basketball, weekend hikes, homemade pasta, and custom bike projects, all while
    juggling a disciplined budget and an occasional back‑ache that they manage with stubborn optimism.
background:
  cultural: Kenneth grew up in Carson, a culturally diverse suburb of Los Angeles County. He is of Italian‑American heritage; his family maintains traditions such as Sunday family lunches, homemade pasta,
    and celebrating holidays like Ferragosto. The multicultural environment of Southern California, with strong Latino and Asian influences, fostered his open‑minded outlook and love for social gatherings,
    community events, and outdoor activities.
attributes:
