  career_goals: He dreams of becoming an astronaut who can draw the galaxies he explores, or a cartoonist who creates stories that make people laugh and think. Jeronimo also imagines helping his community,
    perhaps by designing fun educational games for kids or by sharing his love of art at school. His ambitions are guided by a desire to keep learning, stay creative, and make a positive impact on others.
