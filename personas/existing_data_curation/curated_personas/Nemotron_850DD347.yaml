personas:
  professional: Kathleen Mosley is a seasoned carpenter with three decades of framing, cabinetry, and fine-furniture expertise who blends traditional hand tools with CNC technology, they channel their spontaneous
    problem‑solving into uniquely patterned pieces, and they mentor apprentices while battling a chronic aversion to rigid scheduling.
  sports: Kathleen Mosley is an avid hiker who tackles the Appalachian foothills on informal weekend treks, they follow the Washington Capitals and Baltimore Ravens seasonally, and they participate in a
    local senior walking club that meets at the Hagerstown community center.
  arts: Kathleen Mosley is a lifelong music lover who strums acoustic guitar to the tunes of Joan Baez and Nick Drake, they draw creative spark from folk artist Howard Finster’s prints at the Hagerstown
    arts gallery, and they regularly attend Maryland Historical Society exhibitions featuring colonial‑era crafts.
  travel: Kathleen Mosley is a travel enthusiast who plans low‑key historic road trips to Gettysburg, the Shenandoah Valley, and weekend getaways to Asheville’s Blue Ridge Mountains, they dream of a guided
    tour of England’s Cotswolds to study traditional timber framing, and they prefer itineraries that balance cultural sites with scenic hikes.
  culinary: Kathleen Mosley is a modestly skilled home cook who favors farm‑to‑table dishes like roasted beet and goat‑cheese salad, they enjoy garlic‑infused sautéed greens from their garden and occasional
    wood‑smoked trout, and they take pleasure in hand‑crafting crusty sourdough loaves on a vintage cast‑iron stove.
  core: Kathleen Mosley is a spontaneous, art‑infused carpenter who balances a love of hands‑on creation with chronic deadline anxiety, they unwind with garden work and guitar improvisations, and they occasionally
    misplace tools and procrastinate on paperwork.
background:
  cultural: Kathleen grew up in a working‑class family in the western Maryland region, where self‑reliance and skilled trades were valued. Her parents were of Appalachian‑descended white heritage, and she
    was raised with a blend of Protestant modesty and a strong sense of community responsibility. The local culture’s emphasis on craftsmanship and storytelling shaped her respect for traditional woodworking
    techniques while also fostering her curiosity for eclectic artistic influences. Over the years, she has absorbed elements of the broader Mid‑Atlantic arts scene, integrating folk motifs from nearby
    Pennsylvania Dutch traditions with contemporary design trends she encounters through regional craft fairs. This cultural mosaic informs her approach to carpentry as both a practical trade and a form
    of personal artistic expression.
