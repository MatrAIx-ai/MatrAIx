  career_goals: Kathleen aims to transition from on‑site contracting to establishing a small boutique workshop in Hagerstown where she can focus on producing limited‑edition, artistically driven furniture
    pieces that reflect the region’s heritage. She dreams of launching a quarterly series of hands‑on woodworking classes for adults, especially encouraging more women to explore the trade. Over the next
    five years, she hopes to secure a modest grant for sustainable timber sourcing and to be recognized in a local arts & crafts exhibition for her innovative blend of function and aesthetic. Additionally,
    she seeks to improve her organizational habits to meet deadlines more reliably, thereby reducing the stress that has long accompanied her spontaneous work style.
