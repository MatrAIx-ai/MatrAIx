personas:
  professional: Ashley Bumgardner is an aspiring graphic designer who merges coastal photography with hand‑drawn illustration, using Procreate and charcoal to craft environmentally‑focused visuals for local
    NGOs, while their natural empathy makes them a collaborative leader in community art workshops despite a tendency to miss strict project deadlines.
  sports: Ashley Bumgardner spends weekends playing beach volleyball with the Vero Beach Youth Beach Club, joins a Saturday surf‑lesson crew at the Indian River Dungeness Point, follows the Miami Heat on
    basketball season and cheers for the Tampa Bay Rays, while also taking occasional morning jogs along the River Trail to stay active.
  arts: Ashley Bumgardner immerses themselves in the local art scene, frequenting the Vero Beach Art & Graffiti Festival, drawing inspiration from contemporary illustrators like James R. Eads and classic
    painters such as Georgia O’Keeffe, devouring graphic novels like "Saga" and "Monstress", and curating playlists featuring indie musicians Phoebe Bridgers and Clairo while sketching sunrise scenes on
    their tablet.
  travel: Ashley Bumgardner loves spontaneous road trips, having explored Key West’s sunsets, taken a weekend bike ride to the Kennedy Space Center, and dreamed of backpacking through Costa Rica’s Monteverde
    cloud forest and the historic streets of St. Augustine, always balancing their limited teen budget with a desire for nature‑focused adventures.
  culinary: Ashley Bumgardner favors coastal flavors, often making shrimp tacos with mango salsa, key lime pie, avocado toast sprinkled with chili flakes, and acai bowls topped with coconut flakes and fresh
    berries, though their cooking skills hover at the “confident microwave” level, so they frequently supplement meals with takeout from the local fish market.
  core: Ashley Bumgardner is a nature‑infused visual storyteller who balances a carefree, art‑first mindset with occasional deadline‑dodging, a pocketful of beach‑scented dreams, and a habit of splurging
    on creative supplies while forgetting sunscreen.
background:
  cultural: Ashley comes from a white, middle‑class family in Vero Beach, Florida. Growing up near the Atlantic coastline and the Indian River Lagoon, she has been immersed in the region's seaside culture,
    marine tourism, and a close‑knit community that values outdoor recreation and environmental stewardship. While her family upholds typical suburban American values and a modest, supportive upbringing,
    the local arts scene—including galleries, mural projects, and community festivals—has shaped her appreciation for creativity and collaborative community activities. Her cultural identity blends a Southern‑Florida
    coastal lifestyle with an openness to broader artistic influences.
attributes:
  skills: '["Sketching", "Digital Illustration (Procreate, Canva)", "Photography", "Creative Writing (Poetry, Short Stories)", "Empathetic Listening", "Small Group Facilitation", "DIY Crafts (Jewelry, Decor)",
    "Self‑directed Learning", "Basic Photo Editing (Lightroom)"]'
  hobbies: '["Sketching beach and nature scenes", "Digital drawing with Procreate", "Coastal photography", "Reading graphic novels and poetry", "Journaling", "Indie music listening", "Beaded jewelry making",
    "Volunteering at turtle nesting sites"]'
  career_goals: She aspires to earn her GED and enroll in a community college program focusing on graphic design or visual arts, with the long‑term ambition of becoming a freelance illustrator for books,
    environmental campaigns, and local businesses. She hopes to combine her love of nature and art by creating visual content that raises awareness about coastal conservation. In the meantime, she wants
    to volunteer at the Vero Beach Marine Conservation Center, assist with youth art programs, and build a modest portfolio that could lead to paid commissions.
