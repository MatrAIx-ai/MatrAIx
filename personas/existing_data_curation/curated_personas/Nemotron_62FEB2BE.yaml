personas:
  professional: Eusebio Rivas, a retired shipyard and aerospace mechanical engineer, they apply their meticulous drafting skills, naval architecture expertise, and disciplined project‑management style to
    mentor students and guide community engineering projects, always insisting on precise schedules and budgets.
  sports: Eusebio Rivas, a devoted outdoor enthusiast, they enjoy early‑morning beach walks and weekend fishing off the Ventura shoreline, while cheering for the Los Angeles Dodgers and the LA Rams and
    periodically participating in a senior sailing group at the Ventura Yacht Club to keep their stamina in check.
  arts: Eusebio Rivas, an appreciative lover of the arts, they spend evenings listening to the traditional folk songs his community plays during Día de los Muertos, admiring the maritime paintings of Howard
    Pyle, and attending occasional performances of classic Hollywood films starring James Stewart, allowing the arts to balance their technical mind.
  travel: Eusebio Rivas, an avid planner of journeys, they prefer meticulously planned road trips, enjoying weekend drives to Catalina Island and Santa Barbara, long‑awaited pilgrimages to the historic
    mission of San Juan Capistrano, and occasionally dreaming of a leisurely cruise through the canals of Venice, always arranging travel around family gatherings and health considerations.
  culinary: Eusebio Rivas, a skilled home chef, they delight in crafting tamales stuffed with slow‑cooked pork and wrapped in freshly made corn masa, simmering hearty pozole with hominy, chilies, and garden
    cilantro, and seasoning garden salads with lime and oregano, often sharing the dishes at community potlucks.
  core: Eusebio Rivas, an 80‑year‑old disciplined engineer‑mentor, they blend meticulous routine with a competitive spirit, tending gardens, building model ships, and preserving cultural traditions while
    occasionally forgetting to water the succulents during endless project planning.
background:
  cultural: Eusebio is a first‑generation Mexican American who grew up in a bilingual household that emphasized family loyalty, Catholic traditions, and practical work ethic. His cultural identity blends
    Mexican customs—such as celebrating Día de los Muertos, preparing ancestral recipes, and maintaining close-knit family ties—with the West Coast lifestyle of Ventura County. He remains deeply rooted
    in the Mexican community of Southern California, participating in local fiestas and church activities, while also embracing the diverse cultural fabric of his California neighborhood. His heritage informs
    his disciplined approach to life, his respect for routine, and his commitment to passing on cultural and technical knowledge to younger generations.
attributes:
