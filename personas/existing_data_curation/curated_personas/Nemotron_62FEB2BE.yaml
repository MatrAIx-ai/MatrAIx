  hobbies: '[''Gardening'', ''Model shipbuilding'', ''Fishing'', ''Historical reading'', ''Cooking Mexican cuisine'', ''Community volunteering'', ''Chess'']'
  career_goals: Although officially retired, Eusebio remains goal‑oriented. He aims to volunteer as a technical advisor for the local community college's engineering program, offering mentorship to students
    from underrepresented backgrounds. He also aspires to document his professional experiences in a memoir that highlights the evolution of shipbuilding on the West Coast, preserving knowledge for future
    generations. Maintaining his health and independence is a personal ambition, and he seeks to ensure his family’s financial stability through careful estate planning. Finally, he wishes to spearhead
    a neighborhood garden project that combines his love of horticulture with community service.
