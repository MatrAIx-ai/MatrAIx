  hobbies: '[''watercolor painting'', ''gardening'', ''classical guitar'', ''reading historical biographies'', ''reading Mexican literature'', ''cooking Mexican cuisine'', ''volunteering at senior center'',
    ''attending community theater'', ''photography'']'
  career_goals: In retirement, Juan aims to preserve the oral histories of Mexican‑American families in Sioux County by recording interviews and compiling a community anthology. He plans to mentor younger
    residents in gardening, budgeting, and bilingual communication, fostering an intergenerational exchange of knowledge. A key ambition is to establish a community garden that showcases both Midwestern
    crops and Mexican culinary herbs, serving as a living classroom for sustainable practices and cultural heritage. Juan also hopes to write a memoir that weaves his personal journey with the broader story
    of Mexican immigrants in rural Iowa, and he dreams of traveling to his ancestral hometown in Mexico to reconnect with his roots.
