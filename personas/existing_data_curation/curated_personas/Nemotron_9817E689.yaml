  hobbies: '[''Gardening'', ''DIY home improvement projects'', ''Fishing'', ''Hiking'', ''Reading non-fiction and local history'', ''Board games'', ''Volunteer work with community events'', ''Exploring
    new productivity apps'', ''Cooking'']'
  career_goals: Lawrence aims to leverage his extensive supervisory experience to transition into a senior operations or facilities management role within a mid-size organization, where he can lead larger
    teams and drive efficiency initiatives. He plans to earn a Lean Six Sigma Green Belt and a project-management certification to formalize his process-improvement expertise. Ultimately, he envisions a
    position that balances strategic oversight with mentorship, allowing him to shape a supportive workplace culture while maintaining the flexibility he values. He is also open to part-time consulting
    or training work that lets him share his practical knowledge with other office managers.
