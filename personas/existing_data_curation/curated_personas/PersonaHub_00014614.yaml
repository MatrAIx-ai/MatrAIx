persona_description: A well-known American civil engineer, cartographer, surveyor, and map publisher active from the middle to late 19th century. Known for his hand-colored geological charts of Massachusetts,
  particularly the Vivid hand coloring, fine workmanship, and extreme detail. His work focused heavily on city and county maps, and he eventually established himself independently around 1850 and expanded
  his operations to Massachusetts. His business model involved a contract with town officials to produce a certain number of maps after which he acquired the right to print and sell additional copies on
  his own account. He eventually became Massachusetts "Superintendent of the State Map", and his work was eventually published in numerous state, county, and national atlases in the 1860s and 1870s. Around
  1880, he took a post with the U.S. Coast Survey with whom he worked on various charts until requesting a transfer in 1883 to the newly formed U.S. Geological Survey. He remained with the Geological Survey
  until his untimely death of a heart attack in April of 1889.
