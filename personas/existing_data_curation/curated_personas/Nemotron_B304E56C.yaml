  career_goals: Muneshwar aims to transition into a senior leadership role within Fairfax County’s Department of Engineering, overseeing large‑scale regional transportation and climate‑resilient infrastructure
    initiatives. He plans to obtain his Professional Engineer (PE) license and a master's specialization in Sustainable Infrastructure, positioning himself to champion green stormwater systems and smart‑city
    projects. In the longer term, he wishes to mentor the next generation of engineers, author technical papers on flood mitigation, and eventually establish a boutique consultancy that helps municipalities
    integrate resilient, low‑impact development practices.
