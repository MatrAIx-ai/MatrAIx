personas:
  professional: Shaun Medinaserrano is a budding mini-architect who spends afternoons constructing elaborate cardboard forts and sketching futuristic cityscapes, channeling a relentless curiosity for novelty
    and abstract concepts while favoring flexible, unstructured play over rigid schedules, and they constantly invite friends to collaborate to maintain a harmonious, kind-hearted environment.
  sports: Shaun Medinaserrano sprints across the desert playground with the Ridgecrest Rattlers youth soccer club, practices short bouts of basketball with neighborhood friends while modeling the moves
    of the Los Angeles Lakers on TV, and cheers loudly for the Los Angeles Dodgers during family game nights, although they occasionally forget to hydrate after practice.
  arts: Shaun Medinaserrano spends afternoons drawing vibrant abstract creatures inspired by the bold colors of Frida Kahlo and the whimsical storytelling of Pixar, sings along to Selena's lively cumbia
    tracks and the playful melodies of Disney's The Little Mermaid, and loves dancing to the energetic rhythms of Luis Miguel, all while proudly showing off the homemade sugar-skull masks crafted for Dia
    de los Muertos.
  travel: Shaun Medinaserrano delights in family road trips to the sweeping dunes of the Mojave and day outings at Joshua Tree National Park, and they dream of exploring the colorful streets of Barcelona
    and the ancient ruins of Machu Picchu, but they prefer short, relaxed car rides over long flights because the unfamiliar crowds can feel overwhelming.
  culinary: Shaun Medinaserrano loves the warm taste of homemade tamales and salsa verde during holiday gatherings, and they enjoy dipping crunchy carrot sticks in guacamole, often help stir batter for
    pancakes with a wooden spoon, and delight in treating themselves to cheesy pizza slices with extra pepperoni after a weekend of adventurous play.
  core: Shaun Medinaserrano views each day as a kaleidoscopic adventure, blending desert sunlit imagination with bright family traditions, yet they often worry about fitting in during group games and can
    be delightfully disorganized when their art supplies spill everywhere.
background:
  cultural: Shaun’s family roots are Mexican, and Spanish is spoken at home alongside English. He celebrates Día de los Muertos and Mexican holidays with traditional foods such as tamales and salsa, and
    he often hears stories and songs from his grandparents about life in Mexico. Growing up in Ridgecrest, he blends these cultural traditions with the desert‑town lifestyle, attending local community events
    and school activities that reflect a mix of Hispanic and Californian influences.
