  career_goals: Even at five, Shaun dreams of growing up to become someone who can turn ideas into visual or tangible creations – a painter, cartoonist, or toy inventor. He also imagines exploring the world
    as an astronaut or scientist, and he wishes to help friends feel happy and safe, hinting at a future as a teacher or community helper.
