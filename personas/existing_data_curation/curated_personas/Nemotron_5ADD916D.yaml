personas:
  professional: Ben Lanning, a 29‑year‑old registered nurse who excels at comprehensive patient assessments, IV therapy, wound care, and quality‑improvement initiatives, leverages their methodical, organized
    nature and curiosity to streamline workflows in a rural hospital while balancing compassionate bedside care with data‑driven efficiency.
  sports: Ben Lanning enjoys hiking the Badlands, snowshoeing on the frozen trails of the Red River Valley during winter, and playing recreational softball for the Bismarck Community Athletic Club, while
    they cheer on the North Dakota State Bison football team and the Minnesota Vikings as their favorite professional squads.
  arts: Ben Lanning finds creative release in strumming acoustic versions of John Mayer and Joni Mitchell songs on their guitar, attending local theater productions of August Wilson's plays, and collecting
    vinyl records of folk legend Bob Dylan, which together shape their evenings after a long shift, and they often use these artistic moments to unwind.
  travel: Ben Lanning favours road‑trip adventures to the Thousand Islands region of Minnesota and seasonal visits to the historic Oktoberfest celebration in nearby Wisconsin, while dreaming of a summer
    trek through Norway’s fjords, and they balance limited leave time with careful budgeting and a love for both rugged outdoor exploration and cultural festivals.
  culinary: Ben Lanning enjoys cooking nutrient‑dense meals like roasted beet and quinoa salad with goat cheese, pan‑seared trout drizzled with lemon‑dill sauce, and a hearty vegetable stew featuring carrots,
    potatoes, and wild rice, demonstrating solid home‑cooking skills, and they occasionally over‑season dishes with extra salt.
  core: Ben Lanning blends disciplined nursing expertise with a love for woodworking, garden-fresh cooking, and guitar‑filled evenings, yet sometimes lets a penchant for perfection keep them from fully
    relaxing, and they often find themselves double‑checking the night‑shift checklist before bedtime.
background:
  cultural: Ben grew up in a small, close‑knit community in the American Midwest, where values such as self‑reliance, modesty, and teamwork are emphasized. His family’s heritage reflects the German‑Scandinavian
    roots common in North Dakota, contributing to traditions of seasonal festivals, community service, and a strong work ethic. Local church gatherings and town events have reinforced a sense of belonging
    and civic responsibility. These cultural influences shape his pragmatic approach to nursing, his engagement in community health initiatives, and his appreciation for both tradition and progressive ideas.
