  career_goals: Ben aims to complete a Bachelor of Science in Nursing within the next two years, followed by a Master’s in Nursing Administration, positioning himself for a nurse manager role at his regional
    hospital. He is interested in leading quality‑improvement projects that enhance patient safety and streamline workflows in rural settings. Long‑term, he aspires to become a certified Nurse Educator,
    mentor new nurses, and develop telehealth programs that expand access to care for underserved communities in North Dakota. His ambition balances career advancement with his desire to remain connected
    to his community.
