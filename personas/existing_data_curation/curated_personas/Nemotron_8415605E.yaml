personas:
  professional: An aspiring robotics hobbyist and future computer engineer, Randy Albert spends his afternoons soldering Arduino shields, debugging code, and documenting projects in a methodical notebook,
    showcasing a blend of curiosity and practicality that sets the foundation for a tech career.
  sports: Randy Albert balances morning basketball drills with weekend hikes up the Sandia Mountains, cheers for the New Mexico State Aggies and the Phoenix Suns, and participates in a local youth track
    club that focuses on cross‑country training during the fall season.
  arts: Randy Albert devours science‑fiction novels by Isaac Asimov and John Scalzi, idolizes the cinematic scores of Hans Zimmer, and spends free time building model aircraft while listening to the alternative
    band The Strokes, weaving a love of narrative and design into their creative identity.
  travel: Randy Albert prefers DIY road trips, having hiked the Grand Canyon’s South Rim with family, plans a future backpacking excursion to Utah’s Arches National Park, and occasionally dreams of attending
    the sci‑fi convention in San Diego, balancing a love for adventure with the constraints of a school schedule and a limited teen budget.
  culinary: Randy Albert enjoys the bold flavors of green chile stew, chicken enchiladas topped with smoky chipotle, and cinnamon‑spiced sopapillas, can whip up a decent batch of homemade guacamole, but
    stubbornly burns the edges of model aircraft paint while cooking, revealing a playful clash between their hands‑on hobbies and culinary experiments.
  core: Randy Albert is a methodical teen who turns every hobby—from Arduino coding to basketball—into a strategic game, obsessively tracks scores, occasionally forgets to eat while debugging, and can’t
    resist a late‑night gaming session even after a full day of hiking.
background:
  cultural: Randy is a white American raised in Los Lunas, New Mexico, a small town with a strong sense of community and a mix of Anglo‑American and Hispanic influences. His family values self‑reliance,
    hard work, and education, traits common in the Southwest’s ranching and agricultural heritage. Growing up near the desert landscape, he has developed an appreciation for the regional environment and
    the practical challenges of living in a high‑altitude, arid climate. While his cultural identity is rooted in mainstream American traditions, he is also exposed to local customs such as the annual Fiesta,
    regional cuisine like green chile dishes, and the bilingual atmosphere of the surrounding area, which together shape his worldview and sense of belonging.
attributes:
  skills: '["Basic Python scripting", "Arduino electronics", "Computer hardware troubleshooting", "Methodical note‑taking", "Strategic thinking in team sports", "Basic carpentry", "Effective time management"]'
  hobbies: '["Arduino projects", "Competitive online gaming", "Basketball", "Hiking in the Sandia Mountains", "Reading science‑fiction", "Model aircraft building", "Participating in local community festivals"]'
  career_goals: Randy aims to enroll in a high‑school STEM academy and later pursue a degree in mechanical or civil engineering, with a focus on designing sustainable infrastructure suited to the desert
    climate of New Mexico. He hopes to combine his technical skills with practical problem‑solving, eventually working on projects that improve water management or renewable energy in his region. He also
    entertains the possibility of joining the Air Force to apply his engineering interests in a service setting, and keeps an eye on competitive video‑gaming as a potential side career.
