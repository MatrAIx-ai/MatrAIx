  career_goals: Although retired from formal employment, Gim Wu aims to author a memoir and a series of essays that weave his personal immigrant story with broader East Asian diaspora experiences. He plans
    to establish a community‑run cultural archive in Montgomery County, curating oral histories and artifacts that preserve local Asian heritage. Additionally, he hopes to serve as a guest lecturer at the
    nearby community college, mentor youth interested in humanities, and collaborate with local museums on an exhibit showcasing East Asian calligraphy and tea culture.
