  skills: '[''Structural analysis'', ''AutoCAD Civil 3D'', ''Revit BIM'', ''GIS mapping'', ''Reinforced concrete design'', ''Steel detailing'', ''Python scripting'', ''Project coordination'', ''On‑site
    surveying'', ''Public speaking'', ''Creative problem solving'', ''Sustainable construction practices'']'
  hobbies: '[''Watercolor painting'', ''Architectural photography'', ''Rhythm guitar'', ''Hiking'', ''Trail running'', ''Community theater stage crew'', ''Art gallery visits'', ''Music festival attendance'',
    ''Sustainability volunteering'', ''Travel to engineering landmarks'', ''Co‑ed volleyball'']'
  career_goals: She aims to earn her Professional Engineer (PE) license within the next five years, specialize in sustainable infrastructure such as green bridges and low‑impact road designs, pursue a master’s
    degree in structural or environmental engineering, lead interdisciplinary project teams that blend functionality with public art, eventually secure a senior project manager role at a forward‑thinking
    design firm, and later launch her own consultancy focused on community‑oriented, aesthetically engaging civil works.
