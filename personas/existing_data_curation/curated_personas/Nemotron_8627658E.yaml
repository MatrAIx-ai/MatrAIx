personas:
  professional: Caroline Hux, a 19‑year‑old civil engineering student, merges expertise in structural analysis, AutoCAD Civil 3D, and Python scripting with a relaxed, improvisational work style that lets
    her turn on‑the‑fly design tweaks into sustainable bridge concepts for campus projects.
  sports: Caroline Hux, a 19‑year‑old trail‑running enthusiast, spends weekend mornings sprinting the trails of Hocking Hills, joins the co‑ed “Buckeye Spikers” volleyball league that proudly wears Ohio
    State Buckeyes colors, and roots for the Cleveland Browns each fall, favoring high‑intensity interval workouts that mirror her competitive drive.
  arts: Caroline Hux, a 19‑year‑old watercolor painter, captures cityscapes inspired by Edward Hopper while strumming rhythm guitar to The Strokes at local open‑mic nights, volunteers as stage crew for
    community theater productions of Lin-Manuel Miranda's *In the Heights*, and spends Saturdays photographing modern architecture in the style of Andreas Gursky at regional art galleries.
  travel: Caroline Hux, a 19‑year‑old adventure seeker, favors spontaneous weekend escapes using student discounts, has already backpacked to Rotterdam to marvel at the Erasmus Bridge and wandered Venice’s
    historic canals, dreams of a solo trip to Copenhagen’s sustainable bike‑friendly districts, yet her modest campus budget often forces her to postpone longer overseas trips in favor of nearby road‑trip
    stops like the Ohio River Gorge.
  culinary: Caroline Hux, a 19‑year‑old culinary explorer, whips up hearty chicken‑pot pie and herb‑infused quinoa bowls with growing confidence, delights in assembling artisanal cheese boards featuring
    sharp cheddar and tangy blue cheese after study sessions, and treats herself to sushi rolls loaded with avocado and spicy mayo when she can snag a late‑night delivery.
  core: Caroline Hux, a 19‑year‑old civil engineering student, blends a love for sustainable bridges with a habit of leaving project drafts scattered across coffee shop tables, turning deadlines into adrenaline‑fueled
    sprints while humming guitar riffs in the background.
background:
  cultural: Caroline comes from a white Midwestern American family in Troy, Ohio, with German and Irish ancestry. She was raised in a close‑knit small‑town environment that values community, practicality,
    and a strong work ethic. Her upbringing included regular participation in county fairs, local sports, and school arts programs, fostering an appreciation for both functional design and aesthetic expression.
    The region’s emphasis on higher education in STEM fields encouraged her pursuit of a civil engineering career, while exposure to local art scenes and outdoor recreation nurtured her curiosity and love
    for varied experiences.
