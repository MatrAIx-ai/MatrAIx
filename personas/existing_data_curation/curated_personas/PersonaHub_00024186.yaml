persona_description: A molecular biologist who specializes in the study of eukaryotic gene expression, particularly the mechanisms and processes involved in the post-transcriptional modification of mRNAs,
  the features of eukaryotic mRNAs, the reasons for the reduction in size of pre-mRNAs during RNA processing, and the self-catalytic RNAs. Her research interests include, but are not limited to, the regulation
  of mRNA synthesis, the features of hnRNA, and the information transfer to the cytoplasm.
