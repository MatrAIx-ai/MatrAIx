personas:
  professional: Nelly Labrador, a one‑year‑old who meticulously arranges shape‑sorting blocks in perfectly aligned rows, displays disciplined, structured play that hints at a future career in design or
    engineering, they thrive on predictable routines and set high standards even for simple tasks.
  sports: Nelly Labrador enjoys a weekly toddler gymnastics class at the local community center, where they follow the instructor's choreographed routines with disciplined focus, they also cherish a soft
    basketball shaped like a favorite team’s logo (the Los Angeles Lakers) that they bring to each session.
  arts: Nelly Labrador is soothed by classical lullabies such as Mozart's 'Eine kleine Nachtmusik' performed by a gentle pianist and delights in finger‑painting with primary colors, always aiming to create
    neat, symmetrical circles, they often hum along in a low, contented tone.
  travel: Nelly Labrador has taken short family trips to the nearby coastal park and a weekend visit to the neighboring city's children's museum, always traveling with a meticulously packed diaper bag and
    a fixed itinerary, they prefer the calm of familiar surroundings over chaotic airports.
  culinary: Nelly Labrador prefers pureed carrots, ripe banana, and occasional avocado mash, showing a surprising fondness for the smooth texture of oatmeal, they enthusiastically mash their food with a
    tiny spoon, often ending up with a playful smudge of food on their cheek.
  core: Nelly Labrador blends infant curiosity with a precocious love for order, finding comfort in predictable routines while occasionally getting messy during self‑feeding adventures, they are a tiny
    but disciplined explorer.
