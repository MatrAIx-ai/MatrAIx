  career_goals: Over the next five years Charles aims to earn a Certified Construction Manager (CCM) credential and transition into a senior construction manager role overseeing multi‑million‑dollar infrastructure
    projects across the Northeastern United States. He is focused on expanding his expertise in sustainable building practices and hopes to lead initiatives that integrate green materials and energy‑efficient
    designs while maintaining the disciplined, cost‑effective processes he values. Ultimately, he envisions either directing operations for a regional construction firm or launching his own consultancy
    that specializes in lean, safety‑first project execution.
