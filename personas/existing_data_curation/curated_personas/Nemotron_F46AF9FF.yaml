personas:
  professional: Evelyn Rosado, a front‑of‑house professional renowned for methodical floor management and bilingual communication, leverages data‑driven insights and a skeptical eye to spot errors before
    they affect guests, ensuring flawless cash handling and food‑safety compliance while they quietly nurture ambitions of supervisory leadership.
  sports: Evelyn Rosado finds controlled competition in salsa dancing with their spouse, follows the Harbor Hawks baseball team, and they jog the neighborhood park twice a week to clear the mind and stay
    fit.
  arts: Evelyn Rosado immerses themselves in mystery novels by Agatha Christie and historical biographies by Doris Kearns Goodwin, while evenings are filled with the vibrant brass of classic salsa groups
    like Buena Vista Social Club, and they find a cultural anchor through music.
  travel: Evelyn Rosado prefers meticulously planned solo trips, often exploring historic Old San Juan for its colonial charm and Granada, Spain for its cobblestone streets, while they enjoy weekend escapes
    to a nearby state park for low‑cost nature breaks.
  culinary: Evelyn Rosado crafts island‑style pork shoulder with citrus‑marinated rice, perfects plantain fritters, and adds smoked paprika to traditional black bean soup, showcasing an advanced home‑chef
    skill set that they use to blend heritage flavors with contemporary techniques.
  core: Evelyn Rosado balances a relentless drive for efficiency with a love for solitary creativity, channeling competitive skepticism into meticulous work, precise budgeting, and experimental cooking,
    and they quietly wrestle with stress‑induced worry.
background:
  cultural: Evelyn is a second‑generation Cuban‑American; her parents immigrated from Cuba in the 1980s and raised her in a bilingual household steeped in Cuban traditions. Family gatherings feature classic
    dishes like ropa vieja, plantains, and Cuban coffee, and the rhythms of son, mambo, and salsa are a constant backdrop. Although she lives in Lehigh Acres, Florida, she maintains strong ties to the local
    Cuban diaspora through community festivals, church events, and a weekend Cuban language school for her children. Her cultural identity blends the collectivist values of her heritage—emphasis on family
    loyalty and respect for elders—with the pragmatic, independent mindset she cultivated in the U.S., influencing both her work ethic and her personal aspirations.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''POS system operation'', ''Cash handling and reconciliation'', ''Food safety and hygiene compliance'', ''Inventory management'',
