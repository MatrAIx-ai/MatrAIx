  hobbies: '[''Cooking Cuban cuisine'', ''Reading mystery and historical non‑fiction books'', ''Gardening (herbs and vegetables)'', ''Listening to traditional and contemporary Cuban music'', ''Salsa dancing
    with spouse'', ''Crossword and Sudoku puzzles'', ''Journaling and reflective writing'', ''Occasional volunteer work at local food pantry'']'
  career_goals: Evelyn aims to transition from waitstaff to a supervisory role within the next two years, seeking a shift manager position where she can implement the systematic improvements she identifies.
    She plans to earn a ServSafe certification and take a short course in hospitality management to bolster her credentials. Long‑term, she dreams of opening a modest Cuban‑inspired café that emphasizes
    efficient service and high food‑quality standards, allowing her to apply her competitive drive and meticulous planning while providing a stable income for her family.
