  career_goals: Carrie aims to transition from retail to a role that merges her passion for education and creativity. In the next two years she plans to obtain teaching certification and secure a substitute
    teaching position, with a long‑term goal of becoming a full‑time elementary teacher who integrates arts‑based learning and technology into the classroom. She also envisions developing innovative, interdisciplinary
    curricula that encourage curiosity and imagination, and eventually leading a community learning center that offers workshops in visual arts, digital storytelling, and STEAM exploration.
