personas:
  professional: Carrie Scott, a 26‑year‑old aspiring elementary educator, leverages their frontline retail experience and graduate education training to craft imaginative, technology‑enhanced lesson plans
    that blend watercolor illustration, speculative storytelling, and digital media, while they stay calm, resilient, and collaborative in managing classroom dynamics and teamwork.
  sports: Carrie Scott enjoys low‑impact fitness, regularly hiking the nearby forested trails, attending weekend yoga classes at the community center, cheering for the local soccer team, the Portland Timbers,
    and participating in a co‑ed ultimate frisbee league, while they embody a balanced, community‑oriented approach to physical activity.
  arts: Carrie Scott spends evenings painting watercolor landscapes inspired by Georgia O'Keeffe's bold hues, curates ambient playlists featuring Max Richter and indie groups like Alvvays, reads speculative
    fiction by N.K. Jemisin and poetry by Ocean Vuong, and leads a community photography walk, weaving diverse artistic influences into their creative identity as they continually explore new modes of expression.
  travel: Carrie Scott prefers thoughtful weekend escapes to nearby national parks such as Zion and Sedona, while they dream of an immersive cultural retreat in Kyoto, Japan that includes tea ceremonies
    and visits to historic temples, illustrating a travel style that balances nature‑focused relaxation with a yearning for rich artistic experiences abroad.
  culinary: Carrie Scott experiments in the kitchen with miso‑glazed salmon, spice‑infused ramen broth, and lavender‑infused panna cotta, favoring ingredients like sumac, pomegranate molasses, and fresh
    herbs, showcasing a moderate cooking skill level that blends precise technique with a playful, artistic curiosity, while they enjoy presenting each dish as a visual work of art.
  core: Carrie Scott, a 26‑year‑old imaginative educator‑in‑training, balances calm resilience with relentless curiosity, turning everyday moments into artistic experiments while they pursue a career that
    fuses art, technology, and teaching.
background:
  cultural: Carrie grew up in the small‑town atmosphere of Williamston, Michigan, within a family that traces its roots to Irish and German immigrants who settled in the Great Lakes region in the early
    20th century. The Midwestern values of modesty, hard work, community involvement, and a straightforward approach to life shaped her outlook. Exposure to the diverse student population at the nearby
    university during her education degree broadened her appreciation for cultural differences, while local traditions—county fairs, high‑school sports, and volunteer-driven initiatives—instilled a strong
    sense of civic responsibility. This blend of small‑town steadiness and academic openness informs her personal and professional identity.
