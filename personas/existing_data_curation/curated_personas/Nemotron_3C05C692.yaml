personas:
  professional: Jamie Hart, an aspiring teen ecologist, channels their curiosity and practical mindset into meticulous field observations and data‑driven projects for school science fairs, where their love
    for solitary exploration shines.
  sports: Jamie Hart, a member of the local youth hiking club, spends weekends trekking Wyoming’s rolling foothills and observing birds, cheering on the Wyoming Cowboys football team and following the Denver
    Broncos for NFL excitement.
  arts: Jamie Hart, a budding writer and sketch artist, draws creative fuel from reading J.R.R. Tolkien and Liu Cixin, listening to ambient composer Ludovico Einaudi while drafting sci‑fi short stories
    and sketching wildlife with a basic DSLR.
  travel: Jamie Hart, who has explored the geysers of Yellowstone and the alpine trails of Grand Teton, dreams of photographing the aurora borealis in Norway’s Lofoten Islands, preferring self‑planned,
    low‑budget trips that allow ample time for quiet observation.
  culinary: Jamie Hart enjoys simple, hearty meals like homemade macaroni and cheese, chicken stir‑fry with broccoli, and snacking on trail mix and chocolate chip cookies while occasionally experimenting
    with baking a blueberry scone for a school bake‑sale.
  core: Jamie Hart is a solitude‑loving teen who blends imaginative storytelling with practical exploration, juggling occasional disorganization with a steadfast curiosity for the natural world.
background:
  cultural: Jamie grew up in Laramie, Wyoming, in a multigenerational family that values self‑reliance, respect for the natural landscape, and community involvement. Her household blends traditional high‑plain
    ranching heritage—such as seasonal haying, livestock awareness, and participation in county fairs—with modern technology, as her parents encourage digital learning and STEM activities. While she primarily
    interacts with the mainstream American cultural sphere through school, media, and online communities, she also receives informal education about the region’s indigenous histories and the importance
    of land stewardship from local museums and school curricula. Community events like the Laramie River Festival and volunteer clean‑up projects reinforce a sense of belonging to the wider Wyoming community,
    even as Jamie often seeks quiet, solitary spaces to recharge.
attributes:
  skills: '[''Digital literacy (Microsoft Office, Google Suite)'', ''Basic coding (Scratch, introductory Python)'', ''Electronics tinkering (Arduino basics)'', ''Local wildlife and plant identification'',
