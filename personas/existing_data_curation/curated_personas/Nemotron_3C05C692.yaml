  hobbies: '[''Reading (fantasy, sci‑fi)'', ''Creative writing (short stories, poetry)'', ''Nature journaling'', ''Sketching/wildlife drawing'', ''Hiking and trail exploration'', ''Bird watching'', ''Astrophotography'',
    ''Lego and model building'', ''Strategy video games'']'
  career_goals: Jamie aspires to combine her love of nature with her technical curiosity by becoming a wildlife biologist or environmental data analyst. She hopes to attend a STEM‑focused high school, earn
    a degree in ecology or zoology, and eventually work on field research projects that monitor prairie ecosystems and wildlife health. She is also interested in developing simple citizen‑science apps that
    let volunteers log wildlife sightings, merging her coding hobby with conservation goals. While she values a career that contributes to environmental stewardship, she also wants a lifestyle that preserves
    ample time for solitary exploration of the outdoors, reading, and personal projects.
