  hobbies: '["Outdoors exploration (hiking, nature walks)", "Fishing and hunting", "ATV riding and maintenance", "Bicycle repair", "Strategic video gaming", "Acoustic guitar playing", "Basketball at the
    community park", "Woodworking (birdhouses, small projects)", "DIY tutorial watching", "Community event volunteering"]'
  career_goals: John plans to earn his GED within the next two years and then enroll in a nearby community college’s vocational program for automotive technology or a related trade. He aims to become a
    certified mechanic and eventually open a small auto‑repair shop that serves his hometown and surrounding rural area. In the short term, he hopes to start a weekend side business offering bike repairs
    and lawn‑maintenance services to build a client base and earn income. He also has a growing interest in learning basic coding to create simple apps that could help him manage appointments and customer
    information for his future business.
