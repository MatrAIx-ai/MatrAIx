  hobbies: '[''Watercolor painting'', ''Creative writing (poetry, memoir)'', ''Reading (contemporary literature and Black authors)'', ''Gardening (heirloom vegetables)'', ''Listening to jazz and gospel
    music'', ''Weekly senior book club'', ''Volunteer oral-history project at the library'', ''Birdwatching on local nature trails'', ''Attending small-scale community art events'']'
  career_goals: Although officially retired, Renetta aspires to leave a lasting creative legacy. She plans to self-publish a collection of poems and memoir essays that weave together personal history and
    reflections on African-American culture in the Southeast. She hopes to organize an annual senior-focused art exhibition at the Bradenton Community Center, providing a platform for fellow retirees to
    showcase their work. Renetta also intends to complete an online certificate in art therapy so she can mentor younger participants at the local library. Ultimately, she seeks to deepen her knowledge
    of Black art history through a series of webinars and occasional travel to historic sites such as the African American Museum in Daytona Beach.
