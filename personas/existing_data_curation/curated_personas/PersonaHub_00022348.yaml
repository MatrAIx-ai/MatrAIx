persona_description: A researcher and educator who is interested in the early development of food brand knowledge in children, particularly in the context of pre-school age. She is particularly interested
  in the associations between television viewing habits and parents' eating habits, and the window of opportunity for educating families and young children in the pre-school years. She is also interested
  in the implications of marketing restrictions of unhealthy foods and family-focused obesity prevention programmes.
