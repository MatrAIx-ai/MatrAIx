personas:
  professional: Josefina Figueroa, a veteran hazardous-materials removal specialist with over three decades of experience, leverages their disciplined workflow, competitive drive, and curiosity for emerging
    safety technologies to lead meticulous decontamination projects while they mentor diverse crews in a bilingual environment.
  sports: Josefina Figueroa stays active by dancing salsa three nights a week, playing in a senior softball league, and hiking with the Orlando Senior Hiking Club, while they cheer on the Orlando Magic
    and Orlando City SC as their favorite professional teams.
  arts: Josefina Figueroa enjoys immersing themselves in the rhythms of Celia Cruz and Marc Anthony, collecting vinyl of classic salsa, attending local performances of celebrated playwrights, and they find
    inspiration in the cinematography of Guillermo del Toro, which all shape their vibrant creative outlook.
  travel: Josefina Figueroa prefers meticulously planned trips that blend cultural immersion with nature, having already explored the historic streets of Cartagena, the cloud forests of Monteverde, and
    the national parks of Yellowstone, while they now dream of trekking Patagonia's Torres del Paine and savoring the art cafés of Florence.
  culinary: Josefina Figueroa is a proficient home chef who masterfully prepares family staples such as arepas filled with shredded cheese and black beans, hallacas layered with plantain, pork, and capers,
    and crisp empanadas seasoned with cumin and annatto, while they delight in sourcing fresh cilantro and ají dulce at the local farmers market.
  core: Josefina Figueroa blends a razor-sharp competitive edge with a nurturing love of salsa, gardens their tomatoes by sunrise, and they occasionally forget to water their succulents when a new safety
    protocol catches their attention.
background:
  cultural: Josefina was born in Maracaibo, Venezuela, and immigrated to the United States in the early 1990s. She carries forward a strong sense of Venezuelan identity, evident in her fluency in Spanish,
    love for traditional music like joropo, and commitment to family gatherings centered around shared meals. Her immigrant experience has fostered resilience and a deep empathy for other Latinx workers
    navigating new cultural landscapes. In Orlando's vibrant Venezuelan community, she participates in cultural festivals and supports newcomers through language tutoring and safety workshops, blending
    her professional expertise with her cultural roots.
attributes:
  skills: '[''Hazardous material identification'', ''OSHA/EPA compliance'', ''Risk assessment and mitigation'', ''Site assessment and sampling'', ''Decontamination procedures'', ''Emergency spill response'',
