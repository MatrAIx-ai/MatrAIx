persona_description: A historian or a scholar of medieval history who is interested in the study of friendship and its significance in medieval society. The individual is likely to be familiar with the
  works of scholars such as William of Wykeham, John of Salisbury, and John of Cambridge, who all contributed to the understanding of medieval friendship. They would have a keen interest in the texts and
  documents of the time, such as the twelfth-century Topographica Hibernica and the Latin chronicles of the eleventh to the fourteenth centuries. They would also be familiar with the works of historians
  such as Edmund Campion, who wrote extensively on the subject of medieval friendship.
