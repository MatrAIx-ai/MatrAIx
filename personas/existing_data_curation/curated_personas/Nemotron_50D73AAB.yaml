  career_goals: Travis aims to transition from his current hiatus to a sustainable career as an independent creator. Over the next three years he plans to build a freelance portfolio in illustration and
    content writing, targeting niche markets such as eco‑friendly product packaging and local storytelling. Simultaneously, he intends to launch a small custom woodworking studio that produces handcrafted
    home décor using reclaimed wood, leveraging his project‑management skills to handle production and sales. He also hopes to author a memoir‑style collection of essays that blends his experiences in rural
    New York with reflections on art and solitude. Ultimately, his ambition is to achieve financial independence while maintaining a work style that allows for ample solitude, remote collaboration, and
    alignment with his values of sustainability and creative autonomy.
