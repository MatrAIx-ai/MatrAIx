personas:
  professional: Daniel Herndon, a 23‑year‑old journeyman machinist, leverages their expertise with CNC mills, manual lathes, and Fusion 360 CAD to streamline shop workflows while mentoring apprentices,
    and channels their competitive edge into pursuing CNC programmer certification and a future boutique fabrication studio.
  sports: Daniel Herndon, a 23‑year‑old community‑center regular, plays pick‑up basketball at the Brookville Community Center, volunteers as a youth league coach, follows the local semi‑pro team the Brookville
    Blazers, hikes the Whitewater River trails in the summer, and they also support the Ohio State Buckeyes during college football season.
  arts: Daniel Herndon, a 23‑year‑old sketch enthusiast, draws industrial cityscapes in a battered sketchbook, frequents the Riverbank Art Space for contemporary exhibitions, attends indie rock shows by
    Arcade Fire and blues gigs featuring The Black Keys, and channels their love for mechanical aesthetics into custom metal art pieces inspired by vintage motorcycle parts.
  travel: Daniel Herndon, a 23‑year‑old adventure seeker, prefers spontaneous weekend road trips on their vintage motorcycle, recently camped along the Whitewater River, dreams of a cross‑country ride through
    the Southwest’s Monument Valley, and lists a summer backpacking trek to Glacier National Park as their next big adventure.
  culinary: Daniel Herndon, a 23‑year‑old grill aficionado, enjoys hearty, grill‑centric meals—grilled ribeye steak with smoked paprika, smoky barbecue pork ribs, and homemade chili mac—and they also experiment
    with simple campfire recipes like foil‑wrapped salmon and fire‑roasted vegetables on weekend outings.
  core: Daniel Herndon, 23, blends a restless love of machines and art, a competitive spark on the basketball court, and a laid‑back yet sometimes haphazard approach to planning that fuels both spontaneous
    adventures and ambitious shop‑floor innovations.
background:
  cultural: Daniel grew up in Brookville, Indiana, a small Midwestern town with deep ties to agriculture and river‑based commerce. His family heritage is a blend of German and Irish ancestry, common among
    many white residents of the region. The community’s values—hard work, neighborly hospitality, and a practical, no‑nonsense outlook—shaped his work ethic and respect for skilled trades. At the same time,
    the local cultural scene, including county fairs, country‑rock festivals, and small‑town art shows, nurtured his appreciation for creativity and unconventional ideas. He occasionally attends the local
    Methodist church and participates in volunteer fire department activities, reflecting a sense of civic responsibility typical of his upbringing.
attributes:
  skills: '[''CNC milling'', ''Lathe operation'', ''Blueprint reading'', ''Precision measurement'', ''Machinery maintenance'', ''Basic CAD (Fusion 360)'', ''Technical troubleshooting'', ''Problem solving'',
    ''Team collaboration'', ''Sketching and visual design'']'
  hobbies: '[''Pick‑up basketball'', ''Sketching'', ''Visiting art galleries'', ''Live music concerts'', ''Camping and hiking'', ''Motorcycle restoration'', ''Model kit building'', ''Video gaming (Minecraft)'',
    ''DIY woodworking'', ''Community volunteering'']'
  career_goals: Daniel aims to advance from journeyman machinist to lead CNC programmer and eventually shop supervisor, earning certifications such as CNC Professional and Lean Six Sigma Green Belt along
    the way. He envisions opening a small boutique fabrication studio where he can blend his technical expertise with his passion for artistic metalwork, creating functional art installations for local
    businesses and galleries. To support this vision, he plans to enroll in a bachelor’s program in Industrial Design or Mechanical Engineering, while also building a portfolio of custom pieces for online
    commissions.
