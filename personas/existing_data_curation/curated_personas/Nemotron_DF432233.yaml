  hobbies: '[''gardening'', ''reading historical fiction'', ''book club participation'', ''historical site docent volunteering'', ''hiking'', ''seasonal cooking'', ''quilting'', ''photography'']'
  career_goals: Sherry aims to transition from a first‑line supervisor to a district‑wide operations manager within the next five years, leveraging her hands‑on retail experience to oversee multiple stores.
    She plans to earn a certification in retail management or an MBA part‑time to broaden her strategic skill set. Her long‑term ambition is to open a boutique that showcases locally sourced products and
    sustainable practices, allowing her to combine her managerial expertise with her passion for community‑focused commerce. She also wishes to mentor emerging retail leaders through a corporate mentorship
    program and champion initiatives that improve employee work‑life balance and customer experience.
