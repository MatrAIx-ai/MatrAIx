  hobbies: '[''Sketching'', ''Painting (watercolor and acrylic)'', ''Photography walks'', ''Listening to indie/alternative and Southern folk music'', ''Competitive video gaming'', ''DIY crafts (custom clothing,
    greeting cards)'', ''Community art club participation'', ''Journaling and creative writing'']'
  career_goals: Nicole hopes to turn her artistic passions into a career. She aspires to attend a university with a strong visual arts program and eventually work as a concept artist or graphic designer
    for games, animation, or advertising. She dreams of building a personal brand that showcases her illustrations, stories, and videos, and she wants to be recognized for original, unconventional concepts.
    While she enjoys competition, she sees herself leading a creative team, guiding projects from idea to execution. If circumstances allow, she also imagines interning at a local museum or community arts
    center to gain curatorial experience. Ultimately, she wants a career that blends creativity, technology, and the freedom to explore new ideas.
