personas:
  professional: A budding visual artist and high‑school junior, Nicole Nguyen channels her curiosity into sketching, watercolor, and photography while sharpening strategic thinking through competitive video
    gaming, and they thrive on spontaneous, self‑directed projects.
  sports: A casual participant in community swimming lessons and a member of a local youth basketball league, Nicole Nguyen roots for the LSU Tigers football team and the New Orleans Saints, yet they prefer
    strategic esports over field sports, using physical activity mainly as a break from screen time.
  arts: A dedicated member of the after‑school art club, Nicole Nguyen curates indie playlists featuring Phoebe Bridgers, Fleet Foxes, and local folk singer Hurray for the Riff Raff, frequents Ruston gallery
    openings, and they draw inspiration from visual artists like Yayoi Kusama and contemporary illustrator James Jean.
  travel: A weekend road‑trip enthusiast, Nicole Nguyen has explored Austin’s Hill Country, the historic French Quarter of New Orleans, and dreams of wandering the cobblestone streets of Prague, favoring
    spur‑of‑the‑moment sketch‑filled trips over meticulously planned itineraries while they work within a modest family budget.
  culinary: A self‑taught kitchen experimenter, Nicole Nguyen loves whipping up pho broth, bright vegetable stir‑fry with lemongrass, homemade blueberry pancakes, and indulges in crunchy taco salads and
    late‑night pizza slices with extra cheese while they game.
  core: Nicole Nguyen is a curious, art‑obsessed teen who balances spontaneous creativity with competitive gaming, lives in a buttery‑soft haze of disorganization, and they tackle life’s pressures with
    a calm, slightly skeptical edge.
background:
  cultural: 'Nicole grew up in Ruston, a small town in north‑central Louisiana with a predominantly White, middle‑class population. Her family’s traditions blend classic Southern hospitality—church gatherings,
    family barbecues, and high school football Saturdays—with an openness to broader cultural influences brought by her curiosity for art and media. She enjoys regional dishes like gumbo and jambalaya,
    which reflect the multicultural culinary heritage of the area, while also exploring international cuisines through cooking videos online. The local community emphasizes close‑knit relationships, neighborly
    support, and a love of outdoor activities such as fishing and hiking in nearby pine forests. This Southern backdrop, combined with her exposure to global art trends via the internet, shapes her worldview:
    rooted in community values yet eager to explore ideas beyond her hometown.'
