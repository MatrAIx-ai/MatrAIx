  career_goals: Elena aims to transition into a senior supervisory role where she can design and implement a facility‑wide preventive‑maintenance program that reduces downtime and energy consumption. She
    plans to earn certifications such as the NATE HVAC certification and an OSHA safety officer credential. Over the next five years she hopes to mentor a new cohort of technicians, champion sustainability
    initiatives like retrofitting lighting and heating systems, and eventually move into a part‑time consulting capacity that lets her share her practical expertise with small businesses in the Finger Lakes
    region.
