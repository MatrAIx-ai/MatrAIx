  career_goals: Virgilia aims to advance to a regional director position where she can champion sustainable logistics practices and integrate emerging technologies such as automation and predictive analytics
    into the distribution network. She also plans to obtain the Certified Supply Chain Professional credential and to mentor emerging talent within her organization, fostering a culture of continuous improvement
    while maintaining a healthy work‑life balance for her family.
