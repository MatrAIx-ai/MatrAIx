  hobbies: '[''Reading non-fiction (history, personal development)'', ''Cooking traditional Mexican recipes'', ''Watching Mexican soccer (Liga MX, MLS)'', ''Cycling'', ''Hiking local trails'', ''DIY home‑improvement
    projects'', ''Playing strategy video games'']'
  career_goals: He aims to progress from an office clerk to a supervisory role such as Office Manager or Administrative Coordinator within the next five years. To achieve this, he plans to complete an associate
    degree in Business Administration and obtain the Certified Administrative Professional (CAP) credential. He also seeks to sharpen his data‑analysis abilities in Excel and learn basic project‑management
    tools, positioning himself to lead a small team and streamline office operations. Long‑term, he hopes to secure a stable, well‑compensated position that offers benefits and the possibility of home ownership,
    while maintaining a predictable work routine that aligns with his preference for structure.
