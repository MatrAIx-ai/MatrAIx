  career_goals: Lanaya aims to progress into a senior managerial role within the claims department, eventually overseeing a team of adjusters and developing streamlined claim-processing protocols that balance
    efficiency with claimant empathy. She plans to obtain CPCU certification and specialized training in catastrophe claims to become a subject‑matter expert on hurricane-related losses, which are prevalent
    in Florida. Additionally, she hopes to mentor newer adjusters, champion mental‑health initiatives in the workplace to address anxiety and stress, and eventually transition into a risk‑management consulting
    role where she can leverage her investigative expertise to advise businesses on insurance preparedness.
