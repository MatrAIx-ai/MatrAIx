personas:
  professional: Lanaya Mann is a meticulous property insurance claims adjuster who leverages their humanities background and structured workflow to investigate damage, interpret policy language, and negotiate
    fair settlements, while their cooperative nature and heightened anxiety drive them to double‑check every detail and prioritize claimant empathy.
  sports: Lanaya Mann stays active by walking the Jacksonville shoreline three times a week, attending a local yoga studio, cheering for the Jacksonville Jaguars on Sundays, and while they occasionally
    join a community beach‑volleyball league, they blend low‑impact exercise with light competitive spirit.
  arts: Lanaya Mann nurtures their humanities roots through avid reading of historical fiction by Ken Follett and Hilary Mantel, attending Jacksonville Theatre Company productions, and they often crochet
    while listening to the folk melodies of Alison Krauss, which together weave a comforting artistic tapestry into their daily rhythm.
  travel: Lanaya Mann prefers low‑stress road trips, often taking weekend drives to historic Savannah and Charleston for guided tours, while dreaming of a spring pilgrimage to the gardens of Kyoto and a
    leisurely cruise through the Florida Keys, and they balance their love of nature photography, culinary curiosity, and cultural immersion on each journey.
  culinary: Lanaya Mann, a confident home cook, delights in crafting Southern comfort classics such as crispy fried chicken, shrimp and grits seasoned with smoked paprika, and buttery cornbread, while they
    also experiment with heirloom tomatoes, fresh basil, and a garden‑to‑table salad, often sharing their creations on evenings when they host friends and bring out hand‑crocheted placemats.
  core: Lanaya Mann blends meticulous structure with a gentle, community‑focused heart, and they juggle perpetual anxiety, a love for garden‑to‑plate cooking, historical tales, and an ever‑present crochet
    hook that never stays idle.
background:
  cultural: Lanaya grew up in a middle‑class, white family in suburban Jacksonville, influenced by the Southern hospitality and community‑oriented values typical of the region. Her upbringing emphasized
    respect for tradition, church involvement, and participation in local events. Exposure to the arts through school theater programs and a family love of literature fostered her humanities education.
    While she appreciates the region's warm, relaxed lifestyle, she also embraces Jacksonville's growing cultural diversity and progressive arts scene, which inform her cooperative and harmonious outlook.
