personas:
  professional: George Mcclinton, an 11‑year‑old aspiring programmer and LEGO architect, channels their disciplined, routine‑loving nature into creating intricate Scratch games and meticulously engineered
    brick structures, aiming to master coding fundamentals and win the regional LEGO robotics competition.
  sports: George Mcclinton, a dedicated member of the Bakersfield Youth Basketball League, drills daily with his friends, idolizes LeBron James and follows the Los Angeles Lakers, while also cheering for
    the local Bakersfield baseball team and proudly displays a freshly‑opened rookie card in his room.
  arts: George Mcclinton, an avid lover of classic R&B and contemporary hip‑hop, spends weekends listening to legends like Marvin Gaye and new artists such as Kendrick Lamar, while channeling that rhythm
    into LEGO storytelling and occasionally attempts to create simple rap verses for fun, and they attend the church’s annual gospel choir showcase.
  travel: George Mcclinton, a budding space enthusiast, has visited the California Science Center and the nearby desert observatory, dreams of exploring the Kennedy Space Center, and prefers road trips
    with family that balance scheduled museum stops with spontaneous detours to local skate parks.
  culinary: George Mcclinton enjoys homemade tacos with seasoned ground beef, spicy chicken wings, and the occasional pepperoni pizza, can confidently whip up a basic grilled cheese and cereal parfait,
    and loves experimenting with crunchy trail‑mix recipes that include pretzels, dried mango, and chocolate chips.
  core: George Mcclinton is a routine‑driven, achievement‑focused 11‑year‑old who balances meticulous LEGO engineering with competitive basketball, manages a disciplined allowance, and navigates life’s
    challenges with a skeptical yet resilient edge.
background:
  cultural: Raised in a Black family in Bakersfield, California, George's upbringing blends Southern-California cultural influences with African-American traditions. He participates in community church
    events, enjoys music ranging from classic R&B to contemporary hip-hop, and values family gatherings that emphasize respect, perseverance, and practical achievement.
