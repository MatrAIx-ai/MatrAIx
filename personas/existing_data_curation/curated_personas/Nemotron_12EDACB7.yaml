personas:
  professional: Ray Hernandez, a retired mechanical engineer with 35 years of experience in SolidWorks, CNC programming, and ISO‑9001 quality assurance, now mentors young makers, offers pro‑bono renewable‑energy
    consulting, and is pursuing residential solar‑panel certification while authoring a step‑by‑step DIY home‑improvement guide.
  sports: Ray Hernandez hikes weekly with the Burlington Trails Club, snowshoees and cross‑country skis in winter, supports the University of Vermont Catamounts basketball team, and occasionally joins a
    local senior curling league that meets at the community center.
  arts: Ray Hernandez performs in a community theater troupe, enjoys stage roles ranging from classic Arthur Miller dramas to lighthearted comedies, and is a dedicated fan of folk‑rock duo The Avett Brothers,
    often humming their songs while building model railroads.
  travel: Ray Hernandez prefers organized road trips to historic towns like St. Augustine and Newport, has visited Acadia National Park for fall foliage, dreams of trekking the Canadian Rockies, and balances
    travel with a modest budget by booking off‑season cabin rentals.
  culinary: Ray Hernandez delights in cooking maple‑glazed salmon, apple‑cinnamon crumble, and homemade sourdough bread, uses fresh herbs from the community garden, and often experiments with fermenting
    vegetables, though they sometimes over‑salt their soups in the pursuit of flavor.
  core: Ray Hernandez blends methodical engineering precision with a love for group activities, never misses a weekly bridge game, and can be found tapping maple trees each spring while jotting down notes
    for their next DIY guide.
background:
  cultural: Ray is a white American with a Hispanic surname, reflecting a family history that blends Midwestern European roots with ancestors who migrated from the Southwest. Raised in a stable, middle‑class
    suburb of upstate New York, he internalized New England values of punctuality, self‑reliance, and community stewardship. After moving to Burlington for college, he embraced the state's strong environmental
    ethic, participating in local conservation efforts and seasonal traditions such as maple‑syrup harvests and farmers‑market festivals. His cultural identity is anchored in the modest, cooperative spirit
    of Vermont while honoring occasional family celebrations of Hispanic heritage, creating a personal mosaic of American and Latino influences.
attributes:
  skills: '["Mechanical design (SolidWorks, AutoCAD)", "CNC programming and operation", "Quality assurance & ISO 9001 compliance", "Project planning and scheduling (Gantt charts)", "Statistical process
