persona_description: 'Amanda E. Herbert is a historian specializing in the study of food, gender, and health in the early modern period. She is the Associate Director at the Folger Institute of the Folger
  Shakespeare Library, where she runs the Fellowships Program. Her research interests include the history of the body, gender and sexuality, and the social and cultural aspects of food and drink. She has
  written about topics such as the history of the body, the experiences of enslaved foodworkers, and the social cohesion of eating together. Her second book, Spa Medicine and Body Politics in the British
  Atlantic, considers premodern mineral springs as early sites of public health. She is an editor for The Recipes Project, a Digital Humanities/HIST-STEM effort, and a co-director for Before ‘Farm to Table’:
  Early Modern Foodways and Cultures, a $1.5 million Mellon Foundation initiative in collaborative research at the Folger Institute. She is currently working on a book entitled Leftovers: The Afterlives
  of Early Modern Food.'
