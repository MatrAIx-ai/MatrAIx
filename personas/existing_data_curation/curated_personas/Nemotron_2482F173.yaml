personas:
  professional: Vivian Ali, a budding business analyst, blends an analytical knack for Excel pivot tables and emerging data‑visualization tools with a natural flair for stakeholder communication, turning
    community‑service data into clear, actionable reports while they occasionally wrestle with a relaxed approach to deadlines.
  sports: Vivian Ali, a 19‑year‑old athlete, dominates pick‑up basketball games at Tallahassee’s community parks, follows the Florida State Seminoles men’s basketball and the Miami Heat, adds hip‑hop and
    Latin dance classes to stay fit, and they join a local running club that meets for weekend jogs along the St. John’s River.
  arts: Vivian Ali, an avid music lover, fills their playlists with R&B icons like H.E.R. and Anderson .Paak, cues up neo‑soul classics from Erykah Badu, and they regularly attend Tallahassee’s spoken‑word
    nights featuring emerging poets such as Maya Murray.
  travel: Vivian Ali, an enthusiastic road‑tripper, often packs a cooler and heads to Clearwater Beach or the cultural streets of New Orleans for weekend getaways, embraces spontaneous itineraries while
    they keep costs low through student discounts and shared rides.
  culinary: Vivian Ali, a budding home chef, perfects Southern soul‑food staples like fried chicken, collard greens, and shrimp‑and‑grits, seasoning with smoked paprika and hot sauce, and they love sharing
    their dishes at neighborhood potlucks and the city’s bustling food‑truck festivals.
  core: Vivian Ali, 19, fuses a restless curiosity with a relaxed vibe, turning community data into stories while dancing through social beats, even if they occasionally misplace their planner.
background:
  cultural: Vivian identifies as African American and grew up in a close‑knit, church‑centered family in Tallahassee. Her upbringing emphasized community service, resilience, and the celebration of Black
    heritage—marked by observances of Juneteenth, Black History Month, and local cultural festivals that blend Southern traditions with contemporary Black arts. She draws inspiration from the vibrant Black
    community surrounding Florida A&M University and the historic neighborhoods of Leon County, which have shaped her perspectives on leadership, solidarity, and social responsibility. This cultural foundation
    informs her commitment to uplift her community through data‑driven initiatives and mentorship for other young Black women.
attributes:
  skills: '[''Data entry'', ''Excel (including pivot tables and basic macros)'', ''Basic statistical analysis'', ''Data visualization (charts and simple dashboards)'', ''Report writing'', ''Project coordination'',
