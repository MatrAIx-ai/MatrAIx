  hobbies: '[''Hip‑hop and Latin dance classes'', ''Pick‑up basketball games'', ''Volunteer work (church youth programs, city festivals)'', ''Cooking and sharing Southern soul‑food'', ''Listening to R&B,
    hip‑hop, and neo‑soul music'', ''Attending live concerts and local music gigs'', ''Exploring coffee shops and food trucks'', ''Podcast listening (business, self‑development, true‑crime)'', ''Weekend
    road trips to beaches and cultural events'', ''Participating in multicultural festivals'']'
  career_goals: Vivian aims to formalize her analytical foundation by completing an associate’s degree and then a bachelor’s in Business Administration or Management Information Systems at a nearby university.
    She plans to earn certifications such as Microsoft Power BI and a project‑management credential (CAPM or PMP) within the next three years. Professionally, she sees herself progressing from junior management
    analyst to senior analyst or business consultant, ideally focusing on community‑development projects that improve municipal services in Tallahassee. Long‑term, she hopes to lead a multidisciplinary
    team that designs data‑driven solutions for local government and nonprofit initiatives, while also mentoring other young women of color entering the field.
