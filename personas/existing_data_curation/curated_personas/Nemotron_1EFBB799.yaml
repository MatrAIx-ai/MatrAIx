  hobbies: '[''Hiking'',''Cross‑Country Skiing'',''Dog‑Sledding'',''Wildlife Photography'',''Woodworking'',''Competitive Chess'',''Reading Non‑Fiction'',''Adult Literacy Volunteering'',''Attending Indigenous
