personas:
  professional: Brooks Lumsden is a veteran post‑secondary educator who designs interdisciplinary, field‑based curricula blending environmental studies, indigenous knowledge, and experiential learning,
    while leveraging data‑driven assessment, grant writing, and faculty mentorship to pursue tenure and a future department chair role.
  sports: Brooks Lumsden is an avid hiker, cross‑country skier, and dog‑sledder who races with the Anchorage Dog Sled Club, participates in the local ski league, and avidly supports the Alaska Aces hockey
    team while keeping a seasonal membership at the Fairbanks Ice Dogs fan club.
  arts: Brooks Lumsden pursues wildlife photography inspired by Ansel Adams and Michael Melford, attends indigenous powwows to study traditional crafts, collects recordings of Fleet Foxes and Joni Mitchell,
    and occasionally sketches alpine landscapes in a leather‑bound sketchbook.
  travel: Brooks Lumsden prefers immersive travel to rugged destinations, having trekked Denali National Park, explored the Kenai Peninsula, and backpacked Norway’s Lofoten Islands, while planning a future
    expedition to Patagonia’s Torres del Paine for a combined research‑photography project.
  culinary: Brooks Lumsden favors wild‑caught salmon, reindeer stew, and birch‑syrup glazed carrots cooked over a wood‑burning stove, experiments with cedar‑plank grilling and spruce‑tip infusion, yet often
    neglects meal timing and indulges in strong coffee during late‑night grading.
  core: Brooks Lumsden, a data‑driven educator and seasoned outdoorsman, balances rigorous research with frontier exploration, but can be stubbornly competitive at chess and occasionally forgets to water
    indoor potted plants.
background:
  cultural: Brooks is a white American of mixed European ancestry, raised in the Midwest before relocating to Anchorage for his academic career. His upbringing emphasized self‑reliance, practical problem‑solving,
    and a respect for individual achievement, values that align with his competitive and skeptical personality. Living in Alaska has immersed him in a frontier culture that blends rugged outdoor lifestyles
    with a deep respect for indigenous communities. He embraces the state’s ethos of adaptability and communal support while maintaining his own personal ambitions, reflecting a synthesis of mainstream
    American individualism and the collaborative spirit of Alaska’s smaller, tightly‑knit societies.
