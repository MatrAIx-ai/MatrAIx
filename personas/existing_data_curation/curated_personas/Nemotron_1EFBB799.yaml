  career_goals: Brooks aims to secure tenure and advance to a department chair position where he can shape the strategic direction of the education program. He plans to develop a flagship interdisciplinary
    concentration that merges environmental studies, indigenous knowledge, and experiential pedagogy, positioning the institution as a leader in Arctic higher education. Over the next five years, he intends
    to obtain major research funding to investigate the impact of outdoor experiential learning on student outcomes, publish his findings in peer‑reviewed journals, and influence state education policy
    on remote learning. Mentoring junior faculty and expanding professional development workshops for instructors are also central to his long‑term vision.
