personas:
  professional: Herma Guesnon is a seasoned accountant and auditor with deep expertise in financial reporting, tax compliance, and risk assessment, who leverages advanced Excel, data analytics, and ERP
    systems to streamline processes while mentoring junior staff, and they bring a sociable, talkative flair to client presentations, making complex numbers relatable and fostering collaborative decision-making.
  sports: Herma Guesnon enjoys weekend hikes on the Umstead State Park trails, regularly meets with the Raleigh Trailblazers Hiking Club, follows the Carolina Hurricanes (NHL), the Carolina Panthers (NFL),
    and the North Carolina Tar Heels men's basketball team, plays occasional softball in the church league, and balances moderate cardio with yoga and stretching to maintain flexibility as they age.
  arts: Herma Guesnon sings lead alto in the St. John's Methodist choir, where they relish gospel classics by Mahalia Jackson and contemporary soul from H.E.R., frequently attends performances at the Duke
    Energy Center for the Performing Arts—including the Raleigh Symphony Orchestra and local jazz nights featuring Gregory Porter—while devouring contemporary fiction by Colson Whitehead and memoirs such
    as 'The Glass Castle', and they find inspiration for both their financial presentations and weekend cooking.
  travel: Herma Guesnon plans trips with spreadsheet precision, opting for extended weekend road trips to Savannah, Charleston, and the Blue Ridge Parkway, enjoys cultural festivals in Trinidad and Tobago
    that echo their Caribbean culinary flair, has toured New Orleans for jazz and Creole cuisine, and harbors a dream of a month-long sabbatical on the Amalfi Coast, all while balancing family commitments
    and a modest travel budget.
  culinary: Herma Guesnon delights in crafting Southern comfort foods with Caribbean twists - think fried chicken seasoned with jerk rub, collard greens simmered with Scotch bonnet peppers, sweet-potato
    pie infused with coconut milk, and shrimp-and-grits topped with mango salsa - using fresh ingredients from the Raleigh farmers market like okra, plantains, and smoked paprika, while their skill level
    ranges from confident home-cook to occasional experimenter with more complex spice blends.
  core: Herma Guesnon merges meticulous financial acumen with a talkative, community-centric spirit, seasoning life with Southern-Caribbean cuisine, choir harmonies, and a love for hiking, yet they sometimes
    overcommit to workshops and forget to schedule personal downtime.
background:
  cultural: Herma is an African‑American woman who grew up in the South, deeply rooted in the traditions of family, community, and church that characterize Black culture in North Carolina. She celebrates
    Juneteenth, honors the legacy of the civil‑rights movement, and actively engages with local Black professional networks such as the North Carolina Black Accountants Association. Her upbringing instilled
    values of collectivism, resilience, and storytelling, which she carries into her professional life through mentorship, community service, and a commitment to fostering inclusive workplaces. Living in
    Raleigh, she blends Southern hospitality with the growing dynamism of the city's Black cultural scene, drawing strength from both her heritage and the vibrant, diverse community around her.
attributes:
  skills: '[''Financial Reporting'', ''Tax Compliance'', ''Internal Controls'', ''Risk Assessment'', ''Advanced Excel'', ''Data Analytics'', ''ERP Implementation (SAP, Oracle, NetSuite)'', ''Audit Methodology'',
    ''Regulatory Knowledge (GAAP, IFRS, SOX)'', ''Process Improvement'', ''Team Leadership'', ''Public Speaking'', ''Client Relationship Management'', ''Mentoring and Coaching'']'
  hobbies: '[''Cooking Southern and Caribbean cuisine'', ''Singing in a church choir'', ''Volunteering for financial‑literacy workshops'', ''Reading contemporary fiction and business leadership books'',
    ''Hiking in Umstead State Park'', ''Gardening'', ''Attending cultural festivals'', ''Participating in professional networking events'']'
  career_goals: Herma aims to progress into senior finance leadership, such as Finance Director or Chief Financial Officer, within a midsize company or regional audit firm where she can shape strategic
    financial decisions and champion digital transformation. She is passionate about promoting diversity and inclusion in the accounting profession, mentoring the next generation of Black women accountants,
    and eventually launching a boutique consultancy focused on financial literacy and sustainable business practices for community nonprofits. She also aspires to become a recognized speaker at industry
    conferences and contribute thought leadership on the intersection of technology, ethics, and financial stewardship.
