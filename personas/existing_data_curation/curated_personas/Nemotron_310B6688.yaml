personas:
  professional: Ramona Mcbee, a senior HR strategist with two decades of managerial experience, designs systematic workforce plans and DEI initiatives, and they consistently rely on data-driven policies
    to foster a resilient, compliant organization.
  sports: Ramona Mcbee, an avid cross‑country skier and snowshoe enthusiast, trains with the Park City Nordic Ski Club, follows the Utah Jazz and Colorado Avalanche, and they also play bridge competitively,
    balancing active winter workouts with indoor mental sport.
  arts: Ramona Mcbee, a dedicated quilt maker and photography hobbyist, creates intricate patchwork patterns inspired by Ansel Adams' landscapes and the folk songs of Gillian Welch, and they actively attend
    Park City arts & crafts fairs, where they admire the works of local ceramicist Samantha Clay.
  travel: Ramona Mcbee, a meticulous planner, prefers organized road trips to national parks such as Yellowstone and Grand Teton, often travels with their book club to historic sites like Williamsburg,
    and they cherish occasional ski trips to Whistler and cultural visits to Edinburgh during the summer.
  culinary: Ramona Mcbee, a home cook who favors hearty, nutritious meals, regularly prepares quinoa salads with native sage, bison stew seasoned with juniper berries, and they occasionally bake apple pie
    for food bank fundraisers, though they have a habit of over‑salting dishes when experimenting.
  core: Ramona Mcbee, a methodical HR veteran whose love for order fuels their quilting, hiking, and careful financial stewardship, yet they occasionally over‑commit to volunteer projects, balancing calm
    resilience with a penchant for detailed planning.
background:
  cultural: Ramona grew up in a middle-class, suburban community in the Midwest, where values of hard work, self-reliance, and civic engagement were emphasized. Her family celebrated traditional American
    holidays, attended a non-denominational church, and placed a strong priority on education and community service. After moving to Park City two decades ago, she adopted elements of mountain-town culture,
    including a deep appreciation for outdoor recreation, environmental stewardship, and support for local arts. This blend of Midwestern pragmatism and Utah’s outdoor-centered lifestyle informs her worldview
    and daily practices.
