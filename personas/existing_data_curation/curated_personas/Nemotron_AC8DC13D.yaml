personas:
  professional: An experienced retired educator, Emily Ladun channels decades of curriculum design, grant‑writing, and mentorship expertise into senior‑teacher mentoring programs, adult‑learning workshops
    at the community college, and the documentation of Rock Springs oral history, balancing her innate love of structure with occasional spontaneous project pivots.
  sports: Emily Ladun enjoys gentle hikes across the Red Desert and Wind River ranges, participates in the Red Desert Trail Club’s seasonal walks, follows the Wyoming Cowboys football team and the Cheyenne
    Frontier Days rodeo with enthusiastic loyalty, and practices low‑impact cross‑country walking in spring, favoring steady activity over competitive sports.
  arts: Emily Ladun spends afternoons quilting with modern color palettes inspired by William Morris, reads historical fiction by Hilary Mantel and poetry by Mary Oliver in her book club, regularly attends
    community‑theater productions starring local talent like John Peters, and listens to folk classics by Joan Baez while sipping tea.
  travel: Emily Ladun prefers structured road‑trip itineraries—such as her planned spring visit to Grand Teton National Park—combined with spontaneous detours to historic towns like Cody, and dreams of
    a genealogical pilgrimage to Cornwall, England, after saving for a modest overseas journey.
  culinary: Emily Ladun delights in garden‑to‑table cooking, often preparing heirloom tomato salads with fresh basil, zucchini ratatouille, and a signature rhubarb crumble, while their moderate kitchen
    skills are complemented by occasional indulgences at the local diner’s chicken pot pie on rainy afternoons.
  core: Emily Ladun blends disciplined mentorship, spontaneous garden bursts, and quiet quilting sessions into a life marked by practical kindness, occasional deadline forgetfulness, and an unwavering love
    for community.
background:
  cultural: Emily is a White American whose family traces its roots to German and Irish immigrants who settled in the Midwest before moving westward during the early 20th‑century oil boom. Raised in a modest,
    close‑knit community in Wyoming, she values self‑reliance, respect for nature, and community service. Her Protestant upbringing and long career in education have fostered a practical, grounded worldview
    while encouraging lifelong learning and intergenerational connection.
