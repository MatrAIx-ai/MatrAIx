  career_goals: Although retired, Emily aims to stay engaged by mentoring new teachers through a senior‑teacher mentorship program, supporting adult‑learning workshops at the community college, and documenting
    the oral history of Rock Springs for a local publication. She also hopes to expand the intergenerational reading program at the public library, fostering literacy and community ties across ages.
