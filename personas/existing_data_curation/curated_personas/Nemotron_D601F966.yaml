  hobbies: '[''painting and sketching'', ''playing acoustic guitar'', ''basketball (pickup games)'', ''hiking and fishing'', ''reading science fiction'', ''listening to indie and blues music'', ''digital
    graphic design'', ''attending community festivals and art fairs'']'
  career_goals: Tony aims to become a warehouse supervisor within the next few years by earning OSHA certification and completing an associate degree in logistics or supply‑chain management. He wants to
    deepen his expertise in workflow optimization and eventually launch his own consulting firm that blends efficient freight operations with innovative packaging design. Long‑term, he envisions mentoring
    youth in his community, helping them develop practical job skills while encouraging creative problem‑solving.
