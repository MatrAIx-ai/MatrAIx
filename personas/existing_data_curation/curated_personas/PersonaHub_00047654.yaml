persona_description: A historian and archaeologist who specializes in the study of ancient civilizations in the New World, particularly those found in Peru. They have made significant contributions to the
  field through their groundbreaking research on the emergence of civilization in the region. They have published a paper in the scientific journal Nature that provides compelling evidence that the oldest
  terraced structures at Norte Chico were built about 3000 B.C., making them the oldest known civilization in the New World. Their work has sparked a reevaluation of course syllabuses and has provided a
  new understanding of the complex social and economic factors that led to the emergence of civilizations in the region.
