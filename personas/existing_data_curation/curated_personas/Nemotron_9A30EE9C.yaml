personas:
  professional: An aspiring visual storyteller, Deysi Trelles blends traditional sketching with digital painting on a tablet, experimenting with simple coding projects to create interactive art pieces,
    while balancing school assignments with a disciplined, self‑imposed schedule that reflects their curiosity and competitive drive.
  sports: A member of the local park’s junior jogging club, Deysi Trelles favors early‑morning runs along the river trail, follows the city’s professional soccer team, the River Hawks, and occasionally
    joins a weekend badminton session at the community center, viewing fitness as a solitary challenge rather than a social activity.
  arts: Deysi Trelles immerses themselves in indie folk playlists featuring Sufjan Stevens and traditional Mexican harp music while sketching, draws inspiration from graphic novel artists like Junji Ito
    and the lyrical poetry of Pablo Neruda, and attends virtual museum tours of surrealist exhibitions, which fuel their magical‑realism writing habit.
  travel: Preferring low‑key exploration, Deysi Trelles has taken day trips to the historic town of San Miguel to photograph colonial architecture, dreams of visiting the cherry‑blossom festivals in Kyoto,
    and plans a budget‑friendly backpacking adventure through the Andes, always mapping routes on a digital planner and packing a sketchbook for spontaneous drawing sessions.
  culinary: An experimental home cook, Deysi Trelles enjoys making avocado toast with a sprinkle of cotija cheese, practices simple ramen broth recipes with miso and dried shiitake, and frequently orders
    spicy chilaquiles on weekends, though they sometimes forget to finish a dish before moving on to the next sketch.
  core: Deysi Trelles is a solitary, curiosity‑driven teen who transforms artistic obsession into disciplined creativity, balancing meticulous budgeting with occasional impulsive splurges, while navigating
    mild health quirks and a competitive streak that fuels personal growth.
background:
  cultural: Deysi comes from a Mexican‑American family rooted in the traditions of central Mexico while growing up in Spring, Texas. Spanish is spoken at home, and she celebrates cultural holidays such
    as Día de los Muertos and Mexican Independence Day with family‑made altars, traditional foods, and music. Her artistic sensibility is shaped by Mexican folk art—bright colors, papel picado, and Talavera
    patterns—which she often incorporates into her own work. At the same time, she navigates the bicultural experience of a suburban Texas environment, blending Texan influences with her heritage in both
    her language use and creative expression.
