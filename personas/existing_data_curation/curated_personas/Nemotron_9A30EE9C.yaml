  career_goals: Deysi aspires to study visual arts or graphic design at a university, with the long‑term ambition of becoming a freelance illustrator and cultural storyteller who integrates Mexican heritage
    into contemporary digital media. She dreams of curating an online gallery that showcases emerging Latinx artists and eventually working with museums to develop interactive exhibits that blend technology
    and traditional Mexican art forms. In the short term, she plans to build a robust portfolio, participate in youth art competitions, and secure an internship at a local design studio to gain professional
    experience.
