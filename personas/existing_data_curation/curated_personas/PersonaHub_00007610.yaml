persona_description: A landscape architect with the U.S. Army Corps of Engineers, Darrell Stone, who is responsible for maintaining the grass surrounding the Buford Dam powerhouse at Lake Lanier. Stone
  is skilled in feeding goats to maintain the land surrounding the dam and has been doing so for over three decades. His expertise lies in the use of goats to maintain grassland, which has saved the federal
  agency money and provided a natural habitat for the goats. Stone's work has been praised for its efficiency and effectiveness.
