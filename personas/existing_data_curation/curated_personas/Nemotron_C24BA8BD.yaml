  hobbies: '[''soccer'', ''dancing to Mexican folk music'', ''drawing and coloring'', ''LEGO building'', ''reading picture books'', ''helping in the kitchen'', ''organizing and leading group games'', ''participating
    in community festivals'']'
  career_goals: Andres dreams of becoming someone who helps people and shares knowledge. He often talks about being a teacher because he loves explaining things to his friends, a community firefighter who
    can protect his neighborhood, or a storyteller who performs in school assemblies. His goal is to keep learning, stay organized, and use his friendly nature to make others feel included.
