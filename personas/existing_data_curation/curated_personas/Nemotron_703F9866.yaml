  hobbies: '["Gardening", "Reading (classics, biographies, mysteries)", "Knitting and crocheting", "Birdwatching", "Walking along Arkansas River Trail", "Volunteering at local food bank"]'
  career_goals: As she approaches retirement, Anja aims to transition to a part‑time senior administrative role that leverages her experience while giving her greater flexibility. She plans to earn a Certified
    Administrative Professional (CAP) credential to formalize her skill set. Her ambition includes mentoring younger clerical staff within her organization or at a local community college, sharing best
    practices for efficient office management. Anja also hopes to use her organizational strengths to support small teams in a health clinic or school district in La Junta, focusing on maintaining smooth
    daily operations, improving record‑keeping procedures, and ensuring compliance with regulatory standards.
