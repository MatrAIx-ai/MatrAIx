  career_goals: Kelly aims to advance from her current supervisory role to a regional security director position within the next five years, leveraging emerging technologies such as AI‑enhanced surveillance
    and predictive analytics to modernize security protocols. She plans to earn the Certified Protection Professional (CPP) credential and to lead a cross‑functional team that integrates security with business
    continuity planning. Additionally, she is passionate about mentoring younger women in the security field, establishing a mentorship program at her company, and eventually launching a boutique consulting
    practice that advises small businesses on cost‑effective security strategies. As she approaches retirement, she intends to transition to a part‑time advisory role that balances professional fulfillment
    with reduced stress.
