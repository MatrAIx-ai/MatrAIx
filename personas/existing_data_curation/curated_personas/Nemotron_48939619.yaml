personas:
  professional: Donna Proctor, a ten‑year‑old budding scientist, blends curiosity with practicality by designing simple kitchen‑lab experiments, organizing her LEGO inventions methodically while staying
    flexible enough to improvise when a trial goes awry.
  sports: Donna Proctor, a member of the local Under‑11 River Rapids soccer team and the neighborhood bike club, spends afternoons mastering dribbling drills, cheering for the U.S. Women’s National Soccer
    Team, and riding her bike on the paved trail behind the community park.
  arts: Donna Proctor channels her love for adventure novels like the Percy Jackson series into drawing comic‑style heroes inspired by Stan Lee, while humming along to Imagine Dragons and swapping favorite
    Disney movie moments with friends.
  travel: Donna Proctor’s travel style mixes backyard exploration with family road trips to places like Yellowstone National Park and the prairie park at Walnut Creek, favoring hands‑on nature hikes over
    long flights, and dreaming of a future visit to the Grand Canyon.
  culinary: Donna Proctor prefers bright, easy meals such as homemade pizza topped with pepperoni and pineapple, snackable carrot sticks with hummus, and frequently whips up strawberry‑banana smoothies,
    though she often burns the cheese when multitasking between LEGO builds and experiments.
  core: Donna Proctor is a ten‑year‑old explorer who balances relentless curiosity with practical organization, juggling LEGO engineering, backyard science, and a secret stash of glitter pens that never
    quite stay in their case.
background:
  cultural: Donna Lynn was raised in a middle‑class white family in Lincoln, Nebraska. Her upbringing reflects Midwestern values of friendliness, modesty, and community involvement. Family traditions include
    celebrating Thanksgiving and the Fourth of July with picnics and barbecues, attending a local church on Sundays, and participating in school and neighborhood events such as the Lancaster County fair.
    The surrounding prairie landscape, cornfields, and nearby Sandhills shape her appreciation for nature and outdoor activities.
