  career_goals: Inspired by his love for helping others and exploring the world, Jose often talks about becoming a firefighter or a community protector who can keep his neighborhood safe. He also expresses
    fascination with marine life after visiting the New England Aquarium, hinting at a future ambition to study marine biology. These goals blend his curiosity about new ideas with a practical desire to
    serve and protect, reflecting his balanced personality.
