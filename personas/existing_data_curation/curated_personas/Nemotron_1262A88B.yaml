personas:
  professional: Jose Lima, an eight‑year‑old LEGO enthusiast, approaches each building project with a blend of curiosity and practicality, organizing pieces into precise structures while staying ready to
    improvise new designs, and they often switch between meticulous planning and free‑form creativity, hinting at a future problem‑solver.
  sports: Jose Lima, a member of the Eastside Youth Soccer Club, idolizes the play style of FC Barcelona while cheering for the local MLS team Metro FC, carries a well‑worn soccer ball to the park every
    afternoon, and they balance organized team drills with spontaneous pick‑up games, developing both teamwork and personal flair.
  arts: Jose Lima, an avid comic‑book reader and budding cartoonist, draws original characters inspired by heroes like Spider‑Man, while listening to reggaeton beats from Bad Bunny and salsa rhythms from
    Celia Cruz, and they often imagine turning their sketches into animated shorts during quiet moments.
  travel: Jose Lima, who prefers family‑planned trips that combine beach sandcastle building with museum visits, has explored the nearby coastal town of Oceanview and dreams of wandering the historic streets
    of a seaside town and the thrill of Orlando’s theme parks, and they enjoy packing their own snack bag of fruit slices and chips for the journey.
  culinary: Jose Lima, a budding kitchen helper, loves mixing milk, rice, cinnamon, and vanilla to make arroz con leche, adds a pinch of sugar to guava jam on toast, can whip up a simple fruit salad with
    mango and banana, yet they often forget to sweep up the spilled crumbs, embracing both culinary creativity and occasional messiness.
  core: Jose Lima blends a LEGO engineer’s precision with a soccer player’s spontaneity, humming reggaeton while sketching cartoons and stashing spare change under their pillow for the next big set, and
    they often switch between meticulous planning and free‑form play, a quirky balance of order and fun.
background:
  cultural: Jose grows up in a Puerto Rican household in Roslindale, MA, where Spanish is spoken at home and English at school. Family gatherings often feature traditional foods such as pasteles and bacalao,
    and they celebrate cultural holidays like Noche Buena and the Puerto Rican Day Parade in Boston. He participates in community events at the local cultural center that teach bomba and plena rhythms,
    fostering a strong sense of identity. This rich cultural environment shapes his language skills, culinary interests, and appreciation for music and communal celebration.
