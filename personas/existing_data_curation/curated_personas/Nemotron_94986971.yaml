personas:
  professional: Michael Laiter, a budding junior naturalist and LEGO engineer, blends his love of field exploration with precise building skills, using his curiosity and practical mindset to catalog finds
    and redesign LEGO ecosystems while their relaxed, flexible attitude lets them pivot between scientific observation and imaginative play.
  sports: Michael Laiter plays forward for the Blooming Prairie Junior Soccer Club, practicing drills on Saturday mornings, cheering for the Minnesota Twins as their favorite professional team, and joining
    the local park’s summer kickball league, balancing energetic team play with occasional solo sprints in the woods for fun.
  arts: Michael Laiter spends afternoons sketching detailed drawings of insects and rocks he discovers, building elaborate LEGO starships inspired by the Star Wars saga, and enjoying storytime at the library
    where they admire the works of author Rick Riordan, while their playlist includes upbeat Kidz Bop tracks and whimsical Pixar movie scores.
  travel: Michael Laiter loves spontaneous family road trips to nearby attractions like Great River Ridge State Park and the Minneapolis Mall of America, preferring flexible itineraries that let them stop
    for a quick bug hunt or a sudden ice‑cream break, and dreams of visiting the Grand Canyon for its towering cliffs.
  culinary: Michael Laiter favors simple, hands‑on foods such as peanut‑butter‑jelly sandwiches, cheese‑filled pizza slices, and apple slices with caramel dip, enjoys helping their mom stir pancake batter
    on weekends, and is fascinated by the crunchy texture of granola bars, occasionally trying to add a secret sprinkle of cinnamon.
  core: Michael Laiter is a curious, outdoors‑loving 7‑year‑old who blends practical LEGO engineering with spontaneous adventures, while juggling a quirky habit of misplacing their allowance and maintaining
    a gentle, harmonious approach to friends.
background:
  cultural: Michael grew up in Blooming Prairie, a small town in Steele County, Minnesota, where Midwestern values of community, modesty, and cooperation are everyday norms. His family participates in local
    traditions such as the county fair, Fourth of July parades, church gatherings, and seasonal activities like snowball fights and fishing trips. The community’s cultural fabric includes a mix of German,
    Scandinavian, and broader American influences, shaping Michael’s appreciation for teamwork, respect for nature, and a practical, steady approach to life.
