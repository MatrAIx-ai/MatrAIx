  career_goals: Michael often talks about wanting to explore the world and help living things. He dreams of becoming an astronaut who can discover new planets, a wildlife rehabilitator who cares for injured
    animals, or a teacher who shares knowledge with others. He imagines a future where he can combine his love of science, nature, and helping people, and he is eager to keep learning and trying new things.
