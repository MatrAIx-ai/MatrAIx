  hobbies: '[''3D printing'', ''RC car racing'', ''Chess'', ''Cooking South Asian cuisine'', ''Yoga'', ''Hiking'', ''Reading engineering journals'', ''Model building'']'
  career_goals: Riaz aims to earn his Professional Engineer (PE) license within the next two years and advance to a senior mechanical engineer role where he can lead cross‑functional product development
    teams. He is competitive about achieving measurable improvements in efficiency and hopes to spearhead a sustainable‑design initiative that reduces energy consumption in the company's product line. In
    the longer term, he envisions opening a boutique consulting firm that helps midsize manufacturers adopt Industry 4.0 technologies while maintaining rigorous quality standards. Throughout his career
    progression, he seeks a balance that mitigates stress and preserves time for family.
