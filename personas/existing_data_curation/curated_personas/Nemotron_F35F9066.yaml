personas:
  professional: Riaz Acharya is a mechanical engineer who blends deep expertise in SolidWorks, CNC programming, finite-element analysis, and Six Sigma lean practices with a competitive, detail-oriented
    mindset, driving cost-effective product innovations while they meticulously document every step.
  sports: Riaz Acharya is a dedicated RC-car racer at the local Kings Courts track, a regular participant in community-center chess tournaments, a seasonal hiker of the Blue Mountains, and a steadfast fan
    of the Philadelphia Eagles and 76ers, applying the same meticulous tuning mindset to both their hobby vehicles and personal fitness routines, and they often set performance benchmarks for themselves.
  arts: Riaz Acharya finds creative release in listening to A.R. Rahman's film scores, attending occasional performances by the local cultural association's classical dance troupe, and exploring indie cinema
    such as "Moonlight" and "Parasite," while they also appreciate the craftsmanship of vintage mechanical watches.
  travel: Riaz Acharya prefers meticulously planned trips that balance adventure and relaxation, having trekked the Western Ghats in Kerala, explored the historic streets of Bologna, and eagerly awaiting
    a tech-focused tour of Japan's Akihabara district, all while they manage a modest travel budget to accommodate family priorities.
  culinary: Riaz Acharya enjoys cooking traditional dishes like dosai, chicken biryani, and sambar, expertly wielding spices such as cumin, mustard seed, and cardamom, while they also experiment with sourdough
    starter recipes, often pairing meals with homemade chai that blends tea leaves with ginger and clove.
  core: Riaz Acharya balances a methodical, competitive engineering drive with solitary creative hobbies, yet they wrestle with persistent worry and a tendency to micromanage every detail of work and personal
    projects.
background:
  cultural: Riaz is the son of Indian immigrants who settled in Pennsylvania in the early 1990s. Raised in a bilingual household, he grew up speaking English and Tamil at home, celebrating Diwali, Pongal,
    and Thanksgiving with equal enthusiasm. His family places strong value on education, hard work, and respect for elders, which shaped his disciplined work ethic. While he embraces the Mid‑Atlantic lifestyle—enjoying
    outdoor activities and community events—he maintains cultural ties through regular visits to a local Indian cultural association, where he participates in festivals, volunteers in STEM workshops for
    youth, and shares traditional recipes with neighbors.
