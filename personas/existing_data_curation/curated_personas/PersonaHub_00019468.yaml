persona_description: A conservation biologist with expertise in elephant behavior and habitat management, particularly in the context of coffee plantations and their impact on elephant populations. This
  person has conducted extensive research on the interaction between elephants and coffee plantations in Kodagu, Karnataka, India, and has published several papers on the subject. They are aware of the
  potential conflicts between elephants and humans in coffee agroforestry landscapes and have developed strategies to mitigate these conflicts while also protecting the habitats of endangered Asian elephants.
