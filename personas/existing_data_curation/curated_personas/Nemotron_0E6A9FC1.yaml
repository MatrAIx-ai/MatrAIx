personas:
  professional: Tequila Lanoix, an agile-focused project management specialist, blends a curiosity for visual storytelling with data-analysis mastery (Python, SQL, Tableau) and a balanced blend of meticulous
    planning and creative flexibility to steer cross-functional tech-art teams toward innovative outcomes.
  sports: Tequila Lanoix finds balance on the water with weekly paddleboarding sessions at the Intracoastal, attends yoga classes at Fort Lauderdale Flow Studio, supports the Miami Heat and Miami Dolphins,
    and competes in a local adult beach-volleyball league that meets every summer Saturday.
  arts: Tequila Lanoix immerses themselves in contemporary art by visiting exhibitions featuring Yayoi Kusama and Shepard Fairey, attends experimental theater productions by The Public Theater, and draws
    inspiration from speculative fiction author N.K. Jemisin while snapping street-mural photographs for their personal visual journal.
  travel: Tequila Lanoix prefers a hybrid travel style that mixes meticulous itinerary planning with spontaneous day-trips, often weekending in the Florida Keys, exploring the historic streets of New Orleans,
    and dreaming of a future immersion in Lisbon's tiled neighborhoods, balancing a modest travel fund with occasional splurges on unique cultural experiences.
  culinary: Tequila Lanoix enjoys cooking flavorful, spice-forward meals such as grilled chicken with mango salsa, saffron-infused rice, and a lentil stew spiced with cumin and smoked paprika, showcasing
    a confident yet experimental kitchen skill set while regularly dining out at farm-to-table eateries that highlight seasonal produce.
  core: Tequila Lanoix is a data-savvy project leader who fuses art and technology, balances disciplined financial habits with creative spontaneity, and channels curiosity into both professional pursuits
    and a vibrant, habit-filled personal life.
background:
  cultural: Tequila is a Black American with deep roots in the Afro‑Caribbean community of South Florida, drawing on both Southern US and Haitian cultural traditions. She grew up hearing Creole language
    and savoring dishes like gri‑gri and plantains, celebrating Juneteenth, Kwanzaa, and Haitian Independence Day with family. Her artistic sensibility is shaped by African American visual art icons and
    contemporary Caribbean music genres such as jazz, hip‑hop, and zouk. Active in local Black professional networks, she values cultural expression, community uplift, and the intersection of technology
    and the arts as a means of preserving and advancing her heritage.
attributes:
  skills: '[''Project Management (Agile/Scrum)'', ''Stakeholder Engagement'', ''Risk Assessment & Mitigation'', ''Budget & Schedule Management'', ''Data Analysis (Python, SQL, Excel)'', ''Data Visualization
    (Tableau, PowerBI)'', ''Technical Communication'', ''Inclusive Leadership & Mentorship'', ''Collaboration Tools (Jira, Asana, Trello, Microsoft Teams)'', ''Digital Content Creation (Adobe Creative Suite)'']'
  hobbies: '[''Visiting art galleries and street mural tours'', ''Experimental theater and live performances'', ''Speculative fiction reading'', ''Photography (urban & nature)'', ''Yoga and mindfulness
    practice'', ''Paddleboarding and outdoor water activities'', ''Cooking Caribbean-inspired cuisine'', ''Volunteer mentorship for youth in STEM and arts'', ''Participating in hackathons and innovation
    workshops'', ''Attending community storytelling and open mic events'']'
  career_goals: Tequila aims to earn her PMP certification within the next 12 months and transition into a senior program‑manager role overseeing large‑scale interdisciplinary initiatives that fuse technology
    with the arts. She plans to champion diversity and inclusion programs within her organization, mentor emerging Black women in STEM, and eventually launch her own consultancy focused on culturally resonant
    tech‑driven projects for community arts institutions. Long‑term, she envisions influencing policy that expands equitable access to STEM and creative education in South Florida.
