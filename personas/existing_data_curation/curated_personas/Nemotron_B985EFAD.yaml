personas:
  professional: Dana Webley is a disciplined teen visual artist who blends traditional charcoal sketches with digital painting in Procreate and Photoshop, curates self‑directed virtual exhibitions, and
    uses Notion to meticulously plan projects while they confidently present concise art analyses to small peer groups.
  sports: Dana Webley follows the New York Knicks and Yankees with avid fandom, squeezes in early‑morning runs through the Ridgefield Nature Preserve and weekly yoga sessions at a nearby studio, and joins
    a seasonal intramural basketball league at their high school, and they balance solo endurance work with low‑key team play.
  arts: Dana Webley immerses in contemporary art; they devour texts on Yayoi Kusama, James Turrell, and Olafur Eliasson, attend weekly workshops at the Ridgefield Playhouse, curate virtual shows featuring
    works inspired by Banksy and Damien Hirst, and find creative resonance in music by Radiohead, Björk, and Sufjan Stevens, which often scores their sketching sessions.
  travel: Dana Webley prefers meticulously planned art‑focused getaways; they spend long weekends exploring New York City’s MoMA and the Whitney, dream of a spring pilgrimage to Paris’s Louvre and Musée
    d’Orsay, and save for a future solo trip to Kyoto’s contemporary art scene, all while balancing modest family finances and school commitments.
  culinary: Dana Webley enjoys solo cooking experiments; they whip up miso ramen with shiitake mushrooms, assemble avocado toast sprinkled with feta and crushed red pepper, and roll homemade sushi featuring
    nori, cucumber, and spicy mayo, showcasing a moderate kitchen skill set that blends quick health‑focused meals with occasional indulgent pastry treats from the local bakery.
  core: Dana Webley merges a disciplined, solitary creative process with a curious, organized mind; they turn sketchbooks into virtual galleries while occasionally splurging on limited‑edition art prints
    and juggling the teen urge to procrastinate on chores.
background:
  cultural: Dana comes from a white, multi‑generational New England family that has lived in Ridgefield, Connecticut for several decades. Her upbringing reflects the region’s emphasis on education, community
    involvement, and appreciation for the arts, nurtured by frequent trips to nearby cultural institutions such as the Yale University Art Gallery and the Wadsworth Atheneum. The family’s modest suburban
    lifestyle includes regular participation in town events like the Ridgefield Arts Center’s seasonal exhibitions and the local farmers market, where she has been exposed to both traditional New England
    values and contemporary artistic currents. These experiences, combined with the supportive role of her parents—who encourage independent learning and self‑discipline—shape her identity as a curious,
    organized individual with a keen interest in bridging classic cultural heritage with modern creative expression.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Traditional drawing (charcoal, graphite)", "Art historical research and curatorial documentation", "Creative writing and reflective blogging",
    "Project planning and organization (Notion, Trello)", "Basic Python programming for generative art", "Photography composition and editing (Lightroom)", "Critical visual analysis", "Time management",
    "Small‑group public speaking"]'
  hobbies: '["Sketching and drawing", "Digital painting", "Visiting museums and galleries", "Reading modern art theory, science fiction, philosophy", "Journaling", "Attending small art workshops", "Street
    photography", "Organizing personal art library", "Volunteering at community art programs"]'
  career_goals: She aspires to attend a liberal‑arts college that offers a strong art history and museum studies program, with the long‑term goal of becoming a museum curator or exhibition designer who
    can integrate digital media and interactive experiences. In the interim, she plans to build a portfolio of curated virtual exhibitions and contribute to local community art projects, while also seeking
    internships at nearby galleries in the Greater New York area. Her disciplined approach drives her to earn scholarships based on academic and artistic merit, and she envisions eventually leading a nonprofit
    that makes contemporary art accessible to underserved youth in Connecticut.
