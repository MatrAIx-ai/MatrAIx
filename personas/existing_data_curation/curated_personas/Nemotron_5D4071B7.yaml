  hobbies: '["Visiting art galleries and museums", "Photography (urban and nature)", "Painting and sketching", "Community basketball league", "Improv theater and karaoke", "Hiking in local parks", "Cooking
    classes and experimental recipes", "Reading design and speculative fiction", "Volunteering at local art festivals", "DIY woodworking projects"]'
  career_goals: Joseph aims to move from his current role as a retail salesperson to a store manager position within the next two years, using his leadership and organizational strengths to oversee operations
    and mentor staff. He envisions eventually becoming a district or regional manager, where he can influence broader retail strategies and champion innovative visual merchandising concepts. Parallel to
    his corporate ambitions, Joseph dreams of opening a boutique that showcases local Kansas City artists and craftspeople, blending his love of art with his retail expertise. To support this venture, he
    plans to enroll in part‑time business administration courses at a community college and obtain a retail management certification. He also hopes to become a certified trainer for new hires, sharing his
    knowledge and fostering a collaborative work culture.
