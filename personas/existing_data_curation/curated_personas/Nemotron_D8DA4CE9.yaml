personas:
  professional: Cristina Aplicano, a 50‑year‑old sustainable architect based in San Jose, merges their vivid imagination and disciplined planning to produce parametric, LEED‑certified designs that echo
    the colors and communal spirit of local celebration traditions, while leading multidisciplinary teams and mentoring women and minorities in the field.
  sports: Cristina Aplicano enjoys hiking with the Santa Cruz Mountains Trail Club in the spring, practices yoga at the downtown Flow Studio year‑round, and follows the San Jose Sharks and San Jose Earthquakes
    with a moderate fan enthusiasm that fuels their weekend cardio sessions.
  arts: Cristina Aplicano devotes evenings to abstract painting inspired by the immersive light installations of James Turrell and the bold patterns of Yayoi Kusama, while their photography excursions channel
    the stark composition of Ansel Adams, and they regularly attend lectures by architect Tadao Ando at the San Jose Museum of Art.
  travel: Cristina Aplicano prefers curated, slow‑travel experiences that blend architectural tours with culinary workshops, having spent a month exploring the colonial plazas of Puebla and the modernist
    homes of Barcelona, while their next dream itinerary includes a sustainable eco‑retreat in the vineyards of Tuscany and a sunrise hike in the red rocks of Sedona.
  culinary: Cristina Aplicano enjoys crafting vibrant fusion dishes such as grilled corn tamales topped with avocado‑lime crema and quinoa‑based pozole, skillfully balancing smoky chilies and fresh Californian
    herbs like cilantro and sage, and they frequent the farm‑to‑table market stalls at San Pedro Square for seasonal produce.
  core: Cristina Aplicano channels a vibrant blend of disciplined precision and boundless imagination into every facet of life, yet they have a guilty habit of binge‑watching late‑night design documentaries
    while neglecting their inbox on weekends.
background:
  cultural: Cristina was born to Mexican parents who immigrated to the United States, and she grew up bilingual in Spanish and English. Her family maintained strong ties to Mexican traditions—celebrating
    Día de los Muertos, sharing regional cuisines, and preserving stories of their hometown in Oaxaca. These cultural roots shape her aesthetic sensibility, inspiring her to incorporate vibrant colors,
    intricate patterns, and communal spaces reminiscent of Mexican architecture into her projects. Living in San Jose, she participates in local Mexican community events and mentors young students on the
    value of cultural heritage in design. Her multicultural upbringing grants her a nuanced perspective on blending heritage with contemporary Bay Area architecture.
