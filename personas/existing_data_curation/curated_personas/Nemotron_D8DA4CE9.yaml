  hobbies: '[''Abstract painting'', ''Mixed-media sculpture'', ''Photography'', ''Reading philosophy and architecture theory'', ''Hiking'', ''Yoga'', ''Fusion cooking'', ''Volunteer design work with Habitat
    for Humanity'', ''Attending art gallery openings'', ''Exploring new design software'']'
  career_goals: Cristina aims to become a recognized leader in sustainable and culturally responsive architecture within the Bay Area. She plans to attain senior design director status at a firm that prioritizes
    innovative, eco‑friendly solutions, and eventually launch her own boutique practice that blends Mexican design heritage with cutting‑edge green technologies. She is committed to mentoring emerging architects,
    especially women and minorities, and expanding the use of parametric design tools in community projects. Her long‑term ambition includes publishing a book on integrating traditional Mexican architectural
    elements into modern sustainable housing and contributing to policy development for resilient urban design in California.
