  hobbies: '["Salsa and bachata dancing", "Teaching dance basics", "Cooking traditional Dominican dishes", "Playing pick‑up basketball", "Hiking the Connecticut River Trail", "Volunteering at local shelters",
    "Mentoring high‑school students", "Exploring new music venues", "Trying new restaurants", "Traveling to Caribbean destinations when possible"]'
  career_goals: Jose aims to transition from store‑level management to a regional leadership role within the next five years, positioning himself as a champion of inclusive retail practices. He plans to
    earn a certificate in Business Management and a Lean Six Sigma Yellow Belt to bolster his operational knowledge. Ultimately, he hopes to launch a community‑focused boutique that combines Dominican culinary
    traditions with a training hub for young adults in Bridgeport, providing mentorship and job‑ready skills. His long‑term ambition is to be recognized as a leader who bridges cultural heritage with modern
    business excellence, fostering harmony and growth in the workplaces he oversees.
