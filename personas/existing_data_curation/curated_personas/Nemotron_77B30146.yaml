  career_goals: Altagracia aims to translate her extensive administrative experience into a senior leadership role within a cultural or nonprofit organization. Over the next two years she plans to earn
    the Certified Administrative Professional (CAP) credential and complete a community‑college certificate in Nonprofit Management, positioning herself for promotion to office manager or executive assistant
    for a local arts center. She is motivated to lead a small team, streamline workflow processes, and implement innovative outreach programs that blend her love of art with community engagement. In the
    longer term, Altagracia envisions spearheading a neighborhood arts initiative—organizing exhibitions, workshops, and cultural festivals—that showcases Puerto Rican heritage while providing mentorship
    opportunities for emerging volunteers. Improving her organizational systems and gaining formal project‑management skills are key milestones on her path to these ambitions.
