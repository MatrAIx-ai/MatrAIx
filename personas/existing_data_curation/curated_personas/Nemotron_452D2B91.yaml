  career_goals: Looking ahead, Eugenio aims to finish his high‑school equivalency and enroll in an associate‑degree program in manufacturing technology. Over the next few years he plans to earn certifications
    in CNC programming and Lean Six Sigma, advance to a team‑lead or shift‑supervisor role, and eventually transition into a process‑engineer or production‑manager position. He also hopes to develop stronger
    leadership and stress‑management skills so he can mentor newer workers and contribute to a safer, more efficient shop environment.
