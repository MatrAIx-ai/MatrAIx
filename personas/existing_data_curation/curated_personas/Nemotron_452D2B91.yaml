personas:
  professional: Eugenio Rivera is a hands‑on machine operator in a fast‑paced metal‑forming shop, leveraging solid tooling knowledge, basic CNC programming, and a keen curiosity for process tweaks while
    balancing a relaxed, sometimes chaotic work style that keeps them adaptable under pressure.
  sports: Eugenio Rivera fuels their love of movement through weekly pickup soccer games, salsa‑and‑bachata dancing nights, and a loyalty to FC Dallas and the Dallas Mavericks, while juggling a casual fitness
    routine that leans more on spontaneous park drills than regimented gym sessions.
  arts: Eugenio Rivera channels creative energy into dancing to the rhythms of Marc Anthony and Celia Cruz, attending Dallas cultural festivals featuring local muralist Alex Gordon, and unwinding with cooperative
    video‑game sessions that echo the cinematic scores of The Witcher 3, shaping a vibrant artistic identity.
  travel: Eugenio Rivera prefers spontaneous weekend road trips, having already explored Austin’s live‑music scene, New Orleans’ culinary heat, and a family pilgrimage to Guadalajara, while balancing a
    modest travel budget that nudges them toward affordable hostels and shared rides.
  culinary: Eugenio Rivera enjoys cooking homemade tacos al pastor, chicken mole, and cheese‑filled tamales, skillfully blending chipotle, fresh cilantro, and masa harina, often hosting family gatherings
    where the aroma of simmering salsa verde fills the kitchen.
  core: Eugenio Rivera, a 22‑year‑old machine‑shop enthusiast, mixes restless curiosity, social energy, and occasional disorganization into a life that oscillates between hands‑on problem‑solving, late‑night
    gaming marathons, and a perpetual quest for smoother workflows.
background:
  cultural: Eugenio was raised in a bilingual Mexican‑American household in Dallas, where Spanish is spoken at home and English at school and work. His family emphasizes close ties, communal celebrations,
    and a strong work ethic. He participates in cultural traditions such as Día de los Muertos, Cinco de Mayo, and neighborhood fiestas, often sharing homemade tamales and listening to regional music like
    cumbia and norteño. The blend of his Latino heritage and the multicultural fabric of Dallas shapes his values of family solidarity, respect for elders, and a love for community gatherings.
