  career_goals: Although retired from the formal workforce, Mason aims to stay productive by expanding his volunteer leadership role at the local senior center, mentoring younger volunteers in event planning,
    and preserving his family's Polish heritage through a small oral-history project. He also hopes to improve his health by joining a walking group and learning digital photography to document community
    life.
