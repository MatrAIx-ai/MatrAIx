personas:
  professional: Osmin Hood is a self‑motivated teen with a knack for meticulous project planning, blending hands‑on model building and beginner Python scripting to prototype small engineering solutions,
    and they aim to transition from a construction apprenticeship into a civil engineering role that shapes San Antonio’s infrastructure.
  sports: Osmin Hood channels their love for the outdoors into weekly hikes across the Texas Hill Country, follows the San Antonio Spurs and San Antonio FC religiously, joins a community basketball pickup
    league every Saturday, and maintains a low‑key fitness regimen that includes weekend trail runs and occasional strength‑training at the local gym.
  arts: Osmin Hood blends technical precision with artistic flair, strumming acoustic renditions of John Mayer and Mumford & Sons, snapping sunrise landscape photographs of Hill Country vistas, and curating
    a growing collection of scale model kits that they treat as moving sculptures, all while attending occasional live shows at the Historic Pearl.
  travel: Osmin Hood prefers curated road trips that balance adventure with budget, having explored the limestone formations of Big Bend and the vibrant murals of Austin, they dream of a summer backpacking
    tour through the national parks of the Southwest and a future visit to the historic sites of Kyoto.
  culinary: Osmin Hood enjoys experimenting with Tex‑Mex flavors, perfecting dishes like smoked chicken enchiladas with fresh cilantro and roasted jalapeños, and they often combine their DIY mindset with
    cooking by hand‑crafting homemade corn tortillas while occasionally ordering take‑out after late‑night model‑building sessions.
  core: Osmin Hood is a methodical teen who turns curiosity into disciplined projects, from building model kits and coding scripts to budgeting every cent, all while staying remarkably calm and ever‑ready
    to help others.
background:
  cultural: Osmin was raised in San Antonio's Bexar County, a city where Anglo-Texan roots intersect with a vibrant Hispanic culture. His family identifies as white and holds traditional Texas values of
    independence, hospitality, and hard work; his father works in construction and his mother has managed the household. Growing up, Osmin was exposed to local customs such as Fiesta San Antonio, Mexican
    cuisine, and bilingual signage, giving him a functional familiarity with Spanish phrases and an appreciation for multicultural community events. This blend of Southern-Texan and Latino influences shapes
    his worldview, fostering a respect for diverse traditions while maintaining a distinctly Texan identity.
