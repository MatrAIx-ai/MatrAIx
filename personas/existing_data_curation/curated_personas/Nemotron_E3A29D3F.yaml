  career_goals: Osmin intends to earn his GED within the next year and enroll in a community college technical program focused on engineering technology. His long-term ambition is to become a civil engineer
    or project manager who designs and oversees infrastructure projects that benefit his hometown of San Antonio. He is drawn to the blend of practical problem-solving and innovative design, and he hopes
    to lead multidisciplinary teams while maintaining the reliability and calm demeanor that define his personality. In the interim, he plans to pursue an apprenticeship in construction or electrical work
    to gain real-world experience and build a solid professional foundation.
