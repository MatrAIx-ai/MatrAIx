  hobbies: '[''Acrylic painting'', ''Sketching architectural details'', ''Landscape photography'', ''Reading art history and architecture'', ''Journaling'', ''Nature walks and hiking'', ''Gardening'', ''DIY
    home‑staging projects'', ''Yoga and meditation'', ''Listening to design and mindfulness podcasts'']'
  career_goals: Leslie aims to become the leading residential real estate broker in Dodge County within the next three years, building a reputation for ethical service and exceptional staging that highlights
    a home’s artistic potential. She plans to obtain the Certified Residential Specialist (CRS) designation and expand her expertise into rural land sales and historic home restoration. By her early thirties,
    Leslie hopes to open a boutique realty firm that integrates her love for design, offering comprehensive services from market analysis to customized staging. She also aspires to develop a modest portfolio
    of investment properties to achieve financial stability and reduce work‑related stress.
