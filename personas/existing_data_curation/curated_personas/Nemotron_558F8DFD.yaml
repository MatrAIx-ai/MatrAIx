  career_goals: Harriet aims to progress to a senior creative leadership position within the next five years, aspiring to become a Creative Director who shapes company-wide visual identity and product experiences.
    She plans to deepen her expertise in sustainable design practices and to spearhead initiatives that embed environmental considerations into the brand's visual language. In the longer term, she envisions
    launching her own boutique design consultancy that offers strategic branding and UX services to small businesses in the Raleigh-Durham area, while also establishing a mentorship program for emerging
    designers.
