  career_goals: Over the next five years Becka aims to become one of the top‑producing brokers in Gratiot County by increasing her annual sales volume by at least 30 %. She plans to earn the Certified Residential
    Specialist (CRS) designation and the Accredited Buyer’s Representative (ABR) credential to deepen her expertise. Long‑term, she envisions launching a boutique agency that specializes in sustainable,
    historic, and artistically‑styled homes, integrating her passion for art and design into the sales process. Becka also hopes to mentor new agents, lead community‑focused real‑estate workshops, and collaborate
    with local historic preservation groups to revitalize downtown Saint Louis, MI.
