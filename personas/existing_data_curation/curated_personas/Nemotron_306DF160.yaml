  hobbies: '[''playground games'', ''pretend play'', ''dance class'', ''singing nursery rhymes'', ''reading picture books'', ''drawing and coloring'', ''cultural festival celebrations'', ''helping in kitchen'',
    ''building with LEGO or blocks'']'
  career_goals: Although she is only four, Soha already talks about wanting to be a teacher one day because she loves helping friends learn new things. She also dreams of becoming a doctor to make people
    feel better when they are sick. In the near term, she aims to master reading simple words, ride a tricycle without training wheels, and organize fun games for her playgroup, reflecting her love for
    structure, responsibility, and caring for others.
