personas:
  professional: Soha Patel is a preschool classroom helper who uses their love of structure and sociable energy to keep the play area organized while they happily guide peers through group activities.
  sports: Soha Patel is a lively member of the Little Lions junior soccer team, loves cheering for the local basketball club the City Hoops, and attends weekly toddler gymnastics class where they enjoy
    balancing on the foam beam.
  arts: Soha Patel is an enthusiastic fan of Sesame Street and the animated series Bluey, they frequently sing "Baby Shark" at bedtime, and they draw colorful pictures of Dr. Seuss characters during art
    time.
  travel: Soha Patel is an eager traveler who enjoys weekend trips to the city aquarium, has visited the Grand Canyon on a family vacation, and they dream of exploring the castles of Scotland next summer.
  culinary: Soha Patel is a picky‑eater who loves creamy macaroni and cheese with cheddar, enjoys strawberry‑yogurt parfaits topped with granola, and they gladly help stir a simple carrot‑and‑pea mash,
    even if the kitchen ends up a bit messy.
  core: Soha Patel balances a love for tidy routines and bright crayons with a boundless need for group play, often lining up toys by color before sharing, yet they cannot resist sneaking an extra cookie
    when no one is watching.
background:
  cultural: Soha is raised in a South Asian Indian household that preserves traditions while living in Manchester, Connecticut. At home, she hears a mix of English and Gujarati (or Hindi), enjoys meals
    with roti, dal, and spiced vegetables, and participates in family rituals such as removing shoes at the door and greeting elders with "Namaste." The family celebrates Diwali with lights and sweets,
    Holi with colors, and occasionally attends a local temple or cultural center for community events. These cultural practices influence her love for music, dance, and storytelling, and they blend with
    the suburban American environment she experiences at school and in her neighborhood.
