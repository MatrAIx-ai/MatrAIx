personas:
  professional: Shanna Richardson is a highly organized food service manager who blends meticulous scheduling, data‑driven menu planning, and strict food‑safety compliance with an outgoing, sociable leadership
    style, allowing her to motivate staff while she strategically pursues a district‑manager role and eventually opens a boutique farm‑to‑table restaurant that prioritizes employee wellbeing.
  sports: Shanna Richardson hikes the trails of Stone Mountain Park each weekend, dances salsa three times a week for cardio, follows the Atlanta Falcons and Atlanta Hawks, and participates in a local yoga
    studio’s evening class, balancing high‑energy movement with structured fitness routines.
  arts: Shanna Richardson enjoys contemporary fiction by authors like Sally Rooney and Ocean Vuong, listens to salsa legends such as Celia Cruz and Marc Anthony, and attends community theater productions
    featuring actors like Lupita Nyong’o, letting these artistic experiences inspire her culinary creativity.
  travel: Shanna Richardson favors meticulously planned road trips to nearby cultural hubs such as Savannah, Asheville, and New Orleans, while dreaming of a culinary pilgrimage to Oaxaca and Barcelona,
    balancing a modest travel budget with a desire for immersive food experiences.
  culinary: Shanna Richardson is an intermediate home chef who fuses Southern staples—shrimp and grits, collard greens, and buttermilk biscuits—with global flavors like kimchi, harissa, and miso, often
    showcasing dishes such as spiced peach‑glazed pork and corn‑meal‑crusted fried catfish at her informal dinner parties.
  core: Shanna Richardson is a detail‑driven hospitality professional whose love of salsa, yoga, and Southern‑inspired cooking masks an anxiety‑prone mind that constantly checks budgets and schedules.
background:
  cultural: Shanna grew up in a middle‑class suburban community just north of Atlanta, raised by parents of German and Irish descent who valued Southern hospitality and family gatherings. Frequent church
    involvement and community service instilled a strong sense of cooperation and responsibility. Immersed in the rich culinary traditions of the South, she learned early on to appreciate home‑cooked meals
    and the art of entertaining guests. Living in Atlanta exposed her to a vibrant tapestry of cultures and cuisines, which she now integrates into her professional and personal cooking. Her cultural upbringing
    emphasizes organization, reliability, and a welcoming spirit, shaping her approach to both work and social life.
attributes:
  skills: '[''Team Leadership'', ''Staff Scheduling'', ''Inventory Management'', ''Food Safety Compliance'', ''Budgeting and Cost Control'', ''Customer Service Excellence'', ''Menu Development'', ''Conflict
    Resolution'', ''POS System Management'', ''Training and Development'', ''Performance Metrics Analysis'', ''Vendor Negotiation'']'
  hobbies: '[''Yoga and Mindfulness'', ''Home Cooking Experiments'', ''Salsa Dancing'', ''Book Club Participation'', ''Volunteer Work at Community Kitchen'', ''Hiking in Stone Mountain Park'', ''Journaling'',
    ''Attending Local Food Festivals'']'
  career_goals: Shanna aims to complete a bachelor's degree in hospitality management within the next two years and obtain Certified Food Safety Manager certification to bolster her credentials. She aspires
    to move from managing a single location to becoming a district or regional operations manager overseeing multiple venues across the Southeast. Long‑term, she envisions opening her own boutique farm‑to‑table
    restaurant that emphasizes employee wellbeing, mental‑health support, and a menu that fuses Southern heritage with global flavors. She also hopes to mentor emerging talent in the industry and champion
    inclusive workplace cultures.
