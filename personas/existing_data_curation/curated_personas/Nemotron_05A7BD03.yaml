personas:
  professional: Nancy Jones, a budding junior gardener who treats the family backyard as a living laboratory, using her curiosity and practical hands-on approach to experiment with seeds while loosely scheduling
    playtime and thriving in collaborative games with friends.
  sports: Nancy Jones, a lively participant in neighborhood tag, hide-and-seek and Little Titans Soccer Club practices, who eagerly roots for the city’s professional baseball team, the Chicago Cubs, and
    dreams of scoring a goal like her favorite forward, Lionel Messi.
  arts: Nancy Jones, who spends afternoons coloring Dr. Seuss illustrations with her Crayola set, humming Disney’s Let It Go from Frozen, and flipping through picture books by Eric Carle, while proudly
    displaying her hand-drawn leaf collages on the fridge.
  travel: Nancy Jones, who loves exploring the nearby Willow Creek State Park to collect autumn leaves, reminisces about a family trip to the National Zoo in Washington, D.C., and daydreams about visiting
    the Eiffel Tower in Paris and riding a camel across the Egyptian desert.
  culinary: Nancy Jones, who delights in mac and cheese with a sprinkle of cheddar, builds peanut butter and jelly sandwiches with strawberry jam, mixes fruit parfaits using blueberries and sliced bananas,
    and proudly decorates cupcakes with vanilla frosting and rainbow sprinkles during weekend baking sessions.
  core: Nancy Jones, a boundlessly energetic six-year-old who darts from leading tag games to drawing rainbow dragons, hoards glittery stickers, forgets to tidy her toys, and thrives on sunshine-filled
    spontaneous adventures.
background:
  cultural: Nancy lives in Pink Hill, a small rural community in Duplin County, North Carolina. Her family has deep roots in the area, with generations of farming and active participation in local church
    life. The community emphasizes close‑knit family ties, hospitality, and involvement in county fairs, church picnics, and school events. Southern customs such as sharing home‑cooked meals, listening
    to folk music, and celebrating holidays with neighborhood gatherings shape her upbringing. Her cultural background blends traditional Southern values, a love of the outdoors, and a strong sense of belonging
    to a supportive small‑town community.
