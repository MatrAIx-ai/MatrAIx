  career_goals: Nancy’s biggest dream is to become someone who helps others learn and care for animals. She talks about wanting to be a teacher so she can share stories and organize fun activities for other
    kids, and she also imagines being a veterinarian to look after farm animals. She loves the idea of staying connected to her family’s farm while learning new things, and she often says she wants to grow
    up and be a community helper who can make a positive difference.
