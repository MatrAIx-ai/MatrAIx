  hobbies: '[''Soccer'', ''Social dancing'', ''Karaoke'', ''Sketching cartoons'', ''Simple baking'', ''TikTok dance trends'', ''Volunteering at community center'', ''Listening to pop music'']'
  career_goals: Tehmina plans to obtain her GED within the next year and then enroll in a community college program that aligns with her love of people and creativity, such as early childhood education,
    culinary arts, or hospitality management. In the short term, she hopes to secure a part‑time position at a local café or youth center where she can use her interpersonal strengths while gaining on‑the‑job
    experience. Her long‑term ambition is to work as a youth mentor or program coordinator in a community organization, or to open a small community space that combines art, music, and informal counseling
    for teenagers, reflecting her desire to turn her own experiences with anxiety into supportive resources for peers.
