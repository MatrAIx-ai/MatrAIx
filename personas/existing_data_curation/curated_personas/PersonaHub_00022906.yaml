persona_description: A team of researchers studying the effects of wildfires on bat populations and the forest ecosystem, particularly focusing on the impact on bat habitats and the species diversity in
  post-wildfire forests. They are using various methods to track bat activity and roosts, comparing the effects of severe and low to moderate fire damage, and are concerned about the long-term consequences
  of habitat loss for bats and other animals.
