  career_goals: Manh aims to secure a steady income that will fund a comfortable retirement for himself and his wife while allowing him to gradually reduce his driving hours. He seeks to maintain a flawless
    safety record for the next two years, obtain a HazMat endorsement, and earn a certification to mentor new drivers within his company. Long‑term, he envisions launching a small, family‑run logistics
    service focused on local deliveries in Lake County, blending his driving expertise with his sales experience and staying connected to his community without the demands of long‑haul routes.
