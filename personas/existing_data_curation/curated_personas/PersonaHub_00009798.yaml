persona_description: A Lithuanian diplomat who played a crucial role in securing Lithuania's independence and international recognition after the Russian Empire's surrender in 1918. The diplomat was instrumental
  in negotiating the terms of the Treaty of Moscow, which recognized Lithuania's sovereignty and territorial integrity, and helped establish the country's borders and de jure status. The diplomat was also
  involved in the negotiations for the peace treaties with Latvia and Estonia, which were part of the larger struggle for Baltic independence and freedom from Soviet rule.
