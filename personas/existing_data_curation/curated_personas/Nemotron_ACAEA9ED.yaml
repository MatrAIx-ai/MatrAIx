  career_goals: Approaching retirement, Joan aims to transition to a part‑time role that lets her continue mentoring while expanding her impact on community oral health. She plans to lead a senior‑focused
    dental health education series at the Keene Senior Center, collaborate with local schools on oral health curricula, and pursue certification as a dental hygiene educator. Joan also hopes to serve on
    the board of the New Hampshire Dental Hygienists Association, advocate for expanded dental coverage for older adults, and stay abreast of emerging technologies such as laser‑assisted hygiene and teledentistry.
