personas:
  professional: Joan Walmsley, a veteran dental hygienist with deep expertise in periodontal assessment and digital radiography, leverages her curiosity for emerging technologies and practical knack for
    efficient workflow to mentor younger staff while spearheading senior‑focused oral health workshops that blend rigorous evidence‑based methods with community‑driven flexibility.
  sports: Joan Walmsley, a member of the Keene Hiking Club and the local senior bridge league, balances her love of the Boston Red Sox and New England Patriots with weekly hikes in the White Mountains and
    competitive bridge tournaments, viewing fitness as both a social engagement and a personal challenge.
  arts: Joan Walmsley, an active participant in community theater productions of classics like *Our Town* and a devoted fan of Meryl Streep’s filmography, also enjoys attending the Boston Symphony Orchestra’s
    spring concerts and curating a personal collection of Norman Rockwell prints, which she credits for nurturing her creative spirit.
  travel: Joan Walmsley prefers meticulously planned weekend getaways to New England’s historic towns—such as Portsmouth, Concord, and Salem—while dreaming of a leisurely autumn road trip through the Tuscan
    countryside, balancing her love of cultural immersion with the practical constraints of senior health and a modest travel budget.
  culinary: Joan Walmsley, who holds a senior‑friendly cooking class certificate, excels at preparing low‑sodium roasted salmon with rosemary, quinoa‑based salads with cherry tomatoes, and hearty New England
    clam chowder lightened with cauliflower, often experimenting with fresh herbs like thyme and basil to blend nutrition with flavor.
  core: Joan Walmsley is a socially vibrant, detail‑oriented dental hygienist‑mentor who blends competitive drive with community service, all while juggling senior‑friendly gardening, hiking, and theater
    pursuits.
background:
  cultural: Joan’s cultural background reflects a classic New England upbringing rooted in Anglo‑American traditions. Raised in a middle‑class family that valued education, civic responsibility, and self‑reliance,
    she embraces the region’s emphasis on community service, volunteerism, and lifelong learning. Her heritage includes a blend of English and Irish ancestry, which is expressed through seasonal celebrations,
    local historic preservation interests, and an appreciation for the modest yet hearty New England lifestyle.
