  career_goals: Fumiko aims to deepen her clinical expertise by completing a pharmacy residency focused on mental‑health pharmacotherapy, with the long‑term ambition of becoming a board‑certified psychiatric
    pharmacist. She hopes to integrate evidence‑based anxiety and depression medication management into community practice, eventually opening a small, quiet pharmacy that offers private consultation rooms
    and supports patients dealing with high‑stress mental health conditions. Concurrently, she plans to pursue continuing education in integrative medicine to blend her cultural heritage of herbal remedies
    with Western pharmacy practice, enhancing holistic patient care.
