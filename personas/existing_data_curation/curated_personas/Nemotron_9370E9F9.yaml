  career_goals: Timothy aims to leverage his retail experience and artistic sensibility to move into a management role that blends commerce with creativity. In the next three years he plans to become an
    assistant manager, then a store manager, focusing on stores that specialize in art‑related merchandise, boutique home décor, or local artisan goods. He intends to complete a bachelor’s degree in Business
    Administration or Arts Management, and earn certification in visual merchandising. Long‑term, he dreams of opening his own boutique‑gallery space in Ocala, where he can curate community‑focused art
    exhibitions, host workshops, and sell curated collections of handmade products. He also wants to develop his leadership skills to mentor junior staff and foster a workplace culture that values curiosity
    and flexible thinking.
