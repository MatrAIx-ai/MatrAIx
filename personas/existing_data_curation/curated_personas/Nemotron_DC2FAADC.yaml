  hobbies: '["Reading (African-American literature, historical nonfiction, Southwestern folklore)", "Desert gardening (succulents, herbs, wildflowers)", "Fusion cooking (Creole and Mexican flavors)", "Quilting
    and textile art", "Genealogy research", "Book club participation", "Church choir singing", "Local history tours", "Yoga for flexibility and mindfulness"]'
  career_goals: Angela aims to deepen her role as a cultural steward and mentor within her community. She hopes to compile a memoir that weaves together her family’s migration story, African-American heritage,
    and experiences living in the Southwest, preserving these narratives for future generations. She also aspires to launch a small intergenerational garden project in her neighborhood, where she can teach
    younger residents about sustainable desert gardening while sharing stories and recipes. Additionally, Angela wishes to volunteer as a reading tutor at the local library, using her humanities background
    to encourage literacy among children and adults. On a personal level, she plans to take a series of workshops on digital storytelling to further share her experiences online and possibly contribute
    articles to a local heritage magazine. Her overarching ambition is to foster connection, cultural pride, and resilience within her circle while maintaining her own health and independence.
