persona_description: A financial professional who is interested in the latest developments in the banking sector and the impact of the MCLR system on the lending rates of banks. They are likely to be familiar
  with the concept of MCLR and its importance in the implementation of monetary policy. They may also be interested in the different factors that are considered in the calculation of MCLR, such as tenor
  premium, marginal cost of funds, operating cost, and negative carry on account of CRR. They may also be interested in the rates offered by top banks and their interest in comparing these rates with the
  MCLR rates.
