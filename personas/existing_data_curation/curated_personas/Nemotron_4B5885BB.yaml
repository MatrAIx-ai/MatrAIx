personas:
  professional: Maritza Vazquez, a veteran computer support specialist with CompTIA A+, Network+, and ITIL certifications who excels at crafting clear SOPs and automating routine tasks while leveraging
    bilingual fluency to deliver precise help desk support across Windows, macOS, and Linux environments,
  sports: Maritza Vazquez, an avid walker who logs early morning strolls through Griffith Park and cheers for the Los Angeles Dodgers while occasionally joining a community soccer league at the local cultural
    center, blends low‑impact fitness with loyal fandom, yet admits to skipping the gym during rainy weeks,
  arts: Maritza Vazquez, a devoted fan of traditional folk music such as Lila Downs and contemporary rock like Los Lobos, regularly attends Día de los Muertos art installations, enjoys painting decorative
    sugar skulls, and watches classic Mexican cinema featuring actors like Gael García Bernal, using these creative outlets to unwind after a day of troubleshooting,
  travel: Maritza Vazquez, a planner who prefers structured itineraries, regularly visits family in Oaxaca during the holiday season, dreams of exploring historic sites in Granada, Spain, and enjoys short
    road trips to the Pacific coast, but avoids spontaneous backpacking trips that would disrupt her routine,
  culinary: Maritza Vazquez, a skilled home cook who cultivates cilantro, oregano, and succulents on a small balcony, delights in preparing mole poblano, handmade tamales, and fresh guacamole for intimate
    gatherings, yet occasionally over‑spices dishes to satisfy her competitive palate,
  core: Maritza Vazquez, a meticulous IT specialist who balances routine with competitive ambition, nurtures a tight‑knit family circle through food and tradition, and channels a skeptical yet resilient
    outlook into every facet of life,
background:
  cultural: Maritza was raised in a Mexican‑American household in Los Angeles, where family traditions and community involvement shaped her identity. She speaks fluent Spanish and English, celebrates holidays
    such as Día de los Muertos and Cinco de Mayo, and maintains strong ties with extended family both locally and in Mexico. Her cultural upbringing instilled a strong work ethic, respect for hierarchy,
    and a deep appreciation for homemade Mexican food, which she often shares with friends and coworkers. Though divorced, she remains active in her local Mexican cultural center, participating in events
    and supporting community initiatives.
