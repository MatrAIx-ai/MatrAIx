  career_goals: Maritza aims to advance into an IT Service Management role within the next three years, pursuing ITIL Practitioner and Project Management Professional (PMP) certifications. She seeks to
    lead a small help‑desk team, streamline support processes through automation, and maintain high‑quality service standards. While valuing stability and routine, her competitive nature drives her to become
    the top performer in her department, mentor newcomers, and eventually position herself for an IT manager position that balances responsibility with predictable workflows.
