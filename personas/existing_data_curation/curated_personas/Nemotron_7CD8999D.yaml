  hobbies: '[''Journaling'', ''Mindfulness Yoga'', ''Cooking Traditional Filipino Dishes'', ''Watercolor Painting'', ''Origami'', ''Hiking'', ''Gardening'', ''Volunteering at Community Center'', ''Listening
