  career_goals: Lyanna aims to obtain her GED within the next year, followed by enrollment in a certified nursing assistant (CNA) program at a community college. She envisions a career as a healthcare aide
    where she can provide direct, compassionate care to patients, especially seniors and immigrant families. In the longer term, she hopes to pursue a degree in public health and become a community health
    worker focusing on outreach and health education for Southeast Asian communities in the Pacific Northwest. She also aspires to develop a mentorship program for at‑risk youth in her neighborhood, drawing
    on her own experiences to foster a supportive environment.
