personas:
  professional: Lyanna Skariah is a budding healthcare aide trainee whose natural empathy, bilingual communication, and meticulous organization translate into calm, structured support for seniors and multilingual
    families, while their penchant for predictability helps them excel in scheduling and documentation.
  sports: Lyanna Skariah enjoys the rhythmic challenge of hiking the Cascades with the local Trailblazers Club, follows the Seattle Seahawks and Seattle Kraken for game‑day camaraderie, and caps their weekly
    routine with a restorative yoga session at the community center.
  arts: Lyanna Skariah finds solace in watercolor studies inspired by John Singer Sargent, folds intricate origami designs modeled after Robert J. Lang’s creations, and curates their playlists that blend
    Taylor Swift’s pop hits with classic folk ballads performed by the legendary singer Joan Baez.
  travel: Lyanna Skariah prefers low‑key weekend getaways to nearby national parks like Mount Rainier and has a long‑standing wish to explore Kyoto’s historic temples and the cherry‑blossom avenues of Washington
    D.C., planning each trip with a detailed itinerary and budget spreadsheet as they balance school responsibilities.
  culinary: Lyanna Skariah frequently prepares family‑style marinated soy‑garlic stews, perfects jasmine rice paired with sautéed bitter melon and ginger, and experiments with adding turmeric and coconut
    milk to ramen broth, showcasing their cooking skill that blends tradition with bold flavor twists.
  core: Lyanna Skariah is a meticulously organized teen who navigates life’s stresses with journaling, yoga, and a habit of over‑planning, yet occasionally gets lost in a daydream while stirring a pot,
    reminding them of the joy of simple creativity.
background:
  cultural: Lyanna is a second‑generation Filipino‑American raised in Kirkland, Washington. Her parents immigrated from the Philippines in the early 2000s, bringing with them close‑knit family values, a
    love of Filipino cuisine, and a Catholic faith that shapes holidays and community gatherings. She grew up speaking both English and Tagalog at home, celebrating traditions such as Pasko, Sinulog, and
    the Filipino practice of bayanihan—mutual assistance and cooperation. The multicultural environment of the Seattle suburbs, combined with her family's emphasis on harmony and respect for elders, influences
    her compassionate outlook and desire to serve her community.
