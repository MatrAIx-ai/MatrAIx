personas:
  professional: Quentin Washington, a logistics veteran with two decades of experience, combines supply‑chain optimization, data‑driven forecasting, and Lean Six Sigma process improvement with a methodical
    yet curious mindset, driving practical, technology‑enabled solutions while coaching teams to out‑perform rivals.
  sports: Quentin Washington dominates the Henderson basketball league, hits the trails of Red Rock Canyon for weekly hikes, supports the Las Vegas Raiders and the Vegas Golden Knights, and follows the
    NBA season closely, using his competitive drive to maintain a disciplined fitness regimen.
  arts: Quentin Washington frequents the Smith Center for live jazz, especially performances by Wynton Marsalis and Norah Jones, collects vinyl records of B.B. King and modern blues artist Gary Clark Jr.,
    and channels that rhythm into his own improvisational drumming sessions at home.
  travel: Quentin Washington blends adventure and sustainability, having trekked the Grand Canyon and explored Kyoto’s technology expos, while planning a road trip to Asheville’s craft breweries and a future
    visit to Copenhagen to study its bike‑friendly logistics model.
  culinary: Quentin Washington experiments in his kitchen with modern twists on Southern staples, serving gochujang‑glazed fried chicken, quinoa‑enhanced collard greens, and miso‑infused shrimp and grits,
    favoring ingredients like smoked paprika, kimchi, and black‑strap molasses, though his tendency to over‑season sometimes overwhelms diners.
  core: Quentin Washington pairs relentless logistical precision with a love for jazz, basketball, and bold flavors, yet occasionally sacrifices sleep for gadgets and over‑spices his meals, embodying a
    competitive, curious spirit.
background:
  cultural: Quentin was raised in a close‑knit African‑American family that emphasized education, community service, and cultural pride. His parents taught perseverance and the importance of giving back,
    values he lives out through church involvement and local mentorship initiatives. Although his familial roots trace back to the Southern United States, his adult life in Henderson, Nevada blends those
    traditions—family gatherings, soul food, storytelling—with the diverse, front‑range culture of the Southwest, creating a worldview that honors his heritage while eagerly embracing new ideas and experiences.
attributes:
  skills: '[''Supply chain optimization'', ''Warehouse operations management'', ''Transportation fleet coordination'', ''Data analysis and forecasting'', ''Regulatory compliance'', ''Safety and risk management'',
