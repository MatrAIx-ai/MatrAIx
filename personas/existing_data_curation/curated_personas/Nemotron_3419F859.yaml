    tracking'']'
  hobbies: '[''Basketball (league play)'', ''Hiking in Red Rock Canyon'', ''Smart home and IoT tinkering'', ''Live music (jazz, blues)'', ''STEM mentorship for youth'', ''Cooking (Southern & African-American
    fusion)'']'
  career_goals: Quentin aims to advance to a senior regional logistics director role within the next five years, overseeing a multi‑state distribution network while championing AI‑driven demand forecasting
    and sustainable transportation initiatives that cut carbon emissions by at least 20%. He plans to launch a mentorship program for emerging Black logistics professionals and, long‑term, start his own
    consulting firm focused on resilient, technology‑enabled supply chains for midsize retailers.
