  hobbies: '[''building LEGO models'', ''doing jigsaw puzzles'', ''reading picture books about construction and trains'', ''drawing and coloring'', ''collecting insects and stones'', ''riding his bike on
    familiar routes'', ''participating in structured playdates'']'
  career_goals: Richard is fascinated by jobs that combine clear rules, helping others, and making things that last. He often talks about wanting to become a civil engineer so he can design bridges and
    playgrounds he can build with his LEGO bricks, or a veterinarian because he likes caring for his family’s dog and likes the idea of a daily routine of feeding and checking animals. He dreams of a future
    where he can work with his hands, follow a schedule, and see the results of his effort.
