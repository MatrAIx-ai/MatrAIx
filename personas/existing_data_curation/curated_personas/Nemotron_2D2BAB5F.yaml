personas:
  professional: Richard Crosby, a six-year-old aspiring builder, loves engineering LEGO cities with meticulous plans, demonstrates early spatial reasoning, leads group play with confidence, and they prefer
    structured, predictable outcomes that satisfy their need for order.
  sports: Richard Crosby plays on the Brookside Kids Soccer Club in the Eastside League, enjoys weekend bike rides on the local trail, cheers for the nearby MLB team the Cleveland Guardians and the NBA's
    Chicago Bulls on TV, and they eagerly participate in tag games with clear rules during organized park playdates.
  arts: Richard Crosby enjoys drawing dinosaurs in the style of Eric Carle, listening to the whimsical songs from Disney's Frozen soundtrack, watching the animated series Paw Patrol, and they often mimic
    Bruno Mars's dance moves during playtime, highlighting a vivid yet structured creative side.
  travel: Richard Crosby prefers family trips with a detailed itinerary, fondly remembers a weekend visit to the Smithsonian's National Air and Space Museum, looks forward to an upcoming family vacation
    to the Grand Canyon, dreams of exploring the LEGO House in Billund, Denmark, and they need a predictable routine before each departure.
  culinary: Richard Crosby favors peanut butter and jelly sandwiches, chicken nuggets with honey mustard, mac and cheese, helps their parent stir batter for banana pancakes, enjoys crunchy apple slices
    and carrot sticks for snacks, and they sometimes refuse new foods unless they match familiar textures.
  core: Richard Crosby is a detail-oriented six-year-old who balances a love for structured play with occasional worry, careful savings habits, and a penchant for organized adventures and creative pursuits,
    and they sometimes get stubborn when routines are disrupted.
background:
  cultural: Richard grows up in a middle‑class white family in Madison, Indiana, a small town in Switzerland County. His family lives in a single‑family home with a backyard garden and a dog, and they attend
    a local community church where values of responsibility, hard work, and friendliness are emphasized. He celebrates typical Midwestern holidays like Thanksgiving and Fourth of July with family gatherings,
    enjoys regional foods such as fried chicken and apple pie, and often spends weekends at the county fair or community library storytime. The community’s close‑knit nature and emphasis on routine influence
    his preference for structure.
attributes:
  skills: '[''reading simple sight words'', ''basic addition and subtraction'', ''following multi-step instructions'', ''building LEGO models from instructions'', ''drawing basic shapes and characters'',
