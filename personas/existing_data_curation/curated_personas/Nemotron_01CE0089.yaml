  career_goals: She aims to transition from full-time employment to a hybrid role that balances freelance consulting on sustainable energy projects with leading community maker workshops in the Catskills.
    She wants to develop a niche in marrying technology with public art, creating interactive installations that promote environmental awareness. Long‑term, she hopes to establish a small eco‑tech studio
    that offers low‑cost prototyping services to local artisans and entrepreneurs, while mentoring younger technicians and encouraging inclusive, collaborative cultures.
