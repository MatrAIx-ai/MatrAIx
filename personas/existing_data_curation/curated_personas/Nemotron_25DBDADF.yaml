  hobbies: '[''Reading historical fiction'', ''Vegetable gardening'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Birdwatching'', ''Morning nature walks'', ''Journaling'', ''Genealogy research'']'
  career_goals: Crystal aims to advance to a senior billing supervisor role where she can mentor newer clerks and lead the implementation of streamlined billing workflows for her organization. She is working
    toward earning a Certified Billing Specialist credential to formalize her expertise. Over the next five years, she hopes to transition into a part‑time consulting capacity, offering freelance bookkeeping
    and compliance reviews for local small businesses, which would allow her to maintain a steady income while preserving the quiet, low‑stress environment she values as she approaches retirement.
