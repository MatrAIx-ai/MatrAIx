personas:
  professional: Jill Morris is a budding game creator, blending a love of drawing and painting with early coding in Scratch to prototype whimsical adventure games, while their meticulous yet flexible organization
    helps them iteratively refine concepts, and their heightened emotional sensitivity drives narratives that explore both wonder and melancholy.
  sports: Jill Morris enjoys weekend hikes on the Appalachian foothills with the Trailblazers Youth Hiking Club, cheers for the Tennessee Volunteers football team, and participates in the Johnson City Kids
    Soccer league during the spring season, using physical activity as a calming outlet for nervous energy.
  arts: Jill Morris spends afternoons painting Appalachian landscapes after listening to the Carolina Chocolate Drops, draws inspiration from Frida Kahlo’s bold colors and Jim Henson’s whimsical storytelling,
    and regularly attends hands‑on workshops at the Hands On! Regional Museum, where they also volunteer to help younger visitors discover art.
  travel: Jill Morris loves day trips to the Great Smoky Mountains National Park and historic Asheville, dreams of exploring the castles of Edinburgh and the lantern‑lit streets of Kyoto, prefers itineraries
    that mix structured museum visits with hidden hiking trails, yet often postpones longer trips due to schoolwork and anxiety about crowds.
  culinary: Jill Morris enjoys making homemade apple pie with a sprinkle of cinnamon, experimenting with pesto pasta using fresh basil and pine nuts, savoring grilled trout caught on local streams, and
    finds comfort in simple grilled cheese sandwiches when feeling overwhelmed, while occasionally challenging themselves with sushi rolls after watching cooking tutorials.
  core: Jill Morris is a creatively curious 12‑year‑old whose artistic passions and love of coding are balanced by a meticulous yet flexible mindset, but intense anxiety often leads to impulsive splurges
    and occasional neglect of routine health checks.
background:
  cultural: Jill was raised in Johnson City, Tennessee, a small city nestled in the Appalachian region. Her family embraces Southern hospitality and local traditions such as attending church youth events,
    participating in the annual Downtown Parade, and enjoying outdoor activities like camping and hiking in the nearby mountains. The community’s appreciation for folk music, regional art murals, and public
    libraries has fostered Jill’s interest in the arts and nature. Growing up in this environment, she blends the values of community, creativity, and a love for the natural landscape in her everyday life.
