  career_goals: Jill aspires to blend her love of art and curiosity about the world into a future career that allows creative expression and meaningful impact. She dreams of becoming a visual artist or
    illustrator, perhaps working in museum curation or video game design, while also intrigued by environmental science and psychology as ways to understand and help people manage strong emotions. In the
    short term, she aims to build a strong art portfolio, attend summer art camps, and develop her coding skills to create interactive stories.
