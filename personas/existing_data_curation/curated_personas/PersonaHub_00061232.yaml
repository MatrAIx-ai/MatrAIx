persona_description: A Kindergarten teacher who is passionate about providing high-quality education to young children and is dedicated to the Illinois Kindergarten Individual Development Survey (KIDS).
  The person is knowledgeable about the developmentally appropriate and aligned process designed to provide information about children's competencies across developmental domains over time and to provide
  statewide information on whether Illinois’ kindergarteners have the skills and knowledge needed to succeed in school. They are also familiar with the Common Core Standards and the transition to kindergarten
  from prekindergarten, and are experienced in implementing the KIDS process. The persona is likely to be familiar with the Kindergarten Common Core Standards and the transition to kindergarten, and is
  likely to have experience with the Illinois State Board of Education and the KIDS advisory committee.
