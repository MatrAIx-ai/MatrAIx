  career_goals: Although only four, Thu frequently expresses dreams of making beautiful pictures that talk and building things that move, hinting at future interests in art, design, or science. Her parents
    nurture these inclinations, hoping she might one day become an illustrator, a product designer, an engineer, or a teacher who shares wonder with others, while also valuing her compassionate nature and
    desire to help friends.
