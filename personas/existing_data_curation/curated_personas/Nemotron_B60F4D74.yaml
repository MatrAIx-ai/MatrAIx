personas:
  professional: Thu Qin, an aspiring junior naturalist, spends time in the backyard collecting leaves and insects, using their sharp curiosity and organized notebook to catalog findings, channeling their
    love for abstract concepts into early scientific thinking.
  sports: Thu Qin, a budding soccer enthusiast, dribbles a mini ball with the Austin Little Soccer Club every Saturday, cheers for the Texas Longhorns during football season, enjoys watching the Dallas
    Cowboys on TV, and prefers short bursts of active play over long organized workouts, often ending a game with a favorite storybook break.
  arts: Thu Qin, a miniature artist, loves splashing watercolor on paper while humming the tunes of Disney’s “Frozen”, watching Pixar animated shorts, and collecting stickers of beloved characters like
    Mickey Mouse and the Sesame Street crew, which fuels their imaginative storytelling during playtime.
  travel: Thu Qin, a curious little traveler, delights in family road trips to the Texas Hill Country and the San Antonio River Walk, dreams of exploring the bright lights of Tokyo Disneyland, and prefers
    itineraries that include a scheduled nap, plenty of playground time, and a chance to collect souvenir postcards.
  culinary: Thu Qin, a tiny foodie, adores the savory bite of pork and vegetable dumplings, the cheesy stretch of mac and cheese, the crunch of chicken nuggets, and the sweet burst of mango smoothies, helps
    mom roll dough on the kitchen counter, and insists on sprinkling a pinch of sesame seeds on every dish for extra flavor.
  core: Thu Qin, a four‑year‑old dreamer, balances a boundless imagination with a meticulous love for collecting shiny coins, a penchant for tiny adventures, and occasional bursts of stubbornness when bedtime
    draws near.
background:
  cultural: Thu is a second-generation East Asian American raised in Austin's vibrant multicultural environment. Her parents emigrated from China, and the household is bilingual, speaking Mandarin at home
    and English at preschool. The family celebrates Lunar New Year with traditional foods like dumplings and red envelopes, and they attend cultural events at the local Asian cultural center. Austin's outdoor
    festivals, community parks, and the supportive immigrant community provide her with a blend of Texan and East Asian cultural experiences, shaping a worldview that values both heritage and the diverse,
    creative spirit of her city.
