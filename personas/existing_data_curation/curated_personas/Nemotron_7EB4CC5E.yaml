  hobbies: '["Hiking", "Mountain Biking", "Kayaking", "Intramural Basketball", "Acoustic Guitar", "Community Garden Volunteering", "Camping Trips", "Wildlife Photography", "Woodworking", "Local Music Scene"]'
  career_goals: Sanford aims to earn his GED and pursue an associate’s degree followed by a bachelor’s in Education with a focus on Environmental or Outdoor Education. He plans to transition from an adjunct
    position to a full‑time faculty role, eventually becoming the program coordinator for the college’s Outdoor Recreation and Sustainable Practices program. Long‑term, he envisions developing community
    outreach initiatives that bring outdoor skills and environmental awareness to Klamath County youth and underserved adults, forging partnerships with local farms, the BLM, and conservation groups. He
    also hopes to achieve certifications such as Wilderness First Responder and to author practical guidebooks on low‑impact outdoor education.
