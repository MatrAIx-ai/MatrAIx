personas:
  professional: Karen Morse, a budding naturalist‑coder, blends their love for birdwatching, sketching, and sci‑fi reading into small Python projects that catalog local feathered species, while their spontaneous
    streak often leaves school assignments unfinished and notebook pages a chaotic mix of ideas and half‑drawn birds.
  sports: Karen Morse, an enthusiastic hiker who spends weekends navigating the White Mountains with the local youth trail club, follows the Boston Red Sox and Boston Bruins on game days, and occasionally
    joins a middle‑school cross‑country team, though their spontaneous schedule sometimes leads to missed practices.
  arts: Karen Morse, a budding songwriter who strums acoustic versions of Ed Sheeran and Jason Mraz for a small circle of friends, sketches bird silhouettes inspired by John James Audubon, and devours sci‑fi
    classics by Isaac Asimov and mystery tales by Agatha Christie, often weaving these influences into short poems and stories.
  travel: Karen Morse, whose travel style mixes spontaneous weekend hikes to Acadia National Park with a dream of backpacking through the Scottish Highlands and a yearly family road‑trip to Washington,
    DC, prefers planning routes on a handwritten map while leaving room for unplanned bird‑watching detours.
  culinary: Karen Morse, a self‑taught baker who loves folding fresh blueberries into crumb‑topped pies and perfecting chewy chocolate‑chip cookies with a pinch of sea salt, often improvises with cinnamon
    and almond flour, and isn’t shy about leaving flour footprints on the kitchen floor after a late‑night experiment.
  core: Karen Morse, a curiosity‑driven teen who balances spontaneous coding, birdwatching, and acoustic guitar with a habit of leaving loose ends behind, finds solace in nature and creative scribbles while
    occasionally misplacing deadlines and dollars.
background:
  cultural: Karen was raised in a white, middle‑class family in West Lebanon, New Hampshire, a small New England town known for its close‑knit community and outdoor lifestyle. Her family values self‑reliance,
    modesty, and a deep appreciation for the region's seasonal changes—celebrating events like the Lebanon Harvest Festival, maple‑syrup season, and local farmers' markets. Although she is currently behind
    her grade level academically, there is strong encouragement to engage with the community, volunteer, and develop practical skills. The cultural environment emphasizes respect for nature, community service,
    and a balanced approach to curiosity and practicality, all of which shape Karen's outlook and aspirations.
attributes:
  skills: '[''basic coding in Scratch'', ''digital photography'', ''hand sewing'', ''basic woodworking'', ''creative writing'', ''basic cooking and baking'', ''audio editing with Audacity'']'
  hobbies: '[''hiking in the White Mountains'', ''birdwatching'', ''reading science‑fiction and natural history'', ''creative writing'', ''sketching landscapes'', ''playing acoustic guitar'', ''baking pies
    and cookies'', ''coding mini‑games in Scratch'']'
  career_goals: Karen aims to complete high school and earn a diploma (or GED if needed), then pursue a career that blends her curiosity about the natural world with practical problem‑solving. She is drawn
    to fields such as environmental science, wildlife rehabilitation, or sustainable agriculture. In the short term, she hopes to volunteer at the local animal shelter, join a community gardening initiative,
    and earn an entry‑level certification as a veterinary assistant. Over time, she envisions working on conservation projects in New Hampshire's forests and perhaps leading youth education programs about
    nature and stewardship.
