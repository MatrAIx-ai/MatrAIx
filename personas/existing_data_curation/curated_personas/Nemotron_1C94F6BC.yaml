  hobbies: '[''Visiting art galleries'', ''Painting and sketching'', ''DIY metal art projects'', ''Community theater participation'', ''Salsa dancing'', ''Softball league'', ''Hiking at nearby state parks'',
    ''Live music concerts'', ''Volunteer event organization'', ''Exploring new technology gadgets'']'
  career_goals: Christine aims to transition from a line assembler to a supervisory role within the next three years, earning a Certified Production Technician (CPT) credential and completing an advanced
    CNC programming course. She hopes to blend her technical expertise with her love of art by leading a small in‑house custom‑fabrication program that creates artist‑designed metal installations for local
    businesses and community spaces. Long‑term, she envisions opening a modest maker‑space studio where she can mentor apprentices, host workshops, and collaborate on community art projects while maintaining
    the flexible schedule she values.
