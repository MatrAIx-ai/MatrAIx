  career_goals: At this stage, Seth aims to transition from day‑to‑day loan processing to a mentorship and community‑focused role. He plans to earn a Certified Financial Counselor (CFC) designation to broaden
    his expertise and develop a comprehensive financial‑literacy program for local high schools and adult learners in Chico and Tehama County. By leveraging his artistic talents, he hopes to create a series
    of illustrated guidebooks that blend visual art with financial concepts, positioning himself as a thought leader in integrating creativity with credit counseling. He aspires to become a senior advisor
    or branch manager, eventually establishing a boutique consulting firm that assists small farms and local businesses with customized financing solutions. Speaking at state‑wide financial‑education conferences
    and leaving a legacy of empowered community members are central to his long‑term ambitions.
