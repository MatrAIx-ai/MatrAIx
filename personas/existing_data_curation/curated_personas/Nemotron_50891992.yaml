  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (home and community)'', ''Beach walks and shell collecting'', ''Knitting'', ''Watching telenovelas'', ''Volunteering at Catholic church events'',
    ''Journaling'', ''Crossword puzzles'']'
  career_goals: Stephanie aims to transition from a sales associate to a supervisory role within the next two years, seeking opportunities to lead a shift team and mentor newer employees. She is interested
    in completing a short retail‑management certification offered by a local community college to strengthen her leadership and scheduling skills. Her longer‑term ambition is to achieve a stable, predictable
    work schedule that allows her to support her family's financial needs while preparing for a gradual move toward part‑time work as she approaches retirement. She also hopes to be recognized for her dedication
    to creating a harmonious store environment where both customers and staff feel valued.
