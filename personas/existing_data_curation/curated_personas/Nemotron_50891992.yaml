personas:
  professional: Stephanie Capote is a seasoned retail professional with over 25 years of hands‑on experience in sales, skilled in inventory management, POS systems, and conflict resolution, who channels
    her preference for structure and reliability into a goal of becoming a shift supervisor and mentoring new staff.
  sports: Stephanie Capote enjoys leisurely beach walks, participates in a local adult softball league with the Port Hueneme Mariners, and avidly follows the Los Angeles Dodgers in baseball and the LA Galaxy
    in soccer, using these activities to stay active and connected to her community.
  arts: Stephanie Capote relaxes by watching telenovelas such as 'María la del Barrio,' listening to the timeless crooning of Frank Sinatra and the soaring vocals of Andrea Bocelli, and knitting while humming
    classic tunes from Etta James, weaving artistic appreciation into her everyday routine.
  travel: Stephanie Capote prefers short road trips that blend relaxation with cultural experiences, often exploring Santa Barbara’s historic mission, the vineyards of Paso Robles, and the coastal charm
    of Carmel, while dreaming of a family cruise to the Caribbean and a pilgrimage to Seville, Spain.
  culinary: Stephanie Capote, an avid home cook, delights in preparing family‑passed stews and grilled chicken marinated in smoky chipotle, crafting handmade corn tortillas, and whipping up fresh salsa
    with tomatillos, cilantro, and jalapeños, while experimenting with cumin, oregano, and homemade masa to preserve cherished flavors.
  core: Stephanie Capote balances a meticulous work ethic with solitary beach walks and a habit of over‑organizing grocery receipts, creating a life where structure meets quiet creativity.
background:
  cultural: Stephanie’s cultural identity is rooted in her Mexican heritage and the vibrant Latino community of Southern California. She grew up in a bilingual household where Spanish was spoken daily,
    and she maintains strong ties to family traditions such as celebrating Día de los Muertos, Christmas posadas, and sharing homemade tamales during holidays. Her Catholic faith, interwoven with Mexican
    customs, guides her weekly church attendance and community service. The values of familismo, respeto, and personalismo shape her interpersonal style, making her cooperative, considerate, and attentive
    to others’ needs. Living in Port Hueneme, she blends these cultural influences with the coastal Californian lifestyle, participating in local festivals, enjoying fresh seafood, and embracing the laid‑back
    yet community‑oriented atmosphere of Ventura County.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Cash Handling'', ''Inventory Management'', ''POS System Operation'', ''Visual Merchandising'', ''Conflict Resolution'',
