personas:
  professional: Bret Wright, a 40‑year‑old hardware and outdoor‑gear retail associate, combines deep product knowledge and a calm, attentive listening style to resolve customer issues while their spontaneous,
    flexible attitude lets them cover unexpected rushes, even though their dislike for rigid schedules often leaves inventory tasks to the last minute.
  sports: Bret Wright enjoys low‑key fitness, spending Saturday mornings bird‑watching on the county trails, playing occasional softball with the River Valley Hawks community league, and cheering for the
    nearby minor‑league baseball team, the Lakeside Lumberjacks, while they keep a simple home‑gym routine of body‑weight exercises.
  arts: Bret Wright finds inspiration in the easy‑going storytelling of John Denver, the intricate craftsmanship of Gustav Stickley’s furniture, and the soothing narration of David Attenborough’s nature
    documentaries, often listening to these while assembling model train layouts and browsing vintage woodworking magazines.
  travel: Bret Wright prefers short, self‑planned road trips to natural refuges like Yellowstone National Park and the Adirondack Lakes, favoring the peace of a cabin stay over crowded resorts, yet limited
    savings and volunteer commitments keep longer exotic voyages like a trek through Patagonia on the back‑burner.
  culinary: Bret Wright’s palate favors hearty, rustic fare—pan‑seared trout with dill and lemon butter, smoked brisket cooked low and slow, and a side of fresh corn succotash—while their modest cooking
    skills are honed through YouTube DIY recipes and regular visits to the local farmer’s market for heirloom tomatoes and sharp cheddar.
  core: Bret Wright is a curious, solitary problem‑solver who thrives on hands‑on projects, battles chronic worry, and dreams of turning a modest hobby shop into a community hub.
background:
  cultural: Bret grew up in the rural Midwest, in a small farming community in Watonwan County, Minnesota. His cultural upbringing reflects the values of "Minnesota nice"—politeness, cooperation, and a
    strong sense of community. Family gatherings often centered around church potlucks, county fairs, and seasonal chores, reinforcing a work ethic rooted in self‑reliance and modesty. While his formal
    education was limited, the local culture emphasized learning by doing, which shaped his practical, hands‑on approach to life and work. The region's strong agricultural ties and close‑knit neighborly
    networks continue to influence his sense of identity and his desire to contribute positively to his hometown.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Product knowledge (hardware, outdoor, agricultural)'', ''Conflict resolution'', ''Basic inventory management'', ''Visual
