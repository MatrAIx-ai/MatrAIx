  hobbies: '[''Fishing'', ''Birdwatching'', ''Woodworking'', ''DIY home repairs'', ''Reading documentaries (nature, history)'', ''Model train building'', ''Volunteering at community events'', ''Listening
    to classic rock'']'
  career_goals: Bret hopes to move beyond the sales floor to a supervisory role where he can mentor new hires and share his practical knowledge. He plans to earn his GED and take a short course in retail
    management to strengthen his organizational skills and meet deadlines more reliably. In the longer term, he dreams of opening a small, community‑focused store that sells locally made crafts and supplies
    for hobbyists, blending his curiosity about new products with his desire to keep the town’s traditional values alive.
