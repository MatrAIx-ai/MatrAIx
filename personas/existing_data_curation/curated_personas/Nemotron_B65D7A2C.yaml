  career_goals: Julio aims to expand his upholstering shop into a recognized studio that offers bespoke furniture, collaborates with local artists, and hosts hands‑on workshops for aspiring craftsmen. He
    hopes to mentor an apprentice, incorporate greener materials into his workflow, and eventually open a satellite space in downtown Clarkston where community members can explore art, design, and DIY furniture
    projects.
