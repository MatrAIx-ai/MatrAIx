personas:
  professional: Julio Goodwin is a seasoned upholsterer who blends meticulous fabric selection, hand‑stitching, and frame repair with a painter’s eye for color; they leverage their woodworking know‑how
    and small‑business bookkeeping to run a methodical yet socially vibrant studio that mentors apprentices and champions sustainable, artist‑collaborative furniture design.
  sports: Julio Goodwin stays fit by hiking the nearby lakes with the Clarkston Outdoor Explorers club in spring, cheering on the Seattle Seahawks and Seattle Sounders FC during football and soccer seasons,
    joining a weekly pickle‑ball league at the Clarkston Community Center, and volunteering as a bench‑coach for the local community theater’s youth basketball program.
  arts: Julio Goodwin channels artistic passion into mixed‑media paintings inspired by Picasso and Kahlo, designs theatrical sets for the community theater while listening to Miles Davis on saxophone, frequents
    the Clarkston Art Center to view exhibitions featuring local muralists, and draws creative inspiration from the improvisational flair of Joni Mitchell’s folk‑rock ballads.
  travel: Julio Goodwin favors low‑key road trips that blend outdoor adventure with cultural immersion, having driven the Pacific Coast Highway to explore Seattle’s art districts, spent a weekend in Portland’s
    indie music scene, and planned a future pilgrimage to Florence’s Renaissance galleries and Kyoto’s jazz clubs, all while balancing workshop commitments that sometimes limit longer vacations.
  culinary: Julio Goodwin, a competent home cook, delights in crafting aromatic chicken tikka masala with garam masala and fresh cilantro, mastering pad thai’s tamarind‑lime balance, and perfecting rosemary‑infused
    wood‑fire pizza, often sourcing heirloom tomatoes and locally milled flour to showcase a global palate at neighborhood potlucks.
  core: Julio Goodwin is a curiosity‑driven, methodical craftsman who weaves art into upholstery, never skips a community clean‑up, but can be forgetful about dental visits while always carrying a sketchbook
    and a spare set of saxophone reeds.
background:
  cultural: Raised in a Midwestern, working‑class family near Detroit, Julio blends the region’s values of hard work, practicality, and community spirit with a personal appreciation for craftsmanship. His
    cultural roots, reflecting a blend of German and Irish heritage common to the area, emphasize self‑reliance and a straightforward, friendly demeanor. These influences shape his professional ethos, his
    commitment to collaborative projects, and his engagement with the local arts scene in Clarkston, Michigan.
