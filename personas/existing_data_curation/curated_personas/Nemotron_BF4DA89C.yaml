  hobbies: '[''Live music events'', ''Swing and salsa dancing'', ''Improv comedy'', ''Hill Country hiking'', ''Paddle‑boarding on Lady Bird Lake'', ''Yoga and mindfulness meditation'', ''Expressive journaling'',
    ''Community garden volunteering'', ''Farm‑to‑table cooking'', ''Photography'', ''Reading contemporary fiction'', ''Listening to neuroscience podcasts'']'
  career_goals: Krystal aims to open a community‑focused mental‑health hub in Austin that blends evidence‑based psychotherapy with creative workshops and peer‑support groups, with a special emphasis on
    anxiety and trauma recovery. She hopes to develop a scalable, culturally responsive curriculum for schools and community centers that promotes mental‑health literacy. Over the next five years she plans
    to secure research funding to study the impact of group arts‑based interventions on stress reduction, publish her findings in peer‑reviewed journals, and become a sought‑after speaker at regional mental‑health
    conferences. Ultimately, she envisions a leadership role within a statewide mental‑health organization where she can influence policy toward greater integration of mental‑health services into public
    education.
