  hobbies: '[''Playing strategy video games (e.g., Minecraft, StarCraft)'', ''Skateboarding'', ''Journaling'', ''Smartphone photography of coastal scenery'', ''Cooking Thai dishes'', ''Listening to music
    (K‑pop, indie)'', ''Watching anime'', ''Exploring basic coding projects (Python)'']'
  career_goals: Thai aims to finish a high‑school equivalency credential within the next two years and then enter a structured apprenticeship in computer networking or a junior coding role. He envisions
    a future as a game developer or IT support specialist where tasks are clearly defined yet allow enough flexibility to manage his stress and occasional worry about obligations. Ultimately, he hopes to
    combine his technical skills with his culinary heritage by opening a small family‑run food‑truck after gaining stable employment.
