personas:
  professional: Thai Phan is a budding game‑design enthusiast who spends afternoons crafting Python scripts and mastering strategy games, applying a methodical yet flexible mindset to solve puzzles and
    prototype simple mods, and they often share their creations with a small circle of friends online.
  sports: Thai Phan is a dedicated skateboarder at the Palos Verdes skate park, cheering on the Los Angeles Lakers and LA Galaxy, and participates in a local skate club that meets weekly for free‑ride sessions,
    while they keep a casual fitness routine of jogging along the coast.
  arts: Thai Phan immerses in a blend of K‑pop (BTS, Blackpink) and indie music (Phoebe Bridgers, Tame Impala), follows anime series like Attack on Titan and My Hero Academia, captures golden‑hour photos
    of the Palos Verdes shoreline with a phone, and they draw creative inspiration from visual artist Hayao Miyazaki’s films.
  travel: Thai Phan dreams of a cultural trip to Tokyo to explore anime districts and K‑pop shops, has previously road‑tripped to Santa Barbara for a weekend surf, and they prefer meticulously planned day
    outings that balance photography stops with spontaneous skate spots.
  culinary: Thai Phan experiments with Thai cooking on weekends, mastering dishes like Pad Thai, Tom Yum Soup, and mango sticky rice, favoring aromatic ingredients such as lemongrass, galangal, and kaffir
    lime leaves, while they also enjoy the occasional Korean street‑food bowl.
  core: Thai Phan is a strategic, introspective teen who harmonizes a love for solitary gaming and creative coding with a restless need for physical expression, and they carry a lingering undercurrent of
    anxiety.
background:
  cultural: Thai is a second‑generation Southeast Asian American; his parents emigrated from Vietnam (or Thailand) and maintain strong cultural ties. The household is bilingual, speaking both English and
    Vietnamese, and celebrates traditional holidays such as Tet (Lunar New Year) and Songkran with family meals featuring aromatic herbs and spices. Growing up in the diverse coastal community of Rancho Palos Verdes,
    he blends Asian values of respect for elders and communal responsibility with the individualistic, flexible attitudes of Southern California, shaping a hybrid identity that influences his daily life
    and aspirations.
