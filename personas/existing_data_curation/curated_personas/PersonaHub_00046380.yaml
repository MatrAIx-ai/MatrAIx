persona_description: A renowned illustrator and painter who was a close friend of Charles Dickens, known for his portraits and illustrations of the author's family and works. He was a member of the Royal
  Academy and worked in London, England. His works include paintings of Queen Victoria and other historical figures, as well as illustrations for Dickens's works. His health was compromised by the stress
  of his work and his declining health led him to decline an offer to become the president of the Royal Academy in 1865.
