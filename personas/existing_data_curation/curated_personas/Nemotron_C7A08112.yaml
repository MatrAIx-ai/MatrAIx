personas:
  professional: Matrina Post is a budding comic‑strip creator who blends fantastical creatures with the rhythmic storytelling tradition from church choir rehearsals, channeling their vivid imagination into
    sketches that they share with classmates and online peers, while their competitive streak drives them to perfect every panel.
  sports: Matrina Post enjoys playing T‑ball with the Goodrich Youth League and cheering on the Dallas Cowboys during fall games, while they also cycle along the creek trail on weekends, joining a casual
    after‑school fitness club that meets for tag games.
  arts: Matrina Post immerses themselves in drawing vibrant creatures inspired by Pixar’s ‘Inside Out’, tunes into pop hits by Beyoncé and hip‑hop beats by Lil Nas X while sketching, and participates in
    their school’s art club where they exchange ideas with peers who admire the jazz classics of Miles Davis.
  travel: Matrina Post loves day trips to the nearby Texas State Fair for cotton candy and rides, dreams of exploring the historic streets of New Orleans for its live music, and plans family visits to the
    sprawling forests of the Great Smoky Mountains, balancing their adventurous spirit with the limited budget of a small-town family.
  culinary: Matrina Post delights in munching on mac and cheese topped with crispy bacon, helps their grandparents prepare collard greens seasoned with smoked turkey, and experiments with making sweet tea
    using fresh mint leaves gathered from the garden, though they often forget to wash their hands after handling raw chicken.
  core: Matrina Post is a hyper‑creative nine‑year‑old who alternates between immersive comic‑making sessions and spontaneous woodland explorations, juggling a competitive edge with bouts of worry and a
    penchant for hoarding LEGO bricks in their room.
background:
  cultural: Matrina’s family is part of the African‑American community in Goodrich, a small rural town in East Texas. Her parents and grandparents keep alive traditions of storytelling, music, and community
    gatherings that blend Southern Black cultural heritage with local Texan customs. She often celebrates Juneteenth and attends church services where gospel music and choir rehearsals nurture her love
    for rhythm. Family meals feature classic Southern comfort food alongside the family’s favorite soul‑food recipes, creating a warm cultural mosaic. At school, she participates in African‑American history
    lessons and community events that emphasize pride in her heritage, while also enjoying typical Texas activities such as outdoor picnics, local fairs, and rodeo visits. This blend of Black cultural roots
    and Texan life shapes her identity, fostering both a strong sense of community and a rich appreciation for diverse artistic expression.
