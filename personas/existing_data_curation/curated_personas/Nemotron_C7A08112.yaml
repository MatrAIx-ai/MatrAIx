  career_goals: Matrina dreams of turning her love for imagination and technology into a career that lets her create worlds. She hopes to become a graphic novelist or animator who can bring her unique stories
    to life, or a video‑game designer who builds interactive adventures that challenge players’ minds. She is also fascinated by science and hopes to win a science‑fair competition, perhaps pursuing a future
    as a research scientist or astronaut who explores the unknown. Above all, she wants a career that offers creative freedom, flexibility, and the chance to inspire other kids to think boldly.
