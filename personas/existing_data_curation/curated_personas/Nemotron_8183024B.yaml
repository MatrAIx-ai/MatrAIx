  hobbies: '[''Woodworking'', ''Gardening'', ''Bird Watching'', ''Model Train Collecting'', ''Volunteer Event Planning'', ''History Tours'', ''Live Music Concerts'', ''Cooking Barbecue'', ''Card Games'']'
  career_goals: Although retired, Gary aims to channel his engineering background into community service. He plans to mentor high‑school students through a local robotics club, develop a sustainable community‑garden
    program that integrates simple engineering solutions, and complete a personal restoration project on a classic car. He also aspires to maintain his health and manage stress by keeping a structured weekly
    routine, travel with his wife to national parks, and leave a legacy of reliability and service through continued volunteer event planning and occasional guest lecturing at regional colleges.
