personas:
  professional: Gary Myers, a retired mechanical engineer turned community volunteer, leverages their CAD and project-management expertise to design and oversee sustainable garden installations while mentoring
    high-school robotics teams, all with the same methodical reliability that defined their industrial career.
  sports: Gary Myers, a lifelong fan of the Texas Rangers and a seasonal ticket holder for Austin FC, spends Saturday mornings walking local bird-watching trails that double as low-impact cardio, and they
    join a weekly pickleball league at the senior center for social competition.
  arts: Gary Myers, an avid attendee of Austin City Limits concerts, especially enjoys the soulful blues of Gary Clark Jr., the folk storytelling of Jason Isbell, and collects vintage concert posters, which
    they proudly display beside their model-train dioramas.
  travel: Gary Myers, an organized explorer, meticulously plans road trips with their wife to national parks like Yellowstone, the Grand Canyon, and Acadia, using detailed itineraries and preferring cabin
    rentals that balance adventure with the comfort of predictable routines.
  culinary: Gary Myers, a barbecue enthusiast, perfects a dry-rubbed brisket recipe featuring smoked paprika, brown sugar, and oak chips, while also growing heirloom tomatoes and sweet corn in their garden
    to create fresh salsas that accompany their weekend grill sessions.
  core: Gary Myers blends engineering precision with community spirit, turning meticulous planning into vibrant gardening projects, lively senior-center events, and they constantly worry about staying on
    schedule.
background:
  cultural: Gary was raised in a Midwestern white family with German and Irish ancestry, instilling classic American values of hard work, punctuality, and community involvement. After earning his STEM degree,
    he relocated to Austin, Texas, where he embraced the blend of Southern hospitality and the innovative spirit of the local tech scene. His cultural identity combines a respect for traditional holidays
    such as Fourth of July fireworks and Thanksgiving dinners, participation in Texas barbecue gatherings, and an appreciation for the diverse, multicultural atmosphere of Austin. He remains grounded in
    his family heritage while actively engaging in the inclusive community traditions of his adopted city.
