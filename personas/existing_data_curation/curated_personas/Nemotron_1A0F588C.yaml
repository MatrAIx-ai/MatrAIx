  career_goals: Although retired, Jeremiah aims to stay actively engaged by leading a senior‑center mentorship program that pairs retirees with local small‑business owners, documenting oral histories of
    Lake Havasu City for the historical society, and serving as an advisory volunteer for the Rotary Club’s community‑service projects. He also wishes to finalize his estate plan to support his children
    and a favorite charitable cause focused on youth education.
