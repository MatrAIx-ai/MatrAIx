  hobbies: '[''Architecture photography'', ''Adult soccer league'', ''Hiking in Connecticut forests'', ''DIY woodworking'', ''Visiting art galleries'', ''Attending live music concerts'', ''Habitat for Humanity
    volunteering'', ''Craft beer brewing'', ''Cooking with family'']'
  career_goals: Brett aims to earn his state‑issued roofing contractor license within the next two years and eventually launch his own small roofing business focused on energy‑efficient and environmentally
    responsible roofing solutions. He plans to complete a certification program through the National Roofing Contractors Association to deepen his expertise in solar‑integrated roofing and cool‑roof technologies.
    In the longer term, Brett hopes to mentor apprentices, contribute to community housing projects with Habitat for Humanity, and achieve a stable work‑life balance that allows him to spend quality time
    with his wife while building a financially secure future for his family.
