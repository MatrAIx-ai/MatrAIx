personas:
  professional: Alberto Torres, a nine-year-old budding explorer of science and architecture, turns his appetite for adventure books about animals and space and his talent for assembling detailed Lego cityscapes
    into a habit of organizing the library’s storytime sessions, and they demonstrate practical planning, reliable responsibility, and a cooperative spirit.
  sports: Alberto Torres plays forward for the Riverdale Rovers youth soccer team at the community center, enjoys the predictable practice drills and close‑knit camaraderie, also follows the LA Galaxy and
    the New York Yankees on TV, and they balance team training with occasional backyard basketball, reflecting their love for structured group activity.
  arts: Alberto Torres delights in the adventurous scores of John Williams, reads illustrated series like Mary Pope Osborne’s Magic Tree House and Jeff Kinney’s Diary of a Wimpy Kid, and they volunteer
    to read aloud during library storytime, letting their compassionate nature and love for narrative shape their creative outlet.
  travel: Alberto Torres has visited the Grand Canyon on a school field trip, dreams of exploring the Space Center Houston to see real rockets, prefers trips that blend hands‑on learning with family time,
    and they habitually plan each outing with a checklist, showcasing their structured curiosity about the world.
  culinary: Alberto Torres frequently assists in preparing cheese quesadillas with a sprinkle of jalapeño and fresh guacamole made from ripe avocados, lime, and cilantro, enjoys experimenting with fruit
    salads featuring mango and pineapple, and they love the predictable rhythm of chopping and mixing, reflecting their growing kitchen confidence.
  core: Alberto Torres is a nine‑year‑old puzzle‑loving, structure‑seeking explorer who blends a passion for Lego architecture, animal‑space adventures, and compassionate teamwork into a quietly confident,
    slightly obsessive, and occasionally mischievous kid, and they approach each day with a calm, methodical curiosity.
background:
  cultural: Alberto comes from a Mexican‑American family that speaks both Spanish and English at home. His parents preserve strong cultural ties, celebrating holidays such as Día de los Muertos and Mexican
    Independence Day with family altars, music, and traditional foods. He grew up helping prepare Mexican culinary staples like tacos, quesadillas, and guacamole, learning recipes passed down through generations.
    The family attends a local Catholic parish in Artesia, participating in community events and festivals that blend Mexican traditions with the broader New Mexico rural lifestyle. Neighbors often collaborate
    on communal activities, reinforcing a sense of communal support. Alberto feels proud of his heritage and balances it with the diverse American culture he experiences at school.
