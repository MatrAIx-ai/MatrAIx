  career_goals: Alberto dreams of a future where he can combine his love for helping others with his practical, organized nature. He imagines becoming a teacher, creating structured learning environments
    where he can support classmates, or a community health aide who provides basic health education in his neighborhood. He is also fascinated by veterinary work, hoping to care for animals as he does with
    his rabbit. These ambitions reflect his desire to create harmony, provide structure, and make a tangible difference in his community.
