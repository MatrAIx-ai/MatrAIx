  hobbies: '["Vegetable gardening", "Birdwatching", "Reading historical fiction", "Quilting", "Crocheting", "Genealogy research", "Walking in local nature trails", "Volunteering at the community library"]'
  career_goals: Although no longer part of the formal workforce, Tina aims to keep her mind active and her community engaged. She plans to take occasional adult‑education classes at the local community
    college to deepen her knowledge of genealogy and digital photography. Tina also hopes to volunteer as a tech mentor at the county library, helping seniors navigate online services, and to lead a small
    historical preservation project documenting Lancaster County’s agricultural heritage. These goals reflect her competitive streak—inspired by local garden contests and community awards—while staying
    grounded in her pragmatic love of tangible results.
