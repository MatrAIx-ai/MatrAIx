  hobbies: '["Landscape painting", "Reading speculative fiction", "Birdwatching", "Playing harmonica", "Attending local theater productions", "Desert hiking", "Stargazing", "Organic gardening"]'
  career_goals: Now that he is retired from the formal workforce, Timothy focuses on legacy‑building projects that combine his artistic interests with community service. His primary ambition is to establish
    a small community art space in Artesia where local seniors and youth can collaborate on murals, photography exhibits, and storytelling sessions. He also hopes to publish a collection of poems and short
    stories inspired by the high desert landscape and to produce a series of paintings that capture the seasonal colors of the New Mexico sky. Mentoring emerging artists and documenting oral histories of
    longtime residents are additional goals that allow him to channel his curiosity and desire for novelty into lasting cultural contributions.
