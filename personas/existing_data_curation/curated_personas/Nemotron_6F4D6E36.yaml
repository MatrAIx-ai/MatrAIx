personas:
  professional: Timothy Wellman, a retired oil-field mechanic turned community-focused abstract painter and photographer, leverages their hands-on troubleshooting skills and improvisational imagination
    to lead open-ended art workshops that blend desert-inspired visual metaphors with collaborative storytelling.
  sports: Timothy Wellman, an avid hiker and bird-watcher, joins a local walking club for weekend treks across the high desert, cheers on the New Mexico State Aggies basketball team, and participates in
    occasional community softball games, while staying flexible about formal training regimes.
  arts: Timothy Wellman, who paints abstract desert skies, plays harmonica improv sessions at local festivals, and frequents the community theater, draws inspiration from Georgia O'Keeffe and Ansel Adams,
    and curates exhibitions featuring Pueblo pottery and Mexican folk art, weaving these influences into their own multidisciplinary practice.
  travel: Timothy Wellman, a seasoned road-tripper, has driven the iconic Route 66 to explore the Grand Canyon and Sedona, yearned to photograph the star-filled Atacama Desert in Chile, and meticulously
    plans future trips to the aurora-rich skies of Iceland, always balancing travel costs with their modest retirement budget.
  culinary: Timothy Wellman, a capable home cook, thrives on preparing green chile stew with garden-grown chiles, hand-made corn tortillas, and roasted pork adobado, while occasionally improvising with
    desert herbs like sage and prickly pear, and enjoys pairing meals with locally brewed craft beer and a splash of aged tequila.
  core: Timothy Wellman, a restless dreamer at 63, melds desert ruggedness with boundless imagination, turning spontaneous art projects into community legacies while battling occasional disorganization
    and a penchant for late-night stargazing.
background:
  cultural: Timothy was born and raised in the high desert of eastern New Mexico, a region shaped by the oil‑and‑gas boom, ranching heritage, and a rich tapestry of Hispanic and Native American influences.
    His family worked in oil fields and maintained a small cattle ranch, instilling in him a rugged work ethic and a deep respect for the land. Growing up, he participated in community celebrations such
    as the Eddy County Fair, church gatherings, and local fiestas that blended traditional New Mexican music, cuisine, and storytelling. This multicultural environment fostered his appreciation for diverse
    artistic expressions, from Pueblo pottery to Mexican folk art, and continues to inform his love for regional history, desert ecology, and collaborative community projects.
attributes:
  skills: '["Abstract painting", "Sketch drawing", "Landscape and night-sky photography", "Woodworking and carving", "Basic mechanical maintenance", "Digital photo editing", "Creative writing (poetry and
