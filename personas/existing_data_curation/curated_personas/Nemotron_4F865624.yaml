  career_goals: Paul aims to transition from informal work into a stable, growth‑ oriented role that leverages both his technical aptitude and his organizational strengths. He is pursuing an associate degree
    in Information Technology to qualify for entry‑level IT support or network technician positions, while also exploring certification in Home Improvement Contracting. His long‑term ambition is to launch
    a small, locally‑focused service business that offers tech support and home‑repair services, allowing him to blend his curiosity for new technologies with practical, community‑centered work. He values
    a career path that offers steady progression, opportunities to learn, and the flexibility to maintain his balanced lifestyle.
