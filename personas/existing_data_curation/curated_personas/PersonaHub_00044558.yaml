persona_description: A tax consultant who is interested in understanding the administration and operation of the Board of Internal Revenue in Kaduna state. They are looking for insights into the various
  sources of fund, the role of the board in revenue generation, the relationship between the board and taxpayers, the effectiveness and efficiency of the board in revenue identification and collection,
  and the projected revenue generation in the state. They are also interested in the relationship between government policies and pay-as-you-earn, the need for manpower to effectively administer pay-as-you-earn,
  the organizational structure of the board, and the factors responsible for the development of any tax system.
