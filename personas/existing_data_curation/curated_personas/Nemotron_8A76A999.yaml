  career_goals: Although retired, Cory’s ambition is to stay active and supportive within his community and family. He aims to volunteer regularly at the local senior center, help his spouse stay healthy
    and engaged, complete a handwritten memoir of his life in Sioux City, and pass down practical skills and family stories to his grandchildren. He also hopes to travel occasionally to visit his children
    and great‑grandchildren, ensuring that his legacy of reliability and community service endures.
