  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater performances'', ''Watercolor painting'', ''Knitting and crochet'', ''Rose gardening'', ''Hosting neighborhood potlucks'',
    ''Leading a book club'', ''Karaoke nights'', ''Walking trails in Stone Mountain Park'', ''Online art history courses'']'
  career_goals: Although she is nearing retirement age, Toni is driven to leave a lasting mark on her workplace and community. She aims to earn a Certified Administrative Professional credential and transition
    into a supervisory role, such as Office Manager for the Lawrenceville City Hall, where she can implement efficiency initiatives and mentor younger staff. Parallel to her professional ambition, she seeks
    to become a volunteer arts coordinator for the Gwinnett County Library, organizing exhibitions and workshops that celebrate local artists. Long‑term, she hopes to launch a monthly Senior Art Salon that
    blends her organizational talent with her passion for culture, providing a vibrant social hub for older adults.
