  career_goals: Joshua aims to transition his diverse skill set into a modest, home-based venture that preserves his preference for solitude while providing a flexible source of income. He envisions launching
    an online boutique that sells handcrafted wooden furniture and limited-edition art prints, complemented by a subscription-based blog that offers in-depth commentary on art history, local heritage, and
    DIY projects. He also hopes to establish a reputation as a respected regional art-scene commentator, eventually curating small pop-up exhibitions in nearby galleries and community spaces. While he values
    independence over corporate advancement, he is competitive and plans to enter regional woodworking contests and photography competitions to build credibility and attract niche customers.
