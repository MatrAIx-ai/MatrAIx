personas:
  professional: Mohini Tyagi, a veteran secondary‑school educator with three decades of classroom experience and a graduate degree in education, leverages their curiosity and balanced blend of organization
    and flexibility to weave visual arts into STEM curricula, mentor novice teachers, and champion inclusive lesson plans—yet they often rehearse lesson details late into the night, a habit born from their
    tendency to worry about student outcomes.
  sports: Mohini Tyagi, a devoted follower of the Alabama Crimson Tide football team and the Birmingham Barons baseball club, spends their mornings strolling the historic downtown streets with a senior
    fitness walking group, occasionally joins a low‑impact water‑aerobics class at the community center, and treats their garden chores as a practical strength routine to stay active.
  arts: Mohini Tyagi, whose watercolor paintings intertwine motifs from age‑old folktales with Southern magnolia blossoms, draws creative fuel from the bold forms of Georgia O’Keeffe, the melodic sitar
    improvisations of Ravi Shankar, and the poignant poetry of Maya Angelou, regularly visiting the Huntsville Museum of Art and sharing their work at the local senior arts circle.
  travel: Mohini Tyagi, who prefers thoughtfully planned getaways that blend cultural immersion with gentle relaxation, has toured the historic districts of Charleston and Savannah, driven the Blue Ridge
    Parkway in autumn, explored Nashville’s Country Music Hall of Fame, and dreams of a leisurely visit to Kyoto’s Kinkaku‑ji garden, all while balancing a modest travel budget and occasional family commitments,
    and they relish the sense of calm that comes from a well‑mapped itinerary.
  culinary: Mohini Tyagi, an enthusiastic home chef who skillfully infuses cilantro, cumin, and turmeric into Southern favorites—creating cilantro‑scented shrimp étouffée, turmeric‑spiced collard greens,
    and catfish curry with okra—delights in Sunday barbecues at the local pit, and they frequently experiment with new fusion recipes from their well‑worn copy of the ‘Southern Spice Concerto’ cookbook.
  core: Mohini Tyagi, a 74‑year‑old teacher‑turned‑art‑mentor who channels their lifelong curiosity, occasional worry, and love for watercolor storytelling into nurturing junior educators, cultivating garden
    herbs, managing low‑risk investments, and embarking on historic Southern travel adventures, they embody a blend of disciplined creativity and compassionate mentorship.
background:
  cultural: Born to South Asian (Indian) parents, Mohini grew up immersed in Hindi language, Diwali celebrations, and Indian classical music, while also valuing the emphasis on education common in her family.
    Relocating to Birmingham, AL in her twenties, she blended her cultural heritage with Southern hospitality, adopting local customs and culinary practices. This bicultural experience informs her teaching,
    as she regularly incorporates Indian stories and festivals into lessons to promote cultural awareness, and actively mentors South Asian students to navigate their identities within a predominantly American
    setting.
attributes:
  skills: '["Curriculum Design", "Differentiated Instruction", "Student Assessment and Evaluation", "Art Integration in STEM", "Educational Technology Integration", "Classroom Management", "Parent‑Teacher
