  hobbies: '["Watercolour painting", "Reading historical fiction and poetry", "Visiting local art galleries", "Gardening (herbs and native plants)", "Cooking fusion dishes", "Knitting", "Volunteering at
    a community literacy program", "Yoga and meditation", "Walking nature trails", "Participating in multicultural storytelling events"]'
  career_goals: Even as she approaches retirement, Mohini aims to leave a lasting legacy by mentoring younger educators and establishing a community‑wide art program that offers creative workshops for seniors
    and students alike. She hopes to author a guide on multicultural, arts‑infused pedagogy that reflects both her South Asian heritage and Southern U.S. context, and to serve as a consultant for schools
    seeking to reduce teacher stress and promote inclusive curricula.
