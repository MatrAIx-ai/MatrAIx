personas:
  professional: Shariff Wells, a seasoned technical support specialist with a STEM bachelor's degree, combines data‑driven troubleshooting expertise in Salesforce and Zendesk with a charismatic, competitive
    edge that consistently lands them among the top performers and makes them a natural mentor for junior reps.
  sports: Shariff Wells, a member of the Green Valley Golf Club, plays a regular 18‑hole round at Sunrise Golf Course, following the seasonal swing calendar while cheering for the local baseball team, the
    River City Braves, and never misses the weekly senior tennis league at the community recreation center.
  arts: Shariff Wells, a devoted jazz and blues aficionado, frequents the downtown Blues Hall for live sets by the Preservation Hall Jazz Band and B.B. King tributes, while also enjoying classic soul albums
    from Aretha Franklin and reading science‑fiction works by Octavia Butler to balance their love of music and imagination.
  travel: Shariff Wells prefers well‑planned, culturally rich trips that blend history and leisure, such as a guided tour of the civil‑rights landmarks in Atlanta, a weekend jazz pilgrimage to New Orleans,
    and occasional visits to family in the countryside, balancing travel costs with their semi‑retirement savings goals.
  culinary: Shariff Wells, an accomplished home cook, whips up soul‑food staples like collard greens seasoned with smoked turkey, sweet potato pie spiced with nutmeg, and smoked chicken glazed with honey‑brown
    sugar, while tending heirloom tomato and basil patches to harvest fresh ingredients for weekend barbecues.
  core: Shariff Wells is a competitively driven, community‑centric technologist who balances meticulous data analysis with vibrant social engagements, from choir rehearsals to golf tournaments, all while
    juggling a pragmatic approach to health, finances, and lifelong learning.
background:
  cultural: Shariff was raised in the heart of Georgia’s Black community during the post‑civil‑rights era, absorbing the rich traditions of Southern African‑American culture. His family placed a strong
    emphasis on church, storytelling, and soulful music, which fostered his sociable and resilient nature. Growing up, he celebrated cultural milestones with family gatherings centered around food, music,
    and collective prayer, grounding his identity in community solidarity. His education at a state university that supported Black STEM students exposed him to a network of mentors who encouraged both
    academic excellence and civic responsibility. Shariff’s cultural heritage fuels his commitment to mentorship and community service, particularly his involvement in youth STEM programs. The blend of
    Southern hospitality, gospel and blues influences, and a legacy of perseverance informs his practical yet curious approach to problem solving and his competitive drive to excel while uplifting others.
attributes:
  skills: '[''Technical Customer Support'', ''CRM Management (Salesforce, Zendesk)'', ''Data Analysis (Excel, Tableau)'', ''Process Improvement'', ''Active Listening'', ''Conflict Resolution'', ''Team Leadership'',
    ''Mentoring and Training'', ''Performance Metrics Optimization'', ''Problem Solving'', ''Adaptability'', ''Competitive Goal Orientation'']'
  hobbies: '[''Church Choir'', ''Community Barbecues and Cooking Soul Food'', ''Golf'', ''STEM Mentoring for Middle School Students'', ''Gardening'', ''Jazz and Blues Music Nights'', ''Reading Historical
    Nonfiction'', ''Reading Science‑Fiction'', ''Participating in Trivia Nights'']'
  career_goals: Shariff aims to transition from frontline service to a senior advisory role where he can shape the overall customer experience strategy for his organization. He plans to develop a comprehensive
    training program that integrates technical knowledge with soft‑skill coaching, positioning himself as a mentor for the next generation of service representatives. Over the next three years, he hopes
    to lead a cross‑functional quality‑assurance team, using his data‑analytics background to drive improvements in satisfaction scores and reduce resolution times. Ultimately, he envisions a semi‑retired
    phase where he can dedicate more time to community STEM outreach, while still acting as a consultant to help companies embed practical, customer‑centric innovations. His competitive nature fuels a desire
    to be recognized as a benchmark for service excellence within his county and industry.
