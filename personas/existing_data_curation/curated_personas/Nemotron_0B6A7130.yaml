  career_goals: Douglas aims to transition into a senior leadership role within a community mental health organization, ultimately becoming a program director or chief operating officer. He aspires to secure
    grant funding for innovative trauma‑informed services, influence local social policy through research and advocacy, and obtain his Licensed Clinical Social Worker (LCSW) credential to expand his clinical
    capabilities. Long‑term, he envisions establishing a statewide network of structured, outcome‑driven support programs that integrate arts‑based therapeutic approaches.
