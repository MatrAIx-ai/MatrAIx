  career_goals: Sandra aims to transition into a Principal Software Architect role where she can shape the technical strategy of AI‑enhanced products, merging her curiosity for new ideas with her competitive
    pursuit of industry leadership. She plans to launch an open‑source framework for generative digital art that gains community traction and showcases her blend of artistic appreciation and technical rigor.
    Publishing a book on resilient, high‑availability system design is another ambition, allowing her to codify decades of experience. Sandra also seeks to mentor a small cohort of junior developers—particularly
    women—in intensive, one‑on‑one settings, fostering critical thinking and code quality. Long‑term, she envisions consulting for startups to build robust DevOps pipelines and secure architectures, while
    occasionally speaking at niche conferences on the intersection of art and scalable engineering.
