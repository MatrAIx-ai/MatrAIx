personas:
  professional: Kristi Vogel is an administrative specialist with advanced Office and Google Workspace expertise who leverages their methodical, competitive mindset to streamline workflows, implement Lean
    improvements, and craft visually engaging internal communications for arts‑focused organizations.
  sports: Kristi Vogel hikes the Minnesota shoreline each summer, captures sunrise photos on the North Shore, participates in a local salsa dance league, supports the Minnesota Twins and the Minnesota United
    FC, and belongs to a community‑run hiking club that meets every Saturday.
  arts: Kristi Vogel spends weekends painting abstract acrylic canvases inspired by Mark Rothko and Yayoi Kusama, critiques work with a local artist‑collective, frequents the Walker Art Center and Minneapolis
    Institute of Art, performs improv with a downtown troupe, and draws design inspiration from the music of Björk and the theater of Lin‑Manuel Miranda.
  travel: Kristi Vogel plans trips with a spreadsheet, favoring short‑term road trips to the North Shore, weekend getaways to Chicago for museum hopping, and bi‑annual pilgrimages to Barcelona to practice
    salsa, balancing a modest travel budget with a desire for cultural immersion.
  culinary: Kristi Vogel enjoys cooking herb‑infused dishes like rosemary‑crusted salmon and basil‑pesto quinoa, often harvesting fresh herbs from their community garden, experiments with seasonal produce
    at farmer’s markets, and indulges in occasional brunches at local cafés for avocado toast topped with microgreens.
  core: Kristi Vogel blends a fiercely organized, competitive drive with a vivid imagination, color‑coding every aspect of life, always chasing the next creative project while never missing a deadline—except
    when a board‑game night runs past midnight.
background:
  cultural: Kristi comes from a white, Northern‑European lineage common to the Minneapolis area, with German and Swedish family roots. Raised in a suburban neighborhood of Hennepin County, she internalized
    classic Midwestern values of reliability, community involvement, and a strong work ethic. The Twin Cities’ vibrant arts scene and progressive civic culture have shaped her appreciation for creativity
    and social engagement. While her family maintained modest Lutheran traditions, Kristi’s personal identity aligns with the region’s liberal, culturally diverse atmosphere. Her multicultural exposure
    includes celebrating local holidays like Midsummer, attending the annual Minneapolis Arts Festival, and participating in community outreach programs that reflect the inclusive spirit of the city.
attributes:
  skills: '["Microsoft Office Suite (Excel, Outlook, Word)", "Google Workspace (Docs, Sheets, Drive)", "Record‑keeping and filing systems", "Document preparation and proofreading", "Data entry and basic
