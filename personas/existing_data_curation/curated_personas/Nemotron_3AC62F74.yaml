    "Meeting and event coordination", "Customer service and front‑desk communication"]'
  hobbies: '["Abstract acrylic painting", "Gallery and museum visits", "Artist‑collective critique sessions", "Speculative fiction and philosophy reading", "Book‑club participation", "Improvisational theatre
    performance", "Board‑game nights with friends", "Salsa dancing lessons", "Hiking and nature photography", "Community garden volunteering", "Online courses in neuroscience and design thinking"]'
  career_goals: Kristi aims to transition from a general office clerk to a senior office manager within a culturally vibrant organization, such as a community arts center, museum, or progressive tech startup
    in the Twin Cities. She plans to obtain a Certified Administrative Professional (CAP) credential and pursue a Project Management Professional (PMP) certification to qualify for project coordination
    responsibilities. Her ambition is to lead a small team, implement innovative workflow technologies, and champion creative initiatives that blend administrative efficiency with artistic programming.
    Long‑term, she envisions consulting for nonprofit arts groups, helping them optimize operations while preserving their creative mission, and mentoring junior administrative staff to foster a collaborative
    and high‑performing office culture.
