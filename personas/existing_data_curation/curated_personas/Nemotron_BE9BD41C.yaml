  career_goals: Andrea aspires to pursue a career that blends her love for science and helping people. She hopes to become a registered nurse or a biomedical engineer, aiming to work in a hospital or research
    lab where she can develop practical solutions for patient care. In the short term, she plans to excel in high school science courses, join the health sciences pathway, and gain mentorship through local
    community programs.
