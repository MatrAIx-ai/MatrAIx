personas:
  professional: Andrea Jones is a budding interactive storyteller, blending her love for mystery novels and coding on Scratch to design choose‑your‑own‑adventure games that teach problem solving while staying
    organized and adaptable, and they eagerly share prototypes with classmates.
  sports: On the court, Andrea Jones plays point guard for the Lake County Youth Basketball League, follows the Chicago Bulls and the WNBA's Chicago Sky, and balances competitive practices with weekend
    pickup games at the local park, while also enjoying seasonal soccer with friends in the fall, and they relish the camaraderie of both sports.
  arts: Andrea Jones channels her artistic side by drawing sketch portraits of friends, losing herself in mystery novels by Agatha Christie and biographies of notable leaders, and listening to the music
    of Billie Eilish and the street art of Banksy to fuel their storytelling.
  travel: A curious explorer, Andrea Jones spends weekends hiking the Lake County trail system, dreams of visiting the Grand Canyon and the historic streets of Boston, and plans a future family road trip
    to the Pacific Northwest after saving up from her allowance, and they often map routes in a notebook.
  culinary: Andrea Jones enjoys cooking with family, mastering simple dishes like seasoned rice and beans, homemade spice‑rubbed chicken tacos, and banana bread, while experimenting with fresh herbs from
    the garden and swapping recipes on a shared family cookbook, and they love to host mini‑tasting nights for siblings.
  core: Andrea Jones blends a detective’s curiosity with a planner’s precision, turning everyday chores into mini‑adventures while juggling a love for basketball, sketching, and coding, all the while occasionally
    losing track of time binge‑reading mystery novels, and they often stay up late perfecting a story on Scratch.
background:
  cultural: Andrea comes from a close‑knit African‑American family rooted in the Midwest, with grandparents who moved from the South during the Great Migration. Her family participates in the local church,
    celebrates Juneteenth, and emphasizes the importance of community service, storytelling, and preserving cultural traditions such as soul food cooking and music. Growing up in Merrillville, she experiences
    a blend of Midwestern suburban life and vibrant Black cultural influences that shape her values of resilience, cooperation, and pride in her heritage.
