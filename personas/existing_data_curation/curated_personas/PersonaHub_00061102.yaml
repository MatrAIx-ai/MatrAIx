persona_description: A researcher or engineer interested in developing and testing new optical and measurement technologies, particularly in the fields of optical science, microgravity research, and space
  exploration. They are likely to be working in a laboratory or research facility, and may have expertise in areas such as materials science, microgravity studies, and advanced optical technologies. They
  may be interested in developing and testing new devices or systems for measuring properties such as birefringence, optical retardation, and stress in materials, as well as for studying the effects of
  microgravity on materials and their properties. They may also have an interest in the development of new optical measurement techniques, such as those involving phase modulation or electro-optical devices.
