  career_goals: Rosario aims to advance to a senior engineering technologist role within the next five years, leading multidisciplinary projects that blend technology with creative design. She aspires to
    obtain certifications such as Certified Manufacturing Technologist (CMfgT) and Lean Six Sigma Black Belt, and to spearhead the development of sustainable, user‑centered products for the aerospace and
    renewable energy sectors in New Mexico. Long‑term, she envisions founding a consultancy that helps regional manufacturers integrate innovative design and data‑driven processes, while also mentoring
    underrepresented students in STEM.
