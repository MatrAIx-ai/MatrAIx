personas:
  professional: Rosario Shahla, a mechanical‑electrical engineering technologist in New Mexico’s aerospace and renewable‑energy sector, leverages deep CAD, PLC programming, and Python data‑analysis skills
    to lead lean, cross‑functional projects, infusing artistic aesthetics into functional prototypes while their competitive drive pushes the team toward high‑impact, on‑time delivery.
  sports: Rosario Shahla fuels their energetic lifestyle by weekly hikes in the Sandia Mountains, regular rides with the Rio Grande Riders cycling club—including occasional 100‑km races—while cheering on
    the New Mexico United soccer team and the Albuquerque Isotopes baseball club, and in winter they slip into cross‑country skiing trips in Taos, blending competition with community camaraderie.
  arts: Rosario Shahla immerses themselves in the local art scene, co‑creating murals inspired by Shepard Fairey’s graphic style, frequenting gallery openings that showcase works by Maya Lin, and sharpening
    spontaneity at the Albuquerque Improv Theater’s workshops, all of which nurture their unconventional thinking and collaborative spirit.
  travel: Rosario Shahla prefers meticulously planned, purpose‑driven trips—such as a spring cycling tour across the Colorado Trail, a cultural immersion week in Oaxaca to explore traditional cuisines,
    and a spontaneous weekend getaway to Taos Pueblo—yet balances adventure with budget constraints by using points on Airbnb and mastering last‑minute flight deals, always aiming to return with new design
    inspirations.
  culinary: Rosario Shahla relishes cooking at home, perfecting classic tamales and empanadas while experimenting with fusion dishes like kimchi‑topped carne asada tacos, favoring ingredients such as corn
    masa, chipotle peppers, and fresh cilantro, and often showcases their creations at neighborhood potlucks where they’re praised for balancing bold flavors with artistic plating.
  core: Rosario Shahla is a competitively driven, art‑infused engineer who channels relentless curiosity into both prototype design and weekend murals, yet habitually loses their keys in the chaos of multitasking,
    fueling a perpetual quest for better organization.
background:
  cultural: Rosario identifies as Hispanic, with roots in a Mexican‑American family that has lived in the Southwest for generations. Raised bilingual in Spanish and English, she grew up celebrating traditions
    such as Día de los Muertos, Las Posadas, and the vibrant festivals of Albuquerque's annual International Balloon Fiesta. Her family emphasized the importance of community, hard work, and respect for
    both cultural heritage and the diverse cultures of New Mexico, including Pueblo and Anglo traditions. This multicultural environment fostered a strong sense of pride in her heritage, a love for Southwestern
    art and cuisine, and an appreciation for collaborative community initiatives.
