personas:
  professional: Harold Robinson, an 81‑year‑old retired handyman turned community genealogist, blends hands‑on repair skills with meticulous record‑keeping to organize church events, mentor teens in practical
    trades, and compile a structured family history that reflects their disciplined, detail‑oriented nature.
  sports: Harold Robinson, an avid early‑morning fisher on the Beaufort rivers and a regular participant in community bridge games, enjoys leisurely sunrise walks to observe coastal birds, and watches the
    Charleston Battery soccer matches and Carolina Panthers football games on television, reflecting their preference for low‑impact, structured recreation.
  arts: Harold Robinson, a devoted member of his church choir, fills his porch evenings with gospel hymns by Mahalia Jackson and classic jazz from Ella Fitzgerald and Louis Armstrong, while devouring historical
    biographies by David McCullough and genealogical texts that satisfy their love for layered narratives and quiet contemplation.
  travel: Harold Robinson, a cautious traveler who values comfort and predictability, has taken day trips to historic Savannah and Charleston, enjoys weekend getaways to Bermuda for bird‑watching, and dreams
    of a serene river cruise along the Mississippi, always planning itineraries in detail to accommodate their health needs and limited mobility.
  culinary: Harold Robinson, a modestly skilled cook, crafts traditional shrimp and grits using fresh garden herbs like thyme and parsley, prepares collard greens simmered with smoked turkey, and delights
    in serving low‑country crab cakes at family potlucks, all while savoring the routine of seasoning and plating that grounds their day.
  core: Harold Robinson is a structured, community‑focused octogenarian who blends practical handyman expertise, meticulous financial caution, and a quiet love of genealogy, music, and low‑key leisure,
    all tempered by a lingering worry that fuels their disciplined routine.
background:
  cultural: Harold was born and raised in the lowcountry of South Carolina, a region steeped in Gullah/Geechee traditions that blend African heritage with Southern coastal culture. As a Black man who grew
    up during segregation, he witnessed the civil‑rights movement's impact on his community, fostering a deep respect for collective resilience and the church as a center of social support. His family’s
    lineage traces back to enslaved rice‑field workers, and he has inherited the Gullah language’s rhythmic storytelling, culinary practices like oyster stew and frog legs, and a strong sense of kinship
    that values elders and oral history. The coastal environment shapes his love of fishing, boat work, and reverence for the Atlantic’s ebb and flow. Alongside his faith‑driven values, Harold’s cultural
    identity emphasizes hard work, self‑reliance, and the preservation of ancestral knowledge for future generations.
