persona_description: A researcher or scientist interested in biodiversity and environmental science, particularly in Nepal and Iran. They are interested in understanding the distribution and patterns of
  species diversity in these countries, and how environmental and climatic variables influence the distribution of species. They are also interested in the species richness and endemism patterns in Nepal
  and Iran, and how these patterns can be used to identify areas of high biodiversity and conservation importance. They may have a background in ecology, botany, or environmental science, and may have expertise
  in using tools such as MaxEnt to predict species distributions and developing species richness and endemism patterns.
