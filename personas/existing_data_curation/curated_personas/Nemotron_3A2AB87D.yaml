personas:
  professional: Nicholas Chilson is a budding game‑design enthusiast who melds their love for competitive titles like Rocket League with hands‑on Arduino tinkering, channeling curiosity and practicality
    into creating modular level prototypes, even as their spontaneous nature often leaves project timelines in a tangled mess.
  sports: Nicholas Chilson shoots hoops at the local community center, playing on the U15 basketball league that mirrors the Los Angeles Lakers' fast‑break style, while cheering for the Chicago Bulls and
    occasionally joining a weekend pick‑up soccer game, embodying a competitive edge that mirrors their gaming mindset.
  arts: Nicholas Chilson sketches steampunk‑inspired mechanical concepts in a battered notebook, draws inspiration from artists like H.R. Giger and musicians such as Daft Punk, devours sci‑fi novels by
    Isaac Asimov, and spends weekend evenings binge‑watching Blade Runner and anime series, using these creative feeds to fuel both their game‑design ideas and LEGO builds.
  travel: Nicholas Chilson dreams of a tech‑focused road trip to Tokyo's Akihabara district and a weekend hackathon in San Francisco, but so far their travel log includes a family vacation to New York City’s
    Museum of Natural History and a day trip to a nearby state park where they built a portable Arduino‑powered lamp, preferring spontaneous, budget‑tight adventures over meticulously planned tours.
  culinary: Nicholas Chilson favors spicy ramen, pepperoni pizza, and midnight energy‑drink‑paired snack combos, can whip up a decent microwaved mac‑and‑cheese using a timer they cobbled together with an
    Arduino, yet they often skip meals during marathon gaming sessions, leading to a habit of binge‑eating salty chips as a quick fuel.
  core: Nicholas Chilson is a restless 14‑year‑old tech‑savvy strategist who balances fierce competition in games with sketchbook‑filled mechanical dreams, while wrestling with anxiety, impulsive spending,
    and a penchant for skipping meals during late‑night play.
background:
  cultural: Nicholas grew up in the suburban-rural outskirts of Dayton, Ohio, within a predominantly white, middle-class community. His upbringing reflects Midwestern values of practicality, self-reliance,
    and community participation. He attended a public middle school that emphasized STEM initiatives, such as a makerspace and an after-school robotics club, and his family engages in local church activities
    and county fair events. The region’s historic ties to aviation and automotive manufacturing have nurtured his interest in engineering, while community resources like the Dayton Public Library’s teen
    programs have supported his curiosity.
