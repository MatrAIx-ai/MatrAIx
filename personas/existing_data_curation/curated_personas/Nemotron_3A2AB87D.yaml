  career_goals: Nicholas aspires to turn his curiosity into a career in engineering, ideally focusing on robotics or automotive design. He hopes to attend a technical high school program that will strengthen
    his project-management skills, and later earn a degree in mechanical engineering. Long-term, he dreams of working for a manufacturing firm in the Dayton area or launching his own tech-repair startup,
    while also sharing his knowledge through a YouTube channel that offers beginner coding and electronics tutorials.
