  career_goals: Linda dreams of becoming a veterinarian, motivated by her curiosity about animal biology and a practical desire to help creatures in her community. She also envisions contributing to wildlife
    conservation and hopes to study environmental science or biomedical engineering in college, blending her inventive ideas with hands‑on, real‑world applications. Her long‑term ambition is to work in
    a clinic or research setting where she can combine scientific inquiry with compassionate care.
