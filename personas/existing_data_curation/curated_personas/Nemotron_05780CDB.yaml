personas:
  professional: Linda Ekey, a systematic budding robotics enthusiast, channels their sci‑fi curiosity and practical planning into designing and programming beginner robots for their school’s science club,
    and they frequently take the lead in collaborative projects while valuing teammates’ input.
  sports: Linda Ekey, a member of the Maplewood Tigers youth soccer team who also enjoys weekend family hikes and summer swims at the community pool, follows the Chicago Cubs and Chicago Bulls, and they
    balance structured practice with spontaneous nature runs, occasionally preferring solo trail explorations over team drills.
  arts: Linda Ekey, an avid piano player who practices both Beethoven’s classical sonatas and Taylor Swift’s pop hits, draws wildlife sketches inspired by Audubon and captures photos of local birds, while
    they also enjoy the animation films of Hayao Miyazaki and the ambient scores of Hans Zimmer.
  travel: Linda Ekey, who loves planning trips with detailed checklists, has hiked short segments of the Appalachian Trail, visited Yellowstone National Park and historic Washington, D.C., and dreams of
    exploring the ancient temples of Kyoto, and they balance family comfort with a fierce curiosity for new ecosystems.
  culinary: Linda Ekey, a budding baker who crafts chocolate chip cookies, banana bread, and homemade pizza using cocoa powder, vanilla extract, and fresh strawberries, often assists their parents in the
    kitchen while humming piano tunes, and they prefer home‑cooked meals over fast food.
  core: Linda Ekey, an organized and curious 11‑year‑old, balances a love for robotics, piano, and animal care with a habit of color‑sorting LEGO bricks, and they sometimes procrastinate on homework when
    Minecraft calls.
background:
  cultural: Linda was raised in Montevallo, Alabama, a small town known for its close‑knit community and the presence of the University of Alabama at Montevallo. Her family participates in local church
    gatherings and community service events, reflecting the Southern values of hospitality and neighborly support. She experiences a blend of rural traditions—such as visiting nearby farms and attending
    county fairs—with academic enrichment opportunities offered by university outreach programs, libraries, and school clubs. This environment nurtures both her appreciation for longstanding community customs
    and her exposure to new ideas and educational resources.
