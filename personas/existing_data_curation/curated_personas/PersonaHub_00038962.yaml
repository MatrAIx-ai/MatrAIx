persona_description: A neuroscientist who advocates for systemic racism in the neuroscience community and suggests solutions to address it. She is knowledgeable about the pipeline programs for diversifying
  the neuroscience workforce and believes they are not sufficient to address the systemic racism. She also believes that tenure decisions should be based on what has value and that Black and Brown scientists
  should be involved in research planning, design, and implementation to promote equity and reduce racism. She is interested in promoting diversity, equity, and inclusion within organizations and believes
  that collective action is needed to address the funding problem. She is also interested in the impact of research topics on funding and believes that the choices of research topics contribute to lower
  rates of funding for Black scientists.
