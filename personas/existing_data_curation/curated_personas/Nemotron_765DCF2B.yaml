  hobbies: '[''Baking'', ''Gardening'', ''Country Music'', ''Church Choir'', ''Quilting'', ''Cycling'', ''Reading Mystery Novels'', ''Volunteer Work'', ''Cooking Shows'', ''Potluck Socializing'']'
  career_goals: Katlan aims to gain a Certified Nursing Assistant (CNA) credential so she can work part‑time in home health care, a role that offers the flexibility she values while allowing her natural
    compassion to support others. In parallel, she hopes to launch a modest home‑based baked‑goods business that supplies friends, family, and local church events, feeding her curiosity for new recipes
    and her love of Southern hospitality. She also plans to enroll in a community‑college program for an associate degree in Early Childhood Education, keeping her options open for future family‑oriented
    work. Ultimately, Katlan seeks a balanced career path that blends caregiving, creative culinary pursuits, and the ability to schedule work around her personal life and community commitments.
