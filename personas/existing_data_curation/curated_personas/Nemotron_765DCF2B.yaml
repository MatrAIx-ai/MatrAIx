personas:
  professional: Katlan Anderson is a budding Certified Nursing Assistant hopeful who balances part‑time home‑health caregiving with plans to launch a modest home‑based baked‑goods side hustle, all while
    taking community‑college courses in Early Childhood Education, and they leverage their warm, cooperative nature and practical DIY skills to coordinate volunteer events and mediate small disputes.
  sports: Katlan Anderson pursues low‑impact fitness by cycling the winding Autauga County trails with the local Autauga Pedalers club, enjoys weekend walks through Oakmulgee State Park, cheers on the Birmingham
    Barons baseball team and the Alabama Crimson Tide football squad, and they prefer casual, flexible workouts over rigid training regimens, aligning with their relaxed attitude toward obligations.
  arts: Katlan Anderson finds creative solace in knitting and crocheting while listening to Dolly Parton’s country hits and the Gaither Vocal Band’s gospel harmonies, occasionally lends their voice to the
    church choir for traditional hymns, devours mystery novels by Agatha Christie, and they attend regional theater productions like the Talladega Playhouse’s classic comedies, weaving music, literature,
    and fiber arts into their social fabric.
  travel: Katlan Anderson favors short, budget‑friendly road trips that blend culinary exploration and gentle adventure, having already visited Savannah’s historic squares, Nashville’s music venues, and
    Gulf Shores’ beachside seafood shacks, while they dream of a spring pilgrimage to New Orleans for its jazz brunches, planning each journey on a loose itinerary that leaves room for spontaneous stops
    at farmers’ markets.
  culinary: Katlan Anderson delights in baking classic Southern biscuits, peach cobbler, and pecan pie while experimenting with inventive twists like rosemary‑infused lemon curd tarts and bourbon‑glazed
    chicken biscuits, skillfully using ingredients such as buttermilk, fresh thyme, and locally sourced honey, and they enjoy sharing these creations at church potlucks and friends’ gatherings, reflecting
    a deep love for comfort food fused with creative flair.
  core: Katlan Anderson is a kindly, garden‑loving 21‑year‑old who balances caregiving aspirations, a budding home‑baking enterprise, and spontaneous crochet sessions, all while they juggle a laid‑back
    budgeting style and a habit of forgetting to water plants on busy weeks.
background:
  cultural: Katlan is a White Southern woman rooted in Prattville, Alabama. Her family has lived in Autauga County for generations, embodying the region's emphasis on community, hospitality, and modesty.
    She grew up attending a local Methodist church, where communal events, gospel music, and shared meals shaped her values of cooperation and harmony. Southern traditions—such as sweet tea, family barbecues,
    and a love for country music—are woven into her daily life. At the same time, growing up in a small‑town environment has given her a practical outlook, balancing curiosity about new ideas with a respect
    for established customs and a preference for flexible, low‑stress routines.
