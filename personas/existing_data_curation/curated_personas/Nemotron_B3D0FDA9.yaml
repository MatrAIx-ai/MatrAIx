  hobbies: '[''Home recipe experimentation'', ''Attending farmers’ markets and food festivals'', ''Dancing (line, hip‑hop, R&B)'', ''Volunteering at food banks and shelters'', ''Running and yoga'', ''Reading
    Black literature and culinary memoirs'', ''Balcony herb gardening'', ''Food and city photography'', ''Listening to jazz, soul, and hip‑hop music'']'
  career_goals: Tiffany aims to move from her current food‑preparation role into a supervisory position within the next two years, eventually becoming a sous‑chef and later a head chef at a restaurant that
    celebrates African‑American soul food fused with Pittsburgh’s regional flavors. She plans to earn a bachelor’s degree in culinary arts or hospitality management while completing a Certified Food Safety
    Manager credential. Long‑term, she dreams of opening a community‑focused pop‑up or small restaurant that offers healthy, culturally inspired meals and provides culinary training opportunities for youth
    in the city’s underserved neighborhoods. She also hopes to mentor other Black women in the culinary field and become an advocate for diversity and sustainability in the local food industry.
