  career_goals: Roberto dreams of a future where he can combine his love for helping others with his practical mindset. He aspires to become a teacher or youth mentor who organizes engaging activities for
    classmates, or to work as a veterinarian because he enjoys caring for animals. He also envisions playing soccer at a competitive level and possibly coaching a community team, using his leadership and
    teamwork skills. Ultimately, he wants a career that allows him to support his family and give back to his neighborhood in Astoria.
