personas:
  professional: Roberto Lopez is an aspiring young robotics engineer who channels his love for structure and teamwork into building functional LEGO Mindstorms projects, leading his after‑school robotics
    club, and meticulously documenting each creation in a notebook that mirrors his practical, organized mindset.
  sports: Roberto Lopez is a dedicated youth soccer player who practices three times a week at the community park, plays for the local Riverside Rangers youth league, and passionately follows professional
    clubs such as FC Barcelona and LA Galaxy, balancing his energetic, sociable nature with a disciplined fitness routine and a love for team collaboration.
  arts: Roberto Lopez spends weekends sketching comic strips inspired by superheroes like Spider‑Man, while listening to reggaeton and salsa hits from artists such as Bad Bunny and Marc Anthony, and his
    frequent visits to the city museum nurture his fascination with street art and modern illustrations.
  travel: Roberto Lopez enjoys short family road trips to nearby historic sites like the Old Town Square and the National Museum, dreams of exploring the vibrant streets of Mexico City and the theme parks
    of Orlando, and prefers itineraries that mix structured tours with spontaneous playground stops, all within the constraints of school schedules and a modest travel budget.
  culinary: Roberto Lopez loves helping his family prepare tacos al pastor with marinated pork, fresh cilantro, and lime, as well as simple quesadillas, often experimenting with Minecraft‑inspired plating
    to make the dishes look like pixelated art, reflecting his beginner‑level cooking skills and enthusiasm for family traditions.
  core: Roberto Lopez is a structured, sociable 11‑year‑old who merges his passion for robotics, soccer, and family cooking while occasionally overindulging in video‑game microtransactions and forgetting
    his allergy medication before matches.
background:
  cultural: Roberto comes from a Hispanic family with roots in Latin America, and Spanish is spoken at home alongside English. Growing up in Astoria, Queens, he experiences a vibrant blend of cultures,
    celebrating traditions such as Día de los Muertos, Hispanic Heritage Month, and family gatherings centered around food and music. His parents emphasize respect for elders, community involvement, and
    the value of hard work, shaping his cooperative personality. He participates in local cultural events, enjoys Latin rhythms, and takes pride in his bilingual heritage.
