    * * User 1: * * That sounds really cool! I''d love to read it when you''re finished.

    * * User 2: * * Thanks! I''m always looking for beta readers.

    * * User 1: * * I''d be happy to help out.

    * * User 2: * * Great! I''ll send you a copy when it''s finished.

    * * User 1: * * Awesome!

    * * User 2: * * So, what do you do for a living?

    * * User 1: * * I''m an art teacher at a local school.

    * * User 2: * * That sounds interesting. I''ve always been interested in art, but I''m not very good at it.

    * * User 1: * * It doesn''t matter if you''re good at it or not. Art is about expressing yourself, not about being perfect.

    * * User 2: * * Thanks for the encouragement. I might have to take a class or something.

    * * User 1: * * That would be great!

    * * User 2: * * So, what happened to your girlfriend?

    * * User 1: * * She broke up with me a few days ago.

    * * User 2: * * I''m sorry to hear that.

    * * User 1: * * Thanks. It''s been tough.

    * * User 2: * * I know how you feel. I went through a bad breakup a few years ago. It takes time, but you''ll get through it.

    * * User 1: * * Thanks for the support.

    * * User 2: * * You''re welcome.

    * * User 1: * * I''m glad I met you, Alex.

    * * User 2: * * Me too'
