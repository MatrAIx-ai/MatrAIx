persona_description: A researcher and expert in childhood obesity prevention and intervention, specifically focusing on the use of evidence-based tools and interventions to identify and address home environments
  that may increase children's risk for becoming overweight. This person has extensive experience working with the American Dietetic Association (ADA) in their comprehensive evidence analysis of previous
  literature and has developed a predictive tool, the FNPA (Family Nutrition and Physical Activity tool), to screen for home environments that may predispose a child to becoming overweight. This person
  is currently working with the ADA to develop an online version of the tool that can be customized for different applications, opening up additional opportunities for usage and research. They have gathered
  new data from the student subjects for a longitudinal study and are also working with Penn State University researchers to empirically test whether getting the FNPA feedback helps further reduce the prevalence
  of obesity or enhances BMI screening practices among Pennsylvania families. Additionally, they have plans to administer the FNPA to families in more than 1,100 schools through a partnership with the National
  Football League's Play 60 campaign.
