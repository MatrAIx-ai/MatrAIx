  hobbies: '[''Drawing and sketching'', ''Coloring books and pattern art'', ''Reading picture books and storytime sessions'', ''Building with Lego bricks'', ''Listening to music and dancing'', ''Visiting
    Brooklyn Public Library storytime'', ''Exploring parks and collecting natural objects'', ''Participating in after‑school art club'', ''Helping with family cooking'']'
  career_goals: Khalifah dreams of turning her love of art and storytelling into a future career. She often talks about becoming an illustrator or mural artist who can bring bright, hopeful images to her
    neighborhood. She also imagines herself as a teacher who uses creative projects to help other children learn. In the short term, she aims to improve her reading fluency, learn to write short stories,
    and experiment with new art techniques. Her long‑term ambition is to use her artistic talents to celebrate her community’s culture and inspire other kids to express themselves.
