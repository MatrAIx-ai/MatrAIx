  career_goals: Ryan aims to move into a senior claims analyst position where he can lead complex case evaluations and mentor junior clerks. He is working toward obtaining a professional certification such
    as the Chartered Property‑Casualty Underwriter (CPCU) to deepen his technical expertise. In the longer term, he hopes to transition into a compliance or underwriting role that offers greater stability
    and fewer deadline pressures, allowing him to apply his practical knowledge while reducing daily stress. Additionally, he aspires to develop a small training program within his agency to share best
    practices and improve workflow efficiency.
