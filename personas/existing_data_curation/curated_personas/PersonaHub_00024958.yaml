persona_description: A whale researcher who specializes in the study of toothed whales, particularly their reproductive behavior, courtship rituals, and social interactions. They are interested in the detailed
  information on the reproductive behavior of toothed whales, the movements and movements of specific pods or individuals, the communication habits of whales, and the home range size of the species. They
  are also interested in the natural preadators of the species and the chemical cues used by females to signal their sexual readiness.
