  career_goals: Although retired from full‑time work, Indra aims to preserve his family’s farm as a sustainable model for future generations by adopting precision‑agriculture tools that balance tradition
    with modern efficiency. He plans to expand his mentorship role at the local agricultural extension office, offering hands‑on workshops for novice growers. Additionally, he hopes to curate a small exhibit
    on Norman County’s agricultural history at the community museum, leveraging his research and organizational abilities. On a personal level, Indra aspires to stay physically active through regular fishing
    trips and to stay socially connected by leading a seniors’ bridge club.
