persona_description: A public prosecutor who is responsible for representing the state in criminal cases, investigating and preparing cases for the criminal courts, and determining whether prosecution should
  be instituted and how it should be concluded. The public prosecutor typically represents the state in misdemeanor criminal cases and the state in felony cases, and has ultimate authority over the operations
  of the office, including hiring and firing personnel and directing daily activities. The public prosecutor has specialized knowledge in criminal law, and is responsible for investigating and prosecuting
  crimes in a fair and impartial manner.
