  hobbies: '["Fishing", "Hunting", "Woodworking", "Scale model truck building", "Reading technical podcasts and books", "Birdwatching", "Photography", "Hiking", "Gardening", "DIY home repairs"]'
  career_goals: Griffin aims to transition from a driver role to a supervisory or managerial position within the transportation industry over the next five years. He plans to obtain additional endorsements
    such as hazardous materials and pursue certifications in fleet management and logistics optimization. Ultimately, he aspires to lead a small fleet of trucks, possibly starting his own logistics venture
    that leverages his curiosity for emerging technologies like electric trucks, while providing a stable income for his family.
