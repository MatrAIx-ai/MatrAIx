    ''archival curation'', ''digital photo organization'', ''senior-friendly tech usage'', ''conflict mediation'']'
  hobbies: '[''reading art books and poetry'', ''watercolor painting'', ''quilting and patchwork'', ''herb gardening'', ''birdwatching'', ''listening to classical music'', ''photographing local landscapes'',
    ''puzzle solving (crosswords, sudoku)'', ''genealogy research'', ''documentary watching'']'
  career_goals: Martha's main ambition is to preserve her family's legacy and the cultural history of Chemung County by completing a handwritten memoir and a digital archive of photographs, letters, and
    newspaper clippings for her grandchildren. She aims to deepen her knowledge of art by completing an online art‑history series focused on American Impressionism and to apply that insight in creating
    a small watercolor series of the Finger Lakes region. She also aspires to maintain her independence by mastering the use of a tablet for telehealth appointments and online banking. Though she values
    solitude, she hopes to occasionally share her garden’s bounty with neighbors and host a quiet, intimate gathering for her great‑grandchildren, using her organized planning to ensure the events are low‑stress.
    Lastly, she wishes to keep her mind sharp through daily puzzles and to sustain her physical health through gentle morning stretches and tending to her herb garden.
