  hobbies: '["Building LEGO sets", "Watercolor painting", "Reading picture books", "Playing tag with friends", "Snowball fights and sledding", "Children''s dance class", "Singing karaoke", "Craft projects",
    "Exploring nature trails"]'
  career_goals: Mai dreams of growing up to become a kindergarten teacher or a community librarian, drawn by her desire to create organized, caring environments for other children. She also imagines helping
    people in a practical way, such as becoming a pediatric nurse or a wildlife conservation volunteer, where her love for routine, kindness, and harmony can make a difference.
