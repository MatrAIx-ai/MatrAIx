personas:
  professional: Mai Parr, an aspiring LEGO architect, combines a love for building intricate brick sets with a disciplined mindset fostered by life on a military base, turning playtime into miniature engineering
    projects while eagerly sharing their creations with friends, and they often invite classmates to help add extra details.
  sports: Mai Parr, a snow‑play enthusiast, joins the Fairbanks Youth Winter Sports Club for weekly snowshoe races, idolizes the Fairbanks Ice Dogs hockey team, participates in tag games and casual soccer
    on the base field, and treats each brisk morning jog as a chance to practice teamwork and perseverance, which they proudly showcase during school sports days.
  arts: Mai Parr, a budding watercolor painter, often recreates scenes from Disney’s "Frozen" and the classic illustration style of Mary Blair, sings karaoke versions of "Let It Go" with family, and delights
    in crafting scrapbook pages featuring their LEGO creations, showcasing a vivid imagination informed by community storytelling, and they love sharing their artwork with peers.
  travel: Mai Parr, an adventurous little explorer, loves short family hikes along the Chena River Trail, has visited Denali National Park’s visitor centre, dreams of seeing the midnight sun in Tromsø,
    Norway, and looks forward to a future summer trip to the Alaska State Fair where they can try new rides and foods, while they keep a small map of visited places on their bedroom wall.
  culinary: Mai Parr, a budding kitchen helper, favors salmon‑and‑cream cheese bagels, helps whisk blueberry muffin batter with flour, butter, and fresh berries, and can name ingredients like cheddar cheese,
    chocolate chips, and honey while proudly serving their family’s favorite fish‑taco night, and they often ask for extra sprinkles on desserts.
  core: Mai Parr is a routine‑loving, high‑energy six‑year‑old who builds detailed LEGO worlds, bursts into karaoke on demand, dashes through snowball battles, yet often leaves art supplies scattered across
    the floor, and they habitually hum the same song before bedtime.
background:
  cultural: Mai is a White American child raised in a military family stationed at Fort Wainwright, Alaska. Her household celebrates typical U.S. holidays such as Thanksgiving, Christmas, and Independence
    Day while also embracing the seasonal rhythms of the Alaskan environment, like winter snow activities and summer fishing trips. The base community fosters a sense of order, discipline, and patriotism,
    influencing her preference for routine and practicality. School and community events occasionally introduce her to Indigenous Alaskan cultures through storytelling and art projects, broadening her appreciation
    for diversity while reinforcing her values of cooperation and respect.
attributes:
  skills: '["Reading simple sentences", "Writing her name", "Counting to 20", "Basic addition", "Following multi‑step instructions", "Building with LEGO", "Using educational tablet apps", "Basic snow safety
