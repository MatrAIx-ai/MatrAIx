  career_goals: Aspire to become a crew foreman within the next three years, leveraging her organizational strengths to lead larger crews and improve site efficiency. Plans to complete a journeyman-level
    certification in carpentry and obtain a Texas State Contractor’s License, eventually co-running a modest family-owned renovation business with her husband focused on affordable home repairs for the
    local community. Also aims to mentor younger workers, especially women and bilingual staff, to promote diversity on construction sites.
