  career_goals: Victor aims to advance to a leadership role in the fire department, targeting a promotion to lieutenant within the next five years and eventually captain or fire chief. He wants to spearhead
    initiatives that integrate new technologies—such as drone surveillance and advanced thermal imaging—into daily operations to improve response efficiency. He is committed to expanding the department's
    community outreach programs, especially fire safety workshops in local schools and churches, and to establishing a peer‑support network focused on mental health and stress resilience for firefighters.
    To support these ambitions, he plans to complete an associate degree in fire science and obtain paramedic certification, while also pursuing professional development in incident command and fire investigation.
