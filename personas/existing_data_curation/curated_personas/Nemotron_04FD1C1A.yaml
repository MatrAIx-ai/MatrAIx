  career_goals: Ken dreams of a future where he can combine his love for teamwork, routine, and helping others. He often says he wants to become a firefighter because he admires the clear schedules, the
    camaraderie of the crew, and the chance to protect his community. He also shows an early fascination with building things, imagining himself as a civil engineer designing bridges and playgrounds when
    he grows up. These ambitions reflect his practical mindset, organized nature, and competitive drive to excel in his chosen field.
