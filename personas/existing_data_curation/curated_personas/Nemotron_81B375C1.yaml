  hobbies: '[''Reading YA novels and science articles'', ''Sketching and watercolor painting'', ''Playing acoustic guitar'', ''Hiking and trail exploration'', ''Birdwatching'', ''Gardening and vegetable
    growing'', ''Volunteer work at church youth group'', ''DIY crafts and jewelry making'', ''Scrapbooking'']'
  career_goals: Maricela aims to obtain her GED within the next year and then enroll in a community college program focused on health sciences. She is drawn to the practical, caring nature of nursing and
    hopes to become a registered nurse working in a community health clinic that serves families in her region. Simultaneously, she nurtures a long-term ambition to combine her love for animals and environmental
    stewardship by gaining certification as a veterinary technician and eventually managing a local animal-rescue or wildlife rehabilitation center. She envisions her career path as a blend of hands-on
    service, continual learning, and contributing positively to the wellbeing of both people and animals in her community.
