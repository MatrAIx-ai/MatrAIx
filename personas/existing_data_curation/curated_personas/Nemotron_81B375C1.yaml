personas:
  professional: Maricela Perkins, an aspiring health‑science student, blends her practical caring nature with strong listening and organization skills by volunteering at her church’s youth health outreach,
    where she helps plan wellness workshops and assists with basic first‑aid demonstrations, embodying her early nursing ambition and community‑focused ethos.
  sports: Maricela Perkins enjoys weekend hikes along the Natchez Trace, follows the Tennessee Titans on Sundays, participates in a local 5K running club, plays casual volleyball with friends at the community
    center, and balances a love for birdwatching with a laid‑back approach to fitness that favors consistency over competition.
  arts: Maricela Perkins expresses her creative side by strumming acoustic guitar to songs by Chris Stapleton and Taylor Swift, sketching detailed meadow scenes inspired by her garden, devouring YA novels
    like ‘The Hate U Give’, and attending community theatre productions of classic Southern plays, while occasionally making tongue‑in‑cheek TikTok videos of her scrapbook projects.
  travel: Maricela Perkins prefers road‑trip adventures with family, often saving up for visits to the Great Smoky Mountains, a weekend music festival in Nashville, and a spring break to Washington, D.C.,
    balancing a love for scenic nature stops with the occasional spontaneous detour to a quirky roadside diner, all while keeping a modest travel budget through careful planning and part‑time earnings.
  culinary: Maricela Perkins delights in cooking simple southern comfort dishes like skillet‑fried chicken with buttery corn biscuits, fresh garden salad with heirloom tomatoes, basil‑infused lemon water,
    and occasionally experiments with homemade apple pie, showcasing a growing confidence in the kitchen while still relying on pre‑made mixes for occasional dessert cravings.
  core: Maricela Perkins blends Southern hospitality with teen curiosity, balancing community‑service drive and a habit of procrastinating on schoolwork, while humming country tunes during garden chores
    and secretly hoarding spare change for concert tickets.
background:
  cultural: Maricela comes from a white Southern family rooted in Spring Hill, Tennessee, an area that blends small-town charm with close-knit community values. Her upbringing reflects the traditions of
    the American South, including a strong emphasis on family gatherings, church involvement, and hospitality. She grew up attending local community events, listening to country and bluegrass music, and
    enjoying seasonal celebrations such as county fairs and holiday potlucks. The region's agricultural heritage has given her an appreciation for the outdoors and for self-sufficiency, shaping her practical
    outlook and her interest in gardening and animal care. These cultural influences, combined with the supportive environment of Marshall County, have fostered her courteous, cooperative demeanor and her
    desire to contribute positively to her community.
attributes:
  skills: '[''Basic computer and internet navigation'', ''Social media content creation'', ''Effective communication and active listening'', ''Conflict mediation in peer groups'', ''Basic cooking and meal
