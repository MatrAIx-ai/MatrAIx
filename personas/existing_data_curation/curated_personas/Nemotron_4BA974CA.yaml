    for product aesthetics", "Adaptive problem‑solving and flexible planning"]'
  hobbies: '["Watercolor painting", "Beadwork and small craft projects", "Visiting art galleries and tribal museums", "Gardening native prairie plants", "Birdwatching", "Reading historical fiction and indigenous
    literature", "Cooking traditional Cherokee recipes", "Participating in local powwows and cultural events", "Volunteer tutoring at community center", "Walking and light hiking in nature"]'
  career_goals: Even at 77, Jacqueline aims to remain an active contributor in her field by mentoring younger procurement staff and sharing her wealth of experience, especially her insights on culturally
    respectful sourcing. She hopes to champion sustainable purchasing initiatives that prioritize locally made, Native‑crafted goods for schools and community centers. Over the next few years, she envisions
    serving as a part‑time consultant to help organizations develop procurement policies that honor indigenous traditions while achieving cost efficiency. Additionally, she aspires to launch a small grant
    program that funds art projects by tribal artists, merging her professional expertise with her love for the arts.
