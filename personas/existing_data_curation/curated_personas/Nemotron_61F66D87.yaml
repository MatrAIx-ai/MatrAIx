personas:
  professional: Mercedes Gonzalez is a diligent, bilingual part‑time retail stocker who leverages their strong organizational skills and love of routine to excel in inventory management, and they are preparing
    to enroll in a community‑college medical assisting (or cosmetology) program to build a hands‑on, predictable career that will later support their entrepreneurial dream of a home‑based food service featuring
    beloved family recipes.
  sports: Mercedes Gonzalez is a casual fitness enthusiast who walks daily along the border river with friends, participates in a co‑ed soccer league through the local community sports club, and they follow
    the San Antonio Spurs, Houston Astros, and FC Dallas for weekend sports inspiration.
  arts: Mercedes Gonzalez immerses themselves in rhythmic Latin music, regularly playing cumbia hits by Los Ángeles Azules, bachata classics by Romeo Santos, and reggaetón tracks from Bad Bunny while cooking,
    and they relax by watching telenovelas such as María la del Barrio, while practicing embroidery inspired by traditional motifs and following craft influencers on Pinterest.
  travel: Mercedes Gonzalez prefers low‑cost road trips that blend cultural curiosity with family ties, such as weekend visits to Oaxaca in Mexico, annual trips to New Orleans for its vibrant food festivals,
    and occasional hikes in the nearby Hill Country, and they plan each journey with free travel apps while staying within a modest budget.
  culinary: Mercedes Gonzalez is an inventive home cook who perfects traditional family dishes like pupusas de queso fresco, revueltas with pork chicharrón and loroco, and tamales de pollo, and they regularly
    experiment with new fillings such as sweet plantain and spinach while sourcing fresh corn masa, herbs, and locally grown chilies from the farmers' market.
  core: Mercedes Gonzalez blends a reliable, routine‑driven mindset with a passion for cooking, community volunteering, and dancing to cumbia, yet they sometimes over‑commit to family duties, neglecting
    their own rest.
background:
  cultural: Mercedes grew up in a close‑knit Salvadoran immigrant family in Calexico, where Spanish is the language of the home and family gatherings revolve around shared meals and Catholic traditions.
    Her parents arrived during the Salvadoran civil war, bringing customs such as Sunday pupusa lunches, reverence for community solidarity, and a deep respect for religious observances. Living on the US‑Mexico
    border, she is also exposed to Mexican cultural elements, celebrating both Salvadoran Independence Day and local Mexican holidays. This bicultural environment shapes her identity, fostering a strong
    sense of duty to family, community involvement, and the preservation of her Central American heritage.
attributes:
  skills: '[''bilingual communication (Spanish/English)'', ''basic computer proficiency (Microsoft Office)'', ''budgeting and household management'', ''cooking traditional Salvadoran cuisine'', ''caregiving
    and child supervision'', ''inventory and retail stocking'', ''customer service basics'']'
  hobbies: '[''cooking traditional Salvadoran dishes'', ''listening to Latin music'', ''church and community event participation'', ''volunteering at youth centers'', ''gardening'', ''embroidery and handicrafts'',
    ''watching telenovelas'', ''walking by the border river'']'
  career_goals: Mercedes aims to enroll in a community college program—either a medical assisting certification or a cosmetology course—to secure a stable, hands‑on career that aligns with her preference
    for routine and practical work. She envisions gaining enough experience to support her family financially while maintaining a predictable schedule. In the longer term, she hopes to open a small home‑based
    food service offering homemade Salvadoran dishes, combining her culinary passion with entrepreneurial ambition.
