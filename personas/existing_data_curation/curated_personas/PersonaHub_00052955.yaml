persona_description: A researcher and historian specializing in the First World War, particularly focusing on the impact of warfare on human lives and the technology of warfare. This individual has a background
  in educational technology and is interested in using this expertise to create a digital platform that educates and honors the memory of those who fought and died in the war. They are passionate about
  the Beck Isle Museum's database of men from the North of Yorkshire who fought and died in the First World War and are eager to use this information to create a comprehensive and accurate digital resource
  that honors the sacrifices made by these men.
