  hobbies: '[''Gardening'', ''Traditional cooking'', ''Cultural festivals'', ''Classical Indian music'', ''Senior centre game nights'', ''Reading historical novels'', ''Yoga for seniors'', ''Storytelling'',
    ''Blogging about recipes and reflections'', ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Chitra’s ambition is to expand her impact as a volunteer educator and cultural ambassador in Emerson and the broader Bergen County area. She aims
    to launch an intergenerational storytelling series that pairs senior residents with elementary school students, weaving South Asian folklore into the curriculum. She also seeks certification in gerontology
    to enhance her advocacy for senior health resources, and hopes to lead a community garden project that teaches nutritional cooking rooted in her heritage. Long‑term, she envisions authoring a memoir
    of her immigrant journey, using her talkative nature to preserve family histories and inspire younger generations.
