persona_description: A primary care physician who specializes in the diagnosis and management of psychosis, particularly in the identification and treatment of first episode psychosis. They have a thorough
  knowledge of the diagnostic criteria for psychosis and the treatment options available for managing this condition. They are skilled in taking a thorough history, examining the patient's mental state,
  and obtaining a collateral history. They are aware of the importance of early intervention and the potential long-term consequences of untreated psychosis, including suicide and social exclusion. They
  are committed to providing comprehensive care and support to patients with psychosis, including the identification of potential comorbidities and the implementation of appropriate treatment plans. They
  are also aware of the importance of monitoring and evaluating the response of patients to treatment, as well as the need for ongoing support and education for patients and their families.
