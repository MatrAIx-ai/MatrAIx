personas:
  professional: Carlos Amador, a budding junior builder, delights in stacking colorful blocks into towering structures, showing early organizational flair and spontaneous creativity that make them the center
    of playtime discussions.
  sports: Carlos Amador thrives in a toddler soccer clinic at the community park, proudly wears a miniature Los Angeles Dodgers cap, and enjoys kicking a soft foam ball during indoor play, while cheering
    on the local Lakers during family game nights.
  arts: Carlos Amador endlessly sings along to Sesame Street melodies, mimics Elmo’s dance moves, and eagerly watches the animated performances of the Muppets, shaping a love for expressive, social play
    that fuels their daily storytelling sessions.
  travel: Carlos Amador eagerly anticipates family outings to the nearby zoo where they marvel at giraffes, splashes happily at the Santa Monica beach, and daydreams about visiting the Eiffel Tower after
    seeing its twinkling lights in a picture book.
  culinary: Carlos Amador prefers creamy macaroni and cheese with a sprinkle of cheddar, delights in dipping apple slices into peanut butter, and recently helped stir batter for banana pancakes, though
    they habitually leave crumbs on the high chair afterward.
  core: Carlos Amador is a chatty three‑year‑old who balances a love for building block towers with a habit of scattering toys everywhere, yet their bright curiosity keeps them constantly exploring new
    ideas.
background:
  cultural: Carlos was raised in a bilingual Mexican‑American household in Omaha, Nebraska. At home his parents speak Spanish and celebrate Mexican traditions such as Día de los Muertos, Cinco de Mayo,
    and family gatherings with tamales, tacos, and mariachi music. He attends a local preschool where he shares stories about these customs, and his family participates in a nearby Mexican cultural center’s
    events and a bilingual church. This blend of Mexican heritage and Midwestern community gives him a strong sense of cultural pride while adapting to his local environment.
