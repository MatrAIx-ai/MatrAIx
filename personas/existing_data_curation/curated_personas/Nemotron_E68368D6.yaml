  career_goals: Although only three, Carlos loves to imagine his future. He frequently says he wants to be a teacher because he enjoys talking and leading games, a firefighter who helps people, or a chef
    who prepares his favorite tacos. His ambition is to keep learning new words, make many friends, and become someone who can bring joy to others.
