  hobbies: '[''Reading (history, philosophy)'', ''Yoga and meditation'', ''Indoor herb gardening'', ''Cooking (Ethiopian and Southern cuisine)'', ''Volunteering (financial literacy workshops)'', ''Listening
    to jazz and classical music'']'
  career_goals: He aims to transform his company into a benchmark for sustainable growth that balances profitability with social impact. Thomas aspires to launch a mentorship program for under‑represented
    professionals, expand the firm’s community‑investment initiatives, and eventually take on a board‑level role that influences industry standards for ethical governance and employee wellbeing. He also
    envisions authoring a reflective guide on leading with compassion while managing stress.
