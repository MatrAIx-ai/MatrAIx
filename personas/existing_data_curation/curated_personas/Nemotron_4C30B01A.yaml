  career_goals: Gayle aims to advance to a senior facilities manager position within the next five years, overseeing a team of maintenance professionals for a historic property or municipal complex in the
    Newport area. She plans to acquire additional certifications in green building and renewable energy systems, positioning herself as a leader in sustainable maintenance practices. Ultimately, she envisions
    opening a small, community‑focused repair consultancy that provides affordable services while mentoring apprentices, especially women entering the trade. She also hopes to collaborate with local arts
    organizations to maintain and preserve public art installations.
