personas:
  professional: Gayle Cook, a seasoned facilities maintenance specialist with over 20 years of hands‑on expertise in plumbing, electrical troubleshooting, HVAC servicing, and historic building preservation,
    leverages their methodical organization and artistic eye to deliver functional repairs that honor New England's architectural character while pursuing a senior facilities manager role and championing
    sustainable practices.
  sports: Gayle Cook enjoys early morning jogs along the Newport shoreline, participates in a local adult recreational softball league, cheers for the Boston Red Sox and New England Patriots, and occasionally
    sails with the Newport Yacht Club to stay fit and connected to the maritime community.
  arts: Gayle Cook passionately explores Newport’s cultural scene, sketching seascapes at the Newport Art Museum while attending community theater productions of classics like *Our Town*, and finds inspiration
    in the paintings of Winslow Homer, the music of Norah Jones, and the poetry of Mary Oliver.
  travel: Gayle Cook favors low‑key, immersive trips that blend history and nature, having explored the rugged coasts of Maine, the historic streets of Bath, England, and the vineyards of the Finger Lakes,
    while dreaming of a sustainable eco‑retreat in the Azores.
  culinary: Gayle Cook, an avid home cook with moderate skill, delights in preparing fresh lobster roll on buttered brioche, creamy New England clam chowder seasoned with thyme, and garden salads featuring
    heirloom tomatoes, basil, and locally sourced goat cheese, often sourcing ingredients at farmers’ markets.
  core: Gayle Cook blends meticulous maintenance expertise with a love for coastal art, channeling curiosity into sustainable renovations, yet sometimes forgets to water their garden after a long weekend
    of volunteering.
background:
  cultural: Gayle was raised in a typical New England white family with deep roots in Rhode Island’s coastal communities. Her heritage traces back to English and Irish ancestors who settled in the region
    during the colonial era. The local culture emphasizes self‑reliance, respect for historic preservation, and close‑knit community involvement. Growing up near the sea, she developed an appreciation for
    maritime history, seasonal rhythms, and the region’s dedication to environmental stewardship. These values are reflected in her work ethic, her commitment to sustainable practices, and her participation
    in community events that celebrate Rhode Island’s heritage.
