  career_goals: Robert aims to leverage his associate degree in Business Administration to move beyond the checkout lane and into retail management. Over the next two to three years, he plans to pursue
    a shift‑lead position, then an assistant manager role, earning hands‑on experience in staff scheduling, loss prevention, and store performance analysis. Ultimately, he aspires to become a store manager
    of a multi‑location retail chain in the Atlanta metro area, and eventually explore opening his own boutique or franchise that combines his love for community engagement with practical business operations.
