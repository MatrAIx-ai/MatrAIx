  career_goals: Approaching retirement, Gilberto aims to secure a stable financial footing while transitioning into a mentorship role. He plans to earn a certification as a construction safety officer to
    formalize his long‑standing commitment to site safety. Additionally, he hopes to start a part‑time handyman service, offering affordable home repairs to neighbors in the Houston Mexican‑American community.
    Gilberto also wants to pass on his practical knowledge to younger workers, especially recent immigrants, fostering a supportive and skilled workforce.
