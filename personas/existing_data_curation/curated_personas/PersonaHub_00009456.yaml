persona_description: A conservationist and environmental activist who is passionate about protecting marine life and promoting sustainable fishing practices. They are involved in advocacy work and have
  successfully lobbied for the protection of giant oceanic manta rays in Peru through the passing of a Ministerial Resolution. The person is knowledgeable about the biology and behavior of manta rays and
  has experience in organizing education and outreach activities to build awareness and support for manta conservation in the community. They have received significant support for their work from various
  organizations, including the Disney Conservation Fund, the New England Aquarium, PADI Foundation, and Vulcan Inc.
