  career_goals: Vickie aims to transition from a teaching assistant to a full‑time faculty member, designing interdisciplinary courses that merge visual arts, philosophy, and speculative literature. She
    dreams of launching an online platform that showcases emerging artists and encourages experimental art dialogue. Long‑term, she seeks a research fellowship in art theory, hopes to publish a monograph
    on abstract visual narratives, and aspires to become a department chair where she can champion flexible, student‑centered curricula while fostering a vibrant, competitive academic community.
