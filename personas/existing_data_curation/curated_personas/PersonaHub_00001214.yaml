persona_description: A teacher who values the unique perspectives and contributions of every child in the classroom and recognizes the importance of acknowledging the child's competency to form relationships
  with the world around them. This educator is committed to making choices that reflect the holistic construct between nature, systems, and communities, and is interested in understanding the ways in which
  learning is interconnected and informed by the child's experiences in the home, schools, and community. This educator is skilled in guiding the values of the uniqueness of each child and appreciates the
  child's capability to learn directly from others.
