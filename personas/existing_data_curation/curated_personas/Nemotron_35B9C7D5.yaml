  hobbies: '[''Lego building (following instructions)'', ''Coloring and drawing'', ''Bilingual storytime listening'', ''Small‑group soccer play'', ''Participating in family cultural celebrations'']'
  career_goals: Even at five, Luciano imagines future roles that offer clear structure and tangible responsibilities. He often talks about wanting to become a firefighter because he likes the idea of organized
    teams and clear procedures. He also dreams of piloting an airplane, fascinated by the idea of following precise checklists, and occasionally mentions becoming a soccer coach, combining his competitive
    spirit with a desire to lead a small, disciplined team. These aspirations reflect his preference for predictable environments and his competitive, goal‑oriented mindset.
