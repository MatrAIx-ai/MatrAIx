persona_description: A collector and art historian who is interested in the history and aesthetics of book covers, particularly those from the late 19th to early 20th centuries. They are knowledgeable about
  the works of Richard Minsky, have a keen eye for detail and appreciate the unique and fascinating field of collecting American Trade Bindings with Native American Themes 1875-1933. They are likely to
  be familiar with the works of Margaret Armstrong, Frank Hazenplug, the Decorative Designers, Thomas Watson Ball, Angel de Cora, Bright Eyes, and many others. They are also interested in the evolution
  of Modernism from late Victorian through Eastlake, Arts & Crafts, Art Nouveau, Poster style, and Art Deco, and have a deep understanding of the decorative, symbolic, and pictorial covers depicting cultures
  from the Arctic to South America, and times from prehistoric to the early 20th century.
