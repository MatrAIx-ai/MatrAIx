personas:
  professional: Alexander Owens is a retired electrical engineer turned community tech mentor, leveraging three decades of circuit design, Python coding, and project leadership to guide youth in STEM while
    they apply their structured analytical mindset and spontaneous collaborative spirit to nonprofit technology integration and grant writing.
  sports: Alexander Owens enjoys early morning walks and weekly hikes on Freedom Park’s rugged trails, plays senior league bridge for mental agility, follows the Carolina Panthers and Charlotte Hornets
    loyally, and participates in the Charlotte Trek Club for seasonal group hikes, balancing structured fitness with spontaneous social activity, and they often share their experiences with friends over
    coffee.
  arts: Alexander Owens sings soulfully in his church’s gospel choir, draws inspiration from the music of Mahalia Jackson and contemporary artist Leon Bridges, attends local theater productions featuring
    "The Color Purple", and spends evenings woodworking while listening to classic blues records by B.B. King, weaving artistic appreciation into their daily rhythm.
  travel: Alexander Owens prefers well‑planned, purpose‑driven trips, often combining volunteer tech workshops in Savannah, GA, with leisure visits to historic sites like the Freedom Trail in Boston, yet
    they also indulge in spontaneous road trips to Asheville’s Blue Ridge Parkway, balancing structured itineraries with spur‑of‑the‑moment detours.
  culinary: Alexander Owens is an adept home cook of Southern comfort cuisine, regularly preparing dishes like shrimp and grits with smoked paprika, collard greens seasoned with ham hocks, and pecan pie,
    while they experiment with heritage‑inspired spice blends and source fresh herbs from their community garden.
  core: Alexander Owens blends a structured engineer’s precision with spontaneous community spirit, using retirement to mentor young tech talent, nurture a garden, and sing gospel, all while they juggle
    occasional forgetfulness and a love for heritage‑rich flavors.
background:
  cultural: Alexander grew up in Charlotte’s historic African‑American community of West End, the son of a civil‑rights activist mother and a high‑school math teacher father. The family's weekly life revolved
    around church, music, and community gatherings, instilling a deep sense of solidarity and pride in African‑American heritage. He attended a predominantly Black public high school that emphasized academic
    excellence and cultural pride, and later earned a STEM degree from a state university where he was active in the Black Engineers Society. Throughout his life, he has remained closely linked to the church,
    local jazz clubs, and the annual Juneteenth celebrations that keep his cultural roots vibrant.
