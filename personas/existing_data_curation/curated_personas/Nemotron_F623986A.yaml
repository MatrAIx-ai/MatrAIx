  career_goals: Now retired, Alexander aims to channel his engineering experience into empowering the next generation of Black engineers in Charlotte. He plans to expand his volunteer tutoring, lead a community
    tech‑innovation hub, serve on the board of a local nonprofit that bridges the digital divide, and author a memoir that captures his journey through the civil‑rights era and the evolution of technology.
    He also hopes to acquire a certification in renewable energy to help design solar solutions for community centers, blending his structured expertise with the flexible creativity needed for grassroots
    impact.
