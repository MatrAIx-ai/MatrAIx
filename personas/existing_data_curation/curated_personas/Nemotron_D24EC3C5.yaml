  career_goals: Mary Joy aspires to become a biomedical engineer, hoping to design medical devices that improve children's health. She is motivated to excel academically, aiming to graduate high school
    with honors, lead her high school robotics team, and earn a scholarship for a STEM‑focused university program. Her long‑term ambition includes contributing to innovative healthcare solutions and possibly
    pursuing a pediatric research career.
