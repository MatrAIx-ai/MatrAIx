personas:
  professional: Mary Norton, an 11‑year‑old robotics enthusiast, combines methodical problem‑solving and precision honed from piano practice to design and program competition‑grade LEGO robots, and they
    consistently document every iteration in a meticulous journal to meet their high standards.
  sports: Mary Norton swims with the City Aquatics Club’s youth team, cheers for the national champion swimmer Katie Ledecky, follows the local baseball team the River City Bears, and spends weekends hiking
    the Pine Ridge Trail, where they balance competitive drive with the joy of nature.
  arts: Mary Norton immerses themselves in the classical piano works of Mozart and contemporary pieces by Yiruma, devours mystery novels by Agatha Christie, and enjoys Studio Ghibli animated films, letting
    these artistic influences shape their disciplined yet imaginative creative mindset.
  travel: Mary Norton prefers family road trips to national parks like Grand Canyon and Yosemite, plans each adventure with a detailed itinerary in their journal, and dreams of hiking the Inca Trail, all
    while balancing a modest travel budget funded by saved allowance.
  culinary: Mary Norton experiments with simple garden‑fresh meals, often stir‑frying zucchini, carrots, and bell peppers with soy sauce, bakes chocolate‑chip cookies for school fundraisers, and enjoys
    pizza topped with extra mozzarella, though they sometimes over‑salt their dishes in enthusiasm.
  core: Mary Norton is a disciplined, curiosity‑driven 11‑year‑old who blends meticulous organization with a love for puzzles, nature, and music, yet occasionally forgets to stretch before swimming.
background:
  cultural: Mary Joy grew up in Beaver, Pennsylvania, a close‑knit, predominantly white community with strong family and school ties. Her upbringing reflects middle‑class American values that emphasize
    education, community service, and participation in local traditions such as county fairs and church gatherings. Family meals on Sundays and support for local sports teams are common, while she also
    stays connected to contemporary teen culture through social media, music, and popular media. This blend of regional pride, community involvement, and modern influences shapes her worldview and daily
    life.
attributes:
  skills: '[''Organizational planning'', ''Mathematics problem solving'', ''Basic coding (Scratch)'', ''Research and fact‑checking'', ''Leadership in group projects'', ''Effective communication'']'
