personas:
  professional: Sean Sanchez is a disciplined middle school student who channels his love for routine into excelling as a quarterback on his school's football team and as a LEGO Technic builder, showcasing
    methodical planning, reliability, and a practical mindset.
  sports: Sean Sanchez is a committed member of the Springville Little League and the school’s varsity football team, where they follow meticulously designed practice drills, idolize the Auburn Tigers and
    the Atlanta Falcons, and balance rigorous training with a structured off-season conditioning routine.
  arts: Sean Sanchez expresses his creativity through building intricate LEGO Technic models and crafting elaborate Minecraft worlds, while unwinding to the sounds of country artists like Luke Bryan and
    George Strait and classic rock legends such as The Eagles and AC/DC, which shape his downtime and personal style.
  travel: Sean Sanchez prefers structured family trips that blend familiar comfort with mild adventure, having enjoyed organized visits to Nashville’s Country Music Hall of Fame, a weekend camping excursion
    at Talladega National Forest, and a short vacation to Orlando’s Walt Disney World, while dreaming of a future guided cultural tour of Spain’s historic cities.
  culinary: Sean Sanchez enjoys classic Southern comfort foods such as fried chicken with honey-buttered biscuits, creamy mac and cheese, and sweet tea, while occasionally savoring Spanish-influenced tacos
    al pastor featuring pork, pineapple, and cilantro, reflecting an intermediate cooking ability that lets them confidently fry, bake, and assemble meals for family gatherings.
  core: Sean Sanchez is a routine-loving, methodical twelve-year-old who balances football drills and LEGO builds with vivid anxiety, often journaling at night to calm a racing mind while quietly indulging
    in spontaneous snack raids.
background:
  cultural: 'Sean was born and raised in Springville, a close‑knit community in Jefferson County, Alabama. His family identifies as white, with a lineage that includes both Southern American and a touch
    of Hispanic heritage reflected in the surname Sanchez. The household embraces typical Southern values: close family ties, church involvement, and a strong sense of community responsibility. Local traditions
    such as church potlucks, county fairs, and high‑school football tailgating are a regular part of his life, and they reinforce his appreciation for routine and collective effort. While most cultural
    practices at home are rooted in the Southern Midwest lifestyle, occasional Spanish‑influenced dishes and bilingual greetings remind him of his broader family background. This blend of Southern hospitality
    and modest multicultural touches shapes Sean’s worldview and everyday experiences.'
