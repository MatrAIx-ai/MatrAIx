  career_goals: Sean is drawn to careers that combine practical, routine‑based work with community service. He dreams of becoming a firefighter or a police officer because he admires the clear structure,
    teamwork, and the opportunity to help others. At the same time, his love for building and mechanics fuels an ambition to study automotive technology or civil engineering, aiming to design and maintain
    reliable systems. He plans to maintain strong grades, especially in math and science, to qualify for a STEM‑focused high school and eventually an apprenticeship or college program. Ultimately, he hopes
    to secure a stable, respectable job that lets him contribute to his town while providing a predictable daily routine.
