personas:
  professional: Raul Decoteau, a 30‑year‑old versatile photographer, blends technical mastery in both digital and 35 mm film with a bilingual edge to serve Boston’s diverse clientele, yet they often leave
    equipment scattered due to a relaxed approach to scheduling while their competitive drive pushes them toward regional awards and a future boutique studio.
  sports: Raul Decoteau, an avid hiker of Middlesex Fells, also roots for the Boston Celtics and the New England Revolution, joins a local running club for weekend 5Ks, and balances a moderate gym routine
    with occasional missed workouts when competitive freelance projects demand late‑night editing, a pattern they justify as necessary for creative flow.
  arts: Raul Decoteau, a devoted collector of Latin‑American vinyl, spins records by Astor Piazzolla, Celia Cruz, and Carlos Vives while attending Boston open‑mic nights that feature spoken‑word poets like
    Saul Williams, and draws visual inspiration from the stark portraits of Diane Arbus and the color work of William EE Cunningham, a practice they integrate into their street photography.
  travel: Raul Decoteau, a curious explorer, plans spontaneous weekend trips to Salem’s historic alleys and the coastal town of Provincetown, while dreaming of a longer cultural immersion in Mexico City’s
    markets and the vibrant street art of Berlin, balancing a love of meticulously mapped itineraries with last‑minute photo‑shoot detours, a balance they consider essential for fresh visual ideas.
  culinary: Raul Decoteau, an amateur chef, perfects family recipes such as pork carnitas with fresh cilantro, arroz con pollo, and empanadas stuffed with plantain, favoring ingredients like chipotle, queso
    fresco, and smoked paprika, and finds the rhythmic chopping of onions as soothing as adjusting a shutter speed, a ritual they perform after long editing sessions.
  core: Raul Decoteau, a 30‑year‑old photographer, vinyl aficionado, and midnight‑coffee‑driven storyteller, balances a restless curiosity with a habit of leaving both studio and inbox half‑filled, channeling
    competitive pressure into award pursuits while they constantly worry about the next deadline.
background:
  cultural: Raul's family traces its roots to a blend of Mexican and Dominican ancestry, giving him a rich, multicultural perspective. Raised in a bilingual household in Massachusetts, he effortlessly navigates
    both Spanish and English cultural spaces. His upbringing was steeped in Latin music, holiday traditions, and stories of migration, which now inform his photographic eye and narrative focus. Living in
    Malden, a vibrant enclave with a strong immigrant presence, Raul often draws inspiration from the community's festivals, street markets, and intergenerational gatherings, using his work to celebrate
    and document the lived experiences of Hispanic and Latino residents in the New England region.
attributes:
  skills: '["Digital photography", "Studio and natural lighting", "Adobe Lightroom", "Adobe Photoshop", "Portrait photography", "Event photography", "Street and documentary photography", "Visual storytelling",
