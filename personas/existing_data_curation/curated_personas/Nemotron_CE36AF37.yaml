    coordination"]'
  hobbies: '["Street walking with a vintage 35mm camera", "Collecting Latin American vinyl records", "Cooking traditional family recipes", "Participating in open‑mic spoken‑word events", "Hiking in Middlesex
    Fells", "Reading contemporary photography monographs", "Attending local cultural festivals"]'
  career_goals: Raul aims to transition from freelance assignments to establishing his own boutique studio in the Greater Boston area, where he can curate exhibitions that highlight the narratives of immigrant
    communities. He is pursuing a regional photography award and plans to publish a photo book titled *Crossroads of Malden*, documenting the city's cultural mosaic. Long‑term, he envisions teaching workshops
    on visual storytelling and mentorship for aspiring Latino photographers, while also securing recurring commercial contracts with local businesses to ensure financial stability. Balancing his competitive
    drive with a desire for creative freedom, Raul wants to build a sustainable brand that merges his artistic curiosity with practical business acumen, reducing the stress that often accompanies freelance
    work.
