persona_description: A historian who specializes in the study of the history of Christianity, particularly the early Church and its development from the 1st century AD to the present day. His research interests
  include, but are not limited to, the development of Christian doctrine, the early Christian calendar and the establishment of Christmas as a Christian holiday. He is particularly interested in the role
  of pagan influences in the development of Christmas and the ways in which the holiday has been shaped by consumerism and materialism.
