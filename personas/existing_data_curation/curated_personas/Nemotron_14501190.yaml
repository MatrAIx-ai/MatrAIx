  hobbies: '[''Hip‑hop and jazz listening'', ''Playing street basketball'', ''Strategy and RPG video gaming'', ''Tinkering with electronics'', ''Poetry writing'', ''Sketching'', ''Community volunteering
    at youth center'', ''Exploring online coding and music production tutorials'']'
  career_goals: He aims to complete his high school education through a GED program within the next year, followed by an associate degree in information technology or a trade certification in electrical
    work at Rochester Community College. He hopes to secure an entry-level IT support role that allows him to apply his troubleshooting skills while providing a stable income to support his family. Long-term,
    he aspires to blend his technical abilities with his community‑oriented mindset by becoming a tech mentor for youth in his neighborhood or possibly launching a community tech hub that offers free coding
    workshops. He is also open to exploring a creative path in music production if opportunities arise, balancing practicality with his artistic curiosity.
