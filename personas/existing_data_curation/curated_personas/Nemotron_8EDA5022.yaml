  hobbies: '[''Abstract Painting'', ''Digital Illustration'', ''Speculative Fiction Reading'', ''Hiking'', ''Gardening'', ''Yoga'', ''Book Club'', ''Puzzle Solving'', ''Woodworking'', ''STEM Library Volunteering'']'
  career_goals: She aims to re‑enter the professional world through part‑time consulting in data visualization and STEM education. Her long‑term ambition is to launch a community maker space in Ellington
    that merges art and technology, offering workshops for children and adults. Shirley also hopes to author interdisciplinary curriculum guides that blend coding, robotics, and visual arts, and to contribute
    to open‑source scientific visualization tools while maintaining a balanced family life.
