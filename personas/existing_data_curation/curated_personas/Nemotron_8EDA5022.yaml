personas:
  professional: Shirley Golla, a 46‑year‑old data‑visualization consultant, leverages their expertise in Python, statistical modeling, and scientific writing to turn complex datasets into immersive visual
    narratives while also crafting community maker‑space curricula that fuse coding, robotics, and abstract art.
  sports: Shirley Golla, an avid hiker on Connecticut’s Shenipsit and Natchaug trails, practices yoga three times weekly, follows the Hartford Yard Goats baseball season, and joins a local adult softball
    league that gathers at the town park each summer.
  arts: Shirley Golla, an abstract painter and digital illustrator, draws inspiration from Kandinsky’s geometric compositions and Beeple’s dynamic NFTs, frequently visits the New Britain Museum of American
    Art, and contributes vibrant illustrations to the town library’s STEM outreach newsletters.
  travel: Shirley Golla, a detail‑oriented traveler, prefers meticulously planned road trips that blend nature hikes in the White Mountains, artisan studio tours in Portland, Maine, and occasional weekend
    art residencies in Santa Fe, while budgeting for family‑friendly lodging.
  culinary: Shirley Golla, a home‑grown vegetable enthusiast, delights in preparing seasonal ratatouille with heirloom tomatoes, zucchini, and fresh basil, experiments with plating that echoes their abstract
    paintings, and often postpones kitchen cleanup for the next day.
  core: Shirley Golla is a data‑driven artist‑technologist who balances analytical consulting with garden‑scented creativity, a penchant for puzzles, and a habit of postponing chores for the next sunrise,
    and they consider each day a fresh canvas.
background:
  cultural: Shirley was raised in a middle‑class New England family of Irish‑English ancestry in the suburbs of Connecticut. Her upbringing emphasized self‑reliance, education, and community involvement,
    reflecting typical regional values. She celebrates local traditions such as fall foliage festivals, Thanksgiving gatherings, and historic town fairs. This blend of pragmatic New England sensibilities
    with a deep appreciation for arts and sciences shapes her worldview.
