  career_goals: Ronnie aims to pursue a career in technology, specifically as a computer systems analyst or cybersecurity specialist, where he can apply his love of structure, logical problem‑solving, and
    competitive mindset to protect digital systems. He is also interested in engineering pathways that involve designing infrastructure, such as civil or mechanical engineering, because they combine practical,
    real‑world impact with clear, sequential processes. In the short term, he plans to deepen his coding skills, earn certifications in basic networking, and seek mentorship through school STEM clubs and
    community programs.
