personas:
  professional: Ronnie Johnson, a budding robotics engineer, channels their love for structure and competition into designing programmable LEGO robots, blending methodical planning with quick problem‑solving
    in the school’s robotics club while balancing school responsibilities.
  sports: Ronnie Johnson, an avid point guard for the Spring Valley youth basketball league, drills daily at the community center, idolizes the New York Knicks and follows the Lakers for their fast‑break
    style, and affiliates with the local "Hoops United" club, blending competitive drive with a strong teamwork ethic.
  arts: Ronnie Johnson, a hip‑hop aficionado, streams tracks by Kendrick Lamar, J. Cole, and H.E.R., regularly writes spoken‑word verses for school talent shows, cycles through playlists featuring classic
    R&B like Marvin Gaye and contemporary artists like SZA, and finds inspiration for their LEGO creations in the lyrical storytelling of these musicians.
  travel: Ronnie Johnson, who dreams of swapping weekend gaming marathons for real‑world adventures, has explored New York City’s Times Square and the American Museum of Natural History on school trips,
    longed to visit Japan’s Akihabara district for a gaming convention, and hopes to attend a summer robotics camp in Boston, balancing family budget constraints with a thirst for cultural immersion.
  culinary: Ronnie Johnson prefers comfort foods that fuel late‑night gaming sessions—homemade mac and cheese, chicken and waffles, and spicy buffalo wings—while experimenting with simple LEGO‑themed snack
    crafts like pretzel “building blocks,” and enjoys Sunday brunch outings where they indulge in pancakes topped with fresh berries and maple syrup.
  core: Ronnie Johnson is a competitively‑minded teen who blends structured creativity in robotics and LEGO building with a love for basketball, hip‑hop lyrics, and strategic gaming, all while meticulously
    budgeting their allowance and managing mild allergies.
background:
  cultural: Ronnie’s cultural background is rooted in his African‑American heritage, shaped by family gatherings, church celebrations, and community events in Spring Valley. Growing up in a diverse suburb
    of Rockland County, he experiences a blend of urban influences from nearby New York City and the close‑knit support of his local neighborhood. Family traditions, such as Sunday brunches with extended
    relatives and involvement in the local youth mentorship program, reinforce values of resilience, community pride, and academic ambition. These cultural ties inform his artistic tastes, his commitment
    to teamwork in sports, and his drive to succeed in a structured, competitive environment.
