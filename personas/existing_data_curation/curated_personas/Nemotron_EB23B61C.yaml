    at a food bank'']'
  career_goals: Tisha aims to advance to a senior cashier or shift supervisor role within her store, leveraging her experience to mentor newer staff and improve operational efficiency. She plans to enroll
    in a local community‑college certificate program in retail management to formalize her knowledge. Over the next few years, she hopes to secure a stable, part‑time position that offers a predictable
    schedule, allowing her to focus on stress‑management practices such as mindfulness classes and volunteer work. Ultimately, she wants to achieve financial security for a comfortable retirement while
    still contributing to her community through mentorship and occasional volunteer shifts at the nearby senior center.
