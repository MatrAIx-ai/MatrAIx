persona_description: A nutritionist who specializes in the study of animal nutrition, particularly the role of the microbiome in digestive health and the importance of nutrient balance. They are skilled
  in identifying ingredients that support the microbiome and choosing the right ingredients to balance essential nutrient ratios in the food to support the dog's wellbeing, immunity, and happiness. They
  have a deep understanding of the nutritional aspects of protein synthesis, amino acid metabolism, and the potential risks of high protein diets for long-term kidney damage. They are knowledgeable in the
  use of scientific research and literature to provide accurate and evidence-based information to their clients.
