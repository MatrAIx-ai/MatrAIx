personas:
  professional: Gabrielle George, a charismatic one‑year‑old, naturally draws the attention of caregivers during playtime, and they demonstrate an early talent for arranging stacking blocks in orderly rows
    while negotiating toy sharing, reflecting a budding ability to impose structure while thriving on social interaction.
  sports: Gabrielle George, a sprightly one‑year‑old who frequents the local toddler gym’s “Tot Tumble” class, energetically attempts to crawl after the moving ball during the community’s mini soccer sessions,
    and they cheer for the nearby NFL team the Green Bay Packers with a plush jersey, while also enjoying gentle splash‑time at the family’s neighborhood pool.
  arts: Gabrielle George, a curious one‑year‑old, absorbs the melodic lullabies of Raffi and the playful rhythms of The Wiggles, babbles along to Beethoven's Für Elise on a toy piano, and they proudly display
    finger‑paintings of bold primary colors, often mimicking the gestures of the Sesame Street character Elmo.
  travel: Gabrielle George, an adventurous one‑year‑old, enjoys stroller excursions to Central Park’s playground, loves weekend family getaways to the seaside resort of Sunny Shores where they nap in a
    carrier while gazing at waves, and they eagerly anticipate a future trip to the Grand Canyon, balancing their love of familiar routes with a budding curiosity for new horizons.
  culinary: Gabrielle George, a one‑year‑old palate that favors the sweet softness of mashed banana, the bright orange of pureed carrot, and the gentle chew of small pasta shells, often scoops avocado mash
    with a tiny spoon, yet they can throw a tantrum when offered broccoli, revealing a selective yet exploratory approach to early nutrition.
  core: Gabrielle George is a sociable, structure‑loving one‑year‑old who dominates playtime with charismatic chatter, negotiates for bright toys, maintains a calm demeanor under stress, and quietly enforces
    their own schedule of snack and nap times.
background:
