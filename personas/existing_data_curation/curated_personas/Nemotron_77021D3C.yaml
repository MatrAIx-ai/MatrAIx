personas:
  professional: Teresa Waller is a seasoned field technician who excels at installing, configuring, and troubleshooting radio and telecommunications equipment, blending meticulous schematic reading and
    RF signal testing with a creative improvisational flair that turns on-site challenges into elegant, client-friendly solutions.
  sports: Teresa Waller is an avid hiker who tackles the rolling trails of Denton County with a local outdoor club, cheers on the Dallas Cowboys on Sundays, and joins a weekend adult soccer league at the
    community center to keep a balanced fitness routine.
  arts: Teresa Waller channels artistic curiosity into sunset photography of Texas plains, acrylic paintings inspired by Ansel Adams and Van Gogh, and acoustic guitar sessions covering John Mayer and Ed
    Sheeran at Dentons open-mic nights, while regularly visiting exhibitions featuring artists like Peter Bormann.
  travel: Teresa Waller prefers flexible road trips that blend spontaneous stops at quirky roadside art installations with planned hikes in Big Bend National Park, has already trekked the blues of Austin's
    live-music scene, and dreams of chasing the aurora borealis over Iceland's volcanic landscapes.
  culinary: Teresa Waller loves crafting smoky Texas-style brisket on a backyard smoker, pairing it with fresh guacamole made from ripe avocados and lime, and experimenting with craft beers while occasionally
    indulging in spicy Pad Thai when a new recipe catches their eye.
  core: Teresa Waller is a 35-year-old field technician who fuses a knack for RF troubleshooting with a wandering artistic spirit, juggling vintage radios, sunrise hikes, and spontaneous jam sessions while
    often misplacing their coffee mug.
background:
  cultural: Teresa grew up in a middle‑class family in the Dallas‑Fort Worth suburban area, later settling in Aubrey, Texas. Her upbringing combined Texan pragmatism, a strong work ethic inherited from
    parents who were tradespeople, and a community‑oriented lifestyle that values neighborly support and participation in local events such as county fairs and volunteer drives. While her ethnic background
    is white, her cultural identity reflects the blend of Southern hospitality, independent spirit, and a growing appreciation for the arts that characterizes many small Texas towns. This mix of hands‑on
    practicality and artistic curiosity shapes both her professional approach and personal interests.
attributes:
  skills: '[''Radio frequency system installation'', ''Telecommunications equipment maintenance'', ''Cable splicing and termination'', ''Network troubleshooting'', ''Signal testing with spectrum analyzers'',
    ''Technical documentation'', ''Customer service and communication'', ''Basic electrical safety'', ''Creative problem solving'', ''DIY home automation integration'']'
  hobbies: '[''Photography (landscape and street)'', ''Acrylic painting'', ''Playing acoustic guitar'', ''Attending local art exhibitions'', ''DIY home automation projects'', ''Reading sci‑fi novels'',
    ''Hiking in Denton County'', ''Volunteering at community tech workshops'', ''Listening to technology and culture podcasts'', ''Collecting vintage radios'']'
  career_goals: Teresa aims to transition from a hands‑on installer to a lead field supervisor within the next three years, overseeing larger deployment projects and mentoring newer technicians. She is
    working toward certifications such as the Certified Telecommunications Network Specialist (CTNS) and an FCC General Radiotelephone Operator License. Long‑term, she envisions launching her own small‑scale
    contracting firm that specializes in rural broadband rollout and bespoke IoT/home‑automation solutions, allowing her to blend technical expertise with her love for innovative, flexible work environments.
