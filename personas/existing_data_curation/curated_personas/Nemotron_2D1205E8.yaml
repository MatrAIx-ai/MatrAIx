personas:
  professional: Marcus Jarrett, a seasoned customer service veteran with over forty years of telephone and in‑person support experience, leverages meticulous record‑keeping, Salesforce expertise, and a
    calm, authoritative voice to mentor new reps, streamline procedures, and maintain high‑quality service while slowly shifting toward a part‑time schedule that aligns with their love of routine.
  sports: Marcus Jarrett, an avid walker who tackles the foothill trails each morning, follows the Denver Broncos and Colorado Avalanche on TV, enjoys occasional pickleball matches at the senior center,
    and belongs to a local senior bowling league that meets on Saturday evenings, where they socialize with fellow retirees.
  arts: Marcus Jarrett, a devoted reader of historical nonfiction and classic mysteries like Agatha Christie, savors the smooth tones of Frank Sinatra and the Denver Symphony Orchestra, and volunteers at
    the community library to host a monthly classic film screening featuring vintage westerns, where they share their love of storytelling.
  travel: Marcus Jarrett, who favors low‑stress road trips, has explored Rocky Mountain National Park and a weekend getaway to Napa Valley, dreams of visiting historic English countryside villages, and
    relies on a travel agent to plan itineraries that accommodate their part‑time schedule and mobility considerations.
  culinary: Marcus Jarrett, an enthusiastic home gardener, delights in preparing fresh tomato bisque, herb‑seasoned roasted chicken, and classic apple pie with cinnamon, cooks with rosemary and thyme, enjoys
    a modest serving of local craft beer, but sometimes forgets to defrost the turkey for Thanksgiving, a lapse they quickly rectify with a backup frozen pizza.
  core: Marcus Jarrett blends a steadfast work ethic, routine‑driven hobbies, and a quietly curious mind, balancing frugality with occasional splurges, and uses their practical wisdom to mentor others while
    savoring simple pleasures like gardening and classic mystery novels.
background:
  cultural: Marcus is a third‑generation American of Anglo‑German heritage who grew up in suburban Denver during the post‑war era. His upbringing emphasized a solid work ethic, modesty, and community involvement
    typical of white, middle‑class families of that time. Traditional American customs—such as celebrating Thanksgiving, Independence Day, and local Colorado holidays—shape his seasonal routines. He maintains
    a quiet connection to his cultural roots through occasional church attendance and participation in neighborhood events that favor small gatherings and familiar, practical activities.
attributes:
  skills: '[''Customer service communication'', ''Active listening'', ''Conflict de‑escalation'', ''CRM software (Salesforce) operation'', ''Data entry and record keeping'', ''Process documentation'', ''Time
