  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non‑fiction'', ''Reading classic mystery novels'', ''Walking/hiking local trails'', ''Playing chess at the senior center'', ''Volunteering
    at the community library as a tech help desk'', ''Cooking simple family meals'']'
  career_goals: At this stage in his career, Marcus aims to continue providing consistent, high‑quality service while reducing his workload to part‑time hours that fit his preferred routine. He desires
    to formalize his knowledge by creating a reference guide for new representatives and to serve as a mentorship resource within his small team. Recognizing his practical nature, he also plans to achieve
    a smooth transition to retirement by securing a modest pension and exploring volunteer opportunities where his communication skills can benefit local senior programs.
