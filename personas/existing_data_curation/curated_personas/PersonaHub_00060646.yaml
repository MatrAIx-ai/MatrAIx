persona_description: A scientist with expertise in plant biology, specifically focused on understanding the mechanisms by which roots sense and respond to soil compaction. This scientist has conducted research
  on the role of ethylene in plant growth and development, and has discovered that plant roots can sense and respond to soil compaction by monitoring for ethylene gas. They have also developed a novel breeding
  approach to create compaction-resistant crop varieties by selectively disabling the root tips ability to sense ethylene.
