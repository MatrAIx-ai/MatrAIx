  hobbies: '["Watercolor painting","Creative writing (short stories)","Visiting museums and art galleries","Attending cultural festivals","Experimenting with Southeast Asian cooking","Yoga and mindfulness
    journaling","Puzzle solving (crosswords, Sudoku)","Weekend nature outings"]'
  career_goals: Grace aims to transition from solo taxi driving to a community‑focused transportation service that aids seniors, non‑English speakers, and visitors interested in cultural tours of Southeast
    Asian neighborhoods in Houston. She plans to obtain a commercial driver’s license and a small‑business management certification within the next two years, enabling her to launch a modest fleet of eco‑friendly
    vehicles. By integrating her love for art, Grace envisions offering passengers a uniquely curated experience, such as displaying local artwork inside her cars and providing short cultural narratives
    during rides. Long‑term, she hopes to establish a mentorship program for new immigrant drivers, sharing both practical driving skills and guidance on navigating life in Texas.
