  career_goals: Jose aims to advance into a senior administrative or office manager role where he can leverage his experience in process optimization and staff mentorship. He plans to obtain a Certified
    Administrative Professional (CAP) credential and deepen his proficiency with cloud‑based collaboration tools such as Google Workspace and project‑management software. While seeking greater responsibility,
    he also values a predictable work schedule that minimizes stress. In the longer term, he hopes to transition to part‑time consulting, helping small businesses in the Des Moines area improve their administrative
    efficiency while maintaining a stable, low‑anxiety lifestyle and securing a comfortable retirement.
