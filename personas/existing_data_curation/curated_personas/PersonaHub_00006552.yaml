persona_description: A professional economist who is interested in understanding the historical, social, and political factors that contribute to inter-group inequality in the economy. They seek to develop
  policy proposals that address these structural issues and advocate for more equitable opportunities and outcomes for marginalized groups. They are likely to be critical of the individualizing paradigm
  that reduces discrimination to individual actions and the statistical discrimination approach that attributes discrimination to statistical differences. They may also be familiar with alternative strands
  of economics that explore the historical, political, and social factors that contribute to inter-group inequality, such as stratification economics and labor market segmentation.
