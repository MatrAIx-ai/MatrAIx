  hobbies: '[''Community Theater'', ''Volunteer Work'', ''Gardening'', ''Cooking'', ''Historical Fiction Book Club'', ''Knitting'', ''Karaoke'', ''Board Games'', ''Potluck Hosting'', ''Local Sports Events'']'
  career_goals: Rebecca aims to advance into a supervisory role within her current retail environment, seeking a shift supervisor or assistant manager position where she can apply her organizational strengths
    and people‑oriented approach. She plans to enroll in a management certification program to deepen her leadership skills. In the longer term, Rebecca hopes to leverage her retail experience to open a
    small community‑focused boutique or café that serves as a gathering place for neighbors and local artists. She also aspires to mentor new employees and lead community outreach initiatives through her
    church and local volunteer groups.
