personas:
  professional: Rebecca Marsh is a seasoned retail professional with over thirty years of front‑line customer service experience, skilled in POS troubleshooting, cash management, inventory control, and
    staff mentorship, who channels their sociable, community‑focused personality into creating welcoming store environments and now they are targeting a shift supervisor or assistant manager role.
  sports: Rebecca Marsh enjoys walking the Lakefront Trail with a local seniors’ walking club, and they cheer for the Detroit Tigers and the Michigan State Spartans during baseball season, while also playing
    in a community softball league that meets every summer Saturday, keeping a moderate fitness routine that balances activity with occasional movie‑day rests.
  arts: Rebecca Marsh shines on stage with the Lakeview Players community theatre, relishes karaoke nights belting out Dolly Parton classics, and immerses themselves in historical fiction by Philippa Gregory,
    while they admire the works of Meryl Streep, Lin‑Manuel Miranda, and Julie Andrews, which inform their creative outlook.
  travel: Rebecca Marsh plans trips like a seasonal scrapbook, favoring leisurely road trips to Mackinac Island’s car‑free streets and the Upper Peninsula’s waterfalls, and they also schedule an annual
    pilgrimage to Nashville’s music festivals and cozy visits to family‑run B&Bs in New England during the fall foliage.
  culinary: Rebecca Marsh cooks with a blend of Midwestern comfort and adventurous flair, regularly preparing chicken pot pie with garden‑fresh thyme, experimenting with kimchi fried rice that pairs local
    basil and cilantro, and they delight in potluck contributions such as deviled eggs, beet salad, and homemade apple crumble.
  core: Rebecca Marsh is a community‑centric pragmatist who orchestrates gatherings, hoards coupons, overcommits to volunteer projects, and turns every store aisle into a friendly hallway, where they always
    greet customers by name.
background:
  cultural: Rebecca’s cultural background is rooted in the Midwestern United States, reflecting the values of community, modesty, and practicality typical of Michigan’s small‑town upbringing. She grew up
    in a working‑class family with Irish‑German heritage, where church attendance and neighborhood involvement were integral parts of daily life. The region’s emphasis on friendly, down‑to‑earth interaction
    shaped her sociable, cooperative nature and her commitment to harmony and service.
