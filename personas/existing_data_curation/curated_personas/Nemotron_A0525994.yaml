  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading (fiction, poetry, art history)'', ''Journaling'', ''Mindfulness meditation'', ''Yoga'', ''Indoor gardening'', ''Cooking Mexican cuisine'',
    ''Visiting art galleries'', ''Exploring digital illustration tools'']'
  career_goals: Estefaria aims to leverage her educational background and artistic curiosity to transition into a role that blends retail with community enrichment. She hopes to become a boutique manager
    for an art‑supplies or culturally‑focused store where she can design creative workshops and curate visual displays that inspire customers. In the next five years she plans to complete a certification
    in arts‑based education or art therapy, and eventually open her own small shop offering handcrafted items and after‑hours creative classes for individuals seeking quiet, reflective experiences. Parallelly,
    she aspires to help younger community members by volunteering as a mentor in after‑school programs, using her teaching skills to foster imagination and confidence. Achieving a stable, flexible schedule
    that allows time for personal creative pursuits while maintaining financial stability is a central ambition.
