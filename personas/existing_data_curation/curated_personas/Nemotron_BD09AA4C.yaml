  career_goals: Nasser aims to leverage his curiosity and technical background to move into a supervisory role within the school district’s transportation department. Over the next five years, he plans
    to obtain certifications as a commercial driver and a certified emergency medical responder, and to complete a professional development program in transportation logistics. He envisions leading a team
    of bus monitors, designing safety training programs, and eventually developing a data‑driven system to improve route efficiency and student safety. Parallel to his career, he hopes to start a community
    art‑and‑science workshop for middle‑school students, blending his love for art with his STEM expertise.
