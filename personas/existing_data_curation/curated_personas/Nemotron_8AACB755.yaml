personas:
  professional: Vilma Cordero, a bilingual elementary school teacher in Carolina, blends meticulous curriculum design, data‑driven assessment, and tech tools like Google Classroom with their natural flair
    for leading community dance nights, and they make their classroom a hub of organized yet lively bilingual literacy.
  sports: Vilma Cordero joins the community soccer league that supports the local Cangrejeros, hikes El Yunque's La Mina trail each month, and they lead a weekend salsa-fitness class that blends cardio
    with their love for rhythmic movement.
  arts: Vilma Cordero's artistic soul shines through their nightly salsa performances at the community center, their love for plena songs by Willie Colón and the lyrical poetry of Julia de Burgos, and they
    frequently visit the Teatro Tapia to see productions of contemporary Caribbean playwrights.
  travel: Vilma Cordero favors short, purposeful trips that combine cultural immersion and family, such as weekend getaways to Old San Juan's historic forts, a family vacation to the Dominican Republic's
    Punta Cana beaches, and they plan a pilgrimage to Santiago de Compostela to honor their Catholic roots.
  culinary: Vilma Cordero expertly prepares mofongo using roasted garlic‑infused plantains and swaps traditional lard for olive oil in their arroz con gandules, often topping the dish with avocado slices
    and fresh cilantro for a healthier island twist, and they enjoy pairing it with a crisp local white wine.
  core: Vilma Cordero is a methodical, community‑driven educator who channels their boundless energy into salsa, gardening, and a meticulous retirement plan, yet they occasionally forget to water their
    plants when caught up in lesson planning.
background:
  cultural: Vilma grew up in a close‑knit Puerto Rican family in Carolina, where Spanish and English were spoken interchangeably. Her upbringing was steeped in island traditions such as Noche de San Juan,
    plena music, and community patron saint festivals. The rich blend of Taino, Spanish, and African heritage is reflected in her love for music, dance, and food. As a Catholic and active church member,
    she values community service and collective harmony, traits that shape both her professional ethos and personal life.
attributes:
  skills: '["Curriculum Development", "Differentiated Instruction", "Classroom Management", "Bilingual Education (Spanish‑English)", "Educational Technology Integration", "Student Assessment & Data Analysis",
    "Parent‑Teacher Communication", "Community Outreach & Event Planning", "Mentoring New Teachers", "Professional Development Facilitation"]'
  hobbies: '["Salsa dancing", "Cooking Puerto Rican cuisine", "Gardening", "Hiking (El Yunque)", "Reading novels (Spanish & English)", "Volunteering at community festivals", "Participating in a book club",
    "Playing the guitar"]'
  career_goals: Vilma aims to become a curriculum coordinator or assistant principal within the next five years, focusing on expanding bilingual literacy programs across schools in Carolina. She plans to
    pursue a master's degree in Educational Leadership and to lead district‑wide professional development workshops that blend innovative tech tools with culturally responsive teaching practices. Ultimately,
    she hopes to influence policy that ensures equitable resources for all students in Puerto Rico.
