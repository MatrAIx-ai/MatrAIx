  career_goals: Although retired from formal employment, Verna aims to preserve and share the cultural heritage of Lake View by compiling a memoir of her family's history and the community’s changes over
    the decades. She intends to teach quilting and gardening workshops at the senior center, mentor youth interested in genealogy, and ensure the church’s community garden thrives for future generations.
    Maintaining her health and mobility to continue active participation in local events remains a personal ambition, as does fostering stronger intergenerational connections within her town.
