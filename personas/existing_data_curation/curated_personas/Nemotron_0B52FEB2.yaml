  career_goals: Short‑term, Giovann aims to expand his client roster by signing two emerging musicians and one up‑and‑coming athlete within the next year, leveraging his growing network in the Bay Area
    and Sacramento’s vibrant arts scene. He plans to launch a data‑driven talent‑promotion platform that combines audience analytics with personalized branding, positioning himself as an early adopter of
    tech‑enabled management. Long‑term, he aspires to found a boutique agency that not only represents top‑tier talent but also integrates mental‑health resources for artists, creating a sustainable environment
    that mitigates the anxiety and distress he personally experiences. He envisions being recognized as a trusted industry leader who balances creative ambition with pragmatic business acumen.
