personas:
  professional: Kevin Brown, a 31‑year‑old construction specialist, blends hands‑on carpentry, concrete finishing, and digital project‑management tools like Procore with a curiosity‑driven yet pragmatic
    mindset, making them the go‑to crew coordinator who carefully balances safety protocols and flexible problem‑solving on residential sites.
  sports: Kevin Brown drops into pick‑up basketball at the neighborhood park three times a week, follows the NBA’s Milwaukee Bucks religiously, cheers for the local high‑school basketball team during the
    winter season, and belongs to a community league that meets at the municipal gym where they also dabble in weekend pick‑up soccer for cardio.
  arts: Kevin Brown unwinds by listening to Kendrick Lamar’s lyricism, Kirk Franklin’s gospel choir, and B.B. King’s blues guitar solos, often curating playlists that blend modern hip‑hop beats with classic
    soul, and they occasionally attend open‑mic nights at a downtown venue where they appreciate spoken‑word poetry.
  travel: Kevin Brown prefers road‑trip getaways that combine scenic drives with culinary stops, having already explored the historic music scene of New Orleans and the mountain trails of Asheville, while
    dreaming of a summer retreat in the Pacific Northwest’s coastal towns, yet lingering anxiety keeps them from booking long‑haul flights without a clear itinerary.
  culinary: Kevin Brown chops collard greens, slow‑cooks smoked pork ribs, and perfects a buttery cornbread using a cast‑iron skillet, showcasing a solid home‑cook skill set that balances soulful comfort
    food with occasional experimental hot‑sauce pairings, and they relish sharing pot‑luck feasts with friends at the garage workshop.
  core: Kevin Brown, a 31‑year‑old construction crew leader who builds shelves by night, juggles anxiety with a journal, and can’t resist a sudden impulse to buy the newest power tool after a blues soundtrack
    plays, often finds themselves stuck between meticulous project planning and spontaneous creativity, and they constantly remind themselves to breathe.
background:
  cultural: Kevin is an African-American who grew up in Riverdale, part of Chicago’s broader Black community. Raised by grandparents who emphasized church, family meals, and communal support, he carries
    traditions of soul-food cooking, gospel music, and a strong sense of neighborhood solidarity. His identity is shaped by the cultural vibrancy of Cook County and the resilience of Black working‑class
    families.
attributes:
  skills: '[''Blueprint reading'', ''Concrete finishing'', ''Carpentry'', ''Heavy equipment operation (forklift, backhoe)'', ''Site safety management'', ''Basic plumbing and electrical troubleshooting'',
    ''Construction project scheduling (Procore)'', ''Team coordination'', ''Conflict mediation'']'
  hobbies: '[''Basketball'', ''Woodworking'', ''Soul-food cooking'', ''Volunteer mentorship'', ''Listening to hip‑hop/gospel/blues'', ''Journaling'']'
  career_goals: Kevin aims to earn OSHA 30 certification and a journeyman credential in concrete finishing within the next two years, positioning himself for a foreman role on larger residential projects.
    Long-term, he hopes to launch a small, community-focused subcontracting firm that emphasizes safe work practices and supports the mental well‑being of its crew.
