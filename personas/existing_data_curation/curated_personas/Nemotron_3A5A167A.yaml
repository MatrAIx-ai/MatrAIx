personas:
  professional: Janice Rodriguez, a 17‑year‑old aspiring health information manager, leverages her meticulous spreadsheet skills and introductory Python scripts to organize school projects and volunteer
    data entry tasks, embodying her love for routine and precision even before she earns her GED.
  sports: Janice Rodriguez follows the Tennessee Volunteers football and Nashville Predators hockey teams from her bedroom, while personally maintaining a low‑impact fitness routine of weekend hikes in
    the Great Smoky Mountains as a member of the local "Smoky Trail Walkers" club and occasional yoga sessions to satisfy her need for orderly movement without stressful competition.
  arts: Janice Rodriguez finds solace in the intricate patterns of crochet while also appreciating the cinematic storytelling of director Greta Gerwig, the folk ballads of Joan Baez, and the soft piano
    works of Ludovico Einaudi, weaving these influences into her journal entries and occasional sketching sessions.
  travel: Janice Rodriguez plans her trips with the same precision she applies to her model kits, favoring meticulously researched weekend getaways to the Great Smoky Mountains, a solo cultural stroll through
    Asheville’s River Arts District, and a dream itinerary that includes the historic streets of Kyoto, all booked well in advance to avoid last‑minute stress.
  culinary: Janice Rodriguez, an adept beginner cook, enjoys preparing methodical recipes like lemon‑rosemary roasted chicken and precision‑baked oatmeal cookies, often measuring each ingredient to the
    gram, while also relishing the tactile satisfaction of assembling fresh sushi rolls with avocado, cucumber, and smoked salmon.
  core: Janice Rodriguez is a detail‑driven teen who transforms anxiety into systematic schedules, turning solitary hobbies into disciplined routines that chart a steady path toward a future in health data
    management.
background:
  cultural: Janice comes from a middle‑class white family in Knoxville, Tennessee. Her upbringing reflects contemporary Southern culture blended with Appalachian influences common to East Tennessee. She
    grew up attending a local community church and participating in seasonal events such as the Knoxville Dogwood Arts Festival. Family meals often feature Southern staples like biscuits, fried chicken,
    and collard greens, while weekends frequently include outings to the nearby Great Smoky Mountains, fostering her appreciation for nature and outdoor solitude. The region’s emphasis on modesty, self‑reliance,
    and courteous politeness informs her cooperative yet self‑protective demeanor.
attributes:
  skills: '["Organizational planning", "Time‑management", "Data entry", "Basic Python scripting", "Spreadsheet proficiency (Excel/Google Sheets)", "Budget tracking", "Knitting and crochet", "Model kit assembly",
    "Attention to detail"]'
  hobbies: '["Reading (self‑help and organizational guides)", "Journaling and daily planning", "Puzzle solving (Sudoku, crosswords)", "Knitting and crochet", "Model kit assembly (aircraft, ships)", "Birdwatching",
    "Nature photography", "Mindfulness meditation"]'
  career_goals: Janice aims to earn her GED within the next year and then enroll in a community college to pursue an associate degree in health information management. She aspires to become a certified
    medical records technician, working in a hospital or clinic where routines are clearly defined and predictable. In the longer term, she hopes to transition into health data analysis, leveraging her
    affinity for structured data and meticulous record‑keeping. Throughout this path, she values a stable, routine‑oriented work schedule that aligns with her organized lifestyle and supports her goal of
    financial independence.
