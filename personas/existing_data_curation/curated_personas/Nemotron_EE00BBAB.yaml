  hobbies: '[''Visiting art galleries and museums'', ''Watercolor sketching'', ''Quilting'', ''Gardening (herbs and vegetables)'', ''Cooking Southern and Midwestern dishes'', ''Reading historical fiction
    and biographies'', ''Listening to jazz, blues, and gospel music'', ''Playing bridge'', ''Attending community potlucks'']'
  career_goals: Although retired from formal employment, Bonita remains driven by personal growth and community contribution. She aspires to complete a memoir that captures her family's migration journey
    and her experiences as a Black woman in the Midwest. She hopes to develop a small workshop series at the Batavia community center where she can teach quilting and cooking to both seniors and youth,
    fostering cultural exchange. Bonita also wishes to deepen her involvement with the local art museum by curating a rotating exhibition of works by Black artists from the Illinois region. Travel remains
    a cherished ambition; she plans to visit New Orleans for its vibrant music and culinary scene, and she hopes to attend a major art biennial in Chicago within the next two years.
