personas:
  professional: Cooper Wooley is a veteran metal‑fabrication specialist who has mastered MIG, TIG, and flux‑core welding, applies meticulous blueprint reading and safety compliance, channels competitive
    drive into regional welding contests, and methodically mentors apprentices while planning his path toward AWS Certified Master Welder and a foreman role.
  sports: Cooper Wooley spends his weekends fishing the Missouri River for catfish, hikes the Ozark trails with his local senior outdoor club, follows the Kansas City Chiefs and St. Louis Cardinals closely,
    and maintains a modest fitness routine that includes morning push‑ups and occasional basketball at the community center, though they avoid high‑intensity training to protect their knees.
  arts: Cooper Wooley indulges his creative side by assembling detailed model kits of vintage aircraft like the B‑17 Flying Fortress and classic ships such as the USS Constitution, crafting fine furniture
    in his garage workshop, listening to classic rock icons like Led Zeppelin and folk legends like Johnny Cash while woodworking, and occasionally attending the regional symphony featuring virtuoso violinist
    Itzhak Perlman.
  travel: Cooper Wooley prefers road‑trip adventures that combine scenic drives through the Missouri Ozarks with visits to automotive museums in Detroit and aerospace exhibits at the Smithsonian in Washington,
    D.C., planning trips months in advance to capitalize on off‑season pricing while still allowing spontaneous detours to local fishing spots.
  culinary: Cooper Wooley enjoys cooking over a cast‑iron skillet, frequently grilling river‑caught trout with lemon‑dill butter, slow‑roasting a Kansas City‑style smoked brisket, and preparing fresh garden
    salads with heirloom tomatoes and basil, while their culinary skill sits comfortably between confident home‑chef and occasional recipe‑book follower.
  core: Cooper Wooley blends disciplined craftsmanship with a competitive spark, turning every weld, garden, and model kit into a test of precision, all while juggling a careful financial plan and a pragmatic
    approach to health.
background:
  cultural: Cooper grew up in a white, working‑class family in St. Louis County, Missouri, where Midwestern values of hard work, self‑reliance, and community involvement were emphasized. The region's industrial
    heritage, particularly in manufacturing and automotive sectors, shaped his practical skill set and appreciation for craftsmanship. He celebrates local traditions such as Independence Day fireworks and
    community fairs, enjoys regional foods like toasted ravioli and BBQ, and maintains ties to the area's Protestant and local civic institutions, reflecting a cultural blend of modesty, practicality, and
    a strong sense of regional identity.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Flux‑core welding'', ''Soldering'', ''Brazing'', ''Metal fabrication'', ''Blueprint reading'', ''Equipment maintenance'', ''Safety compliance'', ''Quality
    inspection'', ''Technical troubleshooting'', ''Project planning'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Classic car restoration'', ''Model kit building'', ''Hiking'', ''Gardening'', ''Welding competitions'', ''Reading technical magazines'', ''Attending trade shows'',
    ''Chess'']'
  career_goals: Cooper aims to attain the AWS Certified Master Welder designation and transition into a supervisory foreman role within a regional manufacturing plant. He envisions eventually opening a
    boutique metal‑work shop that specializes in custom automotive and aerospace components, leveraging his high standards and competitive drive to win local welding competitions. Additionally, he is interested
    in mentoring apprentices and potentially teaching advanced welding techniques at a community college, aligning his disciplined work ethic with a desire to give back to the trade community.
