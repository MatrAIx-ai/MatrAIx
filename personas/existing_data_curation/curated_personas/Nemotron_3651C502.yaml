  hobbies: '[''Traditional Mexican cooking'', ''Gardening'', ''Reading historical novels'', ''Volunteering at community centers'', ''Walking in local nature trails'', ''Quilting'', ''Listening to classic
    Mexican music'']'
  career_goals: Yaima aims to transition into a senior leadership position, such as Director of Community Programs or Senior Program Manager, within the next five years. She wants to spearhead large-scale,
    socially impactful initiatives that serve multicultural communities in the Chicago area. Her ambitions include obtaining PMP and Agile certifications, mentoring emerging women project managers, and
    developing a community training hub that integrates educational best practices with project management frameworks. Ultimately, she envisions authoring a guidebook on compassionate, culturally responsive
    project leadership.
