personas:
  professional: Shelia Stiffler, a seasoned floral designer who blends meticulous budgeting, color theory expertise, and on‑the‑fly creativity, leads a boutique studio by applying structured processes while
    embracing the flexibility of improvisation when supplies run thin, and they mentor junior designers with a balance of firm guidance and open‑ended encouragement.
  sports: Shelia Stiffler enjoys weekly yoga sessions at the Sunbury Community Center, walks her golden retriever Rose with the Licking County Trail Hikers club, cheers for the Cleveland Browns in fall
    football, follows the Ohio State Buckeyes during college basketball season, and occasionally joins a recreational softball league for women’s over‑50s in Columbus, and they consider the yearly marathon
    a distant yet aspirational goal.
  arts: Shelia Stiffler channels creative energy into quilting inspired by the patterns of Mary Cassatt’s still‑lifes, curates vintage teacup displays while listening to James Taylor’s acoustic ballads,
    devours historical romance novels by Julia Quinn, and shares macro photographs of lilies and peonies on Instagram alongside the work of photographer Anne Geddes, and they often host small gallery evenings
    to showcase local artisans.
  travel: Shelia Stiffler prefers meticulously planned weekend getaways to regional gardens like the Lynden Sculpture Park in Philadelphia and the Biltmore Estate in Asheville, yet dreams of an immersive
    floral tour of the Keukenhof Gardens in the Netherlands and a tranquil retreat in Kyoto’s Zen temples, balancing travel expenses with a modest retirement budget, and they keep a travel journal to document
    each bloom‑inspired adventure.
  culinary: Shelia Stiffler enjoys home‑cooking at an intermediate skill level, infusing seasonal dishes like rosemary‑infused lamb with lavender honey glaze, pea and mint soup crowned with edible rose
    petals, and rustic herb focaccia sprinkled with freshly harvested basil and thyme, while delighting in farm‑to‑table restaurants that serve heirloom tomatoes and locally sourced trout, and they experiment
    with edible flower garnishes in almost every meal.
  core: Shelia Stiffler blends a love for structured floral design with a delightfully chaotic garden of lilies, peonies and vintage teacups, balancing meticulous budgeting with occasional impulse buys
    of rare seeds, all while navigating mild arthritis through yoga and a steadfast devotion to community workshops, and they never miss a chance to share a newly arranged bouquet on social media.
background:
  cultural: Shelia is a white American of German‑Irish descent, raised in a small farming community near Sunbury, Ohio. Her upbringing emphasized seasonal cycles, self‑reliance, and community service, with
    family traditions that included church gatherings, potluck meals, and a generational love for gardening—her grandmother taught her to press flowers as a child. The Midwestern values of practicality,
    modesty, and neighborly cooperation shape her outlook, while exposure to nearby Amish and Mennonite crafts has fostered an appreciation for handcrafted, low‑waste practices. Her deep connection to Southern
    Ohio’s agricultural heritage informs her preference for locally grown flowers and active participation in county fairs.
attributes:
  skills: '[''Floral design and arrangement'', ''Plant care and propagation'', ''Color theory and composition'', ''Event design and coordination'', ''Client consultation and relationship management'', ''Budgeting
    and inventory management'', ''Vendor negotiation and sustainable sourcing'', ''Digital design tools (Floranext, Adobe Illustrator)'', ''Team leadership and mentorship'', ''Improvisational problem‑solving'']'
  hobbies: '[''Gardening'', ''Home cooking with herbs and edible flowers'', ''Quilting and upcycling vintage teacups'', ''Reading historical romance and horticulture magazines'', ''Walking her golden retriever
    Rose'', ''Yoga'', ''Macro photography of flowers'', ''Volunteering for hospice and church floral tributes'', ''Participating in local festivals'']'
  career_goals: 'Shelia aims to open a flagship boutique floral studio in Sunbury or nearby Columbus that emphasizes sustainable, locally‑sourced arrangements and showcases a signature seasonal collection
    of Ohio‑grown flowers. She plans to earn the Certified Floral Designer (CFD) credential and later become a Certified Floral Design Instructor. Over the next five years, she hopes to publish a guidebook
    titled “Midwest Blooms: Seasonal Floral Design for the Everyday Celebrant,” develop an e‑commerce platform for DIY arrangement kits, and integrate a small greenhouse into her studio to grow specialty
    blooms. Mentoring at least three apprentices, hosting community workshops, and possibly completing a bachelor’s degree in horticulture are also central to her long‑term vision.'
