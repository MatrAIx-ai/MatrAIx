  skills: '[''drawing'', ''painting'', ''basic reading comprehension'', ''elementary mathematics'', ''bilingual communication (English/Spanish)'', ''basic computer use (typing, internet research)'']'
  hobbies: '[''sketching/drawing'', ''reading fantasy books'', ''beginner piano lessons'', ''nature walks/hiking'', ''collecting shells and rocks'', ''school art club'', ''watching cultural documentaries'',
    ''helping prepare Salvadoran recipes'']'
  career_goals: Anita dreams of one day becoming a museum curator or visual artist who can showcase stories from her Salvadoran heritage and other cultures. She is fascinated by how art can bridge communities,
    so she also hopes to study environmental science to design community gardens that reflect both her family's traditions and her Midwestern surroundings. Ultimately, she aspires to use creativity to inspire
    understanding and to help others feel confident in expressing themselves.
