personas:
  professional: An aspiring young artist, Anita Azucena, merges her love for sketching landscapes with influences from her family's heritage, designing detailed scenes that blend Midwestern prairie vistas
    with traditional motifs, and she leads her school’s art club projects with methodical planning and an open‑minded curiosity.
  sports: An energetic participant in community athletics, Anita Azucena plays forward for the Iowa City Youth Soccer Club, roots for the Iowa Hawkeyes during football season, and joins the local Nature
    Explorer Club for weekend hikes, balancing competition with a love for outdoor adventure.
  arts: A devoted creative, Anita Azucena spends afternoons sketching landscapes inspired by Claude Monet’s soft light and Frida Kahlo’s vibrant patterns, practices beginner piano pieces by Yiruma, and
    curates mini‑exhibits of her mixed‑media work in the school art club.
  travel: A thoughtful explorer, Anita Azucena prefers family road trips that combine educational stops with natural wonder, having trekked through Iowa’s Loess Hills, visited the shoreline of Door County,
    and dreaming of a summer visit to Iceland’s waterfalls, always drafting detailed itineraries with crayons.
  culinary: An enthusiastic young cook, Anita Azucena helps roll the perfect masa dough and fill pupusas during weekend gatherings, loves adding homemade apple crumble to family meals, and experiments by
    sprinkling a pinch of cinnamon into her favorite chocolate chip cookies.
  core: Anita Azucena, a ten‑year‑old with a keen eye for art, meticulous planner, and gentle worrier, blends creative sketching, earnest saving, and thoughtful self‑care into a quietly ambitious life.
background:
  cultural: Anita comes from a Salvadoran immigrant family that settled in Des Moines, Iowa. At home, Spanish is spoken and Salvadoran customs are celebrated, such as preparing pupusas for family meals
    and observing Día de la Independencia on September 15. She attends a local Latino community center where she participates in Spanish language classes and cultural festivals. This blend of Salvadoran
    heritage and Midwestern American life shapes her worldview, influences her artistic style, and fuels her curiosity about diverse cultures.
