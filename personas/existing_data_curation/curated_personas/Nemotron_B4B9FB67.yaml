personas:
  professional: Cady Matherne is a seasoned electrician with an associate degree in electrical technology, over twenty years of experience troubleshooting residential and commercial systems, and a growing
    expertise in solar photovoltaic installations and PLC programming, whose methodical, organized nature ensures meticulous code compliance and safety inspections while mentoring apprentices with a collaborative,
    hands‑on approach.
  sports: Cady Matherne enjoys weekend hikes through local wetlands, birdwatching, and a weekly sprint on the community 5K club, while cheering on the Baltimore Ravens during football season and the Baltimore
    Orioles in the summer, and they maintain a practical fitness routine that balances cardio with occasional strength training in the garage using reclaimed equipment.
  arts: Cady Matherne finds creative balance at folk‑music gatherings in the town hall, where they sway to the sounds of Gillian Welch, The Avett Brothers, and local blue‑grass fiddlers, and they also savor
    historical nonfiction about the Chesapeake Bay by authors like William B. Hamilton, allowing the narratives to inform their appreciation for regional heritage and storytelling.
  travel: Cady Matherne prefers purposeful road trips that combine nature, sustainability, and learning, having driven the Blue Ridge Parkway to explore solar farms in Asheville, toured Iceland’s geothermal
    sites, and planned a future visit to the solar‑powered community of Freiburg, Germany, all while balancing family responsibilities and a modest travel budget.
  culinary: Cady Matherne delights in farm‑to‑table cooking with garden harvests, preparing dishes like roasted beet‑and‑goat‑cheese salads, herb‑infused grilled chicken, and seasonal crab cakes seasoned
    with Old Bay, while their intermediate woodworking skills extend to crafting their own cutting boards, and they favor fresh herbs, heirloom tomatoes, and locally sourced Maryland blue crab.
  core: Cady Matherne blends practical curiosity with community stewardship, juggling a methodical electrician career, a budding solar‑energy business plan, a love for folk music, and an occasional splurge
    on hand tools, all while navigating mild hypertension and a stubborn habit of over‑planning every weekend hike.
background:
  cultural: Cady grew up in a multigenerational, blue‑collar family on Maryland's Eastern Shore, where self‑reliance and community service are core values. Her upbringing reflected the Mid‑Atlantic rural
    culture—emphasizing modesty, a strong work ethic, and close ties to local churches and civic groups. The region's rich maritime history and proximity to agricultural lands have fostered her appreciation
    for sustainable living and stewardship of the environment. These cultural roots shape her blend of practical expertise, cooperative spirit, and commitment to giving back to the community.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''NEC code compliance'', ''Troubleshooting and diagnostics'', ''Blueprint reading'', ''Programmable Logic Controllers (PLC) programming'',
    ''Solar photovoltaic system installation'', ''Energy‑efficiency retrofits'', ''Project scheduling'', ''Apprentice mentorship'', ''OSHA safety training'', ''Low‑voltage communication systems'', ''Electrical
    inspections'', ''Team leadership'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Reading technical manuals and historical non‑fiction'', ''STEM outreach volunteering'', ''Hiking and birdwatching'', ''DIY home improvement projects'', ''Cooking'',
    ''Attending local folk‑music gatherings'']'
  career_goals: Cady aims to achieve a Master Electrician license within the next two years and earn a NABCEP (North American Board of Certified Energy Professionals) certification to deepen her expertise
    in solar installations. She envisions launching a modest, family‑run contracting business that specializes in energy‑efficiency upgrades for homes in Kent County, creating jobs for local apprentices.
    Additionally, she hopes to expand her role as a community mentor by organizing quarterly workshops that introduce high‑school students to electrical trades, thereby nurturing the next generation of
    skilled workers.
