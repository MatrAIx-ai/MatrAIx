  hobbies: '["hiking (Osage Hills)", "fishing", "beadwork and craft", "listening to traditional Native American music", "reading (history, Indigenous cultures, logistics tech)", "cooking traditional dishes",
    "cycling with a local club", "volunteering at community events"]'
  career_goals: Kedrin aims to advance from frontline courier work to a supervisory logistics role within the next three to five years. He plans to obtain a Commercial Driver’s License (CDL) and pursue
    certifications in fleet management and inventory control, positioning himself for a logistics coordinator or operations manager position. Long‑term, he dreams of launching a community‑focused courier
    service that employs local residents, incorporates eco‑friendly delivery methods such as electric bikes, and partners with Native American businesses to support economic development in his tribal community.
    He also hopes to mentor younger members of his community, sharing his practical skills and encouraging reliable work habits.
