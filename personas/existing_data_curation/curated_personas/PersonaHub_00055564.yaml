persona_description: A therapist who specializes in the treatment of adolescents with mild to moderate symptoms of depression, particularly those in the 12-18 age range. The therapist has experience in
  developing and delivering an outpatient treatment program called IPT-A, which focuses on improving communication, problem-solving, social functioning, and decreasing depressive symptoms. The therapist
  is skilled in conducting therapy sessions, including the initial phase where the therapist discusses the teen's experiences and feelings of depression, and the middle phase where the therapist works with
  the teen on developing new skills to resolve identified problems within the identified problem area. The therapist has experience adapting IPT-A for use with preadolescents and children, as well as with
  adolescents at risk for depression and social anxiety.
