persona_description: A fisheries biologist with expertise in the management and conservation of native fish populations, particularly the reintroduction of species back into their natural habitats. They
  have experience working with the US Fish and Wildlife Service and the National Park Service in restoring native fish species to their original streams and rivers. They are knowledgeable about the use
  of antibiotics to treat and manage introduced fish populations, and have experience with the reintroduction of native fish species using techniques such as bagging and trucking. They are passionate about
  the restoration of native fish populations and have a deep understanding of the challenges and complexities involved in this process.
