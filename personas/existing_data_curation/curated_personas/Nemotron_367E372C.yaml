personas:
  professional: An aspiring community arts coordinator, Fabian Flores blends meticulous event‑planning expertise, bilingual fluency and natural stage presence to design pop‑up exhibitions, cultural festivals,
    and youth workshops that celebrate urban creativity while they position themselves for a future nonprofit leadership role.
  sports: A committed amateur soccer player, Fabian Flores competes in a co‑ed Chicago league, cheers for the Chicago Fire, cycles city neighborhoods on weekends, and they also volunteer as a starter for
    a local youth sports club's community run.
  arts: A dedicated cultural explorer, Fabian Flores frequents the Art Institute of Chicago, MoCA, and vibrant street‑art districts, curates Instagram showcases featuring works by artists like Banksy, Elías
    Ahuja, and emerging local muralists, and they regularly lead after‑school art workshops for teenage participants.
  travel: An inquisitive planner, Fabian Flores spends holidays exploring historic neighborhoods in New Orleans and Santa Fe, saves for a summer trip to Berlin to study public murals, and they prefer budget‑friendly
    hostels that allow them to mingle with locals while documenting each journey through photography.
  culinary: A confident home‑chef, Fabian Flores loves preparing traditional dishes such as plantain‑filled empanadas, ceviche with lime and cilantro, and corn‑based soups, frequently experimenting with
    fusion twists while they source fresh produce at the Chicago Farmers Market.
  core: A sociable, curiosity‑driven event organizer who channels their talkative energy into crafting community art experiences, and they occasionally splurge on spontaneous cultural outings.
background:
  cultural: Fabian grew up in an Ecuadorian immigrant household in Chicago, where Spanish and Ecuadorian traditions were integral to daily life. Family celebrations such as Carnaval de Guaranda and hearty
    meals featuring dishes like ceviche and arroz con menestra reinforced his connection to his heritage. This bicultural upbringing nurtured his appreciation for art, music, and community, influencing
    his desire to bridge Latino cultural expressions with the broader Chicago arts scene. He maintains strong ties to the local Ecuadorian diaspora, participating in cultural festivals and community organizations
    that celebrate Latin American identity.
attributes:
