  career_goals: Fabian aims to transition from his current period of unemployment into a stable role within the cultural nonprofit sector, ideally as a community arts coordinator or cultural program manager.
    He plans to earn a bachelor's degree in Arts Management or Public Administration within the next three years, while simultaneously building a portfolio of curated events and digital content. His long‑term
    ambition is to launch his own community‑focused cultural events firm that highlights Latin American art and music, providing platforms for emerging artists and fostering cross‑cultural dialogue in Chicago.
    He also hopes to mentor young immigrants, helping them navigate educational and career pathways.
