    at senior center'', ''Exploring local museums and art galleries'', ''Traveling to state parks'']'
  career_goals: Although she is retired from formal employment, Courtney aims to deepen her impact in the community by leading a local art‑appreciation program at the senior center, mentoring younger volunteers,
    and coordinating intergenerational storytelling workshops. She hopes to document and preserve Downey’s oral histories, possibly publishing a small memoir of her life and the town’s evolution. She also
    aspires to become more proficient with digital tools to create virtual galleries and connect with distant relatives. Ultimately, she wants to maintain a vibrant social presence while contributing her
    experience to enrich cultural life in Bannock County.
