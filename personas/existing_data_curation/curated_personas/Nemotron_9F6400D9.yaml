personas:
  professional: Courtney Murphy, a retired community organizer now spearheading an art-appreciation program at the local senior center, uses their natural charisma, strong interpersonal skills, and cultivated
    eye for visual arts to orchestrate intergenerational storytelling workshops and virtual galleries, even as they tolerate occasional disorganization and prefer flexible planning over rigid schedules.
  sports: Courtney Murphy, who enjoys gentle hikes around Shoshone Falls and participates in a senior walking club that gathers to cheer on the Boise State Broncos during football season, stays active with
    weekly tai-chi classes at the community center and occasional outings to Boise Hawks baseball games, while they favor a social, low-pressure approach to fitness.
  arts: Courtney Murphy, an enthusiastic visitor of the Brookfield Community Theater's mystery productions and a frequent admirer of Georgia O'Keeffe's floral paintings, channels their curiosity into beginner
    watercolor lessons and lively discussions of local artist Sarah Mitchell's work, often quoting Agatha Christie to draw connections between literature and visual art, and they relish sharing these insights
    at gallery openings.
  travel: Courtney Murphy, who prefers relaxed road trips over crowded flights, spends weekends exploring Craters of the Moon National Monument and annually visits Portland's art museums, while they dream
    of a cross-country National Parks tour, meticulously planning a scrapbook of postcards to share with friends back home despite occasional forgetfulness about travel bookings.
  culinary: Courtney Murphy, a seasoned baker celebrated for rosemary-infused focaccia and seasonal apple crumble, delights in incorporating fresh garden herbs like thyme and mint into meals, swaps recipes
    at potluck dinners, and they occasionally over-salt dishes in their enthusiasm to impress guests.
  core: Courtney Murphy, a talkative 66-year-old who thrives on community gatherings, blends artistic curiosity with a forgiving disorganization, juggling too many social events while secretly hoarding
    a mismatched collection of tea spoons for their beloved tea parties, and they never miss an opportunity to share a mystery novel plot twist with new acquaintances.
background:
  cultural: Courtney grew up in a predominantly white, middle‑class small‑town setting in Idaho, where community ties, self‑reliance, and a love of the outdoors were core values. Her upbringing was shaped
    by mainstream American cultural traditions, a modest Protestant background, and an appreciation for local history and craftsmanship. The close‑knit nature of Downey and Bannock County fostered a strong
    sense of civic responsibility and a lifelong affinity for neighborly support, arts, and nature.
