  career_goals: Pedro dreams of turning his love for art and technology into a career as a multimedia artist, video game designer, or concept artist for movies. He hopes to attend a specialized arts high
    school or a STEM-focused magnet program where he can deepen his skills in digital illustration and programming. Long‑term, he aspires to create his own indie video game that blends Mexican folklore
    with futuristic themes, and to lead community art projects that celebrate his cultural heritage while inspiring other young creators.
