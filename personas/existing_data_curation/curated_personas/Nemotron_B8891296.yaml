personas:
  professional: Pedro Castillo, a budding robotics enthusiast who also sketches comic panels, channels their vivid imagination and methodical planning into building LEGO‑powered robots for the school club,
    while their competitive edge drives them to outpace peers in regional contests.
  sports: Pedro Castillo, a forward on the Sanford Soccer Club, channels competitive drive into nightly drills, roots for Orlando City SC's youth squads, and occasionally joins after‑school basketball pick‑up
    games at the local park.
  arts: Pedro Castillo, a passionate comic‑strip creator who idolizes Stan Lee and draws inspiration from Studio Ghibli’s fantastical worlds, spends weekends crafting detailed LEGO dioramas while practicing
    traditional jarabe drum patterns alongside playlists from Los Tigres del Norte and contemporary pop.
  travel: Pedro Castillo, who has explored Disney World in Orlando and the historic streets of San Antonio with family, dreams of trekking the ancient ruins of Chichén Itzá and attending a robotics expo
    in Tokyo, favoring meticulously planned itineraries mixed with spontaneous sandcastle building at the beach.
  culinary: Pedro Castillo, a kitchen apprentice during family gatherings, loves rolling masa for tamales, seasoning pozole broth with hominy and pork, and mastering the art of perfect guacamole, yet still
    insists on topping pizza with extra pepperoni despite occasional complaints about the extra spice.
  core: Pedro Castillo blends a vivid imagination with disciplined organization, turning weekend soccer fields, LEGO bricks, and comic sketches into a competitive, socially vibrant playground where occasional
    skepticism keeps them one step ahead.
background:
  cultural: Pedro was raised in a Mexican immigrant family in Sanford, Florida. At home, Spanish is the primary language, and his parents celebrate Mexican holidays such as Día de los Muertos, Cinco de
    Mayo, and Semana Santa, often blending them with local Floridian festivities. He enjoys traditional foods like tamales and pozole, and he listens to a mix of regional Mexican music and popular American
    artists. Attending a bilingual public school, Pedro benefits from both Mexican cultural teachings and the diverse multicultural environment of central Florida, giving him a strong sense of bicultural
    identity.
