  hobbies: '[''Comic drawing'', ''LEGO building'', ''Sandbox video games (Minecraft, Roblox)'', ''Sci‑fi/fantasy reading'', ''Creative writing'', ''Robotics club'', ''Soccer'', ''Drumming to Mexican folk
