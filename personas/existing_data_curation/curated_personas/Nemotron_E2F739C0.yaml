personas:
  professional: An organized community project coordinator, Carlos Mangual leverages their methodical planning and charismatic public speaking to run town events, manage volunteer schedules, and keep budgets
    on track, and they thrive on the buzz of engaging diverse crowds.
  sports: A competitive weekend athlete, Carlos Mangual plays point guard in the town’s amateur basketball league, coaches youth soccer on Saturdays, and they cheer passionately for the local minor‑league
    baseball team, the River City Runners, while fitting in occasional hiking trips to stay fit.
  arts: A vibrant performer, Carlos Mangual stars in the community theater’s quarterly productions, belts out karaoke classics from Beyoncé to Frank Sinatra, and they draw energy from the audience’s applause,
    citing Lin‑Manuel Miranda’s Hamilton and the folk storytelling of Tori Amos as artistic inspiration that fuels their love for lively, participatory art.
  travel: A purposeful weekend explorer, Carlos Mangual plans road‑trip itineraries that blend hunting in the Ozark state parks, fishing on the Columbia River, and cultural stops in Santa Fe, while they
    dream of a backpacking adventure in Patagonia and a culinary tour of Kyoto, all while juggling a modest travel budget and family commitments.
  culinary: A pragmatic home chef, Carlos Mangual whips up grilled trout with fresh herbs from their garden, slow‑cooked barbecue ribs with a homemade dry rub, and a nightly vegetable medley of heirloom
    tomatoes, zucchini, and rosemary, while they often indulge in a craft espresso at a local café that fuels plans for their own community‑focused eatery.
  core: Carlos Mangual blends a methodical planner’s discipline with a karaoke‑loving social butterfly’s spontaneity, often juggling spreadsheets while rehearsing song lyrics, and they can’t resist a late‑night
    snack of spicy salsa after a community meeting.
background:
  cultural: Carlos grew up in a working‑class, white Midwestern family in Lawrence County, Ohio, with roots tracing back to German and Irish ancestry. The region’s close‑knit community, emphasis on practicality,
    and value of self‑reliance shaped his outlook. He was raised attending a local Protestant church, where community service and mutual support were central. This background instilled a strong work ethic,
    a respect for tradition, and an appreciation for small‑town social life.
