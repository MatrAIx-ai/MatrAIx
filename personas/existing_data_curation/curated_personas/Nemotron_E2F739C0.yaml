  career_goals: He aims to transition back into the workforce in a role that blends his organizational strengths with his sociable personality. Short‑term, Carlos plans to complete a community‑college certification
    in Project Management or Business Administration and secure an entry‑level position as a program coordinator at the local community center or a regional retail manager. Long‑term, he aspires to open
    a small, community‑focused café or event space where he can host local gatherings, workshops, and performances, providing a predictable yet vibrant environment for his town.
