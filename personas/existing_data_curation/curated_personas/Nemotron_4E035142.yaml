personas:
  professional: Allen Grandberry, a budding junior inventor, channels their curiosity about dinosaurs and space into designing elaborate LEGO contraptions and creating simple Scratch animations, treating
    each project like a mini engineering challenge.
  sports: Allen Grandberry, a dedicated fan of the Houston Astros and Dallas Cowboys, spends Saturday mornings on the couch with a bowl of fruit snacks while they analyze game statistics, yet they shy away
    from joining the neighborhood T-ball league, preferring solitary backyard cricket with a homemade bat.
  arts: Allen Grandberry, an avid builder of LEGO and sketcher of imagined machines, finds inspiration in instrumental hip-hop beats by artists like J Dilla and the cinematic scores of Hans Zimmer, and
    they spend evenings drawing detailed blueprints while listening to those tracks.
  travel: Allen Grandberry, who has toured the Space Center Houston and a weekend trip to Austin’s music festivals, dreams of visiting the dinosaur fossils at the Smithsonian in Washington, D.C., and they
    prefer carefully planned itineraries with clear schedules over spontaneous adventures, often bringing along a sketchbook to document new sights.
  culinary: Allen Grandberry, who loves the comforting taste of fried chicken and collard greens at family gatherings, frequently asks to help whisk the batter for biscuits, but they are picky about trying
    new vegetables, favoring familiar snacks like apple slices and cheese cubes, and they enjoy experimenting with LEGO-shaped pancakes for breakfast.
  core: Allen Grandberry is a quiet, curiosity-driven 7-year-old who balances meticulous LEGO engineering with a penchant for solitary problem-solving, often losing track of time in a world of dinosaurs,
    space, and hip-hop beats.
background:
  cultural: Allen is a young African‑American boy raised in Spring, a suburban community in Harris County, Texas. His family embraces cultural traditions rooted in the Southern United States, such as celebrating
    Juneteenth, enjoying Southern soul food like fried chicken and collard greens, and attending a local church that emphasizes gospel music and community service. Growing up in a diverse neighborhood,
    Allen is exposed to a blend of African‑American cultural heritage and Texan influences, shaping his identity and worldview while fostering a sense of pride in his background.
