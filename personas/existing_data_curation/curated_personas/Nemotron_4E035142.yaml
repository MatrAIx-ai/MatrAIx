  career_goals: Allen dreams of becoming an astronaut or a robotics engineer, motivated by his fascination with space and machines. He aspires to design gadgets that make everyday tasks easier for people,
    and he wants to win his school’s science fair by creating a functional prototype. He also imagines developing his own video games, aiming to combine his love of storytelling with his coding skills.
    While his ambitions are still forming, his competitive spirit drives him to set clear, challenging goals and to work diligently toward them.
