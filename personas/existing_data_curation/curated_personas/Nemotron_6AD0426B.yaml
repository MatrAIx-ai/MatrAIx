  career_goals: Mariaeugenia aims to secure a stable, full‑time position that leverages her reliability and people skills, such as a role in hospitality, retail management, or entry‑level healthcare (e.g.,
    Certified Nursing Assistant). She plans to enroll in a vocational program—preferably culinary arts or health‑care certification—to gain formal credentials. Long‑term, she hopes to open a small home‑based
    catering or cleaning service that provides financial independence and allows her to blend her cultural cooking traditions with a practical business model. She also seeks to develop coping strategies
    for anxiety, such as structured therapy and mindfulness, to improve emotional resilience and workplace performance.
