  career_goals: Young aims to become a partner at a mid-sized Colorado firm specializing in environmental and corporate law, eventually establishing his own boutique practice that offers tailored counsel
    to small businesses and nonprofit organizations. He is also interested in contributing to policy development on sustainable development, and hopes to leverage his cultural perspective to mentor other
    East Asian‑American attorneys.
