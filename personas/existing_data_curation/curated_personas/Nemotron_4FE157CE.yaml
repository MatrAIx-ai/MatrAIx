  hobbies: '[''Hiking'', ''Fishing'', ''Hunting (small group)'', ''Woodworking'', ''Traditional Choctaw Drumming'', ''Oral Storytelling'', ''Reading Indigenous History'', ''Prairie Landscape Photography'',
    ''Model Train Building'']'
  career_goals: Melchor aims to move into a supervisory role within his call center, targeting a Team Lead or Quality Assurance position where he can mentor newer agents and shape service standards. He
    plans to earn the Certified Customer Service Professional (CCSP) credential and to lead a small performance‑improvement project that integrates tribal community outreach with the company's customer‑service
    platform. Long‑term, he hopes to leverage his experience and cultural insight to become a liaison between the company and local Native American enterprises, possibly launching a consulting practice
    that helps tribal businesses improve their customer‑service operations.
