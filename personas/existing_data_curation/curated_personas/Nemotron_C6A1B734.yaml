personas:
  professional: Geraldine Bogner, a veteran food‑service operations manager with over three decades of experience, approaches each challenge by combining meticulous, methodical planning with a competitive
    edge; they design art‑inspired menus, run seamless large‑scale events, and mentor emerging women leaders in hospitality.
  sports: Geraldine Bogner stays active with early‑morning walks around Lake Michigan and a weekly pickleball league at her senior center; they root for the Milwaukee Bucks and Brewers, and follow the Green
    Bay Packers with a friendly rivalry during football season, balancing a competitive spirit with community fitness.
  arts: Geraldine Bogner immerses herself in the local arts scene, and they regularly attend exhibitions at the Milwaukee Art Museum featuring contemporary painters like Kerry James Marshall, catch performances
    at the Marcus Center of Music and Theatre such as 'The Glass Menagerie,' and delight in live music at Summerfest where folk‑rock acts like John Prine take the stage.
  travel: Geraldine Bogner plans her trips with meticulous itineraries, and they favor culinary tours through Tuscany’s vineyards, Provence’s markets, and Barcelona’s tapas bars, while also savoring weekend
    getaways to Door County for fresh oysters and local art fairs, balancing a love for discovery with a desire for comfortable accommodations.
  culinary: Geraldine Bogner, a seasoned home chef, experiments with cuisines ranging from classic Midwestern cheese curds and bratwurst to French coq au vin and Japanese ramen, and they relish the use
    of fresh rosemary, smoked paprika, and heirloom tomatoes to create plates that look as much like a canvas as they taste.
  core: Geraldine Bogner blends a senior’s seasoned expertise in hospitality with a perpetual curiosity for art, and they unapologetically juggle budget spreadsheets, bridge tournaments, and spontaneous
    herb‑scented kitchen experiments, all while keeping a skeptical eye on every new trend.
background:
  cultural: Geraldine was raised in Milwaukee’s historic neighborhoods, where her family’s German‑Polish heritage shaped her appreciation for hearty, communal meals and the city’s vibrant brewing and food
    traditions. Growing up Catholic, she took part in local festivals such as German Fest and St. Patrick’s Day parades, which nurtured her love for cultural celebration and community involvement. Her Midwestern
    upbringing emphasized fairness, reliability, and a strong work ethic, while the city’s rich arts scene fostered her curiosity for new ideas. This blend of cultural influences informs her inclusive approach
    to hospitality and her enthusiasm for integrating art with culinary experiences.
