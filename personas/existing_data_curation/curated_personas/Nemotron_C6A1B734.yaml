  career_goals: Geraldine aims to transition into a regional director role overseeing multiple food service sites across the Midwest, where she can implement innovative, art‑inspired dining experiences.
    She aspires to mentor emerging hospitality professionals, especially women entering management, and to launch a community kitchen program that provides culinary training and cultural exchange. In the
    longer term she hopes to author a cookbook that blends Midwestern comfort food with artistic plating concepts and to serve as a consultant for hospitality businesses seeking to enhance customer experience
    through creative menu design.
