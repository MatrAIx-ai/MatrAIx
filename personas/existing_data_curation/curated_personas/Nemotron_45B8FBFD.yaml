  career_goals: Although she is no longer in the paid workforce, Joan Ann aims to complete her college education by earning an associate degree in liberal arts, publish a memoir that blends personal reflections
    with her family’s local history, and establish a community art workshop for seniors in Mancelona. She also aspires to create a digital archive of the town’s historical photographs and documents, and
    hopes to travel to major art museums across the United States to deepen her appreciation of contemporary abstract art.
