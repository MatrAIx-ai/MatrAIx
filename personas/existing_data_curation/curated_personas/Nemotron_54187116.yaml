personas:
  professional: Clara Martinez, a seasoned wholesale and manufacturing sales leader with two decades of experience, leverages her disciplined, data‑driven approach, Lean and Six Sigma expertise, and innate
    curiosity to craft strategic account plans, negotiate complex B2B deals, and mentor emerging talent as she eyes a regional sales director role.
  sports: Clara Martinez stays active by combining weekend hikes in the Blue Ridge Mountains with regular yoga classes, supports the Charlotte Hornets and Carolina Panthers with spirited game‑day gatherings,
    and belongs to a local tennis club where she plays doubles on Saturday afternoons.
  arts: Clara Martinez immerses herself in the arts by sketching at the Mint Museum, performing in community theater productions of Shakespeare and contemporary plays, and drawing inspiration from artists
    like Monet, Shepard Fairey, and musician Yo‑Yo Ma, often sharing her own photography at local photo clubs.
  travel: Clara Martinez prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored the historic streets of Savannah, the vineyards of Tuscany, and the temples of Kyoto,
    while she dreams of a future road‑trip along the Pacific Coast with her friends.
  culinary: Clara Martinez showcases her culinary curiosity by mastering dishes such as paella Valenciana, Korean bibimbap, and Southern shrimp and grits, using fresh cilantro, saffron, and locally sourced
    heirloom tomatoes, and she enjoys hosting dinner parties where she pairs each course with carefully selected wines.
  core: Clara Martinez is an organized, curiosity‑driven sales veteran who balances relentless professional ambition with a calm, hospitable lifestyle, punctuated by weekend hikes, theater performances,
    and a penchant for spontaneous vintage art buys.
background:
  cultural: Clara was raised in the suburban outskirts of Charlotte, North Carolina, in a middle‑class family that emphasized hard work, education, and community service. Growing up in the American South,
    she absorbed the region’s traditions of hospitality and local pride, while also benefiting from Charlotte’s growing multicultural environment. Her white ethnic background blends with a broad appreciation
    for diverse artistic expressions, music, and cuisines encountered in the city’s vibrant cultural scene. She maintains ties to her family’s Protestant roots, which inform her ethic of service, collaboration,
    and integrity in both personal and professional life.
