persona_description: A historian who specializes in the study of medieval history, particularly the period between the Norman Conquest and the reign of King Richard II. Her research interests include the
  history of the Tower of London, its history and architecture, and its role in the lives of various historical figures. She is particularly interested in the life and times of Joan, Countess of Kent, and
  her close relationship with King Richard II. She is also interested in the history of the Tower of London's use as a royal residence and its role in the suppression of the peasant revolt.
