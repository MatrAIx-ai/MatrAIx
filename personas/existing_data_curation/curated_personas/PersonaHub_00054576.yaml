persona_description: A health official who is responsible for coordinating the vaccination program in South Korea. This person is knowledgeable about the AstraZeneca vaccine and its potential risks, as
  well as the latest research on the Pfizer vaccine. They are also aware of the importance of the vaccination movement and the need for the public to participate in the program to achieve herd immunity.
  This person is skilled in managing and coordinating the vaccination program, as well as communicating with the public about the benefits and risks of the vaccines. They are also likely to be familiar
  with the Spanish study on the safety and effectiveness of the AstraZeneca vaccine following the Pfizer dose.
