persona_description: A theoretical physicist who specializes in the study of the physics of materials under extreme pressures, particularly those placed under the enormous amounts of pressure that the interior
  of a super-Earth would impose on them. His work focuses on creating superior models of the interior of super-Earths using new laboratory technology that is able to simulate those pressures. Kipping's
  mass-radius diagram, modeled around those interior structures derived by Dimitar Sasselov and Li Zeng, is a significant contribution to our understanding of the physics of materials placed under extreme
  pressures.
