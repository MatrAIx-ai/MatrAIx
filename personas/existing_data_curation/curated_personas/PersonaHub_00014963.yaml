persona_description: A researcher from the Institute of Education who specializes in the study of education policy, particularly the effects of selective education on social mobility and the challenges
  of providing equal access to education for all children. She is well-versed in the evidence-based research on the effectiveness of selective education and is advocating for a more equitable approach to
  education. Her expertise includes longitudinal studies, statistical analysis, and policy evaluation. She is a vocal critic of the government's plans to rebrand grammar schools as an engine of social mobility
  and is calling for a more focused approach to improving education for all children.
