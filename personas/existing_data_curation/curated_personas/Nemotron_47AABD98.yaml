    documentation'']'
  hobbies: '[''Hiking in the Carson National Forest'', ''Fishing in the Rio Grande'', ''Gardening (chilies and herbs)'', ''Cooking Mexican dishes (tamales, carne asada)'', ''Playing guitar at community
    events'', ''Reading automotive repair manuals'', ''Watching classic truck documentaries'', ''Volunteering at a youth center (vehicle safety education)'']'
  career_goals: Yosley aims to transition from a driver‑sales role to a supervisory position within the next three years, such as lead driver or logistics coordinator, where he can mentor newer drivers
    and streamline routing operations. He is pursuing additional certifications like the Certified Transportation Professional (CTP) and a Class A CDL to qualify for larger tractor‑trailer assignments.
    Long‑term, he hopes to launch his own small fleet serving local businesses in the Rio Arriba region, leveraging his bilingual skills and deep knowledge of regional routes to offer reliable, cost‑effective
    transportation solutions.
