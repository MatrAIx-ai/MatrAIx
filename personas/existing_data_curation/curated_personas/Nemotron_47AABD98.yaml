personas:
  professional: Yosley Robinson, a veteran driver‑sales specialist with a CDL and hazardous‑materials endorsement, uses precise route‑planning software and bilingual communication to exceed delivery targets
    while mentoring new drivers and eyeing a future logistics coordinator role.
  sports: Yosley Robinson follows the New Mexico State Aggies football team, plays pickup soccer on weekends with the Rio Arriba community league, hikes Carson National Forest trails year‑round, and fishes
    the Rio Grande, balancing structured workouts at the local gym with spontaneous outdoor adventures.
  arts: Yosley Robinson brings a classic guitar to Cinco de Mayo gatherings, strums boleros and rock‑and‑roll riffs by artists like Vicente Fernández, Luis Miguel, and AC/DC, attends the annual Albuquerque
    International Balloon Festival for its vibrant murals, and enjoys listening to folk‑blues on long hauls.
  travel: Yosley Robinson prefers road‑trip itineraries that let them test route‑optimization skills, frequently explores Santa Fe’s historic plaza, has driven down to Durango for a weekend snow‑shoe trek,
    dreams of an RV excursion through Patagonia, and balances travel with family obligations.
  culinary: Yosley Robinson cultivates chilies and cilantro in a modest garden, perfects tamales and carne asada on weekends, favors smoky chipotle‑marinated pork and fresh salsa verde made with jalapeños
    and tomatillos, and can whip up a quick queso fundido, though they sometimes resort to fast‑food tacos after a long shift.
  core: Yosley Robinson is a methodical 41‑year‑old driver‑sales pro who blends rugged New Mexico outdoors, flavorful Mexican cooking, disciplined logistics expertise, and a weekend guitar habit into a
    steady quest to launch a local freight fleet, while occasionally letting back pain and impulse snack cravings slip through the cracks.
background:
  cultural: Yosley was born to parents who emigrated from the state of Chihuahua, Mexico, and grew up in a close‑knit Mexican‑American community in northern New Mexico. He was raised bilingual, speaking
    Spanish at home and English at school, which shaped his cultural identity and communication style. Family traditions, such as celebrating Día de los Muertos and sharing homemade foods, remain central
    in his life. His Mexican heritage influences his love for hearty, flavorful cooking, appreciation for regional music like norteño and mariachi, and a strong sense of community responsibility, which
    he expresses through local volunteer work. While embracing the broader American culture, he maintains a deep connection to his Mexican roots and often travels to visit relatives across the border.
attributes:
