    service and communication'']'
  hobbies: '[''Salsa dancing'', ''Herb gardening'', ''Cooking Mexican cuisine'', ''Volunteering at senior center'', ''Organizing community health workshops'', ''Crossword puzzles'', ''Pilates for seniors'',
    ''Traveling to visit family in Mexico'', ''Attending local cultural festivals'']'
  career_goals: Margarita aims to earn the Certified Pharmacy Technician (CPhT) credential within the next year to formalize her expertise. She aspires to move into a supervisory role, leading a small team
    of aides and mentoring newer staff, leveraging her competitive drive to improve workflow efficiency. Beyond advancement, she hopes to launch a community health‑literacy program that offers Spanish‑language
    workshops on medication safety and chronic disease management, merging her curiosity about new health information with her practical, organized style.
