  hobbies: '[''Hiking'', ''Biking'', ''Fishing'', ''DIY Woodworking'', ''Car Restoration'', ''Recreational Softball'', ''Live Music Events'', ''Online Strategy Gaming'', ''Reading (Economics & Productivity)'',
    ''Barbecue Cooking'']'
  career_goals: William aims to move into a supervisory role within the warehouse environment, targeting positions such as Shift Lead or Operations Supervisor where he can apply his analytical mindset to
    streamline processes. Over the next five to seven years he hopes to become a Warehouse Manager or Logistics Coordinator for a regional distribution center. He plans to supplement his practical experience
    with a certification in supply chain management to broaden his qualifications. Ultimately, William is interested in leveraging his hands‑on expertise to launch a modest logistics consulting service
    that helps small businesses improve their inventory and fulfillment operations.
