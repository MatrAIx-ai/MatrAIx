personas:
  professional: Claudel Ellis, a 30‑year‑old residential and short‑term rental housekeeping specialist, leverages their meticulous deep‑cleaning expertise, green‑chemical knowledge, and assertive yet empathetic
    communication to train junior staff, streamline property operations, and serve as the reliable point of contact for clients, all while they are organized, talkative, and become the go‑to problem‑solver
    in a fast‑paced hospitality environment.
  sports: Claudel Ellis channels their energetic sociability into hip‑hop and line‑dance workouts at the Orlando Community Center, participates in a co‑ed flag‑football league each spring, and they fervently
    support the Orlando Magic and Orlando City SC, while occasionally joining the YMCA’s aqua‑aerobics class to maintain overall fitness.
  arts: Claudel Ellis sings gospel with their church choir, draws creative inspiration from Aretha Franklin, Beyoncé, and Kendrick Lamar, and they spend evenings dissecting self‑help best‑sellers by Brené Brown,
    while also attending community theater productions of 'A Raisin in the Sun' and curating playlists that blend classic soul with contemporary hip‑hop.
  travel: Claudel Ellis prefers meticulously planned weekend road trips that blend adventure and relaxation, using Google Trips to map routes to Savannah’s historic squares, Kingston’s vibrant markets for
    authentic jerk cuisine, and Everglades eco‑tours, yet they often curb spontaneous overseas getaways due to budgeting for a future boutique cleaning startup.
  culinary: Claudel Ellis, an avid home chef, experiments with Southern soul‑food staples like fried chicken, collard greens, and shrimp‑and‑grits infused with Caribbean jerk seasoning, often garnishing
    dishes with garden‑fresh basil, thyme, and Scotch bonnet pepper while they balance a knack for mastering complex spice blends with a habit of over‑seasoning and tasting the sauce before it simmers.
  core: Claudel Ellis blends a meticulous cleaning eye, gospel‑filled heart, and entrepreneurial spark, yet they constantly worry and tend to over‑schedule, making bedtime a rare luxury.
background:
  cultural: Claudel grew up in Ocala’s close‑knit African‑American community, steeped in Southern Black traditions and a strong church foundation. Family gatherings filled with soul‑food, storytelling,
    and music shaped her values of resilience, mutual support, and celebration of heritage. She observes cultural holidays such as Juneteenth and Kwanzaa, and her family’s roots include influences from
    the Caribbean, which inspire her cooking and rhythmic appreciation. Navigating the socioeconomic challenges faced by many Black women in service roles, she draws strength from community networks, church
    mentorship, and a legacy of civil‑rights activism that underscores her ambition and sense of responsibility toward uplifting others.
attributes:
  skills: '[''Deep cleaning'', ''Floor care (hardwood, tile, carpet)'', ''Laundry and fabric care'', ''Inventory management and budgeting'', ''Green cleaning techniques'', ''Time management and scheduling'',
    ''Customer service and communication'', ''Training and supervising junior staff'', ''Problem solving and basic maintenance'', ''Attention to detail'']'
  hobbies: '[''Singing gospel music'', ''Hip‑hop and line dancing'', ''Cooking Southern and Caribbean dishes'', ''Gardening herbs and vegetables'', ''Reading self‑help and personal development books'',
    ''Journaling for stress relief'', ''Volunteering at community shelters'', ''Attending church events'', ''DIY home décor projects'', ''Learning new cleaning techniques via online tutorials'']'
  career_goals: Claudel aims to advance from staff cleaner to senior housekeeping supervisor for a reputable hotel or property‑management firm in Central Florida. Over the next three years she plans to
    earn a Certified Professional Cleaner credential and enroll in an associate‑level hospitality management program at a community college. Ultimately she hopes to launch her own boutique cleaning service
    that emphasizes eco‑friendly practices and offers employment training for other women in her community. Her goals are set in realistic steps—attending workshops, building a client network, and saving
    capital—while satisfying her curiosity about industry trends and her practical desire for financial stability.
