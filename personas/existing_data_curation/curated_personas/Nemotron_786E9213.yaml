  career_goals: Emilio aims to advance from his current analyst role to a senior analytics manager within the next three years, eventually targeting a director or VP of Data Strategy position at a tech‑focused
    firm in Silicon Valley. He plans to obtain a PMP certification and a Six Sigma Black Belt to strengthen his project leadership credentials. Additionally, he seeks to lead cross‑functional teams, mentor
    emerging analysts—especially those from underrepresented backgrounds—and develop personal resilience strategies to better manage his anxiety and emotional reactivity while maintaining high performance.
