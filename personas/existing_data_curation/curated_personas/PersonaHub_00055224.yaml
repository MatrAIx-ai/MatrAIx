persona_description: A systems administrator who is responsible for managing and maintaining a computer system, including the creation and termination of processes, as well as ensuring that the system is
  functioning correctly. They are skilled in using the UNIX and Linux operating systems and have experience in process creation, management, and termination. They are also familiar with the three-state
  process management model and its design elements, including the need to represent and track processes, their state, and the queuing of non-running processes. They are dedicated to ensuring that the system
  is efficient and secure, and are skilled in troubleshooting and resolving issues that may arise.
