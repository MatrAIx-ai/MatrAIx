personas:
  professional: A clinical addiction counselor and aspiring program director, Mary Schnell blends a rigorous STEM background with hands‑on therapeutic skill, and they use motivational interviewing, CBT,
    and neurobiology insights to design data‑driven treatment programs for rural Iowa while mentoring junior staff and championing telehealth expansion.
  sports: A dedicated supporter of Midwestern athletics, Mary Schnell cheers for the Iowa State Cyclones football team every Saturday, follows the Iowa Hawkeyes basketball season, participates in a local
    women’s running club that meets for weekend prairie trail runs, and enjoys casual weekend hikes that double as low‑impact cardio, balancing community spirit with personal fitness, and they volunteer
    as a timing official for youth soccer matches.
  arts: An avid nature photographer and sci‑fi enthusiast, Mary Schnell curates a personal blog featuring close‑up shots of prairie lupines and migrating sandpipers, regularly attends screenings at the
    Ames Cinema of indie films like Ex Machina, and draws creative inspiration from Sufjan Stevens’ folk‑indie music and the paintings of Georgia O’Keeffe, weaving visual and auditory art into their downtime,
    and they often share photo essays on community boards.
  travel: A weekend explorer, Mary Schnell plans spontaneous road trips to nearby natural gems such as the Loess Hills and the Badlands, dreams of a spring visit to Kyoto for cherry‑blossom photography,
    balances travel ambitions with family commitments by opting for short, budget‑friendly getaways, and they prefer itineraries that blend hiking, local food markets, and cultural museums.
  culinary: An experimental garden‑to‑table cook, Mary Schnell grows heirloom tomatoes, purple carrots, and kale in raised beds, transforms them into dishes like roasted vegetable quinoa bowls, fermented
    garden cabbage kimchi, and a thyme‑infused carrot soup, enjoys occasional farm‑to‑table dinner parties with friends, relishes the aroma of fresh basil and rosemary in their kitchen, and they constantly
    experiment with new spice blends.
  core: Mary Schnell is a curiosity‑driven, pragmatic addiction specialist who melds science with compassion, manages finances with cautious flexibility, practices diligent yet occasionally lax self‑care,
    balances community sports enthusiasm with personal fitness, fuels creativity through photography and sci‑fi, explores nature‑rich travel, and cooks garden‑fresh meals while embracing a relaxed, slightly
    disorganized lifestyle, and they thrive on integrating these facets into a coherent whole.
background:
  cultural: Mary grew up in a close‑knit, middle‑class family in a small Iowa town, surrounded by the values of independence, community service, and pragmatic problem‑solving that are hallmarks of the Midwest.
    Her heritage traces back to German and Scandinavian ancestors who settled the region, shaping a cultural identity that respects tradition while embracing modest innovation. A lifelong participant in
    the local Methodist congregation, she internalized a spirit of compassion and collective responsibility, which now fuels her dedication to helping those struggling with addiction. The agricultural backdrop
    of her upbringing cultivated an appreciation for the land, reflected in her love of gardening and outdoor activities. While she identifies as white and embraces her Midwestern roots, Mary remains attuned
    to the diverse needs of her clients, drawing on her community’s inclusive ethos to build culturally sensitive, evidence‑based care.
attributes:
  skills: '[''Motivational Interviewing'', ''Cognitive Behavioral Therapy'', ''Group Therapy Facilitation'', ''Crisis Intervention'', ''Trauma‑informed Care'', ''Evidence‑Based Program Design'', ''Data
    Analysis and Outcome Measurement'', ''Neurobiological Understanding of Addiction'', ''Community Outreach and Collaboration'', ''Research Methodology'', ''Ethical Decision‑Making'', ''Mentorship and
    Supervision'']'
  hobbies: '[''Hiking and nature photography'', ''Gardening and seasonal cooking'', ''Reading science‑fiction and popular science'', ''Participating in a local book club'', ''Volunteer work at community
    garden'', ''Yoga and mindfulness meditation'', ''DIY home‑improvement projects'']'
  career_goals: Mary aims to become a program director for a community‑based addiction treatment center in central Iowa, where she can fuse cutting‑edge neuroscience with compassionate counseling. She plans
    to develop a hybrid in‑person and telehealth service that expands access to rural populations. Over the next five years she hopes to earn board certification as a substance‑abuse counselor, publish
    research on integrated treatment outcomes, and influence state policy to support evidence‑based, harm‑reduction approaches. Long‑term, Mary envisions mentoring a new generation of counselors, leading
    statewide professional workshops, and possibly completing a Ph.D. to deepen her research impact while maintaining a balanced, flexible lifestyle that respects her family commitments.
