  hobbies: '["Gardening", "Amateur Astronomy", "Woodworking", "Bridge (card game)", "Hiking", "Volunteer at Local Library", "Senior Community Dance Nights", "DIY Electronics Projects", "Cooking"]'
  career_goals: Although retired from formal employment, David aims to stay intellectually active by volunteering his engineering expertise to local schools and community projects, especially sustainable
    gardening installations and low‑tech assistive devices for seniors. He hopes to mentor aspiring engineers through informal workshops, contribute articles to regional STEM newsletters, and develop a
    small outreach program that introduces basic robotics to middle‑school students. Additionally, he plans to continue learning emerging technologies such as AI and maker‑space tools, and to eventually
    compile his life‑long experiences into a memoir that highlights the evolution of engineering practice in upstate New York.
