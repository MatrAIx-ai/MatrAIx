  career_goals: She aims to advance to senior management within the next five years, targeting a director‑level role overseeing regional operations. She plans to pursue an MBA with a focus on entrepreneurship
    to eventually launch a social enterprise that supports underprivileged communities in Houston. Additionally, she aspires to become a champion of workplace well‑being, implementing programs that promote
    mental health and inclusive culture. She also seeks mentorship opportunities to hone her leadership style and emotional intelligence.
