personas:
  professional: Ashly is a dynamic operations coordinator who leverages strong leadership and data analytics skills to streamline regional workflows; they balance meticulous planning with agile flexibility
    while fostering a collaborative, supportive team culture.
  sports: Ashly avidly follows the Houston Astros and Rockets, participates in a weekend hiking club, and plays in a co‑ed recreational soccer league; they view these activities as essential blends of social
    connection and physical fitness.
  arts: Ashly immerses herself in salsa dancing to the rhythms of Celia Cruz and Rubén Blades, enjoys live performances by local Latin jazz ensembles, and watches the cinematic storytelling of Guillermo
    del Toro; they let these artistic experiences fuel their creative energy and community outreach.
  travel: Ashly prefers short‑haul trips that combine adventure with cultural immersion, having explored New Orleans' music scene, Austin's food trucks, and a weekend getaway to Barcelona; they budget future
    escapes to coastal retreats for restorative breaks.
  culinary: Ashly delights in preparing tamales, enchiladas with smoky chipotle sauce, and fragrant mole using dried chilies, corn masa, and fresh cilantro; they regularly showcase these dishes at communal
    potluck nights, experimenting with new spice blends to honor family recipes.
  core: Ashly blends boundless social energy and compassionate leadership with a practical, data‑driven mindset, yet they battle persistent worry that fuels both meticulous planning and occasional overcommitment.
background:
  cultural: Ashly is a second‑generation Mexican‑American raised in Spring, Texas. She grew up bilingual in Spanish and English, celebrating Mexican traditions such as Día de los Muertos, quinceañeras,
    and family holidays centered around Mexican cuisine. Her upbringing emphasized close family ties, community solidarity, and Catholic values, which shape her compassionate outlook and commitment to helping
    others. Living in a diverse Harris County community, she blends Texan influences with her Mexican heritage, often participating in local cultural festivals and supporting Latino business networks.
