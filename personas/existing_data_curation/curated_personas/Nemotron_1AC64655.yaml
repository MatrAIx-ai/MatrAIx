  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Gardening'', ''Birdwatching'', ''Mindfulness meditation'', ''Gentle yoga'', ''Cooking seasonal meals'', ''Local history research'', ''Small‑group
    book club'']'
  career_goals: Leila aims to transition into a senior leadership role, such as Director of Operations, where she can shape organizational culture and embed employee‑well‑being practices into operational
    strategy. She plans to earn a Lean Six Sigma Black Belt certification to formalize her process‑improvement expertise and to mentor emerging managers within her company. Over the next five years, she
    also hopes to launch a part‑time consulting practice that helps small businesses on Long Island streamline operations while fostering supportive workplace environments. On a personal level, Leila is
    dedicated to developing stronger coping mechanisms for anxiety, so she can maintain high performance without sacrificing her mental health.
