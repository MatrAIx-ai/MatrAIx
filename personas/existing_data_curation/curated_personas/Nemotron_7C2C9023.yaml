  hobbies: '[''Sketching'', ''Street Art Photography'', ''Listening to Mexican Folk and Indie Music'', ''Cooking Traditional Mexican Dishes'', ''Hiking'', ''Reading about Design and Innovation'', ''Volunteer
    Work at Community Food Bank'', ''Playing Recreational Soccer'']'
  career_goals: Jairo aims to leverage his hands‑on warehouse experience to move into a supervisory role within the next three to five years, eventually becoming a logistics coordinator or supply‑chain
    analyst. He plans to enroll at a local community college to earn an associate degree in Business Administration with a focus on logistics, and later pursue a bachelor’s degree in Supply Chain Management.
    Simultaneously, he hopes to combine his compassion and interest in community service by working for a nonprofit that distributes food or essential supplies to underserved populations, using his logistics
    expertise to improve efficiency. In the longer term, he envisions launching a small community‑focused art initiative—such as a mural project or pop‑up gallery—that merges his passion for art with empowerment
    of his neighborhood.
