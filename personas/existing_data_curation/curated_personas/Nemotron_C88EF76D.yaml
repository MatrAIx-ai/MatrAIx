  hobbies: '[''LEGO building'', ''Puzzle solving (Sudoku, jigsaw)'', ''Chess'', ''Reading adventure books'', ''Soccer'', ''Coding with Scratch'', ''Caring for pet hamster'', ''Organizing personal space'',
