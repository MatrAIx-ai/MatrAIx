  career_goals: Robin dreams of a future where she can combine her love of structure and problem‑solving. She aspires to become a civil engineer or architect, inspired by her LEGO building projects, and
    is also fascinated by space exploration, hoping to study aerospace engineering. Additionally, her caring nature toward her pet hamster has sparked an interest in veterinary science. Ultimately, she
    wants a career that lets her design practical solutions, lead organized teams, and tackle challenges methodically.
