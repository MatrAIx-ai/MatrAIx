personas:
  professional: Robin Rogers, an aspiring junior engineer, channels their methodical mind into building intricate LEGO sets, solving Sudoku puzzles, and creating simple Scratch games, approaching each challenge
    with competitive precision and a love for clear structure.
  sports: Robin Rogers, a member of the local youth soccer club River Valley Juniors, participates in weekly practices, idolizes soccer star Megan Rapinoe, and enjoys watching Premier League matches featuring
    Manchester United, balancing a competitive drive on the field with a structured training schedule.
  arts: Robin Rogers, a devoted fan of J.K. Rowling’s Harry Potter series and Rick Riordan’s Percy Jackson, spends free time sketching favorite characters, listening to orchestral film scores, and building
    LEGO models inspired by magical worlds, reflecting a love for structured storytelling and imaginative play.
  travel: Robin Rogers, who loves planning weekend family outings, dreams of visiting the interactive science museum in San Francisco and the historic castles of Scotland, yet currently enjoys day trips
    to the local botanical garden and a nearby amusement park, balancing adventure with the comfort of familiar routes.
  culinary: Robin Rogers, an enthusiastic junior chef, enjoys assembling PB&J sandwiches, whipping up microwave mac and cheese, and helping harvest carrots from the backyard garden to make a fresh carrot
    salad, favoring simple, colorful dishes like fruit kebabs and occasionally indulging in chocolate chip cookies after completing a LEGO set.
  core: Robin Rogers balances a competitive, puzzle‑loving mind with a love for structured play, turning every LEGO build and chess match into a mini‑project while meticulously planning family outings and
    savings.
background:
  cultural: Robin was raised in a white, middle‑class family in Riverview, Florida. Her family participates in community activities such as church youth groups, neighborhood block parties, and local sports
    leagues. They celebrate traditional American holidays like Fourth of July, Thanksgiving, and Christmas, while also enjoying Florida’s beach culture and occasional trips to the Gulf Coast. The family
    places a strong emphasis on education, routine, and responsible citizenship, shaping Robin’s practical and organized outlook.
