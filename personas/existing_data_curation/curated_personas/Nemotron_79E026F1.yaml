  career_goals: Ernest aims to move beyond his current representative role to a supervisory or quality‑assurance position where he can shape team standards and performance metrics. He plans to earn a GED
    and pursue a certificate in business administration to solidify his credibility for leadership roles. Long‑term, he envisions establishing a boutique consulting firm that helps small businesses design
    streamlined customer‑service workflows, allowing him to apply his analytical strengths while gaining greater autonomy and financial stability.
