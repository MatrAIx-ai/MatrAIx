personas:
  professional: Angelina Vazquez, an aspiring graphic and UX designer, blends bilingual communication prowess and expertise in Adobe Photoshop, Illustrator, and InDesign with disciplined project‑planning
    habits that still allow room for spontaneous creative experimentation, and their competitive, slightly skeptical nature drives them to double‑check sources and refine designs until they feel both socially
    relevant and aesthetically flawless.
  sports: Angelina Vazquez, a seasonal runner who joins the DeKalb Runners club for weekend 5 k training and enjoys casual soccer matches at the community field, cheers passionately for the Chicago Cubs
    in spring and the Chicago Bulls during the NBA season, and balances regular yoga sessions with a competitive streak that pushes them to improve endurance, even though they sometimes skip workouts when
    anxiety spikes.
  arts: Angelina Vazquez, a mixed‑media enthusiast, spends afternoons sketching in a Moleskine while listening to indie rock bands like Arctic Monkeys and Mexican alternative group Café Tacvba, draws inspiration
    from Frida Kahlo’s vibrant self‑portraits and street artist Shepard Fairey, and regularly visits the local gallery to view works by contemporary creators such as Carla Rohde, letting these influences
    shape their own visual storytelling.
  travel: Angelina Vazquez prefers thoughtfully planned weekend getaways that blend cultural immersion with budget‑friendly options, having explored the historic murals of Mexico City and the coastal town
    where their family’s roots lie, while dreaming of a solo road trip to Santa Fe to photograph desert sunsets and a future study abroad stint in Barcelona to experience European art scenes.
  culinary: Angelina Vazquez, an avid home cook, has a knack for reinventing classic family dishes—soft corn‑masa tamales seasoned with chipotle and topped with fresh cilantro, or bright chilaquiles tossed
    with tomatillo salsa, avocado, queso fresco, and a splash of lime—while experimenting with ingredients like smoked paprika and quinoa to give these meals a modern twist, and they relish sharing the
    results at family gatherings.
  core: Angelina Vazquez is a fiercely curious 18‑year‑old visual storyteller whose competitive drive fuels relentless design perfectionism, but a lingering anxiety often leads them to over‑schedule their
    days and obsess over tiny details, including double‑checking every color hex code before hitting send.
background:
  cultural: Angelina was raised in a Mexican-American household in DeKalb, Illinois, where both Spanish and English were spoken daily. Her parents immigrated from Veracruz and maintain strong ties to Mexican
    traditions, celebrating Dia de los Muertos, quinceaneras, and family gatherings around festive foods. This bicultural upbringing has given her a nuanced perspective on identity, allowing her to navigate
    two cultural worlds fluidly. She participates in the local Mexican cultural center, which hosts language classes, folkloric dance events, and art exhibitions that showcase Latinx creators. These experiences
    inform her artistic style, which often fuses contemporary American design aesthetics with motifs such as papel picado, traditional patterns, and vibrant color palettes reminiscent of Mexican folk art.
    Her bilingual proficiency and cultural awareness make her comfortable advocating for multicultural representation in both academic projects and community initiatives.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator, InDesign)'', ''Basic photography and image editing'', ''Bilingual communication (English-Spanish)'', ''Creative writing'',
