    approach'']'
  hobbies: '[''Sketching and mixed-media drawing'', ''Digital painting and illustration'', ''Photography of everyday life'', ''Visiting art galleries and museum exhibitions'', ''Listening to indie and Mexican
    alternative music'', ''Watching independent and foreign films'', ''Cooking Mexican dishes with contemporary twists'', ''Yoga and mindfulness journaling'', ''Volunteering at community cultural workshops'']'
  career_goals: Angelina aims to turn her artistic talent and communication skills into a career that merges creativity with cultural storytelling. Over the next few years she plans to complete a Bachelor’s
    degree in Graphic Design or Visual Communications, building a robust portfolio that highlights socially conscious projects and Mexican-American themes. She is eager to secure internships at design studios
    or marketing agencies where she can apply her bilingual abilities and learn professional workflows. Long-term, she envisions working as a UX/UI designer or a creative director for a nonprofit arts organization,
    using design to amplify underrepresented voices and to create inclusive, user-friendly experiences. She also harbors a side ambition to freelance as a digital illustrator, offering custom artwork that
    blends contemporary styles with traditional Mexican motifs, providing both artistic fulfillment and financial stability to manage her stress.
