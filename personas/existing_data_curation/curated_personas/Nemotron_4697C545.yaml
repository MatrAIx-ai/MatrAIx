personas:
  professional: Marangelee Valdes, a 63‑year‑old veteran music director and composer, blends folk rhythmic patterns and melodic motifs with contemporary orchestral textures, leveraging meticulous project
    management and a calm, supportive mentorship style while preferring solitary composition sessions that satisfy their curiosity and practicality.
  sports: Marangelee Valdes, an avid hiker and birdwatcher, trains with the Snake River Runners club, follows the Boise State Broncos football season for community spirit, and dedicates weekend mornings
    to gentle trail runs in the foothills, balancing a love of nature with a disciplined, solitary fitness routine.
  arts: Marangelee Valdes finds solace in playing Chopin nocturnes on piano, immersing in Beethoven symphonies, collecting vintage sheet music from composers like Arturo Márquez and Stravinsky, and attending
    local performances by the Garden City community theater, allowing both classical and folk influences to shape their creative identity.
  travel: Marangelee Valdes prefers meticulously planned trips that blend quiet retreats such as a solo cabin stay in the Sawtooth Mountains with culturally rich pilgrimages to Oaxaca’s Día de los Muertos
    celebrations and New Orleans’ jazz festivals, balancing limited budget constraints with a yearning for immersive musical experiences.
  culinary: Marangelee Valdes, a moderately skilled home cook, dedicates weekends to preparing pan de muerto, chicken pozole, and a slow‑cooked mole infused with dried chilies, epazote, and cacao while
    also experimenting with Idaho potatoes and sage in fusion dishes, and meticulously arranging a seasonal herb garden to ensure fresh cilantro and oregano for each festive meal.
  core: Marangelee Valdes, a solitary, detail‑obsessed composer in her sixties, balances a deep curiosity for musical fusion with a persistent worry that fuels meticulous budgeting, health monitoring, and
    a habit of triple‑checking every score before finalizing.
background:
  cultural: Marangelee was raised in a Mexican‑American household that preserved traditions such as Día de los Muertos, Mariachi music, and communal cooking. Bilingual in Spanish and English, she carries
    a strong sense of respeto and comunidad, which informs her collaborative style in music direction. While she now lives in Garden City, Idaho, she remains connected to her heritage through regular participation
    in local cultural festivals, where she serves as a behind‑the‑scenes advisor rather than a front‑stage performer, honoring her preference for solitude. Her Mexican roots shape her aesthetic choices,
    prompting her to incorporate rhythmic patterns like the son jalisciense and melodic motifs from folk canciones into contemporary orchestral settings, creating a bridge between her cultural lineage and
    her adopted Idaho environment.
attributes:
  skills: '[''Orchestral conducting'', ''Music composition'', ''Arranging'', ''Music theory and analysis'', ''Score editing and preparation'', ''Piano performance'', ''Mexican folk musicology'', ''Project
    management'', ''Grant writing'', ''Music education and mentorship'', ''Digital notation (Sibelius, Finale, Dorico)'', ''Audio production (Logic Pro)'']'
  hobbies: '[''Piano playing'', ''Reading Spanish and English literature'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Birdwatching'', ''Collecting vintage sheet music'', ''Hiking Idaho nature
    trails'', ''Knitting'', ''Listening to classical and Mexican folk music'']'
  career_goals: Marangelee aims to create a signature body of work that interweaves Mexican folk melodies with modern orchestral language, culminating in a commissioned suite for a regional symphony. She
    seeks a composer‑in‑residence position that allows her focused, solitary writing time while providing modest financial stability. A long‑term ambition is to establish a cross‑cultural concert series
    in Garden City that spotlights Mexican heritage alongside American composers, fostering inclusive community engagement. She also hopes to mentor at least five young composers from underrepresented backgrounds,
    guiding them through grant applications and professional networking. Practical steps include completing a master’s‑level composition fellowship, securing a regional arts grant, and publishing her works
    with a niche music press.
