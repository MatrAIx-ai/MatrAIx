  career_goals: Although currently not employed full-time, Katina aims to deepen her involvement in local non-profit organizations, potentially taking on a part-time administrative or board role with the
    Steuben County Historical Society or a community health outreach program. She plans to complete a bachelor's degree in Social Work or Community Development to better advocate for rural health services.
    In parallel, she hopes to turn her quilting and preserved-goods hobby into a modest home-based business, offering handmade items at farmer's markets and online. Long-term, she wants to secure a comfortable
    retirement through careful financial planning and to mentor younger women in her community on budgeting, career development, and volunteerism.
