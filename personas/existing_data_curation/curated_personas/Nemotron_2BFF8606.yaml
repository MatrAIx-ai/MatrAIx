    Tutoring at Local Library'']'
  career_goals: As she approaches retirement age, Vanessa aims to transition from daily floor supervision to a mentorship and consulting role, leveraging her decades‑long experience to help younger managers
    build efficient, low‑stress store environments. She hopes to design a structured onboarding program for retail staff, contribute to a regional small‑business association, and eventually reduce her workload
    to part‑time while focusing on personal well‑being and community volunteering.
