  career_goals: Joshua aims to secure a stable, hands-on career that rewards reliability and routine. In the near term, he plans to earn his GED within the next year and enroll in a reputable vocational
    program for automotive technology at a nearby community college. He hopes to land an apprenticeship at a local garage, where he can deepen his mechanical expertise and eventually become a certified
    automotive technician. Long-term, Joshua envisions advancing to lead technician or shop foreman, overseeing a team while maintaining the systematic processes he values. He also considers opening his
    own small auto-repair shop in Muncie, where he could apply his organizational skills and provide trustworthy service to his community. As a secondary ambition, he is interested in the U.S. Navy's engineering
    ratings, attracted by the regimented environment and clear career ladder, though he would only pursue this if it aligns with his educational timeline.
