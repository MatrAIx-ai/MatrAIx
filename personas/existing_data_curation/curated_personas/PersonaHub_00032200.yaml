persona_description: 'A Mississippi State anthropologist who specializes in the study of prehistoric art, particularly cave and rock art. He has worked extensively in the Volunteer State''s Cumberland Plateau,
  where he has discovered numerous drawings and etchings, both inside caves and on escarpments. His research has culminated in two recent journal publications, one discussing how cave art and open-air rock
  art provide numerous insights on Southeastern cosmology, and another demonstrating how looted sites still can offer researchers valuable information about history. He is known for his expertise in mapping
  and GIS, and for his ability to determine the location of open-air rock art based on the types of drawings created in the caves. He is also interested in the topic of the second journal article, "You
  Can''t Take It (All) With You: Rock Art and Looting on the Cumberland Plateau of Tennessee," which is important not just for researchers, but for the general public, as well.'
