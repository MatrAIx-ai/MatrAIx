  career_goals: Larry dreams of becoming an artist who can paint bright, expressive scenes, a wildlife explorer who studies animals and the outdoors, and maybe one day a teacher who shares his love of stories
    and curiosity with other kids. He is also fascinated by inventing playful gadgets that make everyday tasks more fun.
