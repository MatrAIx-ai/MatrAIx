  hobbies: '["drawing", "painting", "watercolor art", "soccer", "dance", "LEGO building", "reading adventure books", "nature exploring", "simple science experiments", "baking with family"]'
  career_goals: Dakota dreams of becoming a children’s book illustrator who brings animals, space adventures, and whimsical worlds to life with bright pictures and fun stories. She also hopes to lead community
    art workshops where she can teach other kids to express themselves, and she imagines one day turning science experiments into exciting shows as a young science presenter.
