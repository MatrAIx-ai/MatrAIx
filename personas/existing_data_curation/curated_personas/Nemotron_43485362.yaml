personas:
  professional: Dakota Pleasant, an 8-year-old aspiring wildlife illustrator, channels curiosity and spontaneous imagination into vibrant watercolor sketches of mystical creatures, often turning school
    science projects into illustrated storyboards that delight friends and teachers alike.
  sports: Dakota Pleasant, a spirited member of the River Valley Rovers U-8 soccer team who practices twice weekly and also thrives in hip-hop dance class, cheers enthusiastically for the Chicago Cubs and
    the Chicago Bulls, and spends free weekends exploring the local park's trail to practice dribbling and balance.
  arts: Dakota Pleasant, an enthusiastic young creator, fills sketchbooks with fantastical beings inspired by the vivid palettes of Mary Blair and the whimsical worlds of Studio Ghibli's Totoro, and spends
    rainy afternoons re-creating favorite scenes from Disney's Moana with crayons and markers.
  travel: Dakota Pleasant, a curious explorer who prefers spontaneous family road trips over rigid itineraries, has already visited the Grand Canyon's rim, the bustling streets of New York City's Times
    Square, and dreams of seeing the fairy-tale castles of Disneyland Paris while collecting pinecones and feathers along the way.
  culinary: Dakota Pleasant, a budding kitchen helper, loves mixing chocolate chip cookie dough with generous dollops of butter and brown sugar, can expertly whisk together a simple pancake batter topped
    with fresh blueberries, and often ends up with flour-covered fingertips after a joyous, music-filled baking session.
  core: Dakota Pleasant is a relentlessly curious, art-loving, and social 8-year-old who toggles between spontaneous creativity, occasional impulse-driven spending, and a resilient spirit that bounces back
    from scraped knees and school hiccups.
background:
  cultural: Dakota was born and raised in Swedesboro, a small borough in Salem County, New Jersey. Her family’s ancestry is primarily German and Irish, and they observe common American traditions such as
    Thanksgiving, Fourth of July fireworks, and Christmas celebrations. Growing up in a suburban community, she attends a local elementary school, participates in town events like the summer fair, and is
    exposed to a variety of cultural influences through school multicultural days, library programs, and online media.
