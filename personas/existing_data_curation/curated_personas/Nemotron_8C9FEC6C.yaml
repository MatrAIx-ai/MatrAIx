personas:
  professional: Loretta Streeter, a four-year-old pretender architect, piles blocks into elaborate cityscapes, showing early spatial reasoning and a love for novel designs while quietly insisting on keeping
    their crayons organized.
  sports: Loretta Streeter, a preschooler who idolizes the Chicago Cubs and the Chicago Bulls, spends Saturday mornings at the Little Ravens Soccer Club, where they chase the ball with boundless energy,
    yet occasionally prefers quiet drawing time over a full-court game, balancing their love for organized team play with the need for solitary creativity.
  arts: Loretta Streeter, an imaginative little artist, spends afternoons finger-painting wild jungle scenes while humming along to Sesame Street songs and dancing to the upbeat tunes of Kidz Bop, frequently
    quoting lines from Pixar’s Toy Story and collecting stickers of their favorite Disney princesses to decorate their sketchbooks.
  travel: Loretta Streeter, a curious traveler, loves weekend trips to the city’s children’s museum and the nearby state park’s lake, has already explored Disneyland in California with their family, and
    dreams of seeing the Eiffel Tower in Paris while clutching their favorite stuffed bunny.
  culinary: Loretta Streeter, a picky yet adventurous eater, delights in twirling spaghetti with marinara sauce, slurps strawberry-banana smoothies made with fresh berries and yogurt, and occasionally sneaks
    a bite of honey-glazed carrots, but stubbornly refuses broccoli unless it’s shaped like tiny trees.
  core: Loretta Streeter, a four-year-old wonderer, blends boundless imagination with a careful eye for order, worries about tiny mishaps, and turns everyday moments into vivid adventures.
background:
  cultural: Loretta grows up in a close‑knit African‑American family in Rialto, California, where community events, church gatherings, and family celebrations infuse her life with rich cultural traditions.
    She hears stories of her ancestors, enjoys soulful music ranging from gospel to contemporary R&B, and partakes in family cookouts that feature dishes passed down through generations. These experiences
    nurture her sense of belonging, teach her the value of cooperation and harmony, and inspire her creative expression through art and storytelling.
attributes:
  skills: '[''basic counting up to 10'', ''recognizing primary colors'', ''identifying simple shapes'', ''basic phonics awareness'', ''pretend role‑play storytelling'', ''drawing simple pictures'', ''cooperating
