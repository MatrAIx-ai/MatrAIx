  hobbies: '[''drawing and coloring'', ''pretend play with stuffed animals'', ''building forts and block structures'', ''listening to and dancing to music'', ''reading picture books'', ''storytelling and
    retelling favorite tales'', ''collecting natural objects on park walks'', ''singing family songs'']'
  career_goals: Loretta dreams of becoming a creator of beautiful things—whether as an artist who paints bright stories, a teacher who shares the wonders of imagination with other children, or a scientist
    exploring new ideas like a little astronaut. She is eager to use her love of art and curiosity to bring joy and learning to others, hoping one day to inspire kindness and wonder in the world around
    her.
