persona_description: A researcher and inventor with expertise in computer architecture and hardware design, particularly in the field of field-programmable gate arrays (FPGAs) and their use in developing
  high-performance and cost-effective computing systems. Chuck Thacker is the principal designer of the BEE3 and FPGA-based platform for research in architecture and algorithm acceleration, and has recently
  developed Beehive, a many-core computer system implemented on a single FPGA. He has published extensively and holds a number of U.S patents in computer systems and networking. Chuck Thacker is a Distinguished
  Alumnus of the Computer Science Department of the University of California, and holds an Honorary Doctorate from the Swiss Federal Institute of Technology (ETH). He is a member of the IEEE, a fellow of
  the ACM, a member of the American Academy of Arts and Sciences, and a member of the National Academy of Engineering.
