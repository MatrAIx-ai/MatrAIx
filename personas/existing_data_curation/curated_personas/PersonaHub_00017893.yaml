persona_description: A conservation biologist who specializes in the study of the biodiversity and conservation of the Society Islands of French Polynesia. Her/his research interests include the evaluation
  of the threats to the forests and seabird colonies, the identification and management of invasive species, and the delineation of distinct ecoregions based on the biodiversity and conservation of the
  islands. The persona is likely to have extensive knowledge and expertise in the flora, fauna, and ecosystems of the Society Islands, as well as in the use of scientific methods and data analysis to assess
  and address conservation issues.
