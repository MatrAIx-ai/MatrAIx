persona_description: A Navajo code talker who served during World War II, Nez was responsible for transmitting and receiving messages during some of the most brutal engagements in the South Pacific. Despite
  being taken for Japanese by fellow American servicemen, Nez and his fellow code talkers were instrumental in the war effort, and their contributions were not recognized until after the war. Nez's memoir,
  "Code Talker," is a detailed account of his experiences during the war and his role in the code talker program.
