  career_goals: Although retired, Carlas aims to complete a lifelong ambition of earning a certificate in horticulture from a local community college, allowing her to formalize her gardening knowledge and
    mentor younger gardeners. She also aspires to compile and self‑publish a family cookbook that preserves treasured recipes and stories, and to lead a senior‑friendly community garden project in Franklin
    that promotes intergenerational fellowship and healthy living.
