personas:
  professional: Carlas Licciardi, a retired office administrator turned community horticulture enthusiast, leverages their meticulous budgeting and event‑coordination skills to lead a senior‑friendly garden
    project while mentoring younger gardeners with a steady, routine‑driven approach.
  sports: Carlas Licciardi enjoys low‑impact fitness through weekly bridge tournaments at the senior center, occasionally joining the local walking club that meets for strolls around the historic downtown
    park, and they cheer on the Franklin High School baseball team.
  arts: Carlas Licciardi finds solace in quilting while listening to classic crooner Frank Sinatra and the folk harmonies of The Weavers, and they regularly attend the community theater's matinee performances
    of 'Our Town' and 'The Glass Menagerie'.
  travel: Carlas Licciardi prefers short, family‑oriented trips, often driving two hours to visit their grandchildren in the countryside or flying to the coastal town of Cape May for a reunion, always planning
    itineraries around familiar restaurants and comfortable lodging.
  culinary: Carlas Licciardi delights in baking apple‑cinnamon pies and buttery shortbread biscuits, using heirloom tomatoes from their garden in savory stews, and they proudly display a well‑worn copy
    of 'The Joy of Cooking' while experimenting with a pinch of rosemary in their classic chicken pot pie.
  core: Carlas Licciardi is a routine‑loving, garden‑proud, puzzle‑savvy senior who balances meticulous planning with a quiet, competitive edge, and they secretly hoard half‑eaten biscuits for midnight
    snacking.
background:
  cultural: Carlas comes from a white, Italian‑American family that settled in the South after World War II. Raised in a devout Catholic household, she retains many traditional values such as respect for
    family hierarchy, hospitality, and community service. Living in Franklin, Tennessee, she has embraced Southern customs—attending country‑style church functions, participating in local history societies,
    and enjoying Southern cuisine—while preserving her Italian heritage through food, language snippets, and celebrations of cultural holidays.
