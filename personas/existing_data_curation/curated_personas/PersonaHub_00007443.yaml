persona_description: A group of students and teachers from Northwest Nazarene University (NNU) and Caldwell High School who are passionate about 3D printing and space exploration. They are dedicated to
  building and launching their own satellite, MakerSat-0, into space aboard a Delta II rocket. This is a significant achievement for them, as it represents their hard work and dedication. They are interested
  in the effects of the outer space environment on 3D printed polymer materials and are eager to gather real-time data to understand how well the parts printed in those environments will hold up. They are
  also interested in the information that the CubeSats will gather after being launched, which will help to attract students to STEM fields.
