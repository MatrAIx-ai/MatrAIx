  career_goals: Amber dreams of becoming a teacher because she loves helping friends learn new things and enjoys the structure of a classroom. She also imagines caring for animals as a veterinarian, inspired
    by visits to local farms and petting zoos. Her broader ambition is to keep learning, stay organized, and one day give back to her community by sharing knowledge and kindness with younger children.
