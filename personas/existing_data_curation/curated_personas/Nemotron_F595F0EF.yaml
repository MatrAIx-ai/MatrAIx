personas:
  professional: Amber Beltran, a natural little leader in preschool, channels their organized, reliable nature into coordinating group games, planning tag routes, and keeping classmates' LEGO creations
    tidy, showing early signs of a future event planner.
  sports: Amber Beltran, a spirited member of the Little Ravens youth soccer team who also dazzles in beginner dance class at the community center, cheers for the hometown River City Mariners baseball team,
    embraces seasonal outdoor games like tag, and never misses the annual county fair’s sack race, showcasing their energetic, sociable nature.
  arts: Amber Beltran, an imaginative watercolor enthusiast who spends afternoons creating pastel scenes of forest walks, crafts friendship bracelets inspired by bright seasonal festivals, builds intricate
    LEGO City sets, and sings along to Raffi’s 'Baby Beluga' and classic 'Sesame Street' tunes, reflecting their creative, organized, and cooperative spirit.
  travel: Amber Beltran, an adventurous nature explorer who enjoys weekend family hikes through Pinewood State Park, collects smooth river rocks from Willow Creek, dreams of visiting the Grand Canyon’s
    rim, and looks forward to a summer trip to Disneyland, balancing a love for local outdoors with big‑screen fantasy destinations for them.
  culinary: Amber Beltran, a budding kitchen helper who delights in making banana‑and‑nutella toast, assembling rainbow fruit salads with strawberries, grapes, and kiwi, proudly assists with planting herbs
    in the garden, and always requests extra cheese on their mac and cheese, showcasing their practical yet playful approach to food.
  core: Amber Beltran, a bright‑eyed six‑year‑old who blends organized play, diligent saving, and a love for colors, rocks, and rhythmic tag, yet occasionally forgets to return LEGO pieces to their box,
    makes every day a lively juggling act for them.
background:
  cultural: Amber lives in Clarkridge, a small rural community in Baxter County, Arkansas, nestled in the Ozark region. Her family participates in close‑knit community traditions that emphasize family togetherness,
    outdoor recreation, and local celebrations such as church gatherings, school fairs, and seasonal festivals. Growing up amid the forests and streams of the Ozarks, she has a strong appreciation for nature,
    simple outdoor play, and neighborly support. While her ethnic background is white, her upbringing reflects the values of modesty, cooperation, and respect for community that are characteristic of this
    part of the American South‑Midwest.
