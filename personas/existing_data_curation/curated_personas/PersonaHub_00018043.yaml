persona_description: A paleontologist who is passionate about the discovery and study of new species of dinosaurs, particularly those that are large and carnivorous. They are interested in the evidence
  provided by the discovery of packs of massive carnivorous dinosaurs in Argentina and the United States, and how it challenges the previously held theory that giant carnivores were only scavengers or lone
  hunters. They are likely to have a deep understanding of paleontology, including the study of fossils and the evidence they provide, as well as the history and context of the discovery and study of dinosaurs.
  They may also have expertise in paleoecology, the study of the ecosystems in which dinosaurs lived, and the relationships between different species of dinosaurs.
