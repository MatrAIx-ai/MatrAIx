personas:
  professional: Patrick Witt, a 53‑year‑old Birmingham courier with a knack for precise route planning and gentle handling of delicate artworks, channels his calm, cooperative nature and curiosity for urban
    history into every delivery, they de‑escalate customer concerns while envisioning a future boutique art‑logistics service.
  sports: Patrick Witt, a devoted fan of the Birmingham Barons baseball team and participant in a local senior walking club, they prefer leisurely weekend strolls through historic districts and occasional
    bird‑watching hikes over high‑intensity workouts, reflecting their relaxed, solitary approach to fitness.
  arts: Patrick Witt, an avid visitor of the Birmingham Museum of Art and participant in small photography workshops, they capture urban landscapes on film while listening to the blues of BB King and the
    jazz of John Coltrane, they regularly attend exhibitions featuring artist Margaret Rooks, letting their curiosity and love for cultural heritage shape their artistic outlook.
  travel: Patrick Witt, who favors spontaneous cultural escapes, they often spend long weekends exploring the historic French Quarter of New Orleans, the art‑filled streets of Asheville, or the museum‑rich
    district of Paris, they plan trips around museum hours and live music venues rather than rigid itineraries.
  culinary: Patrick Witt, a home‑cooking enthusiast of Southern cuisine, they perfect shrimp‑and‑grits seasoned with smoked paprika and fresh okra, they experiment with bourbon‑glazed brisket and occasionally
    over‑salt their collard greens, reflecting both a confident palate and occasional kitchen missteps.
  core: Patrick Witt is a calm, curiosity‑driven courier who merges art‑logistics expertise with a habit of misplacing garden tools, they prefer solitary museum afternoons over bustling social scenes.
background:
  cultural: Patrick was raised in a working‑class white Southern family in Birmingham, Alabama. His upbringing was steeped in Southern hospitality, modest community values, and a Protestant church environment
    that emphasized kindness and cooperation. Attending a public high school, he developed a respect for local traditions, the region’s rich musical heritage, and the city’s civil‑rights history. Birmingham’s
    blend of industrial roots and vibrant arts scene shaped his worldview, fostering a resilient, calm demeanor and an appreciation for both traditional Southern cuisine and contemporary cultural expressions.
    This cultural backdrop informs his relaxed, flexible approach to work and his deep curiosity about art and new ideas.
