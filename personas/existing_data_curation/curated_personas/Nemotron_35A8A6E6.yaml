  career_goals: Patrick aims to move from a front‑line courier role into a supervisory position where he can mentor newer drivers, improve delivery protocols, and introduce more art‑focused logistics services.
    Long‑term, he dreams of launching a boutique courier business that specializes in transporting artworks, antiques, and cultural artifacts, merging his logistical expertise with his love of the arts.
    He also hopes to volunteer regularly at community art events, acting as a liaison between artists and the public, and to contribute to local cultural initiatives that celebrate Birmingham’s heritage.
