  career_goals: Even in retirement, Mayra aims to leave a lasting record of her family and community. She is committed to completing a handwritten memoir that captures her personal history and the oral
    stories of Cayey’s elder residents, hoping to donate it to the local cultural center. She wishes to mentor younger relatives in cooking, storytelling, and gardening, ensuring these traditions endure.
    Volunteering as a guide for heritage tours and assisting with municipal cultural projects are also on her agenda. Maintaining her independence through daily walks, garden upkeep, and managing her health
    are essential long‑term goals.
