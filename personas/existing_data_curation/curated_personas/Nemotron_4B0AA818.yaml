  career_goals: Although retired, Dennise aims to stay active by mentoring seniors, sharing her culinary heritage, and leading community garden projects. She hopes to earn a certification as a community
    health worker, expand her weekly cooking class for Spanish‑speaking families, and eventually launch a small home‑based catering service focused on traditional Mexican meals for local events and family
    celebrations.
