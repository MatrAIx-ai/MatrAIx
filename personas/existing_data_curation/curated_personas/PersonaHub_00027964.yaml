persona_description: A climatologist who specializes in the study of the distribution and characteristics of precipitation and snowfall, particularly in the context of the exponential distribution and conditional
  probabilities. They have experience with the National Weather Service Forecast Office in Tulsa, OK and have worked on the development of the PQPF/PSnow method, which is based on the exponential distribution
  and conditional probabilities. They have also contributed to the development of the cPOE method, which calculates the probability of exceeding a specified amount of precipitation or snowfall.
