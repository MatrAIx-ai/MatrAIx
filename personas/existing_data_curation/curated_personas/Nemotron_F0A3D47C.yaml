  hobbies: '[''Watercolor painting'', ''Pottery making'', ''Traditional Spanish cooking'', ''Flamenco dancing'', ''Herb gardening'', ''Reading historical literature'', ''Bridge (card game)'', ''Hiking local
    trails'', ''Volunteer storytelling'', ''Participating in community festivals'']'
  career_goals: In her later years, Susana aims to deepen her role as a cultural bridge in Ranchos De Taos. She plans to establish a monthly intergenerational art and storytelling circle that pairs seniors
    with local schoolchildren, preserving Hispano narratives and creative techniques. She hopes to compile a bilingual anthology of oral histories from longtime residents, which she will donate to the Taos
    County Historical Museum. Susana also aspires to expand the community garden, incorporating native herbs used in traditional Spanish recipes, and to mentor volunteers in event planning and conflict
    resolution so the neighborhood can sustain vibrant cultural celebrations.
