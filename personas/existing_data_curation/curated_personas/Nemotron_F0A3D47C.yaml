personas:
  professional: Susana Garcia, a 72-year-old community art facilitator and bilingual storyteller, leverages her watercolor, pottery, and event-organizing talents to lead intergenerational workshops and
    craft circles, bringing people together with a warm, talkative flair while occasionally juggling deadlines due to a relaxed approach to planning.
  sports: Susana Garcia enjoys gentle hikes along the Sangre de Cristo foothills, participates in weekly senior-center bridge games which keep her mentally active, follows the New Mexico United soccer team
    and the Albuquerque Isotopes baseball club, and joins a low-impact yoga class at the community center, balancing active and social pursuits.
  arts: Susana Garcia paints tranquil Taos landscapes in watercolor, throws earthenware on a small wheel, dances flamenco at local festivals, sings traditional ballads, and finds inspiration in the works
    of Georgia O'Keeffe, Frida Kahlo, and guitarist Andres Segovia, weaving these influences into her own creative expression.
  travel: Susana Garcia prefers curated cultural trips, having explored Santa Fe's historic Plaza, taken a weekend caravan to the historic streets of Seville, and cherished a pilgrimage to the ancient adobe
    villages of northern New Mexico, while dreaming of a leisurely river cruise on the Danube to experience European folk music and art.
  culinary: Susana Garcia bakes sweet pan de leche and savory empanadas flavored with rosemary, sage, and lavender, enjoys preparing chile relleno and her family's favorite honey-drizzled lavender shortbread,
    and despite occasionally misplacing the timer and ending up with over-browned crusts, she delights in sharing food with friends and family.
  core: Susana Garcia is a sociable, compassionate elder who blends artistic passion, cultural storytelling, and gentle activism into every facet of her lively, sometimes worry-laden, yet warmly chaotic
    life.
background:
  cultural: Susana Maria Garcia belongs to the historic Hispano community of Northern New Mexico. Her ancestors migrated from Spain to New Mexico during the early colonial period, and her family has lived
    in the Taos region for generations, preserving a bilingual Spanish-English household and a strong Catholic faith. She grew up celebrating local fiestas such as San Juan and Las Posadas, and her upbringing
    blended Spanish customs with Pueblo influences present in the Taos area. This cultural tapestry informs her love of traditional recipes, folk music, and storytelling, while also shaping her commitment
    to maintaining harmony and mutual respect across the diverse cultures of Ranchos De Taos.
attributes:
  skills: '[''Storytelling and oral history documentation'', ''Spanish-English translation'', ''Watercolor painting'', ''Pottery wheel techniques'', ''Art workshop design'', ''Community event coordination'',
