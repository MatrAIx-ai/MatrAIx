personas:
  professional: Silvia Napa is a 24‑year‑old automotive body technician who combines meticulous panel work, expert MIG/TIG welding, and digital estimating with a practical, curiosity‑driven approach, making
    them the go‑to problem‑solver for complex restorations while consistently meeting safety standards and delighting customers through bilingual communication.
  sports: Silvia Napa enjoys hiking the trails of the Great Smoky Mountains in spring, practices yoga for flexibility, follows the Nashville Predators in hockey while cheering for the Tennessee Titans in
    the fall, and they belong to the local ‘Smoky Trail Runners’ club that meets for weekend runs.
  arts: Silvia Napa captures the sheen of freshly painted classics through photography, playlists heavy on salsa legend Celia Cruz, reggaetón hitmaker Bad Bunny, and bomba rhythmist Rafael Cepeda while
    attending occasional live gigs at the Bluebird Café, and they admire the vibrant street murals of local artist Jilly Sample.
  travel: Silvia Napa prefers road‑tripping to scenic car shows across the Southeast, has already visited Detroit’s Motor City Classic and the historic streets of Savannah, while dreaming of a future drive‑along
    the Pacific Coast Highway to capture sunrise over Big Sur and a quiet retreat in the Scottish Highlands for a classic‑car rally.
  culinary: Silvia Napa loves cooking aromatic mofongo with crispy chicharrón and garlic‑infused arroz con gandules, skillfully seasons sauces with ají dulje and cilantro, and balances home‑cooked meals
    with occasional nights out for sushi rolls featuring tuna, avocado, and pickled ginger.
  core: Silvia Napa blends a meticulous, eco‑conscious auto‑restoration hustle with a love for spicy home cooking, late‑night car‑show research, and yoga‑driven stress relief, all while they juggle a pocketful
    of worries that often turn into overly detailed to‑do lists.
background:
  cultural: Silvia is a first‑generation American whose parents emigrated from Puerto Rico to Tennessee. She grew up in a bilingual household, celebrating traditions such as Three Kings Day, Semana Santa,
    and local Puerto Rican festivals. Her family’s love of music, dance (especially salsa and plena), and hearty home‑cooked meals continues to shape her identity. Although she lives in Luttrell, she maintains
    strong ties to her heritage through regular visits to relatives in Puerto Rico, participation in the local Hispanic community, and sharing cultural recipes and stories with friends.
attributes:
  skills: '[''Panel replacement'', ''Dent removal'', ''MIG/TIG welding'', ''Metal shaping (hammer and dolly)'', ''Paint preparation and color matching'', ''Spray‑booth operation'', ''Digital estimating
    (Mitchell, Audatex)'', ''Safety and environmental compliance'', ''Workflow planning'', ''Inventory management'', ''Customer service'', ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Car shows'', ''DIY auto customization'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Hiking in the Great Smoky Mountains'', ''Yoga and mindfulness'', ''Photography'', ''Community
    volunteering'', ''Listening to Latin music'']'
  career_goals: Silvia aims to achieve ASE Master Certified Body Technician status within the next three years and secure a lead shop supervisor role at a reputable collision center. Long‑term, she hopes
    to open her own eco‑friendly body shop that specializes in classic‑car restoration and sustainable paint processes. She also plans to earn a business management degree part‑time and mentor other women
    and Puerto Rican youth interested in automotive trades, fostering greater diversity in the industry.
