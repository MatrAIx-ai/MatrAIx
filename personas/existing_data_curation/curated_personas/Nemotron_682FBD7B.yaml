  career_goals: Approaching retirement, Han aims to transition into a consulting role that champions sustainable, zero‑carbon building practices across the Midwest. He aspires to author a practical guide
    on integrating artistic elements into public construction projects and to serve as an adjunct advisor for the University of Illinois' civil engineering program. By establishing a mentorship network
    for emerging construction professionals, he hopes to leave a lasting legacy of disciplined, high‑standard work while ensuring financial stability and reduced personal stress.
