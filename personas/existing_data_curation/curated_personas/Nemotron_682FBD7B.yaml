personas:
  professional: Han Suh, a veteran construction project manager, blends rigorous budgeting, BIM mastery, and lean-construction discipline with a deep appreciation for aesthetics, and they apply their organized,
    detail-oriented nature to shepherd complex projects while their skeptical eye demands double-checking every stakeholder commitment.
  sports: Han Suh, an enthusiastic hiker of the Champaign County trails, follows the Chicago Cubs and the Illinois Fighting Illini, participates in the local senior walking club, enjoys low-impact cardio
    and a competitive shuffleboard league, and they avoid high-intensity workouts that could aggravate their arthritic knees.
  arts: Han Suh, a watercolor painter and avid architectural photographer, frequents the Krannert Art Museum to study Monet and Georgia O’Keeffe, attends performances of Lin-Manuel Miranda’s "Hamilton",
    and they practice seoye, a traditional East Asian calligraphy, drawing inspiration from master calligrapher Kim Young-won.
  travel: Han Suh, who prefers meticulously planned journeys, enjoys weekend road trips to historic towns like Galena and New Hope, has a bucket-list entry for an architectural tour of Kyoto’s temples,
    and they balance cultural immersion with a cautious budget as retirement approaches.
  culinary: Han Suh, a garden-to-table enthusiast, prepares seasonal dishes such as roasted heirloom carrots with harissa, miso-glazed eggplant garnished with fresh basil and shiso, and they harvest heirloom
    tomatoes for crisp salads, while occasionally treating themselves to a fine-dining tasting menu featuring truffle risotto and sous-vide duck breast.
  core: Han Suh, a disciplined engineer-turned-consultant, merges a lifelong curiosity for art with lean construction precision, yet their competitive drive and chronic worry often keep them up late polishing
    spreadsheets.
background:
  cultural: Han is a first‑generation Korean‑American who grew up in a bilingual household that celebrated traditional holidays such as Seollal and Chuseok while adapting to Midwestern American culture.
    His upbringing emphasized respect for elders, a strong work ethic, and the importance of education—values that continue to shape his disciplined approach to work and life. He maintains close ties to
    the local Korean community in Urbana, participates in cultural festivals, prepares Korean cuisine for family gatherings, and incorporates Korean aesthetic sensibilities into his appreciation of art
    and design.
attributes:
