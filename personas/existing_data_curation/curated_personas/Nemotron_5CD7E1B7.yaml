  career_goals: Bradley dreams of becoming a professional soccer player because he enjoys competition and teamwork, and he also fantasizes about designing video games or inventing new Lego creations. He
    often talks about winning future tournaments or creating a game that challenges players to think critically, reflecting his competitive and skeptical personality. While his ambitions are playful, they
    show a clear desire to turn his personal interests into a future career.
