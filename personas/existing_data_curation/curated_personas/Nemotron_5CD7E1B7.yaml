personas:
  professional: Bradley Gowan, an aspiring junior engineer, channels their love for structure and practicality into building intricate LEGO sets, meticulously following step‑by‑step manuals before daringly
    improvising new designs, a habit that mirrors their critical yet flexible mindset.
  sports: Bradley Gowan, a member of the Brookside Juniors Soccer Club, thrills at scoring goals after school, idolizes Manchester United’s Marcus Rashford and cheers for the Chicago Fire FC when televised,
    and they treat weekly soccer practices as their primary fitness routine.
  arts: Bradley Gowan immerses themselves in Disney’s Frozen soundtrack, dances to Kidz Bop’s upbeat covers of Imagine Dragons, and channels that artistic inspiration into LEGO constructions that echo the
    whimsical world‑building of Pixar’s Toy Story, reflecting their love for vibrant stories and hands‑on creativity, and they often hum the melodies while building.
  travel: Bradley Gowan’s favorite adventure was a weekend family trip to the local zoo, followed by a magical summer visit to Disney World in Orlando, and they now dream of exploring dinosaur fossils at
    the American Museum of Natural History in New York for their next big expedition.
  culinary: Bradley Gowan delights in crunchy chicken nuggets with honey mustard, homemade macaroni and cheese piled high with extra cheddar, and peanut‑butter‑and‑jelly sandwiches they proudly assemble
    themselves, though they often forget the broccoli on their plate, preferring the bright colors of their cereal and the sweet zing of ketchup on fries.
  core: Bradley Gowan is a practical, competitively spirited six‑year‑old who blends meticulous LEGO engineering with spontaneous soccer dashes, enjoys a sweet tooth for candy, and habitually day‑dreams
    about roaring dinosaurs during quiet moments, all while they keep a vigilant eye on the next piece to fit.
background:
  cultural: Bradley is a white child growing up in Sun Prairie, Wisconsin, a small Midwestern community with strong ties to German and Irish heritage. His family values practicality, modesty, and community
    involvement, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July with traditional meals and local fairs. He attends a public elementary school where emphasis is placed on teamwork,
    outdoor recreation, and participation in community events like the Sun Prairie Farmers Market and county fairs. This environment nurtures his love for structured activities, team sports, and hands‑on
    crafts.
