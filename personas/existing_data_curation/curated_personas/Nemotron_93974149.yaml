  career_goals: Although retired from formal employment, Jessica aims to channel her lifelong curiosity into tangible projects. She plans to compile and self‑publish a family cookbook that blends traditional
    New England recipes with her own experimental twists. She also seeks to lead a neighborhood garden program that teaches sustainable planting techniques to seniors, and to serve as a health‑information
    liaison for her local senior center, helping peers navigate medical resources with a skeptical, evidence‑based approach. Additionally, she aspires to mentor younger volunteers in event organization
    and bridge strategy, fostering community engagement.
