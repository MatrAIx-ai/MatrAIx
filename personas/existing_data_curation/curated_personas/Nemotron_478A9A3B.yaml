  career_goals: Vicki aims to advance to a senior technician or field lead role within her telecom company, obtaining BICSI and CFOT certifications to deepen her expertise in fiber network design. She aspires
    to transition into project management for infrastructure upgrades, focusing on projects that allow independent planning and minimal on‑site coordination. Over the next five years, she hopes to develop
    a niche consulting service providing discreet fiber installations for boutique art galleries and small businesses, leveraging her appreciation for art and technical precision. Ultimately, Vicki envisions
    contributing to sustainable smart‑city initiatives in San Diego, combining her technical acumen with her curiosity for innovative, low‑impact solutions.
