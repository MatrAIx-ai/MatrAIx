personas:
  professional: Vicki Mejia, a seasoned telecommunications line installer and repairer with an associate's degree, leverages their methodical planning and artistic curiosity to deliver flawless fiber splicing,
    precise network diagnostics, and meticulous documentation, while they pursue BICSI and CFOT certifications and build a niche consulting practice for boutique art galleries that blends technical precision
    with aesthetic sensibility.
  sports: Vicki Mejia, an avid hiker, regularly tackles the Torrey Pines cliffs and joins the local San Diego Trail Runners club for weekend runs, follows the San Diego Padres for summer baseball, tunes
    into the LA Lakers during winter NBA season, and maintains a modest indoor yoga practice to counterbalance long days of manual cable work, all of which reflect their preference for solitary yet purposeful
    physical activity, and they schedule weekly stretch sessions to prevent injury.
  arts: Vicki Mejia, a devoted landscape photographer and watercolor enthusiast, draws inspiration from Ansel Adams' monochrome vistas and Claude Monet's pastel hues, listens to Debussy's piano suites while
    practicing pieces like Clair de Lune, and frequently visits the San Diego Museum of Art to study contemporary installations, they blend their technical precision with creative expression.
  travel: Vicki Mejia, who prefers solitary, self‑planned journeys, has photographed the rugged cliffs of Cinque Terre, trekked Iceland's black‑sand beaches, and plans a future immersion in Barcelona to
    practice Spanish, balancing each trip with careful budgeting and a penchant for off‑season coastal escapes that align with their love for quiet reflection, and they often capture sunrise shots before
    the crowds arrive.
  culinary: Vicki Mejia, an occasional home chef, favors Mediterranean flavors like grilled salmon with lemon‑dill quinoa, prepares fish tacos with mango salsa using fresh cilantro and lime, and experiments
    with paella while practicing Spanish, though they often skip cooking on busy workweeks in favor of quick avocado toast topped with feta.
  core: Vicki Mejia, a methodical yet creatively curious 45‑year‑old, thrives in solitary, detail‑driven pursuits that blend technical expertise with artistic expression, while they occasionally indulge
    in quiet quirks like midnight coffee or spontaneous road‑trip photography.
background:
  cultural: Vicki grew up in San Diego's multicultural environment as a white American with a Hispanic surname, reflecting a blend of European (likely Irish or German) and Latino ancestry. While she identifies
    primarily with mainstream American culture, her upbringing exposed her to Mexican traditions, cuisine, and community festivals such as Día de los Muertos, fostering an appreciation for cultural diversity.
    The coastal Southern California lifestyle has shaped her values of independence, environmental awareness, and a laid‑back yet diligent work ethic. Her family emphasized education, self‑reliance, and
    respect for others, aligning with her cooperative nature. Vicki's cultural experiences influence her artistic interests and her desire to serve the local community in a considerate, harmonious manner.
