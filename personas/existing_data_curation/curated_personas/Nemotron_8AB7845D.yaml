  career_goals: Christophe aims to obtain his GED within the next six months and then enroll in a community‑college certificate program in hospitality management or automotive technology, aligning his practical
    skill set with a formal credential. He aspires to launch a mobile coffee‑and‑snack cart that can serve at local sports events and community gatherings, leveraging his event‑planning experience and love
    for social interaction. In the longer term, he hopes to become a recognized organizer of youth sports leagues in Pasco County, using his competitive drive and leadership to mentor younger players while
    building a sustainable small‑business brand around community events.
