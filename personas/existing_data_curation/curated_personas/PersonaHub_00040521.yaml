persona_description: 'A scholar and advocate for the importance of a liberal arts education, Michael S. Roth, who has written a book titled "Beyond the University: Why Liberal Education Matters." He critiques
  the two-fold American liberal arts education and the idea that it must generate useful knowledge that can benefit society or increase the student''s financial and social status, and argues that education
  should go beyond university corridors towards the growth of the whole individual for the entirety of life. Roth''s book challenges the conventional wisdom about the value of a liberal arts education and
  advocates for a more reflective and pragmatic approach to education.'
