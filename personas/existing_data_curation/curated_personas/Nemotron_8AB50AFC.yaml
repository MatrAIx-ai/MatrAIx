  career_goals: Laurie aspires to pursue a career that merges her love for visual storytelling and innovative concepts. She plans to apply to a BFA program in illustration or concept art, with the aim of
    becoming a professional concept artist for video games or animation studios. She also dreams of publishing a collection of speculative short stories and graphic novels that explore abstract themes.
    In the long term, Laurie hopes to work as a creative director or freelance illustrator, using her skills to collaborate on interdisciplinary projects that blend art, technology, and narrative. She is
    determined to earn scholarships that support her artistic education and to build a portfolio that showcases her unique vision.
