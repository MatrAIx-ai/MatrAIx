persona_description: A global leader in the field of human rights, particularly in the areas of education and empowerment. Bill Clinton, the former President of the United States, and Tostan, an international
  human rights organization, were awarded the seventh biennial Thomas J. Dodd Prize in International Justice and Human Rights in 2015. Their work focuses on empowering communities and fostering democratic
  practices through the use of non-formal education sessions, which are rooted in the belief that every human being has a fundamental right to human dignity. Tostan's Community Empowerment Program (CEP)
  empowers communities and individuals to change their lives by sharing their understanding of human rights and responsibilities, learned through non-formal education sessions, with other interconnected
  groups and social networks.
