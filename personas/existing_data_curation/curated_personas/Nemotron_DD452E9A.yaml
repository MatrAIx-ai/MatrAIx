personas:
  professional: Timothy Brazzle, a ten‑year‑old with a love for drawing, is an aspiring digital artist who blends their LEGO construction skills and Scratch coding to create interactive, visually rich mini‑games,
    applying a disciplined, organized mindset to meet high standards.
  sports: Timothy Brazzle follows the Los Angeles Dodgers enthusiastically, collects their memorabilia, and participates in their school's after‑school baseball club, preferring the strategic aspects of
    the game over high‑intensity competition, while they also join a local chess club that hones their mental agility.
  arts: Timothy Brazzle, an avid visitor of the Long Beach Museum of Art, draws inspiration from contemporary street art and enjoys listening to hip‑hop and R&B while sketching, and they frequently reference
    artists like Banksy and Kendrick Lamar to fuel their creative storytelling.
  travel: Timothy Brazzle loves weekend trips to the beach and occasional family rides to Disneyland, but they truly spark when attending cultural festivals where they explore local art installations, document
    each experience with a sketchbook, and plan future visits to cities known for vibrant art scenes like New York and San Francisco.
  culinary: Timothy Brazzle favors simple comfort foods such as pepperoni pizza and chicken nuggets, yet they enjoy experimenting with rainbow fruit salads and occasionally try their hand at making sushi
    rolls with guidance from their mom, always insisting on adding a splash of soy sauce for flavor.
  core: Timothy Brazzle blends disciplined creativity with a competitive spirit, and they turn their love for digital art, LEGO, and chess into a meticulous, organized pursuit of personal excellence.
background:
  cultural: Timothy is an African‑American boy raised in Long Beach, California, a city with a vibrant Black community and rich cultural history. His family celebrates Black heritage through annual participation
    in local events like Black History Month exhibits at the Long Beach Museum of Art and community festivals that feature soul food, jazz, and hip‑hop. He attends a multicultural elementary school where
    stories of civil‑rights leaders and African diaspora traditions are part of the curriculum. At home, his parents emphasize pride in their cultural identity, encouraging him to explore Black artists,
    musicians, and innovators. This environment shapes his appreciation for diverse artistic expressions and fuels his ambition to contribute to the cultural landscape through his own creative work.
