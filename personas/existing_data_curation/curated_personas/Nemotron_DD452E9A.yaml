  career_goals: Timothy dreams of turning his love for art and technology into a career where he can create immersive visual experiences. He aims to attend a specialized STEM‑focused high school, win science
    and art competitions, and eventually study graphic design or interactive media at a university. His competitive spirit fuels a desire to become a recognized game developer or multimedia artist who blends
    storytelling, digital art, and innovative coding. He also hopes to contribute to community art programs that inspire other young people in his neighborhood.
