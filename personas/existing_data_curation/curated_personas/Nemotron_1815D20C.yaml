  hobbies: '[''fishing'', ''woodworking'', ''vegetable gardening'', ''reading historical nonfiction'', ''vintage radio restoration'', ''road cycling'', ''small‑group barbecues'']'
  career_goals: Justin aims to achieve Master Plumber and Master Steamfitter certifications within the next three years, positioning himself for a foreman role on larger commercial projects. He aspires
    to lead a union crew, eventually launching his own modest contracting firm that emphasizes high‑quality workmanship and mentorship for younger tradespeople. Long‑term, he hopes to specialize further
    in high‑pressure industrial steam systems, secure contracts with regional manufacturing plants, and become an active participant in local trade associations to influence standards and training programs.
