personas:
  professional: Justin Williams, a seasoned journeyman plumber, pipefitter, and steamfitter with over two decades of experience, leverages their meticulous blueprint reading and code compliance expertise
    to lead complex residential and light‑industrial projects while balancing their preference for structure with a relaxed, adaptable work style.
  sports: Justin Williams, an avid solo cyclist, tackles the rolling trails of St. Louis County on their road bike each weekend while cheering on the St. Louis Cardinals and St. Louis Blues, and they supplement
    their fitness routine with early‑morning fishing excursions on nearby lakes.
  arts: Justin Williams, a dedicated reader of Civil War and early American industrial histories, frequently devours works by Bruce Catton and James M. McPherson, while their hobby of restoring vintage
    radios fuels an appreciation for classic swing and early rock‑and‑roll artists such as Ella Fitzgerald and Chuck Berry.
  travel: Justin Williams enjoys low‑key travel that blends history and nature, having visited Gettysburg and the Lowell National Historical Park for immersive Civil War and industrial tours, and they plan
    future trips to the Ozark fishing lodges and a weekend cabin retreat in the Upper Peninsula of Michigan.
  culinary: Justin Williams favors hearty, home‑cooked meals featuring garden‑fresh vegetables, smoked brisket, and pan‑seared trout caught on their own fishing trips, seasoning dishes with rosemary, garlic,
    and a dash of smoked paprika, and they often cap evenings with a craft IPA from a local brewery.
  core: Justin Williams is a disciplined tradesman who balances methodical work with solitary hobbies, a relaxed approach to planning, and a calm, resilient demeanor that keeps them steady even when their
    garage is a cluttered workshop.
background:
  cultural: 'Justin grew up in a middle‑class, white, Midwestern family in the St. Louis metropolitan area. He attended public schools and pursued engineering technology courses at a community college before
    committing to the trade apprenticeship route. His upbringing was steeped in the values typical of the region: a strong work ethic, modesty, self‑reliance, and a sense of community responsibility. He
    participates in his local Methodist church, celebrates traditional American holidays, and takes part in community events such as the St. Louis County Fair. This background reinforces his practical,
    resilient demeanor while fostering a deep respect for craftsmanship and local ties.'
attributes:
