  career_goals: As she looks toward the future, Lynne aspires to channel her curiosity about the natural world into a career in marine biology or environmental science. She dreams of studying marine ecosystems,
    conducting field research along the California coast, and eventually contributing to ocean conservation efforts. In the short term, she aims to excel in middle-school science courses, win her school's
    science fair, and earn a place in a competitive STEM summer program. She also hopes to develop her coding skills further, potentially entering robotics or data-analysis projects that support environmental
    research. Ultimately, she wants to attend a top high school with strong STEM offerings, then pursue a degree at a university known for marine science, such as UC San Diego, with the ambition of becoming
    a leading marine ecologist.
