personas:
  professional: Lynne Overmyer is a budding marine science enthusiast who combines a rigorous, notebook-driven approach to tide-pool observations with hands-on programming in Scratch to create interactive,
    educational stories about ocean ecosystems, and they channel their curiosity and disciplined, achievement-driven mindset into every project.
  sports: Lynne Overmyer is an avid swimmer on the Coastal Breeze Junior Swim Club, enjoys beachcombing and tide-pool scouting as off-season fitness, and they cheer for the San Diego Padres baseball team,
    admiring its disciplined training ethos.
  arts: Lynne Overmyer draws intricate marine creatures inspired by David Doubilet's underwater photography, plays piano pieces by Ludovico Einaudi, enjoys listening to Alan Menken's whimsical soundtrack
    from The Little Mermaid, and they admire Jacques Cousteau's storytelling in his ocean documentaries.
  travel: Lynne Overmyer prefers carefully planned small-group trips that blend adventure with safety, having cataloged the tide pools of Monterey Bay during a family vacation and dreaming of snorkeling
    the Great Barrier Reef, and they also cherish weekend visits to the nearby state beach for shell-collecting excursions.
  culinary: Lynne Overmyer loves the salty tang of fish tacos with cilantro and lime, delights in making simple sushi rolls with cucumber and avocado, savors buttery clam chowder seasoned with thyme, and
    they often bake seashell-shaped cookies using almond flour and vanilla.
  core: Lynne Overmyer is a meticulous, curiosity-driven 11-year-old who blends scientific inquiry with artistic flair, organizing every shell they find into color-coded collections while diligently budgeting
    allowance for LEGO projects and battling occasional hay fever.
background:
  cultural: As a white, American girl raised in a middle-class family in San Diego, Lynne's cultural background blends the typical values of suburban Southern California with the region's coastal lifestyle.
    Her family celebrates mainstream American holidays such as Thanksgiving and Fourth of July, while also embracing local traditions like beach outings, surf culture, and visits to the San Diego Zoo and
    SeaWorld. Growing up in a diverse county, she has been exposed to a multicultural environment, which has fostered an appreciation for different perspectives, though her household maintains a primarily
    Anglo-American cultural foundation. The sunny climate and proximity to the Pacific Ocean have nurtured her love for outdoor activities, marine life, and environmental stewardship.
