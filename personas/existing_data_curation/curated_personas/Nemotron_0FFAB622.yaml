personas:
  professional: Anibal Serranomaldonado, a 20‑year‑old machinist with hands‑on expertise in CNC milling, GD&T, and SolidWorks, leverages their methodical, organized nature to meticulously program machine
    tools, maintain rigorous safety standards, and mentor peers in a small workshop, all while planning their path toward CNC programmer certification and future shop supervision.
  sports: Anibal Serranomaldonado, a devoted member of the El Paso community soccer league and a fan of El Paso Locomotive FC, also follows the Dallas Cowboys and the Houston Astros, hits the Franklin Mountains
    for weekly hikes, and they approach fitness with a disciplined schedule that balances team practice, cardio trails, and strength training in the garage.
  arts: Anibal Serranomaldonado, who spends evenings listening to classic regional bands like Los Tigres del Norte and contemporary artists such as Tame Impala while assembling detailed scale models, also
    watches films by acclaimed directors like Alejandro González Iñárritu, and they find creative solace in the precise craftsmanship of model kits as an extension of their artistic expression.
  travel: Anibal Serranomaldonado, who enjoys meticulously planning road trips, has hiked the trails of Carlsbad Caverns and trekked the cliffs of Big Bend, dreams of attending the Day of the Dead celebrations
    in Oaxaca, and they balance limited student budget constraints with a love for spontaneous overnight camping under the stars.
  culinary: Anibal Serranomaldonado, an avid home cook, perfects tacos al pastor with achiote‑marinated pork, crafts homemade mole poblano using guajillo chilies and almonds, and they delight in sharing
    these dishes at family gatherings, though they sometimes over‑season the sauce in pursuit of deeper flavor.
  core: Anibal Serranomaldonado blends a disciplined, methodical work ethic with a warm, community‑centered spirit, juggling precision machining, spicy cooking, and model‑building while habitually planning
    every detail yet occasionally succumbing to impulsive hobby purchases.
background:
  cultural: Anibal is a Mexican‑American who grew up in El Paso, Texas, in a bilingual household where Spanish and English are spoken interchangeably. His family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Cinco de Mayo, and other cultural festivals with music, food, and community gatherings. He values the close‑knit family dynamics and the emphasis on respect for elders
    common in Mexican culture, while also embracing the American work ethic and frontier spirit of the Southwest. This bicultural upbringing influences his worldview, fostering both a deep appreciation
    for his heritage and a practical, forward‑looking approach to his career and personal life.
attributes:
  skills: '[''CNC milling operation'', ''Manual lathe operation'', ''Blueprint reading'', ''GD&T interpretation'', ''Precision measurement'', ''Machine maintenance and troubleshooting'', ''Basic CAD/CAM
    design (SolidWorks, Fusion 360)'', ''Safety compliance'', ''Inventory management'', ''Team collaboration and documentation'']'
  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Scale model building'', ''Hiking in the Franklin Mountains'', ''Fishing in the Rio Grande'', ''Volunteering at youth robotics club'', ''Strategy video
    gaming'']'
  career_goals: Anibal aims to earn a CNC programmer certification within the next two years and complete an associate’s degree in mechanical engineering technology. He aspires to become a lead machinist
    or shop supervisor, where he can mentor junior colleagues and oversee production workflow. Long‑term, he envisions opening a small custom‑parts fabrication business that serves local manufacturers and
    community projects, combining his technical expertise with entrepreneurial ambition while continuing to develop leadership skills.
