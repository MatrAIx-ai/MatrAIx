  hobbies: '["Reading speculative fiction and poetry","Watercolor painting","Street photography","Playing the ukulele","Attending jazz and blues concerts","Volunteering for community art workshops","Collecting
    vintage bus memorabilia","Solving puzzles and crosswords"]'
  career_goals: Jennie aims to transition from front‑line driving to a leadership role within the transit system, seeking certification as a driver trainer and eventually supervising a fleet of routes.
    She aspires to influence route design by integrating data‑driven scheduling and sustainability considerations, leveraging her analytical mindset. Concurrently, she dreams of launching a community‑based
    art project that documents the daily lives of commuters through visual storytelling, merging her professional experience with her artistic passions. Ultimately, Jennie hopes to mentor the next generation
    of drivers—particularly women and people of color—while continuing to explore creative outlets that satisfy her quest for novelty.
