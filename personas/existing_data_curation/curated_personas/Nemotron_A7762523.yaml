  career_goals: Although only six, Kevin already envisions a future that blends his love for art, science, and exploration. He dreams of becoming an astronaut‑artist who designs spacecraft interiors and
    creates visual records of space missions. He also imagines working as an inventor or a child‑focused science communicator, building hands‑on exhibits that spark curiosity in other kids. Kevin’s ambition
    includes helping people by sharing knowledge and creativity, aiming to inspire wonder in his community and beyond.
