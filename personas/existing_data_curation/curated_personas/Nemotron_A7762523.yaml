personas:
  professional: Kevin Quintana is a budding junior scientist and illustrator who fuses a vivid imagination with methodical note‑taking, turning every LEGO build and slime experiment into a colorful research
    journal that impresses teachers and classmates alike.
  sports: Kevin Quintana dazzles on the field with the Sunrise Soccer Club’s U‑7 team, idolizing the teamwork of FC Barcelona’s youth squads while also twirling in the school’s dance troupe, and they cheer
    loudly for the local basketball team, the River City Raptors, during weekend games.
  arts: Kevin Quintana fills sketchbooks with dragons, glowing planets, and inspired scenes reminiscent of Hayao Miyazaki’s films and Dr. Seuss’s whimsical lines, while they hum along to the catchy tunes
    of Sesame Street and sing colorfully to Taylor Swift’s kid‑friendly rendition of Shake It Off during art class.
  travel: Kevin Quintana daydreams about future trips to the Kennedy Space Center in Florida and to the National Geographic‑themed museum in Washington, D.C., while cherishing past family road‑trip adventures
    to the Grand Canyon and a weekend getaway at the local aquarium in Monterey Bay.
  culinary: Kevin Quintana loves the gooey stretch of melted mozzarella on a pepperoni pizza, delights in building banana‑strawberry smoothies with a splash of almond milk, and can proudly toss together
    a simple mac‑and‑cheese casserole using elbow pasta, cheddar, and a sprinkle of breadcrumbs.
  core: Kevin Quintana is a bright, meticulously organized six‑year‑old whose boundless imagination fuels creative experiments, yet their constant worry about missing a detail can turn a simple LEGO set
    into a miniature crisis.
background:
  cultural: Kevin comes from a white family living on or near Fort Leavenworth, Kansas, a historic U.S. Army installation. The military community around him emphasizes discipline, service, and respect for
    tradition, which have shaped his organized and reliable nature. He participates in local Fourth of July parades, school celebrations of Memorial Day, and visits Fort Leavenworth’s historical museums,
    gaining an appreciation for American history. Though his surname hints at Hispanic ancestry, his upbringing blends Midwestern American customs with occasional family stories of broader cultural roots,
    fostering an inclusive perspective. The diverse base population also exposes Kevin to classmates from various backgrounds, further enriching his cultural awareness.
