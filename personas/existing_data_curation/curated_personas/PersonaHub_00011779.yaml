persona_description: A Database Administrator who is responsible for overseeing the installation and ongoing function of software on a system designed for use by a number of users. This includes setting
  up login credentials, defining privileges, and troubleshooting problems that users may experience with the new product. The Database Administrator is also responsible for creating backup records of the
  information contained in the databases, and taking a basic design and customizing the fields or functions to more effectively serve the needs of the corporation. In recent years, the role of the Database
  Administrator has expanded in some companies, and they may be called upon to take a basic design and customize the fields or functions to more effectively serve the needs of the corporation.
