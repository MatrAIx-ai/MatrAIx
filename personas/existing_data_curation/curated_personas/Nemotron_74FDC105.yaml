  career_goals: Although retired, Michael’s ambitions center on staying healthy, remaining active in his community, and passing on his knowledge. He hopes to maintain his independence and physical fitness
    through regular walks and gardening, to document his family’s genealogy in a written memoir, to mentor younger volunteers at the local senior center, and to become more comfortable using digital tools
    for video calls with his grandchildren. He also aspires to occasionally travel to visit relatives and to attend regional historical festivals that celebrate the steel‑town heritage of northern West
    Virginia.
