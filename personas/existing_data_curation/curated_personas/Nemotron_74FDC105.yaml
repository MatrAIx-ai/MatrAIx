personas:
  professional: Michael May, a retired steel mill mechanic turned community handyman, leverages his decades of mechanical repair and woodworking expertise to mentor volunteers at the senior center while
    keeping his own garden and fishing gear meticulously maintained, and they embody a practical yet occasionally spontaneous approach to projects.
  sports: Michael May is a lifelong fan of the Pittsburgh Steelers and West Virginia Mountaineers, watches NFL and college football games every Sunday from his porch, roots for the local high‑school baseball
    team when time permits, and they proudly wear his vintage Steelers jersey to community events, balancing his enthusiasm with a low‑key lifestyle.
  arts: Michael May sings baritone in his church choir, plays a well‑worn harmonica for personal enjoyment, devours historical non‑fiction by David McCullough and classic western novels by Louis L’Amour,
    finds inspiration in folk musicians like Johnny Cash and Alison Krauss, and they often share stories of their ancestors while listening to these recordings.
  travel: Michael May prefers leisurely road trips to nearby historic sites such as the National Iron & Steel Heritage Museum in Pennsylvania and the West Virginia Coal Heritage Center, has visited Washington,
    D.C.’s Smithsonian museums with his grandchildren, dreams of a pilgrimage to the Ironbridge Gorge in England, and they keep travel plans modest to accommodate moderate mobility and a fixed budget.
  culinary: Michael May cooks hearty Appalachian fare like chicken and dumplings, cornbread, fried trout caught from the Ohio River, and homemade apple butter, skillfully seasoning dishes with garden‑grown
    herbs like thyme and sage, while their modest kitchen setup limits them to simmering stews and occasional baking of sweet potato pies.
  core: Michael May is a pragmatic octogenarian who blends steadfast routine with spontaneous bursts of hobby‑driven enthusiasm, channeling his steel‑town roots into community service, storytelling, and
    a love for simple, seasoned comforts, and they often find themselves indulging in nostalgic comforts at the end of a long day.
background:
  cultural: Michael was born and raised in the steel‑town community of Weirton, West Virginia, an area steeped in Appalachian working‑class culture. His family’s roots trace back to English and German ancestors
    who settled in the region during the early 20th century. The values of hard work, self‑reliance, and close‑knit family ties are central to his identity. He grew up attending a Protestant (Methodist)
    church, celebrating local traditions such as community potlucks, Appalachian folk music, and the seasonal harvest festivals. The decline of the steel industry shaped his worldview, fostering a strong
    sense of resilience, loyalty to his neighbors, and pride in preserving the region’s industrial heritage.
