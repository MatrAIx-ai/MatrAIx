persona_description: A historian or social scientist who is interested in the study of historical events and their impact on society. This person is particularly interested in the Great Irish Famine and
  its impact on the local administration of the Irish poor law in the North Dublin Union. They are likely to be interested in the details of the study, such as the methodology used to analyze the workhouse
  records and the findings of the study. They may also be interested in the broader implications of the famine for Irish society and the role of local authorities in managing the crisis.
