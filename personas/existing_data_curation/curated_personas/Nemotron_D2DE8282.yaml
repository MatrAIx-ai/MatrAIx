  career_goals: Theodore often talks about wanting to "help people" and enjoys pretending to be a teacher, a doctor, and a firefighter while playing with his friends. He expresses a curiosity about how
    things work and imagines using that knowledge to make everyday tasks easier, such as fixing a broken toy. His ambitions, shaped by his sociable personality, include becoming someone who can bring joy
    to others—perhaps a community helper who sings, tells stories, or teaches small groups of children in the future.
