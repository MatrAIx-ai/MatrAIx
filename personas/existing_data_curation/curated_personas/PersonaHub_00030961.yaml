persona_description: A knowledgeable and experienced archaeologist or anthropologist who specializes in the study of Native American cultures and their archaeological sites, particularly those in the Rocky
  Mountains of Colorado. This individual is deeply familiar with the BLM's Royal Gorge Field Office, its responsibilities, and the cultural resources located on BLM-administered land in the region. They
  have a strong interest in the historical and archaeological context of these sites and are able to analyze and interpret the data from the archaeological records with great precision and insight. This
  person is also well-versed in the consultation process with nearly twenty tribes that have an interest in the BLM's cultural resources, and is able to navigate the complexities of tribal relations and
  negotiations.
