persona_description: A historian who specializes in the study of Southeast Asian history, with a particular focus on the influence of Hindu-Malayan culture on the Philippines before Spanish colonization.
  She is knowledgeable about the history of the Philippines, the influence of Islam on the Philippines, and the role of Hinduism in the development of Filipino culture. She is also interested in the preservation
  and study of ancient inscriptions and artifacts, and has conducted research on the Laguna Copperplate Inscription, a document found in the Philippines that shows direct Hindu influences present in Filipino
  culture prior to Spanish colonization. She is also knowledgeable about the history of the Philippines, the influence of Islam on the Philippines, and the role of Hinduism in the development of Filipino
  culture.
