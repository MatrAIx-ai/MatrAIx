  career_goals: Kathryn aims to formalize her on‑the‑job knowledge by obtaining ASE Master Technician certification within the next two years. She hopes to step into a lead‑technician role at her current
    shop, where she can influence scheduling, quality standards, and safety practices. Long‑term, she dreams of opening a modest independent garage that offers affordable repairs and weekend workshops that
    teach basic vehicle maintenance to teens and adults in her community.
