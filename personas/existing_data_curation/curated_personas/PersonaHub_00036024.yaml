persona_description: A scientist or researcher who specializes in the study of gilding, painting techniques, and decorative arts, particularly those related to the creation of polychrome altarpieces in
  Portugal during the XVIIth and XVIIIth centuries. This individual is interested in the material and technical history of such altarpieces, the influence of the Spanish school on Portuguese art during
  the Baroque period, and the interdisciplinary methodology used in the study of these artifacts. This person is likely to be involved in the research and documentation of the gilding and polychrome decoration
  of the main altarpiece of Miranda do Douro Cathedral, which is considered one of the masterpieces of talha dourada in Portugal.
