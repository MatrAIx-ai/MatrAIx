  career_goals: Although she is only two years old and does not have defined career aspirations, Dieula shows early interest in caregiving and learning. She often mimics adults by "helping" in the kitchen,
    enjoys listening to teachers during story time, and expresses delight when praised for sharing. These behaviors suggest she may grow toward roles that involve guiding or nurturing others, such as a
    teacher, caregiver, or community helper, as she matures.
