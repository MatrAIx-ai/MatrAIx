personas:
  professional: Dieula Clark is a budding explorer who treats the family kitchen as a sensory laboratory, applying a practical love for structure to stacking blocks and mimicking the rhythmic flow of gospel
    songs during playtime, while they remain a calm, resilient presence in the bustling household.
  sports: Dieula Clark loves toddler soccer sessions at the local park and eagerly watches the Alabama Crimson Tide football games on TV, cheering with a soft plush mascot, while they also enjoy swinging
    on playground equipment and splashing in the community pool during summer.
  arts: Dieula Clark sways to gospel hymns like Amazing Grace performed by the church choir and to upbeat R&B tunes from artists such as Beyoncé and classic soul tracks by Aretha Franklin, while they also
    delight in finger‑painting to the rhythm of children's songs from Sesame Street.
  travel: Dieula Clark prefers family road trips with a familiar car seat routine, enjoying stops at Gulf Shores beach for sandcastle building, visits to grandparents' porch in Prattville, and dreaming
    of a future vacation to Disney World where they can experience magical rides and character meet‑and‑greets.
  culinary: Dieula Clark loves the sweet taste of sweet potato pie, the crunchy delight of fried chicken, and the buttery comfort of mac 'n' cheese, often helping stir mashed bananas into pancake batter
    despite the inevitable sticky mess they create.
  core: Dieula Clark, a two‑year‑old with a calm, structured curiosity, finds joy in rhythmic gospel beats, counting pennies in a pink piggy bank, and the comforting flavors of sweet potato pie, all while
    embracing the occasional sticky‑handed art project.
background:
  cultural: Dieula is raised in a close‑knit African‑American family in Prattville, Alabama. Her cultural roots blend Southern traditions with Black heritage, reflected in regular attendance at a local
    Baptist church where she participates in story time and gospel singing. Family gatherings often feature soul food such as collard greens, fried chicken, and sweet potato pie, and community events include
    backyard barbecues, porch conversations, and celebrations of holidays like Juneteenth. She is surrounded by a rich musical environment—gospel, R&B, and hip‑hop—played at home and during church, fostering
    an early appreciation for rhythm and movement. The emphasis on community support, faith, and storytelling shapes her worldview and daily experiences.
