personas:
  professional: A master residential carpenter with meticulous blueprint interpretation, custom furniture design, and workshop safety expertise, Glenis Sirker translates their curiosity for modern art and
    disciplined organization into finely crafted pieces that blend functionality with aesthetic nuance, while preferring solitary focus and clear client communication.
  sports: Glenis Sirker spends weekends hiking the Ozark trail network with the local Hilltop Explorers club, follows the Kansas City Chiefs and Royals for a touch of community spirit, and maintains a low-impact
    fitness regimen that includes weekly yoga sessions to counterbalance the physical demands of carpentry.
  arts: Glenis Sirker immerses themselves in modern art and design literature, sketches concepts inspired by Mondrian's geometry, paints small canvases echoing the muted tones of Ansel Adams, carves wood
    pieces while listening to Chopin and Caribbean steel-drum rhythms, and regularly visits the Nelson-Atkins Museum's contemporary exhibitions.
  travel: Glenis Sirker prefers quiet, nature-focused getaways, having trekked the red rock canyons of Sedona, explored the historic streets of Bruges, and taken a weekend road trip to the Columbia River
    Gorge, while planning a future pilgrimage to a sustainable timber workshop in the Pacific Northwest.
  culinary: Glenis Sirker enjoys preparing aromatic family-style stews featuring plantains, smoked pork, and fragrant herb blends, perfects a crisp, herb-infused roasted chicken, and experiments with hand-made
    empanadas using locally sourced flour, all while pairing meals with a glass of dry Riesling or a local craft cider.
  core: Glenis Sirker is a solitary, detail-obsessed carpenter who channels artistic curiosity into woodcraft, saves every spare dollar for a studio, battles occasional joint aches with disciplined stretches,
    and can't resist a midnight sketch session after a steaming bowl of spiced stew.
background:
  cultural: Glenis is a first-generation American of Puerto Rican descent. Raised in a bilingual household, she grew up speaking both Spanish and English and celebrating traditions such as Noche Buena,
    Three Kings Day, and the vibrant rhythms of bomba and plena. Her family's stories of island life instilled a deep appreciation for community, hospitality, and the expressive arts. Living in De Soto,
    Kansas, she blends her Caribbean heritage with Midwestern sensibilities, often incorporating subtle island motifs or warm color palettes into her woodworking. She maintains strong ties to the local
    Puerto Rican community, attending cultural festivals and sharing her culinary recipes, while her upbringing influences her kindness, cooperative nature, and respect for harmonious relationships.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Cabinetry'', ''Custom Furniture Design'', ''Blueprint Reading'', ''Project Management'', ''Tool Maintenance'', ''Safety Compliance'', ''Wood Carving'', ''Artistic
    Design Integration'', ''Client Consultation'']'
  hobbies: '[''Reading Art and Architecture Books'', ''Sketching'', ''Painting'', ''Wood Carving'', ''Gardening'', ''Hiking'', ''Photography'', ''Cooking Traditional Puerto Rican Cuisine'', ''Listening
    to Classical and Caribbean Music'']'
  career_goals: Glenis aims to achieve master carpenter certification and eventually open a boutique woodworking studio in the Kansas City area that specializes in art-inspired, sustainably sourced furniture.
    She envisions building a small team of skilled artisans, where she can mentor apprentices, especially women entering the trade. Over the next five years, she plans to develop a signature line of pieces
    that reflect her Puerto Rican heritage through subtle motifs and to secure partnerships with local galleries and interior designers. Financially, she seeks to create a stable, independent business that
    provides for her family while allowing her the solitude and creative autonomy she values.
