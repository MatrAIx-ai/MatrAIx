  hobbies: '[''building Duplo block towers'', ''solving simple wooden puzzles'', ''collecting leaves during backyard walks'', ''drawing shapes with crayons'', ''listening to picture‑book stories'', ''watching
    fish in an aquarium'', ''arranging toy cars in orderly rows'']'
  career_goals: Although only three, Neil often talks about wanting a future job that is calm, predictable, and helps others. He imagines becoming a librarian who keeps books in order and provides a quiet
    space for readers, or a garden caretaker who tends to plants on a set schedule. He also expresses a gentle wish to be a teacher who creates a structured, harmonious classroom. These aspirations reflect
    his love of routine, quiet environments, and desire to be kind and reliable.
