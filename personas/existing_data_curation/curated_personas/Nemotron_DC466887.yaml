  career_goals: Dana aims to consolidate her remaining years in the postal service by pursuing a senior route supervisor position, where she can apply her organizational strengths to improve overall route
    efficiency and mentor new carriers. She is interested in developing a formal training program for newcomers, leveraging her methodical approach and cooperative demeanor. As she approaches retirement,
    she hopes to transition to a part‑time or consulting role that allows her to maintain a steady income while reducing physical strain. Maintaining her health and managing stress remain central to her
    long‑term plans, so she also seeks a work schedule that supports her wellbeing.
