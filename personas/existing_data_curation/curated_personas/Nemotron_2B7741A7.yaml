  hobbies: '["Playing basketball", "Reading science‑fiction and African‑American literature", "Personal coding projects", "Mentoring through STEM outreach", "Cooking Southern‑style cuisine", "Listening
    to jazz and hip‑hop", "Photography", "Hiking in local parks", "Participating in community service events"]'
  career_goals: In the short term, Arthur aims to earn a Master’s degree in STEM Education to deepen his pedagogical knowledge and qualify for a tenure‑track position at a four‑year university. He plans
    to spearhead inclusive curriculum initiatives that incorporate hands‑on projects and digital tools, and to publish research on equitable teaching practices in peer‑reviewed journals. Over the next decade,
    Arthur envisions becoming a department chair or program director, influencing institutional policies that promote diversity in STEM fields. He also aspires to launch a community‑based STEM outreach
    program in Prince George’s County that provides mentorship, workshops, and scholarships for underrepresented high‑school students, thereby giving back to the community that shaped his own educational
    journey.
