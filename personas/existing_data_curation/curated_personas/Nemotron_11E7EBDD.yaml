  career_goals: Karla aims to progress to a Director of Finance or CFO role within the next five years, positioning herself as a strategic partner in her organization’s growth. She plans to earn her CPA
    certification and pursue an MBA to deepen her financial expertise and leadership acumen. Her ambitions include leading enterprise‑wide financial transformation projects, integrating sustainability metrics
    into reporting, and building a culture of data‑driven decision‑making. Karla also values mentoring junior staff and hopes to eventually launch a boutique consulting practice that supports small‑to‑mid‑size
    businesses in the Southeast with tailored financial planning and risk management services, while maintaining a healthy work‑life balance with her family.
