personas:
  professional: Noris Sierra is a budding junior game designer who channels their curiosity and methodical LEGO building skills into crafting simple Scratch animations, meticulously planning each storyboard
    while confidently sharing ideas with friends.
  sports: Noris Sierra is a spirited member of the Little Kickers Soccer Club, honing their dribbling and teamwork every Saturday while cheering for FC Barcelona and emulating their midfield dynamism, balancing
    structured practice with spontaneous games during recess.
  arts: Noris Sierra is an enthusiastic creator who sketches vibrant comic panels inspired by Jeff Smith’s Bone and Hayao Miyazaki’s animation, dances to the lively rhythms of the local marimba ensemble
    Los Rítmicos, and often turns those sketches into short Scratch animations, blending these artistic passions into colorful drawings during free time.
  travel: Noris Sierra loves family‑led nature excursions, eagerly mapping out hikes through Pine Ridge County Park while collecting rocks, and dreams of exploring the ancient ruins of Machu Picchu, balancing
    meticulous itinerary planning with spontaneous wildlife spotting.
  culinary: Noris Sierra is a budding kitchen assistant who expertly assembles tamales with masa, pork, and red chile sauce and forms pupusas stuffed with cheese and refried beans, delighting in the tactile
    rhythm of kneading dough and proudly serving these dishes at family gatherings.
  core: Noris Sierra is an organized, curiosity‑driven eight‑year‑old who balances LEGO engineering, soccer, and marimba rhythms, though they occasionally forget to finish homework after a marathon of comic
    reading.
background:
  cultural: Noris comes from a Guatemalan family that emigrated to Chicago when her parents were young. At home, Spanish is spoken alongside English, and she learns to read and speak both languages fluently.
    Her household celebrates Guatemalan traditions such as Semana Santa, Day of the Dead, and the annual preparation of tamales, pupusas, and atol de elote. She participates in cultural events organized
    by the local Guatemalan community center in Back of the Yards, where she learns folk dances and hears stories about her ancestors from the highlands of Guatemala. The family places a strong emphasis
    on education, respect for elders, and community service, values that shape her organized and reliable nature. While adapting to life in Chicago presented challenges, she draws strength from her cultural
    heritage, balancing her American school experiences with the rich customs and values of her Guatemalan roots.
