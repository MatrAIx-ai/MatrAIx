  career_goals: She aspires to a career that blends her love of animals, science, and helping others. Her primary dream is to become a veterinarian, where she can use her curiosity about biology and her
    practical caring nature to keep pets and wildlife healthy. She also imagines teaching younger children as a bilingual elementary teacher, sharing both English and Spanish and preserving her Guatemalan
    heritage. Occasionally she mentions a fascination with space and says she might explore becoming an astronaut, but her main ambition centers on professions that combine curiosity, compassion, and practical
    impact on her community.
