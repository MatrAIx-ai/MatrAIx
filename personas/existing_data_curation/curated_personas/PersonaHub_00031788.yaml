persona_description: A researcher in the field of granular materials who specializes in the study of granular gases, particularly those enclosed within a 2D cell. They are conducting experiments in microgravity
  during parabolic flights, using high-speed optical tracking to study the kinematics of the particles and the determination of all inelastic parameters. They are using beads and disks as model gases to
  study the rotational part of the particle's dynamics. They are comparing their experimental results with existing theories and have developed a model that fairly predicts the equilibrium temperatures
  along the direction of vibration.
