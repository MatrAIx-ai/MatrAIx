personas:
  professional: Cesar Garcia is an aspiring LEGO architect who channels curiosity and practicality into constructing intricate models, methodically documenting each build in a notebook, and they confidently
    present their creations to family and classmates as if leading a junior engineering project.
  sports: Cesar Garcia is a forward for the Amelia Panthers youth soccer club, practices twice a week, idolizes Lionel Messi while cheering for the Ohio State Buckeyes football team and the Cleveland Browns
    on weekends, and they balance competitive play with the occasional shy retreat when a game feels too intense.
  arts: Cesar Garcia is a LEGO enthusiast and cartoon sketcher who spends evenings listening to folk singer Lila Downs while drawing comic‑style heroes, collects graphic novels such as Adventure Time, and
    they find inspiration in Studio Ghibli animated films and the rhythms of Mexican folk music during creative sessions.
  travel: Cesar Garcia is a curious explorer who has camped at Hocking Hills State Park, visited the historic town of San Antonio on a family road trip, dreams of seeing the pyramids of Teotihuacan, and
    they keep a scrapbook filled with postcards from the Grand Canyon and Washington, D.C., planning future trips with a detailed map and color‑coded itinerary.
  culinary: Cesar Garcia is a budding kitchen helper who loves preparing tamales de verde with their grandmother, enjoys a spicy salsa verde mixed with fresh cilantro and avocado, pretends to chef a taco
    night with ground beef, cheese, and corn tortillas, and they can whisk together a simple mac and cheese using cheddar and a touch of butter.
  core: Cesar Garcia, a nine‑year‑old LEGO builder and soccer enthusiast, balances boundless curiosity with methodical planning, and they often wrestle with intense anxiety that colors their daily adventures.
background:
  cultural: Cesar comes from a Mexican‑American household that maintains strong ties to its heritage. Spanish is spoken at home, and family gatherings often feature traditional dishes like tacos, tamales,
    and arroz con pollo. He celebrates Día de los Muertos and Mexican Independence Day with vibrant decorations and stories of his ancestors. Living in Amelia, Ohio, he balances his cultural roots with
    the Midwestern community, attending a local elementary school where he participates in multicultural events and learns about both Mexican and American customs. This bicultural upbringing instills in
    him a respect for family, community, and the value of hard work.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Conversational Spanish'', ''LEGO construction'', ''Organizational planning'', ''Basic computer operation'', ''Following multi‑step instructions'']'
  hobbies: '[''LEGO building'', ''Soccer'', ''Nature hikes'', ''Reading adventure and sci‑fi books'', ''Cooking Mexican dishes with family'', ''Strategic video games'', ''Sketching cartoons'']'
  career_goals: Although still in elementary school, Cesar dreams of a future where he can combine his curiosity for how things work with his desire to help others. He aspires to become a civil engineer
    or an environmental scientist, envisioning himself designing safe bridges and sustainable parks for his community. He also imagines working with animals as a veterinarian, drawn by his caring side.
    His long‑term goal is to pursue a career that offers both practical problem‑solving and the chance to make a positive impact, while also allowing him a structured environment that helps manage his anxieties.
