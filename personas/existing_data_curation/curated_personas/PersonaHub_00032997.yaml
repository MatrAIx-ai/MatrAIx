persona_description: A conservation biologist who has dedicated his career to the protection and conservation of Africa's wildlife species. Dr. Philip Muruthi has been attending the Conference of the Parties
  to the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) since 1997, and has a unique perspective on the importance of bringing together wildlife range States, wildlife
  conservation organizations, and community groups from across the world for the sustainable conservation of Africa's wildlife species. His expertise in the field of wildlife conservation and his attendance
  at CITES meetings have given him a deep understanding of the challenges facing Africa's wildlife and the need for effective conservation strategies to protect these species from extinction.
