  career_goals: Mark aspires to merge his creative and technical interests by pursuing a career in multimedia design or graphic arts, ideally through a vocational program or apprenticeship that balances
    hands‑on learning with artistic development. He aims to attend a community college offering courses in visual communication and digital media, while also seeking an apprenticeship at a local print shop
    or design studio to gain real‑world experience. Long‑term, he hopes to launch his own freelance design business that serves both local small businesses and online clients, allowing him to travel, explore
    new artistic trends, and bring fresh ideas back to his hometown. He also envisions mentoring younger community members in art and digital media, contributing to the cultural vitality of Laceyville.
