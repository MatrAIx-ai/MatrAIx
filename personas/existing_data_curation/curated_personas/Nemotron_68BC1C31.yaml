personas:
  professional: Mark Hattaway, a 16‑year‑old aspiring multimedia designer, merges his self‑taught digital illustration talent with a methodical event‑planning mindset, coordinating pickup basketball games,
    running his school’s art‑club Instagram, and actively seeking a summer apprenticeship at the town’s print shop to gain hands‑on experience for his future freelance studio.
  sports: Mark Hattaway, an avid basketball player who organizes weekend pickup games for his friends and follows the Philadelphia 76ers and the Penn State Nittany Lions, also hikes the state game lands
    in the spring to build endurance for cross‑country runs while staying loyal to his local youth basketball league.
  arts: Mark Hattaway channels his love of nature into digital paintings inspired by the atmospheric landscapes of Simon Stålenhag and the indie folk aesthetic of Bon Iver, while listening to the alternative
    sounds of Phoebe Bridgers and attending community art workshops where he mentors younger kids in sketching and photography.
  travel: Mark Hattaway plans weekend trips to Ricketts Glen State Park and occasional family road trips to Niagara Falls, dreams of a summer backpacking adventure through the Adirondacks, and keeps a Pinterest
    board of future visits to Berlin’s street‑art scene, balancing his love of nature with a curiosity for urban creative hubs.
  culinary: Mark Hattaway enjoys cooking simple comfort meals like mac and cheese with crisp bacon, perfecting his own apple‑cinnamon crumble using locally harvested apples, experimenting with homemade
    smoothies featuring spinach, banana, and almond milk, yet has a habit of midnight snacking on a bag of chips while editing artwork.
  core: Mark Hattaway blends a competitive, organized drive with a creative curiosity, juggling basketball, digital art, and community projects while occasionally overindulging in snack binges and impulse
    sneaker purchases.
background:
  cultural: Mark grew up in Laceyville, a small rural borough in Susquehanna County, Pennsylvania, where community ties are strong and self‑reliance is valued. His family’s heritage traces back to European
    immigrant ancestors, primarily of German and Irish descent, typical of many white families in the region. Local customs, such as seasonal fairs, church gatherings, and outdoor activities like hunting
    and hiking, have shaped his appreciation for nature and community involvement. At the same time, access to the internet and digital media has exposed him to broader cultural influences, fostering an
    openness to unconventional ideas while still grounding him in the modest, hard‑working ethos of his hometown.
