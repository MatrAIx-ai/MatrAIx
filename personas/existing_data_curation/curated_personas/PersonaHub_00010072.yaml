persona_description: A historian who specializes in the study of aerial bombardment during the 20th century, particularly focusing on the impact on non-white lands and the role of the European powers in
  perpetuating it. The historian is interested in the psychological and social effects of the bombing on the people of those lands and the way it influenced the development of modern art, such as Pablo
  Picasso's Guernica. The historian is also interested in the ways in which the bombing has become a common occurrence in today's world and how it affects the way people perceive war and violence. The historian
  is likely to be interested in analyzing the role of technology in the creation of modern art and the ways in which it has been used to create a sense of awe and horror in the public.
