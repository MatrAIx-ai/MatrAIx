persona_description: A skilled and innovative engineer who was instrumental in the development of the first pneumatic message system and the production of gas from coal. He worked for Boulton & Watt, a
  leading engineering company, and played a significant role in the company's efforts to apply its expertise to marine engineering. His work on the sun and planet gear allowed steam power to be turned into
  a truly circular motion, and his experiments with compressed air and steam cannons were pioneering. He was also interested in the production of gas from coal and the development of municipal gas supply
  systems. He died in 1839, aged 85, and was buried in Birmingham.
