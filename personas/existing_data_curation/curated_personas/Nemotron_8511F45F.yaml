  hobbies: '[''Oil painting'', ''Sketching'', ''Industrial photography'', ''Scale model building'', ''Woodworking'', ''Reading science-fiction'', ''Hiking'', ''Listening to classical music'', ''Meditation'',
    ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: His primary ambition is to transition from a production worker to a supervisory role, eventually becoming a plant manager or continuous‑improvement director where he can shape operational
    strategy. He plans to earn a Six Sigma Black Belt and, if feasible, pursue an MBA part‑time to deepen his business acumen. Anthony also dreams of launching a small boutique manufacturing venture that
    blends his love for art and engineering—producing handcrafted, sustainably produced home décor items that reflect New England design traditions. He seeks to be a steady, calm leader who mentors junior
    staff while championing innovative, eco‑friendly production methods.
