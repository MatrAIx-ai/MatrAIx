  career_goals: Allisa aims to move into senior leadership where she can shape product strategy at an organization that values innovation, sustainability, and employee well‑being. Over the next three years
    she plans to pursue an MBA focused on entrepreneurship, deepen her expertise in user‑centered design, and lead initiatives that blend technology with the arts, such as creating immersive digital experiences
    for cultural institutions. Ultimately she envisions founding a consultancy that helps tech firms embed creative thinking and mental‑health‑friendly practices into their development pipelines.
