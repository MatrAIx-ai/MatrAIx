personas:
  professional: Lamaya Thomas is a meticulous front‑of‑house specialist with an Associate’s in Hospitality Management who leverages precise cash handling, strict food‑safety compliance, and bilingual service
    to orchestrate smooth restaurant operations, while methodically planning the next steps toward supervisory roles and a future community café that they aim to open in Orangeburg within five years.
  sports: Lamaya Thomas enjoys casual fitness, cheering on the South Carolina Gamecocks football team and the Charleston RiverDogs minor‑league baseball club, while participating in a local “Fit Friday”
    walking group at Lake Wateree and occasionally joining community clean‑up runs, reflecting their preference for low‑key, community‑oriented activities.
  arts: Lamaya Thomas blends creative expression with community roots, singing gospel classics in the church choir, knitting quilts inspired by traditional Southern motifs, and losing themselves in historical
    fiction by authors such as Ann Patchett and Susan Vreeland, while also enjoying the storytelling songs of Johnny Cash and the piano ballads of Elton John.
  travel: Lamaya Thomas prefers well‑planned, moderate‑budget getaways, often spending long weekends exploring nearby nature spots like Congaree National Park or a serene beach stay in Myrtle Beach, while
    day‑dreaming about a culinary pilgrimage to New Orleans, a cultural tour of Savannah’s historic district, and an occasional affordable overseas adventure to Barcelona’s La Boqueria market, all balanced
    against family responsibilities that limit extended travel.
  culinary: Lamaya Thomas’s culinary passion is rooted in preserving Southern comfort dishes—such as shrimp and grits, gumbo, collard greens, and sweet‑potato pie—using fresh herbs from their garden, masterful
    canning techniques, and a careful balance of Cajun spices like paprika, cayenne, and thyme, while they delight in pairing these meals with homemade biscuits and seasoned buttermilk gravy.
  core: Lamaya Thomas is a structured, community‑oriented hospitality professional who balances meticulous work habits with a love for Southern cooking, quiet creativity, and modest, well‑planned adventures,
    all while occasionally battling a penchant for late‑night snack binges and mild back soreness.
background:
  cultural: Lamaya is an African‑American woman rooted in the rich cultural heritage of South Carolina’s Black communities. Growing up in Orangeburg, she was immersed in the traditions of the Gullah‑Lowcountry
    region, where storytelling, music, and cuisine play central roles in daily life. Her family places strong emphasis on church fellowship, mutual support, and preserving oral histories of resilience and
    civil‑rights activism. These influences shape her values of harmony, respect for elders, and a deep sense of community responsibility, which she carries into her professional and personal endeavors.
attributes:
  skills: '[''Customer Service'', ''POS System Management'', ''Food Safety & Sanitation'', ''Cash Handling'', ''Inventory Management'', ''Scheduling & Time Management'', ''Menu Knowledge (Southern Cuisine)'',
    ''Conflict Resolution'', ''Team Coordination'', ''Basic Accounting'', ''Bilingual Communication (English & Spanish)'']'
  hobbies: '[''Southern Cooking'', ''Gardening'', ''Church Choir'', ''Community Volunteering'', ''Reading Historical Fiction'', ''Quilt Making'', ''Hiking'']'
  career_goals: Lamaya’s primary career goal is to advance from front‑of‑house staff to a supervisory and eventually a restaurant management position within the next three to five years. She plans to obtain
    ServSafe certification and a Certified Hospitality Supervisor credential, then leverage her Associate degree to enroll in a bachelor’s program in Hospitality Management. In the longer term, she aspires
    to open a small, family‑run café in Orangeburg that highlights traditional Southern and African‑American comfort foods, providing a welcoming space for her community while maintaining the structure
    and predictability she values in her work life.
