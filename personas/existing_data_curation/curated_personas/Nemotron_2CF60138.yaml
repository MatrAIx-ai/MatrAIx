  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Knitting'', ''Birdwatching'', ''Nature walks'', ''Cooking/baking'', ''Volunteering at food pantry'']'
  career_goals: Stephanie aims to advance from first-line supervisor to store manager within the next three to five years, focusing on building a cohesive, low-turnover team and maintaining a well-organized
    store environment. Long-term, she would consider a district-manager role or opening her own boutique that allows her to apply her love of routine and quality service while preserving a calm, family-friendly
    atmosphere.
