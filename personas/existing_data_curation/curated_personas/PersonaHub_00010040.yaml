persona_description: A historian who specializes in the history of the Church of England and the history of the English monasteries, particularly the history of the priory of St. Leonard's in London. Her
  research interests include the history of the priory's administration, the history of the priory's possessions, the history of the priory's conflicts with the canons of St. Paul's, and the history of
  the priory's liberties. She is particularly interested in the history of the priory's churches, including the history of the priory's appropriation of the churches and the history of the priory's clerks.
  She is also interested in the history of the priory's administration and the history of the priory's possessions.
