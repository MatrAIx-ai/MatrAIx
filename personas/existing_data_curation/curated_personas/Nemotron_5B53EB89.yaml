personas:
  professional: An aspiring graphic designer, Besnik Berry blends their meticulous event‑planning talent with a flair for digital illustration on Procreate and Adobe Photoshop, and they aim to channel their
    organized mindset into curating community art projects that also serve as therapeutic spaces for emotionally vulnerable youth.
  sports: Besnik Berry enjoys casual pickup basketball at the local park, follows the Pittsburgh Steelers and Pittsburgh Penguins with enthusiastic loyalty, and incorporates walking tours of the city's
    vibrant street‑art corridors into their fitness routine, though they rarely commit to structured gym workouts.
  arts: Besnik Berry immerses themselves in the works of Banksy and Shepard Fairey, frequents the Carnegie Museum of Art, performs acoustic renditions of Nick Drake at open‑mic nights, and draws inspiration
    from indie folk icons like Sufjan Stevens while constantly experimenting with hand‑drawn sketches and digital murals.
  travel: Besnik Berry has taken a weekend road trip to the Laurel Highlands for a hike and street‑art tour, visited New York City’s Museum of Modern Art with a school group, and dreams of traveling to
    Berlin to explore its renowned graffiti scene and to Kyoto for its Zen gardens, balancing budget constraints with a love for culturally enriching experiences.
  culinary: Besnik Berry favors quick, creative meals such as avocado toast topped with chili flakes, homemade ramen with soft‑boiled eggs, pepperoni pizza from a local pizzeria, and crafts strawberry‑basil
    smoothie bowls when craving a nutritious snack, while occasionally indulging in late‑night sugary cereal during marathon sketch sessions.
  core: Besnik Berry is a fiercely curious, methodical teen whose artistic passion and emotional intensity drive them to create therapeutic community projects, even as they wrestle with anxiety, impulsive
    spending, and a habit of over‑committing to too many activities.
background:
  cultural: Besnik is a white, middle‑class teenager from Pittsburgh whose family blends Albanian heritage from his father’s side—his grandparents emigrated from Albania in the 1970s—with Irish roots on
    his mother’s side, whose ancestors settled in western Pennsylvania during the early 20th century. Growing up near the North Shore, he absorbed the city’s industrial legacy and its vibrant, emerging
    arts scene in neighborhoods like Lawrenceville. This multicultural background fosters his appreciation for diverse artistic expressions and fuels his desire to contribute positively to his community.
attributes:
  skills: '[''Digital illustration'', ''Hand drawing and sketching'', ''Basic Python programming'', ''HTML/CSS web basics'', ''Event planning and coordination'', ''Schedule management'', ''Peer tutoring
