  hobbies: '[''Sketching'', ''Digital art creation'', ''Exploring street art'', ''Playing acoustic guitar'', ''Reading science‑fiction'', ''Philosophical reading'', ''Mindfulness journaling'', ''Meditation'',
    ''Visiting museums'', ''Open‑mic performances'', ''Community volunteer work'']'
  career_goals: Besnik aims to enroll in a community college or art institute to study graphic design and visual communication, with the goal of becoming a professional graphic designer or multimedia artist.
    He envisions using his organizational strengths to manage creative projects in museum curation or community arts programs. Long‑term, he hopes to launch art‑therapy workshops that combine his passion
    for art with his personal experience of intense emotional reactivity, creating supportive spaces for youth mental‑health advocacy.
