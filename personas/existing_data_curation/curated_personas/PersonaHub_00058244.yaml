persona_description: A researcher in the field of evolutionary anthropology, particularly focusing on the study of human behavior and the evolution of cooperative relationships between unrelated individuals.
  Specializes in measuring and analyzing oxytocin levels in the urine of wild chimpanzees and other social mammals, and how it is associated with social bonding and cooperative behavior. Has conducted research
  on the neurobiological mechanisms underlying the bonding effects of food sharing and grooming, and how these mechanisms evolved within the context of building and strengthening the mother-offspring bond
  during lactation. Is known for his findings on the link between food sharing and oxytocin levels in chimpanzees, and the potential for this mechanism to be applied to human relationships. Has published
  numerous papers and is considered an expert in his field.
