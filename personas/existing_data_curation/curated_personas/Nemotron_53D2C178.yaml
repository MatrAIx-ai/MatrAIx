  hobbies: '[''Salsa dancing'', ''Line dancing'', ''Karaoke nights'', ''Zumba fitness classes'', ''Baking Southern desserts'', ''Community gardening'', ''Visiting historic sites in Macon'', ''Reading personal‑development
    books'', ''Hiking on local trails'']'
  career_goals: Enisa aims to move from volunteer roles into a paid position in community outreach or event management within the next two years. She plans to complete an online Event Planning certification
    and refresh her CPR/First Aid credentials, then pursue entry‑level jobs such as program assistant at a local non‑profit. Long‑term, she hopes to launch a boutique event‑planning service that specializes
    in Southern‑themed festivals and charitable gatherings, leveraging her organizational strengths and love for group activities.
