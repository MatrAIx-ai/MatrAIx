  hobbies: '["CNC‑based sculpture and furniture making","Electric guitar playing","Digital music production","Urban photography (street art, murals)","Basketball","Beach volleyball","Attending Caribbean/African‑American
    cultural festivals","Mentoring youth in STEM","Exploring local art galleries","Cooking Southern and Caribbean dishes"]'
  career_goals: Rodney aims to move from a CNC operator to a senior CNC programmer and eventually a process engineer within the next five years. He plans to earn industry certifications such as the Autodesk
    Certified Professional in CAD/CAM and the CNC Machining Technician certificate. He dreams of integrating his artistic inclinations into his work by leading a small in‑house prototyping studio that creates
    custom art‑focused metal‑and‑wood installations for local businesses and events. Long‑term, he hopes to open his own boutique fabrication shop where he can mentor apprentices, combine advanced machining
    with creative design, and contribute innovative, aesthetically‑driven solutions to the manufacturing community in South Florida.
