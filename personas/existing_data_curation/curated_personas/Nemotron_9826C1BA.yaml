personas:
  professional: Rodney Smith, a 33‑year‑old CNC specialist in Fort Lauderdale, merges expert G‑code programming and hands‑on machining with a vivid artistic vision, leading collaborative shop teams while
    they navigate a flexible schedule and aspire to launch an in‑house prototyping studio that fuses metal‑and‑wood installations with local community projects.
  sports: Rodney Smith, an enthusiastic weekend athlete, dominates local basketball courts with their crew, spikes beach volleyball at Fort Lauderdale’s shoreline, supports the Miami Heat and Tampa Bay
    Buccaneers, and occasionally practices yoga to counteract the physical wear of machining while they prioritize staying active and socially connected.
  arts: Rodney Smith, a mixed‑media maker, spends evenings sculpting reclaimed wood‑metal pieces, jamming electric‑guitar riffs at open‑mic nights, producing lo‑fi beats inspired by Tame Impala and Kendrick Lamar,
    and curating a personal photo archive of Fort Lauderdale’s vibrant graffiti, all of which feed their artistic identity and community spirit while they continuously experiment with new mediums.
  travel: Rodney Smith, a 33‑year‑old explorer, favors spontaneous road trips to the Keys, has trekked New Orleans for jazz and Creole cuisine, plans a future island getaway to the Bahamas to study Caribbean
    folklore, balances travel budgets with a points‑reward credit card, and still reserves funds for their next CNC upgrade while they chase both cultural immersion and creative inspiration.
  culinary: Rodney Smith, a flavor‑curious home chef, loves preparing jerk‑spiced chicken with mango salsa, hand‑crafting hot sauces from Scotch bonnet chilies, grilling seafood paella on a reclaimed‑wood
    smoker, pairing meals with their own cold brew, and often forgets to finish recipe books after a late‑night jam session while they experiment with fusion twists.
  core: Rodney Smith, a 33‑year‑old CNC virtuoso with a restless imagination, flips between art, music, and machining, tends to procrastinate on paperwork, thrives on spontaneous creativity, and dreams
    of turning their workshop into a community‑centric design hub while they weave technical skill with artistic flair.
background:
  cultural: Rodney was raised in a tight‑knit African‑American community in South Florida, where his family’s roots trace back to the Great Migration and later Caribbean connections through extended relatives.
    The vibrant multicultural environment of Fort Lauderdale—mixing Afro‑Caribbean rhythm, Southern cuisine, and a growing arts scene—has shaped his worldview. He grew up celebrating Juneteenth, listening
    to funk, jazz, reggae, and hip‑hop, and participating in community block parties and church gatherings that emphasize collective support and celebration of heritage. This cultural mosaic informs his
    collaborative spirit, his love for rhythmic music, his appreciation for visual art, and his desire to give back through mentorship and community‑focused projects.
attributes:
