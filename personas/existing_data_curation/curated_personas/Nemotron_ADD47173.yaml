  hobbies: '[''Hip-Hop Dance'', ''Community Theatre'', ''Volleyball'', ''Book Club'', ''Cooking Southern Soul Food'', ''Volunteer Tutoring'', ''Urban Gardening'', ''Live Music Events'', ''Travel'', ''Digital
    Content Creation'']'
  career_goals: Yasmin aims to become a lead teacher and eventually a curriculum specialist within Clark County School District, focusing on STEM integration for elementary learners. She plans to earn a
    bachelor's degree in Education to qualify for an instructional coach role, where she can influence district‑wide teaching practices. She also hopes to launch an after‑school mentorship program that
    pairs high‑achieving students with community volunteers, positioning herself as a candidate for Teacher of the Year and, long‑term, a school administrator who champions equity and innovation.
