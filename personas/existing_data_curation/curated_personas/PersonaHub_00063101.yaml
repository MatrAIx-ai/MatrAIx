persona_description: A graduate student in Electrical and Computer Engineering at the University of Tennessee (TTU), Chenhui Liu, is working on a U.S Provisional Patent Application for a non-contact touch
  screen control system that allows for touch-free operation of smartphones. He has built and tested a prototype and is currently designing the whole system into an integrated chip. The system leverages
  the resonant frequency from wireless power transfer (WPT) coils and a Colpitt's oscillator to enable non-contact interaction. Liu's expertise lies in the field of non-contact touch screen control, and
  his work could have significant implications for the smartphone industry.
