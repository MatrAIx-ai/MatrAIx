personas:
  professional: Wha Yang is a budding junior builder who spends afternoons constructing intricate LEGO structures, applying their curiosity and methodical planning to experiment with design concepts while
    they reliably follow step‑by‑step instructions.
  sports: Wha Yang is an enthusiastic participant in their after‑school dance class and a regular member of the local Kids' Soccer League, cheering for the nearby professional team the Seattle Sounders
    while they balance energetic play with calm puzzle time.
  arts: Wha Yang loves drawing colorful scenes inspired by picture books like Dr. Seuss's 'The Cat in the Hat' and the animated film 'Frozen', often humming the soundtrack by Robert Lopez while they craft
    paper lanterns during cultural celebrations.
  travel: Wha Yang enjoys short family trips to the nearby aquarium and a weekend camping adventure in the state park, and dreams of visiting the Eiffel Tower in Paris and the giant pandas at Chengdu Research
    Base when they grow older while they imagine the adventures within the pages of their picture books.
  culinary: Wha Yang prefers simple meals such as buttery macaroni and cheese, chicken nuggets, and fresh apple slices, can butter a slice of toast all by themselves, and delights in helping stir the batter
    for homemade banana pancakes on weekend mornings while they proudly serve the finished pancakes to family.
  core: Wha Yang blends a meticulous curiosity with gentle kindness, turning everyday LEGO builds, dance steps, and lantern crafts into tiny masterpieces while they occasionally forget to tidy up their
    puzzle pieces.
background:
  cultural: Wha comes from an East Asian family that has settled in Houston. At home, Mandarin (or another East Asian language) is spoken alongside English, and she celebrates traditional holidays such
    as Lunar New Year with family gatherings, lantern decorations, and dumpling making. Her parents emphasize respect for elders, academic diligence, and communal harmony, values that shape her cooperative
    and considerate nature. The vibrant Asian community in Houston provides her with opportunities to attend cultural festivals and weekend language classes, enriching her connection to her heritage while
    also integrating into the broader Texan environment.
