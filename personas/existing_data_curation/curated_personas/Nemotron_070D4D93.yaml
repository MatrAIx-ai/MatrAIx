  career_goals: Alyssa dreams of becoming a veterinarian one day, combining her love for animals with her scientific curiosity. She is fascinated by how living creatures function and hopes to help both
    pets and wildlife stay healthy. In the longer term, she also imagines working in wildlife conservation, using her knowledge of biology and her caring nature to protect the environment.
