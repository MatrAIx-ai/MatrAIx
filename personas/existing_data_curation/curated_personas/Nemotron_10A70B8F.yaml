  career_goals: Although officially retired, Michael aims to stay active and valued within his community. He plans to volunteer as a mentor at the local senior center, sharing his DIY knowledge with younger
    residents. He also hopes to launch a small side venture selling handcrafted wooden furniture to supplement his pension and keep his hands busy. Maintaining his health and mental sharpness through regular
    social engagements and occasional part‑time consulting for local home‑improvement projects are also top priorities.
