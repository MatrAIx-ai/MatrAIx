persona_description: A historian or academic researcher who specializes in the study of labor history, particularly focusing on the experiences and strategies of working-class families during the late 19th
  and early 20th centuries. They are interested in exploring the roles of women and mothers in survival strategies, the narratives constructed by ethnic groups in cross-gender strikes, and the rise of craft
  unionism in the early American Federation of Labor. They also have a keen interest in the intersection of gender, class, and craft unionism, and the experiences of working-class men and women during the
  Industrial Revolution. They are likely to be interested in studying the experiences and strategies of working-class families during the late 19th and early 20th centuries, and the role of gender, class,
  and craft unionism in shaping these experiences.
