personas:
  professional: Dylan Surber, a retired handyman with decades of DIY experience, now channels their practical know‑how into volunteer projects at the senior center and mentoring neighbors, preferring a
    flexible routine that lets them tackle each repair as it arises while keeping the community garden thriving.
  sports: Dylan Surber, a fan of the Miami Dolphins and the Tampa Bay Rays, they join a senior walking club for daily neighborhood strolls, cast occasional lines at Lake Okeechobee, and play a weekly round
    of miniature golf at the community course, balancing low‑impact activity with their love of the outdoors.
  arts: Dylan Surber, an enthusiast of classic cinema and 60s‑70s rock, they watch 'Casablanca' and 'The Godfather' on Sunday afternoons, spin The Beatles, Led Zeppelin, and The Rolling Stones on their
    vintage record player, and attend quarterly performances at the local community theater, letting music and film color their evenings.
  travel: Dylan Surber, favoring short, low‑key road trips, they plan spontaneous weekend getaways to Florida’s natural parks such as the Everglades and Ocala National Forest, enjoy the relaxed vibe of
    small‑town festivals in St. Augustine, and balance travel with a fixed budget that leaves room for occasional splurges on fresh seafood meals.
  culinary: Dylan Surber, a modest home chef, they delight in grilling fresh‑caught fish with lemon‑dill sauce, simmering garden vegetable ratatouille, and baking key‑lime pie using home‑grown lime zest,
    preferring simple, nourishing dishes that showcase herbs like basil and oregano from their own garden.
  core: Dylan Surber, a pragmatic retiree who worries about the little things, they find solace in tinkering, gardening, and classic rock while carefully balancing a modest budget and a flexible daily routine.
background:
  cultural: Dylan is a white American raised in a modest Midwestern town before moving to Central Florida in his early adulthood. He grew up in a Protestant, family‑centered environment that valued self‑reliance,
    community involvement, and simple pleasures. Living in Kissimmee, he blends the friendly, multicultural vibe of the region with his own traditions of Sunday church attendance, backyard gatherings, and
    a pragmatic, hands‑on approach to everyday life.
