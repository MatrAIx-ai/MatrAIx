personas:
  professional: Rosa Taylor is an aspiring freelance digital content creator; they merge self‑taught HTML/CSS coding with digital illustration in Canva and Procreate to produce websites and multimedia stories
    that amplify the everyday experiences of youth in their South Side neighborhood, applying meticulous organization and a preference for solitary focus to meet deadlines while staying true to community‑driven
    values.
  sports: Rosa Taylor maintains fitness through solo lakefront jogs and weekend pick‑up basketball with the South Side Youth Basketball League; they cheer on the Chicago Bulls and Cubs while preferring
    the quiet rhythm of their own steps over crowded gyms.
  arts: Rosa Taylor spends evenings sketching cityscapes while listening to Kamasi Washington’s jazz, Erykah Badu’s neo‑soul, and classic hip‑hop from A Tribe Called Quest; they draw inspiration from graphic
    novels like Monstress and contemporary storytellers such as Angie Thomas, weaving these influences into their digital illustrations.
  travel: Rosa Taylor favors low‑cost day trips by train to cultural sites like Detroit’s Motown Museum and Milwaukee’s lakefront; they dream of a future pilgrimage to New Orleans for its jazz heritage
    and a backpacking adventure through historic Southern towns.
  culinary: Rosa Taylor enjoys preparing comfort meals such as collard greens sautéed with smoked turkey, sweet‑potato pie, and deep‑dish pizza topped with caramelized onions; they often experiment with
    smoked paprika and cayenne, though their cooking remains at a confident home‑cook level.
  core: Rosa Taylor is a solitary, curiosity‑driven teen who channels disciplined budgeting and meditative walks into vivid digital art that amplifies neighborhood voices; they quietly battle occasional
    anxiety and an unstoppable urge to redesign every webpage they encounter.
background:
  cultural: Rosa is a Black teenager raised on Chicago's South Side, deeply connected to her African American heritage and the city's rich cultural tapestry. Her family places a strong emphasis on community,
    church gatherings, and storytelling, which fostered her love for literature and music. She grew up surrounded by the legacy of Chicago blues, jazz, and the vibrant hip‑hop scene, often attending local
    festivals and block parties. Community centers and the public library have been pivotal in providing her with creative workshops and mentorship programs, reinforcing values of resilience, mutual support,
    and collective advancement. These experiences shape her identity and inspire her aspirations to give back to the same neighborhoods that nurtured her.
attributes:
  skills: '[''Basic HTML/CSS'', ''Digital illustration (Canva, Procreate)'', ''Sketching and charcoal drawing'', ''Creative writing and journaling'', ''Time management and self‑organization'', ''Basic budgeting
    and financial planning'', ''Community outreach and peer mentoring'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration (Canva, Procreate)'', ''Reading contemporary African American literature and graphic novels'', ''Journaling and creative writing'', ''Listening
    to jazz, neo‑soul, and classic hip‑hop'', ''Exploring Chicago parks and lakefront'', ''Learning basic web development (HTML/CSS)'', ''Meditation and mindfulness walks'']'
  career_goals: Rosa aims to earn her GED within the next year and enroll in a community‑college program focused on graphic design and web development. She envisions a career as a freelance digital content
    creator, producing artwork, website designs, and multimedia stories that highlight the experiences of Black youth in Chicago. Long‑term, she hopes to launch a mentorship initiative that provides tech‑and‑art
    workshops for under‑served teens in her neighborhood, combining her creative talents with a desire for community impact. While she values creative freedom, she also seeks a stable income that can support
    her family and future educational goals.
