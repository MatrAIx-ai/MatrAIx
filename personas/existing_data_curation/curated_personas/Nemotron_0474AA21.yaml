  hobbies: '[''Gardening'', ''Quilting'', ''Historical Fiction Reading'', ''Bird Watching'', ''Kayaking'', ''Cooking'', ''Community Theater Volunteering'']'
  career_goals: Celina aims to transition into a district curriculum coordinator role where she can shape instructional strategies across multiple schools. She aspires to lead a district‑wide STEAM initiative
    that emphasizes hands‑on learning and rigorous assessment. Pursuing an advanced certification in educational leadership is also on her agenda, with the long‑term ambition of becoming a principal who
    balances structured schoolwide policies with the flexibility to meet individual student needs. Celina is driven to earn recognitions such as the Florida Teacher of the Year award, reflecting her competitive
    spirit and commitment to professional excellence.
