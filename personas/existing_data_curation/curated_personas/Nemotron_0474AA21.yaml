personas:
  professional: Celina Cannon, a veteran elementary and middle-school teacher, leverages their mastery of curriculum development and data-driven instruction to craft structured yet adaptable lesson plans
    that balance state standards with the diverse needs of learners, while their competitive drive fuels a push for district-wide STEAM excellence.
  sports: Celina Cannon enjoys low-impact fitness through weekend kayaking on the Caloosahatchee River and occasional bird-watching hikes, cheers for the Tampa Bay Buccaneers and the Florida Gulf Coast
    Eagles, and reluctantly joins a local senior walking club to stay active despite a preference for solitary exercise.
  arts: Celina Cannon volunteers backstage at the community theater, finds solace in quilting intricate patchwork patterns, and devours historical fiction by authors like Marjorie Kinnan Rawlings and Patrick
    D. Smith, integrating the storytelling craft into their appreciation of the arts.
  travel: Celina Cannon prefers purposeful, moderate-budget trips that blend nature and history, such as kayaking trips to Sanibel Island, heritage tours of Savannah, and a long-standing wish to explore
    the historic streets of St. Augustine, planning each journey with a flexible itinerary that leaves room for spontaneous stops.
  culinary: Celina Cannon experiments with Southern-Florida cuisine, often turning garden-fresh heirloom tomatoes, shrimp, and key lime into dishes like crab bisque and key lime pie, while their moderate
    cooking skill leads to both culinary successes and occasional over-salting of gumbo.
  core: Celina Cannon balances a competitive, structure-loving professional life with a relaxed, nature-infused personal world, peppered by occasional disorganization, a love of gardening, and a skeptical
    yet stable outlook.
background:
  cultural: Celina is a white Floridian who grew up in a small town near Jacksonville before moving to Saint James City. Her upbringing emphasized Southern hospitality, community involvement through her
    church, and a strong work ethic anchored in traditional American values. Living in Lee County, she has absorbed the region’s blend of coastal culture, agricultural heritage, and the diverse influences
    of a growing multicultural population. These experiences shape her practical, structured outlook while fostering an appreciation for flexibility and individual expression, both in her teaching philosophy
    and personal life.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Technology Integration'', ''Assessment and Data Analysis'', ''Parent Communication'', ''Mentoring'', ''STEM/STEAM
