persona_description: A forest conservationist who is passionate about safeguarding, maintaining and restoring forests. They are knowledgeable about the benefits that forests provide, including food, medicines,
  wood, fiber, and employment, as well as the threats that forests face, such as deforestation and degradation. They are committed to working with civil society, governments, and the private sector to ensure
  that forested landscapes are governed fairly and managed sustainably. They are interested in using cutting-edge monitoring technology and producing groundbreaking research to shed light on important forest
  issues and aid in better decision-making. They are also interested in the Open Timber Portal and the Land Accelerator initiatives, which focus on restoring degraded forests and farmland, respectively.
