personas:
  professional: Abel Dattoli is a seasoned automotive service technician with four decades of expertise in diagnosing complex engine and electronic issues, performing hybrid and electric vehicle repairs,
    and managing workshop operations, and they channel their curiosity and disciplined organization into meticulous diagnostics and mentorship of apprentices.
  sports: Abel Dattoli is an avid fan of the Los Angeles Dodgers and the Anaheim Ducks, plays in the Orange County Senior Softball League each spring, hikes with the Southern California Mountain Club on
    weekends, and they keep fit through regular cardio walks and occasional yoga sessions to support joint health.
  arts: Abel Dattoli immerses themselves in automotive-themed painting inspired by James Gurney's vivid realism, regularly visits LACMA and the Orange County Museum of Art to explore contemporary installations,
    and they enjoy listening to Carlos Santana and reading Pablo Neruda's poetry, which fuel both their creative process and love for cultural expression.
  travel: Abel Dattoli meticulously plans road trips along the Pacific Coast Highway, has toured the Toyota Automobile Museum in Nagoya and the Goodwood Festival of Speed in England, enjoys weekend getaways
    to Catalina Island, and they balance travel ambitions with family commitments by arranging trips during school holidays.
  culinary: Abel Dattoli delights in cooking carnitas, tamales, and salsa verde with their wife using fresh tomatillos, chilies, and cilantro, experiments with smoking brisket in an electric smoker, and
    they often serve homemade aguas frescas or a cold cerveza alongside the meals.
  core: Abel Dattoli blends masterful automotive repair with an artist's eye, never misses a Saturday garage session, habitually jots down sketches on grease-stained napkins, and they occasionally forget
    to water their houseplants while chasing the perfect paint finish.
background:
  cultural: Abel’s Mexican heritage is a cornerstone of his identity. Born to parents who migrated from Michoacán, he grew up in a bilingual household where Spanish and English intertwined, and family gatherings
    were marked by music, storytelling, and traditional celebrations such as Día de los Muertos and Carnaval. The strong work ethic and communal spirit passed down from his parents influence his collaborative
    approach at work and his dedication to mentoring younger mechanics. He regularly incorporates Mexican culinary traditions into his family meals and participates in local cultural festivals in Orange
    County, where he volunteers to teach basic car care to community members, reflecting the Mexican value of ayudar (to help). His faith, rooted in Catholicism, also shapes his perspective on humility
    and service.
