  hobbies: '[''Automotive painting and illustration'', ''Car photography'', ''Classic‑car club participation'', ''Cooking Mexican cuisine'', ''Family DIY mechanical projects'', ''Hiking'', ''Attending art
    exhibitions'', ''Volunteer vehicle‑maintenance workshops'']'
  career_goals: Abel aims to achieve ASE Master Technician certification within the next two years, solidify his reputation as a go‑to expert for hybrid and electric vehicle repairs in Orange County, and
    eventually transition to a mentorship role by establishing a small boutique shop that offers high‑end restoration and custom work while providing apprenticeships for young mechanics. He also hopes to
    collaborate with local community colleges to design a hands‑on curriculum that bridges traditional automotive repair with emerging EV technology, and to organize an annual “Eco‑Auto Day” that showcases
    sustainable automotive practices to the community.
