  career_goals: Escarleth aims to advance into senior operations leadership within the next five years, targeting a role such as Operations Manager or Director of Operations at a technology‑driven company.
    She plans to earn PMP and Six Sigma Black Belt certifications and is considering an MBA with a focus on Business Analytics to deepen her strategic insight. Her long‑term ambition is to spearhead AI‑enabled
    automation projects that increase efficiency while fostering a resilient, adaptable team culture. She values a supportive work environment that acknowledges mental well‑being, and she hopes to mentor
    junior colleagues, champion diversity initiatives, and eventually launch a boutique consultancy that helps midsize firms streamline operations sustainably.
