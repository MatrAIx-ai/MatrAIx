  career_goals: 'Wanda aims to earn her GED within the next two years and then pursue a vocational pathway that offers clear, hands‑on work and stable income. She is leaning toward two options: becoming
    a Certified Nursing Assistant (CNA) to provide direct care in local healthcare settings, or enrolling in a culinary arts apprenticeship at a nearby community college to follow her passion for cooking.
    Long‑term, she dreams of opening a modest catering service focused on Southern African‑American comfort food, allowing her to combine her cooking skills with entrepreneurship while supporting her family
    financially.'
