personas:
  professional: Wanda Parker, a 17‑year‑old aspiring CNA or culinary apprentice, channels their routine‑driven, hands‑on mindset into caregiving and kitchen tasks, leveraging their knack for practical problem‑solving
    and small‑group mediation to excel in both patient support and recipe development.
  sports: Wanda Parker follows the hometown high school football team, roots for the local varsity basketball squad, and participates in a seasonal community soccer league, preferring short, high‑intensity
    pick‑up games that fit their competitive streak while maintaining a weekly jogging routine in the neighborhood park.
  arts: Wanda Parker immerses themselves in R&B legends like Aretha Franklin, soul artist Leon Bridges, and contemporary gospel choir Maverick City Music, reads urban fiction from authors like K. Mason,
    and finds inspiration for their crochet patterns and cupcake designs in the visual storytelling of Maya Angelou’s spoken‑word performances.
  travel: Wanda Parker dreams of a road‑trip to New Orleans to sample beignets and jazz, while their past weekend getaways include a family visit to Savannah’s historic squares and a spring hike in the
    nearby Blue Ridge foothills, favoring low‑cost, socially intimate travel experiences.
  culinary: Wanda Parker blends Southern comfort flavors—think buttery buttermilk biscuits, honey‑glazed peach cobbler, and spicy jambalaya—into their cupcake creations, showcasing a solid intermediate
    cooking skill set and a fondness for ingredients like fresh basil, hot sauce, and sweet potatoes.
  core: Wanda Parker balances a love for routine‑bound caregiving and culinary creativity with a competitive edge in gaming, a habit of saving pennies for future apprenticeships, and a quiet resilience
    that powers through occasional acne flare‑ups and last‑minute school projects.
background:
  cultural: Wanda grew up in a close‑knit African‑American family in Wilson, North Carolina. Her grandparents were part of the Great Migration, and family stories emphasize resilience, self‑reliance, and
    community support. The local Black church has been a central pillar in her life, where she learned gospel singing, values of service, and the importance of communal gatherings. Southern African‑American
    culinary traditions—fried chicken, collard greens, cornbread, and sweet potato pie—shape her cooking preferences. At the same time, she stays connected to contemporary Black culture through hip‑hop,
    R&B, and urban fashion. These cultural influences inform her identity, helping her balance respect for tradition with a modern, competitive spirit.
