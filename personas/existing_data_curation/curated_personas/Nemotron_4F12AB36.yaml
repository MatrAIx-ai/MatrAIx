  hobbies: '["Community basketball", "Gospel dance instruction", "Engine restoration", "Woodworking", "Southern cooking with modern twists", "Hosting potluck gatherings", "Reading mystery novels", "Fitness
    journaling"]'
  career_goals: Rasheen aims to earn a Fire Officer I certification within the next two years and advance to the rank of Battalion Chief, where she can shape training curricula and improve response protocols
    for her department. She plans to complete her GED and pursue an associate degree in Emergency Management to broaden her strategic perspective. Long‑term, she envisions establishing a regional fire‑prevention
    outreach program that targets underserved neighborhoods, leveraging her competitive drive to secure grant funding and build partnerships with local churches and civic groups. She also hopes to mentor
    younger firefighters, especially women of color, to diversify the field and promote leadership development.
