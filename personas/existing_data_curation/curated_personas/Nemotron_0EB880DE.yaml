  career_goals: Approaching retirement, Charles aims to shift from hands‑on repair work to a senior advisory role. He plans to obtain a Master Electrician license, develop a small consulting firm that offers
    safety audits and energy‑efficiency retrofits for local businesses, and formalize a mentorship program at his current utility to train the next generation of electricians. He is also interested in expanding
    his knowledge of renewable‑energy technologies to help his community transition to cleaner power sources.
