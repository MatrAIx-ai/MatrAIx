  career_goals: 'Although still early in life, Kathleen already imagines future careers that combine her love of hands‑on problem solving with tangible results. She is fascinated by how things fit together
    and often says she wants to become an engineer or architect when she grows up, dreaming of designing bridges or tall buildings. Her competitive nature fuels an ambition to win school science fairs and
    be the first in her class to master reading or math challenges. Kathleen also expresses an interest in becoming a scientist who conducts experiments, motivated by her desire to test ideas before accepting
    them. Underlying these goals is a practical mindset: she envisions a career where she can see the immediate impact of her work, preferring roles that produce concrete, observable outcomes.'
