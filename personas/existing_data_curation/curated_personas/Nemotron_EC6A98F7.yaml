personas:
  professional: Glenda Milisits, a licensed practical nurse with a flair for watercolor illustration, blends meticulous infection‑control and patient‑assessment expertise with an imaginative, art‑driven
    approach to health education—crafting vibrant diabetes handouts while navigating the fast‑paced clinical environment with a relaxed, sometimes disorganized, but deeply compassionate style.
  sports: Glenda Milisits, who chills on solitary hikes along the St. Clair River each autumn, supplements her cardio with weekend yoga sessions at a local studio and watches the Detroit Tigers on lazy
    evenings, but rarely joins organized team sports, preferring the quiet rhythm of nature over competitive leagues.
  arts: Glenda Milisits channels her love for botanical illustration into delicate watercolors inspired by the works of Georgia O'Keeffe, while ambient soundscapes by Brian Eno accompany her sketching sessions
    and her shelves are lined with vintage nursing artifacts and speculative fiction novels by Octavia Butler and philosophy texts by Albert Camus, shaping a creative sanctuary that fuels both her art and
    her empathic nursing practice.
  travel: Glenda Milisits favors low‑key solo travel, having trekked the shoreline of Lake Huron and explored the artful streets of Asheville, North Carolina, while dreaming of a quiet retreat in Iceland’s
    fjord‑filled countryside and a cultural pilgrimage to Kyoto’s cherry‑blossom gardens, planning each journey with a flexible itinerary that accommodates her nursing schedule and modest budget.
  culinary: Glenda Milisits, an amateur chef comfortable with a well‑stocked kitchen, often crafts nutrient‑dense meals such as roasted salmon with dill and beet‑root salad or a spicy lentil soup seasoned
    with cumin and turmeric, while occasionally indulging in comforting mac and cheese on stressful shifts, and she meticulously records each recipe in a hand‑bound journal alongside sketches of fresh herbs.
  core: Glenda Milisits is a 30‑year‑old LPN who blends clinical precision with watercolor imagination, thrives in solitary hikes, battles chronic anxiety with meditation, sometimes forgets to pay a bill,
    and spends weekends lost in speculative fiction and vintage nursing ephemera.
background:
  cultural: Glenda is a White American raised in Port Huron, Michigan, with German and Irish ancestry. Her family’s roots trace back to generations of shipyard and automotive workers who settled in the
    Great Lakes region, fostering a deep appreciation for hard work, community solidarity, and the natural beauty of the shoreline. Growing up in a modest, middle‑class household, she absorbed Midwestern
    values of practicality, humility, and a strong sense of civic responsibility. While she respects traditional customs, Glenda also embraces a broad, contemporary cultural palette, drawing inspiration
    from diverse artistic movements and global literature, which enriches both her professional practice and personal creativity.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound care", "IV therapy", "Diabetes education", "Patient advocacy", "Electronic medical record documentation", "Infection control", "Palliative
