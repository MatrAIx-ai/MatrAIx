  hobbies: '["Watercolor painting", "Botanical sketching", "Reading speculative fiction and philosophy", "Journaling", "Solo hikes along the St. Clair River", "Collecting vintage medical ephemera", "Mindfulness
    meditation", "Listening to ambient music while crafting", "Solving puzzles", "Playing narrative‑driven indie video games"]'
  career_goals: Glenda aims to complete a Bachelor of Science in Nursing within the next three years, eventually transitioning to a Registered Nurse role. She is pursuing certification in hospice and palliative
    nursing to deepen her expertise in compassionate end‑of‑life care. Long‑term, she envisions integrating art therapy techniques into community health programs in Port Huron, creating workshops that blend
    creative expression with mental‑health support. She also hopes to become a nurse educator, sharing her interdisciplinary approach with future nurses while maintaining a flexible schedule that protects
    her emotional well‑being.
