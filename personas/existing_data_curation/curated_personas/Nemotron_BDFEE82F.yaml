  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Cooking traditional Mexican cuisine'', ''Salsa dancing and community dance workshops'', ''Hiking in East Bay
    regional parks'', ''Volunteer work at a local cultural center'', ''Reading historical fiction'', ''Traveling to experience new cultures and foods'']'
  career_goals: Leyanis aims to progress to a senior audit manager or director of finance position within a midsize firm, while pursuing CPA certification if not already obtained. She aspires to eventually
    become CFO of a nonprofit dedicated to the arts, where she can merge her financial expertise with her love for culture. In the longer term, she envisions launching her own consultancy focused on ESG
    reporting and financial stewardship for culturally diverse organizations. Throughout her career advancement, she is committed to championing diversity by mentoring women and underrepresented professionals
    and to sharing her knowledge through part‑time teaching at a community college.
