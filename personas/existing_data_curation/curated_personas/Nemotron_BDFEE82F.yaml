personas:
  professional: Leyanis Santiago, a senior audit manager renowned for weaving ESG analytics into risk‑based audits, leverages their bilingual fluency and collaborative spirit, and they mentor junior accountants,
    streamline processes, and bridge cultural gaps between Spanish‑speaking clients and U.S. regulatory frameworks.
  sports: Leyanis Santiago enjoys hiking with the East Bay Hiking Club, stays fit through weekly salsa and Zumba classes, and they follow the San Francisco Giants, Golden State Warriors, and San Jose Earthquakes,
    cheering them from a modest suburb balcony while occasionally joining a local recreational tennis league in the spring.
  arts: Leyanis Santiago, an avid gallery‑goer and watercolor sketcher, finds inspiration in the works of Frida Kahlo, Diego Rivera, and renowned muralists celebrated for vibrant frescoes, and they fuel
    their cultural curiosity with music from Carlos Santana, Lila Downs, and the soulful ballads of Chavela Vargas, while regularly attending performances at the local cultural center.
  travel: Leyanis Santiago, a curious traveler with a penchant for culinary immersion, has explored Oaxaca’s bustling markets, wandered the historic streets of Barcelona, and trekked the red rocks of Sedona,
    and they dream of a future pilgrimage to Machu Picchu and a serene retreat in Kyoto, balancing adventure with family commitments and a modest travel budget.
  culinary: Leyanis Santiago, a seasoned home cook, delights in preparing mole poblano, chiles en nogada, and homemade tamales, meticulously selecting fresh corn masa, dried chilies, and Oaxaca cheese,
    and they often pair their meals with artisanal mezcal while experimenting with occasional Mediterranean recipes during weekend brunches.
  core: Leyanis Santiago blends rigorous financial expertise with a vibrant love for cultural traditions, energizing workplaces with salsa rhythms, yet they sometimes lose track of time perfecting new recipes,
    leading to late‑night inbox bursts.
background:
  cultural: Leyanis was raised in a bilingual household by parents who emigrated from Jalisco, Mexico, and she carries a deep appreciation for Mexican traditions such as Día de los Muertos, quinceañeras,
    and communal cooking. Growing up in Southern California, she learned to navigate both her Mexican heritage and mainstream American culture, fostering values of family unity, communal responsibility,
    and respect for diverse perspectives. In San Ramon, she participates in a vibrant Latino professional network and volunteers with a local cultural association that celebrates Mexican art, music, and
    cuisine. Her dual cultural lens informs her collaborative work style, her commitment to community service, and her love for sharing Mexican culinary delights with friends and colleagues.
attributes:
  skills: '[''Financial accounting'', ''External and internal auditing'', ''Tax preparation and compliance'', ''US GAAP and IFRS knowledge'', ''Advanced Excel modeling'', ''Power BI data visualization'',
