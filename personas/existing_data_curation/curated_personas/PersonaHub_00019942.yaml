persona_description: A policy analyst who is interested in the educational system and the impact of various educational programs on students' academic and career outcomes. They are looking for information
  on the GED credential, its value in terms of labor market outcomes, and its potential to induce students to drop out of school. They are interested in the academic literature on the GED and its limitations
  in terms of providing a path to post-secondary credentials for dropouts. They are also interested in the distortion of social statistics by the GED testing program and its potential to induce students
  to drop out of school.
