persona_description: A concerned educator who is critical of the secrecy surrounding multiple-choice tests and advocates for the development of a large, publicly available data base of reviewed and signed
  problems in a wide variety of school subject areas. This individual believes that teacher preparation in student assessment is inadequate and recommends that the standards for teacher competence in this
  area be incorporated into future teacher-training and certification programs. This person is part of a coalition advocating for the ban of standardized testing in the early grades in New York State and
  has released a guide for parents explaining the rights of test takers and discussing some alternatives to traditional multiple-choice tests.
