persona_description: A computer science professor who specializes in the development of computer algorithms for image processing and computer vision, particularly those related to image reconstruction and
  city modeling. His research interests include, but are not limited to, the use of large digital photo collections, the development of algorithms for city reconstruction, and the integration of these algorithms
  with online maps and virtual reality technologies. He has published several papers on these topics and has been awarded several grants from the National Science Foundation and the Office of Naval Research.
  He is also a member of the Association for Computing Machinery and the International Computer Vision Association.
