personas:
  professional: Ilania Fernandez is a 20‑year‑old bartender in the Pacific Northwest who blends Mexican spirits with local botanicals, uses their bilingual fluency to serve a diverse crowd, and they channel
    their competitive curiosity into craft‑cocktail competitions, even as their relaxed approach to obligations sometimes leaves inventory spreadsheets a bit chaotic.
  sports: Ilania Fernandez finds balance on the trails of the Columbia River Gorge, joining the local Columbia Gorge Trail Collective for weekend hikes, practicing sunrise yoga on the beach, and they cheer
    on the Seattle Seahawks during football season while preferring solo or small‑group outdoor activity over organized team sports.
  arts: Ilania Fernandez curates a vintage vinyl trove featuring folk legends like Joni Mitchell and indie darlings such as Fleet Foxes, pairs their melodies with nature photography sessions in the gorge,
    and they draw inspiration from the melancholy strains of Sufjan Stevens when experimenting with new cocktail flavor profiles.
  travel: Ilania Fernandez plans getaways with a loose itinerary, enjoying spontaneous weekend road trips to the Oregon Coast, dreaming of a culinary pilgrimage to Oaxaca’s markets, and they occasionally
    unpack a backpack for a solo hike in Canada’s Vancouver Island rainforest.
  culinary: Ilania Fernandez cooks with a confident blend of Mexican and Pacific Northwest flavors, perfecting dishes like chipotle‑smoked salmon tacos and rosemary‑infused mezcal sours, while they tend
    a herb garden of cilantro, oregano, and sage to garnish creations, and they often experiment with homemade mole using local honey and smoked paprika.
  core: Ilania Fernandez is a solitary, competition‑driven mixology enthusiast who channels chronic worry into meticulous cocktail craft, yet they regularly misplace their planner in the hunt for the perfect
    herb garnish.
background:
  cultural: Ilania is a Mexican‑American who grew up speaking Spanish at home and celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade Mexican
    cuisine. Her mother taught her to prepare foods like tamales, mole, and fresh salsas, which she now incorporates into her cocktail creations, using mezcal, tequila, and locally sourced ingredients.
    Living in White Salmon, WA, she blends her Mexican heritage with the Pacific Northwest lifestyle, navigating a bicultural identity that informs her taste, work ethic, and community involvement. Her
    bilingual ability and cultural pride help her connect with a wide range of patrons, and she values preserving her family's culinary customs while adapting them to her current environment.
