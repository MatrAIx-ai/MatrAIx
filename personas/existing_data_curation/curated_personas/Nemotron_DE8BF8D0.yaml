  hobbies: '[''hiking'', ''nature photography'', ''yoga'', ''reading mystery novels'', ''experimental cooking (Mexican and fusion)'', ''herb gardening'', ''listening to folk and indie music'', ''collecting
    vintage vinyl records'', ''volunteering at local cultural festivals'']'
  career_goals: Ilania aims to earn a certified mixologist credential and eventually become a beverage director at a high‑profile restaurant or bar. She dreams of opening her own boutique bar that showcases
    a fusion of Mexican flavor profiles with Pacific Northwest ingredients, offering a unique, locally sourced cocktail menu. Competitive by nature, she plans to enter regional cocktail competitions to
    build her reputation. Long‑term, she hopes to mentor younger bartenders, develop a more organized work routine to reduce stress, and possibly pursue a hospitality management degree to solidify her leadership
    skills.
