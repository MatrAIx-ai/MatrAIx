  hobbies: '[''sketching'', ''graffiti art'', ''digital video editing'', ''hip‑hop and R&B listening'', ''improvisational dance'', ''basketball'', ''nature photography'', ''church choir participation'',
    ''open‑mic performances'', ''collecting graphic novels'']'
  career_goals: Marlus aims to earn his GED within the next two years and then enroll in a vocational program focused on graphic design or multimedia production at a nearby community college. He dreams
    of turning his passion for visual storytelling into a career as a digital illustrator, content creator, or independent music video director, eventually building an online brand that highlights African‑American
    culture and community life in rural Virginia. He also hopes to give back by mentoring younger neighborhood kids, using his art and communication skills to inspire them toward creative pursuits and educational
    goals.
