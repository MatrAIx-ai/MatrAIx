persona_description: A scientist or researcher with expertise in tick-borne diseases, particularly Lyme disease, Rocky Mountain spotted fever, and Tularemia. They are likely to be familiar with the anatomy
  and biology of ticks, as well as the pathogenic mechanisms of the diseases they transmit. They may have a background in virology, immunology, or microbiology, and may have conducted research on tick-borne
  pathogens or have published articles on the topic. They may also have experience working with microscopy and scanning electron microscopy, and may have a deep understanding of the role of ticks in the
  transmission of diseases.
