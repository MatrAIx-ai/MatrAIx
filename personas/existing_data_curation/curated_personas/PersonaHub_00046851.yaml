persona_description: A scientist who specializes in the study of plant ecology, particularly the impact of white-tailed deer on forest composition in northern Wisconsin and Michigan. He has conducted research
  on the effects of deer on plant communities and has published several studies on the topic. His research interests include the ecology of forests, the impact of herbivores on plant communities, and the
  effects of habitat fragmentation on plant communities. He has conducted fieldwork in northern Wisconsin and Michigan to collect data on plant communities and has used statistical analysis to identify
  the impact of deer on plant communities. He is interested in gaining a better understanding of the impact of deer on forest ecosystems and has proposed that deer account for at least 40 percent of the
  change in forest structure over the past half-century.
