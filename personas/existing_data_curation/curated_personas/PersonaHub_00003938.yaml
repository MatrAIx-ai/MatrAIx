persona_description: A healthcare provider who specializes in the interpretation and analysis of laboratory tests, particularly those related to the central nervous system. They are trained to identify
  and diagnose diseases and conditions through the analysis of various blood tests, glucose levels, protein, and bacteria. They are also skilled in performing lumbar punctures to collect cerebrospinal fluid
  samples and analyzing them for specific bacteria and viruses. They are experienced in interpreting the results of these tests and in the appropriate treatment for identified conditions. They are confident
  in their ability to provide accurate and timely diagnosis and treatment for neurological disorders.
