personas:
  professional: Angel Mora is a seasoned sales operations leader whose decade‑long experience supervising non‑retail teams is fused with a designer’s eye for abstraction, allowing them to craft data‑driven
    strategies in Salesforce that feel like brushstrokes, while their bilingual fluency and calm resilience make them a persuasive negotiator and mentor for underrepresented talent.
  sports: Angel Mora fuels fitness through sunrise yoga on the Santa Monica beach, weekend hikes up the Santa Monica Mountains, and lively salsa dancing at a local studio, while cheering for the Los Angeles
    Lakers during basketball season and occasionally joining a co‑ed adult volleyball league.
  arts: Angel Mora channels imaginative energy into oil paintings that blend vibrant folk‑art motifs with Salvador Dalí‑esque surreal twists, writes flash fiction echoing the lyricism of Ocean Vuong, and
    regularly visits exhibitions by Yayoi Kusama, while their evenings often feature listening to Carlos Santana’s vibrações and attending downtown Los Angeles gallery openings.
  travel: Angel Mora curates trips with a blend of meticulous itineraries and spontaneous detours, preferring sunrise hikes in Big Sur, weekend art‑focused retreats in Oaxaca, and immersive studio tours
    in Kyoto, while budgeting carefully to keep a dedicated travel account for future pilgrimages to Barcelona’s Gaudí masterpieces.
  culinary: Angel Mora delights in cooking a complex mole sauce with toasted chilies, almonds, and a hint of chocolate, while also mastering a garlic‑infused shrimp sauté topped with avocado‑lime salsa,
    and they often blend these flavors into weekend dinner parties where fresh cilantro and roasted corn are staples.
  core: Angel Mora is a creatively disciplined strategist who paints strategic plans with the same bold strokes as their oil canvases, but secretly hoards polymer‑based paint tubes and can’t resist a late‑night
    espresso while reviewing Salesforce dashboards.
background:
  cultural: Angel is a first‑generation Mexican‑American who grew up in a bilingual household in Los Angeles. Her family traditions, such as celebrating Día de los Muertos and enjoying regional Mexican
    cuisine, have instilled a deep appreciation for heritage and community. While she embraces the vibrant, multicultural tapestry of Southern California, she also retains strong ties to Mexican artistic
    expressions—drawing inspiration from artists like Frida Kahlo and José Guadalupe Posada. This dual cultural lens shapes her worldview, informing both her professional empathy and her creative pursuits.
