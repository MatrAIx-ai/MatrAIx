  career_goals: Angel aims to transition into a senior operational role such as Director of Sales Operations, where she can champion innovative sales methodologies that fuse analytical rigor with artistic
    creativity. She seeks to spearhead diversity and inclusion initiatives, establishing mentorship programs for women and underrepresented groups in the corporate sales arena. Long‑term, she envisions
    launching a consultancy that helps organizations embed creative thinking into their sales strategies, leveraging her imaginative mindset and leadership experience.
