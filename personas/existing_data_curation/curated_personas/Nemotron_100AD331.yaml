personas:
  professional: Alicia Jones, a seasoned nursing assistant with a reputation for meticulous vital sign documentation and assertive mentorship, leverages their structured approach and compassion to lead
    shift-supervisor initiatives while pursuing LPN certification.
  sports: Alicia Jones enjoys hiking the Wasatch trails, practices gentle yoga twice weekly, and backs the Utah Jazz and Real Salt Lake, often joining a local senior walking club that meets at the Tooele
    County Fairgrounds after weekend camping trips.
  arts: Alicia Jones finds creative refuge in quilting, drawing inspiration from Jane Olson's patterns while immersing themselves in historical fiction by Philippa Gregory and mysteries by Tana French,
    and they regularly attend performances at the Utah Symphony and local community theater.
  travel: Alicia Jones favors meticulously planned family road trips to national parks like Yellowstone and Zion, while dreaming of a leisurely cruise along the Norwegian fjords, balancing their love of
    nature with the need to schedule visits around nursing shifts and LPN coursework.
  culinary: Alicia Jones relishes cooking farm-to-table meals using garden-grown tomatoes, bell peppers, and squash, perfecting dishes such as roasted vegetable ratatouille, salsa verde, and fresh garden
    salads with feta, and they frequently experiment with home-canning to preserve the harvest.
  core: Alicia Jones blends disciplined organization with a love of the outdoors, juggling nursing ambitions, quilting projects, and a garden, though they sometimes procrastinate on paperwork and forget
    to schedule their own doctor visits.
background:
  cultural: Alicia grew up as a white American in the small‑town environment of Tooele, Utah, where community ties and a modest, self‑reliant lifestyle are highly valued. Her family’s heritage includes
    Scandinavian and German roots, and she was raised with strong Christian (predominantly Latter‑Day Saints) cultural influences that emphasize family cohesion, service, and respect for tradition. The
    region’s outdoor culture and the local emphasis on volunteerism have shaped her love for hiking, gardening, and community service. Alicia’s worldview blends practical, structured thinking with a warm,
    compassionate approach to relationships, reflecting both the conservative work ethic of rural Utah and the inclusive, supportive spirit of her local community.
attributes:
  skills: '[''Patient care and assistance with activities of daily living (ADLs)'', ''Vital signs measurement and monitoring'', ''Basic wound care and dressing changes'', ''Infection control and hygiene
    protocols'', ''Electronic health record (EHR) documentation'', ''Medication assistance under supervision'', ''Mobility support including transfers and ambulation'', ''Patient and family communication'',
    ''CPR and first aid certification'', ''Time management and task prioritization'', ''Conflict resolution and assertive communication'', ''Mentoring new CNA staff'']'
  hobbies: '[''Hiking and trail walking in the Wasatch Mountains'', ''Family camping trips'', ''Backyard vegetable gardening'', ''Quilting and crafting for charity'', ''Reading historical fiction and mystery
    novels'', ''Cooking healthy meals for family'', ''Volunteering at local church food pantry and senior visits'', ''Attending the Tooele County Fair and farmers markets'', ''Practicing yoga and mindfulness'']'
  career_goals: Alicia aims to advance her professional qualifications while preserving her family commitments. In the next two years she plans to earn a Licensed Practical Nurse (LPN) certification, using
    her current experience as a foundation. She aspires to complete an Associate’s Degree in Nursing within five years, ultimately becoming a Registered Nurse with a focus on geriatric and hospice care.
    Within her current facility, Alicia seeks a shift‑supervisor or lead CNA role where she can champion patient‑safety initiatives and mentor colleagues. She also hopes to obtain a Certified Nursing Assistant
    Trainer credential to contribute to the education of new staff. Throughout these pursuits, she values structured learning, practical application, and the balance between career growth and personal well‑being.
