  career_goals: Thiet aims to move into a senior supervisory role where she can oversee a shift, mentor younger workers, and lead continuous‑improvement projects. She hopes to earn a certification in industrial
    safety and eventually transition part‑time into a product design assistant role that blends her manufacturing knowledge with her artistic interests. In the longer term she envisions launching a small
    workshop selling handcrafted decorative pieces that reflect her cultural heritage.
