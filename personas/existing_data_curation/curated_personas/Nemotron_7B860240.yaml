  career_goals: Although approaching retirement, Rita remains driven to leave a lasting imprint on Los Angeles County’s infrastructure. She aims to champion the integration of resilient, sustainable design
    practices in ongoing and future municipal projects, advocating for green building standards such as LEED. Rita also aspires to formalize a mentorship program that pairs seasoned engineers with underrepresented
    young women entering STEM fields, thereby fostering the next generation of diverse engineering talent. In the coming years, she hopes to author a reflective memoir that chronicles her experiences as
    a woman in civil engineering during the late‑20th century, and to serve as a volunteer consultant for local community planning committees, ensuring that new developments reflect both safety and environmental
    stewardship.
