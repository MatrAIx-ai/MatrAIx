  career_goals: Dwayne aims to transition from full‑time on‑site work to a semi‑retired role where he can mentor the next generation of carpenters and launch a small consulting firm focused on preserving
    historic homes in Newberry County. He hopes to earn a master carpenter certification, develop a community workshop that offers free training to local youth, and become a certified building inspector
    to contribute to safer construction practices in his town. He also envisions writing a guidebook on traditional Southern carpentry techniques for both professionals and hobbyists.
