personas:
  professional: Dwayne Barrett, a seasoned carpenter with over four decades of hands‑on experience in residential remodeling, historic home restoration, and custom woodworking, channels their practical,
    structured mindset into meticulous blueprint interpretation and project budgeting while competitively mentoring apprentices and positioning themselves for a semi‑retired consulting role that safeguards
    local heritage.
  sports: Dwayne Barrett, an enthusiastic participant in the Newberry community center’s pickup basketball league and a devoted fan of the Carolina Panthers, blends their competitive nature with a disciplined
    fitness routine, while also joining weekends on Lake Murray for bass fishing and supporting local youth baseball through occasional coaching.
  arts: Dwayne Barrett, a lively member of his church choir who revels in gospel harmonies and the soulful sounds of artists like Aretha Franklin and James Brown, regularly attends local heritage tours
    and community theater productions, allowing the arts to enrich their social circles and inspire their woodworking designs.
  travel: Dwayne Barrett, a meticulous planner who prefers road trips that combine historic sites—such as the Charleston Historic District and Savannah’s riverfront—with relaxed fishing getaways to the
    Georgia coast, balances adventure with budget constraints by using a well‑maintained SUV and a modest travel fund.
  culinary: Dwayne Barrett, a self‑taught pitmaster, masters Southern barbecue by slow‑smoking pork ribs with a hickory‑infused rub of paprika, brown sugar, and garlic, while also growing fresh tomatoes
    and sweet potatoes in their garden for side dishes, though they occasionally over‑season their sauces in pursuit of the perfect flavor.
  core: Dwayne Barrett blends a structured, competitive work ethic with an outgoing, community‑centric lifestyle, juggling master carpentry, choir singing, basketball, and barbecue while mentoring the next
    generation and preserving Southern heritage.
background:
  cultural: Born and raised in the Black community of Newberry, South Carolina, Dwayne grew up with strong ties to family, church, and local traditions. His grandparents taught him the value of hard work
    and craftsmanship, passing down woodworking skills that later shaped his career. The cultural emphasis on community service and resilience, rooted in the civil‑rights era, has informed his dedication
    to mentoring youth and participating in volunteer projects. Southern hospitality, gospel music, and shared meals are central to his identity, as is a deep respect for the region’s history, particularly
    the preservation of historic Black neighborhoods and homes.
