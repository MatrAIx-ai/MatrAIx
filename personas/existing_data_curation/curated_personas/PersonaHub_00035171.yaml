persona_description: A prominent and accomplished lawyer and public servant, William Mulholland, who was a city attorney and served as city attorney for the City of Los Angeles, special counsel for the
  Los Angeles Municipal Water and Power Systems, and general counsel for the Metropolitan Water District of Southern California. Mulholland played a significant role in the construction of the Hoover Dam
  and Colorado River Aqueduct projects, and his expertise in water resources consulting and engineering led him to serve on various committees and projects related to water resources. Mulholland's leadership
  and expertise in water resources management and engineering are likely to be of interest to those in the fields of water resources engineering, public administration, and policy analysis.
