  hobbies: '[''Watercolor painting'', ''Collecting Mexican folk art'', ''Gardening (herbs and vegetables)'', ''Cooking traditional Mexican dishes'', ''Reading historical fiction and biographies'', ''Genealogy
    research'', ''Community dance workshops'', ''Volunteering at senior center arts programs'', ''Attending museum exhibitions'']'
  career_goals: Although retired from formal employment, Emma remains driven to contribute to her community and preserve her cultural heritage. She aims to establish a monthly multicultural art circle at
    the local senior center where participants can create and discuss artwork while sharing stories from their backgrounds. She also hopes to compile a family oral-history book documenting three generations
    of Mexican-American experiences, and to lead a community garden project that features herbs and vegetables used in traditional Mexican recipes. Emma plans to take a few community-college classes in
    watercolor painting to deepen her own practice, and eventually serve as a cultural ambassador for the Collinsville Hispanic heritage council, organizing celebrations such as Día de los Muertos and Mexican
    Independence Day.
