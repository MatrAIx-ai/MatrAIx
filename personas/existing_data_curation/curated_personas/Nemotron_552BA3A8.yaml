  hobbies: '[''Gardening (heirloom vegetables and flowers)'', ''Book club (historical fiction and memoirs)'', ''Community theater involvement'', ''Senior center crafts workshops'', ''Hiking in state parks'',
    ''Experimental cooking and recipe development'', ''Folk dancing'', ''DIY home projects'']'
  career_goals: Erin aims to transition her extensive community‑organizing experience into a part‑time role as a program coordinator at the local community center, while also pursuing a small home‑based
    catering service that showcases her culinary talents. She plans to complete a certification in home health aide to support aging family members and to enroll in a community leadership workshop to strengthen
    her project‑management skills. These goals reflect her desire to blend curiosity about new ventures with the practical need for stable contributions to her family’s wellbeing.
