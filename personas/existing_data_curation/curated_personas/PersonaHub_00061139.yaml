persona_description: A linguist who specializes in the study of capitalization principles used in the A Course in Miracles, particularly in the capitalization of words associated with God, Christ, and the
  Holy Spirit. Their research interests include, but are not limited to, the evolution of Helen Schucman's style of capitalization, the exceptions made by Jesus, and the rules of capitalization established
  by Helen and the author. They are likely to be a knowledgeable and experienced linguist with a strong interest in the use of capitalization in religious texts.
