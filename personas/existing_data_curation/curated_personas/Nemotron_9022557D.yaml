  career_goals: Although still in early childhood, Maurice already vocalizes ambitious ideas that hint at future directions. He often says he wants to be a firefighter because he likes the bright trucks
    and the chance to help people, and he also mentions wanting to become a teacher so he can show others how to build with blocks. His competitive spirit surfaces during puzzle races, where he aims to
    be the first to finish, reflecting an early drive to excel and lead. Overall, his ambitions center around roles that combine practical problem‑solving, helping others, and opportunities to be recognized
    for achievement.
