personas:
  professional: Maurice Wood is a budding little engineer who spends hours meticulously arranging Lego bricks into precise structures, reflecting his early balance of curiosity and practicality, organized
    reliability, and methodical planning even in play.
  sports: Maurice Wood regularly participates in the neighborhood park’s toddler soccer circle on Saturdays, eagerly cheering for the Atlanta Falcons at home and practicing organized kick-and-run drills
    in the backyard, demonstrating a methodical approach to fitness that blends competitive spirit with the joy of simple play.
  arts: Maurice Wood often sings along to Raffi’s 'Baby Beluga', chants the 'Let It Go' chorus from Frozen, draws crayon pictures of dinosaurs during library story‑time featuring Mo Willems, and attends
    community theater performances, shaping a vivid creative identity through beloved children’s music, movies, and books.
  travel: Maurice Wood enjoys family road trips that involve long car rides with frequent rest stops where they can point out passing cows and mountains, recalling visits to the Georgia Aquarium, a weekend
    camping in the Great Smoky Mountains, and a magical week at Disney World in Orlando, preferring relaxed, sensory‑friendly experiences over hectic tourist itineraries.
  culinary: Maurice Wood favors cheesy macaroni, crispy chicken nuggets, and peanut‑butter‑banana sandwiches, proudly insisting on extra cheese and refusing broccoli, while occasionally surprising parents
    by arranging fruit slices into smiley faces, reflecting a budding, yet selective, culinary enthusiasm.
  core: Maurice Wood is a tiny tornado of curiosity, balancing methodical block‑building with competitive candy‑counting, yet often refuses vegetables and battles bedtime procrastination.
background:
  cultural: Maurice Michael Wood is an American white child raised in Stone Mountain, DeKalb County, Georgia, a suburban community on the outskirts of Atlanta. His family embraces the Southern cultural
    milieu, celebrating holidays such as the Fourth of July with community fireworks and participating in local church gatherings that emphasize hospitality, family, and community service. He regularly
    attends a neighborhood park and a public library story‑time, exposing him to a diverse array of books and activities. While his immediate cultural environment is largely middle‑class and reflects mainstream
    U.S. practices—such as valuing independence, punctuality, and respect for tradition—he also experiences the multicultural atmosphere of the Atlanta metro area, fostering an openness to different perspectives.
