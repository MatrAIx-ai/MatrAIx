  hobbies: '[''gardening'', ''visiting art galleries'', ''community theater'', ''reading historical fiction'', ''knitting'', ''senior book club'', ''genealogy research'', ''cooking new recipes'', ''walking'',
    ''short trips to Chicago museums'']'
  career_goals: Although retired, Julie aims to deepen her engagement with the arts by taking occasional art‑history courses at the community college, curating a small traveling exhibition of local senior
    artists, and documenting her family’s history in a memoir that blends genealogy with personal anecdotes. She also hopes to mentor younger volunteers at the senior center, maintain her health through
    regular walks along the Des Plaines River, and occasionally travel to nearby cities for museum visits, all while keeping a flexible schedule that respects her relaxed approach to obligations.
