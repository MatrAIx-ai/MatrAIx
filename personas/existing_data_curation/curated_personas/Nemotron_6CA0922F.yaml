  hobbies: '[''card games and bingo'', ''community dancing'', ''cooking and recipe sharing'', ''gardening'', ''knitting and crocheting'', ''listening to music (Chinese pop, jazz)'', ''watching classic movies'',
    ''attending cultural festivals and church services'']'
  career_goals: Although retired, Y aims to continue contributing to her community and family. She hopes to host regular cooking workshops at the senior center where she can pass on traditional recipes
    to younger participants. She wants to complete a short memoir of her life story to preserve her family’s heritage for future generations. Maintaining her health and independence is a top priority, as
    is staying physically active through daily walks and gentle yoga. Y also dreams of making a short trip back to her hometown in East Asia to reconnect with distant relatives and attend a cultural festival,
    should her health allow.
