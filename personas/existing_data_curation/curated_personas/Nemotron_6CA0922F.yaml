personas:
  professional: Y Shih is a retired community‑center organizer and lifelong home manager whose knack for meticulous budgeting, event coordination, and gentle mediation lets them keep senior‑center gatherings
    running smoothly while still experimenting with new crafts and cooking ideas.
  sports: Y Shih enjoys daily strolls around the neighborhood park, gentle yoga classes at the senior center, and cheering on the local minor‑league baseball team, the River City Runners, while occasionally
    joining community dance nights that double as low‑impact cardio.
  arts: Y Shih immerses themselves in classic pop melodies by Teresa Teng, smooth jazz from Ella Fitzgerald, and black‑and‑white cinema such as Casablanca, while regularly attending local cultural festivals
    and church choirs that let them sing along to hymns by Mahalia Jackson.
  travel: Y Shih prefers low‑key, well‑planned trips that balance nostalgia and practicality, having already visited their ancestral hometown abroad and dreaming of a gentle cruise to historic garden cities,
    yet they keep trips short and travel with family to remain safe.
  culinary: Y Shih delights in preparing dim sum‑style dumplings, braised pork belly, and festive moon‑shaped pastries, seasoning with soy, ginger, and star anise harvested from their garden, and while
    they can coax the perfect flaky crust, they sometimes over‑salt dishes when excited about sharing them.
  core: Y Shih is a curious, community‑focused 94‑year‑old who blends meticulous organization with spontaneous creativity, juggling garden herbs, knitting needles, and weekly bingo cards while occasionally
    misplacing their glasses.
background:
  cultural: Y was born to an East Asian family that immigrated to the United States in the mid‑20th century. She grew up speaking Mandarin at home while attending an English‑language school, which gave
    her a bicultural perspective. Traditional values such as respect for elders, harmony, and collective well‑being shaped her upbringing. She celebrates Lunar New Year, the Mid‑Autumn Festival, and other
    cultural holidays with family gatherings and special foods. At the same time, she has embraced American customs, participates in local community events in Elmwood Park, and enjoys a blend of East Asian
    and Mid‑western cultural practices.
attributes:
