personas:
  professional: A veteran graphic designer named Nicolas Collier channels over four decades of expertise in typography, layout, and illustration into methodical, deadline‑driven projects, mentoring junior
    creatives and shaping boutique studio work that foregrounds under‑represented cultural narratives for local non‑profits.
  sports: Nicolas Collier, a 63‑year‑old enthusiast, supports the Chicago Cubs and the Milwaukee Bucks, plays in a senior tennis league at the local community center, and walks his neighborhood streets
    five times a week, preferring low‑impact activities that fit their structured routine.
  arts: Nicolas Collier, a lifelong lover of visual and musical arts, curates neighborhood jazz nights featuring the smooth saxophone stylings of Kamasi Washington and the blues riffs of Buddy Guy, photographs
    street scenes in the style of Gordon Parks, and volunteers as a mentor for a youth art program where they guide budding illustrators through the works of Romare Bearden and Jacob Lawrence.
  travel: Nicolas Collier, an intentional traveler, has explored the historic streets of New Orleans during Mardi Gras, trekked the coastal dunes of Ghana’s Cape Coast to connect with diaspora history,
    and plans a serene pilgrimage to the Great Smoky Mountains’ fall foliage, always booking trips with a modest budget and a preference for cultural immersion over luxury.
  culinary: Nicolas Collier enjoys farm‑to‑table cooking, regularly tossing harvested kale, heirloom tomatoes, and sweet potatoes into a soulful jambalaya seasoned with smoked paprika and cayenne, while
    also delighting in weekend Sunday breakfasts of smoked salmon, avocado toast, and a dash of hot sauce, reflecting a balance of comfort food and health‑conscious experimentation.
  core: Nicolas Collier blends disciplined design mastery with a community‑first mindset, nurturing gardens, jazz, and mentorship while keeping life organized, generous, and quietly quirky.
background:
  cultural: Nicolas was raised in a close‑knit African‑American family in the Midwest, where church, music, and community gatherings played central roles. His cultural identity is reflected in his design
    aesthetic, which often incorporates bold colors, rhythmic patterns, and motifs inspired by African heritage and the rich tradition of Black artistic expression in Illinois. He maintains strong ties
    to the local Black community in East Peoria, participating in cultural festivals, church activities, and mentorship programs. His upbringing instilled a sense of responsibility to uplift his community,
    and this cultural grounding influences both his professional collaborations and his personal pursuits.
attributes:
