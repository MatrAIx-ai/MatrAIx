  hobbies: '["Gardening", "Reading African-American History", "Photography", "Attending Jazz/Blues Performances", "Woodworking", "Mentoring Youth in Art", "Community Event Organization"]'
  career_goals: Nicolas aims to transition into a mentorship‑focused role while maintaining selective freelance work that aligns with his values. He hopes to establish a small boutique studio that collaborates
    with local non‑profits and community organizations to amplify African‑American cultural narratives through design. Over the next few years, he plans to teach part‑time at a community college or adult
    education program, sharing his decades of experience. He also aspires to curate a regional exhibit showcasing visual stories of the Midwest Black experience, leveraging his design expertise to create
    compelling visual narratives.
