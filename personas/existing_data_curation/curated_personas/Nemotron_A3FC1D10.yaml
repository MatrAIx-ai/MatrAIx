personas:
  professional: Sonny Alvarez is a city courier in Tulsa who leverages rapid route‑planning, bilingual communication, and a calm‑under‑pressure mindset to consistently meet tight delivery windows, while
    simultaneously pursuing a GED and a logistics degree to move toward a dispatch coordinator role that blends organization with creative problem‑solving.
  sports: Sonny Alvarez plays for the Tulsa City Brawlers basketball league, joins pick‑up soccer games at the local park while cheering for the Oklahoma City Thunder and the Tulsa Roughnecks, and attends
    salsa dancing classes to stay fit and socially engaged.
  arts: Sonny Alvarez captures Tulsa’s vibrant murals—from Banksy‑style pieces to local graffiti by Cris Duran—while strumming Mexican folk songs by Lila Downs on guitar, indulging in graphic novels like
    Saga, and curating a visual blog that blends urban photography with the rhythms of independent film soundtracks.
  travel: Sonny Alvarez’s travel style mixes budget backpacking across the Southwest with purposeful trips to Mexico City and Oaxaca to explore culinary roots, while dreaming of a spring graffiti tour in
    Barcelona and a cultural immersion in Berlin’s street‑art scene.
  culinary: Sonny Alvarez cooks traditional dishes like handmade tamales, chiles en nogada, and salsa verde using fresh chilies, cilantro, and corn masa, while also savoring Tulsa’s smoked brisket and exploring
    food‑truck tacos on weekends.
  core: Sonny Alvarez channels relentless curiosity and worry into a hectic blend of courier routes, mural photography, and late‑night guitar jams, often forgetting to pay bills on time but never missing
    a chance to snap the next street‑art masterpiece.
background:
  cultural: Sonny is a first‑generation Mexican‑American born and raised in the Tulsa area. He grew up in a bilingual household where Spanish was spoken at home and English was used in school, giving him
    a strong command of both languages. Mexican cultural traditions, such as celebrating Día de los Muertos, preparing family recipes, and listening to regional music, remain central to his identity. While
    he embraces these roots, he also feels a deep connection to the diverse community of Tulsa, participating in local festivals, supporting neighborhood businesses, and blending Mexican and Midwestern
    influences in his daily life. His cultural background informs his values of family solidarity, community service, and appreciation for the arts, shaping both his personal interests and professional
    aspirations.
