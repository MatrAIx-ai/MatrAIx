  career_goals: Sonny aims to advance his career beyond entry‑level courier work. He plans to earn his GED within the next year and enroll in a community college logistics program to gain formal training
    in supply chain management. He also intends to obtain a commercial driver’s license (CDL) to qualify for larger vehicle routes and potential supervisory positions. In the medium term, he hopes to be
    promoted to a dispatch or logistics coordinator role where he can leverage his route‑planning skills and bilingual abilities. Ultimately, Sonny dreams of launching his own small, community‑focused delivery
    service that emphasizes reliable, culturally responsive service for Tulsa’s growing Hispanic population and supports local businesses. He also hopes to combine his love of street art and photography
    by creating a visual blog that documents Tulsa’s urban landscape, which could open doors to freelance work in visual media.
