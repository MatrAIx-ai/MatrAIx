personas:
  professional: A budding junior builder named David Williams constructs elaborate block towers, showcasing early spatial reasoning skills while insisting on precise, repeatable patterns and becoming visibly
    upset when his structures are disrupted, reflecting his preference for structure, competitive streak, and occasional frustration over unexpected changes.
  sports: A spirited toddler athlete named David Williams enjoys weekend toddler soccer sessions with the local Little Kickers club, cheering quietly for the nearby baseball team, the City Cubs, and prefers
    the predictability of small team drills over chaotic playground free-play, reflecting his reserved nature and love of structured competition.
  arts: An enthusiastic little artist named David Williams spends afternoons drawing dinosaurs and humming tunes from The Beatles' Yellow Submarine, while occasionally binge-watching the animated series
    Bluey, illustrating his solitary creative play, keen appreciation for familiar melodies, and penchant for predictable storylines.
  travel: An adventurous explorer named David Williams delights in family road trips to the aquarium, the nearby beach resort of Sunny Cove, and occasional visits to Disneyland, always insisting on a familiar
    snack pack and a clear itinerary, embodying his love for structured travel experiences and modest curiosity about new places.
  culinary: A picky eater named David Williams relishes mac and cheese with extra cheddar, crispy chicken nuggets, and apple slices, while consistently refusing broccoli, and enjoys dipping foods in ketchup,
    showcasing his preference for familiar textures, predictable flavors, and occasional stubbornness about trying new foods.
  core: David Williams is a methodical four-year-old who craves order in play, hoards coins, frets over tiny mishaps, and battles a stubborn streak that makes him both a competitive tower-builder and a
    cautious, worry-prone little explorer.
background:
  cultural: David comes from a white family living in Tucson, Arizona, where his early experiences are shaped by the desert climate and the multicultural atmosphere of the Southwest. He attends a local
