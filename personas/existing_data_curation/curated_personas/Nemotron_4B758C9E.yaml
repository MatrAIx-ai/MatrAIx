  career_goals: Gloria dreams of a future where she can combine her love for learning and helping others. She hopes to become a teacher who inspires young students, or a pediatric nurse who cares for children’s
    health. Her fascination with animals also makes her consider a career as a veterinarian or a park ranger who protects local wildlife. In the short term, she aims to improve her reading level, win a
    school science fair with a project that benefits the environment, and volunteer at the local animal shelter. By the time she reaches high school, she plans to join a robotics or science club to deepen
    her practical skills, ultimately earning a degree that lets her turn curiosity into real‑world solutions.
