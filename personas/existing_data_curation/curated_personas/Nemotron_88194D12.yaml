  hobbies: '[''Reading mystery novels'', ''Solving crossword puzzles and Sudoku'', ''Birdwatching'', ''Gardening'', ''Nature photography'', ''Yoga and mindfulness meditation'']'
  career_goals: Karen aspires to attain a supervisory detective role within the San Bernardino County Sheriff’s Office, ideally leading a cold‑case or specialized homicide unit where her analytical strengths
    can be fully utilized. She aims to develop a comprehensive training curriculum for new investigators, integrating her educational background with modern investigative technologies. Over the long term,
    she envisions mentoring the next generation of detectives and possibly transitioning to a consultancy role that advises law‑enforcement agencies on best practices for case management and forensic integration.
