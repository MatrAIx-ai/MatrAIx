personas:
  professional: Kevin Ford is a seasoned professor of African diaspora cultural studies who blends meticulous curriculum design, interdisciplinary pedagogy, and a passion for community‑centered art projects,
    letting their curiosity and organized nature drive inclusive classes while their compassionate, sociable demeanor shapes mentorship and mental‑health advocacy for students.
  sports: Kevin Ford enjoys early morning jogs along the St. Johns River, plays weekly tennis at the Jacksonville Parks and Recreation club, follows the Jacksonville Jaguars and Tampa Bay Rays, and participates
    in a local senior basketball league, using sport as both social outlet and stress‑relief ritual.
  arts: Kevin Ford immerses themselves in creative expression by painting watercolors of historic Jacksonville murals, playing saxophone in a community jazz ensemble, collecting vintage Miles Davis and
    B.B. King records, and frequently citing artists such as Jacob Lawrence, Kara Walker, and playwright August Wilson as inspirations that shape their teaching and personal identity.
  travel: Kevin Ford plans purposeful trips to cultural festivals, having recently explored the New Orleans Mardi Gras parade, the Savannah Music Festival, and a heritage tour of Ghana’s Cape Coast, while
    also enjoying weekend road‑trips to the Florida Keys and occasional solo sojourns to Paris’s Musée d’Orsay, balancing organized itineraries with spur‑of‑the‑moment detours.
  culinary: Kevin Ford favors soul‑food staples such as shrimp and grits, collard greens with smoked turkey, and sweet‑potato pie, often preparing them with fresh rooftop garden herbs like thyme and cayenne,
    while also experimenting with gumbo and jambalaya, and treats themselves to artisanal coffee paired with a slice of cornbread when dining out.
  core: Kevin Ford is a disciplined, community‑focused scholar who channels relentless curiosity and compassion into art‑driven pedagogy, yet wrestles with chronic worry that fuels meticulous planning and
    occasional over‑caffeination.
background:
  cultural: Kevin is a Black American raised in Jacksonville’s historic Northside district, a community shaped by the legacy of the civil‑rights movement and a vibrant Afro‑Southern culture. His family
    traditions include church gatherings, Southern soul food, and storytelling that celebrate resilience and creativity. He draws on this heritage in his teaching, incorporating African‑American artistic
    traditions, oral histories, and community narratives into his courses. Kevin remains actively involved with local cultural organizations, such as the Museum of African American History and the Jacksonville
    Jazz Festival, and he mentors students from underrepresented backgrounds, seeking to honor and extend the rich cultural legacy of his community.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Interdisciplinary Teaching'', ''Visual Arts Integration'', ''Student Mentorship'', ''Community Engagement'', ''Grant Writing'', ''Public
    Speaking'', ''Research in African‑American Studies'', ''Technology‑Enhanced Learning'', ''Conflict Resolution'', ''Mental‑Health Advocacy'']'
  hobbies: '[''Watercolor Painting'', ''Street Photography'', ''Jazz and Blues Music'', ''Playing Saxophone'', ''Community Youth Art Mentoring'', ''Rooftop Gardening'', ''Traveling to Cultural Festivals'',
    ''Reading Biographies of Civil‑Rights Leaders'', ''Collecting Vintage Vinyl'', ''Attending Neighborhood Block Parties'']'
  career_goals: Kevin aims to secure a tenure‑track position that allows him to expand his interdisciplinary program, launch a community‑centered art initiative that connects Jacksonville’s historically
    Black neighborhoods with local museums, and publish a book on the intersection of African‑American cultural identity and contemporary visual arts. He also intends to develop a campus‑wide wellness framework
    to support faculty and students coping with stress, leveraging his own experience with anxiety to create practical resources. Long‑term, Kevin aspires to become a department chair who champions equitable
    hiring practices and fosters a collaborative, high‑achievement culture.
