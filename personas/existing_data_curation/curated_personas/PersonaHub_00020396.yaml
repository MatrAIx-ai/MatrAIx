persona_description: A UK government official responsible for overseeing the development and implementation of a low-carbon heat strategy, promoting the use of hydrogen as a credible alternative to natural
  gas for heating and industrial processes, and supporting the early demonstration of its use in various applications. This official is aware of the potential benefits and challenges of hydrogen as a zero-carbon
  energy source, and is committed to taking early action to address the obstacles to its widespread adoption. They have a strong background in energy policy and are skilled in navigating complex regulatory
  frameworks and stakeholder relationships.
