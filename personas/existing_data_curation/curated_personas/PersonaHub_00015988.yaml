persona_description: A scientist who specializes in the development of new materials and technologies, particularly in the field of aerospace engineering. He or she is likely to be a researcher at a university
  or a company working on the development of advanced rocket engines and composites. The scientist has expertise in the use of silicon carbide fibres and nanotubes in the production of stronger and more
  heat-resistant composites, and has developed a new material called "fuzzy fibres" that can stand up to the heat and pressure of next-generation rocket engines. The scientist is interested in the potential
  of his or her new material to upgrade the existing silicon carbide fibres and make the entire turbo engine significantly lighter.
