  career_goals: Brittany aims to pursue a degree in computer science or human‑centered design at a university that balances academic rigor with supportive mental‑health resources. She aspires to become
    a software engineer or UX designer creating technology that promotes well‑being, such as mental‑health apps or tools for sustainable living. She plans to secure internships with Silicon Valley tech
    firms to gain real‑world experience, build a portfolio of socially responsible projects, and eventually work in a role that offers both structured career progression and creative flexibility, allowing
    her to maintain a healthy work‑life balance and continue her personal growth.
