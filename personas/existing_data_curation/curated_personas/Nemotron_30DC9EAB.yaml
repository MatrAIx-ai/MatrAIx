  hobbies: '[''Hiking'', ''Kayaking'', ''Cycling'', ''Recreational soccer'', ''Live music concerts'', ''Hackathons'', ''Arduino/Raspberry Pi tinkering'', ''Craft beer brewing'', ''Board-game nights'']'
  career_goals: Jeffrey aspires to move into a plant‑manager or senior operations role within the next five years, aiming to lead a facility that integrates sustainable manufacturing practices. He plans
    to earn a Six Sigma Black Belt and take advanced courses in environmental health and safety. He wants to champion continuous‑improvement programs that boost efficiency while preserving employee well‑being,
    and eventually mentor the next generation of supervisors.
