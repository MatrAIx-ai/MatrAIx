personas:
  professional: Kimberly Guaschino, a seasoned front‑line restaurant supervisor with a ServSafe certification, leverages data‑driven scheduling, staff coaching, and a calm, sociable demeanor to keep bustling
    kitchen teams running smoothly while turning every shift into a collaborative, low‑stress learning environment, and they thrive on transforming challenges into learning opportunities.
  sports: Kimberly Guaschino, an avid desert‑mesa hiker and occasional line‑dancing enthusiast, roots for the Albuquerque Isotopes and New Mexico United, joins a local hiking club that meets every Saturday,
    and they blend cardio hikes with spontaneous impromptu dance sessions after a game.
  arts: Kimberly Guaschino, a talkative karaoke regular, draws inspiration from the soulful guitar of Calexico, the folk storytelling of Lila Downs, and the energetic line‑dance reels of country star Carrie
    Underwood, and they weave these musical vibes into their own spontaneous cooking demos at community workshops.
  travel: Kimberly Guaschino favors low‑key, food‑centric road trips, having already road‑tripped to Santa Fe for its spice markets, to Austin for its live‑music scene, and dreaming of a culinary pilgrimage
    to Oaxaca’s mole stalls, and they plan each outing on a scribbled napkin rather than strict itineraries.
  culinary: Kimberly Guaschino, a self‑taught southwestern flavor enthusiast, skillfully blends home‑grown chilies, fresh cilantro, and rosemary into dishes like green chile enchiladas, roasted corn succotash,
    and herb‑infused margaritas, while they eagerly swap recipes at community potlucks.
  core: Kimberly Guaschino, a calm yet garrulous hospitality leader, thrives on spontaneous gatherings, occasionally forgets to file expense reports, and they turn every desert hike into a photo‑journal.
background:
  cultural: Kimberly is a white American with Italian‑Spanish ancestry, as suggested by her surname, who grew up in the Midwest before relocating to Tyrone, New Mexico. Her upbringing combined Midwestern
    values of reliability with the vibrant, community‑centric culture of southwestern New Mexico. She has embraced local traditions such as communal meals, respect for the land, and the region’s eclectic
    culinary heritage, blending them with her business acumen. This multicultural exposure informs her inclusive leadership style and her appreciation for both new ideas and time‑tested practices.
attributes:
  skills: '[''Team leadership and staff coaching'', ''Food safety and ServSafe compliance'', ''Inventory control and supply chain coordination'', ''Budgeting, cost control, and menu pricing analysis'',
