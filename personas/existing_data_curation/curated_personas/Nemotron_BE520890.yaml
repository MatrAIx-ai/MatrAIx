    and quality assurance'', ''Calm crisis management under pressure'']'
  hobbies: '[''Hosting potluck gatherings'', ''Herb gardening'', ''Hiking and desert photography'', ''Attending food festivals and live music events'', ''Line dancing and karaoke'', ''Reading business leadership
    literature'', ''Volunteering in community cooking workshops'', ''Exploring new cuisines'']'
  career_goals: Kimberly aims to progress from supervising front‑line staff to a regional restaurant operations manager, overseeing multiple locations and implementing standardized best practices. She plans
    to pursue an MBA to deepen her strategic management capabilities and eventually open her own farm‑to‑table restaurant that showcases New Mexico’s local produce and sustainable cooking. Along the way,
    she hopes to mentor emerging women leaders in hospitality, champion technology‑enhanced scheduling and inventory systems, and lead community food‑education initiatives that blend her curiosity for new
    ideas with practical business solutions.
