  hobbies: '[''visiting local art museums and galleries'',''reading contemporary fiction and memoirs'',''jazz and blues music listening'',''knitting and crocheting'',''urban gardening on balcony'',''cooking
    traditional soul food recipes'',''journaling and reflective writing'',''small-group community workshops on crafts'']'
  career_goals: Lydia aims to advance into a supervisory role such as lead housekeeper within her current organization, where she can shape cleaning standards and mentor a team. She also plans to earn a
    Certified Professional Housekeeper (CPH) credential and complete a short course in small‑business management, with the longer‑term ambition of launching her own boutique cleaning service that emphasizes
    both meticulous upkeep and aesthetic presentation. Financially, she seeks to build a stable safety net to support her family’s future, including funding her children’s education and securing a comfortable
    retirement.
