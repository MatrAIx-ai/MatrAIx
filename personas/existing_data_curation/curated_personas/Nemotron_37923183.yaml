  career_goals: Joanne aspires to become a middle‑school teacher, particularly in English or language arts, because she enjoys helping peers understand ideas and values a structured learning environment.
    She also dreams of working in community outreach, organizing events and programs for local youth, which would combine her sociable nature with her organizational strengths. In the long term, she plans
    to pursue a college degree in education or communications, develop leadership skills, and eventually give back to her hometown by mentoring younger students and supporting community initiatives.
