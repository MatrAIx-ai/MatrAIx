personas:
  professional: Joanne Trevino, a 13‑year‑old who juggles starring roles on their school stage and behind‑the‑scenes technical duties, they channel their love of structure into meticulous script memorization
    and cue‑calling, while their talkative, sociable nature shines when directing peers during rehearsals.
  sports: Joanne Trevino, a forward for the Eastside Middle School Falcons soccer team, they drill rigorously after school, cheer passionately for the US Women’s National Team and the local MLS club, the
    Portland Timbers, and never miss a Sunday broadcast of the Chicago Cubs, combining competitive drive with community team spirit.
  arts: Joanne Trevino, who immerses themselves in school theater by performing songs like 'Defying Gravity' from Wicked, sketches elaborate fan art of Harry Potter characters, sings along to Taylor Swift
    and Lin‑Manuel Miranda’s compositions, and attends local community productions starring rising actors, they let the stage and visual arts shape their identity and daily joy.
  travel: Joanne Trevino, after budgeting pocket money to fund a family road trip to the Grand Canyon last summer and dreaming of exploring the Harry Potter Studio Tour in London, they prefer a balanced
    itinerary that mixes planned museum visits with spontaneous photo‑ops, yet rely on their parents for logistics, turning travel into both an educational adventure and a cherished family bonding experience.
  culinary: Joanne Trevino, a budding baker who perfects chocolate chip cookies, experiments with cinnamon‑spiced brownies, helps their mother craft homemade enchiladas using fresh cilantro and queso fresco,
    and treats each kitchen session as a creative lab while secretly snacking on extra frosting, showcases their practical skill set and love for sweet‑savory flavors.
  core: Joanne Trevino, a socially energized stage enthusiast who meticulously plans rehearsals yet often forgets to complete homework, they balance a sweet tooth for cookies with a habit of impulsively
    buying comic books, and thrive on the applause of both theater and soccer crowds.
background:
  cultural: Joanne grew up in Imperial, Missouri, a small, close‑knit community in Jefferson County that reflects typical Midwestern white American values of hard work, neighborliness, and community involvement.
    Her family carries a subtle Hispanic heritage from her father's side, evident in occasional family recipes and bilingual words used at home, while also honoring Anglo‑American traditions such as Thanksgiving,
    Christmas, and local county‑fair celebrations. Participation in her church youth group and school events reinforces a sense of belonging and civic responsibility, shaping her sociable and cooperative
    personality.
