  hobbies: '[''Photography'', ''Visiting art galleries and museums'', ''Fishing'', ''Jogging on the beach'', ''Cooking Tex-Mex cuisine'', ''Reading science fiction & fantasy'', ''Volunteer art teaching'',
    ''DIY woodworking'', ''Homebrewing craft beer'']'
  career_goals: Wilby aims to transition into a role that merges his organizational strengths and passion for art, such as a gallery assistant, community arts program coordinator, or freelance photographer.
    To achieve this, he plans to enroll in a one‑year certificate program in digital media arts or arts administration at a nearby community college. He intends to build a professional portfolio and launch
    a small business offering photography services for local events, real‑estate listings, and tourism promotions. While working toward these creative goals, he seeks a part‑time position in logistical
    support or warehouse operations to secure steady income and financial stability. Long‑term, Wilby dreams of establishing a community art center that provides workshops, mentorship, and exhibition space
    for emerging local artists.
