personas:
  professional: Wilby Warren is a methodical photographer-turned-arts coordinator who leverages their mechanical know-how, troubleshooting expertise, and meticulous event-planning skills to orchestrate
    community gallery exhibitions while building a freelance photography business focused on local events and tourism.
  sports: Wilby Warren is a loyal fan of the Houston Astros, the Houston Rockets, and the Houston Texans, and they jog with the Gulf Coast Running Club on sunrise beach runs while occasionally joining a
    local fishing charter team for friendly catch-and-release competitions.
  arts: Wilby Warren draws artistic inspiration from photographer Michael Kenna's monochrome seascapes, muralist Maya Rivera's vibrant Gulf-coast street art, and the songwriting of Sturgill Simpson, often
    pairing gallery visits with late-night readings of Brandon Sanderson fantasy epics.
  travel: Wilby Warren has road-tripped along the Blue Canyon Highway to Sedona, kayaked the mangroves of Belize, and dreams of capturing sunrise over the white cliffs of Santorini, always planning itineraries
    in detailed spreadsheets while leaving room for spontaneous beach stops.
  culinary: Wilby Warren cooks Tex-Mex with a seafood twist, mastering fish tacos with cilantro-lime slaw, smoky chipotle-marinated shrimp, homemade salsa verde, and pairing them with a crisp home-brewed
    pale ale infused with Citra and Cascade hops.
  core: Wilby Warren blends a photographer's eye, a mechanic's practicality, and a community-builder's heart, balancing methodical budgeting with sunrise beach runs and the occasional craft-beer indulgence.
background:
  cultural: Wilby grew up in Corpus Christi, Texas, as part of a white working‑class family with deep roots in the Gulf Coast region. The local Texan culture—characterized by a blend of Southern hospitality,
    ranching heritage, and a strong maritime influence—shapes his worldview. Proximity to a vibrant Mexican‑American community exposed him to bilingual street food, festive celebrations like Fiesta de la
    Flor, and a love for music ranging from country to Tejano. He celebrates Texas Independence Day and enjoys annual events such as ShrimpFest. His upbringing emphasized self‑reliance, community involvement,
    and respect for the natural environment of the Gulf.
attributes:
  skills: '[''Basic automotive repair'', ''Home DIY renovation'', ''Photography (portrait & landscape)'', ''Event planning and coordination'', ''Budgeting and financial management'', ''Basic computer troubleshooting'',
