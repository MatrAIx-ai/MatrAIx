  career_goals: Louise aspires to advance to a senior program director role within a cultural institution or nonprofit, where she can shape large‑scale community arts initiatives that promote equity and
    inclusion. She plans to earn her Project Management Professional (PMP) certification, pursue a Master’s in Public Administration, and develop a reputation as a thought‑leader in integrating arts programming
    with social impact. Long‑term, she envisions launching her own consultancy that helps organizations design sustainable, culturally responsive projects.
