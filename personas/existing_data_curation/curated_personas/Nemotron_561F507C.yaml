personas:
  professional: Louise Coore, a 30‑year‑old program manager for a Buffalo arts nonprofit, blends Agile and Waterfall expertise with a curiosity for innovative community‑based solutions, delivering meticulously
    planned yet adaptable projects while they nurture stakeholder relationships through thoughtful, cooperative communication.
  sports: Louise Coore, a 30‑year‑old active‑lifestyle enthusiast, stays fit by practicing yoga at Flow & Thrive studio, hiking Niagara Falls State Park trails in spring and summer, cheering on the Buffalo
    Bills during football season, and they occasionally join a recreational softball league with the Buffalo Community Sports Club.
  arts: Louise Coore, a 30‑year‑old arts aficionado, immerses herself in Buffalo’s vibrant scene by attending exhibitions at the Albright–Knox Art Gallery, catching live sets at The Stilt featuring artists
    like H.E.R. and Kamasi Washington, devouring contemporary works by authors such as Tara Westover and poet Tracy K. Smith, while they craft personal verses in a weathered journal.
  travel: Louise Coore, a 30‑year‑old explorer, prefers thoughtfully planned weekend getaways, often road‑tripping to Niagara‑on‑the‑Lake for historic inns and art fairs, while they dream of a summer immersion
    in Cartagena’s colonial streets to explore its vibrant mural scene, balancing a limited travel budget with occasional splurges on cultural festivals abroad.
  culinary: Louise Coore, a 30‑year‑old home chef, fuses Southern comfort staples like shrimp and grits and collard greens with Caribbean twists such as jerk‑spiced chicken and coconut‑infused rice and
    beans, routinely sourcing fresh okra and sweet potatoes at the Buffalo Niagara farmers market, and they savor the occasional dinner out at the farm‑to‑table bistro Ten Broeck, where they’re a regular
    at the roasted beet salad.
  core: Louise Coore, a 30‑year‑old program manager with a poetic soul, balances meticulous project‑management with spontaneous verse‑writing, juggling grant deadlines and yoga mats while they habitually
    jot lines on coffee‑stained napkins and occasionally binge‑watch vintage sitcom reruns at midnight.
background:
  cultural: Louise is an African‑American born and raised in Buffalo, New York. Her family roots trace back to the Southern United States, with her grandparents having migrated from Mississippi in the 1960s,
    and a great‑aunt who married into a Caribbean family from Jamaica. Growing up, she was immersed in the rich traditions of Black churches, soul food, and the city’s historic Black neighborhoods, while
    also engaging with the multicultural fabric of Buffalo’s immigrant communities. These experiences have fostered a deep appreciation for cultural storytelling, community resilience, and the importance
    of preserving and celebrating Black heritage within broader civic life.
