  hobbies: '[''Gardening'', ''Reading classic mystery and historical fiction'', ''Knitting'', ''Birdwatching'', ''Baking artisanal breads and focaccias'', ''Listening to classical and jazz music'', ''Puzzle
    solving (crosswords, jigsaws)'']'
  career_goals: Looking ahead, Dewilla intends to transition to a reduced schedule that lets her preserve her energy for the quieter early‑morning and late‑evening shifts she enjoys. She hopes to become
    a mentor for younger servers, sharing the practical routines she has refined, and plans to complete a short certification in food safety to open a small home‑based catering service focused on simple,
    wholesome Italian dishes for family gatherings. Additionally, she aims to solidify her financial footing for retirement by continuing steady earnings while gradually taking on volunteer work delivering
    meals to seniors in her community.
