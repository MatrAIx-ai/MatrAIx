persona_description: A healthcare policy analyst and advocate who is concerned about the lack of access to quality health care services in the United States, particularly in rural and underserved areas.
  They are actively working to promote the use of telemedicine and other technology-based solutions to improve access and quality of care. They are also advocating for the reform of the healthcare system
  to address the growing needs of an aging baby boomer generation and the need to address the predicted shortage of physicians by 2020. They are also interested in exploring the potential cost savings that
  could be achieved by better utilizing technology in the healthcare system.
