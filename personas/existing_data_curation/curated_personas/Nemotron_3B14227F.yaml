personas:
  professional: Jae Lilly, an aspiring young coder who constructs intricate LEGO mechanisms and develops small Python projects, leverages their disciplined, solitary nature to meticulously plan each build
    and dominate school science fairs.
  sports: Jae Lilly, a participant in the local youth swimming program and a member of the school chess club, enjoys solitary hikes along the coastal trail, supports the Seattle Seahawks and Seattle Sounders
    FC, and prefers structured cardio routines over chaotic team sports.
  arts: Jae Lilly, a disciplined piano student who regularly practices Beethoven’s ‘Für Elise’ and Yiruma’s ‘River Flows in You’, also enjoys the soundtrack of Studio Ghibli films and listens to Billie
    Eilish while sketching sea shells, merging classical training with modern pop culture.
  travel: Jae Lilly, who meticulously plans each outing, has hiked the coastal cliffs of Big Sur, collected shells on the Pacific shoreline, and dreams of witnessing the Northern Lights in Norway, favoring
    off‑season travel to avoid crowds and maximize quiet exploration.
  culinary: Jae Lilly, an enthusiastic kitchen explorer, loves assembling homemade sushi rolls with avocado, cucumber, and smoked salmon, relishes pepperoni‑and‑mushroom pizza, and can brew a perfect cup
    of hot chocolate with a pinch of cinnamon, though they often forget to wash the dishes afterward.
  core: Jae Lilly blends relentless curiosity with disciplined solitude, turning every LEGO set, chess match, and piano piece into a precise challenge, yet sometimes hoards tools and forgets to share their
    achievements.
background:
  cultural: Jae grows up in a suburban New England setting in Milford, Connecticut. His family identifies with mainstream American cultural traditions, celebrating holidays such as Thanksgiving, Fourth
    of July, and Christmas, and participating in community activities like library reading programs and youth clubs. His ethnic background is Caucasian with English and Irish ancestry, reflected in family
    storytelling and a pragmatic, achievement‑oriented mindset. Proximity to Long Island Sound nurtures his interest in marine life and outdoor exploration, while his public elementary school emphasizes
    academic excellence and offers extracurricular clubs like robotics and chess that shape his development.
