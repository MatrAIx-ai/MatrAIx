  career_goals: 'Jae aspires to become a software engineer or roboticist who designs innovative solutions, especially for environmental sustainability. He aims to excel academically, earn a scholarship
    to a top high school, win math and science competitions, and later attend a premier university’s engineering program. He envisions building his own tech projects, possibly starting a youth‑focused startup,
    and eventually contributing to space‑exploration technology. His approach is pragmatic: he plans to maintain disciplined study, expand his coding portfolio, and engage in robotics clubs and contests.'
