  career_goals: Thomas hopes to advance into a supervisory or assistant manager position within the next two years, leveraging his reliability and organizational strengths to lead a small team. Simultaneously,
    he aims to deepen his involvement in the local art community by volunteering as a docent at the Rancho Cucamonga Museum of Art and completing a certificate program in arts administration at the community
    college. In the longer term, he envisions combining his retail expertise with his passion for art by opening a modest gallery‑café that showcases emerging regional artists while providing a welcoming
    space for community gatherings.
