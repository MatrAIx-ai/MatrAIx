persona_description: A historian who specializes in the study of Native American history, particularly the conditions and issues faced by Native Americans on reservations. His research interests include
  the history of the federal boarding school system, the health and disease conditions on reservations, and the economic and social conditions of Native Americans. He is interested in the long-term effects
  of government policies and programs on the health and well-being of Native Americans, and the need for better policies and programs to address these issues.
