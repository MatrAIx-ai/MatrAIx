    User 1: I know! I''ve always wanted a dog, but I just don''t have the time or space for one right now.

    User 2: I understand. They can be a lot of work.

    User 1: Yeah, they can. But they''re so worth it!

    User 2: I agree! So, what do you do for fun?

    User 1: I love going to the gym. I''m currently on a diet and I''m trying to get in shape.

    User 2: Oh, that''s awesome! I used to go to the gym a lot, but I haven''t been in a while.

    User 1: You should start going again! It''s a great way to stay in shape and it''s really fun.

    User 2: I know, I know. I need to get back into it.

    User 1: So, what do you do for work?

    User 2: I''m a truck driver. I drive a big rig all over the country.

    User 1: Oh, that''s cool! I''ve always thought it would be fun to be a truck driver.

    User 2: It''s not so bad. It can be long hours, but it''s a good job.

    User 1: I''m sure it is. So, what do you like to do when you''re not working?

    User 2: I like to go camping. I recently bought a camper and I''ve been taking it out a lot.

    User 1: Oh, that''s awesome! I''ve never been camping before, but I''ve always wanted to try it.

    User 2: You should! It''s a lot of fun.

    User 1: I know, I know. I need to try it sometime.'
