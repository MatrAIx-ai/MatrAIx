  career_goals: Pamila aims to secure a tenure‑track position at a university where she can develop an interdisciplinary humanities course that bridges literature, cultural studies, and social issues. She
    plans to earn a master’s degree to strengthen her academic credentials, publish research on community‑engaged learning, and eventually serve as department chair. Additionally, she seeks to refine her
    organizational habits, build a supportive network of colleagues, and embed mental‑health awareness into her teaching practice.
