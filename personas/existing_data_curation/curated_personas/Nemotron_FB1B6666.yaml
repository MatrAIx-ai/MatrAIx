  career_goals: Francisco aims to rise to a senior leadership role in a regional economic development agency or a respected think‑tank where he can shape policy on cross‑border trade, labor markets, and
    sustainable growth in the San Diego–Tijuana corridor. He intends to publish influential research on the economic impacts of migration and trade agreements, earn a professional certification in data
    science, and eventually mentor a new generation of economists. While ambitious and competitive, he balances these goals with a pragmatic focus on delivering concrete, measurable outcomes that improve
    the lives of his local community and strengthen ties with his Mexican heritage.
