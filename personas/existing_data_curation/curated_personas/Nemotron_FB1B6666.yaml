personas:
  professional: Francisco Rodriguezrios, a senior regional economist at a leading development agency, leverages advanced econometric modeling in Python, R, and SQL to forecast cross‑border trade impacts
    while channeling a competitive skepticism into meticulous data validation and stakeholder‑focused policy recommendations.
  sports: Francisco Rodriguezrios, an avid hiker with the San Diego Hiking Club who conquers the cliffs of Torrey Pines each weekend and drops into evening pickup basketball at Mission Bay Park, roots for
    the San Diego Padres and follows the LA Lakers schedule with the same analytical eye he applies to economic data.
  arts: Francisco Rodriguezrios, an acoustic guitarist who strings together folk ballads from Joaquín Sabina to Bob Dylan during relaxed jam sessions at friends’ backyards, regularly attends local singer‑songwriter
    nights and keeps a crammed playlist of Woody Guthrie, Vicente Fernández, and contemporary indie folk for inspiration.
  travel: Francisco Rodriguezrios, a deliberate traveler who combines work and leisure by planning annual trips to the coastal towns of Baja California to study cross‑border economies, while also fitting
    weekend escapes to Portland’s food scene and Napa Valley’s vineyards into a budget that balances family obligations and research grants.
  culinary: Francisco Rodriguezrios, an intermediate home chef who reimagines classic mole poblano with quinoa, dark chocolate, and smoked ancho chilies, perfects carnitas tacos topped with pineapple‑cilantro
    salsa, and experiments with heirloom corn masa to craft hand‑made tortillas for family gatherings, all while sourcing fresh fish from the Pacific and sourcing spices from local farmer’s markets.
  core: Francisco Rodriguezrios balances a data‑driven career with solitary hikes, a competitive streak that fuels both chess and financial analysis, and a kitchen that constantly experiments with heritage
    flavors—yet demands nightly coffee rituals and an occasional reluctance to schedule routine health appointments.
background:
  cultural: Francisco identifies as Mexican‑American, having grown up in a bilingual household where Spanish and English were spoken interchangeably. His family maintains traditional celebrations such as
    Día de los Muertos and Las Posadas, and he remains deeply connected to Mexican culinary, musical, and religious customs. Living in Chula Vista—a city with a vibrant Latino community—he participates
    in local cultural festivals and supports organizations that assist recent immigrants. His heritage informs his professional focus on cross‑border economic issues and fuels his commitment to give back
    to the community that shaped his values of hard work, family solidarity, and resilience. While he embraces his American upbringing, he balances it with a pride in his Mexican roots, which permeates
    his daily life, social interactions, and career aspirations.
