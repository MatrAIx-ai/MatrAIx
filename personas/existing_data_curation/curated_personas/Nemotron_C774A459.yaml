personas:
  professional: Jennifer Lyttle, a one‑year‑old prodigy of play, already showcases a nascent knack for design by meticulously arranging shape‑sorting cubes and flexibly reconstructing them, hinting at a
    future career in architecture or user‑experience design where their curiosity, organized mindset, and sociable energy will converge.
  sports: Jennifer Lyttle, a one‑year‑old bundle of energy, joins a parent‑and‑baby gymnastics class at the Bright Beginnings Center and beams each time the New York Yankees’ theme song plays on the family
    TV, showing their love for group activity, energetic play, and early fandom of professional sports.
  arts: Jennifer Lyttle, a one‑year‑old miniature art aficionado, spends afternoons gazing at the bold colors of Mary Cassatt’s prints in the children’s museum and swaying to the gentle piano lullabies
    of Ludovico Einaudi, letting their curiosity for varied experiences shape their early aesthetic sensibility.
  travel: Jennifer Lyttle, a one‑year‑old curious explorer, has already waddled along the soft sand of Waikiki Beach and marveled at the towering giraffes at the San Diego Zoo, and they dream of a future
    trip to the lantern‑lit streets of Kyoto, reflecting their love for varied experiences and family‑centered adventure.
  culinary: Jennifer Lyttle, a one‑year‑old developing palate, favors silky mashed sweet potato and ripe avocado puree seasoned with a pinch of cinnamon, often reaching for bright orange carrot sticks,
    while occasionally turning up their nose at mushy peas with a determined frown that reveals their assertive side.
  core: Jennifer Lyttle, an endlessly curious one‑year‑old, balances meticulous block arranging with playful spontaneity, stays serenely calm under any circumstance, and radiates a sociable energy that
    makes them the bright center of any group.
background:
  cultural: Jennifer is being raised in a white, Southern, rural Texan family in Silsbee, Hardin County. Her upbringing reflects the close‑knit community spirit typical of small‑town East Texas, with frequent
    attendance at local church gatherings, family barbecues featuring smoked brisket and ribs, and community festivals that celebrate country music, folk art, and outdoor recreation. The Lyttle household
    places a high value on hospitality, modesty, and a strong connection to nature, exposing her to traditional Texan cuisine, regional folk tales, and a love of country and gospel music from infancy. These
    cultural influences shape her sense of belonging and inform the social and artistic experiences that she enjoys.
attributes:
  skills: '["Crawling", "Cruising and early walking", "Fine‑motor grasp of blocks and crayons", "Babbling and emergent single‑word speech", "Social imitation and peer interaction", "Sensory exploration
