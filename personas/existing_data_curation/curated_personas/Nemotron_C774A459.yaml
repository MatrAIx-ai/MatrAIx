  career_goals: At one year old, Jennifer does not yet have concrete career plans, but her parents notice her love for music, bright pictures, and helping friends in play. They nurture a gentle vision that
    she might one day channel this curiosity and compassion into a role such as an early‑child educator, community artist, or caregiver, where she can share the joy of learning and creative expression she
    already shows a fondness for. For now, her ambitions are expressed through the simple desire to explore, make friends, and enjoy the activities that capture her attention.
