personas:
  professional: Divya Subramanian, a veteran secondary school teacher celebrated for curriculum development, differentiated instruction, and visual literacy, integrates Google Classroom and Canvas to craft
    inclusive, culturally resonant art programs while mentoring new educators and driving her school’s Arts Department toward innovative cross‑curricular partnerships.
  sports: Divya Subramanian stays fit through weekly senior badminton matches at the local community center, sunrise garden walks, Saturday yoga classes, and enthusiastic cheering for the Chicago Bulls,
    while occasionally indulging in televised cricket matches during festival holidays.
  arts: Divya Subramanian passionately engages with the arts as a watercolor creator inspired by Claude Monet’s garden series, a community theater performer in productions like A Midsummer Night’s Dream
    with The Gateway Players, and a frequent visitor to galleries showcasing contemporary artists such as Anish Kapoor and Frida Kahlo.
  travel: Divya Subramanian favors purpose‑driven travel that melds history and inspiration, having explored the ruins of Hampi, trekked the sandstone pathways of Petra, and scheduled a forthcoming pilgrimage
    to Angkor Wat, all while carefully budgeting trips around school breaks and coordinating group excursions for their book club.
  culinary: Divya Subramanian relishes preparing elaborate South Indian festival feasts, expertly crafting masala dosa with coconut chutney, appam with spiced vegetable stew, and cardamom‑infused payasam
    topped with cashews, while also experimenting with fusion dishes like turmeric‑marinated paneer tossed with quinoa and roasted vegetables.
  core: Divya Subramanian merges a teacher’s structured mindset with an artist’s restless curiosity, constantly juggling curriculum innovation, watercolor canvases, and festive cooking, all while habitually
    postponing bill payments and over‑committing to community projects.
background:
  cultural: Divya is of Tamil South Indian heritage, born to immigrant parents who settled in the United States in the 1970s. She grew up speaking Tamil at home and celebrating festivals such as Pongal,
    Deepavali, and Tamil New Year, preserving these traditions through culinary rituals, music, and dance. Her cultural identity informs her teaching philosophy, encouraging students to appreciate diverse
    narratives and artistic expressions. Living in Flemington, NJ, she balances her South Asian roots with a commitment to the multicultural fabric of her community, often sharing her background through
    classroom projects, cultural fairs, and community presentations.
