  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Participating in community theater productions'', ''Cooking traditional South Indian dishes'', ''Gardening'', ''Yoga and mindfulness
    practice'', ''Traveling to historic and cultural sites'', ''Reading contemporary fiction and non‑fiction'', ''Volunteering with youth arts outreach programs'', ''Attending multicultural festivals'']'
  career_goals: Divya aspires to become the chair of the Arts Department at her school, where she can lead curriculum innovation that blends creative expression with cultural diversity. She aims to design
    a cross‑curricular program that partners students with local art institutions and community groups, fostering real‑world learning. Over the next few years, she plans to mentor a cohort of early‑career
    teachers, author a guide on integrating multicultural art into secondary curricula, and, after retirement, volunteer as a tutor for underserved learners while continuing her involvement in regional
    education advisory committees.
