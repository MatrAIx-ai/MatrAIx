  hobbies: '[''fantasy drawing and illustration'', ''comic writing'', ''Minecraft building'', ''LEGO construction'', ''reading graphic novels and fantasy books'', ''simple science experiments'', ''nature
    walks in Zilker Park'', ''listening to Austin indie music'', ''attending maker workshops'']'
  career_goals: Guided by his vivid imagination, Dion dreams of becoming a multimedia artist who blends illustration, animation, and interactive game design. He hopes to create his own animated series or
    video games that let players explore fantastical worlds. In the near term, he plans to join a summer art camp to improve his digital drawing skills, master intermediate Scratch projects, and learn basic
    Photoshop or Procreate techniques. Long‑term, he envisions working as a game developer, animation director, or visual‑effects designer, possibly collaborating with scientists to visualize space missions
    or scientific concepts.
