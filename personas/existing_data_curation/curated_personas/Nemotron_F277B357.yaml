  hobbies: '[''Reading adventure & science books'', ''LEGO building'', ''Soccer'', ''Drawing cartoons and folklore scenes'', ''Cooking family meals'', ''Listening to Guatemalan folk music'', ''Playing keyboard'']'
  career_goals: Hector dreams of becoming a scientist or engineer who creates solutions that help his community, inspired by his love for building and problem‑solving. He aspires to excel in school, win
    the upcoming science fair, and one day study robotics or civil engineering. He also hopes to use his bilingual abilities to support other children who speak Spanish, perhaps becoming a future educator
    or community advocate.
