personas:
  professional: Hector, a budding junior inventor, leverages their love of science books and disciplined curiosity to design intricate LEGO constructions that mimic real-world inventions, documenting each
    step on paper with meticulous precision.
  sports: Hector, an energetic member of the local youth soccer club, drills with their team on Saturday mornings, models their play after the professional forwards of the city’s senior Lions squad, and
    complements their on‑field activity with disciplined after‑school fitness routines like jumping rope.
  arts: Hector, a creative sketcher, fills their sketchbook with cartoons inspired by folklore tales, copies folk rhythms on their small keyboard, and draws inspiration from comic artists like Jim Davis
    and folk singers whose melodies echo throughout their home.
  travel: Hector, an inquisitive traveler, prefers organized family trips that balance adventure with learning, such as a recent expedition to a nearby volcanic park and their budding dream to explore ancient
    ruins abroad, always preparing a detailed itinerary with map stickers.
  culinary: Hector, an eager junior chef, delights in helping prepare traditional steamed corn dumplings (tamales) with masa and pork, adds a dash of cinnamon to sweet atole, and practices perfecting the
    flip of a tortilla on the stovetop while they hum folk tunes.
  core: Hector, a disciplined seven‑year‑old, merges their meticulous LEGO engineering, folklore sketching, soccer teamwork, and culinary curiosity into a balanced routine, while they manage a tidy allowance
    and occasional allergy challenges.
background:
  cultural: Hector is a first‑generation American with Guatemalan roots. His family speaks both Spanish and English at home, preserving cultural traditions such as celebrating Día de los Muertos, enjoying
    tamales and pepian during holidays, and dancing to marimba music. Living in Arverne, Queens, he is part of a vibrant immigrant community where bilingualism is common, and he participates in local cultural
    events at the nearby community center. The values of family solidarity, respect for elders, and community cooperation shape his daily life, reinforcing his kind and cooperative nature.
attributes:
  skills: '[''Reading (English & Spanish)'', ''Basic arithmetic'', ''Organizing school tasks with checklists'', ''Digital literacy (educational apps)'', ''LEGO and block construction'', ''Puzzle solving'',
