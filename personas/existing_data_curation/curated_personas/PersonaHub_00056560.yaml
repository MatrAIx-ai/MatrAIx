persona_description: A horticulturist who specializes in the development and commercialization of stonefruit hybrids, including pluots, apripls, and pluots. His work has been recognized with several patents
  and awards, and he is credited with developing over 47 varieties of stonefruit in California alone. His company, Zaiger's Inc. Genetics, has registered the names Pluot® and Aprium® for its pluots and
  apripls, respectively. Despite the confusion surrounding the terms "plum" and "apricot" in the stonefruit market, he remains committed to his work and continues to breed new hybrid varieties.
