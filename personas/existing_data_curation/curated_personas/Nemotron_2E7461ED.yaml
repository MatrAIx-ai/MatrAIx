  hobbies: '[''gardening'', ''knitting and quilting'', ''Southern cooking'', ''reading historical fiction'', ''birdwatching'', ''church choir participation'', ''walking in nature'', ''crossword puzzles'',
    ''listening to classic country music'', ''collecting vintage postcards'']'
  career_goals: Even at 90, Sondra’s ambitions focus on staying vibrant and useful to her community. She aims to maintain her independence by keeping active through gardening and regular walks, while also
    completing a memoir that captures her family’s Southern heritage and the changes she has witnessed in Gainesville. She wishes to mentor younger volunteers at the senior center, sharing her cooking and
    craft skills, and to advocate for better accessibility for seniors in local public spaces. Her practical outlook drives her to ensure her home remains safe and comfortable, and she hopes to continue
    attending church services and leading occasional potluck events, balancing her desire for structure with the flexibility to enjoy spontaneous moments.
