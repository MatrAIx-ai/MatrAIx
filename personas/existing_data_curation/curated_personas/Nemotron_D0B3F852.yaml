  career_goals: Maria aspires to a career that blends practicality with service to her community. She envisions becoming a bilingual school counselor or community health aide, helping Mexican-American families
    in Springdale navigate school systems, healthcare, and cultural adaptation. She is drawn to roles that allow her to use her language skills, organizational habits, and compassionate yet assertive nature
    to make a tangible difference, while maintaining a stable, routine-focused work environment.
