personas:
  professional: Maria Rodriguezcedeno is a high‑school sophomore who channels a love of routine into leading low‑key study sessions for the math club, spends spare time tending a modest vegetable garden,
    and approaches school projects with practical, hands‑on solutions while they comfortably let deadlines drift when flexibility feels more natural.
  sports: Maria Rodriguezcedeno is a teen who enjoys casual soccer games with a close circle of friends on weekends and quietly follows the city’s minor‑league baseball team, the Riverfront Runners, preferring
    low‑intensity, routine‑based fitness activities over competitive training.
  arts: Maria Rodriguezcedeno is an avid reader who devours Raina Telgemeier’s graphic novels and Philippa Gregory’s historical fiction, while their daily soundtrack blends folk ballads from local musicians,
    pop staples like Taylor Swift, and contemporary U.S. hits, and they unwind by crafting friendship bracelets and simple embroidery pieces.
  travel: Maria Rodriguezcedeno is a wanderer at heart who favors low‑key family road trips to nearby state parks such as the Blue Ridge Mountains and historic cities like Washington, D.C., while dreaming
    of future adventures exploring the ancient ruins of Machu Picchu and the coastal towns of the Pacific Northwest.
  culinary: Maria Rodriguezcedeno is a budding home chef who frequently whips up fresh tomato basil pasta and roasted bell pepper salads using vegetables harvested from their garden, often cooking while
    listening to music and occasionally experimenting with spice blends, though they tend to stick to familiar flavors and simple recipes.
  core: Maria Rodriguezcedeno is a routine‑loving teen who balances a relaxed, slightly disorganized approach to obligations with a quiet confidence in gardening, crafting, and immersing themselves in historical
    stories, all while humming a mix of folk and pop tunes.
background:
  cultural: Maria’s cultural background is rooted in her Mexican heritage, reinforced by family traditions and community events in Springdale. At home, Spanish is spoken daily and she celebrates Mexican
    holidays such as Día de los Muertos and Nuestra Señora de Guadalupe with family gatherings, altar building, and traditional foods. She also participates in local Spanish-language church services and
    attends community festivals that blend Mexican and Southern U.S. customs. While she embraces these traditions, Maria adapts them to life in Arkansas, balancing the rhythms of rural life—such as seasonal
    gardening and community picnics—with her Mexican cultural identity.
