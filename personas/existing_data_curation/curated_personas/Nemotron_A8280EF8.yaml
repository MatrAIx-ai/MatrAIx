  career_goals: Martha envisions the next stage of her career as a blend of leadership, mentorship, and specialized clinical work. She aims to obtain the Certified Veterinary Technician (CVT) specialty
    in anesthesia and analgesia, allowing her to take on greater responsibility in surgical suites. Simultaneously, she hopes to move into a supervisory role where she can design and implement quality‑improvement
    protocols, mentor junior staff, and promote a low‑stress, collaborative workplace culture. Over the longer term, Martha is interested in developing community outreach programs that provide low‑cost
    preventative care workshops for pet owners in underserved neighborhoods of Cincinnati, aligning her desire for harmony and service with her practical expertise.
