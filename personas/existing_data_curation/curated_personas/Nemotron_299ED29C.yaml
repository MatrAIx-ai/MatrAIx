personas:
  professional: Claudia Levano, a retired community organizer, leverages her hands‑on expertise in budgeting, event coordination, and bilingual communication to lead cultural workshops at the senior center,
    balancing her love for structured planning with spontaneous, improvisational activities that keep participants engaged.
  sports: Claudia Levano enjoys strolling with the local senior walking group, attending Tampa Bay Buccaneers games, playing casual beach volleyball, and practicing gentle yoga, reflecting a balanced approach
    to fitness that blends seasonal outdoor activity with structured team support.
  arts: Claudia Levano immerses herself in salsa rhythms by Marc Anthony, bolero classics by Lucho Gatica, and son recordings by Buena Vista Social Club, often singing along while dancing in her living
    room, and she also volunteers in the church choir, performing beloved standards such as "Stand By Me" and "Moon River".
  travel: Claudia Levano favors short, relaxed getaways to coastal destinations like the Florida Keys, the Bahamas, and historic towns such as Savannah, planning trips around senior discounts and family
    visits, yet she also dreams of exploring the bustling culinary markets of Barcelona when health permits.
  culinary: Claudia Levano delights in preparing family‑style dishes such as citrus‑marinated chicken, slow‑cooked shredded pork with plantains, and avocado‑lime salad, experimenting with fresh herbs, cumin,
    and sour orange juice, while also mastering the art of baking sweet plantain bread for neighborhood gatherings.
  core: Claudia Levano blends structured community service with spontaneous culinary creativity, staying active through walking and yoga while nurturing family ties and cultural heritage through music,
    cooking, and mentoring.
background:
  cultural: Claudia was born in Cuba and moved to the United States as a young adult, eventually settling in the Tampa Bay area. She grew up in a close‑knit, Catholic Cuban family where Spanish was spoken
    at home and family gatherings centered around food, music, and dance. The rhythms of son, salsa, and bolero, the aroma of ropa vieja and black beans, and the importance of community support remain vital
    parts of her identity. In Clearwater, she stays connected to the local Cuban diaspora through the church, cultural festivals, a weekly Cuban cooking club, and informal gatherings with fellow expatriates,
    preserving traditions while also embracing the broader Floridian lifestyle.
attributes:
  skills: '["Cuban cuisine cooking", "Gardening and plant care", "Household budgeting", "Event planning and coordination", "Volunteer coordination", "Bilingual communication (Spanish/English)", "Basic computer
    literacy", "Knitting and crochet"]'
  hobbies: '["Gardening", "Beach walking", "Cooking traditional Cuban dishes", "Salsa dancing", "Reading mystery novels", "Church choir singing", "Knitting", "Volunteering at senior center"]'
  career_goals: Although retired, Claudia remains motivated to stay active and give back. She aims to preserve and share her family’s culinary heritage by compiling a cookbook of recipes, mentor younger
    Cuban‑American families in Clearwater on budgeting and cultural traditions, maintain her health through regular walks and gentle yoga, and gradually learn more advanced digital skills to stay connected
    with her grandchildren. She also hopes to volunteer more frequently as a coordinator for the senior center’s cultural programs and to help organize community festivals that celebrate Cuban heritage.
