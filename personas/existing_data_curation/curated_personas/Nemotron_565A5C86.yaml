  hobbies: '[''Hiking among the San Francisco Peaks'', ''Birdwatching'', ''Nature photography'', ''Book club membership'', ''Knitting for charity'', ''Volunteer wellness facilitator at senior center'',
    ''Gentle yoga instruction'', ''Cooking Southwestern cuisine'', ''Visiting farmers’ markets'']'
  career_goals: Tracy aims to transition into a nurse educator role at a local community college or hospital training program, where she can share her practical knowledge and nurture the next generation
    of nurses. She also plans to obtain a Certified Diabetes Educator (CDE) credential and lead a diabetes self-management workshop series for seniors in Coconino County. Long-term, she aspires to become
    a patient-advocacy coordinator, shaping policies that improve access to care for underserved populations, while maintaining part-time clinical work to stay connected to bedside practice.
