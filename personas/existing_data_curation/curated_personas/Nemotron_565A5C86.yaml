personas:
  professional: Tracy Little, a veteran clinical nurse with three decades of acute and chronic care expertise, blends their curiosity for evidence‑based practice with a practical, patient‑centered approach
    as they mentor junior staff, lead multidisciplinary safety audits, and prepare to transition into a nurse educator role.
  sports: Tracy Little, an avid hiker who spends weekends traversing the San Francisco Peaks and a winter skier at Arizona Snowbowl, roots for the Arizona Diamondbacks and Arizona Cardinals, and they participate
    in a local Flagstaff hiking club and senior‑center yoga sessions to stay active.
  arts: Tracy Little, a dedicated member of a Flagstaff book club where they discuss works by Barbara Kingsolver and Cormac McCarthy, knits scarves inspired by vintage patterns while capturing desert‑mountain
    vistas in the style of Ansel Adams, and they enjoy listening to Bob Dylan on their evening walks.
  travel: Tracy Little favors low‑key road trips that blend hiking and cultural stops, having explored the Grand Canyon, Sedona red‑rock trails, and a weekend in Santa Fe for its art scene, while dreaming
    of a future trek through Patagonia’s wilderness and a relaxed beach stay in Oaxaca, and they plan each journey around a modest budget and occasional family commitments.
  culinary: Tracy Little, a competent home cook who delights in crafting southwestern dishes such as green‑chile enchiladas, prickly‑pear salsa, and mesquite‑flour cornbread with fresh ingredients from
    the Flagstaff farmers market, often experiments with roasted poblano peppers and locally sourced heirloom tomatoes, and they take pride in sharing these meals at community potlucks and senior‑center
    workshops.
  core: Tracy Little merges decades of bedside nursing with a restless curiosity, balancing community service, rugged outdoor pursuits, and a love of Southwest flavors while vigilantly managing their own
    health.
background:
  cultural: Tracy grew up in a middle‑class, predominantly white community in the Midwest, where values of self‑reliance, community service, and modest religious participation were emphasized. After moving
    to Flagstaff for work, she embraced the Southwest’s outdoor lifestyle and developed an appreciation for the region’s Native American heritage and environmental stewardship. Her cultural identity blends
    traditional American work ethic and caring ethos of the nursing profession with the collaborative, nature‑oriented spirit of her Arizona home.
attributes:
  skills: '[''Acute patient assessment'', ''Intravenous (IV) therapy'', ''Wound care and dressing'', ''Geriatric nursing'', ''Health education and counseling'', ''Electronic medical record (EMR) management'',
