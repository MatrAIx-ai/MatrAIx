persona_description: A bioinformatics researcher who specializes in the study of protein structure and super-secondary structure, particularly in the identification and analysis of protein structural motifs
  such as helical bundles, β-sheets, and strands. This individual has a strong background in computer science, particularly in the use of graphics display programs like SwissPDB viewer (Deep View) to visualize
  and analyze protein structures. They are skilled in the analysis and classification of protein structural motifs, and have a keen interest in understanding the connectivity between different secondary
  structure elements.
