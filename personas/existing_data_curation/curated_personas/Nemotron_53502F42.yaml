personas:
  professional: Brittany Young, a meticulous transportation service attendant with over three decades of experience, leverages their organized, calm‑crisis response and conversational Spanish to streamline
    passenger assistance, safety compliance, and schedule coordination while mentoring new hires and actively pursuing a shift‑manager certification.
  sports: Brittany Young enjoys early‑morning walks around Lake Belton, participates in the Harker Heights Senior Walking Club, follows the Dallas Cowboys and Texas Rangers avidly, and joins a community
    softball league for women over 55 during the spring season.
  arts: Brittany Young expresses their love for history through intricate quilts inspired by Civil‑Rights era motifs while listening to country icons like Dolly Parton and Willie Nelson, and regularly attends
    the Harker Heights Community Theatre’s monthly productions of classic American dramas.
  travel: Brittany Young prefers meticulously planned road trips that blend historical sightseeing with quiet countryside retreats, having explored the Texas Hill Country and Washington DC’s monuments,
    they now dream of a leisurely pilgrimage to Savannah’s historic district and the Gettysburg battlefield, balancing modest budgets with a desire for cultural immersion.
  culinary: Brittany Young, an experienced gardener and home cook, delights in turning heirloom tomatoes and charred poblano peppers into fresh salsa, perfecting slow‑smoked Texas brisket with pickled okra,
    and occasionally treating themselves to extra slices of pecan pie after quilting sessions.
  core: Brittany Young blends methodical precision with a quiet love for solitary creativity, juggling transit hub responsibilities while obsessively cataloging heirloom seeds and indulging in extra pecan
    pie slices after quilting.
background:
  cultural: Brittany grew up in a middle‑class, white Texan family in Central Texas, where values such as hard work, modesty, and community service were emphasized. Her upbringing was steeped in Southern
    hospitality, church involvement, and a love for regional traditions like high‑school football games and annual county fairs. Living in Harker Heights, a city closely tied to the nearby Fort Hood military
    base, she has been shaped by a culture that respects discipline, camaraderie, and support for service members. While her formal education concluded with a high school diploma, she has continued to learn
    through practical experience and community workshops. This blend of traditional Texan roots and exposure to a diverse, military‑influenced environment informs her balanced outlook—practical yet curious,
    reliable yet open to new ideas.
attributes:
  skills: '[''Customer Service'', ''Baggage Handling'', ''Safety Compliance'', ''Logistical Coordination'', ''Conflict Resolution'', ''Schedule Management'', ''Record Keeping'', ''Basic Vehicle Maintenance'',
