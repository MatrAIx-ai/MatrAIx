  hobbies: '[''Gardening'', ''Historical Reading'', ''Quilting'', ''Country Music'', ''Cooking'', ''Birdwatching'', ''Hiking'', ''Volunteering at Local Food Bank'', ''Book Club'', ''Church Activities'']'
  career_goals: Brittany’s primary professional ambition is to move into a supervisory or shift‑manager position within the transportation hub, where she can apply her methodical approach to improve workflow
    efficiency and staff development. She plans to obtain a certification in Transportation Management to formalize her expertise and to broaden her knowledge of emerging technologies such as automated
    check‑in kiosks. Long‑term, she hopes to transition into a community liaison role that connects local veterans and families with transportation resources, blending her practical skills with her desire
    to give back to the military‑supportive community of Harker Heights.
