persona_description: A researcher and published academic who specializes in the study of nature connection and its impact on mental and physical well-being. They have a deep understanding of the biopsychosocial
  variables and emotion regulatory processes contributing to the mental and physical well-being of individuals exposed to traumatic and stressful life events, as well as life-threatening medical and benign
  health conditions across the lifespan, including children and adults. They have a passion for understanding and working with and for people to find solutions to the endemic social problems we face as
  a society, and have a high-end capacity to build transdisciplinary networks across government, agencies, land managers, industry groups, community (urban/rural) and research and as aligned to legislative
  frameworks, policy and planning instruments.
