persona_description: An ophthalmologist who specializes in the treatment and management of vision loss, with a particular focus on providing hope and independence to visually impaired patients. They understand
  the importance of nonvisual skills in enhancing independence and productivity, and are committed to educating their patients and the public about the benefits of these skills. They recognize that vision
  loss is not a deficiency but a disability, and strive to empower their patients to achieve their full potential.
