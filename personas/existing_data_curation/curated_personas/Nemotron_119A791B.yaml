  career_goals: Although Jan is no longer part of the formal workforce, she aims to remain an active, self‑sufficient member of her community. Her primary ambition is to preserve her health and independence
    through regular exercise, balanced nutrition, and routine medical check‑ups. She also wishes to expand her volunteer leadership at the local senior center, mentoring newer volunteers and spearheading
    a seasonal outreach program for isolated residents. Additionally, Jan hopes to compile a family cookbook and a brief memoir, documenting cherished recipes and stories for future generations, thereby
    leaving a tangible legacy of her practical wisdom and family values.
