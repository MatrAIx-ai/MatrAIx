  hobbies: '[''softball league'', ''urban balcony gardening'', ''fusion cooking'', ''DIY home improvement'', ''hiking in Blue Hills'', ''participating in cultural festivals'', ''volunteering at community
    center'', ''attending sustainable building workshops'', ''language exchange meet‑ups'', ''trivia nights'']'
  career_goals: Over the next five years Tan aims to earn her state contractor’s license and become a certified LEED Green Associate, positioning herself to lead larger, sustainably focused renovation projects.
    She envisions expanding her current role into a full‑time site manager position, eventually launching her own boutique contracting firm that specializes in retrofitting historic homes in the Boston
    area. Mentorship is also a priority; she plans to develop a training program for apprentices, particularly targeting women and underrepresented minorities in the trades.
