  career_goals: Adia aims to secure a senior operations management position within a regional retail or logistics firm, overseeing multiple locations and driving enterprise‑wide efficiency programs. She
    plans to complete a bachelor's degree in Business Administration within the next two years and earn a Project Management Professional (PMP) certification to formalize her project leadership capabilities.
    In the long term, she aspires to become a director of operations, leading transformational initiatives such as automation of supply‑chain processes and implementing lean methodologies. She also envisions
    leveraging her competitive drive to be recognized as a top performer in corporate performance rankings, while mentoring other women in managerial roles.
