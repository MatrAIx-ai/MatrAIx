  career_goals: Yasin aims to move from sales associate to store manager within the next three years, focusing on building a supportive, well‑coordinated team culture. He plans to earn a retail management
    certification and eventually launch a community‑focused boutique that showcases local artisans while offering employment opportunities for under‑served candidates.
