persona_description: A landscape architect who specializes in erosion control and slope stabilization. They have a deep understanding of soil science, specifically the impact of soil depth, drainage, and
  microorganisms on soil quality. They are familiar with the use of compost as a soil amendment and its benefits in modifying soil properties, improving water-holding ability, and enhancing soil structure.
  They have experience with the selection of plants for erosion control, including the use of ornamental grasses for their variety of design ideas and options. They are skilled in tilling and modifying
  soil properties, and are familiar with the use of compost as a soil amendment to improve soil quality. They are also knowledgeable about the impact of different soil types on soil erosion and compaction,
  and are skilled in using compost as a soil amendment to mitigate these issues.
