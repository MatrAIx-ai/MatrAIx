  hobbies: '[''Gardening'', ''Korean home cooking'', ''Walking/hiking'', ''Historical fiction reading'', ''Calligraphy'', ''Small‑group cultural events'', ''Volunteering at senior center'', ''Listening
    to traditional Korean music'']'
  career_goals: Yiqing aims to transition into a lead‑operator or shift‑supervisor role where she can formalize her mentoring of newer staff and champion workplace‑safety improvements. She plans to obtain
    an OSHA 30‑hour certification and a Certified Production Technician (CPT) credential within the next two years. Her long‑term ambition is to serve as a safety coordinator or ergonomics specialist, helping
    the plant reduce injury rates while maintaining the reliable production schedules she values. She also seeks a stable work‑life balance that will allow a comfortable retirement in Orange County.
