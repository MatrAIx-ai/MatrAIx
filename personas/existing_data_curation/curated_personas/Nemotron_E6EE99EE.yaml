personas:
  professional: Yiqing Zheng is a veteran high‑speed packaging equipment operator in a large food‑processing plant, leveraging two decades of hands‑on expertise in preventive maintenance, technical schematics,
    and OSHA safety compliance to train new staff and drive continuous‑improvement, while eyeing a shift‑supervisor role that lets them formalize mentoring and champion ergonomic safety.
  sports: Yiqing Zheng enjoys regular walks on the Tustin Ranch trail and occasional bird‑watching hikes at Laguna Coast Wilderness Park, supports the Los Angeles Dodgers and Anaheim Ducks as a loyal fan,
    and participates in a senior‑friendly badminton league at the local community center.
  arts: Yiqing Zheng finds creative release in brush calligraphy, listening to traditional folk singer Lee Sun‑hee and the modern piano pieces of Yiruma, and occasionally attends a classical concert featuring
    Yo‑Yo Ma at the Segerstrom Center for the Arts.
  travel: Yiqing Zheng prefers low‑key, well‑planned trips that balance cultural immersion and relaxation, having visited the historic sites of Seoul and the citrus groves of Jeju Island, and dreaming of
    a future road‑trip through Napa Valley’s vineyards and a serene weekend on Catalina Island, all within a modest travel budget.
  culinary: Yiqing Zheng’s kitchen is a laboratory of Korean comfort food where they expertly ferment kimchi with gochugaru and napa cabbage, perfect bibimbap using fresh garden carrots, zucchini, and sesame‑oil‑glazed
    tofu, and grill bulgogi marinated in soy sauce, garlic, and pear, while also mastering a simple miso soup with tofu and seaweed for a balanced palate.
  core: Yiqing Zheng blends methodical precision at work with quiet garden meditation, channels heritage through kimchi making, and quietly strives for safety excellence while guarding a frugal retirement
    nest.
background:
  cultural: Yiqing is a first‑generation Korean American whose parents immigrated to Southern California in the 1970s. Raised in a bilingual household, she grew up speaking Korean at home while attending
    American schools, giving her a blended cultural perspective. Korean values of family loyalty, respect for elders, and communal harmony shape her considerate and cooperative nature. She celebrates Chuseok
    and Lunar New Year with her family, prepares traditional foods, and participates in the local Korean church. At the same time, her lifelong residence in Orange County has exposed her to diverse communities,
    encouraging a pragmatic, structured approach to work and daily life that aligns with both Korean and American influences.
attributes:
