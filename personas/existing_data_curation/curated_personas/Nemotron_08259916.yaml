  career_goals: Julius aims to transition into a senior leadership role, such as Director of the Project Management Office, where he can institutionalize best‑practice standards across the organization.
    He plans to attain PMI‑PgMP certification to solidify his credentials and mentor emerging project managers, creating a legacy of structured, high‑performing teams. Over the next five years, he envisions
    spearheading large‑scale infrastructure initiatives that improve regional resilience, while also streamlining internal processes to reduce stress‑inducing variables for his team. Ultimately, he hopes
    to retire with a robust, documented project framework that continues to deliver value long after his departure.
