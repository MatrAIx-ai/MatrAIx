personas:
  professional: Leocadio Riverafigueroa is a high‑performing claims adjuster and investigator who leverages meticulous risk assessment, Xactimate expertise, and a competitive, routine‑driven mindset to
    consistently rank among the top of their team while maintaining calm under pressure.
  sports: Leocadio Riverafigueroa plays forward for a local amateur soccer league, roots for the LA Galaxy, catches early‑morning surf sessions at Pacific Beach with the Pacific Surfers Club, and visits
    the gym twice a week to sustain flexibility for both sports.
  arts: Leocadio Riverafigueroa unwinds with classic rock albums from The Rolling Stones, dives into mystery novels by Agatha Christie, sharpens strategic thinking through weekly chess matches at a downtown
    café, and admires vibrant mural art that decorates city walls.
  travel: Leocadio Riverafigueroa prefers short, meticulously planned getaways, such as weekend trips to the Baja coastline, annual hikes in Yosemite National Park, and a future culinary tour of Southwest
    markets once they've saved enough for the journey.
  culinary: Leocadio Riverafigueroa is a confident home cook who masters mole sauce, hand‑rolled tacos with chipotle‑marinated pork, and fresh salsa verde, often sourcing heirloom chilies and corn masa
    from local farmers’ markets to serve family gatherings.
  core: Leocadio Riverafigueroa blends methodical routine with competitive drive, balancing claim investigations, surf sessions, chess strategy, and a disciplined financial plan while occasionally succumbing
    to DIY tool splurges and lower‑back aches.
background:
  cultural: Leocadio is a second-generation Mexican-American raised in a bilingual household in San Diego. Spanish was spoken at home, and he observed Mexican traditions such as Día de los Muertos, Las
    Posadas, and family-centered celebrations of birthdays and holidays. His Catholic upbringing emphasized respect for family elders and community involvement, though he approaches cultural practices with
    a practical mindset. He maintains close ties with his extended family, often gathering for shared meals where he showcases his cooking skills. The vibrant Latino community in San Diego, as well as the
    city's multicultural environment, influence his social circle and inform his appreciation for both Hispanic heritage and American professional standards.
attributes:
  skills: '[''Claims investigation'', ''Damage appraisal'', ''Risk assessment'', ''Negotiation'', ''Report writing'', ''Customer service'', ''Insurance policy interpretation'', ''Data analysis (Excel, SQL)'',
