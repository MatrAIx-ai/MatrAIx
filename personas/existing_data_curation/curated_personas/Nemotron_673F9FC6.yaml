  hobbies: '[''Playing soccer in the local amateur league'', ''Surfing at Pacific Beach'', ''Cooking traditional Mexican dishes'', ''DIY home improvement projects'', ''Reading crime novels'', ''Strategic
    board games like chess'']'
  career_goals: Leocadio aims to become a senior claims supervisor within the next three to five years, focusing on large-commercial property claims. He plans to earn the Chartered Property Casualty Underwriter
    (CPCU) designation and pursue additional certifications in loss mitigation and fraud detection. Over the longer term, he aspires to lead a regional claims department or launch his own consultancy that
    helps insurers improve claim-handling efficiency. Throughout his advancement, he seeks to maintain a steady routine, set measurable performance targets, and secure a work-life balance that supports
    his young family.
