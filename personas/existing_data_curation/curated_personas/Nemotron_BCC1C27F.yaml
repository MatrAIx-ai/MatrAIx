    Asana)'', ''Data Visualization (Excel PivotTables, Tableau)'']'
  hobbies: '[''Visiting local art galleries'', ''Sketching and watercolor painting'', ''Reading speculative fiction and philosophy'', ''Hiking and wildlife photography in the Bighorn Mountains'', ''Bullet
    journaling and planner customization'', ''Learning basic web design'', ''Participating in small book clubs'', ''Practicing yoga and mindfulness meditation'', ''Knitting'', ''Cooking regional cuisine'']'
  career_goals: Margaret aims to advance to a senior management or director of operations role within the next five years, driving efficiency and growth for a regional retailer or a small chain of stores
    in Wyoming. She plans to pursue an MBA with a focus on entrepreneurship and sustainability, using the knowledge to launch her own boutique that combines a coffee shop, coworking space, and local art
    gallery, serving as a cultural hub in Worland. She is committed to integrating innovative technologies—such as inventory automation, advanced analytics, and digital marketing tools—to increase profitability
    while maintaining the high standards she sets for herself. Long‑term, she hopes to mentor other young professionals, champion mental‑health‑friendly workplace policies, and contribute to the economic
    diversification of Hot Springs County.
