personas:
  professional: A budding problem‑solver who loves organizing blocks and mimicking adult tasks, Sook Yi already displays methodical planning, compassionate cooperation, and a cautious curiosity that hint
    at future potential as an engineer or caregiver.
  sports: A playground devotee who adores swinging on the jungle‑gym and kicking a soft foam ball, Sook Yi proudly chants for the local baseball team the City Runners while joining the kindergarten’s mini‑soccer
    club every fall.
  arts: A small‑screen movie lover who repeatedly watches the Pixar film Finding Nemo and sings along to the Sesame Street theme, Sook Yi delights in drawing stick‑figure families inspired by Dr Seuss books
    and claps enthusiastically during Randy Newman piano performances.
  travel: An inquisitive wanderer who enjoys short stroller rides to the nearby zoo and day trips to the seaside boardwalk, Sook Yi dreams of a family vacation to Tokyo’s cherry‑blossom park and keeps a
    crayon‑drawn map of visited places on the fridge.
  culinary: A picky eater who prefers banana slices, mild chicken noodle soup, and cheesy macaroni, Sook Yi helps stir with a plastic spoon, insists on bright‑colored plates, and refuses foods with hidden
    vegetables.
  core: A methodical, compassionate two‑year‑old named Sook Yi who balances curiosity with cautious practicality, treasures routine, and quietly worries about the small uncertainties of toddler life.
background:
  cultural: Sook’s family maintains strong East Asian roots while living in Sacramento. Her parents are first‑generation immigrants who speak both English and Korean at home, celebrate Lunar New Year with
    traditional foods and customs, and encourage modesty, respect for elders, and academic diligence. Growing up in a multicultural American setting, she blends these cultural values with the open, community‑focused
    environment of her neighborhood, resulting in a balanced identity that honors her heritage and embraces her local surroundings.
attributes:
  skills: '[''basic vocabulary of ~200 words'', ''understands and follows two-step instructions'', ''fine-motor coordination for stacking blocks and coloring'', ''recognises primary colors and sorts objects
    by size/shape'', ''shows early empathy by sharing toys and comforting peers'', ''maintains simple daily routines (e.g., tidying toys)'', ''balances on a tricycle and walks independently'', ''identifies
    familiar letters and numbers'']'
  hobbies: '[''building block construction'', ''sorting and matching games'', ''listening to picture-book storytime'', ''quiet cooperative puzzles'', ''simple kitchen assistance (stirring, washing veggies)'',
    ''singing and dancing to gentle nursery rhymes'', ''exploring nature in small garden patches'']'
  career_goals: As she matures, Sook hopes to channel her compassionate nature into a helping profession. She envisions becoming a pediatric nurse or early‑childhood educator, roles that combine her love
    for routine, her desire to maintain harmony, and her wish to support the wellbeing of other children. She is motivated to master reading and writing to communicate effectively and to continue developing
    her organizational skills for future academic and career success.
