  hobbies: '[''Reading contemporary fiction'', ''Solo hiking on Willamette Valley trails'', ''Landscape photography'', ''Model kit building'', ''Experimental cooking'', ''Single‑player strategy video games'',
    ''True‑crime podcasts'', ''Indoor herb gardening'']'
  career_goals: Tyler aims to leverage his practical experience and organizational strengths to advance into supervisory positions within the facilities management sector. In the next five years, he hopes
    to become a lead housekeeper or facility coordinator at a large institution such as Oregon State University, where he can implement efficient cleaning systems and mentor new staff. Long‑term, he envisions
    starting his own environmentally‑focused cleaning business that uses sustainable products and offers reliable, high‑quality services to the Corvallis community.
