    ''Budgeting and Financial Planning'', ''Staff Training and Mentorship'', ''Quality Assurance and Continuous Improvement'']'
  hobbies: '[''Coastal Hiking'', ''Nature Photography'', ''Yoga'', ''Reading (non-fiction, leadership, psychology)'', ''Cooking (Mediterranean cuisine)'', ''Puzzle Solving (crosswords, sudoku)'', ''Volunteer
    health‑literacy workshops'', ''Attending sonography conferences and workshops'']'
  career_goals: As she approaches her mid‑forties, Peggy Anne aims to transition from a senior sonographer role to a leadership position within her department. She is pursuing certification as an Advanced
    Registered Vascular Technologist and plans to obtain a Master's in Health Administration within the next three years. Her ambition is to become an Ultrasound Services Manager, where she can integrate
    her business acumen to drive cost‑effective, patient‑centered care. She also envisions spearheading a pilot program that incorporates AI‑assisted image analysis to enhance diagnostic accuracy. Long‑term,
    she hopes to mentor emerging sonographers, contribute to professional guidelines, and eventually establish a boutique imaging clinic that balances high‑tech services with personalized patient interaction.
