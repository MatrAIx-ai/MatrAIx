personas:
  professional: Cecilia Khanna, a seasoned community business manager celebrated for her disciplined project planning, budget mastery, and talent for rallying cross‑functional teams around cultural events,
    now channels her operational expertise toward mentoring emerging women leaders while laying the groundwork for a heritage‑focused arts and sustainability hub.
  sports: Cecilia Khanna, an enthusiastic hiker who conquers the volcano‑rim trails with the Hilo Hiking Club, follows the Hawaii Volcanoes FC soccer team, supports the University of Hawaii Rainbow Warriors
    during football season, and balances her love of the outdoors with weekly tai chi sessions at the local community center.
  arts: Cecilia Khanna, a watercolor painter and pottery hobbyist who volunteers to curate community art exhibits, draws inspiration from the vibrant works of Larry Bell and contemporary local storyteller
    Kiana Kelemen, regularly participates in Hilo Little Theatre productions, and fills her leisure hours with the soulful melodies of Israel Kamakawiwo'ole and the breezy tunes of Jack Johnson.
  travel: Cecilia Khanna, a seasoned traveler who meticulously plans trips yet leaves room for spontaneous detours, has trekked the Kilauea summit, driven the winding Hana Highway on Maui, explored the
    lavender fields of Provence, wandered Kyoto’s historic temples, and now dreams of visiting the ancient stone circles of Rapa Nui while balancing travel costs with her community‑centric budget.
  culinary: Cecilia Khanna, a culinary enthusiast who loves preparing traditional luau fare such as kalua pork, lomi salmon, poi, and taro dumplings, blends coconut milk, fresh ginger, and macadamia nuts
    into inventive side dishes, enjoys experimenting with global flavors for family gatherings, and proudly claims a modest but ever‑growing collection of heirloom spice jars.
  core: Cecilia Khanna, a disciplined community advocate whose curiosity drives her to blend cultural stewardship, meticulous organization, and a love for the arts into a legacy of mentorship, sustainable
    projects, and vibrant island life.
background:
  cultural: Cecilia is a Native Hawaiian / Pacific Islander whose upbringing on the Big Island immersed her in the values of ʻohana (family), kuleana (responsibility), and deep respect for ʻāina (land).
    While her family roots are tied to traditional practices such as hula, storytelling, and taro cultivation, she has also embraced the multicultural influences of modern Hawaii, including contemporary
    art, music, and global cuisine. Her Pacific Islander heritage informs her collaborative approach, reverence for community well‑being, and commitment to preserving cultural heritage while welcoming new
    ideas.
