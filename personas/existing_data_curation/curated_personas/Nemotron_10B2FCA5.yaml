  hobbies: '["Watercolor painting", "Poetry writing", "Garden cultivation (native wildflowers)", "Reading speculative fiction and philosophy", "Listening to folk and bluegrass music", "Quilting with abstract
    patterns", "Hiking in local nature trails", "Community storytelling evenings", "Senior book club participation"]'
  career_goals: Robin aims to deepen her artistic practice and share her vision with her community. Over the next few years she hopes to organize a solo exhibition of her paintings at the Hardin County
    Library, compile and self‑publish a small collection of her poems and local stories, and establish a monthly seniors' art‑and‑storytelling circle at the community center. She also wishes to continue
    expanding her knowledge of abstract concepts through online courses in philosophy and modern art, and to mentor younger artists by offering informal critique sessions. Maintaining independence and health
    remains a primary goal, as does preserving and documenting the cultural heritage of Savannah and surrounding areas.
