personas:
  professional: Robin Foreman, a retired schoolteacher turned community arts facilitator, channels a lifelong curiosity into watercolor painting, oral‑history research, and workshop leadership, balancing
    a relaxed, improvisational style with an assertive push to share local stories.
  sports: Robin Foreman stays active by strolling the Tennessee River trail, joining the Hardin County Hiking Club for weekend treks, cheering on the Tennessee Volunteers basketball team in winter and the
    Nashville Predators during hockey season, and dedicating a light yoga routine each morning to ease their osteoarthritis.
  arts: Robin Foreman immerses themselves in folk and bluegrass sounds from Doc Watson, Gillian Welch, and The Avett Brothers, draws inspiration from watercolor masters like Andrew Wyeth, participates in
    community theater narrations, and delights in the poetry of Mary Oliver and the speculative fiction of Octavia Butler.
  travel: Robin Foreman prefers spontaneous day trips over elaborate itineraries, often exploring nearby Great Smoky Mountains, historic Natchez, and the river towns of Tennessee, while dreaming of a leisurely
    pilgrimage to the lavender fields of Provence and the misty highlands of Scotland when health permits.
  culinary: Robin Foreman, a confident home cook, whips up Southern comfort dishes like crispy fried catfish, buttery cornbread, and herb‑infused chicken soup seasoned with garden thyme and sage, while
    experimenting with wildflower honey glazes and improvising recipes that weave in fresh mint, dill, and edible violets.
  core: Robin Foreman is a whimsical, curiosity‑driven elder who blends artistic spontaneity with community storytelling, navigating life’s quirks and occasional disorganization through a steadfast love
    of nature, craft, and modest independence.
background:
  cultural: Robin grew up in the rural South of Tennessee, immersed in the traditions of Appalachian folk culture. Her upbringing was shaped by close‑knit community values, Southern hospitality, and a strong
    connection to the land. She was raised in a family that valued storytelling, church gatherings, and seasonal celebrations tied to agricultural cycles. These experiences cultivated her appreciation for
    handcrafted arts such as quilting and folk music, and instilled a sense of place that informs her creative work. Despite being of White ethnic background, she embraces the nuanced cultural heritage
    of Hardin County, including its Civil War history, local dialects, and culinary traditions.
attributes:
  skills: '["Watercolor painting", "Poetry writing", "Genealogical research", "Local history documentation", "Gardening (native plants)", "Southern cooking (improvisational)", "Facilitating community art
