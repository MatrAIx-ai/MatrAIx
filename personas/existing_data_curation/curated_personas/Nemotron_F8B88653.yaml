personas:
  professional: Imelda Grant, a budding architect‑in‑training, assembles LEGO structures from detailed sketches, applies their methodical, rule‑following nature to ensure every brick aligns perfectly, and
    eagerly plans future building projects with the same precision they use in daily routines.
  sports: Imelda Grant, a lively park enthusiast, swings vigorously at the local playground, participates enthusiastically in organized games like Red Light, Green Light, roots for the hometown baseball
    squad the Springfield Stingers, and attends beginner soccer drills with the community kids' club, blending their love for clear rules with a competitive edge.
  arts: Imelda Grant, a meticulous young artist, colors within the lines of picture books using bright palettes inspired by Eric Carle and Dr. Seuss, constructs miniature LEGO scenes as three‑dimensional
    storytelling, and delights in singing Spanish lullabies such as 'La Vaca Lola' during family gatherings, reflecting a structured yet colorful creative spirit.
  travel: Imelda Grant, an inquisitive mini‑traveler, has enjoyed family trips to a lakeside cabin, explored the nearby zoo and a coastal beach, dreams of visiting the vibrant mosaics of Barcelona and the
    towering redreds of California, and prefers itineraries that include clear schedules and familiar songs for comfort.
  culinary: Imelda Grant, an eager kitchen assistant, loves preparing colorful fruit salads with strawberries, mango, and kiwi, assembles simple tacos with shredded cheese and mild salsa, proudly makes
    peanut‑butter‑banana sandwiches, yet often forgets to wash their hands before cooking, revealing a blend of enthusiasm and occasional oversight.
  core: Imelda Grant is a rule‑loving, methodical builder who channels bright creative energy into LEGO and coloring while maintaining a competitive streak, careful savings habit, and a proactive yet skeptical
    approach to health and play.
background:
  cultural: Imelda comes from a mixed Latin American and Indigenous heritage. Her paternal grandparents trace their roots to a rural community in Mexico where they preserved traditions of the Nahua people,
    while her maternal side includes Quechua ancestors from Peru. Growing up in Bristow, Virginia, Imelda’s family maintains Spanish at home and celebrates cultural holidays such as Día de los Muertos with
    altars and marigold decorations, and the Andean harvest festival with music and traditional dishes. She also participates in local Indigenous cultural events organized by Prince William County, learning
    about traditional crafts like weaving and storytelling. This blend of Latin and Indigenous customs shapes her worldview, encouraging respect for family, community, and the natural world.
attributes:
  skills: '["Following daily routines", "Organizing personal belongings", "Reading simple picture books", "Counting to 100", "Basic addition and subtraction", "Solving puzzles", "Assembling LEGO sets",
