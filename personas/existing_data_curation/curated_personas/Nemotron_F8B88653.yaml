  hobbies: '["Building LEGO structures", "Coloring and drawing", "Reading picture books", "Playing organized games (Simon Says, Red Light Green Light)", "Learning Spanish songs", "Listening to indigenous
    stories", "Swinging at the park", "Collecting stickers", "Helping with simple cooking"]'
  career_goals: Imelda dreams of becoming a teacher or a community helper when she grows up, because she enjoys explaining things clearly and helping others learn. She often imagines herself in a classroom,
    organizing lessons and assisting classmates with new topics. She is also intrigued by the idea of being a police officer or firefighter, attracted to the clear rules, structure, and the chance to protect
    her community. Her short‑term goal is to succeed in kindergarten, strengthen her reading and math skills, and build a solid foundation for future studies.
