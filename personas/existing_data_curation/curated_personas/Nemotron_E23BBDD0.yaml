  hobbies: '[''Gardening (heirloom vegetables, wildflowers)'', ''Reading historical fiction and biographies'', ''Birdwatching'', ''Cooking (traditional and experimental recipes)'', ''Quilting and knitting'',
    ''Pottery (beginner)'', ''Genealogy research'', ''Volunteer work at senior center'']'
  career_goals: Although retired from formal employment, Kimberly aims to deepen her engagement with community life and preserve her family’s story. She plans to compile a detailed genealogy and memoir
    for her grandchildren, host a monthly quilting circle at the senior center, and mentor younger volunteers in event planning. She also hopes to learn a new craft—pottery—by taking a weekend class at
    a nearby community college. Maintaining her health and independence so she can support her husband and continue her social contributions remains a central ambition.
