persona_description: A UN official responsible for promoting and enforcing the laws and regulations related to wildlife trafficking and conservation, specifically focusing on the use and conservation of
  species listed on the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) and the Convention on Biological Diversity (CBD). This official is part of a joint CMS/CITES
  Programme Officer position created by the Government of Germany and aims to ensure sustainable use and conservation of species listed on their appendices. The official has expertise in the interplay between
  the supply and demand sides of the trade equation, recognizing the key role played by multi-lateral environment agreements, including CITES, the intergovernmental treaty that governs international trade
  in endangered species of animals and plants, and CMS, CBD, and the Ramsar Convention. The official is responsible for monitoring and enforcing the laws and regulations related to wildlife trafficking
  and conservation, and working closely with other international organizations, including CITES and the UNEP, to address the issue of wildlife crime.
