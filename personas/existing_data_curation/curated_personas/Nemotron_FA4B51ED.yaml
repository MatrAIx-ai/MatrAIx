  career_goals: Although she is no longer part of the formal workforce, Maribel remains driven by a desire to enrich her community and preserve her cultural heritage. She aims to compile and self‑publish
    a handwritten cookbook that intertwines family recipes, practical cooking tips for the Arizona climate, and personal stories from her life. She also aspires to become a regular storyteller at the Benson
    community center, sharing Mexican folklore and oral histories with younger generations. Additionally, Maribel wishes to lead a neighborhood “heritage garden” project that showcases native Mexican plants,
    providing an educational space and fostering community pride. Her long‑term ambition is to be remembered as a cultural bridge who nurtured both the culinary and social fabric of her town.
