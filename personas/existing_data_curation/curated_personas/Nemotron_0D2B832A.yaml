  hobbies: '[''Running and Marathon Training'', ''Weightlifting'', ''Basketball'', ''Cooking (soul food and Caribbean cuisine)'', ''Hiking in local parks'', ''Cycling'', ''Reading science fiction and medical
    journals'', ''Community volunteering (youth mentorship)'', ''Listening to and creating hip hop music'', ''Photography'']'
  career_goals: Rik aims to advance into a supervisory role within the Neshanic Station EMS department, eventually becoming a shift commander or operations manager. He plans to pursue a bachelor’s degree
    in Emergency Management to blend his curiosity for new technologies with proven emergency response practices. Long‑term, he hopes to become an EMS instructor and develop data‑driven community outreach
    initiatives that improve response times and health outcomes for marginalized populations in Somerset County. He is also interested in integrating telemedicine tools into pre‑hospital care to enhance
    patient assessment capabilities.
