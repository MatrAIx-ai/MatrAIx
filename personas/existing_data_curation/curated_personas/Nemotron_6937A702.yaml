  career_goals: Even though she is retired, Jasmine aims to leave a lasting artistic and cultural legacy in Gastonia. She plans to compile a memoir and a poetry collection that reflect her life experiences
    and the African American history of her region. She aspires to curate a traveling community mural that highlights local stories, secure small arts grants to fund workshops for senior citizens, and mentor
    emerging artists through a weekly art class at the local library. Additionally, she hopes to launch an online portfolio and boutique to sell her handcrafted jewelry and prints, using the platform to
    promote cultural awareness.
