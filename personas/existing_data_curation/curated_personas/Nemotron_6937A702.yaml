personas:
  professional: Jasmine Favor, a retired community arts facilitator, channels her acrylic painting, digital illustration, grant-writing acumen, and genealogical research into curating traveling murals that
    celebrate local stories, securing arts funding through competitive proposals, and mentoring senior artists in weekly library workshops, all driven by her vivid imagination and disciplined organization.
  sports: Jasmine Favor, an avid supporter of the Charlotte Hornets and Charlotte FC, participates in a weekly senior walking group at the Gastonia Community Center, practices gentle tai chi at the local
    Y, and occasionally joins a low-key pickleball league, maintaining a balanced fitness routine that complements her garden work.
  arts: Jasmine Favor, a prolific painter and poet, draws creative fuel from the vibrant palettes of Frida Kahlo, the gestural energy of Jackson Pollock, and the improvisational soul of Miles Davis and
    Mahalia Jackson, regularly attends productions at the Gastonia Community Theatre, and cites actors Viola Davis and Tom Hanks as narrative inspirations.
  travel: Jasmine Favor, who prefers meticulously planned cultural trips, has toured historic Charleston, Savannah, and Washington, D.C., day trips to the Blue Ridge Mountains for sketching, and dreams
    of an extended artist residency in Provence, France, all while balancing her travel aspirations with a restrained retirement budget.
  culinary: Jasmine Favor, an experimental home cook, fuses Southern classics like shrimp and grits with global twists such as Korean gochujang-infused collard greens and Moroccan harissa-spiced fried catfish,
    frequently incorporating heirloom tomatoes, sweet potatoes, and fresh lavender from her garden into inventive dishes.
  core: Jasmine Favor, a fiercely curious septuagenarian, juggles a garden laboratory, a buzzing art studio, and a calendar full of community projects, often leaving paintbrushes in the sink as a testament
    to her habit of overcommitting.
background:
  cultural: Jasmine is rooted in the rich African American heritage of the American South. Growing up during the civil‑rights era in North Carolina, she carries forward a legacy of storytelling, church
    community, and resilience. Her family traditions include gospel singing, soulful cooking, and oral histories that celebrate ancestors who migrated from the rural South during the Great Migration. She
    remains actively involved in her local Black church, participates in annual Juneteenth celebrations, and contributes to community projects that preserve and share African American cultural histories
    in Gaston County.
