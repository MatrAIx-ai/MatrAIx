persona_description: A marine biologist and oceanographer who specializes in studying the effects of toxic algae blooms on wildlife and human health along the California coast. The individual is leading
  a five-year study to determine the causes and effects of the recent increase in such blooms, including the role of Pseudo-nitzschia, a diatom that produces domoic acid. The scientist is working with a
  team of researchers from various institutions, including UCLA, the University of Southern California, and NOAA, to monitor the conditions in Monterey Bay and along the San Pedro Shelf and to determine
  if climate change is affecting the size, frequency, and location of these blooms.
