  career_goals: In the short term, James aims to earn a Professional Scrum Master certification and complete an MBA with a focus on sustainable supply chain management, positioning himself to lead larger,
    cross‑functional logistics initiatives. He wants to pilot an AI‑driven demand forecasting system at his current company, demonstrating measurable cost reductions and service improvements. Over the next
    five to ten years, his ambition is to advance to Director of Supply Chain Operations, spearheading organization‑wide sustainability programs that reduce carbon emissions from transportation and warehousing.
    Ultimately, he envisions launching his own consultancy that helps mid‑size firms build resilient, technology‑enabled distribution networks while fostering employee well‑being, reflecting his commitment
    to both operational excellence and compassionate leadership.
