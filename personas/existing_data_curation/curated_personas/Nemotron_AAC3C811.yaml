  career_goals: Looking to re‑enter the workforce on a flexible basis, Joshua aims to leverage his educational background by becoming a part‑time tutor or curriculum consultant for local community colleges
    and non‑profit organizations. He plans to obtain a certification in community education to enhance his credentials. In the longer term, he hopes to launch a community‑based after‑school enrichment program
    in Hagerstown that blends STEM learning with hands‑on projects like woodworking and gardening, providing mentorship for at‑risk youth. Additionally, he aspires to continue expanding his volunteer leadership,
    potentially directing a city‑wide senior‑citizen activity program.
