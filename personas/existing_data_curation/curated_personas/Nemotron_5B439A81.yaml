personas:
  professional: Elizabeth Adams, a licensed practical nurse in a bustling rural clinic, excels at patient assessment, meticulous EMR documentation, and calm emergency response, channeling her organized,
    curiosity‑driven nature into structured care plans and proactive community health initiatives.
  sports: Elizabeth Adams embraces early‑morning hikes on the Texas Hill Country trails, joins the Fort Worth Hiking Club for weekend treks, supports the Dallas Cowboys in football season, and attends Texas
    Rangers games in summer, balancing moderate cardio routines with occasional yoga classes to stay limber.
  arts: Elizabeth Adams weaves crochet blankets for patients while humming folk tunes by Bob Dylan and Joni Mitchell around campfires, indulges in historical fiction by Ken Follett and medical nonfiction
    by Atul Gawande, and regularly visits the Fort Worth Art Center to admire works by Texas painter Julian Onderdonk.
  travel: Elizabeth Adams plans concise weekend getaways on a tight budget, favoring outdoor adventures such as a sunrise hike in Big Bend National Park, a cultural weekend in Santa Fe, New Mexico, and
    a nostalgic visit to her grandparents’ farm in Erath County, while dreaming of a future backpacking trip across the Scottish Highlands.
  culinary: Elizabeth Adams cooks family‑style meals with a modest flair, frequently preparing chicken and dumplings, brisket chili with home‑grown jalapeños, and roasted vegetable medleys seasoned with
    rosemary and thyme, showcasing an intermediate skill level that blends garden harvests with classic Southern comfort.
  core: Elizabeth Adams blends practical nursing precision with a curious love for gardening, acoustic guitar, and crochet, yet occasionally forgets to water their plants during night shifts, embodying
    a kind, organized soul who balances community care with personal creativity.
background:
  cultural: Elizabeth was raised in a middle‑class, white family in Dublin, Texas, steeped in Southern hospitality and modest, community‑oriented values. Her upbringing in a Methodist congregation emphasized
    service, respect for tradition, and self‑reliance, while her participation in 4‑H clubs and local fairs fostered a practical curiosity about the world. This blend of rural Texan heritage and supportive
    family encouragement shapes her cooperative nature, organized work ethic, and balanced approach to new ideas and established methods.
attributes:
  skills: '[''Patient assessment'', ''Vital‑sign monitoring'', ''Medication administration'', ''Wound care'', ''Basic IV assistance'', ''Electronic medical record documentation'', ''Infection‑control protocol
