  hobbies: '[''Hiking'', ''Gardening'', ''Bird‑watching'', ''Cooking'', ''Reading historical fiction'', ''Reading medical nonfiction'', ''Volunteering at senior center'', ''Church community activities'',
    ''Crocheting'', ''Acoustic guitar'', ''Journaling'']'
  career_goals: Elizabeth aims to transition to a Registered Nurse role by completing an RN program within the next two years, with a focus on community health nursing. She aspires to earn certifications
    in wound care and geriatric nursing, eventually becoming a charge nurse in a rural clinic. Long‑term, she envisions leading health‑promotion initiatives in Erath County and possibly pursuing a BSN to
    qualify for a nurse‑educator position, combining her curiosity for new evidence‑based practices with a practical desire to improve local patient outcomes.
