personas:
  professional: Amber Johnson balances a bustling waitstaff role at a Buffalo downtown eatery with a burgeoning talent for community event organization, using their quick‑thinking communication, keen upselling
    instincts, and natural charisma to keep guests happy while secretly dreaming of managing a youth‑focused café.
  sports: Amber Johnson is a die‑hard Buffalo Bills and Sabres supporter who rarely misses a home game, joins pick‑up basketball at a local park, and channels that team spirit into spontaneous flash‑mob
    dances at halftime.
  arts: Amber Johnson grooves to R&B legends like H.E.R. and Anderson .Paak, showcases their vocal flair at open‑mic nights, curates fashion‑forward Instagram reels featuring local street art, and draws
    inspiration from the soulful storytelling of artists such as Alicia Keys.
  travel: Amber Johnson loves spontaneous road trips to Niagara Falls and the Adirondacks, planning only the basics—fuel, playlists, and a budget for cheap motels—while preferring to discover hidden diners
    and thrift stores along the way.
  culinary: Amber Johnson experiments with simple dishes like spicy buffalo chicken wraps, avocado toast, and homemade banana pancakes, relying on YouTube tutorials and a well‑worn spice rack, but they
    often over‑salty their sauces in the excitement of cooking for friends.
  core: Amber Johnson is a charismatic, community‑driven 18‑year‑old who juggles wait‑staff hustle, spontaneous dancing, and a dream of a youth‑focused café, all while battling occasional budget chaos and
    a love for late‑night snack experiments.
background:
  cultural: Amber grew up in Buffalo's historic African‑American neighborhoods, where church gatherings, family barbecues, and community festivals have shaped her identity. Her family values the resilience
    and solidarity inherited from generations who moved north during the Great Migration. She cherishes traditions like celebrating Juneteenth with her extended family and participating in local Black cultural
    events such as the Buffalo African‑American Heritage Parade. These experiences have fostered a strong sense of pride in her Black heritage, influencing her compassionate outlook and desire to give back
    to the community that supported her upbringing.
