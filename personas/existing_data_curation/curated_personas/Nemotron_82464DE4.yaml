  career_goals: Amber aims to leverage her hospitality experience into a degree in Hospitality Management or Community Development at a local college, with the long‑term ambition of becoming a restaurant
    manager who runs a community‑focused café that offers job training for local youth. She also envisions volunteering as a mentor for younger high‑school students, using her compassionate nature to promote
    academic success and healthy lifestyle choices. In the next five years she hopes to combine her love for people‑centered service with formal training to eventually lead a nonprofit that provides meals
    and career workshops to underserved families in Buffalo.
