personas:
  professional: Codey Sonnier is a self‑taught digital media creator who blends graphic‑design, video editing, and community‑event coordination to produce vibrant promotional materials for local nonprofits,
    leveraging their curiosity, sociable charm, and flexible organization to turn street‑art insights into compelling visual stories.
  sports: Codey Sonnier spikes a ball in weekly pick‑up games with the Suffolk Street Hoops crew, cheers for the New York Knicks on game nights, and joins the East End Trailblazers for weekend hikes through
    the Pine Barrens and Montauk Point, balancing competitive play with low‑key nature treks.
  arts: Codey Sonnier roams the alleys of their hometown seeking fresh murals, draws inspiration from Banksy and Shepard Fairey, captures urban textures on a DSLR, strums acoustic renditions of Bon Iver
    at open‑mic nights, and regularly watches Greta Gerwig films while deconstructing narrative beats in indie games like Celeste.
  travel: Codey Sonnier favors spontaneous weekend road trips to Atlantic City’s boardwalk, the historic charm of Beacon, NY, and coastal hikes in the Hamptons, while dreaming of a spring pilgrimage to
    Berlin’s street‑art festivals and a summer surf session in Puerto Rico when finances finally allow.
  culinary: Codey Sonnier experiments in the kitchen, perfecting avocado toast with micro‑greens, whipping up homemade ramen broth infused with miso, and mastering the smoky char of grilled tacos al pastor,
    yet they have a habit of over‑seasoning and often end up ordering late‑night pizza after a long editing session.
  core: Codey Sonnier is a curiosity‑driven, community‑oriented creative who balances freelance design hustle with spontaneous street‑art wanders, often overcommitting to projects yet never missing a chance
    to strum an acoustic chord at a local open‑mic.
background:
  cultural: Raised in Central Islip, a suburb on Long Island’s Suffolk County, Codey grew up in a working‑class white family with roots in the region’s Italian‑American and Irish‑American communities. His
    childhood was shaped by the patchwork of suburban life – public school experiences, neighborhood block parties, local parks, and the nearby Atlantic shoreline. The multicultural makeup of Central Islip
    exposed him to a variety of cultural expressions, from Caribbean music at community fairs to mural projects in nearby neighborhoods, fostering his openness to diverse artistic forms. Family gatherings
    emphasized practical values, self‑reliance, and community support, while his parents encouraged curiosity and hands‑on learning. This blend of suburban Mid‑Atlantic culture and exposure to the broader
    New York metropolitan arts scene informs his appreciation for both traditional and contemporary creative expressions.
attributes:
  skills: '[''Interpersonal communication'', ''Community event planning'', ''Basic graphic design (Canva, Photoshop)'', ''Video editing (iMovie, CapCut)'', ''Social media content creation'', ''Photography'',
