  hobbies: '[''Street art exploration'', ''Photography'', ''Acoustic guitar playing'', ''Live music attendance'', ''Pick‑up basketball'', ''Weekend hiking'', ''Open‑mic nights'', ''Community festivals'',
    ''Cooking'', ''Indie video gaming'', ''Tabletop role‑playing games'']'
  career_goals: In the short term, Codey aims to earn his GED and complete short certifications in digital media and community‑arts programming. He wants to turn his self‑taught design and video‑editing
    abilities into a part‑time freelance gig creating promotional materials for local small businesses and non‑profits. Long‑term, he envisions a role as an arts and outreach coordinator at a community
    center or cultural nonprofit in Suffolk County, where he can design and run workshops, public‑art projects, and youth mentorship programs. He also hopes to eventually launch a pop‑up gallery‑café that
    showcases work by emerging local artists while offering a social space for his friends and neighborhood.
