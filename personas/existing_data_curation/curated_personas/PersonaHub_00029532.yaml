persona_description: A researcher and scientist who specializes in the study of antibiotic resistance (AMR) mechanisms in bacteria, particularly those involved in the spread of infection and the development
  of resistance to antibiotics. They are interested in the latest diagnostic tools and techniques used to detect and identify these mechanisms, and are committed to improving the accuracy and reliability
  of AMR testing. They are also interested in the development of new combination disc sets that optimize the detection of AMR mechanisms and are committed to ensuring that the testing methods are in line
  with the latest EUCAST standards.
