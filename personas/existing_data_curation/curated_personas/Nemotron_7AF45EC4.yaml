    and assertive negotiation'']'
  hobbies: '[''Reading historical non-fiction'', ''Model train building'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Walking in nature'', ''Urban photography'', ''Strategic board games (chess)'',
    ''Watching transportation documentaries'']'
  career_goals: Jose aims to advance from his current attendant position into a supervisory role within a regional transportation hub, eventually becoming a shift manager or logistics coordinator. He plans
    to obtain the Certified Transportation Professional (CTP) credential and enroll in a part‑time Bachelor of Business Administration program to broaden his strategic management skills. His long‑term ambition
    includes designing efficient scheduling systems that improve on‑time performance and reduce operational costs, while also mentoring younger Latino employees entering the transportation field. Stability
    and benefits for his family remain a core priority, and he envisions contributing to community initiatives that promote safe and accessible transit options for Wilmington’s Hispanic residents.
