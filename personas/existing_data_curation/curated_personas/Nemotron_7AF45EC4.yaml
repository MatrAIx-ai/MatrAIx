personas:
  professional: Jose Soriano is a transportation service attendant who leverages his bilingual fluency, meticulous safety compliance, and knack for process optimization to keep regional transit operations
    running on schedule, while his love for structure and solitary problem‑solving makes them a natural candidate for a future shift‑manager role.
  sports: Jose Soriano enjoys leisurely runs along the Wilmington River trail, occasionally joins the Wilmington Running Club for group jogs, and is a devoted fan of the Philadelphia Eagles and the Wilmington
    Blue Rocks, preferring low‑impact exercise over competitive team sports.
  arts: Jose Soriano captures the geometry of Wilmington’s bridges and warehouses through black‑and‑white photography inspired by Henri Cartier‑Bresson, while winding down with the timeless Bomba rhythms
    of Rafael Cepeda and re‑watching classic documentaries by Ken Burns, reflecting a quiet, detail‑oriented artistic sensibility.
  travel: Jose Soriano prefers meticulously planned, low‑key vacations that blend historical sightseeing and coastal relaxation, such as a quiet weekend in Old San Juan to explore maritime forts and a fall
    trip to the historic shipyards of Portsmouth, choosing destinations that offer cultural depth without overwhelming social demands.
  culinary: Jose Soriano is an avid home‑cook who meticulously prepares traditional dishes such as arroz con gandules, pernil, and tostones, often seasoning with sofrito and adobo, and enjoys experimenting
    with locally sourced vegetables from their garden to infuse fresh flavor into family meals.
  core: Jose Soriano balances a methodical work ethic with a solitary love for model trains and photography, but can be curiously stubborn about checking their own health stats, often skipping routine checkups
    in favor of a weekend garden session.
background:
  cultural: Jose grew up in a bilingual Puerto Rican household, speaking Spanish at home and English at school. His upbringing emphasized family cohesion, respect (respeto), and a strong work ethic rooted
    in Caribbean traditions. He celebrates island holidays such as San Sebastián and Día de la Constitución, and actively participates in Wilmington’s Puerto Rican community events, including cultural festivals
    and church gatherings. His culinary practices, music preferences, and casual use of Spanish idioms reflect a deep connection to his heritage. As an immigrant descendant, he values bridging his island
    roots with life in Delaware, often acting as an informal cultural liaison for coworkers and supporting local initiatives that assist Hispanic immigrants in the area.
attributes:
