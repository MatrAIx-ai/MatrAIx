  hobbies: '[''Gardening'', ''Quilting'', ''Community theater volunteering'', ''High school football tailgating'', ''Hiking the Hill Country'', ''Cooking Tex‑Mex dishes'', ''Reading mystery novels'', ''Listening
    to country music'', ''DIY home decor projects'']'
  career_goals: Gladys aims to transition from being a solo contractor to owning a small, family‑run painting and paperhanging business that serves Fischer, Hays County, and neighboring Hill Country towns.
    She plans to earn certification from the Painting Contractors Association and to build a reputation for reliability, high‑quality workmanship, and environmentally responsible practices. Over the next
    five years she hopes to mentor an apprentice, gradually expand her crew, and secure contracts for historic‑preservation projects in the area. While pursuing growth, she prioritizes maintaining a stable
    work‑life balance that allows her to support her family and stay active in her community.
