  career_goals: Tiffany envisions a future where she blends her love for art, performance, and digital media into a career as a creative content strategist or multimedia artist. She aspires to attend a
    high‑school program focused on visual and performing arts, then pursue a college degree in Communication, Digital Media, or Fine Arts. Long‑term, she hopes to become a recognized influencer or creative
    director for a major brand, producing innovative campaigns that push conventional boundaries. She also dreams of launching her own YouTube or TikTok channel where she can showcase her storytelling,
    improvisational sketches, and artistic tutorials, building a community that values originality and bold ideas.
