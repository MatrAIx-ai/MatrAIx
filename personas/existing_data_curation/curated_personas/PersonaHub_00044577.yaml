persona_description: A farmer who specializes in growing and managing game grass, particularly Eastern game grass, in the United States and possibly other parts of the Western Hemisphere. They are experienced
  in managing the growth and response of the grass to defoliation, photoperiod, and flooding. They have a deep understanding of the grass's nutritional value and the effects of different management practices
  on its yield and quality. They are skilled in using inter-row cultivation to control weeds and deep cultivation to preserve the shallow roots. They have a particular interest in the grass's compatibility
  with other grasses and legumes, as well as its genetic and reproductive characteristics. They are also knowledgeable about the grass's response to frost and its suitability for use as a hay plant.
