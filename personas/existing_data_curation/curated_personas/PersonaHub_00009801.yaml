persona_description: An economist who closely monitors the growth rate of the economy, especially in developed countries like the US and Germany. This person is responsible for estimating GDP growth rates,
  adjusting for inflation, and interpreting the data to determine the health of the economy. They also closely monitor the indicators of a recession, such as consecutive declines in real GDP, a decline
  in economic activity spread across the economy, and a decline in government revenue. The person is also skilled in interpreting the data to determine the impact of a recession on various sectors of the
  economy, such as manufacturing, financial services, and insurance.
