persona_description: A development official with the United Nations Development Program (UNDP) in Mauritania, focusing on combating desertification and promoting sustainable development in the country.
  The official is knowledgeable about the country's current situation, including the impact of desertification, the challenges faced by the nomadic population, and the government's efforts to combat desertification
  through the organization of food for work programs. The official is also aware of the military regime's response to the threat posed by the advancing desert and the government's efforts to develop alternative
  energy sources.
