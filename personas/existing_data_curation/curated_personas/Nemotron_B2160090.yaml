personas:
  professional: Preston Alberdi, an aspiring digital illustrator and budding maker, blends a love for drawing, LEGO engineering, and simple electronics into interactive art projects, and they channel their
    competitive streak into self‑imposed design challenges while often overlooking deadlines due to a relaxed, flexible attitude toward obligations.
  sports: Preston Alberdi, a tide‑pool explorer and occasional junior lifeguard, prefers solitary cycling along the Cape Cod bike trails and pick‑up basketball games with a small group of friends, where
    they bring a competitive edge, while cheering enthusiastically for the Boston Red Sox, New England Patriots, and Boston Bruins, and they treat fitness as a flexible hobby rather than a regimented routine.
  arts: Preston Alberdi, an avid fan of graphic novels such as 'Saga' and 'Maus' and indie musicians like Tame Impala and Phoebe Bridgers, spends evenings sketching digital landscapes inspired by Hayao
    Miyazaki and the street art of Banksy, and they weave these influences into a distinctive visual style that fuels both their drawing and short‑fiction writing.
  travel: Preston Alberdi, drawn to coastal adventures, enjoys spontaneous weekend trips to nearby Cape Cod beaches and tide‑pooling excursions in Acadia National Park, while dreaming of a solo backpacking
    journey to Kyoto to explore manga art, and they plan these travels within the modest budget and school schedule set by their parents.
  culinary: Preston Alberdi, who loves the briny flavor of fresh clams and lobster rolls from Buzzards Bay, experiments with simple dishes like garlic butter shrimp pasta, homemade mac & cheese, and fish
    tacos, yet they often forget to clean the kitchen afterward, reflecting their relaxed approach to chores.
  core: Preston Alberdi, a 13‑year‑old digital sketcher with a competitive edge, blends a love for tide‑pool discoveries, LEGO constructions, and indie music with a relaxed, occasionally disorganized routine,
    and they frequently retreat to art as a sanctuary when obligations feel overwhelming.
background:
  cultural: Preston comes from a New England white family rooted in the coastal traditions of Buzzards Bay, Massachusetts. The local maritime culture, with its emphasis on self‑reliance, seasonal fishing,
    and community festivals, shapes his appreciation for the outdoors and the sea. Growing up near historic towns, he has been exposed to a blend of colonial history and progressive arts programs offered
    by regional schools and libraries, fostering his curiosity for both the past and contemporary creative expression.
