    ''creative writing'', ''listening to indie music'']'
  career_goals: Preston dreams of turning his love for art and technology into a career as a video game developer or interactive media designer. He hopes to attend a specialized high school for the arts
    and later study game design or multimedia production at a university. In the long term, he aims to create immersive, story‑driven games that blend his artistic vision with innovative gameplay mechanics,
    and perhaps one day launch his own indie studio.
