personas:
  professional: Tri Shi, a Texas middle‑school STEM teacher, weaves rigorous physics, chemistry and math into inquiry‑based lessons while using coding tools and robotics to keep students engaged, and leverages
    their bilingual fluency to foster inclusive dialogue; their natural kindness and anxiety‑driven attention to detail make them a trusted mentor and a budding leader who designs curricula that integrate
    mental‑wellness checkpoints.
  sports: Tri Shi hits the Hill Country trails each weekend for solo hikes, cheers on Austin FC during the MLS season, and participates in a local community yoga club that meets at the university gym, keeping
    a balanced mix of cardio, flexibility, and nature immersion in their fitness routine.
  arts: Tri Shi practices calligraphy as a meditative art, draws inspiration from speculative‑fiction authors like Neal Stephenson and N.K. Jemisin, and regularly attends performances by local folk dancers
    and acoustic guitar concerts featuring artists such as Jacob Collier and Hania Rani, letting creativity recharge their teaching spirit.
  travel: Tri Shi prefers purposeful weekend getaways to Texas Hill Country wineries and historic towns like Fredericksburg, dreams of a spring trek through Japan’s cherry‑blossom routes, and balances their
    travel planning between detailed itineraries for cultural festivals and spontaneous nature hikes, always budgeting to fund future educational conferences.
  culinary: Tri Shi loves crafting modern twists on family‑rooted dishes, such as miso‑glazed pork dumplings with fresh basil from their rooftop garden and kimchi‑infused fried rice topped with a squeeze
    of yuzu, and enjoys sourcing ingredients like gochujang, lemongrass, and heirloom tomatoes at local farmer’s markets.
  core: Tri Shi is a caring, detail‑oriented STEM teacher who blends analytical rigor with creative hobbies, wrestles with anxiety that drives both meticulous planning and occasional splurges, and seeks
    balance through gardening, cooking, and mindful movement.
background:
  cultural: Tri was born to immigrant parents from Taiwan who settled in Houston when she was a child. Growing up in a bilingual household, she learned Mandarin at home while attending English‑language
    schools, giving her a bicultural perspective. Her family emphasizes respect for elders, diligence in education, and communal responsibility—values that shape her teaching philosophy. Within the vibrant
    Asian American community of Houston, Tri participates in cultural organizations that celebrate Lunar New Year and Mid‑Autumn Festival, and she volunteers with language‑exchange programs to help recent
    immigrants acclimate. While she embraces American individualism and the dynamism of Houston's multicultural environment, she retains a strong connection to East Asian traditions through food, language,
    and intergenerational storytelling.
attributes:
  skills: '[''Curriculum Development'', ''Inquiry‑Based Learning Facilitation'', ''Technology Integration (coding, robotics, virtual labs)'', ''Laboratory Safety Management'', ''Data‑Driven Assessment'',
