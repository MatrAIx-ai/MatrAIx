  hobbies: '[''Urban gardening'', ''Traditional East Asian cooking'', ''Calligraphy'', ''Reading science‑fiction novels'', ''Hiking in Texas state parks'', ''Participating in cultural festivals'', ''Volunteer
    tutoring for immigrant families'', ''Mindfulness meditation'']'
  career_goals: Tri envisions advancing from classroom teacher to a leadership role within her school district, such as STEM department chair or curriculum specialist. She aims to design a district‑wide
    interdisciplinary STEM program that integrates project‑based learning with mental‑wellness components, reflecting her concern for student stress. Pursuing a master's in Educational Leadership is part
    of her plan, as is obtaining certification to mentor new teachers. Long‑term, she hopes to influence policy on equitable STEM access for underrepresented communities, and to establish partnerships with
    local universities and tech companies for student mentorship pipelines.
