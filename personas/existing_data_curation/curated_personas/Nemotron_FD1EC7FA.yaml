personas:
  professional: Sonia Grullon, a four‑year‑old aspiring architect of block towers, balances curiosity about new shapes with a practical focus on stability, yet their relaxed approach to obligations often
    leaves constructions half‑finished, while they competitively race older siblings to see whose structure stands taller.
  sports: Sonia Grullon, a four‑year‑old who prefers solitary play, enjoys practicing swimming strokes at the community pool while occasionally joining the Riverside Raccoons kindergarten soccer club, and
    quietly cheers for the Metro Meteors professional baseball team, though they often watch games from the sidelines to avoid the noise of crowds.
  arts: Sonia Grullon, a four‑year‑old who spends quiet afternoons drawing fantastical landscapes inspired by Dr Seuss and Studio Ghibli's My Neighbor Totoro, hums The Laurie Berkner Band upbeat tunes while
    assembling puzzles, and competitively races her cousin to complete art projects, yet often retreats to a solitary corner when social play feels overwhelming.
  travel: Sonia Grullon, a four‑year‑old who loves family road trips but prefers flexible itineraries that allow for quiet breaks, has visited the nearby zoo and the seaside boardwalk, and dreams of seeing
    the lights of Disney World, yet sometimes worries about crowded places and noise.
  culinary: Sonia Grullon, a four‑year‑old who delights in creamy mac and cheese topped with extra cheddar, crunchy apple slices with a dab of peanut butter, and helps stir pancake batter with a tiny whisk,
    yet often forgets to brush teeth after sugary snacks, leading to occasional toothaches.
  core: Sonia Grullon, a four‑year‑old solitary explorer who balances curious building projects with a relaxed, competitive streak, worries about small stresses, and finds comfort in quiet, creative play.
background:
  cultural: Sonia is raised in an Ecuadorian‑American household in Hockley, Texas. At home, Spanish and English are spoken interchangeably, and she is learning basic phrases in both languages. Her family
    keeps Ecuadorian traditions alive through food, music, and celebrations; dishes such as empanadas, plantain fritters, and arroz con pollo are common at family meals, and holidays like Día de los Difuntos
    and Carnaval are marked with music, dance, and storytelling. Growing up in the diverse Dallas‑Fort Worth area, Sonia interacts with a multicultural community at preschool while maintaining strong ties
    to her extended family, who often visit from Ecuador. These cultural influences shape her love of nature, appreciation for family bonds, and the value she places on quiet, reflective activities.
attributes:
  skills: '[''drawing'', ''cutting shapes with safety scissors'', ''block tower building'', ''basic bilingual Spanish/English'', ''letter recognition'', ''early counting'', ''puzzle solving'', ''observational
