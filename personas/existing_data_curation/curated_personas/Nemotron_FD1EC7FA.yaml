  hobbies: '[''block building'', ''jigsaw puzzles'', ''drawing animals and nature'', ''quiet storybook listening'', ''nature observation walks'', ''simple kitchen activities'', ''educational science kits'']'
  career_goals: Even at four, Sonia often talks about wanting to become a scientist who studies animals. She imagines herself in a quiet lab, carefully observing wildlife and figuring out how things work.
    Her competitive side fuels a desire to be the 'best explorer' among her friends, and she hopes that one day she can earn a degree in biology or environmental science and lead her own research projects.
    She dreams of designing simple tools that help protect animals, combining her curiosity with a practical, hands‑on approach. Sonia's goal is to work independently, solve problems, and make a tangible
    contribution to the natural world.
