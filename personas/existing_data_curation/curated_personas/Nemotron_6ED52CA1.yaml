background:
  cultural: Judith is a white child raised in Pineville, Kentucky, a small town in Bell County in the heart of Appalachia. Her family follows Southern Appalachian traditions, emphasizing church, community
    gatherings, and folk crafts such as quilting and woodworking. The local culture values storytelling, bluegrass music, and a close‑knit family network. Growing up in this environment, she is exposed
    to the region's hospitality, modest lifestyle, and reverence for nature and heritage.
