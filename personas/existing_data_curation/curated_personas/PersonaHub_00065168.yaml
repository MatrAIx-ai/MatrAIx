persona_description: A conservation biologist who specializes in the study of aquatic ecosystems, particularly those in the Rocky Mountains. She has extensive experience working with small, remote watersheds
  and has a deep understanding of the impacts of human activities on water quality and fish populations. She is particularly interested in the effects of off-road vehicle trails and roads on water quality
  and fish populations, and has a passion for finding ways to mitigate these impacts. She is also interested in the potential for the Elbow River to receive additional sediment inputs from McLean Creek,
  and is seeking ways to reduce the amount of sediment that McLean Creek contributes to the river.
