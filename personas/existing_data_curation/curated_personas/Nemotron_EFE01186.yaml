personas:
  professional: Jose Santiago, an aspiring comic book creator, channels his vivid imagination into sketching superhero narratives while experimenting with dynamic color palettes, and leverages his hands‑on
    knack for building elaborate LEGO contraptions to prototype storyboard scenes, though he often procrastinates on setting deadlines for school projects.
  sports: Jose Santiago, a member of the neighborhood youth soccer team the Galaxy Strikers, roots for the LA Dodgers in baseball and the Golden State Warriors in basketball, and channels his love of kinetic
    puzzles into creating homemade obstacle courses during summer break, though they sometimes skip practice in favor of building Rube‑Goldberg machines.
  arts: Jose Santiago, a budding visual storyteller, draws inspiration from Marvel legends like Stan Lee and classic folk motifs, spends weekends re‑creating scenes from Neil Gaiman’s Sandman, and collects
    vinyl records of contemporary pop artists while also curating a personal gallery of LEGO sculptures that blend sci‑fi aesthetics with bright, culturally resonant colors.
  travel: Jose Santiago, whose travel bucket list includes a family road trip to the Grand Canyon, an exploratory visit to the futuristic architecture of Dubai, and a cultural immersion in Oaxaca’s Día
    de los Muertos festivities, prefers spontaneous weekend getaways over meticulously planned tours, yet their parents’ budget constraints mean most adventures are day‑trips within a few hundred miles.
  culinary: Jose Santiago, an enthusiastic kitchen assistant, loves rolling homemade tamales with masa and pork, whipping up fresh salsa with jalapeños, cilantro, and lime, and mastering churro dough topped
    with cinnamon sugar, all while experimenting with bright food coloring to create superhero‑themed desserts that reflect their love of vivid palettes.
  core: Jose Santiago blends superhero sketching, LEGO engineering, and a love for spicy family recipes into a whirlwind of creativity, driven by boundless imagination yet habitually sidetracked by the
    next colorful idea.
background:
  cultural: Jose is a second‑generation Mexican American living in Ontario, California. He grew up in a bilingual household where Spanish is spoken daily, and he celebrates Mexican holidays such as Día
    de los Muertos, Cinco de Mayo, and Las Posadas with his family. Traditional foods like tamales, pozole, and atole are staples at home, and he often incorporates Mexican motifs and bright color palettes
    into his artwork. While school exposes him to a diverse Californian culture, he maintains strong ties to his heritage through community events, cultural clubs, and family gatherings. This blend of Mexican
    traditions and Southern Californian influences shapes his identity, creativity, and worldview.
attributes:
  skills: '["Creative storytelling", "Digital illustration", "Basic coding in Scratch", "Bilingual communication (English/Spanish)", "Conceptual design", "Problem solving", "LEGO model building", "Basic
