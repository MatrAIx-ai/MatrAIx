  hobbies: '["Sketching and drawing", "LEGO and K''NEX building", "Playing Minecraft", "Reading sci‑fi and fantasy books", "Listening to music (Mexican folk, pop)", "Cooking Mexican dishes with family",
    "Attending cultural festivals", "Stargazing and astronomy"]'
  career_goals: Jose dreams of turning his love for art, technology, and storytelling into a career where he can create immersive experiences for others. He hopes to attend a high‑school program focused
    on visual arts, then study visual storytelling, animation, or game design in college. Ultimately, he aims to become a concept artist and indie game developer who blends Mexican cultural motifs with
    futuristic themes, designing games or educational apps that spark curiosity in other children. He also envisions contributing to community art projects that celebrate his heritage and inspire local
    youth.
