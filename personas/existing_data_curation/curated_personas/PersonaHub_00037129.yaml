persona_description: A coal expert with extensive knowledge and experience in coal consumption analysis, particularly in the context of steamships and their coal consumption. This person is well-versed
  in the factors that affect coal consumption on ships, such as distillation of drinking water and weather conditions, and is knowledgeable about the factors that contribute to increased coal consumption,
  such as the need to be "heavier" lower down to enhance metacentric height stability. This person has worked with coal consumption data and analyzed it for various vessels, including the Waratah, and is
  skilled in interpreting the results and drawing conclusions based on the available data.
