  career_goals: As chief executive, Xavier aims to transform his company into a recognized leader in culturally infused tech-enabled products, scaling beyond the Midwest to national and international markets
    within the next five years. He plans to secure Series A and B funding, develop strategic partnerships with Mexican artisan collectives, and launch a platform that blends Mexican artistic heritage with
    cutting-edge design. He also aspires to become a sought-after speaker on innovation and cross-cultural entrepreneurship, mentor emerging Latino founders, and eventually formalize his business education
    through an executive MBA to deepen his strategic acumen.
