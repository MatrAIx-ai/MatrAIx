    ''Basic SQL'']'
  hobbies: '[''Reading non-fiction (education, tech, psychology)'', ''Data visualization projects'', ''Jogging along Rockaway Beach'', ''Urban photography'', ''Board-games with a small group'', ''Volunteering
    at after-school tutoring programs'']'
  career_goals: Paul aims to earn his Project Management Professional (PMP) certification within the next year and to progress from project management specialist to senior project manager overseeing large-scale
    education technology implementations. He aspires to lead interdisciplinary teams that bridge curriculum design with digital platforms, eventually moving into a program director role where he can shape
    strategic initiatives for school districts or nonprofit educational organizations. He also seeks mentorship opportunities to deepen his expertise in change management and to contribute thought leadership
    through industry conferences and publications.
