personas:
  professional: Sonia Rodriguez, a data‑analysis enthusiast pursuing environmental data science, they merge solid programming and laboratory research skills with a talent for visual storytelling, delivering
    methodical, organized projects that translate complex sustainability data into compelling narratives for policymakers and community audiences.
  sports: Sonia Rodriguez hits the foothills of the Rocky Mountains for weekly hikes and rock‑climbing sessions at Red Rocks Climbing Center, they follow the Denver Broncos and Colorado Rockies faithfully,
    and they join a local trail‑running club that meets at Sloan's Lake each Saturday, using these activities to channel stress into physical endurance.
  arts: Sonia Rodriguez paints vibrant Colorado mountain vistas in oil, they draw digital illustrations inspired by Ansel Adams and Colorado‑based indie folk group The Lumineers, regularly visit the Denver
    Art Museum and the indie venue Ophelia's Electric Soapbox, and they cite Frida Kahlo's bold colors as a personal inspiration for narrative composition.
  travel: Sonia Rodriguez plans low‑key, budget‑friendly trips, they favor weekend escapes to Rocky Mountain National Park and a summer backpacking tour of Patagonia's Torres del Paine, while they dream
    of a research‑focused expedition to Iceland's geothermal sites to study sustainable water management.
  culinary: Sonia Rodriguez, an intermediate home cook, they delight in preparing traditional Latin American dishes like arepas, tamales, and ceviche, infusing them with Colorado's farm‑fresh herbs such
    as cilantro and oregano, and they frequently experiment with fusion plates that pair local trout with a smoky chipotle glaze.
  core: Sonia Rodriguez is a methodical, art‑loving data analyst who, despite frequent worry, channels anxiety into mountain hikes, meticulous budgeting, and a vibrant blend of science, painting, and community
    mentorship.
background:
  cultural: Sonia was raised in a bilingual household where Spanish and English were spoken daily. Her family preserves Mexican cultural traditions such as celebrating Día de los Muertos, preparing tamales
    and mole, and emphasizing close family ties and community solidarity. Living in Evans, Colorado, she blends these roots with the rural, outdoors‑oriented lifestyle of the Front Range, fostering a deep
    appreciation for both her cultural heritage and the natural environment.
attributes:
  skills: '[''Python'', ''R'', ''SQL'', ''Statistical analysis'', ''Laboratory techniques (PCR, spectrophotometry)'', ''Data visualization (Matplotlib, Seaborn, Tableau)'', ''Scientific writing'', ''Project
    planning'', ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Landscape painting'', ''Digital illustration'', ''Hiking'', ''Rock climbing'', ''Visiting art galleries'', ''Science fiction reading'', ''Cooking Latin American cuisine'', ''Volunteer coding
    instructor'']'
  career_goals: Sonia aspires to pursue a master's degree in environmental data science and secure a role as a data analyst or research associate focused on sustainable agriculture and water resource management
    in the Colorado Front Range. She aims to blend her technical expertise with her passion for community outreach, eventually leading interdisciplinary projects that empower Latino youth in STEM and promote
    evidence‑based policy making. In the long term, she envisions managing a research program that integrates scientific rigor with creative communication to address climate‑related challenges.
