  hobbies: '[''Cross‑country skiing'', ''Birdwatching'', ''DIY woodworking'', ''Reading mystery novels'', ''Home‑brewing'', ''Vegetable gardening'', ''Community theater volunteering'', ''Quilting circle
    participation'', ''Neighborhood clean‑up volunteering'']'
  career_goals: Lindsay aims to step into a shift‑supervisor role within the next two years, leveraging her experience to lead a team and champion continuous‑improvement projects. She plans to earn a Six
    Sigma Green Belt certification to formalize her expertise in process optimization. Over the longer term, she envisions becoming a senior process improvement specialist or consultant, guiding multiple
    facilities in adopting efficient, data‑driven practices. Simultaneously, she is preparing for a phased retirement that could include a small home‑based woodworking business, allowing her to blend her
    technical background with personal craftsmanship. Financial stability for her family and a smooth transition into mentorship roles are central to her ambitions.
