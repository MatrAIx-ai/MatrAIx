persona_description: A professor in the field of building science and engineering who focuses on energy efficiency and sustainable building design. Dr. Jin Wen's research involves developing new approaches
  and software tools to aid in sustainable building design, as well as looking at ways to retrofit buildings to make them more energy efficient. She is an expert in the use of natural cooling methods, such
  as night purge and external shading, and suggests using fans to reduce energy usage. Additionally, she recommends upgrading window units and using fans before switching on the AC. Her work is focused
  on making buildings more energy efficient and reducing the cost of cooling during record temperatures.
