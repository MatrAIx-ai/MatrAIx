persona_description: A sociologist who is interested in understanding and addressing social conflicts through the analysis of soundscapes in Poland. This individual has a background in sociology and has
  conducted research on the subject of social conflicts and the impact of sound on society. They are looking for ways to prevent or resolve social conflicts arising from inadequate knowledge about soundscapes,
  and they are interested in combining sociological studies with field analyses to better understand the character and location of social conflicts in soundscape. They are also interested in education and
  decision-making processes related to sound and noise control, and they believe that subjective assessments of noise nuisance severity and acoustic design of public spaces are crucial in achieving environmental
  noise control.
