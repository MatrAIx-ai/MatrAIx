    problem‑solving'']'
  hobbies: '[''Visiting art museums and street‑art murals'', ''Photography (film and digital)'', ''Cooking traditional Mexican dishes and fusion recipes'', ''Fishing, kayaking, and hiking around Twin Lake'',
    ''Woodworking and small‑furnishings projects'', ''Reading biographies of artists and scientists'', ''Playing cajón in informal jam sessions'', ''Participating in Día de los Muertos and other cultural
    festivals'', ''Jogging for stress relief'']'
  career_goals: Manuel aspires to transition from his current inspector role into a senior quality‑assurance leadership position within the next five years. He plans to earn the ASQ Certified Quality Engineer
    (CQE) and ISO 9001 Lead Auditor certifications, which will enable him to redesign the plant’s quality‑management system and mentor junior technicians. His competitive drive fuels a goal of reducing
    defect rates by at least 30 % and achieving top‑quartile performance on key metrics such as First‑Pass Yield. Manuel also hopes to champion the integration of digital inspection platforms and predictive
    analytics, positioning his facility at the forefront of smart manufacturing. Long‑term, he envisions launching a consulting practice that advises small‑scale food producers on cost‑effective quality
    strategies, allowing him to combine his technical expertise with his passion for continuous learning and innovative problem solving.
