  career_goals: Robert plans to strengthen his accounting foundation by completing an associate degree in accounting and earning the Certified Bookkeeper credential within the next two years. He aims to
    move into a senior bookkeeping or assistant manager role where he can mentor newer staff and help streamline office procedures. In the longer term, he envisions launching a boutique bookkeeping service
    that caters to local black‑owned small businesses, blending his practical expertise with his curiosity for emerging financial technologies. Achieving these milestones will provide greater financial
    security for his growing family and allow him to give back to his community while maintaining a flexible work‑life balance.
