  career_goals: John aims to move from sales associate to assistant manager within the next two years, seeking formal training in retail management and a certification in business administration. Over the
    next five to seven years, he envisions taking full responsibility for a store or launching his own niche retail shop focusing on outdoor equipment and locally crafted gear, combining his practical experience
    with his love for the region’s outdoors. He also plans to improve his financial literacy, save for a down‑payment on a modest property in Siskiyou County, and eventually achieve a stable, independent
    lifestyle that balances structured business operations with the flexibility to pursue personal interests.
