personas:
  professional: Shanetha Daniels, a budding kindergarten researcher, channels their organized curiosity into daily science experiments, meticulously documenting observations in a colorful notebook while
    balancing new ideas with a practical approach to classroom routines, and they proudly share findings with peers.
  sports: Shanetha Daniels actively participates in the Tiny Tots Soccer League as a forward for the Rainbow Rangers team, they idolize Manchester United forward Marcus Rashford, and they approach each
    practice with disciplined drills and a competitive edge, occasionally worrying about making mistakes in front of teammates.
  arts: Shanetha Daniels enjoys drawing vibrant pictures of dinosaurs, practices preschool ballet to Disney’s "Let It Go", frequently hums Raffi’s "Baby Beluga" while they arrange crayons by color, reflecting
    their organized nature and love for familiar, comforting artistic experiences.
  travel: Shanetha Daniels loves family road trips that follow a meticulously planned schedule, recalling the excitement of a recent visit to Disneyland in Anaheim, dreaming of seeing the Grand Canyon someday,
    and they prefer kid‑friendly hotels with daily activity charts.
  culinary: Shanetha Daniels delights in cheesy macaroni, crunchy chicken nuggets, and sweet strawberries, often helping mix pancake batter and they meticulously arrange fruit slices on plates while being
    particular about textures and occasionally refusing foods that are too mushy.
  core: Shanetha Daniels is a highly organized, curious five‑year‑old who balances a love for discovery with a competitive drive, often worrying about perfection but they find joy in structured play, music,
    and meticulous routines.
background:
  cultural: Shanetha is an African‑American child raised in Hinesville, Georgia, a community shaped by the nearby Fort Stewart military base and deep Southern traditions. Her family values church gatherings,
    gospel music, and communal barbecues, and they maintain close ties with extended relatives throughout Long County. The blend of Southern cuisine, stories of resilience, and a disciplined environment
    fosters her strong sense of pride, community responsibility, and cultural identity.
