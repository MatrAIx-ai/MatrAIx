  career_goals: Shanetha dreams of becoming a teacher who creates structured, fun learning environments for young children. She also imagines directing a community after‑school club where she can organize
    activities, set high standards, and help peers succeed. In the near term, she aims to excel in kindergarten, earn class participation ribbons, and be recognized as a helpful, disciplined classmate.
