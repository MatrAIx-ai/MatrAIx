persona_description: A genetic counselor who specializes in the identification and classification of hereditary non-polyposis colorectal cancer (HNPCC), a rare genetic condition that predisposes individuals
  to colorectal cancer. The counselor's expertise includes the identification of family history, the identification of family members with colorectal cancer or HNPCC-associated carcinoma, the identification
  of colorectal cancer or HNPCC-associated carcinoma before the age of 45 years, the identification of an "undifferentiated" colon carcinoma in the right hemicolon before the age of 45 years, the identification
  of mucinous or signet-ring cell carcinoma before the age of 45 years, the identification of two synchronous or metachronous colon carcinomas or other HNPCC-associated carcinomas, the identification of
  the Amsterdam criteria positive, and the further molecular-genetic analysis of the HNPCC condition. The counselor's expertise also includes the identification of clinical findings and symptoms related
  to colon carcinoma, such as the need for clarification of bowel habits regarding a possible carcinoma, the problem with colon carcinoma being that they give rise to symptoms late rather than early and
  when they do arise the symptoms are usually very nonspecific, the occurrence of an "undifferentiated" colon carcinoma in the right hemicolon before the age of 45 years, the demonstration of two synchronous
  or metachronous colon carcinomas or other HNPCC-associated carcinomas, and the identification of the Amsterdam criteria positive.
