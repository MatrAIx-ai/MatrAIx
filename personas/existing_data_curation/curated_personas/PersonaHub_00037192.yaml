persona_description: A neuroscientist who studies the brain's neural connections and how they are used for numerical cognition and arithmetic computation. She is interested in the role of the left and right
  halves of the brain in performing mathematical operations and how the neural connectivity between them affects the speed at which we compute. Her research interests include functional MRI imaging, brain
  plasticity, and the study of the brain's structure and function in relation to mathematical abilities.
