personas:
  professional: Dina Dittmaier leverages eight years of systems analysis expertise—crafting SQL‑driven data visualizations, automating workflows with Python, and steering SAP/NetSuite ERP projects using
    Agile and Scrum—while their curiosity‑practical blend keeps solutions grounded yet innovative, and their natural kindness ensures stakeholder expectations are negotiated with a cooperative tone.
  sports: Dina Dittmaier hits the Flint Hills trails with the regional hiking club, logs bird sightings for the Kansas Audubon Society, cheers on the Kansas City Chiefs and Kansas City Royals on game days,
    and weaves yoga sessions into their weekly routine to stay limber and energized.
  arts: Dina Dittmaier immerses herself in contemporary mystery novels by Tana French and Gillian Flynn during book club nights, curates local art installations for the Linn County Fair inspired by Kansas
    prairie landscapes, and unwinds listening to Brandi Carlile and the Avett Brothers, letting those narratives color their creative outlook.
  travel: Dina Dittmaier prefers a mix of planned road trips and spontaneous weekend hikes, having explored the historic sites of St. Louis and the jazz scene of New Orleans while dreaming of a summer trek
    through Yellowstone’s geysers and a cultural immersion in Edinburgh’s literary festivals, all scheduled around their volunteer commitments and modest travel budget.
  culinary: Dina Dittmaier cultivates heirloom tomatoes and prairie greens in their garden, then whips up a favorite heirloom tomato bruschetta topped with fresh basil, mozzarella, and a drizzle of aged
    balsamic, while also perfecting a quinoa bowl with roasted corn, smoked paprika‑spiced chickpeas, and locally sourced kale, showcasing a confident home‑cooking skill set that blends simple Midwestern
    flavors with a touch of culinary adventure.
  core: Dina Dittmaier blends pragmatic systems analysis with a prairie‑hiking spirit, nurturing community arts, mentoring emerging women technologists, and occasionally over‑caffeinating during late‑night
    code sprints.
background:
  cultural: Dina was born and raised in Osawatomie, a small town in Linn County, Kansas. Her family traces its roots to German immigrants who settled in the Midwest in the late 19th century, and she grew
    up with a blend of Lutheran traditions and the broader Midwestern Protestant community. The region’s agricultural heritage, close‑knit community values, and emphasis on self‑reliance shaped her practical
    outlook. Local customs such as the county fair, church potlucks, and volunteer service are integral to her identity. While she identifies as white American, her work in diverse tech environments has
    broadened her cultural awareness, allowing her to blend her Midwestern heritage with an inclusive, collaborative professional ethos.
attributes:
  skills: '[''Business Process Modeling'', ''Systems Analysis'', ''Data Visualization (Power BI, Tableau)'', ''SQL Querying'', ''Python Scripting'', ''Agile/Scrum Project Management'', ''Stakeholder Communication'',
    ''Requirements Gathering'', ''Process Improvement'', ''Vendor Management'', ''ERP Systems (SAP, NetSuite)'', ''Technical Documentation'', ''User Training and Support'']'
  hobbies: '[''Hiking in the Flint Hills'', ''Birdwatching'', ''Gardening (heirloom tomatoes and native prairie grasses)'', ''Reading contemporary mystery novels'', ''Participating in a local book club'',
    ''Yoga'', ''Knitting'', ''Volunteering at the Osawatomie Food Bank'', ''Helping with the Linn County Fair arts displays'', ''Listening to technology podcasts'', ''Attending women‑in‑computing meetups'']'
  career_goals: Dina aims to transition into a senior systems architect role within the next three years, overseeing the digital transformation of mid‑size enterprises across the Midwest. She plans to earn
    an AWS Solutions Architect certification and a Project Management Professional (PMP) credential to deepen her cloud and project management capabilities. In the longer term, she envisions establishing
    an independent consulting practice that helps Kansas small businesses streamline operations through tailored technology solutions, thereby fostering local economic growth. Additionally, Dina is committed
    to mentoring junior analysts—particularly women entering tech—to create a supportive network that balances professional rigor with personal well‑being.
