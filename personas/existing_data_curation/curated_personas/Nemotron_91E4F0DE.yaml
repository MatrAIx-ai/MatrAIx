  hobbies: '[''Reading non‑fiction on urban planning'', ''Online chess for strategic thinking'', ''Jogging and beachside cycling'', ''DIY car maintenance projects'', ''Cityscape and shoreline photography'',
    ''Listening to classic soul, jazz, and R&B'', ''Volunteering teaching computer basics'', ''Watching documentaries on infrastructure'']'
  career_goals: Michael aims to advance within the transportation sector by earning a Commercial Driver’s License and completing a logistics management certification. He aspires to become a team supervisor,
    leading a crew of attendants to achieve higher efficiency and safety benchmarks, and eventually launch his own reliable shuttle service catering to Broward County commuters. His competitive drive pushes
    him to consistently rank among the top performers in on‑time arrivals and customer satisfaction.
