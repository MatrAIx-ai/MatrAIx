  career_goals: Fabiano hopes to shift from daily operational duties to a consulting and mentorship role, offering small businesses and community organizations guidance on secure, resilient network design.
    He aims to achieve advanced certifications such as CCNP Security and pursue part‑time teaching at a local community college, where he can share his curiosity for emerging technologies like SD‑WAN, edge
    computing, and AI‑driven network monitoring. While he values flexibility and prefers projects that allow creative problem‑solving, he aspires to leave a legacy of empowering others to use technology
    safely and effectively.
