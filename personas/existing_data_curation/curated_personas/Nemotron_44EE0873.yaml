personas:
  professional: Greta Dye, a retired community volunteer, leverages her meticulous event‑planning, budgeting, and conflict‑mediation skills to coordinate senior service programs and organize neighborhood
    cultural festivals, always insisting on timelines and high standards.
  sports: Greta Dye stays active by attending weekly Latin dance classes, walking briskly through Flushing Meadows Corona Park, cheering on the New York Knicks, and participating in a seniors’ walking club
    that meets every Saturday morning.
  arts: Greta Dye expresses creativity through their church choir, where they perform works by the Brooklyn Tabernacle Choir and classic jazz standards like Nina Simone, while also immersing themselves
    in quilting circles that exchange patterns inspired by folk art and the poetry of Maya Angelou.
  travel: Greta Dye prefers meticulously planned weekend getaways to nearby destinations such as the Catskill Mountains and historic Savannah, Georgia, balancing a love for cultural immersion with a modest
    travel budget and occasionally joining group tours organized by their church senior fellowship.
  culinary: Greta Dye’s culinary repertoire features soulful dishes like jerk‑spiced chicken seasoned with scotch bonnet peppers, collard greens cooked with smoked turkey, and fresh herb‑infused sauces
    made from balcony‑grown basil and cilantro, which they showcase at community potlucks after mastering recipes from family cookbooks.
  core: Greta Dye blends disciplined organization with a vibrant social life, turning quilting, dancing, and choir singing into community‑building rituals while meticulously managing budgets and health,
    though they sometimes over‑commit to projects and forget to relax.
background:
  cultural: Greta is a Black American who grew up in the vibrant, multicultural enclave of Jamaica, Queens. Her family heritage is rooted in the Great Migration, with ancestors who settled in New York City
    during the mid-20th century, while also absorbing Caribbean influences from a neighborhood rich with Jamaican, Haitian, and Trinidadian cultures. This blend shapes her identity, reflected in her love
    for gospel music, soul food, and Caribbean holiday celebrations like Carnival and Juneteenth. The local church has been a cornerstone of her community life, providing a space for fellowship, music,
    and organized service. Greta’s cultural background informs her commitment to preserving Black and Caribbean traditions through community events, intergenerational storytelling, and shared meals that
    honor her ancestors' resilience and creativity.
