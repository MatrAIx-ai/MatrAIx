  career_goals: Although retired from formal employment, Greta aims to deepen her impact as a volunteer leader in Queens. She aspires to become the coordinator of a senior services program, creating structured
    activities that foster social connection for older adults. She also hopes to launch a neighborhood cultural heritage series that showcases Black and Caribbean traditions through festivals, storytelling,
    and food. Greta envisions publishing a memoir that captures her life experiences and the resilience of her community, and she seeks to mentor a new generation of volunteers to carry forward her organized,
    compassionate approach.
