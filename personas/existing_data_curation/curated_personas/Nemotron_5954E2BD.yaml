personas:
  professional: Frederick Capps, a 66‑year‑old custodial specialist, combines his flawless routine‑driven facility‑maintenance skills—operating floor‑scrubbing machines, pressure washers, and handling inventory—with
    a quiet determination to mentor younger staff and earn a facility‑management certification, all while using meticulous checklists to soothe his anxiety.
  sports: Frederick Capps enjoys watching the local minor‑league baseball team, the Louisville Bats, cheering from the stands on summer weekends, participates in a senior walking club that explores nearby
    hills, and they occasionally join a community softball game for gentle exercise.
  arts: Frederick Capps finds comfort in classic country and folk music, regularly playing Johnny Cash, Dolly Parton, and Woody Guthrie on his old record player, attends the church choir where they sing
    hymns, and they also indulge in historical nonfiction by authors like Shelby Foote, seeing the arts as a quiet companion to their solitary hobbies.
  travel: Frederick Capps prefers low‑key road trips to nearby state parks such as the Daniel Boone National Forest, often planning fishing outings at quiet lakes, dreams of a future visit to the Great
    Smoky Mountains, and they travel with a meticulously packed itinerary to keep anxiety at bay.
  culinary: Frederick Capps cultivates a modest vegetable garden and loves to cook heirloom tomato soup, corn chowder with garden sweet corn, and smoked trout seasoned with fresh dill, while their favorite
    comfort dish is a plate of fried green tomatoes served with a side of homemade biscuits and honey butter.
  core: Frederick Capps, a 66‑year‑old custodian turned mentor, balances rigid routine with quiet anxiety, finds solace in fishing, gardening, and classic country tunes, and quietly navigates life with
    a pragmatic heart and occasional over‑stocked cleaning closets.
background:
  cultural: Frederick was born and raised in Barbourville, Kentucky, within the Appalachian‑influenced, white working‑class community of Knox County. His family’s roots are in coal mining and small‑scale
    farming, fostering a strong ethic of self‑reliance, hospitality, and respect for tradition. He grew up attending a local Methodist congregation, where community service and mutual support were emphasized.
    Regional customs—such as sharing home‑cooked meals of cornbread, country‑style vegetables, and bourbon‑based sauces—are a staple of family gatherings. Frederick’s identity is tightly bound to the values
    of modesty, practicality, and close‑knit community ties that characterize rural Eastern Kentucky.
