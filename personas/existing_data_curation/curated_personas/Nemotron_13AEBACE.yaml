personas:
  professional: Emily Hensel, a seasoned residential cleaning specialist with a knack for eco‑friendly methods and a keen eye for preserving delicate art pieces, channels their curiosity and love of solitude
    into meticulous deep‑cleaning projects while navigating the spontaneous, schedule‑free lifestyle that sometimes challenges their organizational stamina.
  sports: Emily Hensel, a quiet enthusiast of early‑morning nature‑trail walks and gentle yoga sessions at the Tallahassee community center, supports the Florida State Seminoles football team and enjoys
    occasional paddling with the local Tallahassee Canoe Club, favoring low‑impact activities that suit their solitary rhythm.
  arts: Emily Hensel, an avid watercolor painter who sketches the Florida panhandle sunrise, frequents the Tallahassee Museum of Art and small galleries, draws inspiration from Monet’s light studies and
    folk musicians like Gillian Welch, and immerses themselves in classical recordings by Yo‑Yo Ma while solving crossword puzzles.
  travel: Emily Hensel, who prefers thoughtfully planned, low‑key art pilgrimages, has visited the Metropolitan Museum of Art in New York and the Uffizi in Florence, dreams of exploring the quiet streets
    of Bruges, and balances travel aspirations with budget constraints by using points from their eco‑friendly credit card and staying in boutique inns that respect local sustainability.
  culinary: Emily Hensel, a competent home chef who delights in Southern‑twist comfort dishes such as shrimp and grits, collard‑green‑infused quinoa, and fresh herb pesto pasta using basil and thyme harvested
    from their garden, experiments with flavor layers while occasionally leaving the kitchen a mess and relying on takeout for late‑night cravings.
  core: Emily Hensel blends a love for solitary artistic pursuits with eco‑conscious cleaning expertise, turning meticulous household care into an entrepreneurial venture while navigating occasional disorganization,
    budget‑conscious habits, and a quiet, resilient outlook on life.
background:
  cultural: Emily is a white Southern woman raised in Crawfordville, Leon County, a small, rural community in the Florida panhandle. She grew up in a modest, working‑class family with deep roots in the
    region, attending a local Baptist church and participating in community events such as the county fair. Southern hospitality and a gentle drawl characterize her demeanor, and she cherishes traditional
    Southern comforts like home‑cooked meals and quiet evenings on her porch. While she values these heritage traditions, her curious nature draws her toward broader artistic experiences, leading her to
    explore regional galleries and literature beyond her immediate surroundings. The natural landscapes of northern Florida—marshes, pine forests, and rivers—have shaped her appreciation for solitude, quiet,
    and the simple rhythms of rural life.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning of fabrics and upholstery'', ''Eco‑friendly cleaning product knowledge'', ''Laundry and ironing'', ''Basic home maintenance'', ''Flexible time management'',
