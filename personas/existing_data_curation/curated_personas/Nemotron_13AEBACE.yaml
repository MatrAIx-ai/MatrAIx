  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading historical fiction'', ''Gardening'', ''Nature walks'', ''Visiting local art galleries'', ''DIY upcycling projects'', ''Cooking comfort meals'',
    ''Listening to folk and classical music'', ''Crossword puzzles'']'
  career_goals: Emily aspires to transition from employee to independent entrepreneur by launching a small, eco‑conscious cleaning service that specializes in homes, boutique hotels, and artist studios
    in the Tallahassee area. She plans to obtain a professional housekeeping certification to enhance credibility and to learn advanced stain‑removal and preservation techniques for art pieces. Over the
    next five years, she hopes to hire a few part‑time staff, thereby creating a supportive work environment that values flexibility and kindness. Additionally, she wishes to use the business’s earnings
    to fund occasional trips to major art museums and cultural festivals, blending her love of art with her livelihood.
