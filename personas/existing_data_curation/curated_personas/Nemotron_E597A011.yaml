  hobbies: '[''Fishing on the Mississippi River'', ''Pickup basketball games at the local park'', ''Country music concerts and line‑dancing evenings'', ''Barbecue cooking and Vidalia onion recipes'', ''Volunteer
    work with local food‑bank drives'', ''Church potluck gatherings'', ''Maintaining and customizing his pickup truck'', ''Cajun cooking classes'', ''Tailgating at high‑school football games'']'
  career_goals: Peyton aims to translate his reliable work habits into a supervisory role, such as shift lead or warehouse foreman, where he can set consistent daily routines for his crew. He plans to earn
    a commercial driver’s license (CDL) and a higher‑level OSHA certification to broaden his responsibilities. Over the next few years he hopes to oversee a whole loading dock, mentor newer workers, and
    eventually launch his own small moving or logistics service that serves the Vidalia area, providing stable income and a predictable schedule for his future family.
