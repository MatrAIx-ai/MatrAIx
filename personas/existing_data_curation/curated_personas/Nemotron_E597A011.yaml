personas:
  professional: Peyton Donohue is a certified forklift operator and inventory specialist at a busy warehouse who blends hands‑on mechanical know‑how with an outgoing, team‑centric attitude, constantly streamlining
    layout and safety protocols while eyeing a shift‑lead role and future CDL‑qualified logistics business.
  sports: Peyton Donohue is a weekend basketball regular with the Vidalia Community Hoops league, a devoted fisherman on the Mississippi River, a tailgate enthusiast for the Georgia Bulldogs and Atlanta
    Falcons, and a season ticket holder of the Atlanta Braves, balancing casual fitness with a love for local high‑school football games.
  arts: Peyton Donohue enjoys the lively atmosphere of country‑music concerts featuring Garth Brooks and Miranda Lambert, practices line‑dancing to Luke Bryan hits at local venues, and relaxes with classic
    westerns starring John Wayne, all of which reinforce a strong connection to traditional American storytelling and communal entertainment.
  travel: Peyton Donohue favors road trips that blend adventure and family time, often planning weekend getaways to New Orleans for Cajun cuisine, a fishing charter in the Gulf Coast of Mississippi, and
    a relaxing stay at a lakeside cabin in the Ozarks, while dreaming of a future vacation to Cancun’s beaches once the logistics business stabilizes.
  culinary: Peyton Donohue is an intermediate home cook who loves experimenting with smoky barbecue sauces, Vidalia‑onion caramelized pork ribs, and fresh catfish fries, often sourcing locally grown onions
    and hickory wood chips to impress friends at weekend potlucks.
  core: Peyton Donohue is a routine‑loving, sociable warehouse veteran who balances practical diligence with spontaneous BBQ experiments and a love for community gatherings, though they sometimes let disorganization
    slip when deadlines loom.
background:
  cultural: Peyton is a white Southern American with Irish ancestry, raised in the close‑knit, working‑class community of Vidalia, Louisiana. His family emphasizes Southern hospitality, regular church attendance
    (typically a Methodist congregation), and communal celebrations centered on food and music. Growing up amid the fertile fields of Concordia Parish, he learned the value of practical labor, modest living,
    and loyalty to neighborhood ties. The local culture of sweet‑onion farming, Cajun cuisine, and outdoor recreation has shaped his tastes and social habits, while his Irish roots bring a subtle appreciation
    for storytelling and camaraderie.
attributes:
