personas:
  professional: Spencer Shepherd, a 19‑year‑old aspiring journeyman welder and fabricator, blends a hands‑on curiosity for new materials with practical shop experience, deftly welding steel and aluminum
    while tinkering with CNC programming and 3D‑printed prototypes, and they approach each project with a competitive edge that drives them to out‑innovate peers despite a relaxed attitude toward rigid
    schedules.
  sports: Spencer Shepherd, an avid weekend fisherman and occasional trail hiker who follows the Mississippi State Bulldogs football season and roots for the New Orleans Saints, participates in a local
    bike‑repair club and a community fishing league, and they keep fitness low‑key with informal strength training at the shop rather than structured gym routines.
  arts: Spencer Shepherd, a lover of southern blues legends like B.B. King and gospel greats such as Aretha Franklin, frequently attends intimate jam sessions at a downtown venue, streams hip‑hop from Kendrick
    Lamar and J. Cole for inspiration while they prototype parts, and they unwind by reading sci‑fi classics like Dune, intertwining music and storytelling into their creative process.
  travel: Spencer Shepherd, who enjoys spontaneous road trips to nearby cultural hubs like New Orleans, Memphis, and the Great Smoky Mountains, dreams of exploring the historic shipyards of Glasgow and
    the art districts of Barcelona, and they plan travel loosely around school breaks and project deadlines, balancing a modest budget with a curiosity for both Southern heritage sites and global design
    influences.
  culinary: Spencer Shepherd, an intermediate cook who excels at smoking pork ribs, simmering collard greens with smoked turkey, and frying catfish on a cast‑iron skillet, loves experimenting with rubs
    featuring paprika, brown sugar, and garlic, and they often host friends for backyard barbecues where their homemade cornbread and sweet potato casserole become the centerpiece.
  core: Spencer Shepherd, a 19‑year‑old inventive fabricator with a love for blues, a laid‑back yet competitive streak, and a habit of juggling welding projects, gaming marathons, and spontaneous road trips,
    embraces solitude and community alike while occasionally letting disorganization slip into their schedule.
background:
  cultural: Spencer grew up in Meridian, Mississippi, within a close‑knit African American community that values church, family, and resilience. His family has deep roots in the Deep South, and weekly attendance
    at a Baptist church has reinforced a strong sense of community and moral grounding. Southern blues, gospel music, and the soulful flavors of fried catfish, collard greens, and cornbread are integral
    to his upbringing. He carries the legacy of Black labor in the region's industrial and agricultural sectors, which informs his pride in skilled trades and his desire to uplift fellow Black workers.
    Spencer celebrates Juneteenth, participates in local cultural festivals, and embraces the oral storytelling tradition of his elders. While he respects Southern hospitality, he also navigates contemporary
    influences—from urban fashion to social media—balancing heritage with a personal drive to forge his own path.
attributes:
  skills: '[''Welding (MIG/TIG, stick)'', ''Metal fabrication (cutting, bending, assembling)'', ''CNC machining (basic operation and G‑code reading)'', ''Desktop 3D printing (FDM) and basic plastic molding'',
    ''Blueprint and technical drawing interpretation'', ''Material selection for metals and plastics'', ''Improvisational repair and troubleshooting'', ''OSHA safety compliance and PPE usage'', ''Shop inventory
    and tool maintenance'', ''Basic DIY electronics wiring'']'
  hobbies: '[''Motorcycle and bicycle customization'', ''Minecraft and Kerbal Space Program (simulation gaming)'', ''Listening to blues, gospel, and hip‑hop'', ''Attending small local jam sessions'', ''Fishing
    and hiking in the Mississippi outdoors'', ''Following DIY metalworking and 3D‑printing YouTube channels'', ''Reading sci‑fi novels and engineering magazines'', ''Cooking Southern soul‑food (barbeque,
    collard greens)'']'
  career_goals: Spencer aims to earn a journeyman welding certification within the next two years and become a lead fabricator at a regional metal shop. He envisions launching his own small‑scale custom
    metal‑and‑plastic prototyping business that serves local farms, auto shops, and hobbyists, leveraging his hybrid‑material expertise. To support this, he plans to master advanced CNC programming and
    integrate 3D‑printed components into his designs. Spencer also wants to give back by mentoring other young Black tradespeople through apprenticeship programs at the local community college, building
    a reputation as an innovative, reliable artisan while preserving the flexibility he values in his work life.
