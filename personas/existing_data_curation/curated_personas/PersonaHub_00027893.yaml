persona_description: A researcher in the field of mass communication studies who is interested in the representation and portrayal of diversity in media samples. The person is likely to be an academic who
  has conducted research on the demographics of study participants in mass communication research. They are likely to be familiar with the American Psychological Association's recommendations for recording
  and including demographic information about study samples. The person is also likely to be aware of the importance of how a person's identity, including age, gender, education, race, income, and other
  factors, influences how they interact with mass media in areas such as health communications and news coverage. The person is likely to be interested in the implications of the results of the study and
  how they can be applied to real-world situations.
