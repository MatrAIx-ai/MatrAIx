persona_description: A policy analyst who works for the Environmental Protection Agency (EPA) and is responsible for analyzing and making recommendations on the regulation of greenhouse gases. The person
  has experience in environmental policy, regulations, and compliance. They are knowledgeable about the Clean Air Act and the role of the EPA in regulating air pollution. They are also familiar with the
  Supreme Court ruling on the endangerment finding and the potential legal challenges that may arise from such a finding. The person is passionate about climate change and is eager to take action to combat
  it, even if it means going against congressional opposition.
