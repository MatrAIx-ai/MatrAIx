  hobbies: '[''Classic car restoration and club participation'', ''Volunteering as a youth baseball coach'', ''Barbecue cooking and recipe experimentation'', ''Fishing on the Mississippi River'', ''Gardening
    (vegetable and flower beds)'', ''Playing acoustic guitar at community events'', ''Attending local fairs and community festivals'']'
  career_goals: Phillip aims to transition from a hands-on technician to a leadership role within the next few years. He hopes to become a shop foreman or service manager, where he can mentor the next generation
    of mechanics and implement efficient shop processes. He is pursuing additional certifications in hybrid-electric systems to stay ahead of industry trends. Ultimately, he envisions opening a boutique
    repair shop focused on classic car restoration and eco-friendly vehicle maintenance, allowing him to blend his technical expertise with his passion for community engagement.
