personas:
  professional: Phillip Hanson, a seasoned ASE Master Technician with four decades of hands‑on expertise in gasoline and hybrid powertrains, leverages his practical curiosity and knack for clear communication
    to train apprentices, streamline shop workflow, and pursue a foreman role that blends classic‑car restoration with eco‑friendly practices.
  sports: Phillip Hanson, a dedicated youth baseball coach for the Alton Tigers, spends Saturday mornings coaching Little League, cheers on the St. Louis Cardinals in spring and summer, follows the St. Louis
    Blues during hockey season, and maintains personal fitness through occasional weekend fishing trips on the Mississippi and light weight‑lifting at the community gym.
  arts: Phillip Hanson finds artistic release strumming acoustic renditions of Johnny Cash and The Beatles at church socials, attends the annual Mid‑America Car Show where he admires vintage billboard art,
    and regularly watches classic films starring John Wayne, all of which shape his relaxed yet expressive leisure time.
  travel: Phillip Hanson prefers well‑planned road trips in his restored 1965 Mustang, often heading to Detroit for the North American International Auto Show, the Great Smoky Mountains for weekend fishing
    retreats, and Nashville for live music festivals, balancing a modest travel budget with a love for family‑friendly destinations.
  culinary: Phillip Hanson, a confident backyard grillmaster, spends Saturday afternoons smoking pork ribs with a tangy homemade barbecue sauce, tossing fresh garden tomatoes, basil, and corn into a crisp
    summer salad, and occasionally experimenting with a peppercorn‑crusted steak while pairing his meals with a cold local craft beer.
  core: Phillip Hanson is a pragmatic yet curious mechanic‑mentor who thrives on community, classic‑car craftsmanship, and the occasional over‑indulgent barbecue, balancing structured leadership aspirations
    with a talkative, easy‑going manner.
background:
  cultural: Phillip grew up in a small working-class town near Alton, immersed in the Midwestern culture of practicality, humility, and community support. His family roots trace back to German and Irish
    immigrants who settled in Illinois during the 19th century, instilling a strong work ethic and respect for craftsmanship. The region's emphasis on neighborly assistance, church involvement, and local
    celebrations shaped his cooperative nature and love for community events. These cultural influences are evident in his everyday interactions, his dedication to local sports coaching, and his participation
    in regional car clubs and fairs.
