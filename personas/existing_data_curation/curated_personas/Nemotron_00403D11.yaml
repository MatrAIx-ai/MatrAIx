  career_goals: Cameron dreams of a future where his love for discovery meets his desire to help living beings. He is fascinated by animals and often says he wants to become a veterinarian or wildlife biologist
    to care for creatures in need. His interest in how things work also leads him to imagine a career as an environmental scientist or engineer, developing solutions that protect nature. Long‑term, he hopes
    to contribute to community projects, such as volunteering at a local animal shelter or leading science outreach for younger kids, combining his compassion with his practical curiosity.
