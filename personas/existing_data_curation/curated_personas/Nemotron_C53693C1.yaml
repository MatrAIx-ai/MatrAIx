personas:
  professional: Stacey Broussard, a 29‑year‑old painter and paperhanger in Ohio, combines meticulous blueprint reading, OSHA‑compliant safety practices, and a methodical scheduling mindset to deliver high‑quality
    residential projects while mentoring apprentices and planning her future lead‑painter certification.
  sports: Stacey Broussard is a regular at local high‑school football games, cheering for the Middletown Trojans, participates in a weekend hiking club at Hocking Hills State Park, and follows the Cleveland
    Browns and Akron RubberDucks, blending community spirit with active outdoor fitness.
  arts: Stacey Broussard expresses her creative side by painting community‑theater sets, quilting intricate patterns inspired by folk motifs, and reading historical fiction by Ken Follett and Hilary Mantel,
    while grooving to The Avett Brothers during potluck evenings.
  travel: Stacey Broussard prefers short, well‑planned getaways, such as weekend hikes in Hocking Hills, a road‑trip to the Amish countryside, and an annual visit to the Ohio State Fair, balancing adventure
    with budget‑friendly family visits.
  culinary: Stacey Broussard delights in cooking farm‑to‑table meals, often preparing roasted root vegetables, chicken pot pie, and apple crumble using garden harvests and fresh rosemary, while her baking
    skill shines in perfectly crisp cornbread and Sunday potluck casseroles.
  core: Stacey Broussard, a 29‑year‑old Ohio painter, blends routine‑driven precision, community‑centric kindness, and a love for hands‑on creativity, though she sometimes overcommits to potlucks and forgets
    to rest.
background:
  cultural: Stacey was raised in a close‑knit Midwestern town in Ohio, where practical values, hard work, and community involvement are core to daily life. Her family’s heritage includes German and Irish
    roots, and she grew up with traditions such as annual county fairs, church potlucks, and a strong emphasis on family gatherings. The regional culture of reliability, modesty, and neighborly support
    informs her disciplined approach to work and her preference for routine. While she holds traditional values, she also embraces the social fabric of Middletown through local sports events, volunteering,
    and participation in community organizations.
