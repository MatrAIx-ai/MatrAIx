  hobbies: '["Gardening", "Cooking and baking", "Community theater set painting", "Volunteering at church", "Hiking", "Attending local sports events", "Reading historical fiction", "DIY home improvement",
    "Quilting"]'
  career_goals: Stacey aims to become a certified lead painter and eventually a licensed contractor. Over the next five years she plans to obtain a Lead‑Safe certification, complete a state‑approved construction
    management program, and take on supervisory roles on larger residential and commercial projects. Her long‑term ambition is to launch a family‑owned painting and paper‑hanging business that emphasizes
    reliability, high‑quality workmanship, and community service. She also hopes to become an active member of the local union, mentoring apprentices and promoting safe, efficient practices.
