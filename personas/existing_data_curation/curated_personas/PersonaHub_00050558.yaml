persona_description: A policy researcher and advocate who specializes in the field of education policy, particularly focusing on the integration and success of English-language learners. This individual
  has extensive knowledge and experience in analyzing data and evaluating educational programs, and is passionate about promoting equity and accessibility for all students, particularly those who have faced
  barriers to learning due to their immigration status. This persona is likely to be interested in the Hartford Foundation for Public Giving's Latino Endowment Fund policy paper on English-language learners,
  the Center for American Progress report on engaging students and parents, and the White House's waiver for English-language learners.
