personas:
  professional: Maria Echeverria, a 23‑year‑old bilingual museum docent and budding graphic designer, blends meticulous event scheduling with a love for watercolor and photography, uses Canva and Photoshop
    to create inclusive branding for community nonprofits, and they aim to become a bilingual education coordinator who designs art workshops for youth and seniors.
  sports: Maria Echeverria prefers low‑impact exercise, jogging along the Mississippi River trail three times a week, attending a weekly yoga class at the community center, kayaking on the nearby Wisconsin
    River during summer, and quietly cheering for the Quad Cities River Bandits during occasional games.
  arts: Maria Echeverria, an avid watercolorist and street‑photographer, volunteers as a docent at Figge Art Museum where they lead intimate tours, sketch bustling festivals for journaling, reads classics
    alongside contemporary authors, and draws creative inspiration from the works of Claude Monet, Georgia O'Keeffe, and modern muralist Keith Haring.
  travel: Maria Echeverria, a methodical planner, enjoys weekend getaways to nearby prairie towns like Galena for historic tours, has backpacked through the vibrant streets of a southern city famed for
    its Day of the Dead celebrations, kayaked the Wisconsin River in summer, and hopes to study a mural project in a historic European capital next year, balancing travel with a modest student budget.
  culinary: Maria Echeverria, a skilled home cook, relishes preparing family‑heritage dishes such as tamales, mole, and pozole for holiday gatherings, cultivates fresh cilantro, oregano, and epazote in
    their indoor garden to enhance flavors, and they often pair meals with freshly brewed hibiscus tea while listening to traditional folk music.
  core: Maria Echeverria, a quietly curious 23‑year‑old, merges methodical organization with a love for spontaneous sketching, sometimes procrastinates on admin tasks while obsessively curating watercolor
    palettes, and finds harmony in blending heritage recipes with modern design.
background:
  cultural: Maria was raised in a Mexican‑American household where Spanish was spoken at home and English at school. Family gatherings often centered around shared meals, music, and the celebration of Mexican
    holidays such as Día de los Muertos and Cinco de Mayo, which she continues to observe in Davenport's close-knit Hispanic community. Her upbringing blended traditional Mexican values of respect for elders,
    hospitality, and communal harmony with the Midwestern emphasis on independence and self‑reliance. This bicultural experience informs her artistic tastes, culinary preferences, and her desire to foster
    cultural understanding through art education.
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Organizational planning and scheduling'', ''Event coordination for small group workshops'', ''Basic graphic design (Canva, Photoshop)'', ''Digital
    research and documentation'', ''Art curation and exhibit assistance'', ''Community outreach and volunteer coordination'', ''Culinary preparation of traditional Mexican dishes'', ''Basic horticulture
    and indoor gardening'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Street photography'', ''Reading literature (including Mexican authors)'', ''Cooking traditional Mexican cuisine'', ''Indoor gardening'', ''Poetry reading
    and composition'', ''Volunteer docent at local museum'', ''Journaling'']'
  career_goals: Maria aims to enroll in a community college program in visual arts or museum studies while continuing to volunteer at the Figge Art Museum. Her long‑term ambition is to become a bilingual
    education coordinator who designs and leads small‑group art workshops for youth and senior community members, bridging Mexican cultural traditions with contemporary artistic expression. She also hopes
    to earn a certification in early childhood education so she can develop culturally responsive curricula for local schools. In parallel, she plans to build a modest freelance portfolio in graphic design,
    offering services to small businesses in Davenport that value inclusive, bilingual branding.
