personas:
  professional: Ronnie Even is a hands‑on audiovisual installer who excels at wiring, calibrating, and integrating sound‑video‑control systems for venues ranging from schools to churches, leveraging their
    practical mindset and love for structured problem‑solving while also embracing a laid‑back approach that lets them improvise when schedules slip.
  sports: Ronnie Even follows the Orlando Magic and the Tampa Bay Rays, competes with the Brevard County Kayak Club on weekends, regularly fishes in the Indian River, and rides a road bike with the Coastal
    Trail Cyclists group, blending competitive fandom with low‑key outdoor recreation.
  arts: Ronnie Even immerses themselves in the local rock scene, regularly cheering on bands like The Black Keys and Queens of the Stone Age at live venues while also curating a home theater where they
    binge‑watch indie films by directors like Alex Garland and Sofia Coppola, letting music and cinema fuel their creative spark.
  travel: Ronnie Even favors road trips that mix coastal breezes with tech pilgrimage, having explored Key West’s seafood shacks, Cape Canaveral’s launch complexes, and the gadget districts of Tokyo, but
    keeps travel plans flexible and budget‑conscious, often using airline points to stretch modest savings.
  culinary: Ronnie Even enjoys cooking blackened grouper tacos with fresh cilantro and lime, perfects a garlic‑butter shrimp po‘boy, and experiments with a DIY sous‑vide rig built from Arduino components,
    while also treating themselves to pepperoni pizza topped with basil after a long installation day.
  core: Ronnie Even, a 29‑year‑old AV tech with a passion for custom rigs and a habit of leaving cables wherever they work, balances meticulous technical craft with a relaxed, spur‑of‑the‑moment lifestyle
    that fuels both their career ambitions and weekend adventures.
background:
  cultural: Ronnie grew up in a middle‑class, white‑American family in Central Florida, where the blend of Southern hospitality and the high‑tech aerospace environment shaped his worldview. The proximity
    to NASA’s launch facilities and the Space Coast’s tech community fostered an early interest in practical engineering and electronics. Community values such as cooperation, modest self‑reliance, and
    a laid‑back attitude toward deadlines are reflected in his pragmatic yet flexible approach to work. He also embraces the local outdoor lifestyle—beaches, fishing, and water sports—which reinforces his
    preference for a balanced mix of social interaction and solitary downtime.
attributes:
  skills: '["AV system installation","Video projection setup","Audio signal troubleshooting","Networked AV configuration (Dante, NDI)","Control system integration (Crestron, AMX)","Technical schematics
    reading and drafting","Basic electrical wiring","Customer service and client communication","On‑site troubleshooting under pressure","Project documentation and reporting"]'
  hobbies: '["Custom PC building","Arduino sound experiments","Live music attending and small‑venue sound assistance","Fishing","Kayaking","Coastal biking","Sci‑fi reading","Home‑theater movie watching"]'
  career_goals: Ronnie aims to become a senior lead installer within the next three years, earning advanced certifications such as CEDIA CTS‑D and Crestron Certified Programmer. He plans to take on larger,
    multi‑venue projects that combine audio, video, and networked control, eventually moving into a project‑management role where he can mentor newer technicians. Long‑term, he hopes to start his own boutique
    AV consultancy focused on Florida’s growing space‑tourism and education sectors, providing design, installation, and support services while maintaining a flexible schedule that allows for personal projects
    and family time.
