personas:
  professional: Catalina Munoz, an experienced high‑voltage power line technician, leverages her meticulous safety expertise, bilingual communication, and solution‑oriented mindset to lead crews while balancing
    a curiosity for renewable‑energy technologies with pragmatic project delivery.
  sports: Catalina Munoz enjoys walking the Queens Botanical Garden, follows the New York Mets and the New York Knicks for seasonal excitement, and stays active through weekly yoga sessions and a neighborhood
    dance class at the local community center.
  arts: Catalina Munoz captures everyday Queens life with a modest DSLR, pairs the images with a love for cumbia legend Celso Piña and salsa icon Celia Cruz, and unwinds by reading historical fiction by
    Ken Follett, weaving music and visual storytelling into their evenings.
  travel: Catalina Munoz prefers thoughtfully planned trips that blend cultural immersion with relaxation, having explored the historic streets of Cartagena, the sun‑kissed beaches of Aruba, and the vibrant
    plazas of Barcelona, while keeping travel budgets balanced with family responsibilities.
  culinary: Catalina Munoz enjoys preparing a hearty bandeja paisa with chorizo, beans, plantains, and avocado, perfecting arepas seasoned with queso fresco, and experimenting with fresh cilantro, annatto,
    and extra‑virgin olive oil harvested from their own herb garden.
  core: Catalina Munoz blends a high‑voltage safety mindset with a garden‑loving, music‑driven soul, juggling strict protocols by day and spontaneous salsa steps by night, all while guarding a secret stash
    of homemade spice blends.
background:
  cultural: Catalina was raised in a Colombian immigrant family that settled in Queens, New York. Her upbringing blended traditional Colombian customs—such as celebrating Carnaval de Barranquilla, family
    gatherings featuring music and dance, and a strong Catholic faith—with the multicultural vibrancy of Hollis. Fluent in both Spanish and English, she maintains close ties to the Colombian diaspora, regularly
    attending community festivals and supporting cultural organizations. Her Colombian heritage influences her work ethic, emphasizing perseverance, teamwork, and a practical approach to problem‑solving.
    At home, she preserves culinary traditions and shares her heritage with her children and neighbors, fostering a sense of cultural pride while navigating the diverse landscape of New York City.
