  career_goals: Catalina aims to advance to a lead technician or forewoman role, overseeing larger utility projects and mentoring new apprentices. She plans to obtain certifications in renewable‑energy
    infrastructure, such as solar‑panel integration and wind‑turbine maintenance, to broaden her skill set. Over the next five years, she hopes to lead safety‑training workshops for the local community
    and eventually transition to a part‑time consulting role that blends her technical expertise with her passion for education. Securing a stable retirement benefit through union membership and possibly
    launching a small, family‑run electrical contracting service are also long‑term aspirations.
