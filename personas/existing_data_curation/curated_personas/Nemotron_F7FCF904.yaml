  career_goals: Aurora aims to advance from her supervisory role to an Operations Manager position within the next three to five years, overseeing larger cross‑functional teams and integrating emerging
    technologies such as AI‑driven workflow tools. She plans to earn a PMP certification and possibly pursue an MBA to strengthen her strategic and financial acumen. A core ambition is to create a mentorship
    program for women and Latinx professionals in the office environment, fostering inclusive leadership pathways. Additionally, she seeks to champion flexible work arrangements and cultural diversity initiatives
    that reflect both her competitive spirit for excellence and her appreciation for innovative, people‑centric solutions.
