personas:
  professional: A budding digital artist and coder, Cecilia combines hand-drawn sketches of mythic characters with Python-generated visual patterns, positioning themselves as a future interdisciplinary
    creator who values solitary, meticulous work and constantly experiments with new media.
  sports: Preferring solo activity, Cecilia practices freestyle skateboarding at the local skate park and follows the Orlando Magic for excitement, while occasionally joining a school chess club that doubles
    as a strategic mental workout, and they hold a seasonal membership with a community swimming pool.
  arts: Cecilia immerses themselves in sketching folkloric‑inspired characters, photographing urban textures, and curating playlists that blend Vallenato, indie rock band Arcade Fire, and ambient electronic
    composer Nils Frahm, frequently citing the influence of magical‑realist writers like Gabriel García Márquez on their visual storytelling.
  travel: Cecilia dreams of exploring the misty highlands of Machu Picchu and the colorful streets of Cartagena, yet they spend weekend trips visiting nearby natural springs and the Kennedy Space Center,
    planning trips meticulously via Google Maps while balancing school commitments.
  culinary: Cecilia enjoys experimenting with homemade rice bowls spiced with turmeric and coconut milk, snacking on mango‑chili salsa with tortilla chips, and occasionally indulging in artisanal matcha
    lattes, though they often forget to eat lunch on busy school days.
  core: Cecilia is a solitary, curiosity‑driven teen who merges art, code, and cultural storytelling into a unique creative outlet, while juggling a modest allowance, mild health quirks, and a penchant
    for strategic solo sports.
background:
  cultural: Cecilia was born to Colombian immigrants who settled in Orlando’s vibrant Latino community. She grew up speaking Spanish at home and celebrating Colombian holidays such as Día de la Independencia
    and Carnaval de Barranquilla, while also participating in American school traditions. Family gatherings feature traditional dishes like bandeja paisa and empanadas, and music ranging from cumbia to
    contemporary pop. This bicultural upbringing has shaped her aesthetic sensibility, giving her a deep appreciation for colorful folk art, storytelling, and the rhythmic interplay of Latin and Western
    influences. She often incorporates Colombian motifs and color palettes into her artwork, bridging her heritage with the diverse cultural landscape of Central Florida.
attributes:
  skills: '[''digital illustration'', ''hand-drawn sketching'', ''photography'', ''basic Python programming'', ''bilingual communication (English/Spanish)'', ''critical thinking'', ''research synthesis'',
