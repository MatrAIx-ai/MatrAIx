  hobbies: '[''sketching'', ''digital painting'', ''visiting art museums'', ''street-art photography'', ''reading magical-realism novels'', ''listening to Vallenato and indie music'', ''playing chess'',
    ''coding generative art scripts'']'
  career_goals: Cecilia aspires to attend a specialized visual-arts high school where she can deepen her illustration and concept-art skills, eventually earning a BFA in Graphic Design or Animation. She
    dreams of becoming a concept artist for video-game studios or an independent graphic-novel creator, combining her love for storytelling, Colombian cultural motifs, and cutting-edge digital tools. In
    the long term she hopes to curate a multicultural art exhibit that highlights Latin American narratives in the United States.
