  career_goals: Stephen aims to transition from active emergency response to mentorship and education, seeking a part‑time instructor role at the local community college or fire department. He hopes to
    author a field guide on rural EMS best practices that integrates his interest in art‑based coping strategies for first‑responders. He also intends to serve on the board of the Wisconsin State EMS Association
    to influence policy on continuing education and rural healthcare access. Over the next five to seven years, he plans to gradually reduce on‑call hours while establishing a community health outreach
    program that blends first‑aid training with creative workshops, thereby extending his impact beyond emergency scenes to preventive wellness in his hometown.
