  hobbies: '[''drawing'', ''watercolor painting'', ''digital illustration'', ''playing acoustic guitar'', ''songwriting'', ''reading sci‑fi/fantasy'', ''creative writing'', ''sandbox gaming (Minecraft,
    Stardew Valley)'', ''indie gaming (Hades)'', ''photography (cityscapes, nature)'', ''exploring local parks'', ''DIY electronics (LED circuits, Arduino)'']'
  career_goals: Christopher dreams of turning his artistic passions into a career. He hopes to enroll in a community college or an online program focused on visual arts, illustration, or game design. His
    long‑term goal is to become a concept artist for video games or graphic novels, blending his love for storytelling with visual creation. He also envisions working as a freelance UI/UX designer for indie
    apps, valuing the flexibility and creative autonomy the field offers. While he remains open to unconventional pathways, he aspires to build a modest studio where he can sell original prints, custom
    illustrations, and handcrafted items, allowing him to sustain himself through self‑directed creative work.
