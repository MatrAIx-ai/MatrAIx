  hobbies: '[''Book club (historical fiction)'', ''Church choir'', ''Community volunteer work (safety inspections)'', ''Gardening'', ''Knitting and crocheting'', ''Neighborhood walking group'', ''Potluck
    cooking and baking'', ''Senior center activity coordination'', ''Participating in local history tours'', ''Attending community theater'']'
  career_goals: Cara aims to solidify her legacy as a quality‑focused leader within her plant before retiring. Over the next few years she plans to earn the Certified Quality Improvement Associate (CQIA)
    credential and pursue a senior inspector or quality‑assurance team‑lead position, where she can design and implement training modules for new inspectors and drive continuous‑improvement projects. She
    also hopes to mentor younger colleagues, share her practical knowledge, and eventually transition to a part‑time consulting role for other local manufacturers, helping them establish reliable inspection
    protocols while preserving the routine and consistency she values.
