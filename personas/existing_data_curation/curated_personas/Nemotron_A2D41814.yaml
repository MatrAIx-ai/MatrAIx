personas:
  professional: Mechanical engineering student Darrin Blanton blends a hands‑on knack for Arduino tinkering, Python scripting, and woodworking into a pragmatic design mindset, turning curiosity into reliable
    prototype builds while navigating class projects with organized flexibility, and they consistently apply meticulous documentation to every project.
  sports: Active‑outdoor enthusiast Darrin Blanton stays fit through weekly hikes on local trails, weekend fishing trips at nearby lakes, and rides with the amateur cycling club ‘Peak Pedalers’, they root
    for the Galloway Falcons baseball team and follow regional marathon events, preferring low‑impact endurance over high‑intensity competition.
  arts: Creative‑leaning Darrin Blanton indulges in sci‑fi literature, streams the synth‑driven soundscapes of Vangelis and Daft Punk, revisits classic films like Blade Runner, and admires the minimalist
    woodworking designs of George Nakashima, they often sketch ideas for future projects while listening to these influences.
  travel: Adventurous traveler Darrin Blanton favors low‑key road trips to national parks, having hiked the towering redwoods of California and camped along Acadia’s rugged coastline, they dream of a tech‑focused
    pilgrimage to Tokyo’s Akihabara district and a scenic bike tour through the Dutch countryside, balancing budget constraints with a desire for immersive experiences.
  culinary: Food‑focused Darrin Blanton prefers simple, protein‑rich meals such as grilled trout with lemon‑dill, hearty chili con carne, and homemade ramen bowls flavored with fermented miso and fresh
    scallions, they enjoy seasoning with rosemary and smoked paprika and are competent at assembling a wood‑fired pizza, yet they rarely venture into fine‑dining settings.
  core: Quietly curious Darrin Blanton channels solitary tinkering into practical engineering, balances thrift with occasional hobby splurges, wrestles with anxiety yet finds calm in the rhythm of wood
    grain and bike grease, they envision a future custom bike shop where precision meets independence.
background:
  cultural: Darrin grew up in Galloway, a small community in Madison County, Ohio, where Midwestern values of modesty, hard work, and self‑reliance are common. His family is of European ancestry and has
    maintained a middle‑class lifestyle, emphasizing practical education and community involvement. Local traditions such as county fairs, high school sports, and volunteerism have shaped his sense of belonging.
    While he identifies culturally as American, he feels a connection to the region's agricultural and manufacturing heritage, which influences his appreciation for hands‑on work and pragmatic problem‑solving.
attributes:
  skills: '[''Python programming'', ''JavaScript development'', ''Excel data analysis'', ''Basic R scripting'', ''Computer hardware troubleshooting'', ''Electronic circuit debugging'', ''Bicycle repair'',
