  hobbies: '[''Reading (science‑fiction and technical non‑fiction)'', ''Arduino electronics projects'', ''Strategy and simulation video games'', ''Hiking and nature walks'', ''Fishing'', ''Camping'', ''Woodworking'',
    ''Bicycle maintenance'', ''Volunteer computer assistance at local library'']'
  career_goals: Looking ahead, Darrin aims to complete his bachelor's degree in mechanical engineering or a related field, securing an internship that lets him apply his blend of curiosity and pragmatism.
    He aspires to work as a design engineer in the automotive or manufacturing sector, where he can develop reliable, efficient products while continuing to innovate. In the longer term, he envisions possibly
    launching a small custom bike or woodworking shop that would combine his technical expertise with his desire for independent, hands‑on work. He also hopes to gain professional certifications such as
    CAD and CNC machining to broaden his career options.
