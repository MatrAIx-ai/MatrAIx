  career_goals: Ila aims to evolve into a lead engineer or technical product strategist role where she can shape user‑centric products that have a positive social impact, such as educational or health‑tech
    platforms. She seeks opportunities that offer flexible remote work, allowing her to manage her anxiety while still contributing creatively. Over the next five years she hopes to build a reputation as
    an empathetic technical leader, mentor diverse talent, and perhaps launch a boutique consultancy that emphasizes collaborative, low‑stress development practices.
