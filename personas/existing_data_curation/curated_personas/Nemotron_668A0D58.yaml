  career_goals: Charlotte aims to translate her community‑focused expertise into a part‑time role as a local government liaison or nonprofit program manager, allowing her to influence public‑service projects
    while maintaining flexibility for family commitments. She also envisions launching a small home‑based business—perhaps a custom woodworking shop or a curated online marketplace for Texas‑made crafts—leveraging
    her practical skills and market awareness. Long‑term, she hopes to serve on the Elgin town council or a county board, using her organized, realistic approach to help shape sustainable development and
    preserve the town’s heritage.
