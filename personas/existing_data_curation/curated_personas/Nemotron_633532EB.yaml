personas:
  professional: Wesley Edwards is a budding LEGO engineer who uses their methodical mind to design intricate structures, channeling their curiosity and competitive streak into mastering building challenges
    and dreaming of becoming a real architect.
  sports: Wesley Edwards loves joining pickup soccer games at the neighborhood park, cheering for the Miami Dolphins and the Orlando Magic while proudly wearing their Everglades Tigers youth soccer jersey,
    combining their competitive nature with organized practice drills they devise on the field.
  arts: Wesley Edwards spends weekends sketching cartoon characters inspired by Matt Groening and listening to Kendrick Lamar and Beyoncé, turning their appreciation for vibrant art and hip‑hop into a personal
    comic series that mixes mystery storytelling with rhythmic captions.
  travel: Wesley Edwards revels in weekend family hikes through the Everglades, dreams of visiting the Grand Canyon’s colorful rock formations, and hopes to explore the ancient ruins of Machu Picchu, balancing
    structured itinerary planning with spontaneous wildlife spotting.
  culinary: Wesley Edwards favors pizza topped with pepperoni and extra cheese, crafts peanut butter‑banana sandwiches for snack time, enjoys making strawberry smoothies with fresh fruit, yet often leaves
    a trail of crumbs on the kitchen counter, reflecting their enthusiastic but messy cooking style.
  core: Wesley Edwards is a curious, organized seven‑year‑old whose competitive spark fuels LEGO builds, soccer scrimmages, and mystery‑book quests, all while juggling a love for hip‑hop beats and a habit
    of leaving glittery art supplies scattered across the living room.
background:
  cultural: Wesley grows up in a close‑knit African‑American family in Homestead, Florida, where community values and extended family gatherings are central. His parents emphasize storytelling, gospel music,
    and the importance of education, instilling pride in his Black heritage. Living near Miami‑Dade County, he is also exposed to the vibrant multicultural atmosphere, hearing Spanish and Creole languages,
    enjoying Cuban cuisine, and participating in neighborhood festivals that blend Southern U.S. and Latin American traditions. These cultural threads shape his worldview, fostering respect for diversity,
    a love of rhythm and movement, and a strong sense of belonging to both his local community and the broader Black diaspora.
