  hobbies: '[''Drawing and painting'', ''Building LEGO creations'', ''Playing soccer with friends'', ''Exploring nature in Everglades parks'', ''Reading adventure books'', ''Listening to hip‑hop and R&B
    music'', ''Playing educational video games'']'
  career_goals: Wesley imagines a future where he explores the stars and designs machines that travel to other planets. He talks about becoming an astronaut‑engineer who creates innovative spacecraft and
    solves tough problems. He also dreams of using his artistic talent to illustrate scientific discoveries for kids, combining his love of art and curiosity about new ideas. As a competitive spirit, he
    aims to excel in school science fairs and, on the playground, become a leader on his soccer team, showing both skill and strategic thinking.
