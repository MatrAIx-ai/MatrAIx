  hobbies: '[''soccer'', ''church choir singing'', ''baking and cooking'', ''hiking'', ''fishing'', ''gardening'', ''watching nature documentaries'', ''DIY crafting'', ''video editing for social media'']'
  career_goals: Sharon aims to earn her GED within the next two years and then enroll in a community college program focusing on agricultural technology or early childhood education. She envisions working
    as an assistant for the local community center's youth programs, helping organize activities and tutoring younger students. Long‑term, she hopes to achieve a certification in horticulture and perhaps
    start a small neighborhood farm‑stand that blends her love of practical gardening with community engagement.
