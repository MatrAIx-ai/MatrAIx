personas:
  professional: Sharon Dwyer, a 16‑year‑old budding community organizer and aspiring agricultural technologist, combines practical curiosity with reliable event‑planning skills—organizing school fundraisers,
    tutoring peers in math, and creating Scratch projects—while their sociable and flexible nature lets them adapt on the fly to last‑minute changes.
  sports: Sharon Dwyer, a member of the Ridgecrest High School Falcons soccer team and an avid hiker on local trails like Willow Creek, supports the Portland Thorns in the NWSL, enjoys weekend fishing at
    Lake Evergreen, and maintains fitness through flexible practice schedules that fit their energetic, team‑oriented personality.
  arts: Sharon Dwyer expresses creativity through the church choir, crafting DIY décor inspired by Bob Ross, baking to the rhythm of Taylor Swift and Beyoncé, and editing short video reels featuring nature
    documentaries and cooking demos for friends, drawing artistic inspiration from the whimsical storytelling of Pixar’s ‘Inside Out’.
  travel: Sharon Dwyer dreams of exploring the redwoods of Redwood National Park and the geysers of Yellowstone on family road trips, while planning weekend hikes to state parks using Google Maps, favoring
    nature‑focused destinations that blend adventure with affordable, low‑key travel.
  culinary: Sharon Dwyer loves baking classic chocolate chip cookies, velvety red‑velvet cupcakes with cream cheese frosting, and lemon drizzle cake, often incorporating fresh mint or rosemary from their
    garden, and rates themselves as an intermediate baker who experiments with seasonal fruits and decorative piping.
  core: Sharon Dwyer blends garden‑fresh optimism with organized energy, turning every hobby into a community‑building act—though they sometimes postpone schoolwork for late‑night video edits.
background:
  cultural: Sharon was raised in Harvard, Illinois, a close‑knit Midwestern town with strong agricultural roots and a predominantly Protestant community. Her family’s ancestry includes Irish and German
    heritage, typical for the region, and community traditions such as county fairs, high school football games, church potlucks, and volunteer service shape her cultural identity. These influences foster
    a pragmatic, cooperative, and community‑oriented outlook, emphasizing modesty, self‑reliance, and the importance of helping others.
attributes:
  skills: '[''event organization'', ''basic computer literacy (Microsoft Office, internet research)'', ''introductory programming (Scratch)'', ''team collaboration'', ''gardening'', ''animal care'', ''basic
