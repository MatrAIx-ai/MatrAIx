    and mentorship", "Stress management under high call volume"]'
  hobbies: '["Soccer (community league)", "Cooking Mexican and fusion cuisine", "Attending regional music festivals and concerts", "Following Liga MX and NFL", "Competitive video gaming (e.g., multiplayer
    shooters)", "Weight training at the gym", "Volunteering for community cultural events"]'
  career_goals: Luis aims to advance from front‑line representative to a supervisory role within the next three years, targeting a Team Lead or Operations Manager position at his current company. He plans
    to complete a bachelor's degree in Business Administration, leveraging his associate’s background, to broaden his strategic understanding. In the longer term, he aspires to open his own customer‑experience
    consulting firm that helps small businesses improve service quality, combining his practical experience with his curiosity about innovative service models. He also hopes to become a trainer for new
    hires, sharing his expertise while staying competitive and results‑driven.
