  career_goals: Andre aims to secure a trade certification—such as electrician or HVAC technician—within the next two years, while taking community‑college courses in business management. His goal is to
    launch a small, community‑focused landscaping and home‑maintenance service that leverages his outgoing personality to build a loyal client base. Long‑term, he envisions mentoring younger peers, taking
    on a leadership role in local community development, and possibly pursuing a position in municipal planning to help shape services in Franklin County.
