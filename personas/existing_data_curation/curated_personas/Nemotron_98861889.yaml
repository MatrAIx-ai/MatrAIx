personas:
  professional: Amparo Ramirez is a bilingual social worker with a STEM graduate background who blends rigorous data analysis, program evaluation, and grant writing with hands‑on community practice, leveraging
    R, Python, and GIS to design evidence‑based health initiatives for underserved Chicago families while they maintain meticulous project plans, a competitive drive to outperform peers, and a lingering
    worry about measurable impact.
  sports: Amparo Ramirez joins Chicago Road Runners for early‑morning urban hikes, trains for local 5 K races with a structured Strava plan, supports the Chicago Cubs and Bulls as a fan, and they treat
    competitive sprint intervals as both stress relief and a way to satisfy their skeptical, results‑driven nature.
  arts: Amparo Ramirez channels their sociable energy into salsa and regional folk dancing, they delight in the sounds of Celia Cruz and Carlos Vives, devour sci‑fi novels by N.K. Jemisin and Neal Stephenson,
    strategize over board games like Terraforming Mars, and regularly attend performances at Steppenwolf Theatre, using these artistic outlets to balance analytical work with expressive joy.
  travel: Amparo Ramirez prefers meticulously planned trips that blend cultural immersion and adventure, having trekked the ruins of Teotihuacán, explored the vibrant food scene of Oaxaca, and attended
    a tech conference in Seattle, while they dream of hiking Patagonia’s Torres del Paine and wandering Machu Picchu’s ancient paths, all within a modest travel budget dictated by student‑loan repayments.
  culinary: Amparo Ramirez experiments with traditional dishes like mole poblano, chiles rellenos, and tamales, seasoning with chilies de árbol and epazote, while they apply a data‑driven approach to recipe
    iteration, yet they sometimes burn the rice in haste, reflecting a blend of culinary curiosity, moderate skill, and occasional impatience.
  core: Amparo Ramirez is a data‑driven community advocate who dances salsa between spreadsheets, meticulously plans every move, competes fiercely with peers, and they constantly wrestle with anxious perfectionism.
background:
  cultural: Amparo grew up in a Mexican immigrant household in Chicago, speaking Spanish at home and English at school. Her family celebrates Día de los Muertos, quinceañeras, and holiday gatherings that
    blend Mexican traditions with Midwestern life. This bicultural upbringing fuels her passion for serving the Mexican‑American community, informing her culturally competent practice and her commitment
    to preserving heritage while navigating the challenges of urban America. She maintains close ties to local Mexican community centers, participates in cultural events, and incorporates Mexican culinary
    and musical traditions into her social work outreach.
attributes:
  skills: '["Bilingual Spanish-English communication", "Data analysis (R, Python, SPSS)", "Program evaluation", "Grant writing", "Crisis intervention", "Case management", "Community outreach", "Project
    management", "GIS mapping", "Public speaking", "Trauma-informed care"]'
  hobbies: '["Salsa dancing", "Mexican folk dance", "Urban hiking", "Running (5K races)", "Volunteer work at cultural festivals", "Science-fiction reading", "Strategic board games", "Coding community apps",
    "Traditional Mexican cooking", "Tech meetups on social impact"]'
  career_goals: She aims to become a program director for a community‑health initiative that fuses technology and evidence‑based practice to improve outcomes for underserved Mexican‑American families in
    Chicago. Her long‑term ambition includes developing a scalable analytics platform for social services, earning a doctorate in social work research, and eventually founding a non‑profit that bridges
    STEM expertise with social impact to address systemic inequities.
