  career_goals: Even at five, Alejandro talks about big dreams. He frequently says he wants to become an astronaut so he can explore space, and he also imagines himself as a painter who creates colorful
    murals. He is attracted to the idea of teaching younger kids because he enjoys showing others how to build things. His competitive streak pushes him to imagine being the best soccer player on his team
    or the champion of a science fair. Overall, his ambitions blend a love of discovery, creativity, and leadership.
