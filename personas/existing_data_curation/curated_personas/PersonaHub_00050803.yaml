persona_description: A public health researcher who studies the relationship between proximity to major roads and cardiovascular health, particularly in relation to the kidney function and cardiovascular
  death rates. They are interested in the effects of air pollution caused by traffic on kidney function and the potential causal link between living near a major road and reduced renal function, which is
  an important risk factor for cardiovascular events.
