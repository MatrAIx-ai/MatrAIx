personas:
  professional: Olga Moro, a senior fundraiser at a regional nonprofit in Meridian, combines methodical budget oversight, data‑driven campaign design, and bilingual storytelling to secure major gifts, while
    they use their sociable, collaborative style to turn donor meetings into relationship‑building sessions that reflect a blend of curiosity for innovative digital tools and a practical, results‑focused
    mindset.
  sports: Olga Moro spends weekends trekking the Sawtooth and Selway‑Bitterroot ranges with the Meridian Hiking Club, cheers on the Boise State Broncos football team and the Portland Trail Blazers, and
    they fuel cardio workouts through weekly salsa nights at the Boise Roots Salsa Club.
  arts: Olga Moro captures Idaho’s wilderness with a Nikon D5600, drawing stylistic inspiration from Annie Leibovitz, while their playlist spins Celia Cruz and Carlos Santana during salsa, and they regularly
    attend local gallery openings featuring works by Shepard Fairey.
  travel: Olga Moro meticulously plans weekend road trips that combine hikes in the Rocky Mountains with photographic stops, has already trekked the Inca Trail in Peru and explored the historic streets
    of Oaxaca for culinary inspiration, and favors short, budget‑conscious getaways to Yellowstone and the Oregon Coast, all while they balance a mid‑level salary that frames travel as a seasonal indulgence.
  culinary: Olga Moro, an enthusiastic home chef, masterfully prepares mole poblano and quinoa‑infused enchiladas, layers fresh heirloom tomato‑coriander salad with Oaxaca cheese into grilled corn elotes,
    and experiments with fusion dishes like chipotle‑marinated salmon tacos, while they regularly share these creations at community potlucks.
  core: Olga Moro merges methodical fundraising precision with a love for spontaneous salsa evenings, consistently meets every grant deadline, yet they frequently forget to water their heirloom tomato plants
    until the soil cracks.
background:
  cultural: Olga was raised in a Mexican‑American household where family, tradition, and community service were core values. Bilingual in Spanish and English, she grew up celebrating Día de los Muertos,
    Las Posadas, and regional Mexican holidays, often hosting gatherings that blended Mexican cuisine with Idaho’s seasonal produce. Her cultural heritage informs her inclusive fundraising style, emphasizing
    relationship building and reciprocity. She maintains strong ties to the local Mexican community, participating in cultural events, supporting Latino youth mentorship programs, and incorporating Mexican
    motifs and storytelling techniques into donor communications.
attributes:
  skills: '[''Strategic Campaign Planning'', ''Major Gift Solicitation'', ''Grant Writing'', ''Corporate Partnership Development'', ''Event Planning and Coordination'', ''Budget Management'', ''Data Analysis
    & Reporting'', ''CRM Administration (Raiser’s Edge)'', ''Public Speaking'', ''Bilingual Communication (English/Spanish)'', ''Volunteer Recruitment & Management'', ''Social Media Engagement'']'
  hobbies: '[''Mexican Cooking and Recipe Development'', ''Salsa Dancing'', ''Hiking and Trail Photography'', ''Volunteer Work at Food Bank'', ''Gardening (Heirloom Tomatoes & Herbs)'', ''Reading Non‑fiction
    (Cultural Anthropology, Social Entrepreneurship)'', ''Attending Community Cultural Festivals'']'
  career_goals: Olga aims to transition from a senior fundraiser to a Development Director for a regional non‑profit, where she can lead a multi‑year capital campaign that expands community services in
    Meridian and surrounding areas. She envisions building a robust pipeline of major donors by integrating innovative digital fundraising tools and culturally resonant storytelling. Long‑term, she hopes
    to mentor emerging fundraisers, especially women from underrepresented backgrounds, and eventually launch a consulting practice that helps small nonprofits in the Intermountain West design sustainable
    fundraising models.
