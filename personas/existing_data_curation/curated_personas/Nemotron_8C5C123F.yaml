personas:
  professional: Maria Moncada is a retired bilingual educator who channels her lifelong passion for community learning into organizing intergenerational workshops at the local library, seamlessly blending
    traditional teaching methods with modern digital tools while they juggle occasional missed deadlines.
  sports: Maria Moncada participates in a weekly senior dance troupe performing folkloric routines, enjoys brisk walks with the local walking club, and passionately follows the Dallas Cowboys, Houston Astros,
    and the Bryan High School Cougars football team.
  arts: Maria Moncada immerses themselves in the arts by singing in the church choir, reading historical novels like Ken Follett's "The Pillars of the Earth," reciting poetry by Maya Angelou, and listening
    to folk legends such as Bob Dylan and Leonard Cohen during quiet evenings.
  travel: Maria Moncada loves spontaneous road trips to nearby towns like Fredericksburg, Waco, and the Hill Country vineyards, dreams of revisiting the remote village where they grew up abroad, and balances
    travel plans with a modest retirement income, often opting for budget-friendly motels and family stays.
  culinary: Maria Moncada is an expert home cook who masterfully prepares spicy chili-infused enchiladas, steaming tamales, herbaceous salsas, and aromatic mole sauces, delighting neighbors with fresh cilantro,
    oregano, and roasted chilies while they juggle occasional overuse of salt in enthusiastic taste tests.
  core: Maria Moncada blends a vibrant community spirit with a spontaneous, slightly disorganized edge, nurturing intergenerational learning while worrying about finances, health, and the next perfect chili
    recipe.
background:
  cultural: Maria's cultural identity is deeply rooted in Mexican traditions, blended with the Texan environment of Bryan. She was raised in a bilingual household where Spanish and English coexisted, fostering
    a strong connection to Mexican holidays such as Dia de los Muertos, Cinco de Mayo, and Las Posadas. Catholic faith and family gatherings are central to her life, with multi-generational meals and music
    shaping her social world. Living in Brazos County, she has embraced local Texan hospitality while preserving Mexican culinary arts, storytelling, and folk crafts. Her community involvement reflects
    a commitment to sharing her heritage, supporting cultural festivals, and mentoring younger members of the Mexican-American community.
attributes:
