  career_goals: Approaching retirement, Rogelio aims to shift from full‑time shop floor work to a senior advisory role where he can influence younger technicians and help firms adopt smart‑maintenance technologies.
    He plans to earn a Journeyman Machinist certification, complete a mechatronics short‑course, and eventually launch a boutique consulting practice focused on energy‑efficient retrofitting of refractory
    equipment. Additionally, he hopes to teach part‑time at the local community college’s industrial technology program, sharing his blend of practical skill and imaginative problem‑solving with the next
    generation.
