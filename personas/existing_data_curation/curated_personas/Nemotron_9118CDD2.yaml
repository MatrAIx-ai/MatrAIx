personas:
  professional: Rogelio Liwag, a veteran industrial mechanic with thirty-plus years of hands-on experience in high-temperature furnace upkeep, precision MIG/TIG welding, and PLC-based predictive maintenance,
    now blends that technical mastery with a talent for mentoring apprentices as he pivots toward a senior advisory role, pursues a Journeyman Machinist certification and a mechatronics short-course, and
    plans to launch a boutique consulting practice that helps firms retrofit refractory equipment for energy efficiency while teaching part-time at a community college.
  sports: Rogelio Liwag competes weekly with the Westminster Softball Club, maintains fitness through light weight-lifting and morning stretching routines, roots for the Los Angeles Dodgers and the LA Lakers,
    and channels their competitive streak into team leadership, often volunteering as the unofficial scorekeeper and tactical advisor during games.
  arts: Rogelio Liwag creates kinetic sculptures that echo Jean Tinguely's moving machines, paints abstract canvases inspired by Mark Rothko's color fields, regularly attends LACMA exhibitions and local
    gallery openings, and infuses his love for rhythm into community cultural dance nights, using art as a bridge between his workshop and the broader social scene.
  travel: Rogelio Liwag enjoys road-tripping to industrial heritage sites such as the Henry Ford Museum in Michigan, the historic steelworks of Sheffield, and the high-tech hardware districts of Shenzhen,
    while dreaming of a future pilgrimage to the kinetic art installations at the Guggenheim Bilbao, and favors mid-range hotels that offer workshop spaces where they can tinker on prototypes during downtime.
  culinary: Rogelio Liwag favors grilling smoky brisket and whipping up spicy shrimp tacos seasoned with ancho chilies, lime, and smoked paprika, while also experimenting with miso-marinated vegetables
    and herb-infused sauces, showcasing an intermediate-to-advanced cooking skill set that they display at neighborhood BBQs and cultural dance nights.
  core: Rogelio Liwag is a pragmatic yet inventive senior technician whose relentless curiosity fuels kinetic art projects, community mentorship, and a disciplined but occasionally splurging approach to
    retirement planning.
background:
  cultural: Rogelio is a second‑generation Filipino‑American whose parents immigrated from the Philippines in the early 1970s. Raised in Westminster’s vibrant Southeast Asian enclave, he inherited a strong
    work ethic and communal values such as bayanihan (mutual aid) and close family ties. Although never married, he remains a central figure in his extended family network, often preparing traditional dishes
    like adobo and lechon for gatherings and participating in cultural celebrations such as the annual Barrio Fiesta and Christmas Simbang Gabi. His heritage informs his appreciation for handcrafted objects,
    community solidarity, and a pragmatic, inventive approach to problem‑solving that blends traditional ingenuity with modern technology.
