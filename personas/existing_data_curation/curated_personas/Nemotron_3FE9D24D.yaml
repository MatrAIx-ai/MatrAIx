  career_goals: As a seasoned dishwasher, Everardo aims to leverage his organized and reliable nature to advance into supervisory positions within the kitchen. Over the next five years he plans to obtain
    a Certified Food Safety Manager credential, take on the role of shift lead, and eventually become a kitchen manager. He also envisions opening a small family-owned taquería that showcases authentic
    Mexican recipes, for which he is studying culinary techniques and exploring business courses to secure a GED and basic entrepreneurship training. Improving operational efficiency, reducing waste, and
    mentoring younger workers remain core ambitions.
