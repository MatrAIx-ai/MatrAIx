personas:
  professional: Everardo Velasquez, a 48‑year‑old commercial dishwasher, leverages their methodical, organized nature and bilingual communication skills to uphold flawless kitchen sanitation, train new
    staff, and streamline high‑volume dish turnover, all while quietly pursuing a supervisory role.
  sports: Everardo Velasquez enjoys early‑morning fishing on Lake Corpus Christi, follows the Houston Astros and the Corpus Christi Hooks for baseball, and participates in a local senior softball league
    each spring, preferring low‑impact activities that accommodate their arthritic knees.
  arts: Everardo Velasquez finds solace in strumming their acoustic guitar to classic ranchera songs by Vicente Fernández and often attends community festivals featuring mariachi ensembles like Mariachi
    Los Cielos, while also appreciating the cinematic storytelling of directors such as Alejandro González Iñárritu.
  travel: Everardo Velasquez prefers well‑planned, budget‑friendly road trips, having explored Austin’s live‑music scene and San Antonio’s historic missions, and now dreams of a culinary pilgrimage to Oaxaca
    to study regional sauces, balancing family responsibilities with occasional weekend getaways to the Gulf Coast.
  culinary: Everardo Velasquez, an intermediate home chef, delights in preparing authentic tacos al pastor with marinated pork, pineapple, and freshly ground chilies, while perfecting a smoky chipotle‑tomatillo
    salsa featuring garden‑grown cilantro and experimenting with mole negro on weekends, often comparing their results to the flavors at their favorite local taquería.
  core: Everardo Velasquez is a methodical kitchen veteran whose nightly salsa experiments satisfy their love of tradition, even if their habit of leaving the dishwasher door ajar fuels good‑natured jokes
    among coworkers.
background:
  cultural: Everardo was born to Mexican immigrant parents and grew up in a bilingual household in South Texas. He maintains strong ties to Mexican cultural traditions, celebrating holidays such as Día
    de los Muertos, Cinco de Mayo, and Christmas with extended family gatherings featuring homemade tamales, pozole, and music. His Catholic faith and community involvement at the local church play central
    roles in his social life. He speaks Spanish fluently and uses it daily at work and with family, while also being comfortable in English. The blend of Mexican heritage and Texan influences shapes his
    food preferences, work ethic, and value of family support.
