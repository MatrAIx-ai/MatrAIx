personas:
  professional: Kendrick Wong, a five‑year‑old kindergartner, channels their curiosity and methodical nature into leading organized treasure‑hunt games during recess, where they plan clues, assign roles,
    and ensure everyone follows the agreed rules.
  sports: Kendrick Wong, a budding fan of the local minor league baseball team the River City Raptors, spends weekends practicing batting drills at the community field, joining a small after‑school soccer
    club, and prefers solo bike rides to stay disciplined in fitness.
  arts: Kendrick Wong, an avid admirer of animated filmmaker Hayao Miyazaki and picture‑book illustrator Dr. Seuss, spends free time sketching whimsical creatures, rehearsing lines from their favorite cartoon,
    and proudly displays a handmade poster of Totoro in their bedroom.
  travel: Kendrick Wong, who has already visited the seaside boardwalk in Santa Monica and the Grand Canyon on family trips, enjoys meticulously mapping out the route with colored crayons, favoring destinations
    that offer both a playground and a quiet spot for drawing.
  culinary: Kendrick Wong, a budding little chef, loves making peanut butter and banana sandwiches, carefully spreading each layer with a plastic knife, and shows enthusiasm for trying new fruit salads
    featuring mango and kiwi while occasionally sneaking extra raisins when no one watches.
  core: Kendrick Wong blends childlike curiosity with surprising organization, turning playtime into carefully planned adventures while pocketing every spare coin for future treats.
background:
  cultural: Kendrick is a Black child with Chinese ancestry, reflected in his family name Wong. Growing up in Memphis, Tennessee, he is immersed in African‑American cultural traditions such as church gatherings,
    gospel music, and community picnics. The city’s rich blues and soul heritage shapes his musical preferences, and family meals often feature Southern staples like barbecue, collard greens, and sweet
    potatoes, complemented occasionally by Chinese dishes during Lunar New Year celebrations. His parents emphasize respect for both heritages, teaching him about African‑American history, celebrating Juneteenth,
    and sharing stories of Chinese festivals like lantern lighting. This blended cultural environment influences his worldview, values, and everyday experiences.
