  career_goals: Kendrick dreams of becoming an engineer or scientist who creates things that help people. He frequently talks about building rockets, designing simple machines, and inventing gadgets that
    solve everyday problems. As he grows, he aims to excel in math and science, join a STEM program, and eventually work on community projects that improve local parks or neighborhood safety. His ambition
    balances his love for new ideas with a practical desire to make a positive impact.
