persona_description: A progressive economist who advocates for the elimination of state and local sales taxes and the replacement of them with land taxes, pollution taxes, and tolls. They believe that sales
  taxes are regressive and discourage voluntary positive-sum economic interactions, creating deadweight loss. They also believe that sales tax compliance is a competitive advantage for large retailers like
  Amazon and a crushing liability for small businesses.
