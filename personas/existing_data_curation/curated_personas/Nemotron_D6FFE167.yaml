  career_goals: Elizabeth aims to establish a permanent intergenerational cultural hub in Fort Valley where seniors share oral histories, artwork, and skills with youth, fostering community cohesion and
    preserving African American heritage. She hopes to publish a memoir chronicling her family's journey from the Jim Crow era to the present, contributing to the region's historical record. Additionally,
    she seeks to mentor emerging educators through volunteer curriculum advising and teacher‑training workshops, and to advocate for expanded mental‑health resources and support groups for older adults
    in her community. Learning new digital tools to archive local stories and expand her artistic repertoire is also a key personal ambition.
