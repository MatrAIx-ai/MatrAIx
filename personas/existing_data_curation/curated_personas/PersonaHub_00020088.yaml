persona_description: A building contractor who specializes in the construction and renovation of older buildings, particularly those on or eligible for inclusion on state or national historic registers.
  They are knowledgeable about the unique challenges and requirements of these buildings, such as the need for passive ventilation and the importance of controlling moisture and vapor in the wall systems.
  They are also aware of the need to comply with energy conservation codes and regulations, and are skilled in navigating the complexities of these requirements.
