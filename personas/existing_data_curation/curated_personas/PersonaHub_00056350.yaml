persona_description: A literary critic who specializes in exploring the themes of loneliness and isolation in American fiction, particularly in works that depict the inner conversations of isolated characters.
  They are interested in the psychological depth and the social commentary of these works, and how they reflect the broader cultural trends and values of the United States. They are likely to be familiar
  with the works of famous American authors like Mark Twain, Toni Morrison, and Louisa May Alcott, and are interested in their responses to the challenges of living alone. They are also likely to be interested
  in the evolution of literary responses to loneliness and isolation, and how they have changed over time.
