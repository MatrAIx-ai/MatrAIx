  hobbies: '["Reading historical novels", "Reading Mexican literature", "Gardening (herbs and seasonal flowers)", "Traditional Mexican cooking", "Quilting", "Embroidery", "Genealogy research", "Walking
    in local parks", "Listening to traditional Mexican music", "Volunteer language‑exchange sessions at senior center"]'
  career_goals: Although retired, Glorimar remains driven to leave a lasting legacy for her family and community. She aims to compile a comprehensive family genealogy and publish a memoir that intertwines
    personal narrative with Mexican cultural heritage. She hopes to secure a modest grant to establish a community workshop where she can teach traditional Mexican cooking and crafts, reinforcing cultural
    continuity. Glorimar also aspires to mentor her grandchildren in academic discipline and organizational habits, ensuring that her values of structure and cultural pride are passed down.
