  career_goals: Deborah aspires to move into a senior executive role, such as Director of Operations, where she can shape company-wide strategy and mentor the next generation of leaders. She aims to launch
    a mentorship program for women and mid‑career professionals within her organization, spearhead community‑engagement initiatives throughout San Diego, and eventually establish a boutique consulting practice
    focused on operational excellence for small businesses. While planning a phased retirement in the coming years, she remains committed to leaving a lasting impact through leadership development and community
    service.
