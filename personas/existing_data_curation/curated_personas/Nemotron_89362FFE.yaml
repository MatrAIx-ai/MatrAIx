  hobbies: '[''Sailing'', ''Hiking'', ''Cooking Mediterranean cuisine'', ''Wine tasting'', ''Attending cultural festivals'', ''Reading historical biographies'', ''Mentoring youth'', ''Yoga'', ''Gardening'',
