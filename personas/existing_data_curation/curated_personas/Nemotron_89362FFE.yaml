personas:
  professional: Deborah Dufrene, a seasoned retail and hospitality manager with three decades of experience, leverages strategic planning, data‑driven decision making, and empathetic leadership to drive
    profit margins while they passionately mentor emerging talent and position themselves for a Director of Operations role.
  sports: Deborah Dufrene, an avid sailor on San Diego Bay and regular hiker of the Torrey Pines coastal trails, cheers for the San Diego Padres and follows the local women's soccer team San Diego Wave
    FC, while they also participate in a community women's cycling club.
  arts: Deborah Dufrene, a dedicated volunteer at the Old Globe Theatre and regular attendee of La Jolla Music Society concerts, enjoys the works of Frida Kahlo, Joan Baez, and modern jazz pianist Herbie
    Hancock, and they often discuss art at their Toastmasters meetings.
  travel: Deborah Dufrene prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored the Mediterranean islands of Santorini and Crete, taken weekend sailing cruises
    to Catalina Island, and they dream of a vineyard tour in Napa Valley with close friends.
  culinary: Deborah Dufrene delights in cooking Mediterranean dishes like Greek moussaka, Spanish paella, and Italian risotto, using fresh olive oil, oregano, feta cheese, and a splash of local Tempranillo,
    while they host dinner parties that pair the meals with curated San Diego boutique wines.
  core: Deborah Dufrene is a sociable, pragmatic leader who balances strategic ambition with a love for sailing, Mediterranean cooking, and community mentorship, although they occasionally overindulge in
    wine while meticulously planning their next professional step.
background:
  cultural: Deborah is a White American whose family roots trace back to the Midwest, but she has spent the past two decades immersed in the coastal, multicultural environment of San Diego. Her upbringing
    emphasized practicality and hard work, while her adult life has been shaped by the progressive, diverse culture of Southern California. She embraces the region’s blend of Anglo‑American traditions and
    Hispanic influences, participating in community events, supporting local arts, and valuing the inclusive social fabric that aligns with her sociable and cooperative nature.
