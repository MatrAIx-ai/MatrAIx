  career_goals: Leonel aims to complete his high school education and obtain a GED within the next two years. He is interested in pursuing a vocational program in information technology or computer repair,
    with the longer‑term ambition of working as a certified IT support specialist. He also envisions using his technical skills to assist his family’s small business and contribute to the local Colombian
    community. In the future, he hopes to achieve financial stability, possibly start a side venture offering computer troubleshooting services, and eventually attend a community college for further studies
    in networking or cybersecurity.
