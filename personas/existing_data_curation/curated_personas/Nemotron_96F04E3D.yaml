personas:
  professional: Leonel Rioscaraballo, a 16‑year‑old aspiring IT support specialist, leverages his structured mindset and organizational flair to troubleshoot computers for peers and family while balancing
    school assignments with methodical project planning.
  sports: Leonel Rioscaraballo spends evenings training with the local youth soccer club Los Tigres, follows Manchester United’s Premier League campaign, and joins weekend pick‑up basketball games during
    summer to keep a balanced fitness routine.
  arts: Leonel Rioscaraballo fuels their imagination by sketching characters from graphic novels like Saga and Watchmen while listening to vallenato legend Carlos Vives, reggaeton hit‑maker J Balvin, and
    practicing guitar chords to Ed Sheeran’s 'Shape of You'.
  travel: Leonel Rioscaraballo prefers low‑cost, meticulously planned trips, savoring weekend getaways to the historic coastal city of Cartagena and dreaming of a future backpacking adventure through Spain’s
    Andalusian villages and the vibrant streets of Buenos Aires.
  culinary: Leonel Rioscaraballo enjoys cooking traditional dishes such as ajiaco, arepas stuffed with cheese and avocado, and empanadas filled with seasoned beef, mastering the balance of cilantro, plantain,
    and cumin while often inviting neighbors for a communal tasting.
  core: Leonel Rioscaraballo blends a methodical love for technology with a creative streak in music, art, and cooking, navigating teenage life with disciplined habits, occasional procrastination, and a
    steadfast goal of turning tech skills into a modest entrepreneurial venture.
background:
  cultural: Leonel was raised in a Colombian household within the vibrant multicultural community of West Bloomfield, Michigan. His family maintains strong ties to Colombian traditions, celebrating holidays
    like Día de la Independencia and Carnaval de Barranquilla with authentic food, music, and dance. At home, Spanish is spoken alongside English, giving him a bilingual fluency that connects him to both
    his heritage and his American environment. The Colombian diaspora in the Detroit area often gathers for community events, church services, and soccer tournaments, providing Leonel with a sense of belonging
    and identity. Family values such as respect for elders, collective responsibility, and hospitality are central to his upbringing, influencing his cooperative nature and desire to contribute positively
    to his community. He also benefits from exposure to American cultural norms, blending them with his Colombian roots, which shapes his balanced worldview and pragmatic approach to life.
