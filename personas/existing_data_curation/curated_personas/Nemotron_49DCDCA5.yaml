    ''Event coordination for academic workshops'']'
  hobbies: '[''Reading classic and contemporary literature'', ''Creative writing (short stories, poetry)'', ''Attending art galleries, museums, and community theater'', ''Participating in a local book club'',
    ''Gardening (herb garden)'', ''Cooking with seasonal produce'', ''Hiking local trails in the Cuyahoga River Valley'', ''Yoga and mindfulness meditation'', ''Journaling for self‑reflection'', ''Volunteering
    at the public library literacy program'']'
  career_goals: Dana aims to transition from a teaching assistant to a full‑time lecturer or adjunct professor, eventually pursuing a tenure‑track position in the humanities. She plans to enroll in a Ph.D.
    program that emphasizes digital humanities, allowing her to blend her love of traditional scholarship with new media. Publishing articles on interdisciplinary pedagogy and developing community‑based
    learning projects are key milestones. Recognizing her difficulty with strict timelines, she also intends to cultivate stronger project‑management skills and seek roles that value flexibility, such as
    curriculum development or educational consulting. In the longer term, she hopes to author a book that weaves personal narrative with local history, contributing both to academia and the broader community.
