personas:
  professional: Domingo Blades, a 60‑year‑old construction manager with three decades of experience, blends rigorous STEM training with hands‑on field expertise, using BIM, Primavera, and sustainable design
    to lead multidisciplinary teams while calmly mediating cultural communication and mentoring emerging talent.
  sports: Domingo Blades, an avid fan of D.C. United and a regular participant in the county senior walking club, watches weekend soccer matches with friends, volunteers as a youth coach at the community
    center, and incorporates gentle stretching after his park strolls to offset knee stiffness.
  arts: Domingo Blades, a dedicated photographer of historic façades, enjoys folk music festivals featuring traditional accordion groups, collects vinyl records of artists like Carlos Vives, and reads WWII
    biographies, drawing creative inspiration for his woodworking projects.
  travel: Domingo Blades, who plans trips meticulously, has explored the colonial architecture of Cartagena, the Mayan ruins of Copán, and the eco‑friendly villages of the French Alps, and hopes to return
    to a coastal town renowned for its night‑time lantern festivals.
  culinary: Domingo Blades, an accomplished home cook, frequently prepares hand‑made corn‑flour pupusas, slow‑cooked tamales, and yuca frita topped with fresh cilantro and queso fresco, proudly sharing
    meals with neighbors while occasionally forgetting to clean the stovetop promptly.
  core: Domingo Blades balances a calm, methodical work ethic with a penchant for spontaneous community cooking sessions, mindful budgeting, and a love of photography that captures both historic structures
    and everyday moments.
background:
  cultural: Domingo’s identity is deeply shaped by his Salvadoran heritage, which he carries proudly in Fairfax County. Raised in a family that valued collectivism, respect for elders, and Catholic traditions,
    he maintains strong ties to the Salvadoran diaspora through community celebrations, language, and cuisine. His bilingual fluency enables him to act as a cultural liaison on construction projects, fostering
    inclusive workplaces. He regularly participates in local festivals honoring Salvadoran independence and contributes to the preservation of cultural practices by teaching younger generations how to cook
    traditional meals and celebrate holidays. This blend of cultural pride and professional diligence informs his approach to teamwork, community service, and his vision for a more equitable, sustainable
    built environment.
