  career_goals: Approaching retirement, Domingo aims to transition from day‑to‑day site oversight to mentorship and strategic consulting. He plans to launch a community‑focused training program that equips
    young Salvadoran‑American apprentices with modern construction skills, emphasizing sustainability and safety. Additionally, he aspires to serve as a senior advisor for Fairfax County’s Department of
    Planning and Zoning, championing green building standards for public schools and affordable housing. Ultimately, he wishes to leave a legacy of inclusive, environmentally responsible construction practices
    while supporting scholarships for STEM students from his cultural community.
