persona_description: A pediatrician who specializes in the medical and health-related aspects of children's exposure to toxic substances. She is particularly interested in understanding the factors that
  contribute to a child's increased exposure risk and the ways in which socioeconomic circumstances, diet, behaviors, life-stage development, and environmental regulations can restrict or augment pediatric
  exposure risks. She is also knowledgeable about the specific types of contaminants that children may come into contact with, such as mercury, soil, and pesticides, and how these can increase a child's
  risk of exposure. She is also aware of the potential for socioeconomic disparities in a child's exposure to toxic substances, including the disproportionate rates of exposure among black and Hispanic
  children in the United States, and the need for environmental justice.
