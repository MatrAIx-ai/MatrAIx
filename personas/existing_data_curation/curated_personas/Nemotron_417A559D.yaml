  hobbies: '[''Hiking'', ''Cross-country skiing'', ''Fly-fishing'', ''Woodworking'', ''Reading true crime'', ''Chess'', ''Landscape photography'', ''Community safety volunteering'']'
  career_goals: James aims to rise to the rank of Detective Sergeant within the West Charleston Police Department over the next five years, leveraging his organizational strengths to lead a specialized
    cold‑case unit. He plans to obtain a bachelor's degree in criminal justice to broaden his theoretical grounding and earn certification as a forensic analyst. Long‑term, he envisions spearheading a regional
    task force targeting organized drug trafficking, while also developing a community safety program that trains residents in basic crime‑prevention strategies. Publishing a case study on a high‑profile
    investigation and mentoring the next generation of investigators are also key components of his professional aspirations.
