persona_description: A South Carolina state official or environmental manager who is responsible for overseeing and managing the state's implementation of the Clean Air Act and the submission of state Implementation
  Plans (SIPs). This person is knowledgeable about the state's SIPs, including the initial SIP, the accumulated record of amendments, and the process for submitting SIP revisions. They have experience with
  the SIP review process, including the submission of amendments to the EPA and the publication of proposed actions. They are also familiar with the Code of Federal Regulations and the EPA's Memoranda that
  guide the SIP review process. This person is responsible for ensuring that the state's SIPs are in compliance with the Clean Air Act and are effective in meeting the state's air quality standards.
