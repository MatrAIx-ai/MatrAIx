  hobbies: '[''Basketball (weekly league)'', ''Running club'', ''Board‑game nights'', ''Food bank volunteering'', ''Arduino/Raspberry Pi tinkering'', ''Hiking Allegheny River trails'', ''Barbecue cooking'',
    ''Classic‑car club participation'']'
  career_goals: Rex aims to advance to a senior engineering role within the next three years, followed by a transition into engineering project management. He plans to earn a PMP certification and possibly
    a master's degree in engineering management. His long‑term ambition is to lead a cross‑functional team that develops sustainable manufacturing solutions for a regional aerospace or automotive supplier,
    eventually moving into an engineering management position that blends technical expertise with strategic decision‑making.
