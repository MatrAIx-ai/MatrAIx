personas:
  professional: Rex Rosen, a detail‑oriented mechanical engineer who leverages SolidWorks, ANSYS, and lean manufacturing to streamline production lines, thrives on routine-driven project schedules and uses
    meticulous technical writing to keep cross‑functional teams aligned, aiming for a senior role and PMP certification within three years.
  sports: Rex Rosen, an energetic regular at the local YMCA where they play basketball every Thursday, a member of the Allegheny River Trail Runners club for weekly long‑distance runs, and an avid supporter
    of the Pittsburgh Steelers, integrates fitness into their routine while occasionally swapping CAD models for car‑club meetups.
  arts: Rex Rosen, a board‑game enthusiast who hosts a weekly Catan night featuring strategic banter, enjoys classic rock legends like The Rolling Stones and modern Americana from Bruce Springsteen, and
    occasionally attends productions at Stage Right Pittsburgh, blends analytical thinking with creative storytelling.
  travel: Rex Rosen, a methodical explorer who plans weekend hikes along the Allegheny River trails, embarks on road trips in a restored 1965 Chevrolet Impala to the iconic Car Museum in Detroit and the
    scenic vistas of the Blue Ridge Parkway, and dreams of a spring adventure to the Swiss Alps to combine classic‑car rallies with mountain trekking.
  culinary: Rex Rosen, a grill‑master who meticulously seasons pork ribs with a hickory‑infused rub, perfects a smoky brisket using a custom‑built smoker, enjoys crafting quick meals like penne al arrabbiata
    with fresh basil after a long day, and appreciates a well‑balanced plate of roasted vegetables and lean protein.
  core: Rex Rosen, a routine‑driven engineer who balances meticulous work with sociable sports, board‑games, classic‑car passion, and precise grilling, while budgeting wisely and managing minor health quirks
    with disciplined routines.
background:
  cultural: Rex grew up in a middle‑class suburban family in Wexford, Pennsylvania, with deep roots in the region's industrial and community traditions. His ancestry is primarily Northern European, including
    German and Irish heritage, and his family values emphasize hard work, reliability, and community involvement. While occasionally attending a local Protestant church, his upbringing focused more on practical
    stewardship and participation in neighborhood events such as town fairs and local sports leagues. The legacy of western Pennsylvania’s steel and manufacturing history informs his pragmatic outlook and
    his appreciation for teamwork and structured routines.
attributes:
  skills: '[''Mechanical design (SolidWorks, AutoCAD)'', ''Finite Element Analysis (ANSYS)'', ''CNC machining'', ''Lean manufacturing'', ''Project scheduling (MS Project)'', ''Data analysis (Python, MATLAB)'',
