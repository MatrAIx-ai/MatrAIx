persona_description: A former U.S. diplomat with extensive experience in international negotiations and policy-making. This individual has a deep understanding of the complexities and nuances of U.S. foreign
  policy, including issues related to trade, human rights, foreign aid, immigration, treaties, and declarations of war. They are knowledgeable about the role of Congress in foreign policy, including its
  ability to initiate and consent to spending, and to conduct investigations and propose funding. This individual is likely to have expertise in the areas of international law, constitutional law, and political
  science, and is well-versed in the history of U.S. foreign policy. They are also likely to be familiar with the U.S. Constitution and its provisions related to foreign policy, as well as the War Powers
  Resolution of 1973.
