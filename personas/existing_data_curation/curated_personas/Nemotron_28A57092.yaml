personas:
  professional: An experienced digital humanities software architect, Sherry Mceuen blends Python, React, and Docker expertise with a meticulous, art‑inspired UI design ethos, leading museum tech projects
    that prioritize accessibility while mentoring emerging women developers in agile practices, and they approach each architectural decision with critical scrutiny and a restless curiosity for unconventional
    solutions.
  sports: A weekend hiker and casual pickleball player, Sherry Mceuen climbs the Blue Ridge foothills with the local Blue Ridge Hiking Club, roots for the Carolina Panthers on football Sundays, and joins
    a senior‑friendly pickleball league at the community center, balancing moderate cardio with gentle yoga to manage stress and preferring low‑key competition over high‑intensity sports.
  arts: An avid painter and literary enthusiast, Sherry Mceuen draws inspiration from the vivid palettes of Georgia O'Keeffe and the atmospheric watercolors of Andrew Wyeth while frequently attending exhibitions
    featuring local Appalachian artisans, listening to Joni Mitchell's folk ballads during studio sessions, and contributing thoughtful essays to a regional literary journal that weave philosophy from Martha
    Nussbaum into curatorial narratives.
  travel: An organized yet adventure‑seeking traveler, Sherry Mceuen meticulously plans weekend escapes to the Blue Ridge Highlands and annual art‑focused trips to Asheville, while dreaming of a cultural
    immersion tour of Kyoto's temples and the rugged vistas of the Scottish Highlands, balancing a modest travel budget with a desire to capture landscape photography and allowing plenty of solo reflection
    time.
  culinary: A garden‑to‑table home cook, Sherry Mceuen transforms heirloom tomatoes, fire‑roasted peppers, and fresh basil into a rustic marinara for linguine, often pairing it with sautéed kale, while
    occasionally indulging in a Southern‑style shrimp and grits dinner at a beloved local eatery, and they sometimes overcook the sauce when stress from code reviews runs high.
  core: Sherry Mceuen, a methodical digital‑humanities architect who channels Appalachian landscapes into code and canvas, balances diligent mentorship with a habit of late‑night code refactoring, often
    over‑cooking tomato sauces when stress builds, and they consistently rely on yoga to reset their anxious mind.
background:
  cultural: Sherry grew up in a traditional white Southern family in the foothills of North Carolina, where church gatherings, community festivals, and a strong sense of local heritage shaped her early
    worldview. Though rooted in Southern hospitality and modesty, her graduate studies in arts and humanities exposed her to global artistic traditions and progressive ideas, fostering an appreciation for
    diverse cultural expressions. She combines this regional upbringing with a lifelong curiosity about the broader world, often traveling to Europe and the Pacific Northwest to experience new art scenes.
    Her marriage to a fellow software engineer has reinforced a partnership built on mutual respect for professional ambition and shared love for outdoor recreation. This blend of Southern community values,
    academic openness, and tech‑savvy experience informs her balanced yet competitive personality.
