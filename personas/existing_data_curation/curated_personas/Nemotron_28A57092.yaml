  career_goals: Sherry aims to become a lead architect for a nonprofit or museum tech initiative that preserves and presents regional art and history through interactive digital platforms. She wishes to
    publish a case study on integrating humanities scholarship with modern software practices, positioning herself as a thought leader in digital humanities. Over the next five years, she plans to secure
    a senior leadership role that allows her to shape strategic technology decisions, mentor women and mid‑career professionals entering tech, and eventually launch a consultancy that offers custom solutions
    for cultural institutions. She also hopes to acquire deeper expertise in AI‑driven image analysis to enhance archival work, while maintaining a balanced workload that protects her mental well‑being.
