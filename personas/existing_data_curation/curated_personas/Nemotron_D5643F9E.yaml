  career_goals: Teral aims to advance to a supervisory or assistant manager role within her retailer, where she can mentor younger staff and improve operational efficiency. Simultaneously, she dreams of
    establishing a community art hub in Pittsylvania County—a space that offers free workshops in painting, quilting, and photography for seniors and youth. She also hopes to earn a certification in retail
    management and possibly launch a small online boutique showcasing her handcrafted items, blending her entrepreneurial spirit with her love for local culture.
