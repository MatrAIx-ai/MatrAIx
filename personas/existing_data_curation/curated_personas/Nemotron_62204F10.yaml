  career_goals: Jordan aims to advance to a Senior Program Manager role and eventually become Director of Project Management within a leading AI‑driven technology firm. He wants to spearhead large‑scale,
    cross‑disciplinary product initiatives that integrate emerging technologies, build a reputation for delivering high‑impact, data‑informed projects, mentor the next generation of project managers, and
    eventually launch his own consultancy focused on agile transformation for tech startups.
