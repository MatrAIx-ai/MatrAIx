  career_goals: Ngoc aims to transition into a senior leadership role, such as Nurse Manager or Director of Nursing, where she can champion patient‑centered innovations that blend technology, art, and holistic
    care. She plans to earn a Master of Science in Nursing with a focus on Nursing Informatics, publish research on integrating creative therapies into clinical practice, and develop a community health
    program that offers culturally tailored health education and art‑based wellness workshops for the Southeast Asian population in Orange County. Long‑term, she envisions becoming a recognized speaker
    at national nursing conferences and a mentor for emerging nurses, fostering a culture of curiosity, excellence, and compassionate leadership.
