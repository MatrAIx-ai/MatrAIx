  career_goals: Melanie dreams of becoming a teacher one day because she loves sharing what she knows and guiding friends through learning activities. She also imagines playing the role of a community helper,
    such as a librarian or a park volunteer, where she can combine her love for structure with her sociable energy. In the short term, she aims to master reading simple books and to lead her classroom’s
    "show‑and‑tell" sessions.
