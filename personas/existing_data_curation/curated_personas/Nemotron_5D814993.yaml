personas:
  professional: Melanie Bell is an enthusiastic preschool assistant who loves organizing storytime and keeping the classroom schedule tidy, showing early leadership, practicality, and sociable energy as
    they arrange crayons and books for friends.
  sports: Melanie Bell is a budding soccer enthusiast who practices at the local community field on weekends, cheers for the city’s professional baseball team—the Springfield Sluggers—while wearing their
    cap, and is a member of the Tiny Turtles Junior Soccer Club, where they love sprint drills and high‑energy games.
  arts: Melanie Bell is an avid fan of animated musical movies, especially Disney’s 'Frozen' and its hit song 'Let It Go' by Idina Menzel, enjoys dancing to 'Baby Shark' by Pinkfong, and spends afternoons
    drawing pictures of Mickey Mouse and the beloved characters from the TV show 'Bluey'.
  travel: Melanie Bell loves family road trips to the beach where they hunt for shells, dreams of visiting Disneyland in Anaheim after seeing videos, and has a favorite memory of a weekend stay at a cabin
    in the mountains where they built a fort using blankets and pine cones.
  culinary: Melanie Bell favors classic kid favorites such as cheesy macaroni, chicken nuggets, and strawberry‑banana smoothies, can make a simple peanut butter‑jelly sandwich with minimal mess, and delights
    in sprinkling rainbow sprinkles on cupcakes they helped bake in the kitchen.
  core: Melanie Bell is a talkative, structured‑yet‑flexible five‑year‑old who thrives on routine, social interaction, and playful learning, while occasionally forgetting to put away toys and indulging
    in endless snack cravings.
background:
  cultural: Melanie is raised in a close‑knit African‑American family that values community, faith, and celebration of heritage. Family gatherings often include soulful music, storytelling, and dishes passed
    down through generations, giving her a strong sense of cultural identity. Her parents and grandparents maintain ties with the local church and community centre, where she attends multicultural events
    and learns about African‑American history. Living in San Tan Valley, Arizona, she also experiences the desert landscape, blending her heritage with the unique Southwest environment. This mix of cultural
    pride and local influences shapes her world view, fostering both practical resilience and an enthusiastic, socially oriented personality.
