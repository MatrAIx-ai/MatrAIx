  hobbies: '[''Playing basketball'', ''Building LEGO models'', ''Coding with Scratch'', ''Reading comic books'', ''Participating in the school robotics club'', ''Playing board games with friends'', ''Singing
    in the church choir'', ''Collecting stickers'']'
  career_goals: Raymond dreams of becoming an engineer or inventor who creates gadgets that help his community. He wants to win his school's science fair, earn a spot on the regional robotics competition
    team, and eventually lead a student technology club. Academically, he aims to keep his grades at the top of his class and earn recognition such as the honor roll. He also hopes to mentor younger kids
    in group activities, showing them how to work together and stay organized.
