personas:
  professional: A budding junior engineer named Jesus Tellez delights in constructing elaborate block towers at preschool, applying methodical planning and practical problem‑solving while quietly ensuring
    every piece fits, reflecting their organized, reserved nature and innate curiosity.
  sports: A playful athlete named Jesus Tellez joins the Paterson United youth soccer club, dribbles their favorite ball on weekends, cheers for the New York Yankees during family baseball evenings, and
    pretends to be a New York Knicks guard in their backyard, showing a quiet but steady enthusiasm for team sports.
  arts: A budding arts aficionado named Jesus Tellez sways to the rhythms of Juan Luis Guerra’s merengue and Romeo Santos’s bachata while drawing colorful scenes of parrots and superheroes, often performing
    tiny dance steps at family gatherings, showing how music and visual art shape their joyful yet introspective playtime.
  travel: An adventurous traveler named Jesus Tellez treasures family trips to their grandparents’ home in the Dominican Republic, where they explore coconut‑laden beaches and savor fresh mangú, while daydreaming
    about future visits to Orlando’s theme parks and the majestic waterfalls of Niagara Falls, balancing their love of familiar cultural experiences with a budding curiosity for new sights.
  culinary: A curious mini‑chef named Jesus Tellez loves the creamy taste of mangú, the crisp bite of fried plantains, and the savory filling of cheese‑stuffed empanadas, often assisting their mother in
    whisking batter for sweet plantain fritters and asking for extra ketchup on their macaroni‑and‑cheese, reflecting a palate that blends beloved home flavors with classic kid favorites.
  core: A meticulous five‑year‑old named Jesus Tellez balances a vivid imagination with an almost adult‑like need for order, often worrying about a missing puzzle piece and retreating to quiet corners to
    draw, yet they radiate kindness and a quiet determination to keep harmony in their small world.
background:
  cultural: Jesus is raised in a Dominican household in Paterson, New Jersey. Spanish is spoken at home while English is used at school. His family celebrates Dominican traditions such as Dominican Independence
    Day and Semana Santa, enjoys foods like mangú, empanadas, and plantains, and listens to merengue, bachata, and salsa. He participates in community events at the local Dominican church and cultural festivals,
    which nurture his sense of identity and community belonging.
