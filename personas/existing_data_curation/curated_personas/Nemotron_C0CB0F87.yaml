  hobbies: '[''Basketball'', ''Robotics Mentoring'', ''Classic Car Restoration'', ''Soul‑Food Cooking'', ''Live Blues/Jazz Concerts'', ''African American Heritage Festival'', ''Biographies'', ''DIY Home‑Improvement'']'
  career_goals: James aims to become a senior mechanical engineer within the next five years and eventually transition into a plant‑manager or engineering‑director role overseeing sustainable HVAC and energy‑efficiency
    projects for commercial buildings in Chicago. He seeks to lead cross‑functional teams that emphasize reliability and routine‑driven processes while integrating Lean principles. Additionally, he wants
    to mentor junior engineers and contribute to local STEM outreach programs, using his position to give back to his community and create a more inclusive engineering environment.
