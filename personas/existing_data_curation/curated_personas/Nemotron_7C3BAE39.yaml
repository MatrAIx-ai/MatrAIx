  career_goals: His primary ambition is to develop an innovative, data-driven model that helps local farmers in Randolph County optimize irrigation and reduce water usage, leveraging his expertise in GIS
    and statistical modeling. He aims to publish his methodology in a peer-reviewed journal and eventually launch a consulting practice that offers bespoke mathematical solutions to regional agricultural
    and environmental challenges. In the longer term, Hector hopes to mentor at-risk youth in his community through math-focused workshops, and perhaps author a popular-science book that bridges abstract
    mathematics with everyday creativity.
