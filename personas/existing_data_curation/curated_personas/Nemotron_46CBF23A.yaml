  hobbies: '[''Reading classic literature'', ''Gardening'', ''Birdwatching'', ''Cooking'', ''Yoga'', ''Quilting'', ''Hiking'', ''Attending small theater performances'', ''Writing memoirs'', ''Participating
    in small book clubs'']'
  career_goals: Carol aims to secure regular roles in regional theater and film projects that allow her to continue honing her craft while maintaining a stable schedule. She aspires to direct her first
    stage production within the next two years, focusing on classic plays with contemporary relevance. Additionally, she seeks to mentor emerging actors through workshops at the local community playhouse
    and hopes to establish a small grant for underrepresented voices in the arts scene. Long-term, she envisions founding a community-run theater company that emphasizes collaborative creation, sustainable
    production practices, and a supportive environment for artists of all ages.
