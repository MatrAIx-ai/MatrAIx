persona_description: A student who is passionate about historical research and has a particular interest in the provenance of museum objects. They have developed a keen eye for detail and are skilled at
  interpreting the evidence presented. They have a background in art history and have taken courses in museum studies, but they have a desire to delve deeper into the topic of object-centric history. They
  are eager to learn more about the power of contextualization and the ways in which objects continue to have vibrant lives and changing effects on their successive owners and audiences. They are likely
  to be interested in pursuing a career in museums and have a strong interest in working with museum objects and their archival records.
