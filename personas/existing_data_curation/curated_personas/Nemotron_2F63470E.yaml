personas:
  professional: Briggs Elder, a seasoned executive with over three decades of boardroom experience, blends a methodical, data‑driven approach to strategic planning, financial forecasting, and M&A risk management
    with a practical curiosity for AI‑enabled analytics, and now focuses on orchestrating a sustainable succession plan that embeds renewable‑energy initiatives while mentoring the next generation of leaders.
  sports: Briggs Elder, an avid desert hiker and member of the Arizona Trail Club, spends weekends trekking the Sonoran landscape while cheering on the Phoenix Suns and Arizona Cardinals in the occasional
    game, and prefers low‑impact exercise like trail walking over competitive team sports.
  arts: Briggs Elder, a contemplative reader of non‑fiction history and emerging technology, captures the stark Southwest in photographs inspired by Ansel Adams, restores classic cars as functional art,
    and unwinds to the timeless sounds of Bruce Springsteen and the improvisational jazz of Miles Davis during intimate wine‑tasting gatherings with friends.
  travel: Briggs Elder, a methodical traveler who favors solitary, well‑planned desert itineraries, has documented sunrise hikes at Monument Valley and night‑time astrophotography in Sedona, and dreams
    of exploring the Zen gardens of Kyoto on a future cultural retreat.
  culinary: Briggs Elder, a wine‑enthusiast with a palate for full‑bodied reds, enjoys pairing a 2015 Malbec with grilled cactus, chipotle‑marinated lamb chops, and dishes featuring prickly pear glaze,
    and occasionally cooks for close friends during small‑group tastings, though they admit to over‑indulging in cheese boards.
  core: Briggs Elder embodies a disciplined, data‑driven executive mind tempered by a solitary, anxiety‑laden creative spirit, balancing rigorous strategic work with desert hikes, classic‑car restoration,
    and selective social rituals that reveal a competitive yet cautious approach to life.
background:
  cultural: Briggs grew up in a middle‑class, predominantly Anglo‑American family in the Midwest before relocating to Phoenix in his thirties. His upbringing emphasized self‑reliance, hard work, and modest
    community involvement, values that continue to shape his leadership philosophy. While he identifies with mainstream American cultural norms, his long residence in the Southwest has introduced him to
    the region’s desert‑centric lifestyle, a pragmatic appreciation for water conservation, and a relaxed pace of life in contrast to his competitive professional demeanor. He and his wife maintain a stable,
    supportive marriage that anchors his personal routine.
