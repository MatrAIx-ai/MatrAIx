  career_goals: Approaching retirement, Briggs is focused on orchestrating a seamless succession that preserves the company’s disciplined culture of innovation. He aims to embed long‑term sustainability
    practices—particularly renewable energy initiatives suited to the Phoenix climate—while boosting shareholder value. Beyond the boardroom, he aspires to mentor emerging executives, author a memoir on
    resilience in leadership, and establish a charitable foundation that supports mental‑health programs for high‑stress professionals, reflecting his own experience with intense anxiety and emotional reactivity.
