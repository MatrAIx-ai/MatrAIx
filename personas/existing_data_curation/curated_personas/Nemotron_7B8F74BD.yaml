  career_goals: Darius aspires to work in a field where his curiosity and practicality can combine, such as robotics or software engineering. He imagines designing simple, user‑friendly devices that help
    improve everyday life, especially for people in his community. While still young, he is excited about the prospect of studying engineering in high school and later college, and he hopes to mentor younger
    students in coding and STEM activities.
