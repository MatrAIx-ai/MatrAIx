personas:
  professional: A budding young inventor in Cleveland, Amanda Smith combines a love for LEGO construction and a kids’ robotics kit with a practical mindset, turning imaginative ideas into functional projects
    while eagerly collaborating with friends on school science fairs.
  sports: Amanda Smith is a spirited member of the East Side Youth Soccer Club, practicing weekly drills and cheering for the Cleveland Guardians and Cleveland Browns, while also joining the school’s spring
    track meet to boost endurance, embodying a balance of team spirit and personal fitness.
  arts: Amanda Smith, an enthusiastic choir singer, loves belting out songs from Disney’s “Frozen” and “Moana” and sketches vibrant cartoon characters inspired by Pixar films, while also drawing inspiration
    from the whimsical illustrations of Dr. Seuss.
  travel: Amanda Smith dreams of exploring the Rock & Roll Hall of Fame in their hometown and taking a family road trip to Cedar Point amusement park, while also yearning to visit Disney World in Florida,
    preferring organized itineraries that fit around school holidays and allow time for soccer practice on the way.
  culinary: Amanda Smith enjoys cooking simple dishes like homemade mac & cheese with cheddar, pizza topped with pepperoni and garden‑fresh bell peppers, and loves snacking on strawberry smoothies and carrot
    sticks with ranch dip, showing budding kitchen confidence while occasionally burning toast.
  core: Amanda Smith blends boundless curiosity with a practical streak, leading a lively, community‑focused life of LEGO builds, soccer games, choir rehearsals, and garden stewardship, all while occasionally
    forgetting to pack their lunch.
background:
  cultural: Amanda is raised in Cleveland, Ohio, a Midwestern city known for its strong community spirit and seasonal diversity. Her family’s cultural background reflects typical American values, emphasizing
    education, volunteerism, and participation in local traditions such as neighborhood block parties, farmers’ markets, and seasonal festivals. Growing up in a predominantly white, middle‑class neighborhood,
    she experiences a blend of Midwestern hospitality and exposure to the city’s multicultural neighborhoods, shaping an inclusive outlook and collaborative nature.
