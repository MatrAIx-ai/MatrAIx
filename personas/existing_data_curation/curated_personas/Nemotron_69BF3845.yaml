  career_goals: Even though she is still in elementary school, Amanda already envisions a future that merges her love of learning with her desire to help others. She dreams of becoming a teacher who sparks
    curiosity, a veterinarian caring for animals, or a community program coordinator who organizes volunteer projects for kids. Her goals are guided by a practical mindset—she wants to acquire strong scientific
    knowledge and develop leadership skills so she can turn ideas into real‑world benefits.
