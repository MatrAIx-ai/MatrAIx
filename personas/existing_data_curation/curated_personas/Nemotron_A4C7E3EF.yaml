  career_goals: He dreams of designing and building structures that benefit his rural community, such as bridges, bike paths, and playgrounds. His long-term goal is to become a civil engineer, and he also
    hopes to run a youth workshop after completing his education, where he can teach hands-on skills like woodworking, basic robotics, and environmental stewardship. He envisions a career that merges his
    love for problem-solving, his organized nature, and his desire to work collaboratively with others.
