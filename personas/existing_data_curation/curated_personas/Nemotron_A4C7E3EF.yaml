personas:
  professional: A budding environmental engineer in training, Raul Reeder combines their love of hiking and fishing with their methodical approach to problem solving by designing LEGO Technic models that
    simulate water filtration systems and coding interactive Scratch projects that teach peers about ecosystem health.
  sports: An energetic participant in the Green Hills Youth Soccer Club and the River Rapids Little League baseball team, Raul Reeder organizes weekend pick-up games, drills their footwork on the Appalachian
    trails, and models a balanced fitness routine that mixes cardio hikes in the Daniel Boone foothills with weekend strength-building drills at the community center, all while cheering for the Cincinnati
    Bengals.
  arts: A creative digital storyteller, Raul Reeder merges their LEGO Technic constructions with Scratch animations, drawing inspiration from the imaginative worlds of the LEGO Movie, the sci-fi melodies
    of Imagine Dragons, and the classic humor of Bill Nye, while spending Saturday afternoons at the local library’s maker space watching performances by the youth theater’s rendition of ‘The Wizard of
    Oz.’
  travel: A budding explorer, Raul Reeder enjoys meticulously planning family weekend hikes in the Daniel Boone National Forest, has already trekked to Mammoth Cave’s underground rivers, dreams of camping
    under the Aurora Borealis in Iceland, and saves a portion of their allowance for future trips to Yellowstone’s geysers and the Grand Canyon’s rim.
  culinary: A budding junior chef, Raul Reeder prefers hearty trail-mix snacks of almonds, dried cranberries, and pretzels, loves assembling grilled cheese and tomato soup after a day on the river, and
    on camping trips they expertly roast s’mores with dark chocolate and marshmallows, all while gradually learning to stir-fry veggies for a balanced diet.
  core: Raul Reeder is an organized, curiosity-driven 11-year-old who balances outdoor adventure, meticulous LEGO builds, and collaborative Scratch coding, and they maintain calm resilience even when a
    competitive soccer match gets intense.
background:
  cultural: He grew up in Grayson, a small town in Greenup County on the Ohio River, surrounded by the rolling hills of Eastern Kentucky. The community retains strong Appalachian influences, with a tradition
    of close-knit family ties, church gatherings, and local festivals featuring bluegrass and country music. His family participates in seasonal events such as the annual river-front fish fry and county
    fairs, where farmers showcase produce and crafts. The values of self-reliance, respect for the land, and hospitality are common in his upbringing, and the area's natural scenery encourages a love for
    outdoor activities like hunting, fishing, and hiking. While his cultural heritage is rooted in the broader American Midwest, he also experiences the modest, community-oriented lifestyle typical of rural
    Kentucky.
