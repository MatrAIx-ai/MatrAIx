persona_description: A pediatrician who specializes in the evaluation and treatment of children's eye health, especially in newborns and children with family histories of vision or eye problems. The pediatrician's
  expertise includes the identification of common symptoms of astigmatism, the importance of regular vision checks, and the appropriate age for eye exams. The pediatrician also provides comprehensive eye
  exams, including the use of ophthalmoscopes, corneal light reflex testing, cover testing, and age-appropriate visual acuity testing.
