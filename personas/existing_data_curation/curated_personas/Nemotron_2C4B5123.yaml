personas:
  professional: Michael Kornblum is a budding young engineer who channels his methodical mindset and love of structure into building intricate LEGO creations while reliably coordinating his school soccer
    team's practices, foreshadowing future leadership in collaborative, design-focused projects.
  sports: Michael Kornblum laces up his cleats for the Seattle Youth Soccer Club's Thunderbolt squad, thrives on the structured drills of his school's soccer team, and fervently supports the Seattle Sounders
    FC, Seattle Mariners, and Seattle Kraken, blending his love of teamwork with a disciplined approach to staying active.
  arts: 'Michael Kornblum channels his vivid imagination into drawing superhero comics inspired by Stan Lee''s Marvel characters, idolizes LEGO master builder Nathan Sawaya, devours the Magic Tree House
    adventure books by Mary Pope Osborne, and grooves to the soundtrack of ''The Incredibles'' and ''Spider-Man: Into the Spider-Verse'', weaving these cultural touchstones into his everyday play.'
  travel: Michael Kornblum navigates family trips with a meticulously drawn checklist, has already marveled at the thrills of Disney World in Orlando and the grandeur of the Grand Canyon, and daydreams
    about boarding a plane to Barcelona's Park Guell and Japan's Tokyo Disneyland, balancing his love of structured itineraries with a yearning for new adventures.
  culinary: Michael Kornblum eagerly scoops a spoonful of homemade macaroni-and-cheese, proudly assembles mini pepperoni pizzas shaped like LEGO bricks, delights in the bright flavors of chicken tacos with
    cilantro and lime, and decorates dinosaur-themed sugar cookies, reflecting a playful yet methodical approach to cooking.
  core: Michael Kornblum blends a love for structured LEGO builds, energetic soccer play, and a vivid imagination while navigating occasional waves of anxiety that fuel both meticulous planning and spontaneous
    storytelling.
background:
  cultural: Michael grows up in the small town of Cuba, New Mexico, a community where white, Western ranching traditions intersect with vibrant Hispanic influences from the surrounding Southwest region.
    His family’s roots trace back to multi‑generational homesteading and farming, fostering a respect for the land and a close‑knit neighborhood atmosphere. Local celebrations such as the annual Fourth
    of July parade, community rodeos, and shared festivals like Cinco de Mayo expose Michael to a blend of cultural music, food, and language. At school, he interacts with peers from diverse backgrounds,
    which enhances his awareness of different customs and encourages his occasional practice of Spanish phrases. This mixed cultural environment shapes his worldview, giving him a balanced appreciation
    for both his family's heritage and the broader Southwest community.
attributes:
  skills: '[''Reading fluently at a second‑grade level'', ''Basic arithmetic (addition, subtraction, multiplication tables up to 10)'', ''Organizational skills for managing school materials and daily schedules'',
    ''Teamwork and leadership in group activities'', ''Problem‑solving through puzzles and LEGO building'', ''Basic tablet navigation and use of educational apps'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Reading adventure books (e.g., Magic Tree House)'', ''Drawing and sketching comics'', ''Board games and jigsaw puzzles'', ''Practicing basic Spanish vocabulary'']'
  career_goals: Michael dreams of pursuing a career that combines clear structure, teamwork, and a chance to help others. He is fascinated by firefighters, admiring their predictable routines, camaraderie,
    and the opportunity to protect the community. At the same time, his love for building with LEGO and solving design puzzles fuels an ambition to become a civil engineer or architect, where he can plan
    and create safe, functional spaces. He envisions a future where he can both safeguard people and design the environments they live in.
