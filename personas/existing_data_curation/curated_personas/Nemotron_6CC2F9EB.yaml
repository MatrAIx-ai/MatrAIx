personas:
  professional: Thomas Jarrett, a seasoned operations manager at a regional manufacturing firm, blends their pragmatic strategic planning with a natural talkative charm to unite cross-functional teams,
    mentor emerging leaders, and they champion a community-partnered sustainability initiative as they transition toward retirement.
  sports: Thomas Jarrett, an avid fisherman and weekend hiker, also competes in pickleball at the Scarborough Senior Club, follows the Portland Sea Dogs and the New England Patriots with devotion, and they
    enjoy a few rounds of golf at the nearby country club each spring.
  arts: Thomas Jarrett, a devoted patron of the town's community theater and the Cape New England Folk Festival, immerses themselves in historical novels by Bernard Cornwell, collects prints by Ansel Adams,
    and they often weave Shakespearean quotes into bridge nights.
  travel: Thomas Jarrett prefers low-key road trips along the New England coast - recently exploring Acadia National Park and the historic streets of Boston - while they dream of a heritage pilgrimage to
    Scotland's Highlands and a culinary tour of Tuscany's seaside villages.
  culinary: Thomas Jarrett, an enthusiastic home chef, delights in preparing fresh lobster rolls, herb-crusted baked cod with dill and lemon, and hearty clam chowder using clams harvested from local waters,
    and they often garnish dishes with garden-grown thyme and parsley.
  core: Thomas Jarrett, a sociable 63-year-old manager turned mentor, balances relentless curiosity with practical stewardship, often weaving fish stories into board meetings while they occasionally overcommit
    to community events and forget to water their garden on rainy days.
background:
  cultural: Thomas grew up in a middle‑class New England family with deep roots in Maine's maritime and agricultural traditions. His cultural identity blends classic Anglo‑American values—self‑reliance,
    community service, and a respect for nature—with a lifelong appreciation for the arts and literature fostered by his humanities degree. He celebrates traditional American holidays, participates in local
    festivals such as the Scarborough Beach Festival, and maintains ties to his local Protestant congregation. His upbringing and surroundings have instilled in him a strong sense of civic duty, a love
    for the coastal environment, and an enduring curiosity about the region's history and peoples.
attributes:
  skills: '["Leadership", "Team Management", "Strategic Planning", "Operations Oversight", "Budgeting and Financial Management", "Customer Service Management", "Stakeholder Engagement", "Conflict Mediation",
