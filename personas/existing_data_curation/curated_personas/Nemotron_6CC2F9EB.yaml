  hobbies: '["Reading historical fiction and local history", "Fishing in coastal waters", "Gardening (vegetable and flower beds)", "Hiking coastal trails", "Attending community theater and concerts", "Volunteer
    work at the local library and historical society", "Playing bridge and card games with friends", "Cooking seafood dishes", "Nature photography", "Genealogy research"]'
  career_goals: Approaching retirement, Thomas aims to transition from day‑to‑day operational oversight to a mentorship and advisory role, helping younger managers develop the same balance of curiosity
    and practicality he values. He hopes to spearhead a community‑partnered sustainability project at his current workplace, integrating local environmental concerns with business efficiency. Additionally,
    he plans to serve on the board of a regional historical society, leveraging his humanities education to preserve local heritage while remaining an active, visible presence in community events.
