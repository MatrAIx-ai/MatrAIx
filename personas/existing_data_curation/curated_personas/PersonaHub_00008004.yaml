persona_description: A researcher who focuses on the psychological effects of the COVID-19 pandemic on mental health, particularly among older adults. She has conducted a comprehensive study on meaning
  in life and self-control during the lockdown and post-lockdown periods, and has found that older people showed higher resilience and were better able to adopt metaperspectives. She is interested in the
  long-term effects of the pandemic on mental health and the impact of economic losses, communication by authorities, and the prevention paradox on self-control.
