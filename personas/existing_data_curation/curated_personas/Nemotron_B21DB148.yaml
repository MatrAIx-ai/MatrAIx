  career_goals: Jennifer aims to re‑enter the workforce in a low‑stress, purpose‑driven role. Over the next three years she plans to complete a bachelor’s degree in social work, focusing on community outreach
    for seniors and families. She hopes to launch a small home‑based venture selling hand‑made quilts and garden‑grown produce at local farmers’ markets and online platforms. Long‑term, she envisions establishing
    a community hub in Forest, VA, where she can offer workshops on wellness, gardening, and craft skills, while also serving as a certified caregiver for elderly neighbors. Her goals balance her curiosity
    for learning with a practical desire to contribute meaningfully to her community.
