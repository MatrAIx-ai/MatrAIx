persona_description: A professional who works in the field of process safety, particularly in the design and installation of safety relief valves for flammable, toxic, or corrosive gases, vapors, or liquids.
  This persona is familiar with the design and operation of safety relief valves, including conventional and balanced types, and is skilled in the use of pressure and vacuum safety valves. They are also
  knowledgeable about pilot-operated safety relief valves and rupture discs, and are capable of installing and maintaining these devices in process systems. Additionally, this persona is aware of the potential
  risks and hazards associated with excessive pressure or vacuum conditions in process systems and is equipped with the necessary knowledge and skills to ensure the safe operation of these systems.
