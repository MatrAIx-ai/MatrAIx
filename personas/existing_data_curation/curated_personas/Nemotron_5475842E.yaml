personas:
  professional: Corey Hart, a 21‑year‑old accounting intern at a regional CPA firm, leverages a methodical audit skillset and a penchant for sketching to craft financial reports that are as precise as they
    are visually striking, aiming to stand out among peers and fast‑track toward a Big Four senior auditor role.
  sports: Corey Hart follows the Boston Red Sox and Celtics religiously, joins a local pick‑up soccer league on Saturday mornings, hikes the White Mountains with a weekend club, and maintains a minimalist
    fitness routine of bodyweight circuits, preferring solitary runs along the Charles River over crowded gyms.
  arts: Corey Hart spends weekends sketching at the ICA, draws inspiration from Edward Hopper’s New England realism and the vibrant works of contemporary artist Julie Mehretu, curates a personal playlist
    of Sufjan Stevens, Fleet Foxes, and The Rolling Stones, and regularly attends talks at the Museum of Fine Arts Boston to stay abreast of emerging art trends.
  travel: Corey Hart plans trips with meticulous spreadsheets, favors short, budget‑friendly getaways to Salem, Portland, and the Berkshires, dreams of a month‑long study tour of Renaissance sites in Florence
    and Siena, and balances travel ambitions with his part‑time internship by booking flights only during semester breaks.
  culinary: Corey Hart enjoys cooking hearty New England clam chowder, a rustic root‑vegetable stew with thyme and rosemary, skillfully chops fresh herbs for a seasonal vegetable medley, but often over‑seasons
    while multitasking on a sketch, and treats himself to specialty coffee drinks from local roasters on rainy afternoons.
  core: Corey Hart is a methodical CPA hopeful who sketches financial statements, budgets obsessively, tolerates occasional insomnia, fuels fitness with solo runs, and channels a love for New England art
    into every facet of life, even if they sometimes over‑season their stew.
background:
  cultural: Corey grew up in Chestnut Hill, an affluent suburb of Boston with a strong New England cultural heritage. His family traces its roots to Irish and German ancestry, reflecting the typical white
    middle‑class background of the region. The community emphasizes education, punctuality, and modesty, while also offering access to Boston’s vibrant arts scene, which nurtured his curiosity about art
    and new ideas. He attended a local public high school that valued academic rigor and extracurricular involvement, and he is currently taking courses at a nearby college while interning locally. This
    upbringing blends a pragmatic, methodical work ethic with an appreciation for cultural experiences common to the Boston metropolitan area.
attributes:
  skills: '[''Financial Accounting'', ''Auditing Standards (GAAP)'', ''Tax Preparation'', ''Internal Controls'', ''Risk Assessment'', ''Excel (advanced)'', ''Power Query'', ''Python for Data Analysis'',
    ''Financial Reporting'', ''Data Visualization'']'
  hobbies: '[''Sketching'', ''Museum and Gallery Visits'', ''Photography'', ''Hiking'', ''Reading (art history, economics, psychology)'', ''Listening to Indie Folk and Classic Rock'', ''Strategic Video
    Games'', ''Volunteer Accounting for Community Events'']'
  career_goals: Corey aims to obtain his Certified Public Accountant (CPA) license within the next two years, followed by a senior auditor position at a Big Four firm. He is competitive and seeks to be
    recognized as a top performer, aspiring to lead audit engagements and eventually transition into a managerial role such as Audit Manager or Director of Financial Reporting. In the longer term, he envisions
    becoming a Chief Financial Officer (CFO) where he can integrate his analytical expertise with his passion for creative communication, championing transparent and visually compelling financial disclosures.
    He also hopes to pursue a Master’s in Accounting or an MBA to broaden his strategic business perspective.
