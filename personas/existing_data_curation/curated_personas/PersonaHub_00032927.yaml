persona_description: A public health researcher who studies the impact of obesity and central obesity on heart health, particularly in relation to waist-to-hip ratio. She is particularly interested in the
  differences in risk between men and women, and the implications of belly fat for metabolic and cardiovascular health. Her research focuses on the use of BMI and waist-to-hip ratio as indicators of body
  fat, and the potential for these measures to predict and prevent heart disease.
