    ''Data entry and sales reporting'']'
  hobbies: '[''Hiking in the Franklin Mountains'', ''Street photography of El Paso neighborhoods'', ''Listening to classic rock and blues'', ''Playing video games (strategy and simulation)'', ''DIY automotive
    maintenance'', ''Exploring local food trucks and tacos'', ''Reading sales and personal development books'', ''Volunteering at community events'']'
  career_goals: Jordan aims to move into a supervisory role within the sales team, eventually becoming a regional sales manager where he can shape strategy and mentor newcomers. He also dreams of launching
    his own mobile vendor business that blends his sales expertise with a curated selection of local foods and handmade goods, giving him the flexibility to balance family time. To support these goals,
    he plans to complete a bachelor's degree in Business Administration part‑time, strengthen his digital marketing skills, and secure a stable home for his growing family in El Paso.
