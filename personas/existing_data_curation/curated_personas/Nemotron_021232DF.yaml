personas:
  professional: Jordan Berger, a 34‑year‑old mobile sales specialist in El Paso, blends bilingual persuasive charm with a hands‑on, data‑light approach, pivoting routes on the fly while mentoring newcomers
    and experimenting with emerging sales tech despite a sometimes chaotic schedule.
  sports: Jordan Berger, an avid hiker of the Franklin Mountains, regularly joins the local El Paso Trail Club, roots for the El Paso Chihuahuas baseball team and the El Paso Locomotive FC soccer club,
    and squeezes in weekend pick‑up basketball at the community center for fitness.
  arts: Jordan Berger channels creative energy through street photography on the bustling avenues of El Paso, curates a vinyl collection heavy on classic rock legends like The Rolling Stones and blues icons
    such as Stevie Ray Vaughan, and occasionally volunteers to set up art installations at community festivals.
  travel: Jordan Berger favors spontaneous road trips, having already explored Carlsbad Caverns and Big Bend, dreaming of a cross‑country drive along Route 66 with stops at Austin’s live‑music scene and
    the coastal cliffs of San Diego, all while balancing family commitments and a modest travel budget.
  culinary: Jordan Berger adores Tex‑Mex street fare, from sizzling carne asada tacos and smoky elote to tangy salsa verde, enjoys cooking a weekend batch of chili con carne using fresh cilantro and jalapeños,
    and occasionally experiments with craft beer pairings while returning to a moderate skill level in the kitchen.
  core: Jordan Berger is a 34‑year‑old bilingual sales strategist who blends curiosity with practicality, revels in spontaneous outdoor adventures, balances a relaxed, sometimes disorganized lifestyle with
    a deep‑rooted cooperative spirit, and dreams of leading a regional sales team while running a mobile vendor venture.
background:
  cultural: Jordan is a white American raised in the interior Southwest before moving to El Paso, Texas. Growing up near the border, he absorbed a blend of Anglo and Hispanic influences—comfortable speaking
    English and conversational Spanish, and appreciative of both Thanksgiving traditions and local celebrations like Cinco de Mayo and Paso Del Norte festivals. He values the individualistic work ethic
    common in his Midwestern family roots while embracing the communal, family‑centered spirit of the border community. He identifies as a Protestant Christian and actively participates in neighborhood
    gatherings that emphasize harmony and cooperation.
attributes:
  skills: '[''Door-to-door sales and direct marketing'', ''Persuasive communication and relationship building'', ''Bilingual (English-Spanish) customer interaction'', ''Product demonstration and upselling'',
