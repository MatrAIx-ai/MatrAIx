personas:
  professional: Charisa Thomas is an aspiring robotics enthusiast who blends curiosity with practical problem‑solving, leading her middle‑school robotics club to design Scratch‑coded Lego Mindstorms challenges
    while juggling community‑center event planning and school responsibilities.
  sports: Charisa Thomas dominates weekend pick‑up basketball at the neighborhood park, cheering for the Los Angeles Lakers while dribbling with a love for fast breaks, and also channels her athleticism
    into hip‑hop dance battles, regularly attending after‑school workouts with the local youth sports club.
  arts: Charisa Thomas is a hip‑hop dance aficionado who choreographs TikTok routines inspired by Kendrick Lamar, Beyoncé, and Missy Elliott, and she frequently showcases her moves at the community center’s
    open‑mic nights, while occasionally dabbling in sketching street‑scene graffiti.
  travel: Charisa Thomas dreams of a road‑trip to Nashville to soak up live music and Southern comfort cuisine, while also recalling family getaways to the Great Smoky Mountains, balancing a limited parental
    budget with a desire for Instagram‑ready adventure and occasional school‑approved field trips.
  culinary: Charisa Thomas experiments with soul‑food staples such as fried chicken, collard greens, and sweet‑potato mac & cheese, mastering a crispy coating technique and seasoning blends that include
    smoked paprika, cayenne, and a splash of hot sauce, and she captures the cooking process on TikTok for her followers.
  core: Charisa Thomas is a high‑energy teen who merges robotics curiosity, street‑savvy dance, and soulful cooking into a community‑driven, slightly caffeine‑fueled lifestyle.
background:
  cultural: Charisa is part of the African‑American community in Detroit, a city with a rich legacy of music, activism, and entrepreneurial spirit. Her family maintains traditions rooted in Southern soul
    food, church gatherings, and storytelling, which reinforce a strong sense of community pride and resilience. Growing up in a predominantly Black neighborhood, she is influenced by the sounds of Motown,
    hip‑hop, and jazz that permeate the city, and she values the collective support found in local churches and youth programs. These cultural touchstones shape her identity, encouraging her to blend creativity,
    practicality, and a commitment to uplifting those around her.
