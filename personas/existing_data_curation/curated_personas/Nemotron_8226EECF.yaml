  career_goals: Charisa aims to pursue a career in the health‑care field, aspiring to become a registered nurse or a medical technician, so she can provide practical help to her community. She also wants
    to blend her interest in technology by learning health informatics and may study at a community college after high school. Long‑term, she envisions mentoring younger students and leading health‑awareness
    workshops at local youth centers.
