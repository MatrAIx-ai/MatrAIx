personas:
  professional: Shawntel Facey is a 33‑year‑old automotive technician who blends hands‑on expertise in classic car restoration with a forward‑looking focus on hybrid and electric vehicle service, leveraging
    meticulous shop organization and assertive safety standards while pursuing ASE Master Technician certification.
  sports: Shawntel Facey enjoys solitary strength training at the local gym, hikes the San Antonio River Walk on weekends, follows the San Antonio Missions minor‑league baseball team, and is a member of
    a small weekend cycling club that occasionally rides to nearby hill‑country roads for cardio variety.
  arts: Shawntel Facey immerses themselves in a playlist that swings from Miles Davis and B.B. King to Kendrick Lamar, frequents an intimate downtown jazz lounge on Friday nights, and collects limited‑edition
    automotive photography books that blend technical precision with artistic flair.
  travel: Shawntel Facey prefers meticulously planned road trips to iconic car events such as the Pebble Beach Concours d'Elegance or the Detroit Auto Show, while also squeezing in spontaneous weekend getaways
    to the Texas Hill Country for wine tasting and scenic drives, balancing budget constraints with a yearning for new automotive inspirations.
  culinary: Shawntel Facey favors Texas‑style BBQ brisket seasoned with smoked paprika, enjoys crafting a perfect cup of cold‑brew coffee, and is comfortable tinkering in the kitchen enough to grill a classic
    cheeseburger with avocado, yet admits to a habit of ordering late‑night pizza after a long day in the garage.
  core: Shawntel Facey is a methodical gearhead who channels curiosity into classic car restoration and electric‑vehicle mastery, balancing a disciplined work ethic with a penchant for late‑night automotive
    forums, occasional back‑pain, and a love for jazz‑blues‑hip‑hop mashups.
background:
  cultural: Shawntel grew up in the historically Black Eastside community of San Antonio, where family ties, church gatherings, and neighborhood camaraderie shaped his identity. He was raised with an appreciation
    for the resilience and resourcefulness of his grandparents, who emphasized the value of hard work and community support. African‑American cultural traditions, such as weekend soul‑food gatherings, gospel
    music, and storytelling, remain central to his life. While he navigates a predominantly Latino environment in Bexar County, he maintains strong connections to local Black cultural institutions, participating
    in events like Juneteenth celebrations and volunteer programs at the San Antonio Black Heritage Museum. This blend of cultural influences informs his collaborative spirit, his commitment to mentorship,
    and his pride in contributing to a diverse community.
attributes:
  skills: '[''Engine diagnostics (OBD‑II)'', ''Electrical and electronic system repair'', ''Transmission repair and rebuilding'', ''Brake and suspension maintenance'', ''Hybrid and electric vehicle systems
    knowledge'', ''Preventive maintenance planning'', ''Shop organization and inventory control'', ''Customer service and communication'', ''Technical documentation'', ''Safety compliance and quality assurance'']'
  hobbies: '[''Classic car restoration'', ''Racing simulation gaming'', ''Reading automotive and tech publications'', ''Listening to jazz, blues, and hip‑hop music'', ''Gym workouts and hiking'', ''Small
    group car meet‑ups'', ''Mentoring youth in automotive skills'']'
  career_goals: Shawntel aims to become a Certified Master Technician by completing all ASE certifications, with a particular focus on hybrid and electric vehicle technology. He plans to leverage his curiosity
    for new automotive innovations to specialize in EV service within the next three years. In the longer term, he envisions moving into a service manager role where he can mentor junior technicians, improve
    shop workflow, and implement sustainable practices. Ultimately, he hopes to open his own boutique garage that caters to classic car restorations and modern EV maintenance, providing a community space
    for fellow enthusiasts.
