persona_description: A Water Management Specialist with expertise in the field of Water and Irrigation Development, particularly focused on the efficient development and revitalization of irrigation schemes
  and water use. They are responsible for ensuring the sustainable use of water resources and are knowledgeable about the National Water Act 1998 and its reforms. They are also familiar with the policies
  and legislation related to water management and are skilled in conducting research, promoting, funding and coordinating various institutions involved in irrigation-related research. They have experience
  in the establishment and management of water user associations (WUAs) at the local level and are knowledgeable about the current practices and challenges in the water sector. They are also knowledgeable
  about the raw water pricing strategy and the need for a water market to enable irrigators to save and sell excess water. They have a strong background in agricultural research and have experience in working
  with agricultural organizations such as the South African Sugar Association.
