  hobbies: '[''Experimental Cooking'', ''Food Photography'', ''Yoga'', ''Guided Meditation'', ''Hiking'', ''Science‑Fiction Reading'', ''Korean Language Study'', ''K‑Drama Watching'', ''Community Cultural
    Festivals'']'
  career_goals: Okkyong aims to leverage her technical background to become a regional operations director for a forward‑thinking restaurant group, where she can integrate analytics and sustainable practices
    across multiple locations. In the next five years she plans to complete a master’s degree in Hospitality Management, launch a pilot pop‑up that fuses Korean culinary traditions with modern food‑tech
    concepts, and develop a mentorship program for young women in the hospitality industry. She also seeks to improve her organizational habits to meet deadlines more reliably.
