personas:
  professional: Okkyong Ho is a data‑driven restaurant operations manager who leverages Excel and SQL to forecast inventory while coaching a diverse frontline team, channeling their curiosity‑driven experimentation
    into workflow automation even as they sometimes struggle with strict deadline adherence.
  sports: Okkyong Ho fuels their fitness routine with sunrise yoga at a local studio, weekend hikes with the Santa Monica Trail Club, and cheering for the Los Angeles Lakers and Dodgers while they occasionally
    join an adult recreational volleyball league at the beach.
  arts: Okkyong Ho immerses themselves in contemporary visual art by following exhibitions at The Broad, draws inspiration from indie musician Bon Iver and Korean director Bong Joon‑ho, and winds down evenings
    watching K‑dramas like 'Hospital Playlist' and reading sci‑fi novels by N. K. Jemisin, while they often discuss these works with fellow food‑tech peers.
  travel: Okkyong Ho prefers thoughtfully curated trips that blend culinary exploration with nature, having journeyed to Osaka for street‑food tours, hiked the Volcanoes National Park in Iceland, and they
    are planning a future sustainable agritourism visit to the Okanagan Valley.
  culinary: Okkyong Ho experiments in the kitchen by marrying gochujang‑marinated tempeh with sous‑vide techniques to create a kimchi‑foam garnish for their signature miso ramen, favoring ingredients like
    fermented peppers, matcha powder, and black garlic, while they document each plated masterpiece on Instagram.
  core: Okkyong Ho is a curiosity‑driven yet deadline‑averse culinary tech enthusiast who balances relentless experimentation with a habit of procrastinating paperwork, often fueling late‑night brainstorming
    sessions with espresso, and they keep a mindfulness app open for grounding.
background:
  cultural: Okkyong is a second‑generation Korean‑American who grew up in Los Angeles’s Koreatown neighborhood. She is fluent in both English and Korean and maintains close ties with her extended family,
    celebrating Chuseok, Seollal, and other Korean holidays. Her upbringing blends traditional Korean values of respect, collectivism, and hard work with the diverse, entrepreneurial spirit of Southern
    California. This bicultural perspective informs her cuisine, her communication style, and her desire to bridge Eastern culinary heritage with Western innovation.
attributes:
  skills: '[''Data‑Driven Inventory Management'', ''Team Leadership'', ''Food Safety Compliance (ServSafe)'', ''POS System Customization'', ''Process Optimization'', ''Budgeting and Cost Control'', ''Conflict
