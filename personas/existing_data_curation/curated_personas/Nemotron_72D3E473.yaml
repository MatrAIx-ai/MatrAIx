personas:
  professional: Willie Shellman is a 4‑year‑old explorer in the preschool classroom, combining curiosity about how things work with a practical streak for building stable block towers; they organize toys
    by color and size while still delighting in spontaneous experiments, showing a budding competitive edge when racing to finish puzzles.
  sports: Willie Shellman joins the Little Stars Soccer Club for toddlers, cheers for the local professional team City FC, and practices kicking a soft ball at the park each afternoon, showing a competitive
    drive to score more goals than peers.
  arts: Willie Shellman loves drawing dinosaurs with crayons, listens to Raffi and Disney’s "Let It Go" on repeat, and they often perform impromptu sing‑alongs in the living room, channeling a vivid imagination
    into both visual and musical expression.
  travel: Willie Shellman delights in family road trips to the nearby zoo and splash‑pad water park, dreams of visiting Disneyland Resort in California, and they prefer short trips with a familiar adult
    companion over crowded tourist crowds.
  culinary: Willie Shellman enjoys mac and cheese with a sprinkle of cheddar, loves banana slices with honey, and can expertly spread peanut butter on bread, though they are notoriously picky about broccoli.
  core: Willie Shellman is a pragmatic, curiosity‑driven preschooler who organizes toys, saves coins, battles allergies, scores goals, draws dinosaurs, dreams of theme parks, and refuses broccoli, all while
    maintaining a steady, competitive edge.
background:
  cultural: Willie lives in Louisville’s historic African‑American community, where family gatherings often feature soul‑food dishes like fried chicken, collard greens, and cornbread, and church music and
    gospel songs are a regular part of his weekend routine. He celebrates local traditions such as Juneteenth and participates in community events like the Louisville Children’s Festival, absorbing a blend
    of Southern hospitality and African‑American cultural pride that shapes his values and outlook.
