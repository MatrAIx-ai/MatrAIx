  hobbies: '[''Surfing'', ''Hiking coastal trails'', ''Ukulele playing'', ''Cooking Asian‑Hawaiian fusion dishes'', ''Reading health and technology articles'', ''Puzzle solving (Sudoku, Go, chess)'', ''Beach
    volleyball tournaments'', ''Volunteering for beach cleanups'', ''Gardening tropical plants'']'
  career_goals: Le plans to complete her GED within the next year, earn a Certified Nursing Assistant (CNA) credential, and enroll in a community‑college health‑sciences program. She aims to become a Licensed
    Practical Nurse (LPN) and eventually a Registered Nurse specializing in geriatric and culturally competent care. Long‑term, she envisions leading her own home‑health agency that integrates technology,
    respects multicultural values, and positions her as a competitive leader in the Hawaiian health‑care market.
