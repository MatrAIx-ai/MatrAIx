personas:
  professional: Leslie Ellis is a full‑stack software developer and business‑savvy product strategist who harnesses React, Node.js, and D3.js to craft user‑centric digital art experiences, and they display
    an assertive yet empathetic collaboration style that translates abstract creative visions into functional prototypes despite a penchant for spontaneous tinkering that sometimes challenges deadline discipline.
  sports: Leslie Ellis is an avid outdoor enthusiast who hikes the Ozark Trail with the Ozark Outdoor Club, kayaks the White River on summer weekends, and passionately follows the Arkansas Razorbacks football,
    St. Louis Cardinals baseball, and the local Sherwood Soccer Club, while occasionally joining pick‑up basketball games at the community center.
  arts: Leslie Ellis immerses themselves in the regional art scene by attending openings at the Arkansas Arts Center and festivals featuring folk artist John Garmon, while also drawing inspiration from
    global creators like Ai Weiwei, Olafur Eliasson, and musicians Bon Iver and Sharon Van Etten, and they channel this eclectic taste into a personal blog that explores creative coding.
  travel: Leslie Ellis prefers spontaneous, road‑trip style travel, having recently explored Asheville’s Blue Ridge vistas, Austin’s SXSW culture, and Lisbon’s vibrant street‑art neighborhoods, and they
    dream of returning to Kyoto’s tranquil gardens and visiting the digital art museum in Helsinki, balancing limited vacation days with a modest travel budget.
  culinary: Leslie Ellis enjoys experimental cooking, frequently whipping up homemade kimchi, Thai green curry with lemongrass, and a Southern twist on shrimp and grits flavored with harissa, and they love
    working with sumac, miso, and smoked paprika while a modest sous‑vide setup sits next to a well‑worn cast‑iron skillet.
  core: Leslie Ellis blends tech‑savvy development, artistic curiosity, and Southern‑rooted hospitality into a spontaneous yet purposeful life, marked by a love of immersive digital art, outdoor adventure,
    and a quiet rebellion against rigid structure.
background:
  cultural: Leslie grew up in a suburban community in the American South, raised in a Protestant household that emphasized community service and modesty. Her family valued education and entrepreneurship,
    encouraging her to pursue a business degree before entering tech. Living in Sherwood, AR, she reflects the region’s appreciation for outdoor recreation, local art festivals, and Southern hospitality.
    While she identifies with mainstream white American culture, she actively seeks diverse artistic perspectives, incorporating both regional folk traditions and contemporary global art into her personal
    and professional life.
attributes:
  skills: '["Full‑stack development (JavaScript, React, Node.js, Python, Django)", "API design and integration", "Data visualization (D3.js, Tableau)", "Cloud services (AWS, serverless architecture)", "Business
    analysis and market research", "UI/UX design with artistic focus", "Rapid prototyping and proof‑of‑concept creation", "Agile teamwork and small‑group collaboration"]'
  hobbies: '["Digital illustration and Procreate art", "Photography of Arkansas nature", "Experimental cooking", "Reading speculative fiction", "Blogging about creativity and tech", "Spontaneous sketching
    and journaling", "Acoustic guitar playing", "Small‑group board game nights"]'
  career_goals: Leslie aims to transition into a lead developer or product‑architect role where she can steer the creation of tech‑driven artistic experiences, such as interactive installations or immersive
    AR galleries. She aspires to bridge her business acumen and creative coding skills to launch a startup that offers digital platforms for independent artists to showcase and monetize their work. Over
    the next five years, she plans to deepen her expertise in human‑centered design, gain exposure to mixed‑reality development, and strengthen her project‑management discipline so she can lead small, innovative
    teams while maintaining the flexibility she values.
