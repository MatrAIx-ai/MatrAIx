persona_description: Rachel Riddiford, a highly skilled and experienced clinical dietitian and eating disorder specialist at Dayton Children's Hospital, has dedicated her career to helping individuals struggling
  with eating disorders. She has extensive knowledge and expertise in the field, having completed her degree in dietetics at Western Michigan University, her Master's degree at the University of Dayton,
  and her dietetic internship at Indiana University/Purdue University. Rachel has been employed at Dayton Children's since 2004 and is currently the Manager of Clinical Dietetics and an eating disorder
  specialist in the Nutrition Clinic. She is well-versed in the latest research and treatment protocols for eating disorders and has helped many patients overcome their struggles. Rachel's expertise and
  compassionate approach make her a valuable resource for families and healthcare professionals looking to support individuals with eating disorders.
