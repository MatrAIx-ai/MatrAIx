persona_description: A nature enthusiast who is interested in tracking and documenting the impact of climate change on various species. They are particularly interested in the impact of rising sea temperatures
  on jellyfish populations and the Long-Tailed Blue butterfly, as well as the decline of other butterfly species. They are also interested in the decline of insect populations and the impact of weather
  patterns on the breeding success of barn owls and the Arctic & Sandwich Terns. They are also interested in the impact of climate change on the Farne Islands, where they witnessed a terrible breeding season
  for the Farne Islands' most important seabird colony, the puffins.
