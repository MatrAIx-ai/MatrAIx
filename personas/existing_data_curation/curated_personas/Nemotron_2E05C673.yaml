  hobbies: '[''Visiting art museums'', ''Attending theater performances'', ''Pottery and watercolor workshops'', ''Experimenting with global recipes'', ''Herb gardening'', ''Food photography'', ''Hiking
    in Forest Park'', ''Yoga practice'', ''Volunteering at community kitchen'']'
  career_goals: Mary aims to move into a regional operations director role within the hospitality sector, overseeing multiple venues while integrating sustainable and artistic elements into dining experiences.
    She also aspires to launch an independent boutique restaurant that blends science‑based nutrition with avant‑garde presentation, and to mentor young women pursuing careers at the intersection of STEM
    and culinary arts. Additionally, she seeks a healthier work‑life balance by implementing stress‑management practices and cultivating personal resilience.
