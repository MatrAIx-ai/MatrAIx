  career_goals: Arthur aims to move into a supervisory role, such as fleet supervisor or transportation manager for the City of Madison, where he can oversee driver recruitment, safety protocols, and route
    efficiency. He plans to earn the Certified Transportation Manager (CTM) credential and to integrate telematics and mobile‑app technology to improve rider experience. A core ambition is to develop community
    outreach programs that provide low‑cost transportation for seniors, veterans, and people with disabilities, potentially launching a nonprofit that combines mobility services with cultural enrichment,
    like guided art tours on a dedicated vehicle. Long‑term, he hopes to mentor the next generation of drivers, emphasizing compassionate, patient‑focused service.
