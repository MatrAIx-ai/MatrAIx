persona_description: A historian who is particularly interested in the reigns of Fyodor III and Peter the Great, and the political and social changes they brought to Russia. They are knowledgeable about
  the reforms implemented during their reigns, such as the forced burning of family records and the establishment of the system of precedence within the nobility. They are also interested in the personal
  lives of the monarchs, such as their marriages and children. They are interested in the impact of these reforms on Russian society and the role of the church in the country.
