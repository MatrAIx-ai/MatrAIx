  hobbies: '[''Youth Baseball Coaching'', ''Community Gardening'', ''St. Louis Cardinals Fan'', ''Technology & True‑Crime Podcasts'', ''Yoga'', ''Hiking'', ''Weekend Road Trips'', ''Local History Exploration'']'
  career_goals: Richard aims to transition from a senior HR specialist role to an HR director position within the next three years, focusing on strategic workforce planning and employee well‑being initiatives.
    He wants to champion mental‑health programs and flexible work policies that reflect his belief in balancing curiosity with practicality. Mentoring the next generation of HR practitioners and eventually
    consulting for mid‑size firms on culture transformation are also long‑term aspirations as he approaches retirement.
