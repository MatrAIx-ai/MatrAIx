personas:
  professional: Norma Wallis, a 17‑year‑old aspiring automotive technician, combines her hands‑on repair knack with a structured, competitive mindset honed on the soccer field and in strategic video games,
    aiming to earn her GED and secure an apprenticeship at a local shop.
  sports: Norma Wallis plays midfield for the West Chester youth soccer league, cheers for the Philadelphia Eagles and Chicago Bulls, and supplements team drills with weekend trail runs in the nearby countryside
    to stay agile and fit.
  arts: Norma Wallis captures street‑level shots of abandoned barns and nature scenes during hikes, shares them on TikTok set to The Rolling Stones and Dua Lipa, and occasionally attends indie film nights
    at the community center for creative inspiration.
  travel: Norma Wallis favors short, budget‑friendly trips, has taken day excursions to Gettysburg and a weekend road‑trip to New York City, and dreams of a future cross‑country ride through the Pacific
    Northwest to explore bike‑friendly towns.
  culinary: Norma Wallis loves quick‑cook dishes like garlic‑butter shrimp pasta, chicken quesadillas, and homemade ramen, experiments with sriracha‑infused sauces, and creates 60‑second TikTok recipe videos
    featuring avocado, cherry tomatoes, and cilantro.
  core: Norma Wallis blends a competitive spark from soccer and gaming with a practical DIY mindset, balancing social energy and solitary creativity while juggling a knack for quick fixes and a tendency
    to procrastinate on long‑term plans.
background:
  cultural: Norma was raised in a middle‑class, white family with deep roots in the Chester County area, tracing ancestry to Irish and German immigrants who settled in the region centuries ago. The family
    values hard work, modesty, and community involvement, reflecting both the broader American suburban culture and the lingering Pennsylvania Dutch influence of the surrounding countryside. She grew up
    celebrating traditional holidays like Thanksgiving and Fourth of July with family barbecues, attending local farmer’s markets, and participating in county fairs where crafts and home‑grown foods are
    showcased. While she embraces mainstream teen culture—social media, pop music, and video games—her upbringing also instilled a respect for practical skills, self‑reliance, and a close‑knit neighborhood
    ethos.
