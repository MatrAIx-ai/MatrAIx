  career_goals: Norma’s immediate goal is to earn her GED within the next year, giving her a concrete credential that will open doors to vocational training. She is drawn to careers that combine clear,
    repeatable tasks with a degree of hands‑on problem solving, such as automotive technology or culinary arts. She hopes to enroll in a local trade apprenticeship for automotive technician work, where
    she can earn certifications and eventually become a certified mechanic at a reputable shop in Chester County. In the longer term, she dreams of owning a small, community‑focused auto‑repair or bike‑maintenance
    shop, where she can apply her practical skills, compete for excellence, and provide reliable service to neighbors. If her interests shift, she also sees herself pursuing a culinary certification to
    work as a line cook in a bustling kitchen, valuing the structured environment and immediate results of food preparation.
