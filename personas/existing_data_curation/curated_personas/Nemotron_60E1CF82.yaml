personas:
  professional: Leticia Garcia is a bilingual community mental‑health counselor who blends evidence‑based CBT, motivational interviewing, and solution‑focused brief therapy with culturally resonant stories,
    leveraging their curiosity for new interventions and practical organization to manage caseloads while maintaining an energetic, group‑facilitation style that reflects their competitive drive to achieve
    measurable client outcomes.
  sports: Leticia Garcia is a soccer enthusiast who roots for the LA Galaxy and LAFC, plays in a co‑ed adult league called Gardeña FC on Saturday mornings, complements the game with weekly salsa‑dance fitness
    classes, and approaches personal training with a competitive edge that pushes them to track mileage on a running app.
  arts: Leticia Garcia immerses themselves in creative expression by attending local art gallery openings featuring contemporary Latin American painters, listening to the rhythmic storytelling of Carlos
    Vives and Shakira during cooking sessions, and finding inspiration in Frida Kahlo’s resilience and Oscar Isaac’s performances, which inform their therapeutic narratives.
  travel: Leticia Garcia prefers structured yet spontaneous travel, planning weekend getaways to coastal Big Sur for surf and sunrise hikes, while allocating annual vacations to explore the traditions of
    Antigua Guatemala and Tikal, balancing adventurous sightseeing with family reunions and modest budgeting.
  culinary: Leticia Garcia enjoys cooking hearty pupusas stuffed with cheese and loroco, steaming tamales wrapped in banana leaves, and preparing yuca con chicharrón with fresh cilantro and lime, demonstrating
    a confident home‑cook level that blends traditional spices with occasional experimental sauces for family gatherings.
  core: Leticia Garcia navigates life with an organized curiosity, channeling competitive energy into community counseling, while habitually juggling salsa playlists, budget spreadsheets, and a watchful
    eye on blood pressure, occasionally over‑committing to volunteer events at the cost of sleep.
background:
  cultural: Leticia grew up in a close‑knit Salvadoran immigrant community in Gardena, California. Bilingual and deeply rooted in family‑centered values, she celebrates Salvadoran traditions such as Día
    de la Independencia, Las Posadas, and traditional culinary customs. Her upbringing blends Catholic influences with a pragmatic, community‑service ethos, shaping her culturally responsive counseling
    style. She leverages her heritage to build trust with clients, integrating shared cultural references and emphasizing resilience, family cohesion, and collective well‑being.
attributes:
  skills: '["Cognitive Behavioral Therapy", "Motivational Interviewing", "Solution‑Focused Brief Therapy", "Group Facilitation", "Crisis Intervention", "Cultural Competency (Latin American)", "Bilingual
    Counseling (Spanish/English)", "Case Management", "Program Development", "Conflict Resolution", "Active Listening", "Client Advocacy", "Data‑driven Assessment", "Community Outreach"]'
  hobbies: '["Latin dance (Salsa, Bachata)", "Soccer (playing and watching)", "Cooking traditional Salvadoran cuisine", "Volunteering at community health fairs", "Reading contemporary fiction and poetry",
    "Attending local art exhibitions", "Hiking nearby trails", "Practicing yoga for stress management", "Participating in professional development webinars", "Traveling to Central America to connect with
    family roots"]'
  career_goals: Leticia aims to become a Licensed Professional Counselor and eventually a clinical supervisor, overseeing a community mental‑health center that specializes in services for immigrant families.
    She is driven to design and implement culturally responsive mental‑health programs tailored to Salvadoran and broader Latinx populations in Los Angeles County. Long‑term, she envisions opening a private
    practice that integrates telehealth to increase accessibility, while also contributing to policy advocacy for mental‑health equity and teaching at local colleges or training institutes.
