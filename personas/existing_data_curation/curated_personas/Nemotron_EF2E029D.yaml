  career_goals: Krishna aims to transition into a supervisory or consultancy role where he can mentor younger technicians and oversee larger facility operations in Broward County. He plans to earn certifications
    such as the Certified Maintenance & Reliability Professional (CMRP) and pursue specialized training in renewable‑energy and smart‑building technologies. His ambition is to lead green‑maintenance initiatives
    for community centers or senior living facilities, integrating sustainable practices with his strong craftsmanship. Ultimately, he envisions launching a boutique maintenance service that preserves historic
    and artistic building elements while delivering environmentally responsible solutions.
