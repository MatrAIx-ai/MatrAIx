  hobbies: '[''Watercolor Painting'', ''Pottery'', ''Visiting Art Exhibitions'', ''Cooking Mexican Cuisine'', ''Gardening (cacti and herbs)'', ''Reading Historical Novels'', ''Volunteer Guide at Tucson
    Museum of Art'', ''Genealogical Research'', ''Attending Community Cultural Festivals'']'
  career_goals: Although retired from formal employment, Aura aims to continue contributing to the field of education by mentoring retired and early-career teachers, developing intergenerational art-based
    learning programs for seniors, and documenting oral histories of the Mexican-American community in Tucson. She also hopes to author a memoir and a children's storybook that celebrate Mexican heritage
    and to support scholarships for Mexican-American students pursuing teaching degrees.
