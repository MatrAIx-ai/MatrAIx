personas:
  professional: Aura Santos, a retired bilingual educator specialized in multicultural curriculum design, who now mentors teachers and leads intergenerational art learning projects at the Tucson Museum
    of Art, utilizing their organized, methodical approach and love for community storytelling.
  sports: Aura Santos follows the Arizona Diamondbacks baseball team and participates in a senior walking club that meets thrice weekly at Reid Park, enjoys light gardening as a form of exercise, and attends
    weekly low‑impact aqua‑aerobics classes at a community center.
  arts: Aura Santos paints watercolors depicting desert vistas and folk motifs, creates pottery with traditional patterns, curates and leads museum tours for older adults, draws inspiration from artists
    like Frida Kahlo and Diego Rivera, and regularly visits the Tucson Museum of Art’s rotating exhibitions.
  travel: Aura Santos favors road trips to desert destinations such as Sedona and Santa Fe, cherishes the quiet of the New Mexico high desert, dreams of visiting the historic town of Guanajuato, and plans
    trips with detailed itineraries that balance cultural sites with ample rest periods.
  culinary: Aura Santos delights in preparing family‑rooted dishes like mole and tamales, seasoning them with chilies, cacao, and nuts, enjoys growing nopal cactus and herbs for fresh toppings, and holds
    an intermediate skill level that lets them experiment with traditional pastries on weekends.
  core: Aura Santos blends a lifelong passion for art, education, and community service with a meticulous, curiosity‑driven outlook, all while juggling a love of gardening, cooking, and occasional bouts
    of forgetful medication taking.
background:
  cultural: Aura's Mexican heritage is central to her identity. Raised in a bilingual household, she celebrated Dia de los Muertos, quinceaneras, and traditional Catholic holidays, integrating these customs
    into her daily life. After moving to Tucson, she embraced the blend of Mexican and Southwestern cultures, participating in local festivals that showcase Mexican folk music, dance, and cuisine. Her cultural
    background informs her educational philosophy, emphasizing respect for family, community solidarity, and the preservation of Mexican artistic traditions within a diverse American context.
attributes:
  skills: '[''Bilingual Education'', ''Curriculum Development'', ''Lesson Planning'', ''Teacher Mentoring'', ''Community Outreach'', ''Grant Writing'', ''Event Coordination'', ''Public Speaking'', ''Digital
