persona_description: A policy analyst who specializes in analyzing the economic and social impacts of government programs, particularly those related to unemployment insurance. They are knowledgeable about
  the origins and structure of the unemployment insurance system, its justifications, and its economic distortions. They are interested in reform options, such as switching to a system based on personal
  UI savings accounts or devolving UI to the state level, and they have experience in conducting research and evaluating the effectiveness of these options. They are also familiar with the potential benefits
  and drawbacks of each option and are able to weigh the costs and benefits of different approaches to improving the unemployment insurance system.
