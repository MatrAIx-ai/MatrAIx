personas:
  professional: Janie Cobb, a retired retail store owner who now mentors high-school entrepreneurs through the local chamber of commerce, draws on decades of bookkeeping, budgeting, and customer-service
    expertise; they cherish routine but allow occasional flexibility, and they use their personable flair to coordinate church fundraising events and senior-center activities despite a penchant for misplacing
    receipts.
  sports: Janie Cobb enjoys leisurely daily walks along the town's river trail as their primary exercise, cheerfully supports the River Town Rebels baseball team and the Midtown Hawks football squad, and
    they participate in a senior-center bridge and bingo fitness club that mixes mental activity with gentle stretching.
  arts: Janie Cobb sings in the church choir while humming classics by Ella Fitzgerald and Dolly Parton, devours Agatha Christie mysteries at book-club meetings, and they channel creativity into quilting
    projects inspired by textile artist Faith Ringgold, weaving personal flair into every patch.
  travel: Janie Cobb plans biannual visits to their grandchildren in Charleston, South Carolina and Burlington, Vermont, favoring relaxed, family-centered road trips with scheduled stops at historic sites
    and local diners, and they also relish occasional day-long excursions to the nearby state park for picnics and garden inspiration.
  culinary: Janie Cobb delights in baking classic apple and peach pies with a flaky crust, preparing Sunday chicken pot pie using garden-grown carrots and peas, and they often over-sweeten desserts while
    proudly preserving family recipes for future generations.
  core: Janie Cobb blends an unwavering love of routine and community service with a charmingly chaotic habit of misplacing receipts, making them a warm-hearted, socially-engaged octogenarian who keeps
    life lively through choir, quilting, and daily river walks while they constantly greet neighbors with a bright smile.
background:
  cultural: Janie was raised in a Midwestern, small‑town Wisconsin setting, descended from German‑Scandinavian farming families. She grew up in a Lutheran environment that emphasized modesty, hard work,
    and community service. Throughout her life, she has lived in Fond du Lac County, absorbing the region’s practical, neighbor‑focused values while maintaining a strong sense of tradition and local pride.
attributes:
  skills: '["Bookkeeping", "Budget Management", "Cash Handling", "Inventory Control", "Customer Service", "Event Planning", "Public Speaking", "Volunteer Coordination", "Basic Computer Use (Word, Excel)",
