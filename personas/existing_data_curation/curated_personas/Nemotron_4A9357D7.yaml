  hobbies: '["Bingo", "Quilting Circle", "Community Gardening", "Church Choir", "Baking", "Mystery Book Club", "Volunteering at Food Bank", "Bridge", "Walking along River Trail"]'
  career_goals: Although retired, Janie aims to stay actively involved in her community. She plans to mentor high‑school students interested in business through the local chamber of commerce, continue serving
    as treasurer for her church's outreach fund, and help organize senior‑center activities. She also hopes to maintain her health through regular walks and balanced nutrition, preserve family recipes for
    future generations, and travel to visit her grandchildren at least twice a year.
