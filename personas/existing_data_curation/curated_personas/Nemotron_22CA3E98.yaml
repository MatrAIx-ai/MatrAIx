  hobbies: '[''Woodworking'', ''Cooking Puerto Rican cuisine'', ''Salsa and bomba music'', ''Attending cultural festivals'', ''Fishing on Lake Erie'', ''Hiking'', ''Chess'', ''Gym workouts'']'
  career_goals: Bayardo aims to advance to a foreman or site supervisor role within the next few years, completing his associate degree in construction management and obtaining certifications such as OSHA
    30‑Hour and Certified Construction Manager. He is driven to eventually launch his own small contracting business focused on eco‑friendly home renovations for families in Lorain, providing stable income
    for his children and giving back to his community by mentoring younger workers. Achieving these milestones would also reduce his financial worries and give him greater control over his professional
    future.
