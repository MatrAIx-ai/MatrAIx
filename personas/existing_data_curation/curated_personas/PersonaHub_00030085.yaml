persona_description: A scientist who is skeptical of The Ocean Cleanup's project and believes that a more effective solution should be found at its roots. They are concerned about the project's impact on
  marine life and the possibility of entanglement with marine life. They believe that technology should be used as a complement to behavioral education and that the current challenge is not how to clean
  the oceans but how to reduce the amount of plastic that enters them. They are a marine biologist who has experience working with marine life and is aware of the potential risks associated with the project.
