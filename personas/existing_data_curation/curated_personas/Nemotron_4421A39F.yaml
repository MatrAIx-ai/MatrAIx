personas:
  professional: Jon Poolos is a 26‑year‑old diesel and gasoline powertrain technician who balances strict ASE‑grade diagnostics with spontaneous on‑site improvisation, leveraging a talkative, competitive
    demeanor to attract customers, mentor apprentices, and pursue ASE Master and EV specialty certification in preparation for launching a mobile repair business.
  sports: Jon Poolos channels their love of speed and the outdoors into weekend kayaking on the Gulf, dirt‑bike off‑road races with the local Moto Club, and community basketball with the Suncoast Revengers,
    while cheering for the Miami Heat and Tampa Bay Lightning as their favorite professional teams.
  arts: Jon Poolos finds creative expression in customizing their pickup truck with hand‑painted graphics, attending classic car shows, and winding down at waterfront festivals listening to Stevie Ray Vaughan,
    Metallica, and the surf‑rock tunes of Jack Johnson, making art a lively backdrop to their social life.
  travel: Jon Poolos prefers spontaneous, road‑trip adventures that blend water and speed, often renting a boat to explore the Florida Keys, planning a future off‑road excursion in Patagonia, and booking
    relaxing beach stays in the Bahamas whenever the mobile repair schedule allows.
  culinary: Jon Poolos enjoys grilling fresh grouper tacos with lime‑marinated cilantro, smoking brisket on their truck’s custom grill, and indulging in key‑lime pie after a day on the water, while their
    cooking skill sits at confident home‑chef level, confidently seasoning with smoked paprika and cayenne.
  core: Jon Poolos is a charismatic, competition‑driven mechanic who balances structured diagnostics with spontaneous improvisation, thrives on social energy, invests heavily in tools and future business,
    and lives with a resilient, low‑stress outlook that masks a tendency to overlook organization.
background:
  cultural: Jon grew up in a middle‑class family in the Charlotte County area, where Southern hospitality and a relaxed coastal lifestyle are woven into daily life. His upbringing reflects a blend of traditional
    Floridian values—outdoor recreation, a strong work ethic, and community involvement—combined with the region's growing multicultural influences, especially the vibrant Hispanic presence that enriches
    local food, music, and festivals. He identifies with a broadly American cultural framework while embracing the laid‑back, sun‑driven rhythm of Southwest Florida.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Hydraulic system repair'', ''Electrical wiring and troubleshooting'', ''Mobile equipment installation'', ''Welding and metal fabrication'', ''Preventive maintenance
    planning'', ''Customer communication and service'', ''Team leadership'', ''Problem solving under pressure'', ''Inventory management'']'
  hobbies: '[''Boating and fishing'', ''Dirt‑bike riding and off‑road racing'', ''Car shows and vehicle customization'', ''Community basketball leagues'', ''Racing video games'', ''Youth mentorship in automotive
    trades'']'
  career_goals: Jon aims to earn ASE Master Technician certification and add an advanced EV (electric vehicle) specialty badge within the next two years, positioning himself as a go‑to expert for both traditional
    and emerging powertrains. He envisions eventually opening his own mobile repair service that offers on‑site maintenance for boats, RVs, and fleet vehicles across Southwest Florida, giving him the flexibility
    he craves while providing a structured, reputable business model. Alongside this, he hopes to become a trainer for apprentices, leveraging his sociable nature to teach practical skills and foster a
    competitive yet collaborative culture in the trade.
