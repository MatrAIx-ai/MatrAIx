personas:
  professional: Michelle Lavoie is a budding young scientist in her middle school, who leads the science club's weekly experiments with meticulous planning, using her love for order to design step‑by‑step
    investigations and document results in her daily journal.
  sports: Michelle Lavoie is an active member of the Rockaway Beach junior swim team and plays on the local beach volleyball club, the Sand Spikers, where she practices three times a week, balances her
    training with school, and idolizes Olympic swimmer Katie Ledecky and volleyball star Jordan Larson.
  arts: Michelle Lavoie enjoys building intricate LEGO models while listening to classical pianist Ludovico Einaudi, reads mystery series by Enid Blyton and J.K. Rowling, and after school she practices
    piano pieces by Mozart, finding the structured melodies soothing to her organized mind.
  travel: Michelle Lavoie loves weekend trips to nearby destinations like the historic lighthouse at Montauk and the aquarium in Brooklyn, dreams of a future family vacation to the rocky shores of Maine,
    and plans each outing with a handwritten checklist to ensure she never forgets her snorkel gear or her favorite mystery novel for the car ride.
  culinary: Michelle Lavoie prefers simple yet satisfying foods such as margherita pizza with fresh basil, fish tacos with lime‑infused salsa, and homemade mac and cheese, often cooking with her mother
    while meticulously following recipes and measuring ingredients to the gram, though she secretly adds extra chocolate chips to cookie dough when no one is watching.
  core: Michelle Lavoie blends a love for orderly routines with a curious spirit, balancing structured school projects, organized beach sports, and secret indulgences like extra chocolate chips, all while
    caring deeply for friends and community.
background:
  cultural: Michelle comes from a French‑Canadian family; her grandparents emigrated from Quebec to New York in the 1970s, and her household retains occasional French phrases and culinary traditions like
    tourtière and maple‑flavored treats. Growing up in Rockaway Park, Queens, she experiences a coastal New York culture that values community gatherings, beach recreation, and local festivals. This blend
    of French‑Canadian heritage and the diverse, seaside environment of Queens shapes her worldview, fostering respect for multiculturalism while maintaining strong family customs and a close‑knit neighborhood
    identity.
