  career_goals: Michelle aspires to become an elementary school teacher. She envisions using her love for structure, reliability, and caring nature to create supportive, well‑organized classrooms where
    students feel safe and motivated. She plans to focus on math and science in middle and high school, earn a degree in education, and eventually work in a public school within Queens, giving back to the
    community that raised her. Her long‑term ambition includes mentoring younger students and possibly developing after‑school programs that blend learning with hands‑on activities.
