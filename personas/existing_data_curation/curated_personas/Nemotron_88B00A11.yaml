personas:
  professional: Monica Houston, a seasoned audiovisual specialist with three decades of low‑voltage wiring, networked signal routing, and Certified Technology Specialist credentials, they channel their
    organized, methodical mindset into designing custom AV solutions for churches, schools, and community centers while mentoring emerging technicians.
  sports: Monica Houston enjoys hiking the trails of the nearby Lake Louisa State Park and plays in a senior pickleball league at the community center, they cheer for the Orlando Magic and Tampa Bay Rays,
    and maintain a weekend routine of morning yoga to balance their love of movement with a disciplined fitness regimen.
  arts: Monica Houston captures the vibrancy of her neighborhood through digital photography inspired by Gordon Parks, they attend independent film screenings of directors like Ava DuVernay and Barry Jenkins,
    volunteer as lighting and sound manager for the local community theater, and sing gospel harmonies in the church choir alongside favorites like Mahalia Jackson and contemporary artist Alicia Keys.
  travel: Monica Houston prefers thoughtfully planned road trips that blend cultural immersion and relaxation, they have explored Savannah’s historic squares, New Orleans’ jazz scene, and a week‑long heritage
    tour of Charleston, while dreaming of a future pilgrimage to the historic plantations of Louisiana and a visit to Kyoto’s autumn foliage gardens.
  culinary: Monica Houston loves cooking Southern-inspired dishes such as shrimp and grits with smoked paprika, collard greens simmered with ham hocks, sweet‑potato pie flavored with nutmeg and pecans,
    and they often experiment with fresh thyme, garlic, and andouille sausage, while occasionally treating themselves to a gourmet French‑style croissant from a downtown bakery.
  core: Monica Houston blends razor‑sharp technical precision with a soulful love of community storytelling, balancing relentless project perfectionism with a habit of double‑checking every cable long after
    the deadline, and they find peace in evening garden walks where they reflect on the intersection of faith, art, and emerging tech.
background:
  cultural: Monica is an African‑American woman whose roots trace back to the Great Migration, with grandparents who settled in the South during the mid‑20th century. Growing up in a close‑knit community
    in Central Florida, she was raised on the values of resilience, faith, and storytelling that are central to Southern Black culture. Church gatherings, soulful music, and family reunions have been foundational
    in shaping her identity. She carries forward traditions of Southern cuisine, oral history, and community service, often integrating these cultural elements into her professional life—such as tailoring
    AV solutions for local churches and cultural events. Her lived experience navigating a traditionally male‑dominated trade has fostered a strong sense of self‑advocacy and a commitment to mentoring the
    next generation of diverse technicians.
attributes:
  skills: '["AV system installation", "Audio and video equipment repair", "Low-voltage wiring", "Network configuration", "Troubleshooting and diagnostics", "Project planning and coordination", "Technical
    documentation", "Customer service", "Training and mentorship", "Safety compliance"]'
  hobbies: '["Attending local art exhibitions", "Digital photography", "Community theater volunteering", "Church choir participation", "Gardening", "Cooking Southern cuisine", "Reading historical biographies",
    "Exploring smart home technology", "Hiking in nearby nature preserves", "Playing board games with friends"]'
  career_goals: Monica aims to transition into a senior consulting role where she can leverage her extensive field experience to design custom AV solutions for faith‑based organizations, schools, and community
    centers in Central Florida. She plans to attain the highest level of CTS certification, build a boutique consultancy that emphasizes meticulous project management, and become a recognized trainer for
    upcoming technicians. Additionally, she hopes to stay at the forefront of emerging immersive media technologies—such as streaming platforms and remote‑monitored AV systems—so she can guide local venues
    in adopting innovative solutions while preserving her work‑life balance for retirement planning.
