persona_description: A conservation biologist who specializes in the study of plant and animal species in Kosovo, particularly focusing on the effects of human activities on their distribution and survival.
  This individual is knowledgeable about the impact of agriculture, burning, and grazing on the oak-dominated forests in Kosovo, and is interested in the effects of illegal construction on the fragile Alpine
  and sub-alpine ecosystems. This person is also interested in the impact of air pollution on the health of the population and the potential for species extinction in Kosovo.
