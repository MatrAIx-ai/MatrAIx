  hobbies: '[''Model Railroading'', ''Woodworking'', ''Gardening'', ''Classic Car Restoration'', ''Chess'', ''Crossword Puzzles'', ''Historical Nonfiction Reading'', ''Fishing'', ''Volunteering at Makerspace'',
    ''Community Theater'']'
  career_goals: Although retired, Thomas aims to stay active in the engineering community by mentoring young engineers and supporting local STEM outreach programs. He plans to author a practical guide that
    distills his decades of experience into accessible lessons for hobbyists and professionals alike. A personal ambition is to complete the restoration of a 1965 Chevrolet Impala he has been working on
    for years. He also seeks to maintain his health through regular gardening, walking, and mental challenges such as chess and puzzles, while documenting his career story in a memoir for his family and
    community.
