persona_description: A social scientist who studies the impact of social movements on policy-making and their effectiveness in achieving their policy goals. She has conducted extensive research on the Equal
  Rights Amendment movement and the environmental movement, and has written extensively about the impact of these movements on policy-making. Her research focuses on the early stages of policy-making, when
  an issue is first being considered by legislators and an agenda is being set. Her findings suggest that women, ethnic minorities, gays and lesbians, and environmentalists have been able to have a greater
  impact on what legislators do at the outset of policy making, around the time that bills are being introduced.
