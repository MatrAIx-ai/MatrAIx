personas:
  professional: Joanna Kelley, an 88-year-old retired arts educator, now volunteers as a docent at Sarasota's Ringling Museum, using their deep knowledge of American regional painting to craft engaging
    tours for seniors and assertively organize weekly art workshops that blend watercolor, crochet, and storytelling, reflecting their curious yet organized approach to community engagement.
  sports: Joanna Kelley keeps fit by strolling along the Gulf beach at sunrise, participating in a low-impact senior yoga class, and cheering on the Tampa Bay Buccaneers and the Miami Heat, while they avoid
    high-intensity sports due to joint pain, yet remain engaged with a local walking club that meets twice weekly.
  arts: Joanna Kelley immerses themselves in Sarasota's cultural scene, frequenting the Ringling Museum to study works by Winslow Homer and Georgia O'Keeffe, painting watercolor coastal landscapes inspired
    by Monet's light, attending classical concerts featuring Beethoven and jazz nights spotlighting Miles Davis, and regularly contributing to local theater productions, reflecting their curious yet organized
    love of the arts.
  travel: Joanna Kelley prefers leisurely road trips that combine art pilgrimages to Santa Fe, a week-long Mediterranean cooking class in Sicily, and sun-soaked stays on Florida's Gulf islands, planning
    each itinerary with a balanced mix of scheduled museum visits and spontaneous bird-watching mornings, while they keep budget constraints modest given a fixed retirement income.
  culinary: Joanna Kelley experiments with fresh herbs from their garden to create herb-infused grilled shrimp, key-lime cheesecake, and Mediterranean ratatouille, balancing traditional Floridian flavors
    with a growing interest in Greek olive oil and oregano, yet they sometimes over-salt dishes in the excitement of new recipes.
  core: Joanna Kelley is an 88-year-old curious, organized art lover who balances community volunteering, gardening, and watercolor painting with a habit of misplacing glasses and overwatering plants.
background:
  cultural: Born in 1937 in Dayton, Ohio, Joanna grew up in a modest, middle‑class Protestant family that emphasized education, community service, and respect for tradition. The post‑World War II era and
    the cultural shifts of the 1960s nurtured her curiosity and openness to new ideas. Relocating to Sarasota in the early 1980s, she embraced the city’s vibrant ‘Cultural Coast’ scene, including the Ringling
    Museum of Art, Asolo Repertory Theatre, and numerous art festivals. Her background blends Midwestern values of self‑reliance and modesty with the relaxed, multicultural atmosphere of Florida’s Gulf
    Coast, informing her appreciation for both classic and contemporary artistic expressions while remaining rooted in a lifelong commitment to family, community, and lifelong learning.
