    work'']'
  career_goals: Although retired from formal employment, Joanna aims to deepen her role as a volunteer docent at Sarasota’s Ringling Museum, using her art knowledge to guide visitors and develop interpretive
    programs for older adults. She aspires to publish a family memoir that weaves together personal history with broader mid‑century American cultural narratives. Joanna plans to launch a weekly senior
    art workshop that blends painting, craft, and storytelling, fostering intergenerational creativity. She also hopes to continue lifelong learning by taking advanced studio art classes, exploring Mediterranean
    cooking, and studying genealogy to preserve her family’s heritage. Ultimately, her ambition is to enrich her community’s cultural life while staying active, healthy, and intellectually engaged.
