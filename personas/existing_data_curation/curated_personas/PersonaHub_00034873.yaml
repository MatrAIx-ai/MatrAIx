persona_description: A CPR and AED instructor who emphasizes the importance of CPR training for the community and encourages everyone to be trained in CPR. They believe that early, high-quality compressions
  and defibrillation are the two factors that increase the odds for survival from cardiac arrest. They also mention that police vehicles now have AEDs as standard equipment and that the use of AEDs makes
  a huge difference in survivability.
