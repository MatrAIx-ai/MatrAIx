  career_goals: At 73, William aims to stay professionally engaged by transitioning to a part‑time consulting role where he can help small local businesses streamline their financial processes. He is working
    toward completing his CPA certification to formalize his expertise and plans to mentor a cohort of young accountants through a community college internship program. Additionally, he hopes to develop
    a series of free workshops on personal finance for seniors in Annapolis, leveraging his accounting background to give back to his community.
