persona_description: A scientist who specializes in the study of viruses, particularly those that infect hyperthermophilic archaea. His research interests include the structure and function of membrane
  envelopes in viruses and the potential applications of these envelopes in nanomedicine. He is particularly interested in the unique lipid envelope of the Acidianus hospitalis Filamentous Virus 1, which
  he has unlocked the secrets of. His work has received backing from the US National Institutes of Health and the French National Research Agency.
