persona_description: A philosopher or historian who is interested in the philosophical and historical development of the concept of conscience, particularly in the context of the 5th century BCE to the
  present. They are likely to be familiar with the works of philosophers such as Aristotle, Plato, and Kant, as well as the works of theologians and political thinkers like St Paul, the Church Fathers,
  and the eighteenth to twentieth-century political thinkers. They may also be interested in the contemporary debates surrounding topics such as conscientious objection, the force of conscience, and the
  balance between freedoms of conscience, religion, and speech.
