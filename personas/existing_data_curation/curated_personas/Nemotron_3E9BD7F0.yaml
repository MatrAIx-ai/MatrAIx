personas:
  professional: Joey Harrelson, a 29‑year‑old interdisciplinary humanities educator, blends art history, cultural studies, and creative writing into active‑learning undergraduate courses, leveraging their
    curiosity and sociable energy to foster collaborative classroom environments while balancing meticulous curriculum design with the flexibility of experimental pedagogy.
  sports: Joey Harrelson maintains fitness by hiking Sand Ridge State Forest trails, playing pick‑up basketball with friends, attending Chicago Cubs baseball games and Chicago Fire soccer matches, participating
    in the Normal Running Club’s weekend 5K runs, and practicing yoga to counterbalance a desk‑heavy teaching schedule.
  arts: Joey Harrelson immerses in the arts as a docent at the Normal Fine Arts Center, strums acoustic guitar in a folk‑rock trio covering Bob Dylan and Sufjan Stevens, curates strategy‑heavy board‑game
    nights, and draws inspiration from the works of Georgia O'Keeffe, Kehinde Wiley, and contemporary installations at the Art Institute of Chicago.
  travel: Joey Harrelson balances a modest travel budget with a thirst for cultural immersion, meticulously mapping museum visits in Paris and Florence while leaving room for impromptu coffee‑house jams,
    eagerly anticipating a spring excursion to Prague’s Bohemian art scene and a weekend getaway to Chicago’s vibrant street‑mural districts.
  culinary: Joey Harrelson, an intermediate home chef, experiments with fermentation by crafting sourdough starters, kimchi, and kombucha, delights in pairing goat cheese crostini with fresh rosemary and
    figs, and frequently sources seasonal heirloom tomatoes and carrots from the local farmers market for rustic, farm‑to‑table meals.
  core: Joey Harrelson is a curiosity‑driven educator who juggles relentless community involvement with occasional impulsive art‑supply splurges and a habit of forgetting to water houseplants during grading
    marathons.
background:
  cultural: Raised in a middle‑class, white family in central Illinois, Joey grew up in a community that valued education, civic participation, and modest cultural engagement. His parents encouraged reading,
    museum trips, and participation in school theater, which fostered his early appreciation for the arts. Though his upbringing was rooted in Midwestern Protestant traditions, his university experience
    broadened his worldview, leading him to embrace diverse artistic expressions and collaborative community projects. This blend of small‑town practicality and openness to cultural diversity shapes his
    identity and professional outlook.
attributes:
