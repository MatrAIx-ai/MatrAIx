  hobbies: '[''Visiting Art Galleries and Museums'', ''Playing Acoustic Guitar'', ''Improv Theater'', ''Hiking'', ''Fermentation Cooking'', ''Traveling to Artistic Destinations'', ''Board Game Hosting'',
    ''Mentoring High‑School Art Club'']'
  career_goals: Over the next five years Joey aims to secure a tenure‑track associate professor position and achieve tenure at his institution. He plans to develop a new interdisciplinary major that bridges
    visual arts, sociology, and environmental studies, and to publish a monograph on the role of contemporary art in shaping community identity. He seeks to obtain a multi‑year grant to support a community‑based
    mural project in Normal, Illinois, and to expand his leadership role within the department by heading a faculty learning community focused on innovative teaching practices.
