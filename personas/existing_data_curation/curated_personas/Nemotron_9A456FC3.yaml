  hobbies: '[''Community festival participation'', ''Cooking traditional Mexican dishes'', ''Gardening'', ''Reading historical fiction'', ''Volunteer work at local community center'', ''Church choir singing'',
    ''Walking groups with friends'', ''Traveling to visit family in Mexico'']'
  career_goals: Tania aims to channel her extensive supervisory expertise into developing a regional training program for emerging retail leaders, targeting the company’s "Mentor of the Year" accolade.
    She also seeks to elevate her current store to "Store of the Year" status by boosting sales performance and fostering high employee engagement. Looking beyond the corporate environment, she envisions
    launching a small boutique that showcases Mexican culinary products and handcrafted goods, allowing her to stay connected to her heritage while mentoring younger entrepreneurs. While planning a gradual
    transition toward retirement, she is committed to establishing a clear succession plan that ensures continuity for her team.
