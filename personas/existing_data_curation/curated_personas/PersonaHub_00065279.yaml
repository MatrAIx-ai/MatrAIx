persona_description: A researcher and scientist who is interested in the digital annotation of data and the use of controlled vocabularies and ontologies for crop-related concepts. They are familiar with
  the Integrated Breeding Platform (IBP) and its services, including the CO, a service of the IBP for crop breeders to manage their plant breeding programmes, obtain support and professional services, find
  new knowledge, access training resources, and discuss pertinent issues with their peers in various communities of practice. They are also interested in the use of ontology terms to describe agronomic
  phenotypes and the accurate mapping of these descriptions into databases, which is important in comparative phenotypic and genotypic studies across species and gene-discovery experiments. Additionally,
  they are involved in the development of the Agronomy Ontology (AgrO) and the creation of the breeders' fieldbooks of the BMS. They are also interested in the pilot project Agroportal developed by LIRRM,
  IRD, and Bioversity.
