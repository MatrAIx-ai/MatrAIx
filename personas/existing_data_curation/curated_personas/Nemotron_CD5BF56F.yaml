  career_goals: Although retired from full‑time employment, Frank aims to stay intellectually engaged and contribute to his community. He aspires to serve on the board of a local cultural nonprofit, organize
    intergenerational art workshops, mentor younger volunteers in organizational skills, and possibly publish a memoir reflecting on his career and personal journey. He also seeks to maintain his health
    and reduce stress through low‑intensity volunteering and regular participation in community events, while continuing to explore new artistic mediums.
