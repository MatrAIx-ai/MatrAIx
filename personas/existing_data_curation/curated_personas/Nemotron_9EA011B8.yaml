    and woodworking'']'
  career_goals: Akhtar aspires to turn his love of building and problem‑solving into a career that benefits his community. His immediate goal is to graduate high school and enroll in a vocational‑technical
    program to become an electrician or a certified tradesperson, allowing him to apply his hands‑on skills while earning an income. In the longer term, he hopes to study civil or environmental engineering
    at a state university, focusing on sustainable infrastructure projects that address the unique challenges of rural Appalachia, such as bridge maintenance, flood mitigation, and renewable energy integration.
    He also aims to mentor younger students in his town through after‑school clubs, sharing his practical knowledge and encouraging a culture of curiosity.
