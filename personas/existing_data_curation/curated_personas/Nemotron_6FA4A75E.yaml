  career_goals: Brian aims to transition into a selective consulting practice that allows him to work on meaningful, low‑volume projects for local businesses and community organizations, preserving his
    preference for solitude and flexible scheduling. He is motivated to mentor emerging designers, sharing his blend of curiosity and practicality through workshops and one‑on‑one coaching. Brian also wants
    to author a short book or series of essays on design philosophy that balances innovative thinking with real‑world constraints, contributing to the broader design discourse. Exploring sustainable design
    practices and integrating generative‑AI tools into his workflow are high on his list, as is curating a small exhibition of his photographic work that reflects the Pacific Northwest’s natural beauty.
    Ultimately, he seeks a balanced semi‑retirement that keeps him creatively engaged while reducing the pressure of full‑time obligations.
