personas:
  professional: Brenda Heath, a retired educator and curriculum specialist, they channel decades of classroom and administrative experience into mentoring emerging teachers, designing intergenerational
    literacy workshops, and spearheading oral-history projects that capture the stories of elders in their neighborhood.
  sports: Brenda Heath, a regular participant in the Treme Seniors Walking Club, they enjoy low-impact morning walks in City Park and attend weekly water-aerobics at the community center, cheer on the New
    Orleans Saints during football season, and occasionally join a senior bowling league at the historic French Quarter lounge.
  arts: Brenda Heath, an avid patron of New Orleans's vibrant arts scene, they attend intimate performances by the Preservation Hall Jazz Band, collect prints by contemporary portraitist Kehinde Wiley,
    and spend evenings crocheting patterns inspired by the colorful tapestries of Mardi Gras Indian costumes while reading art journals featuring Jean-Michel Basquiat and Ellsworth Kelly.
  travel: Brenda Heath, who prefers carefully planned, low-stress trips, they have revisited the historic French Quarter and taken a relaxed river cruise to Savannah, while long-standing dreams include
    a cultural pilgrimage to Montreal's Jazz Festival and a leisurely visit to the coastal town of St. George Parish to sample fresh seafood.
  culinary: Brenda Heath, a seasoned home cook specializing in Creole cuisine, they expertly prepare gumbo with okra, andouille sausage, and file powder, whip up classic jambalaya with shrimp and thyme,
    and delight grandchildren with beignets dusted in powdered sugar, yet they habitually taste dishes before seasoning, often adding a pinch of cayenne out of habit.
  core: Brenda Heath, a curious yet methodical 87-year-old who melds a love of jazz, oral history, and meticulous planning, they tend to over-schedule their afternoons, forget where they placed their reading
    glasses, but always finish a crocheted blanket before the sun sets.
background:
  cultural: Brenda is an African-American woman born and raised in New Orleans, deeply rooted in the city’s Creole-Black heritage. She grew up attending historic Black churches, participated in Mardi Gras
    Indian traditions, and was shaped by the civil-rights movement of the 1960s. Her family’s cuisine, music, and storytelling traditions reflect a blend of African, French, and Caribbean influences that
    permeate New Orleans culture. She values the communal spirit of the Treme neighborhood, the richness of jazz and blues, and the legacy of community activism that has long defined the Black experience
    in the city.
