  career_goals: Although retired, Brenda aims to continue sharing her knowledge by mentoring aspiring teachers, contributing to a community oral-history archive, and advising local arts-education programs.
    She hopes to publish a memoir of her experiences growing up in New Orleans during the civil-rights era, and to organize a small intergenerational art exhibit that highlights the city’s Black cultural
    heritage. She also aspires to maintain her independence and health while remaining an active participant in her church and neighborhood cultural workshops.
