personas:
  professional: Donnye Facey is a budding block architect, turning everyday LEGO bricks into miniature cityscapes, channeling boundless curiosity, a relaxed approach to rules, and an energetic social style
    that transforms playdates into collaborative design workshops.
  sports: Donnye Facey loves toddler gymnastics classes, splashing in the community pool during summer, plays on the Tiny Tots Soccer Club, and proudly waves a tiny Chicago Cubs flag whenever a game flashes
    on the family TV.
  arts: Donnye Facey delights in watching Sesame Street, singing along to The Wiggles’ Hot Potato, and drawing colorful Paw Patrol characters, while occasionally humming the Pixar Toy Story soundtrack during
    car rides.
  travel: Donnye Facey enjoys family road trips to the local farm and a weekend zoo visit in San Diego, and dreams of giggling on a beach in Bali, balancing parent‑planned itineraries with a love for spontaneous
    playground stops.
  culinary: Donnye Facey prefers soft banana slices, cheesy macaroni and cheese, chicken nuggets lightly seasoned with paprika, and loves dipping apple wedges into peanut butter, but they rarely touch broccoli
    unless it’s hidden in a cheesy casserole.
  core: Donnye Facey is a relentlessly curious two‑year‑old who turns blocks, snacks, and stickers into spontaneous social experiments, sometimes losing focus when routines get too strict, and can’t resist
    a shiny new sticker.
background:
  cultural: Donnye grows up in a Black American family in Dayton, Ohio, where African‑American cultural traditions such as gospel music, community gatherings, and storytelling are part of everyday life.
    Her family celebrates holidays like Juneteenth and observes cultural milestones that emphasize resilience, creativity, and communal support. Local community centers offer arts‑focused programs and play
    groups that reflect both her cultural heritage and the diverse environment of Montgomery County, shaping her appreciation for art, music, and collective experiences.
attributes:
  skills: '[''basic verbal communication'', ''color recognition'', ''drawing with crayons'', ''stacking blocks'', ''basic problem solving'', ''walking and running'', ''climbing low playground equipment'',
