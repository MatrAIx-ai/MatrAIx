  hobbies: '[''scribbling with crayons'', ''building block towers'', ''dancing to music'', ''interactive storytime'', ''sandbox play'', ''group games with peers'', ''watching colorful cartoons'', ''exploring
    the playground'']'
  career_goals: While too young for a concrete career path, Donnye often talks about wanting to be a dancer, an artist, or a teacher when she grows up, reflecting her love for movement, visual art, and
    social interaction. Her parents nurture these interests by providing music, art supplies, and community activities, so her future ambitions may gravitate toward creative or caring professions that allow
    her to express herself and work with others.
