persona_description: A hydrologist with the Grand Mesa Uncompahgre and Gunnison National Forests who specializes in the study of peat-forming wetlands, specifically fens. He has extensive experience in
  inventorying and monitoring fens, and has worked on restoration projects to improve their condition. His passion lies in understanding how to restore fens that have been degraded over time, and in the
  benefits they provide for the watershed, including improving water quality, habitat for unique plants and animals, and flood control. He is a leader in the field of wetland conservation and restoration.
