  skills: '[''User Experience (UX) Design'', ''Interaction Design'', ''Graphic Design'', ''Industrial Design'', ''Rapid Prototyping'', ''CAD (SolidWorks)'', ''Adobe Creative Suite'', ''Figma'', ''Sketch'',
    ''User Research'', ''Usability Testing'', ''Design Thinking'', ''Agile Project Management'', ''Data Analysis'', ''Sustainable Design Practices'', ''Cross‑functional Team Collaboration'']'
  hobbies: '[''Hiking the Blue Ridge Mountains'', ''Cycling along the James River'', ''Landscape Photography'', ''Woodworking'', ''Homebrewing craft beer'', ''Cooking Southern-inspired meals'', ''Playing
    acoustic guitar'', ''Reading historical nonfiction (Civil War focus)'', ''Volunteering at community design workshops'', ''VR gaming'', ''Attending local music festivals'']'
  career_goals: David aims to progress into a senior leadership role where he can shape product strategy and mentor emerging designers. He aspires to become a Design Director or start his own consultancy
    focused on creating inclusive, sustainable, and technology‑forward products. He is keen on mastering emerging fields such as AR/VR and voice‑interface design, and he wants to champion design processes
    that balance creativity with real‑world feasibility. Ultimately, he seeks to foster a collaborative culture that values both innovative thinking and reliable execution, while maintaining a healthy work‑life
    balance.
