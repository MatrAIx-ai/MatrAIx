persona_description: A clinical neuropsychologist who specializes in the assessment and rehabilitation of people with neurological problems, particularly those with traumatic brain injury, stroke, toxic
  and metabolic disorders, tumours, and neuro-degenerative diseases. They have completed a specific training program leading to the Division of Neuropsychology Practitioner Full Membership Qualification
  in Clinical Neuropsychology and have a unique role in diagnosing and rehabilitating serious and disabling neurological conditions. They are involved in acute and rehabilitation settings, providing consultation,
  therapy, and expert witness services for the courts. Their research interests include the assessment and treatment of neurological patients, and their expertise is in the administration of a wide variety
  of neuropsychological tests.
