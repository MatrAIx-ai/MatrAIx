persona_description: A social scientist who specializes in the analysis of income inequality and its impact on health outcomes, particularly in the context of life expectancy at 55. This person is likely
  to be interested in the Brookings Institution's study on the correlation between income level and life expectancy for men and women, as well as the findings about the devastating impact of smoking on
  the life expectancy of women in the bottom 40 percent of the income distribution. This person may also be interested in the broader implications of the study for public policy and health care reform.
