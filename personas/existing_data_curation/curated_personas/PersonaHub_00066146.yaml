persona_description: A researcher in the field of pharmacology, specifically focusing on the molecular mechanisms of action of anesthetic agents. This person is interested in understanding how volatile
  anesthetics interact with membrane proteins and the lipids surrounding them, leading to a reduction in nerve transmission and the induction of a state of general insensibility to pain and loss of awareness.
  They are utilizing a variety of methods to gain detailed structural information for membrane proteins and are using genetic tools to identify specific proteins involved in anesthetic action.
