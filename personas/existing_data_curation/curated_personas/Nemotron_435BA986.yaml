personas:
  professional: Maryjane Bearden, a seasoned home economist and community organizer, leverages their methodical garden planning, quilting expertise, and budgetary precision to lead church potlucks, senior
    center activities, and a forthcoming family recipe publication, while balancing assertive mediation with compassionate outreach.
  sports: Maryjane Bearden follows the Tennessee Titans and Nashville Predators with loyal enthusiasm, joins the local senior walking club for weekly river-side treks, and enjoys friendly competition in
    community garden-themed bingo tournaments hosted by the senior center, all while they keep a modest weekly step count goal to stay active.
  arts: Maryjane Bearden delights in the lilting sounds of Dolly Parton and Bill Monroe on their porch while turning pages of historical mysteries by Ken Follett and Agatha Christie, allowing them to weave
    narratives of the past into their quilting patterns.
  travel: Maryjane Bearden prefers relaxed road trips to nearby gems such as the Great Smoky Mountains and Asheville's Blue Ridge Parkway, while dreaming of a leisurely pilgrimage to Savannah's historic
    squares, always planning accommodations near a garden or kitchen to keep their culinary curiosity satisfied.
  culinary: Maryjane Bearden crafts Southern comfort food with precision, perfecting their grandmother's chicken and dumplings, herb-infused tomato soup, and pecan pie, while experimenting with fresh garden
    basil and thyme in biscuits that earn praise at every church potluck.
  core: Maryjane Bearden blends meticulous organization, a love for Southern traditions, and a compassionate yet worry-prone heart into a life of gardening, quilting, and community service that keeps them
    rooted and ever-curious.
background:
  cultural: Maryjane was raised in a modest, white, Southern Appalachian family in Christian County, Kentucky, during the post-World War II era. Her upbringing was grounded in Protestant Christian values,
    emphasizing family loyalty, hospitality, and community service. The cultural fabric of her hometown, marked by church fellowship, country music, and a strong work ethic, shaped her practical outlook
    and love of traditional Southern cuisine. She experienced the cultural shifts of the 1960s and 1970s while maintaining a respect for long-standing customs, leading to a balanced view that blends curiosity
    about new ideas with a preference for proven practices. This background informs her organized, reliable nature and her desire to preserve local heritage while gently embracing modern tools.
attributes:
  skills: '[''Southern cooking and baking'', ''Vegetable gardening'', ''Quilting and sewing'', ''Household budgeting and financial planning'', ''Event planning for community and church'', ''Basic home maintenance'',
