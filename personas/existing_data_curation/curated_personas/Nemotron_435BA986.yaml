  hobbies: '[''Gardening'', ''Baking and cooking'', ''Quilting'', ''Reading historical fiction and mystery novels'', ''Listening to country and bluegrass music'', ''Attending church and community events'',
    ''Genealogy research'', ''Nature walks'', ''Volunteering at senior center'']'
  career_goals: In her later years, Maryjane aims to deepen her involvement in the local church by leading a women's bible study group and organizing charitable outreach programs. She aspires to compile
    and self-publish a family recipe book that captures the culinary traditions of her upbringing, preserving them for future generations. She seeks to mentor her grandchildren and other youth in practical
    life skills such as cooking, gardening, and budgeting, fostering self-reliance. Maryjane also desires to improve her digital literacy, learning to use a computer and social media to stay connected with
    distant family and to archive family photographs digitally. Lastly, she hopes to maintain her health through regular walks and to manage stress by adhering to her organized routine and mindfulness practices.
