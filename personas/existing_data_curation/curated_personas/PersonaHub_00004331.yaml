persona_description: A researcher and conservationist who studies the ecology and behavior of pika in Langtang National Park of Nepal, particularly in relation to climate change and its impact on their
  population. They are knowledgeable about the history and distribution of pika species in the central Himalayas, as well as the challenges they face in adapting to changing environmental conditions. They
  are also familiar with the conservation efforts and policies in place to protect pika populations in the region, including the culling of pika populations blamed for degradation of grasslands.
