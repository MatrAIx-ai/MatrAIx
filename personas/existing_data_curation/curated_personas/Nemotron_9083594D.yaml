personas:
  professional: An accomplished community arts facilitator, Neyda Hoyek leverages her meticulous event‑planning skills, watercolor expertise, and love of genealogical storytelling to design senior art workshops,
    curate The Villages’ annual abstract exhibition, and mentor new volunteer leaders, all while juggling detailed budgets and newsletters with the same disciplined precision that guides her personal creative
    practice.
  sports: Neyda Hoyek stays active through daily morning walks around The Villages’ lake trails, a weekly low‑impact aqua‑fit class at the community pool, and a seasonal membership at the nearby golf course
    where she plays with the ‘Villagers’ Ladies’ League, while cheering on the Orlando Magic and the Tampa Bay Buccaneers during the NBA and NFL seasons.
  arts: Neyda Hoyek channels her imagination into vibrant watercolor abstracts inspired by the hues of Florida wetlands, draws creative inheritance from the bold strokes of Georgia O'Keeffe and the rhythmic
    geometry of Wassily Kandinsky, curates weekly arts‑and‑crafts workshops at the senior center, and attends local theater productions featuring plays by Tom Stoppard and exhibitions at the Charles Hosmer
    Morse Museum of American Art.
  travel: Neyda Hoyek blends meticulous planning with a spontaneous love for romance, regularly taking day trips to historic St. Augustine, weekend getaways to the charming streets of Savannah, and annual
    cruises to the Caribbean, while dreaming of a literary pilgrimage to Haworth, England, and a summer road‑trip across the Pacific Northwest to admire the native landscape art of the region.
  culinary: Neyda Hoyek, an intermediate home‑cook, delights in the bright flavors of Florida cuisine, frequently preparing lemon‑garlic grilled mahi‑mahi, rosemary‑roasted carrots harvested from her garden,
    and a silky key‑lime tart topped with fresh mint, while her penchant for artistic presentation leads her to garnish dishes with edible flowers and meticulously plate meals as if they were watercolor
    canvases.
  core: Creative yet methodical, Neyda Hoyek balances a disciplined schedule of volunteer leadership with an insatiable curiosity for abstract art, a habit of meticulously cataloguing family photos, and
    a mild tendency to over‑arrange her garden walkways.
background:
  cultural: Neyda grew up in a middle‑class, white American family in the Upper Midwest, where Sunday church attendance and community involvement were routine. Her heritage includes German and Irish ancestry,
    which has subtly influenced her appreciation for folk art and storytelling. After moving to Florida in her early fifties, she embraced the Southern hospitality and the vibrant, active lifestyle of The
    Villages, a retirement community known for its collaborative clubs and cultural programming. She identifies with mainstream American cultural values—self‑reliance, volunteerism, and a love of learning—while
    also honoring the regional traditions of both her Midwestern roots and her current Floridian setting.
attributes:
