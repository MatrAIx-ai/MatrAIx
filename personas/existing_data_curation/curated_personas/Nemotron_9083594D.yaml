  hobbies: '["Watercolor painting","Abstract mixed-media art","Reading philosophy and science-fiction","Gardening (roses and succulents)","Genealogy research","Volunteer arts workshops","Attending theater
    and lecture series","Visiting art museums","Crossword and sudoku puzzles","Knitting and quilting"]'
  career_goals: She hopes to lead The Villages’ Arts and Culture Council, curating an annual senior art exhibition that showcases abstract works. She aims to complete a personal series of 30 watercolor
    pieces inspired by Florida’s natural landscapes and submit them to regional juried shows. Additionally, she plans to compile and self‑publish a detailed family genealogy book that will become a keepsake
    for her grandchildren. Neyda also aspires to mentor newer retirees in volunteer leadership, establishing a structured onboarding program for community service clubs, and to take a series of continuing‑education
    courses in art history and museum studies at the nearby community college.
