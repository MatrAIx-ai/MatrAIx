personas:
  professional: A detail‑oriented phlebotomist, Clarice Worobey leverages strong venipuncture skills, precise EMR documentation, and a naturally sociable demeanor to calm patients, while their curious,
    competitive streak drives them to prototype creative wellness initiatives despite a habit of juggling tasks in a relaxed, occasionally disorganized manner.
  sports: A weekend volleyball enthusiast and avid hiker, Clarice Worobey regularly joins a co‑ed league in Marietta, cheers on the Atlanta Falcons and Hawks while mapping new Lake Allatoona trails, and
    balances their competitive spirit with a relaxed, sometimes disorganized approach to consistent workouts.
  arts: An art‑infused social butterfly, Clarice Worobey spends weekends painting watercolors of north‑Georgia hills inspired by Georgia O’Keeffe, attends local art fairs featuring emerging creators, and
    fuels their improv comedy practice with a fondness for Amy Poehler’s sketches while curating playlists that weave together Sufjan Stevens, Lykke Li, and Max Richter’s ambient scores.
  travel: A spontaneous road‑trip planner, Clarice Worobey favors short weekend escapes to Asheville and the Blue Ridge Parkway, dream‑tours coffee‑centric neighborhoods in Portland and Edinburgh, and balances
    their curiosity for adventure with a relaxed budgeting mindset that sometimes leaves them booking flights at the last minute.
  culinary: A culinary explorer with modest kitchen chops, Clarice Worobey mixes fresh basil and lemon zest into homemade pesto, whips up quick shrimp tacos with corn tortillas, and regularly indulges in
    latte art at local cafés while they occasionally splurge on artisanal cheeses and experimental dishes like matcha‑infused tiramisu.
  core: A creatively curious phlebotomist, Clarice Worobey balances a love for watercolor art and spontaneous volleyball games with a competitive streak and a habit of over‑thinking every detail, often
    questioning their own choices.
background:
  cultural: Clarice grew up in Dallas, a small town in Paulding County, Georgia, within a predominantly white, Southern‑American community. Her family’s roots are grounded in traditional Southern values—hospitality,
    close‑knit family ties, and participation in church socials and county fairs. She was raised attending a local Baptist congregation, where community service and modesty were emphasized. While she cherishes
    these cultural touchstones—such as enjoying peach cobbler, attending high‑school football games, and celebrating regional holidays—her natural curiosity pushes her toward broader artistic and intellectual
    experiences, often seeking inspiration from Atlanta’s eclectic art scene and diverse perspectives.
attributes:
  skills: '["Venipuncture", "Capillary blood collection", "Specimen handling and labeling", "Infection control protocols", "Electronic medical record entry", "Patient communication and rapport building",
    "Team collaboration and group facilitation", "Creative problem solving", "Basic laboratory equipment operation"]'
  hobbies: '["Watercolor painting", "Sketching nature scenes", "Attending local art fairs", "Hiking on local trails", "Playing recreational volleyball", "Improvisational comedy classes", "Reading science
    fiction and psychology books", "Exploring coffee shops", "Volunteering at community health events", "Listening to indie music"]'
  career_goals: Clarice aims to deepen her clinical expertise by obtaining certification as a Medical Laboratory Technician and eventually pursuing an associate's degree in health sciences. She aspires
    to transition into a supervisory role, overseeing a phlebotomy team and contributing to workflow improvements in a busy outpatient clinic. Inspired by her love of art, she hopes to integrate creative
    wellness initiatives—such as art‑based stress‑reduction activities—into the patient experience. To support these ambitions, she plans to develop stronger organizational habits and stress‑management
    techniques.
