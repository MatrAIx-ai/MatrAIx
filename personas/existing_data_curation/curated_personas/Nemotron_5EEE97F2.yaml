  hobbies: '[''Cooking Mexican cuisine'', ''Gardening (vegetables & herbs)'', ''Crocheting'', ''Listening to mariachi and ranchera music'', ''Church choir participation'', ''Book club (mystery novels)'',
    ''Volunteering at community festivals'', ''Family gatherings'', ''Walking in local parks'']'
  career_goals: Looking ahead, Marisela aims to secure a senior stock associate position where she can mentor younger staff and help improve store layout efficiency. She hopes to be recognized for her safety
    record and perhaps take on a part‑time schedule that allows her to spend more time with her family and community activities. Ultimately, she envisions transitioning to a volunteer coordinator role at
    the local community center, leveraging her organizational skills to support food‑drive events and cultural festivals before retirement.
