personas:
  professional: Marisela Casanas, a seasoned retail logistics professional with three decades of inventory management and forklift expertise, blends a curious appetite for new merchandising technology with
    a practical, safety‑first mindset, excels at training newcomers and assertively addressing efficiency issues, and now seeks a senior stock associate role that lets them mentor staff while carving out
    flexible hours for family and community work.
  sports: Marisela Casanas, an avid follower of the Houston Astros and a regular participant in a senior walking club that meets at the local park each Saturday, they also enjoy occasional friendly matches
    of pickleball at the community center and cheerfully support the regional high‑school football team, the Border High Raiders, during Friday night games.
  arts: Marisela Casanas, an enthusiastic listener of mariachi and ranchera tunes such as Vicente Fernández while crocheting blankets for grandchildren, they sing alto in the church choir, immerse themselves
    in mystery novels like Agatha Christie’s 'Murder on the Orient Express' at the book club, and occasionally attend community theater productions featuring works by local playwrights.
  travel: Marisela Casanas, a culturally curious traveler who has journeyed to Oaxaca and the Yucatán to sample regional cuisine and explore historic markets, they frequently explore nearby national parks
    such as Big Bend on weekend road trips, dream of a future cruise along the Pacific coast, yet balance their travel ambitions with a modest budget and family responsibilities.
  culinary: Marisela Casanas, a skilled home cook who delights in preparing Oaxacan mole negro and Yucatán cochinita pibil using home‑grown chilies, tomatoes, and herbs like epazote, they often experiment
    with traditional recipes from a well‑worn cookbook while pairing dishes with freshly made salsa verde, and enjoy sharing their creations at community festivals and family gatherings.
  core: Marisela Casanas, a logistics veteran with a practical curiosity, balances a flexible, slightly disorganized work ethic with a warm, assertive community spirit, turning gardening, cooking, and volunteering
    into the core of a richly textured senior life, and they often navigate daily challenges with calm, steady determination.
background:
  cultural: Marisela grew up in a bilingual Mexican‑American household near the Texas–Mexico border. Her family maintains strong ties to Mexican traditions—celebrating Día de los Muertos, quinceañeras,
    and religious holidays with mezcal, altars, and traditional foods. She is fluent in Spanish and English, and her Catholic faith shapes much of her community involvement. Living in El Paso and Hudspeth
    County, she blends Mexican cultural values of family, respect, and hospitality with the practical, independent spirit of the American Southwest.
attributes:
  skills: '[''Inventory management'', ''Pallet jack operation'', ''Forklift operation'', ''Barcode scanning'', ''Product labeling'', ''Customer service'', ''Bilingual communication (Spanish/English)'',
