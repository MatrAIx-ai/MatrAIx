persona_description: A molecular biologist who specializes in the study of single-stranded nucleic acid topology, particularly in the discovery and construction of complex foldings of DNA molecules. His
  laboratory focuses on the relationship between knotted molecules and catenated molecules, and the discovery of antijunctions and mesojunctions, which are closely related to the pseudoknots found in ribozymes.
  He has demonstrated the general way to design any knot from DNA, which has led to the construction of Borromean Rings from DNA.
