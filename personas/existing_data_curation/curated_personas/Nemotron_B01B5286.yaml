personas:
  professional: A senior statistician on the cusp of strategic leadership, Rahima Mathew leverages deep expertise in Bayesian hierarchical models, Python, R, and data visualization to turn massive health‑care
    datasets into actionable policy insights, while their methodical, competitive drive ensures rigorous analysis and their curiosity fuels interdisciplinary collaborations across art, science, and public‑policy
    realms.
  sports: A dedicated member of the Cuyahoga Valley Hikers, Rahima Mathew avidly follows the Cleveland Browns and Guardians, participates in weekend trail runs, and joins a co‑worker indoor volleyball league,
    balancing a competitive edge with a preference for solitary fitness pursuits.
  arts: A regular visitor to the Cleveland Museum of Art, Rahima Mathew studies contemporary works by Yayoi Kusama and Kehinde Wiley, sketches concepts in a notebook, experiments with digital photography
    inspired by Ansel Adams, and hones improvisational wit in a local improv theater workshop, channeling their curiosity and love for unconventional thinking.
  travel: A thoughtfully spontaneous traveler, Rahima Mathew plans solo trips to Iceland’s volcanic landscapes, enjoys culturally immersive family visits to Kerala’s banana‑leaf feasts, and savors weekend
    escapes to the Lake Erie Islands, all while maintaining a modest travel budget that allows for occasional boutique experiences.
  culinary: An inventive home chef, Rahima Mathew blends Kerala spices with Midwestern staples by simmering fresh lake fish in a fragrant curry, crafting corn‑meal appam, and creating a pumpkin korma paired
    with locally sourced pork belly, demonstrating a confident, experimental approach to fusion cooking.
  core: Curious, methodical, and quietly competitive, Rahima Mathew fuses statistical rigor with artistic flair, channels disciplined budgeting into strategic investments, balances health vigilance with
    occasional neglect, and finds solace in solitary hikes and inventive fusion cooking.
background:
  cultural: Rahima S. Mathew was born in Cleveland to immigrant parents from Kerala, India, who belong to the Syrian Christian community. Growing up in a bilingual household, she spoke Malayalam at home
    while attending American schools, giving her a deep appreciation for both Indian cultural traditions and Midwestern values. Family gatherings are marked by celebrations of Onam, Vishu, and Christmas,
    featuring traditional music, dance, and the distinctive Kerala cuisine of fish curry, appam, and banana leaf feasts. This multicultural upbringing fostered her curiosity and openness to new ideas, while
    the community’s emphasis on education and discipline reinforced her methodical work ethic. Although she identifies as American, Rahima maintains connections with the local Indian diaspora through a
    cultural association that organizes art workshops, language classes, and charitable events. Her cultural background informs her perspective on the importance of inclusive data practices and her desire
    to represent diverse voices in statistical research.
