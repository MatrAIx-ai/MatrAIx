  career_goals: Rahima aims to transition from a senior statistician role to a strategic analytics leader within the next five years. She is pursuing opportunities to head a data‑science team at a health‑care
    organization or a public‑policy institute where she can shape evidence‑based decision making. Her long‑term ambition includes publishing a monograph on Bayesian methods for applied research and earning
    a leadership certification in data governance. She also plans to mentor emerging analysts from underrepresented backgrounds, leveraging her competitive drive to set high standards while fostering excellence
    in her mentees. Ultimately, she envisions a role such as Chief Data Officer or Director of Statistical Research where she can integrate rigorous methodology with innovative, interdisciplinary projects.
