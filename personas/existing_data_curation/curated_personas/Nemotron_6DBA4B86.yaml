personas:
  professional: Alan Oxford, a budding junior robotics enthusiast, merges a keen curiosity for Raspberry Pi tinkering with pragmatic problem‑solving in school science‑fair projects, guiding his tight‑knit
    circle of friends through hands‑on builds while comfortably drifting through deadlines thanks to a relaxed, flexible work style.
  sports: Alan Oxford enjoys hiking the Merrimack River trails and occasional cross‑country runs, follows the Boston Red Sox, New England Patriots, and Boston Bruins on TV, and plays on a small neighborhood
    soccer club, balancing low‑key outdoor activity with a laid‑back fitness routine.
  arts: Alan Oxford immerses themselves in sketching riverbank panoramas, penning short sci‑fi tales inspired by Becky Chambers, and vibing to M83’s ambient synths, while admiring Andrew Wyeth’s realism
    and the pixel art of indie titles like Baba Is You.
  travel: Alan Oxford prefers spontaneous weekend hikes to nearby spots like Portsmouth’s waterfront and the White Mountains, while dreaming of a future family trip to Tokyo’s Akihabara for a sci‑fi convention,
    balancing modest teen travel budgets with a love for both local adventure and far‑flung tech culture.
  culinary: Alan Oxford enjoys crafting homemade pepperoni pizza and whipping up quick ramen bowls, often topping both with fresh mozzarella and spring onions, and occasionally snacking on nachos drenched
    in salsa while experimenting with berry‑filled smoothies for a refreshing post‑game treat.
  core: Alan Oxford is a quietly curious teen whose disorganized desk is a treasure map of Raspberry Pi parts, indie game discs, and sketchbooks, reflecting a harmonious blend of solitary creativity, practical
    tinkering, and a habit of forgetting scheduled chores.
background:
  cultural: Alan grew up in Haverhill, a modest‑size city in Essex County, Massachusetts, within a predominantly white, middle‑class New England community. His family places a high value on education, community
    involvement, and seasonal traditions such as autumn leaf‑peeping and winter ice‑skating. The town’s blend of historic preservation, proximity to Boston, and access to natural areas shapes his pragmatic
    yet open‑minded outlook.
