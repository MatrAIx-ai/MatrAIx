personas:
  professional: Alyea Ortiz, a community event planner turned aspiring home‑based caterer, leverages their knack for coordinating church potlucks, quilting contests, and town fairs to design structured
    yet flexible catering menus for local congregations, while they compete to out‑serve neighboring vendors despite occasional disorganization.
  sports: Alyea Ortiz enjoys weekly lawn bowling at the Gordon Community Center Lawn Bowls Club, plays casual volleyball in the Georgia Community Volleyball League, and faithfully roots for the Atlanta
    Braves and Atlanta Falcons, all while they combine team spirit with a love of low‑impact competition.
  arts: Alyea Ortiz participates in a church choir performing Southern gospel classics like the Gaither Vocal Band, joins a local quilting circle that often displays works inspired by Georgia O'Keeffe,
    and occasionally acts in community theater productions of classic Southern dramas, letting creative expression temper their competitive nature, while they relish the collaborative process.
  travel: Alyea Ortiz prefers short road trips to historic Southern towns such as Savannah and Charleston, relishes annual visits to the Great Smoky Mountains for berry picking, dreams of a culinary pilgrimage
    to New Orleans and a weekend in Paris for pastry workshops, yet they balance travel with the practicalities of managing a budding catering venture.
  culinary: Alyea Ortiz excels at cooking hearty Southern comfort dishes—like buttermilk fried chicken with collard greens simmered in smoked turkey broth, peach cobbler baked with fresh garden peaches,
    and shrimp and grits seasoned with Cajun spices—while they proudly grow heirloom tomatoes and okra in their backyard garden for farm‑to‑table meals.
  core: Alyea Ortiz blends a love of community cooking and competitive quilting with a perpetual worry that fuels meticulous budgeting, yet they balance this by embracing flexible event planning and the
    comfort of Southern traditions.
background:
  cultural: Alyea grew up in the rural South, deeply rooted in the traditions of small‑town Georgia. Her family background reflects a blend of Southern hospitality, strong community ties, and a Protestant
    evangelical faith that emphasizes church participation and service to neighbors. Culinary traditions such as cooking Southern comfort foods for large gatherings are central to her identity, as is the
    value placed on self‑reliance and practical problem‑solving. While she identifies as white, her cultural experiences are shaped by the close‑knit, intergenerational fabric of Gordon, GA, where community
    events, church life, and local festivals play a pivotal role in daily life.
attributes:
  skills: '["Household budgeting and meal planning", "Community event coordination", "Interpersonal communication and conflict mediation", "Gardening and basic home maintenance", "Quilt making and sewing
    (competitive)", "Social media group management"]'
  hobbies: '["Church choir", "Community theater", "Bingo nights", "Lawn bowling", "Volleyball", "Quilting (competitive)", "Gardening", "Journaling", "Local politics and town meetings"]'
  career_goals: Although currently not part of the formal workforce, Alyea aims to transform her event‑planning and culinary skills into a small home‑based catering business that serves local churches and
    community functions. She also aspires to take a leadership role within the town's volunteer network, organizing larger-scale projects such as the annual county fair. To support these goals, she plans
    to complete a short certification in food safety and to develop a more structured personal organization system to reduce her chronic worry and improve stress management.
