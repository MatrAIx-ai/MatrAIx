personas:
  professional: Angela Poggio is a seasoned residential cleaning professional with two decades of expertise in efficient routine creation, green cleaning techniques, and client relationship management,
    whose outgoing, competitive nature drives them to lead a cleaning team and pursue ISSA certification while occasionally resisting rigid structures in favor of spontaneous project tweaks.
  sports: Angela Poggio enjoys line‑dance classes twice a week, plays on a local church softball team, participates in the Everett community walking club, and roots for the Seattle Seahawks, balancing low‑impact
    activities with occasional competitive sports engagements.
  arts: Angela Poggio regularly watches classic sitcoms like "The Mary Tyler Moore Show" and "I Love Lucy," follows DIY home‑decor inspiration from HGTV hosts such as Joanna Gaines, delights in country
    line‑dance music from artists like Dolly Parton and George Strait, and reads self‑help bestsellers by Marie Kondo, weaving these influences into their personal aesthetic.
  travel: Angela Poggio prefers spontaneous weekend road trips to nearby farmers’ markets in Portland, Bellingham, and local festivals in Olympia, dreams of exploring the gardens of New Zealand’s South
    Island, plans trips around church group mission outings, and balances a love for low‑cost adventure with a desire for predictable schedules.
  culinary: Angela Poggio favors cooking with fresh herbs such as basil, rosemary, and thyme harvested from their garden, often prepares herb‑roasted chicken, lemon‑garlic salmon, and a hearty farmers‑market
    stew, enjoys the simplicity of low‑maintenance vegetable dishes, and considers themselves an intermediate home‑cook who occasionally experiments with sourdough bread.
  core: Angela Poggio is a pragmatic, socially‑driven cleaning veteran who balances a love for routine with spontaneous DIY projects, yet can be overly skeptical, occasionally procrastinates on organization,
    and thrives on community connection.
background:
  cultural: Angela grew up in a middle‑class white family in the Pacific Northwest, where a strong work ethic and practical values are emphasized. Her family’s cultural traditions include regular church
    attendance, community involvement, and a focus on self‑reliance. The region’s blend of natural beauty and close‑knit neighborhoods shaped her appreciation for routine, hands‑on tasks, and social gatherings.
    While her upbringing reflects typical white American cultural norms—such as celebrating holidays like Thanksgiving and valuing punctuality—Angela also embraces the inclusive, community‑focused spirit
    of Everett and Snohomish County.
