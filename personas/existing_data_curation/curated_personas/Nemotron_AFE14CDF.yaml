  hobbies: '[''Community potlucks'', ''Line‑dance class'', ''Volunteer work at church soup kitchen'', ''Gardening (vegetables and herbs)'', ''DIY home décor projects'', ''Spontaneous weekend trips to farmers’
    markets or festivals'', ''Watching classic TV sitcoms'', ''Reading practical self‑help books on organization'']'
  career_goals: Angela aims to secure a stable, predictable schedule that supports her financial security for retirement, while also exploring opportunities to lead a cleaning team or start her own small
    residential cleaning business. She plans to obtain a professional cleaning certification, such as the International Sanitary Supply Association (ISSA) Certified Cleaner, and to become known locally
    for reliable, high‑quality service. Balancing her love of routine with occasional spontaneous projects, she hopes to mentor younger workers and eventually transition to a supervisory role that allows
    her to shape cleaning standards and schedules.
