  career_goals: Robert aims to become a senior engineer or technical lead within the next three to five years, focusing on building robust cloud‑based services for a midsize tech company that values work‑life
    balance. He plans to earn the AWS Solutions Architect certification and deepen his expertise in DevOps to oversee end‑to‑end delivery pipelines. In the longer term, he hopes to mentor junior developers,
    contribute to open‑source projects, and eventually lead a small, cross‑functional team that designs critical infrastructure for the healthcare or renewable‑energy sectors in New England. He values stability,
    clear career pathways, and the opportunity to apply his systematic problem‑solving skills to real‑world impact.
