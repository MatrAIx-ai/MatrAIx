  career_goals: Crystal aims to move into a foreman role within the next few years, taking on more supervisory responsibilities and learning advanced project management techniques. Long‑term, she envisions
    co‑owning a small renovation business with her husband that specializes in sustainable, energy‑efficient home upgrades for residents of Sedalia and surrounding towns. To support this ambition, she plans
    to complete a formal apprenticeship in carpentry and acquire certifications in green building practices.
