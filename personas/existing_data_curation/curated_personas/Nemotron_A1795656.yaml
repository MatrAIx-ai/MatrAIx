personas:
  professional: Seth Banks, an inquisitive infant, explores cause‑and‑effect toys with a calm, practical demeanor, favoring sturdy building blocks over flashy gadgets while they maintain a serene composure
    when playtime gets messy.
  sports: Seth Banks cheers on the Harbor City Hawks, the local professional baseball team, during weekend family outings, while also participating in a parent‑run toddler gymnastics club called Tiny Tumblers,
    where they delight in gentle balance exercises.
  arts: Seth Banks finds solace in soothing lullabies by Brahms and the playful melodies of The Beatles, while also being enthralled by animated classics like Disney’s "Moana" and the colorful artwork of
    Bob Ross, which feed their compassionate and imaginative side, and they often hum along to the melodies during quiet moments.
  travel: Seth Banks has explored the nearby coastal town of Oceanview with family on a stroller‑friendly boardwalk and visited a lush botanical garden in the city, and they eagerly anticipate a future
    trip to the historic streets of Barcelona to experience new sights and sounds.
  culinary: Seth Banks prefers smooth sweet purees such as mango and carrot, occasionally enjoys mild avocado mash, but reliably refuses gritty textures like oatmeal, and their parents often prepare homemade,
    lightly seasoned meals using organic ingredients to satisfy the infant’s practical palate, and they giggle when tasting new flavors.
  core: Seth Banks embodies a calm, curious infant who balances practical play with compassionate kindness, staying relaxed about routine while they delight in new experiences.
background:
  cultural: Seth comes from a White American family living in Phoenix, Arizona, where the warm desert climate and outdoor lifestyle shape his early experiences. The family often spends time in local parks
    and community spaces, exposing him to a mix of Southwestern cultural elements such as regional music and seasonal festivals. His upbringing emphasizes compassion, cooperation, and a relaxed approach
    to daily routines, reflecting both the family's values and the broader community‑focused culture of the Phoenix area.
