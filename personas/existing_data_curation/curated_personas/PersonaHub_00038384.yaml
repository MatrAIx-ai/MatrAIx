persona_description: A dedicated and experienced teacher who is passionate about supporting children with special educational needs (SEN) and ensuring they achieve their full potential. The teacher has
  a strong understanding of the SEN Code of Practice (2014) and is committed to providing intervention programmes that meet the needs of each child. The teacher is skilled in identifying and assessing children
  who are struggling in areas such as communication and interaction, cognition and learning, social, mental and emotional health, and sensory and/or physical. The teacher is also adept at monitoring progress
  and providing feedback to parents and teachers to ensure that the intervention programmes are effective. The teacher has a clear vision of creating a nurturing environment where all children can become
  independent and confident learners.
