  hobbies: '["Reading adventure books and graphic novels","Sketch journaling (drawing and writing)","Soccer with a small team","Hiking and nature exploration","Building LEGO models","Solving puzzles (jigsaw
    & logical)","Listening to Mexican traditional music (mariachi, ranchera)","Bilingual storytelling"]'
  career_goals: Mabel dreams of turning her love for animals and the outdoors into a future career as a wildlife rehabilitator or veterinarian who can help the wildlife of the Colorado high desert and the
    farm animals she often sees around Nucla. She is also inspired by her Mexican heritage and hopes to become a bilingual educator or community organizer who can support other Mexican-American children
    in maintaining their language and cultural traditions. While she enjoys competition and wants to excel academically, she recognizes the importance of discipline and plans to develop strong study habits
    to earn a scholarship for a college program in environmental science or veterinary medicine.
