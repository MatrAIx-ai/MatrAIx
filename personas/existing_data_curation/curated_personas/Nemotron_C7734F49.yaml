personas:
  professional: Mabel Cruz is an aspiring junior environmental illustrator who channels their love for desert landscapes into detailed sketch journal pages, using their keen practical eye to plan each drawing
    while occasionally abandoning the outline for spontaneous bursts of imagination.
  sports: Mabel Cruz plays forward for the Desert Oasis Youth Soccer Club, follows Phoenix Rising FC for inspiration, and approaches each training session with a critical eye, often pushing themselves to
    out‑score teammates while occasionally skipping the water break in pursuit of personal records.
  arts: 'Mabel Cruz fills their sketch journal with water‑color depictions of rattlesnakes, saguaros, and family celebrations, flips through graphic novels like "Avatar: The Last Airbender" and "Bone,"
    builds intricate LEGO landscapes, and listens to traditional mariachi and ranchera songs by artists such as Vicente Fernández and Los Tigres del Norte to fuel their creative flow.'
  travel: Mabel Cruz loves weekend hikes in the high‑desert near their home, has dreamed of trekking the red rocks of Sedona and the canyons of Grand Canyon National Park, and hopes to someday explore the
    ancient streets of Machu Picchu, preferring meticulously planned routes that still leave room for spontaneous stone‑stacking discoveries.
  culinary: Mabel Cruz delights in nibbling street‑taco‑style al pastor, savoring the sweet tang of fresh pineapple salsa, and can whip up a simple guacamole with avocados, lime, and cilantro, yet often
    accidentally burns the edges of their homemade churros while multitasking between LEGO builds and sketching.
  core: Mabel Cruz blends a meticulous love for desert art with a restless competitive spark, obsessively organizes their allowance yet can be distracted by spontaneous creativity, and their chronic worry
    fuels both careful planning and occasional over‑thinking.
background:
  cultural: Mabel grows up in a Mexican-American household in Nucla, Colorado, where the rhythms of her family life blend Mexican traditions with the rugged lifestyle of a small western mining town. Spanish
    is spoken at home, and celebrations such as Dia de los Muertos, Las Posadas, and Mexican Independence Day are marked with homemade foods, altars, and music. Her grandparents occasionally travel from
    Mexico, bringing stories, recipes, and cultural practices that reinforce her bilingual identity. At the same time, the close-knit community of Nucla instills a respect for the high-desert landscape,
    outdoor work, and a self-reliant spirit. This mix of cultural pride, bilingualism, and connection to nature shapes Mabel's values, her love of family gatherings, and her desire to give back to both
    her Mexican heritage and her Colorado community.
attributes:
  skills: '["Bilingual English-Spanish fluency","Reading comprehension (English & Spanish)","Elementary mathematics","Hands-on science experiments","Basic computer skills (drawing and photo editing)","Sketching
