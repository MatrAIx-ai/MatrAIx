  career_goals: Marsha aspires to merge her love for art, design, and community impact into a career that shapes public spaces. She dreams of becoming an architect or museum curator who designs interactive
    exhibits that spark curiosity in visitors of all ages. She also envisions leading a youth arts and STEM program, eventually directing a community arts center that offers workshops in creative technology
    and visual arts. Her competitive drive pushes her to aim for top scholarships and leadership roles in high school, laying the groundwork for future positions as a civic planner or innovation strategist
    who integrates aesthetics with functional urban design.
