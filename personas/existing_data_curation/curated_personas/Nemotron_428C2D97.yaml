personas:
  professional: A budding robotics enthusiast, Marsha Ellis blends disciplined project planning with a flair for public speaking, organizing weekly coding club sessions, leading debate practice, and choreographing
    drama rehearsals, all while channeling her competitive edge into crafting award‑winning mini‑machines for school fairs.
  sports: Marsha Ellis dives into the community pool three times a week, competes in the local swim team’s butterfly events, and cheers loudly for the St. Louis Cardinals and St. Louis Blues, often incorporating
    their game schedules into her weekly planner to balance training and fandom.
  arts: Marsha Ellis spends afternoons sketching architectural details from the St. Louis Art Museum, practices piano pieces ranging from Beethoven’s "Moonlight Sonata" to contemporary pop songs by Ariana Grande,
    and attends weekend jazz nights where she lifts the solos of local saxophonist Corey Boler to fuel her own creative storytelling.
  travel: Marsha Ellis enjoys family road trips to the Ozark National Scenic Riverways for canoeing, weekend visits to the Gateway Arch for photo ops, and dreams of exploring the Smithsonian museums in
    Washington, D.C., savoring each itinerary that mixes educational stops with fun souvenir hunts.
  culinary: Marsha Ellis loves cooking up gooey butter cake bites with her mom, perfecting homemade mac and cheese with sharp cheddar, and blending strawberry‑banana smoothies that feature fresh spinach
    for a hidden veggie boost, while occasionally sneaking a midnight cookie when study sessions run late.
  core: Marsha Ellis is a hyper‑organized, competition‑driven middle‑schooler who channels curiosity into robotics, art, and debate, delights in community traditions like Thanksgiving meals, and balances
    a disciplined routine with a chatty, socially energetic spirit.
background:
  cultural: Marsha grew up in a suburban neighborhood of St. Louis County, Missouri, within a middle‑class white family that reflects Midwestern values of community involvement, education, and modest ambition.
    Her family regularly attends a local Methodist church, celebrates holiday traditions such as Thanksgiving dinners with extended relatives, and participates in community volunteer projects like river
    clean‑ups. Exposure to the city’s rich cultural scene—ranging from the St. Louis Art Museum and the Missouri History Museum to blues and jazz performances at nearby venues—has nurtured her appreciation
    for the arts and architecture. She attends a public elementary school that encourages extracurricular activities, and her upbringing in the Midwest emphasizes politeness, self‑reliance, and a strong
    work ethic, all of which shape her organized, competitive, and socially engaging personality.
