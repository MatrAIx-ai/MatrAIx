  career_goals: Liliana aims to move into a shift‑manager role within the next year, leveraging her experience to improve operational efficiency and staff development. She plans to complete a hospitality
    management certification and eventually open a small, community‑focused coffee shop in Brandon that highlights Cuban pastries and live music. Her long‑term ambition is to establish a mentorship program
    for younger employees, fostering a supportive workplace that balances structure with the flexibility needed for a vibrant hospitality setting.
