personas:
  professional: Liliana Gonzalez is a veteran hospitality professional with over three decades of front‑of‑house experience, bilingual communication skills, and a talent for turning structured procedures
    into lively, culturally infused guest experiences, all while using their natural sociability to mentor staff and pursue a shift‑manager promotion.
  sports: Liliana Gonzalez stays active by dancing salsa at local studios for cardio, follows the Tampa Bay Rays and Orlando City SC as weekly viewing rituals, and joins a senior‑friendly walking club in
    Hillsborough County to maintain mobility.
  arts: Liliana Gonzalez immerses in the arts by attending salsa nights featuring Celia Cruz tributes, crocheting blankets while listening to folk guitar of Silvio Rodríguez, and reading historical fiction
    by Ken Follett, allowing these cultural expressions to enrich their leisure.
  travel: Liliana Gonzalez prefers relaxed weekend getaways, having explored St. Augustine’s historic streets and taken a group tour of Havana’s heritage sites, while dreaming of a culinary pilgrimage to
    Barcelona’s tapas bars and a scenic road trip along Florida’s Gulf Coast.
  culinary: Liliana Gonzalez cultivates a modest herb garden of cilantro, oregano, and mint to flavor traditional Cuban dishes such as ropa vieja and arroz con pollo, perfects a pour‑over coffee ritual
    with beans from a local roaster, and delights friends with Mojo‑marinated pork at frequent potluck gatherings.
  core: Liliana Gonzalez balances a structured hospitality career with a laid‑back love for salsa, spontaneous coffee indulgences, and a quirky habit of forgetting to file receipts, making them a warm‑hearted
    yet delightfully disorganized community pillar.
background:
  cultural: Liliana is a first‑generation Cuban‑American who grew up in a close‑knit immigrant community in Florida. Raised bilingual, she carries forward the island’s traditions of hospitality, music,
    and flavorful cuisine. Family gatherings centered around music, dance, and shared meals have shaped her warm, sociable nature. Her Cuban heritage influences her love for coffee culture and pastries,
    as well as her commitment to community involvement, evident in her volunteer work and her desire to incorporate Cuban cultural elements into her future coffee shop.
