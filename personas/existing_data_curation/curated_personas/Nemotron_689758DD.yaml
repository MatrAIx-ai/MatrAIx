personas:
  professional: Angelique Baker, a veteran carpenter with decades of expertise in structural framing, fine finish work, and custom furniture design, channels her calm resilience and competitive spirit into
    mentoring younger tradespeople while meticulously balancing organization with creative flexibility in her community workshop plans.
  sports: Angelique Baker, who enjoys low‑impact fitness through weekly hikes with the North Cascades Senior Hiking Club, occasional Tai Chi classes at the local community center, and follows the Seattle
    Seahawks and Seattle Sounders FC from the comfort of her living room, stays active without pursuing competitive sports.
  arts: Angelique Baker, an enthusiastic watercolorist inspired by the works of John Singer Sargent and the natural palette of the Pacific Northwest, regularly visits the Seattle Art Museum, attends chamber
    concerts by the Seattle Chamber Music Society featuring Yo‑Yo Ma, and draws creative energy from local mural tours featuring artists like Shepard Fairey.
  travel: Angelique Baker, who prefers thoughtfully planned road trips that blend scenic hikes with cultural stops, has journeyed to Olympic National Park, the historic waterfront of Victoria, BC, and the
    lavender fields of Provence, while dreaming of a future visit to the cherry blossom festivals in Kyoto, always budgeting her travel through a dedicated savings envelope.
  culinary: Angelique Baker, a competent home cook who delights in preparing cedar‑plank salmon with fresh dill, wild mushroom risotto using locally foraged chanterelles, and classic apple crisp with heritage
    apples, balances her meals with seasonal produce from her garden and occasionally indulges in a steaming bowl of ramen on trips to the Pacific coast.
  core: Angelique Baker merges a lifelong carpenter’s precision with an artist’s eye, channeling calm resilience, competitive ambition, and a touch of healthy skepticism into a legacy of sustainable woodworking,
    community mentorship, and vibrant Pacific Northwest creativity.
background:
  cultural: Angelique grew up in the Pacific Northwest, a region shaped by timber and outdoor culture. Her white, middle‑class upbringing in Washington emphasized self‑reliance, practical skill, and a deep
    respect for nature. The local heritage of logging and craftsmanship informed her early fascination with wood, while community values encouraged participation in neighborhood projects and local art events.
    Her life reflects the blend of modest, hardworking American tradition with an openness to artistic expression and lifelong learning.
