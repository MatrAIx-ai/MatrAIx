  career_goals: 'Although at retirement age, Angelique plans to channel her craftsmanship into a legacy project: establishing a community workshop where seniors can learn woodworking, creating a limited
    line of heirloom furniture that reflects Pacific Northwest motifs, and documenting her techniques in a small guidebook on sustainable carpentry. She also hopes to collaborate on public art installations
    that integrate wood with local heritage, and to be recognized as a mentor who fosters the next generation of skilled tradespeople in the region.'
