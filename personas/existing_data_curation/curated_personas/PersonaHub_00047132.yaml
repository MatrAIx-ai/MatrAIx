persona_description: A team of researchers from the University of Kentucky's Center for Applied Energy Research (CAER) who specialize in the development and testing of bioenergy and coal technologies. They
  are focused on finding ways to use biomass and coal fines to produce energy and reduce emissions without requiring modifications to conventional coal-fired stoker furnaces. Their work is aimed at overcoming
  the challenges of seasonal availability, low density, and capital investment required for biomass use and the traditional handling, storage, and transportation issues associated with coal fines.
