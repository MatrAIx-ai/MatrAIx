  hobbies: '[''Soccer League'', ''Cardinals Baseball Games'', ''Craft Beer Tasting'', ''BBQ Hosting'', ''Habitat for Humanity Volunteering'', ''Hiking'', ''Jazz Concerts'', ''Smart‑Home Experimentation'']'
  career_goals: Michael aims to transition from a high‑performing broker to the founder of a boutique brokerage that specializes in sustainable residential and small‑scale commercial properties in the St.
    Louis metro area. Within the next five years, he plans to earn the Certified Residential Specialist (CRS) designation, assemble a team of agents who share his client‑centric ethos, and launch a community‑focused
    brand that highlights green building practices and neighborhood revitalization. He also intends to build a diversified personal investment portfolio of rental homes to generate long‑term wealth and
    become a recognized local media commentator on real‑estate trends.
