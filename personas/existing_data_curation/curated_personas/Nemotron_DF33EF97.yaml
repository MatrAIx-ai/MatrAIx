personas:
  professional: Michael Cartrett, a 36‑year‑old residential real‑estate broker in St. Louis, blends over a decade of market analysis, high‑stakes negotiation, and digital‑marketing expertise with a pragmatic
    curiosity, and they use an organized yet adaptable workflow to mentor agents, stage homes for sustainable sales, and host community seminars that bridge client needs and green building practices.
  sports: Michael Cartrett enjoys co‑ed soccer on Saturday mornings, rallies with friends at Busch Stadium to watch the St. Louis Cardinals, supports the St. Louis City SC for MLS excitement, and they stay
    fit by hiking the Ozark Trail on weekends and participating in a local running club that meets after work.
  arts: Michael Cartrett has a soft spot for St. Louis jazz, regularly attending live sets at the historic Blue Note club featuring artists like the Charles Lloyd Quartet, and they blend this appreciation
    with their own experiments in smart‑home lighting that syncs to the music, while occasionally curating a vinyl collection that includes Sun Ra and Nina Simone.
  travel: Michael Cartrett favors a mix of short road trips to nearby state parks such as Forest Park and longer flights to culturally rich cities like Barcelona and New Orleans, planning trips around work
    breaks, balancing adventure with the desire to scout potential investment properties, and they often bring home souvenirs of local craft beers.
  culinary: Michael Cartrett is an avid backyard grill master who loves smoking ribs with a bourbon‑maple glaze, pairing them with craft beers like a hoppy Porter, and they experiment with seasonal vegetables
    like roasted Brussels sprouts, though they admit to over‑seasoning dishes with smoked paprika.
  core: Michael Cartrett blends broker savvy with a community‑first mindset, juggling real‑estate deals, soccer matches, jazz nights, and craft‑beer experiments, and they occasionally forget to log a workout.
background:
  cultural: Michael grew up in a middle‑class white family rooted in the Midwest, where values such as hard work, community involvement, and modesty are deeply ingrained. His upbringing in St. Louis exposed
    him to the city’s rich blend of architectural heritage, culinary traditions—including barbecue and jazz-infused cuisine—and a strong sense of neighborhood pride. Family gatherings often centered around
    Sunday meals and local church events, reinforcing a culture of hospitality and civic engagement that continues to shape his personal and professional outlook.
