personas:
  professional: Donnamarie Garner, a 26-year-old middle-school teacher in Clark County, blends rigorous curriculum design with spontaneous, low-stimulus classroom strategies, using Google Classroom and
    SMART Boards while championing inclusive practices drawn from a community-service ethic, and they constantly refine lesson plans to balance structure with flexibility.
  sports: Donnamarie Garner enjoys weekend hikes at Red Rock Canyon, follows the Vegas Golden Knights and Las Vegas Raiders with avid enthusiasm, and they participate in a local hiking club that meets monthly
    for desert trail explorations.
  arts: 'Donnamarie Garner expresses creativity through knitting, landscape photography of desert sunsets, and acoustic guitar sessions featuring folk artists like Gillian Welch and Fleet Foxes, while they
    regularly read contemporary fiction by authors such: Celeste Ng and document personal reflections in a journal.'
  travel: Donnamarie Garner prefers low-key, nature-focused travel, having explored Sedona's red rocks, the Grand Canyon, and scheduling a future pilgrimage to Kyoto's Zen gardens, and they favor meticulously
    planned itineraries that balance quiet reflection with brief cultural immersion.
  culinary: Donnamarie Garner favors simple, plant-forward meals—quinoa-black bean tacos with lime-coriander salsa, avocado toast sprinkled with sumac, and herbal teas—cooking at home with moderate skill
    while they occasionally treat themselves to fresh succulents for garnish.
  core: Donnamarie Garner blends a methodical, community-minded teaching ethos with a love for solitary creativity, often juggling structured lesson plans and spontaneous classroom tweaks, while they quietly
    battle occasional procrastination and impulse-buying succulents.
background:
  cultural: Donnamarie is a white American who grew up in a middle‑class family in the Las Vegas area, with roots in the Midwest that emphasized education and community service. Living in Clark County has
    exposed her to a highly diverse student population, shaping her inclusive teaching philosophy. She participates in local educator networks and the Nevada Education Association, and she values the blend
    of desert‑region lifestyle with the vibrant, multicultural atmosphere of southern Nevada.
attributes:
  skills: '["Lesson planning", "Differentiated instruction", "Classroom management", "Technology integration", "Positive reinforcement techniques", "Social‑emotional learning facilitation", "Parent communication",
    "Impromptu activity design", "Quiet classroom environment creation", "Data‑driven assessment"]'
  hobbies: '["Reading contemporary fiction", "Journaling", "Caring for desert succulents", "Hiking in Red Rock Canyon", "Knitting", "Landscape photography", "Meditation and yoga", "Solving crossword puzzles",
    "Playing acoustic guitar"]'
  career_goals: She aims to become a master teacher and eventually a lead or mentor teacher within Clark County, using her experience to guide new educators in creating inclusive, low‑stimulus classrooms.
    Donnamarie plans to pursue a master's degree in educational leadership to qualify for curriculum specialist or assistant principal roles, while also strengthening her time‑management skills through
    professional development workshops. Long‑term, she hopes to design district‑wide SEL programs that prioritize student well‑being and harmonious classroom cultures.
