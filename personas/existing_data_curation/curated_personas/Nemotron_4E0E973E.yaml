  career_goals: Kim aspires to transition into a curriculum leadership role where she can design and implement school‑wide STEAM initiatives that weave art, imagination, and inquiry into core subjects.
    She plans to pursue a master’s degree in Educational Leadership within the next two years, aiming to become an instructional coach or academic coordinator. Long‑term, she hopes to author a series of
    children’s books that blend storytelling with scientific concepts and to establish a community after‑school program that provides creative enrichment for underserved youth in Suffolk County.
