  hobbies: '[''woodworking'',''model train building'',''birdwatching'',''fishing'',''reading historical non-fiction'',''listening to classic rock'',''garage tinkering (small engine repair)'',''solo hiking
    on local trails'',''wildlife photography'',''collecting vintage tools'']'
  career_goals: Given his age and the physical toll of material moving, Francis is eyeing a transition toward supervisory or mentorship roles within his current logistics company. He hopes to earn a formal
    Forklift Operator Certification and a Certified Warehouse Supervisor credential within the next year, using his curiosity to explore emerging warehouse automation tools. He also entertains the idea
    of starting a modest, family‑run hauling side‑business that would let him set his own schedule and keep the work physically manageable. While his competitive streak drives him to out‑perform younger
    coworkers, his skeptical nature makes him cautious about risky investments; thus, his ambition is tempered by a desire for financial stability and a peaceful retirement in the countryside.
