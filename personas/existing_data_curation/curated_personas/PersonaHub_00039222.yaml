persona_description: A scientist or researcher who is interested in the study of infectious diseases and their seasonal patterns. They are particularly interested in the COVID-19 pandemic and its impact
  on India. They are looking for explanations and insights into the decline and subsequent rise of the second wave of COVID-19 in India, as well as the impact of humidity cycles on the incidence rate. They
  are also interested in the correlation between humidity and the incidence rate of COVID-19, and the potential impact of humidity on the COVID-19 pandemic in India.
