personas:
  professional: Lisa Cuevas, an aspiring preschool teacher, channels their methodical planning and vibrant imagination into leading daily circle time, where they weave bright stories that harmonize the
    rhythm of gospel hymns and mariachi tunes for their classmates.
  sports: Lisa Cuevas bursts onto the playground with boundless energy, lacing up tiny cleats for their Pharr Mini‑Soccer club in the spring, cheering on the Dallas Cowboys every Sunday, and clutching a
    tiny Astros cap during family baseball outings in the summer.
  arts: Lisa Cuevas spins colorful crayon circles on paper while humming gospel choruses, dancing to Selena’s Tejano hits, and mimicking the trumpet calls of Mariachi Vargas de Tecalitlán, a daily ritual
    that fuels their imagination and community storytelling.
  travel: Lisa Cuevas loves family road trips that whisk them from Pharr to the bright pink steps of the San Antonio River Walk, and they dream of a future balloon ride to Mexico City’s bustling markets,
    where they imagine tasting street‑cooked elote and listening to lively brass bands.
  culinary: Lisa Cuevas delights in scooping creamy mac and cheese, sprinkling shredded cheddar on collard greens, and carefully rolling tiny tamales with corn husks, proudly declaring their favorite ingredient
    to be the bright red bell pepper that adds a pop of color to every bite.
  core: Lisa Cuevas is a bright‑eyed five‑year‑old whose love for rhythmic stories, meticulous play planning, and stash‑filled piggy bank creates a whirlwind of imagination, and they balance this with a
    surprising penchant for order and glitter‑covered stickers.
background:
  cultural: Lisa comes from a Black family living in Pharr, Texas, a vibrant border town where African‑American and Hispanic cultures intertwine. At home she hears stories of her ancestors' resilience paired
    with Spanish lullabies, and she celebrates both Juneteenth and Cinco de Mayo with family gatherings, soulful music, and flavorful dishes like collard greens and tamales. Church services introduce her
    to gospel choirs, while community festivals showcase mariachi bands and Tejano dancers. This blend of traditions influences her love for bright colors, rhythmic movement, and communal storytelling,
    shaping her identity and creative expression.
attributes:
  skills: '["creative storytelling","toy organization by type and color","basic drawing and coloring","block construction and pattern building","shape and pattern identification","simple counting","coordinated
