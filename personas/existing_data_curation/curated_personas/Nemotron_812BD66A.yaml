  hobbies: '["reading picture books (fantasy and space)","drawing and painting with bright colors","block building and pattern creation","group games (tag, musical chairs)","dancing to gospel, hip‑hop,
    and Tejano music","helping with simple cooking tasks","collecting natural treasures (leaves, rocks)","pretend play (artist, teacher, astronaut)"]'
  career_goals: Lisa loves to dream about future roles that combine creativity, helping others, and discovery. She often says she wants to become an artist who paints bright murals that tell the stories
    of her neighborhood, a teacher who shares picture books with younger kids, or even an astronaut who explores new worlds. Her organized mindset fuels plans for big projects, while her kindness drives
    her ambition to make a positive impact on her community.
