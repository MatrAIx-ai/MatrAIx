  career_goals: As a 26‑year‑old manager, Emanuel aims to progress from his current role in a local retail/hospitality business to a regional management position within the next 4‑5 years. He plans to obtain
    a certification in project management (PMP) and eventually pursue a bachelor’s degree in business administration or an MBA. Long‑term, he envisions opening his own family‑owned boutique store or a small
    chain of specialty food shops in Appalachia, leveraging his hands‑on experience and community ties. He also hopes to mentor junior staff and champion workplace practices that balance efficiency with
    employee well‑being.
