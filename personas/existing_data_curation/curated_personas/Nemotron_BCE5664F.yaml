personas:
  professional: Joelle Jacques, a 24‑year‑old aspiring data analyst, leverages Excel, SQL, and Python to turn messy datasets into actionable insights while documenting processes in Notion with a mix of
    meticulous planning and spontaneous curiosity, and they thrive in small‑team environments where their competitive edge drives efficient, evidence‑based solutions.
  sports: Joelle Jacques, a dedicated weekend hiker, explores Loudoun County’s Blue Ridge trails with the Washington Area Hiking Club, follows the Washington Wizards’ season with a competitive analytic
    eye, and they maintain a low‑key fitness regimen that combines solo trail runs with occasional yoga, preferring solitary endurance over team sports.
  arts: Joelle Jacques channels their creative curiosity into digital illustration inspired by Studio Ghibli’s pastel palettes and the minimalist line work of artists like Hayao Miyazaki, spends evenings
    reading contemporary fiction by Sally Rooney and non‑fiction psychology by Daniel Kahneman, and unwinds with narrative‑driven games such as Disco Elysium and The Witcher 3, all while they occasionally
    binge‑listen to indie folk musicians Bon Iver and Phoebe Bridgers during late‑night sketch sessions.
  travel: Joelle Jacques prefers meticulously planned weekend getaways to nearby natural escapes like Shenandoah National Park, while dreaming of a solo hiking adventure in Iceland’s volcanic landscapes
    and a tech‑focused visit to Tokyo, balancing a modest travel budget with a desire for cultural immersion and occasional digital detox, and they often map itineraries in Notion to keep options open.
  culinary: Joelle Jacques, an intermediate home cook, experiments with dishes like Thai green curry infused with lemongrass and coconut milk, Mediterranean mezze platters featuring feta and sumac‑spiced
    olives, and a ramen‑inspired broth seasoned with miso and ginger, often documenting tweaks in their journal while they occasionally over‑spice meals in pursuit of bold flavor.
  core: Joelle Jacques is a calm, curious data‑driven thinker who balances meticulous planning with spontaneous creative bursts, yet they can’t resist a late‑night gaming session or a habit of over‑analyzing
    every coffee order.
background:
  cultural: Joelle is a Black American who grew up in a family with deep roots in the Mid‑Atlantic region, drawing cultural influences from both Southern African‑American traditions and the vibrant Black
    community of the Washington, D.C. metropolitan area. Family gatherings often feature soul food, gospel music, and storytelling that emphasize resilience and communal support. She has been exposed to
    contemporary Black art, jazz, hip‑hop, and spoken‑word poetry through local cultural festivals and community centers in Loudoun County. These experiences have shaped her identity, fostering a sense
    of pride in her heritage while encouraging a pragmatic, forward‑looking outlook.
