  career_goals: Joelle aims to complete a bachelor's degree in data science or a related field within the next two years, leveraging her existing analytical foundation. Her short‑term ambition is to secure
    an internship or entry‑level analyst position at a tech firm or governmental agency in the Washington, D.C. area, where she can apply her data‑driven insights to real‑world problems. In the longer term,
    she aspires to become a senior data analyst or data scientist, leading independent research projects and eventually establishing her own consultancy that helps small businesses make evidence‑based decisions.
    Her career path reflects a blend of curiosity, practicality, and a desire for personal achievement.
