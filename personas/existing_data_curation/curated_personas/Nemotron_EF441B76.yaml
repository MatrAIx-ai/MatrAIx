personas:
  professional: Adilene, a one‑year‑old budding sensory explorer, is already practicing the field of early developmental learning, showcasing key skills in tactile curiosity, cause‑and‑effect play, and
    practical problem‑solving, while their relaxed, flexible attitude lets them thrive in spontaneous group play.
  sports: Adilene, an energetic one‑year‑old, loves crawling to the rhythm of marimba music while watching the Washington Wizards on family TV nights, participates in a parent‑child baby gymnastics class
    on Saturdays, and cheers for the Washington Capitals during winter, reflecting a sociable, flexible approach to fitness that favors playful movement over structured training.
  arts: Adilene, a one‑year‑old with a keen ear for rhythm, enjoys listening to lively marimba tunes from Grupo Guatemala, upbeat songs by Carlos Vives, and colorful cartoons like Moana, often joining in
    with giggles and hand‑clapping, which showcases their outgoing, cooperative nature and love for communal artistic experiences.
  travel: Adilene, a curious infant, has already experienced family trips to Washington, D.C.’s Smithsonian museums, a weekend getaway to Virginia Beach, and a summer vacation in Orlando’s theme parks,
    favoring relaxed itineraries that accommodate nap times and occasional spontaneous stops at local markets for sweet plantain bites.
  culinary: Adilene, a one‑year‑old developing a palate, prefers soft mashed sweet potatoes, ripe bananas, lightly pureed pupusa cheese fillings, and sweet plantain mash seasoned with a pinch of cinnamon,
    demonstrating a practical yet adventurous taste that balances familiar comfort foods with subtle new flavors.
  core: Adilene is a bright, socially‑savvy toddler who blends boundless curiosity with an easygoing, slightly disorganized nature, delighting in group play, music, and the occasional mess of spilled milk
    that they giggle over.
background:
  cultural: Adilene is raised in a Guatemalan‑American household in Hyattsville, Maryland. At home, Spanish is spoken alongside English, and she is exposed to Guatemalan traditions such as celebrating Día
    de los Muertos, enjoying foods like pupusas and sweet plantain, and listening to Marimba music. Family gatherings emphasize respect, communal meals, and storytelling, giving her a strong sense of heritage
    while she also participates in the diverse cultural fabric of Prince George’s County.
