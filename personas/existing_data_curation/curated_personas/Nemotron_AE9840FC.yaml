personas:
  professional: Kyle Abhau, a budding naturalist, spends afternoons chasing ladybugs in the maple woods while asking endless 'why' questions, turning backyard exploration into a miniature research expedition
    with a crayon-drawn notebook.
  sports: Kyle Abhau joins the town's toddler tumble-and-roll class at the community center, proudly wears a Portland Sea Dogs cap, and kicks a soft foam soccer ball with the Maine Sprouts toddler soccer
    club during the spring Little Sprinters league, always cheering on the Boston Red Sox on family TV nights.
  arts: Kyle Abhau enthusiastically participates in weekly library storytimes featuring folk tales, splashes finger paints to recreate melodies from the local folk band The Deerhorn Trio, and recites verses
    from Dr. Seuss while dancing to the rhythmic clacking of wooden spoons in family jam sessions.
  travel: Kyle Abhau loves weekend family road trips to Acadia National Park's tide pools, ferry rides to Bar Harbor, and sunny days at Old Orchard Beach, while also eagerly packing for a summer visit to
    Boston's Children's Museum, though travel plans often depend on Mom's calendar and the seasonal maple-sugaring schedule.
  culinary: Kyle Abhau delights in fluffy pancakes drizzled with locally harvested maple syrup, devours tiny blueberry muffins with crumbly tops, proudly gnaws on fresh apple slices dipped in caramel, yet
    frequently refuses the green beans on their plate, claiming they're too crunchy.
  core: Kyle Abhau, a three-year-old whirlwind of curiosity and sociable energy, mixes relentless question-asking with a love for maple-scented adventures, occasional worry, and a delightful mess of crayons
    and pancakes.
background:
  cultural: Kyle is being raised in Athens, a small town in Somerset County, Maine, within a predominantly white, close‑knit New England community. Local culture emphasizes appreciation for nature, seasonal
    outdoor activities, and community gatherings such as fairs, library storytimes, and holiday festivals. His family participates in regional traditions like maple sugaring celebrations and town parades,
    which expose him to simple folk music, local crafts, and a strong sense of neighborly cooperation. These cultural influences reinforce his sociable, cooperative nature and his curiosity about the natural
    world and community life.
attributes:
  skills: '["Basic spoken language (short sentences)","Color, shape, and animal identification","Fine‑motor coordination (crayon drawing, block stacking)","Imaginative role‑play (firefighter, artist)","Early
    social cooperation (sharing, playing with peers)","Sensitivity to routine changes and mild separation anxiety"]'
  hobbies: '["Outdoor exploration (collecting leaves, stones, sticks)","Storytime books with bright illustrations","Crayon drawing and coloring","Block tower construction","Dancing to music","Group play
    at the park","Playing with toy fire trucks","Simple drumming on household objects"]'
  career_goals: Kyle frequently talks about wanting to become a firefighter, a painter, or a musician when he grows up. He is drawn to the bright colors of fire trucks, the act of creating pictures, and
    the joy of making music, reflecting his love of art, desire to help others, and need for flexible, expressive roles. These ambitions are playful and age‑appropriate, showing his early self‑concept of
    being both caring and creative.
