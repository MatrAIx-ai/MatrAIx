  career_goals: Cristian envisions a future where he blends his love for storytelling, technology, and his cultural roots into a career in digital media production or communications. He aims to attend a
    university program in media studies or communications to refine his video‑editing, script‑writing, and social‑media strategy skills. Long‑term, he hopes to launch a bilingual YouTube channel that celebrates
    Mexican traditions, highlights local San Antonio talent, and provides a platform for youth empowerment. Additionally, he wants to work with community organizations to organize cultural events, leveraging
    his organizational abilities and sociable nature. He seeks a stable, structured career that offers both creative expression and tangible community impact.
