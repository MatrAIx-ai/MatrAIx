  career_goals: Scott aims to become a senior tool designer and eventually open his own boutique die‑making shop that serves niche aerospace and medical device manufacturers. He plans to earn a journeyman
    certification through a community college program, integrate additive manufacturing to prototype complex dies, and mentor the next generation of craftsmen in his region. In the next five years, he hopes
    to lead a small team, reduce production lead times by 20% through process optimization, and achieve recognized status in local industry associations.
