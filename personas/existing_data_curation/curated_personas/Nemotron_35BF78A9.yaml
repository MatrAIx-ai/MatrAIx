personas:
  professional: Sharell Boykin is a seasoned administrative specialist in the DC arts community, leveraging their CAP credential, advanced Office Suite mastery, and basic Adobe skills to orchestrate seamless
    museum events, while they are the go‑to liaison for artists, donors, and executives, positioning them for a future office manager role.
  sports: Sharell Boykin follows the Washington Capitals, Washington Wizards, and DC United with fervor, plays in a weekend urban hiking group that maps historic Silver Spring neighborhoods, and joins a
    Potomac River kayaking club each summer, while their competitive streak pushes them to train for a local 5K each spring, and they relish the camaraderie of post‑race coffee.
  arts: Sharell Boykin immerses themselves in the DC cultural pulse, attending performances by the Kennedy Center’s National Ballet, discussing works of contemporary painter Julie Mehretu at gallery openings,
    and swapping insights on novels by Chimamanda Ngozi Adichie with their book club, while their own watercolor landscapes and wheel‑thrown pottery reflect a blend of modernist influences and tactile exploration,
    and they eagerly share these pieces at community festivals.
  travel: Sharell Boykin prefers curated cultural trips over spontaneous getaways, having toured the Louvre in Paris, the Getty in Los Angeles, and the historic streets of Savannah, while their wish list
    includes a month‑long art residency in Kyoto and a heritage tour of Marrakech, often planning each itinerary with Asana to balance work commitments, and they relish the anticipation of each new museum
    opening.
  culinary: Sharell Boykin delights in hosting globally themed dinner parties, expertly preparing Moroccan tagine with preserved lemons and cilantro, Thai green curry with kaffir lime leaves, and a classic
    Italian risotto using Carnaroli rice and dry white wine, though their habit of over‑seasoning with smoked paprika sometimes overwhelms guests, and they occasionally adjust the seasoning after feedback.
  core: Sharell Boykin blends meticulous administrative prowess with an insatiable curiosity for the arts, turning every networking event into a performance, yet their penchant for splurging on limited‑edition
    prints and occasional over‑cooking keep them grounded in both ambition and imperfection, and they often laugh at their own quirks.
background:
  cultural: Sharell grew up in a middle‑class, predominantly white neighborhood on the East Coast, where she was exposed to mainstream American cultural values of independence, self‑reliance, and community
    involvement. Her bachelor's degree in arts and humanities deepened her appreciation for diverse artistic expressions and critical thinking. Living in Silver Spring, Montgomery County—a multicultural
    suburb of Washington, D.C.—has broadened her perspective, offering regular access to a rich tapestry of cultural events, international cuisines, and a wide range of social causes. This environment,
    combined with her personal curiosity, has fostered an openness to unconventional ideas and a strong commitment to supporting local arts and community initiatives while maintaining her professional reliability
    and organization.
attributes:
