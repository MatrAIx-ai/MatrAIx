    ''Project Management Tools (Asana, Trello)'']'
  hobbies: '[''Visiting museums and galleries'', ''Attending theater performances and artist talks'', ''Watercolor painting'', ''Pottery'', ''Book club participation'', ''Hosting themed dinner parties'',
    ''Volunteering for community art festivals'', ''Urban hiking and exploring historic neighborhoods'', ''Listening to podcasts on psychology and technology'']'
  career_goals: Sharell aims to advance from a secretary/administrative assistant role to an office manager or executive assistant position within a cultural institution such as a museum, gallery, or nonprofit
    arts organization. She aspires to lead larger projects, oversee staff, and shape the administrative strategy of an arts-focused entity. To support this ambition, she plans to pursue a master's degree
    in nonprofit management or an MBA with an emphasis on arts administration. Additionally, she envisions one day establishing her own consulting firm that offers specialized administrative and event coordination
    services to small arts collectives and community organizations, allowing her to blend her organizational talents with her passion for creativity.
