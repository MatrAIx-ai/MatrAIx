persona_description: A neuroscientist who specializes in the study of familial amyotrophic lateral sclerosis (ALS) and its molecular mechanisms. Dr. Hart's research focuses on the identification and characterization
  of mutations in the gene that directs the production of copper-zinc superoxide dismutase (SOD1) and the interactions among SOD1 protein complexes in familial ALS. He is also interested in the development
  of new treatments for ALS and other neurodegenerative diseases.
