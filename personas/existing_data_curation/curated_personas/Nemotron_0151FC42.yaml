  hobbies: '[''Gardening (herbs and tropical plants)'', ''Traditional cooking and recipe experimentation'', ''Watercolor painting of local scenes'', ''Knitting and crocheting'', ''Listening to bomba, plena,
    and boleros'', ''Reading Puerto Rican poetry and literature'', ''Participating in community art and cooking contests'', ''Walking historic neighborhoods'', ''Attending church services and cultural festivals'']'
  career_goals: Although retired, Maria is determined to leave a lasting cultural legacy. She aims to compile a handwritten family cookbook that records cherished recipes and the stories behind them, and
    to volunteer as a cultural guide for visitors to Ponce, sharing insights into the city’s history, art, and traditions. Maria also hopes to mentor younger community members in watercolor painting and
    traditional crafts, using her competitive experience to inspire excellence. She plans to continue learning new artistic techniques, such as silk‑screen printing, and to document oral histories of her
    neighborhood for the local museum, ensuring future generations appreciate Puerto Rico’s rich heritage.
