    ''Abstract conceptual thinking'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction and philosophy'', ''Writing poetry (Spanish & English)'', ''Cooking Mexican cuisine'', ''Solving jigsaw puzzles'',
    ''Herb gardening'', ''Hiking local trails'', ''Small-group book club'', ''Photography workshops'', ''Calligraphy practice'', ''Listening to world music'']'
  career_goals: Driven by her curiosity and competitive nature, Karla aims to transition from a front‑line representative to a strategic leadership role within the contact‑center ecosystem. Her short‑term
    goal is to become a Customer Experience Team Lead, where she can design performance metrics, mentor agents, and introduce novel service‑design concepts. Long‑term, she aspires to combine her creative
    talents with her service expertise by moving into UX research or instructional design, crafting engaging training modules and customer‑journey maps. She plans to pursue certifications in Customer Experience
    Management and Human‑Centered Design, and eventually launch a bilingual blog that explores innovative communication strategies across cultures.
