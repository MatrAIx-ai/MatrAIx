personas:
  professional: Margaret Suber, a miniature classroom organizer in her preschool's play corner, uses their methodical sorting of crayons and blocks to keep the environment predictable and structured, showing
    early signs of reliability and assertiveness when guiding peers.
  sports: Margaret Suber, a budding soccer enthusiast in the Tiny Tots Soccer Club, practices dribbling with a small ball at the community park, cheers for the New York Yankees during family game nights,
    and prefers structured, short play sessions that fit their need for predictability.
  arts: Margaret Suber, an avid fan of Eric Carle's picture books and Disney's animated classics, spends afternoons drawing bright animals with crayons, mimicking Carle's collage style, and repeatedly watches
    "Sesame Street" for its rhythmic songs, reflecting their love for structured, colorful creativity.
  travel: Margaret Suber, a curious explorer who has visited Disneyland in California and the Family Adventures Museum in Washington, dreams of building a sandcastle on the beaches of Hawaii while preferring
    trips with detailed itineraries that ease their worry about the unknown.
  culinary: Margaret Suber, a picky but adventurous eater, gravitates toward creamy macaroni and cheese, chicken nuggets, and apple slices, proudly arranges their own lunchbox using silicone compartments,
    and insists on a side of peas for the bright green color that comforts them.
  core: Margaret Suber, the four-year-old who meticulously lines up stuffed animals by size each night, worries about the slightest schedule change, yet finds joy in the comforting rhythm of routine.
background:
  cultural: Margaret comes from a white, middle‑class family living in Brooklyn, New York. Her household blends typical Anglo‑American customs—Sunday family meals, holiday celebrations such as Christmas
    and Thanksgiving, bedtime story reading, and occasional visits to a local church—with the multicultural influences of her diverse neighborhood. She attends a neighborhood preschool that emphasizes routine,
    cooperation, and respect for different cultures, which subtly shapes her worldview while maintaining her family's core traditions.
attributes:
  skills: '["basic reading of picture books", "counting to 20", "recognizing colors and shapes", "fine-motor coordination with crayons and scissors", "following multi-step routines", "sorting and categorizing
    objects"]'
  hobbies: '["building block structures", "solving age‑appropriate jigsaw puzzles", "drawing and coloring within lines", "listening to library story time", "organizing sticker albums", "participating in
    small playdates"]'
  career_goals: Although still a preschooler, Margaret frequently talks about wanting to help people in a structured setting. She imagines becoming a teacher who organizes classroom activities, a librarian
    who keeps books in order, or a veterinarian who cares for animals. She is drawn to roles that combine caring with clear procedures and often says she wants to "make sure everything is neat and safe"
    when she grows up.
