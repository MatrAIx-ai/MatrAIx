personas:
  professional: Phyllis Wade, a budding early‑childhood digital content creator, curates short videos of family gatherings and soulful lullabies, turning spontaneous giggles into engaging clips while they
    apply a meticulous play schedule and a naturally competitive drive to earn the most likes among baby‑influencer peers.
  sports: Phyllis Wade, a budding gymnast who attends weekly toddler gymnastics at the community center, loves cheering for the Seattle Seahawks and Seattle Sounders, and they approach fitness with boundless
    energy and a competitive edge, often racing peers to the slide during playdates.
  arts: Phyllis Wade, a music‑loving infant who sways to gospel lullabies of Aretha Franklin and Stevie Wonder during family gatherings, delights in the rhythmic chants of local choirs, and they express
    budding creativity through finger‑painting sessions inspired by community art workshops.
  travel: Phyllis Wade, a curious explorer who has visited the Seattle Space Needle and nearby Mount Rainier on family day trips, dreams of a future trip to Disneyland, and they prefer short car rides filled
    with familiar songs, balancing excitement for new scenery with the comfort of routine.
  culinary: Phyllis Wade, a foodie in training who devours sweet‑potato puree, creamy mac & cheese, and mashed avocado, loves the aroma of cinnamon and nutmeg in the family’s collard greens, and they try
    to imitate cooking by mixing ingredients in a toy kitchen, though often they end up with a delightful mess.
  core: Phyllis Wade, a one‑year‑old cultural dynamo, blends early curiosity, organized play, a competitive spark, and resilient calm into every giggle, piggy‑bank drop, and new taste, and they delight
    in turning each moment into a tiny achievement.
background:
  cultural: Phyllis is raised in a Black family that values community, music, and intergenerational storytelling. In Renton, WA, her family blends Southern African‑American traditions—such as gospel music,
    soulful cooking, and family reunions—with the multicultural vibe of the Pacific Northwest. Weekend visits to local churches and community centers expose her to soulful choirs, spoken‑word poetry, and
    cultural festivals that celebrate Black heritage alongside the diverse cultures of King County. These experiences shape her sense of identity, fostering a deep appreciation for rhythm, collective celebration,
    and the resilience embedded in her cultural roots.
