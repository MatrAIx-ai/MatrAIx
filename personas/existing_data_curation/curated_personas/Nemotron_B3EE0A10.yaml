  hobbies: '[''Watercolor painting'', ''Traditional cooking (pupusas, tamales)'', ''Salsa and cumbia dancing'', ''Book club reading'', ''Herb gardening'', ''Traveling to cultural festivals'', ''Collecting
    folk art'']'
  career_goals: Although retired, Anaiss is motivated to leave a lasting cultural legacy. She plans to compile a family memoir that intertwines Salvadoran history with her personal journey, develop a monthly
    art class at the local community center, and partner with Bay Area Salvadoran cultural organizations to curate an exhibition of traditional crafts. She also hopes to travel to El Salvador to document
    oral histories and to mentor her grandchildren in preserving their heritage while staying open to learning new artistic techniques.
