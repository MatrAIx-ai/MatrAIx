persona_description: A psychologist or researcher interested in the genetic and environmental factors influencing individual differences in cognitive abilities, particularly in verbal ability, learning,
  and fluency. This person is likely to be interested in studies on the heritability of cognitive abilities and the role of genetics in shaping these abilities. The person may also be interested in examining
  the shared and unique genetic influences on different cognitive phenotypes and the implications of these findings for understanding the etiology of cognitive differences.
