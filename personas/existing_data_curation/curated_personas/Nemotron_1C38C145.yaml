personas:
  professional: Hunter Merz, a diligent facilities maintenance specialist with ten years of systematic cleaning, safety compliance, and minor repairs, leverages their methodical mindset and art appreciation
    to pursue a supervisory role and ultimately launch an eco‑focused cleaning firm serving schools and cultural venues.
  sports: Hunter Merz follows the Cleveland Browns and Ohio State Buckeyes fervently, participates in a local adult softball league on Saturdays, and maintains fitness through daily walks to the vegetable
    garden and occasional hikes in Hocking Hills.
  arts: Hunter Merz, an avid sketcher of Ohio’s countryside and admirer of Edward Hopper and contemporary muralist Jeff Soto, frequents the Columbus Museum of Art, attends philosophy podcasts like “Philosophize
    This!”, and organizes small board‑game nights that double as informal art‑themed gatherings.
  travel: Hunter Merz prefers well‑planned weekend road trips to nearby natural retreats such as Hocking Hills and historic sites like Gettysburg, while dreaming of a spring visit to Florence to study Renaissance
    frescoes, balancing family constraints with a love for cultural immersion.
  culinary: Hunter Merz enjoys farm‑to‑table cooking, often preparing roasted beets, kale sautéed with garlic, and homemade sourdough using vegetables from their garden, favors seasonal dishes like pea‑mint
    risotto, yet occasionally relies on quick pizza nights when garden chores pile up.
  core: Hunter Merz blends meticulous work habits with a quiet curiosity for art and nature, channeling steadfast reliability into both career ambitions and a modest, eco‑conscious lifestyle, while occasionally
    succumbing to board‑game‑night indulgences.
background:
  cultural: Hunter grew up in a close‑knit Midwestern community in Wayne County, Ohio, where values such as hard work, modesty, and community responsibility are deeply ingrained. His family background reflects
    generations of labor‑oriented occupations, emphasizing reliability and self‑reliance. While primarily rooted in the region's Protestant cultural traditions, he respects the diversity of local faiths
    and community events. This upbringing shapes his pragmatic outlook, his dedication to family life, and his appreciation for the understated beauty found in everyday surroundings—from the craftsmanship
    of historic farmhouses to the murals adorning local schools.
attributes:
  skills: '[''Commercial cleaning protocols'', ''Building maintenance'', ''Health and safety compliance'', ''Inventory management'', ''Time management'', ''Basic carpentry'', ''Minor plumbing troubleshooting'',
    ''HVAC basics'', ''Customer service in small teams'', ''Art appreciation and preservation basics'']'
  hobbies: '[''Sketching and drawing'', ''Visiting art galleries and museums'', ''Reading science‑fiction and philosophy'', ''Gardening'', ''Hiking local parks'', ''DIY home improvement projects'', ''Listening
    to art and innovation podcasts'', ''Playing board games with close friends'']'
  career_goals: Hunter aims to leverage his methodical work style and growing knowledge of facilities to move into a supervisory role, such as lead janitor or facilities coordinator, within the next three
    years. He plans to obtain OSHA certification and a green‑cleaning credential, which will position him to eventually become a facilities manager for a community‑center or museum—combining his reliability
    with his love for art. Long‑term, he dreams of launching a small, environmentally‑focused cleaning business that serves local schools and cultural venues, providing stable income for his family while
    fostering community pride.
