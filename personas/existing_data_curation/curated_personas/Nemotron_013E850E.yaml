  career_goals: Even in retirement, Zane remains motivated to expand his knowledge and give back to his community. His primary ambition is to complete a series of paintings that document the industrial
    heritage of Beaver County and to organize a traveling exhibition that brings these works to schools and senior centers across western Pennsylvania. He hopes to launch a senior‑led community art lab
    that encourages experimental projects and to collaborate with contemporary artists on mixed‑media installations that blend traditional techniques with modern technology. Zane also aims to serve as a
    docent for the New Brighton Historical Museum, sharing his love of local history and art with younger generations. Securing a grant for a community art grant, mentoring emerging senior artists through
    weekly workshops, and traveling to major art hubs such as New York, Washington, D.C., and European museums to deepen his appreciation of contemporary and avant‑garde art are key goals that reflect his
    balance of personal growth, social contribution, and desire to stay intellectually engaged.
