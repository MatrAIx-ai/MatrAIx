personas:
  professional: Zane French, a retired steel‑plant production supervisor turned community art catalyst, leverages three decades of lean‑manufacturing expertise and a lifelong curiosity for mixed‑media to
    orchestrate senior art workshops, curate traveling industrial‑heritage exhibitions, and mentor emerging creators with a blend of structured planning and spontaneous experimentation.
  sports: Zane French energizes mornings with the New Brighton walking club, cheerfully follows the Pittsburgh Steelers and Penguins on game nights, joins bridge tournaments at the senior center as a strategic
    mental sport, and occasionally partakes in light gardening as a low‑impact fitness routine.
  arts: Zane French immerses himself in oil and watercolor creation inspired by 19th‑century American landscapes and contemporary mixed‑media practitioners like Anish Kapoor, frequents the Carnegie Museum
    of Art and the experimental Mattress Factory shows, curates small exhibitions featuring local seniors, and documents scenes through a Nikon D3500 to reference in his industrial‑heritage series.
  travel: Zane French prefers thoughtfully planned trips that blend art pilgrimage with modest adventure, has visited the Metropolitan Museum of Art in New York, toured the Smithsonian American Art Museum
    in Washington, D.C., dreamed of exploring the Musée d’Orsay in Paris, and regularly takes weekend drives to Fallingwater and the Pennsylvania countryside for plein‑air sketching.
  culinary: 'Zane French enjoys cooking simple yet flavorful meals such: herb‑roasted chicken with rosemary, grilled salmon with lemon‑dill sauce, and homemade pierogi stuffed with potato and cheese, employs
    garden‑fresh basil and thyme in his sauces, rates his culinary skill as intermediate, and often hosts potluck gatherings where his art‑themed dishes become conversation starters.'
  core: Zane French is a socially vibrant, curiosity‑driven senior who fuses steel‑plant precision with artistic experimentation, channels disciplined budgeting into community art advocacy, and balances
    structured health routines with occasional indulgent quirks.
background:
  cultural: Zane grew up in the Rust Belt town of New Brighton, Pennsylvania, in a family of German‑Irish descent that worked in the region’s steel and manufacturing sectors. The local culture emphasized
    hard work, community solidarity, and respect for tradition, while post‑war prosperity introduced new educational opportunities and exposure to broader cultural currents. His upbringing combined a modest,
    middle‑class work ethic with an appreciation for the arts fostered by school programs and the nearby Pittsburgh art scene. Over the decades, he has retained a strong sense of local identity, participating
    in community festivals, church activities, and senior groups, while also embracing diverse cultural experiences through travel and art appreciation.
