  career_goals: At 50, Clovis aims to transition into a senior architect or technical leadership role where he can shape strategic technology decisions and guide large‑scale digital transformation projects.
    He plans to earn an AWS Solutions Architect Professional certification and complete a bachelor’s degree in Computer Science to formalize his knowledge. Long‑term, he envisions founding a consulting
    firm that helps midsize companies in the Southeast adopt cloud‑native solutions, with a focus on increasing representation of Black engineers. He also wants to launch a mentorship program for high‑school
    students in Bessemer, leveraging his competitive spirit to inspire the next generation while giving back to his community.
