persona_description: A scientist or engineer with expertise in plant breeding and precision agriculture, particularly in the field of robotics and image processing. This person is interested in developing
  high-throughput field-based phenotyping systems that can measure and analyze multiple experimental field plots from images taken by aircraft or other platforms. They are interested in using image-based
  methods to capture and analyze the variation in ground cover, canopy temperature, and three-dimensional measures of crop lodging in wheat. This person has experience with robotic helicopter technology,
  autonomous flight control, software development, and image processing, and is looking for ways to improve the accuracy and efficiency of their system.
