persona_description: A health policy analyst who is interested in understanding the utilization of health services within the maternal and child population, particularly those at high risk due to low socioeconomic
  status or chronic medical conditions. This person is likely to have knowledge and expertise in health care financing, utilization, and policy analysis, and may be interested in how public programs, such
  as Medicaid and SCHIP, impact access to health care for children. They may also be interested in exploring the potential impact of changes in health care financing policies on the utilization and outcomes
  of health services for this population.
