  career_goals: Margot aims to progress to a senior engineering leadership role, such as Director of Operations or Safety, where she can drive company‑wide sustainability and safety initiatives. She plans
    to earn a Master’s in Engineering Management, expand her influence through professional societies like the American Society of Safety Professionals, and mentor the next generation of women engineers.
    Ultimately, she envisions establishing a consulting practice focused on integrating health, safety, and productivity solutions for mid‑size manufacturers in the Mid‑Atlantic region, while contributing
    to policy development on workplace safety.
