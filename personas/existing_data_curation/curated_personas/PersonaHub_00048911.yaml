persona_description: A military intelligence officer with expertise in electronic signal processing and analysis, particularly in the identification and recognition of electromagnetic signals and emissions.
  This individual has a deep understanding of the complexities of real-time signal recognition in an environment with high pulse densities and complex modulations, and is skilled in developing and implementing
  advanced signal processing algorithms to overcome these challenges. They have experience working with a variety of ESM systems and have a keen interest in understanding the evolving threat landscape and
  how to best prepare for future challenges.
