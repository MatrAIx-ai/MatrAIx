personas:
  professional: Kelly Ruff is a freelance interior painter and paper‑hanging specialist who blends meticulous surface preparation and eco‑friendly low‑VOC paints with inventive faux finishes, using their
    practical curiosity to troubleshoot on‑site challenges while their spontaneous, collaborative demeanor keeps clients satisfied even when deadlines drift.
  sports: Kelly Ruff enjoys seasonal outdoor activity—hiking the Northwoods trails in summer, kayaking the nearby lakes in spring, and cross‑country skiing in winter—while cheering on the Green Bay Packers
    and the Milwaukee Bucks, and they belong to the Antigo Outdoor Recreation Club for group hikes and the local kayaking association.
  arts: Kelly Ruff channels creative energy into watercolor sketches of forest vistas, finds solace listening to folk icons Gillian Welch and indie singer‑songwriter Sufjan Stevens, unwinds with Agatha
    Christie mystery novels, and occasionally volunteers at the Antigo Community Theatre for productions featuring local talent such as Mary McCormick.
  travel: Kelly Ruff favors spontaneous weekend road trips—recently exploring Door County’s lighthouses, the Upper Peninsula’s Pictured Rocks, and a quick jaunt to Chicago’s art districts—while dreaming
    of an Icelandic adventure to photograph waterfalls, all planned on a modest budget that balances time at home with the craving for fresh scenery.
  culinary: Kelly Ruff enjoys cooking hearty Midwestern fare—pan‑seared trout with lemon‑dill sauce, wild mushroom risotto, and potato pierogi stuffed with caramelized onions—boasting an intermediate skill
    set that lets them experiment with seasonal ingredients such as spruce tips and locally foraged berries, while they relish dining at farm‑to‑table eateries like the Lakeside Café for their fresh perch
    and heirloom tomato salads.
  core: As a 36‑year‑old painter‑craftsperson, Kelly Ruff blends a love of nature and community with a spontaneous, detail‑driven work ethic, but their tendency to worry and occasional deadline procrastination
    are offset by a relentless curiosity for new techniques and a habit of collecting vintage paint swatches for inspiration.
background:
  cultural: Kelly grew up in Antigo, Wisconsin, a small‑town community with deep Midwestern values of hard work, modesty, and neighborly cooperation. Her family’s roots trace back to German and Polish immigrants
    who settled in the region, fostering an appreciation for craftsmanship and self‑reliance. The local culture, shaped by seasonal county fairs, church gatherings, and a close connection to the surrounding
    forests and lakes, has instilled in her a respect for nature and community involvement. This background informs her pragmatic yet curious outlook, her cooperative demeanor, and her desire to contribute
    positively to the people and environment around her.
