  hobbies: '[''Hiking in North Woods'', ''Kayaking on local lakes'', ''Birdwatching'', ''Watercolor painting'', ''Reading mystery novels'', ''DIY home projects'', ''Volunteer at community center'', ''Collecting
    vintage paint swatches'', ''Spontaneous road trips'', ''Listening to folk and indie music'']'
  career_goals: Kelly aims to transition from a contract painter to owning a modest, locally‑focused painting and paper‑hanging business that emphasizes eco‑friendly, low‑VOC paints and personalized service.
    She hopes to earn a reputable certification from a regional trade association, expand her portfolio to include small mural projects for community spaces, and eventually mentor a small team of apprentices.
    While she values financial stability, she also prioritizes a flexible schedule that allows her to maintain her creative pursuits and avoid the stress of rigid deadlines.
