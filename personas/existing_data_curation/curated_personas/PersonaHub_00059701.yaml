persona_description: A short fiction writer who is interested in applying new ideas of structure, character, plot and language to their short stories and learning how to make them have a larger payoff and
  a sense of emotional resolution. They have a special appreciation for the limitlessness of a great short story's artistic and emotional power and are looking for tools to get boundless territory out of
  a single grain of sand. They have a background in creative writing and have published a short story collection, Death is Not an Option, which received the Rome Prize in Literature from the American Academy
  of Arts and Letters and a Creative Arts Fellowship from the Radcliffe Institute for Advanced Study.
