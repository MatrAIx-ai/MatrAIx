personas:
  professional: Raissa Smith, a 98‑year‑old former clinic office manager, channels decades of meticulous record‑keeping, budgeting, and volunteer coordination into leading senior‑center activities, where
    they ensure every event runs on schedule with compassionate assertiveness.
  sports: Raissa Smith enjoys leisurely walks along the Jupiter shoreline, still follows the Miami Marlins baseball season, attends occasional senior‑center bridge tournaments for mental agility, and supports
    the Miami Heat with a well‑worn jersey they wear on game days when health allows.
  arts: Raissa Smith, an avid listener of classic soul legends like Aretha Franklin and jazz greats such as John Coltrane, sings in the church choir, quilts intricate blankets using traditional block patterns
    that echo family stories, and devours historical fiction by authors such as Isabel Wilkerson and Tayari Jones.
  travel: Raissa Smith prefers low‑impact travel that balances comfort with curiosity, often revisiting family roots in Savannah, Georgia during summer reunions, taking annual short cruises to the Bahamas,
    and dreaming of a gentle road trip along the historic Florida Keys to enjoy seaside walks without straining their mobility.
  culinary: Raissa Smith delights in cooking soulful meals like collard greens seasoned with smoked turkey, sweet potato pie spiced with nutmeg, and cornbread baked with fresh rosemary from her garden,
    often sharing handwritten recipe cards at church potlucks.
  core: Raissa Smith is a disciplined yet warm‑hearted 98‑year‑old who blends precise organization with community devotion, finding joy in herbs, quilts, choir harmonies, and meticulous ledgers while occasionally
    misplacing a pair of glasses on the kitchen counter.
background:
  cultural: Raissa is a first-generation African-American Floridian whose roots trace back to the Jim Crow South. Her parents were sharecroppers who moved to Florida during the Great Migration, seeking
    better opportunities. Growing up during segregation, she experienced both the hardship of racial discrimination and the strength of tightly knit Black churches and community groups. Over the decades,
    she has been an active member of her local Baptist congregation, a participant in civil rights era voter registration drives, and a mentor to younger members of the African-American senior community.
    Her cultural identity is shaped by oral storytelling, family culinary traditions, and a deep respect for the collective resilience of her community.
