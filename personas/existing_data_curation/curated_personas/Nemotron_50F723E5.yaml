  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Church choir", "Listening to jazz and soul music", "Walking on the beach", "Playing bridge", "Cooking traditional Southern dishes"]'
  career_goals: Although retired, Raissa remains driven to leave a lasting legacy for her family and community. She aims to document her family's oral history, mentor her grandchildren and great-grandchildren,
    and continue coordinating senior-center activities to promote social connection. She also aspires to maintain her independence by staying physically active, managing her health proactively, and ensuring
    her estate is organized for future generations.
