persona_description: A historian or genealogist who is interested in the history of the Michigan Veterans Home, specifically the Soldiers' and Sailors Home, and its impact on the lives of veterans and their
  families. They are interested in the development of the facility, its role in providing care and support for veterans, and the significance of the cemetery. They are also interested in the digitization
  and availability of records related to the facility, such as the online index to residents and the transcribed burials from the Soldier's Home Cemetery.
