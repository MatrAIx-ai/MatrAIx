persona_description: A historian who specializes in the study of Islamic ceramics, particularly the development and evolution of ceramics in the Middle East and its influence on Europe. Her research interests
  include the history of ceramics, the influence of Islamic art and design on Western art, and the preservation and conservation of ceramic art. She is particularly interested in the techniques and styles
  of faience, fritware, underglaze painting, and other decoration techniques used in Islamic ceramics. She is also knowledgeable about the impact of Islamic ceramics on Western art and design, and the role
  of Islamic art and design in the development of Western art.
