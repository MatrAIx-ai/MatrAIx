persona_description: A research engineer who specializes in the investigation of flow patterns in combustion chambers of gasoline direct injection engines using experimental techniques such as Particle
  Image Velocimetry and Laser Doppler Anemometry, and the development of computational fluid dynamics models to validate and compare the results. They are interested in developing the ports and combustion
  chamber of G-DI engines by accurately predicting the air motion created within the induction stroke using the CFD code VECTIS.
