  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Photography'', ''Reading literature and poetry'', ''Book club participation'', ''Herb gardening'', ''Cooking international
    recipes'', ''Museum docent volunteering'', ''Hiking in local nature preserves'', ''Attending live music concerts'', ''Knitting and quilting'']'
  career_goals: Approaching the next phase of her career, Stefanie aims to transition into a senior advisory role where she can mentor emerging buyers and shape the company’s long‑term sourcing strategy.
    She is passionate about championing sustainable and ethically sourced product lines, integrating artisanal craftsmanship into mainstream retail. Over the next five years, she hopes to lead a cross‑functional
    sustainability initiative, expand the company’s portfolio of locally made goods, and eventually serve on the board of a regional arts council, leveraging her buying expertise to support cultural institutions.
