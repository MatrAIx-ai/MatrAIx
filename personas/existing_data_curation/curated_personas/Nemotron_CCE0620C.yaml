personas:
  professional: Stefanie Bledsoe leverages three decades of wholesale buying expertise and a keen eye for emerging design trends to mentor junior buyers, champion sustainable sourcing, and curate artisanal
    product assortments that blend data‑driven forecasting with their artistic sensibility.
  sports: Stefanie Bledsoe enjoys weekly hikes on the Scioto Trail, participates in a local walking club, and follows the Columbus Blue Jackets, Ohio State Buckeyes football, and the Columbus Crew, balancing
    low‑impact cardio with occasional yoga to maintain flexibility at 60.
  arts: Stefanie Bledsoe spends weekends painting watercolors of Ohio landscapes, photographing modern installations at the Columbus Museum of Art, reading poetry by Ocean Vuong, and volunteering as a docent,
    while their quilting projects echo the patterns of William Morris and the rhythm of live jazz performances at The Bluestone.
  travel: Stefanie Bledsoe prefers thoughtfully planned cultural trips—such as a recent art‑focused tour of Florence, a culinary expedition to Oaxaca, and a serene weekend in Asheville—while dreaming of
    exploring the souks of Marrakech, balancing curiosity with budget‑conscious itineraries.
  culinary: Stefanie Bledsoe experiments with global dishes like Thai green curry, Moroccan tagine, and Ethiopian injera, often incorporating fresh basil, saffron, and cardamom from their herb garden, and
    enjoys pairing these creations with local Ohio craft beers and a modest collection of vintage wines.
  core: Stefanie Bledsoe is a methodical art‑loving buyer who fuses sustainable sourcing with creative hobbies, balancing disciplined finances and health routines with a penchant for occasional indulgent
    antique finds.
background:
  cultural: Stefanie grew up in a mid‑western, white, working‑class family in Ohio with German‑Irish ancestry. Her upbringing emphasized community values, reliability, and a love of regional traditions
    such as county fairs and local music. A steady exposure to church choirs and school art programs fostered an early appreciation for classical music and visual arts. Throughout adulthood, she has blended
    this Midwestern sensibility with a curiosity for global cultures, shaped by travel to Europe and exposure to diverse artistic movements. This background informs her balanced approach to work, her commitment
    to harmonious relationships, and her enthusiasm for bringing culturally rich, ethically sourced products to the marketplace.
