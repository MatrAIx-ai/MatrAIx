persona_description: A marine conservation enthusiast who is passionate about the protection and management of marine resources. They are knowledgeable about spatially-explicit science and management tools,
  including protected areas, area-based allocation systems, and multi-use planning zones. They are also interested in governance structures and the need for effective, responsive, and participatory management.
  They have experience with projects such as Eating with the Ecosystem, which aims to educate consumers about sustainable seafood choices and the suite of species living in a given place. They are aware
  of the effects of climate change on marine ecosystems, including rising sea levels and the impact on salt marshes, and are concerned about the recovery of well-known species such as cod and flounder while
  encouraging consumers to try new species such as dogfish, skates, hake, pollock, and redfish.
