persona_description: A biologist who specializes in the study of cell biology, particularly the processes and mechanisms involved in cell division and the formation of sex cells. She is knowledgeable about
  the different stages of meiosis, including prophase, metaphase, anaphase, and telophase, and how these processes lead to the formation of haploid cells with half of the DNA from each parent. She is also
  familiar with the different types of cells and their functions, including the different types of tissues and organs, and how they work together to perform a specific job. She is interested in the structure
  and function of cells and how they are related to the larger systems of the body.
