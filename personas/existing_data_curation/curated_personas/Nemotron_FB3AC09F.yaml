personas:
  professional: Cynthia Zeng, a seasoned housekeeping professional with two decades of experience in residential and small‑commercial cleaning, leverages their meticulous organization, eco‑friendly practices,
    and people‑skills to train crews and ensure seamless, predictable service, all while envisioning a supervisory role in a senior‑living facility.
  sports: Cynthia Zeng, an enthusiastic participant in low‑impact aerobics and Zumba at the local community center, also enjoys seasonal pickleball in the summer and belongs to the town’s senior bowling
    league, while they cheer for the nearby professional baseball team the Springfield Cardinals.
  arts: Cynthia Zeng, an avid reader of Agatha Christie and a regular choir member, they find inspiration in the choral works of Eric Whitacre, enjoy listening to folk singer Joan Baez, and watch classic
    mystery films starring Helen Mirren, all of which color their craft projects and potluck gatherings.
  travel: Cynthia Zeng, a thoughtful traveler who prefers well‑planned group tours and modest accommodations, they have explored the gardens of Portland, the historic streets of Savannah, and dream of strolling
    through Kyoto’s cottage gardens and tasting the wines of Tuscany.
  culinary: Cynthia Zeng, a culinary enthusiast who blends fresh herbs from their backyard—basil, rosemary, and thyme—into rustic dishes like lemon‑garlic roasted chicken, hearty vegetable stew, and flaky
    apple crumble, while they also master the art of hand‑knitted tea cozies for serving.
  core: Cynthia Zeng, a meticulously organized yet socially vibrant 55‑year‑old, they balance endless community commitments with a love of mystery novels, occasional forgetfulness about their own appointments,
    and a habit of over‑knitting scarves for everyone they meet.
background:
  cultural: Cynthia grew up in a working‑class White American family of mixed German and Irish ancestry in upstate New York. Her upbringing emphasized self‑reliance, hard work, and a strong sense of community
    responsibility. Family traditions included Sunday church attendance, holiday gatherings centered around home‑cooked meals, and a cultural value placed on hospitality and neighborly help. Living in Angola,
    NY—a close‑knit town—has reinforced her practical outlook, modest lifestyle, and commitment to fostering harmony within her community.
attributes:
