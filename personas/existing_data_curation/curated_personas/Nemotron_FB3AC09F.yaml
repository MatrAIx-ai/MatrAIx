  hobbies: '[''Community choir'', ''Volunteering at local senior center'', ''Gardening (herbs & vegetables)'', ''Knitting and crocheting'', ''Group fitness classes (e.g., Zumba)'', ''Book club (mystery
    novels)'', ''Cooking and baking'']'
  career_goals: Cynthia aims to advance into a supervisory role, either as a lead housekeeper for a local senior living facility or as a housekeeping manager for a nearby hotel or medical clinic. She plans
    to obtain a professional certification in housekeeping and environmental safety to bolster her credentials. Long‑term, she envisions launching her own small cleaning and home‑organization business,
    offering personalized packages that emphasize reliability and client harmony. Mentoring younger workers and providing part‑time consulting for efficient home‑management are also key ambitions, all geared
    toward achieving financial stability for a comfortable retirement while remaining an active, valued member of her community.
