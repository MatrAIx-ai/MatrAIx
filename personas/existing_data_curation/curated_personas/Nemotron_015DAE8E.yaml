  career_goals: Henry aims to transition into a technology leadership role, such as Chief Technology Officer or Director of Engineering, where he can guide digital transformation initiatives that align
    technical innovation with business value. He is interested in building a SaaS platform that leverages data analytics to help midsize businesses optimize operations, and he plans to pursue a part‑time
