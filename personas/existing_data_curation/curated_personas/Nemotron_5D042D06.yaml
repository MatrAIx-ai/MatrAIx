  career_goals: Elizardo aims to shift from full‑time long‑haul driving to a part‑time schedule that gives him more flexibility for family and self‑care. He plans to become a certified driver trainer, providing
    mentorship for younger Hispanic drivers and promoting safety in the industry. He also hopes to launch a community‑focused shuttle service that transports seniors and low‑income residents to medical
    appointments, leveraging his driving expertise and compassionate drive. Long‑term, he envisions opening a small Puerto Rican food stall at the local farmers’ market, allowing him to share his cultural
    heritage while supplementing his retirement income.
