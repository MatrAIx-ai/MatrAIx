  hobbies: '[''nature hiking and photography'', ''strategy video gaming'', ''digital sketching'', ''short story and journal writing'', ''building model kits'', ''indie folk music listening'', ''small book
    club participation'']'
  career_goals: He aims to earn a high school equivalency (GED) within the next year, then pursue an apprenticeship in electrical or HVAC work where his curiosity and hands‑on aptitude can flourish. He
    also hopes to eventually work in a role that lets him help peers, perhaps as a tech‑support specialist in a community center or as a counselor after further study, balancing stability with his desire
    to support others. He wants a flexible schedule to manage his anxiety, and values a supportive work environment where teamwork is emphasized.
