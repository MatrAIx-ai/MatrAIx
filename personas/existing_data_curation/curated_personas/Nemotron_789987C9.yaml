personas:
  professional: William Dorn, a seventeen-year-old aspiring apprentice, merges a hands-on talent for troubleshooting electronics and DIY home repairs with an innate knack for mediating small-group conflicts,
    using their curiosity and practical mindset to configure home Wi-Fi, dabble in HTML/CSS design, and they envision a future in electrical or HVAC work where teamwork and flexibility offset occasional
    disorganization.
  sports: William Dorn, a devoted member of the local hiking club, spends weekends trekking seasonal nature trails and occasionally joins a small-group youth soccer pick-up game, while they cheer on the
    Seattle Seahawks for football and the Portland Trail Blazers for basketball during the respective seasons.
  arts: William Dorn, an avid follower of indie folk artists like Bon Iver and Phoebe Bridgers, channels that melodic inspiration into sketching characters from graphic novels such as Saga and Watchmen
    and crafting digital illustrations with free software, while they find quiet joy assembling detailed model aircraft kits during rainy afternoons.
  travel: William Dorn, who prefers low-key, self-guided trips, regularly explores nearby state parks like the Blue Ridge Mountains and dreams of backpacking through Yosemite National Park, balancing their
    limited student budget with careful use of discount student travel passes and a love for spontaneous photo-stops of seasonal foliage, while they savor the freedom of unplanned detours and sometimes
    feel anxious about overly rigid itineraries.
  culinary: William Dorn, a budding home cook, favors easy comfort meals like grilled cheese sandwiches, ramen bowls infused with fresh herbs, and homemade pizza topped with mozzarella and pepperoni, while
    they often pack trail mix of nuts, dried fruit, and chocolate chips for hikes and enjoy occasional brunches at the town’s indie café that serves avocado toast and cold brew, though they sometimes skip
    meals when anxiety spikes.
  core: William Dorn, a curious yet easily anxious seventeen-year-old, blends a practical knack for fixing things with a quiet love for nature photography, indie folk tunes, and heartfelt journaling, all
    while they struggle to keep schedules tidy and finances balanced.
background:
  cultural: William is a white teenager raised in Westfield, a small city in western Massachusetts with a predominantly New England, working‑class culture. His family roots trace back to Irish and English
    immigrants, and community life revolves around local schools, town events, and seasonal outdoor activities. The region’s emphasis on practicality, self‑reliance, and close‑knit neighborhoods shapes
    his values of cooperation and harmony. Growing up in a modest household, he has internalized a modest, reserved demeanor typical of many small‑town New England youths, while also being aware of regional
    support for mental‑health resources.
