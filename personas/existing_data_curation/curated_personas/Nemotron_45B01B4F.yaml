  career_goals: Although retired from formal employment, Nisha aims to deepen her involvement in community service. She hopes to become a volunteer coordinator at the Bedford Senior Center, creating programs
    that connect seniors with health resources and social activities. She is also interested in mentoring younger South Asian women on navigating cultural expectations and career pathways, and wishes to
    develop a local workshop series on nutrition that combines traditional recipes with modern health guidelines. Learning digital photography to document cultural events and possibly earning a certification
    in senior first aid are other personal ambitions. Ultimately, she wants to foster intergenerational harmony and empower her community.
