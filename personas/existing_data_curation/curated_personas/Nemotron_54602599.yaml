  career_goals: Jennifer aims to transition into a nurse practitioner role specializing in family health to broaden her scope of practice and address primary care shortages in her hometown. In the next
    five years, she plans to complete a Master of Science in Nursing (MSN) with a focus on clinical leadership, earn board certification as a Family Nurse Practitioner, and assume a charge nurse position
    to develop leadership experience. Long-term, she aspires to become a nurse manager overseeing a community health clinic, implement evidence-based quality improvement programs, and mentor junior nurses.
    She also envisions establishing a telehealth outreach service to improve access for rural residents of Cambria County.
