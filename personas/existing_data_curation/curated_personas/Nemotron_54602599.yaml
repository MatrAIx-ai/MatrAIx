personas:
  professional: Jennifer Mckibben brings her ten‑plus years of critical‑care nursing expertise to a methodical, data‑driven practice, excelling in acute patient assessment, EMR analytics, and interdisciplinary
    coordination while leveraging a competitive edge to lead quality‑improvement initiatives and pursue a family nurse practitioner role.
  sports: Jennifer Mckibben regularly hikes the rugged trails of Gallitzin State Forest and the Johnstown Flood National Memorial, is a member of the Johnstown Trail Running Club, and cheers on the Pittsburgh
    Steelers, Penguins, and Pirates from the comfort of their living room while tracking mileage with a Fitbit.
  arts: Jennifer Mckibben devours mystery novels by Agatha Christie and Tana French, cites Stephen King’s "The Stand" as a favorite, knits scarves inspired by folk art, listens to indie singer-songwriter
    Phoebe Bridgers, and occasionally attends performances at the Cambria County Playhouse, finding creative balance in literary and musical worlds.
  travel: Jennifer Mckibben prefers meticulously planned solo getaways, having explored the autumn foliage of the Blue Ridge Parkway, the geysers of Yellowstone, and a weekend retreat to Asheville’s farm-to-table
    scene, while dreaming of a future volunteer trek to the Great Smoky Mountains to expand their telehealth outreach perspective.
  culinary: Jennifer Mckibben delights in cooking wholesome, seasonal meals like kale‑chip salads, roasted tomato bisques, and quinoa‑stuffed bell peppers, frequently harvesting fresh tomatoes and kale
    from their garden, and occasionally treats themselves to homemade sourdough bread using heritage wheat flour.
  core: Jennifer Mckibben, a thirty‑three‑year‑old critical‑care nurse with a green thumb and an obsessive love for crossword puzzles, blends methodical professionalism, cautious financial habits, and solo
    nature escapes into a drive to reshape rural primary care.
background:
  cultural: Jennifer is a white American of Irish-German descent, raised in Johnstown, Pennsylvania, a city shaped by its steel and coal-mining heritage. Growing up in Cambria County, she was immersed in
    a tight-knit, working-class community that values self-reliance, modesty, and a strong work ethic. Her family attended a local Methodist congregation, where community service and fellowship were emphasized.
    The region’s Appalachian cultural influences—such as seasonal festivals, high school football traditions, and a love for the outdoors—have shaped her appreciation for nature and community involvement.
    While she pursued higher education, she retained the practical, down-to-earth sensibilities of her upbringing, balancing ambition with a commitment to her hometown’s well-being.
