  hobbies: '[''Cooking Mexican cuisine'', ''Hosting community potlucks'', ''Salsa and cumbia dancing'', ''Reading business and leadership books'', ''Listening to entrepreneurship podcasts'', ''Volunteering
    for youth education programs'', ''Hiking in Brazos Bend State Park'']'
  career_goals: Ibeth aims to advance to a senior operations role—such as Director of Operations or Vice President of Operations—within a mid‑size manufacturing or logistics firm in the Greater Houston
    area. She is focused on driving large‑scale efficiency programs that marry rigorous process discipline with the agility to respond to market shifts. A passionate advocate for diversity and inclusion,
    she intends to spearhead initiatives that amplify the voice of Latina professionals in corporate settings. Over the next five years, she plans to complete an executive MBA and earn a Black Belt in Six
    Sigma, positioning herself as a thought leader who can consult on operational excellence while mentoring the next generation of bilingual managers.
