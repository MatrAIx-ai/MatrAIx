personas:
  professional: Ibeth Soto, a senior operations specialist at a Houston‑based manufacturing firm, leverages Lean Six Sigma expertise and high‑energy communication to design data‑driven process improvements
    while they sometimes miss project deadlines despite a strong preference for structure.
  sports: Ibeth Soto enjoys weekend hikes at Brazos Bend State Park, plays recreational co‑ed soccer with a local league, and reliably cheers for the Houston Astros, Rockets, and Texans while they track
    personal step counts through a fitness band.
  arts: Ibeth Soto immerses themselves in salsa and cumbia nights, admires performers like Celia Cruz, Marc Anthony, and contemporary choreographer Blanca López, and they curate monthly playlists that blend
    classic Latin rhythms with modern pop for their social gatherings.
  travel: Ibeth Soto prefers spontaneous road trips with friends to nearby Gulf Coast towns like Galveston, while they dream of exploring Oaxaca’s culinary markets and Barcelona’s architecture, balancing
    adventure with a modest travel budget and work‑related constraints.
  culinary: Ibeth Soto, an accomplished home chef, skillfully prepares tamales, pozole, and handcrafted salsa using masa harina, hominy, chipotle, and fresh cilantro, and they frequently experiment with
    fusion dishes like chipotle‑infused chicken tacos.
  core: Ibeth Soto is a charismatic, process‑focused operations leader who thrives on social energy, sometimes sacrifices structure for spontaneity, and they balance disciplined finance with occasional
    indulgent splurges.
background:
  cultural: Ibeth is a second‑generation Mexican‑American who grew up in the Houston metropolitan area, where Spanish was spoken at home and English at school. Her family celebrates Día de los Muertos,
    Cinco de Mayo, and traditional religious holidays, infusing her life with a strong sense of cultural pride and community. She values the Mexican cultural emphasis on hospitality (hospitalidad) and respect
    (respeto), which shape her approachable yet assertive management style. Living in Sugar Land’s vibrant multicultural environment, she participates in local Mexican cultural festivals and maintains close
    ties with extended family across Texas and Mexico. Bilingual in Spanish and English, Ibeth often serves as a bridge between diverse workforces, leveraging her heritage to foster inclusive workplace
    practices.
