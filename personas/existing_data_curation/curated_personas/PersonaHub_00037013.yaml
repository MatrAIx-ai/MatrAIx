persona_description: A scientist or chemist who specializes in the study of polycyclic aromatic hydrocarbons (PAHs) and their phototoxic effects. They are interested in the effects of organic solvents and
  biologically relevant ions on the light-induced DNA cleavage by PAHs, particularly the amino and hydroxy derivatives of pyrene. They are also interested in the triplet-excited state of 1-aminopyrene and
  its role in causing DNA cleavage.
