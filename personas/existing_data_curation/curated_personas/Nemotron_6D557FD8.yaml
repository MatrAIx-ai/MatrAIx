personas:
  professional: Adelaide Shipman, a 29‑year‑old surveillance specialist at a high‑traffic casino, leverages meticulous attention to detail and a curiosity‑driven, methodical mindset to monitor CCTV feeds,
    spot anomalous behavior, produce exhaustive incident reports, and intervene assertively when required, while they maintain cooperative teamwork with fellow security staff.
  sports: Adelaide Shipman, a devoted fan of the Philadelphia Eagles and Philadelphia 76ers, joins the Philadelphia Runners club for weekly long‑distance jogs, supplements cardio with strength‑training
    sessions at the local Fit3D gym, and occasionally plays pick‑up basketball at a community center, using these activities to sustain the stamina demanded by night‑shift security work.
  arts: Adelaide Shipman, an avid street‑photographer inspired by Vivian Maier and the vibrant murals of Philadelphia’s Mural Arts program, spends quiet evenings immersed in the soulful sounds of Nina Simone,
    Aretha Franklin, and the improvisational brilliance of Miles Davis, which fuels both their artistic eye and a sense of cultural continuity.
  travel: Adelaide Shipman, who meticulously plans each getaway, enjoys solo weekend retreats to Savannah’s historic squares and Cape May’s tranquil shores, while harboring a long‑standing desire to soak
    in New Orleans’ jazz cafés and explore Tokyo’s bustling Shibuya district, balancing cultural immersion with a modest travel budget.
  culinary: Adelaide Shipman, a capable home cook, regularly prepares family‑style collard greens seasoned with smoked turkey, sweet‑potato pie, and a well‑worn gumbo featuring okra and andouille sausage,
    while also seeking out the best pepperoni pizza slices at Reading Terminal Market and occasionally experimenting with Korean bibimbap using gochujang and sesame oil.
  core: Adelaide Shipman blends a detective’s curiosity with disciplined routines, obsessively reviews surveillance footage for patterns, balances solitary jogs and midnight photography sessions, yet they
    often procrastinate on returning friends’ messages until after their shift.
background:
  cultural: Adelaide is an African American woman raised in the vibrant neighborhoods of West Philadelphia. Her family traces its lineage to the Great Migration, with grandparents who moved from the rural
    South to the city in the 1950s. She grew up attending a local church where gospel music and community service were integral, fostering a sense of solidarity and responsibility. The cultural tapestry
    of Philadelphia—its jazz clubs, street art, and soul‑food culinary scene—has shaped her tastes and social outlook. She stays connected to her heritage through family gatherings, participation in neighborhood
    block parties, and occasional mentorship of at‑risk youth, offering guidance rooted in her own experiences of perseverance.
