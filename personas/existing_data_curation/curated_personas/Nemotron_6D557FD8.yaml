  hobbies: '[''reading mystery novels'', ''photography of urban scenes'', ''jogging'', ''strength training'', ''coding workshops for security software'', ''listening to jazz and soul music'', ''cooking
    soul food'']'
  career_goals: Adelaide aims to advance within the security field, seeking a supervisory position overseeing a team of surveillance officers within the next three years. She plans to earn the Certified
    Protection Professional (CPP) credential and attend advanced training on AI‑driven video analytics to stay ahead of emerging technologies. Long‑term, she hopes to transition into a corporate security
    manager role for a regional casino network or to launch her own security consulting firm focused on risk assessment for entertainment venues. She values career stability, professional growth, and the
    opportunity to mentor newer guards.
