personas:
  professional: Malik Ratliff, a retired nonprofit arts strategist, leverages meticulous archival research, compelling public speaking, and grant‑writing expertise to champion inclusive cultural programming,
    channeling their disciplined organization and boundless curiosity into community workshops and a forthcoming memoir.
  sports: Malik Ratliff, a member of the Louisville Senior Walking Club and an occasional golfer at Oxmoor Club, maintains fitness with daily morning walks, follows the Kentucky Wildcats basketball season,
    and attends Louisville Bats baseball games for community camaraderie.
  arts: Malik Ratliff, a devoted watercolorist inspired by Edward Hopper’s muted cityscapes and the narrative power of Kara Walker, frequents jazz concerts featuring the Wynton Marsalis Quartet and engages
    in lively dialogues at Louisville gallery openings showcasing emerging painters like Maya S. Torres.
  travel: Malik Ratliff, a planner who values structured itineraries, has explored historic Savannah, New Orleans’ French Quarter, and a week‑long art pilgrimage to Paris, and now hopes to trace ancestral
    roots with a trip to Ghana, all while balancing travel costs against a modest pension.
  culinary: Malik Ratliff, a seasoned cook of Southern comfort, prepares collard greens seasoned with smoked ham hocks, buttery cornbread drizzled with honey, and sweet potato pie spiced with nutmeg and
    cinnamon, often incorporating heirloom vegetables from their garden and sharing meals at church potlucks.
  core: Malik Ratliff, a disciplined, curiosity‑driven septuagenarian, weaves art, history, and community service into daily life while occasionally hoarding old exhibition catalogs and forgetting to water
    their garden during long research sessions.
background:
  cultural: Malik grew up in a close‑knit African American community in Louisville, the son of parents who were active participants in the local civil‑rights movement of the 1960s. His grandparents migrated
    from rural Mississippi during the Great Migration, bringing traditions of gospel music, oral storytelling, and Southern cooking. The church has been a central pillar in his life, shaping his values
    of service and community cohesion. Immersed early in Kentucky's rich musical heritage—especially jazz and blues—Malik draws inspiration from historic Black neighborhoods such as Portland and Russell.
    His cultural identity blends Southern traditions with a broad appreciation for the African diaspora, reflected in his commitment to preserving and promoting Black art and history in Louisville.
