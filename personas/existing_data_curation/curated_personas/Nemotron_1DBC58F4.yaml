personas:
  professional: Marco Bueno, a 56‑year‑old management analyst in Central Florida, leverages advanced Excel, Power BI, and Tableau to turn complex data sets into actionable strategic plans while leading
    cross‑functional teams with the disciplined precision of a Lean Six Sigma practitioner and a collaborative, art‑inspired mindset.
  sports: Marco Bueno enjoys playing 9‑hole rounds at the Orlando Golf Club on Saturday mornings, participates in the Citrus County Tennis Association’s mixed‑doubles league each spring, and follows the
    Orlando Magic, Tampa Bay Lightning, and Tampa Bay Rays with fervor, often donning their jerseys during game nights.
  arts: Marco Bueno curates emerging island artists at local galleries, admires the watercolor landscapes of Georgia O'Keeffe, collects works by contemporary painter Ana Lara, regularly attends performances
    by the Orlando Philharmonic Orchestra, and draws inspiration from the films of Alejandro González Iñárritu, weaving these influences into their own watercolor paintings of Florida wetlands.
  travel: Marco Bueno prefers thoughtfully planned road trips that blend cultural immersion with natural serenity, having explored the Everglades, the historic streets of New Orleans, and a weekend retreat
    in Asheville, while dreaming of a spring visit to Barcelona’s art districts and a kayaking adventure in the Ten Thousand Islands.
  culinary: Marco Bueno, an adept home chef, lovingly prepares traditional island dishes like mofongo and arroz con gandules using plantains, sofrito, and long‑grain rice, pairs them with a fresh mango‑avocado
    salad, and experiments with aromatic herbs such as cilantro and epazote while occasionally indulging in gourmet seafood paella.
  core: Marco Bueno balances the rigor of data‑driven consulting with a watercolor brush, a habit of cataloguing every expense, a mild back ache from desk work, and an insatiable curiosity that fuels both
    boardroom strategies and weekend gallery walks.
background:
  cultural: Marco’s Puerto Rican roots deeply inform his worldview and daily life. Raised in a bilingual household, he is fluent in Spanish and English, and he maintains strong ties to the island through
    frequent visits to family and participation in local Puerto Rican festivals in Florida. He upholds the island’s cultural values of family solidarity, hospitality, and respect for tradition, which translate
    into his collaborative work style and his commitment to community harmony. His appreciation for the vibrant rhythms of bomba and plena shapes his musical tastes, while the island’s rich artistic heritage
    fuels his passion for visual arts. At the same time, having lived decades in the mainland U.S., Marco blends this heritage with the laid‑back, nature‑oriented lifestyle of Citrus County, creating a
    hybrid identity that values both cultural preservation and open‑minded curiosity.
