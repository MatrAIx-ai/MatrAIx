  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Reading art and technology books'', ''Cooking Puerto Rican cuisine'', ''Mentoring high school students'', ''Volunteer
    work in community arts projects'', ''Playing chess'', ''Gardening in his backyard'', ''Attending live Latin music performances'']'
  career_goals: Marco aims to advance into a senior consulting role where he can lead large‑scale digital transformation projects for public and private organizations in Central Florida. He plans to earn
    a Six Sigma Black Belt and a PMP certification within the next two years to solidify his expertise. Additionally, he aspires to mentor emerging analysts, especially from underrepresented Hispanic backgrounds,
    by establishing a community mentorship program. In the longer term, Marco envisions founding his own boutique consultancy focused on operational excellence and cultural integration for small businesses
    in Citrus County, allowing him to blend his analytical skill set with his passion for community enrichment.
