personas:
  professional: Ashley Peterson, a 28‑year‑old trauma‑informed social worker in Bend, blends rapid, empathetic crisis decision‑making with a flair for improvisational theater, using their sociable and spontaneous
    energy to lead arts‑based community engagement projects while advocating for policy changes that integrate creative therapy into regional mental‑health services.
  sports: Ashley Peterson, a 28‑year‑old outdoor enthusiast in the Cascades, hikes rugged trails each spring, mountain bikes the forested fire roads in summer, roots for the Portland Timbers and the Oregon
    Ducks, and occasionally joins a community cycling club while using yoga sessions to balance athletic exertion with emotional regulation.
  arts: Ashley Peterson, a 28‑year‑old improv performer and budding photographer, regularly showcases ukulele covers at open‑mic nights, draws inspiration from artists like Mitski, Lin‑Manuel Miranda, and
    Henri Cartier‑Bresson, volunteers at the local community garden for pop‑up mural projects, and finds solace in knitting while listening to classic folk albums by Joni Mitchell.
  travel: Ashley Peterson, a 28‑year‑old lover of spontaneous road trips, often packs a car on Friday evenings to attend cultural festivals such as Portland’s Rose Festival, Seattle’s Bumbershoot, and the
    Oregon Shakespeare Festival in Ashland, dreams of a future solo trek through Patagonia’s Torres del Paine, and prefers last‑minute itineraries over rigid travel plans despite occasionally overspending
    on accommodation.
  culinary: Ashley Peterson, a 28‑year‑old home cook with a moderate skill level, enjoys whipping up avocado‑toast topped with feta and chili flakes, crafting quick quinoa‑salads with roasted sweet potatoes
    and kale, indulging in spicy Thai green curry with lemongrass and coconut milk, and treats themselves to local craft breweries for a hoppy IPA after a long day of community work.
  core: Ashley Peterson, a 28‑year‑old social worker whose boundless curiosity and talkative spontaneity fuel both a passion for arts‑based mental‑health advocacy and a habit of impulsive spending, often
    juggling intense anxiety with a love for improv, hiking, and midnight snack runs.
background:
  cultural: Ashley was raised in a middle‑class white family in the Pacific Northwest, with deep ties to the outdoor and community‑oriented culture of central Oregon. Her upbringing emphasized self‑reliance,
    environmental stewardship, and progressive social values. She grew up with an appreciation for the region’s Indigenous histories, often participating in local cultural awareness events and incorporating
    respect for native perspectives into her social‑work practice. Her family background includes Scandinavian roots common among many Oregon settlers, which contributed to a cultural emphasis on modesty,
    practicality, and collective well‑being. This blend of regional pride, inclusive community values, and a love for artistic expression shapes her personal and professional identity.
attributes:
  skills: '["Crisis Intervention", "Trauma‑Informed Care", "Community Resource Navigation", "Advocacy and Policy Literacy", "Mediation and Conflict Resolution", "Public Speaking and Group Facilitation",
