  hobbies: '["Improv Theater", "Hiking and Mountain Biking", "Landscape Photography", "Ukulele and Open‑Mic Performances", "Volunteering at Community Garden", "Animal Shelter Volunteering", "Yoga and Mind‑Body
    Workshops", "Spontaneous Road Trips", "Knitting", "Attending Local Arts & Culture Festivals"]'
  career_goals: Ashley aims to become a program director for a regional mental‑health initiative that integrates arts therapy into traditional social‑service models. Over the next five years she plans to
    earn a Master of Social Work with a specialization in clinical practice, and subsequently obtain licensure as a Clinical Social Worker. She envisions leading a multidisciplinary team in Crook County
    to design flexible, community‑driven services that respond to the unique needs of rural populations, while also championing policies that improve funding for creative therapeutic interventions. Long‑term,
    she aspires to open a non‑profit hub that offers pop‑up art‑and‑wellness workshops, leveraging her spontaneity and love for community engagement to reduce stigma around mental health.
