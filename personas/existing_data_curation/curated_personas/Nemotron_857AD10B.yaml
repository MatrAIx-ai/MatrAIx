personas:
  professional: Donald Stone is a teenage concept artist and budding creative director whose disciplined planning drives school art projects, while they fuse digital illustration, Python‑powered interactive
    pieces, and storytelling to envision immersive game worlds.
  sports: Donald Stone is a member of the Portland Youth Soccer Club, cheers for the Portland Timbers in MLS and the Portland Trail Blazers in the NBA, and they squeeze in after‑school runs at the local
    community center to stay fit despite a tendency to skip weekend basketball pick‑up games.
  arts: Donald Stone immerses themselves in visual and performing arts, drawing inspiration from Studio Ghibli films, the street art of Banksy, and the soundscapes of Tame Impala, while they regularly act
    in the school drama club’s productions of 'Hamilton' and design sets reminiscent of Tim Burton’s gothic aesthetic.
  travel: Donald Stone’s travel style blends curiosity with budget constraints, and they favor weekend road trips to the Oregon Coast, a school‑organized field trip to the Smithsonian in Washington, D.C.,
    and dreaming of a solo backpacking adventure through Japan’s art districts and Iceland’s volcanic landscapes.
  culinary: Donald Stone enjoys crafting simple yet artistic meals, often whipping up avocado toast topped with smoked salmon, cooking a quick ramen bowl with miso broth and soft‑boiled eggs, and experimenting
    with homemade sushi rolls featuring tuna, cucumber, and wasabi, while they occasionally experiment with vegan quinoa salads.
  core: Donald Stone is a hyper‑organized teen with a vivid imagination, juggling sketchbooks, code, and community gigs while navigating acne, frugal finances, and a love for indie music and soccer.
background:
  cultural: Donald grew up in Cleveland, Tennessee, a small city in Bradley County known for its close‑knit community and Southern hospitality. His family has deep roots in the region, with generations
    who worked in local manufacturing and service industries. He was raised in a household that values education, community service, and the arts, often attending church events, town festivals, and high
    school performances. The cultural milieu blends traditional Southern customs—such as respect for neighbors, participation in local fairs, and an appreciation for country and folk music—with exposure
    to contemporary media and digital arts through school programs and online platforms. This background has instilled in Donald a strong sense of community responsibility, openness to new ideas, and an
    appreciation for both heritage and innovation.
