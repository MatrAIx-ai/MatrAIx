  hobbies: '[''Sketching and drawing'', ''Digital art (tablet, Procreate)'', ''Creative writing (science fiction, poetry)'', ''Playing acoustic guitar'', ''School drama club (acting, set design)'', ''Exploring
    music and attending local concerts'', ''Reading philosophy and astronomy'', ''Tutoring at community library'', ''Organizing school art exhibitions'']'
  career_goals: Donald aspires to turn his artistic passion into a career. He aims to attend a college program in visual arts or game design, eventually working as a concept artist or creative director
    for an interactive media studio. He also envisions creating his own independent graphic novel series and potentially launching a YouTube channel that combines art tutorials with discussions of abstract
    concepts. He plans to leverage his organizational skills to lead collaborative creative projects, such as student exhibitions or community art initiatives.
