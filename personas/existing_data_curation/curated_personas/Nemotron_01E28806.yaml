  hobbies: '["Pickup basketball","Social dancing (R&B/hip‑hop)","Volunteering with Habitat for Humanity","Multiplayer video gaming","Hiking in local parks","Cooking Southern comfort dishes","Attending community
    concerts","Listening to R&B and hip‑hop music"]'
  career_goals: Devona aims to move from a laborer role to a skilled tradesperson and, within the next five years, become a foreman or site supervisor. She plans to finish her associate degree in construction
    management, earn NCCER certifications for equipment operation, and obtain an OSHA 30‑hour certification. Long‑term, she envisions launching her own contracting business that focuses on affordable housing
    projects for the Jackson community, leveraging her leadership skills and desire to give back.
