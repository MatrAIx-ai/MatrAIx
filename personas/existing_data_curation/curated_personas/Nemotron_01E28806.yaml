personas:
  professional: Devona Biford, a construction laborer in Jackson, blends practical precision with a laid‑back attitude, excelling at concrete mixing, framing, and blueprint reading while keeping the crew
    energized through upbeat communication and spontaneous problem‑solving, and they often act as the informal morale booster on site.
  sports: Devona Biford fuels their high energy by playing pickup basketball at the Jackson Community Center, cheering for the Detroit Pistons and Lions, joining the local senior hiking club for weekend
    treks at White Pines State Park, and casually tracking workouts on a fitness app despite occasionally forgetting to stretch after games, and they often organize friendly match-ups with coworkers.
  arts: Devona Biford unwinds by dancing to R&B and hip‑hop hits from Beyoncé, Anderson .Paak, and Liz Lizzo at weekend socials, attending local gospel choir performances and community concerts featuring
    artists like John Legend, while maintaining a playlist of classic soul legends such as Marvin Gaye for late‑night cooking sessions, and they often share these tunes with friends on game nights.
  travel: Devona Biford prefers spontaneous road trips over meticulous itineraries, often joining friends for weekend drives to Detroit’s music scene, a quick getaway to Chicago’s lakefront, and a yearly
    pilgrimage to New Orleans for Mardi Gras, while they dream of exploring the historic streets of Savannah and the waterfalls of Great Smoky Mountains when savings allow.
  culinary: Devona Biford showcases solid but not professional cooking skills by whipping up Southern comfort staples like crispy fried chicken, collard greens seasoned with smoked ham hocks, buttery cornbread,
    and a side of mac and cheese, often pairing meals with homemade sweet tea and occasionally experimenting with hot‑sauce blends that leave guests reaching for water, and they love adding a dash of extra
    paprika for an unpredictable kick.
  core: Devona Biford is a sociable, structure‑loving construction laborer who balances a laid‑back, sometimes forgetful approach to planning with fierce teamwork, a love for soulful beats, and a habit
    of over‑seasoning everything—from concrete mixes to casseroles, and they pride themselves on turning any worksite into a mini‑party.
background:
  cultural: Devona grew up in a close‑knit African‑American community in Jackson, Michigan. Her family blends Midwestern sensibility with rich Black cultural traditions, including church gatherings, soul‑food
    cooking, and a strong emphasis on mutual support. She participates in local cultural festivals, values storytelling from older generations who navigated the city’s industrial history, and draws inspiration
    from the resilience and pride of her heritage. This background fuels her collaborative spirit, respect for community, and commitment to contributing to local development.
attributes:
  skills: '["Concrete mixing and pouring","Framing and drywall installation","Operation of forklifts and backhoes","Blueprint reading and basic plan interpretation","OSHA safety compliance","Physical stamina
