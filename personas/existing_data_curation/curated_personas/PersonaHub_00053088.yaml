persona_description: A sociologist who specializes in studying cross-cultural perspectives on marriage patterns and their societal implications, particularly in the context of industrialized nations. They
  are interested in understanding the norms that influence marriage partner, residential, descent, and authority patterns in different societies. They are also interested in exploring the basic societal
  needs that the institution of the family satisfies, such as regulation of sexual activity, reproduction, and socialization. Their research interests include studying the trends in American family life,
  including the beginning and disruptions of American families, and examining the current trends in American family life.
