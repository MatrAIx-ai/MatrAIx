  career_goals: Keenan aspires to become an engineer—perhaps a civil or environmental engineer—who designs practical, sustainable solutions for his community. He dreams of creating efficient farm equipment
    or software tools that help local growers manage resources wisely. He envisions a future where he can work quietly behind the scenes, contributing innovative ideas while fostering a harmonious and cooperative
    work environment.
