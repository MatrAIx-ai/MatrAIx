personas:
  professional: Keenan Brannan, a budding young programmer and LEGO engineer, blends their love of science‑fiction worlds with meticulous, hands‑on problem solving, crafting simple Scratch games and detailed
    building projects while quietly helping classmates troubleshoot tech puzzles.
  sports: Keenan Brannan, a member of the East Lynn Knights youth soccer club who quietly cheers on the Chicago Cubs and the Illinois Fighting Illini during the spring and summer seasons, balances occasional
    pickup basketball games with a strong preference for solitary trail hikes through the surrounding cornfields and woodlands.
  arts: Keenan Brannan, an introspective piano player who quietly practices Debussy’s "Clair de Lune" in the corner of their room while devouring graphic novels by Frank Miller and sci‑fi epics from Isaac
    Asimov, also sketches inventions inspired by Studio Ghibli’s fantastical designs, weaving their love for narrative into every creative outlet.
  travel: Keenan Brannan, an adventure‑curious road‑trip enthusiast, has explored the rustic charm of Starved Rock State Park, the bustling streets of Chicago, and the historic monuments of Washington,
    D.C., and dreams of camping under the geysers of Yellowstone, always planning routes on a paper map and packing a homemade snack of apple slices and cheese.
  culinary: Keenan Brannan, a budding home cook with a penchant for garden‑fresh flavors, loves whipping up tomato‑basil pasta using tomatoes from their backyard, savors cheesy mac and cheese on rainy afternoons,
    and delights in baking apple pie topped with a crumbly oat crust, though they sometimes forget to stir the sauce before it burns.
  core: Keenan Brannan blends quiet curiosity with practical ingenuity, turning solitary adventures in the woods, LEGO builds, and Scratch coding into a uniquely grounded, yet imaginative, worldview—though
    they’re prone to losing track of time when puzzles beckon.
background:
  cultural: Keenan comes from a white, Midwestern family with deep roots in Illinois, tracing ancestry primarily to German and Irish settlers. Growing up in the small, close‑knit community of East Lynn
    in Vermilion County, he has been shaped by the region’s agricultural heritage, modesty, and strong work ethic. Local church gatherings, school traditions, and community events emphasize self‑reliance,
    cooperation, and quiet contribution, values that align with Keenan’s preference for solitude, practicality, and caring for others.
