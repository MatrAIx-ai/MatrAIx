  development of the Chinese state and the role of the Qin Dynasty in shaping Chinese identity. Her research interests include the study of Chinese language, literature, and art, as well as the history
  of China's relationship with other cultures. She is a respected academic and has made significant contributions to the field of Chinese history and culture.
