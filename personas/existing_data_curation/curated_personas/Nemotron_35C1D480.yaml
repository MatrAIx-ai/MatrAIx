personas:
  professional: Raul is a budding architect who translates the precision of his Minecraft redstone circuitry into hand‑drawn blueprints for fantasy fortresses, applying his methodical planning and collaborative
    spirit to imagined community spaces.
  sports: Raul joins the Eastside Youth Soccer club for Saturday pick‑up games, favoring the tight‑knit team dynamic over large crowds and modeling his footwork after Lionel Messi's agility.
  arts: Raul devotes afternoons to sketching heroic scenes from graphic novels like "Percy Jackson" and "The Sandman", drawing inspiration from Miyazaki’s fluid animation and refining his style with digital
    brushes on his tablet while integrating the rhythmic steps learned in folklórico class.
  travel: Raul dreams of a meticulously planned family trip to the towering redwoods of Sequoia National Forest and the ancient stone plazas of Tikal, where he can fill his nature journal with sketches
    of towering trees and elusive birds.
  culinary: Raul assists his mother in preparing pepian, a richly spiced stew of chicken and roasted vegetables, and learning to roll hand‑made corn tamales, while also enjoying the occasional pancake shaped
    like his favorite superhero.
  core: Raul combines a methodical curiosity with compassion, channeling his love for mythology and structured Minecraft builds into a thoughtful, sometimes worry‑prone, yet collaborative approach to life.
background:
  cultural: Raul is a first‑generation Guatemalan‑American living in Oakland’s vibrant Latino community. His parents emigrated from Guatemala and keep Spanish as the primary language at home, so Raul is
    fluent in both Spanish and English. He celebrates Guatemalan traditions such as Día de la Independencia on September 15 and Semana Santa, enjoying family gatherings that feature dishes like pepian,
    tamales, and freshly made tortillas. The family participates in cultural events at the local Plaza del Sol, where they join music performances featuring marimba and attend workshops on Mayan heritage.
    Raul’s upbringing blends the values of his Guatemalan roots—family solidarity, respect for elders, and communal responsibility—with the diversity and opportunities of his Oakland neighborhood, fostering
    a dual identity that shapes his outlook and ambitions.
