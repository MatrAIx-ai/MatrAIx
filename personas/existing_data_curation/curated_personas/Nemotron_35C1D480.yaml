  hobbies: '[''Reading adventure and graphic novels'', ''Minecraft building and redstone experiments'', ''Junior Sudoku and jigsaw puzzles'', ''Pencil drawing and digital illustration'', ''Small-group soccer'',
    ''Helping in the kitchen with Guatemalan cooking'', ''Birdwatching and nature journaling'', ''Folklórico dance classes'']'
  career_goals: In the short term, Raul aims to excel in his schoolwork, especially in math and science, and to join the middle school STEM club when he advances. He wants to continue volunteering at the
    school library and help younger students with reading and language skills. Looking ahead, he dreams of earning a scholarship to attend a specialized high school program where he can deepen his coding
    abilities and explore biomedical science. Ultimately, Raul aspires to become a bilingual pediatrician or a community health advocate who can bridge language gaps and ensure that children in underserved
    neighborhoods, including Guatemalan immigrant families, receive compassionate medical care. He also envisions designing educational games that make learning fun and accessible for kids like himself.
