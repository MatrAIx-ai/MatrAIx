  hobbies: '[''Soccer (playing forward and practicing drills)'', ''LEGO building and beginner robotics kits'', ''Scratch programming (simple games and animations)'', ''Reading adventure and mystery novels'',
    ''Drawing comic‑style illustrations'', ''Playing strategic video games'', ''Swimming and seashell collecting at Miami Beach'', ''Listening to Argentine tango music'', ''Cooking simple Argentine dishes
    (empanadas, milanesas) with family'', ''Participating in school science fairs'']'
  career_goals: Luis dreams of a future where he can combine his love for building things and his competitive spirit. He often talks about becoming a robotics engineer who designs machines that help protect
    the ocean, reflecting his fascination with Miami’s beach environment. At the same time, he imagines playing professional soccer for a major Argentine club, channeling his passion for the sport and his
    family’s cultural roots. He also expresses interest in creating his own video games, where he could blend storytelling and problem‑solving. These ambitions are shaped by his curiosity about how things
    work, his desire to excel competitively, and his practical aim to make a tangible impact.
