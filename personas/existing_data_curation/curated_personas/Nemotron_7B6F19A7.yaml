  hobbies: '["Sketching and drawing", "Watercolor painting", "Digital art tutorials", "Reading fantasy and sci‑fi novels", "Creative writing (short stories, poetry)", "Journaling", "Listening to indie/ambient
    music", "Nature walks and landscape sketching", "Maintaining an online art portfolio (DeviantArt)", "Caring for a pet rabbit", "Baking simple treats"]'
  career_goals: Stephanie aspires to turn her love of visual storytelling into a career. She dreams of becoming a professional illustrator, ideally working on children’s books or graphic novels, and sees
    freelance work as a way to preserve the flexible schedule she values. She is also intrigued by the idea of art therapy, blending her artistic talent with her caring nature to help others manage stress
    and emotions. To achieve these goals, she hopes to earn a scholarship for a fine‑arts program after high school, build a robust online portfolio, and eventually collaborate with authors or therapeutic
    organizations.
