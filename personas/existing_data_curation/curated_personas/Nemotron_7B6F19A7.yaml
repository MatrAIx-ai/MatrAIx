personas:
  professional: Stephanie Glosson, a high‑school junior with a passion for illustration, blends watercolor techniques with digital art tutorials to craft whimsical fantasy scenes, while favoring a relaxed,
    unscheduled workflow that lets imagination lead the creative process.
  sports: Stephanie Glosson prefers gentle cardio over competitive sports, joining their church’s weekly yoga circle, strolling through Guilford County parks, and cheering on the UNC Tar Heels basketball
    team and the Carolina Panthers as beloved hometown fan favorites.
  arts: Stephanie Glosson curates a small DeviantArt gallery featuring watercolor illustrations inspired by the ambient soundscapes of Brian Eno, the indie folk lyricism of Iron & Wine, and the world‑building
    of N. K. Jemisin, while attending local community theatre rehearsals to observe stage design.
  travel: Stephanie Glosson dreams of trading the flatlands of North Carolina for a spring visit to Kyoto’s cherry blossom gardens, but currently cherishes family road trips to the Blue Ridge Parkway, weekend
    outings to the Outer Banks, and a recent school‑organized field trip to Washington, D.C.’s Smithsonian museums.
  culinary: Stephanie Glosson enjoys baking soft oatmeal‑raisin cookies and classic butter biscuits, often sprinkling fresh garden thyme on the dough, and delights in swapping recipes at church potlucks,
    where their modest culinary skill adds a comforting, homestyle touch to community gatherings.
  core: Stephanie Glosson is a quietly inventive teen who sketches worlds in watercolor, worries about perfecting each line, and finds solace in homemade cookies and the gentle rhythm of community life.
background:
  cultural: Stephanie grew up in Pleasant Garden, a small community in Guilford County, North Carolina. Her family reflects a White, Southern heritage with deep local roots, giving her exposure to traditional
    Southern values such as hospitality, community involvement, and church participation. She attended the local public schools and took part in church youth events, fostering a sense of close‑knit community
    and an emphasis on helping neighbors. At the same time, her curiosity and love of art are heavily shaped by the internet, which introduces her to a broad spectrum of artistic styles, global literature,
    and online subcultures. This blend of Southern cultural norms and contemporary digital influences creates a cultural identity that balances local customs with a forward‑looking, globally aware artistic
    outlook.
attributes:
  skills: '["Sketching (graphite)", "Watercolor painting", "Basic digital illustration (Krita/Canva)", "Creative writing (poetry, flash fiction)", "Empathetic listening and peer support", "Organizing small
