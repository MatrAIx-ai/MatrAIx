persona_description: A conservation biologist who studies the impact of human activities on large mammals and their ecosystems. This person is interested in the interactions between species and the role
  of large mammals in shaping ecosystems. They are particularly concerned with the potential impact of modern megafauna extinction on smaller surviving species and the need for conservation efforts to protect
  these species. They have conducted research on the relationships between species large and small in ecosystems and have a keen interest in the importance of maintaining these relationships for the stability
  and resilience of ecosystems.
