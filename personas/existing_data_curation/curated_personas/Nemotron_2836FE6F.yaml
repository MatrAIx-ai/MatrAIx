  hobbies: '[''Writer Meet‑ups'', ''Improv Comedy'', ''Acoustic Guitar'', ''Hiking'', ''Landscape Photography'', ''Drone Videography'', ''Trivia Nights'', ''Board Games'', ''Arduino Tinkering'', ''Community
    Volunteering'']'
  career_goals: Alwayne aims to author a nationally recognized popular‑science series that bridges cutting‑edge research with everyday life, landing on bestseller lists and earning a prestigious science‑communication
    award. He plans to launch a weekly podcast that interviews leading innovators, using his talkative charisma to build a broad audience. Concurrently, he seeks to mentor emerging writers through a community
    writing program in Camas, establish a boutique indie press focused on interdisciplinary works, and deliver a TED‑style talk on the practical value of curiosity. Ultimately, he wants his body of work
    to shape public discourse on science policy while providing a sustainable livelihood for his family.
