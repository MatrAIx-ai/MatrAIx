  career_goals: He aspires to attend a specialized arts high‑school program and eventually earn a BFA in illustration or a degree in interactive media. His long‑term ambition is to work as a concept artist
    for video games or as a freelance graphic designer, merging his love of visual art with technology. He also hopes to develop his own indie game or animated short, using his coding and artistic skills.
    He sees college as a platform to broaden his creative network and refine his portfolio.
