  career_goals: Although retired from formal employment, Efia dreams of preserving her community's legacy. She plans to complete a memoir that weaves her personal narrative with the broader story of Black
    residents in Washington County, and to donate a collection of her quilts and oral‑history recordings to the local historical museum. She hopes to mentor a small group of high‑school students interested
    in genealogy and storytelling, guiding them to document their own family histories. Learning a new craft such as pottery remains a personal ambition that she sees as a way to continue exploring unconventional
    artistic expression. Ultimately, she aspires to leave a tangible cultural archive that future generations can cherish.
