personas:
  professional: Efia Perry, a retired community oral historian and church event coordinator, leverages their organizational knack and curiosity to preserve local stories while they mentor high‑school students
    in genealogy and storytelling.
  sports: Efia Perry, an avid birdwatcher, spends mornings strolling the trails of Big Creek State Forest for low‑impact cardio, occasionally joins the Chipley Senior Center’s weekly shuffleboard group,
    and they follow the Tampa Bay Buccaneers and Florida Gators with spirited enthusiasm each season.
  arts: Efia Perry, a devoted patron of the Tallahassee Contemporary Art Center, immerses themselves in works by artists such as Yayoi Kusama, Mark Rothko, and Amy Sherald, while they wind down evenings
    listening to jazz legends like John Coltrane, BB King, and Etta James, letting improvisation fuel their creative quilting designs.
  travel: Efia Perry, a modest traveler who prefers leisurely road trips, has explored historic Savannah, the misty Blue Ridge Mountains, and the vibrant streets of New Orleans, and they hope to one day
    visit the gardens of Kyoto, all while balancing travel plans around family commitments and a fixed income.
  culinary: Efia Perry, an accomplished home cook, blends garden‑fresh citrus, rosemary, thyme, and basil into Southern soul‑food classics such as shrimp and grits, collard greens, and peach‑creamed sweet
    potatoes, while they also experiment with slow‑cooked pork shoulder and a signature lemon‑verbena cake, showcasing a confident yet evolving culinary skill set.
  core: Efia Perry, an 80‑year‑old garden‑glove‑clad storyteller who juggles quilting, genealogy, and jazz, is as reliable as a sunrise but they occasionally forget where they put their spectacles.
background:
  cultural: Efia Ann Perry is an African‑American woman whose roots go back to the sharecropping farms of rural North Florida. Born in the late 1940s, she grew up during segregation and actively participated
    in the Civil Rights Movement of the 1960s, attending local church meetings and community sit‑ins. Her family maintains a strong oral‑storytelling tradition, passing down recipes, folk songs, and the
    history of the Black community in Chipley. The Southern Baptist church has been the cornerstone of her social life, shaping her values of compassion, cooperation, and self‑advocacy. Over the decades
    she has blended traditional Southern cuisine with influences from Caribbean migrants who settled in the region, and she celebrates cultural holidays such as Juneteenth with community potlucks. Her lived
    experience reflects the resilience and creativity of Black Floridians who have navigated both rural and urban cultural currents while preserving a distinct identity.
