persona_description: A representative from a government organization, specifically the World Wildlife Fund, who is attending the Conference of the Parties to the Convention on Migratory Species (CMS) in
  Quito, Ecuador, to negotiate new measures to safeguard nearly three dozen species and to determine the fate of iconic species such as the Polar Bear, the African Lion, and several sharks, including the
  Hammerhead. The representative is knowledgeable about the threats to wildlife, including habitat destruction, poaching, pollution, and climate change, and is committed to the protection of wildlife through
  international cooperation. They are aware of the economic benefits that wildlife can bring to countries, particularly Small Island Developing States and developing countries, and are dedicated to conserving
  and protecting our natural heritage.
