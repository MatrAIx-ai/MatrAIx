  hobbies: '[''Landscape photography'', ''Hiking in the Sierra Nevada'', ''Visiting art galleries and independent exhibitions'', ''Reading science‑fiction and philosophy'', ''Playing strategy board games
    (Go, Catan)'', ''Practicing yoga and meditation'', ''Cooking Vietnamese/Thai meals'', ''DIY electronics and Arduino projects'', ''Collecting vintage casino memorabilia'', ''Journaling'']'
  career_goals: Yuting aims to transition from floor‑level surveillance to a senior analytics role within the casino’s risk‑management department, where she can design machine‑learning tools to automate
    pattern‑recognition and fraud detection. She plans to earn a professional certification in security management and eventually lead a team of surveillance specialists. Long‑term, she envisions establishing
    a boutique consultancy that merges technical security solutions with an appreciation for visual environments, helping hospitality venues protect assets while curating aesthetically‑pleasing spaces.
    She also hopes to complete a part‑time master’s in criminology to deepen her theoretical understanding of crime prevention.
