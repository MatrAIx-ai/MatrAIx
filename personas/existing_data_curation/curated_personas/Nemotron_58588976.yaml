  hobbies: '[''Weekend road trips and landscape photography'', ''Fishing and hunting'', ''Vehicle restoration and mechanical tinkering'', ''Listening to classic rock and automotive podcasts'', ''Racing
    simulation video games'', ''Reading travel memoirs'', ''Volunteering at the local food bank and community events'']'
  career_goals: In the next few years, Andrew plans to move from a driver‑sales role into a supervisory position such as regional fleet manager or operations coordinator, where he can apply his hands‑on
    experience and technology curiosity to improve efficiency. He intends to earn additional CDL endorsements for hazardous materials and complete an associate’s degree in business management, positioning
    himself to launch an independent trucking operation focused on reliable, customer‑centric service. He also hopes to mentor new drivers, lead safety training programs, and champion the adoption of advanced
    routing and fuel‑saving technologies within his company.
