personas:
  professional: Janet Waddell, a retired homemaker turned community elder, channels decades of gardening, cooking, and handcraft expertise into mentoring seniors, leading a weekly knitting circle at the
    local senior center, and acting as an informal oral historian whose curious yet practical nature fuels lively storytelling sessions.
  sports: Janet Waddell enjoys daily bird‑watching walks, participates in the senior center’s gentle chair‑yoga program, and remains a devoted fan of the local minor‑league baseball team, the Aberdeen IronBirds,
    never missing a home game when health permits.
  arts: Janet Waddell, a lifelong choir singer, knits, crochets, and quilts while listening to folk legends like Pete Seeger, delights in the paintings of Grant Wood, and finds inspiration for her own craft
    in the lyrical narratives of historic novelist Laura Ingalls Wilder.
  travel: Janet Waddell prefers low‑key road trips that blend nostalgia with nature, revisiting the Badlands National Park and Custer State Park on annual family outings, while dreaming of a slow‑paced
    cruise to Mackinac Island, always planning itineraries around her fixed pension and the need for frequent rest stops.
  culinary: Janet Waddell excels at Midwestern comfort cooking, regularly preparing chicken pot pie, cornbread casserole, and simmered sauerkraut, while preserving seasonal bounty into apple butter, pickled
    cucumbers, and strawberry jam using fresh eggs, butter, and garden‑grown carrots.
  core: Janet Waddell, an 87‑year‑old garden‑to‑table storyteller, blends frugal practicality with boundless curiosity, navigating life through knitting circles, church choirs, and a lingering anxiety that
    fuels her devotion to community.
background:
  cultural: Janet grew up in the rural heart of the Great Plains, born into a white Midwestern family with roots in German and Scandinavian immigrant traditions common to South Dakota. Her upbringing during
    the Great Depression and World War II fostered values of self‑reliance, frugality, and strong community bonds. The local Lutheran (or Methodist) church shaped her sense of duty, hospitality, and fellowship.
    Over the decades, she has participated in county fairs, church socials, and neighborly aid networks, reflecting the modest, pragmatic, and caring ethos of the Aberdeen, Brown County region.
attributes:
  skills: '["home cooking and food preservation", "knitting, crochet, and quilting", "vegetable and flower gardening", "basic first aid", "budgeting and frugal household management", "clothing repair and
    sewing", "empathetic listening and storytelling"]'
  hobbies: '["gardening (vegetables and flowers)", "knitting and crochet", "quilting", "baking pies and making preserves", "church choir participation", "community potlucks and dances", "birdwatching",
    "reading historical fiction", "family genealogy research", "volunteering at the senior center"]'
  career_goals: Although retired, Janet aims to stay socially connected and to pass on her practical skills to younger generations. She hopes to lead a weekly knitting circle at the local senior center,
    mentor grandchildren in cooking traditional recipes, and learn to use video‑calling apps so she can share stories with family across the country. Maintaining her health and managing anxiety are also
    central goals, driving her to attend gentle exercise classes and participate regularly in church support groups. Ultimately, she wishes to leave a legacy of kindness, community service, and preserved
    family traditions.
