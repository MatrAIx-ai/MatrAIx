  hobbies: '["Reading scientific journals and tech blogs", "Puzzle solving (crosswords, logic games, coding challenges)", "DIY electronics with Arduino and Raspberry Pi", "Cooking Mexican cuisine", "Morning
    jogging", "Yoga and guided meditation", "Herb gardening", "Technical blogging"]'
  career_goals: After a period of focusing on personal matters, Maria is determined to re‑enter the workforce in a role that leverages her analytical strengths while offering autonomy. She aims to obtain
    a professional data‑science certification (e.g., Certified Data Analyst) within the next year, and to secure a remote or hybrid data analyst position in the healthcare or finance sector where she can
    apply her statistical expertise. Long‑term, she aspires to launch a freelance consulting practice that helps small businesses optimize their data processes, and eventually to mentor other women of Latino
    heritage pursuing STEM careers. Financial independence and building a reputation as a meticulous, results‑driven data specialist are central to her ambition.
