personas:
  professional: Manuel Hernandez, a 16‑year‑old aspiring EMT and future automotive technician, channels their assertive yet collaborative leadership from captaining the soccer team into organizing emergency‑response
    drills at the community center while applying hands‑on mechanical skills to maintain equipment with precise, structured routines.
  sports: Manuel Hernandez, captain of the Desert Valley High School Wildcats soccer team, trains year‑round on the field and in the gym, follows professional clubs like LA Galaxy and Liverpool FC for tactical
    inspiration, and blends structured conditioning with spontaneous weekend pickup games at the local desert park.
  arts: Manuel Hernandez, who sketches street‑art‑inspired designs in a sketchpad and curates short video edits featuring gaming highlights, draws creative fuel from graffiti icons like Banksy, the kinetic
    beats of Travis Scott, and the theatrical flair of Lin‑Manuel Miranda, often posting their edits to TikTok and Instagram for a bilingual follower base.
  travel: Manuel Hernandez, an enthusiastic road‑trip planner, frequently drives to the nearby Red Rock State Park for weekend hikes, dreams of backpacking through the Andes in Peru, and adds Tokyo and
    Barcelona to their bucket list for their vibrant gaming conventions and street‑food scenes.
  culinary: Manuel Hernandez, an avid home‑cook, enjoys hand‑crafting tamales and simmering fresh salsa with roasted chilies, avocados, and corn masa, while also experimenting with quick ramen bowls and
    grilled cheese sandwiches, proudly sharing their culinary experiments on family group chats.
  core: Manuel Hernandez, a structure‑loving teen who leads on the soccer field, dominates online FPS tournaments, builds custom PCs, and balances a disciplined savings habit with a habit of staying up
    late editing videos, all while juggling bilingual community volunteer work.
background:
  cultural: Manuel grew up in a Mexican-American household where Spanish and English are spoken interchangeably, and family gatherings often revolve around traditional food, music, and celebrations such
    as Dia de los Muertos and Mexican Independence Day. His parents emphasized respect for elders, community responsibility, and the value of hard work, values that shape his reliable and organized approach
    to everyday tasks. Living in Phelan's close-knit High Desert community, he blends these cultural traditions with the broader Southern California youth culture - participating in school sports, online
    gaming, and local festivals. This bicultural upbringing gives him a strong sense of identity, allowing him to navigate both his heritage and the diverse influences of his surroundings with confidence.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic computer literacy and video editing'', ''Social media content creation'', ''Basic automotive maintenance'', ''Team coordination and event
