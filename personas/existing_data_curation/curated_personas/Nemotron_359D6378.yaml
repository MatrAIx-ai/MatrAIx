  hobbies: '[''Soccer (team captain)'', ''Competitive video gaming (FPS and battle royale)'', ''Custom PC building and video editing'', ''Bilingual community volunteer work'', ''Cooking traditional Mexican
    dishes'', ''Street-art sketching'']'
  career_goals: Manuel's immediate goal is to earn his GED and enroll in the community-college EMT program that his school's guidance counselor recommended. He is drawn to the emergency-medical field because
    it offers clear protocols, structured shift work, and the chance to make quick, tangible impacts - all aspects that align with his preference for predictability and his competitive drive under pressure.
    In parallel, he plans to obtain a basic automotive-technician certification, a backup that leverages his hands-on repair skills and could later support a mobile roadside-assistance business he envisions.
    Over the long term, Manuel hopes to combine his EMT training with his mechanical knowledge to launch a community-focused service that provides emergency transport and vehicle support for low-income
    families in the High Desert.
