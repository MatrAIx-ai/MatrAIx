personas:
  professional: A budding pretend‑entrepreneur, Sondra Tate, at three years old, runs imaginative “store” games with stuffed animals, using nascent negotiation, improvisation, and abstract storytelling
    skills—an early showcase of the creative leadership they’ll likely bring to a future career in design or media.
  sports: A lively three‑year‑old, Sondra Tate, adores the Chicago Cubs, joins the local community center’s toddler gymnastics class in the fall, and passionately participates in the Saturday “tiny soccer”
    league, embracing the seasonal rhythm of play while occasionally forgetting to line up after sessions, and they gleefully shout ‘Go Cubs!’ whenever a home run is announced.
  arts: A vibrant three‑year‑old, Sondra Tate, immerses themselves in the colorful worlds of Dr. Seuss, enjoys the sing‑along melodies of Sesame Street and Disney’s “Let It Go,” and draws intricate pictures
    with Crayola crayons, letting those artistic experiences shape their whimsical outlook and inspire endless imaginative play, and they often narrate their own stories while drawing.
  travel: A spontaneous little explorer, Sondra Tate, revels in family road trips to the Grand Canyon, impromptu beach days in Puerto Rico, and magical evenings at Disney World, preferring the excitement
    of unplanned pit‑stops over rigid itineraries and they often insist on holding the map upside‑down for fun.
  culinary: A picky‑but‑curious three‑year‑old, Sondra Tate, adores creamy macaroni‑and‑cheese flavored with sharp cheddar, savory chicken nuggets dipped in honey mustard, and sweet banana slices, proudly
    “cooks” by stirring their bowl with a colorful plastic spoon and they insist on arranging their food in smiley‑face designs.
  core: Imaginative and effortlessly calm, Sondra Tate spins elaborate fantasy worlds at three, swaps crayons for ‘business cards,’ clutches a piggy bank like a prized artifact, and they joyfully forget
    to tidy up—living in a perpetual state of curious wonder.
background:
  cultural: Sondra is raised in a white, middle‑class family in Moreno Valley, California. Her upbringing blends typical American traditions—celebrating holidays like Thanksgiving, Fourth of July, and Halloween—with
    the multicultural vibrancy of Riverside County, where Spanish language and Mexican‑American culture are part of the community fabric. Her family encourages creativity and flexibility, allowing her ample
    free play time and exposure to diverse artistic influences, from local art festivals to community library storytimes.
