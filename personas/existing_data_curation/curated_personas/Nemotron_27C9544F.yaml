  career_goals: She frequently says she wants to become a painter who creates magical worlds, an astronaut who discovers new planets, or a storyteller who shares adventurous tales. Her ambitions are shaped
    by an innate curiosity for novelty and a love for abstract expression. She aspires to keep learning, exploring, and expressing herself through art and discovery.
