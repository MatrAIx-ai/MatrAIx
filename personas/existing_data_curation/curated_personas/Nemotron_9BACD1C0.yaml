  hobbies: '["Visiting contemporary art galleries and street‑art tours", "Digital photography (urban and nature subjects)", "Video blogging and basic video editing", "Playing acoustic guitar and songwriting",
    "Hiking in the San Gabriel foothills", "Reading graphic novels and sci‑fi literature", "Cooking experimental dishes", "Volunteering at community art workshops"]'
  career_goals: Jack aims to transition from his current non‑employment status into a creative career that fuses his love for visual arts and technology. He plans to enroll in a community‑college art program
    or complete an online UX/UI design bootcamp, develop a freelance portfolio, and eventually launch a boutique design studio offering branding, multimedia, and web services for local artists and small
    businesses. In the longer term, he hopes to mentor emerging creators and use his event‑organizing experience to build collaborative art‑focused community initiatives.
