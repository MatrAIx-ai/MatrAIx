personas:
  professional: Jack Maxwell, a 28‑year‑old aspiring creative technologist, blends self‑taught graphic design, photography, and basic web development with strong project‑management habits to launch a freelance
    portfolio aimed at branding local artists, while juggling the transition from non‑employment to a boutique design studio.
  sports: Jack Maxwell enjoys weekend hikes in the San Gabriel foothills, participates in a local pickup basketball league, follows the Los Angeles Dodgers and Clippers with fervor, and incorporates yoga
    sessions to balance flexibility with his outdoor fitness routine.
  arts: Jack Maxwell immerses themselves in the Los Angeles art scene, collecting prints by street artist Retna, attending indie film screenings featuring Greta Gerwig, strumming acoustic covers of Mac
    DeMarco at open‑mic nights, and studying graphic novel series like Saga for visual inspiration.
  travel: Jack Maxwell prefers road‑trip adventures along the Pacific Coast Highway, weekend getaways to Joshua Tree for stargazing, and annual visits to Portland’s indie music festivals, while dreaming
    of a future art‑tech expedition to Tokyo, balancing budget constraints with a thirst for cultural immersion.
  culinary: Jack Maxwell experiments with fusion dishes such as miso‑glazed salmon tacos, crafts homemade kimchi in their kitchen, and perfects avocado‑toast topped with smoked salmon and tahini, showcasing
    an intermediate cooking skill set and a palate drawn to bold, eclectic flavors.
  core: Jack Maxwell is a curious, art‑driven millennial who balances meticulous project planning with spontaneous creativity, often juggling freelance ambitions, occasional financial splurges, and a habit
    of staying up late editing photos.
background:
  cultural: Jack grew up as a white American in Pomona, California, within a middle‑class suburban environment that is adjacent to the cultural mosaic of greater Los Angeles. His family’s roots trace back
    to the Midwest, but his upbringing was shaped by the diverse artistic and cultural influences of Southern California—exposure to West Coast indie music, multicultural festivals, and the vibrant street‑art
    scene. This blend of suburban American values and the dynamic, multicultural creative landscape of Los Angeles has fostered his open‑minded curiosity, appreciation for unconventional ideas, and comfort
    navigating both organized responsibilities and flexible, exploratory pursuits.
attributes:
  skills: '["Graphic design (Adobe Photoshop, Illustrator)", "Digital photography and photo editing", "Video editing (Adobe Premiere Pro)", "Basic web design (HTML, CSS)", "Project coordination and event
