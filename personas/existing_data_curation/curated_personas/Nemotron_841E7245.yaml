personas:
  professional: Sherri Barradas, a 27‑year‑old community‑focused event organizer and aspiring peer‑support specialist, blends meticulous scheduling with a natural talent for rallying friends, turning her
    own bouts of anxiety into empathetic listening while laying the groundwork for a home‑based craft boutique that marries her curiosity for textiles and watercolor art with entrepreneurial ambition.
  sports: Sherri Barradas energizes her week with line‑dancing classes at the local community center and swing lessons at a historic dance hall, follows the Charlotte Hornets and Carolina Panthers religiously,
    participates in a weekend hiking club that explores the Blue Ridge foothills, and volunteers as a scoreboard monitor for the Johnston County high‑school soccer team, balancing cardio fun with social
    camaraderie.
  arts: Sherri Barradas spends evenings watercolor‑painting delicate landscapes inspired by Monet and Georgia O'Keeffe, quilts vibrant blankets using patterns she discovered at a New Mexican textile fair,
    knits cozy scarves while listening to Ella Fitzgerald, attends community‑theater rehearsals to study stagecraft, and devours contemporary novels by Sally Rooney and Ocean Vuong, allowing each artistic
    medium to feed her endless curiosity and social spirit.
  travel: Sherri Barradas plans her getaways with the same spreadsheet precision she uses for budgets, favoring weekend escapes to Asheville’s art districts, sunrise hikes on the Blue Ridge Parkway, and
    historic strolls through Charleston, while dreaming of a jazz‑filled weekend in New Orleans and a spring pilgrimage to Paris’s Louvre, all booked on discount travel sites and funded by occasional Etsy
    sales profits.
  culinary: Sherri Barradas enjoys farm‑to‑table cooking, frequently preparing heirloom tomato and basil salads, rosemary‑infused roasted carrots, and a fluffy sourdough bread she learned from a YouTube
    tutorial, experiments with shrimp and grits seasoned with cilantro, and frequently snacks on raw carrots while painting, though she sometimes burns sauce when lost in a creative reverie.
  core: Sherri Barradas is a vibrant, organized art enthusiast whose restless curiosity, social fire‑starter energy, and anxiety‑driven empathy fuel a life of community events, handcrafted creations, meticulous
    budgeting, and spontaneous dance nights.
background:
  cultural: Sherri grew up in the rural South as a white woman in a close‑knit, predominantly Southern community. Her upbringing emphasized family ties, church involvement, and hospitality, shaping her
    sociable and outgoing nature. The values of self‑reliance and community support common in Johnston County have fostered her cooperative spirit, while her exposure to Southern folk art and regional crafts
    sparked her appreciation for creative expression. Despite limited formal schooling, the cultural emphasis on practical skills and community participation has helped her develop a strong work ethic and
    an adaptable, curious mindset.
attributes:
  skills: '[''Community event coordination'', ''Household budgeting and finance management'', ''Handmade crafts (quilting, knitting, crocheting, watercolor painting)'', ''Basic computer literacy (email,
    social media management)'', ''Informal peer counseling and emotional support'', ''Cooking and nutrition planning'']'
  hobbies: '[''Watercolor painting'', ''Textile arts (quilting, knitting, crocheting)'', ''Community theater participation'', ''Social dancing (line dancing, swing)'', ''Gardening'', ''Reading contemporary
    fiction'', ''Exploring local farmers markets and art fairs'', ''Cooking and trying new recipes'']'
  career_goals: Sherri aspires to complete her GED and obtain certification as a peer support specialist, allowing her to turn her personal experience with anxiety into a professional helping role. She
    also dreams of launching a home‑based craft business, selling her handmade textiles and paintings at regional markets and online. Long‑term, she hopes to secure a part‑time position with a local community
    organization where she can combine her event‑planning talent, artistic interests, and passion for mental‑health advocacy to create supportive programs for residents of Johnston County.
