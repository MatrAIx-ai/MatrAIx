  career_goals: Although not currently employed full‑time, Justin intends to leverage his experience to launch a part‑time consulting practice aimed at helping local small businesses in the Morro Bay area
    improve operational efficiency and financial sustainability. He is also motivated to author a guidebook on practical entrepreneurship for retirees, blending his business acumen with his love for sharing
    knowledge. Additionally, he aspires to serve on the board of the Morro Bay Chamber of Commerce, influencing community development projects and advocating for sustainable economic growth. On a personal
    level, he hopes to achieve a balanced lifestyle that allows for continued learning—particularly in emerging digital tools—while maintaining his health and independence.
