persona_description: Jane Rhodes, an American studies professor who is passionate about the topic of mixed race identities and the development of a better understanding of the subject through conferences
  and scholarly research. She is interested in exploring the intersection of race, gender, and identity and how they shape individuals' experiences and perceptions. Her research focuses on the role of culture
  and history in shaping racial identities and the impact of social and political factors on racial identity development. Her department's annual conference on mixed race identities is an opportunity for
  her to share her insights and engage with other scholars and students in the field.
