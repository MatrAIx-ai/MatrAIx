persona_description: A scientist who has developed a new diagnostic test for Leishmania donovani, a parasite that causes kala-azar (VL) and visceral leishmaniasis (VL). The test is accurate, non-invasive,
  and can detect antibodies in the blood within two hours. The test has been validated in India, Nepal, Sri Lanka, and Brazil, and is now being tested in Africa. The scientist has received awards for his
  innovation and has filed for a patent.
