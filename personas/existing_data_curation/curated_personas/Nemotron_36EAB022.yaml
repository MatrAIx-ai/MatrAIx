  career_goals: Linda aims to transition into a supervisory or training role within her organization, seeking to streamline office procedures and mentor newer staff members. She plans to obtain a Certified
    Administrative Professional credential and earn recognition for operational efficiency. As she approaches retirement, she envisions offering part‑time consulting services to local small businesses on
    front‑office best practices, while ensuring a smooth financial transition and continued community involvement.
