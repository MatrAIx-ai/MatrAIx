personas:
  professional: Joshua Donovan, a seasoned maintenance specialist, excels at diagnosing and repairing electrical, HVAC, and plumbing systems with methodical precision, mentors junior colleagues, and as
    they pursue journeyman electrician and NATE certifications, seeks to formalize protocols while cultivating a supportive, harmonious workplace culture.
  sports: Joshua Donovan avidly follows the New Orleans Saints and LSU Tigers, joins early‑morning jogs along the Atchafalaya Trail, participates in a community rowing club during spring, and picks up a
    casual basketball game at the local gym on weekends, as they keep fitness low‑key and predictable.
  arts: Joshua Donovan attends intimate Cajun music gatherings at Café du Monde where they hear Michael Doucet and BeauSoleil, quietly strums acoustic covers of Bob Dylan and Neil Young at home, and meticulously
    constructs model train layouts that reflect their love for precision and nostalgia.
  travel: Joshua Donovan prefers low‑stress road trips to familiar, scenic locales like Charleston’s historic district, the Great Dismal Swamp, and the lively festivals of New Orleans, planning each itinerary
    in advance, budgeting carefully, yet they occasionally daydream about an overseas sailing adventure that remains out of reach.
  culinary: Joshua Donovan enjoys cooking classic gumbo and shrimp étouffée with home‑grown tomatoes and okra, sears catfish in a well‑seasoned cast‑iron skillet for jambalaya, and routinely bakes cornbread
    that often ends up over‑browned as they rush to finish meals before evening television.
  core: Joshua Donovan blends a love for quiet, structured routines with an undercurrent of anxiety that fuels meticulous planning, a habit of double‑checking every circuit, and occasional splurges on high‑end
    fishing gear although they keep a generally frugal budget.
background:
  cultural: Joshua grew up in a working‑class white family in the Baton Rouge area, immersed in Southern hospitality, a strong sense of community, and the regional blend of Cajun and Creole influences.
    Raised in a Protestant (Baptist) environment with occasional exposure to Catholic traditions, he values hard work, self‑reliance, and respect for local customs, including the love of gumbo, jambalaya,
    and live music. His upbringing in the Gulf Coast energy and construction sectors shaped his practical skill set and reinforced a pragmatic, organized approach to both work and life.
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC system installation and maintenance'', ''Plumbing repairs'', ''Carpentry and fixture installation'', ''Reading technical schematics'', ''Preventive maintenance
    scheduling'', ''Safety compliance and OSHA regulations'', ''Inventory management'', ''Team coordination'', ''Customer service'', ''Problem solving under pressure'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Reading technical manuals and local history'', ''Model train building'', ''Acoustic guitar playing'', ''Attending small Cajun music gatherings'', ''Walking nature
    trails'', ''Volunteer work at community food bank'']'
  career_goals: Joshua aims to advance to a lead technician or foreman role where he can formalize maintenance protocols and mentor junior staff, reinforcing the structured environment he values. He plans
    to obtain journeyman electrician certification and specialized HVAC certifications (NATE, EPA universal) to solidify his expertise. Long‑term, he envisions launching a small, employee‑owned maintenance
    business that prioritizes reliability, safety, and a supportive workplace culture, providing financial stability and reducing his personal anxiety about job security.
