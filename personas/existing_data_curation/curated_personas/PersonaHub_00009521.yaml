persona_description: A social worker who has dedicated their career to working with at-risk youth and has experience in understanding and addressing the complex issues of domestic violence and stalking
  among teens. They are passionate about advocating for the rights of young victims and have a deep understanding of the psychological and emotional toll that these issues can take on young people. They
  are skilled in developing and implementing effective intervention strategies and have a proven track record of successfully working with at-risk youth and their families to help them overcome the challenges
  they face. They are also highly empathetic and have a deep sense of compassion for the young people they work with, and are committed to using their skills and knowledge to make a positive difference
  in their lives.
