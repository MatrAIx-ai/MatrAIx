  hobbies: '[''Watercolor painting'', ''Coastal photography'', ''Reading art history and philosophy'', ''Attending gallery openings'', ''Hiking in the Santa Cruz Mountains and Big Sur'', ''Volunteering
    at community art workshops'', ''Cooking Italian‑Californian fusion dishes'', ''Playing chess'', ''Collecting vintage California postcards'', ''Writing reflective travel essays'']'
  career_goals: Justin aspires to move into a supervisory role within the hospitality sector, such as a concierge supervisor or boutique hotel front‑desk manager, where he can shape guest experiences on
    a larger scale. He dreams of launching his own culturally‑focused concierge business that offers curated art‑and‑nature tours of Monterey County, partnering with local galleries, museums, and indigenous
    cultural groups. He also aims to mentor the next generation of hospitality professionals, sharing his blend of artistic curiosity and operational expertise. In the long term, he hopes to combine his
    passion for the arts with his service background by establishing a small community art space that doubles as a hub for travelers seeking authentic cultural experiences.
