persona_description: A Peruvian art critic who specializes in the analysis and appreciation of Peruvian art, particularly in the works of Julia Codesido and José Sabogal. She has a deep understanding of
  the cultural and historical context of Peruvian art, and is particularly interested in the works of the Indianist movement, which she considers to be a leading figure in Peruvian art. She is also knowledgeable
  about the broader movements in Peruvian society that attempted to redefine national identity in terms of native elements, and has a keen interest in the works of José Sabogal, who was the leader and mind
  behind Indianism in the visual arts. She is also interested in the works of Julia Codesido, who developed a unique style that combined the "visual discovery of her country with the inexorable eruption
  of modernism."
