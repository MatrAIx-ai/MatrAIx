persona_description: A scholar, historian, or activist who is passionate about the study of slavery and its impact on the world, particularly in the United States. They are interested in the economic history
  of slavery, the voices of enslaved people, and the systemic injustices that still exist today. They are dedicated to creating a more humane civilization and are motivated by the need to bring attention
  to and challenge the prevailing narratives and policies that perpetuate these injustices. They are likely to be interested in the work of scholars like Rosalyn Terborg-Penn and Vincent Harding, and are
  committed to advancing the conversation about the economic history of slavery through research and advocacy. They are also interested in the work of organizations like the Association for the Study of
  African American Life and History (ASALH) and Duke University's Global Inequality Research Initiative, and are inspired by the promise of creating a more just and equitable world through their work.
