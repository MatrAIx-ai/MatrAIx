  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Reading automotive journals'', ''Grilling'', ''Chess'', ''Volunteer work at church food pantry'']'
  career_goals: Robert aims to earn the ASE Master Technician certification within the next two years, with a specialization in hybrid and electric vehicle systems. He envisions opening a modest, family‑friendly
    auto repair shop in Columbia City that emphasizes high‑quality service, community involvement, and environmentally responsible practices. He also hopes to become a certified trainer at the local vocational
    school, sharing his practical knowledge with the next generation of technicians. Balancing his ambition with family stability, he plans to expand his business gradually while maintaining a work‑life
    rhythm that allows ample time for his wife and children.
