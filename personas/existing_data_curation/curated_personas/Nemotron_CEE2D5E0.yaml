  career_goals: Evelyn dreams of a future where she can blend her love for nature, problem‑solving, and helping others. She imagines becoming a wildlife biologist or environmental scientist, researching
    local habitats and protecting the animals she often sees on family trips to nearby parks. At the same time, she is drawn to the idea of teaching, hoping to one day become an elementary school teacher
    who can inspire curiosity in younger children. Her practical side also entertains the possibility of studying civil engineering to design safe community spaces, showing her ambition to make a tangible
    difference in her hometown.
