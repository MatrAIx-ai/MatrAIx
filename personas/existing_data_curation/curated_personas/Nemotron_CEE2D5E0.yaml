personas:
  professional: Evelyn Beck is an aspiring young engineer who combines her love of building intricate LEGO structures with a budding interest in coding Scratch games, approaching each project with methodical
    planning and a curious eye for how things work, and they often document their process in a colorful notebook.
  sports: Evelyn Beck spikes the ball for Westfield Thunder’s Under‑10 soccer team, cheers on the Chicago Cubs and Chicago Fire FC, and they spend weekends hiking local trails, balancing competitive play
    with a love of nature‑inspired fitness.
  arts: Evelyn Beck nurtures their creative side by practicing piano three times a week, sketching wildlife during forest walks, and drawing inspiration from the whimsical scores of Ludovico Einaudi as
    well as the animated films of Hayao Miyazaki, weaving music and visual art into their daily routine.
  travel: Evelyn Beck has explored the Appalachian Trail’s foothills on family camping trips, visited the historic sites of Washington, D.C., and they dream of seeing the cherry blossoms in Kyoto and the
    castles of Scotland, preferring organized itineraries that include nature hikes and hands‑on museum activities.
  culinary: Evelyn Beck prefers crunchy snacks like apple slices with peanut butter, loves helping mom whip up spaghetti Bolognese with fresh tomatoes and basil, and they can make a mean grilled cheese
    using cheddar and a sprinkle of paprika, yet they often skip brushing their teeth after sugary treats.
  core: Evelyn Beck is a methodical nine‑year‑old who blends curiosity with practicality, balances LEGO engineering, soccer drills, piano practice, and meticulous allowance budgeting, and they sometimes
    over‑pack their backpack with rocks and forget to brush their teeth after candy.
background:
  cultural: Evelyn grows up in Westfield, a small town in Surry County, North Carolina, where community ties and Southern hospitality shape daily life. Her family values hard work, kindness, and respect
    for the land; they often spend weekends at local farms, county fairs, and church gatherings. The local school emphasizes both academic achievement and community involvement, encouraging students to
    participate in service projects and celebrate regional traditions like Appalachian folk music and seasonal festivals. Evelyn's upbringing blends these rural Southern customs with modern influences from
    online learning platforms and popular media, giving her a balanced cultural perspective that appreciates tradition while staying open to new ideas.
