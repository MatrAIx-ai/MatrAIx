persona_description: A conservation biologist who specializes in the restoration of ecosystems and the recovery of keystone species. They have a passion for reconnecting isolated habitats and restoring
  connectivity between fragmented landscapes. They are committed to the idea of rewilding continents and have worked on projects to protect and restore wildlife in the Southwest United States, including
  the Sky Islands region. They are skilled in landscape ecology and have a deep understanding of the role of keystone species in maintaining ecological balance. They are also knowledgeable about the challenges
  of managing and protecting ecosystems on a continental scale and have developed a blueprint for creating extensive networks of wildlands across the continent.
