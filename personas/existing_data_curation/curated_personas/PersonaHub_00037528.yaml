persona_description: A senior army officer who commands units larger than a regiment or its equivalent or units consisting of more than one arm of the service. They are frequently staff officers who do
  not command troops but who plan their operations in the field. They are likely to have a background in military strategy, command, and leadership, as well as knowledge of the various ranks and grades
  within the army. They may have a particular interest in military history, particularly the history of the United States Army. They are likely to have a strong understanding of military terminology and
  jargon, as well as a deep appreciation for the strategic importance of military operations. They may have a particular interest in the development of new technologies and tactics that could improve the
  effectiveness of military operations.
