personas:
  professional: Guillermo Medina, a 26‑year‑old retail associate proficient in bilingual POS platforms and data‑driven visual merchandising, channels their organized calm into training new hires, streamlining
    checkout flow, and leveraging sales analytics to earn a promotion to assistant store manager.
  sports: Guillermo Medina stays active through weekly trail hikes around Lake Winnebago, winter snowshoeing with the Fond du Lac Snowshoe Club, follows the Milwaukee Bucks, Brewers, and Packers, and they
    volunteer as a scorekeeper for the local youth soccer league each summer.
  arts: Guillermo Medina, an amateur acoustic guitarist, regularly performs folk covers of John Mayer and Ed Sheeran at community events, curates a board‑game night featuring Settlers of Catan and Codenames,
    and they are an avid fan of indie filmmaker Guillermo del Toro’s cinematic work.
  travel: Guillermo Medina prefers meticulously planned road trips that blend adventure photography with affordable lodging, has explored Door County’s lighthouses, dreams of photographing Iceland’s waterfalls,
    and they aim to visit Oaxaca next year to research culinary traditions for their fusion menu.
  culinary: Guillermo Medina, a confident home cook, masters traditional pozole and tamales while experimenting with Midwestern corn‑bread and smoked cheese to create fusion dishes like chipotle‑infused
    cheese curds, and they relish sourcing fresh chilies and masa from the local farmer’s market.
  core: Guillermo Medina blends analytical calm with creative curiosity, juggling retail ambition, mountain photography, and nightly guitar strums, all while obsessively checking inventory numbers before
    bedtime.
background:
  cultural: Guillermo is a first‑generation Mexican‑American whose parents emigrated from Jalisco. He grew up in a bilingual household in Wisconsin, celebrating Mexican holidays such as Día de los Muertos,
    Las Posadas, and Cinco de Mayo alongside Midwestern traditions. The values of familismo, respeto, and community service were instilled early, shaping his cooperative and considerate nature. Fluent in
    both Spanish and English, he frequently serves as a cultural bridge in his workplace and community. While rooted in Mexican culinary and musical traditions, his daily life reflects the practical, punctual,
    and collaborative ethos of the Upper Midwest, giving him a hybrid identity that informs his interpersonal style, work ethic, and personal interests.
attributes:
  skills: '[''Customer Service'', ''Bilingual Spanish-English Communication'', ''Point-of-Sale (POS) System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Sales Data Analysis'', ''Conflict
