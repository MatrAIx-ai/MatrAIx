  hobbies: '[''Hiking and Snowshoeing in Wisconsin State Parks'', ''Cooking Traditional Mexican Dishes and Fusion Recipes'', ''Playing Acoustic Guitar'', ''Reading Science and Technology Magazines'', ''Participating
    in Community Cultural Festivals'', ''Volunteering as a Spanish Tutor at the Local Hispanic Center'', ''Nature Photography'', ''Board Games and Trivia Nights'']'
  career_goals: Guillermo aims to leverage his strong operational foundation to advance into a management trajectory within the next three years. His immediate goal is to become an assistant store manager,
    where he can hone leadership, scheduling, and budgeting skills. He plans to complete his bachelor's degree in Business Administration part‑time, and obtain a retail‑management certification to strengthen
    his credentials. Long‑term, he envisions either progressing to a district manager role overseeing multiple locations across the Midwest or launching his own small Mexican‑themed boutique grocery and
    café that blends his cultural heritage with his retail expertise. He is also interested in exploring e‑commerce channels to expand his future business’s reach.
