  hobbies: '["soccer", "LEGO building", "drawing and coloring", "dancing to salsa and reggaetón", "singing", "listening to storytime", "visiting the library", "helping in the kitchen"]'
  career_goals: Even at five, Armando dreams of becoming a professional soccer player who can represent his community and showcase his Puerto Rican heritage on a big stage. He also imagines one day leading
    a neighborhood youth sports program, teaching younger kids how to play and stay active. Inspired by the excitement of performing, he occasionally envisions a future where he can share stories or songs,
    perhaps as a teacher or community storyteller, but his primary ambition remains to achieve excellence on the soccer field.
