personas:
  professional: Armando, a budding junior problem-solver who transforms play-time into engineering challenges, combines boundless curiosity with pragmatic step-by-step planning as they construct elaborate
    LEGO cities, proudly narrating each design to mesmerized classmates while subtly banking on their competitive edge to win every building contest.
  sports: Armando, a vivacious member of the neighborhood "Mini Sprouts" soccer club and avid little fan of the Los Angeles Dodgers, tackles each Saturday practice with organized drills and spontaneous
    improvisation, thrives on being the chatterbox on the field, and relishes the competitive thrill of scoring goals against peers while occasionally doubting opponents' sportsmanship.
  arts: Armando, an enthusiastic doodler who sketches superhero figures and sings along to Raffi's "Baby Beluga" with unabashed enthusiasm, immerses themselves in the vibrant worlds of Disney movies and
    the rhythmic beats of Kidz Bop, channeling their talkative nature into animated storytelling sessions that dominate playgroup circles.
  travel: Armando, an adventurous five-year-old who revels in family trips to the nearby beach boardwalk and the magical realms of Disneyland, prefers meticulously planned itineraries punctuated by spontaneous
    treasure hunts, dreams of visiting the Eiffel Tower someday, and competes with friends to collect the most souvenir postcards.
  culinary: Armando, a picky yet curious eater, adores crunchy chicken nuggets seasoned with a dash of paprika, relishes creamy mac and cheese swirled with hidden peas, and occasionally experiments with
    strawberry-banana smoothies, proudly declaring their favorite snack to anyone who'll listen.
  core: Armando, a talkative five-year-old who balances curiosity with practicality, thrives on social spotlight, competes fiercely, and navigates daily challenges with a blend of resilient optimism and
    occasional skeptical doubts.
background:
  cultural: Armando grows up in a vibrant Puerto Rican household in Philadelphia. His parents speak both Spanish and English, weaving together traditions from the island with the rhythms of city life. Family
    gatherings feature dishes such as arroz con gandules, pasteles, and flan, and celebrations include music, dancing, and the annual Philadelphia Puerto Rican Day Parade. He regularly hears salsa, plena,
    and reggaetón, which influence his love for dancing and music. The close‑knit extended family emphasizes respect, hard work, and community pride, encouraging Armando to stay connected to his roots while
    exploring opportunities in his neighborhood.
attributes:
  skills: '["basic reading and phonics", "counting and simple addition", "bilingual communication (English and Spanish)", "block construction and puzzle solving", "storytelling and performing", "leadership
