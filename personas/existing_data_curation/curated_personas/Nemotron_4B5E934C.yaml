personas:
  professional: An architect named Hua Koo leverages advanced BIM and parametric tools like Revit, Grasshopper, and Rhino to craft climate‑positive, culturally responsive projects while leading interdisciplinary
    charrettes that blend assertive vision with empathetic collaboration.
  sports: A devoted runner and cyclist named Hua Koo competes in the Bay Area Marathon, rides the Bay Trail with the local Eco‑Cycle Club, and joins the East Bay Hiking Society for weekend hikes in the
    hills, while cheering for the Golden State Warriors and San Jose Earthquakes during off‑season.
  arts: An art‑enthusiast architect named Hua Koo sketches urban scenes at the Berkeley Art Museum, curates a personal photo series inspired by James Turrell’s light installations, and follows contemporary
    creators like KAWS and Yayoi Kusama, integrating these visual influences into both design concepts and personal studio work.
  travel: A travel‑savvy architect named Hua Koo prefers weekend road trips to Sonoma’s vineyards and the Pacific coast’s redwood parks, while planning annual pilgrimages to sustainable architecture showcases
    in Copenhagen and occasional cultural immersion tours in Kyoto's historic temples for design research.
  culinary: A fusion‑focused home chef named Hua Koo experiments with dishes such as soy‑lavender braised short ribs paired with heirloom tomatoes, miso‑glazed maitake mushrooms tossed with Californian
    pine nuts, and green tea‑infused panna cotta, showcasing a skill level that blends classic wok techniques with farm‑to‑table sourcing.
  core: An inquisitive, stress‑prone architect named Hua Koo blends rigorous sustainable design with a relentless appetite for art, community, and culinary experimentation, often juggling meditation breaks
    between design charrettes and a penchant for over‑investing in camera lenses.
background:
  cultural: Hua was born to first‑generation Chinese immigrants and grew up in a bilingual household that emphasized respect for elders, academic excellence, and cultural traditions. He celebrates Chinese
    New Year and the Mid‑Autumn Festival with his family, maintaining fluency in Mandarin while comfortably navigating the multicultural environment of Berkeley. His architectural perspective is shaped
    by the interplay of his heritage’s emphasis on harmony, spatial hierarchy, and nature, and the Bay Area’s progressive, sustainability‑focused design culture. This dual lens informs his work, where he
    often incorporates subtle references to traditional Chinese courtyard layouts and material palettes within contemporary, environmentally responsive projects.
