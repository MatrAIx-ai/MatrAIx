  hobbies: '[''Urban Sketching'', ''Architectural Photography'', ''Cycling'', ''Running Club'', ''Hiking'', ''Fusion Cooking'', ''Mindfulness Meditation'', ''Yoga'', ''Art Museum Visits'', ''Community Volunteering
    (Habitat for Humanity)'', ''STEM‑Design Mentorship'']'
  career_goals: Hua aspires to become a partner in his firm and eventually launch his own practice that focuses on culturally responsive, climate‑positive architecture for the Bay Area. He aims to deepen
    his expertise in net‑zero design, earn a LEED Fellow designation, and publish a series of case studies on integrating traditional East Asian spatial principles with modern sustainable technology. A
    key ambition is to cultivate a work environment that actively supports mental‑wellness and work‑life balance, drawing from his own experiences with stress. He also hopes to mentor younger architects,
    especially those from underrepresented backgrounds, and to contribute to community‑driven projects such as affordable housing and public plazas in Berkeley.
