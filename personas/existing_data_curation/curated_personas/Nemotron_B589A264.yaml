  hobbies: '["Gospel and R&B concerts", "Church choir participation", "Dance classes (ballroom and hip-hop)", "Cooking soul-food with Tex-Mex influences", "Backyard gardening", "Reading self-improvement
    books", "Volunteering for neighborhood clean-ups", "Mentoring teens in after-school programs", "Following the Houston Rockets"]'
  career_goals: Mary plans to obtain her GED within the next year and then enroll in a community-college associate degree program in Business Administration or Public Health. Her short-term goal is to secure
    an entry-level administrative or community-outreach position with a nonprofit that serves youth in Houston. Over the longer term she aspires to become a community program manager and eventually launch
    a small catering business that blends soul food with Tex-Mex flavors, allowing her to combine her organizational talent with her culinary passion.
