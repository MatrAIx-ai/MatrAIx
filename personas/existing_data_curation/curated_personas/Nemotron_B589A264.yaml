personas:
  professional: Mary Person is a community liaison who leverages strong interpersonal communication, meticulous organization, and confident public speaking to coordinate youth outreach events, while their
    practical, structured mindset ensures deadlines are met and budgets stay balanced.
  sports: Mary Person is a dedicated fan of the Houston Rockets, attending home games whenever possible, while they also join a local recreational basketball league at the community center and volunteer
    as a scoreboard operator during youth soccer matches, balancing spectator enthusiasm with modest participation in amateur sports.
  arts: Mary Person delights in attending gospel and R&B concerts featuring artists like Kirk Franklin and Alicia Keys, sings lead in their church choir, and practices both ballroom and hip‑hop dance at
    community centers, weaving music and movement into their social life.
  travel: Mary Person plans weekend getaways to nearby Austin for its live music scene and yearly trips to New Orleans to indulge in Creole cuisine, while dreaming of a future cultural immersion trip to
    Oaxaca, Mexico, though budget constraints often steer them toward cost‑effective road trips and discount airline deals.
  culinary: Mary Person enjoys cooking soul‑food dishes such as collard greens spiced with chipotle, black‑eye peas simmered with chorizo, and fried chicken nachos, blending Southern comfort with Tex‑Mex
    flavors, and they consider themselves an intermediate home chef who often experiments with smoked paprika and fresh cilantro.
  core: Mary Person channels boundless energy into community work, music, and cooking, yet habitually hoards extra pens and sticky notes, and can’t resist a good gospel riff even during a budget meeting.
background:
  cultural: Mary is a Black woman raised in Houston’s historically African-American neighborhoods of Harris County. Her family places a strong emphasis on church involvement, community solidarity, and the
    preservation of Southern African-American culinary traditions. She grew up with gospel music, blues, and contemporary R&B as the soundtrack to family gatherings and community events. Celebrations such
    as Juneteenth, local cultural festivals, and church potlucks shape her identity, while the multicultural flavors of Houston—ranging from Creole to Tex-Mex—inform her cooking and social life. This cultural
    foundation fuels her commitment to uplift her community through service and connection.
attributes:
  skills: '["Interpersonal communication", "Event planning", "Community outreach", "Basic computer literacy (Microsoft Office)", "Budgeting and resource allocation", "Conflict resolution", "Public speaking",
