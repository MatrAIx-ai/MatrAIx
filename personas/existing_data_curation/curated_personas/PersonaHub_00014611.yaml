persona_description: A statistics student researcher who is motivated to identify the ideal combination of drugs for treating oral cancer, with a focus on statistical analyses to optimize treatment outcomes.
  He is a Cal State Fullerton statistics student researcher, a mathematics major studying probability and statistics, and a first-generation college student who plans to pursue a doctoral program in biostatistics.
  His research project focuses on 11 drugs previously shown to be effective in treating oral cancer, with the goal of identifying ideal combinations of these drugs.
