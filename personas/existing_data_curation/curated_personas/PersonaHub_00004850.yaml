persona_description: An experienced and skilled air transport group commander, particularly in the field of tactical air defense and air transport. The individual has a deep understanding of air transportation
  operations, including air defense, tactical fighter missions, air transport, and air transport group management. They have extensive experience in the redesignation and reorganization of air defense and
  tactical air defense units, as well as the transition from ADC to TAC and the change in training missions. They have a strong focus on high-altitude interception, air-to-ground rocketry, ground strafing,
  and tactical bombing, and have experience with high-altitude interceptors, tactical fighter groups, and tactical fighter missions. They have also been involved in the redesignation of air transport units
  and the transition from ADC to TAC, as well as the transfer of units to other organizations.
