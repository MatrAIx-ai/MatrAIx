  hobbies: '[''Art museum visits'', ''Photography'', ''Contemporary art appreciation'', ''Bridge (competitive card game)'', ''Reading non‑fiction (philosophy, psychology, tech)'', ''Hiking in Allegheny
    County parks'', ''Volunteer set design for community theater'']'
  career_goals: Approaching retirement, Nicholas aims to leverage his decades of experience by becoming a senior consultant and mentor within the insurance industry. He plans to obtain the CPCU designation,
    develop a workshop series on best practices for claim adjusters, and author a practical guide on investigative techniques. He is also interested in exploring how artificial intelligence can improve
    claim triage, hoping to pilot a pilot project with his current employer. Ultimately, he envisions a part‑time advisory role that lets him stay competitive while shaping the next generation of investigators.
