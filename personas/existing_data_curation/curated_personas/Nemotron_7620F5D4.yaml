personas:
  professional: David Fletcher, a seasoned community arts facilitator, uses their disciplined project‑management expertise and boundless imagination to design multidisciplinary art hubs that blend Afrofuturist
    aesthetics with local history, while they constantly push themselves to secure larger grants and mentor the next generation of creators through a competitive drive.
  sports: David Fletcher stays active by leading weekly mindfulness‑movement classes at the local community center, cheering for the Nebraska Cornhuskers football team in the fall and the Omaha Storm basketball
    squad in the winter, while they also dominate senior‑league chess tournaments that satisfy their competitive edge.
  arts: David Fletcher immerses themselves in the creative world by painting large‑scale abstract canvases inspired by Sun Ra’s cosmic jazz, studying the graphic work of Jean‑Michel Basquiat, curating community
    exhibitions that showcase emerging Afrofuturist artists, and attending live performances by Esperanza Spalding and electronic DJ sets at the Mill.
  travel: David Fletcher prefers thoughtfully planned trips that blend cultural immersion and artistic inspiration, such as a week‑long pilgrimage to New Orleans’ jazz districts, a photography expedition
    to the Great Plains’ prairie skylines, and an annual visit to the Lagos Black Arts Festival, while they budget each journey through a dedicated travel fund to balance their community commitments.
  culinary: David Fletcher, an enthusiastic home cook, frequently prepares soulful dishes like jambalaya with okra and smoked sausage, collard greens seasoned with smoked turkey, and pineapple‑glazed salmon,
    while they also experiment with Ethiopian injera and use fresh riverfront vegetables from their community garden to host potluck dinners for fellow artists.
  core: David Fletcher blends disciplined organization, relentless curiosity, and a calm, competitive spirit into a life where they balance community arts leadership, strategic finance, and a steadfast
    commitment to health and creative expression.
background:
  cultural: David is an African‑American who grew up in Omaha’s North Central neighborhood during the late 1960s and 1970s, a period shaped by the civil‑rights movement and the legacy of the Great Migration.
    His family’s traditions blend Midwestern values with cultural practices passed down from the South, including gospel music from church, oral storytelling, and a strong emphasis on communal support.
    Omaha’s Black cultural institutions, such as the Great Plains Black History Museum and the annual Juneteenth celebration, have informed his appreciation for history and collective identity. These roots
    surface in his artistic work, which often interweaves the rhythms of jazz, the visual language of African motifs, and the futuristic optimism of Afrofuturism. His cultural perspective fuels his commitment
    to mentorship, community empowerment, and preserving the nuanced narratives of Black Midwestern experiences.
