  hobbies: '[''Painting (abstract & Afrofuturist)'', ''Digital illustration'', ''Chess'', ''Creative writing (poetry & short stories)'', ''Photography'', ''Community storytelling circles'', ''Community
    gardening'', ''Live music (jazz & electronic)'', ''Reading philosophy & speculative fiction'', ''Theater attendance'', ''Fitness and mindfulness classes'']'
  career_goals: Looking ahead, David aims to transform his passion for abstract and Afro‑futurist art into a lasting community legacy. He plans to secure a grant to open a small, multidisciplinary arts
    hub in a former community center where he can curate rotating exhibitions, run hands‑on workshops, and host a quarterly youth mentorship program. He also dreams of publishing a collection of speculative
    short stories that weave together Midwestern settings with African diaspora mythologies. Ultimately, he aspires to be recognized as a cultural facilitator in Omaha, advising city planners on inclusive
    public art initiatives and delivering keynote talks at regional conferences on creativity and resilience.
