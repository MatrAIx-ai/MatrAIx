  career_goals: Shane aims to advance to a regional Director of Operations role, where he can shape strategic initiatives across multiple business units and mentor emerging talent. He also envisions launching
    his own operational consulting practice to help mid‑size companies streamline processes and adopt new technologies. Additionally, he seeks opportunities to speak at industry conferences and publish
    thought‑leadership pieces on agile operations, leveraging his sociable style to build a professional brand.
