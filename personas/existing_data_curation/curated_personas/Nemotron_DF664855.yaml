  hobbies: '[''Live Music (Blues & Jazz)'', ''Cajun/Creole Cooking'', ''Hosting Dinner Parties'', ''Golf'', ''Fantasy Football Leagues'', ''Tech Gadget Exploration'', ''Reading Business Strategy Books'',
