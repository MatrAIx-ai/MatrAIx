personas:
  professional: Louis Okelly is an aspiring automotive technician who leverages their hands‑on experience with vehicle maintenance, basic carpentry, and meticulous planning to excel in workshop tasks, using
    a methodical mindset to keep detailed service logs and to mentor peers as they progress toward ASE certification.
  sports: Louis Okelly follows the Memphis Grizzlies, cheers on Southaven High School football, lifts weights at home, and spends Saturdays fishing at Lake Washington with a local club, which they balance
    against competitive video‑game strategy sessions.
  arts: Louis Okelly immerses themselves in Southern rock and country, frequently playing tracks by Lynyrd Skynyrd, Jason Aldean, and Luke Combs, while also channeling creative detail into assembling scale
    model kits of WWII aircraft, a hobby that mirrors the craftsmanship of model‑maker Allen Hulse.
  travel: Louis Okelly enjoys road trips along the Gulf Coast, has visited the vibrant streets of New Orleans and the Great Smoky Mountains, and dreams of exploring the Porsche Museum in Stuttgart, preferring
    that they fit a modest student budget through carefully planned itineraries.
  culinary: Louis Okelly favors classic Southern dishes like smoked barbecue ribs, fried catfish, and shrimp étouffée, often seasoning them with hickory smoke and Cajun spices, and while they can competently
    grill a weekend cookout, they still rely on frozen pizza when rushed.
  core: Louis Okelly is a methodical, 19‑year‑old aspiring mechanic whose love of detailed projects, disciplined budgeting, and quiet competitiveness shapes a life that they envision as building a reliable
    future while still indulging in solitary gaming and occasional fast‑food shortcuts.
background:
  cultural: Louis is a white, Southern American who grew up in Southaven, Mississippi, a suburban community in DeSoto County near Memphis. His upbringing was shaped by a close‑knit family and a predominantly
    Christian, middle‑class environment that emphasized hard work, self‑reliance, and modest community involvement. Local culture includes a strong appreciation for Southern cuisine (e.g., barbecue, fried
    catfish), country and Southern rock music, high‑school football, and regional events such as county fairs and community festivals. He has been influenced by the values of practicality, respect for authority,
    and a preference for familiar, predictable routines common in the area. While the community is relatively conservative, it nurtures a sense of hospitality and neighborly support, which Louis experiences
    through informal gatherings and church‑based activities.
attributes:
  skills: '["Automotive maintenance", "Basic carpentry", "Minor electrical repair", "Data entry", "Microsoft Excel budgeting", "Time management", "Organizational planning", "Strategic video gaming", "Online
