  hobbies: '["Scale model building", "Automotive tinkering", "Strategy video gaming", "Technical reading", "Weight training", "Fishing", "Listening to Southern rock and country music", "Watching local high
    school football"]'
  career_goals: Louis aims to transform his hands‑on abilities into a stable, long‑term career in the automotive trade. His immediate goal is to obtain his GED within the next year, which will qualify him
    to enroll in a vocational automotive technology program at a nearby community college. After completing the program and earning an ASE certification, he plans to secure a full‑time entry‑level mechanic
    position at a reputable dealership or independent shop in the Memphis‑Southaven area. In the medium term, Louis aspires to become a lead technician, leveraging his organizational strengths to oversee
    shop workflow and mentor apprentices. Ultimately, he envisions opening his own small garage that offers reliable, honest service to the community, allowing him to combine his love of structured work
    with entrepreneurial independence. As an alternative pathway, he is also considering enlisting in the U.S. Army as a vehicle maintenance specialist, which would provide the disciplined environment he
    values while further developing his technical expertise.
