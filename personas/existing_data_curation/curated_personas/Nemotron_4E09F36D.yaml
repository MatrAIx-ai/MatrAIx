  career_goals: Approaching the later stage of her career, Cynthia aims to transition into a mentorship and training role within the Gaston County Sheriff’s Office, where she can share her practical knowledge
    and emphasis on harmonious community relations with newer officers. She hopes to develop a small‑group peer‑support program that addresses mental‑health challenges among officers, leveraging her own
    experience with anxiety and emotional reactivity. Long‑term, she envisions either a senior supervisory position such as sergeant or a civilian consultancy role focusing on community‑policing strategies
    and officer wellness initiatives.
