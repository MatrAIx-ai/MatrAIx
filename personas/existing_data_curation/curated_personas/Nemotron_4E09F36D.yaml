personas:
  professional: Cynthia Miller, a veteran law‑enforcement officer with more than thirty years of investigative, patrol, and crisis‑response experience, leverages her practical curiosity, strong conflict‑de‑escalation
    skills, and empathetic listening to mentor rookie deputies and champion community‑focused policing while thriving in improvisational, flexible problem‑solving environments.
  sports: Cynthia Miller enjoys low‑impact fitness, regularly walking the Crowders Mountain Trail with the local Trail Club, attends Charlotte Hornets games for summer entertainment, follows the Carolina
    Panthers during football season, and occasionally joins a weekend softball league at the community center.
  arts: Cynthia Miller immerses herself in true‑crime literature by authors such as Ann Rule and Gillian Flynn, delightedly explores North Carolina history exhibitions at the Gastonia museum, and relaxes
    to the soulful folk tunes of Jason Isbell while knitting, occasionally attending a community theater production of 'Our Town.'
  travel: Cynthia Miller prefers intentional, low‑key road trips that blend nature and history, having explored the Blue Ridge Parkway and the historic streets of Charleston, South Carolina, while dreaming
    of a quiet visit to Edinburgh’s Old Town, and typically plans itineraries on the fly using a small notebook rather than rigid schedules.
  culinary: Cynthia Miller enjoys cooking simple, seasonal meals like roasted butternut squash soup seasoned with sage and rosemary, often incorporating foraged wildflower petals into salads, while indulging
    in occasional Southern comforts such as fried green tomatoes and shrimp and grits at local diners.
  core: Cynthia Miller blends a disciplined law‑enforcement background with a solitary, curiosity‑driven spirit, navigating life through meditation, gardening, and a steadfast commitment to community harmony,
    while wrestling with anxiety and occasional disorganization.
background:
  cultural: Cynthia grew up in a middle‑class, White Southern family in the Piedmont region of North Carolina. Her upbringing combined traditional Southern values—courtesy, community loyalty, and a respect
    for authority—with the progressive influences of her college years, where she studied criminal justice at a local community college. Though never married, she maintains strong ties to her extended family
    and the close‑knit community of Gastonia. Her cultural identity is shaped by the town’s modest, industrious spirit, the historic textile‑mill legacy, and a deep appreciation for the outdoors that characterizes
    the Carolina foothills.
