personas:
  professional: Ian Garrity, a budding teen software hobbyist and digital illustrator, channels their organized, methodical mindset into small Python projects and meticulous illustration workflows, while
    their reserved nature drives them to work independently on open‑source contributions.
  sports: Ian Garrity, a member of the River Valley Cross‑Country Ski Club and a fan of the Springfield Ice Hawks junior hockey team, embraces winter fitness through cross‑country skiing and ice skating,
    balancing solitary endurance training with occasional team drills.
  arts: Ian Garrity, who creates digital illustrations inspired by Studio Ghibli’s Hayao Miyazaki and concept artist Feng Zhu, also finds solace listening to Ólafur Arnalds’s ethereal soundscapes and the
    narrative‑driven albums of Coheed and Cambria, which fuel their storytelling imagination.
  travel: Ian Garrity, a meticulous planner, has explored Kyoto’s historic streets and dreams of hiking Norway’s fjords, preferring solo backpacking itineraries that allow quiet reflection while family
    budget constraints keep longer voyages occasional.
  culinary: Ian Garrity, an amateur cook, enjoys crafting avocado toast topped with feta and chili flakes, perfecting ramen bowls with miso broth, seaweed, and soft‑boiled eggs, though they sometimes skip
    meals when caught up in a coding sprint.
  core: Ian Garrity is a methodical teen who fuses digital art, code, and quiet curiosity, yet wrestles with intense anxiety that fuels both deep focus and occasional procrastination.
background:
  cultural: Ian comes from a white, middle‑class family in Saint Paul, Minnesota. His upbringing reflects typical Midwestern values such as modesty, punctuality, community involvement, and respect for nature.
    He has participated in local events like the Saint Paul Winter Carnival and school volunteer projects, reinforcing a sense of civic duty and cooperation. Family gatherings often feature seasonal traditions
    and music from his parents' European heritage, emphasizing education, self‑reliance, and togetherness. The region's cold climate and abundant parks have fostered his appreciation for outdoor activities
    such as ice skating, cross‑country skiing, and exploring natural trails.
