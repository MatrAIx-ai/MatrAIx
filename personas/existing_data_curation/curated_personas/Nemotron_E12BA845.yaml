  career_goals: Ian aspires to merge his curiosity for technology with his desire for a stable, harmonious work environment. In the short term, he plans to enroll in a STEM‑focused high school program and
    secure a scholarship to study Computer Science or Information Systems. His long‑term goal is to become a software developer or data analyst, designing practical tools that improve everyday life. He
    also hopes to strengthen his interpersonal skills so he can later mentor peers dealing with anxiety, possibly through a peer‑support or counseling role within a tech‑oriented community organization.
