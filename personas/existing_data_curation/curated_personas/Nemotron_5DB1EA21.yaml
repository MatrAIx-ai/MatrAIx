  career_goals: Krystal aims to leverage her technical depth and artistic sensibility to become a thought leader at the intersection of technology and visual storytelling. In the next five years she plans
    to transition into a senior advisory or consulting role where she can guide organizations in implementing AI‑driven creative solutions and ethical data practices. She also intends to develop a series
    of generative‑art workshops for senior citizens and local high‑school students, fostering interdisciplinary learning and community engagement. Continuing her own education, Krystal is pursuing certifications
    in quantum computing and interactive media to stay at the forefront of novelty. Ultimately, she hopes to author a book that documents her journey of integrating code and art, and to be recognized as
    a mentor who has helped increase the representation of women and older adults in tech while nurturing small, collaborative teams.
