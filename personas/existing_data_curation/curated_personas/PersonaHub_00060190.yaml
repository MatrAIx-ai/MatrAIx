persona_description: A researcher and scientist with a special interest in fungi and their effect on trees, particularly in relation to arbutus trees in Greater Victoria. She has a strong background in
  the study of fungi and trees, and has a keen eye for identifying different patterns of fungi that turn the iconic tree's green leaves brown during winter. Her work has been recognized with a governor
  general award for her marks and other honours at university. She is also a local mushroom specialist, on call to emergency rooms where she identifies poisonous mushrooms eaten by unsuspecting victims.
