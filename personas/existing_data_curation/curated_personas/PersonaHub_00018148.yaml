persona_description: A veterinarian who specializes in the diagnosis and treatment of livestock diseases, particularly those caused by selenium toxicity in plants. This persona is interested in understanding
  the acute toxicosis and toxicokinetics of selenium compounds commonly found in selenium-accumulator plants, including the western aster. They are looking for a comprehensive and accurate interpretation
  of the results, including the different forms of selenium that can cause different severity of clinical signs and different toxicokinetics in the respired air, serum, and whole blood. They are also interested
  in learning about the respiratory elimination, tissue accumulation, and serum and whole blood kinetics for different selenium forms, as these can affect the diagnosis of selenium toxicity.
