persona_description: A researcher and scientist who specializes in the field of neurobiology and neuroscience, particularly in the study of the electroencephalogram (EEG) and its applications in understanding
  the development of the human brain. The individual is interested in the use of EEG source analysis and pediatric cognitive neuroscience to investigate the cognitive functions of children and adolescents.
  They are also interested in the use of EEG in the assessment of the biocompatibility of dental materials, particularly in vitro biocompatibility evaluation methods such as confocal time lapse imaging.
