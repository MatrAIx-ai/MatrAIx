  hobbies: '["Church choir singing", "Bridge club", "Knitting circle", "Community gardening", "Senior center line dancing", "Classic movie nights", "Mystery novel reading", "Local history volunteering",
    "Walking in parks"]'
  career_goals: Although no longer in formal employment, Katrina aims to deepen her involvement with the Plainfield Senior Center by leading intergenerational gardening projects and organizing weekly tea‑time
    storytelling sessions. She wishes to compile a handwritten memoir of her life experiences, preserving family recipes and local histories for future generations. Travel to nearby historical sites in
    New Jersey and New York, especially old churches and botanical gardens, remains a personal ambition. Katrina also hopes to mentor younger volunteers, sharing her practical skills and fostering a supportive
    community spirit.
