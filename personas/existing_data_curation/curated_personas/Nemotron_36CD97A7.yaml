  career_goals: Renee aims to transition into a part‑time consulting role focusing on sustainability and process safety for small manufacturers in the region. She wishes to mentor the next generation of
    engineers through local high‑school STEM programs and to serve on the board of a regional environmental advocacy group. Additionally, she hopes to author a memoir highlighting the challenges and triumphs
    of women in engineering, and to continue contributing her expertise to community projects that promote responsible chemical practices.
