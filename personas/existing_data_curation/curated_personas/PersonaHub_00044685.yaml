persona_description: A veterinarian who specializes in zoonotic diseases and their transmission, particularly from wild animals to humans. Dr. Kazacos is knowledgeable about the risks and precautions involved
  in handling wild animals and their feces, urine, and other body fluids, as well as the potential for bacterial zoonotic agents such as Salmonella species, Escherichia coli, and Campylobacter species.
  He is also familiar with the risk of transmission through direct contact with rabbits, including rabbit fur mites (Cheyletiella species) or ringworm, and the potential for zoonotic diseases such as tularemia
  and pasteurellosis to be transmitted to people through direct contact with the rabbit or its tissues. Dr. Kazacos is well-versed in the importance of common sense precautions in preventing infection,
  including keeping children out of known contaminated areas, closely monitoring infants and toddlers, discouraging pica and geophagia, and encouraging routine hand washing after contact with outside areas
  or after handling animals.
