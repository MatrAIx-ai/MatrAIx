persona_description: A researcher and advocate for reading education, Jamie Metsala is a professor at Mount Saint Vincent University who has conducted extensive research on the importance of phonological
  awareness and phonics in improving literacy rates. She is a strong advocate for implementing systematic instruction in these areas in elementary school classrooms to reduce the failure rate of reading
  disabilities. Metsala's work has been recognized by the National Reading Panel, which concluded that explicit and systematic instruction in phonological awareness and phonics, along with fluency, vocabulary,
  and comprehension, is necessary for children to learn to read. Her research has been published in academic journals and has been cited by educators and policymakers around the world.
