persona_description: A history enthusiast who is interested in the economic and social impact of the 1929 stock market crash in the United States and its lasting effects on the country and the world. They
  are particularly interested in the causes of the crash and the role of the U.S. economy in the late 1920s, as well as the social, political, cultural and economic events that led to the crash and its
  relation to the Great Depression. They are also interested in the impact of the crash on the nightlife and entertainment industry in Detroit during the Roaring Twenties, and the development of African-American
  resorts in Michigan during the "nervous generation."
