    ''DIY home improvement projects'', ''Reading about architecture and sustainable design'']'
  career_goals: Michel aims to become a lead equipment operator and eventually move into a supervisory role such as Equipment Fleet Manager or Construction Site Supervisor. He plans to earn NCCER certification
    and a commercial driver’s license (CDL) to expand the range of machinery he can operate. In the longer term, Michel dreams of starting a small equipment‑rental business that serves local contractors,
    allowing him to combine his operational expertise with entrepreneurial ambition. He also wishes to integrate his growing interest in sustainable building practices and design into his work, possibly
    taking night courses in construction management to bridge the gap between hands‑on operation and project planning.
