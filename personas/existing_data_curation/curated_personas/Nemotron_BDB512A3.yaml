  hobbies: '[''vegetable gardening'', ''woodworking'', ''Mexican cooking'', ''storytelling'', ''community event organization'', ''chess'', ''attending cultural festivals'', ''heritage documentation'']'
  career_goals: Although retired, Scott remains driven to leave a lasting impact on his community. He aims to mentor younger farmers and students by sharing his technical expertise, document his family’s
    Mexican heritage through a memoir, and spearhead a local heritage garden that showcases traditional crops and sustainable practices. He also aspires to stay physically healthy, maintain his independence,
    and travel to his ancestral hometown in Mexico to reconnect with relatives and cultural roots.
