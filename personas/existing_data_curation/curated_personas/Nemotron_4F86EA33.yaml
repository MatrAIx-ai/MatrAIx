personas:
  professional: Eloise Kareem, a 30‑year‑old Alexandria hairstylist, combines precision cutting, balayage expertise, and natural‑hair care with a curiosity‑driven eye for emerging trends, while their spontaneous,
    flexible mindset often leads them to pivot on the fly, making them both a creative problem‑solver and a self‑confessed deadline‑dodger.
  sports: Eloise Kareem, an avid supporter of the Washington Wizards and Capitals, stays fit through weekly yoga, spontaneous Potomac river runs, and occasional community volleyball matches, preferring
    low‑pressure activities that flexibly fit around their ever‑changing client appointments.
  arts: Eloise Kareem’s artistic pulse is tuned to Alexandria’s monthly art walks, live jazz nights at the DC Jazz Club featuring legends like John Coltrane, and the bold canvases of Kehinde Wiley, which
    inspire their sketchbooks of avant‑garde hair designs and handcrafted accessories.
  travel: Eloise Kareem enjoys spontaneous weekend getaways, often cruising to DC’s historic U Street for jazz festivals or to Virginia vineyards such as Barboursville for tastings, and dreams of a deeper
    cultural immersion in New Orleans’ music scene, balancing a modest travel budget with occasional splurges on boutique stays.
  culinary: Eloise Kareem’s kitchen showcases soulful dishes like collard greens simmered with smoked turkey, sweet potato pie spiced with cinnamon, and jambalaya packed with andouille sausage, while they
    regularly harvest fresh basil, thyme, and okra from their herb garden to infuse into family cookouts.
  core: Eloise Kareem blends salon creativity with a spontaneous community spirit, juggling a love for natural‑hair innovation, jazz, and soulful cooking while occasionally letting a chaotic schedule steal
    moments of organization.
background:
  cultural: Eloise identifies as African‑American and draws deep inspiration from Black hair culture and the broader African diaspora. Growing up in the Washington, D.C. metropolitan area, she was immersed
    in a community that celebrated soulful music, gospel choirs, and family traditions rooted in Southern heritage. Her family’s emphasis on self‑expression through natural hair has shaped her commitment
    to inclusive styling and the use of heritage ingredients like shea butter and jojoba oil. Living in Alexandria, a diverse suburb, she blends these cultural influences with the cosmopolitan tastes of
    her clientele, advocating for representation and empowerment within the beauty industry while honoring the rituals and celebrations—Juneteenth gatherings, church socials, and community cookouts—that
    define her cultural identity.
