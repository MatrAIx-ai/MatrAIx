  career_goals: Eloise aspires to open her own boutique salon within the next three years, creating a space that celebrates inclusive beauty and offers a curated line of natural‑hair‑focused products she
    will formulate herself. She plans to earn advanced certifications in color theory, trichology, and textile haircare to deepen her technical expertise. Long‑term, she hopes to become a recognized brand
    ambassador for sustainable, African‑diaspora‑inspired haircare brands, host quarterly workshops that mentor aspiring stylists from underrepresented backgrounds, and collaborate with local community
    centers to offer free hair‑care clinics for low‑income families. Balancing her entrepreneurial drive with her family life, she envisions a flexible schedule that still allows spontaneous creativity.
