  hobbies: '[''Cooking traditional Mexican cuisine'', ''Gardening'', ''Fishing at local lakes'', ''Reading medical journals and historical biographies'', ''Playing acoustic guitar'', ''Hiking on local trails'',
    ''Volunteering at community health fairs'']'
  career_goals: Juan aims to become a leader in community health within Ogle County, focusing on preventive care for the growing Hispanic population. He plans to pursue a Master’s in Public Health to design
    and implement targeted chronic‑disease prevention programs, especially for diabetes and hypertension. In the long term, he hopes to serve as medical director of a community clinic, mentor younger physicians,
    and expand tele‑medicine services to reach rural patients while maintaining a balanced, family‑centered lifestyle.
