  career_goals: Jason dreams of a future where he can blend his love for art with his desire to help others. He imagines becoming a visual storyteller such as an animator or graphic novelist, or working
    as a community arts coordinator who brings creative projects to his town. He also feels drawn to roles that support his peers, like a youth program facilitator or school counselor. He prefers a flexible
    career path that lets him explore new ideas and stay open to unconventional opportunities.
