  career_goals: Approaching the final chapter of his career, Jarod aims to transition to a part‑time senior counsel role that allows him to focus on high‑impact elder‑law cases while reducing his docket.
    He plans to author a book chronicling the evolution of property law in the Appalachian region, blending his legal expertise with his passion for history. Jarod also intends to establish a scholarship
    for local students pursuing law degrees and to serve on the North Carolina Bar Association's Ethics Committee. Mentorship remains a priority; he will lead small, intensive workshops for junior attorneys,
    channeling his competitive drive into cultivating courtroom excellence and ethical rigor.
