  career_goals: Although he’s only nine, Max already imagines a future where he can blend his love of art, technology, and community. He dreams of becoming an architect or a designer who creates functional,
    beautiful spaces for small towns like Fontanelle, or a software developer who builds educational games that help kids learn. He also expresses a desire to give back to his community by leading youth
    art programs or organizing local events, reflecting his cooperative and harmonious nature. His high standards push him to aim for excellence, and he hopes to earn scholarships that will allow him to
    study design and engineering in college.
