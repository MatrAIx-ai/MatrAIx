personas:
  professional: Max Stanley, a 9‑year‑old budding visual storyteller and junior game designer, channels their hyper‑organized mindset into crafting Scratch games, drawing comic‑style characters, and building
    intricate LEGO models that mimic real architecture, making clear a future in game design or architectural visualization.
  sports: Max Stanley, who participates in the Cedar Rapids Youth Soccer League and the local swim team while avidly cheering for the Iowa Hawkeyes football squad and the Iowa Cubs minor‑league baseball
    team, balances structured practice sessions with weekend bike rides and strategic board‑game chess matches that keep both body and mind active.
  arts: Max Stanley, an avid fan of comic legends such as Stan Lee and Moebius and a frequent visitor to the Des Moines Art Center where they marvel at works by Grant Wood, spends after‑school hours sketching
    vibrant landscapes, listening to the melodic tunes of The Beatles and newer kid‑friendly artists like Owl City, and channels this inspiration into their own comic‑style drawings and Scratch game soundtracks.
  travel: Max Stanley, who prefers low‑key family getaways, loves planning detailed road trips to places like Chicago’s Museum of Science and Industry, the Badlands National Park for its rugged geology,
    and dreams of camping under the redwoods of California’s Redwood National Park, always packing a sketchbook for on‑the‑spot drawing.
  culinary: Max Stanley, a budding junior chef, enjoys assembling classic macaroni‑and‑cheese with extra cheddar, crafting pepperoni pizza with a crisp basil topping, and preparing simple fruit salads with
    apple slices, grapes, and a drizzle of honey, and while their cooking skill is limited to basic stovetop tasks, they take pride in perfectly measuring ingredients for these dishes.
  core: Max Stanley is a methodical, art‑obsessed 9‑year‑old who thrives on organized creativity, disciplined chores, and strategic games, yet occasionally trades routine for spontaneous LEGO splurges and
    the occasional forgotten antihistamine.
background:
  cultural: 'Max is a white Midwestern boy raised in Fontanelle, a small town in Adair County, Iowa. His upbringing reflects the values of rural Iowa: a close‑knit community, strong family ties, and a modest,
    hard‑working ethic. He attends a local public elementary school where community events like county fairs, church gatherings, and school field trips are central to his social life. The agricultural surroundings
    foster an appreciation for nature and seasonal cycles, while the town’s traditions emphasize politeness, cooperation, and self‑reliance. These cultural influences shape Max’s respectful demeanor, his
    love for orderly routines, and his desire to contribute positively to his community.'
