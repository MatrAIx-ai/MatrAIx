  hobbies: '["Basketball", "Hip‑hop dancing", "Debate club", "Swimming", "Online competitive gaming", "Cooking family recipes", "Reading YA novels", "Church youth group activities", "Hair‑braiding for friends"]'
  career_goals: Ayesha aims to graduate high school with a strong GPA that will earn her a scholarship to a community college. In the short term, she wants to become a certified nursing assistant (CNA)
    so she can start working in a healthcare setting that offers a clear routine and the chance to help her community. Simultaneously, she dreams of turning her hair‑braiding talent into a small weekend
    salon, eventually expanding into a full‑service beauty business. Her long‑term ambition is to combine a stable career in nursing with entrepreneurship, providing both financial security and creative
    fulfillment.
