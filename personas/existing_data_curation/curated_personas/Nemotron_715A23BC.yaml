  career_goals: Looking ahead, Callie aims to transition into a solution‑architect role where she can shape the technical direction of education‑technology platforms, leveraging her proximity to Mississippi
    State University’s research community. She plans to build a boutique consultancy that helps small businesses modernize legacy applications while emphasizing scalability and maintainability. Over the
    next few years she hopes to become a recognized speaker at regional tech conferences and to author a series of technical blog posts on pragmatic software design. Balancing her competitive drive with
    a desire for reduced stress, she seeks a flexible remote‑work arrangement that allows her to maintain a healthier work‑life balance and allocate more time to personal pursuits.
