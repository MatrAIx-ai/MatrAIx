  career_goals: Milton aims to re‑enter the workforce in a role that blends his compassionate nature with his organizational abilities. He aspires to become a community liaison or support‑group facilitator
    for a local nonprofit serving underserved neighborhoods in Los Angeles. Over the next five years, he hopes to develop a small community‑based organization focused on senior companionship programs and
    urban gardening initiatives, leveraging his practical skills and curiosity to pilot sustainable projects. He also envisions completing a certification in counseling to enhance his capacity to provide
    formal peer support.
