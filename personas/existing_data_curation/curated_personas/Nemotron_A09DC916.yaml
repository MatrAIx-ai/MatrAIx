  hobbies: '[''Bridge playing'', ''Vegetable gardening'', ''Woodworking (birdhouses, small furniture)'', ''Fishing at Lake Anoka'', ''Volunteering at historical society'', ''Reading scientific biographies'',
    ''Attending community theater'', ''Listening to big‑band music'', ''Senior yoga'', ''Neighborhood potluck gatherings'', ''Journaling'']'
  career_goals: Although retired, Lanny aims to continue contributing to his community by establishing an intergenerational STEM mentorship program that pairs senior volunteers with local school students.
    He wishes to author a memoir that captures his engineering career, personal resilience, and the lessons he’s learned about balancing curiosity with practicality. Maintaining his emotional well‑being
    is a priority; he seeks regular participation in supportive senior groups, mindfulness practices, and occasional therapy to manage anxiety. Lanny also hopes to travel with his spouse to visit grandchildren
    across the Midwest and take short trips to national parks, preserving his energetic and outgoing spirit.
