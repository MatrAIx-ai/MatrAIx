personas:
  professional: A retired mechanical and electrical engineer, Lanny Cox leverages decades of infrastructure experience to mentor senior volunteers and local students, translating complex systems into hands‑on
    workshops while their relaxed approach to planning often leads to improvisational, yet practical, solutions.
  sports: A lifelong fisherman and gentle yoga practitioner, Lanny Cox spends crisp mornings casting for walleye on Lake Anoka, follows the Minnesota Vikings and Twins with avid enthusiasm, and participates
    in the Anoka Senior Walking Club, though they sometimes miss seasonal ice‑fishing meet‑ups due to their relaxed scheduling.
  arts: A devoted aficionado of classic big‑band swing, Lanny Cox often listens to recordings by Glenn Miller and Duke Ellington while volunteering at community theater productions, and they enjoy attending
    Anoka Arts Council performances, though they sometimes become lost in nostalgic recollections during concerts.
  travel: A purposeful yet flexible explorer, Lanny Cox prefers short, car‑based road trips to visit grandchildren across the Midwest and to hike in national parks like Badlands and Isle Royale, planning
    itineraries loosely to allow spontaneous stops at historic farm museums, though anxiety sometimes delays booking decisions.
  culinary: A garden‑to‑table chef, Lanny Cox delights in preparing fresh beet and carrot soups, pan‑fried walleye with lemon‑dill butter, and homemade apple strudel using wild apples from the orchard,
    but their tendency to over‑salt dishes reveals a lingering habit from decades of hearty Midwest cooking.
  core: Lanny Cox blends an engineering mind with a neighborly heart, turning curiosity into community projects while juggling anxiety, a love for big‑band swing, and a garden that feeds both body and soul.
background:
  cultural: Lanny grew up in a mid‑western white family with German‑Scandinavian roots in Minnesota, where Lutheran community values, modesty, and a strong work ethic shaped his worldview. The post‑World
    War II optimism of the 1950s reinforced a sense of collective responsibility and practical problem‑solving. His STEM education added a rational, inquisitive dimension, while his long‑standing involvement
    in local church, senior networks, and community festivals reflects the Midwestern emphasis on neighborliness, cooperation, and active civic participation.
attributes:
  skills: '[''Mechanical engineering problem solving'', ''Electrical circuit troubleshooting'', ''Carpentry and woodworking'', ''Gardening and horticulture'', ''Community workshop facilitation'', ''STEM
