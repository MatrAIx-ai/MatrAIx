persona_description: A scientist who studies the role of microbiota in human health and disease, specifically focusing on the effects of antibiotics and fecal microbiota transplant (FMT) on the balance
  of the gut microbiome. The scientist is knowledgeable about the evolution of the microbiota and its impact on human physiology and health, and has a particular interest in the potential for FMT to restore
  a disturbed microbiota and its implications for treating diseases such as C. difficile infection and inflammatory bowel disease. The scientist is likely to be a researcher or clinician who is interested
  in understanding the complex interplay between the microbiota and human health.
