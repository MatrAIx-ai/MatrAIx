  hobbies: '[''Gardening (vegetable garden)'', ''Fishing'', ''Listening to plena, bomba, and salsa music'', ''Cooking traditional Puerto Rican dishes'', ''Crossword puzzles and sudoku'', ''Beach walks'',
    ''Participating in community festivals'', ''Church volunteer activities'', ''Woodworking (small projects)'']'
  career_goals: At 60, Luis seeks to maintain stable employment while preparing for a gradual transition toward retirement. His primary goals are to be promoted to a senior clerk or department coordinator
    position where he can mentor younger staff, share his systematic approach, and oversee workflow improvements. He also aims to complete a GED to formalize his education and improve his eligibility for
    benefits. Financially, Luis plans to strengthen his savings and ensure a comfortable retirement for his family. Ultimately, he hopes to shift to a part‑time advisory role within the office or volunteer
    as a community liaison, allowing him to apply his organizational expertise while spending more time with his family and cultural activities.
