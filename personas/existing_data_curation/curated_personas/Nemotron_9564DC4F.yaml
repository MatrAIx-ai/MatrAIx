personas:
  professional: Luis Ruiz, a 60‑year‑old seasoned office clerk in a municipal department, leverages meticulous document management, Excel mastery, and bilingual communication to streamline workflows, mentor
    younger staff, and pursue a senior coordinator role.
  sports: Luis Ruiz, an avid supporter of the local baseball team Indios de Mayagüez and a member of the Isabela Fishing Club, enjoys weekend fishing trips, occasional beach volleyball, and follows the
    national baseball squad during the World Baseball Classic.
  arts: Luis Ruiz, a lifelong fan of plena, bomba, and salsa, regularly tunes in to El Gran Combo and local folkloric ensemble Los Pleneros de la 21, participates in community dance circles during the Feria
    de Isabela, and keeps a modest collection of vinyl recordings.
  travel: Luis Ruiz, who prefers low‑key vacations, often drives to the historic town of Old San Juan for weekend getaways, has visited Vieques for snorkeling, and dreams of a family pilgrimage to Seville’s
    Feria de Abril, always booking during off‑peak months to stretch his budget.
  culinary: Luis Ruiz, an accomplished home cook, prepares arroz con gandules with sofrito, sazón, and smoked pork, rolls pasteles using green plantains and yautía, and delights in the aroma of fresh cilantro
    and adobo while sharing meals at church potlucks.
  core: Luis Ruiz, a structured 60‑year‑old clerk, balances meticulous work habits with a love for coastal fishing, traditional music, and family‑centered cooking, all while quietly wrestling with occasional
    forgetfulness and a skeptical streak.
background:
  cultural: Luis was born and raised in Isabela, a coastal town in the northwestern part of Puerto Rico. He grew up in a close‑knit, working‑class family where Catholic traditions, family gatherings, and
    community celebrations were central. The island’s blend of Spanish, African, and Taíno influences shaped his worldview, fostering a deep appreciation for music, dance, and cuisine. Growing up with limited
    formal schooling, he entered the workforce early, learning on the job and valuing practical skills. His cultural identity is reflected in his love for local festivals such as the Feria de Isabela, his
    devotion to family and church, and his fluency in Spanish, with functional English for work. These experiences have reinforced his preference for structure, reliability, and a pragmatic approach to
    life.
attributes:
  skills: '[''Document organization'', ''Data entry'', ''Basic bookkeeping'', ''Scheduling and calendar management'', ''Inventory control'', ''Microsoft Office (Word, Excel, Outlook)'', ''Telephone etiquette'',
