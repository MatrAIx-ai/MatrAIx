  hobbies: '[''Watercolor painting (abstract)'', ''Reading abstract literature and philosophy'', ''Poetry writing'', ''Gardening (desert herbs and succulents)'', ''Birdwatching'', ''Listening to classical
    and jazz music'', ''Crossword and jigsaw puzzles'', ''Visiting museums and art galleries'', ''Genealogy research'', ''Scrapbooking and quilting'', ''Volunteering at senior community art workshops'']'
  career_goals: Even though she is retired, Jessica remains driven by personal ambition. She aims to complete a curated collection of original paintings that capture the changing light of the Arizona desert
    and publish a memoir interwoven with her poetry and reflections on a life lived through significant cultural shifts. She hopes to establish a monthly art‑and‑story workshop for seniors at the local
    community center, fostering creative expression in a quiet, supportive environment. Additionally, she plans to expand her genealogical research to create a digital family archive that can be shared
    with future generations and to donate a portion of her estate to a regional arts education nonprofit.
