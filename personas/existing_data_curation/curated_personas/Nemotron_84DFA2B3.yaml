personas:
  professional: Brandon Green is a budding digital media specialist who leverages Adobe Photoshop, Canva, and a modest video editing toolkit to craft eye‑catching graphics and short films for community
    art events, thriving in collaborative, flexible settings despite a habit of leaving files unsorted and missing deadlines occasionally, and they constantly channel their curiosity into new storytelling
    formats.
  sports: Brandon Green is an avid ultimate frisbee player who joins the local Pittsburgh Pitbots league, hikes the Laurel Highlands on weekends, and follows the Steelers with fervor, but they often skip
    the occasional gym workout in favor of impromptu jam sessions or art workshops, and they prefer the social camaraderie of team sports over solitary exercise.
  arts: Brandon Green is a street‑photographer and sketch artist who captures urban scenes of downtown Pittsburgh, frequents indie concerts at Stage AE and open‑mic nights at the Arcade Bar, swears by graphic
    novels like "Saga" and "Watchmen", strums an acoustic guitar inspired by The Strokes, and they weave these influences into experimental short videos for local community art workshops.
  travel: Brandon Green favors spontaneous road trips to nearby escapes such as Ohiopyle State Park and the quaint town of Fallingwater, dreams of a music‑laden weekend in Portland, Oregon, relies on a
    mix of budget rideshares and hitch‑hiking with friends, and they often plan trips on a whim, letting curiosity dictate the itinerary while keeping an eye on a limited student travel fund.
  culinary: Brandon Green is an experimental home cook who loves mixing global flavors, regularly whipping up miso‑glazed cauliflower tacos, kimchi‑infused ramen bowls, and chickpea‑flour flatbreads topped
    with sriracha‑marinated tofu, and they enjoy sharing these dishes at community workshops while occasionally over‑seasoning in their quest for the perfect bite.
  core: Brandon Green is a free‑spirit visual storyteller who balances creative chaos, community‑focused projects, and a constant undercurrent of worry about deadlines, moving between sketchbooks, frisbee
    fields, and late‑night gaming sessions.
background:
  cultural: Brandon grew up in Ellwood City, a small industrial town in Beaver County, Pennsylvania, where a strong blue‑collar work ethic and close‑knit community values are common. His family traces its
    roots to the Appalachian and Pennsylvania Dutch regions, and he was raised attending a local Methodist church and participating in town fairs, high‑school sports, and community picnics. While his upbringing
    emphasizes modesty and reliability, proximity to Pittsburgh has exposed him to a vibrant arts scene, fostering his appreciation for visual arts, live music, and unconventional ideas.
attributes:
  skills: '[''basic graphic design (Adobe Photoshop, Canva)'', ''photography'', ''social media content creation'', ''basic video editing (iMovie, Adobe Premiere Rush)'', ''public speaking'', ''team collaboration'',
    ''creative writing'', ''event planning'']'
  hobbies: '[''sketching and drawing'', ''photography'', ''playing guitar'', ''attending live music shows'', ''hiking in the Laurel Highlands'', ''playing video games (RPGs)'', ''reading graphic novels'',
    ''cooking experimental recipes'', ''volunteering at community art workshops'']'
  career_goals: Brandon aims to turn his love for art, community, and flexible work into a career as a digital media specialist or community arts coordinator. He plans to complete his bachelor's degree
    in communications or visual arts, develop a freelance portfolio of graphic and video work, and eventually secure a position with a nonprofit or creative agency where he can produce engaging visual content,
    organize public art events, and help amplify local voices. He also wants to build resilience to stress, so he aspires to find a role that balances creative freedom with supportive teamwork.
