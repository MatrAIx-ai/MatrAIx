personas:
  professional: Felicia Earl, a retired homemaker turned senior community organizer, leverages her methodical planning, budgeting, and genealogy expertise to lead church gardening programs and coordinate
    intergenerational volunteer events, blending curiosity for heritage with practical execution.
  sports: Felicia Earl, a devoted fan of the University of Kentucky Wildcats basketball and the local Hopkinsville High School football team, participates in a senior walking club on the nearby nature trails
    and enjoys occasional community softball games, balancing gentle exercise with her love for regional sports camaraderie.
  arts: Felicia Earl, an active member of her church choir and a passionate quilter, treasures the storytelling in Margaret Mitchell’s novels, listens to gospel legends like Mahalia Jackson and country
    icons Dolly Parton, and frequently attends the annual Kentucky State Festival of the Arts, where she shares her hand‑knit scarves with fellow art enthusiasts.
  travel: Felicia Earl, who travels modestly on a fixed budget, favors visiting family in Tennessee’s Blue Ridge Mountains and attending regional heritage festivals such as the Shenandoah Valley Folk Festival
    and the Kentucky Derby, carefully planning trips months in advance while balancing a desire for adventure with her health considerations.
  culinary: Felicia Earl, an adept Southern cook, perfects dishes like fried chicken, collard greens, peach cobbler, and her signature honey‑glazed ham, often using heirloom tomatoes, buttermilk, and locally
    sourced honey in her kitchen, while delighting friends at potlucks with her famous banana pudding and handmade preserves.
  core: Felicia Earl, a meticulous, garden‑loving retiree who blends Southern hospitality with a relentless curiosity for family history, can’t resist a fresh biscuit, occasionally misplaces her glasses,
    and is forever planning the next community project.
background:
  cultural: Felicia grew up in the rural Southern town of Hopkinsville, Kentucky, within a close‑knit white working‑class community steeped in Christian (predominantly Baptist) traditions. Her upbringing
    during the post‑World War II era emphasized self‑reliance, hospitality, and strong family ties. Local customs such as church potlucks, seasonal festivals, and a love for Southern comfort food have shaped
    her values. She respects the region's oral storytelling heritage, which fuels her passion for genealogy and preserving family narratives. While she embraces modern conveniences, she remains rooted in
    the modest, community‑oriented lifestyle that characterizes her cultural background.
