  career_goals: Although retired, Felicia aims to remain an active contributor to her community. She aspires to lead a senior‑friendly gardening program at the local church, mentor younger volunteers in
    event planning, and compile a written memoir of her family's history for future generations. She also wishes to continue learning new digital tools to bridge the gap between older and younger family
    members, and hopes to travel modestly to visit relatives and attend regional heritage festivals.
