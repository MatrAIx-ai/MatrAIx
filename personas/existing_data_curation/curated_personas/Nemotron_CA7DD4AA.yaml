personas:
  professional: Juana Delgadoortiz, a budding junior librarian at the community center’s Saturday story hour, channels their curiosity and methodical nature to categorize bilingual picture books by animal
    and family themes, ensuring every child finds a story that sparks imagination.
  sports: Juana Delgadoortiz loves building stamina at the nearby beach by digging sandcastles and splashing in the shallow tide pools with a small crew of friends, participates in the “Mini Marlins” youth
    swim club, and cheers enthusiastically for the hometown baseball team, the Seaside Sharks, during sunny weekend games.
  arts: Juana Delgadoortiz spends afternoons coloring intricate jungle scenes from picture books, sketches wildlife with precise lines while humming Raffi’s “Baby Beluga” and lively mariachi tunes, and
    proudly displays handmade Día de los Muertos paper marigold garlands at school art fairs.
  travel: Juana Delgadoortiz plans weekend excursions with a colorful checklist, favoring trips to the tide pools of Coral Cove, picnics in Hilltop Park’s sprawling green fields, and dreams of a family
    journey to the ancient stone ruins of Machu Picchu, where they hope to spot llamas and explore hidden pathways.
  culinary: Juana Delgadoortiz assists in the kitchen by measuring flour for chocolate chip cookies, delights in assembling mini cheese quesadillas and tasting fresh mango slices, and claims the title of
    “chief garnish” when sprinkling cilantro atop guacamole for family gatherings.
  core: Juana Delgadoortiz blends a curious, organized mind with a quiet, caring heart, turning small‑group adventures, puzzles, and crafts into a steady rhythm of learning, saving, and gentle creativity.
background:
  cultural: Juana is raised in a Mexican‑American household in National City, California, where Spanish is spoken alongside English. Her family celebrates traditional holidays such as Día de los Muertos
    and Cinco de Mayo with food, music, and crafts, and they enjoy Mexican cuisine at home. Growing up in a community with a strong Mexican heritage, she is exposed to both Mexican cultural values—family
    closeness, respect, and communal harmony—and the broader Southern California culture, giving her a bilingual and bicultural identity.
