  career_goals: Juana dreams of becoming a teacher who can help children learn in both English and Spanish, wishing to create a friendly and harmonious classroom. She also imagines herself as a pediatric
    nurse or a scientist who discovers new things, motivated by her curiosity and desire to care for others.
