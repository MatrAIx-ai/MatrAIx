  career_goals: Suraj aims to transition from his current period of unemployment into a full‑time role that leverages his organizational talent and desire to help others. He intends to complete a certificate
    in nonprofit management or project coordination at a nearby community college, after which he hopes to work as a program coordinator for a local charity or municipal community‑development department.
    In the longer term, he dreams of establishing his own small consulting service that assists neighborhood associations with event planning, grant writing, and volunteer management, thereby fostering
    a more harmonious and supportive environment in Palacios and the surrounding Gulf Coast region. He also plans to continue building his technical proficiency in digital tools to increase his employability.
