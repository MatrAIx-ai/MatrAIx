    improvement'', ''Energy sector accounting and regulatory knowledge'', ''Client communication and relationship management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Playing acoustic guitar'', ''Hiking and bird-watching in local parks'', ''Craft-beer tasting and home-brewing'',
