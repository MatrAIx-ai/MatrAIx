personas:
  professional: Dongni Guijarro, a seasoned registered nurse with over thirty years in acute and community care, leverages their bilingual expertise and meticulous organizational skills to lead shift teams,
    mentor newcomers, and design culturally tailored health‑literacy workshops while eyeing a charge‑nurse promotion and Certified Diabetes Educator credential.
  sports: Dongni Guijarro enjoys low‑impact cardio through a senior walking group on the Eastvale Trails, cheers on the Los Angeles Dodgers and Lakers on game nights, and participates in a community salsa‑dance
    fitness class that doubles as a social sport, embodying their sociable yet structured approach to staying active.
  arts: Dongni Guijarro immerses herself in classic boleros by Chavela Vargas and modern Latin pop from Carlos Vives, delights in folklórico performances, and discusses novels by Isabel Allende and Jorge
    Luis Borges in a lively book club, channeling her talkative nature into vibrant cultural conversations.
  travel: Dongni Guijarro prefers organized road trips with family, savoring weekend getaways to the Catalina Islands for snorkeling and yearly pilgrimages to Oaxaca’s culinary festivals, while budgeting
    for occasional European tours of historic plazas, reflective of their balanced love for adventure and predictability.
  culinary: Dongni Guijarro’s culinary repertoire showcases mole negro, tlayudas, and chiles rellenos made with heirloom tomatoes, poblano chilies, and fresh epazote from her backyard garden, and she’s
    known to obsessively taste‑test each batch of salsa verde before serving guests.
  core: Dongni Guijarro blends a practical, structure‑loving mindset with a sociable, competitive edge, turning every patient interaction, garden harvest, and salsa step into a chance to lead, teach, and
    celebrate life’s small victories.
background:
  cultural: Dongni Christine Guijarro was born to Mexican immigrant parents who settled in Southern California. She grew up in a bilingual household, speaking Spanish at home and English at school, and
    was immersed in Mexican traditions such as Día de los Muertos, Las Posadas, and quinceañeras. Her identity as a Mexican‑American is shaped by strong family ties, respect for elders, and a deep commitment
    to community service, especially through her Catholic church. She incorporates Mexican folk remedies and dietary wisdom into her nursing practice, valuing holistic approaches to health. Living in Eastvale,
    she remains actively involved in a vibrant Mexican community that balances assimilation with the preservation of cultural heritage.
