  career_goals: Dongni aims to advance to a charge‑nurse role where she can shape unit policies, mentor younger nurses, and embed culturally responsive patient education into daily practice. She plans to
    earn the Certified Diabetes Educator credential to address the high diabetes burden in her community. Over the next few years, she hopes to lead health workshops at local churches and community centers,
    creating bilingual educational materials for seniors. As she approaches retirement, Dongni envisions transitioning to a part‑time adjunct instructor at a nearby community college, teaching foundational
    nursing skills and cultural competency. Ultimately, she wants to leave a legacy of improved health literacy for Mexican‑American seniors in Eastvale.
