personas:
  professional: Jude Brush, a 10‑year‑old budding coder and storyteller, blends their curiosity and practicality by crafting whimsical Scratch games that feature LEGO‑inspired worlds while they informally
    lead peer workshops that merge digital design with drama improv.
  sports: Jude Brush loves soccer, playing forward for the Riverfront Rovers youth league and cheering loudly for the Portland Timbers while they also tackle weekend hikes along the Willamette Valley trails,
    treating each trek as a personal endurance challenge.
  arts: Jude Brush embraces creative expression through drama club performances that channel the humor of Tim Conway and the musical flair of Lin‑Manuel Miranda, while they fill sketchbooks with comic strips
    inspired by the vibrant panels of "Adventure Time" and strum a ukulele to the laid‑back tunes of Jack Johnson.
  travel: Jude Brush has trekked to Oregon’s Crater Lake, explored the bustling streets of Seattle on a school field trip, and dreams of touring the ancient castles of Scotland, balancing the excitement
    of adventure with family‑approved budgeting and a habit of collecting postcards from each destination.
  culinary: Jude Brush loves homemade pepperoni pizza, gravitating toward veggie‑loaded quesadillas featuring fresh tomatoes and spinach from the neighborhood garden, and they proudly whip up trail mix
    with almonds, dried apricots, and pretzel sticks as fuel for soccer matches.
  core: Jude Brush thrives on the buzz of group projects, juggling LEGO builds, Scratch coding, and soccer with a contagious chatter, yet they habitually misplace their ukulele pick during rehearsals.
background:
  cultural: Jude is a white American growing up in Hillsboro, Oregon, a city that blends suburban life with the tech‑focused “Silicon Forest” and the agricultural heritage of Yamhill County. His family
    values community involvement, outdoor recreation, and education, which are reflected in his participation in local sports leagues, school clubs, and neighborhood events like the county fair and harvest
    festivals. The Pacific Northwest’s emphasis on environmental stewardship and sustainability influences Jude’s interest in nature and conservation, while the diverse cultural landscape of the region
    exposes him to a mix of progressive school curricula and traditional community values. This background shapes his outlook on teamwork, self‑reliance, and a respect for the natural world.
