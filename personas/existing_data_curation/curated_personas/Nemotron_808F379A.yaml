  hobbies: '[''soccer'', ''hiking'', ''LEGO building'', ''school drama club'', ''reading fantasy novels'', ''coding with Scratch'', ''drawing comics'', ''playing ukulele'', ''volunteering at community garden'']'
  career_goals: Jude dreams of turning his love for the outdoors and science into a career as a marine biologist or environmental scientist, where he can explore the Pacific Northwest’s coast and share
    his discoveries through school talks and community workshops. In the short term, he aims to win his school’s science fair by developing a Scratch project that visualizes local water quality data. He
    also envisions becoming a teacher or community leader who can inspire other kids to be curious and confident, combining his sociable nature with his practical problem‑solving skills.
