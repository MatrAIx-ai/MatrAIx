  career_goals: Efren aspires to lead a research initiative that fuses mathematics with artistic expression, creating computational tools that enable artists to explore mathematical patterns in their work.
    He aims to secure a senior leadership role—such as Director of an interdisciplinary research center or Chief Data Scientist—where he can guide collaborative projects that address social and environmental
    challenges in the Santa Cruz region. Additionally, he seeks to mentor the next generation of scholars, expand open‑source contributions to the scientific community, and publish a seminal monograph on
    the mathematics of visual arts.
