personas:
  professional: Marlo Roshell merges over two decades of operations management expertise with a vibrant artistic imagination, steering mid‑size organizations through data‑driven strategic planning, process
    optimization, and collaborative team building while championing corporate arts initiatives that nurture employee well‑being, even if it sometimes means they pull all‑nighters to finalize a workshop
    plan.
  sports: Marlo Roshell maintains fitness through weekend hikes along the Susquehanna River Trail, plays in a local adult softball league at Harford County Community Park, and passionately roots for the
    Baltimore Ravens in football and the Washington Capitals in hockey, and they view sports as a communal way to unwind after a week of strategic planning.
  arts: Marlo Roshell devotes evenings to oil painting inspired by the expressive color work of Jean‑Michel Basquiat and the narrative depth of Kara Walker, relishes poetry by Maya Angelou and spoken‑word
    performances by Saul Williams at local book clubs, and they enrich community theater productions featuring scripts by August Wilson while volunteering at the cultural center to mentor emerging artists.
  travel: Marlo Roshell prefers thoughtfully curated journeys that blend artistic discovery with gentle leisure, having spent months photographing the cherry‑blossom gardens of Kyoto, wandering the historic
    districts of New Orleans, and exploring the rugged cliffs of the Scottish Highlands, while they aspire to trek the lavender fields of Provence and attend an immersive arts residency on the Sardinian
    islands, all planned around a modest travel budget balanced with executive responsibilities.
  culinary: Marlo Roshell enjoys cooking farm‑to‑table meals at an intermediate skill level, often preparing roasted beet and goat‑cheese salads, herb‑crusted salmon with locally foraged dill, and homemade
    sourdough loaf, while they delight in experimenting with ingredients like shiso leaves, edible flowers harvested from their garden, and seasonal heirloom tomatoes, sometimes indulging in a second slice
    of sourdough when the mood strikes.
  core: Marlo Roshell is a 52‑year‑old operations leader who fuses disciplined strategic management with a vibrant artistic sensibility, balancing data‑driven decision‑making with spontaneous creative projects
    and a community‑focused spirit, and they inspire colleagues to see work as a canvas for growth.
background:
  cultural: Marlo identifies as an African‑American woman with deep roots in the Mid‑Atlantic region. Her family’s heritage includes Southern migration histories and a strong tradition of church and community
    involvement. She draws inspiration from Black literary and artistic traditions, such as the Harlem Renaissance and modern African diaspora art, which inform both her personal creativity and her professional
    advocacy for inclusive cultural programming. Active in local cultural organizations, she promotes representation of Black artists in community events and supports initiatives that celebrate the diversity
    of Maryland’s Black community.
attributes:
  skills: '["Strategic Operations Management", "Process Improvement", "Budget Oversight", "Cross‑functional Team Leadership", "Creative Problem‑Solving", "Data‑Driven Decision Making", "Change Management",
    "Stakeholder Engagement", "Project Management", "Arts & Cultural Program Development", "Community Outreach", "Mentoring and Coaching"]'
  hobbies: '["Oil Painting", "Poetry Reading", "Contemporary Literature", "Photography", "Community Theater Volunteering", "Gardening", "Book Club Participation", "Mentoring Young Artists", "Local Art Gallery
    Visits"]'
  career_goals: Marlo aims to advance to a senior executive role, such as Director of Operations or Chief Operating Officer, where she can embed a culture of creativity and continuous learning across the
    organization. She is passionate about launching a corporate‑wide arts initiative that supports employee well‑being and community partnership. Long‑term, she envisions establishing a non‑profit arts
    center in Harford County that offers mentorship for young creatives, leveraging her managerial expertise and network to secure funding and sustainable operations. She also seeks to deepen her expertise
    in sustainable business practices, integrating environmental stewardship into operational strategies.
