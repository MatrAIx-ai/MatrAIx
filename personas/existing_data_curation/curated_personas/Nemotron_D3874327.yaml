  hobbies: '[''Ice hockey'', ''Fishing'', ''Lego building'', ''Scratch programming'', ''Animal shelter volunteering'', ''Reading adventure novels'', ''Outdoor camping'', ''Playing board games'']'
  career_goals: Wayne aspires to a career that blends his love of helping people with his practical mindset. He dreams of becoming a firefighter or emergency medical technician, where he can use his teamwork
    and problem‑solving abilities to protect his community. He also considers roles such as a wildlife conservation officer or a middle‑school science teacher, where he can share his passion for the outdoors
    and inspire younger students. In the short term, he aims to earn a Boy Scouts merit badge in First Aid and to lead his school’s environmental club.
