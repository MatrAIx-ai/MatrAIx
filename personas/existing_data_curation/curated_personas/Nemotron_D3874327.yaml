personas:
  professional: Wayne Warner, a budding junior programmer, channels their love of structure into building Scratch games, applying logical problem‑solving and teamwork skills learned on the ice rink to create
    simple yet functional video games while reliably meeting weekly coding challenges set by their teacher.
  sports: Wayne Warner is a dedicated member of the local youth ice hockey club that practices under the banner of the Lake Michigan Blades, follows the Chicago Blackhawks, spends summer afternoons fishing
    on Lake Michigan’s shoreline, and maintains a disciplined training schedule that balances team drills with solo skating drills.
  arts: Wayne Warner delights in constructing elaborate Lego cityscapes, draws inspiration from the vibrant animation of Studio Ghibli’s "Spirited Away," and enjoys listening to the upbeat tracks of Imagine
    Dragons while coding, blending visual creativity and auditory motivation into their leisure time.
  travel: Wayne Warner prefers well‑planned, family‑oriented trips, having explored Mackinac Island’s historic forts and the interactive exhibits at Chicago’s Museum of Science and Industry, while dreaming
    of a future road‑trip to Yellowstone National Park to combine nature hikes with fish‑catching adventures.
  culinary: Wayne Warner’s go‑to meals include homemade macaroni‑and‑cheese, Chicago‑style deep‑dish pizza topped with pepperoni, and grilled trout caught during weekend fishing trips, and they can confidently
    sauté vegetables in a skillet, though they often forget to season their dishes properly.
  core: Wayne Warner is a structure‑loving, compassionate 12‑year‑old who balances ice‑hockey drills, Lego builds, and altruistic shelter volunteering with a habit of over‑planning snack times and occasionally
    neglecting to finish homework.
background:
  cultural: Wayne grew up in Escanaba, a small town in Michigan’s Upper Peninsula, within a predominantly white, working‑class community that values self‑reliance, neighborly support, and outdoor recreation.
    His family’s traditions include Sunday church services, community potlucks, and seasonal activities like snowmobiling, hunting, and lake fishing. The local “Yooper” culture, with its Finnish and Scandinavian
    roots, influences his appreciation for nature, modesty, and a strong sense of community solidarity.
attributes:
