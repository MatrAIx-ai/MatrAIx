  hobbies: '["Gardening and horticulture", "Birdwatching", "Crocheting and quilting", "Reading historical non‑fiction and popular science", "Leading a senior book club", "Volunteering at the community center",
    "Organizing intergenerational technology workshops", "Visiting museums and theatre", "Genealogy research"]'
  career_goals: Although officially retired, Vivian aims to deepen her impact on her community. She plans to launch a series of free, hands‑on STEM workshops for middle‑school students in Portage County,
    drawing on her curiosity for new ideas while using proven teaching methods. She also aspires to author a memoir that weaves together personal resilience, Midwestern heritage, and practical life lessons,
    hoping it will inspire fellow seniors. Learning digital photography and sustainable gardening practices are other personal ambitions, allowing her to document local ecosystems and share knowledge through
    community newsletters.
