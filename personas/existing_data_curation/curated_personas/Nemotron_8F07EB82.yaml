personas:
  professional: Mark Castiello, a 15‑year‑old high‑school sophomore, is an aspiring multidisciplinary digital artist and self‑taught programmer who channels their methodical planning and competitive edge
    from chess into weekly collaborations on interactive art installations with a close circle of friends.
  sports: Mark Castiello, who prefers mental over physical competition, follows the New York Knicks, the New York Giants, and the New York Yankees with practiced enthusiasm, participates in the local NYC
    Chess Club’s weekly tournaments, and occasionally joins after‑school pickup basketball games at school as a way to stay lightly active.
  arts: Mark Castiello immerses themselves in the underground art scene, drawing inspiration from the graffiti of Banksy, the neo‑expressionist bursts of Jean‑Michel Basquiat, and the atmospheric soundscapes
    of Aphex Twin, while frequently attending shows at the Bowery Ballroom, collecting limited‑edition prints at the MoMA, and quoting lines from authors like Neil Gaiman and philosophers such as Kierkegaard
    in their poetry.
  travel: Mark Castiello, who meticulously plans each trip in a shared Google spreadsheet, prefers purposeful, budget‑conscious journeys that blend cultural immersion with artistic exploration, having visited
    the Lower East Side’s street‑art alleys, taken a weekend field trip to Washington, D.C.’s Smithsonian, and dreaming of future solo adventures to Berlin’s techno clubs and Tokyo’s Harajuku district to
    study avant‑garde design.
  culinary: Mark Castiello, an experimental home‑cook with an intermediate skill level, loves crafting spicy ramen bowls topped with soft‑boiled eggs and sautéed bok choy, perfecting avocado toast with
    smoked salmon and capers, and baking chocolate brownies spiked with miso for a savory‑sweet twist, while indulging in pizza slices from a local pizzeria after long gallery afternoons.
  core: Mark Castiello navigates teenage life as a hyper‑creative, detail‑obsessed introvert who balances a vivid inner world of art and philosophy with a constant undercurrent of anxiety, channeling competitive
    instincts into chess and meticulous budgeting while occasionally surrendering to late‑night sketching marathons.
background:
  cultural: Mark comes from an Italian‑American family that has lived in New York City for three generations. His grandparents emigrated from Southern Italy, and family traditions include Sunday meals of
    homemade pasta, observing Catholic holidays, and listening to classic Italian music. Growing up in the multicultural borough of Manhattan, Mark has been exposed to a wide array of cultural influences—from
    the vibrant street art of Bushwick to the diverse cuisines of the city—shaping an appreciation for both his heritage and the broader urban tapestry.
attributes:
  skills: '["Digital illustration", "Traditional drawing", "Graphic design software (Photoshop, Procreate)", "Python programming", "JavaScript basics", "Project planning", "Time management", "Chess strategy",
    "Critical thinking", "Self‑taught mathematics"]'
  hobbies: '["Sketching", "Digital collage", "Speculative fiction reading", "Philosophy", "Chess", "Strategic board games", "Creative writing (short stories, poetry)", "Coding interactive art", "Visiting
    galleries and street‑art tours", "Listening to indie music"]'
  career_goals: Mark aspires to merge his artistic imagination with his analytical strengths by pursuing a career as a concept artist and UI/UX designer for video‑game studios. He aims to earn a scholarship
    to a specialized arts high school or a program that emphasizes digital illustration and interactive design. In the long term, he hopes to lead a creative development team, shaping immersive experiences
    that push the boundaries of narrative and visual storytelling. He also harbors an ambition to develop his own indie games, where he can control the entire creative process from concept to execution.
