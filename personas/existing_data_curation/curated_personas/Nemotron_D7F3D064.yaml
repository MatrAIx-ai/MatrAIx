  hobbies: '[''Watercolor painting'', ''Traditional Mexican cooking'', ''Gardening'', ''Storytelling circles'', ''Volunteer event organization'', ''Reading poetry and philosophy'', ''Attending community
    theater'', ''Digital photography'', ''Crafting (embroidery, weaving)'']'
  career_goals: Briselda aims to keep enriching her community by mentoring younger members in Mexican cultural traditions, compiling a family cookbook that blends traditional recipes with her own creative
    twists, and documenting oral histories for a local heritage project. She aspires to organize an annual multicultural art exhibition in Kelso that showcases senior artists and fosters intergenerational
    dialogue. Though retired, she remains eager to learn new skills such as digital photography to capture community events, and hopes to publish a memoir recounting her immigrant journey and the evolution
    of Mexican‑American life in the Pacific Northwest.
