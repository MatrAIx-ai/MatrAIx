  hobbies: '[''Reading mystery and sci‑fi novels'', ''Sketching wildlife'', ''Exploring parks and riversides'', ''Science club experiments'', ''Playing piano'', ''Cooking simple family meals'', ''Stamp
    collecting (Missouri wildlife)'']'
  career_goals: Germaine aspires to pursue a career that blends her curiosity about the natural world with practical problem solving. She is interested in becoming a veterinarian or an environmental scientist,
    aiming to study biology in high school, participate in science fairs, and eventually earn a degree in a life sciences field. She also hopes to volunteer at local animal shelters and conservation programs
    to gain hands‑on experience while maintaining a balanced academic path.
