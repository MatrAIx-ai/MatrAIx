personas:
  professional: Evelyn Karaffa is a meticulous IT support specialist‑in‑training, applying her hardware troubleshooting, SOP documentation, and calm, patient user support to transform chaotic help‑desk
    tickets into orderly resolutions while she works toward CompTIA A+ and Network+ certifications.
  sports: Evelyn Karaffa enjoys weekend hikes through the Kentucky countryside, regularly trails the Red River Gorge, supports the University of Kentucky Wildcats basketball team, and participates in a
    local running club that meets for 5K runs, balancing her love of quiet nature with occasional team‑spirit camaraderie.
  arts: Evelyn Karaffa finds creative balance in knitting intricate cable patterns inspired by folk‑art motifs, listens to John Prine and Gillian Welch while assembling PCs, and volunteers at her Baptist
    church to teach seniors computer basics, merging technical precision with artistic patience.
  travel: Evelyn Karaffa plans trips with the same checklist mindset she uses for SOPs, favoring organized weekend getaways to Red River Gorge and Nashville, and dreams of a road‑trip through the Blue Ridge
    Mountains, always packing a reusable water bottle, a spare USB drive, and a notebook for itinerary tweaks.
  culinary: Evelyn Karaffa prefers farm‑to‑table meals, often cooking roasted beet and kale salad with a sprinkle of feta, grilling chicken seasoned with rosemary from her garden, and whipping up fresh
    cornbread using a cast‑iron skillet, while she occasionally indulges in pepperoni pizza during late‑night PC builds.
  core: Evelyn Karaffa blends methodical tech expertise with hands‑on creativity, balancing structured problem‑solving, disciplined budgeting, and a calm resilience that makes her both a reliable IT professional
    and a patient community volunteer.
background:
  cultural: Evelyn grew up in New Haven, a small community in Nelson County, Kentucky, within a predominantly white, rural Southern environment. Her family tradition includes strong ties to the local Baptist
    church, an emphasis on community service, and a work ethic rooted in agricultural and small‑business values. While she embraces modern technology, she also respects the region's heritage of self‑reliance,
    hospitality, and close‑knit family relationships, which shape her practical outlook and collaborative nature.
attributes:
  skills: '[''Hardware troubleshooting'', ''Network configuration'', ''System maintenance'', ''Standard Operating Procedure development'', ''Technical documentation'', ''Customer support with calm demeanor'',
    ''Microsoft Office suite proficiency'', ''Basic Python scripting for automation'', ''Fundamental cybersecurity practices'', ''Ticketing system management'']'
  hobbies: '[''DIY computer building and refurbishing'', ''Knitting and crocheting'', ''Vegetable gardening with a seasonal schedule'', ''Jigsaw and logic puzzles'', ''Volunteering to teach seniors basic
    computer skills'', ''Hiking local trails'', ''Listening to tech podcasts'']'
  career_goals: Evelyn aims to obtain CompTIA A+ and Network+ certifications within the next year to solidify her credentials. She seeks a stable, full‑time role as a junior network administrator or IT
    support specialist at a regional business where she can apply her structured problem‑solving skills. Over the next five years, she plans to advance to a senior technician or IT manager position, eventually
    leading a small help‑desk team for local enterprises. Her long‑term ambition includes starting a freelance IT consulting service that offers reliable, process‑driven support to rural businesses in Kentucky.
