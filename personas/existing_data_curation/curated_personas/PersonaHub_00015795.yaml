persona_description: A researcher and scientist who specializes in the study of mammalian feeding systems and the relationship between tooth structure and feeding behavior. They are interested in understanding
  how different feeding behaviors and diets affect the structure and function of mammalian teeth, and how these relationships can be used to predict feeding performance and behavior in bats and other animals.
  They are also interested in the evolutionary history of mammalian tooth structures and how they have evolved to match specific feeding tasks.
