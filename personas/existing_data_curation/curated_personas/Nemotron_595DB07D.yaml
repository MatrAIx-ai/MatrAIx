  career_goals: Kendall dreams of turning her love for art and nature into a future career that blends creativity with scientific curiosity. She imagines becoming a wildlife illustrator or museum curator
    who designs interactive exhibits about local ecosystems. In the short term, she wants to win her school’s art competition, have her stories published in the class newsletter, and lead a small group
    science investigation at school. She also hopes to explore space through art, perhaps creating illustrations of galaxies, and occasionally daydreams about becoming an astronaut or science communicator
    who inspires other children.
