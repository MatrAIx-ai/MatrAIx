personas:
  professional: An aspiring young environmental illustrator, Kendall Harvey channels their curiosity and methodical planning into detailed forest and river scenes that often turn school art projects into
    miniature exhibits, while they patiently organize each brushstroke like assembling a LEGO structure.
  sports: Energetic yet reserved, Kendall Harvey enjoys weekend trail hikes with their family, participates in a local Cub Scouts nature badge program that teaches basic orienteering, and roots for the
    Portland Sea Dogs while occasionally joining a beginner’s soccer league at the community center.
  arts: Creative and introspective, Kendall Harvey spends hours drawing riverbank scenes to the soothing strains of Debussy and Vivaldi, drawing inspiration from nature illustrators such as John James Audubon
    and the whimsical watercolors of Beatrix Potter, while they curate a small shelf of family‑friendly museum prints for quiet study.
  travel: Kendall Harvey prefers low‑key, nature‑focused trips, often hiking the trails of Acadia National Park during a family vacation and dreaming of a future summer camping expedition to Yellowstone,
    planning each outing with meticulous checklists and a trusty sketchbook to capture discoveries.
  culinary: Kendall Harvey enjoys the comforting taste of homemade mac and cheese and apple cinnamon muffins, often whisking simple batter with a parent’s help, while their snack drawer is stocked with
    pine‑nut granola clusters and sliced cucumber sticks that fuel their art sessions.
  core: Kendall Harvey fuses quiet artistic curiosity with meticulous planning, turning intense emotions into vivid forest sketches while keeping a careful ledger for LEGO treasures and sketchbook supplies.
background:
  cultural: Kendall comes from a typical New England white family in Auburn, Maine. Her upbringing reflects the region’s emphasis on community, modesty, and a deep appreciation for the natural environment.
    She participates in local traditions such as the Androscoggin County Fair, school celebrations of regional history, and family gatherings for Thanksgiving and Fourth of July parades. The community’s
    heritage, rooted in the historic textile mills and a growing focus on environmental stewardship, shapes her respect for nature and desire to protect it. Kareen’s family values education, self‑reliance,
    and courtesy, and she often attends church events and community volunteer projects that reinforce these New England cultural norms.
