  career_goals: She aims to advance to a senior director or vice‑presidential role overseeing operations and people development within a regional corporation, while championing innovative, arts‑infused
    programs that boost employee engagement and community impact. Victoria also plans to earn an MBA or a PMP certification to deepen her strategic expertise, and she envisions launching a nonprofit initiative
    that bridges business skills with arts education for youth in the Twin Cities area. Ultimately, she wants to create a workplace culture that values flexibility, well‑being, and creative collaboration.
