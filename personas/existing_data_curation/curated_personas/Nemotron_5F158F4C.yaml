  career_goals: Over the next five years, Sierra aims to advance into a senior systems analyst or solutions architect role, leading complex digital transformation initiatives for regional manufacturing
    and healthcare firms in Ohio. She plans to obtain certifications such as PMP, TOGAF, and AWS Solutions Architect to broaden her strategic and cloud expertise. Her ambition includes managing cross‑functional
    teams, championing user‑centered design, and integrating emerging technologies like AI-driven analytics into business processes. Sierra also aspires to become an advocate for diversity in tech, establishing
    mentorship programs for women and underrepresented groups in her community. Ultimately, she envisions transitioning into an IT leadership position where she can shape organizational strategy while fostering
    a culture of creativity and collaboration.
