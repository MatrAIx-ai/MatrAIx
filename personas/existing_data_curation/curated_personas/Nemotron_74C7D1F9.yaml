personas:
  professional: Yanet Almendarez is a data‑driven business analyst‑in‑training who leverages advanced Excel modeling, Tableau visualizations, and bilingual communication to translate market research into
    actionable strategies, while their meticulous organization and competitive edge push projects ahead of tight deadlines.
  sports: Yanet Almendarez spends Saturday mornings hiking the trails of Bear Mountain State Park, joins a local Brooklyn yoga studio for weekly sessions, cheers for the New York Knicks and New York City
    FC, occasionally runs with the Brooklyn Bridge Trail Club to stay competitive and fit, and they view each workout as a personal benchmark for growth.
  arts: Yanet Almendarez explores Brooklyn's street art, snapping photos of murals by Shepard Fairey and local emerging artists, enjoys salsa nights dancing to Marc Anthony and Celia Cruz, unwinds listening
    to a mix of Bad Bunny and classical piano playlists while sketching in a downtown coffee shop, and they find inspiration in the urban canvas that fuels their creative pursuits.
  travel: Yanet Almendarez prefers budget‑friendly weekend getaways, having trekked the Catskills and visited Montreal's Old Port, while dreaming of a solo trip to Kyoto during cherry blossom season and
    a cultural immersion tour of Oaxaca's culinary scene, and they often plan trips using a spreadsheet to optimize cost and time.
  culinary: Yanet Almendarez experiments in the kitchen by fusing modern techniques with classic Mexican flavors, crafting quinoa‑crusted fish tacos with chipotle‑avocado crema, mole‑infused ramen, and
    a dessert of churro‑style bread pudding topped with dark chocolate and espresso powder, and they love experimenting with flavors that echo their heritage while embracing contemporary twists.
  core: Yanet Almendarez mixes analytical rigor with creative curiosity, balancing a disciplined work ethic and competitive drive with a habit of binge‑watching Netflix after long nights of spreadsheet
    modeling, and they always keep a notebook of ideas nearby.
background:
  cultural: Yanet was raised in a Mexican‑American household in Brooklyn, where Spanish was spoken at home and family gatherings emphasized shared meals, music, and respect for cultural traditions. Her
    parents immigrated from Jalisco, instilling a strong work ethic and pride in her heritage. Growing up in the multicultural fabric of Kings County, Yanet blends Mexican values of community and perseverance
    with the fast‑paced, diverse environment of New York City. She actively participates in local Día de los Muertos events, celebrates Mexican holidays, and supports community initiatives that bridge her
    heritage with the broader Brooklyn community.
attributes:
  skills: '[''Financial modeling'', ''Market research'', ''Data analytics (Excel, Tableau, Python)'', ''Project management'', ''Strategic planning'', ''Business communication'', ''Bilingual Spanish–English
    communication'', ''CRM (Salesforce) proficiency'', ''Presentation design (PowerPoint)'', ''Negotiation and stakeholder management'']'
  hobbies: '[''Reading business & finance books'', ''Exploring Brooklyn neighborhoods'', ''Weekend hiking'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''Yoga and meditation'', ''Volunteering teaching
    digital skills'', ''Photography'', ''Blogging personal finance tips'']'
  career_goals: Yanet aims to secure an entry‑level business analyst or market research associate position at a forward‑thinking firm in New York, preferably in the fintech or e‑commerce sector. She plans
    to obtain the Google Data Analytics Professional Certificate and later pursue an MBA to transition into product management or consulting. In the long term, she aspires to lead a cross‑functional team,
    drive data‑informed strategic decisions, and eventually mentor other young professionals from under‑represented backgrounds.
