personas:
  professional: Marna Collins is a meticulous professional housekeeper who blends a disciplined cleaning schedule with occasional spontaneous client requests, leveraging their deep knowledge of flooring
    care, stain removal, and light repairs while they maintain a calm, patient demeanor that puts clients at ease.
  sports: Marna Collins enjoys low-impact fitness activities such as weekly nature walks on local trails, weekend community center yoga classes, and cheering on the Pittsburgh Steelers during football season,
    and they occasionally play recreational pickleball at the Scottdale community park with a group of fellow church members.
  arts: Marna Collins finds creative solace in knitting colorful sweaters while listening to Dolly Parton's storytelling songs, devouring cozy mystery novels by Agatha Christie and Louise Penny, attending
    the local community theater's seasonal productions, and they often display hand-stitched bookmarks inspired by classic literature in their living space.
  travel: Marna Collins prefers road trips that combine quiet cabin retreats in the Pocono Mountains with visits to historic sites like Savannah, Georgia, balancing a modest travel budget with a love for
    nature, and they eagerly plan future journeys to the lavender fields of Provence while ensuring family obligations at home remain met.
  culinary: Marna Collins delights in baking classic chicken pot pies and cinnamon apple crumble using fresh garden tomatoes, carrots, and basil, while their knitting-friendly kitchen often smells of buttered
    biscuits and herbal tea, and they enjoy swapping recipes at the church women’s potluck, where they’re known for their perfectly browned cornbread.
  core: Marna Collins blends disciplined organization with gentle spontaneity, turning household chores into a calming ritual while nurturing a quiet creative life through gardening, knitting, and community
    kindness, and they cherish solitude as a source of resilience.
background:
  cultural: Marna’s cultural upbringing reflects the modest, working‑class values common in western Pennsylvania’s small‑town communities. Raised in a predominantly white, Protestant environment, she was
    taught the importance of hard work, self‑reliance, and neighborly support. Her family’s ancestry includes German and Irish roots, contributing to a cultural mix that celebrates practical skills, community
    involvement, and a quiet, respectful demeanor. These influences shape her commitment to dependable service, familial responsibility, and the close‑knit social fabric of Scottdale.
attributes:
  skills: '[''Deep cleaning techniques'', ''Laundry care and fabric preservation'', ''Stain removal'', ''Floor care (carpet, hardwood, tile)'', ''Light home maintenance'', ''Safe handling of cleaning chemicals'',
