  hobbies: '[''Gardening'', ''Vegetable gardening'', ''Knitting'', ''Baking comfort foods'', ''Reading cozy mystery novels'', ''Walking local trails'', ''Birdwatching'', ''Home DIY projects'', ''Attending
    small church women’s group gatherings'']'
  career_goals: Marna aims to obtain a certified professional housekeeper credential and eventually step into a supervisory role within a cleaning company, where she can mentor new staff and shape efficient,
    compassionate service standards. Long‑term, she envisions launching her own small‑scale cleaning business that prioritizes employee well‑being, flexible scheduling, and high‑quality, reliable service
    for families in the Scottdale area. She also hopes to deepen her expertise in senior‑friendly home organization to support aging relatives and neighbors.
