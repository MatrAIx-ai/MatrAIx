personas:
  professional: An imaginative retail professional, Perl Hanlon leverages a keen eye for visual storytelling, superior customer service, and meticulous inventory management to craft eye‑catching store displays
    that feel like walking art galleries, while their organized, reserved nature ensures every project meets tight deadlines and fosters a harmonious team environment.
  sports: An avid hiker on Onslow County’s Cypress Creek trails, Perl Hanlon is also a dedicated member of the Jacksonville Trailblazers hiking club, follows the Carolina Panthers football team, roots for
    the NC State Wolfpack in college football, and they join a co‑ed adult recreational soccer league called the Coastal Kickers each summer.
  arts: A devoted creator and appreciator, Perl Hanlon draws inspiration from oil masterpieces by Vincent van Gogh, captures fleeting moments à la Ansel Adams with a vintage Nikon, and playlists ambient
    scores from Brian Eno while reading speculative fiction by N.K. Jemisin, while they often share their own abstract sketches at the Wilmington Art League exhibitions.
  travel: Exploring both nearby and far‑flung destinations, Perl Hanlon has trekked the Blue Ridge Parkway in Asheville, savored coffee in Portland’s indie cafés, and they dream of photographing the aurora
    borealis in Iceland’s Jokulsarlon while later planning a cultural immersion trip to Kyoto’s historic temples and artisan markets.
  culinary: A culinary experimenter, Perl Hanlon delights in pairing miso‑glazed carrots with dark chocolate, crafting rosemary‑infused lamb tacos topped with pomegranate seeds, and perfecting a matcha‑scented
    risotto with goat cheese, all while they master the art of sous‑vide using a Precision Cooker.
  core: Perl Hanlon blends artistic imagination with disciplined organization, turning retail spaces into visual narratives, budgeting with strategic investments, and they navigate life through quiet curiosity,
    occasional splurges on craft supplies, and a steadfast love for solitary hikes.
background:
  cultural: Perl grew up in a modest, suburban community in coastal North Carolina, where Southern hospitality and a strong sense of community were core values. Her family emphasized self‑reliance, respect
    for tradition, and involvement in local events such as church gatherings and county fairs. The proximity to Jacksonville's military presence exposed her to a diverse mix of cultures and transient populations,
    fostering an appreciation for varied perspectives. While identifying as white American, she feels connected to the regional heritage of coastal living, cherishing the rhythm of small‑town life, seasonal
    festivals, and the natural landscape of the Outer Banks. These cultural influences shape her courteous demeanor, collaborative spirit, and respect for both tradition and creative innovation.
attributes:
  skills: '["Customer Service", "Product Knowledge", "Sales Techniques", "Visual Merchandising", "Inventory Management", "Cash Handling", "POS Systems", "Basic Adobe Photoshop", "Time Management", "Schedule
    Planning", "Team Coordination", "Conflict Resolution", "Empathetic Communication"]'
  hobbies: '["Oil Painting", "Sketching", "Photography", "Reading Science Fiction & Fantasy", "Creative Writing", "Journaling", "DIY Craft Projects", "Hiking", "Local Art Gallery Visits", "Cooking Experimental
    Recipes"]'
  career_goals: Perl aims to transition from a sales associate to a store manager within the next two years, leveraging her methodical planning and leadership skills. She aspires to specialize in visual
    merchandising, eventually becoming a visual merchandiser or store design consultant for a regional retail chain. To support these goals, she plans to complete her college coursework with a focus on
    marketing and retail management, and obtain certifications such as the Certified Retail Management Professional (CRMP) and a Visual Merchandising Certificate. Long‑term, Perl dreams of opening a boutique
    that blends curated merchandise with her own artwork, offering a community space for local creators and shoppers who appreciate unique, art‑inspired products.
