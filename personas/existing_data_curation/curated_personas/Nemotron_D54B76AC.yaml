  career_goals: Tony aims to produce and release a self‑produced EP of original material within the next year, secure a regular weekly gig at a local Burbank venue, and develop a part‑time teaching practice
    at the community center. He plans to open a modest home studio where he can record his band and offer affordable recording sessions to emerging artists. Long‑term, he envisions curating an annual local
    music showcase that highlights regional talent, establishing himself as a mentor and organizer in the Burbank music scene while achieving a stable, diversified income stream before retirement.
