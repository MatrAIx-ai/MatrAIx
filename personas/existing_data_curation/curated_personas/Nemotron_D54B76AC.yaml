personas:
  professional: Tony Delosangeles, a seasoned vocalist and guitarist, leverages his practical mindset and love for structure to run efficient rehearsals, mix live sound on analog consoles, and coach singers
    on breath control, while coordinating band logistics with the same reliability that defines his community theater stagehand work.
  sports: Tony Delosangeles, an active member of the Burbank Community Softball League, plays third base every spring, follows the LA Dodgers and the LA Lakers religiously, and uses weekday mornings for
    light jogs to stay fit, though they admit to skipping cardio after a demanding rehearsal schedule.
  arts: Tony Delosangeles curates a personal vinyl collection featuring Marvin Gaye, Aretha Franklin, Led Zeppelin, and Stevie Wonder, devotes weekend evenings to open‑mic performances, and draws inspiration
    from classic films like Casablanca and The Godfather, while volunteering as a stagehand for productions of Hamilton and A Streetcar Named Desire.
  travel: Tony Delosangeles prefers road‑trip adventures that blend music pilgrimages and food stops, having driven to Nashville for the Country Music Hall of Fame, Austin for South by Southwest, and dreaming
    of a future visit to Liverpool’s Cavern Club, all balanced against a modest retirement savings plan.
  culinary: Tony Delosangeles enjoys cooking farm‑to‑table meals using home‑grown tomatoes, basil, and zucchini, excels at grilling marinated chicken thighs and preparing classic shrimp scampi, but often
    over‑salts the vegetable soup, and they never pass up a fresh slice of sourdough with avocado.
  core: Tony Delosangeles is a disciplined, music‑obsessed mentor who worries about every detail, tends to over‑invest in vinyl, forgets to stretch after gigs, and lives by the rhythm of community, garden,
    and occasional over‑salting.
background:
  cultural: Tony was raised in a middle‑class, predominantly white suburb of Chicago. His family’s roots trace back to Irish and German immigrants who settled in the Midwest in the early 20th century. Growing
    up in the 1970s, he was immersed in the local church choir, where he learned gospel singing. The vibrant Chicago blues and soul scenes, as well as classic rock radio, shaped his musical tastes. The
    community‑oriented culture of Burbank, with its neighborhood festivals, strong work ethic, and emphasis on self‑reliance, has reinforced his practical, structured approach to life and his dedication
    to contributing to the local music community.
