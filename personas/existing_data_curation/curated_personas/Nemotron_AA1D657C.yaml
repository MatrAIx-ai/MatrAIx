  career_goals: Corey aims to attain partnership at a reputable Omaha law firm within the next five years, focusing on corporate and small‑business law. He plans to later establish a boutique practice that
    provides affordable legal services to the local Polynesian and broader immigrant communities. He seeks certification as a mediator, active involvement in bar association committees, and mentorship of
    aspiring lawyers from underrepresented backgrounds. Long‑term, he envisions publishing a guide on navigating legal challenges for minority entrepreneurs and becoming a recognized advocate for community‑focused
    legal reforms.
