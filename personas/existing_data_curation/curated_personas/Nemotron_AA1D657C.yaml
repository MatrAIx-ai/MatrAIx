personas:
  professional: Toua Chandran, a 25-year-old Omaha attorney, leverages methodical legal research, precise contract drafting, and calm courtroom advocacy to serve Polynesian and immigrant clients, embodying
    a structured, reliable approach that consistently meets deadlines.
  sports: Toua Chandran follows the New Zealand All Blacks and Hurricanes, trains at Omaha Strength Lab for disciplined weight-lifting, hikes the Loess Hills with the Trailblazers club, and fishes at Lake
    Manawa during off-season, balancing team loyalty with solo fitness pursuits.
  arts: Toua Chandran enjoys performances at Omaha Community Playhouse, listens to singer-songwriter YOBI and composer Lorde, and participates in cultural dance evenings featuring traditional Samoan drumming,
    which reinforce their sense of identity.
  travel: Toua Chandran plans trips with detailed itineraries, favoring nature-rich and culturally immersive destinations like Samoa’s Upolu, New Zealand’s Rotorua, and Italy’s Tuscan countryside, while
    staying within a modest annual travel budget.
  culinary: Toua Chandran cooks palusami and oka using taro leaves, coconut cream, and fresh ahi, experiments with pandan-infused desserts, and occasionally prepares sushi rolls, though they sometimes over-salt
    dishes in pursuit of bold flavor.
  core: Toua Chandran is a detail-driven lawyer who balances structured ambition with solitary hobbies, disciplined health habits, and a quiet love for rugby, chess, and cooking traditional dishes.
background:
  cultural: Corey is of Samoan descent, part of a tight‑knit Polynesian diaspora in Omaha. His family upholds fa‘a Samoa values of respect, community service, and oral storytelling, and he grew up speaking
    both English and Samoan at home. He regularly attends events at the local Polynesian cultural center, participates in kava ceremonies, and engages in traditional dance performances. These cultural roots
    shape his collaborative approach to law, emphasizing community advocacy, resilience, and a balanced perspective between individual rights and collective wellbeing.
attributes:
  skills: '["Legal research", "Contract drafting", "Litigation", "Negotiation", "Mediation", "Regulatory compliance", "Client counseling", "Case management", "Legal technology proficiency", "Strategic analysis",
