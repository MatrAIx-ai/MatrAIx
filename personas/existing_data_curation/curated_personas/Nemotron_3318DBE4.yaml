  career_goals: Joshua aspires to become a Chief Marketing Officer within the next five years, steering a tech‑oriented brand to global prominence. He aims to spearhead award‑winning, data‑centric campaigns
    that blend cutting‑edge AI personalization with bold, art‑inspired storytelling. A key ambition is to build a high‑performance marketing organization that balances creativity with rigorous analytics,
    while also mentoring the next generation of marketers in both critical thinking and agile execution. He is also exploring the launch of a boutique consultancy that helps midsize tech firms fuse STEM
    insights with brand strategy, leveraging his competitive drive to become a respected thought leader in Martech.
