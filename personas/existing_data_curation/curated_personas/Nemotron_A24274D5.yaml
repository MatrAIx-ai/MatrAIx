personas:
  professional: Felix Colon, an experienced in‑home caregiver with a talent for meticulous scheduling and a vivid imagination, they blend thorough patient hygiene, medication reminders, and adaptive equipment
    usage with spontaneous abstract painting sessions that serve as informal art‑therapy for senior clients.
  sports: Felix Colon, a weekend participant in the Johnson County senior walking club and occasional pick‑up basketball at the local community center, they faithfully follow the Kansas City Royals and
    Kansas City Chiefs, and enjoy seasonal trout fishing trips to nearby lakes during summer.
  arts: Felix Colon, an avid abstract painter inspired by the bold color fields of Mark Rothko and the delicate forms of Georgia O'Keeffe, they capture everyday moments with a vintage Nikon DSLR, frequently
    visit the Nelson‑Atkins Museum for contemporary exhibits, and incorporate sketching of hometown streets into a personal visual journal while listening to traditional folk music during quiet evenings.
  travel: Felix Colon, a methodical planner who favors tranquil escapes over bustling tourism, they design road trips that weave through the art festivals of Santa Fe, the desert vistas of Arizona’s Saguaro
    National Park, and heritage towns along Route 66, while budgeting each journey through a dedicated travel savings envelope.
  culinary: Felix Colon, a confident home cook, they regularly prepare slow‑cooked mole with ancho chilies, roasted corn, and fresh cilantro, perfect simple dishes like grilled cheese with homemade tomato
    salsa, and experiment with seasonal vegetables harvested from their garden, always favoring organic, locally sourced ingredients.
  core: Felix Colon balances disciplined caregiving duties with an unquenchable curiosity for color and form, they often swap a night shift for a late‑hour painting session, insist on a nightly cup of herbal
    tea while reviewing their art journal, and occasionally forget to water their garden during hectic weeks.
background:
  cultural: Felix is a first‑generation Mexican‑American who grew up in a bilingual household in the Texas Hill Country. His upbringing combined deep respect for Mexican traditions—such as Día de los Muertos,
    family‑centered celebrations, and the rich culinary heritage of tacos, mole, and tamales—with the community values of Southern Texas, emphasizing hospitality, hard work, and close‑knit social bonds.
    Fluent in both Spanish and English, he navigates between these cultures, bringing the warmth and collectivist spirit of his Mexican roots into his caregiving practice and everyday life.
attributes:
  skills: '[''Personal Hygiene Assistance'', ''Mobility Support'', ''Medication Reminder'', ''Health Monitoring'', ''Compassionate Communication'', ''Record Keeping'', ''Basic Wound Care'', ''Bilingual
    Spanish‑English Interaction'', ''Creative Problem Solving'', ''Artistic Expression for Therapeutic Use'']'
  hobbies: '[''Abstract Painting'', ''Sketching'', ''Science‑Fiction Reading'', ''Gardening'', ''Photography'', ''Traditional Mexican Cooking'', ''Listening to Regional Mexican Music'']'
  career_goals: Felix aims to advance his caregiving career by obtaining a Certified Nursing Assistant (CNA) credential and eventually pursuing a bachelor’s degree in health sciences. He aspires to become
    a supervisory care coordinator, integrating his artistic interests by developing an in‑home art‑therapy program for seniors. Long‑term, he envisions founding a community wellness center in Johnson County
    where practical care and creative expression intersect, fostering holistic health for the elderly population.
