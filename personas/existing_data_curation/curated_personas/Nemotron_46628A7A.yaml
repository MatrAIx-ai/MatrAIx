  career_goals: Adaliz envisions a future where she can merge her compassion with her creative spirit. She often talks about becoming a teacher who uses art to inspire children, an artist who paints vibrant
    stories, or a veterinarian who cares for animals. Her ambition is to grow up as someone who helps others, fosters harmony, and brings color and kindness into the world.
