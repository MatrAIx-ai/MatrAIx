personas:
  professional: Adaliz Gomez is a budding preschool leader in collaborative art projects, wielding a knack for organization and a disciplined approach that ensures every crayon box is sorted, every group
    activity runs smoothly, and they make sure peers feel included, reflecting an early passion for structured creativity.
  sports: Adaliz Gomez's energetic mornings often feature a toddler‑friendly t‑ball session with the Morris County Tumblebugs, weekend swim lessons at Hudson River Swim Club, and they cheer loudly for the
    New York Yankees and the New Jersey Devils while watching games with family.
  arts: Adaliz Gomez's after‑school hours are filled with humming along to Shakira’s ‘Waka Waka’, coloring Dr. Seuss storybooks, and re‑enacting scenes from Sesame Street with a plush Elmo, while they also
    practice simple Garífuna dance steps taught by their parents, reflecting a love for rhythm and visual storytelling.
  travel: Adaliz Gomez's travel diary includes a family road‑trip to Central Park’s playgrounds, a magical week at Walt Disney World in Orlando, a short flight to San Juan where they sampled sweet empanaditas,
    and a bucket‑list yearning to explore the coral reefs of Roatán and the lights of Paris.
  culinary: Adaliz Gomez enjoys munching on warm baleadas filled with refried beans, cheese, and sour cream, savoring sweet mango‑pineapple smoothies, and proudly stirring pancake batter with a wooden spoon,
    often insisting on a sprinkle of cinnamon on their toast.
  core: Adaliz Gomez blends childlike curiosity with a compulsive need to line up toys by color, turning every playtime into a meticulously organized adventure, yet they can’t resist sneaking the last cookie
    before bedtime.
background:
  cultural: Adaliz is a first‑generation American with Honduran heritage. At home, Spanish and English are spoken interchangeably, and she participates in traditional celebrations such as Día de los Niños
    and family gatherings featuring Honduran dishes like baleadas and tamales. Her parents share cultural stories, teach simple dance steps, and play Punta and Garífuna music, fostering a strong connection
    to her roots. Living in Morristown, New Jersey, she also attends a bilingual preschool, engages in community activities, and blends her Honduran customs with the multicultural environment of Morris
    County.
