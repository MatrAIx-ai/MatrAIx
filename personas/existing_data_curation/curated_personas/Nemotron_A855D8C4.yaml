personas:
  professional: Juan Escalante is a budding backyard explorer and LEGO architect who merges curiosity with practical problem‑solving, and they use their relaxed, sometimes disorganized approach to improvise
    creative structures while keeping harmony with their small group of friends.
  sports: Juan Escalante practices simple soccer drills with friends at the neighborhood park, belongs to the Riverfront Rangers youth soccer club, cheers passionately for the national soccer team during
    World Cup season, watches the local baseball team, the Harbor Hawks, on weekends, and they love celebrating a win with their teammates.
  arts: Juan Escalante loves listening to Spanish‑language children’s songs by the popular singer Cantante Infantil, watching cartoons starring Paw Patrol and SpongeBob SquarePants, and drawing scenes inspired
    by picture books from Roald Dahl and the vivid illustrations of Eric Carle, and they often share their artwork with family members.
  travel: Juan Escalante enjoys short family trips to the nearby state park’s splash pad, has visited the local zoo on a weekend getaway, and daydreams about traveling with their parents to the Grand Canyon
    and the historic city of Kyoto, though school schedules and a modest family budget set limits on these adventures, and they often plan imaginary itineraries during quiet afternoons.
  culinary: Juan Escalante delights in helping mix shredded chicken, diced tomatoes, and cilantro for tacos, stirring sweet rice with cinnamon and raisins, and experimenting with ripe mango slices and avocado,
    showing a budding cooking skill level that is both hands‑on and comforting, and they proudly serve their creations to the family.
  core: Juan Escalante is a curious, gentle seven‑year‑old who balances imagination with hands‑on building, yet often worries and gets disorganized, finding comfort in routine activities like LEGO construction,
    family cooking, and quiet reading, and they rely on close friends and family to stay grounded.
background:
  cultural: Juan comes from a Honduran family that speaks both Spanish and English at home, giving him a bilingual foundation. His parents celebrate Honduran traditions such as Independence Day and share
    traditional dishes like baleadas and tamales during family meals. He frequently hears stories and folklore from his grandparents, which nurture his curiosity about his heritage. Living in Houston, he
    attends a bilingual elementary school where he interacts with classmates from many backgrounds, blending his cultural roots with the city’s diverse influences. This multicultural environment shapes
    his appreciation for both his Honduran identity and the broader community.
