    tablet games'']'
  career_goals: Juan dreams of becoming a teacher who can make learning fun and safe for other kids, especially those who feel anxious like he sometimes does. He also imagines designing playgrounds or interactive
    structures as an engineer, combining his love of building with his wish to create harmonious environments for friends. Occasionally, he mentions wanting to help animals as a veterinarian, inspired by
    the family dog he cares for. All of these ambitions reflect his desire to support others and bring calm to his community.
