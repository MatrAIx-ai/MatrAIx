  hobbies: '[''Gardening'', ''Birdwatching'', ''Knitting'', ''Reading historical fiction'', ''Listening to classical music'', ''Nature walks'', ''Volunteering at food pantry'', ''Clothing donation sorting'',
    ''Mindfulness meditation'', ''Attending quiet church services'']'
  career_goals: Cari aims to advance to a shift‑supervisor role where she can mentor newer staff and streamline workflow for greater efficiency. She hopes to develop a small training program focused on
    sustainable laundry practices and eventually transition to part‑time consulting for local small‑business owners. As she approaches retirement, she plans to secure a stable financial footing while continuing
    to volunteer her expertise to community clothing‑donation drives and local senior‑center laundry services.
