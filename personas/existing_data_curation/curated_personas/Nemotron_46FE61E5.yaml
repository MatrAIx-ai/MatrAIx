  career_goals: Wendy dreams of a future where she can combine her love for animals with her desire to help others. She aspires to become a veterinarian or a wildlife biologist, hoping to study biology
    in high school and later pursue a degree that lets her care for both pets and wildlife. At the same time, she envisions herself mentoring younger kids in school clubs, sharing her curiosity and encouraging
    kindness, so a teaching role or community outreach position also feels like a meaningful path. Her ambition is guided by a wish to create a safer, healthier world for both people and creatures, and
    she often imagines volunteering at the local animal shelter as a stepping stone toward those goals.
