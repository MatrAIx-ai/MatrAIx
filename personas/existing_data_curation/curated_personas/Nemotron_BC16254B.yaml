  career_goals: Muhammed aims to advance to a senior production planner role within the next three to five years, eventually leading a cross‑functional supply chain team. He plans to earn a bachelor’s degree
    in Operations Management or Supply Chain Logistics and to obtain professional certifications such as the APICS Certified Production and Inventory Management (CPIM). His long‑term ambition is to integrate
    data‑driven and Industry 4.0 technologies into manufacturing processes, improve overall efficiency, and mentor junior colleagues while contributing to sustainable production practices.
