  hobbies: '[''Yoga and mindfulness meditation'', ''Vegetable gardening'', ''Cooking Mexican-Californian fusion dishes'', ''Reading business case studies and Mexican literature'', ''Watercolor painting'',
    ''Solo hiking in the San Gabriel Mountains'', ''Reflective journaling'', ''Photography'']'
  career_goals: Zaida aims to secure tenure at her community college within the next three years, viewing it as a foundation for broader impact. Her long‑term ambition is to become department chair, where
    she can modernize the business curriculum, expand online program offerings, and embed culturally relevant pedagogy that reflects the experiences of Mexican‑American students. She seeks research funding
    to study the impact of experiential learning on first‑generation college students and plans to publish her findings in peer‑reviewed journals. Additionally, she intends to develop mentorship programs
    linking local high‑school entrepreneurs with college resources, creating clearer pathways to higher education for underserved youth.
