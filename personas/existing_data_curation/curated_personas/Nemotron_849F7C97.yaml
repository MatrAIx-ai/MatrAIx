personas:
  professional: Zaida Rivera, a 30‑year‑old community college business professor, designs data‑driven curricula, leverages bilingual instruction, and applies her love of structure and quiet focus to create
    meticulously organized yet flexible courses that nurture first‑generation students.
  sports: Zaida Rivera, an early‑morning hiker of the San Gabriel Mountains, follows the Los Angeles Lakers for basketball, tracks the LA Galaxy in soccer, and participates in a local community yoga circle
    that meets weekly.
  arts: Zaida Rivera, an avid watercolorist, spends Saturday afternoons capturing desert landscapes with pigments, draws inspiration from Frida Kahlo’s emotive self‑portraits and the poetry of Octavio Paz,
    and unwinds listening to the soulful guitar of Juan Gabriel.
  travel: Zaida Rivera, a meticulous planner, prefers solo road trips to nearby desert towns such as Joshua Tree and cultural festivals in Oaxaca, chooses modest inns over luxury hotels, and dreams of hiking
    the Andes while saving for a future study‑abroad program.
  culinary: Zaida Rivera, a home‑cook with a green thumb, blends heirloom tomatoes and chilies from her garden into classic pozole, tacos al pastor, and mole, adds avocados and lime for a Californian twist,
    and experiments with slow‑roasting techniques on weekends.
  core: Zaida Rivera, a quietly driven planner, balances a love of structured teaching with a habit of over‑thinking every detail, often staying up late to perfect lesson slides while finding solace in
    solitary hikes and herb‑infused tea.
background:
  cultural: Zaida was raised in a Mexican‑American household in Southern California, where Spanish was spoken at home and family gatherings featured traditional music, cuisine, and celebrations such as
    Día de los Muertos and quinceañeras. Her parents instilled values of respect, collectivism, and personal responsibility, shaping her cooperative and harmony‑oriented disposition. Growing up near the
    U.S.–Mexico border, she navigated bicultural expectations, developing fluency in both Spanish and English and a deep appreciation for Mexican heritage blended with Californian influences. These cultural
    experiences inform her teaching philosophy, prompting her to incorporate culturally relevant examples and to mentor first‑generation Latino students.
attributes:
  skills: '[''Curriculum development'', ''Adult learning instruction'', ''Data analysis (Excel, SPSS)'', ''Learning management systems (Canvas, Blackboard)'', ''E-learning content creation'', ''Bilingual
