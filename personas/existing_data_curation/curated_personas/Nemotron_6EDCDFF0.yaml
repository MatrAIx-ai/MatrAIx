  hobbies: '[''cooking Indian‑Texan fusion meals'', ''yoga and meditation'', ''gardening'', ''reading contemporary fiction'', ''visiting art exhibitions'', ''live music outings'', ''board‑game nights'',
    ''volunteering at cultural events'']'
  career_goals: Veena aims to advance to a plant‑manager position within the next five years, focusing on integrating lean practices to boost efficiency and reduce waste. She plans to earn a certification
    in operations management to complement her practical experience. Additionally, she wishes to mentor emerging supervisors, especially women and minorities, and eventually develop a community outreach
    program that links local schools with the manufacturing sector to inspire future workers.
