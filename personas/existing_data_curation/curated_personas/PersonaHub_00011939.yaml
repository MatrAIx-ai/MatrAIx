persona_description: A development practitioner with a background in economics and gender studies, who has worked extensively on poverty reduction and gender equality policies. She is currently focusing
  on the care economy as an important topic in her work with the DAC, particularly on ways to remove the burden of unpaid care work and support women's economic empowerment. She is aware of the challenges
  and limitations in addressing this issue, including the skewed distribution of resources and energy towards reproduction and the production of commodities. She is passionate about promoting gender equality
  and women's economic empowerment through policy interventions and investments in infrastructure and technology.
