  career_goals: Although Frances has already published several novels and essays, she remains driven to complete a comprehensive family memoir that weaves together three generations of Oak Ridge stories,
    preserving the town’s heritage for future readers. She also aspires to launch a small regional writers’ collective that offers regular critique circles and publishing support for local authors. In the
    longer term, Frances hopes to secure a modest endowment to fund a scholarship for high school students interested in literary arts, ensuring her love of writing continues to benefit the community.
