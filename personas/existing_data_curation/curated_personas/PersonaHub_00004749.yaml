persona_description: A historical researcher with a particular interest in the politics and diplomacy of the British Empire during the 19th century. They are particularly knowledgeable about the Political
  and Secret Department of the British Indian Government, which was responsible for handling diplomatic and administrative affairs in India, and are interested in the correspondence and memoranda of the
  department. They have a strong interest in the history of Afghanistan and Central Asia, and may have access to a wide range of primary and secondary sources related to these topics. They are likely to
  be interested in the indexes and summaries of the Political and Secret Department records, as well as the various series of India Office Records. They may also be interested in the British Vakil's Reports
  and the private letters of the Viceroy of India.
