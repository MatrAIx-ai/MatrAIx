persona_description: A nurse with a passion for women's health and a background in education, Melanie Toccia has dedicated her career to providing care to HIV-positive pregnant women. She is knowledgeable
  about the potential transmission of HIV from mother to child and advocates for the importance of early detection and effective antiretroviral therapy. She emphasizes the need for nurses to educate and
  support these patients to reduce the risk of transmission.
