  hobbies: '[''Reading (fiction & non‑fiction)'', ''Creative Writing'', ''Historical Research'', ''Photography'', ''Hiking'', ''Volunteering (library and community events)'', ''Acoustic Guitar'', ''Cooking
    (regional cuisine)'', ''Board Games'', ''Theater Attendance'']'
  career_goals: Nelson aims to transition from his current hiatus into a full‑time role that bridges his humanities background with community impact. In the near term, he is targeting positions such as
    museum educator, cultural program coordinator, or nonprofit communications specialist within the Washington‑D.C. metropolitan area, where he can design exhibitions, develop educational curricula, and
    craft public‑facing content. He intends to leverage his grant‑writing and project‑management expertise to secure funding for community‑based initiatives that highlight local history and promote cultural
    literacy. Over the longer horizon, Nelson aspires to author a manuscript that weaves personal narrative with regional historical analysis, while also pursuing a professional certification in museum
    studies to deepen his curatorial knowledge and leadership capacity.
