personas:
  professional: Brent Huffman, an aspiring product manager still in college, combines his methodical planning, strong public‑speaking chops, and competitive edge to drive cross‑functional tech projects,
    while his skeptical streak keeps him vetting ideas thoroughly and his chronic worry pushes him to over‑prepare for every stakeholder meeting.
  sports: Brent Huffman spikes on the court for the Des Moines Celtics, an amateur pickup basketball club, and passionately roots for the Iowa State Cyclones during March Madness, channeling their competitive
    drive into a rigorous three‑day‑a‑week weight‑training regimen to offset the stress of college life.
  arts: Brent Huffman lights up the stage at iStage Unscripted improv nights, while curating indie‑rock playlists featuring Arcade Fire, Tame Impala, and Phoebe Bridger’s latest album, and they often binge‑watch
    Wes Anderson films for their meticulous visual humor.
  travel: Brent Huffman prefers weekend getaways to Iowa’s rugged state parks—such as Maquoketa Caves and Backbone Floyd—while dreaming of a spring backpacking trip through Kyoto’s tech districts and Berlin’s
    underground music scene, balancing tight student budgets with a penchant for meticulously planned itineraries and spontaneous photo‑journalism.
  culinary: Brent Huffman enjoys cooking hearty black‑bean tacos with fresh cilantro and lime, can whip up a respectable spicy miso ramen using instant noodles and a DIY temperature sensor, and they frequently
    treat themselves to craft IPA and farm‑to‑table salads featuring heirloom tomatoes, avocado, and toasted pumpkin seeds.
  core: Brent Huffman is a hyper‑social, competition‑driven 18‑year‑old who juggles improv comedy, pickup basketball, and DIY tech projects while constantly fretting over every detail, often over‑packing
    their schedule and drowning in a sea of meticulously kept spreadsheets.
background:
  cultural: Brent was raised in the heart of central Iowa, within a family that embodies traditional Midwestern values of hard work, community involvement, and pragmatic problem‑solving. Growing up in Boone
    County and spending his teenage years in Ames, he has been shaped by the agricultural heritage of the region, the collegiate atmosphere of Iowa State University, and the close‑knit social fabric of
    the town. While his background is predominantly white, middle‑class, and rooted in small‑town America, he has been exposed to a growing diversity of ideas through campus events and online communities,
    fostering an appreciation for both tradition and innovation.
