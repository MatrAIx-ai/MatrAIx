persona_description: A historian or medical historian who is interested in the study of the Black Death and the Gothic sensibility that it evokes. They are likely to be familiar with the work of Justin
  Hecker and Robert Gottfried, and are interested in the intersection of medicine and history. They appreciate the morbid and bizarre aspects of the plague, and are aware of the controversy surrounding
  the claim that the plague is the root cause of vampires, werewolves, and revenants/zombies. They are interested in the interdisciplinary nature of the plague study and are willing to write for a general
  public audience.
