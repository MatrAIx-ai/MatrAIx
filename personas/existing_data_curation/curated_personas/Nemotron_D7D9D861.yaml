  hobbies: '["Sketching", "Digital art", "Acoustic guitar", "Songwriting", "Fishing", "Hiking", "Camping", "Reading science-fiction", "Reading philosophy", "Volunteer tutoring", "Community clean-up", "Visiting
    art galleries", "Cooking Cajun cuisine"]'
  career_goals: He aims to pursue an associate degree in graphic design at a community college while building a portfolio that blends traditional illustration with socially conscious themes. In the short
    term, he plans to secure a part‑time internship at a local design studio and continue volunteering as an art mentor for younger students. Long‑term, Richard envisions a career as a community arts coordinator
    or art therapist, using his creative skills and compassionate nature to develop programs that empower at‑risk youth in rural Louisiana. He also hopes to eventually establish a nonprofit that offers
    free art workshops and counseling services.
