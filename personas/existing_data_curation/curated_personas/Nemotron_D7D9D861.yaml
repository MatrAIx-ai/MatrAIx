personas:
  professional: Richard Smith, an 18‑year‑old aspiring graphic designer, merges watercolor bayou landscapes with digital art in Photoshop and Canva, interns at a Baton Rouge studio, mentors younger students,
    and they apply their organized yet adaptable mindset to craft community‑focused visual narratives.
  sports: Richard Smith, a weekend outdoors enthusiast, hikes pine forests with the Baton Rouge Outdoor Club, fishes the local bayou for bass in summer, follows LSU Tigers football and New Orleans Pelicans
    basketball loyally, and they maintain a routine of early‑morning jogs along the Mississippi River levee, balancing team fandom with hands‑on adventure.
  arts: Richard Smith, a budding visual and musical storyteller, draws inspiration from Monet’s water lilies and the soulful strums of Cajun musician Zachary Richard, frequents gallery openings featuring
    contemporary Louisiana artists like Stacy K. Martin, composes acoustic songs echoing Bob Dylan’s lyricism, and they find solace in the cinematic scores of Ennio Morricone.
  travel: Richard Smith, an 18‑year‑old explorer, prefers budget‑friendly road trips that blend nature and culture, has camped in the Atchafalaya Basin, visited New Orleans’ French Quarter and Austin’s
    music scene, dreams of backpacking the coastal towns of Nova Scotia and strolling the streets of Paris, and they plan most trips around school breaks and volunteer commitments.
  culinary: Richard Smith, an intermediate home cook, loves crafting Cajun classics such as jambalaya with smoked andouille sausage, crawfish étouffée thickened with file powder, and gumbo brimming with
    okra, experiments with fresh herbs and bold spices, enjoys late‑night kitchen improvisations but often neglects to clean the stovetop, and they relish sharing meals at community gatherings.
  core: Richard Smith, an 18‑year‑old creative soul, balances a passion for art and music with a compassionate drive to uplift their community, though they occasionally indulge in impulse buys and miss
    medication doses, revealing a relatable, imperfect streak.
background:
  cultural: Richard grew up in Walker, a small town in Livingston Parish, Louisiana, where Southern hospitality, close‑knit community ties, and a strong connection to the natural environment shape daily
    life. His family’s Protestant (Baptist) values emphasize modesty, service, and faith, which are reflected in his regular involvement with the local church and community service. The surrounding Cajun
    and Creole culture influences his appreciation for regional music (zydeco, country) and cuisine, and he celebrates local traditions such as Mardi Gras parades and fish fries. The rural setting has also
    instilled a practical, hands‑on attitude, seen in his familiarity with outdoor activities and basic mechanical work. These cultural currents blend with his personal curiosity and openness, fostering
    a balanced worldview that values both tradition and innovative expression.
attributes:
  skills: '["Sketching", "Watercolor painting", "Digital illustration (Adobe Photoshop, Canva)", "Written communication", "Critical thinking", "Basic automotive repair", "Computer literacy (Microsoft Office)",
