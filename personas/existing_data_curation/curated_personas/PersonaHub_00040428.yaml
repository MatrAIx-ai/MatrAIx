persona_description: A scientist who specializes in the study of environmental chemistry, particularly the effects of pesticides on aquatic ecosystems. His research interests include, but are not limited
  to, the regulation and management of pesticides, the potential impacts of pesticide pollution on aquatic species and ecosystems, and the failure of national management in reducing pesticide levels and
  risks. He is interested in the regulation and management of pesticides in Australia and the Great Barrier Reef region, and is advocating for better regulation and management of pesticides to reduce their
  impacts on aquatic ecosystems.
