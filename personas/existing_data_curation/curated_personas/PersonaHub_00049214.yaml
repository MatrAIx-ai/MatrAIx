persona_description: A historian who specializes in studying the effects of natural disasters on human societies and their impact on the economy and culture. They are particularly interested in the effects
  of volcanic eruptions, plagues, and famines on human life and society, and are currently reading The Year Without a Summer by William Klingman and Nicholas Klingman, which provides a detailed analysis
  of the effects of the Tambora eruption on the world in 1815. They are also interested in the Great European Famine of 1315, which had a devastating impact on the continent, and the Great Plague of London
  in 1665, which had a significant impact on English society.
