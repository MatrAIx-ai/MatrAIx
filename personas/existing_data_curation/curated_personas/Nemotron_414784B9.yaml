  career_goals: Kevin aims to complete his GED and secure a skilled-trade apprenticeship in automotive technology or CNC machining within the next year, followed by ASE certification. He plans to leverage
    his disciplined work style to become a licensed technician, eventually opening his own small auto-repair or custom-fabrication shop where he can compete on quality and reliability. Over the next five
    years, he hopes to build a reputation for high-quality, precise work in the Ashtabula region and expand into a niche market for bespoke wooden and metal fixtures.
