  career_goals: Damian aims to transform his practical skills into a sustainable career that supports his family and contributes to his community. Over the next two years, he plans to enroll in a community-college
    program in Agricultural Technology or Automotive Service, earn the ASE certification for automotive repair, and obtain a Small Business Development certificate. His long-term ambition is to open a combined
    auto-repair shop and farm-stand that offers vehicle maintenance, garden supplies, and locally grown produce. In parallel, he hopes to become a trusted liaison for local community initiatives, helping
    organize cultural festivals and youth programs. He is motivated by the desire for financial stability, personal growth, and the ability to give back to his Mexican-American community.
