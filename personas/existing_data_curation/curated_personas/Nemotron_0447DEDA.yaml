  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Participating in group painting workshops'', ''Cooking traditional Bengali cuisine with modern twists'', ''Hosting card game nights'',
    ''Rooftop gardening (herbs & seasonal vegetables)'', ''Watching documentaries on art and world cultures'', ''Walking tours of multicultural neighborhoods'', ''Mentoring youth in informal settings'',
    ''Photography and photo editing'']'
  career_goals: Although officially retired, Debasish is driven to leave a lasting imprint on his community. He aims to become the senior volunteer coordinator at the Queens Cultural Center, where he can
    design art‑focused programs for seniors and youth. He is determined to mentor at least ten young entrepreneurs each year, sharing practical business insights from his own retail background. A personal
    ambition is to author a memoir titled 'From the Marketplace to the Gallery' that chronicles his immigrant journey and love for art. He also plans to acquire proficiency in digital photography and photo‑editing
    software to preserve and showcase family histories.
