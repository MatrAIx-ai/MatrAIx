  hobbies: '["Herb gardening", "Reading classic literature", "Church choir singing", "Crossword puzzles", "Hiking", "Knitting", "Volunteer teaching at community kitchen", "Participating in potlucks", "Jigsaw
    puzzles", "Exploring local history"]'
  career_goals: Susan aims to open her own boutique bakery in the Pittsburgh suburbs within the next three years, featuring a menu of hand‑crafted breads, seasonal pastries, and a small café space for community
    gatherings. She plans to earn a Certified Master Baker credential, expand her expertise in gluten‑free and low‑sugar baking, and develop a line of educational classes that teach basic baking skills
    to seniors and low‑income families. In the long term, she hopes to partner with local food banks to provide regular donations of fresh baked goods, thereby combining her entrepreneurial ambitions with
    her desire to help others.
