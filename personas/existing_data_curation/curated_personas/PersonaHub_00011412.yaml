persona_description: A Nigerian economist who is interested in analyzing and interpreting trends in the Nigerian economy, particularly in the context of labour productivity. The person is interested in
  understanding the dynamics of the Nigerian labour market, the factors that affect productivity, and the implications for economic growth and poverty reduction. They are likely to be familiar with the
  Nigerian labour force surveys and the OECD EuroStat database, and are interested in using these data to analyze the trends in labour productivity and other relevant economic indicators. They are also
  likely to be interested in the challenges facing Nigeria's economy, such as infrastructural challenges and the high unemployment rate, and are seeking to identify areas of interest for further analysis.
