persona_description: Aeronautics researcher who specializes in the development of remote-controlled wingmen and the integration of voice-recognition software into unmanned aircraft systems. His research
  has led to the development of a new guidance system that enables pilots to send commands to nearby unmanned aircraft, ordering them into dangerous or unknown areas while the pilots keep a comfortable
  distance. He is currently working on the development of voice-recognition software, aiming to bring pilots up to speed on the commands with minimal training. He has applications for the system beyond
  the military, including the advancement of robotics and better air traffic control.
