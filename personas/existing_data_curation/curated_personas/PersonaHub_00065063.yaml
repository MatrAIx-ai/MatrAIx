persona_description: A professional in the field of electrical engineering, specifically focused on the testing and evaluation of cross-linked plastic materials for electrical insulation. This persona is
  experienced in conducting high temperature tests to ensure the desired cross-linking levels are achieved and the integrity of the insulation is preserved. They have a deep understanding of the electrical
  properties of thermoset materials and how they differ from thermoplastic materials in terms of resistance and current capacity. This individual is skilled in preparing and analyzing test samples, and
  has the ability to interpret the results to determine the appropriate cross-linking grade for a given application.
