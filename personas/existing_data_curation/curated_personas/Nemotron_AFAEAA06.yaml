personas:
  professional: Aida Ocampo is a 4‑year‑old preschooler who balances curiosity with a surprisingly practical approach to play, carefully sorting colored blocks into tidy stacks before experimenting with
    new designs, and reliably stepping up as line‑leader during group activities, reflecting her organized yet flexible personality.
  sports: Aida Ocampo is a 4‑year‑old who squeals with excitement during community soccer drills, proudly wears a miniature jersey of the hometown baseball team, and channels a competitive edge by always
    trying to be the first to score in the sandbox game of “duck‑duck‑goose,” balancing her love for organized sport with spontaneous outdoor play.
  arts: Aida Ocampo is a 4‑year‑old who spends afternoons sketching cartoon animals in a spiral notebook, sings along to Disney’s Frozen soundtrack and Sesame Street songs, and occasionally mimics the dance
    moves of her favorite animated characters, merging her curiosity for new ideas with a practical love for structured creative routines.
  travel: Aida Ocampo is a 4‑year‑old who has visited the local zoo, loves the colorful rides at Disneyland, and enjoys trips to her grandparents’ house that follow a clear schedule with snack breaks and
    playground time, balancing adventurous curiosity with a need for predictable routine and occasional alone moments.
  culinary: Aida Ocampo is a 4‑year‑old with a strong appetite for cheesy macaroni, crunchy chicken nuggets, and strawberry‑filled cupcakes, while shyly avoiding broccoli and peas, often negotiating extra
    ketchup for her fries in a competitive bargaining style at the dinner table, showcasing her practical taste preferences and occasional picky eating.
  core: Aida Ocampo is a 4‑year‑old whose curiosity meets a practical, organized mindset, whose competitive spark turns every playtime into a friendly contest, and whose love for routine balances her adventurous
    spirit.
background:
  cultural: Aida is raised in a Spanish‑heritage household in Denison, Texas. Spanish is spoken daily alongside English, and family traditions include celebrating Día de los Muertos with colorful altars,
    enjoying holiday dishes such as tamales and churros, and attending community events at the local Hispanic cultural center. Her parents emphasize bilingual education, storytelling, and strong family
    bonds, which shape her identity and daily experiences.
