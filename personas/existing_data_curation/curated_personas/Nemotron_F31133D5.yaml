  career_goals: Antonio aims to transition from a general office clerk to a supervisory or project‑coordination role within the next five years. He plans to earn a Microsoft Office Specialist certification
    and complete a data‑analytics bootcamp to strengthen his ability to generate actionable insights from municipal data. Ultimately, he envisions leading a team that integrates data‑driven decision‑making
    with community‑focused initiatives, such as digitizing local art archives or coordinating cultural‑event logistics. He also hopes to pursue a part‑time graduate certificate in public administration
    to broaden his impact on local government services while maintaining a balanced workload that allows for continued personal growth.
