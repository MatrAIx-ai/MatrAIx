  hobbies: '[''Building LEGO sets'', ''Reading picture books about animals and space'', ''Playing soccer and tag with friends'', ''Drawing and coloring'', ''Crafting simple projects'', ''Organizing books
    and toys at home'', ''Singing in school choir'', ''Participating in school presentations'']'
  career_goals: Jeffrey dreams of a future where he can help and inspire others. He often talks about becoming a teacher because he enjoys explaining things to friends, and he is fascinated by firefighters
    who protect the community. He also imagines caring for animals as a veterinarian. His organized nature leads him to envision roles that involve planning, such as a community event coordinator or a youth
    sports coach. In short, he aspires to jobs that combine helping people, being in the spotlight, and using his practical skills.
