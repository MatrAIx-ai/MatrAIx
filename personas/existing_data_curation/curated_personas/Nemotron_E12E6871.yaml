personas:
  professional: Laura Greenway is a meticulous aspiring medical office administrator who leverages their knack for detailed scheduling, spreadsheet budgeting, and First Aid certification to create orderly
    front‑desk operations, thriving in environments that reward routine and precision.
  sports: Laura Greenway follows a structured home workout routine of three weekly bodyweight circuits, plays recreational badminton with the local community center’s adults’ league, and is a devoted fan
    of the Minnesota Vikings, Twins, and Wild, never missing a Sunday football game or a weekend baseball match.
  arts: Laura Greenway immerses themselves in cozy creative pursuits, from crocheting intricate patterns while listening to Joni Mitchell and Leonard Cohen, to discussing Agatha Christie mysteries and Tana French
    thrillers at their small book‑club, and occasionally attending community theater productions starring local talent like Emily Kelley.
  travel: Laura Greenway prefers low‑key, well‑planned trips such as weekend getaways to the Boundary Waters Canoe Area and a day trip to Chicago’s Art Institute, while dreaming of a summer tour of England’s
    historic castles that echo the settings of their beloved historical fiction.
  culinary: Laura Greenway delights in baking classic chocolate‑chip cookies, lemon‑zest scones, and herb‑infused focaccia using fresh rosemary and thyme from their garden, and balances their love of comfort
    food with meticulous meal‑planning spreadsheets for family dinners.
  core: Laura Greenway is a routine‑loving, detail‑driven teen who blends meticulous planning with creative comforts, from budgeting spreadsheets to garden‑fresh baking, yet occasionally battles indecision
    when unexpected changes disrupt their carefully ordered world.
background:
  cultural: Laura was raised in a Midwestern white family with Northern European (primarily Swedish and German) ancestry, typical of the Minneapolis region. Her upbringing reflects traditional Midwestern
    values of hard work, modesty, punctuality, and community involvement. She attends a Lutheran church, where holidays and community events emphasize togetherness, service, and respect for order. Growing
    up in Ramsey County, she has been influenced by the area's emphasis on civic responsibility, outdoor recreation, and practical education, shaping her pragmatic outlook and cooperative nature.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Basic Computer Literacy'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Simple Bookkeeping'', ''Data Entry'', ''Baking and Meal Planning'',
    ''First Aid/CPR'']'
  hobbies: '[''Journaling'', ''Baking'', ''Crocheting'', ''Knitting'', ''Reading mystery novels'', ''Reading historical fiction'', ''Herb garden care'', ''Volunteer work at animal shelter'', ''Puzzle solving
    (crosswords)'']'
  career_goals: Laura plans to earn her GED within the next year and then enroll in a vocational certificate program in medical office administration or health information management at Minneapolis Community
    and Technical College. She is drawn to roles that offer clear routines and structured procedures, such as a medical records clerk, billing specialist, or hospital front‑desk receptionist. Long‑term,
    she aspires to become a certified medical office manager, using her meticulous organization and considerate nature to ensure efficient patient flow and accurate documentation. As a backup, she is considering
    a position as a library assistant, where a calm, routine environment aligns with her preferences.
