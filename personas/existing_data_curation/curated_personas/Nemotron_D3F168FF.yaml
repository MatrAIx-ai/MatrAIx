  career_goals: Anthony aims to secure a position in a technical or engineering support role where structured processes and clear outcomes are valued, such as a mechanical technician or field service engineer.
    Over the next five years, he plans to complete an associate degree in Engineering Technology, obtain relevant certifications, and eventually transition into a supervisory role that leverages his organizational
    strengths and competitive drive. He also envisions launching a modest marine‑service business that combines his technical skills with the coastal community he knows well.
