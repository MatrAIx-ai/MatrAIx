personas:
  professional: Justin Delcastillo, a 12‑year‑old aspiring builder, turns his fascination with mechanical LEGO sets and custom Minecraft adventure maps into early architectural thinking, favoring clear
    blueprints and step‑by‑step instructions while tolerating occasional clutter on his desk.
  sports: Justin Delcastillo rides his bike on neighborhood trails, plays forward for the local U12 Trailblazers soccer club, and roots for the River City Tigers minor‑league baseball team, preferring small‑group
    pick‑up games over crowded school gym sessions.
  arts: Justin Delcastillo creates comic strips starring a farm‑yard hero inspired by Bill Watterson’s Calvin and Hobbes and Hergé’s Tintin, spends weekends listening to the cinematic scores of composer
    Joe Hisaishi and the pop‑rock anthems of Imagine Dragons, and visits the county fair’s art tent to admire local folk paintings.
  travel: Justin Delcastillo favors short, well‑planned family road trips to nearby Greenleaf State Park for bird‑watching and building forts, while dreaming of a future passport‑stamped adventure to Scotland’s
    historic castles, though they tend to avoid the chaos of large theme parks.
  culinary: Justin Delcastillo loves homemade pepperoni pizza topped with extra olives, bakes butter‑soft sugar cookies using LEGO‑shaped cutters, and whips up quick grilled cheese sandwiches with cheddar
    and tomato slices when the petting zoo’s lunch line gets long.
  core: Justin Delcastillo is a structure‑oriented, quietly cooperative 12‑year‑old who blends LEGO building with Minecraft creativity, saves pennies for future projects, and balances a relaxed, sometimes
    messy routine with a strong sense of kindness.
background:
  cultural: Justin grew up in Carrollton, a small agricultural community in Greene County, Illinois. His family lives on a modest farm where corn, soybeans, and livestock shape daily life. The town’s rhythm
    is centered around school events, the county fair, and church gatherings that emphasize community, self‑reliance, and modesty—values typical of the Midwestern Midwest. Though his surname reflects Hispanic
    ancestry, his household primarily observes mainstream American customs, while occasionally sharing family recipes such as tamales during holidays. The close‑knit nature of the town gives Justin a strong
    sense of responsibility to neighbors and a deep appreciation for rural traditions.
