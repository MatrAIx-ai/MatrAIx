  career_goals: He dreams of becoming a veterinarian, motivated by his love for the farm animals he helps feed and care for. He envisions enrolling in a high‑school science program, later studying animal
    biology, and eventually working at a rural clinic where he can combine his practical hands‑on skills with his desire to help animals and the community. He also hopes to design simple animal prosthetic
    devices, merging his interest in building with veterinary care.
