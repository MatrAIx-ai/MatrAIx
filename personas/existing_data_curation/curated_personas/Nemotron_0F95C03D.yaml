personas:
  professional: Andrew Kissman is a retired handyman in Hamlin who leverages a lifetime of technical training to diagnose and fix everything from leaky pipes to vintage radios, mentors fellow retirees in
    DIY workshops, and channels his competitive streak into flawless garden and solar projects despite a habit of leaving tools out of order.
  sports: Andrew Kissman is a devoted fan of the Detroit Tigers and Lions, follows the Monroe Trojans high‑school football on Saturdays, enjoys pickup basketball at the senior center, and spends weekends
    fishing on Lake Erie with a custom‑tied fly rod, often entering friendly catch‑and‑release contests with fellow anglers.
  arts: Andrew Kissman spends evenings absorbed in historical nonfiction by David McCullough, listening to folk legends like Bob Dylan and Johnny Cash on his restored vintage radio, and occasionally attending
    community‑theater productions of Arthur Miller plays, blending a love of history, music, and drama into his leisure.
  travel: Andrew Kissman favors spontaneous road trips that mix history and nature, having driven the Michigan Upper Peninsula to see Pictured Rocks, taken a weekend detour to Niagara Falls in Canada, and
    planning a future pilgrimage to Gettysburg, all while managing a modest travel budget that leaves room for occasional home‑brew tasting tours in neighboring states.
  culinary: Andrew Kissman brews a honey‑citrus pale ale in his garage‑brewery, cooks garden‑fresh heirloom tomatoes into a rustic ratatouille, grills lake‑caught perch with lemon‑butter sauce, and treats
    himself to a weekend batch of smoked brisket seasoned with paprika, mustard powder, and brown sugar, preferring hands‑on cooking that mirrors his DIY ethos.
  core: Andrew Kissman is a fiercely competitive retiree who flips between solitary woodworking sessions and lively senior‑center card games, constantly chasing the next DIY triumph while juggling a skeptical
    eye for deals and a soft spot for quiet walks in the woods.
background:
  cultural: Andrew grew up in the post‑war suburbs of Rochester, New York, in a working‑class, white, Protestant family with ancestry tracing back to English and Irish immigrants. The upstate New York culture
    of self‑reliance, frugality, and community involvement shaped his values. He carries the legacy of the region’s rust‑belt heritage—hard work, modest pragmatism, and a deep respect for the outdoors.
    While his life has remained largely local, this background gives him a strong sense of place and an appreciation for the socioeconomic changes that have reshaped Monroe County over the decades.
