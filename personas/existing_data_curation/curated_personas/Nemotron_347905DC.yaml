  hobbies: '[''Visiting art museums and galleries'', ''Painting and watercolor'', ''Photography (nature)'', ''Hiking on Brainerd Lakes Trail'', ''Kayaking'', ''Community theater participation'', ''Book
    club'', ''Board game nights'', ''Yoga'', ''Cooking experimental recipes'', ''Volunteering at local art festivals'', ''Hosting potluck gatherings'', ''Attending live music gigs'', ''Social dancing'',
    ''Gardening'']'
  career_goals: Nicole aims to transition from a support role to a leadership position such as office manager or community program coordinator within the next three to five years. She plans to earn a Certified
    Administrative Professional (CAP) credential and eventually complete a bachelor’s degree in business administration or arts management, blending her administrative strengths with her passion for the
    local arts scene. Her medium‑term goal is to take on responsibility for organizing larger community events and museum‑related exhibitions, leveraging her event‑planning and outreach experience. In the
    long term, Nicole envisions opening a small community art space in Brainerd that offers workshops, gallery shows, and volunteer opportunities, allowing her to merge her organizational skills with her
    love of creativity while maintaining a flexible, people‑focused work environment.
