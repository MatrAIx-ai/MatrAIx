persona_description: A scientist or environmentalist who is interested in the study of ecosystems, particularly those involving complex inter-relationships between living organisms and their environment.
  This individual is likely to have a strong background in ecology, biogeography, and environmental science. They are knowledgeable about the various factors that influence the health and quality of water,
  including physical, chemical, and biological conditions, as well as human activities that can impact these factors. They are also likely to be familiar with the concepts and terminology related to ecosystems,
  such as trophic levels, biotic and abiotic factors, and ecological succession. They may have experience working with data and conducting research to evaluate the environmental implications of proposed
  developments.
