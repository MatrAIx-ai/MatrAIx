  career_goals: She aims to advance to a district‑manager role within the next five years, overseeing multiple stores across Arkansas and neighboring states. To support this, she plans to complete an MBA
    in Retail Management and earn a certification in Lean Six Sigma. Stephanie wants to implement a mentorship program for first‑line supervisors to improve staff retention and champion employee‑wellness
    initiatives such as flexible scheduling and stress‑management workshops. Ultimately, she envisions a senior operations position where she can shape company‑wide strategies while maintaining a balanced
    work‑life schedule to mitigate stress.
