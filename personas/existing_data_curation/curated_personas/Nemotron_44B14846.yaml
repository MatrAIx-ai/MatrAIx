personas:
  professional: Stephanie Yeomans, a 44-year-old retail operations manager in Little Rock, blends her STEM analytical background with a knack for people management, using Excel and basic SQL to forecast
    sales while designing structured training programs and conflict-resolution workshops, all driven by her commitment to community-focused service and a methodical, compassionate leadership style.
  sports: Stephanie Yeomans, an avid hiker of the Ozark trails and a dedicated member of the Little Rock Outdoor Club, roots for the Arkansas Razorbacks football team in the fall, watches St. Louis Cardinals
    baseball in the summer, and sustains her active lifestyle with weekly yoga and low-impact cardio sessions that balance her structured work routine with physical fitness.
  arts: Stephanie Yeomans, a regular in her church choir and a devotee of Southern storytelling, spends evenings listening to Johnny Cash and Dolly Parton, attending Little Rock Symphony Orchestra performances,
    and unwinding with Agatha Christie mystery novels, finding that these artistic pursuits reinforce her compassionate yet orderly worldview.
  travel: Stephanie Yeomans prefers carefully planned getaways that blend cultural immersion and relaxation, often taking weekend trips to Nashville for live music or exploring the Great Smoky Mountains,
    while dreaming of a Mediterranean cruise to the Greek islands once her MBA is completed and finances permit.
  culinary: Stephanie Yeomans, an enthusiastic home chef, perfects slow-cooked Arkansas-style barbecue ribs and fluffy buttermilk biscuits seasoned with peppercorns and honey-glazed carrots, while experimenting
    with heirloom tomatoes and fresh herbs from her vegetable garden to add a structured, seasonal twist to Southern cuisine.
  core: Stephanie Yeomans, a 44-year-old retail strategist who balances methodical leadership with a love for gardening, choir singing, and barbecue, quietly wrestles with chronic worry yet channels it
    into meticulous planning and community-focused compassion.
background:
  cultural: Stephanie is a White American raised in a middle‑class family in central Arkansas. Her Southern upbringing instilled values of hospitality, community service, and a strong work ethic. She grew
    up attending a local Baptist church, celebrating regional traditions such as Sunday barbecues and community fairs. Her STEM bachelor’s degree exposed her to broader national perspectives, while her
    lifelong residence in Little Rock keeps her connected to Arkansas cultural heritage, including appreciation for the Ozarks, Southern cuisine, and regional music.
