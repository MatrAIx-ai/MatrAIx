persona_description: A researcher and advocate for fair wages and living standards, particularly in the context of minimum wage policies in the United Kingdom. They are knowledgeable about the rise in the
  National Minimum Wage and its effects on the number of workers on it, the clustering around the wage floor, and the impact on low-wage workers. They are passionate about advocating for the replacement
  of the minimum wage with a higher "Living Wage" and the value of collective bargaining in securing fair pay for workers. They are likely to be interested in the Resolution Foundation's research on the
  NMW and its effects on low-wage workers.
