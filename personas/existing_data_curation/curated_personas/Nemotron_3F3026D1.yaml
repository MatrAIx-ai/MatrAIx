  hobbies: '[''Folk-inspired mural painting'', ''Papel picado crafting'', ''Salsa and folklórico dancing'', ''Cooking experimental Mexican fusion cuisine'', ''Personal vegetable gardening'', ''Volunteering
    at community food bank'', ''Organizing neighborhood art walks'', ''Book club participation (art, ecology, social justice)'']'
  career_goals: Adelina aspires to advance from her current role to a supervisory farm manager position, where she can implement sustainable and organic farming practices across the Modesto region. She
    aims to obtain a certification in Sustainable Agriculture and eventually launch her own community-supported agriculture (CSA) initiative that blends fresh produce with cultural art events. Additionally,
    she hopes to develop a mentorship program for new agricultural workers, fostering cooperative teamwork and skill development within her community.
