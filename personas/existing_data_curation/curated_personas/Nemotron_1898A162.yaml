  career_goals: Cristina aims to transition into a senior executive role that bridges business management with cultural programming, such as becoming the director of a regional arts council or establishing
    a nonprofit that integrates arts education into community development in Sussex County. She also aspires to earn a master's degree in arts administration to deepen her expertise, mentor emerging artists,
    and spearhead innovative projects that bring novel artistic experiences to underserved audiences.
