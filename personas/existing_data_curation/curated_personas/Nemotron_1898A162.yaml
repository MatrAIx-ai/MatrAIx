personas:
  professional: Cristina Lee, a strategic arts program manager with a knack for meticulous budget oversight and creative grant storytelling, blends methodical project leadership with imaginative curatorial
    vision to launch community‑engaged exhibitions that resonate with Sussex County’s underserved neighborhoods, and they routinely marshal cross‑functional teams to meet tight deadlines.
  sports: Cristina Lee, a modestly active enthusiast, attends Delmarva Shorebirds baseball games in the spring, follows the Baltimore Ravens in football, joins a local co‑ed tennis club for bi‑weekly matches,
    practices yoga at the Sussex County Community Center to keep flexible for long hours in the studio, and they often cap their weekend runs with bird‑watching hikes on the nature trails.
  arts: Cristina Lee, an avid painter of abstract expressionist canvases inspired by Mark Rothko’s color fields and the fluidity of the Chesapeake Bay, curates intimate gallery shows featuring emerging
    regional artists, volunteers at the Seaside Art Gallery, reads speculative fiction by N.K. Jemisin and philosophical treatises by Simone de Beauvoir, finds solace in the poetic cadences of Sylvia Plath’s
    work, and they regularly compose reflective poetry that accompanies their visual art.
  travel: Cristina Lee, who plans each trip with a detailed itinerary yet leaves room for spontaneous bird‑watching detours, has explored the historic streets of Charleston, the misty cliffs of the Lake
    District, the vibrant night markets of Kyoto, and dreams of a slow‑travel retreat to the Lofoten Islands where they can sketch sunrise over fjords, and they favor boutique B&Bs that showcase local artisans.
  culinary: Cristina Lee, a competent home cook who loves farm‑to‑table flavors, often prepares roasted beet and goat‑cheese salad, homemade sourdough with heirloom wheat, Chesapeake Bay crab cakes spiced
    with Old Bay, experiments with kimchi fermentation, savors fresh basil, smoked paprika, and locally foraged mushrooms, and they occasionally indulge in an extra slice of lemon‑poppy seed cake after
    late‑night poetry sessions.
  core: Cristina Lee is a methodical dreamer who balances disciplined project management with a relentless curiosity for abstract art, garden‑grown herbs, and community‑focused cultural innovation, and
    they occasionally procrastinate on paperwork by diving into speculative novels.
background:
  cultural: Cristina was raised in a middle-class family in the Tidewater region of Virginia, absorbing the region’s blend of Southern hospitality, historic preservation, and a growing appreciation for
    the arts. Her white ethnic heritage places her within the broader American cultural context, but she actively embraces multicultural influences through literature, travel, and engagement with diverse
    artistic communities. Living in Courtland, she balances a deep respect for local traditions—such as community festivals and farm-to-table cuisine—with a curiosity for global artistic movements, which
    informs both her personal tastes and professional pursuits.
