persona_description: A microbiology professor at the University of Hong Kong who specializes in the study of influenza viruses, particularly the H1N1 swine flu virus. He has conducted research on the genetic
  exchange between the H1N1 virus and other pig viruses, including the H5N1 and H9N2 bird flu viruses. He is concerned about the potential for the H1N1 virus to reassort and mix with other human or animal
  viruses, and is advocating for tighter disease surveillance in pigs to prevent the emergence of new, potentially more dangerous strains.
