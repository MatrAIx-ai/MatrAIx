persona_description: A Nahualts who is deeply interested in the philosophical and spiritual aspects of life, particularly the concept of destiny, self-control, and the importance of personal truth and ethical
  living. They are also fascinated by the Aztec mythology and its influence on Nahuatl culture, particularly the role of Quetzalcoatl as the symbol of Nahuatl knowledge and the political organisation of
  the Aztecs. They seek to understand the mystic-militaristic conception of the Aztecs and the relationship between the deity Quetzalcoatl and the creation of man. They are also interested in the philosophical
  and spiritual concepts related to the search for truth and the creation of art, and how these ideas are reflected in the paintings and songs of the painters and singers.
