personas:
  professional: Quentin Phifer is a seasoned structural steel erector with over twenty years of expertise in MIG/TIG welding, blueprint interpretation, and OSHA safety compliance, who channels his curiosity
    for unconventional joining methods and his cooperative, mentorship‑driven nature into fostering a harmonious crew while quietly dreaming of turning steel into public art.
  sports: Quentin Phifer enjoys pick‑up basketball games with the local Hawks fan league and weekend fishing outings with the Savannah Anglers Club, cheering on the Atlanta Hawks during the season while
    favoring informal, community‑driven fitness over regimented gym routines.
  arts: Quentin Phifer sketches modern steel sculptures inspired by the bold lines of Richard Hunt while laying down steady rhythms to B.B. King and John Coltrane in a community blues band, a blend of visual
    and musical expression that fuels his creative curiosity.
  travel: Quentin Phifer prefers spontaneous road trips that combine music festivals in New Orleans, steel‑art tours in Chicago’s Museum of Contemporary Art, and relaxed evenings in Savannah’s historic
    squares, planning more by gut feeling than itinerary and keeping travel costs modest through Airbnb stays with fellow musicians.
  culinary: Quentin Phifer delights in cooking Southern soul food such as fried chicken with a smoked‑paprika rub, collard greens simmered with ham hocks, and shrimp and grits, experimenting with sorghum‑based
    glazes and homemade hot sauce while occasionally treating friends to a full spread during community potlucks.
  core: Quentin Phifer is a steel‑savvy, jazz‑drumming mentor who balances a love for spontaneous creativity with chronic anxiety, a tendency to misplace tools, and a habit of turning every project into
    a community celebration.
background:
  cultural: Quentin grew up in a close‑knit African‑American community in suburban Georgia, where the church, family gatherings, and neighborhood barbecues were central to daily life. His upbringing was
    shaped by the traditions of the Southern Black experience—gospel music, storytelling, and a strong sense of communal resilience rooted in the civil‑rights era. He carries forward these values through
    his involvement in local mentorship programs, his love for blues and jazz, and his respect for the craftsmanship of past generations of Black metalworkers and artisans. This cultural foundation informs
    his appreciation for both functional and artistic expressions of steel, and fuels his desire to give back to the community that supported him.
attributes:
  skills: '[''Welding (MIG/TIG)'', ''Blueprint interpretation'', ''Rigging and crane operation'', ''OSHA safety compliance'', ''Team leadership and mentorship'', ''Problem solving and improvisation'', ''Aesthetic
    design awareness'', ''Heavy equipment operation'']'
  hobbies: '[''Visiting art galleries'', ''Sketching and designing metal sculptures'', ''Playing drums in a blues band'', ''Pick‑up basketball'', ''Group fishing trips'', ''Volunteer teaching metalworking
    to youth'', ''Cooking Southern cuisine'', ''Attending African‑American cultural festivals'']'
  career_goals: Quentin aims to advance to a foreman or crew‑lead position within the next few years, using his expertise to mentor the next generation of steelworkers while championing safety and innovative
    design. He is pursuing a Certified Welding Inspector (CWI) credential to deepen his technical authority, and he dreams of launching a small side business that creates artistic steel sculptures for public
    spaces in his community. Over the longer term, he hopes to transition into project management, leveraging his curiosity for new ideas to bring more sustainable building practices to his local construction
    sector.
