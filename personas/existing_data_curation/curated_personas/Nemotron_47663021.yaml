personas:
  professional: Patricia Alexanian, a 48‑year‑old community arts facilitator and aspiring museum curator, blends meticulous event planning, budget oversight, and savvy digital promotion with a curious eye
    for emerging talent, turning trivia‑night competitiveness into engaging pop‑up exhibition concepts that celebrate multicultural perspectives.
  sports: Patricia Alexanian enjoys weekend hikes along the coastal trails of Monmouth County with the Monmouth Trails Club, rallies behind the New York Giants and the New York Knicks, and fits brisk walks
    after board‑game gatherings into her primary fitness routine.
  arts: Patricia Alexanian spends Saturdays at the Montclair Art Museum sketching Monet’s water lilies and Frida Kahlo’s self‑portraits, curates community gallery shows spotlighting emerging regional painters,
    and lends her set‑design talent to local theater productions where she also manages promotional outreach.
  travel: Patricia Alexanian favors meticulously planned cultural pilgrimages to historic sites such as Boston’s Freedom Trail, Gettysburg, and the ancient ruins of Athens while also slipping in spontaneous
    weekend escapes to the Hudson Valley vineyards and the rugged cliffs of coastal Maine.
  culinary: Patricia Alexanian, an avid home chef, blends world cuisine‑inspired lamb kofta, bright herb pesto pasta, and spice‑laden roasted cauliflower using fresh basil, rosemary, and mint from her own
    herb garden, and regularly hosts themed dinner parties where guests sample these experimental dishes.
  core: Patricia Alexanian channels a restless curiosity and competitive spirit into community arts, balancing meticulous planning with spontaneous creativity while occasional procrastination on paperwork
    adds a quirky, human touch.
background:
  cultural: Patricia identifies as an Armenian‑American raised in the suburban setting of Monmouth County, New Jersey. Her family maintains traditional Armenian customs, celebrating holidays such as Vardavar
    and serving dishes like dolma and baklava, while also embracing broader American cultural practices typical of the Mid‑Atlantic region. She grew up attending the Armenian Apostolic Church, speaking
    occasional Armenian phrases at home, and participating in community gatherings that emphasize music, dance, and storytelling. This bicultural upbringing informs her appreciation for diverse artistic
    expressions and fuels her desire to bridge her heritage with contemporary American art scenes.
attributes:
  skills: '[''Event planning'', ''Community outreach'', ''Art appreciation and curation'', ''Public speaking'', ''Digital media management'', ''Budget management'', ''Critical analysis'', ''Competitive
