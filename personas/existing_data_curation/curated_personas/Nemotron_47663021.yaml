  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylic and watercolor)'', ''Photography'', ''Gardening (herbs and vegetables)'', ''Cooking ethnic cuisine (especially Armenian dishes)'',
    ''Reading (historical fiction and popular science)'', ''Hiking local trails'', ''Participating in trivia and board‑game nights'', ''Volunteer work with community theater'', ''Traveling to cultural festivals
    and historic sites'']'
  career_goals: Patricia aspires to transform her passion for the arts into a more public role by obtaining a certificate in museum studies and eventually becoming a volunteer curator for a regional gallery
    or community center. She hopes to launch a quarterly pop‑up art exhibition series that showcases emerging local artists and celebrates multicultural perspectives, particularly highlighting Armenian‑American
    creators. Additionally, she aims to mentor youth through art workshops and to author a blog that blends art critique with cultural commentary. In the broader civic sphere, Patricia seeks a position
    on the town’s cultural affairs board, where she can influence policy and funding for arts initiatives while continuing to strengthen her network of like‑minded community leaders.
