    communication'', ''Problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater performances'', ''Painting and sketching'', ''Photography (street and nature)'', ''Exploring new cuisines and cooking'',
    ''Group fitness classes (Zumba, dance)'', ''Volunteering at community centers'', ''Participating in local book clubs'', ''Hiking in nearby parks'', ''Attending tech meetups and workshops'', ''Traveling
    with her spouse'']'
  career_goals: Courtney aims to transition from her current executive administrative role into a senior operations or office management position within the next three to five years, eventually stepping
    into a Chief of Staff or Director of Administration role. She plans to leverage her STEM background to lead digital transformation initiatives, improve workflow efficiencies, and integrate data-driven
    decision-making into executive support. To support these ambitions, she intends to pursue a project management certification (PMP) and an MBA focused on organizational leadership. Additionally, she
    hopes to champion workplace diversity, mentorship programs for young Black professionals, and to contribute to the cultural enrichment of her organization by integrating arts and community outreach.
