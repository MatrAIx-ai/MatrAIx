persona_description: A U.S. Navy scientist who specializes in the development of new materials for underwater equipment, particularly those that can be biodegradable. He or she is currently working on a
  new 3D printing material made of a marine-biodegradable base polymer and a gelling agent, which can be used to make underwater equipment safer to dispose of. The scientist is looking for a patent for
  this material and is offering free licensing services to businesses interested in commercializing the technology. The scientist is also interested in the potential applications of this new biodegradable
  material beyond UUVs and is seeking a patent to license before commercialization can occur.
