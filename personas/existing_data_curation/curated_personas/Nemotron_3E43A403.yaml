  hobbies: '[''Stacking rings'', ''Banging wooden toys'', ''Water play'', ''Storytime with tribal tales'', ''Outdoor nature walks'', ''Finger painting with non‑toxic paints'']'
  career_goals: At one year old, Elrich does not yet have concrete career goals. His caregivers encourage his inquisitive and hands‑on learning style, hoping his early practical problem‑solving and love
    of the natural world will later guide him toward roles such as environmental stewardship, cultural preservation within his tribe, or skilled trades that blend tradition with modern techniques.
