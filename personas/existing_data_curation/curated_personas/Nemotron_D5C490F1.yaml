personas:
  professional: An inquisitive 5-year-old named Gabriel Deguzman loves building LEGO structures, organizing their toy collection, and tackling simple science kits, balancing curiosity with a practical,
    methodical approach that hints at a future problem‑solver, and they eagerly share each discovery with family.
  sports: Gabriel Deguzman plays in the local Little League tee‑ball team, cheers for the New York Yankees on game nights, and joins family pickup soccer games at the park, preferring structured practice
    over free‑form play, and they often challenge teammates to score the most runs.
  arts: Gabriel Deguzman enthusiastically dances to the rhythm of songs by Selena and Lin‑Manuel Miranda, imitates traditional folk dances at family gatherings, and loves storytelling sessions with picture
    books featuring vibrant illustrations, and they love to mimic the characters’ voices.
  travel: Gabriel Deguzman has visited the grandparents’ ranch in Texas for Día de los Muertos celebrations, splashed in the waves at Atlantic City’s boardwalk, and dreams of a Disney World adventure, balancing
    curiosity about new places with the comfort of familiar family routines, and they often carry a small map to track where they’ve been.
  culinary: Gabriel Deguzman adores the taste of cheesy quesadillas and sweet tamales during holiday feasts, helps stir guacamole with a wooden spoon, and is picky about vegetables, often demanding carrot
    sticks be dipped in ranch dressing, and they proudly claim the best dip recipe.
  core: Gabriel Deguzman is a curious, organized five‑year‑old who blends competitive saving habits with a love for LEGO, sports, music, and family traditions, all while occasionally forgetting to bundle
    up on chilly days, and they always ask “why?” before trying something new.
background:
  cultural: Gabriel is raised in a bicultural Mexican-American household in Mays Landing, New Jersey. At home he speaks both Spanish and English, celebrates Mexican holidays such as Día de los Muertos and
    Navidad, and enjoys traditional foods like tamales and quesadillas. His family emphasizes close-knit relationships, respect for elders, and community involvement, while his school environment introduces
    him to broader American customs and values. This blend of cultures shapes his worldview, language skills, and interests in music, dance, and storytelling.
