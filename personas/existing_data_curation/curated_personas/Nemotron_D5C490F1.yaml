  career_goals: Even at five, Gabriel imagines a future where he can design, build, and help others. He dreams of becoming an engineer or inventor who creates useful gadgets, a firefighter who protects
    his community, or a teacher who shares knowledge with younger children. He is motivated to learn how things work, fix broken toys, and one day contribute to his family and neighborhood by turning his
    curiosity into practical solutions.
