persona_description: A language planner who is interested in creating new words, expressions, and standards for a language, as well as avoiding foreign influences to maintain linguistic purity. They are
  passionate about making languages more attractive to learn, particularly for speakers of other languages, and are involved in creating writing systems for languages that were only spoken before. They
  are likely to have a deep understanding of linguistic theories and are skilled in corpus planning, status planning, and acquisition planning.
