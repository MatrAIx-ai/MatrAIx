  hobbies: '[''Desert gardening (cacti and succulents)'', ''Reading historical fiction and poetry'', ''Watercolor painting'', ''Quilting'', ''Hiking in the Sonoran Desert'', ''Cooking Southwestern cuisine'',
    ''Attending community theater'', ''Volunteering at senior center'', ''Genealogy research'', ''Book club participation'', ''Piano lessons (beginner)'']'
  career_goals: Approaching retirement, Lillian aims to transition into a part‑time advisory role where she can shape district‑wide preschool policies and mentor emerging educators. She is working on a
    manuscript that captures her blended teaching philosophy, hoping to publish a guide for integrating humanities into early learning. Locally, she aspires to launch a community‑driven literacy program
    for under‑served families in Phoenix and to serve on the city’s early education advisory board, leveraging her competitive drive to advocate for higher preschool funding and quality standards.
