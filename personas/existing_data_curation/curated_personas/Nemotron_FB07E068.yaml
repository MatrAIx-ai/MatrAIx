personas:
  professional: Michael Allison, a retired educator turned community policy advocate, leverages his meticulous curriculum design skills, data-driven assessment expertise, and love for public speaking to
    push for higher standards on the New Berlin School Board while maintaining a critical, skeptical eye on every proposal.
  sports: Michael Allison remains a devoted Green Bay Packers fan, traveling to Lambeau Field for most home games and hosting spirited game-night gatherings, while also participating in a senior walking
    club that meets twice weekly at the New Berlin parks and playing bridge competitively during the off-season.
  arts: Michael Allison enjoys attending the New Berlin Community Theater's productions of classic plays by Arthur Miller and contemporary works by Lin-Manuel Miranda, listens to the symphonies of Leonard
    Bernstein and the jazz of Miles Davis, and collects prints of Monet's water lilies, which he displays alongside his genealogical research notes.
  travel: Michael Allison prefers structured, guided tours that combine heritage sites with leisurely garden walks, having recently explored the historic towns of the Black Forest and the fjords of Norway
    on a ten-day itinerary, and he frequently retreats to Door County, Wisconsin, for weekend getaways that blend sailing, local museums, and fresh seafood.
  culinary: Michael Allison takes pride in his vegetable garden, regularly cooking farm-to-table dishes such as roasted beet and goat cheese salad, herb-infused grilled chicken, and homemade apple crumble,
    while also indulging in Midwestern comfort foods like cheese curds and beef stew, and he considers himself an intermediate wood-fire oven enthusiast.
  core: Michael Allison is a disciplined, sociable retiree who channels his competitive edge into community leadership, garden stewardship, and a lifelong devotion to the Packers, all while keeping a tight-knit
    budget and a meticulous schedule.
background:
  cultural: Michael grew up in a middle‑class, white family in suburban Milwaukee, rooted in German‑ and Scandinavian‑American heritage. Raised in a Lutheran household, he internalized Midwestern values
    of hard work, self‑reliance, and community service. He earned his graduate degree in education at the University of Wisconsin–Madison, reinforcing a pragmatic, evidence‑based approach to teaching. His
    lifelong residence in Waukesha County keeps him closely tied to regional traditions such as county fairs, church potlucks, and civic engagement, while his outgoing personality drives active participation
    in the area's social and civic life.
