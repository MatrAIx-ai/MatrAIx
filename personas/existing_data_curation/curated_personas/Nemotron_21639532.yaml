personas:
  professional: Lori Phelps, a retired library assistant turned community mentor, blends meticulous research skills, a love of gardening, and a strategic bridge mindset to craft a memoir, document local
    history through digital photography, and champion senior mental‑health resources in Richland County.
  sports: Lori Phelps regularly walks the scenic Richland County trails, follows the Cleveland Guardians baseball season, and belongs to the Mansfield Senior Bridge Club, which she treats as a social‑fitness
    outlet.
  arts: Lori Phelps delights in classic Hollywood films like "Casablanca" and "Gone With the Wind," reads historical fiction by Ken Follett and Philippa Gregory, and finds inspiration in the folk melodies
    of John Denver and the watercolor works of Mary Cassatt.
  travel: Lori Phelps favors low‑key road trips, having toured Ohio’s Amish Country, the historic streets of Savannah, Georgia, and the colonial towns of New England, while dreaming of a leisurely train
    journey through the English countryside to explore medieval gardens.
  culinary: Lori Phelps enjoys cooking garden‑fresh meals such as rosemary‑infused roasted root vegetables, chicken pot pie with flaky crust, and apple crumble made with locally sourced apples, often pairing
    her knitting sessions with a soothing cup of chamomile tea.
  core: Lori Phelps is a curious yet pragmatic garden‑enthusiast and memoirist who balances meticulous research with a competitive bridge streak, an anxious temperament, and a devotion to quiet, small‑scale
    community life, and they thrive on turning everyday observations into stories.
background:
  cultural: Lori grew up in the Midwestern small-town culture of Mansfield, Ohio, a community shaped by agricultural roots, Protestant work ethic, and close-knit neighborhood ties. Her white, native-American
    heritage reflects the region’s traditional values of self-reliance, modesty, and a respect for both longstanding customs and practical innovation.
