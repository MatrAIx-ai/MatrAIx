  hobbies: '[''gardening'', ''reading historical fiction'', ''knitting'', ''birdwatching'', ''crossword puzzles'', ''small book club meetings'', ''bridge'', ''nature walks'', ''classic movies'', ''journaling'']'
  career_goals: Though retired, Lori’s ambition centers on staying mentally sharp, socially connected, and independent. She plans to complete a digital photography workshop to document her garden and Mansfield’s
    historic sites, write and self-publish a memoir of her life, and volunteer as a mentor for younger seniors at the community center, sharing her research and storytelling skills. She also hopes to advocate
    for senior mental-health resources in Richland County, using her own experiences with anxiety to help others.
