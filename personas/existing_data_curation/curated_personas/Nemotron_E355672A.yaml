  career_goals: Lois dreams of turning her love for art and storytelling into a career as a visual artist or concept designer for video games and animated films. She hopes to attend a specialized high school
    with a strong arts program, then study graphic design or illustration at college. She also imagines creating workshops where she can teach other kids to express themselves through drawing and simple
    coding, hoping to help peers cope with anxiety. Ultimately, she wants a flexible career that lets her explore new ideas, travel for inspiration, and combine art with emerging technology.
