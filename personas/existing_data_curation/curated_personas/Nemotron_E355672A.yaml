personas:
  professional: A budding visual storyteller, Lois Sullivan blends sketching, watercolors, and digital world‑building in Minecraft and Scratch to craft imaginative characters, showing boundless curiosity
    but often juggling projects in a delightfully disorganized, flexible style.
  sports: An enthusiastic weekend athlete, Lois Sullivan darts between after‑school soccer practice with the local youth league, cheering for the Cleveland Browns on game days, and occasional skateboarding
    at the city park, while keeping a casual fitness routine of bike rides and impromptu tag games with friends.
  arts: A passionate young creator, Lois Sullivan devotes free afternoons to sketching at the Cleveland Museum of Art, drawing inspiration from Frida Kahlo, Vincent van Gogh, and the street art of Banksy,
    while their playlist features indie musicians like Mitski, Phoebe Bridgers, and The Strokes, shaping a vibrant artistic identity.
  travel: An inquisitive explorer, Lois Sullivan dreams of backpacking through the historic streets of Boston and the art‑filled canals of Venice, but currently enjoys day‑trips to the nearby Cuyahoga Valley
    National Park and seasonal visits to the Ohio State Fair, preferring spontaneous plans over rigid itineraries.
  culinary: A budding home chef, Lois Sullivan experiments with simple recipes like sheet‑pan mac and cheese, strawberry‑banana smoothies, and beginner sushi rolls, favoring bright ingredients such as bell
    peppers, avocado, and fresh basil while often ordering pizza on weekends as a reward for completing art projects.
  core: Lois Sullivan is a creatively restless 12‑year‑old who fills sketchbooks and Minecraft worlds with vivid stories, worries about every detail but still finds joy in impromptu park adventures and
    occasional pizza indulgences.
background:
  cultural: Lois was raised in a middle‑class white family in Cleveland, Ohio, where Midwestern values of friendliness, community involvement, and hard work are emphasized. Her household celebrates traditional
    holidays such as Thanksgiving and Christmas and enjoys local sports team pride for the Browns, Cavaliers, and Guardians. Family stories trace back to Irish and German ancestry, contributing to occasional
    cultural traditions like St. Patrick's Day meals. Growing up in Cuyahoga County, Lois has easy access to the city's vibrant arts scene, including the Cleveland Museum of Art, Playhouse Square, and community
    festivals that showcase the region's diverse cultural tapestry. These experiences shape her appreciation for both local heritage and broader artistic expression.
