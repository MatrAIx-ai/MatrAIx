personas:
  professional: Patsy Thun, a 54‑year‑old senior secretary in Omaha, leverages their humanities background, meticulous office management skills, and competitive drive to streamline museum workflows, curate
    engaging newsletters, and mentor junior staff while constantly seeking innovative solutions through tools like Canva and Google Workspace.
  sports: Patsy Thun energizes themselves with weekly Zumba classes, competes in the Omaha Westside Softball League each summer, avidly follows the Omaha Storm Chasers baseball team and the Nebraska Cornhuskers
    football program, and hikes the nearby Loess Hills during fall weekends, where they relish the fresh air.
  arts: Patsy Thun immerses themselves in the arts by painting watercolors of Omaha street murals, photographing local festivals, attending Omaha Community Playhouse productions of Tennessee Williams, devouring
    novels by Toni Morrison and Haruki Murakami, and curating community art events inspired by the works of Georgia O'Keeffe and Ansel Adams, which they share with their book club.
  travel: Patsy Thun prefers meticulously planned trips to historic European cities like Florence, Prague, and Seville, where they relish art‑focused walking tours and local cuisine, yet they also indulge
    in spontaneous weekend getaways to nearby Kansas City for music festivals, balancing a modest travel budget with a penchant for cultural immersion.
  culinary: Patsy Thun, an enthusiastic home cook, delights in mastering dishes such as coq au vin, roasted beet salad with goat cheese, and sourdough bread, often incorporating fresh basil, heirloom tomatoes,
    and locally sourced honey, while occasionally over‑seasoning their risotto in a competitive quest for the perfect flavor.
  core: Patsy Thun blends Midwestern practicality with boundless cultural curiosity, as they juggle competitive ambition and community spirit while balancing watercolor brushes, spreadsheets, and spontaneous
    art road trips.
background:
  cultural: Patsy grew up in a middle‑class white family in the Midwest, absorbing the values of community, modesty, and hard work characteristic of Nebraska. Her bachelor's degree in Humanities from a
    state university fostered a love for literature, art history, and cultural studies. Living in Omaha, she has been shaped by the city's blend of Midwestern practicality and a vibrant, growing arts scene,
    including exposure to local Native American heritage and a strong emphasis on volunteerism. Her cultural identity is rooted in Midwestern sensibility, a deep sense of civic responsibility, and an appreciation
    for diverse artistic expression.
