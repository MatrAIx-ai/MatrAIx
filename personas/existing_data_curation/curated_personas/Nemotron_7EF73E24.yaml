  career_goals: Patsy aims to advance from senior secretary to office manager or administrative director within a cultural organization—such as a museum, gallery, or community arts nonprofit—in Omaha. She
    wants to lead workflow improvements, mentor junior staff, and spearhead community art initiatives that boost public engagement. Long‑term, she envisions transitioning to a part‑time consulting role
    advising nonprofit boards on administrative best practices while establishing a small grant program to support emerging local artists.
