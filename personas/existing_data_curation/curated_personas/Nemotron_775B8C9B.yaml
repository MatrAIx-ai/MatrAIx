  career_goals: Although retired from full‑time employment, Sidney is intent on channeling her expertise into lasting community impact. She aims to launch a STEM mentorship program for middle‑school students
    in Montgomery County, pairing senior volunteers with youth to foster curiosity and practical skills. She also aspires to serve on the board of a local nonprofit that provides affordable housing, applying
    her project‑management background to oversee renovation initiatives. Sidney plans to complete a short certificate in data science to stay current with emerging tools, and she hopes to author a series
    of articles documenting the contributions of African‑American engineers in Maryland's history. Ultimately, her ambition is to leave a legacy of empowerment for the next generation of Black women in
    STEM.
