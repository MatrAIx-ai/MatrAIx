persona_description: A forensic scientist who specializes in the analysis and interpretation of fingerprints, particularly those of primates, and is proficient in the use of the Henry Classification System
  and Automated Fingerprint Identification System (AFIS). She has a keen interest in the unique fingerprint patterns of primates, such as gorillas and chimpanzees, and is skilled in distinguishing between
  the various types of fingerprints based on their specific ridge characteristics and patterns. She is also knowledgeable about the process of fingerprint formation and development during fetal and adult
  life stages, and the limits within which ridge patterns can be classified.
