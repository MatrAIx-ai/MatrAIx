  career_goals: Yi aspires to progress to a senior managerial role within the next five years, ultimately aiming for partnership in an accounting firm where he can lead audit and advisory teams. He plans
    to deepen his expertise in digital transformation and AI‑driven analytics to enhance audit efficiency, while also cultivating a niche practice that offers financial stewardship to arts and cultural
    organizations—a blend of his professional skill set and his passion for art. Balancing ambition with personal well‑being, Yi seeks flexible work arrangements that support his family life and allow continuous
    learning and experimentation with unconventional solutions.
