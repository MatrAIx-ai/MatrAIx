personas:
  professional: Yi Wei is a senior accountant and audit specialist who leverages advanced Excel, Power Query, and AI-driven analytics to automate midsized-firm audits, while their curious, art-inspired
    mindset drives them to craft unconventional data visualizations and maintain flexible workflow habits, even if occasional disorganization creeps into deadline management.
  sports: Yi Wei enjoys weekend hikes with the local Watchung Trail Club, follows the New York Giants and New York Knicks, they occasionally join a casual basketball pick-up league at the community center,
    and they volunteer as a youth soccer referee during the fall season.
  arts: Yi Wei nurtures an artistic side by sketching in the Met Museum and MoMA, drawing inspiration from contemporary creators such as Ai Weiwei and Kehinde Wiley, they volunteer as a set designer for
    a community theater group staging both Shakespeare and modern musical revues, often integrating minimalist aesthetics into stagecraft.
  travel: Yi Wei prefers loosely planned weekend getaways that blend cultural immersion with nature, having explored Kyoto’s historic temples, Hong Kong’s night markets, and the Adirondack trails, they
    dream of sipping espresso in Rome’s Trastevere and kayaking among Iceland’s glaciers on a future adventure.
  culinary: Yi Wei delights in experimental cooking that fuses classic Chinese recipes—braised pork belly finished with a New Jersey apple-cider glaze and mapo tofu enlivened by heirloom tomatoes—with locally
    sourced kale, sweet corn, and fresh oysters, they routinely prepare mooncakes and scallion pancakes for Lunar New Year celebrations.
  core: Yi Wei is a curious, art-infused accountant who balances disciplined financial habits with a laid-back approach to deadlines, enjoys hiking and set design, and occasionally lets disorganization
    slip into their schedule.
background:
  cultural: Yi’s family originates from Taiwan, and he grew up in a bilingual household where Mandarin and English were spoken interchangeably. The cultural values of respect for elders, collective well‑being,
    and a strong emphasis on education have shaped his worldview and interpersonal style. He celebrates traditional holidays such as Lunar New Year and the Mid‑Autumn Festival, often preparing family meals
    that blend Taiwanese culinary traditions with locally sourced New Jersey produce. Yi remains actively involved in his local Asian cultural association, participates in interfaith community events, and
    integrates his East Asian heritage with his American upbringing to foster a harmonious and inclusive personal identity.
