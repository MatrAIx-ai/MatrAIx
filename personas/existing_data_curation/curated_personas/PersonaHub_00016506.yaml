persona_description: A psychologist who studies the cognitive abilities and behaviors of primates, particularly chimpanzees, and has conducted research on the strategic two player video game played between
  chimps and humans. The psychologist is interested in understanding the mechanisms behind the chimp's superior performance in the game and how this relates to their cognitive abilities and evolutionary
  history. The psychologist is likely to be curious about the complex interplay between intelligence, memory, and strategy in the chimp's behavior and is likely to be interested in the implications of their
  findings for our understanding of human intelligence and the evolution of intelligence.
