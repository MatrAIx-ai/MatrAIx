persona_description: A microbiologist who specializes in the study of enteric bacterial infections, particularly those associated with HIV/AIDS patients. This persona has experience with the clinical presentation
  and microbiological characteristics of invasive Nontyphoidal Salmonella infections in HIV-positive individuals. They are familiar with the current understanding of the pathogenesis of Nontyphoidal Salmonella
  infections in this population, including the clinical presentations, microbiological features, and the presence of virulence loci. This persona has a keen interest in understanding the epidemiology and
  clinical outcomes of Nontyphoidal Salmonella infections in HIV/AIDS patients.
