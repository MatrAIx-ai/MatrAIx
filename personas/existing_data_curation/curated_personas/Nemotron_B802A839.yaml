personas:
  professional: A seasoned security and surveillance specialist, Kyla Waddell leverages decades of observational acuity from casino floor monitoring and a calm, empathetic communication style to mentor
    junior officers while championing flexible, community-focused safety initiatives, and they hope to secure a senior supervisory role that lets them design training programs for newcomers.
  sports: Kyla Waddell enjoys low-impact fitness through weekly nature walks with the Riverside Walking Club, occasionally joins senior-friendly hikes organized by the community centre, and they remain
    a faithful fan of the Toronto Maple Leafs and Toronto Raptors, cheering from the comfort of their living room.
  arts: Kyla Waddell's artistic life blends a love for historic mystery novels by Ellis Peters, folk-tune sessions at the annual Champlain Valley Festival featuring The Wailin' Jennys, and a passion for
    capturing seasonal landscapes of the St. Lawrence River through analog photography, while they knit scarves inspired by sunset hues.
  travel: Kyla Waddell prefers flexible, low-stress travel, often taking short road trips to the Adirondack Mountains and weekend retreats in Quebec's Charlevoix region, while dreaming of a guided cultural
    tour of Edinburgh's historic streets and a bird-watching expedition in the Everglades.
  culinary: Kyla Waddell's kitchen is a modest arena where they bake family-passed apple-cinnamon crumble and rye-bread, experiment with fresh rosemary, thyme, and sage harvested from their garden, and
    delight in pairing each dish with locally brewed craft ale or a crisp Riesling.
  core: Kyla Waddell blends sharp surveillance instincts with a laid-back love of gardening and folk music, often forgetting appointments but never missing a bird-watching sunrise, and they cherish quiet
    evenings by the fire.
background:
  cultural: Kyla is a lifelong resident of upstate New York, raised near the St. Lawrence River in a small, working‑class town. Her family has Anglo‑American roots, with grandparents who immigrated from
    England and Ireland in the early twentieth century. Growing up in a close‑knit community that valued self‑reliance, modesty, and neighborly support shaped her pragmatic outlook. Local agricultural and
    seasonal community traditions fostered an appreciation for simple, hands‑on activities and a strong sense of duty to help others. While she identifies with broader white American cultural norms of the
    Northeast, her daily life reflects the modest, community‑oriented values of St. Lawrence County.
attributes:
  skills: '["CCTV operation and monitoring", "Conflict de‑escalation", "First Aid and CPR", "Loss prevention and theft detection", "Knowledge of gambling regulations", "Incident report writing", "Basic
    electronics troubleshooting", "Team collaboration and mentorship", "Situational awareness", "Customer service"]'
  hobbies: '["Gardening", "Birdwatching", "Nature walks and hiking", "Historical mystery novels", "Knitting", "Bridge (card game)", "Volunteering at community food bank", "Photography", "Cooking and baking",
    "Attending local folk festivals"]'
  career_goals: At 60, Kyla aims to move into a senior supervisory role where she can lead a small surveillance team and develop training programs for new security officers. She hopes to earn an advanced
    certification in security management to broaden her expertise. While maintaining a stable income, she seeks flexible scheduling that allows more time for her personal interests. Kyla also envisions
    offering part‑time consulting to local businesses on safety audits and contributing to community safety initiatives through volunteer work with the local police department.
