personas:
  professional: Michael Arcia, a retired handyman turned community mentor, blends bilingual communication, meticulous budgeting, and hands‑on expertise to orchestrate cultural workshops and senior‑youth
    mentorship programs, while they occasionally let anxiety fuel a perfectionist approach to project planning.
  sports: Michael Arcia enjoys the rhythm of weekly walks through Minnehaha Park with the Minnehaha Senior Strollers, cheers on the Minnesota Twins during spring training, and they occasionally participate
    in low‑impact tai‑chi sessions offered at the local senior center.
  arts: Michael Arcia sings in a community choir that revives folk tunes from his upbringing, delights in the works of legendary balladeer Victor Hernández, and they often attend performances at the Guthrie
    Theater to stay inspired.
  travel: Michael Arcia prefers weekend getaways to the historic river towns along the Mississippi, dreams of exploring the centuries‑old market streets of the border city his grandparents once described,
    and they rely on senior travel discounts to keep adventures affordable.
  culinary: Michael Arcia expertly prepares traditional tamales, hearty pozole, and richly layered mole, seasoning each dish with home‑grown cilantro, Oaxacan chilies, and roasted pumpkin seeds, and they
    love sharing these meals during neighborhood potlucks and family gatherings.
  core: Michael Arcia weaves seasoned craftsmanship with cultural storytelling, channeling anxiety into vibrant community mentorship while savoring the heat of home‑cooked chilies.
background:
  cultural: Michael is the son of Mexican immigrants who settled in the Twin Cities during the 1960s. He grew up in a bilingual household where Spanish was spoken at home and English at school, fostering
    a deep appreciation for both cultures. His upbringing was steeped in Mexican traditions—such as Día de los Muertos, quinceañeras, and weekly family meals centered around home‑cooked cuisine—while also
    adopting Midwestern values of community involvement and self‑reliance. Over the decades he has blended these influences, maintaining Catholic faith practices and strong family loyalty, while actively
    engaging in Minneapolis' diverse cultural scene. His Mexican heritage informs his culinary passions, storytelling, and desire to preserve cultural knowledge for his grandchildren.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Home repair and maintenance'', ''Basic plumbing and electrical troubleshooting'', ''Carpentry and woodworking'', ''Budgeting and financial planning'',
