  career_goals: He aims to advance to a lead quality assurance or shift‑supervisor role where he can mentor new inspectors, oversee safety protocols, and implement incremental process enhancements. He plans
    to earn a high‑school equivalency diploma and pursue certifications such as Certified Quality Technician (CQT) or an OSHA safety specialist credential. In the longer term, he hopes to combine his expertise
    with his compassionate drive by helping small local manufacturers improve product safety and quality, ultimately securing a stable future for his family.
