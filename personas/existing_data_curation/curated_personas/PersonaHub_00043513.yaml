persona_description: Dunja Mijatović, the Commissioner for Human Rights of the Council of Europe, is a human rights advocate who is concerned about the rights and needs of people with disabilities during
  the pandemic. She is a member of the Council of Europe and has ratified the UN Convention on the Rights of Persons with Disabilities. She is aware of the challenges faced by people with disabilities during
  the pandemic, including issues related to social distancing and self-isolation, and is calling for member states to take action to resolve these issues. Mijatović is also aware of the lack of access to
  essential services for people with disabilities, and is calling for the Council of Europe member states to provide financial aid and relax recruitment procedures to address these issues.
