personas:
  professional: A seasoned healthcare administrator with over two decades of experience, Tina Sanders blends meticulous operational oversight with a flair for integrating art into patient environments,
    using their empathetic communication and curiosity to drive quality improvement and staff wellness initiatives while navigating a relaxed, occasionally disorganized approach to planning.
  sports: An avid outdoors enthusiast, Tina Sanders spends weekends hiking the Colorado high plains and belongs to the Sterling Trailblazers walking club, while cheering on the Denver Broncos in football
    season, the Colorado Rockies in summer, and the Colorado Avalanche during hockey season, occasionally attending community yoga classes for flexibility.
  arts: A dedicated watercolorist and gallery‑goer, Tina Sanders draws inspiration from the tranquil landscapes of Ansel Adams and the bold colors of Georgia O'Keeffe, regularly attends community theater
    productions featuring local talent, and enjoys listening to folk music by John Denver and contemporary indie artist Sufjan Stevens.
  travel: A thoughtful traveler, Tina Sanders prefers self‑planned road trips across the American West, having explored the Badlands, Yellowstone, and Santa Fe, while dreaming of a cultural immersion in
    Kyoto to study Japanese tea ceremonies, balancing travel ambitions with a modest retirement budget.
  culinary: A curious home chef, Tina Sanders experiments with Colorado green chile stew, quinoa and roasted beet salads, and wild mushroom risotto, using fresh herbs from their native‑plant garden and
    occasionally treating themselves to a farm‑to‑table dinner featuring bison ribeye at a local farm restaurant.
  core: Tina Sanders is a compassionate healthcare leader who weaves art and mindfulness into a chaotic yet harmonious life, constantly juggling professional ambition, emotional turbulence, and a love for
    quiet creativity.
background:
  cultural: Tina was raised in a modest farming community in eastern Colorado, where self‑reliance, close‑knit relationships, and a respect for the outdoors formed the core of her upbringing. As a white
    American, she aligns with mainstream Midwestern values while also absorbing the artistic and cultural vibrancy of the Rocky Mountain region—exposed through county fairs, local art festivals, and occasional
    Native American influences. The small‑town atmosphere of Sterling fostered her cooperative mindset, appreciation for community harmony, and love of solitary yet scenic experiences. These cultural roots
    support her current blend of professional dedication, artistic curiosity, and commitment to supportive interpersonal environments.
attributes:
