    outreach coordination'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking on local trails'', ''Gardening (native plants)'', ''Reading (psychological thrillers, philosophy)'', ''Yoga and mindfulness meditation'',
    ''Cooking experimental recipes'', ''Volunteering at animal shelter'', ''Attending small live music performances'', ''Visiting art galleries and community theater'']'
  career_goals: Tina aims to advance to a regional director position overseeing multiple health facilities, where she can champion patient‑centered, art‑integrated care models that enhance both physical
    and mental health. She plans to obtain the Certified Professional in Healthcare Quality (CPHQ) credential within the next two years to deepen her expertise in performance improvement. A core ambition
    is to develop robust staff wellness programs that address anxiety and stress, drawing on her own experiences to create a more resilient and harmonious work environment. In the longer term, she envisions
    transitioning into a consulting role focused on organizational culture, innovative care delivery, and the incorporation of artistic design into health spaces.
