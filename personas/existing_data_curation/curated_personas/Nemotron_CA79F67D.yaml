  hobbies: '[''Morning runs in Lake Nellie Park'', ''Reading finance and self‑development books'', ''Cooking Vietnamese cuisine'', ''Practicing Tai Chi'', ''Building scale model kits'', ''Playing strategy
    video games'']'
  career_goals: Hoang aims to become a top‑producing insurance advisor within his region, targeting $1.5 million in annual premium sales within the next three years. He plans to earn the Chartered Property‑Casualty
    Underwriter (CPCU) designation and secure a senior account manager role, eventually transitioning to open his own boutique agency that serves the Southeast Asian community in Central Florida. He also
    seeks to mentor new agents, leveraging his structured approach to build a high‑performing team.
