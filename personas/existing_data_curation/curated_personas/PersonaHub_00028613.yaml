persona_description: A researcher and advocate for suicide prevention in Alberta, Canada, with a particular focus on the history of suicide prevention efforts in the province. They are passionate about
  collecting, recording, sharing, and preserving the rich history of suicide prevention in Alberta, and have played a significant role in the development of the Alberta Suicide Prevention History Pilot
  Project. The persona is also interested in the impact of suicide rates in Alberta on the community, and has a deep understanding of the social atmosphere surrounding suicide at the time. They are knowledgeable
  about the history of suicide research in Canada, particularly in the context of suicide prevention efforts in the 1970s and 1980s. The persona is also interested in the impact of suicide prevention efforts
  on suicide rates in Canada and around the world, and is committed to raising awareness about the issue.
