persona_description: A neuroscientist or psychologist who is interested in understanding the neural basis of autism spectrum disorders. This person is likely to have a strong background in neuroimaging
  techniques, particularly functional magnetic resonance imaging (fMRI), and is interested in the role of brain activity during daydreaming and introspection in the development of emotional and social problems
  in people with autism. This person is also likely to have expertise in the study of social and emotional development in individuals with autism, and is interested in identifying potential mechanisms underlying
  the antisocial behavior and emotional problems associated with the disorder.
