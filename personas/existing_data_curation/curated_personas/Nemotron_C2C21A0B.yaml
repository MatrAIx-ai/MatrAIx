  career_goals: Joel aims to leverage his methodical approach and competitive drive to move into a leadership role within the tutoring sector. He plans to earn a Master’s degree in Education with a focus
    on instructional design, obtain state teaching certification, and eventually become Director of Academic Support for a university or launch his own boutique tutoring center in the Twin Cities. He is
    also interested in developing an EdTech platform that uses data analytics to personalize humanities learning, securing grant funding for community-based educational programs, and publishing research
    on effective humanities pedagogy.
