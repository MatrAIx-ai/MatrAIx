  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Sketching'', ''Photography'', ''Reading (art history, philosophy, tech trends)'', ''Listening to jazz and classical music'',
    ''Gardening'', ''Quiet nature walks'', ''Spontaneous cultural road trips'']'
  career_goals: Anthony aims to leverage his extensive finance background into a senior executive role—ideally as Chief Financial Officer—where he can champion innovative, arts‑focused financing initiatives
    and integrate ESG principles into corporate strategy. In the medium term, he plans to establish a boutique consulting practice that offers strategic financial guidance to cultural institutions and socially‑impact
    driven startups, allowing him to work independently and maintain the solitary work environment he values. He also aspires to mentor the next generation of finance professionals, helping them adopt creative
    problem‑solving approaches while preparing for a comfortable, self‑sufficient retirement that affords him ample time to explore his artistic interests.
