  career_goals: Logan aims to transition from hands‑on support to a senior technical leadership role that balances managerial responsibilities with the flexibility he values. He is pursuing certifications
    in cloud services (e.g., AWS) and cybersecurity to broaden his expertise and eventually become an IT Service Manager or a consultant specializing in technology solutions for creative professionals.
    By integrating his love for art and new ideas, he envisions building a boutique consultancy that helps artists, designers, and small studios implement user‑friendly digital workflows. He also hopes
    to mentor junior staff, fostering a collaborative, harmonious workplace where empathy and curiosity are core to the team culture.
