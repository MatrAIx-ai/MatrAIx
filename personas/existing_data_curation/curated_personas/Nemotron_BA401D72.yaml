  hobbies: '[''Cooking Puerto Rican cuisine'', ''Gardening (vegetables and native plants)'', ''Quilting and needlework'', ''Reading historical fiction and memoirs'', ''Salsa and bomba dancing'', ''Birdwatching'',
    ''Volunteer work at senior center'', ''Genealogical research'', ''Listening to Latin music'', ''Walking and light hiking'']'
  career_goals: Even in retirement, Nilsa remains goal-oriented. She aspires to expand her volunteer leadership at the local senior center and the Fayetteville Puerto Rican Cultural Association, where she
    plans to mentor new volunteers in event organization and budgeting. She aims to document and teach traditional Puerto Rican recipes, creating a small community cookbook for future generations. Nilsa
    also wants to stay current with technology, learning video-calling platforms and digital photo archiving to keep close ties with her family back on the island. A long-term ambition is to travel to Puerto
    Rico each year for family reunions and cultural festivals, while advocating for more senior-friendly services in her county. Her ambitions balance curiosity about new experiences with the practical
    steps needed to achieve them.
