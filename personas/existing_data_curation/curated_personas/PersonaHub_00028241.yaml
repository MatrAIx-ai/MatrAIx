persona_description: A worker in the stonecutting, rock drilling, quarrying, and tunneling industries who is concerned about the health hazards associated with silica exposure. They are looking for information
  on engineering controls, protective equipment, and work practices to reduce exposure to silica dust, and are interested in training, exposure monitoring, and health screening programs to monitor any adverse
  health effects caused by silica exposures. They may also be interested in learning about the dangers of silicosis and taking steps to prevent it.
