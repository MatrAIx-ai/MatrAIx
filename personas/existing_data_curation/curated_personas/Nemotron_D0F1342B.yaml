personas:
  professional: Jorge Colon is a veteran groundskeeping supervisor whose four decades of hands‑on landscaping expertise—ranging from irrigation design to crew scheduling—combine with a bilingual, cooperative
    style that makes them the go‑to problem‑solver for low‑maintenance, water‑wise projects in Queens' senior housing and community gardens.
  sports: Jorge Colon follows the New York Mets for baseball, cheers on the Brooklyn Nets during basketball season, and they spend weekday mornings fishing at the Rockaway marina and walking the boardwalk
    as a low‑impact fitness routine.
  arts: Jorge Colon grooves to the salsa rhythms of Marc Anthony and the reggaeton beats of Bad Bunny, they often dance at community festivals while also attending occasional performances by the local theater
    troupe's Latin‑heritage plays.
  travel: Jorge Colon prefers short, relaxing getaways and they have explored coastal towns like Montauk, the historic streets of Old San Juan, and the vineyards of Napa Valley, always planning trips that
    balance a modest budget with the desire to sample local seafood and music scenes.
  culinary: Jorge Colon delights in cooking classic dishes such as sancocho and arroz con pollo, they season them with cumin, cilantro, and ripe plantains from their balcony garden, and enjoy pairing meals
    with freshly caught snapper from the marina.
  core: Jorge Colon blends a lifelong love of green spaces, practical curiosity, and a relaxed, community‑focused mindset into a senior life filled with gardening, salsa dancing, and mentorship, they even
    let occasional disorganization and health hiccups add a human touch.
background:
  cultural: Jorge grew up in Panama, where Caribbean and Latin American traditions shaped his early life. He moved to New York in his early thirties, joining a vibrant Panamanian diaspora in Queens. His
    cultural identity blends fluent Spanish, Panamanian holidays such as Independence Day and Carnival, and the rhythmic sounds of calypso, salsa, and reggaeton. He maintains close ties with family back
    home, often sending remittances and sharing stories. In Rockaway Park, he integrates his heritage with the local community, participating in multicultural festivals, supporting Latin American vendors,
    and infusing his landscaping work with a respect for native plants and sustainable practices rooted in his upbringing.
attributes:
  skills: '[''Crew supervision'', ''Landscape design basics'', ''Irrigation system troubleshooting'', ''Equipment maintenance'', ''Safety compliance'', ''Budgeting and resource allocation'', ''Bilingual
