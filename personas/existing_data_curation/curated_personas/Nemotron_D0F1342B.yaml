  hobbies: '[''Home vegetable gardening'', ''Fishing at the marina'', ''Cooking Panamanian cuisine'', ''Salsa dancing'', ''Playing dominoes and card games'', ''Walking the Rockaway boardwalk'', ''Reading
    historical biographies'', ''Volunteering at community garden'']'
  career_goals: Even at 73, Jorge wants to leave a lasting imprint on the local green industry. He hopes to mentor a new generation of groundskeepers through informal workshops, earn a Certified Landscape
    Technician credential to formalize his knowledge, and launch a modest consulting side‑business that advises community gardens and senior housing complexes on low‑maintenance, water‑wise landscaping.
    He also dreams of turning his rooftop garden in Rockaway into a showcase of native, drought‑resistant plantings and being recognized by the Queens community for his lifelong dedication to keeping public
    spaces beautiful and accessible.
