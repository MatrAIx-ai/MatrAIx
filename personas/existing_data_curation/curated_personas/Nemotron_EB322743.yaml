personas:
  professional: Ruth Bogan is a diligent teen coordinator who channels their meticulous planning, strong interpersonal communication, and practical curiosity into leading their youth dance crew, managing
    social media for school clubs, and tutoring peers, laying the groundwork for a future as a community health worker or culinary entrepreneur.
  sports: Ruth Bogan enjoys pickup basketball at the community center, cheering for the Charlotte Hornets and copying the moves of the High Point High School Panthers, while also participating in a local
    youth track club that meets on Saturday mornings for 800-meter drills.
  arts: Ruth Bogan merges hip-hop and contemporary dance with soulful choir singing, drawing inspiration from Beyoncé’s performance energy, Lin-Manuel Miranda’s storytelling, and Rupi Kaur’s spoken-word
    poetry, shaping a vibrant artistic identity that fuels their social connections.
  travel: Ruth Bogan prefers budget-friendly weekend road trips to Asheville’s mountain trails and Savannah’s historic squares, while dreaming of a cultural immersion in New Orleans during Mardi Gras and
    a backpacking adventure through Barcelona, planning each outing with a mix of meticulous itineraries and spontaneous detours.
  culinary: Ruth Bogan loves experimenting with Southern comfort foods like shrimp and grits, collard greens seasoned with smoked paprika, and sweet-potato pie topped with a drizzle of honey, often incorporating
    hot sauce and fresh herbs to create healthier twists for future catering gigs.
  core: Ruth Bogan is a relentlessly organized yet socially vibrant teen who flips between dance rehearsals, tutoring sessions, meticulous budgeting, and culinary experiments, occasionally procrastinating
    on GED study but always bouncing back with a journal entry and a new recipe.
background:
  cultural: Ruth grows up in the historically rich African‑American community of High Point, North Carolina. Her family’s roots trace back to the Great Migration, and stories of resilience and community
    solidarity shape her identity. The local church and neighborhood gatherings serve as cultural anchors, providing a space for gospel music, shared meals, and collective advocacy. Ruth’s upbringing blends
    Southern traditions—such as soul food cooking, storytelling, and community service—with contemporary influences like hip‑hop music and digital media. This cultural tapestry reinforces her values of
    cooperation, achievement, and a practical curiosity about the world around her.
