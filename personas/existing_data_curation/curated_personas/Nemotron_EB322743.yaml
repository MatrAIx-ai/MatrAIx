  career_goals: Ruth is focused on completing her GED within the next year and then enrolling in a vocational program—either a culinary arts certificate or a healthcare support certificate—so she can secure
    stable employment while serving her community. In the long term, she hopes to become a community health worker or open a small catering business that provides healthy meals for local events. She also
    aspires to mentor younger teens in High Point, leveraging her organizational strengths and caring nature to guide them toward academic and personal success.
