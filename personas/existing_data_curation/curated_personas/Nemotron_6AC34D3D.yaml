  career_goals: Timothy aspires to become the head of the science department at his school, using that platform to champion innovative, project‑based STEAM initiatives across the district. He aims to secure
    grant funding to establish a dedicated maker‑space where students can explore robotics, digital art, and sustainable design. In the longer term, he envisions transitioning into an educational leadership
    role, perhaps as a curriculum specialist, to influence science education policy and teacher professional development statewide. Throughout his career progression, he remains committed to fostering an
    inclusive, curiosity‑driven learning culture that balances academic rigor with creative freedom.
