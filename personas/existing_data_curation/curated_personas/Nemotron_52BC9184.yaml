  career_goals: Mario aspires to fuse his analytical skills with his artistic curiosity by becoming a creative technologist specializing in data‑driven visual storytelling. He aims to develop interactive
    installations and immersive digital experiences that make complex scientific concepts accessible to broad audiences. In the next five years he plans to launch a freelance consultancy offering data visualization,
    UI/UX design, and prototyping services, while also contributing to open‑source projects at the intersection of science and art. He is open to pursuing a master’s degree in Human‑Computer Interaction
    or Interaction Design to deepen his expertise, and he hopes to mentor underrepresented youth in Sacramento by teaching STEAM workshops that blend coding, design, and cultural storytelling.
