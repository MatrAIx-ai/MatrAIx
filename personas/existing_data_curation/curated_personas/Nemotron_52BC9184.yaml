personas:
  professional: Mario Dejesus, a 29‑year‑old creative technologist, blends computational modeling, data science, and visual design to build interactive, data‑driven installations that translate complex
    scientific concepts into immersive experiences, leveraging their calm, organized yet flexible mindset and their knack for bridging technical and artistic domains.
  sports: Mario Dejesus maintains fitness through weekend hikes in the Sierra foothills, occasional trail runs with the local Sacramento Trail Runners club, and casual viewership of the Sacramento Kings
    (NBA) and San Francisco Giants (MLB), while they prefer low‑impact activities that complement their creative workflow.
  arts: Mario Dejesus immerses themselves in contemporary art by frequenting galleries featuring artists like Yayoi Kusama and Banksy, captures urban street murals with a Nikon Z series camera, creates
    digital illustrations inspired by the geometric boldness of Piet Mondrian, and relaxes by playing classical guitar pieces by Fernando Sor, all of which fuel their interdisciplinary creativity.
  travel: Mario Dejesus plans trips with a blend of meticulous research and spontaneous side‑quests, favoring nature‑focused destinations such as Yosemite National Park, the volcanic landscapes of Iceland,
    and the historic streets of Lisbon, while budgeting modestly to fund both work‑related residencies and personal exploration.
  culinary: Mario Dejesus enjoys cooking Mediterranean‑inspired family recipes, expertly preparing paella with saffron‑infused rice, chorizo, and fresh seafood, simmering gazpacho with ripe tomatoes and
    cucumber, and baking caramel‑topped flan, showcasing a moderate-to‑advanced skill level that doubles as a creative outlet after long coding days.
  core: Mario Dejesus is a calm, curiosity‑driven creator who fuses data science with visual art, budgets wisely, manages wrist fatigue through proactive ergonomics, hikes to recharge, and finds solace
    in guitar strings and Mediterranean flavors, all while maintaining a disciplined yet flexible lifestyle peppered with occasional impulsive art‑supply splurges.
background:
  cultural: Mario comes from a Spanish ethnic background and grew up bilingual in Spanish and English, which shapes his worldview and daily life. He celebrates traditional Spanish holidays such as Día de
    los Reyes and enjoys the music, dance, and cuisine of his heritage. Influenced by Spanish masters like Picasso, Dalí, and the literary works of Cervantes and Lorca, he incorporates a Mediterranean aesthetic
    and narrative sensibility into his creative projects. Living in Sacramento's vibrant Latino community, he participates in local cultural events, community festivals, and language‑exchange groups, and
    he often blends his heritage with Californian influences to create a hybrid cultural identity.
