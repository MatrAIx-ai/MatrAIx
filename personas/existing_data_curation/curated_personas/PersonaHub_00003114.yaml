persona_description: An Evenki elder who has lived and worked in the region for several generations, knowledgeable about the history, culture, and traditions of the region. They are experienced in the use
  of traditional reindeer-herding practices and have a deep understanding of the ecological and social implications of land claims and territorial disputes. They are also familiar with the legal and political
  landscape of the region, having witnessed the development of federal legislation aimed at promoting Native rights and territorial autonomy. They have a strong sense of community and are committed to preserving
  the traditional way of life of the Evenki people.
