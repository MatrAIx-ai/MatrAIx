  hobbies: '[''Line dancing'', ''Gardening'', ''Book club'', ''Cooking classes'', ''Community theater'', ''Hiking'', ''Photography outings'', ''Traveling to historic sites'', ''Volunteer work at senior
    center'']'
  career_goals: Although no longer in the formal workforce, Alfrieda aims to deepen her impact in the Columbia community. She plans to volunteer as a senior mentor at the local community center, guiding
    younger volunteers in event coordination and outreach. She also hopes to lead a neighborhood garden project, merging her love of gardening with her practical organizational skills. Long‑term, she dreams
    of curating a small boutique of handmade crafts and printed photographs, turning her hobbies into a modest income stream. Travel remains a personal ambition; she wants to visit historic sites across
    the Southeast to satisfy her curiosity while sharing stories with friends back home.
