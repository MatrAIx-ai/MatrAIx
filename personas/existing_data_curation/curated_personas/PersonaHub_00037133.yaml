persona_description: Heather Fleming, a caregiver and educator who specializes in teaching children with Autism Spectrum Disorder (ASD) to verbally communicate. She is interested in finding ways to motivate
  children to talk, setting up an environment that encourages language, teaching communication during natural situations, and prompting the child to communicate. Her expertise lies in the use of verbal
  language to communicate with children with ASD, and she is passionate about helping caregivers and educators improve communication skills for children with ASD.
