persona_description: A professional education leader who is knowledgeable about the development and implementation of science education standards, particularly those developed by the National Research Council
  and the National Academies. This individual is familiar with the process of state-driven standards development, the importance of preparing students for both college and career readiness, and the research-based
  approach of the NGSS. They are also interested in the opportunities the NGSS afford for workforce training and are aware of the unique aspects of the NGSS, such as its focus on science content and critical
  thinking.
