  hobbies: '[''Drawing and coloring'', ''LEGO construction'', ''Reading picture books'', ''Pretend play and storytelling'', ''Outdoor group games (tag, hide‑and‑seek)'', ''Nature exploration (collecting
    rocks, observing desert wildlife)'', ''Watching educational cartoons'']'
  career_goals: He dreams of becoming an astronaut to explore the stars, an artist who can paint big colorful worlds, and a scientist who discovers how things work. He wants a future where he can keep asking
    “why” and create things that help friends and family, and he imagines trying many different jobs as he grows.
