  hobbies: '[''Street basketball'', ''Skateboarding'', ''Video gaming (strategy and sports games)'', ''Music production (hip‑hop beat making)'', ''DIY car repair and coding tutorials'', ''Cooking (soul
    food and Mexican-inspired dishes)'', ''Journaling and guided meditation for stress relief'']'
  career_goals: Antonio’s immediate goal is to earn his GED within the next year and then enroll in a vocational training program, either in automotive technology or information technology. He aims to obtain
    certifications such as CompTIA A+ or ASE, which will open pathways to stable, skilled employment as a technician. Long‑term, he envisions owning a small repair shop that also serves as a community workshop
    where other teens can learn practical trades. He is equally motivated to become a mentor for at‑risk youth in Tucson, helping them blend curiosity with realistic career pathways.
