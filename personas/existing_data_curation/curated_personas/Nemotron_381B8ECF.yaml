personas:
  professional: Jorge Iglesias, a veteran elementary and middle school teacher, they fuse vibrant mural projects, acoustic guitar interludes, and bilingual storytelling into interdisciplinary curricula,
    leveraging their innate imagination and talkative charisma to transform loosely planned lessons into dynamic, student‑centered experiences while mentoring fellow teachers with equal enthusiasm.
  sports: Jorge Iglesias, an enthusiastic community‑center participant, they play pick‑up basketball at the local YMCA in winter, cheer on the Orlando Magic and Orlando City SC, and lead a senior salsa‑dance
    fitness group that meets weekly, while also joining the adult swim league each summer.
  arts: Jorge Iglesias, a fervent lover of visual and musical storytelling, they spend evenings painting large‑scale murals inspired by the mythic symbolism of artists like Banksy and Matisse, strum acoustic
    renditions of Jimi Hendrix and Leonard Cohen at community gatherings, and orchestrate improv storytelling nights that echo the speculative worlds of Neil Gaiman and the timeless motifs of ancient myth.
  travel: Jorge Iglesias, a spontaneous explorer, they plan loose weekend getaways that blend the thrills of Walt Disney World and Universal Studios with the vibrant street festivals of St. Augustine and
    the eclectic art fairs of Asheville, snapping photos with their DSLR while letting their sociable energy dictate the pace, and always budgeting to ensure family reunions during school holidays.
  culinary: Jorge Iglesias, a confident home chef, they relish crafting aromatic mole and hearty pozole using dried chilies, cacao, and fresh cilantro, expertly roll tamales with corn masa for family gatherings,
    experiment with herb blends featuring epazote and hoja santa, and occasionally indulge in baking sweet breads when inspiration strikes.
  core: Jorge Iglesias, a 56‑year‑old teacher‑artist, they blend boundless imagination with a relaxed, sociable rhythm, turning chaotic lesson plans into vibrant murals, juggling spontaneous community events,
    and sprinkling a dash of disorganization into a life fueled by music, storytelling, and family‑centric cuisine.
background:
  cultural: Jorge’s cultural identity is rooted in his Mexican heritage, shaped by family traditions, Spanish language, and celebrations such as Día de los Muertos, quinceañeras, and holiday gatherings
    centered around Mexican cuisine and music. Growing up in a bicultural environment, he seamlessly blends Mexican customs with the diverse, multicultural tapestry of Central Florida. His bilingual fluency
    allows him to serve as a cultural bridge in his school, enriching the curriculum with Mexican art, folklore, and perspectives while embracing the broader American context of his community in Kissimmee.
attributes:
  skills: '[''Differentiated instruction'', ''Bilingual communication (Spanish/English)'', ''Classroom management'', ''Curriculum design (arts integration)'', ''Project‑based learning facilitation'', ''Digital
    educational technology (interactive whiteboards, educational apps)'', ''Public speaking and school assembly leadership'', ''Mentorship and teacher coaching'', ''Conflict resolution'', ''Flexibility
    in lesson planning'']'
  hobbies: '[''Mural painting'', ''Acoustic guitar playing'', ''Salsa dancing'', ''Reading speculative fiction and mythology'', ''Book club participation'', ''Improv storytelling workshops'', ''Gardening
    native Mexican herbs'', ''Cooking traditional Mexican cuisine'', ''Theme park exploration'', ''Photography with DSLR'']'
  career_goals: Jorge aspires to become a curriculum coordinator for his district, focusing on integrating arts, technology, and cultural relevance into the core curriculum. He wishes to develop a district‑wide
    interdisciplinary program that encourages creativity and critical thinking, and to mentor new teachers in implementing innovative pedagogies. In the longer term, he hopes to author a series of bilingual
    children’s books that blend Mexican folklore with contemporary themes, and eventually transition into a part‑time educational consultant role, helping schools across Florida design inclusive, imagination‑driven
    curricula.
