personas:
  professional: Jose Oliver, a retired civil and environmental engineer, channels his decades of CAD, GIS, and data‑analysis expertise into volunteer consulting for Valley City’s water infrastructure, where
    they balance meticulous project planning with a relaxed, community‑first approach that values flexibility over strict timelines.
  sports: Jose Oliver stays active by joining the local senior shuffleboard club and attending weekly bird‑watching hikes, while they cheer on the North Dakota State Bison football team and the Minnesota
    Vikings, and sometimes take part in a winter cross‑country skiing group at a nearby state park.
  arts: Jose Oliver indulges in classic rock legends like The Rolling Stones, Led Zeppelin, and Pink Floyd, often playing their vinyl collection while they restore vintage furniture and attend community
    theater productions featuring the Dakota Folk Ensemble, which fuels their appreciation for storytelling and craftsmanship.
  travel: Jose Oliver prefers road trips that balance historical curiosity with scenic leisure, having driven to Yellowstone and the Badlands, and they dream of a guided tour of Normandy’s WWII sites and
    a summer cruise along the Norwegian fjords, all while budgeting carefully to keep travel within a fixed annual allowance.
  culinary: Jose Oliver enjoys cooking garden‑fresh tomato basil soup, pan‑seared trout from the Sheyenne River, and hearty homemade pot roast with carrots and potatoes, and they often experiment with a
    smart‑enabled sous‑vide setup to perfect their signature apple‑cinnamon crumble.
  core: Jose Oliver blends a pragmatic, community‑oriented mindset with a love for hands‑on craftsmanship, continuous learning, and modest, well‑planned living, all tempered by a relaxed attitude toward
    structure and a generous spirit toward neighbors.
background:
  cultural: Jose was raised in the Upper Midwest, a region shaped by German and Scandinavian immigrant heritage. The values of self‑reliance, community cooperation, and a practical, down‑to‑earth approach
    to life are deeply embedded in his worldview. Living in Valley City, North Dakota, he maintains strong ties to local traditions, including annual county fairs, church gatherings, and the close‑knit
    neighborly culture typical of small‑town America. His background as a white Midwestern American informs his appreciation for modesty, modest consumption, and a strong sense of civic duty.
