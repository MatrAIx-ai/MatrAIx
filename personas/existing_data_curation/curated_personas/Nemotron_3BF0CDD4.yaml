  career_goals: Though retired from full‑time employment, Jose aims to channel his technical knowledge into volunteer consulting for local infrastructure projects, such as improving the municipal water
    system and supporting renewable energy initiatives in Valley City. He also aspires to mentor high‑school and college students in STEM through workshops and after‑school programs, and to author a memoir
    that captures his experiences in engineering and life in the Midwest.
