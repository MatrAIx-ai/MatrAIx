personas:
  professional: An aspiring IT support specialist and future cybersecurity analyst, Matthew Smith leverages their hands‑on PC‑building hobby, Python scripting chops, and methodical problem‑solving while
    navigating intense anxiety and a competitive drive that pushes them to earn CompTIA certifications quickly and envision a tech‑service business.
  sports: A bike‑centric fitness enthusiast who also follows Ohio’s professional football teams, Matthew Smith joins the Columbus Off‑Road Cyclists club for weekend rides, sporadically hits the gym for
    strength training, and roots for the Cleveland Browns during the fall season while using cycling as a primary stress outlet.
  arts: An indie‑rock‑driven sci‑fi aficionado, Matthew Smith spends evenings listening to Arctic Monkeys and Led Zeppelin while devouring works by Neal Stephenson and Octavia Butler, and they channel that
    creative energy into keeping a daily journal and dabbling in pixel art during downtime.
  travel: A weekend‑road‑trip planner and avid cyclist, Matthew Smith frequently explores Hocking Hills and the Ohio Lake Erie coastline, dreams of biking through the Japanese Alps, and balances their limited
    student budget by opting for cheap hostels, couch‑surfing, and DIY bike‑packed routes.
  culinary: A self‑taught home‑cook with a penchant for comfort foods, Matthew Smith whips up pepperoni pizza with homemade dough, spicy ramen with extra chilies, and banana bread on Sunday mornings, favoring
    ingredients like mozzarella, sriracha, and ripe bananas while occasionally over‑seasoning due to a love for bold flavors.
  core: A methodical tech hobbyist with high‑strung emotions, Matthew Smith blends relentless curiosity, meticulous organization, and a competitive edge into building PCs, studying for certifications, and
    journaling away anxiety.
background:
  cultural: Raised in Cincinnati’s suburban neighborhoods, Matthew grew up in a middle‑class white family that valued hard work, self‑reliance, and community involvement. The Midwestern culture of modesty,
    practicality, and a strong local identity shaped his outlook, while exposure to the city’s diverse music scene, sports culture, and regional cuisine—like Cincinnati chili—added a distinct flavor to
    his personal narrative. Family gatherings often centered around backyard barbecues and local high school football games, reinforcing a sense of belonging that he carries into his adult life.
attributes:
  skills: '["Computer hardware troubleshooting", "Small‑scale network configuration", "Basic automotive diagnostics", "Python scripting for automation", "Project planning and organization", "Analytical
    problem solving"]'
  hobbies: '["Custom PC building", "Strategy video gaming", "Cycling and hiking", "Science‑fiction reading", "Arduino electronics projects", "Volunteering for community tech workshops", "Listening to indie
    and classic rock", "Journaling for emotional self‑care"]'
  career_goals: Matthew aims to translate his hands‑on expertise into a credentialed technical career. Over the next two years he plans to earn CompTIA A+ and Network+ certifications, secure an entry‑level
    IT support role, and eventually specialize in cybersecurity or IT infrastructure management. Long‑term, he envisions running his own technology‑service business where he can apply his competitive drive
    and structured approach, while also seeking work environments that support mental‑health resources to manage his anxiety.
