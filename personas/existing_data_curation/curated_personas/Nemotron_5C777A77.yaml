    and tutoring of youth"]'
  hobbies: '["Watercolor painting", "Salsa and folkloric dance", "Traditional Mexican cooking and recipe experimentation", "Gardening (herbs, chilies, heirloom vegetables)", "Reading historical fiction
    and biographies", "Storytelling circles and oral history sharing", "Photography of landscapes and murals", "Volunteer docent work at museums", "Attending local art exhibitions and open‑mic nights",
    "Participating in community festivals and cultural workshops", "Road trips to California coastal towns"]'
  career_goals: Although retired, Jacqueline remains driven by a desire to preserve and share her cultural heritage. She aims to compile a family cookbook that pairs recipes with personal stories and historical
    context, ensuring that future generations can taste both the flavors and the memories of her upbringing. She hopes to mentor a new cohort of volunteers at the local senior center, teaching them how
    to design and manage culturally resonant events. Jacqueline envisions establishing a community garden that doubles as an educational space where children learn about Mexican culinary herbs, sustainable
    farming, and the science of soil health. A long‑held dream is to travel to her ancestral hometown in Jalisco, Mexico, to document oral histories from relatives and elders, deepening her connection to
    her roots. Additionally, she is eager to develop her digital photography skills, capturing local festivals and murals to share online, thereby acting as a cultural bridge between Watsonville and broader
    audiences.
