persona_description: A neurologist who specializes in the diagnosis and treatment of neurological disorders, particularly those related to the visual system. She has extensive experience in the evaluation
  and management of patients with a variety of visual disorders, including Akinetopsia. Her research interests include the pathophysiology and pathognomonic features of Akinetopsia, as well as the development
  of diagnostic and therapeutic strategies for this disorder. She has published extensively in peer-reviewed journals and has presented her research at national and international conferences.
