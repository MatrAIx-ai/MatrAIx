personas:
  professional: Sui Suh is a full‑stack software developer who leverages a methodical, routine‑driven approach and strong algorithmic expertise in Java, Python, C++, and JavaScript to lead code reviews,
    build robust React‑Node.js applications, and mentor junior engineers, ensuring reliability while balancing a collaborative, sociable team culture.
  sports: Sui Suh enjoys weekend hikes on the Champaign County trails with a local outdoor club, follows the Chicago Cubs and Chicago Bulls avidly, participates in a casual intramural soccer league, and
    balances a love for nature with a routine of weekly yoga for flexibility.
  arts: Sui Suh immerses themselves in Korean dramas like 'Crash Landing on You' and pop music from BTS and IU, appreciates contemporary fiction from authors such as Haruki Murakami and Chimamanda Ngozi
    Adichie, and attends monthly board‑game nights that double as social gatherings for creative problem‑solving.
  travel: Sui Suh prefers well‑planned trips that blend cultural immersion and outdoor adventure, having explored Jeju Island’s volcanic landscapes, trekked the Appalachian Trail’s segment in Virginia,
    and scheduled a future visit to Kyoto’s historic temples while balancing travel costs with family budgeting.
  culinary: Sui Suh delights in preparing traditional Korean dishes such as kimchi jjigae, bibimbap, and bulgogi using home‑grown herbs like perilla and cilantro, skillfully balances flavors with gochujang
    and sesame oil, and often hosts pot‑luck gatherings where the aroma of simmering broth becomes a communal comfort.
  core: Sui Suh blends a meticulous, routine‑focused mindset with a sociable, caring nature, juggling a demanding tech career, a garden, and frequent gatherings, all while battling occasional stress‑induced
    over‑thinking and a secret love for binge‑watching K‑pop music videos late at night.
background:
  cultural: Sui is a first‑generation Korean‑American. Her parents emigrated from South Korea in the 1990s, and she grew up bilingual, celebrating both Korean holidays such as Chuseok and Seollal and American
    traditions like Thanksgiving. The values of collectivism, respect for elders, and a strong emphasis on education were instilled by her family, shaping her cooperative and harmonious approach to relationships.
    Sui remains actively involved in the local Korean cultural association in Champaign, organizing community events, sharing traditional foods, and teaching Korean language basics to interested neighbors.
    Her cultural heritage influences her cooking, family rituals, and her commitment to fostering inclusive, supportive environments both at work and in her personal life.
