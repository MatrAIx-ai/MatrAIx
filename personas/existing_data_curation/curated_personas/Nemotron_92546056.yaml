  career_goals: Sui aims to transition into a technical lead role within the next two years, leveraging her organizational strengths to streamline development processes and foster a collaborative team culture.
    She plans to obtain AWS and Google Cloud certifications to deepen her cloud expertise and eventually move into an engineering manager position where she can mentor larger teams, champion work‑life balance
    initiatives, and implement stress‑reduction practices such as regular retrospectives. Long‑term, she aspires to become a senior architect, designing scalable, secure systems for public‑service applications,
    while maintaining a stable routine that supports her family life.
