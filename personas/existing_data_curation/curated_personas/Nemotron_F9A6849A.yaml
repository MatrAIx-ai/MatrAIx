    and scheduling'', ''Problem-solving and critical thinking'', ''Use of GPS and logistics software'']'
  hobbies: '[''Landscape photography'', ''Visiting art galleries and museums'', ''Acrylic painting'', ''Cooking Spanish cuisine'', ''Puzzle solving and brain teasers'', ''DIY vehicle restoration projects'',
    ''Running and jogging'', ''Yoga practice'', ''Listening to logistics and art podcasts'', ''Reading non-fiction (technology, art history, philosophy)'', ''Participating in community art workshops'',
    ''Attending vintage truck rallies'']'
  career_goals: Carmen aspires to leverage her technical education and field experience to move into a leadership role within the transportation and logistics sector. In the next five years she aims to
    earn certifications such as the Certified Transportation Professional (CTP) and a Supply Chain Management certificate, positioning herself for a regional operations manager or fleet supervisor position.
    She also dreams of establishing her own boutique trucking company that specializes in time‑critical deliveries for niche markets, integrating data‑driven route optimization to reduce costs and environmental
    impact. Long‑term, she envisions pursuing an MBA to broaden her strategic business acumen and eventually transition into executive management.
