personas:
  professional: Teretha Hudson is a 27‑year‑old construction laborer in Cleveland who combines hands‑on expertise in masonry and blueprint interpretation with a curiosity for eco‑friendly building methods,
    leveraging their reliable, organized yet flexible approach to coordinate crews and solve on‑site problems as they work toward a foreman role.
  sports: Teretha Hudson stays active by playing point guard in a neighborhood basketball league that feeds their love of teamwork, logging weekend bike rides with the Cuyahoga River Trail Cycling Club,
    and cheering for the Cleveland Cavaliers, Browns, and Guardians while balancing fitness with the demands of their construction job.
  arts: Teretha Hudson nurtures their artistic side by singing in their church's gospel choir that covers Mahalia Jackson and Kirk Franklin, listening to classic R&B and jazz icons such as Aretha Franklin,
    Marvin Gaye, and John Coltrane while cooking, and immersing themselves in historical fiction by Toni Morrison and Colson Whitehead, which fuels their appreciation for storytelling and soulful expression.
  travel: Teretha Hudson prefers weekend getaways that blend modest adventure with relaxation, often driving to Hocking Hills State Park for hikes, having already visited Niagara Falls on a budget trip,
    and dreaming of exploring New Orleans for its music scene and Savannah for its historic charm, all while budgeting carefully to fund their certification courses and community projects.
  culinary: Teretha Hudson enjoys cooking soul‑food dishes such as fried catfish, collard greens, cornbread, and sweet‑potato pie, often seasoning with smoked paprika, okra, and fresh herbs from their garden,
    while listening to jazz and R&B to set the rhythm in the kitchen, and occasionally experimenting with sustainable ingredients like chickpeas in stews.
  core: Teretha Hudson is a pragmatic builder who balances community‑focused ambitions with a love for gospel music, basketball, gardening, and careful budgeting, while wrestling with occasional anxiety
    and a tendency to over‑work.
background:
  cultural: Teretha is an African‑American who grew up in Cleveland's historically Black neighborhoods on the west side. Her upbringing was shaped by strong church ties, family gatherings centered around
    shared meals, and a community ethos of mutual support. The local Black cultural scene—spanning music, food, and civic activism—has instilled in her a deep appreciation for resilience and collective
    progress. These influences inform her work ethic, her commitment to uplifting others, and her interest in preserving and advancing Black craftsmanship within the construction trade.
attributes:
  skills: '["Reading blueprints", "Operating hand and power tools", "Basic masonry", "Concrete finishing", "Safety compliance (OSHA 30)", "Heavy equipment operation (forklift, backhoe)", "Team coordination",
    "Physical stamina", "On‑site problem solving", "Project documentation"]'
  hobbies: '["Neighborhood basketball league", "Community gardening", "Gospel choir participation", "Cooking soul‑food recipes", "Listening to R&B and jazz", "Journaling for stress management", "Reading
    historical fiction", "Cycling along the Cuyahoga River trail"]'
  career_goals: Teretha aims to move from laborer to a supervisory role such as foreman within the next three to five years, leveraging her hands‑on experience and newly earned certifications in construction
    management. She plans to enroll in a community college program for a certificate in construction supervision, join her local union to access mentorship opportunities, and eventually start her own small
    contracting business focused on residential renovations that incorporate sustainable practices. Her ambition is grounded in a desire to provide stable, well‑paid work for her community while continuing
    to learn and apply innovative building methods.
