  hobbies: '[''Gardening (vegetables and flowers)'', ''Reading historical fiction and biographies'', ''Book club participation'', ''Knitting and crochet'', ''Weekend hiking on Wasatch trails'', ''Nature
    photography'', ''Volunteering at senior center (basic computer tutoring)'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Catherine aims to transition from day‑to‑day sales duties to a mentorship and community‑engagement role within the next two years. She wishes to develop a training program for new hires
    that emphasizes empathetic service and conflict de‑escalation. Long‑term, she envisions partnering with local senior centers to design shopping‑assistance initiatives that make retail spaces more accessible
    for older adults. She also hopes to contribute her insights as a part‑time consultant for nearby small businesses seeking to improve customer experience. While staying active in the workforce, she plans
    to gradually reduce hours and dedicate more time to volunteer outreach, ensuring a balanced, purposeful retirement.
