personas:
  professional: A freelance tech‑support specialist, Pablo Cortazar, they combine hardware troubleshooting expertise with self‑taught automation scripts to deliver rapid remote solutions, while their relaxed
    scheduling lets them chase high‑energy challenges over routine tasks.
  sports: A weekend cyclist and casual basketball player, Pablo Cortazar, they ride with the Memphis Bicycle Club on Saturday mornings, follow the Memphis Grizzlies and Tennessee Titans with a competitive
    spirit, but prefer short high‑intensity bike rides over traditional gym workouts.
  arts: An eclectic music enthusiast, Pablo Cortazar, they stream norteño legends like Los Tigres del Norte alongside Memphis blues icons such as B.B. King and indie rock bands like The Strokes, attend
    monthly open‑mic nights at Levitt Shell, and collect vintage vinyls that blend their bicultural soundscape.
  travel: A spontaneous road‑trip aficionado, Pablo Cortazar, they plan trips on a whim, ranging from day rides along the Mississippi River to weekend escapes in New Orleans, dream of backpacking the Atacama
    Desert in Chile, and keep a growing list of destinations that include Kyoto and Oaxaca.
  culinary: A curious home chef, Pablo Cortazar, they skillfully prepare mole rojo and tamales using dried chiles pasilla and cacao, experiment with Memphis‑style dry‑rub ribs on the grill, and often pair
    their meals with avocado salsa and fresh cilantro, while reluctantly ordering takeout when projects demand extra screen time.
  core: Pablo Cortazar is a 25‑year‑old tech tinkerer who balances competitive gaming with sporadic budgeting, tackles eye strain with gadgets, and cooks fusion dishes while cycling to the beat of blues
    and norteño.
background:
  cultural: Pablo grew up in a Mexican household that retained strong cultural roots while living in the United States. His parents immigrated from Michoacán, and family gatherings centered around traditional
    foods, Spanish‑language storytelling, and celebrations such as Día de los Muertos. He is fluent in both Spanish and English, and his cultural identity influences his cooking, musical tastes, and worldview.
    Residing in Memphis, he has also absorbed Southern hospitality and the city’s vibrant music scene, blending the rhythms of Mexican norteño with the blues and rock that define the local culture. This
    bicultural experience shapes his perspective, allowing him to navigate comfortably between Mexican and American social contexts.
