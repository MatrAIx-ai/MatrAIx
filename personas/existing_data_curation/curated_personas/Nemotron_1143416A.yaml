  hobbies: '[''Custom PC building and modding'', ''Arduino and Raspberry Pi tinkering'', ''Drone flying and repair'', ''Competitive online gaming (FPS and strategy)'', ''Reading non-fiction (tech, engineering,
    Mexican history)'', ''Cooking Mexican cuisine (tamales, mole)'', ''Cycling around Memphis'', ''Listening to regional Mexican music and indie rock'']'
  career_goals: Pablo aims to secure remote freelance tech‑support work that leverages his hardware diagnostic and automation skills, with the long‑term goal of launching a boutique tech‑repair and custom‑mod
    shop that blends practical service with innovative projects. He plans to earn industry certifications such as CompTIA A+ and Cisco CCNA within the next year to bolster credibility. By building a portfolio
    of custom builds, automated scripts, and drone projects, he hopes to attract a steady client base. Additionally, he envisions mentoring a small group of local youth interested in STEM through weekend
    workshops, combining his competitive drive with community impact.
