  career_goals: Bessie aims to rise to a regional communications manager role within the next five years, ideally with a healthcare organization or a nonprofit serving rural Minnesota. She plans to obtain
    the APR (Accreditation in Public Relations) certification to bolster her professional credibility. In the longer term, she hopes to start her own boutique PR consultancy focused on helping small‑business
    owners and community groups amplify their voices while maintaining a structured, results‑oriented approach. Leadership, mentorship of junior staff, and expanding her expertise in digital crisis communication
    are key milestones she seeks.
