  hobbies: '[''Listening to Latin music'', ''Cooking traditional Ecuadorian dishes'', ''Watching soccer matches'', ''Scenic coastal drives and photography'', ''Mechanical tinkering'', ''Journaling and mindfulness
    meditation'', ''Playing racing video games'']'
  career_goals: Louis aspires to transition from driver‑sales roles into a supervisory position within a logistics firm, eventually overseeing a small fleet of trucks. He plans to complete his associate
    degree in Business Administration, acquire a hazardous‑materials endorsement, and obtain certifications in fleet management software. His long‑term ambition is to launch his own transportation company
    that blends reliable delivery services with a community‑focused sales approach, providing stable income for his family while allowing the flexible schedule he values. Reducing his emotional stress through
    better organization and delegation is also a key personal goal.
