personas:
  professional: Debra Thompson is a senior data strategist who blends advanced statistical modeling with a painter’s eye for patterns, leading cross‑functional teams to translate complex analytics into
    clear visual stories while meticulously documenting every step, and she leverages her methodical planning and imaginative curiosity to drive strategic decisions for healthcare and agricultural clients.
  sports: Debra Thompson is a weekend hiker who frequently trails the Oconee National Forest, a member of the Montezuma Hiking Club, and a loyal fan of the Atlanta Falcons and Atlanta United, balancing
    her love of outdoor endurance with gentle yoga sessions at the local community center to stay flexible.
  arts: Debra Thompson immerses herself in watercolor abstracts inspired by Kandinsky and O’Keeffe, writes speculative short stories echoing the narrative styles of Ursula K. Le Guin, and attends Southern
    Gothic theater productions starring Mary‑Louise Parker, while curating a modest collection of vinyl records from Joni Mitchell and Philip Glass that fuel her creative flow.
  travel: Debra Thompson plans her trips with spreadsheet precision, favoring road‑side stays at historic inns in Savannah and Asheville, day‑trips to the gardens of Kyoto for inspiration, and occasional
    adventure hikes in Iceland’s volcanic landscapes, always balancing cultural immersion with the comfort of familiar Southern hospitality.
  culinary: Debra Thompson delights in cooking Southern classics like shrimp and grits and collard greens, often experimenting by adding miso glaze, smoked paprika, or a pinch of saffron, and her garden’s
    heirloom tomatoes and sweet peppers become the star ingredients in her weekly dinner parties.
  core: Debra Thompson is a data‑driven dreamer who meticulously plans every project, garden, and meal, yet lets occasional impulsive bursts of artistic flair and a love for sci‑fi novels keep her life
    vividly colorful.
background:
  cultural: Debra grew up in a traditional Southern community in central Georgia, where values of hospitality, family loyalty, and church involvement are central. Her white heritage and upbringing have
    shaped a deep appreciation for Southern cuisine, folk music, and community gatherings, while her academic pursuits introduced her to a broad, multicultural worldview. She balances respect for local
    customs—such as seasonal harvest festivals and church socials—with a progressive commitment to education and gender equity in STEM, reflecting both the regional heritage of Montezuma and her own forward‑looking
    outlook.
attributes:
  skills: '[ ''Statistical Modeling'', ''Predictive Analytics'', ''Machine Learning'', ''Data Visualization'', ''R'', ''Python (pandas, NumPy, scikit‑learn)'', ''SQL'', ''SAS'', ''Tableau'', ''Power BI'',
