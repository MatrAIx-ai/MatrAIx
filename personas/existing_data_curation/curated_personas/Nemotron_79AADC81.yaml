  hobbies: '[ ''Watercolor Painting'', ''Creative Writing (short speculative fiction)'', ''Science‑Fiction Reading'', ''Puzzle Solving (Sudoku, logic grids)'', ''Seasonal Gardening'', ''Hiking in Oconee
    National Forest'', ''Experimental Southern Cooking'', ''Volunteer STEM Workshops at Local Library'' ]'
  career_goals: Debra aims to leverage her quantitative expertise to become a chief data officer or senior analytics director for a regional healthcare system or agricultural cooperative, where she can
    drive data‑driven improvements in community health and economic sustainability. She is passionate about building data literacy programs for rural schools and mentoring women in STEM, and she hopes to
    publish a case study on applying predictive analytics to optimize crop yields in central Georgia. Over the next decade she envisions leading a multidisciplinary team that blends rigorous analytics with
    creative design, positioning Montezuma as a model for data‑informed rural development.
