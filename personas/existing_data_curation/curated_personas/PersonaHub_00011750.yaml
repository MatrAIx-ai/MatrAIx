persona_description: A person interested in African history, culture, and mythology, particularly in the Yoruba religion and its connection to the Shango deity. This person may have a background in anthropology,
  history, or religion studies and is passionate about learning about the rich and diverse cultures of Africa. They are intrigued by the story of Shango, the fourth king of the Oyo Empire, and the development
  of the Shango religion among enslaved Yoruba people in the Americas. This person is likely to be interested in exploring the cultural and historical significance of African gods and goddesses, and how
  they have been celebrated and worshipped across different regions and time periods.
