  hobbies: '[''Traditional Puerto Rican cooking'', ''Salsa and bomba dancing'', ''Gardening'', ''Church volunteer work'', ''Listening to plena music'', ''Reading romance novels'', ''Organizing community
    gatherings'']'
  career_goals: Maria aims to transition from individual household work to a supervisory role, such as a head housekeeper for a senior living facility or a boutique hotel in San German. She hopes to obtain
    a certification in professional housekeeping and elder care within the next two years, allowing her to expand her services to include caregiving for elderly relatives. Long‑term, Maria envisions starting
    her own small cleaning and home‑care business that offers personalized services to the local community, employing and training other women from her neighborhood. She also aspires to become a recognized
    community resource, organizing workshops on home safety, budgeting, and efficient household management for her fellow Puerto Rican families.
