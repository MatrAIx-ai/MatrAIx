personas:
  professional: Maria Rodriguez, a 53‑year‑old master housekeeper with three decades of residential management experience, blends meticulous deep‑cleaning techniques, bilingual communication, and a flair
    for orchestrating community gatherings, while applying her structured, reliable nature to mentor junior staff and negotiate household budgets with calm assertiveness.
  sports: Maria Rodriguez stays active by walking her balcony garden’s perimeter each morning, participates in a community salsa‑dance fitness class, follows the local baseball team Cangrejeros de Santurce
    each season, and joins the San German senior walking club for weekend beach volleyball matches.
  arts: Maria Rodriguez immerses herself in the rhythms of plena legends like Pedro Flores, dances to the salsa beats of Celia Cruz, and curls up with romance novels by Nora Roberts, allowing vibrant music
    and heartfelt stories to shape her social gatherings and personal outlook.
  travel: Maria Rodriguez prefers meticulously planned family trips, often booking guided tours of historic Old San Juan and beach retreats in Culebra, while dreaming of a leisurely pilgrimage to the colonial
    streets of Cartagena, balancing her love of cultural immersion with the comfort of familiar routines.
  culinary: Maria Rodriguez, an expert home chef, crafts aromatic arroz con gandules with sofrito, slow‑roasted pernil seasoned with adobo, and hand‑rolled pasteles using fresh cilantro and oregano from
    her balcony garden, and she never misses an opportunity to share these dishes at neighborhood potlucks, though she occasionally over‑spices when stressed.
  core: Maria Rodriguez blends meticulous housekeeping precision with an exuberant love for dance and community, managing stress through structured routines while occasionally indulging in late‑night romance
    novels and a secret stash of extra coffee.
background:
  cultural: Maria grew up in a tight‑knit Puerto Rican family in San German, where Catholic traditions, family gatherings, and community celebrations are central to daily life. She was raised with the rhythms
    of bomba and plena, the flavors of island cuisine, and the value of hospitality. The strong emphasis on family loyalty and mutual support informs her caring approach to housekeeping and community involvement.
    Bilingual in Spanish and English, Maria navigates both local customs and broader influences, preserving Puerto Rican cultural heritage while adapting to modern practices. Her upbringing instilled a
    sense of pride in her island roots, reflected in her love of traditional music, dance, food, and her commitment to serving and uplifting her neighbors.
