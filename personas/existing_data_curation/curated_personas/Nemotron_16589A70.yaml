personas:
  professional: Marisel Perez leverages their bilingual fluency and curiosity‑driven practicality to excel in human resources, orchestrating talent acquisition, employee onboarding, and conflict resolution
    at a mid‑size tech firm while championing inclusive, people‑first policies and weaving compassionate, wellness‑focused workshops into the corporate culture.
  sports: Marisel Perez channels their high energy into weekend hikes through Trabuco Canyon as a member of the Orange County Hiking Club, regular salsa dancing, and fervently supports the Los Angeles Dodgers
    in baseball and the LA Galaxy in soccer, creating a socially driven and balanced fitness routine.
  arts: Marisel Perez finds artistic fulfillment in salsa nights to the rhythms of Celia Cruz, devouring contemporary novels by Chimamanda Ngozi Adichie and Sally Rooney at a local book club, and savoring
    performances by actress Lupita Nyong’o at community festivals, weaving these cultural threads into their identity.
  travel: Marisel Perez prefers low‑key, nature‑focused trips, meticulously planning weekend getaways to places like Santa Barbara and Sedona while dreaming of a backpacking adventure through Patagonia,
    balancing a modest travel budget with a yearning for immersive cultural experiences.
  culinary: Marisel Perez, a confident home cook, delights in preparing traditional dishes such as tamales, chiles en nogada, and pozole using fresh corn masa, ancho chilies, and cilantro, while occasionally
    experimenting with fusion recipes like quinoa‑stuffed peppers, and they relish dining out at local taquerías for authentic street‑food experiences.
  core: Marisel Perez is a compassionate, socially‑driven HR professional whose curiosity and practical organization coexist with high‑energy salsa dancing, anxious introspection, and a love for nature
    hikes, making them both a meticulous planner and an impulsive wellness‑seeker.
background:
  cultural: Marisel is a first‑generation Mexican‑American raised in Southern California. Her household blended Mexican traditions—such as Día de los Muertos celebrations, family‑centered meals, and Spanish
    language storytelling—with the broader American cultural landscape. Bilingual in Spanish and English, she values collectivist principles like community support, respect for elders, and solidarity, which
    shape her compassionate approach to human resources. Growing up in a multicultural environment, she bridges both cultures, championing inclusive practices that honor diversity while fostering a sense
    of belonging in the workplace.
