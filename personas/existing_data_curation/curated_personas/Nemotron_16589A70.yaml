  career_goals: Marisel aims to advance to a senior HR business partner role within the next five years, where she can lead strategic workforce planning and spearhead diversity, equity, and inclusion initiatives.
    She plans to earn professional HR credentials such as SHRM‑CP or PHR to deepen her expertise. A core ambition is to champion mental‑health and wellness programs that foster supportive, harmonious workplaces,
    reflecting her compassionate nature. Ultimately, she envisions launching a consultancy that helps small businesses create inclusive, people‑first cultures.
