  hobbies: '["Fishing","Hiking","Woodworking","Reading science‑fiction and historical nonfiction","Cooking Southern comfort meals","Gardening","Birdwatching","Volunteer work at local food bank"]'
  career_goals: Russell aims to complete his associate degree in Business Administration within the next two years and obtain a certification in residential electrical work. His long‑term ambition is to
    launch a small, family‑run handyman service that emphasizes reliable, affordable repairs for neighbors in Deer and surrounding communities. He also envisions eventually taking on a supervisory role
    in a local public‑works department, where he can apply his organizational strengths to improve community infrastructure while maintaining a work‑life balance that supports his marriage and family commitments.
