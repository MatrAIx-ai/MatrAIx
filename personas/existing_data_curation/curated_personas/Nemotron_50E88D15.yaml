  career_goals: She aims to advance within the customer support field, first targeting a team lead role within the next two years. Long‑term, Lakeitha plans to transition into a training or quality assurance
    position where she can design onboarding programs and help improve service standards. She also intends to obtain her GED and pursue an associate degree in business administration, positioning herself
    for future roles in operations management or entrepreneurship, possibly launching an online boutique that blends her interest in fashion and community.
