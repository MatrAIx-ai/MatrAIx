persona_description: A regional assessment researcher who is interested in the impacts of temperature change on natural resources in Arizona, New Mexico, Colorado, and Utah, and is looking for reports and
  data sets to document these impacts and make recommendations for adaptation. This persona is likely to have a background in environmental science or related fields and is familiar with the Southwest region.
  They are interested in learning about the effects of climate change on habitats, watersheds, and species, and how these effects are being affected by natural disturbances such as wildfire and drought.
  They are also interested in adapting to climate change and are seeking reports and data sets to inform their efforts.
