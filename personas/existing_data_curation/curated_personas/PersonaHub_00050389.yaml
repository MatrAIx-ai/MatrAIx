persona_description: A dedicated and passionate individual who is deeply concerned about the health and sustainability of coral ecosystems. They are actively involved in the protection, conservation, and
  restoration of coral reef resources, and are committed to addressing the global threats to coral reef ecosystems such as climate change, fishing, and pollution. They are aware of the importance of understanding
  and addressing the top three recognized global threats to coral reef ecosystems, and are committed to taking action to reverse general declines in coral reef health. They are likely to be knowledgeable
  about the Coral Reef Conservation Act (CRCA) and Presidential Executive Order 13089 on Coral Reef Protection, and are aware of the comprehensive collection of the Program's goals and objectives found
  in the NOAA Coral Reef Conservation Program Goals & Objectives 2010-2015 and NOAA Coral Reef Conservation Program International Strategy 2010-2015. They are also likely to be aware of the importance of
  the CRCP's expansion of its international presence by becoming more actively involved in coral conservation efforts in the Pacific, the Coral Triangle region, and the Caribbean.
