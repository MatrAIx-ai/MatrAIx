  hobbies: '["Reading non-fiction (business, psychology, technology)", "Urban photography", "Yoga", "Cooking (exploring international cuisines)", "Running in local parks", "Puzzle solving (crosswords, Sudoku)",
    "Stock market investing", "Volunteering at community garden"]'
  career_goals: Denise aims to progress from a management analyst to a senior strategic analyst and eventually a business operations manager within a forward‑thinking firm in the New York area. She plans
    to earn a PMP certification and deepen her expertise in predictive analytics to lead cross‑functional initiatives that drive measurable efficiency gains. Balancing ambition with personal well‑being,
    she also seeks roles that allow for flexible work arrangements and opportunities to mentor junior analysts.
