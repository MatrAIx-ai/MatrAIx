persona_description: A researcher from the Hebrew University of Jerusalem who studies the links between anxiety and metabolism, specifically focusing on the role of microRNAs in controlling regulatory networks
  shared by metabolic and anxiety-related conditions. Her research interests include the study of microRNA mechanisms involved in the disorders and their regulation by DNA-based drugs. She has previously
  published on the connection between body and mind, the physical and emotional, and the shared biological mechanisms between anxiety and inflammation.
