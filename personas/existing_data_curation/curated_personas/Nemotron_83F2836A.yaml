  career_goals: Looking ahead, Rajkumar aims to pursue a degree in civil engineering at a university with a strong emphasis on coastal infrastructure. He wants to apply his love of organization and community
    service to design resilient flood-control systems and public spaces that enhance safety and quality of life in Corpus Christi. In the short term, he plans to join summer engineering camps, earn internships
    with local municipal planning offices, and continue his involvement in school leadership. His long-term ambition is to lead multidisciplinary teams that blend technical expertise with community engagement,
    ensuring that development projects reflect the needs and values of his hometown.
