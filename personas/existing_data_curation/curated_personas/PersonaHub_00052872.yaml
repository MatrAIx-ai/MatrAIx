persona_description: A Halton Catholic District School Board procurement manager who is committed to obtaining goods and services at the lowest possible cost using competitive purchasing procedures, ensuring
  compliance with federal, provincial, and municipal legislation, and providing fair, open, and transparent procurement processes with public funds. The persona is responsible for ensuring that all Board
  staff and trustees comply with the acquisition of goods and services, and has a deep understanding of the purchasing policy, administrative procedures, and broader public sector guidelines. The persona
  is also knowledgeable about competitive bidding processes and has experience in implementing and managing procurement functions.
