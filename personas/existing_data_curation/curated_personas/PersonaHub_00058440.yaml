persona_description: A policy-maker or administrator who is responsible for establishing educational policy and practice, and is charged with the responsibility of mandating or encouraging systemic change
  in educational reform. They are likely to have a background in education or related fields, and have a strong understanding of the importance of fostering spatial thinking in students. They are committed
  to implementing systemic educational reform and have a vision for a new generation of spatially literate students. They are aware of the challenges of meeting the educational challenges and are willing
  to work with a variety of stakeholders, including educators, researchers, and policymakers, to achieve their goals.
