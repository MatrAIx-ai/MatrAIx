personas:
  professional: Lori Wierda is a nurse practitioner who blends data‑driven clinical expertise with a hands‑on, community‑focused approach, channeling their curiosity for evidence‑based practice, spontaneous
    problem‑solving, and competitive drive into quality‑improvement projects while thriving in collaborative, high‑energy environments.
  sports: Lori Wierda fuels their competitive streak on the volleyball court of a local league, shreds the trails with a Pacific Northwest mountain‑biking club, and cheers for the Seattle Seahawks, Sounders
    FC, and Kraken while never missing the annual Washington State Fair marathon.
  arts: Lori Wierda immerses themselves in the regional arts scene by attending folk gigs featuring Laura Veirs, dancing swing to the big‑band stylings of the Glenn Miller Orchestra, and performing improv
    sketches with a local troupe, letting spontaneous creativity color their weekends.
  travel: Lori Wierda favours spur‑of‑the‑moment road trips along the Washington coast, often winding up in quaint towns like Port Townsend, Astoria, and the San Juan Islands, balancing a modest travel
    budget with a penchant for discovering local food markets and scenic hiking loops.
  culinary: Lori Wierda, an enthusiastic home cook, blends cedar‑planked salmon with foraged wild mushrooms and locally sourced heirloom tomatoes into a rustic risotto, delighting friends at community potlucks
    while experimenting with seasonal herbs like ramps and sage.
  core: Lori Wierda is a data‑savvy nurse practitioner who trades meticulous health analytics for spontaneous outdoor adventures, juggling a competitive edge with a habit of over‑booking their calendar
    and a love for impromptu karaoke sessions.
background:
  cultural: Lori grew up in the Pacific Northwest as a third-generation American of mixed Scandinavian (Norwegian) and German ancestry. Her family values self-reliance, a deep respect for nature, and community
    involvement—principles reflected in her love for outdoor activities and volunteer work. Local traditions like the Washington State Fair and community potlucks have shaped her social outlook, while a
    strong work ethic inherited from her immigrant forebears drives her professional ambitions. Though culturally rooted in a White American heritage, she embraces the region's diverse perspectives, incorporating
    cultural competency into her nursing practice.
