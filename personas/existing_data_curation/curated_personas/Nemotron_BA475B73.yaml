  hobbies: '[''Hiking the Olympic Peninsula'', ''Kayaking on Puget Sound'', ''Mountain biking'', ''Community spin classes'', ''Weekend volleyball league'', ''Cooking with seasonal local produce'', ''Swing
    dancing'', ''Attending live folk music events'', ''Spontaneous road trips with spouse'', ''Volunteer health education workshops'', ''Reading sci-fi and medical thrillers'', ''Improv comedy performances'']'
  career_goals: Lori aims to expand her impact beyond the clinic by establishing a community-focused primary-care practice in Mason County that prioritizes preventive health and telehealth access for rural
    patients. She plans to pursue a Doctor of Nursing Practice (DNP) with a concentration in health informatics, enabling her to lead data-driven quality improvement projects at a regional level. Over the
    next five years, she hopes to serve as a clinical educator at a local college, publish research on chronic disease management in underserved populations, and advocate for expanded nurse-practitioner
    scope-of-practice legislation in Washington State. Her ultimate ambition is to become a recognized leader in community health innovation while maintaining a hands-on role in patient care.
