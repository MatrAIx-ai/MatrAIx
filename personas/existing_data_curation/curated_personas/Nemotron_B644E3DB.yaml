  career_goals: Christopher dreams of a future where he can help others in a structured, team‑oriented setting. He is fascinated by the idea of becoming a firefighter because the job follows clear procedures,
    requires teamwork, and directly protects the community. He also imagines being a teacher, valuing the organized classroom routine and the chance to support and guide his peers. In the meantime, he aims
    to develop leadership skills through school clubs and community service so he can make a positive impact when he grows up.
