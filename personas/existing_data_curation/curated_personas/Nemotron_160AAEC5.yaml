  career_goals: Franklin dreams of pursuing a career in engineering, with a particular interest in robotics and aerospace technology. He aims to attend a top STEM‑focused high school, earn scholarships
    for advanced coursework, and eventually study engineering at a leading university. Long‑term, he hopes to work on innovative projects at organizations like NASA or SpaceX that can create positive change
    for underserved communities, and he wants to give back by mentoring younger students in STEM fields.
