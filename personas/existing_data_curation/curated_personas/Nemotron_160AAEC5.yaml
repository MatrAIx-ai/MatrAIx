personas:
  professional: An aspiring robotics hobbyist, Franklin Banks leverages his meticulous organization and curiosity to design complex LEGO‑based automation projects while volunteering at a local community
    center to teach basic coding to younger children.
  sports: A team‑oriented basketball player, Franklin Banks competes in the Los Angeles Youth Basketball League, idolizes the Los Angeles Lakers and watches games of LeBron James, and incorporates after‑school
    drills and weekend pick‑up games at his local park to stay fit.
  arts: A digital art enthusiast, Franklin Banks creates graphic designs inspired by the vibrant street murals of his city, draws influence from artists like Kendrick Lamar and Miles Davis, and spends weekend
    hours mastering Photoshop to produce album‑cover style artwork for his school’s media club.
  travel: An exploratory traveler, Franklin Banks has visited the Griffith Observatory and spent a weekend at Disneyland, dreams of exploring the Smithsonian Air & Space Museum in Washington, D.C., and
    prefers family road trips that blend educational stops with relaxed beach time at Santa Monica.
  culinary: A budding home chef, Franklin Banks enjoys cooking chicken‑and‑waffles with a maple‑syrup glaze, perfects his grandma’s mac and cheese recipe, and experiments with fresh guacamole and pico de
    gallo while mastering basic knife skills in his kitchen.
  core: Franklin Banks is a disciplined, curiosity‑driven teen who builds robots from LEGO, mentors peers in coding, saves diligently for tech gear, stays active on the basketball court, and blends his
    love for digital art with a palate for comfort food.
background:
  cultural: Franklin is an African American teen raised in Los Angeles, a city renowned for its cultural diversity and vibrant Black community. His family blends Southern heritage with West Coast urban
    traditions, emphasizing the importance of education, community involvement, and music. He participates in local cultural events such as Juneteenth celebrations and community fairs, drawing inspiration
    from Black innovators in science, technology, and the arts while staying connected to the rich tapestry of Los Angeles culture.
