  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Quilting'', ''Playing bridge'', ''Playing chess'', ''Walking and birdwatching'', ''Attending community theater'', ''Participating in senior
    center activities'', ''Celebrating cultural holidays (Día de los Muertos, Cinco de Mayo)'', ''Learning new recipes and horticultural techniques'']'
  career_goals: Although retired, Perla aims to remain an active pillar of her senior center by leading cultural workshops that teach Mexican recipes and storytelling. She aspires to win the local gardening
    competition with her heritage herbs, publish a short memoir of her family's migration story, and mentor younger volunteers in organizing community events. Maintaining her health, independence, and mental
    sharpness through continued learning and social engagement are her primary personal ambitions.
