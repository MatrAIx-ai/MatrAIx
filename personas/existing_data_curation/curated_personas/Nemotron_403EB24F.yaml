personas:
  professional: Kevin Allen, a budding problem‑solver who spends hours assembling block towers and testing their stability, blends innate curiosity with pragmatic tinkering, showing early signs of an engineering
    mindset despite a relaxed approach to clean‑up and a tendency to lose a few pieces in the process.
  sports: Kevin Allen, a lively toddler who loves kicking a soft orange soccer ball at the community park, eagerly watches their local heroes from the City FC and occasionally joins the weekday toddler
    gymnastics class, yet prefers solitary play over organized team drills.
  arts: Kevin Allen, a budding fan of bright melodies who hums along to Baby Shark and Disney’s Let It Go while finger‑painting scenes from Sesame Street, finds solace in the vivid colors and rhythmic beats
    of their favorite early‑childhood tunes.
  travel: Kevin Allen, a curious explorer who prefers impromptu trips to nearby playgrounds and occasional family outings to the San Diego Zoo or Disneyland, enjoys short flights to see the Eiffel Tower
    but can become overwhelmed by crowded airports, reflecting a love for flexibility over rigid itineraries and their willingness to adapt to new surroundings.
  culinary: Kevin Allen, a picky eater who adores creamy mac and cheese with a sprinkle of cheddar and soft banana slices, often helps stir the pot with a plastic spoon but easily rejects broccoli or spicy
    foods, preferring simple, bland flavors and their love for familiar textures.
  core: Kevin Allen, a curious yet disorganized toddler who thrives on spontaneous play, prefers solitary discovery, and balances a competitive streak with a relaxed attitude toward routines; they often
    let their imagination guide them through new experiences.
background:
  cultural: Kevin is a white child raised in Reno, Nevada, within a typical suburban Western American setting. His family embraces middle‑class values of independence, practicality, and modest self‑reliance.
    He is exposed to American cultural norms such as celebrating Thanksgiving, Independence Day, and other holidays, and frequently participates in outdoor activities like hikes in the nearby Sierra Nevada,
    community park visits, and local family‑oriented events. These cultural influences shape his comfort with small social groups, appreciation for flexibility, and pragmatic outlook.
