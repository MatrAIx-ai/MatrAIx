  hobbies: '[''Fishing at Lake Georgetown'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Reading Mexican‑American literature'', ''Woodworking projects'', ''Attending small church gatherings'',
    ''Collecting vintage tools'']'
  career_goals: Agapito hopes to advance within his plant to a senior lead assembler position where he can mentor younger workers and oversee the implementation of efficiency initiatives. He plans to earn
    the Certified Production Technician credential and eventually move into a supervisory role that balances hands‑on work with process‑improvement responsibilities. Over the next five years he also wants
    to set aside funds to start a small side business building custom furniture, using his fabrication skills and love of traditional Mexican designs, while ensuring a stable, stress‑free retirement.
