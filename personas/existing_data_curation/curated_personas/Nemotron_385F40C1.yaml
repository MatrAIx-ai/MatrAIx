  hobbies: '[''Fishing'', ''Hunting'', ''Truck restoration'', ''Hiking'', ''Reading business and DIY books'', ''Acoustic guitar'', ''Community service'', ''Card games'', ''Live music outings'']'
  career_goals: Dustin aims to progress to a regional sales manager role within the next five years, overseeing a small team while retaining the autonomy he values. He plans to deepen his expertise in high‑value
    industrial automation products and earn professional sales certifications such as the Certified Professional Sales Leader (CPSL). In the longer term, he envisions launching his own consulting firm that
    helps midsize manufacturers optimize their distribution channels, blending his practical sales experience with his curiosity about emerging technologies. He also hopes to achieve consistently top‑quartile
    sales performance, providing a stable financial foundation without sacrificing flexibility.
