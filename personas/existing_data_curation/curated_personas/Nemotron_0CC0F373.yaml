  hobbies: '[''Building block towers'', ''Coloring and drawing'', ''Singing nursery rhymes'', ''Playing at the park (slides, swings, sandbox)'', ''Listening to storytime and reading picture books'', ''Imaginative
    play with stuffed animals'', ''Watching educational videos about numbers and letters'']'
  career_goals: Leslie enjoys caring for her stuffed animals and often pretends to be a teacher or a caregiver. She repeatedly says she wants to be a teacher when she grows up so she can share stories and
    help friends learn. She also dreams of becoming a veterinarian, caring for real animals. Her love of order and harmony guides her ambition toward a future role where she can keep things organized and
    create a calm, supportive environment for children.
