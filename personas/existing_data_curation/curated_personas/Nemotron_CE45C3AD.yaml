  hobbies: '[''Gardening'', ''Cooking (Vietnamese‑Texan fusion)'', ''Reading historical fiction'', ''Playing chess'', ''Volunteering at cultural festivals'', ''Walking nature trails'', ''Playing harmonica'',
    ''Genealogy research'', ''Senior technology clubs'']'
  career_goals: As a retired educator, Quoc focuses on giving back to his community. He aims to volunteer as a mentor for early‑career teachers at the local school district, develop culturally responsive
    adult‑learning workshops, and assist the Red Oak senior center with literacy and technology sessions. He also aspires to document and share his family's Vietnam‑Texas heritage through oral histories
    and occasional guest talks, and to earn a volunteer certification in elder counseling to better support aging neighbors.
