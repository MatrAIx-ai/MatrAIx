personas:
  professional: John Mia is a reliable handyman in Bolingbrook who leverages their meticulous carpentry, plumbing, and electrical troubleshooting skills to provide predictable, high‑quality home‑repair
    services, while pursuing certification and a future public‑works role.
  sports: John Mia enjoys weekend fishing with the Bolingbrook Anglers Association, cheers on the Chicago Cubs and Bears, participates in a church‑sponsored softball league, and maintains a simple home‑gym
    routine of push‑ups and resistance bands to stay fit.
  arts: John Mia savors classic cinema, regularly watching Alfred Hitchcock thrillers and Stanley Kubrick’s masterpieces, devours mystery novels by Agatha Christie, and attends occasional community theater
    productions featuring local actors to indulge their love of storytelling.
  travel: John Mia prefers low‑key road trips, having explored the historic streets of Chicago, the lakeside charm of Milwaukee, and the scenic trails of Hocking Hills, while dreaming of a future visit
    to Yellowstone National Park for its geysers and wildlife.
  culinary: John Mia cooks hearty meals using garden harvests like tomatoes, carrots, and kale, perfecting dishes such as vegetable minestrone, grilled trout with lemon‑dill, and classic meatloaf, while
    experimenting with cumin and smoked paprika to add depth to their family‑style dinners.
  core: John Mia is a methodical handyman who can fix a leaky faucet faster than they finish a mystery novel, yet they hoard discount catalogues and often procrastinate on their GED studies.
background:
  cultural: John was raised in the Midwestern suburb of Bolingbrook, Illinois, within a largely white, middle‑class community with strong family and community ties. His heritage includes German and Irish
    ancestry common to the region, and his upbringing emphasized practicality, self‑reliance, and modesty. He grew up attending a local Catholic church, which instilled values of service, humility, and
    respect for tradition. These cultural influences shape his preference for structure, his cooperative nature, and his focus on maintaining harmony within his family and neighborhood.
