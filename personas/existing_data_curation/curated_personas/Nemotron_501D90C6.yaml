  hobbies: '[''gardening'', ''workshop woodworking'', ''fishing'', ''reading mystery novels'', ''watching classic films'', ''volunteering at church food bank'', ''playing card games with small group'']'
  career_goals: John aims to turn his practical handyman abilities into a reliable part‑time source of income. He plans to obtain a certification in home repair through a local vocational program, which
    would allow him to offer services such as lawn care, minor renovations, and maintenance contracts to neighbors in Bolingbrook. He also hopes to complete his GED within the next two years to broaden
    his employment options, and eventually secure a stable position with the Will County public works department where his attention to detail and reliability would be valued.
