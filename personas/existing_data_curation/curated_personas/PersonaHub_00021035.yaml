persona_description: A state governor who is passionate about improving the preparedness and response capabilities of state and local agencies during disasters. This person has a deep understanding of the
  importance of sharing public health and homeland security information and is committed to taking action to promote a cross-agency culture of preparedness, direct agencies to coordinate preparedness and
  response capabilities, use state and local fusion centers to improve information sharing, take advantage of federal programs that fund efforts to coordinate public health and homeland security agencies,
  and leverage cross-agency partnerships to support the state's intelligence enterprise. This person has a strong desire to improve the situational awareness of emerging threats and disaster response, and
  is willing to take on the challenges of leading state efforts to improve homeland security and public health information sharing.
