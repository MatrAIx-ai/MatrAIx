personas:
  professional: Ruby Williams, a veteran curriculum designer and former university lab manager, leverages their rigorous background in applied mathematics and physics, mastery of R, Python, and MATLAB,
    and disciplined, detail‑oriented approach to create award‑winning STEAM programs that seamlessly blend watercolor art techniques, equestrian themes, and data‑driven assessments while maintaining high
    standards and a competitive edge in grant procurement.
  sports: Ruby Williams, a member of the Aiken Equestrian Club who enjoys attending spring horse shows and weekly morning walks, follows the South Carolina Gamecocks football team and the Atlanta Braves,
    and maintains a disciplined fitness regimen that includes low‑impact yoga and occasional tennis matches at the local community center, reflecting their competitive yet organized nature.
  arts: Ruby Williams, an avid watercolorist who frequents the Aiken Art Center, draws inspiration from Monet’s impressionist palettes and O’Keeffe’s bold forms, regularly curates mini‑exhibitions featuring
    local artists such as Sarah Thompson, and attends live performances by folk singer Joan Baez, integrating these experiences into their STEAM lessons.
  travel: Ruby Williams prefers meticulously planned cultural trips, having explored historic Charleston, Savannah’s riverfront, and the colonial streets of Williamsburg, while they dream of a scholarly
    pilgrimage to Oxford’s university libraries and a summer art retreat in Provence, balancing their love of history with a competitive desire to check every museum off their list.
  culinary: Ruby Williams, a confident home chef, reveres Southern staples like shrimp‑and‑grits with a dash of smoked paprika, collard greens seasoned with smoked turkey, and peach cobbler topped with
    toasted pecans, while they frequently experiment with modern twists such as quinoa‑based jambalaya and miso‑infused pecan pie, reflecting their disciplined, curious palate.
  core: Ruby Williams merges a lifelong fascination for mathematics with a painter’s eye for detail, habitually cross‑checking grant budgets in watercolor margins, yet they can be obsessively meticulous—often
    redrawing lesson plans late into the night—and occasionally skeptical of collaborators’ motives, making them both a relentless innovator and a charmingly exacting mentor.
background:
  cultural: 'Ruby was raised in a middle‑class white family in the American South, where hospitality, community involvement, and respect for tradition were core values. Her upbringing blended Southern customs—church
    gatherings, Southern cuisine, and the region’s equestrian culture—with a progressive academic environment that encouraged curiosity and interdisciplinary thinking. After completing a graduate degree
    in STEM, she embraced a career in higher education while staying rooted in Aiken, a town known for its historic charm and vibrant arts scene. This background informs her balanced worldview: a deep appreciation
    for Southern heritage coupled with an open‑minded drive to explore new ideas, merge art and science, and contribute meaningfully to her community.'
attributes:
  skills: '["Applied Mathematics", "Physics Instruction", "Curriculum Development", "Laboratory Management", "Statistical Analysis (R, SPSS)", "Programming (Python, MATLAB)", "Educational Technology (Canvas,
    Blackboard)", "Instructional Design", "Grant Writing", "Interdisciplinary STEAM Integration", "Data Visualization", "Project Management"]'
  hobbies: '["Watercolor Painting", "Visiting Art Galleries", "Southern Gardening", "Equestrian Events", "Historical Fiction Reading", "Genealogy Research", "Puzzle Solving (Crosswords, Sudoku)", "Volunteer
    at the Aiken Historical Society", "Online Science Lectures", "Cooking Southern Cuisine"]'
  career_goals: Before retiring, Ruby aims to launch a sustainable STEAM program that links Aiken schools with local art and equestrian institutions, publish a practitioner‑focused guide on integrating
    visual arts into science curricula, and secure a regional grant to fund a traveling science‑art exhibition for underserved youth. She also plans to mentor a cohort of emerging teaching assistants, earn
    a distinguished teaching award from the state university system, and leave a legacy of interdisciplinary teaching excellence in her community.
