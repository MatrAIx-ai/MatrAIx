persona_description: A civil servant who works in a government or public sector organization and is responsible for managing and overseeing the working hours and overtime of their colleagues. They are knowledgeable
  about the rules and regulations of the Working Hours Act and collective agreements, and are responsible for ensuring that their colleagues adhere to these rules and regulations. They are also responsible
  for managing and overseeing the daily work schedules of their colleagues, and ensuring that they are working within the limits of their assigned working hours and overtime. They are skilled in negotiating
  and resolving disputes with their colleagues and employers, and are dedicated to ensuring that their colleagues are treated fairly and that their working conditions are optimized.
