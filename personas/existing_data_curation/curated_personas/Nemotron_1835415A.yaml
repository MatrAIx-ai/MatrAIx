personas:
  professional: Glenn Brown, a 15‑year‑old aspiring TikTok content creator, blends beach cinematography, quick sketches, and guitar jams into short videos that highlight their curiosity and love for community,
    while their relaxed attitude toward deadlines means they often film whenever inspiration strikes rather than following a strict schedule.
  sports: Glenn Brown, a fan of the Tampa Bay Buccaneers and the Florida Gators, participates in the Fort Walton Beach Junior Surf Club and a local beach volleyball league, and while they enjoy hanging
    out at games and practicing drills, they prefer fun‑focused sessions over intense training regimens.
  arts: 'Glenn Brown, an avid TikTok creator who sketches beach scenes, binge‑watches indie animated films like "Luca" and "Spider‑Man: Into the Spider‑Verse," reads graphic novels such as "Saga" and "Heartstopper,"
    and they jam to Jack Johnson and the indie band The 1975 at local street festivals, letting these artistic influences shape their personal style and storytelling.'
  travel: Glenn Brown, who loves spontaneous road trips to nearby Destin and Panama City Beach and dreams of backpacking through Cabo San Lucas and Bali, plans trips on a whim with friends, balances a modest
    travel budget with parental guidance, and prefers a mix of beach relaxation and cultural exploration.
  culinary: Glenn Brown, a moderate‑skill home chef who delights in grilling shrimp po'boys, whipping up grouper tacos with mango salsa, and topping key lime pie with fresh whipped cream, favors ingredients
    like lime, cilantro, and smoked paprika, and enjoys trying new recipes after beach clean‑up events.
  core: Glenn Brown, a sociable 15‑year‑old who mixes curiosity, a laid‑back vibe, and a knack for community‑focused creativity into everything from TikTok clips to beach clean‑ups, often juggling spontaneous
    fun with occasional forgetfulness.
background:
  cultural: Glenn grew up in Fort Walton Beach, a coastal community in the Florida Panhandle with a strong Southern‑hospitality vibe and a heavy tourism and military presence. His family participates in
    typical Gulf Coast traditions—summer beach outings, seafood cook‑outs, Fourth of July fireworks, and frequent attendance at local church events. Exposure to nearby military families and the diverse
    tourist crowd has given him an openness to new ideas while his upbringing retains the laid‑back, community‑oriented values of the region.
attributes:
  skills: '[''public speaking'', ''improvisational communication'', ''sketching'', ''digital photography'', ''basic video editing'', ''guitar basics'', ''informal event coordination'']'
