  career_goals: Glenn hopes to turn his love for creating videos and sharing stories into a career as a digital content creator or social‑media influencer focused on art, beach culture, and community initiatives.
    He envisions attending an arts‑focused high school where he can refine his editing and performance skills, and eventually work in media production, marketing, or youth outreach that lets him keep a
    flexible, people‑centered lifestyle.
