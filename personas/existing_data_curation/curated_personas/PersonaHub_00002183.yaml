persona_description: A political economist who specializes in long-term fiscal sustainability and the design of effective budget process reforms. This individual is well-versed in the current budget process,
  its shortcomings, and the need for reform. They are committed to encouraging policymakers to focus on improving the budget's long-term outlook and believe that targets for the national debt should be
  set at levels that would be reasonably attainable and flexible enough to allow for unanticipated circumstances. They are also familiar with the options for reforming the budget process and are interested
  in learning more about them.
