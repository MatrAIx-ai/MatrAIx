personas:
  professional: Milton Mayfield, a 19‑year‑old aspiring automotive technician, merges their curiosity for how machines work with a practical, hands‑on skill set in engine repair and basic electronics, and
    leverages their cooperative nature to keep workshop teams harmonious, even as their laid‑back approach sometimes leads to missed paperwork.
  sports: Milton Mayfield, a 19‑year‑old resident of the Detroit area, follows the Detroit Lions and Red Wings, participates in weekend pick‑up basketball at the local park, hikes the trails of Lake St. Clair
    Metropark for cardio, and maintains a casual gym routine that fluctuates with their flexible schedule.
  arts: Milton Mayfield, an avid fan of classic rock and blues, spends evenings listening to Led Zeppelin, B.B. King, and Stevie Ray Vaughan while also watching indie documentaries on automotive engineering,
    and occasionally sketches car designs in a battered notebook as a creative outlet.
  travel: Milton Mayfield, who enjoys road‑trip adventures on a modest budget, has explored nearby Detroit’s automotive museums, camped along the shores of Lake St. Clair, and dreams of a spring pilgrimage
    to Japan’s Nissan Global Headquarters to study cutting‑edge car technology, but tends to postpone detailed itineraries until the last minute.
  culinary: Milton Mayfield, a self‑taught home cook, favors hearty American fare like cheeseburger sliders with caramelized onions, smoky BBQ ribs, and homemade chili using black beans and chipotle, often
    experimenting with DIY spice rubs while occasionally ordering takeout sushi as a treat after a long weekend of tinkering.
  core: Milton Mayfield, a 19‑year‑old gear‑head with a curious mind and a laid‑back streak, balances hands‑on tinkering with occasional procrastination, channeling worries into meticulous model kits while
    sometimes forgetting to pay bills on time.
background:
  cultural: Milton is a white, Midwestern American raised in Warren, Michigan. His family traces its roots to German and Irish immigrants who settled in the Detroit metropolitan area. The local culture
    emphasizes hard work, modesty, and a communal spirit tied to the region's automotive heritage. He grew up attending public schools, participating in neighborhood church gatherings, and celebrating traditional
    holidays such as Thanksgiving and the Fourth of July with fireworks and parades. This background instilled a blend of practicality, community cooperation, and a subtle appreciation for the area's car
    culture.
