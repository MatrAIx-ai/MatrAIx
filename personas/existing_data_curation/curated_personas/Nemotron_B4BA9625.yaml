  hobbies: '[''Car engine tinkering and maintenance'', ''Model kit building (cars, airplanes)'', ''Simulation video gaming'', ''Listening to classic rock and blues music'', ''Hiking in local state parks'',
    ''Attending local car shows and community fairs'']'
  career_goals: Milton aims to secure a stable trade apprenticeship in automotive technology or electrical work, valuing hands‑on learning and steady income. He hopes to obtain certifications that enable
    him to work in a reputable garage or utility company, while also exploring part‑time community service roles that let him apply his cooperative nature. Over the next five years, he wants to become a
    certified technician, gain financial independence, and eventually consider further education in applied technology if it aligns with his practical interests.
