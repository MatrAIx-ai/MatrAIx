  career_goals: Although still young, Abisai frequently shares ambitious dreams that blend his love of art, science, and helping others. He imagines becoming an astronaut who paints the stars, a muralist
    who captures stories on large walls, or a scientist‑inventor who designs gadgets that make people feel calm. He expresses a desire to create things that spark curiosity and bring joy, reflecting his
    organized drive to see projects through from idea to completion.
