personas:
  professional: Abisai Rodriguez, a five‑year‑old aspiring architect, builds intricate fortresses from cardboard, combining methodical planning with a love for abstract shapes, while channeling their preference
    for solitude into focused, solo creations.
  sports: Abisai Rodriguez, a five‑year‑old who prefers quiet play, participates in the Little Tigers Soccer Club’s weekend mini‑kick sessions and enjoys swimming lessons at the community pool’s toddler
    class, while often watching the San Antonio Spurs games on TV for inspiration.
  arts: Abisai Rodriguez, a five‑year‑old enthusiastic about color and story, loves drawing whimsical creatures inspired by the animated works of Pixar’s "Coco" and the playful melodies of guitarist Tommy
    Emmanuel, and spends afternoons listening to the soothing piano pieces of Yiruma while recreating scenes with crayons.
  travel: Abisai Rodriguez, a five‑year‑old explorer, enjoys family road trips to the nearby coastal town of Santa Cruz for beach sandcastle building and has a budding wish to see the giant redwoods of
    California’s Redwood National Park, while preferring meticulously planned itineraries over spontaneous adventures.
  culinary: Abisai Rodriguez, a five‑year‑old with a selective palate, adores cheese pizza topped with pepperoni and olives, relishes macaroni and cheese with extra cheddar, but consistently rejects broccoli
    and cauliflower, and often helps stir batter for banana pancakes using ripe bananas and cinnamon.
  core: Abisai Rodriguez, a five‑year‑old whose boundless imagination fuels solitary, methodical play, yet whose intense emotional swings and occasional impulsive cravings make everyday life a blend of
    creative brilliance and gentle turbulence.
background:
  cultural: Abisai grows up in a Mexican‑American household where Spanish is spoken alongside English, giving him early bilingual exposure. His family celebrates traditional Mexican holidays such as Día
    de los Muertos, Las Posadas during Christmas, and incorporates Mexican cuisine—tacos, quesadillas, and fresh fruit—into everyday meals. He often hears folk songs and sees bright colors in family decorations,
    which influence his artistic style. Living in Meridian, Idaho, he also participates in local community events, attends a bilingual preschool, and enjoys the region's outdoor spaces, blending his cultural
    heritage with his Pacific Northwest surroundings.
