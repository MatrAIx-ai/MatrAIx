persona_description: A landscape architect who is interested in documenting the landscapes created during the Great Depression through the Historic American Landscapes Survey (HALS) challenge. They are
  a member of the American Society of Landscape Architects and the National Park Service, and have completed at least one HALS short format history to document the landscapes of the New Deal. They are passionate
  about preserving and documenting the history of landscapes in the United States and are eager to participate in the 2014 HALS Challenge to document the landscapes created during the Great Depression.
