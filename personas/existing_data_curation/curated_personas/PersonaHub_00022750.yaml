persona_description: A political scientist who specializes in international trade law and policy, particularly in the field of biotechnology regulations. He is interested in the scientific evidence and
  the regulatory implications of gene-spliced organisms, and he is concerned about the potential economic and environmental impacts of such regulations. He is aware of the political and economic interests
  of major agribusinesses and is skeptical of the regulatory approach proposed by the United States. He is interested in the broader implications of biotechnology regulations and their impact on global
  trade and security.
