persona_description: A Registered Dietitian who is passionate about translating science and nutritional research into practical advice that is easily understandable and useful to their unique situation.
  They are dedicated to supporting the nutritional health of the population through health promotion, disease prevention, treatment, support, and rehabilitation. They have a background in physiology, biochemistry,
  microbiology, biology, and nutrition and are highly accountable for their conduct and the care they provide. They are a regulated health professional who is uniquely trained to advise on diet, food, and
  nutrition and are skilled educators in promoting behavior change relative to food choices, eating behavior, and preparation methods to optimize health. They are a resource within the health care team
  and have the skills to develop plans based on comprehensive needs assessments and monitor progress, provide ongoing supports, and evaluate outcomes.
