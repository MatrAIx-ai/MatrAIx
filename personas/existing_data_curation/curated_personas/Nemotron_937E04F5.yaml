  hobbies: '["Gardening","Quilting and knitting","Hiking in Stone Mountain Park","Reading mystery novels","Listening to classic rock","Attending church services","Volunteering at local craft fairs","Exploring
    Southern cooking recipes"]'
  career_goals: Francelia aims to formalize her expertise by obtaining a Georgia state cosmetology license and completing a certification in advanced nail artistry. Her long‑term ambition is to open a small
    boutique nail studio in Stone Mountain that offers a curated menu of high‑quality services, featuring her signature art style. She hopes to mentor a new generation of nail technicians through an apprenticeship
    program, and eventually develop a limited line of custom nail polish shades that reflect her Southern‑Italian heritage. Financially, she plans to secure a modest business loan, build a loyal client
    base through referrals, and achieve sustainable profitability within three years of opening the studio.
