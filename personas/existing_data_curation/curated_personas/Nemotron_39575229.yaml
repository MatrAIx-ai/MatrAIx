  hobbies: '[''Urban Gardening'', ''Reading Historical Fiction'', ''Soul Food Cooking'', ''Gospel Music'', ''Yoga'', ''Beach Walking'', ''Volunteer Work at Community Pantry'', ''Women’s Bible Study'']'
  career_goals: Rosa aims to advance to a senior supply‑chain leadership role within the next five years, ideally as a Director of Procurement, where she can champion sustainable and diverse sourcing practices.
    She plans to earn an associate’s degree in Business Administration and a Certified Professional Purchasing Manager (CPPM) credential to formalize her expertise. Rosa also hopes to mentor emerging talent,
    particularly women of color in procurement, and to develop personal coping strategies—such as mindfulness training—to better manage her heightened emotional reactivity.
