personas:
  professional: Rohan Reddy, a 3-year-old with a budding talent for building elaborate block structures, treats each arrangement like a miniature architectural project, applying methodical planning and
    an imaginative flair to his play.
  sports: Rohan Reddy, a 3-year-old enrolled in the Tiny Tots Soccer Club’s weekly practice and a regular attendee of the Little Leapers gymnastics class, enjoys watching the Metro City Mavericks basketball
    team on TV, favors structured playtime over chaotic free-run, and insists on a set routine for stretching before any activity.
  arts: Rohan Reddy, a 3-year-old who craves bright, abstract art, spends afternoons drawing fantastical creatures inspired by Dr. Seuss and dancing to The Wiggles, while occasionally mimicking the poised
    movements of ballerina Misty Copeland, turning imagination into a daily creative ritual.
  travel: Rohan Reddy, a 3-year-old who loves short, sensory-rich trips, has visited the San Diego Zoo, spent a magical weekend at Disney World in Orlando, and dreams of exploring the lantern festivals
    of Kyoto, always traveling with parents who plan itineraries around nap times and snack breaks.
  culinary: Rohan Reddy, a 3-year-old with a sweet tooth for macaroni and cheese, banana pancakes drizzled with honey, and peanut butter-jelly sandwiches, enjoys helping stir batter in a plastic bowl, frequently
    demands the bright orange of carrot sticks yet often rejects broccoli, and collects fun-shaped cookie cutters for imaginative snack creations.
  core: Rohan Reddy, a 3-year-old block-building architect with a meticulous eye, a piggy-bank hoarder of glittery stickers, a sensitive soul prone to sudden anxiety, and a vivid imagination that transforms
    everyday moments into grand adventures.
background:
  cultural: Rohan comes from a South Asian (Telugu‑speaking) family that maintains cultural traditions such as celebrating Diwali and Sankranti, preparing familiar dishes like idli, dosa, and sambar, and
    speaking both English and Telugu at home. Living in Redmond, Washington, he is exposed to a multicultural community and a technology‑focused environment, which blends his family's emphasis on education
    and imagination with the local encouragement of creativity and innovation. His upbringing balances the warmth of Indian family gatherings with the independent, exploratory play encouraged by his surroundings.
attributes:
  skills: '[''basic spoken language and vocabulary'', ''color and shape recognition'', ''simple puzzle solving'', ''block building with step‑by‑step planning'', ''asking exploratory "why" questions'', ''following
    daily routines'', ''sharing and cooperative play in small groups'']'
  hobbies: '[''block building and design'', ''drawing and coloring'', ''listening to music (nursery rhymes and lullabies)'', ''watching animated educational shows'', ''exploring nature in parks'', ''pretend
    play as astronaut or artist'']'
  career_goals: Rohan frequently talks about becoming a "space explorer" or a "story painter" when he grows up. He dreams of creating pictures that tell big stories, building rockets that travel to distant
    planets, and helping people understand how things work. These ambitions surface in his pretend play, where he acts as an astronaut, a scientist, or an artist, indicating an early orientation toward
    creative and scientific fields.
