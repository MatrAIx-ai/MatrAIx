persona_description: 'A professor of humanities who specializes in the philosophy of insults, particularly the nature, purpose, and effect of these words. He employs a wide range of examples from various
  disciplines to explore the role of insults in shaping beliefs about character, honor, free speech, social interaction, and law. His book, Sticks and Stones: The Philosophy of Insults, explores the complex
  and critical form of power play implicit in insults and draws on a multitude of disciplines including philosophy, psychology, anthropology, linguistics, and legal studies to illustrate how the assertions
  and assumptions of dominance in insults constitute a serious and critical form of power play. He finds no shortage of material to draw on for the book, touching on topics such as the recent uproar over
  the publication of Danish cartoons depicting images of the Islamic Prophet Muhammad, the European institution of dueling and honor, the origin of rap music in underground insult contests in the black
  community, and the sexual component of certain types of insult. His previous books include Emotion, Thought, and Therapy and A Tear is an Intellectual Thing: The Meanings of Emotion. He is also the editor
  of the Cambridge Companion to Freud.'
