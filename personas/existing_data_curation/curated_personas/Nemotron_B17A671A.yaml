    Rican dishes (mofongo, arroz con gandules)'']'
  career_goals: Marcos aims to complete his associate’s degree and transfer to a bachelor’s program in Business Administration with a focus on sustainable development. In the short term, he plans to secure
    an internship with the municipal planning office of Patillas or a local nonprofit that works on coastal conservation, where he can apply his project‑management and data‑analysis skills. His longer‑term
    ambition is to become a project manager or community‑development specialist who designs and implements programs that promote eco‑tourism, youth empowerment, and infrastructure improvement in his hometown.
    He also envisions eventually launching a small venture that combines his culinary heritage with sustainable practices—such as a catering service featuring locally sourced ingredients and promoting Puerto
    Rican food culture. Throughout his career, Marcos is committed to continuous learning, obtaining certifications in project management (e.g., PMP) and enhancing his technical skills to support community-oriented
    initiatives.
