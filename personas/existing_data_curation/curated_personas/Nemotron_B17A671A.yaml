personas:
  professional: Marcos Espinel, a methodical associate‑degree student majoring in Business Administration with a focus on sustainable development, leverages their bilingual communication skills, Excel data‑tracking
    expertise, and budding Python automation to coordinate community clean‑up events and produce polished project proposals for local NGOs, while their curiosity drives them to constantly explore new sustainability
    frameworks.
  sports: Marcos Espinel, an enthusiastic player on the Patillas Community Basketball Club and occasional forward for the local pick‑up soccer squad, follows the Miami Heat and the Caribbean Soccer Federation’s
    regional league, while dedicating weekend mornings to trail runs along the Laguna Grande and reef snorkeling for active recovery.
  arts: Marcos Espinel, a passionate amateur photographer who curates sunrise shots and marine life on Instagram, draws inspiration from Annie Leibovitz and Sebastião Salgado, strums a few chords of salsa
    and folk tunes on an acoustic guitar learned via YouTube, and enjoys listening to Marc Anthony, Bad Bunny, and traditional island folk ballads.
  travel: Marcos Espinel, an eco‑tourism enthusiast who plans trips with a blend of spontaneous day‑hikes at Laguna Grande and detailed itineraries for future backpacking adventures in Costa Rica’s rainforests
    and Iceland’s glaciers, prefers budget‑friendly hostels but dreams of a sustainable boutique stay on a Caribbean island.
  culinary: Marcos Espinel, a home‑cook who flawlessly prepares mofongo with shrimp, arroz con gandules seasoned with sofrito, and fresh herb‑infused salads from their community garden, enjoys experimenting
    with plantain‑based desserts like dulce de plátano, and balances intermediate culinary skill with occasional over‑salting when multitasking between cooking and editing photos.
  core: Marcos Espinel, a diligent 19‑year‑old who blends analytical project management with artistic photography, eco‑focused community work, and a penchant for late‑night gaming, while occasionally succumbing
    to impulse camera gear purchases and neglecting dental floss.
background:
  cultural: Marcos was born and raised in Patillas, a coastal municipality in the southeastern part of Puerto Rico. His family reflects the island’s blend of Spanish, African, and Taíno heritage, and he
    grew up speaking Spanish at home while also being comfortable in English through school and community interactions. The culture of Patillas, with its close‑knit neighborhoods, strong emphasis on family
    gatherings, and vibrant local festivals such as the Fiesta Patronal, has shaped his values of community solidarity and respect for tradition. He celebrates holidays like Navidad and Three Kings Day
    with traditional foods, music, and religious customs, reflecting both Catholic influences and broader Puerto Rican practices. The island’s natural environment—from its beaches to its rainforests—has
    fostered Marcos’s appreciation for conservation and the outdoors. Economic challenges on the island have also taught him resilience and a pragmatic approach to opportunities, while his exposure to a
    multicultural society has nurtured an openness to diverse ideas.
