  hobbies: '["Playing the cuatro", "Salsa and plena dancing", "Cooking traditional Puerto Rican cuisine", "Soccer", "Gardening", "Reading theological and self-help literature", "Participating in community
    festivals"]'
  career_goals: Alejandro aims to broaden his parish’s social impact by establishing a permanent counseling center for families facing anxiety and depression, launching an inter‑faith dialogue series, and
    expanding youth ministry across neighboring barrios. He aspires to publish a collection of reflections on faith and resilience, and eventually serve as a diocesan coordinator for community outreach,
    leveraging his spontaneity and compassion to inspire broader ecclesial initiatives.
