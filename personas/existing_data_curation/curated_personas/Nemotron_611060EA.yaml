personas:
  professional: An aspiring robotics enthusiast, Joan Brackett blends her curiosity for Arduino circuits with a practical mindset, channeling her love of sci‑fi storytelling into designing simple autonomous
    bots for school projects, while they often improvise solutions on the fly due to a relaxed attitude toward strict planning.
  sports: Joan Brackett, a forward on the local Macon Girl Soccer Club, idolizes Atlanta United FC and the Atlanta Hawks, juggling weekend hikes on the Ocmulgee River trails with after‑school soccer drills,
    yet their competitive streak occasionally clashes with teammates as they prioritize personal scoring over collaborative play.
  arts: Joan Brackett channels creative energy into sketching river landscapes on a tablet while strumming acoustic renditions of classic rock legends like The Beatles and country icons such as Johnny Cash,
    and they pepper their short TikTok cooking clips with whimsical references to sci‑fi authors Isaac Asimov and Ursula K. Le Guin.
  travel: Joan Brackett dreams of weekend road trips to the Great Smoky Mountains for hiking, has already explored the historic streets of Savannah on a school field trip, and they favor spontaneous itineraries
    over rigid plans, usually booking family vacations around the Cherry Blossom Festival when budget and school schedules allow.
  culinary: Joan Brackett delights in whipping up buttery cupcakes with swirl frosting for family gatherings, balances that with a fondness for Southern staples like buttermilk fried chicken and sweet tea,
    and they experiment by adding a dash of cinnamon to mac‑and‑cheese, though they often forget to preheat the oven until the last minute.
  core: Joan Brackett fuses teenage curiosity in robotics with a laid‑back, sometimes disorganized drive, sprinkling life with cupcakes, soccer goals, and sci‑fi daydreams while rarely missing a chance
    to showcase a witty TikTok twist.
background:
  cultural: Joan comes from a middle‑class white family in Macon, Georgia, where Southern hospitality and community ties are emphasized. Her upbringing includes regular church gatherings, family meals featuring
    Southern comfort foods like fried chicken and sweet tea, and participation in local events such as the Cherry Blossom Festival. The region’s music heritage, especially classic rock and country, shapes
    her musical tastes, while the values of modesty, independence, and practicality guide her outlook on education and future career.
