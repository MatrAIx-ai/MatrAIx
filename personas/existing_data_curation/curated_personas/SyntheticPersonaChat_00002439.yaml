    I freeze up in social situations.

    I was diagnosed with mild ocd in college.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hey!

    User 1: What do you like to do for fun?

    User 2: I like to play piano, sing, and dance.

    User 1: That sounds like a lot of fun! I love to sing and dance too.

    User 2: Me too! Do you play any instruments?

