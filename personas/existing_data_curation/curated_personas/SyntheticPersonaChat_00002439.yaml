    User 1: That sounds interesting.

    User 2: It is. I get to work from home and set my own hours.

    User 1: That''s great! I''m jealous.

    User 2: I''m lucky. I have a lot of freedom.

    User 1: Do you ever have trouble with social situations?

    User 2: Sometimes. I have mild OCD, and it can make me freeze up in public.

    User 1: I''m sorry to hear that. I know how it feels to be anxious in social situations.

    User 2: It''s not so bad. I just have to be careful about when I go out and who I''m with.

    User 1: That''s good. I''m glad you''re able to manage it.

    User 2: Thanks.

    User 1: Do you have any other hobbies?

    User 2: I like to read, go to the movies, and travel.

    User 1: Me too! I love to read and travel. I''ve never been to Florida, though.

    User 2: It''s a beautiful state. I go every year for vacation.

    User 1: That sounds like fun. I might have to go sometime.

    User 2: You should! It''s the perfect place to relax and enjoy the sun.

    User 1: Thanks for the advice. I''ll keep it in mind.'
