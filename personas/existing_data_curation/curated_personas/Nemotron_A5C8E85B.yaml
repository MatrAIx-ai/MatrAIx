  career_goals: Daryl's primary ambition in retirement is to remain engaged and useful to his community. He plans to mentor local youth interested in maritime trades by offering hands‑on guidance and sharing
    practical knowledge from his decades on the water. He also intends to compile a family genealogy and a collection of oral histories from longtime Galveston residents into a modestly illustrated booklet
    that celebrates the region’s heritage. Another goal is to travel along the Gulf Coast, sampling and documenting regional seafood recipes for a community cookbook he hopes to publish locally. Additionally,
    he aspires to volunteer with the Galveston Historical Society, assisting with the preservation of waterfront heritage sites.
