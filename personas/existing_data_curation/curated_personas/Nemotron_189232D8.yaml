  career_goals: Elvis aims to earn a paramedic certification within the next two years and pursue a fire captain role by his early thirties. He plans to enroll in a fire science associate program at a local
    community college to deepen his technical knowledge. Long‑term, he envisions creating a hybrid fire‑safety and arts outreach program that partners with McAllen’s cultural festivals, using murals and
    photography to educate the public about prevention. He also aspires to champion mental‑health resources for first‑responders, integrating peer‑support groups into his department’s routine.
