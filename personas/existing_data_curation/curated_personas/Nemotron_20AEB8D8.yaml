personas:
  professional: Paulette Wongchong is a seasoned technical drafter with over 25 years turning blueprints into precise 2‑D and 3‑D BIM models, leveraging AutoCAD, Revit, and SolidWorks while injecting artistic
    renderings that echo a love of watercolor; at 51 she balances meticulous code compliance with a flexible, collaborative leadership style, mentoring junior staff and championing sustainable design as
    she eyes a BIM manager role that can amplify inclusive mentorship programs for women from diverse backgrounds.
  sports: Paulette Wongchong fuels her fitness routine with sunrise sailing sessions on the Intracoastal Waterway through the Fort Lauderdale Yacht Club, weekend kayaking expeditions into the Everglades,
    and regular Vinyasa yoga, while cheering for the Miami Heat during the NBA season and following the Tampa Bay Buccaneers for football, often organizing friendly match‑up games with her sailing crew.
  arts: Paulette Wongchong immerses herself in Fort Lauderdale’s vibrant arts scene by curating gallery tours, volunteering as a docent at the Stranahan House Museum, and painting plein‑air watercolors
    of sunrise over the canal, drawing inspiration from the bold palettes of Georgia O'Keeffe, the immersive patterns of Yayoi Kusama, and the narrative portraits of Kehinde Wiley, while occasionally collaborating
    with local muralists to integrate community stories into public spaces.
  travel: Paulette Wongchong plans her travel with a blend of meticulous itineraries and last‑minute detours, favoring culturally rich getaways such as weekend sailing trips to the Bahamas, a culinary tour
    of New Orleans’ French Quarter, a heritage walk through Barcelona’s Gothic Quarter, and a wildlife excursion in the Yucatán’s cenotes; while funding these adventures partly from her modest travel savings
    account, she balances the desire for immersive experiences with the reality of supporting her teenage children’s college tuition.
  culinary: Paulette Wongchong expresses her culinary creativity by mixing aromatic island spices with savory Asian sauces, whipping up dishes like jerk‑seasoned chicken served over coconut‑infused rice
    and beans, a turmeric‑and‑ginger seafood curry finished with a splash of fermented soy, and plantain‑based fufu paired with mango‑tamarind salsa; her kitchen skill sits between confident home cook and
    enthusiastic experimenter, and she often spends weekends perfecting the balance of scotch bonnet heat and fragrant lemongrass in her potluck recipes.
  core: Paulette Wongchong is a detail‑driven drafting veteran who navigates life with artistic curiosity, community‑centered generosity, and a lingering worry that fuels both meticulous planning and occasional
    overindulgence.
background:
  cultural: Paulette identifies as African‑American with a multicultural lineage that includes Chinese ancestry reflected in her family name. Growing up in South Florida’s diverse Black community, she was
    immersed in Caribbean rhythms, Southern hospitality, and a strong tradition of oral storytelling, while also celebrating Chinese festivals and cuisine at home. This blend of cultures informs her worldview,
    fostering a deep appreciation for artistic expression, communal solidarity, and the importance of representation in STEM professions.
