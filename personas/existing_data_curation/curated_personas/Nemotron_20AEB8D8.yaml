  hobbies: '[''Watercolor painting'', ''Gallery visits'', ''Sailing'', ''Kayaking'', ''Afro‑Caribbean cooking'', ''Yoga'', ''Mindfulness meditation'', ''Mentoring youth in STEM'', ''Community theatre'',
    ''Photography of coastal landscapes'']'
  career_goals: Paulette aspires to move into a BIM manager role where she can lead cross‑disciplinary design teams and champion sustainable building practices. She aims to develop a mentorship program
    for women of color in the drafting and engineering fields, and eventually teach part‑time at a community college to share her technical expertise and passion for inclusive design. Additionally, she
    hopes to integrate her artistic interests by collaborating on culturally inspired public art installations that enhance urban spaces in Fort Lauderdale.
