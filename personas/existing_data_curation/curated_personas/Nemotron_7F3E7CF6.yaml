personas:
  professional: Raiza Hernandez, a Certified Traffic Control Technician, blends her engineering know‑how with a hands‑on safety mindset, but often battles a tendency toward last‑minute planning as they
    push for a senior safety coordinator role while mentoring younger crew members.
  sports: Raiza Hernandez hikes the trails of Red Rock Canyon most weekends, is a member of the local senior hiking club, follows the Las Vegas Raiders and the Arizona Diamondbacks, and often squeezes a
    quick gym session after a trail run to keep their joints limber.
  arts: Raiza Hernandez delights in dancing to live mariachi ensembles during Día de los Muertos celebrations, collects vintage folk art, and spends evenings listening to the guitarrón playlists of Los
    Lobos while perusing popular science books for new ideas.
  travel: Raiza Hernandez favors road trips that combine desert scenery with cultural stops, such as a weekend drive to Sedona’s red rocks, a pilgrimage to the historic town of Jerome, and a yearly journey
    to a family reunion in the Oaxaca highlands, planning itineraries loosely and often taking spontaneous detours.
  culinary: Raiza Hernandez masters mole poblano, tamales de hoja, and fresh salsa verde, using ingredients like ancho chilies, toasted pepitas, masa harina, and fresh cilantro, and despite their self‑critical
    perfectionism, they often leave the kitchen a mess and rely on the calming view of their succulent garden to recharge.
  core: Raiza Hernandez is a pragmatic safety expert who balances curiosity and spontaneous creativity, often juggling meticulous traffic plans with impromptu desert hikes, all while indulging in bold flavors
    and a chronic tendency to procrastinate.
background:
  cultural: Raiza grew up in a bilingual Mexican-American household, where Spanish was spoken at home and Mexican customs were celebrated alongside American life. Her parents emigrated from Jalisco, and
    she retains strong ties to her family's traditions, including cooking regional dishes, observing Dia de los Muertos, and participating in community posadas during Christmas. Living in Henderson, Nevada,
    she has blended her heritage with the local desert culture, joining Mexican community groups that organize annual festivals and cultural workshops. Her marriage and extended family network emphasize
    multi-generational gatherings, where stories of her ancestors are passed down, reinforcing a sense of pride in her Mexican roots while actively contributing to the multicultural fabric of Clark County.
attributes:
  skills: '[''traffic control procedures'', ''flagging and pedestrian safety'', ''First Aid/CPR certification'', ''Certified Traffic Control Technician'', ''basic road design principles'', ''traffic data
    collection and analysis'', ''hazard identification'', ''on-the-spot problem solving'', ''effective communication'', ''handheld traffic signal device operation'', ''basic computer literacy (reporting,
    scheduling)'']'
  hobbies: '[''preparing traditional Mexican cuisine'', ''succulent gardening'', ''hiking in Red Rock Canyon'', ''reading popular science books'', ''Arduino electronics projects'', ''attending local cultural
    festivals (mariachi music, Dia de los Muertos)'', ''volunteering at community center for safety education'']'
  career_goals: Raiza aims to leverage her experience and STEM background to move into a supervisory or training role within the city's public safety department. She hopes to become a senior safety coordinator,
    overseeing a team of crossing guards and developing flexible, data-driven safety protocols that incorporate new traffic-management technologies. She is also pursuing additional certification in Advanced
    Traffic Management Systems, with a long-term goal of contributing to municipal traffic planning and advocating for community-focused safety initiatives. On a personal level, she wishes to mentor younger
    employees, particularly those from underrepresented backgrounds, and eventually transition to a part-time consultancy role that helps schools and small businesses improve their traffic safety plans.
