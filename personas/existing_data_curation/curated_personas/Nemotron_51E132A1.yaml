  hobbies: '["Community softball league", "Fishing", "Hunting", "Food bank volunteering", "Classic truck restoration", "Cooking Appalachian cuisine", "Attending county fairs", "Bluegrass music concerts",
    "Local history society meetings", "Family gatherings"]'
  career_goals: Russel aims to move into a supervisory role within the next five years, becoming a senior equipment operator and safety lead at his plant. He hopes to obtain a Certified Safety Professional
    (CSP) credential and to design and deliver on‑site training programs that emphasize practical safety and teamwork. Long‑term, he envisions mentoring younger workers, possibly establishing a community
    apprenticeship program that helps local youth gain reliable trade skills. He also dreams of one day operating his own small equipment rental business to serve local farms and contractors, allowing him
    to stay rooted in his community while providing steady, dependable services.
