  hobbies: '[''Hiking and wilderness foraging'', ''Woodworking and carving'', ''Recipe journaling and experimentation'', ''Reading food science and tribal history'', ''Crossword puzzles'', ''Nature photography'',
    ''Fermentation projects (e.g., sauerkraut, kombucha)'']'
  career_goals: Vera aims to move from a line‑cook role to a head‑chef position at a restaurant that highlights Wisconsin’s native foods and tribal culinary heritage. She plans to earn a Certified Chef
    de Cuisine credential within the next two years and to win a regional cooking competition that focuses on sustainable, locally sourced dishes. In the longer term, she dreams of opening a small catering
    business that serves private events with menus built around wild‑crafted ingredients and traditional preparation methods, while also mentoring other American‑Indian youth interested in culinary careers.
