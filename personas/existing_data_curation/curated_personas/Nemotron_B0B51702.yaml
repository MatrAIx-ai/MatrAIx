    Events'']'
  career_goals: Although retired, Gabrielle aims to remain an active leader in the Everett senior community. She plans to mentor new volunteers, expand the senior center’s technology workshops, and launch
    a community oral-history project preserving stories of the region’s post-war generations. She also hopes to organize charitable bridge tournaments to raise funds for local health initiatives and to
    continue her personal goal of staying physically fit through regular walks and fitness classes.
