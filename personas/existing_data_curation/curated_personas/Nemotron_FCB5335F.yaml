  hobbies: '["Birdwatching", "Watercolor painting", "Gardening", "Jazz and blues listening", "Reading science fiction and philosophy", "Attending local art fairs", "Volunteering at community senior center",
    "Cooking Creole dishes", "Exploring historic sites"]'
  career_goals: He aims to remain an active contributor to his community by offering informal workshops on simple engineering fixes, mentoring youth interested in STEM, preserving local oral histories,
    supporting the Gonzales Arts Council, and eventually compiling his reflections into a memoir that bridges science, art, and community life.
