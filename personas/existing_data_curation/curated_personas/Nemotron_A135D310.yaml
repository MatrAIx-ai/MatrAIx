  hobbies: '[''Traditional cooking'', ''Puzzle solving'', ''Journaling and planning'', ''Yoga'', ''Hiking in Redwood Regional Park'', ''Participating in cultural festivals'', ''Reading self‑improvement
    books'', ''Watching procedural TV series'']'
  career_goals: Arti aims to advance from a production worker to a supervisory role within the next five years. She plans to earn certifications in Lean Manufacturing and Six Sigma to deepen her expertise
    in process optimization. Her long‑term ambition is to become a production manager who can design efficient workflows while maintaining high standards of quality and safety. She also intends to enroll
    in community college courses in industrial engineering to support her career growth while staying aligned with her family's emphasis on stable, practical advancement.
