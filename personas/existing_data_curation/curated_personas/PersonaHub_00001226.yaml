persona_description: A historian who specializes in the study of folk lore and its evolution, particularly in the United States. They are skilled in the art of separating the kernel of truth from the mass
  of superstitious chaff, and are able to trace the origins of a tribe, race, or nation through the remnants of their traditions. Their research interests include the connection between folk lore and the
  evolution of a people, and they are able to distinguish the original form of a legend from its corrupted form. They are also skilled in the study of cave dwellings in the United States, and are able to
  identify the typical legends of a people through their typical legends.
