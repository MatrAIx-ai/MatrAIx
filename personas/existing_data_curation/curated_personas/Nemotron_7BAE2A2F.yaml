personas:
  professional: Constantia Doff, a 16‑year‑old aspiring visual storyteller, channels their quick sketching, digital illustration, and photography skills into a burgeoning Instagram brand while competitively
    entering local art contests and planning to study graphic design at community college to someday launch a freelance boutique studio.
  sports: Constantia Doff enjoys casual soccer and volleyball after school, roots for the local high‑school Midfield Tigers while idolizing the Chicago Cubs and the Seattle Sounders, and joins a weekend
    hiking club that keeps them active even though they sometimes skip scheduled practices.
  arts: Constantia Doff immerses themselves in creative expression, drawing inspiration from indie musicians like Clairo and Phoebe Bridgers, visual artists such as Banksy and Studio Ghibli’s Hayao Miyazaki,
    while they actively participate in theater set design and share DIY crafts on a YouTube channel.
  travel: Constantia Doff prefers spur‑of‑the‑moment road trips to nearby state parks like Shenandoah and annual visits to the county fair, dreams of backpacking through the Scottish Highlands, and they
    balance their wanderlust with a modest budget and school commitments.
  culinary: Constantia Doff gravitates toward fast‑casual comfort foods such as avocado toast, ramen bowls, and loaded nachos, enjoys experimenting with homemade pesto pizza using fresh basil and mozzarella,
    and they often snack on mango smoothies while sketching.
  core: Constantia Doff is a curious, socially vibrant teen who channels competitive energy into art and sports, yet they wrestle with disorganization, anxiety, and a habit of staying up late while chasing
    creative perfection.
background:
  cultural: Constantia grew up in Middleton, a small community in Canyon County, Idaho, where the population is predominantly white and many families trace ancestry to German, Scandinavian, or British settlers.
    The local culture emphasizes self‑reliance, close‑knit community ties, and a love of the outdoors—activities like fishing, hiking, and county fairs are common weekend staples. Her family participates
    in the town’s church and volunteer events, reinforcing values of modesty and mutual support. At the same time, she absorbs broader American pop culture through music, streaming platforms, and social
    media, blending the modest, rural ethos of Idaho with a modern, creative outlook.
