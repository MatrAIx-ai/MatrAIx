  career_goals: Constantia envisions turning her love for visual storytelling into a sustainable career. After completing her GED, she plans to attend a community‑college program in graphic design and multimedia,
    where she will deepen her skills in illustration, video editing, and web design. Simultaneously, she aims to grow a personal brand on Instagram and YouTube, showcasing her artwork, photography, and
    behind‑the‑scenes creative process. Her competitive drive pushes her to enter local art contests, secure freelance commissions, and eventually launch her own boutique design studio or work as a freelance
    digital artist for brands.
