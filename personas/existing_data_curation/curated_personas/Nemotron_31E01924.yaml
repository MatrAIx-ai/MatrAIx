personas:
  professional: Lisa Harris, an organized social worker with a talent for data‑driven program design and grant writing, blends evidence‑based client assessments with creative community‑focused solutions,
    leveraging their public‑speaking skills to mobilize resources while staying pragmatic and methodical.
  sports: Lisa Harris, an energetic runner, participates in the Houston Marathon 5K and belongs to the Houston Runners Club, practices yoga at the local studio “Roots Yoga,” and passionately supports the
    Houston Rockets, Astros, and Texans, often wearing their gear during game nights and community sports events.
  arts: Lisa Harris, a devoted fan of live music, frequents venues like the historic Houston Jazz Festival and the House of Blues to see performers such as Robert Glasper, Jazmine Sullivan, and Chance the
    Rapper, while also enjoying theater productions at the Houston Grand Opera and curating eclectic playlists that blend jazz standards with contemporary hip‑hop beats.
  travel: Lisa Harris, a curious traveler, explores Houston's vibrant neighborhoods like Montrose and the Museum District, has road‑tripped to New Orleans for Mardi Gras, trekked through the Hill Country
    wineries, and dreams of visiting Mexico City’s culinary scene and the historic streets of Savannah, balancing short weekend getaways with occasional long‑haul flights without compromising their savings
    goals.
  culinary: Lisa Harris, a skilled home cook, perfects Southern comfort dishes such as shrimp and grits with smoked paprika and collard greens with a dash of hot sauce, experiments with global flavors like
    Korean kimchi tacos and Vietnamese pho, and delights in sourcing fresh produce at farmers’ markets, while they occasionally over‑season meals in their quest for bold taste.
  core: Lisa Harris, a pragmatic yet curious social worker, blends organized advocacy with a love for live music, marathon training, and experimental cooking, while they occasionally over‑commit to community
    events and neglect personal downtime.
background:
  cultural: Lisa identifies as African American and grew up in a close‑knit Black community in Houston's Third Ward. Her family migrated from the Deep South, bringing traditions of Southern hospitality,
    church fellowship, and oral storytelling, which remain central to her identity. She celebrates Juneteenth, participates in the annual Houston Black Cultural Festival, and stays connected to the city's
    vibrant Black churches and community centers. This cultural heritage informs her deep commitment to collective uplift, resilience, and advocacy for racial equity, while also shaping her appreciation
    for the eclectic blend of cultures that defines modern Houston.
attributes:
  skills: '["Case Management", "Crisis Intervention", "Client Assessment", "Community Outreach", "Program Development", "Grant Writing", "Public Speaking", "Conflict Resolution", "Cultural Competency",
