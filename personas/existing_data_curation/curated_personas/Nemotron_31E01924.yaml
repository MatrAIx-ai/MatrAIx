  hobbies: '["Running (5K races)", "Yoga and mindfulness practice", "Live music events (jazz, hip‑hop)", "Cooking Southern comfort food with modern twists", "Exploring Houston''s Museum District", "Volunteering
    with youth literacy programs", "Hosting board game nights with friends", "Discovering international cuisines in Houston neighborhoods"]'
  career_goals: Lisa aims to earn her Licensed Clinical Social Worker (LCSW) credential within the next two years and transition into a clinical role that focuses on mental health services for Black youth
    in Houston. She envisions leading a community mental‑health program that integrates trauma‑informed care with culturally specific interventions. Long‑term, she plans to launch a nonprofit organization
    that tackles affordable‑housing barriers and systemic health disparities, while also pursuing a Master’s in Social Work to deepen her research expertise. Mentorship is also a priority; she wants to
    mentor emerging social workers and influence policy at the city and state level to improve equity in social services.
