  career_goals: Pedro aims to earn a degree in visual communication or multimedia arts, with the long‑term ambition of establishing himself as a freelance graphic designer and illustrator. He wants to build
    a personal studio that fuses Latin cultural motifs with contemporary design, allowing him the flexibility he values and the creative autonomy he seeks. He envisions eventually curating workshops for
    other young artists from diverse backgrounds and contributing to community art initiatives, while keeping his work schedule adaptable enough to maintain his independent, self‑directed lifestyle.
