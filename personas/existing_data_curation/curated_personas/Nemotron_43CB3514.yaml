personas:
  professional: Jose Perezarias, a retired farm laborer and former forklift operator, now channels decades of hands‑on skill and bilingual fluency into organizing community cooking clubs and senior‑center
    activities, using their practical mindset and natural sociability to keep events structured yet adaptable.
  sports: Jose Perezarias enjoys low‑impact activity, regularly walking the nearby nature trail to bird‑watch, participating in weekly senior‑center sunrise yoga, and cheering on the local baseball team,
    the Lakeland Flying Tigers, as a loyal fan.
  arts: Jose Perezarias indulges in classic bolero and salsa tunes from Los Panchos and Celia Cruz, joins the church choir for Sunday services, and reads historical novels by Ken Follett, drawing inspiration
    for storytelling sessions with grandchildren.
  travel: Jose Perezarias dreams of a brief pilgrimage to his hometown in Central America with his grandchildren, but currently favors day trips to the nearby botanical garden and occasional cruises on
    the local lake, balancing limited mobility with a love for fresh scenery.
  culinary: Jose Perezarias is a master of making pupusas, tamales, and sopa de res, often using fresh corn masa, toasted pepitas, and locally grown tomatoes, and enjoys swapping recipes at the senior center
    while occasionally over‑seasoning dishes with extra cumin.
  core: Jose Perezarias blends disciplined practicality with a warm, sociable spirit, mastering garden work, traditional cooking, and community leadership, while indulging in gentle quirks like forgetful
    pill timing and a sweet tooth for extra‑sugar bolero ballads.
background:
  cultural: Jose Luis was born in a rural village near San Salvador, El Salvador, into a farming family steeped in Catholic tradition. He grew up celebrating local festivals such as Las Posadas and Día
    de los Muertos, and learned to prepare home‑cooked meals that are central to family gatherings. In the late 1960s, amid political turmoil, he emigrated to the United States, first settling in Florida
    before moving to Lakeland, Georgia, where a modest Salvadoran enclave had formed. Throughout his life he has blended Salvadoran customs—such as reverence for elders, community solidarity, and the importance
    of religious observance—with Southern hospitality, creating a hybrid cultural identity that he proudly shares with neighbors and grandchildren.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Traditional Salvadoran cooking", "Small-scale gardening and horticulture", "Carpentry and basic woodworking", "Community storytelling and oral history",
