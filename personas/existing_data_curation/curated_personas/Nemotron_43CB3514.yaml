  hobbies: '["Cooking and teaching Salvadoran recipes", "Playing dominoes and card games", "Gardening and vegetable cultivation", "Attending church services and choir", "Salsa dancing events", "Walking
    nature trails and birdwatching", "Reading historical fiction", "Storytelling sessions at community center"]'
  career_goals: Although retired, Jose Luis remains goal‑oriented. He hopes to maintain his health and independence through daily walks and regular medical check‑ups, continue sharing Salvadoran culinary
    traditions with neighbors, and mentor younger members of the local Latino community on language and cultural practices. He aspires to compile a handwritten memoir of his migration story and family history,
    to be donated to the Lakeland public library. A long‑standing wish is to make a short pilgrimage to his hometown in El Salvador with his grandchildren, if possible.
