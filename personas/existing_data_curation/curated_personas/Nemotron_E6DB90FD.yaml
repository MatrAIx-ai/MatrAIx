  career_goals: Katherine dreams of caring for animals as a future veterinarian and also imagines exploring space as an astronaut or writing her own adventure stories. In the near term she wants to read
    longer chapter books, earn a gold badge in her Girl Scouts troop, and win the school spelling bee, all while continuing to develop her curiosity in science and her practical problem‑solving skills.
