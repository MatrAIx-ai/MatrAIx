personas:
  professional: Katherine Bradshaw, a budding junior scientist and LEGO architect, blends her curiosity about how things work with a practical knack for following step‑by‑step instructions, turning Science
    Club experiments and intricate brick builds into early demonstrations of problem‑solving and teamwork.
  sports: Katherine Bradshaw, a lively member of the Des Moines Youth Soccer League, dashes through games with the Madison Mavericks, balances team drills with spontaneous park scrimmages, and uses her
    energetic nature to stay fit while occasionally forgetting to stretch before practice.
  arts: Katherine Bradshaw, an avid drawer and painter, spends weekend afternoons recreating scenes from Dr. Seuss and experimenting with watercolors inspired by artist Mary Blair, while also attending
    school talent shows where she eagerly dances to pop hits like Taylor Swift’s "Shake It Off".
  travel: Katherine Bradshaw, a curious explorer of the Iowa River’s banks and nearby state parks, enjoys weekend picnics at Ledges State Park, dreams of hiking the Grand Canyon, and prefers family‑organized
    day trips over spontaneous vacations, often bringing a notebook to catalog discovered frogs and rocks.
  culinary: Katherine Bradshaw, a junior baker who proudly measures flour for chocolate chip cookies with a plastic ruler, delights in mixing batter to the rhythm of her favorite songs, and savors pepperoni
    pizza slices topped with extra mozzarella while occasionally over‑sweetening her desserts.
  core: Katherine Bradshaw blends boundless energy with meticulous curiosity, turning soccer fields, LEGO bricks, and Sunday school lessons into a vibrant tapestry of play, learning, and occasional melty‑cookie
    mishaps.
background:
  cultural: Katherine was raised in Coralville, a friendly Midwestern town in Iowa, where her family’s heritage includes German and Irish roots common in the region. The community emphasizes kindness, cooperation,
    and involvement in local events such as school fairs, church gatherings, and the Iowa State Fair. She attends a public elementary school that promotes responsibility, respect, and community service.
    Family traditions feature holiday meals, autumn apple‑picking trips, and participation in church youth groups, all of which shape her appreciation for nature, community, and teamwork.
