  career_goals: Kimberly aims to leverage her STEM expertise to inspire younger generations through mentorship programs at local schools and community colleges, serve on the advisory board of a science
    museum, and author a series of accessible articles that demystify scientific concepts for older adults. She also aspires to learn digital photography and integrate art with science in community exhibitions.
    Additionally, she hopes to travel to at least three new cultural destinations each year to broaden her perspective.
