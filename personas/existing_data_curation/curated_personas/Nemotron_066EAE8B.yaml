personas:
  professional: Alisha Taylor, a budding preschool classroom aide, organizes activity mats, labels supply bins, and ensures the daily story‑time schedule runs without hiccups, showcasing their love for
    routine, reliability, and methodical planning.
  sports: Alisha Taylor, an enthusiastic participant in the Sunrise Kids Soccer Club and a seasonal ice‑skating class, cheers for the hometown minor‑league baseball team, the River City Rangers, and loves
    to practice basic dribbling drills after school to stay active.
  arts: Alisha Taylor, a budding illustrator who loves to draw cartoon animals while listening to the playful tunes of Disney’s "Let It Go," frequently mimics the bold colors of artist Yayoi Kusama’s polka‑dot
    paintings in her crayon art, and enjoys weekly storytelling sessions featuring Dr. Seuss books.
  travel: Alisha Taylor, a cautious young explorer who prefers family trips to familiar places like Grandma’s countryside farm and the vibrant Magic Kingdom in Orlando, plans each outing with a detailed
    checklist and feels most comfortable when the itinerary repeats favorite rides and snack stops.
  culinary: Alisha Taylor, a budding kitchen helper who proudly mixes flour, milk, and butter to create fluffy pancakes topped with strawberry slices, delights in the cheesy goodness of macaroni and cheese,
    and insists on tasting a pinch of cinnamon in every dessert.
  core: Alisha Taylor is a routine‑loving five‑year‑old who blends meticulous organization with playful curiosity, turning everyday activities into structured adventures while occasionally losing a sock
    in the laundry.
background:
  cultural: Alisha was born and raised in Lakeside, a suburban community in San Diego County, California. Her family is of European‑American heritage and follows typical middle‑class American customs, celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and seasonal traditions. The diverse Southern California setting gives her occasional exposure to Spanish words
    at school and community events, but her primary cultural influences are rooted in mainstream U.S. practices, including weekend family meals, bedtime story routines, and participation in local community
    festivals and church activities.
