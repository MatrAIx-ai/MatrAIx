  career_goals: Alisha imagines growing up as someone who helps others. She often says she wants to be a teacher so she can share what she knows with other kids, and she also dreams of becoming a veterinarian
    because she loves animals. She likes the idea of a job where she can keep things organized and make sure everyone feels cared for.
