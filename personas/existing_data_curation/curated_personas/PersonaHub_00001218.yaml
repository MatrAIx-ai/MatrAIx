persona_description: A researcher and scientist working on the development of new tools for liquid biopsy, focusing on the study of ancient enzymes that can detect bits of genetic material shed by cancer
  or other diseased cells into a patient's bloodstream. This research is aimed at providing doctors with a more complete picture of an individual's disease, improving their chances of finding the best treatment,
  and also sparing patients the pain, inconvenience, and long wait times associated with surgical biopsies.
