  career_goals: Moises dreams of becoming a pediatrician who can combine his love for science, his disciplined work ethic, and his desire to help others stay healthy. He imagines a future where he can use
    his bilingual skills to serve diverse families in his community, ensuring children receive compassionate care. Inspired by his organized approach to school projects, he also aspires to lead health‑education
    programs that teach kids about nutrition and safety, aiming to become a trusted and practical contributor to his neighborhood's well‑being.
