persona_description: A government official who is responsible for developing and implementing policies related to low emission vehicles and infrastructure. This person is focused on promoting the adoption
  of electric vehicles and improving access to recharging infrastructure. They understand the challenges and opportunities in this new area and are committed to making progress towards achieving carbon
  targets. This individual has experience in working with the private sector and government agencies to fund and build networks of thousands of recharging points at locations around Britain. They are aware
  of the benefits of reducing emissions and improving the efficiency of conventional vehicles and are committed to harnessing new types of motoring technology to meet carbon targets. They have a passion
  for improving access to a new low carbon transport network where plug-in vehicles are a commonplace feature of the motoring landscape.
