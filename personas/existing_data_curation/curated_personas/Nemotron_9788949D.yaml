personas:
  professional: Miguel Camacho is an aspiring robotics engineer and competitive gamer, channeling their highly organized, disciplined nature into designing tournament‑ready robots for regional contests
    while they apply the strategic analysis honed in League of Legends to problem‑solving tasks.
  sports: Miguel Camacho captains the local Kissimmee FC youth soccer team, balances basketball drills with the Orlando Magic fan club, and follows Orlando City SC closely; they structure practice sessions
    with a strict timetable to maintain peak performance.
  arts: Miguel Camacho immerses themselves in reggaeton beats from Bad Bunny and J Balvin, salsa classics by Marc Anthony, and dives into graphic novels like 'Saga' and 'Ms. Marvel', using the rhythmic
    patterns as inspiration for both gaming strategies and robotics choreography, they often attempt to sync robot movements to the music.
  travel: Miguel Camacho plans weekend getaways with a detailed spreadsheet, enjoys day trips to Orlando’s theme parks and beach outings in Miami, dreams of a school‑organized exchange to Tokyo to explore
    cutting‑edge robotics labs, yet they balance these aspirations against a modest family allowance.
  culinary: Miguel Camacho prefers bold flavors such as tacos al pastor, pepperoni pizza, and homemade guacamole, experiments in the kitchen with fresh cilantro, lime juice, and pineapple chunks, yet they
    often burn the edges of a skillet sear due to their competitive focus on gaming over cooking.
  core: Miguel Camacho blends disciplined, competition‑driven ambition with a love for social jam sessions, yet they habitually procrastinate on homework until the last minute, trading late‑night gaming
    marathons for missed study sessions.
background:
  cultural: Miguel comes from a proud Puerto Rican family that has lived in Kissimmee for several generations. At home, Spanish is spoken daily, and family gatherings revolve around traditional foods such
    as arroz con gandules, pasteles, and flan. He participates in cultural celebrations like the Puerto Rican Day Parade in Orlando and the annual Noche de San Juan festivities, where music, dance, and
    storytelling reinforce his heritage. His parents instilled values of close‑knit family bonds, respect for elders, and a strong sense of community service. Catholic traditions also shape his upbringing,
    with occasional church attendance and participation in charitable events. This bicultural environment gives Miguel a deep appreciation for both his island roots and the multicultural fabric of Central
    Florida, influencing his bilingual communication style, love for Latin rhythms, and his desire to uplift other Puerto Rican youth.
