  career_goals: In the next few years, Miguel aims to secure a scholarship that will let him attend a top university where he can study engineering, preferably mechanical or aerospace, while continuing
    to develop his athletic talent. He envisions earning a varsity spot on his high school soccer team, eventually becoming a team captain and competing at the collegiate level. Parallel to his sports aspirations,
    he wants to deepen his coding skills to design his own app or video game, possibly turning it into a side venture. Long-term, Miguel hopes to combine his technical expertise and leadership experience
    to launch a mentorship program for Puerto Rican youth in Central Florida, helping them navigate academic challenges and pursue STEM careers. His goals are driven by a desire to set high standards, prove
    his competitiveness, and give back to his community.
