personas:
  professional: Lurbin Rosario, an aspiring visual artist, blends digital illustration in Procreate with street‑art sketching, leveraging bilingual communication to collaborate on community murals while
    letting their laid‑back, curiosity‑driven nature guide project choices.
  sports: Lurbin Rosario enjoys weekend ultimate frisbee with the local Skyline Flyers club, follows the Los Angeles Lakers and Los Angeles FC avidly, and sprints to the beach for surf sessions at Venice
    whenever the Southern California surf is up.
  arts: Lurbin Rosario immerses in graffiti spotting, draws inspiration from Banksy's stenciled pieces, reveres the music of Arcade Fire, Tame Impala, and Kendrick Lamar, admires the cinematic storytelling
    of Hayao Miyazaki, and quotes poetry by Amanda Gorman during vlog broadcasts.
  travel: Lurbin Rosario prefers low‑budget road trips that combine street‑art tours in Austin and Portland with occasional weekend hikes in the Sierra Nevada, has already explored Santa Cruz, San Diego,
    and New Mexico, and dreams of backpacking through Kyoto and Barcelona next summer.
  culinary: Lurbin Rosario experiments in the kitchen with homemade tamales, spiced chipotle‑marinated chicken tacos, and avocado‑lime quinoa bowls, mixing corn masa, fresh cilantro, and roasted poblano
    peppers, and enjoys sharing these dishes at house‑party potlucks while juggling a beginner‑to‑intermediate cooking skill level.
  core: Lurbin Rosario is a curiosity‑driven 18‑year‑old visual art enthusiast who balances spontaneous creativity with a relaxed, occasionally chaotic approach to life, using yoga, sketchbooks, and a pinch
    of urban flair to shape their worldview.
background:
  cultural: Lurbin was born to Mexican immigrant parents in East Los Angeles, where her family maintains strong ties to Mexican traditions while navigating life in a multicultural city. At home, Spanish
    is spoken daily, and celebrations such as Día de los Muertos, Cinco de Mayo, and family gatherings around regional foods from Oaxaca and Veracruz are central to her upbringing. She grew up immersed
    in the vibrant Latino arts scene of Los Angeles, from historic murals to contemporary Latino music, which sparked her appreciation for visual storytelling. This bicultural experience gives her a deep
    sense of pride in her heritage and shapes her desire to blend Mexican cultural motifs with modern artistic expression in her future work.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Traditional sketching'', ''Bilingual communication (Spanish/English)'', ''Basic video editing (iMovie, CapCut)'', ''Social media content creation'',
