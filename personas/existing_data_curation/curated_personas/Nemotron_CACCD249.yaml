  hobbies: '[''Sketching and doodling'', ''Street photography'', ''Exploring murals and art galleries'', ''Listening to diverse music (Mexican folk, indie, hip‑hop)'', ''Reading graphic novels and sci‑fi
    literature'', ''Cooking Mexican dishes with modern twists'', ''Participating in community festivals (Día de los Muertos, Cinco de Mayo)'', ''Yoga and meditation'', ''Journaling'', ''Social media vlogging'']'
  career_goals: Lurbin aims to enroll in a community‑college program in Graphic Design or Visual Arts and later pursue a BFA, so she can turn her artistic talents into a professional career. She envisions
    working as a multidisciplinary visual artist—creating illustrations, murals, and digital content—while maintaining the flexibility to explore new ideas and projects. She hopes to collaborate with local
    community organizations to lead youth art workshops that celebrate Mexican heritage, and eventually she dreams of launching a small studio that blends commercial design work with culturally driven community
    art initiatives.
