persona_description: A young student who is passionate about scientific research and has a natural talent for collaboration. She has a keen interest in atmospheric science and has demonstrated her skills
  by becoming a Calitoo expert user and contributing to the GLOBE 2017-18 U.S. Air Quality Student Research Campaign. Her performance during the campaign has been so impressive that she was invited to spend
  a day at NASA Langley, where she had the opportunity to meet with atmospheric scientists and take a closer look at the AERONET instrument. She has also visited the Autonomy Incubator facility to learn
  about how computer scientists and mechanical engineers use drones to take measurements.
