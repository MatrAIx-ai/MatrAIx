persona_description: A researcher and inventor in the field of nanotechnology, specifically focused on the development of advanced materials and devices that can enable beyond-binary computation. They are
  part of the Defense Advanced Research Projects Agency (DARPA) and work on the Semiconductor Technology Advanced Research Network (STARnet), which is a collaborative effort between DARPA and key companies
  from the semiconductor and defense industries. They are involved in the six academic teams of the STARnet, each focusing on a different aspect of nanomaterial engineering, spintronic materials, systems-on-nanoscale
  information fabrication, and low-energy systems technology. Their goal is to push the boundaries of electronics and drive technology innovation beyond what can be imagined today.
