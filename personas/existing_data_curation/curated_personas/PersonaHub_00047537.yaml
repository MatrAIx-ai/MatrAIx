persona_description: A researcher who is interested in the study of twins, specifically in the relationship between discordance in growth and the risk of adverse perinatal outcomes. They are particularly
  interested in understanding the differences in maternal demographics, medical complications, and neonatal outcomes between concordant and discordant AGA and SGA twins. They are also interested in the
  use of chorionicity, antenatal corticosteroid use, oligohydramnios, preeclampsia, and gestational age at delivery as potential confounding variables. They are looking for a detailed analysis of the association
  between discordance and adverse perinatal outcomes, using logistic regression and Maentel-Haenzel odds ratios. They are also interested in comparing the outcomes of concordant and discordant AGA and SGA
  twins, and are looking for a comprehensive understanding of the relationship between discordance and adverse perinatal outcomes.
