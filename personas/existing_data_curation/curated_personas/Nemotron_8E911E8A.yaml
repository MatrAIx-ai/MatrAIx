  career_goals: Monica aims to channel her love for cooking and crafting into a home‑based micro‑business, such as an online boutique for handcrafted kitchen accessories and a pop‑up Mexican‑fusion catering
    service. She envisions building a brand that merges her cultural heritage with modern aesthetics, leveraging her social‑media savvy to attract a local and regional audience. To support this ambition,
    she plans to improve her organizational skills through short courses and mentorship, allowing her to balance the flexibility she values with the structure needed for a sustainable venture. Her competitive
    streak drives her to set measurable growth targets, like achieving a steady stream of repeat customers within the first year.
