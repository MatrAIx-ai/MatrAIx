  career_goals: Ryan's primary career ambition is to earn a Bachelor of Science in Nursing (BSN) through an online program, followed by a Master's in Nursing Leadership, positioning himself for a nursing
    manager or director role in his hospital. He also aims to become a certified case manager and to develop an interdisciplinary art‑therapy program that integrates visual arts into patient recovery pathways.
    By advancing his education and leadership credentials, he hopes to mentor new nurses, influence policy on holistic patient care, and achieve the financial stability needed to support his family while
    reducing his personal anxiety. Ultimately, he wants to be recognized as a clinician‑leader who blends evidence‑based practice with creative, patient‑centered innovations.
