personas:
  professional: Michael Dubose, a seasoned full‑stack developer with a methodical bent, leverages deep Python, Java, and AWS expertise to build secure, scalable web platforms while championing clean code,
    rigorous testing, and collaborative Agile processes that reflect their preference for structure and teamwork.
  sports: Michael Dubose, a regular jogger through Zilker Park and member of the Austin Soccer Club, follows Austin FC in MLS, roots for the Texas Longhorns during football season, and they also play occasional
    tennis at the Central Austin Tennis Club, balancing competitive spirit with low‑impact exercise.
  arts: Michael Dubose, an avid patron of Austin’s indie‑blues scene, frequents venues like the Moody Theater and White Horse to see Gary Clark Jr. and The Black Keys, while unwinding at home with classic
    sci‑fi novels by Isaac Asimov and Arthur C. Clarke and challenging friends at board‑game nights featuring Terraforming Mars and Gloomhaven.
  travel: Michael Dubose, a methodical planner of weekend getaways, maps scenic drives through Hill Country vineyards, schedules annual trips to Santa Fe for art festivals, and dreams of a tech‑focused
    tour of Tokyo’s Akihabara, always booking accommodations well in advance to keep stress at bay.
  culinary: Michael Dubose, an enthusiastic home‑cook who blends smoked brisket with garden‑fresh basil‑pesto pasta, concocts spicy chipotle‑lime shrimp tacos using heirloom tomatoes from their balcony,
    and enjoys pairing meals with local craft brews, yet they sometimes over‑season dishes in a quest for bold flavor.
  core: Michael Dubose, a 47‑year‑old tech veteran who balances meticulous code craftsmanship with a love for backyard herbs, worries obsessively about hidden bugs, and pauses each night for meditation
    to keep stress from spilling over into their next BBQ.
background:
  cultural: Michael grew up in a suburban community near Austin, Texas, where Southern hospitality and a strong work ethic were emphasized. His family celebrated traditional Texan customs—such as weekend
    barbecues and community festivals—while also valuing education and practical problem solving. These influences shaped his preference for structure, reliability, and cooperation. Living in Austin's vibrant
    tech scene, he embraces the city's blend of entrepreneurial spirit and laid‑back lifestyle, which informs his balanced approach to professional ambition and personal well‑being.
