  career_goals: Michael aims to transition into a senior technical leadership role, such as Lead Engineer or Engineering Manager, where he can shape robust development processes and champion a culture of
    reliability and teamwork. He seeks to earn advanced cloud certifications (AWS Solutions Architect) to deepen his infrastructure expertise and intends to mentor more junior developers, fostering a supportive
    environment that aligns with his cooperative nature. Over the next five years, he hopes to lead the creation of mission‑critical, high‑availability platforms while maintaining a balanced workload that
    reduces stress, and eventually explore launching a consultancy that helps small businesses adopt structured, secure software solutions.
