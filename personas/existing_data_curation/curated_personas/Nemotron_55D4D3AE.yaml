personas:
  professional: Tanya Douglas is an aspiring junior entomologist who channels her curiosity about insects into 4‑H projects, balancing spontaneous woodland explorations with the practical discipline of
    recording observations, even if her field notebook often ends up filled with doodles and missed deadlines.
  sports: Tanya Douglas laces up for the Thompson's Station Youth Baseball League, cheers for the Nashville Predators during family game nights, and joins the community center's dance club where they practice
    pop choreography, always remembering to stretch before sprinting through the woods on weekend hikes.
  arts: Tanya Douglas fills sketchbooks with lively cartoon characters inspired by Disney's Moana and the vibrant beats of Ariana Grande, while tinkling the piano keys for fun, and they regularly attend
    the local library's arts & crafts hour where they swap ideas and jokes with friends.
  travel: Tanya Douglas loves weekend camping trips to the misty ridges of the Great Smoky Mountains, dreams of snapping a selfie at Disneyland, and cherishes school field trips to the Tennessee Aquarium,
    always packing a small backpack with a magnifying glass to hunt for bugs along the way.
  culinary: Tanya Douglas enjoys the smoky tang of summer barbecue ribs and the buttery comfort of homemade mac and cheese, often helping their mom stir the pot at neighborhood cook‑outs while also dreaming
    of mastering a perfect strawberry shortcake for the upcoming church potluck.
  core: Tanya Douglas is a curiosity‑driven 10‑year‑old who turns backyard bug hunts into 4‑H triumphs, juggles spontaneous LEGO builds with a modest allowance, and battles occasional worry‑clouds with
    a bright smile and a splash of pop music.
background:
  cultural: Raised in Thompsons Station, a small suburban community in Williamson County, Tennessee, Tanya is part of a white, middle-class Southern family that values hospitality, church participation,
    and community gatherings. Local traditions such as weekend barbecues, church youth groups, school field trips, and involvement in 4-H shape her cultural outlook. The region’s emphasis on politeness,
    respect for elders, and a practical work ethic blends with her family’s encouragement of curiosity and kindness.
