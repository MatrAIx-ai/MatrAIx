  career_goals: Timothy aims to pursue a career that fuses art and technology. He dreams of becoming a UI/UX designer or a game developer who creates visually compelling and user‑friendly experiences. He
    also considers a path in digital media art or interactive museum exhibit design, where his curiosity for new ideas and appreciation of varied experiences can inspire others. To achieve this, he plans
    to attend a specialized high school focused on STEM and the arts, earn a scholarship for a college program in Computer Science with a minor in Fine Arts, and eventually work for a studio or cultural
    institution that values innovative thinking.
