personas:
  professional: Timothy Grier, a 13-year-old aspiring game developer, combines a love for coding small video games with digital illustration, channeling their methodical planning and curiosity into creating
    narrative-driven indie games that reflect the storytelling traditions they hear at community gatherings.
  sports: Timothy Grier follows the local professional basketball team, the Dallas Mavericks, enjoys playing pickup games at the neighborhood park on weekends, and participates in a school-run track club
    during the spring, approaching fitness with a structured routine that mixes basketball drills and daily jogs to stay energetic for art projects.
  arts: Timothy Grier immerses themselves in digital drawing, drawing inspiration from jazz legends like Miles Davis and contemporary hip-hop artists such as Kendrick Lamar, while regularly visiting the
    city's cultural museum and local murals, and they admire visual artists like Kehinde Wiley whose portraiture informs their own character sketches.
  travel: Timothy Grier prefers well-planned trips that blend cultural immersion with creative stimulus, having explored Austin's music scene, the historic streets of New Orleans, and the Smithsonian museums
    in Washington, D.C., while dreaming of a future backpacking adventure to Tokyo's anime districts and a weekend art-focused getaway to Santa Fe.
  culinary: Timothy Grier's palate favors soulful barbecue ribs, seasoned collard greens, and homemade mac & cheese, and they enjoy experimenting with a handheld mixer to craft their own spice rubs while
    often helping prepare dishes for church potlucks and family barbecues.
  core: Timothy Grier is a quietly ambitious teen who blends a disciplined love of coding, art, and community storytelling into a uniquely organized, curiosity-driven worldview, even if they sometimes procrastinate
    on schoolwork to finish a LEGO set.
background:
  cultural: Timothy is a Black teenager raised in Dallas, Texas, a city known for its dynamic African‑American cultural scene. His family participates in community traditions such as Juneteenth celebrations,
    church gatherings, and neighborhood barbecues, which expose him to gospel music, soulful cuisine, and oral storytelling. He attends after‑school programs at the Dallas Black Community Center, where
    mentors encourage both artistic expression and academic achievement. Through school and community resources, he has explored African‑American literature—from classic poets like Langston Hughes to contemporary
    authors like Angie Thomas—and has visited the Dallas African American Museum, deepening his appreciation for Black history and art. The vibrant local music heritage, especially jazz, blues, and modern
    hip‑hop, informs his musical tastes, while the city's murals and public art projects inspire his own creative endeavors.
