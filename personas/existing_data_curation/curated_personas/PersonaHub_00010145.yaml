persona_description: A historian who is deeply interested in the events and causes leading up to and during the Mexican Revolution of 1910-1920, particularly in the policies and actions of Dictator Porfirio
  Díaz Mori that contributed to the widespread poverty and violence. This individual is particularly interested in the impact of land laws and policies on farming communities and the political leadership
  that followed Mori's removal, including Francisco Madero and General Victoriano Huerta, who were both dictators with similar policies.
