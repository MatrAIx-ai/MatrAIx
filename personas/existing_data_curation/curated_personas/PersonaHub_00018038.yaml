persona_description: A paleoecologist who specializes in the study of paleobotany, particularly the use of plant pollen, microscopic organisms, and other substances in bay sediments to track changes in
  the estuary and in the watershed that surrounds it. Her work has provided the basis for much of our early understanding of how and when the forests surrounding the bay were first cleared, and how resultant
  shifts in sediment loads and water chemistry changed the bay and its ecosystem. Her studies have been pivotal in identifying the impacts of land use changes on the bay, and she has set an important example
  for women in science.
