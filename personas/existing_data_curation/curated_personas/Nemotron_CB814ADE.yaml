  career_goals: Though retired from the formal workforce, Brittany aims to deepen her contributions to her community and family. She plans to expand the neighborhood garden she co‑started, mentor younger
    neighbors in sustainable planting, and document her family’s history into a printed memoir for future generations. She also hopes to travel modestly with her husband to state parks and historic sites
    in the Midwest, while maintaining her health through regular walking and gentle exercise. Learning to use a tablet for digital photography and photo‑album creation is another personal ambition, reflecting
    her curiosity for new tools while staying practical.
