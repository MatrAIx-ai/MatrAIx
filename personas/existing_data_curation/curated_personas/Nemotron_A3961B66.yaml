  hobbies: '[''Hiking on local trails'', ''Reading mystery and self‑help books'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Knitting'', ''Baking'', ''Vegetable gardening'', ''Listening to true
    crime podcasts'', ''Board games with close friends'', ''Volunteering at an animal shelter'']'
  career_goals: Abbigail aims to complete her bachelor's degree in accounting and obtain CPA certification within the next five years. She envisions progressing to a senior accountant role, eventually moving
    into a finance manager position where she can oversee budgeting, financial analysis, and tax preparation for small businesses in Littleton. Continuing professional development through specialized courses
    in tax law and forensic accounting is a priority, as is finding a position that offers a stable schedule to support her mental‑health needs while allowing her to mentor junior staff.
