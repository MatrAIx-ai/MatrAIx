  hobbies: '[''Hiking'', ''Gardening'', ''Cooking'', ''Volunteer work'', ''Yoga'', ''Jigsaw puzzles'', ''DIY home renovation'', ''Historical building tours'']'
  career_goals: Michelle aims to advance to a senior building inspector role within the Madison Building Department and obtain the Certified Building Code Official (CBCO) credential. She aspires to lead
    a team of inspectors, mentor junior staff, and develop community outreach programs on home safety and energy efficiency. In the long term, she envisions launching a private consultancy that provides
    code compliance and sustainable building advice while continuing professional development to better manage workplace stress and maintain a healthy work‑life balance.
