personas:
  professional: Michelle Howard, a 33‑year‑old ICC‑certified building inspector in Madison, blends meticulous code expertise with compassionate communication, turning deadline‑driven inspections into collaborative
    problem‑solving sessions that keep contractors, homeowners, and municipal officials aligned, and they continually pursue a senior leadership role and the CBCO credential.
  sports: Michelle Howard regularly hikes the Lake Mendota trails, practices yoga for low‑impact fitness, roots for the Wisconsin Badgers football and Milwaukee Brewers, participates in the Madison Trails
    Hiking Club’s weekend group hikes, and they adhere to a structured weekly workout schedule that sometimes unravels during intensive inspection periods.
  arts: Michelle Howard enjoys historic building tours at the Overture Center for the Arts, listens to Bon Iver and Amy Winehouse while reviewing code reports, attends the Madison Symphony’s performances
    of Beethoven’s Ninth, collects vintage postcards of 19th‑century warehouses, and they often find inspiration for sustainable design in the works of architect Frank Lloyd Wright.
  travel: Michelle Howard prefers meticulously planned weekend getaways to Door County’s lighthouse trails and seasonal trips to Sedona’s red‑rock hikes, dreams of backpacking through the Japanese Alps,
    yet they balance travel ambitions against a mortgage and the costs of home‑renovation projects.
  culinary: Michelle Howard, an enthusiastic home gardener, whips up roasted beet quinoa salads, ginger‑turmeric veggie stir‑fry, and whole‑grain sourdough bread using fresh zucchini and heirloom tomatoes
    from their garden, while they still occasionally order takeout pizza after a long inspection day.
  core: Michelle Howard balances a detail‑driven inspection career with a compassion‑rooted love for community, garden‑fresh meals, and puzzle‑solving, all while wrestling with chronic worry that fuels
    both diligent planning and occasional over‑checking.
background:
  cultural: Michelle grew up in a suburban community near Madison, Wisconsin, within a family that emphasized traditional Midwestern values of hard work, reliability, and community involvement. Her cultural
    background reflects a typical white Midwestern American upbringing, characterized by a pragmatic outlook, appreciation for outdoor recreation, participation in local events such as county fairs, and
    a strong sense of civic duty and cooperation.
attributes:
  skills: '[''Building code compliance'', ''Structural inspection'', ''Fire safety assessment'', ''Energy efficiency evaluation'', ''Blueprint reading'', ''Digital inspection tools'', ''Report writing'',
