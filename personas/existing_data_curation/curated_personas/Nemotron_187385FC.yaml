  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Watercolor painting'', ''Gardening'', ''Cooking'', ''Birdwatching'', ''Community theatre'', ''Yoga'', ''Volunteer work at the public
    library'']'
  career_goals: Stephanie aims to channel her lifelong curiosity into a role as a community heritage consultant, preserving Norfolk’s maritime and cultural history. She plans to launch a digital oral‑history
    archive that records stories of longtime residents and ultimately publish a book intertwining these narratives with her own research. She also seeks to teach adult‑education courses at the local library
    on historical research methods and genealogical techniques, and hopes to secure a part‑time adjunct position at a community college. On a personal level, she aspires to achieve financial independence
    through freelance writing, occasional craft sales, and grant‑writing work for nonprofit organizations, while continuing to volunteer as a docent at the Norfolk Museum of History.
