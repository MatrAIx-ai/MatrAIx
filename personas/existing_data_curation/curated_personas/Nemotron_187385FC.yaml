personas:
  professional: Stephanie Therrien, a community heritage consultant in the making, leverages her meticulous research, persuasive grant‑writing, and calming mediation skills to turn Norfolk’s maritime stories
    into publicly accessible digital archives while navigating projects with a balanced mix of organization and flexibility.
  sports: Stephanie Therrien follows the Norfolk Tides and the Washington Commanders with quiet enthusiasm, participates in the local Norfolk Sailing Club’s weekly harbor outings, and maintains personal
    fitness through early‑morning yoga sessions and weekend walks with the Chesapeake Bay Birdwatchers group, preferring low‑impact activities that complement her calm resilience.
  arts: Stephanie Therrien channels her creative side into watercolor paintings of Norfolk’s waterfront inspired by Winslow Homer, attends performances at the Harbor Stage Company featuring local actors
    like Rachel Daly, and relaxes to the folk melodies of Gillian Welch and the piano works of Claude Debussy, blending visual and auditory histories into her personal artistic tapestry.
  travel: Stephanie Therrien favors research‑driven travel, having explored the historic port of St. Augustine, Florida, the maritime museums of Portsmouth, England, and the river towns of Quebec for genealogical
    clues, while she dreams of a leisurely cruise along the Norwegian fjords, always balancing meticulous itinerary planning with spontaneous detours to local markets and bird‑watching spots.
  culinary: Stephanie Therrien, an avid gardener and home cook, delights in preparing Chesapeake Bay crab cakes with fresh herbs, heirloom tomato bruschetta, and her signature vegetable stir‑fry featuring
    zucchini, bell peppers, and rosemary, often pairing meals with a locally brewed IPA and frequent visits to the Norfolk farmers’ market for seasonal produce.
  core: Stephanie Therrien balances a meticulous historian’s eye with a laid‑back gardener’s patience, turning Norfolk’s maritime tales into watercolor art, yet they cannot resist the habit of hoarding
    every antique map they encounter, even if the stacks crowd their living room.
background:
  cultural: Stephanie identifies as a white American with French‑Canadian ancestry, a heritage reflected in her surname Therrien. She grew up in the Mid‑Atlantic region and moved to Norfolk in her early
    thirties, where she embraced the city’s maritime traditions and diverse cultural scene. Her upbringing emphasized the value of education, cultural enrichment, and community involvement, shaping her
    collaborative yet assertive approach to local projects. Raised in a predominantly Protestant environment, she maintains a respectful appreciation for various religious traditions within her community.
    The coastal Southern culture of Norfolk—its historic neighborhoods, seafood cuisine, and strong sense of local history—has deeply influenced her interests and lifestyle. She values modest financial
    independence, lifelong learning, and an inclusive, cooperative spirit in her community engagements.
