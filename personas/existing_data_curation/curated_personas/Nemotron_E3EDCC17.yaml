  hobbies: '[''Gardening (peppers and herbs)'', ''Cooking traditional Mexican dishes'', ''Photography of cultural festivals'', ''Walking/hiking in the San Bernardino foothills'', ''Community dance nights
    and karaoke'', ''Hosting or participating in trivia nights'', ''Reading popular‑science and history books'', ''Listening to podcasts on technology and culture'', ''Playing chess and bridge at the senior
    center'', ''Volunteering for DIY projects and senior activities'']'
  career_goals: Jesus aims to stay actively engaged in his community by leveraging his technical knowledge and social charisma. He plans to volunteer as a STEM mentor at local high schools, lead neighborhood
    DIY and renewable‑energy workshops, and guide youth in public‑speaking and leadership. He also aspires to serve on the advisory board of a non‑profit focused on technology education, help design affordable
    solar water‑heating solutions for low‑income households, and document his life story to preserve his Mexican heritage and inspire older adults to pursue lifelong learning.
