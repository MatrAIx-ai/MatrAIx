personas:
  professional: Jesus Munoz, a retired electrical and mechanical engineer, uses their analytical mindset, bilingual fluency, and polished public‑speaking to organize community workshops on renewable energy
    and DIY repairs, and they always deliver meticulously planned sessions that keep participants engaged.
  sports: Jesus Munoz enjoys weekly hikes along the San Bernardino foothills, follows the Los Angeles Angels baseball team, participates in senior bridge tournaments that double as mental fitness drills,
    and they join community dance nights for cardio, treating physical activity as a social ritual.
  arts: Jesus Munoz loves capturing color‑vivid festivals with his vintage Leica camera, curates a vinyl collection that includes Frank Sinatra and Bob Dylan, and they occasionally reenact scenes from classic
    Western films at the community theater, letting their passion for storytelling shape evenings.
  travel: Jesus Munoz prefers road‑trip adventures that blend natural scenery and historic sites, having driven the Pacific Coast Highway to marvel at the redwoods, planning a future visit to California’s
    historic missions, and they cherish weekend getaways to Lake Arrowhead for fishing and reflection.
  culinary: Jesus Munoz relishes cooking a spice‑laden pork stew with chilies, coriander, and roasted corn tortillas, meticulously tending a backyard pepper garden to harvest fresh jalapeños and cilantro,
    and they frequently host potluck nights featuring homemade salsa verde and warm flan.
  core: Jesus Munoz blends seasoned engineering precision with garrulous charm, turning every garden plot, workshop, or karaoke mic into a stage for lifelong learning and community connection, even if they
    sometimes forget their own medication schedule.
background:
  cultural: Jesus was raised in a Mexican‑American household in Southern California, where bilingual Spanish‑English communication and strong family and community ties were central. His upbringing emphasized
    respect for elders, hospitality, and celebration of Mexican traditions such as Día de los Muertos, quinceañeras, and communal cooking of tamales and pozole. Living in Fontana's vibrant Latino community,
    he maintains close connections to cultural organizations, local festivals, and a Catholic parish, integrating these customs into his daily life. His Mexican heritage informs his values of generosity,
    storytelling, and a deep commitment to giving back to the neighborhood that shaped him.
attributes:
