persona_description: A researcher at the LORIA, a senior researcher who specializes in the field of machine learning and data mining, particularly in the development of autonomous learning systems. His
  team is working on the development of decision-support systems for oncologists and the screening of metabolic information to enable the emergence of markers that can predict and discriminate type 2 diabetes
  or new antibiotic compounds able to combat bacterial resistance. He is also involved in the development of a decision-support system for oncologists, which operates by analogy with a standard case of
  a cancer patient.
