    Set Design'']'
  career_goals: Kandace aims to step into a senior leadership role where she can guide interdisciplinary research teams to tackle societal challenges through mathematical and data‑driven solutions. She
    aspires to become a principal investigator on a federally funded project that merges quantitative analysis with environmental sustainability, while also mentoring emerging women scientists in STEM.
    Over the next five years she plans to publish high‑impact papers, secure substantial grant funding, and launch a community outreach program that bridges mathematics, data science, and the visual arts
    for local schools and cultural organizations.
