  hobbies: '[''Watercolor Painting'', ''Nature Photography'', ''Hiking'', ''Bridge (Card Game)'', ''Science Lectures'', ''Volunteering as Museum Docent'', ''Storytelling Workshops'', ''Digital 3D Modeling'',
    ''Community Theater'', ''Desert Xeriscape Gardening'']'
  career_goals: Although formally retired, Sophia aims to leave a lasting legacy by establishing an interdisciplinary STEAM program at the Scottsdale Museum of Contemporary Art that brings together scientists,
    artists, and senior citizens. She plans to write a popular‑science memoir that weaves her experiences in aerospace engineering with her love of abstract art, and to mentor a new generation of women
    in STEM through workshops at local universities. Additionally, she aspires to curate a traveling exhibition that showcases desert‑inspired scientific art, and to serve on the board of a nonprofit that
    promotes environmental education in the Southwest.
