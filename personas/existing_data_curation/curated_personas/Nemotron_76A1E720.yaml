  hobbies: '[''Chinese cooking'', ''Dim sum and moon‑cake baking'', ''Calligraphy'', ''Tea‑ceremony gatherings'', ''Coastal walking/hiking'', ''Balcony herb gardening'', ''Community cultural events'', ''Volunteer
    English tutoring'', ''Yoga for stress relief'']'
  career_goals: Sui aims to advance to a senior logistics management position within the next three years, overseeing a regional network of distribution centers. She plans to earn a Certified Supply Chain
    Professional (CSCP) credential and complete a Lean Six Sigma Green Belt to deepen her expertise in process improvement. Her longer‑term ambition is to lead a cross‑functional team that embeds sustainable
    and low‑stress practices into the company’s supply chain, while mentoring junior staff to foster a collaborative and harmonious workplace.
