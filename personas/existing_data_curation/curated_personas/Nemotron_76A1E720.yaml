personas:
  professional: A seasoned logistics strategist, Sui Tang leverages twenty years of supply‑chain expertise, mastering SAP Transportation Management and Oracle SCM, while designing airtight SOPs and dynamically
    troubleshooting disruptions, all with a calm, harmony‑focused leadership style that mentors junior staff toward collaborative excellence.
  sports: Sui Tang enjoys low‑impact fitness, walking coastal trails and practicing gentle yoga, supports the San Francisco Giants and Golden State Warriors, and joins a local cycling club for Sunday rides
    along the Bay.
  arts: Sui Tang embraces artistic expression through calligraphy and tea‑ceremony gatherings, often listening to Yo‑Yo Ma’s cello works, admiring Monet’s Water Lilies, and attending community gallery shows
    featuring up‑and‑coming artists like Maya Lin.
  travel: Sui Tang favors culturally immersive trips, having visited Kyoto’s historic tea houses and the vineyards of Tuscany, while dreaming of a tranquil cabin in New Zealand’s South Island and a spring
    road‑trip along the Pacific Coast Highway.
  culinary: Sui Tang excels at preparing dim sum and moon‑cakes, seasoning balcony herbs such as basil, cilantro, and mint with ginger and Sichuan pepper, and also enjoys crafting avocado toast with poached
    eggs and a drizzle of soy‑sesame dressing.
  core: Sui Tang balances a structured logistics career with spontaneous problem‑solving, channels stress into garden and tea‑ceremony rituals, and can’t resist a midnight moon‑cake after a marathon of
    spreadsheet analysis.
background:
  cultural: Sui is a first‑generation Chinese‑American whose family originates from Guangdong Province. Raised in San Francisco’s Chinatown community, she grew up speaking Mandarin, celebrating Lunar New
    Year and the Mid‑Autumn Festival, and internalizing values such as filial piety, collective well‑being, and practical diligence. While she embraces the multicultural vibe of the Bay Area, she maintains
    strong ties to her heritage through family meals, tea‑ceremony practice, and active involvement in local Chinese cultural organizations. Her background informs her cooperative work style, emphasis on
    harmony, and preference for reliable, tried‑and‑true processes.
attributes:
  skills: '[''Supply Chain Planning'', ''Inventory Management'', ''Transportation Coordination'', ''ERP Systems (SAP TM, Oracle SCM)'', ''Data Analysis & Forecasting'', ''Excel/VBA Dashboard Development'',
