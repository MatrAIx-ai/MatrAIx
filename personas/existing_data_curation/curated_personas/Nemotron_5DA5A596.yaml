  career_goals: Though only three, Darlene already talks about growing up to be someone who creates beautiful things—she imagines being an artist who paints vibrant pictures, a dancer who moves to music,
    an explorer who discovers new ideas, and someday perhaps a teacher who shares her love of art with other children. Her competitive streak pushes her to want to be “the best” at drawing and solving puzzles,
    while her relaxed attitude means she prefers to keep her future path open and full of varied experiences.
