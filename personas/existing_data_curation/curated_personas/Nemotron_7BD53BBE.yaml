  hobbies: '["Desert gardening", "Woodworking", "Reading historical literature", "Listening to tribal drumming and folk music", "Small community gatherings", "Cooking traditional meals", "Photography of
    desert landscapes", "Fishing", "Card games (Euchre)"]'
  career_goals: Although retired from formal employment, Jason’s ambition is to leave a lasting cultural legacy. He aims to document oral histories from his tribal elders, producing a small collection of
    recorded stories that will be archived at the local heritage museum. He also wishes to mentor a new generation of tribal youth in both practical trades and cultural practices, ensuring the continuity
    of traditional crafts and sustainable desert living. A personal project he is excited about is completing a handcrafted cedar birdhouse that will be placed in the community garden as a symbol of balance
    between structure and spontaneity—a theme that resonates with his personality. Additionally, he hopes to travel to significant Southwest sacred sites, such as the Grand Canyon and the San Pedro Mountains,
    to deepen his connection to the land and share those experiences with his wife and grandchildren.
