personas:
  professional: Francy Mascaro, a licensed electrician known for rigorous adherence to the NEC and Florida codes, builds solar‑panel systems and coordinates small crews with a structured, safety‑first mindset
    that balances meticulous documentation with a practical, results‑driven approach.
  sports: Francy Mascaro enjoys early‑morning beach runs along the Pensacola shoreline, plays casual volleyball with friends, supports the Pensacola Blue Wahoos baseball team, and follows the Tampa Bay
    Buccaneers as a dedicated NFL fan during the fall.
  arts: Francy Mascaro captures coastal sunsets and wildlife with a DSLR, drawing inspiration from Ansel Adams’ composition and the vibrant murals of local street artists, while unwinding to the acoustic
    folk sounds of José González and the rhythmic beats of the Pensacola Jazz Society.
  travel: Francy Mascaro plans trips that blend educational tours of solar farms in Arizona with relaxing beach stays in the Bahamas, preferring a balanced itinerary that leaves room for spontaneous photo
    hikes, and dreams of a future eco‑tourism excursion to Iceland’s geothermal sites.
  culinary: Francy Mascaro loves cooking traditional Mexican dishes like chiles en nogada and elevates them with Gulf‑Coast seafood twists—such as shrimp‑filled tacos topped with pickled jalapeños and fresh
    cilantro from their herb garden—while occasionally indulging in a steaming bowl of gumbo for comfort.
  core: Francy Mascaro blends a methodical work ethic with a hands‑on hobbyist’s curiosity, juggling electrician duties, solar ambitions, and a love for sunset photography—yet often forgets to water their
    herb garden when a new project sparks excitement.
background:
  cultural: Francy is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. Her family maintains cultural traditions such as celebrating Día de los
    Muertos and sharing Mexican holiday foods, while also embracing the coastal lifestyle of Pensacola. These influences shape her values of hospitality, community responsibility, and respect for heritage,
    which she expresses through family gatherings, cooking, and participation in local cultural events.
attributes:
  skills: '[''Electrical wiring and installation'', ''Conduit bending and layout'', ''Circuit troubleshooting and diagnostics'', ''Load calculations and code compliance (NEC, Florida)'', ''Safety inspections
    and OSHA training'', ''Solar photovoltaic system installation'', ''Use of hand and power tools, testing equipment'', ''Blueprint and schematic reading'', ''Project documentation and reporting'', ''Supervising
    apprentices and small‑team coordination'']'
  hobbies: '[''DIY electronics (Arduino, Raspberry Pi)'', ''Cooking Mexican and Gulf‑Coast fusion dishes'', ''Beach walks and sunset photography'', ''Herb gardening'', ''Reading technical and renewable‑energy
    publications'', ''Volunteer work (disaster relief, community clean‑ups)'', ''Listening to regional Mexican music and indie folk'']'
  career_goals: Francy aims to achieve Master Electrician licensure within the next three years and obtain specialized certifications in renewable energy installations. She envisions moving into a supervisory
    role at a reputable contracting firm or the municipal utility, where she can mentor apprentices and champion safety standards. Long‑term, she dreams of launching her own contracting business focused
    on sustainable residential projects, while continuing education through community‑college courses in electrical engineering and construction management.
