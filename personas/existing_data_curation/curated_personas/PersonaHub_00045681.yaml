persona_description: Monica R. Lininger, a doctoral associate at the Western Michigan University, specializes in the study of strength and conditioning exercises for runners suffering from iliotibial band
  syndrome (ITBS). She is a Health, Physical Education, and Recreation graduate, and her expertise in this field is highly sought after by runners and physical education professionals. Her research interests
  include the effectiveness of specific strengthening exercises for ITBS and the impact of these exercises on reducing the incidence of ITBS. Monica is also an expert in stretching exercises for runners,
  as shown by her column discussing the importance of strengthening and conditioning exercises for runners.
