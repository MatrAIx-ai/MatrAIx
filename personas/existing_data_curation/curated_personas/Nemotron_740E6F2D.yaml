personas:
  professional: Brian Graves, a veteran electrical engineer with 35 years in high‑voltage power distribution, leverages his critical, skeptical mindset and love of hands‑on tinkering to deliver meticulous
    renewable‑energy system designs while occasionally letting project timelines slip due to his flexible, disorganized work style.
  sports: Brian Graves stays fit by hiking the Illinois River Trail with the local Trailblazers Club, supports the Chicago Cubs and Chicago Bears, and joins a weekend fishing crew on Lake Michigan, preferring
    low‑intensity activities that balance social camaraderie with solitary nature immersion.
  arts: Brian Graves finds creative fulfillment restoring vintage Marantz amplifiers while blasting classic‑rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones at local concerts, and they
    frequently attend community art fairs to admire handcrafted wooden sculptures.
  travel: Brian Graves prefers road‑trip adventures that blend technical curiosity with scenic relaxation, having toured the solar farms of Germany’s Bavaria, dived into the waterfalls of Iceland, and planning
    a future visit to Norway’s fjords to study offshore wind installations.
  culinary: Brian Graves enjoys cooking hearty Midwestern fare such as smoked brisket, cornbread, and apple‑cinnamon crumble, using a backyard smoker and a well‑worn cast‑iron skillet, and they relish experimenting
    with smoked paprika and bourbon‑infused glazes.
  core: Brian Graves is a seasoned engineer‑inventor whose competitive curiosity fuels relentless tinkering, yet their laid‑back, slightly chaotic approach means projects often evolve organically, punctuated
    by vintage‑audio obsessions and a love of classic rock.
background:
  cultural: Brian grew up in a small Midwestern town in Illinois, a region known for its blend of agricultural roots and modest industrial growth. As a white American from the Midwest, he was raised with
    values of self-reliance, modesty, and a strong work ethic. Community ties in Sangamon County emphasized neighborly support, church gatherings, and local sports events, which shaped his appreciation
    for practical cooperation while maintaining an independent streak. The cultural emphasis on straightforward communication and pragmatic problem-solving aligns with his critical and skeptical personality.
    While his divorce introduced a more individualistic outlook, his Midwestern upbringing continues to influence his preference for flexibility, hands-on projects, and a balanced social life that respects
    personal space.
attributes:
  skills: '[''High-Voltage Power Distribution'', ''Low-Voltage Circuit Design'', ''PLC Programming (Allen-Bradley, Siemens)'', ''Embedded Firmware Development (C/C++)'', ''PCB Layout (Altium Designer)'',
