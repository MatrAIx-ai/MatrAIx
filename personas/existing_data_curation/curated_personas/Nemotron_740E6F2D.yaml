  hobbies: '[''Model Railroading'', ''Woodworking'', ''Home-Automation Tinkering (Arduino, Raspberry Pi)'', ''Amateur Radio Operation'', ''Vintage Audio Restoration'', ''Science-Technology Reading'', ''Gardening'',
    ''Hiking'', ''Fishing'', ''Engineering Meetups'', ''Classic-Rock Concerts'', ''Habitat for Humanity Volunteering'']'
  career_goals: Brian aims to transition from full-time employment at the local utility to a flexible consultancy role that lets him choose projects aligned with his personal interests. He aspires to mentor
    emerging engineers through the Illinois Society of Professional Engineers and to contribute to industry standards committees. Driven by his competitive streak, Brian is developing a smart-grid monitoring
    device that uses AI-based anomaly detection, with the goal of securing a patent and commercializing the product within three years. He also plans to write a technical memoir that blends lessons from
    decades of field work with emerging IoT trends, targeting both professional and hobbyist readers. Ultimately, Brian seeks to maintain professional relevance while preserving the freedom to pursue hands-on
    tinkering, family time, and occasional volunteer work.
