persona_description: A scientist at IFR who is committed to the responsible use of animals in research and actively seeks ways to find alternatives or reduce the number of animals needed for their research.
  They are knowledgeable about the UK's legislation governing the use of animals in research and the ethical considerations involved in conducting such research. They are also knowledgeable about the IFR's
  policies and procedures for the use of animals in research, including the use of alternative tests and models, the use of in vitro studies as substitutes for whole-animal studies, and the use of animals
  obtained for research. They are also knowledgeable about the IFR's commitment to the responsible use of animals in its research activities and the expectations of major research council and charitable
  funding bodies regarding responsibility in the use of vertebrate animals in bioscience research.
