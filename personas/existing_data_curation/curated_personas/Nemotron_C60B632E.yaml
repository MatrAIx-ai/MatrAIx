personas:
  professional: April Jackson is an aspiring computer science freshman who blends self‑taught Python and JavaScript expertise with meticulous Excel data analysis, and they apply their competitive, skeptical
    mindset and organized planning to create efficient web tools that balance curiosity‑driven exploration with practical deadlines.
  sports: April Jackson keeps fit by jogging through Piedmont Park and playing pickup basketball with a tight‑knit group of friends, while rooting for the Atlanta Hawks and Atlanta United, and they sharpen
    their competitive edge by logging personal bests in the city’s seasonal 5K runs and reviewing game statistics as a strategic hobby.
  arts: April Jackson immerses herself in Atlanta’s vibrant street‑art scene, admiring murals by Shepard Fairey and local creators, attends intimate poetry slams featuring spoken‑word artists like Saul Williams,
    and they fuel their creative downtime by reading science‑fiction works from authors such as Liu Cixin and listening to the eclectic sounds of Hozier and Janelle Monáe.
  travel: April Jackson prefers meticulously planned weekend road trips to nearby historic towns like Savannah and Charleston, while dreaming of a solo backpacking stint through Kyoto and Osaka to explore
    tech start‑ups and street art, and they balance these travel aspirations with a modest budget that reflects their disciplined saving habits.
  culinary: April Jackson delights in cooking family‑style collard greens simmered with smoked turkey and a spiced sweet‑potato pie, mastering the balance between comforting Southern flavors and modern
    plating, and they often host small dinner gatherings where they showcase these dishes alongside experimental side dishes like quinoa‑stuffed peppers.
  core: April Jackson is a quietly ambitious 18‑year‑old whose love of strategy games fuels a data‑driven mindset, whose reserved demeanor masks a fiercely competitive spirit, and they frequently pull all‑nighters
    coding while refueling on sweet‑potato pie.
background:
  cultural: April was raised in a close‑knit African‑American family in Atlanta’s historic West End neighborhood. Her parents, both educators, instilled the value of education and community service. Family
    gatherings often revolve around church, soul‑food cooking, and stories of the civil‑rights movement, with her grandparents having marched in the 1960s. She celebrates Juneteenth and Black History Month
    with pride, listening to gospel, R&B, and contemporary hip‑hop. The city’s rich Black cultural scene—museum exhibitions, spoken‑word events, and local activism—shapes her identity, fostering a strong
    sense of resilience, cultural pride, and a desire to give back to her community.
