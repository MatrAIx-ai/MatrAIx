  career_goals: April plans to enroll in a competitive computer science program at a university such as Georgia Tech or the University of North Carolina, aiming for a scholarship. She aspires to become
    a software engineer or data scientist where she can apply her analytical skills to develop technology solutions that address social inequities in the Black community. She intends to participate in hackathons,
    win a prize, and eventually launch a startup focused on affordable educational apps. In the longer term, she hopes to leverage her technical expertise to mentor fellow under‑represented youth and influence
    tech policy.
