  career_goals: Amy aims to become the top sales performer in her regional market within the next three years, eyeing the company's 'Salesperson of the Year' award as a milestone. She plans to earn a Certified
    Professional Salesperson (CPS) credential to bolster her credibility and to develop stronger time‑management habits that will prepare her for a future sales‑team lead or branch‑manager role. In the
    longer term, her competitive drive fuels an ambition to launch her own small distribution business that services local manufacturers, leveraging the industry knowledge she has accumulated while filling
    gaps in her formal education with a GED and targeted sales training.
