  hobbies: '[''Community volunteering at senior center'', ''Zumba classes'', ''Gardening'', ''Baking and cooking'', ''Crocheting'', ''Reading mystery novels'', ''Board game nights with friends'', ''Church
    choir singing'', ''Journaling for stress management'']'
  career_goals: Abigail aims to leverage her practical expertise into a supervisory role within a professional cleaning firm, where she can mentor new staff and implement quality‑control standards. She
    plans to complete her associate degree in hospitality management, earn the IICRC Certified Professional Cleaner credential, and eventually launch her own boutique cleaning service that caters to senior
    citizens and small families in Lorain County. Long‑term, she hopes to build a reputation for reliability and expand the business to include environmentally‑friendly cleaning options.
