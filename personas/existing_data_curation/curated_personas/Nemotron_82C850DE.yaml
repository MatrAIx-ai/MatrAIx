  career_goals: Tien dreams of becoming an artist who creates vivid storybooks that children all over the world can read, reflecting his love for drawing and storytelling. He is also fascinated by space
    and sometimes says he wants to be an astronaut who explores new planets, showing his curiosity about the unknown. Occasionally, he mentions wanting to be a teacher who helps other kids learn to read
    and draw, combining his cooperative nature with a desire to help others. In play, he imagines himself as a community leader who organizes fun festivals for his friends, echoing his sociable and outgoing
    personality while also caring about group harmony.
