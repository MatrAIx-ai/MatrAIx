personas:
  professional: Tien Lin, a budding little architect, channels their curiosity and love for new ideas into meticulously sorting LEGO bricks by shape and color before constructing whimsical castles, blending
    organization with imaginative flexibility while confidently leading playgroup building sessions.
  sports: Tien Lin energetically plays on the preschool soccer team, cheering loudly for the town's junior Tigers, also enjoys splash-time at the community pool where they practice butterfly kicks, and
    approaches new drills with both excitement and a nervous hesitation that sometimes makes them pause before attempting a new move.
  arts: Tien Lin delights in finger-painting bright dragons inspired by Eric Carle's illustrations, sings along to The Wiggles with unabashed enthusiasm, and spends weekends watching Pixar's "Toy Story"
    and "Moana", letting these creative sparks fuel their own doodles on every available surface.
  travel: Tien Lin has explored the nearby aquarium, splashed at a sunny beach resort during a family vacation, marveled at the towering skyscrapers of a city trip, and now day-dreams about visiting the
    ancient castles of Europe, always insisting on bringing a stuffed passport for pretend border checks.
  culinary: Tien Lin loves devouring cheesy mini-pizzas topped with mozzarella and a dash of oregano, slurping spicy ramen noodles with gusto, munching on apple slices dipped in caramel, and can proudly
    make a peanut-butter-jelly sandwich lined up in the kitchen, though they often forget to wash their hands afterwards.
  core: Tien Lin is a curious, energetic five-year-old who builds intricate LEGO worlds, meticulously saves coins, worries about health sniffles, bursts with artistic flair, and can't resist turning any
    flat surface into a doodle canvas.
background:
  cultural: Tien is raised in an East Asian household of Chinese heritage, living in Prospect, Kentucky. At home, his family speaks both English and Mandarin, and they observe traditional customs such as
    Lunar New Year celebrations, where they prepare festive foods, decorate with red lanterns, and share stories about ancestors. Traditional Chinese dishes like dumplings and stir‑fry meals are a regular
    part of family meals, and he enjoys helping with simple cooking tasks. The family participates in a local cultural community center that hosts language classes, dragon dance practice, and cultural festivals,
    allowing Tien to interact with peers from similar backgrounds. Simultaneously, he experiences typical American childhood activities—preschool, birthday parties, sports days at the park, and holidays
    like Thanksgiving—blending both cultural worlds. This dual exposure fosters his bilingual abilities, respect for family elders, appreciation for collectivist values, and an openness to new ideas and
    experiences.
