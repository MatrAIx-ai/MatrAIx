persona_description: A team leader and scientist who is part of the National Environmental Science Program (NESP) Northern Australia Environmental Resources Hub, working with Traditional Owners and Indigenous
  rangers to develop innovative ways to apply science and Indigenous knowledge to manage Kakadu National Park. She is a leader in using high-tech monitoring and data analysis to tailor management of invasive
  weeds and adaptively co-manage important landscapes. Her work has been recognized with the Department of Industry, Science, Energy and Resources Eureka Prize for STEM Inclusion. She is also a member of
  the NESP Northern Australia Environmental Resources Hub and has experience in working with the Bininj/Mungguy Traditional Owners and rangers in the national park.
