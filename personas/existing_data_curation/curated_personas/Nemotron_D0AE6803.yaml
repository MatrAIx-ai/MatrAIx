personas:
  professional: Jeanette Ellis, a seasoned IT support veteran with over thirty years of hands‑on experience across Windows, macOS, and Linux, blends their technical troubleshooting prowess with a vivid
    imagination to translate complex concepts into accessible language, while channeling their love for art into community workshops that empower seniors to create digital collages and interactive installations.
  sports: Jeanette Ellis, a gentle‑exercise enthusiast, enjoys early‑morning walks along the Allegheny River trail, participates in a local seniors’ yoga group, and cheers on the Pittsburgh Steelers and
    the Pittsburgh Penguins while attending high‑school football games at Armstrong County Central, yet they rarely join competitive sports, preferring the calm of birdwatching hikes over intense workouts.
  arts: Jeanette Ellis, a watercolor painter and abstract collage maker, draws inspiration from the rolling hills of their hometown, cites Monet and contemporary artist Yayoi Kusama as visual influences,
    captures rural architecture through a Canon EOS R photography series, writes speculative short fiction reminiscent of Ted Chiang, and regularly attends performances by the Lyric Players theater troupe
    and folk music festivals featuring artist Sarah White.
  travel: Jeanette Ellis, an off‑beat road‑trip planner, favors spontaneous day‑long drives to nearby historic sites like Gettysburg and the Amish farms of Lancaster, cherishes annual visits to the folk
    festival in Asheville, NC, and dreams of a leisurely cruise along the Norwegian fjords, but their travel budgets are modest, so they often use senior discounts, stay in family‑run B&Bs, and book through
    the community library’s travel portal.
  culinary: Jeanette Ellis, a kitchen experimenter with a love for Pennsylvania Dutch cuisine, frequently cooks chicken pot pie, sauerkraut, and shoofly pie using fresh herbs from their garden, enjoys perfecting
    German apple strudel and Irish soda bread on weekends, and pairs meals with locally brewed craft beer, though they sometimes forget to defrost meat in time for dinner, leading to last‑minute takeout
    orders.
  core: Jeanette Ellis is a 57‑year‑old tech‑savvy creative who melds rural traditions, digital art, and a restless curiosity into community workshops, while occasionally misplacing appointments in the
    whirlwind of their many passions.
background:
  cultural: Jeanette is a lifelong resident of western Pennsylvania, raised in a white, Appalachian‑influenced family with German and Irish roots. Her upbringing emphasized community, self‑reliance, and
    modesty, shaped by the rhythms of county fairs, Pennsylvania Dutch culinary traditions, and the close‑knit social fabric of Armstrong County. Though she was baptized in a Lutheran church, her adult
    spirituality is eclectic, blending quiet contemplation with a deep appreciation for nature. As a widowed elder, she maintains strong ties to multi‑generational family networks and uses technology to
    stay connected with relatives across the country, embodying the region’s blend of tradition and adaptation.
attributes:
  skills: '[''Technical troubleshooting (hardware/software)'', ''Network diagnostics and Wi‑Fi troubleshooting'', ''Remote desktop and support tools (TeamViewer, GoToAssist)'', ''Operating system administration
    (Windows, macOS, Linux)'', ''Scripting basics (PowerShell, Bash)'', ''Cybersecurity best practices for small businesses'', ''Customer service and conflict de‑escalation'', ''Technical documentation
    and knowledge‑base creation'', ''IT training and workshops for senior citizens'', ''Hardware repair and component upgrades'', ''Ticketing system management (Jira, ServiceNow)'', ''Process improvement
    and workflow automation'']'
  hobbies: '[''Watercolor painting'', ''Abstract collage art'', ''Landscape photography'', ''Short speculative fiction and poetry writing'', ''Community theater attendance'', ''Volunteer IT mentoring at
    the local library'', ''Raspberry Pi and Arduino DIY projects'', ''Gardening'', ''Birdwatching'', ''Yoga and meditation'', ''County fairs and antique market exploration'', ''Folk music festivals'']'
  career_goals: Looking ahead, Jeanette hopes to pivot toward a role that blends her technical expertise with her artistic imagination. She aims to become a community tech‑education specialist, designing
    and delivering workshops that empower older adults and hobbyists to create digital art, interactive installations, and simple programming projects. She plans to earn certifications in \"UX design\"
    and CompTIA Security+ to broaden her skill set, and to launch a freelance consulting practice that offers flexible, on‑demand support for local small businesses while allowing her to pursue creative
    side projects. Ultimately, she wants to mentor the next generation of IT support professionals and to leave a lasting impact on her hometown’s digital inclusivity.
