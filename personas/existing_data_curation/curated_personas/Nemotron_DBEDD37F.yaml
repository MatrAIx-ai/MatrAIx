personas:
  professional: Shannon Stallard is a self‑appointed junior project coordinator in her elementary school, orchestrating the soccer team’s practice schedules, leading Girl Scout badge‑earning missions, and
    turning LEGO builds into mini‑exhibitions that showcase methodical planning and a natural flair for teamwork, hinting at a future career in community planning or project management.
  sports: Shannon Stallard is a midfield dynamo on the Willow Creek Elementary soccer team, idolizing U.S. women's national team captain Megan Rapinoe, cheering on the nearby minor league baseball team
    the River City Rangers, and organizing neighborhood pick‑up games that blend their energetic sociability with a disciplined training routine that includes weekend hikes with the Girl Scouts.
  arts: Shannon Stallard immerses themselves in creative worlds by constructing custom LEGO sets inspired by the architectural designs of Frank Lloyd Wright, devouring mystery series by Agatha Christie
    and Nancy Drew, playing chess tournaments at the local community center, and enjoying the pop sounds of Taylor Swift and the classic melodies of The Beatles, all of which shape a vibrant artistic identity
    that balances methodical problem‑solving with imaginative play.
  travel: Shannon Stallard loves planning adventurous outings with their family using checklist‑style itineraries, having camped at Rocky Mountain State Park, visited the Smithsonian museums in Washington, D.C.,
    and dreams of strolling the streets of Paris to see the Eiffel Tower, yet they always request a familiar snack and a quiet spot to read, reflecting their blend of curiosity and need for predictable
    comfort.
  culinary: Shannon Stallard delights in baking chocolate‑chip cookies, sugar cookies with sprinkles, and banana‑nut muffins, following step‑by‑step recipes from a kid‑friendly cookbook that emphasizes
    precise measurements, while they also experiment with creating LEGO‑shaped fruit salads and enjoy the occasional indulgence of pizza slices topped with extra cheese, showcasing a disciplined yet playful
    approach to food.
  core: Shannon Stallard is an organized, upbeat nine‑year‑old who balances soccer, Girl Scouts, LEGO engineering, and careful allowance management with calm resilience, turning each activity into a structured
    adventure while never missing a chance for fun.
background:
  cultural: Shannon grows up in a middle-class, predominantly Anglo-American household in Hanover, Maryland. Her family celebrates typical American holidays such as Thanksgiving, Fourth of July, and Christmas,
    and often participates in community events like the Howard County Fair. The household values punctuality, education, and community involvement, reflecting broader suburban U.S. cultural norms. Though
    principally American, family stories reference Irish and English ancestral roots that occasionally influence family recipes and holiday traditions.
