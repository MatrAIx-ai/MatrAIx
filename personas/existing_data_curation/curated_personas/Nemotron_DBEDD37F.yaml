  career_goals: She aims to pursue a career that blends her love for structure, helping others, and teamwork. Shannon envisions becoming an elementary school teacher or a community event coordinator, roles
    where she can design organized learning experiences and guide peers. She is also curious about science and has a budding interest in veterinary medicine, hoping to study animals in the future.
