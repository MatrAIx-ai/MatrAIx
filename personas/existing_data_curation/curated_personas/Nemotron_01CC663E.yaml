  career_goals: To further his impact, Toan aims to create a flagship interdisciplinary program titled 'Southeast Asian Diaspora Studies' that combines literature, history, and contemporary social issues,
    and to secure external funding for a community-engaged research center. He aspires to publish a monograph on the evolution of Vietnamese-American storytelling, attain a senior leadership role such as
    department chair or dean, and mentor emerging scholars from underrepresented backgrounds. Balancing his professional drive with his desire for flexibility, he also seeks to maintain a healthy work-life
    rhythm that allows time for family, travel, and personal growth.
