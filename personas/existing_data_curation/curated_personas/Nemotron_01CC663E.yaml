personas:
  professional: Toan Tran, a seasoned professor of diaspora literature and cultural studies with three decades of experience, blends practical curriculum design with experimental digital pedagogy, leveraging
    a curious yet pragmatic mindset while navigating a relaxed, sometimes disorganized schedule, they mentor students and secure research grants.
  sports: Toan Tran, an enthusiastic badminton player at the San Francisco Badminton Association who enjoys weekend hikes in Muir Woods, also supports the San Francisco Giants and the Golden State Warriors,
    balancing casual club play with occasional attendance at professional games, and they relish the social camaraderie that sports bring.
  arts: Toan Tran, a devoted lover of historical fiction and poetry, regularly attends literary readings at City Lights Café, immerses in the works of Yo‑Yo Ma, Ken Liu, and Maya Angelou, and frequently
    visits the Asian Art Museum of San Francisco, letting these artistic experiences shape their teaching and personal worldview.
  travel: Toan Tran, who prefers loosely planned, experience‑focused trips, has explored Kyoto’s temples, the Louvre in Paris, and the rugged coastlines of New Zealand, yet they balance future travel ambitions
    with family commitments and a modest retirement budget.
  culinary: Toan Tran, an adept home chef who lovingly prepares fragrant beef noodle soup, crisp spring rolls, and herb‑laden rice paper rolls using fresh herbs, lemongrass, and fish sauce, delights family
    gatherings with these meals while they occasionally neglect kitchen cleanup due to a habit of multitasking during busy evenings.
  core: Toan Tran, a curiosity‑driven yet easy‑going scholar with a penchant for spontaneous cultural immersion, balances academic ambition with a love of community, noodles, and occasional disorganization.
background:
  cultural: Toan was born to Vietnamese immigrant parents who settled in New York City during the post-Vietnam War wave of migration. Growing up in the vibrant, multiethnic neighborhoods of Queens, he was
    immersed in both traditional Vietnamese customs—such as Lunar New Year celebrations, family-oriented communal meals, and respect for hierarchical relationships—and the broader American cultural mosaic.
    This bicultural upbringing instilled in him a strong sense of collective responsibility, reverence for education, and an appreciation for cultural hybridity. His identity as a Southeast Asian American
    informs his teaching philosophy, research interests, and community involvement, allowing him to navigate and celebrate the intersection of heritage and contemporary urban life.
