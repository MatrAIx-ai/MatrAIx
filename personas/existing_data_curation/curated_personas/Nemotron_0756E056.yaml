  hobbies: '[''Morning walks in the local park'', ''Quilting circles at the community center'', ''Bridge tournaments at the senior center'', ''Gospel choir singing'', ''Cooking traditional soul food'',
    ''Gardening (vegetable beds)'', ''History book club'', ''Organizing Juneteenth celebrations'', ''Genealogy research'', ''Low‑impact group aerobics class'']'
  career_goals: Although retired from formal employment, Lucy aims to continue serving as a senior community leader. She plans to expand the volunteer training program at the local senior center, mentor
    younger members of the African‑American church choir, and document her family's migration story in a small memoir. Lucy also hopes to launch a neighborhood gardening club that promotes food security
    for seniors, while maintaining her personal health milestones by completing a senior fitness challenge. Her overarching ambition is to leave a lasting legacy of organized, high‑standard community service
    and skilled craftsmanship that inspires future generations.
