  hobbies: '[''Gardening'', ''Hiking in the Piedmont foothills'', ''Reading contemporary fiction'', ''Cooking Southern cuisine'', ''Photography'', ''Listening to folk and bluegrass music'', ''Yoga'', ''Volunteering
    at community garden'']'
  career_goals: Looking ahead, Carolyn aims to solidify a sustainable independent practice that merges her love of the natural Piedmont landscape with contemporary social narratives. She plans to mount
    a solo exhibition in a regional gallery within the next two years, followed by a residency at a Southern arts retreat to develop a new series of mixed‑media works. To diversify her income, she intends
    to launch an online storefront for limited‑edition prints and handcrafted objects, while also expanding her workshop program to include therapeutic art sessions for seniors in the Mooresville community.
    Ultimately, she hopes to serve on the board of the Iredell County Arts Council, using her practical experience to advocate for artist‑friendly policies and community‑based art initiatives.
