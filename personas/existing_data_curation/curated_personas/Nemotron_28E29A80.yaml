personas:
  professional: An independent visual artist and studio manager, Carolyn Cook blends a curiosity for new media with practical mastery of oil, acrylic, watercolor, and digital illustration, using their skillful
    mix of traditional painting, 3D‑printed sculptural pieces, and laser‑cut designs to secure grants, commissions, and community workshops while navigating a loosely organized schedule that reflects their
    relaxed approach to obligations.
  sports: An outdoor‑focused fitness enthusiast, Carolyn Cook hikes the Lake Norman trail and the Appalachian foothills with the Lake Norman Hiking Club, joins a weekly gentle‑yoga session at the Mooresville
    community center, and roots for the Charlotte Hornets, Panthers, and Hurricanes as a dedicated local sports fan, while they occasionally play pickup tennis at the nearby country club.
  arts: An eclectic creator and cultural citizen, Carolyn Cook draws inspiration from folk legends like Alison Kraus and bluegrass pioneers The Avett Brothers, admires contemporary painter Kara Walker,
    curates their own small gallery shows featuring mixed‑media works, and spends evenings attending intimate performances at the Historic Mooresville Theater, where they also volunteer to give art workshops
    for youth.
  travel: An intentional traveler with a love for slow‑paced road trips, Carolyn Cook prefers planning excursions around the changing foliage of the Blue Ridge Parkway and weekend getaways to Asheville’s
    craft breweries, while also dreaming of a summer retreat in Provence’s lavender fields, balancing a modest vacation budget with occasional splurges on boutique B&B stays in Charleston.
  culinary: A seasoned home cook, Carolyn Cook excels at preparing low‑country boil with shrimp, crab, corn, and sausage, crafts peach cobbler using fresh, locally sourced peaches and a buttery crumble
    topping, and experiments with seasonal vegetables from their garden—such as heirloom tomatoes, sweet potatoes, and okra—in Southern‑inspired dishes, while they occasionally indulge in food‑truck tacos
    for a spontaneous flavor change.
  core: Carolyn Cook is a steady‑hearted, garden‑loving artist who balances creative curiosity with practical flexibility, often juggling projects amid a charmingly disorganized studio, savoring Southern
    comfort food, and finding calm in quiet hikes and gentle yoga.
background:
  cultural: Carolyn is a white American who grew up in a small town in central North Carolina, surrounded by the region’s blend of Southern hospitality and Appalachian folk traditions. Her bachelor's degree
    in the humanities exposed her to a wide range of cultural narratives, from European Renaissance art to non‑Western visual practices, which she weaves into her own creative voice. Living in Mooresville,
    she participates in local art festivals, farmers’ markets, and the Iredell County Arts Council, valuing the close‑knit community ethos while maintaining an independent, reflective outlook. Her cultural
    identity reflects a balance of Southern roots, an appreciation for rural craftsmanship, and a curiosity about broader artistic movements.
