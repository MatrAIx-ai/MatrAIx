persona_description: A conservation officer with the New York State Department of Environmental Conservation, responsible for monitoring and controlling invasive pests like emerald ash borers in the state.
  They have expertise in pest management, biological control, and invasive species. They are currently working on a high-risk area in Cattaraugus County, where the first borers were found last year. They
  are aware of the potential economic and ecological impacts of the borers and are committed to controlling their spread.
