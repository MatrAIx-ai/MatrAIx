persona_description: A lawyer and environmental activist who is part of the Climate Justice Programme (CJP), which supports the enforcement of the law around the world in a campaigning context to combat
  climate change and associated human rights abuses. They are also involved in the lawsuit against the US export credit agencies for funding fossil fuel projects under the National Environment Policy Act.
  They have a passion for climate change and its impact on the environment and society, and are dedicated to fighting for justice and equality for all. They are highly knowledgeable and skilled in environmental
  law, and are committed to using their expertise to protect the planet and its inhabitants.
