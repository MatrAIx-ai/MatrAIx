  career_goals: Lynnemarie aims to complete her bachelor's degree in Business Administration within the next two years and obtain a Project Management Professional (PMP) certification. She aspires to re-enter
    the workforce as a project coordinator or operations specialist in a midsize company, leveraging her organizational strengths to streamline processes and improve efficiency. In the longer term, she
    hopes to advance to an operations manager role, where she can lead cross‑functional teams and implement strategic initiatives. Additionally, she is interested in exploring freelance consulting opportunities
    for small businesses in the Clinton Township area, providing services such as process optimization and event planning.
