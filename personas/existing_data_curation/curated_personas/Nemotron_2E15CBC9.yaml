personas:
  professional: Charles Misuraca, a 13-year-old aspiring digital artist and budding game level designer, merges a love for drawing, storytelling video games, and Scratch coding, channeling their curiosity
    and relaxed, flexible mindset into creating whimsical characters and simple interactive worlds that often defy conventional design rules.
  sports: Charles Misuraca enjoys skateboarding at the local park with friends on weekends, follows the high-school basketball team and the Los Angeles Lakers for inspiration, and occasionally practices
    basic soccer drills during school recess, balancing a love for spontaneous movement with a relaxed attitude toward structured workouts.
  arts: Charles Misuraca draws inspiration from Studio Ghibli films, especially Hayao Miyazaki’s whimsical worlds, and from video game pioneers like Shigeru Miyamoto, while their acoustic guitar practice
    revisits classic folk songs by Bob Dylan and contemporary riffs by Tame Impala; they regularly attend school art club meetings where they experiment with watercolor techniques reminiscent of Van Gogh’s
    bold brushstrokes.
  travel: Charles Misuraca dreams of a weekend road trip to the Grand Canyon’s rim for sketching sunrise vistas, recently visited Orlando’s Universal Studios to explore immersive themed lands, and hopes
    to someday travel to Kyoto, Japan, to experience traditional tea ceremonies and anime culture firsthand, all while relying on their parents’ flexible scheduling and modest travel budget.
  culinary: Charles Misuraca’s palate favors pepperoni pizza, creamy ramen broth, and homemade strawberry smoothies, and they love experimenting in the kitchen by tossing fresh basil onto spaghetti and
    mastering the perfect flip of scrambled eggs, though they often skip cleaning the dishes until the next day, leaving a small pile of plates as a testament to their laid-back habits.
  core: Charles Misuraca is a curious, art-obsessed teen who balances sketchbooks and video games with a habit of half-finished projects, spontaneous skate sessions, and a penchant for forgetting to clean
    up after cooking.
background:
  cultural: Charles grew up in Westland, Michigan, a suburb in the Detroit metropolitan area. His upbringing reflects typical Midwestern American values such as community involvement, modesty, and a strong
    appreciation for public education. He celebrates national holidays like Independence Day and Thanksgiving with family gatherings and enjoys local traditions such as summer fairs and community sports
    leagues. His family’s cultural practices include attending seasonal festivals, watching classic American movies, and listening to a mix of contemporary pop, classic rock, and occasional folk music,
    all of which shape his artistic sensibilities.
