    "volunteering in a community arts program"]'
  career_goals: Charles dreams of turning his love for art and technology into a future career where he can create visual stories and interactive experiences. He aims to build a strong portfolio of drawings,
    digital designs, and small games throughout high school, hoping to study graphic design, animation, or game development in college. He also envisions using his cooperative nature to work on collaborative
    projects that bring imaginative ideas to life, perhaps as a concept artist or junior developer at a creative studio.
