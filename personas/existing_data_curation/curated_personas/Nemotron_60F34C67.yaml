personas:
  professional: Robert Montgomery is a budding junior engineer and robotics hobbyist who fuses their love of intricate LEGO constructions with Scratch programming, applying a curious yet practical mindset
    and a competitive drive to design functional moving mechanisms while confidently presenting their projects to peers and teachers.
  sports: Robert Montgomery plays midfield for the Jacksonville Jaguars Youth Soccer Club, training three times a week with a competitive spirit that drives them to outmaneuver opponents, while cheering
    on the Jacksonville Jaguars NFL team and the Jacksonville Jumbo Shrimp MLB squad on weekends, and they cap their athletic routine with bike rides along the St. Johns River.
  arts: Robert Montgomery drums in the school marching band, channeling their talkative, center‑stage energy into lively renditions of classic rock songs by The Who and modern hits by Imagine Dragons, and
    they fuel their creative imagination by devouring graphic novels and watching movies starring Tom Holland.
  travel: Robert Montgomery loves weekend road trips with their family to the historic forts of St. Augustine and the Kennedy Space Center, and they dream of a summer camp adventure in the Colorado Rockies,
    keeping a meticulously drawn travel journal that balances their organized planning with spontaneous detours to local taco trucks.
  culinary: Robert Montgomery enjoys grabbing a slice of pepperoni pizza after soccer practice, savoring fresh shrimp and grits at their favorite waterfront restaurant, and occasionally experimenting at
    home with simple chicken tacos seasoned with cilantro, lime, and a dash of cumin, though their habit of leaving LEGO pieces on the kitchen counter often slows their cooking process.
  core: Robert Montgomery is a curious, competitive 12‑year‑old who blends their passion for building, coding, and drumming with a calm, sociable demeanor, thriving as the life‑of‑the‑party while meticulously
    planning their next LEGO masterpiece or soccer move.
background:
  cultural: Robert grew up in Jacksonville, Florida, a coastal city that blends Southern hospitality with a vibrant, multicultural atmosphere. His family belongs to a middle‑class, largely Anglo‑American
    community, and they value education, community involvement, and outdoor activities common to the region. Growing up near the St. Johns River and the Atlantic coast, he often spends weekends exploring
    local parks, attending community festivals, and enjoying the city’s warm climate. While his cultural upbringing reflects typical Southern values such as friendliness and respect for tradition, Jacksonville’s
    growing diversity has also exposed him to a variety of cuisines, music, and perspectives, widening his social outlook.
attributes:
  skills: '["Effective communication", "Leadership in group settings", "Basic visual programming (Scratch)", "Strategic thinking (chess, robotics)", "Hands‑on problem solving (LEGO Technic)", "Organizational
    planning with flexibility", "Public speaking", "Competitive analysis"]'
  hobbies: '["LEGO building and engineering", "Scratch visual programming", "Strategic video gaming", "Chess", "Reading popular science", "Debate club participation", "Youth soccer", "School band drumming",
    "Organizing neighborhood game nights"]'
  career_goals: Robert aims to channel his curiosity and competitive drive into a future career in science, technology, engineering, or mathematics. He dreams of joining a competitive robotics team in middle
    school and ultimately earning a scholarship to study engineering, with a long‑term ambition to design affordable, sustainable technology solutions for his community. He also envisions himself as a mentor
    who can lead youth workshops, combining his love for public speaking with his desire to inspire other curious minds. In the short term, he is focused on winning his school's science fair and securing
    a spot in a statewide coding competition.
