personas:
  professional: Richard Tigani, a 19‑year‑old psychology major at UW‑Madison, blends strong research abilities, meticulous project planning, and empathetic communication to lead campus mental‑health workshops
    and coordinate art‑therapy events for peers.
  sports: Richard Tigani plays intramural ultimate frisbee for the Madison Mavericks, follows the Green Bay Packers and the Milwaukee Bucks, and hikes the Ice Age Trail on weekends to stay fit and socialize,
    though fatigue from juggling clubs can lead them to skip workouts.
  arts: Richard Tigani frequents the Madison Museum of Contemporary Art, the Overture Center, and local art fairs, sketches urban street scenes, paints in watercolor, and performs acoustic guitar at The
    Co‑Op Café open‑mic, drawing inspiration from Vincent van Gogh, Joni Mitchell, and muralist Jacob Cruz.
  travel: Richard Tigani prefers short, budget‑friendly trips to Midwest cities like Chicago, Minneapolis, and Indianapolis, with a growing wish to explore New Orleans' vibrant art scene, balancing careful
    planning with spontaneous weekend road trips during school breaks.
  culinary: Richard Tigani experiments with fusion dishes such as kimchi‑topped avocado toast and rosemary‑infused beet risotto, enjoys brewing pour‑over coffee with single‑origin beans, and often cooks
    in shared kitchen spaces while occasionally leaving plates unfinished when overwhelmed by assignments.
  core: Richard Tigani is a curiosity‑driven, organized 19‑year‑old who merges art, psychology, and activism, yet wrestles with worry‑induced procrastination and a penchant for late‑night coffee‑fueled
    creativity.
background:
  cultural: Richard is a White American raised in a middle-class, Midwestern family with German-Scandinavian ancestry in Madison, Wisconsin. Growing up in a city known for its progressive university culture,
    he has been exposed to diverse artistic, activist, and social-justice communities. His upbringing blends traditional Midwestern values of modesty, hard work, and community cooperation with the inclusive,
    multicultural ethos of Madison. Family celebrations of typical American holidays coexist with an appreciation for global perspectives fostered by his college environment and the city's vibrant cultural
    festivals.
attributes:
  skills: '["Research and data analysis", "Literature review", "Basic statistical analysis (SPSS, Python)", "Academic writing", "Public speaking", "Project planning and coordination", "Time-management",
    "Event organization", "Empathy and active listening", "Conflict resolution", "Team collaboration", "Microsoft Office and Google Workspace", "Adobe Photoshop and Illustrator", "Art history knowledge",
    "Music theory basics"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and painting", "Playing acoustic guitar", "Attending open-mic and live music events", "Hiking and outdoor exploration", "Intramural ultimate
    frisbee", "Volunteering at a mental-health helpline", "Mindfulness meditation", "Reading philosophy and psychology", "Journaling", "Cooking experimental recipes", "Exploring coffee shop culture"]'
  career_goals: Richard aims to complete a bachelor's degree in psychology or social work and then pursue a master's in counseling or community mental health. He aspires to become a licensed mental health
    counselor who integrates art therapy techniques to help young adults manage anxiety and stress. In the longer term, he hopes to establish a nonprofit community center in Madison that offers art workshops,
    peer-support groups, and mental-health resources, fostering a creative and compassionate environment. He also wants to influence local policy to secure funding for arts-based mental-health programs
    and to promote inclusive, trauma-informed services within the city's public health system.
