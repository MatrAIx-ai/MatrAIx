  career_goals: Even at 97, Gwen remains committed to leaving a lasting educational legacy. She aims to compile a reflective memoir that intertwines her pedagogical philosophy with personal narratives,
    and to publish a series of lesson‑plan guides that embed art and abstract thinking into core subjects. Gwen plans to mentor retired teachers who wish to volunteer in local after‑school programs, and
    to establish a modest scholarship for students interested in pursuing literature and visual arts. Her overarching ambition is to nurture a culture of curiosity and harmony in the Tucson school community,
    ensuring that future generations continue to value creativity alongside academic rigor.
