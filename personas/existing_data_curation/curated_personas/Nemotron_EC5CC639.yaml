  career_goals: She aims to transition from senior analyst to a strategic leadership role, such as Operations Research Team Lead or Director of Analytics, where she can shape organization‑wide decision‑making
    frameworks. Elizabeth wants to champion the integration of ethical AI and machine‑learning tools within traditional OR practices, ensuring that new methods remain aligned with pragmatic business outcomes.
    She also aspires to earn a professional certification (e.g., ASOR Certified Analytics Professional) and to develop a mentorship program that supports women entering STEM fields. Balancing her ambition
    with personal well‑being, she seeks a role that offers flexibility, reduced stress, and opportunities to contribute to community‑focused projects, such as optimizing local nonprofit logistics or municipal
    sustainability initiatives.
