  hobbies: '[''Community Events'', ''African American Book Club'', ''Photography'', ''Road Trips'', ''Soul/Jazz Music'', ''Southern Cooking'', ''Chess'', ''Basketball Spectating'', ''Food Bank Volunteering'',
    ''Gardening'', ''DIY Home Projects'']'
  career_goals: Approaching retirement age, Kory aims to transition into a senior administrative leadership role, such as Office Manager or Operations Coordinator for a nonprofit or community‑focused organization
    in York County. He plans to earn a Project Management Professional (PMP) or Administrative Management certification within the next two years to formalize his expertise. Kory also aspires to mentor
    junior staff, develop a training program on office best practices, and eventually launch a part‑time consulting service that helps small local businesses streamline their administrative processes. He
    is motivated to apply his organizational experience to community development projects, especially those supporting African American cultural initiatives.
