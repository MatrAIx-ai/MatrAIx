personas:
  professional: Kory Hall, a seasoned administrative professional with a knack for juggling calendars, event logistics, and basic bookkeeping, blends curiosity‑driven problem‑solving with a spontaneous,
    people‑focused style that occasionally clashes with tight deadlines, and they are now eyeing a senior office‑manager role at a York County nonprofit while pursuing a PMP certification.
  sports: Kory Hall follows the Philadelphia 76ers and the Eagles with fervor, occasionally laces up for games in the local York County adult basketball league, stays active by playing chess at the senior
    center and taking brisk walks around the Mechanicsburg farmers market, and they prefer low‑impact cardio over high‑intensity workouts due to knee concerns.
  arts: Kory Hall immerses themselves in soul and jazz, regularly listening to Aretha Franklin, Marvin Gaye, and John Coltrane while curating a personal photo collection of street scenes, and they discuss
    works by Toni Morrison and James Baldwin in a book club that fuels both their cultural curiosity and creative inspiration.
  travel: Kory Hall favors spontaneous weekend road trips, often driving their DSLR‑laden car to nearby towns like Lancaster, Gettysburg, and Harrisburg to capture street life, while dreaming of a low‑key
    getaway to New Orleans for its music scene, and they balance the love of adventure with a modest travel budget.
  culinary: Kory Hall, an enthusiastic home cook, frequently prepares Southern‑inspired dishes such as fried chicken, collard greens seasoned with smoked paprika, and peach‑glazed cornbread for friends,
    while their culinary curiosity leads them to experiment with okra gumbo and sweet tea brewed with loose‑leaf black tea, and they relish sharing meals over coffee at the book club.
  core: Kory Hall blends decades of administrative expertise with a lively social spirit, a spontaneous streak that sometimes derails deadlines, a love of jazz and Southern cooking, and a penchant for impromptu
    road‑trip photography, and they keep life both organized and delightfully unpredictable.
background:
  cultural: Kory identifies as African American, descending from families that migrated north during the Great Migration and settled in Pennsylvania. His upbringing was shaped by strong ties to the black
    church, gospel music, and family storytelling traditions that emphasized resilience and community solidarity. Growing up in a predominantly white suburb, he navigated a bicultural experience, blending
    Southern cultural roots with Mid‑Atlantic life. He actively celebrates his heritage by participating in local Juneteenth parades, supporting black‑owned businesses, and volunteering with organizations
    focused on racial equity and youth mentorship. These cultural experiences inform his worldview, collaborative approach, and commitment to fostering inclusive environments at work and in the community.
