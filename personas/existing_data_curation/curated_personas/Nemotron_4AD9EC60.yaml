  career_goals: Charles dreams of a future that merges his love for art and technology. He aspires to become a video game designer or graphic animator, creating immersive visual stories. He also imagines
    using his artistic skills to illustrate environmental topics, raising awareness about nature and conservation. In the near term, he hopes to attend a specialized high school for the arts, then pursue
    a university degree in visual arts, computer science, or environmental design.
