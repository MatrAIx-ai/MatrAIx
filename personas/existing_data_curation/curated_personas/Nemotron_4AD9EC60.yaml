personas:
  professional: Charles Rogers, an aspiring digital artist and budding animator, merges a love for realistic bayou landscapes with a curiosity for tech, often leading school art club projects while balancing
    homework and LEGO design.
  sports: Charles Rogers, an avid nature‑wanderer who plays on the middle‑school soccer team, follows the New Orleans Saints and Pelicans, and joins a weekend junior birdwatching trek that doubles as low‑impact
    cardio, preferring a relaxed approach to fitness that balances organized practice with spontaneous park runs.
  arts: Charles Rogers, a curious art enthusiast who emulates the brushstrokes of Claude Monet while sketching Louisiana bayous, animates short loops in Procreate inspired by Pixar’s Toy Story, strums acoustic
    renditions of John Mayer for friends, and builds towering LEGO cityscapes, often citing Bob Ross’s 'happy little trees' as motivation.
  travel: Charles Rogers, a budget‑conscious explorer who loves family road trips to the Atchafalaya Basin and the Gulf Coast’s white‑sand beaches, dreams of backpacking through the Grand Canyon National
    Park, and prefers to plan itineraries with handwritten maps and shell‑collecting souvenirs.
  culinary: Charles Rogers, a budding home chef who can whip up a decent grilled cheese and banana‑smoothie, delights in tasting beignets, jambalaya, and spaghetti carbonara, and experiments by adding crushed
    shells as garnish for fun when cooking with their parents.
  core: Charles Rogers, a quiet yet inquisitive 12‑year‑old who balances a love for detailed bayou art with a secret stash of LEGO bricks under their bed, often losing track of time sketching while forgetting
    homework deadlines.
background:
  cultural: Charles grew up in a middle‑class family in Denham Springs, Louisiana, where Southern hospitality, close‑knit community values, and a mix of Cajun and French‑Creole traditions shape daily life.
    His household celebrates local customs such as Mardi Gras parades, church gatherings, and family barbecues featuring gumbo and jambalaya. The region’s love for outdoor activities near the bayous, a
    strong emphasis on family cohesion, and a respect for education provide a cultural framework that nurtures his curiosity, artistic expression, and modest, resilient character.
