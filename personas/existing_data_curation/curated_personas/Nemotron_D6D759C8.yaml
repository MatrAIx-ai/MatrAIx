  career_goals: Glenda dreams of a future where she can combine her curiosity about living things with a practical way of helping them; she often says she wants to become a veterinarian. She also imagines
    herself as a scientist conducting experiments in a lab or even an astronaut exploring space, reflecting her love of discovery. In the near term, she aims to win her school’s spelling bee, place on her
    soccer team, and earn a top spot in the upcoming science fair, hoping her achievements will pave the way for a scholarship to a STEM‑focused high school.
