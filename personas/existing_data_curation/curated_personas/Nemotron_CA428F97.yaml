  career_goals: Juan aims to advance to a senior editorial manager or editorial director role within a major multicultural media organization in Miami, where he can lead a bilingual team and shape content
    strategy that highlights Latin American stories. He plans to augment his expertise through certifications in digital publishing and content strategy, and eventually launch his own boutique editing consultancy
    that serves Hispanic authors and businesses seeking high‑quality, culturally resonant copy.
