    calendar planning'', ''basic SEO'']'
  hobbies: '[''modern art gallery visits'', ''watercolor painting'', ''street photography'', ''reading speculative fiction'', ''contemporary poetry'', ''short story and poetry writing'', ''cooking Honduran
