    lectures"]'
  career_goals: Although retired from formal employment, Patricia aims to deepen her impact in the community. She aspires to serve on the board of the Willoughby Community Center, where she can shape programming
    for seniors and families. She also hopes to compile a memoir of her family's history and local stories, preserving them for future generations. Learning digital photography to document community events
    and volunteer work is another personal goal. Together with her husband, she plans a modest road‑trip across Ohio’s historic towns, and she is committed to maintaining her health through regular exercise
    and preventive care.
