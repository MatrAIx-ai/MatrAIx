persona_description: A healthcare professional who works with families of children with weight problems, particularly those with low health literacy. This person is interested in understanding the barriers
  to accessing and using weight-control information and strategies, and developing strategies to overcome these barriers. They are committed to providing evidence-based interventions and resources to help
  parents make informed decisions about their child's weight management. They are also interested in developing partnerships with health care providers, community organizations, and other stakeholders to
  improve the availability and accessibility of weight-control information and resources.
