  hobbies: '[''Fishing'', ''Pickup Basketball'', ''Car Restoration'', ''Hip‑hop and Gospel Music'', ''Church Activities'', ''Video Gaming (NBA 2K)'', ''Documentary Watching'', ''Cooking Southern Cuisine'',
