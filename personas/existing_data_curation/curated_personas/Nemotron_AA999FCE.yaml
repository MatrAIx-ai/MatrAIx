  career_goals: Omar aims to launch his own boutique brokerage in the next five years, positioning it as the go‑to service for first‑time homebuyers in underserved neighborhoods of Rapides Parish. He aspires
    to rank among the top five agents in the region, achieve Certified Residential Specialist credentials, and build a portfolio of rental properties that generate steady passive income. Long‑term, he envisions
    expanding into property development by renovating vacant homes and creating affordable housing options, while also mentoring junior agents and speaking at local real‑estate conferences to share his
    practical insights and competitive strategies.
