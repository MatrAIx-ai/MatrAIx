personas:
  professional: Kaylea Martin, a veteran social worker with over twenty years of frontline case management, they blend meticulous assessments, compassionate advocacy, and structured workflows while allowing
    flexible, low‑key adjustments, positioning themselves for a supervisory LCSW role that will spearhead community outreach for at‑risk youth and veterans.
  sports: Kaylea Martin, a low‑impact fitness enthusiast, they start each day with a sunrise walk along the Virginia Beach boardwalk while bird‑watching, join the local Coastal Running Club’s weekend 5K
    runs, and quietly root for the Washington Commanders and Nationals during football and baseball seasons.
  arts: Kaylea Martin, an avid reader and craftsperson, they devour historical fiction by Hilary Mantel and Ken Follett, knit scarves while listening to the soothing melodies of Norah Jones, and attend
    intimate performances at the Virginia Museum of Contemporary Art featuring playwrights such as August Wilson.
  travel: Kaylea Martin, a thoughtfully planned traveler, they favor low‑key weekend getaways to historic coastal towns like St. Augustine, FL, and Cape Cod villages, while dreaming of a relaxed sabbatical
    exploring the quiet lanes of Cinque Terre, Italy, once their schedule permits.
  culinary: Kaylea Martin, an intermediate home cook, they relish crafting coastal seafood dishes like garlic‑lemon grilled shrimp, crab‑cake sliders, and oyster stew seasoned with fresh dill and parsley
    harvested from their patio garden, alongside seasonal vegetable ratatouille made from home‑grown tomatoes and zucchini.
  core: Kaylea Martin, a detail‑driven social work professional with a surprisingly chaotic hobby closet, they often lose track of knitting needles during midnight sessions while still maintaining a structured
    approach to client case files.
background:
  cultural: Kaylea identifies as a White American with deep roots in the Mid‑Atlantic coastal region. Her family lineage traces back to English and German immigrants who settled in Virginia in the early
    1900s, instilling values of self‑reliance, community service, and modesty. Growing up in Virginia Beach, she absorbed a blend of Southern hospitality and coastal lifestyle, celebrating regional traditions
    such as community festivals, seafood cuisine, and seasonal beach clean‑ups. Her upbringing in a Protestant, middle‑class household emphasized education, civic responsibility, and the importance of helping
    neighbors, shaping her compassionate yet practical approach to social work.
