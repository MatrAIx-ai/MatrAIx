  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Beach Walking'', ''Bird Watching'', ''Low‑Impact Yoga'', ''Knitting'', ''Coastal Cooking'']'
  career_goals: Kaylea aims to transition into a supervisory role within the next three years, pursuing her Licensed Clinical Social Worker (LCSW) certification to deepen her clinical expertise. She intends
    to develop and lead a community outreach program focused on at‑risk youth and veteran families in the Virginia Beach area, integrating evidence‑based interventions and cross‑agency collaboration. Long‑term,
    she envisions influencing local policy through a position on the city’s Social Services Advisory Board, while also refining her organizational skills to manage larger caseloads efficiently.
