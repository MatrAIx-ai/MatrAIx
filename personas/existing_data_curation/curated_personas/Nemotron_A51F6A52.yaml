  career_goals: Dorrie aspires to pursue a career in civil engineering or data analytics, driven by her practical mindset and desire to solve real-world problems through structured solutions. She aims to
    attend a reputable university where she can major in engineering or computer science, maintain a high GPA, and secure scholarships. Long-term, she hopes to lead projects focused on sustainable infrastructure
    development in her hometown, potentially transitioning into a project management role within a technology-driven firm. She also envisions mentoring younger students in STEM clubs, combining her competitive
    spirit with a desire to give back to her community.
