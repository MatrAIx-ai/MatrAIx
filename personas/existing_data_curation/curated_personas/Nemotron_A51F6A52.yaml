personas:
  professional: An aspiring robotics engineer, Dorrie Miller blends a competitive chess mindset with a methodical approach to coding and mechanical design, consistently delivering polished school projects,
    meticulously documenting each build, and reliably meeting club deadlines while eyeing a future career in engineering.
  sports: An enthusiastic swimmer, Dorrie Miller hits the Whitehall Community Pool three times a week with the local youth swim club, drills in freestyle and breaststroke, and balances their athletic routine
    by cheering for the Lehigh Valley IronPigs and the nearby high school basketball team during Friday night games.
  arts: A disciplined pianist, Dorrie Miller practices Chopin nocturnes alongside pop tracks by Olivia Rodrigo, attends Saturday matinees at the historic Reading Theatre, and indulges in mystery podcasts
    such as Serial, which fuel their creative storytelling during journal entries.
  travel: A methodical explorer, Dorrie Miller’s family road trips have taken them to the Smithsonian museums in Washington, D.C., a weekend at Hershey’s chocolate factory, and a brief visit to New York
    City’s Broadway district, while they dream of attending a robotics workshop in Munich and hiking the Scottish Highlands, always preferring itineraries with clear schedules and pre‑booked tickets.
  culinary: A budding home chef, Dorrie Miller whips up fluffy blueberry pancakes for Saturday breakfasts, enjoys a classic cheeseburger topped with crisp lettuce, pickles, and a splash of ketchup, and
    relishes their family’s hearty beef stew with carrots, potatoes, and a pinch of smoked paprika, often experimenting with a dash of hot sauce for an extra kick.
  core: Precise and puzzle‑driven, Dorrie Miller balances competitive chess and robotics with a strict allowance plan, yet sometimes trades late‑night mystery novels for extra swim laps, embodying a teen
    who threads structure into every hobby and habit.
background:
  cultural: Dorrie comes from a middle‑class, predominantly White family with German and Irish ancestry, raised in Whitehall, Pennsylvania, a community with historic industrial roots now transitioning to
    a more suburban character. Her family values hard work, reliability, and community involvement, reflecting the broader Lehigh County cultural emphasis on education and civic participation. Traditional
    American celebrations such as Thanksgiving, Fourth of July fireworks, and local high school events play a central role in her upbringing. While her household includes elements of Christian values, her
    cultural identity is largely shaped by the mainstream American middle‑class suburban experience, with exposure to regional cuisine, local sports rivalries, and a strong emphasis on academic and extracurricular
    achievement.
