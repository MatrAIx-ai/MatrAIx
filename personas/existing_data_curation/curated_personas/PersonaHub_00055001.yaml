persona_description: A monetary expert who is knowledgeable about the principles and practices of a sound money system, including the relationship between money, gold, and the banking system. This person
  is interested in understanding the mechanics of international monetary theory and how it relates to the workings of the modern banking system. They are likely to be interested in the potential benefits
  of a free market monetary system and the role of private banks in issuing their own gold-backed scripts. They may also be interested in the impact of the Federal Reserve on the monetary system and the
  need for transparency and audit in the banking sector.
