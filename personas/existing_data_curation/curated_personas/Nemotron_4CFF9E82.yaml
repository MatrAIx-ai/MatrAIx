personas:
  professional: Sarita Burwell is a seasoned community association manager who blends practical property oversight with a curiosity for emerging management technology, using AppFolio and Yardi while fostering
    harmonious resident relations and flexible workflows despite a habit of occasional disorganization.
  sports: Sarita Burwell enjoys low‑impact fitness, hiking the Blue Ridge trails with the Shenandoah Valley Trail Club in spring, roots for the Washington Nationals in baseball and the Washington Capitals
    in hockey, and attends a local yoga class twice a month to balance her love of nature with gentle strength training.
  arts: Sarita Burwell indulges in historical fiction by authors such as Philippa Gregory, finds solace in the folk melodies of Alison Krauss and The Avett Brothers, regularly attends the Shenandoah Summer
    Playhouse for local theater, and cherishes the visual art of regional painter Mary Ann Carrigan.
  travel: Sarita Burwell favors weekend road trips that blend scenic drives with modest adventure, having explored the Great Smoky Mountains and the historic streets of Charleston, while dreaming of a fall
    visit to the vineyards of Tuscany and a sunrise hike in New Zealand's Fiordland.
  culinary: Sarita Burwell, a confident home cook, loves crafting shrimp and grits with fresh Gulf shrimp, simmering collard greens with smoked ham hocks, and experimenting with heirloom tomatoes in farm‑to‑table
    salads, often sourcing produce at the local farmers market and adding a pinch of smoked paprika for depth.
  core: Sarita Burwell balances curiosity and community with a habit of leaving her to‑do list scattered on the kitchen counter, a love for solitary hikes, and a steadfast belief that a well‑tended garden
    cures most worries.
background:
  cultural: Sarita grew up in a small Virginia town, absorbing the values of Southern hospitality, modesty, and community service that characterize the Appalachian region. Her family tradition emphasizes
    close‑knit relationships, respect for local customs, and a strong sense of responsibility toward neighbors. While rooted in these cultural norms, she maintains an openness to broader perspectives, reflected
    in her eagerness to learn new management practices and her appreciation for diverse ideas. She participates in a local church community, enjoys regional cuisine, and values the balance between tradition
    and personal curiosity.
attributes:
  skills: '[''Property Management'', ''Community Association Governance'', ''Vendor Coordination'', ''Budgeting and Financial Reporting'', ''Resident Relations'', ''Conflict Mediation'', ''Regulatory Compliance'',
