  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Hiking in the Blue Ridge Mountains'', ''DIY home projects'', ''Birdwatching'', ''Cooking and baking'', ''Knitting'', ''Exploring local history
    and genealogy'', ''Community volunteer work (small group)'', ''Attending local farmers markets'']'
  career_goals: Sarita aims to earn the Certified Manager of Community Associations (CMCA) credential and eventually transition into a regional management role overseeing multiple property portfolios across
    the Shenandoah Valley. She aspires to implement sustainability initiatives—such as energy‑efficient upgrades and waste‑reduction programs—in the communities she manages. Balancing her professional growth
    with family life, she hopes to mentor junior staff and cultivate a collaborative, low‑stress workplace culture that emphasizes resident well‑being and flexible problem‑solving.
