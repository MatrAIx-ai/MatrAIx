personas:
  professional: Jacqueline Gardner, a library STEM outreach coordinator, channels their methodical STEM background and curiosity for the arts into designing data-driven, hands‑on STEAM workshops, expertly
    handling information literacy instruction, digital curation, grant writing, and community programming while keeping a meticulously organized docket and asserting themselves in leadership meetings.
  sports: Jacqueline Gardner, an avid hiker, spends weekends trekking the state parks with the Mason County Trail Runners, attends weekly yoga classes at the local community center, cheers for the Seattle
    Seahawks and Seattle Sounders FC, and occasionally joins a Saturday morning spin class at the YMCA while they occasionally miss a session when work stress spikes.
  arts: Jacqueline Gardner, a watercolor enthusiast and amateur photographer, frequents the Seattle Art Museum and local galleries to study works by Claude Monet and Ansel Leibovitz, sketches botanical
    studies in their garden, and curates a quarterly 'Science Meets Art' exhibition featuring local creators like Kehinde Wiley.
  travel: Jacqueline Gardner, a meticulous planner, prefers a blend of nature‑focused getaways and cultural city trips, having explored Iceland's volcanic landscapes, the historic streets of Kyoto, and
    the Pacific Northwest's Olympic National Park, while they dream of a future retreat at Italy's Tuscan countryside once their child‑free sabbatical is funded.
  culinary: Jacqueline Gardner, an experimental home cook, loves crafting farm‑to‑table dishes such as zucchini‑noodle miso‑glazed salmon and roasted beet hummus, often sourcing heirloom tomatoes from their
    garden and using fresh herbs like basil and thyme, while they reluctantly admit a habit of over‑spicing to chase bold flavors.
  core: Jacobian Gardner, a 36‑year‑old library professional, balances relentless curiosity with a penchant for meticulous planning, yet their stress‑prone nature sometimes fuels late‑night grocery splurges
    and missed yoga sessions.
background:
  cultural: Jacqueline grew up in a middle‑class, white, Midwestern family in central Illinois, with German and Irish ancestry. Her community emphasized self‑reliance, education, and civic engagement, reflected
    in traditions like county fairs, church gatherings, and a strong support for public institutions such as the local library. These roots instilled a sense of modesty, reliability, and a deep appreciation
    for community service. While she values this background, her higher education and curiosity have broadened her worldview, leading her to incorporate diverse artistic and technological perspectives into
    her professional and personal life.
attributes:
  skills: '["Information Literacy Instruction", "Reference Services", "Digital Collection Management", "STEM Curriculum Support", "Cataloging (MARC)", "Data Analysis (Excel, Python)", "Instructional Design",
