  hobbies: '["Visiting Art Galleries", "Sketching and Watercolor Painting", "Photography", "Reading Science Fiction and Non-Fiction", "Hiking in State Parks", "Cooking Experimental Recipes", "Playing Board
    Games", "Participating in Local Book Club", "Yoga and Mindfulness Meditation", "Gardening", "Learning Basic French", "Puzzle Solving (Crosswords, Sudoku)"]'
  career_goals: Jacqueline aspires to earn a Master of Library and Information Science and eventually step into a senior leadership role such as Library Director or Head of STEM Outreach for Mason County.
    She hopes to design and lead innovative programs that integrate emerging technologies with the arts, expanding access to STEAM resources for students and adults alike. Long‑term, she envisions establishing
    a regional digital archive that preserves local history and contemporary creative works, while also championing policies that promote information equity and mental‑health support for library staff.
