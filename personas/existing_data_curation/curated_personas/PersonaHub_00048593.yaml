persona_description: A fashion photographer who worked during World War II, particularly in London, and later became the official photographer of the Women's Army Corps. She documented the horrors of war
  above and below the ground, and her famous image of an abandoned boy clutching a stuffed animal in the rubble of 1945 London has become iconic. She traveled to the European front twice and spent time
  in London documenting the horrors of war.
