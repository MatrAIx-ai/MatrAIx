persona_description: A gastroenterologist who specializes in the diagnosis and treatment of gastrointestinal disorders, particularly those involving the small intestine. This specialist has extensive experience
  with colonoscopy, upper GI endoscopy, and radiographic small bowel series, and is familiar with the embryologic origin of Meckel diverticula and the associated risk factors for blood loss. They are skilled
  in detecting and treating symptomatic cases of Meckel diverticula and have a keen interest in the rare condition of ectopic gastric tissue in the small intestine.
