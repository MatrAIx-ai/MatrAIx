  career_goals: Although no longer on the formal workforce, Thomas aims to continue mentoring emerging engineers through volunteer workshops at the community college and by offering pro‑bono consulting
    to local small manufacturers. He aspires to become a board member of the Harrisburg Arts Council, leveraging his organizational expertise to expand community art programs. Additionally, he plans to
    author a memoir that chronicles his career in engineering, the evolution of manufacturing in the Mid‑Atlantic, and his journey integrating art and technology, while supporting his grandchildren's education
    through scholarships and tutoring.
