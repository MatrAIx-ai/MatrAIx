  career_goals: Although officially retired, Dylan’s ambition is to leave a lasting intellectual and artistic imprint on his community. He aims to compile a multi‑volume oral‑history of Pottsville’s mid‑20th‑century
    working‑class families, interweaving his own family’s Italian immigrant story. He plans to publish a modest collection of memoir‑style essays and poems that explore the interplay of memory, place, and
    abstract thought. Concurrently, he hopes to curate a small exhibition of his abstract watercolors at the local historical society, using the show to spark conversations about creativity in later life.
    Ultimately, his goal is to be remembered as both a preserver of regional heritage and a quiet, imaginative voice that enriched the cultural fabric of his hometown.
