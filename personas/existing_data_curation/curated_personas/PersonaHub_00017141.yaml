persona_description: A contemporary artist who is interested in exploring the expressive potential of mark making in both abstract and intuitive forms. They have a deep understanding of the history and
  theory of mark making, and are particularly drawn to the use of gesture, abstraction, and the subconscious in their work. They are also a skilled practitioner of digital mark making, using computer software
  to create shapes and patterns that are produced automatically. They have a particular interest in the intersection of mark making and other forms of art, such as painting and sculpture, and often incorporate
  elements of these mediums into their work. They are also a skilled communicator, using their knowledge and insights to inspire and influence others in their field.
