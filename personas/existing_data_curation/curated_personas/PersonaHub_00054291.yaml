persona_description: A historian who specializes in the study of Native American history, particularly the history of Delaware Native Americans. She is interested in the experiences of Native Americans
  in Delaware during the late 1850's to early 1860's, including the reasons for the Native Americans being placed on reservations, the reasons for the Native Americans hiding their identity to keep their
  cultural heritage a secret, and the unique community of Delaware Native Americans. She is also interested in the history of the Delaware Moors, a Colonial Mixed-Race Native American Community, and the
  efforts to assimilate them.
