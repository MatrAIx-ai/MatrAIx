  hobbies: '[''Reading popular science'', ''Coding hobby projects'', ''Gardening'', ''Hiking'', ''Playing acoustic guitar'', ''Volunteering at science museum'', ''Board game nights'']'
  career_goals: Marsha aims to complete a Master’s degree in STEM Education within the next two years, positioning herself for a lead teacher or STEM coordinator role at her school. She aspires to develop
    a district‑wide interdisciplinary curriculum that blends science, technology, engineering, and mathematics with arts and humanities. In the longer term, she hopes to move into educational leadership,
    such as an assistant principal or principal, where she can champion equity, innovation, and community partnerships in public schools.
