personas:
  professional: Marsha Nixie is a forward‑thinking STEM educator who blends data‑driven lesson design with hands‑on robotics kits, leveraging their systematic classroom management and collaborative mindset
    to mentor new teachers and build interdisciplinary curricula that bridge science, tech, and the arts.
  sports: Marsha Nixie is an avid hiker who trails the Patapsco Valley State Park on weekends, cheers for the Baltimore Ravens on game night, and runs with a local 5‑K club that meets at the Inner Harbor
    every Thursday.
  arts: Marsha Nixie plays acoustic guitar at community open‑mic nights, drawing inspiration from folk artists like John Denver and contemporary singer‑songwriter John Mayer, and they regularly attend performances
    at the Baltimore Hippodrome to unwind.
  travel: Marsha Nixie enjoys short, purposeful trips such as a weekend hike in Shenandoah National Park and a cultural day trip to Washington, D.C.’s Smithsonian museums, while dreaming of a spring backpacking
    adventure through the Scottish Highlands once their student loans are paid down.
  culinary: Marsha Nixie cultivates basil and mint on their balcony and loves to whip up fresh caprese salads and lemon‑garlic shrimp pasta, but they admit to frequently ordering pizza on late‑night coding
    sessions when ingredients run low.
  core: Marsha Nixie balances methodical planning with spontaneous curiosity, turning a love for STEM education into community‑focused projects while occasionally over‑indulging in board games and pizza
    during late‑night coding sprints.
background:
  cultural: Marsha grew up in a middle‑class white family in the Baltimore suburbs, with German and Irish ancestry. Her upbringing emphasized the importance of education, reliability, and community service.
    Living in Baltimore city, she has been exposed to a rich tapestry of cultural influences, from historic neighborhoods to diverse artistic scenes, which she values and incorporates into her teaching.
    She maintains traditional American values of hard work and cooperation while actively engaging with the multicultural dynamics of her local community.
attributes:
