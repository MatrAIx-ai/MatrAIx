  career_goals: Zhuang aims to turn his curiosity for technology and his knack for organization into a future career in software engineering or product management, especially creating educational technology
    that helps students organize their learning and collaborate effectively. He plans to attend a top university for computer science, participate in robotics competitions, and eventually lead development
    teams that build tools promoting academic equity. Alongside his tech ambitions, he hopes to mentor younger students in his community, using his sociable strengths to bridge cultural and educational
    gaps.
