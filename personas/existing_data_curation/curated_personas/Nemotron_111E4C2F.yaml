  hobbies: '[''Soccer'', ''LEGO Mindstorms robotics'', ''Strategic video gaming'', ''Playing the dizi (Chinese flute)'', ''Cooking traditional Chinese dishes'', ''Reading science‑fiction graphic novels'',
