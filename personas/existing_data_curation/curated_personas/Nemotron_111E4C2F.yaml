personas:
  professional: Zhuang Wong, a budding robotics builder in middle school, uses their methodical planning and curiosity to design LEGO robots that compete in local STEM challenges, and they often take the
    lead in group projects, encouraging teammates with talkative, organized energy.
  sports: Zhuang Wong plays midfield for the Hicksville Hawks Youth Soccer Club, follows the New York Knicks and New York Rangers, and they blend daily jogs with weekend skate sessions, reflecting their
    energetic and team-oriented spirit.
  arts: Zhuang Wong practices the dizi during family Lunar New Year gatherings, devours sci-fi graphic novels like 'Saga' and 'Watchmen', captures candid shots of neighborhood festivals, and they enjoy
    indie bands such as Mitski and The Strokes, weaving creative expression into daily life.
  travel: Zhuang Wong has explored Manhattan's Chinatown during holiday festivals, taken weekend road trips to the Hudson Valley's historic farms, dreams of seeing the cherry blossoms in Washington D.C.,
    and they hope to someday tour the Great Wall, balancing budget-friendly adventures with cultural curiosity.
  culinary: Zhuang Wong helps prepare pork-and-chive dumplings and sweet rice balls for holiday feasts, loves tossing homemade fried rice with shrimp, and they occasionally indulge in pepperoni pizza, showing
    a versatile palate that blends traditional flavors with teen favorites.
  core: Zhuang Wong is a talkative, organized teen who balances robotics, soccer, and cultural traditions while juggling a modest allowance, school duties, and a knack for turning every project into a group
    event.
background:
  cultural: Zhuang comes from a Chinese‑American family that balances East Asian traditions with life in Hicksville, New York. Mandarin is spoken at home alongside English, and his family celebrates Lunar
    New Year with dumpling making, lantern displays, and visits to the local Chinese cultural center. The values of education, respect for elders, and community harmony instilled by his parents shape his
    organized and considerate demeanor. Growing up in a suburban area with a sizable Asian diaspora, he participates in cultural festivals, volunteers at a community garden, and blends his heritage with
    mainstream American experiences.
