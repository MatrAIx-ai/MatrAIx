  hobbies: '[''Watercolor painting'', ''Experimental theatre'', ''Lake‑side photography'', ''Hiking'', ''Book club leadership'', ''Board games'', ''Community gardening'', ''Yoga and mindfulness'', ''Poetry
    writing'', ''Creative writing'']'
  career_goals: Brittany aspires to advance into a senior leadership role—such as regional library director or head of a digital media services department—where she can champion innovative programming that
    merges art, technology, and mental‑wellness resources. She envisions creating a cutting‑edge makerspace and an augmented‑reality storytelling lab that attract diverse patrons and support lifelong learning.
    Long‑term, she hopes to author a guide on integrating emotional‑well‑being initiatives into public libraries and to serve as an adjunct faculty member training the next generation of librarians on interdisciplinary,
    community‑focused practice.
