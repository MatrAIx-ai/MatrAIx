personas:
  professional: Brittany Johnson, a senior librarian and digital media strategist, blends graduate education and library science expertise into meticulous collection development, precise metadata stewardship,
    and innovative makerspace programming that unites art, technology, and mental‑well‑being, all while leveraging their organized, imaginative, and sociable nature to champion inclusive community initiatives.
  sports: Brittany Johnson, an avid hiker and lake‑side photographer, plays on a local adult recreational volleyball league, follows the Milwaukee Brewers for baseball, the Green Bay Packers for football,
    and the Minnesota Twins for spring training, and commits to a weekly sunrise hike in a nearby state park.
  arts: Brittany Johnson embraces watercolor landscapes inspired by Winslow Homer, experiments with avant‑garde theatre through The Wooster Group, attends Lin‑Manuel Miranda productions, and they draw poetic
    solace from Mary Oliver and Ocean Vuong, weaving these influences into both personal creations and community workshops.
  travel: Brittany Johnson prefers curated cultural retreats, having trekked the first 30 miles of the Appalachian Trail, visited Kyoto’s water lily gardens, explored Miami’s Art Deco Historic District,
    and plans a future pilgrimage to Prague’s literary cafés, and they balance travel costs with a modest travel fund.
  culinary: Brittany Johnson enjoys cooking Mediterranean mezze, regularly preparing hummus with roasted red peppers, grilled halloumi, and fresh basil, savoring seasonal Wisconsin trout with lemon‑dill
    butter, and they treat themselves to oat‑milk lattes with a dash of turmeric during quiet mornings.
  core: Brittany Johnson, a creatively disciplined 50‑year‑old librarian, weaves imagination into work, art, and yoga‑fueled anxiety management, while occasionally over‑organizing their schedule and indulging
    in spontaneous art‑supply splurges.
background:
  cultural: Brittany was raised in a middle‑class White family in the Upper Midwest, where Midwestern values of community service, modesty, and a deep respect for public institutions shaped her worldview.
    Growing up near Minnesota’s lakes, she absorbed a love for nature and seasonal celebrations that emphasize togetherness. Her education‑focused upbringing, combined with participation in local library
    programs and church‑based volunteer work, reinforced a belief in the power of shared knowledge. This cultural foundation informs her commitment to creating inclusive, collaborative spaces that reflect
    both traditional community ties and contemporary artistic expression.
attributes:
