  career_goals: Although retired from formal employment, Bailey aims to deepen her involvement with the local senior center as a volunteer organizer, lead a mentorship program for college‑age grandchildren,
    and complete a community oral‑history project documenting Vincennes' mid‑20th‑century traditions. She also hopes to learn a new skill, such as watercolor painting, and eventually curate a small exhibition
    of her work for the town's cultural festival.
