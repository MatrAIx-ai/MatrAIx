persona_description: A linguist who specializes in the study of Inuktitut, a language spoken by the Inuit people in Canada. This person is knowledgeable about the development of the standardized orthography
  for Inuktitut, the preservation of the language through research and documentation, and the challenges of representing unique sounds in writing. This person is interested in the use of roman orthography
  in writing Inuktitut, and the potential for creating new characters to represent the sounds in syllabics.
