persona_description: A researcher in the field of immunology who specializes in the study of IgG antibodies and their transfer from mothers to infants through breast milk. The researcher is interested in
  the protective effects of these antibodies against bacterial pathogens that cause infectious gastrointestinal diseases. The persona is likely to be interested in the long-term effects of IgG antibodies
  on the immune system in infants and the potential benefits of breastfeeding for the development of the immune system. The persona is also likely to be interested in the use of vaccination as a strategy
  to confer extra protection against intestinal infections in infants.
