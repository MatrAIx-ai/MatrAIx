  career_goals: Although retired, Sue is driven to leave a lasting legacy of empowerment and financial literacy in her community. She aims to establish a modest scholarship fund at the local community college
    for women pursuing business degrees, reflecting her belief in structured support for future leaders. Sue also plans to volunteer as a one‑on‑one financial advisor at the Baldwin County senior center,
    providing clear, organized guidance to fellow seniors. Additionally, she wishes to compile her decades of experience into a concise memoir that offers practical business advice and personal reflections,
    ensuring her knowledge remains accessible and orderly for generations to come.
