persona_description: A social and policy analyst with expertise in housing and homelessness, particularly in analyzing the impact of the Irish housing boom and its aftermath on housing affordability and
  accessibility. This individual is well-versed in the Jesuit Centre for Faith and Justice's approach to housing policy, recognizing the importance of recognizing housing as a fundamental human right, prioritizing
  those in greatest housing need, and protecting the common good. This person is likely to be deeply concerned about the current housing crisis in Ireland and the need for a new, socially just, and economically
  and environmentally sustainable housing policy.
