personas:
  professional: Mariane Hunter, an early-childhood program director-in-training, leverages her meticulous budget management and grant-writing acumen to embed interdisciplinary art projects into preschool
    curricula while navigating her own tendency to over-plan and worry about outcomes.
  sports: Mariane Hunter, an enthusiastic member of the Indianapolis Trail Hikers Club, spends weekends trekking the Morgan Falls Trail and follows the Indianapolis Colts and Indiana Pacers with a modest
    fan’s devotion, using yoga sessions to balance her post-hike stiffness.
  arts: Mariane Hunter, a devoted sketcher and potter, draws inspiration from Yayoi Kusama's immersive installations and the lyricism of Sufjan Stevens, regularly attends openings featuring local Indiana
    artists such as James Hawley, and fuels her book-club discussions with contemporary fiction by Sally Rooney and philosophical essays by Alain de Botton.
  travel: Mariane Hunter, a planner-oriented traveler, prefers short-flight getaways to culturally rich cities like Kyoto for ceramic workshops and Portland for farm-to-table food tours, while also cherishing
    weekend road trips to Brown County's fall foliage, balancing her modest travel budget with a longing for artistic immersion.
  culinary: Mariane Hunter, an avid home cook, delights in preparing seasonal farm-to-table meals such as roasted beet and goat-cheese salad with fresh thyme, pan-seared trout with lemon-dill butter, and
    a warm apple-cinnamon crumble, yet often forgets to turn off the oven while sketching, leading to occasional burnt edges.
  core: Mariane Hunter blends meticulous organization with a deep artistic curiosity, navigating her career ambitions and personal anxieties through yoga, sketchbooks, and the quiet joy of turning everyday
    worries into creative fuel.
background:
  cultural: Mariane grew up in the Midwestern suburbs of Indianapolis and now lives in Zionsville, a small, close‑knit community that values modesty, self‑reliance, and neighborly support. Her family’s
    heritage includes German and Irish roots, which have fostered a respect for tradition, craftsmanship, and community festivals. She participates in local cultural events such as the Zionsville Art Walk
    and seasonal farmers’ markets, and she maintains ties to a regional United Methodist congregation that emphasizes service, education, and social justice. This blend of Midwestern values, appreciation
    for the arts, and a commitment to community informs both her personal life and professional philosophy.
