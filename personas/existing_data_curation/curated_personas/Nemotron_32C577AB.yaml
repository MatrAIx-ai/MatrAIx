    early education'']'
  hobbies: '[''Sketching'', ''Pottery'', ''Journaling'', ''Visiting art museums and galleries'', ''Reading contemporary fiction and philosophy'', ''Small‑group book club'', ''Yoga and mindfulness meditation'',
    ''Hiking on local trails'', ''Gardening'', ''Seasonal cooking'']'
  career_goals: Mariane aims to advance to a district‑level director of early childhood education, where she can champion arts‑based learning and robust mental‑health supports for young children. She plans
    to earn a master’s in Educational Leadership within the next two years, expand her grant‑writing portfolio to secure sustainable funding for innovative classroom pilots, and launch a regional consortium
    that connects schools, local artists, and families. Ultimately, she hopes to create a model program that can be replicated statewide, positioning Indiana as a leader in holistic early‑learning environments
    while also cultivating her own resilience and stress‑management practices.
