personas:
  professional: Janet Church is a high‑school leader who channels her methodical planning, spreadsheet savvy, and first‑aid certification into orchestrating soccer drills, church bake‑sale logistics, and
    school events, while pursuing a GED and aiming for a community‑college internship that will launch her future as a logistics coordinator for East Texas festivals.
  sports: Janet Church captains her local youth soccer team, trains with the Bayou City United club during the season, follows the Houston Dynamo, cheers for the Houston Rockets, and participates in the
    high‑school cheer squad where she refines choreographed routines, blending a competitive drive with a deep sense of team loyalty.
  arts: Janet Church choreographs dynamic routines for her high‑school cheer squad, enjoys pop hits from Taylor Swift and Ariana Grande while also attending local jazz performances at the Houston Museum
    of African American Culture, and reads personal‑growth books like 'Atomic Habits' and 'The Power of Now' to inspire her creative expression.
  travel: Janet Church spends weekends hiking the trails of Brazos Bend State Park and kayaking nearby bayous, dreams of a road trip to New Orleans to soak in its music and cuisine, and meticulously plans
    a future spring‑break stay at Galveston Beach using a detailed Google Sheet itinerary to stay within her modest budget.
  culinary: Janet Church experiments with shrimp étouffée and jambalaya for church bake‑sale fundraisers, perfects chocolate‑chip cupcakes crowned with sea‑salt, and often improvises with pantry staples
    like butter, flour, and canned tomatoes, though she occasionally over‑spices a dish when juggling multiple projects.
  core: Janet Church is a hyper‑organized, competitive teen whose relentless planning masks a constant undercurrent of worry that fuels both her meticulous event coordination and her occasional over‑thinking.
background:
  cultural: Janet was raised in a predominantly white, working‑class family in Liberty, Texas. Her upbringing reflects Southern‑Texan values such as close family ties, church involvement (her family attends
    a Baptist congregation), and community participation, especially around high school sports and local events like the Liberty County Fair. The region’s blend of rural and suburban influences has instilled
    in her a strong sense of hospitality, self‑reliance, and pride in local traditions, while also exposing her to the broader cultural tapestry of East Texas.
attributes:
  skills: '["Event planning","Volunteer coordination","Team leadership","Time management","Scheduling and calendar management","Budgeting fundamentals","Proficiency with Google Workspace","Proficiency with
    Microsoft Office","Basic first‑aid certification","Conflict mediation","Strategic game planning"]'
  hobbies: '["Soccer","Cheerleading","Church youth group volunteering","Organizing game nights","Baking and cooking","Hiking and exploring local nature areas","Dance practice","Strategy video games","Reading
    personal development books"]'
  career_goals: Janet aims to earn her GED within the next year and enroll in a community college in the Houston area to study business administration with a focus on operations and logistics. She hopes
    to secure an internship with a regional retailer or a local event‑planning firm to gain hands‑on experience. Long‑term, she envisions a career as a logistics coordinator or event manager for community
    festivals and fairs in East Texas, and she is also considering joining the Texas National Guard to develop leadership skills and serve her state.
