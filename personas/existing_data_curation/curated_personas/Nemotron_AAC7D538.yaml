  hobbies: '[''gardening'', ''birdwatching'', ''reading'', ''knitting'', ''cooking'', ''yoga'', ''meditation'', ''book club'', ''community garden volunteering'']'
  career_goals: Jessica aims to transition into a program‑director role for a community mental‑health initiative in Union County, where she can design flexible, holistic services that honor both proven
    protocols and creative solutions. She plans to complete a bachelor’s degree in social work to strengthen her credentials, mentor emerging social workers, and launch a peer‑support network for caregivers.
    Additionally, she hopes to develop a staff‑wellness program that incorporates mindfulness and stress‑reduction techniques, reflecting her personal commitment to managing worry and fostering a supportive
    work environment.
