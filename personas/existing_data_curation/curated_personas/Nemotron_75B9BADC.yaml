personas:
  professional: A budding block engineer, Maureen Tighe constructs intricate LEGO structures during play, balancing a fierce curiosity about how pieces fit together with a practical drive to make the creations
    functional, and they often resist the tidy instructions their parents try to impose.
  sports: An enthusiastic tiny athlete, Maureen Tighe loves their local preschool soccer program and cheers for the New York Knicks on family TV nights, often sprinting in the backyard to mimic their favorite
    player while joining a toddler gymnastics class that satisfies their spontaneous need for movement.
  arts: A lively little performer, Maureen Tighe dances to the songs of Disney's 'Frozen' and paints vibrant pictures of rainbows with Crayola crayons, frequently mimicking the voice of a favorite character
    like Moana, while showing a competitive edge by proudly displaying their latest masterpiece on the fridge.
  travel: An adventurous three‑year‑old explorer, Maureen Tighe enjoys spontaneous family road trips to the nearby aquarium and a weekend getaway at a beach resort in the Gulf Coast, delighting in sandcastle
    building and collecting seashells as souvenirs, while they often demand a long car‑seat nap before the journey.
  culinary: A burgeoning tiny chef, Maureen Tighe loves munching on buttery peanut butter and banana sandwiches, dabbling with a small plastic spoon to stir warm oatmeal, and proudly picking out their favorite
    strawberry slices, yet they occasionally insist on adding extra ketchup to chicken nuggets, showcasing a playful yet stubborn palate.
  core: Maureen Tighe is a curious, spontaneously competitive three‑year‑old who balances building block challenges with a love for play, quietly navigates health routines, and they enjoy spirited games,
    snack experiments, and short family trips.
background:
  cultural: Maureen is a white child raised in Goldsboro, North Carolina, in a Southern household that values community, church attendance, and family gatherings. She celebrates regional holidays such as
    Thanksgiving and the Fourth of July with traditional Southern foods like fried chicken and sweet tea. Her family frequently attends a local Methodist church, where she participates in nursery rhymes
    and holiday pageants. Growing up in Wayne County, she is exposed to a blend of cultural influences from the broader community, which nurtures her openness to new ideas while grounding her in Southern
    hospitality and practical daily routines.
