persona_description: A musician, artist, and ethnomusicologist who is known for his pioneering work in the field of American folk music, as well as his contributions to the field of visual art and the study
  of string figures. He is a passionate jazz enthusiast and has a broad range of interests, including traditional American music, Seminole textiles, Ukrainian Easter Eggs, string figures, and the study
  of group theory. He was a collector of various items, including a large paper airplane collection, Seminole textiles, Ukrainian Easter Eggs, and string figures. He was also a visionary and a shaman in
  residence at Naropa Institute, where he offered a series of lectures, worked on sound projects, and continued collecting and researching.
