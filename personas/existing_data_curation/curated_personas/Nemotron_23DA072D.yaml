  career_goals: Looking ahead, Matthew aims to champion the development of a dedicated cyber crime unit within the Sunnyvale Police Department, leveraging his technical expertise to protect the community
    from increasingly sophisticated threats. He also hopes to formalize a mentorship program that pairs veteran officers with new recruits, preserving institutional knowledge and promoting calm, methodical
    decision making under pressure. In the longer term, he envisions transitioning to a consultant role or teaching position at the local police academy, where he can share his insights on integrating technology
    with traditional policing while maintaining the department's commitment to ethical, community focused service.
