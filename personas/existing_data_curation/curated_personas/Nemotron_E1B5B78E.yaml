  career_goals: Jesus aims to move from his current analyst role into a senior management analyst position within the next three years, focusing on cost‑optimization and strategic planning for public‑sector
    projects in Idaho. Long‑term, he aspires to become a director of analytics, leading a small team that delivers data‑driven solutions while maintaining a stable, routine‑oriented work environment that
    supports his family. He also hopes to earn a professional certification (e.g., Certified Business Analyst Professional) to solidify his credibility and leverage his competitive nature toward recognized
    expertise.
