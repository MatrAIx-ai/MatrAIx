personas:
  professional: Jesus Markey, a detail-oriented management analyst, leverages advanced Excel, SQL, and Power BI skills to build repeatable financial models and Lean Six Sigma-driven dashboards, delivering
    data-driven recommendations that satisfy their competitive drive while thriving in the routine-heavy environment they prefer.
  sports: Jesus Markey follows the Boise State Broncos football team and the Seattle Seahawks, stays fit through solo trail runs and weekend hikes in the foothills around Meridian, and occasionally joins
    a local mountain-bike club for low-key rides while preferring the quiet of solo exercise.
  arts: Jesus Markey finds calm in the ambient piano works of Yiruma, the minimalist soundscapes of Brian Eno, and woodworking tutorials by The Wood Whisperer, whose influence shapes their evenings spent
    crafting wooden projects and appreciating low-key artistic expression.
  travel: Jesus Markey plans structured road trips to places like Yellowstone and Moab, enjoys solitary overnight hikes in national parks, and dreams of a quiet retreat in the Icelandic countryside, balancing
    a love for adventure with a preference for low-stimulus, self-guided itineraries.
  culinary: Jesus Markey, an intermediate home cook, perfects pour-over coffee with Ethiopian Yirgacheffe beans, frequently prepares simple dishes like grilled salmon with lemon-dill quinoa bowls, and delights
    in experimenting with espresso-based desserts while keeping their kitchen organized yet occasionally leaving spice jars out of place.
  core: Jesus Markey is a routine-loving analyst who channels competitive energy into meticulous data work, prefers solitary hikes and quiet coffee rituals, and occasionally lets disorganized habits slip
    into their budgeting and kitchen.
background:
  cultural: Jesus grew up in a middle‑class white family in the heart of Idaho, where self‑reliance, modesty, and a strong work ethic were core values. Raised in a traditional suburban community with Protestant
    roots, his upbringing emphasized practicality, routine, and family stability. Living in Meridian, he is surrounded by a blend of rural outdoor culture and small‑town community events, which reinforces
    his appreciation for quiet, solitary activities while also shaping his competitive yet skeptical outlook toward external influences.
attributes:
  skills: '["Advanced Excel","SQL","Power BI","Financial modeling","Data analysis","Lean Six Sigma process improvement","Strategic planning","Report generation","Budget forecasting","Competitive analysis"]'
