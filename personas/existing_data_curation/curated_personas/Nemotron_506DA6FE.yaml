personas:
  professional: A budding aspiring scientist named Victoria Anwar builds simple experiments with water and crayons, balancing a meticulous step‑by‑step method with spontaneous wonder, reliably documenting
    observations while sharing findings gently with peers, yet can become upset when a run fails.
  sports: Victoria Anwar loves the energy of toddler soccer at the community playfield with the Sunshine Tigers junior squad, attends weekly beginner gymnastics at the Tiny Twisters club, splashes at Saturday
    swim lessons, and cheers for the Chicago Cubs during family game nights.
  arts: Victoria Anwar delights in drawing vibrant pictures of Dr. Seuss characters, dancing along to Raffi's 'Baby Beluga', and eagerly attending the Playhouse Kids theater's interactive puppet shows,
    which nurture her curiosity for color, rhythm, and storytelling.
  travel: Victoria Anwar loves family trips to the nearby zoo and the sunny coastal beach, cherishes a weekend adventure at Disneyland, and dreams of exploring the Grand Canyon’s vast cliffs on a future
    school field trip, preferring trips that combine playful exploration with familiar routines.
  culinary: Victoria Anwar prefers creamy mac and cheese, crunchy carrot sticks, and strawberry‑banana smoothies, enjoys helping stir pancake batter with a wooden spoon, and delights in picking fresh basil
    from the kitchen garden to sprinkle on her pizza.
  core: Victoria Anwar is a bright‑eyed, art‑loving five‑year‑old who balances meticulous curiosity with spontaneous play, yet can tumble into sudden waves of anxiety when routines falter.
background:
  cultural: Victoria is an American Indian child from the Navajo (Diné) community in Waterflow, New Mexico. Her family embraces Diné language, oral histories, weaving, beadwork, and a deep reverence for
    the land and natural world. Community gatherings, seasonal ceremonies, and storytelling evenings shape her worldview, and she often participates in school cultural programs that celebrate her tribal
    identity.
attributes:
  skills: '[''letter recognition and basic phonics'', ''counting to twenty'', ''drawing and coloring'', ''simple storytelling'', ''cooperative group play'', ''following routine instructions'', ''age-appropriate
