  hobbies: '[''LEGO building'', ''Drawing and sketching'', ''Reading adventure and sci‑fi books'', ''Soccer'', ''Playing piano'', ''Visiting museums and science centers'', ''Participating in art and robotics
    clubs'']'
  career_goals: He dreams of becoming a creative engineer or architect who can blend art and technology, and imagines designing futuristic buildings or inventing interactive exhibits for museums. James
    also expresses a fascination with space exploration and hopes one day to work as an astronaut or a scientist who discovers new worlds. In the short term, he aims to excel in elementary school, win a
    regional science fair, and attend a summer art camp.
