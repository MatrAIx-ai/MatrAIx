  hobbies: '[''Gardening'', ''Hiking'', ''Cooking (Chinese and fusion)'', ''Watching classic martial‑arts films'', ''Listening to Chinese folk music'', ''Participating in cultural festivals'', ''Exploring
    new cleaning technologies'']'
  career_goals: Hai aspires to move into a supervisory role within the facilities department, where he can lead a team and influence broader cleaning and maintenance policies. He plans to obtain a Certified
    Professional Cleaner (CPC) credential and complete OSHA safety training to strengthen his qualifications. Ultimately, Hai hopes to launch a small, family‑run cleaning service that specializes in eco‑friendly
    practices for local businesses, providing a stable income for his family while applying the latest industry innovations he discovers through his curiosity.
