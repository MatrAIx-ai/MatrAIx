personas:
  professional: Ramon, a 52‑year‑old veteran automotive service technician, applies his methodical, checklist‑driven approach to diagnosing and repairing vehicles while mentoring junior mechanics, and they
    are pursuing Master ASE certification to cement their reputation before opening a family‑run garage.
  sports: Ramon enjoys watching the Los Angeles Dodgers and LA Galaxy on weekends, joins a casual neighborhood softball league in the spring, and maintains a simple fitness routine of morning walks around
    their Paramount neighborhood, though they often skip a workout after a long day at the shop.
  arts: Ramon frequently attends local cultural festivals featuring marimba ensembles like Los Dulces Sonidos, listens to Gaby Moreno's acoustic performances while working on cars, and enjoys classic car
    shows on Motor Trend where they study restoration artistry, though they sometimes get distracted by the nostalgia of old vinyl records.
  travel: Ramon plans trips with the same precision they use in the shop, favoring organized itineraries to visit their hometown in the highlands during Semana Santa, weekend getaways to Oaxaca for its
    cuisine, and annual hikes in Yosemite, though they limit travel frequency to balance loan repayment for their future garage.
  culinary: Ramon revels in preparing pepian and tamales on Saturday afternoons, using chilies, tomatoes, and fresh herbs from their garden, and they often pair the meals with traditional atol de elote
    while experimenting with a side of roasted corn salads, although they sometimes over‑salt the sauce when trying to replicate family recipes.
  core: Ramon blends a lifelong devotion to routine, community traditions, and hands‑on problem‑solving, navigating both family celebrations and garage mechanics with equal steadiness, though they occasionally
    indulge in late‑night car‑show marathons.
background:
  cultural: Ramon was born in a small town in the highlands of Guatemala, where family gatherings, Catholic traditions, and community celebrations shaped his early life. He immigrated to the United States
    in his late teens, bringing with him a deep appreciation for Guatemalan family values, respect for elders, and a love for traditional music such as marimba and folk songs. Living in Paramount, CA, he
    maintains strong ties to the local Central American diaspora, celebrating holidays like Día de la Madre and Semana Santa with extended family. Bilingual in Spanish and English, Ramon navigates both
    cultures, integrating his heritage into his daily routine through food, language, and community participation while embracing the practical, organized ethos of American work culture.
attributes:
  skills: '[''Engine diagnostics and repair'', ''Transmission overhaul'', ''Electrical wiring and sensor troubleshooting'', ''Brake system service'', ''Routine preventive maintenance'', ''Fuel system cleaning
    and tuning'', ''Hybrid vehicle basics'', ''Shop workflow organization'', ''Mentoring and apprentice training'', ''ASE certification preparation'']'
  hobbies: '[''Cooking Guatemalan cuisine'', ''Backyard gardening'', ''Playing dominoes with community friends'', ''Watching classic car shows'', ''Restoring and maintaining his own vehicle'', ''Walking
    the local park'', ''Reading automotive repair manuals'']'
  career_goals: Ramon aims to achieve Master ASE certification within the next two years, solidifying his status as a top‑tier technician. He plans to transition from employee to owner‑operator by securing
    a modest loan to open a family‑run garage that emphasizes dependable, routine‑focused service for the local community. In the long term, he hopes to create a small apprenticeship program that trains
    new mechanics in a structured, step‑by‑step manner, preserving his practical, organized approach for future generations. He also envisions retiring with a modest retirement fund while still occasionally
    consulting on complex repairs.
