persona_description: A school district administrator who is responsible for implementing digital literacy curriculum and content in their district. This person is looking for an easy and seamless way to
  access and assign digital literacy content through a single platform, such as Google Classroom, and is interested in a digital literacy solution that aligns with their district's curriculum and initiatives.
  They are looking for a solution that can simplify the process of integrating digital literacy content into their core subjects and provide easy access to materials that align with district initiatives.
  This person is likely to be interested in Learning.com's digital literacy curriculum and content for grades K-8, which is designed to help students develop critical skills such as keyboarding, business
  applications, online safety, computational thinking, and coding.
