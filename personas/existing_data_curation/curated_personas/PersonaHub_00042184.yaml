persona_description: A person who is interested in the economic policies of a country and how they affect its citizens. This person is likely to have a background in macroeconomics and would be knowledgeable
  about the concepts of aggregate demand, aggregate supply, and fiscal policy. They would be interested in understanding how these policies impact the overall level of employment and national income, as
  well as the government's role in raising revenue through taxation and deciding on the amounts and purposes of government spending. They would also be interested in the primary objectives of a country's
  government and how they relate to the well-being of its citizens.
