personas:
  professional: An experienced construction specialist, Teresita Carranza leverages a decade of hands-on bricklaying, concrete mixing, and basic plumbing expertise to supervise site crews; their natural
    curiosity drives them to experiment with sustainable, green-building methods even as their relaxed, sometimes disorganized approach makes project timelines feel fluid.
  sports: A beach-oriented fitness enthusiast, Teresita Carranza starts each sunrise with a brisk walk along Condado Beach, occasionally joins a neighborhood jogging group, follows the local baseball team
    Cangrejeros de Santurce, and attends weekly beginner yoga sessions at a community studio to balance the physical demands of construction work.
  arts: A quiet cultural connoisseur, Teresita Carranza spins their battered collection of bomba, plena, and salsa vinyl while preparing meals, devours mystery novels by Agatha Christie and Tana French,
    and captures the pastel facades of Old San Juan with a phone camera, often quoting lyrics from Rubén Blades and snapping candid street scenes that later inspire DIY home projects.
  travel: A solo-travel planner with a modest budget, Teresita Carranza has explored the historic streets of Old San Juan, taken weekend trips to the bioluminescent bays of Vieques and Culebra, dreams of
    hiking the cloud forests of Monteverde in Costa Rica, and prefers to book flights and accommodations last-minute using discount apps, balancing wanderlust with the financial constraints of single life
    in San Juan.
  culinary: An inventive home chef, Teresita Carranza tends a balcony garden of cilantro, oregano, tomatoes, and chilies, then transforms the harvest into dishes like sofrito-based chicken stew, roasted
    pork shoulder with adobo seasoning, and spicy tomato-pepper salsa, while they experiment with traditional spice blends and enjoy pairing meals with a cold local craft beer.
  core: Teresita Carranza is a competitive, curiosity-driven construction forewoman-in-training who balances late-night coffee splurges, chronic stress, and a love for solitary gardening, salsa vinyl, and
    sunrise beach walks.
background:
  cultural: 'Teresita grew up in a working‑class Puerto Rican family in the San Juan Municipio, absorbing the island’s blend of Spanish, African, and Taíno heritage. Her daily life reflects the typical
    urban rhythm of the capital: Spanish is her primary language, Catholic holidays and community festivals such as the Fiesta de San Juan still mark her calendar, and the aromas of sofrito, alcapurrias,
    and mofongo are family staples. The strong sense of familial solidarity common on the island has shaped her values, even though she is currently separated from her partner. Economic challenges and the
    resilience of the Puerto Rican working class have taught her to be pragmatic and resourceful, qualities that translate directly to her construction work. At the same time, she cherishes the island’s
    vibrant music scene, love of dance, and the communal spirit seen in neighborhood parrandas and barrio gatherings, though she often participates in these settings in a more reserved manner.'
