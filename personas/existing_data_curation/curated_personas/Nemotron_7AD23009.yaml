  career_goals: Despite her relaxed approach to daily obligations, Teresita is driven by a competitive desire to rise above her peers on the job site. She plans to obtain her OSHA 30‑hour certification
    and enroll in a community‑college construction‑management program to qualify for a foreman or crew‑lead position within the next three years. Long‑term, she dreams of launching a small subcontracting
    business that focuses on eco‑friendly residential renovations, leveraging her self‑taught knowledge of sustainable building methods. Achieving a stable, higher‑paying role would also give her the financial
    security she seeks as a separated individual navigating the cost of living in San Juan.
