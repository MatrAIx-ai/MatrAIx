    ''DIY home renovation projects'']'
  career_goals: Kay aims to become a senior project lead within the next three years, overseeing large‑scale sustainable housing projects in the Chesapeake Bay area. She plans to earn her LEED Accredited
    Professional credential and spearhead a firm‑wide initiative for net‑zero residential design. Long‑term, she envisions launching a boutique practice that blends cutting‑edge parametric tools with traditional
    regional architecture, targeting resilient homes for climate‑vulnerable communities. To support these ambitions, she is working on improving her project organization skills and incorporating mindfulness
    techniques to better manage stress and worry.
