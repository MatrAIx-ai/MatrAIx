personas:
  professional: Kay Johns is a licensed architect who leverages BIM and parametric tools to craft cost‑effective, code‑compliant waterfront homes, obsessively refining sketches before digital models while
    competitively chasing sustainability awards, yet often lets the spontaneous flow of ideas trump meticulous scheduling.
  sports: Kay Johns is an avid weekend hiker in Patapsco Valley State Park, a seasonal paddleboarder on the Chesapeake Bay, and a loyal fan of the Baltimore Ravens and Washington Capitals, often joining
    a local trail club that meets at sunrise despite their tendency to skip formal gym routines.
  arts: Kay Johns spends evenings sketching urban skylines and marshland vistas, frequently visiting the Baltimore Museum of Art to study works by Ansel Adams and Zaha Hadid, and hosts small‑group viewings
    of contemporary architecture films that satisfy their solitary yet intellectually curious nature.
  travel: Kay Johns favors low‑impact travel, planning trips around historic coastal towns like St. Ives in Cornwall, eco‑lodges in Iceland’s Westfjords, and weekend getaways to the Chesapeake’s own St. Michaels
    Island, balancing a love for adventure photography with the practical need to budget for future practice expansion.
  culinary: Kay Johns experiments with herb‑infused dishes such as rosemary‑garlic focaccia and dill‑scented salmon, using fresh cilantro, basil, and thyme from their patio garden while often pairing meals
    with a glass of local Maryland crab soup and occasionally treating friends to a minimalist, plant‑forward tasting menu.
  core: Kay Johns melds a competitive, sustainability‑driven architecture career with a habit of last‑minute planning, a quiet love for solitary sketching, and an unrelenting worry that fuels both meticulous
    design and occasional over‑caffeination.
background:
  cultural: Kay grew up in a suburban, middle‑class white family in the Mid‑Atlantic, with deep ties to Maryland’s Chesapeake Bay region. Her family’s ancestry traces back to early European settlers who
    integrated colonial architectural traditions with the area’s maritime heritage. This cultural backdrop instilled in her an appreciation for historic preservation, a respect for the natural environment,
    and a pragmatic, self‑reliant work ethic. Living in Edgewater, she is influenced by the local emphasis on community resilience, waterfront living, and a modest, down‑to‑earth lifestyle that values both
    independence and modest social connections.
