  hobbies: '[''Gardening'', ''Reading (psychology, literature, science)'', ''Crossword puzzles and Sudoku'', ''Seasonal cooking'', ''Gentle yoga'', ''Dog walking'', ''Volunteering at senior center (art‑therapy
    facilitation)'', ''Hiking in Wissahickon Valley'', ''Nature photography'', ''Book club participation'']'
  career_goals: Looking ahead, Savannah aims to transition into a part‑time academic role at a local university where she can teach graduate courses on evidence‑based psychotherapy and research methods.
    She plans to develop a community‑focused workshop series that equips older adults in Montgomery County with practical coping skills for stress, grief, and age‑related transitions. Publishing a guidebook
    on resilience for senior populations is also a priority, as is expanding her telehealth services to reach underserved rural patients in Pennsylvania. Over the next five years she hopes to leave a lasting
    legacy of structured, compassionate care while gradually reducing her private‑practice caseload toward a semi‑retired schedule.
