persona_description: A forensic pathologist who specializes in the use of CT/MRI imaging techniques in forensic casework, particularly in gunshot victim investigations. She has a deep understanding of CT/MRI
  imaging principles, their applications in forensic autopsies, and their limitations. She is skilled in combining CT/MRI data with other imaging techniques to create 3D, 4D, and 5D animations. She has
  experience with the Mac-based Osirix software and is familiar with the Virtopsy project's use of CT/MRI imaging for forensic casework. She is knowledgeable about the UK's interest in MRI autopsies but
  acknowledges the challenges and lack of solid evidence in using MRI autopsies as a replacement for traditional post-mortem examinations.
