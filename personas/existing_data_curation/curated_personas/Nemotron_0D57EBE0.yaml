personas:
  professional: Tracy Juarbe, a veteran administrative professional with over three decades of front‑desk and client‑communication expertise, leverages their tech‑savvy workflow mastery and spontaneous
    curiosity to orchestrate community art workshops and museum‑style exhibitions, yet their resistance to rigid structures often leads them to miss deadlines and scramble at the last minute.
  sports: Tracy Juarbe stays active by leading a senior swing‑and‑line‑dance troupe, trekking moderate mountain trails for bird‑watching in the summer, and passionately cheering on the Spokane Chiefs hockey
    team, while they favor low‑impact movement like yoga that blends social interaction with gentle exercise.
  arts: Tracy Juarbe nurtures their artistic soul through watercolor landscapes of the Kootenai River, snapping candid street photos reminiscent of Henri Cartier‑Bresson, frequenting the Post Falls Community
    Theater for productions like 'The Curious Incident of the Dog in the Night‑time', and drawing inspiration from Monet, O'Keeffe, and local painter Maria Ruiz while curating vibrant gallery openings.
  travel: Tracy Juarbe favors spontaneous weekend road trips, charting last‑minute drives to the serene trails of Glacier National Park or the bustling markets of Seattle, while dreaming of an eclectic
    tour of the San Juan Islands and Vancouver to capture sunrise photography and sample fresh Pacific Northwest seafood, and they often pack only a camera and a reusable water bottle for these impromptu
    adventures.
  culinary: Tracy Juarbe, a modest home‑cook, delights in assembling fresh farmer‑market quinoa salads topped with grilled trout, experimenting with spice‑laden Ethiopian injera wraps, and savoring a perfectly
    brewed flat‑white while occasionally treating themselves to a Saturday night sushi dinner at the local Japanese bistro, and they relish the culinary variety that fuels their curiosity.
  core: Tracy Juarbe is a curiosity‑driven, socially vibrant 61‑year‑old who blends administrative savvy with a love for art and spontaneous adventures, yet they often wrestle with stress‑induced procrastination,
    a competitive edge that fuels their volunteer leadership, and a skeptical streak that makes them cautious about new commitments.
background:
  cultural: Tracy is a third‑generation white American whose family roots trace back to Irish and German immigrants who settled in the Pacific Northwest during the early 20th century. She grew up in a small
    Midwestern town before moving to Idaho in her thirties, drawn by the region’s natural beauty and close‑knit community. Living in Post Falls, she embraces the blend of Western ruggedness and emerging
    cultural vibrancy, participating in local festivals, supporting regional artisans, and valuing the self‑reliance and neighborly spirit typical of Idaho’s small‑town culture. While she respects traditional
    American values, her lifelong curiosity and exposure to diverse art forms have cultivated an open‑minded, progressive outlook that informs her personal and professional life.
