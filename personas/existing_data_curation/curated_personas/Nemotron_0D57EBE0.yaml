  career_goals: Tracy aims to transition from routine administrative duties to a role that blends office management with community cultural programming. She hopes to become a senior coordinator for a local
    arts council or non‑profit where she can shape public art events, foster volunteer networks, and mentor younger staff. She also envisions starting a part‑time consulting service for small businesses
    in Post Falls, helping them improve office workflows while integrating creative elements into their branding. A personal goal is to complete a professional development course in project management to
    enhance her ability to meet deadlines without sacrificing her spontaneous work style.
