personas:
  professional: Andrew Becker, a three-year-old aspiring junior curator at his preschool's toy museum, meticulously arranges figurines by color and size, eagerly shares dinosaur facts with peers, and uses
    their compassionate nature to ensure everyone feels included, while occasional bursts of anxiety sometimes cause them to retreat to a quiet corner for reassurance.
  sports: Andrew Becker, a three-year-old who thrives on movement, attends the toddler gymnastics class at The Little Gym, cheers loudly for the New York Yankees during family game nights, and joins a neighborhood
    tee-ball group that practices on Saturdays; their approach to fitness is spontaneous bursts of activity interspersed with cuddly downtime, reflecting both enthusiasm for sport and a need for calm.
  arts: Andrew Becker, a three-year-old who loves to doodle with Crayola crayons, sings along to Raffi's 'Baby Beluga', and watches Elmo's adventures on Sesame Street, regularly visits The Met's Family
    Gallery where they point out dinosaur fossils, and eagerly imitates the dance moves of Disney's Frozen characters; these artistic experiences shape their imaginative play and nurture a deep appreciation
    for color, music, and storytelling.
  travel: Andrew Becker, a three-year-old who enjoys stroller-friendly city outings, has explored Central Park's zoo, splashed on Coney Island's boardwalk, and taken a family road trip to the Museum of
    Science in Boston; they dream of seeing the Eiffel Tower in Paris someday, but their travel plans always include frequent snack breaks, a familiar bedtime routine, and a trusted stuffed bunny for comfort.
  culinary: Andrew Becker, a three-year-old who adores cheesy macaroni, pepperoni mini-pizza, and banana-strawberry smoothies, proudly helps stir pancake batter with a wooden spoon, and they can correctly
    name cheddar cheese, carrots, and blueberries, yet stubbornly refuses broccoli at dinner and often negotiates for an extra chocolate-chip cookie after meals.
  core: Andrew Becker is a curious, methodical three-year-old whose compassionate nature drives playful teaching, while their intense emotional reactions turn routine moments into dramatic episodes.
background:
  cultural: Andrew was born and raised in New York City, a multicultural urban environment that offers a blend of artistic, educational, and recreational opportunities. As a white American child, his family
    celebrates typical holidays like Thanksgiving and Christmas, and they often visit museums, zoos, and community events. The diverse cultural fabric of the city exposes him to a wide range of languages,
    cuisines, and artistic expressions, nurturing his curiosity and appreciation for varied experiences.
