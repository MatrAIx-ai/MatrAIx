personas:
  professional: Song Jung is a senior program designer with a STEM background who leads intergenerational arts initiatives for seniors in Columbus, blending data‑driven evaluation with culturally responsive
    outreach, while their relaxed approach to planning lets them pivot quickly when community needs shift.
  sports: Song Jung is a regular participant in the Columbus City Parks Walking Club, a fan of the Ohio State Buckeyes football team, and enjoys weekend group hikes in Hocking Hills, balancing their energetic
    social nature with low‑impact cardio to support joint health.
  arts: Song Jung is an avid watercolorist who studies the brushwork of Claude Monet and the calligraphic strokes of ancient East Asian masters, frequently attends performances by Yo‑Yo Ma and Lin‑Manuel
    Miranda, and leads monthly arts workshops for seniors at the local senior center, channeling their curiosity and compassion into creative community building.
  travel: Song Jung is a thoughtful traveler who prefers curated cultural tours, having visited the historic gardens of Kyoto, the museums of Florence, and the national parks of Utah, and they plan future
    trips to the Canadian Rockies and a river cruise along the Danube, balancing adventure with a desire to share experiences with their book club friends.
  culinary: Song Jung is a home chef who loves preparing fermented soybean stew, hand‑rolled dumplings, and stir‑fried rice noodles, often experimenting with gochujang, sesame oil, and fresh herbs, while
    their occasional tendency to forget to defrost meat leads them to rely on quick vegetable‑centric meals.
  core: Song Jung is a sociable, art‑driven community strategist who blends data insight with cultural traditions, embraces flexible routines, and balances a love for group activities with a modest, health‑conscious
    lifestyle.
background:
  cultural: Song was born to East Asian immigrant parents and grew up navigating the blend of traditional family values and American life. Identifying as a Korean‑American, she maintains fluency in Korean
    and actively participates in Columbus’s Korean community through cultural events, language practice, and shared culinary traditions. Her upbringing emphasized respect for elders, collective harmony,
    and lifelong learning, which shape her compassionate, cooperative approach to community service. While fully integrated into the multicultural fabric of Ohio, she draws on her heritage to incorporate
    holistic wellbeing, communal decision‑making, and artistic expression into her professional and personal pursuits.
