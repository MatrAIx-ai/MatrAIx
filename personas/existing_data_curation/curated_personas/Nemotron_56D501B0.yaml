  career_goals: In the coming years, Song aims to expand inclusive, arts‑focused community initiatives that serve seniors and bridge generational gaps across Columbus. She plans to secure sustainable funding
    streams, mentor emerging nonprofit leaders, and establish a citywide intergenerational mentorship network that incorporates Asian cultural arts. Looking ahead to a phased transition, she hopes to take
    on a consulting role that helps other organizations adopt data‑driven, culturally responsive practices, while also serving on the board of a regional social‑service coalition.
