persona_description: A researcher in nephrology who specializes in the study of glomerular diseases and the effects of infectious agents on the kidneys. The individual is likely to be interested in the
  clinical manifestations of infectious agents, particularly malaria and SARS-CoV-2, in the development of glomerular diseases and the role of genetic susceptibility factors in the pathogenesis of these
  diseases. They may be looking for insights into the pathophysiological processes of these infectious agents and the potential for infectious agents to trigger glomerular diseases in individuals with genetic
  susceptibility.
