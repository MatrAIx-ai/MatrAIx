  career_goals: David aims to transition into an Operations Manager or Director of Business Services role within the next five years. He plans to earn a Project Management Professional (PMP) certification
    and pursue advanced training in process improvement (Lean Six Sigma). He wants to lead cross‑functional initiatives that integrate technology and creative workspace design, positioning his organization
    at the forefront of efficient, employee‑centered operations. Long‑term, he envisions launching a consultancy that helps small and midsize businesses optimize their administrative functions.
