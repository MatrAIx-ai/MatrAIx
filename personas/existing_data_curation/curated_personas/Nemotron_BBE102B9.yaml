personas:
  professional: Jessica House, a veteran accountant and auditor with over forty years of mastering GAAP, advanced Excel, QuickBooks, and cloud‑based platforms, leverages their curiosity and practicality
    to mentor junior staff, streamline nonprofit finances, and deliver part‑time consulting that blends meticulous organization with adaptable problem‑solving.
  sports: Jessica House stays active by walking three miles with their husband most weekends, participating in the Richmond Senior Walking Club, joining a weekly beginner’s pickleball league at the local
    recreation center, and cheering on the Washington Commanders, Capitals, and the minor‑league Richmond Flying Squirrels during the spring and summer seasons.
  arts: Jessica House nurtures a love of the performing arts by attending productions of August Wilson’s plays at the Richmond Theatre, enjoying concerts by folk legend Joni Mitchell, and finding inspiration
    in the impressionist brushwork of Claude Monet while they unwind during quilting circles.
  travel: Jessica House prefers weekend road trips to charming small‑town festivals, such as the Virginia Folk Festival in Charlottesville and the historic cobblestone streets of Charleston, while dreaming
    of a leisurely autumn tour of the English countryside’s Cotswold villages, balancing travel plans around their tax‑season volunteer schedule and a modest travel budget.
  culinary: Jessica House delights in cooking farm‑to‑table meals with vegetables from their garden, frequently preparing heirloom tomato bruschetta with basil, roasted carrots glazed with honey and thyme,
    and a hearty chicken pot pie, while also enjoying occasional evenings at the local seafood bistro for shrimp étouffée, all complemented by a habit of sipping strong black coffee while balancing the
    books.
  core: Jessica House blends a lifelong accountant’s precision with a senior’s curiosity, channeling community devotion, garden‑grown flavors, and a penchant for quilting into a balanced, socially vibrant
    life that occasionally forgets to water a plant while never missing a tax‑season deadline.
background:
  cultural: Jessica was raised in a Midwestern, white, working‑class family in Indiana, with deep roots in German‑Irish ancestry. Her upbringing emphasized modesty, hard work, and community service, values
    reflected in her involvement with local churches and civic groups. While she respects traditional Midwestern customs—such as hospitality, punctuality, and neighborly engagement—her lifelong curiosity
    has led her to embrace diverse perspectives, especially through books, travel, and continual professional development.
attributes:
  skills: '[''Financial statement preparation'', ''Tax compliance'', ''Internal controls design'', ''Risk assessment'', ''Regulatory reporting'', ''Advanced Excel modeling'', ''QuickBooks'', ''Sage 50'',
    ''Cloud accounting platforms'', ''GAAP interpretation'', ''Audit cycle management'', ''Staff training and mentorship'', ''Clear financial communication'']'
  hobbies: '[''Book club participation'', ''Gardening (heirloom vegetables)'', ''Quilting and quilting circles'', ''Volunteer tax preparation'', ''Weekend walks with husband'', ''Attending community theater'',
    ''Road trips to small‑town festivals'']'
  career_goals: Approaching retirement, Jessica aims to transition from full‑time auditing to a part‑time consulting role, focusing on helping local non‑profits and small family businesses streamline their
    finances. She plans to mentor the next generation of accountants in her firm, develop a workshop series on modernizing bookkeeping practices, and earn a CPA designation as a personal milestone. Long‑term,
    she hopes to contribute her expertise to community tax‑assistance programs and write a concise guide on practical budgeting for seniors.
