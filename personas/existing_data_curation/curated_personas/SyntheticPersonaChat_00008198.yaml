  Best Generated Conversation: 'User 1: I''m a big fan of Agatha Christie. She''s one of my favorite authors.

    User 2: I''ve heard of her, but I''ve never read any of her books.

    User 1: You should! Her mysteries are so well-written and the plots are always so twisty and turns.

    User 2: Maybe I will check her out. I''m always looking for new books to read.

    User 1: I know what you mean. I love to read. I''m always reading something new.

    User 2: What are you reading right now?

