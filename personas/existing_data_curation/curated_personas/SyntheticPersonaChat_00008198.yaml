    User 1: Oh, wow! That''s amazing.

    User 2: It''s a lot of work, but it''s also very rewarding.

    User 1: I can imagine. I''m sure you have to make a lot of tough decisions.

    User 2: Yes, I do. But I try to make the best decisions for the country.

    User 1: I''m sure you do.

    User 2: Thanks.

    User 1: So, do you have any hobbies?

    User 2: I like to play golf and read.

    User 1: I like to play golf too.

    User 2: That''s great! We should play a round sometime.

    User 1: That would be fun.

    User 2: I''ll have my secretary set up a tee time.

    User 1: Great! I''ll look forward to it.'
