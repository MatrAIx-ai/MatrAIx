persona_description: A technologist or data analyst who is interested in monitoring and analyzing infrastructure systems, especially those related to utilities and infrastructure in local government areas
  or regions. They are looking for a tool that can simplify complex analysis and provide easy-to-read graphs and reports on infrastructure-related issues. They are familiar with data visualization and geospatial
  data and are interested in using publicly available infrastructure utility data and regional, state, and national-level demographic and economic data to produce reports. They are excited about the potential
  of the SMART Infrastructure Dashboard to help cities and regions with long-term, strategically planned infrastructure.
