  hobbies: '[''Bowling league'', ''Youth basketball mentorship'', ''Church charity drives'', ''Fishing'', ''Gardening'', ''Attending Boston Red Sox games'', ''Crossword puzzles'', ''Reading historical biographies'',
    ''Classic car maintenance'']'
  career_goals: Although approaching retirement, Gary aims to transition into a mentorship role within his store chain, creating a structured training curriculum for new supervisors and documenting best‑practice
    SOPs for the region. He also hopes to achieve a store‑wide sales record by implementing a competitive sales contest that rewards top performers, and eventually to serve on the company’s regional advisory
    council, influencing policy based on his decades of frontline experience.
