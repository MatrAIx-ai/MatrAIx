  career_goals: At 60, Jacob is focused on shaping the next generation of sales engineers while solidifying his legacy within the company. He aims to transition into a senior advisory role where he can
    mentor younger staff, lead strategic account initiatives, and help design a flexible, innovation‑driven sales framework that blends new ideas with proven methods. He also hopes to build a part‑time
    consulting practice that specializes in sustainable industrial solutions, giving him the freedom to balance work with personal wellness and reduce the stress that often triggers his anxiety.
