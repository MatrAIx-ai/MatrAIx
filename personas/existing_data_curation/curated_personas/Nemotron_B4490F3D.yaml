  career_goals: Torrence aims to turn his practical abilities into a sustainable livelihood by earning certifications as a licensed electrician or HVAC technician and eventually launching his own home‑maintenance
    business in Syracuse. He plans to complete his GED and pursue vocational training to broaden his technical credentials, with the ultimate goal of achieving financial stability for his family and becoming
    a respected mentor for local youth. His ambition balances curiosity about new trades with a pragmatic focus on reliable income and community impact, reflecting his competitive drive and calm resilience.
