  hobbies: '[''Building LEGO sets'', ''Model kit assembly (cars, airplanes)'', ''Playing Minecraft'', ''School soccer'', ''Community clean‑up volunteering'', ''Reading local history books'', ''Bike maintenance
    and riding'']'
  career_goals: Wesley dreams of joining the local fire department when he’s older. He is drawn to the routine training schedule, the clear hierarchy, and the practical, hands‑on nature of firefighting.
    He also hopes to learn basic emergency‑medical skills so he can help his community in emergencies, viewing the role as a way to combine his love of teamwork, responsibility, and service.
