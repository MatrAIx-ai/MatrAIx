personas:
  professional: Isha Love is an aspiring game developer who combines her point‑guard strategic mindset with beginner‑level coding in Scratch, crafting interactive stories while applying a methodical, deadline‑driven
    approach that reflects her love of structure and competitive edge.
  sports: Isha Love serves as point guard for the West Side Middle School Thunder, idolizes the Chicago Bulls and Chicago Sky, trains three times a week at the community gym, and balances a competitive
    drive with occasional team‑building drills, while also cheering for the Chicago Cubs during baseball season.
  arts: Isha Love spends evenings mastering piano pieces by Ludovico Einaudi and Ariana Grande, draws inspiration from graphic novels like 'Maus' and manga such as 'My Hero Academia', and sketches Chicago
    cityscapes in a sketchbook, letting the urban rhythm shape her creative expression.
  travel: Isha Love enjoys weekend trips to the Museum of Science and Industry in Chicago and the nearby Great Lakes beaches, dreams of visiting Tokyo to explore anime districts and the Ghibli Museum, and
    prefers meticulously planned itineraries that blend structured museum tours with spontaneous street‑food adventures.
  culinary: Isha Love favors classic Chicago deep‑dish pizza topped with mozzarella, sausage, and pepperoni, loves making homemade mac and cheese with sharp cheddar and breadcrumbs, and experiments with
    simple sushi rolls featuring cucumber and avocado when trying new cuisines.
  core: Isha Love is a detail‑obsessed 12‑year‑old who balances structured planning with a competitive spark, yet often forgets to hydrate after games and secretly hoards extra stickers for their planner.
background:
  cultural: Isha is a Black American raised in Chicago’s South Side, a vibrant community known for its rich musical, artistic, and athletic traditions. Her family emphasizes education, resilience, and community
    involvement, often attending church events where gospel music and storytelling are central. She celebrates cultural milestones such as Juneteenth and participates in local festivals that showcase African
    American art and cuisine. Growing up near the city’s museums and public libraries, Isha has been exposed to the city’s history of civil rights activism, which shapes her sense of social responsibility
    and her aspiration to contribute positively to her neighborhood.
attributes:
