  career_goals: Isha aims to graduate high school with honors and earn a scholarship to a university with a strong STEM program. She dreams of becoming a biomedical engineer or a software developer, hoping
    to design technology that improves health outcomes in underserved neighborhoods. In the shorter term, she wants to become captain of her basketball team and lead her peers in a school robotics club.
    She also hopes to mentor younger students in math, combining her competitive spirit with a desire to give back to her community.
