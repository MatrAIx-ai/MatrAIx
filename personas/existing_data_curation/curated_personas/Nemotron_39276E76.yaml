  hobbies: '[''Classic Car Restoration'', ''Woodworking'', ''Hunting'', ''Fishing'', ''Model Railroading'', ''Mentoring at Local 4-H Clubs'', ''Reading Technical Manuals and Engineering History'', ''Attending
    Texas Tech Alumni Events'']'
  career_goals: Approaching the later stage of his career, Frank aims to secure a senior engineering or technical leadership position where he can oversee large-scale mechanical projects such as modernizing
    water-treatment facilities or designing energy-efficient agricultural machinery for the Texas Panhandle. He plans to obtain his Professional Engineer (PE) license, mentor junior engineers through formal
    apprenticeship programs, and eventually transition to a consulting role that allows him to apply his practical, routine-driven expertise to solve local industry challenges while building a stable retirement
    portfolio.
