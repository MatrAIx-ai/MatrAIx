personas:
  professional: Frank Newton, a 53‑year‑old mechanical engineer in West Texas, leverages three decades of expertise in SolidWorks, finite‑element analysis, Six Sigma, and ISO‑9001 quality systems to methodically
    redesign agricultural machinery and water‑treatment equipment, and they consistently deliver projects on schedule through meticulous planning and a competitive drive to out‑perform industry benchmarks.
  sports: Frank Newton is an active member of the Lubbock Country Hunting Club and the West Texas Anglers Association, spends every spring weekend fishing the Canadian River, follows the Dallas Cowboys
    and Texas Rangers closely, and they maintain a personal fitness routine of weekly weight‑lifting sessions to sustain the stamina needed for outdoor pursuits.
  arts: Frank Newton finds artistic fulfillment in crafting bespoke wooden furniture inspired by the rustic designs of Gustav Stickley, curating a model‑railroad layout featuring miniature Union Pacific
    locomotives, and they relax to the music of Willie Nelson while occasionally watching classic John Wayne westerns.
  travel: Frank Newton favors meticulously planned road trips that blend hobby and relaxation, such as the annual drive to the Ford Mustang Club show in California, weekend hunting excursions in the Guadalupe
    Mountains, and periodic visits to Lubbock for Texas Tech alumni reunions, and they always map routes in advance and avoid spontaneous travel.
  culinary: Frank Newton prefers hearty, low‑maintenance meals like smoked brisket seasoned with mesquite wood and Texas‑style chili con carne, they enjoy grilling freshly caught catfish with a lemon‑pepper
    rub, and they occasionally perfect a classic chicken‑fried steak in a cast‑iron skillet, while their cooking skill remains confidently at the home‑cook level.
  core: Frank Newton is a methodical, competition‑driven engineer; they balance a love for vintage car restoration and woodworking with a routine‑obsessed lifestyle, a habit of over‑budgeting projects,
    and a persistent reluctance to schedule dental appointments.
background:
  cultural: Frank is a third-generation White Anglo-American raised in the West Texas panhandle. Growing up in Lubbock, he was shaped by the region's strong work ethic, self-reliance, and practical conservatism
    that values routine, family ties, and community responsibility. His family's background in small-scale farming and oil-field support reinforced an appreciation for hands-on problem solving and a respect
    for traditional values. He identifies with the modest, straightforward cultural norms of the Texas High Plains—favoring direct communication, punctuality, and a modest, private lifestyle—while also
    embracing the educational opportunities and community spirit offered by Texas Tech University and local civic organizations.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''Finite Element Analysis'', ''Project Management'', ''Lean Manufacturing'', ''Root Cause Analysis'', ''Preventive Maintenance Planning'', ''Quality Assurance (ISO
