personas:
  professional: Migdalia Campos is a seasoned community elder who leverages decades of household management, budgeting, and translation expertise to organize church events, food drives, and cultural celebrations,
    and they apply their methodical, reliable nature to keep the neighborhood interconnected.
  sports: Migdalia Campos enjoys low‑impact fitness, taking daily walks around the local park, tending to her herb garden, and cheering for the Miami Marlins while occasionally joining a senior Zumba class,
    and they balance activity with restful pauses to protect their joints.
  arts: Migdalia Campos fills her evenings with the rhythms of cumbia, vallenato, and salsa, watches classic Mexican cinema like "Los Olvidados" and films from their home country, and expresses creativity
    through knitting scarves and crocheting blankets, as they find inspiration in the vibrant colors of traditional festivals.
  travel: Migdalia Campos favors relaxed, family‑oriented trips, planning short drives to the Everglades for birdwatching, annual visits to relatives in Texas, and dreaming of a pilgrimage to a historic
    Caribbean port city they heard stories of, and they stay connected with distant kin via video calls.
  culinary: Migdalia Campos delights in preparing arepas, sancocho, and empanadas, seasoning dishes with freshly harvested cilantro, guasca, and plantain leaves from her garden, preserving seasonal fruits
    through canning, while they occasionally over‑salt a pot as a harmless quirk that family members tease her about.
  core: Migdalia Campos blends a lifetime of practical stewardship, cultural devotion, and gentle curiosity, navigating each day with disciplined budgeting, community service, rhythmic music, and a steadfast
    commitment to preserving family heritage despite occasional forgetfulness, and they approach life with quiet resilience.
background:
  cultural: Migdalia was born and raised in Colombia, where she absorbed a rich blend of Catholic faith, family‑centered values, and a love for music, dance, and flavorful cuisine. After emigrating to the
    United States, she settled in Hialeah, Florida, joining a vibrant Hispanic community that shares many cultural threads with her Colombian roots. She continues to celebrate Colombian holidays such as
    Independence Day and Carnaval de Barranquilla, while also embracing local Florida traditions. Her daily life reflects a fusion of Colombian customs—home‑cooked meals, Spanish language, and reverence
    for elders—with the multicultural rhythm of South Florida. She serves as a cultural bridge, passing on Colombian heritage to younger generations while remaining open to new ideas and practices.
