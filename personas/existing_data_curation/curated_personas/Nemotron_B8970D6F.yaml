  career_goals: Although retired from formal teaching, Elisa aims to continue shaping education by mentoring retired educators, establishing intergenerational learning circles, and serving as a volunteer
    advisor to the local school board on multicultural curriculum. She plans to launch a pilot community-art workshop for seniors that blends Colombian artistic traditions with Floridian coastal themes.
    Additionally, she aspires to write a memoir that weaves together her bilingual teaching experiences and to complete online courses in art history and digital media to stay intellectually vibrant.
