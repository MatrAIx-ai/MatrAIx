personas:
  professional: Robert Waller, an aspiring junior engineer, delights in building LEGO contraptions and sketching mechanical designs, channeling his curiosity and organized yet flexible mindset into early
    problem‑solving projects, and they often volunteer to help classmates with science fair prototypes.
  sports: Robert Waller is a keen member of the Clarkston Knights youth soccer league, cheers for the Atlanta United FC and the Atlanta Braves during family gatherings, enjoys weekend bike rides on the
    local trail, and they balance a love of team spirit with a habit of forgetting to stretch before games.
  arts: Robert Waller spends afternoons drawing cartoons inspired by Bill Watterson’s Calvin and Hobbes and painting landscapes after studying Monet’s water lilies at the High Museum, often listening to
    the melodic scores of John Williams while they doodle, and they proudly display a hand‑crafted comic strip in the school hallway.
  travel: Robert Waller’s travel style blends curiosity with family stewardship, having explored the Georgia Aquarium, taken a road trip to historic Savannah’s cobblestone streets, and dreaming of a future
    visit to the Grand Canyon’s rim, while they prefer trips planned around school holidays and limited pocket money.
  culinary: Robert Waller favors comfort foods like cheesy macaroni, peach cobbler, and smoky pulled chicken wings from neighborhood barbecues, enjoys assembling simple toast‑cheese bites at home, and they
    can name the herbs they love—basil, oregano, and rosemary—though they often over‑season their self‑made pizza.
  core: Robert Waller is a nine‑year‑old explorer who balances a LEGO‑filled imagination with an occasional mess‑making habit, loves spontaneous sketch sessions, and never misses a chance to trade comic
    cards after school.
background:
  cultural: Robert grows up in Forest Park, a suburban community in Clayton County, Georgia. His family is part of the region’s longstanding white, Anglo‑American population, with generations who have lived
    in the South. While they honor traditional Southern values such as close family ties, community involvement, and respect for local customs like neighborhood barbecues and holiday celebrations, they
    also embrace the cultural diversity of the Atlanta metropolitan area. Robert’s parents encourage his curiosity by taking him to local libraries, museums, and community events, and they support his participation
    in school activities, church youth groups, and neighborhood sports leagues. This blend of Southern heritage and contemporary multicultural exposure shapes his worldview, giving him an appreciation for
    both local traditions and a broad range of cultural experiences.
