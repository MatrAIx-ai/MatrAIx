  career_goals: Although still in elementary school, Robert already dreams of turning his passions into a future career. He envisions a path that blends his love for art, technology, and the natural world—perhaps
    as an environmental designer, a video‑game illustrator, or an astronaut‑engineer who creates visualizations of space missions. He aims to deepen his drawing and coding abilities, join his school’s robotics
    and art clubs, and eventually study at a science museum or a design school. He also hopes to protect wildlife by designing habitats that are both functional and beautiful. His ambitions are driven by
    curiosity, a desire to explore new ideas, and a steady, organized approach to achieving his goals.
