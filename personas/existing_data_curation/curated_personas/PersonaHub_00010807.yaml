persona_description: A physicist and electrical engineer who specializes in the study of electric circuits and electromagnetism. Their expertise lies in the analysis of electric potential differences and
  the flow of electric current through conductive paths. They are familiar with the concept of polarity and its application in electrical engineering, and are skilled in the use of analog and digital electronics.
  They may also have experience with magnetic fields and their relationship to the motion of charge carriers. They are interested in the practical applications of electrical engineering, particularly in
  the field of telecommunications.
