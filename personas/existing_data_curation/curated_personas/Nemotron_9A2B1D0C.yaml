  hobbies: '["Photography", "Kayaking", "Sailing", "Woodworking", "Community Garden", "Local Art Museum Visits", "Book Club", "Community Theater Attendance", "Piano Playing", "Historical Research"]'
  career_goals: Although retired, Willie aims to channel his curiosity into projects that keep him mentally active and benefit his community. He hopes to curate a small exhibition of his own photographs
    alongside historic images of Mukilteo at the local library. He plans to write a memoir that weaves personal family anecdotes with the town’s evolving waterfront culture. Mentoring is a priority; he
    wants to lead workshops for high‑school students interested in art, photography, and local history. On a personal level, he aspires to visit key art institutions in the Pacific Northwest—Seattle Art
    Museum, Portland Art Museum, and the Victoria Art Gallery—while also taking a road trip to the San Juan Islands for sketching and painting. Maintaining physical health, he intends to keep a weekly kayaking
    routine on Puget Sound and tend a community garden plot.
