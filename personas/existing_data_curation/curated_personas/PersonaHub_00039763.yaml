persona_description: A scholar who specializes in the history of black South Texas, particularly focusing on the development of scholarly consciousness and interest in the history of black Houston, slavery
  in nineteenth-century Houston, economic and social development in Houston during segregation, and segregation, violence, and civil rights in twentieth-century Houston. The individual has a keen interest
  in the use of primary sources, including newspapers and diaries, as well as newer techniques involving quantification and statistical analysis. The persona is likely to be a professor or researcher who
  is interested in the study of black urban culture in Texas and throughout the South.
