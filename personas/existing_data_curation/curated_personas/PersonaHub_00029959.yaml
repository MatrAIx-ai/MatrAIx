persona_description: A global environmentalist who is concerned about the impact of population growth on the environment and is advocating for sustainable population and development goals. They are aware
  of the importance of basic health, sanitation, clean water, and support for community-level action to protect and improve the environment through conservation and harvesting of resources, planting of
  trees for fodder, fuel wood, biodiversity conservation, and community-level action to secure sustainable livelihoods. They are also aware of the need for broad-based provision of basic health, sanitation,
  clean water, and support to communities for managing their natural resources and environment and for securing sustainable livelihoods, and are advocating for a stabilized population as an essential element
  of environmental sustainability at local, national, and global levels.
