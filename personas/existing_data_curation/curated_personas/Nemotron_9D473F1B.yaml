  career_goals: Francis aims to secure admission to a competitive STEM‑focused high school and earn a scholarship that will enable him to pursue a bachelor’s degree in computer engineering or environmental
    engineering. He wants to merge his practical mindset with his curiosity by creating technology solutions for climate‑related challenges, such as sensor networks for coastal monitoring. In the longer
    term, he envisions launching a tech startup that delivers affordable, user‑friendly environmental monitoring tools for schools and community organizations. In the near term, he plans to win regional
    robotics competitions and build a robust portfolio of coding projects.
