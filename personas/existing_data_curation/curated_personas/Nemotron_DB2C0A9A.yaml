  career_goals: Carla aims to finish the remaining credits toward her associate degree, focusing on community development or nonprofit management. She envisions transitioning into a part‑time role as a
    community program coordinator for the Culdesac recreation department, where she can apply her organizational talents on a larger scale. Additionally, she hopes to launch a small home‑based business
    selling handmade crafts and garden produce at the local farmers market, and eventually serve on the board of the Nez Perce County Chamber of Commerce to influence regional community initiatives.
