  career_goals: Karina dreams of becoming an artist who can paint bright, story‑filled pictures inspired by Mexican folk art and the seascapes she loves at the beach. She also imagines herself as a teacher
    one day, guiding younger children in reading and exploring new ideas, reflecting her desire to share knowledge and foster harmony. Occasionally she wonders about being a marine biologist to protect
    the ocean, showing her curiosity about nature and her wish to help the world.
