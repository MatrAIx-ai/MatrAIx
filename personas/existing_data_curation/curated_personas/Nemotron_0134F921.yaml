personas:
  professional: A curious five-year-old, Karina Larosa, loves exploring the world through hands‑on experiments and pretends to run a tiny 'lab' in their bedroom, balancing meticulous organization of their
    Lego collection with the flexibility to let imagination lead the play, showing early signs of a future scientist.
  sports: An energetic five-year-old, Karina Larosa, participates in a weekend community soccer program and is a fan of the local professional baseball team, the City Cyclones, cheering quietly from the
    sidelines while preferring to practice balance on the playground jungle gym rather than large crowds.
  arts: A budding artist, Karina Larosa, creates bright crayon portraits of animals after watching the animated series 'Wild Kratts', and enjoys listening to the gentle piano pieces of Yiruma, finding calm
    in the quiet corner of the preschool art room.
  travel: A curious traveler, Karina Larosa, has explored the nearby state park’s dinosaur trail and, with family, visited the grand fountains of Versailles, France, dreaming of someday building a sandcastle
    on the beaches of Bali.
  culinary: A selective eater, Karina Larosa, adores mac and cheese made with sharp cheddar and a dash of hidden cauliflower puree, relishes fresh strawberry slices, and loves helping their parents roll
    sushi with cucumber and avocado at home.
  core: Karina Larosa, a five-year-old whose curiosity and quiet kindness drive them to organize Lego kingdoms, save pocket money in a pink piggy bank, and explore art and nature with gentle wonder.
background:
  cultural: Karina is raised in a Mexican‑American household in Seal Beach, California. At home, Spanish is spoken alongside English, and she participates in cultural celebrations such as Día de los Muertos
    and Mexican Independence Day, where she helps create colorful papel picado and enjoys traditional foods like tamales and quesadillas. Her family maintains ties to their roots through music, storytelling,
    and sharing stories of Mexico, while also embracing the coastal Californian lifestyle, blending beach activities with cultural heritage.
