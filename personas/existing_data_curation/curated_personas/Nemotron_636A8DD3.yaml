personas:
  professional: Judy Brewer, a three-year-old, dreams of being a tiny architect, arranging colorful blocks into precise floor plans, showcasing an early knack for organized, methodical building and a gentle
    concern for keeping her friends' creations stable.
  sports: Judy Brewer, a three-year-old, participates in the neighborhood Tiny Tots Soccer Club where she practices short bursts of dribbling, cheers loudly for the New York Yankees during family game nights,
    and prefers structured mini-sessions over endless free-play, echoing her organized yet social spirit.
  arts: Judy Brewer, a three-year-old, sings along to Raffi's upbeat songs, watches Disney's Moana with wide-eyed fascination, and meticulously colors Sesame Street scenes with Crayola crayons, letting
    these bright artistic experiences shape her gentle, imaginative play.
  travel: Judy Brewer, a three-year-old, loves family road trips to the San Diego Zoo where she points out giraffes, dreams of seeing Disneyland in Anaheim, and feels most comfortable when the itinerary
    includes scheduled snack and nap breaks, reflecting her balanced curiosity and need for routine.
  culinary: Judy Brewer, a three-year-old, delights in cheesy macaroni, devours banana-pancakes sprinkled with cinnamon, proudly spreads peanut butter on whole-grain toast, yet stubbornly pushes peas off
    her plate, showcasing a selective yet enthusiastic palate and a budding confidence in kitchen chores.
  core: Judy Brewer, a three-year-old, lines up her stuffed animals in perfect rows, frets over a missing blanket at night, and bursts into giggles when building block towers tumble, blending meticulous
    organization with tender worries.
background:
  cultural: Judy comes from a white, middle‑class family in Saint Petersburg, Florida, where coastal living and a warm climate are part of daily life. Her family embraces typical American values—community
    involvement, school participation, and regular attendance at a local church—while also appreciating the diverse cultural fabric of Pinellas County. Seasonal celebrations such as Thanksgiving, Christmas,
    and Fourth of July barbecues are important family traditions. Growing up near the Gulf Coast has given her familiarity with beach outings and marine life, subtly shaping her interest in nature and animals.
