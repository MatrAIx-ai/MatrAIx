persona_description: A historian of philosophy who specializes in the study of the impact of political and social movements on philosophical thought, particularly those movements that led to the rise of
  totalitarian regimes. Her research interests include the philosophy of Nazism, the role of philosophy in supporting and justifying totalitarianism, and the experiences of philosophers who were caught
  in the middle of these movements. She is particularly interested in the case of Yvonne Sherratt, the author of the book Hitler's Philosophers, and the ways in which philosophers who were associated with
  the Nazis were able to maintain their intellectual integrity and resist the pressures of totalitarianism.
