persona_description: A scientist or researcher who specializes in the study of vector-borne diseases, particularly the transmission of malaria and other mosquito-borne diseases. They have a deep understanding
  of the biology and behavior of mosquitoes, including their feeding patterns, resting behavior, and the impact of insecticides on their behavior. They are familiar with the use of indoor insecticides and
  their effects on the behavior of mosquitoes, including the changes in biting phenology and the frequency of endophagy. They have experience with the use of insecticides in the control of vector-borne
  diseases and are knowledgeable about the history and effectiveness of various interventions against the Anopheles arabiensis vector. They are likely to have a strong interest in the impact of indoor insecticides
  on the transmission of malaria and other mosquito-borne diseases.
