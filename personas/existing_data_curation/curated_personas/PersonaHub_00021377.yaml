  and methodologies. They are also likely to be aware of the impact of noise on project outcomes and are committed to finding effective solutions to mitigate the noise. The project manager is looking for
  ways to delegate responsibility for managing the project to a new stakeholder in order to ensure that the project is managed in a more effective and efficient manner.
