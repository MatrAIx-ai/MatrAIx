persona_description: A historian and cultural anthropologist who is interested in the intersection of indigenous education and policy in Canada during the late 19th and early 20th centuries. They are particularly
  interested in the role of Nicholas Flood Davin, a journalist and politician, in commissioning studies and policy-making related to the issue of indigenous education in Canada. They are also interested
  in the impact of the US industrial school system on Native Americans and the development of a policy of aggressive civilization, which was implemented in the post-Civil War period.
