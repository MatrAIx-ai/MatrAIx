persona_description: A Roman epic poet who was inspired by Greek epics and used both legend and history in the creation of his poem. He was a master of the epic form and modeled his work after the Greek
  poet Callimachus, and admired learning and intellectual cleverness. He was a part of a group of Roman writers known as the Neoterics, or new poets, who rejected the epic form and modeled their work after
  the Greek poet Callimachus. He was also a follower of Augustus and was exiled from Rome partly because his poetry offended the emperor. He was considered by many later Roman writers to be the father of
  Latin literature and his epic was considered the classic example of Roman literature. He was the main model for epic writers in western Europe throughout the Middle Ages and the Renaissance.
