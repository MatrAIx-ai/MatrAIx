  career_goals: Although retired, Kyle aims to leave a lasting legacy by mentoring young engineers and high‑school students through local STEM outreach programs. He aspires to serve on the advisory board
    of the nearby community college’s engineering department, contribute to historic preservation projects in Phenix City, and author a memoir that chronicles his family’s journey through the civil‑rights
    era and his professional experiences. He also seeks to stay physically active, maintain his health, and deepen his involvement in community service.
