personas:
  professional: Kyle Batiste, a retired civil engineer celebrated for his structural design, project management, and meticulous budgeting expertise, now channels his practical, organized mindset into mentoring
    young engineers, serving on a community college advisory board, and applying his analytical flair to historic preservation projects in Phenix City.
  sports: Kyle Batiste enjoys low‑impact fitness through early morning walks along the Chattahoochee River, participates in a senior fishing club, follows the Atlanta Falcons and the local Phenix City High
    School basketball team, and plays casual golf on weekends, embracing social camaraderie over intense competition.
  arts: Kyle Batiste finds artistic fulfillment in singing gospel hymns with his church choir, listening to blues legends such as B.B. King and modern soul artist Leon Bridges while cooking, and attending
    the Riverfront Blues Festival, where he often discusses the storytelling power of music with fellow enthusiasts.
  travel: Kyle Batiste plans his trips with his wife around historic destinations—such as the Civil Rights sites in Selma, the antebellum homes of Savannah, and a family reunion in New Orleans—favoring
    organized itineraries that balance cultural immersion with comfortable lodging and mindful budgeting.
  culinary: Kyle Batiste, an avid home cook, excels at preparing Southern staples like fried catfish, collard greens simmered with smoked turkey, and peach cobbler, seasoning them with garden‑fresh okra
    and sweet potatoes, while occasionally over‑salting his gumbo in his enthusiastic quest for bold flavors.
  core: Kyle Batiste blends a lifetime of engineering precision, community devotion, and Southern traditions into a steady, sociable presence who mentors youth, savors gospel and blues, and navigates retirement
    with disciplined budgeting and a garden‑to‑table mindset—though he sometimes forgets to stretch after fishing.
background:
  cultural: Kyle was born and raised in the Deep South, growing up in a close‑knit African‑American community in Alabama. His grandparents were sharecroppers who migrated from the Mississippi Delta during
    the Great Migration, and his parents were active participants in the 1960s civil‑rights movement, instilling in him a strong sense of social responsibility and cultural pride. He earned his undergraduate
    degree at a historically black college before completing a master's in civil engineering at a state university. A lifelong member of the First Baptist Church of Phenix City, Kyle regularly engages in
    local African‑American cultural events, such as Juneteenth celebrations and the Riverfront Blues Festival. His cultural identity is reflected in his love for gospel music, Southern cooking, storytelling,
    and dedication to community service.
