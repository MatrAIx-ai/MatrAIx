  hobbies: '[''drawing/sketching'', ''reading science‑fiction and graphic novels'', ''Scratch coding'', ''LEGO building'', ''piano practice'', ''classical music listening'', ''book club'', ''library volunteering'',
    ''nature walks and sketching'']'
  career_goals: David imagines a future where he can blend his love for art, technology, and helping others. In the short term, he aims to deepen his coding skills, build a portfolio of digital artwork,
    and earn a leadership role in his school's community service club. Looking ahead, he aspires to study at a specialized high‑school that offers both advanced STEM courses and visual‑arts training, with
    the long‑term goal of becoming an architect or product designer who creates aesthetically pleasing, accessible spaces and tools. He also entertains the idea of pursuing a degree in social work or educational
    counseling to combine his creative mindset with his strong desire to support peers and foster inclusive environments.
