personas:
  professional: David Borkowski, a 12-year-old aspiring game developer, channels his curiosity and disciplined organization into building Scratch games that blend intricate cityscape visuals with puzzle
    mechanics, and they eagerly share prototypes during school tech club meetings.
  sports: David Borkowski plays midfield for the Grandville Lancers youth soccer club, follows the Detroit Tigers with a practiced weekly ritual of checking game stats, and they maintain a disciplined fitness
    routine that includes after-school bike rides along the Grand River.
  arts: David Borkowski spends afternoons sketching imagined city skylines while listening to Johann Sebastian Bach and Ludovico Einaudi, devours graphic novels like 'Saga' and 'Watchmen' for visual inspiration,
    and they eagerly attend the Grandville Library's monthly art workshop featuring local illustrator Maya Torres.
  travel: David Borkowski prefers meticulously planned family trips, having explored the Detroit Institute of Arts, taken weekend hikes in Sleeping Bear Dunes, and they have visited Washington, DC's Smithsonian
    museums, while daydreaming about a future adventure to Tokyo's Akihabara district to experience anime culture firsthand.
  culinary: David Borkowski enjoys assembling hand-rolled dumplings filled with cheese and potatoes for holiday meals, whipping up spaghetti with fresh basil, garlic, and cherry tomatoes, and they proudly
    experiment with beet and carrot soup seasoning using dill, though they often over-salt their dishes in pursuit of perfect flavor.
  core: David Borkowski is a methodical young creator who balances meticulous planning - down to color-coding every sketchbook - with a quiet, compassionate drive to help friends and family, though they
    sometimes get lost in endless perfectionism and a habit of re-watching the same anime episode.
background:
  cultural: David was born and raised in Grandville, Michigan, a suburban community in Ottawa County with a predominantly white, middle‑class population. His family traces its roots to Polish immigrants,
    and cultural traditions such as celebrating Easter with a painted egg (pisanka) and enjoying traditional Polish dishes at holidays are part of his upbringing. Although the family attends a local Catholic
    parish, they are also deeply engaged in the broader Midwestern values of community service, school involvement, and seasonal celebrations like Thanksgiving parades and Fourth of July fireworks. This
    blend of Polish‑American heritage and Midwestern small‑town life shapes his respectful, cooperative demeanor and his appreciation for both cultural traditions and contemporary artistic expressions.
