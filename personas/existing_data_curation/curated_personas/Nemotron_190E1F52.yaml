  hobbies: '["Watercolor painting and sketching", "Visiting art galleries and theater", "Hiking and kayaking in New Hampshire outdoors", "Community gardening", "Weekly board‑game nights", "Volunteer reading
    program at the town library", "Woodworking and vintage radio restoration", "Cooking collaborative meals", "Listening to science and philosophy podcasts"]'
  career_goals: James aims to channel his curiosity and compassion into a role that strengthens community ties. He envisions leading a local nonprofit or community center program that blends STEM education
    with the arts, offering after‑school workshops for youth. To support this, he plans to pursue a certification in community outreach or adult education, and perhaps a master’s level credential in nonprofit
    management. He also hopes to develop a small‑scale makerspace in Goffstown where residents can collaborate on creative projects, while maintaining a flexible schedule that supports his family life and
    personal learning pursuits.
