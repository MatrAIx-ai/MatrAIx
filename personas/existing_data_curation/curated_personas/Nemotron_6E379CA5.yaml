personas:
  professional: An experienced tool and die maker, Amanda Hegner leverages two decades of metal fabrication expertise, precise CAD/CAM and CNC programming, and an assertive‑yet‑cooperative leadership style
    to mentor apprentices while balancing a curiosity for new methods with practical production demands, and they continually seek opportunities to blend traditional craftsmanship with modern technology.
  sports: A dedicated member of the Pee Dee Trailblazers Hiking Club, Amanda Hegner schedules weekly treks on local Blue Ridge foothills, maintains fitness through brisk walks, and they avidly follow the
    Carolina Panthers, Charlotte Hornets, and the South Carolina Gamecocks during football and basketball seasons.
  arts: An enthusiastic participant in community theater, Amanda Hegner regularly performs in August Wilson productions, volunteers building sets, quilts alongside peers using designs inspired by Martha Stewart,
    and they attend bluegrass festivals featuring Bill Monroe and the Del McCoury Band, while devouring mystery novels by Agatha Christie and Tana French.
  travel: A weekend road‑trip enthusiast, Amanda Hegner meticulously plans scenic drives through the South, having already explored Charleston’s historic waterfront, Savannah’s squares, Asheville’s mountain
    arts scene, and dreaming of a music‑laden pilgrimage to Nashville and an autumn stay in Edinburgh's festival week, and they balance modest budgets with occasional splurges on boutique B&Bs.
  culinary: A self‑taught Southern cook, Amanda Hegner perfects flaky buttermilk biscuits, crispy fried chicken seasoned with paprika and garlic, and peach cobbler layered with freshly picked Georgia peaches,
    while they frequently toss heirloom tomatoes, basil, and oregano into garden‑fresh salads and experiment with corn‑meal‑crusted fish using home‑grown herb blends.
  core: Amanda Hegner balances razor‑sharp die‑making precision and a buzzing social calendar of theater, quilting, and bluegrass, yet they secretly battle anxiety‑driven over‑planning and a habit of midnight
    biscuit snacking that sometimes derails their sleep schedule.
background:
  cultural: Amanda grew up in the rural community of Brunson, South Carolina, in a working‑class, white family that has deep roots in the agricultural and small‑factory traditions of Hampton County. The
    close‑knit nature of the area, with its emphasis on hospitality, church involvement, and seasonal community gatherings, instilled in her a strong sense of cooperation and service. Early exposure to
    hands‑on work on family farms and local manufacturing shops sparked her practical curiosity and guided her toward a career in tool and die making. While she honors Southern customs—Sunday worship, family
    barbecues, and folk music—her natural inquisitiveness drives her to adopt new technologies such as CNC machining and CAD design. Her cultural identity blends respect for tradition with a progressive
    outlook, motivating her to support other women entering traditionally male‑dominated trades and to promote mental‑health awareness in her community.
attributes:
  skills: '[''Manual machining'', ''CNC programming (basic)'', ''Blueprint interpretation'', ''Precision measurement'', ''Heat treating and metal finishing'', ''CAD/CAM design (SolidWorks, Fusion 360)'',
    ''Tool maintenance'', ''Quality assurance'', ''Safety compliance'', ''Team collaboration'', ''Mentoring apprentices'', ''Inventory control'']'
  hobbies: '[''Community theater'', ''Woodworking'', ''Gardening'', ''Southern cooking and baking'', ''Quilting circle'', ''Hiking with local group'', ''Volunteer at senior center'', ''Reading mystery novels'',
    ''DIY electronics'', ''Bluegrass music festivals'']'
  career_goals: Amanda aims to achieve master‑die‑maker certification and become a lead technologist in her plant, overseeing complex die projects and guiding a small team. She plans to earn advanced CNC
    certifications and a journeyman credential in metalworking to deepen her technical authority. Passionate about mentorship, she intends to develop a structured apprenticeship program that encourages
    more women and underrepresented individuals to enter the trade. Recognizing her own emotional reactivity, she also aspires to champion workplace mental‑health initiatives, establishing a peer‑support
    network and advocating for stress‑management resources on the shop floor. Long‑term, she dreams of opening a boutique die‑fabrication workshop that blends traditional craftsmanship with modern CNC technology
    while maintaining a healthier work‑life balance.
