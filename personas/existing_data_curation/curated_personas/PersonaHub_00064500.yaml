persona_description: A professional with a diverse range of skills and experiences, who is dedicated to promoting and supporting the well-being of individuals and communities through prevention and intervention
  programs. They are particularly interested in the use of evidence-based strategies to address complex interplay between individual, relationship, community, institution, and societal influences in ending
  violence and abuse. The persona is knowledgeable about the CDC's four level Socio-Ecological model of Prevention and the 9 Principles of Effective Prevention Programming. They have experience working
  with communities and organizations to identify gaps in services, skills, and resources and to create effective approaches to address violence and abuse. The persona is located in Portland, Oregon and
  is available for consultation through a convenient online contact form or by phone.
