personas:
  professional: Jose Jimenezcolon is an aspiring aerospace hobbyist who designs and launches model rockets, writes simple games in Scratch and Python, and channels their methodical, competitive streak into
    strategic chess play, balancing curiosity with a disciplined, step‑by‑step approach to every project.
  sports: Jose Jimenezcolon plays casual soccer on a neighborhood youth league team, follows the MLS club Inter Miami CF for inspiration, and balances their love of quiet concentration with occasional cardio
    sessions, preferring short, high‑intensity drills over long endurance runs.
  arts: Jose Jimenezcolon immerses in classic Cuban rhythms like those of Benny Moré while practicing cajón beats, draws vibrant digital illustrations in Procreate inspired by graphic novels such as 'Saga'
    and the artwork of Moebius, and watches sci‑fi documentaries that fuel their creative storytelling.
  travel: Jose Jimenezcolon prefers family‑planned trips that blend education and adventure, having visited the Kennedy Space Center in Florida and dreaming of exploring the historic streets of Havana,
    while budgeting carefully to prioritize learning experiences over theme‑park leisure.
  culinary: Jose Jimenezcolon enjoys helping prepare traditional dishes like arroz con pollo and yuca con mojo, favors the sweet tang of plantains, and experiments with simple Python‑guided recipe timers
    in the kitchen, though they sometimes forget to eat breakfast before school.
  core: Jose Jimenezcolon is a curious, methodical 12‑year‑old who balances rocket building, coding, and chess with a love for classic music, a competitive edge, and a habit of over‑planning even their
    snack choices.
background:
  cultural: Jose is a second‑generation Cuban‑American raised in Miami’s vibrant Little Havana district. He grew up bilingual, speaking Spanish at home with his grandparents and English at school. Family
    gatherings often feature traditional foods like ropa vieja, plantains, and yuca, and celebrations of Cuban holidays such as Carnaval and Cuban Independence Day. He participates in community events at
    local cultural centers, where he learns about Cuban dance, music, and history. This bicultural environment instills in him a strong sense of pride in his heritage, a respect for family elders, and a
    desire to bridge his cultural identity with the broader American society through education and technology.
