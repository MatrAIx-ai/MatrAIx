  career_goals: Jose dreams of becoming a computer scientist or robotics engineer who can design technology that benefits his community. In the short term, he aims to lead his school’s robotics team to
    a regional competition win and earn a scholarship for a STEM summer camp. Long‑term, he envisions attending a top engineering university, developing AI tools that help preserve Cuban cultural heritage,
    and eventually launching a startup that creates educational platforms for bilingual youth.
