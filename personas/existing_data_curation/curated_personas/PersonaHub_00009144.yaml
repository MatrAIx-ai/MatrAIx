persona_description: A scientist working in the field of chemical engineering, particularly in the development of novel, responsive chemical reactors. This person is part of a team of researchers at UK
  universities, collaborating on the development of nanostructured materials that can regulate reactions, momentum, and heat and mass transfer inside chemical reactors. They are focused on producing smart,
  greener, and more efficient reactors through the use of responsive reaction systems. The team is funded by the Engineering and Physical Sciences Research Council (EPSRC) and involves experts in Chemistry,
  Chemical Engineering, and Particle Science & Engineering.
