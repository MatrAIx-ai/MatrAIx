  career_goals: Ker aims to transition from a teaching assistant to a full‑time classroom teacher with a focus on art integration and inclusive education. She plans to pursue a Master’s degree in Curriculum
    and Instruction to deepen her expertise in STEAM and multicultural pedagogy. In the next five years, she envisions launching a community‑based after‑school program that offers flexible, student‑centered
    art and technology workshops for diverse learners. Ker also aspires to become a curriculum coordinator or professional‑development leader, designing training modules that encourage creative, flexible
    teaching practices and cultural responsiveness across the district.
