personas:
  professional: Ker Li is a seasoned teaching assistant who blends art, technology, and inclusive pedagogy into STEAM classrooms, using their bilingual fluency, conflict mediation talents, and improvisational
    flair to design engaging lessons while embracing a relaxed, flexible schedule that often leaves lesson plans scattered among paintbrushes.
  sports: Ker Li is an avid hiker who roams Wisconsin’s Northwoods trails on weekends, plays in a community recreational soccer league with the Madison FC Amigos, and enthusiastically roots for the Milwaukee
    Bucks and Green Bay Packers, attending games whenever friends organize a group outing.
  arts: Ker Li creates watercolor landscapes inspired by Georgia O'Keeffe, crafts mixed‑media collages echoing the bold motifs of Yayoi Kusama, performs improv with a local theater troupe channeling The
    Second City's spontaneous style, and curates playlists featuring folk innovators like Sufjan Stevens and experimental soundscapes by Bon Iver.
  travel: Ker Li favors spontaneous, group‑oriented road trips that blend art and nature, often exploring Wisconsin gems such as Door County and the Upper Peninsula before venturing abroad to cultural hotspots
    like Florence’s Renaissance museums and Kyoto’s traditional tea houses, balancing a modest travel budget with occasional splurges on workshop retreats.
  culinary: Ker Li experiments with Asian‑fusion cooking at home, skillfully marrying miso‑marinated salmon with roasted beet salad, incorporating aromatics like ginger, lemongrass, and fresh basil, while
    also delighting in farm‑to‑table evenings that highlight dishes such as beet risotto and wild‑mushroom pizza.
  core: Ker Li is a curiosity‑driven, art‑obsessed community catalyst who embraces spontaneity, toggles between watercolor strokes and impromptu improv, and habitually misplaces their planner among paint
    tubes while still turning every setback into a collaborative masterpiece.
background:
  cultural: Ker is a first‑generation Chinese‑American who grew up in a bilingual household that celebrated both traditional Lunar New Year customs and Midwest community values. Her family emphasized the
    importance of education, respect for elders, and cultural preservation, which she carries into her professional life. She retains fluency in Mandarin and incorporates Chinese artistic techniques, such
    as ink brushwork and calligraphy, into classroom projects and community workshops. In Eau Claire, she actively participates in local Asian cultural associations, helping organize festivals, language‑exchange
    meetups, and multicultural art exhibitions. Ker’s cultural background informs her inclusive teaching philosophy, blending East Asian respect for collective harmony with the openness and volunteer spirit
    characteristic of Midwestern communities.
