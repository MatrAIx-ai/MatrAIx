  use of algorithms for predicting recidivism without proper consideration of the underlying factors. They are also interested in the ethical implications of algorithmic decision-making, particularly in
  areas where the decision-making process is based on data analysis and machine learning. This person is likely to be involved in fields such as computer science, data science, or artificial intelligence,
  and they are actively engaged in the development and implementation of algorithmic systems.
