  career_goals: Seeking a stable, structured role that leverages his sociable nature, Dylan aims to become a Community Engagement Coordinator for a local non‑profit or municipal agency. He plans to enroll
    in a certificate program in Community Development at the nearby community college to formalize his skill set. In the longer term, he envisions leading a regional outreach program and possibly launching
    his own event‑planning consultancy that serves small businesses and community groups, providing reliable, well‑organized services.
