personas:
  professional: Ingrith Estrada, a disciplined teenage visual‑arts enthusiast, channels their meticulous bullet‑journal planning and proficiency in Procreate, Photoshop, and basic web design to craft a
    polished online portfolio that fuses folk motifs with contemporary illustration.
  sports: Ingrith Estrada enjoys solitary prairie hikes near Dickinson, occasionally joins the high school cross‑country team for structured training, and follows the North Dakota State Bison football with
    dedication, using early morning runs to clear their mind before art sessions.
  arts: Ingrith Estrada immerses themselves in sketching, digital painting, and photography while drawing inspiration from magical‑realism literature by authors such as Haruki Murakami, ambient soundscapes
    by Brian Eno, and the composition techniques of Ansel Adams, frequently integrating hand‑lettered calligraphy into their visual narratives.
  travel: Ingrith Estrada plans travel that balances quiet nature escapes with occasional cultural city visits, favoring weekend road trips to national parks like Grand Canyon and historic towns such as
    Edinburgh, while limited finances keep most adventures within a few hours’ drive of Dickinson.
  culinary: Ingrith Estrada delights in preparing traditional family dishes such as tamales filled with seasoned pork and masa, simmering a rich mole sauce infused with chocolate and dried chilies, and
    experimenting with avocado‑lime salsa and spicy chilaquiles for breakfast.
  core: Ingrith Estrada blends a fiercely organized mindset with a solitary creative drive, habitually filling bullet‑journal pages with art‑project timelines while secretly indulging in midnight sketch
    marathons and occasionally over‑planning to the point of analysis paralysis.
background:
  cultural: Ingrith is a first‑generation Mexican‑American raised in a bilingual household in Dickinson, North Dakota. At home, Spanish is spoken daily, and family traditions such as Día de los Muertos,
    the making of papel picado, and cooking regional dishes are central to her upbringing. While she embraces Midwestern values of independence and self‑reliance, her Mexican heritage informs her artistic
    sensibilities—her color palettes often echo the vibrancy of Mexican folk art, and her storytelling draws on mythic narratives from her cultural roots. Being part of a small, predominantly white community
    has heightened her awareness of cultural identity, leading her to participate in local Hispanic community events and to serve as a cultural bridge at school. This blend of Mexican and North Dakotan
    experiences shapes her worldview, artistic voice, and personal values.
attributes:
  skills: '[''Advanced time management'', ''Digital illustration (Procreate, Photoshop)'', ''Photography composition'', ''Research and information synthesis'', ''Bilingual Spanish–English communication'',
