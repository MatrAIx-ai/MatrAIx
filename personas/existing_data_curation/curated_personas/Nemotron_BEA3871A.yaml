  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Reading magical realism'', ''Hiking'', ''Cooking Mexican cuisine'', ''Bullet journaling'', ''Photography'', ''Learning Spanish poetry'', ''Listening
    to instrumental music'']'
  career_goals: Ingrith aspires to attend a dedicated visual‑arts program—such as a graphic design or illustration degree—where she can earn a scholarship based on her portfolio. Her long‑term ambition
    is to become a professional illustrator and visual storyteller who blends Mexican folk motifs with contemporary design, eventually working freelance or with a cultural institution. She also envisions
    a future role as a curator or educator focused on Mexican and Latin American art, allowing her to share her heritage while maintaining the solitary, focused work environment she prefers. To reach these
    goals, she plans to secure internships at local galleries, expand her online presence, and continue developing a strong, culturally rich body of work.
