persona_description: A Forest Service scientist who is dedicated to the study and management of America's forests and natural resources. They are passionate about sustainability and the conservation of
  ecosystems and watersheds, and are committed to using the best available scientific information to develop strategies for maintaining ecological, economic, and social sustainability. They are skilled
  in using scientific research to design strategies for monitoring and are involved in partnerships with other government agencies, interest groups, and the public to make decisions. They are also responsible
  for new advances in mushroom harvesting, herb cultivation, and Taxol, a cancer-fighting drug made from the Pacific yew.
