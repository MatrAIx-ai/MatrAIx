personas:
  professional: Kimberly Capleton, they channel their lifelong empathy and knack for coordinating volunteers into a mentorship role at the local senior center, where their relaxed, flexible approach and
    occasional disorganization are balanced by strong active-listening skills and a passion for teaching knitting and gardening workshops.
  sports: Kimberly Capleton, they enjoy gentle morning walks in the local park with the Sunrise Walking Club, follow the Iowa Hawkeyes football team and the Chicago Cubs, and participate in a senior-friendly
    mixed-age softball league every spring.
  arts: Kimberly Capleton, they find solace in folk melodies by Joan Baez and Bob Dylan, delight in reading historical novels by Ken Follett and biographies of Eleanor Roosevelt, and express creativity
    through knitting intricate scarves inspired by traditional folk-art patterns.
  travel: Kimberly Capleton, they prefer short, relaxed road trips to historic towns like Savannah, Georgia and Charleston, South Carolina, and dream of a slow-paced river cruise through the Scottish Highlands,
    planning each journey around their volunteer commitments and modest budget.
  culinary: Kimberly Capleton, they are an adept home-cook who often prepares their family's classic chicken pot pie using home-grown carrots and rosemary, delights in baking berry crumble with fresh raspberries
    from the garden, and enjoys sharing meals at community potlucks.
  core: Kimberly Capleton, they blend a nurturing spirit with a love for nature, weaving together garden harvests, knitting needles, and folk tunes while navigating occasional anxiety and a habit of misplacing
    their glasses.
background:
  cultural: Kimberly was raised in a middle‑class New England family in the greater Boston area. Her upbringing combined traditional Yankee values of modesty, self‑reliance, and community responsibility
    with a family heritage that includes Irish‑American traditions, such as celebrating St. Patrick’s Day and attending a local Catholic parish. The cultural emphasis on education, volunteerism, and local
    history informs her daily life and her commitment to helping others in the Needham‑Heights community.
