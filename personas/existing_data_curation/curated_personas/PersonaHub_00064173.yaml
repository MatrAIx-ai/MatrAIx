persona_description: A researcher at the National Institute for Mathematical and Biological Synthesis (NIMBioS), who specializes in the field of epigenetics and is a leading figure in the study of how environmental
  factors can influence gene expression and, in turn, contribute to the development of sexual orientation. He is known for his groundbreaking research on the role of epigenetic marks in regulating gene
  expression and their potential to influence sexual behavior. His work has been controversial, with both conservative and gay and lesbian communities expressing differing opinions on the nature of sexual
  orientation and the need for scientific investigation.
