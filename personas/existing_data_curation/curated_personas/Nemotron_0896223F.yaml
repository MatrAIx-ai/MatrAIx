  career_goals: Sherry aims to pursue a certification that combines her practical mindset with her desire to help others in a low‑stress environment. She plans to enroll in a community‑college program to
    become a Certified Nursing Assistant (CNA) or a Veterinary Assistant, allowing her to work in small, supportive teams and maintain a predictable schedule that accommodates her anxiety management needs.
    Over the next few years she hopes to complete the required coursework, secure an internship at a local clinic or animal shelter, and attain a part‑time position that offers steady income while she continues
    to develop her creative hobbies. Ultimately, she wants a stable career path that provides personal fulfillment, opportunities for continued learning, and a balanced work‑life rhythm.
