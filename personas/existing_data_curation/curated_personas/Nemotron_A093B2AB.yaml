personas:
  professional: Lizzette Leroy is a veteran data analyst and community program leader who leverages advanced Python and R statistical modeling to design interdisciplinary STEM‑arts mentorship workshops,
    translating complex concepts into bilingual formats while maintaining meticulous project timelines and a competitive drive to surpass peer initiatives.
  sports: Lizzette Leroy gravitates toward low‑impact fitness, dancing salsa three nights a week for cardio, competing in a senior tennis league at her local country club, and passionately follows the Miami
    Heat and Miami Marlins, balancing a competitive spirit with social camaraderie.
  arts: Lizzette Leroy immerses herself in the cultural scene by curating exhibitions at the Cuban Art Museum, attending Latin jazz concerts featuring Arturo O’Farrill, and debating contemporary installations
    at gallery openings, often leading spirited discussions that showcase her talkative, critical eye.
  travel: Lizzette Leroy prefers thoughtfully planned trips that blend leisure and learning, having recently explored the historic streets of Cartagena, Colombia and the art museums of Florence, Italy,
    while budgeting for future journeys to Havana and the Azores where they hope to document culinary traditions in their travel journal.
  culinary: Lizzette Leroy delights in preparing traditional Cuban dishes such as ropa vieja, yuca con mojo, and pastelitos, meticulously balancing flavors with cumin, garlic, and bitter orange juice, while
    sometimes over‑seasoning in a quest for authenticity that can surprise guests.
  core: Lizzette Leroy is a detail‑driven, sociable mentor who fuses engineering precision with cultural vibrancy, constantly juggling curiosity‑driven projects, stress‑induced worries, and a penchant for
    salsa‑filled evenings.
background:
  cultural: Lizzette was born to Cuban immigrant parents and grew up in a bilingual household in Miami’s Little Havana. Her upbringing immersed her in the rhythms of Cuban music, the flavors of home‑cooked
    dishes, and the communal celebrations of Carnaval and Día de los Muertos. This rich heritage shaped her identity as a Cuban‑American, instilling a deep respect for family ties, collective memory, and
    the diaspora’s resilience. She maintains strong connections to the local Cuban community, participates in cultural festivals, and often incorporates Cuban artistic motifs and Spanish language elements
    into her professional and personal projects.
