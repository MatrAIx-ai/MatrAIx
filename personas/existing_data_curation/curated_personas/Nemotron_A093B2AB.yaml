  hobbies: '[''Salsa dancing'', ''Latin jazz concerts'', ''Visiting art galleries'', ''Volunteering as museum docent'', ''Online courses on AI and renewable energy'', ''Chess club'', ''Gardening'', ''Cooking
    Cuban cuisine'', ''Yoga and mindfulness meditation'', ''Travel journaling'']'
  career_goals: Her primary ambition is to leverage her STEM background to empower the next generation of Cuban‑American youth in Miami through mentorship programs and community workshops that blend science,
    technology, and the arts. She aims to organize an annual interdisciplinary exhibition that showcases student projects alongside local Cuban art, seeking grant funding to sustain it. Lizzette also hopes
    to author a memoir that reflects on her career in engineering and her cultural journey, while continuing to refine her own knowledge of emerging technologies. Maintaining her health and emotional well‑being,
    she aspires to stay active in civic boards that influence education policy and cultural preservation.
