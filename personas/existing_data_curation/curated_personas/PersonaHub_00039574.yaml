  and analyzing population data for various age groups, races, and geographies. They are skilled in using demographic indicators and population projections to inform decision-making and policy development.
  The persona is also knowledgeable about the Missouri Census data and its use in population analysis, and has experience with bridged estimates and NCHS numbers. They are adept at managing and maintaining
  population files, and have a unique understanding of the data management processes within the department.
