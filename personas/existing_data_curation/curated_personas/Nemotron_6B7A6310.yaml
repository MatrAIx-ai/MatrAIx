personas:
  professional: Evelyn Hester transforms decades of frontline customer service into a mentorship powerhouse, using their knack for storytelling and creative problem-solving to design interactive training
    workshops, while quietly competing with peers for recognition and wrestling with occasional disorganization that they balance with a flexible, imaginative approach to corporate wellness.
  sports: Evelyn Hester enjoys low-impact fitness through sunrise yoga at the Lakefront Yoga Collective and leisurely walks along the Chicago Lakefront Trail, cheering the Chicago Bulls during winter and
    the Chicago Cubs in summer, while they avoid high-intensity gym routines due to a preference for flexibility over strict regimens.
  arts: Evelyn Hester spends afternoons at the Art Institute of Chicago studying abstract works by Wassily Kandinsky and Georgia O'Keeffe, then translates that inspiration into watercolor experiments that
    echo the improvisational spirit of Miles Davis and the lyrical storytelling of Maya Angelou's spoken-word performances, while they often share these pieces with fellow volunteers at the library.
  travel: Evelyn Hester favors unhurried, culturally immersive trips, often planning week-long stays in New Orleans to absorb its jazz heritage, wandering the canals of Venice for watercolor sketching,
    and dreaming of a future visit to Kyoto's zen gardens where they can practice meditation while sampling local tofu dishes.
  culinary: Evelyn Hester delights in preparing herb-infused quinoa salads with garden-fresh basil and mint, experiments with searing salmon topped with a miso-ginger glaze, and treats themselves to a classic
    Chicago deep-dish pizza topped with smoked mozzarella, though they sometimes over-salt dishes when stressed.
  core: Evelyn Hester blends a restless imagination with a penchant for spontaneous creativity, juggling garden-to-canvas projects, mentorship ambitions, and a slight aversion to rigid schedules, all while
    quietly fretting over missed deadlines.
background:
  cultural: Evelyn was born and raised on Chicago’s Northwest Side in a family of Irish‑Polish descent. Growing up in a close‑knit, blue‑collar neighborhood, she absorbed the Midwestern values of hard work,
    modesty, and a deep appreciation for the city’s rich music scene—particularly blues and jazz. Her upbringing immersed her in Chicago’s cultural institutions, from the Art Institute to community theaters
    and neighborhood festivals, shaping a lifelong love for the city’s artistic and multicultural fabric. While she identifies as a white American, she respects the diverse influences of Chicago’s immigrant
    communities and carries the practical yet curious spirit typical of the region.
