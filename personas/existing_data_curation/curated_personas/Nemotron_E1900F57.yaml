  career_goals: Mahir dreams of a future where he can help others in a structured, hands‑on role. He is fascinated by the idea of becoming a firefighter or a community volunteer who keeps his town safe,
    and he also imagines working with animals on a farm or as a wildlife caretaker. These ambitions reflect his practical outlook, love for teamwork, and desire to make a positive difference in his community.
