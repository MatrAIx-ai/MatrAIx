personas:
  professional: Mahir Frankel, a budding junior team captain and class liaison, leverages their practical focus and love for structure to organize after‑school soccer drills while staying relaxed enough
    to let teammates improvise, making them a natural peacemaker in group projects.
  sports: Mahir Frankel, a member of the Montello Youth Soccer Club and the local middle‑school basketball team, roots for the Milwaukee Bucks in the NBA and follows the USL soccer side Chicago Fire, and
    spends weekends sprinting through the woods for cross‑country drills, embodying a flexible yet structured approach to fitness.
  arts: Mahir Frankel, an enthusiastic chorister and budding saxophonist in the school band, idolizes musicians like John Legend and Imagine Dragons, regularly practices karaoke to Taylor Swift hits, and
    attends community theater productions of classic fairy‑tale plays, finding creative release after a day of structured schoolwork.
  travel: Mahir Frankel, an adventurous 10‑year‑old who prefers spontaneous day trips over detailed itineraries, loves exploring the nearby Lake Wisconsin shoreline and the shaded trails of Kettle Moraine
    State Forest, dreams of visiting Disney World in Florida and the historic castles of Europe, and often convinces parents to join family camping outings that blend their love for nature with occasional
    structured activities.
  culinary: Mahir Frankel, a self‑declared pizza aficionado, relishes pepperoni pizza with extra mozzarella, homemade spaghetti carbonara tossed with pancetta and parmesan, while experimenting with building
    Lego‑inspired edible treats like pretzel sticks shaped into tiny bricks, though they sometimes skip vegetables in favor of sweet candy bars.
  core: Mahir Frankel blends boundless energy with a love for predictable routines, thriving in group play while occasionally forgetting to pack their inhaler or finish homework, making them the charismatic,
    slightly disorganized heart of any team.
background:
  cultural: Mahir grows up in a predominantly white, Midwestern community in Montello, Wisconsin, where family gatherings, school activities, and local traditions such as the cheese festival and county
    fair play central roles. The town’s culture emphasizes community support, modesty, and practicality, and many families in the area have German and Scandinavian roots that influence holiday customs and
    values. These cultural elements shape Mahir’s cooperative nature, his love for communal sports, and his appreciation for hands‑on, real‑world experiences.
