  career_goals: Daniel aims to earn his GED within the next year and enroll in a community college program for Business Administration. He dreams of moving from a shift manager role to a general manager
    position at a larger retail or hospitality venue, eventually leveraging his hands‑on experience to open a small boutique coffee shop or a mobile car‑detailing service in Monmouth County. He also hopes
    to acquire certifications in retail management and basic accounting to round out his skill set.
