  career_goals: Although retired, Gladys aims to preserve her independence and mental acuity by mastering digital communication tools, ensuring she can stay connected with her extended family. She hopes
    to compile a digital archive of her family's oral histories and recipes, providing a cultural legacy for future generations. Additionally, she aspires to mentor younger women in her community—offering
    workshops on budget‑friendly cooking, gardening, and quilting—while modestly supporting a scholarship fund for local high‑school students pursuing vocational training. Maintaining her health through
    gentle exercise and regular medical check‑ups remains a core personal ambition.
