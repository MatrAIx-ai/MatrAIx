  hobbies: '["Volunteering at local animal shelters", "Playing guitar", "Improv comedy workshops", "Hiking and biking in Shenandoah National Park", "Cooking and experimenting with recipes", "Pet photography",
    "Attending community trivia nights and festivals", "Gardening"]'
  career_goals: Cameron aims to become a senior veterinary technician and obtain the Certified Veterinary Technician (CVT) credential within the next two years. He is interested in specializing in emergency
    and critical care, with a long‑term goal of leading the emergency department at his clinic. He also hopes to develop community outreach programs focused on pet health education, leveraging his sociable
    nature to host workshops and school talks. Over the next five years, he plans to complete a bachelor’s degree in animal science to expand his career options, potentially moving into practice management
    or starting a mobile veterinary service that offers flexible, on‑site care for families in Prince William County.
