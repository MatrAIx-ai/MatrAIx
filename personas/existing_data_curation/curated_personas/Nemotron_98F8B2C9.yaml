    outreach and liaison'']'
  hobbies: '[''Reading mystery novels'', ''Journaling'', ''Gardening (herbs and vegetables)'', ''Cooking traditional Mexican cuisine'', ''Sharing meals at small community potlucks'', ''Photography of desert
    landscapes'', ''Listening to Mexican folk and corrido music'', ''Crocheting'', ''Nature walks and hiking'']'
  career_goals: Keyla aims to complete her teaching credential and earn a bachelor’s degree in education within the next three years, strengthening her formal qualifications. She aspires to develop a multicultural
    curriculum framework that integrates Mexican heritage and local New Mexico culture into her subjects. Long‑term, she hopes to become a department head or curriculum coordinator, leading school‑wide
    initiatives that promote inclusive practices and flexible learning environments. Additionally, she wishes to mentor a cohort of new teachers, sharing her collaborative and harmony‑focused approach while
    also contributing articles on culturally responsive teaching to educational journals.
