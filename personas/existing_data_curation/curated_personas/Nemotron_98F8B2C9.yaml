personas:
  professional: Keyla Li is a bilingual secondary school teacher who blends curiosity with practicality, designing flexible project‑based lessons anchored to standards while maintaining a relaxed, harmony‑focused
    classroom that encourages student autonomy and cooperative conflict resolution.
  sports: Keyla Li enjoys weekly nature walks and monthly hikes with the Mesquite Trail Crew, follows the New Mexico United soccer team in the spring, cheerfully participates in community 5K runs during
    the summer, and occasional hits the slopes at Taos Ski Valley for winter snowboarding outings.
  arts: Keyla Li captures desert vistas with a vintage Nikon camera, listens to corrido legends like Antonio Aguilar and contemporary folk singer Lila Downs while cooking, reads mystery novels by Agatha
    Christie and Gillian Flynn, and spends quiet evenings crocheting while humming classic boleros such as Bésame Mucho.
  travel: Keyla Li prefers low‑key road trips with her camera, has explored Oaxaca’s bustling markets and Santa Fe’s art galleries, dreams of hiking Patagonia’s Torres del Paine, and plans her next getaway
    to the Grand Canyon, always allowing flexibility for unplanned stops.
  culinary: Keyla Li is a skilled home cook who lovingly prepares tamales, pozole, and salsa verde using garden‑fresh cilantro, epazote, and roasted chiles, experiments with homemade corn tortillas, and
    delights friends at potlucks with her signature mole sauce infused with chocolate and dried chilies.
  core: Keyla Li is a curious yet relaxed educator who nurtures community through tradition, gardens, and quiet creativity, balancing modest financial habits with occasional indulgences, and cherishes small‑group
    connections over bustling crowds.
background:
  cultural: Keyla is the daughter of Mexican immigrants and grew up in a bilingual household where Spanish and English were spoken interchangeably. Living in Mesquite, New Mexico, she experiences a cultural
    blend of Mexican traditions and Southwestern American influences. Family gatherings centered around celebrations such as Día de los Muertos, Semana Santa, and Mexican holidays reinforce a strong sense
    of heritage. She maintains culinary traditions, often preparing dishes passed down from her parents, and participates in local Hispanic community events, including cultural festivals and church celebrations.
    This multicultural background informs her teaching philosophy, prompting her to integrate Mexican history, literature, and values of family and community into her classroom to foster cultural pride
    and inclusivity.
attributes:
  skills: '[''Bilingual instruction (English/Spanish)'', ''Curriculum adaptation for diverse learners'', ''Flexible lesson planning with project‑based learning'', ''Classroom management with relaxed structure'',
