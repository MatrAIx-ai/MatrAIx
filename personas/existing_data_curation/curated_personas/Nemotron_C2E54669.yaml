personas:
  professional: Julie Michaels is an emerging junior event coordinator who designs school clubs and birthday parties with precise checklists, and they leverage their organized and talkative personality
    to delegate tasks and keep the crowd engaged.
  sports: Julie Michaels is a dedicated soccer enthusiast who plays forward on the Rockaway Youth Soccer Club during the spring and summer, follows New York City FC and New York Knicks for inspiration,
    and they incorporate daily drills and weekend runs to stay fit while balancing schoolwork.
  arts: Julie Michaels is a budding storyteller who acts in the school drama club, draws comic strips inspired by Marvel legend Stan Lee and Bill Watterson’s Calvin and Hobbes, and creates short TikTok
    videos that echo the cinematic flair of Tim Burton and the moody pop-song vibes of Billie Eilish, blending performance, illustration, and digital media.
  travel: Julie Michaels loves crafting detailed, color-coded itineraries for family trips, prefers weekend getaways to nearby Coney Island or the historic streets of Boston for a mix of adventure and learning,
    and dreams of visiting Paris to see the Louvre and Tokyo to explore anime districts, all while staying within parents’ budget and school schedule.
  culinary: Julie Michaels enjoys a playful palate that mixes classic pepperoni pizza, homemade avocado toast with lime-juice drizzle, and occasional sushi rolls with cucumber and crab, and they often attempt
    to bake comic-themed cupcakes using vanilla frosting and rainbow sprinkles, showing their moderate cooking skills and love for bright flavors.
  core: Julie Michaels balances a meticulously organized mind with a craving for the spotlight, turning every school event into a staged production, yet they constantly battle worrying thoughts and the
    occasional binge-watch of mystery novels before bedtime.
background:
  cultural: Julie was raised in a white, middle‑class family in Rockaway Park, Queens, where she experiences a blend of mainstream American traditions—such as celebrating Thanksgiving, Christmas, and Easter—and
    the diverse cultural rhythms of her neighborhood. Her family’s roots trace back to the Northeastern United States, and she participates in community events at the local community center and church,
    gaining exposure to a wide range of cultural perspectives while maintaining a strong sense of her own familial customs.
