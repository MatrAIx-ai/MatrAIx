  career_goals: Julie aspires to become a teacher or youth program coordinator, roles where she can combine her love for structure with her talent for connecting with peers. She dreams of leading community
    workshops that teach organization and study skills, and she is also intrigued by the idea of counseling other students to help them manage stress and anxiety, drawing from her own experiences of worry.
