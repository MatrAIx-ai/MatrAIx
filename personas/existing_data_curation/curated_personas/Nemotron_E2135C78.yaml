personas:
  professional: Brenda Harbin, a seasoned tax preparer on the cusp of CPA certification, blends her solid STEM background, mastery of Lacerte, ProSeries, and QuickBooks, and sharp Excel modeling with their
    sociable, energetic demeanor that makes them a natural workshop leader and compassionate client counselor, though they prefer flexibility over strict planning and sometimes scramble at the last minute.
  sports: Brenda Harbin begins her day with brisk walks along the Gulf Coast beaches, participates in a senior dance class at the community center, attends weekly gentle yoga, and cheers for the Tampa Bay
    Buccaneers while staying active in the Sunset Beach Running Club, embodying a balanced, socially oriented fitness routine.
  arts: Brenda Harbin sings in the church choir, plays the ukulele for fun, reads Agatha Christie mysteries with her book club, and delights in the music of Jimmy Buffett and the paintings of Winslow Homer,
    weaving artistic appreciation into their social and coastal lifestyle.
  travel: Brenda Harbin prefers low‑key, well‑planned coastal getaways, having visited Amelia Island and Key West, while dreaming of a fall foliage tour of New England and a week‑long eco‑adventure in Costa
    Rica, yet their budget constraints and family commitments keep most vacations within a few hours’ drive of Pinellas Park.
  culinary: Brenda Harbin enjoys cooking fresh Gulf‑coast seafood such as grilled grouper with citrus‑herb butter and shrimp scampi with garlic and parsley, pairs dishes with locally sourced lemons and
    fresh basil, and occasionally treats the family to key lime pie, reflecting a moderate to advanced cooking skill blended with a love for simple, vibrant flavors.
  core: Brenda Harbin is a community‑oriented, worry‑prone CPA‑in‑training who balances relentless volunteering and spreadsheet perfection with a tendency to procrastinate on paperwork and forget self‑care
    appointments.
background:
  cultural: Brenda was raised in suburban Central Florida within a middle‑class white family with deep roots in the American Southeast. Her upbringing emphasized hard work, a strong education in the sciences,
    and active community participation. Regular church attendance, neighborhood block parties, and seasonal celebrations such as Thanksgiving and Fourth of July gatherings shaped her values. Living in Pinellas
    County, she embraces the region’s relaxed beach culture while respecting the civic duty to help neighbors, evident in her volunteer tax assistance work. Although her cultural identity leans toward traditional
    family values, she appreciates the multicultural diversity of coastal Florida and enjoys integrating the laid‑back coastal lifestyle with a pragmatic, service‑oriented outlook.
