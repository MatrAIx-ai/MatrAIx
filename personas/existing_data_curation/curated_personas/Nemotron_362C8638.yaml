  hobbies: '[''Gardening'', ''Southern cooking'', ''Church choir singing'', ''Reading African-American history'', ''Quilting'', ''Walking on nature trails'', ''Listening to gospel and jazz'', ''Card games'']'
  career_goals: Although retired, Sonia aims to deepen her community involvement by volunteering as a mentor for younger seniors and as a cultural historian for the local historical society. She wishes
    to organize intergenerational workshops that teach traditional cooking, gardening, and storytelling. Sonia also plans to complete a memoir of her family's journey through the civil‑rights era, record
    oral histories for her grandchildren, and maintain her health through regular walking groups and church choir participation. Her overarching ambition is to ensure that the values of kindness, cooperation,
    and cultural heritage are passed on to future generations.
