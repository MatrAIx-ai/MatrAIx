personas:
  professional: Sonia Shipman, a retired community organizer and seasoned seamstress, applies her practical love of structure and gentle flexibility to coordinate church potlucks, senior center workshops,
    and informal family budgeting sessions, all while sharing stories that weave together heritage and kindness.
  sports: Sonia Shipman enjoys strolling the nearby nature trail with the Greenville Senior Walking Club, faithfully watches Alabama Crimson Tide football on Saturdays, roots for the Atlanta Falcons during
    the NFL season, and incorporates gentle stretching after each walk, while steering clear of competitive team sports.
  arts: Sonia Shipman revels in the soulful hymns of Mahalia Jackson, the lively swing of Louis Armstrong, reads historical fiction by Toni Morrison, and translates stories into vibrant quilt patterns inspired
    by Southern folk traditions, weaving music, literature, and craft into her daily life.
  travel: Sonia Shipman prefers modest, well‑planned journeys, joining senior group tours to historic Southern towns like Charleston and Savannah, while dreaming of a pilgrimage to New Orleans for its music
    heritage and a scholarly trip to Washington, D.C. to explore civil‑rights landmarks, all within a carefully budgeted itinerary.
  culinary: Sonia Shipman, an accomplished home cook, reimagines classic Southern dishes by adding smoked paprika to shrimp and grits, caramelizing collard greens with apple cider vinegar, and perfecting
    sweet potato pie with a hint of ginger, while harvesting fresh herbs from her garden to flavor each meal she shares at church potlucks.
  core: At 74, Sonia Shipman blends a love for structured routine with gentle flexibility, nurturing community through garden‑fresh meals, quilting storytelling, and mentorship, while occasionally forgetting
    a bill but never a family memory.
background:
  cultural: Sonia was raised in a close‑knit African‑American community in the South, her family’s roots extending back to the Great Migration and the civil‑rights movement. Her upbringing was centered
    around church, family gatherings, and the transmission of culinary, musical, and storytelling traditions. These cultural influences nurture her deep sense of community, resilience, and a reverence for
    heritage, which she expresses through her cooking, quilting, church involvement, and dedication to preserving family histories.
attributes:
  skills: '[''Southern cooking'', ''Herb and vegetable gardening'', ''Quilting and sewing'', ''Household budgeting'', ''Event coordination'', ''Basic computer skills'', ''Storytelling and oral history preservation'',
