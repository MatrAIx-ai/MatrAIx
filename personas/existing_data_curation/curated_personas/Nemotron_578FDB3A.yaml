personas:
  professional: Deborah Rogers, a 10‑year‑old aspiring coder and stage performer, blends her love of structure into meticulous Scratch project outlines while thriving on the camaraderie of her school drama
    club, where they balance competition with collaboration.
  sports: Deborah Rogers, a midfield enthusiast on the Bellwood Soccer Club, channels their competitive drive into after‑school drills while cheering for the Chicago Fire and the Chicago Cubs, yet sometimes
    skips practice when worries about school grades linger.
  arts: Deborah Rogers, an avid sketcher of cats and comic heroes, devotes free time to the school drama club where they reenact scenes from Disney’s ‘The Lion King’ and admire performers such as Lin‑Manuel
    Miranda, while getting lost in adventure novels by Rick Riordan.
  travel: Deborah Rogers, who has explored the Field Museum in Chicago and taken a family road‑trip to Washington, D.C., prefers short, parent‑planned outings to nearby zoos and splash pads but daydreams
    about a future vacation to Disneyland, balancing a modest allowance with the excitement of imagined thrills.
  culinary: Deborah Rogers, a budding home‑chef, favors classic pepperoni pizza and cheesy mac‑and‑cheese but also experiments with making simple chocolate‑chip cookies and grilled cheese sandwiches, delighting
    in mozzarella, cheddar, and a dash of cinnamon for extra flavor.
  core: Deborah Rogers, a competitive yet socially‑savvy 10‑year‑old, juggles soccer, drama, and coding while wrestling with worries and a love for structured fun.
background:
  cultural: 'Deborah grew up in a predominantly white, middle‑class family in Bellwood, Illinois, a suburb of Chicago. Her upbringing reflects typical Midwestern values: an emphasis on community involvement,
    school participation, and family traditions such as Thanksgiving gatherings, Fourth of July fireworks, and occasional church activities. Bellwood’s diverse surrounding area exposes her to a variety
    of cultural events and neighborhoods, fostering a modest but open outlook toward the broader Chicago community while maintaining close ties to local customs and neighborhood sports leagues.'
