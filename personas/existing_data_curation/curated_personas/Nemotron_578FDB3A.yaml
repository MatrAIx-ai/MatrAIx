  career_goals: Deborah dreams of one day working with animals as a veterinarian, drawn by the hands‑on care and clear routines of animal health. She also envisions herself as a soccer team captain or coach,
    where her love for structure, teamwork, and competition can combine. In the meantime, she aspires to excel in school, hoping to earn a place in a high‑school science program that could set the foundation
    for a future in veterinary science while continuing to develop her leadership on the field.
