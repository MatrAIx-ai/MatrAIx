persona_description: A historian who specializes in the Salem Witch Trials and the Puritan way of life in 17th century Massachusetts. She is deeply interested in the social, religious, and legal contexts
  of the period, and enjoys studying the impact of the witch craze on the legal system and the way evidence was treated. She is also fascinated by the personalities and motivations of the accused and the
  victims of the witch trials, and enjoys discussing the causes and consequences of the witch craze.
