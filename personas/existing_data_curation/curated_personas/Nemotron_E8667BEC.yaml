personas:
  professional: Javier Rojas, a veteran engineering manager with 25 years of experience, channels their methodical, data‑driven mindset and Lean Six Sigma expertise into building enterprise‑wide operational
    strategies, championing digital transformation projects, and designing rigorous employee‑wellness programs while they continuously scrutinize stakeholder intentions to ensure measurable outcomes.
  sports: Javier Rojas, an avid outdoorsman, spends their weekends hiking the Blue Ridge Parkway, fishing at Lake Norman, and playing 18‑hole rounds at the local Country Club while cheering for the Charlotte
    Hornets and Carolina Panthers, and they occasionally join a regional senior amateur golf league.
  arts: Javier Rojas, a craftsman at heart, channels their artistic side through precise woodworking, devours biographies of engineers like Nikola Tesla, and they unwind by listening to John Coltrane while
    attending the Greensboro Symphony's concerts.
  travel: Javier Rojas, an organized traveler, meticulously plans trips using a detailed itinerary, favoring cultural immersion in historic towns like Seville and Florence, weekend getaways to Asheville's
    Blue Ridge Mountains, and occasional family cruises to the Caribbean, while they balance adventure with the need for restful downtime.
  culinary: Javier Rojas, a passionate home chef, perfects traditional dishes such as mofongo with garlic‑laden sofrito and arroz con gandules, expertly seasons freshly caught lake fish with cilantro and
    lime, and they relish experimenting with tropical fruits like guava in inventive dessert sauces.
  core: Javier Rojas, a disciplined yet creatively restless engineer, balances a penchant for precise woodworking and strategic chess with a constant undercurrent of worry that drives them to meticulous
    planning across work, finances, and family life, and they regularly double‑check every decision for hidden risk.
background:
  cultural: Born to Puerto Rican parents, Javier was raised bilingual, speaking Spanish at home and English in school. His upbringing emphasized family cohesion, respect for elders, and a deep appreciation
    for Caribbean music, dance, and cuisine. He celebrates traditional holidays such as Nochebuena and the Three Kings Day, often preparing festive meals and participating in community parades. As a member
    of the Puerto Rican diaspora in North Carolina, he maintains strong ties to cultural organizations, helping preserve heritage while integrating Southern hospitality. His Catholic faith and community
    service reflect the blend of Puerto Rican and Appalachian values that shape his identity.
