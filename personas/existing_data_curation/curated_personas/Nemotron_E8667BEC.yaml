  career_goals: Javier aims to transition into a senior director role where he can shape enterprise‑wide operational strategy and champion digital transformation initiatives. He seeks to implement comprehensive
    employee wellness programs to mitigate stress and improve morale, mentor emerging talent within the organization, and eventually leverage his experience to launch a consultancy focused on process improvement
    for small manufacturers in the North Carolina region. Additionally, he aspires to contribute to workforce development partnerships with local community colleges to expand STEM opportunities for underrepresented
    groups.
