  career_goals: Jesus aims to deepen his professional knowledge by earning an associate degree in Business Administration or a supply chain management certification through a local community college. He
    aspires to become an operations manager overseeing multiple retail locations within the San Diego region, focusing on lean management and efficiency improvements. To support his long‑term vision, he
    plans to obtain a Six Sigma Green Belt and develop expertise in data‑driven decision making. Additionally, he dreams of opening a quiet community café that combines his love for Mexican art and cuisine,
    offering a serene space for solitary visitors and hosting exhibitions for local Mexican‑American artists. He also hopes to mentor new immigrant workers and contribute to community outreach programs
    that promote mental‑health awareness.
