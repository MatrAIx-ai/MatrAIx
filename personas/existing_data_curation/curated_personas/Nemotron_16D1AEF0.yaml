  hobbies: '[''Jogging'', ''Hiking'', ''Chess'', ''Strategy video games'', ''Reading non-fiction (psychology, organizational behavior)'', ''Woodworking'', ''Exploring coffee shops'', ''Live-music shows'',
    ''STEM mentorship volunteering'']'
  career_goals: Gary aims to progress from his current HR manager role to HR Director within the next three to five years, eventually targeting a VP of People position at a midsize technology firm. He plans
    to earn the SHRM-SCP certification and pursue an MBA to strengthen his strategic business acumen. His ambition is to build a fully data-driven HR function that uses AI-enhanced talent analytics to improve
    employee experience, retention, and diversity outcomes. He also hopes to mentor emerging HR professionals and champion inclusive workplace cultures.
