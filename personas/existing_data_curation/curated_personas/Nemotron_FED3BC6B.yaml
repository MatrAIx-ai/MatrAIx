  skills: '[''Commercial Driving (CDL)'', ''Route Planning and Navigation'', ''Basic Vehicle Maintenance'', ''Load Securement'', ''Safety Compliance'', ''Customer Service'', ''Conflict Resolution'', ''Mechanical
