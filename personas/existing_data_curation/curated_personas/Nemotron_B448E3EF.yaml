  career_goals: She dreams of one day becoming a concept artist or game designer who can blend storytelling with visual imagination, and she imagines exploring scientific research that investigates abstract
    ideas like space or robotics. Nancy aspires to use her creativity to inspire others, perhaps as an inventor, multimedia artist, or future science communicator.
