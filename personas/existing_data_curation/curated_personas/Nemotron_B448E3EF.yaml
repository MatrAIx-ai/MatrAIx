personas:
  professional: A budding junior storyteller and coder, Nancy Lopez channels her vivid fantasy imagination into drawing and writing short epics while using block‑based programming on her tablet to create
    simple interactive games, and her organized‑yet‑flexible mindset keeps her project notebooks meticulously structured, allowing her to collaborate smoothly in her school’s art club.
  sports: Nancy Lopez enjoys weekday after‑school jogs through the Loganton woods, plays midfield for the Loganton Youth Soccer Club in the fall, joins the middle‑school basketball team during winter, and
    roots for the Philadelphia Eagles, Pittsburgh Steelers, and Philadelphia 76ers, viewing their teamwork as a model for her own disciplined yet playful fitness routine.
  arts: Nancy Lopez immerses herself in the worlds of J.K. Rowling and Rick Riordan, studies the animation style of Studio Ghibli, practices piano pieces by Ludovico Einaudi and sings along to Taylor Swift,
    and draws inspiration from YouTube creator Luna for her fantasy sketches, letting these influences fuel both her storytelling and her calm, collaborative demeanor.
  travel: Nancy Lopez loves planning weekend escapades that blend adventure and family bonding, having hiked sections of the Appalachian Trail near Loganton, toured the Smithsonian museums in Washington DC,
    and is dreaming of a future trip to Tokyo’s anime districts to absorb the neon‑lit inspirations for her own stories.
  culinary: Nancy Lopez enjoys assembling DIY pizza slices topped with pepperoni, mozzarella, and pineapple, crafts macaroni‑and‑cheese with a splash of almond milk for a creamy twist, and occasionally
    attempts simple sushi rolls using cucumber and smoked salmon, though they often forget to clean up the kitchen afterward.
  core: Nancy Lopez is a relentlessly curious 12‑year‑old who balances epic fantasy world‑building with a secret stash of half‑eaten snacks hidden under their LEGO creations, occasionally losing track of
    time in the woods.
background:
  cultural: Nancy comes from a mixed‑heritage family; her surname Lopez reflects her Hispanic roots, and she was raised with both American and Latino cultural traditions. At home she sometimes hears Spanish
    phrases, celebrates holidays like Día de los Muertos, and enjoys family recipes such as tamales, while also participating in the local traditions of rural Pennsylvania, such as community fairs and school
    events. This blend of cultures gives her a broad appreciation for diverse artistic expressions.
