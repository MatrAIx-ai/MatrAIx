personas:
  professional: Jean Kelley, a meticulous accountant with over three decades of experience, blends their GAAP expertise, advanced Excel, Power Query, and Tableau mastery with a competitive, data‑driven
    audit mindset to pursue CPA certification, a senior forensic auditing role, and eventually a consulting practice that mentors junior female accountants while safeguarding their mental wellbeing.
  sports: Jean Kelley enjoys brisk morning walks along Tampa Bay, follows the Tampa Bay Buccaneers and Tampa Bay Lightning with avid loyalty, participates in a local walking club that meets twice weekly,
    and incorporates yoga sessions into their fitness routine, preferring low‑impact exercise over competitive sports.
  arts: Jean Kelley immerses themselves in literary mysteries and historical novels by authors such as Agatha Christie and Hilary Mantel, contributes thoughtful insights at a local book club, attends community
    history lectures, and finds creative solace listening to Yo‑Yo Ma’s cello suites and classic films starring Meryl Streep.
  travel: Jean Kelley favors travel that blends historical immersion with gentle pacing, having explored Savannah, Georgia and Charleston, South Carolina for their Southern charm, and dreaming of a scholarly
    trip to Edinburgh, Scotland, while planning future weekend getaways to the nearby historic St. Augustine, Florida, balancing budget considerations with a desire for mental rejuvenation.
  culinary: Jean Kelley experiments with Southern comfort staples such as shrimp and grits, fried chicken, and collard greens, giving each a modern twist by adding quinoa, smoked paprika, and kale, and
    delights in crafting sweet potato casserole topped with toasted pecans, showcasing an intermediate cooking skill set that blends tradition with contemporary flavors.
  core: Jean Kelley is a detail‑oriented, competitive accountant who balances a love for gardening and mystery novels with daily anxiety‑fighting yoga, yet often succumbs to over‑analysis and occasional
    procrastination when faced with high‑pressure deadlines.
background:
  cultural: Jean grew up in the southeastern United States and identifies with mainstream White American culture that values self‑reliance, a strong work ethic, and practicality. Living in Tampa, she blends
    Southern hospitality with the city’s multicultural vibe, often encountering Spanish language influences and diverse community traditions. Her background includes a moderate Catholic upbringing, reflecting
    a respect for community service and family values. As a divorced professional, she emphasizes independence and personal resilience while staying connected to the local Floridian lifestyle of outdoor
    activities and community involvement.
attributes:
