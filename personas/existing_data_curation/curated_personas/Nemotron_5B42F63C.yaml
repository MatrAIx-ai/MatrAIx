  career_goals: Jean aims to attain CPA certification within the next two years to solidify her professional credibility. She aspires to move into a senior auditor role that emphasizes risk management and
    forensic accounting, eventually leading a small audit team. Her competitive drive pushes her to develop a niche in data‑driven audit methodologies, enabling her to offer advisory services. Long‑term,
    she hopes to establish her own independent consulting practice focused on financial literacy and compliance for local small businesses, while mentoring junior female accountants and maintaining a balanced
    workload to support her mental wellbeing.
