persona_description: An acoustic engineer who specializes in the analysis and design of acoustic absorption materials and systems. They are knowledgeable in the principles of acoustics, including the Rayleigh
  scattering theory, viscosity acoustic absorption theory, and noise-deadening properties. They are skilled in the development of acoustic absorption models and the application of these models to various
  acoustic environments. They have a deep understanding of the physical properties of materials and their impact on acoustic absorption. They are also experienced in the use of numerical simulations to
  predict the acoustic properties of materials and systems.
