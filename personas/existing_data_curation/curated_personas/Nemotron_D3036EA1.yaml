personas:
  professional: Tomas Cruz is a methodical secondary school teacher who designs bilingual lesson plans with Google Classroom and interactive whiteboards, using a structured classroom routine to keep both
    Spanish‑speaking and English‑speaking students engaged, while their natural sociability makes them a go‑to counselor and community outreach speaker, and they are already mapping a path toward a curriculum
    specialist role.
  sports: Tomas Cruz is an avid jogger who runs the historic district trails three times a week, a loyal fan of the Leones de Ponce baseball club, and a seasonal participant in a local salsa‑fusion dance
    fitness group called SalsaFit Ponce that doubles as low‑impact cardio, blending sport and cultural movement.
  arts: Tomas Cruz expresses creativity through salsa and bomba drumming at community circles, takes weekly Latin dance classes, and finds inspiration in the guitar work of Carlos Vives and the mystery
    narratives of Agatha Christie, which influence their storytelling in lesson plans.
  travel: Tomas Cruz prefers meticulously planned trips that balance cultural immersion with relaxation, having already explored Old San Juan's fortifications, the historic plazas of Cartagena, and dreaming
    of hiking the Blue Mountains in Jamaica once their master’s tuition fund is secured.
  culinary: Tomas Cruz enjoys cooking traditional island dishes like arroz con gandules, lechón al horno, and maduros, skillfully layering sofrito, adobo, and plantains, and often hosts potluck evenings
    where friends sample their seasoned pork shoulder and cilantro‑lime rice.
  core: Tomas Cruz blends a love of structured teaching with an exuberant social life, channeling worry into meticulous planning, rhythmic drumming, and nightly meditation, all while never missing a chance
    to share a home‑cooked feast.
background:
  cultural: Born and raised in Ponce, Tomas grew up in a close‑knit Puerto Rican family where bilingualism, Catholic traditions, and community festivals were central to daily life. The vibrant streets of
    Ponce, with their historic architecture, lively plazas, and annual Carnaval Ponceño, shaped his appreciation for cultural expression. He was immersed in plena, jíbara, and salsa music from a young age,
    and family gatherings often revolved around shared meals of arroz con habichuelas, tostones, and pasteles. This deep connection to his heritage fuels his commitment to culturally responsive teaching,
    ensuring that students see their own histories reflected in the curriculum while navigating the modern demands of education.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning'', ''Bilingual Instruction (Spanish/English)'', ''Educational Technology (Google Classroom, Interactive Whiteboards)'', ''Curriculum Development'',
    ''Formative Assessment Design'', ''Student Counseling'', ''Conflict Resolution'', ''Community Outreach'', ''Public Speaking'']'
  hobbies: '[''Playing salsa and bomba music'', ''Dancing'', ''Volunteering at community youth centers'', ''Cooking traditional Puerto Rican dishes'', ''Reading mystery novels'', ''Jogging along the scenic
    routes of Ponce'', ''Mindfulness meditation and journaling'', ''Watching baseball games'']'
  career_goals: Tomas aims to complete his Bachelor’s degree in Education within the next two years and then pursue a Master’s in Educational Leadership to qualify for administrative roles. He envisions
    becoming a curriculum specialist who integrates Puerto Rican cultural content into core subjects, and eventually a school principal who champions inclusive, structured learning environments. Additionally,
    he aspires to launch an after‑school mentorship program for at‑risk youth in Ponce, leveraging his compassionate drive and organizational skills to provide academic support and life‑skills coaching.
