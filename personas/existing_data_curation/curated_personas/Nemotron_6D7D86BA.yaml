  career_goals: At his age, Juan Cruz imagines future roles that let him help and protect others. He often says he wants to become a firefighter because he admires the bravery and community service, and
    he also dreams of being a teacher to help younger children learn to read. He aspires to improve his school grades, become more organized, and learn to manage his worries so he can confidently pursue
    these ambitions.
