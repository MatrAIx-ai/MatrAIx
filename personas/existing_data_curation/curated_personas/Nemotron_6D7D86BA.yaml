personas:
  professional: Juan Lopez, a 9‑year‑old aspiring junior engineer, channels their love for structure and teamwork into designing intricate LEGO constructions and Minecraft redstone contraptions, turning
    planned blueprints into playful experiments while their cooperative nature shines when sharing ideas with friends, though they sometimes drift into spontaneous tinkering and occasionally lose track
    of project deadlines.
  sports: Juan Lopez plays forward for the Little Eagles Soccer Club in the neighborhood park, idolizes Lionel Messi and tracks his highlight reels, while cheering for Metro City FC during televised matches
    and joining the fan club of the local baseball team the Harbor Hawks on weekends.
  arts: Juan Lopez grooves to salsa beats by Celia Cruz and reggaetón rhythms from Daddy Yankee during family dance parties, while devouring comic books like Spider‑Man and drawing their own superhero sketches
    that blend vibrant colors and bold storylines, reflecting a creative spark nurtured by their love for music and visual storytelling.
  travel: Juan Lopez enjoys weekend trips to the nearby sandy beach of Sunny Cove where they build sandcastles after soccer practice, and dreams of visiting the bustling streets of Barcelona to see the
    famous soccer stadium and explore colorful markets, while a family vacation to Disneyland remains a top priority on their bedroom wall map.
  culinary: Juan Lopez, an enthusiastic junior chef, assists in the kitchen preparing arroz con gandules and crisp tostones, scores points for expertly mashing plantains, and practices chopping vegetables
    with a child‑sized knife, showing an intermediate cooking skill while still relying on grandma’s recipes to guide flavor choices.
  core: Juan Lopez, a 9‑year‑old Lego‑building soccer enthusiast, balances structured play with spontaneous dancing, often worries about upcoming games, and has a notorious habit of misplacing their favorite
    soccer cleats.
background:
  cultural: Juan Cruz is a proud Puerto Rican-American raised in Old Bridge, New Jersey. He grows up in a bilingual household where Spanish is spoken daily, and he celebrates cultural traditions such as
    the Parranda Christmas season, Three Kings Day, and local Puerto Rican festivals. His family values close-knit relationships, community involvement, and religious customs rooted in Catholicism. He enjoys
    the flavors of his heritage through dishes like mofongo and pasteles while also embracing the suburban lifestyle of Middlesex County. This blend of island traditions and American suburban culture shapes
    his identity and daily experiences.
