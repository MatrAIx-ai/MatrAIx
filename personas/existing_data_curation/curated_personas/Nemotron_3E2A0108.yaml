  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Baking'', ''Bird Watching'', ''Walking'', ''Community Volunteering'', ''Astronomy Club'', ''Knitting'', ''Quilting'', ''Beach Outings'']'
  career_goals: Serafina aims to deepen her contribution to the Titusville community while preserving the stable routine she values. Over the next few years she hopes to chair the local community advisory
    board, expand the annual charity fair she organizes, and launch a modest consulting service that offers basic financial guidance to small family-run businesses in Brevard County. She also plans to mentor
    younger women through the local Women's Business Center, ensuring they acquire practical skills and confidence. Personal goals include maintaining her family's financial security, supporting her adult
    children and grandchildren, and enjoying occasional short trips to historic sites and space launch viewings without disrupting her daily rhythm.
