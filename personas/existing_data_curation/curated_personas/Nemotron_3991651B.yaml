  hobbies: '[''Gardening'', ''Southern cooking'', ''Vintage furniture restoration'', ''Reading historical fiction'', ''Crocheting'', ''Church choir volunteering'', ''Food pantry volunteer work'', ''Road
    trips'', ''Country music concerts'', ''Hiking'']'
  career_goals: Ligia’s primary ambition is to grow her solo practice into a boutique agency with a tight‑knit team of five agents within the next five years, focusing on the expanding market in Screven
    and neighboring counties. She aims to rank among the top‑10% of brokers in Georgia, earn a Luxury Home Marketing certification, and carve out a niche in affordable family housing. Additionally, she
    is committed to mentoring younger agents—particularly women—through structured training programs. As she approaches retirement, she plans to transition into a consultancy role that leverages her deep
    local market knowledge while allowing a more flexible schedule.
