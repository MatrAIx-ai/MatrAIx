personas:
  professional: Ligia Meier, a 50‑year‑old real‑estate broker in Screven County, combines two decades of market analysis expertise with a competitive streak and a preference for flexible organization, delivering
    persuasive listings through both classic yard signs and savvy social‑media campaigns while mentoring rising agents.
  sports: Ligia Meier enjoys weekend hikes along the Savannah River trail, roots for the Atlanta Braves and Georgia Bulldogs, occasionally joins a local bowling league, and lets their competitive edge drive
    step‑count challenges, though they sometimes skip workouts when a new listing demands extra hours.
  arts: Ligia Meier stands in the church choir each Sunday, sings classic gospel hymns, collects albums by Dolly Parton and Johnny Cash, finds solace in historical fiction by Bernard Cornwell, and fuels
    a love for vintage aesthetics by hunting flea markets for reclaimed wooden furniture.
  travel: Ligia Meier favors impromptu road trips to nearby towns like Savannah and Charleston, books modest B&Bs with just enough planning, yet dreams of a leisurely week exploring Asheville’s arts scene
    and the historic streets of New Orleans, balancing wanderlust with family and business responsibilities.
  culinary: Ligia Meier cultivates tomatoes, collard greens, and sweet potatoes in her garden, crafts Southern staples such as shrimp and grits, peach cobbler, and mustard‑glazed pork ribs, and experiments
    by adding smoked paprika and heirloom herbs to traditional recipes.
  core: Ligia Meier blends Southern hospitality with a fierce competitive drive, a love for hands‑on restoration, and a pragmatic yet flexible approach to life, sometimes trading meticulous planning for
    spontaneous garden and furniture projects.
background:
  cultural: Ligia is a white Southern American who grew up in Sylvania, Georgia, within a multi‑generational family with Anglo‑German roots. Family gatherings, church involvement, and a strong work ethic
    are central to her upbringing. The small‑town Southern culture—valuing hospitality, self‑reliance, and community ties—shaped her practical outlook and competitive spirit. While she embraces traditional
    Southern cuisine and music, she also appreciates the region’s evolving diversity and strives to honor her heritage through community service and mentorship.
attributes:
  skills: '[''Residential property valuation'', ''Negotiation and deal closure'', ''Market trend analysis'', ''Client relationship management'', ''Digital marketing and social media advertising'', ''Open
