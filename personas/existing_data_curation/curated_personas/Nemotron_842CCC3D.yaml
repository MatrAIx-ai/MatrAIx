personas:
  professional: Tracy Scott blends front‑line retail expertise with a flair for visual merchandising, using their quick mental math and people‑centric approach to transform store aisles into immersive art
    experiences, even as their spontaneous nature sometimes leaves project timelines a bit chaotic.
  sports: Tracy Scott cheers on the Houston Astros during spring training, joins a local pickup basketball game at the community center every Thursday, and participates in a weekend walking club that explores
    the surrounding countryside trails while listening to podcasts about urban art.
  arts: Tracy Scott’s creative life revolves around acrylic painting vibrant cityscapes, sketching downtown alleys for inspiration, writing speculative short stories that explore abstract ideas, following
    contemporary visual artists such as Banksy, Yayoi Kusama, and Olafur Eliasson on Instagram, and regularly performing at open‑mic nights and filming quirky TikTok art videos.
  travel: Tracy Scott prefers spontaneous weekend getaways to nearby art fairs in Asheville and folk festivals in New Orleans, while dreaming of a road trip along the Gulf Coast to sample coastal cuisine,
    yet their freelance schedule and limited budget often keep trips short and budget‑friendly.
  culinary: Tracy Scott loves cooking shrimp and grits with a miso twist, seasoned with smoked paprika and fresh cilantro, often pairing it with homemade sweet‑potato biscuits, and experimenting with kale
    salads tossed with pomegranate seeds and a honey‑lime vinaigrette for a Southern‑fusion flavor burst.
  core: Tracy Scott is a talkative, imaginative retail virtuoso who trades structure for spur‑of‑the‑moment art projects, often juggling missed deadlines with a contagious laugh and a habit of turning checkout
    lanes into pop‑up galleries.
background:
  cultural: Tracy is a Black woman raised in Zebulon, GA, a town with deep roots in the Southern Black experience. Her family carries stories of the Great Migration and the resilience of generations who
    built close‑knit church and neighborhood networks. Growing up, she absorbed the rhythms of gospel music in Sunday services, the oral storytelling traditions of her grandparents, and the flavors of soul‑food
    cooking that blend African, Caribbean, and Southern cuisines. These cultural threads shape her identity and inform her love for community gatherings, artistic expression, and the desire to uplift Black
    voices in her local area.
