  career_goals: In the short term, Tracy aims to leverage her associate degree and on‑the‑job experience to move into a visual merchandising or assistant manager role at her current store, where she can
    blend her people‑skills with her artistic eye. She plans to enroll in evening courses in graphic design and marketing to deepen her technical abilities. Long‑term, she envisions opening a community‑focused
    boutique‑café that doubles as an informal gallery and performance space for local artists, providing a platform for emerging Black creators in Lamar County. Tracy also hopes to serve as a cultural liaison
    for local events, using her sociable nature and deep community ties to foster inclusive celebrations and workshops.
