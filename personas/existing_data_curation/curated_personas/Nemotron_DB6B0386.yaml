  career_goals: Quintin aims to re‑enter the workforce by first completing his GED and then obtaining a certification in a skilled trade such as automotive technology or HVAC. He seeks a stable, structured
    role in a logistics, maintenance, or facilities team where his methodical planning and reliability are valued. Over the next five years, he hopes to advance to a supervisory position that allows him
    to lead small crews and oversee project timelines. In the longer term, he aspires to launch a community‑focused service business—such as a bike‑repair shop or a local event‑planning consultancy—that
    leverages his practical skills, competitive drive, and sociable nature while providing predictable, organized services to his neighbors.
