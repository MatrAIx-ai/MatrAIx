  hobbies: '["Piano practice", "Electric guitar improvisation", "Modular synthesizer building", "Chess", "Fishing", "Hiking", "Reading nonfiction (acoustics, psychology, leadership)", "Youth baseball coaching",
    "Cooking (smoked barbecue, craft beers)"]'
  career_goals: Ray aims to elevate his professional profile within the regional and national music community. He seeks a composer‑in‑residence appointment with a major Oklahoma City orchestra and wants
    his works performed by the Oklahoma City Philharmonic. Over the next five years, he plans to win at least two prestigious composition competitions such as ASCAP or BMI. Ray intends to develop a signature
    series of orchestral pieces that fuse classical forms with modern electronic textures, drawing on his STEM expertise. He also aspires to launch an annual “Heartland Soundscape” festival that showcases
    emerging Midwestern composers, obtain a National Endowment for the Arts grant for a multimedia composition project, and mentor young musicians through university workshops while authoring a textbook
    on systematic composition techniques.
