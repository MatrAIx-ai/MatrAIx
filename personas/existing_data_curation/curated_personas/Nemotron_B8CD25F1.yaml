personas:
  professional: Ray Rhyne, a 32‑year‑old music director and composer, blends rigorous orchestral craft with algorithmic synthesis, leading full‑ensemble rehearsals with precise scheduling and integrating
    modular synth patches into live performances to meet their goal of securing a composer‑in‑residence with the Oklahoma City Philharmonic; they approach each project with a spreadsheet‑like rigor and
    a competitive drive to win ASCAP and BMI awards.
  sports: Ray Rhyne coaches a local youth baseball team in Oklahoma, cheering for the Oklahoma City Dodgers and following the Oklahoma City Thunder, and spends Saturday mornings fishing for crappie on Grand
    Lake while staying fit through a routine of brisk hikes on the Wichita Mountains; they apply a competitive, structured coaching style that mirrors their meticulous rehearsal planning.
  arts: Ray Rhyne regularly attends performances by the Oklahoma City Philharmonic, draws inspiration from composers like John Williams and electronic pioneers like Brian Eno, and squeezes in jam sessions
    playing electric guitar covers of Radiohead's Paranoid Android using improvisational frameworks; they treat each piece as a puzzle to be solved within a structured harmonic grid, critiquing every phrase
    with a skeptical ear.
  travel: Ray Rhyne plans trips with a spreadsheet itinerary, preferring road trips to music festivals like the Big Ears Festival in Knoxville and weekend getaways to Austin's live‑music scene, while dreaming
    of a future immersion program at the Sibelius Academy in Helsinki; they prioritize predictability and efficient logistics, yet occasionally let competitive wanderlust push them toward off‑beat destinations.
  culinary: Ray Rhyne's culinary experiments revolve around perfecting a smoked brisket rub with hickory chips, a side of jalapeño cornbread, and pairing each batch with a home‑brewed American IPA crafted
    from Cascade and Amarillo hops; they approach each recipe like a score, noting every nuance in a lab‑style notebook and insisting on precise timing to achieve repeatable results.
  core: Ray Rhyne is a methodical composer‑engineer who conducts orchestras with clockwork precision, invests like a spreadsheet, monitors their health with data, coaches baseball while humming chord progressions,
    and never misses a chance to smoke a brisket while tweaking a synth patch, all driven by a competitive, structure‑seeking mindset.
background:
  cultural: Ray was born and raised in Oklahoma City, a Midwestern‑Southern hybrid that blends the pragmatism of the heartland with a vibrant community music tradition. Growing up in a Protestant family,
    he sang in the church choir and played in the school marching band, experiences that fostered an early appreciation for ensemble performance and structured musical forms. The regional culture of Oklahoma—characterized
    by hospitality, hard work, and a strong sense of local identity—shaped his practical and reliable nature. He earned a bachelor's degree in a STEM field at the University of Oklahoma, where technical
    rigor coexisted with active campus music ensembles. His marriage reflects shared Midwestern values of partnership and community involvement. While his primary cultural influences are those of a white,
    middle‑class Midwestern American, Ray also respects the diverse musical heritage of the area, including Native American rhythms and the state's rich country music legacy, which occasionally inform his
    compositional palette.
attributes:
