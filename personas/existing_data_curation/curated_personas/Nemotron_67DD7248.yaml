personas:
  professional: Donald Anglin, a 32‑year‑old construction specialist, leverages meticulous blueprint reading, precise concrete finishing, and disciplined crew scheduling to deliver projects on time, while
    their competitive edge and structural‑thinking mindset drive a methodical, safety‑first work ethic despite occasional stress‑induced over‑checking.
  sports: Donald Anglin fuels their competitive streak by weight‑training three times a week at the Hancock County gym, hiking the mapped trails of the Acadia Hiking Club, eagerly cheering the Ellsworth
    High Eagles football team each Friday night, and casting trout on the Penobscot River, all while maintaining a regimented workout log that balances strength with the occasional weekend fishing tournament.
  arts: Donald Anglin’s evenings often blend hand‑crafted pine coffee tables with the mellow strums of John Prine and the poetic verses of Mary Oliver, while they occasionally attend the Hancock County
    Community Theatre’s productions of Arthur Miller, allowing the arts to temper the rigidity of their construction world.
  travel: Donald Anglin prefers meticulously planned road trips that whisk them from the rugged coastline of Acadia to the volcanic craters of Iceland, balancing a modest travel budget with a penchant for
    solo camping nights under the stars and a checklist of must‑see waterfalls and historic lighthouses along the way.
  culinary: Donald Anglin enjoys cooking simple, hearty meals, often pan‑searing fresh trout with lemon‑dill butter or grilling lobster rolls seasoned with garlic butter, while their modest carpentry skills
    extend to building a custom smoking box for weekend BBQ experiments.
  core: Donald Anglin is a methodical, competition‑driven builder who channels stress into precise woodworking, budget spreadsheets, and solitary fishing trips, yet occasionally lets perfectionism turn
    into over‑checking and late‑night insomnia.
background:
  cultural: Donald grew up in a working‑class family in a small New England town in Maine, descended from Irish‑German ancestors who settled the region in the early 1900s. The community values self‑reliance,
    modesty, and a strong work ethic, which have shaped his practical outlook. Rural coastal life, with its emphasis on fishing, forestry, and seasonal labor, reinforces a respect for nature and a preference
    for predictable, tangible results. While religious affiliation is modest, the cultural environment emphasizes community interdependence, thrift, and a quiet pride in hard, honest work.
attributes:
  skills: '["Concrete finishing","Framing and structural carpentry","Blueprint reading and plan interpretation","Light heavy‑equipment operation (backhoe, skid‑steer)","Site safety compliance (OSHA)","Material
    handling and logistics","Project scheduling and time management","Team coordination and crew supervision","Equipment maintenance","First‑aid and emergency response"]'
  hobbies: '["Trout fishing on the Penobscot River","Woodworking and furniture building","Hiking coastal trails of Acadia National Park","Weight‑training at the local gym","Watching high‑school football
    games","Participating in regional construction trade competitions"]'
  career_goals: Donald aims to transition from laborer to foreman within the next three to five years, leveraging his organized approach and competitive drive. He plans to obtain OSHA 30‑hour certification
    and an NCCER credential in construction craft to formalize his expertise. Recognizing his need for structure and long‑term stability, he intends to enroll part‑time in an associate’s program in construction
    management at a regional community college. Ultimately, Donald aspires to launch a small general‑contracting business that serves the rural communities of Hancock County, positioning himself as a reliable,
    methodical leader who can consistently deliver projects on time and within budget.
