personas:
  professional: Santos Perez, a budding architect of imagination, stacks LEGO bricks into elaborate cities while sketching bright desert‑forest panoramas, already showing a knack for spatial thinking and
    a love of collaborative creation.
  sports: Santos Perez thrives on the soccer field with the Junior Tigers youth league, dribbling with boundless energy while cheering for the local professional team, the River City FC, and balances play
    with spontaneous park tag games.
  arts: Santos Perez delights in painting vivid desert‑forest mash‑ups, dancing to both traditional Mexican mariachi beats and upbeat pop tracks, and idolizes artists like Frida Kahlo and Pixar’s animators,
    letting creativity guide daily play.
  travel: Santos Perez loves exploring the nearby Pine Ridge nature trail, dreaming of future trips to the Grand Canyon’s red rocks and the towering Redwood forests, preferring hands‑on discovery over guided
    tours.
  culinary: Santos Perez favors crunchy tacos with fresh cilantro, cheesy quesadillas, and sweet mango smoothies, often attempts to help in the kitchen by sprinkling cheese and arranging fruit slices, yet
    occasionally forgets to wash hands before cooking.
  core: Santos Perez is an energetic, curiosity‑driven seven‑year‑old who mixes LEGO engineering, vivid art, and spontaneous soccer, while juggling a playful messiness and a heartfelt desire to share joy
    with friends.
background:
  cultural: Santos is a Mexican‑American growing up in Fayetteville, Arkansas. His parents were born in Mexico and have brought traditions such as Día de los Muertos, Mexican cuisine, and the Spanish language
    into his daily life. At home, the family speaks Spanish and celebrates cultural holidays, while he also attends a public elementary school where he learns English and participates in local community
    events like the Arkansas State Fair. This bicultural environment gives him a strong sense of pride in his heritage while appreciating the southern Arkansas community.
