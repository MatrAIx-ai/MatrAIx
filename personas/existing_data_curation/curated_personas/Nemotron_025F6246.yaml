personas:
  professional: Naftali Casanova is a 24‑year‑old AWS Certified Welder who leverages their methodical, safety‑first mindset to produce precise MIG and TIG welds, meticulously read blueprints, maintain equipment
    with rigorous documentation, and aims to become a foreman within five years while pursuing CWI and pipe‑welding certifications.
  sports: Naftali Casanova enjoys seasonal outdoor pursuits, playing pickup softball in summer, hiking the Adirondack foothills in fall, supporting the Buffalo Bills and New York Rangers from home, and
    occasionally paddling with a local canoe club for weekend exercise.
  arts: Naftali Casanova channels their creativity into woodworking and assembling model kits of classic cars and trains, frequently visits the Utica Opera House for performances by folk duo The Milk Carton
    Kids and relishes streaming New York Philharmonic concerts, while curating a small collection of metal sculpture inspirations.
  travel: Naftali Casanova prefers practical road trips, having driven the Niagara Falls loop and the Finger Lakes wine trail, while dreaming of a cross‑country detour to the Goodwood Festival of Speed
    in England to see classic car restorations, all balanced within a modest budget that accommodates saving for their future business.
  culinary: Naftali Casanova loves rustic meals, frequently grilling fresh trout from Oneida Lake with a lemon‑butter glaze, whipping up hearty lasagna with ricotta, oregano and mozzarella, and experimenting
    with a homemade BBQ rub of smoked paprika, brown sugar and garlic, though they often rely on instant coffee for a quick caffeine fix.
  core: Naftali Casanova balances a meticulous, safety‑driven welding career with a restless anxiety that fuels diligent planning and occasional over‑cautious habits, carving out time for nature, craft,
    and community service.
background:
  cultural: Naftali is a second‑generation Italian‑American raised in Utica, New York. His family maintains many Italian traditions, such as cooking pasta dishes, celebrating holidays like Ferragosto, and
    attending the annual Italian Heritage Festival. He grew up in a Catholic household, which instilled values of community and cooperation, and he is fluent in conversational Italian, often using it at
    family gatherings.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''oxy‑fuel cutting'', ''brazing'', ''blueprint interpretation'', ''metal fabrication'', ''pipe fitting'', ''structural welding'', ''OSHA safety compliance'',
    ''equipment maintenance'', ''quality inspection'', ''basic CAD drafting'', ''AWS Certified Welder'']'
  hobbies: '[''woodworking'', ''model kit building'', ''fishing'', ''hiking'', ''strategy video gaming'', ''volunteer teaching STEM to youth'']'
  career_goals: Naftali aims to advance from the shop floor to a supervisory role within the next five years, targeting a position as a foreman or production lead where his organizational strengths can
    improve workflow efficiency. He plans to obtain further certifications, such as AWS Certified Welding Inspector (CWI) and specialized pipe‑welding qualifications, to broaden his expertise. Long‑term,
    he hopes to open a small, locally‑owned metal‑fabrication shop that offers custom work for the Utica community, providing stable employment and high‑quality craftsmanship.
