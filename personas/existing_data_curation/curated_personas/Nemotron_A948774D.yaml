  career_goals: Jae Woo aspires to turn his technical curiosity into a future career in software engineering or robotics. He plans to attend a STEM‑focused high school and later study computer science or
    mechanical engineering at a university where he can work on real‑world projects like autonomous devices or video‑game development. In the short term, he wants to deepen his coding skills, earn certifications
    in Arduino, and compete in regional esports tournaments to build a portfolio that could lead to a professional gaming or game‑design pathway. He also hopes to combine his bilingual background with technology,
    perhaps developing software that bridges Korean and English users.
