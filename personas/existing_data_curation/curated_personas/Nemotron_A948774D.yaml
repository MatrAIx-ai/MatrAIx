personas:
  professional: Jae Woo, a budding competitive gamer and self-taught electronics tinkerer, channels their love for routine and step‑by‑step problem solving into mastering strategy‑heavy MOBA titles and
    building custom Arduino‑powered robots, all while preferring small, trusted teammate circles over large online clans.
  sports: Jae Woo pedals solo along the Cedar Creek bike trail, cheering on the Dallas Cowboys on game day while they keep a modest membership with the local youth cycling club, and occasionally join school
    intramural soccer matches, preferring individualized endurance over team sports.
  arts: Jae Woo immerses in K‑pop hits from BTS and BLACKPINK as a quiet soundtrack for LEGO builds, enjoys the sci‑fi novels of Liu Cixin and the graphic storytelling of the manhwa 'Solo Leveling', and
    they watch the Korean drama 'Crash Landing on You' during weekend wind‑downs, letting these artistic influences shape their creative imagination.
  travel: Jae Woo dreams of exploring Seoul’s historic palaces and tasting authentic street food, while they also plan road trips to Austin’s music scene and the New Mexico desert for stargazing, balancing
    a love for cultural immersion with the practical limits of a middle‑schooler’s family budget and school schedule.
  culinary: Jae Woo favors the comforting flavors of bibimbap topped with gochujang and the smoky zest of Texas brisket tacos, and they demonstrate basic cooking chops by whipping up a quick kimchi fried
    rice after school, yet often forget to clean the stovetop, leaving a trail of half‑cooked noodles behind.
  core: Jae Woo blends disciplined routine with a love for solitary competition, and they trade structured LEGO builds for spontaneous gaming victories while juggling a cautious savings habit and a knack
    for quick‑fix meals, all guided by a quiet skepticism and a steady emotional calm.
background:
  cultural: Jae Woo comes from a Korean‑American family in Canton, Texas. At home, Korean language and cultural traditions are upheld; the family celebrates holidays such as Seollal (Lunar New Year) and
    Chuseok with traditional foods and rituals, while also participating in local Texan customs and community events. This blend of cultures gives Jae a strong sense of respect for elders, a high value
    placed on education, and an appreciation for both Korean and American contemporary media. He is bilingual, speaking Korean with his parents and English at school, and he occasionally attends a Korean
    Saturday school to maintain his language skills. The practical, disciplined ethos of his Korean heritage combines with the independent, outdoors‑oriented lifestyle of his Texas surroundings, shaping
    his routine‑focused yet flexible outlook.
