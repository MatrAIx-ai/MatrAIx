    "data collection", "community outreach"]'
  hobbies: '["visiting art galleries", "painting", "cooking Puerto Rican cuisine", "listening to salsa and jazz music", "gardening", "reading contemporary fiction and poetry", "practicing yoga", "volunteering
    at cultural festivals"]'
  career_goals: Jacqueline aims to move into a supervisory or program director role within a community health organization, where she can design and lead culturally responsive mental health initiatives
    for underserved Latino populations. She plans to earn a certification in clinical social work or pursue an associate degree in public health to strengthen her evidence‑based practice. Long‑term, she
    aspires to launch a nonprofit that blends social services with art therapy workshops, empowering clients to express themselves creatively while building resilience. She also seeks to mentor younger
    social workers, sharing her methodical approach and encouraging innovative thinking.
