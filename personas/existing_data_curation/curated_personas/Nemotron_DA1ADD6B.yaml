personas:
  professional: Jacqueline Velez is a seasoned healthcare social worker in Memphis who leverages her methodical case management, bilingual fluency, and relentless curiosity for creative interventions to
    design culturally resonant mental health programs, while competitively pursuing supervisory roles and mentoring emerging practitioners.
  sports: Jacqueline Velez is an avid supporter of the Memphis Grizzlies and Memphis Redbirds, participates in weekly sunrise runs at Tom Lee Park, attends bi‑monthly yoga sessions at a downtown studio,
    and plays midfield in a seasonal community soccer league, balancing a competitive edge with a commitment to personal fitness.
  arts: Jacqueline Velez is an abstract painter who spends weekends wandering Memphis' galleries and street murals, drawing inspiration from artists such as Jean‑Michel Basquiat, Diego Rivera, and local
    muralist Jason Brot Martinez, while curating playlists that feature Celia Cruz, John Coltrane, and Bon Iver to accompany her creative process.
  travel: Jacqueline Velez is a purposeful traveler who prefers meticulously planned trips that blend cultural immersion with artistic inspiration, having explored San Juan's historic Old City, the vibrant
    murals of Valparaíso, a culinary tour of Oaxaca, and a road trip along the Gulf Coast, while dreaming of a retreat in the Scottish Highlands.
  culinary: Jacqueline Velez is an enthusiastic home chef who masters traditional island dishes such as mofongo, arroz con gandules, and pasteles, frequently reimagining them with quinoa, kale, or smoked
    paprika, and favors ingredients like plantains, sofrito, chorizo, and fresh cilantro, while also experimenting with baking sourdough breads.
  core: Jacqueline Velez blends methodical social work expertise with a voracious curiosity for art, cooking, and community, navigating life with organized ambition, occasional coffee‑driven overextension,
    and a habit of turning every challenge into a creative project.
background:
  cultural: Jacqueline was born to Puerto Rican parents and grew up in a close‑knit Puerto Rican community in Memphis, where Spanish was spoken at home and family gatherings were centered around music,
    food, and storytelling. Her heritage instilled a strong sense of collectivism, respect for elders, and pride in Caribbean traditions such as the celebration of Nochebuena and the rhythms of bomba and
    plena. Bilingualism and deep cultural knowledge have shaped her professional focus on addressing health disparities affecting Latino families. While embracing her roots, she also values the rich musical
    and culinary diversity of Memphis, often blending Southern flavors with island recipes. Her cultural identity informs both her empathetic client work and her personal interest in preserving and sharing
    Puerto Rican arts within the broader community.
attributes:
  skills: '["case management", "crisis intervention", "biopsychosocial assessment", "care planning", "interdisciplinary coordination", "EHR documentation", "regulatory compliance", "Spanish-English bilingual
