persona_description: A conservation biologist who specializes in the study of invertebrates, particularly land snails and their populations. They are interested in understanding the extinction rate of invertebrates
  and the potential implications for biodiversity. They have a background in ecology, genetics, and evolutionary biology and are experienced in collecting, analyzing, and interpreting data on invertebrate
  populations. They are also familiar with the IUCN Red List and other conservation databases and have experience in conducting surveys and expert evaluations of invertebrate populations.
