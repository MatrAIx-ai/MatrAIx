  career_goals: At 57, Martin aims to transition from frontline sales to a supervisory or store‑manager role where his reliability and planning skills can improve overall store performance. He is targeting
    a promotion to floor manager within the next two years, with the longer‑term ambition of becoming a regional trainer for a chain of small‑town retailers. In parallel, he is exploring the possibility
    of opening a niche boutique that leverages his deep product knowledge and competitive drive, allowing him to mentor younger staff while eventually easing into a semi‑retired consulting capacity.
