personas:
  professional: Jonetta Collins, a 35‑year‑old aspiring community program coordinator, merges her knack for spreadsheet budgeting, hands‑on horticulture, and event planning into a methodical approach that
    turns small‑group workshops at the Wilbur public library into seamless, educational experiences.
  sports: Jonetta Collins finds fitness in the rhythm of the forest, regularly hiking the Willapa Hills and participating in the Lincoln County Trail Runners club, while cheering on the Seattle Seahawks
    in the fall and the Seattle Sounders FC during the soccer season, preferring solo treks over gym workouts but occasionally joining a weekend community gardening fitness session that doubles as a casual
    yoga class.
  arts: Jonetta Collins weaves narratives into scarves while listening to folk legends like Joan Baez and contemporary singer‑songwriter Iron & Wine, finds solace in the historical novels of Hilary Mantel
    and Ken Follett, and contributes volunteer articles to the library’s literary newsletter featuring reviews of local theatre productions starring the Rainier Repertory Company.
  travel: Jonetta Collins prefers low‑key, self‑driven road trips that blend forest immersion with historic charm, often exploring Olympic National Park’s Hoh Rainforest and the vineyards of Walla Walla
    in summer, while saving for a future pilgrimage to the Scottish Highlands to trace the origins of the clans she reads about in her favourite historical fiction, always planning accommodations through
    cozy B&Bs and budgeting each mile meticulously.
  culinary: Jonetta Collins, a proficient home cook, delights in turning her garden’s heirloom tomatoes, rosemary, and wild mushrooms into rustic dishes such as a honey‑glazed beet salad, mushroom‑and‑herb
    focaccia, and a seasonal vegetable lasagna, while occasionally indulging in a Saturday night takeaway from the local sushi spot that serves toro sashimi, a guilty pleasure that balances her otherwise
    disciplined, farm‑to‑table diet.
  core: Jonetta Collins blends pragmatic curiosity with a quiet, methodical soul, juggling meticulous spreadsheets for everything—from garden yields to coffee purchases—while finding peace in solitary hikes,
    intricate knitting, and a habit of never missing a sunrise over the pine‑ruffled hills.
background:
  cultural: Jonetta grew up in a small, tight‑knit town in the Pacific Northwest, where her family emphasized self‑reliance, respect for the land, and community involvement. As a white, middle‑class resident
    of Wilbur, WA, she absorbed the region’s outdoor‑oriented lifestyle and the value placed on practical skills. Her high‑school education was complemented by a strong informal learning culture—learning
    from neighbors, local workshops, and hands‑on experience—shaping her pragmatic curiosity and cooperative nature.
attributes:
  skills: '[''budgeting and spreadsheet management'', ''organic gardening'', ''basic carpentry and home repair'', ''first aid and CPR certification'', ''event planning and volunteer coordination'', ''written
    communication and newsletter writing'', ''computer literacy (Microsoft Office)'', ''library volunteer services'']'
  hobbies: '[''vegetable gardening'', ''birdwatching'', ''reading historical fiction'', ''knitting'', ''crossword puzzles'', ''hiking local trails'', ''volunteering at the community library'', ''DIY craft
    projects'']'
  career_goals: Jonetta aims to transition her extensive volunteer experience into a part‑time role as a community program coordinator for the Wilbur public library or the local recreation department, where
    she can apply her organizational and outreach skills. She also plans to earn a horticulture certification to launch a community garden education series, ultimately hoping to secure a grant to expand
    sustainable food projects in Lincoln County. In the longer term, she envisions running a modest online blog that merges her curiosity for DIY projects with practical guides, potentially generating supplemental
    income while sharing her knowledge with a wider audience.
