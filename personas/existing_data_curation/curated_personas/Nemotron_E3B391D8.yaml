personas:
  professional: Diann Lemon, a seasoned carpenter with fifteen years of residential framing, custom cabinetry, and finish carpentry experience, they apply a methodical, safety‑first mindset to every project,
    leveraging precise blueprint reading, strong problem‑solving abilities, and a deep knowledge of California building codes while fostering predictable schedules and team harmony.
  sports: Diann Lemon affiliates with the Sacramento Running Club for early‑morning jogs around William Land Park, cheers on the Sacramento Kings during NBA season, participates in a co‑ed softball league
    on weekends, and enjoys seasonal hiking trips to the Sierra Nevada foothills.
  arts: Diann Lemon immerses herself in classic soul icons like Marvin Gaye and contemporary R&B artists such as H.E.R., attends monthly exhibitions at the Crocker Art Museum, and crafts decorative wood
    inlays inspired by the rhythmic patterns she hears, blending auditory inspiration with visual artistry.
  travel: Diann Lemon favors meticulously planned road trips to destinations such as Yosemite National Park, Napa Valley’s boutique wineries, and the historic streets of San Miguel de Allende, balancing
    adventure with budget constraints, a love for scenic drives, and occasional family visits back home.
  culinary: Diann Lemon enjoys farm‑to‑table cooking, frequently preparing roasted beet and quinoa salads with fresh basil from her garden, savors grilled salmon with lemon‑dill butter, experiments with
    spice blends like smoked paprika, and sometimes over‑seasones dishes when pressed for time.
  core: Diann Lemon is a disciplined carpenter‑entrepreneur who weaves structure, soulful music, gardening serenity, and relentless stress management into a uniquely balanced yet occasionally over‑meticulous
    lifestyle.
background:
  cultural: Diann was raised in Sacramento’s historically Black neighborhoods, where family, church, and community ties provided a strong sense of identity. Her upbringing emphasized resilience, mutual
    support, and the value of skilled labor, which guided her choice of a trade career. She celebrates cultural traditions such as Juneteenth gatherings, soul food cooking, and gospel music, and she remains
    active in local Black cultural organizations that advocate for diversity in the construction industry. These roots inform her collaborative work style, her commitment to mentoring younger Black women
    in trades, and her appreciation for the cultural heritage that continues to shape her personal and professional life.
attributes:
  skills: '[''Residential framing'', ''Custom cabinetry'', ''Finish carpentry'', ''Blueprint reading'', ''Power‑tool operation'', ''OSHA safety compliance'', ''Project budgeting'', ''Inventory management'',
    ''Small‑team coordination'', ''Problem solving'']'
  hobbies: '[''Woodworking'', ''Gardening'', ''Listening to soul and R&B music'', ''Community service through church'', ''DIY workshops'', ''Reading self‑help and budgeting guides'']'
  career_goals: Diann aims to become a certified lead carpenter and eventually launch her own small‑scale carpentry business focused on sustainable, custom home improvements in Sacramento. She plans to
    enroll in a state‑approved apprenticeship certification program within the next year, obtain a OSHA 30‑hour construction safety card, and build a client base through community referrals. Her long‑term
    ambition is to mentor other women—especially from under‑represented backgrounds—who wish to enter the trades, creating a supportive network that balances her desire for professional growth with her
    personal need for stability and reduced stress.
