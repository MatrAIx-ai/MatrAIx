persona_description: A professor who specializes in psychology and criminology, particularly in the areas of aggression, empathy, and the relationship between these two concepts in violent offenders. He/she
  has conducted research on the relationship between perspective-taking abilities and the regulation of anger in violent prisoners and students, and has found that while there is no evidence to suggest
  that violent offenders lack the ability to empathize, careful assessment of the situations and circumstances when they choose to become violent is important. The persona is likely to be interested in
  understanding the relationship between anger and empathy in violent offenders and the different treatment strategies that can be applied to them.
