persona_description: A labor economist who specializes in analyzing the relationship between supply and demand of labor, particularly in the hospitality and tourism sectors. They are knowledgeable about
  the elasticity of demand and supply of labor and the potential impact of minimum wage on employment and unemployment. They are skilled in using data to understand the structure of demand, regulatory requirements,
  and the impact of technological change on employment. They are also aware of the importance of the minimum wage in preventing wages from declining and the potential impacts of inflation on wages.
