  hobbies: '[''reading historical non-fiction'', ''Mexican folklore literature'', ''watching soccer'', ''listening to norteño music'', ''home gardening (peppers, tomatoes)'', ''fishing at Laguna Madre'',
    ''strategy video gaming'', ''acoustic guitar practice'']'
  career_goals: He aims to leverage his on‑the‑ground experience to advance into a supervisory role within the next three years, obtaining a Certified Forklift Operator and a Supply Chain Management certification.
    In the longer term, he aspires to earn an associate degree in Logistics and eventually become a warehouse manager or start a small independent freight brokerage serving the Rio Grande Valley. He also
    plans to mentor younger workers and contribute to improving workplace safety.
