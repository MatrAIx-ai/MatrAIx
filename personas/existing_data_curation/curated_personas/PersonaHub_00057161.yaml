persona_description: A historian who is interested in the history of railroads and bridge construction. They are particularly interested in the history of the Winona Bridge Railway and the Green Bay, Winona,
  & Saint Paul Railroad. They are knowledgeable about the construction of the bridge and its features, including the modification to the standard Pratt truss style. They are also interested in the history
  of the Chicago, Burlington, & Northern and the CB&Q, and how their relationship with the Winona Bridge Railway affected their success. They are interested in the history of the bridge and its use over
  time, and how it was affected by changes in traffic and technology. They are also interested in the history of the bridge's maintenance and the reasons for its closure in 1985.
