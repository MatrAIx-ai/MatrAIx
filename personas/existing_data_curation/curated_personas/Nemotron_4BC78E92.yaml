personas:
  professional: Devon Napier leverages a decade-plus of full‑stack engineering expertise—Python, JavaScript, React, Node.js, Docker—to craft accessible, data‑rich interactive experiences that blend tech
    and art, while they bring a critical, competitive mindset that drives mentorship and open‑source contributions, even as their relaxed approach to deadlines sometimes leads to last‑minute sprint marathons.
  sports: Devon Napier enjoys weekend paddleboarding on the Intracoastal Waterway, joins a local senior pick‑up basketball league, follows the Miami Dolphins (NFL) and Miami Heat (NBA) with avid devotion,
    and they are a member of the Fort Lauderdale Running Club that meets for evening jogs during cooler months.
  arts: Devon Napier curates intimate gallery shows spotlighting emerging artists like Kerry James Marshall and Kehinde Wiley, immerses themselves in watercolor and digital illustration inspired by the
    vibrant tones of Erykah Badu and Kamasi Washington’s music, and they capture the pulse of Fort Lauderdale’s streets through candid portrait photography.
  travel: Devon Napier prefers flexible, culturally immersive trips that blend museum tours with spontaneous street exploration, having already visited New Orleans for its jazz scene, Savannah’s historic
    squares, and Paris’s Musée d’Orsay, while they dream of a heritage pilgrimage to Ghana’s Cape Coast Castle and a solo photography expedition to Marrakech’s souks.
  culinary: Devon Napier enjoys cooking at an intermediate level, often preparing collard greens seasoned with smoked turkey, shrimp and grits, sweet‑potato pie, and occasional Jollof rice, delighting in
    fresh herbs like thyme and cilantro while they occasionally treat friends to artisanal grilled cheese paired with homemade pickles.
  core: Devon Napier is a curious, art‑driven technologist who balances disciplined coding with a relaxed, occasionally disorganized lifestyle, championing inclusive creativity while they navigate life
    with steady composure and a competitive streak.
background:
  cultural: Devon identifies as a Black woman whose cultural roots are woven into the African American experience in the South. Growing up in Florida, she was shaped by the rhythms of jazz, gospel, and
    hip‑hop, and by community celebrations like Juneteenth and the Broward County Black Heritage Festival. Her family traditions emphasize resilience, storytelling, and a love for soul food, which she often
    recreates for friends. Devon actively supports Black art circles, curating small exhibitions that showcase emerging Black artists, and mentors aspiring technologists through organizations such as Black
    Girls Code. This cultural lens informs both her creative work and her commitment to fostering inclusive tech spaces.
