  career_goals: Devon aims to transition into a senior technical architect role where she can shape interdisciplinary projects at the intersection of technology and the arts. Over the next five years, she
    plans to lead a development team focused on creating open‑source tools for digital humanities, publishing scholarly articles on tech‑enabled cultural preservation, and speaking at niche conferences
    that celebrate innovative art‑tech collaborations. She also aspires to launch a boutique consultancy that offers tech solutions for museums, galleries, and community art initiatives, while continuing
    to mentor and advocate for women of color in the software industry.
