personas:
  professional: Teresa Sherfey, a 25‑year‑old aspiring HVAC technician and freelance handyman, merges her hands‑on carpentry experience, meticulous Excel‑driven project planning, and critical problem‑solving
    mindset to deliver reliable home‑maintenance services while building a DIY content brand, reflecting her blend of curiosity, practicality, and competitive drive.
  sports: Teresa Sherfey, a 25‑year‑old outdoor enthusiast, hikes the Columbia River Gorge trails on weekends, participates in a local running club that often hosts pre‑game runs for the Portland Timbers,
    and balances her competitive edge with low‑impact yoga and interval training to stay fit without overexertion.
  arts: Teresa Sherfey, a 25‑year‑old photography hobbyist, captures local landscapes inspired by Ansel Adams, curates an Instagram feed of DIY projects, and draws creative energy from indie musician Joanna
    Newsom and visual artist Yayoi Kusama, weaving these influences into her artistic identity.
  travel: Teresa Sherfey, a 25‑year‑old adventure planner, maps weekend trips to Oregon’s coast, Crater Lake, and the nearby Mount Rainier National Park using spreadsheets, seeks the cultural tech vibe
    of Tokyo on a future overseas journey, and balances cost‑conscious budgeting with a desire for immersive nature experiences.
  culinary: Teresa Sherfey, a 25‑year‑old experimental home cook, blends practicality with creativity by preparing quinoa‑bowls with roasted sweet potatoes, miso‑glazed salmon, and homemade kimchi, enjoys
    perfecting a tangy avocado‑turmeric toast, and regularly sources fresh ingredients at local farmers’ markets.
  core: Teresa Sherfey, 25, fuses a skeptical, competitive mind with a hands‑on DIY ethos, rigorously budgets, proactively manages mild health issues, and carves out time for hikes, photography, and culinary
    experiments, though she often forgets to water her houseplants.
background:
  cultural: Teresa was raised in Hagerstown, Maryland, a city that blends Mid‑Atlantic and Appalachian cultural influences. Her family celebrated traditional American holidays and emphasized self‑reliance,
    hard work, and community involvement—a reflection of the region’s modest, pragmatic lifestyle. Growing up near the Maryland‑West Virginia border, she absorbed a mix of suburban convenience and rural
    sensibility, which fostered an appreciation for both new ideas and established practices. Local community events, such as county fairs, high‑school sports, and volunteer initiatives, shaped her sense
    of responsibility and modest competitiveness. While she identifies as white American, Teresa’s worldview is shaped by the evolving diversity of her town and the practical, independent values common
    to the area.
