  career_goals: Teresa’s primary career ambition is to transition from informal, unpaid work into a skilled trade that blends her curiosity with practical application. She plans to enroll in a local community
    college’s HVAC or electrical technician program, earn certification, and eventually launch a freelance handyman business that offers reliable home‑maintenance services in Washington County. Simultaneously,
    she wishes to build a modest online presence showcasing her DIY projects, which could evolve into a supplemental e‑commerce store for handcrafted home‑decor items. Her long‑term goal is financial independence
    and the ability to set her own schedule, allowing her to balance work with personal interests while staying competitive in her chosen field.
