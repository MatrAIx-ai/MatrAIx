  career_goals: Jade aims to pursue a research-oriented career in artificial intelligence, focusing on ethical and privacy-preserving algorithms. She plans to enroll in a master’s program in computer science
    within the next year, targeting a research assistantship that will allow her to publish in peer‑reviewed conferences. In the longer term, she aspires to lead a technical team at a tech company or launch
    her own startup that develops AI tools for scientific discovery, seeking recognition through competitions such as Kaggle or the IEEE AI Challenge. Her competitive drive pushes her to become a subject‑matter
    expert and to secure a role where she can influence policy around responsible AI.
