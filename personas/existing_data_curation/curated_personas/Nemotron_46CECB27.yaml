personas:
  professional: Jade Thompson, a 19‑year‑old computer‑engineering graduate, channels their analytical rigor, methodical organization, and competitive drive into cutting‑edge AI research focused on ethical,
    privacy‑preserving algorithms, leveraging disciplined project‑management tools like Git, JIRA, and Trello to deliver reproducible models while thriving in the solitude of independent study.
  sports: Jade Thompson fuels their solitary fitness routine with early‑morning trail runs through Pine Hills, weekend hikes with the Cincinnati Hiking and Astrophotography Club, and quietly watches the
    Cincinnati Bengals and Cincinnati Reds from their balcony while logging performance metrics on a custom Python dashboard.
  arts: Jade Thompson blends scientific curiosity with creative expression by drawing charcoal renderings of neural networks, crafting digital illustrations inspired by speculative‑fiction authors Ted Chiang
    and Ursula K. Le Guin, playing meditative piano pieces by Ludovico Einaudi, and regularly visiting the Cincinnati Art Museum to study installations by Olafur Eliasson.
  travel: Jade Thompson prefers meticulously planned solo trips, having captured night‑sky photographs from Mauna Kea and stargazing hikes in Joshua Tree, while dreaming of a winter excursion to Iceland’s
    Þingvellir National Park to photograph the aurora, all funded through careful budgeting of a modest travel stash.
  culinary: Jade Thompson’s culinary experiments revolve around methodical home‑cooking, perfecting a sous‑vide salmon with miso glaze, mastering a matcha‑infused oat latte, and fine‑tuning a classic carbonara
    using pancetta and Pecorino Romano, while they document each dish with annotated digital sketches of ingredient structures.
  core: Jade Thompson is a fiercely curious, methodical introvert whose love for solitary creative pursuits is matched by a competitive drive, a penchant for over‑analysis, and a habit of staying up late
    editing astrophotography while often neglecting social invitations.
background:
  cultural: Jade is a White American raised in Palmetto, a suburban community in Fulton County, Georgia. Growing up in the South exposed her to a mix of traditional Southern hospitality and the progressive
    academic environment of nearby Atlanta’s universities. Her family values diligence and self‑reliance, which align with her organized and methodical nature. While she appreciates the region’s musical
    heritage, she prefers quieter, introspective pursuits. Her cultural experience blends Southern roots with a broad, tech‑savvy perspective shaped by national online communities.
