  hobbies: '[''Soccer'',''Hiking'',''Cooking Mexican cuisine'',''Volunteering for financial literacy'',''Reading (finance & self‑improvement)'',''Live music concerts'',''Playing acoustic guitar'',''Chess'',''Exploring
