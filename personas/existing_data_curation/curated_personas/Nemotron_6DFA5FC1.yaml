  career_goals: Eduardo aims to launch his own boutique advisory firm within the next three years, focusing on serving middle‑class families and small business owners in the Topeka region, especially those
    of Hispanic heritage. He plans to earn the Certified Financial Planner (CFP) designation and become a recognized speaker at state‑wide financial‑education conferences. His long‑term ambition is to develop
    a scalable financial‑literacy curriculum for local schools and community centers, positioning himself as a thought leader who blends rigorous, data‑driven advice with culturally resonant guidance. He
    also targets a 20% annual growth in assets under management and a top‑five ranking among independent advisors in Kansas.
