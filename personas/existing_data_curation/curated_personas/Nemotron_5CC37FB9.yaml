  hobbies: '[''Painting'', ''Digital illustration'', ''Science and speculative fiction book club'', ''Gardening'', ''Community theater set design'', ''Pottery'', ''Photography'', ''Volunteer STEAM program
    at local library'']'
  career_goals: Donna aims to merge her scientific expertise with her passion for art and community building. She aspires to become a freelance science communicator and educator, designing STEAM (Science,
    Technology, Engineering, Arts, Mathematics) workshops for local schools and libraries in Tallmadge. She hopes to secure a part-time role as a program coordinator at the regional museum, where she can
    curate interdisciplinary exhibits and mentor volunteers. Long-term, she envisions authoring a book that explores creativity in scientific problem‑solving and establishing a small business offering personalized
    art‑science workshops for seniors and adults seeking lifelong learning opportunities. Throughout these pursuits, she seeks roles that provide structure, collaborative environments, and opportunities
    to alleviate stress through meaningful social engagement.
