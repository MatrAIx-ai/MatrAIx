personas:
  professional: A seasoned data analyst and science communicator, Donna Benton blends their expertise in statistical modeling, experimental design, and technical writing with a vivid imagination to create
    compelling STEAM workshops, interdisciplinary museum exhibits, and striking scientific visualizations, they ensure each presentation is accessible to lay audiences, and they apply meticulous project‑management
    habits to meet every deadline.
  sports: A low‑impact fitness enthusiast, Donna Benton rides with the Tallmadge senior cycling club, and they also join the community walking group after Cleveland Browns games, enjoy occasional catch‑up
    volleyball at the local recreation center, and follow the Cleveland Cavaliers and Guardians closely for social outings and team spirit.
  arts: An interdisciplinary creator, Donna Benton draws inspiration from Yayoi Kusama’s abstract installations, Georgia O’Keeffe’s desert landscapes, and the lyrical storytelling of David Bowie, they contribute
    set designs for community theater productions, showcase digital illustrations at local gallery nights, and regularly attend performances by the Cleveland Orchestra.
  travel: An organized explorer, Donna Benton prefers itineraries mapped out months in advance, they have recently toured the scientific museums of Berlin and the historic gardens of Kyoto, enjoy weekend
    getaways to Lake Erie’s vineyards, and dream of a cross‑country road trip along Route 66 with a sketchbook in hand for spontaneous art stops.
  culinary: A garden‑to‑table enthusiast, Donna Benton delights in cooking heirloom tomato ratatouille with fresh basil, thyme, and roasted cherry tomatoes, they also craft saffron‑infused paella for friends,
    prepare quinoa‑kale salads with roasted beets and feta, and frequently browse the Tallmadge farmers market for seasonal produce and artisanal cheeses.
  core: Donna Benton, a 59‑year‑old science‑art hybrid, channels boundless curiosity into meticulous STEAM workshops, they habitually fret over minute details, creating a dynamic mix of disciplined creativity
    and gentle anxiety.
background:
  cultural: Donna was raised in the Midwestern United States, growing up in a modest, middle‑class neighborhood in Summit County. Her cultural upbringing emphasizes community involvement, self‑reliance,
    and a respect for tradition, which is reflected in her dedication to local volunteer work and participation in neighborhood events such as county fairs and charity drives. While her ethnic background
    is primarily European ancestry common to the region, she embraces a inclusive outlook, valuing the diverse perspectives of the people she engages with in Tallmadge. The Midwestern value of practicality
    blends with her personal love for art and curiosity, shaping a worldview that honors both disciplined work ethic and imaginative exploration.
attributes:
