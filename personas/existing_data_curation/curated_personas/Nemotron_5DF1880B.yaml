  career_goals: Christian aims to leverage his curiosity and practical mindset by transitioning back toward a technology‑focused role. He plans to obtain an IT certification (e.g., CompTIA A+ or Network+)
    within the next year and seek part‑time technical support work that allows flexible hours. Long‑term, he envisions opening a small electronics repair shop that serves the Woodburn community, blending
    his hands‑on problem‑solving skills with his desire to help others. He also hopes to mentor youth in basic computer skills through local community programs.
