  hobbies: '[''Hiking in the Cascades'', ''Birdwatching'', ''Model railroad building'', ''Woodworking'', ''Reading popular science books'', ''Puzzle solving (crosswords, Sudoku)'', ''Playing chess'', ''Gardening'',
