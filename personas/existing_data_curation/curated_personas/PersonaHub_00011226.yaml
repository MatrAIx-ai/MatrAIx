persona_description: Dr. Chloe Arson is a Professor of Geosystems Engineering at Georgia Institute of Technology. Her research focuses on the optimization of infrastructure networks, specifically in the
  field of subsurface networks. She has expertise in the design and formulating of models that link microscopic damage and healing processes to macroscopic rock behavior. Her group studies crack propagation
  and healing mechanisms, fracture patterns, and the impact of rock strength, stiffness, and permeability on the structure of rock. Dr. Arson is particularly interested in the design and optimization of
  subsurface networks for water lines, and she has conducted root growth experiments on agar and plates with obstacles to calibrate a Root System Architecture model. Her work is based on the principles
  of micro-mechanics and thermodynamics to understand fragmentation processes in granular assemblies, such as ballast. Dr. Arson's research is relevant to the field of infrastructure engineering and has
  potential applications in the design of water lines and other infrastructure networks.
