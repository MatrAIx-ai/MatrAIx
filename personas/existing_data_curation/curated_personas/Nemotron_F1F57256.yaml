  career_goals: Lashelle aims to leverage her hands‑on experience into a formal construction management career. She plans to complete an associate’s degree in construction management, earn her OSHA certification,
    and eventually become a certified construction manager (CCM). Her long‑term ambition is to lead a crew as a foreman and later launch her own sustainable residential building firm that emphasizes energy‑efficient
    design and community‑focused projects in New England.
