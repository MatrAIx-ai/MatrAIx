  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking'', ''Community gardening'', ''Model‑railway building'', ''Visiting art galleries'', ''Reading speculative fiction'', ''Listening
    to design podcasts'', ''DIY home improvement projects'', ''Woodworking'']'
  career_goals: She aims to obtain a certified foreman qualification within the next two years so she can lead equipment crews on larger infrastructure projects. In the longer term, Shauna hopes to launch
    a small, family‑run equipment‑rental business that gives her the flexibility to select projects and maintain a balanced home life. She also wants to be recognized regionally for an exemplary safety
    record and for integrating aesthetic considerations into construction planning.
