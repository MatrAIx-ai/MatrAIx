  hobbies: '[''Reading African-American history and genealogy'', ''Woodworking'', ''Gardening'', ''Bridge'', ''Chess'', ''Jazz and blues listening'', ''Church participation'', ''Volunteer work'', ''Cooking
    traditional soul-food'', ''Using tablet for video calls'', ''Walking'']'
  career_goals: Although retired, Alex aims to document his personal and family history in a memoir that preserves the Black experience in the mid-Midwest, and to mentor younger relatives and local youth
    in practical trades and critical thinking. He also aspires to stay mentally sharp by competing in bridge and chess tournaments, and to remain an active voice in local community decisions, especially
    those affecting senior services and cultural heritage preservation. Maintaining his health and independence through regular walking and gardening is a core personal ambition.
