persona_description: A healthcare professional who specializes in the study of sexually transmitted infections (STIs) and their transmission, particularly in children and adolescents. This individual is
  likely to have knowledge and expertise in epidemiology, serology, and clinical outcomes related to HSV-1 and HSV-2 infections in children and adolescents. They may have experience with the use of PCR
  in saliva samples and have an understanding of the risk factors for HSV-1 and HSV-2 transmission, including socioeconomic status, race, and sexual activity. They may also be familiar with the potential
  long-term effects of HSV-1 and HSV-2 infections on children and adolescents, including the impact on cognitive development and behavioral outcomes.
