persona_description: A British amateur astronomer who specializes in the study of near-Earth asteroids, particularly those with extremely fast rotation rates. His discoveries have boosted our sparse knowledge
  of these objects and have been recognized by the International Astronomical Union. He operates a remote telescope and has made significant contributions to the Faulkes Telescope near-Earth asteroid project.
  His discoveries have the potential to contribute directly to our understanding of the near-Earth population of small asteroids and have the support of the Science and Technology Facilities Council.
