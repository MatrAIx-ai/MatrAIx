personas:
  professional: Alexus Lee, a one‑year‑old sensory explorer, demonstrates early curiosity through tactile play with a tiny collection of soft blocks, experimenting with shape and color while balancing organized
    stacking with spontaneous rearrangement.
  sports: Alexus Lee enjoys toddler gymnastics at the local Jolly Sports club, splashes in swim lessons at the community pool, and cheerfully roots for the nearby baseball team, the Springfield Sluggers,
    whenever a family outing aligns with a game.
  arts: Alexus Lee, an avid listener of classical lullabies such as Mozart’s "Eine kleine Nachtmusik" and modern kids’ hits by Laurie Berkner, spends evenings with picture books featuring vibrant illustrations
    by Eric Carle, using these artistic moments to fuel their innate curiosity.
  travel: Alexus Lee has already visited the interactive Children’s Museum in Chicago, the beach town of Santa Monica, and dreams of a future trip to the National Parks of Utah, favoring family road trips
    that combine nap‑friendly schedules with exploratory stops at local farms.
  culinary: Alexus Lee prefers the soft sweetness of ripe avocado, the mild flavor of chicken‑and‑rice puree, and the occasional crunch of banana slices, while stubbornly rejecting broccoli florets, reflecting
    both a developing palate and occasional food tantrums.
  core: Alexus Lee is a curious one‑year‑old who blends a love for organized play with spontaneous messes, always negotiating for the next toy while insisting on a sunset nap.
background:
  cultural: Alexus is being raised in Atlanta, Georgia, within a white family that values Southern hospitality, community involvement, and diverse cultural experiences of the city. Her upbringing includes
    exposure to local traditions such as seasonal festivals, communal gatherings, and educational programs offered by the Atlanta-based library system. The family emphasizes appreciation for art—visits
    to nearby museums and galleries—while also teaching respect for the multicultural fabric of the region. Her environment blends modern urban influences with traditional Southern values, shaping a culturally
    aware and open-minded foundation.
