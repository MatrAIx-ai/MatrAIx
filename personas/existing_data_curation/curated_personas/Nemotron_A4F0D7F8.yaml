  career_goals: Although retired from formal employment, Jo Marie remains driven to leave a lasting impact on her community. She aims to compile a comprehensive oral history of Santa Rosa Beach, documenting
    stories from longtime residents and preserving them for future generations. She also aspires to mentor younger volunteers at the local historical society, sharing her research techniques and organizational
    strategies. Additionally, she plans to publish a modest cookbook featuring her signature seafood recipes, combining her culinary skills with her love of storytelling. On a personal level, she hopes
    to complete an advanced digital photography course, expanding her ability to capture the natural beauty of the Gulf Coast and share it through community exhibitions.
