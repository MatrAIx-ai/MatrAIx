personas:
  professional: Jo Cortman, a retired community organizer and oral history enthusiast, harnesses detailed project planning, budget management, and meticulous documentation to lead volunteer initiatives
    for the Santa Rosa Beach historical society, where they apply their competitive drive to ensure every exhibit exceeds expectations.
  sports: Jo Cortman enjoys low‑impact fitness through sunrise beach walks, seasonal kayaking with the Santa Rosa Bay Paddlers Club, and cheers on the Tampa Bay Buccaneers and Florida State Seminoles, while
    they occasionally join the local senior softball league, reflecting a methodical approach to staying active.
  arts: Jo Cortman expresses creativity through digital photography inspired by Ansel Adams and David Doubilet, reads historical fiction by Ken Follett and Hilary Mantel, and attends performances at the
    Gulf Coast Playhouse featuring works by Tennessee Williams, all of which feed their curiosity and critical eye, and they often share insights with the book club.
  travel: Jo Cortman plans detail‑rich road trips along the Gulf Coast, having explored Charleston, Savannah, and New Orleans, and dreams of visiting Iceland’s aurora borealis and the Bahamas for relaxed
    snorkeling, balancing meticulous itineraries with a desire for both adventure and tranquil retreat, and they frequently map out each stop weeks in advance.
  culinary: Jo Cortman specializes in Gulf seafood dishes such as grilled snapper with citrus‑marinade, stone crab claws with a mustard‑lime dip, and shrimp étouffée seasoned with fresh thyme and cayenne,
    cooking with locally sourced key lime, dill, and sea salt, and they enjoy hosting intimate dinner gatherings to showcase these flavors.
  core: Jo Cortman blends a calm, competitive spirit with a skeptical eye, nurturing a thriving garden, snapping sunrise photos, and meticulously preserving community stories, all while they occasionally
    indulge in a forgotten vitamin pill.
background:
  cultural: Jo Marie is a white American whose early years were spent in the Midwest, where she absorbed values of hard work, self‑reliance, and community involvement. After marrying her husband, she relocated
    to the Florida Panhandle, settling in Santa Rosa Beach in Walton County. The coastal culture there, with its emphasis on outdoor living, environmental stewardship, and close‑knit neighborhood ties,
    has shaped her lifestyle. She embraces a blend of Midwestern pragmatism and the relaxed, nature‑focused rhythm of the Gulf Coast, celebrating local traditions such as spring seafood festivals, volunteer
    beach clean‑ups, and regional culinary heritage. Her generation, born in the post‑World War II era, reflects a mix of traditional values and a growing curiosity about new ideas, which continues to influence
    her outlook.
