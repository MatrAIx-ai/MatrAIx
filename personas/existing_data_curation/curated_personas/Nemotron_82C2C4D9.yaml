  career_goals: Ovidio aims to transition into a leadership or training role within the customer service field before retirement, leveraging his decades‑long experience to design and deliver onboarding
    programs for new representatives. He aspires to become a Team Lead or Quality Assurance Supervisor, where he can champion compassionate customer interactions and implement process improvements that
    reflect his artistic sensibility. Simultaneously, he is exploring part‑time opportunities to mentor at a local community center, helping immigrant and senior populations navigate public services. Long‑term,
    he hopes to combine his passion for the arts and community service by establishing a small cultural workshop that offers art classes and digital literacy training to Dominican youth in the Volusia County
    area.
