personas:
  professional: Ovidio Hernandezsoto is a seasoned bilingual customer service specialist with over three decades of experience in Salesforce and Zoho, renowned for blending meticulous process design with
    an artistic sensitivity that drives compassionate onboarding programs and mentorship for new hires.
  sports: Ovidio Hernandezsoto enjoys watching the Miami Dolphins and the Tampa Bay Rays, participates in weekly senior softball leagues at the local park where his easygoing banter lifts team spirit, and
    stays fit through early‑morning walks in the nearby nature reserve accompanied by his dog.
  arts: Ovidio Hernandezsoto frequents the Orlando Museum of Art’s Caribbean exhibit, collects works by emerging Latinx painters, plays the güira at neighborhood festivals, and captures vivid photographs
    of Florida’s mangroves, which he showcases at community center events.
  travel: Ovidio Hernandezsoto prefers road trips that blend cultural immersion with relaxation, having recently driven to Cartagena to explore colonial architecture before returning to the Florida Keys
    for beachside reading, and dreams of a pilgrimage to a historic colonial city in the Caribbean where he can connect with diaspora families.
  culinary: Ovidio Hernandezsoto delights in cooking mangú with sautéed onions and fried cheese, tends a herb garden of cilantro and oregano for seasoning, and occasionally experiments with paella, though
    they habitually over‑season their sauces.
  core: Ovidio Hernandezsoto is a calm, community‑centric veteran of customer service who balances artistic curiosity with disciplined mentorship, never missing a domino game and habitually over‑seasoning
    his meals.
background:
  cultural: Ovidio was born to Dominican parents who immigrated to the United States during the 1970s and raised in a close‑knit Dominican household in Florida. His upbringing blended the vibrant traditions
    of the Caribbean with the multicultural environment of Deltona, Volusia County. He grew up speaking Spanish at home, celebrating Dominican holidays such as Día de la Independencia and Día de la Constitución,
    and participating in family gatherings centered around music, dance, and food—particularly dishes like sancocho, mangú, and pasteles. The value placed on community, respect for elders, and the concept
    of ‘familismo’ shaped his compassionate nature. Though he has integrated into American society, he maintains strong ties to the Dominican diaspora, regularly attending cultural festivals, supporting
    local Dominican businesses, and acting as a mentor for recent Dominican immigrants navigating civic processes. His cultural heritage informs his interpersonal style—warm, hospitable, and collaborative—while
    his exposure to broader American influences fostered an open‑minded curiosity toward art, new ideas, and diverse experiences.
