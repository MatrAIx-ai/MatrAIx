  hobbies: '[''Salsa and plena dancing'', ''Cooking Puerto Rican cuisine'', ''Backyard gardening (plantains, herbs)'', ''Community volunteering (church youth program)'', ''Participating in Fiestas Patronales'',
    ''Hand‑craft workshops'', ''Neighborhood clean‑up events'']'
  career_goals: Ramonita aims to move up to a shift supervisor role within the next two years, hoping to lead a small team and implement process improvements that reduce waste and increase efficiency. She
    also plans to enroll in a community college program for industrial technology to earn a certification that could open doors to quality control or production planning positions. Long‑term, she dreams
    of using her fabrication skills to start a small home‑based workshop creating custom metal décor for local businesses, blending her practical expertise with her love for community.
