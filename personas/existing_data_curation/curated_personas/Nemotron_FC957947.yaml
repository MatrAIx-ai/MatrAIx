personas:
  professional: Maribel Soriano, a veteran tailor with over thirty years of hand‑ and machine‑sewing expertise, blends meticulous pattern drafting, custom fittings, and traditional embroidery into sustainable
    couture while running an impeccably organized workshop and teaching sewing to seniors, and they approach each client consultation with calm precision.
  sports: Maribel Soriano enjoys solitary hikes along Griffith Park’s winding trails, practices weekly tai chi at a community center, cheers for the Los Angeles Dodgers and Los Angeles Lakers, and they
    join a senior softball league every spring for light competition.
  arts: Maribel Soriano frequents LACMA and the Mexican‑American Art Museum, draws creative inspiration from Frida Kahlo’s vibrant self‑portraits and Diego Rivera’s mural narratives, listens to Yo‑Yo Ma’s
    cello performances and the lively brass of Mariachi Vargas de Tecalitlán, and they sketch garment designs during museum visits, merging classical and folk aesthetics in their work.
  travel: Maribel Soriano prefers meticulously planned cultural trips, having explored Oaxaca’s weaving villages, the bustling markets of Mexico City, and Santa Fe’s art‑laden streets, and they are mapping
    a future voyage to Seville to study Spanish embroidery traditions.
  culinary: Maribel Soriano delights in preparing authentic mole poblano with dried chilhuacle peppers, Mexican cacao, and epazote, as well as chiles en nogada and handmade tamales using fresh masa, and
    they often host communal meals where they meticulously arrange each dish, though they sometimes forget to refrigerate leftovers promptly.
  core: Maribel Soriano, a methodical yet quietly curious artisan, weaves heritage stitching into modern sustainable fashion, balances disciplined budgeting with generous community workshops, and they find
    solace in solitary park walks and classical melodies.
background:
  cultural: Born to Mexican immigrant parents in East Los Angeles, Maribel grew up in a vibrant Chicano community where Spanish and English were spoken daily. Her family traditions—celebrating Día de los
    Muertos, quinceañeras, and other Mexican festivals—deeply influence her tailoring, especially the use of embroidered folk motifs and bright color palettes. Though she left school before completing ninth
    grade, she learned the craft of sewing from a family elder and later through apprenticeships. She maintains strong ties to her Mexican heritage while embracing the multicultural environment of Los Angeles,
    blending traditional techniques with contemporary fashion trends.
