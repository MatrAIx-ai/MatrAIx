  career_goals: Maribel aims to open a small boutique in East Los Angeles that showcases sustainable, culturally‑inspired clothing. She plans to launch a limited‑edition line that blends traditional Mexican
    embroidery with modern silhouettes, publish a guide on DIY sustainable tailoring for the Mexican‑American community, and offer weekly free sewing workshops for local youth. In the long term she hopes
    to document her techniques through video tutorials and mentor the next generation of artisans, preserving her craft within her community.
