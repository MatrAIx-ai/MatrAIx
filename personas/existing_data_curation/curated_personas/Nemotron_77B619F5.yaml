  hobbies: '[''walking'', ''herb gardening'', ''traditional Vietnamese cooking'', ''knitting and crocheting'', ''reading historical novels'', ''listening to Vietnamese music'', ''attending community potlucks'',
    ''volunteering at senior center food pantry'', ''participating in church services'']'
  career_goals: Thanh’s primary ambition is to remain a reliable pillar of her community while safeguarding her health and independence. She aims to expand her volunteer role at the Fortville senior center,
    mentoring other older adults in navigating health services and social resources. Her long‑term goal is to share her culinary knowledge by teaching small cooking workshops that celebrate Vietnamese traditions,
    thereby passing these practices to younger generations. Thanh also hopes to document her family’s oral histories and recipes, creating a modest booklet that can be distributed to the local Vietnamese‑American
    association. Maintaining a balanced daily routine that supports her physical well‑being and mental resilience remains at the core of her aspirations.
