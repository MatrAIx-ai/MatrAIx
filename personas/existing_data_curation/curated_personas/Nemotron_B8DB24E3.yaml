  career_goals: Though retired from formal employment, Latasha seeks to remain actively engaged and purposeful. She aims to expand her role as a mentor within the Grand Rapids senior center, guiding new
    volunteers and sharing her event‑planning expertise. She aspires to lead a community‑garden project that supplies fresh produce to low‑income households and provides a gathering space for neighbors.
    Improving her digital fluency is a personal goal, allowing her to host virtual story‑telling sessions for grandchildren and to archive her family recipes online. Latasha also wishes to document her
    life story and the oral histories of her generation, possibly publishing a small memoir or contributing to a local African‑American heritage archive. Beyond these, she prioritizes maintaining her health
    through regular check‑ups, staying physically active, and ensuring she can continue living independently.
