personas:
  professional: Latasha Ratliff, a retired community activist turned senior‑center mentor, leverages her decades of event‑planning and volunteer coordination to guide new helpers while maintaining a meticulous
    schedule that satisfies her love of structure.
  sports: Latasha Ratliff enjoys gentle walks along the Grand River Trail as part of the Grand Rapids Senior Walking Club, follows the Detroit Lions and the Michigan Wolverines for seasonal football excitement,
    and participates in a low‑impact senior bowling league during the winter months.
  arts: Latasha Ratliff finds solace in gospel choirs featuring artists like Kirk Franklin, reads historical fiction by authors such as Ken Follett, and attends local performances of the Grand Rapids Community
    Theatre, especially productions of classic dramas.
  travel: Latasha Ratliff prefers well‑planned, low‑stress trips, having visited Mackinac Island and Washington, D.C., and she dreams of a leisurely cruise along the Mississippi River, balancing her love
    for family visits with modest travel budgets.
  culinary: Latasha Ratliff excels at preparing comfort dishes like slow‑cooked brisket, collard greens simmered with smoked ham hocks, and fresh garden tomato soup, using ingredients such as kale, sweet
    potatoes, and fresh herbs harvested from her own yard.
  core: Latasha Ratliff blends routine with creativity, worrying over finances yet gifting hand‑crafted blankets, and anchors her community through garden harvests, soulful meals, and steadfast mentorship.
background:
  cultural: Latasha's cultural identity is rooted in the African‑American experience of the Great Migration. Her grandparents journeyed from the rural South to Michigan in search of industrial work and
    greater social opportunities, and they settled in a close‑knit black neighborhood of Grand Rapids. Growing up, she was immersed in the church – a cornerstone of community life – where gospel music,
    collective worship, and mutual support shaped her values. Family gatherings featured hearty soul‑food cooking, storytelling, and the transmission of oral histories that emphasized resilience, faith,
    and pride in heritage. In Grand Rapids, she has been an active participant in local Black cultural events such as the Black History Parade and the annual Juneteenth celebration, and she maintains ties
    with the NAACP and senior advocacy groups. These experiences have instilled in her a deep sense of communal responsibility, respect for tradition, and a commitment to preserving African‑American history
    for future generations while navigating the challenges of being a Black senior in a predominantly white Midwestern city.
