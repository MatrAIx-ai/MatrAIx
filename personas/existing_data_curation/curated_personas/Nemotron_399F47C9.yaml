  career_goals: Miguel aims to advance to a senior director role overseeing large‑scale, sustainable urban development projects that blend functional architecture with public art. He plans to complete a
    bachelor’s degree in Construction Management or Business Administration, and to earn PMP and LEED AP credentials. In the longer term, he envisions launching his own consultancy focused on eco‑friendly,
    community‑centered builds, and establishing a mentorship pipeline for Latinx youth entering the construction trades.
