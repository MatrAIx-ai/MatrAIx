personas:
  professional: Miguel Rivera, a seasoned construction manager with over twenty years of hands‑on leadership in commercial and residential projects, blends methodical budgeting, detailed scheduling, and
    LEED‑certified sustainable practices with a curious eye for public art, and they mentor diverse crews with compassionate, cooperative leadership.
  sports: Miguel Rivera enjoys a balanced fitness routine that mixes weekend pickup soccer games with solitary hikes on Springfield’s nature trails, roots for the St. Louis Cardinals and the Kansas City
    Chiefs, and commits to the local Springfield Soccer Club and Trail‑Walkers Association, using these activities to recharge after demanding site visits.
  arts: Miguel Rivera frequently immerses themselves in Springfield’s art scene, attending mural tours that showcase works by Banksy‑inspired street artists and classic pieces by Diego Rivera, while drawing
    creative inspiration from musicians such as Juanes, Carlos Vives, and the Afro‑Latin rhythms of Celia Cruz.
  travel: Miguel Rivera prefers thoughtfully planned trips that blend architectural inspiration with adventure, having explored Barcelona’s Gaudí masterpieces and the Tiwanaku ruins in Bolivia, while dreaming
    of a solo trek through Patagonia’s Torres del Paine and a culinary journey to Oaxaca, all balanced against a disciplined savings plan that prioritizes family commitments.
  culinary: Miguel Rivera enjoys cooking at an intermediate level, often reinventing classic dishes such as quinoa‑stuffed chile rellenos, Peruvian ceviche with mango, and avocado‑lime tacos al pastor,
    favoring ingredients like poblano peppers, cilantro, chipotle, and heirloom tomatoes, yet they have a bad habit of over‑seasoning and sometimes order fast‑food burgers when project deadlines loom.
  core: Miguel Rivera fuses a builder’s precision with an artist’s curiosity, relentlessly mentors youth while juggling late‑night photography sessions and a chronic tendency to skip sleep for project deadlines.
background:
  cultural: Miguel was raised in a bilingual Hispanic household with strong Mexican heritage, speaking Spanish at home while attending English‑language schools in the Midwest. This bicultural upbringing
    instilled a deep appreciation for both American and Latino traditions—he celebrates holidays like Thanksgiving and Christmas alongside Día de los Muertos and Cinco de Mayo, and family gatherings often
    revolve around shared meals and music. His fluency in Spanish and active involvement in Springfield’s Latino community shape his collaborative style and his commitment to supporting Latinx workers.
    Values such as family solidarity, community reciprocity, and respect for artistic expression are woven into his daily life and professional ethos.
