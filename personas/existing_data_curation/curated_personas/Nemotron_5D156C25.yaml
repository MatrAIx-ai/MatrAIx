  hobbies: '[''Abstract Painting'', ''Long‑Exposure Photography'', ''Science‑Fiction Writing'', ''Improv Comedy'', ''Chess'', ''Strategic Board Games'', ''Running'', ''Cycling'', ''Tech Meet‑ups'', ''Community
    Theater'', ''Cooking Experimental Meals'']'
  career_goals: William aims to become a Director of Operations within the next four to five years and eventually advance to a Vice President or Chief Operating Officer role at a mid‑size technology‑manufacturing
    firm, where he can shape corporate strategy, champion innovative process technologies, and mentor emerging managers. He also dreams of launching his own startup that reimagines supply‑chain transparency
    using blockchain, positioning himself as an industry thought leader through speaking engagements, published articles, and participation in professional networks.
