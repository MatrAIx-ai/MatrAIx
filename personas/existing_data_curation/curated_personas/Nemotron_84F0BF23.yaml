personas:
  professional: Teresa Blagburn, a retired educator and curriculum developer, blends meticulous lesson planning and differentiated instruction with an imaginative flair for integrating watercolor painting
    and creative writing into adult literacy workshops, while her organized and reliably collaborative nature ensures every community event runs like clockwork.
  sports: Teresa Blagburn enjoys low‑impact walking in the Duke Gardens, follows the Carolina Hurricanes for hockey thrills, cheers on the North Carolina Tar Heels during March Madness, and participates
    in a senior‑friendly bridge league that she likens to a cerebral sport.
  arts: Teresa Blagburn spends afternoons watercoloring Blue Ridge vistas while listening to the soft strings of Yo‑Yo Ma, reads Virginia Woolf and Robert Frost aloud at book club, and finds inspiration
    in the works of Claude Monet and local painter Janie Lyons at the Raleigh Little Theatre gallery openings.
  travel: Teresa Blagburn prefers leisurely road trips that balance gallery stops and garden tours, having recently explored Asheville’s folk art district, revisited historic Savannah for its moss‑draped
    squares, and dreaming of a spring pilgrimage to the cherry blossoms of Kyoto, all while budgeting within her modest retirement allowance.
  culinary: Teresa Blagburn, an adept home cook, delights in simmering shrimp and grits with fresh okra, baking buttery pecan pies, and seasoning her garden‑grown tomatoes with basil and thyme, yet she
    occasionally over‑salts her famous Southern sweet tea in pursuit of the perfect sweetness.
  core: Teresa Blagburn melds Southern hospitality with a quiet, inventive spirit, channeling her lifelong love of teaching into artistic mentorship, while her penchant for meticulous planning is occasionally
    softened by a sweet‑tooth indulgence.
background:
  cultural: Teresa was born and raised in the American South, likely in North Carolina, within a predominantly white, middle‑class community. Her upbringing emphasized Southern values of community, hospitality,
    and respect for tradition, balanced by a strong commitment to education. She earned her bachelor's degree in education at a state university, where progressive teaching methods broadened her perspective.
    Teresa's cultural identity blends traditional Southern customs—such as an appreciation for local history, regional cuisine, and folk music—with a lifelong dedication to learning and civic engagement.
    Living in Raleigh, she remains actively involved in the city’s growing arts scene and its efforts to preserve cultural heritage.
