  career_goals: In retirement, Teresa aims to mentor new teachers and help senior learners develop expressive writing and artistic skills through volunteer workshops. She aspires to write and publish a
    memoir that captures her experiences in education, the evolution of teaching methods, and personal reflections on a life of learning. Teresa also hopes to establish an intergenerational art and literary
    circle in Raleigh, fostering connections between seniors and younger students, and to contribute to preserving local history through her genealogical research.
