persona_description: A team of experienced robotics engineers, auto manufacturers, and government contractors who have been working on developing self-guided, wire-guided, and stripe-guided ground vehicles
  for decades. They are motivated to come up with some breakthrough technology to avoid deaths on everyday streets and highways. They have a one-year lead time to prepare for the DARPA competition, which
  is like teaching an infant with only rudimentary words and mobility how to identify a goal, interpret what they "see," distinguish classes of obstacles, select a path, control the vehicle, and get to
  the goal as fast as possible. The Axion Team, which had room for an observer and two programmers, was selected for the DARPA competition and successfully navigated around the obstacle course.
