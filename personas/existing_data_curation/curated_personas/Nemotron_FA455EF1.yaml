  career_goals: Although Michael is only six, he already expresses a clear desire to pursue a future that lets him help others in a predictable, organized way. He often talks about becoming a firefighter
    or a police officer because he admires their steady schedules and community service. He also mentions wanting to be a teacher or a veterinarian, citing the chance to care for children or animals. His
    long-term ambition is to hold a reliable job that contributes to the safety and well-being of his hometown, while allowing him to use his love of routine and his caring nature.
