personas:
  professional: Michael Clark, a budding LEGO architect in the making, showcases meticulous organization and compassionate cooperation as they build intricate structures during playtime.
  sports: Michael Clark participates in a neighborhood T‑ball league on Saturdays and they cheer for the local major league baseball team, the Chicago Cubs, embodying their love of organized activities
    and teamwork in small‑group settings.
  arts: Michael Clark delights in drawing animals from picture books and listening to folk legends like Dolly Parton and Mumford & Sons, and they weave their creative imagination with a structured approach
    to art projects.
  travel: Michael Clark loves short family nature walks to collect leaves and rocks, has visited the Grand Canyon on a memorable family trip, and they dream of exploring the Great Barrier Reef one day,
    balancing curiosity with a preference for familiar, well‑planned excursions.
  culinary: Michael Clark enjoys simple comfort foods such as mac and cheese with cheddar, chicken nuggets, and strawberry slices, often helping to assemble peanut butter‑and‑jelly sandwiches and practicing
    stirring pancake batter, and they bring a practical hands‑on approach to cooking.
  core: Michael Clark is a meticulous and compassionate six‑year‑old who blends a love of order with a caring heart, and they channel both into structured play, thoughtful saving, and gentle teamwork.
background:
  cultural: Michael was born and raised in Henderson, Kentucky, a tight-knit river town in Daviess County. His family reflects the region's blend of Southern hospitality and Midwestern practicality, emphasizing
    community involvement, polite manners, and a strong work ethic. He regularly attends a local elementary school where school-wide events such as storytime at the public library and community service
    projects are common. Family traditions include celebrating holidays with communal meals, church gatherings on Sundays, and attending local fairs and high school football games. These experiences shape
    Michael's appreciation for routine, his cooperative spirit, and his desire to maintain harmony within his close-knit community.
