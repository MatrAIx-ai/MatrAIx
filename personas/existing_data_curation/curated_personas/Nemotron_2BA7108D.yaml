  career_goals: Evan dreams of becoming an astronaut who explores space and leads daring missions, and he also loves the idea of being a firefighter who rescues people and gets applause from onlookers.
    He frequently says he wants to be a teacher or a story‑teller because he enjoys being the center of attention and sharing ideas with friends. His ambitions are colored by his competitive nature; he
    imagines winning awards and being recognized as the "best" in whatever role he chooses.
