personas:
  professional: Evan Blinson is a budding classroom organizer who skillfully lines up toys, leads circle time, and turns a love for structure and talkative charm into a miniature leadership role among peers.
  sports: Evan Blinson is an enthusiastic member of the Little Lions soccer team, loves cheering for the New York Yankees during game nights, and channels their competitive spirit into scoring goals while
    also enjoying weekend bike rides in the park.
  arts: Evan Blinson is a budding artist who loves drawing dinosaurs with crayons, sings along to Disney's "Let It Go," and idolizes the whimsical style of Dr. Seuss, often performing spontaneous dances
    for family.
  travel: Evan Blinson loves family road trips to the beach, especially building sandcastles at Santa Monica, and dreams of visiting Tokyo's cherry blossom festivals, preferring itineraries with playground
    stops and snack breaks.
  culinary: Evan Blinson delights in crunchy chicken nuggets with honey mustard, helps stir blueberry pancake batter on weekend mornings, and insists on extra cheese on every pizza slice, showcasing a picky
    but adventurous palate.
  core: Evan Blinson is a chatty, structure‑loving five‑year‑old who thrives on attention, channels competitive energy into games, but can be wary of new friends and sometimes clings to snack hoards.
background:
  cultural: Evan is raised in a middle‑class, white New England family in Westford, Massachusetts. His household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July
    with seasonal foods, decorations, and community gatherings. He attends a local community church’s Sunday school, where he learns basic stories and values. The family participates in neighborhood events
    like the town’s summer fair, the public library’s reading challenges, and the community soccer league, reflecting a cultural emphasis on routine, civic participation, and organized recreation common
    to suburban New England.
