  hobbies: '[''Fishing'', ''Kayaking'', ''Coastal jogging'', ''Science‑fiction reading'', ''Technical non‑fiction reading'', ''Raspberry Pi DIY projects'', ''Local maker meetups'', ''Strategy video‑games'',
