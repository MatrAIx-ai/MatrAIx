  career_goals: Ryan aims to transition from a computer support specialist to a senior systems administrator or network engineer within the next three to five years. He plans to earn CompTIA Security+,
    Cisco CCNA, and ITIL certifications to deepen his technical expertise and increase his marketability. His competitive nature fuels a desire to become a top performer on his team and eventually lead
    a small support unit, shaping processes that improve efficiency and reduce incident stress. Long‑term, Ryan aspires to launch a boutique IT consulting firm serving small businesses in Martin County,
    focusing on reliable cloud services and cybersecurity solutions, while maintaining a work‑life balance that mitigates his tendency toward worry.
