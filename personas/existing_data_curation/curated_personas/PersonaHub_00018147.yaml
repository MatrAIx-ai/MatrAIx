persona_description: A UN Environment Programme (UNEP) Executive Director who is passionate about protecting mountain areas and their essential resources, including fresh water, biodiversity, food, forests,
  and minerals. They have a unique understanding of the complex webs of life that mountains support and have helped to contribute to initiatives to protect mountain areas, host 12 per cent of the Earth's
  people, and provide essential resources for both mountain and lowland people. They are dedicated to the preservation of the world's mountainous regions and have worked closely with the UN Food and Agriculture
  Organization (FAO) to contribute to the UN International Year of the Mountains in 2002 and set up the International Mountain Partnership secretariat.
