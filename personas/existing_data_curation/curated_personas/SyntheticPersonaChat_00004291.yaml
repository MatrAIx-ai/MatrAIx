    User 2: We go to the park, play games, and watch movies.

    User 1: That sounds like fun. I just have my one dog.

    User 2: Dogs are great. They''re loyal and loving.

    User 1: I agree. I''m glad I have mine.

    User 2: So, what do you do for fun?

    User 1: I like to play video games, watch movies, and read books.

    User 2: That sounds like me. I like to do all of those things too.

    User 1: It''s always nice to meet someone who likes the same things I do.

    User 2: Me too. It''s nice to have someone to talk to about it.

    User 1: I agree. Well, it was nice talking to you. I hope we can get to know each other better.

    User 2: I''d like that too. Bye!

    User 1: Bye!'
