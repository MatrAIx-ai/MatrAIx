personas:
  professional: Isaiah Diaz, a veteran surveying and mapping technician with 35 years of field experience, blends a business degree with deep technical mastery in GPS/GNSS, drone photogrammetry, and GIS,
    leveraging curiosity and practicality to deliver precise spatial data while often battling disorganization and deadline pressure, and they continuously seek ways to mentor younger professionals.
  sports: Isaiah Diaz, an avid soccer enthusiast, plays midfield for a local adult league team called the Denver Strikers, organizes weekly pickup games at Cherry Creek Park, follows the Colorado Rapids
    in MLS, and hikes the Rocky Mountains each summer, often joining the Colorado Alpine Club, and they encourage teammates with an energetic, competitive spirit.
  arts: Isaiah Diaz, a passionate cultural participant, regularly attends Colorado’s Hispanic festivals featuring mariachi groups like Los Camperos, enjoys concerts by folk‑rock band The Avett Brothers,
    and showcases his own drone photography at community art nights, drawing inspiration from artists such as Ansel Adams and Frida Kahlo, and they often share stories of these experiences with friends
    at gatherings.
  travel: Isaiah Diaz, a seasoned explorer of the American West, has trekked the Rocky Mountain National Park, visited the Grand Canyon, and spent a month in Oaxaca to study regional cuisines, and now dreams
    of a guided trek through Patagonia while balancing limited travel budget and family commitments, and they meticulously plan itineraries using GIS tools.
  culinary: Isaiah Diaz, a weekend culinary craftsman, perfects mole poblano and hand‑rolled tamales using dried chilies, Mexican chocolate, and masa harina, frequently pairs them with Colorado trout grilled
    over an open fire, and delights friends with his signature salsa verde, though they occasionally over‑salt in experimental recipes.
  core: Isaiah Diaz, a 60‑year‑old mapping veteran who blends curiosity with practicality, thrives on social outdoor adventures, yet wrestles with organization, competitive instincts, and a penchant for
    splurging on tech and food, and they often rely on spontaneous decisions to shape their day.
background:
  cultural: Isaiah’s Mexican heritage remains a central part of his identity. Raised in a bilingual household, he celebrates Día de los Muertos, Cinco de Mayo, and family reunions with traditional foods
    and music. His roots trace back to Jalisco, and he maintains close ties with the local Hispanic community in Littleton, often participating in church events and cultural festivals. While fully integrated
    into Colorado life—enjoying outdoor activities and the state’s multicultural vibe—he preserves Mexican customs through language, cuisine, and community service, blending them seamlessly with his American
    professional experience.
