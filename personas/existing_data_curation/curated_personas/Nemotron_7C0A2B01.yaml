  hobbies: '[''Hiking in the Rockies'', ''Drone piloting for recreation'', ''Participating in local soccer leagues'', ''Cooking traditional Mexican cuisine'', ''Attending community cultural festivals'',
    ''Gardening'', ''Volunteering with youth STEM programs'', ''Landscape photography'', ''Exploring new mapping software'', ''Traveling to historic sites'']'
  career_goals: Isaiah aims to transition into a mentorship and consulting role over the next five years, helping younger surveyors adopt both traditional techniques and emerging drone‑based workflows.
    He plans to obtain a professional land surveyor license in Colorado and certify as a commercial drone operator. His ambition is to launch a boutique consulting service that offers precision mapping
    for local developers while promoting sustainable land‑use practices. He also hopes to contribute to his county’s GIS initiatives, positioning himself as a go‑to expert for integrating new technologies
    into public‑sector projects.
