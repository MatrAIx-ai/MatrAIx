personas:
  professional: Loida Tyberg, a community volunteer coordinator with a talent for event planning, bilingual outreach, and curating art exhibitions for seniors, blends her organized, methodical nature with
    a curious, open‑minded approach to new ideas, ensuring every festival runs smoothly while fostering intergenerational connections.
  sports: Loida Tyberg enjoys weekly salsa dance sessions with her local group, participates in the town’s senior walking club that follows the scenic routes of Litchfield Hills, roots for the New England
    Patriots and Boston Red Sox, and occasionally volunteers as a scorekeeper for community softball games, blending social activity with light exercise.
  arts: Loida Tyberg paints watercolor landscapes inspired by Connecticut’s autumn foliage and her childhood memories, curates small exhibitions featuring works by local seniors, draws creative inspiration
    from artists like Monet, O’Keeffe, and Frida Kahlo, and regularly attends talks at the New Haven Museum and the Yale University Art Gallery.
  travel: Loida Tyberg loves planning trips that combine cultural immersion and relaxation, has explored the historic streets of Old San Juan during a family reunion, dreams of visiting the vineyards of
    Tuscany, and frequently takes weekend drives to Mystic, Connecticut, to enjoy the maritime museums and seafood shacks.
  culinary: Loida Tyberg boasts a strong kitchen repertoire that includes arroz con gandules, pasteles, and garden‑fresh tomato basil soup, experiments with herbs like cilantro and oregano from her own
    plot, enjoys hosting potluck evenings where friends trade recipes, and occasionally over‑spices dishes in a quest for bold flavors.
  core: Loida Tyberg blends meticulous organization with boundless curiosity, turning community festivals into vibrant cultural showcases while juggling a love for watercolor, salsa, and garden‑grown herbs,
    all seasoned with a habit of occasional over‑commitment and a sweet spot for splurging on art supplies.
background:
  cultural: Loida's cultural background is rooted in her Puerto Rican heritage, passed down through her parents who migrated to the United States in the 1970s. Growing up in a bilingual household, she celebrated
    traditional festivals such as San Juan and Dia de Los Muertos, and she was raised with a strong Catholic faith that emphasizes family and community service. In Wolcott, she maintains these traditions
    by preparing holiday foods like arroz con gandules and pasteles, joining local Latino cultural events, and actively participating in the town's multicultural council. Her upbringing instilled a deep
    respect for storytelling, music, and craftsmanship, which she now shares through volunteer art workshops and intergenerational cooking classes.
