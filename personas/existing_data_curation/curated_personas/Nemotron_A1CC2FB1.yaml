  career_goals: Although Loida is currently not employed, she aims to expand her impact within the Wolcott community by launching a multicultural art series that showcases Latino heritage for senior audiences.
    She also aspires to mentor emerging volunteers at the local community center, develop a small grant proposal to fund a neighborhood garden, and eventually serve on the town's cultural advisory board.
    Her longer-term ambition is to preserve and share her family's artistic traditions while fostering intergenerational connections.
