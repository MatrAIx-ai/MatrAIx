personas:
  professional: Catalina Kirk, a seasoned market research analyst in her mid‑fifties, leverages her methodical, data‑driven mindset and competitive edge to design rigorous quantitative and qualitative studies,
    turn complex statistical findings into clear visual narratives, and lead cross‑functional teams toward actionable marketing strategies while meticulously meeting every deadline.
  sports: Catalina Kirk hits the fairways each Wednesday at the South Miami Country Club, follows the Miami Heat and Miami Dolphins with fervor, adds sunrise beachside bike rides to her routine in the winter
    months, and practices yoga three times a week to maintain flexibility and mental clarity.
  arts: Catalina Kirk engages with the arts by strolling the weekly Wynwood Art Walk, admiring murals by local artist Muriel Castelli, listening to Nina Simone’s classic jazz recordings, and occasionally
    attending a Miami Symphony Orchestra concert featuring Beethoven’s Ninth Symphony.
  travel: Catalina Kirk plans her vacations with meticulous itineraries, preferring a blend of cultural immersion and relaxation, such as her recent historical tour of Boston and a sun‑filled week on the
    Amalfi Coast, while always reserving a quiet beachfront suite for the couple’s weekend retreats in the Florida Keys.
  culinary: Catalina Kirk enjoys cooking Mediterranean‑style grilled snapper with fresh lime, cilantro, and olive oil, pairs it with quinoa tabbouleh, and relishes occasional indulgences like a classic
    tiramisu at upscale Miami restaurants, while maintaining a balanced diet that reflects her structured lifestyle.
  core: Catalina Kirk is a methodical market researcher whose love of precision spills into her finances, garden, and golf game, balanced by a quiet competitive streak and a habit of over‑scheduling her
    days.
background:
  cultural: Catalina is a White American who grew up in the southeastern United States and now resides in Fort Lauderdale, Florida. Her upbringing emphasized a blend of Midwestern work ethic and coastal
    lifestyle, fostering an appreciation for both structured, goal‑oriented environments and the relaxed, diverse culture of South Florida. While she identifies with mainstream American cultural norms,
    she also values the multicultural influences of her community, integrating local traditions and regional insights into both her personal and professional life.
attributes:
  skills: '[''Market Research Design'', ''Quantitative Analysis'', ''Qualitative Research'', ''Statistical Modeling (SPSS, R)'', ''Data Visualization (Tableau, PowerBI)'', ''Survey Development'', ''Consumer
    Insight Interpretation'', ''Competitive Intelligence'', ''Strategic Planning'', ''Project Management'', ''Report Writing'', ''Presentation & Storytelling'', ''Digital Marketing Analytics (Google Analytics,
    SEO)'', ''Stakeholder Communication'', ''Budget Forecasting'']'
  hobbies: '[''Golf'', ''Yoga'', ''Garden Planning'', ''Reading (Business & History)'', ''Puzzle Solving'', ''Mentoring College Students'', ''Community Art Walks'', ''Beachside Cycling'', ''Cooking (Methodical
    Recipes)'']'
  career_goals: Catalina aims to progress into a senior leadership role such as Director of Market Insights, where she can shape the organization’s data‑driven decision‑making framework. She is driven to
    build a high‑performing research team, implement standardized analytical processes, and mentor emerging analysts. Over the next five years she also envisions consulting for regional tourism and real‑estate
    firms in South Florida, leveraging her deep local market knowledge.
