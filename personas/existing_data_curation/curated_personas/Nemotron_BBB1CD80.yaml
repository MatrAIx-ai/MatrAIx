  career_goals: Although retired, Thomas aims to channel his expertise into lasting community impact. He plans to establish a mentorship program that pairs senior engineers with high‑school students interested
    in STEM, fostering the next generation of innovators. He also hopes to author a series of articles exploring the intersection of industrial engineering and visual art, drawing on his love for both fields.
    By organizing small exhibitions that showcase the industrial heritage of Schenectady through photography and sculpture, he seeks to preserve local history while inspiring appreciation for craftsmanship.
    Personally, Thomas is committed to maintaining his emotional well‑being through mindfulness practices and regular counseling, ensuring he can continue supporting his family and community with patience
    and compassion.
