  career_goals: Thomas aims to channel his lifelong passion for the arts into a sustainable, part‑time role that blends creativity with community service. He is working toward becoming a freelance art workshop
    facilitator for local community centers and senior programs, offering classes in painting, collage, and storytelling. To strengthen his ability to lead larger initiatives, he plans to earn a certificate
    in arts administration from a community college. In the longer term, Thomas envisions opening a modest studio‑gallery where he can exhibit his own work, host collaborative events, and mentor emerging
    artists from under‑served neighborhoods. He also hopes to develop a volunteer network that supports cultural festivals and public‑art projects across Philadelphia.
