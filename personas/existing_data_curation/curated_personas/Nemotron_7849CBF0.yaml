personas:
  professional: Amelia Persaud, an 11-year-old member of her school's robotics club, blends curiosity with practicality by designing reliable autonomous car prototypes, applying meticulous planning while
    still improvising when a sensor misbehaves.
  sports: Amelia Persaud, a spirited midfielder on the Sunset Junior Soccer League and a regular at the nearby horse‑riding stable, also follows the Arizona Cardinals and Arizona Diamondbacks, channeling
    that enthusiasm into weekend family hikes through the Sonoran Desert.
  arts: Amelia Persaud channels the vivid colors of the Sonoran dunes into watercolor sketches reminiscent of Georgia O'Keeffe, while evenings are spent swapping friendship bracelets and devouring fantasy
    sagas by J.K. Rowling and Rick Riordan.
  travel: Amelia Persaud prefers off‑road adventures, mapping family outings to places like Sedona’s Red Rock State Park and dreaming of a future trek to the Grand Canyon or the rainforests of Costa Rica,
    balancing school‑year schedules with spontaneous weekend campouts.
  culinary: Amelia Persaud loves the bold spice of chicken quesadillas and the sweet comfort of cinnamon‑sugar banana muffins, often assembling trail‑mix snack bags with dried apricots, almonds, and chocolate
    chips after school, while occasionally experimenting with strawberry‑infused smoothies.
  core: Amelia Persaud is a curious, socially energetic 11‑year‑old who blends practical problem‑solving with a love for desert‑inspired art, robotics, and spontaneous adventures, all while juggling occasional
    forgetfulness about chores.
background:
  cultural: Amelia was raised in Cave Creek, Arizona, a suburban community known for its desert scenery, outdoor recreation, and close‑knit neighborhood spirit. Her family observes typical American holidays
    and participates in local events such as the Fourth of July parade, community picnics, and the annual desert festival that celebrates the region's natural heritage. Growing up near the Sonoran Desert
    has cultivated a strong appreciation for the environment, and her school curriculum emphasizes respect for the diverse cultural histories of the Southwest, including Native American traditions. This
    blend of suburban American upbringing and regional desert influences shapes her worldview and values.
