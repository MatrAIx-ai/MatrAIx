  career_goals: Amelia aspires to a career that blends her love for the outdoors, animals, and science. She dreams of becoming a wildlife biologist who protects Arizona's desert ecosystems, or a veterinarian
    caring for animals she encounters on hikes. She is also intrigued by environmental engineering, hoping to design practical solutions for water conservation in arid regions. Her ambition is to turn her
    curiosity into tangible, community‑focused impact.
