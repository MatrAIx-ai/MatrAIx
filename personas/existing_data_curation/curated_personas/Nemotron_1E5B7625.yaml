personas:
  professional: Arturo Gonzalez is a seasoned technical drafter who leverages advanced AutoCAD, Revit and SolidWorks skills to create precise 2D and 3D models, while their curiosity drives experimentation
    with emerging BIM technologies and their practical mindset ensures cost‑effective, buildable solutions; they excel at mentoring junior staff and fostering collaborative problem‑solving, reflecting their
    compassionate and cooperative nature.
  sports: Arturo Gonzalez fuels their competitive spirit in the Westside Wolves, a local recreational soccer league, paddles the Housatonic River with the Connecticut Kayak Club on weekends, hikes the extensive
    Connecticut Trail System in the fall, and cheers for the New England Revolution during MLS season while also following the Boston Red Sox as a loyal baseball fan; they relish the camaraderie of team
    sports and the tranquility of solo paddling alike.
  arts: Arturo Gonzalez expresses creative energy through designing 3D‑printed scale models of historic Connecticut landmarks and regularly immerses themselves in live music at the Space, enjoying indie
    folk acts like The Avett Brothers and jazz virtuoso Kamasi Washington, while also showcasing quick wit at local trivia nights hosted by the Lyman Hall Pub; they find these artistic outings a perfect
    complement to their collaborative nature.
  travel: Arturo Gonzalez prefers flexible, group‑oriented weekend getaways that balance adventure and relaxation, having explored historic Boston, the maritime charm of Newport, and the scenic hiking trails
    of the White Mountains, while dreaming of a deep‑dive cultural tour of Barcelona’s architecture and a kayaking expedition on the Norwegian fjords; they often plan trips with friends, leaving room for
    spontaneous detours.
  culinary: Arturo Gonzalez delights in preparing traditional family recipes such as arroz con pollo, empanadas stuffed with seasoned beef, and plantain‑topped pork carnitas, skillfully blending cumin,
    cilantro, and fresh lime, and regularly hosts informal dinner gatherings where neighbors sample these dishes alongside locally sourced cheese plates; they take pride in pairing each dish with a thoughtfully
    selected wine or craft soda.
  core: Arturo Gonzalez is a sociable, curiosity‑driven drafter who balances meticulous design work with a love for community kayaking, spontaneous 3D‑printing projects, and lively dinner gatherings, all
    while navigating a relaxed approach to planning and occasional financial slip‑ups.
background:
  cultural: Arturo identifies as a white Hispanic, descended from Mexican‑American parents who settled in Fairfield County when he was a child. Raised in a bilingual household, he grew up celebrating both
    Mexican traditions—such as Día de los Muertos and cooking family recipes—and New England customs, like summer picnics and local sporting events. This dual cultural immersion fostered a strong sense
    of community, compassion, and a collaborative spirit that he carries into his professional and personal life. He maintains close ties with his extended family and actively participates in neighborhood
    festivals that blend his heritage with Connecticut's suburban culture.
attributes:
  skills: '[''AutoCAD'', ''Revit (BIM)'', ''SolidWorks'', ''Technical drawing'', ''Blueprint interpretation'', ''Construction documentation'', ''Project coordination'', ''Team collaboration'', ''Mentoring
    junior staff'', ''Problem solving'', ''Adaptability'']'
  hobbies: '[''Recreational soccer'', ''Kayaking on the Housatonic River'', ''3D printing and model building'', ''Cooking traditional Latin dishes'', ''Hiking in the Connecticut Trail System'', ''Volunteering
    at community design workshops'', ''Attending live music events'', ''Participating in trivia nights'']'
  career_goals: Arturo aims to transition from a skilled drafter to a BIM manager within the next three years, gaining certification in advanced BIM workflows and sustainability standards. He aspires to
    lead multidisciplinary design teams on residential and commercial projects that emphasize energy‑efficient construction, blending his practical drafting expertise with his curiosity about green building
    technologies. In the longer term, Arturo hopes to establish a small consulting practice that offers affordable design services to local community organizations, using his cooperative nature to mentor
    emerging designers and support neighborhood revitalization initiatives.
