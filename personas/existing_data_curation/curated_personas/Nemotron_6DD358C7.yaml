personas:
  professional: Dmitry Martin is a retired handyman who channels his decades of carpentry, automotive maintenance, and home‑repair expertise into methodical, on‑demand services for neighbors, while orchestrating
    volunteer events at the local senior center with the same precise planning that keeps his garden and model‑train layout thriving.
  sports: Dmitry Martin spends crisp mornings casting lines with the Independence Lake Anglers Club, watches the Oklahoma City Thunder each season, and joins a senior bowling league at the community center,
    balancing low‑impact activity with his love of the outdoors.
  arts: Dmitry Martin immerses himself in historical nonfiction by authors like David McCullough and Erik Larson, nurtures a meticulous model‑train layout inspired by classic railroading artisans, and finds
    quiet pleasure in the folk songs of Bob Dylan and Johnny Cash, often listening to them while woodworking.
  travel: Dmitry Martin favors well‑planned trips to heritage sites, having taken a scenic rail journey through the Swiss Alps, visited Colonial Williamsburg for its history, and explored Yellowstone National
    Park’s geysers, always returning home with a notebook full of observations for his community‑history project.
  culinary: Dmitry Martin delights in farm‑to‑table cooking, regularly preparing roasted beet and carrot salad, pan‑seared trout with lemon‑dill butter from his lake catches, and hearty bean chili seasoned
    with cumin and smoked paprika, a modest but reliable chef in his own kitchen.
  core: Dmitry Martin is a methodical, worry‑prone retiree who finds purpose in hands‑on projects, meticulous budgeting, and community service, yet struggles with anxiety whenever routine is disrupted.
background:
  cultural: Dmitry descends from a multi‑generational Midwestern family that relocated to Oklahoma during the Dust Bowl era. He was raised with traditional American values emphasizing self‑reliance, hard
    work, and community service. His cultural upbringing includes regular attendance at a local Methodist church, participation in county fairs and seasonal festivals, and celebrating national holidays
    with family and neighbors.
attributes:
  skills: '[''Home repair and carpentry'', ''Automotive maintenance'', ''Budgeting and personal finance'', ''Gardening and small‑scale farming'', ''Community volunteering coordination'', ''Basic computer
