  career_goals: Alisha aspires to turn her love for visual storytelling into a professional career. She hopes to attend an arts‑focused high‑school program and later earn a degree in Concept Art, illustration,
    or multimedia design. Her long‑term ambition is to work as a concept artist for video games or animated films, creating evocative environments and characters that reflect her fascination with abstract
    and speculative worlds. She also dreams of publishing a collection of sci‑fi/fantasy short stories and eventually blending her writing and art as a graphic novelist. In the nearer term, she plans to
    build a robust online portfolio, participate in youth art contests, and secure freelance commissions that allow her to develop industry‑relevant skills.
