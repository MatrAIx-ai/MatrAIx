  career_goals: Although only five, Steven already imagines big futures. He dreams of becoming an astronaut who can explore space, a painter who creates bright, imaginative murals, or a wildlife ranger
    who cares for animals. He expresses a desire to go to a school where he can learn many new things, visit museums, and perhaps one day work in a laboratory that studies nature. His curiosity and love
    of art steer him toward careers that blend discovery with creativity, while his sensitivity to stress fuels a wish for a supportive, kind environment in any future workplace.
