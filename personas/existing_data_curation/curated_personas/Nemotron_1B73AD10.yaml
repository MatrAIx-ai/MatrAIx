personas:
  professional: Steven Shaw, a budding five-year-old entrepreneur, runs a tidy lemonade stand at the backyard, meticulously arranging cups and napkins while flexibly improvising flavors, showcasing early
    organizational skills, curiosity, and a knack for balancing responsibility with playful creativity, and they always make sure to share a straw with a neighbor.
  sports: Steven Shaw, an enthusiastic five-year-old, swings a plastic bat for the Little League t-ball team at the community park, cheers loudly for the Iowa Hawkeyes football squad on Saturdays, and idolizes
    Des Moines Menace soccer players, balancing team play with spirited fandom, and they proudly wear a Hawkeyes cap to practice.
  arts: Steven Shaw, a curious five-year-old, spends afternoons drawing farm landscapes with crayon, dances to the upbeat folk tunes of The Lumineers, and eagerly watches Sesame Street episodes featuring
    Lin-Manuel Miranda's guest appearance, letting music and art fuel their imagination, and they often hum the melodies while coloring.
  travel: Steven Shaw, a bright five-year-old, loves weekend trips to the county fair's pumpkin patch, relishes family visits to the Iowa State Fair's butter sculpture exhibit, and dreams of exploring the
    bright lights of Times Square in New York, balancing short local adventures with big-city aspirations, and they often draw maps of the fairgrounds to share with friends.
  culinary: Steven Shaw, a picky yet adventurous five-year-old, adores buttery popcorn, apple slices with peanut butter, and helps stir pancake batter for breakfast, while proudly insisting on adding a
    sprinkle of cinnamon to macaroni and cheese, showcasing a developing palate that mixes comfort foods with experimental flavors, and they always ask for extra cheese on pizza.
  core: Steven Shaw, a five-year-old curiosity-driven explorer, balances meticulous piggy-bank saving with occasional candy splurges, manages mild allergies with colorful charts, leads a t-ball team while
    cheering Iowa Hawkeyes, and finds joy in farm-inspired art and family fair trips, and they often wonder about the world beyond the cornfields.
background:
  cultural: Steven is raised in a white, Midwestern American family in Clive, Iowa, a close‑knit community known for its modest, friendly atmosphere. His household values community involvement, independence,
    and a strong work ethic, often participating in local church gatherings, school events, and seasonal festivities such as pumpkin patches, county fairs, and holiday parades. Family life includes frequent
    visits to grandparents who share stories of Iowa's agricultural heritage, and the family encourages creative expression through art and music at home. While typical of American cultural practices, Steven’s
    upbringing also emphasizes appreciation for nature, simple pleasures, and the supportive, cooperative spirit common in small‑town Iowa.
