  hobbies: '[''Group hiking on local trails'', ''Dog‑sledding club'', ''Traditional beadwork and storytelling'', ''Karaoke evenings'', ''Adult recreational softball league'', ''Volunteer work at community
    food bank'', ''Yoga for stress relief'', ''Fishing on the Chena River'', ''Attending cultural festivals'', ''Reading mystery novels'']'
  career_goals: Yan Kay aims to move into a supervisory or training role within the Fairbanks transit system, where she can design and implement more structured operating procedures that improve reliability
    and passenger safety. She plans to obtain a GED and pursue a certificate in transportation logistics to strengthen her credentials. She also hopes to become a liaison between the transit authority and
    the local Alaska Native community, advocating for culturally appropriate services and potentially launching a community‑focused shuttle program that highlights native heritage sites.
