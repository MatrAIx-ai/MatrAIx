  hobbies: '[''Watercolor painting'', ''Quilting'', ''Gardening'', ''Reading historical fiction'', ''Attending community theater'', ''Senior dance classes'', ''Listening to art and philosophy podcasts'',
    ''Traveling to museums'', ''Participating in a choir'', ''Collecting vintage postcards'']'
  career_goals: Even though she is retired, Karen aims to expand her impact as a senior advisor on the local historical society board, championing the preservation of community narratives. She aspires to
    launch a recurring intergenerational art program at the senior center, fostering mentorship between older adults and youth. Additionally, Karen hopes to author a collection of oral histories from long‑time
    residents of Corona, and to continue serving as a trusted mentor for new volunteers.
