  career_goals: Suria’s primary ambition is to stay active, healthy, and engaged in her community while supporting her adult children and grandchildren. She aims to continue volunteering at the senior center,
    mentor younger volunteers, and expand her genealogy project to create a family archive. She also wishes to learn simple digital photo‑organization techniques to preserve family memories and perhaps
    teach her grandchildren basic cooking and sewing skills. Maintaining independence and a stable routine remains a central goal as she ages gracefully.
