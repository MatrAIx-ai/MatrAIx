persona_description: A historian or a geographer who is interested in the history and development of cities, particularly those in China. They are fascinated by the transformation of Pudong and the Shanghai
  Bund, and are eager to learn more about the city's past and its role in China's modern history. They appreciate the use of historical photographs and panoramas in understanding the city's development.
  They are also interested in the work of Kung Tai studio, which specializes in producing multipart panoramas of the Bund.
