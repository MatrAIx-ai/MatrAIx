  career_goals: Josephine dreams of a future where she can combine her love for structure, helping others, and curiosity about how things work. She aspires to become a teacher or an environmental scientist,
    envisioning herself leading small, focused groups of students in hands‑on learning projects. In the short term, she aims to make the honor roll, win a school science fair, and mentor a younger classmate
    in a reading club, building a foundation for her long‑term goal of contributing positively to her community through education and stewardship of the natural world.
