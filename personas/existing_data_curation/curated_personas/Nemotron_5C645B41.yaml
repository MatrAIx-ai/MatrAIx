personas:
  professional: Josephine Everett, an aspiring junior astronomer who dreams of following in Dr. Mae Jemison’s footsteps, channels her methodical precision from LEGO building and chess into meticulously
    drafting star‑mapping journals; they apply the same organized, goal‑focused approach to community garden projects.
  sports: Josephine Everett stays active by swimming laps at the Fort Washington community pool each Tuesday and Thursday, playing on the Fort Washington Youth Soccer team in the fall, and cheering for
    the Washington Capitals and Washington Wizards, which they follow with disciplined, goal‑oriented enthusiasm, applying their mindset to both practice routines and game day celebrations.
  arts: Josephine Everett immerses herself in creative worlds by devouring the "Harry Potter" series, listening to Beyoncé and Stevie Wonder, drawing inspiration from Jacob Lawrence’s paintings at the nearby
    museum, and attending the Washington National Opera’s matinee performances, which they say fuel their artistic imagination.
  travel: Josephine Everett prefers meticulously planned weekend getaways, such as day trips to the Smithsonian’s National Museum of History and Culture in Washington, D.C., family hikes at Great Falls
    Park, and dreaming of a future visit to the Kennedy Space Center, where they balance their love for structured exploration with the occasional spontaneous splash at Chesapeake Beach.
  culinary: Josephine Everett delights in helping prepare Sunday dinner staples like collard greens simmered with smoked turkey and sweet potato pie, while they also enjoy crafting simple garden salads
    with cherry tomatoes, cucumber, and a drizzle of olive oil, showcasing their budding cooking skills and love for fresh, homegrown ingredients.
  core: Josephine Everett blends a methodical love for LEGO and chess with a secret habit of staying up past bedtime to finish the next chapter of their favorite book; they embody a uniquely organized yet
    delightfully curious ten‑year‑old.
background:
  cultural: Josephine is a Black African‑American growing up in Fort Washington, MD, a vibrant part of Prince George's County with a strong sense of community and cultural pride. Her family celebrates traditions
    such as Juneteenth, family Sunday dinners with soul‑food dishes, and attending local church events that emphasize service and togetherness. She participates in school programs that highlight African‑American
    history, often visiting the National Museum of African American History and Culture in nearby Washington, DC. Influenced by the region’s emphasis on education, Josephine looks up to Black scholars and
    professionals like Dr. Mae Jemison and feels a deep connection to the storytelling, music, and communal values passed down through generations in her community.
