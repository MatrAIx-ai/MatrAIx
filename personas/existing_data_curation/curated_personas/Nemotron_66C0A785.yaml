  hobbies: '[''Beach Walks'', ''Nature Photography'', ''Journaling'', ''Reading'', ''DIY Home Décor'', ''Cooking'', ''Local Music Festivals'', ''Yoga'', ''Volunteering at Animal Shelter'', ''Puzzle Games'']'
  career_goals: Cynthia aims to move from a receptionist role to an office manager position within the next three to five years. She plans to complete a bachelor’s degree in Business Management and obtain
    a Certified Administrative Professional (CAP) credential to strengthen her organizational and leadership capabilities. She also seeks to develop expertise in modern CRM and scheduling platforms, enabling
    her to streamline office processes. Flexible work arrangements, such as hybrid or remote opportunities, appeal to her desire for autonomy, and she hopes to eventually transition into a community liaison
    or customer experience manager role for a hospitality or tourism organization in the Fort Pierce area.
