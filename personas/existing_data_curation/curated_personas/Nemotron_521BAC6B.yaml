  career_goals: Marieli aims to re-enter the workforce by first completing her GED and then obtaining certifications in culinary arts and community health. She envisions launching a home‑based catering
    venture that showcases her family’s traditional recipes while offering nutritious meals to local families. In the longer term, she hopes to work as a bilingual community outreach coordinator or health
    worker, helping Spanish‑speaking residents access local services. Her ambition is driven by a desire for financial independence, a stable future for her children, and the intention to serve as a role
    model for other women in her community.
