personas:
  professional: Marieli Maldonadoperez is a community‑focused aspiring culinary and health professional who leverages meticulous budgeting, bilingual communication, and conflict‑resolution skills to coordinate
    neighborhood food‑bank events, while they channel a competitive streak into earning certifications and launching a home‑catering business that blends traditional family recipes with nutrition guidelines.
  sports: Marieli Maldonadoperez enjoys leisurely walks along the Oklahoma plains for cardio, follows the Oklahoma City Thunder and the Oklahoma Sooners football team, and participates in a local adult
    soccer league on weekends, balancing a competitive spirit on the field with a practical, low‑impact fitness routine.
  arts: Marieli Maldonadoperez immerses herself in regional folk music from her family's origins, curating playlists that feature Lila Downs for traditional tones and Iron & Wine for contemporary folk,
    while also attending occasional community theater productions that showcase classic works by Lorca and modern plays by Aaron Sorkin.
  travel: Marieli Maldonadoperez favors short‑term road trips, having explored Santa Fe and the Hill Country of Texas, and they dream of a culturally rich pilgrimage to Oaxaca but must prioritize budget‑friendly
    weekend getaways to nearby destinations like Kansas City and the Ozarks due to family responsibilities.
  culinary: Marieli Maldonadoperez passionately prepares corn‑based dishes such as tamales, chiles rellenos, and pozole, expertly seasoning them with chilies, cilantro, and dried cacao, and they rate their
    cooking skills as advanced for home cooking while still occasionally burning the edges of tortilla chips in their haste.
  core: Marieli Maldonadoperez balances a fierce drive for financial independence and community impact with a constant undercurrent of worry, turning every household chore into a strategic step toward launching
    a neighborhood‑centric catering venture.
background:
  cultural: Marieli is a first‑generation American of Hispanic descent, with family roots in Mexico. She grew up in a bilingual household where Spanish was spoken at home and English at school, fostering
    a deep appreciation for both cultures. Strong family ties and the value of familismo shape her daily life, and she celebrates holidays such as Día de los Muertos, Navidad, and Cinco de Mayo with traditional
    foods, music, and rituals. Her Catholic upbringing informs her sense of service and community. While she embraces the rural Oklahoma lifestyle through gardening, outdoor activities, and a close‑knit
    small‑town community, she also maintains cultural connections through language, cuisine, and participation in local Latino events.
