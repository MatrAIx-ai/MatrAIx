personas:
  professional: Silvestre Garcia, a 19‑year‑old aspiring graphic designer, blends street‑level sketching, watercolor washes, and digital illustration in Procreate to craft culturally resonant branding concepts,
    while their skeptical eye and competitive drive push them to secure an internship at a New York studio and they meticulously curate a portfolio that balances creative autonomy with market demand.
  sports: Silvestre Garcia follows the New York Islanders hockey team and the Long Island Ducks baseball club, joins a neighborhood pick‑up basketball league on weekends, and supplements their routine with
    salsa practice during family gatherings, and they view movement as both recreation and a strategic outlet.
  arts: Silvestre Garcia engages deeply with experimental hip‑hop artist Flying Lotus, avant‑garde jazz composer Kamasi Washington, and visual provocateur Banksy, while devouring speculative fiction by
    Octavia Butler and philosophy by Judith Butler, and they regularly attend low‑key openings at the Long Island Museum of Art and poetry slams at The Ink Spot.
  travel: Silvestre Garcia prefers independent backpacking trips that blend city art scenes and culinary forays, having explored the street murals of Berlin, the jazz clubs of New Orleans, and a weekend
    photo‑walk through Savannah's historic district, while budgeting through student discounts and they are planning future visits to Kyoto and Barcelona for their vibrant street culture.
  culinary: Silvestre Garcia enjoys cooking arroz con gandules, alcapurrias, and tostones to stay connected to family flavors, while also experimenting with miso ramen and Thai green curry, and they boast
    a functional kitchen skill level that swings between meticulous plating and hurried stovetop improvisation.
  core: Silvestre Garcia is a curiosity‑driven, introverted 19‑year‑old who balances competitive gaming with thoughtful watercolor sketches, cautious budgeting with occasional splurges, and a disciplined
    health routine marred by occasional neglect, and they chart a path toward a freelance design career.
background:
  cultural: Silvestre was raised in a close‑knit Puerto Rican family in Shirley, surrounded by both the rhythms of island music and the multicultural tapestry of Long Island. Bilingual Spanish and English
    flow naturally at home, where celebrations of Nochebuena, plena, and bomba blend with Catholic traditions and local community festivals hosted by the Puerto Rican Association of Long Island. This bicultural
    upbringing instilled a strong sense of resilience, pride in his heritage, and an appreciation for vibrant color palettes and storytelling, which now permeate his artwork and personal worldview.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Traditional sketching and watercolor'', ''Basic photography and Lightroom editing'', ''Video editing (Adobe Premiere)'', ''HTML/CSS website
