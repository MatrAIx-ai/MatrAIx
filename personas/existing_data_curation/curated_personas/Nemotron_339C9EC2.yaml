  hobbies: '[''Sketching urban landscapes'', ''Street photography'', ''Listening to experimental hip‑hop/jazz'', ''Reading speculative fiction and philosophy'', ''Competitive online gaming'', ''Journaling'',
    ''Attending small art exhibitions and poetry readings'', ''Learning salsa'', ''Cooking traditional Puerto Rican dishes'']'
  career_goals: Silvestre intends to enroll in a community‑college graphic design program after graduation, with the goal of securing an internship at a New York‑based design studio. He aims to build a
    professional portfolio that showcases culturally resonant branding work for Latinx small businesses, eventually transitioning to freelance projects and launching his own boutique studio. Balancing creative
    autonomy with financial stability, he also hopes to exhibit his personal artwork in local galleries and contribute to community cultural initiatives on Long Island.
