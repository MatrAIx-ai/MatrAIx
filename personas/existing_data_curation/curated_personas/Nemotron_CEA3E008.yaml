personas:
  professional: Jeffrey Gaskins, an 18‑year‑old computer science major, leverages their strong Python and JavaScript skills, meticulous project planning, and competitive mindset to excel in data‑driven
    software development while seeking structured mentorship and predictable workflows.
  sports: Jeffrey Gaskins enjoys solo jogging on the Gainesville Greenbelt and disciplined weight training at the campus gym, participates in the university’s cross‑country club, follows the Florida Gators
    football, the Jacksonville Jaguars, and Orlando City SC, and occasionally joins a local pickup basketball game for strategic competition.
  arts: Jeffrey Gaskins curates playlists that blend Kendrick Lamar, J. Cole, D'Angelo, Miles Davis, and Sade, frequently attends the annual Gainesville Jazz & Blues Festival, and immerses themselves in
    non‑fiction works on psychology and Southern history as well as occasional sci‑fi novels to fuel their creative thinking.
  travel: Jeffrey Gaskins prefers low‑cost weekend road trips to the nearby Everglades and Charleston’s historic district, plans to attend a tech conference in San Francisco next summer, and dreams of a
    future study‑abroad stint in Berlin to explore its vibrant coding community, all while balancing their limited student budget.
  culinary: Jeffrey Gaskins enjoys cooking modest portions of gumbo and collard greens seasoned with okra, smoked paprika, and shrimp, experiments with homemade cornbread, balances their diet with quick
    protein‑rich meals like grilled chicken and quinoa, and occasionally treats themselves to a local fried‑catfish sandwich.
  core: Jeffrey Gaskins is a disciplined yet anxiety‑prone young coder who thrives on structured projects, meticulously budgets their limited funds, and seeks calm through solitary strategy games, while
    occasionally over‑analyzing both code and life.
background:
  cultural: Jeffrey was raised in a close-knit African American family in the Gainesville area, where community, faith, and education were emphasized. His parents instilled a strong work ethic and a respect
    for academic achievement, encouraging him to pursue college despite socioeconomic challenges. Growing up, he attended a local church that blended contemporary gospel music with traditional spirituals,
    shaping his appreciation for hip-hop, jazz, and R&B. He is connected to the broader Black cultural heritage of the South through family stories, celebrations of Juneteenth, and participation in community
    events like the Gainesville African American Festival. These experiences have given him a sense of identity rooted in resilience and collective progress. While navigating a predominantly white university
    environment, Jeffrey often reflects on the importance of representation and mentorship for Black youth in STEM fields, informing both his personal ambitions and his involvement in volunteer tutoring
    programs at the local community center.
