  career_goals: Jeffrey aims to complete a bachelor's degree in Computer Science within the next three years, focusing on software development and data analytics. He plans to secure a summer internship
    at a tech firm where he can contribute to real-world projects and strengthen his coding portfolio. In the medium term, he aspires to join a structured development team as a junior software engineer,
    valuing clear project roadmaps and mentorship. Over the next decade, his ambition is to become a senior engineer or data scientist, leading small, high-impact teams that deliver reliable, data-driven
    solutions. He also entertains the idea of launching his own tech startup that provides affordable data management tools for community organizations, which would combine his competitive drive with his
    desire to make a tangible, structured impact. Throughout his career, he prioritizes roles that offer predictable workflows, opportunities for measurable achievement, and a supportive environment to
    manage his sensitivity to stress.
