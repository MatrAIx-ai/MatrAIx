personas:
  professional: Lorraine Hayes, an aspiring visual storyteller, channels their curiosity and meticulous organization into curating weekly reading circles at the Monroe Public Library while experimenting
    across watercolor, digital illustration, and short-form fiction, and they see themselves pursuing a future career in illustration and narrative design.
  sports: Lorraine Hayes, a regular participant in the Monroe Trail Runners club, enjoys Saturday morning hikes along the local nature trails, plays on the school’s intramural soccer team, and they passionately
    follow the New Orleans Pelicans and LSU Tigers, aligning their organized approach to fitness with a love for community sport spirit.
  arts: Lorraine Hayes, whose artistic palate blends classic and contemporary influences, studies the watercolor techniques of John Singer Sargent, draws digital inspiration from illustrator James R. Eads,
    reads fantasy works by Ursula K. Le Guin and N.K. Jemisin, and they fuel their creative sessions with Louisiana blues legends Dr. John, zydeco pioneer Clifton Chenier, and jazz vocalist Norah Jones.
  travel: Lorraine Hayes, an avid planner, delights in weekend trips to the French Quarter of New Orleans and guided canoe tours of the Atchafalaya Basin, dreams of a family road-trip to the Gulf Coast
    beaches, and they keep a scrapbook of future aspirations that include visiting Washington, D.C.'s Smithsonian museums, all while balancing school schedules and a modest travel budget.
  culinary: Lorraine Hayes, a budding home-chef, loves the complex flavors of gumbo and jambalaya, experiments with making beignets from scratch using powdered sugar and vanilla, often incorporates fresh
    okra and crawfish in their dishes, and they occasionally forget to set the timer while simmering gumbo, resulting in a burnt bottom that they jokingly call their signature 'crispy crust.'
  core: Lorraine Hayes is a curious, organized teen who harmoniously blends a love for art, community service, and meticulous budgeting while navigating typical adolescent quirks like late-night sketching
    and occasional sleep neglect, and they approach each day with steady optimism.
background:
  cultural: Lorraine was raised in a white, Southern Baptist family in Monroe, Louisiana. Her upbringing reflects the region's emphasis on hospitality, close‑knit community ties, and appreciation for Southern
    cuisine such as biscuits, gumbo, and cornbread. She participates in local cultural traditions, including Mardi Gras celebrations and the annual Art Center exhibitions, which deepen her exposure to the
    state's rich artistic and musical heritage. The blend of Southern values, Creole influences, and the vibrant arts scene of the Red River area shapes her worldview and fuels her passion for creative
    expression.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration (Procreate)'', ''creative writing'', ''reading comprehension'', ''time‑management'', ''project planning'', ''Microsoft Office'',
