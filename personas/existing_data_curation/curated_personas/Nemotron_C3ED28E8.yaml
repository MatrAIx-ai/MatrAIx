  hobbies: '[''sketching'', ''watercolor painting'', ''digital art (tablet)'', ''reading fantasy novels'', ''creative writing'', ''listening to blues/jazz/zydeco'', ''piano playing'', ''nature photography'',
    ''volunteering at library'', ''church youth group activities'']'
  career_goals: Lorraine dreams of pursuing a career that blends her love for art and community service. She aims to study fine arts or graphic design in college, with the long‑term goal of becoming a museum
    curator or art therapist who can bring creative experiences to underserved youth. She also envisions creating her own digital art studio where she can design illustrations for books and games, while
    organizing workshops that encourage other teenagers to explore artistic expression.
