    outreach coordination'', ''Telemedicine consultation'', ''Procedural skills (joint aspiration, skin biopsy)'', ''Patient education material development'', ''Cultural competence in care delivery'', ''Clinical
    research literature review'']'
  hobbies: '[''Reading historical non‑fiction'', ''Playing chess'', ''Gardening (herbs and vegetables)'', ''Cooking Honduran cuisine'', ''Walking along the Malden River Trail'', ''Nature photography'',
    ''Volunteering for Spanish health‑literacy workshops'', ''Listening to traditional Honduran music'']'
  career_goals: At 61, Jesús aims to leverage his extensive experience to shape the next generation of physicians and to enhance health equity for the growing Honduran and broader Latinx community in Malden
    and the greater Boston area. He seeks to establish a community‑based chronic disease prevention program, lead a mentorship clinic for residents and international medical graduates, publish articles
    on culturally tailored patient communication, and advocate for policies that reduce language barriers in healthcare. He also aspires to transition to a part‑time teaching role while maintaining a small
    private practice that allows him to continue providing compassionate, evidence‑based care, all while balancing his curiosity for medical advancement with practical, patient‑focused outcomes.
