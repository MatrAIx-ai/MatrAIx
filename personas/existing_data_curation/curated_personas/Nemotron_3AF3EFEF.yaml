    (urban landscapes)","Attending art gallery openings"]'
  career_goals: Katherine aims to translate her humanities background and organizational talent into a career in community outreach and public affairs. She plans to secure an entry‑level program coordinator
    role with a non‑profit focused on youth empowerment in Oklahoma, then pursue a Master’s in Public Administration to move into senior program director positions. Long‑term, she hopes to influence policies
    that expand access to arts education and cultural resources for underserved communities.
