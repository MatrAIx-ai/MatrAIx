personas:
  professional: Katherine Jones is a budding community outreach coordinator who blends rigorous research, bilingual communication, and event‑planning expertise with a natural flair for rallying volunteers,
    and they see themselves securing an entry‑level non‑profit role in youth empowerment.
  sports: Katherine Jones channels their energy into weekend hikes through Wichita Mountains with the Red Rock Trailblazers club, occasional 5‑k runs with the Oklahoma City Runners group, and fervently
    supports the Oklahoma City Thunder and the Oklahoma Sooners, while they treat personal fitness as a complementary extension of their outdoor adventures rather than a competitive sport.
  arts: Katherine Jones immerses themselves in the Oklahoma art scene by attending monthly openings at the Oklahoma Contemporary, photographs urban skylines inspired by Annie Leibovitz, writes short stories
    influenced by Sally Rooney, recites poetry from Ocean Vuong and Rupi Kaur, and participates in community theatre workshops where they perform scenes from contemporary playwrights, forging a personal
    identity that intertwines literary, visual, and performative arts.
  travel: Katherine Jones prefers road‑trip adventures on a modest budget, planning trips with Google Trips and staying at budget motels, they have explored the Wichita Mountains, the Texas Hill Country,
    and a music‑filled weekend in Austin, yet they long to experience the Broadway lights of New York City and the historic plazas of Granada, Spain, balancing wanderlust with the financial constraints
    of an 18‑year‑old student.
  culinary: Katherine Jones enjoys cooking simple yet flavorful dishes such as avocado toast topped with feta and chili flakes, chicken enchiladas seasoned with cumin and chipotle, and a fresh mango salsa,
    they are adept with Adobe Photoshop but occasionally over‑cook rice when multitasking, and they love discovering new food trucks at the Tulsa Food Truck Festival where they relish kimchi tacos.
  core: Katherine Jones is a pragmatic idealist who blends curiosity with methodical organization, channeling their love for arts and community into ambitious outreach goals while occasionally succumbing
    to coffee‑fuelled late‑night chaos.
background:
  cultural: Katherine was raised in a middle‑class white family in Oklahoma City, where Midwestern values of community, reliability, and self‑reliance are emphasized. Her upbringing blended suburban stability
    with exposure to the city’s diverse cultural offerings, fostering an appreciation for both traditional American customs and the arts. She identifies with the regional mix of Southern hospitality and
    Midwest pragmatism, which shapes her collaborative yet assertive approach to projects and relationships.
