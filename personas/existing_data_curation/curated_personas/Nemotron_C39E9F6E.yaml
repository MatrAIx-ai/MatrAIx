personas:
  professional: Miguel Echavarria is a seasoned environmental engineer who blends rigorous technical expertise in water remediation with business‑savvy strategic planning to lead structured sustainability
    projects, mentor junior staff, and translate complex regulatory requirements into clear, actionable plans for diverse stakeholders.
  sports: Miguel Echavarria enjoys early‑morning hikes in the Flint Hills, rides with the Wichita Community Cycling Club in spring, follows the Kansas City Chiefs and Kansas City Royals as his favored professional
    teams, and keeps fit through weekly bird‑watching walks and occasional weekend pickup basketball games.
  arts: Miguel Echavarria expresses his creative side by playing acoustic guitar at family gatherings and listening to musicians such as Juan Gabriel, Paco de Lucía, and Carlos Santana, while regularly
    attending local mariachi performances and community theater productions featuring actors like Edward James Olmos, which deepen his cultural connection.
  travel: Miguel Echavarria prefers meticulously planned road trips that blend scenic nature with cultural immersion, having revisited Oaxaca for its culinary roots, trekked the Grand Canyon in summer,
    and dreaming of a quiet retreat in the vineyards of Tuscany, all while balancing family commitments and a modest travel budget.
  culinary: Miguel Echavarria is an accomplished home cook who masters traditional dishes like tamales, pozole, and chiles en nogada using masa harina, dried ancho chiles, fresh cilantro, and garden‑grown
    vegetables, often hosting weekend family meals where the aromatic simmer of broth signals his culinary pride.
  core: Miguel Echavarria blends a methodical engineering mind with a deep love for nature, family, and tradition, balancing disciplined routines, modest indulgences, and a steady stream of garden‑centered
    projects and community service.
background:
  cultural: Miguel was born in Wichita to Mexican immigrant parents who arrived in the United States in the 1960s. Growing up bilingual, he celebrates both American and Mexican customs, which has ingrained
    a strong sense of family, community responsibility, and respect for cultural heritage. He participates in local Cinco de Mayo festivities, supports the Mexican cultural center in Wichita, and incorporates
    Mexican culinary traditions into his home life. His Catholic upbringing informs his values of service and compassion, while his Mexican roots inspire his commitment to environmental stewardship, reflecting
    a cultural belief in living in harmony with the land.
attributes:
  skills: '["Environmental impact assessment", "Regulatory compliance (EPA, Kansas Dept. of Health and Environment)", "Water resource management", "Waste remediation design", "Sustainable engineering design",
    "Project management", "Strategic planning", "Financial analysis", "Stakeholder engagement", "GIS mapping and spatial analysis", "Technical writing", "Team leadership", "Mentoring"]'
  hobbies: '["Vegetable gardening", "Native‑plant bird habitat creation", "Birdwatching", "Hiking in the Flint Hills", "Citizen‑science water‑quality monitoring", "Cooking traditional Mexican cuisine",
    "Playing acoustic guitar", "Volunteering for environmental clean‑ups", "Woodworking"]'
  career_goals: Miguel aims to transition into a senior advisory role within the next three years, where he can shape regional environmental policy and guide large‑scale sustainability initiatives. He plans
    to lead a community‑focused water‑quality improvement program for Butler County, secure a seat on the local Environmental Advisory Board, and develop a best‑practice handbook for small businesses on
    environmental compliance. Mentorship remains a priority; he intends to formalize a mentorship program for early‑career engineers at his firm. While preparing for a phased retirement, Miguel wants to
    maintain an active consulting presence that leverages his structured, results‑oriented approach.
