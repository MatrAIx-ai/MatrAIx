  career_goals: Marissa aims to transition into a senior engineering or technical lead role where she can shape development processes, mentor junior developers, and champion best‑practice standards while
    maintaining a predictable workload. She plans to earn an AWS Solutions Architect certification to broaden her expertise in cloud infrastructure, enabling her to lead small‑scale migration projects for
    regional businesses. Long‑term, she hopes to establish a boutique consultancy that offers structured, secure software solutions to local firms, allowing her to balance professional ambition with a low‑stress,
    stable environment.
