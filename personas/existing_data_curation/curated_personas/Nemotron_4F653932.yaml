personas:
  professional: Marissa Raney, a 40-year-old seasoned software developer, leverages her mastery of Java, C#, and Python to enforce rigorous code standards, lead Agile Scrum ceremonies, and mentor junior
    engineers while obsessively documenting every API endpoint to maintain the predictability she craves.
  sports: Marissa Raney follows the Chicago Cubs in MLB, streams their games on weekends, participates in a weekly beginner's tennis club at the community center, and adheres to a low‑impact home workout
    routine that includes yoga for flexibility and stress relief.
  arts: Marissa Raney immerses herself in contemporary fiction by authors like Margaret Atwood and psychological non-fiction such as Daniel Kahneman, attends occasional indie film screenings featuring directors
    like Greta Gerwig, and finds solace listening to the piano works of Ludovico Einaudi while coding.
  travel: Marissa Raney prefers meticulously planned trips that balance work and relaxation, having recently explored the historic streets of Kyoto, Japan, and the serene vineyards of Sonoma County, California,
    while eagerly eyeing a future solo road trip along the Pacific Coast Highway during a low‑stress sabbatical.
  culinary: Marissa Raney enjoys baking precise desserts such as lemon chiffon cake and French macarons, measures ingredients down to the gram with a digital scale, experiments with matcha powder and almond
    flour, and occasionally over‑bakes cookies when stressed, using the ritual as a calming counterbalance to coding deadlines.
  core: Marissa Raney is a detail‑oriented software engineer who turns everyday routines—coding, budgeting, gardening, and baking—into meticulously structured rituals, balancing a low‑stress lifestyle with
    a hidden penchant for occasional caffeine‑driven late‑night debugging marathons.
background:
  cultural: Marissa grew up in a predominantly white, middle‑class community in upstate New York, where practical work ethic and self‑reliance were emphasized. The region’s Dutch heritage, reflected in
    the town name Amsterdam, subtly influences local traditions and community events, which she values. Her upbringing combined mainstream American cultural norms with a modest, community‑oriented lifestyle,
    fostering a preference for straightforward communication, reliability, and a balanced blend of independence and cooperative spirit.
attributes:
  skills: '["Java", "C#", "Python", "SQL", "JavaScript", "React", "Git", "Agile Scrum", "Test‑Driven Development", "RESTful APIs", "Technical Documentation", "Code Review"]'
