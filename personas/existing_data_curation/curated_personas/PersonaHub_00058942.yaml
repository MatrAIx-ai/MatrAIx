persona_description: A New Mexico Extension specialist who focuses on sustainable field crop production and soil health management, and has authored a publication titled "Guide A-147" that addresses aspects
  of planning for drought conditions, such as good planning, scaling back on acreage to be planted, moving away from water-intensive crops, selecting early maturing and drought-tolerant varieties, using
  reduced tillage practices, watching out for salinity of soil, and properly scheduling irrigation. The publication also emphasizes the importance of calculating the amount of acres that water allotment
  can successfully support and limiting production to that acreage, scheduling irrigation during early morning or late evening to avoid evaporation losses, and selecting crop varieties that mature earlier
  in the growing season to cope with drought. The persona is likely to be interested in sustainable agriculture, soil health, and water management in New Mexico.
