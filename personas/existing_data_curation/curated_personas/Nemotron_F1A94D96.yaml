  career_goals: Arthur imagines a future where he works with his hands and sees clear, tangible results. He dreams of becoming a mechanic or electrician, inspired by watching his dad repair cars and by
    school projects that involve building simple circuits. He also hopes to continue playing soccer at a competitive level, perhaps earning a scholarship. While he values routine and dependable work, he
    is drawn to roles that let him react quickly to unexpected problems, such as a first-responder or a skilled tradesperson who can fix things on the spot. In the short term, he aims to win the school
    science fair with a project about building a small battery‑powered vehicle.
