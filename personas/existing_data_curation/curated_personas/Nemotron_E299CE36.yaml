personas:
  professional: Wendy Kehayias is a senior purchasing agent in Englewood, Colorado, whose sharp analytical mind, disciplined negotiation tactics, and passion for craftsmanship drive sustainable sourcing
    strategies that blend cost‑efficiency with the aesthetic quality demanded by creative projects, while their sociable energy fuels cross‑functional collaborations and their competitive edge pushes for
    industry‑leading performance metrics.
  sports: Wendy Kehayias spends weekends scaling Rocky Mountain trails with the Englewood Outdoor Adventure Club, carving turns with the Colorado Alpine Ski Club in winter, follows the Denver Broncos and
    Colorado Rockies with avid fanfare, and balances high‑energy group outings with a disciplined daily yoga practice to keep their back pain at bay.
  arts: Wendy Kehayias is a fixture in Denver’s vibrant art scene, regularly touring the Denver Art Museum and pop‑up installations by creators like Banksy and Yayoi Kusama, leading photography walks that
    capture urban murals and historic facades, and steering a book club that dissects contemporary philosophers and authors such as Slavoj Žižek and Haruki Murakami, while they share insights from their
    latest photo series.
  travel: Wendy Kehayias blends a love for Colorado’s alpine escapes—like weekend retreats in Aspen and a yearly stay at the historic Mountain Lodge in Boulder—with globe‑spanning adventures such as trekking
    the Inca Trail to Machu Picchu, exploring the cliffside villages of Cinque Terre, soaking in Iceland’s Blue Lagoon, and planning a future sailing itinerary along the Dalmatian coast, all while they
    meticulously budget each trip through their spreadsheet‑driven itinerary planner.
  culinary: Wendy Kehayias delights in crafting Mediterranean meals at home, from grilled branzino finished with lemon, capers, and extra‑virgin olive oil to layered spanakopita using flaky phyllo and feta,
    experimenting with pistachio‑infused baklava, and sourcing fresh herbs and seasonal produce at the Englewood farmers market, while they occasionally treat friends to elaborate communal feasts that celebrate
    hospitality and shared storytelling.
  core: Wendy Kehayias balances a relentless drive for procurement excellence with a contagious enthusiasm for art, mountain adventures, and late‑night true‑crime podcasts, yet their habit of over‑scheduling
    leaves little room for spontaneous downtime and they often reward themselves with a sudden binge‑watch of vintage sitcom reruns.
background:
  cultural: Wendy grew up in a white, middle‑class family with deep Greek‑American roots, celebrating traditions such as Greek Easter and communal feasts that emphasized hospitality and craftsmanship. These
    cultural experiences nurtured her appreciation for art, history, and meticulous attention to detail. Living in Englewood, Colorado, she blends this heritage with the region’s outdoors‑oriented, individualistic
    lifestyle, fostering a balance of community involvement and personal ambition. Her academic background in arts and humanities further broadens her perspective, allowing her to navigate both the classical
    influences of her ancestry and the contemporary, multicultural fabric of the American West.
