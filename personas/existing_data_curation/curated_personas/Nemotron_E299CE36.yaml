    for arts education programs'']'
  career_goals: Wendy aims to transition from senior purchasing agent to a strategic procurement director within the next five years, positioning herself as a thought leader in sustainable and culturally‑savvy
    sourcing. She plans to obtain a Certified Professional in Supply Management (CPSM) credential and spearhead a cross‑departmental initiative that integrates artistic design considerations into the company’s
    supply chain, thereby differentiating the brand in the market. Her long‑term ambition includes mentoring emerging procurement talent, publishing articles on innovative sourcing strategies, and eventually
    establishing a boutique consultancy that advises museums and cultural institutions on ethical, cost‑effective acquisition of art and artifacts.
