  hobbies: '[''Gardening (vegetable and heirloom flowers)'', ''Quilting and needlecraft'', ''Reading historical fiction and local history'', ''Listening to vintage radio programs'', ''Church choir singing'',
    ''Organizing and playing bingo'', ''Walking on local nature trails'', ''Genealogy research and family tree documentation'']'
  career_goals: Olivia’s primary ambitions focus on preserving her health and independence while deepening her contributions to her community. She aims to maintain an active lifestyle through gardening
    and walking, ensure she can continue supporting church activities, and complete a written memoir that intertwines the history of Jasper with her family’s stories. Olivia hopes to mentor younger volunteers
    at the church, pass on her quilting patterns to grandchildren, and assist her great‑grandchildren with their education through tutoring and scholarships. She also aspires to collaborate with the local
    historical society to record oral histories from senior residents, thereby safeguarding the cultural memory of Walker County.
