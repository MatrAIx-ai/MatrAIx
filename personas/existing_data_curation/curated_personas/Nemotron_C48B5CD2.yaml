  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Photography'', ''Reading art history and historical fiction'', ''Hiking in the Rocky Mountains'', ''Yoga and
    meditation'', ''Community volunteering (food banks, art workshops)'', ''Cooking experimental dishes'', ''Knitting'']'
  career_goals: Grace aims to advance to a store management position within the next two years, leveraging her organizational strengths to improve operational efficiency and employee satisfaction. She aspires
    to integrate her passion for art into her retail career by leading visual merchandising initiatives that feature local artists, and eventually she hopes to open her own boutique that blends curated
    apparel with artwork from the Denver creative community. In parallel, she plans to complete a bachelor's degree in business administration to deepen her managerial expertise and to develop training
    programs that foster cooperative, compassionate workplace cultures.
