personas:
  professional: Grace Turk is a senior retail associate in Denver who leverages her expertise in visual merchandising, POS systems, and empathetic team coaching to curate store displays that showcase local
    artists, and they are poised to step into a store management role within two years while completing a business administration degree.
  sports: Grace Turk hikes the Rocky Mountain trails most weekends, holds a membership at The Yoga Loft for biweekly Vinyasa classes, and cheers for the Denver Broncos and Colorado Avalanche, though they
    admit to skipping cardio on rainy days.
  arts: Grace Turk frequents Denver's RiNo gallery openings, sketches watercolors of sunrise over City Park, captures urban vistas with her Canon EOS R, and draws inspiration from Annie Leibovitz’s portraiture
    and Georgia O'Keeffe’s floral abstractions, while they quietly collect limited‑edition prints from the ColorBox Studios collective.
  travel: Grace Turk plans trips around art festivals and mountain escapes, preferring road trips to destinations like Santa Fe’s Canyon Road, a weekend ski lodge in Vail, and an international art residency
    in Oaxaca, Mexico, yet they balance their wanderlust with a strict travel budget and a love for spontaneous local day trips.
  culinary: Grace Turk experiments in the kitchen with dishes like quinoa‑stuffed bell peppers with cilantro‑lime pesto, hand‑crafted lavender honey scones, and a signature chimichurri steak, often sourcing
    herbs from the Boulder Farmers Market, though they occasionally over‑salt meals when distracted by phone notifications.
  core: Grace Turk blends meticulous retail ambitions with a passion for Denver’s art scene, mindful budgeting, active outdoor habits, and a habit of buying too many art prints on a whim, and they often
    balance their schedule with quiet moments of sketching.
background:
  cultural: Grace was raised in a middle‑class, German‑American family in the Front Range of Colorado. Growing up near Denver, she experienced a blend of outdoor, rugged mountain culture and the city’s
    emerging arts community. Her upbringing emphasized self‑reliance, community involvement, and appreciation for both nature and creative expression. Family traditions include holiday gatherings with music,
    a love of hearty, home‑cooked meals, and participation in local festivals that celebrate Colorado’s multicultural heritage. This background informs her respectful, cooperative, and curiosity‑driven
    outlook.
attributes:
