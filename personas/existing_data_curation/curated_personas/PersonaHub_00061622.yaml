persona_description: A sociologist who studies the impact of technology on social and cultural trends. He is particularly interested in the relationship between internet use and religious affiliation, and
  has found a correlation between the two that accounts for about 50 percent of the drop in religious affiliation. He is also interested in the factors that contribute to this drop, such as the drop in
  religious upbringing and increase in college-level education, and has found that these factors together explain about 50 percent of the drop in religious affiliation.
