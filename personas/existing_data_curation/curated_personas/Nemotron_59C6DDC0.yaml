  hobbies: '["Hiking", "Landscape Photography", "Model Aircraft Building", "Arduino Programming", "Reading Science Non-Fiction", "Chess", "Community STEM Volunteering", "Bicycle Riding", "Cooking Southwestern
    Dishes"]'
  career_goals: Carlos aims to obtain his Professional Engineer (PE) license within the next two years and deepen his expertise in sustainable water infrastructure for agriculture. Over the next five to
    ten years, he envisions leading large-scale, multidisciplinary engineering projects that enhance irrigation efficiency and environmental stewardship in Eastern New Mexico. He also aspires to mentor
    junior engineers, contribute to community STEM outreach programs, and eventually establish his own consulting firm focused on innovative, practical solutions for rural water management.
