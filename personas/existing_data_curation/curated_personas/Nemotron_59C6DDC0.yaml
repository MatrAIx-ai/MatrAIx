personas:
  professional: Carlos Johnson, a civil and environmental engineer skilled in AutoCAD, SolidWorks, MATLAB, and Python, channels curiosity and methodical rigor into designing sustainable water infrastructure
    for agriculture while they mentor junior engineers and steer interdisciplinary project teams.
  sports: Carlos Johnson, an avid hiker of the mesas and weekend cyclist, follows the New Mexico State Aggies football team and the Phoenix Suns, and they regularly ride with a local mountain-bike club
    that meets for early-morning rides each spring.
  arts: Carlos Johnson, a solitary photographer of desert vistas, draws inspiration from Ansel Adams and Edward Burtynsky, curates a personal gallery of large-format prints, and they relax to the ambient
    sounds of Brian Eno and Ólafur Arnalds while editing images.
  travel: Carlos Johnson favors meticulously planned road trips to geologically striking sites like Monument Valley, the Grand Canyon, and Iceland’s basalt formations, balancing adventure with a frugal
    budget that leaves room for occasional weekend retreats at a nearby hot-spring resort, and they always map routes using open-source GIS tools.
  culinary: Carlos Johnson experiments with southwestern cuisine, regularly cooking green chile stew, carne adovada, and chiles rellenos using fresh tomatillos, roasted corn, and smoked chipotle, yet they
    often forget to let the dough rest, resulting in impromptu 'crispy-edge' tortillas.
  core: Carlos Johnson couples quiet curiosity with meticulous habit, thriving on desert hikes, model aircraft builds, and data-driven water projects while they occasionally over-invest in photography gear
    and battle a stubborn back.
background:
  cultural: Carlos grew up in Clovis, New Mexico, in a family that has lived in Eastern New Mexico for several generations, rooted in the region's agricultural and ranching heritage. His upbringing was
    shaped by a blend of traditional Midwestern values and the distinctive Southwestern ethos, emphasizing self-reliance, community involvement, and a deep respect for the arid landscape. While he identifies
    as white, his cultural experience reflects the diverse influences of the American Southwest, including local festivals, regional cuisine, and an appreciation for the history and environment of the high
    plains.
attributes:
