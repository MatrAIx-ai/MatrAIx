persona_description: A biologist who specializes in studying the behavior and ecology of simple animals, particularly unicellular protists and hydra. Their research interests include the physical and chemical
  interactions between these organisms and their environment, and the mechanisms by which they adapt and survive in their aquatic habitats. They are particularly interested in the diffusion of materials
  through the plasma membrane of unicellular organisms and the role of water circulation in the hydra's behavior.
