  career_goals: Phillip aims to channel his love of art and community into a flexible, part‑time role that blends his practical know‑how with creative expression. He is exploring opportunities as a volunteer
    coordinator for the local arts council, where he could help organize pop‑up exhibitions and workshops. Long‑term, he hopes to launch a weekend stall at the Manatee County farmers market selling handcrafted
    birdhouses and limited‑edition photographic prints of Florida’s coastal scenery. He wants a position that lets him work on his own schedule, avoid rigid deadlines, and keep him engaged with the people
    around him.
