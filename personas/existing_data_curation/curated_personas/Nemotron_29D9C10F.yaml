personas:
  professional: Jason Butler is a retired mechanical engineer whose precise project planning and data‑driven mindset now guide his work on the Amherst town planning advisory board, where he mentors high‑school
    STEM clubs and leads senior volunteers with disciplined, hands‑on workshops.
  sports: Jason Butler enjoys low‑impact fitness through regular tai‑chi sessions at the Amherst senior center, participates in a weekly hiking club that tackles the Appalachian Trail sections in western
    New England, and passionately cheers for the Boston Red Sox and the New England Patriots while occasionally joining a senior‑friendly tennis league at the local community park.
  arts: Jason Butler finds creative fulfillment in woodworking circles where they craft vintage furniture, devotes evenings to listening to folk legends like Bob Dylan and Joan Baez, and attends performances
    at the Amherst Cinema and local community theater featuring classic works by Shakespeare and modern plays by August Wilson.
  travel: Jason Butler plans his travel itineraries as carefully as his garden plots, favoring weekend trips to historic New England towns such as Salem, Massachusetts and St. Augustine, Maine, while dreaming
    of a spring pilgrimage to the historic sites of Philadelphia and a leisurely cruise to the Canadian Maritimes once financial constraints ease.
  culinary: Jason Butler enjoys cooking with fresh harvests, frequently preparing New England clam chowder, roasted beet and goat cheese salads with locally sourced rosemary, and apple‑cinnamon crumble,
    while their modest kitchen skill balances between precise, recipe‑driven baking and spontaneous, garden‑inspired stovetop experiments.
  core: Jason Butler is a disciplined, community‑oriented retiree who blends engineering precision with a love for gardening, woodworking, and historic storytelling, often juggling meticulous planning with
    a fondness for gentle tai‑chi and a penchant for occasional over‑watering of his tomatoes.
background:
  cultural: Jason is a third‑generation white American of primarily English and Irish descent, raised in rural New Hampshire. His upbringing reflects New England’s tradition of self‑reliance, civic engagement,
    and reverence for the natural landscape. He values community participation, seasonal rhythms, and the region’s emphasis on hard work and modesty, which continue to shape his outlook and activities.
