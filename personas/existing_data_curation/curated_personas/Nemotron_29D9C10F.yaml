  career_goals: Although retired, Jason aims to leverage his expertise to benefit Amherst by serving on the town planning advisory board, mentoring high‑school STEM clubs, and leading a senior volunteer
    committee that organizes local events. He also hopes to author a memoir that captures his life lessons and the history of his family’s New England roots, while ensuring his and his wife's health and
    independence in their later years.
