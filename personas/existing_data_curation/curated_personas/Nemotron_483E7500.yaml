  hobbies: '[''Watercolor Painting'', ''Mixed-Media Collage'', ''Art Gallery Visits'', ''Speculative Fiction Book Club'', ''Theater Improv'', ''Hosting Themed Dinner Parties'', ''Hiking in Santa Monica
