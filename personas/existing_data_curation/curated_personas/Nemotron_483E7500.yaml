  career_goals: Aparna aims to transition from a general office clerk to a senior administrative role, such as Office Manager or Executive Assistant, where she can oversee broader operational functions
    and mentor newer staff. She is also exploring the possibility of leading a small community arts initiative that integrates her love for creativity with her organizational expertise, positioning herself
    as a bridge between the corporate environment and local cultural projects. In the longer term, she envisions starting a boutique consulting service that helps small businesses streamline their office
    processes while incorporating aesthetic improvements that enhance employee morale and client impressions.
