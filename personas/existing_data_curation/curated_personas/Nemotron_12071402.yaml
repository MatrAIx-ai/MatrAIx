personas:
  professional: Justin Foster, a meticulous junior architect in his preschool's daily block club, channels an imaginative curiosity for abstract shapes into methodical tower constructions while they confidently
    guide peers through step‑by‑step plans.
  sports: Justin Foster, a spirited member of the Little Sprinters preschool soccer team, proudly wears a miniature Boston Celtics jersey during practice and erupts with excitement whenever the New England
    Patriots score on family game nights.
  arts: Justin Foster, a devoted admirer of Dr. Seuss’s whimsical illustrations and Pixar’s vibrant storytelling, fills sketchbooks with colorful crayon creatures, often humming the ‘Let It Go’ melody from
    Disney’s Frozen while pretending to perform on an improvised living‑room stage.
  travel: Justin Foster, a tiny explorer who has already visited the Grand Canyon on a family road trip and the Toronto Zoo on a weekend excursion, prefers short car rides with sing‑along playlists and
    dreams of riding the carousel at Disneyland Paris next summer.
  culinary: Justin Foster, who adores buttery macaroni‑and‑cheese topped with a sprinkle of sharp cheddar and delights in strawberry‑banana smoothies, proudly helps stir batter for blueberry pancakes, although
    they sometimes sneak extra cookie crumbs into their lunchbox for a surprise treat.
  core: Justin Foster blends boundless imagination with an unexpectedly meticulous streak, turning simple play into carefully plotted adventures while occasionally hoarding snack crumbs and insisting on
    perfect color matches in every art project.
background:
  cultural: Justin is raised in a white, middle‑class family in Roswell, GA. His upbringing blends Southern values such as respect for community, hospitality, and church participation with suburban conveniences.
    Family traditions include Sunday school, church picnics, seasonal festivals like Fourth‑of‑July fireworks, and local community events. He often hears classic American children’s songs and stories, and
    his family encourages creativity through activities like coloring, craft projects, and visits to the local library and park.
attributes:
