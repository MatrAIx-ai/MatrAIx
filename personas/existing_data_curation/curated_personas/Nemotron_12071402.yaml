    sorting games'']'
  career_goals: Although only three, Justin often pretends to be an astronaut, an artist, and a teacher, expressing a desire to explore space, create pictures that people love, and help other kids learn.
    He dreams of a future where he can combine his curiosity and love for art, aiming to become a scientist‑artist who designs creative inventions. His current ambitions revolve around mastering new skills,
    like learning to write his name and drawing more detailed pictures, which he sees as stepping stones toward his imagined careers.
