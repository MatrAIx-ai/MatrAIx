    and hosting'']'
  career_goals: Approaching retirement, Kim aims to translate her decades of hands‑on experience into a supervisory or training role. She plans to earn a certified shift‑supervisor credential and complete
    an OSHA trainer certification within the next year. Her ambition is to lead a small team, improve workflow efficiency, and mentor younger workers while maintaining a harmonious, safety‑first culture
    on the shop floor. Beyond work, Kim hopes to secure a stable pension, contribute to her community’s adult‑education program by teaching basic manufacturing safety, and eventually volunteer for her local
    church’s outreach initiatives.
