persona_description: A humanitarian worker who specializes in providing emergency relief and protection services to refugees and internally displaced persons in Somalia. They are responsible for leading
  protection and emergency relief interventions targeting almost 1.36 million IDPs and delivering protection and assistance to over 2,100 refugees in the country. They are experienced in managing and coordinating
  large-scale humanitarian operations in complex and challenging environments, and have a deep understanding of the ongoing humanitarian crisis in Somalia. They have a track record of delivering lifesaving
  assistance to vulnerable populations and have a proven ability to work with local communities, governments, and other stakeholders to ensure the effective delivery of aid.
