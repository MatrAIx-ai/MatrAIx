personas:
  professional: Eric Avello blends meticulous risk assessment with a relaxed, improvisational approach, leveraging their Series 7, Series 66, and CFP credentials to translate volatile market data into clear
    client-friendly financial plans while sprinkling unconventional art-fund and NFT recommendations into a boutique advisory model that targets creative professionals and tech-savvy entrepreneurs.
  sports: Eric Avello ditches the treadmill for weekend hikes up Camelback Mountain and competitive matches with the Scottsdale Ultimate Frisbee Club, balances this with a loyal fanhood for the Phoenix
    Suns and Arizona Diamondbacks, and squeezes in improvised yoga sessions after improv comedy workshops to maintain flexibility and energy.
  arts: Eric Avello frequents the Scottsdale ArtWalk where they hunt for limited-edition prints by emerging painter Maya Liao, curates intimate jazz evenings featuring saxophonist Nate Smith at downtown
    venues, and hones quick wit in improv comedy labs at The Second City, allowing the eclectic local art scene to shape both their personal aesthetic and client outreach.
  travel: Eric Avello prefers spontaneous, weekend-length getaways that blend adventure and culture, often swapping desert hikes for sunrise snapshots in Sedona before jetting off to Barcelona's Gothic
    Quarter for tapas and art museums, while they keep a growing bucket-list that includes Kyoto's Higashiyama district and Iceland's highlands for future explorations.
  culinary: Eric Avello experiments in the kitchen with semi-professional flair, mastering Moroccan tagine with preserved lemons and harissa-spiced lamb shoulder, perfecting Korean bibimbap using gochujang
    and toasted sesame oil, and frequently hosts dinner parties where they pair these dishes with curated natural wines and a side of lively jazz playlists.
  core: Eric Avello balances a curiosity-driven financial advisory career with a love for desert hikes, jazz, and improvisational creativity, and they maintain a calm, competitive demeanor that sometimes
    leads to missed appointments and misplaced receipts.
background:
  cultural: Eric is a white American raised in the Midwest before moving to Scottsdale, Arizona in his early twenties. His family heritage includes German and Irish ancestry, which instilled a value for
    hard work and self‑reliance. The Southwest’s emphasis on outdoor living, personal freedom, and a thriving arts scene has shaped his lifestyle; he embraces the region’s blend of affluent suburban culture
    and a laid‑back desert vibe. While his formal education concluded with high school, he embodies a strong DIY ethic, pursuing certifications and continuous learning through online courses and professional
    networks. His cultural identity combines Midwestern pragmatism with the cosmopolitan, art‑appreciating milieu of Scottsdale.
