  hobbies: '[''Visiting contemporary art galleries'', ''Photography of desert landscapes'', ''Hiking and trail running'', ''Participating in local improv comedy workshops'', ''Playing ultimate frisbee in
    community leagues'', ''Cooking international cuisines'', ''Collecting modern art prints'', ''Listening to live jazz and music festivals'', ''Exploring emerging fintech and crypto trends'']'
  career_goals: Eric aims to transition from being an associate advisor to founding a boutique advisory firm that specializes in serving creative professionals and tech‑savvy entrepreneurs. Over the next
    five years he plans to double his assets under management to $150 million, launch a podcast that explores the intersection of finance, art, and emerging technology, and become a recognized speaker at
    industry conferences. He also aspires to mentor younger advisors, contribute thought leadership articles to financial publications, and eventually attain a leadership role within the Financial Planning
    Association’s regional chapter.
