personas:
  professional: Dean Dearmas, a seasoned full‑stack developer, leverages deep expertise in Python, Java, C++, and React to design scalable AWS‑native architectures while mentoring junior engineers, balancing
    his methodical problem‑solving with a pragmatic focus on delivering sustainable, mission‑critical health‑tech solutions.
  sports: Dean Dearmas enjoys solitary hikes in Red Rock Canyon, participates in a local trail‑running club for occasional 10‑k races, follows the Las Vegas Raiders and Vegas Golden Knights avidly, and
    plays casual pickup soccer on weekends with a tight‑knit group of friends, balancing low‑key physical release with modest fan enthusiasm.
  arts: Dean Dearmas immerses himself in classic and contemporary science‑fiction literature—revisiting Asimov, Liu Cixin, and N.K. Jemisin—while listening to Brian Eno’s ambient albums during coding, frequently
    hosting Dungeons & Dragons sessions that blend storytelling with strategic thinking, and attending occasional indie film screenings by directors like Denis Villeneuve.
  travel: Dean Dearmas prefers meticulously planned solo road trips to desert landscapes and national parks, such as a sunrise hike in Zion and a weekend in Iceland chasing auroras, while occasionally joining
    a few close friends for a tabletop‑gaming convention in Seattle, balancing his love for quiet exploration with budget‑conscious family considerations.
  culinary: Dean Dearmas, an intermediate home‑chef and craft‑brewer, enjoys cooking grilled lamb with rosemary, perfecting spicy ramen broth infused with miso, and experimenting with hop varieties like
    Citra and Simcoe to brew a crisp desert‑inspired IPA he calls ‘Red Rock Haze,’ often pairing his creations with artisanal cheeses.
  core: Dean Dearmas is a methodical coder who channels his curiosity and anxiety into solitary hikes, careful financial tracking, and craft‑brewing experiments, all while nurturing a close circle of friends
    through tabletop games and quietly mentoring the next generation of developers.
background:
  cultural: Dean was raised in a middle‑class suburban environment in the Pacific Northwest, with an Anglo‑American heritage that emphasized self‑reliance, practical problem‑solving, and community involvement.
    He grew up celebrating traditional American holidays such as Thanksgiving, Independence Day, and Christmas, often with family gatherings that reinforced his cooperative and considerate nature. After
    moving to Las Vegas for work, he adapted to the city’s diverse cultural tapestry, appreciating the blend of entertainment, hospitality, and a growing tech scene. His background informs a pragmatic outlook
    combined with an appreciation for diversity and a commitment to contributing positively to his local community through volunteer coding programs.
