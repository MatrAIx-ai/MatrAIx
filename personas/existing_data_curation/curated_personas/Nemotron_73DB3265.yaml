  career_goals: Dean aims to transition into a lead engineering role where he can shape architectural decisions for mission‑critical applications, particularly in domains that intersect technology with
    health and well‑being. He aspires to lead a small, high‑performing team that values collaboration, psychological safety, and sustainable pace, allowing him to balance professional growth with family
    life. In the longer term, Dean plans to launch a side venture focused on developing tools that help individuals monitor and manage stress, leveraging his programming expertise and personal experience
    with anxiety. He also seeks to obtain an AWS Solutions Architect certification to deepen his cloud expertise.
