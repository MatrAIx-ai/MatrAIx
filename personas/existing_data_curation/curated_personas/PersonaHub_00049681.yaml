persona_description: A healthcare professional who is concerned with the management of obesity and its health consequences, particularly in the context of extreme weight categories. This person is likely
  to be a physician, a dietitian, or a public health official who is responsible for monitoring and addressing the prevalence of obesity and its complications in the United States. They are likely to be
  aware of the significant health risks associated with morbid obesity and the challenges faced by providers in managing this population. They may also be interested in the trends in obesity rates and the
  factors that contribute to their growth, such as socioeconomic status, lifestyle, and cultural factors.
