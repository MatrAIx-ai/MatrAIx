personas:
  professional: Cody Love, a master welder with over fifty years of experience, channels their disciplined, organized nature into impeccable MIG, TIG, and stick welding projects while mentoring apprentices
    at the local vocational school and designing decorative metal sculptures that honor regional history.
  sports: Cody Love follows the Cleveland Browns and Cleveland Guardians, participates in the county senior bowling league and a weekly walking club that traverses the Logan County trails, and enjoys occasional
    rounds of golf at the local senior tee times with friends, balancing their social energy with low-impact exercise.
  arts: Cody Love, an avid acoustic guitarist, frequently performs folk renditions of Bob Dylan and Johnny Cash at community gatherings, collects prints of Andy Warhol, and immerses themselves in Ken Burns’
    documentaries, all of which inform the aesthetic of their metal sculptures and model-train layouts.
  travel: Cody Love prefers meticulously planned road trips that blend history with nature, having driven the Freedom Trail in Philadelphia, toured the historic ironworks of Hereford in England, and explored
    the gardens of Shenandoah National Park, yet they often hesitate to book flights due to health concerns.
  culinary: Cody Love favors farm-to-table comfort food, regularly cooking pot roast with carrots and rosemary, fresh garden salads with heirloom tomatoes from their vegetable plot, and apple crisp for
    dessert, while skillfully seasoning grilled corn with smoked paprika and occasionally indulging in a slice of banana pudding.
  core: Cody Love, a 76-year-old master welder with a penchant for meticulous craft, history, and community, balances disciplined mentorship with occasional bouts of worry, a love of gardening, and a habit
    of splurging on new tools.
background:
  cultural: Cody was born and raised in the heart of rural Illinois, growing up in a close‑knit white, largely German‑American community that values hard work, practicality, and neighborly service. The
    Midwestern ethos of self‑reliance, modesty, and community involvement shaped his worldview. Raised in a Lutheran household, he remains active in his local church, attending potlucks and supporting church‑based
    outreach. He cherishes regional traditions such as the annual Logan County fair, county‑wide volunteer clean‑up days, and local historical societies. His education in arts and humanities fostered an
    appreciation for American folk art and local heritage, which he weaves into his metal creations, reflecting the values of modesty, craftsmanship, and respect for tradition that define his cultural background.
