  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Pipe brazing'', ''Blueprint reading'', ''Metallurgy'', ''Welding code compliance (AWS, ASME)'', ''OSHA safety training'', ''Metal sculpture
    design'', ''Workshop management'', ''Apprentice mentorship'', ''Technical documentation'', ''Problem solving'', ''Tool maintenance'']'
  hobbies: '[''Reading American history'', ''Classic literature'', ''Acoustic guitar'', ''Community dancing'', ''Vegetable gardening'', ''Metal sculpture hobby'', ''Woodworking'', ''Model train building'',
    ''Volunteering as museum docent'', ''County fair participation'', ''Reflective journaling'', ''Morning stretching'']'
  career_goals: As he nears retirement, Cody aims to shift from full‑time welding to a mentorship role at the local vocational school, passing his high‑standard techniques to the next generation of tradespeople.
    He plans to complete a series of community‑commissioned metal sculptures for the town square, documenting the process in a booklet that blends technical detail with historical narrative. Cody also hopes
    to establish a modest family workshop that doubles as a teaching space and showcase for his artistic metalwork, while maintaining a balanced schedule that supports his health and reduces stress. He
    is committed to ensuring his grandchildren and other young relatives have exposure to skilled trades.
