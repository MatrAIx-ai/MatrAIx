persona_description: A philosopher who specializes in the field of pragmatics, particularly in the study of the cognitive and emotional processes that occur when a person takes notice of other people's
  verbal and nonverbal utterances and invests them with meaning. This person is likely to have a deep understanding of the pragmatic dimension of communication and its importance in understanding human
  communication. They are likely to have a critical approach to communication theories and are interested in finding out what meaning the recipient attributes to nonverbal 'signs'.
