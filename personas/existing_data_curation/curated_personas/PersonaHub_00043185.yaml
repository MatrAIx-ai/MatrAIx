persona_description: A family history cardiologist who specializes in the study of familial risk factors for heart disease, particularly in the context of sibling relationships. She is particularly interested
  in the genetic and environmental factors that contribute to heart disease and the potential for early intervention to reduce the risk of heart attack. She is also interested in the development of genetic
  blood tests to assess sibling risk in families with a history of heart disease and in the use of lifestyle and drug interventions to reduce the risk of heart disease among siblings.
