  career_goals: As she approaches retirement, Jennifer aims to transition into a supervisory or lead‑assembler role where she can formalize her mentorship responsibilities and drive continuous‑improvement
    projects. She plans to earn OSHA 30‑hour certification and a journeyman‑level welding credential to broaden her technical qualifications. Ultimately, she hopes to leave a legacy of streamlined processes
    and a well‑trained workforce, while possibly consulting part‑time on small‑scale fabrication projects after she steps back from full‑time work.
