persona_description: Carolyn Downey is an experienced instructional leader who advocates for the use of classroom walk-throughs as a tool to monitor and improve classroom instruction throughout a school
  or district. She is known for her expertise in educational assessment and her focus on the three "C's" - Context, Content, and Cognitive Type. Downey's classroom walkthrough protocol is designed to collect
  data on teaching patterns and identify areas for improvement. She believes that using classroom walk-throughs can help teachers focus more on weaving all cognitive levels into their instruction and practice.
  Downey's approach is effective because it requires less time than other methods, making it easy for school leaders to quickly become familiar with teaching patterns.
