  career_goals: Although retired, Jolan aims to stay active by contributing her expertise to Greenwood’s cultural life. She hopes to join the board of the Greenwood Historical Society, mentor younger volunteers
    at the community arts center, and curate traveling art exhibitions for the county library. She also plans to write a memoir that intertwines her love of art, community, and lifelong learning, while
    pursuing online courses in art history and digital media. Travel to regional art festivals and occasional guest lecturing on art appreciation are additional ambitions.
