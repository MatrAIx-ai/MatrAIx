personas:
  professional: Jolan Gerges, a retired community arts organizer, leverages their knack for lively public speaking and spontaneous scheduling to lead volunteer workshops, mentor budding docents, and curate
    itinerant exhibitions for the Greenwood Historical Society, all while channeling a competitive edge honed at senior bridge tables into strategic program planning.
  sports: Jolan Gerges enjoys low‑impact cardio by hiking the Greenwood Forest Loop each spring, dabbles in senior‑friendly pickleball at the community center, faithfully cheers on the local minor league
    baseball team, the Greenwood Grizzlies, and they maintain a sharp mind through bridge and chess nights, treating each match as a mental workout.
  arts: Jolan Gerges spends weekends wandering the Downtown Gallery Corridor, they paint delicate watercolors of local wildflowers inspired by Monet and Georgia O'Keeffe, curate folk‑art fairs featuring
    craftsmen from the Appalachian tradition, and frequently cite the evocative brushwork of Winslow Homer in their docent tours.
  travel: Jolan Gerges prefers curated group tours that blend art and history, such as the three‑day pilgrimage to the Museum of Modern Art in New York and a week‑long excursion to Santa Fe's International
    Folk Art Market, they plan trips with loose itineraries to leave room for spontaneous gallery openings, and they budget their travels through a dedicated travel savings account.
  culinary: Jolan Gerges, an adventurous home cook, loves crafting Mediterranean‑inspired ratatouille with heirloom tomatoes from their garden, experiments with saffron‑infused paella, and often pairs their
    dishes with a robust bottle of Chianti, while occasionally neglecting to label leftovers, leading to surprise midnight snack discoveries.
  core: Jolan Gerges is a charismatic, slightly chaotic art lover who turns every community event into a living exhibition, juggles board games and garden beds with equal zeal, and believes that a well‑placed
    brushstroke can solve even the most stubborn of life’s puzzles.
background:
  cultural: Jolan was born and raised in a small Indiana town, growing up in a family with German and Irish roots. Her Midwestern upbringing emphasized community involvement, church participation, and a
    practical appreciation for the outdoors and agriculture. The culture of Johnson County, with its strong support for local arts, community festivals, and volunteerism, shaped her values of social connectedness,
    resilience, and a relaxed, flexible approach to life. This background, combined with a lifelong curiosity, fuels her appreciation for art, new ideas, and varied experiences.
