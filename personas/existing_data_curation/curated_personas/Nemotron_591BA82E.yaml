  hobbies: '["Watercolor painting", "Visiting local art galleries", "Reading historical fiction", "Genealogy research", "Gardening", "Knitting", "Birdwatching", "Cooking and recipe experimentation", "Small-book
    club participation", "Community theatre volunteering"]'
  career_goals: Machella aims to leverage her business education and retail experience to move into a supervisory or trainer role within her store, where she can mentor new cashiers and help shape customer‑service
    standards. She also hopes to volunteer as a financial‑literacy educator for seniors in her community and, eventually, launch a modest online shop selling her own artwork and handcrafted items, blending
    her creative interests with her business background.
