  career_goals: In the next 12‑18 months Paul aims to earn his PMP certification and take on larger, cross‑departmental programs that involve multiple vendors and regulatory compliance—areas that will let
    him demonstrate his competitive edge. Long‑term, he envisions moving into a senior program‑manager role overseeing infrastructure or disaster‑resilience projects for the Jacksonville region, ultimately
    leveraging his methodical approach to launch his own consultancy focused on efficient, data‑driven project delivery. He is motivated to be recognized as a go‑to strategist who can blend innovative ideas
    with the reliability that his employers and clients depend on.
