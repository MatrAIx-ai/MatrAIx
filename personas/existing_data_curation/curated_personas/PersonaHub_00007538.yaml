persona_description: Ciara Speller, a licensed social worker and owner of Strength Inc., is a well-known figure in the field of occupational counseling. She specializes in coaching black women through occupational
  obstacles and helping them cope with the long-term effects of workplace discrimination. Speller's expertise in the field is rooted in her personal experience with racial and gender discrimination and
  her desire to empower black women to overcome these challenges.
