  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Community theater participation'', ''Hiking in the Laurel Highlands'', ''Cycling along the Ohio River'', ''Softball
    league'', ''DIY electronics and robotics'', ''Photography'', ''STEM mentorship volunteering'', ''Board game nights with friends'', ''Cooking and exploring international recipes'', ''Traveling to cultural
    festivals'']'
  career_goals: James aims to ascend into senior engineering leadership, such as a Director of Engineering or Technical Program Manager, where he can shape product strategy that merges functionality with
    aesthetic design. He plans to complete his Lean Six Sigma Black Belt and pursue a Master's in Engineering Management or an MBA to broaden his managerial expertise. James aspires to spearhead sustainable
    manufacturing initiatives, reducing the environmental impact of local factories, and to launch a consultancy that helps small-to-medium manufacturers adopt green processes and design thinking. Additionally,
    he wishes to expand his mentorship role by establishing a regional STEM mentorship program and partnering with local schools to inspire future engineers.
