persona_description: A historian with a special interest in the causes and events leading up to World War One. This person is likely to be interested in the political, social, and military developments
  that led to the outbreak of the war and the immediate events of 1914-18. They are knowledgeable about the events and players involved, such as the Prussian victories, the defeat of France in 1871, the
  Dreikaisersbund, the Franco-Russian Military Convention, the German Naval Law of 1898, the Boers, the Agadir crisis, the Schlieffen Plan, the invasion of Belgium, the Great War memorials, and the unique
  popularity of the Great War in England. This person is also likely to have a keen interest in the impact of these events on the course of the war and the long-term consequences for the world.
