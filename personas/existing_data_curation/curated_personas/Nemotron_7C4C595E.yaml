  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Photography'', ''Charango playing'', ''Reading speculative fiction and philosophy'', ''Chess'', ''Competitive gaming (small group)'', ''Mindfulness
    meditation'', ''Journaling'', ''Cooking traditional Bolivian dishes'']'
  career_goals: Gabriel aspires to turn his artistic passion into a sustainable career. He aims to enroll in a community college or apprenticeship program focused on visual design and interactive media,
    eventually working as a freelance illustrator or UI/UX designer for indie game studios. He hopes to blend his Bolivian cultural heritage with contemporary digital art, creating projects that celebrate
    Andean motifs while reaching a global audience. In the longer term, Gabriel dreams of establishing his own creative studio that offers design services and hosts workshops for other young artists, particularly
    those from under‑represented backgrounds. He also wants to develop a mentorship platform where he can share coping strategies for anxiety with peers in the artistic community.
