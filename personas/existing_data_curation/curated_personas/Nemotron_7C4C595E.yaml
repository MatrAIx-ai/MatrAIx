personas:
  professional: Gabriel Rodriguez is an aspiring freelance illustrator and UI/UX designer who blends digital illustration, basic coding, and Andean visual motifs into interactive media projects, leveraging
    their methodical planning skills and competitive mindset honed from chess.
  sports: Gabriel Rodriguez enjoys watching La Liga soccer, especially supporting FC Barcelona, follows the high‑school basketball team during winter, and stays active by jogging through city parks and
    joining a weekend skateboarding meetup, preferring low‑key, solo fitness routines over organized team sports.
  arts: Gabriel Rodriguez immerses themselves in speculative fiction by reading authors like Ted Chiang and N.K. Jemisin, draws inspiration from digital artists such as Beeple and traditional painters like
    Frida Kahlo, practices the charango to the rhythms of Los Kjarkas, and curates a personal playlist featuring folk legends and indie game soundtracks, shaping their artistic identity.
  travel: Gabriel Rodriguez prefers low‑key, self‑planned trips that combine cultural immersion with artistic inspiration, having explored the historic streets of La Paz and the Andean highlands with family,
    dreaming of visiting Tokyo’s Akihabara for manga and design, and planning a future backpacking adventure through the European art capitals of Barcelona and Florence.
  culinary: Gabriel Rodriguez enjoys cooking traditional dishes like salteñas stuffed with seasoned beef, huminta made with fresh corn and cheese, and experimenting with fusion recipes that pair quinoa
    with Mediterranean herbs, while also appreciating street food such as empanadas and savoring the aroma of roasted peanuts and ají in their kitchen.
  core: Gabriel Rodriguez is a methodical yet introspective teen who channels creative solitude into digital art, battles frequent anxiety with meditation, and occasionally procrastinates on schoolwork
    while obsessively curating a perfect color palette for every project.
background:
  cultural: 'Gabriel grew up in a bilingual household in Potomac, Maryland, where his parents immigrated from Bolivia. He speaks fluent Spanish at home and English in school and the community. Bolivian
    customs are woven into his daily life: family gatherings feature dishes like salteñas, huminta, and api, and celebrations often include music from the charango, quena, and traditional drums. He attends
    occasional community events organized by the Bolivian diaspora in the Washington, D.C. area, such as Carnaval de Oruro performances and cultural festivals that showcase Andean dance and cuisine. While
    he embraces the multicultural environment of Montgomery County – enjoying visits to museums, local art shows, and the diverse food scene – he also maintains a strong sense of cultural pride, often incorporating
    Andean motifs and color palettes into his artwork. His dual cultural perspective fuels his curiosity and shapes his artistic voice.'
attributes:
  skills: '[''Digital illustration'', ''Graphic design'', ''Traditional drawing (charcoal, pen, ink)'', ''Basic coding (Python, HTML/CSS)'', ''Photography'', ''Charango playing'', ''Project planning and
