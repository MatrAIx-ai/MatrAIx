persona_description: A person who is interested in HIV/AIDS research and innovation, particularly in the field of virtual space and technology. This person is likely to be involved in or interested in the
  Rethink HIV Grand Challenge and its efforts to support and recognize innovative solutions to the HIV/AIDS epidemic. This person may have a background in technology, particularly in virtual space and social
  media, and may have experience with using technology to raise awareness and promote positive behavior change. This person may be particularly interested in the use of virtual space to engage and educate
  people about HIV/AIDS and the need for testing.
