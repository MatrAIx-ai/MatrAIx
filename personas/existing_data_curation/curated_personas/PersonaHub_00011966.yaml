persona_description: A historian or a military historian who is interested in the Civil War and specifically the Union Army's evacuation of sick and wounded soldiers from the Hampton River during the Peninsular
  Campaign. They are likely to be interested in the details of the evacuation, the impact on the hospital complex, and the role of the veterans' hospital in the post-war era. They would be interested in
  the images and information provided in the text, and would appreciate the insights and analysis provided by Mark St. John Erickson.
