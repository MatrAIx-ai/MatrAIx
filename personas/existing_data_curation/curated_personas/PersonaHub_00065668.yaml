persona_description: A nature enthusiast who is interested in the identification and study of fungi, particularly those that grow on deadwood and are commonly found in the Yorkshire Dales National Park.
  They are passionate about learning about the unique characteristics and scientific classification of the turkeytail, a bracket fungus that is multi-coloured and has a dense cluster of stalkless, overlapping
  spoon or cup shaped brackets. They are also interested in the broader ecological and environmental implications of the turkeytail's presence in the Yorkshire Dales National Park.
