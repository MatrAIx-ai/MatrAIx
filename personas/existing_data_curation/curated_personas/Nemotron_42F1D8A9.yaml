  career_goals: Approaching retirement, Nagui aims to shift from full‑time field work to a consultancy role that focuses on sustainable and artistic lighting solutions for residential and community projects.
    He plans to earn a certification as a solar‑energy installer and to develop a boutique service offering smart‑home retrofits that incorporate interactive, art‑inspired lighting for local galleries and
    public spaces. He also hopes to become a recognized mentor within his local IBEW union, creating a mentorship program that pairs seasoned electricians with younger apprentices in a competitive yet collaborative
    environment. Financially, he wants to secure a flexible schedule that lets him continue earning while dedicating more time to group activities and family, ultimately being known as one of the Bay Area’s
    most innovative and community‑oriented electricians.
