personas:
  professional: Nagui Combs is a veteran Bay Area electrician transitioning to a boutique consultancy that delivers sustainable, art‑inspired lighting solutions for homes and community spaces, and they
    blend four decades of wiring mastery with a curiosity‑driven, improvisational style that often outpaces peers in competitive bids while maintaining a relaxed attitude toward strict schedules.
  sports: Nagui Combs is an avid pickleball competitor in the local senior league, a regular participant in the Bay Area Hiking Club’s coastal trail excursions, and a loyal fan of the San Francisco Giants,
    Golden State Warriors, and San Francisco 49ers, they blend a competitive spirit on the court with a laid‑back enthusiasm for weekend hikes.
  arts: Nagui Combs frequents Daly City’s art walks and San Francisco’s mural districts, capturing scenes on a vintage 35mm film camera while they volunteer to design interactive lighting for community
    theater productions, drawing inspiration from muralists like Shepard Fairey, the bold colors of Diego Rivera, and the smooth sounds of Miles Davis and Joan Baez.
  travel: Nagui Combs prefers spontaneous road trips along California’s rugged coastline, having explored Monterey, Santa Cruz, and Napa Valley with their wife, while an artistic curiosity led them to a
    week‑long sketch‑and‑light tour of Florence, Italy, and they now dream of photographing the aurora borealis over Iceland’s volcanic landscape.
  culinary: Nagui Combs enjoys sampling Bay Area farm‑to‑table eateries, favoring dishes like Dungeness crab cioppino, sourdough‑crusted pork belly, and miso‑ramen with fresh shiitake, while at home they
    experiment with woodworking to craft custom cutting boards for grilling rosemary‑infused lamb skewers.
  core: Nagui Combs fuses a four‑decade electrical career with a restless curiosity for art, tech, and community, juggling spontaneous lighting projects, competitive pickleball matches, and occasional financial
    missteps, all while staying sociable and a bit skeptically competitive.
background:
  cultural: Nagui grew up as a white American in the Bay Area during the 1960s and 70s, absorbing the region’s mix of working‑class pragmatism and vibrant multicultural influences. His upbringing in a modest,
    union‑oriented household instilled a strong work ethic, respect for skilled trades, and a community‑first mindset. Living in Daly City, a city known for its diverse neighborhoods, exposed him to a wide
    array of cultural experiences—from Filipino festivals to LGBTQ+ art showcases—shaping his openness to unconventional ideas and art appreciation. He carries traditional American values of self‑reliance
    and independence, while also valuing the collaborative spirit of his local electricians’ union and the inclusive, socially active lifestyle of his suburban community.
