personas:
  professional: Niurka Diaz is an inquisitive 10‑year‑old budding naturalist who blends a love for wildlife illustration with meticulous LEGO engineering, channeling a keen eye for detail into school science
    projects and an ever‑growing nature journal.
  sports: Niurka Diaz prefers solo hikes on the Trinity River Trails around Fort Worth, cheers for the Dallas Cowboys and Texas Rangers from the sidelines, and belongs to a local youth bird‑watching club
    that meets after school, but rarely joins team sports, citing a need for quiet and flexibility.
  arts: Niurka Diaz channels creative energy into detailed watercolor sketches of hummingbirds, rattlesnakes, and desert vistas, regularly attends junior art workshops at the Fort Worth Museum of Science,
    and curates playlists featuring Shakira, Luis Miguel, and classic folk ballads that accompany her drawing sessions.
  travel: Niurka Diaz dreams of backpacking through California’s Redwood forests after rehearsing routes on a hand‑drawn map, loves weekend trips to the Dallas Arboretum’s butterfly exhibit, and saves pocket
    money for a school‑organized excursion to the Great Smoky Mountains, balancing adventure cravings with parental constraints.
  culinary: Niurka Diaz delights in kneading masa dough for tamales and whisking fresh salsa beside her mom, experiments with adding lime‑zested quinoa to taco fillings for extra protein, and proudly labels
    her homemade snack boxes with bright stickers, while occasionally sneaking extra chips from the pantry when homework drags on.
  core: Niurka Diaz is a solitary, nature‑obsessed ten‑year‑old who finds comfort in structured art and LEGO builds, worries about the unknown, and quietly fuels dreams of wilderness adventures through
    meticulous journaling and family cooking rituals.
background:
  cultural: Niurka is a second‑generation Mexican‑American living in Fort Worth, Texas. Her household blends Spanish and English, and she attends a bilingual elementary school where cultural heritage is
    celebrated. Family traditions such as Día de los Muertos, Mexican Independence Day, and holiday meals featuring tamales, pozole, and fresh salsa are central to her upbringing. She participates in local
    community events like Fiesta Fort Worth, which combine Texan and Hispanic customs. These cultural experiences have nurtured her love for cooking, music, and storytelling, and they reinforce a strong
    sense of family cohesion, respect for elders, and pride in her Hispanic roots.
attributes:
  skills: '["Bilingual Spanish-English", "Reading comprehension", "Basic Scratch programming", "LEGO building", "Puzzle solving", "Basic cooking assistance", "Drawing and sketching"]'
  hobbies: '["Reading adventure and nature books", "Drawing wildlife sketches", "Building LEGO sets", "Exploring local parks and nature trails", "Playing Minecraft (creative mode)", "Helping with family
    cooking (making tamales)", "Listening to Latin music", "Collecting rocks and shells", "Journaling"]'
  career_goals: Niurka imagines herself growing up as a wildlife biologist who studies the animals and ecosystems of Texas. She wants to pursue a degree in ecology and conservation biology, conduct field
    research, and contribute to protecting local habitats. The career appeals to her love for hands‑on work, clear scientific methods, and the opportunity to spend time observing nature independently. She
    also dreams of one day using her coding skills to develop educational tools that teach other children about wildlife, combining her interests in technology and the natural world.
