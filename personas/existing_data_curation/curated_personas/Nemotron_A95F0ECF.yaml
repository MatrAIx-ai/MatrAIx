  hobbies: '[''Cooking Mexican cuisine'', ''Herb gardening'', ''Community dance nights'', ''Volunteering at senior center'', ''Bingo and card games'', ''Walking in desert parks'', ''Church fellowship'',
    ''Crafting (knitting, quilting)'']'
  career_goals: Noel aims to transition into a part‑time mentor or trainer role within the next two years, securing a ServSafe certification to formalize her food‑safety knowledge. She wishes to continue
    contributing to her plant’s success while easing her workload to maintain health and work‑life balance. Long‑term, she envisions volunteering her expertise at a local community college or senior center,
    offering food‑safety workshops and cooking classes for younger generations, and possibly launching a small home‑based catering service that showcases her family’s Mexican recipes.
