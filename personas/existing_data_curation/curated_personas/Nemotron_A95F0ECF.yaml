personas:
  professional: An experienced food‑processing veteran, Noel Zuluaga leverages four decades of plant expertise, meticulous sanitation standards, bilingual communication, and a methodical, team‑focused mindset
    to mentor new hires while pursuing ServSafe certification for a part‑time training role, and they aim to balance workload with health.
  sports: An avid walker and community‑spirit fan, Noel Zuluaga enjoys regular strolls through Red Rock Canyon, participates in a local senior bowling league, and their weekend routine includes cheering
    for the Las Vegas Raiders, the Vegas Golden Knights, and the Las Vegas Aces at games or watch parties where they proudly wear team colors.
  arts: Deeply immersed in cultural performance, Noel Zuluaga sings in the church choir, dances to mariachi and folk tunes by the likes of Lila Downs and Vicente Fernández at community nights, and they
    frequently attend local theater productions and watch classic Latin cinema to stay inspired.
  travel: An enthusiastic yet budget‑conscious traveler, Noel Zuluaga explores the nearby Red Rock Canyon and Valley of Fire on weekend hikes, cherishes family trips to Oaxaca and Mexico City to reconnect
    with roots and culinary traditions, and they dream of a leisurely cruise along the Pacific coast once retirement fully settles in.
  culinary: In the kitchen, Noel Zuluaga showcases masterful skill in preparing authentic tamales, mole, and pozole, seasons each dish with home‑grown chilies, cilantro, and epazote from their herb garden,
    and they love sharing these culinary creations during community workshops and family gatherings.
  core: At 68, Noel Zuluaga blends meticulous organization with a vibrant social spirit, mentoring newcomers in food safety, delighting friends with homemade mole, knitting soothing blankets, and occasionally
    misplacing medication while juggling a lively community calendar.
background:
  cultural: Born to Mexican parents, Noel carries a deep pride in her heritage. She grew up speaking Spanish at home and embraces the values of family solidarity, hospitality, and respect for elders. Religious
    traditions rooted in Catholicism shape her weekly routines and holiday celebrations, including Día de los Muertos, Las Posadas, and Cinco de Mayo, where she prepares festive foods and shares stories
    of her ancestors. Living in Las Vegas, Noel blends these customs with the city’s multicultural vibe, often participating in local Mexican festivals and teaching younger community members about traditional
    cooking, music, and dance. Her bilingual fluency and cultural warmth make her a bridge between her Mexican roots and the diverse fabric of Nevada.
attributes:
  skills: '[''Food safety compliance'', ''Sanitation procedures'', ''Equipment operation and maintenance'', ''Packaging and labeling'', ''Quality control inspection'', ''Inventory management'', ''Team collaboration'',
