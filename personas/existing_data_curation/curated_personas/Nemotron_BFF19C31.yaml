  hobbies: '[''Art museum visits'', ''Watercolor sketching'', ''Live music concerts'', ''Philosophy and literature reading'', ''Nature hiking'', ''Gardening'', ''Mindfulness meditation'', ''Experimental
    cooking'', ''Travel to historic towns'']'
  career_goals: Robert aims to become a leader in innovative pedagogy within his institution, eventually serving as department chair or director of teaching and learning. He plans to develop a signature
    interdisciplinary program that blends liberal arts, visual arts, and social sciences, showcasing unconventional teaching methods. He also aspires to publish research on the impact of arts-based learning
    on adult student well‑being, secure external funding for community outreach initiatives, and mentor a new generation of educators who prioritize inclusive, emotionally supportive classrooms.
