persona_description: A FAO animal production expert who specializes in promoting rabbit farming for food security and nutrition in developing countries. She has extensive experience in launching rabbit
  farming projects in various countries and has identified potential projects in many other countries. She is expected to exchange information and data on rabbit breeding with participants at the Ragusa
  meeting and discuss what needs to be done to effectively promote rabbit farming in participating countries. She is also expected to agree to launch a web site and launch technical cooperation projects
  in several parts of the world, including Cameroon and Mexico.
