personas:
  professional: Bernardo Sotolongo, a seasoned bilingual technical writer and documentation strategist, leverages their meticulous, routine‑driven mindset and fluency in English and Spanish to craft precise,
    compliance‑ready product guides using DITA XML, MadCap Flare, and Adobe FrameMaker while orchestrating cross‑functional teams with methodical precision.
  sports: Bernardo Sotolongo, a devoted follower of the New York Yankees and a regular participant in the Jersey City community baseball league, channels their competitive spirit into weekly runs along
    the Hudson River and maintains membership in the local running club, balancing their love for baseball with disciplined cardio.
  arts: Bernardo Sotolongo’s artistic side thrives on the lively rhythms of merengue and bachata from artists such as Juan Luis Guerra and Aventura, while their appreciation for craftsmanship extends to
    constructing detailed model ships and savoring classic cinema starring Al Pacino.
  travel: Bernardo Sotolongo prefers well‑planned, culturally immersive trips—recently exploring the historic streets of Cartagena and savoring the flavors of San Juan—while they budget for future visits
    to Andalusia in Spain and maintain a balanced itinerary that accommodates family obligations.
  culinary: Bernardo Sotolongo, an accomplished home chef, delights in preparing traditional island dishes such as mangú, sancocho, and arroz con pollo, meticulously seasoning with plantains, cilantro,
    and sofrito, while also experimenting with fresh herbs from their balcony garden to enrich every meal.
  core: Bernardo Sotolongo is a methodical 50‑year‑old bilingual technical writer who blends a disciplined routine with a love for island traditions, baseball, and precise craftsmanship, and they navigate
    life with quiet competitiveness and occasional indulgent quirks.
background:
  cultural: Bernardo is a first‑generation Dominican‑American, born in Santo Domingo and raised in a bilingual household before moving to Jersey City, New Jersey, as a child. He maintains strong ties to
    Dominican culture through language, food, music, and community involvement. He speaks fluent Spanish at home, celebrates Dominican Independence Day, and enjoys merengue and bachata. Living in the vibrant
    Dominican enclave of Jersey City, he participates in local cultural festivals, volunteers at the community center, and supports the Catholic traditions of his family. These cultural roots shape his
    practical, family‑oriented values and his appreciation for routine, community support, and diligent work ethic.
attributes:
  skills: '[''Technical Writing'', ''Technical Editing'', ''Content Management Systems (CMS)'', ''MadCap Flare'', ''Adobe FrameMaker'', ''DITA XML Authoring'', ''Bilingual Documentation (Spanish/English)'',
    ''Information Architecture'', ''Regulatory Compliance Documentation'', ''Project Coordination'', ''Process Improvement'']'
  hobbies: '[''Cooking traditional Dominican cuisine'', ''Watching baseball (especially Dominican players)'', ''Chess'', ''Gardening (herbs and vegetables)'', ''Running/jogging along the Hudson River'',
    ''Attending Dominican cultural festivals'', ''Reading historical non-fiction'', ''Model ship building'']'
  career_goals: Bernardo aims to advance into a senior documentation leadership role, such as Documentation Manager or Information Architect, where he can design and enforce documentation standards across
    the organization. He plans to obtain the Certified Professional Technical Communicator (CPTC) credential and become recognized as a subject‑matter expert in bilingual technical communication. Over the
    next five years, he intends to mentor junior writers, lead a team that delivers error‑free, compliance‑ready user guides, and publish a practical guide on best practices for Spanish‑English technical
    documentation. His ambition is to secure a stable, high‑impact position that leverages his routine‑driven, practical mindset while allowing him to compete for excellence within his field.
