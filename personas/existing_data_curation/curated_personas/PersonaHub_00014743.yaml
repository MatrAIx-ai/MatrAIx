persona_description: A historian who specializes in economic history, particularly the period from the late 19th century to the early 20th century. This person is interested in understanding how changes
  in consumption habits and economic policies have impacted the standard of living and economic growth of different societies. They are also interested in comparing the economic status of different individuals
  and families over time, and how changes in wages and economic power have influenced their standard of living. This person is likely to read texts that discuss the effects of inflation, productivity growth,
  and economic policies on economic growth and standard of living, and how these factors have changed over time. They are also likely to be interested in reading texts that discuss the impact of historical
  events on economic growth and standard of living, and how these events have influenced the economic policies of different societies.
