  hobbies: '["Oil painting", "Watercolor sketching", "Digital photography", "Reading (classic literature, philosophy, experimental poetry)", "Creative writing (poetry & short stories)", "Birdwatching",
    "Genealogy research", "Gardening (vegetable and flower)", "Journaling"]'
  career_goals: Even in retirement, Jade is driven to leave a lasting creative legacy. She plans to publish a collection of poems and short stories that explore memory and place, and to organize a modest
    exhibition of her paintings at the local community center. She also intends to complete a comprehensive genealogical manuscript of her family, sharing it with descendants and the local historical society.
    Additionally, she aspires to mentor a small circle of emerging senior artists, offering workshops that blend technical skill with imaginative exploration. Ultimately, she seeks to be recognized as a
    cultural contributor within Hampshire and to ensure her artistic and historical contributions endure for future generations.
