personas:
  professional: Jade Griffin, a retired senior artist and genealogist, channels imagination and meticulous organization into community exhibitions that blend watercolor depictions of the Illinois prairie
    with curated family histories, all while fostering a competitive yet supportive mentorship environment for emerging senior creators.
  sports: Jade Griffin, a devoted follower of the Chicago Cubs and a regular participant in the Prairie Trail Walkers senior walking club, enjoys low‑impact morning walks along the local wetlands, occasional
    gentle yoga sessions, and occasionally joining a mixed‑age pickleball group at the community center during spring.
  arts: Jade Griffin, an avid watercolorist inspired by Claude Monet and Georgia O'Keeffe, a lover of poetry by Mary Oliver and experimental verses by Anne Carson, and a fan of folk legends like Joni Mitchell,
    often integrates their artistic and literary sensibilities into weekend studio sessions and community gallery shows.
  travel: Jade Griffin, whose wanderlust is tempered by a fixed income, favors purposeful road trips to historic sites such as the French Loire Valley, the Amish Country of Lancaster, and the historic Springfield
    museums, while also enjoying day‑long excursions to the nearby Illinois prairie preserves and occasional visits to the Art Institute of Chicago.
  culinary: Jade Griffin, whose palate is shaped by fresh garden harvests, delights in preparing heirloom tomato and basil bruschetta, roasted beet and goat cheese salad with locally sourced walnuts, and
    a seasonal butternut squash soup, while occasionally over‑salting pickles due to an absent‑minded habit.
  core: Jade Griffin, a creatively driven, competitively spirited senior who blends meticulous organization with boundless imagination to leave an artistic and genealogical legacy, all while navigating
    the quirks of age‑related health and a disciplined yet occasional indulgent lifestyle.
background:
  cultural: Jade grew up in post-World War II Illinois, the daughter of a second-generation Midwestern farming family of English-Irish ancestry. The values of self-reliance, modesty, and community involvement
    typical of the rural Midwest shaped her worldview. Though she never pursued a formal career, her education included liberal-arts studies at a nearby community college, fostering an appreciation for
    the arts and humanities. As a lifelong member of a local Protestant congregation, she has participated in church-based volunteer activities. Her identity as a white Midwesterner informs her preferences
    for small-group gatherings, a deep connection to the natural landscapes of Illinois, and a quiet, introspective approach to cultural expression.
attributes:
  skills: '["Oil painting", "Watercolor painting", "Abstract composition", "Digital photography", "Creative writing (poetry & short fiction)", "Literary analysis", "Genealogy research", "Document preservation",
