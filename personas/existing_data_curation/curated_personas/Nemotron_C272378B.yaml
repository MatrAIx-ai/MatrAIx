personas:
  professional: Rose Davis is a curious junior illustrator who transforms favorite storybook characters into lively sketches, channels that creativity into art club collaborations, and dreams of publishing
    a graphic novel by middle school, thriving in group projects where they assert energetic ideas.
  sports: Rose Davis dashes across the field for the River Valley Kids Soccer Club during the spring season, kicks in after‑school practices with the enthusiasm of a budding midfielder, pairs soccer with
    weekly hip‑hop dance sessions set to pop and gospel hits, and cheers for the local professional basketball team, the Metro City Titans, drawing inspiration from their fast‑paced play, all while they
    maintain a boundless energy for group games.
  arts: Rose Davis immerses themselves in illustrated storytelling, borrowing brushstroke flair from artists like Mary GrandPré and narrative whimsy from Hayao Miyazaki films, while humming to Taylor Swift
    pop anthems and mixing in soulful gospel choruses, shaping a vibrant artistic identity that bleeds into school art club murals, and they often experiment with new media during free‑form sketch sessions.
  travel: Rose Davis loves spontaneous family hikes through the Great Smoky Mountains, balances those adventures with frequent trips to the Columbia Museum of Art, and daydreams about future travel to the
    historic streets of Edinburgh and the cherry‑blossom festivals of Kyoto, planning each outing with a flexible, sketch‑filled notebook rather than a strict itinerary, and they relish the anticipation
    of new horizons.
  culinary: Rose Davis delights in building homemade pepperoni pizza slices topped with mozzarella and fresh basil, whips up rainbow fruit smoothies with strawberries, mango, and blueberries for snack time,
    eagerly samples hearty mac & cheese at school lunches, though they sometimes forget to rinse their plates after messy LEGO‑themed meals, turning cooking into a playful experiment.
  core: Rose Davis is a curious, energetic nine‑year‑old who blends artistic imagination with soccer stamina, navigates life with a carefree, slightly disorganized flair, and they approach each day as a
    canvas of colorful adventure.
background:
  cultural: Rose is an African American girl growing up in Columbia, South Carolina. She participates in community traditions like church youth gatherings, family cookouts featuring soul food, and celebrations
    of Juneteenth and Black History Month that highlight local history and achievements. Her family shares stories of the civil‑rights movement in Columbia, and she takes pride in the rich musical and artistic
    heritage of the region, often attending cultural festivals and museum programs that connect her to her roots.
