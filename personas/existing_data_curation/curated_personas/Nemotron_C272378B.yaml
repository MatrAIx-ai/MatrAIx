  hobbies: '[''Sketching and painting'', ''Reading adventure/mystery books'', ''Playing soccer'', ''Dancing to music'', ''LEGO building'', ''Participating in school art club'', ''Family hikes'', ''Visiting
    local museums'']'
  career_goals: Rose dreams of one day turning her love for art and ideas into a career where she can inspire others—whether as a community muralist who paints stories of her neighborhood, an educator who
    brings creativity into the classroom, or a scientist who designs fun experiments to explore how things work. She is excited about any path that lets her keep learning, sharing, and helping friends discover
    new interests.
