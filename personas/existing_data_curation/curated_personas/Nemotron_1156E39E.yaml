personas:
  professional: Kevin Bohannon is a detail‑oriented aspiring operations coordinator who leverages their methodical problem‑solving, strong organizational skills, and curiosity for process improvement to
    excel in retail work and college projects, aiming to streamline workflows at a Piedmont agribusiness while mentoring high‑school students.
  sports: Kevin Bohannon is an avid outdoors enthusiast who hikes the Brushy Mountains, fishes local streams, roots for the Charlotte Hornets, follows the Carolina Panthers, plays occasional intramural
    soccer with the Asheville Trail Runners club, and keeps fit by doing weekend trail runs.
  arts: Kevin Bohannon is a budding acoustic guitarist who regularly riffs on John Mayer and B.B. King tracks, enjoys listening to The Avett Brothers for lyrical storytelling, streams indie films like Moonrise
    Kingdom, reads non‑fiction works by Malcolm Gladwell, and occasionally sketches nature scenes during hikes.
  travel: Kevin Bohannon is a budget‑conscious explorer who has road‑tripped along the Blue Ridge Parkway, visited the historic streets of Charleston, SC, plans an upcoming solo trek to the Appalachian
    Trail, and dreams of backpacking through the Scottish Highlands while balancing school commitments.
  culinary: Kevin Bohannon is a self‑taught home chef who delights in cooking classic Southern dishes such as shrimp and grits, fried catfish, collard greens seasoned with smoked paprika, and buttery cornbread,
    often experimenting with locally sourced sweet corn and heritage pork for family gatherings.
  core: Kevin Bohannon blends methodical organization with a love for nature, guitar, and Southern cooking, balancing diligent financial planning with occasional impulsive splurges, and juggles a quiet
    anxiety about deadlines with a generous community spirit.
background:
  cultural: Kevin grew up in Cameron, a small town in Lee County, North Carolina, where close‑knit family ties and community involvement are central to daily life. His family has deep roots in the rural
    South, with traditions of hospitality, modesty, and respect for hard work. He attended local public schools, was involved in church youth groups, and participated in community events such as county
    fairs and volunteer clean‑up days. These Southern cultural influences blend with his exposure to broader ideas through college and the internet, shaping a worldview that values both tradition and progressive
    learning.
