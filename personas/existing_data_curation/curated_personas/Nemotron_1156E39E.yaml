  hobbies: '[''Fishing'', ''Hiking'', ''Playing acoustic guitar'', ''Reading non-fiction (science, technology, self-improvement)'', ''Strategic video gaming'', ''Volunteering at the local food bank'', ''Cooking
    Southern cuisine'', ''Attending community fairs and events'']'
  career_goals: Kevin aims to complete his associate degree in Business Administration within the next year and then secure an entry‑level operations coordinator position at a manufacturing or agribusiness
    firm in the Piedmont region. Over the next five years, he hopes to advance to a supervisory role where he can apply his curiosity for process improvement and his methodical approach to increase efficiency.
    He also envisions launching a small home‑maintenance service that blends reliable service with innovative solutions, and he wants to mentor high‑school students through local career‑exploration programs.
