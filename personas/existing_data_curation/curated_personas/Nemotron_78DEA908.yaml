  hobbies: '[''Drawing & sketching'', ''Creative writing (stories, comics)'', ''Digital art on tablet'', ''LEGO building'', ''Scratch coding projects'', ''Science experiments'', ''Singing in school choir'',
    ''Dancing to R&B/hip‑hop'', ''Visiting museums and cultural sites'']'
  career_goals: Stephany envisions a future where she can blend art, technology, and science to inspire others. Her short‑term goal is to attend a specialized arts‑focused middle‑school program and later
    a high‑school that emphasizes visual communication and computer science. Long‑term, she aspires to become a multimedia artist or creative technologist—creating animated stories, interactive educational
    games, or visual documentaries that celebrate African‑American heritage and scientific discovery. She also hopes to mentor younger Black girls in STEM and the arts, showing them that curiosity and creativity
    can lead to rewarding careers.
