personas:
  professional: Stephany Destinville is a budding visual storyteller who blends imaginative comic panels with scientific concepts; they use their love of LEGO to prototype story settings while keeping a
    disciplined sketchbook schedule that balances schoolwork and art practice.
  sports: Stephany Destinville dances to R&B and hip‑hop beats in an after‑school club; they play forward for the Huntsville United Soccer Club’s U‑12 team in the spring, follow the Alabama Crimson Tide
    football during fall weekends, and cheer for the Huntsville Rockets junior hockey team in the winter season.
  arts: Stephany Destinville draws inspiration from the bold street art of Banksy, the swirling colors of Van Gogh’s Starry Night, and the dynamic visual storytelling in Beyoncé’s music videos; they regularly
    visit the Huntsville Museum of Art and listen to Kendrick Lamar while sketching new characters.
  travel: Stephany Destinville dreams of exploring the Smithsonian National Air and Space Museum in Washington, D.C.; they cherish memories of a family road trip to New Orleans’ French Quarter, plan a future
    visit to Disneyland in Orlando, and hope one day to trek the ancient ruins of Machu Picchu with a school exchange program.
  culinary: Stephany Destinville loves the comfort of homemade mac and cheese, experiments with baking chocolate brownies using cocoa powder and a pinch of sea salt, enjoys fresh mango salsa on tacos, and
    frequently blends strawberry‑banana smoothies with Greek yogurt for after‑practice snacks; they often experiment with adding a dash of cinnamon to pancakes for extra flavor.
  core: Stephany Destinville is an imaginative, organized 11‑year‑old who mixes art, science, and dance into daily life; they balance a love for LEGO builds with occasional forgetfulness about flossing
    and budgeting.
background:
  cultural: Stephany is a Black girl raised in Huntsville, Alabama, where she grows up surrounded by a vibrant Southern African‑American community. Family gatherings often feature soul food, storytelling,
    and gospel music, reinforcing a deep appreciation for heritage and oral tradition. She celebrates cultural milestones such as Juneteenth and Kwanzaa, and her parents emphasize the importance of education
    and community service. Local institutions like the Alabama African American Museum and the Huntsville Space Center provide her with both historical context and exposure to science, shaping her dual
    love for culture and curiosity. Her cultural background informs her artistic voice, encouraging her to create work that reflects her community’s experiences and aspirations.
