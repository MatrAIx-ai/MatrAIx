personas:
  professional: Donald Marucci is a 25‑year‑old heavy‑equipment operator who leverages his meticulous safety mindset and hands‑on mechanical expertise to keep construction sites running on schedule, while
    his competitive streak drives him to pursue the CCEO certification and lead a crew within the next year.
  sports: Donald Marucci plays pickup basketball at the Corona community courts, competes in a weekend flag‑football league for the Riverside Raiders, follows the Los Angeles Lakers and Los Angeles Rams
    closely, and rides his Harley‑style motorcycle on the Temescal Canyon trail with the Southern California Riders Club to stay fit and socially engaged.
  arts: Donald Marucci is a classic‑rock aficionado who streams Led Zeppelin and the Foo Fighters, attends live shows at the Riverside Municipal Auditorium, loves vintage car restoration set to the soundtrack
    of the Rolling Stones, and channels his competitive edge into high‑stakes Call of Duty tournaments where he watches esports pros like s1mple.
  travel: Donald Marucci favors short, adrenaline‑filled road trips, having already ridden the Pacific Coast Highway to Big Sur, camped at Lake Arrowhead, and explored the Grand Canyon, while he dreams
    of a cross‑country motorcycle pilgrimage to New Mexico’s historic Route 66 towns.
  culinary: Donald Marucci enjoys grilling smoked brisket seasoned with paprika and garlic, cooking fresh‑caught bass with lemon‑cilantro butter, and casually firing up a classic spaghetti carbonara when
    friends drop by, though his cooking skill hovers at enthusiastic amateur level.
  core: Donald Marucci blends a disciplined, safety‑first work ethic with a high‑octane social life, often juggling competitive sports, motorcycle escapades, and a lingering habit of over‑worrying about
    the next deadline.
background:
  cultural: Donald was raised in a middle‑class, predominantly white neighborhood in Corona, California. His family’s cultural traditions blend typical American customs—such as celebrating Thanksgiving
    and the Fourth of July—with a strong emphasis on hard work and community involvement that reflects the Southern California ethos. Growing up in a diverse county, he has been exposed to a variety of
    cultural influences, from the surrounding Hispanic community to the broader multicultural fabric of Riverside County, which has broadened his social outlook while still grounding him in his own family’s
    values of reliability and practicality.
attributes:
  skills: '["Excavator operation", "Bulldozer operation", "Backhoe operation", "Heavy equipment maintenance", "Hydraulic and mechanical troubleshooting", "Construction plan interpretation", "OSHA safety
    compliance", "Site logistics coordination", "Team communication", "First aid and emergency response"]'
  hobbies: '["Pickup basketball", "Flag‑football league", "Motorcycle riding", "Fishing", "Car restoration", "Classic rock concerts", "Competitive video gaming", "Habitat for Humanity volunteering"]'
  career_goals: Donald aims to earn a Certified Construction Equipment Operator (CCEO) certification within the next year and to be promoted to crew lead, overseeing a small team of operators. Over the
    next five years, he hopes to transition into a site‑supervisor role, managing larger projects and budgets. Ultimately, he dreams of starting his own equipment‑rental business, providing reliable machinery
    and training services to contractors across Riverside County, which would give him greater financial stability and control over his work schedule, reducing the stress that currently concerns him.
