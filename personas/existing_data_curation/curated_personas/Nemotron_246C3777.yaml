  career_goals: Michael aims to graduate high school with a strong GPA and earn a certification in automotive technology or a related trade at a nearby technical college. He wants to merge his hands‑on
    mechanical skills with his growing coding knowledge to design and maintain eco‑friendly vehicles or renewable‑energy systems. In the long term, he envisions a career as a mechanical engineer or a skilled
    technician who can improve local infrastructure, support community projects, and mentor younger students in STEM fields.
