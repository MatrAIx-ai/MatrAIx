    in a community league'', ''Solving puzzles and using educational apps'']'
  career_goals: Brian’s imagination is already pointing toward future roles that combine his love of nature, helping others, and hands-on work. He often says he wants to become a wildlife biologist to study
    and protect local animals, a farmer who continues his family’s traditions, or even an astronaut who can explore new worlds. While his goals are still fluid, he consistently expresses a desire to learn
    more about animals, the environment, and how things are built, with the ambition to use that knowledge to benefit his community.
