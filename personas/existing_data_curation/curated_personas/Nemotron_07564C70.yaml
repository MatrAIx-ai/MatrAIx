  career_goals: Rachel aims to merge her technical expertise with her passion for art and community empowerment. Over the next few years she plans to relaunch her professional life as a freelance data-visualization
    consultant for local cultural institutions and nonprofit organizations, helping them turn complex data into accessible stories. Simultaneously, she intends to launch a community makerspace in Atlantic
    Beach that offers STEAM workshops for youth and adults, fostering interdisciplinary learning. To deepen her impact, she will pursue a certification in user-experience design and enroll in a part-time
    master’s program in environmental science, positioning herself to lead sustainability-focused projects. Rachel also aspires to become a mentor for women in STEM, speaking at regional conferences and
    coordinating mentorship programs that encourage unconventional thinking.
