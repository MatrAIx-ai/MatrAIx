personas:
  professional: Rachel Sheehan is a freelance data‑visualization consultant who translates complex municipal and nonprofit data into interactive Tableau and PowerBI stories, weaving her watercolor artistry
    and photography into polished dashboards while leveraging Agile project leadership to empower community cultural institutions, and they thrive on turning numbers into visual narratives that resonate
    with local audiences.
  sports: Rachel Sheehan kicks off mornings paddling surf with the Atlantic Beach Surf Club, logs shoreline jogs and yoga three times a week, plays casual beach volleyball with the local league, and roots
    for the New York Mets while cheering on the New York Knicks during the NBA season, showcasing a versatile, community‑oriented fitness lifestyle that they share with friends.
  arts: Rachel Sheehan curates visual narratives inspired by Annie Leibovitz’s portraits and Claude Monet’s impressionist palettes, showcases her watercolor series at Brooklyn’s Art Overture Gallery, attends
    live shows at the Brooklyn Academy of Music featuring St. Vincent, and regularly engages with community art fairs, weaving her creative passion into her social calendar as they network with fellow artists.
  travel: Rachel Sheehan favors immersive cultural festivals, having trekked to Italy’s Cinque Terre for its coastal art trails, explored Morocco’s Marrakech souks for spices, and attended New Orleans’
    Mardi Gras to savor jazz and Cajun cuisine, yet balances these adventures with a modest budget by planning trips during off‑season and leveraging her network of fellow volunteers for shared accommodations,
    a strategy they refine each year.
  culinary: Rachel Sheehan enjoys cooking Mediterranean-inspired meals such as lemon‑herb grilled salmon with sumac‑seasoned quinoa, crafts fish tacos with grilled octopus, and experiments with coconut‑curry
    ramen, boasting an intermediate skill level that combines her love for fresh seafood, bold spices like za’atar, and occasional indulgence in artisanal cheese boards, a culinary adventure they share
    with friends over board‑game nights.
  core: Rachel Sheehan is a curious, sociable 35‑year‑old who fuses data science with artistic flair, thrives on shoreline fitness, champions community volunteerism, and balances disciplined budgeting with
    impulsive surf‑gear splurges, all while they constantly seek new ways to merge analytics and creativity.
background:
  cultural: Rachel grew up in a middle-class suburban neighborhood in the Midwest, raised in an Irish-American family that valued education, hard work, and community service. Her upbringing emphasized practical
    problem-solving and a modest, independent outlook. Relocating to Atlantic Beach in her late twenties exposed her to Southern hospitality, a culturally diverse coastal community, and a vibrant arts scene.
    This blend of Midwestern pragmatism and the laid-back, inclusive vibe of the Florida coast shapes her cultural identity, fostering an appreciation for both tradition and innovation, as well as a commitment
    to environmental stewardship and community engagement.
