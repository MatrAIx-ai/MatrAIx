personas:
  professional: Tabetha Allen, a retired homemaker turned senior volunteer coordinator, applies their lifelong mastery of budgeting, event planning, and conflict resolution to design community programs
    with precise schedules while staying flexible enough to meet the shifting needs of the local senior center.
  sports: Tabetha Allen enjoys joining the Kanawha County Senior Walking Club for daily strolls, cheering on the Charleston RiverDogs during baseball season, and follows the West Virginia Mountaineers football
    team, balancing light cardio with gentle stretching to stay fit.
  arts: Tabetha Allen sings folk hymns with the church choir, collects recordings of Doc Watson and The Carter Family, and leads a weekly quilting circle where they stitch intricate patterns while reminiscing
    about stories from local storytellers.
  travel: Tabetha Allen prefers road‑trip adventures to nearby mountain retreats like the Blue Ridge Parkway and occasional pilgrimages to Nashville’s folk‑music festivals, planning trips months ahead but
    occasionally getting delightfully lost on scenic backroads.
  culinary: Tabetha Allen delights in cooking traditional dishes such as soup beans, cornbread, and apple stack cake using garden‑fresh tomatoes and herbs, and while they possess confident cooking skills,
    they are notorious for over‑salting the beans when distracted by phone calls.
  core: Tabetha Allen is a structured yet sociable retiree who blends meticulous community service with a love for folk music, quilting, and garden‑to‑table cooking, all while navigating mild health challenges
    and a disciplined budget.
background:
  cultural: Tabitha grew up in a multi‑generational Appalachian family in West Virginia, where community, self‑reliance, and tradition were core values. She identifies with the cultural heritage of the
    Appalachians, including folk music, storytelling, and handcrafts such as quilting. As an active member of her local Methodist church, she embraces the close‑knit neighborhoods of Kanawha County and
    cherishes the region's emphasis on hospitality and mutual support.
