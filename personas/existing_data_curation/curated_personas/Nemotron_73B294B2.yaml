  hobbies: '[''gardening'', ''knitting'', ''quilting'', ''cooking Appalachian cuisine'', ''singing in church choir'', ''walking group'', ''reading historical fiction'', ''volunteering at animal shelter'',
    ''attending community festivals'', ''crafting with friends'']'
  career_goals: Although retired from formal employment, Tabitha aims to deepen her community involvement. She aspires to become a senior volunteer coordinator at the local community center, lead a weekly
    craft circle for seniors, mentor younger volunteers, and contribute oral histories to the Kanawha County historical society. She also plans to enhance her digital skills to stay connected with family
    and share her experiences through a personal blog.
