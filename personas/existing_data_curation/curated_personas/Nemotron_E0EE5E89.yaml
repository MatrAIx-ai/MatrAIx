    Microsoft Excel)'', ''Strategic Planning'']'
  hobbies: '[''Gardening'', ''Hiking in Pacific Northwest trails'', ''Cooking and baking'', ''Reading non-fiction and mystery novels'', ''DIY home improvement projects'', ''Board game evenings'', ''Volunteering
    on homeowner association committees'', ''Meditation and yoga'', ''Birdwatching'', ''Landscape photography'']'
  career_goals: Carolyn aims to advance to a senior regional manager position overseeing multiple community‑association portfolios within the next five years, while obtaining the Certified Manager of Community
    Associations (CMCA) credential to formalize her expertise. She is driven to introduce more efficient, technology‑enabled workflows that reduce manual reporting and improve resident communication. A
    long‑term ambition is to mentor emerging property‑management professionals and, eventually, to launch a boutique consulting firm focused on compliance, sustainability upgrades, and crisis‑preparedness
    for homeowners’ associations in the Pacific Northwest. All of these goals are grounded in her desire for financial stability, a well‑structured career path, and the ability to leave a lasting, positive
    impact on the communities she serves.
