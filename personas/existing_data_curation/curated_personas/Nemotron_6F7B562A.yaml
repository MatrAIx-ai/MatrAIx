    Experimentation'']'
  career_goals: Carol aims to move into a supervisory role within the next two years, leveraging her track record of high customer satisfaction scores. She intends to earn a GED and complete a short certification
    in call-center management to strengthen her credentials. Long-term, she aspires to become a Customer Service Manager overseeing a regional team, and eventually explore a role in operations where she
    can design workflow improvements. Financially, she wants to build a solid emergency fund, pay off student loan debt, and save for a down-payment on a modest home in Sunbury. She also plans to develop
    resilience strategies, such as stress-management workshops, to better handle the emotional demands of frontline service.
