  career_goals: Larry aims to move into a supervisory role within the next two years, seeking certification as a Certified Production Technician to formalize his expertise. He is driven to lead a shift
    team, implement efficiency projects that reduce waste and increase output, and earn recognition as a top performer in his plant. Long‑term, he envisions advancing to plant manager or starting a consulting
    firm that advises small textile workshops on process optimization, providing financial stability for his family after his divorce.
