    Finance'']'
  career_goals: Betty’s ambition is to transition from a receptionist role into an administrative leadership position within the next five years. She aims to become an assistant office manager, then a full
    office manager, where she can apply her business‑strategy mindset to drive cost‑effective workflow improvements. To support this, she is pursuing the Certified Administrative Professional (CAP) credential
    and seeking mentorship from senior managers. Her competitive drive fuels a desire for measurable achievements, such as reducing office supply costs by 15% and improving appointment‑booking efficiency.
    Long‑term, she envisions overseeing operations for a community‑focused nonprofit or a mid‑size corporate office in Cincinnati, creating a structured environment that also offers mental‑health resources
    for staff.
