  hobbies: '[''Gardening'', ''Hiking and lakefront trail walking'', ''Road trips'', ''Reading mystery novels'', ''Animal shelter volunteering'', ''Board game nights'', ''Beginner yoga'']'
  career_goals: Christine aims to transition into a senior technologist or clinical educator role within the next five years, where she can mentor newer staff and lead training on radiation safety and patient-centered
    imaging practices. She plans to obtain advanced certification in magnetic resonance imaging (MRI) and pursue a certification in health informatics to bridge clinical imaging with data management. Christine
    also hopes to contribute to hospital committees focused on patient experience and quality improvement, and she envisions collaborating with local community health programs to provide outreach imaging
    services for underserved populations in Milwaukee.
