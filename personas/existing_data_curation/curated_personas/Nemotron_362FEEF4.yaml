personas:
  professional: Aurora Castillo, a meticulous veteran of municipal clerical work, leverages four decades of data‑entry expertise and bilingual fluency to mentor junior staff in streamlined workflows while
    championing cultural sensitivity, all while staying ahead of emerging office tech through cloud‑based document sharing and electronic signatures.
  sports: Aurora Castillo, a devoted follower of the Miami Heat during winter and the Tampa Bay Buccaneers in the fall, joins the Broward Seniors Walking Group for low‑impact cardio, participates in a community
    senior softball league each spring, and balances spectator enthusiasm with gentle, regular activity.
  arts: Aurora Castillo, whose afternoons are spent sketching scenes at the Museum of Art Fort Lauderdale and painting watercolor coastal landscapes inspired by Monet and O’Keeffe, also experiments with
    mixed‑media collages that echo traditional motifs, and volunteers as a docent for bilingual storytime, weaving art into community outreach.
  travel: Aurora Castillo, who prefers carefully planned itineraries over spur‑of‑the‑moment trips, has explored historic Savannah, taken a leisurely cruise through the Caribbean islands, and dreams of
    revisiting the coastal charm of Amalfi, all while balancing travel expenses with a modest retirement budget.
  culinary: Aurora Castillo, an intermediate home chef, delights in preparing citrus‑marinated ceviche, slow‑roasted hornado infused with fresh garden herbs, and golden empanadas filled with a blend of
    shrimp and mango, often pairing these dishes with a crisp Sauvignon Blanc and experimenting with local Florida produce.
  core: Aurora Castillo, a curious, organized septuagenarian who balances meticulous record‑keeping with spontaneous watercolor escapes, competitive budgeting, and a healthy skepticism toward new trends,
    lives a life that blends disciplined routine with artistic spontaneity.
background:
  cultural: Aurora was born in Quito, Ecuador, and immigrated to the United States in the early 1970s, first settling in New York before moving to Fort Lauderdale in the 1990s. She grew up in a close‑knit
    family that celebrated traditional Ecuadorian customs such as Día de los Difuntos, Carnaval, and the preparation of ceviche and hornado. Her bilingual upbringing instilled a deep respect for both Ecuadorian
    and American cultures, shaping her identity as a bridge between communities. In Fort Lauderdale, she actively participates in events organized by the Ecuadorian consulate, supports local cultural festivals,
    and maintains strong ties with relatives in the Guayas province. Her heritage influences her culinary interests, community involvement, and her appreciation for vibrant art and music, which she weaves
    into her daily life.
