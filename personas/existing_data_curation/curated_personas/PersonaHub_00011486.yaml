persona_description: A paleontologist who specializes in the study of dinosaur fossils and their postnatal development. This individual is likely to be interested in the discovery of a large nest of juvenile
  Protoceratops dinosaurs, first of its genus ever found, from Mongolia. They would be interested in the analysis of the nest by Fastovsky and his colleagues, which found that all 15 dinosaurs were about
  the same size and had achieved the same state of growth and development, suggesting they represent a single clutch from a single mother. They would also be interested in the findings that indicate that
  the young dinosaurs remained in the nest through the early stages of postnatal development and were cared for by their parents.
