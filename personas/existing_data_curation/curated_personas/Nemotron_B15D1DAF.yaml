  hobbies: '[''dancing to children’s songs'', ''playing dress‑up with dolls'', ''building block towers'', ''coloring mandala designs'', ''attending library storytime'', ''participating in group games like
    Simon Says'', ''helping with simple chores like setting the table'']'
  career_goals: Although only three, Padmavathy already imagines a future where she can care for others and keep things orderly. She expresses a desire to become a teacher or a pediatric nurse—roles where
    she can nurture children, maintain a structured environment, and promote harmony. Influenced by her family's emphasis on service and her calm, resilient temperament, she aspires to a career that blends
    compassion with organization, perhaps eventually managing community programs for children.
