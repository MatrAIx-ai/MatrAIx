  career_goals: Driven by his love of innovation and his desire to impact communities, Tashawn aims to advance into a senior program director role where he can shape enterprise-wide initiatives that blend
    creative thinking with disciplined execution. He plans to earn professional certifications in Agile and Program Management, mentor emerging Black project managers, and eventually launch his own consultancy
    that helps organizations embed inclusive, art-inspired problem-solving practices. Long-term, he envisions authoring a book on leveraging imagination in project leadership and speaking at industry conferences
    about the intersection of culture, creativity, and effective project delivery.
