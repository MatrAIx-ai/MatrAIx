personas:
  professional: Tashawn Sims leverages a decade of project management experience and a business degree to blend agile and design‑thinking frameworks with a vivid imagination, crafting client‑focused roadmaps
    that feel more like artistic installations than spreadsheets, while their relaxed attitude toward strict deadlines and occasional disorganization are balanced by strong emotional intelligence that drives
    empathetic yet assertive leadership as they pursue a senior program director role and future consultancy.
  sports: Tashawn Sims starts each day with a solitary jog along the St. Johns River as a member of the Jacksonville Runners Club, occasionally joins a pick‑up basketball game at the local YMCA, and cheers
    for the Jacksonville Jaguars in the NFL season, while also following the Jacksonville Jumbo Shrimp baseball team for a laid‑back summer pastime.
  arts: Tashawn Sims curates personal playlists that weave together Miles Davis, Erykah Badu, and Aphex Twin while sketching abstract digital illustrations inspired by Yayoi Kusama and James Turrell, regularly
    attends spoken‑word nights at the Elbow Room, visits the Cummer Museum for modern art inspiration, and devours speculative fiction by Octavia Butler and Ted Chiang in the quarterly philosophy‑science‑fiction
    book club.
  travel: Tashawn Sims favors solo, flexible itineraries that blend cultural immersion with artistic discovery, having explored New Orleans’ jazz districts, Asheville’s craft breweries, and Mexico City’s
    street art scene, while dreaming of wandering Kyoto’s temples and Lisbon’s azulejo‑covered streets with only a sketchbook and a modest travel budget guiding the journey.
  culinary: Tashawn Sims delights in fusing Southern comfort with global flavors, whipping up shrimp‑and‑grits pho, collard‑greens kimchi, and sweet‑potato gnocchi tossed in a Cajun roux, and they gravitate
    toward ingredients like okra, miso, harissa, and pomegranate molasses, showcasing a moderately advanced cooking skill that thrives on experimental kitchen nights.
  core: Tashawn Sims is an imaginative, stress‑prone project leader who balances artistic curiosity with a penchant for flexible, sometimes chaotic, planning, always sprinkling their day with solo runs,
    jazz playlists, and a relentless quest for new flavors.
background:
  cultural: Born and raised in Jacksonville, Tashawn grew up in a close-knit African-American family that valued community, church, and storytelling. His upbringing blended Southern cultural traditions—such
    as soul food, gospel music, and historic civil‑rights activism—with a modern embrace of Black entrepreneurship and the arts scene that thrives in Duval County. He has maintained ties to local Black
    cultural institutions, including the Jacksonville Urban League and the Museum of Contemporary African Art, and he draws inspiration from the resilience and creativity of his heritage when approaching
    both professional challenges and artistic pursuits.
