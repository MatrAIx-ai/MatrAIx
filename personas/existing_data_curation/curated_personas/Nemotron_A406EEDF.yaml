personas:
  professional: Nancy Rihani, a budding digital storyteller, channels her curiosity and methodical planning into crafting stop‑motion animation shorts for her personal blog, using her smartphone and a meticulously
    organized sketchbook to storyboard each scene, while her reserved nature keeps her interactions with collaborators small but highly focused.
  sports: Nancy Rihani, an avid fan of community sports, follows the New York Knicks and the Bronx Broncos youth soccer league, participates in after‑school jogging sessions around Pelham Bay Park, and
    balances a love for indie rock playlists with low‑impact workouts, though they often skip the weekly basketball practice in favor of completing a puzzle.
  arts: Enthralled by the Bronx Museum of the Arts, Nancy Rihani draws inspiration from street artist Banksy and musician David Bowie, spends weekends sketching scenes from speculative fiction novels in
    their sketchbook, and mixes indie rock with classic rock while curating a personal playlist that includes The Strokes and Fleet Foxes, shaping both their storytelling style and quiet confidence.
  travel: Methodical yet imaginative, Nancy Rihani plans weekend trips with a detailed notebook, has visited the Smithsonian in Washington, D.C., and the historic streets of Boston, while their travel bucket
    list includes a solo adventure to the Louvre in Paris to study Renaissance art, all while balancing a school schedule and family expectations.
  culinary: With a palate that favors homemade pepperoni pizza, avocado toast seasoned with lemon zest, and the occasional sushi roll, Nancy Rihani experiments with simple recipes using fresh basil and
    mozzarella, but often forgets to clean the kitchen afterward, leaving a trail of flour that they later consider a "creative mess."
  core: Nancy Rihani is a curious, organized teen who blends solitary sketching with quiet community service, secretly hoards gummy bears, and never skips a puzzle piece, even if it means staying up past
    bedtime.
background:
  cultural: Nancy comes from a White, likely Italian-American family rooted in the Bronx, New York. While her household celebrates traditional American holidays and maintains some heritage recipes, growing
    up in the culturally rich Bronx has immersed her in a mosaic of Latino, African-American, and Caribbean influences. She regularly attends community festivals, enjoys street art, and is exposed to diverse
    music and cuisine, shaping a broad, inclusive cultural outlook.
attributes:
  skills: '[''Sketching'', ''Mixed-media drawing'', ''Mathematics'', ''Reading comprehension'', ''Digital literacy'', ''Basic Scratch programming'', ''Organizational planning'', ''Team collaboration'']'
  hobbies: '[''Sketching'', ''Visiting museums'', ''Reading speculative fiction'', ''Writing short stories'', ''Stop-motion animation'', ''Jigsaw puzzles'', ''Walking in the park'', ''Volunteer at library'']'
  career_goals: She aspires to become a multidisciplinary artist and eventually a curator for a community museum, focusing on creating interactive exhibits that blend visual art and technology. She also
    envisions studying graphic design or animation in college, aiming to develop projects that inspire others and promote cultural understanding.
