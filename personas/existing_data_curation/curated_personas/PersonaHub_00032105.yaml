persona_description: A scientist specializing in the study of mammalian evolution and the common ancestor of other mammals. She has been researching the fossil record and comparing it with genetic data
  to identify the ancestor of placental mammals and the common ancestor of all living species. She has been working on the project MorphoBank, a publicly accessible database for handling data and images
  on mammals. She has a background in anatomy and has published extensively on the topic of placental mammals. She is interested in the pattern and timing of early mammal life and the capabilities of new
  technology for handling large amounts of fossil and genetic data in the service of evolutionary biology.
