personas:
  professional: Rosanna Buitrago is an aspiring community art facilitator who blends beginner digital design skills, bilingual fluency, and a deeply empathetic nature to lead volunteer art workshops and
    peer‑mediation sessions, even though a laid‑back attitude toward deadlines often leads to last‑minute scrambling.
  sports: Rosanna Buitrago enjoys playing beach volleyball with the local Humacao Beach Club, follows the Cangrejeros de Santurce basketball team, and stays active by dancing salsa at community nights,
    though they often skip formal workouts because they prefer spontaneous, fun‑focused activity.
  arts: Rosanna Buitrago immerses themselves in street mural tours inspired by artists like Banksy and Os Gemeos, sketches alongside listening to Bad Bunny and Bon Iver, writes spoken‑word poetry reminiscent
    of Ana María Fagundo, and attends live performances by salsa legend Celia Cruz’s tribute shows, using these experiences to fuel both visual and lyrical creations.
  travel: Rosanna Buitrago dreams of traveling to the vibrant folk festivals of Oaxaca, Mexico, and the historic music gatherings in Córdoba, Argentina, while they usually plan short trips with friends
    to nearby beaches and the bustling streets of San Juan on a shoestring budget, preferring spontaneous exploration over rigid itineraries.
  culinary: Rosanna Buitrago loves experimenting with traditional Caribbean dishes like mofongo stuffed with pork and plantains, arroz con gandules, and pastelón, often adding a pinch of sofrito and fresh
    cilantro, and while their cooking skill rests at enthusiastic home‑chef level, they relish sharing these meals at family gatherings and sometimes over‑spice the sauce when stressed.
  core: Rosanna Buitrago is an endlessly curious teen whose artistic spark, compassion for peers, and tendency to procrastinate creates a vibrant yet occasionally chaotic blend of creativity and community
    spirit.
background:
  cultural: Rosanna is a proud Puerto Rican from Humacao, a coastal municipality known for its rich Afro‑Caribbean heritage, vibrant music scene, and tight‑knit community values. She grew up speaking Spanish
    at home while learning English at school, giving her bilingual fluency that shapes her social interactions. Family gatherings centered around traditional dishes such as arroz con gandules, pasteles,
    and lechón, and celebrations of fiestas patronales and the annual Humacao Festival have reinforced her appreciation for music, dance, and community solidarity. The island’s history of resilience and
    the intergenerational emphasis on helping neighbors inform Rosanna’s compassionate outlook and desire to give back.
attributes:
  skills: '[''Digital illustration'', ''Photo and video editing'', ''Bilingual communication (Spanish/English)'', ''Peer mediation'', ''Event coordination'', ''Creative brainstorming'', ''Basic cooking
    of Puerto Rican dishes'', ''Storytelling/Spoken word performance'']'
  hobbies: '[''Sketching and digital illustration'', ''Listening to diverse music playlists'', ''Salsa and contemporary dance'', ''Beach volleyball'', ''Attending local festivals'', ''Poetry writing'',
    ''Journaling for stress relief'', ''Cooking Puerto Rican dishes'', ''Volunteer art workshops'', ''Peer support group facilitation'']'
  career_goals: Rosanna aims to turn her compassion and artistic talents into a career that strengthens her community. She plans to obtain her high‑school equivalency, then study community social work or
    art therapy at a nearby university. In the short term, she hopes to earn a peer‑counseling certification, lead more community art projects, and launch a small online platform that showcases teen artists
    from Humacao. Ultimately, she dreams of becoming a youth outreach coordinator or creative therapist, using her skills to support other teenagers, and she wishes to travel to cultural festivals to broaden
    her perspective and bring new ideas back home.
