  career_goals: Rosemarie aims to advance to a senior detective role where she can lead a specialized cold‑case unit, integrating both traditional investigative methods and emerging analytical tools. She
    is dedicated to developing a community‑policing initiative that strengthens trust between law enforcement and local residents. Mentoring and training the next generation of investigators is a core ambition,
    as is obtaining advanced certifications in forensic science to enhance the department’s technical capabilities. Throughout her career progression, she strives to maintain a balanced workload that honors
    her family life and personal well‑being.
