personas:
  professional: Rosemarie Price is a veteran detective with three decades of experience in investigative interviewing, forensic evidence collection, and OSINT analysis, who blends meticulous organization
    with pragmatic curiosity, making them a reliable mentor and community liaison while quietly pursuing a senior cold‑case leadership role.
  sports: Rosemarie Price enjoys low‑impact fitness through the Lake County Trails Club's weekend hikes, supports the Chicago Cubs in baseball and the Chicago Bears in football, and supplements nature walks
    with twice‑weekly yoga classes at the community center, a routine that balances their love of the outdoors with a practical need to manage arthritis.
  arts: Rosemarie Price balances detective work with artistic passions, capturing sunrise wetlands in the style of Ansel Adams while knitting to the strains of Beethoven’s Ninth Symphony, regularly attending
    Chicago Symphony Orchestra concerts, and photographing local exhibits featuring Mary Cassatt, reflecting a lifelong appreciation for both visual and auditory classics.
  travel: Rosemarie Price favors meticulously planned, low‑key getaways that blend nature and heritage, such as annual trips to Acadia National Park, weekend drives to the historic streets of Rothenburg
    ob der Tauber, and recent hikes through Hocking Hills, always booking accommodations through a trusted spreadsheet and limiting flights to a few per year due to family commitments.
  culinary: Rosemarie Price enjoys cooking with garden‑fresh vegetables, often preparing roasted beet and goat‑cheese salads, hearty chicken pot pie, and spiced apple crumble, experimenting with fresh thyme,
    rosemary, and sage, yet occasionally indulges in a late‑night slice of pepperoni pizza from the local pizzeria as a guilty comfort after long case files.
  core: Rosemarie Price is a methodical detective who blends relentless curiosity with Midwestern pragmatism, nurturing a garden, a camera, and a quiet love for classic arts while they juggle a disciplined
    financial plan and a steadfast commitment to community service.
background:
  cultural: Rosemarie grew up in a modest, middle‑class family in the Midwest, rooted in a blend of German‑American and Irish‑American heritage. The values of hard work, humility, and community service
    were emphasized throughout her upbringing in suburban Illinois. She attended a public high school where she participated in civic clubs and developed an early respect for law and order. Family traditions—such
    as Thanksgiving gatherings, holiday church services at a local Methodist congregation, and community volunteerism—shaped her cooperative and harmony‑seeking personality. Living in Cary, Lake County,
    she carries the Midwestern ethos of politeness, reliability, and a practical, solutions‑oriented outlook into both her professional life as a detective and her personal relationships.
