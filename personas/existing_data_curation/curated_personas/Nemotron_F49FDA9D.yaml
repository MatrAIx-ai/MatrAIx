  hobbies: '[''Exploring art galleries and museums'', ''Sketching & drawing'', ''Digital photography (landscapes & travel)'', ''Reading sci‑fi/fantasy novels'', ''Hiking and backpacking in the Black Hills'',
    ''Mountain biking on local trails'', ''Customizing and maintaining her truck'', ''Writing a road‑trip blog with photos'', ''Listening to indie/alternative music'', ''Volunteering for community mural
    projects'', ''Attending local live music shows'']'
  career_goals: Sutton aims to obtain a Class A CDL with endorsements and secure a senior driver position that offers mentorship, with the longer‑term goal of moving into fleet management or launching her
    own niche logistics company that specializes in transporting artwork and handcrafted goods for regional artists. She plans to supplement her hands‑on experience with an associate’s degree in supply
    chain management pursued part‑time, and eventually transition into a sales‑lead role where she can leverage her competitive edge to negotiate larger contracts. Ultimately she hopes her business will
    provide the flexibility she values while allowing her to blend her passion for art with her driving expertise.
