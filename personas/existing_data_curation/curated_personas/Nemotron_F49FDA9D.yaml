personas:
  professional: Sutton King, a 19‑year‑old commercial driver who balances a knack for heavy‑duty truck maintenance with a freelance eye for sales, they use their curiosity and competitive streak to optimize
    routes on the fly while tolerating the occasional chaos of ad‑hoc paperwork.
  sports: Sutton King, a 19‑year‑old outdoor enthusiast who rides with the Black Hills Trail Riders mountain‑bike club, follows the Sioux Falls Storm and the South Dakota State Jackrabbits, and tackles
    weekend hikes in the Badlands as a way to channel their competitive edge while balancing the stress of a demanding driving schedule.
  arts: Sutton King, a 19‑year‑old visual‑art aficionado who spends afternoons sketching at the Vermillion Area Arts Council, curates indie playlists featuring Phoebe Bridgers and Arcade Fire for road‑trip
    blogs, and volunteers on community mural projects with local artist collectives, letting their critical eye shape both their photography and personal style.
  travel: Sutton King, a 19‑year‑old road‑trip chronicler who prefers spontaneous, budget‑friendly routes over rigid itineraries, they have documented drives through the Black Hills, Badlands, and a weekend
    jaunt to Denver, while dreaming of a future cross‑country art‑supply roadshow that includes a stop at the Bavarian Alps.
  culinary: Sutton King, a 19‑year‑old with an intermediate kitchen skill set, they relish cooking rye‑bread cinnamon buns and braised bison stew for community potlucks, while also grabbing jerky, cold
    brew, and huckleberry jam on the road, reflecting a palate that blends rustic prairie flavors with indie‑spirit comfort foods.
  core: Sutton King, a 19‑year‑old driver‑artist hybrid, they chase efficient routes and perfect compositions while habitually misplacing receipts, overthinking future contracts, and humming indie tunes
    between deliveries.
background:
  cultural: Sutton grew up in a multi‑generational farming family on the outskirts of Vermillion, Clay County. The Midwestern culture of self‑reliance, hard work, and close‑knit neighborly ties shaped her
    early life. Her family’s German‑Scandinavian ancestry is reflected in traditions such as homemade holiday foods and community barn‑raisings. Proximity to the University of South Dakota exposed her to
    a modest campus art scene, fostering her curiosity about visual arts. While generally secular, she occasionally participates in local church potlucks and community festivals that celebrate the heritage
    of South Dakota’s plains. The wide‑open prairie and nearby Black Hills nurture her love of the outdoors, which she integrates into her artistic interests through photography of changing skies and prairie
    grasses. Although she identifies as white, she acknowledges the region’s Native American history and strives to respect and learn from the cultures present in the state.
