personas:
  professional: Shanell Martinez, a 34‑year‑old freelance visual artist and community creative strategist, balances a vivid imagination with a love for spontaneous collaboration, and they have built a boutique
    studio that offers bilingual branding, illustration, and pop‑up cultural events, thriving on flexible workflows but often juggling deadlines with a laid‑back, sometimes chaotic, approach.
  sports: Shanell Martinez fuels fitness through weekly salsa classes, occasional pick‑up basketball games at a local park, and a dedicated habit of jogging along the Houston Bayou; they also cheer on the
    Houston Astros during the baseball season and the Houston Rockets in the NBA.
  arts: Shanell Martinez spends evenings immersed in watercolor landscapes inspired by Houston’s vibrant neighborhoods, drawing influence from Frida Kahlo’s symbolic color palettes and James Jean’s surreal
    compositions, while they experiment with VR installations echoing the immersive work of Marshmallow Laser Feast, attend local gallery openings, and lead trivia nights centered on speculative fiction
    and philosophy.
  travel: Shanell Martinez plans trips around cultural festivals and culinary exploration, favoring spontaneous weekend getaways to Caribbean islands such as Jamaica, Curaçao, and Barbados where they gather
    family recipes, while they also enjoy occasional road trips to New Mexico’s art colonies and weekend retreats in Austin’s music scene.
  culinary: Shanell Martinez channels their love for vibrant flavors into cooking classic Caribbean dishes such as mofongo made with fried plantains and garlic, arroz con gandules with sofrito and pigeon
    peas, and spiced jerk chicken marinated in all‑spice and scotch bonnet peppers, often pairing meals with homemade tropical fruit smoothies featuring mango and guava, and they relish experimenting with
    fresh herbs like cilantro and thyme.
  core: Shanell Martinez is a creatively restless 34‑year‑old who blends bold artistic experiments with spontaneous community projects; they manage money with a flexible but sometimes reckless flair, and
    balance a competitive drive with a laid‑back, stress‑resilient outlook.
background:
  cultural: Shanell was raised in a bilingual household in Houston, the daughter of Puerto Rican immigrants who kept the island’s traditions alive through food, music, and storytelling. Spanish was spoken
    at home, while English dominated school and the broader community. She grew up celebrating Puerto Rican holidays such as San Juan and participating in the annual Puerto Rican Festival in Houston’s East
    End, where she first discovered her love for dance, percussion, and community art. The blend of Caribbean rhythm with Texan multiculturalism informs her worldview, fueling a deep pride in her heritage
    and a desire to share it through creative expression and cultural advocacy.
