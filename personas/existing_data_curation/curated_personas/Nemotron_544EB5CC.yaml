  hobbies: '[''Watercolor Painting'', ''Salsa Dancing'', ''Cooking Puerto Rican Cuisine'', ''Traveling to Caribbean Islands'', ''Reading Speculative Fiction'', ''Board Game Nights'', ''Urban Sketching'',
    ''Photography'', ''Improvisational Theatre'', ''Exploring New Tech Gadgets (e.g., VR art)'']'
  career_goals: Shanell aims to turn her creative passions into a sustainable freelance career. Over the next three years she plans to complete her undergraduate degree in Visual Arts or Graphic Design,
    launch a boutique creative studio that offers branding, illustration, and cultural event consulting for Houston’s growing Latino market, and build a multilingual online platform that showcases Puerto
    Rican art and lifestyle. She hopes to become a recognized cultural curator who bridges Caribbean heritage with contemporary design, while maintaining the flexibility to pursue spontaneous artistic projects
    and community collaborations.
