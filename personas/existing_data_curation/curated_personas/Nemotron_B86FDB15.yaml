  hobbies: '[''Cooking Mexican cuisine'', ''Acoustic guitar'', ''Soccer fan (Liga MX, MLS)'', ''Fishing'', ''Hiking'', ''Volunteer tax assistance'', ''Reading historical novels'', ''DIY home improvement'',
    ''Exploring fintech tools'']'
  career_goals: Eduardo aims to obtain his Certified Public Accountant (CPA) license within the next two years through evening coursework and exam preparation, leveraging his extensive practical experience.
    He aspires to transition into a senior auditor role at a regional firm, where he can lead audit teams and mentor junior staff. Long‑term, he dreams of establishing his own boutique accounting practice
    focused on serving small Mexican‑American businesses in West Texas, offering personalized tax and financial consulting. He also hopes to develop community workshops on financial literacy and to stay
    at the forefront of fintech innovations that can streamline small‑business accounting.
