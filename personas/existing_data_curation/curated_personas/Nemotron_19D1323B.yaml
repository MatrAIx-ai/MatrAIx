  hobbies: '["Surf‑side early‑morning runs", "Beach volleyball", "Stand‑up paddleboarding", "Yoga and meditation", "Reading health biographies and self‑help books", "Mediterranean‑style cooking", "Rooftop
    gardening", "Volunteer fitness mentorship for at‑risk youth", "Sunset photography"]'
  career_goals: Teresa aims to transition from teaching classes at local gyms to leading a boutique studio that blends high‑intensity group workouts with mindfulness‑based stress reduction and nutrition
    education. She plans to earn a Certified Strength and Conditioning Specialist (CSCS) credential and a yoga teacher training certification within the next two years. In the longer term, she hopes to
    become a wellness director for the Huntington Beach community center, develop senior‑focused fitness programs, and launch an online platform offering guided workouts and stress‑management resources.
    Her ambition is to create an inclusive environment where clients of all ages feel empowered to improve their physical health while learning practical tools to manage anxiety and daily stress.
