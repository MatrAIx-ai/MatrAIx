personas:
  professional: Teresa Fishel is a veteran ACE‑certified group fitness trainer and personal coach who leverages two decades of high‑energy class leadership and a pragmatic, goal‑oriented mindset to design
    integrated cardio, strength, and mindfulness programs for clients ranging from teens to seniors, and they aim to open a boutique studio that fuses HIIT with yoga and stress‑reduction workshops.
  sports: Teresa Fishel embraces sunrise beach runs, competitive beach volleyball, and seasonal stand‑up paddleboarding, cheers on the Los Angeles Dodgers and Los Angeles Lakers, and holds a membership
    at the Huntington Beach surf club that organizes weekly surf‑fit sessions.
  arts: Teresa Fishel captures coastal sunsets with a DSLR, drawing creative inspiration from Ansel Adams, unwinds by listening to Jack Johnson and The Beach Boys, and regularly attends the OC Art Walk
    and community theater productions at the local playhouse.
  travel: Teresa Fishel plans weekend escapes that balance adventure and relaxation, having trekked the desert trails of Joshua Tree, completed a yoga retreat in Bali, savored Mediterranean flavors in Santorini,
    and they still dream of a road trip along the Pacific Coast Highway to discover hidden surf spots.
  culinary: Teresa Fishel delights in Mediterranean cooking, frequently preparing grilled branzino with rosemary‑lemon drizzle, chickpea tabbouleh, and fresh Greek salad using herbs harvested from their
    rooftop garden, while they indulge in artisanal espresso at the beachfront café each morning.
  core: Teresa Fishel blends sun‑kissed Southern California vigor with mindful wellness, juggling a relentless fitness schedule, cautious finances, and occasional anxiety‑driven coffee cravings, all while
    they capture sunset moments on camera.
background:
  cultural: Teresa grew up in a middle‑class White family in suburban Orange County during the 1970s and 1980s, shaped by the laid‑back Southern‑California beach lifestyle and the region’s early health‑and‑wellness
    boom. The local culture’s emphasis on outdoor recreation, sun‑centered community events, and a growing awareness of holistic fitness influenced her career choice. While her upbringing reflects mainstream
    American values—self‑reliance, punctuality, and a focus on personal improvement—her adult life has incorporated diverse wellness practices drawn from Eastern traditions such as yoga and mindfulness,
    which she blends with the pragmatic, goal‑oriented mindset typical of her generation.
attributes:
  skills: '["Group fitness instruction (Zumba, HIIT, Pilates)", "Personal training", "Program design and periodization", "Exercise physiology and biomechanics", "Basic nutrition counseling", "Stress-management
