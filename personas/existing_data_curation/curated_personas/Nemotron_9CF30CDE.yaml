  hobbies: '[''Painting'', ''Photography'', ''Bridge'', ''Community STEM volunteering'', ''Gardening'', ''Woodworking'', ''Traveling'', ''Live music festivals'', ''Cooking Hungarian cuisine'', ''Reading
    science & philosophy'', ''Yoga'']'
  career_goals: Although retired from full‑time employment, James aims to channel his curiosity and love for community into mentoring youth in STEM, developing a small line of handcrafted wooden furniture,
    and documenting his family's Hungarian heritage through a memoir and a series of watercolor paintings. He also hopes to travel to Hungary and other cultural sites, deepen his artistic skills, and remain
    an active, supportive presence in his local senior arts and activity center.
