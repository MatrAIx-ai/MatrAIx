personas:
  professional: Gloria Bell, a 17‑year‑old aspiring community health worker, leverages her knack for meticulous event planning, spreadsheet budgeting, and confident group leadership to coordinate youth‑group
    outings and manage volunteer schedules, all while eyeing a future role as a certified nursing assistant or agricultural technician.
  sports: Gloria Bell, a frequent participant in the Minot Community Center Basketball Club’s Saturday pick‑up games, stays fit by shooting hoops after school, follows the Minot State Bison men’s basketball
    season, and roots for the Dallas Mavericks during the NBA, all while balancing school responsibilities with a disciplined weekly workout routine.
  arts: Gloria Bell, a classic country music enthusiast who repeatedly streams Johnny Cash, Dolly Parton, and Sturgill Simpson, finds creative release in knitting and occasionally assists the town’s youth‑theater
    crew with set building, letting the melodies shape their relaxed evenings.
  travel: Gloria Bell plans trips with the same spreadsheet precision she uses for community events, favoring short, budget‑friendly road trips to places like Badlands National Park and Lake Sakakawea,
    while dreaming of a future spring‑break adventure to Washington, D.C., to see the Smithsonian museums with friends.
  culinary: Gloria Bell, an avid teenage baker, regularly whips up chocolate‑chip cookies, blueberry pie, and warm apple crisp using butter, cinnamon, and fresh farm‑grown apples from the family garden,
    and enjoys sharing these treats at church socials while occasionally indulging in fast‑food pizza on weekends.
  core: Gloria Bell is a hyper‑organized teen who channels stress into knitting and classic country tunes, obsessively budgets every dollar, but can’t resist late‑night cookie cravings and occasional procrastination
    on schoolwork.
background:
  cultural: Gloria grew up in a white, Midwestern family in Minot, North Dakota, surrounded by the region's agricultural heritage and close-knit community values. Her family's traditions include regular
    church attendance, seasonal festivals like the North Dakota State Fair, and a strong emphasis on self-reliance and practical work. The local culture of small-town solidarity, with neighborly help and
    community gatherings, has shaped her preference for routine and her collaborative spirit. Though she identifies with the broader American culture, the modest, pragmatic ethos of the Upper Midwest is
    a defining influence on her outlook.
attributes:
  skills: '[''Community event coordination'', ''Time management'', ''Basic computer proficiency (Word, Excel, email)'', ''Inventory tracking'', ''Basic animal care'', ''Group facilitation'', ''Conflict
    mediation'']'
  hobbies: '[''Youth group volunteering'', ''Baking and sharing treats'', ''Gardening'', ''Pick-up basketball'', ''Knitting'', ''Listening to classic country music'']'
  career_goals: Gloria aims to earn her GED within the next year and enroll in a community-college program that leads to a practical, stable career such as a certified nursing assistant or agricultural
    technician. She wants a role that lets her apply her organizational strengths and her desire to help others, while providing a clear routine and dependable schedule. In the longer term she hopes to
    become a community health worker in the Minot area, supporting families similar to her own. Her ambition is driven by a need for achievement and a wish to secure a reliable future despite her current
    worries about academic gaps.
