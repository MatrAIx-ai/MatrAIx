  hobbies: '[''digital and traditional illustration'', ''creative writing (short stories, poetry)'', ''reading speculative fiction and philosophy'', ''experimental photography'', ''chess and strategic board
    games'', ''puzzle solving'', ''solo hiking and nature sketching in the Colorado foothills'', ''coding interactive art projects in Python'', ''collecting vintage postcards and curios'']'
  career_goals: Denford aims to build a career as an independent concept artist and illustrator, creating imaginative visuals for indie video games, graphic novels, and digital media. She plans to develop
    a distinctive personal brand through an online portfolio and social platforms, seeking collaborations with local studios in Fort Collins and entering national art competitions to gain recognition. Long‑term,
    she envisions opening a small studio space where she can mentor other young artists, curate avant‑garde exhibitions, and integrate her love for abstract storytelling into multimedia projects. While
    she intends to pursue a GED eventually, her primary focus is on building a professional network and a robust body of work that showcases her creative originality.
