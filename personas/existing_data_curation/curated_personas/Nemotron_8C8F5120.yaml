  hobbies: '[''Visiting Art Museums'', ''Cooking Mexican Cuisine'', ''Playing Acoustic Guitar'', ''Listening to Mariachi Music'', ''Gardening'', ''Fishing'', ''Beach Walking'', ''Participating in Community
    Festivals'']'
  career_goals: Roberto plans to earn his GED within the next year and pursue a certification in carpentry or HVAC to re‑enter the workforce on a part‑time basis. He dreams of opening a modest pop‑up kitchen
    in Wilmington where he can share authentic Mexican street food with the community. At the same time, he aims to take on a leadership role at the local Hispanic community center, organizing cultural
    workshops and mentoring younger Spanish‑speaking residents. He also hopes to travel to Mexico to reconnect with extended family and explore regional art traditions.
