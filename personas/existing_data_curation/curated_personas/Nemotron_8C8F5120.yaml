personas:
  professional: Roberto Diaz, a reliable community handyman with a curious eye for art, leverages his bilingual communication, basic carpentry prowess, and event‑organizing flair to lead neighborhood workshops
    while studying for a GED and a carpentry certification.
  sports: Roberto Diaz, a devoted supporter of the Carolina Hurricanes and an active member of the Wilmington Beach Anglers Club, spends early mornings fishing for flounder along the Atlantic shore, joins
    a casual weekend volleyball league at Wrightsville Beach, and maintains a light jogging routine on the boardwalk.
  arts: Roberto Diaz, an avid explorer of the Cameron Art Museum's rotating exhibits and a budding mural collaborator, draws inspiration from Frida Kahlo, Diego Rivera, and Andy Warhol, frequently attends
    local gallery openings, and strings together mariachi and folk melodies on an acoustic guitar during community festivals.
  travel: Roberto Diaz, intent on a cultural pilgrimage to his family's hometown in Oaxaca, has mapped out a budget itinerary that pairs a culinary tour of Puebla's markets with a sun‑soaked retreat to
    Tulum, while also planning weekend road trips to Savannah's historic district and the Outer Banks for quick escapes.
  culinary: Roberto Diaz, a self‑taught chef of Mexican street fare, masterfully blends traditional mole with freshly caught shrimp, cultivates his own cilantro, jalapeños, and epazote for authentic salsas,
    and delights in daring fusions such as fish‑taco ramen and churro‑crusted calamari.
  core: Roberto Diaz, a curious 49‑year‑old handyman‑chef with a penchant for spontaneous guitar sessions, balances community leadership with experimental cooking, yet habitually loses track of time scrolling
    through social media after midnight.
background:
  cultural: Roberto’s Mexican heritage is a core part of his identity. Raised in a bilingual household, Spanish remains his primary language at home, and he maintains strong ties to Mexican culinary, musical,
    and holiday traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around food. Living in Wilmington, he blends his cultural roots with the local coastal lifestyle, taking
    part in regional events and contributing to the growing Hispanic community. His Catholic upbringing reinforces values of family cohesion, respect for elders, and community service. Roberto embraces
    the cultural exchange between his Mexican background and the Southern U.S. environment, creating a hybrid perspective that informs his daily life and interactions.
