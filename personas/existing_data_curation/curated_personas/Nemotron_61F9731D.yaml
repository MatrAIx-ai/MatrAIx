  hobbies: '[''Playing soccer in a community league'', ''Cooking Nicaraguan cuisine'', ''Dancing at cultural festivals'', ''Hiking in the Pacific Northwest'', ''Kayaking on Puget Sound'', ''Mindfulness
    meditation'', ''Evening jogging'', ''Volunteering at community health fairs'']'
  career_goals: Milton aims to become a Lead Surgical Technologist and eventually transition to an Operating Room Manager role, overseeing staff scheduling, compliance, and integration of new surgical technologies.
    He plans to earn a Certified Surgical Technologist credential and pursue a bachelor’s degree in Health Sciences through community college pathways despite not holding a high school diploma. He is passionate
    about improving surgical outcomes for underserved Latinx patients and hopes to develop a community outreach program focused on peri‑operative education and health equity. Additionally, he seeks to mentor
    junior technologists, encouraging both practical skill development and curiosity about innovations.
