personas:
  professional: Milton Miles is a seasoned surgical technologist who blends rigorous aseptic precision with a curiosity for emerging robotic systems, leading OR teams with clear communication, mentoring
    junior staff, and championing equitable peri‑operative care for underserved patients, and they balance curiosity with practicality in every procedure.
  sports: Milton Miles competes in a local adult soccer league, proudly wearing a navy jersey reminiscent of the Seattle Sounders on match days, and they spend weekends hiking the Cascades with the regional
    Alpine Club and kayaking on Puget Sound, balancing competitive play with community fitness.
  arts: Milton Miles regularly dances at regional cultural festivals to the lively marimba beats of Grupo Marimba Libre and salsa classics by Celia Cruz, while they also enjoy the soulful guitar work of
    Joaquín Sabina and attend the Seattle Pacific Northwest Ballet's contemporary productions.
  travel: Milton Miles prefers itineraries that blend outdoor adventure and cultural immersion, having trekked the Hoh Rainforest, kayaked the San Juan Islands, explored the historic streets of Granada,
    Spain, and savored the biodiversity of Costa Rica, while they dream of a future hiking expedition to Patagonia’s Torres del Paine.
  culinary: Milton Miles delights in preparing handcrafted nacatamales and vigorón for neighborhood gatherings, carefully seasoning with achiote, bitter orange, and toasted plantain chips, while they also
    master a reliable salmon fish‑taco recipe that highlights locally sourced salmon, radish slaw, and a drizzle of crema.
  core: Milton Miles is a community‑oriented surgical technologist who balances meticulous OR precision with vibrant cultural cooking, soccer camaraderie, and a constant quest for personal growth, though
    they sometimes let worry hijack their evenings.
background:
  cultural: Milton’s Nicaraguan heritage shapes his identity in Tacoma. Raised by immigrant parents who spoke Spanish at home, he grew up celebrating traditions like Día de la Independencia and Semana Santa
    with family gatherings and traditional foods. He remains connected to the Nicaraguan diaspora through the local Hispanic cultural center, participating in language exchange events and cultural workshops.
    His Catholic upbringing informs his values of community service and humility. He often incorporates Nicaraguan music and culinary customs into his social life, bridging his Central American roots with
    his life in the Pacific Northwest.
attributes:
