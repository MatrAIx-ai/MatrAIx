    ''E-commerce strategy'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Vegetable gardening'', ''Cooking traditional Salvadoran dishes'', ''Landscape photography'', ''Yoga'', ''Studying Spanish literature'']'
  career_goals: Annabelle aims to transition into a senior leadership role, such as Director of Marketing, where she can shape long-term brand vision while fostering a collaborative, low-stress environment.
    She seeks opportunities to mentor emerging marketers, implement data-driven strategies that balance innovation with proven tactics, and eventually launch a boutique consulting firm that offers culturally
    nuanced marketing solutions for small businesses in the Mid-Atlantic region. Maintaining work-life balance and preserving quiet personal time remain central to her ambitions.
