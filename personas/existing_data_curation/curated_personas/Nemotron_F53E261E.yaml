  career_goals: Although she is retired from formal employment, Nohemi remains driven to share her expertise and cultural heritage. She aims to mentor high‑school and middle‑school students in STEM through
    local after‑school programs, develop a bilingual STEM workshop series at the senior center, and author a memoir that intertwines her engineering career with her Mexican roots. She also aspires to coordinate
    a community‑garden project that blends sustainable horticulture with traditional Mexican gardening practices, and to travel with her husband to revisit their hometown in Mexico, documenting stories
    for future generations.
