personas:
  professional: Nohemi Martinez, a retired engineer and mathematics specialist, blends their analytical problem‑solving and CAD expertise to mentor youth in STEM while applying a methodical, organized approach
    to design community‑garden projects and bilingual workshops, and their sociable demeanor turns technical writing into accessible storytelling for volunteers.
  sports: Nohemi Martinez enjoys low‑impact cardio through daily nature walks in Orlando’s Lake Eola Park, participates in the senior league’s weekly pickleball matches, loyally follows the Orlando Magic
    and Orlando City SC, and they occasionally join a community gardening “Fit‑and‑Fun” group that incorporates gentle stretching.
  arts: Nohemi Martinez, an avid lover of music and performance, attends monthly salsa dance socials, admires the works of Frida Kahlo and Diego Rivera, enjoys listening to Carlos Santana and traditional
    mariachi groups, and they never miss a season of performances by the Orlando Philharmonic Orchestra.
  travel: Nohemi Martinez prefers purposeful travel that blends family reunions with cultural immersion, has already revisited their hometown in Mexico’s Sierra Madre, dreams of exploring the historic streets
    of Guanajuato, and they schedule annual trips to Florida’s national parks like the Everglades to photograph wildlife.
  culinary: Nohemi Martinez cooks with expert precision, regularly preparing mole poblano with dried mulato chilies, cacao, and spices, hand‑making tamales stuffed with pork and masa, and crafting fresh
    salsas using tomatoes, serrano peppers, and epazote, while they experiment with quinoa as a modern twist on traditional plates.
  core: Nohemi Martinez blends a disciplined engineering mindset with a vibrant cultural spirit, constantly juggling garden plots, community workshops, and salsa steps, all while refusing to skip their
    nightly cup of strong coffee despite a tendency to lose their keys in the pantry.
background:
  cultural: Nohemi was born and raised in a small town in the state of Oaxaca, Mexico, where she grew up in a tight‑knit, multigenerational household steeped in indigenous Zapotec traditions blended with
    Catholic customs. She carries forward the values of family solidarity, respect for elders, and a deep reverence for Mexican culinary and artistic heritage. Her upbringing emphasized bilingual communication;
    she speaks fluent Spanish and learned English after relocating to the United States in her early twenties. In Orlando, she participates in the local Mexican community, celebrating Día de los Muertos,
    Las Posadas, and the Feast of Our Lady of Guadalupe, while also integrating Floridian influences into her lifestyle. Her cultural background informs her food, music, dance, and her commitment to preserving
    Mexican traditions for her grandchildren.
