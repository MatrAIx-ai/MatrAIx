persona_description: A researcher and engineer specializing in nuclear power technology, particularly the development and testing of nuclear reactors for space applications. He is experienced in the design
  and implementation of small, compact reactors that can be deployed on the moon for power generation. He has a keen interest in safety and reliability, and is working to ensure that the nuclear reactor
  proposed for the moon's surface is both simple and reliable. He is also involved in the testing of parts of the reactor under simulated lunar conditions to ensure its performance under harsh conditions.
  He is a member of the Glenn and Marshall centers and the Department of Energy, and is working on developing a nuclear-powered lunar outpost that could provide reliable and sustainable power for future
  missions to the moon.
