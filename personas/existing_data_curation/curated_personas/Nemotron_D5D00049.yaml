personas:
  professional: Laon Reddick is a network and systems administrator who leverages meticulous ITIL‑driven processes, deep Cisco and Juniper expertise, and a competitive edge to troubleshoot high‑severity
    outages while translating complex technical concepts into clear business language for stakeholders.
  sports: Laon Reddick joins the Charlotte Hornets fan club, drops into pickup basketball games at Freedom Park, runs with the Piedmont Hiking Club during spring, and follows the Carolina Panthers for football,
    balancing competitive play with structured cardio to maintain peak fitness.
  arts: Laon Reddick curates a rotating playlist that swings from Miles Davis’s Kind of Blue to Kendrick Lamar’s To Pimp a Butterfly, attends live jazz sets at the Neighborhood Theatre, and binge‑watches
    contemporary dramas starring Viola Davis, using music and film as both motivation for hack‑athons and a creative outlet.
  travel: Laon Reddick prefers meticulously planned weekend road trips, having already trekked the Blue Ridge foothills, explored Asheville’s art district, and booked a future adventure to the culinary
    scene of New Orleans, balancing budget‑friendly stays with occasional splurges on boutique cabins.
  culinary: Laon Reddick masters Southern comfort fare—perfectly fried chicken, creamy mac and cheese, and smoky collard greens—while experimenting with hot sauce blends featuring cayenne, smoked paprika,
    and bourbon, and often hosts potlucks where the centerpiece is a crowd‑pleasing shrimp‑and‑grits casserole.
  core: Laon Reddick blends methodical network wizardry with a love for competitive gaming, spontaneous backyard cookouts, and a habit of over‑planning every weekend, even when the calendar says ‘just wing
    it.’
background:
  cultural: Laon grew up in Charlotte’s historic West Fourth neighborhood, a vibrant area with deep African‑American roots. His family traditions include church gatherings, soul‑food cooking, and a strong
    emphasis on education and community service. He attended an HBCU for his STEM degree, where he joined the National Society of Black Engineers and participated in cultural events that celebrated Black
    heritage. These experiences have shaped his identity, fostering a commitment to uplift other Black professionals in tech and to preserve the cultural legacy of his community through mentorship, advocacy,
    and participation in local festivals such as the Charlotte Black Film Festival.
attributes:
  skills: '[''Network design and implementation'', ''Cisco and Juniper routing/switching'', ''Firewall configuration and management'', ''VLAN and QoS engineering'', ''Server virtualization (VMware, Hyper‑V)'',
    ''Cloud networking (AWS, Azure)'', ''Automation scripting (Python, PowerShell, Bash)'', ''ITIL Service Management'', ''Technical documentation and SOP creation'', ''CCNA certification (CCNP in progress)'']'
  hobbies: '[''Pickup basketball'', ''Competitive gaming and CTF challenges'', ''Volunteer coding mentor for high‑school students'', ''Cooking Southern cuisine'', ''Listening to jazz and hip‑hop'', ''Hiking
    in the Blue Ridge Mountains'']'
  career_goals: Laon aims to transition from a hands‑on administrator to a senior network architect who leads large‑scale hybrid cloud projects for regional enterprises. Over the next five years he plans
    to earn Cisco CCNP and eventually CCIE credentials, specialize in network security, and take on a leadership role that oversees a team of engineers. He also wants to become a recognized speaker at local
    tech meetups and regional conferences, mentoring aspiring Black engineers through NSBE chapters and community STEM outreach. Ultimately, he envisions shaping the IT strategy for a Fortune‑500 company
    while championing inclusive hiring practices and building resilient, sustainable network infrastructures.
