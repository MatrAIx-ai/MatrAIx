  hobbies: '["Coastal walking/jogging", "Amateur photography", "Reading classic literature", "Film noir appreciation", "Woodworking", "Small-group wine tasting", "Attending local history talks", "Museum
    visits"]'
  career_goals: He aims to progress to a senior regional director position within the next five years, overseeing multiple territories and shaping the company's sales culture. He is also interested in building
    a mentorship program for junior sales reps and integrating AI-driven analytics into the sales workflow. Long‑term, he envisions launching his own boutique sales consultancy that helps small tech firms
    scale sustainably while preserving a flexible work environment that supports his family life.
