personas:
  professional: John Sparks, 48, is a veteran B2B sales strategist who leverages two decades of relationship‑building, data‑driven forecasting, and his humanities‑infused storytelling to lead teams, negotiate
    complex deals, and gradually expand his influence toward a senior regional director role while quietly mentoring junior reps and experimenting with AI analytics.
  sports: John Sparks, 48, jogs along the Playa Del Rey shoreline at sunrise, joins a small‑group beach‑volleyball league on weekends, and follows the Los Angeles Lakers and LA Galaxy for a touch of local
    sports spirit, treating fitness as a low‑key, solitary ritual rather than a competitive pursuit.
  arts: John Sparks, 48, curates a modest collection of film noir classics like "The Maltese Falcon," spends evenings shooting coastal landscapes inspired by Ansel Adams and Edward Weston, and enjoys the
    smoky saxophone of John Coltrane and the hard‑boiled prose of Raymond Chandler, allowing these artistic touchstones to enrich his storytelling in sales presentations.
  travel: John Sparks, 48, favors low‑key, sunrise‑driven escapes, often road‑tripping to Big Sur, Santa Barbara, or the Oregon coast for quiet photography sessions, and harbors a lingering wish to wander
    the vineyards of Bordeaux and capture sunrise over Shibuya, balancing a love for spontaneous detours with a modest family budget.
  culinary: John Sparks, 48, enjoys simple yet refined coastal cuisine, regularly preparing grilled salmon with lemon‑dill butter, a well‑executed paella, and pairing these dishes with his favorite Pinot
    Noir, while his woodworking hobby leads him to craft his own cutting boards and savor the tactile pleasure of hand‑rolled sushi.
  core: John Sparks, 48, blends a steady, curiosity‑driven sales career with solitary sunrise jogs, coastal photography, and hands‑on woodworking, all while navigating a laid‑back, occasionally disorganized
    life that values flexibility over rigid planning.
background:
  cultural: John’s cultural background is rooted in an Anglo‑American family that settled in Southern California in the post‑World War II era. Growing up in the diverse milieu of Los Angeles, he was exposed
    to a wide array of cultural influences while his household maintained traditional Midwestern values of hard work and self‑reliance. His bachelor's degree in the humanities deepened his appreciation
    for art, literature, and history, shaping a worldview that balances individualism with an awareness of broader cultural narratives. Living in Playa del Rey, he embraces the laid‑back coastal lifestyle,
    blending a pragmatic American work ethic with a relaxed, community‑oriented attitude.
attributes:
  skills: '["Relationship building", "Consultative selling", "Negotiation", "Team leadership", "CRM management (Salesforce)", "Data-driven forecasting", "Market research", "Storytelling", "Cultural empathy",
