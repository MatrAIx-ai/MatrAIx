personas:
  professional: Michelle Taglieri, a visual communications specialist with fifteen years of design experience, leverages their STEM background and mastery of Adobe Creative Cloud, Sketch, Figma, Rhino,
    SketchUp and Python automation to craft data‑driven, accessible branding strategies while mentoring junior designers and championing sustainable, eco‑friendly design practices.
  sports: Michelle Taglieri cultivates fitness through sunrise walks along the Pompano Beach shoreline, occasionally joining a local beach‑volleyball league in summer, cheering for the Miami Dolphins and
    Miami Heat, and participating in a casual weekend cycling club that rides the Florida Keys Trail.
  arts: Michelle Taglieri expresses artistic passion by photographing coastal wildlife with a Canon EOS, drawing inspiration from Ansel Adams and graphic designer Paula Scher, indulging in historical fiction
    novels by Hilary Mantel and Ken Follett, and attending occasional performances of the Sarasota Opera.
  travel: Michelle Taglieri prefers low‑key, self‑planned escapes, having explored the Florida Keys, Savannah, and New Orleans on weekend trips, while dreaming of wandering the Amalfi Coast and the ancient
    streets of Dubrovnik, always budgeting travel costs to ensure they can continue supporting their garden and design consultancy.
  culinary: Michelle Taglieri, an enthusiastic home gardener, frequently cooks vegetable‑forward meals such as roasted beet and quinoa salad with feta and a drizzle of lemon‑tahini, enjoys grilling fresh
    mahi‑mahi tacos seasoned with cilantro and lime, and experiments with homemade pesto using basil harvested from their own garden, though they sometimes forget to defrost fish in time.
  core: Michelle Taglieri blends structured design expertise with a laid‑back love of sunrise beach walks, garden‑to‑table cooking, and gentle yoga, yet often misplaces design files amidst their spontaneous
    volunteer workshops.
background:
  cultural: Michelle is a white American of Italian‑American descent, raised in a middle‑class suburb of New Jersey. She grew up with a blend of Northeastern work ethic and Mediterranean family traditions,
    such as Sunday meals and an emphasis on community. After earning her STEM degree, she relocated to South Florida, embracing the relaxed coastal lifestyle and the multicultural influences of Broward
    County. Her cultural values combine familial loyalty, practicality from her technical education, and a cooperative attitude nurtured through community involvement.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'', ''Rhino 3D'', ''SketchUp'', ''Python for automation'', ''User Interface (UI) design'', ''User Experience
    (UX) design'', ''Accessibility compliance'', ''Print design'', ''Project coordination'', ''Data visualization'']'
  hobbies: '[''Beach sunrise walks'', ''Coastal photography'', ''Vegetable gardening'', ''Historical fiction reading'', ''Gentle yoga'', ''Small-group book club'', ''Volunteer design workshops'']'
  career_goals: Michelle aims to advance to a senior creative director role where she can shape the overall visual strategy for clients while mentoring junior designers. She wants to lead sustainable design
    initiatives that incorporate eco‑friendly materials and energy‑efficient processes, and she hopes to launch a boutique consultancy focused on branding for local small businesses. Over the next five
    years she plans to balance her growing responsibilities with a gradual transition toward part‑time teaching at a community college, sharing her expertise with the next generation of designers.
