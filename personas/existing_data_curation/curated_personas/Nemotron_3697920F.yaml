personas:
  professional: Yoriel Feliz, a seasoned carpenter who meticulously reads blueprints, executes precise joinery, and adheres to Louisiana building codes, blends a love for structured, predictable workflows
    with a relaxed attitude toward scheduling, they channel a competitive edge into securing high‑quality custom commissions while quietly planning a modest workshop to mentor women apprentices.
  sports: Yoriel Feliz, a loyal supporter of the New Orleans Saints and Pelicans, maintains fitness through weekly hikes with the Kisatchie Hiking Club and occasional weekend fishing trips on the Red River,
    they favor low‑impact, solitary activities over team sports but occasionally join a senior softball league for friendly competition.
  arts: Yoriel Feliz, who finds inspiration in the soulful strings of Lila Downs, the electrifying guitar of Carlos Santana, and the vivid murals of Diego Rivera, regularly attends local parish festivals
    featuring folk dance and reads historical fiction by Juan Rulfo, they let these artistic experiences subtly influence their woodworking aesthetics.
  travel: Yoriel Feliz, who prefers spontaneous weekend getaways over long‑term planning, often revisits the bustling spice markets of Oaxaca for culinary ideas and explores historic river towns along the
    Mississippi Delta for quiet reflection, they balance modest travel budgets with a deep appreciation for culturally rich, low‑key destinations.
  culinary: Yoriel Feliz, a proficient home cook, masterfully prepares mole poblano using toasted chilies, roasted heirloom tomatoes, chocolate, and spices, and hand‑rolls tamales with fresh masa and garden‑grown
    cilantro, they relish the slow‑cooking process and often showcase their garden’s bounty in simple, rustic meals.
  core: Yoriel Feliz, a pragmatic yet relaxed master carpenter, leverages a competitive drive to mentor women while occasionally letting disorganized paperwork linger, they blend solitary craftsmanship
    with steadfast community traditions.
background:
  cultural: Yoriel was born to Mexican immigrant parents who settled in the Rio Grande Valley before moving to Shreveport when she was a teenager. She grew up bilingual, speaking Spanish at home and English
    at school, and maintains strong ties to her Mexican roots through food, music, and Catholic traditions. Celebrations such as Día de los Muertos and Las Posadas are important family rituals, and she
    often incorporates Mexican design motifs—like Talavera tile patterns and carved wooden details—into her woodworking projects. Her heritage informs a pragmatic work ethic, community responsibility, and
    a deep appreciation for handcrafted, functional art.
