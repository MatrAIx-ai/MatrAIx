  career_goals: Yoriel aims to transition from being a sole practitioner to owning a modest workshop where she can produce bespoke furniture and mentor apprentices, especially women from underrepresented
    backgrounds. She hopes to earn a Master Carpenter certification recognized by the Louisiana Construction Trades Council, expand her client base to include historic home restorations, and eventually
    establish a small apprenticeship program that preserves traditional woodworking techniques within her community. Financially, she seeks to secure a stable retirement fund while maintaining the flexibility
    to take on selective, passion-driven projects.
