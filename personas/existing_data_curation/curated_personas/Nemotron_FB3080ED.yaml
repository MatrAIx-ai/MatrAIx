  career_goals: Gul dreams of a career that blends her love for animals, nature, and helping people. She imagines becoming a veterinarian, where she can follow clear medical procedures while encountering
    new challenges each day. She is also curious about marine biology and hopes to protect local rivers and wildlife. Ultimately, she wants a role that lets her lead groups, teach younger kids, and stay
    active in her community.
