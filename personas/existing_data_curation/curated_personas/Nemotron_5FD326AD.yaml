personas:
  professional: Hans Zaldo, a retired handyperson turned boutique woodworker, leverages their methodical planning, practical curiosity, and competitive edge to design and craft handcrafted furniture while
    mentoring local history enthusiasts.
  sports: Hans Zaldo, an avid early-morning walker who fishes the Chesapeake Bay on weekends, roots for the Baltimore Ravens and Orioles, and occasionally joins a senior bowling league at the community
    center.
  arts: Hans Zaldo, a devoted listener of classic jazz legends like Miles Davis and John Coltrane, spends evenings building model ships, attending small book-club gatherings that discuss historical biographies,
    and occasionally visits local galleries featuring maritime art.
  travel: Hans Zaldo, who favors relaxed road trips with his dog, has explored historic Annapolis and the Shenandoah Valley, and dreams of a guided tour of colonial Williamsburg and a brief visit to the
    maritime museum in Copenhagen.
  culinary: Hans Zaldo, a modest home chef, delights in preparing fresh garden salads with heirloom tomatoes, basil, and cucumbers, grills locally caught Chesapeake Bay perch, and occasionally treats himself
    to a slice of Baltimore's famous crab cake with a dash of Old Bay seasoning.
  core: Hans Zaldo, a methodical 65-year-old retiree who blends relentless curiosity with a practical, competitive streak, meticulously plans every project while wrestling with an undercurrent of worry.
background:
  cultural: Hans was born and raised in the Baltimore suburbs of Maryland to a family of Eastern‑European descent that settled in the region during the early 20th century. Growing up during the post‑war
    boom, he absorbed the Mid‑Atlantic values of self‑reliance, modest ambition, and a strong sense of community. He identifies with the local traditions of Chesapeake Bay cuisine, baseball fandom, and
    an appreciation for the historic architecture of Baltimore. His cultural upbringing emphasizes practicality, careful planning, and a quiet respect for personal privacy.
