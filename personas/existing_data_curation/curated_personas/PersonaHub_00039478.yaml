persona_description: A geographer who specializes in the study of Quaternary environmental change and the geomorphological and biogeographical impacts of natural and human-induced climate change, particularly
  in southern Africa. He has authored or co-authored more than 150 peer-reviewed research articles and edited several special editions of international journals. His research interests lie in the broader
  realm of physical geography, more specifically concerning Quaternary environmental change and the geomorphological and biogeographical impacts of natural and human-induced climate change. He has engaged
  with a range of proxies, including pollen, diatoms, biomarkers, stable isotope geochemistry and sedimentology, using evidence from lakes, wetlands and, more unusually, accumulations of faecal and urine
  material deposited by Hyrax capensis. He is a Fellow of the Royal Geographical Society, of the Royal Society of South Africa and of the Society of South African Geographers, and of the University of Cape
  Town. He holds a Distinguished Professorship at East China Normal University, and is visiting Professor at the Institute of Geographical Research and Natural Resources Research at the Chinese Academy
  of Sciences.
