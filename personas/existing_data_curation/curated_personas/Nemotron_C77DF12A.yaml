  hobbies: '[''Sketching and painting automotive concepts'', ''Restoring a classic Chevrolet Impala'', ''Attending local art galleries and small live music events'', ''Hiking the Brandywine Trail'', ''Yoga
    and meditation'', ''Racing simulation video games'', ''Volunteering at a community makerspace'', ''Reading automotive history and technology magazines'']'
  career_goals: Genevieve aims to become a master ASE-certified technician within the next three years, with a specialization in electric and hybrid vehicles. She plans to complete her associate degree
    in automotive technology and acquire ASE certifications (A1-A8). In the longer term, she aspires to open her own boutique auto shop that offers high-performance custom builds and eco-friendly retrofits,
    integrating her artistic sensibilities into unique vehicle designs. She also envisions taking on a mentorship role, guiding other young women entering the automotive field, and eventually advancing
    into a service manager or shop owner position where she can influence sustainable practices in the industry.
