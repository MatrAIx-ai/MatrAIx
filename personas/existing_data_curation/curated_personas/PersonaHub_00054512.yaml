persona_description: A military historian who is particularly interested in the history of the American Civil War, particularly the campaigns of the Missouri Expedition (1864) led by Major General Sterling
  Price. They are fascinated by the tactics, strategies, and outcomes of the battle between the Confederate army and the Union forces, and are interested in understanding the roles of individual commanders
  and the overall campaign. They are also likely to be interested in the personal lives and experiences of the soldiers involved, as well as the broader social and political context of the time.
