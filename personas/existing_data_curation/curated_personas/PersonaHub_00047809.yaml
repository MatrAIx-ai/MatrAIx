persona_description: A historian or sociologist who is interested in the study of masculinity and its historical evolution, particularly in relation to the construction of male homosexuality in modern Britain
  before the first world war. They are likely to be familiar with the works of scholars like H. Ellis and J. Meyer, who have contributed to the field of masculinities through their historical perspectives.
  They may have a background in literature, history, or art history and are interested in exploring the various forms of "otherness" that have been defined against which ideas of masculinity have been constructed
  throughout history. They may also be interested in the interdisciplinary approaches to the subject matter and the exciting and invigorating collection of scholarship that the text highlights.
