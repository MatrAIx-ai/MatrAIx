    ''Gardening'', ''Book club'', ''Art gallery visits'']'
  career_goals: Kelly aims to transition from a senior analyst role to a strategic consulting partner, where she can mentor junior consultants and lead cross-functional initiatives that blend business analytics
    with creative problem-solving. She hopes to launch a boutique consultancy focused on helping nonprofit arts organizations in New Jersey modernize their operations and expand community impact. Over the
    next five years, she plans to earn professional certifications in data science and design thinking, author thought-leadership pieces on the intersection of art and analytics, and speak at regional conferences
    to broaden her professional network. A personal ambition is to achieve a healthier work-life balance that reduces stress, allowing her to devote more time to volunteer work and artistic pursuits.
