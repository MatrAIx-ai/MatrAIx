  career_goals: Sydney aspires to become a senior full‑stack engineer and eventually a technical lead who can steer product vision at the intersection of technology and art. She hopes to mentor junior developers,
    champion inclusive design practices, and launch a side project that merges interactive storytelling with web technology. In the longer term, she is intrigued by AI‑driven creative tools and aims to
