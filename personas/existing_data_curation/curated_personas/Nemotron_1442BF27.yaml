  hobbies: '[''Sketching and drawing'', ''Playing piano'', ''Building LEGO robotics kits'', ''Reading sci‑fi and fantasy novels'', ''Visiting museums and art galleries'', ''Learning new programming concepts
    on Scratch'', ''Journaling for stress management'']'
  career_goals: Yu envisions a future where he merges his love for technology and art, aspiring to become a software engineer who designs educational games that inspire creativity and curiosity in other
    children. He is equally fascinated by the idea of curating interactive museum exhibits that blend digital media with cultural artifacts, allowing visitors to experience art in novel ways. Driven by
    his high standards, he aims to pursue advanced studies in computer science and design, while also seeking opportunities to mentor younger peers and share his interdisciplinary passions.
