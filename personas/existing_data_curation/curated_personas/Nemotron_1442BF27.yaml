personas:
  professional: Yu Shum is a prodigiously organized middle school student who channels curiosity and high standards into sketching detailed comic panels, engineering LEGO robotics projects, and practicing
    piano, and they always strive for perfection in each creative endeavor.
  sports: Yu Shum participates in the local youth soccer league in the fall, swims at the community pool during summer, avidly follows the Minnesota Timberwolves and Minnesota Twins, and they balance structured
    training with solo bike rides to clear their mind, though they sometimes skip practice when school stress builds.
  arts: Yu Shum devotes hours to sketching characters inspired by the whimsical worlds of Hayao Miyazaki and the bold lines of contemporary graphic novelist Taiyo Matsumoto, practices piano pieces by Debussy
    and Yiruma, and they frequently visit exhibitions featuring Monet and Ai Weiwei, letting these artistic experiences shape their own creative voice.
  travel: Yu Shum prefers carefully planned weekend getaways that combine museum visits—like the Science Museum of Minnesota and the Seattle Pacific Science Center—with occasional family trips to vibrant
    cities such as Tokyo, where they can explore anime boutiques and historic temples, and they balance excitement with a need for a predictable routine.
  culinary: Yu Shum enjoys savoring sushi rolls and ramen bowls while also experimenting with simple home cooking—mastering fluffy pancakes, crafting perfect scrambled eggs, and occasionally attempting
    a homemade veggie stir‑fry with soy sauce and ginger—and they are always eager to taste new flavors but sometimes over‑cook due to impatience.
  core: Yu Shum is a meticulous, anxiety‑prone 11‑year‑old who blends a love for sketching and LEGO robotics with a habit of over‑organizing notebooks, constantly worrying about perfection yet finding solace
    in piano melodies, and they often turn to journaling when stress spikes.
background:
  cultural: Yu is raised in a household that blends East Asian traditions with Midwestern American life. His family celebrates Lunar New Year and teaches him Chinese calligraphy and basic Mandarin, reinforcing
    a respect for cultural heritage. At the same time, he participates in community events in Saint Paul and enjoys local customs like winter ice fishing. This bicultural upbringing nurtures a deep appreciation
    for both the artistic nuances of his ancestry and the innovative spirit of his surroundings, shaping his identity as a curious, disciplined, and globally aware young person.
