persona_description: A mathematics instructor at Adams State College who teaches introductory geoscience courses and uses modules from The Math You Need to assess student math proficiency. The instructor
  has a background in stratigraphy and paleontology, and is interested in the development of quantitative materials encountered in lab. The instructor aims to provide students with an opportunity to improve
  their math skills and see why those skills are important in geosciences. The instructor has implemented The Math You Need modules as an assessment tool, but the results have not been as good as hoped
  due to various factors, including the lack of grade stakes, participation not being graded, time given to complete the modules, extensive use of modules, and poor promotion of the assessment. The instructor
  is open to feedback and is willing to make improvements.
