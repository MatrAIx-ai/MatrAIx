  career_goals: Anthony aims to transition from a front‑line cashier to a supervisory role, such as shift lead or assistant store manager, where he can mentor new employees and streamline store operations.
    He also envisions opening a small neighborhood convenience store that doubles as a community hub, leveraging his deep local ties and desire to foster harmony. In the next few years, he plans to take
    a short business‑management course at a community college to solidify his entrepreneurial ambitions while continuing to contribute to local church and neighborhood events.
