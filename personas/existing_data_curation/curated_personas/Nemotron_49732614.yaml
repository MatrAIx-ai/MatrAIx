personas:
  professional: Sherry Wilkins, an 86‑year‑old surveying and mapping technician, blends decades of GIS, total‑station, and GPS expertise with a talent for translating complex spatial data into community
    workshops, using their meticulous organization and sociable nature to mentor young technicians while championing the preservation of Boca Raton’s historic neighborhoods.
  sports: Sherry Wilkins stays active by walking the coastal trails with the Boca Raton Senior Stroll Club, practicing gentle tai‑chi in the mornings, cheering on the Miami Heat basketball team and the
    Tampa Bay Rays baseball club, and they also participate in a low‑impact senior pickleball league during the winter months.
  arts: Sherry Wilkins loves singing with their church choir to the timeless croons of Ella Fitzgerald and Frank Sinatra, draws creative inspiration from the textile patterns of William Morris while quilting,
    and frequently attends community theater productions of classic dramas such as Arthur Miller’s 'Death of a Salesman' where they admire local performers.
  travel: Sherry Wilkins prefers relaxed road trips to historic coastal towns like Savannah, Georgia and St. Augustine, Florida, enjoys annual cruises to the Caribbean islands, and they plan each journey
    with meticulous itineraries that balance their love of photography with the need to pace activities for their arthritis.
  culinary: Sherry Wilkins, an adept home cook, delights in preparing their signature baked macaroni and cheese with smoked paprika and aged cheddar, a slow‑cooked peach cobbler using garden‑fresh peaches,
    and a hearty chicken and dumplings stew seasoned with thyme and bay leaves, often pairing meals with sweet tea infused with fresh mint leaves.
  core: Sherry Wilkins, a chatty garden‑loving cartographer with a penchant for late‑night quilting marathons and a gentle habit of worrying about every detail, turns every community gathering into a lively
    lesson in local history, and they relish the chance to share stories.
background:
  cultural: Sherry is a first‑generation African‑American Floridian whose formative years were shaped by the civil‑rights movement and the vibrant Black church culture of the Southeast. She grew up hearing
    stories of resilience and community solidarity, which instilled a deep respect for oral history and collective memory. In Boca Raton she participates in the local African‑American senior network, celebrating
    traditions such as gospel music, soul‑food cooking, and community festivals that honor the region’s Black heritage. Her cultural identity informs her commitment to preserving the histories of Black
    neighborhoods through mapping and storytelling, and she often incorporates folk sayings and music into her public talks and workshops.
