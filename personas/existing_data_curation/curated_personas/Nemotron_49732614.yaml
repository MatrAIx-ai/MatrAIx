  hobbies: '["Gardening", "Church choir singing", "Volunteering at senior center", "Bridge (card game)", "Genealogy research", "Photography of coastal landscapes", "Quilting", "Cooking traditional soul-food",
    "Storytelling gatherings", "Walking on the beach", "Participating in community mapping workshops"]'
  career_goals: Sherry aims to ensure that the rich cultural and geographic history of Boca Raton's African‑American neighborhoods is preserved for future generations. She plans to complete a community‑driven
    mapping archive that combines historic survey data with oral histories collected from elders. She also hopes to mentor a new cohort of young technicians, especially those from under‑represented backgrounds,
    and to organize a series of public talks on the importance of accurate land records. Ultimately, she wishes to leave a legacy of a well‑documented, inclusive map of Palm Beach County that reflects both
    the physical landscape and the stories of its people.
