  hobbies: '[''Cooking Puerto Rican cuisine'', ''Singing in church choir'', ''Dancing salsa/plena'', ''Gardening'', ''Reading historical novels'', ''Crocheting'', ''Volunteering at senior center'', ''Attending
    community festivals'', ''Participating in local cultural workshops'']'
  career_goals: Adela aims to transition into a supervisory or trainer role within her call‑center, where she can mentor younger agents, design stress‑reduction protocols, and foster a supportive team culture.
    She also envisions offering part‑time consulting to small local businesses in Morovis and Vega Baja, helping them improve customer‑service practices. Ultimately, she hopes to secure a stable income
    that enables an early, comfortable retirement while continuing to volunteer at community centers, teaching communication and conflict‑resolution skills to seniors and youth.
