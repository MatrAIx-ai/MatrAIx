personas:
  professional: James Shelton is a methodical personal care aide who blends meticulous documentation with compassionate bedside manner, leveraging his CPR certification, vital sign monitoring, and medication
    reminder skills; their innate worry pushes them to double‑check every detail, embodying the community‑focused, service‑oriented values of their suburban upbringing.
  sports: James Shelton enjoys weekend hikes along the ridgelines of Ridley Creek State Park and plays in a local co‑ed softball league, follows the Philadelphia Eagles, Phillies, and 76ers with avid enthusiasm,
    and they attend monthly group rides with the Delaware County Outdoor Club, balancing steady cardio with light strength training while keeping a modest, low‑pressure approach to fitness.
  arts: James Shelton finds creative release in strumming acoustic guitar to classic rock icons like Led Zeppelin, The Rolling Stones, and Neil Young, captures sunrise landscapes inspired by Ansel Adams,
    and they unwind with mystery novels by Agatha Christie, all of which color their evenings with a quiet appreciation for timeless art.
  travel: James Shelton plans trips with a blend of structured itineraries and spontaneous detours, favoring nature‑focused getaways such as a weekend in the Pocono Mountains and a summer hike on the Appalachian
    Trail, while they dream of a future trek through Patagonia’s Torres del Paine after saving for travel through disciplined budgeting.
  culinary: James Shelton favors simple, farm‑to‑table meals, often preparing grilled salmon with lemon‑dill sauce, quinoa bowls tossed with heirloom tomatoes, basil, and roasted carrots harvested from
    their garden, and occasionally treating themselves to homemade sourdough toast, reflecting a moderate cooking skill level anchored in fresh, local ingredients that they enjoy sharing with friends.
  core: James Shelton is a diligent, community‑minded caregiver whose quiet curiosity fuels a love for nature, music, and self‑improvement, yet their persistent worry often leads them to over‑planning and
    occasional procrastination on personal errands.
background:
  cultural: 'James grew up in the suburban neighborhoods of Delaware County, Pennsylvania, in a middle‑class family of European descent with Irish and German roots. His upbringing was shaped by the region’s
    emphasis on community involvement, modesty, and a strong work ethic. He participated in local church activities, school sports events, and community fairs, fostering a sense of responsibility and cooperation.
    While his heritage includes traditional Irish and German cultural elements, his daily life reflects mainstream American suburban values: reliability, humility, and a commitment to helping others. This
    cultural backdrop, combined with the practical, caring nature of his work, reinforces his dedication to service and personal growth.'
attributes:
  skills: '[''Patient care'', ''Mobility assistance'', ''Personal hygiene support'', ''Medication reminders'', ''Basic first aid'', ''CPR certified'', ''Documentation and record-keeping'', ''Time management'',
