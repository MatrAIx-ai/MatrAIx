  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Digital illustration'', ''Keeping a visual journal'', ''Hiking in local parks'', ''Community garden volunteering'',
    ''Teen book club'']'
  career_goals: She hopes to attend a college with a strong visual arts program and eventually become a museum curator or art educator. Sandra wants to combine her love for art with community outreach by
    creating art workshops for under‑served youth. In the longer term, she dreams of establishing a community art center in Livermore that offers classes, exhibitions, and therapeutic art programs. As a
    secondary pathway, she is interested in pursuing graphic design or user experience design to apply her artistic and technical skills.
