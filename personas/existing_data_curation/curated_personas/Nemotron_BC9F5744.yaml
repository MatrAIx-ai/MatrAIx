personas:
  professional: Sandra Wolfe is an aspiring museum curator and art educator in training, leveraging her watercolor and digital illustration skills, event‑planning experience with the youth art club, and
    methodical research abilities to develop structured exhibition proposals that reflect her curious and organized nature.
  sports: Sandra Wolfe enjoys weekend hikes with the Livermore Hiking Club through the trails of Del Valle Regional Park, runs cross‑country for the Livermore High School Wildcats during the school year,
    and follows the San Francisco Giants, often wearing their cap while jogging.
  arts: Sandra Wolfe frequently visits the Livermore Art Gallery to study works by Georgia O’Keeffe and Frida Kahlo, draws inspiration from indie folk musicians like Sufjan Stevens and classical pieces
    by Debussy while sketching the rolling hills, and curates a personal visual journal that blends collage, poetry from Maya Angelou, and experimental watercolor techniques.
  travel: Sandra Wolfe prefers planning low‑cost, art‑focused getaways such as weekend trips to San Francisco’s SFMOMA and hiking excursions in Yosemite, while dreaming of a future study abroad semester
    in Florence, Italy to explore Renaissance masterpieces, balancing her love for nature and culture within her parents’ budget constraints.
  culinary: Sandra Wolfe favors fresh, garden‑grown ingredients, often preparing avocado toast with a drizzle of olive oil, quinoa salads with cherry tomatoes and basil, and occasional sushi rolls featuring
    cucumber and smoked salmon, while treating herself to a warm slice of pepper jack grilled cheese when she’s burning the midnight oil on art projects.
  core: Sandra Wolfe is a methodically curious teen who balances meticulous art research with impulsive splurges on sketchbooks, finds solace in nature hikes and classical melodies, and dreams of turning
    community spaces into vibrant art hubs.
background:
  cultural: Sandra grew up in a middle‑class, white family in Livermore, California. Her parents emphasize education, community involvement, and appreciation of the arts. The suburban Bay Area environment
    exposed her to a blend of traditional American cultural practices and the region’s diverse artistic scene, including public murals, seasonal festivals, and nearby tech‑focused community programs. Family
    gatherings often incorporate holiday traditions from both sides of her ancestry, while school and community activities have introduced her to a range of cultural perspectives, shaping her open‑minded
    outlook.
attributes:
  skills: '[''Sketching and watercolor'', ''Digital illustration (Procreate, Photoshop)'', ''Research and fact‑checking'', ''Event planning and coordination'', ''Basic HTML/CSS web design'', ''Public speaking
