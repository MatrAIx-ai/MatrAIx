  hobbies: '[''drawing'', ''painting'', ''dancing'', ''building with LEGO'', ''reading picture books'', ''pretend play'', ''exploring parks'', ''singing nursery rhymes'', ''group storytime'']'
  career_goals: She imagines herself as a vibrant artist who paints colorful pictures for her friends and later leads art workshops at her neighborhood community center; she also thinks about becoming a
    teacher who helps children discover their own creativity or an explorer who journeys to far‑away places in her imagination, reflecting her curiosity, love of art, and energetic sociability.
