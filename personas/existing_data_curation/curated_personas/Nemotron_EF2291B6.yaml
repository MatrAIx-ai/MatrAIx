personas:
  professional: April Mcgett, a five‑year‑old class helper who delights in arranging story‑time corners, showcases early leadership through organized yet flexible game plans, and channels their curiosity
    and outgoing energy into collaborative projects.
  sports: April Mcgett, a five‑year‑old who loves splashy water play, plays weekend preschool soccer with the Little Rangers team, practices tiny kicks while also dancing in a toddler gymnastics class,
    displaying energetic enthusiasm and teamwork.
  arts: April Mcgett, a five‑year‑old who pours crayons onto paper, sings along to the 'Frozen' soundtrack, watches animated Pixar classics, and is especially enamored with the music of Disney’s 'Moana',
    frequently reenacting scenes with their stuffed animals.
  travel: April Mcgett, a five‑year‑old who has visited the local zoo, the beach in Santa Monica, and a family road trip to Yellowstone National Park, dreaming of a future trip to Disneyland Paris, prefers
    hands‑on discovery and sprawling playgrounds over long flights.
  culinary: April Mcgett, a five‑year‑old who adores mac and cheese with extra cheddar, builds peanut butter‑banana sandwiches, loves strawberry smoothies with a splash of honey, proudly helps stir batter
    but often sneaks extra grapes when no one’s watching.
  core: April Mcgett, a curious five‑year‑old with a relentless appetite for crayons, stickers, and adventure, whose boundless energy and occasional snack‑stealing habit blend creativity with a dash of
    mischief.
background:
  cultural: April is raised in a Black family in Clinton Township, Michigan. Her upbringing includes celebrating African American heritage through family stories, community events at the local church, and
    cultural programs at the library that feature Black art, music, and storytelling. She hears soulful music such as gospel and R&B at home, learns about her ancestors' histories during Black History Month,
    and participates in family gatherings that feature traditional foods and shared narratives, fostering a strong sense of cultural pride and community belonging.
attributes:
  skills: '[''drawing and coloring'', ''basic storytelling'', ''organizing art supplies'', ''letter and number recognition'', ''block and LEGO building'', ''simple problem solving'', ''cooperative play'',
