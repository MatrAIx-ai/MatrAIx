personas:
  professional: An aspiring tech specialist, Lonnie Wallace leverages their self‑taught hardware troubleshooting, HTML/CSS basics, and video editing skills to secure a CompTIA A+ certification while organizing
    school tech workshops and volunteering to teach younger kids computer basics, all driven by a competitive edge that pushes them to out‑perform peers in fast‑paced problem‑solving environments.
  sports: A dedicated community athlete, Lonnie Wallace organizes weekend pickup soccer matches for the local youth league, cheers for the Golden State Warriors during NBA season, hits the Bay Area skate
    park to practice ollies, and hikes the coastal trail at Pacifica for a low‑key cardio break, blending competitive drive with a love for collaborative play.
  arts: A budding guitarist and video creator, Lonnie Wallace jams on electric versions of Tame Impala’s “The Less I Know the Better” and Foo Fighters’ “Everlong” with friends, edits quirky gameplay montages
    set to Daft Punk tracks, and draws inspiration from the vibrant street murals adorning the Mission District, letting music and visual art shape their expressive outlet.
  travel: An adventure‑seeking teen, Lonnie Wallace spends weekends exploring the rugged coastline of Half Moon Bay, dreams of attending the Tokyo Game Show to soak up cutting‑edge tech culture, and plans
    budget‑friendly road trips to Yosemite’s waterfalls, balancing spontaneous day trips with meticulous planning on Google Maps to fit around school commitments.
  culinary: A self‑proclaimed snack aficionado, Lonnie Wallace alternates between whipping up spicy shrimp tacos with fresh cilantro and avocado, perfecting a midnight bowl of instant ramen topped with
    a soft‑boiled egg and sriracha, and binge‑eating pepperoni pizza while streaming games, showing modest cooking skill but a strong preference for bold, salty flavors.
  core: Lonnie Wallace is a fiercely competitive, tech‑savvy teen whose curiosity fuels a practical drive toward a tech career, yet anxiety and impulsive spending often clash with their organized, community‑oriented
    spirit.
background:
  cultural: Lonnie grew up in a predominantly white, middle‑class family in San Jose, a city marked by its tech‑centric and culturally diverse atmosphere. The surrounding Silicon Valley ethos of innovation
    and entrepreneurship impressed him from an early age, while the city’s multicultural neighborhoods exposed him to a broad spectrum of perspectives. His family values practicality and self‑reliance,
    encouraging hands‑on learning over formal schooling, which aligns with the region’s strong DIY and maker culture. At the same time, the progressive social climate of the Bay Area has shaped his awareness
    of mental‑health issues and his desire to advocate for peers. This blend of suburban American upbringing and the dynamic, inclusive environment of Northern California informs his worldview and ambitions.
