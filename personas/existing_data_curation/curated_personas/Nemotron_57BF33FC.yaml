  career_goals: Latently ambitious, Lonnie aims to turn his self‑taught tech abilities into a stable career. In the next year he plans to earn a CompTIA A+ certification through a community‑college program
    or an apprenticeship at a local computer repair shop. He hopes this will open a pathway to a junior developer or support role at a Silicon Valley startup, where he can apply his curiosity for new ideas
    with a practical, results‑driven mindset. Parallel to his technical goals, he wants to champion mental‑health awareness among his peers by leading a school‑based support group, leveraging his personal
    experience with anxiety to help others.
