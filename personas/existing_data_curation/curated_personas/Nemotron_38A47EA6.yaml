personas:
  professional: Roy Sutton leverages two decades of property‑loss adjusting expertise, using Excel, GIS, Xactimate and Guidewire to conduct meticulous investigations while balancing curiosity‑driven forensic
    digging with practical, deadline‑focused workflow, and they assertively mentor junior adjusters yet remain flexible to on‑site challenges.
  sports: Roy Sutton pursues fitness through early‑morning runs along the Chesapeake Bay, belongs to the Maryland Amateur Triathlon Club, and cheers on the Baltimore Orioles, Washington Wizards and Washington
    Capitals on game nights, while they also participate in local fishing tournaments during the summer.
  arts: Roy Sutton spends weekend evenings at the Hampton Jazz Club savoring the sounds of Miles Davis and Esperanza Spalding, attends community theater shows like A Raisin in the Sun, and collects vintage
    crime novels by Agatha Christie, weaving music, performance and literature into the fabric of their leisure.
  travel: Roy Sutton prefers road trips that combine historic tours and coastal relaxation, having explored Charleston, South Carolina, the Outer Banks, and a recent voyage to New Orleans, while they dream
    of navigating New Zealand's South Island for a fishing adventure in the future.
  culinary: Roy Sutton’s Southern palate shines in their backyard barbecues featuring slow‑smoked pork shoulder with Carolina mustard sauce, side dishes of collard greens simmered with ham hocks, and homemade
    Maryland crab cakes seasoned with Old Bay, all cooked with a modest yet confident skill set that occasionally ends in over‑spicy rubs.
  core: Roy Sutton balances methodical professionalism with a love of solo fishing, jazz, and community service, habitually sprinkling a pragmatic approach over everyday quirks such as over‑cooking barbecue
    or procrastinating dental appointments.
background:
  cultural: Roy Lee Sutton’s cultural background is rooted in the African‑American heritage of the Hampton‑Newport News region. Raised by parents who were part of the Great Migration’s second wave, he grew
    up in a close‑knit community where the local Baptist church served as a hub for fellowship, civil‑rights activism, and musical expression. The legacy of Southern Black resilience and storytelling has
    shaped his values of perseverance, mutual support, and respect for elders. He regularly participates in Juneteenth celebrations, supports local youth mentorship programs, and maintains an appreciation
    for gospel, blues, and jazz traditions passed down through his family. This cultural grounding informs both his professional dedication to fairness and his personal commitment to community service.
attributes:
  skills: '[''Claims investigation'', ''Property appraisal'', ''Policy interpretation'', ''Negotiation and settlement'', ''Report writing'', ''Data analysis (Excel, GIS)'', ''Claims management software
