  hobbies: '[''Fishing'', ''Gardening'', ''Reading true‑crime and business books'', ''Woodworking'', ''Listening to jazz'', ''Volunteering at the Hampton African‑American Cultural Center'', ''Cooking Southern
    barbecue'', ''Family gatherings'', ''Genealogy research'']'
  career_goals: Looking ahead, Roy aims to move into a senior leadership role, such as Claims Supervisor or Regional Investigations Manager, where he can shape policy and mentor the next generation of adjusters.
    He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation and specialized certifications in forensic investigation to deepen his expertise. Over the next five years, he envisions
    leading a specialized investigative unit focused on complex, high‑value claims, while also contributing to industry workshops and serving as a consultant for community risk‑reduction programs.
