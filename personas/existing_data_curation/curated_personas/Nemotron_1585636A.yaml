  career_goals: Anokhi dreams of a future where she can combine her love of learning with helping others. She envisions becoming a teacher who sparks curiosity in young minds, a veterinarian who cares for
    animals, or an engineer who designs playful, practical gadgets. She also hopes to continue dancing on stage, showcasing both modern routines and traditional Punjabi Bhangra, reflecting her energetic
    and sociable nature. Her goal is to excel academically, stay connected to her cultural roots, and use her skills to make a positive impact in her community.
