personas:
  professional: Anokhi Kaur, an aspiring young veterinarian who eagerly sorts animal flashcards and leads their pretend clinic games, showcases their curiosity for science, pragmatic organization, and confident,
    cooperative spirit.
  sports: Anokhi Kaur dazzles on the Spring Soccer Club’s U‑7 team, sprints across the grass with the same enthusiasm they show for cheering on the Houston Dynamo during MLS season and the Houston Astros
    in summer, balancing structured drills with playful kick‑around sessions that keep their energetic spirit in shape.
  arts: Anokhi Kaur brightens Tuesday’s dance class by blending graceful ballet moves with lively Bhangra steps to the beats of A.R. Rahman, loves sketching vibrant mandala‑style drawings, and often hums
    along to Taylor Swift and Disney’s 'Let It Go' while creating craft projects, expressing their boundless creativity.
  travel: Anokhi Kaur dreams of weekend road trips to Space Center Houston and the Grand Canyon’s colorful cliffs, cherishes family outings to the local park’s splash pad, and hopes to someday explore the
    glittering lights of New York City, balancing their love of adventure with the comfort of familiar surroundings.
  culinary: Anokhi Kaur eagerly helps whisk batter for sweet jalebi and sprinkle cumin on aloo paratha during festive meals, delights in assembling colorful fruit kebabs with strawberries, banana, and mango,
    and can whip up a simple cheese pizza, showcasing their budding culinary curiosity mixed with a playful mess‑making habit.
  core: Anokhi Kaur, a soccer‑savvy, sticker‑collecting 6‑year‑old who balances curious science dreams with vibrant festival celebrations, often misplaces a sock after dance class but they never lose their
    bright optimism.
background:
  cultural: Anokhi comes from a Punjabi Sikh family originally from the Punjab region of India. At home, Punjabi is spoken alongside English, and she participates in cultural traditions such as celebrating
    Vaisakhi, Diwali, and Lohri, wearing bright salwar kameez for festivals, and visiting the local Gurdwara in Houston for services. Family gatherings often feature traditional foods like aloo paratha,
    chana masala, and sweet jalebi, and storytelling about their heritage. Living in Spring, Texas, Anokhi experiences a blend of South Asian customs and mainstream American life, which influences her values
    of community, gratitude, and respect while fostering a curiosity about both cultures.
