  hobbies: '[''Basketball'', ''Hip‑hop and R&B music'', ''Video gaming (Fortnite, NBA 2K)'', ''Skateboarding'', ''DIY electronics and LEGO building'', ''Reading sci‑fi graphic novels'', ''Volunteer work
    at church youth events'']'
  career_goals: Randy aims to complete his high school education, either by earning his diploma or obtaining a GED within the next two years. He plans to enroll in a community college program or secure
    an apprenticeship in automotive technology, with a particular interest in electric‑vehicle systems. He also hopes to develop a side business repairing smartphones and gaming consoles, leveraging his
    tech‑savvy skills to earn extra income and potentially fund further training. In the longer term, he envisions becoming a certified automotive technician who can blend hands‑on mechanical work with
    emerging green technology.
