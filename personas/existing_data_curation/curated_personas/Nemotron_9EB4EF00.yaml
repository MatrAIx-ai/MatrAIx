personas:
  professional: Randy Eatman, a 16‑year‑old aspiring automotive technician, leverages their garage‑grown mechanical know‑how and budding smartphone repair skills to run a small side hustle fixing consoles,
    while their curious yet practical mindset drives them to tinker with electric‑vehicle components after school.
  sports: Randy Eatman, a dedicated player at the local community‑center basketball court, cheers for the Detroit Pistons and follows the Detroit Lions, while also skateboarding with a downtown crew, blending
    competitive drive with a freestyle love for street skating and maintaining a flexible workout routine that mixes structured drills with improvisational play.
  arts: Randy Eatman, a fan of hip‑hop and R&B, streams tracks by J‑Cole, Kendrick Lamar, and emerging Detroit rap talent, creates simple beats on a free music‑production app, and devours sci‑fi graphic
    novels like “Saga” and “Descender,” drawing inspiration from both music and visual storytelling for their own creative projects.
  travel: Randy Eatman prefers spontaneous road trips with friends, having explored Michigan’s Upper Peninsula for scenic hikes, dreams of attending the Anime Expo in Los Angeles, and hopes to someday visit
    Tokyo’s Akihabara district to soak in its gaming culture, all within a modest budget fueled by their part‑time repair gigs.
  culinary: Randy Eatman enjoys classic comfort foods such as pepperoni pizza and chicken wings, experiments with loaded nachos at home using cheddar, jalapeños, and salsa, but rarely cooks beyond quick
    meals, often opting for a late‑night bowl of instant ramen while listening to beats they are producing.
  core: Randy Eatman blends a laid‑back teen vibe with relentless curiosity, juggling basketball, skateboarding, and a budding tech‑repair hustle while occasionally forgetting assignments and hoarding limited‑edition
    sneaker releases.
background:
  cultural: Randy’s African‑American heritage is woven into his daily life through family traditions, church gatherings, and the vibrant musical legacy of the Detroit metropolitan area. Growing up in Taylor,
    Michigan, he has been exposed to the region’s historic automotive industry, which fuels his interest in car mechanics. Community events like block parties, local concerts, and youth sports leagues have
    reinforced a sense of belonging and cultural pride. His family emphasizes resilience, education, and mutual support, values that guide his aspirations and interactions.
