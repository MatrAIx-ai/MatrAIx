persona_description: A global health expert who is concerned about the potential impact of threatened reductions in foreign aid from the European Union and its struggling governments on efforts to combat
  malaria. They are familiar with the Global Fund, the World Health Organization, and other international institutions involved in fighting infectious diseases, and are aware of the importance of funding
  for prevention and control of malaria. They are likely to be particularly concerned about the potential consequences of these reductions on the progress made towards reducing the mortality rate from malaria,
  which has fallen 25% worldwide and 33% in Africa. They are also likely to be aware of the challenges facing development aid overall and the stakes for national leaders in Europe who are weighing cuts
  to overseas development assistance.
