  career_goals: Although retired, Mackenzie aims to leave a lasting intellectual legacy. She plans to mentor high‑school and early‑college students in STEM through a local outreach program, author a memoir
    that intertwines her scientific career with family history, and publish a series of articles on sustainable gardening for the county’s community newsletter. She also aspires to secure a senior advisory
    role for the Fauquier County historical society and to complete a certification in horticulture to deepen her expertise in native plant conservation.
