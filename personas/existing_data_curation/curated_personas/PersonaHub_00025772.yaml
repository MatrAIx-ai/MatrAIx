persona_description: A sailor or a maritime enthusiast who is interested in the maritime history and the strategic importance of narrow seas in the context of warfare. They are likely to have a deep understanding
  of the geography and the maritime laws of narrow seas and the strategies employed by naval forces to navigate and defend them. They would be interested in the analysis of narrow seas and the development
  of small, more expendable craft for littoral and adjacent narrow seas, and the unique capabilities required for fighting in these waters. They would also be interested in the maritime history of narrow
  seas and the role of narrow seas in shaping the course of maritime conflicts throughout history.
