personas:
  professional: An analytical management analyst, Dania Perez leverages bilingual fluency, data‑driven modeling in Python, R, and Tableau, and a knack for balancing curiosity with pragmatic process improvement
    to steer municipal performance metrics and streamline cross‑departmental initiatives while fostering collaborative, low‑conflict work environments.
  sports: Dania Perez enjoys weekend hikes on the misty trails of El Yunque, regular kayak outings with the local Fajardo Kayak Club, and practices yoga for flexibility, while cheering on the Cangrejeros
    de San Juan baseball team and the Fajardo women's volleyball club, blending low‑impact cardio with seasonal community sports participation.
  arts: Dania Perez immerses themselves in plena and bomba dance circles, often listening to the legendary Ismael Rivera and Héctor Lavoe, attends performances by the local La Casa del Teatro troupe, and
    draws inspiration from historical novels by Julia Alvarez and sustainability documentaries by Werner Herzog.
  travel: Dania Perez favors organized eco‑tourism trips, meticulously planning visits to the bioluminescent bay of Vieques, historic Old San Juan, and occasional retreats in Costa Rica’s Monteverde cloud
    forest, balancing a thirst for adventure with family responsibilities and a keen eye on travel costs.
  culinary: Dania Perez is a skilled home chef who passionately prepares mofongo with crispy chicharrón, garlicky sofrito, and ripe plantains, as well as hand‑wrapped pasteles seasoned with annatto and
    pork, often experimenting with local herbs like cilantro and recao while pairing meals with fresh guava juice.
  core: Dania Perez blends data‑driven rigor with island‑born hospitality, juggling meticulous budget spreadsheets, a lingering anxiety that fuels both relentless self‑improvement and late‑night Netflix
    marathons, and a habit of over‑planning every hike and project.
background:
  cultural: Dania grew up immersed in the vibrant culture of Puerto Rico’s east coast, where the sea, music, and family traditions shape daily life. As a bilingual Puerto Rican, she carries forward the
    island’s strong sense of community, Catholic values, and the resilience forged by experiences such as Hurricane Maria. The cultural emphasis on familismo and collectivism informs her cooperative nature
    and desire to contribute to the common good. Her heritage also includes Afro‑Caribbean rhythms and Spanish colonial influences, reflected in her love for plena, bomba, and culinary traditions. Living
    in Fajardo, a town known for its maritime economy and natural beauty, has reinforced her connection to environmental stewardship and tourism, guiding both her professional focus and personal interests.
attributes:
  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Data Visualization'', ''Python'', ''R'', ''SQL'', ''Excel'', ''Tableau'', ''Process Improvement'', ''Operational Efficiency'', ''Strategic Planning'',
    ''Risk Assessment'', ''Performance Measurement'', ''Budgeting'', ''Stakeholder Communication'', ''Bilingual Spanish-English'', ''Conflict Resolution'', ''Mentorship'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Yoga'', ''Cooking Puerto Rican cuisine'', ''Attending local festivals'', ''Dancing plena and bomba'', ''Reading historical fiction'', ''Studying sustainability'',
    ''Volunteering teaching computer skills'']'
  career_goals: Dania aspires to advance into senior leadership within the public sector, aiming for a director‑level position where she can shape data‑driven policies for sustainable economic development
    in Fajardo and other coastal municipalities. She wants to lead cross‑functional teams that integrate environmental resilience, tourism analytics, and community health metrics into municipal planning.
    A key ambition is to earn a Master’s in Public Administration or Business Administration to complement her technical expertise with policy acumen. She also hopes to establish a mentorship program for
    women in STEM in Puerto Rico, sharing her experience to reduce gender gaps. Balancing her career growth with personal well‑being, she plans to implement stress‑reduction initiatives in her workplace
    and model a harmonious, supportive corporate culture.
