personas:
  professional: Sara Khan is an aspiring multidisciplinary visual artist who melds hand‑drawn mythic sketches, beadwork, and digital photography into narrative projects, leveraging their basic HTML/CSS
    skills to showcase them online, while their competitive streak drives them to enter regional contests despite a habit of leaving the studio cluttered and deadlines fluid.
  sports: Sara Khan is an avid hiker who explores the Osage Hills and Tallgrass Prairie trails with a local youth outdoor club, roots for the Tulsa Roughnecks soccer team and the Oklahoma City Thunder,
    and incorporates weekend bike rides into their routine, though they often skip formal workouts in favor of wandering through nature.
  arts: Sara Khan immerses themselves in creative expression, sketching mythic characters inspired by the works of Alex Ross and N.K. Jemisin, crafting bead bracelets echoing tribal symbolism, listening
    to Miles Davis, Tycho, and powwow drumming groups, and curating meme collages that fuse pop culture icons with traditional patterns, while regularly visiting the Tulsa Museum of Art for inspiration.
  travel: Sara Khan dreams of backpacking to Sedona’s crimson cliffs, exploring Santa Fe’s art markets, and photographing Iceland’s waterfalls, but currently spends weekends on road trips to nearby state
    parks, planning trips with a mix of online guides and family input, balancing a limited travel budget with a desire for immersive cultural experiences.
  culinary: Sara Khan enjoys experimenting with flavors, frequently whipping up sweet potato hummus, matcha‑infused oat bowls, and corn tacos topped with cilantro and smoked salmon, while their favorite
    snack ingredients include blackberries, pumpkin seeds, and sage, and they often pair meals with indie electronic playlists.
  core: Sara Khan is a teenage visual storyteller who fuses tribal beadwork with speculative myth, procrastinates on organization yet thrives on competitive art contests, and battles anxiety with journals,
    playlists, and hikes.
background:
  cultural: Sara comes from a family rooted in the Muscogee (Creek) Nation, with ancestors who have lived in the Tulsa area for generations. Her upbringing blends traditional practices—such as language
    lessons, seasonal powwows, and storytelling circles—with contemporary urban life. The Muscogee emphasis on respect for the earth, oral history, and community service shapes her worldview and fuels her
    artistic narrative. Living in Tulsa, a city marked by both Native American resilience and complex histories, she navigates a hybrid identity that informs her curiosity, skepticism, and desire to bridge
    past and present through creative expression.
