  career_goals: Sara dreams of turning her artistic talents into a career as a multidisciplinary visual artist and cultural storyteller. She hopes to earn a scholarship to study fine arts or museum studies,
    focusing on preserving and re-interpreting Native American narratives. Long-term, she envisions curating community exhibitions, leading youth workshops in Tulsa, and using digital platforms to amplify
    indigenous voices. Her competitive drive pushes her to aim for recognition in regional art contests, while her skeptical nature fuels a desire to uncover overlooked histories and challenge mainstream
    representations.
