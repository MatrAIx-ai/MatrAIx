  career_goals: Nicholas aims to complete his bachelor’s degree in Business Administration or Communications and launch a career in tourism marketing or community development in the western region of Puerto
    Rico. He envisions working with local businesses to promote sustainable tourism, creating experiential campaigns that highlight Cabo Rojo’s natural attractions. In the longer term, he hopes to start
    his own social-enterprise that trains youth in event management and environmental stewardship, providing stable employment for his family and contributing to the island’s economic resilience.
