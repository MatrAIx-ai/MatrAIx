personas:
  professional: Nicholas Herrera, a 23‑year‑old bilingual community‑focused marketer, leverages their hospitality experience, Canva graphic skills, and knack for connecting people to design sustainable
    tourism campaigns for local businesses while balancing curiosity‑driven experimentation with practical, results‑oriented planning, and they thrive on turning community events into digital storytelling
    opportunities.
  sports: Nicholas Herrera plays beach volleyball with the Cabo Rojo Beach Club, surfs the waves at Playa Sucia, hikes the Guajataca State Forest trails on weekends, and they cheer for the national basketball
    team while occasionally missing early morning runs due to late nights at local salsa gatherings.
  arts: Nicholas Herrera captures island sunsets with their smartphone, shares the photos on Instagram, dances salsa and reggaeton at community festivals, and they draw inspiration from street‑art muralist
    'Jared' and musicians like Bad Bunny, Marc Anthony, and classic salsa legend Celia Cruz.
  travel: Nicholas Herrera enjoys spontaneous weekend road trips to nearby coastal towns, has visited the historic colonial quarter of the island’s capital, dreams of surfing in Bali, trekking the Inca
    Trail in Peru, and exploring Marrakech’s souks, and they plan trips around their limited student budget and family responsibilities.
  culinary: Nicholas Herrera delights in cooking traditional island dishes such as mofongo and asopao using plantains, pork, sofrito, and fresh fish, experiments with new Instagram‑sourced recipes, often
    over‑salts in enthusiasm, and they pair meals with locally roasted coffee infused with a hint of cinnamon.
  core: Nicholas Herrera blends an adventurous coastal lifestyle with a pragmatic marketing mindset, balancing community‑centric projects, occasional impulse spending on surf gear, and a habit of staying
    up late editing photos for social media, and they constantly seek new ways to merge fun with purpose.
background:
  cultural: Nicholas grew up in Cabo Rojo, a coastal municipality in the western part of Puerto Rico, where his family’s roots blend Taino, Spanish, and African heritage. Raised in a close-knit, predominantly
    Catholic household, he celebrates island traditions such as the annual Fiestas Patronales and the local Salt Flats Festival, and he feels a deep connection to the natural landscape of beaches, mangroves,
    and the famed lighthouse. The bilingual environment of school and community gave him fluency in both Spanish and English, shaping his perspective on Puerto Rico’s cultural and political identity. He
    carries pride in the island’s music—reggaeton, salsa, and plena—and its cuisine, often sharing dishes like mofongo and lechón with friends. This cultural grounding informs his values of communal support,
    resilience, and optimism for the future.
