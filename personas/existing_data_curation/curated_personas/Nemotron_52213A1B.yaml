  hobbies: '[''Tropical gardening'', ''Volunteering at local food bank'', ''Senior center activity coordination'', ''Walking coastal trails'', "Hiking O''ahu''s Ko''olau Range", ''Reading historical biographies'',
    ''Woodworking'', ''Cooking Hawaiian dishes'', ''Playing ukulele'']'
  career_goals: As a retired professional, Carlos aims to stay active by applying his experience to benefit his community. He aspires to lead volunteer engineering workshops that teach safe home maintenance
    to seniors, to serve on the board of the local senior center, and to mentor high‑school students interested in STEM through a partnership with nearby schools. He also hopes to document and preserve
    memories of the early development of Kapolei, contributing oral histories to the local historical society. Maintaining his health and supporting his spouse in their shared travel plans around the Hawaiian
    islands are personal priorities that complement his desire to foster harmony and inter‑generational connection.
