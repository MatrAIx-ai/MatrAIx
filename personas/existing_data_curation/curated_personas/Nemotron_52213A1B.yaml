personas:
  professional: Retired civil engineer Carlos Dawley, age 82, applies his decades of project‑planning and CAD design expertise, precise technical writing, and compassionate mentorship to lead volunteer
    workshops on safe home maintenance for seniors while they coordinate community outreach at the Kapolei senior center.
  sports: Carlos Dawley maintains his fitness with regular walks along the Makapuu Lighthouse trail and bi‑monthly hikes in the Ko‘olau Range, cheers for the University of Hawaii Rainbow Warriors football
    team during the fall season, and enjoys watching the Seattle Seahawks on Sundays, all while they occasionally join senior‑friendly beach volleyball games at the Kapolei community center.
  arts: Carlos Dawley finds creative outlet in crafting wooden furniture, strumming simple melodies on his ukulele to the tunes of Israel Kamakawiwo’ole and Don Ho during family gatherings, and immersing
    himself in biographies of engineers and Hawaiian pioneers, allowing the arts to enrich his reflective evenings as they share stories with friends.
  travel: Traveling at a leisurely pace, Carlos Dawley meticulously plans week‑long island hops to Maui’s Hana coast, Kauai’s Na Pali cliffs, and the Big Island’s volcanic craters while they budget for
    occasional flights back to the mainland to visit grandchildren and dream of a future cultural tour of Japan’s historic temples.
  culinary: At a proficient home‑cook level, Carlos Dawley whips up classic Hawaiian fare such as laulau wrapped in taro leaves, poke bowls with fresh ahi tuna and soy‑sesame dressing, and kalua pig seasoned
    with sea salt and banana leaves, while they sweeten their palate with haupia made from coconut milk and grated cassava.
  core: Eighty‑two‑year‑old Carlos Dawley blends meticulous engineering precision with Aloha‑infused compassion, tackling senior home‑maintenance workshops, tending his tropical garden, and occasionally
    sneaking a third slice of haupia cake even though they are cautioned about cholesterol.
background:
  cultural: Carlos Asher Dawley is a white American who grew up on the mainland United States before relocating to Kapolei, Hawai‘i after retiring from a career in civil engineering. Although his ethnic
    roots are European‑American, his decades of residence in Hawai‘i have deeply shaped his worldview. He embraces the Aloha spirit, participates in community celebrations such as Lei Day and the Makahiki
    festival, and makes an effort to use Hawaiian greetings like 'Aloha' and 'Mahalo' in daily conversation. He has taken informal lessons in the Hawaiian language and incorporates local culinary traditions
    into his cooking. His marriage, long‑standing family ties, and involvement in church activities reflect a blend of mainland and island values, emphasizing family cohesion (ohana), respect for elders,
    and collaborative service. This multicultural exposure informs his compassionate approach to helping others and his desire to preserve and share the cultural heritage of his adopted home.
attributes:
  skills: '[''Project management'', ''Structural design (civil engineering)'', ''Computer‑aided design (CAD)'', ''Data analysis for infrastructure'', ''Technical troubleshooting'', ''Technical writing'',
