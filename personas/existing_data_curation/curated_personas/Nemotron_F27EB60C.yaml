  career_goals: Clarence aims to translate his love for art and his deep compassion into a career that supports community wellbeing. Over the next five years he plans to secure a full‑time position as an
    arts program coordinator for a nonprofit or municipal cultural center in the Kansas City area, designing inclusive workshops that use visual art and mindfulness to foster personal growth for underserved
    populations. He also hopes to complete a certification in art therapy and eventually lead a regional outreach network that integrates creative expression with social support services.
