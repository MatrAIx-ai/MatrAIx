personas:
  professional: Clarence Auton, a 31‑year‑old aspiring arts program coordinator, blends their graphic design, poetry, and pottery experience with a compassionate, flexible approach to create inclusive,
    mindfulness‑focused workshops for underserved Kansas City residents, even as their relaxed attitude toward deadlines sometimes requires last‑minute sprint planning, and they often rely on spontaneous
    bursts of inspiration to meet project timelines.
  sports: Clarence Auton, a 31‑year‑old outdoor enthusiast, spends Saturday mornings hiking with the Kansas City Trails Guild, roots for the Chiefs during football season, enjoys occasional pickup soccer
    with a community league, and they treat weekly nature walks as essential stress relief rather than intensive training.
  arts: Clarence Auton frequently visits the Kemper Museum to view works by contemporary artists like Yayoi Kusama, writes poetry inspired by Mary Oliver, attends indie shows featuring Sufjan Stevens and
    Iron & Wine, and they channel that inspiration into community pottery classes and hand‑crafted visual displays.
  travel: Clarence Auton prefers low‑key, inspiration‑driven trips—camping in the Ozarks, wandering the artisan markets of Asheville, and dreaming of a month‑long artist‑retreat in the Scottish Highlands—and
    they often plan on a whim with a modest travel fund and a desire to blend nature with creative workshops.
  culinary: Clarence Auton experiments in the kitchen, skillfully fermenting kimchi tacos with gochujang, roasting heirloom carrots with lavender‑infused honey, and perfecting sourdough loaves scented with
    rosemary, all while savoring farm‑to‑table meals at local cafés like The Farmhouse, and they often share these dishes at community potluck gatherings.
  core: Clarence Auton is a creatively restless, compassion‑driven 31‑year‑old who turns daily stress into art, yet they often misplace deadlines and forget to file taxes on time.
background:
  cultural: Clarence grew up in the suburbs of Kansas City, Missouri, in a middle‑class, predominantly white neighborhood. His family’s roots trace back to German and Irish immigrants who settled in the
    Midwest generations ago, instilling values of modesty, hard work, and community stewardship. He attended public schools and earned an associate’s degree in liberal arts with a focus on visual arts at
    a local community college. The Kansas City region’s rich jazz and blues heritage, as well as its vibrant community art scene, have shaped his appreciation for music and visual creativity. Although raised
    in a traditionally Protestant environment, he now identifies as spiritually eclectic, drawing on mindfulness practices and a secular humanist outlook. His Midwestern upbringing emphasizes politeness,
    cooperation, and a strong sense of belonging to local neighborhoods, which informs his compassionate and cooperative nature.
