personas:
  professional: Ayyub Johnson, a precocious 5‑year‑old who spends afternoons at the preschool makerspace, envisions a future as a civil engineer, and they meticulously plan Lego constructions, balancing
    a curious appetite for new designs with a practical, step‑by‑step method that mirrors a professional project workflow.
  sports: Ayyub Johnson plays in the local under‑5 soccer league, favoring the midfield position for its mix of strategy and action, and they cheer for the hometown baseball team during family outings,
    while competitively counting every goal they score against peers on the playground.
  arts: Ayyub Johnson spends weekend afternoons drawing intricate dinosaur scenes inspired by picture books, loves listening to the upbeat tunes of the Kidz Bop band, and they eagerly perform short puppet
    shows for family, showcasing a creative spark that balances their methodical nature.
  travel: Ayyub Johnson enjoys family road trips to nearby nature reserves, where they map out stops on a colorful travel journal before departure, and they dream of visiting Disney World’s Magic Kingdom,
    a destination they’ve pinned proudly on their bedroom wall.
  culinary: Ayyub Johnson favors crunchy carrot sticks, cheese cubes, and homemade mac‑and‑cheese, often helping to stir the sauce with a wooden spoon, yet they stubbornly refuse to try broccoli, a selective
    palate that reflects their competitive desire to “win” at meals by finishing their favorite dishes first.
  core: Ayyub Johnson is a methodical, curious 5‑year‑old who balances structured Lego building and competitive playground games with a calm, organized approach to money, health, and snack choices, occasionally
    slipping into picky‑eater quirks.
background:
  cultural: Ayyub’s family is part of the Black community in Bellville, Texas. They maintain Southern traditions such as Sunday church gatherings, gospel music, and communal barbecues. Celebrations like
    Juneteenth and family reunions involve shared meals, storytelling, and the passing down of cultural values such as respect, perseverance, and community support. His parents emphasize education and discipline,
    while also exposing him to African‑American history and local Texas heritage, creating a blended cultural identity.
