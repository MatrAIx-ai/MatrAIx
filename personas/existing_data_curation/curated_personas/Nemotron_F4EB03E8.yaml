  career_goals: Ayyub often talks about becoming a firefighter because he admires their bravery and teamwork. He also expresses interest in building things like a construction worker or engineer, and sometimes
    imagines himself as a scientist exploring space. His ambitions are guided by his love of solving problems, helping others, and working with his hands, showing a blend of curiosity and practicality.
