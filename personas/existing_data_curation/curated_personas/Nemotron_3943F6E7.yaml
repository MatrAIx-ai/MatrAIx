  hobbies: '[''Visiting architecture tours'', ''Acoustic guitar playing'', ''Kayaking on Lake Ray Hubbard'', ''Cooking Tex-Mex dishes'', ''DIY home renovation projects'', ''Attending local art exhibitions'',
    ''Reading architecture and design books'', ''Volunteering for community building projects'']'
  career_goals: Krzysztof aims to become a senior partner at his firm and eventually launch a boutique practice focused on sustainable residential and mixed‑use projects in the Dallas‑Fort Worth area. He
    plans to achieve LEED Accredited Professional status, lead award‑winning design teams, and mentor junior architects. Over the next five years, he seeks to expand his portfolio with high‑performance
    buildings that address Texas climate challenges, influence regional planning policies, and gain recognition in industry publications and design competitions.
