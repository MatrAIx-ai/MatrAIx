personas:
  professional: Architect Krzysztof Templeton blends rigorous BIM workflows with pragmatic, climate‑responsive design, leveraging meticulous project‑management skills while occasionally tolerating a cluttered
    desk that betrays their otherwise structured approach.
  sports: Architect Krzysztof Templeton spends weekend mornings kayaking on Lake Ray Hubbard, joins a local pick‑up basketball league, and backs the Dallas Cowboys and FC Dallas, embracing a loosely scheduled
    fitness routine that balances competitive spirit with relaxed recreation.
  arts: Krzysztof Templeton regularly visits the Dallas Museum of Art to admire abstract works by Julie Mehretu and modernist designs by Mies van der Rohe, while evenings often feature acoustic guitar sessions
    playing Bob Dylan and Chopin, weaving cultural heritage into their artistic palate.
  travel: Krzysztof Templeton plans architecture‑focused trips with a semi‑structured itinerary, having explored historic neighborhoods in Prague and Gaudí’s masterpieces in Barcelona, and now dreams of
    a sustainable design tour of Kyoto, always weighing budget constraints against the desire for immersive experiences.
  culinary: Krzysztof Templeton delights in cooking Tex‑Mex staples like carne asada tacos and chipotle‑infused enchiladas, while also preparing pierogi for holiday gatherings, favoring ingredients such
    as cilantro, jalapeño, smoked paprika, and fresh lime, with a moderate skill level that sometimes leads to over‑seasoning.
  core: Architect Krzysztof Templeton merges disciplined, climate‑smart design practice with spontaneous DIY projects, maintains a structured financial plan that occasionally yields impulsive tool splurges,
    navigates mild hypertension with proactive health habits, and cultivates a rich cultural life through music, art, and travel.
background:
  cultural: Krzysztof is a second‑generation Polish‑American; his parents emigrated from Kraków in the 1970s and settled in Texas. He grew up celebrating Polish traditions such as Wigilia and incorporating
    Texan customs like BBQs and Friday night football. Bilingual in English and conversational Polish, he draws aesthetic inspiration from both European modernism and the pragmatic, climate‑aware architecture
    of the Southwest. This blend of heritage and local culture informs his design philosophy, community involvement, and personal interests.
