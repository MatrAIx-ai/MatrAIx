  hobbies: '["Visiting art exhibitions and museums", "Participating in bomba and plena music sessions", "Cooking and sharing traditional Puerto Rican dishes", "Playing dominoes and bridge", "Gardening tropical
    and ornamental plants", "Reading Caribbean literature and poetry", "Salsa dancing in community groups", "Volunteering as a cultural guide for tourists"]'
  career_goals: Although retired, Daphne aims to remain an active cultural ambassador in Ponce. She plans to volunteer regularly at the Museo de Arte de Ponce, leading intergenerational art tours and workshops
    that blend her love of unconventional ideas with community engagement. She hopes to record a series of short video stories about the city’s history and its older residents, using her growing digital
    skills to create a community archive. Daphne also aspires to organize a monthly "Senior‑Salsa" social where older adults can dance, play music, and compete in friendly game tournaments. On a personal
    level, she is determined to learn a new craft—ceramic painting—so she can keep challenging herself and stay mentally sharp.
