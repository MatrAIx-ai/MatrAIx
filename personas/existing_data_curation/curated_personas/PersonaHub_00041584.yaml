persona_description: A cosmologist who specializes in the study of the cosmic microwave background, cosmic rays, and the structure and evolution of galaxies. His research interests include, but are not
  limited to, the detection and interpretation of cosmic microwave background radiation, the detection of cosmic rays, and the study of the magnetic fields in galaxies. He uses the polarised emission of
  interstellar dust to reconstruct the Galaxy's magnetic field and study its role in the build-up of structure in the Milky Way, leading to star formation.
