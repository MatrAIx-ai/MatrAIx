personas:
  professional: Pamela Broad, a meticulous bank teller with three decades of cash‑handling mastery and deep familiarity with Jack Henry and FIS, applies her skeptical, detail‑oriented mindset to catch errors,
    mentor junior staff, and steadily climb toward a senior teller or assistant branch manager role while shaping a future as a part‑time budgeting advisor.
  sports: Pamela Broad stays active through weekly walks with the Oakdale Nature Walkers club, supplements the routine with low‑impact gardening, and fuels a competitive spirit by cheering the Oklahoma
    City Thunder during basketball season and the Oklahoma Sooners during college football, while rarely participating in organized sports beyond occasional senior softball pick‑up games.
  arts: Pamela Broad weaves her creative outlet through intricate quilts inspired by William Morris patterns, immerses herself in historical fiction by Hilary Mantel and Ken Follett, discusses literary
    nuances with her five‑member book club, and finds melodic solace in bluegrass classics by Alison Krauss, while regularly visiting the Oklahoma City Museum of Art to admire works by Grant Wood.
  travel: Pamela Broad plans travel like a curated research project, favoring slow‑paced genealogical tours to London and Edinburgh to trace family roots, weekend road trips to the Grand Canyon and St. Louis
    for archival work, and occasional stays at the tranquil Hot Springs, Arkansas, balancing curiosity with a modest budget and limited family commitments.
  culinary: Pamela Broad cooks with the same patience she applies to quilting, favoring home‑grown tomatoes and basil to craft rustic roasted chicken with rosemary and thyme, creamy corn chowder, and heirloom
    tomato‑cucumber salad, while their skill level remains comfortably at competent home chef who enjoys occasional indulgence in take‑out Chinese dim sum after a long day.
  core: Pamela Broad blends a relentless curiosity with disciplined, quiet efficiency, channeling her love of puzzles into banking precision, genealogy sleuthing, and intricate quilting, yet they sometimes
    neglect regular health check‑ups and over‑indulge in fabric shopping sprees.
background:
  cultural: Pamela was born and raised in Oklahoma's heartland, growing up in a middle-class, white, Protestant family that emphasized humility, self-reliance, and community service. The regional culture
    of modest hospitality and a strong work ethic shaped her practical outlook, while exposure to local folk traditions and school curricula sparked an enduring interest in history and storytelling. Her
    identity reflects a blend of traditional Midwestern values with the gradual adoption of modern, technology-driven conveniences common in contemporary Oklahoma City.
attributes:
  skills: '[''Cash handling'', ''Account reconciliation'', ''Banking compliance'', ''Customer service (one-on-one)'', ''Data entry'', ''Attention to detail'', ''Critical thinking'', ''Problem solving'',
