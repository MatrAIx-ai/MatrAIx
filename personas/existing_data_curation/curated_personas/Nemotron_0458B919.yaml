  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Quilting'', ''Gardening'', ''Birdwatching'', ''Crossword puzzles'', ''Sudoku'', ''Small book club participation'', ''Volunteer work
    at local historical society'', ''Baking'']'
  career_goals: Pamela aims to advance to a senior teller or assistant branch manager role within the next three years, seeking certification as a Certified Financial Services Teller (CFST) and completing
    a compliance training program. She is motivated to mentor new tellers, develop a small-group financial literacy workshop for seniors in her community, and eventually transition to a part-time advisory
    position focusing on budgeting and retirement planning before full retirement.
