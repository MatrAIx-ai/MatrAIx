personas:
  professional: Vivian Shelton, a veteran ATM and multifunction printer repair specialist, channels their methodical diagnostic expertise, meticulous service logs, and steadfast commitment to PCI‑DSS compliance
    into a part‑time advisory role where they mentor junior technicians and offer on‑site maintenance for local banks, all while adhering to a structured schedule that mirrors their love for predictable
    routines.
  sports: Vivian Shelton stays fit through low‑impact activities, joining the Natchez Trace Walking Club for weekly strolls, cheering on the Memphis Grizzlies during NBA season, and participating in a local
    senior bowling league, applying the same organized, step‑by‑step approach they use in their technical repairs.
  arts: Vivian Shelton weaves cultural threads into their leisure time by listening to Mahalia Jackson’s gospel hymns and B.B. King’s blues while quilting patterns inspired by William Morris’s textiles,
    and they regularly debate the historical insights of Doris Kearns Goodwin at their book club, allowing those artistic influences to color their methodical mindset.
  travel: Vivian Shelton favors meticulously planned, low‑key trips, having driven the historic Natchez Trace to tour antebellum mansions in Natchez, spent a week on a guided Rhine River castle cruise,
    and now daydreams about a quiet pilgrimage to Kyoto’s seasonal gardens to study planting cycles, all while balancing a modest travel budget.
  culinary: Vivian Shelton, an adept home cook who harvests tomatoes, green beans, and herbs from their garden, often prepares hearty collard greens simmered with smoked turkey and roasted sweet potatoes
    seasoned with rosemary and garlic, while they occasionally splurge on a slice of pecan pie at the church fellowship dinner each Thanksgiving, reflecting their blend of practical nutrition and occasional
    indulgence.
  core: Vivian Shelton, a 69‑year‑old tech‑savvy gardener and quilter, balances a methodical repair mindset with a love for gospel blues, a habit of cataloguing every seed packet, and a quirky tendency
    to over‑water their tomatoes whenever a rainstorm threatens.
background:
  cultural: Vivian is rooted in an African‑American community in rural Mississippi, shaped by the legacy of the civil‑rights era and Southern traditions. Her upbringing emphasized resilience, faith, and
    strong family ties, with the church serving as a central pillar in her life. Southern culinary customs, gospel music, and oral storytelling have been integral to her cultural identity. These influences
    fostered a deep sense of self‑reliance and a commitment to service, motivating her pursuit of technical expertise and her dedication to mentoring the next generation.
attributes:
  skills: '[''ATM hardware diagnostics and repair'', ''Multifunction printer and copier maintenance'', ''Circuit board troubleshooting'', ''Firmware updates and embedded software configuration'', ''Network
    setup for office equipment'', ''PCI-DSS compliance and security protocols'', ''Inventory management and preventive maintenance scheduling'', ''Technical documentation and reporting'', ''Training and
    mentorship of junior technicians'', ''Customer service and client communication'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Quilting and patchwork craft'', ''Reading historical non‑fiction and tech magazines'', ''Book club participation'', ''Volunteer tech tutoring at
    church'', ''Listening to gospel and blues music'', ''Walking on local nature trails'']'
  career_goals: Approaching retirement, Vivian aims to transition from a full‑time field service role to a part‑time advisory capacity. She plans to obtain a Certified Service Technician credential, mentor
    younger technicians in her community, and potentially launch a micro‑enterprise offering on‑site maintenance for local banks and small businesses. Vivian also hopes to volunteer her expertise at the
    nearby community college’s vocational program, helping to shape the next generation of repair professionals, while maintaining a balanced workload that supports her health and personal life.
