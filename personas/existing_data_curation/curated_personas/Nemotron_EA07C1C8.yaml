personas:
  professional: Alberto Perez, a budding operations coordinator‑in‑training, leverages their knack for spreadsheets, bilingual communication, and disciplined schedule‑keeping to excel in supply‑chain coursework
    and internships, approaching every logistical challenge with the same strategic precision they use in competitive video games.
  sports: Alberto Perez, a dedicated weightlifter, hits the local gym five times a week to log PRs on bench press and deadlift, never misses a weekend Liga MX match or LA Galaxy game, and they regularly
    join friends for pick‑up soccer in the community youth league, treating both strength training and football as arenas for competitive improvement.
  arts: Alberto Perez spends weekends fine‑tuning scale model car kits while blasting Metallica’s guitar riffs and Bad Bunny’s verses, and they unwind by binge‑watching Guillermo del Toro’s latest films,
    merging mechanical precision with a taste for high‑energy music and cinematic storytelling.
  travel: Alberto Perez, a meticulous planner, budgets each trip with a spreadsheet and prefers short drives to cultural hotspots like San Diego’s Gaslamp Quarter, while dreaming of a solo pilgrimage to
    Tokyo for the Summer of Anime convention and a future Southwest road trip to explore the Grand Canyon, and they meticulously map out itineraries to balance adventure with cost control.
  culinary: Alberto Perez showcases their culinary curiosity by hand‑wrapping tamales in fresh corn husks and simmering a rich mole featuring ancho chilies, chocolate, and mulato peppers, while perfecting
    pozole broth with pork shoulder and hominy, and they often experiment by adding smoked paprika to elevate the flavors.
  core: Alberto Perez is a disciplined strategist who treats life like a high‑stakes game, juggling spreadsheets, lifts, and gaming marathons, yet they frequently sacrifice sleep and can be overly skeptical
    of others’ motives.
background:
  cultural: Alberto grew up in a Mexican‑American household in Fontana, San Bernardino County, the son of immigrants from Jalisco who arrived in the United States seeking better opportunities. At home,
    Spanish is spoken daily, and family gatherings revolve around traditional celebrations such as Día de los Muertos, quinceañeras, and festive meals featuring tacos al pastor, pozole, and tamales. The
    vibrant Latino community in Fontana—marked by neighborhood soccer leagues, the annual Fiesta del Sol, and strong church ties—has shaped his social life and reinforced cultural values of family loyalty,
    respect for elders, and a solid work ethic. He navigates a bicultural identity, blending Mexican heritage with the broader Southern California Chicano experience, which influences his bilingual communication
    style, culinary interests, and community‑focused ambitions.
attributes:
  skills: '[''time management'', ''project planning'', ''budgeting'', ''inventory control'', ''basic accounting'', ''data analysis'', ''Excel'', ''Google Sheets'', ''mechanical troubleshooting'', ''bilingual
