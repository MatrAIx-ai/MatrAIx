  hobbies: '[''competitive video gaming (Valorant, League of Legends)'', ''weightlifting and strength training'', ''building scale model cars'', ''DIY electronics kits'', ''watching soccer (Liga MX, LA
    Galaxy)'', ''cooking Mexican dishes'', ''reading personal-development books'', ''listening to productivity podcasts'']'
  career_goals: Alberto aims to complete his associate's degree in business administration within the next year and obtain a certification such as the APICS CPIM to solidify his knowledge of supply chain
    and operations management. He envisions starting his career as an operations coordinator or supply‑chain analyst at a manufacturing or logistics firm in the Inland Empire, where he can apply his organizational
    and analytical strengths. Over the next five years he hopes to advance to a supervisory role, leading a small team and optimizing workflow processes. In the long term, he dreams of leveraging his bilingual
    skills and community ties to launch a boutique consulting service that helps local Latino-owned businesses improve inventory management and financial planning.
