personas:
  professional: John Braselman, a 32‑year‑old security‑and‑fire‑alarm installer, merges relentless curiosity with a down‑to‑earth respect for code, reads blueprints like storyboards, trains junior techs
    with patient precision, and they are charting a path toward NICET Level III and eventually running their own smart‑home automation firm.
  sports: John Braselman spends weekends paddling a kayak on Lake Harris, fishing for bass, and throwing fastballs in a local softball league; they cheer loudly for the Tampa Bay Buccaneers in the NFL,
    follow the Orlando Magic in the NBA, and support the Tampa Bay Rays in MLB, while maintaining a casual fitness routine at the Lake County Recreation Center.
  arts: John Braselman picks up his acoustic guitar at neighborhood barbecues to play John Mayer and The Eagles, attends live shows at Orlando's Dr. Phillips Center featuring bands like The Everglade Strummers,
    and they enjoy watching indie films at the Enzian Theater, letting music and cinema color their social gatherings.
  travel: John Braselman prefers low‑key road trips that mix nature and music, has explored the Florida Keys and Everglades by car, spent a weekend in Nashville hunting live songwriting sessions, dreams
    of a tech‑focused tour of Tokyo’s Akihabara district, and they plan a future hike through Patagonia’s Torres del Paine when finances allow.
  culinary: John Braselman loves firing up his backyard grill for smoked ribs, blackened grouper tacos, and key lime pie; they experiment with homemade chipotle marinades, pair meals with craft beers from
    Florida breweries, and occasionally over‑salt their dishes when multitasking on a DIY project.
  core: John Braselman’s blend of tech‑savvy tinkering, community‑centered social energy, and occasional gadget‑shopping splurges defines a practical yet curious approach to life; they constantly balance
    new ideas with grounded responsibilities.
background:
  cultural: John is a White American of mixed European ancestry (German, Irish, and English) raised in Central Florida. Growing up in a middle‑class, suburban environment, he embraced values of hard work,
    self‑reliance, and community service. He celebrates traditional American holidays such as Thanksgiving and the Fourth of July and maintains ties to his local Southern Baptist church, where he participates
    in community outreach. The multicultural tapestry of Florida has shaped his open, sociable demeanor, while his Southern‑floridian upbringing instilled a blend of practicality and curiosity that guides
    both his professional and personal life.
attributes:
  skills: '["Security system installation", "Fire alarm system installation", "Low‑voltage electrical wiring", "System troubleshooting and diagnostics", "Blueprint and schematic interpretation", "NFPA 72
    and local code compliance", "Customer service and communication", "Project scheduling and coordination", "Basic networking for security devices", "Team leadership and training"]'
  hobbies: '["Fishing on Lake Harris", "Weekend softball league", "DIY home automation projects", "Playing acoustic guitar", "Attending live music events", "Kayaking and paddleboarding", "Volunteer work
    with neighborhood watch", "Barbecue gatherings with friends and family", "Exploring local nature trails", "Watching NFL games"]'
  career_goals: John aims to earn a NICET Level III certification and become a master technician within the next three years. He hopes to advance to a supervisory or operations manager role at his current
    firm, overseeing larger commercial projects and mentoring apprentices. Long‑term, he plans to launch his own locally‑owned security and fire‑alarm installation business in Lake County, expanding services
    to include smart‑home automation and integrated IoT solutions. He also intends to complete an associate degree in electrical technology to broaden his technical expertise and support his entrepreneurial
    goals while providing a stable future for his family.
