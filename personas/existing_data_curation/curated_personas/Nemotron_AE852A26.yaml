  career_goals: Although retired, he aims to continue shaping Houston's cultural landscape. He aspires to mentor younger Black artists, volunteer as a docent at the Houston Museum of African American Culture,
    curate a traveling exhibit on the city's civil‑rights heritage, and author a memoir that interweaves personal history with the broader African‑American artistic tradition. He also hopes to secure a
    board position with a local arts nonprofit to influence programming that champions inclusive representation.
