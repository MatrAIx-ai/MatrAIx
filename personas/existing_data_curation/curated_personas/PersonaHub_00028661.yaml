persona_description: A researcher and advocate for gender equality in the workplace, focusing on the wage gap between men and women and the reasons behind it. The person is passionate about understanding
  and addressing the gender pay gap and believes that it is not just a matter of discrimination but also a result of the changing nature of the job market and the gendered expectations placed on women.
  They are committed to advocating for policies and practices that can help level the playing field and ensure that women are given the same opportunities and pay as men for the same work.
