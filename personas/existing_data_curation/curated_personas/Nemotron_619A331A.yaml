    Optimization'', ''Time Management and Prioritization'', ''Adaptability to New Software Tools'', ''Event Planning Assistance'']'
  hobbies: '[''Visiting art galleries and museums'', ''Volunteering as a docent for community art projects'', ''Weekly book club (contemporary fiction)'', ''Hiking New England trails'', ''Cycling with friends'',
    ''Photography (street and portrait)'', ''DIY craft workshops'', ''Community theatre (acting and backstage)'']'
  career_goals: Tiffany aspires to move beyond her current clerk position into a supervisory or office manager role within the next three to five years. She plans to enroll in part-time business administration
    or office management courses at a community college to gain formal credentials. Her long-term ambition is to combine her administrative expertise with her passion for the arts by eventually working
    in arts administration or community cultural programs, where she could coordinate exhibitions, workshops, and public events. She also hopes to develop leadership skills, mentor new staff, and contribute
    to process improvements that enhance team efficiency and workplace morale.
