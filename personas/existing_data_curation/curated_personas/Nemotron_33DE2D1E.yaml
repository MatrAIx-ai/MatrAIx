personas:
  professional: Holly Harding, a 57‑year‑old aspiring community arts coordinator, leverages their hands‑on event‑planning expertise, basic graphic‑design skills, and an inquisitive yet competitively driven
    mindset to design meticulously organized yet adaptable art exhibitions and workshops that draw on both local tradition and unconventional artistic ideas.
  sports: Holly Harding stays fit through low‑impact bird‑watching walks, thrice‑weekly salsa dancing classes that double as cardio, supports the Houston Astros in spring, the Houston Texans in fall, and
    the Houston Rockets in winter, and belongs to the Galveston Bay Walking Club, which meets Saturday mornings for socially engaging exercise.
  arts: Holly Harding immerses themselves in the regional art scene by attending Galveston festivals, drawing inspiration from Georgia O’Keeffe’s bold palettes and Frida Kahlo’s intimate storytelling, curating
    local watercolorist Maya Delgado’s prints for community shows, and drawing creative energy from Bob Dylan’s folk riffs while painting, all fueled by a curious yet competitively spirited drive to stand
    out.
  travel: Holly Harding prefers purposeful, budget‑conscious travel that marries artistic inspiration with culinary curiosity, having explored Austin’s street‑art murals, New Orleans’ jazz‑filled gallery
    tours, Oaxaca’s traditional mole kitchens, and dreaming of a weekend pilgrimage to Paris’s Musée d’Orsay, all while balancing wanderlust with the need to fund community art projects and senior‑center
    volunteer commitments.
  culinary: Holly Harding showcases culinary daring by entering bake‑offs with inventive fusion dishes like kimchi‑infused brisket sliders, heirloom tomato and ricotta galettes, and jalapeño cheddar cornbread,
    expertly balancing soy sauce, smoked paprika, and honey in a signature Tex‑Korean BBQ glaze, while maintaining a meticulous plating style that mirrors their artistic precision.
  core: Holly Harding, a 57‑year‑old art‑driven dynamo, channels curiosity, competitive spirit, and a healthy dose of worry into a vibrant life of painting, cooking, community theater, and relentless advocacy
    for accessible creativity.
background:
  cultural: Holly is a third‑generation Korean‑American who was raised in the Southern Texas town of Clute. While she identifies culturally as white, her family maintained several Korean traditions, such
    as celebrating Chuseok, preparing kimchi during holidays, and occasional Korean language lessons. Growing up in a predominantly Anglo‑American community, she also embraced Southern hospitality, church
    involvement (she sings in the local Baptist choir), and the regional love of BBQ and community festivals. This blend of Korean heritage and Texas upbringing informs her appreciation for diverse artistic
    expressions, her communal spirit, and her respect for both individual achievement and collective celebration.
attributes:
  skills: '["Community event coordination", "Arts curation and exhibition planning", "Volunteer management", "Budgeting and small‑scale bookkeeping", "Microsoft Office proficiency", "Basic graphic design
    (Canva)", "Social media management", "Digital photography", "Culinary arts (baking and competitive cooking)", "DIY home improvement", "Gardening"]'
  hobbies: '["Watercolor and acrylic painting", "Visiting art festivals and galleries", "Community theater participation", "Competitive cooking and baking", "Fusion culinary experimentation (Texan‑Korean)",
    "Reading mystery and art‑history books", "Book club membership", "Salsa dancing classes", "Gardening (heirloom tomatoes, native wildflowers)", "Bird‑watching", "Volunteering at senior center art programs"]'
  career_goals: Holly intends to transform her extensive volunteer background into a formal position as a community arts coordinator or museum docent in the Brazoria County area. She aims to design and
    lead affordable art‑making workshops for seniors, youth, and low‑income families, and to launch a modest home‑based boutique selling her own prints, hand‑crafted ceramics, and curated works by local
    artists. Over the next 12‑18 months, she plans to enroll in a certificate program in arts administration at a nearby community college, develop an online platform for virtual art classes, and seek a
    part‑time role that allows her to blend her love of art, teaching, and community engagement while maintaining flexibility for personal projects.
