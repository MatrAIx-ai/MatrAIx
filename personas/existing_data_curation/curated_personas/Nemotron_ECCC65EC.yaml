    acting'',''knitting'']'
  career_goals: Brianna aims to transition from a miscellaneous agricultural worker to a full‑time community‑farm manager for a nonprofit in the Indianapolis region. She envisions creating an agritourism
    and educational hub that blends sustainable farming with arts‑based programming—think farm‑to‑table cooking classes, storytelling circles, and seasonal art workshops. To support this, she plans to pursue
    a master’s degree in environmental studies or public policy, focus on grant acquisition, and eventually lead a cooperative that empowers small‑scale producers while fostering local food security and
    cultural enrichment.
