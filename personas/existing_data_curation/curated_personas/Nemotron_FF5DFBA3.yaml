personas:
  professional: Caitlin Figueiredo, a veteran classroom support specialist with three decades of experience, leverages her methodical organization and calm demeanor to streamline lesson materials, champion
    inclusive practices, mentor upcoming paraprofessionals, and prepare for a part‑time teaching role while pursuing a certified paraprofessional credential.
  sports: Caitlin Figueiredo, an avid walker who follows the Altoona Curve in baseball season and the Pittsburgh Steelers in the fall, joins the local senior walking club for weekly hikes along the Allegheny
    foothills, and occasionally participates in gentle yoga classes at the community center to maintain flexibility.
  arts: Caitlin Figueiredo, a bridge club regular and choir enthusiast, finds inspiration in the folk ballads of Joan Baez, the historical novels of Ken Follett, the vibrant quilts of Faith Ringgold, and
    the piano concerts of Lang Lang, often humming along while stitching new patterns for her quilts.
  travel: Caitlin Figueiredo, who prefers thoughtfully planned trips over spontaneous getaways, enjoys relaxed river cruises on the Danube, weekend road trips to the Laurel Highlands, and annual visits
    to the Azores to reconnect with family recipes, balancing a love of nature with budget‑conscious planning.
  culinary: Caitlin Figueiredo, a confident home cook, delights in preparing bacalhau à Brás, caldo verde, and pastéis de nata using olive oil, smoked paprika, and fresh chard, while also creating hearty
    ratatouille from garden vegetables, though she occasionally forgets to set the timer for her beloved caramel flan.
  core: Caitlin Figueiredo, a structured yet warm‑hearted lifelong learner, blends meticulous organization with a love of quilting, birdwatching, and community service, while juggling a tendency to over‑schedule
    her weeks and occasionally neglect her own downtime.
background:
  cultural: Caitlin's family traces its roots to the Azores islands of Portugal, where Portuguese language, Catholic faith, and festive community traditions were central to daily life. Her grandparents
    emigrated to the United States in the 1950s, settling in western Pennsylvania, where they blended their heritage with the region's strong Irish and German cultural influences. Growing up in Altoona,
    Caitlin was raised in a bilingual household that celebrated both Portuguese festas—marked by music, dance, and seafood dishes—and the local Pennsylvania customs such as community fairs and church gatherings.
    This cultural mosaic instilled in her a deep appreciation for family cohesion, community service, and the value of education as a pathway to opportunity.
attributes:
  skills: '["Classroom management support", "Individualized student assistance", "Lesson planning assistance", "Curriculum alignment", "Special education coordination", "Behavioral intervention techniques",
    "Educational technology integration", "Record‑keeping and data reporting", "Parent‑teacher communication", "Conflict resolution and mediation"]'
  hobbies: '["Gardening", "Reading historical fiction and memoirs", "Quilting and knitting", "Walking local trails", "Volunteering at a senior center", "Church choir participation", "Cooking traditional
    Portuguese meals", "Bridge club", "Birdwatching", "Photography of local flora"]'
  career_goals: Caitlin aims to formalize her extensive experience by obtaining a certified paraprofessional credential, which will enable her to mentor new teaching assistants and lead professional development
    workshops on inclusive classroom practices. She also hopes to launch a community‑based adult literacy program in Altoona, leveraging her organizational strengths to create structured curricula for senior
    learners. While she anticipates transitioning to a part‑time teaching role before full retirement, she remains committed to volunteering as a tutor for local seniors and documenting her educational
    insights in a blog that blends practical advice with reflections on lifelong learning.
