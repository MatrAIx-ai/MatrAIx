  hobbies: '[''abstract watercolor painting'', ''community‑theatre improv'', ''reading speculative fiction'', ''exploring food festivals'', ''knitting circle'', ''senior dance troupe'', ''board‑game nights'',
    ''storytelling at Juneteenth celebrations'']'
  career_goals: Genelle aims to shift from daily call handling to a mentorship and training role within the next two years, developing a curriculum on culturally aware customer service for new hires. She
    plans to earn a Certified Customer Service Professional (CCSP) credential, lead quarterly workshops for her team, and launch an online blog/podcast that blends storytelling with practical customer‑experience
    tips. While she intends to retire from full‑time work by age 70, she hopes to continue consulting part‑time and possibly sell her artwork through a small e‑commerce shop, turning her creative passions
    into a modest supplemental income.
