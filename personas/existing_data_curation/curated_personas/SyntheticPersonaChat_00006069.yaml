    User 2: I love Tolkien! I''ve read all of his books.

    User 1: Me too! I''m a big fan of his work.

    User 2: Do you like any other authors?

    User 1: I like George R.R. Martin, Stephen King, and Terry Pratchett.

    User 2: I love George R.R. Martin! I''m a big fan of the "A Song of Ice and Fire" series.

    User 1: Me too! I''m so excited for the new book to come out.

    User 2: Me too! I can''t wait to see what happens next.

    User 1: So, what do you like to do for fun besides reading?

    User 2: I like to go out with friends, go to the gym, and exercise.

    User 1: I like to go out with friends too, but I''m not very athletic. I just like to go for walks and swim.

    User 2: That sounds like a good way to stay healthy.

    User 1: It is! I like to keep active.

    User 2: Me too! I think it''s important to take care of your body.

    User 1: I agree! I''m glad we have so much in common.

    User 2: Me too! I think we''re going to be good friends.'
