personas:
  professional: Linda Davis is an aspiring teen programmer who builds small Python projects like a weather-tracking app, applying the same disciplined, strategic mindset honed from solo chess to methodically
    debug code and meet their high standards.
  sports: Linda Davis enjoys solo weekend hiking with the Mountain Explorers Youth Hiking Club, competes in their high school's cross-country team, and follows the New York Yankees and the Seattle Seahawks
    for casual sports updates.
  arts: Linda Davis expresses creativity through nature photography inspired by Ansel Adams, curates a digital portfolio of botanical shots, and unwinds listening to Brian Eno's ambient albums while editing
    their images.
  travel: Linda Davis prefers meticulously planned short trips to nearby state parks such as Acadia National Park for hiking and photography, and they dream of a future expedition to the Galápagos Islands
    while balancing a limited teen budget with parental permission.
  culinary: Linda Davis favors simple, nutritious meals like quinoa bowls with roasted sweet potatoes, kale, and lemon-tahini dressing, enjoys experimenting with fresh herbs such as rosemary and cilantro,
    and they occasionally indulge in homemade cinnamon oatmeal for breakfast.
  core: Linda Davis is a quietly driven teen who blends strategic chess thinking with disciplined curiosity for science and nature, thriving in solitude and consistently setting high personal standards,
    and they pursue knowledge with relentless focus.
