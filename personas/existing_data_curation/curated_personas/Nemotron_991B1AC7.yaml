  hobbies: '[''Golf'', ''Hiking'', ''Cooking soul food'', ''Jazz and blues listening'', ''Reading biographies'', ''Volunteering at legal clinics'', ''Attending cultural festivals'', ''Church community events'',
    ''Photography'']'
  career_goals: Derwin aims to advance to senior partnership within his firm or pursue a judicial appointment, reflecting his desire for greater influence in the legal community. He is also planning to
    launch a boutique practice focused on estate planning and real‑estate transactions for affluent Westchester clients, leveraging his expertise in structured, predictable legal matters. A core ambition
    is to increase representation of Black attorneys by mentoring emerging lawyers, contributing to pro‑bono initiatives, and serving on diversity committees within the bar association.
