persona_description: A musician who is interested in the history and mechanics of musical instruments, particularly those that use water as a medium for sound production. They are fascinated by the complex
  mechanisms and innovations that led to the creation of the hydraulis and other water organs, and they are particularly drawn to the way in which the water in the tank regulated the air pressure and the
  flow of air through the pipes. They are also curious about the social and cultural context in which these instruments were used, and they are interested in learning more about the musical traditions and
  performances that were associated with them.
