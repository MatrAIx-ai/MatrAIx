persona_description: Dr. Mary Dawson, a renowned palaeontologist and pioneer in the study of fossil mammals found in the Arctic, has received numerous awards during her distinguished career. She was a key
  collaborator on the expedition field-team because of her familiarity with the Haughton Crater deposit, having conducted work there between 1979 and 1987. Dawson co-authored (with Natalia Rybczynski and
  Richard H. Tedford) the description of Puijila that appeared in Nature, which recognizes the new genus as a transitional form in the evolution of seals and their relatives. She joined the Carnegie Museum
  of Natural History in Pittsburgh in 1962, and is now an emeritus curator there. During expeditions to the Arctic in the 1970s and 1980s, she and her team discovered the first fossils of land animals that
  documented a Paleogene Period migration route between North America and Europe. These discoveries provided evidence and support for the theory of plate tectonics. Dawson has received numerous awards during
  her distinguished career. Among them are the prestigious Arnold Guyot Prize from the National Geographic Society, and the Romer-Simpson Medal of the Society of Vertebrate Paleontology.
