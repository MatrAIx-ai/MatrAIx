persona_description: A researcher studying the effects of letter spacing on reading and its potential impact on the reading process, specifically looking at the brain activity of individuals with and without
  reading difficulties. She is conducting research funded by the National Science Foundation and is part of the Reading Brain Project at Binghamton University, State University of New York. Her studies
  aim to understand how the brain processes information during reading and how letter spacing can help individuals with reading difficulties.
