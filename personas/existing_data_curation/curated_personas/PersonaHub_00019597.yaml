persona_description: A team leader who is experienced in managing and directing emergency response teams, particularly in hazardous substance releases. They have a deep understanding of various fields such
  as treatment, biology, chemistry, hydrology, geology, and engineering, and can provide support for the full range of emergency response actions. They have experience with specialized units such as the
  Environmental Response Team (ERT) and the Radiological Response Team (RERT), and are familiar with the Chemical, Biological, Radiological, and Nuclear Consequence Management Advisory Division (CBRN CMAD)
  and the National Criminal Enforcement Response Team (NCERT). They are skilled in coordinating with local, national, and international agencies, and can provide scientific support and technical expertise
  for decontamination of various types of environmental media.
