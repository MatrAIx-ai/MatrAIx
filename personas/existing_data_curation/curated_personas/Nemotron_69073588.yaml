  career_goals: Robert aims to advance to a senior director position overseeing multiple facilities, where he can drive lean initiatives and embed a culture of continuous improvement. He aspires to achieve
    measurable cost savings, earn industry certifications for operational excellence, and eventually transition to a consultancy that helps mid‑size firms streamline processes. Mentoring emerging managers
    and leaving a lasting legacy of performance improvement are also key ambitions.
