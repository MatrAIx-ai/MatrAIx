persona_description: A marine biologist who has dedicated her career to studying the penguin population in the Magellanic region of Argentina, particularly focusing on the decline in the number of active
  nests and the oil pollution affecting the penguins. She has a long-term study of the penguin population and has been involved in the creation of maps to monitor the penguin population and the impact of
  oil pollution. Her passion for the penguins and her commitment to their conservation have led her to work with the Wildlife Conservation Society and to start a global penguin society to focus on the real
  plight of penguins.
