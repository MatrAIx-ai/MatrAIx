  hobbies: '[''Comic drawing'', ''LEGO building'', ''Reading science‑fiction and mystery books'', ''Playing chess'', ''Junior Scratch coding'', ''Soccer practice'', ''Nature walks and leaf collecting'']'
  career_goals: Darrick dreams of a future where he can blend his love for art, technology, and systematic problem solving. He imagines becoming an architect who designs bold, sustainable structures that
    challenge conventional ideas, or a video‑game developer who creates immersive worlds that encourage players to think outside the box. His competitive drive and curiosity about uncovering truth also
    fuel an ambition to work as a forensic scientist or a detective, solving mysteries with careful analysis. Occasionally, he talks about wanting to be an astronaut, seeing space exploration as the ultimate
    arena for unconventional thinking. Overall, his goal is to pursue a career that lets him create, explore, and apply his analytical mind to real‑world challenges.
