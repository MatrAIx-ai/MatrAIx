personas:
  professional: Sharon Bardales is an on‑site surveillance officer who leverages their education background to train new staff in precise safety protocols, and they excel at CCTV monitoring, risk assessment,
    and crafting step‑by‑step procedural guides while maintaining calm under pressure and eyeing a supervisory role within five years.
  sports: Sharon Bardales enjoys solitary weekend hikes at Rothrock State Forest, is a loyal fan of the Philadelphia Eagles and the Penn State Nittany Lions, maintains fitness through a membership at the
    local climbing gym, complements physical activity with online chess as mental cardio, joins a casual intramural ultimate Frisbee league each spring, and they relish the occasional group hike with a
    small circle of trusted friends.
  arts: Sharon Bardales immerses themselves in mystery literature, revisiting Agatha Christie, Gillian Flynn, and true‑crime podcasts like My Favorite Murder while honing nature photography inspired by
    Ansel Adams, knitting scarves to the tunes of classical composer Philip Glass, attending occasional local gallery openings featuring minimalist art, and they often annotate book passages with detailed
    diagrams of investigative patterns.
  travel: Sharon Bardales prefers meticulously planned solo trips that balance photography opportunities with quiet reflection, having trekked the misty cliffs of the Blue Ridge Mountains, explored the
    historic streets of Edinburgh for its literary heritage, dreaming of a future Icelandic road trip to capture aurora‑lit landscapes while keeping expenses low, and they meticulously budget each itinerary
    to avoid financial stress.
  culinary: Sharon Bardales favors precise, health‑focused cooking, often preparing quinoa‑and‑roasted‑vegetable bowls seasoned with rosemary and lemon zest, mastering the art of perfectly timed boiled
    eggs, occasionally treating themselves to a slice of New York‑style pepperoni pizza after a long night of puzzle‑solving, and they keep a handwritten inventory of pantry staples to maintain order in
    the kitchen.
  core: Sharon Bardales is a methodical lone‑wolf who blends a love for order, mystery, and meticulous detail into both their surveillance career and quiet hobbies, while they occasionally let an impulse
    for new camera gear override budget prudence.
background:
  cultural: Sharon was raised in a middle-class suburban community in central Pennsylvania, where family gatherings, church involvement, and community volunteering were regular parts of life. Her white
    ethnic heritage blends the broader Mid-Atlantic cultural traditions of modesty, self-reliance, and an appreciation for punctuality and hard work. Growing up near the Penn State University campus exposed
    her to an academic environment that valued education and civic responsibility, influences that guided her decision to pursue a bachelor's degree in education. These cultural foundations reinforce her
    preference for orderly, cooperative settings and a commitment to contributing positively to the safety and well-being of her community.
attributes:
  skills: '[''CCTV surveillance operation'', ''Incident documentation'', ''Risk assessment'', ''Conflict de-escalation'', ''Training and instructional design'', ''Procedural compliance'', ''Basic first
    aid'', ''Time management'', ''Computer security software (e.g., Lenel, Avigilon)'', ''Report writing'']'
  hobbies: '[''Reading mystery and true-crime books'', ''Journaling'', ''Nature photography'', ''Hiking on local trails'', ''Solving logic puzzles'', ''Online chess'', ''Knitting'']'
  career_goals: Sharon aims to advance from on-site surveillance to a supervisory role in security operations within the next three to five years. She plans to obtain professional certifications such as
    the Certified Protection Professional (CPP) and the Certified Surveillance Officer (CSO), and eventually transition into security consulting or training, leveraging her education degree to develop curriculum
    for law enforcement and private security personnel. Long-term, she envisions a leadership position that allows her to shape safety policy, ensure a harmonious environment for patrons and employees,
    and contribute to community outreach programs focused on crime prevention.
