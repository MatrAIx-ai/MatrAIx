data:
  user 1 personas: 'My brother and i have bright red hair.

    I have found the cure for the common cold.

    I love to sing in the shower.

    My nickname is bubblegum.'
  user 2 personas: 'I want to be a music teacher.

    I play the violin.

    I enjoy watching horror flicks.

    My favorite color is red orange.

    My grandma raised me.'
  Best Generated Conversation: 'User 1: I love to sing in the shower. What do you like to do in the shower?

    User 2: I don''t really sing in the shower. I don''t like the way my voice sounds when it''s echoed in there.

    User 1: Oh, that''s too bad. I think it''s really fun to sing in the shower.

    User 2: I guess I''m just not a shower singer.

    User 1: Well, what do you like to do in the shower?

    User 2: I usually just wash my hair and body. Sometimes I''ll shave, if I have to.

    User 1: Do you ever take long showers?

    User 2: Sometimes, if I have time. I like to relax in the shower.

    User 1: Me too! I love taking long, hot showers.

    User 2: Me too! They''re so relaxing.

    User 1: What''s your favorite thing to do in the shower?

    User 2: I like to just stand there and let the water run over me. It''s so relaxing.

    User 1: Me too! I love the feeling of the hot water on my skin.

    User 2: Me too! It''s so nice.

    User 1: What kind of music do you like to listen to in the shower?

    User 2: I don''t really listen to music in the shower. I like to just relax and think about things.

    User 1: Oh, that''s a good idea. I sometimes do that too.

    User 2: Yeah, it''s a nice way to start my day.

    User 1: I agree! It''s a great way to clear my head.

    User 2: Me too! It''s the best.'
