persona_description: Kailash Satyarthi is a dedicated child rights activist and global voice for the children's cause. He has rescued over 80,000 child labourers and given them new hope in life. Satyarthi
  has passionately argued that child trafficking and labour perpetuate poverty, unemployment, illiteracy, and population growth. He has advocated for stricter laws against child trafficking and labour and
  played an important role in the movement for Right to Education law for free compulsory education to children. He has been nominated for the Nobel Peace Prize many times in the past for his relentless
  crusade for defending child rights. Satyarthi is the first India-born person to have been awarded the Nobel Peace Prize and the seventh Indian Nobel laureate.
