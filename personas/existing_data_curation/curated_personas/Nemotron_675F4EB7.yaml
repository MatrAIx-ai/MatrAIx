  career_goals: Kena dreams of turning her love for games and coding into a career as a video game developer. She envisions designing interactive experiences that challenge players while offering creative
    storytelling, drawing on her competitive spirit and structured problem‑solving approach. To pursue this, she plans to attend a STEM‑focused high school, participate in coding camps, and eventually study
    computer science in college. At the same time, her deep empathy for animals has sparked an interest in veterinary science, so she keeps open the possibility of studying biology or veterinary medicine
    later on. In the short term, she aims to win her school’s robotics competition and earn a spot in a summer coding program.
