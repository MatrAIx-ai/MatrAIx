personas:
  professional: A budding game developer, Kena Boys blends a love for Fortnite and Minecraft with early coding experiments in Scratch, channeling competitive instincts into designing small interactive experiences
    while juggling schoolwork with a penchant for structured learning.
  sports: A dedicated youth soccer player, Kena Boys practices twice weekly with the local Thunderhawks club, cheers loudly for Manchester United in the evenings, and balances competitive drive on the field
    with a love for spontaneous pickup games at the neighborhood park.
  arts: A creative digital artist, Kena Boys spends evenings sketching on Procreate, drawing inspiration from the whimsical worlds of Harry Potter and the fantasy art of Studio Ghibli, while also practicing
    piano pieces by Yiruma and listening to the soundtrack of The Legend of Zelda to fuel creative flow.
  travel: An adventurous explorer of local nature, Kena Boys often hikes the winding trails of Greenridge Park with friends, dreams of visiting the towering redwoods of California and the bustling streets
    of Tokyo for anime conventions, and prefers impulsive day trips over meticulously planned vacations.
  culinary: A budding home chef, Kena Boys loves whipping up quick mac and cheese with extra cheese, experimenting with sushi rolls using cucumber and avocado after watching cooking videos, and treats themselves
    to pepperoni pizza after a long gaming session.
  core: Kena Boys is a competitively spirited, anxiety‑prone 12‑year‑old who balances structured gaming and coding with spontaneous art and nature outings, often juggling a chaotic schedule with bursts
    of intense focus.
background:
  cultural: Kena is a white American growing up in Sparks Glencoe, a suburban community in Baltimore County, Maryland. Her family reflects middle‑class values common in the region, emphasizing education,
    community involvement, and participation in local traditions. She celebrates typical American holidays such as Thanksgiving and the Fourth of July and takes part in community sports leagues and school
    events. The proximity to larger cities like Baltimore and Washington, D.C., exposes her to a blend of suburban and urban cultural influences, while her school district offers a mix of academic rigor
    and extracurricular opportunities that shape her worldview.
