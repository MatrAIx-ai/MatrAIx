  career_goals: Joseph is fascinated by how things work and imagines a future where he designs his own video games or builds robots for competitions. He hopes to win a regional science‑fair with a simple
    autonomous robot and eventually become a software developer or robotics engineer who creates tools that solve real‑world problems. He also entertains the idea of becoming an esports competitor if his
    gaming skills keep improving.
