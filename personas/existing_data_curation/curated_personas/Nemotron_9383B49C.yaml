personas:
  professional: Maria Sine, a seasoned metal and plastic fabricator with deep CNC, MIG/TIG welding, and injection‑molding expertise, blends a problem‑solving mindset with artistic curiosity to design and
    prototype bespoke metal art, while aiming for AWS certification and a future welding‑inspector supervisory role.
  sports: Maria Sine, an avid solo hiker of Utah’s red‑rock trails and member of the local Utah Hikers Association, enjoys weekend trail runs in Zion National Park, follows the Utah Jazz and Real Salt Lake,
    and occasionally joins a community climbing gym for bouldering sessions to maintain strength for welding projects.
  arts: Maria Sine, who attends the Utah Shakespeare Festival and frequents local art shows, draws inspiration from indie folk artists like Iron & Wine and Bon Iver while sketching desert vistas, and cites
    visual influences such as Georgia O'Keeffe’s desert paintings and Banksy’s street art in her metal sculpture creations.
  travel: Maria Sine, who prefers off‑season, self‑planned road trips, has explored Arches, Bryce, and Canyonlands National Parks, dreams of photographing the stone ruins of Matera, Italy, and occasionally
    escapes to Sedona, Arizona for a creative retreat that fuels her metal‑art designs.
  culinary: Maria Sine, a competent home cook with a penchant for southwestern flavors, enjoys preparing green chile stew, cactus salad, and grilled fish tacos, often incorporating prickly pear and roasted
    mesquite‑smoked salt into dishes while experimenting with watercolor‑inspired plating techniques.
  core: Maria Sine fuses a hands‑on welding career with a love for desert hikes, spontaneous sketching, and metal art, balancing a relaxed, sometimes disorganized financial style with a competitive drive
    to mentor apprentices and launch a bespoke fabrication side business.
background:
  cultural: Maria grew up in a white, middle‑class family in Cedar City, Utah, where the legacy of the iron mining industry and the close‑knit small‑town ethos shaped her values. The region’s mix of Mormon
    and broader Western American cultural influences fostered a sense of self‑reliance, respect for the outdoors, and an appreciation for community events like the Utah Shakespeare Festival. Her family's
    generational ties to the area—often involving ranching and industrial work—instilled a practical, hands‑on approach to problem‑solving. At the same time, Cedar City’s vibrant arts scene and proximity
    to national parks nurtured her curiosity for art and nature, blending a pragmatic work ethic with a love for creative expression.
attributes:
  skills: '[''CNC machining'', ''MIG welding'', ''TIG welding'', ''Metal fabrication'', ''Plastic injection molding'', ''Technical drawing interpretation'', ''G-code programming'', ''Equipment maintenance'',
