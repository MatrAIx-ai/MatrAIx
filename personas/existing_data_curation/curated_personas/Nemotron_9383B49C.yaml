  hobbies: '[''Hiking in red rock canyons'', ''Landscape photography'', ''Watercolor painting'', ''Metal jewelry making'', ''Small metal sculpture crafting'', ''Attending Utah Shakespeare Festival'', ''Reading
    historical fiction'', ''Listening to indie folk music'', ''Volunteering at community makerspace'']'
  career_goals: Maria aims to earn her Certified Welder (AWS) credential and eventually become a welding inspector, positioning herself for a supervisory role in her plant. She wants to lead a small team
    focused on prototype development, combining her technical know‑how with her artistic vision to create custom metal art for local events like the Utah Shakespeare Festival. Over the next five years,
    she hopes to launch a side business offering bespoke metal and plastic fixtures, leveraging her fabrication skills and design sensibility. Additionally, Maria aspires to mentor younger apprentices,
    sharing her curiosity‑driven approach and encouraging innovative thinking on the shop floor.
