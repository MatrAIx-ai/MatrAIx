personas:
  professional: William Lee is an aspiring junior engineer who spends hours assembling LEGO machines and detailed vehicle models, catalogues toy cars by color and make, and approaches each build with the
    same disciplined routine they apply to school chores, showcasing their methodical and competitive nature.
  sports: William Lee plays for the Staten Island Youth Soccer Club’s U‑7 team, admires the New York Red Bulls as their professional soccer role model, and practices dribbling drills every Saturday at the
    local park, balancing a competitive drive with a love for clear rules and teamwork that they eagerly showcase.
  arts: William Lee delights in constructing intricate LEGO cities, drawing precise blueprints of imagined inventions, and winding down with episodes of “Thomas the Tank Engine” and songs by The Wiggles,
    demonstrating how structured creative play shapes their artistic identity and they often share their creations with friends.
  travel: William Lee prefers structured family vacations, fondly recalling a meticulously planned trip to Disney World in Orlando and weekend getaways to Long Island’s beachside boardwalk, while dreaming
    of future journeys to explore historic castles in Ireland and the ancient towns of Italy, reflecting their desire for organized itineraries and cultural discovery and they eagerly map out each detail.
  culinary: William Lee loves the comforting flavors of pepperoni pizza, spaghetti with meatballs, and mac and cheese, enjoys helping stir tomato sauce for homemade pasta, and frequently snacks on apple
    slices with peanut butter, showing a preference for familiar, hearty foods and a budding interest in simple kitchen tasks they love to help with.
  core: William Lee is a methodical six‑year‑old LEGO architect with a competitive streak, a meticulous toy‑car cataloguing habit, and a strong preference for routine that makes even playtime feel like
    a well‑scheduled project they eagerly follow.
background:
  cultural: William lives in a middle‑class white family on Staten Island, New York. His parents are second‑generation Irish‑American and Italian‑American, and the household blends those traditions—celebrating
    holidays like St. Patrick’s Day and Italian Christmas Eve meals—while primarily following mainstream American customs. The suburban neighborhood reinforces values of routine, practicality, and community
    involvement, shaping his worldview.
