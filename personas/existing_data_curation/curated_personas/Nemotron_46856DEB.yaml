  career_goals: William is drawn to future roles that offer clear rules, tangible results, and the ability to shape structured environments. He often talks about becoming a builder, civil engineer, or police
    officer because these jobs let him create order, solve practical problems, and see the impact of his work. He also dreams of designing his own LEGO city, reflecting an ambition to plan and construct
    organized spaces.
