  career_goals: Lizvette dreams of becoming a kindergarten teacher who helps children learn to read and sing, and also imagines herself as a dancer who performs traditional Puerto Rican dances at community
    festivals. She wants to be a helpful adult who organizes fun, structured activities for kids in Bayamón, blending a stable caring role with creative expression.
