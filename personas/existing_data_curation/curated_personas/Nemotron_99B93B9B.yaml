personas:
  professional: Lizvette Martinez, a four-year-old budding constructor, spends hours arranging Lego bricks into precise towers, demonstrating an early knack for spatial planning while they occasionally
    scatter the pieces in a burst of spontaneous creativity.
  sports: Lizvette Martinez, a four-year-old member of the Tiny Tigers Kids Soccer Club, practices kicking the ball in the backyard after preschool, idolizes the local professional team the City Hawks,
    and they eagerly count down to Saturday's mini-league games.
  arts: Lizvette Martinez, a four-year-old who adores drawing dinosaurs with vibrant crayons and singing along to the songs of "Frozen" and "Sesame Street," often stages impromptu performances for her stuffed
    audience, and they weave structured storylines into their playful sketches.
  travel: Lizvette Martinez, a four-year-old who has visited the nearby aquarium and the family's summer cabin on Lake Serenity, now dreams of a grand adventure to Disney World's Magic Kingdom, and they
    prefer trips with clear itineraries and frequent snack breaks.
  culinary: Lizvette Martinez, a four-year-old who delights in scooping bite-sized mac and cheese and dipping carrot sticks into ranch, loves helping her caregiver whisk together chocolate chip cookie dough,
    yet they stubbornly refuse broccoli, showcasing a selective palate with enthusiastic kitchen participation.
  core: Lizvette Martinez, a four-year-old who balances a love for orderly play with sudden bursts of playful chaos, they keep a tiny stash of stickers for spontaneous trades and insist on bedtime stories
    before any snack.
background:
  cultural: Lizvette is raised in a bilingual Puerto Rican household in Bayamón, San Juan. Spanish is spoken at home while English is introduced at preschool, giving her a mixed linguistic environment.
    She participates in family traditions such as parranda during Christmas, enjoys the festive atmosphere of the San Sebastián Street Festival, and learns traditional dances and songs from her grandparents.
    The close-knit extended family and community-oriented culture shape her values of cooperation, respect for elders, and pride in Puerto Rican heritage.
