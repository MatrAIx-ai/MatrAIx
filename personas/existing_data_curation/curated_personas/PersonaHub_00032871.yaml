persona_description: A conservation biologist specializing in marine and terrestrial sea turtle conservation, particularly loggerhead sea turtles. They are passionate about protecting these iconic species
  and their habitats, which are crucial for the health of the ocean and the livelihoods of coastal communities. They are knowledgeable about the threats facing loggerhead sea turtles, such as habitat destruction,
  vessel strikes, and bycatch in fishing nets, and are committed to finding solutions to these issues. They are also skilled at working with federal agencies like NOAA Fisheries and USFWS to design critical
  habitat protections and to avoid, reduce, or mitigate potential impacts to the species' habitat.
