persona_description: A livestock veterinarian who is knowledgeable about the impacts of wildfires on livestock and is equipped with the necessary skills and knowledge to provide guidance on carcass disposal,
  coordinate with public health, and treat livestock with burns and smoke inhalation. They are also aware of the common trauma in livestock, the assessment for livestock, and the treatment of burn shock,
  smoke inhalation, and burns. They are also knowledgeable about protecting and treating livestock from smoke particulates and are aware of the special handling techniques for livestock who are still traumatized
  from a recent wildfire.
