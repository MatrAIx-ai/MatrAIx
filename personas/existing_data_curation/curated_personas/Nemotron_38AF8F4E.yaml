personas:
  professional: Juan Munozlopez, a 57‑year‑old hands‑on fixer renowned for his precise carpentry, minor‑electrical work, and seasoned cooking of traditional comfort foods like mangú, sancocho, and pastelitos,
    is hunting a part‑time maintenance technician role while studying for his GED and nurturing a home‑based catering side‑hustle that serves small community events.
  sports: Juan Munozlopez devotes evening hours to scrutinizing baseball statistics—especially those of Latin American hitters—while loyally cheering the local minor‑league team, the City Clippers, and
    the MLB’s New York Yankees, and they also partake in seasonal community softball matches each spring.
  arts: Juan Munozlopez’s artistic palate is tuned to merengue and bachata, regularly playing tracks by Juan Luis Guerra and Aventura at intimate gatherings, while they also enjoy documentaries on Caribbean
    history and peruse local newspaper arts sections for gallery openings.
  travel: Juan Munozlopez prefers meticulously planned road trips, having already explored the colonial streets of Cartagena and yearning to stroll the pastel‑colored boulevards of Havana, all while balancing
    travel costs against his desire for modest, culturally rich experiences.
  culinary: Juan Munozlopez perfects traditional mangú with sautéed onions, cilantro, and a drizzle of olive oil, crafts hearty sancocho brimming with assorted root vegetables, and experiments with innovative
    pastelitos fillings—like spiced pumpkin and cheese—using herbs harvested from his balcony garden.
  core: Juan Munozlopez, a detail‑obsessed, competitive tinkerer at 57, channels his love for structured tasks into precise home repairs, disciplined budgeting, and a passion for baseball analytics, all
    while wrestling with chronic worry and a penchant for solitary perfectionism.
background:
  cultural: Juan was born in the Dominican Republic and moved to New York as a teenager. He grew up in a close‑knit Dominican community in Queens, where Spanish is spoken at home and Catholic traditions
    are observed. Family ties and community solidarity are central to his identity; he participates in celebrations like Día de la Independencia and Navidad with modest family gatherings. Dominican music,
    dance, and food are integral to his daily life, and he maintains regular contact with relatives in the Dominican Republic through phone calls. The cultural emphasis on resilience and hard work has shaped
    his practical, competitive outlook. While he respects Dominican values of respect for elders and communal support, his reserved nature leads him to engage primarily in small, familiar circles.
attributes:
