  career_goals: At 64, Vania’s primary professional goal is to maintain a stable, supportive work environment that allows her to continue contributing her expertise while safeguarding her health and retirement
    plans. She aspires to transition into a part‑time or flexible schedule role, possibly as a senior customer service advisor or mentor, where she can train new hires and share her best‑practice approaches.
    She also hopes to secure a modest raise or benefit improvements that support her long‑term financial security, and eventually shift to a volunteer‑based community outreach position that leverages her
    communication skills to assist senior citizens in navigating public services.
