  career_goals: Virginia frequently expresses a desire to help people when she grows up. She talks about becoming a teacher who can guide other children, a nurse who cares for sick people, or a community
    helper who keeps everyone happy. Her ambitions are rooted in her compassion and love for harmony, and she dreams of a future where she can make a positive difference.
