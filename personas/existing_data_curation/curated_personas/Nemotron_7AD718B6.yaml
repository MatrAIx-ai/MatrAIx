  hobbies: '[''Fishing'', ''Hunting'', ''Camping'', ''Watching Houston Rockets games'', ''Attending Astros games'', ''Barbecue cooking'', ''Pickup basketball'', ''Classic car restoration'', ''Volunteering
    with Habitat for Humanity'']'
  career_goals: Trey aims to advance to a senior equipment supervisor role, obtain advanced certifications such as the Certified Equipment Trainer (CET) and a Commercial Driver’s License with a wide‑load
    endorsement, and eventually launch his own equipment‑rental and servicing business. He plans to complete his GED and pursue coursework in construction management to transition into a site supervisor
    or project manager position within five years. Maintaining an exemplary safety record and mentoring younger operators are key drivers of his ambition.
