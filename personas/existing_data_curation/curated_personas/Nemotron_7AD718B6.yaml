personas:
  professional: Trey Cases, a seasoned heavy‑equipment operator with OSHA 10 certification, leverages their practical curiosity and methodical planning to manage excavators, backhoes, and crane attachments
    while mentoring crews, interpreting blueprints, and driving safety‑first project execution; they consistently prioritize safety and crew communication.
  sports: Trey Cases, a devoted follower of the Houston Rockets and Astros who never misses a home game, plays pickup basketball with the West University Community Basketball Club, supports the Texas Longhorns
    football team, and spends hunting seasons in the Hill Country as a sport; they also coach junior players at the local park on weekends.
  arts: Trey Cases, who unwinds after a day on the construction site by listening to classic Texas blues and country—favoring Willie Nelson, ZZ Top, and the soulful crooning of Leon Bridges—frequently visits
    the Houston Museum of Fine Arts' outdoor sculpture garden and collects vintage automotive posters; they also enjoy watching local theater productions when time permits.
  travel: Trey Cases, who prefers road‑trip adventures over luxury getaways, plans weekend escapes to fishing spots on Galveston Bay, a family cabin in the Texas Hill Country, and an annual pilgrimage to
    the historic Route 66 towns of Oklahoma; they balance their wanderlust with a budget that prioritizes gasoline and camping gear.
  culinary: Trey Cases, a self‑taught pitmaster, loves slow‑smoking brisket with mesquite wood, perfecting a signature rub of black pepper, garlic, and brown sugar, and often pairs their Texas‑style chili
    con carne with locally sourced jalapeños; they also host weekly BBQ gatherings for friends, while occasionally over‑indulging in a second slice of pecan pie at neighborhood cook‑outs.
  core: Trey Cases blends a pragmatic work ethic with a lively love for Texas outdoors, classic cars, and community, navigating life's challenges with organized curiosity, a dash of stubbornness, and a
    penchant for smoky BBQ; they rarely miss a chance to fire up the grill.
background:
  cultural: Trey grew up in a working‑class White Texas family in the Greater Houston area, absorbing a blend of Southern hospitality, self‑reliance, and the multicultural vibrancy of the city. His identity
    is shaped by the blue‑collar construction culture that values hard work, practicality, and camaraderie. Family ties, community involvement, and an appreciation for the outdoors were emphasized in his
    upbringing, while exposure to Houston’s diverse population fostered his outgoing, sociable nature and openness to new ideas.
attributes:
  skills: '[''Excavator operation'', ''Backhoe operation'', ''Bulldozer operation'', ''Crane attachment operation'', ''OSHA safety compliance'', ''Equipment maintenance'', ''Mechanical troubleshooting'',
