personas:
  professional: Jade Shirley, a budding mini-architect, spends afternoons arranging LEGO bricks by color and shape, meticulously planning each tower’s layout before building, which reflects their balance
    of curiosity and practicality, organized method, and they display an early knack for spatial reasoning.
  sports: Jade Shirley, an enthusiastic member of the Little Tigers preschool soccer club who loves dribbling a soft ball in the fall league, also attends a weekday gymnastics class where they practice
    balance beams, cheers loudly for the New York Yankees during family TV nights, and approaches fitness with boundless energy on the playground while occasionally needing reminders to hydrate after running.
  arts: Jade Shirley, a creative four-year-old who spends evenings drawing bright dinosaurs with crayon sets, sings along to Raffi's Baby Beluga and The Wiggles' Fruit Salad, attends a local storytime where
    they act out characters from Dr. Seuss books, and lets their imagination guide their art, even if they sometimes stubbornly refuse to share their favorite coloring pencils.
  travel: Jade Shirley, an adventurous preschooler who loves weekend trips to the nearby zoo, eagerly packs their favorite stuffed rabbit for a family vacation to the beach town of Santa Cruz, dreams of
    visiting Disneyland someday, prefers itineraries that include a playground stop, yet they can become fussy if the car ride exceeds an hour without a snack break.
  culinary: Jade Shirley, a budding little chef who can butter toast and sprinkle shredded cheddar on mac and cheese, delights in eating banana slices with a drizzle of honey, insists on helping stir the
    pancake batter while humming a nursery rhyme, and despite their love for crunchy carrots, they occasionally throw a tantrum when presented with broccoli.
  core: Jade Shirley blends a tiny architect’s love for order with a four-year-old’s boundless curiosity, methodically counting coins, meticulously building LEGO towers, and they occasionally demand extra
    bedtime stories when faced with a tough puzzle.
background:
  cultural: Jade grew up in the suburban community of Elkridge, Maryland, part of Howard County’s middle‑class American lifestyle while having access to diverse cultural experiences. Her family celebrates
    common U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July with community events, parades, and backyard barbecues. She attends a local preschool where children from various backgrounds
    learn together, exposing her to a variety of languages and traditions. The nearby library, parks, and seasonal festivals provide a sense of community involvement. Though her ancestry is European‑American
    (e.g., English, Irish, German), Jade’s daily life reflects the multicultural fabric of the Maryland region, subtly shaping her worldview while rooting her in mainstream American customs.
