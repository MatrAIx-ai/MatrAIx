  career_goals: Although only four, Jade loves to imagine her future. She often says she wants to be a teacher who organizes lesson materials and helps friends learn, a veterinarian who cares for animals
    with a gentle, practical approach, an astronaut exploring the stars while bringing back new ideas, or a librarian who keeps books neatly arranged and shares stories with other children. These dreams
    reflect her curiosity, love of order, and desire to support others.
