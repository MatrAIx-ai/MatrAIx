personas:
  professional: Danielle King is a seasoned carpenter with fifteen years of hands‑on experience in framing, finish work, and custom furniture design, who leverages meticulous cost estimation, rigorous safety
    protocols, and a growing expertise in reclaimed‑lumber projects to mentor apprentices and lay the groundwork for an eco‑friendly contracting firm, while they balance a pragmatic, methodical workflow
    with a competitive drive to break into a traditionally male trade.
  sports: Danielle King competes on a local women's softball league, hikes the Laurel Highlands on weekends, supports the Pittsburgh Steelers and Penguins, participates in a community 5K run benefiting
    Habitat for Humanity, and keeps a modest jogging routine at a nearby gym to stay fit.
  arts: Danielle King is an avid reader of mystery and thriller novels, citing Agatha Christie and Gillian Flynn as favorites, attends the annual community folk‑music festival where they enjoy performances
    by the local bluegrass band The Riverbound Ramblers, and regularly visits the Pittsburgh Symphony Orchestra’s seasonal concerts for a touch of classical culture.
  travel: Danielle King has explored historic Philadelphia, trekked a section of the Appalachian Trail in the Laurel Highlands, spent a weekend in New York City catching a Broadway show, dreams of a cabin
    retreat in the Adirondack Mountains, and hopes to one day wander the Scottish Highlands, all while balancing travel costs with a tight family budget.
  culinary: Danielle King loves crafting hearty comfort meals such as chicken pot pie, beef stew, and homemade apple crisp, often incorporating fresh vegetables from their garden, enjoys baking sourdough
    bread on weekends, and treats themselves to a craft IPA from a local brewery after completing a demanding project.
  core: Danielle King blends a resilient, community‑focused work ethic with a competitive edge, juggling carpentry mastery, financial caution, health management, and a love for softball, mystery novels,
    and garden‑fresh cooking while they constantly wrestle with stress and a skeptical eye toward new opportunities.
background:
  cultural: Danielle grew up in Monessen, Pennsylvania, a tight‑knit, working‑class town shaped by the legacy of the steel industry. Her family traces its roots to German and Irish immigrants who settled
    in the region in the early 20th century, bringing a strong ethic of hard work, self‑reliance, and community support. Raised in a modest, primarily Catholic household, she absorbed values of modesty,
    responsibility, and respect for craft. The economic shifts that impacted Western Pennsylvania instilled in her a resilient, practical outlook. As a woman entering a traditionally male trade, Danielle
    balances the progressive drive to break barriers with the enduring, down‑to‑earth culture of her hometown, emphasizing both personal achievement and contributions to the local community.
attributes:
  skills: '["Framing", "Finish Carpentry", "Custom Furniture Design", "Blueprint Reading", "Cost Estimation", "Project Scheduling", "Inventory Management", "Safety Compliance", "Team Leadership", "Mentoring
