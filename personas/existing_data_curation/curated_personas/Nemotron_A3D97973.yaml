  hobbies: '["Softball League", "Habitat for Humanity Volunteering", "Hiking", "Woodworking Projects", "Gardening", "Reading Mystery Novels", "Community Festivals", "Book Club", "Yoga"]'
  career_goals: Danielle aims to transition from employee to entrepreneur by establishing her own small contracting firm that specializes in high‑quality, eco‑friendly residential projects. Over the next
    five years she plans to obtain a state‑licensed trade contractor certification and earn the Master Carpenter designation, positioning herself as a benchmark of craftsmanship in western Pennsylvania.
    She is driven to expand her business’s capacity, hire and train a crew that includes more women in the trade, and take an active leadership role in the local carpenters’ union. Strategically, Danielle
    seeks to differentiate her company through a reputation for meticulous project management, innovative use of reclaimed materials, and a client‑service ethos that blends practicality with personalized
    design.
