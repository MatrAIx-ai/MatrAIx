persona_description: A astronomer who is part of a team responsible for compiling a catalog of galaxies using data from various sources and observing them with different telescopes. The astronomer has experience
  in compiling existing data, obtaining new data, and revising the original catalog. The team's intention is to restrict the revision of the original catalog and to obtain comparable data for both hemispheres.
  The astronomer has expertise in using plate material to compile data on redshifts, morphological types, and photoelectric magnitudes, and has upgraded the types based on large-scale reflector plates from
  the later Las Campanas survey. The astronomer's work is intended as an aid in planning observing programs based on knowledge of types as it existed in 1979.
