  career_goals: At her current stage, Violeta’s primary ambition is to learn, explore, and build a strong foundation for later education. Her parents envision her becoming bilingual and using her natural
    curiosity to help her community, perhaps someday as a teacher, health worker, or cultural liaison. In the near term, her goals focus on mastering walking, speaking her first words, and safely navigating
    her environment.
