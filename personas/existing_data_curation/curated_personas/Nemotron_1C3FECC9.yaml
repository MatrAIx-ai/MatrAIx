personas:
  professional: An inquisitive infant with a knack for orderly play, Violeta Pua already shows early signs of engineering curiosity by dismantling plastic toy blocks and methodically reassembling them,
    and they balance their practical need for routine with a willingness to explore new configurations.
  sports: A budding aquatic explorer, Violeta Pua attends a weekly parent‑and‑baby swim class at the community pool, where they splash enthusiastically alongside peers, and they cheer on the local soccer
    team, City FC, during family game nights, showing early enthusiasm for both water play and team sports.
  arts: A sensory‑oriented little art lover, Violeta Pua delights in finger‑painting with non‑toxic Crayola paints, especially bright reds and yellows, and they calm down listening to lullabies by Brahms
    and upbeat tunes from Disney's "Frozen" soundtrack, weaving music into their daily routine.
  travel: A tiny globe‑trotter, Violeta Pua has already experienced a family beach getaway to Santa Monica and a weekend picnic at Yellowstone National Park, and they dream of seeing the Eiffel Tower and
    hearing the bells of Big Ben on future family vacations.
  culinary: A budding gourmand, Violeta Pua prefers smooth pureed sweet potatoes, avocado, and banana mash, enjoys occasional bites of soft cheese, and they eagerly dip their fingers into finger foods shaped
    like tiny stars, showing a budding adventurous palate while occasionally rejecting broccoli.
  core: Violeta Pua, a one‑year‑old with a calm curiosity and a penchant for orderly play, balances exploratory chewing of coins with soothing lullabies, quietly shaping an early love of routine and discovery.
background:
  cultural: Violeta was born to Cuban‑American parents in Hialeah, a vibrant Cuban enclave within Miami‑Dade County. Her home life is bilingual, with Spanish spoken by family members and English used in
    school and community settings. She is immersed in Cuban traditions such as celebrating Carnaval, sharing family meals of arroz con pollo and pastelitos, and listening to classic Cuban radio and salsa.
    The close‑knit extended family and community emphasis on respect, harmony, and cooperation shape her gentle and considerate temperament.
