  hobbies: '["Gardening", "Cooking traditional Puerto Rican dishes", "Reading historical novels and biographies", "Listening to salsa and bolero music", "Walking in local parks", "Attending senior center
    cultural gatherings", "Knitting and crochet", "Storytelling at community events"]'
  career_goals: Although retired, Yolanda remains driven by a desire to safeguard her cultural heritage and pass it on to future generations. She aims to compile a memoir of her life spanning Puerto Rico,
    migration, and long‑term residence in Massachusetts, emphasizing the resilience of her community. She wishes to mentor younger members of the local senior center in cooking, gardening, and storytelling,
    fostering intergenerational connections. Maintaining her health and independence is a personal ambition, so she seeks to stay active through regular walks and light exercise. Ultimately, she hopes to
    see her family and neighbors continue to celebrate Puerto Rican traditions within the New England context.
