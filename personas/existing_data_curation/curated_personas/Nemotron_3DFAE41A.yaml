personas:
  professional: Yolanda Sotomayor, a retired community storyteller and seasoned home gardener, channels their lifelong practical skills and bilingual fluency into mentoring younger seniors at the local
    center, where their relaxed, curiosity‑driven approach yields hands‑on workshops in cooking, gardening, and oral history preservation.
  sports: Yolanda Sotomayor joins the senior walking club for gentle strolls through the nearby Boston Common, plays weekly shuffleboard at the community center, and passionately roots for the Boston Red
    Sox and the New England Patriots, balancing a competitive spirit with a laid‑back approach to fitness.
  arts: Yolanda Sotomayor delights in salsa, bolero, and classic Caribbean rhythms, often playing recordings of Celia Cruz, Tito Puente, and Marc Anthony while knitting, and reads historical fiction like
    Ken Follett’s "Pillars of the Earth" and biographies of Maya Angelou, using these artistic threads to stitch together their own oral histories.
  travel: Yolanda Sotomayor’s travel catalog includes nostalgic trips to the island of their youth in the 1960s, relaxed cruises to the Caribbean, weekend escapes to Martha’s Vineyard, and a bucket‑list
    yearning to wander the historic streets of Seville, each journey planned leisurely around their garden schedule and family visits.
  culinary: Yolanda Sotomayor transforms fresh garden tomatoes, herbs, and chilies into traditional arroz con gandules, succulent lechón, and rustic pastelón, while experimenting with a pinch of smoked
    paprika and a dash of miso to modernize the flavors, and they relish sharing their signature guava‑infused rum cake at senior center potlucks.
  core: Yolanda Sotomayor, a 90‑year‑old garden‑loving, recipe‑crafting storyteller, balances a competitive zest for perfecting heritage dishes with a laid‑back, slightly disorganized routine that keeps
    them perpetually curious and emotionally stable.
background:
  cultural: Yolanda was born and raised in Puerto Rico, where family, Catholic traditions, and vibrant community celebrations shaped her early life. She immigrated to the mainland United States in her early
    twenties, eventually settling in Longmeadow, Massachusetts. While she embraces the New England lifestyle—enjoying autumn foliage and local festivals—her identity remains deeply rooted in Puerto Rican
    culture. She celebrates holidays such as La Navidad and Día de los Reyes, prepares traditional foods, and maintains a Spanish‑language household with her children and grandchildren. Her cultural background
    informs her values of family cohesion, respect for elders, and the importance of preserving oral history. Through participation in local cultural clubs and senior center events, she bridges her Caribbean
    heritage with the regional community, nurturing a sense of belonging for both herself and others.
