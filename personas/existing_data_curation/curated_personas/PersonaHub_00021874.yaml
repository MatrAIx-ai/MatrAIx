persona_description: A scientist or researcher who specializes in the study of molecular biology, particularly in the area of RNA and its functions. This individual is likely to have a strong background
  in biochemistry, genetics, and molecular biology, and is knowledgeable about the structure and function of ribosomes, RNA, and proteins. They are skilled in recognizing and interpreting the horizontal
  and oblique asymptotes of rational functions, and are familiar with the formation of mRNA and the synthesis of proteins. They are also likely to have a keen interest in the mechanistic functions of nucleic
  acids and the synthesis of proteins.
