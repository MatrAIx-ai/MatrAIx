personas:
  professional: Keri Putman, a veteran insurance advisor with three decades of risk assessment and regulatory expertise, blends their methodical, detail‑oriented style with a warm, compassionate approach
    that makes clients feel heard while embracing the occasional flexible, low‑stress rhythm of their practice.
  sports: Keri Putman enjoys low‑impact fitness through daily walks with the Milford Senior Walking Club, cheering on the Boston Red Sox in the summer and the New England Patriots in the fall, while avoiding
    high‑intensity sports that strain their knees.
  arts: Keri Putman weaves their love of quilting into evenings with fellow crafters, while finding escapism in historical fiction by Ken Follett and the soothing folk tunes of James Taylor, and occasionally
    attends local gallery shows featuring works reminiscent of Winslow Homer.
  travel: Keri Putman prefers relaxed, self‑planned road trips along the New England coast, such as visits to Acadia National Park and the historic streets of Charleston, while occasionally dreaming of
    a cultural pilgrimage to St. Andrews, Scotland, when their budget and family schedule allow.
  culinary: Keri Putman enjoys cooking classic New England fare—such as creamy clam chowder, baked cod with fresh thyme, and warm blueberry cobbler—using vegetables from their own garden like heirloom tomatoes
    and crisp lettuce, reflecting a competent yet comfort‑driven culinary style.
  core: Keri Putman, a compassionate insurance veteran with a green thumb and a habit of misplacing their reading glasses while never missing a weekly quilting circle, embodies a blend of practical wisdom
    and gentle, slightly forgetful charm.
background:
  cultural: Keri was raised in a multi‑generational New England family with deep roots in rural New Hampshire. Her upbringing emphasized self‑reliance, community service, and modesty—values often associated
    with the historic Yankee culture of the region. She maintains active ties to her local Anglican church and participates in town events, reflecting a strong sense of place and a commitment to mutual
    support that informs both her professional ethos and personal life.
attributes:
  skills: '[''Insurance underwriting'', ''Policy analysis'', ''Customer relationship management'', ''Risk assessment'', ''Sales negotiation'', ''Community outreach'', ''Regulatory compliance'', ''Financial
    planning'', ''Conflict resolution'', ''Public speaking'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Quilting'', ''Reading historical fiction'', ''Hiking'', ''Bridge (card game)'', ''Cooking New England cuisine'']'
  career_goals: Keri aims to deepen her role as a trusted advisor in her community, focusing on educating seniors about affordable protection options and helping new agents develop compassionate sales techniques.
    She plans to mentor a small cohort of junior colleagues, create a quarterly workshop series on financial literacy for local residents, and eventually transition to a part‑time consultancy that supports
    rural homeowners with specialized insurance products while maintaining a balanced, flexible schedule for family and personal pursuits.
