persona_description: A research team of American engineers who specialize in seismic analysis and earthquake-proofing buildings. They are working on a six-storey, lightweight steel-frame building to test
  its performance during and after a tremor, using advanced technology such as drones and temperature probes. Their goal is to better understand how cold-formed steel structures withstand earthquakes and
  the fires that might follow, and to validate computer models of structural response.
