  career_goals: Dillon imagines a future where he designs and builds organized, helpful things for his community. He is drawn to careers such as civil engineering or elementary teaching, both of which combine
    his love for structure, problem‑solving, and helping others. He hopes to one day mentor younger children, create safe play spaces, and use his skills to make daily life more predictable and supportive
