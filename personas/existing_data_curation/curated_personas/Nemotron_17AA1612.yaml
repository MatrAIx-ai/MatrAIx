personas:
  professional: Dillon Pham is a budding robotics enthusiast who channels their methodical, organized nature into assembling simple line-following robots at school, applying the same step-by-step precision
    they relish when building LEGO sets and solving jigsaw puzzles.
  sports: Dillon Pham is a reliable member of the Greenfield Lions school soccer squad, practicing twice weekly with the disciplined routine they cherish, cheering passionately for Manchester United during
    televised matches, and occasionally joining weekend community basketball pick-ups to diversify their fitness regimen.
  arts: Dillon Pham is an avid reader of J.K. Rowling's Harry Potter and Rick Riordan's Percy Jackson series, whose vivid narratives fuel the imaginative comic strips they sketch in a spiral-bound sketchbook,
    while channeling the rhythmic energy of Imagine Dragons into the colorful block designs they construct in Minecraft.
  travel: Dillon Pham approaches travel with a meticulous itinerary, delighting in family road trips to Yosemite National Park and Washington, D.C., where they document wildlife and monuments in a pocket
    journal, while dreaming of a future organized tour of the Tower of London to explore its historic intrigue.
  culinary: Dillon Pham is a budding kitchen helper who can confidently assemble a DIY pizza topped with pepperoni, black olives, and mozzarella, enjoys slurping spaghetti with meatballs on Fridays, and
    savors strawberry-banana smoothies made with fresh berries and almond milk, though they sometimes over-season their pancakes in a burst of enthusiasm.
  core: Dillon Pham is a detail-obsessed 10-year-old whose love for perfectly aligned LEGO bricks juxtaposes a nervous heart that flutters at the slightest uncertainty, prompting midnight puzzle marathons
    and occasional guilty-pleasure snack binges when anxiety spikes.
background:
  cultural: Dillon grows up in Jonesboro, a suburban community in Fayette County, Georgia, within a predominantly white, Southern‑American cultural setting. His family participates in local traditions such
    as church gatherings at a nearby Baptist congregation, county fairs, and community sports events. Southern hospitality, politeness, and a strong sense of neighborly support are emphasized at home and
    school. He enjoys regional foods like biscuits, fried chicken, and peach cobbler, and shares in the local enthusiasm for high school football and outdoor activities. These cultural cues reinforce his
    cooperative nature and desire for structured, harmonious environments.
