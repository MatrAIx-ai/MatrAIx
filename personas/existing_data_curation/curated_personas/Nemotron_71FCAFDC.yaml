  career_goals: Gabriel aims to complete his bachelor's degree in Business Administration within the next two years and obtain a Project Management Professional (PMP) certification. He envisions a career
    as a project coordinator or logistics analyst in a government agency or private firm, where he can apply his methodical approach to streamline operations and support community development projects.
    Long‑term, he hopes to lead initiatives that promote sustainable tourism and economic growth in his hometown of Toa Baja, leveraging his cultural roots and organizational expertise.
