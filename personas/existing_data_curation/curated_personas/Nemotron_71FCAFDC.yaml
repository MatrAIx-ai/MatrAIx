personas:
  professional: Gabriel Reyes, a 21-year-old business administration student, leverages their meticulous organizational skills, bilingual fluency, and volunteer‑honed problem‑solving to thrive as a budding
    project coordinator who meticulously plans events and streamlines logistics for community initiatives.
  sports: Gabriel Reyes spends weekends on the sand courts of Isla Verde playing beach volleyball, catches waves at the surf breaks of Rincón, and cheers for the Cangrejeros de Santurce while casually following
    the NBA’s Miami Heat for their high‑tempo style.
  arts: Gabriel Reyes unwinds by listening to salsa legends like Marc Anthony and reggaeton hits from Bad Bunny, attends occasional live performances at the Teatro Tapia, and draws inspiration from personal‑development
    authors such as Brené Brown to fuel their creative side.
  travel: Gabriel Reyes prefers short, budget‑friendly getaways that blend surf and cultural immersion, having explored the beaches of Puerto Plata in the Dominican Republic and the historic streets of
    Cartagena, while dreaming of a future backpacking trek through the hiking trails of the Andes in Peru.
  culinary: Gabriel Reyes loves to recreate traditional Puerto Rican flavors at home, mastering arroz con gandules with sofrito and adobo‑spiced alcapurrias, while experimenting with mango‑chili salsa as
    a fresh twist for their weekend meals.
  core: Gabriel Reyes, a methodical 21‑year‑old with a surf‑tanned grin, balances spreadsheets and surfboards, stays organized while occasionally binge‑reading self‑help books, and can’t resist a late‑night
    alcapurrias craving.
background:
  cultural: Gabriel is a proud Puerto Rican raised in Toa Baja, a coastal municipality known for its fishing heritage and lively festivals. His upbringing reflects the island's blend of Spanish, African,
    and Taino influences, evident in his family's close‑knit relationships, Catholic traditions, and love for music and dance. Bilingual in Spanish and English, he navigates both island and mainland cultures
    fluently. Community celebrations such as the fiestas patronales, Noche de San Juan, and local culinary customs have shaped his identity, fostering a deep respect for family, collective harmony, and
    the vibrant spirit of Puerto Rican life.
