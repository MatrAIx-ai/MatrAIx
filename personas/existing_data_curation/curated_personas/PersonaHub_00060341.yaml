persona_description: A geographer and environmental scientist who specializes in the use of Geographic Information Systems (GIS) for linking satellite and field survey data. They are familiar with the Countryside
  Survey 1990 project, its data collection methods, and the application of GIS in environmental monitoring and assessment. They have a deep understanding of land use patterns, changes, and effects on ecology,
  and have experience in analyzing spatial data to estimate changes between survey dates. They are proficient in using GIS to compare data collected from both field survey and satellite imagery, and have
  a keen interest in the historical development of the ITE Land Classification and the use of GIS in ecological land classification.
