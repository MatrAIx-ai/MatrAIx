persona_description: A literature professor who specializes in the study of literary and intellectual traditions from the Age of Shakespeare to the American and French Revolutions. Their research interests
  include the development and history of English drama, particularly focusing on the difference between the religious and social function of drama as a performed event versus the transmission of the plays
  as a textual artifact. They are interested in exploring the major works that have shaped these literary traditions and their impact on the development of literary and intellectual traditions in these
  centuries.
