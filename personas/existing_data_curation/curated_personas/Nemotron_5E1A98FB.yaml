  hobbies: '["Listening to R&B, gospel, and hip‑hop music", "Crocheting and knitting handmade items", "Walking or jogging in local parks", "Playing basketball at neighborhood courts", "Watching TV shows
    and movies (family comedies)", "Attending church choir rehearsals", "Cooking and sharing meals with family/friends", "Volunteering at food drives and community potlucks"]'
  career_goals: Hafeeza aims to obtain her GED within the next year, then pursue certification as a Certified Nursing Assistant (CNA) or Home Health Aide to work in health care, providing direct support
    to elders and individuals with disabilities. She also hopes to continue volunteering at a community center, eventually leading youth mentorship programs. Long‑term, she envisions a stable, routine‑driven
    career in a healthcare or social service setting that lets her maintain close ties to her family and community, while possibly studying part‑time for an associate degree in health sciences or social
    work.
