  career_goals: Cesareo aims to transition into a senior leadership role—such as Director of Engineering or Chief Technology Officer—within the next five years, focusing on building resilient, scalable
    platforms that support both enterprise and community‑focused projects. He plans to obtain advanced certifications (AWS Solutions Architect Professional, Certified Scrum Trainer) and to mentor emerging
    talent, especially those from underrepresented Hispanic backgrounds. In the longer term, he envisions launching a consultancy that provides technology solutions to small businesses in the Guatemalan
    diaspora, while also authoring a technical handbook on reliable micro‑service architecture.
