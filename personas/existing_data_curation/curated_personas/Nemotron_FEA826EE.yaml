  hobbies: '[''Fishing (walleye and bass)'', ''Woodworking and DIY projects'', ''Deer hunting'', ''Gardening (vegetable garden)'', ''Restoring a classic pickup truck'', ''Attending church fellowship events'',
    ''Volunteering at community gatherings'', ''Reading trade magazines and western novels'', ''Hiking in Iowa state parks'', ''Playing disc golf'']'
  career_goals: Approaching retirement age, Cameron aims to earn a Master Plumber/Steamfitter certification and transition from full‑time employment to running a modest independent contracting business
    that serves Iowa County and neighboring towns. He wants to specialize in energy‑efficient retrofits for older homes, build a small, trusted crew, and establish a steady client base that offers both
    routine work and occasional project variety. Mentoring the next generation of tradespeople is a personal ambition, as is creating a reliable part‑time consulting role that preserves his hands‑on involvement
    while allowing a flexible schedule for personal pursuits.
