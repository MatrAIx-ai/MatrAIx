personas:
  professional: Cameron Smith, a veteran plumber‑steamfitter with over thirty years of hands‑on expertise, blends a routine‑driven work ethic with spontaneous problem‑solving to deliver reliable installations,
    emergency repairs, and hands‑on mentorship while building a boutique energy‑efficient retrofitting contracting business, and they prioritize practical, on‑site solutions over theoretical designs.
  sports: Cameron Smith participates in a local disc‑golf league with the Clear Creek Disc Golf Club, follows the Iowa Hawkeyes football team and the Iowa Cubs baseball club, and supplements those interests
    with seasonal trout fishing on the Iowa River and quarterly deer hunts, keeping physically active through weekend hikes and light weight‑training, and they relish the mix of competition and camaraderie.
  arts: Cameron Smith enjoys winding down after a day on the job with classic western novels such as Larry McMurtry’s *Lonesome Dove*, tunes from country icons like Willie Nelson and Johnny Cash, passes
    time flipping through *Plumbing & Mechanical Magazine*, and occasionally attends the local theater’s production of *Oklahoma!* with their church fellowship group, and they find these cultural moments
    a soothing counterpoint to the day's labor.
  travel: Cameron Smith favors low‑key, budget‑friendly road trips that blend spontaneous detours to Iowa state parks like Backbone Geological Area with longer pilgrimages to national treasures such as
    Yellowstone and Badlands, and they usually plan most outings around work breaks and family obligations while dreaming of a future drive along Canada’s Icefields Parkway.
  culinary: Cameron Smith, an adept home cook, often grills fresh Iowa River trout, roasts heirloom tomatoes and sweet corn from their garden into a hearty corn‑chowder, and perfects smoked venison stew
    using a blend of garlic, rosemary, and juniper berries, while they occasionally treat friends to classic Midwestern comfort foods like pork‑tenderloin and apple pie.
  core: Cameron Smith is a pragmatic, routine‑loving plumber‑steamfitter who quietly rebels with impromptu road trips, a hobbyist’s penchant for vintage pickups, and a tendency to delay routine health check‑ups
    in favor of hands‑on projects, and they keep their schedule surprisingly fluid.
background:
  cultural: Cameron grew up in a small‑town, middle‑class white family in Iowa, steeped in the Midwestern values of modesty, self‑reliance, and neighborly cooperation. Raised in a Methodist household, his
    upbringing emphasized hard work, humility, and service to the community. The region's agricultural heritage, county fairs, and outdoor recreation fostered his love of fishing, hunting, and seasonal
    festivals. He remains tightly linked to his local community, often volunteering at the fire department, participating in the annual county fair, and maintaining long‑standing friendships built on shared
    traditions and practical support.
attributes:
  skills: '[''Residential plumbing installation'', ''Commercial pipefitting'', ''Steam system maintenance'', ''Welding and pipe fabrication'', ''Blueprint reading'', ''Code compliance'', ''Hydraulic system
