persona_description: 'A Finnish music teacher who experimented with the use of socio-digital technology in a lower secondary school to enhance student participation and creative engagement in music lessons.
  The teacher aimed to find new pedagogical solutions for applying technology in a music classroom, guided by five pedagogical principles: Everyone is creative, Gaining musical knowledge through embodied
  learning, Enhancing social cohesion and inclusion through group music-and-movement activities, Composing as a collaborative and self-regulated process, and Empowering agency and ownership through making
  a (music video) product. The teacher observed, recorded, and analyzed the process to support earlier findings that the use of technology in teaching motivates student participation and that creative tasks
  can provide a clear focus for its use. The teacher aimed to create a positive learning experience by integrating social aspects into the learning process, with students enjoying diverse and autonomous
  working in small groups. The teacher''s research interests include the use of technology in music education and the pedagogical principles involved in its application.'
