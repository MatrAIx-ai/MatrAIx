  skills: '["Project Management", "Data Analysis", "Statistical Modeling", "Technical Writing", "Microsoft Excel", "Python Programming", "CAD Design", "Event Planning", "Volunteer Coordination"]'
  hobbies: '["Gardening", "Beach walking", "Cooking", "Baking", "Reading mystery novels", "Knitting", "PTA volunteering", "Yoga", "Community garden participation", "Home organization"]'
  career_goals: Kaitlyn aims to leverage her expertise in a part‑time consulting role for local small businesses or nonprofit organizations, focusing on streamlining operations, budgeting, and staff training.
    She also aspires to become a STEM outreach coordinator at a community center or museum, where she can design and lead hands‑on workshops for youth. Over the next few years, she plans to earn a Project
    Management Professional (PMP) certification and mentor younger professionals, while maintaining her dedication to family, routine, and community service.
