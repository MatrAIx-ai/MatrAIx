personas:
  professional: Kaitlyn Baucom, a disciplined STEM professional, channels their analytical expertise in data modeling, Excel budgeting, and CAD design into part‑time consulting for local nonprofits, delivering
    methodical operational streamlining, clear technical documentation, and hands‑on staff training while pursuing PMP certification and mentoring emerging talent.
  sports: Kaitlyn Baucom sustains a disciplined fitness routine that includes sunrise walks along the Huntington Beach shoreline, weekly yoga classes, seasonal participation in a local beach‑volleyball
    league, and they avidly cheer for the Los Angeles Dodgers, Lakers, and Rams as their favorite California sports franchises.
  arts: Kaitlyn Baucom finds solace in the rhythmic click of knitting needles during their weekly circle, devours mystery novels from Agatha Christie to Gillian Flynn, and regularly listens to the soothing
    piano melodies of Yiruma and the folk storytelling of Joni Mitchell, weaving these artistic pursuits into a balanced creative outlet that complements their structured daily life.
  travel: Kaitlyn Baucom prefers meticulously planned road trips that blend scenic relaxation and cultural enrichment, favoring destinations such as the coastal charm of Santa Barbara, the vineyards of
    Napa Valley, a summer escape to Maui’s beaches, and seasonal hikes in Yosemite, all scheduled around school calendars and PTA commitments, allowing them to balance travel with community responsibilities.
  culinary: Kaitlyn Baucom delights in cultivating fresh vegetables in their backyard garden and transforming them into hearty dishes such as rosemary‑infused roasted chicken, heirloom tomato caprese salads,
    and their signature apple‑cinnamon crumble, while their baking skills shine through a meticulously layered carrot cake, and they occasionally indulge in sushi rolls from a favored local spot.
  core: Kaitlyn Baucom blends a love for orderly routines with a community‑first mindset, channeling their analytical mind into garden planning, data‑driven budgeting, and meticulous event coordination,
    all while indulging in mystery novels, occasional impulse purchases of exotic spices, and the occasional missed dental appointment.
background:
  cultural: Kaitlyn grew up in a middle‑class white family in Southern California, shaped by the suburban values of Orange County and the laid‑back beach culture of Huntington Beach. Her upbringing emphasized
    traditional American values, a strong work ethic, and active community involvement. She identifies with mainstream American culture while appreciating the surf‑and‑sand lifestyle, family‑focused traditions,
    and civic participation common in her coastal community.
