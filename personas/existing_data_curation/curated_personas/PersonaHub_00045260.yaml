persona_description: A home inspector who is hired by the buyer to thoroughly examine the condition of a house before buying it. They check for any faults in items like broken glass seals, damaged tread
  steps, settlement and decking cracks, the roof, HVAC system, plumbing, electrical components, interior appliances, and exterior conditions. The home inspector ensures the overall integrity of the house,
  making sure there is no burden to future additional maintenance costs. They also check for any structural issues like building failure, plumbing leaks, and electrical components.
