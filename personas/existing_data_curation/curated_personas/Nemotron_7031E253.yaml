  career_goals: Paulina aims to move into a supervisory role within the next two years, becoming a shift lead where she can mentor newer packers and drive efficiency projects. She plans to complete an associate’s
    degree in supply‑chain management and obtain a Certified Logistics Professional (CLP) credential to broaden her expertise. Long‑term, she envisions a warehouse operations manager position that lets
    her combine her logistical skill set with her interest in sustainable, aesthetically‑pleasing packaging solutions, influencing product design and promoting environmentally‑responsible practices.
