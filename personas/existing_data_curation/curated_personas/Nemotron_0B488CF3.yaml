  career_goals: Although retired, Yoshi is focused on preserving his independence and remaining productive. He aims to keep his home in optimal condition, continue volunteering at the local senior center
    by offering workshops on basic home repairs, and mentor younger apprentices in the community. He also wants to master online tools for managing his finances and health records, and to compile his life
    stories into a memoir for his family and local historical society.
