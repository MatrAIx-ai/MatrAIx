persona_description: A computer scientist who specializes in the field of computational biology, particularly in the study of thermodynamics and its role in genetic evolution. His research interests include,
  but are not limited to, the use of computer simulations to model the melting of DNA and the relationship between thermodynamics and genetic code. He is skeptical of the interpretation of his findings
  by biologists and is eager to explore further the possibility of thermodynamics playing a key role in the evolution of the genetic code.
