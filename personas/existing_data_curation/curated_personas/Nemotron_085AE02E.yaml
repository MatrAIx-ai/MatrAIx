  career_goals: Approaching retirement, Jan Ann aims to transition from full‑time childcare work to a mentorship and consultancy role. She plans to acquire the Child Development Associate (CDA) credential
    to formalize her expertise, and she hopes to launch a small home‑based daycare that integrates a specialized art‑focused curriculum. Additionally, she aspires to partner with local schools and libraries
    to create intergenerational art workshops, allowing her to share her love of creativity while fostering community connections. Her long‑term ambition is to leave a lasting legacy of high‑quality, imaginative
    early childhood education in the Derry area.
