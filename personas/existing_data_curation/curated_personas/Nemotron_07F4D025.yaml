  hobbies: '[''Playing acoustic guitar at bluegrass jam sessions'', ''Watercolor painting landscapes'', ''Photographing Appalachian scenery'', ''Gardening heirloom vegetables and wildflowers'', ''Hunting
    and fishing'', ''Hiking in the Appalachian foothills'', ''Cooking traditional Appalachian barbecue'', ''Participating in senior bowling leagues'', ''Volunteering with community theater (acting and set
    design)'']'
  career_goals: Although retired from formal work, John aims to channel his experience into preserving Appalachian heritage and mentoring younger generations. He hopes to volunteer as a docent at the Harlan
    County Historical Museum, compile oral histories of longtime residents, and publish a memoir that blends personal stories with regional folklore. He also plans to expand his small woodworking studio,
    creating handcrafted furniture that showcases traditional techniques, and to launch a quarterly community arts newsletter that highlights local crafts, music, and stories. Finally, he is eager to improve
    his digital skills to document and share the county's cultural narratives online.
