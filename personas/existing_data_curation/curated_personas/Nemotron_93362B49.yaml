  career_goals: Although retired, Carol aims to deepen her role as a community elder. She plans to lead a senior‑garden program at the local park, serve on the advisory board of the Hixson Senior Center,
    and create a digital archive of family histories for the Hamilton County historical society. She also hopes to complete a short course in genealogy, publish a memoir of her life in Tennessee, and travel
    to state parks across the Southeast to stay active and satisfy her curiosity about regional natural history.
