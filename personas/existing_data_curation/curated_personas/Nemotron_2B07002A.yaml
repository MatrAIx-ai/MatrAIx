personas:
  professional: Judith Huffman, a 30-year-old with a knack for juggling schedules, leverages her polished Microsoft Office skills and natural talent for mediating group discussions to excel as a part-time
    administrative assistant who keeps nonprofit events running like a well-orchestrated dance, while secretly dreaming of turning her baking flair into a side catering gig.
  sports: Judith Huffman energizes her weekends with Zumba and line-dancing classes, hikes the bluffs along the Mississippi River with a local outdoor club, and cheers on the La Crosse River Cats baseball
    team while occasionally joining a community softball league.
  arts: Judith Huffman brightens her free time attending productions at the Crate Theater, dancing to live folk tunes by the Iowa-St. Louis Folk Ensemble, and browsing the annual craft fair where she admires
    works by local ceramicist Maya Lopez, all of which fuel her creativity for pastry decorations.
  travel: Judith Huffman prefers short road trips that blend nature and nostalgia, returning from weekend getaways to Door County's cherry orchards and the vibrant food scene of Minneapolis, while eyeing
    a future summer tour of the Great Smoky Mountains to hike and sample regional pastries.
  culinary: Judith Huffman delights in baking seasonal pastries such as apple strudel with Granny Smith apples, rhubarb-strawberry galette with fresh mint, and pumpkin spice scones dusted with cinnamon,
    while loving to cook dinner dishes like herb-roasted chicken with rosemary potatoes, often sourcing ingredients from her community garden.
  core: Judith Huffman's life is a blend of structured schedules, community-centered enthusiasm, and a never-ending quest for the perfect pastry, even if that means late-night flour fights and occasional
    budget hiccups.
background:
  cultural: 'Born and raised in the Upper Midwest, Judith’s cultural background reflects the values of a small‑town Wisconsin community: a strong work ethic, modesty, and a focus on neighborly support.
    Her family traditions include attending church services (currently Methodist), participating in community potlucks, and celebrating seasonal holidays with local customs. The region’s connection to the
    Mississippi River and the outdoors shapes her appreciation for nature, fishing, and river festivals. She identifies with Midwestern pragmatism and a preference for straightforward communication.'
attributes:
  skills: '[''Event coordination'', ''Community outreach'', ''Administrative tasks'', ''Microsoft Office Suite (Word, Excel, Outlook)'', ''Budgeting & financial tracking'', ''Basic home maintenance'', ''Customer
