  hobbies: '[''Zumba/fitness classes'', ''Line dancing'', ''Hiking and nature walks'', ''Community garden volunteering'', ''Baking and pastry making'', ''Attending local festivals and craft fairs'', ''Board
    game nights'', ''Theater outings'']'
  career_goals: She aims to re-enter the workforce in a role that leverages her organizational talent and people skills, such as a part‑time administrative assistant or a community program coordinator for
    a local non‑profit. Over the next few years she plans to complete a short certification in office administration or community health work, build a professional network through local business groups,
    and eventually secure a stable position that allows a predictable schedule while also supporting her personal responsibilities. She also dreams of possibly turning her love for cooking into a small
    home‑based catering service for local events.
