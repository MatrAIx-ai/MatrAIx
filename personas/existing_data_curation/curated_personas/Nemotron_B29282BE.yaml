  hobbies: '[''Coastal hiking and trail walking'', ''Landscape photography'', ''Reading classic literature and non‑fiction'', ''Journaling'', ''Yoga and meditation'', ''Cooking Mediterranean cuisine'',
    ''Volunteering at the local historical society'', ''Strategic board games'']'
  career_goals: Loretta aims to progress to a senior management analyst role within the next three years, eventually stepping into a director of strategy position where she can lead large-scale transformation
    initiatives. She plans to pursue an MBA or a specialized certification in data analytics to deepen her strategic acumen and expand her leadership toolkit. Long‑term, she aspires to become a chief strategy
    officer, shaping corporate direction with evidence‑based decisions while championing sustainable business practices.
