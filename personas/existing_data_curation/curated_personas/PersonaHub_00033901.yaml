persona_description: A coastal scientist who specializes in studying the dynamics of coastal processes, specifically the movement of sand and sediment along the coastline. They are interested in the effects
  of human activities, such as damming and urbanization, on the natural flow of sand and how it impacts beach habitats. They are also knowledgeable about the different types of coastal environments, such
  as littoral cells, and how they contribute to the overall health of coastal ecosystems. They are interested in developing and implementing projects to restore natural sediment supply and widen beaches
  for recreational purposes.
