personas:
  professional: Stephanie Evanger, an 80‑year‑old retired cultural curator and grant‑writing virtuoso, leverages her meticulous project‑management expertise and magnetic storytelling to orchestrate community
    exhibitions, secure museum funding, mentor emerging scholars, and uphold rigorous scholarly standards in every endeavor.
  sports: Stephanie Evanger, a devoted fan of the New York Yankees, the Knicks, and the Giants, begins each day with a leisurely walk through the Brooklyn Botanic Garden, joins a senior‑friendly walking
    club each Saturday, and cherishes the mental agility of weekly bridge games at the senior center, which she treats as her preferred sport for staying sharp.
  arts: Stephanie Evanger, an unwavering patron of the arts, routinely attends Metropolitan Museum exhibitions, enjoys Broadway productions such as 'Hamilton' and 'The Crucible', listens to the New York
    Philharmonic under Leonard Bernstein’s recordings, and in her docent role passionately guides audiences through art history while often knitting a scarf during intermissions.
  travel: Stephanie Evanger, who pairs meticulously planned heritage trips to County Cork and Munich—tracing the family’s ancestral roots—with leisurely weekend escapes to the Hudson Valley’s historic estates,
    prefers guided tours that combine scholarly lectures with comfortable lodging, yet occasionally delays bookings out of concern for travel logistics and budget constraints.
  culinary: Stephanie Evanger, a dedicated home cook, revels in crafting classic American comfort dishes like chicken pot pie and apple crumble, frequently incorporates fresh heirloom tomatoes, basil, and
    thyme harvested from her raised‑bed garden into herb‑infused salmon and seasonal vegetable stews, and delights in sharing these meals during community potluck gatherings.
  core: Stephanie Evanger, an organized, talkative 80‑year‑old cultural steward, channels boundless curiosity into community arts while a persistent undercurrent of worry drives her meticulous standards
    and habitually detailed planning.
background:
  cultural: Stephanie was born in 1945 to a family of Irish‑German immigrants who settled in Brooklyn, New York. Growing up in a vibrant, multicultural neighborhood during the post‑war era, she was immersed
    in the city’s rich literary, theatrical, and artistic scenes. Her parents, both community‑active Catholics, emphasized education and public service, fostering her love for the humanities. She attended
    a public high school renowned for its liberal‑arts curriculum before earning a bachelor’s degree in Arts and Humanities from a New York college. The cultural mosaic of mid‑century New York, combined
    with her European heritage, shaped her appreciation for both tradition and innovation, and she remains deeply connected to the city’s historical societies and heritage preservation efforts.
