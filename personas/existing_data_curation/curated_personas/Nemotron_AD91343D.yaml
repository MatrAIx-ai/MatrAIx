  career_goals: At this stage in life, Shirley's chief ambition is to sustain her physical health and mental acuity so she can remain independent and continue supporting her husband. She aims to complete
    a comprehensive family history project that documents her Italian‑American roots, ensure her estate and financial affairs are meticulously organized, and mentor fellow seniors in her neighborhood on
    practical skills such as budgeting, home upkeep, and digital organization. Additionally, she wishes to perfect and record a collection of heirloom Italian recipes to pass down to future generations.
