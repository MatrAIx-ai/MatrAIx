  hobbies: '[''Softball League'', ''Hiking'', ''Cycling'', ''Electric Scooter Modification'', ''Volunteer Delivery Services'', ''Community Theater'', ''Acoustic Guitar'']'
  career_goals: Markus aims to transition from front‑line courier work to a supervisory role within the next three years, leveraging his organizational strengths to manage a team of drivers and streamline
    route planning. He plans to obtain a certification in supply chain management to qualify for a logistics coordinator position at a regional distribution center. Long‑term, he envisions starting a boutique
    delivery service that focuses on sustainable, electric‑vehicle couriers serving local businesses in Shasta County. He also hopes to mentor new couriers, sharing his practical knowledge and fostering
    a collaborative workplace culture.
