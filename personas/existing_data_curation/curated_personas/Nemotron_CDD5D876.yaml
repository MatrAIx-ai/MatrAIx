personas:
  professional: Saif Hiester is a 22‑year‑old visual designer who blends graphic design, UI/UX, and illustration, leveraging Adobe Photoshop, Illustrator, InDesign, Figma, and Sketch to craft user‑centered
    experiences while channeling their curiosity and calm resilience into collaborative client presentations and experimental media projects.
  sports: Saif Hiester stays active with weekly ultimate frisbee matches in the Twin Cities Ultimate Club, regular rides with the Minneapolis‑St. Paul Cycling Coalition, and avidly follows the Minnesota
    Vikings, Twins, Timberwolves, and United FC, balancing competitive play with a laid‑back fitness mindset that values social connection over intense training.
  arts: Saif Hiester immerses themselves in the Twin Cities art scene, snapping street‑level photos inspired by the gritty textures of Banksy, strumming acoustic renditions of Bon Iver and Sufjan Stevens,
    performing improv comedy at the Brave New Workshop, and attending gallery openings featuring works by local muralist Sarah Ragsdale and exhibitions at the Walker Art Center.
  travel: Saif Hiester favors spontaneous, budget‑conscious weekend escapes—hiking the Boundary Waters in summer, exploring Portland’s vibrant street art, and soaking in Reykjavik’s hot springs—while day‑dreaming
    about a future cultural trek to Tokyo’s Shibuya district and Patagonia’s glacier‑carved fjords.
  culinary: Saif Hiester enjoys a mix of hearty brunches and experimental home cooking, frequently whipping up avocado toast topped with radish and microgreens, mastering miso ramen with pork belly, perfecting
    grilled salmon seasoned with dill and lemon, and indulging in local food‑truck tacos al pastor.
  core: Saif Hiester is a curious, relentlessly organized 22‑year‑old designer who cycles through creative projects like they bike through city streets—always on the move, occasionally over‑committing to
    spontaneous art purchases and forgetting to lock their bike.
background:
  cultural: Saif was raised in a middle‑class white family in Saint Paul, Minnesota. His upbringing reflects Midwestern values of community, modesty, and a strong work ethic, with subtle influences from
    the region’s Scandinavian heritage that is common in the Twin Cities. Growing up near the Mississippi River and the city’s extensive park system fostered an appreciation for nature and outdoor activities.
    The vibrant local arts scene—public murals, music festivals, and indie galleries—shaped his artistic sensibility, while his school and community emphasized collaboration and civic involvement.
