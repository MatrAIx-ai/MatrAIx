  career_goals: Saif aims to become a senior UI/UX designer at an innovative tech company within the next three years, eventually leading a multidisciplinary design team as a creative director. He hopes
    to mentor junior designers, champion inclusive design practices, and integrate community‑focused projects into his work. In the longer term, he envisions launching his own design studio that blends
    commercial branding with public art installations, allowing him to merge his passion for art, technology, and collaborative experiences.
