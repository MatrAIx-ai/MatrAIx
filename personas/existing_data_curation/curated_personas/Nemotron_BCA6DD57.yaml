personas:
  professional: Jack Pazos, a 16-year-old aspiring concept artist and indie game prototype creator, merges self-taught digital illustration skills with a DIY electronics hobby to craft surreal mood boards
    and interactive light installations, while their spontaneous nature often clashes with the discipline required for meeting project deadlines.
  sports: Jack Pazos, an outdoor-oriented teen who spends weekends hiking the Columbia River Gorge and wandering the forests around Mt. Hood, occasionally cheers for the Portland Timbers and Trail Blazers
    while playing pick-up soccer with the Salem Spartans, preferring solo endurance challenges over structured gym routines.
  arts: Jack Pazos, a solitary creator who immerses themselves in the glitch-laden sounds of Aphex Twin, the ambient textures of Boards of Canada, and the surreal paintings of H.R. Giger, regularly attends
    poetry slams at the local coffee house and studies concept art from indie game legends like Toby Fox, shaping their own visual storytelling with a blend of experimental music and dark fantasy aesthetics.
  travel: Jack Pazos, a wanderer at heart, prefers spontaneous weekend trips to Oregon's misty Crater Lake and the urban buzz of Portland, while dreaming of a budget-friendly backpacking adventure through
    Tokyo's neon districts and Iceland's volcanic landscapes, often piecing itineraries together through Reddit travel threads and sketching future routes in a battered notebook.
  culinary: Jack Pazos, an amateur chef with a penchant for foraging, experiments with wild mushroom risotto, hand-kneads sourdough loaves on rainy afternoons, and occasionally crafts spicy tuna poke bowls
    infused with fresh cilantro and lime, yet often neglects regular meals when a new art project consumes their focus.
  core: Jack Pazos, a 16-year-old dreamer who blends surreal art, DIY electronics, and restless curiosity, constantly wrestles with disorganized habits and an undercurrent of anxiety while chasing boundless
    creative visions.
background:
  cultural: Jack was raised in Salem, Oregon, within a predominantly white, middle‑class suburban community characteristic of the Pacific Northwest. His family’s heritage includes German and Irish ancestry,
    and his upbringing reflects the region’s appreciation for nature, a DIY ethic, and an indie arts scene. He has been exposed to local music festivals, community art workshops, and the outdoors‑oriented
    lifestyle of Yamhill County, all of which have shaped his modest yet distinctly creative cultural perspective.
