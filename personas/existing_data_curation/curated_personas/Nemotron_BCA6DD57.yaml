  career_goals: Jack aspires to build a professional portfolio of concept art and indie game prototypes that will enable him to pursue a scholarship at a specialized art or game design school. He envisions
    working as a freelance concept artist or indie game developer, creating immersive narratives and visual worlds on his own terms. Recognising his challenges with organization, he also aims to develop
    personal productivity habits so he can meet project deadlines and eventually launch a small creative studio with like‑minded collaborators.
