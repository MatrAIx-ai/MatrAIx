persona_description: A virologist and researcher who specializes in the study of the Bluetongue and African horse sickness viruses, particularly in developing portable diagnostic lab technologies. He is
  currently exploring the development of a portable PCR diagnostic lab in a suitcase for AHSV, as well as developing a portable chip-based technology for detecting and identifying the genome, proteins or
  antibodies specific to a wide range of different equine diseases in a single multiplex assay. He is also seeking funding for this work.
