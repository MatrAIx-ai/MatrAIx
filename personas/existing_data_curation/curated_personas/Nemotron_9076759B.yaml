personas:
  professional: Alberto Calahan, a high‑school aspiring mechanical engineer, channels his love of structure and teamwork into designing and fine‑tuning RC cars and airplanes, applying meticulous problem‑solving
    skills that hint at a future career in precision engineering.
  sports: Alberto Calahan, a varsity wide receiver on the Falcons high‑school football team, also rides with the local youth cycling club and follows the Seattle Seahawks (NFL), the Golden State Warriors
    (NBA), and the Chicago Cubs (MLB), balancing regimented workouts with a love for strategic play.
  arts: Alberto Calahan enjoys creative expression through building model aircraft, and also finds inspiration in the music of Daft Punk, the YouTube channel of Mark Rober, and the classic Pixar film "Wall‑E,"
    which shape his appreciation for the blend of technology and art.
  travel: Alberto Calahan prefers well‑planned road trips, having explored the Grand Canyon and the historic streets of Quebec City, while dreaming of a future visit to Osaka to experience its cutting‑edge
    robotics museums.
  culinary: Alberto Calahan favors hearty, hands‑on meals like homemade pepperoni pizza, chicken teriyaki bowls, and tinkers with recipes that feature fresh basil, mozzarella, and a splash of soy sauce,
    though their cooking skill is limited to the family kitchen.
  core: Alberto Calahan is a pragmatically curious teen who balances disciplined teamwork on the football field with a mischievous habit of obsessively fine‑tuning RC gadgets late into the night.
background:
  cultural: Alberto comes from a predominantly white, Southern small‑town background in Cedartown, Georgia. His upbringing is shaped by Southern cultural values such as hospitality, a strong sense of community,
    and deep family ties. He attends a local Baptist church where community service and fellowship are central, and he participates in regional traditions like Friday night football games, county fairs,
    and Southern cuisine. While his family’s surname hints at Irish or Greek ancestry, those cultural roots are expressed subtly through occasional family stories and holiday observances, enriching his
    identity within the broader Southern context.
