  career_goals: Alberto envisions a future in a skilled trade that blends his love of hands‑on problem solving with a stable, structured work environment. He aims to become a certified automotive or HVAC
    technician, valuing the clear progression of apprenticeship and certification. In parallel, he hopes to give back to his community by mentoring younger students through after‑school programs and eventually
    exploring further education in community development or public service, where his cooperative spirit can contribute to local projects.
