persona_description: A historian of liturgy who specializes in the study of the history and development of liturgical practices, particularly those from the early Christian era to the medieval period. She
  is particularly interested in the differences and similarities between the liturgies of the North African-Rome tradition and the Gallican tradition, as well as the role of liturgy in the development of
  Christian identity and the spread of the faith. She has a deep understanding of the complex interplay of ritual, theology, and social context in the liturgical traditions of the early church.
