personas:
  professional: Siobhan Totman is a seasoned mobile‑equipment mechanic whose deep diagnostic skill, competitive drive, and curiosity about emerging electric‑drivetrain technology shape a career trajectory
    toward ASE master certification, team leadership, and a boutique retrofitting workshop that blends precision engineering with artistic flair; they balance meticulous documentation with the flexibility
    to improvise solutions.
  sports: Siobhan Totman cheers for the Minnesota Vikings, Timberwolves, and Twins, hikes the Mississippi River trail in summer, rides with the Twin Cities Vintage Motorcycle Club on weekends, and participates
    in a local cross‑country ski group during winter, combining competitive spirit with solitary outdoor fitness.
  arts: Siobhan Totman frequents the Minneapolis Institute of Art and St. Paul galleries, sketching installations inspired by James Turrell and Claude Monet, photographing avant‑garde exhibits, and curating
    a personal collection of prints that fuel unconventional problem‑solving at work.
  travel: Siobhan Totman prefers meticulously planned road trips that include stops at boutique mechanic shops and vintage motorcycle shows, having explored Portland’s bike culture, Bavaria’s motorcycle
    museum, and Banff’s hiking trails, while they dream of a New Zealand circuit that would blend scenic photography with on‑the‑road engineering challenges.
  culinary: Siobhan Totman enjoys cooking hearty Midwest beef stew and grilled pork tenderloin seasoned with rosemary and smoked paprika, experimenting with spicy ramen broth on weekends, and brewing single‑origin
    pour‑over coffee, yet they often over‑season dishes in pursuit of bold flavors and occasionally burn their fingertips while restoring a vintage stove.
  core: Siobhan Totman blends a competitive, detail‑oriented mechanic’s mind with a solitary artist’s eye, channeling stress into yoga, journaling, and vintage engine restoration while obsessively tracking
    finances and health metrics.
background:
  cultural: Siobhan grew up in a working‑class family in the Twin Cities, with Irish ancestry reflected in her name and a blend of the broader Scandinavian and German cultural influences common to Minnesota.
    The region’s emphasis on modesty, self‑reliance, and community service shaped her practical work ethic, while the vibrant local arts scene nurtured her appreciation for creative expression. Living in
    Saint Paul exposed her to a growing cultural diversity, prompting her interest in varied experiences and unconventional ideas. Her background combines Midwestern values of reliability and independence
    with an ongoing curiosity about global art, technology, and new perspectives.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Hydraulic and pneumatic system repair'', ''Electrical diagnostics and wiring'', ''Engine and transmission overhaul'', ''Mobile equipment installation and retrofitting'',
    ''Preventative maintenance scheduling'', ''Diagnostic software utilization'', ''Technical schematics interpretation'', ''Quality control and safety compliance'', ''Emerging vehicle technologies research'']'
  hobbies: '[''Art gallery visits and sketching'', ''Vintage motorcycle restoration'', ''DIY electronics tinkering'', ''Reading non‑fiction and classic literature'', ''Reflective journaling'', ''Nature
    photography and hiking'', ''Mindfulness meditation'', ''Gentle yoga'']'
  career_goals: Siobhan aims to become a master technician with ASE certifications and to lead a specialized mobile‑equipment service team in the Twin Cities. She is interested in transitioning into electric‑vehicle
    and hybrid mobile equipment maintenance, positioning herself at the forefront of the industry's shift toward sustainability. Over the next five years, she hopes to earn a supervisory role, mentor younger
    mechanics, and eventually open a boutique workshop that offers custom retrofitting services for eco‑focused fleets. Her competitive nature fuels a desire to be recognized as one of the top mechanics
    in Minnesota, and she plans to attend industry conferences and obtain specialized training in advanced telematics and fleet management solutions. Balancing her personal well‑being, she also intends
    to develop a structured stress‑management routine to sustain long‑term performance.
