personas:
  professional: An aspiring event planner, Sandra Baillargeon, a 23‑year‑old with a hospitality management degree in progress, leverages her strong public‑speaking, Canva design, and budgeting skills to
    coordinate community festivals while balancing meticulous organization with a flexible, people‑first mindset, even as her propensity for worry pushes her to double‑check every detail.
  sports: On the active side, Sandra Baillargeon hikes the Ozark trails with the local Ozark Trail Club, follows the St. Louis Cardinals baseball team, supports the Branson Soccer Club’s youth league, and
    blends her love of nature with regular Zumba classes to stay fit year‑round.
  arts: Artistically, Sandra Baillargeon channels her theater passion by starring in community productions of ‘Annie’ and ‘The Music Man’, snaps photos of festivals inspired by Ansel Adams, and curates
    playlists featuring Carrie Underwood, Lin‑Manuel Miranda, and local Branson show singers.
  travel: Travel‑wise, Sandra Baillargeon plans trips with a mix of spontaneity and spreadsheets, has explored Nashville’s music scene, visited the Great Smoky Mountains, dreams of seeing the cherry blossoms
    in Kyoto, and prefers weekend road‑trips that combine photography stops with local food stalls.
  culinary: Culinary‑wise, Sandra Baillargeon bakes show‑stopper desserts like lemon‑raspberry tarts and vanilla‑bean cupcakes decorated with fondant roses, loves cooking classic Ozark pork steaks with
    apple‑cider glaze, and enjoys farm‑to‑table diners where she can source fresh strawberries and herbs for her creations.
  core: At 23, Sandra Baillargeon is a socially‑driven planner who juggles a love of community events, persistent worry about perfection, a habit of over‑decorating, and a relentless drive to turn every
    gathering into a memorable celebration.
background:
  cultural: Sandra was raised in Theodosia, a small town in Taney County, Missouri, where Midwestern values of community, modesty, and hard work are prominent. Her family traces part of its ancestry to
    French-Canadian settlers, a heritage reflected in occasional celebrations of French cultural traditions and a Catholic upbringing. This blend of rural American and French-Canadian influences shapes
    her appreciation for close-knit community events, hospitality, and the practicality of making the most of limited resources. She values family gatherings, local festivals, and the supportive spirit
    that characterizes small-town life.
attributes:
  skills: '[''Event coordination'', ''Public speaking'', ''Community outreach'', ''Social media management'', ''Basic graphic design (Canva)'', ''Budgeting and financial tracking'', ''Customer service'',
