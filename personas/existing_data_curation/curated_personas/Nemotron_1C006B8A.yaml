  hobbies: '[''Community theater'', ''Volunteering at food bank'', ''Hiking'', ''Baking and cake decorating'', ''Yoga'', ''Zumba'', ''Scrapbooking'', ''Photography'', ''Attending live music festivals'',
    ''Board game nights'']'
  career_goals: Sandra aims to complete a bachelor's degree in hospitality management or communication within the next two years, leveraging her current college coursework and practical experience. Her
    long-term ambition is to become a professional event planner for the Branson entertainment district, designing family-friendly festivals and concerts that blend innovative concepts with proven traditions.
    She also wishes to develop a community-focused outreach program that provides mentorship and leadership training for local youth. In the short term, she seeks a part-time internship or entry-level role
    in a tourism-related business to build industry experience and a stable income that supports her ongoing education.
