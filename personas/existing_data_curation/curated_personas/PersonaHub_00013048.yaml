persona_description: A historian and military expert who is interested in the development of military strategy and tactics throughout history. They are familiar with the works of Sun Tzu, Carl von Clausewitz,
  Vauban, Douhet, Onasander, Jomini, and other notable military thinkers. They have a keen interest in the future of war and the emergence of new concepts and technologies in the field. They have a deep
  understanding of the concepts of nontrinitarian warfare and the 4GW canon. They have authored several books on military history and strategy and are known for their contributions to the literature of
  war. They are fluent in Hebrew, German, Dutch, and English and have a unique perspective on the evolution of military thought and strategy.
