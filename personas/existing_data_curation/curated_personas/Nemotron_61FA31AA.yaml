personas:
  professional: Alissa Roman, a 23‑year‑old visual storyteller, leverages a sharp photographic eye and bilingual fluency to craft socially‑engaged portrait and documentary projects, curates pop‑up exhibitions,
    and mentors emerging photographers, even though a spontaneous nature often leads to missed deadlines and disorganized workflow.
  sports: Alissa Roman rides with a local Boston cycling club along the Charles River Loop, hikes the Blue Hills on weekends, cheers for the Boston Celtics and Boston Bruins, and prefers group fitness activities
    over solitary gym sessions.
  arts: Alissa Roman immerses themselves in Boston’s vibrant art scene, attending gallery openings featuring emerging painters, catching independent film screenings at the Brattle Theatre, dancing bachata
    and salsa at community events, and drawing inspiration from contemporary Caribbean authors such as Junot Díaz and Edwidge Danticat.
  travel: Alissa Roman favors spontaneous weekend getaways, often backpacking to coastal towns like Rockport and Portland, while dreaming of immersive photojournalism trips to Caribbean islands, balancing
    wanderlust with a modest student budget and occasional travel‑buddy commitments.
  culinary: Alissa Roman loves cooking hearty family recipes like sancocho and mangú, experimenting with fresh herbs, plantains, and adobo‑seasoned pork, enjoys sharing communal meals with friends, but
    sometimes burns the rice when multitasking between cooking and editing footage.
  core: Alissa Roman is a curious, socially‑driven photographer who blends spontaneous creativity with a love for community, even as disorganized habits and occasional anxiety pepper their vibrant, collaborative
    life.
background:
  cultural: Alissa is a first‑generation Dominican‑American raised in a bilingual household that celebrated Caribbean rhythms, folklore, and family gatherings. The vibrant colors, music, and oral histories
    of the Dominican Republic deeply influence her aesthetic sensibility, prompting her to incorporate bold palettes and narrative depth into her work. Growing up in the multicultural environment of the
    Boston area, she bridges her Caribbean heritage with the diverse urban fabric of New England, often serving as a cultural liaison in community projects and bringing Dominican perspectives to broader
    artistic dialogues.
attributes:
  skills: '["Photography (portrait, street, documentary)", "Adobe Lightroom", "Adobe Photoshop", "Video shooting & editing (Premiere Pro)", "Studio and natural lighting", "Social media content creation",
