  hobbies: '["Gallery and street‑art walks", "Bachata and salsa dancing", "Cooking Dominican cuisine", "Hiking and urban cycling", "Volunteering with youth arts programs", "Mentoring emerging photographers",
    "Reading Caribbean literature", "Listening to visual‑storytelling podcasts"]'
  career_goals: Alissa aspires to develop a socially‑engaged photographic practice that amplifies underrepresented stories, especially those of the Dominican diaspora in New England. She plans to exhibit
    a series on intergenerational family traditions in both local galleries and cultural institutions, eventually securing a solo show. Over the next five years, she aims to partner with non‑profits for
    documentary projects, travel for immersive photojournalism assignments, and launch a small studio that offers portrait work, workshops, and mentorship programs for women of color entering the visual
    arts. An eventual pursuit of a low‑residency MFA or professional fellowship is also on her radar to deepen her conceptual practice.
