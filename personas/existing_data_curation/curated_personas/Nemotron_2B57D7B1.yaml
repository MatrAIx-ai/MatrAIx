  career_goals: Fatima dreams of becoming a teacher, where she can blend her love for storytelling, her methodical planning, and her natural ability to connect with peers. She also imagines working as a
    pediatric nurse or a community youth coordinator, roles that let her care for others while using her organizational talents. Occasionally, she fantasizes about being a scientist or an astronaut, fueled
    by her curiosity, but she ultimately wants a career that lets her create harmonious, supportive environments for children.
