  hobbies: '["Barbecue cooking and recipe swapping", "Fishing at Lake Arlington", "Classic car restoration", "Playing poker and card games at the senior center", "Volunteering as a mentor for youth apprenticeship
    programs", "Attending local live music events", "DIY woodworking projects", "Listening to classic rock and country music", "Participating in community theater improv sessions", "Exploring new tech gadgets
    and apps"]'
  career_goals: Approaching retirement, Duane aims to leave a lasting imprint on his plant by formalizing a mentorship program that pairs veteran operators with apprentices, hoping to earn recognition as
    a senior advisor on process efficiency. He also aspires to transition into a part‑time consulting role where he can help small Texas manufacturers adopt lean practices. Financially, he plans to secure
    a comfortable early‑retirement cushion while staying active in the workforce enough to maintain his social network and sense of purpose. Ultimately, he would like to be celebrated with a “Lifetime Achievement”
    award from his employer for his cumulative contributions to safety, productivity, and worker development.
