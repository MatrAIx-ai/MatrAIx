  hobbies: '[''Cycling club (weekends)'', ''Intramural soccer league'', ''Hiking in Oakland County parks'', ''Cooking and hosting dinner parties'', ''Volunteering to organize charity runs'', ''Escape‑room
    puzzle games'', ''Reading business and self‑improvement books'', ''Attending live music concerts'', ''DIY home‑improvement projects'', ''Traveling to Detroit and Chicago'']'
  career_goals: Lisa aims to obtain her CPA license within the next 18 months and leverage that credential to advance to a senior auditor role at her firm. She is driven to lead high‑impact audit engagements,
    implement process‑improvement initiatives, and mentor junior staff. In the longer term, she aspires to become an audit manager and eventually a partner, with a vision of shaping the firm’s strategic
    direction and cultivating a culture of excellence and accountability. Her competitive spirit fuels a desire to acquire additional certifications, such as the Certified Management Accountant (CMA), and
    to be recognized as a trusted financial advisor within her industry and community.
