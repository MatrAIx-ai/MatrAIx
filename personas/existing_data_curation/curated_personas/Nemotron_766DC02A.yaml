  hobbies: '[''Softball'', ''Hiking'', ''Gardening'', ''Live Music Events'', ''Book Club'', ''Volunteer Work at Food Bank'', ''Recipe Experimentation'', ''DIY Home Projects'', ''Traveling in the Southeast'',
