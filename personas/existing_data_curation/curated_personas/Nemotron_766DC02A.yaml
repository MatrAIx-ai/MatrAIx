  career_goals: Jacqueline aims to advance to a facilities operations manager position within the next five years, overseeing multiple support departments such as maintenance, security, and sustainability
    initiatives. She plans to earn the Certified Facility Manager (CFM) credential and attend leadership workshops to strengthen her strategic planning skills. In the long term, she hopes to launch a consulting
    firm that helps midsize hotels and healthcare facilities implement cost‑effective, environmentally‑friendly cleaning programs while fostering employee empowerment and a culture of continuous improvement.
