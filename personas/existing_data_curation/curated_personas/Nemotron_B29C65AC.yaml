  hobbies: '["Drawing and sketching", "Watercolor painting", "Reading fiction and non-fiction", "Writing short stories and diary entries", "Playing the piano", "Exploring nature and bird-watching", "Collecting
    shells and leaves for crafts", "Solving puzzles and brain teasers", "Participating in school art club", "Watching documentaries about art and science"]'
  career_goals: Adelyn aspires to turn her love of art into a future career, aiming to become a children's book illustrator or a museum educator who designs interactive, inclusive art experiences for young
    visitors. She is also intrigued by psychology and hopes to study it later, so she can understand and help peers who struggle with anxiety. In the near term, she plans to refine her drawing techniques,
    compile a portfolio for art contests, and seek mentorship from local artists. Ultimately, she wants a profession that blends creativity, empathy, and education to inspire and support others.
