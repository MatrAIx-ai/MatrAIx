  career_goals: Daniel aspires to pursue a career in engineering, ideally in mechanical or robotics fields. He hopes to attend a STEM‑focused high school and later earn a bachelor's degree in mechanical
    engineering or aerospace engineering at a university with strong ties to the automotive and technology industries. His long‑term ambition is to design practical, sustainable solutions—such as energy‑efficient
    vehicles or autonomous robots—that address everyday challenges. He envisions participating in competitions like FIRST Robotics, eventually leading a design team, and contributing to innovative projects
    that blend his curiosity for new ideas with his pragmatic approach to problem‑solving.
