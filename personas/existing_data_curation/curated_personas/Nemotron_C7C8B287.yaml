personas:
  professional: Stephen Schrader, a 24‑year‑old aspiring HVAC technician and budding handyman, blends his hands‑on experience in carpentry, welding, and automotive repair with a desire for structured certification
    while often fighting the constraints of deadlines, they excel at small‑scale construction projects and plan to launch a local repair business in Frazee.
  sports: Stephen Schrader, a 24‑year‑old outdoor enthusiast, spends weekends fishing Lake Minnetonka and hunting in nearby fields, they root for the Minnesota Twins and Vikings, are a member of the local
    4‑H sportsmen club, and maintain basic fitness with occasional weight‑lifting sessions at the community gym.
  arts: Stephen Schrader, a 24‑year‑old acoustic guitar hobbyist, strums folk tunes by Sufjan Stevens and the Avett Brothers in quiet evenings, they devour science‑fiction novels from Neal Stephenson and
    Liu Cixin, and they admire nature photography by Ansel Adams, which fuels their own occasional landscape shots.
  travel: Stephen Schrader, a 24‑year‑old solo adventurer, plans low‑key road trips to Boundary Waters, Yellowstone, and a cabin retreat in the North Shore, they prefer camping under the stars over hotels,
    but budget constraints keep their international travel aspirations limited to a future visit to Canada’s Algonquin Park.
  culinary: Stephen Schrader, a 24‑year‑old modest cook, enjoys grilling trout, making chili with wild rice and smoked paprika, preparing fresh garden salads with tomatoes, basil, and cucumbers, they are
    comfortable with a cast‑iron skillet and frequently experiment with campfire recipes while still ordering fast‑food pizza on lazy weekends.
  core: Stephen Schrader is a practical, solitary craftsman who balances a love for rugged outdoors with a quiet ambition for financial independence; they occasionally buckle under deadlines yet always
    return to their saw and fishing rod.
background:
  cultural: Stephen was raised in Frazee, a small town in Otter Tail County, Minnesota, within a predominantly White, Midwestern, Protestant (largely Lutheran) cultural setting. His community emphasizes
    self‑reliance, modesty, hard work, and close‑knit neighborly ties. Family traditions often involve seasonal farming activities, community events like county fairs, and church gatherings that foster
    a sense of collective responsibility while respecting personal privacy. These values have shaped Stephen’s practical outlook, his preference for small‑group interactions, and his balanced approach to
    cooperation and assertiveness.
