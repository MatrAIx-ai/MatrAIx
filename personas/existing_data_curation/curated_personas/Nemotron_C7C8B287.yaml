  career_goals: Stephen aims to turn his practical skill set into a stable, well‑paid trade. He plans to enroll in a community‑college apprenticeship program—preferably in HVAC or welding—to earn certification
    and improve his job prospects. While he values the structure of formal training, he also wants to retain flexibility to work on personal projects and potentially launch a small handyman business serving
    the Frazee area. Long‑term, he hopes to achieve financial independence, own a modest property where he can combine his hobby gardening with a side business, and eventually settle down in a supportive
    community.
