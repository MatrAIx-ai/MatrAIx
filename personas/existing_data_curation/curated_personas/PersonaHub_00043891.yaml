persona_description: A scientist with expertise in prion diseases, specifically chronic wasting disease. Dr. Michael T. Osterholm, the director of CIDRAP, has extensive knowledge and experience in the field
  of prion research, having been involved in the detection and study of bovine spongiform encephalopathy (mad cow disease) in the 1980s. He is currently leading the Chronic Wasting Disease Response, Research
  and Policy Program at the University of Minnesota, aiming to raise national awareness of the threat posed by chronic wasting disease and establish the institution as a national and international center
  for CWD response, research, education, and policy.
