personas:
  professional: Brittany Perez, a retired household manager turned senior community volunteer, leverages her meticulous budgeting, record‑keeping and event‑planning prowess to lead Ashtabula's annual senior
    garden showcase, where her methodical, routine‑driven approach ensures every detail from plant labeling to raffle logistics is flawlessly executed, reflecting her competitive edge in securing top honors
    for the town.
  sports: Brittany Perez stays active through low‑impact morning walks with the Ashtabula Senior Fitness Club and supports the Cleveland Guardians, Cleveland Browns, and Cleveland Cavaliers on game days,
    while she occasionally joins a community softball league in the spring, approaching fitness with a routine‑oriented, competitive spirit that mirrors her garden contests.
  arts: Brittany Perez immerses herself in classic literature, often rereading Jane Austen and Charles Dickens, while evenings are filled with the folk harmonies of Bob Dylan and Joan Baez, and she occasionally
    attends the local theater's productions of Shakespeare, all of which satisfy her love for timeless, structured art forms.
  travel: Brittany Perez prefers meticulously planned road trips to historic towns like Williamsburg, Virginia, and quaint coastal villages in New England, where she can explore botanical gardens and antique
    markets, yet she limits longer journeys due to budget constraints, reserving occasional cruises to the Caribbean for milestone birthdays.
  culinary: Brittany Perez, a proficient home cook, delights in preparing garden‑fresh ratatouille, apple crumble with a dash of cinnamon, and her signature chicken pot pie using herb‑infused butter and
    locally sourced carrots, while she documents each recipe in a handwritten family cookbook, though she sometimes over‑salts dishes in her quest for bold flavors.
  core: Brittany Perez embodies quiet determination, blending routine‑driven community service with a competitive streak and a calm, detail‑obsessed approach to life.
background:
  cultural: Brittany's cultural background reflects the values of the Midwestern small‑town tradition—self‑reliance, community service, and a deep respect for routine and family. Growing up in Ashtabula,
    Ohio, she was immersed in a close‑knit community where church activities, local fairs, and neighborhood gatherings were central. Her heritage emphasizes practicality, modesty, and a strong work ethic,
    shaping her organized, reliable, and resilient character while fostering a quiet confidence in preserving local traditions.
attributes:
  skills: '["Budgeting and financial record‑keeping", "Event planning for small groups", "Garden design and maintenance", "Cooking and baking traditional recipes", "Knitting and quilting", "Sewing and minor
