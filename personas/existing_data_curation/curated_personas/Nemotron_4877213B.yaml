  hobbies: '["Perennial gardening and horticulture contests", "Knitting and quilting", "Reading classic literature", "Listening to folk and oldies music", "Bible study group", "Volunteering at community
    center craft workshops"]'
  career_goals: Although retired from formal employment, Brittany aims to deepen her contributions to the Ashtabula community by leading the annual senior garden showcase, organizing a quarterly fundraiser
    for the local library, and documenting the town's oral histories for future generations. She also aspires to compile a family cookbook that preserves her culinary heritage and to mentor a new generation
    of volunteers in efficient event planning and resource management.
