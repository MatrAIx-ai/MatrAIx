  career_goals: Even at eight, Sandraleigh has clear aspirations. She dreams of becoming an elementary school teacher because she loves helping peers understand new ideas and values the structure of a classroom.
    She also imagines caring for animals as a future veterinarian, inspired by her visits to the Cincinnati Zoo. To reach these goals, she focuses on earning good grades, strengthening her organization
    skills, and participating in school STEM clubs and animal‑care projects. Sandraleigh plans to continue building reliable habits now so she can pursue higher education and eventually a career that blends
    teaching and caring for living things.
