personas:
  professional: Sandraleigh Duncan, an aspiring junior LEGO engineer who transforms their love for order and detail into intricate block constructions, plans each build step‑by‑step, and reliably follows
    through on their ambitious projects; they showcase early engineering instincts with every completed masterpiece.
  sports: Sandraleigh Duncan, a member of the North Seattle Soccer Club's U‑8 team who thrives on organized recess games, roots for the Seattle Mariners and collects team stickers, and practices swimming
    drills at the community pool each Saturday to stay active, and they enjoy the camaraderie of team practice.
  arts: Sandraleigh Duncan, who brightens after‑school hours by illustrating scenes from the Magic Tree House series, draws inspiration from Mo Willems' playful lines and the upbeat pop beats of Taylor Swift,
    and proudly displays a growing sticker album of favorite characters beside their art supplies, and they often hum the songs while drawing to keep rhythm.
  travel: Sandraleigh Duncan, a curious explorer who loves family walks through the nearby forest trail, has treasured visits to Yellowstone National Park and Legoland California, and dreams of a future
    road trip to the Grand Canyon, always packing a checklist of snacks and a sketchbook for on‑the‑go drawing, and they eagerly map out each destination in a colorful notebook.
  culinary: Sandraleigh Duncan, who delights in assembling pepperoni pizza slices with extra mozzarella, expertly spreads peanut butter and banana on whole‑grain toast for breakfast, and proudly bakes chocolate
    chip cookies with a parent—though they occasionally leave a trail of flour footprints on the kitchen floor, and they love sharing their tasty creations with friends.
  core: Sandraleigh Duncan blends a methodical love for LEGO building with a playful streak for illustration, carefully manages allowance, tracks allergies, and embraces organized games, all while juggling
    occasional forgetfulness and a penchant for sticker collections, and they approach each day with quiet curiosity.
background:
  cultural: Sandraleigh is a white American child raised in Cincinnati, Ohio, within a family that values Midwestern hospitality and community involvement. Her household celebrates typical American holidays—Thanksgiving,
    Christmas, and the Fourth of July—with family gatherings and local traditions such as attending a community church service and visiting the Cincinnati Zoo. She has grown up cheering for the Cincinnati
    Reds and Bengals, participating in neighborhood block parties, and enjoying regional foods like BBQ and chili. These cultural experiences shape her sense of belonging, her love for organized community
    events, and her appreciation for family‑centered routines.
