persona_description: A historian of science and mathematics who specializes in the life and work of Colin Maclaurin, and has a particular interest in understanding the "Newtonian style" and its impact on
  Maclaurin's intellectual development. She is also interested in the history of the calculus and the relations between mathematics and society. Her research has led to the publication of the book "The
  Origins of Cauchy's Rigorous Calculus" by Dover Publications, and she has received recognition for her work through the MAA's Haimo Award for Distinguished College or University Teaching.
