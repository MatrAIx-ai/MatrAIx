  career_goals: Andrew dreams of one day traveling to space as an astronaut while also wanting to create his own artwork that captures what he sees among the stars. He imagines building inventions that
    solve everyday problems, hoping to become a scientist‑inventor or an artist‑engineer. In the near term, his goal is to keep learning at school, master more drawing techniques, and join school clubs
    where he can explore science projects and art projects together.
