personas:
  professional: A budding 7‑year‑old visual storyteller, Andrew Detemple blends cartoon drawing, LEGO architecture, and short narrative writing, applying a curious yet relaxed approach that embraces unconventional
    ideas without rigid schedules.
  sports: A budding athlete, Andrew Detemple participates in the Ridge Park junior soccer club, cheerfully roots for the hometown baseball team the Riverside Raptors and the national MLB franchise the New York Yankees,
    and enjoys weekend swimming lessons, reflecting a love for team play yet comfort in small‑group settings.
  arts: An imaginative young creator, Andrew Detemple spends afternoons sketching cartoons inspired by Dr. Seuss, painting landscapes reminiscent of Claude Monet’s water lilies, and coloring intricate designs
    while listening to the playful scores of Studio Ghibli’s My Neighbor Totoro and watching classic Disney animations, and they find this blend of colors and stories fuels their creative spirit.
  travel: A curious explorer, Andrew Detemple has trekked the nearby Ridge Park nature trails, taken a family road trip to the Grand Canyon, dreams of seeing the Eiffel Tower and the Great Barrier Reef,
    and prefers spontaneous weekend getaways with parents over meticulously planned itineraries, reflecting a flexible travel style.
  culinary: A budding kitchen helper, Andrew Detemple loves making peanut butter‑jelly sandwiches with strawberry jam, mixing chocolate chip cookie dough with extra chocolate chips, and occasionally assisting
    with spaghetti Bolognese by sprinkling grated Parmesan and hidden carrots, showcasing a simple yet experimental palate.
  core: Andrew Detemple, a 7‑year‑old curiosity‑driven dreamer, fuses art, LEGO building, and dinosaur‑obsessed stories while juggling a delightfully disorganized schedule, impulsive snack choices, and
    an ever‑growing collection of crayon‑colored space drawings, and they always stray toward the most colorful route.
background:
  cultural: Andrew comes from a white, middle‑class family in Union City, Fulton County, Georgia. His upbringing blends traditional Southern values—such as attending a local Baptist church on Sundays, celebrating
    Thanksgiving with a family roast, and enjoying regional foods like peach cobbler—with a modern suburban lifestyle that includes participation in community events like the Fulton County Kids’ Art Fair
    and nature walks in nearby parks. He attends a public elementary school where he interacts with a diverse student body, but his family’s cultural habits emphasize politeness, respect for elders, and
    a love of outdoor activities common in the Georgia region. These influences have nurtured his curiosity for art, science, and the natural world while supporting his reserved yet cooperative personality.
