  career_goals: While retired, Michael aims to stay actively involved in his community by serving on the board of the local senior services nonprofit, mentoring high‑school students interested in trades,
    and helping his grandchildren prepare for college financially. He also plans to document his life’s lessons in a memoir, maintain his health through regular walking, and ensure his family’s financial
    stability.
