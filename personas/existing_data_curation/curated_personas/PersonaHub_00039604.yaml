persona_description: A scientist or engineer who specializes in the field of analytical chemistry, specifically in the use of hydrometers and lactometers. They are familiar with the principles of floatation
  and relative density measurement, and have experience with the calibration and use of hydrometers in various applications such as measuring the relative density of liquids or the state of charge of car
  batteries. They are also knowledgeable about the working principle of hydrometers and the types of hydrometers available, such as the cylindrical stem and bulb weighted with mercury or the cylindrical
  stem and bulb weighted with water.
