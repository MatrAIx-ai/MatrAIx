  career_goals: She envisions a future where she can combine her love for visual art and storytelling, aiming to become a multimedia creator—perhaps a documentary filmmaker or a digital content producer
    who highlights community stories. Doris also dreams of traveling to explore world museums and street art, hoping to someday lead workshops that teach kids to express themselves through art. In the short
    term, she wants to expand her YouTube channel, win a school media competition, and earn a scholarship for a summer art program.
