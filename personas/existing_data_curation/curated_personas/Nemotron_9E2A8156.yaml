personas:
  professional: Doris Robinson, a budding young illustrator and storyteller, channels their curiosity and love for neighborhood murals into vibrant watercolor, collage, and graffiti‑style doodles that serve
    as visual backbones for the short, fantastical tales they pen for the community center's art club, often sharing their work aloud to enthrall classmates.
  sports: Doris Robinson, an enthusiastic participant in school soccer during the fall and a frequent visitor to the community center’s after‑school skateboarding club, roots for Tottenham Hotspur in the
    Premier League and follows the NBA’s New York Knicks, preferring spontaneous pick‑up games and skate sessions over regimented training, and often drums up teammates with their lively chatter.
  arts: Doris Robinson, an avid doodler who draws inspiration from the street art of Banksy, the indie pop melodies of Lorde, the classic rock riffs of The Beatles, and the whimsical storytelling of Neil
    Gaiman, spends weekends at the community center’s art club mastering watercolor techniques, collaging, and graffiti‑style lettering while also attending local open‑mic poetry nights.
  travel: Doris Robinson, a curious twelve‑year‑old who loves spontaneous weekend outings, has explored the bustling Camden Market, taken a family road trip to historic Edinburgh, and dreams of wandering
    Tokyo’s Harajuku district to hunt for neon‑lit street art, all while balancing school assignments and a modest allowance that sometimes limits longer trips.
  culinary: Doris Robinson, a budding home chef with a knack for whipping up colorful matcha‑green macarons, rainbow‑sprinkled cupcakes, and avocado toast seasoned with chili flakes, often hosts DIY dessert
    nights for friends, though their sweet tooth occasionally leads to over‑sweetened creations and a habit of snacking on leftover frosting.
  core: Doris Robinson, a talkative, art‑obsessed twelve‑year‑old who turns everyday city scenes into vivid doodles, balances a sweet tooth with a habit of misplacing school assignments, and thrives on
    the buzz of friends and community projects.
background:
  cultural: Doris grew up in Camden, New Jersey, a city known for its vibrant mural culture and close ties to Philadelphia’s arts scene. As a white American family, her household celebrates traditional
    holidays such as Thanksgiving, Christmas, and the Fourth of July, while also embracing the multicultural rhythm of the neighborhood. She frequently visits the Camden Arts Centre and local street art
    festivals, absorbing influences from African‑American, Latino, and Asian artists who contribute to the city’s visual tapestry. Her parents value education and community involvement, encouraging her
    participation in after‑school programs that blend creativity with civic awareness. This mix of suburban family traditions and urban artistic exposure shapes Doris’s outlook, fostering an inclusive appreciation
    of diverse cultural expressions while rooting her identity in the American Northeast.
