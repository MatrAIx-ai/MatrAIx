personas:
  professional: Maria Bennett is a seasoned medical assistant in Piney Flats who expertly handles patient intake, phlebotomy, and EHR documentation while channeling their curiosity and love for visual storytelling
    into empathetic educational materials, though their spontaneous nature sometimes makes them struggle with organizing certification study schedules for medical office management and coding.
  sports: Maria Bennett fuels their fitness routine with regular hikes on the Appalachian foothills, seasonal 5K runs in spring, and weekly yoga at a local studio, while cheering on the Tennessee Titans
    on football Sundays and the Nashville Predators during the hockey season.
  arts: Maria Bennett blends their passion for watercolor painting of rolling Appalachian hills with a keen eye for photography inspired by Ansel Adams, frequently curating community health exhibitions
    that feature works reminiscent of Georgia O’Keeffe, and finds solace in listening to the folk storytelling of Jason Isbell and the avant‑garde sounds of St. Vincent during their creative sessions.
  travel: Maria Bennett prefers spontaneous, low‑key road trips that let them capture sunrise over the Blue Ridge Parkway, revisits Asheville’s vibrant arts district for inspiration, dreams of exploring
    the historic streets of Savannah, Georgia, and occasionally dips into European escapades like Bruges, Belgium, when their budget permits.
  culinary: Maria Bennett delights in modernizing Southern comfort food—they craft shrimp and grits with a lemon‑ginger glaze, quinoa‑stuffed collard greens with toasted pecans, and bourbon‑caramel pecan
    pie—while mastering the balance of sweet potatoes and smoked paprika in their weekday dinners.
  core: Maria Bennett is a curious, art‑infused medical assistant whose spontaneous spirit fuels innovative patient education, even as they frequently juggle missed deadlines and a habit of buying too many
    watercolor paints.
background:
  cultural: Maria grew up in Piney Flats, a tight‑knit community in Sullivan County, Tennessee, steeped in Appalachian traditions and Southern hospitality. Her family background is rooted in working‑class
    values, emphasizing reliability, modesty, and a strong sense of community responsibility. While culturally white and raised in a predominantly Protestant environment, Maria has embraced a broader worldview
    through her curiosity about art and unconventional ideas. She balances respect for her regional heritage—such as a love for local cuisine and outdoor recreation—with a personal drive to explore diverse
    perspectives and creative expression.
attributes:
  skills: '["Patient intake and triage", "Vital signs measurement", "Phlebotomy", "Electronic Health Record documentation", "Medical terminology", "Basic laboratory specimen preparation", "Insurance verification
    and billing basics", "Patient education on medication and self‑care", "Community outreach coordination", "Photography and visual storytelling"]'
  hobbies: '["Watercolor painting", "Landscape photography", "Reading contemporary fiction and philosophy", "Hiking local trails", "DIY crafts (e.g., candle making)", "Attending intimate live music sessions",
    "Cooking Southern‑inspired dishes", "Keeping a personal journal"]'
  career_goals: Maria aspires to advance beyond her current assisting role by earning certification as a medical office manager and pursuing a medical coding credential. She hopes to lead a small team,
    redesign clinic workflow for greater patient‑centered efficiency, and eventually develop a niche service that integrates wellness coaching with creative health education—using her art and photography
    skills to produce engaging patient resources. Her long‑term ambition includes establishing a community‑focused wellness hub in Piney Flats that offers both conventional medical support and holistic,
    art‑infused health workshops.
