persona_description: A Renaissance scholar who is fascinated by the convergence of Ignatian spirituality and Renaissance artistry in the canon of Shakespeare, and is interested in the world of historical
  Shakespeare, where the plays of Shakespeare move against the forces of the world by way of an inner vitality, and the Jesuits are a key player in the literary movement promoted by the early Society of
  Jesus to counter the fledgling Anglican Church. The discovery of literary evidence linking Shakespeare to the Jesuits adds another shard to the fragments of biographical detail on the man called William
  Shakespeare.
