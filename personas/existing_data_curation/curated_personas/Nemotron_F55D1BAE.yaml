  career_goals: Barbara aims to transition from a senior analyst role to a strategic leadership position, such as Director of Business Operations or Senior Consultant, where she can shape enterprise‑wide
    initiatives. She plans to obtain a Lean Six Sigma Black Belt, lead digital‑transformation projects that integrate emerging analytics tools, and author thought‑leadership articles on effective change
    management. Additionally, she is passionate about mentoring the next generation of analysts, sponsoring professional‑development workshops at local business schools, and eventually serving on the board
    of a community non‑profit focused on economic development.
