personas:
  professional: Barbara Donehoo, a senior management analyst with 30+ years turning data into strategic insight, they leverage advanced Excel, Power BI, Tableau, and SQL to spot inefficiencies, apply their
    Lean Six Sigma Green Belt to streamline processes, and combine curiosity for emerging analytics tools with a methodical, organized approach to present actionable plans to executives—all while mentoring
    junior analysts and positioning themselves for a future Director of Business Operations role.
  sports: Barbara Donehoo, a devoted fan of the Boston Red Sox, New England Patriots, Boston Celtics, and Boston Bruins, they cheer loudly at season games, participate in a senior‑center dance class and
    gentle yoga three times weekly, join a local walking club for brisk autumn hikes in the White Mountains, and play bridge and trivia nights, though they limit snowshoeing due to knee arthritis.
  arts: Barbara Donehoo, a lifelong learner with a penchant for contemporary non‑fiction, they regularly discuss works by Malcolm Gladwell, Yuval Noah Harari, and Anne Lamott at their book club, delight
    in Boston Symphony Hall performances of Yo‑Yo Ma, enjoy screenings of Greta Gerwig’s films, and collect prints by local watercolor artists, reflecting a balanced love of high culture and accessible
    community art.
  travel: Barbara Donehoo, an avid group traveler who prefers curated cultural festivals and historic tours, they have explored the Freedom Trail in Boston, visited the historic districts of Philadelphia
    and Salem, trekked the cobblestone streets of Rome and the tea houses of Kyoto, and plan a future pilgrimage to the Scottish Highlands, always booking trips well in advance to accommodate their senior‑center
    commitments and budget constraints.
  culinary: Barbara Donehoo, a culinary explorer who blends Mediterranean and Asian flavors, they master a fragrant Greek moussaka layered with garden‑grown eggplant, sautéed zucchini, and feta, craft a
    spicy Thai green curry using fresh ginger, lemongrass, and coconut milk, and skillfully roll sushi with avocado and pickled radish, all while favoring ingredients like extra‑virgin olive oil, saffron,
    and miso paste—though they sometimes over‑season dishes in the excitement of new recipes.
  core: Barbara Donehoo merges analytical rigor with community spirit, channeling curiosity into data‑driven leadership while nurturing gardens, friends, and flavors, despite occasional forgetfulness about
    vitamins and a cheeky habit of buying too many ornamental plants.
background:
  cultural: Barbara is a third‑generation American of Irish and English ancestry, raised in suburban New Jersey. She grew up in a multicultural community, which fostered an appreciation for diversity while
    maintaining traditional family customs such as celebrating Thanksgiving, Easter, and St. Patrick’s Day. Her upbringing emphasized education, civic involvement, and community service. Living in Edison,
    she routinely engages with neighbors from a variety of ethnic backgrounds, participates in local multicultural events, and values the blend of suburban American and New Jersey’s vibrant, diverse culture.
