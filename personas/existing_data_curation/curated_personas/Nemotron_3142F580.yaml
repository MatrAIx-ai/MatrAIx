personas:
  professional: Christopher Feely, a computer systems analyst who blends curiosity with practicality, leverages UML, SQL, PowerBI, and Python scripting to translate business needs into secure, cloud‑enabled
    solutions while navigating Agile sprints with stakeholder‑centric communication, all while maintaining a reliable yet flexible work style that accommodates their sociable nature.
  sports: Christopher Feely energizes weekend mornings by playing pickup basketball at a local gym and joining the Tulsa United recreational soccer league, cheering on the Oklahoma City Thunder and the
    Oklahoma Sooners while incorporating nightly runs and occasional yoga sessions to stay fit, yet often skips post‑game stretching, leading to lingering muscle tightness.
  arts: Christopher Feely nurtures creativity through landscape photography of the Ouachita Mountains, strumming acoustic covers of The Lumineers and Jack Johnson on a battered guitar, and hosting board
    game nights featuring Catan and Terraforming Mars, while regularly attending live performances by regional folk bands such as the Tulsa Folk Collective.
  travel: Christopher Feely favors rugged weekend getaways, planning meticulously detailed hikes in the Ouachita Mountains and camping trips to New Mexico’s White Sands, while dreaming of a cross‑country
    road trip along Route 66, balancing limited vacation days with a modest travel budget that still allows occasional flights to Seattle for tech conferences.
  culinary: Christopher Feely delights friends with smoke‑infused brisket seasoned with a blend of mesquite, brown sugar, and chipotle, masterfully managing the low‑and‑slow grill on a backyard smoker,
    while also whipping up tangy coleslaw and spiced cornbread, and they never miss a chance to experiment with new dry rubs sourced from online BBQ forums.
  core: Christopher Feely is a tech‑savvy systems analyst who relishes group sports, BBQ artistry, and board‑game strategy, yet battles chronic worry that fuels midnight snack binges and occasional procrastination
    on paperwork.
background:
  cultural: Christopher was raised in Tulsa, Oklahoma, within a middle‑class white family of German and Irish heritage. His upbringing blended Midwestern values—hard work, community involvement, and modesty—with
    local Oklahoma traditions, such as tailgate parties for Sooners football and participation in city festivals that celebrate the state's Native American history. Family holidays often feature communal
    gatherings, church attendance (Methodist), and a love for classic rock and country music. Exposure to Tulsa's vibrant arts district and diverse culinary scene has broadened his cultural perspective,
    while he maintains a strong identification with mainstream American culture.
