personas:
  professional: Andrew Whitehead is an aspiring junior astronomer and LEGO engineer who delights in designing moving mechanisms that mimic planetary orbits, integrating his love of space books with methodical
    building habits and a preference for quiet, focused work.
  sports: Andrew Whitehead prefers low‑key physical pursuits, joining the community park's junior nature hike group and attending a weekly beginner gymnastics class, while cheering for the Atlanta Braves
    and the New York Knicks on television, embodying his love of gentle movement and quiet teamwork.
  arts: Andrew Whitehead often sketches leaves, rocks, and insects in his notebook, drawing inspiration from the detailed nature illustrations of Marla Frazee and the soothing piano works of Claude Debussy,
    and occasionally hums melodies from Pixar soundtracks, weaving his artistic expression into his solitary, reflective moments.
  travel: Andrew Whitehead enjoys planning day trips to nearby state parks with printed maps and color‑coded checklists, dreams of visiting the Kennedy Space Center in Florida and the red rocks of Sedona,
    and favors quiet cabin getaways over bustling amusement parks, reflecting his methodical yet adventurous travel style.
  culinary: Andrew Whitehead prefers comforting meals like homemade mac and cheese enhanced with a hidden cauliflower puree, delights in assembling fruit kebabs with grapes, strawberries, and pineapple,
    and occasionally helps whisk batter for banana pancakes, showcasing his cautious but curious culinary explorations.
  core: Andrew Whitehead is a methodical, curiosity‑driven seven‑year‑old who thrives in solitary, structured spaces, balancing his love of LEGO engineering, quiet nature observation, and meticulous habits
    with a gentle, caring heart.
background:
  cultural: Andrew grows up in a suburban neighborhood of St. Louis County, Missouri, within a middle‑class, predominantly white community that values education, independence, and community involvement.
    His family celebrates typical Midwestern holidays and traditions, such as backyard barbecues, Fourth of July fireworks, and local farmers’ market visits. His parents encourage self‑directed learning
    and provide a quiet home environment that supports his love for reading and building. The local school emphasizes collaborative projects while also offering quiet spaces like the library, aligning with
    Andrew’s preference for solitude and his considerate nature.
