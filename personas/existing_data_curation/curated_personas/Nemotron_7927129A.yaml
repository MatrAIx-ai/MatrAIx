  career_goals: Andrew imagines a future where he designs helpful things for his community—like building safe playgrounds or creating simple machines that make everyday tasks easier. He aspires to become
    an engineer or a scientist, drawn to the idea of turning curious questions into practical solutions. While still very young, he often talks about wanting to "build a robot that helps tidy my room" and
    hopes to study robotics or civil engineering in later school years, always keeping in mind how his work can make life smoother for others.
