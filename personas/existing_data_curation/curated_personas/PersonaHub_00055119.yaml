persona_description: A scientist and environmentalist who is passionate about conservation and the protection of plant species facing growing threats. They are interested in developing and implementing
  efficient and effective methods to assess the conservation status of plant species, particularly those facing extinction due to climate change and invasive species. They are likely to have expertise in
  plant research collections and geographic information systems (GIS), and have developed a simplified triage method to classify plant species as either "at risk" or "not at risk" based on their geographical
  range size. They are also interested in the potential impact of global warming on plant species and the conservation efforts required to protect them.
