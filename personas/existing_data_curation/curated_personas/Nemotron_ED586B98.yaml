  hobbies: '["Gardening", "Cooking", "Baking", "Quilting", "Knitting", "Bridge", "Bingo", "Shuffleboard", "Senior Fitness Classes", "Volunteering at Library", "Community Theater", "Church Choir"]'
  career_goals: Although retired, Yvonne aims to expand her impact within the senior community by taking on a lead volunteer coordinator role at the local senior center, designing health‑focused workshops,
    and spearheading a neighborhood garden initiative that encourages intergenerational participation. She also hopes to win the annual community bingo tournament, reflecting her competitive spirit, and
    plans to travel with her husband to historic sites across the Southeast while continuing to share her culinary and gardening expertise with friends and family.
