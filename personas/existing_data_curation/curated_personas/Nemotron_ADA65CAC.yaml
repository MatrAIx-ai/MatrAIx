  hobbies: '[''Gardening'', ''Cooking Puerto Rican cuisine'', ''Salsa and bomba dancing'', ''Volunteering at food pantry'', ''Playing bridge'', ''Reading historical fiction'', ''Church community activities'']'
  career_goals: Although retired, Melly aims to stay actively involved in her community. She aspires to become a senior advisor for the local Puerto Rican cultural association, lead a mentorship program
    for young adults, and help preserve the neighborhood’s historical narratives through oral history projects. She also hopes to secure a seat on the board of the nearby senior center, where she can influence
    policies to improve accessibility and quality of life for older adults. Her ambition is to leave a lasting legacy of cultural preservation and community empowerment.
