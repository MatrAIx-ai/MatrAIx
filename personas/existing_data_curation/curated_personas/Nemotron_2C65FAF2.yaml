personas:
  professional: Guillermina Berriosmiranda, an aspiring young robotics enthusiast, channels their meticulous nature into designing competition-ready LEGO Mindstorms projects while leading the school’s chess
    team with strategic precision.
  sports: Guillermina Berriosmiranda, a competitive youth soccer player in the Chicago Fire Academy’s spring league, also attends weekend basketball drills with the Chicago Bulls Jr. program and passionately
    supports the Chicago Cubs and Chicago Blackhawks, using sports as a structured outlet for their drive.
  arts: Guillermina Berriosmiranda, a dedicated piano student, practices Beethoven’s Moonlight Sonata and enjoys listening to pianist Lang Lang, while also dancing to folkloric performances by Ballet Folklórico
    de Chicago and admiring the paintings of Frida Kahlo and the films of Guillermo del Toro, which shape their artistic sensibility.
  travel: Guillermina Berriosmiranda, an organized young explorer, prefers meticulously planned family trips to Chicago’s Museum of Science and Industry and the Field Museum, while dreaming of a summer
    visit to Mexico City’s historic center and a winter adventure in Kyoto’s temples, balancing cultural curiosity with school schedule.
  culinary: Guillermina Berriosmiranda, a budding home chef, skillfully measures ingredients to help prepare tamales, salsa verde with fresh tomatillos, and pozole, while also loving pizza topped with mozzarella
    and basil, and they take pride in mastering the precise timing of piano pieces as precisely as they time simmering broth.
  core: Guillermina Berriosmiranda blends disciplined curiosity with a love for puzzles, balancing a competitive edge in chess and robotics with a quiet devotion to family traditions and meticulous daily
    routines.
background:
  cultural: Guillermina comes from a Mexican immigrant family that settled in Chicago. At home she speaks both Spanish and English, celebrates holidays such as Día de los Muertos and Mexican Independence
    Day, and participates in community events at the local Mexican cultural center. Her family places a strong emphasis on education, respect for elders, and preserving cultural traditions while adapting
    to life in the United States.
