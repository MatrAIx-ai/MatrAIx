personas:
  professional: Angela Allegood is a community-centered program coordinator who leverages strong interpersonal communication and budgeting expertise to design and lead senior wellness workshops, while they
    maintain a relaxed approach that lets plans evolve and their curiosity fuels integration of new health trends.
  sports: Angela Allegood enjoys staying active through weekly senior-center line-dancing, morning walks along the shoreline, and occasional pick-up basketball at the community park while cheering on the
    Miami Dolphins and the Orlando Magic, and they belong to a local walking club for retirees.
  arts: Angela Allegood finds creative inspiration in the storytelling of Maya Angelou, the folk ballads of Joan Baez, the classic films of Doris Day, and the vibrant paintings of local watercolorist Susan
    Hartman, often incorporating these influences into their crochet patterns and book-club discussions.
  travel: Angela Allegood favors spontaneous weekend road trips along Florida's coastline, often exploring the white sands of Siesta Key, the historic streets of St. Augustine, and occasionally venturing
    to Charleston for a taste of Southern charm, balancing travel with a modest budget and family commitments.
  culinary: Angela Allegood delights in cooking large, nutritious meals that blend fresh garden herbs like rosemary and sage with classic Floridian dishes such as shrimp etouffee, citrus-marinated chicken,
    and peach cobbler, skillfully adapting family recipes while occasionally over-salting a stew in their quest for bold flavor.
  core: Angela Allegood is a sociable, curiosity-driven retiree who trades occasional disorganization for vibrant community involvement, relentless recipe experimentation, and a habit of forgetting to water
    plants while remembering every birthday.
background:
  cultural: Angela was raised in a middle‑class, Anglo‑American household in the Midwest, where she absorbed values of self‑reliance, community involvement, and a strong work ethic. Her family celebrated
    traditional American holidays with large gatherings, and Sunday church attendance was a cornerstone of her upbringing. After relocating to Eustis, Florida, she embraced the vibrant retiree culture of
    central Florida, participating in local festivals, fishing outings, and community service. Her cultural identity blends classic Midwestern sensibilities with the relaxed, outdoors‑oriented lifestyle
    of central Florida, shaping her emphasis on practicality, sociability, and a love for shared experiences.
