  hobbies: '[''Gardening (native plants & herbs)'', ''Cooking and recipe experimentation'', ''Crocheting & knitting'', ''Line dancing'', ''Book club (historical fiction)'', ''Birdwatching'', ''Volunteer
    at public library'', ''Road trips to Florida beaches'', ''Church gatherings and potlucks'', ''Craft fairs participation'']'
  career_goals: Angela aims to broaden her volunteer involvement by leading a senior wellness program at the local community center and creating a mentorship circle for new retirees. She hopes to author
    a cookbook that showcases family recipes and regional flavors, and she is considering launching a small online shop selling handmade crafts. To deepen her impact, she plans to enroll in a certificate
    program in gerontology, which will enhance her ability to support older adults. While she values flexibility and a relaxed pace, she envisions becoming a trusted community liaison who bridges gaps between
    seniors and service providers.
