personas:
  professional: Dai Do is a seasoned welding specialist certified in MIG, TIG, and stick welding who applies meticulous organization and a curiosity for artistic expression to lead high-tech manufacturing
    teams, integrating CAD-driven metal sculpture techniques into process improvements while mentoring apprentices.
  sports: Dai Do is an active outdoors enthusiast who hikes Orange County's coastal trails, participates weekly at a local indoor rock-climbing gym as part of the Orange County Climbing Collective, and
    avidly follows the Los Angeles Dodgers and Los Angeles Lakers during baseball and basketball seasons.
  arts: Dai Do is a committed patron of contemporary arts who regularly attends exhibitions featuring Yayoi Kusama and Banksy, draws creative inspiration from Radiohead's music and Tilda Swinton's performances,
    and often references these influences in their handcrafted metal jewelry.
  travel: Dai Do is a travel enthusiast who enjoys weekend getaways to Santa Barbara's coastline, has trekked Iceland's volcanic landscapes, and is planning a future immersion in the Swiss Alps to combine
    mountain hiking with a metal-working workshop.
  culinary: Dai Do is an inventive home cook who blends global fusion flavors, often preparing miso-glazed salmon with kimchi slaw, homemade ramen bowls spiced with gochujang and topped with fresh cilantro,
    and treats themselves to rooftop sushi bars for expertly sliced tuna and avocado.
  core: Dai Do balances a methodical engineer's precision with artistic spontaneity, obsessively cataloguing metal scraps for future creations while wrestling with a tendency to over-worry about project
    deadlines, leading to late-night sketching sessions that both soothe and disturb their sleep.
background:
  cultural: Dai is a first‑generation East Asian American whose family immigrated from Taiwan in the 1990s. Growing up in Southern California, she was immersed in both her family's Mandarin‑speaking household
    traditions and the wider multicultural fabric of Orange County. She cherishes cultural practices such as Lunar New Year celebrations, traditional tea ceremonies, and cooking family recipes, which inform
    her appreciation for craftsmanship and detail. Daoist values of perseverance and communal harmony shape her approach to teamwork and mentorship, while her exposure to American art scenes fuels her curiosity
    for unconventional welding projects. Dai balances respect for her heritage with an adaptive, innovative mindset that guides both her professional and personal pursuits.
