    ''Playing board games with friends'', ''Attending cultural festivals (e.g., Chinese New Year)'', ''Indoor rock climbing'']'
  career_goals: Dai aims to earn the AWS Certified Welding Engineer credential and step into a supervisory role within a high‑tech manufacturing environment, such as aerospace or renewable energy. She aspires
    to open a boutique studio that blends functional welding with artistic metal sculpture, offering custom commissions and workshops for the community. Over the next five years, she plans to develop a
    youth mentorship program at a local maker space, championing both technical skill and creative expression while balancing her career ambitions with personal well‑being.
