persona_description: A historian who specializes in the study of genocides and their aftermaths, particularly those that occurred in the twentieth and twenty-first centuries. They have a deep understanding
  of the cultural and educational rights of minority groups and have conducted extensive research on the topic. They have also worked with organizations that focus on providing reparations to victims of
  genocides and have a unique perspective on the impact of these reparations on survivors and their descendants. They are knowledgeable about the history of the Holocaust and have a keen interest in understanding
  the specific cultural milieu that existed before genocide.
