persona_description: A researcher and engineer specializing in the development of wireless power transmission systems, particularly in the field of solid-state retrodirective wireless power transmission.
  They are responsible for the development and testing of a solid-state phased array transmitter and rectenna, as well as the retrodirective control system. The researcher has a strong background in microwave
  engineering, solid-state electronics, and photonic technologies, and is experienced in the design and implementation of integrated microwave wireless power transmission systems. They have conducted research
  at the Center for Space Power (CSP) at Texas A&M University and have published several papers on the topic. The researcher is responsible for coordinating and managing the project with the Center for
  Space Power (CSP) and the Department of Electrical Engineering at TAMU.
