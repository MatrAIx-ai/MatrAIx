  hobbies: '[''vegetable gardening'', ''crossword puzzles'', ''chess'', ''listening to jazz and high‑life music'', ''attending church prayer group'', ''genealogy research'', ''volunteering as a digital‑literacy
    tutor'', ''reading historical biographies'']'
  career_goals: Though retired from formal employment, Rafael aims to preserve his independence and health while passing on his practical knowledge to younger relatives and neighbors. He seeks to expand
    his role as a mentor at the senior center, offering workshops on home safety, budgeting, and basic computer skills. He also aspires to complete a local history oral‑project documenting the experiences
    of Black residents in Durham, thereby contributing to the community’s collective memory. Maintaining financial security and staying mentally sharp through continued learning are central to his personal
    ambitions.
