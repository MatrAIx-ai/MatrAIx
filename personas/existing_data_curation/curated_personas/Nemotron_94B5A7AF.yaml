  career_goals: Joseph aims to open a boutique personal‑care studio that blends art, wellness, and Southern hospitality, offering signature treatments inspired by abstract visual concepts. He plans to earn
    advanced certifications in aesthetic therapy and later pursue a master’s in entrepreneurship to scale his business into a regional chain. He also hopes to develop a brand of handcrafted scented products
    and build an online presence that showcases his creative services, positioning himself as a leading innovative service provider in the Southeast.
