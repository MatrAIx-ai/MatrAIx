  hobbies: '[''Visiting art galleries and museums'', ''Cooking Peruvian cuisine'', ''Walking in waterfront parks'', ''Listening to Andean music'', ''Playing chess and solving crosswords'', ''Volunteering
    at cultural festivals'', ''Reading art history books'', ''Photography of cityscapes'']'
  career_goals: In the next few years, Andres aims to move into a supervisory role within his collection department, where he can lead a team, design training programs for new collectors, and implement
    process improvements that reduce delinquency rates. He is also interested in leveraging his experience to become a consultant for small businesses in Queens, helping them streamline invoicing and improve
    cash flow. Ultimately, he envisions retiring with a portfolio of community-focused projects, including a mentorship initiative for bilingual youths interested in finance and a partnership with local
    art centers to promote cultural exchange.
