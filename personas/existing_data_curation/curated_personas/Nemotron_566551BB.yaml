  hobbies: '[''Crayon drawing and coloring'', ''Building block structures'', ''Reading picture books and storytelling'', ''Singing nursery rhymes and dancing'', ''Pretend play (animals, superheroes, cooking)'',
    ''Exploring the backyard and nature'', ''Group play at the local park'']'
  career_goals: Although only two years old, Mark already dreams in vivid, imaginative ways. He often tells adults he wants to 'draw big pictures', 'make music', or 'fly to the stars'. These playful statements
    hint at future ambitions to become an artist who creates colorful paintings, a musician who performs songs, or an explorer/astronaut who discovers new worlds. His curiosity about how things work suggests
    a potential interest in science or engineering, while his love for stories points toward a future as a storyteller or writer.
