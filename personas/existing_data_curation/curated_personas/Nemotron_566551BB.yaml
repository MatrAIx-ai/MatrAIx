personas:
  professional: Mark Prince, a budding builder‑engineer who loves to sort and stack blocks, plans miniature structures with methodical precision, eagerly shares their creations during playdates, turning
    imagination into organized play, and they often invite friends over to showcase new builds.
  sports: Mark Prince, an energetic toddler who attends the Little Sprouts Gymnastics Club, idolizes the city’s professional baseball team the River City Runners, loves sprinting after soft foam balls in
    the park while chanting the team’s cheer, and they giggle loudly whenever they catch a ball.
  arts: Mark Prince, an imaginative little artist who delights in finger‑painting bright blues and golds, dances to the playful tunes of Raffi’s “Baby Beluga” and the classic “When You Wish Upon a Star,”
    often draws abstract swirls inspired by the works of Joan Miró on oversized sketch pads, and they proudly display each masterpiece on the fridge.
  travel: Mark Prince, a curious explorer who enjoys family trips to the nearby aquarium and the mountain‑side cabin, eagerly watches the world go by from a stroller on the local commuter train, dreams
    of someday seeing the tropical waterfalls of Costa Rica, and they squeal with delight whenever a new animal appears on the aquarium’s glass.
  culinary: Mark Prince, a picky eater who adores banana slices, tiny macaroni bites, and the swirl of rainbow sprinkles on cupcakes, often mixes yogurt with diced strawberries in a ‘chef‑like’ experiment,
    occasionally refuses broccoli with a stubborn pout, and they proudly claim that the sprinkles are the best part of any dessert.
  core: Mark Prince, a two‑year‑old whirlwind of imagination, meticulous play, and social energy who turns everyday chores into organized adventures while battling snack cravings and occasional temper‑taming
    tantrums, and they are known for lining up stuffed animals in perfect rows before bedtime.
background:
  cultural: Mark is raised in the small, close‑knit community of Foxworth in Marion County, Mississippi. As part of a white Southern family, his upbringing is shaped by regional traditions such as regular
    church attendance, family gatherings featuring Southern comfort food like fried chicken and biscuits, and a strong emphasis on hospitality and respect for elders. The cultural environment includes exposure
    to country and gospel music, community festivals, and outdoor activities like fishing, picnics, and backyard play. The slower pace of rural life and the values of neighborly cooperation influence his
    sociable and cooperative nature, while the Southern dialect and storytelling heritage enrich his language and imagination.
attributes:
  skills: '[''Fine motor coordination (crayon drawing, block building)'', ''Expressive language development (multi-word sentences, inquisitive questioning)'', ''Vivid imaginative pretend play'', ''Early
