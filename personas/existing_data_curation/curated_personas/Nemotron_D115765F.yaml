personas:
  professional: Leonard Cotlong, a retired middle‑school teacher turned senior advisor for the Hagerstown school board, leverages three decades of curriculum design, differentiated instruction, and digital‑literacy
    training while balancing his innate curiosity with practical organization, offering assertive yet compassionate guidance to novice educators and community programs.
  sports: Leonard Cotlong spends early Saturday mornings fishing the Potomac with his long‑time friends, supports the Washington Commanders in the fall and the Baltimore Ravens in the winter, walks the
    nearby Catoctin Crest Trail for cardio, and plays bridge at the senior center, balancing relaxed recreation with a modest commitment to staying active.
  arts: Leonard Cotlong sings alto in his church choir, cherishes the harmonies of Ella Fitzgerald and the folk storytelling of Pete Seeger, attends regional theatre productions at the Garrett County Playhouse,
    and brings literary discussion to life as a member of the community book club, letting music and literature shape his evenings.
  travel: Leonard Cotlong favors low‑key road trips to historic towns like Annapolis, scenic retreats in Shenandoah National Park, and occasional visits to Washington, D.C.’s museums, planning each outing
    with a detailed itinerary yet leaving room for spontaneous detours along the Appalachian Trail.
  culinary: Leonard Cotlong enjoys preparing Maryland crab cakes with a dash of Old Bay, slow‑cooked Southern collard greens, and garden‑fresh heirloom tomato sauces, and while their cooking class skills
    have turned them into a competent home chef, they sometimes over‑salt dishes in their zeal to highlight flavors.
  core: Leonard Cotlong blends a lifelong educator’s curiosity with pragmatic organization, nurturing community connections through choir, garden, and mentorship, even as a chronic worrier who occasionally
    forgets medication but never stops planning the next volunteer project.
background:
  cultural: Leonard grew up in a close‑knit African‑American family in Maryland during the civil‑rights era, where education and church were central pillars of identity. His parents, both schoolteachers,
    instilled a deep respect for learning and a commitment to community service that guided his own career. The rich oral traditions, gospel music, and communal gatherings of his heritage shaped his sociable
    nature and his love for group activities. Living in Hagerstown, he has remained connected to the city’s historic Black neighborhoods, participating in annual Juneteenth celebrations and local preservation
    projects. These experiences have fostered a nuanced understanding of racial history in the mid‑Atlantic, which he weaves into his storytelling and mentorship. Leonard’s cultural background informs his
    values of resilience, generosity, and the importance of passing wisdom across generations.
