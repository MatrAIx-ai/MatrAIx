  career_goals: Michael aims to advance from bartender to bar manager at a high‑traffic venue in Chico, eventually opening his own craft cocktail bar and taproom that showcases local breweries, seasonal
    ingredients, and experimental drinks. He plans to earn advanced certifications such as the Certified Mixologist credential and possibly take culinary courses part‑time to deepen his food‑pairing skills.
    Over the next five years, he hopes to become a recognized mixologist in Northern California, lead community tasting events, and mentor new bartenders. Ultimately, he aspires to combine his curiosity
    for new flavors with the practical demands of running a successful hospitality business, and may later transition into beverage consulting for local breweries and restaurants.
