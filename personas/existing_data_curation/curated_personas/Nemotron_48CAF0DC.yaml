  career_goals: John hopes to transition from a staff janitor to a lead facilities supervisor within the next five years, leveraging his on‑the‑ground experience to oversee a small cleaning team. He plans
    to earn a certified green‑cleaning credential and pursue a GED to broaden his career options. John also aspires to develop a mentorship program for new custodial workers, sharing his practical knowledge
    and compassionate approach. In the longer term, he dreams of coordinating community‑focused wellness initiatives in his workplace, such as mindfulness breaks for staff and senior‑citizen outreach programs
    that combine hygiene education with art‑therapy workshops.
