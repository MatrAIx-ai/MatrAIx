personas:
  professional: John Kuck, a 46‑year‑old senior cleaning specialist in the Cleveland area, they combine two decades of hands‑on custodial expertise with a curiosity for sustainable practices, aiming to
    earn a green‑cleaning certification and step into a lead facilities supervisor role while championing mentorship for new custodial workers.
  sports: John Kuck, 46, they cheer for the Cleveland Browns, Cavaliers, and Guardians while joining the Lorain Hiking Club for weekend treks through the Sandusky River wetlands, participate in a local
    adult softball league on summer evenings, and prefer low‑impact walking over intensive gym routines, though they often forgo scheduled workouts after a long day of cleaning.
  arts: John Kuck, a 46‑year‑old visual art enthusiast, they spend afternoons sketching at the Lorain Art Association, draw inspiration from the brushwork of Winslow Homer and the color fields of Mark Rothko,
    follow the Cleveland Museum of Art’s podcast featuring curators discussing contemporary design, and unwind listening to the music of composer Philip Glass and the poetry of Rita Dove, which fuels their
    own mixed‑media experiments.
  travel: John Kuck, 46, they favor spontaneous, modestly budgeted trips that blend art and nature, such as weekend wanderings to the Finger Lakes for vineyard tours, day‑long sketches at the historic Frank
    Lloyd Wright campus in Wisconsin, annual visits to the Cleveland Museum’s traveling exhibitions, and a long‑held wish to tour Barcelona’s museums and Japan’s Kyoto temples once retirement provides more
    leisure.
  culinary: John Kuck, a 46‑year‑old farmer’s‑market regular, they relish crafting intermediate‑level dishes such as lemon‑herb grilled salmon paired with quinoa, a seasonal rhubarb crumble, and fresh watermelon
    gazpacho, while delighting in sampling locally sourced Ohio corn, heirloom tomatoes, and farm‑fresh cheese at community markets.
  core: John Kuck, 46, they are a compassionate, art‑obsessed janitorial veteran who battles chronic worry and a habit of misplacing keys, yet channels that restless curiosity into watercolor creations,
    green‑cleaning ambitions, and heartfelt mentorship.
background:
  cultural: John is a white Midwestern American with roots in German and Irish immigrant families who settled in the Ohio region generations ago. He grew up in a small-town environment that emphasized hard
    work, modesty, and community support. Local church gatherings, school events, and seasonal festivals shaped his sense of belonging and his cooperative nature. The cultural values of self‑reliance, neighborly
    assistance, and respect for tradition influence how he approaches his work, his volunteerism, and his appreciation for regional art and craftsmanship.
