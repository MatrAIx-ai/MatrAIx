  career_goals: Kenneth aims to stay active and socially engaged by expanding his volunteer work. He plans to lead introductory sailing classes at the Marblehead Yacht Club, mentor younger volunteers in
    community‑safety initiatives, and offer part‑time handyman consulting for neighbors. He also hopes to document and publish oral histories of Marblehead’s older residents, preserving the town’s maritime
    legacy for future generations. His goal is to blend his practical skills with his outgoing nature, contributing to the community while maintaining a flexible, enjoyable routine.
