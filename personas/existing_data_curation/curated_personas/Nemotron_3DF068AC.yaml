personas:
  professional: Charles Foote, a retired sailor‑turned‑community arts curator, leverages their storytelling, woodworking, and photography skills to design senior‑led exhibitions, coordinate volunteers,
    and compile oral histories, though their spontaneous nature often leads to missed deadlines and half‑finished projects.
  sports: Charles Foote, an avid hiker of coastal trails and occasional sailor with the Astoria Yacht Club, enthusiastically follows the Seattle Seahawks and Portland Timbers, but avoids team sports because
    their competitive edge makes casual pick‑up games feel overly intense.
  arts: Charles Foote, a regular participant in the Astoria Riverfront Art Walk and impromptu improv sessions at the community center, draws inspiration from Ansel Adams, indigenous storytelling traditions,
    and avant‑garde musician Joni Mitchell, and spends evenings woodworking, playing acoustic guitar, and collecting limited‑edition prints.
  travel: Charles Foote, who favors spontaneous road trips to art festivals like the Oregon Coast Art & Craft Fair and the Seattle Art Museum’s annual exhibit, balances a love for rugged getaways in Cannon
    Beach with a modest travel budget, and dreams of sailing to the Pacific islands to document traditional canoe building.
  culinary: Charles Foote, a homebrewer and backyard grill enthusiast, delights in cooking cedar‑plank salmon with dill and wild mushrooms, frequently experiments with hoppy IPA recipes, but has a weakness
    for late‑night coffee that often leaves their toast charred while multitasking between brewing and editing photos.
  core: Charles Foote, a weather‑worn storyteller who weaves maritime lore with modern art, dances between organized projects and sudden whims, guards a competitive edge while staying socially magnetic,
    and never says no to a sunrise photo session even when a sore knee protests.
background:
  cultural: Charles grew up in a modest, working‑class family along the Columbia River, where his parents were involved in logging and commercial fishing. The rugged maritime culture of Astoria, combined
    with the Pacific Northwest’s strong environmental ethic, shaped his respect for nature and self‑reliance. Coming of age during the 1960s counter‑culture wave, he absorbed a progressive, open‑minded
    outlook that fuels his curiosity about new ideas and art forms. While he identifies with the white, Mid‑western‑American heritage of his ancestors, he also honors the region’s indigenous Clatsop and
    Chinook histories, often incorporating their stories into his community projects.
