  career_goals: Although retired from formal employment, Charles aims to become the unofficial curator of Astoria’s living history. He plans to compile a community‑sourced photo book and oral‑history collection
    that celebrates the town’s fishing and logging heritage, and to launch a rotating senior‑led art exhibition in the local library. He also hopes to mentor a youth art collective, secure a small grant
    for a public mural that blends traditional maritime motifs with contemporary abstract art, and eventually earn recognition as a “Community Arts Champion” in Clatsop County.
