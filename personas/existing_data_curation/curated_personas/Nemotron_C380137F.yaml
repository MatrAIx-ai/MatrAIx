personas:
  professional: Emalie Filas, a 33‑year‑old product sourcing specialist in the fashion and lifestyle sector, merges an eye for contemporary art with data‑driven market analysis to curate ethically sourced
    assortments; they are known for turning boutique‑level visual merchandising concepts into profitable retail experiences, while their habit of compulsively reorganizing spreadsheets sometimes delays
    final approvals.
  sports: Emalie Filas enjoys early‑morning yoga sessions at the Palmetto Trail Club and weekend hikes in Congaree National Park, while cheering on the Charleston Battery soccer team and the South Carolina
    Gamecocks football squad; they often swap their hiking boots for a pair of pickleball paddles during the summer heat.
  arts: Emalie Filas spends weekends painting watercolor vistas of the Lowcountry and attending openings at the Gibbes Museum of Art, drawing inspiration from Georgia O’Keeffe’s bold colors and the avant‑garde
    installations of Yayoi Kusama; they regularly volunteer to lead sketch workshops for local youth, though they admit to hoarding vintage textile patterns like secret treasures.
  travel: Emalie Filas seeks out cultural festivals such as the Santa Fe Indian Market and the Savannah Music Festival, favoring spontaneous itineraries that blend art tours with local culinary experiences;
    they have already explored the galleries of Paris and the street art of Berlin, and they dream of a future retreat in Kyoto’s Higashiyama district.
  culinary: Emalie Filas loves cooking Southern classics with a global twist, often serving shrimp and grits topped with miso‑glazed scallops alongside collard greens seasoned with smoked paprika and a
    dash of sumac; they enjoy experimenting with heirloom tomatoes, fresh basil, and cardamom‑spiced peach cobbler, though they sometimes burn the caramelized edges in a rush.
  core: Emalie Filas is a curiosity‑driven sourcing strategist who channels artistic flair into sustainable retail, balances disciplined finances with occasional vintage‑textile splurges, and powers through
    life with yoga, paintbrushes, and a habit of reorganizing spreadsheets at midnight.
background:
  cultural: Emalie is a third‑generation white American from the Deep South, with family roots tracing back to English and Irish ancestors who settled in South Carolina during the 19th century. She grew
    up in the Sumter area, immersed in Southern hospitality, community church life, and a strong sense of regional tradition, especially around food, music, and storytelling. Her upbringing emphasized humility,
    resilience, and close‑knit community ties. A humanities degree and her avid interest in the visual arts have broadened her outlook, encouraging openness to diverse cultural influences and unconventional
    ideas. She blends these Southern values with a contemporary, art‑savvy mindset, shaping a unique cultural identity that honors her heritage while actively seeking new experiences.
attributes:
  skills: '[''Strategic product sourcing'', ''Trend forecasting'', ''Vendor negotiation'', ''Market analysis'', ''Inventory management'', ''Budgeting'', ''Visual merchandising'', ''Data‑driven decision
