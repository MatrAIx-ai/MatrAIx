  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylic and watercolor)'', ''Traveling to cultural festivals'', ''Reading contemporary fiction and poetry'', ''Photography'', ''Cooking Southern-inspired
    dishes'', ''Yoga and mindfulness'', ''Hiking in local nature preserves'', ''Volunteer work with youth art programs'', ''Collecting vintage textiles and decor'']'
  career_goals: Emalie aims to progress to a senior buying or category‑management role within the next three to five years, leading a buying team and shaping the strategic direction of product lines. She
    aspires to specialize in sustainable fashion and lifestyle goods, integrating her artistic sensibility into curated retail experiences. Long‑term, she envisions launching her own boutique that blends
    contemporary art, ethically sourced apparel, and handcrafted home décor, creating a space where shoppers encounter both style and culture. To support these ambitions, she plans to pursue professional
    development in supply‑chain management and may consider an MBA focused on sustainable business.
