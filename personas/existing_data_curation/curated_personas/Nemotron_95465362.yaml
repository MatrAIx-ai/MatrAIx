  hobbies: '[''Experimenting with recipes at home'', ''Exploring LA street‑food markets'', ''Playing recreational soccer'', ''Listening to Latin and indie music'', ''Food photography'', ''Hiking in the
    Angeles National Forest'', ''Watching cooking shows'', ''Reading food science and nutrition books'', ''Volunteering at a community garden and food pantry'']'
  career_goals: Alberto aims to enroll in a culinary arts program at a local community college to earn a professional certification. He plans to progress from his current food preparation role to a line
    cook position, then advance to sous chef while mastering more complex Mexican and fusion cuisines. In the long term, he dreams of opening his own modern Mexican‑inspired restaurant in Los Angeles that
    emphasizes sustainable, farm‑to‑table ingredients and provides a welcoming community space. He also hopes to give back by mentoring youth from his neighborhood, offering culinary workshops, and eventually
    launching a catering service that supports local cultural events.
