persona_description: A researcher in the field of biosciences, astrophysics, electronics, and medicine who is passionate about developing rapid, label-free, and non-invasive tissue diagnosis methods based
  on wide-field Raman imaging. This individual is skilled in interdisciplinary knowledge and is dedicated to translating the method of integral field spectroscopy from astrophysics to biomedical imaging
  applications. The project aims to develop diode lasers optimized for Raman-based tissue diagnosis, which is an important centerpiece of the system. The persona is likely to be interested in the development
  of new diagnostic tools and techniques in the field of biomedical imaging.
