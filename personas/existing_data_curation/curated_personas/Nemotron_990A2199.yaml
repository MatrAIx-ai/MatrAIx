personas:
  professional: An experienced volunteer and community organizer, Rebekah Lagasca coordinates senior‑center events, teaches digital‑literacy workshops, and leads knitting groups, and they apply their hands‑on
    practicality and spontaneous energy to keep programs lively and adaptable.
  sports: A regular participant in the Orange County Senior Strollers Club, Rebekah Lagasca enjoys gentle morning walks, low‑impact water aerobics, and occasional bowling nights, and they cheer on the Los
    Angeles Dodgers, the Anaheim Ducks, and the Orange County SC soccer team.
  arts: A lifelong lover of swing and jazz, Rebekah Lagasca spends evenings listening to Ella Fitzgerald, Frank Sinatra, and Duke Ellington, dancing at community events, and they channel that creative energy
    into quilting projects inspired by the colors of local mural artists.
  travel: Spontaneous yet budget‑conscious, Rebekah Lagasca often takes day trips to Huntington Beach, Catalina Island, and the festive Orange County Fair, and they have long dreamed of a senior‑friendly
    cruise to the Mexican Riviera or a cultural tour of Kyoto, Japan.
  culinary: A seasoned home cook, Rebekah Lagasca blends classic chicken pot pie and apple crumble with Mexican‑style shrimp tacos, fresh salsa verde, and her garden’s heirloom tomatoes, basil, and jalapeños,
    delighting friends at potlucks while they occasionally over‑season in a burst of enthusiastic experimentation.
  core: Rebekah Lagasca’s blend of mid‑century community values and zest for digital discovery makes them the upbeat, spontaneous neighbor who dotes on garden‑fresh meals and jazz nights, yet they sometimes
    misplace their glasses and forget the oven timer while deep in a knitting project.
background:
  cultural: Rebekah grew up in a mid‑western, white, middle‑class family that moved to Southern California during the early 1960s, joining the post‑war suburban expansion of Orange County. Her upbringing
    emphasized family gatherings, holiday traditions, and civic participation, reflecting the values of her generation—self‑reliance, courtesy, and a strong sense of neighborhood. Living in Anaheim, she
    absorbed the region’s beach‑side and amusement‑park culture while witnessing the gradual diversification of the community. She maintains the practical, hands‑on skills taught by her parents, such as
    cooking from scratch, gardening, and basic home maintenance, and she blends these with a curiosity for newer ideas, like digital technology and multicultural cuisines. Her cultural identity is rooted
    in a blend of classic American mid‑century values and the vibrant, increasingly diverse lifestyle of modern Orange County.
attributes:
  skills: '["Cooking", "Gardening", "Smartphone & App Use", "Event Coordination", "Mentoring", "Knitting", "First Aid Basics"]'
  hobbies: '["Community Card Games", "Bridge Nights", "Book Club", "Gardening", "Cooking/Baking", "Knitting and Quilting", "Senior Center Dance Nights", "Listening to Classic Jazz and Early Rock", "Spontaneous
    Day Trips to Beaches", "Volunteer Work at Local Events"]'
  career_goals: Rebekah aims to stay actively engaged in her community by expanding her volunteer role as a senior‑companion and by leading a digital‑literacy workshop for other elders. She hopes to compile
    a handwritten memoir that weaves together family stories, oral histories, and cherished recipes, preserving her heritage for future generations. Learning basic photography on her tablet is a personal
    ambition, as is exploring new culinary techniques from around the world through online classes. Ultimately, she wishes to maintain her independence, health, and social connections while continuing to
    share her practical knowledge and kindness with those around her.
