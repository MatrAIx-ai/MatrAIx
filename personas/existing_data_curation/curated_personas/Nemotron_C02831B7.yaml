  hobbies: '[''Jazz and gospel concert attendance'', ''Speculative fiction book club'', ''Docent for African‑American history exhibits'', ''Landscape painting'', ''Poetry writing'', ''Heirloom gardening'',
    ''Experimental Southern cooking'', ''Neighborhood potluck gatherings'', ''Community game nights'', ''Choir singing'']'
  career_goals: Although officially retired, Walter is driven to leave a lasting cultural imprint on his community. He aims to organize a series of intergenerational art and storytelling workshops at the
    local community center, publish a memoir that weaves personal history with Southern African‑American experiences, and serve on the board of a regional cultural heritage nonprofit. He also hopes to mentor
    emerging Black artists in Darlington County, fostering a pipeline of creative talent while advocating for mental‑health awareness among seniors.
