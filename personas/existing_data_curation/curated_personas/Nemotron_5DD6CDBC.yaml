personas:
  professional: Melissa Jackson, an aspiring graphic design student who blends sketching, digital doodling, and Canva skills to create community‑focused visual campaigns that highlight local culture, while
    embracing a relaxed, flexible work style that sometimes leads to last‑minute deadline scrambles, and they thrive on spontaneous inspiration from street art.
  sports: Melissa Jackson enjoys strolling to the Oakland Coliseum to cheer on the Athletics in summer, follows the Golden State Warriors' games at home, participates in weekend pick‑up basketball at a
    Bay Area community center, and keeps fit with casual jogs along the Bay Trail while occasionally forgetting to stretch afterward, and they sometimes swap out their running shoes for old sneakers when
    in a hurry.
  arts: Melissa Jackson curates eclectic playlists featuring Marvin Gaye, Kendrick Lamar, and SZA while sketching inspiration from the murals of Shepard Fairey and the graphic novels of Chris Ware, attending
    open‑mic nights that showcase spoken‑word poets like Sarah Kay and immersing themselves in street‑art tours of Oakland and Berkeley, and they often share their curated playlists on social media.
  travel: Melissa Jackson prefers low‑key road trips that blend art exploration and nature, having visited the vibrant mural scene of Detroit, the street‑art districts of Berlin, and the coastal cliffs
    of Big Sur, while dreaming of a future backpacking journey through Mexico's galleries in Oaxaca and the historic alleyways of Lisbon, and they frequently document the trips on their phone.
  culinary: Melissa Jackson experiments in the kitchen by mixing classic soul‑food staples like collard greens and cornbread with West‑Coast twists such as avocado salsa and fish tacos, frequently preparing
    a weekend brunch of sweet potato pancakes drizzled with maple‑chipotle sauce while occasionally burning the edges of a mac and cheese due to multitasking between cooking and sketching, and they love
    to post pictures of their dishes on Instagram.
  core: Melissa Jackson, a 19‑year‑old budding visual storyteller, fuses street‑art inspiration with a laid‑back, community‑oriented vibe, even if their schedule often resembles a collage of last‑minute
    plans, and they often juggle multiple projects with a smile.
background:
  cultural: Melissa is a Black American raised in Pittsburg, CA, within a close‑knit working‑class family. Her upbringing is colored by the rich cultural tapestry of the Bay Area's African‑American community,
    including frequent participation in church events, Juneteenth celebrations, and local Black art festivals. She grew up listening to West Coast hip‑hop and soul music, which shaped her artistic sensibilities.
    Family gatherings often feature soul food dishes like collard greens and cornbread, while community centers provide safe spaces for youth mentorship and creative expression. These experiences have fostered
    a strong sense of cultural pride, community responsibility, and an appreciation for the historical and contemporary contributions of Black artists and activists.
attributes:
  skills: '["Basic computer and internet research skills","Social media content creation (Instagram, TikTok)","Sketching and doodling","Smartphone photography","Creative writing (poetry, short stories)","Peer
