  hobbies: '["Exploring Bay Area street art and murals","Listening to soul, hip‑hop, and R&B music","Sketching and digital illustration","Reading graphic novels and poetry","Watching documentaries on culture
    and social issues","Cooking family meals with multicultural influences","Attending open‑mic nights and creative workshops"]'
  career_goals: Melissa aspires to continue her education at a community college and eventually earn a degree in graphic design or visual communication. She hopes to combine her love for art with community
    outreach, perhaps working as a youth arts facilitator at a local cultural center or a nonprofit that uses visual media for social change. In the long term, she dreams of building a freelance portfolio
    that allows her to create murals, digital illustrations, and social media campaigns that highlight Black cultural stories and empower her neighborhood. She values flexibility, creativity, and the ability
    to make a positive impact on others.
