  career_goals: Summer intends to complete a bachelor’s degree in marketing and communications within the next two years, securing a summer internship at a regional firm to gain real‑world experience. Her
    short‑term goal is to become a marketing coordinator where she can apply her blend of creative curiosity and data‑driven analysis. In the long term she aspires to a senior brand strategist or event
    director role, eventually launching her own community‑focused digital media consultancy that partners with local small businesses and nonprofit organizations.
