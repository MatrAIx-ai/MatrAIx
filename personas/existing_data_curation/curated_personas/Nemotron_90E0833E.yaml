personas:
  professional: Summer Russo is a budding marketing coordinator‑in‑training who leverages her public speaking prowess, event‑planning savvy, and data‑driven competitive analysis to craft polished campaigns
    for campus clubs, while her competitive streak and flexible organization keep deadlines met despite last‑minute pivots.
  sports: Summer Russo dominates the campus intramural volleyball league, leads weekend treks through Hocking Hills, roots for the Cleveland Cavaliers and Ohio State Buckeyes, and balances high‑energy spin
    classes with restorative Vinyasa yoga to keep her competitive edge sharp.
  arts: Summer Russo curates her Instagram feed with moody street photography inspired by Nan Goldin, reels in behind‑the‑scenes moments from live concerts featuring Lizzo and Tame Impala, and unwinds by
    binge‑watching indie dramas starring Saoirse Ronan, blending visual storytelling with a soundtrack of modern pop.
  travel: Summer Russo maps out spontaneous road trips to nearby natural gems like Hocking Hills, documents every summit on her phone, and dreams of backpacking through Kyoto’s cherry‑blossom gardens and
    sipping espresso in Rome’s Trastevere, balancing tight student budgets with a love for immersive, culture‑rich experiences.
  culinary: Summer Russo, a self‑titled foodie, excels at whipping up avocado‑toast topped with poached eggs and harissa, savors a bowl of spicy tuna poke with sesame seeds, and indulges in craft coffee
    drinks like oat‑milk latte with cinnamon, often photographing her plates for her travel‑food Instagram series.
  core: Summer Russo blends a competitive spark, curiosity‑driven marketing ambition, and a penchant for spontaneous concert‑ticket splurges into a lively, slightly skeptical, and constantly organized college
    adventure.
background:
  cultural: Summer grew up in a middle‑class white family in Mount Vernon, Ohio. Her upbringing reflects traditional Midwestern values such as community involvement, modesty, and a strong work ethic, reinforced
    by participation in local church events, high school sports, and county fairs. While her ancestry includes Irish and German roots, she blends small‑town American culture with broader perspectives gained
    through college, travel, and digital media exposure.
