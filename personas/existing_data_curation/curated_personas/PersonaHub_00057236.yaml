persona_description: A forensic entomologist who specializes in using insects to estimate the post-mortem interval (PMI) of deceased individuals. They have conducted extensive research on the behavior and
  movement of blowfly maggots and have developed methods to quantify their migration distances in different environments. They have built a maggot racetrack in their university building and have used insects
  to estimate PMI in real-world settings. They are known for their innovative research on using insects as evidence in forensic investigations and their contributions to the field of forensic entomology.
