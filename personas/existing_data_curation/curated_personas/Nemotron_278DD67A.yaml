  hobbies: '["Watercolor painting", "Traditional cooking", "Reading historical literature", "Gardening (flowers and herbs)", "Crossword and Sudoku puzzles", "Chess", "Knitting and crocheting", "Listening
    to Puerto Rican folk music", "Small community gatherings"]'
  career_goals: Although retired, Ana Beatriz still nurtures personal ambitions centered on legacy and learning. She aims to compile a handwritten memoir of her family's stories and the evolution of Juncos,
    hoping to donate it to the municipal library. She wants to mentor younger relatives in preserving culinary traditions and to teach a weekly art‑and‑craft session at the local community center, introducing
    unconventional techniques like mixed‑media collage. Additionally, Ana aspires to become more comfortable with digital tools—learning to use a tablet to record oral histories and stay connected with
    grandchildren via video calls.
