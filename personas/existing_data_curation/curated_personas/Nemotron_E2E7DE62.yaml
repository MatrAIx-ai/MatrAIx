  career_goals: Hoping to translate his practical abilities into a stable source of income, Jerry plans to first obtain his GED within the next twelve months. He then intends to enroll in a community‑college
    certification program in electrical work or HVAC, fields that align with his hands‑on strengths and offer flexible scheduling. His long‑term ambition is to launch a small home‑repair and maintenance
    business that allows him to work around family commitments while providing reliable earnings. Additionally, Jerry aspires to deepen his involvement in local mentorship programs, guiding at‑risk youth
    in his community.
