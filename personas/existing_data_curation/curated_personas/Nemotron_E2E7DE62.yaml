personas:
  professional: Jerry Hilliman, a 42‑year‑old practical fixer who thrives on turning everyday problems into solutions, is leveraging his decades of self‑taught home‑repair, budgeting, and conflict‑mediation
    skills toward a GED, followed by an electrical/HVAC certification, with the aim of launching a family‑friendly handyman business that blends structure with flexibility.
  sports: Jerry Hilliman keeps active by coaching their kids in the Riverfront Youth Basketball League, cheering the Dallas Cowboys and Los Angeles Lakers each season, and unwinding on weekend fly‑fishing
    outings along the Green River, where they practice catch‑and‑release to protect the local ecosystem.
  arts: Jerry Hilliman spends quiet evenings listening to timeless R&B and jazz legends like Aretha Franklin, Marvin Gaye, Nina Simone, and John Coltrane, frequently sharing these tunes with their spouse
    while cooking, and occasionally attends the community gospel choir’s Sunday performances.
  travel: Jerry Hilliman favors road‑trip getaways that blend fishing, food, and family, having spent a summer weekend at Lake of the Ozarks for catfish and another holiday in New Orleans sampling gumbo
    and jazz, yet always books last‑minute accommodations to stay within the family budget.
  culinary: Jerry Hilliman is a competent home cook who specializes in Southern comfort dishes—fried catfish, collard greens with smoked turkey, peach cobbler, and honey‑glazed okra—often incorporating
    fresh harvests like tomatoes, sweet potatoes, and garden herbs into meals.
  core: Jerry Hilliman is a steady‑handed, community‑oriented DIY enthusiast who balances garden chores, soulful playlists, and family commitments, while habitually delaying tax filing until the final days
    of the deadline.
background:
  cultural: Jerry is an African‑American man raised in the Mid‑Atlantic region, reflecting the cultural tapestry of Delaware’s Black community. His upbringing was shaped by strong family ties, church involvement,
    and the traditions of Southern cuisine passed down from his grandparents who migrated north during the Great Migration. He identifies with the communal values of mutual support and resilience prevalent
    in his neighborhood, and he maintains ties to local cultural events such as the Dover Black Heritage Festival. This background informs his emphasis on family harmony, community service, and the preservation
    of culinary and musical traditions.
