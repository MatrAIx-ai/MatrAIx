persona_description: A healthcare professional who specializes in toxicology and emergency medicine. They are familiar with a variety of laboratory blood tests and medical procedures used to diagnose and
  treat ethylene glycol and propylene glycol toxicity. They are trained in administering and interpreting urine tests for the presence of calcium oxalate or hippurate crystals, and are aware of the importance
  of renal damage without the presence of these crystals. They are also knowledgeable about the use of special lighting to test urine for the presence of ethylene glycol and other toxic substances.
