  hobbies: '[''Golf'', ''Bowling'', ''Community Volunteering'', ''Church Activities'', ''Gardening'', ''Fishing'', ''Classic Car Shows'', ''Texas Barbecue Cookouts'', ''Reading Historical Non-Fiction'',
