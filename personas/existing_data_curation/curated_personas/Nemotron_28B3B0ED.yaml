  career_goals: Approaching retirement, Abraham aims to ensure a smooth succession by mentoring a younger generation of managers and formalizing standard operating procedures for his department. He is pursuing
    a Project Management Professional (PMP) certification to bolster his consulting credentials, with the long‑term ambition of offering part‑time operational consulting to small businesses in Plano. Additionally,
    he seeks to increase his involvement in community service, particularly by leading volunteer initiatives that improve local senior services. Balancing his professional legacy with personal well‑being,
    Abraham also prioritizes managing his stress through better work‑life integration.
