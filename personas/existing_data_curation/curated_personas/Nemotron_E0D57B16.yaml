  career_goals: Khan aims to move into a supervisory role within the facilities management department, seeking certification in environmentally‑focused cleaning (e.g., LEED Accredited Professional) to lead
    a green‑initiatives team. He hopes to mentor younger custodial staff, leveraging his practical experience and curiosity to improve workplace efficiency. Long‑term, he envisions starting a small, niche
    cleaning service that specializes in eco‑friendly maintenance for local businesses, providing financial stability for retirement while staying competitive and active in his field.
