  career_goals: Ut aspires to move into a supervisory role within the next two years, aiming to become a shift lead who drives continuous‑improvement projects and mentors a diverse team. She plans to obtain
    a Six Sigma Yellow Belt certification and enroll in part‑time courses in industrial engineering to broaden her technical expertise. Long‑term, she envisions a senior operations manager position where
    she can influence plant‑wide efficiency, and she also dreams of eventually launching a boutique that showcases her own artwork and curated Asian‑inspired home décor.
