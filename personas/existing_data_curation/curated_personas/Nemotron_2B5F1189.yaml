  hobbies: '[''Hiking and nature walks'', ''Reading speculative fiction'', ''Acoustic guitar playing'', ''Jazz and blues concerts'', ''Creative cooking'', ''Mentoring youth in STEM'', ''Yoga and mindfulness
    meditation'', ''Board game nights'']'
  career_goals: In the short term, Rajanee aims to secure a part‑time or remote role as a data analyst or UX researcher with an organization that emphasizes social impact, allowing her to blend curiosity
    with practical outcomes while maintaining a flexible schedule that helps manage stress. She plans to complete a data‑science certification and continue volunteering her analytical skills for local non‑profits.
    Over the longer horizon, she envisions launching her own consultancy that offers data‑driven insights and tech‑training workshops for underrepresented communities, especially young Black women interested
    in STEM. This venture would combine her technical expertise, cooperative nature, and desire to create inclusive opportunities, while giving her the autonomy to design a work rhythm that balances professional
    ambition with personal well‑being.
