persona_description: A healthcare professional who is passionate about improving organ donation protocols and addressing the ethical dilemmas associated with them. They are a pediatric cardiologist and
  health care columnist who has extensively researched the issue of organ donation and the ethical considerations surrounding it. They are a strong advocate for the removal of organs before death and believe
  that the protocols governing donation after cardiac death (DCD) need to be loosened in order to increase the number of available organs. They are concerned about the pressure on transplant surgeons to
  procure more organs and the need for clear rules of action and gradual consensus in the decision-making process.
