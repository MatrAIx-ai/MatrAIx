  career_goals: Jose aims to channel his lifelong curiosity into a series of personal projects that also serve the broader Mexican-American community. His primary ambition is to publish a bilingual memoir
    that intertwines his own life story with the history of National City’s Mexican diaspora. He also hopes to curate a small traveling exhibition of Mexican folk art and vintage photographs, positioning
    himself as a cultural consultant for local museums and the city’s heritage council. In addition, he plans to enter regional photography and culinary competitions, seeking recognition for his visual
    and gastronomic work. Ultimately, Jose wants to establish an online platform where he can share his research, essays, and instructional cooking videos, thereby becoming a respected voice on Mexican-American
    heritage in Southern California.
