personas:
  professional: Evan Vaughn, a 17‑year‑old aspiring mechanic‑fabricator, blends their hands‑on expertise in automotive maintenance, woodworking, and basic electronics with a pragmatic curiosity, and they
    plan to enroll in a community‑college automotive technology program or a welding apprenticeship, reflecting a balanced, organized reliability.
  sports: Evan Vaughn, who plays pickup basketball at the Elk Community Gym and follows the Seattle Seahawks, Seattle Mariners, and Spokane Chiefs, spends their free weekends hiking the Selkirk Mountains
    for cardio and occasionally joins a local youth fishing club, and they maintain a flexible yet disciplined fitness routine.
  arts: Evan Vaughn, whose creative outlet includes building birdhouses and coding simple games, draws artistic inspiration from the folk sounds of Mumford & Sons, the storytelling of documentary narrator
    David Attenborough, and the practical tutorials of woodworking YouTuber Steve Ramsey, and they weave practical creation with a love for visual and auditory narratives.
  travel: Evan Vaughn, who prefers low‑budget, self‑planned weekend escapades, has already trekked the alpine trails of Mount Rainier, camped along the scenic riverbanks of the Cowlitz, and dreams of a
    summer road trip to the Oregon Coast and an ambitious backpacking adventure through Banff National Park, and they balance a modest travel fund with a deep hunger for immersive nature experiences.
  culinary: Evan Vaughn, whose cooking skill ranges from competent home‑cook to enthusiastic camp‑chef, frequently prepares pan‑seared trout with lemon‑herb butter, hearty campfire chili spiced with smoked
    paprika, and rustic apple‑cinnamon crumble using fresh garden apples, wild rosemary, and locally foraged mushrooms, and they favor protein‑rich, wholesome meals that fuel their active lifestyle.
  core: Evan Vaughn, a 17‑year‑old practical tinkerer with a passion for the outdoors, balances a reliable, organized work ethic with a habit of postponing school projects for a quick woodworking build
    or a drone flight, and they embody curiosity tempered by steadiness.
background:
  cultural: Evan identifies with the mainstream White American culture typical of rural eastern Washington. Growing up in Elk, Spokane County, he has been shaped by the region’s strong ties to the outdoors,
    self‑reliance, and close‑knit community values. Local traditions such as county fairs, hunting season, and community volunteer events influence his worldview, while his family’s emphasis on practical
    skills and modest education reflects the pragmatic, hardworking heritage of many small‑town Pacific Northwest families.
