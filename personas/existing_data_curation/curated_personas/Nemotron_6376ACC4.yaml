  career_goals: Evan aims to turn his practical talents into a stable, skilled trade. He plans to enroll in a community‑college automotive technology program or a welding apprenticeship, eventually becoming
    a certified mechanic or fabricator. He is also open to combining his love of the outdoors with a career, such as working for the Washington State Department of Natural Resources as a forestry technician
    or guiding eco‑tourism trips. His ambition is to secure a career that offers both reliable earnings and the chance to keep learning new technical skills.
