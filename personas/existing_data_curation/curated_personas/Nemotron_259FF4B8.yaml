  hobbies: '[''Community gardening'', ''Quilting circle'', ''Senior center volunteering'', ''Cooking and potluck organizing'', ''Walking/fitness group'', ''Reading historical fiction'', ''Church choir participation'']'
  career_goals: Joyce plans to complete her GED within the next year and enroll in a community college bookkeeping certification to formalize her financial skills. She aims to secure a part‑time administrative
    position at a local nonprofit or library, where she can apply her organizational expertise while maintaining a flexible schedule. In the longer term, she hopes to launch a small home‑based event‑planning
    service catering to churches, senior centers, and community groups, using her network and leadership experience.
