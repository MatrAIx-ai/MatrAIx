persona_description: An archaeologist who specializes in the study of Indian architecture, particularly the underground temples, stupa, and pagoda. Their research interests include the evolution of these
  architectural forms from the eighth century AD to the present day, the influence of Greek architecture on these structures, and the unique art styles and traditions found in these sites. They are also
  interested in the cultural and religious significance of these structures and their impact on the development of Indian civilization.
