  hobbies: '["Drawing and painting", "Reading fantasy and adventure books", "Building LEGO structures", "Solving jigsaw puzzles", "Exploring backyard nature (collecting insects, rocks)", "Using Scratch
    Jr. to create simple animations", "Playing the piano (simple songs)", "Sketching wildlife"]'
  career_goals: As a seven‑year‑old, Daniel’s aspirations blend his love of discovery, creativity, and quiet concentration. He often says he wants to become an astronaut to explore space, a wildlife conservationist
    to protect animals, or a graphic animator who brings his drawings to life. He is fascinated by people who work independently on projects that improve the world, such as engineers designing sustainable
    solutions or museum curators preserving art. Daniel hopes one day to attend a university where he can study both science and visual arts, and he envisions a career that lets him work in a calm, focused
    environment while contributing to a larger cause.
