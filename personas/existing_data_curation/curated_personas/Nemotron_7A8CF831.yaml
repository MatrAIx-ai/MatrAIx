personas:
  professional: Konika Shabazz, a seasoned maintenance technician at a large Ohio facility, blends methodical troubleshooting and meticulous documentation with a curiosity for sustainable technologies,
    and they assertively mentor junior staff while championing eco‑friendly retrofits.
  sports: Konika Shabazz, an avid walker who logs sunrise jogs along the Cuyahoga Valley trails, joins the local senior softball league in the spring, follows the Cleveland Browns and Cleveland Cavaliers
    closely, and they balance cardio with low‑impact strength training to manage knee osteoarthritis.
  arts: Konika Shabazz, a frequent visitor to the Cleveland Museum of Art and community mural projects, draws inspiration from the vibrant canvases of local painter Jacob Tomlinson and the soulful melodies
    of Al Green, and they often incorporate artistic motifs into home‑repair designs while regularly discussing the performances of Broadway star Audra McDonald and the visual storytelling of photographer
    Gordon Parks.
  travel: Konika Shabazz, who prefers meticulously planned road trips that blend scenic nature stops like a weekend at Niagara Falls and a hike in the Appalachian Trail with cultural visits to historic
    towns such as Savannah and a long‑awaited overseas adventure to Edinburgh, Scotland, balances their love of exploration with a modest travel budget that prioritizes family visits and occasional community
    cultural festivals.
  culinary: Konika Shabazz, an enthusiastic home cook whose culinary repertoire ranges from classic collard greens simmered with smoked turkey and sweet potato pie to herb‑infused grilled chicken seasoned
    with rosemary and basil from their garden, enjoys hosting potlucks for the church community while they occasionally indulge in a slice of cheesecake after a long shift.
  core: Konika Shabazz, a methodical maintenance veteran with a deep love for murals and a habit of checking their phone for weather alerts before every outdoor project, balances an iron‑clad work ethic
    with lingering worries about the future and a sweet tooth for midnight pecan pie, and they often find themselves humming gospel choruses while tightening a bolt.
background:
  cultural: Konika identifies as African American and draws strength from the rich cultural traditions of her community in Ohio. Her upbringing emphasized the importance of hard work, mutual support, and
    faith, often expressed through church gatherings, soul food cooking, and gospel music. She cherishes family storytelling sessions that highlighted resilience across generations, which inform her compassionate
    yet assertive approach to both personal and professional challenges. Konika actively participates in local Black cultural events, such as the annual Juneteenth celebration and community forums that
    address social equity in the trades. This cultural heritage shapes her commitment to mentorship, community uplift, and preserving artistic expression within everyday spaces.
attributes:
  skills: '[''HVAC maintenance and repair'', ''Electrical wiring and fixture installation'', ''Plumbing troubleshooting and repairs'', ''Carpentry and fixture installation'', ''Preventative maintenance
    planning'', ''Safety compliance (OSHA) and inspections'', ''Inventory control and parts ordering'', ''Maintenance software data entry'', ''Mentoring and on‑the‑job training'', ''Integration of aesthetic
    considerations in functional spaces'']'
  hobbies: '[''Visiting art museums and galleries'', ''Community mural and public art projects'', ''Reading historical biographies and contemporary fiction'', ''Gardening and herb cultivation'', ''Knitting
    and craft circles'', ''Volunteering to teach DIY home‑repair at a youth center'', ''Hiking and nature walks in Cuyahoga Valley National Park'']'
  career_goals: Konika aims to advance to a senior maintenance supervisor role within the next three years, obtaining certifications such as HVAC Specialist, Electrical Safety, and a Certified Maintenance
    Manager credential. She hopes to mentor younger workers, particularly women of color entering the trades, and to introduce eco‑friendly practices like energy‑efficient retrofits at her workplace. Long‑term,
    she dreams of starting a small, community‑focused maintenance consulting business that offers affordable services and workshops on DIY home repair, while also collaborating with local artists to improve
    public spaces. Financially, she seeks a stable retirement fund that will allow her to support her adult children and eventual grandchildren.
