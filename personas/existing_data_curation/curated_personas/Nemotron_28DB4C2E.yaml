  hobbies: '[''vegetable gardening'', ''traditional Mexican cooking'', ''reading mystery novels'', ''knitting'', ''hiking local trails'', ''community volunteer teaching Spanish'', ''listening to folk music'',
    ''watching classic films'']'
  career_goals: Zulma aims to advance to a shift‑supervisor role within the next two to three years, leveraging her hands‑on experience to lead a small team on the production floor. She plans to earn a
    Lean Manufacturing certification and pursue an associate degree in industrial technology or safety management. Her longer‑term ambition is to move into quality‑assurance or training, where she can mentor
    new employees and help promote a safe, harmonious work environment while maintaining the flexible schedule she values for her family.
