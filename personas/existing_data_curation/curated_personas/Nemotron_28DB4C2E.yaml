personas:
  professional: Zulma Leyva is an assembly‑line technician who excels at preventive maintenance, troubleshooting mechanical issues, and conducting quality inspections, using her bilingual communication
    and methodical yet flexible mindset to keep production humming while quietly preparing for a future shift‑supervisor role.
  sports: Zulma Leyva enjoys weekly hikes on the gentle foothill trails of Idaho and cheers for the Boise State Broncos football team and the Idaho Steelheads hockey squad, while also participating in a
    casual community softball league during the summer.
  arts: Zulma Leyva unwinds to folk tunes by John Denver and Joan Baez, watches classic cinema such as Casablanca and The Apartment, and finds creative inspiration in knitting while devouring mystery novels
    by Agatha Christie.
  travel: Zulma Leyva favors low‑key road trips to nearby natural wonders like Crater Lake and the Columbia River Gorge, dreams of strolling through the historic streets of Barcelona after finishing a historical‑fiction
    novel, and plans a family getaway to Banff National Park, balancing a modest travel budget with a love for scenic exploration.
  culinary: Zulma Leyva delights in garden‑to‑table cooking, often preparing homemade tortillas, slow‑braised pork with chilies, fresh salsa verde, and herb‑infused soups, showcasing a middle‑skill kitchen
    repertoire that blends traditional family recipes with fresh herbs harvested from their own garden.
  core: Zulma Leyva balances a methodical work ethic with a delightfully chaotic garden, where they sometimes forget to water plants but never miss a production safety check, embodying a calm, structured
    mind that still treasures spontaneous moments.
background:
  cultural: Zulma is of Mexican heritage; she was born in Mexico and moved to the United States as a child, growing up in a bilingual household that celebrated Día de los Muertos, Cinco de Mayo, and family‑centered
    holiday traditions. Her upbringing emphasized Mexican cuisine, folk music, and Catholic values, while her adult life in Nampa, Idaho has blended these traditions with the local community. She participates
    in regional Hispanic festivals, volunteers in bilingual outreach programs, and brings Mexican cultural practices into her daily routine, fostering a sense of harmony and hospitality that reflects both
    her roots and her adopted home.
attributes:
  skills: '[''assembly line operation'', ''machine troubleshooting'', ''quality inspection'', ''inventory management'', ''health and safety compliance'', ''bilingual communication (Spanish/English)'', ''basic
