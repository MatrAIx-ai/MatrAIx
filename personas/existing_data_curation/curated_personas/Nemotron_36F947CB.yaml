  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Herb gardening'', ''Knitting and crocheting'', ''Birdwatching'', ''Crossword puzzles'', ''Landscape photography'', ''Baking Southern
    desserts'', ''Listening to classical and jazz music'', ''Meditation/quiet prayer'']'
  career_goals: Cecilia aims to progress to a supervisory role on the night shift, where she can combine her preference for solitude with leadership responsibilities. She plans to obtain a hospitality management
    certificate to formalize her expertise, develop advanced revenue‑management skills, and mentor incoming desk clerks. Long‑term, she envisions opening a modest boutique bed‑and‑breakfast in the Sumter
    area, using her deep local knowledge and customer‑service experience to create a quiet, personalized lodging experience for travelers.
