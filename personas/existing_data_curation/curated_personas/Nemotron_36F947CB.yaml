personas:
  professional: Cecilia Raphael is a seasoned front‑desk professional who thrives on managing night‑shift hotel operations, using her meticulous record‑keeping, calm under pressure, and extensive knowledge
    of local attractions to personalize guest experiences, while quietly supervising new clerks and longing for a supervisory role that lets her enjoy the solitude of the midnight lobby.
  sports: Cecilia Raphael enjoys low‑impact fitness through early morning birdwatching walks along Sumter’s nature trails and a weekly senior‑league pickleball session, while cheering quietly for the Carolina
    Panthers and the Atlanta Braves on game nights, preferring solitary activity over crowded gyms.
  arts: Cecilia Raphael indulges in the arts by knitting intricate lace shawls while listening to Miles Davis and Beethoven, devouring historical fiction by Philippa Gregory, and attending intimate chamber
    music recitals at her church, which together nurture her love for narrative detail and structured creativity.
  travel: Cecilia Raphael prefers meticulously planned, low‑key trips that balance quiet reflection with cultural immersion, such as a weekend photo expedition along the Blue Ridge Parkway, a genealogical
    pilgrimage to York, England to explore ancestral archives, and a leisurely river cruise on the Mississippi, always allocating extra time for unscheduled stops at local cafés and herb markets.
  culinary: Cecilia Raphael delights in baking classic Southern desserts like peach cobbler, pecan pie, and hummingbird cake, often seasoning her savory dishes with fresh thyme, rosemary, and lavender from
    her herb garden, while her amateur pastry skills are enhanced by precise measurements—a habit honed from her front‑desk attention to detail—yet she sometimes over‑sweetens her treats in a quest for
    the perfect flavor.
  core: Cecilia Raphael, a 59‑year‑old hospitality veteran with a love for solitary precision, balances a competitive streak in night‑shift supervision with a habit of over‑packing crossword puzzles, herb‑infused
    baking, and spontaneous birdwatching detours.
background:
  cultural: Cecilia grew up in a traditional white Southern family in South Carolina, where hospitality, church involvement, and community ties shaped her values. Raised in a modest, middle‑class household,
    she was taught the etiquette of polite service and the importance of self‑reliance. Her upbringing in Sumter exposed her to the region’s culinary traditions, Southern gospel music, and a strong sense
    of local history, all of which influence her personal and professional identity. While she respects the cultural norms of her community, her pragmatic nature and preference for quiet independence guide
    her contemporary outlook.
attributes:
  skills: '[''Front desk operations'', ''Reservation management (OPERA)'', ''Guest check-in/check-out'', ''Cash handling'', ''Telephone communication'', ''Local area knowledge'', ''Upselling services'',
