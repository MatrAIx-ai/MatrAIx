  hobbies: '[''Quilting'', ''Gardening'', ''Church choir singing'', ''Playing bridge'', ''Reading classic literature'', ''Watercolor painting'', ''Attending local theater productions'', ''Walking nature
    trails'', ''Listening to jazz and big band music'', ''Participating in senior center social activities'']'
  career_goals: Although she is 88, Sarah wishes to continue working part‑time to preserve her independence and maintain a steady income for modest expenses. She hopes to mentor younger custodial staff,
    passing on her practical knowledge and emphasizing respectful, empathetic service. Sarah also dreams of volunteering to lead a small arts‑and‑crafts workshop for seniors at the local community center,
    where she can combine her love of cleaning, community harmony, and creative expression. Ultimately, she aims to stay healthy, remain socially engaged, and leave a gentle legacy of kindness and creativity
    in her town.
