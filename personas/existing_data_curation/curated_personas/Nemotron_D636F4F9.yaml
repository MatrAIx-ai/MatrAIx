personas:
  professional: A seasoned custodial professional, Sarah Yang, leverages six decades of expertise in commercial floor care, minor plumbing, and safety inspections while channeling her curious, sociable,
    and emotionally responsive nature into mentoring younger staff and organizing community‑wide arts‑and‑crafts clean‑up workshops.
  sports: Sarah Yang stays fit by strolling the nearby nature trails with her portable radio tuned to classic jazz, participates in the senior center’s weekly walking club, and cheers on the Atlanta Braves
    and South Carolina Gamecocks while occasionally joining a low‑impact chair‑yoga class at the community center.
  arts: Sarah Yang expresses her creative spirit through quilting folk‑art motifs, watercolor painting of garden scenes, and singing Mahalia Jackson’s gospel hymns in the Methodist choir, while also finding
    inspiration in the works of William Faulkner, the music of Duke Ellington, and the pottery of folk artist Mary Grimes.
  travel: Sarah Yang enjoys short‑distance trips to historic Charleston and Asheville, cherishes a yearly pilgrimage to Savannah’s riverfront festivals, and dreams of a gentle cruise to New Orleans for
    its jazz heritage, all planned with the assistance of her adult daughter to accommodate her limited stamina.
  culinary: Sarah Yang prefers home‑cooked Southern comfort meals like tomato‑basil soup, herb‑roasted chicken, and shrimp‑and‑grits, skillfully incorporates fresh tomatoes, basil, and garden thyme from
    her plot, and occasionally treats herself to a slice of pecan pie at the local diner.
  core: Sarah Yang blends a lifetime of custodial precision, community‑center creativity, and gentle anxiety into a routine of quilting, choir singing, and garden walks, always humming a jazz tune while
    double‑checking her garden’s water timer.
background:
  cultural: Sarah Nicole Yang was born and raised in Latta, Marlboro County, South Carolina, into a family of long‑time Southern farmers. Though identified ethnically as white, her surname reflects a marriage
    into an extended family with Asian ancestry, which she honors with occasional cultural dishes at family gatherings. Growing up in the 1930s and 1940s, she experienced the agrarian rhythms of the South,
    attended a one‑room schoolhouse, and later worked as a domestic helper before finding a lifelong career in building maintenance. Her upbringing was steeped in Southern hospitality, Methodist church
    traditions, and community values that emphasize modesty, mutual aid, and respect for elders. These cultural roots have shaped her strong sense of duty, love for folk crafts, and willingness to explore
    new ideas while maintaining a warm, approachable demeanor.
