  hobbies: '[''Gardening'',''Quilting and crocheting'',''Canning and food preservation'',''Reading historical fiction'',''Birdwatching'',''Walking/hiking'',''Church and community events'',''Crossword puzzles'',''Sudoku'']'
  career_goals: Although retired from formal employment, Ashley’s ambitions center on deepening her contributions to the community and personal growth. She plans to earn a certification in CPR and first‑aid
    to support her husband and local seniors, expand the neighborhood garden project she volunteers to lead, and mentor younger volunteers in event organization. Additionally, she hopes to transform her
    quilting hobby into a modest online boutique to fund scholarships for local high‑school students, and to complete a family genealogy research project that preserves her ancestors’ story.
