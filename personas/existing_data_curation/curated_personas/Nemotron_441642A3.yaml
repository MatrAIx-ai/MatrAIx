personas:
  professional: Hector Acevedo, a seasoned hospitality professional in South Florida, blends a STEM foundation with a warm, talkative demeanor to streamline front‑desk operations, train staff through hands‑on
    demos, troubleshoot property‑management systems, and champion mobile check‑in technology as they pursue a front‑office manager role.
  sports: Hector Acevedo, an avid weekend angler targeting snook along the Atlantic coast and a member of the Boca Raton Fishing Club, also enjoys cheering on the Miami Heat and Miami Dolphins, while they
    play casual softball with friends at the local park each spring.
  arts: Hector Acevedo, a self‑taught acoustic guitarist, frequently sings along to cumbia legends like Los Ángeles Azules and salsa icons such as Celia Cruz, reads classic science‑fiction novels by Isaac
    Asimov and Frank Herbert, and they volunteer at the senior center’s cultural festivals, where they showcase traditional dance performances.
  travel: Hector Acevedo prefers short, flexible getaways, often driving to the Florida Keys for a relaxed beach weekend, has explored the Caribbean islands of the Bahamas and Jamaica, and they dream of
    visiting the historic streets of Cartagena, all while balancing family commitments and a modest travel budget.
  culinary: Hector Acevedo, a passionate home chef, perfects pupusas stuffed with cheese and loroco, simmered tamales with pork and masa, and prepares fresh grilled snook seasoned with lime, garlic, and
    cilantro, while they experiment with a homemade salsa roja that showcases locally sourced tomatoes and chilies.
  core: Hector Acevedo is a sociable, tech‑savvy hospitality veteran who cooks, fishes, and sings their way through life, and they often juggle anxiety and disorganization with bursts of creative energy.
background:
  cultural: Hector is a first‑generation Salvadoran‑American whose parents emigrated from El Salvador in the late 1970s. He grew up speaking Spanish at home and English at school, giving him a bicultural
    fluency that he brings to his work. Family traditions such as Sunday pupusa nights, celebrating Semana Santa, and attending the annual Salvadoran Festival in nearby West Palm Beach keep his heritage
    alive. Living in Jupiter, Florida, he blends these customs with the coastal lifestyle—frequent beach outings, involvement in the local Hispanic community, and a love for Florida’s outdoor recreation.
    His cultural identity informs his warm, hospitality‑focused demeanor and his pride in sharing Salvadoran music and cuisine with guests.
