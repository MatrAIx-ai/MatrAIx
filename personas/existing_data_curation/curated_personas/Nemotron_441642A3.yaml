  hobbies: '["Cooking Salvadoran cuisine", "Dancing to cumbia and salsa", "Fishing", "DIY electronics (Arduino projects)", "Reading science‑fiction", "Playing acoustic guitar", "Volunteering at senior center",
    "Attending community festivals", "Socializing at local cafés", "Photography of coastal scenery"]'
  career_goals: Hector aims to rise to a front‑office manager position within the next three years, leveraging his technical background to modernize the hotel's check‑in process with mobile and self‑service
    technologies. His longer‑term ambition is to open a small boutique guest‑services consultancy that helps independent hotels in South Florida improve guest experience through personalized concierge services
    and tech integration. He also wishes to achieve financial security for his family and eventually retire near the coast with a small garden where he can grow fresh herbs.
