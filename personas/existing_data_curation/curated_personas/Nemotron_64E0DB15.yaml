personas:
  professional: James Roy is a budding builder who spends hours stacking wooden blocks, developing early spatial reasoning, organizational habits, and practical problem‑solving skills, and their love of
    routine makes them reliably tidy up the play area after each session.
  sports: James Roy is a mini‑soccer enthusiast who dribbles a size‑3 ball at the community recreation center's toddler league, cheers for the local baseball team the River City Rovers, and enjoys the occasional
    splash‑play at the neighborhood pool, balancing energetic activity with frequent naps.
  arts: James Roy is an avid fan of The Wiggles' catchy tunes, delights in watching Disney's short cartoons, and often recreates Eric Carle's colorful collages with finger paints, letting music and bright
    visuals shape their playful imagination.
  travel: James Roy is a curious explorer who has visited the family’s grandparents’ farm in the countryside, enjoyed a day trip to the city zoo, and dreams of seeing the towering arches of the Eiffel Tower
    someday, favoring short, parent‑guided excursions over long journeys.
  culinary: James Roy is a picky eater who adores cheesy macaroni, chicken nuggets, and sweet banana slices, can butter toast with a child‑sized spreader, and loves the crunchy texture of carrot sticks,
    often requesting extra ketchup as a condiment.
  core: James Roy is a routine‑loving, gentle toddler who balances curiosity with caution, keeps a tidy play space, saves every shiny coin, watches The Wiggles, and negotiates snack time with a charming
    stubbornness.
background:
  cultural: James is raised in a middle‑class white family in Cleveland, Ohio, reflecting typical Midwestern values of practicality, community, and routine. His family celebrates seasonal holidays such
    as Thanksgiving and Christmas with familiar traditions, and they attend a local preschool that emphasizes play‑based learning and cooperative social skills. The household may incorporate heritage influences
    common to the region, such as German and Irish customs in food and music. Community involvement through a neighborhood church provides a gentle moral framework that reinforces kindness, responsibility,
    and harmony.
