  equations, the response of dynamic systems, and the study of feedback control systems. The book is written in a clear and accessible style, and is intended to provide a framework for understanding the
  mathematical aspects of engineering systems. The book may be of interest to engineers who are looking for a comprehensive introduction to the mathematical modeling of dynamic systems, or to those who
  are interested in the mathematical analysis of engineering systems.
