personas:
  professional: Cordelia Girardi, a 16‑year‑old budding visual storyteller, blends her love for sketching, watercolor, and digital illustration with the rhythm of rural California fields, channeling her
    curiosity, open‑mindedness, and laid‑back approach into freelance concept‑art aspirations that prioritize flexible schedules and nature‑inspired motifs.
  sports: Cordelia Girardi fuels her love of movement by jogging through orchard rows in the mornings, joining a weekend pick‑up basketball game at the community center, cheering for the San Francisco Giants
    and the local Modesto Nuts, and occasionally participating in her high‑school track club, though she often forgets to stretch afterward.
  arts: Cordelia Girardi immerses herself in indie music from Phoebe Bridgers and Mitski, devours graphic novels like 'Saga' and 'Monstress', draws inspiration from Frida Kahlo and Studio Ghibli, and actively
    participates in local art fairs, often volunteering to run workshops for younger kids while experimenting with experimental watercolors and Scratch animations.
  travel: Cordelia Girardi enjoys spontaneous road trips to Yosemite National Park and the historic Mission San Juan Bautista, dreams of exploring the vibrant markets of Oaxaca and the tranquil temples
    of Kyoto, balances travel budgets with savings from art commissions, and prefers flexible itineraries over rigid plans.
  culinary: Cordelia Girardi delights in farm‑fresh strawberry smoothies, avocado toast with feta, homemade tacos al pastor topped with cilantro, and occasional ramen experiments, boasting moderate cooking
    confidence while habitually sketching plate presentations before she eats.
  core: Cordelia Girardi is a restless 16‑year‑old dreamer who merges farm‑inspired art with indie culture, scrambles through budgets, wrestles with anxiety, and finds solace in sketchbooks, humming playlists,
    and spontaneous orchard walks.
background:
  cultural: Cordelia grew up in Planada, a small agricultural town in Merced County, California. Her family is white American, with roots in the Midwest that relocated to the Central Valley for farm‑related
    work. The region’s blend of agricultural life, a strong sense of community, and multicultural influences—especially the vibrant Latino presence—shaped her view of the world. While her household maintains
    traditional middle‑class values, she has absorbed the open, laid‑back California ethos and a love for the surrounding farmland, which often appears in her artwork. She identifies with a blend of rural
    Californian culture and a broader American artistic sensibility.
attributes:
  skills: '[''sketching'', ''acrylic painting'', ''digital illustration (Procreate)'', ''basic Photoshop editing'', ''simple animation (Scratch)'', ''creative writing'', ''blogging'', ''empathy and active
    listening'', ''social media content creation'']'
  hobbies: '[''sketching and drawing'', ''watercolor painting'', ''digital illustration'', ''simple animation'', ''listening to indie music'', ''reading graphic novels'', ''walking in orchards'', ''journaling'',
    ''volunteering at community art workshops'']'
  career_goals: Cordelia aspires to turn her love of visual storytelling into a career. She plans to obtain her high‑school equivalency, attend a community‑college art program, and eventually work as a
    freelance illustrator or concept artist for games or animation. She values a flexible schedule that allows time for personal projects and hopes to integrate her rural Californian experiences into her
    work, possibly creating artwork that blends nature and cultural motifs.
