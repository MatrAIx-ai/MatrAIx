persona_description: A military historian who specializes in the study of military strategies and tactics, particularly those related to the rise and fall of military elites and the impact of war on social
  and political order. This individual is interested in understanding the dynamics of war and how it influences the development of social and political systems, and how military elites are able to extend
  their power and create hegemonies through the use of extreme measures and the will to use them. They are also interested in the factors that contribute to the longevity of military hegemonies, such as
  the ability to maintain economic and political stability in the societies they govern.
