  career_goals: Davi aspires to blend his love for art and technology by pursuing a career in interactive media or UI/UX design. He aims to attend a high school with strong STEM and arts programs, later
    studying graphic design, computer science, or museum studies at a university. His long‑term ambition is to create immersive museum exhibits or digital art platforms that engage diverse audiences. He
    also entertains the idea of launching a startup that offers educational VR experiences, leveraging his competitive drive and entrepreneurial curiosity.
