  career_goals: Brice aspires to a career that blends his curiosity with practical impact. He dreams of becoming a software engineer or robotics developer, creating tools that simplify everyday tasks and
    support his community. He is also intrigued by environmental engineering or sustainable design, where he could apply his love of nature and problem‑solving. He hopes to earn a degree in computer science
    or engineering, contribute to open‑source projects, and eventually work on innovations that improve the quality of life in his hometown and beyond. He values roles that allow independent focus while
    delivering tangible results.
