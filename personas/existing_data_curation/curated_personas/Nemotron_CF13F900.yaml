personas:
  professional: An inquisitive 11‑year‑old aspiring scientist named Ankita Singh blends a love for hands‑on chemistry kits with comic‑book storytelling, organizing their school projects with the same reliability
    and teamwork they show on the soccer field.
  sports: A dedicated soccer enthusiast named Ankita Singh plays after‑school drills with friends, follows Manchester City’s youth development videos, supports the women’s national team during the World
    Cup, and balances competitive practice with a love for informal sidewalk games, showing the same cooperative spirit they bring to group projects.
  arts: A budding musician and comic artist named Ankita Singh learns tabla rhythms while dancing to Bollywood hits, draws vibrant superhero strips inspired by Stan Lee, and revisits the magical worlds
    of J.K. Rowling’s Harry Potter series for creative fuel, channeling the same structured curiosity they apply to science experiments.
  travel: An adventure‑seeking 11‑year‑old named Ankita Singh loves weekend trips to nearby amusement parks, dreams of exploring the Great Wall of China and the Taj Mahal, and plans to experience Diwali
    light festivals in London with their family, always packing a checklist they meticulously update before each trip.
  culinary: A young culinary explorer named Ankita Singh bakes chocolate chip cookies, rolls samosas and gulab jamun with their mother, and experiments with ingredients like cardamom, chickpea flour, and
    rose water while perfecting the art of festive snack presentation, often counting the exact number of cookies they bake to stay organized.
  core: Ankita Singh is an organized, energetic whiz‑kid who juggles soccer, tabla beats, comic sketches, and cookie baking, often forgetting to floss but always saving a few coins for future adventures.
background:
  cultural: Ankita comes from an Indian South Asian family that maintains rich cultural traditions while residing in Birmingham, Alabama. At home, she speaks Hindi with her parents and celebrates major
    festivals such as Diwali, Holi, and Navratri, often preparing traditional foods like samosas, biryani, and sweets. She participates in a local Indian cultural association's events, learning classical
    dance forms and musical rhythms. Growing up in the Southern United States, she also embraces regional customs, including community potlucks, football games, and Southern hospitality. This blend of Indian
    heritage and Southern upbringing shapes her identity, offering a unique perspective that values family, community, and cultural exchange.
