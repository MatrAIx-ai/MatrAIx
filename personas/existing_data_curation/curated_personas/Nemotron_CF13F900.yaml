  career_goals: Ankita envisions a future where she can blend her love for animals with her methodical, problem‑solving approach, aiming to become a veterinarian or wildlife biologist. She also dreams of
    leading school clubs or community youth programs that bring children together, using her organizational strengths and sociable nature to plan events, mentor peers, and promote teamwork. In the long
    term, she hopes to study biology or environmental science at university and contribute to animal welfare and conservation initiatives.
