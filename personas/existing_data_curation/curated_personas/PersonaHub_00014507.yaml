persona_description: A marine biologist who specializes in the study of coral reefs and their associated organisms, particularly the effects of climate change on coral trout, Plectropomus leopardus. Her
  research focuses on understanding the impact of rising sea surface temperatures on coral reefs and the species that depend on them, and how this affects the fishery. She is part of a larger research team
  studying the effects of climate change on coral trout, and her work is supported by a fellowship from the Australian Museum.
