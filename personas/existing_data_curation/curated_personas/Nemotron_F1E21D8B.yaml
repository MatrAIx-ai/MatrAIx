  career_goals: Even at 71, George aims to leave a lasting legacy by mentoring the next generation of maintenance workers in Daviess County, offering his expertise through informal apprenticeships and occasional
    consulting projects. He hopes to compile a practical handbook that captures his decades of knowledge on maintaining historic rural buildings, and to continue selective hands‑on work that improves safety
    and energy efficiency in community facilities. George also envisions helping local churches and schools integrate modest, low‑cost upgrades that blend new technology with the town’s traditional infrastructure.
