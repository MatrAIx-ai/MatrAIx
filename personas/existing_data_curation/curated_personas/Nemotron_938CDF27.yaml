personas:
  professional: Parmanand is a budding community health advocate whose methodical planning and empathetic communication turn volunteer food‑bank drives into well‑orchestrated events, even as they quietly
    fret over every logistical detail to ensure nothing falls through the cracks.
  sports: Parmanand enjoys casual soccer matches with friends in the North Shore Youth Soccer League and weekly bike rides along the coast, follows the local minor‑league baseball team the Harbor Hawks,
    and balances a love for beach volleyball in the summer with a disciplined routine of morning jogs that they schedule on their color‑coded planner.
  arts: Parmanand strums acoustic renditions of John Mayer and Iron & Wine in the evenings, streams documentary‑style films like "The Social Dilemma," and draws inspiration from nonfiction authors such
    as Malcolm Gladwell and Brené Brown, often quoting their insights while sketching seashell patterns on notebook margins.
  travel: Parmanand favors carefully mapped weekend getaways to coastal gems like the North Shore beaches and occasional day trips to the nearby state park, dreams of snorkeling the coral reefs of Belize
    and hiking Iceland's volcanic trails, yet their travel plans stay modest due to a teen budget and parental constraints.
  culinary: Parmanand prefers simple, wholesome meals such as quinoa bowls with roasted sweet potatoes, avocado, and black beans, enjoys cooking shrimp tacos seasoned with lime and cumin on lazy afternoons,
    and delights in tasting fresh oysters while savoring the briny aroma of seaweed chips at local seafood festivals.
  core: Parmanand blends a hyper‑organized mind with a compassionate heart, juggling volunteer leadership, anxiety‑driven habits, and a secret love for midnight puzzle‑solving sessions on their acoustic
    guitar.
background:
  cultural: Parmanand comes from an Anglo‑American family with deep New England roots. His parents are second‑generation Massachusetts residents of English and Irish descent, raised in a modest, middle‑class
    household that values education, community service, and traditional New England work ethics. Growing up in Beverly, he has been influenced by the town's historic maritime heritage, as well as the increasingly
    diverse cultural tapestry of the Greater Boston area, fostering an appreciation for both local traditions and broader multicultural perspectives.
attributes:
  skills: '[''Organizational planning'', ''Empathetic communication'', ''Active listening'', ''Basic computer literacy (Word, Excel, Google Docs)'', ''Conflict mediation'', ''Time management'', ''Volunteer
