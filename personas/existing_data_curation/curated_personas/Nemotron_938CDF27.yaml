  hobbies: '[''Volunteering at food bank and senior center'', ''Reading nonfiction (psychology, sustainability, self‑help)'', ''Playing acoustic guitar'', ''Beachcombing and marine life observation'', ''Puzzle
    solving (crosswords, strategy games)'', ''Soccer and bike rides with friends'']'
  career_goals: Parmanand aspires to complete his high‑school equivalency, attend community college, and eventually earn a degree in social work or community health. He envisions a career where he can combine
    his organized, practical mindset with his compassion, such as becoming a community health worker, school counselor, or youth outreach coordinator. He hopes to design programs that support at‑risk teenagers,
    improve mental‑health resources, and foster harmonious, supportive environments in his hometown and beyond.
