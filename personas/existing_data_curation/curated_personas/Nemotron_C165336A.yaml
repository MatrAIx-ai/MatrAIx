  hobbies: '["Visiting art galleries", "Attending live music shows", "Photography (film and digital)", "Digital illustration", "Sketching in cafés", "Acoustic guitar playing", "Hiking Brazos River trails",
    "Cooking Tex‑Mex dishes", "Participating in open‑mic poetry nights", "Volunteering for community art events"]'
  career_goals: Roberto aims to build a career that lets him merge his love of visual art with his desire for flexible, people‑focused work. In the next two years he plans to complete a bachelor’s degree
    in Graphic Design or Visual Communications, while building a freelance portfolio that includes album covers, local business branding, and social‑media content. He envisions eventually establishing a
    small creative studio in College Station that offers affordable design services to local nonprofits and provides workshops for emerging artists. Long‑term, he hopes to use his artistic skills to raise
    community awareness around social topics, perhaps through public‑art installations or collaborative projects with the university.
