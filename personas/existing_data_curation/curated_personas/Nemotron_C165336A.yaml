personas:
  professional: Roberto Hernandez, an emerging visual communicator in College Station, blends digital illustration, film photography, and Adobe Creative Suite expertise with a curiosity‑driven, laid‑back
    workflow, thriving on spontaneous collaborations for album covers and community branding while often juggling disorganized project files.
  sports: Roberto Hernandez, an outdoor‑enthusiast, spends weekends hiking the Brazos River trail and joins the College Station Running Club for relaxed 5K runs, while cheering on the Texas A&M Aggies football
    team and following the Houston Astros during baseball season, preferring flexible, low‑key fitness routines over regimented gym schedules.
  arts: Roberto Hernandez, a self‑taught filmmaker‑photographer, immerses themselves in the local indie‑rock scene—regularly attending shows by Riverfolk and curating playlists that juxtapose Bon Iver with
    Café Tacvba—while drawing inspiration from the photographic work of Annie Leibovitz and the street art of Banksy, which fuels their weekend sketch sessions in coffee shops.
  travel: Roberto Hernandez, a weekend‑road‑trip aficionado, often escapes College Station for music‑filled nights on Austin’s Sixth Street, hikes the desert trails of New Mexico’s White Sands, and dreams
    of a colorful culinary pilgrimage to Oaxaca and an art‑laced stroll through Barcelona’s Gothic Quarter, planning trips with a relaxed, spontaneous mindset that favors bus rides and budget hostels over
    rigid itineraries.
  culinary: Roberto Hernandez, a modest home‑cook, favors quick Tex‑Mex staples like shrimp tacos with fresh cilantro, lime, and queso fresco, enjoys whipping up guacamole with ripe Hass avocados and serrano
    peppers, and occasionally experiments with mole sauce, balancing a love for bold flavors with limited kitchen space and a tendency to over‑season in the name of taste.
  core: Roberto Hernandez is a curiosity‑driven visual artist who balances freelance hustle with a laid‑back lifestyle, often juggling coffee‑stained sketchbooks, spontaneous hikes, and occasional budget‑blips,
    all while navigating mild disorganization with a friendly smile.
background:
  cultural: Roberto grew up in a middle‑class, white Texan family in College Station, a college town dominated by Texas A&M University’s traditions and Southern hospitality. While his lineage is predominantly
    Anglo‑American, his family embraces the multicultural flavor of Central Texas, celebrating regional holidays like Independence Day with backyard barbecues and occasionally joining community Cinco de
    Mayo festivities. The local culture emphasizes friendliness, a relaxed attitude toward time, and a strong sense of community, which aligns with his cooperative nature. Exposure to campus life has also
    introduced him to a diverse set of ideas and artistic influences, reinforcing his openness to unconventional thinking.
attributes:
  skills: '["Digital illustration", "Photography", "Basic graphic design (Adobe Photoshop, Illustrator)", "Creative writing", "Community event coordination", "Conversational Spanish", "Interpersonal communication",
