personas:
  professional: Kimberly Dodd, a seasoned travel reservation specialist, leverages their mastery of Amadeus and Sabre, calm customer‑service demeanor, and knack for weaving art‑focused itineraries into
    everyday bookings, while their natural charisma and occasional over‑worry keep them both beloved by clients and vigilant about detail.
  sports: Kimberly Dodd, an avid follower of the Ohio State Buckeyes football and Columbus Crew SC soccer, plays on a local co‑ed softball league each spring and maintains a steady yoga practice for fitness,
    balancing weekend game‑watching with community recreation.
  arts: Kimberly Dodd, a watercolour enthusiast who regularly visits the Short North Arts District, draws inspiration from Georgia O'Keeffe’s desert palettes, Sufjan Stevens’ folk‑indie melodies, and contemporary
    stage productions such as 'The Curious Incident of the Dog in the Night-Time', weaving these influences into their own creative projects.
  travel: Kimberly Dodd, a travel‑savvy planner who delights in meticulously mapping weekend getaways to historic Ohio towns like Marietta and spontaneous overseas adventures to places such as Cappadocia,
    Turkey and Lisbon, Portugal, balances a love for curated cultural tours with a modest family budget that keeps them grounded.
  culinary: Kimberly Dodd, a confident home cook who mixes Midwestern comfort with global flavors, often prepares dishes like rosemary‑infused roasted chicken, handmade ricotta gnocchi with sage butter,
    and spiced paella featuring saffron and chorizo, and loves serving apple strudel topped with vanilla bean ice cream at their dinner gatherings.
  core: Kimberly Dodd merges small‑town Midwestern hospitality with a restless curiosity for world art, juggling a love for meticulously planned travel itineraries and an occasional habit of over‑checking
    email at midnight.
background:
  cultural: Kimberly comes from a traditional Midwestern white family with German and Irish roots, raised in a small town near Columbus, Ohio. Her upbringing emphasized community involvement, hospitality,
    and a strong work ethic typical of the region. She grew up attending church, local county fairs, and Ohio State football games, which instilled a sense of local pride. While her cultural heritage is
    rooted in Midwestern values of friendliness and modesty, her work in travel has exposed her to diverse cultures, fostering an appreciation for multicultural experiences. She embraces the blend of her
    Midwestern upbringing with a curiosity for global art, customs, and ideas, which informs both her professional and personal life.
