  career_goals: Kimberly aims to move from a front-line ticket agent to a supervisory or training role within her travel agency, where she can mentor new agents and lead a small team. She wants to spearhead
    the adoption of a more user-friendly reservation platform that improves efficiency and reduces staff stress. Long-term, she envisions opening a boutique travel consultancy that curates cultural tours
    blending art, history, and local experiences across the Midwest and beyond. To achieve this, she plans to complete a certification in hospitality management and attend workshops on sustainable tourism.
    She also hopes to negotiate corporate travel contracts for local businesses, leveraging her networking skills, while securing a better work-life balance to mitigate her tendency toward worry.
