personas:
  professional: Allen Black is an aspiring visual designer who fuses graffiti aesthetics with digital illustration, producing beats in FL Studio and editing videos with Adobe Premiere while leading spontaneous
    art jams for friends, yet they often procrastinate on school assignments in favor of street‑side creativity.
  sports: Allen Black is a dedicated skateboarder at the downtown skate park and a point‑guard on the Eastside Eagles high school basketball team, cheering for the Los Angeles Lakers and practicing daily
    trick combos with the local crew "Grind & Flow" while they prioritize street cred over formal workouts.
  arts: Allen Black is a graffiti enthusiast who tags community‑approved walls with bold murals inspired by Banksy and Basquiat, curates weekly open‑mic rap sessions that sample their own FL Studio beats,
    and draws Comic‑Book style illustrations echoing Frank Miller, all while they binge‑watch music videos for visual inspiration.
  travel: Allen Black dreams of a weekend road trip to Berlin’s street‑art districts after graduation, but currently they explore local art festivals in nearby cities like Portland and scout new skate spots
    in neighboring counties, balancing school constraints with a modest parental travel budget.
  culinary: Allen Black favors late‑night pizza slices topped with extra pepperoni, spicy buffalo wings, and instant ramen, occasionally remixing flavors by adding sriracha to mac‑and‑cheese, yet they rarely
    cook beyond microwaving snacks and rely on food trucks for burritos after practice.
  core: Allen Black is a hyper‑creative teen who blends street art, beats, and basketball, juggling impulsive spending and occasional health neglect while thriving on spontaneous collaboration and the buzz
    of competition.
background:
  cultural: Allen grew up in a predominantly African‑American neighborhood in East Dallas, where family gatherings often feature soul food, gospel music, and contemporary hip‑hop. His parents, both Dallas
    natives, have emphasized pride in their African‑American heritage and routinely celebrate cultural events such as Juneteenth and local Black History Month programs. The community’s vibrant mural scene,
    neighborhood basketball leagues, and spoken‑word gatherings have shaped his artistic outlook and reinforced his desire to represent his culture through visual and musical expression.
attributes:
  skills: '[''graffiti mural design'', ''digital illustration'', ''beat making with FL Studio'', ''rap lyricism and songwriting'', ''basic video editing (Adobe Premiere)'', ''photo editing (Adobe Photoshop)'',
