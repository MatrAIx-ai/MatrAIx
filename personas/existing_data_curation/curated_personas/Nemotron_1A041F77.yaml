  hobbies: '[''graffiti art'', ''basketball'', ''skateboarding'', ''music production'', ''rap freestyle sessions'', ''video gaming (FPS and fighting games)'', ''reading graphic novels'', ''attending local
    concerts and open‑mic nights'', ''improvisational theater'']'
  career_goals: Allen aims to build a strong portfolio of street art and digital graphics that will qualify him for a specialized art program or community‑college certificate in visual design. He envisions
    turning his beat‑making hobby into a freelance music production career, eventually producing tracks for local hip‑hop artists. Long‑term, he hopes to launch a streetwear line that incorporates his mural
    aesthetics and to mentor younger kids in his neighborhood through a youth art workshop, using his creative skills to give back to his community.
