  hobbies: '[''Art museum visits'', ''Sketching'', ''Gardening'', ''Historical fiction reading'', ''Book club participation'', ''Quilting and sewing'', ''Bird‑watching'', ''Cooking family recipes'', ''Volunteer
    work at thrift store'']'
  career_goals: Although retired from formal employment, Latasha aims to deepen her impact on the local cultural scene. She plans to lead a senior‑driven art mentorship program at the Anne Arundel County
    Historical Society, helping younger volunteers develop exhibition‑planning skills. She wishes to complete a short certificate in digital photography to better document family history and community events.
    Latasha also hopes to launch a small line of handcrafted quilts and embroidered table linens, selling them at regional craft fairs to fund local school art supplies. On a personal level, she is focused
    on maintaining her health, practicing mindfulness techniques to curb worry, and traveling to at least two major art museums each year.
