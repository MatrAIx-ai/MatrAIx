personas:
  professional: An experienced event planner turned community arts mentor, Latasha Diggs leverages her methodical budgeting, volunteer coordination, and keen curatorial eye to spearhead senior‑driven exhibitions
    at the Anne Arundel County Historical Society, while also guiding younger volunteers through the logistics of craft fairs and garden initiatives.
  sports: An avid walker and leisurely tennis player, Latasha Diggs supports the Baltimore Orioles and Baltimore Ravens, joins a senior walking club along the Patapsco River shoreline, and attends occasional
    community yoga sessions at her local Y, balancing low‑impact movement with her love of bird‑watching.
  arts: A devoted museum‑goer and amateur sketcher, Latasha Diggs finds inspiration in the works of Claude Monet, Georgia O’Keeffe, and Edward Hopper, often citing the lyrical compositions of Philip Glass
    in her quiet evenings, and volunteers at the Smithsonian American Art Museum to share stories behind selected pieces.
  travel: A meticulous planner with a modest travel budget, Latasha Diggs favors short road trips to historic sites like Annapolis and Washington, D.C., while earmarking funds each year for two major art
    museum pilgrimages—such as the Louvre in Paris and the Uffizi in Florence—preferring guided tours and leisurely café stops over rushed sightseeing.
  culinary: A home‑cooking enthusiast, Latasha Diggs skillfully blends family‑style Southern recipes—like gumbo and Old Bay crab cakes—with fresh heirloom tomatoes, lavender‑infused honey, and native wildflower
    honey, often preparing rosemary‑garlic roasted chicken and herbaceous tomato basil bruschetta for her quilting circle gatherings.
  core: Latasha Diggs is a detail‑oriented, art‑loving retiree whose meticulous nature fuels her community mentorship, careful budgeting, and gentle worry‑management, all while juggling gardening, quilting,
    and museum pilgrimages.
background:
  cultural: Latasha grew up in a middle‑class white family in the Mid‑Atlantic region during the 1960s and 1970s. Her upbringing was shaped by the values of community service, church involvement, and a
    respect for the Chesapeake Bay’s natural heritage. The cultural milieu of Anne Arundel County, with its blend of colonial history and suburban development, fostered her love for local history and preservation.
    While she maintains traditional customs such as holiday gatherings and seasonal gardening, her curiosity has led her to explore diverse artistic expressions through travel and museum visits, broadening
    her worldview beyond her regional roots.
