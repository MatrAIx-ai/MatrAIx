  hobbies: '[''Watercolor painting'', ''Street and abstract photography'', ''Visiting art galleries and museum tours'', ''Reading speculative fiction'', ''Creative short‑story writing'', ''Cooking Vietnamese
    cuisine with contemporary flair'', ''Volunteering for senior technology workshops'', ''Participating in community theater'', ''Yoga and meditation'', ''Walking tours of Hayward’s cultural districts'']'
  career_goals: Driven by a love of novelty and a desire to mentor, Thuylinh aims to transition into a senior training and development role where she can shape the next generation of customer service professionals.
    She envisions leading a cross‑functional team that designs innovative service workflows and integrates user‑experience research into the company's support strategy. Additionally, she aspires to obtain
    a certification in UX research to blend her technical acumen with her artistic curiosity, ultimately championing inclusive, culturally aware service solutions for diverse customer bases.
