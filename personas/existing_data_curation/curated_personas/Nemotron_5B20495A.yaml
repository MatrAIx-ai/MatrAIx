personas:
  professional: Carmen Brett is a budding early‑learning enthusiast who delights in the predictable rhythm of pre‑K routines, meticulously lines up toys by color, and naturally leads group play, foreshadowing
    a future as a dedicated preschool teacher.
  sports: Carmen Brett is a high‑energy playground explorer who loves the Phoenix Suns, rallies for the Arizona Diamondbacks during spring training, participates in a local kindergarten soccer league at
    the community recreation center, and treats every backyard game as a mini‑workout.
  arts: Carmen Brett is a lively budding artist who spends afternoons drawing desert cacti with vivid crayons, sings along to the Frozen soundtrack with Idina Menzel, dances to Taylor Swift’s “Shake It
    Off,” and eagerly attends the annual Southwest cultural festival to watch local mariachi performances.
  travel: Carmen Brett is a curious little explorer who prefers short family road trips with a clear itinerary, has visited the Grand Canyon and Sedona’s red rocks on weekend excursions, and dreams of one
    day seeing Disney World’s Magic Kingdom and the snowy slopes of Colorado.
  culinary: Carmen Brett is a budding food enthusiast who adores cheesy quesadillas, dips crunchy tortilla chips in mild salsa, helps stir mac and cheese at home, and proudly insists on adding extra shredded
    cheddar and fresh strawberry slices to their fruit cup.
  core: Carmen Brett is an organized, routine‑loving five‑year‑old who radiates boundless energy at group play, meticulously counts their piggy‑bank coins, and never leaves a backyard barbecue without a
    perfectly aligned row of crayons.
background:
  cultural: Carmen is a White American child growing up in a suburban neighborhood of Phoenix, Arizona. Her family embraces typical Southwest customs, such as celebrating holidays with backyard barbecues,
    attending local community festivals, and enjoying outdoor activities in the desert climate. She attends a public pre‑K program where the classroom reflects a mix of cultural influences, and she is exposed
    to both the broader American culture and regional traditions, including occasional trips to nearby Native American cultural sites and local sports events.
attributes:
  skills: '[''Following multi-step routines'', ''Fine motor coordination'', ''Basic counting (1‑10)'', ''Color and letter recognition'', ''Organizing personal belongings'', ''Cooperative play and peer coordination'']'
  hobbies: '[''Playing at the playground'', ''Group games (tag, hide‑and‑seek)'', ''Coloring and drawing'', ''LEGO DUPLO building'', ''Dancing in movement classes'', ''Listening to storytime at the library'',
    ''Family picnics and nature walks'']'
  career_goals: Carmen dreams of becoming a teacher or a veterinarian, inspired by her love for caring for friends and animals. She wants to help others learn and stay safe, imagining herself leading a
    classroom or a pet clinic. She also expresses a wish to be a community helper, like a firefighter, to protect and guide people.
