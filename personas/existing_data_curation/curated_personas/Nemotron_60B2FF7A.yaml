personas:
  professional: Guillermo Colonramirez, an 8‑year‑old budding comic‑book storyteller, weaves fantastical characters into hand‑drawn strips while engineering intricate LEGO scenes that double as storyboards,
    reflecting an imaginative mind that prizes novelty over rigid schedules.
  sports: Guillermo Colonramirez, a spirited member of the local under‑10 soccer team the Red Rovers, kicks the ball after school, cheers for FC Barcelona on TV, and spends weekends exploring nearby woods
    for rocks and bugs, balancing active play with a love for nature.
  arts: Guillermo Colonramirez, a self‑proclaimed comic‑book aficionado, draws inspiration from Marvel’s Spider‑Man, the vivid animation of Hayao Miyazaki, and the rhythmic steps of Mexican folk dances,
    channeling this blend into colorful sketches, LEGO dioramas, and spontaneous dance performances.
  travel: Guillermo Colonramirez dreams of swapping weekend forest expeditions for trips to Disneyland in Anaheim, a family road‑trip to the Grand Canyon, and someday exploring the ancient pyramids of Mexico
    City, preferring spontaneous, family‑led itineraries over rigid schedules.
  culinary: Guillermo Colonramirez loves helping roll masa for tamales during holidays, sprinkling cheese on quesadillas, and whisking up chocolate chip cookies, showing a budding culinary flair that mixes
    traditional flavors with kid‑friendly treats.
  core: Guillermo Colonramirez is an imaginative eight‑year‑old who juggles comic‑book storytelling, LEGO engineering, and spontaneous dance, all while navigating the chaos of a disorganized but kind‑hearted
    life.
background:
  cultural: Guillermo is a first‑generation Mexican‑American raised in a bilingual household in Cookeville, Tennessee. His parents maintain Mexican traditions, celebrating Día de los Muertos, sharing stories
    in Spanish, and preparing foods like tamales and mole, while also embracing Southern hospitality and local community events. He speaks both Spanish and English fluently, enjoys Mexican music such as
    cumbia and mariachi, and participates in local festivals and school activities, blending his heritage with the culture of his Tennessee community.
