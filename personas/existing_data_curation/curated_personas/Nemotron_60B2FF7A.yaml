  career_goals: Guillermo dreams of becoming an astronaut‑artist, combining his love for space exploration with his talent for drawing. He imagines designing futuristic habitats for other planets, illustrating
    them in vibrant comics. He also expresses a desire to become a teacher who can inspire other kids to think creatively. Ultimately, he hopes to create toys or games that spark imagination in children
    worldwide.
