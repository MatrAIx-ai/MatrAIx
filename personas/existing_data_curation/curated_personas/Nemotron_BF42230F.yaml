  career_goals: Although retired, she aims to stay actively involved in her community by organizing intergenerational workshops at the local library, preserving oral histories of Longmont elders, and mentoring
    younger volunteers. She hopes to write a memoir that captures her life’s lessons, adopt regular mindfulness practices to manage worry, and travel to explore historic sites in the Rocky Mountains. Sustainable
    gardening and fostering environmental awareness remain personal ambitions, as does maintaining her health and social connections.
