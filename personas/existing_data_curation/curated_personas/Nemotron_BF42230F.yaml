personas:
  professional: Sadie Mullen, a retired community event coordinator, leverages her decades‑long expertise in gardening, storytelling, and basic home repairs to orchestrate intergenerational workshops at
    the local library, applying her practical curiosity while tolerating occasional disorganization and a tendency to worry about every detail.
  sports: Sadie Mullen enjoys gentle weekend hikes with the Rocky Mountain Hikers Club, watches the Denver Broncos on Sundays and cheers for the Colorado Rockies in summer, and participates in a senior
    yoga class at the local community center, balancing her love of nature with low‑impact exercise.
  arts: Sadie Mullen immerses herself in community theatre productions, cherishes mystery novels by Agatha Christie and historical works by Hilary Mantel, and finds comfort in the folk sounds of Bob Dylan,
    Joni Mitchell, and the classic films starring Meryl Streep.
  travel: Sadie Mullen prefers small‑group, culturally rich trips, has already visited historic Santa Fe and Mesa Vista, dreams of exploring the Rocky Mountain National Park historic sites like the Old
    Fall River Road, and plans future pilgrimages to colonial Williamsburg, balancing her wanderlust with fixed travel budgets and a need for leisurely pacing.
  culinary: Sadie Mullen delights in crafting potluck dishes such as rosemary‑infused roasted carrots, quinoa‑kale soup, and apple crisp with locally foraged honey, demonstrates an intermediate cooking
    skill that blends garden‑fresh ingredients with family recipes, yet often forgets to label leftovers, leading to occasional mix‑ups.
  core: Sadie Mullen weaves a life of community storytelling, garden stewardship, and shared meals, tempered by a lingering worry about details and a charming habit of misplacing her knitting needles.
background:
  cultural: Born and raised in a small farming community in eastern Colorado during the 1950s, she grew up with Midwestern values of hard work, neighborliness, and modesty. The growing influence of Boulder’s
    outdoor and progressive culture in the 1960s introduced her to a love of nature, environmental stewardship, and a curiosity for new ideas. As a lifelong Methodist, church and community service have
    been central to her identity. Her white, Anglo‑German heritage blends with the regional mountain ethos, creating a cultural outlook that values self‑reliance, community engagement, and a respect for
    the rugged Colorado landscape.
