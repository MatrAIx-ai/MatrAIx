personas:
  professional: Tai Lee is a dependable front‑of‑house professional at a popular downtown restaurant, mastering Toast and Square POS systems while coordinating shift schedules, training new staff, and ensuring
    ServSafe food‑safety compliance with a calm assertiveness that turns guest complaints into opportunities for service recovery.
  sports: Tai Lee is a Zumba enthusiast who never misses the Thursday night class at the community center, supports the San Antonio Spurs with room‑filled watch parties, follows the Texas Rangers during
    baseball season, and plays occasional recreational softball on a local co‑ed league, using these activities as both social glue and a way to burn off extra calories after cooking sessions.
  arts: Tai Lee regularly immerses themselves in the sounds of Beyoncé, Usher, and Kirk Franklin, sings in a neighborhood gospel choir on Sundays, cuts loose on the dance floor to salsa tracks at local
    festivals, lines up board‑game nights featuring Catan and Ticket to Ride, and draws inspiration from the vibrant murals of San Antonio for their DIY craft projects.
  travel: Tai Lee is a weekend wanderer who prefers short road trips over long flights, having already explored the culinary scene of New Orleans, the historic art districts of Santa Fe, and the hill‑top
    vineyards of Fredericksburg; they keep a list of must‑visit taco‑truck festivals across Texas and dream of a future culinary pilgrimage to Oaxaca to learn authentic mole.
  culinary: Tai Lee is a kitchen virtuoso who blends Southern soul‑food classics like collard greens and fried catfish with Tex‑Mex staples such as chiles rellenos and brisket tacos, often seasoning with
    smoked paprika, chipotle adobo, and a dash of honey‑brown mustard, and they can faithfully recreate family recipes while constantly experimenting with new flavor pairings harvested from their balcony
    garden's fresh herbs.
  core: Tai Lee fuses methodical planning with an infectious love for food, dance, and community, channeling those energies into a disciplined savings strategy and a dream of launching a soul‑food‑Tex‑Mex
    café that mentors emerging hospitality workers.
background:
  cultural: Tai identifies as African American and grew up in a predominantly Black neighborhood of San Antonio, where Southern Black traditions intersect with the city's vibrant Hispanic culture. Her family
    places a high value on church, music, and food, celebrating holidays like Juneteenth with soul‑food feasts while also embracing Tex‑Mex flavors and basic Spanish from the surrounding community. This
    multicultural environment has shaped her inclusive outlook, strong sense of community, and appreciation for both heritage and the diverse cultures of Bexar County.
attributes:
  skills: '[''Customer Service'', ''Point-of-Sale (POS) operation'', ''Cash handling and reconciliation'', ''Menu knowledge'', ''Multitasking under high pressure'', ''Time management'', ''Team coordination'',
    ''Conflict resolution'', ''Basic Spanish communication'', ''Food safety compliance (ServSafe)'', ''Event setup and coordination'', ''Inventory monitoring'']'
  hobbies: '[''Cooking soul food and Tex‑Mex fusion'', ''Salsa and line dancing'', ''Attending Fiesta San Antonio'', ''Community volunteer work at local kitchen'', ''Listening to R&B and hip‑hop'', ''Reading
    personal development books'', ''Zumba fitness classes'', ''Balcony gardening'', ''Playing board games with friends'', ''DIY craft projects'']'
  career_goals: Tai aims to earn a shift‑lead position within the next year and progress to restaurant manager within three years, leveraging her practical curiosity to learn budgeting, staffing, and marketing.
    She plans to complete her GED and pursue a hospitality‑management certificate, with a long‑term ambition to open a community‑focused café that blends Southern soul food with Tex‑Mex flavors, providing
    stable employment for her family and mentoring other entry‑level workers.
