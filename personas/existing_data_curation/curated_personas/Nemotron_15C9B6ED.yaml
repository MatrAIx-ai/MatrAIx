  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Reading contemporary fiction'', ''Studying philosophy and art theory'', ''Journaling'', ''Maintaining an art blog'', ''Listening to
    indie folk music'', ''Yoga'', ''Nature hikes'']'
  career_goals: Dara aims to channel her disciplined work ethic and artistic passion into a career in hospitality and the creative sector. In the short term, she seeks a supervisory role in a café or restaurant
    where she can oversee operations, train staff, and implement efficient processes. Long‑term, she aspires to open a boutique coffee shop that doubles as a small gallery for local artists, allowing her
    to merge entrepreneurship with her love for art. To support this vision, she plans to enroll in an associate’s program in hospitality management or culinary arts, and supplement her income by offering
    freelance graphic‑design services.
