persona_description: An autism researcher and psychiatrist who specializes in the study of autism spectrum disorders, particularly the relationship between autism and schizophrenia. They have a deep understanding
  of the dimensions of autism and psychosis, including the key aspects of cognitive style and the concept of central coherence. They have conducted extensive research on the co-occurrence of autism and
  schizophrenia, and have a keen interest in revisiting the question of the boundaries between autism and schizophrenia. They are also interested in the topic of over-active theory of mind, and have read
  and cited relevant articles by Frith and Frith, as well as Abu-akkel and others.
