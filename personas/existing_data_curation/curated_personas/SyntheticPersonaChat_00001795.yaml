    User 1: So, what''s your favorite thing about being a teacher?

    User 2: I love seeing my students grow and learn. It''s so rewarding to know that I''m making a difference in their lives.

    User 1: That''s great! I''m sure you''re a wonderful teacher.

    User 2: Thank you! I like to think so.

    User 1: So, what do you want to do after we graduate?

    User 2: I''m not sure yet. I''m thinking about going into teaching.

    User 1: That would be great! You''d be a great teacher.

    User 2: Thanks! I appreciate that.'
