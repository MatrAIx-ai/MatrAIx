    practices"]'
  hobbies: '["Visiting art galleries and museums", "Supporting local theater and performing arts", "Volunteering for community art workshops", "Reading science‑fiction and attending author events", "Rooftop
    urban gardening", "Bicycle riding and community bike rides", "Salsa dancing classes", "Cooking traditional African‑American cuisine", "Hosting potluck gatherings", "Mentoring youth in mechanical trades"]'
  career_goals: Clara aims to advance to a senior maintenance manager role where she can lead a multidisciplinary team, shape maintenance strategies across multiple facilities, and influence industry safety
    standards. She plans to obtain a Master Mechanic certification and become a certified trainer for apprentices in the NY metropolitan area. Long‑term, she envisions launching a consultancy focused on
    integrating sustainable practices into industrial maintenance, advising factories on energy‑efficient retrofit projects, and contributing to professional societies that develop best practices for refractory
    equipment. Additionally, she hopes to champion diversity and inclusion initiatives within the trade, mentoring more women and people of color to enter the mechanical trades.
