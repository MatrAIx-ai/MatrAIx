personas:
  professional: Travis Monroe, a four‑year‑old with an avid curiosity for how things work, pretends to be a junior mechanic, methodically sorting toy toolsets and “fixing” broken LEGO structures while keeping
    a tidy workbench, reflecting their organized and reliable nature.
  sports: Travis Monroe, a budding participant in Oakley Kids Soccer Club, eagerly joins Sunday tee‑ball games and winter ice‑skating sessions, cheering for the Detroit Tigers and Detroit Lions, while balancing
    energetic play with a habit of lining up their toy cars in perfect rows after each practice.
  arts: Travis Monroe, an enthusiastic fan of "The Wiggles" and Disney’s “Frozen” soundtrack, spends afternoons drawing farm scenes with Crayola crayons and performing improvised dance routines in the living
    room, using their love of storytelling to reenact the county fair’s pumpkin‑carving contests.
  travel: Travis Monroe, who loves weekend trips to Grandma’s farmhouse for apple picking and annual visits to the Michigan State Fair, dreams of a family vacation to Disney World’s Magic Kingdom, planning
    each outing with a crayon‑drawn map and a packed snack bag of cheese sticks and apple slices.
  culinary: Travis Monroe, who delights in mac and cheese topped with a sprinkle of cheddar and prefers apple slices with peanut butter over broccoli, can skillfully stir pancake batter under adult supervision
    and proudly serves “special” carrot sticks shaped like tiny tractors during family meals.
  core: Travis Monroe, a four‑year‑old who balances boundless curiosity with methodical play, organizes toy tools like a tiny professional, saves coins for future puzzles, manages seasonal allergies with
    a dab of medicine, and secretly hoards crayons for nighttime drawings.
background:
  cultural: Travis is raised in Oakley, a small town in Shiawassee County, Michigan, where Midwestern values of community, modesty, and hard work are deeply rooted. His family participates in local church
    gatherings, seasonal community events like the county fair, apple picking, and pumpkin carving, and they celebrate traditional American holidays with family meals. The region’s strong connection to
    the outdoors—spending time near nearby rivers and farms—has instilled in him an appreciation for nature and seasonal changes. These cultural influences reinforce his cooperative, reliable, and considerate
    nature.
attributes:
  skills: '[''Counting to 20'', ''Color and shape identification'', ''Letter recognition'', ''Story retelling'', ''Fine‑motor coordination (cutting, drawing)'', ''Building block construction'', ''Organizing
