  hobbies: '[''Building block construction'', ''Drawing and coloring'', ''Backyard nature exploration'', ''Storytime with picture books'', ''Singing nursery rhymes'', ''Simple puzzles'']'
  career_goals: Even though he is only four, Travis already enjoys imagining future roles where he can help others and use his love for building and caring. He often talks about becoming a builder who designs
    safe playgrounds, a veterinarian who looks after animals, or a teacher who guides younger children. His ambitions are shaped by his curiosity for how things work, his practical mindset, and his desire
    to contribute positively to his community.
