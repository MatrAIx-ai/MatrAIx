  career_goals: Omar aims to earn his Six Sigma Black Belt within the next year and enroll in a part‑time MBA program to deepen his strategic leadership skills. Over the next five years, he envisions progressing
    to a senior operations manager role, overseeing multi‑site operations and driving enterprise‑wide efficiency initiatives. He is passionate about integrating sustainability practices into manufacturing
    processes and hopes to become a champion for environmentally responsible operations. Ultimately, Omar aspires to launch his own consultancy that helps small to mid‑size firms—particularly Latino‑owned
    businesses—implement data‑driven operational excellence while preserving a supportive, harmonious workplace culture.
