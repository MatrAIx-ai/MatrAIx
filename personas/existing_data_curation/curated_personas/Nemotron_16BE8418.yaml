personas:
  professional: Omar Vega, a data‑driven operations manager with a Six Sigma mindset, streamlines supply‑chain workflows through meticulous Excel models, Python analytics, and Tableau visualizations while
    fostering a calm, collaborative team culture that reflects their methodical yet empathetic leadership style.
  sports: Omar Vega, a member of the Congaree Trail Hiking Club, spends weekends navigating the winding paths of the Congaree River while cheering on the Carolina Panthers and the Charlotte Hornets, and
    occasionally joins a local recreational soccer league for light competition.
  arts: Omar Vega, an acoustic‑guitar enthusiast, unwinds by strumming folk classics from Joni Mitchell and modern indie blends from Sufjan Stevens, attends occasional intimate coffee‑house performances,
    and indulges in board‑game nights that double as strategic storytelling sessions with friends.
  travel: Omar Vega enjoys meticulously planned solo getaways to nature‑rich destinations like the Blue Ridge Parkway and the Icelandic Highlands, balances these with budget‑friendly visits to New Orleans
    for jazz, and dreams of a future cultural immersion trip to Kyoto's historic shrines once their consultancy stabilizes.
  culinary: Omar Vega finds solace in crafting traditional dishes such as mofongo and arroz con gandules, favoring fresh plantains, sofrito, and adobo‑seasoned pork, while experimenting with sous‑vide techniques
    to perfect texture, though they often forget to clean the kitchen afterward, leaving a lingering aroma of simmering garlic.
  core: Omar Vega blends analytical rigor with quiet creativity, relentlessly optimizing processes at work while finding balance in solitary hobbies, yet occasionally over‑plans every facet of life, leaving
    little room for spontaneous fun.
background:
  cultural: Omar was raised in a Puerto Rican household that values family, community, and tradition. Both of his parents emigrated from San Juan, and the family maintains strong ties to the island through
    language, cuisine, and celebrations such as Noche de San Juan. Growing up in the United States, Omar learned to navigate both Puerto Rican cultural norms and Southern Southern hospitality, blending
    a warm, cooperative spirit with a pragmatic work ethic. He is fluent in Spanish and English, often acting as a cultural bridge in his workplace and local community. His heritage influences his appreciation
    for collective harmony, his love of rhythmic music, and his commitment to supporting fellow Latino professionals and youths in Orangeburg County.
