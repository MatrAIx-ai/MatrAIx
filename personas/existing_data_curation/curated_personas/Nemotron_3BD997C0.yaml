  career_goals: James aims to secure a full‑time role in project management or business analysis at a mid‑sized company where he can apply both his curiosity for innovative solutions and his practical,
    methodical approach. Over the next five years he plans to earn a professional certification (e.g., PMP) and eventually step into an operations manager position. In the long term, he envisions launching
    his own consulting practice focused on helping small businesses streamline operations and adopt data‑informed strategies.
