  hobbies: '["Herb gardening","Cooking fusion cuisine","Yoga and mindfulness meditation","Reading science & technology magazines","Small book club gatherings","Volunteering at community STEM workshops"]'
  career_goals: Rais aims to progress from an assembler to a lead technician or supervisory role within the manufacturing sector, with a focus on sustainable and eco‑friendly production methods. She plans
    to complete her associate degree in manufacturing technology, earn certifications such as Certified Production Technician (CPT), and eventually move into process improvement or product design, where
    she can blend her curiosity for new technologies with practical applications. Long‑term, she hopes to mentor other young workers—especially women and first‑generation professionals—to foster a cooperative,
    inclusive workplace culture.
