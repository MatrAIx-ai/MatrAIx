  hobbies: '[''traditional Mexican cooking'',''watching Liga MX soccer'',''listening to classic rock and regional Mexican music'',''reading leadership and self‑improvement books'',''family movie nights'',''backyard
    barbecues'',''short hikes in Washington state parks'',''volunteering at a community center for bilingual youth'']'
  career_goals: Jonathan aims to move from first‑line supervisor to store manager within the next two to three years, leveraging his routine‑focused work style and reliability to improve store efficiency.
    He plans to enroll in a community‑college certificate program in retail management to formalize his knowledge and meet promotion criteria. Long‑term, he envisions becoming a district manager overseeing
    multiple locations in the Pacific Northwest, where he can implement standardized operational procedures and mentor emerging supervisors. Throughout his career progression, he wants to secure a stable,
    higher income to support his wife and future family plans while maintaining a work‑life balance that respects his preference for predictable schedules.
