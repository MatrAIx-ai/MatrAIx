persona_description: A professional electrician who specializes in designing and implementing circuit protection systems for DC power circuits. They are familiar with various types of circuit protection
  devices, including fuses, PTCs, varistors, transient suppression diodes, and multi-layer chip varistors, and can assess the appropriate solution for different electrical threats, such as lightning surges,
  electrostatic discharge, and overcurrent conditions. They are also aware of the importance of considering the magnitude of transient surge amplitude when choosing the right solution and have experience
  with IEC 61000-4-2 test methods and transient waveform information.
