  career_goals: Looking ahead, Malvinder aims to transition into a senior advisory role within the Austin Police Department, such as Deputy Chief for Community Engagement or Special Projects Coordinator,
    where he can shape policy and promote data‑driven policing. He intends to spearhead initiatives that integrate advanced analytics and digital tools to enhance crime‑prevention while strengthening relationships
    with the city’s multicultural neighborhoods, especially the South Asian community. Recognizing the toll of stress on officers, he plans to develop department‑wide wellness programs that incorporate
    mindfulness and peer support. As retirement approaches, he envisions consulting for law‑enforcement agencies and teaching criminal‑justice courses at a local university, passing on his expertise while
    maintaining a balanced workload and personal well‑being.
