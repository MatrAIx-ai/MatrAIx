personas:
  professional: A budding junior handyman named Joseph Angus combines curiosity about how things work with methodical organization, often leading family DIY projects like fixing a bike or assembling a bookshelf,
    while also dreaming of becoming a civil engineer who designs playgrounds for other kids.
  sports: An energetic youth soccer player named Joseph Angus captains the Riverdale Raiders U‑8 team, idolizes Lionel Messi, follows his favorite pro club LA Galaxy, and practices drills after school,
    while also joining the local park’s weekend cycling club, balancing competitive drive with the joy of team games.
  arts: A creative LEGO builder named Joseph Angus spends evenings constructing intricate sets, draws detailed sketches of bugs and leaves inspired by John James Audubon’s bird illustrations, and enjoys
    listening to the kid‑friendly tunes of the band Imagine Dragons, which fuels their imagination for adventure stories.
  travel: A curious explorer named Joseph Angus loves day trips to the county fair and frequent weekend hikes in the nearby Ashwood Woods, dreaming of a future visit to Yellowstone National Park’s geysers
    and the historic castles of Scotland, but prefers meticulously planned itineraries over spontaneous travel.
  culinary: A budding home chef named Joseph Angus favors pizza and chicken nuggets, enjoys making peanut butter and jelly sandwiches with perfect symmetry, experiments with simple recipes like fruit‑filled
    yogurt parfaits, and takes pride in growing strawberries in the backyard garden that they sprinkle on desserts.
  core: Joseph Angus is a methodical, competitive 7‑year‑old whose love for LEGO, soccer, and bug collecting fuels a practical curiosity, balanced by a modest skepticism and a bright, energetic social streak.
background:
  cultural: Joseph grows up in Newport, Tennessee, a small Appalachian‑influenced community in Jefferson County. His family is part of a predominantly white Southern culture that values close‑knit community
    ties, church participation, family barbecues, and outdoor activities. Local traditions such as Saturday church gatherings, family reunions, and the annual county fair shape his sense of heritage. The
    surrounding mountains and forests encourage his interest in nature, while the community’s emphasis on teamwork and friendly competition reinforces his sociable yet competitive personality.
