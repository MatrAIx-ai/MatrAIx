  career_goals: Joseph is fascinated by how things work and imagines a future where he designs and builds sturdy structures. He expresses a keen interest in becoming a mechanical engineer or a wildlife
    biologist who studies local animals, reflecting his curiosity and practical mindset. He also dreams of being a firefighter because it combines helping others with using tools, and his competitive nature
    fuels an ambition to someday play soccer at a professional level, emphasizing teamwork and excellence.
