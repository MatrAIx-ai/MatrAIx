personas:
  professional: Tiffiny Goddard, a 32‑year‑old retail frontline specialist, excels at rapid cash handling, Square POS navigation, and calm conflict resolution, and they channel their eye for visual trends
    into product displays that echo the vibrant murals of their hometown, positioning themselves for an assistant‑manager role where they can mentor staff and blend retail acumen with artistic curation.
  sports: Tiffiny Goddard, an avid participant in weekly yoga and a member of the Riverside Trail Runners club, follows the Los Angeles Lakers, the LA Dodgers, and the LA Rams, and they enjoy weekend hikes
    in the Santa Monica Mountains to balance desk‑bound retail shifts with outdoor activity.
  arts: Tiffiny Goddard, a dedicated sketcher and street photographer, regularly attends the Riverside Mural Walk, volunteers as an usher for community theater productions, draws inspiration from artists
    such as Frida Kahlo, Shepard Fairey, and local painter Maria Gomez, and they often quote lines from contemporary novelist Sally Rooney during reflective journal sessions.
  travel: Tiffiny Goddard, a road‑trip enthusiast who favors well‑planned itineraries with art‑focused stops, has explored the historic districts of Santa Fe, the vibrant food markets of Oaxaca, and the
    coastal galleries of Santa Barbara, while they dream of future visits to Barcelona’s street art scene and Kyoto’s traditional tea houses, balancing travel aspirations with a demanding retail schedule.
  culinary: Tiffiny Goddard, an intermediate home cook, delights in preparing fish tacos with fresh cilantro and lime, crafting avocado toast with heirloom tomatoes, experimenting with miso‑infused ramen
    broth, while they frequently savor Mexican street tacos and Japanese sushi at local eateries, and they keep a modest herb garden for basil and rosemary to enhance their dishes.
  core: Tiffiny Goddard merges meticulous retail expertise with vibrant artistic curiosity, managing stress through yoga and journaling while they dream of opening a community art shop.
background:
  cultural: Tiffiny grew up in a middle‑class, predominantly white suburban neighborhood in Southern California, where her family upheld traditional American customs while being surrounded by the multicultural
    tapestry of Riverside County. The region’s diverse population, especially its vibrant Hispanic and Asian communities, exposed her to a variety of cultural festivals, cuisines, and artistic expressions,
    fostering an early appreciation for diversity. Her upbringing emphasized community involvement, modest ambition, and a respect for harmony—values that continue to shape her interactions and outlook.
