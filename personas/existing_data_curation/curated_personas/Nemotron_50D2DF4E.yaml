  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Street Photography'', ''Community Theater Volunteering'', ''Reading Contemporary Fiction'', ''Journaling'', ''Yoga'', ''Gardening'']'
  career_goals: Tiffiny aims to move into a supervisory role within retail over the next two years, targeting an assistant manager position that will allow her to mentor new staff and oversee store operations.
    Concurrently, she plans to enroll part‑time at a local community college to pursue an associate degree in business administration, laying the groundwork for long‑term aspirations of managing a boutique
    or art gallery. Ultimately, she hopes to blend her retail expertise with her passion for the arts by opening a small shop that showcases local artists and provides a curated space for community creativity.
