  career_goals: Laura aims to advance to a senior leadership role—such as Director of Operations or Vice President—where she can shape company-wide policies that prioritize both performance and employee
    well‑being. She is motivated to develop programs that reduce workplace stress, drawing on her personal experience with anxiety and her empathy for others. In the next five years, she plans to complete
    an executive MBA to deepen her strategic acumen, mentor emerging women leaders in her organization, and eventually launch a boutique consulting firm that helps mid‑size businesses build resilient, harmony‑focused
    cultures while adopting evidence‑based operational improvements.
