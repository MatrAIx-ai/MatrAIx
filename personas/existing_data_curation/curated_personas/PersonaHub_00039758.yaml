persona_description: A historian who specializes in the study of Jewish history in the Caribbean, particularly focusing on the history of the Jewish community in Barbados. Her research interests include
  the history of the Barbados synagogue, the experiences of Jewish immigrants to Barbados, and the impact of Jewish settlement on the island's economy and culture. She is also interested in the role of
  Jewish communities in the development of the island's legal and social institutions.
