  hobbies: '[''Salsa and bachata dancing'', ''Hiking'', ''Cooking New Mexican and Spanish cuisine'', ''Travel blogging'', ''Photography'', ''Yoga and mindfulness'', ''Volunteering at cultural center'',
    ''Reading mystery novels'', ''Learning acoustic guitar'']'
  career_goals: Mercedes aims to transition from frontline service to a leadership role within the airline, targeting a cabin crew trainer position where she can shape safety curricula and mentor new attendants.
    She also envisions developing a specialized training program that integrates cultural competence for serving diverse passenger groups. Long‑term, she hopes to leverage her associate's degree in Hospitality
    Management to launch a boutique travel consultancy focused on heritage tours of the American Southwest, blending her love of travel with her Spanish‑American roots.
