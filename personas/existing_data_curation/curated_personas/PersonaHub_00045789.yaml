persona_description: A researcher who specializes in studying the foot strike patterns and running form of Tarahumara Indians, particularly those who wear minimal running sandals. The researcher is interested
  in the biomechanical variables such as foot strike type, lower extremity kinematics, and arch height and stiffness, and how they differ between minimally shod and conventionally shod runners. The researcher
  is also interested in the variation among foot strike patterns among minimally shod runners and the hypothesis that foot stiffness and important aspects of running form, including foot strike, differ
  between runners who grow up using minimal versus modern, conventional footwear. The researcher is likely to have a background in biomechanics, sports science, or physical education, and is interested
  in understanding the biomechanics of running and the factors that influence it.
