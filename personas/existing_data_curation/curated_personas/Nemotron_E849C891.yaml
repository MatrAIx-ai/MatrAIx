  hobbies: '[''Drawing'', ''Digital Illustration'', ''Photography'', ''Acoustic Guitar'', ''Jazz and Hip‑Hop Listening'', ''Reading Science‑Fiction'', ''Reading African‑American Literature'', ''Poetry Writing'',
    ''Hiking'', ''Cooking Southern Cuisine'', ''Volunteering at Community Art Workshops'']'
  career_goals: Rodney aims to turn his passion for visual storytelling into a full‑time role as a digital media specialist or graphic designer, preferably with an organization that serves his local community.
    He plans to enroll in an associate‑degree program in visual communications at a nearby community college, earn certifications in Adobe Creative Cloud, and build a professional portfolio that showcases
    his work. In the long term, he envisions opening a community art space in Lafayette where he can host workshops, exhibit local artists, and mentor youth.
