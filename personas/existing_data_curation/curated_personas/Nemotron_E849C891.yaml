personas:
  professional: Rodney Harley, a budding digital media specialist, leverages his self‑taught mastery of Adobe Photoshop, Canva, HTML, and CSS to craft community‑focused visual stories, while they channel
    a curious mindset into experimental illustration techniques and balance organization with flexibility to keep projects on schedule yet open to creative improvisation.
  sports: Rodney Harley fuels a steady fitness routine by tackling the rolling hills around Lafayette with the local Appalachian Trail Hikers Club, catching weekend games of the Nashville Predators and
    Memphis Grizzlies, and occasionally playing pickup soccer with friends in the spring, balancing low‑key endurance work with a love for community sports spectating.
  arts: Rodney Harley channels their love for visual storytelling by sketching in the shade of Tennessee's pine groves, curating digital illustrations inspired by the bold lines of Jean‑Michel Basquiat,
    while they unwind to the sounds of John Coltrane, Aretha Franklin, and Kendrick Lamar, and draw literary inspiration from Toni Morrison and Octavia Butler during late‑night poetry sessions.
  travel: Rodney Harley prefers low‑key road trips that blend scenic photography with cultural immersion, having recently captured sunrise over the Great Smoky Mountains and sampled jazz clubs in New Orleans,
    while they dream of a solo pilgrimage to Asheville’s Blue Ridge galleries and a future study‑tour of Kyoto’s traditional art districts.
  culinary: Rodney Harley enjoys cooking Southern comfort dishes such as shrimp and grits, fried chicken with a splash of buttermilk brine, and collard greens sautéed with smoked paprika, often perfecting
    the buttery crust of their homemade biscuits while they swap recipes at community potlucks and treat themselves to a nightly spoonful of hot sauce for an extra kick.
  core: Rodney Harley, a quietly curious 24‑year‑old visual storyteller, balances a disciplined work ethic with a habit of endlessly scrolling through design blogs late into the night, often trading sleep
    for the next creative spark.
background:
  cultural: Rodney was raised in a close‑knit African‑American community in Lafayette, Tennessee, where church gatherings, gospel music, and family reunions shaped his early life. His cultural identity
    blends Southern traditions—such as soul‑food cooking, storytelling, and respect for elders—with broader African‑American cultural currents like hip‑hop, jazz, and the civil‑rights heritage of the region.
    These influences foster a strong sense of community responsibility, an appreciation for artistic expression, and an awareness of the challenges faced by black youth in a rural setting.
attributes:
