persona_description: A professional in the field of electronics, specifically focused on wave soldering and electronic assembly. They are responsible for maintaining the purity of wave solder in their production
  processes and ensuring the quality of soldered assemblies. They are knowledgeable about the contaminants that can contaminate the solder and have the expertise to identify and correct them. They are also
  familiar with the AIM Solder Analysis Service, which provides a program of scheduled analysis to increase wave soldering throughput and reliability and reduce the rework of soldered assemblies. They are
  interested in ordering the service and have specific needs for the analysis of their solder pots.
