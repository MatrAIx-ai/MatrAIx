personas:
  professional: Ronald Howe, a budding cartoon artist and aspiring LEGO architect, channels their curiosity and love for organization into meticulously crafted sketchbooks and complex brick builds, while
    their cooperative nature makes them a favorite collaborator in school art projects.
  sports: Ronald Howe loves sprinting around Discovery Green's playground, participates in a community soccer clinic, cheerfully supports the Houston Astros and the Houston Rockets, and balances active
    play with occasional sedentary video game breaks.
  arts: Ronald Howe devotes weekends to watercolor landscapes inspired by Claude Monet, sketches cartoon heroes reminiscent of Disney's classic films and the whimsical style of Dr. Seuss, curates a personal
    playlist of Mozart's symphonies and Miles Davis's Kind of Blue, and proudly displays a collection of animal and rocket stickers as an homage to visual storytelling.
  travel: Ronald Howe dreams of a family road trip to NASA's Johnson Space Center after revisiting the Museum of Fine Arts Houston, frequently explores Houston's city parks like Hermann Park, and eagerly
    anticipates a future visit to Disneyland for the ultimate adventure and cartoon immersion.
  culinary: Ronald Howe's palate favors chicken nuggets, mac & cheese, and the occasional slice of pepperoni pizza, yet they also relish making watermelon cubes and strawberry smoothies while experimenting
    with simple watercolor-inspired plating for their art-inspired 'dessert canvas' creations.
  core: Ronald Howe is a curious, art-obsessed seven-year-old who balances meticulous LEGO building with messy watercolor splashes, saves allowance for big projects, negotiates daily allergies, and channels
    cooperative energy into playful teamwork, all while occasionally forgetting to floss.
background:
  cultural: Ronald grows up in a culturally diverse Houston neighborhood, where Southern hospitality and Texan traditions such as backyard barbecues and Fourth of July fireworks blend with influences from
    the city’s vibrant Hispanic, African‑American, and Asian communities. His family celebrates holidays like Thanksgiving and Christmas, and he frequently visits local parks, museums, and community festivals,
    giving him a broad appreciation for varied cultural expressions.
