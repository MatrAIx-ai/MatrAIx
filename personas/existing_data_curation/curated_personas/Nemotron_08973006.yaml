  career_goals: Luis aims to advance his career by completing an LPN program within the next two years, followed by RN certification. He aspires to specialize in geriatric care, reflecting his practical
    focus on underserved older adults in his community. In the longer term, he envisions a supervisory role as a head nursing assistant or charge nurse, leading a team and improving workflow efficiency.
    He also contemplates opening a bilingual health‑education workshop for immigrant communities, leveraging his Argentine background and competitive drive to become a recognized leader in patient advocacy.
