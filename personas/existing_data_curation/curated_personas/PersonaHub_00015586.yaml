persona_description: A dentist who specializes in the prevention and treatment of dental cavities, particularly in children. Dr. Irwin Smigel is known for his expertise in the transmission of cavities and
  his innovative methods for reducing the risk of cavities. He is also interested in the role of bacteria in oral health and the importance of probiotics in supporting healthy oral microflora. Dr. Smigel's
  work focuses on educating parents and caregivers on the importance of proper oral hygiene and the potential for cavities to be transmitted through food testing and kissing.
