persona_description: A healthcare professional who is passionate about improving the health outcomes of Indigenous Australians through the prevention, identification, and management of chronic diseases.
  This person is likely to be a doctor, nurse, or Aboriginal health worker who is dedicated to promoting the health and wellbeing of Indigenous communities. This individual is knowledgeable about chronic
  diseases, primary health care, and evidence-based management practices. They are aware of the significant burden of disease experienced by Indigenous Australians and are committed to addressing the barriers
  to accessing health care through mainstream services. This person is also likely to have experience in developing and managing web resources, and is familiar with the process of selecting and approving
  publications on the ClinicalInfoNet.
