    ''Food Bank Volunteering'']'
  career_goals: Brian aims to move from his current role as a retail salesperson to a store manager position within the next two years, leveraging his organizational skills to improve store performance
    metrics. He plans to complete his associate’s degree in Business Management and obtain a retail‑management certification from the National Retail Federation. His longer‑term ambition is to become a
    district manager overseeing multiple locations, where he can implement standardized operating procedures, mentor emerging leaders, and eventually explore opening his own locally‑focused boutique that
    blends community events with curated product offerings.
