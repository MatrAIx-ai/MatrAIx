personas:
  professional: Darryl Geltman, a seasoned Boston-area electrician with over twenty years of experience in residential wiring, solar retrofits, and custom decorative lighting, channels their calm curiosity
    and artistic sensibility into meticulous NEC-compliant installations while allowing a flexible, occasionally disorganized schedule that prioritizes creative problem-solving over rigid planning.
  sports: Darryl Geltman enjoys weekend hikes on the Minuteman Trail and is a member of the Middlesex Trail Runners club, occasionally joins a casual pick-up basketball game, and fervently supports the
    Boston Red Sox, New England Patriots, and Boston Celtics, preferring low-key cardio over regimented gym sessions.
  arts: Darryl Geltman blends a passion for chiaroscuro photography in urban alleys with an admiration for light installations by James Turrell, volunteers to design stage lighting for the Middlesex Repertory
    Theatre, and regularly visits galleries featuring Ansel Adams and Vivian Maier, while drawing inspiration from musicians like Radiohead.
  travel: Darryl Geltman prefers spontaneous road trips that pair hiking with night-time astrophotography, having explored historic Salem, the rugged coast of Acadia National Park, and dreaming of attending
    the winter lantern festival in Bruges, all while balancing family commitments and a flexible work schedule.
  culinary: Darryl Geltman, an enthusiastic home cook, frequently prepares herb-crusted salmon, smoked paprika chickpea tacos, and maple-glazed roasted carrots using fresh rosemary, basil, and locally sourced
    honey, often illuminated by their custom LED kitchen lights while snapping photos of the dishes.
  core: Darryl Geltman is a calm, curiosity-driven electrician-artist who fuses green-tech expertise with a love for light, photography, and hands-on creation, while navigating a relaxed, occasionally chaotic
    lifestyle.
background:
  cultural: Darryl grew up in a working‑class white New England family with deep roots in the Boston suburbs. His upbringing emphasized hard work, self‑reliance, and community involvement, often through
    local unions and neighborhood gatherings. He retains a modest appreciation for the region's historical architecture and seasonal rhythms, which inform his taste for integrating artistic lighting into
    traditional homes. While not overtly religious, he was raised with a cultural respect for mainstream Protestant values that stress dignity in labor and stewardship of one’s family. This background,
    combined with the diverse cultural offerings of the Greater Boston area, shapes his balanced view of tradition and innovation.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Conduit bending'', ''Panel upgrades'', ''Electrical troubleshooting'', ''NEC code compliance'', ''Energy‑efficient retrofits'', ''Custom decorative
    lighting design'', ''Solar PV system installation'', ''Basic HVAC electrical support'', ''Diagnostic testing with multimeter and thermal imaging'', ''Apprentice mentorship'', ''Crisis management'',
    ''Small‑crew leadership'']'
  hobbies: '[''Photography'', ''DIY custom LED lighting projects'', ''Woodworking'', ''Visiting local art galleries'', ''Volunteer stage lighting for community theater'', ''Reading about design and technology'',
    ''Mechanical puzzles'', ''Hiking the Minuteman Trail'']'
  career_goals: Darryl aims to achieve Master Electrician status and, within the next five years, launch his own boutique contracting firm that specializes in green‑energy retrofits and artistically‑driven
    lighting solutions for homeowners. He plans to earn certifications in smart‑home automation and solar installations to broaden his service offerings. Beyond business growth, Darryl is committed to mentoring
    the next generation of tradespeople, perhaps by establishing a formal apprenticeship program in his community. Ultimately, he seeks a stable, flexible career that allows him to support his family while
    continuing to explore creative applications of his trade.
