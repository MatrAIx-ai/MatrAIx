  career_goals: Although retired, Yong Han Lee remains driven to leave a lasting legacy. He aspires to mentor emerging engineers through community workshops, contribute to local STEM education programs,
    and author a memoir that weaves his professional journey with his Korean heritage. He also aims to complete a personal model‑train layout depicting a Korean mountain village, maintain his health through
    regular activity, and ensure his independence while staying engaged in small, supportive social circles.
