persona_description: A professor who specializes in the study of restoration techniques, particularly those related to the consolidation and diagnosis of structures, and who has extensive knowledge and
  experience in the field. He/she is likely to be well-versed in the legislative context on anti-seismic consolidation, the detection and diagnosis of structural instability, and the design and implementation
  of conservation and restoration projects. The professor is likely to have a strong background in statics and building science, and is likely to be familiar with the latest research and developments in
  the field. He/she is likely to have a deep understanding of the theoretical and practical aspects of restoration, and is likely to have a keen interest in the historical-critical analysis of monuments.
  The professor is likely to be an expert in the use of historical-critical methods for the analysis of degradation and the use of non-destructive tests for the diagnosis of structural instability. He/she
  is likely to be experienced in the design and implementation of conservation and restoration projects, and is likely to have a deep understanding of the technical and construction aspects of restoration.
