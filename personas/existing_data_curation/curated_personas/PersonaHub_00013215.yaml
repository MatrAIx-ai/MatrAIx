persona_description: A Native American historian who specializes in the study of the full moons and their impact on Native American culture, particularly in the context of food, hunting, and survival during
  the fall and winter months. Her research interests include the seasonal changes in prairie life, the impact of European colonization on Native American culture, and the legacy of Native American traditions
  and knowledge in contemporary society. She is interested in the use of historical and cultural context to understand and interpret the significance of the full moons in Native American history.
