persona_description: A healthcare professional who is interested in the latest research on stroke and its treatment, particularly in the context of ministroke and cognitive damage. They are also interested
  in the risk factors for ministroke and the signs and symptoms that distinguish it from a full-blown stroke. They are knowledgeable about the potential long-term effects of ministroke and the importance
  of seeking immediate treatment. They are also interested in the potential for ministrokes to be a common thread in people with symptoms of dementia, and the potential for further research to explore the
  relationship between ministrokes and brain function.
