  hobbies: '[''Gardening'', ''Walking the Swamp Creek Trail'', ''Reading Southern history'', ''Crossword puzzles'', ''Listening to vintage jazz'', ''Kite building'', ''Knitting'', ''Fishing'']'
  career_goals: He hopes to maintain his independence and health for as long as possible while ensuring his finances remain orderly. Andrew plans to complete a memoir of his life in the Carolinas to leave
    a tangible legacy for his grandchildren. He aims to mentor a few younger members of his church on budgeting basics and to donate some of his gardening knowledge to the community garden. A modest ambition
    is to preserve the family homestead and to see his rose bushes flourish each spring.
