personas:
  professional: Andrew Lusco, an 85‑year‑old retired business graduate, channels his meticulous bookkeeping and hands‑on home‑maintenance skills into volunteer archiving at the local library while still
    tinkering with small woodworking projects, balancing his love of routine with occasional spontaneous fixes when deadlines slip.
  sports: Andrew Lusco enjoys low‑impact activities like walking the Swamp Creek Trail and fishing at the community pond, proudly roots for the Carolina Panthers and the Charlotte Hornets while occasionally
    joining the Greenwood Senior Walking Club, and follows the Atlanta Braves baseball season on television.
  arts: Andrew Lusco, a devoted listener of vintage jazz giants like Louis Armstrong and Ella Fitzgerald, spends evenings immersed in classic mystery novels by Agatha Christie and Southern literature by
    Margaret Mitchell, and occasionally attends community theater productions of 'A Streetcar Named Desire' starring local actors.
  travel: Andrew Lusco favors short, carefully planned road trips to historic Southern towns such as Charleston and Savannah, dreams of a jazz pilgrimage to New Orleans, but his health concerns and modest
    budget keep his adventures within a few hours’ drive of his homestead.
  culinary: Andrew Lusco delights in cooking garden‑fresh dishes like heirloom tomato salad with basil, slow‑cooked collard greens, buttermilk biscuits, and occasional fried catfish, pairing them with his
    beloved sweet tea while occasionally over‑spiking salt due to his habit of multitasking in the kitchen.
  core: Andrew Lusco, an 85‑year‑old garden‑tending archivist who balances meticulous budgeting with spontaneous kite‑building, battles chronic worry yet finds calm in vintage jazz and crossword puzzles,
    all while stubbornly clinging to a routine that includes knitting scarves and fishing for unexpected thrills.
background:
  cultural: Andrew grew up in post‑World War II rural South Carolina, in a close‑knit white farming community that emphasized self‑reliance, church involvement, and Southern hospitality. His family traces
    roots to English and German immigrants who settled in the Piedmont region in the late 1800s. He attended a local high school before earning a business degree at the University of South Carolina. The
    culture of modesty, respect for tradition, and a strong Baptist faith shaped his worldview, as did the gradual integration and social changes of the 1960s and 1970s that he navigated as a young adult.
    Today, he carries forward the values of hard work, modest generosity, and an appreciation for the natural landscape of the Carolinas.
attributes:
  skills: '[''Financial budgeting'', ''Tax filing'', ''Home maintenance'', ''Gardening'', ''Woodworking'', ''Basic computer operation (email, spreadsheets)'', ''Archival cataloguing'', ''Ad‑hoc problem
