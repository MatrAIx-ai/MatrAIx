persona_description: A geotechnical engineer who specializes in the field of geology, particularly in the study of soil and rock properties. They are responsible for developing and implementing standards
  and procedures for measuring soil moisture content using nuclear moisture density gages. They are also involved in the selection of suitable materials for calibration standards, and in the investigation
  of soil and materials to improve the accuracy and uniformity of the measurements. They are likely to be familiar with the use of standardized blocks for calibration purposes and the selection of suitable
  materials for moisture gage calibration standards.
