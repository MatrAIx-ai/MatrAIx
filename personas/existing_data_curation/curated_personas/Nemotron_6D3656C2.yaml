personas:
  professional: Thayra Castro, a 66‑year‑old veteran of hospitality and retail operations, leverages three decades of strategic planning, bilingual team leadership, and hands‑on problem solving to mentor
    emerging managers while championing technology integration without sacrificing personal touch.
  sports: Thayra Castro, a regular participant in the local senior walking club, follows the Miami Heat and the Miami Marlins, enjoys weekend beach volleyball pick‑ups when the weather permits, and blends
    her love of salsa dancing with low‑impact cardio to stay fit.
  arts: Thayra Castro, an avid salsa‑dance enthusiast, regularly attends performances featuring artists like Celia Cruz and Marc Anthony, volunteers at community cultural events where she helps organize
    music showcases, and devotes evenings to reading classic mystery novels by Agatha Christie.
  travel: Thayra Castro, who favors relaxed, group‑oriented vacations, has explored the historic streets of Old San Juan, enjoys annual trips to Key West, and dreams of a leisurely cruise through the Caribbean
    islands with her salsa club friends.
  culinary: Thayra Castro, a confident home chef, regularly prepares arroz con gandules, pernil with adobo seasoning, and roasted plantains, delights in sourcing fresh cilantro and allspice at the local
    market, and treats dining out as an occasional indulgence for tasting new Latin fusion dishes.
  core: Thayra Castro blends a competitive, curiosity‑driven mind with a relaxed, sometimes disorganized lifestyle, channeling her love of salsa and community mentorship into every facet of her life.
background:
  cultural: Thayra was born to Puerto Rican parents who migrated to Florida in the 1970s, and she grew up immersed in a bilingual household. Her upbringing emphasized family gatherings, music, and food,
    traditions she continues to celebrate at home and in the local Puerto Rican community of Hollywood. She participates in the annual Noche de San Juan festivities, contributes to the local salsa club,
    and supports cultural preservation initiatives. Her heritage informs her warm, sociable demeanor, her love for group celebrations, and her commitment to mentoring younger generations while maintaining
    a pragmatic, results‑driven mindset.
attributes:
  skills: '[''Operations Management'', ''Team Leadership'', ''Budgeting and Cost Control'', ''Vendor Negotiation'', ''Process Improvement'', ''Staff Training and Development'', ''Bilingual Communication
