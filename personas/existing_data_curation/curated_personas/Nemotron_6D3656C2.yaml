  hobbies: '[''Salsa dancing'', ''Gardening'', ''Cooking Puerto Rican cuisine'', ''Walking with senior group'', ''Volunteering at community events'', ''Attending Latin music festivals'', ''Reading mystery
    novels'', ''Beachcombing'', ''Board game nights'']'
  career_goals: Thayra aims to transition from full‑time management to a mentorship and consulting role, helping younger managers in the Broward County area streamline operations and embrace technology
    without sacrificing the personal touch she values. She also hopes to lead a community‑based initiative that showcases best practices for small businesses in Florida’s hospitality sector, eventually
    earning a regional award for operational excellence before she fully retires.
