  hobbies: '[''Gardening'', ''Quilting'', ''Hiking'', ''Reading mystery novels'', ''Volunteering at community center'', ''Baking sourdough bread'', ''Reading home‑improvement magazines'']'
  career_goals: Lyndsey aims to transition from a solo contractor to the owner of a small, reputable painting and paper‑hanging business that emphasizes reliable scheduling and high‑quality workmanship.
    She plans to obtain a state contractor’s license and a Certified Paint Professional credential within the next two years, enabling her to bid on larger commercial projects. By building a steady client
    base in Beloit and surrounding towns, she hopes to create a predictable income stream that reduces the stress of irregular work. Long‑term, she would like to mentor a young apprentice and eventually
    expand her team, positioning the company as a trusted local provider of eco‑friendly painting solutions.
