    at local food bank'']'
  career_goals: Although not currently in the formal workforce, Elise aims to deepen her community involvement and launch a small home‑based venture selling handcrafted home‑decor items at local art fairs
    and online. She is considering completing a GED to expand opportunities for part‑time teaching or leading workshop classes in art and crafts for seniors. Elise also hopes to travel more, exploring regional
    art scenes and possibly participating in a short‑term fellowship focused on community arts programming. Ultimately, she aspires to develop her leadership skills to serve on the board of the local historical
    society and become a recognized local artisan who mentors other women interested in starting their own craft businesses.
