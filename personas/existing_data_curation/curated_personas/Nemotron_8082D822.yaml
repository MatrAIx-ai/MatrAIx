    ''birdwatching'', ''seashell collecting'']'
  career_goals: Although retired, Yota remains goal‑oriented. She aims to document her family’s history in a memoir that blends personal stories with local Bradenton heritage. She is also keen to mentor
    younger volunteers at the senior center, sharing her organizational know‑how and gardening tips. Yota wishes to complete an online certification in horticultural therapy to combine her love of plants
    with community service. Another ambition is to travel to three new U.S. national parks within the next five years, applying her practical planning skills to explore new environments while respecting
    ecological guidelines.
