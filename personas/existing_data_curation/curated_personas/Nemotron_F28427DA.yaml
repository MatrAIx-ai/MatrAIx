personas:
  professional: Maria Lavoie is a seasoned electromechanical technician specializing in the maintenance and repair of coin‑operated vending and amusement machines; they apply a meticulous, step‑by‑step
    diagnostic method, keep exhaustive service logs, negotiate contracts, mentor apprentices, and are now channeling their competitive drive toward opening a local vintage arcade service shop and earning
    an NCMA Master Technician certification.
  sports: Maria Lavoie is an active member of the Piedmont Senior Walking Club, hikes the Blue Ridge trails each spring, follows the Charlotte Hornets and North Carolina Tar Heels basketball seasons, and
    regularly attends local high‑school baseball games with friends from the senior center.
  arts: Maria Lavoie sings baritone in the church choir, delights in performing classic gospel numbers popularized by Mahalia Jackson, enjoys listening to Ella Fitzgerald and B.B. King while restoring vintage
    pinball machines, and collects arcade artwork that evokes the aesthetic of early 1970s arcade legends.
  travel: Maria Lavoie plans trips with meticulous itineraries, favors relaxed road trips to Asheville’s mountain galleries and Savannah’s historic squares, dreams of a culinary tour through New Orleans,
    and has already booked a weekend getaway to Napa Valley to sample wine pairings that complement their Southern cooking.
  culinary: Maria Lavoie prepares Southern comfort meals such as buttermilk‑fried chicken, shrimp and grits, smoked‑turkey collard greens, and peach cobbler, skillfully blending butter, okra, and sweet
    potatoes into family recipes they share at neighborhood potlucks.
  core: Maria Lavoie balances a competitive, detail‑driven engineering mind with a warm, community‑center spirit, thriving on organized routines, occasional stress‑filled worries, and a lifelong love of
    vintage arcades, choir singing, and Southern cooking.
background:
  cultural: Maria Ann is a third‑generation white American whose family roots trace back to French‑Canadian immigrants who settled in the Carolinas during the early 20th century. Raised in a modest household
    in the foothills of northwest North Carolina, she absorbed the Southern values of hospitality, self‑reliance, and church‑centered community life, while also preserving elements of her French‑Canadian
    ancestry—such as bilingual holiday greetings and occasional traditional dishes like tourtière. Her upbringing in a close‑knit rural town reinforced a strong work ethic and a preference for clear structures,
    which is reflected in her methodical approach to both her profession and daily routines.
attributes:
  skills: '[''Mechanical disassembly and reassembly of vending and arcade machines'', ''Electrical troubleshooting and circuit repair'', ''Coin validator calibration and firmware updates'', ''Diagnostic
    software operation'', ''Preventive maintenance scheduling'', ''Inventory management of parts and supplies'', ''Customer service and contract negotiation'', ''Training and mentorship of junior technicians'',
    ''Record‑keeping and service documentation'', ''Safety compliance and first‑aid certification'']'
  hobbies: '[''Senior center bingo and bridge club'', ''Backyard gardening and seed swapping'', ''Church choir singing'', ''Vintage arcade meet‑ups and pinball restoration'', ''Collecting antique coins'',
    ''Cooking Southern and French‑Canadian family recipes'', ''Participating in local festivals and parades'', ''Volunteering for 4‑H mechanical workshops'', ''Hiking on nearby trails'']'
  career_goals: Approaching retirement, Maria Ann aims to turn her extensive hands‑on experience into a small, locally‑owned service shop that can serve the growing number of vintage arcade venues in the
    Piedmont region. She plans to obtain a National Coin Machine Association (NCMA) Master Technician certification, which will formalize her expertise and enhance her credibility with larger venue owners.
    Mentoring a new generation of technicians—especially women interested in electromechanical trades—is a personal ambition, reflecting her competitive nature and desire to leave a lasting professional
    legacy. Additionally, she hopes to acquire a handful of classic arcade machines to operate a community‑focused arcade night, generating supplemental income while sharing her passion with neighbors.
