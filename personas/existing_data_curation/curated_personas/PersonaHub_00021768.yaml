persona_description: A scientist or researcher in the field of neuroscience, specifically interested in the study of the blood-brain barrier (BBB) and its role in regulating molecular and cellular flux
  between the blood and the nervous tissue. The individual is likely to be familiar with the development and characterization of a highly reproducible rat syngeneic in vitro BBB model using co-cultures
  of primary rat brain endothelial cells (RBEC) and astrocytes. They are also interested in the preparation of synaptic plasma membrane and postsynaptic density proteins using a discontinuous sucrose gradient.
