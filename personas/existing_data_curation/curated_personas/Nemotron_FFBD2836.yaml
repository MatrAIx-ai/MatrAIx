  hobbies: '[''Gardening (community vegetable garden)'', ''Bridge tournaments'', ''Book club'', ''Community theater acting'', ''Photography of state parks'', ''Volunteering at food bank'', ''DIY home improvement
    projects'', ''Zumba fitness classes'', ''Mentoring in STEM clubs'', ''Traveling to regional natural sites'']'
  career_goals: Although retired from full‑time employment, Cay aims to leverage her expertise to inspire the next generation of engineers. She plans to expand her volunteer mentorship program at the local
    community college, develop a series of hands‑on workshops for high‑school girls in STEM, and author a guidebook on practical engineering solutions for everyday home projects. Additionally, she hopes
    to secure a small consulting role with non‑profit organizations to improve the design of community spaces, and to compete in regional bridge tournaments, reflecting her competitive streak.
