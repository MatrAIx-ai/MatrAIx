personas:
  professional: Cay Knight, a retired mechanical engineer with a 35‑year legacy in design and project management, channels their curiosity‑driven practicality into mentoring women and seniors in STEM, delivering
    hands‑on workshops, authoring a DIY engineering guidebook, and consulting for nonprofit community‑space redesigns, while balancing systematic planning with an adaptable, people‑focused approach.
  sports: Cay Knight, a lively Zumba enthusiast who also rows with the Omaha Senior Paddle Club and avidly follows the Nebraska Cornhuskers football team and the Omaha Storm Chasers minor‑league baseball
    club, blends competitive spirit from bridge tournaments into a disciplined fitness routine that includes thrice‑weekly cardio sessions and occasional community 5K walks.
  arts: Cay Knight, a community‑theater actress who revels in the works of Lin‑Manuel Miranda and the photography of Ansel Adams, often stages productions of classic plays with the local theater troupe,
    while regularly attending performances by the Omaha Symphony and curating a personal collection of vintage vinyl records featuring Nina Simone and Johnny Cash.
  travel: Cay Knight, a weekend‑traveler with a camera in hand, frequently explores nearby state parks such as Nebraska’s Sandhills, Badlands National Park in South Dakota, and Rocky Mountain National Park
    in Colorado, while also dreaming of a spring pilgrimage to the tulip fields of Holland and a cultural tour of Kyoto’s historic temples, balancing modest travel budgets with group‑oriented planning through
    the local senior travel club.
  culinary: Cay Knight, an enthusiastic garden‑to‑table cook, enjoys crafting zucchini‑filled ratatouille, quinoa‑based grain bowls with fresh basil and kale, and hearty cornbread topped with roasted heirloom
    tomatoes, often sharing these dishes at book‑club meetings, yet they sometimes burn the edges of the quiche when multitasking between knitting and bridge.
  core: Cay Knight, a curious yet pragmatic senior, blends engineering precision with a zest for community, tackling DIY projects, mentoring the next generation, and thriving in social games, even as a
    skeptical competitor who occasionally overcommits to too many clubs.
background:
  cultural: Cay grew up in a Midwestern white family rooted in Nebraska’s agricultural heritage, with German‑Scandinavian ancestry that emphasized hard work, self‑reliance, and community participation.
    Her upbringing involved regular visits to county fairs, church gatherings, and community potlucks, fostering a strong sense of belonging and a practical outlook on life. While she maintains these traditional
    values, she also embraces diverse perspectives gained from her career and travels, blending a respect for Midwestern customs with an open‑minded curiosity toward new ideas.
