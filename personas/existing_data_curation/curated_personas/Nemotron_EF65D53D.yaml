  career_goals: Although still very young, Linda often talks about becoming an astronaut or a teacher because she loves exploring new ideas and helping others. She imagines traveling to the stars to see
    “new places” and enjoys pretending to lead a classroom of stuffed animals. These aspirations, expressed in toddler‑like language, show her curiosity about the world and a budding desire to share knowledge.
