  career_goals: In the short term, John aims to build a robust portfolio of digital artwork and video projects that showcase his unique visual style and storytelling ability. He plans to secure a part‑time
    internship or mentorship with a local media studio or community arts program, while completing his GED and enrolling in a community college design course. Over the next five years, he envisions earning
    an associate's degree in visual communications, followed by a bachelor's in multimedia arts or advertising. His long‑term ambition is to become a creative director or content strategist for a socially
    conscious agency, where he can lead campaigns that blend art, technology, and cultural narratives. He also hopes to launch a youth outreach initiative that teaches digital media skills to other teens
    in his community.
