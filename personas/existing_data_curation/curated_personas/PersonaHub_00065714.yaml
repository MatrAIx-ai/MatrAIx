persona_description: A political analyst who is knowledgeable about transportation policy and the role of government in funding infrastructure projects. They are aware of the challenges and obstacles that
  have hindered the development of a reliable and guaranteed source of transportation funding, particularly for high-speed rail. They are aware of the impact of the sequester on federal transportation funding
  and the reluctance of Republicans to support federal funding for rail projects. They are aware of the potential for states to fund their own rail systems and the role of private contributions in improving
  rail networks. They are aware of the importance of convincing Republicans of the value of rail investments and the potential for breakthroughs in funding rail projects.
