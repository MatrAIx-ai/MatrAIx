personas:
  professional: A precocious one‑year‑old named Naima Sikaffy, they already display an uncanny knack for organizing toys, arranging playroom layouts like a tiny interior designer, and choreographing mini‑stage
    performances during family gatherings, treating each sandbox session as a project with clear milestones and hinting at a future path in event planning or creative direction.
  sports: The energetic one‑year‑old Naima Sikaffy enjoys toddler gymnastics at the local community center, idolizes the Houston Dynamo soccer team, and often dribbles a soft foam ball during playdates,
    channeling their competitive streak into friendly challenges that end with giggles and high‑five celebrations.
  arts: Naima Sikaffy, age one, loves listening to the lively melodies of traditional folk music and the soulful guitar of Carlos Santana, dancing enthusiastically during family Día de los Muertos celebrations,
    and often mimics the expressive performances of Lila Downs, turning each lullaby into a mini‑concert in their playroom.
  travel: Curious one‑year‑old Naima Sikaffy has already accompanied family trips to grandparents’ modest town for the vibrant Día de los Muertos parade and dreams of exploring the historic streets of Guanajuato,
    favoring carefully planned itineraries that balance the comfort of a stroller with the sensory excitement of new colors, sounds, and aromas.
  culinary: Naima Sikaffy, at one year, is a budding food explorer who relishes the sweet crunch of churro‑style doughnuts, the warm spice of pozole broth, and loves helping their grandmother mash ripe
    avocados for guacamole, though they have a habit of smearing salsa across their high chair and giggling at the mess.
  core: Naima Sikaffy is a one‑year‑old whirlwind of organized play, competitive spirit, and cultural curiosity, whose tiny piggy bank, love for festive music, and habit of arranging toys into tidy rows
    reveal an early drive for achievement and a flair for the dramatic.
background:
  cultural: Naima is a second-generation Mexican American who grew up in Houston’s vibrant Hispanic neighborhoods. Her family maintains strong ties to Mexican customs, celebrating Día de los Muertos, Mexican
    Independence Day, and other traditions with music, dance, and food. Bilingual in English and Spanish, she navigates both cultures with ease, valuing family cohesion, community support, and the rich
    culinary and artistic heritage of Mexico. These influences shape her identity and drive her commitment to share Mexican culture with a broader audience.
