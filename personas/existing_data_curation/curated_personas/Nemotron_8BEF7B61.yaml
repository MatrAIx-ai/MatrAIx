  career_goals: Naima aims to become a recognized community outreach coordinator focusing on Hispanic cultural programs in Houston. She plans to earn her GED and pursue a certification in nonprofit management,
    with the ambition to launch a neighborhood arts and cultural hub that celebrates Mexican heritage. She seeks to secure funding for community projects, mentor local youth, and achieve measurable impact
    through high-quality, organized initiatives. Ultimately, she wants to be known for her disciplined approach and ability to deliver successful, culturally enriching events.
