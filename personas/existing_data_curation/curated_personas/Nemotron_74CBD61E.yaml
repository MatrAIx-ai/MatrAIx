personas:
  professional: Lina Ramos is a compassionate personal care aide who blends meticulous scheduling with creative art‑based activities to uplift seniors, leveraging bilingual communication and first‑aid training
    while ambitiously working toward CNA certification, and they bring their organized mind to every shift.
  sports: Lina Ramos stays fit by dancing salsa and bachata three nights a week at the downtown Latin dance studio, attends Las Vegas Raiders games for football, follows the Vegas Golden Knights, and joins
    a weekend volleyball league at Red Rock Canyon, and they balance high‑energy movement with mindful stretching.
  arts: Lina Ramos regularly visits the Bellagio Gallery of Fine Art and local street mural tours, draws inspiration from Frida Kahlo’s self‑portraits, Banksy’s stencil work, and the rhythms of Marc Antonio’s
    salsa band, and they volunteer in community theater productions of "Avenue Q" and "Rent".
  travel: Lina Ramos dreams of weekend getaways to the colorful markets of Oaxaca, cultural festivals in Barcelona, and tranquil hikes through Red Rock Canyon, planning trips with a mix of budget‑friendly
    hostels and occasional splurges on boutique hotels when her savings allow, and they prioritize experiences that connect them to vibrant artistic communities.
  culinary: Lina Ramos, an enthusiastic home cook, whips up her family’s classic chicken tinga tacos, hand‑made guacamole with fresh cilantro and jalapeños, and experiments with sushi rolls, balancing a
    growing spice rack with a penchant for over‑seasoning when nervous, and they enjoy sharing these dishes with friends at casual gatherings.
  core: Lina Ramos is a vibrant, organized caregiver whose love for art and dance fuels a compassionate, though anxiety‑prone, pursuit of culturally‑rich health care, and they constantly seek ways to merge
    creativity with wellness.
background:
  cultural: Lina grew up in a close‑knit Mexican‑American family in Las Vegas, speaking Spanish at home while navigating an English‑dominant environment. She celebrates Mexican traditions such as Día de
    los Muertos, Cinco de Mayo, and family gatherings centered around homemade tamales and mole. Her cultural identity is expressed through music, dance, and folk art like papel picado, which she incorporates
    into her personal space and caregiving activities. Lina actively participates in local Mexican community festivals and supports organizations that promote bilingual services for seniors, blending her
    heritage with the multicultural vibrancy of Clark County.
attributes:
  skills: '["Personal care assistance", "Medication reminder and monitoring", "Basic first aid and CPR certification", "Safe patient lifting and transfer techniques", "Bilingual communication (English/Spanish)",
    "Time management and scheduling", "Accurate record keeping and documentation", "Empathy and active listening", "Team collaboration and coordination", "Crisis de‑escalation", "Facilitation of creative/art
    activities for clients"]'
  hobbies: '["Watercolor painting", "Visiting art galleries and street murals", "Community theater and live music events", "Salsa and bachata dancing", "Cooking traditional Mexican dishes", "Exploring diverse
    cuisines", "Yoga and mindfulness meditation", "Journaling for emotional self‑care", "Volunteering at cultural community center", "Leading craft workshops for children and seniors"]'
  career_goals: Lina aims to advance from a personal care aide to a certified nursing assistant (CNA) within the next year, then pursue an associate degree in nursing to become a registered nurse specializing
    in geriatric and culturally sensitive care. She is passionate about merging her love for art with health, so she plans to complete a certification in art therapy or expressive therapy to design therapeutic
    activities for older adults. Long‑term, she envisions leading a community health program in Las Vegas that offers holistic, culturally tailored services for the Mexican‑American senior population, while
    also mentoring new caregivers and advocating for mental‑health support for frontline staff.
