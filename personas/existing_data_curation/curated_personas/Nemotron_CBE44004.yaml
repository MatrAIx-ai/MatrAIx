personas:
  professional: Janele Dooley is a disciplined plumber‑pipefitter/steamfitter in the Bay Area who leverages meticulous blueprint reading, welding, and code‑compliant installation skills to lead complex
    commercial steam projects while they mentor apprentices and integrate energy‑efficient solutions.
  sports: Janele Dooley cycles with the East Bay Cycle Club on weekends, hikes Mount Diablo’s summit trails, roots for the San Jose Earthquakes and Golden State Warriors, and they participate in the annual
    Bay Area 5K, balancing solo trail runs with group rides.
  arts: Janele Dooley channels their craftsmanship into building custom reclaimed‑wood tables, finds inspiration in the music of Tom Petty and folk artist Gillian Welch, enjoys the cinema of Ken Burns,
    and they frequent local art walks at the Oakland Art Murmur to stay connected to the creative community.
  travel: Janele Dooley prefers road‑trip itineraries that blend rugged outdoor stops—like Yosemite’s Half Dome hike—with cultural detours such as a weekend wine‑tasting tour in Napa and a bike‑repair workshop
    in Bologna, and they balance meticulous planning with spontaneous detours when the open road calls.
  culinary: Janele Dooley favors protein‑rich meals like smoky chipotle‑marinated steak, rosemary‑infused roasted potatoes, and homemade ramen broth, enjoys cooking over a cast‑iron skillet, and they deliberately
    source fresh herbs and local produce from Fremont farmers markets.
  core: Janele Dooley is a methodical tradesperson who turns every pipe layout into a puzzle, obsessively journals each task, yet they can’t resist the thrill of a vintage motorcycle’s roar on a Sunday
    morning.
background:
  cultural: Janele grew up in a middle-class family in the Bay Area, where a strong work ethic and community values were emphasized. Though of white, Anglo-American heritage, her upbringing blended the
    pragmatic, self-reliant attitudes common in Northern California with the progressive, environmentally conscious mindset of the region. She was raised in a household that valued education and practical
    skills, leading her to pursue technical training after some college coursework. Her involvement with the local union and community organizations reflects a blend of traditional skilled-trade culture
    and the inclusive, collaborative spirit of contemporary California.
attributes:
  skills: '[''Pipe Installation'', ''Steamfitting'', ''Welding (MIG, TIG, oxy-acetylene)'', ''Brazing'', ''Blueprint & P&ID Interpretation'', ''Code Compliance (California Plumbing and Mechanical Codes)'',
    ''Safety Management (OSHA, OSHA 10/30)'', ''Project Scheduling & Coordination'', ''Inventory & Materials Management'', ''Apprentice Training & Mentorship'', ''Energy-Efficient System Design (LEED)'',
    ''Hydraulic System Troubleshooting'', ''Computer-Aided Design (basic CAD)'']'
  hobbies: '[''Custom Furniture Building'', ''Vintage Motorcycle Restoration'', ''Hiking (Mount Diablo)'', ''Cycling'', ''Reading (Engineering & History)'', ''Podcast Listening (Trades & Sustainability)'',
    ''Bullet Journaling'', ''Volunteer Mentoring (Youth Plumbing Program)'']'
  career_goals: Janele aims to become a certified Master Plumber and Steamfitter, obtaining the California State license and gaining recognition as a foreman within her union. She aspires to launch her
    own contracting firm specializing in sustainable commercial steam and hot-water systems for green buildings in the Bay Area. Additionally, she seeks to mentor more women and underrepresented individuals
    in the trades, possibly through a local apprenticeship outreach program. In the next five years, she hopes to lead large-scale projects, expand her technical expertise in renewable energy integration
    (e.g., geothermal heating), and achieve financial independence to support her family.
