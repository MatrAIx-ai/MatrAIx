  career_goals: Although retired from formal employment, Ken aims to leave a creative legacy in his community. He plans to compile a photo book documenting Nampa’s historic architecture and natural scenery,
    and hopes to exhibit it at the local museum. He also aspires to become a regular docent at the Caldwell Historical Museum, sharing his self‑taught knowledge of regional history. Mentoring remains a
    priority; Ken wants to lead a small woodworking club for teens, teaching them both craft skills and problem‑solving attitudes. On a personal level, he is eager to learn to play the harmonica and to
    finish a memoir that weaves together his life experiences, artistic reflections, and observations of changes in Idaho over the past seven decades.
