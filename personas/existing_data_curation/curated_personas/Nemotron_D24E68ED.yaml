  career_goals: Carrie Ann dreams of becoming an environmental scientist or researcher who can combine quiet observation of nature with practical problem‑solving. She is also fascinated by the idea of creating
    educational games as a programmer and hopes to write stories that explore both scientific concepts and human emotions. Ultimately, she wants a career that lets her work independently, contribute meaningfully
    to conservation or technology, and help others cope with stress and anxiety.
