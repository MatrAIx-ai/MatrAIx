personas:
  professional: Carrie Li is a budding junior coder and aspiring mystery storyteller, spending afternoons mastering Scratch animations, solving jigsaw puzzles, and drafting detective plots, channeling their
    curiosity and practical mindset into meticulous, solitary projects while quietly asserting their creative ideas.
  sports: Carrie Li enjoys low‑key physical activities such as weekend nature hikes with the local Forest Explorers club and quiet morning jogs in the nearby woods, follows the city’s junior soccer team
    the Maple Leaf FC for excitement, but prefers solitary movement over organized team sports.
  arts: Carrie Li immerses themselves in artistic expression by drawing detailed animal sketches inspired by Beatrix Potter, painting landscapes reminiscent of Claude Monet, practicing piano pieces by Ludwig
    van Beethoven, and admiring the whimsical animation style of Studio Ghibli, which together shape their quiet yet vivid inner world.
  travel: Carrie Li enjoys planning quiet weekend trips to nearby state parks like Redwood Preserve for birdwatching, dreams of exploring the natural wonders of Iceland’s waterfalls, and, when family budgets
    allow, looks forward to a future visit to the Smithsonian’s National Air and Space Museum, all while preferring low‑stress travel itineraries.
  culinary: Carrie Li favors simple, comforting meals such as homemade chicken noodle soup with carrots and noodles, buttery scrambled eggs with a dash of chives, and occasional sushi rolls with cucumber
    and avocado, often preparing them with modest kitchen skills while delighting in the tactile process of arranging ingredients.
  core: Carrie Li is a quietly determined ten‑year‑old who blends relentless curiosity with a love for solitude, often over‑thinking puzzles and worries, yet finds calm in birdsong, piano keys, and the
    steady rhythm of saving pennies.
background:
  cultural: Carrie Ann was raised in Lexington, South Carolina, within a family that values Southern hospitality, community gatherings, and an appreciation for the outdoors. Her household celebrates traditional
    holidays with regional foods such as barbecue and sweet tea, and she attends church services that emphasize kindness, responsibility, and service. Growing up in a small‑town environment has fostered
    a respect for local history, especially stories about the Piedmont region, and a deep connection to nature, which fuels her interest in environmental topics. While her surname suggests a multicultural
    ancestry, her cultural upbringing reflects the customs of a white Southern middle‑class family, blending community values with a love of quiet, solitary pursuits.
