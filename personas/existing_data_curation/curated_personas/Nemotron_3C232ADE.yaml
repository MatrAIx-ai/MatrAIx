    Communication'']'
  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Birdwatching'', ''Crossword Puzzles'', ''Pottery'', ''Volunteer Work at Senior Center'', ''Cooking (Italian and Middle‑Eastern Cuisine)'', ''Walking
    along the Rouge River'', ''Visiting Local Art Galleries and Museums'']'
  career_goals: As she approaches the next phase of her career, Launa aims to formalize a mentorship program that pairs senior administrative staff with emerging leaders, ensuring a smooth succession within
    her department. She plans to lead a pilot project that transitions her office to a largely paper‑less, cloud‑based workflow, leveraging her curiosity for new tools while demonstrating practical ROI.
    Launa is also pursuing the Certified Administrative Professional (CAP) credential to reinforce her expertise and, in the longer term, hopes to transition into a part‑time consultant role helping small
    Michigan businesses optimize their back‑office operations as she gradually reduces her full‑time hours.
