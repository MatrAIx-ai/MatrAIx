  career_goals: Eager to turn his love of art and storytelling into a profession, Oderay envisions himself as a multimedia creator who produces short films, animated sketches, and music‑video content that
    highlight Mexican heritage and contemporary youth culture. He aims to study graphic design or film production in high school and eventually college, with the goal of launching his own studio that commissions
    culturally resonant projects for brands and community organizations. In the short term, he hopes to grow a YouTube/TikTok channel that showcases his digital illustrations, comedic skits, and gaming
    commentaries, seeking recognition for his original ideas and a platform to influence peers. He also harbors the ambition to compete in e‑sports tournaments, blending his competitive gaming talent with
    a future career in digital entertainment.
