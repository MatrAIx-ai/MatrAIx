  hobbies: '["Reading fantasy novels", "Sketching wildlife", "Journaling reflections", "Birdwatching", "Hiking local trails", "Playing acoustic guitar", "Strategy board games with small group", "Collecting
    rocks/minerals", "Family gardening", "Creating Scratch animations"]'
  career_goals: Dai envisions a career that merges her scientific curiosity, love for hands‑on work, and desire to help living beings. She is drawn to fields such as veterinary medicine, wildlife rehabilitation,
    or environmental science, hoping to study biology in college and later work in a setting that balances independent fieldwork with a supportive community. She also entertains the idea of using digital
    media—like animation or illustration—to raise awareness about local ecosystems. While she acknowledges the uncertainties of the future, Dai aims to pursue higher education that equips her with both
    technical expertise and the ability to make a tangible, positive impact in her hometown or similar rural communities.
