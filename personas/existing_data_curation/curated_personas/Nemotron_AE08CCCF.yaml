  hobbies: '["Cooking Dominican cuisine", "Dancing merengue and bachata", "Gardening vegetables", "Volunteering at local food bank", "Participating in church choir", "Reading Caribbean literature", "Walking
    along waterfront trails"]'
  career_goals: Anita aspires to formalize her community work by completing her GED and obtaining certification as a community health worker, which would enable her to lead health education programs for
    seniors. She also dreams of launching a small home‑based catering service focused on authentic Dominican cuisine for local events, allowing her to share her culinary passion while generating supplemental
    income. In the longer term, she hopes to mentor a new generation of volunteers at the South Weymouth community center, creating inclusive programs that celebrate multicultural heritage.
