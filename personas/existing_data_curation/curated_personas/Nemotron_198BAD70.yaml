  career_goals: Lizette envisions a future where her love for animals and the environment merges with her practical mindset. She aspires to become a veterinarian or wildlife rehabilitator, hoping to work
    in a role that allows flexible problem‑solving and community outreach. She also imagines contributing to bilingual health or environmental education programs, keeping her cultural roots and curiosity
    at the forefront of her career.
