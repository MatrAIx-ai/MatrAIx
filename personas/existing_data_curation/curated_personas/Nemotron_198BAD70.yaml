personas:
  professional: Lizette Notario, a budding electronics hobbyist and comic creator, blends curiosity about circuitry with a practical eye for sketching sci‑fi heroes, often building simple Arduino projects
    while juggling schoolwork in a delightfully disorganized but enthusiastic way.
  sports: Lizette Notario laces up for the Vacaville United youth soccer league each spring, idolizes the San Francisco 49ers on Sundays and the Golden State Warriors during the NBA season, and balances
    a love of team drills with a self‑imposed habit of jogging the local creek trail after school.
  arts: Lizette Notario devotes free afternoons to sketching original comic heroes inspired by Stan Lee and Hayao Miyazaki, while sinking into sci‑fi epics by Neil Gaiman and J.K. Rowling, and their soundtrack
    ranges from Bad Bunny to Olivia Rodrigo, weaving a vibrant cultural tapestry into their creative identity.
  travel: Lizette Notario prefers spontaneous weekend road trips to nearby spots like Disneyland and the coastal trails of Santa Cruz, yet dreams of a future pilgrimage to Mexico City’s Día de los Muertos
    celebrations and an immersive anime tour of Tokyo, balancing a love of family‑centered travel with a budding appetite for global adventure.
  culinary: Lizette Notario tinkers in the kitchen alongside their family, mastering the perfect salsa roja, whipping up tacos al pastor and fluffy chilaquiles for holiday gatherings, while also experimenting
    with avocado‑lime smoothies and occasional pizza night, showcasing a middling cooking skill that blends heritage flavors with teen curiosity.
  core: Lizette Notario is a curiosity‑driven, slightly disorganized early teen who balances plastic‑rookie engineer projects with comic sketches, soccer runs, and a love for family traditions, all while
    habitually forgetting homework but never missing a chance for a midnight snack of churros.
background:
  cultural: Lizette is a second‑generation Mexican‑American raised in Vacaville, California. Her household speaks Spanish alongside English, preserving traditions like Día de los Muertos, family gatherings,
    and cooking heritage recipes. While immersed in the multicultural suburban environment of Solano County, she blends Mexican cultural values—family cohesion, respect for customs, and community spirit—with
    the broader American influences of school, technology, and diverse peer groups.
