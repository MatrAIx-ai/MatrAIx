personas:
  professional: Yael Ramoscaraballo is an aspiring visual storyteller who blends vibrant textile patterns with digital illustration, leveraging Adobe Photoshop, Illustrator, and Canva while channeling their
    sociable, spontaneous energy into freelance commissions and community art initiatives.
  sports: Yael Ramoscaraballo enjoys cheering for Austin FC, joins community‑center volleyball games on weekends, and attends salsa dance classes that double as cardio, reflecting a love for rhythm, social
    interaction, and spontaneous fitness.
  arts: Yael Ramoscaraballo immerses themselves in creative expression by sketching in local coffee shops, drawing inspiration from Frida Kahlo and the band Tame Impala, while curating mixed‑media collages
    that fuse traditional textile motifs with contemporary digital aesthetics.
  travel: Yael Ramoscaraballo prefers spontaneous road trips across Central Texas, stopping at Hill Country vineyards and historic San Antonio sites, while dreaming of a culturally immersive pilgrimage
    to Oaxaca to study traditional crafts and street art.
  culinary: Yael Ramoscaraballo has a palate for homemade tamales, chiles en nogada, and street‑style elote, often experimenting by adding smoked paprika to classic mole, balancing confident microwaving
    with earnest attempts at mastering masa by hand.
  core: Yael Ramoscaraballo is a free‑spirited, bilingual visual artist who trades organized plans for impromptu creativity, lives on caffeine and art supplies, and balances a love for community festivals
    with a habit of forgetting deadlines.
background:
  cultural: Yael comes from a Mexican‑American family that has lived in the Hutto area for several generations. She grew up speaking Spanish at home while also navigating an English‑dominant school environment,
    making her fluently bilingual and bicultural. Family traditions such as celebrating Día de los Muertos, cooking homemade tamales, and participating in Cinco de Mayo parades are central to her identity.
    The blend of Mexican heritage and Texan community life influences her artistic style, which often merges vibrant Mexican motifs with contemporary urban aesthetics. Her Catholic upbringing and close‑knit
    extended family provide a supportive network that encourages her creative pursuits and community involvement.
