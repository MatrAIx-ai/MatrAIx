  career_goals: Yael aims to complete her GED and enroll in a community college program in Visual Arts or Graphic Design to build a professional portfolio. She envisions working as a freelance illustrator
    and content creator, eventually securing a role as a creative director for a community cultural center that celebrates Mexican heritage in Central Texas. She also hopes to launch a YouTube channel and
    an Instagram account dedicated to mixed‑media art that blends traditional Mexican motifs with modern digital techniques. In the longer term, Yael aspires to mentor other young artists from her community,
    helping them navigate artistic careers and academic pathways.
