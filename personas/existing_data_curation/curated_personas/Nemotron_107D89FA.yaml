  career_goals: Robert aims to turn his love for the outdoors and people into a sustainable career. He plans to complete his GED within the next year and pursue an apprenticeship in outdoor recreation management
    or a skilled trade like carpentry, allowing him to merge his curiosity with practical craftsmanship. Long‑term, he envisions working as a park ranger or guide for the Gallatin National Forest, helping
    visitors experience the landscape safely while fostering stewardship. He also dreams of launching a small business that offers guided hikes, nature workshops for local youth, and handcrafted wooden
    gear. To achieve these goals, he intends to enroll in community‑college courses, obtain a wilderness first responder credential, and network with regional conservation groups.
