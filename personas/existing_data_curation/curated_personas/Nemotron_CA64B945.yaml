  career_goals: Steven hopes to pursue a college degree that merges his love for art and technology, such as graphic design or environmental/architectural design. He dreams of creating visually compelling,
    socially responsible work—whether that means designing sustainable community spaces, developing indie video games with strong narratives, or working as a multimedia artist for a nonprofit. He also values
    flexibility, so he envisions a career that allows him to continue learning and exploring new ideas while contributing positively to his community.
