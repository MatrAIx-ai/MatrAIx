personas:
  professional: Steven Assetta is an aspiring robotics hobbyist at his high school, blending a curious mindset with a balanced mix of organization and flexibility to design, program, and troubleshoot small
    autonomous robots, and they reliably collaborate with peers on club projects.
  sports: Steven Assetta enjoys weekend bike rides across the Iowa countryside, participates in the high school cross‑country team during fall, and follows the Iowa Hawkeyes football and Des Moines Menace
    soccer clubs, while they prefer low‑key, self‑paced fitness routines over organized team sports.
  arts: Steven Assetta immerses themselves in graphic novels like "Saga" and "Watchmen", sketches rural landscapes on the back of school notebooks, captures candid moments with a DSLR camera, and draws
    creative inspiration from indie musicians such as Tame Impala and Arcade Fire, as well as from the whimsical animation of Studio Ghibli.
  travel: Steven Assetta favors spontaneous, nature‑focused getaways, having camped in the Badlands and taken a road trip to Chicago’s art museums, they dream of visiting Kyoto for its manga culture and
    hiking the fjords of Norway, while balancing trips with school responsibilities and a limited travel budget.
  culinary: Steven Assetta enjoys cooking simple yet tasty meals like grilled chicken with Iowa corn on the cob, experimenting with homemade pizza topped with pepperoni and fresh basil, and savoring strawberry
    shortcake on summer evenings, though they often over‑season dishes in an attempt to impress friends.
  core: Steven Assetta is a curious, art‑loving teen who balances bike‑ridden adventures and robotics tinkering with occasional impulsive spending on comics, while they habitually forget to moisturize after
    workouts.
background:
  cultural: Steven grew up in Grundy Center, a small, close‑knit town in Tama County, Iowa. His family reflects a blend of Midwestern American values—emphasis on community, self‑reliance, and modesty—combined
    with a subtle heritage of Italian and Eastern European ancestry, which occasionally surfaces in family meals and holiday traditions. The local culture, rooted in agriculture, county fairs, and a strong
    school spirit, nurtured his appreciation for both the practical and the artistic sides of life. He attends a Protestant church with his family, celebrating community events and seasonal holidays that
    reinforce a sense of belonging and harmony.
