persona_description: A team of researchers and experts from various academic, industry, and government organizations who are working together to investigate the use of insect-killed trees as a sustainable
  feedstock for biofuel production. The team is led by Colorado State University and involves organizations such as Cool Planet Energy Systems, University of Wyoming, University of Montana, Montana State
  University, University of Idaho, and the USDA Forest Service Rocky Mountain Research Station. The project aims to assess beetle-kill feedstock availability and develop scalable thermochemical conversion
  technologies to produce high-quality renewable fuels and biochar. The project's goal is to create renewable energy while potentially creating jobs and reducing greenhouse gas emissions.
