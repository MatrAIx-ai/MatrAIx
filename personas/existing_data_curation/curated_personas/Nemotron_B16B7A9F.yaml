  career_goals: Braulio aims to advance to a senior software architect role where he can design enterprise-level solutions and mentor junior engineers. He aspires to obtain advanced cloud certifications
    (AWS Solutions Architect – Professional, Google Cloud Professional Architect) and to lead a cross-functional team that delivers high-impact, data‑driven products. Over the long term, he envisions launching
    his own consultancy focused on secure, scalable cloud migrations, leveraging his competitive edge to establish a reputation for technical excellence and reliability. Remote work environments that allow
    deep, uninterrupted focus align with his preference for solitude while still delivering measurable results.
