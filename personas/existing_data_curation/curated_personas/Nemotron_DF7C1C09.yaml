  career_goals: Michael dreams of becoming a scientist‑engineer, inspired by space exploration and robotics. He wants to lead a school robotics club someday and imagines designing a rover for Mars. His
    competitive spirit also fuels a desire to become a professional soccer player, where he can combine teamwork with personal excellence. As he grows, he hopes to contribute to his community as a firefighter
    or emergency responder, blending his practical mindset with a wish to help others.
