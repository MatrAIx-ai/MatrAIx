  hobbies: '["Building LEGO sets", "Playing soccer", "Reading adventure/Science‑fiction books", "Playing Minecraft", "Collecting baseball cards", "Participating in school’s STEM club", "Watching Las Vegas
    fireworks displays", "Doing simple science experiments"]'
  career_goals: Shane dreams of a future where he can combine his love for building with helping others. He often talks about becoming an engineer—designing structures or machines that solve everyday problems—because
    LEGO building sparks his imagination for creating practical solutions. He also admires the community role of firefighters, seeing them as reliable, routine‑oriented heroes who protect people, aligning
    with his desire for practicality and teamwork. To pursue these goals, he aims to excel in math and science classes, join the school's STEM club, and continue practicing soccer to develop teamwork skills.
