personas:
  professional: Shane Baum, an aspiring LEGO architect, channels their love for step‑by‑step instruction and imaginative tinkering into building complex models that showcase early engineering instincts,
    while their reliable, competitive nature drives them to constantly improve their creations.
  sports: Shane Baum, a competitive youth soccer midfielder for the Las Vegas Thunder U9 team, practices twice weekly, follows the Denver Broncos and Los Angeles Dodgers with avid interest, joins a weekend
    local baseball card club, and maintains a disciplined after‑school foot‑drill routine, though they occasionally skip cooldown stretches when eager to start video games.
  arts: Shane Baum, a devoted reader of adventure series like Rick Riordan’s Percy Jackson and sci‑fi titles such as The Maze Runner, enjoys building artistic LEGO scenes, watches Pixar’s Toy Story for
    inspiration, and follows Minecraft creator YouTuber DanTDM, all of which shape their creative play and visual imagination, and they often translate favorite story moments into brick designs.
  travel: Shane Baum, an eight‑year‑old who prefers short, well‑planned excursions, relishes family trips to Red Rock Canyon and the dazzling Las Vegas Strip lights, dreams of a weekend at Disneyland and
    a guided Grand Canyon tour, yet they resist long flights or unstructured adventures.
  culinary: Shane Baum, a budding home‑chef who loves assembling taco bowls with seasoned ground beef, cheddar, lettuce, and salsa, enjoys the crisp snap of carrot sticks with ranch dip, and treats themselves
    to mac and cheese on Fridays, while they are still at a beginner cooking level, guided by step‑by‑step recipes from their mom.
  core: Shane Baum, an eight‑year‑old LEGO enthusiast who thrives on routine, trades baseball cards with competitive flair, balances soccer drills with video‑game strategy, and insists on a nightly bedtime
    story before they dive into Minecraft.
background:
  cultural: Shane was born and raised in Las Vegas, Nevada, within a middle‑class white family that values stability, hard work, and community. His parents emphasize the importance of routine—regular school
    schedules, family meals, and weekend chores—which aligns with the city’s blend of organized suburban neighborhoods and the vibrant entertainment culture of the Strip. He frequently experiences local
    traditions such as attending Fourth of July fireworks at the Las Vegas Motor Speedway and hiking in the nearby desert landscapes of Red Rock Canyon, fostering an appreciation for both the city’s lively
    atmosphere and its natural surroundings. This mix of suburban American values and the unique Nevada environment shapes his practical outlook and love for structured activities.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "LEGO construction", "Scratch programming basics", "Organizing personal space", "Following daily routines", "Strategic board games (Connect Four)",
