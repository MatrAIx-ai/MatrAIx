personas:
  professional: Caitlyn Littlejohn is a disciplined police officer in Alamogordo who applies meticulous incident-report writing, precise firearms proficiency, and de-escalation techniques while leveraging
    community-outreach skills to foster trust in the desert neighborhoods she patrols, and she methodically pursues an associate's degree in criminal justice along with investigative certifications to pave
    the way toward a juvenile detective role.
  sports: Caitlyn Littlejohn is an avid hiker of the White Sands dunes who joins the Alamogordo Trail Runners club for weekly runs, supports New Mexico United in the USL Championship and follows the Texas
    Rangers baseball team, and maintains tactical readiness through bodyweight circuits and bi-weekly sprint intervals.
  arts: Caitlyn Littlejohn captures desert sunsets with a Nikon D5600, draws inspiration from Ansel Adams and contemporary landscape photographer Charlie Waite, unwinds with crime novels by Agatha Christie,
    Gillian Flynn, and Michael Connelly, and relaxes to the folk-indie sounds of Iron & Wine and Sufjan Stevens, weaving visual and literary influences into a quiet creative outlet.
  travel: Caitlyn Littlejohn prefers meticulously planned road trips that blend desert exploration with stargazing, having driven to Carlsbad Caverns, Monument Valley, and Sedona, and now maps a spring
    adventure to Iceland's aurora-lit highlands and a summer trek across Patagonia's Torres del Paine while budgeting each mile to align with her limited leave and modest police salary.
  culinary: Caitlyn Littlejohn enjoys moderate-level cooking, frequently preparing New Mexican green chile stew seasoned with rosemary from her herb garden, searing trout with lime-zest butter, and tossing
    fresh cactus-flower salads drizzled with olive oil, while occasionally dining out for carne adovada at the local family-run diner.
  core: Caitlyn Littlejohn blends a methodical, community-focused policing style with a solitary love of desert nights, disciplined budgeting, and a habit of double-checking every detail, even if it means
    sacrificing spontaneous fun.
background:
  cultural: Caitlyn grew up in a close‑knit, predominantly white community in Alamogordo, New Mexico, where Southwestern values of self‑reliance and respect for the land are prominent. Her family observes
    traditional American holidays—Thanksgiving, Fourth of July celebrations, and local county fairs—while also participating in community events that reflect the region’s blend of Anglo and Hispanic influences.
    Exposure to nearby Hispanic culture gave her a functional knowledge of Spanish and an appreciation for regional foods and music. A modest Christian upbringing instilled a sense of service and responsibility,
    which now informs her dedication to law enforcement and community welfare.
attributes:
  skills: '["Law Enforcement Procedures", "Firearms Handling", "Report Writing", "First Aid and CPR", "Community Outreach", "De‑escalation Techniques", "Basic Spanish", "Crisis Intervention", "Investigation
    and Evidence Collection", "Physical Fitness and Defensive Tactics"]'
  hobbies: '["Hiking White Sands dunes", "Astronomy and stargazing", "Desert landscape photography", "Reading mystery and crime novels", "Crossword and sudoku puzzles", "Herb gardening", "Volunteering at
    animal shelter", "Neighborhood watch meetings"]'
  career_goals: Caitlyn aims to advance methodically within the police department. Over the next three years she plans to complete an associate’s degree in criminal justice and earn advanced certifications
    in investigative techniques and community policing. Her ultimate ambition is to become a detective specializing in juvenile cases, leveraging her compassionate nature to mentor at‑risk youth. Long‑term,
    she envisions a leadership role, such as sergeant or precinct commander, where she can implement structured, community‑focused policies.
