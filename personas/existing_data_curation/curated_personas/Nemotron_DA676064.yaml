personas:
  professional: Linda Johnson is a methodical medical‑surgical and telemetry nurse who blends clinical rigor with creative art‑therapy concepts, mentors new staff, leads quality‑improvement projects, and
    they are actively pursuing a BSN and certification to transition into a charge nurse and eventually a nurse manager role.
  sports: Linda Johnson enjoys early‑morning trail hikes with the regional Sierra Club chapter, attends Chicago Cubs games in summer, follows the Chicago Bulls in winter, and balances her fitness regimen
    with yoga classes at a downtown studio, though they admit to skipping leg days after long shifts.
  arts: Linda Johnson channels her curiosity into watercolor landscapes inspired by Monet and O'Keeffe, regularly visits the Art Institute's rotating exhibitions, volunteers at a community theater that
    stages August Wilson plays, and fills evenings with indie folk playlists featuring artists like Iron & Wine and Sufjan Stevens, while they occasionally binge‑read literary fiction in the book club.
  travel: Linda Johnson prefers thoughtfully planned weekend getaways to nearby state parks such as Red Rock Canyon, combines them with occasional urban escapes to Chicago’s vibrant neighborhoods, has already
    explored Santa Fe for its art scene, and dreams of a cultural immersion trip to Kyoto and a culinary tour of Tuscany, often using airline points earned through their rewards credit card to offset costs,
    and they plan each outing around galleries and local food markets.
  culinary: Linda Johnson enjoys experimenting in the kitchen, skillfully preparing Thai green curry with fresh lemongrass and kaffir lime, mastering a rustic Italian risotto with Arborio rice and porcini
    mushrooms, and sprinkling turmeric and sumac into vegetable roasts, while they occasionally treat themselves to a Saturday night take‑out sushi roll from the local Japanese spot.
  core: Linda Johnson is a curiosity‑driven nurse‑leader who balances meticulous clinical care with artistic expression, fuels their days with morning yoga, weekend hikes, and spontaneous watercolor sessions,
    yet they habitually hit snooze on their alarm after night shifts, ending each week with a self‑cooked global‑flavor feast.
background:
  cultural: Linda grew up in the Midwestern United States, rooted in a suburban Ohio community that values reliability, neighborly support, and active citizenship. Her cultural background reflects a blend
    of Midwestern pragmatism and an appreciation for local arts and community events. While she identifies with the broader Anglo‑American tradition, she also embraces the region's emphasis on volunteerism,
    family involvement, and straightforward communication. These influences shape her compassionate nursing practice, her collaborative spirit, and her enthusiasm for engaging with diverse groups in both
    professional and personal contexts.
attributes:
  skills: '["Patient assessment", "Medication administration", "IV insertion and therapy", "Wound care", "Electronic health record documentation", "Patient education", "Quality improvement initiatives",
