  hobbies: '["Art gallery and museum visits", "Watercolor painting", "Theater attendance", "Book club participation", "Hiking", "Volunteering at food bank", "Yoga", "Cooking and recipe experimentation"]'
  career_goals: Linda aims to earn her Bachelor of Science in Nursing within the next two years, followed by certification in medical‑surgical nursing. She aspires to transition into a charge nurse role
    and eventually become a nurse manager, where she can shape unit policies and mentor a larger team. Long‑term, she is interested in pursuing a family nurse practitioner degree to provide primary care
    in her community, and she hopes to champion programs that incorporate creative arts into therapeutic settings to enhance patient well‑being.
