  career_goals: Although no longer employed full‑time, Haresh aims to stay intellectually active by mentoring under‑represented youth in STEM through local community workshops and library tech‑literacy
    programs. He hopes to author a memoir that blends his immigrant experience with lessons from his engineering career, preserving his legacy for future generations. Practically, he wants to maintain his
    health and independence by integrating modest physical activity into his routine and staying financially secure through careful budgeting. He also plans to acquire a short certification in renewable‑energy
    technologies to satisfy his curiosity while contributing to sustainable projects in his neighborhood.
