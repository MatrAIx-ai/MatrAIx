persona_description: A researcher who is interested in understanding the impact of immigration policies on the sense of community among immigrants and longer-term residents, as well as the influence of
  adults on the mental health and educational outcomes of low-income youth and youth of color. They are also interested in the effects of deportation on families and communities and the context that many
  first-generation minority college students have endured prior to getting to higher education, specifically the disproportionately high number of Adverse Childhood Experiences (ACEs) and their long-lasting
  impacts. Additionally, they are interested in the processes of minority stress and community resilience among racially diverse sexual minority men.
