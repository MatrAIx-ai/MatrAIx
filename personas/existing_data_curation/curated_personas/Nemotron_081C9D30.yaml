personas:
  professional: Sun Lam is an aspiring teenage robotics engineer who channels her methodical planning and competitive drive into designing award-winning competition bots for school science fairs.
  sports: Sun Lam swims five times a week with the local junior aquatic club, trains for regional meets, and finds extra motivation by following the US Olympic swimming team, while also cheering for the
    New York Knicks during basketball season.
  arts: Sun Lam sketches characters inspired by Studio Ghibli's Totoro, devotes weekends to drawing manga panels, and recharges by listening to Daft Punk's synth-laden albums and rereading Isaac Asimov's
    Foundation series, which fuel her creative imagination.
  travel: Sun Lam prefers meticulously planned trips that blend scientific exploration with leisure, having toured the Exploratorium in San Francisco and the robotics pavilion at Tokyo's Miraikan, and she
    dreams of a future visit to the International Space Station's virtual exhibit in Houston.
  culinary: Sun Lam favors Japanese comfort food, especially tonkotsu ramen with soft-boiled eggs and pork belly, enjoys making homemade sushi rolls with tuna and avocado, and occasionally treats herself
    to galaxy-themed cupcakes topped with edible glitter.
  core: Sun Lam is a methodical, competitive teen who balances robotics and chess with disciplined savings, diligent health routines, and a love for sci-fi-infused art, yet often forgets to clean her room
    amidst busy projects.
background:
  cultural: Sun Y Lam is a second‑generation Chinese‑American whose parents immigrated from Taiwan. Growing up in Long Beach's diverse neighborhood, she celebrates traditional festivals such as Lunar New
    Year and the Mid‑Autumn Festival, and her family places a high value on education and perseverance. Bilingual at home, she navigates both Western and Eastern cultural expectations, integrating the communal
    emphasis on family respect with her personal drive for independent achievement.
attributes:
  skills: '["Introductory Programming (Python, Scratch)", "Middle‑School Mathematics (Algebra, Geometry, Statistics)", "Robotics Kit Assembly and Programming", "Project Planning and Time Management", "Bilingual
    Communication (English & Mandarin)"]'
  hobbies: '["Robotics Kit Building and Programming", "Chess Strategy and Club Play", "Science‑Fiction Reading", "Science Fair Projects", "Swimming", "Sketching and Doodling"]'
  career_goals: Sun Y Lam aims to pursue a career in engineering, with a particular interest in robotics or software development. She plans to attend a competitive high school, secure scholarships for STEM
    programs, and eventually earn a degree in computer engineering or mechatronics. Her long‑term ambition is to lead innovative projects that blend practical problem‑solving with cutting‑edge technology,
    while also mentoring younger students from under‑represented backgrounds in her community.
