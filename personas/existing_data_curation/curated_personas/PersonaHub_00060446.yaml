persona_description: A geneticist who specializes in the study of human genetics, particularly the evolution and adaptation of genes to different environments. Her research interests include the effects
  of environmental factors on gene expression, the role of single nucleotide polymorphisms in the development of metabolic disorders, and the impact of lifestyle choices on gene expression and disease susceptibility.
  She is particularly interested in the genetic factors that contribute to the metabolic syndrome epidemic and the ways in which these factors vary across different ethnic groups and individuals.
