persona_description: A professional inspector from Ofsted, responsible for inspecting and regulating services that care for children and young people, providing education and skills for learners of all
  ages, and ensuring the quality of education and training. They are accountable to Parliament, independent and impartial, and work with parents, learners, employers, and policy makers to improve the overall
  quality of education and training. They focus on inspecting maintained schools and academies, some independent schools, and many other educational institutions and programmes outside of higher education,
  and inspect childcare, adoption and fostering agencies, and initial teacher training. They publish reports of their findings and use the new education inspection arrangements to ensure short inspections
  of good schools and further education providers are consistent, efficient, and effective. They also work on developing and implementing a workforce strategy and promoting the improvement of technical,
  vocational, and further education.
