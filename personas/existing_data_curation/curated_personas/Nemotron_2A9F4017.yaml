personas:
  professional: Anthony Epifanio is a veteran commercial painter who leverages five decades of surface‑preparation mastery, precise color matching, and OSHA‑compliant safety leadership into consulting,
    while their methodical, reliable nature and competitive edge ensure projects finish on budget and on schedule.
  sports: Anthony Epifanio cheers for the Detroit Tigers at Comerica Park each spring, participates in the local seniors’ walking club for cardio, and once a year joins a community softball league, balancing
    their competitive spirit with low‑impact fitness.
  arts: Anthony Epifanio devotes evenings to painting small canvases inspired by future mural projects, while soaking in big‑band jazz classics from Duke Ellington and Glenn Miller, and occasionally attends
    a local theater production of The Sound of Music to satisfy their love of performance.
  travel: Anthony Epifanio prefers road‑trip adventures within the Midwest, having driven the historic Route 66 to Chicago, explored Mackinac Island’s car‑free streets, and dreaming of a pilgrimage to New
    York’s Carnegie Hall for a jazz recital, balancing careful budgeting with a desire for cultural immersion.
  culinary: Anthony Epifanio relishes cooking traditional spaghetti carbonara, baked lasagna layered with ricotta, and slow‑roasted osso buco, using fresh garlic, extra‑virgin olive oil, and San Marzano
    tomatoes, although they occasionally over‑spice in their zeal to honor family Sunday‑meal traditions.
  core: Anthony Epifanio is a meticulous, community‑focused painter‑turned‑mentor who blends a competitive drive with a love for jazz, classic cars, and hearty Italian cooking, all while balancing tight
    budgeting, senior‑friendly fitness, and the occasional forgetful health habit.
background:
  cultural: Anthony is a third-generation Italian-American raised in the industrial heartland of Michigan. His grandparents emigrated from Southern Italy in the 1920s, settling in Detroit’s bustling neighborhoods
    where a strong work ethic, Catholic faith, and close‑knit community values were emphasized. Growing up in Lincoln Park, he absorbed the Midwestern blend of pragmatism and neighborliness, which shaped
    his practical approach to work and his sociable demeanor. Family traditions—such as Sunday pasta meals, celebrations of Feast of St. Anthony, and participation in local parish events—remain a cornerstone
    of his identity, while his lifelong career in painting reflects the region’s legacy of skilled tradespeople.
