personas:
  professional: Ihab Keenan, a retired handyman turned senior center volunteer coordinator, leverages decades of carpentry, plumbing, and budgeting skills to organize community events with meticulous schedules,
    while mentoring teens in practical trades and documenting local history with a disciplined, calm demeanor.
  sports: Ihab Keenan enjoys early‑morning fishing along the Gulf Coast, follows the Tampa Bay Buccaneers and the Miami Heat with a loyal, schedule‑driven routine, participates in community senior yoga
    classes, and occasionally joins a local shuffleboard league at the senior center, valuing predictable, low‑impact activities over high‑intensity sports.
  arts: Ihab Keenan delights in classic jazz, frequently playing Louis Armstrong, Ella Fitzgerald, and Bill Evans on their vintage record player while sharing stories of historical non‑fiction authors like
    David McCullough, and they attend monthly community theater performances, though they admit to a habit of humming along loudly, sometimes startling fellow attendees.
  travel: Ihab Keenan prefers short, well‑planned trips to familiar Gulf destinations such as Sanibel Island and Naples, enjoys occasional cruises to the Caribbean that fit their fixed schedule, and dreams
    of a relaxed road‑trip to Savannah’s historic district, always booking accommodations that offer easy access and quiet mornings for fishing.
  culinary: Ihab Keenan favors Florida staples like stone crab claws, key lime pie, and conch chowder, cooks at a moderate skill level, meticulously preparing meals with fresh herbs such as basil and cilantro,
    and maintains a small garden of native peppers to supplement dishes, though they sometimes over‑salt their soups due to a lingering habit from their handyman days.
  core: Ihab Keenan is an 86‑year‑old tinkering retirement enthusiast who blends disciplined routines, low‑risk finances, and gentle health habits with a love for jazz, fishing, and preserving local heritage,
    all while occasionally clinging to old‑school quirks.
background:
  cultural: Ihab’s cultural background is rooted in mid-20th-century American middle-class values, shaped by an Irish-American family that emphasized hard work, self-reliance, and community service. Raised
    in the Midwest, he grew up in a close-knit Protestant community, attending church regularly and participating in local civic events. His move to Englewood, Florida, after retirement introduced him to
    the coastal retiree culture, where he blended his practical, structured upbringing with the relaxed, nature-focused lifestyle of Sarasota County. This mix of Midwestern discipline and Floridian leisure
    informs his daily routines, social interactions, and commitment to preserving local heritage.
attributes:
  skills: '["Carpentry and woodworking", "Basic plumbing and electrical repairs", "Seasonal gardening and plant care", "Household budgeting and financial planning", "Volunteer coordination and event organization",
