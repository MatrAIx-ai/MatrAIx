personas:
  professional: Mark Collins is a 20‑year‑old residential and light‑commercial electrician with a thorough grasp of the National Electrical Code, blueprint interpretation, and renewable‑energy installations.
    They are methodical, logging each safety check, and are known for building custom LED setups and Arduino home‑automation rigs in their downtime. Ambitious, they aim to earn journeyman certification
    within two years and become a Master Electrician foreman, eventually founding a smart‑home retrofit firm that blends practical wiring expertise with cutting‑edge solar and battery tech. Their competitive
    streak drives them to outperform peers on project efficiency metrics, while their skepticism makes them double‑check plans before signing off.
  sports: Mark Collins embraces rugged winter sports, logging frequent snowshoe treks through the North Shore and cross‑country ski outings on the Superior Trail, proudly wearing a Lake Superior Snowshoe
    Club patch. They are an active member of the Midwest Shooting Association, where they practice at the local range and compete in small‑bore rifle matches. In the off‑season, they follow the Minnesota
    Wild (NHL), the Minnesota Vikings (NFL), and the Minnesota Twins (MLB), often wearing a vintage Wild jersey while playing weekly pool matches in the local bar league. Their competitive nature also spills
    into e‑sports, where they attend regional Rocket League tournaments.
  arts: Mark Collins channels creative energy into acoustic guitar, often leading sing‑alongs at community barn dances where they tackle classics by The Eagles, Neil Young, and Bob Dylan. Their hands‑on
    hobby of woodworking yields small pine coffee tables that double as display pieces for their concert‑go‑to vinyl collection, especially albums by the Avett Brothers and The Lumineers. When not strumming,
    they enjoy attending the local theater’s Fall Harvest Play and streaming indie folk documentaries. Their love for vintage motorcycles also fuels an appreciation for retro design aesthetics, evident
    in their custom LED lighting projects inspired by 1970s sci‑fi album covers.
  travel: Mark Collins prefers trip planning with the same precision they apply to wiring diagrams, drafting detailed checklists for gear, routes, and weather forecasts. They spend summer weekends camping
    in the Boundary Waters Canoe Area, where they set up solar chargers to power their handheld GPS and LED lanterns. A recent road‑trip to Door County’s wine country satisfied their curiosity for local
    harvests, while a winter visit to Quebec’s Mont‑Tremblant allowed them to ski on real powder—an experience they’ve bookmarked for future visits. Budget constraints keep them from long‑haul overseas
    trips, but they dream of a future Lapland Aurora excursion to witness the northern lights above frozen lakes.
  culinary: Mark Collins enjoys a practical yet adventurous palate, favoring hearty Midwestern staples like pan‑seared walleye with lemon‑butter sauce, bison burgers topped with smoked gouda, and wild‑rice
    pilaf sprinkled with toasted pine nuts. Their cooking skill is intermediate; they routinely fire up a cast‑iron skillet for breakfast skillet hash featuring sweet potatoes, onions, and a dash of cayenne
    pepper. They love the ritual of making fresh apple pie using Granny Smith apples and a flaky crust, and they often grill s’mores over a portable campfire after night‑time snowshoeing. When they experiment
    with food, it is usually a DIY solar dehydrator to make jerky, reflecting their affinity for tech‑infused outdoor cuisine.
  core: Mark Collins is a methodical, competition‑driven young electrician who blends hands‑on tech tinkering with a strong safety ethic, balancing tight budgets, occasional impulsive splurges, and a disciplined
    approach to health, sport, and creative pursuits.
background:
  cultural: Mark grew up in Cold Spring, a small town in Stearns County, Minnesota, where the community values hard work, self‑reliance, and modesty. His family has deep Scandinavian roots, with traditions
    of Lutheran church attendance and community potlucks. The Midwestern cultural emphasis on reliability, punctuality, and practical problem‑solving shaped his organized and methodical personality. He
    was raised with an appreciation for the outdoors—hunting, fishing, and winter sports—and a respect for trade skills, which encouraged his decision to pursue an electrician career path rather than a
    purely academic route.
