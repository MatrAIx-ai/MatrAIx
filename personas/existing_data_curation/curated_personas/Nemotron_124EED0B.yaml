  career_goals: Mark aims to become a licensed Master Electrician within the next five years, earning his journeyman certification and then completing the required apprenticeship hours for master status.
    He is driven to lead a crew as a foreman, leveraging his organized, methodical approach to improve project efficiency and safety records. Long‑term, he hopes to start his own contracting firm specializing
    in smart‑home retrofits and renewable‑energy solutions for rural Minnesota, positioning his business as the most reliable and competitively priced provider in the region. He also plans to pursue advanced
    certifications in solar and energy storage to stay ahead of industry trends.
