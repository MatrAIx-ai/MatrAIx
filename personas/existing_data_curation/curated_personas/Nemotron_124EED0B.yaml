  hobbies: '[''Arduino home automation'', ''LED lighting builds'', ''Motorcycle restoration'', ''Snowshoeing'', ''Cross-country skiing'', ''Ice fishing'', ''Shooting sports'', ''Woodworking'', ''Guitar
