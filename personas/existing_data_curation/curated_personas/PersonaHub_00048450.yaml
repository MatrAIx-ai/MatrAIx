persona_description: A scientist who specializes in the field of radiation health and safety, particularly in the study of the health risks associated with low-level ionizing radiation. She is a co-author
  of the restatement of the natural science evidence base concerning the health effects of low-level ionizing radiation, and is known for her expertise in the use of epidemiological studies to assess the
  risks of radiation exposure. Her research interests include the biological basis of the damage from radiation to DNA and cells, and the genetic healthcare implications of radiation exposure. She is also
  a leading expert in the field of radiation protection and is involved in the development of guidelines for radiation exposure.
