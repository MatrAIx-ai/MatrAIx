personas:
  professional: Linda Southern, a seasoned operations manager in a personal‑service firm, blends data‑driven process optimization with a personable, collaborative leadership style, using her strategic business
    acumen to balance structured planning and flexible problem‑solving while championing community‑focused initiatives.
  sports: Linda Southern spends weekends sailing on Casco Bay with the Brunswick Yacht Club, powers through spin and yoga sessions at a downtown studio, jogs the trails of Acadia National Park during summer,
    roots for the Boston Red Sox, New England Patriots, and Boston Celtics, and participates in a local women’s running group that meets after the weekly book club.
  arts: Linda Southern frequents live music at Brunswick Music Hall, where she enjoys folk‑rock acts like The Decemberists and local singer Brooke Smith, supports community theater productions at the Maine
    State Theatre, and draws leadership inspiration from podcasts by Brené Brown and TED talks by Simon Sinek during her book‑club gatherings.
  travel: Linda Southern favors meticulously planned yet spontaneous road trips along the New England coastline, has explored Acadia National Park, historic Boston, a sailing charter in the Bahamas, and
    dreams of navigating the Scottish Highlands to connect with her maritime roots while balancing family commitments.
  culinary: Linda Southern delights in cooking seasonal New England fare, from buttery lobster rolls and creamy New England clam chowder to blueberry cobbler and herb‑crusted Atlantic cod, often sourcing
    fresh produce and seafood at the Portland Farmers’ Market and experimenting with thyme, sage, and locally harvested maple syrup.
  core: Linda Southern merges pragmatic New England self‑reliance with a community‑first spirit, steering her career and life with disciplined planning, a love for sailing, and a habit of over‑committing
    to volunteer projects.
background:
  cultural: Linda grew up in a small coastal town in Maine, rooted in a New England white, Anglo‑American heritage that values self‑reliance, community engagement, and practicality. The region’s maritime
    culture and close‑knit neighborhood traditions have shaped her appreciation for collaborative projects and seasonal outdoor activities. She actively participates in local civic organizations, celebrates
    regional holidays such as the Maine Lobster Festival, and incorporates the region’s modest, work‑oriented ethos into both her personal and professional life.
attributes:
  skills: '[''Operational planning'', ''Budget management'', ''Process improvement'', ''Client relationship management'', ''Team leadership'', ''Staff training and development'', ''Quality assurance'',
