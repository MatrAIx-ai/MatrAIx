persona_description: A veterinarian who specializes in the surgical reconstruction of skin flaps and the management of wounds, especially those associated with burns and trauma. They are experienced in
  the placement of sutures and the use of skin closure techniques to prevent the development of dog-ears. They are skilled in the placement of sutures in the center of the defects, and are aware of the
  importance of evenly distributing skin tension along the suture line to prevent a dog-ear from developing at the base of the flap.
