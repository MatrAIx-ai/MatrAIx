  career_goals: Although no longer employed, Hung Ho aims to leave a lasting legacy through community mentorship and intergenerational knowledge sharing. He plans to volunteer as a STEM tutor for local
    high‑school students, guide his grandchildren’s academic pursuits, and contribute to neighborhood improvement committees. He also hopes to document his life story and family history in a memoir, preserving
    cultural heritage for future generations. Maintaining health, staying active, and nurturing his marriage remain central to his personal ambitions.
