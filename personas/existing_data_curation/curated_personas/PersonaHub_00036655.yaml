persona_description: A conservationist working with the United Nations Environment Programme, focusing on developing and implementing strategies for environmental protection in developing countries. They
  are skilled in ecosystems approach to resource management and have experience in establishing baseline data, targets, monitoring, and reporting. They are knowledgeable about international environmental
  agreements, particularly those that impact factors such as climate, oceans, rivers and air pollution, and have a deep understanding of the role of government, legislation, and law enforcement in environmental
  protection. They are passionate about protecting the environment and its biodiversity, and have a unique perspective on the challenges and opportunities facing conservation efforts in developing countries.
