  career_goals: As she approaches retirement, Griselda aims to transition into a part‑time consulting role where she can mentor emerging accountants and provide financial advisory services to local small
    businesses, particularly those serving the Colombian and broader Latino community. She also seeks to obtain a Certified Internal Auditor (CIA) designation to formalize her expertise and to volunteer
    as a financial literacy instructor at community centers.
