  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Balcony gardening'', ''River walks along the Patapsco'', ''Attending community theater'', ''Cooking Mediterranean recipes'',
    ''Reading scientific biographies'', ''Volunteering at senior center'', ''Leading art‑craft workshops'', ''Yoga and mindfulness practice'', ''Traveling to cultural festivals'']'
  career_goals: Patricia aims to transition from full‑time bedside nursing to a part‑time mentorship and community‑health consultancy role. She is passionate about establishing a neighborhood wellness initiative
    in Curtis Bay that combines health education with art workshops for older adults. Over the next few years she hopes to mentor junior nurses, contribute to policy discussions on senior care, and author
    a guide on integrating creative therapies into nursing practice.
