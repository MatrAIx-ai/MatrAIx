  career_goals: Robert aspires to transform his self-taught artistic talents into a professional career as a multimedia concept artist and later a creative director for indie video-game studios. He plans
    to obtain a GED within the next year, then enroll in a community-college program in graphic design or digital media, supplementing formal training with online courses in animation and interactive storytelling.
    His goal is to build a robust online portfolio that showcases abstract digital art, concept sketches, and short animated reels, attracting freelance commissions and collaborative projects. Over the
    next five years, he hopes to secure a junior artist position at a boutique studio, where he can contribute to world-building and narrative design, while also using his organizational strengths to lead
    small art teams. In the longer term, he dreams of establishing his own independent studio that creates socially conscious visual experiences and community murals that reflect the cultural mosaic of
    Salinas.
