persona_description: A public health researcher who is conducting studies on the effects of triclocarban on nursing babies, particularly in the womb and during nursing. The researcher is conducting research
  on the compound's impact on the survival rates of babies, and is looking into ways to minimize exposure to the compound. The researcher is also interested in the compound's potential exposure routes in
  daily life, and is working to minimize those exposure routes. The researcher is supported by the National Institutes of Health's National Institute of Environmental Health Sciences.
