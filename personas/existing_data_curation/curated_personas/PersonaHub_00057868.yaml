persona_description: A sustainability educator and environmentalist who is passionate about promoting green living and sustainable practices. She is also a freelance writer and conducts eco-literacy classes
  and horticulture therapy classes. Her work includes organizing virtual communities of urban organic gardeners and consumers, promoting heirloom seeds, and launching a green curriculum and lesson plans
  for teachers and students. She is known for her expertise in environmental issues and organic gardening, and has written several books on the subject.
