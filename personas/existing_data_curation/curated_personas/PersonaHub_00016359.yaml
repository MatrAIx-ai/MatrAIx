persona_description: A scientist or researcher in the field of immunology, specifically focusing on maternal HIV Env-specific responses and their role in reducing mother-to-child transmission of HIV. They
  are likely to be interested in understanding the fine specificity and function of maternal HIV Env-specific responses, including maternal autologous-virus IgG-neutralizing antibodies and ways that maternal
  circulating viruses escape from these antibodies. They may also be interested in developing maternal vaccination strategies to block MTCT and achieve an HIV-free generation.
