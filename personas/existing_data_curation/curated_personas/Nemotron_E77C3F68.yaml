  hobbies: '["Reading poetry and art literature","Watercolor painting and collage workshops","Balcony gardening with herbs and vegetables","Volunteer storytelling and cultural craft circle","Visiting local
    galleries and street murals","Listening to traditional Salvadoran music and Latin jazz"]'
  career_goals: Although retired from formal employment, Vicente’s ambition centers on leaving a cultural legacy within the Los Angeles Salvadoran community. He aims to compile a handwritten and digital
    anthology of family recipes, stories, and migration experiences to share with his grandchildren and neighborhood youth. He aspires to volunteer regularly at the local Latino cultural museum, guiding
    tours in Spanish and assisting with exhibitions that showcase Central American folk art. A personal milestone he hopes to achieve is to travel back to El Salvador to visit his hometown and attend the
    annual Feria de la Canción, bringing back photographs and artifacts that can enrich his community’s cultural archive.
