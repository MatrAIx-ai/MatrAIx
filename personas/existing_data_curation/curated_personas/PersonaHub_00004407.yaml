persona_description: A researcher in the field of immunology and allergy, particularly focused on the role of innate lymphoid cells in the progression of atopic dermatitis. They have identified a previously
  unknown role for these cells in the development of other allergic diseases and have proposed that they may be a new therapeutic target. The researcher is interested in the tissue-specific local signals
  that regulate these cells and how they may be targeted to limit disease severity.
