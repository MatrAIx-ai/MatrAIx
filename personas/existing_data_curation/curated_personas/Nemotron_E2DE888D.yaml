  hobbies: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''photography'', ''visiting art galleries'', ''cooking Mexican cuisine'', ''hiking'', ''yoga'', ''listening to indie and Latin
    music'', ''reading graphic novels'', ''participating in online art challenges'']'
  career_goals: Lizette aspires to pursue a bachelor's degree in Visual Arts or Graphic Design, aiming to become a professional illustrator and art director who blends contemporary design with Mexican cultural
    motifs. She hopes to secure internships at design studios to refine her skills, and eventually launch a freelance studio specializing in branding for small businesses and cultural organizations. Long-term,
    she envisions establishing a community arts center in her hometown of Adel, offering workshops that celebrate multicultural art and empower youth. She also desires to travel to Mexico to study traditional
    arts and incorporate them into her work.
