persona_description: A researcher at the U.S. Department of Energy's Joint BioEnergy Institute who specializes in engineering plants for more efficient production of advanced biofuels. He has expertise
  in using the tools of synthetic biology to beat the double-edged sword of xylan in plant cell walls, which is an enormous source of stored solar energy but also makes it more difficult to extract the
  hexoses in cellulose that are more easily fermented into biofuels. He is working with Arabidopsis, a model plant, to engineer plants with reduced levels of xylan in their cell walls while preserving the
  structural integrity of the xylem vessels that the plants use for nutrient transport. His work is described in a paper published in the open-access journal Biotechnology for Biofuels, titled "Engineering
  of plants with improved properties as biofuels feedstocks by vessel-specific complementation of xylan biosynthesis mutants."
