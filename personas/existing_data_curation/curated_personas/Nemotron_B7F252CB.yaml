personas:
  professional: Adolfo Santiagohernandez, a bilingual postsecondary instructor, leverages their curiosity and methodical organization to design interdisciplinary art‑technology curricula that engage students
    while fostering cultural pride through projects like Día de los Muertos mural installations, and they consistently channel their sociable energy into collaborative workshops.
  sports: Adolfo Santiagohernandez plays in a co‑ed soccer league every Saturday, cheers for Club América and follows Dallas FC, and they support the Dallas Mavericks by attending occasional games, while
    they also enjoy the camaraderie of local pickup basketball at the community center.
  arts: Adolfo Santiagohernandez spends weekend evenings sketching Dallas’ skyline, volunteers in a community theater setting up lights and props, and they regularly attend gallery openings featuring artists
    like Kehinde Wiley and Frida Kahlo retrospectives, drawing inspiration for their interdisciplinary classroom modules.
  travel: Adolfo Santiagohernandez prefers culturally immersive trips that blend art and food, having explored Oaxaca’s mercados, trekked the Texas Hill Country’s wildflower trails, and visited Santa Fe’s
    Canyon Road for its galleries, they plan future journeys to Puebla for its culinary workshops and to Barcelona for its modernist architecture, always budgeting carefully but leaving room for spontaneous
    street‑food stops.
  culinary: Adolfo Santiagohernandez whips up traditional mole poblano, hand‑made tamales, and creatively fuses tacos al pastor with Korean kimchi, using fresh masa, ancho chilies, and cilantro from the
    local farmers market, and their moderate cooking skill shines during community potlucks where they also experiment with avocado‑lime crema.
  core: Adolfo Santiagohernandez blends organized ambition with a creative soul, constantly sketching new ideas, worrying about deadlines, splurging on art supplies, and using meditation to calm a mind
    that rarely quits.
background:
  cultural: Adolfo grew up in a bicultural Mexican‑American household, speaking Spanish at home and English at school. He celebrates Mexican traditions such as Día de los Muertos and posadas, while also
    embracing Texan customs. His family values emphasize close-knit relationships, community involvement, and respect for elders. This dual heritage informs his teaching philosophy, encouraging students
    to honor their cultural identities and explore cross‑cultural perspectives. Living in Dallas, he is part of a large Mexican diaspora that enriches his life with music, food, and communal festivals.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Curriculum development'', ''Learning management systems (Canvas, Blackboard)'', ''Classroom management'', ''Student mentorship'', ''Public speaking
    and workshop facilitation'', ''Interdisciplinary course design (art, technology, cultural studies)'', ''Project planning and coordination'', ''Data‑driven assessment'', ''Conflict resolution and negotiation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and urban drawing'', ''Cooking Mexican and fusion cuisine'', ''Playing soccer in a community league'', ''Community theater (set design, lighting)'',
    ''Mindfulness meditation'', ''Hiking in the Texas Hill Country'', ''Volunteering at bilingual children’s reading program'']'
  career_goals: Adolfo aims to earn a bachelor’s degree in Education and eventually a Master’s in Curriculum and Instruction to qualify for a tenure‑track position at a community college. He aspires to
    become a department chair where he can champion innovative, culturally responsive teaching methods and expand partnerships with local arts organizations. He is also interested in developing a community
    outreach program that offers free art and language workshops to under‑served neighborhoods in Dallas, hoping to bridge gaps between education, culture, and economic opportunity.
