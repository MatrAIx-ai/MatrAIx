personas:
  professional: Doris Smart, an administrative professional with decades of experience, orchestrates calendars, travel logistics, and digital filing with a practical curiosity that lets them improvise when
    natural disorganization meets tight deadlines, while their strong interpersonal skills guide conflict resolution and vendor communication.
  sports: Doris Smart stays fit through daily walks along the Savannah Riverfront, participates in the local senior walking club, cheers on the Savannah Bananas summer baseball team and the Atlanta Braves,
    and occasionally joins a community yoga class, preferring low‑impact activities that fit their flexible schedule.
  arts: Doris Smart weaves creativity into daily life by quilting with the Savannah Craft Circle, singing in the church choir, devouring historical novels by authors like Philippa Gregory and biographies
    by Doris Kearns Goodwin, and listening to classic jazz legends such as Ella Fitzgerald and Louis Armstrong while visiting the Telfair Museums.
  travel: Doris Smart favors flexible, day‑trip style travel, exploring nearby cultural festivals in Charleston and New Orleans, strolling historic districts in Savannah and Asheville, and dreaming of a
    future tour of European capitals like Paris and Rome, all while balancing a modest travel budget with a love for spontaneous museum visits.
  culinary: Doris Smart, an intermediate home cook, delights in crafting low‑sugar Southern desserts like sweet‑potato peach cobbler with agave and honey, seasoning collard greens with smoked turkey and
    fresh thyme, and sourcing ingredients from their vegetable garden to keep meals both wholesome and flavorful.
  core: Doris Smart blends seasoned administrative expertise, a curiosity‑driven yet laid‑back lifestyle, and a love for Southern cooking, quilting, and community service into a balanced, flexible approach
    to work and life.
background:
  cultural: Doris grew up in the Black community of Augusta, Georgia, where church, family, and extended community networks shaped her worldview. Her upbringing was steeped in Southern African‑American
    traditions, including gospel music, church fellowship, and a strong emphasis on mutual support. She has participated in local civil‑rights commemorations and celebrates cultural heritage through events
    like the Augusta Black History Festival. These experiences fostered a resilient spirit and a commitment to community service, influencing both her professional demeanor and personal pursuits. While
    she pursued some college education, she has maintained a lifelong emphasis on self‑improvement and learning, reflecting the cultural value placed on education within her community.
attributes:
  skills: '[''Calendar Management'', ''Travel Coordination'', ''Document Preparation'', ''Microsoft Office Suite'', ''Google Workspace'', ''Digital Filing Systems'', ''Customer Service'', ''Conflict Resolution'',
