  hobbies: '[''Gardening'', ''Cooking Southern dishes'', ''Reading historical fiction'', ''Quilting'', ''Church choir'', ''Walking along the Savannah River'', ''Crossword puzzles'', ''Volunteering at community
    center'', ''Visiting museums and cultural festivals'']'
  career_goals: Doris aims to transition from a senior administrative assistant role to an office manager or executive support position within the next three years. She plans to earn the Certified Administrative
    Professional (CAP) credential and deepen her project‑management skills through a short‑term certification. She also hopes to mentor younger administrative staff at her current organization, sharing
    best practices for flexible workflow management. As she approaches retirement, Doris is exploring part‑time consulting opportunities, offering virtual assistant services to local small businesses and
    nonprofit organizations, allowing her to leverage her curiosity for new tools while maintaining a balanced lifestyle.
