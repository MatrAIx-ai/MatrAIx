  hobbies: '["Gardening", "Birdwatching", "Reading aviation history", "Model aircraft building", "Mentoring youth in STEM", "Volunteer at community center", "Church choir participation", "Cooking", "Walking
    on the beach"]'
  career_goals: As she approaches retirement, Angela aims to transition from full‑time maintenance to part‑time consulting, focusing on safety culture and procedural standardization for small operators
    in Southwest Florida. She also hopes to launch a community‑based mentorship program that introduces high‑school students—particularly African‑American girls—to aviation mechanics, pairing them with
    experienced technicians for hands‑on training. Additionally, she aspires to author a practical guide on maintenance best practices for legacy aircraft, sharing the knowledge she has accumulated over
    her career.
