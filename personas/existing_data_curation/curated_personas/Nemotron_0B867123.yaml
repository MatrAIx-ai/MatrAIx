personas:
  professional: Angela Carty, a veteran aviation maintenance specialist with over four decades of hands‑on expertise in hydraulic, pneumatic and avionics systems, channels their meticulous, safety‑first
    mindset into part‑time consulting for Southwest Florida operators while spearheading a mentorship program that guides high‑school students—especially African‑American girls—into the world of aircraft
    mechanics.
  sports: Angela Carty fuels her mornings with brisk beach walks and birdwatching as part of the Bradenton Beach Walkers club, joins the Suncoast Pickleball Association for light competition, passionately
    roots for the Tampa Bay Buccaneers, the Miami Heat, and the Florida Gators, and they meticulously log each step on a retro pedometer.
  arts: Angela Carty blends technical creativity and artistic soul by crafting detailed scale model aircraft, singing soprano in her church choir whenever time allows, devouring biographies of Amelia Earhart
    and listening to Ella Fitzgerald’s swing classics, while they occasionally attend the Florida Air Museum’s rotating exhibit on early aviation art.
  travel: Angela Carty prefers purposeful, low‑key journeys that balance aviation heritage with seaside relaxation, having explored the Smithsonian’s National Air and Space Museum in Washington, D.C., the
    historic Kitty Hawk site in North Carolina, and the Bahamas’s coral reefs, while they dream of a pilgrimage to Langley Research Center’s archives and a weekend getaway to St. Augustine’s Spanish‑colonial
    streets.
  culinary: Angela Carty, an intermediate home cook, delights in preparing shrimp and grits seasoned with fresh rosemary and thyme from her garden, they bake a tangy key‑lime pie for church potlucks, and
    they brew herb‑infused tea with oregano and sage, while occasionally experimenting with succotash and locally sourced gator tail on special occasions.
  core: Angela Carty is a disciplined, garden‑loving aviation veteran who channels their meticulous engineering mind into building model aircraft, mentoring young women in mechanics, and singing in the
    choir, all while occasionally misplacing their reading glasses and spilling coffee on their logbooks.
background:
  cultural: Angela was raised in a close‑knit African‑American family that valued perseverance, faith, and community solidarity. Growing up during the civil‑rights era, she witnessed the power of collective
    action, which shaped her compassionate and cooperative nature. Church and family gatherings were frequent, with soul and gospel music, storytelling, and Southern cooking forming the backdrop of her
    upbringing. In Bradenton, she remains active in the local African‑American community, attending cultural events, supporting neighborhood initiatives, and preserving traditions such as cooking family
    recipes and sharing oral histories. Her heritage fuels her desire to mentor the next generation, especially young women of color, to pursue careers in fields where they have been historically under‑represented.
