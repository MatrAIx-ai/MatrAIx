  career_goals: Patricia aims to transition from a front-line sales representative to a senior leadership role within the next five years, targeting a regional sales manager or director position that oversees
    multiple service lines. She plans to champion sustainable and technology-enabled service solutions that align with the Pacific Northwest's environmental values. Additionally, she wants to build a formal
    mentorship program for women entering sales, publish a guide on structured sales methodologies, and eventually launch a consultancy that helps small local businesses optimize their service sales processes.
