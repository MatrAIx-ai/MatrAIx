personas:
  professional: Philip Layton, an aspiring junior soccer captain and LEGO architect, channels their love of clear rules and teamwork into leading their Pine Grove United youth squad while meticulously constructing
    intricate LEGO models that sharpen spatial reasoning and organizational skills.
  sports: Philip Layton, a dedicated midfielder for the Pine Grove United youth soccer team who also joins family hikes on the Mount Diablo Loop each weekend, follows a routine of daily warm‑ups, practices
    strategic passing drills, and draws inspiration from watching the San Jose Earthquakes on television, while they relish the camaraderie of both the field and the trail.
  arts: Philip Layton, a LEGO enthusiast who spends afternoons building intricate sets while listening to Kidz Bop hits and reading the Magic Tree House series, also enjoys performing in Cub Scout skits
    and loves the classic animation of Disney’s The Little Mermaid, and they often incorporate storylines from their favorite books into their creations.
  travel: Philip Layton, who thrives on meticulously planned family road trips to destinations like Yosemite National Park, Disneyland, and the coastal town of Monterey, balances their adventurous curiosity
    with a checklist of snack breaks, photo stops, and scheduled bedtime routines, while they dream of a future camping expedition in the Sierra Nevada.
  culinary: Philip Layton, a budding kitchen helper who can whip up a perfect peanut‑butter‑banana sandwich and proudly adds fresh mozzarella to their favorite pizza, favors comfort foods such as mac and cheese
    but occasionally experiments by sprinkling sliced strawberries over their oatmeal for extra flavor, and they love sharing their culinary creations with family at dinner.
  core: Philip Layton, a structure‑loving seven‑year‑old who channels boundless energy into soccer drills, LEGO towers, and a meticulously organized piggy bank, yet they secretly fret over the smallest
    changes in routine.
background:
  cultural: Philip was raised in Pine Grove, a small rural community in Amador County, California. His family embodies typical middle‑class American values, emphasizing close family bonds, community involvement,
    and a respect for nature. He attends the local public elementary school, participates in community events like the county fair, and occasionally attends a neighborhood church where he learns about cooperation
    and service. The local culture blends outdoor appreciation, small‑town camaraderie, and a straightforward, practical outlook.
