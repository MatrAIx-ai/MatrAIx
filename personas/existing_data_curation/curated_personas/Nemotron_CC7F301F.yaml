  career_goals: Philip dreams of growing up to be a teacher because he likes the idea of creating a structured, supportive environment where he can help children learn and feel safe. He also imagines becoming
    a firefighter, attracted by the clear rules, teamwork, and the chance to protect his community. Both ambitions reflect his desire for order, responsibility, and caring for others.
