  hobbies: '[''Abstract painting'', ''Herb gardening'', ''Reading poetry and philosophy'', ''Bird-watching'', ''Genealogy research'', ''Writing short poems'', ''Small book club participation'', ''Museum
    visits'', ''Art gallery excursions'', ''Experimental cooking'']'
  career_goals: Although officially retired, Amy aims to leave a lasting impact by establishing an intergenerational art studio in Augusta where seniors collaborate with middle‑school students on experimental
    projects. She plans to author a memoir that chronicles her unconventional teaching methods and artistic journey, and to set up a modest scholarship fund for students pursuing degrees in education or
    the visual arts. Additionally, she seeks to become a regular contributor to the local historical society’s publications and to chair a quarterly "Circle of Curiosity" that invites community members
    to explore new ideas in a small, supportive setting.
