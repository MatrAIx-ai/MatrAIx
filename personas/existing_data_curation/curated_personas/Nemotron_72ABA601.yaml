  career_goals: Glenn aims to advance to a senior strategic leadership role, such as Director of Business Strategy or Vice President of Operations, where he can shape enterprise‑wide transformation initiatives.
    He plans to obtain a Lean Six Sigma Black Belt and PMP certification to bolster his credibility in complex change programs. In the long term, he envisions founding a boutique consulting firm focused
    on integrating data analytics with creative industry partners, helping organizations adopt innovative, art‑infused approaches to problem solving. Mentoring emerging analysts and championing a culture
    of continuous learning are also central to his professional ambition.
