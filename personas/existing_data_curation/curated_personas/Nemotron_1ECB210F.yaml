personas:
  professional: Shavonda Woods is a diligent construction laborer in the Chicago area whose three years of hands‑on experience operating power tools, reading blueprints, and enforcing OSHA safety standards
    have earned them a reputation for reliability and organization, and they are actively pursuing an associate's degree, OSHA 30 certification, and NCCER credentials to transition into a crew‑lead supervisory
    role within the next five years.
  sports: Shavonda Woods is a dedicated runner who logs three weekly miles in Lincoln Park and lifts at a local gym, they cheer for the Chicago Bears and Chicago Blackhawks, participate in a community 5K
    run organized by their neighborhood church, and during the summer they join a recreational softball league at a nearby park, balancing cardio and strength work to meet the physical demands of construction.
  arts: Shavonda Woods unwinds by knitting cozy scarves while listening to an R&B and soul playlist that features Anita Baker, Marvin Gaye, and Erykah Badu, they occasionally attend intimate gospel concerts
    at their local church and appreciate the storytelling of Southern folk artists like The Avett Brothers, integrating these creative moments into their otherwise routine‑focused life.
  travel: Shavonda Woods favors low‑key road trips with a well‑planned itinerary, they have explored the historic architecture of Chicago, spent a weekend in Door County savoring fresh lake fish, dream
    of a cultural immersion in New Orleans to taste authentic Cajun cuisine, and prioritize visits that allow them to garden in community plots or attend small‑group church retreats, balancing adventure
    with budget constraints.
  culinary: Shavonda Woods loves blending Southern comfort food with garden‑fresh ingredients, they regularly cook dishes like smoked chicken gumbo with heirloom tomatoes, collard greens sautéed with garlic
    and smoked paprika, and sweet‑potato pie seasoned with a pinch of cayenne, and they enjoy experimenting with herbs such as basil and thyme while honing their skill at making flaky biscuits from scratch.
  core: Shavonda Woods is a routine‑driven construction professional who balances a pragmatic work ethic with a creative side—gardening, knitting, and soulful music—while relentlessly pursuing career advancement,
    financial stability, and personal health, even if it means occasional over‑scheduling and stubbornly sticking to familiar comforts.
background:
  cultural: As a Black woman raised in the Chicago suburbs, Shavonda’s cultural identity is rooted in the legacy of African‑American resilience and community solidarity that flourished in the Midwest. Her
    family’s history includes several generations of skilled tradespeople who emphasized hard work, self‑reliance, and mutual support—a value system that shaped her practical outlook. Growing up near Chicago’s
    vibrant South Side, she was exposed to a rich tapestry of Black cultural expressions, from gospel music in local churches to community festivals celebrating African‑American heritage. These experiences
    fostered a strong sense of belonging and an appreciation for collective progress, which she carries into her professional life by advocating for safety and mentorship on the job site. While she embraces
    contemporary influences, Shavonda also honors the traditions of Southern cuisine, storytelling, and the emphasis on education as a pathway to upward mobility. Her cultural background informs her commitment
    to both personal advancement and contributing positively to her community.
attributes:
  skills: '[''Operating hand and power tools'', ''Concrete mixing and pouring'', ''Formwork construction'', ''Basic blueprint reading'', ''Site safety inspections (OSHA compliance)'', ''Equipment operation
