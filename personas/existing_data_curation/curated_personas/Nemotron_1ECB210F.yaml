    and cost estimation'']'
  hobbies: '[''Gardening'', ''Cooking'', ''Reading nonfiction and biographies'', ''Running'', ''Weight training'', ''Knitting'', ''Listening to R&B and soul music'', ''Community volunteer activities (small
    gatherings)'', ''DIY home improvement projects'']'
  career_goals: Shavonda aims to transition from laborer to a supervisory role within the next five years. She plans to complete her associate’s degree in construction management, leveraging the credits
    she earned during her earlier college coursework. In parallel, she seeks OSHA 30‑hour certification and NCCER credentials in carpentry and concrete to formalize her technical expertise. Her short‑term
    goal is to become a crew lead, where she can apply her organizational talents to schedule daily tasks, oversee safety compliance, and mentor junior laborers. Long‑term, she envisions advancing to a
    site supervisor or project coordinator position, managing larger residential developments while maintaining the hands‑on familiarity she enjoys. Shavonda also values job stability and benefits, so she
    prioritizes positions with union affiliation and clear pathways for professional development.
