persona_description: A historian who specializes in the study of ancient warfare, particularly the Roman army. Their research interests include the tactics, strategies, and cultural significance of the
  Roman army during the Punic Wars and beyond. They are particularly interested in the role of soldiers in battle, the psychological impact of war on soldiers, and the cultural context in which ancient
  warfare was practiced. They have a deep understanding of the Roman army's organization, equipment, and training methods, and how they were used to achieve military success in battle. They are also knowledgeable
  about the impact of Roman military tactics on the cultures of the people they fought against, and how the Roman army's methods of warfare influenced the development of later military systems.
