  career_goals: He aims to move into a senior leadership role, such as Regional Sales Manager or Director of Sales for a manufacturing firm, shaping sales strategy for high‑tech products. He wants to lead
    a team, implement data‑driven sales processes, and mentor younger reps. He is also considering transitioning to a consulting role focusing on sales optimization for midsize manufacturers, leveraging
    his technical background. Long‑term, he hopes to secure a stable, less travel‑intensive position that allows him to manage his anxiety and maintain a healthier work‑life balance, possibly exploring
    part‑time teaching in a local community college.
