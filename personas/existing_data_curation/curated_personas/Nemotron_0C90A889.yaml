personas:
  professional: Jiten Capers, a seasoned B2B sales engineer in high‑tech manufacturing, leverages a STEM background, meticulous market research, and data‑driven forecasting to craft strategic sales plans
    while their competitive drive, skeptical eye, and methodical organization push them to consistently exceed quotas and mentor junior reps on the path to senior leadership.
  sports: Jiten Capers captains a local cricket league team, routinely plays weekend matches at the community field, follows the New York Knicks for basketball, the Chicago Cubs for baseball, and incorporates
    light jogging and gardening into a low‑impact fitness routine that balances competitive spirit with age‑appropriate endurance.
  arts: Jiten Capers finds artistic solace in listening to Ravi Shankar’s sitar improvisations, watching classic films starring Amitabh Bachchan, and reading biographies of Steve Jobs and Leonardo da Vinci,
    which together inform a disciplined yet creative mindset that spills over into their fusion cooking experiments.
  travel: Jiten Capers prefers structured weekend getaways to nearby national parks like Yosemite and cultural city tours of Kyoto and Edinburgh, planning trips months in advance to minimize anxiety, while
    balancing a desire for adventure with a cautious budget and limited travel capacity due to senior career responsibilities.
  culinary: Jiten Capers, an adept home chef, excels at preparing aromatic chicken biryani with saffron, caramelized onions, and basmati rice, crafts crisp masala dosa with fermented batter, and experiments
    with quinoa‑based fusion bowls seasoned with turmeric, cumin, and miso, often sourcing fresh herbs from their garden.
  core: Jiten Capers blends a competitive, data‑driven sales acumen with a curiosity for history and mindfulness practices, channeling anxiety into disciplined routines, while their love for cricket, fusion
    cooking, and lifelong learning creates a uniquely balanced yet occasionally restless persona.
background:
  cultural: Jiten is a second‑generation South Asian American, born to parents who emigrated from the Indian subcontinent; his father is of Hindu Gujarati origin and his mother of Muslim Punjabi descent.
    He grew up bilingual, speaking English and Hindi at home, and celebrates both Diwali and Eid, blending the customs of his mixed heritage. The family placed a strong emphasis on education and hard work,
    values that guided his pursuit of a STEM degree and a career in sales. Living in Manhattan, Kansas, he maintains ties to the broader South Asian community through cultural festivals, local Indian association
    events, and occasional trips to visit relatives in the Midwest. He appreciates both the traditional values of collectivism and the American emphasis on individual achievement, which informs his balanced
    yet competitive outlook.
