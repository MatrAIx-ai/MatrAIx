persona_description: A geologist who studies the movement and changes of glaciers and glacial lakes in high-altitude locales, particularly in the Andes Mountains. He is particularly concerned about the
  potential risks of glacial flooding and the impact on the water supply of cities like La Paz, Bolivia. He is also interested in the long-term stability of mountain glaciers and their lakes and how climate
  change is affecting them. He uses satellite imagery and data from the Landsat 8 and Landsat 5 satellites to monitor the changes in these areas.
