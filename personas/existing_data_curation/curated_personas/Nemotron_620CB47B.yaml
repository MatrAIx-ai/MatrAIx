  hobbies: '[''Mural Painting'', ''Salsa Dancing'', ''Community Soccer'', ''Modern Mexican Cooking'', ''Graphic Design'', ''Guided Meditation'', ''Science‑Fiction Reading'', ''Technology Podcast Listening'',
    ''Vinyl Record Collecting'', ''Hiking along the Rio Grande'']'
  career_goals: Edgar aspires to transition from a production worker to a supervisory role within the next three years, aiming to earn a Certified Production Technician (CPT) credential and complete an
    associate‑degree program in Manufacturing Technology at a community college. He hopes to combine his technical expertise with his creative curiosity by leading a team that develops custom‑designed metal
    art pieces for local galleries. Long‑term, he envisions opening a small workshop where he can mentor apprentices, integrate lean manufacturing principles, and produce functional art that reflects his
    Mexican‑American heritage while maintaining a healthy work‑life balance to manage his stress.
