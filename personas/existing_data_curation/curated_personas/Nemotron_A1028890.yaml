    ''Organizing networking mixers'', ''Improv comedy workshops'', ''Cycling on local trails'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Jordan aims to become a regional sales director within the next five years, leading a high‑performing team of agents and shaping market strategy for his insurance firm. He plans to earn
    the Chartered Property Casualty Underwriter (CPCU) designation to deepen his technical expertise. Long‑term, Jordan envisions launching his own boutique insurance consultancy that blends traditional
    risk solutions with innovative, tech‑driven services. He also hopes to host a podcast that demystifies insurance concepts for consumers and to be recognized as a thought leader at industry conferences.
