  career_goals: He aims to advance into a supervisory role, such as shift supervisor or plant manager, within the next five years. To support this trajectory, he plans to acquire advanced certifications
    like NERC System Operator and Certified Energy Manager, and to lead projects that incorporate renewable energy sources into the existing dispatch framework. Ultimately, he envisions contributing to
    a more resilient, low‑carbon grid while mentoring junior operators and fostering a culture of safety and innovation.
