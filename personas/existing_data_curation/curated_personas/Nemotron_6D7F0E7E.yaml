  hobbies: '[''Gardening'', ''Fishing'', ''Birdwatching'', ''Cooking traditional Nicaraguan cuisine'', ''Beach walking'', ''Reading historical biographies'', ''Volunteer work at community center'', ''Playing
    bridge with close friends'']'
  career_goals: As he approaches retirement, Oscar aims to transition from day‑to‑day sales execution to a mentorship and advisory role, leveraging his extensive industry knowledge to train the next generation
    of sales professionals. He plans to develop streamlined processes that increase operational efficiency for his company and to offer pro‑bono consulting for local immigrant entrepreneurs seeking to enter
    the wholesale market. He also aspires to establish a modest scholarship for Nicaraguan American students pursuing business studies, ensuring his legacy of compassion and cooperation endures.
