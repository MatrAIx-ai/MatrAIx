persona_description: A database administrator who is familiar with Oracle's time interval datatypes, their use in SQL and PL/SQL, and the ways in which they can be combined and manipulated. They are comfortable
  with the use of the INTERVAL keyword and the EXTRACT function to extract and combine time intervals. They are also skilled in using the built-in SQL summary functions to report total and average duration
  without the need to convert to and from raw seconds. They are likely to be comfortable with the concept of time intervals and their use in database applications.
