  career_goals: Cynthia aims to continue contributing to the Pawleys Island community by mentoring younger volunteers, preserving local history through an oral‑history project, and supporting the local
    library’s reading programs. She hopes to complete her unfinished college courses through online learning, maintain her physical and mental health with regular yoga and walks on the beach, and travel
    occasionally to visit her children and grandchildren while staying rooted in her beloved Lowcountry home.
