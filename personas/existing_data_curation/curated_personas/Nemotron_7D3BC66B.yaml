personas:
  professional: Cynthia Goble, a 78‑year‑old community coordinator, leverages her decades of volunteer leadership to orchestrate Pawleys Island library story‑time sessions, mentor younger volunteers, and
    compile an oral‑history archive, while they apply their practical problem‑solving mindset and calm, adaptable demeanor.
  sports: Cynthia Goble enjoys early sunrise beach walks, gentle senior yoga, and is a loyal fan of the Charleston Battery soccer team and the South Carolina Gamecocks football squad, while they regularly
    join the Pawleys Island senior walking club and a light pickleball group for low‑impact exercise.
  arts: Cynthia Goble expresses creativity through painting serene Lowcountry seascapes, knitting scarves in sea‑foam hues, quilting heirloom blankets, devouring historical novels by Philippa Gregory and
    biographies of Amelia Earhart, and they often fill evenings with the gentle melodies of Alison Krauss and traditional folk fiddlers.
  travel: Cynthia Goble plans travel around family reunions, savoring weekend trips to Charleston’s historic district, nostalgic train rides through Savannah, leisurely cruises to the Bahamas, and occasional
    visits to her grandchildren in Asheville, while they keep itineraries low‑stress and budget‑friendly.
  culinary: Cynthia Goble delights in preparing fresh Lowcountry seafood dishes such as shrimp and grits, she‑crab soup, and grilled oysters with sherry, skillfully seasoning with thyme, bay leaf, and a
    pinch of cayenne, and they also share beloved family recipes for collard greens, cornbread, and okra stew with friends and neighbors.
  core: Cynthia Goble is a calm, curious 78‑year‑old gardener, storyteller, and community steward who blends meticulous planning with gentle adaptability, savoring sunrise walks, birdsong, and the simple
    art of knitting while they nurture both their garden and local heritage.
background:
  cultural: Cynthia grew up in the Lowcountry of South Carolina within a white Southern family whose ancestors arrived as English and Scottish settlers in the early 19th century. The region’s coastal lifestyle,
    the subtle influences of Gullah culture, and a strong Methodist church community shaped her values of hospitality, respect for nature, and communal stewardship. Raised during the post‑World War II era,
    she experienced both traditional Southern customs and the gradual infusion of modern ideas, which she balances with her innate curiosity and practical mindset.
