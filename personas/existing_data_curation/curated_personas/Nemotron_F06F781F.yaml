  career_goals: James aims to step into a regional sales manager role within the next five years, followed by a director‑level position where he can shape broader sales strategy for a manufacturing firm.
    He is motivated to build a mentorship program for junior reps, champion sustainable manufacturing solutions, and integrate advanced sales technologies across the team. Long‑term, he envisions launching
    a consulting practice that helps SMEs optimize their wholesale distribution channels, while also staying active in industry associations and local business chambers.
