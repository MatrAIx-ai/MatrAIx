persona_description: A linguist who specializes in the study of the Arabic language and its various dialects, including the Shami dialect of Jordan. He is interested in the history and usage of the "rtal"
  unit of mass in the Middle East, particularly in its usage in Jordan, and its possible conversion factors. He is also interested in the survival of traditional measures in Tunisia and the extent to which
  they have been replaced by a single unit of mass worth ½ kilogram.
