personas:
  professional: Phuong Kasala, a budding LEGO architect who loves constructing intricate block cities, blends a bright curiosity for novel designs with a practical, hands-on problem-solving style, and despite
    a relaxed attitude toward tidying up, they proudly showcase their finished creations to family and friends.
  sports: Phuong Kasala, a lively participant in the neighborhood soccer club Mini Kickers, also cheers for the city's baseball team, the River City Raptors, and enjoys seasonal activities like sledding
    in winter and slip-n-slide in summer, displaying a playful yet loosely structured approach to fitness.
  arts: Phuong Kasala delights in drawing whimsical characters from Mo Willems' Elephant & Piggie series, singing along to Disney's Frozen soundtrack, and regularly watches Pixar animations, especially
    Toy Story, which shape their creative playtime and sense of storytelling.
  travel: Phuong Kasala loves family trips to the local zoo and the seaside boardwalk, has explored the nearby national park's easy trails, and dreams of visiting the Eiffel Tower in Paris and the Great
    Barrier Reef, preferring hands-on adventures over rigid itineraries.
  culinary: Phuong Kasala favors cheesy macaroni, crunchy carrot sticks, sweet strawberry slices, and gummy bears, can proudly make a peanut butter-jelly sandwich with minimal mess, and often requests extra
    cheese on their pizza, reflecting a simple yet enthusiastic palate.
  core: Phuong Kasala is a curious, laid-back five-year-old builder who balances imaginative play with practical tinkering, spends allowance with a sprinkle of saving, manages mild allergies with calm ease,
    and thrives on colorful stories and family adventures.
background:
  cultural: Phuong is a Vietnamese‑American child raised in a bilingual household in Elk Grove, California. At home she speaks Vietnamese with her parents and grandparents, learning cultural traditions
    such as celebrating Tet, preparing family dishes like pho and bánh mì, and listening to Vietnamese folktales. The diverse community in Sacramento County exposes her to other Southeast Asian cultures
    and American customs, creating a blended cultural identity that influences her language, celebrations, and daily life.
