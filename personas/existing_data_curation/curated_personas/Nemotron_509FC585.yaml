  career_goals: As he approaches high school, Jeffrey envisions a future that blends his love for the outdoors with technology. He aims to graduate with a strong STEM foundation and pursue an associate
    degree in environmental engineering or marine science at a community college, eventually transferring to a university program. His long-term ambition is to work as a marine technology engineer, developing
    instrumentation or software that supports sustainable fisheries and coastal monitoring. He also sees himself contributing to community outreach, teaching younger kids about marine stewardship and coding.
    Should opportunities arise, he is open to enlisting in the Navy's nuclear or engineering tracks, valuing the discipline and hands-on experience they provide.
