personas:
  professional: Herminia Gutierrez, a retired applied mathematician and data analyst, applies her Python and MATLAB expertise to mentor high‑school students in math while designing and constructing a small
    year‑round herb greenhouse, balancing a methodical budgeting approach with a relaxed attitude that sometimes lets project timelines slip.
  sports: Herminia Gutierrez enjoys watching the San Antonio Spurs and local soccer club San Antonio FC from her porch, supplements the sedentary viewing with gentle garden walks and occasional senior yoga
    classes, and channels their competitive streak into daily crossword and sudoku challenges.
  arts: Herminia Gutierrez listens to classic mariachi and ranchera recordings while knitting and quilting intricate designs that echo the folk textile motifs of their family heritage, and they savor historical
    fiction novels about pioneering women scientists as a bridge between intellectual and creative pursuits.
  travel: Herminia Gutierrez has trekked the historic adobe streets of Santa Fe, bird‑watched along the misty cliffs of the Oregon Coast, and dreams of touring the gardens and Moorish architecture of Granada,
    Spain, preferring carefully planned itineraries that balance cultural immersion with quiet downtime.
  culinary: Herminia Gutierrez crafts corn‑based parcels filled with seasoned pork, a deep chili‑cocoa sauce spiced with cinnamon and cloves, and a hearty hominy stew enriched with epazote, cilantro, and
    fresh garden herbs, proudly adapting these traditional dishes into healthier versions for family gatherings.
  core: Herminia Gutierrez blends a disciplined analytical mind with solitary, craft‑filled routines, yet their penchant for postponing chores and chronic worry both sharpens their precision and fuels occasional
    overthinking.
background:
  cultural: Herminia grew up in a bicultural Mexican‑American household in the Southwest, where Spanish was spoken alongside English and Catholic traditions were observed. Her family celebrated Día de los
    Muertos and Las Posadas at home, preserving these customs through private rituals and seasonal cooking. Living in Clovis, NM, she blends the rich culinary heritage of Mexico with the flavors of New
    Mexican cuisine, often incorporating regional chilies and corn masa. She remains connected to her roots by teaching her grandchildren Spanish phrases and traditional recipes, and by participating in
    the local community’s cultural festivals as a quiet observer rather than a performer. Her identity reflects a respect for Mexican family values, an appreciation for the Southwest’s blended cultural
    landscape, and a personal practice of honoring heritage through food, language, and craft.
