  hobbies: '[''Preparing traditional Mexican meals'', ''Gardening vegetables and herbs'', ''Attending local cultural festivals'', ''Listening to mariachi and ranchera music'', ''Reading Spanish-language
    novels'', ''Walking her dog on the Santa Maria River Trail'', ''DIY home décor projects'']'
  career_goals: Niki aims to earn her high-school equivalency and become a certified nursing aide within the next two years. She hopes to move into a supervisory position at her current agency, increasing
    her responsibilities and income. Long-term, she dreams of launching a small home-care business that serves the Mexican-American community in Santa Maria, blending cultural sensitivity with professional
    care while maintaining a flexible schedule that supports her family.
