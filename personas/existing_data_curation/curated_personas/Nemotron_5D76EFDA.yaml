  hobbies: '["Visiting art museums and galleries", "Sketching and urban photography", "Home cooking and experimental recipes", "Community softball league", "Live music concerts", "Volunteering at food festivals",
    "Jogging and fitness", "Mindfulness and journaling"]'
  career_goals: Sean aims to leverage his business background and production experience to advance to a supervisory role within the plant, eventually becoming a production manager or plant operations manager.
    He plans to obtain a Certified Food Safety Manager credential and a Six Sigma Green Belt within the next two years. In the longer term, he dreams of launching his own artisanal food line that combines
    his love for innovative flavors and artistic packaging, possibly partnering with local designers. He also intends to develop stronger emotional resilience through leadership training and mentorship.
