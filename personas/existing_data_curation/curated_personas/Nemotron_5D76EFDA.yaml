personas:
  professional: Sean Perez, a 32‑year‑old food‑production specialist with deep expertise in batch processing, HACCP compliance, lean manufacturing, and supply‑chain budgeting, leverages their design‑thinking
    and strong communication to drive continuous process improvements while eyeing a supervisory role and upcoming Six Sigma Green Belt and Certified Food Safety Manager credentials.
  sports: Sean Perez, a 32‑year‑old community‑softball enthusiast who plays for the Garden State Sluggers, follows the New York Yankees and Knicks, maintains fitness by jogging three times a week, and joins
    weekend pick‑up basketball games to stay energized and socially connected.
  arts: Sean Perez, a 32‑year‑old who spends Saturday afternoons sketching Manhattan’s skyline, explores MoMA’s modernist collections, draws inspiration from photographers Vivian Maier and street artist
    Banksy, and recharges at live shows featuring The Strokes and an Amy Winehouse tribute band.
  travel: Sean Perez, a 32‑year‑old who blends spontaneous weekend getaways to Philadelphia’s historic district and the Hudson Valley’s farm stays with long‑term dreams of an immersive culinary tour of
    Barcelona and a food‑festival road trip through Oaxaca, balancing budget constraints with a thirst for cultural flavor.
  culinary: Sean Perez, a 32‑year‑old home cook with intermediate skill, loves fusing comfort foods like mac‑and‑cheese with bold flavors such as chipotle adobo, miso, and roasted poblano, often creating
    experimental dishes like kimchi‑taco sliders and miso‑glazed pork belly while perfecting their spice‑balance with cumin and cilantro.
  core: Sean Perez, a 32‑year‑old curious production professional whose artistic flair fuels inventive kitchen experiments, yet frequent anxiety drives both relentless self‑improvement and occasional overthinking.
background:
  cultural: Sean grew up in a middle‑class, White Hispanic family in New Jersey. His parents emphasized hard work, education, and community involvement. The household blended traditional American values
    with occasional Spanish‑American customs, such as family gatherings centered around shared meals. Living near the cultural hub of New York City exposed him to a diverse array of artistic and culinary
    influences, shaping his curious, open‑minded outlook while maintaining a grounded, suburban upbringing.
attributes:
  skills: '["Food batch production", "Equipment operation", "Quality control & HACCP compliance", "Inventory management", "Data logging & documentation", "Budgeting and cost analysis", "Supply chain coordination",
