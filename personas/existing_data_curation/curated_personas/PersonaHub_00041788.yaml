persona_description: 'Andrew V. Z. Brower, a South African entomologist who specializes in the study of insects, particularly those of the genus Chrysoritis. His expertise lies in the phylogenetic relationships
  among members of the oreas group and exemplars of other species groups, as well as the life history evolution of the genus Chrysoritis within the Aphnaeini (Lepidoptera: Lycaenidae) inferred from mitochondrial
  cytochrome oxidase I sequences. Brower''s research interests include the structure and function of insects, the role of ants in their life cycles, and the evolution of insects. He is known for his contributions
  to the understanding of the Tree of Life and the relationships between different groups of organisms.'
