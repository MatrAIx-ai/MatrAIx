personas:
  professional: William Johnson, a 41‑year‑old aspiring part‑time handyman, blends his meticulous budgeting, woodworking skill, and community service mindset to deliver reliable home‑repair work while juggling
    family duties, though his tendency to over‑worry often leads him to double‑check every job before signing off.
  sports: William Johnson enjoys fishing at Lake Charleston with the Savoy Lake Anglers club, follows the Chicago Cubs, Chicago Bears, and Chicago Blackhawks, plays occasional pickup basketball at the local
    community center, and celebrates the annual county fair’s tractor pull as his seasonal sports highlight.
  arts: William Johnson finds creative solace in listening to The Rolling Stones, John Prine, and Grant Wood’s paintings, reads historical works by David McCullough and Barbara Tuchman, and volunteers backstage
    at Savoy Community Players productions, allowing his practical mind to appreciate artistic detail.
  travel: William Johnson prefers road‑trip planning, often spending weekends exploring Galena, IL, Door County, WI, and the historic Route 66 towns, while dreaming of a future vacation to Munich’s classic‑car
    museum and Yellowstone’s geysers, balancing budget constraints with a desire for both adventure and family relaxation.
  culinary: William Johnson enjoys cooking Midwest comfort foods such as chicken pot pie, beef brisket with smoked paprika, and apple pie made from his own Granny Smith apples, cultivates fresh rosemary
    and tomatoes for seasonal dishes, and while his culinary skill is solid, he occasionally over‑season his garden salads.
  core: William Johnson is a diligent, community‑focused handyman‑in‑training whose meticulous nature and lingering worry drive his practical pursuits, from woodworking to budgeting, while his love for
    classic cars and Midwestern traditions adds a humble, hands‑on charm.
background:
  cultural: William grew up in a small Midwestern town in Illinois and identifies with regional values of modesty, reliability, community involvement, and a practical outlook on life. His family is white
    and middle-class, and he was raised in a Protestant Christian household that emphasized service, hard work, and family cohesion. As a child he participated in high school sports events, church activities,
    and county fairs, which reinforced a strong sense of local identity. The cultural environment of Savoy and Champaign County, with its close-knit neighborhoods, agricultural ties, and emphasis on self-reliance,
    continues to shape his worldview, daily habits, and community-oriented mindset.
attributes:
