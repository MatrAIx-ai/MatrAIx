  career_goals: As she approaches retirement, Janice aims to transition into a mentorship and advisory role within the district, sharing her decades of knowledge with emerging counselors. She plans to launch
    a community‑based mentorship network that pairs high‑school students with local businesses and tradespeople, fostering practical career exploration in her rural setting. Janice also intends to present
    her integrated approach to compassionate yet results‑oriented counseling at state conferences, publish a practical guide for counselors working in small‑town schools, and complete a master’s degree
    in counseling to deepen her expertise. Ultimately, she hopes to leave a lasting legacy of student success and a sustainable career‑readiness infrastructure for future generations.
