personas:
  professional: Janice Mancuso, a seasoned educational guidance counselor with over three decades of experience in a rural county, blends a data‑driven methodology with deep compassion to design career‑development
    workshops, coordinate college applications, mentor emerging counselors, and plan a transition to advisory roles and a community mentorship network that links high‑school students with local tradespeople;
    they are known for their methodical yet empathetic approach.
  sports: Janice Mancuso enjoys low‑impact fitness through daily walks along the county’s trail system, participates in a seasonal senior water‑aerobics class, cheerfully supports the Bureau County high‑school
    baseball team the Bulldogs at games, and volunteers as a mentor for the junior varsity coaching staff; they value community connection and steady activity over high‑intensity competition.
  arts: Janice Mancuso expresses creativity through quilting, playing piano at her church with a repertoire ranging from Mozart to contemporary folk pieces, and experimenting with digital photography that
    captures the Midwestern landscape’s shifting light, and they regularly attend her town’s historical society meetings while drawing inspiration from the works of Ansel Adams and local painter Margaret
    Hale.
  travel: Janice Mancuso’s travel style blends careful planning with a love for heritage, favoring comfortable road trips across the Midwest, a yearly pilgrimage to the coastal region of her ancestors in
    the Mediterranean, and visits to historic sites such as Washington, D.C.’s archives and Savannah’s historic downtown; they prioritize off‑season travel and staying with family to balance budget constraints.
  culinary: Janice Mancuso delights in preparing family recipes that echo her Mediterranean heritage, such as hand‑rolled pasta with a slow‑cooked tomato‑basil sauce, herb‑infused olive oil drizzled over
    garden‑fresh zucchini, and a layered dessert featuring espresso‑soaked ladyfingers and mascarpone, while they cultivate the vegetables—tomatoes, basil, and peppers—that form the backbone of these dishes.
  core: Janice Mancuso couples methodical compassion with a love of gardening, mentorship, and heritage cooking, balancing disciplined finances and health routines while sprinkling daily life with photography,
    quilting, and community service; they embody a steady, curiosity‑driven approach to aging gracefully.
background:
  cultural: Janice grew up in a small, close‑knit farming community near Ladd, Illinois, in a Catholic family of Italian descent. Her parents emphasized the values of hard work, humility, and service to
    others, which have shaped her compassionate approach to counseling. The Midwestern cultural emphasis on community, practicality, and self‑reliance is evident in her organized, methodical work style
    and her dedication to local initiatives such as the community‑center tutoring program. Family traditions, including Sunday Mass, Italian holiday celebrations, and sharing homemade meals, have fostered
    a strong sense of identity and a commitment to preserving cultural heritage while embracing the broader American values of education and civic involvement.
