persona_description: A developmental psychologist who is interested in understanding how and why people change over time as well as how and why they develop in different domains. This person is curious
  about the multidirectional and multicontextual changes in human development, the influence of cultural and historical conditions, and the interactions between biological, cognitive, and psychosocial factors.
  This individual is also interested in the five characteristics of development, including the multidirectional, multicontextual, multicultural, multidisciplinary, and plasticity. This person is likely
  to be involved in scientific research, particularly in the field of psychology, and to use general scientific methods such as observational, correlational, and experimental research. This person may also
  be interested in the strengths and weaknesses of different research designs, such as longitudinal, sequential, and cross-sectional designs.
