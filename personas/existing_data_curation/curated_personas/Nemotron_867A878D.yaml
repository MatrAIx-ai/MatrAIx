personas:
  professional: Catherine Rhoads is a budding graphic designer and arts administrator‑in‑training, leveraging her Adobe Photoshop, Illustrator, and Premiere Pro expertise alongside meticulous project planning
    and charismatic public speaking to orchestrate community art events while injecting her fierce competitive drive into every creative competition they enter.
  sports: Catherine Rhoads plays intramural volleyball for the University of Missouri River 'Wave' club, cheers on the Kansas City Chiefs in the fall and the Kansas City Royals during baseball season, and
    spends weekends hiking the Katy Trail, balancing competitive spirit with social camaraderie that they cherish.
  arts: Catherine Rhoads immerses herself in the works of abstract painter Wassily Kandinsky, follows indie musician Mitski, watches avant‑garde theater pieces like 'Sleep No More', and frequently volunteers
    at the local Holt community art fair to curate workshops, shaping their identity through eclectic artistic influences they eagerly share with peers.
  travel: Catherine Rhoads prefers low‑key road trips that blend hiking and gallery hopping, having explored the Ozark National Scenic Riverways and a weekend arts retreat in Santa Fe, while dreaming of
    a future study‑tour to Kyoto’s contemporary art districts that they hope to fund through scholarships.
  culinary: Catherine Rhoads enjoys experimenting with modern fusion dishes, often whipping up a miso‑marinated salmon bowl with quinoa, kale, and pickled radish, yet admits to regularly ordering spicy
    ramen from the campus food hall when time constraints clash with their beginner‑level kitchen skills, a compromise they accept with a smile.
  core: Catherine Rhoads is an organized, imagination‑driven art enthusiast whose relentless pursuit of creative excellence is tempered by anxiety‑fueled perfectionism and a tendency to procrastinate on
    financial paperwork, a paradox that they constantly juggle.
background:
  cultural: Catherine grew up in Holt, a small town in Clay County, Missouri, within a white, Midwestern family that values community, self‑reliance, and modesty. Her heritage includes German and English
    roots, reflected in family traditions such as holiday gatherings, church involvement, and community volunteerism. The rural setting fostered a close connection to local fairs, high‑school sports, and
    the regional arts scene, while occasional trips to Kansas City exposed her to a broader spectrum of contemporary art and music. This blend of small‑town solidarity and occasional urban cultural immersion
    shapes her appreciation for both grassroots community initiatives and innovative artistic expression.
