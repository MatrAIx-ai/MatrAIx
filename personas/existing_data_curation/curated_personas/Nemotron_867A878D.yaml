  career_goals: Catherine aspires to channel her artistic curiosity and organizational drive into a career that merges creativity with community impact. She plans to complete a Bachelor of Fine Arts in
    Graphic Design, followed by a Master’s in Arts Administration or Creative Arts Therapy. Her ultimate ambition is to establish a nonprofit arts hub in the Midwest that offers workshops, exhibitions,
    and mental‑health‑focused art programs for youth. In the short term, she seeks internships at design studios or cultural institutions in Kansas City, aiming to build a professional portfolio and develop
    leadership experience. She also dreams of curating interdisciplinary exhibitions that challenge conventional narratives and foster dialogue among diverse audiences.
