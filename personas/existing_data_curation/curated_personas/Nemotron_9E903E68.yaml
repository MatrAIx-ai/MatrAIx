  hobbies: '[''Watercolor Painting'', ''Abstract Sketching'', ''Photography'', ''Creative Writing (speculative fiction)'', ''Reading Science Fiction & Fantasy'', ''Playing the Flute'', ''Hiking in the Sandhills'',
