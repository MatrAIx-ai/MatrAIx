    Sudoku)'', ''Cooking Traditional Indigenous Recipes'']'
  career_goals: Idalia aspires to transition into a leadership role that bridges clinical practice and community health. She plans to earn a Master of Science in Nursing with a focus on Nurse Practitioner
    or Clinical Nurse Specialist, emphasizing Indigenous health disparities. Her long‑term ambition is to design a culturally centered wellness program for American Indian populations in North Carolina
    that incorporates art therapy, digital health tools, and preventive education. She also hopes to contribute to research on mental health resilience among tribal communities and eventually mentor new
    nurses on culturally competent, innovative care.
