personas:
  professional: Idalia Tavarez, a registered nurse specializing in clinical assessment, IV therapy, wound care, and health informatics, blends meticulous documentation with imaginative art‑integrated therapeutic
    sessions, while their organized nature ensures every quality‑improvement project meets deadlines, and their empathetic, harmony‑seeking disposition often leads them to advocate fiercely for patients
    despite a constant undercurrent of worry about outcomes.
  sports: Idalia Tavarez enjoys weekend hikes through the Sandhills, participates in a local yoga studio’s sunrise class, follows the Carolina Hurricanes for hockey and the Charlotte Hornets for basketball,
    and belongs to a community walking club that meets thrice weekly, using these activities to balance a love of nature with structured fitness routines.
  arts: Idalia Tavarez, an avid watercolorist and pottery enthusiast, regularly attends gallery openings featuring artists like Kehinde Wiley and James Turrell, draws inspiration from speculative fiction
    authors such as N.K. Jemisin, and incorporates traditional basket weaving and flute playing into community events, weaving together modern and ancestral artistic threads.
  travel: Idalia Tavarez prefers meticulously planned trips that blend cultural immersion and natural wonder, having recently explored the ancient cliff dwellings of Mesa Verde, the misty coastlines of
    Nova Scotia, and dreaming of a future pilgrimage to the cedar‑grove sanctuaries of the Pacific Northwest, all while managing a modest travel budget that prioritizes family and community responsibilities.
  culinary: Idalia Tavarez, a confident home cook, delights in preparing herb‑infused quinoa salads, sweet‑potato and sage stews, and cedar‑smoked trout, while their palate favors the earthy flavors of
    rosemary, wild mushrooms, and seasonal berries, and they often host potluck gatherings where they share recipes that fuse contemporary nutrition with traditional plant‑based remedies.
  core: Idalia Tavarez is a methodical yet wildly imaginative nurse‑artist who channels their deep sense of community responsibility into healing practices, while quietly battling a chronic worry habit
    that fuels both their relentless preparation and occasional over‑thinking.
background:
  cultural: Idalia descends from the Eastern Band of Cherokee people, a heritage she honors through daily practices and community involvement. Growing up in a household where stories, language, and traditional
    crafts were valued, she maintains fluency in basic Cherokee phrases and participates in seasonal powwows and tribal ceremonies. Her cultural worldview emphasizes interconnectedness with the land, collective
    responsibility, and holistic health, which informs her nursing philosophy. Living in Southern Pines, NC, she balances modern professional life with regular visits to the Qualla Boundary, where she mentors
    youth in health literacy, shares traditional remedies, and integrates Indigenous healing perspectives into her clinical work.
