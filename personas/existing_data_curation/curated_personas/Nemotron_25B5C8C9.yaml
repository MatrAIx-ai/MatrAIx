personas:
  professional: Tristian Evans is an aspiring comic artist and budding robotics hobbyist who blends vivid imagination with meticulous planning, creating intricate LEGO narratives while leading the school
    robotics club’s design team; they channel both creative storytelling and systematic problem‑solving into every project.
  sports: Tristian Evans is a devoted member of the community youth basketball league, idolizes the Los Angeles Lakers and the NBA’s LeBron James, channels the same strategic thinking from robotics into
    on‑court plays, and balances high‑energy pick‑up games with regular conditioning drills at the local gym, while also dabbling in backyard skateboarding during summer, showing they thrive on teamwork
    and physical challenge.
  arts: Tristian Evans immerses themselves in comic art, drawing inspiration from legends like Stan Lee and contemporary creators such as Amanda Conner, spends weekends sketching in Procreate, curates playlists
    featuring Kendrick Lamar and Anderson .Paak for dancing at family gatherings, and eagerly collects limited‑edition graphic novels from the local comic shop, reflecting they blend visual storytelling
    with rhythmic movement.
  travel: Tristian Evans dreams of exploring the cosmos through a future trip to the Kennedy Space Center and a family vacation to Tokyo’s Akihabara district, yet currently satisfies wanderlust by weekend
    road trips to the nearby Grand Canyon, school field trips to the natural history museum, and meticulously planning each outing with a travel journal, proving they balance curiosity with practical constraints.
  culinary: Tristian Evans enjoys experimenting with simple, bold flavors, perfecting a homemade pizza topped with pepperoni and pineapple, mastering the art of ramen broth after watching a YouTube tutorial,
    and regularly treats themselves to a chocolate‑chip cookie after finishing a LEGO build, though they often burn toast when distracted by music, showing they approach cooking with both creativity and
    occasional absent‑mindedness.
  core: Tristian Evans is a 12‑year‑old imagination‑driven builder who schedules epic LEGO projects like missions, fumbles with chores, and balances a love for comic storytelling with a relentless curiosity
    about space and technology, illustrating they thrive on structure and novelty.
background:
  cultural: Tristian is an African‑American boy raised in Cincinnati’s West End, a neighborhood with a rich Black cultural heritage. He regularly attends Sunday services at his family’s church, where gospel
    music and community storytelling are central. His family celebrates Juneteenth and Kwanzaa, reinforcing pride in African roots. He participates in local programs such as the Boys & Girls Club and the
    Cincinnati Art Museum’s youth workshops, which expose him to Black artists, jazz, and hip‑hop culture. The blend of urban city life, strong community ties, and family traditions shapes his worldview
    and fuels his creative pursuits.
