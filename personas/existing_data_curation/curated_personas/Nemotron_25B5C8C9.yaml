  career_goals: Tristian aspires to combine his love for art and technology. He dreams of becoming a video game designer or a concept artist for film, where he can create immersive worlds. He also imagines
    a future as an aerospace engineer or astronaut, inspired by his fascination with space and abstract concepts. In the longer term, he hopes to develop educational games that teach science and storytelling,
    and to mentor younger kids in his community through after‑school art and coding clubs.
