personas:
  professional: Francis Doan, a seasoned systems engineer turned community mentor, leverages three decades of aerospace and mechanical expertise to develop hands‑on engineering guides for hobbyists and
    to lead a local disaster‑preparedness task force, applying a methodical, routine‑focused mindset that balances meticulous documentation with flexible problem‑solving.
  sports: Francis Doan cycles the beachfront path in Playa Vista every Saturday with the local Coastal Riders club, roots for the Los Angeles Lakers during NBA season and the Dodgers in baseball, and joins
    a casual beach‑volleyball league each summer, blending structured exercise with community team spirit.
  arts: Francis Doan strums acoustic guitar to classic rock legends like Led Zeppelin and The Rolling Stones, frequents live performances at The Troubadour, appreciates modern art at LACMA, and watches
    classic films such as “Casablanca,” finding creative downtime that complements their engineering precision.
  travel: Francis Doan favors meticulously planned road trips, having already driven the historic Route 66 to the Grand Canyon and a scenic tour of Yellowstone, while dreaming of a future weekend getaway
    to the Bavarian Alps to explore mountain passes in a vintage car, balancing adventure with a steadfast itinerary.
  culinary: Francis Doan enjoys cooking simple, fresh meals like rosemary‑garlic roasted chicken, spaghetti carbonara with pancetta, and garden‑harvested tomato salsa, demonstrates moderate culinary skill
    by grilling on weekends, and consistently reaches for ingredients such as basil, garlic, and aged cheddar, though they sometimes over‑salt the pasta sauce when distracted by a new car project.
  core: Francis Doan blends a routine‑driven engineer’s precision with a hands‑on hobbyist’s curiosity, juggling classic‑car restoration, community mentorship, and guided meditation while occasionally succumbing
    to impulsive parts purchases.
background:
  cultural: Francis grew up in a middle‑class suburban family in Ohio, with roots in European (German and Irish) ancestry. His parents, a mechanic father and a schoolteacher mother, instilled values of
    hard work, self‑reliance, and community service. He celebrated traditional American holidays and participated in local church and 4‑H activities during his youth, fostering a practical and routine‑oriented
    worldview. After earning a graduate degree in engineering, he moved to California during the tech boom, integrating into the predominantly male engineering culture while maintaining a respect for diverse
    perspectives. In Playa Vista, he engages with the multicultural fabric of Los Angeles through local festivals and community events, but his cultural identity remains anchored in a pragmatic, middle‑class
    American ethic that values routine, responsibility, and modest ambition.
attributes:
  skills: '[''Advanced CAD modeling (SolidWorks, CATIA)'', ''Finite element analysis'', ''Systems integration for aerospace projects'', ''Data analysis (MATLAB, Python)'', ''Project management (Agile, Waterfall)'',
