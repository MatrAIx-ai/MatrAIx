  hobbies: '[''Community gardening'', ''Classic car restoration'', ''Beach‑path cycling'', ''Acoustic guitar playing (classic rock)'', ''Volunteering at youth robotics club'', ''Reading non‑fiction (history,
    engineering, self‑improvement)'', ''Guided meditation'']'
  career_goals: Now that he is no longer in the formal workforce, Francis aims to channel his expertise into community‑focused initiatives. He plans to mentor university engineering students through a structured
    volunteer program, develop a series of practical engineering guides for hobbyists, and lead a local disaster‑preparedness task force that leverages his risk‑assessment background. Additionally, he aspires
    to complete a personal project of restoring a classic 1964 Chevrolet Impala, documenting the process as a hands‑on instructional resource for fellow enthusiasts. Throughout, he seeks to maintain a routine‑driven
    schedule that balances purposeful contribution with personal well‑being.
