personas:
  professional: Emilio Osorio is a budding architect‑in‑training, whose love for constructing intricate LEGO fire trucks and cityscapes showcases early spatial reasoning, while they meticulously plan each
    build before placing the first brick.
  sports: Emilio Osorio spends afternoons in the Matthews youth soccer league practicing disciplined drills with a small group, idolizing Charlotte FC’s forwards and proudly displaying a hand‑drawn team
    sticker on their water bottle, reflecting a competitive streak that prefers orderly play over chaotic scrimmages.
  arts: Emilio Osorio delights in drawing Spider‑Man against meticulously sketched city backdrops while humming Lila Downs’ “La Llorona” during LEGO sessions, and they eagerly collect bilingual picture
    books such as ‘Una Abeja y Un Gusano’ to blend visual storytelling with language practice.
  travel: Emilio Osorio loves family road trips to the Outer Banks for sandcastle building, anticipates the sights and sounds of the North Carolina State Fair in Raleigh each year, and keeps a colorful
    scrapbook of dream destinations like Oaxaca’s illuminated plazas for Día de los Muertos, as they favor meticulously planned itineraries over spontaneous getaways.
  culinary: Emilio Osorio proudly helps prepare chicken tinga tacos and cheesy quesadillas at home, enjoys sprinkling fresh cilantro and lime on their salsa, relishes homemade tamales on special occasions,
    and they often sneak an extra cheese slice when Mom isn’t looking.
  core: Emilio Osorio is a detail‑oriented six‑year‑old builder who balances a love for structured LEGO creations, competitive soccer drills, careful allowance saving, and a deep attachment to family traditions,
    while navigating frequent worries and occasional over‑indulgences.
background:
  cultural: Emilio is a first‑generation Mexican‑American raised in Matthews, North Carolina. At home, Spanish is spoken alongside English, and his family observes Mexican traditions such as Día de los
    Muertos, Las Posadas, and celebrating Mexican Independence Day with food, music, and stories. He enjoys Mexican dishes like tacos, quesadillas, and tamales, often helping with simple preparations. While
    he participates in local community events and Southern festivities in Mecklenburg County, his household maintains strong ties to Mexican cultural values, emphasizing family unity, respect for elders,
    and hard work. This blend of Mexican heritage and Southern environment shapes his bilingual abilities, culinary interests, and appreciation for both cultural celebrations.
