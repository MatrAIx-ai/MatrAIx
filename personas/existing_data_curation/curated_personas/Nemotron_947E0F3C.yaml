  career_goals: Even at six, Emilio dreams of a future job that offers clear rules, a defined role, and the chance to solve problems. He often says he wants to become a firefighter because the uniform,
    training schedule, and mission of helping others fit his love of structure and immediate, tangible impact. His fascination with building LEGO trucks also fuels an early interest in mechanical engineering,
    imagining he could design better fire engines. Additionally, his competitive spirit and keen eye for detail sometimes lead him to picture himself as a police detective who follows clues to uncover the
    truth, reflecting his natural skepticism. Occasionally he mentions wanting to play on a soccer team, but he prefers organized practice drills over large, chaotic games.
