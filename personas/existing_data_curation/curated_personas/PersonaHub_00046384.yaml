persona_description: A writer who enjoys exploring the rich and diverse landscapes of different places through their stories. They are deeply invested in the emotional and psychological nuances of their
  settings, often using them as a character in their own right. They are skilled at creating vivid, memorable and meaningful settings through their use of imagery, symbolism, and sensory details. They are
  also adept at using weather as a device to evoke mood, character, tension, theme and ultimately story. They are highly creative and善于在故事中融入环境细节，使故事更加生动、真实和有深度。
