persona_description: A researcher and public health advocate who is interested in the relationship between a mother's geographic origin and birth outcomes for Black infants in the United States. She is
  particularly interested in the role of socioeconomic factors, health behaviors, and access to healthcare in shaping infant health outcomes. She is known for her work on the effects of ethnic and foreign-born
  status on infant health, as well as her use of economic modeling to better understand health disparities in children. Her research has been published in leading journals in the field of public health
  and immigration policy.
