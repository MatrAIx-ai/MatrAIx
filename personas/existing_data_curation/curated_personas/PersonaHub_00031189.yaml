persona_description: A researcher with expertise in wildlife ecology, specifically focusing on the study of predator-prey interactions and their impact on deer populations. They are interested in understanding
  how winter weather, habitat quality, and the role of predators influence white-tailed deer survival, and how these factors work together to affect deer predation. They are conducting a research project
  in the Upper Peninsula of Michigan, in partnership with Mississippi State University, funded by various sources, including the Michigan Involvement Committee of Safari Club International, and Pittman-Robertson
  Wildlife Restoration funds.
