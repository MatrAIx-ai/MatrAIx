personas:
  professional: Jimena Saturnino is a budding junior marine illustrator and team-oriented soccer player; they blend a vivid curiosity about ocean life with a practical habit of following art tutorials,
    keep a meticulously organized sketchbook yet freely improvise colors, and demonstrate cooperative play on the field while confidently voicing ideas in group projects.
  sports: Jimena Saturnino loves playing soccer after school with the Little Dolphins youth club, where they take the midfield position and practice disciplined drills while also cheering for FC Barcelona's
    matches on weekends, demonstrating an organized training routine balanced with spontaneous street games that reflect their blend of structure and flexibility.
  arts: Jimena Saturnino immerses themselves in arts by sketching vibrant sea turtles, octopuses, and coral reefs inspired by the rhythm of Cuban salsa beats from Celia Cruz and the Buena Vista Social Club,
    while they practice simple salsa steps with their mother, blending visual creativity with musical movement in a playful, organized routine.
  travel: Jimena Saturnino enjoys family beach getaways where they hunt for unique seashells and map each find in a colorful notebook, prefers hands-on, unstructured exploration over rigid itineraries,
    and dreams of snorkeling at the Great Barrier Reef and strolling the tide pools of the Galapagos Islands, yet their travel plans are often limited by school schedules and parental budgeting.
  culinary: Jimena Saturnino loves helping their grandmother prepare arroz con pollo and sweet plantain fritters, eagerly stirring in saffron, cilantro, and diced chicken while learning to whisk batter
    for the fritters, and at home they also experiment with making homemade pizza topped with mozzarella and fresh basil, showcasing a budding chef who balances curiosity for flavors with the practical
    patience required in the kitchen.
  core: Jimena Saturnino is a curious, organized eight-year-old who blends a love for sea-themed art, soccer, and salsa dancing with a habit of hoarding seashell treasures, occasional allowance splurges,
    and a determined approach to managing mild allergies, and they navigate life with a balanced mix of practicality and imagination.
background:
  cultural: Jimena is a second‑generation Cuban‑American raised in a bilingual household where Spanish is spoken daily. Her family celebrates Cuban traditions such as San José and enjoys music genres like
    son and conga. She participates in local Cuban community events at the Fort Myers cultural center and helps prepare classic foods like empanadas, plantain fritters, and black beans with rice. Her grandparents,
    who immigrated from Cuba, share stories of the island, fostering a strong sense of heritage, family cohesion, respect for elders, and a love for rhythm and flavorful cuisine.
attributes:
  skills: '["reading fluency (English and Spanish)", "basic arithmetic", "bilingual communication (Spanish/English)", "drawing and coloring", "swimming", "teamwork in school projects", "basic problem solving"]'
  hobbies: '["drawing marine animals", "playing soccer", "listening to Cuban music and dancing salsa", "collecting seashells at the beach", "reading adventure and mystery books", "helping in the kitchen
    with traditional Cuban dishes"]'
  career_goals: Even at eight, Jimena dreams of becoming a marine biologist to explore and protect the ocean life she loves at the beach, and she also imagines herself as a teacher who can share knowledge
    with younger children. She plans to work hard in school, join the science club, and volunteer at the local aquarium to learn more about marine ecosystems. Improving her Spanish so she can help her extended
    family and community is also an important part of her long‑term ambition.
