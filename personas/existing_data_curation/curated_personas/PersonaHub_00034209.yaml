persona_description: A cricket coach who is knowledgeable about the Duckworth-Lewis-Stern Method and its application in setting a target score for a cricket match interrupted by weather or other circumstances.
  The coach is experienced in using the method to calculate the target score for the team batting second, taking into account the differences in the resources available to each team and the potential impact
  of interruptions on the match. The coach is also familiar with the Par Score and Target Score concepts and how they are calculated before and after an interruption in a cricket match.
