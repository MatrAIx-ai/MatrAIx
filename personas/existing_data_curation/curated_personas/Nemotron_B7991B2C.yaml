personas:
  professional: Raisa Davila, a retired community liaison turned bilingual cooking class instructor, leverages their lifelong expertise in home budgeting, event coordination, and conflict mediation to run
    meticulously scheduled sessions at the local center, while their practical mindset ensures every class runs on time, even as they worry about unexpected hiccups.
  sports: Raisa Davila, an enthusiastic participant in the neighborhood senior walking club, enjoys leisurely strolls around the park and follows the Louisville Cardinals football and basketball teams,
    while occasionally joining a community tai chi class to maintain flexibility, preferring low‑impact activities that fit their structured weekly routine.
  arts: Raisa Davila, an avid listener of classic Latin pop icons like Juan Gabriel and local marimba ensembles, spends evenings reading historical novels by Isabel Allende and Eduardo Galeano, and appreciates
    the paintings of Frida Kahlo, allowing the vibrant storytelling to inspire their crocheting designs.
  travel: Raisa Davila, a careful planner, prefers organized group tours to nearby destinations such as New Orleans and the historic streets of Savannah, has fond memories of a family trip to Mexico City,
    and dreams of a leisurely pilgrimage to Andalusia’s white villages, balancing their desire for cultural immersion with health‑related travel constraints.
  culinary: Raisa Davila, a seasoned home cook, delights in preparing family‑heritage dishes like baleadas stuffed with refried beans, cheese, and salsa, and tamales wrapped in banana leaves, using fresh
    garden produce like cilantro, tomatoes, and corn, while modestly experimenting with new spice blends during their bilingual cooking classes.
  core: Raisa Davila blends meticulous organization with heartfelt cultural stewardship, turning every walk, recipe, and story into a disciplined yet compassionate act of preserving community memory.
background:
  cultural: Raisa was born and raised in Honduras and immigrated to the United States in her early thirties. She grew up in a close‑knit Catholic family where Spanish was the household language and community
    celebrations were central. In Louisville, she has maintained her Honduran heritage through cooking, language, and participation in local Hispanic organizations, while also embracing American customs
    such as Thanksgiving and volunteering at the community center. Her bicultural identity informs her values of family solidarity, respect for elders, and a strong work ethic.
