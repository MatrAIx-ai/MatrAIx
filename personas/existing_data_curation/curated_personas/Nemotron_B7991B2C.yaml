  career_goals: Although retired from formal employment, Raisa is focused on staying active and contributing to her community. She aims to maintain a predictable weekly schedule by leading a bilingual cooking
    class at the local community center, documenting her family’s history for future generations, volunteering as a mentor for new Hispanic immigrants navigating senior services, learning digital photography
    to capture cultural events, and preserving her health through regular walks and a balanced diet. She also hopes to advocate for improved healthcare access for older Hispanic residents in Louisville.
