  hobbies: '["cooking traditional South Asian cuisine", "embroidery and handcrafts", "indoor gardening", "attending cultural festivals", "fine art painting", "reading practical self‑help books", "volunteering
    at community centers", "yoga and meditation"]'
  career_goals: Anum aims to become a certified master painter within the next three years, obtaining professional credentials such as the Painting Contractors Association certification. She plans to lead
    a crew, mentor new apprentices, and eventually launch her own small, family‑owned painting and paper‑hanging business that emphasizes reliability, routine quality checks, and culturally respectful service.
    Her long‑term ambition includes offering specialty finishes inspired by South Asian motifs for clients seeking personalized decor while maintaining a steady income to support future homeownership and
    family responsibilities.
