persona_description: José Manuel Balmaceda was a liberal reformer and president of Chile who was elected to the Chilean Congress from the Liberal Party in 1870. He pushed anticlerical measures and promoted
  public works while serving in the cabinet of President Domingo Santa María (1881–86). As president, he advanced public education and railroad construction but inherited the legislative revolt against
  the executive begun in the 1860s. His attempts to prevent congressional limitation of the presidential powers led to civil war in 1891, and his defeat and subsequent suicide left parliamentary dominance
  firmly entrenched until the mid-1920s, when it was challenged by Arturo Alessandri.
