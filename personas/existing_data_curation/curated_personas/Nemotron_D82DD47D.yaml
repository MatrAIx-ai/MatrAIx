personas:
  professional: Michelle Simpson, a biomedical‑engineered project manager with Lean Six Sigma Green Belt certification, blends Agile and Waterfall expertise to lead data‑driven process improvements while
    mentoring emerging women leaders, though they sometimes lean into micro‑management when deadlines loom.
  sports: Michelle Simpson enjoys weekend hikes with the Patapsco Valley Hiking Club, follows the Baltimore Ravens and Baltimore Orioles religiously, and participates in a casual recreational softball league,
    though they prefer the tranquility of trail walks over organized team sports.
  arts: Michelle Simpson savors quiet evenings listening to Yo‑Yo Ma’s cello suites, attending Baltimore Center Stage productions, and discussing historical biographies by Doris Kearns Goodwin in their
    book club, while their palate for visual art includes the works of photographer Annie Leibovitz and painter Edward Hopper.
  travel: Michelle Simpson favors meticulously planned short getaways—such as a leaf‑laden retreat in Shenandoah National Park, a historic tour of Edinburgh’s castles, and a wine‑focused weekend in Napa
    Valley—balancing a love of history with the comfort of familiar routines.
  culinary: Michelle Simpson experiments with seasonal farm‑to‑table cooking, perfecting dishes like rosemary‑infused roasted beet salad, mushroom risotto, and fermented kimchi, yet they occasionally over‑salt
    their soups while pairing them with a crisp Pinot Noir.
  core: Michelle Simpson is a structured, analytical leader who balances disciplined work habits with solitary hobbies, a penchant for wine, and a quiet, data‑driven approach to life’s pleasures and challenges.
background:
  cultural: Michelle was raised in a middle‑class, Mid‑Atlantic family with German‑Irish ancestry and grew up in the suburbs of Maryland. Her upbringing emphasized education, community service, and a strong
    work ethic, values that continue to shape her identity. She aligns with mainstream American cultural norms—punctuality, courtesy, and civic participation—while also appreciating the local Baltimore
    heritage, including its arts scene and sports traditions. Celebrations such as Thanksgiving, Easter, and occasional family traditions from her European roots feature in her life, and she actively engages
    in neighborhood events and volunteer initiatives.
