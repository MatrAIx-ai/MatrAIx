  hobbies: '[''Historical Non-fiction Reading'', ''Gardening'', ''Hiking'', ''Chess'', ''Sudoku'', ''Cooking'', ''Wine Tasting with Small Groups'', ''STEM Outreach Volunteering'', ''Book Club'']'
  career_goals: She aims to advance to a director‑level position where she can shape strategic initiatives across multiple product lines and drive enterprise‑wide operational excellence. Over the next five
    years, Michelle plans to obtain an executive MBA or relevant certification, spearhead a company‑wide digital transformation, and establish a mentorship program for emerging women leaders in STEM. Her
    ambition balances a desire for structured career progression with the flexibility to influence organizational culture and maintain a healthy work‑life integration.
