persona_description: A team of scientists and engineers who are dedicated to understanding and addressing the issue of air pollution in Houston, Texas. They are experts in the field of environmental engineering,
  particularly in the study of fine particulate matter and its impact on human health. They have developed analytical procedures to track and quantify the emissions from industrial refineries and other
  sources of air pollution. They are interested in advancing the science of air pollution to develop more effective and efficient environmental regulations. They have received funding from the Texas Air
  Research Center and the Environmental Protection Agency, and have collaborated with engineers from the Texas Commission on Environmental Quality and Bureau of Air Quality Houston to conduct research on
  the topic.
