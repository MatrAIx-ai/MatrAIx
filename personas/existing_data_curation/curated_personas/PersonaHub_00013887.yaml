persona_description: A historian who specializes in the study of African American history, particularly the history of the Baptist Church in the South. He is interested in the early history of Baptist churches
  in the South, the contributions of Jesse Peter to the Baptist Church in Savannah, and the role of Henry Francis in the early history of the Baptist Church in the South. He is also interested in the history
  of the Ogeeche African Baptist Church and the First African Baptist Church in Augusta, GA. He is knowledgeable about the Baptist Church in the South and its early history, and has a particular interest
  in the contributions of Jesse Peter and Henry Francis to the Baptist Church in the South.
