personas:
  professional: Ursula Mitchell, a 23‑year‑old audiovisual technician, blends meticulous cable‑routing expertise with a budding flair for video editing, delivering precise AV installations while habitually
    double‑checking schematics and documenting every step to maintain flawless system performance, and they are known for their unwavering attention to detail.
  sports: Ursula Mitchell follows the Cleveland Browns and the Cleveland Cavaliers, enjoys solo hikes in Cuyahoga Valley during the fall, and channels their competitive streak into a local weekend rock‑climbing
    club where they chalk up every ascent.
  arts: Ursula Mitchell frequents the Akron Art Museum and independent film screenings, drawing inspiration from photographer Vivian Maier and filmmaker Denis Villeneuve, and they curate playlists that
    weave together the sounds of Miles Davis, Kendrick Lamar, and Mahalia Jackson to explore shifting sonic textures.
  travel: Ursula Mitchell has taken weekend road trips to Asheville, explored the street art of Berlin during a study abroad stint, and dreams of a cultural immersion tour of Kyoto to study traditional
    Japanese design and emerging AR installations, all while planning each journey with their signature methodical spreadsheet.
  culinary: Ursula Mitchell prefers crafting homemade ramen with pork belly and fermented miso, whips up a Sunday brunch of chicken and waffles topped with maple syrup, and indulges in a nightly cappuccino
    made from single‑origin beans, yet they claim an inability to finish overly spicy dishes.
  core: Ursula Mitchell, a detail‑oriented AV installer with a jazz‑curated soul, balances technical precision with a competitive love for solo hikes, budget‑savvy investing, and a restless curiosity for
    immersive art and travel, while their occasional skepticism of office gossip fuels a protective personal moat.
background:
  cultural: Ursula grew up in a close-knit African-American community in Akron, Ohio, where church, family gatherings, and local cultural festivals were central to daily life. Early exposure to gospel choirs,
    rhythm-and-blues, and spoken-word poetry fostered her deep appreciation for music and visual storytelling. The industrial backdrop of the Rust Belt instilled a practical, methodical work ethic, while
    mentors from community programs encouraged her interest in technology—a field where she often sees herself as a role model for other Black youth. She balances pride in her heritage with the Midwestern
    values of reliability and self-reliance, and she actively supports initiatives that increase representation of Black professionals in the audiovisual and broader STEM sectors.
attributes:
  skills: '[''AV system installation'', ''Cable routing and termination'', ''Signal troubleshooting'', ''Audio calibration'', ''Video projection setup'', ''Control system programming (Crestron, Extron)'',
    ''Technical schematics reading'', ''Electrical safety compliance'', ''Project planning and documentation'', ''Time management'', ''Customer service'', ''Basic video editing (Adobe Premiere)'', ''Sound
    design fundamentals'', ''Emerging technology integration (AR/VR)'', ''Problem solving'', ''Attention to detail'']'
  hobbies: '[''Visiting art galleries'', ''Independent film screenings'', ''Photography'', ''DIY electronics projects'', ''Listening to jazz, hip-hop, and gospel'', ''Curating music playlists'', ''Solo
    hiking'', ''Journaling'', ''Reading science-fiction novels'', ''Playing competitive strategy video games'', ''Participating in tabletop board-game nights'', ''Volunteering at community art events'']'
  career_goals: Ursula aims to advance from field installer to senior audiovisual systems integrator, eventually taking on project-lead responsibilities for large-scale venues such as university auditoriums,
    concert halls, and corporate event spaces in the Midwest. She plans to earn advanced certifications (CTS-D, CTS-I) and deepen her expertise in immersive media technologies, including AR-enhanced installations.
    In the longer term, she envisions launching her own boutique AV consultancy that specializes in art-focused installations, where she can mentor other Black youth and underrepresented technicians. Her
    competitive drive pushes her to seek continual improvement, higher responsibility, and recognition as a technical authority within the industry.
