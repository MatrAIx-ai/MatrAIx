    and light restoration'',''Reading historical nonfiction'']'
  career_goals: Looking ahead, Victoria aims to transition from front‑line driving to a supervisory role within the logistics sector. Over the next three to five years she plans to earn a Certified Logistics
    Professional (CLP) credential and complete a bachelor‑level business management program online. Her goal is to become a fleet operations manager or driver trainer, where she can mentor younger drivers—especially
    women—while applying her practical knowledge to improve route efficiency and safety standards. She also hopes to establish a small family‑run courier service that leverages her sales network and deep
    understanding of local delivery needs, providing a stable foundation for her retirement.
