persona_description: A computer network administrator who has experience with configuring and securing wireless networks. They are familiar with the process of installing and configuring wireless devices
  on Windows operating systems, including configuring SSID, channel, and WEP. They also have experience with configuring wireless networks using a central access point, and have knowledge of the importance
  of securing wireless networks against hacking attempts. They are skilled in using a strength meter to ensure that they are within range of the wireless network and have experience with configuring IP
  settings for wireless adapters. They are also familiar with the process of securing wireless networks against hacking attempts, including the use of private IP addresses, non-common SSID and AP names,
  and avoiding DHCP. They have experience with configuring a firewall to separate wireless traffic from internal network traffic.
