persona_description: A chemist who is interested in understanding the principles of accuracy and precision in analytical chemistry. They are particularly interested in the concepts of accuracy and precision,
  and how they relate to the measurement of values and the agreement of results among themselves. They are likely to be familiar with the different units of measurement used in analytical chemistry and
  how they can affect the accuracy and precision of measurements. They may also have experience with calculating uncertainties and using equations to estimate errors in measurements.
