    knowledge sharing'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending independent film screenings and local theater'', ''Listening to and dancing to Mexican folk music (cumbia, ranchera)'', ''Reading historical
    fiction and biographies'', ''Gardening with native Colorado and Mexican plants'', ''Cooking and experimenting with traditional Mexican recipes'', ''Knitting and crochet projects'', ''Digital photography
    of nature and community events'', ''Hiking in the Rockies foothills'', ''Participating in cultural festivals (Dia de los Muertos, Cinco de Mayo)'']'
  career_goals: Even in retirement, Martha aims to compile a family‑recipe cookbook that intertwines personal anecdotes and cultural history, and to curate a small exhibit of her watercolor works at the
    local community center. She aspires to become a volunteer docent at the Boulder Museum of Contemporary Art, focusing on guiding visitors through avant‑garde installations. A long‑standing dream is to
    travel back to Mexico to reconnect with her roots, document regional culinary techniques, and bring those insights to her Boulder community. She also hopes to champion a neighborhood garden space that
    celebrates both Colorado native plants and Mexican heirloom varieties, and to stay active in yoga and gentle hiking to maintain her health.
