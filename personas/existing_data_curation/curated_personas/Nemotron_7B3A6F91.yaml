    setting the table and feeding pets"]'
  hobbies: '["Sketching and drawing coastal scenery", "Watercolor painting", "Playing soccer and tag with friends", "Exploring tide pools and beachcombing", "Collecting shells, rocks, and natural artifacts",
    "Building forts and LEGO structures", "Solving puzzles and jigsaw games", "Reading adventure picture books", "Dancing to music", "Participating in school drama and community festivals"]'
  career_goals: Margaret dreams of becoming a celebrated artist who can capture the ocean and forest landscapes of the Pacific Northwest on canvas. She also imagines herself as a marine biologist who explores
    tide pools and protects sea life, blending her love for art and the sea. In school, she hopes to win the annual art contest and later hopes to teach younger children how to express ideas through drawing
    and storytelling. Her competitive spirit fuels a desire to excel in whichever path she chooses, while her curiosity keeps her open to new, unconventional careers like environmental inventor or community
    creative director.
