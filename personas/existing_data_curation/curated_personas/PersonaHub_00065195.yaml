persona_description: A chemist at the Technische Universitaet Muenchen who specializes in the discovery and development of new forms of medication targeting bacterial proteases, particularly ClpP. His research
  focuses on uncovering and optimizing novel strategies to permanently deactivate these proteases, which are essential for the development of new antibiotics and the combat against multi-resistant strains
  of bacteria like Staphylococcus aureus and Mycobacterium tuberculosis. He has a strong background in organic chemistry, biochemistry, and the study of proteases, and has made significant contributions
  to the field of antibiotic discovery.
