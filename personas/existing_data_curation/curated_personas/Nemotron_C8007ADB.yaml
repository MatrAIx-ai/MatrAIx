  career_goals: Looking ahead, Irene wants to transition from day‑to‑day supervision to a mentorship role, developing a formal onboarding and professional‑development program for new administrative staff.
    She hopes to lead a pilot project that implements digital workflow automation across her department, positioning herself as a change‑agent before a planned semi‑retirement. After retiring from full‑time
    work, she plans to offer pro‑bono consulting to local nonprofits, helping them improve their administrative efficiency and adopt simple data‑driven decision‑making tools. She also aspires to document
    her best‑practice guides in a book that could serve as a resource for small‑town offices.
