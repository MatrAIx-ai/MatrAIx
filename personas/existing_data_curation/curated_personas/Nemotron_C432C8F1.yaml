  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading mystery and historical fiction'', ''Crossword puzzles and sudoku'', ''Baking homemade breads and pies'', ''Birdwatching at local nature
    preserves'', ''Walking the trails at Virden park'', ''Attending local community theater productions'']'
  career_goals: Evelyn aims to advance from her current secretary role to an office manager position within the next two to three years, preferably in a healthcare or municipal setting where she can apply
    her knowledge of regulatory procedures and staff supervision. She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise and increase her earning potential.
    Long‑term, she envisions taking on responsibilities for training new administrative staff, streamlining office workflows, and contributing to a stable, low‑stress work environment that aligns with her
    desire for predictability. If the opportunity arises, she would consider transitioning to a part‑time remote administrative role that would give her more flexibility to manage personal commitments.
