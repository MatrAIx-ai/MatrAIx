  hobbies: '[''Cooking Traditional Mexican Cuisine'', ''Watching Soccer Matches'', ''Participating in Toastmasters'', ''Volunteering at Church and Community Food Drives'', ''Hiking in Sandhills State Forest'',
    ''Listening to Classic Rock and Mariachi Music'', ''Hosting Family Gatherings'', ''Exploring Productivity and Leadership Podcasts'']'
  career_goals: Looking ahead, Esteban aims to transition from executive secretary to senior office manager, eventually overseeing the entire administrative function for a mid‑size corporation or regional
    office. He plans to earn the Certified Administrative Professional (CAP) credential and enroll in a bachelor's program in Business Administration to deepen his strategic acumen. His ambition includes
    leading a team of assistants, implementing digital transformation initiatives to increase efficiency, and mentoring junior staff to cultivate a high‑performing support department. In the longer term,
    he envisions launching a boutique consulting firm that advises small businesses on best practices for executive support, leveraging his bilingual expertise and network within the south‑eastern U.S.
