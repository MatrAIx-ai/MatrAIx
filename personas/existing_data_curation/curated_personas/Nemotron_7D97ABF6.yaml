personas:
  professional: Eva Tadesse, a retired quantitative researcher and statistical modeler, now channels their analytical expertise and love for clear storytelling into community STEM workshops and an art‑science
    exhibition, balancing meticulous data work with a relaxed, flexible approach that sometimes leaves their schedule delightfully disorganized.
  sports: Eva Tadesse enjoys leisurely walks through Forest Park, participates in a senior yoga class at the community center, follows the St. Louis Cardinals and the Blues with regular game outings, and
    occasionally joins a low‑impact water aerobics group at the local pool during the summer.
  arts: Eva Tadesse paints watercolor pieces that weave scientific diagrams with motifs from their family’s heritage, attends weekly jazz concerts featuring the likes of Wynton Marsalis and the Ella Fitzgerald
    tribute band, and volunteers as a museum docent, sharing stories of underrepresented artists and innovators with visitors.
  travel: Eva Tadesse loves day trips to the Ozark hills, has visited New Orleans for its vibrant jazz scene, dreams of a pilgrimage to a high‑altitude coffee‑growing region to deepen their ceremony practice,
    and favors river cruises on the Mississippi for relaxed sightseeing.
  culinary: Eva Tadesse delights in a morning coffee ceremony using beans roasted in a clay pot, seasons their signature lentil stew with cardamom and a secret spice blend, bakes flatbread with fresh herbs
    from their garden, and enjoys savoring seared salmon drizzled with rosemary‑infused butter.
  core: Eva Tadesse blends a lifelong love of data, art, and community, navigating retirement with curious flexibility, occasional disorganization, and a habit of turning every coffee cup into a cultural
    ritual.
background:
  cultural: Eva is an African American woman with Ethiopian roots; her family emigrated from Addis Ababa in the 1950s, merging Ethiopian traditions with the Midwestern Black experience. Growing up in Saint
    Louis during the civil-rights era, she was shaped by church community, family storytelling, and the city's rich musical heritage. She honors her heritage through language, cuisine, coffee rituals, and
    participation in local diaspora gatherings, while also embracing the broader African American cultural fabric of the Midwest.
attributes:
  skills: '[''Statistical modeling'', ''Python programming'', ''R programming'', ''MATLAB'', ''Experimental design'', ''Data visualization'', ''Technical writing'', ''Scientific grant writing'', ''Mentoring
    underrepresented students'', ''Public speaking'', ''Digital photography'', ''Creative coding'', ''Art curation'']'
  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Jazz listening'', ''Herb gardening'', ''Ethiopian coffee ceremony'', ''Reading historical nonfiction'', ''Poetry writing'', ''Walking in
    Forest Park'', ''Museum docenting'', ''Organizing community art-science exhibitions'']'
  career_goals: Although retired, Eva aims to channel her knowledge into community impact. She plans to develop a free STEM workshop series for seniors and high school students in Saint Louis, create a
    collaborative art-science exhibition that showcases local Black and Ethiopian heritage, and author a memoir that weaves her experiences in research, activism, and cultural storytelling. She also hopes
    to continue learning through online courses in machine learning and contemporary art history.
