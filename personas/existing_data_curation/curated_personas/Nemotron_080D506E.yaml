  career_goals: Saikiran aims to become the top‑performing sales representative in his region within the next year, targeting a 20% increase in monthly revenue and earning a regional "Salesperson of the
    Year" award. He plans to leverage his STEM degree to transition into technology‑focused B2B sales, eventually moving into a territory manager role. Over the next three to five years, he intends to enroll
    in an MBA program to deepen his strategic business expertise and ultimately launch his own niche street‑vendor brand that blends tech gadgets with culturally inspired accessories, capitalizing on his
    love for art and innovation.
