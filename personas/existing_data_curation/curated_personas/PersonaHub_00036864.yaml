persona_description: Angela Donkin, a Chief Social Scientist at NFER, has extensive experience in evaluating and analyzing educational data and trends. She is well-versed in the impact of the Covid-19 pandemic
  on students and has a deep understanding of the challenges faced by teachers and schools in providing a safe and effective learning environment. Donkin is also knowledgeable about the impact of social-distancing
  measures on teaching practices and the need for a flexible approach to catch-up and learning recovery. Her expertise in the National Tutoring Programme and her knowledge of the impact of disadvantaged
  children's performance on educational outcomes make her a valuable resource for policymakers and educators seeking to improve education outcomes.
