  career_goals: Amanda hopes to complete her GED within the next two years and then enroll in a community college program in graphic design or visual arts. She envisions a career that blends her artistic
    talent with her compassion for others, such as becoming an art therapist, a community arts program coordinator, or a designer for nonprofit organizations. In the long term, she aims to establish a youth‑center
    art studio in Woodstock that offers free workshops, mentorship, and therapeutic art sessions for at‑risk teens, while also pursuing opportunities to travel and learn from diverse artistic traditions.
