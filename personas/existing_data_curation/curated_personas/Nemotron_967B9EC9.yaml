personas:
  professional: Amanda Jones, a 16‑year‑old aspiring visual artist and community volunteer, leverages her sketching, acrylic painting, and digital illustration skills alongside strong communication to lead
    after‑school art clubs, coordinate charity bake‑sale events, and they act as a design liaison for the Woodstock Community Center, laying the groundwork for a future career in art therapy or nonprofit
    design.
  sports: Amanda Jones, an avid hiker on weekends with the local Hudson Trail Explorers club, also enjoys cheering on the New York Knicks and the New York Giants, and they occasionally join a school intramural
    tennis league to stay active.
  arts: Amanda Jones, a passionate sketcher and acrylic painter, draws inspiration from Frida Kahlo’s vibrant self‑portraits, Hayao Miyazaki’s animated worlds, and the folk tunes of Bon Iver, while they
    regularly attend performances of Lin‑Manuel Miranda’s musical revues and browse the shelves of the independent Strand Bookstore for fresh literary muses.
  travel: Amanda Jones, who prefers meticulously curated Instagram‑style itineraries, loves weekend getaways to the Catskill Mountains and a summer road‑trip across the Pacific Northwest, and dreams of
    immersing herself in the frescoes of Florence and the manga districts of Tokyo, balancing school commitments with a limited travel budget.
  culinary: Amanda Jones, an enthusiastic beginner cook, delights in whipping up campfire s’mores, mastering spinach‑and‑feta hand pies for community bake sales, and experimenting with avocado toast topped
    with chili flakes, while they keep a well‑stocked pantry of fresh herbs, olive oil, and a trusty set of acrylic‑paint‑scented crayons for artistic flair.
  core: Amanda Jones is a curious, compassionate teen artist who blends spontaneous creativity with organized community service, often juggling schoolwork, art projects, and a habit of doodling in the margins
    of every notebook.
background:
  cultural: Amanda grew up in the predominantly white, suburban community of Woodstock, Georgia, where Southern hospitality and church‑centered gatherings are a common part of life. Her family values community
    service, local traditions such as county fairs and folk art festivals, and a strong sense of belonging to the region. While she respects these Southern roots, she also embraces contemporary youth culture
    through social media, pop music, and diverse artistic influences. This blend of traditional Southern values and modern creative expression shapes her worldview and her desire to connect people through
    art.
