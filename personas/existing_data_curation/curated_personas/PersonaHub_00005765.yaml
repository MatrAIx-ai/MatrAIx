persona_description: A nurse who specializes in pain management and has conducted research on the role of natural light exposure in improving the sleep and mood of hospitalized patients. She is part of
  a team at the Cleveland Clinic and has published her findings in the Journal of Advanced Nursing. Her work suggests that patients in the study were exposed to low levels of light during the day, which
  correlated with poor sleep and increased pain levels. The team is now seeking to conduct more studies to determine the effectiveness of lighting interventions in addressing sleep-wake disturbances, distress,
  and pain in hospitalized patients.
