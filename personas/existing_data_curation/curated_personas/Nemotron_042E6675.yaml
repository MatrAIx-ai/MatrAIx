  career_goals: Olivia aims to transition from a miscellaneous labor role to a supervisory position on the farm, eventually becoming a farm manager. She plans to earn a certification in sustainable agronomy
    through a local community college program to improve yields while maintaining traditional practices. Her long‑term ambition is to acquire a modest plot of land to run a family‑style diversified farm
    that emphasizes staple crops and heritage livestock, allowing her to apply her routine‑focused expertise in a more autonomous setting. She also hopes to mentor younger workers in the community, sharing
    her practical knowledge while maintaining her preference for small‑group instruction.
