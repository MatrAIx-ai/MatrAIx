personas:
  professional: An aspiring young explorer named Dustin Davis merges his curiosity for tide‑pool critters with his practical knack for Scratch programming, building simple marine‑themed games while they
    flexibly juggle school projects and soccer practice.
  sports: A soccer‑enthusiast named Dustin Davis dominates the local park field with the Pamlico County Youth Soccer League, pedals his bike along country roads for cross‑training, and cheers on the Carolina
    Hurricanes in winter, channeling team spirit into every game while they thrive on group camaraderie.
  arts: A creative builder named Dustin Davis constructs LEGO forts while humming classic Southern gospel hymns at church and belting out pop hits by Taylor Swift between soccer scrimmages, reflecting a
    blend of tradition and modern media, and they often share their creations with friends at neighborhood gatherings.
  travel: A budding explorer named Dustin Davis loves family road trips to the Outer Basses for tide‑pool hunting, has visited the North Carolina Aquarium in Roanoke Island on a school field day, and daydreams
    about snorkeling among coral reefs in the Florida Keys someday, with they sketching maps of each place they visit.
  culinary: A food‑enthusiast named Dustin Davis devours shrimp boils bursting with buttery shrimp, corn, and sausage, craves crispy fried catfish with hush‑puppy crumbs, and swears by sweet tea, though
    they often sneak an extra sip when nobody’s watching.
  core: A curious yet laid‑back nine‑year‑old named Dustin Davis blends a love for tide‑pool discoveries, spontaneous LEGO builds, and a habit of misplacing their homework, all while not missing a soccer
    game and they always finish their sweet tea.
background:
  cultural: Dustin grew up in Oriental, a small coastal town in Pamlico County, North Carolina. His family reflects a traditional Southern white working‑class culture, with regular church attendance, community
    gatherings, and a deep connection to the local fishing and boating heritage. Meals often feature shrimp boils, fried catfish, cornbread, and sweet tea, while local festivals celebrate the tidal rivers
    and the close‑knit neighborly bonds that shape his everyday life.
