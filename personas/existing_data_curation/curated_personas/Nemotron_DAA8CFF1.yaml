personas:
  professional: An experienced community educator and aspiring volunteer docent, Carolina Jorge blends bilingual translation, meticulous art research, and their own watercolor landscapes, and they curate
    museum exhibitions that intertwine folk art with Rocky Mountain history while mentoring high‑school Spanish learners and pursuing horticulture certification.
  sports: An avid hiker and seasonal birdwatcher, Carolina Jorge joins the local Wiggins Trail Walkers for spring alpine treks, follows the Colorado Avalanche and Denver Broncos with devotion, practices
    gentle yoga twice weekly to sustain joint mobility, and they relish quiet moments observing wildlife along the trails.
  arts: A contemplative watercolorist and cultural essayist, Carolina Jorge finds visual inspiration in the serene palettes of Georgia O'Keeffe and the intimate storytelling of folk muralists, immerses
    themselves in the plaintive guitar strains of regional ballads and the timeless harmonies of Bach, and they channel these influences into reflective blog pieces that intertwine art history, philosophy,
    and personal solitude.
  travel: A meticulous planner with a penchant for solitude, Carolina Jorge has hiked the rugged peaks of Rocky Mountain National Park, wandered historic streets in Santa Fe, revisited familiar rhythms
    of family festivals in a southwestern hometown, and they now dream of photographing the colorful bazaars of a colonial town famed for its artisanal crafts, always timing trips to off‑peak seasons for
    reflective immersion.
  culinary: A seasoned home‑cook who weaves tradition with terroir, Carolina Jorge masterfully prepares mole infused with locally foraged wild mushrooms, crafts hand‑rolled tamales using organic corn masa,
    seasons seasonal trout with chiles and herbs from their garden, and they occasionally splurge on a fine cheese board for an evening of quiet reflection.
  core: Carolina Jorge is a solitary, curious polyglot who blends watercolor brushstrokes with garden soil, fuels their days with folk melodies and meticulous research, and they sometimes indulge in premium
    art supplies despite a carefully balanced budget.
background:
  cultural: Born to Mexican immigrant parents who settled in the Southwest before moving to Colorado, Carolina grew up in a bilingual household steeped in traditions from Oaxaca, including Día de los Muertos
    celebrations, folk music, and oral storytelling. Her upbringing blended Mexican cultural values—family reverence, communal cooking, and respect for artistic expression—with the rugged individualism
    of rural Colorado life. Though she has lived in Wiggins for decades, she maintains strong ties to her heritage through language, cuisine, and participation in local Hispanic festivals. This dual cultural
    lens informs her appreciation for both Mexican folk art and the natural beauty of the Colorado Rockies, shaping her identity as a bridge between two worlds.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Traditional Mexican cooking'', ''Watercolor painting and sketching'', ''Photography (nature and cultural subjects)'', ''Research and critical analysis'',
    ''High-altitude organic gardening'', ''Basic computer and digital photo editing'', ''Organizational and record‑keeping'']'
  hobbies: '[''Watercolor painting'', ''Reading art history & folklore'', ''Traditional Mexican cooking'', ''Organic gardening'', ''Birdwatching and photography'', ''Visiting art galleries and museums'',
    ''Solitary hiking'', ''Crossword puzzles and Sudoku'', ''Listening to classical and Mexican folk music'', ''Personal reflective blogging'']'
  career_goals: Carolina aspires to become a volunteer docent at the Morgan County Museum, where she can curate exhibitions that highlight Mexican folk art alongside regional history. She is determined
    to complete a series of twelve watercolor paintings capturing Colorado’s seasonal landscapes, which she plans to exhibit in a local community gallery. Writing a memoir titled "Borderlands of Memory"—a
    blend of personal narrative, art reflection, and cultural commentary—is another key ambition. Additionally, she hopes to mentor a small group of high‑school students in Spanish language and cultural
    appreciation through one‑on‑one tutoring, and to obtain a horticulture certification to further develop her garden as a sustainable resource for neighbors.
