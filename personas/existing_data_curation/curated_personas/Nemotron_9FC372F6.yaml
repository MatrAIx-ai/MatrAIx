personas:
  professional: Ana Barfield, a budding junior naturalist and LEGO architect, channels their boundless curiosity about river ecosystems and love of building into imaginative projects that blend science
    sketches with brick constructions, and they often juggle a playful resistance to rigid classroom schedules.
  sports: Ana Barfield thrives on the local kids' soccer league, dashing across the playground field with the St. Louis City SC junior team badge pinned on their jersey, while cheering for the St. Louis
    Cardinals baseball team during summer weekends and dreaming of learning ice skating when winter arrives, and they relish the camaraderie of team play.
  arts: Ana Barfield transforms leaves collected from the Mississippi River into vibrant collages, draws sprawling nature scenes inspired by the brushstrokes of Georgia O'Keeffe, builds intricate LEGO habitats,
    and dances to the polyrhythms of Clifton Chenier's zydeco and Dolly Parton's country hits at family gatherings, weaving artistic flair into everyday play, and they often share their creations with friends
    and family.
  travel: Ana Barfield prefers spontaneous, nature-focused outings, often wandering the nearby state park's trails and riverbanks, while also dreaming of a family road trip to the Grand Canyon and a lively
    Mardi-Mardi parade in New Orleans, balancing the excitement of discovery with the practical limits of school-year schedules, and they love to map out imagined routes on paper before each adventure.
  culinary: Ana Barfield loves munching on crunchy apple slices dipped in peanut butter, enjoys helping mix cheesy macaroni casserole with cheddar and butter, and eagerly crafts colorful fruit kebabs with
    strawberries, blueberries, and banana chunks, especially when these snacks accompany their river-bank picnics, and they proudly serve their tasty creations to visiting friends.
  core: Ana Barfield's adventurous spirit and practical curiosity steer them toward outdoor exploration, spontaneous creativity with LEGO and art, and a healthy dose of musical rhythm, all while navigating
    the occasional disorganization of a seven-year-old's busy mind, and they often surprise adults with their inventive problem‑solving.
background:
  cultural: Ana is raised in a white, Southern‑American family in Baton Rouge, Louisiana. She experiences the warm hospitality of the South, participates in community events such as Mardi‑Mardi and Bayou
    festivals, and enjoys regional foods like gumbo and beignets with her family. Her family’s traditions include attending church on Sundays, supporting LSU sports, and celebrating holidays with a blend
    of Anglo‑American and Cajun influences, shaping her appreciation for music, food, and the outdoors.
attributes:
  skills: '[''Reading'', ''Basic addition and subtraction'', ''Storytelling'', ''Drawing'', ''Soccer'', ''Tablet navigation'', ''Simple science experiments'']'
  hobbies: '[''Exploring nature'', ''Reading books'', ''Drawing'', ''LEGO building'', ''Soccer'', ''Listening to zydeco and country music'', ''Crafting for local festivals'']'
  career_goals: Ana dreams of becoming a teacher who shares stories and explores the natural world with children, or a wildlife biologist who studies the bayous of Louisiana. She is fascinated by how things
    work, so she also imagines designing simple inventions to help protect the environment. Her goal is to keep learning, stay curious, and one day make a positive impact on her community.
