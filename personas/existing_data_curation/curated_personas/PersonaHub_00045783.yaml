persona_description: A researcher or scientist involved in the study of schistosomiasis, a parasitic disease transmitted by the blood-sucking snail, Schistosoma mansoni. They are interested in the epidemiological
  aspects of schistosomiasis, including the use of data capture and analysis tools such as the Schisto Track application. They may also be interested in the spatial and environmental factors that contribute
  to the prevalence of schistosomiasis, as well as the effectiveness of control measures. They may have experience in the development and implementation of epidemiological surveys, as well as in the analysis
  of data collected from these surveys. They may also have an interest in the use of GIS and other spatial analysis tools in the study of schistosomiasis.
