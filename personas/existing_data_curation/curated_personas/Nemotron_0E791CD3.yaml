  career_goals: Yaritza aims to graduate high school with strong grades in science and art, then pursue an associate’s degree in Veterinary Technology or a related health‑science field at a community college.
    She envisions a career where she can combine her love for animals with her desire to serve her community, perhaps working in a clinic that offers bilingual services to Mexican‑American families. Simultaneously,
    she hopes to keep her creative side alive by building a digital portfolio of illustrations and possibly exploring graphic design as a side freelance career. Her long‑term ambition is to balance a stable,
    helping‑focused profession with opportunities to showcase her artistic talents, allowing her to feel both secure and fulfilled.
