personas:
  professional: Yaritza Torres is a high‑school junior who blends a love for manga illustration with emerging graphic‑design skills, often volunteering to create flyers for community events while balancing
    schoolwork and family responsibilities, and they approach each project with curious practicality and organized flexibility.
  sports: Yaritza Torres enjoys playing recreational soccer with the McKinney Youth Soccer Club, cheering on the Dallas Cowboys on weekends, and they incorporate folklorico dance practice as cross‑training,
    reflecting a balanced blend of team spirit and personal rhythm.
  arts: Yaritza Torres sketches manga‑style heroes inspired by Akira Toriyama, draws scenes echoing the folklore of La Llorona, listens to Selena while practicing guitar chords, and they attend community
    performances of folklorico that keep traditional rhythms alive in their creative world.
  travel: Yaritza Torres loves weekend road trips to Austin’s live‑music scene, dreams of exploring the colonial charms of Guanajuato and the natural splendor of the Grand Canyon, and they plan each adventure
    with a mix of family budgeting and a spontaneous love for roadside taco stands.
  culinary: Yaritza Torres helps prepare tamales, carne asada, and brisket‑infused barbecue ribs, deftly seasoning with cumin, chipotle, and fresh cilantro, and they enjoy experimenting with quinoa‑based
    salads while mastering the art of perfect corn‑flour tortillas.
  core: Yaritza Torres navigates teenage life with a curious mind, a love for artistic storytelling, and a quiet worry that fuels diligent planning yet sometimes stalls spontaneity.
background:
  cultural: 'Yaritza grew up in a Mexican‑American household in McKinney, Texas, where Spanish is spoken daily and family gatherings are centered around food, music, and shared traditions. Her parents emphasize
    respect for elders, Catholic holidays, and community involvement, so she participates in celebrations such as Día de los Muertos and the local Cinco de Mayo parade. The blend of Mexican heritage and
    suburban Texas life gives her a bicultural perspective: she enjoys both classic Mexican cuisine and Texas‑style barbecue, listens to Mariachi and contemporary pop, and balances school expectations with
    family values. This cultural mosaic shapes her identity, fueling her bilingual communication skills, love for traditional arts, and commitment to helping her community while maintaining a strong sense
    of belonging to both cultures.'
