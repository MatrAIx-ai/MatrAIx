  career_goals: Although still very young, Sahara often talks about future roles that let her care for others. She expresses a desire to become a teacher because she likes telling stories and helping friends
    learn. She also dreams of being a doctor or a veterinarian, fascinated by how the body works and by the animals she loves. Occasionally she imagines being a community gardener, planting flowers in the
    neighborhood park, reflecting her practical curiosity about how things grow.
