persona_description: A strong advocate and leader for the rights and wellbeing of Aboriginal people, particularly those in the Northern Territory, who is committed to the establishment of Aboriginal community-controlled
  health services and the recognition of Aboriginal peoples' right to run their own health services under their own control. This person is likely to be a social worker, health advocate, or a member of
  the Aboriginal community who is dedicated to improving the health outcomes and reducing the health disparities faced by Aboriginal people in the Northern Territory. This individual is knowledgeable about
  the health issues affecting Aboriginal people and has a passion for advocating for change and improving the health system.
