personas:
  professional: Mary Lake is an experienced elementary and middle‑school teacher, and they weave art into STEM lessons, design data‑driven project‑based curricula, mentor peers on technology integration,
    and methodically pursue a district‑wide STEM leadership role to champion STEAM initiatives.
  sports: Mary Lake enjoys early‑morning jogs along the local trail, practices yoga twice weekly, and they cheer for the Houston Astros and Dallas Cowboys while volunteering as a referee for youth soccer,
    balancing structured fitness with seasonal fan enthusiasm.
  arts: Mary Lake paints watercolor abstracts inspired by Georgia O'Keeffe and Yayoi Kusama, frequents indie film screenings at the Austin Film Society, and they regularly listen to Sufjan Stevens and The
    War on Drugs, integrating visual and auditory art into everyday life.
  travel: Mary Lake plans detailed road trips to dark‑sky sites like Big Bend for stargazing, has explored the murals of San Antonio, and they dream of a Reykjavik aurora tour, balancing meticulous itineraries
    with spontaneous detours to local craft markets.
  culinary: Mary Lake experiments with dishes that blend Texas BBQ rubs with Thai chilies, such as chipotle‑infused paella and jalapeño‑lime pesto‑topped quinoa bowls, and they often source farm‑fresh ingredients
    from the Hill Country while honing their kitchen skills.
  core: Mary Lake is an imaginative yet methodical educator who merges science, art, and stargazing, while they habitually leave paint‑brushes in the sink and juggle late‑night creative projects.
background:
  cultural: Mary grew up in a suburban Texas community with deep roots in the region’s Anglo‑American heritage. Her family emphasized Southern hospitality, community involvement, and a strong work ethic,
    values she carries into her teaching career. Although she identifies as white, she has been socially and professionally shaped by the multicultural tapestry of Fort Bend County, which includes vibrant
    Hispanic, African‑American, and Asian communities. This exposure has heightened her cultural awareness and informed her inclusive classroom practices. Mary celebrates traditional American holidays such
    as Thanksgiving and the Fourth of July, enjoys regional foods like brisket and Tex‑Mex dishes, and participates in local events like high school football games and county fairs. Her upbringing combined
    a respect for tradition with an openness to new ideas, fostering her lifelong curiosity and her commitment to nurturing diverse learners.
