  hobbies: '[''Watercolor painting'', ''Sketching and abstract art'', ''Reading speculative fiction'', ''Visiting art galleries and independent film screenings'', ''Amateur astronomy'', ''Gardening'', ''Yoga'',
    ''Experimental cooking'', ''Volunteering at the community science museum'', ''Participating in a diverse literature book club'']'
  career_goals: Mary aims to transition into a district‑wide STEM leadership role where she can shape curricula across multiple schools and champion STEAM initiatives that merge science, technology, engineering,
    arts, and mathematics. She plans to pursue a master’s degree in educational technology to deepen her expertise in digital learning environments. Over the next five years, she hopes to author a series
    of children’s science books that incorporate visual storytelling, secure funding for a maker‑space in her district, and establish a mentorship program for early‑career teachers. Ultimately, she envisions
    influencing education policy at the state level to promote innovative, interdisciplinary teaching models.
