  career_goals: Ashley aims to publish her first full-length novel within the next three years while building a sustainable freelance writing career. She aspires to secure a regular column in a local newspaper
    or lifestyle magazine, develop a personal blog that blends practical advice with personal narratives, and eventually lead writing workshops for aspiring authors in her community. Balancing creative
    fulfillment with financial stability, she seeks to combine book publishing, freelance projects, and community engagement as pathways to long‑term success.
