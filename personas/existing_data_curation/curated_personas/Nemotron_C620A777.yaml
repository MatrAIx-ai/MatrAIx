  career_goals: David aims to step into a supervisory role within the casino security department within the next three years, pursuing certifications such as the Certified Protection Professional (CPP)
    and earning his GED. He wants to design and implement more predictable shift schedules to reduce stress for himself and his team. Long‑term, he envisions becoming a security consultant for small businesses
    in the Hudson Valley, leveraging his experience to improve safety protocols. He also hopes to mentor younger guards, imparting vigilance while promoting stress‑management techniques.
