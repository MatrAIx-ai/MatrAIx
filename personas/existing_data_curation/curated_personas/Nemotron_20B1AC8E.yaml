personas:
  professional: Sai Agrawal, an aspiring multimedia designer, blends self‑taught Photoshop and Illustrator skills with a keen eye for photography and watercolor sketches, channeling a calm, organized yet
    flexible approach to coordinating community art workshops and envisioning museum exhibits that spotlight under‑represented narratives.
  sports: Sai Agrawal enjoys weekend bike rides with the local cycling club, follows the city’s professional basketball team, the River Runners, plays casual soccer at the community garden’s field, and
    maintains fitness through morning yoga sessions that complement their calm demeanor.
  arts: Sai Agrawal frequently visits the Metropolitan Museum of Art and the contemporary gallery Space 10, sketches urban skylines in watercolor after admiring works by Edward Hopper and Yayoi Kusama,
    strums acoustic renditions of John Mayer and Nick Drake, and curates playlists featuring ambient composer Brian Eno, all of which shape their visual storytelling.
  travel: Sai Agrawal favors thoughtfully planned week‑long trips, having explored the street art of Berlin, the historic temples of Kyoto, and the bustling markets of Marrakech, while their next goal is
    a budget‑friendly pilgrimage to the museums of Paris and a road‑trip through the American Southwest’s national parks.
  culinary: Sai Agrawal enjoys cooking simple vegetarian dishes like lentil dal with cumin and cilantro, perfecting homemade avocado toast with poached eggs, and savoring sushi rolls with pickled ginger,
    while their palate also loves the smoky depth of grilled paneer tikka and the bright freshness of caprese salad.
  core: Sai Agrawal is a calm, curiosity‑driven 22‑year‑old who merges art, technology, and cultural storytelling, balancing meticulous budgeting with spontaneous creative projects, and occasionally forgetting
    to water their community garden plants.
background:
  cultural: Sai is a second‑generation South Asian American, raised in a household that blends Indian cultural values with New England sensibilities. He grew up speaking Hindi with his family and celebrating
    festivals such as Diwali and Holi, which instilled a deep appreciation for tradition and communal gatherings. At the same time, his upbringing in Tariffville, CT, exposed him to diverse artistic influences,
    encouraging a broad, inclusive worldview. This bicultural experience informs his curiosity about different artistic expressions and fuels his ambition to bridge cultural narratives through visual media.
attributes:
  skills: '[''Graphic design (Photoshop, Illustrator)'', ''Digital photography'', ''Creative writing'', ''Bilingual communication (English, Hindi)'', ''Community event planning'', ''Basic video editing'',
    ''Research and information synthesis'', ''Collaborative teamwork'', ''Problem solving'']'
  hobbies: '[''Watercolor painting and sketching'', ''Visiting art museums and galleries'', ''Digital photography'', ''Acoustic guitar playing'', ''Reading science fiction and philosophy'', ''Community
    gardening'', ''Mindfulness meditation'', ''Volunteering at the local library for youth art programs'', ''Attending cultural festivals'']'
  career_goals: Drawing on his curiosity and love for unconventional ideas, Sai aims to pursue a degree in Visual Arts or Multimedia Design at a community college, followed by a bachelor's program that
    integrates technology and cultural studies. He envisions a career as a multimedia designer or museum exhibit coordinator where he can blend artistic expression with storytelling, especially highlighting
    underrepresented cultural narratives. In the long term, he hopes to lead community art projects that foster cross‑cultural dialogue and provide mentorship opportunities for young creatives in his hometown.
