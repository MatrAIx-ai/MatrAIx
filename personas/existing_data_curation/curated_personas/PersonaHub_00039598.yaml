persona_description: A healthcare professional who prioritizes the oral health of the elderly population, particularly focusing on the impact of chronic disease, medications, and physical/cognitive impairments
  on oral health. They are aware of the complexities of dental treatment in the geriatric population and prioritize preventive measures such as regular dental exams, fluoride treatments, and intra-oral
  assessments. They are also aware of the sundowning effect and book appointments in the mornings to ensure patient cooperation and understanding.
