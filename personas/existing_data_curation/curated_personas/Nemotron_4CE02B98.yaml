  hobbies: '[''soccer (co‑ed league)'', ''volunteering at senior center'', ''cooking Mexican cuisine'', ''hiking Sonoran Desert trails'', ''gardening (peppers, tomatoes)'', ''organizing community games'',
    ''financial literacy workshops'']'
  career_goals: Francisco aims to leverage his extensive underwriting expertise by moving into a part‑time consulting role that helps family‑owned Mexican‑American businesses navigate insurance needs and
    disaster‑risk planning. He plans to complete the Chartered Property‑Casualty Underwriter (CPCU) designation to formalize his knowledge and position himself as a trusted advisor. Additionally, he is
    passionate about fostering the next generation of underwriters, so he intends to mentor interns from the local community college and develop a cultural‑competency training module for his firm. Ultimately,
    he envisions a gradual transition toward community‑focused work, balancing professional engagement with volunteer leadership at the local senior center.
