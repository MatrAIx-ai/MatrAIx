  career_goals: Giao aims to become a technical leader who bridges software engineering with interactive art. In the next five years he hopes to take on senior full‑stack or lead engineer roles, guiding
    multidisciplinary teams to deliver immersive AR/VR experiences and generative‑art platforms. He is determined to launch his own startup that empowers creators with AI‑driven design tools, and to secure
    a patent for a novel real‑time visual synthesis algorithm. He also plans to mentor junior developers, win regional hackathons, and eventually transition into a product‑focused role where he can shape
    product vision while staying hands‑on with code.
