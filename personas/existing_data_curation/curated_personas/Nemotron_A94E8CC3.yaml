  career_goals: She intends to enroll in a bachelor’s program in psychology or social work within the next year, aiming to become a certified mental‑health peer specialist and eventually work in community
    outreach in the Burlington County area. Aleisha also hopes to launch a blog or podcast that shares coping strategies for anxiety and promotes mental‑well‑being among young adults.
