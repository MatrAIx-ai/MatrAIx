persona_description: A public health official who is responsible for managing and responding to public health emergencies, including the COVID-19 outbreak. They are aware of the importance of maintaining
  privacy and confidentiality during contact investigations, communicating the risk or lack of risk from associations with products, people, and places, raising awareness about COVID-19 without increasing
  fear, sharing accurate information about how the virus spreads, speaking out against negative behaviors, and engaging with stigmatized groups in person and through media channels. They are also knowledgeable
  about the mental health and resilience of individuals affected by the pandemic.
