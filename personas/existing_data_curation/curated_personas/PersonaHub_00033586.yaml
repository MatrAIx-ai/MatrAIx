persona_description: A historian who specializes in the study of economic history, particularly the patterns and dynamics of business cycles in different countries and periods. His research interests include,
  but are not limited to, the role of economic freedom in determining the length and depth of recessions and expansions, the impact of economic freedom on the severity of recessions, and the effects of
  economic freedom on the recovery from recessions. He is particularly interested in the United States, the United Kingdom, and other countries that have experienced economic recessions in recent history.
  He is also interested in the impact of economic freedom on the severity of recessions and expansions, and the potential benefits of economic freedom in reducing the damages of recessions.
