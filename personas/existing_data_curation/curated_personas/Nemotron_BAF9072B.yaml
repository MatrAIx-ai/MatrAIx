  hobbies: '["Gardening (vegetable garden)", "Woodworking (birdhouses, furniture)", "Reading (historical biographies, local history)", "Bridge (community center)", "Walking (with dog)", "Listening to classic
    jazz", "Jigsaw puzzles", "Volunteering at senior center"]'
  career_goals: Though retired, Rafael aims to stay physically and mentally active, support his wife, and continue his contributions to the community. He hopes to mentor his grandchildren as they prepare
    for college, document his family's history, and organize a weekend workshop series on practical DIY skills for senior neighbors. Maintaining a predictable daily routine and ensuring financial stability
    for his spouse are also central ambitions.
