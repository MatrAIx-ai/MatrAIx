personas:
  professional: Aliyah Sanders, a senior community volunteer and seasoned event planner, channels decades of household management, church coordination, and neighborhood budgeting into organizing intergenerational
    garden projects, cultural exchange programs, and senior‑center activities that blend meticulous logistics with warm, storyteller‑style leadership.
  sports: Aliyah Sanders stays active by joining a senior walking club that meets thrice weekly at the local park, cheering on the Texas Rangers during baseball season and the Dallas Cowboys during fall
    football while occasionally attending community yoga classes, and they enjoy gentle strength training with light dumbbells at the senior center.
  arts: Aliyah Sanders, a devoted gospel choir member and occasional piano accompanist, finds inspiration in the timeless films of Marilyn Monroe and Cary Grant while also savoring the music of Aretha Franklin,
    Ella Fitzgerald, and contemporary jazz pianist Brad Mehldau, and they often host movie‑night gatherings where classic cinema meets lively discussion.
  travel: Aliyah Sanders prefers purposeful travel, having explored the historic streets of Savannah, enjoyed a weekend road trip to Austin’s live‑music scene, and taken a family visit to a sunny California
    beach, while dreaming of a future pilgrimage to Washington, D.C.’s Smithsonian museums and a tranquil retreat in Tuscany’s rolling hills.
  culinary: Aliyah Sanders blends Southern soul‑food classics like collard greens with Tex‑Mex staples such as chicken enchiladas, often seasoning dishes with fresh jalapeños, smoked paprika, and a pinch
    of garlic, and they proudly experiment with healthier twists—substituting quinoa for traditional rice and using low‑fat cheese—while sharing home‑cooked meals at community potlucks and family gatherings.
  core: Aliyah Sanders lives at the crossroads of community stewardship and creative comfort, orchestrating neighborhood events with a planner’s precision, delighting in soulful music and classic films,
    yet occasionally misplacing their reading glasses while reaching for the garden they love.
background:
  cultural: Aliyah is an African‑American woman whose early years were spent in the Deep South before moving to Arlington, Texas. Her upbringing was deeply rooted in church, family gatherings, and community
    solidarity, which continue to shape her identity. She carries forward traditions of Southern cooking, oral storytelling, and gospel music, while also honoring the legacy of the Great Migration and her
    ancestors’ journey toward greater opportunity. In Texas, she blends local cultural influences—such as Tex‑Mex flavors and outdoor recreation—with her African‑American heritage. Aliyah actively participates
    in celebrations of Juneteenth and Kwanzaa, and she is a pillar in her local church and neighborhood, fostering intergenerational bonds and cultural continuity through food, music, and volunteerism.
attributes:
  skills: '["Cooking (Southern & Tex‑Mex)", "Gardening", "Community Event Planning", "Budget Management", "Interpersonal Conflict Resolution", "Mentorship", "Basic Digital Literacy (email, video calls,
