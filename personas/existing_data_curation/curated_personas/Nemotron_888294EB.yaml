  hobbies: '["Cooking (Soul‑Food & Tex‑Mex Fusion)", "Gardening", "Church Choir & Gospel Music", "Book Club (Historical Novels & Memoirs)", "Quilting", "Classic Movie Watching", "Genealogy Research", "Volunteering
    at Senior Center (Crafts & Social Activities)", "Walking in Parks", "Attending Community Festivals"]'
  career_goals: At 75, Aliyah’s ambitions focus on legacy, community enrichment, and intergenerational connection. She aims to establish a neighborhood community garden that provides fresh produce and a
    gathering space for seniors and youth. She plans to mentor younger volunteers, sharing her knowledge of event planning, budgeting, and cultural traditions. Aliyah is working on a memoir that documents
    her family’s journey and African‑American heritage. She is learning to use smartphones and video platforms more fluently to conduct virtual storytelling sessions for her grandchildren. Additionally,
    she aspires to organize an intergenerational cultural exchange program with local schools, showcasing African‑American cooking, music, and history, and hopes to travel to visit her children, grandchildren,
    and extended family across the country.
