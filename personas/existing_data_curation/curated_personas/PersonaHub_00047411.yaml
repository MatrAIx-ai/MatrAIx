persona_description: A veterinarian who specializes in the treatment and control of Toxoplasma gondii in livestock. They are particularly interested in the epidemiology of the disease and its role in the
  transmission of the parasite between humans and animals. They are likely to be working in a research laboratory or a public health department. They have a strong background in parasitology and have conducted
  research on the prevalence and transmission of Toxoplasma gondii in various populations. They are also familiar with the methods used to screen for antibodies to the parasite and have experience in interpreting
  the results of these tests.
