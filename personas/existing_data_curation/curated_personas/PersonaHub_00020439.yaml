persona_description: A developmentally inappropriate education reformer who advocates for higher standards in elementary school and is pushing for the extension of the school system into the workforce pipeline
  to prepare children for 21st century careers. They are a researcher at Worcester Polytechnic Institute who is developing a "Seeds of STEM" initiative that aims to introduce problem-solving skills to preschoolers,
  believing that it is never too late to start fostering the thinking skills children will need to be scientists and engineers. They are likely to be a person who is concerned with the development of STEM
  skills in children and the need to prepare them for future careers in a global economy, regardless of the developmental appropriateness of the approach.
