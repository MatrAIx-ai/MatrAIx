  hobbies: '[''Reading (Non-fiction)'', ''Podcast Listening'', ''Python Programming'', ''Data Visualization'', ''Jogging'', ''Cooking (Southern cuisine)'', ''Acoustic Guitar'', ''Photography (Urban & Nature)'',
