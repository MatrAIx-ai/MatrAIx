  career_goals: Muhammed aims to transition from a frontline customer service role into a supervisory or team lead position within the next two years, leveraging his organizational strengths and analytical
    mindset. He is interested in specializing in operations or business analytics, seeking certifications such as Certified Business Analyst Professional (CBAP) and possibly pursuing a master’s degree in
    Business Analytics. Long‑term, he envisions launching his own e‑commerce venture that integrates data‑driven customer insights to create personalized shopping experiences. He prefers roles that allow
    for independent work and structured environments, and values opportunities for continuous learning.
