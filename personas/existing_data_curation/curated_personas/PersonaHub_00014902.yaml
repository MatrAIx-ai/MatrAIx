persona_description: A paleontologist specializing in the study of cephalopod shells and their preservation processes in the Lower Devonian of Bohemia, Czech Republic. He is particularly interested in the
  unique colour patterns preserved in orthoceratoids and oncocerid nautiloids, as well as the significance of these patterns in palaeoecological interpretation and the taxonomic affiliation of taxa. He
  is likely to have a deep knowledge of taphonomy, taxonomy, and the evolution of cephalopods during the Early Devonian.
