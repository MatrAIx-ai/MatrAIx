personas:
  professional: Luis Moreno is a veteran social service professional with over 30 years of experience in case management, crisis intervention, and community outreach, leveraging bilingual fluency and an
    arts‑humanities background to bridge cultural gaps while balancing a preference for structured processes with a relaxed, flexible approach to daily obligations.
  sports: Luis Moreno regularly plays in a local community soccer league, participates in weekly dominoes tournaments at the community center, walks the Harborwalk with a group of friends, and cheers for
    the Boston Celtics and Boston Red Sox, valuing the social camaraderie of team sports over solitary exercise.
  arts: Luis Moreno enjoys attending bachata and merengue dance nights, where they practice steps to the music of Juan Luis Guerra and Marc Anthony, reads regional historical novels by authors such as Julia
    Alvarez and Junot Díaz in a monthly book club, and volunteers at a local theater to help promote community storytelling.
  travel: Luis Moreno prefers short, culturally immersive trips, such as weekend visits to historic towns like Salem and Providence, as well as occasional journeys to Caribbean heritage festivals, balancing
    a love for exploring local museums with a practical mindset that keeps travel budgets modest and planning flexible.
  culinary: Luis Moreno cooks traditional dishes like mangú and sancocho with confidence, seasoning them with green plantains, yuca, and a blend of sofrito, while also experimenting with Mediterranean recipes,
    and enjoys sharing meals at community potlucks despite occasionally overindulging in rich stews.
  core: Luis Moreno blends three decades of social service expertise with a vibrant community life, balancing structured work habits with relaxed, sociable leisure, and navigates finances, health, and hobbies
    with a pragmatic yet occasionally indulgent spirit.
background:
  cultural: Luis grew up in a tight‑knit Dominican household in the Bronx before relocating to South Boston in his early thirties. He maintains strong ties to his heritage through language, music, food,
    and community celebrations such as Dominican Independence Day and the annual La Feria de Boston. His Catholic upbringing and emphasis on family solidarity shape his approach to service, making him a
    trusted bridge between the Dominican diaspora and the broader Boston community. He embraces both Dominican cultural norms—like communal gatherings and respect for elders—and the more individualistic,
    structured aspects of New England life, creating a blended identity that informs his personal and professional interactions.
