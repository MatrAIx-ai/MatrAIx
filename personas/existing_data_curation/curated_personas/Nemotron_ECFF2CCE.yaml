  hobbies: '[''Dominoes'', ''Community soccer'', ''Bachata/Merengue dancing'', ''Cooking traditional Dominican cuisine'', ''Volunteering at parish food bank'', ''Walking the Harborwalk'', ''Reading Caribbean
    literature'', ''Participating in a book club'']'
  career_goals: Luis aims to transition into a senior supervisory role within the social services network, such as a program director for a community health center serving Boston's Dominican population.
    He plans to obtain a Certified Social Work (CSW) license and complete a professional development certificate in community program leadership. His long‑term ambition is to design and launch a culturally
    tailored senior‑care initiative that integrates Dominican traditions with local resources, while mentoring younger staff and fostering a pipeline of bilingual social workers.
