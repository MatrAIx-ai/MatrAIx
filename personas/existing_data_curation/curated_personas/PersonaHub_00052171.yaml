persona_description: A child protection specialist who is dedicated to preventing and addressing violence in schools and communities through the implementation of the Violence Prevention Through Conflict
  Resolution program. They have extensive experience in primary prevention education and have worked with the Children’s Creative Response To Conflict (CCRC) program to develop the Violence Prevention Through
  Conflict Resolution program. They are skilled in facilitating adult workshops and classroom workshops, and are passionate about empowering children to develop problem-solving skills, enhance communication
  skills, build affirmation and cooperation skills, and provide strategies for win/win conflict resolution. They understand the importance of supportive adults understanding the concepts of the Violence
  Prevention Through Conflict Resolution program and are committed to implementing it effectively in New Jersey Schools.
