  hobbies: '[''reading science fiction'', ''coding challenges on platforms like LeetCode'', ''strategy video games'', ''sketching manga characters'', ''cooking Mexican dishes'', ''listening to ambient electronic
    music'', ''night walks in Chicago'', ''stargazing'']'
  career_goals: Sunil aims to complete his GED within the next year and then enroll in a community college program for an associate degree in information technology. He plans to secure an apprenticeship
    or entry‑level role in IT support, where he can apply his troubleshooting skills while learning from experienced mentors. In parallel, he hopes to hone his coding abilities and eventually contribute
    to open‑source projects. Long‑term, he envisions leveraging his culinary talent by launching a small, tech‑enabled Mexican catering service that can operate online, providing him both creative fulfillment
    and financial stability. Throughout these goals, he seeks structured routines that help manage his stress and maintain his preference for solitary, focused work environments.
