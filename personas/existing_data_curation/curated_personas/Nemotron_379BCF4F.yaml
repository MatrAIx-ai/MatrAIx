personas:
  professional: Sunil Diaz, an aspiring IT support technician with a knack for troubleshooting hardware and crafting clean HTML/CSS pages, channels their curiosity and methodical mindset into solving user
    problems while maintaining a structured yet adaptable workflow that suits their preference for solitary, focused tasks.
  sports: Sunil Diaz, a low‑key fitness enthusiast who supports the Chicago Cubs, Chicago Bulls, and Chicago Blackhawks, joins a community pick‑up basketball group at a local park on weekends, and supplements
    their solitary night walks with occasional treadmill sessions to keep stress at bay.
  arts: Sunil Diaz, a manga‑style sketcher who draws inspiration from Eiichiro Oda and Makoto Yukimura while listening to ambient electronic artists like Tycho and Boards of Canada, spends weekends browsing
    the Art Institute of Chicago’s regional exhibits and uploads time‑lapse videos of their drawings to YouTube.
  travel: Sunil Diaz, an introspective traveler who favors off‑peak trips to quiet destinations like the historic streets of Oaxaca for culinary inspiration and the neon‑lit districts of Tokyo for manga
    culture, plans most journeys on a shoestring budget using student discounts and prefers to explore on foot or via local transit.
  culinary: Sunil Diaz, a self‑taught cook who excels at preparing authentic tacos al pastor, mole poblano, and chiles en nogada using fresh hoja santa and dried pasilla chilies, often experiments with
    fusion twists while pairing dishes with craft sodas, and shares their creations at small gatherings of close friends.
  core: Sunil Diaz blends solitary curiosity with practical tech skills, a frugal yet occasional splurging habit, and a deep love for traditional culinary arts and manga, while they navigate anxiety‑driven
    stress and maintain a steadfast drive toward an IT‑catering hybrid future.
background:
  cultural: Sunil is a first‑generation Mexican‑American raised in a vibrant Hispanic community in Chicago. At home, Spanish is spoken alongside English at school, giving him fluency in both languages.
    He grew up celebrating cultural traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around Mexican cuisine and music. This bicultural upbringing blends the family‑centric
    values and culinary heritage of his Mexican roots with the urban, multicultural influences of Chicago, shaping his bilingual communication skills, appreciation for Mexican culinary arts, and his desire
    to bridge technology with cultural tradition.
attributes:
  skills: '[''troubleshooting basic computer hardware'', ''basic HTML/CSS web development'', ''bilingual English–Spanish communication'', ''minor carpentry and plumbing repairs'', ''Mexican cooking'', ''digital
