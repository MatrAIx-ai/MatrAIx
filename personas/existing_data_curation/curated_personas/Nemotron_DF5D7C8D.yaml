  career_goals: Armand aims to progress to a regional sales manager role within the next three years, where he can lead a small, cohesive team and apply his methodical approach to improve sales processes.
    He plans to earn a professional sales certification and complete his bachelor's degree in Business Administration to strengthen his strategic expertise. In the longer term, he envisions moving into
    sales operations or consulting for manufacturing firms, focusing on streamlining sales cycles and reducing client churn. He seeks a position that offers greater stability and work-life balance, which
    he believes will help mitigate his stress sensitivity and allow him to maintain his high level of reliability.
