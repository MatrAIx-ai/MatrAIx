  career_goals: Looking ahead, James aims to transition into a senior PMO leadership role within the next five years, overseeing multi‑site infrastructure projects that support regional economic development.
    He plans to earn his Project Management Professional (PMP) certification and a Six Sigma Black Belt to deepen his methodological toolkit. James also aspires to mentor junior project coordinators, building
    a high‑performing team culture grounded in accountability and continuous improvement. Long‑term, he envisions launching a boutique consultancy that helps small Pennsylvania businesses adopt efficient
    project practices while preserving the community‑focused values he holds dear.
