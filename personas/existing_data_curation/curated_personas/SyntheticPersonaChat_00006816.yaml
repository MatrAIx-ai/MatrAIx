    User 1: Me too! I love the views from the top of a mountain.

    User 2: I agree!

    User 1: So, what do you like about yoga?

    User 2: I like the way it makes me feel. It makes me feel more relaxed and more in tune with my body.

    User 1: I agree! It''s a great way to connect with yourself.

    User 2: I agree!

    User 1: So, what do you like about teaching yoga?

    User 2: I like helping people feel good about themselves and their bodies.

    User 1: I love that! That''s a great goal.

    User 2: Thanks'
