  career_goals: Daniel aims to become a partner at his Ottawa law firm within the next five years, leading a dedicated practice area that serves the local community—particularly family and property law.
    He wants to formalize efficient workflow systems that reduce stress for himself and his colleagues, and eventually open a boutique office that offers pro‑bono services to low‑income families. Long‑term,
    he hopes to mentor younger attorneys, sharing his disciplined approach and reinforcing the practical, ethical standards he values.
