personas:
  professional: Bethany Ramos is a budding wildlife illustrator who merges her love of birdwatching and methodical LEGO building into detailed hand‑drawn sketches of feathered species, envisioning a future
    career in scientific illustration while juggling the occasional disorganized school schedule.
  sports: Bethany Ramos enjoys low‑impact fitness through weekend hikes with the local Junior Rangers Outdoor Club, follows the Springfield Isotopes minor league baseball team, and prefers collaborative
    builds in Minecraft over competitive sports, embodying a calm, nature‑focused approach to physical activity.
  arts: Bethany Ramos immerses herself in drawing detailed bird illustrations inspired by John James Audubon, devours mystery novels by Agatha Christie and Nancy Drew, and watches Studio Ghibli animated
    films while creating Scratch animations of forest scenes, blending classic literary and visual influences with her own creative projects.
  travel: Bethany Ramos favors low‑key weekend excursions, has trekked the trails of Yellowstone National Park with her family, and dreams of exploring Costa Rica’s Monteverde Cloud Forest to photograph
    exotic birds, planning trips with parental guidance while mapping her own bird‑spotting routes.
  culinary: Bethany Ramos loves baking vanilla cupcakes topped with rainbow sprinkles and often folds fresh garden strawberries into the frosting, enjoying simple kitchen experiments despite occasionally
    burning the edges while juggling LEGO builds and Scratch coding.
  core: Bethany Ramos is a calm, detail‑oriented 12‑year‑old who blends a love of birds, structured creativity, and low‑key adventures into a quietly ambitious life, though she frequently misplaces LEGO
    pieces and forgets to tidy her desk.
background:
  cultural: Bethany grew up in Starkster, Mississippi, a small town that blends traditional Southern hospitality with the energetic atmosphere of a nearby university town. Her family has deep roots in Clay
    County, and she often hears stories about her grandparents' farm life and the region's agricultural heritage. The local culture emphasizes community gatherings such as county fairs, church potlucks,
    and Friday night high‑school football games. She attends a Methodist church with a strong emphasis on service and family values. Southern cuisine—like biscuits, fried catfish, and sweet tea—features
    regularly at family meals, and she enjoys listening to a mix of country and blues music. This mixture of rural tradition and college‑town openness is a core part of her identity.
attributes:
  skills: '[''Step‑by‑step project execution'', ''Basic Scratch programming'', ''LEGO and simple robotics building'', ''Reading comprehension'', ''Basic cooking (sandwiches, simple recipes)'', ''Household
    chore assistance'', ''Puzzle solving (jigsaw, Sudoku)'']'
  hobbies: '[''Reading mystery novels'', ''Drawing/illustration'', ''Birdwatching'', ''LEGO building'', ''Playing Minecraft with a small group'', ''Basic cooking (baking cupcakes)'', ''Nature hikes'', ''Journaling'']'
  career_goals: Bethany dreams of a future that blends her love for animals, nature, and organized work. She hopes to study biology in college—ideally at Mississippi State University—and eventually become
    a wildlife veterinarian or a conservation biologist, roles that offer clear procedures, predictability, and the chance to help living creatures. She also sees value in pairing her emerging coding skills
    with environmental monitoring, perhaps creating simple apps for tracking local wildlife. While she wants a stable, structured career, she values the flexibility to work outdoors and spend time in calm,
    quiet settings.
