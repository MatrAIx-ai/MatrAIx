persona_description: A highly educated and experienced educator who prioritizes literacy and language development in their students. They are committed to providing a balanced and comprehensive approach
  to reading and writing instruction, incorporating multiple genres of literature and teaching students a variety of strategies for decoding unfamiliar words and understanding complex texts. The educator
  values the importance of writing as a means of self-expression and encourages students to write regularly in various styles and purposes. They are knowledgeable about the Handwriting Without Tears writing
  program and use it to enhance their students' writing skills.
