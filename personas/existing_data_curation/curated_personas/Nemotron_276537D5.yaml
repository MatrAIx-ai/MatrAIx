    Improvement'']'
  hobbies: '[''Yoga'', ''Mindfulness Meditation'', ''Tai Chi'', ''Reading Medical Journals'', ''Health Technology Blogs'', ''Cooking East Asian Recipes'', ''Gardening'', ''Bird Watching'', ''Attending Cultural
    Festivals'', ''Journaling'', ''Calligraphy'']'
  career_goals: Driven by her curiosity and competitive spirit, Hui aspires to transition from nursing assistant to a Registered Nurse within the next four years by completing a BSN program, with a focus
    on geriatric care. She aims to become a unit charge nurse, leveraging her methodical planning skills to improve workflow efficiency and patient outcomes. Additionally, she envisions contributing to
    evidence‑based practice initiatives, possibly leading a quality‑improvement project that reduces hospital-acquired infections. Long‑term, she hopes to combine her practical expertise with her cultural
    insights to mentor new staff and develop culturally competent care protocols for Brooklyn’s East Asian community.
