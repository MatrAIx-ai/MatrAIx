personas:
  professional: Hui Chen is a seasoned nursing assistant with strong vitals monitoring, wound care, and Epic documentation skills, leveraging their meticulous, organized nature and bilingual Mandarin‑English
    communication to deliver culturally sensitive patient education while they competitively pursue a BSN and a future charge‑nurse role.
  sports: Hui Chen practices yoga twice weekly, attends a community Tai Chi class, jogs scenic routes in Prospect Park, follows the Brooklyn Nets, New York Yankees, and New York Rangers, participates in
    a local adult rowing club, and they balance low‑impact exercise with fan enthusiasm for professional sports.
  arts: Hui Chen expresses creativity through calligraphy and sketching, finds solace in classical music by Yo‑Yo Ma, enjoys jazz legends like Miles Davis, regularly attends performances at the Brooklyn
    Academy of Music, and they watch films such as Parasite and Crouching Tiger, Hidden Dragon, letting artistic appreciation shape their downtime.
  travel: Hui Chen plans trips with meticulous itineraries, favoring culturally rich destinations like Kyoto, Taipei, and Singapore for health‑tech conferences, while also savoring weekend escapes to the
    Hudson Valley for bird‑watching and local festivals, and they balance adventure with budget constraints.
  culinary: Hui Chen cooks intermediate‑level East Asian dishes such as homemade jiaozi, mapo tofu, and miso‑glazed salmon, favoring fresh ingredients like shiitake mushrooms, bok choy, ginger, and home‑grown
    basil, and loves sharing these meals at intimate gatherings, though they sometimes over‑season in pursuit of bold flavors.
  core: Hui Chen is a methodical, competitive health‑care professional who channels stress into yoga, calligraphy, and meticulous budgeting, yet often worries about outcomes, and they indulge in occasional
    over‑seasoned cooking experiments.
background:
  cultural: Hui grew up in a first‑generation immigrant family that values diligence, respect for elders, and close family ties, rooted in her Chinese heritage. Living in Brooklyn's vibrant Kings County,
    she maintains connections to the local Asian diaspora through community centers, temple events, and Chinese-language media. Her bilingual upbringing enables her to navigate both American and East Asian
    cultural norms, fostering a deep appreciation for traditional values while adapting to the fast‑paced urban environment. This cultural duality informs her empathetic patient care, especially for older
    East Asian patients who value familial involvement and culturally sensitive communication.
attributes:
  skills: '[''Patient Care'', ''Vital Signs Monitoring'', ''Basic Wound Care'', ''Assisted Medication Administration'', ''Electronic Health Record Documentation (Epic)'', ''Infection Control'', ''Patient
