personas:
  professional: Rosemary Moss, a 22‑year‑old aspiring master stylist with advanced haircutting and color theory expertise, channels their quiet, methodical nature into meticulous client consultations, avant‑garde
    hair sculptures for editorial shoots, and a highly organized social‑media portfolio that showcases their solo creative process.
  sports: Rosemary Moss enjoys low‑impact fitness like yoga and weekend hikes in the Sierra Nevada, follows the Bakersfield Condors in the ECHL and the Los Angeles Dodgers for occasional excitement, and
    holds a casual membership at a nearby bouldering gym where they practice gentle climbing on off‑days.
  arts: Rosemary Moss finds artistic solace in watercolor painting while listening to Ólafur Arnalds and Sufjan Stevens, frequently visits the Bakersfield Museum of Art and the Getty Center alone, studies
    the works of fashion illustrator David Downton, and draws poetic inspiration from the memoirs of Frida Kahlo and novels by Haruki Murakami.
  travel: Rosemary Moss prefers solo, contemplative trips to quiet natural retreats, such as a sunrise trek in Yosemite, a tea‑house stay in Kyoto’s Arashiyama district, and a weekend getaway to Sedona’s
    red‑rock landscapes, planning each itinerary meticulously to fit within a modest student‑budget while avoiding crowded tourist hubs.
  culinary: Rosemary Moss, an intermediate home cook, delights in preparing herb‑infused dishes like rosemary‑garlic focaccia, lemon‑basil quinoa bowls, and turmeric‑golden latte, often harvesting fresh
    basil and mint from their indoor garden to enhance minimalist meals that fuel long studio sessions.
  core: Rosemary Moss, a solitary 22‑year‑old artist‑stylist, balances an obsessive love for avant‑garde hair design with a nervous tendency to over‑plan every brushstroke, weekend garden, and budget line,
    while quietly curating an elegant, low‑stress life.
background:
  cultural: Rosemary grew up in a middle‑class, white Anglo‑American family that moved from the Midwest to Bakersfield when she was a child. Her upbringing blended traditional Midwestern values of hard
    work, reliability, and community with the diverse, creative energy of central California. Surrounded by an agricultural and oil‑driven economy, she learned the importance of routine and self‑reliance,
    while frequent trips to nearby Los Angeles museums and local community art events exposed her to a broad range of artistic influences. This mix of modest, family‑centered culture and the DIY artistic
    spirit of small‑city California shapes her appreciation for both orderly practice and unconventional artistic expression.
attributes:
  skills: '[''Advanced haircutting (layering, texturizing, razor cutting)'', ''Hair color theory and custom mixing (highlights, balayage)'', ''Scalp and hair health treatments'', ''Basic makeup application'',
    ''Client consultation and personalized styling'', ''Appointment scheduling and inventory management'', ''Artistic hair sculpting for editorial work'', ''Social‑media portfolio curation'', ''Knowledge
    of cosmetic product ingredients'']'
  hobbies: '[''Watercolor painting'', ''Fashion illustration sketching'', ''Nature photography'', ''Reading art history and memoirs'', ''Visiting museum exhibitions'', ''Yoga and meditation'', ''Listening
    to classical and indie music'', ''Creating experimental hair designs on mannequin heads'', ''Poetry writing and journaling'', ''Indoor herb gardening'']'
  career_goals: Rosemary aims to earn a senior colorist certification and become a master stylist known for her avant‑garde hair designs. She plans to complete her remaining cosmetology coursework to secure
    a full state license and eventually open a boutique salon in Bakersfield that offers a tranquil, private setting for clients who value quiet, personalized service. She hopes to build a niche in runway
    and editorial styling, collaborate with local visual artists, and develop an online brand that attracts high‑end clientele while allowing her to work on a schedule that supports her preference for solitude
    and low‑stress environments.
