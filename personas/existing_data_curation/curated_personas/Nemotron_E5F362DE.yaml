    development'', ''Project management'', ''Systems engineering'', ''Team leadership'', ''Technical documentation'', ''Quality assurance'', ''Regulatory compliance (FAA, NASA)'']'
  hobbies: '[''Salsa dancing'', ''Latin cooking (empanadas, arepas)'', ''Hiking in Texas Hill Country'', ''Astronomy club'', ''STEM outreach volunteering'', ''Reading science fiction'', ''Traveling to Colombia'',
    ''Running (5K races)'', ''Board games with friends'', ''Yoga'']'
  career_goals: Esther aims to become a senior aerospace systems engineer within the next five years, leading multidisciplinary teams on reusable launch vehicle projects. She plans to pursue a master’s
    degree in aerospace engineering and obtain her Professional Engineer (PE) license to broaden her leadership opportunities. Long‑term, she envisions taking on a program manager role overseeing the development
    of a commercial small‑satellite launch service, while mentoring junior engineers and championing diversity initiatives for women and Latinx professionals in the aerospace industry.
