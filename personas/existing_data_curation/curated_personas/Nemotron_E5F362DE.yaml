personas:
  professional: Esther Delaespriella, a 30‑year‑old aerospace engineer, blends meticulous project management with hands‑on propulsion system design, leveraging MATLAB, Python, and ANSYS to deliver reliable
    small‑satellite platforms while energetically rallying multidisciplinary teams toward reusable launch vehicle milestones, and they thrive on translating complex technical challenges into collaborative
    solutions.
  sports: Esther Delaespriella regularly trains for 5K races with the Austin Road Runners, hikes the Texas Hill Country as a member of the Hill Country Explorers Club, practices yoga at the downtown Flow
    Studio, and roots for the Dallas Cowboys, cheering loudly at Sunday games whenever the schedule permits, and they proudly sport a Cowboys hat to show team spirit.
  arts: Esther Delaespriella immerses themselves in the rhythms of salsa, dancing to Celía Cruz and Marc Anthony, enjoys science‑fiction novels from authors like Liu Cixin and N.K. Jemisin, and occasionally
    attends local theater productions starring Viola Davis, all of which feed their creative spark and social energy.
  travel: Esther Delaespriella plans trips with meticulous itineraries, having explored Bogotá and Cartagena to reconnect with family, longing to trek Patagonia’s Torres del Paine and to photograph the
    Atacama Desert’s night sky, while budgeting travel around a limited vacation allowance that forces them to book off‑peak flights and stay in boutique guesthouses.
  culinary: Esther Delaespriella delights in preparing empanadas stuffed with beef and aji, golden arepas topped with cheese and avocado, and frequently experiments with fresh cilantro, plantains, and panela,
    showcasing a solid home‑cook skill set that balances traditional Colombian flavors with a modern, health‑conscious twist.
  core: Esther Delaespriella is a detail‑driven aerospace engineer who channels structured problem‑solving into salsa steps, 5K runs, and weekly homemade empanadas, yet sometimes forgets to schedule dental
    appointments amid their packed calendar.
background:
  cultural: Esther was raised in a Colombian immigrant family in the Houston metropolitan area, where Spanish was spoken at home and Colombian customs were celebrated. She grew up participating in festivals
    such as Carnaval de Barranquilla and the annual Día de la Independencia, and she maintains strong ties to her extended family in Colombia through regular video calls and trips. Her upbringing blended
    Colombian hospitality, a love for coffee and music, with the Southern hospitality of Texas, giving her a bicultural perspective that informs her collaborative work style and community involvement.
