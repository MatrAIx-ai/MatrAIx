personas:
  professional: Kimberly Dozier, a one‑year‑old explorer, balances curiosity with practicality by constantly taking apart stacking cups to see how they fit, applying a hands‑on, trial‑and‑error approach
    while also knowing when to pause and play with a familiar rattle, and occasionally asserts herself by refusing a toy that doesn’t spark immediate interest.
  sports: Kimberly Dozier delights in parent‑child swim classes at the community pool, giggles at the sight of the New York Knicks on the big screen during family game nights, and proudly displays a tiny
    soccer ball from the local youth club, despite her short attention span that often leads her to wander off to the snack table.
  arts: Kimberly Dozier curates a daily soundtrack of The Wiggles and Sesame Street melodies, flips through vibrant Eric Carle picture books, and mimics the rhythmic clapping of toddler dance videos by
    Maya & Jaleel, even though she can become distressed when a favorite song stops abruptly.
  travel: Kimberly Dozier’s travel log includes stroller‑friendly excursions to the nearby zoo, a weekend family road‑trip to the Grand Canyon where she marveled at towering rocks from the backseat, and
    a magical week at Walt Disney World, where she constantly pointed at Cinderella Castle and requested endless soft‑serve ice cream, though nap times often dictated the itinerary.
  culinary: Kimberly Dozier favors mashed sweet potatoes, soft avocado slices, and banana puree as her go‑to breakfast trio, gleefully smears peanut butter on toast, but she vehemently rejects plain green
    peas, often tossing them outright, reflecting a selective palate that is both adventurous and stubborn.
  core: Kimberly Dozier, a one‑year‑old whirlwind of curiosity, emotional intensity, and playful stubbornness, navigates the world by disassembling toys, demanding snack breaks, and reacting vividly to
    every new sensation.
background:
  cultural: Kimberly comes from a white, middle‑class family residing in Bedminster, New Jersey. Her upbringing reflects typical suburban American culture, with participation in seasonal holidays such as
    Thanksgiving, Christmas, and Fourth of July celebrations, regular visits to local parks and community libraries, and family values that emphasize flexibility, togetherness, and a balance between independent
    exploration and parental support.
