  career_goals: Kenneth aims to advance into senior executive leadership, targeting a Vice President of Operations or Director of Innovation role where he can shape company strategy and foster a culture
    that blends technology with creative thinking. He aspires to champion interdisciplinary projects that incorporate artistic perspectives into product development, mentor emerging talent, and launch a
    consultancy focused on sustainable process improvement for small‑to‑mid‑size enterprises in the Shenandoah region. Additionally, he hopes to spearhead community outreach programs that bring STEM and
    the arts together for local schools and nonprofits.
