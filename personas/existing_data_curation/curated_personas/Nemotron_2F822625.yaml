  hobbies: '[''Kayaking on the Guadalupe River'', ''Vegetable Gardening'', ''Tex‑Mex and German Fusion Cooking'', ''Attending Wurstfest and Local Music Events'', ''Watercolor Painting'', ''Historical Fiction
    Book Club'', ''Volunteering at the New Braunfels Historical Society'']'
  career_goals: Ashley aims to channel her organizational strengths and creative flair into a small, home‑based business that sells handcrafted home décor and garden accessories through an online store.
    She plans to complete a short‑term certification in digital marketing to boost her brand’s visibility, and eventually offers part‑time consulting for local festivals and community events, leveraging
    her event‑planning experience. Long‑term, she hopes to achieve financial independence while maintaining the flexibility to pursue personal interests and volunteer work.
