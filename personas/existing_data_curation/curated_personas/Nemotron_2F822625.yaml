personas:
  professional: An aspiring home‑based entrepreneur, Ashley Starnes leverages their budgeting expertise, graphic design and web development skills, and their calm, organized approach to launch a handcrafted
    home décor and garden‑accessory online store, while offering assertive yet collaborative consulting for local festivals and community events.
  sports: An active outdoor enthusiast, Ashley Starnes paddles their kayak on the Guadalupe River with the New Braunfels Kayak Club during summer, practices yoga twice weekly for flexibility, and roots
    for the San Antonio Spurs and Texas Rangers while balancing community event duties.
  arts: An expressive watercolor painter, Ashley Starnes draws inspiration from Mary Whyte’s techniques, attends live shows by Los Lobos and The Hot Club of San Antonio at local festivals, and joins a historical
    fiction book club where discussions of Philippa Gregory novels fuel their creative storytelling.
  travel: A methodical yet spontaneous traveler, Ashley Starnes plans budget‑friendly road trips with a spreadsheet, enjoys kayaking adventures in the Canadian Rockies, explores the Texas Hill Country towns
    like Fredericksburg and Wimberley, and dreams of attending Munich’s Oktoberfest while maintaining their growing online business.
  culinary: An inventive home chef, Ashley Starnes blends Tex‑Mex flavors with German staples, creating dishes such as bratwurst tacos, sauerkraut guacamole, and pretzel‑crusted enchiladas using fresh garden
    cilantro, and while their confidence in the kitchen is high, they sometimes over‑salt their chili.
  core: Ashley Starnes combines calm practicality with eclectic curiosity, running a budding online décor shop, hoarding heirloom garden seeds, obsessively double‑checking spreadsheets, never missing a
    Wurstfest pretzel, yet regularly forgetting to water their succulents during busy weeks.
background:
  cultural: Ashley was raised in a middle‑class, predominantly white household in the Hill Country of Texas, where a blend of Southern hospitality and German heritage shapes daily life. Her family celebrated
    both traditional Texan holidays and the town’s German festivals, instilling an appreciation for cultural diversity while remaining grounded in practical, community‑oriented values. Growing up near San
    Antonio exposed her to a broader mix of cultures, which contributed to her open‑minded yet pragmatic worldview.
attributes:
  skills: '[''Household Budget Management'', ''Event Planning and Coordination'', ''Basic Graphic Design (Canva, Adobe Spark)'', ''Introductory HTML/CSS'', ''DIY Home Improvement'', ''Basic German Conversational
