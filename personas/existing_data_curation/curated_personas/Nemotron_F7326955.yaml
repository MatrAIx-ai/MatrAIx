    workshops'']'
  career_goals: Bonita aims to complete a bachelor's degree in Visual Arts or Interdisciplinary Studies within the next two years, securing an internship at a design studio or museum to gain professional
    experience. She envisions a career that fuses her love for abstract art and community storytelling—ideally as an associate curator of contemporary art or a creative director for an agency that values
    innovative, concept‑driven work. Long‑term, she hopes to launch her own independent art project series that integrates digital media, local history, and participatory installations, and to eventually
    establish a small nonprofit that provides creative outlets for youth in rural Michigan.
