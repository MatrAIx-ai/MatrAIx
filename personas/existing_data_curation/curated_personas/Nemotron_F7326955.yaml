personas:
  professional: Bonita Pumphrey, a budding visual arts student and freelance graphic designer, leverages their disciplined project planning and analytical research skills to create concept‑driven exhibition
    proposals while maintaining an organized Notion workflow that balances their creative impulses with high professional standards.
  sports: Bonita Pumphrey, an avid hiker who joins the local Michigan Trailblazers club for weekly treks and follows the Detroit Lions and Michigan Wolverines for Saturday game rituals, balances cardio
    hikes with occasional yoga classes to sustain flexibility for long painting sessions.
  arts: Bonita Pumphrey, a dedicated painter and digital illustrator, draws inspiration from the surreal landscapes of Caspar David Friedrich, the bold color work of Yayoi Kusama, and the emotive lyrics
    of indie folk duo Big Thief, while curating monthly pop‑up galleries that showcase local youth talent.
  travel: Bonita Pumphrey, a methodical planner, prefers weekend road trips to Michigan’s Upper Peninsula—like hiking the Porcupine Mountains and photographing the shoreline at Pictured Rocks—while dreaming
    of a spring study abroad stint in Kyoto to explore traditional Japanese gardens and contemporary art museums, balancing modest budget constraints with a love for cultural immersion.
  culinary: Bonita Pumphrey, a self‑taught home cook, enjoys crafting seasonal beet and goat cheese salads, perfecting a flaky sourdough loaf, and savoring Michigan cherry pie, often pairing meals with
    a glass of local Riesling while experimenting with charcoal sketch‑inspired plating designs.
  core: Bonita Pumphrey, a 19‑year‑old creative polymath, channels disciplined organization into avant‑garde art projects, but constantly battles a coffee‑induced insomnia that fuels midnight sketch sessions.
background:
  cultural: Bonita grew up in the small, close‑knit community of Free Soil, Michigan, a region characterized by agricultural roots and a strong sense of Midwestern self‑reliance. Her family, of mixed English,
    Irish, and German ancestry, emphasized hard work, educational achievement, and community involvement. Local traditions—such as seasonal festivals, farm‑to‑table gatherings, and the tradition of helping
    neighbors—have shaped her cooperative yet assertive nature. While she values the modest, pragmatic outlook typical of the area, her education and artistic interests have exposed her to a broader cultural
    spectrum, including contemporary art movements, global literature, and digital media. This blend of local heritage and expansive curiosity fuels her desire to create work that honors her community while
    reaching beyond it.
