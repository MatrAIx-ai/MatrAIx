persona_description: A historian specializing in the history of the Sino-Western trade system, Qing policies toward the West and Christianity, and the history of Asian Catholic missions. This person is
  likely to have extensive knowledge and experience in researching the complex and fluid interactions between the Qing dynasty, European powers, and the Catholic Church in the Pearl River Delta during the
  long eighteenth century. They are likely to have a deep understanding of the role of procurators-interlopers, their networks, and the economic and political linchpin of the Catholic missionary enterprise
  in Asia. They are also likely to have a keen interest in the global mechanisms of trade, communication, and religious exchange embodied by these figures and their networks.
