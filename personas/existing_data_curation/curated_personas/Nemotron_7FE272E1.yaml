personas:
  professional: Amar Patel, a budding junior robotics builder, merges his love for LEGO with a practical knack for problem‑solving, channeling his curiosity and organized yet flexible mindset into designing
    small autonomous bots for school science fairs.
  sports: Amar Patel dazzles his friends in neighborhood soccer matches on Saturdays, favoring the local youth team that wears sky‑blue jerseys and often joins the community's weekend trail‑run club with
    his family, balancing energetic play with occasional quiet hikes along the nearby nature trail.
  arts: Amar Patel channels his vivid imagination into drawing original comic strips inspired by his favorite graphic novel 'Amulet', while he hones basic tabla rhythms after school, and his playlists feature
    the energetic scores of 'The Lego Movie' and classic rock tracks by Queen.
  travel: Amar Patel dreams of exploring the sprawling sand dunes of the Sahara after a school field trip to the nearby Grand Canyon sparked his love for outdoor adventure, and his family’s annual road
    trips to the coastal lakes offer a perfect mix of planned stops at wildlife reserves and spontaneous picnics in the woods.
  culinary: Amar Patel loves helping his family prepare festive meals, especially rolling out homemade pizza dough topped with mozzarella, fresh basil, and sun‑dried tomatoes, and he proudly masterfully
    whips up a batch of chocolate‑chip cookies during holiday baking sessions, often tasting the batter before the oven even preheats.
  core: Amar Patel blends a boundless curiosity for building robots with a cooperative spirit, balancing soccer thrills, comic‑making, and tabla rhythms while thoughtfully saving allowance for new kits,
    all while navigating mild allergies with a pragmatic, organized approach.
background:
  cultural: Amar is a second‑generation Indian American of Gujarati descent, growing up in San Ramon, California. At home, his family speaks both English and Gujarati, celebrating South Asian festivals
    such as Diwali, Holi, and Navratri with traditional foods, music, and rituals. The Patel household places a strong emphasis on education, respect for elders, and community service, values that are woven
    into Amar’s daily life. While he participates in mainstream American school activities, he also attends cultural events organized by the local South Asian community, which expose him to classical Indian
    music, dance, and language classes. This blend of California suburban life and rich Gujarati cultural heritage shapes his worldview, fostering both openness to diverse ideas and a deep appreciation
    for his roots.
