  career_goals: He dreams of becoming a scientist or engineer who designs inventions that make life easier for others. Influenced by his desire to help, he also imagines a future as a doctor or teacher,
    roles that allow him to care for and educate his community. He aspires to deepen his knowledge in robotics and coding, hoping to join a youth robotics team and eventually contribute to real‑world solutions.
    While still in elementary school, he sets short‑term goals such as winning a school science fair, mastering more advanced Scratch projects, and volunteering in community service events.
