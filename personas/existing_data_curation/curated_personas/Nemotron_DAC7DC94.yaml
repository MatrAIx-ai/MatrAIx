  career_goals: Although only three, Nathan often talks about becoming a firefighter because he likes the bright red trucks and wants to keep people safe. He also dreams of building things like the big
    construction machines he sees at work sites, reflecting his love for building blocks. These early aspirations show his desire to contribute to his community and work with others.
