persona_description: A maintenance technician who is responsible for the operation and maintenance of industrial machinery, specifically focusing on the safety features and mechanisms of stop signals. This
  individual is skilled in troubleshooting and identifying potential hazards in the machine's operation, and is trained in the use of safety devices such as presence sensors and stop signals to prevent
  accidents. They are also familiar with the ISO 13855 standards for safety devices and the formula for calculating the minimum safety distance and response time of the machine and safety device.
