  hobbies: '["Sketching", "Photography", "Surfing", "Reading sci‑fi novels", "Playing acoustic guitar", "Indie video gaming", "Exploring tide pools", "Beach clean‑up volunteering"]'
  career_goals: Larry aims to obtain his GED within the next two years and then enroll in a community college program focused on graphic design and multimedia storytelling. He dreams of building a career
    as a visual communicator who can blend his love of art with environmental advocacy, creating compelling digital campaigns that raise awareness about coastal conservation. In the longer term, he hopes
    to freelance for independent publishers and NGOs, develop a personal brand of illustrated marine‑themed artwork, and possibly launch an online portal showcasing youth‑led creative projects about the
    ocean. He values flexibility, so he wants a career path that allows him to work from the beach or a home studio while maintaining a disciplined work schedule.
