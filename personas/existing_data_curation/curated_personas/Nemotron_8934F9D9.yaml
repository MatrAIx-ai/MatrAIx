personas:
  professional: Kesia Nelzi, an aspiring junior illustrator who merges meticulous sketching with spontaneous water‑color splashes, channels their calm resilience and detail‑oriented organization into elaborate
    storyboards for imagined worlds while experimenting with simple Scratch Jr animations.
  sports: Kesia Nelzi loves splash‑learning at the community pool, kicks a soccer ball for the local Under‑8 Sharks club, cheers on the San Diego Padres and the San Diego Wave FC, and balances team commitments
    with spontaneous bike rides through Balboa Park, satisfying their curiosity‑driven need for exploration.
  arts: Kesia Nelzi immerses themselves in crayons, watercolors, and LEGO while drawing inspiration from Mo Willems’ whimsical picture books, Claude Monet’s soft palettes, and Hayao Miyazaki’s animated
    storytelling, channeling this blend into imaginative Scratch Jr projects that echo the playful spirit of Pixar’s “Toy Story.”
  travel: Kesia Nelzi delights in weekend explorations to Balboa Park’s botanical gardens and the interactive exhibits at the San Diego Natural History Museum, dreams of a family trip to Disney’s Magic
    Kingdom in Florida, and prefers meticulously planned museum tours paired with spontaneous sandcastle building at La Jolla Shores, reflecting their organized yet curious travel style.
  culinary: Kesia Nelzi enjoys crafting simple snack‑style meals—like buttery cheese pizza slices, bright strawberry smoothies, and crunchy carrot sticks—while dabbling in elementary kitchen tasks such
    as whisking pancake batter and mixing fruit salads, showcasing a budding culinary curiosity fueled by a love for vivid colors and tasty textures.
  core: Kesia Nelzi, an endlessly curious eight‑year‑old who balances meticulous sketchbooks with spontaneous LEGO builds, stays serenely calm even when their crayons run out, and secretly hoards a stash
    of glitter for late‑night art bursts.
background:
  cultural: Kesia is an African‑American girl raised in Lemon Grove, a diverse community in San Diego County. Her family celebrates cultural traditions such as Juneteenth, Kwanzaa, and local community festivals,
    fostering a sense of heritage and pride. Growing up near vibrant cultural institutions, she has access to public art programs and multicultural events that reinforce the values of resilience, community,
    and creativity common in her cultural background.
