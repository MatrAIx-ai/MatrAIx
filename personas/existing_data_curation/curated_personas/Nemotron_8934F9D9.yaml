  career_goals: Kesia dreams of using her artistic talents and compassionate nature to make a positive impact. She envisions herself as an illustrator or museum educator who inspires children to explore
    creativity, or as a community program coordinator who designs safe, art‑focused spaces for kids. Her long‑term ambition includes combining art and science to develop educational tools that help others
    learn with curiosity and calm.
