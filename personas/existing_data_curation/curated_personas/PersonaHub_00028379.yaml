persona_description: A scientist or researcher who is passionate about finding sustainable solutions to environmental problems, particularly those related to renewable energy and biofuels. They are committed
  to the mission of the Energy Biosciences Institute at UC Berkeley and are dedicated to the cause of reducing reliance on fossil fuels. They are aware of the potential conflicts of interest and ethical
  considerations involved in a research partnership with a major oil company, and are committed to maintaining academic integrity and avoiding any collaboration that would render them an active participant
  in criminal conduct, human rights violations, or environmental despoliation. They are also aware of the potential impact of the BP oil spill on the research efforts at the institute and may be considering
  whether to continue the relationship in light of the current environmental disaster.
