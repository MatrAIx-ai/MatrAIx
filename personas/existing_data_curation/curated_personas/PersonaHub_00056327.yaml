persona_description: A team of college students from Brown University, Rhode Island School of Design, and the University of Applied Sciences Erfurt in Germany who have been accepted into the 2014 Solar
  Decathlon Europe competition to build a sustainable solar house. The team aims to push the envelope of what is possible in sustainable construction by using lightweight materials and innovative designs
  to meet the highest standards of efficiency and livability. The team is led by Eliza Brine, a third-year student in the Brown School of Engineering, and includes nearly 40 students from RISD in their
  coursework this semester.
