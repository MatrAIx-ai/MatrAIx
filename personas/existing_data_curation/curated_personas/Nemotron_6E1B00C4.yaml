personas:
  professional: Vishnu Bhavsar, a 40‑year‑old electrician in Memphis working toward a Master Electrician license, leverages fifteen years of code‑compliant wiring expertise and a photographer’s eye for
    light to deliver smart‑home and custom LED installations that double as curated art pieces while mentoring apprentices with a blend of meticulous organization and inventive flexibility.
  sports: Vishnu Bhavsar, an avid hiker on Shelby Farms’ trails, follows the Memphis Grizzlies and Memphis Redbirds, participates in a local YMCA basketball pickup league each summer, and maintains fitness
    through circuit training that mirrors the precision of electrical troubleshooting.
  arts: Vishnu Bhavsar, a dedicated street‑photographer of Memphis murals and vinyl collector, draws creative fuel from B.B. King’s blues, Stevie Ray Vaughan’s guitar solos, and sitar master Ravi Shankar’s
    ragas, while regularly visiting the Brooks Museum of Art to study works by William Eggleston and contemporary installation pieces.
  travel: Vishnu Bhavsar plans trips with the methodical precision of a wiring diagram, favoring weekend road trips to New Orleans and Asheville for impromptu photo shoots, while hoping to embark on a longer
    European tour to capture Venice’s chiaroscuro, balancing a modest travel budget with a desire for cultural immersion and occasional family visits during festivals.
  culinary: Vishnu Bhavsar, a passionate home cook, perfects crisp masala dosa and aromatic sambar using lentils and curry leaves, masters Memphis‑style smoked ribs seasoned with paprika and brown sugar,
    often pairing meals with a locally brewed ale and experimenting with coconut‑infused chutney as a fusion topping.
  core: Vishnu Bhavsar is a curiosity‑driven electrician‑artist who fuses technical rigor with creative lighting, balances disciplined saving with occasional splurges on camera gear, and navigates life
    with quiet precision, a love for solitary hikes, and a habit of over‑spicing every dish.
background:
  cultural: Vishnu is a first‑generation Indian‑American of Gujarati descent; his parents emigrated from Gujarat, India, in the early 1980s. Raised in a Hindu household, he grew up celebrating Diwali, Navratri
    and Ganesh Chaturthi, and learned Gujarati and Hindi alongside English. The family maintains cultural traditions through cuisine, music and community events at the local Hindu temple in Memphis. While
    deeply rooted in his South Asian heritage, Vishnu has embraced the Southern culture of Memphis, appreciating blues, soul food and community festivals. This bicultural identity shapes his worldview,
    blending the communal values of his Indian upbringing with the independent, entrepreneurial spirit of his American environment.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical systems'', ''Blueprint reading'', ''National Electrical Code compliance'', ''Troubleshooting and diagnostics'', ''Conduit bending and
    installation'', ''Smart home automation'', ''Solar panel system installation'', ''Energy efficiency retrofits'', ''Electrical safety and OSHA compliance'', ''Project estimation and budgeting'']'
  hobbies: '[''Photography'', ''Exploring local art galleries'', ''DIY electronics projects'', ''Listening to Indian classical music'', ''Cooking South Indian dishes'', ''Hiking in Shelby Farms Park'',
    ''Meditation'', ''Collecting vintage light fixtures'']'
  career_goals: Vishnu aims to obtain his Master Electrician license in Tennessee within the next two years and eventually launch his own boutique electrical contracting firm that focuses on sustainable,
    art‑inspired lighting solutions for homes and small galleries. He wants to become a recognized specialist in integrating smart‑home systems with custom lighting design, leveraging his curiosity for
    new ideas and unconventional approaches. Mentoring the next generation of electricians, particularly those from immigrant backgrounds, is a priority. In the long term, he envisions expanding his business
    to include solar panel installations and energy‑efficiency consulting, providing financial stability for his family while contributing to the green transition in Memphis.
