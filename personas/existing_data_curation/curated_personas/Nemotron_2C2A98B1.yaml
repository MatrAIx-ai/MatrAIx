  career_goals: Sarah aims to earn a scholarship to study graphic design or media arts at a four-year university, where she can further develop her digital illustration and storytelling skills. She envisions
    a career as a multimedia producer or creative director, creating compelling visual content for brands or nonprofits. In the long term, she hopes to launch a community youth arts program in Booneville
    that offers workshops in drawing, writing, and digital media, providing local teens with creative outlets and mentorship opportunities.
