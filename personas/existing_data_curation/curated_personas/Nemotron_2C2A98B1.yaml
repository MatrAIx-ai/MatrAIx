personas:
  professional: Sarah Warner is an aspiring graphic design student who translates her sci‑fi sketches and meticulous event‑planning experience into freelance digital illustrations, leading her school's
    hip‑hop crew with the confidence of a future multimedia producer.
  sports: Sarah Warner sprints the 400‑meter dash for Booneville High’s varsity track team, idolizes the USA Women’s 4x400 relay squad, and cheers for the Nashville Predators during hockey season, blending
    a disciplined training schedule with a fiercely competitive mindset that spills over into their artistic pursuits.
  arts: Sarah Warner channels their love for speculative fiction into detailed digital illustrations, fuels late‑night flash‑fiction bursts with playlists that mix classic R&B from H.E.R. and indie tracks
    by Tame Impala, and regularly attends the Booneville Arts Festival where they admire muralists who blend street culture and fantasy.
  travel: Sarah Warner enjoys weekend road trips to the Appalachian Trail’s scenic overlooks, dreams of a solo backpacking adventure through Kyoto’s Gion district to explore manga culture, and meticulously
    plans every itinerary using free travel apps while staying within a modest teen budget.
  culinary: Sarah Warner often cooks spicy chicken tacos topped with fresh cilantro and lime, experiments with matcha‑infused oatmeal bowls for breakfast, and occasionally treats themselves to late‑night
    pizza slices, all while keeping their spice rack labeled in rainbow order.
  core: Sarah Warner blends vivid imagination with methodical organization, channeling a competitive spirit into art, track, and community projects, all while juggling teenage quirks like caffeine‑induced
    insomnia and a habit of impulsively buying indie vinyls.
background:
  cultural: Sarah grew up in a close‑knit African‑American family in Booneville, Arkansas, where Southern Black culture blends with the rhythms of the Ozarks. Family gatherings are filled with soulful gospel
    and R&B music, storytelling, and traditional Southern cooking, fostering a deep appreciation for oral history and communal bonds. The local church and community center serve as cultural hubs, offering
    spaces for artistic expression and mentorship. These roots instilled in Sarah a strong sense of resilience, community responsibility, and pride in her heritage, which she often weaves into her creative
    work and future aspirations.
attributes:
