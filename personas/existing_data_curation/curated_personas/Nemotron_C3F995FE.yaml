  career_goals: Although retired from full‑time employment, Kenneth aims to stay intellectually active by volunteering his engineering expertise to local non‑profits and community gardens, helping them
    implement data‑driven sustainability projects. He aspires to author a practical guide on low‑cost home automation for seniors, mentor younger engineers through informal meet‑ups, and complete a personal
    challenge of designing and building a solar‑powered drone to compete in regional maker contests.
