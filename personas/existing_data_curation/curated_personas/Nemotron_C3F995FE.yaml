  skills: '[''systems engineering'', ''data analysis'', ''technical writing'', ''project management'', ''programming (C, Python)'', ''electronics troubleshooting'', ''statistical modeling'', ''budget forecasting'']'
  hobbies: '[''model railroading'', ''vintage electronics restoration'', ''drone building'', ''reading scientific literature'', ''chess puzzles'', ''crossword and sudoku solving'', ''hiking'', ''landscape
