  hobbies: '[''Reading historical fiction and biographies'', ''Crossword puzzles and Sudoku'', ''Gardening (vegetable garden)'', ''Knitting and crocheting'', ''Volunteering at the local library (cataloging)'',
    ''Walking and bird-watching on local trails'', ''Small book club participation'']'
  career_goals: Dianne aims to advance from a data entry specialist to a supervisory or records‑management role within a municipal or nonprofit organization, allowing her to apply her precision and organizational
    talents on a broader scale. She plans to earn a Certified Administrative Professional (CAP) credential to formalize her expertise. Her ambition includes mentoring junior staff, designing streamlined
    data‑workflow protocols, and eventually transitioning to part‑time consulting focused on data accuracy and efficiency for local community groups, while preserving a balanced work‑life schedule to mitigate
    stress.
