personas:
  professional: Andrew Harris, a veteran school bus driver with a flawless safety record, applies their GIS expertise and meticulous maintenance habits to fine-tune routes, trains new drivers, and is positioning
    themselves as a senior safety instructor who will guide the district’s transition to electric buses.
  sports: Andrew Harris enjoys low‑impact fitness by walking the rolling Texas countryside with a camera, participates in the local senior cycling club on Saturday mornings, and stays a faithful fan of
    the Dallas Cowboys, Dallas Mavericks, and Texas Rangers, cheering quietly from home because they prefer solitude over stadium noise.
  arts: Andrew Harris spends afternoons sketching in a weathered notebook, draws inspiration from Winslow Homer’s river scenes and the folk melodies of Bob Dylan, curates a modest community art showcase
    featuring local painter Sarah Whitfield, and leads a quiet after‑school art club where they gently guide elementary students without overwhelming social demands.
  travel: Andrew Harris plans meticulous road trips to capture Texas heritage sites, has already photographed the historic courthouses of Marfa and the blue‑bonnet fields of Hill Country, dreams of strolling
    the Uffizi Gallery in Florence, and prefers solo travel itineraries that let them control every stop because they find large group tours draining.
  culinary: Andrew Harris enjoys cooking simple yet hearty meals like smoked brisket, jalapeño‑stuffed cornbread, and garden‑fresh tomato gazpacho, often seasoning dishes with herbs from their backyard
    rosemary and basil, yet they admit to over‑indulging in sweet pecan pie on holidays, a guilty pleasure that sometimes derails their disciplined diet.
  core: Andrew Harris blends a disciplined, route‑obsessed mind with a solitary love of photography and folk guitar, turning every bus schedule into a quiet canvas while they quietly obsess over perfecting
    the next community art exhibit.
background:
  cultural: Andrew is a white Texan raised in a modest, rural setting near Decatur. His upbringing was shaped by Southern hospitality, a strong sense of community, and traditional family values. He grew
    up attending local church services and community events, which fostered his cooperative spirit. While his cultural roots emphasize practicality and self‑reliance, his personal curiosity has led him
    to explore broader artistic and intellectual pursuits, creating a blend of conventional Texan heritage with an open‑minded appreciation for diverse ideas and experiences.
attributes:
  skills: '[''School Bus Operation'', ''Route Optimization'', ''Vehicle Inspection & Basic Maintenance'', ''Safety Protocols'', ''Student Behavior Management'', ''Record Keeping & Reporting'', ''GIS Mapping'',
