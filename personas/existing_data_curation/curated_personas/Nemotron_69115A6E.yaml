  hobbies: '[''Sketching'', ''Photography of Texas Landscapes'', ''Acoustic Guitar'', ''Reading Art History'', ''Visiting Local Museums and Galleries'', ''Gardening'', ''Model Train Building'', ''Volunteering
    as Art Club Mentor'']'
  career_goals: Andrew aims to leverage his experience into a senior trainer role within the school district’s transportation department, where he can mentor new drivers and develop advanced safety curricula.
    He is pursuing additional certifications, such as a CDL with Passenger Endorsement and a Driver Safety Instructor credential, to meet high professional standards. Long‑term, he hopes to contribute to
    the district’s transition to electric buses by advising on route planning and maintenance practices. Parallel to his career, Andrew aspires to curate a modest community art showcase that highlights
    local artists, combining his love for art with his organizational strengths.
