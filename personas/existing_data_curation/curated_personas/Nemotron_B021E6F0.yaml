personas:
  professional: Luther Cosby, a newborn already displaying a blend of curiosity and practicality, is poised to become a future product designer who channels spontaneous ingenuity into tangible prototypes,
    while they often resist rigid schedules and struggle with organization.
  sports: Luther Cosby, a newborn who lights up at the sound of a bouncing ball and is already a fan of the Chicago Cubs, enjoys being cradled while the family watches weekend baseball games, and will likely
    enroll in the Moonlight Tots Gymnastics Club’s toddler gymnastics class to channel their energetic sociability.
  arts: Luther Cosby, enchanted by the gentle lull of Brahms’ Wiegenlied and the soft colors of a Van Gogh Starry Night print in the nursery, often babbles along to the melodies of Alicia Keys and laughs
    at the comedic timing of Tom Hanks during family movie nights.
  travel: Luther Cosby, whose first journey was a weekend road trip to the Grand Canyon where the family marveled at the red cliffs, now displays a budding curiosity for sensory‑rich locales like the Singapore
    Botanic Gardens, balancing the comforts of familiar routines with a yearning for gentle adventures.
  culinary: Luther Cosby, currently thriving on organic formula and occasional pureed sweet potato with a hint of cinnamon, shows a keen fascination with the bright orange hue of carrots, and during family
    meals they smile at the aroma of freshly baked whole‑grain muffins dotted with blueberries.
  core: Luther Cosby is a newborn whose innate curiosity, spontaneous energy, and heightened emotional sensitivity create a paradox of fierce competitiveness and tender sociability, all while navigating
    the challenges of early infancy.
background:
