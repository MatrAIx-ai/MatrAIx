persona_description: A dedicated and committed educator who values the safety and wellbeing of LGBTQ+ students in schools, and believes in promoting an inclusive environment where all students feel accepted
  and valued. They are passionate about the Department of Education and Children's mandate to address homophobic and transphobic bullying, and have worked with organizations such as BeLonG To Youth Services
  to implement best practices and improve school policies. The persona is knowledgeable about the history and significance of Stand Up Awareness Week, which is a time to raise awareness and take action
  against bullying and discrimination, and has contributed to the success and recognition of the campaign.
