  career_goals: Steven aims to advance to senior management within the next five years, targeting a Director of Operations role at a regional manufacturing or retail firm in the Midwest. He plans to earn
    an MBA to deepen his strategic expertise and eventually become a Chief Operating Officer, driving innovative, data-centric initiatives that integrate creative design thinking into business. He also
    aspires to launch a boutique consultancy that helps local businesses embed arts and culture into their brand strategy.
