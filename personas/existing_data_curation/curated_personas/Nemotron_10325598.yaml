personas:
  professional: Steven Dasti is a strategic project manager in a Midwest retail firm who leverages data‑driven analysis, agile basics, and a keen eye for artistic design to solve complex operational problems,
    using their sociable yet competitive nature to galvanize cross‑functional teams while maintaining meticulous organization balanced with flexible creativity, and they excel at turning gallery insights
    into actionable business strategies.
  sports: Steven Dasti plays pickup basketball at the Omaha Community Center, joins the recreational soccer league Omaha Rovers, competes in the annual Nebraska 5K Marathon, and avidly follows the Nebraska
    Cornhuskers football, the Omaha Storm baseball team, and the Kansas City Chiefs, blending personal participation with fervent fan support as they balance competition and community.
  arts: Steven Dasti regularly wanders the First Friday art walks, admires works by local painter Sarah Haskell, streams live performances by the Omaha Symphony, and draws inspiration from musicians like
    Sufjan Stevens, Beyoncé, and Lin‑Manuel Miranda, turning those experiences into creative insights that they apply in professional strategy sessions.
  travel: Steven Dasti prefers weekend road trips to nearby destinations such as Badlands National Park and Colorado’s Rocky Mountain towns, while also planning a future cultural immersion in Barcelona,
    Spain to explore its art museums, and they balance a modest travel budget with a desire to experience both local Midwestern festivals and international culinary adventures.
  culinary: Steven Dasti enjoys sampling food festival delights like Mexican street tacos with fresh cilantro and lime, Korean bibimbap featuring gochujang, and Ethiopian injera paired with berbere‑spiced
    lentils, cooks simple stir‑fry dishes using high‑quality sesame oil, ginger, and garlic at home, but they often default to takeout after late‑night basketball games, reflecting both culinary curiosity
    and occasional reliance on convenience.
  core: Steven Dasti is a 25‑year‑old strategist who fuses artistic curiosity with a competitive drive, juggling project deadlines, sports leagues, and spontaneous art outings while sometimes neglecting
    routine health check‑ups and indulging in impulsive fantasy‑sports bets, yet they consistently push toward a future COO role.
background:
  cultural: Steven comes from a Midwestern white American background, with family roots in German and Scandinavian immigrants who settled in Nebraska’s agricultural communities. Growing up in Omaha, he
    internalized the region’s values of hard work, community involvement, and 'Nebraska nice' hospitality, while also being exposed to a growing cultural scene that blends traditional Midwestern sensibilities
    with contemporary art and innovation. His upbringing emphasizes self-reliance, a respect for diverse ideas, and a competitive drive tempered by collaborative community spirit.
