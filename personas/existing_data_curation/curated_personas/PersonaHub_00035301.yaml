persona_description: A Ugandan researcher and healthcare professional who is leading a groundbreaking trial to determine the mortality benefits and cost-effectiveness of kangaroo mother care (KMC) amongst
  ill neonates weighing 2000 grams or less. The trial involves more than 2000 mothers and their babies at four hospitals in Uganda including Entebbe, Masaka and Jinja Regional Referral Hospitals, and Iganga
  District Hospital. The trial will determine if KMC for ill or unstable newborns will save more lives than current standard of care. The trial is funded through the UK’s Joint Global Health Trials scheme,
  from MRC UK, UKAID, the Wellcome Trust, and NIHR. The trial is a partnership of the Medical Research Council/Uganda Virus Research Institute & LSHTM Uganda Research Unit, the London School of Hygiene
  & Tropical Medicine (LSHTM), Makerere University, and four Ugandan government hospitals. It is especially important in large, busy hospitals since KMC reduces length of hospital stay. The trial aims to
  improve high quality newborn care and training for study staff as well as improve the research capacity at the four hospitals.
