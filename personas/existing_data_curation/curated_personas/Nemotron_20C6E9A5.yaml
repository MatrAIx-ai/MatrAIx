  hobbies: '[''Basketball (pick‑up games)'', ''Drumming in Afro‑beat/funk circle'', ''Hiking (Umstead State Park)'', ''Spontaneous road trips'', ''Community festival attendance'', ''Volunteer tutoring and
    mentorship'', ''Cooking Southern and West African dishes'', ''Reading educational psychology'', ''Listening to community development podcasts'', ''Tabletop role‑playing games'']'
  career_goals: In the next five years, Elijah aims to complete a bachelor’s degree in Education and pursue a master’s in Higher Education Administration, positioning himself for promotion to senior lecturer
    or department chair. He hopes to develop a community‑engaged learning program that connects local businesses with students for internships and applied projects. He also aspires to expand his mentorship
    network, establishing a peer‑support system for first‑generation college students, and to author a guide on culturally responsive teaching in community colleges. Long‑term, he envisions influencing
    state‑wide policies that improve equity in postsecondary education and perhaps launching a nonprofit that offers free tutoring and career workshops for underserved youth in Raleigh.
