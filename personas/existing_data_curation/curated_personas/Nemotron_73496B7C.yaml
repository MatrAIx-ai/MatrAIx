    low‑impact plumbing solutions'', ''Basic electrical troubleshooting for pumps'', ''Tool maintenance and customization'']'
  hobbies: '[''Watercolor painting'', ''Sketching Appalachian landscapes'', ''Visiting art museums and craft fairs'', ''Listening to bluegrass and classic rock'', ''Playing acoustic guitar'', ''Hiking the
    Blue Ridge Parkway'', ''Fishing in local rivers'', ''Camping'', ''Restoring vintage hand‑tools'', ''Tinkering with antique radios'', ''Woodworking – building small furniture'', ''Volunteering with Habitat
    for Humanity'', ''Teaching basic plumbing safety workshops'']'
  career_goals: Looking ahead, David plans to gradually scale back full‑time field work while formalizing a part‑time consulting practice that helps homeowners and small contractors adopt water‑saving and
    energy‑efficient plumbing solutions. He hopes to become a certified green‑plumbing specialist and to lead a local apprenticeship program at the community college, passing on both technical skills and
    his philosophy of flexible, creative problem‑solving. Over the next few years he wants to document his 40‑year career in a series of instructional videos and a modest memoir that highlights the evolution
    of Appalachian trade work. He also aims to volunteer his expertise for historic‑preservation projects in McDowell County, ensuring that older structures retain authentic plumbing while meeting modern
    safety standards.
