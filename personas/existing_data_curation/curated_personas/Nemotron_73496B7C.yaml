personas:
  professional: David Slice, a veteran plumber with four decades of residential and light‑industrial expertise, they blend meticulous blueprint reading, modern PEX/PVC retrofitting, and creative low‑impact
    design with a relaxed, improvisational work style that lets them adapt on the fly while mentoring apprentices and negotiating scope changes with a friendly, assertive charm.
  sports: David Slice enjoys leisurely weekend hikes along the Blue Ridge Parkway and fishing on the Holston River, they cheerfully follow the regional NFL team the Carolina Panthers and the MLB club the
    Atlanta Braves, and they play pick‑up basketball at the local senior center, embodying a relaxed but consistent fitness routine that mixes low‑impact cardio with occasional team sports.
  arts: David Slice spends afternoons sketching Appalachian horizons while they absorb bluegrass legends like Bill Monroe and classic rock icons such as Neil Young, they frequent the Asheville Art Museum
    for exhibitions featuring folk artist George Nakashima and contemporary sculptor Maya Lin, and they occasionally join neighborhood jam sessions, letting music and visual art inform their creative approach
    to plumbing design.
  travel: David Slice prefers flexible road trips that blend artistic pilgrimages and nature, having driven the Blue Ridge Parkway multiple times, explored the historic town of Asheville, taken a weekend
    getaway to the Biltmore Estate, and they dream of a future trip to the Scottish Highlands to study traditional stone masonry and to the Pacific Northwest for its rain‑forest trails, all planned in a
    spontaneous, loosely budgeted manner.
  culinary: David Slice favors hearty Southern comfort foods, they regularly cook shrimp and grits with locally sourced stone‑ground cornmeal and fresh river trout, they enjoy seasoning with hickory‑smoked
    paprika and a dash of apple cider vinegar, and they occasionally treat themselves to a fine dining experience at the farm‑to‑table restaurant The Market Place, showcasing a moderate cooking skill set
    paired with a fondness for both home‑cooked meals and occasional gourmet indulgence.
  core: David Slice merges a lifetime of hands‑on plumbing craftsmanship with an artist’s eye, they balance a love of improvisation, occasional disorganization, and a quiet insistence on sustainable, low‑impact
    solutions that keep both their work and their life gently flowing.
background:
  cultural: David comes from a multigenerational, working‑class family in Nebo, a small town nestled in the heart of McDowell County’s Appalachian foothills. The community’s heritage is rooted in coal‑mining,
    railroading, and skilled trades, with a strong emphasis on self‑reliance, neighborly support, and Southern hospitality. Local culture includes church gatherings (predominantly Baptist), Appalachian
    folk music, storytelling, and seasonal festivals that celebrate the region’s natural beauty and crafts. Growing up, he was immersed in this environment, learning the value of hard work and practical
    problem‑solving from his father, a mechanic, while also developing an appetite for broader ideas through high‑school library books and occasional trips to nearby Asheville. His upbringing blends traditional
    Appalachian customs with an open curiosity for art, new technologies, and diverse experiences, shaping a pragmatic yet imaginative worldview.
