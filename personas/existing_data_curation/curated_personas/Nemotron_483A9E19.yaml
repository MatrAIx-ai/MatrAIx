personas:
  professional: Justin Smith, a 16-year-old high school junior aiming to earn a GED and enroll in a community-college automotive technology program, blends their methodical garage experience, community
    event-planning expertise, and natural stage presence into a budding career as a reliable auto-service specialist and local radio car-care host.
  sports: Justin Smith is an assistant coach for a local youth football league, a devoted fan of the Amite County High School Panthers and the New Orleans Saints, participates in weekend flag-football scrimmages,
    and maintains fitness through daily weight-training at the community YMCA; they also enjoy seasonal hunting trips that double as cardio workouts.
  arts: Justin Smith plays acoustic guitar at family gatherings and church events, drawing inspiration from John Mayer, James Taylor, and Bob Dylan, while they create short DIY tutorials on YouTube reminiscent
    of Chris Fix, and occasionally volunteer to sing in the church youth choir.
  travel: Justin Smith prefers well-planned road trips with their dad, having mapped out weekend drives along the Natchez Trace to explore Jackson, Mississippi, a summer fishing lodge in the Ozark Mountains,
    and a future music pilgrimage to Nashville, balancing a modest budget with a love for spontaneous photo-ops at rest stops.
  culinary: Justin Smith enjoys grilling classic BBQ ribs with a secret dry rub of brown sugar, paprika, and cayenne, pairing them with homemade cornbread and coleslaw, occasionally whipping up shrimp scampi
    pasta for friends, and confidently handles the grill at neighborhood barbecues, though they sometimes overcook the bratwursts.
  core: Justin Smith is a routine-loving, talkative teen who fuses hands-on automotive tinkering, guitar playing, and community event leadership into a sociable, methodical outlook; they are punctuated
    by a penchant for impromptu video tutorials and a habit of over-committing to weekend projects.
background:
  cultural: Justin was raised in Amite, a small town in Tangipahoa Parish, Louisiana. The community is predominantly white and deeply rooted in Southern, Protestant (mainly Baptist) traditions. Family life
    often revolves around homemade Southern cooking, church potlucks, and Friday night high‑school football rituals. While the area is mostly influenced by classic Southern hospitality, subtle Cajun and
    Creole elements appear in local festivals and occasional zydeco music. Growing up, Justin experienced a strong sense of self‑reliance and a commitment to preserving local customs, such as maintaining
    family gardens, participating in church youth groups, and attending the annual Tangipahoa Parish Fair. These cultural experiences have shaped his values of practicality, community service, and respect
    for tradition.
attributes:
  skills: '[''Event planning and coordination'', ''Basic automotive maintenance'', ''Public speaking and MC duties'', ''Social media content creation'', ''Acoustic guitar playing'', ''Basic computer literacy'']'
  hobbies: '[''Playing acoustic guitar'', ''Assisting in family garage'', ''Coaching youth football'', ''Organizing community barbecues'', ''Hunting and fishing trips'', ''Following high school football'',
    ''Creating social media instructional videos'', ''Reading DIY guides'']'
  career_goals: Justin aims to earn his GED within the next year and then enroll in a vocational automotive technology program at a nearby community college. He plans to obtain certifications as an Auto
    Service Technician and ultimately open a family‑run auto‑repair shop in Amite, providing dependable service to the community while creating apprenticeship opportunities for local teens. Parallel to
    this, he hopes to maintain a regular segment on the local radio station where he shares practical car‑care advice and highlights community events, allowing him to stay connected with his audience. His
    long‑term ambition is to build a stable, community‑focused career that blends his practical skills, organized work style, and natural sociability.
