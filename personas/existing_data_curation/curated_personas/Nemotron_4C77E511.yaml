  career_goals: Mark aims to transition into a senior leadership role within his organization, such as Director of Operations or Head of Business Strategy, where he can shape enterprise-wide initiatives.
    He plans to earn a Six Sigma Black Belt and a Project Management Professional (PMP) certification to bolster his credibility in process excellence. Over the next five years he hopes to lead a team of
    analysts, mentor emerging talent, and spearhead a major digital transformation project. Long-term, he envisions launching a boutique consultancy that helps midsize Midwestern firms optimize operations
    while maintaining a flexible work-life balance.
