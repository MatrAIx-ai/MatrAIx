personas:
  professional: Charles Gittens, a retired art historian and literary critic with deep expertise in modern American art, channels curiosity and meticulous organization into curating community exhibitions,
    conducting oral history interviews, and mentoring emerging artists through workshops that balance structured grant writing with spontaneous creative dialogue.
  sports: Charles Gittens enjoys gentle morning walks along the local levees, participates in a senior walking club that meets at the Bethel Island community center, follows the San Francisco Giants on
    television, and practices light tai chi twice weekly to maintain flexibility without overexertion.
  arts: Charles Gittens, an avid sketcher and photographer, frequents the Oakland Museum of California and de Young Museum, listens to John Coltrane and B.B. King while journaling poetry inspired by contemporary
    novels, and delights in discovering modern American painters such as Jackson Pollock and Mark Rothko, weaving these artistic encounters into their community programming.
  travel: Charles Gittens prefers slow, reflective travel, often taking ferry rides to Sausalito, weekend road trips to Napa Valley’s vineyards, and has cherished a nostalgic visit to New Orleans to soak
    in jazz heritage, while dreaming of a serene pilgrimage to the Scottish Highlands on a guided tour tailored for senior travelers.
  culinary: Charles Gittens cultivates a small herb bed of rosemary, thyme, and mint, which flavors their favorite lemon‑herb grilled salmon and a comforting herb‑infused chicken soup, enjoys a morning
    ritual of strong coffee with an extra spoon of honey, and occasionally indulges in a shrimp po'boy from the local waterfront bistro for a culinary treat.
  core: Charles Gittens, a 77‑year‑old retired curator with a restless curiosity, transforms anxiety into meticulous sketching, poetry, and community mentorship while never missing a sunrise over the marshes
    or a jazzy blues record.
background:
  cultural: Charles grew up during the civil-rights era and carries the legacy of the African American oral storytelling tradition. His family migrated from the South to California in the 1950s, bringing
    with them a rich mix of Southern gospel music, culinary customs, and a deep respect for community solidarity. Throughout his life he has been involved in Black arts initiatives, attending poetry slams
    and cultural festivals that celebrate African diaspora creativity. Living now on Bethel Island, he blends his African American heritage with the coastal, environmentally conscious culture of the Bay
    Area, honoring both his roots and his adopted home.
