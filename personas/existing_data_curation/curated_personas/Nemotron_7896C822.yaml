  hobbies: '[''Sketching'', ''Digital Illustration'', ''Acoustic Guitar'', ''Live Music Attending'', ''Improv Theater'', ''Hiking'', ''Pick-up Basketball'', ''Video Production'', ''Indie Game Playing'',
    ''Cooking Experiments'', ''Road Trip Travel'']'
  career_goals: Jay aims to finish his bachelor's degree in Marketing and Visual Communications within the next three years, merging his passion for art with strategic brand storytelling. He envisions a
    career as a creative strategist or brand manager at an innovative agency where he can shape campaigns that blend visual impact with data‑driven insights. In the longer term, he hopes to launch his own
    boutique creative firm focused on helping Midwestern small businesses and community arts initiatives develop authentic, high‑quality visual identities. Jay is also eager to stay at the intersection
    of technology and design, exploring immersive media projects such as interactive installations or AR‑enhanced marketing experiences.
