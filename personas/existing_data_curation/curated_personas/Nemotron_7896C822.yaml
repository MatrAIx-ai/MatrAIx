personas:
  professional: Jay Pullins, a marketing and visual communications major, blends strong graphic design and video editing skills with a disciplined yet flexible project‑management style, channeling their
    curiosity and competitive edge into crafting data‑driven brand narratives for campus clubs and local small businesses.
  sports: Jay Pullins fuels their energy through weekly pick‑up basketball games at the Lansing Youth Center, hikes the trails of the Pinckney Recreation Area in the summer, and avidly follows the Michigan
    State Spartans basketball, Detroit Tigers baseball, and Detroit Lions football, while also belonging to the Ingham County Hiking Club and a campus intramural soccer team.
  arts: Jay Pullins finds creative release sketching surrealistic pieces inspired by Salvador Dalí, strums acoustic renditions of Bon Iver and Iron & Wine, performs improv scenes with the campus Comedy
    Collective, and curates YouTube reviews of indie games like Celeste and Hades, while drawing visual influence from contemporary artists like Alex Ross and the animation style of Studio Ghibli.
  travel: Jay Pullins prefers spontaneous weekend road trips, having explored Chicago's art districts, the historic charm of Mackinac Island, and the vibrant street‑food scene of Austin, while dreaming
    of a future backpacking adventure through Portugal's coastal towns, always balancing limited student funds with a desire for cultural immersion.
  culinary: Jay Pullins, an enthusiastic home‑cook, experiments with homemade ramen broth using miso and kombu, perfects a spicy Korean kimchi fried rice with gochujang, and crafts artisanal pizza topped
    with fresh basil and smoked mozzarella, often pairing their meals with a playlist of folk indie music.
  core: Jay Pullins is a curiosity‑driven, digitally savvy art enthusiast who balances meticulous project planning with impulsive midnight gaming marathons, often forgetting to sleep after a burst of creative
    inspiration.
background:
  cultural: Jay grew up in Mason, a small city in the heart of Michigan’s Midwestern landscape. His family’s roots trace back to German and Irish immigrants, and his upbringing reflects the region’s blend
    of modesty, community spirit, and pragmatic work ethic. He was raised in a predominantly white, middle‑class neighborhood where local traditions—high school sports, volunteer festivals, and church gatherings—shaped
    his social outlook. The area’s accessible art scene, including community murals, a modest museum, and the annual Mason Art Walk, nurtured his appreciation for visual expression. Midwestern values of
    reliability, friendliness, and self‑reliance inform his balanced approach to organization and flexibility, while his exposure to both rural and suburban environments fuels his curiosity about varied
    experiences.
