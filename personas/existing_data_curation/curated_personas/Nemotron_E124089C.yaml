personas:
  professional: Antoinette Cozart, a budding preschool project manager, uses their love of order to meticulously line up alphabet blocks and schedule snack times, demonstrating early discipline and a high
    standard for flawless tower construction.
  sports: Antoinette Cozart, a member of the Tiny Tigers toddler soccer squad at the local park, eagerly follows the structured drill routine each week, cheers for the Chicago Cubs on game nights, and prefers
    disciplined practice sessions over free‑form backyard play, as they thrive on predictable schedules.
  arts: Antoinette Cozart delights in coloring intricate patterns from Dr. Seuss books, humming the playful tunes of Raffi while meticulously organizing crayons by hue, a habit that reflects their critical
    eye and competitive urge to create the most perfect picture on the page, as they strive for flawless artistic achievement.
  travel: Antoinette Cozart prefers family trips with tight itineraries, such as a structured week‑long visit to the San Diego Zoo and a weekend stay at a child‑friendly resort in Orlando, where they enjoy
    pre‑planned dinosaur exhibitions while resisting spontaneous playground detours.
  culinary: Antoinette Cozart loves the neatness of macaroni‑and‑cheese served in a divided plate, bites crisp apple slices with perfect bite‑size precision, and proudly stirs pancake batter with a wooden
    spoon, yet they stubbornly refuse vegetables unless they are cut into star shapes.
  core: Antoinette Cozart is a pint‑sized perfectionist who organizes block towers, savings jars, and snack times with meticulous precision, thrives on routine, and silently competes with every toddler
    who dares to disturb their orderly world, as they constantly measure their own performance.
background:
  cultural: Antoinette was born and raised in Canyon Country, a suburban community in Los Angeles County, California, within a white, middle‑class family. Her upbringing reflects mainstream American suburban
    culture, with regular participation in neighborhood park activities, library storytime sessions, and community preschool programs. The local emphasis on organized education and family routines reinforces
    her preference for structure, while the broader multicultural environment of the Los Angeles area subtly exposes her to diverse customs, though her family largely celebrates traditional Anglo‑American
    holidays and values.
attributes:
  skills: '[''Following daily routines'', ''Color and shape sorting'', ''Block building'', ''Fine‑motor coordination with crayons and puzzles'', ''Tidying up toys and organizing play area'']'
  hobbies: '[''Block tower construction'', ''Jigsaw puzzles'', ''Coloring within lines'', ''Singing structured nursery rhymes'', ''Pretend cooking with toy kitchen'']'
  career_goals: Even at three, Antoinette imagines a future where she can lead and keep things orderly. She often tells adults she wants to become a teacher or a librarian because she enjoys organizing
    books, guiding friends, and setting clear rules. As she grows, she aims to excel in any role that lets her establish structure, meet high standards, and achieve personal success.
