persona_description: A scientist who is studying the activity and behavior of comet 67P/Churyumov–Gerasimenko, specifically focusing on its atmosphere, coma, and tail. They are interested in the increase
  in solar radiation heating up the nucleus and causing its frozen ices to escape, resulting in the comet's growing coma and tail. They are also interested in the comet's activity, including the jets and
  outbursts, and the rate at which it is shedding dust. They are likely to be a member of the European Space Agency or an astronomer working on a comet mission.
