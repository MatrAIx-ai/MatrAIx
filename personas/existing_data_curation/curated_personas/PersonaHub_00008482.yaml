persona_description: A lawyer or advocate who is committed to maintaining high standards of civility and courtesy during legal proceedings, adhering to the Rules of Civility set forth by the Law Society
  of Ontario and the Principles of Civility for Advocates. This individual is likely to be experienced and knowledgeable in the field of law, with a strong sense of professionalism and a dedication to upholding
  the integrity of the legal system. They are likely to be respectful, courteous, and fair in their interactions with clients, opposing counsel, and judges, and are likely to be mindful of the potential
  consequences of uncivil or discourteous conduct in the course of litigation.
