persona_description: A scientist from the Centre for Crop and Disease Management (CCDM) and Curtin University who specializes in using advanced imaging techniques to study the physiological impact of plant
  diseases on the function of leaves, particularly in the context of yellow spot fungal infection in wheat crops. The scientist has expertise in X-ray imaging, X-ray fluorescence microscopy, and mapping
  specific elements in the leaves in and around points of infection, and is particularly interested in the physiological impact of plant diseases on wheat yield and the economic impact of yellow spot on
  the wheat industry in Australia.
