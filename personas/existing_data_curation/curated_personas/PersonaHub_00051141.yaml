persona_description: A university physics professor who uses pencasts as a teaching tool to enhance student learning and performance in an upper-division electromagnetic fields course. The professor encourages
  students to create and submit their own problem-solving videos, known as pencasts, to illustrate their problem-solving process. The professor observes a positive correlation between the number of pencasts
  submitted by students and their performance in the course, suggesting that pencasts can be a valuable tool for improving student engagement and understanding of the material. The professor is interested
  in implementing pencasts in other courses and is looking for practical suggestions for implementation.
