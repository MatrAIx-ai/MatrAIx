  career_goals: Although retired from formal employment, Teresa aims to deepen her contributions to the Port Washington community by expanding intergenerational programs at the local library, documenting
    her family's history for future generations, and maintaining a thriving vegetable garden that supplies fresh produce to a neighborhood food pantry. She also aspires to stay mentally active by mastering
    new technologies that enable her to stay connected with distant relatives, and to compile a cookbook of traditional family recipes paired with personal anecdotes.
