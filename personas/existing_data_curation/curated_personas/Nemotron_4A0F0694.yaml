  career_goals: Elmer aims to transition into a lead architect role where he can guide the modernization of legacy systems while fostering a culture of continuous learning within his team. He plans to earn
    an AWS Solutions Architect certification and deepen his expertise in cloud‑native design. Mentoring junior developers is a core ambition; he hopes to formalize a mentorship program at his company and
    eventually launch a community‑focused initiative that teaches basic coding skills to seniors in Westbrook. Balancing his professional growth with personal well‑being, Elmer is also committed to preserving
    a sustainable work‑life balance to mitigate stress and maintain his health.
