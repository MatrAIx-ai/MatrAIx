  professional: Emory Whittington is a full‑stack software engineer proficient in Python, JavaScript (Node.js and React), and C++, who leverages an analytical mindset and cooperative nature to deliver scalable,
    user‑centric applications while mentoring junior developers and championing best‑practice coding standards.
  sports: Emory Whittington enjoys weekend hikes in Clinton State Park, follows the Kansas City Chiefs (NFL) and Kansas City Royals (MLB), plays in a local Lawrence running club, and attends Sporting Kansas
    City soccer matches while staying active with occasional intramural basketball games.
  arts: Emory Whittington frequents Lawrence coffee houses for live jazz sessions featuring local saxophonist Sam Rivers Jr., curates a personal playlist of Miles Davis, John Coltrane, and indie folk singer‑songwriter
    Sufjan Stevens, and unwinds by playing Settlers of Catan while discussing sci‑fi novels by Neal Stephenson with friends.
  travel: Emory Whittington plans trips with a blend of structured itineraries and spontaneous detours, having road‑tripped through the Rocky Mountains, explored the historic streets of Kyoto, and dreaming
    of a hiking expedition across Iceland's volcanic landscapes.
  culinary: Emory Whittington experiments in the kitchen, mastering mushroom risotto with fresh shiitake and Parmesan, perfecting Kansas‑style barbecue ribs with smoked paprika, and occasionally whipping
    up homemade ramen broth infused with kombu and miso.
  core: Emory Whittington is a tech‑savvy nomad who balances code‑centric curiosity with a love for hiking, jazz, and board‑games, often juggling meticulous budgeting with a guilty pleasure for new gadgets.
background:
  cultural: Emory grew up in the Midwestern heartland near Lawrence, Kansas, within a family whose heritage traces back to German and Irish immigrants. The region’s values of self‑reliance, modesty, and
