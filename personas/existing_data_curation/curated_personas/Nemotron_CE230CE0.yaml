  career_goals: Although retired from formal employment, Carmen aims to leave a lasting legacy by mentoring emerging Dominican entrepreneurs in the Bronx, establishing a modest scholarship fund for Dominican
    high‑school graduates, and completing a memoir that chronicles her immigrant journey and business lessons. She also aspires to expand her volunteer work at local senior centers, advocating for better
    resources for older adults while continuing her personal growth through mindfulness practices.
