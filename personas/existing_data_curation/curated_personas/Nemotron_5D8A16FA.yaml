  hobbies: '[''Chess'', ''Jogging'', ''Cooking (Southern cuisine with a modern twist)'', ''Reading (Nonfiction, Personal Development, African‑American History)'', ''Mentoring Youth (After‑school program)'',
    ''Listening to Jazz and R&B'']'
  career_goals: Jovontae aims to advance into a supervisory or team‑lead position within the next two to three years, leveraging his organizational strengths and reliability. He plans to enroll part‑time
    in an Associate’s program in Business Administration, eventually pursuing a Bachelor’s degree, to broaden his understanding of operations and management. Long‑term, he hopes to become a Training and
    Development Specialist, designing onboarding curricula for new hires, and eventually transition into a mid‑level operations manager role where he can shape customer‑experience strategy. He also aspires
    to mentor younger colleagues and contribute to community outreach programs focused on employment readiness.
