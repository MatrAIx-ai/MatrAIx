  career_goals: Sarah aspires to pursue a career in veterinary medicine, combining her love for animals with her practical, science‑focused mindset. She intends to attend a Texas university with a strong
    pre‑veterinary program, earn scholarships through STEM competitions, and gain hands‑on experience by continuing her volunteer work at animal shelters. Long‑term, she hopes to work in a small‑animal
    clinic where she can apply her organizational skills to clinic management and community outreach, possibly leading educational programs on pet health for local schools.
