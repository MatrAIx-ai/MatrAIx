personas:
  professional: Sarah Dowling, a 14-year-old high-school sophomore, channels her practical, structured mindset and outgoing energy into a leadership role as captain of the school's soccer team and as the
    coordinator of the digital art club, where they consistently meet deadlines, organize group projects, and mentor peers.
  sports: Sarah Dowling, an avid participant on her high school soccer and cheerleading squads, fuels her fitness routine with daily after-school runs, weekend rides at the Fort Worth Stockyards Rodeo,
    and a devotion to cheering for the Dallas Cowboys, Dallas Mavericks, and Texas Longhorns, which they regard as a structured workout balanced with spontaneous hip-hop dance sessions.
  arts: Sarah Dowling, who spends free time sketching digital illustrations inspired by Loish and the whimsical style of Tim Burton, grooves to pop icons like Taylor Swift and country classics such as Kacey
    Musgraves while mastering hip-hop choreography to Megan Thee Stallion, and unwinds with contemporary YA novels by Sarah J. Maas and John Green, which they share on their socials.
  travel: Sarah Dowling prefers short, well-planned weekend trips with friends, such as a road trip to Austin's live-music scene, a family vacation to the Grand Canyon, and an annual visit to Disney World,
    balancing a detailed itinerary of must-see attractions with spontaneous photo-ops for her social-media followers, which they document with photos for their Instagram.
  culinary: Sarah Dowling, a budding home-chef, loves whipping up quick Tex-Mex staples like chicken-tortilla quesadillas seasoned with cilantro, lime, and jalapeño, relishes weekend barbecue brisket and
    cornbread at the rodeo, and treats herself to sugary delights like strawberry-filled cupcakes from the local bakery, though they often forget to clean the kitchen afterward.
  core: Sarah Dowling, a 14-year-old soccer-player-cheerleader who meticulously plans her schoolwork yet sometimes forgets homework, balances structure with spontaneous hip-hop dance battles, and keeps
    a secret stash of glittery stickers for art projects, and occasionally loses track of time while doodling in class, which they consider their most endearing flaw.
background:
  cultural: Sarah was raised in a middle‑class suburban family in Fort Worth, Texas, where traditional Southern hospitality blends with modern Texan culture. Family gatherings often feature backyard barbecues,
    church attendance, and celebrations of regional events such as the Fort Worth Stock Show and Rodeo. The city’s mix of Western heritage, vibrant arts districts, and multicultural festivals provides her
    with exposure to country music, rodeo traditions, as well as contemporary art and technology. These influences have fostered her appreciation for community, hard work, and a balance between outdoor
    activities and urban creative pursuits.
