  career_goals: Looking ahead, Annmarie aims to step into a senior leadership role such as Director of Operations or Head of Business Transformation within the next five years. She plans to earn a Lean
    Six Sigma Black Belt and a PMP certification to solidify her credibility in large-scale process redesign. Her ambition includes spearheading a company-wide digital transformation that integrates AI-driven
    analytics into everyday decision-making, while establishing a mentorship program for emerging women professionals in operations. She also envisions launching a boutique consultancy that helps midsize
    firms in the Southwest streamline their supply chain and improve resilience, allowing her to blend entrepreneurial drive with her operational expertise. Balancing career advancement with personal well-being,
    she intends to embed regular stress-management practices into her leadership style to foster a healthier workplace culture.
