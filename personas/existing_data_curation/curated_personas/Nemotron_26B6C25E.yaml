personas:
  professional: Annmarie Taylor is a senior operations strategist who blends Lean Six Sigma rigor, Agile project leadership, and a knack for translating complex data into actionable Power BI dashboards,
    while leveraging her high emotional reactivity to anticipate team morale and drive continuous improvement across finance, supply chain, and IT.
  sports: Annmarie Taylor fuels their competitive spirit on the racquetball court at the Henderson Community Center and on weekend hikes through Red Rock Canyon with the Henderson Outdoors Club, while cheering
    on the Las Vegas Raiders and the Vegas Golden Knights from their living room, and they occasionally join a local pickleball league to stay agile.
  arts: Annmarie Taylor channels their quick‑thinking energy into improv comedy workshops at the Second City Las Vegas, finds inspiration in the storytelling of John Mulaney, and unwinds with live jazz
    performances by Esperanza Spalding at the Smith Center, all while devouring business strategy books by Michael Porter and psychology classics by Daniel Kahneman.
  travel: Annmarie Taylor prefers meticulously planned weekend getaways to the wine regions of Sonoma and Napa, a yearly pilgrimage to Sedona’s red rock vistas, and occasional spontaneous trips to the coast
    of Maine, balancing their craving for new experiences with the practical constraints of consulting deadlines and family commitments.
  culinary: Annmarie Taylor experiments in the kitchen with Mediterranean‑inspired dishes like rosemary‑infused grilled salmon, slow‑cooked lamb tagine, and a signature quinoa‑and‑black‑bean salad, favoring
    fresh herbs, locally sourced avocados, and pairing meals with a crisp pinot noir from a Nevada boutique winery.
  core: Annmarie Taylor is a high‑energy, competition‑driven operations leader who transforms anxiety into hyper‑awareness, blends data‑driven rigor with community‑centric hobbies, and occasionally lets
    rabbit‑hole research into wine and improv distract them from spreadsheets.
background:
  cultural: Annmarie's cultural background is that of a white, middle-class American raised in the Intermountain West. Growing up in Nevada's suburban environment, she was immersed in a culture that values
    self-reliance, hard work, and community involvement. The region's outdoor recreation ethos, combined with the diversity of Clark County, shaped her appreciation for both individual achievement and collaborative
    effort. Family traditions emphasized education and practical problem-solving, which informed her pragmatic outlook. While she identifies with mainstream American cultural norms—such as entrepreneurial
    spirit and a belief in upward mobility—she also embraces the inclusive, multicultural atmosphere of the Las Vegas metropolitan area, participating in local festivals and civic groups. This blend of
    regional Western sensibility and broader American values underpins her personal and professional identity.
