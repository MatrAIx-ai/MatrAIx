  hobbies: '[''Cooking traditional Honduran cuisine'', ''Balcony gardening'', ''Morning beach walks'', ''Listening to salsa and merengue music'', ''Volunteering at immigrant assistance center'', ''Reading
    romance novels'', ''Watching classic films'']'
  career_goals: Approaching retirement, Alexus aims to leave a lasting legacy by establishing a formal mentorship program for junior sales associates, ensuring a smooth succession of floor supervisors.
    She hopes to secure a senior supervisory or assistant manager role in the next year, focus on fine‑tuning operational efficiency, and eventually transition to a part‑time consultant role that lets her
    share her expertise while enjoying a reduced workload. Financially, she seeks a stable retirement income and plans to invest in a small community‑focused boutique that reflects her Honduran heritage.
