  hobbies: '["Book Club Leadership","Low‑Country Cooking Classes","Coastal Gardening","River Walking and Hiking","Yoga","Community Festival Volunteering","Birdwatching","Quilting","Historical Travel"]'
  career_goals: Natalie aims to advance to a regional director role overseeing community services across Beaufort County, where she can champion intergenerational and coastal resilience initiatives. She
    seeks to obtain the Certified Community Service Manager (CCSM) credential to formalize her expertise, and as a mentor, she plans to develop a structured apprenticeship program for emerging social service
    leaders. Long‑term, she hopes to influence public policy on affordable senior services and foster collaborative networks that integrate local cultural heritage into modern service delivery.
