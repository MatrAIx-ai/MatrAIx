  career_goals: Linh aspires to ascend into supervisory roles within the Seattle Police Department while shaping policy that prioritizes cultural competence and community wellness. Her short‑term goal is
    to earn the rank of Sergeant within the next two years, complete the department’s Leadership Academy, and obtain certifications in advanced mental‑health crisis response and community liaison work.
    Long‑term, she envisions becoming a Lieutenant or Captain, overseeing a specialized unit that integrates art‑based outreach programs, youth mentorship, and trauma‑informed policing. She also hopes to
    champion a department‑wide initiative to provide officers with stress‑management resources, drawing on her personal experience with anxiety and her interest in mindfulness. Ultimately, Linh wants to
    be a bridge between law enforcement and Seattle’s diverse neighborhoods, ensuring that policing is both effective and culturally respectful.
