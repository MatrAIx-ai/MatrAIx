personas:
  professional: Linh Vang is a seasoned Seattle police detective who blends advanced investigative techniques with community‑focused policing, leveraging meticulous report writing, crisis‑intervention training,
    multilingual communication skills, and a passion for art‑based outreach to build trust across diverse neighborhoods while pursuing a fast‑track path to supervisory leadership.
  sports: Linh Vang is an avid hiker of the Cascades, plays weekly recreational soccer, follows the Seattle Seahawks, Seattle Sounders FC, and Seattle Kraken, and practices yoga three times a week to maintain
    flexibility and relieve stress.
  arts: Linh Vang is a watercolor city‑scape painter inspired by Andrew Wyeth and Yayoi Kusama, frequently visits the Seattle Art Museum to study contemporary installations, captures misty forest scenes
    in the style of Ansel Adams, and attends live shows by local indie band Fleet Foxes and singer‑songwriter Corin Tucker.
  travel: Linh Vang prefers meticulously planned weekend escapes to Oregon’s coastal cliffs and spontaneous month‑long trips to Kyoto, Japan, balancing rugged Pacific Northwest hikes with a curiosity for
    historic art districts abroad, while managing a modest travel budget that limits long‑haul flights to a few per year.
  culinary: Linh Vang enjoys cooking phở broth from scratch, mastering bánh xèo crepes, experimenting with fresh herbs like cilantro and Thai basil, occasionally burns caramelized onions when juggling shift
    schedules, and delights in dining at Seattle’s seafood markets for grilled salmon with lemon butter.
  core: Linh Vang is a detail‑driven police officer who channels anxiety into watercolor art, yoga, and community mentorship, yet sometimes over‑splurges on art supplies and sacrifices sleep before early
    shifts.
background:
  cultural: Born to Vietnamese immigrants who settled in the Seattle metropolitan area, Linh grew up in a bilingual household where Vietnamese traditions intertwined with American culture. Her upbringing
    emphasized respect for elders, collectivist values, and a strong sense of family duty, which continues to shape her worldview and approach to community policing. Linh celebrates Tet (Lunar New Year)
    with her extended family and participates in local Vietnamese cultural festivals, such as Seattle Viet Fest, where she volunteers at community booths. By maintaining fluency in both Vietnamese and English,
    she serves as a cultural bridge, helping the police department communicate effectively with the city’s sizable Vietnamese community and other Southeast Asian residents. Her heritage also informs her
    appreciation for the region’s culinary and artistic traditions, and she often shares these cultural experiences with colleagues and neighbors.
