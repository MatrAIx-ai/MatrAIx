persona_description: A materials scientist at Massachusetts Institute of Technology (MIT) who is working on using viruses to produce eco-friendly batteries and other electronic devices. Her research is
  focused on exploiting viruses' ability to rapidly reproduce and combine with semiconductor and electronic materials to create functional electronic devices. She is aiming to produce inexpensive and environmentally-friendly
  transistors, batteries, solar cells, diagnostic materials for cancer detection, and semiconductors for use in modern electrical devices, all while reducing waste and minimizing environmental impact.
