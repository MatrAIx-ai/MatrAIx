persona_description: A professional urban planner who is responsible for developing and implementing the Land Use Plan for the city of Buffalo. This person is skilled in creating a framework for decision-making
  about physical development, setting capital improvement priorities, and guiding subsequent neighborhood planning efforts. The individual is knowledgeable about the city's comprehensive plan and the Zoning
  Code, and has experience in identifying existing conditions, trends, issues, and opportunities related to future development. The persona is also skilled in envisioning a future for Buffalo built around
  the restoration of walkable, mixed-use, transit-served neighborhoods and economic centers, and has experience in recommending the appropriate type, intensity, and character of development.
