    as Vietnamese Language Tutor'']'
  career_goals: Lieu aims to advance to a floor supervisor role within the next two to three years, where he can lead a small team, streamline operational procedures, and mentor newer employees. He is interested
    in obtaining a certification in casino management to position himself for future roles in compliance or operations management. Long‑term, he seeks financial stability for his family and envisions opening
    a modest family‑owned Vietnamese restaurant upon retirement, combining his cultural heritage with his entrepreneurial aspirations.
