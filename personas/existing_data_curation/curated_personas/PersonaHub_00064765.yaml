persona_description: A person who is interested in the study of biodiversity and conservation biology, particularly in understanding the current crisis, the importance of biodiversity, and the use of conservation
  preserves and legislative frameworks for biodiversity protection. They are looking for a course that provides detailed information on the current biodiversity crisis, the importance of biodiversity to
  human life, and the use of conservation preserves and legislative frameworks for biodiversity protection. They are interested in learning about the five mass extinctions of prehistory, the most recent
  extinctions recorded in written history, and how they are the basis for one method of estimating contemporary extinction rates. They are also interested in learning about the core threats to biodiversity,
  such as human population growth and unsustainable resource use, and how habitat loss occurs through deforestation, damming of rivers, and other human activities. They are interested in the methods of
  biodiversity conservation, such as the optimal design of preserves and the limitations imposed by political and economic forces. They are also interested in how legislation within individual countries
  protects species and how agreements on global warming have had limited success.
