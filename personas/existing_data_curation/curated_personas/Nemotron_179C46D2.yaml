personas:
  professional: Benjamin Gutta is a receptionist at a Raleigh firm, excelling in telephone etiquette, data entry, and scheduling while using their curiosity for art to recommend local galleries, a blend
    of meticulous organization and flexible problem‑solving that positions them for a future office‑manager role and a museum information specialist career.
  sports: Benjamin Gutta is a member of the Umstead Trails Hiking Club, hikes the park’s loop trails weekly, enjoys occasional pick‑up basketball games with the Carolina Hurricanes fan group, and follows
    the NC State Wolfpack basketball team, preferring low‑impact, nature‑focused fitness over gym workouts.
  arts: Benjamin Gutta frequents the North Carolina Museum of Art, sketches works by Ai Weiwei and Olafur Eliasson, photographs quiet street scenes reminiscent of Henri Cartier‑Bresson, curates a vinyl
    collection featuring Bon Iver and Bob Dylan, and writes reflective blog posts that blend philosophy with contemporary art critique.
  travel: Benjamin Gutta plans low‑budget, solo trips that blend cultural immersion and nature, having explored Asheville’s River Arts District, Washington DC’s Smithsonian museums, and a week‑long study
    of Renaissance art in Florence, while preferring flexible itineraries over packaged tours.
  culinary: Benjamin Gutta enjoys cooking simple meals such as caprese salad with fresh basil, spaghetti aglio e olio with garlic and chili flakes, and overnight oats topped with blueberries and almond
    butter, favoring fresh, seasonal ingredients and occasionally pairing dishes with a glass of local North Carolina cider.
  core: Benjamin Gutta is a solitary, art‑obsessed 23‑year‑old whose meticulous organization coexists with a love for quiet hikes, indie vinyl, and late‑night crossword puzzles, occasionally sacrificing
    sleep for creative pursuits.
background:
  cultural: Benjamin was raised in a middle‑class white family in Raleigh, North Carolina, where Southern hospitality and community service were core values. Growing up amid the city’s vibrant cultural
    scene—local folk festivals, museum events, and university art programs—shaped his appreciation for diverse artistic expressions. While he embodies traditional Southern politeness and a respect for harmony,
    his curiosity drives an open‑minded outlook that embraces varied ideas and unconventional thinking.
