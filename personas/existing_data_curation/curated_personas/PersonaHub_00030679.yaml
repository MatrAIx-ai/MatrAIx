persona_description: A Mayo Clinic researcher in the Department of Molecular Medicine who specializes in the development of cancer vaccines and immunotherapy. This researcher has successfully used the genetic
  combination of human DNA from melanoma cells and a cousin of the rabies virus to train mouse immune systems to eradicate skin cancer from within. This research has the potential to identify a whole new
  set of genes that encode antigens that are important in stimulating the immune system to reject cancer, and has the potential to treat both the primary tumor and also protect against recurrence.
