personas:
  professional: A budding student coordinator at the local library’s story‑time sessions, Michelle Rodriguez blends her outgoing and compassionate nature with reliable organization to help younger children
    discover books, while also shining as a lead dancer in her school’s drama club performances.
  sports: An enthusiastic member of the Riverside Youth Soccer Club, Michelle Rodriguez dashes across the midfield with her teammates, follows the training schedule with disciplined drills, and carries
    a fierce loyalty to the city’s professional soccer team, the Riverhawks, cheering them on during the regional league finals.
  arts: A creative spark in the drama club, Michelle Rodriguez loves performing scenes from classic plays, sketches comic‑style illustrations of superhero adventures, and draws inspiration from artists
    like Stan Lee, Lin‑Manuel Miranda, and the vibrant choreography of Shakira’s music videos.
  travel: A budding explorer, Michelle Rodriguez has already visited the island’s coastal beaches and the historic plazas of Old San Juan, and she dreams of trekking through the rainforest of Costa Rica
    and seeing the Northern Lights in Iceland during school breaks.
  culinary: A junior kitchen assistant, Michelle Rodriguez proudly cooks arroz con pollo, empanaditas, and sweet plantain fritters alongside her grandmother, mastering the balance of spices like cumin,
    oregano, and achiote, while also experimenting with colorful fruit salads featuring mango and papaya.
  core: Michelle Rodriguez is a sociable, compassionate 11‑year‑old who juggles drama, soccer, salsa dancing, and comic‑drawing with a knack for turning every activity into a lively group celebration.
background:
  cultural: Michelle is a first‑generation American of Puerto Rican descent. She grows up in a bilingual household where Spanish is spoken alongside English, and her family preserves many island traditions—celebrating
    the holiday season with Noche Buena, sharing comida like mofongo, and listening to reggaetón, salsa, and jíbaro folk music. Her parents instill the value of community service, often involving her in
    local festivals and church events where she helps organize parrandas and charitable drives. Living in Newmanstown, PA, she navigates a small‑town environment while staying connected to the broader Puerto
    Rican diaspora through cultural clubs at school and community centers. This blend of island heritage and Mid‑Atlantic upbringing shapes her identity, fostering pride in her roots and an openness to
    diverse perspectives.
