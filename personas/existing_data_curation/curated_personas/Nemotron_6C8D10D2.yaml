  career_goals: Michelle dreams of a future where she can combine her love for helping others with her bilingual abilities. She aspires to become a pediatric nurse or a community health worker who can support
    children and families in both English and Spanish. She also imagines teaching elementary school, especially in a bilingual setting, and hopes to lead health‑education programs in her community. Fascinated
    by environmental science, she would love to volunteer for local clean‑up projects and eventually study environmental health. Her ambition is to be a compassionate bridge between cultures, ensuring that
    her community’s diverse voices are heard and cared for.
