persona_description: A military historian who specializes in the study of World War II, particularly the Pacific War. He is interested in the details of the battles and campaigns, the losses suffered by
  the US and Japanese forces, and the impact on the civilian population. He is particularly interested in the role of civilians in the war and the efforts to distinguish them from soldiers. He is also interested
  in the use of photographs and images in military history, and the ways in which they can be used to illustrate the events of the war.
