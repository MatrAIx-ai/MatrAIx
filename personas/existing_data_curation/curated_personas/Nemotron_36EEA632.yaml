  career_goals: Rose Ann aims to become a regional director of sales for New England within the next three years, overseeing multiple market segments and driving revenue growth. Her long‑term ambition is
    to ascend to a VP of Sales role where she can shape company‑wide strategy, champion diversity and mentorship programs for women in STEM, and infuse innovative, art‑inspired approaches into product positioning.
    Simultaneously, she envisions launching a consultancy that helps mid‑size firms optimize sales processes while promoting work‑life balance, ultimately achieving financial security for an early, comfortable
    retirement.
