persona_description: A war artist who specializes in depicting historical events and figures during the First World War, particularly focusing on the Canadian corvette HMCS Galt and its role in escorting
  merchant ships during the war. He is skilled in capturing the emotional and dramatic moments of the vessels and the crew members performing their duties, as well as the bustling and chaotic atmosphere
  of the open bridge of the corvette. His paintings often reflect his deep understanding of naval warfare and the importance of protecting merchant ships from enemy forces.
