  hobbies: '["Visiting art museums and galleries", "Watercolor painting and sketching", "Reading science and art history books", "Hiking and nature photography", "Weekly yoga practice", "Cooking seasonal
    meals", "Attending live music events", "Volunteering at community health fairs", "Participating in interdisciplinary book clubs", "Journaling and reflective writing"]'
  career_goals: She aims to transform her solo practice into a multidisciplinary wellness hub that integrates massage therapy with movement classes, art‑therapy sessions, and wellness education. Over the
    next five years she plans to earn a certified clinical specialist designation in Sports and Orthopedic Massage, and to complete a continuing education track in integrative health that includes art‑based
    interventions. She also hopes to mentor junior therapists, lead community workshops on posture and injury prevention, and publish a handbook titled 'Mind‑Body Synergy in Manual Therapy.' On the long‑term,
    she envisions owning a boutique studio in Anne Arundel County that serves families, athletes, and seniors, while offering flexible scheduling and a calming, aesthetically enriching environment.
