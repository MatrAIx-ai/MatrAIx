personas:
  professional: Johnathan Parks, a 63‑year‑old senior telecommunications technician, draws on four decades of hands‑on expertise in RF signal testing, antenna alignment, fiber‑optic splicing, and digital
    switching—paired with a calm, imaginative problem‑solving style—to mentor apprentices, craft clear technical documentation, and pursue BICSI and NATE senior certifications aimed at consulting and launching
    a community‑based apprenticeship program.
  sports: Johnathan Parks keeps fit with daily walks along the Elizabeth River, weekly tai chi sessions at the Chesapeake Senior Fitness Club, and occasional pick‑up badminton games, while cheering the
    Washington Commanders (NFL), Washington Capitals (NHL), and the local Norfolk Tides (MiLB), even volunteering as a technical helper for the Tides’ stadium sound system during the baseball season.
  arts: Johnathan Parks expresses artistic flair through watercolor sketches of the Chesapeake Bay horizon, immerses themselves in the modal jazz of Miles Davis and the soulful vocals of Aretha Franklin,
    and delves into speculative fiction by Ursula Le Guin and Neal Stephenson, while also curating vintage radio exhibitions at the local museum that blend technical history with aesthetic storytelling.
  travel: Johnathan Parks prefers spontaneous, weekend‑style trips that blend work‑related radio conventions—such as the annual Dayton Hamvention—and leisure visits to historic coastal towns like Savannah,
    Georgia, and Charleston, South Carolina, while dreaming of a cultural pilgrimage to the Prague Radio Tower and the UNESCO‑listed Old Town of Tallinn, all managed within a senior‑friendly budget and
    modest travel allowance.
  culinary: Johnathan Parks delights in steaming Chesapeake‑style blue crabs with Old Bay seasoning, simmering a creamy clam chowder with fresh herbs, grilling salmon brushed with lemon‑dill butter, and
    occasionally indulging in a rich chocolate mousse topped with a hint of espresso, though they admit to over‑indulging after a successful night of DXing.
  core: Johnathan Parks, a 63‑year‑old ham‑radio veteran and watercolor enthusiast, unites meticulous engineering with spontaneous creativity, mentors the next generation while chasing distant frequencies
    each night, and despite a penchant for late‑night jazz sessions that shave sleep, remains a steady, compassionate presence in both the technical and artistic realms.
background:
  cultural: Johnathan was raised in Portsmouth’s historic African‑American neighborhood, where church, family, and community ties shaped his values of cooperation and service. Growing up in the Tidewater
    region, he absorbed the traditions of Southern cuisine, gospel music, and storytelling, which continue to influence his social gatherings and artistic expression. His heritage as a Black veteran of
    the post‑civil‑rights workforce informs his commitment to mentoring the next generation of Black technicians and preserving the legacy of skilled trades within his community. He remains actively involved
    in his local Baptist congregation and participates in cultural events that celebrate African‑American history in Virginia.
