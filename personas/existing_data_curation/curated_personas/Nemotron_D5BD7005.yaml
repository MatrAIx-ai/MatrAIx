  hobbies: '[''Watercolor painting'', ''Vintage radio model building'', ''Amateur ham radio operation'', ''Listening to jazz and soul music'', ''Reading speculative fiction'', ''Riverfront sketching'',
    ''Volunteer electronics workshops'']'
  career_goals: Looking ahead, Johnathan aims to transition from field work to a mentorship and consulting role. He hopes to obtain BICSI and NATE senior certifications so he can advise small telecom firms
    on best practices and sustainable installation methods. He is also interested in establishing a community‑based apprenticeship program that introduces high‑school students, especially those from underrepresented
    backgrounds, to telecommunications careers. Over the next five years, he plans to author a handbook that blends technical instruction with creative problem‑solving techniques, positioning himself as
    a thought leader who bridges practical engineering with imaginative design.
