  career_goals: Robert aims to advance from his LPN role to become a registered nurse (RN) within the next two years by completing an associate’s degree in nursing at a local community college, followed
    by obtaining a RN license. He plans to specialize in geriatric and community health, leveraging the aging population of Lake County and his love for community outreach. In the longer term, he hopes
    to earn certification as a Certified Wound‑Care Nurse or a Nurse Educator, eventually leading a patient‑education program in his local health clinic. He also envisions mentoring new LPNs, organizing
    health‑fair events, and possibly launching an online portal that curates practical health‑tips for rural residents.
