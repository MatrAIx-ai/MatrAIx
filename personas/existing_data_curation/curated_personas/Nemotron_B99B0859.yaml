personas:
  professional: Steve Burroughs, a CPA-qualified senior audit manager, leverages advanced Excel, VBA, and Python to design data‑driven audit methodologies while channeling his curiosity and calm composure
    into championing AI‑enhanced analytics for his firm’s digital transformation.
  sports: Steve Burroughs trains with the Southwest Florida Runners Club for weekly long‑distance runs, kayaks the mangroves of the Ten Thousand Islands on weekends, supports the Miami Dolphins and Tampa
    Bay Rays, and adheres to a flexible yet structured fitness plan that balances solitude with occasional team‑spirit games.
  arts: Steve Burroughs paints oil landscapes of the Gulf Coast inspired by the atmospheric tones of William Turner, curates his photography collection around urban textures à la Stephen Shore, attends
    modern art exhibitions featuring works by Yayoi Kusama and Kara Walker, and volunteers on the finance committee of a community theater staging ‘A Midsummer Night’s Dream’.
  travel: Steve Burroughs prefers meticulously planned trips, having explored the culinary streets of Barcelona, the historic temples of Kyoto, and the vibrant music scene of New Orleans, while dreaming
    of a future sailing adventure through the Greek islands where he can blend photography and quiet reflection.
  culinary: Steve Burroughs enjoys experimenting with international cuisines, mastering Thai green curry, Vietnamese pho, and Spanish paella, often using fresh citrus like key lime and grapefruits, while
    his cooking skill hovers between confident home chef and occasional over‑sauce mishap, especially when paired with craft IPA beers.
  core: Steve Burroughs is a data‑driven auditor with an artist’s soul, a calm resilience that fuels marathon runs and mangrove kayaks, a disciplined investor who splurges on paint tubes, and a habit of
    over‑planning both spreadsheets and travel itineraries.
background:
  cultural: Steve hails from a white, Anglo-American family rooted in the Midwest, where his parents emphasized diligent education and community service. Relocating to Southwest Florida in his early twenties,
    he has embraced the region's laid-back coastal lifestyle and the diverse cultural tapestry of Collier County. His upbringing blends traditional Midwestern values of reliability and modesty with the
    eclectic, arts-focused vibe of Bonita Springs, reflected in his support for local galleries, volunteerism, and a relaxed yet purposeful approach to work-life balance.
attributes:
  skills: '[ ''Financial Auditing'', ''GAAP Reporting'', ''Tax Compliance'', ''Data Analytics'', ''Python Programming'', ''VBA Automation'', ''Risk Assessment'', ''Process Optimization'', ''Internal Controls
    Design'', ''Audit Software (CaseWare, IDEA)'' ]'
  hobbies: '[ ''Oil Painting'', ''Photography'', ''Kayaking'', ''Art Gallery Exploration'', ''Contemporary Music Festival Attendance'', ''Experimental Cooking'', ''Long-Distance Running'', ''Reading (Science,
    Philosophy, Psychology)'', ''Volunteer Finance Work for Community Theater'' ]'
  career_goals: Steve aims to transition from senior audit manager to partner at his regional CPA firm within the next five years, championing a digital-first audit practice that integrates AI-enhanced
    analytics. He also aspires to serve on the board of a nonprofit arts organization, using his financial expertise to support cultural initiatives in Southwest Florida. In the longer term, he envisions
    a Chief Financial Officer role in a technology-driven company where he can blend his accounting rigor with strategic innovation.
