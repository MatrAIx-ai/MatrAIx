persona_description: A political scientist who specializes in the study of communist history, particularly the leadership and policies of Gustáv Husák and his successors. His research interests include
  the political and economic systems of Czechoslovakia under communism, the impact of foreign influence and intervention on the country's political landscape, and the role of the Communist Party in shaping
  the country's policies and decisions. He is also interested in the political and social dynamics of the Velvet Revolution and its aftermath.
