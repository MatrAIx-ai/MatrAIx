personas:
  professional: Louis Penna, a board‑certified internist specializing in geriatrics, merges rigorous differential‑diagnosis expertise with an imaginative, art‑infused counseling approach, and they channel
    their organized, methodical temperament and emotional reactivity into tailored care for older adults battling anxiety and chronic disease.
  sports: Louis Penna tackles fitness through weekend hikes on the Piedmont trails, occasional low‑impact cardio classes with the Greensboro Trail Runners, and weekly gardening sessions that double as activity,
    while cheering on the Carolina Panthers in the fall and the UNC Tar Heels during basketball season, and they consider each climb a moving meditation.
  arts: Louis Penna immerses themselves in abstract painting inspired by Mark Rothko's color fields, eases into piano reveries ranging from Debussy's Clair de Lune to Brian Eno’s ambient soundscapes, leads
    a medical‑humanities book club that explores speculative fiction by N.K. Jemisin, and they regularly volunteer as a docent at the Guilford College Art Museum, where their artistic pursuits shape both
    their personal identity and patient counseling.
  travel: Louis Penna prefers thoughtfully planned, leisurely trips that blend cultural immersion with restorative downtime, having visited the historic streets of Florence and the Tuscan countryside, as
    well as Asheville’s Blue Ridge vistas and New Orleans’ jazz districts, and they now hope to explore the lavender fields of Provence while balancing a modest travel budget and occasional caregiving responsibilities.
  culinary: Louis Penna enjoys cooking at an advanced level, often preparing rosemary‑infused grilled lamb, lavender honey drizzled over ricotta crostini, and handmade gnocchi with sage butter, while they
    also cherish the simple comfort of Southern fried catfish with collard greens, and they savor the sensory ritual of aromatherapy while plating their dishes.
  core: Louis Penna is a restless mind who channels anxiety into vibrant art, meticulously plans every facet of life, yet they habitually over‑spend on paint pigments and often forget to lock the garden
    gate.
background:
  cultural: Louis Aaron Penna was raised in a working‑class Italian‑American family in the Piedmont region of North Carolina. His grandparents emigrated from Southern Italy, bringing culinary traditions
    and Catholic celebrations that blended with the Southern hospitality and Episcopal community of Greensboro. Growing up in public schools emphasized service, self‑reliance, and scholastic curiosity,
    shaping his conscientious work ethic. Though never married, he maintains close ties with an extended family network and participates in local cultural festivals that honor both his Italian heritage
    and the broader Southern traditions of Guilford County.
attributes:
  skills: '[''Internal Medicine'', ''Geriatric Care'', ''Differential Diagnosis'', ''Medical Research'', ''Patient Counseling'', ''Medical Education'', ''Medical Illustration'', ''Health Data Visualization'']'
  hobbies: '[''Abstract painting'', ''Piano playing'', ''Reading speculative fiction'', ''Gardening'', ''Volunteer art docent'', ''Book club leadership'', ''Mindfulness meditation'', ''Hiking'']'
  career_goals: At 62, Dr. Penna plans to shift toward a hybrid role that blends limited clinical practice with mentorship, curriculum development, and community mental‑health advocacy. He aims to launch
    a pilot program that incorporates art therapy into primary care for older adults experiencing anxiety and depression, author a memoir that weaves together his medical experiences with reflections on
    art and imagination, and secure a visiting professorship to influence interdisciplinary medical curricula. Additionally, he hopes to shape state health policy to expand integrated mental‑health services
    for underserved populations.
