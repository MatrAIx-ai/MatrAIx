persona_description: A conservation biologist who specializes in the study of freshwater fish species in the United States, particularly focusing on the Sturgeon and Paddlefish populations in the Mississippi
  River and its tributaries. They are interested in the slow recovery rates of these species due to overfishing and habitat degradation, and the potential health risks posed by high levels of mercury and
  PCBs in their eggs or caviar. They are dedicated to effective management practices to protect these species from overfishing and ensure their sustainability.
