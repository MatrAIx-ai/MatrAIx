    "volunteering at food bank", "hosting neighborhood potlucks"]'
  career_goals: Although officially retired, Eugene aims to stay professionally engaged by mentoring younger apprentices in the trades through a local vocational program. He hopes to volunteer as a technical
    advisor for the neighborhood association’s annual home‑improvement fair, providing hands‑on workshops. Eugene also dreams of launching a small consulting side‑business offering occasional handyman services
    to seniors in his community, allowing him to combine his practical skills with his desire to help others while maintaining a predictable schedule that reduces stress. Long‑term, he wants to document
    his practical knowledge in a simple guidebook for DIY home repairs, preserving his expertise for future generations.
