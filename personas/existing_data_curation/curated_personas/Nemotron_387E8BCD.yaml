personas:
  professional: Amon Abramowitz, a budding LEGO architect and novice Scratch coder, channels their love for structure and competition into meticulously planned builds and game projects, treating each creation
    as a personal challenge where precision, clear milestones, and strategic thinking reign.
  sports: Amon Abramowitz plays midfield for the Seattle Eastside Youth Soccer Club, idolizes Seattle Sounders FC’s playstyle, enjoys cheering on the Seahawks, and combines the competitive spirit of the
    field with regular hikes to Rattlesnake Ledge, where they practice tactical navigation reminiscent of their strategy games.
  arts: Amon Abramowitz immerses themselves in creative expression by constructing intricate LEGO sets, programming Scratch animations inspired by Koji Kondo’s video‑game scores, devouring adventure novels
    by Rick Riordan, and curating a prized collection of Pokémon trading cards featuring Charizard and Mewtwo.
  travel: Amon Abramowitz explores new horizons through meticulously planned weekend trips—having hiked the trails of Olympic National Park, visited San Diego’s zoo, and dreaming of a future Legoland Japan
    adventure—always using a checklist to balance budget constraints with a thirst for discovery.
  culinary: Amon Abramowitz prefers familiar comfort foods like pepperoni pizza, chicken nuggets, and mac and cheese, while occasionally experimenting with homemade sushi rolls and building edible LEGO
    sculptures from crackers and cheese cubes, showcasing a modest cooking skill set anchored in playful creativity.
  core: Amon Abramowitz blends a competitive, structure‑loving mind with a child’s curiosity, spending weekends mastering LEGO constructions, chess tactics, soccer drills, and meticulous allowance tracking.
background:
  cultural: Amon comes from a white family with Jewish heritage, reflected in celebrations of holidays such as Hanukkah and Passover alongside mainstream American traditions like Thanksgiving and the Fourth
    of July. Growing up in Seattle, he is influenced by the Pacific Northwest's emphasis on environmental stewardship, outdoor recreation, and a tech‑savvy community. His parents encourage education, curiosity,
    and a balanced blend of cultural traditions, shaping his worldview and daily life.
attributes:
  skills: '[''Organized note‑taking and homework planning'', ''Basic Scratch programming'', ''LEGO construction with moving mechanisms'', ''Strategic chess play'', ''Soccer teamwork and coordination'',
