  hobbies: '[''LEGO construction'', ''Scratch programming projects'', ''Chess'', ''Strategy video games (Minecraft, Civilization)'', ''Soccer'', ''Hiking in Seattle parks'', ''Reading adventure and science‑fiction
    books'', ''Collecting trading cards'']'
  career_goals: Amon dreams of joining his school's robotics club and competing in regional challenges. He aims to deepen his coding abilities and eventually study computer science or mechanical engineering.
    In the long term, he hopes to become a robotics engineer or astronaut, channeling his love for building, structure, and concrete problem solving into a career that creates tangible technology solutions.
