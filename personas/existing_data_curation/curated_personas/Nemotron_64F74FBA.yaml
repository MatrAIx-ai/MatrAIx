personas:
  professional: Kisoo Kang, an aspiring junior visual storyteller, channels curiosity into drawing cartoons and watercolor, leveraging a natural flair for whimsical art while they often juggle school projects
    in a delightfully disorganized, flexible way that merges play with budding tech skills like Minecraft world‑building.
  sports: Kisoo Kang enjoys weekend soccer practice with the Dallas Youth Soccer Club U8 team, cheers on the Dallas Cowboys and the Dallas Mavericks, and they approach fitness with a competitive edge, preferring
    fast‑paced games of tag and playground obstacle courses over organized drills.
  arts: Kisoo Kang, a budding illustrator and comic enthusiast, spends weekends sketching characters inspired by the whimsical worlds of Hayao Miyazaki, the bold colors of Lisa Frank, and the dynamic panels
    of Marvel's Spider‑Man, while they eagerly devour graphic novels like "Naruto" and visit the Dallas Museum of Art to study the brushwork of Frida Kahlo and contemporary street art.
  travel: Kisoo Kang dreams of exploring beyond Dallas, having already taken field trips to the Perot Museum and a family weekend in Austin, but they now hope to hop on a summer flight to Tokyo's Ghibli
    Museum and to wander the historic streets of Kyoto’s Arashiyama bamboo grove, balancing excitement with the need for parental approval and budget constraints.
  culinary: Kisoo Kang delights in bright, playful foods, favoring rainbow sushi rolls, creamy mac and cheese, strawberry shortcake, and the tangy crunch of fermented cabbage, while they show modest kitchen
    skills by whisking together simple cheese quesadillas and decorating cupcakes with rainbow sprinkles.
  core: Kisoo Kang navigates the world with a vivid imagination, a competitive spark, and an emotional rollercoaster that fuels both artistic bursts and occasional bouts of anxiety, and they often turn
    to sketching as a coping tool.
background:
  cultural: Kisoo is a second‑generation Korean‑American raised in Dallas, Texas. Her family maintains Korean traditions at home, celebrating Lunar New Year, cooking dishes like bibimbap and kimchi, and
    speaking Korean with grandparents. They participate in the vibrant Korean community events held in Dallas, such as cultural festivals and language classes, which give her a strong connection to her
    heritage. At the same time, Kisoo experiences the multicultural Texan environment—attending school field trips to the Dallas Museum of Art, enjoying Texas‑style food, and making friends from diverse
    backgrounds. This blend of Korean family values and broader American cultural exposure shapes her identity, encouraging both respect for her roots and openness to new experiences.
