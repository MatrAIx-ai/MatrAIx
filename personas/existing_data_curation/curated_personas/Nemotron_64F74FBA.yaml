  hobbies: '[''drawing'', ''reading picture books and graphic novels'', ''watching animation and cartoons'', ''visiting museums and art galleries'', ''collecting stickers and small figurines'', ''playing
    Minecraft or similar sandbox games'', ''listening to K‑pop and traditional Korean music'', ''practicing basic Korean phrases'', ''journaling with sketches and stories'', ''solving puzzles and building
    LEGO sets'']'
  career_goals: Kisoo dreams of turning her love for art and stories into a future as an illustrator for children's books or a designer of video‑game characters. She imagines holding her own art exhibition
    at a local museum and winning art contests, using her competitive spirit to push herself. She also hopes to travel to famous museums around the world, learn new artistic techniques, and eventually combine
    her Korean cultural roots with her creations, perhaps producing a graphic novel that celebrates both cultures.
