personas:
  professional: Deia Jones, a 31‑year‑old retail specialist with a BA in Business, leverages her keen active‑listening, meticulous inventory management, and competitive sales mindset to consistently exceed
    store targets while mentoring new hires, all within a routine‑driven, detail‑oriented environment that she hopes to translate into an assistant store manager role.
  sports: Deia Jones enjoys low‑key fitness routines, regularly walking the Ohio River Trail and cheering on the Cincinnati Bengals during football season, while occasionally joining a local women's walking
    club that meets every Saturday for a 5‑mile loop.
  arts: Deia Jones finds solace in classic soul and R&B legends like Marvin Gaye, Aretha Franklin, and Al Green, indulges in vintage film nights featuring titles such as “Casablanca” and “Sunset Boulevard,”
    and channels her creative energy into knitting intricate patterns inspired by traditional Southern textile motifs.
  travel: Deia Jones prefers structured road trips that combine familiar comforts with new discoveries, often planning weekend getaways to nearby historic towns like Lexington, Kentucky, and dreaming of
    future journeys to Savannah’s moss‑draped squares and New Orleans’ vibrant music districts, all while balancing travel costs with her modest budget.
  culinary: Deia Jones expertly prepares Southern comfort dishes such as fried catfish with hush‑puppy batter, collard greens simmered with smoked turkey, and sweet potato pie, drawing fresh ingredients
    from her seasonal vegetable garden and experimenting with spices like smoked paprika and cayenne for added depth.
  core: Deia Jones blends a love for routine, practical business savvy, and soulful Southern traditions into a steady yet quietly ambitious life, punctuated by thrift‑store treasure hunts, garden‑to‑table
    meals, and an unwavering competitive edge.
background:
  cultural: Deia is a Black woman raised in Newport, Kentucky, where Southern African‑American traditions interweave with the local community fabric. Her upbringing was shaped by strong family ties, church
    involvement, and a respect for resilience that stems from the region’s historic Black experience. She celebrates cultural milestones such as Juneteenth and values gospel music, Southern cooking, and
    oral storytelling as expressions of heritage. These influences reinforce her practical outlook, competitive spirit, and emphasis on self‑reliance. Deia actively supports local Black‑owned businesses
    and participates in community events that honor her cultural roots while maintaining the routine and familiar environment she finds most comfortable.
attributes:
