  career_goals: Deia aims to move into a supervisory role within the next two years, targeting the position of assistant store manager at her current retailer. She plans to earn a retail management certification
    (such as the NRF Retail Management credential) and enroll in a part‑time MBA program focused on operations and supply‑chain management. Long‑term, she envisions becoming a store manager of a flagship
    location that serves a close‑knit community, where she can implement consistent routines and mentor a small, reliable team. As a secondary ambition, she dreams of opening a boutique that showcases locally
    sourced apparel and accessories that honor her African‑American heritage, allowing her to blend practical business acumen with cultural pride.
