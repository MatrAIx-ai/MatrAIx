  hobbies: '[''Chess'', ''Model building'', ''Puzzle solving (Sudoku, logic grids)'', ''Strategy video games (Civilization, Minecraft)'', ''Reading mystery and adventure novels'', ''Fishing'', ''Family
    garden caretaking'', ''Participating in church youth group'']'
  career_goals: Looking ahead, James envisions a career that blends his love for structure, tangible outcomes, and problem-solving. He is strongly interested in civil or mechanical engineering, with a particular
    fascination for designing reliable infrastructure such as bridges and roads, or for developing efficient automotive systems. He hopes to attend a university with a solid engineering program, earn a
    degree, and eventually contribute to projects that improve his hometown and surrounding rural communities. His competitive drive also fuels a secondary ambition to excel in regional robotics competitions,
    which could serve as a stepping stone toward his engineering goals.
