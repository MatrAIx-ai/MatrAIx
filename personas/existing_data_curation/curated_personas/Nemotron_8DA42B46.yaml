  career_goals: Aurea aims to progress to a senior paralegal or team lead position within the next three to five years, leveraging her technical expertise to specialize in technology and intellectual property
    law. She plans to earn a certification in paralegal studies focused on IP and eventually enroll in a part‑time JD program to become an attorney. In the meantime, she seeks opportunities to mentor junior
    staff, streamline workflow automation, and contribute to pro bono projects that support underserved communities in Cincinnati.
