  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Salsa Dancing'', ''Community Volunteering'', ''Book Club'', ''Hiking'', ''Gardening'', ''Yoga'', ''Traveling to Mexican Heritage Sites'', ''Exploring
    Culinary Experiences'']'
  career_goals: Xiomara aims to transition into a senior executive role, such as Director of Operations or Vice President, where she can shape company strategy while championing inclusive, people‑focused
    cultures. She is passionate about mentoring emerging leaders, especially women and members of the Hispanic community, and hopes to establish a mentorship program within her organization. In the longer
    term, she envisions launching a consultancy that helps small businesses in Kern County adopt sustainable practices and culturally responsive management. Throughout these ambitions, she seeks to maintain
    flexibility in her schedule to better manage stress and preserve her well‑being.
