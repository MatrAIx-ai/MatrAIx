    User 1: That sounds nice. I love walking on the beach too.

    User 2: Yeah, it''s so peaceful.

    User 1: I''m also in band. I''ve been playing the clarinet for four years.

    User 2: That''s cool! I''ve never played an instrument.

    User 1: You should try it. It''s a lot of fun.

    User 2: Maybe I will.

    User 1: So, what are you going to do after college?

    User 2: I''m not sure yet. I''m thinking about going to graduate school.

    User 1: That sounds like a good plan.

    User 2: Thanks.

    User 1: So, what do you want to do with your life?

    User 2: I''m not sure yet. I''m just trying to figure things out.

