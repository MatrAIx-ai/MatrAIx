  career_goals: Looking ahead, Wallace aims to step into a senior regional management role where he can oversee multiple construction sites, drive the adoption of sustainable building practices, and mentor
    emerging talent. He is pursuing advanced certifications such as PMP and LEED AP to strengthen his credibility in project delivery and green construction. Ultimately, he envisions launching his own consulting
    firm that helps small‑to‑mid‑size contractors improve efficiency, safety, and profitability while navigating the evolving regulatory landscape. His competitive drive fuels a desire to leave a lasting
    legacy of excellence and innovation in the New England construction industry.
