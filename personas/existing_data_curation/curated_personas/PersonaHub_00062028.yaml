persona_description: A neuroscientist who studies the mechanisms underlying neurodegenerative diseases, particularly Huntington's disease. She is particularly interested in the role of the autophagy process
  in clearing excess proteins and how it is disrupted in Huntington's disease. She is also interested in the evolution of brain defenses against diseases and the potential use of these defenses as a therapeutic
  strategy. She is likely to be familiar with the techniques of optical pulse-labeling and has experience working with rodent models of Huntington's disease.
