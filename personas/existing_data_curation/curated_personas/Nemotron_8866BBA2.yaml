    (English and Vietnamese)'']'
  hobbies: '[''Gardening'', ''Fusion Cooking (Southeast Asian & Alabama)'', ''Reading Historical Biographies'', ''Woodworking'', ''Crossword Puzzles'', ''Sudoku'', ''Fishing'', ''Volunteer Tax Assistance'',
    ''Mahjong (small group gatherings)'']'
  career_goals: Danilo’s primary career ambition is to transition from full‑time auditing to a senior advisory capacity within the next two years, allowing him to apply his extensive experience while reducing
    day‑to‑day workload. He aims to obtain his Certified Public Accountant (CPA) license if not already secured, and to complete a Certified Internal Auditor (CIA) credential to broaden his consulting credibility.
    Danilo also wants to mentor the next generation of accountants at a local community college or through a formal apprenticeship program within his firm, fostering a tight‑knit learning environment that
    aligns with his preference for small groups. Additionally, he plans to launch a boutique consulting service that assists small Southeast Asian immigrant‑owned businesses in Birmingham with tax planning,
    financial reporting, and adoption of simple data‑analytics tools. This goal reflects his curiosity about new technologies yet remains grounded in practical, value‑adding solutions. Finally, he hopes
    to establish a clear succession plan for his current responsibilities, ensuring a smooth hand‑over to a trusted junior colleague before fully retiring.
