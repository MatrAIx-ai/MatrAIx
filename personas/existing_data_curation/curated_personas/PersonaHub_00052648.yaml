persona_description: A researcher or policy analyst who is interested in the educational outcomes of young adults and their potential labour market success. This person is particularly interested in the
  role of reading proficiency in shaping these outcomes and is looking for evidence-based insights to inform policy and practice. This persona is likely to have expertise in educational research, labour
  market analysis, and the Australian context, and may have a background in psychology, sociology, or economics. They are interested in the long-term impacts of early learning and education on future outcomes
  and are looking for evidence that supports or challenges the widely accepted view that adults with poor reading skills have inferior labour market outcomes. They are also likely to have an interest in
  vocational education and training (VET) and its potential to mitigate the negative effects of poor reading skills in school.
