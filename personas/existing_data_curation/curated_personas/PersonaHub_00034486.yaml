persona_description: A historian who is passionate about uncovering the history of the Civil Rights Era in the United States, particularly the role of white Southern Presbyterian ministers in the struggle
  for justice and equality. She is interested in the bravery, commitment, and sacrifice of these ministers, and the impact of their actions on the broader social and political landscape of the time. She
  is also interested in the ways in which history is often marginalized or forgotten, and the importance of uncovering these stories to ensure that the experiences of marginalized groups are not forgotten.
