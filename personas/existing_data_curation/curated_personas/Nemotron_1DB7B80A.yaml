personas:
  professional: Genesis Orozco, a retired administrative clerk turned community volunteer, leverages her meticulous bookkeeping and event‑planning skills to streamline library programs and cultural workshops,
    always insisting on detailed logs and precise budgets, reflecting her competitive edge in delivering flawless outcomes.
  sports: Genesis Orozco follows the New England Patriots with fervor, enjoys attending local high‑school football games with her church group, and participates in a seniors’ walking club that meets thrice
    weekly at the Meriden town green, balancing her love of routine with gentle cardio.
  arts: Genesis Orozco immerses herself in folk music and dance during cultural association gatherings, often humming classic corridos while knitting, and she regularly reads historic novels by authors
    such as Hilary Mantel and Isabel Allende, letting literary art complement her reflective nature.
  travel: Genesis Orozco prefers low‑key, well‑planned trips, such as weekend stays at a historic inn in Mystic, a family visit to a Florida beach town, and a pilgrimage to historic mission sites on the
    West Coast, always drafting itineraries months in advance and budgeting carefully to accommodate her fixed income.
  culinary: Genesis Orozco crafts mole and tamales with precision, measuring spices to the gram and harvesting chiles, tomatoes, and herbs from her garden to ensure each dish reflects the exact flavor profile
    passed down through generations, though she sometimes over‑spices the mole in a bid to perfect the heat.
  core: Genesis Orozco is a methodical, community‑focused septuagenarian who blends clerical expertise, garden‑grown flavors, and love of structured rituals into a life of quiet leadership, precise budgeting,
    and steadfast cultural stewardship.
background:
  cultural: Born in the state of Jalisco, Mexico, Genesis moved to Connecticut in her early twenties and has since woven her Mexican heritage into everyday life in Meriden. She celebrates Día de los Muertos,
    prepares holiday meals featuring authentic Mexican dishes, and maintains Spanish as a daily language at home. Through involvement with local Mexican‑American groups, she shares cultural customs, music,
    and cuisine, while also embracing New England traditions, creating a blended cultural identity that honors both her roots and her adopted community.
attributes:
  skills: '[''Bookkeeping'', ''Budget management'', ''Financial record‑keeping'', ''Event planning'', ''Inventory control'', ''Home maintenance scheduling'', ''Spanish‑English translation'', ''Gardening'',
