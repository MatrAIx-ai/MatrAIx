persona_description: A scientist or engineer specializing in the field of environmental science, specifically focused on the measurement and quantification of air emissions from animal feeding operations.
  They are interested in the development and implementation of standardized methodologies for flux chamber and wind tunnel measurements to ensure accurate and comparable results across different sources
  and conditions. They are looking for ways to improve the accuracy of emission estimates by using evaporative flux measurements and developing a correction factor that takes into account the effects of
  airflow and relative humidity within the chamber. They are likely to be involved in research and development projects aimed at improving the efficiency and reliability of flux chamber and wind tunnel
  measurements in the context of environmental regulations and compliance with federal and state laws.
