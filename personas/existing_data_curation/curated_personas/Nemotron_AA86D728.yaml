  career_goals: At two years old, Emilia does not have concrete career plans, but she frequently talks about wanting to "make pictures for everyone" and "teach the dolls how to talk," reflecting an early
    fascination with creative expression and helping others. Her parents nurture these interests by exposing her to art supplies, music, and storytelling, laying the groundwork for future aspirations that
    might include roles such as artist, teacher, or storyteller.
