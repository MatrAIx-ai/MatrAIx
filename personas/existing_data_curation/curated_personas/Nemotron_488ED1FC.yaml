personas:
  professional: Zenaido Perez is a veteran retail and food‑service manager who leverages three decades of hands‑on leadership, bilingual team coordination, and tight budget control to keep stores humming,
    while their love of structure blends with a relaxed attitude toward planning, allowing them to improvise solutions on the fly and keep employees motivated through talkative, personable communication.
  sports: Zenaido Perez follows soccer with fervor, cheering on the New York Red Bulls and keeping a roster of local amateur league teammates for weekend kick‑offs, while also staying fit through weekly
    salsa and cumbia dance sessions that double as cardio, and they never miss a Liga MX broadcast of Club América whenever the schedule allows.
  arts: Zenaido Perez channels their love of performance into karaoke nights featuring classics by Selena and Celia Cruz, enjoys the vibrant murals of Diego Rivera on trips to the city, and finds inspiration
    in the lyrical poetry of Gabriela Mistral, which they often quote while organizing cultural festivals.
  travel: Zenaido Perez prefers spontaneous, family‑oriented trips that blend cultural immersion with relaxation, having already savored the flavors and festivities of Oaxaca and the historic streets of
    Guanajuato, while dreaming of a future pilgrimage to the vineyards of Mendoza and a peaceful river cruise along the Danube.
  culinary: Zenaido Perez excels in cooking mole poblano, hand‑rolled tamales, and fresh salsa verde, often layering dark chocolate, dried chiles, and toasted sesame seeds with precision, and they love
    sharing these dishes at community gatherings while pairing them with a crisp margarita or a cold cerveza from the nearby brewery.
  core: Zenaido Perez blends a structured work ethic with a spontaneous, sociable spirit, turning community kitchens into lively classrooms and negotiating budgets like a seasoned choreographer, all while
    never missing a salsa beat or a chance to mentor a younger teammate.
background:
  cultural: Zenaido was born to Mexican immigrant parents who settled in New Jersey, growing up in a bilingual household where Spanish was spoken at home and English at school. Her upbringing blended traditional
    Mexican customs—such as celebrating Día de los Muertos, quinceañeras, and Catholic holidays—with the multicultural fabric of Bayonne. She maintains strong ties to the local Mexican‑American community,
    participating in festivals, the church choir, and mutual‑aid networks that support recent immigrants. The values of hospitality, hard work, and family solidarity were instilled early and remain central
    to her identity, even after her divorce. Zenaido’s cultural pride informs her cooking, her volunteerism, and her desire to mentor younger Hispanics, ensuring that heritage remains a living, shared experience
    in her adopted American context.
