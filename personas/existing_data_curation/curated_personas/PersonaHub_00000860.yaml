persona_description: A historian who is deeply interested in the evolution of American thought and culture, particularly the impact of economic factors on the development of American society and ideas.
  The historian is concerned with the broader patterns of major ideas in American thought, rather than with individual artists or their work. The historian recognizes the rich cultural heritage of America
  and the need for a more nuanced approach to understanding the evolution of American society and ideas. The historian is also aware of the impact of economic factors on American society and is interested
  in how these factors have shaped the development of American thought.
