persona_description: A historian who specializes in the study of the political and social history of the Garo Hills, particularly the period from the Mughal control to the annexation by the British in 1873.
  Her research interests include the political and social dynamics of the region during this time, the impact of British rule on the Garo people, and the cultural and economic changes that occurred in the
  region. She has conducted extensive research on the development of the district over the years, including the annexation by the British and the subsequent bifurcation into two districts in 1979. Her work
  has been recognized with awards and accolades for her contributions to the study of the Garo Hills.
