  career_goals: Edward aims to become a certified Journeyman electrician and obtain EPA certification for HVAC work within the next three years. He aspires to advance to a foreman position, overseeing larger
    maintenance crews and complex projects. In the longer term, he dreams of launching his own service company focused on energy‑efficient home retrofits, including solar panel installations and smart‑home
    upgrades. To support these goals, he plans to enroll in evening courses for certification, improve his organizational skills, and save for a family home in the Porter area.
