personas:
  professional: Miriam Jacumin is a seasoned healthcare operations executive with two decades of overseeing medical services, who leverages data‑driven strategic planning, meticulous risk management, and
    a curiosity for innovative technologies to streamline workflows while maintaining regulatory compliance.
  sports: Miriam Jacumin enjoys weekend hikes through the rolling hills of central Tennessee, practices yoga twice a week for balance, cheers on the Tennessee Titans during football season, supports the
    Nashville Predators as a seasonal hockey fan, and occasionally joins a local walking club.
  arts: Miriam Jacumin finds creative renewal in quilting with a community circle, attends live bluegrass shows featuring Bill Monroe tributes, immerses in historical fiction by Hilary Mantel, and maintains
    an appreciation for visual arts through visits to the Frist Art Museum.
  travel: Miriam Jacumin prefers meticulously planned road trips that blend scenic hiking in the Blue Ridge Mountains with cultural stops in Charleston and Savannah, and dreams of a guided tour of England’s
    historic castles, all while balancing travel costs with family budget constraints.
  culinary: Miriam Jacumin cooks Southern comfort dishes such as collard greens with smoked turkey, pan‑fried catfish with a lemongrass glaze, and skillet cornbread, often incorporating fresh heirloom tomatoes
    and sweet corn from their garden, while experimenting with spice rubs and maintaining a modest pantry.
  core: Miriam Jacumin blends methodical curiosity with community‑centered compassion, turning gardening, quilting, and health‑service leadership into a disciplined yet warmly inventive lifestyle.
background:
  cultural: Miriam is a white woman whose family has deep roots in the Middle Tennessee region. Raised in a close‑knit community that values hospitality, church involvement, and seasonal traditions, she
    carries forward a Southern sensibility of friendliness, respect for elders, and a strong work ethic. Her upbringing emphasized education as a pathway to service, which, combined with her business degree,
    guided her toward a career in health‑service management. While she honors regional customs—such as community gatherings, a love of local cuisine, and participation in church activities—she also embraces
    broader cultural influences through travel, reading, and continuous professional development.
attributes:
  skills: '[''Healthcare Operations Management'', ''Strategic Planning'', ''Quality Improvement'', ''Regulatory Compliance'', ''Staff Development and Training'', ''Data-driven Decision Making'', ''Electronic
    Health Record (EHR) Integration'', ''Risk Management'', ''Vendor Negotiations and Contract Management'', ''Community Outreach Coordination'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Reading Historical Fiction'', ''Cooking'', ''Quilting'', ''Yoga'', ''Community Volunteering'', ''Attending Live Music Events'', ''Traveling'', ''Participating in
    Book Clubs'']'
  career_goals: Miriam aims to advance to a regional director role overseeing multiple health‑service facilities, where she can shape system‑wide initiatives that improve patient safety, expand telehealth
    access, and reduce health disparities in the Williamson County area. She plans to earn a certification from the American College of Healthcare Executives and pursue an executive MBA to deepen her strategic
    and financial expertise. In the longer term, she envisions transitioning to a senior advisory or consulting position, mentoring emerging health‑service leaders while volunteering her expertise to nonprofit
    health programs in her community.
