  hobbies: '[''Reading (history and philosophy)'', ''Backyard gardening'', ''Coastal hiking'', ''Cooking traditional and fusion Asian cuisine'', ''Playing piano'', ''Mentoring high‑school students'', ''Attending
    small cultural gatherings'']'
  career_goals: He aims to move into a senior leadership position within the sales engineering division, such as Sales Engineering Manager or Director, where he can mentor junior engineers and shape strategic
    account plans. Son also aspires to launch a consultancy that offers sustainable engineering solutions to small businesses in the Los Angeles area, aligning his technical expertise with his desire to
    help others. Over the next few years, he plans to earn a Certified Professional Sales Engineer credential and deepen his knowledge of renewable energy technologies, ensuring his career growth reflects
    his values of harmony and community contribution.
