  hobbies: '[''Contemporary art gallery visits'', ''Photography and street‑art documentation'', ''Reading speculative fiction and philosophy'', ''Yoga and mindfulness meditation'', ''Improv theatre'', ''Experimental
    cooking'', ''Cycling along the Charles River'', ''Volunteering for art‑focused financial literacy programs'']'
  career_goals: Hany aspires to become a Chief Financial Officer in a forward‑thinking organization that blends creativity and commerce, such as a tech‑driven media studio or a socially‑impact driven venture
    capital fund. She aims to spearhead sustainable investment initiatives that support the arts and cultural preservation, while championing inclusive finance practices that prioritize employee well‑being.
    Over the next five years, she plans to deepen her expertise in ESG (Environmental, Social, Governance) metrics, earn a CFA charter, and publish thought pieces on the intersection of finance, art, and
    innovation. Ultimately, she envisions founding a nonprofit that offers financial literacy workshops tailored for artists and cultural entrepreneurs.
