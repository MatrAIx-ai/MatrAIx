  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Philosophical and postmodern reading'', ''Hiking'', ''Cooking Dominican fusion cuisine'', ''Acoustic guitar'', ''Community theater involvement'',
    ''Attending local art festivals'']'
  career_goals: Guillermo aims to advance to a regional director role where he can scale innovative, arts‑driven social services across multiple counties. He aspires to launch his own nonprofit focused
    on youth empowerment through creative expression, secure multi‑year grant funding for experimental community projects, and publish a field guide on integrating humanities into social work practice.
    Mentoring emerging practitioners and positioning himself as a thought leader at national conferences are also key ambitions.
