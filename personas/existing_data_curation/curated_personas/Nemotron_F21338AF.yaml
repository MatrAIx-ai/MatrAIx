  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Salsa and bachata dancing'', ''Cooking traditional Hispanic dishes'', ''Volunteering at community cultural centers'',
    ''Reading contemporary fiction and art history books'', ''Yoga and mindfulness meditation'', ''Journaling for emotional processing'', ''Exploring new cafés and local music venues'']'
  career_goals: Anny aims to transition into a regional management role overseeing multiple locations, and she envisions eventually founding a nonprofit community art center that provides arts education
    and cultural programming for underprivileged youth in Paterson. To support these ambitions, she plans to complete her GED, earn a certificate in nonprofit management, and build a network of local artists
    and civic leaders.
