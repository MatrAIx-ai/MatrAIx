persona_description: A historian who is interested in the history of the Diocese of Argyll and the Isles, particularly the period after the defeat of the Norwegians by Alexander III at Largs in 1263. This
  historian is knowledgeable about the history of the Church in Scotland and has a keen interest in the role of the Diocese in the restoration of the Sudries and the Isle of Man to Scotland. They are also
  interested in the history of the Diocese of The Isles and have a deep understanding of the history of the Abbey Church at Lona and its elevation to Cathedral.
