  career_goals: Although Maria is currently not in the formal workforce, she aims to deepen her involvement in the local Mexican‑American community. She hopes to volunteer as a coordinator for cultural
    events at the nearby community center, mentor younger women in cooking and basic budgeting, and perhaps launch a modest home‑based venture selling homemade tamales and baked goods at neighborhood markets.
    Maria also expresses a desire to enroll in a GED preparation class to formalize her education, but she prefers flexible, self‑paced learning that respects her strong inclination toward routine and practical
    application rather than strict academic scheduling.
