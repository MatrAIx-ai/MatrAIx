personas:
  professional: Raymond Buenavista blends a freshly earned Business Administration degree with hands‑on experience in financial analysis, Excel and QuickBooks reporting, and bilingual marketing strategy,
    designing social‑media campaigns for campus clubs while coordinating community events, and now aims to land an entry‑level marketing role that lets they apply data visualization via Tableau to real‑world
    growth challenges.
  sports: Raymond Buenavista dominates pickup basketball at Union Park, cheering for the New York Knicks and Milwaukee Bucks, and is a member of the Union Park Hoops Club, while in the off‑season they hit
    the local climbing gym and follow the NBA schedule religiously.
  arts: Raymond Buenavista captures the kinetic energy of Union’s streets through a vintage Leica, draws inspiration from Henri Cartier‑Bresson’s candid framing, dances to bachata rhythms while listening
    to Bad Bunny and Rosalia, and attends local gallery openings featuring emerging muralists.
  travel: Raymond Buenavista plans trips with a blend of spontaneity and spreadsheets, having already explored family roots on their ancestral Caribbean island and street art in New York City, while dreaming
    of a cultural immersion tour of Barcelona and a beach escape to Miami, always booking budget accommodations via Airbnb and using travel‑deal apps.
  culinary: Raymond Buenavista whips up mangú with fried cheese, sancocho brimming with plantains and yucca, and occasionally fuses tradition by turning mangú into tacos, showcasing an intermediate cooking
    skill set that balances authentic flavors with playful experimentation.
  core: Raymond Buenavista is a sociable 18‑year‑old who fuses business savvy with dance‑floor flair, obsessively tracks finances in Excel while never missing a late‑night basketball game, and can’t resist
    snapping street scenes on a Leica.
background:
  cultural: Raymond was raised in a close‑knit Dominican‑American family in Union, New Jersey. At home, Spanish is spoken daily, and family gatherings are filled with merengue, bachata, and the aromas of
    Caribbean cooking. He celebrates Dominican holidays such as Día de la Constitución and participates in local cultural festivals organized by the Dominican diaspora. His upbringing blends the warmth
    and communal values of Dominican culture with the multicultural environment of the New York metropolitan area, shaping his identity as a bilingual, socially conscious young adult who values both tradition
    and adaptation.
attributes:
  skills: '["Financial analysis", "Budgeting and basic accounting", "Marketing strategy", "Social media campaign management", "Bilingual communication (English/Spanish)", "Data visualization (Excel, Tableau)",
    "Event planning and logistics", "Customer relationship management (CRM)"]'
  hobbies: '["Basketball", "Bachata dancing", "Cooking Dominican cuisine", "Volunteering at youth community center", "Tech gadget tinkering", "Street photography", "Traveling"]'
  career_goals: Raymond aims to secure an entry‑level marketing or business development position where he can apply his analytical and creative skills while continuing to learn about digital media. In the
    next three years he plans to complete a marketing certification and potentially launch a boutique digital agency that helps small Dominican‑American businesses expand their online presence. He also
    hopes to become a community mentor, using his business knowledge to support youth entrepreneurship programs in Union County. Ultimately, his long‑term ambition is to combine his entrepreneurial drive
    with his dedication to cultural heritage to build a socially‑responsible enterprise that creates jobs and celebrates Dominican culture.
