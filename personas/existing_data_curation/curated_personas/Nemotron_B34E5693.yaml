personas:
  professional: Miya Parham, an audit specialist with a flair for data‑driven storytelling, leverages their GAAP mastery, Python automation skills, and love of creative problem‑solving to translate complex
    financial findings into clear, client‑friendly reports while leading cross‑functional teams toward tech‑enabled assurance services, and they often juggle the occasional disorganized inbox.
  sports: Miya Parham, an avid outdoor enthusiast who spends weekends hiking Tallulah Gorge State Park and biking the Atlanta BeltLine, plays weekly pickup soccer with a local community center, roots for
    the Atlanta United and the Georgia Bulldogs, and they balance their love of movement with a sometimes‑haphazard workout schedule that reflects their relaxed approach to obligations.
  arts: Miya Parham, a community‑focused art lover who frequents Harlem’s pop‑up galleries and street mural tours, regularly attends workshops on contemporary artists such as Kehinde Wiley and Kara Walker,
    experiments with mixed‑media painting as a personal outlet, curates monthly listening sessions featuring jazz history podcasts and the Radiolab series, and they weave their sociable, curious nature
    into every creative encounter.
  travel: Miya Parham, a spontaneous yet curiosity‑driven traveler, enjoys weekend road trips to Asheville, NC and Savannah, GA, plans trips with a blend of rough itineraries and last‑minute detours, dreams
    of exploring the Caribbean islands for their culinary diversity, and they balance travel budgeting with occasional splurges on boutique art tours abroad.
  culinary: Miya Parham, a culinary explorer who takes cooking classes spotlighting African, Caribbean and Southern cuisines, delights in preparing dishes like Jollof rice, ackee and saltfish, and collard‑green
    gumbo, and they balance a decent home‑cooking skill set with a habit of ordering take‑out on nights when their disorganized schedule leaves little time for prep.
  core: Miya Parham, a creatively inclined CPA‑in‑training who blends art, data, and community spirit into every facet of life, they often juggle a relaxed approach to planning with bursts of assertive
    problem‑solving, and occasionally forget appointments while staying emotionally steady.
background:
  cultural: Miya grew up in a close‑knit African‑American family in the South, where gospel music, church fellowship, and storytelling were everyday foundations. Her parents emphasized the importance of
    education and community service, values that continue to shape her worldview. Living in Harlem, Georgia, she actively participates in local Black cultural celebrations such as Juneteenth parades, Black
    History Month events, and church festivals that blend Southern hospitality with vibrant artistic expression. Miya's heritage influences her palate—she loves soul food, collard greens, and the spice‑laden
    dishes of Caribbean relatives—and informs her appreciation for Black visual artists, spoken‑word poetry, and jazz. She maintains connections with alumni from her historically Black college, where she
    earned her STEM degree, and mentors younger Black professionals, reinforcing a sense of collective uplift within her community.
attributes:
  skills: '["Financial reporting and statement preparation", "GAAP compliance and regulatory knowledge", "External and internal auditing", "Tax preparation and filing", "Risk assessment and internal controls",
    "Data analysis with Excel and Power BI", "Introductory Python for data manipulation", "Forensic accounting basics", "Stakeholder communication and client relationship management", "Process improvement
    and workflow optimization", "Creative problem solving", "Team collaboration and leadership", "Adaptability to flexible work environments"]'
  hobbies: '["Visiting art galleries and street murals", "Painting and mixed-media art", "Reading non-fiction on science, social justice, and business", "Listening to eclectic podcasts", "Organizing community
    potlucks and events", "Dancing (salsa, swing) at local venues", "Volunteering as a financial literacy mentor", "Cooking classes featuring African, Caribbean, and Southern cuisines", "Hiking and biking
    in nearby state parks"]'
  career_goals: Driven by both professional rigor and a desire for meaningful impact, Miya aims to earn her CPA license within the next two years and transition into a senior audit manager role at her firm.
    She aspires to lead cross‑functional teams that integrate data‑analytics tools into traditional audit practices, positioning the organization at the forefront of tech‑enabled assurance services. Long‑term,
    Miya envisions launching her own boutique accounting consultancy focused on minority‑owned small businesses, offering culturally informed financial counseling and ESG reporting guidance. She also hopes
    to mentor emerging Black women accountants through industry networks and speak at conferences about the intersection of finance, creativity, and community development.
