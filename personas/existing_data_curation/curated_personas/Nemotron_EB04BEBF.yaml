personas:
  professional: Maria Garcia, a 13-year-old budding robotics enthusiast, combines their curiosity about futuristic tech with a practical knack for coding and hardware assembly, channeling their competitive
    spirit and cautious skepticism into building precise, tournament-ready robots for their school club.
  sports: Maria Garcia, a forward on the San Juan Youth Soccer Club, trains year-round, idolizes the Dallas Cowboys' relentless drive on the field, follows the Houston Astros' spring training, and balances
    their competitive edge with weekly yoga to stay flexible and avoid injuries.
  arts: Maria Garcia channels their love for sci-fi and graphic design into digital illustrations inspired by Hayao Miyazaki's whimsical worlds and Frida Kahlo's bold colors, while they dwell on the soundtracks
    of Tame Impala and the storytelling of Netflix's 'Coco' during creative sessions.
  travel: Maria Garcia dreams of exploring the historic streets of San Antonio's River Walk and the vibrant markets of Mexico City, but currently saves for a summer road trip to the Grand Canyon, favoring
    meticulously planned itineraries over spontaneous getaways due to their cautious nature and limited budget.
  culinary: Maria Garcia proudly helps prepare tacos al pastor with pineapple-marinated pork, homemade tamales wrapped in corn husks, and sweet churros dusted with cinnamon, showcasing a budding cooking
    skill that balances family tradition with their experimental flair for adding avocado crema.
  core: Maria Garcia is a competitive, anxiety-prone teen who balances a tech-savvy curiosity with cautious budgeting, fierce soccer drives, and a love for vivid digital art, all while occasionally over-thinking
    and obsessing over small details.
background:
  cultural: Maria Aida Garcia belongs to a Mexican‑American family in San Juan, Texas, where Spanish is spoken at home and Mexican traditions such as Día de los Muertos, quinceañera celebrations, and weekly
    family gatherings are central to daily life. Growing up in Hidalgo County, she experiences a vibrant blend of Mexican and Texan cultures, including regional cuisine like tacos al pastor and tamales,
    Catholic festivals, and the close‑knit neighborhood dynamics of the Rio Grande Valley. The community places strong emphasis on family loyalty, respect for elders, and resilience in the face of economic
    challenges, all of which shape Maria's values, worldview, and sense of responsibility toward her neighborhood.
