  career_goals: Maria aspires to become a civil engineer focused on sustainable community infrastructure. She wants to combine her curiosity about new technologies with a practical desire to improve living
    conditions in Hidalgo County, designing affordable, environmentally friendly housing and public works. To achieve this, she plans to excel academically, earn a scholarship to a Texas university such
    as UT Austin, and participate in engineering competitions and internships. Long‑term, she hopes to lead projects that strengthen her hometown while serving as a mentor for other young students in the
    Rio Grande Valley.
