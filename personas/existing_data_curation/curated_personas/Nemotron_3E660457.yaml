  career_goals: Meagan aims to transition into an instructional leadership role within the next five years, seeking positions such as department chair or instructional coach. She intends to pursue a master’s
    degree in Educational Leadership and eventually obtain school administrator certification. Her long‑term ambition includes spearheading district‑wide interdisciplinary programs that embed the arts across
    core subjects, authoring curriculum resources, and presenting at national education conferences. She also hopes to mentor new teachers, increase the availability of AP courses at her school, and champion
    initiatives that close achievement gaps.
