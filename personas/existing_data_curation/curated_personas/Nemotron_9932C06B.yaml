  career_goals: Kimberly aims to transition into a senior technical leadership role, such as a Lead Architect or Engineering Manager, where she can shape development processes, mentor a diverse team, and
    champion structured, sustainable software practices. She is keen on building a formal mentorship program within her organization to nurture junior talent and foster a supportive, inclusive culture.
    Over the next five years, she plans to deepen her expertise in cloud-native architectures and secure software design, positioning herself as a go‑to expert for high‑stakes, reliability‑critical projects.
    Additionally, she seeks a better work‑life balance that allows her to allocate regular time for stress‑relief activities and community volunteering, aligning her professional growth with personal well‑being.
