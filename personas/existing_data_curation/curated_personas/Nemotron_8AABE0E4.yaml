personas:
  professional: Kelli Broida, a retired rural Pennsylvania resident turned home‑based artisan, leverages decades of gardening, preservation, and woodworking expertise to run a modest cottage‑industry of
    heirloom jams, pickles, and baked goods while mentoring younger neighbors in a community garden, and they balance a competitive streak with a flexible, sometimes disorganized, approach to scheduling.
  sports: Kelli Broida, who stays fit by walking the Susquehanna River trail three times a week, participates in the local senior walking club 'Lancaster Riverwalkers', cheers on the Philadelphia Eagles
    and Phillies on weekends, occasionally joins a casual softball league at the community center, and they approach fitness as a low‑impact, competitive pastime rather than a regimented workout.
  arts: Kelli Broida, an avid knitter and quilter who showcases her heirloom‑inspired blankets at the Lancaster County Craft Fair, is a devoted fan of Agatha Christie’s mysteries, enjoys the bluegrass sounds
    of Gillian Welch and Old Crow Medicine Show, and they often draw creative inspiration from the folk art of local painter Mary H. Herschberger.
  travel: Kelli Broida, who prefers spontaneous, budget‑friendly road trips over rigid itineraries, has explored the historic Gettysburg battlefield, the charming Amish countryside of Lancaster, and the
    museums of Washington, D.C., and they dream of a relaxed coastal getaway to Cape Cod’s lobster shacks while keeping an eye on travel costs.
  culinary: Kelli Broida, whose kitchen blends Pennsylvania Dutch staples like shoo‑fly pie and apple butter with inventive dishes such as heirloom tomato and basil salad drizzled with lavender honey, regularly
    experiments with herbs from her garden—like rosemary, thyme, and sage—in homemade pickles, jams, and a signature fermented sauerkraut that she sells at the county fair.
  core: Kelli Broida, a curiously competitive retiree who turns gardening, quilting, and jam‑making into purposeful projects while juggling a flexible, slightly disorganized routine and a persistent undercurrent
    of worry.
background:
  cultural: Kelli grew up in Holtwood, a small unincorporated community in Lancaster County, Pennsylvania. The region blends Pennsylvania Dutch heritage with broader Mid‑Atlantic American culture. Although
    her family is of Anglo‑American descent, the local customs—a farm‑oriented work ethic, community gatherings at church and the county fair, and a respect for practical, hands‑on skills—have deeply shaped
    her worldview. Raised in a modest, working‑class household, self‑reliance and frugality were core values. The nearby Lutheran and Methodist churches played a central role in community life, and she
    continues to attend services and volunteer in church events. Seasonal cycles, local food production, and informal support networks underpin her daily routines and values, reinforcing a pragmatic yet
    curious approach to life.
