  career_goals: Kelli's primary ambition is to maintain her independence, health, and sense of purpose throughout her retirement. She hopes to turn her love of cooking and preserving into a modest cottage‑industry,
    selling homemade jams, pickles, and baked goods at the local county fair—a gentle outlet for her competitive streak. She also aspires to write a memoir that captures the social and agricultural changes
    she has witnessed in Lancaster County over the past decades, and plans to attend a local writing workshop to develop her storytelling skills. Although she prefers flexibility over strict schedules,
    she wants to adopt better organizational habits to manage her finances and reduce daily stress. A secondary goal is to create a community garden plot where she can mentor younger neighbors, sharing
    her horticultural knowledge while satisfying her curiosity about sustainable living.
