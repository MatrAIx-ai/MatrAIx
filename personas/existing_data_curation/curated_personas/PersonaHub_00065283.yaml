persona_description: A scientist or researcher who is interested in studying the effects of climate change on animal populations and the management techniques used to protect them. They are particularly
  focused on the impact of warmer temperatures on moose populations in Voyageurs National Park in northern Minnesota and are interested in learning more about the ways in which land management practices
  affect these animals. They are also interested in the long-term viability of moose populations in the park and are looking for ways to better understand how moose behave in relation to changes in forest
  structure and composition caused by management.
