personas:
  professional: Zam Nunes is a budding explorer who constantly stacks blocks and experiments with cause‑and‑effect, showing early problem‑solving skills and an uncanny ability to organize toys while still
    embracing spontaneous play.
  sports: Zam Nunes loves energetic playtime at the Little Sprouts Toddler Play Group, cheerfully waving a tiny jersey of the hometown soccer club's youth squad while they also cheer for the local Major
    League Baseball team, the Chicago Cubs, whenever the family watches a game on the living room TV.
  arts: Zam Nunes delights in finger painting to the soothing melodies of Raffi's 'Baby Beluga', giggles at classic Sesame Street sketches featuring Caroll Spinney as Big Bird, and they perch on a low shelf
    to admire the vivid illustrations of Eric Carle's 'The Very Hungry Caterpillar' whenever a family storytime arrives.
  travel: Zam Nunes has already taken in the salty breezes of Santa Monica beach and the animated wildlife at the San Diego Zoo, and they now dream of a stroller‑friendly adventure to Kyoto's tranquil bamboo
    grove and a quick hop to the kid‑friendly interactive museum in London.
  culinary: Zam Nunes prefers smooth sweet‑potato puree seasoned with a pinch of cinnamon, delights in avocado mash sprinkled with tiny bits of cheddar cheese, and they often end meals with a giggly smear
    of banana‑coconut oatmeal, though they habitually fling peas across the highchair tray.
  core: Zam Nunes is a curious one‑year‑old who balances meticulous toy‑sorting with spontaneous mess‑making, eagerly absorbs new sights and sounds, and habitually leaves a trail of blueberry‑stained fingers
    wherever they go.
background:
  cultural: Zam is raised in a Southeast Asian household—his parents were born in Vietnam and retain cultural practices such as speaking Vietnamese at home, celebrating Tet with traditional foods, and preparing
    rice‑based dishes. Living in Crowley, Texas, the family also embraces local customs, partaking in community festivals and sharing meals that blend Southeast Asian flavors with the region’s Tex‑Mex influences.
    This multicultural environment exposes Zam to a mosaic of languages, foods, and celebrations, shaping a rich cultural identity that balances his heritage with his Texan surroundings.
