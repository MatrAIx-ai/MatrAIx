  career_goals: Harold aims to transition into a foreman role within the next two years, seeking certification as a construction safety officer and lead carpenter. He hopes to leverage his experience to
    mentor younger workers and, eventually, launch a modest residential remodeling business that emphasizes quality craftsmanship and community projects. Securing a stable income for a comfortable retirement
    while contributing to local Habitat for Humanity builds is central to his long‑term ambition.
