  hobbies: '[''Community Volunteering'', ''Gardening'', ''Fishing'', ''Cycling'', ''Attending High School Football Games'', ''Participating in Local Theatre'', ''Reading Technology and Sustainability Blogs'',
    ''Cooking Southern Cuisine'', ''Playing Acoustic Guitar'', ''Visiting Farmers Markets'']'
  career_goals: Ryan aims to earn a bachelor's degree in Agricultural Education within the next three years to deepen his pedagogical knowledge and qualify for advanced teaching positions. He plans to develop
    a farm‑to‑school program that connects local growers with school cafeterias, promoting nutritious, locally sourced meals for students. Over the next five to ten years, he envisions taking on a leadership
    role as department chair, expanding the college's vocational offerings, and securing external funding to create a state‑of‑the‑art demonstration farm for experiential learning. He also aspires to mentor
    new instructors and foster a culture of continuous improvement among his colleagues.
