persona_description: A professional in the field of education technology who is responsible for creating and delivering professional learning modules for teachers in the Clark County School District. The
  person is skilled in curriculum development, project management, and instructional design. They have experience in creating and evaluating educational technology resources and are familiar with the Common
  Core State Standards and Nevada Academic Content Standards. The person is passionate about providing just-in-time professional development and has a deep understanding of the needs of teachers in the
  district. They are committed to ensuring that the professional learning modules are effective and meet the needs of the district's teachers.
