persona_description: A teacher who specializes in ESL (English as a Second Language) speaking activities and tools, particularly focusing on Brazilian and American cultural differences and conflict resolution.
  They have created and used various speaking activities and tools, including role-plays, information gap activities, examination rubrics, and discussion questions, and have experience teaching both Brazilian
  and American students. They have experience with classroom timers, including the classic classroom timers, and have created and used a free split-flap classroom timer tool. They have experience with transcription
  softwares for transcribing audio and video content. They are skilled at starting conversations when there is nothing to talk about and have created a Banish Blithering Blabber lesson that can help students
  practice speaking. They are also familiar with the FCE (Framingham College English) speaking exam and can use the FCE Speaking Activity to practice speaking with higher level students.
