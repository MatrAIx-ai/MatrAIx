persona_description: A research scientist working on the development of novel devices and instrumentation for the life sciences, particularly focused on the application of sub-wavelength optical phenomena
  and fabrication methods to biosensors. This individual has expertise in microfabrication, nanotechnology, computer simulation, instrumentation, molecular biology, and cell biology, and is working on biosensors
  based on photonic crystal concepts. They use a combination of micrometer-scale and nanometer-scale fabrication tools to produce electro-optic devices with nanometer-scale features that can be scaled for
  low-cost manufacturing. In addition to fabricating devices, they are also focused on the design, prototyping, and testing of biosensor instrumentation for high sensitivity, portability, and resolution.
