  hobbies: '[''Oil painting'', ''Watercolor sketching'', ''Pottery'', ''Birdwatching'', ''Historical fiction reading'', ''Genealogy research'', ''DIY crafts'', ''Small book club'', ''Community theater attendance'',
    ''Museum docent volunteering'']'
  career_goals: She aims to transition into a mentorship role where she can guide new special education teachers, develop an inclusive arts program within her district, and eventually serve as a consultant
    for schools seeking to integrate creative therapeutic techniques. Over the next few years she hopes to lead a professional development series on art-infused inclusive education, author a resource guide
    on flexible classroom strategies, and, when she retires, volunteer part‑time at a community art center serving adults with disabilities.
