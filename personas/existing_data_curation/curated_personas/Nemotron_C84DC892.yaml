personas:
  professional: Britt Cummings, a veteran special education teacher with three decades of experience, they blend a relaxed, improvisational classroom style with art‑infused therapeutic techniques, expertly
    crafting Individualized Education Programs, deploying assistive technologies, and mentoring new teachers while championing an inclusive arts program district‑wide.
  sports: Britt Cummings, an avid member of the Birdsong Trail Walkers club, they enjoy leisurely countryside strolls with binoculars, cheer for the Carolina Hurricanes during winter hockey season, support
    the Duke Blue Devils in March Madness, and practice gentle yoga to manage knee stiffness.
  arts: Britt Cummings, a dedicated watercolorist and occasional potter, they draw inspiration from folk‑art motifs of Andrew Jackson Poe and the luminous palettes of Claude Monet, regularly volunteer as
    a docent at the regional historical museum, and unwind by listening to folk legends like Janis Ian and attending productions at the local Community Theatre.
  travel: Britt Cummings, a thoughtful road‑tripper, they have explored the historic streets of Savannah and the Blue Ridge Parkway’s misty overlooks, dream of strolling through Florence’s art‑filled piazzas,
    yet prefer calm weekend stays at a lakeside cabin in the North Carolina Piedmont, balancing curiosity with low‑stress getaways.
  culinary: Britt Cummings, a passionate home‑cook, they love crafting Southern classics such as shrimp and grits seasoned with smoked paprika, baking peach cobbler with fresh garden peaches, and serving
    fried chicken alongside collard greens and cornbread, while experimenting with minimalist plating inspired by their pottery work.
  core: Britt Cummings, a caring educator who weaves art into special‑needs teaching, they balance a love for quiet walks, pottery, and community service with a relaxed, occasionally scattered approach
    to finances and health, quietly worrying about each new IEP while nurturing harmony in every setting.
background:
  cultural: Britt grew up in a small, rural community in eastern North Carolina, shaped by the region’s Southern hospitality, Methodist church traditions, and a strong emphasis on community and self‑reliance.
    Her upbringing in a predominantly white, agricultural environment cultivated a respect for folk art, home‑cooked Southern cuisine, and storytelling. These cultural influences inform her appreciation
    for art, her collaborative spirit, and her emphasis on harmony and support within both her classroom and broader community.
attributes:
  skills: '[''Special Education Instruction'', ''IEP Development'', ''Assistive Technology Integration'', ''Behavior Management'', ''Collaborative Teamwork'', ''Art-Based Therapeutic Strategies'', ''Differentiated
