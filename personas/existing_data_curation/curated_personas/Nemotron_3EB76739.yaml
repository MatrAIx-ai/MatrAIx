  career_goals: Although still a toddler, Elmore's caregivers nurture his natural inclination toward structure and helping others. They envision a future where he pursues a career that combines organization
    with service, such as a teacher, nurse, or community outreach coordinator. His long-term ambition is to create stable, supportive environments for families in his San Diego neighborhood.
