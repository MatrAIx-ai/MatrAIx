  hobbies: '[''soccer'', ''hiking'', ''reading adventure novels'', ''LEGO building'', ''drawing and painting'', ''Girl Scouts'', ''baking'', ''listening to bluegrass music'']'
  career_goals: Kymberly dreams of graduating high school with honors, earning a scholarship, and studying environmental science or veterinary medicine. She hopes to become a wildlife rehabilitator or veterinarian
    who can help local animals and educate her community about caring for nature. She also wants to stay involved in community service, perhaps leading youth programs that combine her love of nature and
    organized teamwork.
