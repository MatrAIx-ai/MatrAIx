personas:
  professional: Kandice French, a 17‑year‑old aspiring nurse, leverages her meticulous organization, reliable nature, and sociable energy to coordinate volunteer health‑fair events and manage detailed schedules,
    showcasing how they thrive under pressure and turn anxiety into focused planning.
  sports: Kandice French channels her athletic spirit through high‑school cheerleading, weekend canoe trips on nearby bayous, and they avidly follow the New Orleans Saints, LSU Tigers, and New Orleans Pelicans,
    while also participating in a local youth fishing club that meets each summer.
  arts: Kandice French blends her love of music by performing in the church youth choir and curating playlists that feature Clifton Chenier, Buckwheat Zydeco, Carrie Underwood, and Lauren Daigle, allowing
    the rhythms of Cajun, Zydeco, and country to shape their creative identity.
  travel: Kandice French enjoys short road trips to nearby bayou festivals, has visited New Orleans for Mardi Gras celebrations, and they dream of a spring break in Nashville to explore its music scene,
    all while budgeting carefully due to a limited teen allowance.
  culinary: Kandice French excels at cooking family recipes like gumbo, crawfish étouffée, and jambalaya, expertly preparing a dark roux with okra and shrimp, and they sometimes forget to set a timer, ending
    up a little over‑cooked, which they laugh off as part of the learning process.
  core: Kandice French is a detail‑driven teen who balances a bustling social calendar with a nervous streak, and they channel worries into meticulous event planning, yoga, and a love of bayou‑inspired
    food and music.
background:
  cultural: Kandice comes from a white Southern family with deep Acadian‑French roots typical of Vermilion Parish. Growing up in Youngsville, she was raised in a close‑knit community where Catholic traditions
    and Southern hospitality are central. Family gatherings often feature Cajun cuisine such as gumbo and boudin, and celebrations include Mardi Gras festivities and local Zydeco music. She understands
    a few French phrases spoken by older relatives, reflecting the bilingual heritage of the area. The community’s emphasis on helping neighbors, active church involvement, and respect for tradition shape
    her values and daily life.
attributes:
  skills: '["Event planning","Schedule management","Team coordination","Basic first aid","Public speaking","Microsoft Office proficiency","Social media coordination","Budgeting and expense tracking","Customer
