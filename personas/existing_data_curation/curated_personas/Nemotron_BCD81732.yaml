  hobbies: '["Cheerleading","Church youth choir","Event planning for friends and community","Cooking Cajun dishes","Listening to Cajun and country music","Yoga and journaling","Canoeing","Attending local
    festivals","Fishing"]'
  career_goals: Kandice plans to complete her GED within the next year and enroll in a community college health‑sciences program. Her long‑term ambition is to become a registered nurse, drawn by her desire
    to help others and her ability to stay organized under pressure. She hopes to work in community health, leading outreach initiatives that provide preventive care and education to families in Vermilion
    Parish. While focused on nursing, she also considers a backup path in office administration, where she could apply her planning and coordination strengths in a healthcare setting.
