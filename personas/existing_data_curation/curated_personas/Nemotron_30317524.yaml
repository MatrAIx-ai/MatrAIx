    makerspace facilitation'']'
  hobbies: '[''Robotics and electronics tinkering'', ''Playing acoustic guitar'', ''Watercolor sketching of prairie landscapes'', ''Reading science-fiction and popular science'', ''Hiking and nature photography'',
    ''Competitive chess'', ''Attending local art galleries'', ''Participating in community maker events'']'
  career_goals: Thomas aspires to become a district STEM coordinator within the next five years, seeking a master's degree in education with a focus on STEM leadership. He aims to secure a grant to expand
    the school's makerspace, develop a district-wide STEAM curriculum that embeds artistic creation into science lessons, and earn recognition through state teaching innovation awards. Long-term, he envisions
    moving into instructional coaching or school administration, where he can mentor new teachers, champion evidence-based instructional practices, and influence curriculum policy while maintaining a classroom
    presence that nurtures curiosity.
