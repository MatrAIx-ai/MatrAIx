personas:
  professional: Thomas Owenby, a 22‑year‑old elementary STEM teacher, blends rigorous data‑driven assessment with hands‑on robotics and watercolor storytelling, leveraging their competitive edge to push
    students toward inventive problem‑solving while maintaining a flexible classroom atmosphere.
  sports: Thomas Owenby spends weekend mornings trekking the Gypsum Creek trail, cheering on the Nebraska Cornhuskers football team while maintaining a casual membership in the local community running club,
    although their competitive streak sometimes pushes them to sprint the final mile alone despite the group’s pace.
  arts: Thomas Owenby finds creative release in playing acoustic guitar with a penchant for improvising melodies reminiscent of Sufjan Stevens, painting watercolor prairie vistas inspired by the works of
    Thomas Moran, and regularly attending exhibitions featuring the photography of Ansel Adams, all of which color their lesson plans with artistic flair.
  travel: Thomas Owenby favors road trips that combine scenic stops at the Sandhills of Nebraska and occasional urban explorations in Chicago’s museum district, planning itineraries on a spreadsheet that
    balances budget constraints with a desire for spontaneous photography opportunities, yet they occasionally overpack their guitar and Arduino kits, causing last‑minute baggage hassles.
  culinary: Thomas Owenby enjoys crafting homemade pesto with fresh basil and pine nuts, grilling corn on the cob during summer barbecues, and occasionally ordering spicy ramen from a local Korean spot
    after late‑night grading sessions, though they have a habit of skipping breakfast and relying on coffee to power early‑morning lesson prep.
  core: Thomas Owenby is a curiosity‑driven, slightly skeptical young educator who mixes robotics, watercolor, and guitar riffs into a competitive, yet flexible, approach to life, often juggling spreadsheets
    and skipping meals in pursuit of the next big idea.
background:
  cultural: Thomas grew up in a middle-class, predominantly white Midwestern family in the suburbs of Bellevue, Nebraska. His upbringing emphasized hardworking, community-oriented values typical of Sarpy
    County, with an early encouragement of education and self-reliance. While his family's cultural roots are modest and Protestant-influenced, Thomas has been exposed to a broader cultural palette through
    school art programs, regional museums, and trips to nearby urban centers. He blends the region's practical, modest sensibility with an openness to diverse ideas, reflecting a balance of traditional
    Midwestern community spirit and a curiosity for unconventional perspectives.
attributes:
  skills: '[''STEM curriculum development'', ''Inquiry-based instruction'', ''Classroom management'', ''Technology integration (Google Classroom, interactive whiteboards)'', ''Robotics and coding (Scratch,
