persona_description: A geneticist who specializes in comparative genomics, particularly in the analysis of mammalian genomes and the study of human diseases related to large-scale genomic abnormalities.
  He/she is interested in the conservation of genes and regulatory sequences in the human genome, the loss of olfactory receptor genes during evolution, and the role of the human mitochondrial genome in
  genetic diseases. The individual is also interested in the discovery of additional features under selection for biological function in the genome, such as non-coding RNA and chromosomal structural elements.
