persona_description: A public health researcher who is interested in the prevalence and distribution of chronic joint symptoms in the United States. They are particularly interested in the age group of
  18-64 years old and the impact of arthritis on this age group. They are looking for updated estimates of arthritis prevalence in the US adults and are skeptical of the accuracy of previous estimates.
  They are also interested in the potential implications of these estimates on the allocation of resources for research, prevention, and treatment of arthritis conditions.
