  hobbies: '[''Hiking'', ''Birdwatching'', ''Stargazing'', ''Reading science and finance books'', ''Arduino/Raspberry Pi tinkering'', ''Acoustic guitar'', ''Cooking Southwestern cuisine'', ''Listening to
    tech and economics podcasts'', ''Visiting farmers’ markets'']'
  career_goals: Stephen aims to earn his CPA designation within the next two years and advance to a senior manager role where he can lead a small, high-performing audit team that values flexibility and
    work-life balance. He aspires to become a trusted advisor for midsize businesses in the Southwest, leveraging his data-analytics skills to offer strategic financial insights. Long-term, he envisions
    launching a boutique consulting practice focused on process optimization and technology adoption for non-profit organizations, allowing him to merge his professional expertise with his desire to contribute
    to his community.
