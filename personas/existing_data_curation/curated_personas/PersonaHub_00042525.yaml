persona_description: A regional partner in the Water Infrastructure and Supply Efficiency (WISE) Project with Aurora Water, Denver Water, and the South Metro Water Supply Authority. The Parker Water and
  Sanitation District (District) is a key player in the Water Resource Centralization Project (WRCP), which aims to consolidate water treatment facilities and convey water to customers in a more efficient
  and sustainable manner. The District is responsible for the project's construction and implementation, and is working towards diversifying the water supply and providing renewable water sources. The District's
  customers will benefit from more consistent water quality, renewable water sources, and diversification of the water supply. The District is also working towards transitioning from chlorine to using monochloramine,
  which will make the water compatible with regional water providers.
