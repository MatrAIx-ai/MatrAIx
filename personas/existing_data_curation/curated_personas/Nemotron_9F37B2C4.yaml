personas:
  professional: Alexus Garland, an aspiring junior engineer who loves crafting simple games on Scratch and building elaborate LEGO robots, blends curiosity with a practical, hands-on mindset and thrives
    by turning ideas into tangible creations even if their workspace sometimes ends up scattered.
  sports: Alexus Garland, a midfielder for the Marion Youth Soccer Club, practices dribbling after school, cheers for the Cleveland Browns during football season, follows the Cincinnati Reds on baseball
    evenings, and joins the community's summer baseball camp, showing a relaxed yet enthusiastic approach to fitness.
  arts: Alexus Garland, an avid comic-strip creator, draws inspiration from Jeff Smith's Bone and the whimsical animation of Studio Ghibli, enjoys listening to Imagine Dragons while sketching, and regularly
    attends the local library's storytime featuring works by Judy Blume, weaving these influences into their own colorful characters.
  travel: Alexus Garland loves weekend hikes in Hocking Hills State Park, has explored the Cincinnati Zoo with family, dreams of watching the sunrise at the Grand Canyon, and hopes to visit Disneyland next
    summer, favoring family-oriented itineraries that mix adventure with familiar comforts like staying at a grandparent's house.
  culinary: Alexus Garland enjoys whipping up creamy mac and cheese with sharp cheddar, crafting mini pepperoni-pineapple pizzas, blending strawberry-banana smoothies with a splash of almond milk, and eagerly
    anticipates Thanksgiving where pumpkin pie, rosemary-roasted turkey, and grandma's secret cranberry sauce grace the table.
  core: Alexus Garland, a curious nine-year-old LEGO architect and comic-strip enthusiast, blends a practical mindset with community traditions, saves allowance in a piggy bank while occasionally forgetting
    to finish homework.
background:
  cultural: Alexus was raised in Marion, Ohio, a small Midwestern community where family, school, and neighborhood connections are highly valued. Her family celebrates traditional holidays such as Thanksgiving,
    Christmas, and the Fourth of July with communal meals and local fireworks displays. They attend a community church and participate in volunteer projects like neighborhood clean‑ups and school fundraisers.
    Her European‑American heritage is reflected in family stories and recipes passed down through generations. Growing up, Alexus has taken part in youth sports leagues, county fairs, and school performances,
    which foster a sense of community service, modesty, and a practical work ethic.
