  hobbies: '[''Cooking Mexican cuisine'', ''Playing soccer'', ''Community basketball'', ''Gardening chilies, tomatoes, and herbs'', ''Participating in cultural festivals and dancing'', ''Volunteering for
    event organization'', ''Car tinkering and repairs'', ''Watching documentaries'']'
  career_goals: Luis aims to re‑enter the workforce by pursuing a certification in HVAC or a commercial driver’s license, fields that combine his mechanical aptitude with reliable, steady employment. In
    the short term he wants a stable entry‑level role in logistics, warehousing, or maintenance where his reliability, organization, and bilingual abilities are valued. Long‑term, he dreams of opening a
    small food‑truck business that serves authentic Mexican street food, merging his cooking passion with entrepreneurial ambition.
