personas:
  professional: Luis Arias is a methodical, bilingual problem‑solver who leverages their hands‑on automotive and carpentry skills to deliver reliable logistics and maintenance support, while they competitively
    push to exceed performance metrics and meticulously organize small‑scale events.
  sports: Luis Arias fuels their competitive spirit by joining the Batesville community soccer league and a local basketball club, frequently cheering for the Arkansas Razorbacks and the Memphis Grizzlies
    while they balance weekend pick‑up games with a disciplined personal fitness routine that includes evening jogs around the park.
  arts: Luis Arias immerses themselves in cultural arts by dancing cumbia and salsa to the sounds of Celia Cruz, Los Tigres del Norte, and Carlos Vives at local festivals, volunteering to organize the annual
    Cinco de Mayo celebration, and they also enjoy documentary series on engineering and history for both inspiration and entertainment.
  travel: Luis Arias prefers road‑trip adventures in their 1995 Corolla, planning detailed itineraries that blend culinary research with cultural immersion, such as weekend drives to Mexico City for authentic
    street‑food tasting, a yearly pilgrimage to Oaxaca’s food markets, and occasional getaways to Austin and New Orleans for music festivals, all while staying within a modest travel budget.
  culinary: Luis Arias showcases their love for flavor by perfecting tacos al pastor with pineapple‑marinated pork, simmering mole poblano with a blend of dried chilies and chocolate, and crafting fresh
    salsa verde from garden‑grown jalapeños and cilantro, while they experiment with fusion twists like mole‑glazed grilled corn, reflecting a balance of tradition and curiosity.
  core: Luis Arias is a competitive, organized multitasker who blends hands‑on mechanics, bilingual event coordination, and a passion for authentic Mexican street food into a pragmatic yet adventurous life.
background:
  cultural: Luis was raised in a Mexican‑American household; his parents immigrated from Jalisco and instilled in him a deep appreciation for Mexican traditions, language, and food. He grew up bilingual,
    celebrating holidays such as Día de los Muertos, Las Posadas, and Cinco de Mayo with family and the local Mexican community. Living in Arkansas, he blends his heritage with Mid‑Southern influences,
    participating in both Mexican cultural events and broader community gatherings. His cultural identity shapes his social interactions, cooking, and his desire to act as a bridge between Spanish‑speaking
    residents and the wider community.
attributes:
  skills: '[''Automotive maintenance and repair'', ''Basic carpentry and woodworking'', ''Spanish‑English bilingual translation'', ''Event planning and coordination'', ''Customer service and communication'',
