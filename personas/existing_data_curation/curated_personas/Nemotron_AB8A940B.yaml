personas:
  professional: Rachael Joyner, a senior UI/UX and graphic designer, leverages deep typographic expertise and a disciplined project-management mindset to translate complex brand narratives into immersive
    AR experiences, all while maintaining a skeptical eye toward client proposals.
  sports: Rachael Joyner, a dedicated hiker, joins the Santa Monica Hikers Club for weekend treks, follows the Los Angeles Lakers during the basketball season, and occasionally attends LA Dodgers games,
    while maintaining a weekly yoga routine to balance endurance and flexibility.
  arts: Rachael Joyner, an avid museum-goer, sketches on-site at LACMA exhibitions, draws inspiration from James Turrell’s light installations and David Hockney’s Los Angeles landscapes, and curates intimate
    design meet-ups where they discuss Ansel Adams’ photography and the writings of Susan Sontag.
  travel: Rachael Joyner, a meticulous planner, prefers curated cultural trips such as a design-focused itinerary through Kyoto’s contemporary art scene, a week-long road trip along the Pacific Coast Highway
    ending in Big Sur, and annual weekend getaways to Joshua Tree for stargazing, always budgeting travel expenses in advance.
  culinary: Rachael Joyner, a methodical home chef, experiments with global flavors by mastering Korean kimchi, Moroccan tagine with preserved lemons, and Japanese ramen broth, documenting each batch in
    a leather-bound recipe journal while sourcing fresh heirloom tomatoes and smoked paprika for seasonal dishes.
  core: Rachael Joyner, a 43-year-old design strategist, blends disciplined project leadership with a restless curiosity for art and technology, balancing meticulous budgeting and health routines with a
    penchant for solitary sketching and an occasional competitive edge.
background:
  cultural: Rachael was raised in the suburban neighborhoods of Los Angeles County, where the multicultural tapestry of the region shaped her appreciation for diverse artistic expressions. Though she identifies
    as white American, her exposure to the vibrant Latino, Asian, and African‑American communities in Northridge and greater Los Angeles has fostered a deep respect for cross‑cultural aesthetics and narratives.
    She values the independent, self‑reliant ethos often associated with Californian culture while also embracing the collaborative spirit of the local arts scene. This blend of personal heritage and regional
    influence informs her design sensibility and her openness to unconventional ideas.
