  hobbies: '[''Visiting art galleries and museums'', ''Sketching and illustration'', ''Photography (urban/architectural)'', ''Experimental cooking and recipe journaling'', ''Hiking in the Santa Monica Mountains'',
    ''Succulent gardening'', ''Yoga and mindfulness practice'', ''Reading design theory, philosophy, and art criticism'', ''Attending intimate design talks'', ''Strategic board games with small groups'']'
  career_goals: Rachael aims to transition from senior designer to Creative Director at a forward‑thinking agency where she can shape the visual language of high‑impact campaigns. She plans to launch a
    boutique studio that blends fine art sensibilities with digital experiences, positioning herself as a thought leader in sustainable and immersive design. Within the next five years, she hopes to exhibit
    a series of personal experimental installations in Los Angeles galleries and to mentor emerging designers through curated workshops, while continuing to push the boundaries of design technology.
