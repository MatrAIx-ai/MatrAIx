persona_description: A marine biologist who specializes in coral reef ecology and conservation, particularly in the impact of climate change on coral bleaching events and the recovery of affected reefs.
  This individual has experience working with the Wildlife Conservation Society's Rapid Response Unit and has firsthand knowledge of the severity of the coral bleaching event in the Indian Ocean. They are
  aware of the immediate and intensive management required to help the affected reefs recover and adapt, but also recognize that this recovery will be challenging due to the scale of the sea surface temperature
  anomaly and the vulnerability of the affected communities.
