persona_description: A group of students and researchers from various engineering colleges in Mumbai who are engaged in projects related to waste management and pollution control. They are working on building
  simulated automation systems for waste treatment plants, collecting samples of water and soil around Mithi river and testing them for pollutants, and studying the scale of water pollution in Mithi river
  and its impact on the soil around the river, as part of their final-year project. They are also working on finding technological solutions for better waste management in the city.
