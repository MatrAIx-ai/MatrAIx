personas:
  professional: Daniel Kwolkoski is a budding engineer-in-training, whose methodical approach to LEGO construction foreshadows a future career in mechanical design, while their competitive spirit and meticulous
    planning already set them apart among classmates.
  sports: Daniel Kwolkoski charges onto the field every Saturday with the River Valley Kickers youth soccer team, idolizes Manchester United’s midfield maestros, and balances their kinetic energy by pedaling
    their blue bike to the local park while occasionally cheering for the New York Knicks during family basketball nights.
  arts: Daniel Kwolkoski channels their imagination through intricate LEGO builds and picture‑book voyages to the stars, while humming along to The Wiggles, singing the theme from Mo Mo Mo, and delighting
    in the animated adventures of Pixar’s Toy Story and the whimsical illustrations of Dr. Seuss.
  travel: Daniel Kwolkoski prefers family road trips that blend excitement with routine, eagerly recalling their recent adventure to Walt Disney World’s Space Mountain and a sunny day at the Grand Canyon,
    while dreaming of a future visit to Space Center Houston where they can see real rockets up close.
  culinary: Daniel Kwolkoski favors cheesy macaroni, crispy chicken nuggets, and pepperoni pizza topped with extra mozzarella, while proudly mastering the art of spreading peanut butter on toast and sipping
    strawberry‑banana smoothies blended with milk and a dash of honey.
  core: Daniel Kwolkoski is a fiercely competitive six‑year‑old who blends a love for structure with boundless energy, yet often frets over tiny setbacks and hides a secret stash of candy behind LEGO bricks.
background:
  cultural: Daniel is a White American child raised in suburban Fort Worth, Texas. He experiences the region's blend of Southern hospitality and Mid‑Western values—family gatherings, Sunday school, community
    fairs, and a love for local sports like football and baseball. His upbringing reflects typical Texan kid culture, with an emphasis on politeness, neighborly cooperation, and a respect for routine and
    structure.
