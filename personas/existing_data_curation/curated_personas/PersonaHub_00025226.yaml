persona_description: A plant biologist and researcher at Cold Spring Harbor Laboratory, Marja Timmermans, who has discovered a new family of mobile small RNAs that pattern the top/bottom axis in leaves,
  establishing a concentration gradient that divides the developing leaf into a top and bottom half with different specialized cell types. Her work challenges the traditional understanding of how plants
  establish their polar axis and opens up new possibilities for understanding plant development.
