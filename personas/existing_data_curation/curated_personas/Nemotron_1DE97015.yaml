  hobbies: '["Fusion cooking","Yoga and meditation","Hiking","Street photography","Reading contemporary fiction","Attending cultural festivals","Volunteering at community kitchen","Gardening"]'
  career_goals: Tam aims to step into a senior operations leadership role where she can shape strategic initiatives, mentor diverse teams, and champion inclusive workplace culture. Over the next two years
    she plans to earn a Six Sigma Black Belt and a PMP certification, positioning herself for an Operations Manager position. Long‑term, she envisions launching a boutique consulting practice that helps
    small businesses adopt sustainable, technology‑driven process improvements while also promoting employee wellbeing and resilience.
