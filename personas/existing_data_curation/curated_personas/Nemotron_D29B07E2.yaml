  hobbies: '[''Salsa dancing'', ''Bachata classes'', ''Beach volleyball'', ''Exploring Miami’s food scene'', ''Cooking Colombian cuisine'', ''Financial literacy volunteering'', ''Listening to finance podcasts'',
    ''Street photography'', ''Traveling to Colombia'']'
  career_goals: Short‑term, Ana aims to complete her CPA certification while gaining experience in internal audit and financial analysis within a mid‑size public accounting firm that serves Latin American
    clients. Within the next three to five years she aspires to become a senior accountant or audit supervisor, leading a small team and overseeing complex audit engagements. Long‑term, she envisions opening
    her own consulting boutique that provides bookkeeping, tax, and financial advisory services to small businesses in the Colombian‑American community, leveraging her bilingual skills and cultural insight.
    Continuous professional development, mastering cloud‑based accounting platforms, and expanding her network through industry events are central to her ambition.
