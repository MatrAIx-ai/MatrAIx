  career_goals: Inspired by his desire to help others and maintain order, Jose dreams of becoming a community firefighter or a teacher, jobs that offer clear routines and the chance to keep people safe
    and supported. He also imagines caring for animals as a veterinarian, reflecting his kindness toward pets and neighborhood animals. Ultimately, he seeks a stable, structured career where he can contribute
    to his community while following a dependable schedule.
