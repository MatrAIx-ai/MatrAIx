personas:
  professional: Jose Beltran, a budding junior game developer, combines meticulous Scratch coding with collaborative playtesting sessions, using their organized, methodical approach to design games that
    keep friends engaged and maintain harmony in the classroom.
  sports: Jose Beltran, a dedicated midfielder for the Eastside Youth Soccer Academy, emulates the play style of the LA Galaxy, attends weekly practice sessions at the community field, and follows the Los
    Angeles Dodgers for cross-sport inspiration, always using a pre-game routine to stay organized.
  arts: Jose Beltran, an enthusiastic LEGO architect and cartoon sketcher, draws inspiration from Pixar films and Stan Lee’s vivid illustrations, spends weekends building elaborate LEGO cityscapes while
    humming traditional dance rhythms from cultural rehearsals, and proudly displays their creations at school art fairs.
  travel: Jose Beltran, an adventurous 9-year-old, loves family trips to the nearby beach town of Santa Monica, has a bucket-list entry for a weekend at Disneyland, dreams of exploring the Grand Canyon,
    and prefers organized itineraries with set playtimes, though they often worry about missing their favorite snack stops.
  culinary: Jose Beltran, a junior kitchen helper, eagerly assembles tacos and quesadillas with corn tortillas, shredded cheddar, fresh salsa, and sliced avocado, mastering the art of folding the tortilla
    while occasionally over-salting the salsa, and delights in sharing the homemade feast with friends after soccer practice.
  core: Jose Beltran, a sociable 9-year-old who balances methodical routines with occasional worry-driven over-thinking, turns group soccer games, LEGO builds, and Scratch coding into creative projects
    while never forgetting to help stir the salsa.
background:
  cultural: Jose comes from a Mexican family rooted in Fresno's vibrant agricultural community. He grows up bilingual, speaking Spanish at home and English at school, and his daily life is infused with
    Mexican traditions—celebrating Día de los Muertos, enjoying homemade tamales, and attending Sunday Mass with his extended family. The close‑knit family structure teaches him the value of cooperation,
    respect for elders, and community service, shaping his practical outlook and desire to maintain harmony in both home and school environments.
