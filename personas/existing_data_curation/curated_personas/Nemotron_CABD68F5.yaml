personas:
  professional: Vilma Lopez, a 25‑year‑old bilingual school counseling specialist, blends her STEM analytical training with counseling certification to craft evidence‑based career‑planning roadmaps, expertly
    interprets psychometric data, and maintains meticulous documentation and a structured session framework that mirrors her practical, organized personality; they also excel at workshop facilitation and
    crisis intervention.
  sports: Vilma Lopez stays active by hiking the Wasatch foothills with the Wasatch Trail Runners club, practicing yoga at the Utah Wellness Center, hitting the slopes at Park City in winter, rooting for
    the Utah Jazz and Real Salt Lake, and they occasionally join a community soccer pick‑up league.
  arts: Vilma Lopez captures landscape photographs inspired by Ansel Adams, immerses themselves in contemporary fiction by Neil Gaiman and Chimamanda Ngozi Adichie, expresses rhythm through vibrant folk
    dance, and they find inspiration in the music of Carlos Santana and the films of Pedro Almodóvar.
  travel: Vilma Lopez prefers meticulously planned outdoor getaways that blend adventure with cultural immersion, often backpacking through Zion and the Grand Canyon, scheduling weekend road trips to New
    Mexico’s pueblos, dreaming of a spring visit to Barcelona’s architecture, and they balance spontaneity with a detailed itinerary to soothe their anxiety.
  culinary: Vilma Lopez enjoys cooking traditional dishes such as tamales and mole at a semi‑professional level, skillfully balancing masa, roasted chilies, and chocolate, while also experimenting with
    farm‑to‑table salads featuring avocado, corn, and lime, and they regularly seek out street‑food tacos to refine their palate.
  core: Vilma Lopez blends analytical precision with heartfelt compassion, harmonizing structured counseling sessions with spontaneous folk dance, and they habitually rely on caffeine and meticulous time‑blocking
    to power through late‑night work while grappling with bouts of anxiety.
background:
  cultural: 'Vilma was raised in a Mexican household where Spanish and family traditions were central. Celebrations such as Día de los Muertos and quinceañeras reinforced a strong sense of community and
    respect for cultural rituals. Growing up in West Valley City’s vibrant Hispanic neighborhood, she bridges Mexican collectivist values with the individualistic expectations of U.S. educational settings.
    This dual perspective informs her counseling style: she emphasizes family involvement, acknowledges cultural identity as a strength, and leverages her bilingual skills to ensure students feel seen and
    supported.'
attributes:
  skills: '[''Career counseling'', ''Educational assessment'', ''Data‑driven advising'', ''Bilingual communication (Spanish/English)'', ''Workshop facilitation'', ''Conflict resolution'', ''Crisis intervention'',
    ''Program development'', ''Report writing'', ''Time management'']'
  hobbies: '[''Hiking'', ''Folk dance'', ''Cooking Mexican cuisine'', ''Volunteer mentoring'', ''Reading'', ''Yoga'', ''Photography'']'
  career_goals: Vilma aims to become a fully licensed school counselor and later a district-level mental‑health coordinator, where she can implement technology‑enhanced guidance systems that track student
    progress in real time. She aspires to design outreach programs specifically for first‑generation Latino students, fostering equitable access to college and career resources. In the next five years she
    plans to earn a Master’s in Counseling, lead professional development workshops for teachers on socio‑emotional learning, and eventually influence policy on culturally responsive counseling practices.
