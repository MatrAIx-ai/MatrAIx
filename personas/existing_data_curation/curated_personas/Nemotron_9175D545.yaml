  career_goals: Although retired, Gizelle aims to remain intellectually active by authoring a memoir that captures her lifelong experiences in education and community service. She aspires to establish a
    small intergenerational art studio in Arvada that pairs seniors with local schoolchildren for collaborative projects. Additionally, she seeks to mentor emerging teachers through a quarterly mentorship
    circle, contribute research to the local historical society, and develop a digital archive of Colorado’s mid‑20th‑century educational materials.
