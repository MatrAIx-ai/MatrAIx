  career_goals: Shirley aspires to combine her love of marine science and visual storytelling by pursuing a career as a marine biologist‑documentarian. She hopes to win regional science fairs, earn a scholarship
    to a specialized high‑school STEM program, and later study environmental science and photography at a research university. Ultimately, she wants to explore and protect the coastal ecosystems of the
    Pacific Northwest while creating compelling visual media that educates the public.
