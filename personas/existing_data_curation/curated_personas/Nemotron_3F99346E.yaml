personas:
  professional: Shirley Clark, a budding game developer, writes simple Scratch games that blend fantasy narratives with logical puzzles, using their meticulous organization and competitive edge to meet
    high standards while carefully testing each mechanic before sharing with friends.
  sports: Shirley Clark, a member of the local youth surf club and occasional midfielder for the Oakridge Tigers soccer team, roots for the Portland Timbers and tracks the Oregon Ducks football season,
    blending their competitive drive with coastal swimming laps that serve as both fitness and tide‑pool research, and they often record lap times in a digital log.
  arts: Shirley Clark, an avid reader of Neil Gaiman and J.K. Rowling, draws digital fan art inspired by Hayao Miyazaki's animated worlds, curates a personal playlist featuring Tame Impala and Billie Eilish,
    and spends weekends sketching seashell patterns while reflecting on the interdisciplinary connections between fantasy literature and marine photography, which they often share on a private online gallery.
  travel: Shirley Clark dreams of exploring the basalt cliffs of Iceland and the coral reefs of Belize after cataloguing local gems like Cannon Beach and Crater Lake in their bullet journal, favoring meticulously
    planned trips that balance adventure photography with quiet reading sessions in remote cabins, and they always draft a detailed itinerary before booking any travel.
  culinary: Shirley Clark favors fresh Pacific salmon and sushi rolls, often whipping up quick avocado toast or homemade mac and cheese while experimenting with sea‑salt caramel desserts, and occasionally
    splurges on a slice of pepperoni pizza after a long coding session, documenting each recipe in a dedicated art‑themed notebook where they annotate flavor notes with colored stickers.
  core: Shirley Clark is a fiercely organized 12‑year‑old explorer of fantasy realms and tide pools, who channels their curiosity into solitary creativity, balances a competitive streak with a habit of
    over‑scheduling, and they occasionally hoard sea‑shells as trophies.
background:
  cultural: Shirley comes from a white, middle‑class family in Tillamook, Oregon, a small coastal town known for its dairy farms and rugged shoreline. The community values self‑reliance, environmental stewardship,
    and a close connection to nature, which has fostered her fascination with marine life and the outdoors. Local traditions such as county fairs, library reading programs, and school clubs provide a supportive
    yet private environment that aligns with her reserved nature. Growing up in the Pacific Northwest, she is influenced by the region’s progressive attitudes toward sustainability and the arts, shaping
    both her academic ambitions and creative pursuits.
attributes:
  skills: '["Academic research", "Critical reading", "Mathematical problem solving", "Digital illustration", "Sketching", "Bullet journaling", "Project planning", "Basic coding (Scratch)", "Photography",
