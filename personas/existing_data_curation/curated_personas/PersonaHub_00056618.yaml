persona_description: A technician or repair specialist who specializes in troubleshooting and repairing electrical equipment, particularly motors and generators. This person has experience with troubleshooting
  and repairing motors using a variety of techniques, including the use of capacitors, fuses, and insulated handle screwdrivers. They are familiar with the different types of motors and their operation,
  including the salient-pole type universal motor and the shaded-pole single-phase induction motor. This person has a strong attention to detail and is skilled in using tools and equipment to diagnose and
  fix electrical issues.
