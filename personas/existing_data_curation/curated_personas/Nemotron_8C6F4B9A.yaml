  career_goals: Mollie dreams of a future where she can explore both art and science. She is fascinated by space and imagines herself as an astronaut who records the beauty of the cosmos through illustration.
    She also envisions working as a museum curator or exhibit designer, creating interactive displays that teach others about history and nature. Occasionally, she thinks about becoming a teacher, hoping
    to inspire younger children to ask questions and appreciate creativity. Overall, her ambition is to combine curiosity, artistic expression, and a desire to help her community learn.
