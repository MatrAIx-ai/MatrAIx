personas:
  professional: Mollie Causey is an aspiring junior cartoonist whose curiosity fuels weekly sketch sessions, leading small‑group mural projects in her after‑school art club while maintaining a meticulously
    organized sketchbook and embracing the flexibility to experiment with new story ideas.
  sports: Mollie Causey thrills to weekend soccer games with the Riverdale Rangers youth team, practices basic freestyle strokes at the local community pool, roots for the Los Angeles Lakers with a poster
    on their bedroom wall, but prefers quiet nature walks and solo stretching over large, organized team sports.
  arts: Mollie Causey channels a love for whimsical illustration into sketchbooks brimming with characters inspired by Bill Watterson’s Calvin and Hobbes and Studio Ghibli’s Totoro, while listening to Miles Davis’s
    ‘Kind of Blue’ and Alicia Keys’s ‘Fallin’ during art club sessions, and they keep a scrapbook featuring favorite works by Georgia O’Keeffe and the vibrant street murals of Banksy.
  travel: Mollie Causey favors family‑oriented road trips that blend museum visits—such as exploring the Columbia Museum of Art in Columbia, Missouri—with nature hikes in the Great Smoky Mountains, and
    they dream of a future adventure to the Louvre in Paris and a summer camp excursion to the geysers of Yellowstone National Park.
  culinary: Mollie Causey delights in bright, easy‑to‑handle foods like strawberry‑banana smoothies, peanut butter and jelly sandwiches cut into cartoon shapes, and homemade pizza topped with mozzarella,
    pepperoni, and fresh basil, often experimenting with leaf‑shaped cookie cutters after collecting leaves on park walks.
  core: Mollie Causey is a curious, organized nine‑year‑old who balances a passion for drawing fantastical worlds and creating LEGO structures with a meticulous sticker collection, a modest savings plan,
    and a quiet love for solo nature walks and small‑group art collaborations.
background:
  cultural: Mollie is an African‑American child growing up in Columbia, South Carolina, within a close‑knit extended family that values storytelling, music, and community. Her grandparents share oral histories
    and traditions from the African diaspora, enriching her sense of identity. She attends a local elementary school that celebrates Black History Month with projects and guests, reinforcing pride in her
    heritage. The family regularly participates in church events and community festivals such as Juneteenth and the Columbia Food & Music Festival, where she experiences a blend of Southern cuisine, gospel
    music, and vibrant cultural performances. These experiences foster her appreciation for art, history, and collective memory, shaping her curiosity about the wider world while grounding her in a supportive
    cultural environment.
