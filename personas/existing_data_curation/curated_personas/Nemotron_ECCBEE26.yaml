personas:
  professional: Ricardo Fernandez is a budding robotics enthusiast who thrives on hands‑on problem solving, applying the practical routines he values to design competition‑ready bots while often letting
    school deadlines slip due to his laid‑back approach to obligations.
  sports: Ricardo Fernandez plays forward for the local youth soccer team, idolizes LAFC, regularly hits the skate park with friends as a member of the 'Street Rippers' crew, and hops on the seasonal hot‑day
    training sessions to stay fit despite occasional over‑exertion.
  arts: Ricardo Fernandez channels his creative side into short TikTok clips of skate tricks and family cooking, curates playlists featuring Bad Bunny and J Balvin, and scribbles in a personal journal where
    they process stress through lyrical snippets and doodles.
  travel: Ricardo Fernandez dreams of traveling to Barcelona to watch world‑class skateboarders at the famous skate plazas and to explore a bustling music festival like Primavera Sound, but budget constraints
    and school commitments currently keep their adventures limited to weekend trips to nearby amusement parks.
  culinary: Ricardo Fernandez enjoys mastering a spicy taco recipe with corn tortillas, seasoned pork, fresh cilantro, and a squeeze of lime, while also perfecting tamales stuffed with chile‑infused masa,
    often filming the process for TikTok despite occasional kitchen messes caused by a distracted, multitasking habit.
  core: Ricardo Fernandez is a socially vibrant, routine‑oriented teen who balances competitive gaming, soccer, skateboarding, robotics, and spicy kitchen experiments while wrestling with anxiety and a
    tendency to procrastinate on responsibilities.
background:
  cultural: Ricardo is a Mexican‑American teen growing up in Chino, California, a city with a vibrant Latino community. He is bilingual, speaking Spanish at home and English at school, and he participates
    in family traditions such as Día de los Muertos altars, Cinco de Mayo celebrations, and weekend gatherings featuring music, food, and storytelling. His family's emphasis on hard work and respect for
    elders shapes his practical outlook, while the multicultural environment of Los Angeles County exposes him to a blend of cultures, fostering both a strong sense of identity and an openness to diverse
    experiences.
