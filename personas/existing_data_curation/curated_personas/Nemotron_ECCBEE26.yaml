  career_goals: Ricardo hopes to finish high school and pursue a vocational program in automotive technology, aiming to become a certified mechanic who can one day run his own shop. He also keeps an eye
    on a possible scholarship in soccer, dreaming of playing at a collegiate level before transitioning to coaching. Ultimately, he wants a stable, hands‑on career that allows him to support his family
    while staying connected to his community.
