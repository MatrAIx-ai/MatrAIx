  hobbies: '[''Reading (fiction, self-help)'', ''Cooking Southern/Creole dishes'', ''Jogging and Zumba fitness classes'', ''Church participation and choir'', ''Volunteering at youth mentorship programs'',
    ''Visiting art galleries and museums'', ''Listening to R&B and blues music'', ''Quilting and craft making'', ''Exploring local food festivals'', ''Attending live music performances'']'
  career_goals: Trina aims to advance from retail sales associate to shift supervisor within the next year, then to store manager within three to four years. She plans to enroll in a retail management certificate
    program at Houston Community College and eventually pursue an associate's degree in Business Administration. Her long‑term ambition is to become a district manager for a national retailer, where she
    can mentor staff and implement strategies that improve employee retention and customer satisfaction. Additionally, Trina dreams of opening a boutique that showcases African‑American fashion designers
    and offers a community space for local creatives.
