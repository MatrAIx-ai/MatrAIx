personas:
  professional: Trina Dixon excels as a retail sales associate at a bustling apparel store, leveraging meticulous POS expertise, inventory organization, and conflict‑resolution skills to consistently exceed
    sales targets while coaching teammates and charting a clear path toward shift supervision and eventual district management.
  sports: Trina Dixon stays active by jogging three mornings a week in Memorial Park, joining the local Zumba squad that meets every Thursday, rooting for the Houston Astros and Houston Rockets during their
    respective seasons, and participates in the Memorial Running Club’s weekend long‑distance training runs and charity 5K events.
  arts: Trina Dixon expresses her artistic side through quilting, frequents the Contemporary Arts Museum Houston for rotating exhibits, and enjoys live R&B and blues shows featuring performers like Gregory
    Porter, Leon Bridges, and H.E.R., while also collecting prints from emerging local painters.
  travel: Trina Dixon plans her trips with a spreadsheet, opting for budget‑friendly weekend getaways to New Orleans for its jazz heritage and Charleston for its culinary scene, while dreaming of a summer
    road trip along the Gulf Coast with friends once her boutique launch supplies extra savings.
  culinary: Trina Dixon loves cooking Southern comfort foods with a modern twist, expertly preparing fried chicken with a honey‑chili glaze, collard greens sautéed with smoked turkey and a splash of apple
    cider vinegar, and a heart‑warming gumbo that marries Andouille sausage, okra, and a pinch of smoked paprika, often experimenting with sous‑vide techniques to perfect texture.
  core: Trina Dixon is a methodical, community‑focused dreamer who balances structured career ambitions with soulful Southern cooking, lively church involvement, and a knack for turning everyday routines
    into purposeful rituals.
background:
  cultural: Trina is an African-American woman raised in a close-knit Black community in Houston, Texas. Her upbringing was shaped by Southern Black traditions, strong church involvement, and family gatherings
    that celebrated heritage and resilience. She regularly participates in Juneteenth celebrations, attends the Houston Black Heritage Festival, and enjoys the city’s rich culinary scene of soul food and
    Tex-Mex influences. Music such as gospel, R&B, hip-hop, and blues are integral to her cultural identity. Trina’s values reflect a blend of Southern hospitality, community solidarity, and a commitment
    to uplifting her neighborhood through mentorship and cultural expression.
attributes:
