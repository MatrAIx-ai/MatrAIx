personas:
  professional: Miriam Arce, a seasoned front‑of‑house specialist with bilingual fluency and meticulous inventory control, leverages their competitive drive and methodical ethos to streamline restaurant
    operations while navigating guest conflicts with calm, brief mindfulness drills.
  sports: Miriam Arce keeps fit by attending weekly yoga classes at a downtown studio, joining a casual Saturday morning running group that supports the LA Marathon, and cheering on the LA Lakers and LA
    Galaxy, and they occasionally play pick‑up basketball at the community center.
  arts: Miriam Arce blends their love for visual storytelling and music by photographing street art for social media, painting acrylics inspired by folkloric motifs, and curating playlists that weave together
    cumbia legends like Celso Piña, reggae icons such as Bob Marley, and indie rock staples like Arcade Fire, while frequently visiting exhibitions at the Getty Center and LACMA featuring artists from Frida
    Kahlo to Kehinde Wiley.
  travel: Miriam Arce prefers thoughtfully planned cultural getaways, having already explored the vibrant murals of Mexico City and the historic plazas of Oaxaca, while they dream of a weekend art retreat
    in Barcelona’s Gothic Quarter and a culinary weekend in Kyoto, balancing modest travel budgets with occasional splurges on flight upgrades after particularly demanding restaurant seasons.
  culinary: Miriam Arce is a confident home chef who frequently perfects traditional pupusas and tamales using masa, cheese, and heirloom chilies, experiments with fusion dishes like quinoa‑infused guacamole,
    and seeks out farm‑to‑table eateries that feature locally sourced avocado and fresh corn, while they also indulge in occasional upscale tasting menus that showcase molecular gastronomy.
  core: Miriam Arce balances a fierce competitive streak in hospitality with a deep artistic soul, obsessively cataloguing street‑art photos on their phone, worrying about every detail, and they occasionally
    stay up late binge‑reading artist biographies, despite a lingering habit of forgetting to water their houseplants.
background:
  cultural: Miriam is a first‑generation Salvadoran‑American raised in the vibrant Latino neighborhoods of Los Angeles County. Bilingual in Spanish and English, she grew up in a close‑knit family that celebrated
    Salvadoran holidays such as Día de la Virgen de la Paz and traditional foods like yuca frita. Her Catholic upbringing instilled a sense of community service, leading her to volunteer at local cultural
    centers and church events. While she embraces American customs, she maintains strong ties to her heritage through cooking, music, and participation in the annual Feria Salvadoreña in nearby LA, blending
    her dual identity seamlessly into her daily life.
attributes:
  skills: '[''Customer service'', ''Food safety and sanitation'', ''POS system operation'', ''Barbacking and drink preparation'', ''Inventory management'', ''Shift scheduling and coordination'', ''Bilingual
    communication (Spanish/English)'', ''Conflict resolution'', ''Multitasking under pressure'', ''Attention to detail in presentation'', ''Stress management techniques'']'
  hobbies: '[''Visiting art museums (Getty, LACMA)'', ''Photography of street art and cultural events'', ''Painting acrylics with Salvadoran folk influences'', ''Cooking traditional Salvadoran dishes (pupusas,
    tamales)'', ''Attending community cultural festivals'', ''Yoga and mindfulness meditation'', ''Reading biographies of artists and innovators'', ''Listening to diverse music (cumbia, reggae, indie rock)'']'
  career_goals: Miriam aims to move from a support role into a supervisory position within the hospitality sector, such as floor manager or assistant restaurant manager, where she can apply her organizational
    talents to improve team efficiency and service quality. She also dreams of earning a certificate in hospitality management at a community college, which would position her for a future as a café owner
    that blends Salvadoran culinary traditions with contemporary art‑themed events. Her curiosity drives her to explore innovative service concepts, and she hopes to eventually curate small cultural gatherings
    that showcase local artists while serving authentic Salvadoran dishes.
