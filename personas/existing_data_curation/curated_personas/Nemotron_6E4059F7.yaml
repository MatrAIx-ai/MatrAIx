  hobbies: '["Painting (acrylic and watercolor)", "Digital photography", "Woodworking and furniture making", "Gardening (vegetable and herb)", "Listening to jazz and gospel music", "Reading art and local
    history", "Attending and singing in church choir", "Storytelling and genealogical research", "Cooking traditional family recipes"]'
  career_goals: Although currently not in the formal workforce, Nathan aims to translate his curiosity and cooperative spirit into purposeful community involvement. His primary ambition is to serve as a
    volunteer arts facilitator at the local community center, leading workshops in painting, photography, and woodworking for seniors and young people. He hopes to curate a traveling exhibit that highlights
    African American contributions to Pennsylvania's coal‑mining heritage, thereby preserving local history and fostering intergenerational dialogue. Nathan also aspires to develop a modest online portfolio
    of his photographs and paintings, which could open occasional freelance opportunities and provide supplemental income for his household. Finally, he seeks to maintain personal well‑being by establishing
    a regular creative practice that mitigates his stress and worry, ensuring he remains a supportive partner and community member.
