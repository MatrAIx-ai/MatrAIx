  career_goals: Over the next five years Penny aims to advance from her current general manager role to a regional operations director overseeing multiple locations across the Southwest. To deepen her expertise
    in process optimization, she plans to earn professional certifications such as Six Sigma Green Belt and Project Management Professional (PMP). Long‑term, she hopes to lead sustainability initiatives
    within operations and to create inclusive, high‑performing teams that balance efficiency with employee well‑being, while also serving as a mentor for aspiring managers.
