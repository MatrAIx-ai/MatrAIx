  career_goals: Mitchell envisions a future where his love for visual storytelling merges with technology. In the short term, he plans to build a strong portfolio through summer art camps, local workshops,
    and online challenges, aiming to earn a scholarship to a specialized high‑school program in graphic design or interactive media. Long‑term, he hopes to become a concept artist or multimedia designer
    for the video‑game or film industry, and eventually launch his own indie studio that combines his coding basics with character and environment art. He also dreams of integrating sustainable design principles
    into his work, drawing inspiration from Nevada’s natural landscapes.
