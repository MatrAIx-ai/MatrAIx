personas:
  professional: Mitchell More is an aspiring digital concept artist who blends traditional sketching with tablet work, channeling their curiosity and competitive streak into rapid design iterations and
    eagerly seeking peer feedback while keeping a disciplined schedule that balances school responsibilities.
  sports: Mitchell More is the point guard on their high school basketball team and a frequent participant in pick‑up games at the community gym, cheering for the Los Angeles Lakers, Los Angeles Rams, and
    Los Angeles Dodgers while training with the local youth sports club, showcasing a competitive edge tempered by reliable teamwork.
  arts: Mitchell More spends weekends sketching characters inspired by Hayao Miyazaki, James Cameron, and concept artist Bobby Chiu, attends community theater productions of classic sci‑fi plays, and follows
    street‑artist Banksy’s latest pieces, reflecting a curiosity for narrative art and an openness to unconventional ideas.
  travel: Mitchell More loves weekend hikes in the Sierra Nevada, dreams of exploring Joshua Tree’s desert art installations, and hopes to visit Kyoto’s bamboo forest and Barcelona’s vibrant street‑art
    scene, preferring a mix of carefully planned routes and spontaneous photo stops.
  culinary: Mitchell More enjoys casual meals like pepperoni pizza and ramen, while experimenting with avocado toast topped with smoked salmon and sesame seeds, displaying moderate cooking skills and a
    penchant for tweaking familiar dishes with bold ingredients.
  core: Mitchell More is a curious, competitive teen who balances sketchbooks, robotics, and basketball, often drinks too many energy drinks before gaming, and keeps a skeptical eye on peers while staying
    emotionally steady.
background:
  cultural: Mitchell grew up in Carson City, Nevada, a small but historically rich community at the edge of the Great Basin. His family is middle‑class and reflects a typical white American upbringing that
    values self‑reliance, community involvement, and an appreciation for the outdoors. The local culture blends frontier heritage—celebrated through Nevada Day events and museum exhibits on mining history—with
    modern suburban life, giving him easy access to wilderness areas for hiking, fishing, and photography as well as a growing digital scene of gaming and online art communities. Attending a public middle
    school, he is exposed to a curriculum that emphasizes both regional history and contemporary technology, shaping a worldview that balances traditional American values with an openness to new ideas and
    unconventional thinking.
