personas:
  professional: A seasoned elementary/middle school teacher, Vasundhara Petro leverages their curiosity and charismatic presence to craft interdisciplinary STEAM curricula that weave art projects, digital
    tools, and community gallery partnerships, while balancing firm classroom organization with spontaneous learning moments as they pursue a future role as district instructional coach.
  sports: A fitness-oriented enthusiast, Vasundhara Petro hikes the Adirondack trails on weekends, practices yoga twice a week at a downtown studio, cheers the Buffalo Bills during football season and the
    Buffalo Sabres in hockey playoffs, and plays on a co-ed adult softball league that meets every Thursday evening.
  arts: An avid arts aficionado, Vasundhara Petro spends afternoons watercoloring landscapes inspired by Georgia O'Keeffe, performs in a community theater troupe staging Arthur Miller dramas, frequents
    the Albright-Knox to view contemporary works by Kehinde Wiley, and dives into novels by Zadie Smith and education studies by Dylan Wiliam, often sharing insights during lively book-club discussions.
  travel: An adventurous traveler, Vasundhara Petro plans eclectic weekend escapes, having trekked the fjords of Norway, explored the historic streets of Kyoto, savored street food in Oaxaca, and now dreams
    of witnessing the aurora borealis in Iceland, while balancing these trips with family obligations and a modest travel fund.
  culinary: Culinary curiosity drives Vasundhara Petro to experiment with eclectic dishes such as Thai green curry with fresh kaffir lime, Moroccan chicken tagine spiced with ras el hanout, and Italian
    risotto enriched with wild mushrooms, cooking at an intermediate skill level and sourcing ingredients like turmeric, miso, and locally foraged herbs from the farmer's market, though they occasionally
    order sushi for convenience.
  core: Vasundhara Petro is a curiosity-fueled, talkative educator who channels artistic flair into lesson planning, tackles weekly karaoke with unabashed enthusiasm, splurges on gourmet spices, and habitually
    forgets to file tax receipts until the deadline rush.
background:
  cultural: Vasundhara identifies as white with mixed English, Irish, and German ancestry. She grew up in a suburban community in Erie County, Western New York, where seasonal rhythms - from snowy winters
    to vibrant fall foliage - shaped her appreciation for nature and local traditions. The region's strong community focus, love of Buffalo sports teams, and rich cultural calendar - including festivals,
    farmers' markets, and museum events - have informed her inclusive worldview. While she respects the diverse cultural backgrounds of her students, she draws on her own Midwestern-East Coast upbringing
    to emphasize collaboration, hard work, and an openness to new ideas.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''STEAM Integration'', ''Digital Classroom Technology'', ''Classroom Management'', ''Public Speaking'', ''Conflict Resolution'', ''Mentorship'',
