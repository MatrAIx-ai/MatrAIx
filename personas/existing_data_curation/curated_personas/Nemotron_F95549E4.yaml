  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Community Theater Acting'', ''Set Design'', ''Contemporary Fiction Reading'', ''Hiking'', ''Yoga'', ''Cooking International
    Dishes'', ''Book Club'', ''Volunteer Tutoring'', ''Karaoke'']'
  career_goals: Vasundhara aims to deepen her impact on education by earning a master's degree in Curriculum and Instruction and moving into a district-level instructional coach role. She envisions leading
    professional development workshops that champion arts integration and culturally responsive teaching, eventually progressing toward a curriculum specialist position or school leadership as an assistant
    principal. Concurrently, she hopes to launch a community art-exhibit program that showcases student creativity and fosters partnerships with local galleries and cultural institutions.
