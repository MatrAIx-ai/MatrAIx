persona_description: A researcher interested in the study of communication and technology in the context of the C generation, particularly in the areas of mobile communications, the Internet, and networking.
  They are curious about how this group of young people is communicating with one another and how their evolving communication methods may impact their perceptions of human rights, personal power, and the
  future of digital technology. They are also interested in understanding how digital technology may be used as a battleground for access to the perceived global truth and justice, or whether the languages
  they come from will begin to morph into a new universal format that embraces multiple cultures and solidify the complex global world.
