  hobbies: '[''Metal sculpting'', ''Landscape photography'', ''Boating'', ''Fishing'', ''Gardening'', ''Attending art festivals'', ''Volunteering at senior center'', ''Community theater'', ''Classic rock
    music'']'
  career_goals: Looking ahead, Robert aims to obtain his AWS Certified Welder credential and transition to a mentorship role, training apprentices at his plant and teaching occasional evening courses at
    the local community college. He also hopes to launch a small side business creating custom metal art pieces for local galleries and private clients, merging his technical skills with his love of art.
    Ultimately, he wants to secure a comfortable retirement while leaving a legacy of craftsmanship, community service, and artistic contribution.
