personas:
  professional: Robert Cherp is a veteran welder and metal fabricator with mastery of MIG, TIG, and SMAW techniques, who leverages their methodical organization and curiosity to lead small teams, mentor
    apprentices, and sculpt bespoke metal artworks for galleries while preparing for AWS Certified Welder certification.
  sports: Robert Cherp enjoys staying active on the water and on land, regularly participating in the St. Lucie River Boating Club seniors fishing league, cheering for the Tampa Bay Rays baseball team and
    the Miami Heat basketball team, and joining a weekend golf group at Palm Beach Country Club while maintaining a basic fitness routine of morning stretches.
  arts: Robert Cherp expresses their artistic soul through metal sculpting and photography, drawing inspiration from the precision of Donald Judd’s sculptures, the dramatic lighting of Ansel Adams, the
    classic rock energy of The Rolling Stones and Led Zeppelin at local concerts, and the storytelling of community theater productions like Our Town, while attending the annual Florida Art Festival every
    spring.
  travel: Robert Cherp’s travel style blends meticulous planning with a love for spontaneous coastal adventures, having sailed to the Florida Keys, explored the historic streets of Charleston, taken a dream
    cruise to the Bahamas, and hoping to someday photograph the cliffs of the Amalfi Coast and visit the jazz clubs of New Orleans.
  culinary: Robert Cherp prefers fresh seafood and Southern comfort cuisine, often grilling grouper with lemon‑caper butter, cooking shrimp scampi with garlic and parsley, baking key lime pie from scratch,
    and experimenting with smoked paprika in a slow‑cooked gumbo, all while proudly showcasing their modest but growing culinary skills at family gatherings.
  core: Robert Cherp is a methodical, socially vibrant 61‑year‑old who fuses a lifelong passion for welding with an artistic curiosity, a compassionate community spirit, and a penchant for meticulously
    organized toolboxes—though they sometimes forget to water their garden when caught up in a new metal project.
background:
  cultural: Robert was raised in a middle‑class, white Anglo‑American family in the southeastern United States, with early memories of summer trips to the Atlantic coast and the values of hard work, self‑reliance,
    and community involvement that characterized the post‑World‑War II era. Living most of his adult life in Stuart, Florida, he has absorbed the region’s coastal culture, including a love of boating, fishing,
    and local arts events, while maintaining broader American traditions of patriotism, volunteerism, and an appreciation for practical, hands‑on skills.
