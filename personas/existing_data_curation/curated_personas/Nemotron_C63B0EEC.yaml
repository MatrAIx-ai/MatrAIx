  hobbies: '[''Art gallery visits'', ''Museum tours'', ''Gentle yoga'', ''Coastal walks'', ''Reading scientific journals and speculative fiction'', ''Native‑plant gardening'', ''Birdwatching'', ''Mentoring
    high‑school STEM clubs'', ''Participating in small book‑discussion groups'', ''Attending university guest lectures'']'
  career_goals: In retirement, Kathleen is focused on deepening her lifelong learning, particularly at the intersection of science and the arts. She aims to develop a volunteer program that brings interdisciplinary
    workshops to local schools and senior centers, fostering curiosity and empathy. She also hopes to author a reflective memoir that weaves personal narratives with scientific insights, and to expand a
    modest community garden that serves as an educational hub for sustainable practices. Maintaining health and independence while contributing to her community are central to her ambitions.
