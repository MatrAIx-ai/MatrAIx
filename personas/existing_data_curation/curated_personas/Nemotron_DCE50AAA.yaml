  hobbies: '[''Gardening'', ''Reading Historical Biographies'', ''Model Train Building'', ''Lakefront Walking'', ''Digital Photography'', ''Volunteering at Food Pantry'']'
  career_goals: Although retired, Patrick aims to stay physically and mentally active to preserve his independence. He wants to mentor younger family members and neighbors, sharing his practical knowledge
    of home maintenance and budgeting. He hopes to document the history of Kenosha's working‑class neighborhoods for the local historical society, ensuring stories are recorded before they're lost. He also
    aspires to continue supporting his spouse, maintain a harmonious household, and manage his health to reduce stress and anxiety.
