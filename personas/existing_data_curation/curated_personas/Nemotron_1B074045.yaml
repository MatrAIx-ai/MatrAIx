  career_goals: In his next career phase Stephen aims to transition from senior design engineer to a recognized technical leader within the automotive or renewable-energy sectors. He seeks to lead high-impact
    R&D projects that integrate additive manufacturing and advanced composites into sustainable products. A long-term ambition is to establish his own boutique engineering consultancy that offers independent
    validation services and strategic design consulting for startups in Orange County. He also aspires to earn multiple patents, publish peer-reviewed papers on lightweight structures, and be invited as
    a subject-matter expert for industry panels—goals that align with his competitive drive and desire for professional acknowledgment.
