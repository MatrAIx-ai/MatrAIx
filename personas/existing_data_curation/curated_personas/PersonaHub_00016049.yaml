persona_description: A biologist who specializes in the study of metabolism, focusing on the processes that organisms use to generate energy and maintain life. They are particularly interested in the interactions
  between anabolic and catabolic reactions, the role of enzymes in growth and anabolic reactions, and the importance of energy in maintaining cellular function and organismal health. They are also knowledgeable
  about the transfer of light energy into chemical potential energy and the use of ATP to transfer energy to various energy-requiring processes in living organisms.
