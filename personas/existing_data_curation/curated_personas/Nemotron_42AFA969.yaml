  hobbies: '[''Competitive video gaming'', ''Online gaming tournaments'', ''Pick‑up basketball'', ''Skateboarding'', ''Video editing for gaming highlights'', ''TikTok content creation'', ''Basic beat‑making/music
    production'', ''Automotive tinkering and forum participation'']'
  career_goals: As he approaches the end of high school, Micheal’s primary ambition is to secure a stable, hands‑on career that offers both structure and the chance to showcase his competitive drive. His
    short‑term goal is to obtain a GED and enroll in a vocational program for automotive technology at a local community college, where he can turn his informal car‑maintenance knowledge into certified
    expertise. Simultaneously, he hopes to build a modest online presence by streaming his gaming sessions and sharing edited highlight reels, aiming to generate a side income and eventually transition
    into full‑time content creation or e‑sports coaching. In the longer term, he envisions opening his own custom‑bike workshop that doubles as a community hub for local teens, merging his love for mechanics,
    entrepreneurship, and mentorship. Throughout, he remains focused on achieving financial independence and proving his capabilities despite the challenges of his educational background.
