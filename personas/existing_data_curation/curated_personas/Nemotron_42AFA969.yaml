personas:
  professional: Micheal Mejia, a 17‑year‑old aspiring automotive technician, leverages their hands‑on tinkering with cars and strategic gaming instincts to pursue a vocational program while building a modest
    streaming channel that showcases their competitive drive and desire for community mentorship.
  sports: Micheal Mejia, an avid basketball player who participates in the St. Johns Community Center pick‑up league and supports the Miami Heat, also spends weekends at the local skate park mastering new
    tricks, balancing competitive court play with street‑style skating.
  arts: Micheal Mejia, a creative teen who edits gaming highlights on DaVinci Resolve, crafts beat‑making loops inspired by Kendrick Lamar, J. Cole, and Bad Bunny, and tags his skateboard with graffiti
    motifs reminiscent of Banksy, infusing music and street art into everyday expression.
  travel: Micheal Mejia, who loves spontaneous road trips, has driven from Saint Johns to Orlando for a Comic‑Con, dreams of attending the Los Angeles Gamers Expo and visiting Mexico City’s historic neighborhoods
    to taste authentic street tacos, yet often waits for a discount before booking flights.
  culinary: Micheal Mejia, a teen food enthusiast who alternates between Sunday fried chicken with collard greens and Saturday arroz con pollo, experiments with homemade chipotle marinades for the family’s
    barbecues, but admits to over‑seasoning dishes when trying to impress friends.
  core: Micheal Mejia is a competitive, tech‑savvy teen who blends hands‑on car tinkering, basketball hustle, and gaming hustle, juggling ambition with a relaxed approach to planning and occasional forgetfulness.
background:
  cultural: Micheal grows up in Saint Johns, Florida, within a mixed African‑American and Latino household, reflecting both Black and Hispanic cultural traditions. Family gatherings often feature Southern
    soul food alongside Latin dishes such as arroz con pollo, and music ranges from classic hip‑hop and R&B to reggaeton and salsa. He celebrates cultural holidays like Juneteenth, Kwanzaa, and Hispanic
    Heritage Month, which reinforce a sense of pride in his dual heritage. The local community’s strong basketball culture and street‑art scene have shaped his social circles, while his church’s youth programs
    provide mentorship and a supportive network. This multicultural environment gives him a layered identity that influences his tastes in music, food, language (he occasionally uses Spanish phrases), and
    his outlook on resilience and community responsibility.
