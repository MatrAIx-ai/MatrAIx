persona_description: A scientist or ecologist who is interested in the study of bird populations and their dynamics, particularly in the context of extinction risk. This persona is likely to be interested
  in understanding how environmental stochasticity and population growth rate affect the risk of extinction for bird populations, and how these relationships can be used to predict time to extinction. They
  may be particularly interested in the specific life history characteristics of bird species and how they relate to their risk of extinction. This persona would also be interested in the implications of
  these findings for the viability of bird populations and the minimum sizes of viable populations.
