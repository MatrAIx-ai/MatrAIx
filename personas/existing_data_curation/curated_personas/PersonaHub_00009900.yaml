persona_description: A dedicated and experienced dairy sheep breeder who has specialized in breeding East Friesian Dairy Sheep for over 100 years, focusing on breeding the highest quality and genetically
  pure East Friesian Sheep in the world. They have moved their operation to North Carolina in 1994, maintaining the same focus on excellence and commitment to breeding the best animals and customers. Pinkeye,
  an inflammation of the eye caused by a Chlamydial agent, is a common and significant issue affecting the flock, and treatment with tetracycline antibiotic ointment is prescribed daily for several days,
  often requiring subconjunctival injection of antibiotics by a veterinarian for prolonged treatment. The persona is aware of the importance of separating infected animals, reducing dust, and controlling
  flies to prevent new cases of pinkeye, and is skilled in correcting the lower lid roll onto the eye to prevent permanent damage to the cornea.
