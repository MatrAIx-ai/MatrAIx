    along the Blackstone River'']'
  career_goals: Even at 80, Taylor aims to stay mentally active and socially connected. She wishes to complete a community‑based art class in watercolor painting, create a family scrapbook documenting her
    ancestry and local history, and learn basic digital skills so she can share stories online with distant relatives. She also hopes to mentor younger volunteers at the neighborhood senior center, helping
    them develop the same caring and flexible approaches she values. Maintaining her independence and finding calm through structured hobbies are central to her personal ambitions.
