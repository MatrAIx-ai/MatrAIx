  career_goals: Approaching retirement, Terrence aims to transition into a part‑time safety advisory role where he can codify his decades of experience into formal safety protocols for his plant. He also
    aspires to mentor a new generation of workers through a local apprenticeship program, offering hands‑on training and career guidance. Additionally, he hopes to be recognized with a lifetime achievement
    award from his employer and to contribute to community outreach projects that promote vocational education for youth in Celina.
