  hobbies: '[''Vegetable Gardening'', ''Quilting'', ''Snowshoeing'', ''Kayaking'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Jam and Preserve Making'', ''Library Volunteering'', ''Festival
    Organization'', ''Church Outreach'']'
  career_goals: Although retired from formal employment, Michelle aims to deepen her impact within Rhinelander by leading the local senior center’s activity program, mentoring younger volunteers, and preserving
    the town’s oral histories through a community archive project. She also aspires to complete a certified caregiver training course to support seniors in the area, and to publish a small booklet of family
    recipes and garden tips that reflects her practical, organized approach.
