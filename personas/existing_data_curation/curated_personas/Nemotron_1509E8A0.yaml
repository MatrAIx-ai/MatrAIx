personas:
  professional: A retired administrative professional, Michelle Liggon leverages decades of scheduling, budgeting, and volunteer leadership to orchestrate the senior center’s activity program and the town’s
    oral history archive, applying a meticulous, pragmatic problem‑solving mindset to every community project.
  sports: An outdoors enthusiast, Michelle Liggon treks the North Woods on snowshoes each winter, paddles a kayak on the Flambeau River in summer, belongs to the Rhinelander Senior Kayak Club, follows the
    Milwaukee Brewers and Green Bay Packers religiously, and participates in a weekly indoor cycling class at the senior center for low‑impact cardio.
  arts: A creative soul, Michelle Liggon stitches intricate quilts inspired by historic patterns, devours historical fiction by authors like Hilary Mantel and Ken Follett, enjoys folk music from Gillian
    Welch, attends community theater productions such as 'The Glass Menagerie' at the local playhouse, and displays pride in her growing collection of American folk art prints.
  travel: A methodical traveler, Michelle Liggon plans weekend getaways to the Apostle Islands and Door County using a detailed itinerary, dreams of exploring the colonial streets of Charleston, South Carolina
    for its historic architecture, and prefers low‑cost, group‑oriented tours that fit within her fixed retirement budget.
  culinary: A seasoned gardener‑cook, Michelle Liggon cultivates heirloom tomatoes, squash, and kale, transforms the harvest into homemade preserves like tomato jam, cucumber pickles, and blackberry compote,
    enjoys cooking rustic potato leek soup with fresh herbs, and, while proficient, sometimes overcooks jam batches, resulting in a bittersweet glaze she still shares with neighbors.
  core: Michelle Liggon is a disciplined 60‑year‑old retiree who channels her organized spirit into community leadership, frugal financial management, active outdoor pursuits, and a thriving garden‑to‑preserve
    culinary hobby.
background:
  cultural: Michelle grew up in a mid‑western white family with German‑Scandinavian roots, steeped in the practical, self‑reliant values of rural Wisconsin. Her upbringing emphasized hard work, community
    service, church involvement, and an appreciation for the natural environment of the Northwoods. These cultural influences shape her disciplined lifestyle, love of seasonal outdoor activities, and commitment
    to preserving local traditions.
attributes:
  skills: '[''Administrative Management'', ''Event Planning'', ''Volunteer Coordination'', ''Budgeting and Financial Record‑Keeping'', ''Microsoft Office Proficiency'', ''Home Maintenance and DIY'', ''Gardening'',
