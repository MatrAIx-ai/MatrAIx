persona_description: A public health advocate who is passionate about promoting healthy eating habits and physical activity among children and adolescents. This person is committed to preventing obesity
  and its health effects in Australia and is actively involved in advocating for policies and initiatives that promote healthy living. They are knowledgeable about the latest research and evidence-based
  guidelines on dietary and physical activity, and are dedicated to supporting mothers and their infants and toddlers in breastfeeding. This person is also aware of the importance of nutrition labelling
  and taxes on energy-dense/nutrient-poor foods, and is committed to working with the food industry and retail outlets to reduce the production, sale, and consumption of these products.
