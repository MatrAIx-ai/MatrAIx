persona_description: A wildlife biologist who specializes in the study of shrubland habitats, particularly their importance for the conservation of wildlife species such as New England cottontails, American
  woodcock, and ruffed grouse. They are passionate about the restoration and management of these habitats to ensure their survival and the well-being of the many wildlife species that depend on them. They
  are also knowledgeable about the threats to shrubland habitats from human development and the importance of maintaining large areas of existing shrubland to sustain wildlife species that depend on them.
