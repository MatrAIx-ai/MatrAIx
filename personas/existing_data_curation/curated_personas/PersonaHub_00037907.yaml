persona_description: A reading expert with a background in neuroscience and education, Dr. Dee Tadlock has dedicated his career to developing effective reading programs that foster fluent and comprehension-based
  reading in students of all ages and stages. He believes that reading is an innate process that requires the brain to simultaneously access all necessary information to anticipate the author's meaning
  and must be guided by consistent effort to produce excellent reading. Dr. Tadlock's methods have been successfully applied to transform struggling readers into excellent readers, including those with
  dyslexia, and he continues to refine his approach to ensure that reading is taught through the sounds of speech and not through an assumption that reading is primarily about figuring out what the words
  are.
