  hobbies: '[''Playing acoustic guitar'', ''Sketching and drawing'', ''Cooking Salvadoran dishes with family'', ''Creating TikTok videos'', ''Listening to reggaeton and cumbia music'', ''Reading young-adult
    fiction'', ''Walking in local parks'', ''Journaling for emotional processing'']'
  career_goals: She plans to complete her secondary education by obtaining a GED within the next two years, then enroll in a community college program focused on social work or mental‑health counseling,
    with the long‑term ambition of becoming a bilingual counselor who can support Salvadoran youth in Baltimore. At the same time, Odanis dreams of turning her love for cooking into a small‑scale culinary
    venture, such as a pop‑up food stand offering modern takes on pupusas, blending creativity, cultural heritage, and entrepreneurship. She also aims to further develop her digital media skills to produce
    content that raises awareness about mental‑health resources for teens.
