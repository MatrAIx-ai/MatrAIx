personas:
  professional: Odanis Salazar, an aspiring bilingual mental‑health advocate, merges self‑taught video editing with empathy to produce TikTok clips that blend motivational messages, acoustic guitar riffs,
    and quick cooking demos, while their laid‑back attitude toward deadlines often results in last‑minute uploads that nevertheless capture raw authenticity.
  sports: Odanis Salazar, an avid fan of the Baltimore Ravens and the Baltimore Orioles, spends weekend afternoons playing pickup soccer at Patterson Park and joins a community basketball league, balancing
    their love for team spirit with a preference for low‑key, flexible workouts that fit their relaxed schedule.
  arts: Odanis Salazar, a creative teen who strums acoustic guitar to reggaeton hits by Bad Bunny and cumbia rhythms from Carlos Vives, doodles sprawling cityscapes in sketchbooks, and devours YA novels
    like "One of Us Is Lying", channels artistic expression into poetry that captures intense emotions, while their natural curiosity drives constant experimentation with new media formats.
  travel: Odanis Salazar, a 16‑year‑old who dreams of culinary road trips, has explored nearby Washington, D.C.’s museum scene and the Atlantic shoreline at Ocean City, while pinning future trips to Mexico
    City and Guatemala City on a vision board for inspiration in both cooking and cultural storytelling.
  culinary: Odanis Salazar, a teenage home chef, perfects pupusas using masa harina, mozzarella cheese, and unconventional fillings like caramelized pineapple and chorizo, often paired with homemade curtido,
    while juggling occasional burnt‑tortilla mishaps and experimenting with tamales seasoned with chipotle and sweet corn, showcasing both skillful improvisation and a penchant for culinary trial‑and‑error.
  core: Odanis Salazar, a restless, guitar‑strumming, sketch‑loving teen who whips up inventive pupusas and crafts TikTok motivation clips, navigates waves of anxiety with journaling and occasional procrastination,
    and thrives on spontaneous creativity despite a habit of last‑minute planning.
background:
  cultural: Odanis grew up in a Salvadoran household in Dundalk, Maryland, where Spanish is spoken at home and cultural traditions are celebrated. Her family maintains strong ties to El Salvador, marking
    holidays such as Día de la Independencia with fireworks, pupusas, and community gatherings at the local Salvadoran church. She participates in the annual Salvadoran cultural festival in Baltimore, volunteering
    to help organize music and food stalls. These experiences have instilled a deep respect for her heritage and a desire to share Salvadoran culture with a wider audience.
