personas:
  professional: Angel Neff is a community‑oriented organizer who leverages her QuickBooks expertise and decades of volunteer coordination to streamline neighborhood projects, budget workshops, and senior
    advisory services with meticulous precision.
  sports: Angel Neff enjoys low‑impact fitness through weekly hikes on Lookout Mountain trail, follows the Denver Broncos, Colorado Avalanche, and Colorado Rockies, and participates in the Jefferson County
    Trail Club’s weekend walks, preferring solo or small‑group outings over crowded gyms.
  arts: Angel Neff immerses in historical fiction like Hilary Mantel’s Wolf Hall, knits patterns inspired by Mary Maxim designs, and unwinds to folk classics by John Denver and contemporary singer Gregory
    Alan Isakov, while occasionally attending a performance at the Denver Center for the Performing Arts.
  travel: Angel Neff favors meticulously planned trips, having toured the historic gardens of England’s Cotswolds, explored Asheville’s Blue Ridge Parkway, and plotted a future pilgrimage to the medieval
    streets of Bruges, always balancing time, budget, and a desire for quiet, culturally rich experiences.
  culinary: Angel Neff delights in baking sourdough starter breads, flaky croissants, and cinnamon rolls, seasoning them with garden‑grown rosemary, thyme, and fresh tomatoes in savory tarts, while relying
    on precise measurements and a well‑organized kitchen layout.
  core: Angel Neff is a structured, garden‑loving budget guru who blends quiet historical curiosity with meticulous organization, modest fitness, and a penchant for precise baking.
background:
  cultural: Angel comes from a middle-class white American background with family roots in German and Irish ancestry. Raised in the Midwest before moving to Colorado in her thirties, she embodies values
    of hard work, self-reliance, and community responsibility. Living in suburban Arvada, she participates in her local Lutheran church and neighborhood events, and embraces Colorado’s outdoors-oriented
    culture while maintaining the structured, family-centered traditions of her upbringing.
attributes:
  skills: '["Financial record-keeping", "Budgeting", "Household management", "Event coordination", "Volunteer scheduling", "Inventory control", "Conflict resolution", "QuickBooks", "Microsoft Excel", "Basic
    home maintenance", "Garden planning", "Time management"]'
  hobbies: '["Organic gardening", "Historical fiction reading", "Knitting", "Crocheting", "Crossword puzzles", "Sudoku", "Baking", "Hiking on local trails"]'
  career_goals: Although Angel is currently not in the paid workforce, she aims to channel her organizational strengths into community service and low-stress, purposeful engagements. She plans to join the
    Arvada Neighborhood Association board to help streamline community projects, volunteer as a budget advisor for senior citizens at the local senior center, and eventually launch a small home-based consulting
    service offering budgeting workshops for families. Angel also hopes to complete a certificate in gerontology to better support aging adults, and to mentor younger volunteers in effective project planning.
