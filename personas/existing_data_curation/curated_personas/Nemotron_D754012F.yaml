  career_goals: She aspires to merge her artistic talent with her organized mindset by pursuing a career in graphic design or multimedia animation. Melissa hopes to attend a specialized high school for
    the arts and later study visual communication or user experience design at a university. Her competitive drive pushes her to aim for top honors in school art competitions, science fairs, and tech challenges.
    In the long term, she envisions working in a creative studio that blends storytelling with technology, perhaps developing educational games that inspire curiosity in other youth. She also keeps a backup
    ambition of studying marine biology, motivated by the coastal environment of Long Island and her fascination with the natural world.
