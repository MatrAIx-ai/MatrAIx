  hobbies: '[''Art Gallery Visits'', ''Sketching'', ''Book Club'', ''Volunteer Art Teaching'', ''Gardening'', ''Yoga'', ''Meditation'', ''Social Potluck Dinners'', ''Dancing'', ''Road Trips'']'
  career_goals: Gen wants to transition into a senior administrative leadership role—such as Director of Office Services—where she can shape organizational culture to prioritize employee well‑being and
    mental‑health awareness. She aspires to develop a mentorship program that pairs seasoned staff with new hires and to champion a series of community‑focused art workshops that bring local creators into
    the workplace. On a personal level, she aims to refine her own coping strategies for anxiety through mindfulness training, and ultimately achieve a balanced retirement that still allows her to consult
    on workplace design and community arts initiatives.
