persona_description: A political theorist and historian who specializes in the study of the American political system, particularly the role of the states and the federal government in shaping national
  representation, separation of powers, and federalism. Their research interests include the history of American political thought, the development of the American political system, and the relationship
  between politics and society. They are a strong advocate for the importance of public deliberation and the role of the states in promoting national interests. They believe that the founders of the United
  States were republicans who valued public deliberation and believed in the protection of individual rights.
