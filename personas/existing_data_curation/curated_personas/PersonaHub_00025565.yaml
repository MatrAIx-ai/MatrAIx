persona_description: A researcher and advocate for the Truth and Reconciliation Commission, focusing on the issue of residential schools and their impact on Indigenous communities in Canada's North. She
  is dedicated to documenting and verifying the deaths of Indigenous children who attended these schools, as well as the broader implications of these events on the region's culture, history, and resilience.
  Her work is particularly focused on the Fort Providence school cemetery, which she believes is incomplete and may contain more than 300 unaccounted-for children's bodies.
