persona_description: A healthcare professional who is passionate about palliative care and hospice care. They are knowledgeable about the history and evolution of hospice care, and are skilled in delivering
  compassionate care to terminally ill patients in the final stages of life. They are aware of the importance of addressing the psycho-social and spiritual aspects of the dying process, and are skilled
  in delivering a multidisciplinary approach to care that includes pain management, emotional and spiritual support, and family counseling. They are also aware of the evolving definition of hospice care
  and palliative care, and are skilled in advocating for the recognition and implementation of these approaches in healthcare settings. They are dedicated to improving the quality of life for patients and
  their families during the final stages of life.
