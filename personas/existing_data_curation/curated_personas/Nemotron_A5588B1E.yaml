personas:
  professional: Aracele Garcia is a high‑school junior who combines strong swimming skills, bilingual communication, and a knack for digital photography to lead a water‑safety club at school while preparing
    a science‑fair project on coral health, reflecting their blend of curiosity, practicality, and calm organization.
  sports: Aracele Garcia swims with the local high‑school team, volunteers as a junior lifeguard at the community pool, and follows the Miami Dolphins and Orlando Magic, finding balance between structured
    training and casual beach runs.
  arts: Aracele Garcia immerses themselves in salsa and son records by Celia Cruz and Buena Vista Social Club while editing marine‑life photos inspired by Annie Leibovitz, and fills a small sketchbook with
    coastal landscapes during sunrise walks.
  travel: Aracele Garcia enjoys weekend trips to the Florida Keys and Everglades for snorkeling, dreams of studying marine ecosystems in the Bahamas, and plans future low‑cost backpacking trips to coastal
    research stations, always packing a waterproof camera and reusable water bottle.
  culinary: Aracele Garcia perfects family recipes such as ropa vieja and empanadas using fresh lime, sofrito, and plantains, frequently experimenting with grilled fish tacos seasoned with cumin and cilantro,
    and considers cooking a calming complement to their scientific studies.
  core: Aracele Garcia blends quiet curiosity with practical organization, channeling a love of ocean life, bilingual communication, and photography into a calm, resilient pursuit of marine conservation.
background:
  cultural: Aracele grew up in a Cuban‑American household anchored in Key Biscayne, where Spanish is spoken at home and English at school. Her family maintains strong ties to Cuban traditions, celebrating
    holidays like Nochebuena with shared meals, music, and storytelling. The vibrant Cuban community in Miami‑Dade County influences her daily life, from the flavors of the food she learns to cook to the
    rhythms of the music she enjoys. She values the emphasis on family cohesion, respect for elders, and the importance of community support. These cultural foundations shape her calm, considerate demeanor
    and her drive to give back, especially through bilingual outreach and environmental stewardship within her neighborhood.
attributes:
  skills: '[''Bilingual (English/Spanish)'', ''Basic computer proficiency (Google Suite, Microsoft Office)'', ''Digital photography and basic photo editing (Lightroom)'', ''Swim technique and water safety
    knowledge'', ''Basic culinary skills (Cuban cuisine)'', ''Time management and organization'', ''Collaborative group project coordination'']'
  hobbies: '[''Swimming and water safety practice'', ''Beachcombing and marine wildlife observation'', ''Digital photography of coastal scenes'', ''Cooking traditional Cuban dishes with family'', ''Listening
    to and practicing salsa music'', ''Reading marine biology and environmental science articles'', ''Sketching coastal landscapes'', ''Volunteering at the community garden'']'
  career_goals: Aracele aims to complete high school with honors and earn a scholarship to study marine biology or environmental science at a Florida university. She envisions a career that blends her scientific
    curiosity about ocean ecosystems with her practical desire to protect the local marine environment. Long‑term, she hopes to work in marine conservation, conducting research on coral health and coastal
    preservation, while using her bilingual abilities to educate and engage Spanish‑speaking communities about environmental stewardship. She also considers a future role in science outreach, creating visual
    media to make marine science accessible to youth.
