personas:
  professional: Elfa Riyad leverages over two decades of public accounting expertise, blending CPA precision with bilingual communication and instructional design to streamline financial reporting and mentor
    emerging talent, all while eyeing a future as CFO of a nonprofit arts organization.
  sports: Elfa Riyad follows the Dallas Cowboys in football and the Dallas Mavericks in basketball, joins a local Fort Worth yoga studio three times a week, and occasionally jogs the Trinity River trails
    to stay fit, though they prefer solitary workouts to team sports.
  arts: Elfa Riyad immerses themselves in contemporary Mexican and Latin American art at Fort Worth’s Modern Art Museum and Kimbell Gallery, curates street‑photography collections inspired by Día de los
    Muertos celebrations and shares them on Instagram, while drawing inspiration from artists like Frida Kahlo, Diego Rivera, and contemporary photographer Graciela Iturbide.
  travel: Elfa Riyad prefers thoughtfully planned cultural journeys, having explored Oaxaca’s historic centers and Mexico City’s vibrant murals, and they dream of a photography‑focused trip to Buenos Aires,
    while balancing a modest vacation budget with occasional weekend getaways to Austin’s music scene.
  culinary: Elfa Riyad cooks traditional dishes such as mole poblano, tamales, and chiles en nogada in their home kitchen, often adding a modern twist like quinoa‑infused masa or smoked paprika, sourcing
    fresh cilantro, jalapeños, and heirloom tomatoes from their garden, and they relish pairing meals with a crisp Mexican lager.
  core: Elfa Riyad balances analytical rigor and artistic curiosity, juggling a disciplined finance career with a love for street photography, yoga, and late‑night crossword puzzles, yet they cannot resist
    the occasional impulse to splurge on boutique kitchen gadgets.
background:
  cultural: Elfa is a first‑generation Mexican‑American whose parents emigrated from Jalisco. She grew up speaking Spanish at home and celebrates Mexican traditions such as Día de los Muertos, Semana Santa,
    and family tamale‑making evenings. In Fort Worth’s vibrant Latino community, she is active in the local cultural center, where she volunteers to teach basic financial literacy to Spanish‑speaking adults.
    Her bicultural identity informs her professional demeanor—she values personal relationships, respect, and harmony, and she brings these principles to client interactions and team collaboration. Elfa’s
    cultural background also shapes her artistic tastes, favoring Mexican folk art, muralism, and contemporary Latin American visual expression.
attributes:
