    ''Cross‑cultural collaboration'']'
  hobbies: '[''Visiting art museums and galleries'', ''Photography (street and cultural events)'', ''Cooking traditional Mexican cuisine with modern variations'', ''Gardening (vegetable and herb garden)'',
    ''Yoga and mindfulness meditation'', ''Participating in local cultural festivals (e.g., Día de los Muertos)'', ''Volunteering for arts‑education programs'', ''Solving puzzles (crosswords, sudoku)'']'
  career_goals: Elfa aims to progress to a senior leadership role such as Audit Manager or Controller within the next five years, eventually positioning herself for a CFO role in a midsize nonprofit arts
    organization where she can combine her financial expertise with her passion for the arts. She plans to complete her Certified Public Accountant (CPA) renewal and pursue a Master’s degree in Accounting
    to deepen her technical knowledge. Elfa also seeks to mentor emerging accountants, especially those from the Mexican‑American community, and to develop a volunteer‑based financial literacy program for
    local schools.
