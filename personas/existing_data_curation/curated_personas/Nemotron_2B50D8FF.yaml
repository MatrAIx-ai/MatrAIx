personas:
  professional: Alex Steere, a veteran front‑of‑house hospitality manager with three decades of experience, combines meticulous scheduling and conflict‑resolution skills with a warm, empathetic demeanor,
    making them the go‑to mentor for new staff and positioning them for a supervisory role within the next two years.
  sports: Alex Steere enjoys leisurely hikes on the foothills of the Front Range, participates in the Fort Collins Senior Center’s weekly walking group, and roots for the Colorado Rockies and Denver Broncos
    while occasionally joining a community pickleball league for light cardio.
  arts: Alex Steere finds creative balance in attending productions at the Fort Collins Community Playhouse, listening to folk legends like John Denver and Joan Baez, and savoring the timeless humor of
    Mark Twain and John Steinbeck in their evening reading ritual.
  travel: Alex Steere plans meticulous road trips to national treasures such as Rocky Mountain National Park, Yellowstone, and the historic coasts of New England, balancing the thrill of exploring with
    the comfort of familiar campgrounds and a modest travel budget.
  culinary: Alex Steere delights in cooking garden‑fresh tomato‑basil pasta, spicy pepper chili, and herb‑infused roast chicken, while mastering pour‑over coffee with beans from Black Coffee Roasters, yet
    sometimes forgets to add salt, causing a predictable blandness that they laugh off.
  core: Alex Steere, a routine‑loving, community‑centric retiree, blends meticulous hospitality expertise with a humble love for gardening, pour‑over coffee, and classic literature, even if they occasionally
    neglect stretching after hikes and hoard spare woodworking screws like tiny treasures.
background:
  cultural: Alex grew up in a middle‑class, predominantly white suburb of the Midwest before relocating to Colorado for college, where he adopted the state’s outdoor, community‑focused lifestyle. His upbringing
    emphasized practical values, hard work, and a strong sense of civic duty. In Fort Collins, he has integrated into a close‑knit local community that values sustainability, volunteerism, and a relaxed
    yet reliable social atmosphere. His cultural identity reflects a blend of traditional American middle‑class values with the progressive, environmentally conscious ethos of Colorado’s Front Range.
