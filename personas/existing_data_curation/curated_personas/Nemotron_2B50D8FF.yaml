  career_goals: Alex aims to move into a supervisory role within the next two years, focusing on staff development and operational consistency. He hopes to mentor younger teammates, introduce a structured
    mentorship program for new hires, and eventually serve as a part‑time consultant for local cafés on service excellence. After retirement, he envisions opening a small community coffee shop that emphasizes
    a warm, familiar environment, providing a gathering place for locals and supporting emerging artists and charitable initiatives.
