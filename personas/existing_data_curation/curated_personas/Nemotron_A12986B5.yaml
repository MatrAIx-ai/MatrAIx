personas:
  professional: Sean Dizon, a veteran grounds maintenance manager turned part‑time landscaping advisor, merges decades of horticultural expertise, irrigation design, and native Florida flora identification
    with a watercolor‑inspired eye for garden aesthetics, mentoring apprentices through informal, hands‑on workshops while embracing a relaxed, occasionally disorganized workflow that fuels their unconventional
    plant pairings and creative park installations.
  sports: Sean Dizon, an avid weekend fisherman on the Gulf and member of the Sarasota Sailing Club, follows the Tampa Bay Buccaneers with a loyal but laid‑back enthusiasm, joins a local senior‑center walking
    group for light cardio, and occasionally attends Miami Marlins games, preferring leisurely pursuits over intense competitive sports.
  arts: Sean Dizon, who paints watercolor sunsets inspired by Claude Monet and Georgia O’Keeffe, sails through Sarasota’s art galleries admiring works by contemporary Floridian artists, listens to Chet
    Baker’s jazz and The Rolling Stones’ classic rock while tending to garden beds, and occasionally attends performances at the Asolo Repertory Theatre, letting art’s improvisational spirit shape their
    design philosophy.
  travel: Sean Dizon, who favors spontaneous, low‑key getaways over rigid itineraries, enjoys small‑scale trips to coastal gems like Key West and historic towns such as Savannah, dreams of strolling through
    the lavender fields of Provence, and balances these adventures with a modest retirement budget that nudges them toward off‑season travel and road trips along the Gulf Coast.
  culinary: Sean Dizon, a confident home cook who delights in grilling fresh Gulf grouper with a citrus‑herb rub, preparing zesty key lime pie, and tossing garden‑harvested tomatoes into a fragrant basil‑pesto
    pasta, often seasons dishes with locally sourced rosemary and sea salt, while occasionally over‑seasoning in a burst of experimental flair.
  core: Sean Dizon, a 71‑year‑old garden‑savvy artist‑turn‑mentor, blends a laid‑back, curiosity‑driven outlook with a knack for unconventional plant pairings, a love of watercolor sunsets, and a habit
    of juggling hobby budgets and doctor appointments in equal measure.
background:
  cultural: Sean is a White American of Irish‑German descent, raised in the Midwest before relocating to Sarasota in his forties. His family background emphasized self‑reliance, modesty, and a strong work
    ethic, values that continue to shape his daily routines. The Gulf Coast’s vibrant cultural mix—its Latin culinary influences, vibrant arts scene, and love of outdoor living—has broadened his appreciation
    for diverse aesthetics and community engagement. While he maintains Midwestern traditions of punctuality and thrift (even if he occasionally lets a schedule slip), he embraces the relaxed, flexible
    lifestyle of Florida, blending his heritage with the region’s laid‑back, nature‑centric culture.
