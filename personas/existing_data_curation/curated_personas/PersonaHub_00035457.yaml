persona_description: A climate change adaptation specialist with expertise in developing and demonstrating tools and techniques for supporting the implementation of adaptation strategies in forests. They
  have worked with 20 partners from the UK, Germany, France, Netherlands, and Luxembourg to address the effects of climate change on forests and forestry across North West Europe. They have conducted comprehensive
  modelling of the impact of climate change scenarios on forest ecosystems in North West Europe and have developed tools, guidelines, and methodologies for risk assessments to identify how individual forests
  are most at risk from climate change or threats to goods and services. They have also developed a strategic decision support system for sustainable forestry management, forest protection, and water management.
  The persona has experience in working with future climate projections from UKCP09 and the project's own team of climate scientists in Luxembourg to assess the needs and options for climate change adaptation
  in a productive upland Sitka spruce forest in the Scottish Borders. They are monitoring the success of management and interventions with a set of indicators based on forest productive capacity, environmental
  quality, biodiversity maintenance, and social impacts.
