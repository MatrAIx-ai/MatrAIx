  career_goals: Anthony aims to step into a production planning manager role within the next three years, pursuing certifications such as APICS CPIM to formalize his expertise. He is particularly interested
    in integrating emerging technologies—IoT sensors for real‑time shop‑floor monitoring and data‑analytics dashboards—into his current workflow to boost efficiency and sustainability. In the longer term,
    he envisions launching a boutique consulting practice that helps small, remote manufacturers adopt lean and environmentally conscious practices while leveraging his knack for inventive, out‑of‑the‑box
    thinking.
