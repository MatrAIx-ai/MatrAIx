personas:
  professional: A budding junior soccer enthusiast, Catalina Vila channels their curiosity about nature into organizing neighborhood green-field games, using spontaneous energy to rally friends while sometimes
    struggling with the lack of structure that comes from their love of improvisation.
  sports: A lively soccer aficionado, Catalina Vila plays forward for the Kern River Youth Soccer Club U10 team, idolizes the LA Galaxy and cheers them on during MLS season, and also joins the community
    pool’s swim lessons in summer while keeping track of the local high‑school basketball team scores as a side interest.
  arts: A rhythmic dancer and craft lover, Catalina Vila spins to the lively beats of Los Ángeles Azules and Bad Bunny at family gatherings, creates bright papel picado for Día de los Muertos, and immerses
    themselves in adventure novels like The Lost Treasure of Captain K, often humming Disney songs while folding paper.
  travel: An adventurous explorer, Catalina Vila loves weekend hikes along the Kern River, has visited Yosemite National Park on a school field trip, dreams of a family road‑trip to Oaxaca to experience
    Día de los Muertos celebrations, and prefers spontaneous day‑trips over meticulously planned vacations, though they sometimes worry about missing schoolwork.
  culinary: A budding baker, Catalina Vila measures flour and sugar in both Spanish and English while making chocolate‑chip cookies with Grandma Lucia, adds a pinch of cinnamon and vanilla for extra flavor,
    and enjoys snacking on mango, pineapple, and homemade cheese‑and‑bean quesadillas after soccer practice.
  core: Catalina Vila is a curious, energetic 9‑year‑old who balances spontaneous soccer games, lively dancing, and careful saving with a habit of worrying about the little things.
background:
  cultural: Catalina comes from a Mexican‑American family that maintains strong ties to Mexican traditions while embracing life in Bakersfield, California. Spanish is spoken at home, and she celebrates
    holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with vibrant decorations, family meals, and music. She participates in the local community center’s after‑school programs, where she
    interacts with peers from similar cultural backgrounds. Her family enjoys cooking traditional dishes like tacos, tamales, and atole, and she often helps in the kitchen, learning the cultural recipes.
    This blend of Mexican heritage and Californian environment gives her a rich bilingual and bicultural perspective.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Reading comprehension (second‑grade level)'', ''Basic arithmetic (addition/subtraction)'', ''Creative drawing and comic‑strip creation'', ''Leadership
    in group games'', ''Using educational apps (e.g., Khan Academy Kids, ABCmouse)'']'
  hobbies: '[''Soccer'', ''Dancing to cumbia and reggaetón'', ''Crafting papel picado'', ''Reading adventure books'', ''Exploring Kern River trails'', ''Baking with family'']'
  career_goals: Catalina dreams of becoming someone who works with people and animals. She often says she wants to be a teacher because she likes sharing what she learns, and she also imagines being a veterinarian
    after helping a stray dog in her neighborhood. She hopes to combine her love for storytelling and caring for others by maybe becoming a children's author who writes stories that teach kindness. While
    she sometimes worries about doing things perfectly, she is determined to keep learning and helping her friends.
