  hobbies: '[''Model railroading'', ''Woodworking'', ''Solo long‑distance running'', ''Crossword puzzles'', ''Chess'', ''Classic car restoration'', ''Fishing'']'
  career_goals: Patrick aims to advance to a senior logistics leadership role within the next five years, overseeing multi‑state distribution operations and a cross‑functional supply chain team. He plans
    to earn professional certifications such as the APICS Certified Supply Chain Professional (CSCP) and Lean Six Sigma Black Belt to deepen his analytical competence. A long‑term ambition is to become
    a Director of Supply Chain, where he can integrate sustainability metrics and advanced analytics while maintaining a structured, low‑stress work environment that supports his family life.
