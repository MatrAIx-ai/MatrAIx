  hobbies: '[''Visiting art galleries and museums'', ''Photography walks'', ''Hiking local trails'', ''Gardening (citrus trees)'', ''Reading contemporary non-fiction'', ''Volunteer work at community arts
    center'', ''Playing chess'', ''Cooking and culinary experimentation'', ''Listening to classical & jazz music'', ''Home brewing craft beer'']'
  career_goals: In the next five years Luther aims to transition into a senior leadership role—such as regional sales manager or director—where he can shape strategy for service offerings across Southern
    California. He also plans to launch a mentorship program for new sales representatives, integrating his love of the arts by offering creative problem‑solving workshops. Ultimately, he hopes to balance
    his professional legacy with community impact, perhaps establishing a scholarship in memory of his late wife to support local youth interested in the visual arts.
