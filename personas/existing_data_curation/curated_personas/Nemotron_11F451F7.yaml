personas:
  professional: Erin Decker is a senior green-cleaning specialist who pairs meticulous sanitation with a boutique home-staging eye, and they use eco-friendly methods and an artist's sense of harmony to
    transform boutique hotels and private residences.
  sports: Erin Decker finds fitness in weekend nature walks along the Ocana River and bird-watching, is a member of the Santa Fe Hiking Club, and they cheer quietly for the Albuquerque Isotopes while occasionally
    catching a New Mexico United soccer match on television.
  arts: Erin Decker spends quiet evenings sketching watercolor scenes inspired by Monet and O'Keeffe, browsing contemporary fiction, and they frequently upcycle thrift-store finds into gallery-worthy decor
    while attending off-peak exhibitions featuring artists like Banksy and Yayoi Kusama.
  travel: Erin Decker prefers low-key, off-peak travel to serene spots such as Sedona, Arizona, the rice terraces of Kyoto, and the rolling hills of Tuscany, and they plan trips with a flexible itinerary
    that balances quiet exploration with modest budgeting.
  culinary: Erin Decker cultivates a small indoor herb garden and experiments with inventive, health-focused meals like quinoa-stuffed zucchini, turmeric-roasted cauliflower, and fresh basil pesto, and
    they enjoy pairing each dish with a glass of cold-pressed carrot-ginger juice.
  core: Erin Decker merges artistic curiosity with eco-conscious cleaning expertise, thriving in solitary, organized chaos while they balance a relaxed approach to obligations with a relentless drive to
    create harmonious, sustainable spaces.
background:
  cultural: Erin was raised in a middle‑class, Southern‑Florida household where practical skills and hospitality were emphasized. Her family’s values of hard work, modesty, and community engagement shaped
    her approach to both work and personal life. Though she identifies as white American, she draws subtle influences from the region’s blend of cultures—appreciating the laid‑back rhythm of life in Ocala,
    the emphasis on outdoor leisure, and the Southern tradition of welcoming guests. Her upbringing encouraged curiosity, leading her to explore art and sustainable living while maintaining a strong sense
    of family responsibility.
attributes:
