persona_description: A logician or a philosopher who specializes in the study of logical fallacies, particularly those that involve contradictory reasoning. They are skilled in identifying and analyzing
  fallacious reasoning and have a deep understanding of the logical structures of arguments. They are likely to be knowledgeable about the Nyaya system of religious philosophy and the concept of savyabhicara
  hetvabhasa, which refers to an irregular middle term in a syllogism that makes the conclusion incorrect. They are also likely to be familiar with the concepts of information overload, delayed comprehension,
  rote learning, and the three levels of teaching (memory, understanding, and reflective).
