  hobbies: '[''Hiking local foothill trails'', ''Gardening (vegetable and flower beds)'', ''Woodworking projects'', ''Reading non‑fiction (history, technology)'', ''Crossword and Sudoku puzzles'', ''Cooking
    simple healthy meals'', ''Attending a small book‑club'', ''Mindfulness meditation'', ''Nature photography'']'
  career_goals: James is focused on advancing within the compliance field while maintaining the routine and stability he values. In the short term, he plans to obtain the Certified Compliance & Ethics Professional
    (CCEP) credential and secure a promotion to Senior Compliance Manager within the next two to three years, where he can lead a small, close‑knit team. Over the longer term, he aspires to become a Chief
    Compliance Officer or to transition into a boutique compliance consultancy that serves small Colorado businesses, allowing him to set a predictable schedule. Throughout his career progression, he aims
    to design a compliance program that minimizes audit findings, fosters organizational harmony, and provides him with the work‑life balance needed to manage his anxiety.
