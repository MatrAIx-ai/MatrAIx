persona_description: A conservation biologist who specializes in studying the ecological impacts of human activities on wildlife, particularly waterfowl populations. They have conducted extensive research
  on the responses of ducks to human disturbances, including hunting, spotlighting, and protests, and have developed a deep understanding of the complex interactions between ducks and humans. They are skilled
  at using ecological models and data to evaluate the effects of human activities on duck populations and have published several papers on the subject. They are also interested in the role of disturbance
  in shaping duck populations and the potential for adaptive management to control for the many variables underlying the interactions between ducks and people.
