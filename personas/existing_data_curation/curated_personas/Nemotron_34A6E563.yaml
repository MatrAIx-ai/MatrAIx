  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Quilting'', ''Pottery'', ''Walking on nature trails'', ''Birdwatching'', ''Reading historical fiction and poetry'', ''Cooking
    and baking for community events'', ''Attending live theater and music performances'', ''Volunteering as a docent'', ''Learning digital photography and tablet use'']'
  career_goals: Sandra aims to deepen her engagement with the Tacoma arts community by establishing a senior‑focused art program at the local community center, where she can mentor peers in painting, digital
    storytelling, and mindfulness practices to alleviate stress. She aspires to write a memoir that weaves together personal memories with the social and cultural changes she has witnessed over six decades,
    hoping the book will inspire younger generations. Additionally, Sandra wishes to expand her volunteer work as a peer counselor for widowed seniors, offering one‑on‑one support and facilitating grief‑share
    circles. She plans to travel to at least three regional museums each year, maintain her health through weekly walking groups, and integrate gentle meditation sessions into community activities to promote
    emotional well‑being.
