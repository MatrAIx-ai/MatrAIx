personas:
  professional: A four-year-old budding city planner named Raul Viera meticulously arranges Lego blocks into orderly neighborhoods, proudly explains their layout to friends, and competes to build the tallest
    tower, reflecting an early love of structured creativity and a competitive spirit.
  sports: A four-year-old energetic player named Raul Viera shines on the Little Lions Soccer Club, dribbles the ball after kindergarten practice, idolizes Lionel Messi, and cheers loudly for the hometown
    baseball team, embodying a love for group activities and a competitive edge.
  arts: A four-year-old budding artist named Raul Viera fills sketchbooks with vivid crayon drawings of dinosaurs and rockets, recites Dr. Seuss verses, watches Pixar's Toy Story, and organizes art supplies
    by color, marrying curiosity with an orderly approach to creativity.
  travel: A four-year-old explorer named Raul Viera enjoys family road trips to Ocean City, collects seashells at the beach, maps visits to the aquarium, and dreams of seeing the Eiffel Tower, balancing
    excitement with careful packing of their favorite stuffed bear.
  culinary: A four-year-old food lover named Raul Viera favors chicken nuggets, mac and cheese with extra cheddar, helps stir pancake batter, can name the ingredients of a peanut butter and jelly sandwich,
    but often squeals when broccoli shows up on the plate.
  core: Raul Viera is a four-year-old curious, organized, and energetic explorer who blends competitive zest with a love for art, adventure, and meticulous routines, yet sometimes over‑thinks simple joys.
background:
