personas:
  professional: Jeanne Kaminski is a veteran vending‑machine field technician with over twenty years of hands‑on expertise in mechanical disassembly, electrical troubleshooting, and retrofitting legacy
    arcade and amusement equipment, who blends a relentless curiosity for emerging cashless technologies with a pragmatic, calm‑under‑pressure approach that earns the trust of skeptical venue owners.
  sports: Jeanne Kaminski enjoys hiking the Hill Country trail network with the local Hill Country Hiking Club, lifts at a CrossFit box on weekends, cheers on the Dallas Cowboys during football season and
    the Texas Rangers in baseball, and occasionally joins a Fort Worth Fairgrounds softball league, blending a laid‑back fitness routine with a loyal following of Texas‑based professional teams.
  arts: Jeanne Kaminski balances a love for analog entertainment with modern storytelling, regularly attending live country‑rock shows featuring Sturgill Simpson and The Raconteurs at Fort Worth's Billy
    Bob's Texas, collecting vintage arcade art panels, and diving into sci‑fi novels by Neal Stephenson and classic works by Isaac Asimov, while occasionally dropping by the local community theater to watch
    productions of 'Our Town.'
  travel: Jeanne Kaminski prefers low‑key road trips that weave through West Texas mesas and Hill Country wineries, but dreams of a tech‑focused pilgrimage to Tokyo’s Akihabara district and a nostalgic
    weekend in Austin’s South Congress, planning itineraries on a loose spreadsheet and letting her curiosity guide last‑minute detours whenever the gas tank and a clear sky allow.
  culinary: Jeanne Kaminski cooks with a seasoned hand, favoring Texas‑style brisket, jalapeño‑cheddar cornbread, and homemade coleslaw, while also experimenting with Asian‑inspired stir‑fry using soy sauce,
    ginger, and a dash of chipotle for a smoky twist, often pairing the meals with a cold craft IPA from a local brewery.
  core: Jeanne Kaminski is a fiercely curious yet practical tinkerer who turns vintage arcade cabinets into cashless marvels, balances a competitive edge with a laid‑back lifestyle, and occasionally lets
    disorganization slip into her schedule, all while staying cool under pressure.
background:
  cultural: Jeanne was raised in a small‑town Texan family with deep roots in the local community. Her upbringing blended traditional Southern hospitality, a strong work ethic, and a love for regional customs
    like barbecue, high‑school football, and county fairs. Growing up white in rural Texas, she absorbed the independent, self‑reliant spirit of the area while also valuing neighborly cooperation. Her cultural
    experience emphasizes practicality, flexibility, and a modest skepticism that drives her to verify information before trusting new business partners.
attributes:
  skills: '[''Mechanical disassembly'', ''Electrical troubleshooting'', ''Firmware and software updates'', ''Cashless payment retrofitting'', ''Preventive maintenance scheduling'', ''Parts inventory management'',
    ''Regulatory compliance (TX vending)'', ''Customer liaison and service contracts'', ''Problem‑solving under stress'', ''Technical documentation'']'
  hobbies: '[''Restoring vintage arcade machines'', ''Custom woodworking'', ''Gardening'', ''Hill Country hiking'', ''Live music attendance'', ''Retro video gaming'', ''Science‑fiction reading'', ''County
    fair volunteering'']'
  career_goals: She aims to transition from a field technician to the owner of a regional vending‑service business that specializes in modernizing legacy machines with NFC and mobile‑payment solutions.
    Jeanne plans to obtain certifications in electronic payment systems, expand her service radius across Central Texas, and build a small team of trusted technicians. Long‑term, she hopes to develop a
    boutique line of refurbished arcade cabinets for local bars and community centers, leveraging her competitive drive to become the go‑to expert for high‑reliability amusement equipment in the area.
