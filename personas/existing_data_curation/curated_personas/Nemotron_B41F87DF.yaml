  hobbies: '["Visiting art galleries", "Sketching", "Creative cooking", "Reading contemporary fiction", "Following fintech podcasts", "Yoga", "Puzzle games", "Volunteering at cultural festivals"]'
  career_goals: Kadeesha aims to be promoted to senior loan officer within the next two years, focusing on community‑reinvestment and sustainable lending practices. She plans to acquire certification as
    a credit analyst and eventually move into branch management, where she can mentor junior staff and shape lending strategies that serve underserved neighborhoods in Dallas. Long‑term, she envisions launching
    a boutique financial‑consulting firm that blends traditional banking expertise with innovative fintech solutions for Black-owned small businesses.
