personas:
  professional: John Hebert is a senior dental and ophthalmic laboratory technician with over twenty years of hands-on experience, expertly merging traditional hand-wax techniques with modern CAD/CAM software
    while applying a data-driven, skeptical mindset to drive quality improvements, cost analysis, and regulatory compliance, positioning himself to lead his lab toward ISO 13485 certification and guide
    a future boutique orthodontic digital lab.
  sports: John Hebert is an avid cyclist navigating the paved trails of DuPage County, a regular contender in amateur golf tournaments at the DuPage Golf & Country Club, and a steadfast supporter of the
    Chicago Cubs and Chicago Bears, often planning his weekend training around game schedules.
  arts: John Hebert frequents productions at the DuPage Playhouse, enjoys classic rock icons like Bruce Springsteen and The Rolling Stones, and competes in church-hosted trivia nights where his love for
    obscure pop-culture facts and competitive spirit shine.
  travel: John Hebert prefers road-trip adventures that blend scenic rides with stops at historic small towns, has recently explored the Grand Canyon and Napa Valley, and dreams of driving his restored
    1965 Chevrolet to Stuttgart's automotive museums, all while balancing travel costs against his upcoming lab investment.
  culinary: John Hebert delights in grilling ribeye steaks seasoned with rosemary, garlic, and pepper, pairs them with roasted sweet potatoes or classic meatloaf, occasionally experiments with Thai green
    curry, and proudly bakes apple pie for family gatherings, though they sometimes forget to clean the grill promptly after use.
  core: John Hebert is a meticulous dental technician who blends competitive, hands-on curiosity with practical skepticism, channeling precision into lab work, community health volunteering, and weekend
    pursuits of cycling, golf, woodworking, and classic car restoration.
background:
  cultural: John grew up in a middle‑class white family in the Chicago suburbs, rooted in Midwestern values of hard work, punctuality, and community involvement. His ancestry is a mix of German and Irish
    heritage, reflected in family traditions of holiday gatherings and a solid work ethic. He was raised in a Protestant (United Church of Christ) household that emphasized service, which later translated
    into his volunteer work. Attending public schools and later the University of Illinois at Chicago for a bachelor's in business, he internalized both practical pragmatism and a curiosity for new ideas.
    Living in Carol Stream, he participates in the local farmers’ market, supports the local high school sports teams, and maintains strong ties with his wife and two adult children, embodying the collaborative
    yet self‑reliant spirit of suburban DuPage County.
attributes:
  skills: '[''Dental prosthetic fabrication'', ''Ophthalmic device assembly'', ''CAD/CAM design and milling'', ''Materials science (ceramics, alloys, polymers)'', ''Quality control and regulatory compliance'',
    ''Equipment maintenance and calibration'', ''Lean process improvement'', ''Team leadership and mentorship'', ''Business operations and budgeting'', ''Customer service and technical support'']'
  hobbies: '[''Cycling'', ''Golf'', ''Woodworking'', ''Classic car restoration'', ''Reading business books'', ''Volunteering at health fairs'', ''Local theater attendance'', ''Trivia nights'']'
  career_goals: John aims to become the lead technician in his current lab within the next two years, earn the Certified Dental Technician (CDT) certification, and guide his team toward ISO 13485 certification.
    He is planning to invest in a small boutique digital orthodontic lab that leverages his CAD/CAM expertise, positioning himself as a niche supplier for local orthodontists. Additionally, he wishes to
    share his knowledge by teaching part‑time at the nearby community college, and to develop a mentorship program that prepares the next generation of lab technicians before he approaches retirement.
