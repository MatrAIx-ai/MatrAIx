personas:
  professional: David Young, a budding teen coder with a knack for Python, builds LEGO Technic robots and dominates the school chess club, channeling curiosity into practical problem‑solving while preferring
    the quiet focus of solo projects over group work.
  sports: David Young, an avid hiker of Androscoggin River trails and occasional fly‑fisherman, cheers for the Portland Sea Dogs baseball team and respects the New England Patriots' resilience, preferring
    solo outdoor pursuits over organized team sports.
  arts: David Young, a sci‑fi aficionado who devours Isaac Asimov and Arthur C. Clarke, streams Pink Floyd and Rush, attends local indie film screenings, and occasionally sketches fan art of his favorite
    video game characters.
  travel: David Young, who loves spontaneous weekend camping trips to the White Mountain National Forest and dreams of backpacking through Iceland’s waterfalls, plans travel with loose itineraries that
    leave room for impromptu hikes and stargazing.
  culinary: David Young, a teen who can whip up a decent pepperoni pizza and classic mac‑and‑cheese, enjoys experimenting with sushi rolls using tuna, avocado, and nori, but often forgets to clean the kitchen
    afterward.
  core: David Young is a curiosity‑driven, competitively minded teen who blends solo tech projects with a love for nature, yet wrestles with occasional disorganization and a penchant for last‑minute indulgences.
background:
  cultural: David comes from a white Anglo‑American family in Lewiston, Maine, a modest, historically industrial city in New England. His household reflects typical New England values of self‑reliance,
    modesty, and a respect for nature, shaped by parents who grew up working in local manufacturing and service jobs. The community's seasonal rhythms, proximity to the Androscoggin River, and the blend
    of Yankee and nearby Irish and French‑Canadian influences have fostered his appreciation for outdoor activities, local history, and small community events.
