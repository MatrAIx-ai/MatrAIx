  career_goals: At 13, David imagines a future that blends his love of technology with practical problem‑solving. He aims to attend a technical high school or join a youth robotics program, hoping to become
    a software or mechanical engineer. In the longer term, he dreams of designing interactive games or building innovative gadgets, and he is interested in securing a summer internship or apprenticeship
    with a local tech firm to gain real‑world experience.
