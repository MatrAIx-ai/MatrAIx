persona_description: A historian or archaeologist who is interested in the history and culture of the Cherokee people, particularly their oral traditions and legends. They are knowledgeable about the Cherokee
  language, history, and the various towns and settlements they inhabited. They are interested in the legends and myths associated with these towns and the role they played in the Cherokee culture. They
  are also interested in the impact of European colonization on the Cherokee people and the role of the Cherokee in the Trail of Tears. They are curious about the history and culture of the Cowee community
  and the role it played in the Cherokee history.
