persona_description: A public health expert with a focus on substance abuse prevention and treatment, particularly in the older adult population. They are interested in exploring the potential of cannabis
  as a public health solution to address the opioid misuse and abuse epidemic, as well as to address the undertreatment of pain symptoms in older adults entering end-of-life care. They are likely to have
  a deep understanding of the available evidence and the potential benefits and risks of cannabis use among older adults, and are interested in advocating for policies and practices that promote the safe
  and responsible use of cannabis in this population.
