persona_description: A medical doctor who specializes in the diagnosis and treatment of foot and ankle disorders. They are experienced in performing physical exams for plantar fasciitis and other foot and
  ankle injuries. They have a keen eye for identifying abnormal findings and biomechanical factors that may contribute to the development of plantar fasciitis. They are well-versed in the medical history
  and physical exam process and are skilled in interpreting results to make accurate diagnoses. They are knowledgeable about nonsurgical treatment options and are able to recommend appropriate therapies
  for patients with plantar fasciitis.
