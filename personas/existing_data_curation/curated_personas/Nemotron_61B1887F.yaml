  career_goals: Although only five, Angelito already shares imaginative career aspirations that blend his curiosity about the world with a desire for practical, helpful roles. He often talks about becoming
    an astronaut to explore space, but also imagines designing toys or building bridges as an engineer because he enjoys constructing things that work reliably. He expresses a wish to help people, mentioning
    future roles as a firefighter or doctor, reflecting his compassionate side. As he matures, his goal is to combine his love of discovery with a stable, service-oriented profession that lets him use both
    his creative and practical strengths.
