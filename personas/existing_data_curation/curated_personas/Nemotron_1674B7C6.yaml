  hobbies: '[''Soccer (community league)'', ''Cooking experimental dishes at home'', ''Exploring new restaurants in Arlington/DC'', ''Volunteering at local food bank'', ''Attending live music concerts'',
    ''Hiking in Great Falls and Shenandoah National Park'', ''Home‑brewing craft beer'']'
  career_goals: Steven aims to move beyond his current supervisory role toward broader operational leadership. In the next five years he hopes to become a regional manager overseeing multiple food‑service
    sites for a hospitality chain, and eventually launch his own farm‑to‑table restaurant that showcases seasonal, locally sourced ingredients. He plans to earn a Certified Food Service Manager credential
    and a part‑time MBA to deepen his strategic and financial expertise. A core ambition is to create a workplace culture where his team feels valued, can grow professionally, and where service excellence
    and sustainable practices go hand‑in‑hand.
