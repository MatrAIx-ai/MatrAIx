personas:
  professional: Steven Barber, a 35‑year‑old food‑service supervisor, blends data‑driven operational expertise with a people‑first approach, using his curiosity for new workflows and practical eye for cost
    control to keep kitchens humming while motivating staff through compassionate leadership.
  sports: Steven Barber anchors his weekends in the local co‑ed soccer league, cheers on the Washington Capitals and DC United, and hits the trails at Great Falls for early‑morning runs, balancing team
    camaraderie with personal fitness through interval training and occasional bike rides.
  arts: Steven Barber’s artistic side thrives on live music, especially catching shows by The Strokes and local indie folk acts at The Anthem, and he spends quiet evenings poring over the contemporary paintings
    of Kehinde Wiley for visual inspiration that informs his culinary plating.
  travel: Steven Barber prefers short, purposeful road trips to nearby culinary hotspots like Asheville, NC, and the vineyards of Charlottesville, VA, while planning a once‑a‑year longer escape to Barcelona’s
    tapas scene, blending spontaneous day‑trips with carefully budgeted overseas itineraries.
  culinary: Steven Barber is a confident home chef who experiments with sous‑vide duck breast, kimchi‑infused tacos, and seasonal beet‑goat cheese salads, often incorporating heirloom tomatoes and smoked
    paprika into dishes that showcase his love for farm‑to‑table flavors.
  core: Steven Barber is a data‑savvy food‑service leader who juggles soccer, craft‑beer brewing, and a relentless quest to blend sustainability with flavor, yet can’t resist a late‑night slice of pizza
    after a long shift.
background:
  cultural: Steven grew up in a middle‑class, white American family with deep roots in the Mid‑Atlantic region. His ancestry is primarily of English and Irish descent, and family traditions emphasize holiday
    gatherings, backyard barbecues, and community involvement. Living in Arlington, he has been exposed to a richly diverse cultural landscape, which has broadened his palate and informed his appreciation
    for a wide range of cuisines. These influences combine a classic American work ethic with an openness to multicultural experiences, shaping his collaborative, service‑focused outlook.
attributes:
  skills: '[''Food safety compliance'', ''Team leadership'', ''Staff scheduling'', ''Cost control and budgeting'', ''Inventory management'', ''Menu planning'', ''Conflict resolution'', ''Customer service
