  hobbies: '[''Attending art galleries and museum exhibitions'', ''Playing ultimate frisbee'', ''Participating in improv comedy workshops'', ''Hiking the North Shore'', ''Urban photography'', ''Cooking
    fusion cuisine'', ''Listening to indie and experimental music'', ''Volunteering for community theater'']'
  career_goals: Anthony aims to transition into a regional director role within the next three years, overseeing multiple sales teams across the Midwest. He wants to spearhead innovative sales initiatives
    that blend technology and storytelling, and eventually move into a product management or commercial strategy position where he can influence product development based on market insights. He also aspires
    to mentor emerging sales talent and pursue an MBA focused on entrepreneurship and strategic leadership.
