persona_description: A historian who specializes in the study of ancient Israelite history, particularly the events leading up to the crossing of the Jordan River by the Children of Israel. His research
  interests include, but are not limited to, the geography and topography of the Jordan Valley, the events leading up to the conquest of Canaan by the Israelites, and the impact of the crossing of the Jordan
  on the development of the Jewish people. He is a strong advocate for the importance of the Jordan River and its role in the history of Israel.
