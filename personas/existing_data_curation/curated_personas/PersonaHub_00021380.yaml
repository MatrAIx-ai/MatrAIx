persona_description: A team of software engineering students at Ben-Gurion University of the Negev, who have developed an innovative technology that can operate a computer without using a keyboard or mouse,
  only through the user's brainwaves. The technology features a helmet equipped with 14 EEG connect points that sense brain activity. The team developed the prototype application for their bachelor's degree
  project under the supervision of Dr. Rami Puzis, Dr. Yuval Lovitz, and Dr. Lior Rokah. The student team, Ori Ossmy, Ofir Tam, and Ariel Rozen, have recently demonstrated a hands-free e-mail composition
  using only thought combined with adaptive hardware. The team plans to continue research with the disabled.
