  hobbies: '[''LEGO building and invention'', ''Minecraft (redstone engineering)'', ''Competitive video gaming (Super Smash Bros.)'', ''Reading mystery books'', ''Youth soccer'', ''Sketching comic characters'',
    ''Exploring multicultural foods in Jackson Heights'']'
  career_goals: He dreams of turning his love of building and problem‑solving into a future career as a robotics engineer or video‑game designer, hoping to create toys or games that work reliably and challenge
    players. He is also fascinated by detectives and sometimes imagines working as a forensic scientist, using his critical eye to uncover hidden details. While he feels excited about these possibilities,
    he often worries about failing tests or not being good enough, so he sets small, flexible milestones—like winning a local coding contest or designing a LEGO invention that can move on its own—to keep
    his confidence growing.
