personas:
  professional: William Drake is an aspiring young engineer whose after‑school LEGO city builds and Minecraft redstone experiments serve as early prototypes for solving real‑world problems, and they channel
    their critical, competitive nature into designing functional, imaginative structures while embracing a flexible, sometimes chaotic work style.
  sports: William Drake is a midfield enthusiast on the Jackson Heights Youth Soccer League’s Tigers U‑10 squad, idolizing New York City FC and training twice a week, yet they balance competitive drive
    with occasional retreats to the park bench to sketch comic‑style players, reflecting a blend of team commitment and personal creative space.
  arts: William Drake devotes weekend afternoons to sketching dynamic comic‑style heroes inspired by Stan Lee’s classic panels and the vibrant colors of manga artists like Akira Toriyama, while they also
    devour mystery novels such as the “Nancy Drew” series, letting their skeptical mind piece together clues alongside the protagonists.
  travel: William Drake loves spontaneous day trips to nearby Coney Island for boardwalk rides and to the New York Botanical Garden for inspiration, and they dream of traveling to the LEGOLAND Discovery
    Center in Boston and eventually to the International LEGO Expo in Copenhagen, balancing budget constraints with a yearning for immersive, creative experiences.
  culinary: William Drake helps their mother whisk together spaghetti carbonara and explores new flavors like mild sushi rolls, yet they often cling to familiar comfort foods such as cheese quesadillas
    when the kitchen experiments feel overwhelming, showing a cautious palate that rewards bravery with occasional culinary triumphs.
  core: William Drake is a curious, competitive nine‑year‑old who builds intricate LEGO worlds, sketches superheroes on park benches, carefully budgets allowance for toys, and navigates mild allergies with
    a mix of proactive care and occasional neglect, all while juggling a love for soccer, mystery novels, and cautious culinary adventures.
background:
  cultural: William comes from a white, second‑generation American family with Irish and Italian roots. His parents grew up in the suburbs of New York and moved to Jackson Heights for its vibrant community
    and affordable housing. Living in Queens, he is surrounded by a tapestry of cultures—Spanish, Hindi, Chinese, Colombian, and many others—reflected in the neighborhood's bustling markets, street festivals,
    and multilingual school environment. At home, the family celebrates traditional holidays such as Christmas and St. Patrick’s Day, while also partaking in local events like the Queens Night Market and
    the annual Hispanic Heritage Festival. This multicultural exposure has given him a basic familiarity with Spanish greetings and an appreciation for diverse cuisines, though his primary cultural identity
    remains rooted in mainstream American middle‑class values and the family’s European heritage.
