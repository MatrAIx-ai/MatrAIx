  career_goals: Claire aims to advance to a leadership role within the Mesa Fire Department, pursuing the rank of lieutenant and eventually battalion chief. She plans to complete her Bachelor of Science
    in Fire Science and Emergency Management, supplementing her hands‑on experience with formal education. Passionate about community outreach, she envisions establishing a city‑wide fire safety education
    program that integrates art and interactive media to engage diverse audiences. Long‑term, she hopes to become a certified fire instructor and develop a nonprofit that offers fire‑prevention workshops
    in schools and community centers across Maricopa County.
