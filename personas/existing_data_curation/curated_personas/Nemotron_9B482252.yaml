personas:
  professional: Yahui Chang, a 16‑year‑old high‑school student, blends budding coding skills in Python with a natural flair for leading group projects, so they rally teammates for the school robotics club
    while often misplacing meeting notes because they prefer spontaneous brainstorming over rigid planning.
  sports: Yahui Chang blasts down the field as a forward on the Kenosha High soccer team, also dances with the downtown community dance club, and cheers for the Milwaukee Bucks and Chicago Cubs, balancing
    competitive play with the occasional weekend pickup basketball game.
  arts: Yahui Chang’s creative outlet bursts through TikTok clips featuring quick DIY crafts inspired by the aesthetic of Marina Abramović, while their photography captures candid street vibes reminiscent
    of Vivian Maier, and they binge‑watch Studio Ghibli films for visual storytelling.
  travel: Yahui Chang’s travel diary lists weekend road trips to the Great Lakes shoreline, a family vacation to Chicago’s Museum Campus, and a solo adventure to the historic district of Asheville, with
    a future dream of exploring the gaming hubs of Seoul and Kyoto.
  culinary: Yahui Chang experiments in the kitchen, mastering steaming techniques for delicate bao‑style buns, whisking up quick mapo‑style tofu with fermented bean sauce, and pairing each dish with fresh
    ginger, garlic, and chilies while filming the process for their TikTok audience.
  core: Yahui Chang fuses tech curiosity, community hustle, and a love for lively group activities into an energetic, sometimes chaotic teenage drive to create culturally infused digital content and inclusive
    tech solutions.
background:
  cultural: Yahui comes from a Chinese‑American family that maintains strong ties to its East Asian heritage while fully engaging with the Midwestern lifestyle of Kenosha, Wisconsin. Her household celebrates
    Lunar New Year, prepares traditional dishes such as dumplings and mooncakes, and speaks Mandarin at home, giving her a bicultural lens. Growing up in a diverse suburb, she has blended collectivist family
    values—emphasizing respect, education, and community support—with the individualistic, flexible attitudes common in American teen culture. This mix informs her sociable, outgoing nature and her practical
    curiosity, allowing her to navigate both her cultural community and broader American social circles with ease.
