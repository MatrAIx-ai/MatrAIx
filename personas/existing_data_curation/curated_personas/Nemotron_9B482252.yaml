  hobbies: '["Soccer (school team)", "Community dance club", "TikTok content creation (cooking, crafts, tech tips)", "Video game design (Minecraft, indie games)", "Sci‑fi reading", "Attending cultural festivals",
    "Volunteer tutoring at library", "Photography (candid street)" ]'
  career_goals: Yahui aims to pursue a degree that blends technology and community impact, such as a double major in Computer Science and Business. In the short term, she wants to lead her high school robotics
    club, mentor younger students, and launch a teen‑focused digital platform that showcases cultural content and connects local creators. Long‑term, she envisions a career as a user‑experience designer
    or product manager building tools that help immigrant families stay linked to their heritage while navigating everyday life in America. She also hopes to start a socially responsible startup that merges
    e‑commerce with cultural artisan products, allowing her to apply her practical skills and creative flair in a sustainable business model.
