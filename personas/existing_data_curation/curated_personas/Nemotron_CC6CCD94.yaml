personas:
  professional: Gregory Pease is a 33‑year‑old bedside nurse who fuses a STEM‑oriented analytical mindset with an artist’s flair, using health informatics dashboards and hand‑drawn visual aids to improve
    rural patient outcomes while plotting a DNP pathway toward a tech‑rich community health hub.
  sports: Gregory Pease hits the trail with the Caprock Trail Runners, follows the Dallas Cowboys and Houston Astros faithfully, plays pickup disc‑golf in the spring, and balances a love for high‑intensity
    cardio hikes in Caprock Canyons with a weekly yoga class to keep their back pain at bay.
  arts: Gregory Pease paints West Texas sunsets, sketches in the style of Georgia O'Keeffe, curates trips to the Lubbock Museum of Art, improvises with the Lone Star Laugh Lab troupe, and finds inspiration
    in the music of Willie Nelson, Joni Mitchell, and the modern indie band The War on Drugs.
  travel: Gregory Pease devotes spontaneous weekend road trips to Big Bend National Park, Tucson’s saguaro‑lined streets, and the historic lanes of Santa Fe, has already explored Oaxaca’s bustling food
    markets and Kyoto’s bamboo groves, and dreams of trekking Patagonia’s Torres del Paine while balancing travel with a modest budget and family commitments.
  culinary: Gregory Pease is an intermediate home chef who mixes smoky Texas brisket rubs with cumin‑infused chile sauce, crafts authentic tacos al pastor with pineapple and adobo, experiments with a cowboy‑ramen
    broth, and never says no to a freshly baked jalapeño popper at local food festivals, all while favoring locally sourced beans, corn, and pecans.
  core: Gregory Pease is a curious, calm‑resilient nurse‑artist who leverages visual creativity to heal, spends impulsively on art and adventure, and constantly balances data‑driven health goals with spontaneous
    life experiences.
background:
  cultural: Gregory grew up in a middle‑class white family in Lubbock, Texas, where Southern hospitality and Texan independence shaped his values of kindness, cooperation, and community service. He was
    raised amid the region’s cultural staples—high school football Saturdays, country music, and community fairs—while his STEM education exposed him to diverse perspectives and artistic appreciation. This
    blend of traditional Texas culture with a curiosity for new ideas informs his collaborative, open‑minded outlook and his desire to give back to his local community through both health care and the arts.
