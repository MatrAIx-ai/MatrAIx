  hobbies: '[''Painting'', ''Sketching'', ''Landscape photography'', ''Improv comedy'', ''Group hiking'', ''Exploring experimental cuisine'', ''Volunteering at community health fairs'', ''Facilitating art‑therapy
    workshops for children'']'
  career_goals: Gregory aims to transition into an advanced practice role, such as a Nurse Practitioner or Clinical Nurse Specialist, with a focus on integrating emerging technologies into patient care
    for rural West Texas communities. He plans to pursue a Doctor of Nursing Practice (DNP) degree to lead research on telehealth and digital health education. Long‑term, he envisions establishing a community
    health hub that blends evidence‑based nursing with art‑based therapeutic programs, while maintaining a flexible schedule that allows spontaneous family and personal experiences.
