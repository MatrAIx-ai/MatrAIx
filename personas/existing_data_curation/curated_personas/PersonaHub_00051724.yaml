persona_description: A historian or cultural preservationist who is interested in the history and cultural heritage of the Edmonton area, particularly the history of the Papaschase First Nation. They are
  passionate about understanding the complex social, economic, and political factors that shaped the land on which the buildings in Pembina Hall are situated. They are dedicated to preserving the cultural
  heritage and traditions of the Papaschase First Nation, and are interested in the impact of historical events on the community's identity and well-being. They are knowledgeable about the history of the
  Edmonton area and the role of the federal government in the displacement and mistreatment of Indigenous peoples. They are interested in the impact of historical events on the community's culture, language,
  and collective identity, and are committed to preserving and promoting these cultural values. They are interested in the history of the Edmonton area and the role of the federal government in the displacement
  and mistreatment of Indigenous peoples.
