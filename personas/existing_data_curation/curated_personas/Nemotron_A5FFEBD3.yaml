  career_goals: Doyal aims to become a lead painter and eventually obtain a contractor’s license so he can launch his own painting and paper‑hanging business focused on high‑end residential and boutique
    commercial projects. He hopes to differentiate his service by offering sustainable paint solutions and bespoke artistic finishes, such as custom murals and textured walls. Over the next five years,
    he plans to acquire EPA lead‑safe certification, mentor apprentices, and build a reputation for impeccable craftsmanship and innovative design integration.
