  career_goals: Blanca aims to advance to a regional health services director role within the next five years, where she can shape integrated care models that address both immediate operational efficiency
    and long‑term community health outcomes. She is committed to earning a Certified Professional in Healthcare Quality (CPHQ) credential and pursuing a master’s degree in health administration to deepen
    her strategic expertise. A core ambition is to develop and expand outreach programs that improve access to care for underserved Latino communities in Michigan, while also implementing staff‑wellness
    initiatives to reduce burnout and enhance workplace harmony.
