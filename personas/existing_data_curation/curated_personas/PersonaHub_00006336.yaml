persona_description: A public health researcher who focuses on the impact of drug policies and their effects on youth substance use, attitudes towards cannabis and drug-related criminal convictions. They
  are interested in studying the relationship between the amount of legal cannabis sales and youth substance use, and examining the potential effects of public health laws and policies aimed at reducing
  transmission risks among persons who inject drugs. They are looking for data on the prevalence of illicit drug use in the US, including the use of marijuana, cocaine, and other drugs, as well as the prevalence
  of cigarette smoking and cannabis use among teenagers. They are also interested in exploring the association between cigarette smoking and cannabis use, and the impact of public health laws and policies
  on reducing transmission risks among persons who inject drugs.
