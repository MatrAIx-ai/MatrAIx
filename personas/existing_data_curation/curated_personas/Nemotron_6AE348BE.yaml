personas:
  professional: Ruben Cuevas, a seasoned metal fabricator with three decades of precision welding, blueprint interpretation, and on‑the‑fly troubleshooting, channels a curious, organized yet flexible mindset
    into informal team leadership, championing process tweaks and mentoring new hires while pursuing a Master Welder credential and CAD/CAM training to eventually helm a boutique custom‑metal art shop,
    and they eagerly share their knowledge with every shift.
  sports: Ruben Cuevas stays active by rolling strikes in the local 'Striker’s Alley' bowling league and sprinting across the field with the neighborhood 'Eastside United' soccer squad on weekends, while
    cheering on the regional baseball club the 'River Rangers' during summer, balancing competitive drive with camaraderie in all pursuits, and they relish the post‑match camaraderie as much as the game
    itself.
  arts: Ruben Cuevas paints oils and acrylics that echo the bold hues of folk tapestry traditions, often channeling the rhythmic energy of live mariachi and salsa groups like 'Los Soneros' and the soulful
    storytelling of acoustic guitarist Andrés Segovia into canvases that blend industrial textures with vibrant cultural motifs, and they frequently host informal studio gatherings where fellow artists
    exchange techniques and anecdotes.
  travel: Ruben Cuevas favors road‑trip adventures that combine scenic drives through the nearby mountain range to historic towns famed for hand‑woven textiles with occasional pilgrimages to the iconic
    coastal city of Cartagena for its blend of colonial architecture and seaside festivals, planning trips well in advance yet leaving room for spontaneous detours to local folk art fairs, and they often
    bring along a sketchbook to capture fleeting inspiration.
  culinary: Ruben Cuevas delights in crafting traditional mole—slow‑cooked with chocolate, dried chiles, nuts, and spices—and hand‑rolled tamales stuffed with savory pork or sweet corn, showcasing a solid
    home‑cooking skill set that balances meticulous layering of flavors with occasional over‑seasoned experiments, and they never miss a chance to savor street‑food tacos at weekend markets while sharing
    recipes with neighborhood teens at the community center.
  core: Ruben Cuevas fuses a lifelong metalworking mastery with a painter’s eye, competitive spirit, and a penchant for hoarding spare bolts as lucky charms, navigating retirement dreams with relentless
    curiosity, disciplined craftsmanship, and an occasional neglect of dental check‑ups, and they insist on ending every workday with a quick guitar riff.
background:
  cultural: Ruben is a second‑generation Mexican‑American raised in the greater Houston area, now living in Katy, Texas. He grew up bilingual, speaking Spanish at home and English at school, and his family
    maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañeras, and festive holiday gatherings centered around food and music. The Catholic faith, celebrated through weekly mass
    and community events, has shaped his sense of responsibility and service. He participates in local Hispanic cultural festivals, where he enjoys sharing his cooking and music. The blend of Texan suburban
    life and his family's Mexican heritage gives Ruben a unique perspective that informs both his work ethic and his appreciation for diverse artistic expressions.
attributes:
  skills: '["Metal fabrication", "Welding (MIG/TIG)", "Blueprint reading", "Assembly line optimization", "Tool maintenance", "Quality inspection", "Basic CNC programming", "Team leadership", "Problem solving",
