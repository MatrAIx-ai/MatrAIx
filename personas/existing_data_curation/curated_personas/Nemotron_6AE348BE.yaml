  hobbies: '["Oil and acrylic painting", "Woodworking", "Playing acoustic guitar", "Bowling league", "Community soccer", "Cooking traditional Mexican cuisine", "Attending mariachi and salsa concerts", "Volunteering
    teaching metal‑working basics", "Fishing", "Gardening"]'
  career_goals: Approaching retirement, Ruben aims to leverage his extensive hands‑on experience into a senior supervisory role where he can formalize his mentorship of younger assemblers. He plans to earn
    a Master Welder certification and complete a short vocational course in CAD/CAM to bridge his curiosity for new ideas with practical design skills. Ultimately, Ruben dreams of launching a modest custom‑fabrication
    shop that produces artistic metal pieces for local businesses and community art projects, allowing him to blend his technical expertise with his love of art and creativity.
