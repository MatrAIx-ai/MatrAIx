  hobbies: '[''Reading historical fiction and mysteries'', ''Knitting'', ''Gardening'', ''Southern cooking'', ''Visiting farmer’s markets'', ''Book club (small group)'', ''Community choir'', ''Church volunteering'',
    ''Weekend road trips and birdwatching'', ''Trying new local restaurants'', ''Attending heritage festivals'', ''Personal finance podcasts'', ''Market trend monitoring'']'
  career_goals: Martha aims to earn her Certified Public Accountant (CPA) credential within the next two years, then advance to a senior auditor role and eventually manage audit teams. Her mid‑term goal
    is to become an Audit Manager or Director of Finance at a regional firm, where she can influence process improvements and mentor junior staff. Long‑term, she envisions launching a boutique accounting
    consultancy serving small businesses in rural Mississippi, offering flexible, client‑focused services that balance stability with the autonomy she values post‑separation.
