personas:
  professional: A retired civil and structural engineer, Newton Ayalasanchez leverages decades of CAD, materials science, and project management expertise to mentor young makers, while their blend of curiosity
    and practicality surfaces in hands‑on workshops that fuse sustainable design with island‑inspired craftsmanship, even as they sometimes drift into relaxed, disorganized planning.
  sports: Newton Ayalasanchez regularly hikes the Berkeley Hills and participates in a veteran’s softball league, cheerfully supports the Oakland Athletics and Oakland Roots SC, and occasionally joins a
    local kayaking club that lets them test the miniature canoes they build, combining seasonal outdoor activity with community sports fandom.
  arts: Newton Ayalasanchez strums the ukulele at Pacific Islander cultural gatherings, draws inspiration from musicians like Israel Kamakawiwoʻole and Rodrigo y Gabriela, and finds solace in reading science‑fiction
    authors such as Frank Herbert and N.K. Jemisin, weaving these artistic influences into their storytelling workshops.
  travel: Newton Ayalasanchez has trekked the volcanic trails of Hawaii, explored the fjords of New Zealand’s South Island, and visited the technology hubs of Tokyo, and now dreams of sailing to Fiji to
    study traditional canoe‑building, preferring a mix of spontaneous adventure and carefully planned, budget‑friendly trips.
  culinary: Newton Ayalasanchez cooks taro stew with coconut milk, ginger, and lemongrass, prepares coconut‑fish broth seasoned with turmeric and kaffir lime, and enjoys experimenting with local seasonal
    produce like heirloom tomatoes, showcasing a moderate cooking skill that blends island flavors with Bay Area freshness.
  core: Newton Ayalasanchez is a retired engineer turned hands‑on mentor whose curiosity collides with anxiety‑driven perfectionism, leading to a life of sustainable tinkering, community storytelling, and
    occasional financial splurges on kits that keep their competitive spirit alive.
background:
  cultural: Newton’s parents emigrated from the Solomon Islands when he was a child, bringing with them a rich melanesian oral tradition, communal values, and a deep respect for nature and craftsmanship.
    Growing up in Oakland’s diverse neighborhoods, he blended these influences with Bay Area culture, participating in Pacific Islander festivals, speaking Tok Pisin with his extended family, and preserving
    island customs through cooking, music, and storytelling. His melanesian heritage informs his resourceful, hands‑on approach to problem‑solving and his competitive yet communal spirit in local cultural
    and maker events.
