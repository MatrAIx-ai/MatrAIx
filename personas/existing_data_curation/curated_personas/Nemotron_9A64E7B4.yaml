  career_goals: Newton aims to stay intellectually active by mentoring aspiring engineers and makers in the Oakland Bay Area, contributing his expertise to affordable‑housing and low‑cost solar projects,
    and documenting his melanesian heritage through a series of oral‑history recordings and a memoir. He also hopes to improve his emotional wellbeing by regularly practicing mindfulness, completing a community‑based
    mental‑health facilitator certification, and publishing a guide on balancing curiosity with practical living for retirees.
