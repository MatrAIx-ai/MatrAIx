persona_description: A naval officer who has spent years studying the design and construction of aircraft carriers, including the Ford-class, and has experience in planning and executing large-scale naval
  operations. The individual is highly knowledgeable about the technical and logistical challenges involved in building and deploying a carrier, and has a deep understanding of the strategic and operational
  implications of the ship's deployment. They are likely to be interested in the latest developments in carrier design, the potential risks and benefits of building a carrier, and the impact of the ship's
  deployment on the United Kingdom's strategic interests and international relations.
