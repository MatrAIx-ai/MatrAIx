persona_description: A historian who specializes in the study of the history of half-orcs, particularly their origins and their role in the society of Pegbarrow. Their research interests include, but are
  not limited to, the evolution of half-orcs over time, their interactions with other races, and their cultural and social significance. They have a keen interest in understanding the complex relationships
  between orcs and humans, and how these relationships have shaped the history of Pegbarrow. They are known for their detailed and thorough research, and their ability to piece together the threads of history
  to create a comprehensive picture of the past.
