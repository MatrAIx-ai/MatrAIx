persona_description: A company that is dedicated to the cultivation and production of legumes, particularly peas and beans, as a sustainable and environmentally-friendly alternative to synthetic nitrogen
  fertilizers. The company's goal is to reduce carbon emissions and decrease the reliance on imported animal feed protein sources, while also promoting diversity and sustainability in the agricultural system.
  The company has implemented a life cycle assessment to quantify the environmental impacts of its products and is working with partners to explore the potential for using pea-based products as a source
  of protein for human consumption.
