personas:
  professional: Kareem Jaimes, a seasoned retail cashier with over forty years of experience, blends precise cash-handling, bilingual customer service, and a relaxed step‑by‑step approach to mentoring new
    staff, while they quietly battle anxiety about performance and prefer familiar routines over rapid change.
  sports: Kareem Jaimes, an avid fan of Liga MX, regularly watches Club América matches at the community center with friends, attends local soccer games on Saturday afternoons, and they join the senior
    center’s weekly bingo league— their favorite team is the local youth soccer club Los Libertadores that they cheered for as a child.
  arts: Kareem Jaimes, a devoted member of their church’s volunteer choir, enjoys listening to ranchera legends like Vicente Fernández and mariachi ensembles, and they often organize Día de los Muertos
    altars and Christmas posadas that blend music, storytelling, and community participation.
  travel: Kareem Jaimes, who favors short, purposeful trips, travels each month to visit their children in Monterrey, dreams of a pilgrimage to the Basilica of Our Lady of Guadalupe, and they plan a relaxed
    road‑trip to Oaxaca’s culinary festivals once their taco stand is stable.
  culinary: Kareem Jaimes, an enthusiastic home cook, perfects tamales with masa and ancho chilies, simmers mole poblano with chocolate and peanuts, and prepares pozole rojo using hominy and pork shoulder,
    and they often share recipes and the occasional extra spice jar with neighbors after weekend potlucks.
  core: Kareem Jaimes, a routine‑loving yet socially vibrant 68‑year‑old, blends their love for traditional dishes, community choir, and soccer fandom with a touch of anxiety‑driven disorganization that
    fuels both their charismatic mentorship and their dream of a modest taco stand, and they hope to open it within the next few years.
background:
  cultural: Kareem is a first‑generation Mexican American whose parents emigrated from Jalisco in the early 1960s. Growing up in a bilingual household, he learned to speak Spanish at home while attending
    English‑language schools in the Midwest. His family maintains many traditions from their homeland, such as celebrating Día de los Muertos with altars, preparing homemade tamales during holidays, and
    attending Catholic mass on Sundays. In Fort Wayne, he is an active member of the local Hispanic community, participating in cultural festivals, cuisine workshops, and neighborhood gatherings that keep
    Mexican customs alive. His marriage to a fellow Mexican heritage partner reinforces a shared commitment to family, faith, and preserving their cultural identity.
