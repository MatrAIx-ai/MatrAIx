  career_goals: Looking ahead, Candy aims to transition from a first‑line supervisor to a district manager overseeing multiple stores in the Midwest, where she can implement scalable, technology‑enabled
    retail strategies. She plans to pursue an MBA part‑time to deepen her business acumen while maintaining her family commitments. Long‑term, she envisions launching a consulting practice that helps small
    retailers adopt sustainable and data‑informed operations, reflecting her blend of curiosity, practicality, and community focus.
