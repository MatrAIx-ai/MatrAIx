personas:
  professional: Candy Petrakis, a 36‑year‑old retail supervisor with a STEM background, blends curiosity‑driven data exploration with pragmatic store layouts, leveraging POS analytics and visual merchandising
    to boost performance while they lead a diverse team through strategic scheduling and occasional bold process overhauls.
  sports: Candy Petrakis, a 36‑year‑old outdoor enthusiast, hikes the Flint Hills each weekend for cardio, occasionally joins a local co‑ed soccer league, roots for the Kansas City Chiefs in the fall and
    the Royals in the summer, and they balance a flexible fitness routine with a pragmatic habit of tracking steps on a smartwatch.
  arts: Candy Petrakis, a 36‑year‑old puzzle‑loving reader, immerses themselves in mystery novels by Agatha Christie and Gillian Flynn, solves intricate jigsaw puzzles, hosts board game nights featuring
    Settlers of Catan, and attends local theater productions starring the Kansas City Repertory Company, while they listen to folk legends like Bob Dylan and contemporary indie bands for creative inspiration.
  travel: Candy Petrakis, a 36‑year‑old family‑oriented traveler, prefers well‑planned weekend road trips to nearby gems like the Ozark National Forest and Chicago’s lakeshore, while saving for a longer
    summer vacation to the Greek islands of Crete and Santorini that they dream of exploring alongside their partner and two kids, balancing adventure with budget and time constraints.
  culinary: Candy Petrakis, a 36‑year‑old hobby chef, cultivates a vegetable garden to source fresh kale, tomatoes, and corn for home‑cooked meals like Greek moussaka, hearty chicken pot pie, and Midwest‑style
    corn succotash, experimenting with feta, oregano, and locally sourced pork sausage, while they maintain an intermediate skill level that blends confident recipe improvisation with occasional over‑salting.
  core: Candy Petrakis, a 36‑year‑old data‑driven retail manager who balances curiosity with practicality, spends weekends hiking and gardening, devours mystery novels, and secretly hoards coffee mugs while
    they occasionally neglect sleep to finish a puzzle.
background:
  cultural: Candy is a second‑generation Greek‑American raised in the small town of Paola, Kansas. Her family traditions blend Greek hospitality—celebrating Easter with lamb and baklava—and Midwestern values
    of community, modesty, and hard work. Growing up in a predominantly white, rural environment, she was exposed to both the close‑knit Greek church community and the broader Kansas culture, shaping a
    worldview that respects diverse customs while grounding her in the practical, neighbor‑helping ethos of the Heartland.
