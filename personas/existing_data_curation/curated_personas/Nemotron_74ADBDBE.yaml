personas:
  professional: Jorge Serras, a 28‑year‑old taxi driver in Huntington Beach, leverages expert navigation skills, bilingual fluency, and a hands‑on knack for quick fixes to deliver reliable rides while their
    sociable, curiosity‑driven nature fuels plans to earn a CDL, acquire a fleet of eco‑friendly cars, and launch a community‑focused driver training program despite a relaxed approach to paperwork.
  sports: Jorge Serras hits the sand for weekly beach volleyball matches with the Huntington Beach Volleyball Club, rides early‑morning swells with the Pacific Beach Surf Club, and roots for the LA Dodgers
    and LA Lakers while maintaining an easygoing fitness routine that blends surf conditioning, casual gym sessions, and occasional pickup basketball games.
  arts: Jorge Serras channels creative energy by learning salsa steps at local nights featuring live bands like Grupo Niche and classic tunes from Celia Cruz, swapping playlists between Snoop Dogg’s West‑Coast
    beats and Carlos Vives’s vallenato charm, and showcasing pride in community festivals by serving homemade pupusas while humming favorite movie soundtracks.
  travel: Jorge Serras prefers spontaneous road‑trip getaways, often crisscrossing Southern California’s coastline to Santa Barbara and San Diego, while eyeing a future surf pilgrimage to Puerto Rico’s
    Rincon and a week‑long cultural tour of Oaxaca’s markets once their fleet expansion frees up extra cash.
  culinary: Jorge Serras is a kitchen enthusiast who hand‑rolls pupusas stuffed with queso fresco, loroco, and chicharrón, slow‑cooks tamales on Sundays, and mixes avocado‑lime salsa to accompany freshly‑caught
    fish tacos, balancing occasional fast‑food cravings with a genuine love for home‑cooked comfort.
  core: Jorge Serras thrives on camaraderie, juggling a taxi wheel and a surfboard while habitually misplacing their keys and forgetting appointments, which often stalls their ambitious plans to grow a
    fleet of eco‑friendly rides.
background:
  cultural: Jorge grew up in a Salvadoran immigrant family that settled in Southern California when he was a child. He maintains strong ties to his heritage through language, cuisine, and community celebrations
    such as Día de la Madre and the annual Salvadoran Independence festivities hosted by local Latino organizations. His Catholic upbringing and close‑knit family network foster a sense of collective responsibility,
    while his daily life in Huntington Beach blends the laid‑back California beach culture with the warmth and communal spirit of Salvadoran traditions.
attributes:
  skills: '[''Expert Driving'', ''Local Navigation Knowledge (Orange County)'', ''Bilingual Spanish‑English Communication'', ''Basic Vehicle Maintenance'', ''Customer Service'', ''Conflict De‑escalation'',
    ''Problem Solving'', ''Cash and Digital Payment Handling'', ''Ride‑Sharing App Proficiency'', ''Basic First‑Aid Certification'']'
  hobbies: '[''Beach Volleyball'', ''Surfing'', ''Cooking Salvadoran Cuisine (Pupusas, Tamales)'', ''Attending Cultural Festivals'', ''Salsa Dancing'', ''Exploring New Music'', ''Vintage Car Restoration'',
    ''Socializing with Friends at Local Hangouts'']'
  career_goals: Jorge aims to transition from being a solo taxi driver to owning a small fleet of eco‑friendly vehicles that serve the Hispanic community in Huntington Beach. He plans to obtain a commercial
    driver’s license (CDL) to expand into larger transport services and eventually launch a driver‑training program focused on safe, customer‑centered practices. While he values flexibility, he also hopes
    to diversify his income by offering a side business in car detailing and a weekend food stall featuring Salvadoran pupusas, merging his cultural roots with entrepreneurial ambition.
