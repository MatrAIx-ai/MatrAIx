personas:
  professional: Patricia Stokes, a budding business administration student, leverages their meticulous event-planning experience and Excel wizardry to streamline campus club operations, thriving in structured
    environments where their methodical problem-solving and assertive communication keep projects on schedule, and they excel at turning chaotic ideas into orderly plans.
  sports: Patricia Stokes enjoys low-impact fitness, practicing yoga three times a week, joining weekend hikes with the local Trailblazers Hiking Club, and cheering on the Cincinnati Bengals during football
    season, while they prefer to avoid high-intensity gym sessions that feel too chaotic.
  arts: Patricia Stokes immerses themselves in bluegrass and folk, regularly listening to The Avett Brothers and Alison Krauss, spending quiet evenings with historical fiction by Hilary Mantel, and occasionally
    attending intimate acoustic sets at the local coffeehouse, and they find those artistic moments essential to their reflective routine.
  travel: Patricia Stokes prefers carefully planned short getaways, having explored the Appalachian trails of Asheville and the music venues of Nashville on budget-friendly train trips, while they dream
    of a future road trip through the Great Smoky Mountains and a spring visit to the historic streets of Savannah.
  culinary: Patricia Stokes, a budding home chef, enjoys farm-to-table cooking using herbs from their garden, including basil, rosemary, and thyme, to craft meals like quinoa-stuffed bell peppers and lemon-garlic
    roasted salmon, while occasionally indulging in comfort dishes like mac and cheese on a lazy study night.
  core: Patricia Stokes balances a love for orderly spreadsheets with a quiet love for bluegrass, turning each day into a carefully scheduled yet gently melodic journey, though they sometimes procrastinate
    on laundry until the last possible night.
background:
  cultural: Patricia was raised in Union, Kentucky, a suburban community that blends Midwestern practicality with Southern hospitality. Her family’s values emphasize hard work, education, and community
    involvement, often expressed through church participation and local events such as county fairs and high‑school sports. While she identifies with broader White American cultural norms, she also appreciates
    regional traditions like bluegrass music, home‑cooked Southern meals, and a strong sense of neighborly support. This cultural backdrop nurtured her preference for order, reliability, and cooperative
    engagement with others.
attributes:
  skills: '["Time management", "Project coordination", "Event planning", "Data entry", "Microsoft Office Suite (Word, Excel, PowerPoint)", "Basic bookkeeping", "Written communication", "Attention to detail",
