  hobbies: '["Reading (personal development & historical fiction)", "Gardening", "Meal planning and cooking", "Puzzle solving (crosswords, sudoku)", "Yoga", "Hiking in nearby parks", "Listening to bluegrass
    and folk music", "Volunteer work at community center", "Socializing with close friends"]'
  career_goals: Patricia aims to complete her Bachelor's degree in Business Administration within the next two years, securing an internship in operations or supply‑chain management at a company in the
    Greater Cincinnati area. After graduation, she plans to obtain the Certified Associate in Project Management (CAPM) credential and pursue an entry‑level role as a project coordinator or operations analyst,
    where she can apply her structured problem‑solving skills. Long‑term, she aspires to become a certified Project Management Professional (PMP) and lead cross‑functional teams, driving efficiency and
    on‑time delivery of projects while maintaining the predictable, organized work environment she values.
