  career_goals: She aims to obtain her Professional Engineer (PE) license within the next two years and transition to a senior electrical engineer role focusing on renewable energy projects, especially
    solar‑PV and grid‑modernization initiatives in the Midwest. Lajoyce hopes to lead a multidisciplinary design team, champion diversity and inclusion by mentoring Black women in STEM, and eventually pursue
    a master’s degree in power systems. She also seeks a workplace that prioritizes mental‑health support, offering flexible scheduling and resources to manage her anxiety.
