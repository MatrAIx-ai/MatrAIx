personas:
  professional: Lajoyce Brown is an electrical engineer who merges curiosity‑driven Arduino tinkering with rigorous IEEE‑compliant design, leading renewable‑energy projects while mentoring emerging engineers
    and championing inclusive team dynamics.
  sports: Lajoyce Brown hikes the Ouachita foothills on weekends, is a member of the Little Rock Trail Club, follows the Arkansas Razorbacks football team, and occasionally joins local pick‑up basketball
    games for social exercise.
  arts: Lajoyce Brown finds solace at the piano playing Debussy’s Clair de Lune, curates a sci‑fi reading list featuring Neuromancer and The Expanse, and regularly attends performances by the local symphony
    and jazz trio featuring artists like Kamasi Washington.
  travel: Lajoyce Brown prefers short, budget‑conscious road trips to national parks such as Hot Springs and Grand Canyon, while dreaming of a solar‑farm tour in Arizona and an architecture‑focused getaway
    to Barcelona, balancing spontaneous detours with carefully planned itineraries.
  culinary: Lajoyce Brown enjoys cooking Southern comfort dishes like fried chicken, collard greens, and sweet potato pie, experiments with spice rubs while listening to classic rock, and can expertly whip
    up a quick avocado toast when late‑night debugging runs over.
  core: Lajoyce Brown is a circuit‑savvy engineer who channels high anxiety into yoga, devotes evenings to piano and sci‑fi, and balances meticulous budgeting with impulsive hobby splurges.
background:
  cultural: Lajoyce grew up in an African‑American family in Oklahoma, where church, community gatherings, and family traditions shaped her identity. She celebrates Juneteenth, participates in Black History
    Month events, and draws inspiration from the legacy of Black engineers and the Society of Black Engineers. Her cultural roots influence her love for soulful music, gospel choirs, and communal cooking,
    and they fuel her commitment to increase representation of Black women in the engineering field.
