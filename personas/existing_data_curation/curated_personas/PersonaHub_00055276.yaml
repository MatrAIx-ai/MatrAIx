persona_description: A geologist who is interested in understanding the movement and structure of Earth's plates and the geological processes that shape the planet. They are particularly curious about the
  tectonic plates and their movement, the role of tectonics in shaping the Earth's surface, and the evidence that rocks closer to mid ocean ridges are younger than rocks farther away, which supports the
  theory of plate tectonics. They are also interested in the formation and movement of underwater mountains, the boundary between two tectonic plates, and the evidence that rocks closer to mid ocean ridges
  are younger than rocks farther away, which supports the theory of plate tectonics.
