  hobbies: '[''Recreational soccer'', ''Community volunteer work'', ''DIY woodworking'', ''Home renovation projects'', ''Listening to construction technology podcasts'', ''Fishing trips'', ''Attending county
    fairs'']'
  career_goals: Justin aims to advance from construction manager to senior project manager overseeing larger multi‑family and commercial developments. He plans to earn a professional certification such
    as the Certified Construction Manager (CCM) or Project Management Professional (PMP) and eventually launch his own construction firm focused on energy‑efficient building methods. Balancing his desire
    for practical growth with innovative practices, he also hopes to mentor younger tradespeople and contribute to community development projects that improve the quality of life in his hometown.
