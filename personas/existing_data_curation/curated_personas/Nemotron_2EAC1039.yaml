personas:
  professional: Justin Mcalpine is a construction manager who blends hands‑on blueprint expertise, BIM adoption, and a cooperative, community‑first mindset to keep residential and small commercial projects
    on schedule while they mentor crews and champion sustainable building practices.
  sports: Justin Mcalpine plays forward for a local recreational soccer league during spring and summer, cheers on the Kansas City Chiefs in the NFL, follows the St. Louis Cardinals in baseball, and spends
    Sunday mornings at the community park for pick‑up games of ultimate frisbee with neighbors, while they stay active through weekend bike rides along the river trail.
  arts: Justin Mcalpine enjoys weekend visits to the regional folk music fest where they soak up performances by artists like John Prine and The Avett Brothers, appreciates the craftsmanship of Midwestern
    woodworkers, and occasionally attends community theater productions of classic American plays, finding inspiration for their own DIY woodworking projects.
  travel: Justin Mcalpine favors short, purposeful road trips that blend adventure and family time, often heading to the Ozark National Forest for hiking, the Lake of the Ozarks for fishing, and budgeting
    annual vacations to Chicago’s architecture tours, while they dream of a future cross‑country road trip to explore sustainable building projects in Portland.
  culinary: Justin Mcalpine, a competent home‑cook, loves firing up a charcoal grill for Kansas City‑style burnt ends, preparing fresh catfish po’boys after river trips, and perfecting a family‑secret apple‑cinnamon
    pie, while they keep a toolbox of spices that includes smoked paprika and locally sourced honey.
  core: Justin Mcalpine is a community‑driven construction manager whose curiosity for sustainable tech, love of team sports, and habit of tracking every detail—from budgets to fish bites—shapes a pragmatic
    yet inventive outlook on life, and they approach challenges with a blend of practicality and optimism.
background:
  cultural: Justin grew up in a mid‑western small‑town environment that values hard work, community involvement, and practical problem‑solving. His family traditions include regular attendance at local
    church events, participation in high school sports, and a strong sense of responsibility to neighbors. The cultural emphasis on reliability, cooperation, and a balanced work‑life outlook shapes his
    approach to both his career and personal life, reinforcing his desire to contribute positively to his community while providing stability for his family.
attributes:
  skills: '[''Blueprint reading'', ''Project scheduling'', ''Budget management'', ''Contract negotiation'', ''Site safety compliance'', ''Team leadership'', ''Construction software (Procore, Buildertrend)'',
