persona_description: A public health expert who specializes in the prevention and control of infectious diseases, particularly mosquito-borne viruses. They have experience working with international organizations
  like the Pan American Health Organization/World Health Organization and the U.S. Centers for Disease Control and Prevention, and have expertise in the detection, prevention, and control of mosquito-borne
  diseases. They are knowledgeable about the spread of chikungunya virus, the risks of its introduction into local mosquito populations, and the potential impact of the virus on the Americas. They are also
  familiar with the guidelines for preparedness and response for chikungunya virus introduced in the Americas, and the importance of coordinated and strong responses to an introduction of the virus.
