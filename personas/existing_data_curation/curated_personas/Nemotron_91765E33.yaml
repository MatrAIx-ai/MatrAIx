  hobbies: '[''Reading'', ''Cycling'', ''Hiking'', ''Photography'', ''Board games'', ''Craft-beer tasting'', ''DIY home improvement'', ''Gardening'']'
  career_goals: Andrew aspires to transition from specialist to senior leadership within the project management office, targeting a Director of PMO or VP of Project Services role within the next five years.
    He aims to spearhead large‑scale, multi‑site digital transformation initiatives that embed AI‑driven project analytics into the company's operational fabric. Additionally, he plans to develop a thought‑leadership
    presence by publishing articles on flexible project methodologies, speaking at regional conferences, and mentoring emerging project managers. In the longer term, he envisions launching his own consultancy
    focused on agile transformation for mid‑market manufacturers in the Midwest.
