personas:
  professional: Andrew Minton, a seasoned project manager with 15 years spanning construction, IT, and manufacturing, blends agile and AI‑assisted scheduling to keep fluid timelines moving while using their
    strong negotiation and conflict‑resolution skills to compensate for a natural aversion to rigid deadlines and occasional organizational slip‑ups.
  sports: Andrew Minton, a dedicated cyclist on the Illinois Prairie Path and weekend hiker through Des Plaines State Preserve, follows the Chicago Cubs and the Chicago Bulls, and participates in the local
    Mid‑West Pedalers club that meets every Saturday for long‑distance rides.
  arts: Andrew Minton, an avid reader of Neal Stephenson and William Gibson, spends evenings editing DSLR landscape images of prairie sunsets, convenes small board‑game sessions featuring Terraforming Mars
    and Scythe, and occasionally attends craft‑beer and art showcases at nearby galleries.
  travel: Andrew Minton prefers low‑key, self‑planned escapes that blend nature and tech, such as hiking Starved Rock State Park, biking the Dutch countryside on a mapped route, and dreaming of attending
    a futurist design conference in Tokyo while keeping travel budgets tight.
  culinary: Andrew Minton, a modest home chef, delights in turning garden harvests into grilled vegetable medleys with heirloom tomatoes and fresh basil, pairs dishes with locally brewed IPAs, and treats
    themselves to sushi rolls from a beloved downtown spot on occasional date nights.
  core: Andrew Minton balances a restless curiosity for emerging technology with a quiet love of solo cycling, yet habitually procrastinates on strict deadlines, finding solace in meticulous photo editing,
    craft‑beer tastings with their spouse, and spontaneous DIY projects.
background:
  cultural: Andrew was raised in a middle‑class Midwestern family in the Chicago suburbs, where values of practicality, community involvement, and self‑reliance are emphasized. His heritage includes German
    and Irish ancestry, reflected in family traditions such as holiday gatherings, backyard barbecues, and participation in local farmers’ markets. He identifies with the characteristic Midwestern work
    ethic and friendliness, while also appreciating the cultural diversity of Cook County through occasional visits to cultural festivals and museums. His marital life is a cornerstone of his personal identity,
    and he often volunteers with his spouse at the local church’s outreach programs.
attributes:
  skills: '[''Project Planning'', ''Agile & Scrum'', ''Risk Management'', ''Stakeholder Communication'', ''Budgeting & Cost Control'', ''Data Visualization (Power BI)'', ''Project Management Software (MS
