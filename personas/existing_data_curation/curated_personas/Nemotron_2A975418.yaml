personas:
  professional: Maria Acevedoortiz, a seasoned agricultural and food‑science technician with 15 years of hands‑on experience, blends curiosity with practicality by using precision‑agriculture drones and
    soil‑moisture sensors to design sustainable crop‑rotation plans while translating complex regulatory data into bilingual workshops for local growers and food‑bank partners.
  sports: Maria Acevedoortiz channels their energetic sociability into weekly salsa and bachata nights, a Saturday kayaking outing on the Matanzas River with the St. Augustine Paddle Club, and attending
    Tampa Bay Rays games, while maintaining a modest jogging routine along the historic waterfront to stay fit.
  arts: Maria Acevedoortiz expresses creativity through painting vibrant seascapes of the Floridian coast, immersing themselves in contemporary Caribbean literature by authors like Junot Díaz and Esmeralda
    Santiago, and savoring live performances by salsa bands such as Orquesta Buena Vista Social Club at local cultural festivals.
  travel: Maria Acevedoortiz favors immersive travel that blends cultural festivals and natural beauty, having explored San Juan’s old town and Cartagena’s historic walls, while planning a future eco‑tour
    of the Dominican Republic’s cacao farms and using a points‑earning credit card to fund weekend road trips to Savannah and the Georgia coast.
  culinary: Maria Acevedoortiz, an adept home chef, delights in preparing arroz con gandules, mofongo, and lechón asado with heirloom tomatoes and tropical herbs from their backyard, frequently hosts potluck
    gatherings that showcase these dishes, and occasionally experiments with vegan twists using plant‑based protein while still savoring the smoky flavor of adobo‑spiced pork.
  core: Maria Acevedoortiz is a community‑focused, bilingual food‑systems advocate who balances meticulous planning with spontaneous garden experiments, a love of salsa rhythms, and a habit of splurging
    on coffee while never missing a chance to mentor emerging growers.
background:
  cultural: Maria was born to Puerto Rican parents who immigrated to Florida in the early 1980s. She grew up immersed in the island’s music, cuisine, and familial values of collectivism, hospitality, and
    resilience. Bilingual and bicultural, she celebrates traditions such as Noche de San Juan, the annual San Sebastián Festival, and family gatherings featuring festive dishes like lechón asado. Her Puerto
    Rican heritage informs her professional ethos, driving a passion for food security and sustainable agriculture that honors the island’s agrarian roots. Living in St. Augustine, she bridges her Caribbean
    background with the Floridian community, actively participating in local Latino organizations, contributing to multicultural events, and advocating for the inclusion of Latin American food perspectives
    in regional nutrition programs.
attributes:
  skills: '[''Food safety compliance (FSMA, USDA organic)'', ''Laboratory analysis of nutrients and pesticide residues'', ''Precision agriculture technology (soil‑moisture sensors, drone imaging)'', ''Integrated
    Pest Management (IPM)'', ''Crop‑rotation and sustainable greenhouse management'', ''Data collection, statistical analysis, and report writing'', ''Bilingual communication (English/Spanish)'', ''Community
    outreach and education'', ''Training and mentoring of staff and volunteers'', ''Project coordination and documentation'']'
  hobbies: '[''Salsa and bachata dancing'', ''Weekend gardening (herbs, peppers, heirloom tomatoes)'', ''Cooking traditional Puerto Rican meals'', ''Volunteer work at St. Augustine food bank'', ''Reading
    contemporary Caribbean literature'', ''Painting seascapes'', ''Kayaking on the Matanzas River'', ''Participating in local cultural festivals'']'
  career_goals: Maria aims to transition into a supervisory role within a regional agricultural extension service, where she can shape policy and program design for sustainable food production. She plans
    to pursue a master’s degree in Sustainable Food Systems to deepen her expertise and to lead a community‑based initiative that links Puerto Rican culinary heritage with local farm‑to‑table programs in
    St. Johns County. Over the next five years, she hopes to become a recognized liaison between research institutions and small‑scale growers, championing culturally relevant nutrition education, and eventually
    establishing a nonprofit that provides technical training and micro‑grant support to immigrant farmers seeking to adopt eco‑friendly practices.
