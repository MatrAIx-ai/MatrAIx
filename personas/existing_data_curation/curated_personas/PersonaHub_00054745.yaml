persona_description: A scientist conducting research on the properties and regulation of gap junction channels and hemichannels in monolayers of primary corneal endothelial cells, using Fluo4-AM to measure
  intercellular Ca2+ waves and the use of siRNA and inhibitors of gap junction channels and hemichannels. This research is aimed at understanding the molecular pathways that control intercellular Ca2+ wave
  propagation and the potential applications of gap junction channels and hemichannels in medical and biotechnology fields. The scientist is likely to be familiar with experimental techniques, such as the
  measurement of intercellular Ca2+ waves, and has expertise in gap junction channels and hemichannels. They may also have knowledge of molecular biology and biophysics, as well as experience with animal
  models, such as the bovine corneal endothelial cells used as a model system.
