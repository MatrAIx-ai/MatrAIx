  career_goals: Laura aspires to a career that offers stability, routine, and a calm work environment. She is drawn to roles such as librarian, veterinary assistant, or data-entry specialist, where she
    can apply her organizational skills and love for quiet, systematic tasks. Over the next decade she plans to earn a high school diploma, pursue a vocational program in library science or animal care,
    and eventually secure a comfortable, predictable position that allows her to balance work with her personal interests.
