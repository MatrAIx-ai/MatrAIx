persona_description: A researcher or engineer working in the field of coastal engineering, specifically focused on the analysis and modeling of tsunami waves and their effects. They are interested in developing
  and testing new methods for estimating tsunami height and wave front kinematics, with a particular emphasis on the development of algorithms for determining the movement direction of computational points
  along a moving tsunami wave front line. They are also interested in testing their method against existing analytical solutions and comparing the results to numerical modeling of tsunami propagation using
  the MOST software, in order to assess the accuracy and speed of their proposed method.
