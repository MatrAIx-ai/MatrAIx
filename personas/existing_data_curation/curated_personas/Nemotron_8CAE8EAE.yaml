  career_goals: Kathie aims to advance within the Ohio Department of Taxation, seeking promotion to Senior Tax Examiner and eventually a supervisory or managerial position where she can lead a team of auditors.
    She plans to obtain a Certified Public Accountant (CPA) credential and optionally pursue a Master’s in Public Administration to deepen her understanding of fiscal policy. Her long‑term ambition includes
    shaping departmental best‑practice guidelines, introducing data‑driven compliance strategies, and mentoring junior staff to uphold high standards of integrity and efficiency.
