  career_goals: Matthew aims to transition into a senior leadership role that centers on innovation and interdisciplinary collaboration, such as Director of Innovation or Chief Innovation Officer. He wants
    to champion projects that blend technology with artistic design, creating consumer products and services that are both functional and aesthetically compelling. To support this vision, he plans to pursue
    an executive MBA with a focus on design strategy and to deepen his knowledge of emerging technologies like generative AI. Throughout his career advancement, he remains committed to cultivating a harmonious
    workplace culture, mentoring emerging talent, and maintaining a work-life balance that supports his family and personal creative pursuits.
