persona_description: A professional astronomer who is interested in studying the center of star clusters in our Milky Way Galaxy, specifically the newly upgraded Hubble Space Telescope and the Omega Centauri
  globular cluster. They are likely to be familiar with the principles of stellar collisions, the formation of new binary star systems, and the interaction of binary stars, including the emission of ultraviolet
  or X-ray light due to gas falling from one star onto the surface of a compact companion such as a white dwarf or neutron star. They are also likely to be knowledgeable about the properties and characteristics
  of globular clusters, including their location, size, and the number of stars within them.
