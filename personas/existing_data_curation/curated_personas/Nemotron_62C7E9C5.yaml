  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking and nature walks'', ''Fishing in local streams'', ''Reading science-fiction and technology non-fiction'', ''Electronics tinkering
    at a maker’s space'', ''Acoustic guitar playing'', ''Attending local art exhibitions'', ''Participating in a book club'', ''Volunteering at the community library'']'
  career_goals: Joshua aims to leverage his deep postal operations knowledge to advance into a supervisory role within the United States Postal Service, such as a shift supervisor or operations manager,
    where he can lead a team and implement efficiency projects. He is pursuing certification as a mail equipment technician to formalize his troubleshooting expertise. Over the next five years, he plans
    to complete a bachelor’s degree in business administration, building on his associate’s degree, to broaden his strategic management capabilities. He also envisions launching a small consulting service
    for local businesses, helping them streamline their shipping and logistics based on his mail‑processing experience. Balancing his competitive drive with his appreciation for art, he hopes to integrate
    creative solutions into process design, mentor younger workers, and achieve a stable, fulfilling career that leaves room for his artistic pursuits.
