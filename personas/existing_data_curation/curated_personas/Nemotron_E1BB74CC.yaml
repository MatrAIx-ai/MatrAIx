    social media'', ''Ingredient sourcing and seasonal menu planning'']'
  hobbies: '[''Art gallery visits'', ''Food photography'', ''Herb gardening on balcony'', ''Listening to jazz and indie folk music'', ''Walking along the shoreline'', ''Reading about food culture and art
    history'', ''Writing a personal food journal'', ''Building handcrafted wooden kitchen tools'', ''Watching culinary documentaries'']'
  career_goals: Paul aspires to transition from a line cook to a head chef position at a small, locally‑focused restaurant where he can experiment with New England seafood and global flavors. He dreams
    of opening a modest pop‑up kitchen or a waterfront café that emphasizes artistic plating and seasonal, locally‑sourced ingredients. Over the next five years, he aims to author a small cookbook that
    blends traditional Connecticut fare with his own inventive twists, and to develop a reputation as a culinary innovator who offers occasional private dining experiences for intimate groups.
