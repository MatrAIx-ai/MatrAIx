personas:
  professional: Jonathan Solano, a 33‑year‑old retail cashier in Fontana, leverages meticulous cash‑handling, bilingual POS expertise, and a flair for visual merchandising to streamline store operations
    while quietly curating shop displays that reflect their love of urban sketching and photography.
  sports: Jonathan Solano finds low‑impact fitness appealing, attending sunrise yoga classes at the local studio and jogging with the Fontana Rapids Running Club, while cheering quietly from home for the
    Los Angeles Lakers during basketball season and the LA Galaxy for soccer.
  arts: Jonathan Solano devotes evenings to sketching cityscapes and photographing quiet corners, drawing inspiration from the contemplative works of Edward Hopper, the vibrant street photography of Henri
    Cartier‑Bresson, and the cinematic compositions of director Wes Anderson, which inform their own aesthetic choices.
  travel: Jonathan Solano prefers solitary, culturally rich trips, having explored the historic neighborhoods of Oaxaca, the serene fjords of Norway, and the rolling vineyards of Tuscany, while planning
    a future retreat to the Japanese tea gardens of Kyoto to study traditional garden design.
  culinary: Jonathan Solano enjoys cooking at home, mastering the balance of flavors in dishes like baleadas with refried beans and cheese, chicken tamales wrapped in corn husks, and hearty sopa de frijoles
    seasoned with cilantro and cumin, while seeking out artisanal coffee roasters for weekend tastings.
  core: Jonathan Solano, a quiet creative mind with a penchant for meticulous organization, blends a love of art and entrepreneurship while battling a mild back ache and an occasional caffeine overindulgence.
background:
  cultural: Jonathan is the son of Honduran immigrants who settled in Southern California. Growing up in a bilingual household, he learned Spanish from his parents and English at school, giving him fluency
    in both languages. Honduran cultural traditions—such as celebrating Día de la Independencia de Honduras with family gatherings, traditional foods like baleadas and tamales, and listening to punta and
    folk music—remain integral to his identity. He maintains strong ties to the local Honduran community in Fontana, participating in cultural festivals, volunteer activities at the community center, and
    occasional family visits to Honduras. These experiences inform his values of family cohesion, hospitality, and respect for cultural heritage, which he often reflects in his personal creative projects
    through vivid colors and motifs inspired by Honduran art.
attributes:
  skills: '["Cash handling", "POS system operation", "Bilingual English/Spanish communication", "Customer service", "Inventory tracking", "Loss prevention", "Excel", "Basic inventory software", "Problem
