  hobbies: '["Sketching", "Watercolor painting", "Digital illustration", "Photography", "Reading art history and design books", "Cooking Honduran cuisine", "Yoga", "Meditation", "Visiting quiet art galleries",
    "Listening to Latin folk music"]'
  career_goals: Jonathan aims to transition from his current cashier position into a supervisory role, such as assistant store manager, where he can apply his organizational strengths and curiosity to streamline
    operations and enhance visual presentation. He plans to complete his associate degree in Business Administration, focusing on management and marketing courses, to equip himself with the necessary leadership
    skills. In the long term, he envisions opening a modest community-oriented storefront—perhaps a specialty grocery or coffee shop—that highlights Honduran products and provides a quiet space for cultural
    and artistic appreciation, blending his entrepreneurial drive with his love for heritage and the arts.
