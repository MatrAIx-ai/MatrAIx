  career_goals: Although officially retired, Tommy aims to leave a lasting legacy by documenting his family’s farm history and the broader story of Butler, mentoring local youth interested in entrepreneurship,
    and supporting his grandchildren’s education through scholarships or financial guidance. He also aspires to stay physically active with regular walks and gardening, keep his mind sharp by learning new
    technologies, and continue volunteering in community service projects that strengthen local ties.
