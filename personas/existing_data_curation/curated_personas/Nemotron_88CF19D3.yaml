  career_goals: Joshua aims to re‑enter the technology workforce in a role that offers clear structure, predictable responsibilities, and a supportive team environment—ideally as a data analyst or junior
    software engineer at a mid‑size company that values work‑life balance. He plans to complete a series of certification courses (e.g., AWS Cloud Practitioner, Agile Scrum Master) to reinforce his technical
    credentials and demonstrate commitment to professional growth. Over the next five years, he hopes to progress to a senior data specialist position where he can mentor new hires, lead collaborative projects,
    and contribute to building inclusive workplace practices that reduce stress for himself and his colleagues.
