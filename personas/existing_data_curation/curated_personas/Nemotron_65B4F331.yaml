personas:
  professional: Dipti Hoque, a three‑year‑old pretender shopkeeper, meticulously lines up toy cash registers, follows a self‑made price list for each plush, and confidently negotiates with playmates while
    gently reminding them of the store's 'no‑cry' rule to keep the chaos in check.
  sports: Dipti Hoque, a spirited member of the Little Explorers Soccer Club, loves the structured drills at preschool, jumps enthusiastically on the parachute in gym class, and watches the Starlight Cubs
    on TV, though they sometimes worry about missing a turn during games.
  arts: Dipti Hoque delights in drawing bright crayon suns, dancing to Raffi’s 'Baby Beluga', and mimicking Peppa Pig’s squeaky voice, often leading group sing‑alongs during playdates while secretly fretting
    over any off‑beat note.
  travel: Dipti Hoque enjoys weekend trips to the city zoo, sandcastle adventures at Sea Breeze Beach, and long‑awaited family vacations to Disneyland, yet the current savings limit future journeys to nearby
    parks and a hopeful future visit to Paris.
  culinary: Dipti Hoque prefers creamy macaroni and cheese, banana slices dusted with cinnamon, and proudly mashes sweet potatoes for dinner, while stubbornly refusing broccoli, which often triggers a brief
    tantrum before a quick compromise with carrot sticks.
  core: Dipti Hoque, a three‑year‑old bundle of organized energy, thrives on structured play, worries over lost pennies, and balances bold imagination with occasional bouts of melodramatic stress.
background:
  cultural: Dipti grows up in a South‑Asian household that blends Indian Sikh and Bangladeshi traditions. At home she hears Hindi, Bengali, and English, celebrates Diwali with lights and sweets and Eid
    with family gatherings, enjoys biryani, roti, and sweet treats, and is exposed to Bollywood songs, folk tales, and colorful cultural festivals, which shape her early worldview and sense of identity.
attributes:
  skills: '[''Early language development'', ''Basic counting (1-10)'', ''Fine motor skills (stacking blocks, drawing simple shapes)'', ''Social play and turn-taking'', ''Following simple routines'', ''Imitation
    of songs and dances'']'
  hobbies: '[''Group play with peers'', ''Dancing to music'', ''Building block towers'', ''Coloring and drawing'', ''Listening to stories'', ''Assisting in simple kitchen activities'']'
  career_goals: In her imaginative play, Dipti often pretends to be a teacher or a veterinarian, expressing a budding desire to help others and care for animals. She dreams of one day guiding younger children
    and looking after pets, reflecting her cheerful sociability and compassionate side.
