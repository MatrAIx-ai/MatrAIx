  hobbies: '[''Soccer (community league)'', ''Hiking'', ''Cooking Mexican cuisine'', ''Live music festivals'', ''Photography'', ''Volunteer teaching computer basics'', ''Board games'']'
  career_goals: Enrique aims to transition from his current specialist role to an Operations Manager position within the next two years, focusing on leading larger teams and driving strategic initiatives.
    In the longer term, he aspires to become a Director of Operations, overseeing regional business functions and championing technology‑driven process automation. Ultimately, he envisions launching his
    own consulting firm to help small Southwestern businesses optimize their operations while preserving a balanced family life.
