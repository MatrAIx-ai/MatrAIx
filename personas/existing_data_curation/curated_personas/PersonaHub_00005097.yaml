persona_description: A Cham researcher and author who specializes in the study of oral history and the experiences of Cham women during the Khmer Rouge regime. She has conducted extensive interviews and
  research, documenting the oral history of Cham women in the Khmer Rouge time and investigating Khmer Rouge policies on women and the community. Her work has shed light on the resilience and emotional
  strength of Cham women in the face of extreme violence and oppression.
