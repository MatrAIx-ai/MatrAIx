  hobbies: '[''Listening to gospel and R&B music'', ''Journaling for stress management'', ''Reading mystery novels'', ''Basketball practice at the park'', ''Track running and sprint drills'', ''Cooking
    Southern soul‑food with family'', ''Gardening'', ''Participating in church youth group activities'', ''Playing strategic video games (online chess, multiplayer)'']'
  career_goals: Aireka aspires to become a registered nurse or community health worker so she can provide practical, reliable care to families in Jefferson Davis County. She envisions completing high school
    with strong grades, attending a nursing program, and later returning to her hometown to mentor younger students on study habits and health awareness. Her competitive drive also fuels a secondary ambition
    to coach a youth basketball team, helping kids develop discipline and teamwork.
