personas:
  professional: A diligent middle‑school student named Aireka Alexis channels their love for routine and competition into organizing the church youth group’s events while mentoring peers in strategic video
    games, displaying a practical mindset and early leadership potential.
  sports: A devoted basketball enthusiast named Aireka Alexis spends weekday afternoons shooting three‑pointers at the local park and runs four‑lap sprints on the middle‑school track, cheering for the hometown
    high‑school Panthers basketball team and tracking the NBA’s Chicago Bulls stats for inspiration, while they balance competition with a structured training schedule.
  arts: A passionate music fan named Aireka Alexis fills journal pages with reflections while listening to gospel legends like Marvin Sapp and R&B artists such as H.E.R., and alternates between mystery
    novels by Agatha Christie and contemporary series like "One of Us Is Lying," which together shape their storytelling imagination.
  travel: An adventurous planner named Aireka Alexis has already visited the historic French Quarter of New Orleans for a family soul‑food weekend and dreams of exploring the jazz clubs of New Orleans and
    the historic streets of Savannah, Georgia, favoring trips that blend culinary experiences with music heritage while staying within their family’s modest vacation budget.
  culinary: A budding home chef named Aireka Alexis enjoys mastering soul‑food classics with their mother, perfecting dishes like collard greens simmered with smoked turkey, sweet potato pie, and crisp
    fried catfish, while also experimenting with garden herbs to craft a signature hot sauce featuring jalapeño, garlic, and apple cider vinegar.
  core: Resourceful and routine‑loving, Aireka Alexis balances competitive basketball drills with gospel‑filled journaling, savors soulful cooking, and meticulously tracks every allowance penny, all while
    they quietly wrestle with a tendency toward worry.
background:
  cultural: Aireka was raised in a close‑knit African‑American community in Silver Creek, Mississippi, where Southern customs intertwine with Black cultural traditions. Sunday church services, gospel singing,
    and soul‑food cooking are central to family life. Celebrations of Juneteenth, Kwanzaa, and community gatherings reinforce a strong sense of heritage, resilience, and mutual support. These cultural influences
    shape her practical outlook, competitive spirit in sports, responsibility toward family duties, and her desire to give back to her neighborhood through health and education.
