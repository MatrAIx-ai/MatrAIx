personas:
  professional: Linda Kim is a diligent retail cashier at a small‑town grocery store, blending natural empathy with precise cash handling and a curiosity for new point‑of‑sale technologies, while their
    relaxed attitude toward scheduling and occasional disorganization keep them calm yet sometimes tardy, making them a dependable teammate and an aspiring manager.
  sports: Linda Kim follows the Dallas Cowboys and the Texas Rangers with weekly watch parties, plays in a local co‑ed softball league at the community center, and spends Saturday mornings riding a horse
    at the county rodeo practice field, balancing team spirit with low‑impact fitness that fits their flexible schedule.
  arts: Linda Kim enjoys knitting intricate patterns inspired by Martha Stewart while listening to country hits from Dolly Parton and Luke Bryan, regularly attends the Childress community theater’s productions
    of classic mysteries, and reads Agatha Christie novels, letting storytelling and hands‑on craft enrich their compassionate outlook.
  travel: Linda Kim favors short road trips that blend adventure with familiar comfort, having explored Austin’s live‑music scene, Santa Fe’s art markets, and the Gulf Coast’s fishing villages, while dreaming
    of a pilgrimage to New Zealand’s Southern Alps, yet their flexible planning and budget constraints keep travel plans spontaneous and locally oriented.
  culinary: Linda Kim excels at cooking hearty comfort meals, mastering chicken‑fried steak with homemade cornbread, simmering herb‑laden vegetable stew using rosemary and thyme from their garden, and baking
    pecan pie for church bake‑sales, but they occasionally over‑salt dishes when multitasking in a busy kitchen.
  core: Linda Kim is a compassionate, curiosity‑driven small‑town retailer whose calm resilience, flexible habits, and love of community service shape a life balanced between practical ambition and heartfelt
    generosity.
background:
  cultural: Linda was raised in the Texas Panhandle, an area known for tight‑knit rural communities and a culture that values hospitality, self‑reliance, and neighborly support. Her family blends Midwestern
    modesty with Texan traditions of hard work and community service. Growing up attending a local Protestant church, she internalized the importance of giving back, and she regularly participates in town
    traditions like the annual rodeo, county fairs, and volunteer initiatives that reinforce the collective spirit of Childress, Texas.
