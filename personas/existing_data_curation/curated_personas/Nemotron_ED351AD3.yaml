  career_goals: Linda aims to advance from her cashier position into retail management, leveraging her practical experience and compassionate leadership style. Over the next three years she plans to earn
    an associate degree in business administration and obtain a retail management certification, positioning herself for a store supervisor or assistant manager role. Ultimately, she envisions opening a
    small community‑focused convenience store or partnering with local charities to provide essential goods, allowing her to balance a flexible schedule with family life and continued community service.
