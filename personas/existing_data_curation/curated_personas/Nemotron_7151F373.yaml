personas:
  professional: Guillermo Flores, a methodical computer support specialist with a knack for troubleshooting across Windows, macOS, and Linux, leverages their ITIL‑informed process mindset and curiosity
    for unconventional solutions to automate help‑desk workflows, mentor junior staff, and pursue a transition to IT Service Delivery Management.
  sports: Guillermo Flores stays active through weekly hikes with the Austin Hill Country Trail Club, follows Austin FC’s MLS season and the Texas Rangers’ baseball games, and squeezes in occasional 5 K
    runs for charity, yet their structured work schedule sometimes leaves their gym routine uneven.
  arts: Guillermo Flores immerses themselves in Austin’s vibrant arts scene, attending gallery openings featuring local muralists, catching experimental jazz sets at the Elephant Room, spinning vintage
    vinyl by Joni Mitchell and Sun Ra on their record player, and channeling that creative spark into guitar jam sessions and street‑photography excursions.
  travel: Guillermo Flores plans travel with the precision of a project manager, favoring weekend road trips to the Texas Hill Country, spring getaways to New Mexico’s Santa Fe art scene, and occasional
    overseas pilgrimages to England’s Lake District for photography, while balancing a modest budget that prioritizes experience over luxury.
  culinary: Guillermo Flores, an adept home cook, thrives on blending Mexican staples like carne asada tacos and chilaquiles with Tex‑Mex twists—think smoked jalapeño crema and charred corn‑flour tortillas—sourced
    from Austin farmer’s markets, while their playlist of vintage vinyl fuels late‑night culinary experiments.
  core: Guillermo Flores is a curious, methodical tech veteran who balances a love for vintage vinyl and hill‑country hikes with a penchant for late‑night coding, coffee‑fuelled vinyl listening, and occasional
    over‑commitment to side projects.
background:
  cultural: Guillermo grew up in a bilingual Mexican‑American household, speaking Spanish fluently at home while navigating English‑dominant schools and workplaces. He values Mexican traditions such as
    Día de los Muertos, festive family gatherings, and the rich culinary heritage of his ancestry. Living in Austin, he blends this cultural foundation with the city’s eclectic, multicultural atmosphere,
    participating in local Mexican cultural festivals and volunteering as a Spanish‑language mentor for community tech‑literacy programs. His bicultural perspective informs his professional interactions,
    allowing him to provide empathetic, culturally aware support to a diverse client base.
