    services (AWS, Azure)'', ''Business analysis for IT solutions'', ''Technical documentation'', ''Customer service and training'' ]'
  hobbies: '[ ''Visiting art galleries and mural tours'', ''Live‑music performances'', ''Photography (street and nature)'', ''Playing guitar'', ''Cooking Mexican and Tex‑Mex fusion dishes'', ''Hiking in
    Texas Hill Country'', ''Reading contemporary fiction and science‑fiction'', ''Participating in tech meetups and hackathons'', ''Tabletop role‑playing games'', ''Collecting vintage vinyl records'' ]'
  career_goals: Guillermo aims to transition into a technology leadership role such as IT Service Delivery Manager or Business Technology Analyst, where he can combine his technical acumen with his business
    strategy background. He plans to earn advanced certifications—including ITIL Master, PMP, and a cloud architecture credential—to bolster his credentials. His ambition is to spearhead initiatives that
    automate support processes, integrate AI‑driven help‑desk solutions, and improve service quality for diverse client bases. Additionally, he hopes to mentor junior colleagues, promote bilingual support
    services, and eventually launch a consultancy that offers integrated IT support and process‑optimization services to small Mexican‑American businesses in the Austin area.
