  career_goals: Richard aims to channel his extensive experience into community‑focused roles that balance contribution with personal autonomy. Over the next few years he plans to volunteer as a coordinator
    for a local Habitat for Humanity chapter, overseeing small construction projects and training volunteers. He also hopes to launch a modest side venture crafting custom wooden pieces for neighbors, and
    to obtain a certification in home energy retrofitting so he can advise homeowners on cost‑effective upgrades. Ultimately, he seeks to stay engaged, support the revitalization of Wilkes‑Barre, and enjoy
    a comfortable, healthy retirement with his wife.
