  hobbies: '[''Watercolor painting'', ''Mixed‑media art'', ''Visiting art galleries'', ''Photography (landscape)'', ''Gardening (heirloom vegetables, native flowers)'', ''Cooking (world cuisines)'', ''Hosting
    dinner gatherings'', ''Volunteering at community library tech‑help desk'', ''Crosswords and logic puzzles'']'
  career_goals: Valinda aims to advance to a senior systems analyst or IT project lead position within the next five years, where she can shape strategic technology initiatives and mentor junior staff.
    She plans to earn additional certifications—such as the Certified Business Analysis Professional (CBAP) and an AWS Solutions Architect credential—to broaden her expertise in cloud migration and data
    analytics. Valinda is also interested in leading a digital‑transformation program for local small‑businesses, leveraging her curiosity for new ideas to introduce innovative, cost‑effective solutions
    that improve operational efficiency. Long‑term, she envisions transitioning into an IT managerial role that balances technical oversight with community‑focused technology outreach.
