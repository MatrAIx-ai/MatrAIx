  hobbies: '[''Hiking'', ''Watercolor Painting'', ''Photography'', ''Reading (Science & Philosophy)'', ''Woodworking'', ''DIY Electronics'', ''Digital Art'', ''Gardening'', ''Classical/Jazz Music'', ''Puzzle
    Solving'', ''Volunteer Tutoring'', ''Book Club'']'
  career_goals: Although retired, Mark aims to stay professionally engaged by volunteering as a STEM mentor for local high-school students, offering data-driven consulting to non-profits, and collaborating
    on community art installations that incorporate interactive technology. He plans to design a small solar-powered garden lighting system for his neighborhood and to complete a memoir that reflects his
    engineering career and personal philosophy. Continuing his lifelong curiosity, he intends to enroll in online courses on renewable energy and digital media, write accessible articles for senior magazines
    on technology and everyday life, and foster intergenerational harmony through workshops and tutoring.
