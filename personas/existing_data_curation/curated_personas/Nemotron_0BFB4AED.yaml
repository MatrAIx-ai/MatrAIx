personas:
  professional: Rodolfo Nieves, a 42‑year‑old bilingual handyman and pop‑up taco operator, blends practical automotive and carpentry expertise with a talent for organizing community gatherings, using their
    curiosity‑driven yet reliable nature to turn everyday repairs into social events.
  sports: Rodolfo Nieves plays forward for the Midland United Soccer Club in the spring league, follows the Dallas Cowboys and Houston Astros avidly, and maintains fitness through weekend bike repairs and
    desert hikes, treating exercise as both social bonding and personal rejuvenation.
  arts: Rodolfo Nieves enjoys strumming acoustic guitar at community fairs, dancing to cumbia legend Carlos Vives and salsa icon Celia Cruz, and finds inspiration in the vibrant murals painted by local
    street artist El Cazador.
  travel: Rodolfo Nieves favors budget‑friendly road trips—having explored the desert vistas of Big Bend, the historic charm of Marfa, and the bustling markets of Oaxaca—while dreaming of a cross‑border
    culinary pilgrimage that balances family duties and a modest savings plan.
  culinary: Rodolfo Nieves is an enthusiastic home chef who experiments with classic tacos al pastor, carnitas, and salsa verde, infusing them with chipotle‑smoked jalapeños, fresh cilantro, and a squeeze
    of lime, often showcasing these creations at pop‑up stands and community festivals.
  core: Rodolfo Nieves is a sociable, curiosity‑driven tinkerer who balances the clang of tools with the sizzle of a taco grill, yet habitually delays dentist appointments while dreaming of a community‑centered
    repair shop and food‑truck hybrid.
background:
  cultural: Rodolfo’s cultural identity is rooted in his Mexican heritage; his parents emigrated from the state of Jalisco and maintained strong traditions at home. He grew up speaking Spanish with his
    family while learning English through school and daily interactions in Midland, making him fully bilingual. Catholicism and the observance of holidays such as Día de los Muertos and Las Posadas were
    integral to his upbringing, and he continues to celebrate these traditions within the local Hispanic community. The blend of Mexican family values—respect for elders, communal meals, and a love for
    music and dance—with the rugged, oil‑driven environment of West Texas has shaped his outlook. He actively participates in the local Mexican‑American cultural association, helping organize events that
    preserve Mexican folklore while fostering inclusion with the broader Midland populace.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Basic automotive repair'', ''Handyman/home maintenance'', ''Small-scale carpentry'', ''Traditional Mexican cooking'', ''Event planning and coordination'',
