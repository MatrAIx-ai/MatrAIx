  career_goals: Guillermina aims to advance to a senior purchasing manager role within the next three years, eventually stepping into a director of procurement or VP of supply chain position. She plans
    to earn the Certified Professional in Supply Management (CPSM) credential and lead enterprise‑wide strategic sourcing initiatives that deliver measurable cost savings and sustainability benefits. Her
    ambition includes building a high‑performance procurement team that embraces data‑driven decision making while fostering a collaborative, innovative culture. She also seeks to balance her career growth
    with personal well‑being, integrating flexible work practices that reduce stress.
