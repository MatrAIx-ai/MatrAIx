  career_goals: Lauren aims to advance to a regional director role overseeing multiple lodging properties, where she can champion sustainability initiatives, introduce data‑driven operational improvements,
    and develop a mentorship program for young hospitality professionals. In the longer term, she envisions opening her own boutique inn that blends historic Lehigh Valley charm with eco‑friendly design,
    while offering community‑focused events and partnerships with local artisans.
