persona_description: A medical professional who is an advocate for breast cancer screening and supports the American Cancer Society's recommendation for women to have a screening mammogram every year starting
  at age 40. The individual is knowledgeable about the importance of mammography in early detection and treatment of breast cancer, and believes that mammography is the best tool available to find small
  cancers that are more likely to be treated successfully. The persona is also aware of the flaws and limitations of mammography data and the need for more accurate and reliable imaging methods.
