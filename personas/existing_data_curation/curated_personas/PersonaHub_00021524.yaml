persona_description: An archaeologist and heritage expert who specializes in the study of ancient coins and their significance in the context of historical trade and cultural exchange. They are particularly
  interested in the role of Chinese coins in the trade with Aboriginal people in northern Australia and the potential evidence of early contact between these two cultures. They have expertise in the analysis
  and interpretation of ancient coins and their context, and are skilled at identifying and dating coins based on their design and inscriptions. They are also knowledgeable about the history and culture
  of northern Australia, particularly the Aboriginal people who may have interacted with Chinese traders.
