  hobbies: '[''Adult soccer league'', ''Mexican cooking and BBQ'', ''Hosting weekend barbecues'', ''Participating in Mexican Heritage Festival'', ''Cumbia and mariachi dancing'', ''Fishing on Kentucky River'',
    ''Woodworking'', ''Volunteering to teach Spanish'']'
  career_goals: Jose aims to move into a supervisory role within the next two years, targeting a shift‑supervisor position that will let him lead a larger crew and shape operational standards. He plans
    to earn an OSHA certification and a Lean Six Sigma Yellow Belt to strengthen his process‑optimization credentials. Long‑term, he hopes to combine his industry expertise with his passion for Mexican
    cuisine by opening a family‑run taquería or specialty food stall in Jessamine County, leveraging his knowledge of food safety and production efficiency.
