personas:
  professional: John Vito, a seasoned electrician with a decade of experience in residential and commercial wiring, smart home automation, and solar photovoltaic installations, leverages their methodical,
    organized nature and curiosity for emerging tech to lead small crews, ensure strict code compliance, and craft art‑inspired lighting solutions that blend functionality with visual impact.
  sports: John Vito, an avid hiker, spends weekends traversing the forest preserves of the Chicago region and participates in the Chicago Wilderness Hiking Club, while also following the Chicago Cubs, Bulls,
    and Bears loyally and joining a casual pick‑up basketball league at the local community center during the summer.
  arts: John Vito merges his technical expertise with artistic sensibilities by photographing gritty industrial architecture, drawing inspiration from the light installations of James Turrell and the photographic
    precision of Andreas Gursky, and regularly attending intimate exhibitions at Chicago’s Greenhouse Gallery and the Museum of Contemporary Art.
  travel: John Vito prefers meticulously planned weekend getaways that balance adventure and relaxation, having explored Starved Rock State Park and the Pacific Northwest’s coastal trails, and now dreams
    of booking a six‑day itinerary to Iceland to chase the Northern Lights and study Nordic sustainable design.
  culinary: John Vito, a competent home cook, enjoys mastering simple yet flavorful dishes like smoked salmon bagels with capers, spicy miso ramen with fresh shiitake, and a weekend sourdough starter, favoring
    high‑quality ingredients such as locally sourced heirloom tomatoes and heritage wheat flour.
  core: John Vito, a methodical electrician‑artisan, blends curiosity for technology with a penchant for industrial photography, obsessively organizes their toolbox, occasionally forgets to answer texts,
    and consistently seeks to illuminate spaces both literally and metaphorically.
background:
  cultural: John is a second‑generation Italian‑American whose family settled in the Chicago suburbs. Raised in a close‑knit Catholic household, he grew up celebrating traditional Italian holidays like
    Ferragosto and participating in community festivals that feature Italian food, music, and folk traditions. The values of craftsmanship, hard work, and family loyalty imparted by his parents shape his
    approach to his trade. While he identifies strongly with the broader Midwestern culture—enjoying local sports, community gatherings, and a practical work ethic—he also maintains a connection to his
    heritage through occasional trips to Italy, learning basic Italian phrases, and savoring family recipes.
attributes:
  skills: '[''Residential and commercial wiring'', ''Conduit bending and installation'', ''Blueprint reading and electrical schematics'', ''Electrical safety compliance (OSHA, NEC)'', ''Circuit troubleshooting
    and diagnostics'', ''Smart home automation (e.g., Z‑Wave, Zigbee, HomeKit)'', ''LED and energy‑efficient lighting design'', ''Solar photovoltaic system installation'', ''Project planning and time management'',
    ''Team leadership and crew coordination'']'
  hobbies: '[''Smart home lighting experiments'', ''Urban and industrial photography'', ''Visiting art galleries and small exhibitions'', ''Participation in maker workshops and DIY electronics projects'',
    ''Hiking in forest preserves around Will County'', ''Reading science‑fiction and technology literature'', ''Model building of scale houses'', ''Attending local Italian cultural festivals'']'
  career_goals: John aims to achieve Master Electrician licensure within the next two years, obtain certifications in solar energy and advanced home automation, and eventually launch his own contracting
    firm that specializes in sustainable, art‑focused lighting installations for residential and commercial clients. He also envisions mentoring apprentices and collaborating with architects and artists
    to create integrated lighting designs that enhance aesthetic experiences, positioning himself as a trusted expert in the intersection of technology and visual art.
