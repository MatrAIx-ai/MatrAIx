personas:
  professional: Julia Maltos is a seasoned substance‑abuse and behavioral‑disorder counselor who blends a decade of clinical work with a data‑driven mindset, delivering structured CBT and motivational interviewing
    while navigating the tension between their love of predictability and a relaxed stance on day‑to‑day obligations, all while pursuing a master’s to become a licensed supervisor and eventually launch
    a boutique tele‑health practice.
  sports: Julia Maltos enjoys the rugged challenge of weekend hikes at Red Rock Canyon, joins the local Red Rock Climbers Club for bouldering sessions, participates in a bi‑monthly 5K trail run organized
    by the Henderson Running Group, roots for the Vegas Golden Knights in the NHL and the Las Vegas Raiders in the NFL, and keeps a modest personal best of a 32‑minute mile in a solo treadmill test.
  arts: 'Julia Maltos captures the stark geometry of the Nevada desert through digital photography, drawing inspiration from Ansel Adams’ tonal mastery and the contemporary landscapes of Michael Kenna,
    while their literary palate savors classic sci‑fi like Arthur C. Clarke’s "2001: A Space Odyssey" and Ursula K. Le Guin’s "The Left Hand of Darkness"; musically, they unwind to ambient soundscapes by
    Brian Eno and the minimalist piano works of Nils Frahm, and they attend the annual Burning Man art installations to feed their fascination with large‑scale interactive pieces.'
  travel: Julia Maltos plans trips with the same puzzle‑solving precision they apply to jigsaw boards, using detailed itineraries and a budgeting spreadsheet for road‑trip adventures through Arizona’s Grand
    Canyon, Utah’s Zion, and Idaho’s Boise River; they have already trekked the crimson dunes of Sossusvlei in Namibia and dream of witnessing Iceland’s volcanic beaches and Japan’s alpine onsens, balancing
    their desire for structured exploration with impulsive weekend getaways to nearby Nevada hot‑springs when a spare day opens up.
  culinary: Julia Maltos approaches cooking like a controlled experiment, meticulously measuring each ingredient while testing unconventional flavor pairings such as quinoa‑crusted salmon with miso‑marinated
    carrots, sous‑vide duck breast glazed with pomegranate molasses, and a turmeric‑infused lentil stew topped with toasted pumpkin seeds; they relish sourcing heirloom tomatoes, fresh rosemary, and smoked
    paprika at the local farmers’ market, and they routinely document results in a digital lab‑notebook to refine their weekend dinner repertoire.
  core: Julia Maltos is a structured‑yet‑flexible counselor who solves puzzles, perfects desert photography, and balances data‑driven therapy with experimental cooking, all while navigating a relaxed approach
    to everyday obligations and a competitive streak.
background:
  cultural: Julia was raised in a middle‑class white Anglo‑American family in the Pacific Northwest before moving to Las Vegas for college. Her cultural upbringing emphasizes self‑reliance, practicality,
    and community service, values she carries into her counseling work. Living in Nevada, she has been exposed to the state’s vibrant tourism industry, a mix of Hispanic and Native American influences,
    and a transient population, which has broadened her cultural competence and empathy for diverse clients.
attributes:
  skills: '[''Biopsychosocial Assessment'', ''Motivational Interviewing'', ''Cognitive Behavioral Therapy'', ''Crisis Intervention'', ''Relapse Prevention Planning'', ''Data‑Driven Outcome Analysis'', ''Case
    Management'', ''Small‑Group Facilitation'', ''Electronic Health Record Management'', ''Program Development'']'
  hobbies: '[''Jigsaw Puzzles'', ''Reading (Science Nonfiction, Classic Sci‑Fi)'', ''Digital Photography'', ''Competitive Board Games'', ''Hiking in Red Rock Canyon'', ''Experimental Cooking'', ''Gentle
    Yoga'', ''Animal Shelter Volunteering'']'
  career_goals: Julia aims to earn a Master’s degree in Clinical Mental Health Counseling within the next two years to qualify for licensure as a Licensed Professional Counselor. She aspires to become a
    clinical supervisor at a community health center in Clark County, where she can mentor new counselors and shape evidence‑based substance‑abuse programs. Long‑term, she hopes to launch a boutique outpatient
    practice that leverages digital health tools for personalized relapse‑prevention, and to publish research on the impact of data‑driven interventions on treatment retention rates in Nevada’s diverse
    population.
