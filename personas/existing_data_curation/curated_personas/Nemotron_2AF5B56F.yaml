  hobbies: '[''Reading'', ''Gardening'', ''Woodworking'', ''Fishing'', ''Cooking Southern Cuisine'', ''Listening to Jazz and Gospel Music'', ''Playing Chess'', ''Volunteer Work at Church Community Outreach'']'
  career_goals: Dwayne aims to advance to a regional operations director role where he can shape broader policies that prioritize employee wellness and community impact. He plans to complete his associate
    degree in business administration, earn a Lean Six Sigma Green Belt, and launch a mentorship program for at‑risk youth in Effingham County. Ultimately, he envisions founding a small consulting firm
    that helps local businesses adopt sustainable, people‑focused management practices.
