  career_goals: Approaching retirement, Anita aims to transition into a low‑stress, part‑time role that lets her share her extensive knowledge. She plans to obtain a certification in advanced CNC programming
    and become a mentor or instructor for younger assemblers at a local community college or trade school. Anita also hopes to launch a small home‑based custom woodworking business, creating handcrafted
    furniture for friends and local markets. Throughout this transition, she seeks to maintain a healthy work‑life balance, reduce workplace stress, and be recognized for championing safety initiatives
    in her current plant.
