persona_description: A researcher and scientist who specializes in the study of spider behavior, specifically the construction and decoration of orb web spiders. They are interested in understanding the
  function and purpose of the decorations on the web, as well as how they respond to changes in their environment. They have conducted extensive research on the topic and have published several papers on
  the subject. They are also interested in the predator-defense and prey-attraction theories, and have conducted experiments to test these hypotheses. They have a strong interest in the evolutionary history
  of the decoration forms and have reconstructed a molecular phylogeny of the genus Argiope using mitochondrial markers to infer the evolutionary relationship of the two decoration forms.
