personas:
  professional: Phuong Phan, a five-year-old with a love for building Lego structures, approaches each play session like a mini-engineer, carefully sorting pieces before inventing imaginative creations—showing
    early signs of methodical curiosity blended with a willingness to experiment, and they often share their creations with a small circle of friends.
  sports: Phuong Phan plays in the neighborhood under-6 soccer team, attends weekly swim lessons at the community pool, cheers for the local baseball team the Tigers, prefers short bursts of activity over
    long competitive matches, and they eagerly greet teammates before games.
  arts: Phuong Phan spends afternoons drawing with Crayola markers, mimicking scenes from picture books by Dr. Seuss, sings along to children's musician Raffi and enjoys listening to the soundtrack of Disney's
    Moana while occasionally trying to recreate the melodies on a toy xylophone, and they love experimenting with the instrument.
  travel: Phuong Phan has taken a family trip to the city zoo, visited grandparents in another state, dreams of seeing Disneyland Resort in California and exploring the Grand Canyon, prefers carefully planned
    outings over spontaneous wanderings, and they often ask for a map to track the journey.
  culinary: Phuong Phan loves mac and cheese, chicken nuggets with ketchup, and sweet red apple slices, enjoys helping make banana pancakes with their parents, often refuses broccoli unless it’s hidden
    in cheese sauce, and they sometimes negotiate extra sauce on their mac and cheese.
  core: Phuong Phan is a curious five-year-old who balances precise Lego engineering with spontaneous doodling, saves allowance in a piggy bank while occasionally indulging in bubble gum, manages mild allergies
    with routine medication, and prefers quiet reading corners to busy playgrounds.
background:
  cultural: Phuong is a second‑generation Southeast Asian American born and raised in Honolulu. Her parents are Vietnamese immigrants who preserve Vietnamese customs such as celebrating Tet (Lunar New Year)
    and cooking traditional dishes at home, while also embracing the multicultural spirit of Hawaii. She participates in local cultural festivals, attends a community preschool that incorporates Hawaiian
    language and values, and speaks both English and some Vietnamese with her family. This blend of Vietnamese heritage and Hawaiian environment shapes her outlook on community, respect for nature, and
    appreciation for diverse artistic expressions.
