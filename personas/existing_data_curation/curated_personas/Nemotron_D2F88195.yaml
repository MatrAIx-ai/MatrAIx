  career_goals: Phuong often talks about becoming an artist who paints the ocean and its creatures, or a marine biologist who explores coral reefs. She dreams of a future where she can combine her love
    for art with her fascination for the sea, helping protect the environment while sharing beautiful pictures of it with others.
