  career_goals: John aspires to mount a solo exhibition at the Indianapolis Museum of Art that showcases his blend of traditional and technologically‑enhanced pieces. He also plans to co‑found a low‑cost,
    artist‑run community space in the Cultural Trail district, providing studio access and workshops for emerging creators. Over the next five years, he hopes to publish a monograph of his work, explore
    augmented‑reality installations, and build a sustainable income stream through a mix of public commissions, private sales, and teaching engagements, all while preserving the flexibility that fuels his
    creative process.
