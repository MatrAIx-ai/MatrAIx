personas:
  professional: John Lewis, a 48‑year‑old visual artist based in Indianapolis, merges traditional drawing, metalworking, and digital illustration to create mixed‑media installations, while their practical
    budgeting sense and relaxed, flexible attitude help them negotiate commissions and run community art projects with a collaborative studio vibe.
  sports: John Lewis cycles a vintage cruiser along the Canal as part of the Indianapolis Bike Club, cheers for the Indianapolis Colts and the Indiana Pacers, occasionally joins a weekend pickup soccer
    game with friends, and prefers garden work over a formal gym routine, embodying a seasonal, community‑oriented fitness mindset.
  arts: John Lewis, a devoted vinyl hunter, draws inspiration from the Indy Art Fest, admires street‑art icons like Banksy and contemporary painter Kehinde Wiley, spends evenings at indie venues listening
    to The War on Drugs and local folk duo The O'Jays, and channels those influences into community mural projects and their own mixed‑media sculptures.
  travel: John Lewis favors flexible road trips that blend scenic rides with craft brewery stops, has explored the Oregon Coast, the Bavarian Alps during an Oktoberfest‑style celebration, and dreams of
    wandering Berlin’s Kreuzberg art scene and Bangkok’s street‑food markets, preferring spontaneous itineraries over rigid planning.
  culinary: John Lewis loves cooking inventive dishes like rosemary‑infused heirloom tomato bruschetta, miso‑glazed salmon over quinoa, and a hearty stew featuring smoked sausage and cabbage, using fresh
    herbs from their rooftop garden and pairing meals with locally brewed IPAs, showcasing a blend of global flavors and Midwestern comfort.
  core: John Lewis balances curious artistic experimentation with a pragmatic, laid‑back lifestyle, often juggling vintage bike rides, rooftop herb gardening, and spontaneous studio projects while occasionally
    letting deadlines slip.
background:
  cultural: John grew up in a modest, middle‑class household in Indianapolis, with roots tracing back to German and Irish ancestors who settled in Indiana during the early 20th century. The Midwestern values
    of practicality, modesty, and community solidarity shaped his worldview, while the city’s evolving arts scene—spanning the Indianapolis Cultural Trail, the Indy Art Fest, and the historic Fountain Square
    district—provided a fertile backdrop for his artistic development. He identifies with the region’s blend of industriousness and a growing appreciation for creative expression, which informs both his
    work and his commitment to local cultural initiatives.
