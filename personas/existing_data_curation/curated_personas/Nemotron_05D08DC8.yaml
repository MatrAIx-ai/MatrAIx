personas:
  professional: Latoya Crosby, an aspiring young coder who crafts simple adventure games on Scratch, blends curiosity for puzzles with a methodical, deadline‑driven work style, often organizing code in
    tidy blocks and challenging classmates in friendly coding contests, and they eagerly document each bug fix in a personal log.
  sports: Latoya Crosby dominates the middle‑school basketball court as a point guard for the Richlands Raptors, training diligently after school, cheering on the Charlotte Hornets while keeping a personal
    statistics notebook to outplay opponents, and they also enjoy weekend nature hikes that serve as active recovery.
  arts: Latoya Crosby expresses creativity through sketching comic‑style cartoons of their school adventures, singing soul‑stirring gospel hymns in the church choir, and vibing to R&B legends like Beyoncé
    and classic hip‑hop beats from J. Cole, and they often blend these influences into original storyboard ideas.
  travel: Latoya Crosby dreams of exploring the Blue Ridge Parkway’s winding trails and the historic streets of Washington, D.C., while also planning budget‑friendly family road trips to Myrtle Beach and
    occasional summer visits to Disney World, and they prefer a mix of adventurous hikes and organized itinerary stops.
  culinary: Latoya Crosby loves helping in the kitchen to perfect the family’s signature fried catfish with seasoned cornmeal crust, buttery collard greens simmered with smoked ham hocks, and sweet potato
    pie, and they confidently season dishes with garlic, paprika, and a dash of hot sauce, showcasing a budding chef’s skill.
  core: Latoya Crosby is a methodical, curiosity‑driven twelve‑year‑old who balances competitive basketball, gospel singing, and coding while meticulously budgeting her allowance and quietly hoarding secret
    comic‑book stashes, and they often remind themselves to stay grounded amid all the excitement.
background:
  cultural: Latoya is an African‑American growing up in Richlands, a small town in Jones County, North Carolina. Her family is deeply rooted in Southern Black culture, with strong ties to the local Baptist
    church where she participates in choir and community events. She celebrates traditions such as Juneteenth, enjoys soul food cooked with family recipes, and is influenced by the storytelling and resilience
    passed down from older generations who lived through the civil‑rights era. The community’s emphasis on education, mutual support, and pride in heritage shapes Latoya’s values and aspirations.
