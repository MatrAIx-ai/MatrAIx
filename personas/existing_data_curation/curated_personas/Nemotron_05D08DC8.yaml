  career_goals: Latoya dreams of pursuing a career in a STEM field, ideally as a civil engineer or a technology developer who designs solutions that improve her community’s infrastructure and environment.
    She hopes to attend a high‑school program focused on engineering, earn a scholarship to a university with a strong engineering curriculum, and eventually work on projects that make roads safer and create
    green spaces in rural areas. She also envisions mentoring younger students, sharing her love of coding and problem‑solving.
