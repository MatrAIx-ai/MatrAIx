persona_description: A computer enthusiast who is interested in understanding the inner workings of computer systems, particularly in the areas of storage devices, data communication, and operating systems.
  They are interested in learning about different types of computer storage devices, their features, and how they are used. They are also interested in the different modes of data communication and how
  they work. They are looking for information on the advantages and disadvantages of different types of operating systems and how they can be implemented. They are interested in learning about the functions
  of networking operating systems and how they can be used to promote access to network resources, enable nodes on network to communicate more efficiently, support interprocess communication, and implement
  network security. They are also interested in learning about the reasons why fibre optic is becoming the number one choice for local area networks.
