personas:
  professional: Joseph Lu, a 21-year-old computer support specialist in Pocatello, blends pragmatic troubleshooting with a curiosity for automation, writing Python scripts to speed ticket resolution while
    mentoring high-school students in community tech workshops, and they aim to earn Network+ and Microsoft certifications to transition into systems administration.
  sports: Joseph Lu stays active by hiking the Sawtooth foothills in summer, hitting the slopes at Sun Valley in winter, playing pickup basketball with the Pocatello Trailblazers mountain-bike club, following
    the Idaho State Bengals football season and cheering for the Boise State Broncos, and they maintain a routine of weekly strength-training sessions despite occasionally skipping leg day after a long
    bike ride.
  arts: Joseph Lu blends a love for acoustic guitar, often strumming songs by Neil Young and The Avett Brothers while camping under the stars, devours sci-fi epics such as Dune and Brandon Sanderson’s Mistborn,
    organizes board-game nights featuring Terraforming Mars, and they capture Idaho's wild landscapes through a Canon EOS-R, letting the visual art of nature inspire their modest songwriting.
  travel: Joseph Lu prefers spontaneous weekend road trips to nearby natural wonders like Yellowstone and Glacier National Park, while dreaming of backpacking through the Scottish Highlands and a future
    tech-conference tour in Tokyo, and they often plan itineraries on a shared Google Sheet but sometimes overpack, leading to cramped trunk space.
  culinary: Joseph Lu enjoys hearty mountain fare, often cooking bison burgers topped with huckleberry jam and roasted root vegetables, perfecting a spicy salsa verde with fresh jalapeños, and they appreciate
    occasional craft-brew taprooms in Boise while occasionally over-salting meals when experimenting with new recipes.
  core: Joseph Lu is a practical yet curious tech enthusiast who balances mountain-bike adventures with late-night gaming marathons, can't resist a fresh coffee before a support ticket, and habitually forgets
    to charge their phone overnight.
background:
  cultural: Joseph grew up in Pocatello, Idaho, a modestly sized city with a strong sense of community and a deep appreciation for the surrounding natural landscape. His family’s roots are primarily of
    European descent (German and Irish ancestry), reflecting the broader demographic makeup of the region. The local culture—characterized by self‑reliance, practicality, and a friendly, cooperative spirit—has
    shaped his values. He is familiar with Idaho’s traditions, such as high‑school football games, summer county fairs, and the yearly celebration of the local Native American heritage of the Bannock and
    Shoshone peoples. This environment fostered his love for outdoor recreation, his respect for personal independence, and his commitment to helping others, which he carries into both his professional
    work and community activities.
attributes:
  skills: '[''Hardware troubleshooting'', ''Windows OS support'', ''macOS support'', ''Linux command line basics'', ''Network troubleshooting (TCP/IP, DNS, DHCP)'', ''Active Directory user management'',
    ''Help desk ticketing (ServiceNow, Jira)'', ''Remote support tools (TeamViewer, Remote Desktop)'', ''Python scripting for automation'', ''Basic cybersecurity best practices'', ''Documentation and knowledge‑base
    creation'', ''Customer service and communication'', ''Team collaboration'']'
  hobbies: '[''Hiking and exploring local trails'', ''Mountain biking'', ''Skiing during winter'', ''Building and customizing PCs'', ''Raspberry Pi and Arduino projects'', ''Co‑op video gaming'', ''Reading
    sci‑fi and fantasy novels'', ''Playing acoustic guitar'', ''Board games and tabletop RPGs'', ''Volunteering at community tech workshops'', ''Photography of nature'']'
  career_goals: 'Joseph aims to advance from a front‑line support role to a systems‑administration position within the next three to five years, pursuing certifications such as CompTIA Network+ and Microsoft
    Certified: Modern Desktop Administrator. He is interested in deepening his expertise in cloud infrastructure (AWS and Azure) and cybersecurity, with the long‑term ambition of becoming an IT manager
    who can design resilient, user‑friendly environments while championing automation and security. Throughout his career progression, he plans to stay in Idaho, contributing to the local tech community
    by mentoring students and leading knowledge‑sharing initiatives, all while maintaining a healthy work‑life balance that allows him to enjoy the outdoors and personal projects.'
