persona_description: An astronomer who specializes in the study of black holes and their interactions with matter. They have expertise in using space-based observatories, such as the European Space Agency's
  Integral space observatory, to detect and study such events. They are particularly interested in the feeding behavior of black holes on low-mass objects and the detection of compact clouds of gas spiraling
  toward the black hole. They are also interested in the implications of these events for the study of substellar objects and their possible existence in large numbers in galaxies.
