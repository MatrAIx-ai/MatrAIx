  hobbies: '[''Photography'', ''Watercolor painting'', ''Birdwatching'', ''Desert hiking'', ''Cactus gardening'', ''Reading art history'', ''Gallery visits'', ''Jigsaw puzzles'', ''Astronomy'']'
  career_goals: Although retired from formal employment, Johnathan aims to leave a personal legacy that blends his love of art, nature, and community. He plans to complete a series of watercolor landscapes
    capturing the Sonoran desert at different times of day, and to compile a memoir detailing his life experiences, military service, and the evolution of Cave Creek. He hopes to volunteer as a docent at
    the local art museum, where he can share his appreciation for unconventional art with visitors, and to mentor a youth art program that encourages solitary, reflective creativity. By the end of the next
    few years he would like to see his paintings exhibited in a regional gallery and his written reflections published in a community newsletter.
