personas:
  professional: Johnathan Shoot, a retired veteran and master handyman, blends their decades of automotive and small‑engine repair, woodworking, and digital photography skills with their organized, solitary
    nature to serve as a docent at the local art museum, mentor a youth art program, and orchestrate community volunteer projects that celebrate the Sonoran desert.
  sports: Johnathan Shoot follows the Arizona Diamondbacks and Phoenix Suns avidly, participates in a senior walking club that hikes foothill trails each Saturday, and enjoys casual pickleball at the community
    center; they use these low‑impact activities to maintain mobility without the social fatigue of team sports.
  arts: Johnathan Shoot immerses themselves in the arts by creating watercolor landscapes of the Sonoran desert, capturing sunrise photography of cacti, attending gallery openings with their wife, and drawing
    inspiration from artists like Georgia O'Keeffe, Ansel Adams, and Yayoi Kusama; they also share art history insights as a museum docent.
  travel: Johnathan Shoot prefers meticulously planned road trips that spotlight desert sunrise photography, having explored Joshua Tree, Monument Valley, and Sedona, and dreams of stargazing in the Atacama
    Desert; they balance a love for quiet landscapes with the occasional visit to a bustling art festival in Santa Fe.
  culinary: Johnathan Shoot delights in southwestern cuisine, frequently cooking prickly pear salsa, roasted cactus tacos, mesquite‑flour cornbread, and herb‑infused quinoa salads; they pair meals with
    strong espresso and boast a competent home‑cooking skill set that leans toward fresh, locally sourced ingredients.
  core: Johnathan Shoot, a solitary, curiosity‑driven artist‑mechanic, channels methodical precision into desert‑inspired watercolor, photography, and community mentorship while quietly wrestling with a
    habit of night‑time telescope stargazing; they often stay up until dawn to capture the perfect sky.
background:
  cultural: Johnathan is a white American of German‑American heritage, raised in a small farming town in Ohio. After high school he enlisted in the U.S. Air Force, serving for two decades and being stationed
    in various parts of the country and abroad. Upon retiring, he and his wife settled in Cave Creek, Arizona, drawn by the quiet desert landscape and the sense of community. He values the modest, self‑reliant
    ethos of his Midwestern upbringing while embracing the Southwestern culture of the region, including an appreciation for Native American art and local desert ecology. His life reflects a blend of disciplined
    service, practical craftsmanship, and a lifelong curiosity for artistic expression.
