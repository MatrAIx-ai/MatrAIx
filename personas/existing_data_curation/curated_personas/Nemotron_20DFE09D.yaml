  hobbies: '["Contemporary Art Galleries", "Photography", "Cooking Indian Cuisine", "Chess", "Hiking (Angeles National Forest)", "Community Cultural Festivals", "STEM Mentorship", "Traveling", "Live Jazz/World
    Music", "Industry Webinars and Reading"]'
  career_goals: Nalin aims to position himself as a thought leader in sustainable logistics, championing green supply chain initiatives that reduce carbon footprints across transportation and warehousing.
    He aspires to mentor the next generation of logistics professionals, especially from underrepresented communities, by establishing a corporate‑wide apprenticeship program. Over the next five years,
    he plans to spearhead the adoption of AI‑driven demand forecasting within his organization, publish industry case studies, and serve on the board of a regional transportation association, influencing
    policy for smarter urban freight movement in the Los Angeles region.
