persona_description: A neuroscientist and researcher who specializes in the study of brain mechanisms and disorders such as schizophrenia. Their work focuses on identifying and understanding the underlying
  neural processes that contribute to the symptoms and behaviors associated with the disorder. They are particularly interested in the role of corollary discharges in visual perception and their potential
  for diagnostic and therapeutic purposes. They are also likely to be familiar with computational modeling techniques and have experience working with animal models to study the effects of brain damage
  on corollary discharge activity.
