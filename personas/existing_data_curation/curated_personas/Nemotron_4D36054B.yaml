personas:
  professional: Joel Sterling, a 37-year-old construction manager, leverages his methodical planning, data-driven risk assessment, and BIM expertise to lead complex commercial builds while quietly championing
    sustainable practices and mentoring rising talent.
  sports: Joel Sterling, an avid hiker, trails the rugged paths of Larkin State Park every weekend, participates in the New England Hiking Association, and follows the Boston Red Sox and New England Patriots
    as his go-to sports teams, preferring low-impact, solitary exercise over crowded gyms.
  arts: Joel Sterling, a woodworking enthusiast and amateur photographer, spends evenings immersed in classic jazz from Miles Davis and John Coltrane and blues from B.B. King, while curating a vinyl collection
    and often revisiting the documentaries of Ken Burns and the architectural photographs of Ezra Stoller.
  travel: Joel Sterling prefers meticulously planned, low-key trips that blend historic architecture with quiet nature, having explored New England’s colonial towns like Providence and Newport and dreaming
    of a solo visit to Copenhagen to study its Danish sustainable design.
  culinary: Joel Sterling, a confident home chef, often prepares gourmet meals such as pan-seared duck breast with cherry-balsamic reduction, herb-crusted salmon, and hand-made mushroom risotto, favoring
    fresh herbs, locally sourced produce, and occasional splurges on truffle oil and aged Parmesan.
  core: Joel Sterling balances a quiet, methodical mind with a relentless curiosity, channeling his solitary love of woodworking, hiking, and jazz into disciplined, detail-obsessed projects while occasionally
    neglecting social invitations in favor of late-night schedule tweaking.
background:
  cultural: Joel is an African American who grew up in a middle‑class family in the Bronx before moving to Connecticut as a teenager. His parents, both college‑educated professionals, emphasized academic
    achievement, perseverance, and community service. He remains connected to his cultural roots through celebrations like Juneteenth, participation in his local historically Black church, and involvement
    with a regional Black engineering network. These experiences have shaped his strong sense of identity and his commitment to fostering diversity in the construction field, while also influencing his
    values of responsibility, humility, and collective uplift.
attributes:
  skills: '[''Construction Scheduling (Primavera P6, Procore)'', ''Cost Estimation and Budgeting'', ''Building Information Modeling (Revit)'', ''Structural Analysis Fundamentals'', ''Advanced Excel Data
    Analytics'', ''Risk Management and Safety Compliance (OSHA)'', ''Contract Administration'', ''Lean Construction Principles'', ''Sustainable Building Practices (LEED)'', ''Team Leadership and Coordination'',
    ''Supplier Negotiation and Procurement'']'
  hobbies: '[''Woodworking'', ''Hiking and Trail Photography'', ''Reading Technical and Historical Books'', ''Chess'', ''Scale Model Building'', ''Gardening'', ''Cooking Gourmet Meals'', ''Listening to
    Jazz and Blues'', ''Watching Engineering Documentaries'']'
  career_goals: Joel aims to become a regional director of construction for a major firm within the next five years, overseeing multi‑million‑dollar commercial projects across New England. He plans to earn
    his Professional Engineer (PE) license and complete a master’s degree in Sustainable Construction, positioning himself as a thought leader on eco‑friendly building methods. In the longer term, he envisions
    launching his own boutique consultancy that helps developers integrate AI‑driven scheduling and green technologies. Joel is also committed to mentoring emerging Black engineers and advocating for greater
    diversity and inclusion within the industry, hoping to create a pipeline of talent that reflects his cultural heritage.
