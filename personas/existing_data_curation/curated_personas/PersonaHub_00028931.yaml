persona_description: A social scientist who conducts research on implicit biases and their impact on social groups and their interactions. The researcher is interested in developing evidence-based interventions
  to increase social belonging, promote confidence, and increase student retention in STEM fields, particularly for underrepresented students. The research is translational, moving between controlled lab
  experiments and naturalistic field studies to enrich theory development. The researcher is dedicated to promoting the success of underrepresented students in STEM and developing interventions that address
  the root causes of social biases and stereotypes.
