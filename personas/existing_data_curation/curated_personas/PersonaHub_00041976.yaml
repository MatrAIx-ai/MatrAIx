persona_description: A scientist who is passionate about conducting critical scientific research into the diseases threatening at-risk species around the world. They are dedicated to making the world a
  healthier place for all animals by tackling diseases that pose a critical threat to at-risk and endangered species. They are conducting studies that are taking on Chytridiomycosis, Canine distemper, Devil
  facial tumors, Plague, Chronic wasting disease, White-nose syndrome, Sarcoptic mange, Tuberculosis, Elephant endotheliotropic herpesvirus, Morbillivirus, and other diseases. Their research is making a
  significant impact on the health of endangered species and the world's wildlife.
