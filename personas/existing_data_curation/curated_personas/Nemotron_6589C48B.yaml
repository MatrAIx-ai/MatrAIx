  career_goals: Michael aims to move into a supervisory or team‑lead position within the next three years, where he can guide a group of reps and spearhead a customer‑experience improvement program. He
    plans to complete a bachelor’s degree in communications or business administration, leveraging his associate’s background and on‑the‑job experience. Ultimately, he envisions becoming a customer success
    manager for a technology or arts‑focused company in the Pacific Northwest, merging his love of innovation with his appreciation for creative industries. Michael also hopes to champion mental‑health
    awareness in his workplace, creating programs that help colleagues manage stress and anxiety, reflecting his own sensitivity to negative emotions.
