personas:
  professional: Adriana Martinez bridges business strategy and software engineering as a senior full‑stack developer, wielding Python, JavaScript, and SQL while championing Agile Scrum practices and leveraging
    bilingual fluency to craft inclusive, data‑driven products for underserved user groups.
  sports: Adriana Martinez hikes the trails of Oleta River State Park on weekends, occasionally joins a local running club for 5k events, follows the Miami Dolphins and Miami Heat closely, and volunteers
    as a photography assistant for community beach clean‑up competitions.
  arts: Adriana Martinez finds creative fulfillment in a neighborhood book club where they discuss works by Simon Sinek and Brené Brown, enjoys salsa dancing to Marc Anthony at intimate gatherings, and
    draws inspiration from Ansel Adams’ landscape photography while curating a personal photo series of Florida’s coastline.
  travel: Adriana Martinez prefers low‑key, purpose‑driven travel, planning trips that blend cultural immersion with relaxation, such as a recent weekend getaway to Key West’s historic Old Town and a dream
    itinerary to Barcelona’s architecture and culinary scene, always budgeting carefully and using travel points to stretch their modest travel fund.
  culinary: Adriana Martinez delights in preparing traditional Puerto Rican dishes like arroz con gandules with sofrito, pernil seasoned with adobo, and occasionally experiments with mango habanero salsa,
    showcasing a moderate cooking skill level that balances authentic flavors with a modern twist.
  core: Adriana Martinez is a detail‑oriented tech leader who balances structured work habits with a quiet love for yoga, hikes, and home‑cooked comfort food, while wrestling with chronic worry and a penchant
    for over‑analyzing both code and life choices.
background:
  cultural: Adriana is a first‑generation Puerto Rican American who grew up immersed in both Caribbean and mainland U.S. cultures. Bilingual in English and Spanish, she maintains strong ties to the Puerto
    Rican community in Boca Raton, attending cultural festivals, supporting local Latinx businesses, and celebrating traditions such as Three Kings Day and Nochebuena. Her heritage instills a deep sense
    of family, community, and collective responsibility, which informs her collaborative work style and compassionate outlook. While she embraces the island’s vibrant music and cuisine, her professional
    life reflects the pragmatic, organized mindset often cultivated in her family’s emphasis on education and steady career advancement.
