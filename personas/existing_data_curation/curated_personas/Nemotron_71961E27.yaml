    book club", "Volunteering at community coding workshops", "Occasional salsa dancing"]'
  career_goals: Adriana aims to progress to a senior technical leadership role, such as Lead Engineer or Technical Product Manager, within the next five years. She is driven to create technology solutions
    that enhance accessibility for underserved communities, particularly within the Puerto Rican diaspora. Her immediate goal is to obtain a Certified Scrum Professional credential and to spearhead a mentorship
    program at her company that supports junior developers from underrepresented backgrounds. Long‑term, she envisions launching a SaaS platform that streamlines small‑business operations for Latinx entrepreneurs,
    leveraging her business acumen and development expertise. Throughout, she prioritizes work environments that value structured processes, clear expectations, and supportive team dynamics to mitigate
    stress.
