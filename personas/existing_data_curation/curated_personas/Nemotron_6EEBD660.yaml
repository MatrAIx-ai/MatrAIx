personas:
  professional: Yolanda Gonzalez, an eight‑year‑old budding cartoonist and junior game‑designer, channels their curiosity and methodical planning into daily sketch sessions and Scratch projects, treating
    each mini‑venture like a tiny studio job.
  sports: Yolanda Gonzalez is a spirited member of the neighborhood club Little Strikers, dribbles the soccer ball at the city park every Saturday, cheers for the women’s national soccer team on TV, and
    spends their summer days climbing trees and riding a bike along the river trail, balancing competitive play with carefree exploration.
  arts: Yolanda Gonzalez immerses themselves in the whimsical worlds of Studio Ghibli’s Totoro and Dr. Seuss’s Cat in the Hat, spends afternoons drawing cartoons for a personal sketchbook, and visits the
    City Children’s Museum’s interactive gallery, letting the bright murals and tactile installations fuel their boundless imagination.
  travel: Yolanda Gonzalez loves family hikes in the nearby state forest, has explored the historic museums of Washington, D.C., and dreams of trekking to the ancient ruins of Machu Picchu and building
    sandcastles on the beaches of Bali, preferring day‑trip itineraries that blend nature walks with a dash of cultural curiosity.
  culinary: Yolanda Gonzalez delights in helping prepare miniature cheesy empanadas and zesty ceviche with lime and cilantro, adds a splash of mango puree to their smoothies, and proudly serves friends
    at school snack swaps, showcasing a budding culinary flair that mixes tradition with playful experiment.
  core: Yolanda Gonzalez is an endlessly curious, organized eight‑year‑old who balances a love for cartoon art, soccer, and folk dance with calm resilience, often juggling stickers, soccer balls, and a
    bright pink piggy bank.
background:
  cultural: Yolanda grows up in a bicultural household in Kissimmee, Florida, where her parents preserve Ecuadorian traditions, speaking Spanish at home and celebrating holidays like Carnaval de Quito,
    Día de los Difuntos, and family gatherings with foods such as ceviche, empanadas, and fanesca. She attends a bilingual elementary school, participates in local Latino community events, and embraces
    American customs and school activities. This blend of Ecuadorian heritage and Floridian life gives her a rich multicultural identity, influencing her language, cuisine, music, and celebrations.
