  hobbies: '[''Gardening (tomatoes, peppers)'', ''Cooking traditional Mexican cuisine'', ''Watching baseball (Los Angeles Dodgers)'', ''Attending local cultural festivals (Fiesta de la Cultura)'', ''Church
    involvement'', ''Reading mystery novels'', ''Exploring smart‑home technology'', ''Playing acoustic guitar'', ''Volunteer tutoring for Spanish‑speaking students'']'
  career_goals: Miguel aims to move into a supervisory or team‑lead position within his call centre, where he can shape training programs and mentor younger staff. He plans to complete an associate degree
    in Business Administration to solidify his managerial credentials. Long‑term, he envisions transitioning to a community liaison role that bridges local businesses and the Hispanic community, or launching
    a modest family‑run Mexican food venture after retirement, combining his culinary passion with his entrepreneurial drive.
