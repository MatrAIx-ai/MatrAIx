  hobbies: '[''Soccer (midfielder, captain)'', ''Robotics club (building and programming robots)'', ''Volunteer tutoring (math and science) at community center'', ''Playing acoustic guitar'', ''Reading
    science-fiction and self-help books'', ''Board game nights with friends'', ''Nature hiking and photography in Monmouth County'', ''Journaling and mindfulness practice'', ''Participating in school debate
    team'']'
  career_goals: Andrew aspires to combine his technical curiosity with his compassionate nature by pursuing a career in educational technology or mental-health support for teens. He plans to focus on computer
    science and psychology in high school and college, earning a degree that will enable him to develop digital tools and programs that help youth manage stress, improve learning, and foster community.
    In the short term, he aims to earn additional coding certifications, become a certified peer counselor, and lead youth-mentorship initiatives at his local community center.
