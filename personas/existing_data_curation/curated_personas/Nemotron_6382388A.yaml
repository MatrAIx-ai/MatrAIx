personas:
  professional: Andrew Doucet, a teenage robotics club member and soccer team captain, merges methodical programming skills with natural compassion to lead group projects, meticulously plan robot builds,
    and foster a collaborative atmosphere among peers.
  sports: Andrew Doucet, as the midfield captain of the Jackson Jammers Youth Soccer Club, balances strategic playmaking with energetic training sessions, follows the New York Red Bulls (MLS) and New Jersey
    Devils (NHL) for inspiration, and participates in weekly outdoor runs on Monmouth County trails, but occasionally skips stretching due to a busy schedule.
  arts: Andrew Doucet, an acoustic‑guitar hobbyist who strums folk‑rock songs by Ed Sheeran, The Beatles, and Hozier while photographing Monmouth County sunsets, curates board‑game nights featuring Settlers
    of Catan and Ticket to Ride, and reads classic sci‑fi novels like Dune, using artistic expression as a calming outlet for stress.
  travel: Andrew Doucet, an avid day‑tripper who hikes the coastal dunes at Sandy Hook, dreams of kayaking the Norwegian fjords after a school trip to Washington, D.C., and enjoys family road trips to Philadelphia’s
    historic sites, yet cares about budgeting for these adventures, often planning trips with a detailed spreadsheet.
  culinary: Andrew Doucet, a budding home cook who whips up spaghetti carbonara with pancetta, breads homemade pizza topped with mozzarella and pepperoni for board‑game nights, savors fresh strawberries
    from the local farm stand, and experiments with spicy ramen bowls, all while occasionally over‑seasoning dishes due to youthful enthusiasm.
  core: Andrew Doucet blends disciplined leadership on the soccer field with a curious, methodical mind in robotics, a compassionate tutoring spirit, and a lingering worry that drives constant self‑reflection.
background:
  cultural: Andrew was raised in a predominantly white, middle-class suburban community in Jackson, New Jersey. His family’s values reflect a blend of traditional American customs—such as celebrating holidays
    with communal gatherings, participating in local volunteer events, and emphasizing education—combined with a heritage that includes European ancestry (e.g., Irish and Italian) often celebrated at family
    gatherings. Growing up in the Northeastern U.S., he has been influenced by the region’s emphasis on community involvement, outdoor recreation, and a multicultural yet largely suburban environment.
attributes:
