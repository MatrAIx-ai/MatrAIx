persona_description: A cryptographer who specializes in the use of substitution and transposition ciphers in the heat of battle. They are adept at choosing complicated algorithms to keep their enemies in
  the dark. They have a background in mathematics, particularly in group theory and its applications in cryptography. They are skilled in deciphering and encoding messages using these algorithms. They are
  also familiar with Morse code, shorthand, semaphore, and ASCII encoding. They have experience using decoder rings and diagrammatic ciphers, and are skilled at constructing secret messages. They are confident
  in their ability to break and decode enemy codes, and are adept at using both substitution and transposition ciphers to further confuse the enemy.
