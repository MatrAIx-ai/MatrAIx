  career_goals: His primary ambition is to stay mentally and physically active while preserving his family’s legacy. He aims to compile a memoir and genealogy archive for future generations, volunteer as
    a docent for the Isanti County Historical Society, lead gardening workshops at the senior center, and become more proficient with video‑calling platforms to maintain regular contact with his grandchildren.
    Maintaining his independence and health remains a core goal.
