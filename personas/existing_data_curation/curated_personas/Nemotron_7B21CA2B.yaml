  career_goals: Luis aspires to turn his passion for visual storytelling and community engagement into a professional career. Over the next few years, he hopes to secure a creative internship in a design
    or marketing agency where he can contribute to campaigns that celebrate cultural diversity. He plans to build a strong portfolio that blends digital illustration, photography, and social media content,
    eventually seeking a junior graphic designer or content strategist role. Long‑term, Luis envisions leading a multicultural arts collective or opening his own studio that offers workshops for youth,
    merging his love for art with mentorship. He also aims to continue his education, possibly pursuing a Bachelor’s degree in Fine Arts or Communications, while maintaining flexibility to travel and collaborate
    on cross‑border projects.
