personas:
  professional: Luis Samaroo, an 18‑year‑old digital illustrator and budding content creator, blends their proficiency in Adobe Photoshop, Illustrator, and Canva with a natural flair for community engagement
    to lead vibrant social‑media campaigns for local nonprofits, while their relaxed approach to deadlines occasionally results in last‑minute project sprints that showcase their competitive edge and collaborative
    spirit.
  sports: Luis Samaroo regularly plays soccer with the Savannah Youth Soccer Club and joins a weekly ultimate frisbee league at Forsyth Park, follows Atlanta United FC for MLS excitement, and balances a
    competitive edge on the field with a casual, social approach to post‑game hangouts at local cafés.
  arts: Luis Samaroo, an avid sketcher and digital illustrator, draws inspiration from the vivid murals of Savannah’s historic district and the street‑art activism of artists like Shepard Fairey, volunteers
    at free community art workshops for kids, and produces short‑form TikTok reels showcasing behind‑the‑scenes processes, all while maintaining a skeptical eye toward overly commercialized art trends.
  travel: Luis Samaroo prefers spontaneous, budget‑friendly beach trips to Tybee Island and occasional weekend road trips to Charleston, mixes adventure with cultural immersion by attending local festivals
    and photographing street scenes, yet remains constrained by a part‑time work schedule and a modest student budget.
  culinary: Luis Samaroo enjoys cooking homemade tacos al pastor, experimenting with mole‑infused ramen, and perfecting guacamole with fresh cilantro and lime, boasts an intermediate skill level in the
    kitchen, and often hosts family dinners where they blend traditional Mexican flavors with Southern comfort dishes.
  core: Luis Samaroo is an 18‑year‑old creative sponge who juggles digital art, soccer, and late‑night gaming, thrives on social interaction, yet often forgets to organize their schedule and budget, making
    life a vibrant but sometimes chaotic collage.
background:
  cultural: Luis comes from a Mexican‑American family; his parents emigrated from Jalisco, and he grew up speaking both Spanish and English at home. Mexican traditions such as Día de los Muertos, family
    Sunday gatherings with homemade tamales, and playing traditional music remain central to his identity. Living in Savannah, he also embraced Southern hospitality and community values, participating in
    local Hispanic cultural events and attending a nearby Baptist church where he engages with a diverse congregation. His bicultural upbringing gives him a unique perspective that blends Mexican heritage
    with Southern coastal culture, influencing his artistic style, culinary tastes, and social interactions.
