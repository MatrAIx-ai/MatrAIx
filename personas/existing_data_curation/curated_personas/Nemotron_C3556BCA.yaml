  hobbies: '[''Abstract painting'', ''Speculative fiction reading'', ''Jazz listening'', ''Poetry writing'', ''Scale model building'', ''Astronomy observation'', ''Philosophy podcasts'', ''Meditation'',
    ''Gardening'']'
  career_goals: He aims to advance his credentials by completing a Certified Nursing Assistant (CNA) program followed by an LPN degree, with a long‑term ambition to become a supervisory care manager in
    a home‑health agency. Parallel to his clinical aspirations, Miguel wants to develop an arts‑based therapeutic program that uses abstract painting and music to improve the emotional well‑being of seniors.
    Eventually, he envisions launching a small consulting firm that trains caregivers to integrate creative activities into daily care.
