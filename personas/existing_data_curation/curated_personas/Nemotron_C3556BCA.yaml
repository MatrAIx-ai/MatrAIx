personas:
  professional: Miguel Fisher, a 43-year-old personal care aide turned budding nurse, weaves their imagination and love for abstract art into individualized activity plans for seniors while juggling a relaxed,
    occasionally chaotic schedule that fuels their competitive drive to become a supervisory care manager.
  sports: Miguel Fisher enjoys weekend walks in the local park, occasional Saturday morning yoga classes at the community center, follows the Chicago Bulls and Chicago Cubs with a faithful devotion, and
    plays in a small adult recreational soccer league that satisfies their need for flexible, low‑pressure physical activity.
  arts: Miguel Fisher spends evenings painting abstract canvases inspired by the swirling tones of Miles Davis, spins vinyl classics from Aretha Franklin while reading speculative fiction by Philip K Dick
    and poetry by Ocean Vuong, and channels that creative energy into short poems shared at local open‑mic nights.
  travel: Miguel Fisher prefers spontaneous, low‑key getaways, often packing a lightweight telescope for stargazing trips to the desert skies of Sedona, while dreaming of a curated cultural tour of Kyoto’s
    temples and the historic architecture of Barcelona, balancing travel with their modest caregiving budget and occasional family obligations.
  culinary: Miguel Fisher enjoys crafting mushroom risotto with a splash of white wine, grilling salmon seasoned with fresh dill and lemon, and topping homemade flatbreads with caramelized onions, feta,
    and arugula, often pairing meals with a glass of crisp Sauvignon Blanc while listening to soulful vinyl.
  core: Miguel Fisher blends a restless imagination with a habit of chronic worry, channeling artistic passions into caregiving while juggling a disorganized schedule and an ever‑present competitive spark
    toward artistic‑therapy leadership.
background:
  cultural: Miguel grew up in the greater Atlanta metropolitan area as part of a close‑knit African‑American family. His upbringing was shaped by church gatherings, Southern soul food traditions, and community
    events like Juneteenth celebrations and local gospel choirs. He draws strength from the resilience and storytelling heritage of the black community in Georgia, and he remains attuned to the cultural
    nuances of caring for older adults who share similar backgrounds. His cultural identity also informs his artistic taste, favoring jazz, blues, and contemporary Black visual art.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support'', ''Medication reminders'', ''Vital signs monitoring'', ''Basic first aid'', ''Creative activity planning'', ''Client communication'', ''Problem
