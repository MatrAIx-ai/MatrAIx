personas:
  professional: Carey Yarborough is a diligent high school junior who, with their keen organizational instincts and love for structured problem solving, leads the Math Club, volunteers for story‑time at
    the local library, and dreams of one day becoming a librarian or data analyst.
  sports: Carey Yarborough, a member of the Centereach Middle School cross‑country team, runs three times weekly to manage stress, follows the New York Mets in baseball, the Long Island Ducks in baseball,
    and the New York Knicks in basketball, and prefers solo cardio workouts over team sports due to competitive instincts.
  arts: Carey Yarborough channels their love for precision into piano practice, favoring the soothing works of Ludovico Einaudi and classical pieces by Beethoven, while crafting miniature dollhouses reminiscent
    of Victorian interiors and avidly devouring mystery novels by Agatha Christie and historical fiction by Hilary Mantel, shaping a quiet yet deeply artistic identity.
  travel: Carey Yarborough enjoys meticulously planned weekend trips, favoring day excursions to historic sites like the Sagamore Hill National Historic Site, ferry rides to Fire Island, and annual school
    group visits to Washington, D.C., while dreaming of a future solo backpacking adventure through the Scottish Highlands, all balanced against a modest family travel budget.
  culinary: Carey Yarborough prefers home‑cooked comfort foods such as spaghetti carbonara with pancetta, thin‑crust pepperoni pizza topped with fresh basil, and classic apple pie made with Granny Smith
    apples and a flaky butter crust, possessing intermediate cooking skills and often experimenting with precise measurements like a budding pastry chef.
  core: Carey Yarborough is a routine‑driven, analytically minded teen whose blend of meticulous organization, competitive streak, and occasional anxiety fuels a life of structured hobbies, careful budgeting,
    and quietly ambitious aspirations.
background:
  cultural: Growing up in Centereach, a suburban community in Suffolk County, New York, Carey is raised in a middle‑class, White American family that values education, safety, and community involvement.
    Her household observes mainstream American holidays such as Thanksgiving, Christmas, and the Fourth of July while also taking part in local neighborhood events. The diverse population of Long Island
    provides exposure to various cultural perspectives, though her upbringing leans toward traditional norms and a focus on stability. Regular church attendance and family gatherings reinforce a sense of
    routine and continuity that aligns with her personality.
attributes:
  skills: '["Organization", "Time Management", "Microsoft Office", "Basic coding (Scratch/Python)", "Piano", "Baking", "Project coordination", "Math competition", "Chess"]'
  hobbies: '["Reading mystery and historical novels", "Journaling", "Playing piano", "Model building (miniature dollhouses)", "Chess", "Math club participation", "Running", "Volunteering at the library"]'
  career_goals: She aims to pursue a practical, stable career in healthcare, specifically becoming a registered nurse focused on pediatric care. Carey plans to graduate high school with honors, earn a scholarship
    to a reputable nursing program, and complete a BSN. Her long‑term ambition includes advancing to a nurse manager position where she can apply her organizational strengths while leading a team. Her competitive
    drive motivates her to maintain top grades, secure research opportunities, and be recognized on the honor roll.
