persona_description: A person who is responsible for managing and overseeing the natural water systems in specific geographical areas, ensuring the supply of clean water, and protecting residents from flooding.
  This person works for a water authority, which is a public authority responsible for water management in a specific geographical area. They are appointed by a directly elected general council and are
  administered by an executive board. They are responsible for managing natural water systems and protecting residents from flooding, and their experts keep dykes safe. They are also responsible for public
  order and safety in the municipality they oversee.
