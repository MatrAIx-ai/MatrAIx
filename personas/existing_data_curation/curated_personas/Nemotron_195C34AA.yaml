  career_goals: Deborah aims to advance to a senior procurement manager role within the next three years, leading a cross‑functional team and driving strategic cost‑savings initiatives. She plans to earn
    the Certified Professional in Supply Management (CPSM) credential and later pursue an MBA focused on supply‑chain leadership. Long‑term, she envisions becoming director of supply chain for a regional
    manufacturing firm, championing sustainable sourcing practices and implementing advanced analytics to further improve efficiency. She also values work‑life balance and hopes to mentor junior colleagues
    while staying connected to her community in Chesterfield.
