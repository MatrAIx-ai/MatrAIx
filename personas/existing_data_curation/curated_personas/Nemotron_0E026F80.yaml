personas:
  professional: Raphael Webb is a seasoned retail associate known for flawless cash handling and rapid POS troubleshooting, whose competitive, skeptical mindset pushes him toward a shift-supervisor role
    and eventually owning a mini-mart, while they resist rigid schedules and occasionally struggle with meeting strict deadlines.
  sports: Raphael Webb is a devoted fan of the Dallas Cowboys and Texas Rangers, routinely cheering for the Weatherford High Coyotes football team on Friday nights, while they spend early Saturday mornings
    at the local 4-H outdoor club refining their hunting and fishing techniques that serve as their personal fitness regimen.
  arts: Raphael Webb's artistic tastes weave classic rock legends like Bruce Springsteen and country icons such as George Strait with a fervent passion for tabletop strategy games like Warhammer 40K and
    Settlers of Catan, and they often unwind by rewatching classic Western films starring John Wayne to balance the day's mental workload.
  travel: Raphael Webb prefers road-trip adventures that mix family camping in Texas Hill Country with solo fishing expeditions to Canada's Lake of the Woods and rugged hikes in Big Bend National Park,
    planning most routes in advance yet always leaving room for spontaneous detours to local hunting lodges.
  culinary: Raphael Webb is a competent grill master who loves smoking Texas-style brisket with mesquite chips, crafting jalapeño-infused shrimp tacos, and seasoning steaks with cumin and chipotle rubs,
    often experimenting with new marinades while keeping a pantry stocked with fresh herbs, aged bourbon, and a variety of hot sauces.
  core: Raphael Webb is a pragmatic, competition-driven 43-year-old who marries a love of hands-on projects and outdoor pursuits with a restless resistance to rigid schedules, fueling his life with barbecue,
    sports, and a sharp eye for efficiency.
background:
  cultural: Raphael grew up in Weatherford, Texas, within a predominantly white, middle‑class community that values self‑reliance, resourcefulness, and informal hospitality. His upbringing emphasized practical
    work ethic, participation in local events such as county fairs and high‑school sports, and frequent outdoor activities typical of the region. While not deeply religious, he respects the role of community
    gatherings, including church events, in fostering social bonds. These regional influences shape his pragmatic approach to both his career and personal pursuits.
