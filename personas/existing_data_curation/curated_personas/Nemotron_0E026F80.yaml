  career_goals: In the near term, Raphael aims to become a shift supervisor and later a store manager at his current retail location. He plans to enroll in night classes to earn an associate degree in Business
    Administration, which will help him develop stronger organizational habits and meet managerial expectations. Long‑term, he envisions owning a small convenience store or family‑run mini‑mart in Weatherford,
    leveraging his retail experience and practical skills to offer a side handyman service. He also hopes to mentor younger staff, using his critical eye to improve efficiency and competitiveness within
    the store.
