  hobbies: '[''Hiking in Sonoma hills'', ''Landscape photography'', ''Watercolor painting'', ''Visiting intimate art galleries'', ''Reading art‑history and construction journals'', ''Participating in a
    small‑batch wine‑tasting club'', ''Meditation for anxiety management'']'
  career_goals: John aims to move into a supervisory role such as crew foreman or safety coordinator within the next five years. He plans to earn a Certified Safety Professional credential and complete
    a California heavy‑equipment management certification. He also wishes to mentor younger operators, fostering a collaborative and low‑stress work environment. In the longer term, he hopes to start a
    small equipment‑rental business that supports local sustainable‑building projects, allowing him to stay connected to his trade while contributing to environmentally responsible construction.
