  career_goals: Ezequiel dreams of becoming an aerospace engineer, inspired by his fascination with space exploration and technology. He aims to earn a scholarship to a specialized STEM high school, participate
    in advanced robotics competitions, and eventually work on satellite or spacecraft design. He also hopes to apply his technical expertise to develop sustainable infrastructure projects that benefit communities
    in Guatemala, bridging his cultural roots with his professional ambitions.
