personas:
  professional: A budding robotics enthusiast, Ezequiel Alvarez channels their love for order into designing and programming autonomous bots for the school robotics club, applies meticulous planning to
    intricate LEGO constructions, and treats each project like a precise engineering challenge, ensuring every piece fits perfectly before moving on.
  sports: An organized youth soccer player, Ezequiel Alvarez trains with the Van Nuys United Soccer Club, follows a disciplined practice schedule that balances skill drills with friendly matches, cheers
    for the LA Galaxy during weekend games, and tracks personal performance stats on a mobile app, though they sometimes get frustrated when teammates miss the structured drills.
  arts: A disciplined aspiring guitarist, Ezequiel Alvarez blends traditional marimba and folk tunes into their guitar practice, masterfully learns complex chord progressions of regional songs, attends
    bilingual storytelling sessions at the community center, sketches detailed technical diagrams of their musical arrangements, and binge-watches sci-fi films for creative inspiration, yet they often get
    irritated when a string breaks mid-practice.
  travel: A methodical weekend explorer, Ezequiel Alvarez plans family trips with carefully researched itineraries, favoring destinations like the Griffith Observatory for stargazing, the Kennedy Space
    Center for hands-on space exhibits, and local cultural festivals where they can join Spanish-language celebrations, while dreaming of a future visit to a launch site in Florida, though parental curfews
    sometimes limit longer adventures.
  culinary: A meticulous young cook, Ezequiel Alvarez enjoys helping prepare family meals of tamales and pepian, follows recipes step-by-step with a focus on precise measurements, delights in crafting homemade
    pizza with evenly spaced toppings, experiments with arranging ingredients like Lego bricks, yet occasionally over‑season the salsa, leading to a fiery bite.
  core: Ezequiel Alvarez is a structured, disciplined 12‑year‑old who balances technical creativity in robotics and LEGO with cultural guitar rhythms, meticulous budgeting, and a keen eye on health, yet
    worries about perfection and occasionally sacrifices sleep for projects.
background:
  cultural: Ezequial's family maintains strong Guatemalan traditions at home, speaking Spanish daily and celebrating cultural holidays such as Guatemalan Independence Day and Semana Santa. He enjoys family
    meals featuring dishes like tamales and pepian, and he listens to traditional marimba and folk music, which influences his guitar practice. Living in Van Nuys, he participates in a local Latino community
    center that hosts cultural events and Spanish‑language youth programs, fostering a connection to his heritage while growing up in a diverse Californian environment.
