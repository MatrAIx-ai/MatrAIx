persona_description: A mental health professional who specializes in the diagnosis and treatment of bipolar disorder. They have extensive knowledge of the symptoms, treatment options, and nursing interventions
  for patients with bipolar disorders. They are skilled in monitoring lithium toxicity levels and have experience in administering medications and monitoring side effects. They are knowledgeable about the
  genetic etiology of bipolar disorder and its treatment. They are calm, patient, and consistent in their approach to managing the complex needs of bipolar disorder patients. They have a deep understanding
  of the importance of providing a structured, supportive, and safe environment for patients with bipolar disorder.
