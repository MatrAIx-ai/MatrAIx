personas:
  professional: John Homsey, a 12‑year‑old budding game‑design enthusiast, channels the strategic thinking from video games into creating elaborate LEGO models that serve as proto‑levels, and their love
    of routine keeps their after‑school coding club projects on a predictable schedule despite occasional spurts of spontaneous, unplanned experimentation, which they embrace as a chance to break the monotony.
  sports: John Homsey plays on the neighborhood Tigers soccer league and the middle‑school Thunder basketball team, cheering for the city’s professional soccer club FC Metro and the national basketball
    franchise the Thunder, while they cycle the local bike paths for endurance training and relish the routine of weekly matches despite occasional missed practices due to homework.
  arts: John Homsey spends free afternoons drawing comic‑book heroes inspired by Stan Lee and Neil Gaiman, swapping sketches with friends while listening to Imagine Dragons and watching the animated series
    Spider‑Man, and they channel that creative energy into building LEGO dioramas that double as personal art installations.
  travel: John Homsey loves spontaneous weekend trips to the nearby state park for hiking and geocaching, yet also looks forward to the annual family vacation to the historic streets of Washington, D.C.,
    and they keep a handwritten map of all the local bike trails and an imagined wishlist that includes a future visit to Tokyo’s Akihabara for gaming culture immersion.
  culinary: John Homsey prefers classic pepperoni pizza, chicken tacos topped with fresh cilantro and lime, and homemade granola bars made with oats, honey, and dried cranberries, and while they can whip
    up a quick microwave mac & cheese, their true culinary pride comes from assembling LEGO‑shaped fruit platters for friends during game nights.
  core: John Homsey is a strategy‑savvy 12‑year‑old who blends a love of routine with bursts of spontaneous creativity, juggling video‑games, LEGO engineering, and weekend sports while occasionally forgetting
    homework deadlines and hoarding candy wrappers in their desk drawer, which they justify as 'future project material'.
background:
  cultural: John grew up in Oxford, a small community in Oakland County, Michigan. His family reflects a typical Midwestern middle‑class upbringing, with roots in European ancestry and values that emphasize
    practicality, community involvement, and a strong work ethic. He participates in neighborhood sports leagues, attends local community events, and celebrates holidays such as Thanksgiving and Fourth
    of July with family gatherings and community barbecues. The seasonal climate influences his activities—such as outdoor biking and park visits in summer and indoor hobbies like gaming and LEGO building
    in winter—shaping a balanced blend of tradition and personal exploration.
