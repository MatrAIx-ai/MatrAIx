  career_goals: John dreams of a future where he can combine his love for practical problem‑solving with teamwork. He hopes to one day become a mechanical engineer or a computer programmer, envisioning
    himself designing gadgets or video games that help people. In the short term, he aims to excel in middle school, join the school robotics club, and earn a scholarship that will let him attend a reputable
    high school and eventually a technical college.
