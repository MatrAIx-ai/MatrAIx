  hobbies: '[''gardening (vegetables and herbs)'', ''cooking Mexican cuisine'', ''listening to traditional Mexican music'', ''playing bridge'', ''walking in local parks'', ''reading historical novels'',
    ''volunteering at community center'', ''attending Catholic mass'', ''photography'']'
  career_goals: Although retired from formal employment, Waiming’s ambitions focus on staying active, contributing to his community, and preserving his cultural heritage. He aims to expand his volunteer
    work at the Pomona senior center by leading a weekly cooking class that teaches traditional Mexican dishes to younger participants. He also wants to document his family’s stories through a memoir and
    a small photo archive, hoping to share them with his grandchildren. Maintaining his health is a priority, so he sets personal goals around regular walking, balanced nutrition, and managing his medical
    appointments. He aspires to become a mentor for local high‑school apprentices interested in trades such as carpentry and basic home maintenance, passing on his practical skills in a structured, reliable
    manner.
