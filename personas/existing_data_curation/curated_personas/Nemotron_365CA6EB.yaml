personas:
  professional: Waiming Lopez, a retired home‑repair specialist turned community volunteer, leverages his carpentry, budgeting, and bilingual communication skills to organize senior‑center projects and
    mentor apprentices with a methodical and dependable work ethic.
  sports: Waiming Lopez, an avid fan of the Los Angeles Dodgers, Los Angeles Lakers, and Los Angeles Rams, participates in the Pomona senior‑center’s weekly walking club at Fairplex Park, and occasionally
    joins a local bocce league at the community recreation center to stay active.
  arts: Waiming Lopez, who delights in classic regional folk tunes, frequently listens to recordings by Mariachi Vargas de Tecalitlán, Vicente Fernández, and Pedro Infante while cooking, and appreciates
    the paintings of Frida Kahlo and the classic films of Pedro Armendáriz.
  travel: Waiming Lopez, who loves both nearby day trips and longer journeys, has driven to the historic town of San Miguel de Allende to attend a Day of the Dead celebration, hopes to explore the vineyards
    of Napa Valley, and enjoys weekend excursions to the desert landscapes of Joshua Tree.
  culinary: Waiming Lopez, an experienced home cook, expertly prepares tamales wrapped in corn husks, rich mole poblano using dried chilies and a hint of chocolate, and fresh salsa verde with tomatillos,
    serrano peppers, and garden‑grown cilantro and epazote, often seasoning a bit too heavily in moments of enthusiasm.
  core: Waiming Lopez, a methodical and community‑focused septuagenarian, blends a love of gardening, traditional cooking, and hands‑on mentorship into a daily rhythm that balances disciplined budgeting
    with occasional forgetfulness about appointments.
background:
  cultural: Waiming is a first‑generation Mexican American. His parents emigrated from Jalisco in the early 1950s, and he grew up in a bilingual household in the Inland Empire, where Spanish was spoken
    at home and English at school. His upbringing blended Mexican traditions—such as celebrating Día de los Muertos, preparing tamales, and attending weekly Catholic Mass—with the rhythms of American life
    in Pomona. This bicultural experience shaped his values of family solidarity, respect for elders, and community service. He remains closely connected to the local Mexican community, participating in
    neighborhood festivals, supporting a nearby church’s outreach programs, and preserving culinary customs that link him to his heritage.
