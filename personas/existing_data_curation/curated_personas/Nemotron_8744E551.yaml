  career_goals: Jeffrey dreams of turning his curiosity about how things work into a future career that mixes creativity with real‑world impact. He imagines becoming a mechanical engineer or robotics designer
    who builds machines to help his community, perhaps creating tools for local farms or educational robots for schools. He also entertains ideas of working as an environmental scientist to protect the
    natural spaces around Gonzales, and he hopes to stay adaptable, keep learning, and continue helping others along the way.
