personas:
  professional: Jeffrey Gorrie, a budding junior coder and LEGO engineer, combines his curiosity for building intricate LEGO creations with practical Scratch programming skills, turning ideas into simple
    games while staying relaxed about deadlines and thriving on hands‑on problem solving.
  sports: Jeffrey Gorrie, a soccer enthusiast who plays for the Hill Country Youth Soccer Club and rides a bike through town’s creek trails, cheers loudly for the local high school football team on Friday
    nights and follows the Dallas Cowboys, while also dabbling in little‑league baseball during summer.
  arts: Jeffrey Gorrie, an avid comic‑style doodler and recorder player, spends afternoons sketching heroes inspired by Marvel comics and listening to classic country legends like George Strait and modern
    storytellers like Dolly Parton, while also losing himself in Minecraft builds set to C418’s music, letting these artistic outlets shape a playful yet reflective identity.
  travel: Jeffrey Gorrie, who loves spontaneous bike excursions to nearby creeks and organized family road trips to the Texas Hill Country, dreams of exploring the Grand Canyon and Disney World, but balances
    these wanderlust wishes with school schedules and a limited allowance, favoring short, budget‑friendly stays at grandparents’ farm or weekend camping trips.
  culinary: Jeffrey Gorrie, a budding kitchen helper who can whip up a simple mac and cheese or assemble a Texas‑style brisket sandwich with help from family, delights in smoky barbecue ribs, crunchy corn
    chips, and lemonade, and values the communal BBQ nights where he practices measuring ingredients like cheddar cheese and beans, though he sometimes sneaks extra cookies before dinner.
  core: Jeffrey Gorrie is a curious, easy‑going 10‑year‑old who merges a love for LEGO engineering, soccer, and country tunes with a penchant for impulsive snack raids and a heart that always puts friends
    and family first.
background:
  cultural: Jeffrey grows up in a small‑town Texas community that values Southern hospitality, family togetherness, and outdoor life. His family’s roots trace back to Anglo‑American settlers with German
    and Scots‑Irish ancestry, contributing to local farming traditions. He participates in community events such as county fairs, church gatherings, and Friday night high‑school football games, fostering
    a love for country music, barbecue, and the open countryside. This background blends a respect for tradition with an openness to new ideas, shaping Jeffrey’s practical yet curious outlook.
