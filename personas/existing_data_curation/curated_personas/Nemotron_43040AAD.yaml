  hobbies: '[''Hiking'', ''Landscape photography'', ''Gardening'', ''Reading historical non‑fiction'', ''Mystery novels'', ''Hosting dinner parties'', ''Quilting'', ''Cooking regional recipes'', ''Volunteering
    at the local museum'', ''Guided historical tours'']'
  career_goals: Vera aims to transition her extensive volunteer experience into a part‑time role as a community program coordinator for the local senior center, while completing her bachelor's degree in
    nonprofit leadership. She also hopes to launch a small home‑based culinary consulting business that offers healthy meal‑planning workshops for families in Casper. Long‑term, she envisions serving on
    the city council to shape policies that support senior services and sustainable local food initiatives.
