personas:
  professional: Jonel Zackery is a seasoned software engineer who leverages full‑stack development, cloud architecture, cybersecurity, and data analytics expertise to design resilient enterprise systems,
    while their calm, data‑driven mindset and competitive edge drive meticulous incident response leadership and mentorship of junior developers.
  sports: Jonel Zackery is an avid hiker on the Cascade trails, a disciplined yoga practitioner at Urban Balance Yoga, and a dedicated fan of Seattle’s professional sports, cheering for the Seahawks, Mariners,
    and Sounders while participating in the Northwest Trailblazers club.
  arts: Jonel Zackery immerses in the arts through nightly jazz sessions featuring Kamasi Washington and Herbie Hancock, devouring classic literature from Tolstoy to Woolf, and collecting limited‑edition
    prints of Basquiat, weaving these influences into a reflective yet creative personal rhythm.
  travel: Jonel Zackery plans trips with meticulous checklists, preferring solo or small‑group nature retreats such as the Oregon Coast, Iceland’s Golden Circle, and New Zealand’s South Island, while fitting
    occasional urban cultural escapes to Kyoto and Barcelona within a moderate budget.
  culinary: Jonel Zackery, a competent home chef, crafts soul‑food classics like crispy buttermilk fried chicken, slow‑cooked collard greens seasoned with smoked paprika, and sweet‑potato casserole, while
    experimenting with tech‑inspired meal‑prep hacks such as sous‑vide protein packs.
  core: Jonel Zackery is a methodical puzzle‑solver who balances a calm, resilient demeanor with fierce competition, thrives on structured routines, and secretly hoards vintage typewriter keys in a drawer.
background:
  cultural: Jonel was raised in Houston's vibrant African-American community, where family, faith, and education were emphasized. Her parents, both professionals, encouraged academic excellence and civic
    involvement, instilling a strong sense of cultural pride. She participates in local Black professionals networks, volunteers with STEM outreach programs for under-represented students, and celebrates
    cultural traditions through music, cuisine, and community festivals such as the Houston African American Heritage Festival. Her identity as a Black woman in tech informs her commitment to mentorship
    and fostering inclusive workplaces.
