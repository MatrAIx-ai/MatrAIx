  hobbies: '["Fishing (freshwater & coastal)", "Gardening", "DIY home improvement", "Reading (technology and history)", "Chess", "Cooking barbecues", "Watching Houston Rockets games", "Church community
    events", "Youth mentorship volunteering", "Blues and gospel music"]'
  career_goals: Approaching the later stage of his career, Kenneth aims to transition into a senior operational leadership role, such as Plant Director, where he can champion plant‑wide efficiency and sustainability
    initiatives. He is driven to integrate advanced automation and digital transformation technologies while enhancing the safety culture. A key ambition is to mentor the next generation of production leaders,
    particularly underrepresented talent, and to implement succession plans that secure the plant’s long‑term success. He also envisions contributing to community outreach programs that promote workforce
    development in Houston’s industrial sector before eventually moving into a consulting capacity post‑retirement.
