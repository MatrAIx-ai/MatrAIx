personas:
  professional: An aerospace engineer named Paige Stegall channels relentless curiosity and practical rigor into advanced CFD and CAD projects, steering multidisciplinary teams toward sustainable propulsion
    systems while fostering an inclusive, empathy‑driven workplace culture.
  sports: An avid weekend hiker named Paige Stegall joins the Watchung Trail Club for guided hikes, enjoys occasional trail runs, follows the New York Giants for football and the New Jersey Devils for hockey,
    and balances cardio with yoga to maintain flexibility and mental steadiness.
  arts: A creative enthusiast named Paige Stegall captures sunrise landscapes with a DSLR, draws inspiration from Ansel Adams and the ambient soundscapes of Brian Eno, devours classic science‑fiction novels
    by Isaac Asimov and N. K. Jemisin, and experiments with digital collage during quiet evenings.
  travel: A curious traveler named Paige Stegall prefers low‑key, astronomy‑focused trips such as stargazing in Chile’s Atacama Desert, camping under the aurora borealis in Iceland, and a weekend road‑trip
    to Mauna Kea, all while planning meticulously to fit within a modest travel budget.
  culinary: A health‑oriented food lover named Paige Stegall enjoys cooking quinoa‑seed bowls with roasted beets, kale, and feta, perfects Japanese miso ramen on weekends, and occasionally indulges in artisanal
    dark chocolate truffles when celebrating a successful project launch.
  core: Paige Stegall is a pragmatic dreamer who fuses analytical aerospace expertise with a compassionate, detail‑oriented lifestyle, balancing disciplined work habits with solitary stargazing and occasional
    spontaneous adventures.
background:
  cultural: Paige Nicole Stegall grew up in suburban New Jersey, a region characterized by a blend of Mid‑Atlantic cultural influences and a diverse community fabric. Her family, of primarily German‑Irish
    ancestry, emphasized the value of education, self‑reliance, and community service. The proximity to major metropolitan hubs like New York City exposed her to a wide spectrum of cultural experiences,
    fostering an open‑minded perspective while retaining a comfortable, modest upbringing. This environment nurtured her practical curiosity and her compassionate outlook, encouraging involvement in volunteer
    activities and collaborative endeavors. Her cultural identity combines a traditional American work ethic with an appreciation for the multicultural dynamics of the Northeast.
