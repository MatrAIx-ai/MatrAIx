  career_goals: Paige aims to transition into a senior technical leadership role where she can steer the development of sustainable propulsion systems and environmentally responsible spacecraft concepts.
    She is motivated to contribute to industry initiatives that reduce carbon footprints, such as electric or hybrid propulsion technologies. Over the next five years she plans to lead multidisciplinary
    teams on high‑profile missions, champion safety and reliability standards, and influence organizational culture to be more inclusive and supportive, especially for women and underrepresented groups
    in engineering. She also aspires to publish her research in peer‑reviewed journals and present at conferences, positioning herself as a thought leader in aerospace innovation while maintaining a work‑life
    balance that respects her personal values.
