  career_goals: Even though he is retired, Jonas aims to stay intellectually and socially engaged. He plans to mentor younger neighbors in practical trades through a quarterly workshop series at the local
    community center, document and share the oral histories of Akron’s early settlers, and develop a sustainable garden that serves as a teaching model for low‑water landscaping. He also aspires to complete
    a memoir that weaves together his life lessons, compete in the county’s senior woodworking contest, and earn a basic certification in renewable energy systems to help neighbors transition to solar power.
