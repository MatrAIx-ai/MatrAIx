  hobbies: '[''Visiting art galleries and street murals'', ''Pick‑up basketball games'', ''Attending live music events (Motown, jazz, hip‑hop)'', ''Exploring new neighborhoods and local cuisines'', ''Reading
    about business innovation and creativity'', ''Volunteering in community revitalization projects'']'
  career_goals: James aims to ascend to a senior sales leadership role within the next five years, targeting positions such as Sales Manager or Regional Director. He seeks to lead high‑performing teams,
    drive revenue growth for cutting‑edge manufacturing solutions, and mentor junior representatives. Ultimately, he envisions launching his own boutique wholesale venture focused on sustainable products,
    using his disciplined work ethic, competitive drive, and deep industry knowledge to create a market‑leading enterprise.
