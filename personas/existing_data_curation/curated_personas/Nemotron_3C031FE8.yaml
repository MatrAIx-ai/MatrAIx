personas:
  professional: Willie Wright is a budding young engineer-in-training who spends evenings dissecting space science books, building intricate LEGO models, and coding simple Scratch games; they apply their
    meticulous, routine-driven mindset to every project while striving for flawless execution.
  sports: Willie Wright is a dedicated member of the Eagle Runners junior track club, follows a disciplined evening running routine three times a week, plays wingback on the Midtown Soccer U12 team, and
    tracks stats obsessively while cheering for the Los Angeles Dodgers and Golden State Warriors; they often use competition as motivation to improve personal sprint times.
  arts: Willie Wright nurtures their artistic side through daily twenty-minute piano sessions focusing on Beethoven's Für Elise and John Williams' Star Wars Theme, curates a collection of LEGO stop-motion
    videos on YouTube, and regularly attends school art club workshops where they experiment with digital drawing using Procreate; they maintain a quiet, introspective appreciation for classical music.
  travel: Willie Wright's travel diary includes a family weekend at the Kennedy Space Center where they marveled at the Saturn V replica, a summer road trip to the Grand Canyon, and a bucket-list dream
    of exploring Tokyo's Akihabara district and attending a launch at the European Space Agency's Guiana Space Centre; they meticulously plan each journey in a detailed spreadsheet.
  culinary: Willie Wright enjoys a balanced school lunch of turkey sandwich, carrot sticks, and apple slices, savors weekend spaghetti with marinara sauce, and delights in crafting LEGO-brick-shaped mini-pizzas
    at home using mozzarella, pepperoni, and pre-made dough; they have an undeniable sweet tooth for gummy bears that occasionally undermines their disciplined diet.
  core: Willie Wright is a highly organized, routine-loving 11-year-old who channels competitive curiosity into science, robotics, and disciplined hobbies while balancing a modest allowance, health routines,
    and a quiet artistic soul; they thrive on structure and quietly outpace peers in focused pursuits.
background:
  cultural: Willie is raised in an African‑American family that values community, storytelling, and perseverance. His grandparents share oral histories of the civil‑rights movement, and the family celebrates
    cultural traditions such as Juneteenth and soul‑food gatherings. Attending a local Black church provides a sense of belonging and reinforces values of respect, discipline, and service. Growing up in
    Happy Valley, Oregon, he experiences both the diversity of his cultural heritage and the Pacific‑Northwest environment, shaping his worldview and aspirations.
