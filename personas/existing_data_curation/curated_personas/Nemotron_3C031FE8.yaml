  hobbies: '[''Reading science and technology books'',''LEGO model building'',''Scratch coding'',''Chess'',''Piano practice'',''Evening running'',''Robotics club participation'']'
  career_goals: Willie aspires to become a scientist‑engineer. He aims to graduate from a top high school, earn a STEM scholarship, and later study mechanical engineering or computer science to design sustainable
    technology. He hopes to win math competitions, build robotics projects, and eventually work on innovations that benefit his community. His long‑term ambition is a role that combines his love for structure,
    problem solving, and disciplined work ethic, such as a research engineer or software developer.
