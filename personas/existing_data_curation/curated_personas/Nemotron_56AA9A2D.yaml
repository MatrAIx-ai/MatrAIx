personas:
  professional: Pedro Dorta, a retired aerospace mechanical engineer turned community STEM mentor, channels decades of mechanical systems expertise and a love of DIY electronics into weekly workshops for
    high‑school students and neighborly tech tutoring, balancing curiosity with a relaxed, flexible schedule that tolerates occasional disorganization, and they enjoy translating complex concepts into everyday
    solutions.
  sports: Pedro Dorta supports the Orlando Magic and Tampa Bay Buccaneers, joins the Lake Howell Walking Club for daily nature‑preserve strolls, and plays in a local senior pickleball league each winter,
    preferring low‑impact exercise that fits their relaxed pace and occasional joint aches, and they enjoy the camaraderie of the senior league.
  arts: Pedro Dorta enjoys evenings of classic salsa by Celia Cruz, bolero from Los Panchos, and smooth jazz from George Benson while cooking, regularly attends performances by the Orlando Symphony and
    cultural dance showcases at the local Hispanic center, and they find artistic solace in familiar melodies and small‑group gatherings.
  travel: Pedro Dorta prefers relaxed, road‑trip style vacations with his wife, having explored the Florida Keys, a cultural weekend in New York City, and an eco‑tour of Costa Rica, while dreaming of a
    future pilgrimage to Seville’s historic festivals and a serene sailing adventure through the Galápagos Islands, and they cherish the unhurried nature of road‑trip planning with their spouse.
  culinary: Pedro Dorta prepares island classics such as arroz con gandules and pasteles using homemade sofrito, adobo, and fresh cilantro harvested from a DIY hydroponic herb system, skillfully balances
    traditional techniques with experimental twists like adding locally sourced mango salsa, yet occasionally leaves the stove unattended while tinkering with an Arduino timer, reflecting their curious
    yet practical nature, and they take pride in sharing these meals with neighbors and family.
  core: Pedro Dorta is a curious, hands‑on retiree who blends his engineering precision with a love for traditional island cooking, community mentorship, and leisurely walks, all while embracing a relaxed
    schedule and occasional disorganization that keeps life pleasantly unpredictable, and they thrive on turning curiosity into communal benefit.
background:
  cultural: Pedro was born in San Juan, Puerto Rico, into a close‑knit family where Spanish was spoken at home and weekly gatherings centered around music, dance, and shared meals. The island's emphasis
    on familial interdependence, hospitality, and resilience shaped his worldview. In his early thirties he moved to the mainland United States and eventually settled in Casselberry, Florida, where he integrated
    into a multicultural community while preserving his heritage. He remains fluent in both Spanish and English, celebrates Puerto Rican holidays such as Three Kings' Day and the San Sebastián Street Festival
    through local cultural groups, and frequently prepares and shares traditional cuisine with neighbors. His upbringing instilled a strong sense of community service, which he expresses through volunteer
    work at the senior center and the Hispanic cultural center, fostering connections across generations.
attributes:
  skills: '["Mechanical engineering", "Statistical analysis", "Python programming", "Technical troubleshooting", "Project management", "DIY electronics"]'
  hobbies: '["Reading science and history books", "Arduino and DIY electronics projects", "Hydroponic herb gardening", "Cooking traditional Puerto Rican dishes", "Listening to salsa, bolero, and jazz music",
    "Nature walks at local preserves", "Participating in small community gatherings", "Puzzle solving and chess"]'
  career_goals: Pedro aims to stay intellectually active by mentoring local high‑school students interested in STEM, volunteering as a technology tutor at the community center, and leading informal workshops
    on electronics and data analysis. He also hopes to document his life story and the Puerto Rican immigrant experience in a memoir. While preferring a flexible, low‑pressure schedule, he aspires to remain
    a trusted resource for friends and family on home repairs, gardening, and technology, and to continue learning about emerging fields such as renewable energy and smart home systems.
