  hobbies: '[''Drama club'', ''Cheerleading'', ''Student council'', ''Social media content creation (TikTok, Instagram)'', ''Hosting hangouts and game nights'', ''Baking and cooking'', ''Creative writing
    (short stories, poetry)'', ''Sketching/Drawing'', ''Hiking local trails'', ''Volunteering at church youth events'']'
  career_goals: Evelyn wants to turn her love of interacting with people and her knack for organizing informal events into a career. She plans to enroll in a community college program in communications
    or hospitality after high school, aiming to become a social media manager or community events coordinator for a local business or nonprofit. Over the next decade she hopes to lead a marketing or outreach
    team that blends creative digital content with on‑the‑ground community programming, while continuing to develop her public‑speaking and leadership skills.
