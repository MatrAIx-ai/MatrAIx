personas:
  professional: Evelyn Mccormack, a 16‑year‑old high‑school student, channels her love of stage presence and project leadership into aspiring to be a social media manager and community events coordinator,
    leveraging her strong interpersonal skills, knack for on‑the‑fly planning, and natural talkativeness while balancing a desire for structure with a flexible approach to deadlines.
  sports: Evelyn Mccormack enjoys hiking Appalachian trails on weekends, cheers for the local high‑school soccer team the Ridgeview Raptors, follows the Atlanta Falcons, and balances casual basketball pickup
    games with a dedication to cheerleading practice, preferring group fitness activities that also serve as social gatherings.
  arts: Evelyn Mccormack finds creative joy sketching Studio Ghibli characters, idolizing Lin‑Manuel Miranda’s musical storytelling, streaming Ariana Grande’s latest hits, and attending community theater
    productions of Little Shop of Horrors, all of which shape their artistic flair and narrative voice.
  travel: Evelyn Mccormack mixes spontaneous weekend trips to the Blue Ridge Parkway with carefully planned family visits to Washington D.C., and dreams of backpacking through Barcelona’s Gothic Quarter,
    favoring itinerary‑light adventures that fit a high‑school schedule and a modest budget.
  culinary: Evelyn Mccormack loves baking vanilla cupcakes topped with salted caramel drizzle, whipping up avocado‑toast brunches, and perfecting one‑pot mac and cheese, while their kitchen confidence swings
    between flawless frosting swirls and occasional burnt edges.
  core: Evelyn Mccormack is a talkative, structure‑loving teen who thrives on organizing social gatherings, juggling spontaneous creativity with a tendency to misplace deadlines.
background:
  cultural: Evelyn grew up in Piney Flats, a small community in Sullivan County, Tennessee, within a predominantly white, Southern‑mid‑class environment. Her upbringing reflects typical regional values
    such as strong family ties, church involvement, and a sense of Southern hospitality. She experiences local traditions like community barbecues, high‑school football games, and occasional bluegrass music
    festivals. While she embraces these cultural touches, she also navigates contemporary teen culture through social media, pop music, and modern fashion, creating a blend of traditional Southern roots
    and the broader digital youth culture.
attributes:
  skills: '[''Public speaking'', ''Interpersonal communication'', ''Social media content creation'', ''Basic digital literacy (Word, PowerPoint, photo editing)'', ''Informal event coordination'', ''Practical
