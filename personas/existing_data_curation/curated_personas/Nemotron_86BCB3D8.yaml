    communication"]'
  hobbies: '["Fishing on the Kennebec River", "Hiking local trails", "Woodworking and furniture making", "Sketching coastal landscapes", "Visiting local art galleries and folk fairs", "Reading about historic
    architecture and sustainable design", "Volunteering for community theater set construction", "Listening to folk and classic rock music", "DIY home improvement projects", "Watching documentaries on art
    and design"]'
  career_goals: David is aiming to move from laborer to crew foreman within the next few years, leveraging his strong on‑site experience and design sensibility. He plans to complete his remaining college
    credits to earn a certification in construction management or sustainable building, which will enable him to oversee projects with a greater emphasis on environmentally friendly practices and creative
    finishes. Ultimately, David aspires to launch his own modest contracting firm that specializes in custom home remodels and historic preservation work in the Maine coastal region, blending traditional
    New England craftsmanship with contemporary artistic touches. He also hopes to mentor younger tradespeople, sharing both technical expertise and his appreciation for design.
