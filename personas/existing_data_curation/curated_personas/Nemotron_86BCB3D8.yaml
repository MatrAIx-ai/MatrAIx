personas:
  professional: David Ellis, a seasoned construction specialist with over two decades of hands‑on experience in framing, concrete, and trade‑craft work, leverages a keen eye for aesthetic detail and a calm
    problem‑solving demeanor to lead small crews, mentor apprentices, and push toward a foreman promotion while completing a sustainable‑building certification that will enable them to launch a modest contracting
    firm focused on historic preservation and environmentally conscious remodels.
  sports: David Ellis, an outdoor‑oriented enthusiast, spends weekends fishing the Kennebec River, hiking the nearby woods, follows the New England Patriots and the Portland Sea Dogs, competes in a local
    adult softball league each summer, and paddles with a seasonal kayaking club exploring coastal islands, all while they favor nature‑based activity over regimented gym workouts.
  arts: David Ellis, an art‑savvy craftsman, regularly visits the Portland Museum of Art and regional folk‑art fairs, sketches New England coastal vistas inspired by Winslow Homer, draws design cues from
    the rustic elegance of Charles Rennie Mackintosh, and unwinds to the folk‑rock sounds of Bob Dylan, Neil Young, and The Lumineers while building sets for the town’s community theater, and they let their
    quiet curiosity shape both their woodworking and worldview.
  travel: David Ellis, an adventurous yet unhurried traveler, prefers road trips to nearby coastal gems such as Bar Harbor, Acadia National Park, and the historic streets of Portsmouth, NH, occasionally
    ventures to European folk‑music capitals like Dublin and Edinburgh on loosely planned itineraries, and they balance their love of scenic drives with a modest family budget that favors off‑season stays
    at local bed‑and‑breakfasts rather than luxury resorts.
  culinary: David Ellis, a competent home cook with a penchant for New England flavors, frequently prepares fresh‑caught cod fish chowder, pan‑seared lobster tails, and apple‑cider‑glazed pork shoulder
    using locally sourced thyme, rosemary, and sea salt, enjoys experimenting with a medium‑range cast‑iron skillet for rustic breads, yet they occasionally over‑indulge in smoked salmon and craft beer
    during fishing trips, reflecting their relaxed approach to dining.
  core: David Ellis blends rugged hands‑on craftsmanship with a quiet artistic curiosity, pursuing sustainable building and folk‑inspired woodworking while they juggle a laid‑back financial style, occasional
    health niggles, and a love for nature‑driven sport and modest travel.
background:
  cultural: 'David grew up in a working‑class family in rural coastal Maine, with roots tracing back to English and Irish settlers who arrived in the region in the 1800s. The small‑town environment shaped
    his values of self‑reliance, humility, and a deep connection to the natural landscape of the Atlantic coast and inland forests. Community traditions such as seasonal lobster festivals, church potlucks,
    and winter ice‑fishing outings have instilled a strong sense of local identity. While his upbringing emphasized practical skills and a straightforward work ethic, the region’s modest but vibrant arts
    scene—folk music, craft fairs, and local gallery shows—has nurtured his curiosity about art and unconventional ideas. These cultural currents combine to give David a distinctly New England character:
    grounded, resilient, and quietly appreciative of both tradition and creative expression.'
attributes:
  skills: '["Framing and carpentry", "Concrete mixing and finishing", "Basic electrical wiring", "Basic plumbing installation", "Blueprint reading", "Light equipment operation (forklift, skid‑steer)", "Safety
