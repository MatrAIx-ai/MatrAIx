  hobbies: '[''Salsa and bomba dancing'', ''Hosting potluck and backyard BBQ gatherings'', ''Experimenting with Puerto Rican recipes'', ''DIY home-improvement projects'', ''Coaching youth soccer leagues'',
    ''Reading personal-development books'', ''Rooftop gardening'', ''Zumba fitness classes'']'
  career_goals: Ileana aims to turn her organizational talent and passion for community into a sustainable small business. She plans to obtain a certification in event management and launch a home-based
    catering and event-coordination service that highlights Puerto Rican culinary traditions. Over the next five years, she hopes to expand the venture to include workshops on budget-friendly meal planning
    and cultural celebrations, providing employment opportunities for local youths. Additionally, she is interested in completing a GED and perhaps pursuing a part-time role as a community liaison for the
    municipality, where she can apply her reliable, methodical approach to improve neighborhood programs.
