personas:
  professional: Ileana Lopez, an aspiring community event coordinator and home‑based caterer, leverages their meticulous budgeting skills, bilingual fluency, and skeptical eye for detail to design seamless
    neighborhood celebrations while methodically questioning conventional vendor practices.
  sports: Ileana Lopez avidly follows the Miami Heat and Miami Marlins, they regularly lead the Little Hurricanes Youth Soccer Club as a volunteer coach, and maintain personal fitness through weekly Zumba
    classes at the community center.
  arts: Ileana Lopez immerses themselves in salsa and bomba rhythms, they frequently attend performances featuring icons like Celia Cruz and Chucho Valdés, while also enjoying contemporary Latin pop from
    Marc Anthony and exploring the visual storytelling of director Pedro Almodóvar.
  travel: Ileana Lopez prefers well‑planned cultural getaways, having already explored historic Old San Juan and the colorful streets of Cartagena, while they dream of future trips to Barcelona’s music
    festivals and Lisbon’s culinary tours, balancing travel costs with their budding business budget.
  culinary: Ileana Lopez, a confident home chef, delights in reinventing classic island dishes like mofongo with plantains, sofrito, and chorizo, they infuse unexpected herbs such as cilantro and smoked
    paprika, and frequently host potluck nights where they showcase a knack for balancing bold, tangy flavors.
  core: Ileana Lopez blends meticulous organization with a love for lively community gatherings, never missing a salsa night, yet they secretly hoard a growing collection of unused kitchen gadgets that
    never see the light of day.
background:
  cultural: Raised in Rio Grande and the Canóvanas municipality, Ileana Lopez grew up immersed in the vibrant culture of eastern Puerto Rico. Her family celebrates traditional Puerto Rican customs such
    as Noche Buena, patron saint festivals, and the island’s rich musical heritage, especially salsa, plena, and bomba. She maintains a deep appreciation for the island’s cuisine, from arroz con gandules
    to pasteles, and often incorporates these flavors into community events. Bilingual and family-oriented, Ileana values strong familial ties, community solidarity, and the entrepreneurial spirit that
    characterizes many Puerto Rican households. Her Catholic upbringing and participation in local church activities have also shaped her sense of service and collective responsibility.
attributes:
  skills: '[''Event planning'', ''Budget management'', ''Community outreach'', ''Bilingual Spanish-English communication'', ''Culinary and catering skills'', ''Basic computer proficiency (Microsoft Office,
