  hobbies: '[''Reading mystery and adventure novels'', ''LEGO building'', ''Scratch programming and animation'', ''Nature journaling and sketching'', ''Exploring local parks and trails'', ''Playing piano'']'
  career_goals: May Rae dreams of becoming a professional in a STEM field, such as an environmental engineer or a robotics programmer, where she can use her curiosity for new technologies and her practical,
    methodical approach to solve real-world challenges. She aims to maintain high grades, win science-fair awards, and eventually attend a university that offers strong engineering or computer-science programs.
    In the meantime, she hopes to mentor younger classmates in her school's coding club and help organize community clean-up projects.
