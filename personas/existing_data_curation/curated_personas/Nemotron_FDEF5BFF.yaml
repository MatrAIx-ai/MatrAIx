personas:
  professional: May Carhart, an aspiring game developer, applies their organized curiosity to design simple Scratch games with clear logic, balancing fresh ideas with proven coding patterns while meticulously
    documenting each step.
  sports: May Carhart, an outdoor enthusiast who favors exploring Allegheny County trail systems over team sports, joins a weekend youth soccer league affiliated with the Pittsburgh Riverhounds Academy,
    cheers for the Pittsburgh Steelers on game days, and maintains a modest fitness routine of brisk walks after park visits.
  arts: May Carhart, a passionate sketcher and piano hobbyist, draws inspiration from the whimsical illustrations of Beatrix Potter, the cinematic storytelling of Hayao Miyazaki, and the melodic simplicity
    of Yann Tiersen, weaving these influences into nature journal drawings and online piano covers.
  travel: May Carhart, a careful planner even at ten, enjoys family weekend trips to nearby Ohiopyle State Park, dreams of exploring Scotland’s historic castles, and prefers itineraries that blend structured
    museum tours with spontaneous nature hikes, all recorded in a colorful travel journal.
  culinary: May Carhart, an eager junior cook, loves assembling homemade mini‑pizzas topped with fresh mozzarella, basil, and pepperoni, mastering fluffy pancake flips, and experimenting with fruit‑filled
    crepes, though they often leave a trail of flour on the kitchen counter.
  core: May Carhart, a methodical yet curious ten‑year‑old, balances a love for detailed LEGO builds and solitary puzzle‑solving with occasional procrastination on chores, and hides a secret stash of glitter
    pens for midnight sketch sessions.
background:
  cultural: May Rae was raised in a middle-class family in Pittsburgh, Pennsylvania, within a predominantly white suburban community. Her upbringing emphasizes education, punctuality, and community involvement,
    reflected in family traditions such as celebrating Thanksgiving, attending local sports events, and visiting farmers' markets. She attends a public elementary school where she experiences the city's
    diverse cultural mix while maintaining her own family's customs. The surrounding Allegheny County landscape of parks, rivers, and the historic steel-city environment nurtures her interest in nature
    and local history.
attributes:
  skills: '[''Reading comprehension'', ''Basic multiplication and fractions'', ''Problem solving (puzzles and logic games)'', ''Scratch programming'', ''Organized note-taking'', ''Time management for school
