    sewing'', ''Southern cooking'']'
  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Reading historical fiction and African‑American literature'', ''Creative writing and storytelling'', ''Herb and flower gardening'', ''Quilting
    and sewing'', ''Church choir singing'', ''Listening to jazz and gospel music'', ''Nature walks and park visits'', ''Attending local heritage talks'', ''Exploring antique markets'']'
  career_goals: Marilyn aims to gradually shift from hourly employment to owning a small, eco‑friendly cleaning service that serves homes and local small businesses in Mecklenburg County. She plans to obtain
    a certification in green cleaning techniques and to market a line of homemade, non‑toxic cleaning products. Simultaneously, she wishes to devote more time to her artistic pursuits, enrolling in community‑college
    art classes and eventually holding a modest exhibition of her watercolor landscapes at the local cultural center. Long‑term, she hopes to mentor younger women, especially from the black community, who
    are entering the service industry, helping them develop both professional and creative skills.
