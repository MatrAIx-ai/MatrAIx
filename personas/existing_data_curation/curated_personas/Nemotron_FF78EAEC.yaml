personas:
  professional: Rina Hidalgo is a seasoned metal fabricator on the production floor, expertly reading blueprints, operating CNC routers and MIG/TIG welders, and leading safety briefings; their structured
    yet adaptable mindset translates into clear checklists and assertive teamwork, positioning them for a shift supervisor role.
  sports: Rina Hidalgo channels her energetic spirit into a co-ed softball league with the Maverick Softball Club during spring and summer, complements it with weekly yoga sessions for stress relief, and
    avidly follows the Texas Rangers in baseball and the Dallas Cowboys in football, balancing competitive play with communal fitness.
  arts: Rina Hidalgo immerses herself in the rhythmic world of salsa, dancing to the lively sounds of Celia Cruz and Marc Anthony, while unwinding with mystery novels by Agatha Christie and Gillian Flynn,
    and occasionally attends local theater productions featuring classics like 'A Streetcar Named Desire.'
  travel: Rina Hidalgo prefers a blend of planned escapades and spontaneous getaways, often weekend-hiking in the Texas Hill Country vineyards and once-a-year cultural immersion trips to Oaxaca's historic
    center, Mexico City's bustling markets, and the artistic streets of Barcelona, balancing relaxed itineraries with occasional backpack-style adventures.
  culinary: Rina Hidalgo delights in cooking traditional mole with ancho chilies, chocolate, and sesame seeds, and mastering tamales filled with pork and masa, often experimenting with fresh rosemary and
    thyme from her garden-grown herbs, showcasing a skillful home-chef level that blends bold flavors with meticulous technique.
  core: Rina Hidalgo balances a meticulous, safety-first work ethic with a love for lively dance and a tendency to over-think, turning anxiety into organized checklists while occasionally letting impromptu
    salsa nights derail their budget.
background:
  cultural: Rina’s Mexican roots are a vibrant part of her identity. Bilingual in Spanish and English, she grew up celebrating Día de los Muertos, Cinco de Mayo, and other family traditions that emphasize
    community, respect for elders, and culinary heritage. Her weekly visits to a local Catholic church reinforce cultural rituals and provide a social network of fellow Mexican‑American families. Living
    in House Springs, Missouri, she blends these traditions with Midwestern values of neighborliness and self‑reliance, creating a hybrid cultural landscape. Rina’s extended family in Texas and California
    remains a source of connection through video calls, shared recipes, and holiday reunions, reinforcing a strong sense of belonging and cultural pride.
attributes:
  skills: '[''Blueprint interpretation'', ''MIG/TIG welding'', ''CNC machine operation'', ''Hand tool proficiency'', ''Quality control inspections'', ''Safety compliance'', ''Inventory management'', ''Team
    coordination'', ''Basic troubleshooting'', ''Process documentation'']'
  hobbies: '[''Salsa dancing'', ''Community volunteering at local charity events'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Attending Jefferson County festivals'', ''Group yoga classes'',
    ''Reading mystery novels'', ''Softball league'']'
  career_goals: Rina aims to advance from assembler to shift supervisor within the next two years, securing a Certified Production Technician (CPT) credential to solidify her expertise. She plans to enroll
    in evening courses for an Associate of Applied Science in Industrial Technology, positioning herself for a future role in production planning or training. Ultimately, she envisions opening a small custom
    metal‑fabrication workshop that would allow her to set her own schedule, offering flexibility to manage stress while mentoring younger workers. Her ambition balances the desire for structured career
    progression with the need for a supportive, less‑rigid work environment that accommodates her wellbeing.
