personas:
  professional: Matthew Allen is a budding junior game developer who blends his curiosity for sci‑fi storytelling with methodical Scratch coding and detailed character sketches, planning each game project
    in a spreadsheet and collaborating with friends to iterate designs.
  sports: Matthew Allen plays point guard for the Eastside Middle School basketball team, follows the NBA's Los Angeles Lakers, and spends weekends hiking the Pine Ridge Trail to keep his cardio up while
    tracking his steps on a smartwatch.
  arts: Matthew Allen channels his love for graphic storytelling by sketching original comic characters, painting watercolor scenes inspired by Studio Ghibli, devouring graphic novels like 'Saga' and 'Watchmen',
    and regularly attending community art workshops where they experiment with mixed media.
  travel: Matthew Allen prefers meticulously planned mini‑adventures, having hiked the volcanic trails of Yellowstone and explored the historic streets of San Antonio, while dreaming of a solo trip to Tokyo's
    Akihabara district to experience anime culture firsthand.
  culinary: Matthew Allen enjoys crafting quick meals such as pepperoni pizza with a homemade crust, spicy ramen topped with soft‑boiled eggs, and refreshing mango‑banana smoothies, boasting a budding confidence
    in the kitchen that lets them follow YouTube tutorials without burning the toast.
  core: Matthew Allen is a curiosity‑driven teen who balances methodical game‑making, vibrant art, and disciplined budgeting, all while occasionally neglecting stretches between coding marathons.
background:
  cultural: Matthew grew up in Manhattan, Kansas, a small Midwestern city known as "The Little Apple" that sits amid farmland and is anchored by Kansas State University. His family participates in local
    community events, church gatherings, and school activities, reflecting traditional Midwestern values of community, modesty, and hard work. At the same time, he is exposed to broader cultural influences
    through school arts programs, university‑hosted exhibitions, and online media. This blend of local traditions and new ideas has nurtured his curiosity for art, his methodical approach to projects, and
    his appreciation for both familiar and unconventional experiences.
