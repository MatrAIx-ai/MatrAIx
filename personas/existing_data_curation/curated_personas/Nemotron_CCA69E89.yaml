  career_goals: He hopes to blend his love for art and technology by pursuing a future career as a multimedia designer or video game developer. In the longer term, Matthew aims to study graphic design,
    interactive media, or architecture at a university—potentially Kansas State University—where he can deepen his technical and creative skills. He envisions creating educational games or digital storytelling
    projects that inspire curiosity in other young people, while also exploring opportunities in sustainable design that combine his organized mindset with artistic problem‑solving.
