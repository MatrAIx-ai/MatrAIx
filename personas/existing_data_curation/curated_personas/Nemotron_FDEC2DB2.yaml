personas:
  professional: Stephen Wynn, a veteran high‑voltage transmission line specialist, blends five decades of rigorous safety‑first engineering with a hands‑on curiosity, mentoring apprentices through meticulous
    schematics, integrating smart‑grid monitoring while still hand‑crafting wooden tool racks for his crew.
  sports: Stephen Wynn follows the Minnesota Vikings, Twins, and Wild with unwavering loyalty, participates in a senior walking club that meets thrice weekly at the lakefront, and enjoys low‑impact activities
    like ice fishing and gentle tai chi at the community center, maintaining a disciplined schedule that mirrors his project planning.
  arts: Stephen Wynn finds creative solace in painting miniature model‑train cars, listening to Johnny Cash and Bob Dylan while reading historical biographies, admiring Andrew Wyeth’s realist canvases,
    and attending local historical society theater nights featuring classic Westerns starring John Wayne.
  travel: Stephen Wynn prefers meticulously planned road trips, having already visited the historic battlefields of Gettysburg and the granite cliffs of the Great Smoky Mountains, while his current bucket
    list includes a scenic drive along the North Shore of Lake Superior and a pilgrimage to the ancestral villages of his great‑grandparents in England.
  culinary: Stephen Wynn enjoys cooking walleye with lemon butter, a hearty Minnesota hotdish, and garden‑fresh tomato stew, skillfully seasoning with rosemary and thyme from his own herb patch, yet he
    often overcooks his steak while waiting for his model‑train layout to dry, and delights in a slice of homemade apple pie paired with fresh coffee.
  core: Stephen Wynn is a methodical centenarian electrician‑turned‑hobbyist whose love of precision fuels both his model‑railroad creations and his habit of cataloguing every expense, even as he occasionally
    forgets to take his medication on time.
background:
  cultural: Stephen was raised in a Midwestern white family with deep German‑Scandinavian roots, typical of many residents in Dakota County, Minnesota. He grew up in a Protestant (Lutheran) community that
    valued hard work, self‑reliance, and modesty. The cultural ethos of the region—pragmatic, community‑oriented, and respectful of tradition—shaped his practical outlook, competitive spirit, and balanced
    approach to social interaction. His experiences reflect the post‑World War II American work ethic and the strong sense of local civic responsibility common among his generation.
attributes:
  skills: '["High‑voltage line installation", "Electrical troubleshooting", "Safety compliance (OSHA & NEC)", "Project planning and scheduling", "Equipment maintenance", "Team leadership and mentorship",
