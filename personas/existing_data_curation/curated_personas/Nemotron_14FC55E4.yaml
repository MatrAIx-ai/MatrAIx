personas:
  professional: Destiny Ledbetter, a seasoned construction veteran with expertise in carpentry, concrete formwork, safety inspections, and team coordination, channels their methodical, organized nature
    into meticulous quality‑control work and mentorship, advocating for safer, more inclusive sites while planning to launch a part‑time consultancy focused on senior‑friendly home modifications.
  sports: Destiny Ledbetter enjoys low‑impact fitness through regular walks along the Red Rock Canyon trails, participates in a senior bingo‑and‑stretch group that includes gentle chair yoga, and roots
    passionately for the Las Vegas Raiders and the Vegas Golden Knights, often wearing their colors while cheering from their modest living room.
  arts: Destiny Ledbetter, a devoted fan of classic soul, fills their garden afternoons with the sounds of Aretha Franklin, Marvin Gaye, and Stevie Wonder while they quilt intricate patterned blankets,
    cherishing the rhythm of gospel choruses at church and occasionally humming the melodies as they stitch.
  travel: Destiny Ledbetter prefers well‑planned road trips to nearby natural wonders like the Grand Canyon and Zion National Park, choosing comfortable lodging and short, scenic drives over strenuous itineraries,
    and they dream of a leisurely cruise along the Mediterranean once their health and budget allow.
  culinary: Destiny Ledbetter, a home gardener turned cook, delights in turning fresh tomatoes, peppers, and basil from their backyard into rustic Caprese salads, zesty salsa, and slow‑roasted vegetable
    soups, relying on their trusty cast‑iron skillet and a love of garlic and cumin to flavor each dish.
  core: Destiny Ledbetter blends a lifelong construction acumen with a garden‑scented, soul‑filled heart, juggling meticulous budgeting, health worries, and a habit of over‑committing to community projects
    while never missing a Sunday gospel hymn.
background:
  cultural: Destiny is a Black woman whose roots trace back to the Southern United States, where her parents grew up during the civil‑rights era. Raised in a close‑knit African‑American community, she was
    steeped in church traditions, family storytelling, and a strong work ethic that emphasized self‑reliance and communal support. Relocating to Las Vegas in the 1970s during a wave of migration, she navigated
    a predominantly white, male construction industry, often confronting subtle bias, which deepened her resolve to break barriers. Her cultural identity remains tied to traditions like Sunday gospel services,
    soul music, home‑cooked Southern dishes, and participation in Juneteenth celebrations. These influences shape her sense of responsibility to mentor younger generations and to honor the resilience of
    her community.
