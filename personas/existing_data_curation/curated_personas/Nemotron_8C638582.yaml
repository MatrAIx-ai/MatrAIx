  career_goals: Henry aims to advance to a senior warden or district supervisor position within the Illinois Department of Natural Resources, where he can lead regional fisheries initiatives and mentor
    new wardens. He plans to complete a bachelor’s degree in environmental science, develop a statewide training curriculum for sustainable wildlife management, and eventually serve as a policy advisor
    on aquatic resources. Long‑term, he envisions transitioning into a consulting role that blends his field experience with conservation planning, while also advocating for greater inclusion of underrepresented
    communities in outdoor professions.
