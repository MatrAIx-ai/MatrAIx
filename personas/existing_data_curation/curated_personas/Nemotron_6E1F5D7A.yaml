personas:
  professional: Melissa Marrero, a seasoned facility management supervisor with three decades of experience overseeing housekeeping at hotels and medical facilities, they leverage their expertise in scheduling,
    OSHA compliance, inventory control, and budgeting to craft efficient cleaning protocols, and now channel that structured, practical mindset into consulting, mentorship, and a budding residential cleaning
    venture.
  sports: Melissa Marrero stays active by line dancing at the local country hall, joining a senior walking club that meets every Saturday for a 5‑kilometer loop around Hermann Park, and they passionately
    root for the Houston Astros, the Houston Texans, and the Texas Longhorns during baseball, football, and college seasons.
  arts: Melissa Marrero finds creative release in quilting intricate patterns while they listen to country legends like George Strait, Dolly Parton, and Willie Nelson, devour Agatha Christie mystery novels,
    and attend community theater productions of classics such as 'Steel Magnolias' that celebrate Southern storytelling.
  travel: Melissa Marrero enjoys meticulously planned road trips across Texas, from the German‑heritage streets of Fredericksburg to the rugged desert vistas of Big Bend National Park, and they dream of
    a weekend getaway to Santa Fe for its Southwest art scene, always packing a cooler with homemade salsa and a playlist of classic country hits.
  culinary: Melissa Marrero loves cooking Tex‑Mex meals such as chicken enchiladas, fresh tomato‑and‑pepper salsa, and beef barbacoa tacos, drawing on herbs from their garden and often pairing them with
    smoky brisket at family barbecues, though they sometimes forget to add the final squeeze of lime, resulting in a tangy disappointment.
  core: Melissa Marrero blends disciplined facility‑management expertise with a love of line‑dancing, garden‑fresh cooking, and community service, all while juggling a budget, a chronic blood‑pressure watch,
    and a habit of occasionally forgetting to water their tomatoes on rainy days.
background:
  cultural: Melissa is a lifelong resident of the Greater Houston area, raised in a middle‑class white Texan family with deep roots in Southern hospitality and community service. She grew up attending a
    Baptist church, where she learned the values of hard work, faith, and helping neighbors. Texas traditions such as family barbecues, line dancing, and a love of country music have shaped her worldview,
    while the multicultural atmosphere of Fort Bend County, especially its Hispanic‑influenced cuisine, has broadened her cultural experiences.
attributes:
  skills: '["Staff supervision", "Work scheduling", "Inventory management", "Quality control", "Training and development", "Conflict resolution", "Budgeting", "Safety compliance (OSHA)", "Customer service",
    "Process improvement"]'
  hobbies: '["Line dancing", "Gardening", "Cooking", "Volunteer work", "Reading mystery novels", "Quilting", "Attending community festivals", "Traveling with spouse"]'
  career_goals: Melissa plans to transition her expertise into a consulting role for facility management, aiming to obtain a Certified Facility Manager (CFM) credential. She also hopes to mentor younger
    supervisors within her organization, develop a small family‑owned residential cleaning business with her husband, and lead community initiatives that raise cleaning standards in local schools and senior
    centers. Ultimately, she wants to leave a legacy of professionalism and community service in the housekeeping field.
