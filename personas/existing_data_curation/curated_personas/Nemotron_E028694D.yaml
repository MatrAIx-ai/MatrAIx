  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Street photography'', ''Reading contemporary literature'', ''Listening to indie music'', ''Journaling'', ''Hiking nature trails'', ''Playing ukulele'',
    ''Volunteering at community art workshops'', ''Attending film festivals'']'
  career_goals: Audrey hopes to enroll in a reputable BFA program in visual communication or illustration, where she can refine her artistic voice. In the short term, she plans to assemble a professional
    online portfolio, secure a summer internship at a local design studio in Richmond, and attend a specialized art workshop. Her long‑term ambition is to work as a freelance illustrator and graphic designer,
    creating artwork for books, games, and indie brands while retaining the flexibility to travel and explore new cultures. She also envisions eventually launching a community‑oriented art space in Henrico
    County that offers workshops and exhibition opportunities for young creators.
