personas:
  professional: Sharon Domingue, a 46-year-old community arts coordinator, leverages her sharp critical eye and meticulous budgeting skills to design low-budget pop-up exhibitions and mentor emerging Gulf
    Coast artists, while navigating her competitive drive to secure funding and recognition for her events.
  sports: Sharon Domingue follows the Auburn Tigers football team and the Birmingham Barons minor-league baseball club, participates in a weekly sunrise beachwalk with the local seniors' walking club, and
    joins a seasonal paddle-tennis league at the community center to keep active without overwhelming her schedule.
  arts: Sharon Domingue immerses herself in classical music by Beethoven, folk ballads of Gillian Welch, and regional storytellers like Maya Angelou, attends monthly open-mic poetry nights at a downtown
    café, crafts pottery glazed with reclaimed sea glass, and curates community art walks featuring local painters such as Sarah Whitaker.
  travel: Sharon Domingue enjoys road-tripping along the Gulf Coast, having explored the historic districts of Charleston and Savannah, yearned to visit the Musee d'Orsay in Paris, and often plans weekend
    getaways to the Blue Ridge Mountains where she sketches coastal-inspired landscapes in mountain cabins.
  culinary: Sharon Domingue favors Southern staples like shrimp and grits, collard greens seasoned with smoked paprika, and fresh basil pesto pasta, experiments with pottery-made ceramic plates for serving,
    and occasionally treats herself to a chef-curated tasting menu at a farm-to-table restaurant, though she admits to over-indulging on sugary baked goods after long event nights.
  core: Sharon Domingue, a 46-year-old pragmatic art-enthusiast, blends disciplined community organizing with a solitary love of sketching, fiercely curates cultural experiences while slipping into occasional
    craft-supply splurges.
background:
  cultural: Sharon was raised in a traditional Southern, middle‑class family in Alabama, where community ties, church involvement, and appreciation for regional heritage were emphasized. Her upbringing
    in Bay Minette exposed her to a blend of rural lifestyle and modest town culture, shaping her values of self‑reliance, modesty, and a quiet resilience. While she identifies as white, she respects the
    diverse cultural fabric of the Gulf Coast region and incorporates its artistic traditions, such as folk music and crafts, into her personal interests.
attributes:
  skills: '[''budgeting'', ''event coordination'', ''digital photo editing'', ''basic graphic design'', ''critical analysis'']'
  hobbies: '[''visiting galleries and historic sites'', ''sketching coastal landscapes'', ''reading historical fiction'', ''gardening'', ''small‑group book club'', ''listening to classical and folk music'',
    ''open‑mic poetry events'', ''DIY crafts and pottery'']'
  career_goals: Sharon aims to translate her community‑organizing experience into a part‑time role as a local arts facilitator, where she can mentor emerging artists and help curate small exhibitions. She
    also hopes to pursue a certificate in museum studies or arts administration to formalize her knowledge and eventually volunteer as a docent at the nearby historic museum. In the longer term, she dreams
    of establishing a modest community art space that offers workshops and showcases work from regional creators, blending her love for art with her organizational talent.
