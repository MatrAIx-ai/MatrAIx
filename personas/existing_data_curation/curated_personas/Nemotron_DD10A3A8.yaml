personas:
  professional: Heather Garcia is a diligent real‑estate broker‑in‑training who leverages their sharp market analysis, negotiation flair, and social‑media savvy to guide first‑time homebuyers, while balancing
    their love of structure with a spontaneous willingness to pivot whenever a client opportunity arises.
  sports: Heather Garcia competes in a co‑ed community soccer league, attends weekly Zumba classes, hikes the Loess Hills State Park each summer, and roots for the Iowa Hawkeyes football team while cheering
    on the local Burlington Bulldogs semi‑pro baseball club.
  arts: Heather Garcia immerses themselves in the Burlington indie‑music scene, regularly catching live sets by Hozier and The Lumineers at The Riverfront Bar, devours mystery novels by Gillian Flynn, and
    captures their DIY interior‑design projects through photography inspired by the vibrant compositions of Annie Leibovitz.
  travel: Heather Garcia favors weekend road trips that blend adventure and budget, having explored Chicago’s art districts, hiked Door County’s shoreline in Wisconsin, and dreaming of a cultural getaway
    to Asheville, North Carolina’s Blue Ridge Mountains.
  culinary: Heather Garcia experiments in the kitchen by reimagining family recipes into chipotle‑lime shrimp tacos, saffron risotto with goat cheese, and sweet‑potato enchiladas, showcasing a confident
    home‑chef skill set while often sourcing fresh herbs, truffle oil, and heirloom tomatoes from local farmers’ markets.
  core: Heather Garcia’s blend of meticulous planning and spontaneous social energy drives them to close real‑estate deals, juggle DIY décor projects, and chase mystery novels, all while habitually forgetting
    dentist appointments and over‑caffeinating during late‑night study sessions.
background:
  cultural: 'Heather grew up in a close‑knit, predominantly white Midwestern community in Burlington, Iowa, where self‑reliance, neighborly support, and modest living are valued. Although identified as
    white, her family carries the Garcia surname, introducing occasional Hispanic cultural traditions such as celebrating Día de los Muertos with her extended relatives and enjoying Latin‑American cuisine
    at family gatherings. She was raised in a Protestant household that emphasized community service and church involvement. This blend of Midwestern pragmatism and a touch of Hispanic heritage shapes her
    worldview: she values hard work, community belonging, and a willingness to embrace diverse experiences while staying rooted in the local traditions of the Iowa heartland.'
