  career_goals: Heather aims to complete her full real estate broker’s license within the next year and become one of the top‑producing agents in Des Moines County. She intends to cultivate a niche in helping
    young families and first‑time buyers find affordable homes, while also exploring a future specialization in sustainable and energy‑efficient properties. Her longer‑term ambition is to open a boutique
    brokerage focused on community‑oriented service, where she can mentor new agents and partner with local developers on revitalizing small‑town neighborhoods. Financial independence, a strong local reputation,
    and the ability to balance a flexible schedule with reliable income are central to her career vision.
