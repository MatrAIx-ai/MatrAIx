  hobbies: '[ ''Visiting art galleries'', ''Sketching and digital illustration'', ''Photography'', ''Chess'', ''Reading speculative fiction'', ''Salsa dancing'', ''Cooking Venezuelan cuisine'', ''Volunteering
    for STEM outreach'', ''Hiking in coastal parks'' ]'
  career_goals: He aims to earn a Ph.D. within the next three years and transition to a tenure‑track lecturer position, where he can develop interdisciplinary courses that blend STEM with visual arts and
    design. Jose aspires to secure research funding for projects that explore innovative pedagogical methods, lead community outreach programs that introduce STEM to Hispanic youth in Miami, and become
    a recognized advocate for inclusive, arts‑infused scientific education.
