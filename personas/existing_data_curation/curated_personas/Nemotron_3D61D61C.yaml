personas:
  professional: Jose Martinezmunoz is a lab manager turned aspiring lecturer who blends a strong foundation in data analysis with Python and R and a flair for visual storytelling to craft interdisciplinary
    STEM curricula, and they leverage bilingual communication to mentor a diverse student body while infusing artistic design into virtual labs.
  sports: Jose Martinezmunoz is a regular participant in the Miami United FC recreational soccer league, a devoted fan of the Miami Heat and Miami Marlins, and they complement team spectating with early‑morning
    beach volleyball sessions, while dedicating Friday evenings to a community chess club that sharpens strategic thinking.
  arts: Jose Martinezmunoz is a frequent visitor of Wynwood Walls who draws inspiration from street artists like Shepard Fairey, Os Gêmeos, and Banksy, enjoys the surreal visuals of speculative fiction
    author Neal Stephenson, and they often sketch in a downtown studio after attending salsa nights featuring musicians such as Juanes and The Strokes.
  travel: Jose Martinezmunoz is a methodical planner who books flights months ahead for cultural itineraries—like a recent film‑festival trip to Cannes and a nostalgic family reunion during Carnaval celebrations—yet
    they keep a flexible pocket itinerary for impromptu salsa nights in Havana and sunset hikes in the Great Smoky Mountains, balancing budget constraints with an appetite for authentic street food experiences.
  culinary: Jose Martinezmunoz is an avid home cook who masters the art of making crisp arepas stuffed with shredded turkey, black beans, and queso fresco, experiments with cilantro‑lime quinoa salads,
    and seeks out fresh avocado and plantain chips at Miami’s Little Haiti market, while occasionally indulging in fine‑dining experiences at restaurants led by chefs like José Andrés.
  core: Jose Martinezmunoz blends scientific rigor with artistic flair, channeling curiosity into interdisciplinary teaching while balancing a habit of late‑night coffee‑fueled coding marathons with spontaneous
    salsa dancing excursions that often leave coffee cups scattered across their studio.
background:
  cultural: Jose was born in Caracas and moved to Miami as a young adult. He grew up in a close‑knit Venezuelan family that celebrated festivals such as Carnaval and Día de los Muertos, with music, dance,
    and rich culinary traditions shaping his worldview. His bilingual upbringing gives him a deep appreciation for both Latin American and American cultures, and he actively participates in the Venezuelan
    diaspora community in Miami, sharing his heritage through food, language, and cultural events while also embracing the city’s multicultural dynamism.
