  career_goals: He aims to become a lead engineering technologist leading R&D projects that fuse technology with artistic expression, such as kinetic installations or interactive devices. Over the next
    five years he plans to secure a senior role at a San Diego aerospace or robotics firm, earn a Professional Engineering Technologist (PE) license, and file at least two patents for novel sensor‑fusion
    prototypes. He also hopes to win national maker competitions and mentor junior technologists, while eventually launching a boutique studio that creates immersive tech‑art experiences.
