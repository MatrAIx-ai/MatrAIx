personas:
  professional: Armando Bory is a 27‑year‑old engineering technologist who blends rapid prototyping, sensor‑fusion expertise, and surreal visual storytelling to create kinetic art installations, thriving
    in flexible R&D environments where they can sketch ideas on a tablet while debugging Arduino boards, even though their laid‑back attitude sometimes makes deadlines feel optional.
  sports: Armando Bory rides the Pacific swells with members of the La Jolla Surf Club, tracks the San Diego Padres and LA Chargers for a quick burst of city pride, and mixes spontaneous surf sessions with
    occasional beach volleyball at Mission Bay and weekend hikes in Torrey Pines, preferring the freedom of wave‑chasing over regimented gym routines.
  arts: Armando Bory crafts surreal digital illustrations inspired by Bogotá’s vibrant graffiti, mixes modular‑synth textures that echo Aphex Twin’s glitchy soundscapes, and regularly immerses themselves
    in exhibitions at the Museum of Contemporary Art San Diego, all while quoting Banksy’s street‑art philosophy and weaving cumbia rhythms into experimental audio‑visual pieces.
  travel: Armando Bory alternates between spontaneous surf trips to Costa Rica’s Nicoya Peninsula, cultural weekends exploring Medellín’s historic plazas and tasting local street food, and art‑focused wanderings
    through Lisbon’s Alfama district, often booking flights just a week ahead to satisfy their novelty‑driven itch while balancing a modest travel budget constrained by student‑loan repayments and occasional
    anxiety about long‑haul flights.
  culinary: Armando Bory’s kitchen is a creative laboratory where they perfect a bandeja paisa‑inspired bowl topped with miso‑glazed pork belly, crispy plantain chips, and avocado‑lime crema, while also
    concocting spicy ramen that fuses cilantro and traditional Latin herbs with Japanese noodles, reflecting their love for bold flavors, hands‑on experimentation, and the occasional over‑indulgence in
    late‑night snack crafting.
  core: Armando Bory is a restless technomancer who fuses circuitry with surreal art, surfs on waves of anxiety, and impulsively splurges on gadgets while chasing the next creative spark.
background:
  cultural: Armando was born to Colombian immigrants who settled in the Bay Area before moving to San Diego. He grew up bilingual, speaking Spanish at home and English at school, and his upbringing was
    steeped in Colombian traditions—from family meals featuring arepas and sancocho to listening to cumbia and vallenato. The magical realism of Gabriel García Márquez sparked his imagination, while the
    vibrant street art of Bogotá informed his aesthetic sensibility. In San Diego, he participates in the local Colombian community, celebrating festivals like Feria de la Luz, and integrates both cultures
    by mixing Latin rhythms with the region’s surf and tech scenes.
