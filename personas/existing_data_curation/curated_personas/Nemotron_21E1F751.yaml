  hobbies: '[''basketball'', ''soul‑food cooking'', ''community tutoring'', ''live jazz concerts'', ''church choir'', ''urban gardening'', ''weekend family gatherings'', ''participating in local festivals'']'
  career_goals: Fabin aims to transition from his current managerial role to a senior regional manager position overseeing multiple locations, with a focus on embedding community‑engagement initiatives
    and employee wellness programs into the corporate structure. He aspires to launch a city‑wide partnership program that links his organization with local nonprofits, creating apprenticeship pathways
    for young people in Chicago. Long‑term, he envisions establishing his own consultancy that helps mid‑size companies build inclusive, routine‑based operational systems that prioritize employee well‑being.
