  hobbies: '[''Zydeco Dancing'', ''Cooking Southern Cuisine'', ''Exploring Farmers\'' Markets'', ''Attending Mardi Gras Parades'', ''Community Volunteering'', ''Listening to Blues and Jazz'', ''Sketching
    Bayou Landscapes'', ''Watching LSU Football'']'
  career_goals: Sandra aims to transition from a server to a shift supervisor within the next year, then pursue a restaurant manager position. She plans to obtain her GED and enroll in a community college
    hospitality program, with the long‑term ambition of opening a family‑friendly café that showcases Cajun‑Creole comfort food while providing local youth with job training opportunities. She also hopes
    to mentor new staff, fostering a collaborative and supportive work environment.
