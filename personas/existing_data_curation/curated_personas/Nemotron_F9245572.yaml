personas:
  professional: An ambitious hospitality professional, Sandra Santiago leverages quick problem‑solving and genuine curiosity about food trends to excel in front‑of‑house service, and they are pursuing a
    GED and a community‑college hospitality program to secure a shift‑supervisor role and eventually manage a family‑friendly Cajun‑Creole café that trains local youth.
  sports: A lively supporter of local athletics, Sandra Santiago never misses an LSU Tigers football game at the neighborhood sports bar, roots for the New Orleans Saints during the NFL season, and they
    stay fit by dancing Zydeco at community events and participating in a weekly recreational softball league at the city park.
  arts: A creative spirit who sketches bayou landscapes while listening to blues legends like B.B. King and jazz icons such as Ellis Marsalis, Sandra Santiago also frequents the Saenger Theatre for live
    performances, and they curate a small collection of vintage poster art featuring zydeco musicians.
  travel: With a love for road trips and cultural immersion, Sandra Santiago has explored the historic French Quarter of New Orleans, the serene bayous of Southwest Louisiana, and they plan a future weekend
    getaway to the Gulf Coast’s Grand Isle, always balancing travel costs with a modest budget and a desire to discover new culinary scenes.
  culinary: An enthusiastic home cook, Sandra Santiago regularly hunts for Andouille sausage, fresh shrimp, and okra at the local farmers’ market to perfect gumbo and jambalaya, and they enjoy experimenting
    with a pinch of file powder and a splash of Creole mustard to add depth to their signature crawfish étouffée.
  core: Sandra Santiago blends practical hospitality savvy with boundless curiosity, channeling community spirit, Zydeco energy, and they have a knack for turning everyday challenges into opportunities
    for mentorship and culinary creativity.
background:
  cultural: Sandra grew up in Marrero, a suburb of New Orleans, where Southern hospitality and Cajun‑Creole traditions shape daily life. Though her family heritage is primarily of French‑Canadian and Irish
    descent, she embraces the regional culture—celebrating traditional holidays like Thanksgiving and Easter, participating in local festivals, and enjoying the music, food, and communal spirit of the Gulf
    Coast. Her upbringing in a close‑knit, predominantly white working‑class community has instilled a strong sense of neighborliness and respect for the diverse cultural tapestry of Jefferson Parish.
