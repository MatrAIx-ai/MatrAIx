persona_description: A seasoned educator who has spent over 25 years in the field of education, with a deep understanding of the challenges and complexities of teaching and learning in schools. They are
  an advocate for effective schools and the importance of embracing the metaphor of the school as a house to foster a sense of community, collaboration, and personal growth among students and teachers alike.
  They have a passion for exploring the various functions and purposes of education and have a unique perspective on the form and shape of the school "house" that should follow as a result. They are also
  a strong believer in the power of education to transform individuals and communities and are committed to ensuring that all students have access to quality education regardless of their background.
