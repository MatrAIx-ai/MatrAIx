personas:
  professional: Christina Seliga, a methodical mechanical engineer proficient in CAD, finite‑element analysis, and Six Sigma, leverages her love of art and sustainability to lead interdisciplinary teams
    that develop eco‑friendly products while championing precise documentation and collaborative problem‑solving.
  sports: Christina Seliga hikes the Santa Ynez foothills on weekends, catches early‑morning waves at Carpinteria State Beach for kinetic meditation, practices yoga three times a week, and roots for the
    Los Angeles Lakers while joining a local beach‑volleyball league for friendly competition.
  arts: Christina Seliga channels her artistic side through black‑and‑white coastal photography inspired by Ansel Adams, spends evenings at the piano playing Debussy's Arabesques, attends intimate gallery
    openings featuring emerging mixed‑media artists like Tania Bruguera, and devours speculative fiction by N.K. Jemisin and Ted Chiang to fuel her imagination.
  travel: Christina Seliga plans her travel meticulously, favoring solo road trips along the Pacific Coast Highway and weekend escapes to Yosemite’s granite cliffs, while dreaming of a future expedition
    to Iceland’s geothermal landscapes, balancing her craving for rugged scenery with the constraints of a demanding engineering schedule.
  culinary: Christina Seliga enjoys cooking Mediterranean‑inspired meals at home, mastering grilled mahi‑mahi with lemon‑herb drizzle, fresh avocado toast topped with heirloom tomatoes, and brewing pour‑over
    coffee with single‑origin beans, though she occasionally orders takeaway sushi from her favorite local spot after a long day of prototyping.
  core: Christina Seliga, a detail‑obsessed mechanical engineer who channels intense anxiety into sunrise surf sessions and meticulous design work, occasionally over‑organizes her planner and hoards premium
    coffee beans, while turning solitary hikes into creative incubators.
background:
  cultural: Christina grew up in a middle‑class, white family in Southern California, where her parents emphasized academic achievement and community involvement. Her upbringing combined the pragmatic,
    innovative spirit of the West Coast tech scene with the coastal region’s strong environmental consciousness and vibrant arts community. She identifies with mainstream American cultural values—individualism,
    self‑reliance, and a belief in progress—while also embracing the regional ethos of sustainability, outdoor recreation, and cultural appreciation that characterizes Santa Barbara. Her European ancestry
    (primarily German and Irish) occasionally surfaces in family traditions, but her primary cultural identity is shaped by the diverse, liberal, and environmentally aware milieu of modern coastal California.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''Finite Element Analysis (ANSYS)'', ''Rapid Prototyping (3D printing)'', ''Product Lifecycle Management (PLM)'', ''Project Management (Agile, Scrum)'', ''Six Sigma
