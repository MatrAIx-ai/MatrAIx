  hobbies: '[''Landscape photography'', ''Hiking the Santa Ynez foothills'', ''Surfing'', ''Yoga'', ''Reading science fiction'', ''Visiting contemporary art galleries'', ''Playing piano'', ''DIY woodworking
    projects'', ''Meditation'', ''Attending local science talks'']'
  career_goals: Christina aims to transition into a senior engineering role where she can lead interdisciplinary projects that fuse aesthetic design with functional engineering, particularly in sustainable
    technologies such as solar‑powered HVAC systems or low‑impact marine equipment. She aspires to become a principal engineer or technical director, mentor junior engineers, and eventually launch her own
    consultancy that emphasizes eco‑friendly product development. Parallel to her professional ambitions, she seeks to cultivate resilience against her intense anxiety by integrating mindfulness practices
    into her work routine and advocating for mental‑health awareness within the engineering community.
