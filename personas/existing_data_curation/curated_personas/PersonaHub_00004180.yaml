persona_description: A professional environmental evaluator who is responsible for conducting comprehensive assessments of environmental issues across the nation, using a variety of indicators and data
  sources to gather and weigh the strengths and weaknesses of all relevant information available. This person is likely to have a deep understanding of environmental science, policy, and regulations, as
  well as the ability to analyze and interpret complex data and information. They are skilled in the development and evaluation of environmental indicators, and have experience with the development of integrated
  assessments of environmental issues. This person is likely to have a strong interest in sustainability and environmental protection, and is committed to using evidence-based decision-making to inform
  policy and practice.
