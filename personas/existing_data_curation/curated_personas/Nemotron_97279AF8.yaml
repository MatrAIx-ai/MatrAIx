  hobbies: '[''Co‑ed softball league'', ''Neighborhood potluck gatherings'', ''Trivia nights'', ''Board games (e.g., Settlers of Catan)'', ''DIY home‑improvement projects'', ''Car restoration'', ''Group
    fitness classes (spin, Zumba)'', ''Hiking in New England'', ''Listening to productivity podcasts'', ''Cooking and baking'']'
  career_goals: Krista aims to advance from a general maintenance role to a supervisory position within the next three to five years, targeting a facility manager or senior maintenance supervisor role at
    a larger campus or municipal property. She plans to earn certifications such as the Certified Maintenance & Reliability Professional (CMRP) and OSHA 30‑hour safety training to deepen her technical credibility.
    Long‑term, she envisions launching her own small business offering tailored maintenance and repair services for local residential and commercial clients, emphasizing proactive, data‑driven upkeep using
    emerging IoT sensors.
