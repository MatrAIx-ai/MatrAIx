personas:
  professional: Krista Poche, a 26‑year‑old maintenance specialist, leverages her associate’s degree in applied technology to deliver systematic HVAC, electrical, and plumbing diagnostics while using her
    charismatic, talkative nature to keep the crew engaged during daily briefings and push herself toward supervisory certifications.
  sports: Krista Poche competes in a co‑ed softball league with the North End Softball Club, cheers for the Boston Red Sox and Boston Celtics, participates in group fitness classes like spin and yoga, and
    hikes the White Mountain trails each autumn, approaching each activity with a competitive edge that fuels her drive to improve personal performance.
  arts: Krista Poche enjoys the indie‑folk sounds of Mumford & Sons and the soulful piano of Norah Jones, attends quarterly shows at the local community theater featuring plays by Aaron Sorkin, and curates
    a rotating collection of New England landscape photographs inspired by Ansel Adams, using these artistic experiences to recharge her social energy.
  travel: Krista Poche favors spontaneous weekend road trips to New England gems such as Acadia National Park and Portland’s food scene, while keeping a spreadsheet of future adventures—like a tech‑focused
    tour of Tokyo and a cultural immersion in Berlin—balanced against her savings goal for a maintenance startup.
  culinary: Krista Poche’s potluck signature dishes include smoky maple‑glazed chicken wings, hearty New England clam chowder seasoned with fresh thyme, and a vegetarian quinoa‑black bean chili, all prepared
    with a well‑stocked spice rack featuring smoked paprika, rosemary, and chipotle, reflecting her love for hands‑on cooking and communal dining.
  core: Krista Poche blends a competitive, talk‑ative spirit with a structured, detail‑oriented work ethic, turning every social gathering, DIY project, and maintenance task into a chance to lead, learn,
    and out‑perform the next challenge, even if it means sacrificing sleep for trivia triumphs.
background:
  cultural: Krista grew up in a middle‑class New England family with deep roots in the Hudson, NH community. Her cultural upbringing blends the practical, self‑reliant values typical of the region—punctuality,
    respect for rules, and an appreciation for the outdoors—with a strong sense of community involvement. Family gatherings often featured shared meals and local traditions such as fall festivals and volunteer
    events. This background informs her pragmatic work ethic, her comfort in social settings, and her desire to contribute positively to her neighborhood while pursuing personal and professional growth.
