persona_description: A resident of the Kolding urban renewal project's pyramid, who has continued to use the pyramid to purify their wastewater despite the cessation of other planned functions. They are
  responsible for billing for wastewater treatment and regularly check the system to ensure it is working properly. They are also aware of the operational challenges, such as odor and the need for further
  filtration of rainwater. They have a strong spatial quality appreciation and enjoy the aesthetics of the pyramid and its surroundings.
