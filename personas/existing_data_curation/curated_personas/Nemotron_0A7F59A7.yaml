personas:
  professional: Tyler Boyce, a seasoned casino surveillance consultant, leverages decades of real‑time CCTV expertise and a keen eye for patterns to design inventive visual alerts that resemble abstract
    watercolors, while mentoring younger guards with the relaxed, sociable flair of a community theater director.
  sports: Tyler Boyce, an avid fan of the Atlanta Braves and Atlanta Hawks, spends Saturday mornings playing pickleball at the Paulding County senior center, participates in a local senior bowling league,
    and joins the community’s annual charity run for the Georgia Marathon.
  arts: Tyler Boyce, a prolific abstract watercolorist and experimental photographer, finds inspiration in the works of Georgia O'Keeffe and Ansel Adams, while blowing blues harmonica riffs à la B.B. King
    at senior center gatherings and attending live shows by local blues band The Lost Angels.
  travel: Tyler Boyce, a curious explorer, has road‑tripped to Savannah’s historic squares and Asheville’s art districts, booked a quiet river cruise on the Mississippi for a change of pace, and dreams
    of a VR‑enhanced pilgrimage to Kyoto’s Zen gardens.
  culinary: Tyler Boyce, a modest home‑cook, delights in simmering shrimp and grits with fresh garden herbs, grilling smoked brisket seasoned with oak chips, and they often experiment with sweet peach cobbler
    topped with a hint of bourbon.
  core: Tyler Boyce, a 68‑year‑old former surveillance wizard turned watercolor hobbyist, blends artistic whimsy with security precision, loves blues harmonica, mentors eager newbies, but often misplaces
    their glasses and forgets to water the garden.
background:
  cultural: Tyler is a white Southern man raised in Georgia, embodying the region’s hospitality, strong sense of community, and appreciation for tradition. He grew up attending a Baptist church, where fellowship
    and service are central values. Southern cuisine, folk music, and local festivals have shaped his social life. His professional years in gambling surveillance exposed him to a broader, national culture,
    including travel to larger casino hubs and interaction with diverse colleagues. This blend of deep-rooted Southern identity and exposure to the fast‑paced, novelty‑driven world of casino entertainment
    informs his outlook, making him both grounded and open to new ideas.
