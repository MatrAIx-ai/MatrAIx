  career_goals: Approaching retirement, Tyler aims to transition into a part‑time consulting role where he can share his surveillance expertise with emerging security teams in the region. He hopes to develop
    a mentorship program for younger guards, author a practical guide on modern casino surveillance techniques, and collaborate with local schools to create an interactive safety exhibition that combines
    visual art with security concepts. Additionally, he dreams of documenting his career stories in a memoir that highlights the blend of technology, human intuition, and the quirky culture of the gambling
    industry.
