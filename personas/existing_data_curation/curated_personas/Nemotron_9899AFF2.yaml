  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading historical fiction and poetry'', ''Desert landscape photography'', ''Hiking in the White Mountains'', ''Gardening native plants'', ''Cooking
    traditional Mexican dishes'', ''Meditation and journaling'', ''Listening to classical and Mexican folk music'']'
  career_goals: Jeanette aims to move into a supervisory role within the correctional system that allows her to develop and oversee rehabilitation programs focused on the arts. She plans to obtain a certification
    in counseling or criminal justice to enhance her ability to support inmate mental health. Her long‑term ambition is to establish a permanent art‑therapy workshop at the county jail, creating a quieter,
    more constructive environment for both staff and inmates. She also hopes to influence policy that prioritizes stress‑reduction and wellness for correctional officers, ultimately achieving a leadership
    position that balances operational safety with humane, restorative practices.
