personas:
  professional: Jeanette Meza, a correctional officer with 15 years of experience in inmate supervision and crisis de‑escalation, leverages her self‑taught watercolor skills and empathetic, creative problem‑solving
    to design art‑based rehabilitation initiatives while navigating a disorganized yet flexible work style.
  sports: Jeanette Meza supports the Arizona Diamondbacks and the Phoenix Suns, joins a local hiking club that tackles the White Mountains each spring, and volunteers as a walk‑lead for a weekend senior‑fitness
    group, preferring solo trail time over crowded gyms.
  arts: Jeanette Meza, an avid watercolorist and wildlife photographer, draws inspiration from Georgia O'Keeffe’s desert palettes and Frida Kahlo’s introspective self‑portraits, while listening to Lila
    Downs and Beethoven during sketch sessions, and they regularly attend the annual Tucson Folk Art Festival to connect with local craft makers.
  travel: Jeanette Meza favors flexible, low‑key travel, often planning spontaneous road trips to nearby Sedona sunrise hikes or a weekend pilgrimage to Oaxaca to explore Day of the Dead altars, while keeping
    a modest savings reserve that limits longer international jaunts, though they dream of photographing the cherry blossoms in Kyoto.
  culinary: Jeanette Meza enjoys cooking mole poblano, tostadas with pickled radish and fresh cilantro, and simmering pozole on Sundays, using heirloom chiles from their garden, and they consider themselves
    a competent home chef who occasionally improvises with quinoa and avocado to modernize family recipes.
  core: Jeanette Meza, a 40‑year‑old correctional officer turned art‑therapy advocate, blends solitary desert‑inspired creativity with a compassionate yet disorganized approach to life, constantly balancing
    stress‑induced worry with a quiet quest for harmony.
background:
  cultural: Jeanette is a first‑generation Mexican American who grew up speaking Spanish at home and English at school. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    Las Posadas, and other cultural festivals with homemade foods, music, and folk art. She blends these customs with the Southwestern influences of Arizona, embracing the region's outdoor lifestyle while
    preserving a deep respect for family, elders, and community solidarity. Her bilingual fluency and cultural duality enable her to navigate both her Mexican heritage and the broader American context,
    enriching her interactions at work and in her personal life.
attributes:
  skills: '[''Inmate supervision'', ''Crisis de‑escalation'', ''Conflict mediation'', ''Incident report writing'', ''Defensive tactics'', ''Firearms safety'', ''Trauma‑informed care'', ''Creative problem
