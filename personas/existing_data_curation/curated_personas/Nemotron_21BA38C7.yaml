personas:
  professional: Gregory Flowers, a retired senior civil/structural engineer, leverages four decades of coastal infrastructure design expertise, advanced finite‑element modeling in MATLAB and Python, and
    a meticulous, organized work ethic to consult on shoreline resilience projects while they mentor emerging engineers through hands‑on university workshops.
  sports: Gregory Flowers stays active through daily marsh boardwalk walks, weekend kayaking with the St. Simons Yacht Club, and occasional bird‑watching hikes, while cheering the Atlanta Braves and Atlanta
    Falcons, but they avoid high‑intensity gym workouts, preferring gentle stretching and nature‑based exercise.
  arts: Gregory Flowers enjoys listening to folk legends like The Avett Brothers and bluegrass virtuoso Ricky Skaggs, attending local storytelling evenings at the St. Simons Community Center, and painstakingly
    assembling scale model ships inspired by the maritime sketches of William G. Crouch, which they consider both artistic therapy and historical homage.
  travel: Gregory Flowers prefers meticulously planned, low‑stress road trips to historic coastal towns such as Savannah and Charleston, occasional sailing voyages to the Azores, and yearly visits to the
    St. Simons lighthouse, while they balance a modest budget with a yearning for quiet reflection and natural beauty.
  culinary: Gregory Flowers, an avid gardener, prepares herb‑infused shrimp and grits, rosemary‑roasted sweet potatoes, and fresh crab cakes using dill, thyme, and basil harvested from their garden, enjoys
    sourcing oysters from the local pier, and occasionally treats themselves to a slice of pecan pie, reflecting they value low‑impact Southern cuisine and precise cooking.
  core: Gregory Flowers combines an engineer’s precision with a bird‑watcher’s patience, tending a permaculture garden while they obsessively log every shorebird sighting and meticulously file model‑ship
    plans.
background:
  cultural: Gregory was born and raised in the mid-South, growing up in a middle-class white family steeped in Southern traditions of hospitality, respect for nature, and a strong work ethic. His upbringing
    in Georgia fostered an appreciation for the coastal environment and a keen sense of community stewardship. While he values the region's cultural heritage—such as storytelling, folk music, and Southern
    cuisine—he also embraces intellectual curiosity, evident in his pursuit of a STEM education and ongoing engagement with scientific discourse. Living on Saint Simons Island has reinforced his connection
    to maritime culture and environmental conservation, shaping a personal identity that blends classic Southern values with a modern, evidence-based worldview.
attributes:
  skills: '[''civil engineering (coastal infrastructure)'', ''structural analysis'', ''finite element modeling'', ''project management'', ''statistical modeling'', ''data visualization'', ''AutoCAD'', ''Revit'',
