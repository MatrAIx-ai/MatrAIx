  hobbies: '[''vegetable gardening'', ''herb cultivation'', ''birdwatching'', ''model ship building'', ''reading scientific journals'', ''puzzle solving (cryptic crosswords, mechanical puzzles)'', ''stargazing'',
    ''local maritime history research'']'
  career_goals: Gregory aims to mentor emerging engineers through local university outreach programs, publish a series of practical guides on sustainable coastal design, and establish a modest scholarship
    to support high-achieving high school students pursuing STEM fields. He also aspires to apply his analytical skills to citizen-science projects focused on shoreline erosion, and to continue cultivating
    a model garden that demonstrates low-impact, high-efficiency horticulture.
