persona_description: A German military officer who was involved in the negotiations and discussions regarding the establishment of the League of Nations and the implementation of the Treaty of Versailles.
  They were responsible for overseeing the development of civil aviation and were part of the team that negotiated with the Allied Powers to define the boundaries between civil and military aviation. They
  were also involved in the negotiations regarding the establishment of a national air force and the implementation of the Treaty of Versailles.
