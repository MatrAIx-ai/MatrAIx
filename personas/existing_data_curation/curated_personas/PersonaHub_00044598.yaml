persona_description: A user who is interested in accessing, searching, and using Earth observation data, information, tools, and services through the Global Earth Observation System of Systems (GEOSS).
  This user is likely to be a geoscientist, environmentalist, or someone working in the field of Earth observation. This individual is familiar with the concept of the GEOSS Common Infrastructure and its
  four main elements, the GEO Portal, GEOSS Clearinghouse, GEOSS Components and Services Registry, and the GEOSS Standards and Interoperability Registry. The user is also familiar with the Best Practices
  Wiki, which provides a means to propose, discuss, and converge upon best practices in all fields of Earth observation. The user is aware of the importance of the GEOSS Common Infrastructure and the role
  it plays in the success of GEOSS.
