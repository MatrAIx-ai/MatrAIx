  career_goals: 'Even at five, Manuel dreams big: he imagines becoming an artist who paints colorful murals that tell stories, an astronaut exploring new planets, or a chef who brings his family’s favorite
    tacos to life. His love for creativity, discovery and sharing joyful experiences shapes these playful ambitions.'
