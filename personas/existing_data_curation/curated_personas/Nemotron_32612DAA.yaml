personas:
  professional: Manuel Morales is a budding LEGO architect who meticulously arranges colorful bricks into intricate, yet adaptable, structures, reflecting their early knack for organized creativity and
    curiosity about how things fit together, and they often narrate each building process aloud as if guiding an audience.
  sports: Manuel Morales loves sprinting around the playground, proudly dons a cap of the Metro Eagles, the city's professional baseball team, and attends a Saturday kids' gymnastics class run by the Brightstars
    Club, where they practice cartwheels with the same excitement they reserve for playground tag games.
  arts: Manuel Morales thrives in art class, where they eagerly experiment with finger paints, collage techniques, and sketching their favorite animated hero, Spider-Man, while at home they indulge in the
    bright illustrations of Oliver Jeffers, the sing‑along tunes of children's musician Raffi, and the playful storytelling of the TV show Bluey, all of which fuel their imagination.
  travel: Manuel Morales dreams of returning to the seaside town where their family spent a summer building sandcastsles at Ocean Beach, and they also have a favorite memory of a short train ride to the
    nearby mountain zoo, sparking a wanderlust that balances their love for familiar comfort zones and new discoveries.
  culinary: Manuel Morales favors cheese pizza with extra mozzarella and a side of carrot sticks, can assemble a simple avocado toast with a spread of mashed avocado, but frequently demands the honey‑glazed
    chicken nuggets that their parents worry may be too salty, revealing a budding palate that oscillates between health‑conscious choices and indulgent cravings, and they often negotiate for a sweet treat
    after dinner.
  core: Manuel Morales is a curious, organized‑yet‑flexible five‑year‑old who balances a love for creative play, spontaneous snack choices, and gentle social harmony, all while navigating the ups and downs
    of early childhood habits, and they tackle challenges with a calm demeanor.
background:
  cultural: Manuel grows up in a bilingual Mexican-American household in Los Angeles. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos, sharing
    homemade tamales, and listening to mariachi music are part of his daily life. The multicultural neighborhood exposes him to a blend of cultures, fostering an appreciation for diverse art forms and community
    events while keeping strong ties to his Mexican heritage.
