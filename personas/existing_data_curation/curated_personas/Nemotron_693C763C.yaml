  hobbies: '[''Mountain Biking'', ''Skiing'', ''Live Music Festivals'', ''Community Theater'', ''Craft Beer Brewing'', ''Hiking'', ''Gaming with Friends'', ''Volunteering at Local Food Bank'', ''Outdoor
    Photography'']'
  career_goals: Driven by his desire for both structure and adaptability, Stuart aims to advance to a senior director or CIO role within a regional energy or utilities company, where he can shape large-scale
    digital transformation initiatives. He wants to champion resilient, cloud-first architectures that support remote operations across Wyoming’s rugged terrain while fostering a culture of continuous learning
    for his team. Over the next five years, he plans to earn a PMP certification, mentor emerging IT talent, and build a reputation as a go-to problem solver for critical infrastructure projects. In the
    longer term, Stuart envisions launching his own managed-services consultancy that offers flexible, high-availability solutions to small businesses in the Rocky Mountain region.
