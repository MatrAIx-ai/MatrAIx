  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Reading engineering memoirs'', ''Knitting'', ''Model train building'', ''Volunteer baking for church events'', ''Attending
    local heritage festivals'']'
  career_goals: Madeline aims to advance to a senior supervisory role, such as Shift Superintendent or Safety Compliance Officer, within the next five years. She plans to obtain a Certified Boiler Operator
    credential and lead plant‑wide safety initiatives that reduce downtime and improve energy efficiency. Mentoring the next generation of engineers and technicians is a priority, as is securing a stable
    position that allows a smoother work schedule for an upcoming retirement. She also envisions contributing to process‑improvement projects that modernize the facility while preserving reliable operations.
