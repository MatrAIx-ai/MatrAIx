  hobbies: '["Hiking and trail walking", "Community theater participation", "Book club", "Gardening", "Cooking classes", "Dance (salsa/ballroom)", "Volunteering at local senior center", "Spontaneous road
    trips with spouse", "Yoga for stress relief", "Crafting (knitting)"]'
  career_goals: In the coming years, Brenda aims to transition from day‑to‑day operational responsibilities to a mentorship and strategic advisory role. She plans to obtain the SHRM Senior Certified Professional
    (SHRM‑SCP) credential, develop a comprehensive onboarding curriculum for new hires at her organization, and establish a community‑focused workforce development partnership that offers HR consulting
    to local small businesses. Ultimately, she hopes to balance her professional contributions with a reduced schedule that allows more time for family, volunteering, and personal wellbeing.
