  hobbies: '[''reading adventure and folklore books'', ''drawing and painting'', ''birdwatching and nature walks'', ''piano lessons'', ''cooking with family'', ''science club projects'', ''art & craft activities
    with small groups'']'
  career_goals: Rebecca dreams of a future where she can combine her curiosity, practicality, and desire to help others. She hopes to become a bilingual teacher who supports students in her community, or
    a wildlife biologist who protects the local ecosystems along the Rio Grande. She also envisions working in a community health setting to assist her family and neighbors, reflecting her stable, service‑oriented
    ambition.
