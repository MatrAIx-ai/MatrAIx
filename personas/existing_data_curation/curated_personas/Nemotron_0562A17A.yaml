  career_goals: His primary ambition is to become a partner at his firm within the next five years, while simultaneously launching a boutique practice focused on emerging technologies such as AI and biotech.
    He aims to integrate his creative flair by developing innovative legal frameworks and publishing thought‑leadership pieces. A core component of his vision is to expand pro bono services and establish
    a legal clinic that serves low‑income Hispanic communities in Brazoria County. He also hopes to teach as an adjunct professor and mentor young lawyers from underrepresented backgrounds.
