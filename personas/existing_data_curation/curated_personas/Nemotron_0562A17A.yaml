personas:
  professional: Luis Sepulveda, a tech‑savvy intellectual‑property and data‑privacy attorney, leverages their STEM background and vivid imagination to translate complex scientific concepts into clear legal
    strategies, while their talkative charm powers high‑stakes negotiations and courtroom advocacy as they chase partnership and launch a boutique practice for AI and biotech.
  sports: Luis Sepulveda, a dedicated runner who logs 5‑10 km jogs before work, is a fan of the Houston Dynamo soccer team and a regular participant in the local Houston Running Club, often swapping post‑run
    debriefs for strategy talks at tech meetups.
  arts: Luis Sepulveda, an abstract painter inspired by the gestural intensity of Jackson Pollock and the conceptual boldness of Marina Abramović, frequents the Contemporary Arts Museum Houston, strums
    acoustic renditions of Radiohead at open‑mic nights, and writes speculative‑fiction‑themed songs that echo the narratives of Neal Stephenson.
  travel: Luis Sepulveda, who plans trips with the same improvisational flair of their theater work, loves exploring the culinary streets of Oaxaca, dreams of a tech‑focused pilgrimage to Tokyo’s Akihabara
    district, and squeezes weekend getaways to New Orleans for its jazz scene while carefully budgeting flights with their frequent‑flyer points.
  culinary: Luis Sepulveda, an avid home chef, reinvents classic tacos al pastor with pineapple‑chipotle glaze and quinoa‑corn masa, often pairing them with a side of avocado‑pomegranate salsa, while also
    mastering the art of sous‑vide duck confit for a modern Mexican‑fusion dinner party.
  core: Luis Sepulveda combines a hyper‑creative legal mind, a compulsive need to run at sunrise, a penchant for late‑night painting, and a lingering worry about every case, making them a charismatic yet
    anxiety‑prone advocate for tech‑driven justice.
background:
  cultural: Born to Mexican‑American parents in southern Texas, Luis grew up in a bilingual household where Spanish and English intertwined daily. Family gatherings centered around traditional celebrations
    such as Día de los Muertos and quinceañeras, and the scent of mole and tamales filled the home. His heritage instilled a strong sense of collectivism, community responsibility, and respect for elders,
    which now drive his compassionate legal work. He actively participates in local cultural events, from mariachi performances to community mural projects, and his identity informs his dedication to immigrant
    rights and social justice within the broader Texan context.
