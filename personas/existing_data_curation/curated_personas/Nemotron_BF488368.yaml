  career_goals: Jonathan aims to graduate high school with honors and earn a scholarship to study engineering, focusing on sustainable design and community infrastructure. He aspires to become a civil or
    environmental engineer who can develop practical solutions for flood mitigation and green spaces in his hometown. He also wants to mentor younger students through STEM outreach programs, combining his
    compassion with his technical expertise. In the long term, he hopes to lead interdisciplinary teams that design resilient, eco‑friendly community projects.
