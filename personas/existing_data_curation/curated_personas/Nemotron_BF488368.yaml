personas:
  professional: Jonathan Kick is a budding robotics enthusiast who leads the school robotics club with disciplined project management, leveraging their organized, curiosity‑driven mindset to meld innovative
    coding solutions with tried‑and‑true engineering methods during regional competitions.
  sports: Jonathan Kick is a high‑school varsity basketball player and flag‑football starter who roots for the Orlando Magic and the Tampa Bay Buccaneers, practices with the Lakeland Youth Sports League
    after school, and spends weekends hiking at the nearby Lake Apopka Wildlife Trail to stay fit and enjoy nature.
  arts: Jonathan Kick spends evenings strumming acoustic guitar to songs by Taylor Swift, Ed Sheeran, and local Florida folk artist Andy Stewart, while capturing vivid wildlife photos of bobcats and egrets
    with a DSLR inspired by Ansel Adams, often showcasing the images at school art displays and church community newsletters.
  travel: Jonathan Kick prefers family road trips that blend adventure and relaxation, having explored Orlando's theme parks, the Everglades on a guided airboat tour, and a weekend getaway to Asheville,
    North Carolina, while dreaming of a future backpacking trip through the Appalachian Trail once they graduate.
  culinary: Jonathan Kick enjoys cooking grilled shrimp tacos with fresh lime and cilantro, mastering the family’s secret barbecue sauce for weekend cookouts, and experimenting with key‑lime pie recipes,
    though they frequently rely on quick microwaved mac and cheese when homework piles up.
  core: Jonathan Kick blends Southern hospitality, disciplined curiosity, and a tech‑savvy spirit into a life where robotics projects, community service, and impromptu guitar jams constantly shape a resilient,
    outgoing teen who occasionally forgets bedtime for extra coding.
background:
  cultural: Jonathan grew up in Lakeland, a suburban community in Central Florida with a predominantly white, middle‑class background. His family embraces Southern hospitality, with regular gatherings,
    barbecues, and active involvement in a local Methodist church that emphasizes community service. The warm climate and proximity to lakes and parks foster an outdoor, active lifestyle, influencing his
    love for sports and nature. While rooted in traditional Southern values, he also experiences Florida's broader multicultural influences, which have broadened his perspective and deepened his appreciation
    for community cohesion.
