  career_goals: Steven aims to advance to a regional sales manager position within the next three to five years, overseeing multiple territories and driving higher revenue growth. He plans to earn a bachelor's
    degree in Business Administration and later complete an MBA to deepen his strategic management capabilities. His long‑term ambition is to launch his own wholesale distribution company, leveraging his
    industry contacts and competitive drive to become a top performer and mentor for junior sales staff.
