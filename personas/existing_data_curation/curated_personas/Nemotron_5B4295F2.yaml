  career_goals: Amra dreams of turning her love for art and storytelling into a career as a children's book illustrator or visual storyteller. She is also intrigued by the possibility of using art therapeutically,
    envisioning future workshops that help peers manage anxiety through creative expression. Long‑term, she hopes to pursue a degree in fine arts or graphic design, aiming to work in a creative studio that
    values innovative thinking, community impact, and supportive environments for emotional well‑being.
