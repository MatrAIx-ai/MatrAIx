personas:
  professional: A budding visual artist and storyteller, Amra Beloat, draws inspiration from fairy-tale novels and local county fairs to create watercolor illustrations and digital sketches that blend Southwestern
    landscapes with fantastical realms, while they responsibly balance school assignments and art club duties.
  sports: An avid hiker and budding birdwatcher, Amra Beloat spends Saturday mornings trekking the Hill Country trails near San Angelo, cheers on the Dallas Cowboys during football season, practices with
    the San Angelo Youth Soccer League's U-12 team, and balances a low-key, nature-focused fitness routine with occasional weekend softball games at the church.
  arts: A passionate creator, Amra Beloat dives into watercolors inspired by the dreamy palettes of Mary Blythe, creates digital sketches echoing Hayao Miyazaki's fantasy art, reads Neil Gaiman’s novels,
    strums simple chords to Taylor Swift ballads on their ukulele, and delights in school drama productions that channel Lin-Manuel Miranda’s vibrant storytelling, while they constantly seek fresh visual
    ideas.
  travel: A curious explorer, Amra Beloat dreams of road-tripping to Austin’s live music scene and the Grand Canyon’s rim, has already visited the historic Fort Worth Stockyards on a family vacation, and
    now hopes to backpack through the pine forests of the Pacific Northwest and someday experience Tokyo’s anime districts, all while they balance school schedules and parental budget limits.
  culinary: A budding home-chef, Amra Beloat loves the smoky flavor of Texas BBQ brisket and the tangy zest of homemade pico de gallo, enjoys helping their family grill corn on the cob with butter and chili
    powder, and experiments with simple plating while mastering fluffy pancake stacks topped with fresh strawberries and maple syrup, as they savor each bite of their culinary experiments.
  core: Amra Beloat is a vivid-imagined, anxiety-prone 12-year-old who balances a love for fantasy art and county-fair BBQ with occasional impulse purchases of graphic novels and midnight sketching sessions
    that keep their restless mind both soothed and wired, and they often find themselves buzzing with ideas long after lights out.
background:
  cultural: Amra is a white Texan raised in San Angelo, a close‑knit community in Tom Green County. Her family participates in local traditions such as county fairs, community picnics, and holiday gatherings
    that often feature Texas barbecue and Tex‑Mex cuisine. While her upbringing includes exposure to the region's religious and cultural values—frequent church services and community service projects—her
    curiosity drives her to explore broader artistic and literary influences beyond her hometown. This blend of small‑town Texan heritage and a strong appetite for diverse ideas shapes her worldview and
    creative outlook.
