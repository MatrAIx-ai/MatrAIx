personas:
  professional: Sarim Verghese, a 37‑year‑old police detective with a STEM foundation, leads forensic data analysis teams, integrates crime‑pattern software into investigations, mentors junior officers,
    and champions data‑driven, arts‑based community outreach while eyeing promotion to lieutenant and future command of a cybercrime unit.
  sports: Sarim Verghese hikes early mornings in Wissahickon Valley, cycles 40 miles weekly with the Philly Mountain Bikers Club, follows the Philadelphia Eagles, 76ers and Union, and joins casual pick‑up
    basketball games at a community center, blending solitary fitness with occasional team sport.
  arts: Sarim Verghese photographs Philadelphia’s street murals, drawing inspiration from Shepard Fairey and Kehinde Wiley, visits galleries like the Philadelphia Museum of Art to study works by Diane Arbus,
    and attends Indian classical concerts featuring sitar virtuoso Ravi Shankar, interweaving visual and auditory art into their investigative mindset.
  travel: Sarim Verghese prefers meticulously planned weekend getaways that allow spontaneous detours, has trekked Kerala’s backwaters, explored Kyoto’s temples, dreams of Iceland’s geothermal craters,
    and regularly retreats to the Pocono Mountains for solitude and creative recharge.
  culinary: Sarim Verghese skillfully prepares traditional Kerala dishes such as fish moilee, avial and appam, balances them with experimental Philadelphia cheesesteak twists, favors coconut oil, mustard
    seeds and fresh curry leaves, and proudly shares these meals at youth mentorship sessions.
  core: Sarim Verghese is a curiosity‑driven, art‑loving police detective who blends data‑rich investigation with compassionate community outreach, balancing disciplined finances, mindful health habits,
    solitary fitness, and a love for cooking and travel.
background:
  cultural: Sarim is a second‑generation Indian‑American whose family originates from Kerala on the southwestern coast of India. He grew up in a Malayalam‑speaking household that celebrates Christian festivals
    such as Christmas and Easter alongside Indian traditions like Onam. The Verghese family placed a strong emphasis on education, community service, and respect for diverse perspectives. Living in Philadelphia,
    Sarim blends his Indian heritage—through language, food, and church community—with the city’s multicultural environment, shaping his collaborative, service‑oriented outlook.
