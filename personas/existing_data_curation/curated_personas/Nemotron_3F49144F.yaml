  career_goals: Sarim aspires to be promoted to police lieutenant and eventually command a specialized unit, such as cybercrime or community‑outreach. He plans to pursue a master’s degree in public administration
    to deepen his policy‑making skills, and he wants to develop and implement data‑driven, arts‑based programs that build trust between law enforcement and neighborhoods. He is also committed to mentoring
    junior officers and championing reforms that promote transparency, restorative justice, and culturally informed policing.
