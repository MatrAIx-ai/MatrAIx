persona_description: A visionary leader who has the ability to articulate a vision that inspires the nation and develop a plan to achieve it, fostering economic growth, safeguarding sovereignty and independence,
  promoting social justice and improving the quality of life. This leader is endowed with the highest quality of thought and the ability to translate it into actions, creating an environment where performance
  and commitment predominate, not mediocrity, flattery and nepotism, where decisions are based on principles, not expediency, where the focus is on breakthroughs, not cosmetic changes, and where the complex
  is translated into simple. This leader is respected, not demanded, earning respect rather than demanding it, and is a squalid tale of greed and corruption, turning politics in Pakistan into a game of
  high stakes.
