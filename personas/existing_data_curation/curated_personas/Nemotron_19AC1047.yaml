personas:
  professional: Phillip Coleman, a 40‑year‑old municipal waste‑management specialist in St. Louis, blends an engineering mindset and GIS routing expertise with hands‑on mechanical know‑how to streamline
    recycling operations, while using their sociable, talk‑ative personality to lead safety trainings, present at city council meetings, and champion community outreach, balancing a curiosity for innovative
    waste‑reduction technologies with the practical constraints of municipal procedures.
  sports: Phillip Coleman blends weekly weightlifting at the local gym with trail runs on Forest Park trails as a member of the St. Louis Road Runners, while cheering on the Cardinals at Busch Stadium and
    the Blues during hockey season, using these sports as both social glue and a vital outlet for stress relief.
  arts: Phillip Coleman channels their love for performance into karaoke renditions of Queen’s "Bohemian Rhapsody" and Journey’s "Don’t Stop Believin’", collects vintage radios tuned to classic jazz icons
    like Ella Fitzgerald, and regularly attends St. Louis Symphony concerts featuring Gustavo Dudamel, finding artistic inspiration that fuels their community recycling presentations.
  travel: Phillip Coleman prefers weekend road trips that balance adventure and relaxation, often heading to the Ozarks for mountain biking or to Asheville, North Carolina for its vibrant arts scene, while
    setting aside savings for a longer pilgrimage to Copenhagen to study its world‑renowned recycling infrastructure.
  culinary: Phillip Coleman enjoys cooking St. Louis‑style ribs with a dry rub of smoked paprika, garlic, and brown sugar, paired with a fresh kale‑and‑apple slaw made from garden produce, and delights
    in craft‑brew IPAs and occasional sushi rolls featuring avocado and eel when dining out, reflecting a palate that values both hearty comfort foods and occasional exotic flavors.
  core: Phillip Coleman is a talkative, curiosity‑driven waste‑management engineer who finds relief in karaoke, vintage radios, and relentless worry that fuels meticulous recycling projects and occasional
    late‑night coffee binges.
background:
  cultural: Phillip grew up in a middle‑class, white working‑class family in St. Louis County, shaped by Midwestern values of hard work, community responsibility, and practical problem‑solving. His parents
    encouraged a solid education, leading him to earn a bachelor’s degree in engineering, but he chose a hands‑on career in waste collection to stay connected to the neighborhoods he loved. Though raised
    in a traditionally Catholic household, he now identifies as culturally secular, while still respecting the local customs of neighborhood gatherings, church fundraisers, and the city’s deep sports loyalties.
    His divorce at 40 has broadened his social network, making him more engaged in community activities and peer support groups, which reinforce his sociable and collaborative nature.
