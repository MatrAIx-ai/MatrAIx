  career_goals: Phillip aims to move into a supervisory or program‑manager role within the St. Louis Department of Public Works, where he can lead the city's recycling initiative and develop new waste‑diversion
    strategies. He plans to obtain a Certified Waste Management Professional (CWMP) credential and complete a short course in environmental policy to strengthen his ability to influence city‑wide sustainability
    plans. In the longer term, he envisions establishing a consulting firm that helps other municipalities design efficient, community‑focused recycling programs, leveraging his technical background, on‑the‑ground
    expertise, and strong communication skills.
