persona_description: A historian who is interested in the Civil Rights Movement and its impact on American society. This person is particularly interested in the personal and political struggles of Dr.
  Martin Luther King Jr. and the impact of his legacy on contemporary culture. They are also interested in the history of American slavery and its legacy in American society, particularly in the context
  of the Civil War and the rise of the Civil Rights Movement. This person is likely to be interested in the text and its analysis of the sanitized presentation of Dr. King in modern history books and holidays.
