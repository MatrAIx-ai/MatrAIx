personas:
  professional: Diana Tamayo, a disciplined 53‑year‑old master hairdresser in Manhattan, merges meticulous precision cutting and advanced balayage techniques with an ultra‑organized salon operation that
    relies on Vagaro scheduling, strict sanitation protocols, and a mentorship program for junior stylists, and they are laying the groundwork for an upscale multicultural hair‑care boutique.
  sports: Diana Tamayo maintains fitness through daily walks in Central Park, weekly yoga sessions at a Midtown studio, and salsa dancing nights, while cheering for the New York Knicks during basketball
    season and following the New York City Marathon as an aspirational runner, and they treat each workout as a structured checkpoint in their routine.
  arts: Diana Tamayo immerses herself in the arts by attending Broadway productions such as 'Hamilton', collecting prints inspired by Frida Kahlo, listening to Carlos Santana, Natalia Lafourcade, and classic
    jazz while cooking, reading historical fiction by Ken Follett, and they occasionally showcase a spontaneous salsa routine at community events, blending movement with music.
  travel: Diana Tamayo designs her travel around cultural immersion, revisiting Oaxaca to source heirloom chiles for her product line, exploring Barcelona’s modernist architecture, enjoying weekend getaways
    to Hudson Valley vineyards when budget permits, and they schedule each trip with a detailed itinerary that balances adventure and relaxation.
  culinary: Diana Tamayo’s culinary repertoire centers on authentic Mexican cuisine, regularly preparing mole poblano, chilaquiles with hibiscus‑infused salsa, and avocado‑herb guacamole, while they experiment
    with rosemary‑scented sauces and share elaborate meals at neighborhood potlucks, turning the kitchen into a laboratory for her natural hair‑care product ideas.
  core: Diana Tamayo blends meticulous salon discipline with a love for herb‑infused cooking, using yoga to balance high‑stress days, yet they often forget to water their potted rosemary until the last
    minute, a quirk that mirrors their tendency to prioritize clients over personal upkeep.
background:
  cultural: Diana is a first‑generation Mexican‑American who grew up in a bilingual household that celebrated Mexican traditions such as Día de los Muertos, family gatherings, and folk music. Her cultural
    roots influence her hairstyling with a flair for braids, intricate up‑dos, and the use of natural oils common in Mexican beauty rituals. Fluent in both Spanish and English, she bridges cultural gaps
    in her clientele and actively supports local Mexican community events in New York, honoring her heritage while adapting to the urban lifestyle.
attributes:
  skills: '[''Precision Hair Cutting'', ''Advanced Hair Coloring (Balayage, Ombre)'', ''Event Styling'', ''Client Consultation'', ''Salon Management'', ''Inventory Control'', ''Sanitation & Health Regulations
    Compliance'', ''Appointment Scheduling Software (Vagaro)'', ''Product Knowledge & Retail Sales'', ''Mentoring Junior Stylists'', ''Multicultural Hair Care (Latin American textures)'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Gardening herbs for natural hair products'', ''Yoga and meditation'', ''Walking in Central Park'', ''Reading historical fiction'', ''Salsa dancing'', ''Volunteering
    at community beauty workshops'']'
  career_goals: Diana aims to open her own upscale salon in Manhattan that offers a structured, high‑standard environment focused on multicultural hair care, especially for Latinx clients. She plans to
    earn a Master Stylist certification, develop a line of natural hair‑care products inspired by Mexican botanical traditions, and become a certified trainer at a local cosmetology school. Additionally,
    she envisions hosting quarterly community workshops that combine professional grooming with cultural heritage, solidifying her reputation as both a business leader and a mentor.
