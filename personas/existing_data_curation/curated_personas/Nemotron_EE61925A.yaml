personas:
  professional: Roberto Cruz is a seasoned community handyman and informal interpreter, leveraging decades of self‑taught plumbing, electrical, and carpentry expertise while his talkative, flexible nature
    turns each repair job into a friendly neighborhood gathering and his bilingual fluency bridges language gaps for elders.
  sports: Roberto Cruz follows the soccer matches of Club América and Club Guadalajara with a battered TV in the living room, cheers on the Carolina Panthers (NFL) and Charlotte Hornets (NBA), holds a modest
    membership at the local fishing club, and never misses the high‑school football games at Siler City High, where they chant loudly with fellow fans.
  arts: Roberto Cruz enjoys the timeless crooning of Luis Miguel, the heartfelt rancheras of Vicente Fernández, and the lively brass of Mariachi Vargas de Tecalitlán, while occasionally watching films starring
    Gael García Bernal and participating in the church choir that blends traditional hymns with folk melodies.
  travel: Roberto Cruz prefers low‑key road trips, regularly drives the Blue Ridge Parkway and visits the historic streets of Charleston, has explored the art galleries of Santa Fe, dreams of seeing the
    cherry blossoms in Kyoto, and coordinates family outings through video chat to balance adventure with budget constraints.
  culinary: Roberto Cruz loves preparing tacos al pastor, chiles rellenos, and mole verde, often sprinkling fresh cilantro, garlic, and heirloom tomatoes harvested from their garden, delights in homemade
    salsa fresca and fresh corn tortillas, and occasionally fuses Southern BBQ brisket into traditional dishes for a hybrid flavor.
  core: Roberto Cruz is a talkative, worry‑prone gardener‑cook who blends cherished family rituals with Southern hospitality, juggles spontaneous gatherings, modest savings habits, and a habit of misplacing
    their eyeglasses.
background:
  cultural: Roberto was born in the state of Jalisco, Mexico, into a family that prized communal meals, Catholic traditions, and seasonal celebrations such as Día de los Muertos and Las Posadas. He migrated
    to the United States in his early twenties, initially working in textile factories and later in construction across the Southeast. Settling in Siler City, North Carolina, he joined a modest but close-knit
    Mexican expatriate community, maintaining strong ties to his roots through language, cuisine, and religious observances. He regularly celebrates Mexican holidays with family and neighbors, incorporating
    local Southern ingredients into traditional recipes, creating a hybrid culinary style. Bilingual in Spanish and English, he often serves as an informal interpreter for elders in his community. While
    he has adopted aspects of Southern hospitality and participated in local church activities, he continues to pass on Mexican cultural values—family solidarity, respect for elders, and the importance
    of storytelling—to younger generations both in the U.S. and in his hometown in Mexico.
attributes:
  skills: '[''Basic home repair (plumbing, electrical, carpentry)'', ''Spanish fluency'', ''Conversational English'', ''Traditional Mexican cooking'', ''Vegetable gardening'', ''Storytelling and oral history'',
