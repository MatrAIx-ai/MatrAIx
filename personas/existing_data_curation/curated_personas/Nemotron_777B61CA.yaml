    ''Terminology management (TermBase, SDL MultiTerm)'', ''Technical writing'', ''Data analysis'', ''Project coordination'', ''Quality assurance'']'
  hobbies: '[''Hiking in the Texas Hill Country'', ''Birdwatching'', ''DIY electronics and Arduino projects'', ''Acoustic guitar'', ''Cooking international and Tex-Mex cuisine'', ''Volunteer language tutoring'',
    ''Reading science‑fiction'', ''Attending live music shows'']'
  career_goals: David aims to become a senior technical translation manager, leading multidisciplinary teams that bridge language gaps in scientific research and healthcare communication. He plans to obtain
    the ATA certification and deepen his expertise in AI‑assisted translation workflows, integrating machine‑learning models to improve efficiency while maintaining linguistic accuracy. Over the next five
    years, he envisions launching his own consultancy focused on multilingual dissemination of cutting‑edge STEM content, mentoring junior translators, and partnering with nonprofit organizations to provide
    free translation services for underserved communities.
