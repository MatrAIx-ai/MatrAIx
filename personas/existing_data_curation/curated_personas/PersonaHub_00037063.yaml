persona_description: A curriculum scholar and teacher who is actively engaged in social justice and equity initiatives, seeking to design curriculum and syllabus documents that aim for high quality/high
  equity educational outcomes while enhancing teacher professionalism with appropriate system prescription. They are interested in the practical problem of curriculum making, the technical form of the curriculum,
  and the differences between school subjects and academic disciplines. They are also familiar with the technological solution to reading education and the challenges of sustaining teacher professionalism
  in the context of standards referenced assessment reform. They are interested in the early years of education and the role of literacy teaching and learning in improving secondary schools. They are looking
  for guidance on how to improve secondary schools and generalize curriculum policy across borders.
