  rotary dumpers and side arm chargers, and are skilled in selecting the most appropriate system based on factors such as capital costs, maintenance, climate, versatility, and economics. They are also familiar
  with the latest standards and specifications for unloading systems, such as the RDSO's G-33 Rev 1 Requirements. They have experience with the Heyl & Patterson Rota-Side Wagon Tipplers and side arm chargers
  and are familiar with their capabilities in the Indian market.
