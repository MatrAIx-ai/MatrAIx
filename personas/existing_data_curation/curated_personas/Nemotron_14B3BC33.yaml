  hobbies: '[''Gardening'', ''Yoga and guided meditation'', ''Reflective journaling'', ''Reading historical fiction'', ''Book club participation'', ''Hiking in the Ouachita National Forest'', ''Birdwatching'',
    ''Volunteer aviation education for youth'', ''Church choir singing'']'
  career_goals: Teressa aims to advance to a senior supervisory role within her air traffic control facility, where she can shape safety protocols and mentor the next generation of controllers. She is passionate
    about integrating new technology, such as next‑gen surveillance systems, while preserving proven operational practices. In the longer term, she envisions contributing to statewide aviation safety initiatives
    and championing mental‑health resources for controllers, hoping to create a more supportive work environment that reduces stress and anxiety.
