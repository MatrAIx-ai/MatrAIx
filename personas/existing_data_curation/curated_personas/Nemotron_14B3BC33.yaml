personas:
  professional: Teressa Bouthiller, a veteran air traffic controller with over two decades of experience, blends razor‑sharp situational awareness and rapid decision‑making with a curiosity for next‑gen
    surveillance technology while their anxiety‑driven need for precision fuels meticulous runway allocation, conflict resolution, and compassionate mentorship of junior controllers.
  sports: Teressa Bouthiller embraces moderate fitness by hiking the Ouachita National Forest with the Ouachita Trailblazers club each fall, attending Arkansas Razorbacks basketball games for community
    camaraderie, playing recreational tennis at the local community center, and tuning in to the Memphis Grizzlies during the NBA season while they balance these activities with a flexible schedule that
    respects their need for quiet reflection.
  arts: Teressa Bouthiller finds artistic solace in their church choir where they harmonize to the works of Eric Whitacre and Handel while devouring historical fiction novels by authors such as Willa Cather
    and Louise Erdrich that transport them to the American Midwest and they relax with the folk sounds of John Denver and the soulful gospel of Mahalia Jackson allowing music and literature to shape their
    reflective, community‑focused identity.
  travel: Teressa Bouthiller prefers low‑key, self‑planned road trips that balance adventurous hikes with historic sightseeing, having trekked the Great Smoky Mountains and explored the Victorian streets
    of Galena Illinois while they dream of wandering the Roman ruins of Bath England and the lantern‑lit valleys of Cappadocia Turkey all while budgeting trips around their modest family obligations and
    occasional work‑related travel constraints.
  culinary: Teressa Bouthiller enjoys farm‑to‑table cooking with a moderate skill set, often transforming their backyard harvest of heirloom tomatoes, butter lettuce, and sweet bell peppers into a fresh
    Caprese salad drizzled with basil pesto while they round out meals with rustic chicken pot pie, maple‑glazed pork chops, and occasional indulgence in artisanal dark chocolate favoring ingredients such
    as rosemary, smoked paprika, and locally sourced honey.
  core: Teressa Bouthiller navigates high‑pressure air traffic control with methodical precision, counteracts their anxiety through gardening and guided meditation, but sometimes succumbs to late‑night
    sweet snacks when stress peaks.
background:
  cultural: Teressa grew up in a close‑knit white community in rural Oklahoma, where Midwestern values of hard work, humility, and neighborly support are deeply ingrained. Her family has roots in farming
    and small‑town trades, and she was raised with a strong sense of community responsibility and religious faith. Living most of her life in Sequoyah County, she embraces local traditions such as county
    fairs, church gatherings, and outdoor recreation, while also valuing the practical, no‑nonsense outlook common in the region.
