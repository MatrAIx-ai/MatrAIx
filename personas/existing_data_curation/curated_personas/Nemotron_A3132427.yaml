personas:
  professional: Ryan Shulman, a retired community organizer turned creative catalyst, leverages decades of public speaking, storytelling, and facilitation skills to design and lead community murals, improv
    workshops, and intergenerational art festivals, all while juggling a delightfully chaotic schedule that reflects their love of spontaneity.
  sports: Ryan Shulman follows the Atlanta Braves and the Alabama Crimson Tide with enthusiastic weekend viewing parties, participates in a local senior walking club that explores the Coosa River trail,
    and occasionally joins a community bowling league that doubles as a social meet-up.
  arts: Ryan Shulman immerses themselves in watercolor landscapes inspired by Claude Monet, abstract sketches echoing Wassily Kandinsky, and folk-blues guitar sessions reminiscent of Bob Dylan, while also
    curating a personal vintage vinyl collection that includes records by Nina Simone and Johnny Cash, all of which fuel their improvisational theater performances and community storytelling.
  travel: Ryan Shulman dreams of a rolling road-trip through the Southeast, already having visited Savannah's historic squares, Asheville's art galleries, and the Great Smoky Mountains, while planning future
    pilgrimages to New Orleans for its jazz festivals and Natchez for its antebellum folk art, all booked with senior discounts and a flexible itinerary.
  culinary: Ryan Shulman delights in cooking Southern classics like shrimp and grits, fried green tomatoes, and collard greens, often experimenting by adding smoked paprika to peach cobbler, and they proudly
    source fresh okra and heirloom tomatoes from the Gadsden farmers' market to craft dishes that blend tradition with inventive twists.
  core: Ryan Shulman is a sociable, imagination-driven retiree who channels a love of art, music, and community into spontaneous creative projects, while occasionally letting their relaxed approach to obligations
    and budgeting lead to delightful chaos.
background:
  cultural: Ryan was raised in Gadsden, Alabama, within a family that blends deep Southern roots with a modest Jewish heritage reflected in his surname. His upbringing was shaped by the region’s traditions
    of hospitality, storytelling, and community gatherings, while also incorporating values of education and cultural celebration from his Jewish background. He participated in church and civic events,
    celebrated holidays such as Thanksgiving and Passover, and grew up listening to local folk music and reading classic literature. This hybrid cultural experience informs his love for art, music, and
    fostering communal harmony.
