personas:
  professional: Alize Hilson is a retail associate with razor‑sharp cash‑handling and POS proficiency, and they channel their love for structure and meticulous budgeting into flawless inventory reconciliation
    and calm leadership during peak shift hours.
  sports: Alize Hilson enjoys low‑impact fitness, practicing yoga three times weekly and walking the East Hampton shoreline, while cheering for the New York Knicks in winter and the New York Yankees in
    summer, and they also play casual beach volleyball with the East Hampton Sand Club on weekends.
  arts: Alize Hilson finds solace in listening to R&B and soul legends like Erykah Badu, H.E.R., and Marvin Gaye while knitting, and they immerse themselves in contemporary fiction by authors such as Chimamanda
    Adichie and Ocean Vuong, occasionally attending intimate poetry slams at local cafés.
  travel: Alize Hilson prefers thoughtfully planned short getaways, often spending weekend nights at nearby Montauk for surf and sunset photography, while dreaming of a cultural pilgrimage to New Orleans
    to savor jazz and Creole cuisine, though they balance these trips against a tight student budget.
  culinary: Alize Hilson, a confident home cook, loves preparing comforting dishes like creamy mac and cheese with sharp cheddar, spiced chickpea curry featuring turmeric and coconut milk, and baked sweet
    potato pie with nutmeg, and they often share these plates with a small circle of friends over candlelit evenings.
  core: Alize Hilson blends disciplined budgeting with a habit of late‑night journaling, balancing anxiety‑laden worries with tranquil yoga sessions, and they secretly binge‑watch 90s sitcom reruns.
background:
  cultural: Alize is an African‑American woman raised in the diverse environment of Suffolk County, New York. Her cultural upbringing blends the storytelling and musical traditions of the Black diaspora
    with the cosmopolitan influences of the New York suburbs. She values community solidarity, respects the legacy of her ancestors, and actively supports local Black‑owned businesses. While navigating
    a predominantly white coastal community, Alize draws strength from her heritage, emphasizing education, personal growth, and the importance of maintaining cultural ties through music, cuisine, and community
    involvement.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Inventory management'', ''Time management'', ''Basic bookkeeping'', ''Organizational skills'', ''Conflict resolution'', ''Reliability'',
