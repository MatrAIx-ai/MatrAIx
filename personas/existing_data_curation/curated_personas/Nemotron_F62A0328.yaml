  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Beach walking'', ''Yoga and meditation'', ''Cooking comfort meals'', ''Knitting'', ''Visiting local art galleries'', ''Listening to R&B and
    soul music'', ''Photography'']'
  career_goals: Alize aims to complete her associate’s degree in Business Administration while obtaining certifications in retail management. Her short‑term goal is to become a shift supervisor, leveraging
    her structured approach to lead a small team with confidence. Long‑term, she aspires to advance to store manager and eventually open her own boutique or community‑focused retail space in East Hampton,
    where she can apply her budgeting expertise and provide mentorship to other young professionals. She also hopes to develop a side competency in personal finance advising, helping others manage stress‑related
    financial challenges.
