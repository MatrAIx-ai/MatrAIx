  hobbies: '[''Fishing'', ''Foothill hiking'', ''Woodworking'', ''Scale model house building'', ''Reading historical nonfiction'', ''Target shooting'', ''Classic car restoration'', ''Weekly card games'',
    ''Vegetable gardening'']'
  career_goals: Approaching retirement, Shawn aims to solidify a legacy of zero-incident safety records and operational efficiency on the projects he oversees. He plans to formalize his knowledge into a
    concise safety-best-practice manual for his crew, obtain a Certified Construction Manager (CCM) credential, and earn recognition from the local union for his contributions. In the next five years, he
    hopes to transition to a part-time consulting role where he can coach emerging supervisors while maintaining a modest income that supports a comfortable retirement.
