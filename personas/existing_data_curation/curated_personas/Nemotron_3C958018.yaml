personas:
  professional: Shawn Moore, a veteran construction supervisor with over thirty years directing trades and extraction crews on Colorado’s Front Range, leverages his precise budgeting, OSHA‑savvy safety
    focus, and relentless routine‑driven planning to chase a zero‑incident record and to codify his expertise in a concise safety‑best‑practice manual before transitioning to part‑time consulting.
  sports: Shawn Moore spends early mornings fishing the South Platte River, joins a local shooting club for target practice, hikes the foothills in summer, and is a steadfast fan of the Denver Broncos,
    the Colorado Rockies, and the Denver Nuggets, often watching games at the local sports bar while chatting with fellow retirees about their latest catches.
  arts: Shawn Moore channels his creative side through woodworking reclaimed logs into functional furniture, assembles scale model houses, devours historical nonfiction by authors like Charles W. Hillyer
    on frontier engineering, and relaxes to the twang of Johnny Cash and Willie Nelson while occasionally watching classic westerns such as “The Searchers.”
  travel: Shawn Moore prefers meticulously planned road trips in his restored 1965 Ford pickup, having explored Yellowstone National Park, the historic mining town of Leadville, and the storied Old West
    sites of Deadwood, while dreaming of a future pilgrimage to the Great Wall of China once his retirement savings allow.
  culinary: Shawn Moore enjoys hearty, straightforward meals—grilled trout seasoned with rosemary and lemon from his own catches, slow‑cooked beef stew with potatoes and carrots, and homemade cornbread
    topped with honey—often preparing them in his modest kitchen while drawing fresh herbs from his vegetable garden.
  core: Shawn Moore is a disciplined, routine‑obsessed craftsman who balances a lifetime of construction precision with solitary hobbies, a cautious wallet, and a lingering worry that fuels both his meticulous
    work ethic and his occasional overcommitment to vintage projects.
background:
  cultural: Shawn grew up in a working-class, white family on the outskirts of Boulder County during the 1960s and 1970s, absorbing the rugged, self-reliant ethos of Colorado’s mountain communities. His
    upbringing emphasized hard work, personal responsibility, and modest living, values reinforced by regular attendance at a local Methodist church and active participation in the regional construction
    union. While he appreciates the outdoor lifestyle of the Rockies—fishing, hiking, and respect for the land—he also adheres to traditional, pragmatic perspectives on career and community, reflecting
    a blend of frontier independence and contemporary suburban sensibility typical of many long-time residents of Lafayette, CO.
attributes:
