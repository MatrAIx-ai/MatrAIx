personas:
  professional: Hong Wang, a seasoned hotel manager with over 25 years of experience in mid‑scale lodging, wields precise SOP engineering, rigorous budgeting, and a skeptical yet data‑driven approach to
    technology to continuously push occupancy and profit metrics while shielding the property from operational risk.
  sports: Hong Wang tees off every Saturday at the local Golf Club, is a member of the Basking Ridge senior league, follows the New York Giants and New Jersey Devils religiously, and occasionally joins
    friends for a quick round of ping‑pong after mahjong sessions.
  arts: Hong Wang finds solace in the melodic strains of Teresa Teng, the timeless symphonies of Beethoven, and the cinematic storytelling of Ang Lee, while his weekly mahjong gatherings double as informal
    critiques of classic novels ranging from Tolstoy to Hemingway.
  travel: Hong Wang favors meticulously planned weekend getaways to low‑key destinations like the Catskill mountains and the historic streets of Boston, while his long‑term bucket list includes a peaceful
    cultural immersion in Kyoto, a wine tasting tour of Napa Valley, and a serene retreat to the coastal villages of Tuscany.
  culinary: Hong Wang delights in perfecting Cantonese staples such as char siu, steamed dim sum, and wok‑stirred bok choy, often seasoning with ginger, soy sauce, and a dash of Sichuan pepper, and occasionally
    experiments with Italian pasta al pomodoro to broaden his family’s palate.
  core: Hong Wang is a routine‑obsessed hotel veteran who balances a competitive edge with a penchant for quiet gardening, vintage watches, and a stubborn streak that fuels both meticulous SOPs and occasional
    worry‑filled overthinking.
background:
  cultural: Hong was born in New Brunswick, New Jersey, to parents who emigrated from Taiwan in the late 1960s. Growing up in a bilingual household, he spoke Mandarin at home and learned English through
    the public school system, giving him a bicultural perspective. His family upheld Confucian values of respect for elders, hard work, and modesty, shaping his practical and routine‑oriented outlook. After
    earning a bachelor's degree in business from Rutgers University, he completed an MBA at the New Jersey Institute of Technology, blending American managerial training with his cultural heritage. Hong
    remains closely connected to the Chinese community in Morris County, regularly attending Lunar New Year festivities, participating in the local Chinese language school, and celebrating traditional holidays
    such as the Mid‑Autumn Festival with extended family.
attributes:
  skills: '[''Operations management'', ''Standard operating procedures development'', ''Staff recruitment, scheduling, and training'', ''Budgeting and financial analysis'', ''Revenue management'', ''Vendor
