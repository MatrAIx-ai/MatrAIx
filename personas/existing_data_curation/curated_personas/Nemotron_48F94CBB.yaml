    analysis'', ''Quality control and regulatory compliance'']'
  hobbies: '[''Golf'', ''Gardening'', ''Cooking traditional Cantonese cuisine'', ''Mahjong'', ''Reading business biographies and classic novels'', ''Volunteering with the New Jersey Chinese Cultural Association'',
    ''Collecting vintage mechanical wristwatches'', ''Walking his dog'', ''Home improvement projects'']'
  career_goals: Over the next five years, Hong aims to transform the Basking Ridge hotel he manages into the top‑ranked property in the Morris County market, targeting occupancy above 90 % and a net operating
    profit increase of at least 15 % annually. He is actively pursuing the Certified Hotel Administrator (CHA) credential to formalize his expertise and position himself for a regional manager role within
    a national hospitality chain. Leveraging his strength in developing and enforcing SOPs, Hong plans to author a comprehensive operations manual that could be rolled out across multiple sites, creating
    a repeatable, routine‑driven model that satisfies his competitive drive. Recognizing his heightened sensitivity to stress, he intends to embed a rigorous risk‑assessment and contingency‑planning framework
    into daily operations. In the longer term, Hong envisions purchasing a small boutique inn that emphasizes classic, low‑tech hospitality, providing a stable, predictable cash‑flow business he can eventually
    pass on to his children while maintaining the routine orientation he values.
