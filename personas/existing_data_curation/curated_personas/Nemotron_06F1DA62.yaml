  career_goals: Crystal aims to advance to a senior leadership role overseeing operational excellence and strategic initiatives within a technology-driven organization. Over the next five years, she plans
    to obtain her Project Management Professional (PMP) certification and a Six Sigma Black Belt, as well as complete a part‑time Master’s in Business Analytics to deepen her technical expertise. She aspires
    to lead large‑scale transformation projects that enhance efficiency, data‑driven decision‑making, and cross‑departmental collaboration. In addition, Crystal seeks to mentor junior analysts, establishing
    a supportive learning culture, and to contribute thought leadership through conference presentations and industry publications. Balancing ambition with personal wellbeing, she prioritizes roles that
    offer flexible work arrangements and encourage a healthy work‑life integration.
