  hobbies: '[''soccer'', ''dance (cumbia and pop)'', ''drawing and coloring'', ''LEGO building'', ''listening to Spanish children’s songs'', ''cooking with family'', ''crafts for Día de los Muertos and
    Cinco de Mayo'']'
  career_goals: Gema dreams of becoming a teacher who can tell stories in both English and Spanish, a soccer player on a community team, a dancer who performs at cultural festivals, or a compassionate veterinarian
    who helps animals. She also imagines herself as a community helper like a firefighter, reflecting her desire to be useful to friends and family while staying connected to practical, caring roles.
