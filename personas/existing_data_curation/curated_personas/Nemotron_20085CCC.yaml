personas:
  professional: Gema Acosta, a budding soccer enthusiast who dreams of becoming a community youth coach, blends a love for routine drills with spontaneous game improvisations, and they often lead peers
    while occasionally forgetting to clean up the training cone set.
  sports: Gema Acosta sprints across the community park's youth soccer field as a member of the Cross‑Town Cubs, bursts into spontaneous games of tag during summer, and they dream of seeing the LA Galaxy
    live, while occasionally swapping the ball for a jump‑rope session when rain halts play.
  arts: Gema Acosta twirls in dance classes that fuse traditional cumbia rhythms with pop choreography, sketches cartoon heroes like SpongeBob and Peppa Pig, constructs elaborate LEGO cityscapes, and they
    hum along to children's Spanish tunes by Lila and the Mágicos, nurturing a vivid creative world.
  travel: Gema Acosta loves weekend trips to their grandparents' countryside cottage, where they explore corn mazes and collect pinecones, and they pin a future dream of visiting Disneyland Paris on a bedroom
    wall, balancing excitement for adventure with the comfort of familiar bedtime routines.
  culinary: Gema Acosta eagerly helps mash avocados for guacamole and spread salsa on crunchy nachos, yet they often spill beans on the kitchen floor, preferring bright mango slices and cheese quesadillas
    as favorite snack stars.
  core: Gema Acosta is an energetic six‑year‑old who thrives on routine yet bursts into spontaneous play, loves soccer, dancing, drawing, LEGO, and school‑yard celebrations, and they navigate life with
    a charismatic blend of cooperation and stubborn independence.
background:
  cultural: Gema grows up in a Mexican‑American household in Houston where Spanish is spoken alongside English. She participates in Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings centered around foods like tacos, tamales, and guacamole. Her community ties include attending a local Catholic church, celebrating neighborhood festivals at the Houston Convention Center,
    and enjoying the blend of Mexican and Texan cultures that shape her music, food, and celebrations.
