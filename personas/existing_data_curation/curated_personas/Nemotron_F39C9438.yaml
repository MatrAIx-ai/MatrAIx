  hobbies: '[''Hiking'', ''Gardening'', ''Yoga'', ''Community Theater'', ''Food Bank Volunteering'', ''Trivia Night'', ''Bridge Club'', ''Reading Non-Fiction'', ''Cooking'']'
  career_goals: Approaching retirement, Lois aims to transition into a senior strategic HR role where she can shape workforce planning and employee wellness initiatives for her organization. She seeks to
    mentor younger HR professionals, sharing her practical expertise while championing data-driven decision-making. Lois is also interested in establishing a part-time consulting practice focused on compliance
    and performance management for small nonprofits in Fort Collins, allowing her to stay active in the community while maintaining a balanced, low-stress work life.
