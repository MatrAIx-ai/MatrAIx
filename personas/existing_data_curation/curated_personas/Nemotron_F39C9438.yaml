personas:
  professional: Lois Staley, a seasoned HR strategist with over thirty years of talent acquisition, benefits administration, and HRIS expertise, they channel their meticulous organization, critical skepticism,
    and passion for data‑driven decision‑making into shaping workforce planning and employee wellness programs while mentoring emerging HR professionals and building a part‑time compliance consultancy for
    local nonprofits.
  sports: Lois Staley, an avid outdoor enthusiast, they fuel their love of nature through weekly hikes in the foothills with the Colorado Mountain Club, attend bi‑weekly yoga sessions at a Fort Collins
    studio, cheer on the Denver Broncos and Colorado Rockies, and compete in the local bridge club’s annual trivia‑bowl sweepstakes, all while maintaining a modest jogging routine that balances their competitive
    streak with low‑impact joint care.
  arts: Lois Staley, a community‑theater participant, they channel their outgoing spirit into productions with the Fort Collins Community Theatre, enjoy the lyrical storytelling of Joni Mitchell and the
    theatrical dynamism of Lin‑Manuel Miranda, and spend evenings analyzing stage‑design critiques while occasionally critiquing set lighting with their characteristic skeptical eye.
  travel: Lois Staley, a purposeful traveler, they plan weekend road trips to Rocky Mountain National Park, a yearly pilgrimage to Sedona’s red rocks for a yoga retreat, and a long‑awaited summer cruise
    to the Norwegian fjords, all while budgeting carefully to fund their community volunteer commitments back home.
  culinary: Lois Staley, an avid home chef, they delight in crafting quinoa‑beet salads with goat cheese, perfecting pan‑seared Colorado trout, and baking sourdough loaves infused with rosemary, often experimenting
    with exotic spices like za’atar but sometimes over‑salting dishes when stress spikes.
  core: Lois Staley is a pragmatic yet curious 62‑year‑old who balances meticulous organization, competitive community involvement, and a skeptical eye with a deep commitment to wellness and mentorship.
background:
  cultural: Lois is a white American who grew up in a small Midwestern town before moving to Fort Collins, Colorado, drawn by the city's blend of outdoor lifestyle and progressive community values. She
    embodies the regional ethos of self-reliance and hard work while embracing Colorado's emphasis on environmental stewardship and civic involvement. Her upbringing emphasized practicality, respect for
    tradition, and a strong sense of community, which continues to shape her personal and professional life.
