  hobbies: '[''Car restoration projects'', ''DIY woodworking'', ''Competitive video gaming (strategy and shooters)'', ''Pickup basketball'', ''Reading technical manuals and self-help books'', ''Fishing
    at local lakes'']'
  career_goals: William aims to obtain a GED within the next year and then enroll in a community‑college apprenticeship program to become a certified automotive technician. He envisions working in a reputable
    auto repair shop where he can apply his methodical approach, eventually advancing to a lead technician or shop manager role. In the longer term, he aspires to open his own small garage that offers reliable,
    transparent service to the local community, reflecting his desire for predictable work environments and personal accountability.
