persona_description: A researcher at NYU Grossman School of Medicine who specializes in the study of circRNA, particularly its role in regulating cell functions and preventing cancer spread. His research
  interests include the identification of circRNAs that can serve as silencers of metastasis and the understanding of the mechanisms by which these circRNAs interact with proteins. He is particularly interested
  in the role of epigenetic factors in the regulation of circRNAs and their potential impact on cancer progression.
