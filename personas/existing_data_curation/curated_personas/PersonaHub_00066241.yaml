persona_description: A researcher and inventor who specializes in the development of new technologies for the manufacturing of silver nanowires, particularly in India. He has developed a technology for
  producing these nanowires at a much lower cost than the international market, which will allow Indian industry to enter the nano wire market with a cheaper price. He is a leader in the field and has been
  working on this project for a long time, with a team of experts from the Chemical Engineering and Process Development Division at the CSIR- National Chemical Laboratory in Pune.
