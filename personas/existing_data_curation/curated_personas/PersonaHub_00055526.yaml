persona_description: A researcher and education expert who has conducted extensive research on the impact of coastal location on educational outcomes, particularly in disadvantaged coastal regions in England.
  They are particularly interested in the challenges faced by schools in these areas, including educational isolation, staff recruitment, engaging students and their families with education, and the need
  for local primary schools to bring the majority of students to the expected standard at the end of Key Stage 2. Their research has highlighted the importance of school leadership in making a school successful,
  particularly in changing school culture to move from a culture of low aspiration into one of engaging students with their learning, fostering high expectations for both teachers and students, and achieving
  higher levels of attainment.
