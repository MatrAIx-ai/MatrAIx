  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Cooking Mexican cuisine'', ''Salsa dancing (beginner)'', ''Volunteering at community centers'', ''Hiking local trails'', ''Listening to Latin
    music'', ''Digital photography'']'
  career_goals: Elena aims to secure an entry-level administrative position within a community-focused organization or a small business where she can apply her bilingual abilities and organizational strengths.
    Over the next five years she plans to pursue a bachelor's degree in Business Administration or Public Administration, eventually moving into a supervisory or program-coordination role that balances
    structured responsibilities with opportunities to support local Hispanic families.
