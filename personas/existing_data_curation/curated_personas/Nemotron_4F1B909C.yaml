personas:
  professional: Elena Cuello is a 19‑year‑old bilingual administrative enthusiast who leverages their knack for meticulous data management, clear communication, and structured workflow to streamline day‑to‑day
    operations at community nonprofits, quietly championing the needs of local families while preferring small‑group meetings over large corporate gatherings.
  sports: Elena Cuello enjoys weekend hikes on the Eno River Trail, participates in a beginner salsa class at the downtown studio, and is a regular fan of the Durham Bulls baseball team, while they occasionally
    join a local running group for a 5K training program, preferring low‑impact exercise over competitive sports.
  arts: Elena Cuello immerses themselves in contemporary fiction, often revisiting Sally Rooney’s ‘Normal People’ and Ocean Vuong’s poetry, curates a modest Spotify playlist blending Carlos Vives, Celia Cruz,
    and John Coltrane, and occasionally attends local theater productions of ‘La Casa de Bernarda Alba’.
  travel: Elena Cuello prefers low‑key, culturally resonant trips, having explored Asheville’s art galleries and hiked the Blue Ridge Parkway, while dreaming of a culinary pilgrimage to Oaxaca, they balance
    careful budget planning with a love for quiet nature retreats and occasional family visits.
  culinary: Elena Cuello loves cooking traditional Mexican dishes such as pozole, chiles en nogada, and homemade corn tortillas, savoring ingredients like poblano peppers, epazote, and roasted tomatillos,
    while they experiment with fusion twists like quinoa‑stuffed tacos, yet they sometimes over‑salt the mole when multitasking.
  core: Elena Cuello is a structured, bilingual organizer who finds comfort in quiet routines, heartfelt cooking, and gentle community service, all while battling occasional procrastination and a habit
    of over‑seasoning.
background:
  cultural: Elena was born to Mexican immigrant parents and grew up in a bilingual household in Durham, North Carolina. She embraces Mexican traditions such as Día de los Muertos, quinceañeras, and family
    gatherings centered around homemade food while also navigating the multicultural environment of the Research Triangle. Her cultural identity influences her values of family solidarity, respect, and
    community service, and it informs her desire to work in roles that support Hispanic communities and foster cultural exchange.
attributes:
  skills: '[''Bilingual communication (Spanish-English)'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Data entry and database management'', ''Customer service'', ''Scheduling and calendar management'',
