persona_description: A professional in the field of restoration ecology who is interested in the use of native plant material in restoration projects, particularly in managing the production and management
  of seed and seedling stock in nurseries. This person may be a manager or an educator who is responsible for overseeing the production and management of native seed and stock in nurseries, or a researcher
  who is interested in the propagation and management of native plant species. This person may have experience in working with Forest Service nurseries and may be familiar with the challenges and opportunities
  presented by producing and managing native seed and stock in nurseries.
