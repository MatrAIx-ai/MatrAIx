  hobbies: '[''Fishing'', ''Hunting'', ''Camping'', ''Woodworking'', ''Home improvement projects'', ''Watching sports (Green Bay Packers, Milwaukee Bucks)'', ''Attending local high school baseball games'',
    ''Participating in community fairs'', ''Volunteering at the local food bank'', ''Grilling and cooking'', ''Listening to classic rock music'']'
  career_goals: Ted aims to advance from his current specialist role to an operations manager position within the next three to five years, eventually targeting a regional director role overseeing multiple
    sites. He plans to earn a professional certification such as Certified Operations Manager (COM) and complete an associate degree in business administration to strengthen his leadership credentials.
    Long‑term, Ted envisions launching a consulting boutique that helps small Midwestern businesses implement lean processes and improve operational resilience, while also seeking to improve his personal
    organizational habits to better balance work responsibilities with family life.
