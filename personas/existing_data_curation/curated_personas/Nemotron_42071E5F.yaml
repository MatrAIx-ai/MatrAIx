  career_goals: Jennifer aims to develop a strong portfolio of visual artwork and secure a place in a competitive art-focused high school program or a specialized college track in graphic design or museum
    studies. Over the next five years she plans to expand her digital art skills, exhibit her work at local community centers, and obtain scholarships that enable her to attend a university known for its
    art history and curatorial programs. In the longer term, she envisions a career as a museum curator or independent graphic designer, where she can combine her analytical approach with creative expression.
