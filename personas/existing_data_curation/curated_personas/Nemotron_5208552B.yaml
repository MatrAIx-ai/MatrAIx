  career_goals: At this stage, Jianguo aims to cement his reputation as a reliable senior welder in the New York area, aspiring to become a certified welding inspector (CWI) so he can oversee quality control
    on larger projects while maintaining his preferred routine. He also hopes to mentor a small team of younger welders, passing on his practical knowledge, and eventually launch a modest boutique workshop
    that offers custom metal repairs and artistic metalwork for local businesses and community members, allowing him to work on familiar tasks without high‑pressure deadlines.
