personas:
  professional: Jianguo Chiang is a veteran senior welder in New York who excels at MIG, TIG, and arc welding, reads blueprints with precision, and offers calm, on‑the‑spot fixes that keep projects moving
    despite their natural resistance to rigid scheduling.
  sports: Jianguo Chiang keeps fit through early‑morning Tai Chi, regular fishing outings with the Hudson River Anglers Club, and cheering on the New York Yankees, preferring low‑impact activities over
    high‑intensity sports while savoring the calm of the water.
  arts: Jianguo Chiang finds artistic refuge in classic Hong Kong cinema, savoring the performances of actors such as Chow Yun‑fat and Tony Leung, while their practice of traditional calligraphy, inspired
    by fluid brushwork, complements their evenings spent reading epic historical novels by authors like Ken Follett.
  travel: Jianguo Chiang prefers low‑key travel, having spent relaxed weekends exploring Halifax’s historic waterfront, sailing a short cruise on the Seine, and tasting tea houses in Kyoto, while they dream
    of a gentle trek through the ancient villages of the Dalmatian coast.
  culinary: Jianguo Chiang enjoys cooking at home, mastering the balance of flavors in dishes such as ginger‑steamed fish, braised pork belly with fermented bean curd, and quick stir‑fry bok choy seasoned
    with soy sauce and garlic, with their precise knife work echoing their welding craftsmanship.
  core: Jianguo Chiang blends a steadfast love for routine with a quiet creative spirit, channeling their welding precision into calligraphy, fishing, and modest culinary delights while gently sidestepping
    strict schedules.
background:
  cultural: Jianguo is of Chinese descent, originally from Taiwan, and grew up in a bilingual household that emphasized respect for elders, harmony, and practical responsibility. He continues to observe
    traditional holidays such as Chinese New Year and the Mid‑Autumn Festival, enjoys the flavors of Cantonese and Taiwanese cuisine, and maintains close ties with the local Chinese community in New York's
    Chinatown. His East Asian cultural roots shape his preference for routine, modesty, and a cooperative, harmony‑focused approach to both work and personal life.
