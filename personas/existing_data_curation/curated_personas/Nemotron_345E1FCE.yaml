personas:
  professional: Becky Tong is a veteran construction foreperson in Atlanta who leverages three decades of hands‑on building experience, bilingual communication, and meticulous safety habits to keep small
    crews organized and accidents at bay, and they are currently pursuing an OSHA 30‑hour certification to transition into a part‑time safety liaison role.
  sports: Becky Tong is a regular attendee of Atlanta Falcons football games and an avid follower of the Atlanta Hawks, but prefers low‑impact fitness through daily park walks, community gardening, and
    occasional senior‑focused yoga classes at the local community center.
  arts: Becky Tong enjoys attending performances by the Atlanta Symphony Orchestra, listening to classic Mandarin pop singers such as Teresa Teresa, practicing calligraphy at the cultural center, and collecting
    vintage cheongsam fabrics, which together shape their creative downtime and quiet sense of cultural pride.
  travel: Becky Tong loves weekend road trips to historic Savannah, hikes in the Blue Ridge Mountains, and annual pilgrimages to a family hometown in the East Coast for Lunar New Year celebrations, and
    they dream of a relaxed cruise along the Pacific coast once their health permits more travel.
  culinary: Becky Tong can skillfully prepare jiaozi dumplings stuffed with pork and cabbage, stir‑fry bok choy with ginger and garlic, and slow‑cook Southern‑style collard greens, and they relish blending
    these flavors for large family reunion meals, though they sometimes forget to soak the dumpling skins properly before folding.
  core: Becky Tong is a disciplined, puzzle‑loving foreperson whose love of structure extends from construction sites to gardening beds, and their habit of arranging tools by size masks a quiet yearning
    for creative expression.
background:
  cultural: Becky was born to immigrant parents from a Mandarin‑speaking region of East Asia and grew up in a household that emphasized hard work, family harmony, and respect for elders. Though she left
    school before completing ninth grade, her family instilled values of discipline and community service. Over the past four decades in Atlanta, she has blended Southern hospitality with her own cultural
    traditions—celebrating Lunar New Year, preparing family‑style meals, and maintaining close ties with a multigenerational diaspora network. Her bilingual ability and cultural awareness enable her to
    act as a bridge between her heritage community and the broader workforce.
attributes:
  skills: '["Hand and power tool operation", "Concrete mixing and finishing", "Basic carpentry (framing, trim)", "Material handling and inventory tracking", "Safety protocol enforcement", "Team coordination
    and crew communication", "Bilingual communication (English/Mandarin)", "Conflict mediation on site"]'
  hobbies: '["Traditional East Asian cooking", "Gardening", "Walking in local parks", "Crossword and jigsaw puzzles", "Attending cultural festivals (e.g., Lunar New Year)", "Volunteering at community center",
    "Mentoring youth in basic home‑repair", "Reading historical fiction"]'
  career_goals: Approaching retirement, Becky aims to transition into a part‑time foreperson or safety liaison role where she can leverage her reliability and meticulous approach to keep worksites organized
    and accident‑free. She plans to earn an OSHA 30‑hour certification within the next year, mentor younger apprentices, and eventually reduce her hours to focus on community volunteering while ensuring
    a stable income that supports her independent lifestyle.
