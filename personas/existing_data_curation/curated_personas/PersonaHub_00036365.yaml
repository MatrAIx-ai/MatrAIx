persona_description: A healthcare professional who is interested in diabetes management and has a background in clinical chemistry. This individual is familiar with the new WHO recommendation for diagnosing
  diabetes mellitus and is aware of the importance of accurate HbA1c testing. They are also aware of the potential drawbacks of using near patient testing and the need for accreditation of laboratories.
  This persona is likely to have a keen interest in improving glycaemic control and preventing the onset of diabetes in asymptomatic individuals. They may also have experience in managing diabetes in patients
  and may be interested in further research into the use of HbA1c testing in the diagnosis of diabetes.
