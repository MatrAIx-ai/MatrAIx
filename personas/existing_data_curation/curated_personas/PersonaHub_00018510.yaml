persona_description: A scientist who has made significant contributions to the field of spectroscopy, particularly in the study of photochemical reactions on the femtosecond time-scale. He is a physical
  chemist who has led the development of a new experimental technique called two-dimensional electronic-vibrational spectroscopy (2D-EV) that enables researchers to correlate the initial excitation of the
  electronic–vibrational manifold with the subsequent evolution of high-frequency vibrational modes. He has used this technique to study the excited-state relaxation dynamics of DCM dye dissolved in a deuterated
  solvent, which has opened up many potential avenues of fruitful study in systems where electronic–vibrational coupling is important to the functionality of a system.
