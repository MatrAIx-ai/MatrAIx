persona_description: A Deakin University researcher and sustainability expert who is passionate about waste reduction and the creation of a sustainable future. This individual is dedicated to collaborating
  with industry groups and government initiatives to establish Geelong as a center of excellence for cleantech and attract investment, create jobs, and build skills in sustainability-related industries.
  They have a background in environmental science and have experience in managing projects, such as the organics processing project at Waurn Ponds Estate, which has resulted in a significant reduction in
  waste going to landfill and related CO2 emissions. They are also interested in measuring and monitoring the impact of their work and sharing this information with others.
