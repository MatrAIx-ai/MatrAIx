persona_description: A historian who specializes in the study of the relationship between religion and secularization in the late 17th and 18th centuries. He is particularly interested in the role of the
  Church of England in promoting intellectual innovation and defending its own interests during this period. His research focuses on the history of the Church of England, its intellectual and apologetical
  shifts, and its contributions to the development of secular understandings of religious and other social phenomena. He is also interested in the broader implications of his research for the study of the
  relationship between religion and secularization in other parts of the world.
