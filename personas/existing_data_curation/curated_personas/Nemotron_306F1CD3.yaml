  skills: '[''Advanced reading comprehension'', ''Digital drawing'', ''Scratch programming'', ''Puzzle solving'', ''Organizational skills'', ''Leadership in group activities'', ''Basic music proficiency'']'
  hobbies: '[''Reading science‑fiction and adventure books'', ''Drawing and sketching'', ''LEGO building'', ''Scratch coding'', ''Nature walks and leaf collecting'', ''Piano practice'', ''Classroom organization
    volunteer'']'
  career_goals: Srinath dreams of becoming a scientist‑inventor who designs cool gadgets and explores how things work. He also imagines a future as an architect who creates beautiful, sustainable buildings.
    He hopes to publish his own illustrated comic book that blends his storytelling and drawing talents, and maybe develop educational video games that help other kids learn. Ultimately, he wants to turn
    his ideas into real projects and inspire others to be curious.
