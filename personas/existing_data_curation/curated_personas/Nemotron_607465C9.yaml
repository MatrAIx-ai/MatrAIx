personas:
  professional: Louis Rizk is an aspiring young engineer who channels his disciplined mind into building model rockets and coding Scratch games, they approach each project with meticulous planning and a
    love for tangible results.
  sports: Louis Rizk enjoys weekend hikes on the nearby Red Rock trails, they play on their middle school soccer team, cheer for the Las Vegas Golden Knights and the Las Vegas Raiders, and keep a disciplined
    fitness routine by logging daily steps on a smartwatch.
  arts: Louis Rizk practices piano twice a week, they love playing Beethoven’s Moonlight Sonata and listening to John Williams’ Star Wars scores while building LEGO models, and they draw inspiration from
    sci‑fi authors like Isaac Asimov for their creative projects.
  travel: Louis Rizk loves planning family road trips to the Grand Canyon and Zion National Park, they dream of visiting the Kennedy Space Center in Florida and the International Space Expo in Tokyo, and
    they use Google Maps to chart scenic routes and hiking trails.
  culinary: Louis Rizk enjoys assembling homemade pepperoni pizza with extra mozzarella, they mix trail mix with dried apricots, almonds, and chocolate chips for snacks, and they often help their mom stir
    a spicy chili con carne using cumin, kidney beans, and jalapeños.
  core: Louis Rizk, the hyper‑organized eleven‑year‑old rocket hobbyist, never leaves a LEGO brick out of place, meticulously tracks his allowance, balances piano practice with coding sessions, and keeps
    a secret stash of half‑finished science experiments for later tinkering.
background:
  cultural: Louis is a white American raised in a suburban neighborhood of Las Vegas, Nevada. His family follows mainstream American traditions, celebrating holidays such as Thanksgiving, Independence Day,
    and Christmas with familiar rituals. Growing up in a desert environment, he appreciates outdoor activities like hiking and observes the unique climate of the Southwest. The city's vibrant tourism industry
    provides occasional exposure to diverse cultures, but his household emphasizes a stable, disciplined lifestyle focused on education and personal responsibility. He attends a public middle school and
    participates in community programs that reflect the region's emphasis on family, safety, and civic engagement.
