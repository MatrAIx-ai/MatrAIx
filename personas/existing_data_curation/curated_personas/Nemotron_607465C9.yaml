  career_goals: Louis dreams of becoming an aerospace engineer or a software developer, inspired by the rockets he builds and the technology he programs. He aims to excel in school, earn a place in his
    middle school robotics club, and win local competitions. In the future, he hopes to attend a STEM‑focused high school, secure a scholarship for engineering studies, and eventually design sustainable
    aircraft or space vehicles. He also wants to mentor younger students, sharing his disciplined approach to learning and teamwork.
