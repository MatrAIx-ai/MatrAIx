personas:
  professional: Jeune Lee, an aspiring junior multimedia creator who blends sketching, collage, watercolor, and LEGO robotics to prototype interactive stories, channels their curiosity and sociable energy
    into collaborative school projects.
  sports: Jeune Lee plays on the Miami United Youth Soccer Club, cheers for the Miami Dolphins and Miami Heat, and enjoys weekend matches at the local park where their energetic teamwork mirrors the rhythm
    of their Afro‑Caribbean dance classes.
  arts: Jeune Lee immerses in creative expression through daily sketchbook collages inspired by Keith Haring and the vibrant colors of Frida Kahlo, while their music taste includes Bob Marley, Koffee, and
    Missy Elliott, and they frequent community art workshops featuring local muralists.
  travel: Jeune Lee dreams of summer trips to the Florida Keys to snorkel and to New Orleans for its jazz festivals, but currently enjoys weekend day trips to the Miami Zoo and annual visits to the Little
    Haiti Music Fest, balancing family‑budget constraints with a love for cultural adventure.
  culinary: Jeune Lee loves the sweet‑spicy kick of jerk chicken tacos, the tangy zest of mango salsa on grilled fish, and often experiments with homemade fruit smoothies using bananas, pineapples, and
    coconut milk, though they sometimes burn toast when trying to multitask after dance practice.
  core: Jeune Lee is a curious, sociable ten‑year‑old whose artistic flair, love for rhythm, and organized yet flexible outlook turn every day into a colorful blend of sketches, soccer drills, and community
    festivals, even if they occasionally misplace their glasses.
background:
  cultural: Jeune comes from a close‑knit African‑American family with Haitian roots that has lived in Miami’s Little Haiti district for generations. Her parents speak both English and Haitian Creole at
    home, preserving a blend of Caribbean language, cuisine, and storytelling traditions. Sundays are marked by lively church gatherings where gospel music intertwines with Creole hymns, fostering a strong
    sense of community and service. Family meals often feature dishes like griot, rice and peas, and macaroni and cheese, reflecting the fusion of Afro‑Caribbean and Southern American flavors. Growing up
    amid Miami’s multicultural tapestry, Jeune is exposed to the city’s vibrant art scene, from street murals to the annual Art Basel events, and she frequently participates in community workshops hosted
    by local cultural centers. This rich cultural milieu nurtures her appreciation for diverse artistic expressions and fuels her desire to celebrate her heritage through creative work.
