  career_goals: Jeune envisions a future where she blends her love for art, technology, and community. She aspires to become a digital animator or video‑game designer who crafts stories that celebrate the
    vibrant culture of Miami’s Afro‑Caribbean neighborhoods. She dreams of illustrating children’s books that feature characters reflecting her heritage, and of eventually leading youth art workshops to
    give other kids the confidence to express themselves creatively. Inspired by her curiosity, she also holds a parallel interest in environmental science, hoping to someday design interactive educational
    games that teach peers about marine conservation in the Biscayne Bay area. Her ambition is anchored in making a positive impact while staying true to her artistic instincts.
