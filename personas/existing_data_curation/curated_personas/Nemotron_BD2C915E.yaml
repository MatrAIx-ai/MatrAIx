  hobbies: '[''Book club participation'', ''Senior dance classes'', ''Community gardening'', ''Knitting and quilting'', ''Craft circles'', ''Genealogy research'', ''Museum tours'', ''Daily park walks'',
    ''Chair yoga'', ''Cooking and potluck gatherings'']'
  career_goals: Janet aims to deepen her impact in the community by leading senior wellness programs and advocating for mental‑health resources for older adults. She plans to mentor younger volunteers,
    document her life story for a local oral‑history project, and pursue a certificate in geriatric counseling. While she acknowledges her age, she remains eager to learn new technologies to stay connected
    with family and friends. Her overarching ambition is to leave a lasting legacy of compassion and organized community support.
