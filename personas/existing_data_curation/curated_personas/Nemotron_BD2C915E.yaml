personas:
  professional: A retired office administrator turned senior wellness coordinator, Janet Gulino leverages her meticulous schedule‑keeping, budget oversight, and calm mediation skills to organize weekly
    wellness workshops for seniors, while her pragmatic outlook keeps programs grounded in realistic outcomes, and her energetic sociability fuels lively group sessions.
  sports: An enthusiastic community supporter, Janet Gulino follows the Tulsa Drillers and the Oklahoma City Thunder religiously, joins the local Peach City Garden walking club for morning strolls in the
    park, takes senior dance classes thrice weekly, and complements her low‑impact chair yoga with occasional pickleball matches at the senior center, balancing her love for team spirit with gentle exercise.
  arts: A culturally curious craftswoman, Janet Gulino weaves quilts while listening to folk classics by John Denver and Loretta Lynn, enjoys the bright colors of regional folk artist Mary H. Kemeny’s paintings
    at the Gilcrease Museum, and while attending her book club they often discuss novels by Toni Morrison and Jimmy Carter, letting art and literature shape her evenings.
  travel: A methodical yet adventure‑curious traveler, Janet Gulino prefers meticulously planned road trips to nearby historic sites such as the Cherokee Heritage Center and the Tallgrass Prairie Preserve,
    relishes weekend getaways to Santa Fe for its art markets, dreams of a gentle cruise along the Mississippi River, and balances these journeys with budget considerations that keep them from overextending
    after retirement.
  culinary: A seasoned home‑cook, Janet Gulino lovingly prepares classic comfort dishes such as chicken fried steak with country gravy, cornbread infused with fresh garden rosemary, and homemade peach cobbler,
    confidently mixing butter, buttermilk, and a dash of cayenne, while they occasionally host potluck evenings where neighbors bring salads, and their penchant for strict recipes occasionally clashes with
    the experimental flair of younger guests.
  core: Janet Gulino blends steadfast organization, a love for community craft, and a touch of anxiety‑driven meticulousness, often carrying a pocket notebook to jot down ideas, but can’t resist sneaking
    an extra slice of pecan pie after every book club meeting.
background:
  cultural: Janet grew up in a midwestern‑influenced, working‑class family in Oklahoma, where community bonds and church participation were central. As a White American from Tulsa, she carries the region’s
    values of self‑reliance, hospitality, and a respect for tradition. Her cultural identity blends Midwestern pragmatism with the Southern Plains’ appreciation for nature and local history. She is active
    in her local Methodist congregation, which informs her volunteer spirit and the importance she places on communal gatherings.
attributes:
  skills: '[''Office administration'', ''Schedule management'', ''Event planning'', ''Budgeting and bookkeeping'', ''Interpersonal communication'', ''Conflict mediation'', ''Basic computer proficiency (MS
