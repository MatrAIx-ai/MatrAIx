personas:
  professional: Paulette Samuy, a 54‑year‑old full‑stack developer fluent in Python, JavaScript and React, leverages their artistic curiosity and pragmatic Midwestern work ethic to craft user‑centric digital
    galleries, while their relaxed approach to scheduling and occasional disorganization push them to rely on agile sprint rituals and mentorship to keep multidisciplinary teams on track.
  sports: Paulette Samuy stays active by hiking the Palos Trailhead with the Skokie Trailblazers club in the spring and joining a co‑ed adult soccer league—Midwestern Mavericks—each summer, while cheering
    on the Chicago Bears during football season and following the Chicago Cubs for baseball, reflecting a competitive spirit tempered by a love for outdoor solitude.
  arts: Paulette Samuy immerses themselves in the Chicago arts scene, frequenting the Art Institute to study abstract works by Mark Rothko, photographing street life à la Vivian Maier, attending Goodman
    Theatre productions of Sarah Ruhl, and curating indie film nights featuring the works of Jim Jarmusch, while their playlists regularly feature Philip Glass's minimalist compositions and the alt‑rock
    sounds of Wilco, and they find these influences fuel both their creative coding and personal reflection.
  travel: Paulette Samuy prefers flexible, weekend‑focused travel, often escaping to nearby Door County for kayaking or hiking the Indiana Dunes, while their longstanding curiosity leads them to plan a
    future summer trip to Berlin and Kraków to explore family‑rooted festivals, and they balance limited vacation days with a penchant for spontaneous art‑city tours.
  culinary: Paulette Samuy enjoys cooking at an intermediate level, often preparing homemade pierogi with potato‑and‑cheese filling and sauerkraut‑kissed bratwurst for weekend family gatherings, savoring
    Chicago‑style deep‑dish pizza with caramelized onions at local pizzerias, and they seek out artisanal coffee brewed with single‑origin beans and a dash of cinnamon in Skokie's eclectic cafés.
  core: Paulette Samuy blends artistic curiosity with a laid‑back, slightly disorganized work style, fiercely competitive in creative challenges yet skeptical of easy solutions, and they can often be found
    juggling code, paintbrushes, and a half‑finished board‑game while forgetting to water their houseplants.
background:
  cultural: Paulette was born and raised in Skokie, Illinois, a suburban community within Cook County that is part of the greater Chicago area. Her family heritage is primarily German and Polish; her grandparents
    immigrated to the United States after World War II and settled in the Midwest. Growing up in a middle‑class, suburban environment, she internalized classic Midwestern values such as community involvement,
    practicality, and a strong work ethic, while also being exposed to a rich European cultural legacy through family trips to museums, classical music concerts, and celebrations of German and Polish traditions.
    This blend of American suburban life and European artistic sensibility informs her identity as a culturally curious, art‑appreciating American with deep ties to the local Chicago arts scene.
