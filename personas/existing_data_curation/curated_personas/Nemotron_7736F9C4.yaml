  career_goals: Paulette aims to transition into a technical leadership role where she can shape products that fuse art and technology, such as interactive digital galleries or creative‑coding platforms.
    She envisions becoming a Lead UX Engineer or Technical Architect, guiding multidisciplinary teams to produce aesthetically driven software experiences. Long‑term, she hopes to launch a startup that
    offers community‑focused virtual exhibition tools, speak at conferences on creative computing, and earn recognized UX certifications. Mentoring junior developers and fostering a culture of artistic
    curiosity within tech teams are also core ambitions.
