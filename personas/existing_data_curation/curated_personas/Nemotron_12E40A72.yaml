  career_goals: John aims to combine his love for art, organization, and community impact by pursuing a career in visual communication—such as graphic design or art direction—focused on public-space projects
    in Baltimore. He also envisions studying urban design or museum studies in college, with the long-term goal of creating inclusive cultural programs that use art to foster community well-being and provide
    supportive outlets for youth dealing with anxiety. Alongside his creative ambitions, he hopes to develop expertise in art-therapy techniques so he can mentor peers and promote mental-health awareness
    through creative expression.
