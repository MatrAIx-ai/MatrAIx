personas:
  professional: John Tam, a 15‑year‑old aspiring visual artist, channels their curiosity and methodical planning into sketching detailed cityscapes and producing polished digital illustrations inspired
    by Baltimore’s vibrant street art, while volunteering on community mural projects to hone collaborative skills.
  sports: John Tam enjoys skateboarding along the Inner Harbor promenade and follows the Baltimore Orioles and Ravens avidly, occasionally joining the high‑school basketball practice for conditioning, while
    they participate in community runs at Patterson Park to stay fit.
  arts: John Tam spends weekends at the Baltimore Museum of Art admiring works by Jean‑Michel Basquiat and Keith Haring, draws inspiration from the surreal worlds of Neil Gaiman and Brandon Sanderson, strums
    acoustic covers of Bob Dylan and Fleet Foxes on their guitar, and they write short science‑fiction stories that echo Octavia Butler’s narrative depth, reflecting their open‑minded curiosity.
  travel: John Tam prefers short, budget‑friendly trips that blend art and history, having explored Washington D.C.’s monuments and New York’s galleries, while they dream of a spring pilgrimage to Kyoto’s
    temples to study Japanese ukiyo‑e prints, and they meticulously plan each itinerary on a spreadsheet.
  culinary: John Tam loves Baltimore crab cakes seasoned with Old Bay, enjoys cooking simple spaghetti aglio e olio with fresh garlic and red pepper flakes, snacks on cucumber slices while sketching, and
    they have a habit of forgetting to eat meals during long strategy‑gaming sessions, which sometimes leaves them feeling jittery.
  core: John Tam is a 15‑year‑old art‑obsessed planner who balances meticulous city‑scape sketches and acoustic guitar sessions with lingering anxiety, a penchant for over‑budgeting on gaming snacks, and
    they occasionally forget to eat meals.
background:
  cultural: John grew up in Baltimore’s diverse inner-city environment while coming from a white, Mid-Atlantic family with roots in the Northeastern United States. His household values education, community
    service, and an appreciation for Western art traditions, but the city’s rich African-American heritage, local festivals like Artscape, and the historic architecture of the Inner Harbor have deeply influenced
    his worldview. He celebrates regional customs such as enjoying Maryland crab cakes and attending the annual Baltimore Folk Festival, and he navigates a multicultural school setting that has broadened
    his understanding of different cultural perspectives while grounding him in the city’s unique cultural blend.
