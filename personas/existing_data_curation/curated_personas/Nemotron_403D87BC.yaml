personas:
  professional: Nakita Smith is a budding digital artist and junior game creator who spends afternoons sketching characters, experimenting with painting techniques, and coding simple interactive stories
    in Scratch, applying their organized, methodical approach learned from family discipline to turn imaginative sci‑fi ideas into playable projects.
  sports: Nakita Smith plays forward on the local Onslow Soccer Club youth team, champions the Carolina Panthers during football season, and chews on the excitement of watching the Charlotte Hornets on
    TV, balancing competitive drive on the field with a disciplined training schedule inspired by their family's military background, and they aim to improve each match with the same focus they bring to
    their art projects.
  arts: Nakita Smith thrives on creating vibrant murals inspired by community projects, admires the improvisational flair of Miles Davis, the storytelling beats of Kendrick Lamar, and the soulful choruses
    of gospel legends like Mahalia Jackson, and they often channel this eclectic musical taste into their own mixed‑media artworks.
  travel: Nakita Smith loves weekend trips to the nearby Wilmington beach for sandcastle building, annual visits to the Onslow County Fair for rides and local crafts, and dreams of exploring the art museums
    of Washington, D.C., balancing family‑oriented road trips with a budding curiosity for larger city adventures.
  culinary: Nakita Smith enjoys helping grandparents whisk together collard greens, smoked turkey, and cornbread for Sunday barbecues, has a knack for seasoning sweet potato pie with a pinch of cinnamon,
    and, while still a novice cook, proudly experiments with new ingredients like jalapeños to add a creative twist to family recipes.
  core: Nakita Smith is a curious, organized ten‑year‑old whose competitive spirit fuels a love for art, code, and soccer, and they draw on their community‑rooted upbringing and occasional skepticism to
    form a distinctive blend of creativity and disciplined ambition.
background:
  cultural: Nakita is an African‑American girl growing up in Jacksonville, North Carolina, a town with a strong military presence and a close‑knit Black community. Her family has deep roots in the South,
    with grandparents who grew up in rural North Carolina and a parent who served in the U.S. Marine Corps, giving her exposure to both civilian and military cultures. She participates in her church's youth
    group, celebrates Juneteenth, Black History Month, and family traditions like Sunday barbecues and storytelling sessions. Local festivals, the Onslow County Fair, and community mural projects influence
    her appreciation for art that reflects her heritage. This blend of Southern Black culture, military discipline, and community involvement shapes her identity and outlook.
attributes:
  skills: '["sketching and watercolor painting", "digital illustration on a tablet", "basic Scratch programming", "research and information gathering", "project planning and organization", "leadership in
    group projects", "team sports coordination", "public speaking", "choir singing", "creative storytelling"]'
  hobbies: '["drawing and watercolor painting", "digital art on a tablet", "reading science-fiction and fantasy books", "playing soccer with friends", "coding simple games in Scratch", "visiting local art
    museums and community murals", "participating in school talent shows", "listening to jazz, hip-hop, and gospel music", "baking family recipes with grandparents"]'
  career_goals: Nakita dreams of turning her love for art and technology into a career as a digital animator or video‑game designer who creates characters and worlds that reflect her cultural heritage.
    She hopes to win regional art competitions, earn a scholarship to a specialized arts‑focused high school, and later study graphic design or computer science. Alongside her creative ambitions, she wants
    to become a mentor for younger kids in her community, organizing youth art workshops and community mural projects that celebrate African‑American history in Jacksonville.
