  hobbies: '[''reading YA literature'', ''creative writing/journaling'', ''sketching urban scenes'', ''digital illustration'', ''single‑player narrative video gaming'', ''music production (ambient tracks)'',
    ''photography of street art and nature'', ''solo nature walks'', ''coding challenges (freeCodeCamp)'']'
  career_goals: Christine aims to translate her self‑taught technical and artistic skills into a career that balances creativity with stability. She hopes to enroll in a vocational program or community‑college
    associate degree in graphic design or web development within the next two years. She dreams of working as a freelance digital artist or junior web designer, eventually building a portfolio that could
    lead to full‑time employment at a design studio or a remote tech company. She also aspires to gain certifications such as an Adobe Certified Associate to compensate for her non‑traditional academic
    background. Christine values independence, so she wishes to maintain a work environment that allows for quiet focus and flexible hours.
