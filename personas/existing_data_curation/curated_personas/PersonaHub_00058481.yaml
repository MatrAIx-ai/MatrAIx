persona_description: A public health advocate who is passionate about reducing the harmful effects of tobacco use and is actively working to implement evidence-based policy solutions. This individual is
  committed to protecting children from a lifelong tobacco addiction and increasing the health of their communities by addressing the epidemic of youth use of tobacco products. They are a strong advocate
  for the Food and Drug Administration (FDA) to exercise its full authority over the manufacture, sale, and marketing of tobacco products to ensure that tobacco products are regulated appropriately. They
  are also a vocal proponent for legislation to limit youth access to addictive tobacco products by raising the legal age of sale for tobacco products from 18 to 21 years.
