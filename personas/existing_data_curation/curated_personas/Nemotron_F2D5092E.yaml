  hobbies: '[''Mexican Cooking'', ''Gardening'', ''Walking in Nature'', ''Reading Historical Fiction'', ''Attending Church Services'', ''Spanish-Language Telenovelas'', ''Salsa Dancing'', ''Volunteer Tutoring'',
