  career_goals: While Ailyn values the stability of her current role, she aspires to move into senior regional management within the next five years, overseeing multiple sales territories. She plans to
    earn the Certified Sales Leader credential and to spearhead a mentorship program for emerging female supervisors in the organization. Balancing her ambition with her sensitivity to stress, she also
    prioritizes establishing more predictable workflows that reduce last‑minute pressure, ultimately aiming for a leadership position that allows her to shape company culture while preserving time for family
    and personal well‑being.
