  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Community theater'', ''Reading mystery novels'', ''Online learning (sustainable living, graphic design)'', ''Gardening'', ''Cooking experimental
    dishes'', ''Neighborhood clean‑up volunteering'', ''Leading art‑craft sessions for kids'']'
  career_goals: Susan aims to advance her career by completing a GED and pursuing a certification in hospitality or facilities management. She hopes to become a senior housekeeper at a local hotel or senior‑living
    facility, where she can mentor new staff and implement sustainable cleaning practices. Long‑term, she dreams of launching her own small cleaning business that emphasizes environmentally responsible
    methods and personalized home‑organization services for families in the Mansfield area. She also envisions participating in community workshops to share her knowledge of efficient household management.
