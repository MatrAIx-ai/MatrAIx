  career_goals: Jonathan aims to transition into a senior PMO leadership role within a large organization where he can mentor emerging project managers and champion a culture of collaborative, people‑focused
    project delivery. He is motivated to lead high‑impact, community‑oriented projects that improve local infrastructure and public health in the Philadelphia region. Over the next five years, he hopes
    to obtain a PMP renewal, pursue a certification in sustainable project management, and spearhead a mentorship program that emphasizes work‑life balance and interpersonal support.
