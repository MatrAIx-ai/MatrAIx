personas:
  professional: Jonathan Harrison is a veteran project manager with 25 years of experience across manufacturing, infrastructure, and healthcare, excelling at realistic scheduling, risk assessment, and stakeholder
    communication while championing collaborative, people‑focused delivery; they rely on tools like Microsoft Project and Primavera P6 to translate complex technical demands into repeatable processes.
  sports: Jonathan Harrison follows the Philadelphia Eagles and Phillies, plays on a weekend recreational softball league at a local park, and joins a seasonal fishing club that heads to the Delaware River
    in spring, balancing their love of gentle exercise with routine evening walks along the river.
  arts: Jonathan Harrison devotes book‑club evenings to biographies of figures like Dwight D. Eisenhower and Walter Isaacson, enjoys listening to classic‑rock icons such as The Rolling Stones while restoring
    cars, and attends occasional performances by the Philadelphia Orchestra, finding that music and history enrich their methodical mind.
  travel: Jonathan Harrison plans trips with detailed itineraries, opting for historical road trips to Gettysburg and Boston in the fall, while occasionally booking spontaneous weekend getaways to the Pocono
    Mountains for fishing, always balancing family constraints with a love for solitary reflection.
  culinary: Jonathan Harrison cultivates heirloom tomatoes, zucchini, and kale in the backyard garden and often prepares rustic ratatouille or grilled trout with lemon‑herb butter, pairing each meal with
    a glass of local Pennsylvania Pinot noir, yet they admit to over‑relying on take‑out pizza when classic‑car projects run late.
  core: Jonathan Harrison blends a steadfast love for routine with occasional spur‑of‑the‑moment classic‑car projects, channeling their compassionate, methodical mindset into community service, gardening,
    and a steady march toward senior PMO leadership.
background:
  cultural: Jonathan was born and raised in the Philadelphia suburbs to a family of Irish‑American ancestry. His upbringing emphasized hard work, community involvement, and practical problem‑solving, values
    that align with the city’s industrious history. He grew up attending a local Catholic school, which instilled a sense of service and respect for tradition. Over the years, he has absorbed the multicultural
    vibe of Philadelphia, participating in neighborhood festivals and supporting local charities, while maintaining the pragmatic, family‑centric outlook of his own cultural heritage.
