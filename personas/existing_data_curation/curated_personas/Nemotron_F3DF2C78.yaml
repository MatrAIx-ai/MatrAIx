  career_goals: Carrie aims to move into a shift‑supervisor role within the next two years, leveraging her hands‑on experience to lead a larger team and drive safety initiatives. She plans to complete an
    associate degree in Supply Chain Management at a local community college, building on her some‑college coursework. Long‑term, she envisions starting a small, family‑run moving and logistics service
    that serves Dayton businesses, focusing on reliable, community‑oriented operations. Mentoring younger workers and fostering a culture of continuous improvement remain central to her professional ambition.
