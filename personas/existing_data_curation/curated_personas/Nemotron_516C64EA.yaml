personas:
  professional: Jeffery Odoms, a 32‑year‑old dining room attendant and bartender helper, blends meticulous food‑safety knowledge with a calm, cooperative demeanor to keep service smooth even during rushes,
    and they rely on structured SOPs while flexibly stepping in wherever a colleague needs a hand.
  sports: Jeffery Odoms shoots hoops with the local Community Center basketball league year‑round, cheers for the Oklahoma City Thunder during NBA season, and they spend Saturday mornings trekking the Wichita
    Mountains, tracking steps and heart rate on a Fitbit, while maintaining a relaxed, social approach to fitness that favors fun over strict regimens.
  arts: Jeffery Odoms unwinds by listening to the vinyl sounds of Miles Davis, Aretha Franklin, and John Coltrane, watches classic films like Casablanca and The Godfather on Friday evenings, and they eagerly
    attend downtown jazz nights, letting the rhythm of soul and jazz shape their sense of timing both in the kitchen and on the floor.
  travel: Jeffery Odoms prefers weekend road trips that blend outdoor adventure with culinary discovery, having camped in the Wichita Mountains, driven to New Orleans for a week of gumbo and jazz, and they
    dream of a scenic drive through the Great Smoky Mountains to sample regional barbecues, all while budgeting travel costs through a dedicated savings jar.
  culinary: Jeffery Odoms enjoys experimenting in a modest kitchen, mastering dishes like fried catfish, collard greens seasoned with smoked paprika, and homemade biscuits, often finishing a plate with
    a dash of hot sauce, and they treat Sunday cooking as both therapy and a chance to showcase Southern comfort flavors to friends.
  core: Jeffery Odoms is a practical yet easy‑going hospitality professional who balances a love for soulful Southern cooking with spontaneous basketball games, yet habitually forgets to water houseplants.
background:
  cultural: Jeffery grew up in a close‑knit African‑American family in Oklahoma City, where church and community gatherings played a central role. He was raised on the flavors of Southern comfort food—fried
    chicken, collard greens, cornbread—and the traditions of Juneteenth celebrations and local cultural festivals. The strong sense of solidarity within the city's black community shaped his cooperative
    nature and his commitment to uplifting others. He values the mentorship of older community members and often participates in neighborhood events that honor the city’s rich Black heritage.
attributes:
  skills: '["Customer Service", "POS System Operation", "Basic Mixology", "Food Safety & Sanitation", "Inventory Management", "Team Collaboration", "Conflict Resolution", "Multitasking", "Time Management",
