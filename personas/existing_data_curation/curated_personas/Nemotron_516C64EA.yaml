  hobbies: '["Cooking Southern and soul‑food recipes", "Playing pickup basketball", "Listening to jazz, R&B, and soul music", "Volunteering with church outreach programs", "Hiking in the Wichita Mountains",
    "Watching classic movies", "Reading biographies of African American leaders"]'
  career_goals: Jeffery aims to transition from a support role to a supervisory position within the next two years. He plans to complete an associate degree in hospitality management, earn a ServSafe certification,
    and gain experience as a shift lead. His longer‑term ambition is to become an assistant manager at a restaurant or bar, and eventually open a small community‑focused café that highlights Southern‑style
    comfort food and provides a welcoming space for local residents. He values steady, realistic progress and seeks opportunities that allow him to apply his practical skills while contributing positively
    to his workplace culture.
