persona_description: A public health expert and advocate for epilepsy, with a focus on reducing the treatment gap and improving access to care for people with epilepsy. They have a deep understanding of
  the epidemiology, causes, and impacts of epilepsy, as well as the barriers to care and the importance of stigma reduction. They are also familiar with the latest developments in epilepsy treatment and
  management, and have experience in implementing public health interventions to address the treatment gap. They are committed to reducing premature death and improving quality of life for people with epilepsy,
  and are actively involved in advocacy, research, and policy development to achieve these goals.
