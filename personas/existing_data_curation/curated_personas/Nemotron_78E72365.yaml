personas:
  professional: Jose Benitez, a bilingual humanities professor at a midwestern university, designs culturally responsive curricula featuring diaspora literature and regional narratives while channeling
    their structured, practical mindset into meticulous classroom management and mentorship, and they leverage mental-health first aid certification to foster a supportive learning environment.
  sports: Jose Benitez shoots forward for the Chicago River City Soccer Club in a local adult league, follows the Chicago Bulls and Chicago Cubs passionately, runs weekly jogs along the Lakefront Trail
    to clear their mind, and they balance competitive play with a modest home gym routine, though they sometimes skip rest days after intense matches.
  arts: "Jose Benitez regularly attends live performances by folk band Los Á\x82ngeles Azules at Grant Park, dances salsa at Café Nocturno, curates a personal collection of Frida Kahlo prints and literature\
    \ by contemporary poets like Rigoberto Piedad, and they unwind with vinyl records of Carlos Santana and Lila Downs, even though they occasionally skip museum visits when academic deadlines loom."
  travel: Jose Benitez enjoys planning trips that blend cultural immersion and family connection, having explored Oaxaca’s historic plazas, the colonial streets of San Miguel de Allende, and the bustling
    markets of Mexico City, while also taking weekend drives to Lake Michigan’s shoreline and a yearly pilgrimage to the Chicago Art Institute, yet they often defer overseas adventures due to tenure-track
    pressures.
  culinary: Jose Benitez delights in cooking mole poblano, tamales de hoja, and chilaquiles with fresh corn masa, using ancho chiles, cacao, and hoja santa, showcasing an advanced skill set that rivals
    local bakeries, and they relish sharing these dishes at family posadas, though they sometimes over-salt the broth when juggling teaching duties.
  core: Jose Benitez is a structured yet sociable academic who balances rigorous professional goals with vibrant family traditions, intense emotional reactivity, and a penchant for spontaneous gadget splurges.
background:
  cultural: Jose Benitez is a first‑generation Mexican‑American whose parents immigrated from Jalisco, Mexico. He grew up bilingual, speaking Spanish at home and English in school, which fostered a deep
    appreciation for both Mexican traditions and American societal norms. Family gatherings centered around shared meals, religious observances such as Christmas posadas, and the annual Día de los Muertos
    celebrations, instilling values of familismo and respeto. While living in Winnetka, Illinois, he remains actively connected to the vibrant Mexican community in Chicago, participating in local cultural
    events, supporting Mexican bakeries, and maintaining close ties with his extended family across the border. This bicultural identity enriches his teaching, research, and community engagement, allowing
    him to serve as a bridge between academic discourse and lived Mexican‑American experiences.
attributes:
  skills: '["course design and curriculum development", "bilingual instruction (Spanish/English)", "public speaking and lecturing", "academic research and publication", "student mentorship and advising",
