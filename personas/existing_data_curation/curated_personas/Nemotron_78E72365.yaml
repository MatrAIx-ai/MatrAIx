  hobbies: '["playing soccer in a local adult league", "cooking Mexican dishes with family", "volunteering as a bilingual tutor in the community", "attending live music and salsa dancing events", "participating
    in Día de los Muertos and other cultural festivals", "hiking the Chicago Lakefront Trail", "practicing mindfulness meditation", "keeping a reflective journal"]'
  career_goals: Jose is focused on securing a tenured professorship within the next four years while expanding his impact as an academic‑community liaison. He plans to develop a bilingual mentorship program
    that pairs Mexican‑American undergraduates with graduate mentors, and to launch a collaborative study‑abroad partnership with a university in Oaxaca, Mexico. Additionally, he aims to publish a monograph
    on contemporary Mexican poetry and to assume a leadership role such as department chair, where he can champion policies that embed mental‑health awareness and cultural competency into the core curriculum.
