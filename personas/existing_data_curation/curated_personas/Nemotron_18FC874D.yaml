  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Quilting'', ''Gardening'', ''Reading historical fiction'', ''Book club participation'', ''Seniors choir'', ''Photography of
    sunsets'', ''Bird‑watching'', ''Attending cultural festivals'']'
  career_goals: Terrie aims to expand her involvement with local arts organizations, hoping to serve as a volunteer docent at the Tampa Museum of Art and eventually lead a community art class series for
    seniors. She wants to publish a small guidebook of her favorite Floridian gardens and arts venues, and to develop a modest home studio where she can both practice her own art and host small workshops.
    Maintaining her health, staying organized, and fostering harmonious relationships with her family and community remain central to her long‑term goals.
