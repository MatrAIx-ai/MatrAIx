personas:
  professional: Terrie Steeples, a community‑focused arts volunteer and seasoned event organizer, leverages their meticulous planning, reliable nature, and deep appreciation for art history to coordinate
    senior workshops, museum docent tours, and local gallery openings, consistently balancing creative vision with methodical logistics.
  sports: Terrie Steeples, a dedicated bird‑watcher who joins the Tampa Bay Audubon Society’s morning hikes, follows the Tampa Bay Lightning and Buccaneers seasonally, and participates in a low‑impact tai‑chi
    class at the senior center, balances their love of nature with light cardio to maintain flexibility and joint health.
  arts: Terrie Steeples, an avid watercolorist and quilter drawing inspiration from Georgia O’Keeffe’s vibrant palettes and Monet’s soft light, volunteers as a docent at the Tampa Museum of Art, curates
    community art walks featuring local painter Larry Douthit, and sings in a seniors’ choir that frequently performs Ella Fitzgerald standards.
  travel: Terrie Steeples, preferring culturally immersive, relaxed trips, meticulously plans weekend getaways to historic St. Augustine, a summer road‑trip along the Gulf Coast’s barrier islands, and a
    long‑awaited visit to the gardens of Versailles, always budgeting ahead to prevent financial anxiety.
  culinary: Terrie Steeples, a health‑focused home cook, enjoys preparing shrimp and grits with fresh Gulf shrimp, mizuna, and lemon zest, brews lavender‑infused herbal tea from garden herbs, and occasionally
    indulges in a slice of key lime pie with a graham‑cracker crust for a sweet treat.
  core: Terrie Steeples blends meticulous organization with artistic curiosity, turning worries into detailed community projects while finding calm in watercolor strokes, garden blooms, and sunset photography,
    though they sometimes over‑schedule and forget to rest.
background:
  cultural: Terrie grew up in a mid‑century suburban community in Florida, raised in a traditional white middle‑class family with roots tracing back to Anglo‑American and Irish ancestors. Her upbringing
    emphasized community involvement, church attendance, and respect for Southern hospitality. Living in Riverview, she has absorbed the multicultural vibrancy of the Tampa Bay region, blending her Southern
    values with the artistic diversity of the area. She appreciates the blend of American folk traditions, such as quilting and garden parties, with the broader cultural influences found in Florida's coastal
    and Caribbean‑adjacent environment.
