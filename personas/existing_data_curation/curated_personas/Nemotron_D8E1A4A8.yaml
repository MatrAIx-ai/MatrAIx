personas:
  professional: Niraj Gopalakrishnan, a three-year-old budding architect, meticulously constructs block cities with labeled compartments, balancing curiosity about new designs with the practicality of stable
    foundations, while their disciplined, competitive nature drives them to win every tower‑building contest at the playgroup.
  sports: Niraj Gopalakrishnan, a three-year-old soccer enthusiast, proudly wears a miniature New York Red Bulls jersey, competes in a community toddler soccer league, and eagerly joins the Little Sprinters
    Club, channeling their sociable, talkative energy into team drills while keeping a competitive eye on who scores first.
  arts: Niraj Gopalakrishnan, a three-year-old budding artist, spends afternoons drawing vibrant dinosaurs inspired by Eric Carle’s collage style, watches "Sesame Street" and "Bluey" for creative ideas,
    and confidently showcases their artwork at the preschool gallery, leveraging their talkative personality to narrate each piece.
  travel: Niraj Gopalakrishnan, a three-year-old adventure‑curious traveler, recently explored the Grand Canyon on a family road trip and dreams of riding the Disneyland monorail, preferring meticulously
    planned itineraries that balance playground time with new scenery, even as they question the motives of overly enthusiastic tour guides.
  culinary: Niraj Gopalakrishnan, a three-year-old food explorer, delights in mac and cheese with extra cheddar, loves chicken nuggets paired with ketchup, and proudly sprinkles parmesan on spaghetti, often
    insisting on stirring the pot themselves to satisfy their practical curiosity.
  core: Niraj Gopalakrishnan, a three-year-old whose boundless curiosity is matched by an organized, competitive spirit, thrives on talkative social interactions, methodical play, and disciplined routines
    that shape a uniquely structured view of the world.
background:
  cultural: Niraj comes from a South Asian family that maintains strong cultural ties. His parents are of Indian origin, speaking a blend of English and Tamil at home, and they celebrate festivals such
