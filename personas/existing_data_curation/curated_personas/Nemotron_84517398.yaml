    basic computer skills to seniors'', ''Listening to classic Mexican boleros'']'
  career_goals: Luis aims to continue providing dependable web support to local Paso Robles businesses, especially family‑run wineries and restaurants, while gradually transitioning to a part‑time mentorship
    role. He hopes to mentor a few younger developers in practical coding practices and share his knowledge of bilingual site management. Over the next few years, he would like to catalogue and preserve
    the digital history of his community by creating simple archives for historic sites and local cultural groups, all while maintaining a comfortable work‑life balance that lets him spend evenings with
    his wife and family.
