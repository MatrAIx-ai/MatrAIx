personas:
  professional: Luis Alandete, a seasoned web developer in his seventies, leverages four decades of hands-on HTML, CSS, vanilla JavaScript and legacy PHP expertise to provide steady bilingual site maintenance
    for local wineries and restaurants, favoring proven solutions and calm troubleshooting while gradually mentoring younger developers in practical coding practices.
  sports: Luis Alandete enjoys low-impact fitness such as weekend walks through his olive orchard, occasional gentle golf at the Avila Valley Country Club, and cheerfully follows the San Francisco Giants
    and the Paso Robles High School basketball team, preferring routine exercise over high-intensity sports.
  arts: Luis Alandete, an avid amateur photographer and reader of historical fiction, finds inspiration in the lyrical ballads of Jose Alfredo Jimenez, the classic landscapes of Ansel Adams, and the timeless
    plays of Federico Garcia Lorca, often sharing his own black-and-white vineyard shots at intimate wine-tasting gatherings with close friends.
  travel: Luis Alandete prefers relaxed, family-oriented road trips, strolling through the vineyards of Napa, revisiting his relatives in Oaxaca during Dia de los Muertos, and taking occasional weekend
    getaways to the historic Mission San Antonio de Padua, all planned with a flexible itinerary that allows spontaneous stops for local food and photography.
  culinary: Luis Alandete, a seasoned home cook, frequently prepares authentic enchiladas verdes, slow-cooked carnitas, and homemade corn tortillas infused with fresh cilantro and chilies from his garden,
    pairing them with locally sourced Pinot Noir and his own cured olives, while occasionally experimenting with a sweet-spicy mole in honor of family celebrations.
  core: Luis Alandete, a methodical yet delightfully disorganized septuagenarian, balances unwavering routine in his work and garden with a habit of misplacing his eyeglasses, a preference for low-key gatherings,
    and a quiet confidence that turns every vintage wine tasting into a story of family history.
background:
  cultural: Luis grew up in a Mexican‑American household that placed high value on family, tradition, and Catholic observances. Bilingual in Spanish and English, he regularly celebrates Día de los Muertos
    and other Mexican holidays with his extended family, both in California and in Mexico. Living in Paso Robles, he blends his heritage with the local Central Coast culture, incorporating fresh local produce
    and wine into his cooking and garden. His cultural roots give him a strong sense of community, hospitality, and respect for routine, which shape both his personal life and his practical approach to
    work.
