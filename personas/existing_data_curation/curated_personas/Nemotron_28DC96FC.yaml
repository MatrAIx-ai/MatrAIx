  career_goals: Although only six, Kathie already dreams about future careers that match her love of structure, hands‑on activity, and friendly competition. She imagines becoming an elementary school teacher,
    creating a well‑organized classroom where she can guide children in reading and math. She also talks about being a veterinarian, attracted by the idea of caring for animals in a systematic clinic environment.
    Her competitive side fuels an excitement for science and space; she often pretends to be an astronaut or a young engineer building rockets with LEGO, hoping to be the best in her class.
