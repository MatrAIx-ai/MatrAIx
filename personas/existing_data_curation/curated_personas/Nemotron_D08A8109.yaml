  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Reading historical fiction'', ''Quilting'', ''Birdwatching'', ''Book club participation'', ''Bridge (card game)'', ''Local history exploration'',
    ''Community theater attendance'', ''Volunteering at library'']'
  career_goals: Although retired, Joyce aims to stay intellectually active and give back to her community. She hopes to author a series of children’s books that weave local Mississippi history with lessons
    on curiosity and problem‑solving. She also plans to expand a neighborhood community garden, providing fresh produce and a learning space for youth. Joyce is interested in volunteering as a part‑time
    tutor at the local community college, and she may enroll in a few courses on genealogy and digital storytelling to support her writing projects. Ultimately, she wants to combine her love of education,
    local heritage, and practical hands‑on work to leave a lasting, positive impact.
