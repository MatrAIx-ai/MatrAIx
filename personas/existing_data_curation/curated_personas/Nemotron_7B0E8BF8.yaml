  hobbies: '[''Basketball'', ''Live music concerts (hip‑hop, R&B, gospel)'', ''Cooking Southern cuisine'', ''Tech gadget tinkering'', ''Volunteering at community center'', ''Church choir singing'', ''Reading
    sci‑fi and self‑development books'', ''Hiking and photography on road trips'']'
  career_goals: He aims to transition from informal volunteer roles into a full‑time position in project management or community development within a non‑profit or municipal agency. Over the next three
    years, he plans to complete a bachelor's degree in Public Administration while gaining certifications such as CAPM (Certified Associate in Project Management) to strengthen his credentials. His long‑term
    ambition is to lead a community program that addresses youth mentorship and economic empowerment in Greensboro, eventually moving into a program director or senior manager role where he can shape policy
    and allocate resources effectively.
