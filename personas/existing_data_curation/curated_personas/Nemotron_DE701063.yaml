personas:
  professional: An inquisitive preschool explorer, Mendy Valentino loves building towers with wooden blocks and conducting simple science experiments, turning everyday curiosity into practical problem‑solving
    while delighting classmates with energetic teamwork.
  sports: Mendy Valentino darts around the local YMCA’s kids’ soccer class with the ‘Davidsonville Little Rockets’, cheers loudly for the Baltimore Orioles during family game nights, and loves splashing
    in the pool in the summer, embodying a playful, high‑energy approach to fitness and team spirit.
  arts: Mendy Valentino spends afternoons drawing vibrant dinosaurs with crayons, humming Disney’s Frozen songs, and dancing along to The Wiggles’ upbeat tunes at preschool performances, which together
    shape a lively, imaginative artistic identity.
  travel: Mendy Valentino enjoys weekend road trips to the National Mall in Washington, D.C., sandy afternoons at Virginia Beach, and quick visits to the Baltimore Inner Harbor’s aquarium, preferring spontaneous
    stops for ice‑cream over strict itineraries.
  culinary: Mendy Valentino loves creamy macaroni and cheese, crunchy chicken nuggets, and bright carrot sticks, proudly sprinkling shredded cheddar on their mini pizza while sometimes forgetting to wash
    their hands before dinner, reflecting a tasty yet messy kitchen enthusiasm.
  core: Mendy Valentino is a curious, energetic five‑year‑old whose love of messy play, endless questions, and occasional forgetfulness turns every day into a vibrant adventure.
background:
  cultural: Mendy grows up in a suburban, middle‑class white family in Davidsonville, Maryland. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and Easter with family
    gatherings and community events. She attends a local preschool that balances structured learning with play, reflecting the region's emphasis on curiosity, social interaction, and flexibility. The diverse
    community of Anne Arundel County exposes her to neighbors from various backgrounds, occasional cultural festivals, and a broad set of experiences that enrich her early worldview.
attributes:
  skills: '[''Basic literacy (letter recognition and sounds)'', ''Counting and simple addition'', ''Fine motor coordination (drawing, cutting, building blocks)'', ''Verbal communication and curiosity (asking
