  hobbies: '[''Building blocks'', ''Drawing and coloring'', ''Singing nursery rhymes'', ''Dancing'', ''Group games like hide‑and‑seek and tag'', ''Pretend play with dolls and stuffed animals'', ''Exploring
    nature (collecting rocks, leaves, shells)'', ''Storytime with parents'']'
  career_goals: 'Mendy loves dreaming about exploring the world: she imagines becoming an astronaut who can float among the stars, a wildlife biologist who cares for animals, or a teacher who shares stories
    and helps other kids learn. Right now, her biggest ambition is to master reading and counting so she can lead her friends in games and feel proud of her accomplishments.'
