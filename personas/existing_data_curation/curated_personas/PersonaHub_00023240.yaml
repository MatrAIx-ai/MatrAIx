persona_description: A cancer researcher who specializes in the study of metastasis and the mechanisms behind cancer recurrence. She is particularly interested in the characteristics of tumor-spreading
  cells and how they can be isolated and used for treatment. She has a deep understanding of the molecular mechanisms that make these cells so resistant to current cancer-killing therapies and is eager
  to explore new ways to stop their spread. She is also interested in the role of stem cells in cancer recurrence and the potential for stem-cell-like cancer cells to be used as targets for cancer therapy.
