personas:
  professional: Carlos Franklin, an organized community arts coordinator with a methodical flair, channels their curiosity and gentle demeanor into part-time docent and volunteer coordination roles where
    they design inclusive art workshops, curate neighborhood exhibits, and maintain meticulous digital archives.
  sports: Carlos Franklin stays active through low-impact jogging along the Brooklyn Promenade, participates in the Brooklyn Walkers Club, and follows the Brooklyn Nets and New York Yankees with a relaxed
    fan enthusiasm, preferring regular walks over high-intensity workouts.
  arts: Carlos Franklin immerses themselves in the visual narratives of Jean-Michel Basquiat and the melodic storytelling of Miles Davis, regularly attending gallery openings at the Brooklyn Museum, engaging
    in a book club that dissects the works of art historians such as Ernst Gombrich, and curating a personal photo series of Brooklyn street murals.
  travel: Carlos Franklin prefers carefully planned cultural getaways, often booking weekend trips to New Orleans to soak in jazz heritage, day-long photo excursions to the Hudson Valley's historic estates,
    and occasional international visits to Havana to explore Caribbean culinary roots, all while budgeting travel expenses through a dedicated travel savings account.
  culinary: Carlos Franklin enjoys cooking gumbo with fresh okra, jerk chicken marinated in scotch bonnet peppers, and caramelized collard greens seasoned with smoked paprika, skillfully blending Southern
    comfort with Caribbean spice, while also savoring occasional fine-dining experiences at the Brooklyn Museum cafe.
  core: Carlos Franklin blends a curator's meticulous eye with a gardener's patient rhythm, channeling quiet curiosity into organized community art projects while secretly hoarding vintage jazz vinyls and
    obsessively cataloguing balcony herbs.
background:
  cultural: Carlos is a second‑generation African American who grew up in Brooklyn’s historically Black neighborhoods, where he was immersed in church community, soul music, and the vibrant street culture
    of the borough. His family’s roots trace back to the Great Migration, and he carries forward traditions of storytelling, communal support, and a strong sense of identity. He draws inspiration from the
    legacy of the Harlem Renaissance and contemporary Black artists, weaving these influences into his appreciation for visual arts and cultural preservation.
attributes:
  skills: '[''Event planning'', ''Project coordination'', ''Budget management'', ''Database management'', ''Digital archiving'', ''Community outreach'', ''Mentoring'', ''Art curation'', ''Photography'',
