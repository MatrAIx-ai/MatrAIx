  hobbies: '[''Gallery visits'', ''Street art exploration'', ''Photography'', ''Jazz and soul music listening'', ''Urban gardening'', ''Cooking traditional dishes'', ''Reading art biographies'', ''Creative
    writing'', ''Volunteer work at museums'', ''Collecting vinyl records'']'
  career_goals: Carlos aims to re‑enter the professional world through a part‑time role that leverages his organizational strengths and love of the arts. He aspires to become a volunteer coordinator or
    docent at a Brooklyn cultural institution, where he can design and run community art workshops for seniors and at‑risk youth. Over the next few years, he plans to complete a bachelor’s degree in arts
    management to deepen his curatorial knowledge and eventually launch a small nonprofit that preserves and showcases Black artistic heritage in his neighborhood.
