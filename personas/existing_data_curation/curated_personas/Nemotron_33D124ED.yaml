  career_goals: Phyllis aims to transition into a senior leadership role such as Director of Health, Safety, and Environment or Plant Operations Manager within the next five years. She plans to earn the
    Certified Safety Professional (CSP) credential and complete an executive MBA to broaden her strategic business acumen. Her long‑term ambition includes spearheading a company‑wide sustainability initiative
    that integrates digital twins for predictive safety monitoring. Additionally, she wishes to mentor the next generation of female engineers through industry associations and to serve on the advisory
    board of a local community college’s industrial engineering program.
