personas:
  professional: Phyllis Ditzel is a seasoned industrial engineer who leverages their expertise in lean manufacturing, Six Sigma, and OSHA safety programs to lead cross-functional process optimization projects,
    consistently delivering measurable efficiency gains while mentoring junior engineers, and they are preparing for a future director-level role.
  sports: Phyllis Ditzel is an avid hiker of the Pine Barrens, participates in a local weekend cycling club, practices yoga and Pilates at a community studio, and they passionately root for the New York
    Yankees in baseball and the New Jersey Devils in hockey.
  arts: Phyllis Ditzel channels their creative side through woodworking guild projects inspired by the mid-century designs of Charles and Ray Eames, enjoys listening to Yo-Yo Ma's cello suites and the folk
    storytelling of Joan Baez, and they attend regional theatre productions featuring Lin-Manuel Miranda's works when time permits.
  travel: Phyllis Ditzel favors purposeful travel, having explored Rome's ancient ruins, Tuscany's vineyards, and the sustainable farms of New Zealand, while planning a future trip to Kyoto's temples to
    study traditional Japanese carpentry techniques, and they balance limited vacation days with a love for immersive cultural experiences.
  culinary: Phyllis Ditzel experiments with international cuisines, regularly preparing Thai green curry with fresh lemongrass, homemade sourdough bread featuring rosemary from their garden, and a quinoa-vegetable
    medley seasoned with smoked paprika, showcasing a competent yet adventurous cooking style, and they enjoy sharing these dishes with friends.
  core: Phyllis Ditzel blends data-driven engineering precision with hands-on woodworking, gardening, and global culinary experiments, navigating life with organized curiosity, occasional splurges on premium
    tools, and they often postpone dental appointments.
background:
  cultural: Phyllis identifies as a White American with German ancestry, reflected in her family name. She was raised in a suburban New Jersey community that emphasized hard work, education, and civic responsibility.
    Her upbringing celebrated traditional American holidays—Thanksgiving, Fourth of July, and community parades—while also incorporating family traditions such as Oktoberfest gatherings that honored her
    heritage. Growing up in a household that valued STEM education, she was encouraged to pursue engineering, a path supported by both parents who were educators. As an adult, Phyllis embraces multiculturalism
    through her culinary interests and community outreach, fostering inclusion while staying rooted in the values of reliability, practicality, and collaborative service that shaped her early life.
