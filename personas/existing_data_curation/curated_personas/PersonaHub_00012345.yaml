persona_description: A folk music enthusiast who is interested in the revival of traditional Irish music and the history of folk music in Europe and the Balkans. They are knowledgeable about the contributions
  of various folk bands and musicians to the revitalization of traditional Irish music and the revival of broader folk traditions of music, dance, and costume. They are also interested in the influence
  of Balkan folk music on the development of Nordic folk music and the revival of European folk music. They enjoy attending folk music festivals and sharing traditional-style songs with others.
