  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Cooking (international cuisines)'', ''Yoga'', ''Hiking (Red Rock Canyon)'', ''Volunteering at animal shelter'',
    ''Community theater attendance'', ''Knitting'']'
  career_goals: Krystal aims to advance into a senior office manager or operations coordinator role where she can leverage her decades of experience to mentor newer administrative staff and drive efficiency
    initiatives across the organization. She plans to obtain a Certified Administrative Professional (CAP) credential within the next year to formalize her expertise. In the longer term, she envisions transitioning
    to part‑time consulting for small businesses in the Las Vegas area, helping them set up streamlined office processes and adopt user‑friendly digital tools. Her ultimate ambition is to balance a fulfilling
    career with the flexibility to pursue volunteer work and spend more time on her personal hobbies before retirement.
