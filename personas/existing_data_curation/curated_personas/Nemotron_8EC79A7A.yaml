personas:
  professional: Meri Teasdale is a veteran construction laborer with an associate degree in construction technology, adept at concrete finishing, heavy‑equipment operation, and blueprint interpretation,
    who channels their disciplined, data‑driven approach into lean‑construction efficiency improvements while pursuing NCCER certification, a part‑time bachelor's in construction management, and a forewoman
    role that will let them champion zero‑incident safety on site.
  sports: Meri Teasdale combines solitary fitness with team loyalty, trekking the Red Rock Canyon trails for cardio, cheering the Las Vegas Raiders and Vegas Golden Knights on game nights, and playing third
    base in a local adult softball league where the structured schedule satisfies their organized nature, and they appreciate the camaraderie of the league as a controlled social outlet.
  arts: Meri Teasdale draws creative calm from the black‑and‑white landscapes of Ansel Adams, the folk guitar work of John Fahey, and classic Westerns starring John Wayne, often listening to vinyl while
    upcycling reclaimed wood into furniture and completing a jigsaw puzzle of the Getty Center to unwind, and they feel these artistic pursuits sharpen their attention to detail.
  travel: Meri Teasdale favors meticulously planned road trips that blend desert scenery with historic landmarks, having recently explored Monument Valley and Lake Powell, while earmarking a modest quarterly
    travel fund for future visits to Petra’s rose‑colored tombs and the ancient streets of Kyoto, and they prefer itineraries that balance adventure with structured schedules.
  culinary: Meri Teasdale enjoys hearty, protein‑focused dishes such as rosemary‑marinated lamb chops, quinoa‑stuffed bell peppers, and a signature rosemary‑infused flatbread baked in their reclaimed‑wood
    oven, where their intermediate cooking skills shine through precise measurements and occasional experimentation inspired by Julia Child’s tutorials, and they often pair meals with a glass of robust
    red wine.
  core: Meri Teasdale is a detail‑obsessive construction professional who channels disciplined curiosity into lean site management, meticulous finances, cautious health routines, solitary fitness, and creative
    woodwork, all while battling a competitive streak and occasional worry‑driven stress.
background:
  cultural: Meri grew up in a small, middle‑class town in Ohio where her family valued hard work, self‑reliance, and practical skills. Her father worked in the local shipyards and taught her basic carpentry,
    while her mother emphasized organization and discipline. The Midwestern ethic of modesty and responsibility shaped her reserved demeanor and competitive spirit. After completing an associate degree
    in construction technology, she moved to Las Vegas for better opportunities, adapting to the city’s fast‑paced construction market while preserving her small‑town roots and pragmatic approach to life.
attributes:
  skills: '[''Concrete finishing'', ''Form‑work erection'', ''Heavy equipment operation'', ''Blueprint reading'', ''OSHA safety compliance'', ''Site organization'', ''Tool inventory management'', ''Time‑tracking'',
    ''Quality‑control inspection'', ''Lean‑construction techniques'']'
  hobbies: '[''Desert gardening'', ''Hiking in Red Rock Canyon'', ''Scale model building'', ''Reading construction trade magazines'', ''Jigsaw puzzle solving'', ''Upcycling reclaimed wood into furniture'']'
  career_goals: Meri aspires to move from laborer to crew forewoman within the next two years, earning NCCER certification and completing a bachelor's degree in construction management part‑time. She is
    driven to build a reputation for zero‑incident safety records and to lead a specialized concrete‑finishing team that consistently meets tight project deadlines. Long‑term, she hopes to launch a small
    consulting firm that offers efficiency audits and lean‑process training for construction crews, allowing her competitive drive to benefit the industry while maintaining high standards.
