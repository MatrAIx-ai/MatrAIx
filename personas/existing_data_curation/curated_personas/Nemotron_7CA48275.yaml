personas:
  professional: Eugene Crochet, a seasoned social worker in rural Alaska, merges meticulous case management and crisis intervention with a curiosity for culturally responsive practices, and they leverage
    their organized, reliable nature to design data‑driven family support programs that weave outdoor therapeutic activities into community services.
  sports: Eugene Crochet, an avid winter hiker and cross‑country skier, trains with the Palmer Hiking & Ski Club, follows the Anchorage Seawolves basketball team and the Seattle Seahawks for a competitive
    boost, joins the Matanuska‑Susitna snowshoe league each January, and they balance this structured fitness routine with seasonal salmon fishing trips that serve both recreation and subsistence.
  arts: Eugene Crochet, a dedicated wildlife photographer, draws inspiration from Ansel Adams and Art Wolfe, frequents the Anchorage Museum’s Indigenous art exhibitions featuring Jewell James, enjoys listening
    to Neko Case while woodworking, and they occasionally attend the annual Alaska Folk Festival where performers like Brandi Carlile headline, weaving artistic appreciation into their everyday life.
  travel: Eugene Crochet, a methodical planner who maps trips months in advance, has explored Seattle and Portland on professional conferences, trekked the glaciers of Iceland on a self‑guided adventure,
    and dreams of hiking Patagonia’s Torres Valley, yet they balance these aspirations with a modest travel budget and family commitments that prioritize short, purposeful getaways over luxury vacations.
  culinary: Eugene Crochet, a competent home cook, often prepares smoked salmon glazed with maple syrup, hearty beet and parsnip stew seasoned with wild herbs, and cloudberry crumble topped with locally
    harvested honey, while they relish a strong French‑press coffee after meals and occasionally treat themselves to a pint of Anchorage‑brew craft ale.
  core: Eugene Crochet, a pragmatic yet curious community‑focused social worker, balances rugged Alaskan wilderness pursuits with meticulous planning, they have a habit of over‑budgeting for camera gear
    and a stubborn tendency to skip dentist appointments, all while championing nature‑based healing for families.
background:
  cultural: Eugene is a white Alaskan with Midwestern family roots who has lived in Palmer for over two decades. He embraces the frontier spirit of independence, self‑reliance, and close‑knit community
    that characterizes rural Alaska. Through his work, he has developed a deep respect for Alaska Native cultures, incorporating cultural competency and collaborative practices into his social work. He
    regularly attends community gatherings that celebrate both settler and Indigenous traditions, and he honors the seasonal rhythms of the region by participating in local subsistence activities. His cultural
    identity blends a mainstream American upbringing with the unique values of Alaskan life, emphasizing stewardship of the land, mutual support, and adaptability.
attributes:
  skills: '["Case Management","Crisis Intervention","Family Systems Counseling","Child Development Assessment","Culturally Responsive Practice","Program Planning","Grant Writing","Data Collection and Evaluation","Interdisciplinary
