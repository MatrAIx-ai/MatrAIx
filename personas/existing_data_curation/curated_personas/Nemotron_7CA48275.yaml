  hobbies: '["Fishing","Salmon Hunting","Hiking","Wildlife Photography","Gardening","Reading Non‑fiction (Psychology, Social Policy, Environmental Stewardship)","Woodworking","Community After‑School Mentoring","Attending
    Local Festivals and Fairs"]'
  career_goals: Eugene aims to complete his bachelor's degree in social work and obtain LCSW licensure within the next three years. He aspires to lead the development of an integrated family support program
    that combines mental health services, cultural education, and outdoor therapeutic activities for rural families. He hopes to advance into a supervisory or director role at the Matanuska‑Susitna County
    Social Services Department, mentor emerging social workers, and advocate for policy changes that improve resource allocation for children and families in remote Alaskan communities. Long‑term, he envisions
    contributing to research on the impact of nature‑based interventions on youth resilience, and publishing findings in professional journals.
