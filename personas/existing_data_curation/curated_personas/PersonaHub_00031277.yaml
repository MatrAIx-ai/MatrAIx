persona_description: A scientist conducting research on the effects of calcium on peteca (rind pitting) in lemons and limes, after a rainfall and cold storage. She is particularly interested in the physiological
  mechanisms involved in the development of peteca and the impact of calcium levels on the fruit's quality. Her research focuses on the histological analysis of affected fruits and the identification of
  the calcium level associated with rind pitting development.
