    "Language learning (Gujarati)"]'
  career_goals: Shreya aims to transition into senior leadership, targeting a director or senior manager role where she can integrate arts, community engagement, and corporate social responsibility into
    the organization’s core strategy. She plans to pursue a bachelor's degree in Business Administration and eventually an MBA to deepen her executive acumen. Her long‑term ambition includes establishing
    a consultancy or non‑profit that mentors women and underrepresented groups in the Bay Area, fostering innovative, culturally inclusive programs that bridge the gap between business objectives and community
    enrichment.
