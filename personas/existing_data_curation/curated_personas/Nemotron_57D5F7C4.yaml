personas:
  professional: Ana Hayes, a precocious 1‑year‑old, they already demonstrate the methodical spirit of a future engineer, arranging blocks with meticulous precision and eagerly imitating the structured routines
    of their parents' home office.
  sports: Ana Hayes, a toddler in Moore County, they enjoy little‑league T‑ball practice at the community center and cheer on the Tennessee Titans on Sundays, while a weekly parent‑guided gymnastics class
    keeps their motor skills active.
  arts: Ana Hayes, a 1‑year‑old, they delight in listening to local folk fiddlers like Charlie Daniels and love flipping through picture books by Mo Willems, often humming along to the church choir’s hymns
    during Sunday services.
  travel: Ana Hayes, a 1‑year‑old, they have already taken a family road trip to the Nashville Country Music Hall of Fame and a weekend stay at a cabin near the Great Smoky Mountains, preferring short drives
    that keep their nap schedule intact.
  culinary: Ana Hayes, a 1‑year‑old, they favor pureed sweet potato, applesauce, and occasional bites of fried chicken crust, and they scoot around the kitchen imitating their mother’s hand‑breaded dumpling
    roll, though they have a stubborn refusal for broccoli.
  core: Ana Hayes, a 1‑year‑old bundle of methodical curiosity, they balance a love for tidy block towers with a stubborn refusal for green veggies, all while soaking up Southern hospitality and budding
    routines.
background:
  cultural: Ana grew up in Fayetteville, a close‑knit community in Moore County, Tennessee. Coming from a white Southern background, she was raised with values of hospitality, modesty, and strong ties to
    family and church. Community events such as church potlucks, county fairs, and local volunteer initiatives have shaped her sense of duty and her preference for predictable, supportive environments.
    Her Southern upbringing also gives her an appreciation for traditional cooking, folk music, and the rhythms of small‑town life.
