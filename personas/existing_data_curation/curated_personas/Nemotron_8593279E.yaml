personas:
  professional: Sophia Gonzalez, a 25‑year‑old graphic designer and aspiring museum studies graduate, harnesses their expertise in Photoshop and Illustrator together with bilingual communication to curate
    community art exhibits that blend contemporary visual trends with the vibrant folk rhythms and rituals of their Andean heritage, balancing meticulous planning with the creative spontaneity that their
    curious, organized nature demands, and they thrive on turning ideas into tangible experiences for local audiences.
  sports: Sophia Gonzalez channels their love of movement into early morning runs along the Rickenbacker Trail, weekly beach‑volleyball sessions with the Miami Beach Volleyball Club, and regular yoga classes,
    while they cheer for the Miami Heat on the court and keep an eye on Inter Miami CF’s soccer matches as go‑to sources of community spirit and seasonal motivation.
  arts: Sophia Gonzalez immerses themselves in the contemporary art scene by sketching Miami’s urban murals and attending gallery openings that showcase artists such as Oscar Murillo and Tania Bruguera,
    and they spend evenings listening to acoustic performances by Lila Downs, Susana Baca, and the folk‑fusion group Novalima, all of which shape their aesthetic sensibility and inform their curatorial
    projects.
  travel: Sophia Gonzalez travels with a mix of spontaneity and a detailed itinerary, often escaping the Miami heat for weekend hikes in the Everglades and cultural strolls through Key West, while they
    dream of immersive trips to Barcelona’s art‑laden alleys, Cartagena’s colonial waterfront, and the legendary Andean highland city famed for its stone citadel, all budgeted through their side‑gig earnings
    and careful savings.
  culinary: Sophia Gonzalez, an enthusiastic home cook, skillfully blends flavors in dishes like ceviche marinated in lime and ají amarillo, lomo saltado tossed with scallions and a splash of pisco, and
    causa layered with avocado and tuna, often experimenting with quinoa and purple corn while they host potluck evenings where friends savor their aromatic creations.
  core: Sophia Gonzalez, a quietly curious 25‑year‑old with a sketchbook always tucked under her arm, they balance a disciplined work ethic with a love for spontaneous art‑filled nights, yet often forget
    to water their houseplants until the last minute.
background:
  cultural: Sophia is a second‑generation Peruvian‑American raised in Miami. Her parents immigrated from Lima, and she grew up in a bilingual household where Spanish and English were spoken interchangeably.
    Family traditions such as celebrating Peru’s Independence Day with music, dance, and a feast of ceviche and timbuchi are central to her identity. She participates in local Peruvian community events,
    preserving Andean musical styles like huayno and afro‑Peruvian rhythms. While embracing Miami’s multicultural vibrancy, she balances these heritage customs with American norms, fostering a bicultural
    perspective that informs her artistic and community interests.
