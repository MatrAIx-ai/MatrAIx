  hobbies: '[''Visiting contemporary art galleries'', ''Sketching and watercolor painting'', ''Cooking Peruvian dishes'', ''Reading magical realism literature'', ''Attending intimate acoustic concerts'',
    ''Practicing yoga'', ''Walking in nature preserves'', ''Volunteering at cultural festivals'']'
  career_goals: Sophia aims to further her education by pursuing a Bachelor’s degree in Museum Studies or Arts Administration. Her long‑term ambition is to become a community arts coordinator or cultural
    liaison in Miami, designing programs that spotlight Peruvian and broader Latin American art. She plans to secure internships at local museums, develop grant‑writing skills to fund multicultural projects,
    and ultimately lead a museum department or cultural center. In the near term, she also envisions launching an online platform that features emerging Peruvian artists and fosters cross‑cultural dialogue.
