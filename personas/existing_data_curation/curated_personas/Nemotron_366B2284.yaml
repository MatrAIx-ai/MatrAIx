  career_goals: Adalberto aims to progress from a janitorial role to a supervisory position in facilities management, ideally within a cultural institution such as a museum or community center where his
    appreciation for art can be leveraged. He plans to obtain certifications in occupational safety (OSHA) and green cleaning, and to enroll in a vocational program for facilities management. In the longer
    term, he envisions launching his own eco‑friendly cleaning service that serves local businesses in Corozal, offering customized solutions while promoting sustainable practices.
