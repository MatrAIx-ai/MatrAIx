  career_goals: Janie aims to become a senior investment analyst within the next three years, earn the Chartered Financial Analyst (CFA) designation, and ultimately transition into a portfolio manager role
    where she can design and oversee investment strategies that integrate ESG considerations. She also aspires to mentor junior analysts, lead a research team, and eventually launch her own boutique advisory
    focused on socially responsible investing for mid‑scale clients. Her ambition includes influencing firm‑wide investment processes through data‑driven innovation while maintaining rigorous risk controls.
