personas:
  professional: Janie Lafreniere, a 28‑year‑old investment analyst in a mid‑size Boston firm, blends quantitative modeling expertise in Excel, Python, and Bloomberg with a humanities‑driven storytelling
    flair, using their curiosity and practical mindset to turn complex data into clear client presentations while their competitive edge fuels relentless pursuit of ESG‑focused strategies.
  sports: Janie Lafreniere, a regular on a co‑ed softball league and a weekly yoga enthusiast, follows the Boston Red Sox and Boston Celtics loyally, using the summer softball season to channel competitive
    drive while balancing it with yoga’s mindful flexibility to offset post‑game muscle tightness.
  arts: Janie Lafreniere immerses themselves in contemporary fiction by Sally Rooney, historical biographies by David McCullough, and economic tomes by Thomas Piketty at a lively Boston book club, while
    their playlist alternates between Bon Iver’s indie folk and Adele’s soulful ballads, and they regularly attend live performances of Lin‑Manuel Miranda’s Hamilton at the local theater.
  travel: Janie Lafreniere favors a blend of structured coastal hikes on Cape Cod and spontaneous urban escapes, having trekked the Acadia National Park loop and dreaming of a week‑long culinary tour of
    Quebec City, while they meticulously plan each trip’s budget but leave room for unplanned wine‑tasting stops in Napa Valley.
  culinary: Janie Lafreniere enjoys experimenting with French‑Canadian comfort foods like tourtière, poutine, and maple‑glazed pork chops during weekend cooking workshops, pairing them with crisp Pinot
    Noir, while their palate also embraces fresh sushi rolls with tuna and avocado, reflecting a confident yet occasionally over‑ambitious kitchen style.
  core: Janie Lafreniere is a curious yet pragmatic analyst whose competitive streak fuels a relentless pursuit of ESG investments, but their occasional coffee‑induced insomnia and skeptical nature often
    make them double‑check every deal, even as they buddy up for board‑games and wine nights.
background:
  cultural: Janie comes from a New England family with deep French‑Canadian roots; her grandparents emigrated from Quebec to the Greater Boston area in the 1950s. Raised in Taunton, MA, she grew up bilingual,
    speaking English at school and French at home, and participated in cultural events such as Saint‑Jean‑Baptiste celebrations and local Francophone community gatherings. While she identifies with broader
    American cultural norms, she retains a strong appreciation for French‑Canadian traditions, including cuisine, music, and storytelling, which she incorporates into her personal and social life.
