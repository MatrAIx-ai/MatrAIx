personas:
  professional: Cynthia Austin is a management analyst who transforms messy data into clear insights using Excel, SQL, Power BI, and Tableau, applies Lean Six Sigma principles to streamline processes, embraces
    both Agile and Waterfall project methods out of curiosity and practicality, and enlivens stakeholder meetings with their talkative, collaborative style.
  sports: Cynthia Austin enjoys weekend hikes in nearby state parks, competes in a co‑ed volleyball league on Thursday evenings, and faithfully follows the Seattle Seahawks and Portland Trail Blazers, all
    while fitting a Sunday morning jog into a busy schedule.
  arts: Cynthia Austin shines on the community‑theater stage in productions like “The Glass Menagerie” and “Rent,” draws inspiration from Viola Davis and Lin‑Manuel Miranda, and relaxes by listening to
    Hozier’s lyricism and Sarah Silverman’s sharp comedy specials.
  travel: Cynthia Austin prefers curated weekend getaways that combine hiking the Blue Ridge Mountains, sampling street food at Portland’s Saturday market, and exploring historic Savannah, planning each
    trip in a spreadsheet to stay within a modest budget while dreaming of an immersive culinary tour of Tuscany.
  culinary: Cynthia Austin delights in mastering Thai green curry with fresh basil, Japanese ramen with homemade broth, and rosemary focaccia, often sourcing herbs from their backyard garden and pairing
    meals with crisp Sauvignon Blanc, though their experimental zeal sometimes leads to over‑spiced sauces they laugh off as “excess enthusiasm.”
  core: Cynthia Austin blends analytical precision with theatrical flair, juggling data dashboards, community‑theater rehearsals, and spontaneous cooking experiments while occasionally forgetting to water
    their herbs.
background:
  cultural: Cynthia was raised in a Midwestern, small‑town environment near Canton, Ohio, where values such as hard work, reliability, and community involvement are deeply ingrained. Her family’s heritage
    includes German and Irish roots common to the region, and she grew up celebrating traditional holidays with close‑knit family gatherings, church participation, and regular attendance at county fairs.
    These traditions fostered a strong sense of cooperation, humility, and an appreciation for both established customs and new ideas. This Midwestern cultural backdrop informs her pragmatic approach to
    problem‑solving, her sociable demeanor, and her dedication to balancing personal ambition with the well‑being of her community.
attributes:
  skills: '["Data analysis (Excel, SQL, Power BI, Tableau)", "Process improvement (Lean Six Sigma fundamentals)", "Project management (Agile & Waterfall)", "Strategic planning and performance metrics",
