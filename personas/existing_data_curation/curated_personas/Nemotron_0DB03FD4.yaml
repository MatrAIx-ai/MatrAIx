    with a balance of curiosity and practicality"]'
  hobbies: '["Community volunteering (food bank, youth mentorship)", "Amateur theater acting and performance", "Cooking classes and culinary exploration", "Hiking and outdoor activities in state parks",
    "Book club (contemporary fiction and leadership)", "Gardening (herbs and vegetables)", "Attending local festivals and cultural events", "Traveling with spouse to explore new regions"]'
  career_goals: Cynthia aims to advance to a senior management analyst position within the next three years, taking on larger cross‑functional projects that shape corporate strategy. She envisions earning
    a PMP certification and eventually an MBA to deepen her strategic acumen. Long‑term, she aspires to become a Director of Business Operations, leading a team of analysts and driving data‑informed decision‑making
    across the organization. Cynthia also hopes to mentor emerging talent and champion inclusive, collaborative workplace cultures, leveraging her sociable nature to build strong internal networks.
