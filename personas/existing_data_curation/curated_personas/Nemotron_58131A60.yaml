  career_goals: Even in his early seventies, Carlos aims to leave a lasting professional legacy by formalizing a mentorship program that pairs senior managers with emerging talent in the Gwinnett County
    business community. He plans to transition into a part‑time advisory role, offering strategic counsel to small Colombian‑American enterprises looking to expand in the Southeast. Additionally, he hopes
    to contribute to the local senior center’s leadership board, ensuring that programs remain both innovative and grounded in practical outcomes. Personal ambitions include completing a short certification
    in data analytics to satisfy his curiosity, and traveling back to Colombia to reconnect with his extended family before his health limits further trips.
