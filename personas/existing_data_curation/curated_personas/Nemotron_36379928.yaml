  hobbies: '["Succulent and xeriscape gardening", "Reading historical non‑fiction", "Model railway building", "Birdwatching", "Astrophotography", "Cooking traditional Mexican cuisine", "Puzzle solving (crosswords,
    Sudoku)", "Landscape painting"]'
  career_goals: Although retired from formal employment, Ignacio aims to preserve his independence and pass his practical knowledge to younger relatives. He plans to complete a community‑recognized certification
    in desert horticulture, enabling him to mentor neighborhood gardeners. He is working on a memoir that documents his family’s Mexican culinary traditions and life stories, hoping to self‑publish a small
    book. Ignacio also envisions establishing a modest home workshop where he can craft and sell handmade wooden items, using his organized approach to manage production and sales without excessive social
    interaction.
