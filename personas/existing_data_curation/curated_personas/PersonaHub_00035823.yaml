persona_description: A professional astronomer who specializes in the study of black holes, particularly the structure and behavior of super massive black holes at the heart of galaxies. Eikenberry is building
  and operating a new class of infrared telescope instruments to shed light on the mysteries surrounding black holes. His research interests include the formation and evolution of black holes, as well as
  their interactions with their host galaxies. Eikenberry is also studying smaller, "stellar mass" black holes, which are born when a big star dies in a supernova explosion.
