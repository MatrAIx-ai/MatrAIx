personas:
  professional: Yesenia Vazquezcruz, a retired community organizer and informal caregiver, leverages their bilingual communication and step‑by‑step planning skills to coordinate church potlucks, senior
    game nights, and language‑exchange workshops, and they keep events running smoothly despite an occasional relaxed attitude toward deadlines.
  sports: Yesenia Vazquezcruz stays active by attending a weekly salsa and cumbia dance class, joining a seniors’ walking club that follows the Carolina Panthers’ game schedule for post‑game strolls, and
    they cheer for the local Charlotte Hornets, using these activities as both social and fitness outlets.
  arts: Yesenia Vazquezcruz enjoys classic cinema such as films starring Pedro Infante from the Golden Age of cinema in their ancestral land, reads historical novels by Isabel Allende, and they create papel
    picado and quilts inspired by Frida Kahlo’s palette, shaping their identity through vibrant visual and literary arts.
  travel: Yesenia Vazquezcruz plans travel with a blend of meticulous itinerary lists and spontaneous detours, hoping to return to their hometown of San Miguel de Allende to record oral histories while
    also dreaming of a cultural tour of Oaxaca’s markets and a relaxed weekend in Santa Fe, New Mexico, and they balance limited finances with family support.
  culinary: Yesenia Vazquezcruz, a master of traditional dishes, prepares mole poblano, hand‑made tamales, and fresh salsas using home‑grown herbs, chilies, and dried ancho peppers, and they skillfully
    modify recipes for low‑sodium or vegetarian diets while preserving authentic flavors.
  core: Yesenia Vazquezcruz is a vibrant 80‑year‑old community pillar who blends structured event planning with spontaneous salsa steps, competitive bridge tactics, and a stubborn skepticism that fuels
    their fierce dedication to preserving cultural traditions, and they never miss a chance to share a homemade mole at a family gathering.
background:
  cultural: Born in a small town in the state of Michoacán, Mexico, Yesenia immigrated to the United States in the early 1970s, settling first in Texas before moving to Rock Hill, South Carolina with her
    husband. She has woven her Mexican heritage into the fabric of Southern life, celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day alongside local Southern traditions such as church
    picnics and community barbecues. Her family maintains Spanish as the household language, preserving regional recipes and folk stories that she shares with grandchildren and neighbors. As a devout Catholic,
    she actively participates in parish events, integrating Mexican devotional practices with the broader church community. This blended cultural identity informs her cooking, social activities, and the
    way she mentors younger generations about their roots.
