  career_goals: Although officially retired, Yesenia aims to remain a pillar of her local Mexican‑American community. She hopes to mentor younger relatives in cooking and cultural traditions, preserving
    family recipes for future generations. She also plans to volunteer as a cultural liaison at the Rock Hill senior center, leading cooking workshops and language exchange sessions. A personal ambition
    is to travel back to her hometown in Mexico to document oral histories with her siblings and compile a memoir that blends her life story with the broader Mexican immigrant experience. Maintaining her
    health through regular walks and staying socially active are also central to her goals.
