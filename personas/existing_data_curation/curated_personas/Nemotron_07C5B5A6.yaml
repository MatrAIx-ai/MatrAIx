  hobbies: '[''Visiting art galleries and street murals'', ''Sketching and creating farm-based sculptures'', ''Cooking and farm-to-table dinner hosting'', ''Home brewing craft beer'', ''Participating in
    community garden projects'', ''Organizing and playing in pick-up basketball games'', ''Attending live music performances'', ''Taking spontaneous road trips to explore other farms and museums'']'
  career_goals: Daniel aims to position his peri-urban farm as a regional showcase for regenerative agriculture blended with public art. Within the next three years he plans to expand his CSA to serve 200
    families, launch a seasonal pop-up restaurant that partners with local chefs and visual artists, and win the Best Sustainable Farm award at the Pennsylvania State Fair. He also hopes to mentor at least
    ten aspiring urban farmers through workshops hosted on his property, publish a practical guide on integrating art into sustainable farming, and eventually transition into a consulting role that helps
    other small producers adopt flexible, low-structure management practices while meeting regulatory deadlines. His competitive streak pushes him to continuously improve herd quality and crop yields, while
    his spontaneous nature keeps him open to trying emerging techniques as they arise.
