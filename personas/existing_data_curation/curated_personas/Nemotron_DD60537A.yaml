personas:
  professional: Jordin Greco, a retired carpenter and community volunteer, blends their decades of hands‑on woodworking, garden design, and research expertise with a quietly curious, pragmatic mindset to
    mentor younger volunteers, craft custom furniture, and contribute archival material to the Rensselaer Historical Society.
  sports: Jordin Greco enjoys low‑impact walking along the Hudson River, follows the New York Mets and the Albany Empire for baseball and indoor football, belongs to the Hudson River Rowing Club’s senior
    paddling crew, and they participate in a weekly senior fitness class at the local community center.
  arts: Jordin Greco finds solace in folk music legends like Bob Dylan and Joan Baez, the storytelling of author John Steinbeck, and the classic cinema of Meryl Streep, and they often listen to vinyl records
    while working in their workshop.
  travel: Jordin Greco delights in weekend drives to the Catskill Mountains, has toured historic sites in Boston and Philadelphia, dreams of a summer cruise to the Norwegian fjords, and they prefer meticulously
    planned itineraries that leave room for spontaneous bird‑watching stops.
  culinary: Jordin Greco, an adept home cook, crafts family‑style lasagna with fresh ricotta and oregano, sautés heirloom carrots from their garden with thyme, and occasionally treats themself to a slice
    of New York‑style cheesecake after a week of frugal meals.
  core: Jordin Greco is a quietly curious, hands‑on retiree who balances meticulous budgeting with a love for woodworking, genealogy, and bird‑watching, but they tend to over‑commit to volunteer projects
    at the cost of extra sleep.
background:
  cultural: Jordin is a third-generation Italian-American whose grandparents settled in upstate New York during the early 20th-century immigration wave. He was raised in a Catholic household that emphasized
    family meals, community involvement, and respect for tradition. Growing up in the Rensselaer area, he has blended his heritage with the broader Northeastern U.S. culture, valuing modesty, self-reliance,
    and a strong sense of neighborhood cooperation.
