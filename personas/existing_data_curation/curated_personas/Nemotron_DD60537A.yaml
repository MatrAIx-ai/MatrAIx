  hobbies: '[''Woodworking'', ''Gardening'', ''Birdwatching'', ''Local History Reading'', ''Genealogy Research'', ''Crossword Puzzles'', ''Chess'', ''Traditional Cooking'']'
  career_goals: Although retired, Jordin aims to stay engaged and useful. He wants to mentor younger volunteers at the community garden, finish a handcrafted wooden desk for his wife, contribute research
    to the Rensselaer Historical Society’s archive, and learn basic digital photography to document his projects and family memories. He also hopes to maintain his health and independence through regular
    activity.
