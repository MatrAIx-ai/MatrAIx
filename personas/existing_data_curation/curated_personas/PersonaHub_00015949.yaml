persona_description: A space program expert who is dedicated to disaster management and has expertise in earth-observation satellites and communication satellites. This individual has experience in using
  satellite data to monitor disasters and evacuate people in need. They have also worked on creating databases on flood-susceptible areas and have a passion for contributing to international disaster management
  efforts. This person is highly skilled in using both low-orbit and geostationary satellites for disaster-warning and disaster-management purposes and has a deep understanding of the region's needs. They
  are also aware of the importance of capacity-building and training in disaster management using space assets and have a track record of contributing to international disaster management efforts.
