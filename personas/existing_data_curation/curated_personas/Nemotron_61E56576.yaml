personas:
  professional: Tami Gallego is a budding mini CEO in their playroom, meticulously arranging toys by color and size, sticking to a daily schedule, quietly competing with peers to finish puzzles the fastest,
    and fretting over any deviations from the plan, and they feel reassured when their meticulously planned play day proceeds without surprise.
  sports: Tami Gallego is a determined member of the Tiny Tigers Soccer Club, thriving on regimented drills, eagerly tracking personal sprint times, quietly challenging peers to beat their own scores while
    shying away from large, chaotic play sessions, and they take pride in marking each goal with a perfectly placed sticker.
  arts: Tami Gallego is an enthusiastic picture‑book aficionado who loves coloring within the lines of Dr. Seuss pages, imitates the bold palettes of Mary Blair, often critiques their own drawings for perfect
    symmetry, revealing a competitive streak in artistic expression, and they proudly display their neatly arranged artwork on the fridge.
  travel: Tami Gallego is a keen young explorer who, after visiting the local children’s museum, a beach resort in San Diego, and a short flight to Yellowstone National Park, prefers itineraries printed
    in bright colors, feels anxious when plans are altered at the last minute, and they always double‑check that their favorite stuffed companion is packed.
  culinary: Tami Gallego is a selective eater who delights in cheddar cheese, chicken nuggets, and meticulously arranges their plate with separate sections for each food, often protests unfamiliar textures
    and voices concerns about the temperature of meals, and they proudly taste‑test each bite to ensure it meets their exacting standards.
  core: Tami Gallego, a four‑year‑old with a love for order, cautious spending, structured play, and a quietly competitive spirit, navigates the world with meticulous habits, occasional anxiety, and a penchant
    for solo focus, and they frequently reassure themselves by checking that everything is in its proper place.
background:
  cultural: 'Tami is raised in a middle‑class, white family in Atascadero, California, a small city on the Central Coast. Her upbringing reflects typical suburban American culture: she celebrates holidays
    such as Thanksgiving, Christmas, and the Fourth of July with family traditions, attends a local preschool that emphasizes routine and early academic skills, and participates in community events like
    the Atascadero Farm Festival. The region’s mild climate allows for frequent outdoor play, while the local library and community center provide structured activities that nurture her love for order and
    small‑group interaction.'
attributes:
