  hobbies: '[''Building with LEGO Duplo'', ''Completing jigsaw puzzles'', ''Playing memory/matching games'', ''Reading picture books with predictable plots'', ''Drawing with crayons'', ''Short nature walks
    with family'', ''Attending small-group library storytime'', ''Preschool art projects with step‑by‑step instructions'']'
  career_goals: Although only four, Tami often talks about the future with a clear sense of purpose. She says she wants to be a teacher because she enjoys the structure of a classroom and helping a small
    group of children follow a schedule. She also dreams of becoming an engineer or architect, inspired by her fascination with building blocks and puzzles, and she imagines designing things that are orderly
    and reliable.
