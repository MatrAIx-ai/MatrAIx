personas:
  professional: Erica White is a retired research engineer and data analyst whose mastery of statistical modeling, Python, MATLAB, and legacy FORTRAN code underpins their methodical, competition-driven
    approach to community consulting and mentoring, where they blend scientific rigor with the pragmatic, self-reliant values they cultivated through decades of project management.
  sports: Erica White stays active by joining the Fort Mill senior walking club for morning nature strolls, playing occasional pickleball at the community center, and cheering on the Carolina Panthers and
    Charlotte Hornets, while they follow the seasonal rhythm of planting and pruning as their own low-impact fitness routine.
  arts: Erica White weaves her love of storytelling into quilts inspired by the motifs of Georgia O'Keeffe and the bluegrass melodies of Dolly Parton, while they devote evenings to reading biographies of
    Marie Curie and enjoying the soulful gospel performances of the local church choir, often replaying Ansel Adams’ nature photographs on their tablet.
  travel: Erica White prefers meticulously planned road trips that let them photograph native birds along the Blue Ridge Parkway and explore historic Charleston, while their bucket list includes a spring
    pilgrimage to the gardens of Kyoto and a summer visit to the National Gallery in London, always budgeting each journey with a detailed spreadsheet.
  culinary: Erica White, an avid gardener-chef, delights in turning freshly picked tomatoes, okra, and sweet corn into Southern classics like shrimp and grits, collard greens simmered with smoked turkey,
    and a fragrant chicken-and-dumpling stew, while they occasionally splurge on a slice of pecan pie for dessert and carefully season each dish with cracked black pepper and fresh thyme.
  core: Erica White is a methodical, competition-driven former engineer who balances a lifelong love of data-driven problem solving with a quirky habit of over-watering her garden and a secret penchant
    for binge-reading mystery novels late into the night, and they often reward themselves with a cup of strong black coffee after a long chess match.
background:
  cultural: Erica was born in 1949 into a middle‑class white family in the Carolinas and grew up during a period of social change in the American South. Her upbringing emphasized hard work, self‑reliance,
    and community involvement, values that have shaped her pragmatic worldview. As one of the early women encouraged to pursue a STEM education, she developed a competitive drive and a skeptical eye toward
    established norms, fueling her determination to succeed in a male‑dominated field. Southern hospitality, church community, and a deep appreciation for the region's natural landscapes have influenced
    her love of gardening, birdwatching, and preserving local history. These cultural influences continue to inform her personal and civic engagements in Fort Mill, South Carolina.
attributes:
  skills: '[''Statistical modeling'', ''Experimental design'', ''Programming (Python, MATLAB, FORTRAN)'', ''Data visualization'', ''Technical writing'', ''Project management'', ''Cross-functional team leadership'',
