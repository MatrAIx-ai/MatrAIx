    Local Food Scene'']'
  career_goals: Abrianna aims to become a senior project engineer within the next three years, leading complex automotive component development projects at a major OEM in the Detroit area. She plans to
    obtain her Professional Engineer (PE) license and pursue certification in Lean Six Sigma Black Belt to enhance her ability to drive efficiency and sustainability initiatives. Long‑term, she aspires
    to transition into a senior management role where she can shape product strategy, mentor junior engineers, and champion environmentally responsible design practices. Her ambition is balanced by a desire
    for steady progression, ensuring each step is well‑planned and achievable.
