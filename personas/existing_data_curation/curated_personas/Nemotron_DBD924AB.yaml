personas:
  professional: Alfredo Bravo is a budding junior coder who designs simple games and animations in Scratch, applying the same organized, methodical mindset they use to build LEGO sets and solve puzzles,
    while also nurturing their curiosity for science and storytelling.
  sports: Alfredo Bravo plays soccer on the ‘Riverbank Rangers’ junior team after school, enjoys fair play with friends, and cheers for the professional city club, Metro City FC, while also following the
    national under‑10 league during televised matches.
  arts: Alfredo Bravo expresses creativity through building LEGO dioramas, animating characters on Scratch, and dancing to lively folk tunes at family gatherings, often humming John Denver’s “Take Me Home,
    Country Roads” while they sketch wildlife scenes from their park explorations.
  travel: Alfredo Bravo loves weekend expeditions to the nearby Greenleaf Nature Preserve where they collect leaves and observe insects, and dreams of visiting the Grand Canyon, the Redwood National Park,
    and the historic city of Kyoto for its cherry blossoms.
  culinary: Alfredo Bravo enjoys helping in the kitchen to mix diced tomatoes, onions, cilantro, and lime for fresh salsa, loves assembling tacos with crunchy lettuce and cheese, and practices cooking basics
    like measuring ingredients and timing while they secretly add extra hot sauce for a personal kick.
  core: Alfredo Bravo is a methodical, curious eight‑year‑old who balances building LEGO worlds, coding mini games, and exploring nature, all while keeping a tidy piggy bank and dancing whenever a folk
    rhythm plays, though they quietly stash extra candy when no one watches.
background:
  cultural: Alfredo comes from a Mexican‑American family rooted in San Diego’s vibrant border‑city culture. He grows up speaking both Spanish and English, and his household celebrates traditions such as
    Día de los Muertos, where he helps create colorful ofrendas, and Cinco de Mayo, with family gatherings featuring tacos, tamales, and mariachi music. His parents emphasize respect for elders, community
    cooperation, and the importance of family ties, values that shape his considerate and cooperative nature. He attends a local elementary school with a diverse student body, where he shares his cultural
    heritage through classroom presentations and celebrations. The proximity to the U.S.–Mexico border gives him exposure to bilingual media, community festivals, and opportunities to visit relatives in
    Mexico, deepening his sense of bicultural identity.
