  career_goals: Alfredo dreams of a future where he can combine his love of science, technology, and helping others. He talks about becoming an environmental engineer who designs projects to keep San Diego’s
    beaches clean and protect local wildlife, especially sea turtles. He also imagines running a community robotics or coding club for younger kids, teaching them how to turn ideas into simple programs.
    Inspired by his curiosity about living things, Alfredo sometimes picture himself as a marine biologist studying ocean ecosystems. In the long term, he hopes his work will make his neighborhood a healthier,
    more sustainable place while allowing him to share his knowledge with peers.
