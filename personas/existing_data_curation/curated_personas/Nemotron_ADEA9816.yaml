  hobbies: '[''Visiting art galleries and museums'', ''Street and event photography'', ''Pickup basketball and soccer games'', ''Playing pool/billiards'', ''Cooking and experimenting with fusion recipes'',
    ''Karaoke with friends'', ''Exploring Houston’s diverse food scene'', ''Volunteering at Vietnamese cultural festivals'', ''Reading art history and watching independent films'']'
  career_goals: Tham hopes to turn his love of food and community into a modest venture, such as a weekend food‑truck or a stall at Houston’s farmers market that offers creative Vietnamese‑American fusion
    dishes. He also wants to formalize his role as a cultural liaison by organizing regular art‑and‑culture workshops for seniors and teenagers in the local Vietnamese community, helping preserve traditions
    while inviting fresh ideas. Improving his organizational habits is a personal goal, as he believes a more structured approach will enable him to manage a small business and lead larger community projects.
    Long‑term, he dreams of traveling back to Vietnam to document regional culinary techniques and bring those stories to his Houston audience.
