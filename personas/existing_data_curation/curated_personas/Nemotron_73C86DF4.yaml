personas:
  professional: Ricardo Figueroa, a 20‑year‑old licensed OUV captain, merges traditional seamanship with modern GPS and solar‑powered upgrades, guiding bilingual sunrise tours while balancing their curious
    tinkering with a laid‑back, flexible work style that keeps safety front and center.
  sports: Ricardo Figueroa spends weekends paddling the San Antonio River with the local kayak club, joins the community sailing crew on the Hill Country lake, and cheers for the San Antonio Spurs while
    occasionally shooting hoops at the neighborhood rec center.
  arts: Ricardo Figueroa strums the guitarra to the rhythms of norteño legend Ramón Ayala and Los Lobos, crafting original river‑themed ballads that echo the storytelling traditions of early folk troubadours.
  travel: Ricardo Figueroa prefers impromptu road trips that blend river kayaking in the Hill Country with sunset stops in Galveston and occasional jazz‑filled evenings in New Orleans, always scouting affordable
    eco‑lodges for their next low‑key adventure.
  culinary: Ricardo Figueroa’s palate gravitates toward smoky fish tacos, freshly made guacamole with lots of cilantro and lime, and spicy chiles rellenos, and their modest kitchen prowess lets them whip
    up these dishes on a portable grill after a day on the water.
  core: Ricardo Figueroa navigates life like their boat—steady under pressure, powered by curiosity, yet occasionally drifting into disorganized waters when the lure of new gadgets outweighs meticulous
    planning.
background:
  cultural: 'Ricardo is a first‑generation Mexican American raised in San Antonio’s vibrant Bexar County neighborhoods. He grew up speaking Spanish at home while navigating a bilingual school environment,
    which gave him a deep appreciation for both Mexican traditions—such as Día de los Muertos celebrations, family reunions centered around tamales, and regional música norteña—and Texan customs like high‑school
    football gatherings and bar‑bacá. His cultural identity shapes his personal and professional life: he often incorporates Mexican folklore in his boat tours, offers bilingual commentary to passengers,
    and supports local Mexican‑owned businesses. His heritage instills a strong sense of community, respect for elders, and a pragmatic work ethic that aligns with his practical yet curious personality.'
attributes:
  skills: '["Small‑vessel navigation", "GPS and electronic charting", "VHF radio communication", "US Coast Guard safety compliance", "Engine diagnostics and maintenance", "Knot tying and traditional seamanship",
    "Bilingual customer service (English/Spanish)", "Eco‑friendly boat modifications"]'
  hobbies: '["Kayaking", "Bass fishing", "Sailing dinghies", "Playing guitarra", "Composing folk songs", "Attending Tex‑Mex festivals", "River clean‑up volunteering", "Reading maritime history", "DIY boat
    tech projects"]'
  career_goals: Ricardo aims to upgrade his OUV license to a US Coast Guard Master Captain credential within the next three years, allowing him to operate larger passenger vessels on the Gulf Coast. He
    hopes to launch his own boutique eco‑tourism charter company that offers sunrise river tours, sustainable fishing trips, and cultural storytelling in both English and Spanish. In the long term, he envisions
    expanding the fleet to include electric‑powered water taxis that connect San Antonio’s historic districts with the nearby Hill Country waterways, blending his practical maritime skills with his curiosity
    for green technology and entrepreneurship.
