personas:
  professional: Manuel Golson is a construction foreman who leverages his hands‑on building expertise and meticulous project‑management skills—using MS Project, Procore, and lean construction principles—to
    keep multimillion‑dollar jobs on schedule, under budget, and safety‑compliant, while their competitive skepticism drives rigorous vendor negotiations and positions them for a future Certified Construction
    Manager credential.
  sports: Manuel Golson avidly follows the Indiana Pacers and travels to watch the Hoosier State high‑school basketball championship, trains with the Wabash River 5K Running Club for weekly distance runs,
    and volunteers as a bench‑warmer at local youth soccer games, embodying a balanced blend of spectator enthusiasm and personal fitness.
  arts: Manuel Golson finds creative release in woodworking, crafting custom furniture inspired by the clean lines of mid‑century modern designers like Charles and Ray Eames, while they unwind listening
    to heartland folk legends such as John Prine and attending occasional live performances at the historic Crosley Theatre, occasionally dabbling in sketching blueprint‑inspired art during downtime.
  travel: Manuel Golson prefers purposeful road trips that blend work and leisure, planning weekend getaways to the Indiana Dunes for fishing at Lake Michigan, a weekend hike in the Red River Gorge, and
    annual trips to Chicago to network at construction expos while savoring the city’s blues scene; their budget‑conscious approach favors booking through the family’s travel savings account and using a
    reliable SUV for the journey.
  culinary: Manuel Golson enjoys hearty Midwestern fare, favoring a perfectly seared catfish fillet seasoned with Cajun spices, a side of sweet corn succotash, and a cold craft IPA, while their woodworking
    hobby translates into a knack for grilling over a charcoal smoker they built themselves; they also experiment with sustainable recipes like quinoa‑studded vegetable medleys and occasionally indulge
    in a late‑night slice of deep‑dish pizza from a local pizzeria.
  core: Manuel Golson is a detail‑driven builder who balances a competitive edge with community‑focused volunteerism, turning every project—whether a multi‑million‑dollar site or a backyard bookshelf—into
    a lesson in efficiency, all while keeping a schedule tight enough to fit in fishing, 5K runs, and a weekly chess match.
background:
  cultural: Manuel was raised in a small Midwestern town in Indiana, steeped in traditional white, European‑American roots—primarily German and Irish ancestry. His upbringing emphasized hard work, self‑reliance,
    and community responsibility, values reinforced by a close‑knit family and local church involvement. The region's strong support for high school sports, especially basketball, and a hands‑on, practical
    approach to problem‑solving have shaped his worldview. Growing up in a working‑class environment, he learned trade skills through apprenticeships rather than formal schooling, fostering a pragmatic,
    results‑oriented mindset that carries into his professional and personal life.
attributes:
  skills: '[''Project Planning'', ''Construction Scheduling (MS Project, Procore)'', ''Budgeting & Cost Control'', ''Site Safety Management'', ''Blueprint Interpretation'', ''Subcontractor Negotiation'',
    ''Procurement & Material Management'', ''Quality Assurance & Inspection'', ''Team Leadership'', ''Risk Assessment'', ''Lean Construction Principles'', ''Conflict Resolution'', ''Vendor Relationship
    Management'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''DIY Home Renovation'', ''Indiana High School Basketball'', ''Chess'', ''Running (5K races)'', ''Community Volunteering (Habitat for Humanity)'']'
  career_goals: Manuel aims to secure a Certified Construction Manager (CCM) credential within the next two years and use it to lead larger, multi‑million‑dollar commercial projects across the Midwest.
    Over the next five years, he hopes to be promoted to senior construction manager or regional director, overseeing multiple job sites and mentoring emerging foremen. Ultimately, he envisions launching
    his own mid‑size construction firm that specializes in sustainable, green building practices, establishing a reputation for safety excellence and on‑time delivery while providing stable, well‑paid jobs
    for his community.
