  hobbies: '[''Fly Fishing'', ''Woodworking'', ''Reading True Crime'', ''Gardening'', ''Classic Country Music'', ''Veterans Club Volunteering'', ''Classic American Films'']'
  career_goals: As he approaches retirement, Donald aims to transition into a mentorship and advisory role, leading a dedicated cold‑case task force to solve unsolved crimes in Oklahoma County. He aspires
    to develop a training program for new investigators, author a practical guide on investigative best practices, and contribute his expertise as a consultant for major cases. His competitive drive fuels
    a desire to close at least one high‑profile unsolved case before stepping down.
