personas:
  professional: Detective Donald White, a 63‑year‑old veteran homicide investigator with 35 years of experience, leverages his methodical case‑management skills, forensic expertise, and competitive drive
    to mentor junior officers and spearhead a cold‑case task force in Oklahoma County, while maintaining a disciplined, structure‑oriented approach to every briefing and report.
  sports: Donald White, a devoted fan of the Oklahoma City Thunder and the Oklahoma Sooners football team, participates in early‑morning walks with his veterans’ club companions, occasional senior golf
    outings at the local country club, and maintains a disciplined fitness routine that balances his love of gentle exercise with the practical constraints of his age.
  arts: Donald White finds solace in classic country melodies from Johnny Cash and Dolly Parton while regularly watching John Wayne and Humphrey Bogart films, a cultural habit that infuses his evenings
    with nostalgic Americana and reinforces their appreciation for timeless storytelling.
  travel: Donald White, preferring structured itineraries, plans seasonal fly‑fishing trips to Minnesota’s Lake Superior and weekend getaways to Yellowstone National Park, balancing his love of nature with
    budget‑conscious travel and the occasional yearning to explore the historic fishing villages of Nova Scotia.
  culinary: Donald White, an adept home cook, favors hearty dishes like slow‑cooked beef chili with garden‑grown bell peppers and onions, pairs it with a crisp local craft beer, and occasionally experiments
    with smoked trout caught on his fishing excursions, though they tend to over‑salt their meals when stressed.
  core: Detective Donald White, a structured yet quietly competitive retiree, blends his love for old‑school crime novels, classic country tunes, and meticulous woodworking into a life marked by disciplined
    mentorship, cautious finances, and a lingering quest to solve one final cold case.
background:
  cultural: Donald was born and raised in a rural community near Oklahoma City, growing up in a middle‑class white family with deep roots in the American Midwest. His upbringing emphasized self‑reliance,
    respect for authority, and community service. He was exposed to country music, high school football, and local traditions such as county fairs and church gatherings, which reinforced a strong sense
    of regional identity. These cultural influences have shaped his disciplined work ethic, his appreciation for order, and his preference for close‑knit social circles.
attributes:
  skills: '[''Investigative Interviewing'', ''Crime Scene Processing'', ''Forensic Evidence Collection'', ''Case File Management'', ''Analytical Report Writing'', ''Cold Case Review'', ''Stakeholder Briefing'',
