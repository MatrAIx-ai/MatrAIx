persona_description: A poultry farmer and researcher who is interested in understanding the environmental and agronomic practices that influence the fate and transport of nutrients and microbes from poultry
  litter applied to pasture lands. This person is dedicated to improving efficient farm practices and has a strong interest in studying the spatial distribution, concentration, and types of mineral nutrients,
  gases, and microbes in poultry litter in a broiler house as affected by environment, house management, and successive broods of broilers. They are also interested in studying the fate and transport of
  pathogenic bacteria in previously established broiler houses and examining the effects of litter management on potential movement of bacteria from established to new production houses.
