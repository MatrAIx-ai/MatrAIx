  career_goals: Lindell aims to move into a principal engineer or engineering manager position where she can shape technical strategy, lead cross‑functional teams, and champion best practices in software
    delivery. She seeks to mentor the next generation of developers, especially women and under‑represented groups, and to promote sustainable, cloud‑native architectures within her organization. Over the
    longer term she envisions founding a boutique consultancy that helps small businesses in the Charleston region modernize their digital operations while honoring local culture.
