persona_description: A NASA engineer and aerospace scientist with expertise in developing and testing novel propulsion systems for small interplanetary spacecraft. They are responsible for overseeing the
  construction of the 12U nanosatellite bus and its integration with the full payload at NASA Ames facilities. They are excited about the potential of solar sails for future interplanetary missions and
  are eager to contribute to the validation of a new beam-powered propulsion system using NanoAvionics' 12U bus.
