  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Nature Photography'', ''Reading Historical Non-fiction'', ''Genealogy Research'', ''Volunteer Work at Senior Center'', ''Playing Bridge'', ''Cooking
    Family Recipes'', ''Listening to Classic Rock'']'
  career_goals: Eric aims to transition into a freelance consulting role that supports local non‑profits and family‑owned businesses, designing campaigns that strengthen community cohesion. He plans to
    launch a mentorship program for emerging marketers through the Berks County Chamber of Commerce, sharing his practical know‑how while fostering collaborative culture. Over the next few years, he hopes
    to create an annual “Senior Friendly Business” outreach event that connects seniors with essential services. At the same time, he seeks a more balanced workload to lessen his worry‑prone tendencies,
    gradually reducing full‑time responsibilities while maintaining a meaningful impact.
