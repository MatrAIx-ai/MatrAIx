  career_goals: Mary aspires to attend a specialized art college such as CalArts or an interdisciplinary design program, aiming to become a concept artist or UI/UX designer for video games or multimedia
    projects. She hopes to secure a scholarship based on her portfolio, later establishing a freelance studio that blends visual art with environmental storytelling, possibly collaborating on marine‑conservation
    campaigns. In the long term she wants to travel internationally to engage with diverse artistic communities while building a reputation for innovative, boundary‑pushing work.
