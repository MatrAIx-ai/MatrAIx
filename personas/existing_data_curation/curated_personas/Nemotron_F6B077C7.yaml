  hobbies: '[''Gardening'', ''Hiking'', ''Fishing'', ''DIY woodworking'', ''Cooking (farm-to-table)'', ''Playing acoustic guitar'', ''Reading about sustainable agriculture'', ''Volunteer at community garden'',
    ''Watching classic movies'', ''Casual video gaming'']'
  career_goals: Timothy aims to move from a versatile labor role toward a more structured position such as farm manager or agronomist, where he can apply his detailed record‑keeping and planning skills
    on a larger scale. He plans to complete a certification in sustainable agriculture and explore precision‑farming technologies to improve efficiency. In the long term, he hopes to acquire a modest parcel
    of land to run his own organic vegetable garden, integrating community‑supported agriculture (CSA) models that strengthen local food networks. Financial stability, the ability to mentor younger workers,
    and contributing to Vallejo’s growing farm‑to‑table movement are central to his ambitions.
