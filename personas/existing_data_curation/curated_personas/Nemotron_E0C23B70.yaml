  hobbies: '[''Cooking traditional Guatemalan dishes'', ''Gardening (vegetables, herbs, chilies)'', ''Knitting and crochet'', ''Reading bilingual literature'', ''Listening to marimba and Latin American
    music'', ''Attending Catholic services'', ''Senior exercise classes'', ''Volunteering at the food bank'', ''Video calling with grandchildren'']'
  career_goals: Although retired from formal employment, Emigdia aims to expand her impact as a cultural ambassador within the Norwalk community. She plans to develop a monthly cooking class that teaches
    authentic Guatemalan recipes to seniors and their families, preserving culinary heritage. She also aspires to become a volunteer coordinator at the local senior center, organizing wellness programs
    and intergenerational activities. Personal ambitions include completing a senior‑citizen digital skills workshop, compiling a family recipe book, and leading a community garden project that promotes
    healthy eating and cultural exchange.
