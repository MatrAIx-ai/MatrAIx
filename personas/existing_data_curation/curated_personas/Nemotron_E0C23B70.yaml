personas:
  professional: A retired community organizer and cultural ambassador, Emigdia Romero leverages their disciplined planning and bilingual fluency to coordinate senior‑center workshops, local festivals, and
    intergenerational cooking classes, and they blend curiosity for new ideas with a practical, high‑standard approach.
  sports: An enthusiastic supporter of hometown teams, Emigdia Romero follows the New York Yankees and New England Patriots on television, joins a Norwalk YMCA walking group for seniors, participates in
    low‑impact fitness classes, and they cherish the camaraderie of cheering on the Yankees during spring training.
  arts: A devoted lover of music and literature, Emigdia Romero enjoys marimba performances by Los Gaiteros, reads bilingual poetry collections by Octavio Paz, appreciates classic films starring Fred Astaire,
    and they often hum the melodies while crocheting blankets for charity.
  travel: An adventurous yet budget‑conscious traveler, Emigdia Romero has explored historic Boston, the scenic Maine coastline, the bustling markets of Oaxaca, and they dream of a tranquil pilgrimage to
    the mist‑covered highland lakes of their birthplace, always planning trips with careful itineraries and modest accommodations.
  culinary: A culinary storyteller, Emigdia Romero prepares pepian, tamales, and sweet atol with a twist of quinoa and locally grown chilies, expertly balances flavors with fresh tomatoes and cinnamon,
    experiments with non‑traditional herbs like rosemary, and they share these dishes at community gatherings, delighting neighbors with each aromatic bite.
  core: Emigdia Romero, a disciplined senior cultural ambassador, blends meticulous organization with heartfelt curiosity, turning garden harvests and heritage recipes into community celebrations, all while
    they manage a careful budget, health routines, and a love for classic sports and the arts.
background:
  cultural: Emigdia was born in the highlands of Guatemala and grew up immersed in a family‑centered, Catholic community where celebrations such as Día de los Muertos and Semana Santa were integral. Her
    upbringing emphasized respect for elders, communal sharing, and the preservation of indigenous and Spanish‑influenced traditions, especially in cuisine, music, and storytelling. After moving to Norwalk,
    Connecticut, she has blended her heritage with American life, actively participating in local Latin American festivals, supporting the Guatemalan diaspora, and teaching cultural practices to neighbors.
    Her bilingual fluency and deep appreciation for both Guatemalan and American customs shape her identity and guide her contributions to the community.
attributes:
  skills: '[''Traditional Guatemalan cooking'', ''Household budgeting and financial organization'', ''Community event planning and coordination'', ''Gardening and sustainable horticulture'', ''Knitting
