persona_description: A geologist who specializes in the study of igneous and deformational history in the northern midcontinent of the United States, with a particular focus on the late Paleoproterozoic
  period. This person is interested in understanding the change in subduction polarity from geon 18 south-dipping subduction during Penokean accretion to geon 17 north-dipping subduction as convergence
  continued after Penokean orogenesis. They are also interested in the tectonic history of the region, particularly the 1900-1600 Ma tectonic history of the north-central United States, and the role of
  subduction flip and continued convergence in the formation of the southern Laurentian margin. This person is likely to be interested in the details of the U-Pb zircon geochronology of Paleoproterozoic
  plutons from the northern midcontinent, USA, and the implications of these results for the understanding of subduction polarity and convergence in the region.
