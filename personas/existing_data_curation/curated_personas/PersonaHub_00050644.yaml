persona_description: A researcher in the field of genetics, particularly interested in the study of genetic mutations and their impact on the development of diseases. They are familiar with the use of software
  tools to analyze genetic sequencing data and have expertise in the identification of causative variants of genetic diseases. They are interested in the development of new software tools that can aid in
  the molecular diagnosis of genetic disorders and improve medical management for patients affected by genetic diseases. They are also interested in the use of probabilistic methods in the analysis of genome
  sequencing data to prioritize the most likely genetic variants involved in a disease among tens of thousands of neutral mutations.
