personas:
  professional: Richard Wiley, a retired farmhand turned senior volunteer coordinator, leverages decades of carpentry, equipment troubleshooting, and garden planning to organize church events with methodical
    precision, while they keep tinkering with new tools out of curiosity and apply a practical mindset that ensures every project stays on schedule.
  sports: Richard Wiley follows the Dallas Cowboys football and Houston Astros baseball teams avidly, participates in the local senior walking club and a community bowling league, and they treat their daily
    garden labor, early‑morning stretches, and occasional light weight‑lifting as the primary fitness regimen, balancing competitive fandom with low‑impact activity suitable for an 85‑year‑old.
  arts: Richard Wiley enjoys classic country tunes from Willie Nelson, Loretta Lynn, and the Carter Family on his morning radio, revisits John Wayne’s western films on weekends, and they find these cultural
    touchstones shape their identity and leisure.
  travel: Richard Wiley prefers short, organized road trips with his daughter’s family, has visited the San Antonio River Walk, the Texas Hill Country in Fredericksburg, and a weekend getaway to Santa Fe,
    New Mexico, and they dream of a leisurely drive to the Oregon Coast in the fall, balancing their love of familiar scenery with a cautious approach to long travel due to age‑related mobility concerns.
  culinary: Richard Wiley, an avid gardener and modest home cook, often prepares fresh garden salads with heirloom tomatoes and zucchini, whips up chicken‑fried steak with creamy mashed potatoes, savors
    a bowl of Texas‑style chili topped with shredded cheddar, and they treat themselves to peach cobbler using ripe orchard peaches, showcasing a love for hearty, farm‑to‑table comfort food.
  core: Richard Wiley, a meticulous yet worry‑prone 85‑year‑old gardener, dedicates his days to nurturing vegetables, fine‑tuning woodworking projects, and mentoring grandchildren, while they occasionally
    over‑budget hobby supplies and forget to take prescribed meds on time.
background:
  cultural: Richard grew up on a modest farm near Llano County in the 1930s, a period shaped by the Great Depression and World II. His family’s roots trace back to Anglo‑American settlers mixed with German
    immigrants who arrived in Central Texas in the late 1800s. The community’s culture emphasized self‑reliance, hard work, and a close‑knit church life, values that have guided Richard throughout his life.
    He identifies with the traditions of rural West Texas—Sunday church attendance, country music, and a deep respect for the land—while also maintaining a quiet curiosity about new ideas and technologies.
