  hobbies: '[''Woodworking'', ''Home Improvement'', ''Gardening'', ''Fishing'', ''Hunting'', ''Model Railroading'', ''Local History Society Volunteer'', ''Community Festival Attendance'', ''Craft Beer Tasting'',
