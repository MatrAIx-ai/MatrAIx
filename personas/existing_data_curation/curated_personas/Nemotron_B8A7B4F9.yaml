personas:
  professional: Madeline Hernandez is a senior‑level business strategist who leverages advanced data analysis in Python and R, Lean Six Sigma process‑improvement expertise, and design‑thinking visual storytelling
    to drive socially impactful initiatives, while nurturing cross‑functional collaboration with a compassionate, consensus‑building style that reflects her organized, methodical nature and curiosity for
    innovative solutions.
  sports: Madeline Hernandez stays active by joining the Broward Saturday Runners Club for weekly long runs, playing beach volleyball at Fort Lauderdale during the summer, cheering on the Miami Heat and
    Tampa Bay Rays, and fitting high‑intensity interval training at a local CrossFit box into her calendar, though she sometimes skips a scheduled gym session when a project deadline looms.
  arts: Madeline Hernandez indulges her curiosity for art by visiting the Glades Contemporary Museum, creating vibrant watercolor paintings inspired by the bold colors of Frida Kahlo and the contemporary
    portraiture of Kehinde Wiley, listening to classic merengue legends like Celia Cruz alongside modern star Bad Bunny, and attending off‑Broadway productions featuring Lin‑Manuel Miranda, all of which
    fuel her visual storytelling at work.
  travel: Madeline Hernandez prefers meticulously planned weekend escapes to the Florida Keys and cultural festivals in New Orleans, while day‑dreaming about an immersive month‑long sojourn in Cartagena’s
    historic Old Town and a spring art pilgrimage to Barcelona, balancing these travel ambitions with a limited vacation budget and family commitments.
  culinary: Madeline Hernandez showcases her culinary passion by expertly simmering a fragrant sancocho packed with plantain, yucca, and sofrito for family gatherings, hand‑crafting mofongo with garlic‑infused
    broth and tostones, experimenting with fusion dishes like quinoa‑topped arepas, yet she often burns the edges of her watercolor sketches when the kitchen smoke sets off her fire alarm.
  core: Madeline Hernandez blends analytical precision with vibrant creativity, driven by a deep commitment to uplift under‑represented talent, while navigating the highs and lows of anxiety that spark
    both innovative breakthroughs and occasional over‑extension.
background:
  cultural: Madeline is a first-generation American of Dominican descent. She was raised in a bilingual household where Spanish and English intertwined, and the rhythms of merengue, bachata, and traditional
    Dominican folklore were a daily soundtrack. Family gatherings emphasized hospitality, communal meals, and the celebration of cultural holidays such as Carnaval and Día de los Santos. These roots instilled
    a strong sense of collectivism, respect for elders, and pride in Caribbean artistic expression, which she carries into her professional life through a collaborative work style and an appreciation for
    vibrant, culturally-rich perspectives. Living in Broward County’s diverse community, she actively participates in local Latino cultural festivals and mentors young Dominican students interested in STEM.
attributes:
  skills: '[''Data Analysis (Python, R, SQL)'', ''Statistical Modeling & Forecasting'', ''Business Intelligence & Data Visualization'', ''Lean Six Sigma Process Improvement'', ''Project Management & Scheduling'',
    ''Stakeholder Engagement & Communication'', ''Conflict Resolution & Mediation'', ''Design Thinking & Innovation Facilitation'', ''Emotional Intelligence & Empathy'', ''Mentoring & Team Development'',
    ''Bilingual Communication (Spanish/English)'', ''Diversity & Inclusion Advocacy'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Cooking Dominican cuisine'', ''Attending merengue and salsa dance events'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Volunteer work with mental-health and STEM tutoring programs'', ''Exploring new restaurants and tasting diverse cuisines'', ''Traveling to the Dominican Republic to connect with family'', ''Reading
    books on psychology, creativity, and design thinking'']'
  career_goals: Madeline aims to advance into senior strategic leadership, ideally as a Director of Business Strategy or a Principal Management Consultant, where she can shape data-driven initiatives that
    also prioritize social impact. She plans to earn an MBA with a concentration in Social Entrepreneurship and to attain a Lean Six Sigma Black Belt to deepen her operational expertise. A core ambition
    is to develop a company-wide program that integrates community-focused analytics, providing mentorship and internship pathways for Dominican and other under-represented youth in STEM. She also aspires
    to publish thought-leadership pieces on the intersection of analytics, creativity, and mental-wellness, positioning herself as a champion for humane, inclusive workplaces while maintaining a sustainable
    work-life balance.
