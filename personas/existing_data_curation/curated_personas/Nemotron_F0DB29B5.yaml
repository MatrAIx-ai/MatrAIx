  career_goals: Although retired from full‑time employment, Heston is driven to continue making an impact. He aims to establish a scholarship fund for underrepresented students pursuing STEM at local colleges,
    serve on the board of a community nonprofit focused on youth technology programs, and complete an advanced certification in data science to stay current with emerging technologies. He also hopes to
    author a memoir that chronicles his career and the lessons of resilience and discipline, inspiring future generations.
