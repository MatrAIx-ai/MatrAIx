personas:
  professional: Heston Adeogun leverages four decades of senior civil engineering and data analysis experience, pairing meticulous project management, statistical modeling, and technical writing with mastery
    of Python, MATLAB, and GIS to consistently deliver complex infrastructure projects on schedule while mentoring junior engineers and lecturing in mathematics and computer science, and they apply their
    organized, achievement-driven, and competitive nature to every professional challenge.
  sports: Heston Adeogun competes in the Prince George's Senior Hoops Legends basketball league each week, proudly follows the Washington Wizards and Washington Capitals as a season ticket holder, and they
    balance their competitive drive on the court with a structured fitness routine that includes strength training and regular bridge club meet-ups, showcasing a sociable yet disciplined approach to athletics
    and teamwork.
  arts: Heston Adeogun regularly attends community theater productions at the local Playhouse, draws inspiration from the improvisational brilliance of Miles Davis, the soulful saxophone lines of John Coltrane,
    and the vibrant Afro-beat rhythms of Fela Kuti, and they weave this musical appreciation into neighborhood gatherings, illustrating how the arts shape their identity and leisure.
  travel: Heston Adeogun plans meticulously coordinated trips with their spouse to historic sites such as the ruins of Pompeii, the pyramids of Giza, Colonial Williamsburg, and the UNESCO-registered historic
    district of Lagos, balancing adventurous exploration with comfortable accommodations, funding these journeys through a dedicated vacation savings account, and they occasionally allow for spontaneous
    detours to local festivals when the itinerary permits.
  culinary: Heston Adeogun skillfully prepares traditional Yoruba dishes like jollof rice, egusi soup with melon seeds, and pounded yam spiced with smoked fish and fresh garden vegetables, showcasing an
    intermediate cooking skill set and a penchant for sourcing palm oil, scotch bonnet peppers, and locally grown produce, and they delight in sharing generous platters at neighborhood potlucks, where their
    love of communal dining and cultural flavors shines.
  core: Heston Adeogun is a disciplined, socially vibrant lifelong learner who blends rigorous structure with a love for community, juggling senior basketball, bridge strategy, mentorship, and vibrant culinary
    traditions, yet they sometimes over-schedule their days, neglecting needed rest.
background:
  cultural: Heston is a first‑generation American of Yoruba Nigerian descent. He grew up in a household where Yoruba language, proverbs, and cultural celebrations blended with the broader African‑American
    experience of Washington, D.C.’s vibrant Black community. In Prince George’s County, he actively participates in cultural events such as Kwanzaa celebrations and the annual Maryland African Festival,
    and he maintains strong ties to the local Black church. His cultural identity informs his values of community service, respect for elders, and a commitment to uplifting the next generation of Black
    engineers and scientists.
