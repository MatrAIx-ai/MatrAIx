persona_description: A financial planner who specializes in developing comprehensive financial plans for individuals, families, and businesses. They have a deep understanding of the financial planning process,
  including the evaluation of financial status, setting financial goals and objectives, and developing recommendations for actions. They are skilled in analyzing and evaluating financial status, setting
  financial goals and objectives, and developing recommendations for actions. They have a strong focus on risk management, time horizons, and sustainability, and are skilled in using actuarial tables to
  estimate longevity. They are also skilled in using Monte Carlo simulations to generate planning results and projections. They have a unique perspective on the importance of having some level of liquid
  assets in retirement and the need to consider bequest motives. They have a deep understanding of investment costs and the need to incorporate them into any projections or discussions.
