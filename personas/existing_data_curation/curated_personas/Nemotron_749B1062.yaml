  career_goals: Elsie aims to transition into a senior advisory role within the administrative department, where she can mentor emerging supervisors and codify best‑practice procedures for office operations.
    Over the next few years she plans to obtain a Certified Administrative Professional (CAP) credential and lead a cross‑departmental efficiency initiative that reduces error rates and streamlines workflow.
    She also seeks a phased‑retirement arrangement that allows her to continue contributing part‑time while focusing on personal health, family time, and community volunteer work.
