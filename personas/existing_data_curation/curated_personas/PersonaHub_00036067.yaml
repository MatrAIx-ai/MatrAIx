persona_description: A chemistry teacher who emphasizes the use of safe and non-toxic methods in the laboratory. They are interested in developing alternative and heavy-metal-free detection methods for
  disaccharides and have a particular interest in the Woehlk and Fearon tests. They are open to incorporating the use of hexamethylenediamine in their teaching and are aware of the potential hazards associated
  with the use of ammonia. They are also interested in improving the efficiency and safety of laboratory procedures, such as the use of inverter technology and rotating plates in microwave ovens.
