  hobbies: '["Reading adventure/science books", "LEGO and K''NEX building", "Minecraft (single‑player)", "Simple science experiments", "Snap‑Circuits tinkering", "Nature walks and wildlife journaling",
    "Puzzle solving (jigsaw, logic games)"]'
  career_goals: 'Edwin dreams of turning his love for building and problem solving into a future career as an engineer or inventor. He imagines designing functional machines, perhaps in robotics or environmental
    technology, and is already setting realistic milestones: mastering school science and math, expanding his coding skills, and continuing hands‑on projects at home. He also harbors a quieter ambition
    to study wildlife, hoping to combine engineering with conservation work someday.'
