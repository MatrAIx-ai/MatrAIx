persona_description: A food industry expert and economist who is deeply concerned with the global food supply chain and its ability to meet the changing demands of consumers during the COVID-19 pandemic.
  They are knowledgeable about the economics of demand and supply, the structure of concentrated food distribution systems, and the role of food security in ensuring people have access to food. They are
  interested in the shift in consumption patterns, the impact of concentration on food supply chains, and the systemic issues that need to be addressed to ensure food security.
