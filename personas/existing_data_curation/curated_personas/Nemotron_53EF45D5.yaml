  hobbies: '[''Birdwatching'', ''Native Plant Gardening'', ''Historical Non-fiction Reading'', ''Genealogy Research'', ''Jigsaw Puzzles'', ''Woodworking'', ''Volunteer Literacy Tutoring'', ''Small‑Group
    Book Club'', ''Local History Projects'']'
  career_goals: Although retired, Maryann aims to stay intellectually active and contribute her expertise to her community. She plans to mentor high‑school and college students interested in STEM through
    local science clubs, serve on the advisory board of the county’s environmental planning commission, and develop a citizen‑science project documenting local bird populations. She also hopes to author
    a memoir that blends professional insights with reflections on sustainable living, and to continue mastering emerging technologies such as machine‑learning tools for ecological data.
