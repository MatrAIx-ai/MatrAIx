personas:
  professional: A retired engineering specialist, Maryann Farmand applies a blend of rigorous data analysis, GIS expertise, and Python programming to mentor budding scientists and steer local environmental
    planning, channeling their pragmatic curiosity and disciplined organization while they competitively question assumptions.
  sports: A dedicated walker and faithful spectator, Maryann Farmand enjoys brisk river hikes with the local senior walking group, cheers the Green Bay Packers in the fall and the Milwaukee Bucks in the
    winter, and they occasionally join community lawn‑bowling evenings, favoring low‑impact, community‑oriented activity over high‑intensity competition.
  arts: A quiet connoisseur of narrative and melody, Maryann Farmand spends evenings with biographies of pioneering scientists, immerses themselves in the folk storytelling of Bob Dylan and Joni Mitchell,
    finds calm in the orchestral works of Aaron Copland, and they attend the local historical society’s reenactments, allowing the arts to enrich their solitary pursuits with cultural resonance.
  travel: A methodical traveler, Maryann Farmand prefers carefully planned road trips that blend scenic drives through Wisconsin’s dairy heartland with purposeful stops at heritage towns like Hillsboro
    and the historic canals of Wisconsin Dells, while they dream of a modest overseas visit to Germanic folk museums that echo their family’s agrarian past, all within a retirement budget that emphasizes
    frugality and family‑centered experiences.
  culinary: A pragmatic palate, Maryann Farmand delights in preparing slow‑simmered wild‑rice soup with fresh carrots, celery, and sage, hearty roasted beet and parsnip medley, and occasional Wisconsin
    cheese‑curd platters, while they indulge in a slice of homemade spiced rye bread after a successful woodworking project, reflecting a commitment to local, sustainable fare and modest culinary rewards.
  core: A meticulous, solitary problem‑solver with a competitive streak, Maryann Farmand blends data‑driven stewardship of the land with a love of puzzles, birdwatching, and occasional stubborn reluctance
    to rely on others, embodying a pragmatic curiosity rooted in a lifetime of farm‑hard work.
background:
  cultural: Maryann was raised on a family farm near Marshfield, Wisconsin, in a community rooted in Midwestern values of hard work, self‑reliance, and neighborly support. Her family’s heritage traces back
    to German and Scandinavian immigrants who settled the region in the early 20th century, fostering a respect for the land and a tradition of practical education. Growing up during the post‑war era, she
    benefited from expanding public schooling and earned a scholarship to pursue a STEM graduate degree, an uncommon path for women of her generation. The cultural emphasis on community service and stewardship
    of natural resources continues to shape her involvement in local environmental initiatives and volunteer work.
