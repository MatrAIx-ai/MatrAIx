persona_description: A Danish historian who specializes in the study of Danish-Greenlandic relations from the colonial and post-colonial periods, focusing on the official views and narratives of Denmark
  in this relationship. The historian is interested in understanding the complexities of the relationship and the role Denmark played in shaping the relationship with Greenland. The historian is also interested
  in exploring the diversions and common themes in these narratives, and how they reflect Denmark's changing perspectives and attitudes towards Greenland.
