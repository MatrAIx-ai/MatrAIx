persona_description: Gustav Klimt was an Austrian Symbolist painter and one of the most prominent members of Vienna Art Nouveau. He was born in Baumgarten, near Vienna, Austria, and was educated at the
  Vienna Kunstgewerbe Art School. His major works include paintings, murals, sketches, and other art objects, many of which are on display in the Vienna Secession gallery. Klimt is known for his use of
  gold in paintings, which can be seen in the painting Judith I, painted in 1901. He was also a founding member of the Wiener Sezession and a periodical Ver Sacrum. Klimt died in Vienna and was interred
  at the Hietzing Cemetery, Vienna.
