  hobbies: '[''Visiting art galleries'', ''Street‑art tours'', ''Spontaneous road trips'', ''Beach volleyball'', ''Karaoke nights'', ''Community clean‑up volunteering'', ''Photography'', ''Live music events'',
    ''Exploring new restaurants'']'
  career_goals: Taylor aims to move from a driver‑sales role into a supervisory position where she can lead a team of drivers while shaping sales strategy for a logistics firm. In the long term she dreams
    of launching her own boutique courier service that blends efficient routing with a distinctive, art‑inspired brand identity. To support this, she plans to earn certifications in supply‑chain management
    and to mentor new drivers, using her competitive drive to build a thriving, community‑focused business.
