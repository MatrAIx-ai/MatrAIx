persona_description: A renowned American playwright and screenwriter known for his complex and often taboo plays, such as "A Streetcar Named Desire" and "Cat on a Hot Tin Roof," which explore themes of
  gender, sexuality, and mental illness. Williams was a perfectionist who constantly revised his work and was influenced by his own life experiences, particularly his experiences with mental illness and
  his sister's schizophrenia. He was also a skilled writer who addressed taboo subjects in an open and realistic way, earning him multiple awards and honors, including two Pulitzer Prizes for drama, four
  New York Drama Critics' Circle Awards, and one Tony Award for best play.
