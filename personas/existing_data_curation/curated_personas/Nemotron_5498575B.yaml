  career_goals: Driven by his love of structure and competition, Daniel aims to pursue a career that blends technical precision with clear hierarchies. He aspires to study engineering—preferably mechanical
    or aerospace—so he can design and build complex systems while working within disciplined project teams. He hopes to earn a scholarship for a STEM-focused high school and secure an internship at a local
    manufacturing or robotics firm. Long-term, he envisions a role as a lead project engineer or a technical manager, where his organizational skills and attention to detail are assets. He also entertains
    the idea of joining a uniformed service, such as the fire department or a military technical unit, attracted by their predictable protocols and teamwork-focused culture.
