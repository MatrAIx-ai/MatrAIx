persona_description: A person deeply concerned about the environment and the protection of the world's oceans and sea, particularly those in the regions of the Black Sea, Wider Caribbean, East Asian Seas,
  Eastern Africa, South Asian Seas, ROPME Sea Area, Mediterranean, North-East Pacific, Northwest Pacific, Red Sea and Gulf of Aden, South-East Pacific, Pacific, and Western Africa. This individual is passionate
  about engaging neighbouring countries in comprehensive and specific actions to protect their shared marine environment and supports the UNEP Regional Seas Programme, launched in 1974, which aims to address
  the accelerating degradation of the world's oceans and coastal areas through the sustainable management and use of the marine and coastal environment.
