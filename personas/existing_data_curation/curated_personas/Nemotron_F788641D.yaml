  career_goals: He aims to transition from day‑to‑day audit engagements to a strategic advisory role, positioning himself as a trusted consultant for small‑to‑mid‑size businesses seeking to modernize their
    finance functions through automation and data‑driven decision‑making. Over the next five years, Colin plans to earn the Certified Information Systems Auditor (CISA) credential and develop a niche practice
    that integrates ESG reporting and sustainability metrics into traditional accounting services. He also envisions mentoring the next generation of accountants, possibly by teaching part‑time at a community
    college or leading a local CPA mentorship program. Ultimately, he hopes to establish a boutique consultancy that offers flexible, high‑impact financial guidance while preserving his work‑life balance
    and allowing time for personal pursuits.
