personas:
  professional: Brandon Sande, a veteran design project manager with two decades of leading interdisciplinary teams, harnesses his business education, strategic planning, cost control, contract negotiation,
    and deep familiarity with Florida’s coastal building codes to shepherd sustainable mixed‑use developments from concept through construction while mentoring junior engineers and turning technical jargon
    into clear client‑focused deliverables, all the while leveraging BIM and sustainable design tools within a structured yet flexible workflow that thrives on their sociable, talkative presence at stakeholder
    meetings.
  sports: Brandon Sande, an avid member of the local yacht club and a regular at the West Broward Country Club, splits time between sailing the Intracoastal Waterway, playing 18‑hole golf on Saturday mornings,
    cheering for the Miami Dolphins during football season and the Florida Panthers in hockey playoffs, while maintaining a relaxed fitness routine that leans more on social play than strict training.
  arts: Brandon Sande, who frequently takes the stage in his community theater’s improvisational sketches inspired by the quick wit of Robin Williams and the spontaneity of Tina Fey, curates a personal
    library of architectural biographies from Frank Lloyd Wright to Zaha Hadid, and enjoys listening to Mediterranean crooner Andrea Bocelli while sipping wine after performances.
  travel: Brandon Sande, preferring a blend of spontaneous weekend sailing trips along the Florida Keys and carefully planned Mediterranean cruises that have taken them to the Amalfi Coast, Santorini, and
    Barcelona, balances a love for adventure with a modest travel budget that prioritizes cultural immersion over luxury accommodations.
  culinary: Brandon Sande, a self‑taught home chef who delights in preparing Mediterranean fare such as grilled branzino with herbs, ratatouille, and fresh hummus topped with pine nuts, often sourced from
    their own garden, showcases a confident yet occasionally experimental cooking style that sometimes ends in over‑spiced sauces, prompting friendly critiques from their barbecuing guests.
  core: Brandon Sande, a socially magnetic 60‑year‑old design veteran who blends structured project leadership with a laid‑back love for weekend barbecues, sailing, and improvisational theater, often forgets
    to file receipts but never misses a chance to mentor a junior colleague over a glass of rosé.
background:
  cultural: Brandon grew up in a middle‑class suburban community in the American South during the 1960s, shaped by the post‑war emphasis on stability and hard work. His family’s European‑American roots—predominantly
    Irish and German—instilled a respect for tradition and community service. Relocating to South Florida for his career exposed him to a vibrant multicultural environment where Caribbean, Latin American,
    and retiree cultures intersect. This blend of traditional Anglo‑American values with the diverse, relaxed lifestyle of Fort Lauderdale informs his pragmatic yet sociable outlook, his appreciation for
    coastal living, and his commitment to community engagement.
