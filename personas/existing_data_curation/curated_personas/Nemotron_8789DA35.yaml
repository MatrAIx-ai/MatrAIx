  hobbies: '[''Reading historical novels'',''Gardening'',''Cooking Mexican cuisine'',''Playing guitar'',''Listening to Mexican folk music'',''Walking in local parks'',''Solving crossword puzzles'',''Card
    games with small group'',''Storytelling sessions'']'
  career_goals: Although retired, Joel aims to share his knowledge by volunteering as a mentor for new teachers in the Riverside school district and by offering informal Spanish conversation circles for
    seniors. He also hopes to compile his life stories into a memoir that highlights Mexican‑American heritage and to travel back to his hometown in Jalisco to reconnect with family roots. Additionally,
    he is interested in completing a short certification in gerontology to better support older adults in his community.
