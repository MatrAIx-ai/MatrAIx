personas:
  professional: Joel Mojica, a retired bilingual elementary educator, blends decades of classroom experience with a practical curiosity for culturally responsive curricula, offering mentorship to new teachers
    while navigating their relaxed, sometimes disorganized approach to scheduling volunteer sessions, favoring small, intimate groups over large meetings.
  sports: Joel Mojica, a loyal fan of the Los Angeles Dodgers and the Los Angeles Lakers, spends their mornings strolling along the Riverside promenade and participates in a senior walking club that meets
    twice weekly, preferring gentle cardio over team sports and occasionally joining a community garden fitness class that mixes light strength work with horticulture.
  arts: Joel Mojica, an aficionado of traditional folk music, regularly tunes in to recordings by Vicente Fernández and Lila Downs while also cherishing the poetry of Octavio Paz, and occasionally joins
    a small circle that shares classic films starring Rita Hayworth and James Stewart, letting the melodies inspire their guitar sessions.
  travel: Joel Mojica, who prefers leisurely, well‑planned trips over spontaneous adventures, has already revisited their roots in Jalisco and hopes to explore the historic streets of Oaxaca next, while
    also enjoying occasional weekend drives to the nearby Temecula wine country for a relaxed escape from Riverside life.
  culinary: Joel Mojica, a skilled home chef, delights in preparing authentic mole poblano, fresh‑squeezed salsa verde with heirloom tomatoes and serrano chilies, and slow‑cooked carnitas, often pairing
    these dishes with homemade corn tortillas and star‑anise‑infused atole for their intimate gatherings.
  core: Joel Mojica, a curious yet delightfully disorganized 73‑year‑old who finds solace in garden soil, quiet evenings with folk guitar, and the company of close friends, they frequently worry about the
    future while still chasing stories from their past.
background:
  cultural: Born to Mexican immigrant parents, Joel grew up immersed in the traditions of Jalisco, learning Spanish at home and celebrating festivals such as Día de los Muertos and Las Posadas. His Catholic
    upbringing and strong family ties shaped his values of community, respect for elders, and preservation of cultural heritage. Living in Riverside, he blends his Mexican roots with the diverse Californian
    environment, often participating in local Hispanic cultural events and sharing traditional recipes with neighbours.
