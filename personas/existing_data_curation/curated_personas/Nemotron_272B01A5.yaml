  career_goals: Elad aims to climb the ranks within the United States Postal Service, targeting a supervisor or route manager position where he can leverage his logistical expertise and competitive drive
    to improve delivery efficiency. Concurrently, he plans to build a side business as a freelance photographer, focusing on documenting Midwestern small‑town life and creating limited‑edition prints for
    local cafés and community spaces. Over the next five years, he hopes to combine these paths by leading community art projects that involve postal routes—such as curated “mail‑art” exchanges—while eventually
    pursuing a bachelor’s degree in visual communications to broaden his professional options. He also aspires to achieve a perfect on‑time delivery record, earning recognition from his peers and supervisors.
