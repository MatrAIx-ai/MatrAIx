  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Reading fantasy and adventure books'', ''Nature hiking and birdwatching'', ''Collecting natural objects for crafts'', ''Keeping a nature journal'',
    ''Scratch programming for animation'', ''Puzzle video games'', ''Library story‑time and art workshops'']'
  career_goals: While still in elementary school, Joel dreams of combining his love for art and science. He envisions a future where he designs illustrated wildlife field guides, creates animated stories
    about the natural world, or becomes an environmental illustrator who helps communicate conservation ideas. He also likes the idea of building interactive installations that merge technology, sculpture,
    and the outdoors, and he hopes to study environmental science or visual arts in high school and beyond.
