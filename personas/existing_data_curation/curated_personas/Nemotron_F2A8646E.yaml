personas:
  professional: Joel Johnson, an aspiring young naturalist and mini-architect, channels their curiosity and love for the woods into detailed drawings, LEGO constructions, and Scratch animations, while their
    organized yet flexible approach ensures they meet deadlines for school projects and library workshops.
  sports: Joel Johnson, a member of the local youth soccer club and an avid participant in the Junior Rangers hiking group, enjoys weekend hikes, birdwatching, and cheering for the San Francisco Giants
    and the Golden State Warriors, preferring small‑group activities that combine gentle exercise with the calm of nature.
  arts: Joel Johnson, a budding illustrator, draws inspiration from the whimsical forest scenes of Brian Froud and the vibrant colors of Mary Ann Taylor, often listening to the acoustic melodies of Jack
    Johnson while painting nature‑themed canvases that blend realistic textures with imaginative creatures.
  travel: Joel Johnson, who loves short family road trips, has explored the Redwood National Park and the Sierra Nevada foothills, dreams of hiking the Grand Canyon, and prefers low‑key, nature‑focused
    itineraries that allow ample time for sketching and journaling.
  culinary: Joel Johnson, a picky yet adventurous eater, prefers simple snacks like apple slices with peanut butter, enjoys making pinecone‑shaped fruit kebabs with grapes and strawberries, can whip up
    a basic grilled cheese sandwich with cheddar and butter, and occasionally sneaks extra marshmallows into s’mores despite their parents’ gentle reminders.
  core: Joel Johnson is a quiet, curiosity‑driven 8‑year‑old who blends artistic imagination with a love for the woods, turning every pinecone into a project, yet tends to leave a trail of crayons and LEGO
    bricks behind.
background:
  cultural: Joel grew up in Fort Jones, a small town in Siskiyou County, California, where the surrounding forests and farmland shape daily life. His family participates in typical rural American traditions—community
    picnics, fourth‑of‑July parades, and holiday gatherings—while also exposing him to the region’s rich natural heritage. The local public school and library emphasize outdoor education, encouraging him
    to explore the local ecosystems and learn about the indigenous peoples of the area. The community’s emphasis on kindness, cooperation, and respect for the environment has reinforced his reserved yet
    considerate demeanor.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Basic arithmetic'', ''Digital storytelling with Scratch'', ''Sketching and drawing'', ''LEGO construction and basic engineering'', ''Nature
