personas:
  professional: Pierre Ricks is a budding LEGO architect who transforms intricate builds into miniature problem‑solving projects, applying their love of order and creativity to design step‑by‑step constructions
    while their practical mindset keeps them focused on tangible outcomes, and they double‑check every piece before completion due to occasional anxiety.
  sports: Pierre Ricks shines as a forward for the Slidell Thunder youth soccer club, thriving on the structured drills of practice sessions, and eagerly roots for the New Orleans Saints on Sundays and
    the Pelicans during the basketball season, while they often recreate players’ signature moves during backyard games.
  arts: Pierre Ricks channels creative energy into building complex LEGO sets, drawing vivid comic‑style characters, and dancing to upbeat tracks by Kendrick Lamar and gospel powerhouse CeCe Winans, using
    the rhythmic beats from church services and hip‑hop playlists to channel intense emotions into organized artistic expression, and they frequently time their steps to the music to maintain a sense of
    control.
  travel: Pierre Ricks dreams of paddling through the nearby bayous on a guided canoe tour, enjoys family road trips to New Orleans for Mardi Gras parades and future plans to visit Disney World, and they
    balance the thrill of new sights with the comfort of familiar routines and parental supervision.
  culinary: Pierre Ricks favors bold Cajun flavors, often requesting gumbo brimming with shrimp and Andouille sausage or a steaming bowl of jambalaya, while also delighting in simple peanut butter‑banana
    sandwiches, and they can skillfully stir a pot under adult guidance, proudly naming the spices—file powder, thyme, and paprika—that give each dish its signature kick.
  core: Pierre Ricks is a structured yet emotionally vibrant seven‑year‑old who builds worlds from LEGO, sketches feelings, and they navigate life’s anxieties with disciplined routines punctuated by spontaneous
    bursts of hip‑hop and gospel‑inspired dance.
background:
  cultural: Pierre is part of a close‑knit African American family in Slidell, Louisiana, where the rhythms of Southern life and Creole traditions intertwine with his cultural identity. Weekends often involve
    church gatherings where gospel music and community fellowship are central. Family celebrations incorporate elements of Mardi Gras with colorful parades, zydeco music, and traditional Cajun dishes like
    gumbo and jambalaya, offering Pierre a taste of the region’s mixed heritage. He grows up hearing stories of his ancestors' resilience and community strength, shaping his sense of belonging and pride.
    Local festivals, the nearby bayous, and the diverse culinary scene contribute to his appreciation of both African American and Louisiana Creole cultures.
