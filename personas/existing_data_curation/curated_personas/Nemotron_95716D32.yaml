  career_goals: Pierre imagines a future where he can protect and help his community, often mentioning that he wants to become a firefighter because of the clear schedules, teamwork, and the chance to keep
    people safe. He also expresses interest in becoming a teacher, valuing the predictable classroom structure and the opportunity to share knowledge. Occasionally, he talks about caring for animals as
    a veterinarian, reflecting his gentle side and love for pets. Ultimately, his ambitions revolve around roles that combine routine, responsibility, and service.
