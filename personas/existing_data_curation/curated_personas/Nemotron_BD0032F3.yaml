personas:
  professional: A budding junior comic creator, James Wilson blends sketching, short fantasy storytelling, and Scratch animation into a playful multimedia portfolio that showcases their vivid imagination
    and knack for captivating peers during school talent shows, and they love the buzz of performing.
  sports: A fan of the St. Louis Cardinals and the Minnesota Vikings, James Wilson spends weekends on the local youth baseball team, paddles a small rowboat on the Mississippi River for bird‑watching, and
    they join family fishing outings that double as informal lessons in patience and teamwork.
  arts: James Wilson immerses themselves in the world of comic art, drawing inspiration from Jim Lee’s dynamic panels and the whimsical storytelling of Shaun Tan, while their playlist of Dolly Parton, Bill Monroe,
    and Taylor Swift fuels spontaneous skits during school talent shows, and they often improvise jokes for their classmates.
  travel: Spontaneous and adventure‑loving, James Wilson loves impromptu day trips along the Great River Road, dreaming of a future road trip to the Grand Canyon but currently saving up for a family camping
    weekend in the Ozarks where they can collect river rocks and sketch sunsets.
  culinary: In the kitchen, James Wilson delights in whipping up cheesy mac‑and‑cheese, grilling corn on the cob with butter and paprika, and they proudly assemble LEGO‑shaped cupcakes for community potlucks,
    though they sometimes over‑salt dishes when enthusiastic about flavor.
  core: James Wilson is a wildly imaginative eleven‑year‑old who channels boundless curiosity into comics, LEGO creations, and lively performances, while they navigate the chaos of school life with a heart
    of gold and a penchant for occasional disorganization.
background:
  cultural: James comes from a white, rural family in Wickliffe, Kentucky, a small town on the banks of the Ohio River. His upbringing reflects the close‑knit, community‑oriented values common in Ballard
    County, where church gatherings, county fairs, and family potlucks are regular events. He grew up with Southern hospitality, an appreciation for country and bluegrass music, and a love of outdoor activities
    like fishing and exploring the riverbanks. While proud of local traditions, James’s curiosity drives him to seek new ideas beyond his hometown, blending his small‑town roots with a wide‑reaching imagination.
attributes:
  skills: '[''Creative storytelling'', ''Sketching and illustration'', ''Basic Scratch programming'', ''Improvisational speaking'', ''Team collaboration'', ''Empathy and conflict mediation'']'
  hobbies: '[''Drawing comics'', ''Creative writing'', ''LEGO building'', ''Scratch programming'', ''Minecraft creative mode'', ''Birdwatching and nature walks'', ''Playing improvisational games'', ''Listening
    to country and bluegrass music'', ''Participating in school talent shows'', ''Cooking with family'']'
  career_goals: James dreams of growing up as a children's author and illustrator who can create whole worlds for kids to explore. He is fascinated by video‑game design and hopes one day to work as a concept
    artist or story director for interactive adventures. In the meantime, he wants to lead his school’s drama or art clubs, using his energy and imagination to bring friends together and make projects that
    inspire others. Ultimately, he sees himself as a creative leader who blends art, technology, and community storytelling.
