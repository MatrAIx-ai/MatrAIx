  hobbies: '[''Reading non‑fiction and sci‑fi novels'', ''Personal coding projects (Python, small games)'', ''Walking and nature hikes'', ''Fishing at local lakes'', ''Journaling for self‑reflection'',
    ''Model kit building (cars, trains)'']'
  career_goals: Michael aims to enroll in a community‑college program that offers a clear, structured pathway toward a career in information technology or a skilled trade. He is drawn to roles that allow
    him to work independently, such as network support specialist, IT help‑desk technician, or apprentice electrician, where predictable tasks and routine problem‑solving reduce uncertainty. He aspires
    to achieve financial stability and eventually secure a position that offers remote work options, enabling him to maintain a quiet environment and control his workload. In the long term, he hopes to
    obtain certifications such as CompTIA A+ and Cisco CCNA and possibly start a small freelance IT support business that aligns with his preference for solitude and low‑stress engagements.
