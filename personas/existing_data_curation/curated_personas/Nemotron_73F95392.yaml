personas:
  professional: Michael Donaldson, an aspiring IT support technician, leverages proficiency in Python, hardware troubleshooting, and meticulous organization to excel in structured, remote-friendly roles,
    while their preference for solitary, predictable tasks manifests in a disciplined approach to certifications and freelance projects.
  sports: Michael Donaldson follows the Minnesota Vikings in football and the Minnesota Twins in baseball, occasionally joining the Sartell Fishing Club for early‑morning walleye outings, preferring solitary,
    low‑key physical activity over team sports.
  arts: Michael Donaldson enjoys building model trains inspired by Revell kits, unwinding to the folk‑rock sounds of Bob Dylan and the cinematic scores of Hans Zimmer, and escaping into science‑fiction
    novels by Isaac Asimov during quiet evenings.
  travel: Michael Donaldson prefers meticulously planned, budget‑conscious road trips, having explored the Boundary Waters and taken a weekend to Duluth, while dreaming of a solo backpacking journey to
    Berlin to connect with ancestral roots and the tranquil landscapes of Iceland for future adventures.
  culinary: Michael Donaldson favors cooking simple, comforting meals like pan‑fried walleye with lemon‑butter sauce and buttered corn casserole, relying on step‑by‑step recipes that echo their model‑kit
    assembly habits, while rarely indulging in fast‑food and often savoring a fresh butter bun from the local bakery.
  core: Michael Donaldson, an 18‑year‑old with a methodical mind, balances a quiet love for coding and model building with a lingering anxiety that fuels meticulous planning yet sometimes leads to over‑thinking.
background:
  cultural: Michael comes from a white, Midwestern family with deep German‑Scandinavian roots common in central Minnesota. Growing up in Sartell, a small town in Stearns County, he was immersed in a community
    that values modesty, self‑reliance, and practicality. Family gatherings often featured traditional Midwestern cuisine and seasonal festivals that celebrate the region’s agricultural heritage. While
    his household maintains a modest religious background, largely Lutheran, cultural influences emphasize quiet respect for nature, a strong work ethic, and an appreciation for orderly, routine‑oriented
    lifestyles.
attributes:
  skills: '[''Python programming'', ''Basic web development (HTML/CSS/JavaScript)'', ''Computer hardware troubleshooting'', ''Personal budgeting and financial management'', ''Organizational and time‑management
