  career_goals: Looking ahead, Mamie hopes to transition from full‑time development to a senior advisory role where she can guide legacy system migrations and champion inclusive, art‑integrated UI design.
    She is passionate about establishing a community coding program for seniors in Niles, offering workshops that blend technology with creative expression. Over the next few years she aims to author a
    series of articles on the evolution of software engineering from a woman's perspective, contribute to open‑source projects that support accessibility, and serve as a mentor‑coach for emerging developers
    while maintaining a balanced, low‑stress work rhythm.
