persona_description: A geographer with research interests in elucidating the natural and anthropogenic drivers of forest ecosystem dynamics and change, with a focus on the influences of physical landscapes,
  biological characteristics, climate variability, and human land-use history on spatiotemporal patterns of fire and insect outbreaks. Dr. Sibold's research uses a combination of dendroecological (tree
  ring), Geographic Information System (GIS), and spatial analysis techniques to analyze and interpret forest landscape characteristics. His research has been published in leading journals such as Ecological
  Applications, Journal of Biogeography, Canadian Journal of Forest Research, and Landscape Ecology.
