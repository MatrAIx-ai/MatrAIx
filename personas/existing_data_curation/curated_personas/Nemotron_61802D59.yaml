personas:
  professional: Linda Cooper, a junior explorer in her living room, uses building blocks to master cause‑and‑effect, and they demonstrate methodical curiosity, reliable organization, and practical problem‑solving
    that hint at future engineering talent.
  sports: Linda Cooper regularly joins the community’s "Tiny Tigers" toddler soccer group and enjoys weekly stroller‑run sessions with the local parent‑child fitness club, and they blend their energetic
    sociability with a structured approach to physical play that keeps them lively yet disciplined.
  arts: Linda Cooper delights in the playful melodies of The Wiggles and Raffi, especially "Baby Beluga," and they spend quiet afternoons turning the pages of Eric Carle’s *The Very Hungry Caterpillar*,
    which together nurture their early appreciation for rhythm, color, and storytelling.
  travel: Linda Cooper loves the family’s weekend road trips to the sunny sands of Myrtle Beach and the magical attractions of Orlando’s Walt Disney World, and they prefer short car rides with frequent
    snack stops that satisfy their curious spirit while fitting the family’s practical schedule.
  culinary: Linda Cooper’s palate revolves around smooth avocado puree, sweet banana mash, and occasional chicken noodle soup, and they are especially pleased when her caregiver sprinkles a dash of mild
    cinnamon into oatmeal, reflecting their emerging taste for subtle flavors and practical comfort foods.
  core: Linda Cooper fuses a toddler’s boundless curiosity with a surprisingly methodical play style, turning block‑building into disciplined experiments, though they stubbornly delay bedtime until their
    favorite lullaby finally ends.
background:
  cultural: Linda is raised in a white, middle‑class family in Bedford, New Hampshire. Her upbringing reflects typical New England suburban culture, including celebrating American holidays such as Thanksgiving
    and Christmas, attending community playgroups and library events, valuing politeness, cooperation, and community involvement, and enjoying seasonal outdoor activities like leaf‑picking in autumn and
    sledding in winter.
