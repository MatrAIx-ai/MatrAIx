  career_goals: Although still an infant, Linda’s long‑term aspirations are shaped by her family’s encouragement to value learning, kindness, and community. She is being nurtured to develop a love for discovery
    that may one day lead her toward a career in education, healthcare, or scientific research, where she can continue to help others and contribute positively to society.
