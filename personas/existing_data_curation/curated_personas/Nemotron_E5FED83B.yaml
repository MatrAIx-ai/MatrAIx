  hobbies: '["home gardening", "baking and cooking", "reading historical fiction", "knitting", "volunteering at the senior center", "birdwatching", "walking in local parks", "digital photography", "genealogy
    research", "playing bridge"]'
  career_goals: Although retired from paid work, Jessica aims to remain an active, valued member of her Northfield community. She plans to expand her volunteer work at the local senior center by leading
    intergenerational cooking workshops and garden tours. She hopes to compile a small family recipe book for her grandchildren, learn digital photography to document local events, and continue mentoring
    younger volunteers in practical skills. Maintaining her health and independence so she can keep supporting her extended family is also a key ambition.
