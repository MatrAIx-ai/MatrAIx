  hobbies: '[''Soccer (pickup games and following Liga MX)'', ''Hackathons'', ''Robotics club projects'', ''Strategy video gaming'', ''Cooking Mexican cuisine'', ''Hiking in the Bay Area'', ''Live music
    concerts'', ''Community volunteering at cultural festivals'']'
  career_goals: Gerardo aims to turn his technical skills and organizational strengths into a career as a software engineer or product manager at a tech company in Silicon Valley. Over the next few years,
    he plans to complete his bachelor's degree in computer science, secure a software development internship, and build a portfolio of projects that showcase his ability to blend practical solutions with
    innovative ideas. Long‑term, he envisions leading cross‑functional teams, driving product development that serves underrepresented communities, and possibly launching his own startup focused on educational
    technology.
