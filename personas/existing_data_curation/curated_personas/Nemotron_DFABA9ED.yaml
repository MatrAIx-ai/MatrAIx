personas:
  professional: Gerardo Nunez is an aspiring software engineer who, equipped with Python and JavaScript proficiency, systematic project planning, and bilingual communication, they lead hackathon teams,
    blending curiosity for emerging tech with a practical, reliable work style.
  sports: Gerardo Nunez plays pickup soccer on weekends, supports the Mexican national team and the San Jose Earthquakes, trains with the Bay Area Hiking Club for trail runs, and they approach fitness with
    a competitive edge, tracking performance metrics in Strava while still enjoying the social camaraderie of team sports.
  arts: Gerardo Nunez immerses themselves in live music, from regional Mexican icons like Los Tigres del Norte to indie rock acts such as Arcade Fire, and devotes spare evenings to streaming classic films
    by Alfonso Cuarón, and they let these artistic experiences shape their creative outlook and serve as a counterbalance to their technical pursuits.
  travel: Gerardo Nunez prefers a mix of spontaneous weekend getaways - like hiking in Yosemite and a quick surf trip to Santa Cruz - and meticulously planned adventures, such as a two‑week backpacking
    trek through Mexico’s Copper Canyon and a future dream to attend a tech conference in Berlin, and they budget travel around a modest student allowance.
  culinary: Gerardo Nunez enjoys cooking at an intermediate level, frequently preparing carnitas tacos, chiles en nogada, and fresh guacamole with heirloom avocados and tomatillo salsa, and they balance
    these home‑cooked feasts with occasional visits to local food trucks serving Korean‑Mexican fusion tacos.
  core: Gerardo Nunez merges a competitive spirit with methodical planning, turning soccer fields, hackathon nights, and kitchen counters into arenas where curiosity meets practicality, and they occasionally
    procrastinate on chores and binge‑game to unwind.
background:
  cultural: Gerardo grew up in a Mexican‑American household in San Jose, where Spanish was spoken at home and Mexican traditions were celebrated alongside American customs. His family places a strong emphasis
    on close‑knit relationships, respect for elders, and communal gatherings such as Día de los Muertos and quinceañera celebrations. These cultural roots have instilled in him a sense of pride in his heritage,
    a bilingual fluency that he uses in everyday life, and an appreciation for community-oriented projects. While he is career‑focused and competitive, he also values giving back to the local Latino community
    through mentorship and cultural events.
