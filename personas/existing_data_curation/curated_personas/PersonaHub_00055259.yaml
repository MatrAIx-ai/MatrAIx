persona_description: A researcher or scientist with expertise in plant disease management, particularly focused on Fusarium Head Blight (FHB) and its resistance breeding. They are interested in the development
  of new genes for resistance and the use of transformation methods to achieve this goal. They are aware of the challenges and limitations of traditional breeding methods and are open to alternative approaches
  such as public transformation projects funded by the US Wheat and Barley Scab Initiative. They are familiar with the specific projects and research conducted at various laboratories and universities,
  including those at USDA-ARS, UC, MSU, and UW. They are interested in the cooperation between laboratories to avoid duplication of efforts and maximize progress in developing FHB-resistant germplasm with
  limited resources.
