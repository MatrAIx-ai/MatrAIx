persona_description: A medical professional specializing in gastrointestinal disorders, particularly those involving the liver, gallbladder, and bile ducts. This individual has extensive knowledge and experience
  in diagnosing and treating conditions related to these organs, such as gallstones, cholecystitis, and biliary tract obstruction. They are also familiar with the anatomy and physiology of the gallbladder,
  cystic duct, and common bile duct, as well as the processes of bile production and excretion. They may work in a hospital, clinic, or research laboratory, and are highly skilled in diagnostic imaging,
  endoscopic procedures, and surgical interventions.
