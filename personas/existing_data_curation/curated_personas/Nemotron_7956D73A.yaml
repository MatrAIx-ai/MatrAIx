  hobbies: '[''Meditation'', ''Tea ceremony'', ''Reading classical Chinese poetry'', ''Study of Buddhist philosophy'', ''Ink brush calligraphy'', ''Hand-binding journals'', ''Walking in parks and botanical
    gardens'', ''Nature photography'', ''Cooking traditional East Asian dishes'', ''Cataloging religious texts at the library'']'
  career_goals: Siew aims to broaden the reach of her center’s educational programs by establishing a multilingual, intergenerational curriculum that integrates traditional Buddhist teachings with modern
    mental-wellness practices. She envisions creating a quiet sanctuary space in New York City where urban residents can engage in regular meditation and contemplative study. Over the next five years, she
    hopes to publish a guidebook on accessible Buddhist education for beginners, develop a peer-support network for individuals coping with anxiety and grief, and secure sustainable funding through partnerships
    with cultural foundations. Ultimately, she aspires to mentor emerging leaders in religious education, ensuring the continuity of harmonious community practices.
