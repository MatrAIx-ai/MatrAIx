  hobbies: '[''Sketching and digital illustration'', ''Visiting art galleries and street murals'', ''Playing basketball'', ''Listening to music (reggaeton, merengue, hip‑hop)'', ''Volunteering for community
    clean‑ups'', ''Cooking Dominican cuisine'', ''Studying Spanish literature'']'
  career_goals: Alvaro aims to earn his GED within the next year and enroll in a community college program focused on facilities management or hospitality. He plans to obtain certifications such as OSHA
    safety training and a Building Operator Certification, which will position him for a supervisory role as a facilities coordinator. Concurrently, he wishes to nurture his artistic passion by taking evening
    courses in graphic design and building a portfolio for freelance work or a museum support position. Ultimately, he envisions a career that blends his organizational strengths with creativity—potentially
    as a museum facilities manager or a director of a community arts center—allowing him to contribute to both operational excellence and cultural enrichment.
