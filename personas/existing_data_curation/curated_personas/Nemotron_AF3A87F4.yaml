personas:
  professional: Wendy Beauchamp, a seasoned health services executive with 30+ years overseeing hospital operations, blends meticulous strategic planning, budgetary stewardship, and a flair for integrating
    visual art installations into patient care, reflecting a pragmatic yet open‑minded leadership style that balances organized processes with creative flexibility, and they are celebrated for mentoring
    emerging managers.
  sports: Wendy Beauchamp enjoys leisurely walks along the Pinellas Trail with the local Senior Walking Club, avidly follows the Tampa Bay Buccaneers and Orlando Magic, plays light pickleball at the St.
    Petersburg Community Center, and they delight in bird‑watching excursions that double as low‑impact exercise.
  arts: Wendy Beauchamp is an enthusiastic watercolorist who captures coastal sunsets and native wildlife, they frequently attend the West End Playhouse to see productions by playwrights like Lynn Nottage,
    collect folk pieces from the Florida Folk Art Collective, and find inspiration in the works of Georgia O’Keeffe and contemporary photographer William Eggleston.
  travel: Wendy Beauchamp plans a blend of structured road trips to historic St. Augustine and Charleston and spontaneous weekend cruises to the Bahamas, prefers staying in boutique B&Bs that showcase local
    art, and they balance travel enthusiasm with a modest retirement budget that still allows occasional visits to family in the Midwest.
  culinary: Wendy Beauchamp, a competent home cook, delights in preparing grilled grouper with mango salsa, shrimp ceviche with lime and cilantro, and roasted vegetable medleys featuring fresh basil and
    dill from her patio garden, but they sometimes over‑salt their sauces in the excitement of hosting neighborhood potlucks.
  core: Wendy Beauchamp blends a Midwestern work ethic with Floridian curiosity, curating art‑filled healing spaces while they juggle budgeting precision, health‑monitoring gadgets, and a penchant for spontaneous
    beach walks and occasional garden‑glove misplacements.
background:
  cultural: Wendy was born and raised in Dayton, Ohio, in a middle‑class family with Irish and Scandinavian ancestry. Her upbringing emphasized community service, a strong work ethic, and appreciation for
    the arts through local theater and museum visits. After a long career on the Midwest, she relocated to Largo, Florida, where she embraced the diverse cultural mosaic of Pinellas County, including Spanish‑language
    music, Caribbean culinary influences, and a vibrant senior arts scene. Her cultural identity blends Midwestern pragmatism with the warm hospitality and multicultural openness characteristic of the Florida
    Gulf Coast.
