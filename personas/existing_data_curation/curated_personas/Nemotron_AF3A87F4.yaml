  career_goals: Wendy aims to transition into a senior advisory role where she can shape regional health system strategy, especially around patient‑centered care and the incorporation of creative therapies.
    She wants to mentor emerging health services managers, develop a statewide mentorship program, and serve on nonprofit boards that promote arts in healing environments. In the next five years she envisions
    piloting a telehealth‑enabled wellness program that leverages technology and community art resources. As she approaches retirement, she plans to shift to part‑time consulting while continuing volunteer
    work that bridges health education with cultural outreach.
