persona_description: A sustainability advocate who is interested in the design of buildings and communities that integrate nature and biophilic principles to create a more harmonious and sustainable environment.
  They are open to the idea of using fewer resources, producing less pollution, and generating as much clean energy as they consume. They recognize the importance of nature in achieving true and lasting
  sustainability and believe that nature itself is a key ingredient to creating a more sustainable environment. They are interested in the concept of Restorative Environmental Design, which is a new standard
  that combines low-impact design with biophilic design principles. They are skilled in recognizing and appreciating the benefits of nature and are willing to make changes to their built environment to
  incorporate these principles. They are also interested in the concept of biophilic design, which is a design approach that mimics the natural world and promotes a sense of connection with nature.
