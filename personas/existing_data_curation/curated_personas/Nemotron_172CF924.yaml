  hobbies: '[''drawing'', ''digital illustration'', ''video game playing'', ''short film making'', ''school theater performances'', ''soccer'', ''reading graphic novels'', ''coding with Scratch'', ''visiting
    museums and art galleries'', ''listening to music'']'
  career_goals: Charles aims to blend his love of art and technology by pursuing a career as a multimedia artist or video game designer. He dreams of attending a specialized STEAM high school, developing
    interactive storytelling projects that reflect his Texan roots, and eventually leading workshops that inspire other kids to explore creative tech. He also hopes to use his communication skills to advocate
    for arts education in his community.
