personas:
  professional: Charles Oswalt, a budding digital artist and aspiring game storyteller, channels curiosity and sociable flair into sketching, coding in Scratch, and producing short films that blend sci-fi
    narratives with vibrant visuals, while they balance school responsibilities with a disciplined creative schedule.
  sports: Charles Oswalt, an enthusiastic midfielder for the local Sunset Soccer Club, cheers for the Houston Dynamo in MLS and the Dallas Mavericks in the NBA, spends weekends practicing drills, and they
    balance athletic ambition with a laid-back attitude toward competition, often organizing friendly pickup games after school.
  arts: Charles Oswalt, a self-designated art aficionado, roams regional museums and galleries, draws inspiration from Hayao Miyazaki's animated worlds, the street-wise satire of Banksy, and the vibrant
    color palettes of Frida Kahlo, while they curate playlists that swing from The Eagles to Selena to fuel their creative sketches and short-film projects.
  travel: Charles Oswalt, a curious teen explorer, has taken day trips to the Dallas Museum of Art, camped under the stars in the Texas Hill Country, and spent a family vacation in New Orleans sampling
    live brass bands, while they dream of strolling Barcelona's Gothic Quarter and sketching its Gaudí architecture, preferring spontaneous itineraries over rigid schedules.
  culinary: Charles Oswalt, a budding kitchen experimenter, loves the bold flavors of tacos al pastor, enchiladas verdes, and homemade guacamole, often pairs them with pepper-crusted chicken pizza and occasional
    sushi rolls, and they can confidently whip up a spicy corn salsa while still fumbling with perfecting risotto.
  core: Charles Oswalt is a hyper-sociable, art-driven teen who blends coding, sketching, and soccer into a calm yet assertive rhythm, thriving on community applause while they quietly budget their creative
    cravings.
background:
  cultural: Charles grows up in a predominantly Anglo‑American household in suburban San Antonio, Texas, where traditional Texan values of independence, hospitality, and community pride shape his outlook.
    Living in a culturally diverse city, he is regularly exposed to Hispanic influences—Spanish language signs, local Fiesta celebrations, Tex‑Mex cuisine, and bilingual classmates—which enrich his appreciation
    for varied cultural expressions. Family traditions include weekend barbecues, holiday parades, and regular visits to the River Walk, fostering a balanced blend of Southern comfort and multicultural
    curiosity.
