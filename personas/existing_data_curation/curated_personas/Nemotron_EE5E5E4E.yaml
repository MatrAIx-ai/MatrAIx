  hobbies: '[''Bike riding and river exploration'', ''Landscape photography'', ''Playing guitar'', ''Coding small projects (Scratch, Python)'', ''Strategy video games'', ''Reading science‑fiction'', ''Stargazing'',
    ''Model kit building'', ''Fishing'', ''Small‑group hangouts with friends'']'
  career_goals: Michael aims to finish his GED and then enroll in a vocational program that blends his practical interests with technology—ideally automotive or electrical technician training. He envisions
    a future where he can work as a field technician installing solar panels or maintaining off‑road vehicles, while also building a freelance side business as a landscape photographer for tourism agencies
    and local publications. His long‑term ambition is to achieve a flexible, independent career that lets him apply his curiosity to new tools and methods without being tied to a rigid schedule.
