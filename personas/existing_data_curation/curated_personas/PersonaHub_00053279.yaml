persona_description: A historian and archaeologist who is passionate about the history and culture of the Biblical lands, particularly the Middle East, and the discovery and publication of ancient objects,
  including unprovenanced antiquities. She is knowledgeable about the history of the religions that developed in the region and the neighboring regions, and is committed to understanding the importance
  of discovering and publishing ancient objects for a better understanding of our past. She is also critical of the looting of antiquities in the region and advocates for the careful examination and publication
  of unprovenanced antiquities, regardless of their provenance.
