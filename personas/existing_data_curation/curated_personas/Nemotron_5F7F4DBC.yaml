personas:
  professional: Matthew Sullivan is an aspiring robotics engineer who channels his methodical, organized mind into designing and programming competition robots for his school club, while also taking the
    lead in structuring the team's build schedule.
  sports: Matthew Sullivan is a midfield dynamo for the Ankeny Soccer Club U13 team, avidly follows the Iowa Hawkeyes football program, and occasionally joins the school’s basketball club, handling the
    ball with the same strategic precision he applies to his LEGO constructions.
  arts: Matthew Sullivan channels his creative energy into building detailed LEGO Architecture sets, devouring fantasy novels by Brandon Sanderson and J.K. Rowling, sketching invention ideas reminiscent
    of Leonardo da Vinci, and collaborating with friends in cooperative video games like Minecraft and Overcooked, which fuels his appreciation for storytelling and design.
  travel: Matthew Sullivan has explored Chicago’s Navy Pier on a family weekend trip, dreams of hiking the geysers of Yellowstone National Park, and eagerly anticipates a school field trip to Colonial Williamsburg
    to experience historic reenactments, balancing his love for structured itineraries with spontaneous snack stops.
  culinary: Matthew Sullivan enjoys a classic pepperoni pizza with extra mozzarella, savors homemade mac and cheese, and occasionally tries his hands at cooking spaghetti Bolognese, favoring ingredients
    like fresh basil, Parmesan cheese, and a dash of oregano, though he often forgets to clean the kitchen afterward.
  core: Matthew Sullivan is a meticulous, worry‑prone middle schooler who builds towering LEGO cities, directs a robotics team, dominates midfield in soccer, and can’t resist a slice of pepperoni pizza,
    all while keeping a detailed ledger of his allowance.
background:
  cultural: Matthew grew up in Ankeny, Iowa, a predominantly white, middle‑class Midwestern community. His family has Irish roots, reflected in the surname Sullivan, and they are active members of a local
    Methodist church. Community gatherings such as county fairs, Fourth of July fireworks, and school sports events are central to his upbringing. The values of hard work, modesty, cooperation, and respect
    for tradition—common in the Midwest—shape his worldview. He celebrates holidays like Thanksgiving and Christmas with family potlucks and church services, and frequently helps with volunteer initiatives
    at the church and the local library.
attributes:
  skills: '[''Organizing group projects'', ''LEGO building with detailed instructions'', ''Basic Scratch programming'', ''Team coordination in sports and clubs'', ''Effective communication'', ''Time management'',
