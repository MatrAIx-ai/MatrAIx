  hobbies: '[''Building LEGO architecture sets'', ''Youth soccer'', ''Robotics club'', ''Reading fantasy novels'', ''Cooperative video gaming with friends'', ''Volunteering at the community library'', ''Sketching
    invention designs'', ''Model airplane kit building'']'
  career_goals: Matthew aspires to pursue a career in engineering—particularly civil or robotics engineering—because he enjoys planning, building, and creating structures that benefit the community. He
    envisions designing safe roads, bridges, or innovative robots that solve real‑world problems, and hopes to lead community projects or mentor younger peers, using his organizational talent to make a
    positive impact. In the short term, he aims to join a STEM‑focused high‑school program and continue participating in robotics competitions.
