  career_goals: In the next two years, John plans to transition into retirement while remaining active in public safety as a security consultant for local businesses and a mentor for new police recruits.
    He aims to earn a Certified Police Trainer designation, develop a structured mentorship program within the Kingston Police Department, and serve on the Rockingham County community‑safety advisory board.
    Additionally, he hopes to author a practical guide on investigative best practices that reflects his methodical approach, leaving a lasting professional legacy.
