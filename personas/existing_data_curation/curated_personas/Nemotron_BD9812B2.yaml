personas:
  professional: A teen tech‑savvy auto enthusiast, Najee Darden, who they consider the go‑to troubleshooter for friends' phones and cars, leverages a self‑taught knack for building custom PCs and basic
    car repairs to lead pick‑up basketball games and community content‑creation workshops, while plotting to open an auto‑repair shop that doubles as a youth music studio.
  sports: A basketball enthusiast and skateboarder, Najee Darden spends afternoons shooting hoops at the Kingwood community park, follows the Houston Rockets, rolls with the Kingwood Skate Club after school,
    and they treat weekend pickup games as both a social outlet and informal cardio.
  arts: A self‑taught beat‑maker who freestyles at community open‑mic nights, Najee Darden draws inspiration from J. Cole, Kendrick Lamar, and Metro Boomin, spends evenings layering samples on a laptop
    while they dream of launching a youth‑focused label that gives local talent a platform.
  travel: A weekend‑road‑trip enthusiast, Najee Darden has driven to Austin’s live‑music scene and plans a future cross‑country trek to the Henry Ford Museum in Detroit, but limited finances keep most trips
    within a few‑hour radius of Kingwood, and they often rely on friends’ rides to stretch their budget.
  culinary: A kitchen apprentice of Southern comfort, Najee Darden frequently cooks collard greens simmered with smoked turkey and buttery mac & cheese, experiments with hot‑sauce drizzles while they listen
    to hip‑hop beats, yet they often forget to clean the stovetop after cooking.
  core: A spontaneous, hands‑on teen who mixes car parts, beats, and basketball hoops, Najee Darden turns curiosity into community projects, even though they often let organization slip.
background:
  cultural: Najee is part of the African‑American community in Kingwood, a suburb of Houston known for its blend of Southern hospitality and urban culture. He grew up surrounded by the rhythms of hip‑hop,
    the traditions of Southern cuisine, and the supportive networks of church youth groups and local after‑school programs. These influences have shaped his identity, instilling a pride in his cultural
    heritage while also giving him a practical outlook on life. Family gatherings often involve storytelling, gospel music, and shared meals, reinforcing values of community, resilience, and mutual support.
    This cultural backdrop fuels Najee’s aspirations to give back to his neighborhood, whether through a future trade business, mentorship, or music that reflects his lived experiences.
