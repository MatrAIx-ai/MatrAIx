  career_goals: Najee aims to earn his GED within the next two years and then enroll in a vocational program focused on automotive technology or electrical trades, seeing these fields as a practical outlet
    for his curiosity and hands‑on abilities. In the long term, he envisions opening his own auto‑repair shop in Kingwood, where he can combine his technical skills with community service. Parallel to his
    trade ambitions, Najee hopes to develop his music production hobby into a side career, producing beats for local artists and possibly launching a small label that gives other youth a platform to express
    themselves. He is also interested in mentoring younger kids in after‑school programs, using his own experience of overcoming academic setbacks to inspire resilience.
