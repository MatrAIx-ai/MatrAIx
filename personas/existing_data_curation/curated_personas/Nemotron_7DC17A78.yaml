  hobbies: '[''digital drawing'', ''illustration'', ''video blogging'', ''attending art shows'', ''open mic nights'', ''improv theater'', ''board games'', ''online co-op gaming'', ''street photography'',
    ''listening to jazz and hip-hop'', ''drumming'', ''reading sci-fi/fantasy'', ''book club'']'
  career_goals: Tevin aims to build a career that blends his artistic curiosity with his love for community engagement. He plans to complete his bachelor's degree in visual communication or media studies
    and pursue roles as a multimedia artist, content creator, or creative strategist for a socially conscious brand. He dreams of launching his own digital media studio that produces short films, animated
    shorts, and interactive installations, especially projects that highlight stories from the African-American experience in St. Louis. In the near term, he seeks internships in graphic design or social
    media marketing, and hopes to take on leadership positions in student arts organizations. His ultimate ambition is to become an art director who can shape compelling campaigns while maintaining the
    flexibility to experiment with new media.
