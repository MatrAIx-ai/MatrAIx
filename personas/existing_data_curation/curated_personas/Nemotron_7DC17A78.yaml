personas:
  professional: Tevin Mcneil, an aspiring multimedia artist and content creator, leverages their proficiency in Procreate, Adobe Photoshop, and Premiere to craft speculative visual narratives while channeling
    their sociable, improvisational spirit into collaborative campus projects and student club leadership, even as their laid-back approach to deadlines sometimes leads to last-minute hustle.
  sports: Tevin Mcneil, a casual pick-up basketball player who joins Sunday games at the St. Louis community center and avidly follows the St. Louis Cardinals and St. Louis Blues, prefers street-style skate
    sessions over regimented gym routines, yet their flexible scheduling often leads to missed workouts when a new art project emerges.
  arts: Tevin Mcneil, a sketch-obsessed creative who spends evenings drawing speculative characters while drawing inspiration from Alex Ross's surreal illustrations, Guillermo del Toro's cinematic storytelling,
    Miles Davis's jazzy improvisations, and Erykah Badu's neo-soul vibes, frequently curates mini-exhibits at local art shows and contributes visual art to campus open-mic nights.
  travel: Tevin Mcneil, an adventurous wanderer who prefers spontaneous weekend road trips over meticulously planned vacations, has explored the jazz-rich streets of New Orleans and the vibrant murals of
    Chicago, and dreams of backpacking through Kyoto and Tokyo to capture the blend of tradition and neon futurism that fuels their speculative art.
  culinary: Tevin Mcneil, a self-taught kitchen experimenter who can whip up spicy jambalaya with Andouille sausage and collard greens or craft a quick ramen bowl using miso paste and fresh shiitake, loves
    biting into buttery cornbread and double-chocolate brownies, but often forgets to clean the stovetop, leading to cluttered cookware that mirrors their disorganized studio.
  core: Tevin Mcneil, an imaginative 18-year-old who fuses speculative art with community vibes, hustles between last-minute deadlines, impulsive art sprees, and a habit of misplacing their sketchbook,
    all while dreaming of a studio that amplifies unheard stories.
background:
  cultural: Tevin grew up in a Black family in St. Louis County, where community ties and cultural traditions have played a central role in his upbringing. His parents emphasized the importance of storytelling
    and music, exposing him early to gospel, blues, and hip-hop from local legends. Family gatherings often featured shared meals of Southern and Creole dishes, and he learned to appreciate the culinary
    heritage of the African-American diaspora. He attended a historically Black middle school, where he was introduced to African-American literature and the civil rights history of Missouri. The vibrant
    local arts scene, including the St. Louis Black Artists' Guild and the historic Soulard district, has inspired his creative work. Tevin also participates in community service programs that mentor younger
    youth, reflecting the communal responsibility common in Black neighborhoods of the city. These experiences have shaped his worldview, fostering a sense of pride in his heritage and a desire to amplify
    Black voices through his art.
attributes:
  skills: '[''digital illustration'', ''photo editing'', ''video editing'', ''creative writing'', ''public speaking'', ''event coordination'', ''social media management'', ''basic graphic design'', ''collaborative
