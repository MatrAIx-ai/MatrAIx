personas:
  professional: Stephen Wade, an experienced secondary‑school STEM teacher, leverages their meticulous curriculum design and data‑driven instruction to create structured, high‑standard physics and math
    courses, while they quietly mentor junior colleagues and champion school‑wide improvements from behind the scenes.
  sports: Stephen Wade enjoys solo hikes on the Rocky Mountains’ trail network, follows the Denver Broncos and Colorado Rockies avidly, participates in the Rocky Mountain Hiking Society’s monthly outings,
    and they practice light strength training at home to maintain fitness without disruptive team sports.
  arts: Stephen Wade’s artistic side emerges through nightly piano practice of Beethoven’s “Moonlight Sonata,” meticulous model‑airplane building inspired by historic WWII aircraft, woodworking that echoes
    the craftsmanship of Gustav Stickley, and they have a deep appreciation for Ansel Adams’ landscape photography and the documentary series “Cosmos.”
  travel: Stephen Wade’s travel planning is spreadsheet‑driven, favoring weekend road trips to national parks like Rocky Mountain and Yellowstone, a carefully budgeted summer tour of historic European sites
    such as Cambridge and the Roman ruins of Ephesus, and they aspire to stargaze from the Atacama Desert while keeping family commitments in mind.
  culinary: Stephen Wade prefers home‑cooked, nutritionally balanced meals, often preparing grilled salmon with lemon‑dill, roasted root vegetable medleys, and quinoa stir‑fry seasoned with sumac, while
    they maintain a modest cooking skill set that reflects a practical, no‑frills approach to the kitchen.
  core: Stephen Wade blends disciplined routine with solitary creativity, channeling meticulous organization into teaching, budgeting, and hobbies while they quietly mentor others and avoid unnecessary
    social bustle.
background:
  cultural: Stephen grew up in a traditional New England family with Anglo‑American roots, reflecting the modest, self‑reliant values common in the region. His cultural upbringing emphasizes practicality,
    community service, and respect for established institutions such as public schools. While he appreciates the local heritage of Nashua, New Hampshire, he maintains a personal identity that balances these
    communal expectations with a preference for privacy, routine, and quiet contemplation.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''STEM Subject Knowledge (Mathematics, Physics)'', ''Data‑Driven Instruction'', ''Educational Technology Integration'', ''Assessment Design'',
    ''Classroom Management'', ''Individualized Instruction'', ''Academic Counseling'', ''Organizational Skills'']'
  hobbies: '[''Reading scientific journals'', ''Woodworking'', ''Model airplane building'', ''Solo piano practice'', ''Hiking'', ''Gardening'', ''Stargazing'', ''Puzzle solving (Sudoku, crosswords)'', ''Watching
    educational documentaries'']'
  career_goals: Stephen aims to advance into a leadership role such as STEM department chair or instructional coach, where he can shape district‑wide curriculum and mentor faculty while preserving his preference
    for structured, behind‑the‑scenes work. He plans to earn a master's degree in Educational Leadership to strengthen his capacity for school‑wide program development. Over the next five years, he hopes
    to secure grant funding for a state‑of‑the‑art STEM lab, author a textbook on high‑school physics, and contribute to professional development workshops that emphasize practical, data‑informed teaching
    methods.
