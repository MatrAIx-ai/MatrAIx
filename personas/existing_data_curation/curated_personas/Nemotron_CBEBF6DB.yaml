personas:
  professional: Katrina Harvey is a veteran police officer with over thirty years of community‑focused policing experience who blends her law‑enforcement expertise with her educational background to design
    training modules, mentor new recruits, and de‑escalate high‑stress situations, and they are now positioning themselves for a precinct captain or community liaison role to shape policy and strengthen
    neighborhood ties.
  sports: Katrina Harvey stays active by walking their rescue dog through Prospect Park, participating in the local Senior Walking Club, cheering for the Brooklyn Nets, and joining a seasonal pick‑up tennis
    group at the community center, while they occasionally attend Brooklyn Cyclones games on warm summer evenings.
  arts: Katrina Harvey finds artistic solace in intimate jazz sessions at cafés where they listen to John Coltrane and Thelonious Monk, devouring historical biographies by Doris Kearns Goodwin and mystery
    novels by Agatha Christie, while also attending off‑Broadway productions by contemporary playwrights such as David Mamet.
  travel: Katrina Harvey prefers relaxed, flexible weekend getaways, having enjoyed historic tours of Savannah, a soul‑stirring jazz pilgrimage to New Orleans, and a quiet retreat to the historic lighthouses
    of coastal Maine, and they now dream of exploring Kyoto’s tranquil gardens and the natural splendor of the Catskills, often planning trips at the last minute due to their spontaneous nature.
  culinary: Katrina Harvey enjoys cooking hearty, herb‑forward meals such as rosemary‑infused roasted carrots, chicken stew with garden kale, and spicy lentil soup seasoned with cumin and cilantro, reflecting
    their intermediate cooking skills, love for fresh balcony produce, and a penchant for sharing meals at the community shelter where they volunteer.
  core: Katrina Harvey blends calm resilience, curious practicality, and a disorganized affection for flexible routines into a life of community service, gardening, and quiet creativity, while never missing
    a chance to lend a hand or a blanket.
background:
  cultural: Katrina was raised in a multigenerational African‑American family in Brooklyn, where church, community gatherings, and familial storytelling forged a strong sense of identity. Her parents emphasized
    education and civic responsibility, guiding her toward a career that could protect and uplift her neighborhood. The cultural tapestry of Brooklyn—its music, food, and activism—has deeply influenced
    her worldview, fostering a commitment to bridge gaps between law enforcement and the community. As a Black woman in a traditionally male‑dominated field, she draws on her lived experiences to advocate
    for equity, cultural sensitivity, and inclusive policing practices.
