  hobbies: '[''Urban gardening'', ''Reading historical biographies and mystery novels'', ''Knitting'', ''Walking in Prospect Park'', ''Attending small jazz sessions'', ''Volunteering at community centers
    (self‑defense instruction)'', ''Genealogy research'', ''Cooking soul‑food meals for friends and neighbors'']'
  career_goals: Approaching the final years of her active service, Katrina aims to transition into a senior leadership role such as precinct captain or community liaison officer, where she can shape policy
    and strengthen ties between the police department and the local community. She is also interested in spearheading a mentorship program that pairs seasoned officers with recruits from underrepresented
    backgrounds, drawing on her cooperative nature and commitment to harmony. Post‑retirement, Katrina envisions teaching criminal‑justice courses at a community college or working with nonprofit organizations
    that focus on youth development and restorative justice, allowing her curiosity and practical skills to continue benefiting the borough she calls home.
