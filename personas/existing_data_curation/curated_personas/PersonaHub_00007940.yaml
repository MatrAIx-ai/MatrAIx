persona_description: A researcher and economist who specializes in the analysis of water markets, particularly in the context of the Murray-Darling Basin. They have conducted extensive research on the impact
  of government water recovery on water markets, finding that it has little to no effect on water prices and that alternative options such as voluntary, open tender buybacks are more cost-effective and
  low-risk. Their findings contradict previous estimates by consultants and have implications for the allocation of funding for water recovery in the Murray-Darling Basin.
