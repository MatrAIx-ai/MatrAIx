personas:
  professional: Ryeisha Cruz translates her mastery of GPS/GNSS field data collection, drone photogrammetry, and GIS analysis into high‑impact flood‑resilience maps for Miami neighborhoods, while her methodical
    planning and collaborative spirit ensure rigorous quality control and seamless coordination with engineers, urban planners, and emergency managers.
  sports: Ryeisha Cruz combines weekend trail hikes in the Everglades with pick‑up soccer sessions at the Miami Youth Soccer Club, follows the Miami Heat and Miami Dolphins, and sustains her fitness through
    early‑morning runs, weekly yoga, and a commitment to a local running group that meets for a 5 k after work.
  arts: Ryeisha Cruz captures Miami’s pastel Art Deco façades through photography, dances to salsa legends like Celia Cruz during cultural festivals, attends performances by the Miami City Ballet, and immerses
    herself in contemporary literature from authors such as Ta‑Nehisi Coates, Yaa Gyasi, and Chimamanda Ngozi Adichie.
  travel: Ryeisha Cruz prefers meticulously planned week‑long trips that blend adventure and cultural immersion, such as kayaking the Florida Keys, savoring a culinary weekend in New Orleans, and exploring
    Cartagena, Colombia to practice Spanish, while keeping a modest travel fund to balance budget constraints.
  culinary: Ryeisha Cruz delights in preparing Caribbean‑inspired dishes like jerk chicken, callaloo, and plantain mofongo, experiments with spice blends alongside fresh ceviche and sushi, and seeks out
    farm‑to‑table restaurants where she orders plates featuring mango, coconut, and aromatic herbs.
  core: Ryeisha Cruz blends analytical precision with vibrant community rhythm, juggling GIS projects, salsa beats, and a habit of mapping every coffee shop she visits on her phone.
background:
  cultural: Ryeisha identifies as a Black American with Caribbean roots, tracing her family heritage to Jamaica and Haiti. Growing up in Miami’s vibrant, multicultural neighborhoods, she was immersed in
    a blend of Afro‑Caribbean music, Southern soul traditions, and Latino influences. This multicultural upbringing fostered a strong sense of community, an appreciation for collaborative effort, and a
    commitment to social equity. She remains active in local African‑American cultural organizations, participates in diaspora celebrations, and leverages her technical expertise to map resources for underrepresented
    communities, reflecting her values of harmony, cooperation, and practical problem‑solving.
attributes:
  skills: '["GPS/GNSS Field Data Collection", "Total Station Operation", "Drone Photogrammetry", "ArcGIS", "QGIS", "Remote Sensing Interpretation", "Spatial Data Analysis", "Cartographic Design", "AutoCAD
    Civil 3D", "Python Scripting for Geoprocessing", "Metadata Management", "Quality Assurance & Control", "Technical Report Writing", "Project Coordination"]'
  hobbies: '["Salsa Dancing", "Afro‑Caribbean Drumming", "Urban Photography", "Everglades Hiking", "Volunteer STEM Mentor", "Community Gardening", "Cooking Caribbean & Southern Cuisine", "Reading Contemporary
    Black Literature", "Spanish Language Study"]'
  career_goals: Ryeisha aims to advance into a senior GIS specialist or lead surveying technician role, securing professional certifications such as GISP and Certified Survey Technician. She plans to spearhead
    large‑scale mapping projects that address Miami’s flood resilience and climate adaptation, integrating community‑focused data to support underserved neighborhoods. Over the next five years, she intends
    to pursue a master’s degree in Geomatics or Urban Planning, mentor junior staff, and contribute to open‑source geospatial tools that enhance data accessibility for local NGOs and government agencies.
