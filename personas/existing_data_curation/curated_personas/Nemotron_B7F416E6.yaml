  career_goals: Short‑term, Robert plans to earn his GED within the next year and complete an online certification in video editing to boost his social‑media presence. He aims to launch a YouTube channel
    that showcases life in rural Mississippi—covering fishing trips, local food recipes, and community stories—while building a modest follower base. Mid‑term, he intends to enroll in a community college
    program, either automotive technology or digital media production, to gain a trade skill that offers both steady income and a creative outlet. Long‑term, he envisions either owning a mobile car‑repair
    service that lets him travel across Forrest County or becoming a regular host on a local radio station, combining his love for conversation, storytelling, and community engagement.
