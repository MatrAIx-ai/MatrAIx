personas:
  professional: Robert Wheeler, a 19‑year‑old aspiring digital storyteller, blends his knack for personable public speaking and hands‑on DIY repairs with budding video‑editing skills to create engaging
    YouTube content that spotlights rural Mississippi life, showing their curiosity‑driven yet pragmatic approach as they effortlessly switch between on‑camera narration and behind‑the‑scenes tinkering.
  sports: Robert Wheeler fuels a love for community athletics by playing pickup basketball at the town park, cheering on the Forrest County High School Tigers during Friday night football while tailgating
    with friends, and rooting for the New Orleans Saints in the NFL, embodying their sociable, talk‑heavy spirit on and off the field.
  arts: Robert Wheeler channels creative energy into acoustic guitar jam sessions inspired by folk legend John Prine and gospel powerhouse Mahalia Jackson, while also binge‑watching Southern‑themed films
    like O Brother, Where Art Thou? and admiring the brushwork of regional painter George O. Kelley, giving them a rich, culturally infused artistic palate.
  travel: Robert Wheeler prefers spontaneous road trips along the Gulf Coast, having already explored Biloxi’s beachfront and dreaming of a culinary pilgrimage to New Orleans’ French Quarter and the mountain
    vistas of Asheville, balancing a love for familiar Southern scenery with a curiosity for broader horizons despite limited funds.
  culinary: Robert Wheeler whips up Southern comfort staples—crisp fried catfish, hearty gumbo, and buttery hush puppies—using a modest kitchen setup, often adding a pinch of Cajun spice for a modern twist
    while sharing the meals at family potlucks, reflecting both their cooking competence and penchant for community feeding.
  core: Robert Wheeler is a talkative, curiosity‑driven 19‑year‑old who blends Southern hospitality with digital ambition, juggling guitar riffs, fishing tales, and video edits while occasionally forgetting
    to file taxes on time.
background:
  cultural: Robert grew up in Brooklyn, a small town in Forrest County, Mississippi, in a working‑class white family with deep roots in the rural South. His upbringing was shaped by the local Baptist church,
    where he participated in youth group activities and community service, and by the close‑knit community that rallies around high‑school sports, church picnics, and potlucks. While he respects traditional
    Southern values such as hospitality, hard work, and loyalty to family, he is also influenced by the broader digital culture he accesses through the internet, which fuels his curiosity about new ideas
    and technology. This blend of Southern heritage and modern connectivity informs his worldview, his communication style, and his ambition to bridge local stories with a wider audience.
