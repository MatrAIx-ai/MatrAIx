persona_description: David Scott, a retired NASA astronaut and engineer, is likely to read the above text. He is known for his pioneering work in space exploration, including the first person to walk on
  the Moon and drive on the Moon. His accomplishments have earned him two NASA Distinguished Service Medals, an Air Force Distinguished Service Medal, and the David C. Schilling Trophy and the Robert J.
  Collier Trophy. After retiring from NASA, Scott became the Center Director of NASA's Flight Research Center. He is also featured in the documentary In the Shadow of the Moon.
