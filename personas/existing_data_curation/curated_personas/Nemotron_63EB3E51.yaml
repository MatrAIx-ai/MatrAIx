  hobbies: '[''Surfing'', ''Skateboarding'', ''Competitive video gaming (e.g., Fortnite, Super Smash Bros.)'', ''Live streaming gameplay'', ''LEGO robotics and basic coding'', ''Creating short comedic videos'',
    ''Following surf competitions'', ''Reading marine science articles'']'
  career_goals: Kevin dreams of turning his love of competition and performance into a career. He wants to become a professional esports player or a popular YouTube content creator who reviews games and
    surf culture, eventually expanding into a media production company. He also imagines studying marine science to understand the ocean he surfs, hoping to combine his curiosity with practical problem-solving.
    Ultimately, he hopes to lead a team that creates innovative content and influences a large online audience.
