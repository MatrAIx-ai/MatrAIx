personas:
  professional: Kevin Janes is an aspiring teenage game developer who spends afternoons coding mini‑games with LEGO Mindstorms, livestreams his competitive strategy matches for friends, and balances curiosity-driven
    experimentation with the practical need to finish school assignments despite a habit of leaving things until the last minute, and they thrive on the attention that comes from being the center of an
    online audience.
  sports: Kevin Janes is a budding surfer who trains with the Ventura County Junior Surf League, shreds at the Santa Monica Skate Club after school, and fervently supports the Los Angeles Dodgers in baseball,
    the LA Galaxy in soccer, and the Golden State Warriors in basketball, channeling his competitive drive into both wave riding and skate trick contests.
  arts: Kevin Janes creates short comedic TikTok videos inspired by the rapid cuts of Larray and the quirky humor of Jack Black, while listening to acoustic surf‑rock legends like Jack Johnson and pop icons
    like Billie Eilish to set the mood during his beach sessions, and they often incorporate marine‑science meme references to amuse their follower base.
  travel: Kevin Janes loves weekend road trips to Santa Barbara’s Stearns Wharf, annual family vacations to Hawaii’s North Shore for legendary surf breaks, and day‑excursions to the Monterey Bay Aquarium
    to explore marine life, though they sometimes worry about spending too much of their allowance on travel.
  culinary: Kevin Janes favors fresh fish tacos topped with cilantro, lime, and mango salsa, enjoys whipping up avocado toast sprinkled with chili flakes for breakfast before early waves, and experiments
    with simple sushi rolls using sushi‑grade salmon and nori, but they often skip meals after long gaming marathons.
  core: Kevin Janes is a surf‑savvy, gaming‑obsessed 11‑year‑old who flips between skate parks and streaming rigs, juggling nervous energy with a fierce need for attention and a habit of procrastinating
    on schoolwork.
background:
  cultural: Kevin grew up in Ventura, a coastal city in Ventura County, California, within a middle‑class white family. The community’s beach lifestyle, surf culture, and outdoor recreational opportunities
    have shaped his daily routine and interests. He attends a public middle school where multicultural influences are present, but his family emphasizes a laid‑back, California‑centric ethos that values
    flexibility, personal expression, and practical outdoor skills. The local emphasis on environmental awareness and marine education also informs his curiosity about the ocean.
attributes:
  skills: '[''Public speaking'', ''Group facilitation'', ''Basic robotics (LEGO Mindstorms)'', ''Introductory Python coding'', ''Strategic video-game play'', ''Storytelling and video editing'', ''Surfing
