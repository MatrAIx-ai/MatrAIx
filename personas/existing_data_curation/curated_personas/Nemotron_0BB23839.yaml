  hobbies: '[''Building LEGO sets'', ''Reading mystery/adventure books'', ''Playing Minecraft (creative mode)'', ''Solving jigsaw puzzles and Kids Sudoku'', ''Small‑group soccer practice'', ''Coding with
    Scratch Jr.'', ''Assembling model airplane kits'', ''Exploring local parks and nature trails'']'
  career_goals: Michael dreams of becoming an engineer who designs and builds practical structures, such as bridges or spacecraft. He is fascinated by how things work and enjoys planning and constructing
    projects in his LEGO sets, which fuels his ambition to study engineering in the future. He also hopes to lead a small team in school science fairs and win a regional robotics competition, aiming to
    combine his love for problem‑solving with friendly competition. In the longer term, he imagines working for an organization like NASA or a local technology firm where he can apply his logical mindset
    to create tangible solutions.
