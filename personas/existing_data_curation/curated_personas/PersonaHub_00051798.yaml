persona_description: A historian specializing in the study of the Dye 3 temperature record from the Greenland Plateau, particularly focusing on the discipline and detail of the temperature decline over
  the last four thousand years. The persona is interested in the relationship between temperature and growing conditions at about the latitude of the US – Canadian border, and how it relates to solar cycles
  and the frequency and amplitude of cooling events. They are also knowledgeable about the solar activity indicators and the progress of Solar Cycle 24, and how it compares to the previous two cycles.
