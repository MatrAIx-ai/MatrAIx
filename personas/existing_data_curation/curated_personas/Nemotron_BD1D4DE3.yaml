  hobbies: '[''Sketching and digital painting'', ''Visiting art museums'', ''School soccer team'', ''Debate club'', ''Robotics STEM sessions'', ''Weekend photography walks'', ''Learning family recipes'',
    ''Practicing calligraphy'', ''Reading manga and graphic novels'']'
  career_goals: Chi aspires to attend a specialized high school for visual arts and later pursue a degree in graphic design or UI/UX design, where she can blend her artistic talent with her growing coding
    skills to create culturally inclusive digital experiences. She dreams of one day leading community workshops that teach other teens how to express themselves through art and technology, and she hopes
    to work for a design studio that values innovative, socially‑responsible projects.
