personas:
  professional: Chi Hsu, a 13‑year‑old aspiring visual storyteller who also tinkers with simple robots, channels their curiosity and competitive edge into disciplined sketch sessions and systematic coding
    sprints, balancing artistic experimentation with the structure required by school and soccer commitments.
  sports: Chi Hsu, a dedicated midfielder for the local Minneapolis United Soccer Club, laces up for both league matches and varsity tryouts, while cheering on Minnesota United FC in the MLS and occasionally
    attending Minnesota Twins baseball games to unwind after debate tournaments.
  arts: Chi Hsu immerses themselves in sketching manga‑inspired characters, drawing creative fuel from the works of Osamu Tezuka and Hayao Miyazaki, while frequent visits to the Minneapolis Institute of
    Art to study Vincent van Gogh’s 'Starry Night' and Henri Matisse’s cut‑outs shape their digital painting palette and inform their burgeoning visual narrative style.
  travel: Chi Hsu loves weekend photo walks in Minnehaha Regional Park, dreams of an eventual cultural exchange trip to Tokyo to explore manga heritage but is currently limited by school commitments, and
    during school breaks they have visited the historic French Quarter in New Orleans because of its vibrant street‑art scene.
  culinary: Chi Hsu practices family recipes like stir‑fried noodles with soy sauce, learns to perfect sushi rolls, enjoys making mango sticky rice, and experiments with matcha‑infused cupcakes for their
    friends, yet they often neglect precise measurements, preferring intuition over strict recipes.
  core: Chi Hsu is an inquisitive teen who fuses art, robotics, and soccer with a competitive streak, thrives on structured creativity, yet habitually postpones dentist visits and overindulges in late‑night
    manga marathons.
background:
  cultural: 'Chi’s family originates from East Asia, with her parents having immigrated from Taiwan before settling in Minneapolis. The household maintains many traditions: they celebrate Lunar New Year
    with red envelopes and homemade dumplings, speak Mandarin at home, and observe cultural holidays like the Mid‑Autumn Festival. Growing up in the diverse community of Hennepin County, Chi blends these
    customs with typical American experiences—attending local festivals, enjoying the city’s parks, and engaging with friends from various backgrounds. This bicultural upbringing fosters a strong respect
    for education, a collaborative spirit tempered by healthy skepticism, and an artistic sensibility that draws on both Eastern calligraphic techniques and contemporary Western design.'
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Basic Python programming'', ''Robotics fundamentals'', ''Bilingual (English, Mandarin)'', ''Public speaking & debate'', ''Critical thinking'',
