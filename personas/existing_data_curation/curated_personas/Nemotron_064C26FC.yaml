personas:
  professional: An emerging visual communicator, Derrick Koep leverages his associate’s degree, Adobe Photoshop and Illustrator mastery, and methodical project planning to produce polished digital illustrations
    and photography portfolios while maintaining a calm, curious approach that blends research rigor with artistic intuition.
  sports: Derrick Koep enjoys early morning jogs in Babler State Park, practices yoga twice weekly at the St. Louis Community Center, supports the St. Louis Cardinals and St. Louis Blues, and plays casual
    soccer with the local St. Louis Metro FC recreational league.
  arts: Derrick Koep spends weekends sketching at the Contemporary Art Museum St. Louis, draws inspiration from Julie Mehretu, Kara Walker, and Henri Cartier‑Bresson, and curates vinyl evenings featuring
    Miles Davis, John Coltrane, and Aphex Twin while occasionally quoting Terrence Malick in his notebook.
  travel: Derrick Koep plans meticulously for weekend getaways, having captured the sunrise over Forest Park, trekked the Ozark National Forest, explored the Met in New York City, and dreaming of photographing
    the cherry blossoms in Kyoto while balancing a modest student budget.
  culinary: Derrick Koep, a confident home cook, favors simple seasonal dishes like roasted beet and goat‑cheese salad with thyme, pan‑seared trout with lemon butter, and experiments with sourdough starter
    using rosemary, while pairing meals with his favorite Ethiopian coffee beans.
  core: Derrick Koep is a calm, methodical art enthusiast who obsessively fills sketchbooks, over‑plans every project, and heals through quiet meditation and a steady rhythm of vinyl and coffee.
background:
  cultural: Derrick grew up in Wildwood, a suburban community in St. Louis County, Missouri. His upbringing reflects typical Midwestern white cultural values, emphasizing modesty, self‑reliance, community
    participation, and a strong connection to the outdoors. He was educated in local public schools and was exposed early to the region’s cultural resources, including the St. Louis Art Museum, Contemporary
    Art Museum, and nearby historic sites. The blend of suburban life, access to a vibrant metropolitan art scene, and the natural landscape of the Ozark foothills has fostered his appreciation for both
    artistic expression and nature. While identifying as white, Derrick’s worldview is shaped by a mix of traditional Midwestern values and a curiosity for diverse artistic and intellectual ideas.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography (composition, Lightroom editing)'', ''Graphic design and layout'', ''Basic web design (HTML, CSS, WordPress)'', ''Research
    and data organization'', ''Project planning and time management (Trello, Asana)'', ''Critical thinking and creative problem‑solving'', ''Written communication and editing'']'
  hobbies: '[''Visiting art museums and independent galleries'', ''Sketching and watercolor painting'', ''Nature photography'', ''Hiking in local parks'', ''Reading art theory, philosophy, and design books'',
    ''Playing acoustic guitar'', ''Chess and puzzle solving'', ''Mindfulness meditation'', ''Volunteering at community art events'', ''Cooking seasonal dishes'']'
  career_goals: Derrick aims to deepen his artistic practice and transition into a professional visual‑arts career. He plans to transfer to a four‑year university to earn a Bachelor of Fine Arts or a degree
    in visual communication, while simultaneously building a portfolio that showcases his illustration, photography, and design work. In the short term, he hopes to secure freelance projects and part‑time
    internships with boutique design studios or local museums in the St. Louis area. Long‑term, he envisions working as a graphic designer or curator for a small museum or cultural organization, where he
    can combine his love of art, research, and organization to create intimate exhibitions and educational programs. He also aspires to launch an online shop selling prints of his photography and artwork,
    and eventually teach workshops for small groups of art enthusiasts.
