persona_description: A media and communication professional who is interested in creating, editing, translating, and disseminating information through various platforms. They may work as announcers, broadcast
  and sound engineering technicians, film and video editors, or photographers. They are skilled in using technical expertise, creativity, and composition skills to produce and preserve images that tell
  a story or record an event. They are also interested in developing written content for various types of media, including advertisements, books, magazines, movie, play, and television scripts, and blogs.
