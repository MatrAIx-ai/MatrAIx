personas:
  professional: Ruth Evans, a budding marine enthusiast who loves to collect shells at the boardwalk and turn them into stories during preschool, demonstrates curiosity, methodical organization, and an
    early knack for systematic observation, often planning beach excursions with a detailed checklist.
  sports: Ruth Evans dives into weekly sandcastle building contests at the boardwalk, eagerly cheers on the New York Mets during family movie nights, and participates in the Harbor Tots Soccer club’s Thursday
    mini‑games, balancing a love of water play with organized team activities.
  arts: Ruth Evans delights in the local library’s storytime, where they mimic the expressive gestures of puppeteers, and spends rainy afternoons splashing watercolor paints on sea‑foam‑colored paper, often
    humming along to Raffi’s “Baby Beluga” while their imagination blends art with the rhythm of ocean waves.
  travel: Ruth Evans loves weekend car rides to the nearby Cape May lighthouse, eagerly pointing at map stickers of the boardwalk and the Atlantic City boardwalk, while also dreaming of a future visit to
    the Smithsonian in Washington, DC, balancing family‑guided exploration with a budding curiosity for far‑off landmarks.
  culinary: Ruth Evans enthusiastically helps stir the batter for their favorite blueberry pancakes on Saturday mornings, relishes the salty crunch of fresh Atlantic crab cakes at family picnics, and never
    says no to a peanut butter‑and‑jelly sandwich, demonstrating a palate that mixes comforting classics with seaside flavors.
  core: Ruth Evans is a meticulously curious four‑year‑old who catalogues seashells like treasures, saves pennies for aquarium trips, and occasionally forgets their jacket on breezy beach days, blending
    organized wonder with endearing childish whims.
background:
  cultural: Ruth is raised in a predominantly white, middle-class family in Lanoka Harbor, a coastal community in Ocean County, New Jersey. Her ancestry blends Irish and German heritage, and her family
    celebrates traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, often incorporating beachside picnics and fireworks. The local culture emphasizes close ties to the
    Atlantic shoreline, so weekend outings to the boardwalk, tide-pool exploration, and community beach clean-ups are common. She attends a local preschool that partners with the public library for weekly
    storytimes, and her family participates in a neighborhood church that offers seasonal events. These cultural influences nurture her curiosity about nature, appreciation for community arts programs,
    and respect for organized, family-centered routines.
