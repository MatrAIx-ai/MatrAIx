  career_goals: Although only four, Ruth already imagines future roles that combine her love of art, animals, and helping others. She often says she wants to be a teacher so she can share stories and teach
    friends, a veterinarian because she cares for neighborhood dogs and the crabs she finds at the beach, and an artist who can paint beautiful pictures of the ocean. Her organized nature leads her to declare
    she will keep everything neat when she grows up, reflecting a budding ambition to be responsible and supportive in any career she chooses.
