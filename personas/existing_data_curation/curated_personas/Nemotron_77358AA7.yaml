personas:
  professional: Judith Willis, a seasoned civil engineer with a PMP and Lean Six Sigma Green Belt, leverages her expertise in structural design, hydrology, and transportation to lead multidisciplinary teams
    toward climate‑resilient, sustainable infrastructure projects while mentoring women engineers and championing risk‑aware safety planning.
  sports: Judith Willis, an avid hiker on the Blue Ridge Parkway and member of the Stokes County hiking club, also enjoys seasonal pickleball matches with the local senior league, roots for the Carolina
    Panthers, and follows the Charlotte Hornets, blending a love of nature with community sport.
  arts: Judith Willis, who quilts with a meticulous eye at the county craft circle and devotes evenings to the regional book club, finds inspiration in the folk melodies of Gillian Welch, the landscape
    paintings of Andrew Wyeth, and the engineering memoirs of Mary Jackson, allowing her creative side to balance the precision of her profession.
  travel: Judith Willis prefers road‑trip adventures that combine scenic hikes, such as her recent drive along the Blue Ridge Parkway to Shenandoah National Park, and cultural immersion—like a culinary
    weekend in Asheville—while dreaming of a future pilgrimage to the Scottish Highlands to study historic bridge designs; they plan trips meticulously but sometimes overbook, leading to last‑minute stress.
  culinary: Judith Willis, an enthusiastic proponent of Southern farm‑to‑table cuisine, regularly prepares shrimp and grits with heirloom tomatoes, collard greens slow‑cooked with smoked turkey, and freshly
    baked biscuits, and delights in hosting potluck gatherings where the menu showcases locally sourced produce and seasonal herbs.
  core: Judith Willis is a methodical, socially vibrant civil engineer whose curiosity drives sustainable infrastructure work, while a penchant for meticulous journaling, quilting, and occasional over‑commitment
    reveals a quirky blend of precision and warmth.
background:
  cultural: Judith grew up in a small town in central North Carolina during the 1970s and 1980s, a period marked by a strong sense of community, self-reliance, and a growing appreciation for higher education.
    Her family emphasized the importance of hard work, hospitality, and civic involvement, values that have guided her throughout her life. She earned her Bachelor of Science in Civil Engineering from North
    Carolina State University, where she was part of the early wave of women entering traditionally male-dominated STEM fields. The region’s agricultural heritage and the surrounding Appalachian landscape
    cultivated in her a deep respect for the environment and for practical, locally appropriate solutions. While identifying as a white American, Judith is keenly aware of the evolving cultural tapestry
    of the South and actively supports inclusive initiatives that broaden access to engineering careers for underrepresented groups.
attributes:
  skills: '[''Structural Design'', ''Hydrology and Water Resources'', ''Transportation Engineering'', ''AutoCAD'', ''Civil 3D'', ''Finite-Element Analysis (SAP2000)'', ''Project Management Professional
