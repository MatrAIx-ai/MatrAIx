  hobbies: '[''STEM outreach volunteering'', ''Hiking in the Blue Ridge Mountains'', ''Cooking Southern farm-to-table meals'', ''Hosting potluck gatherings'', ''Yoga and mindfulness meditation'', ''Participating
    in a book club'', ''Quilting and craft circle'']'
  career_goals: Judith aims to transition into a senior leadership role where she can steer large-scale infrastructure projects that integrate climate-resilient design and sustainable materials, positioning
    Stokes County as a model for rural watershed management. She is determined to champion the advancement of women in engineering by establishing a regional mentorship network and serving on the board
    of the local Society of Women Engineers chapter. In the next five years, she also plans to author a practical guide on bridging emerging green technologies with traditional engineering practices, leveraging
    her curiosity for new ideas while honoring proven methodologies. As she approaches retirement, Judith hopes to steward a smooth knowledge transfer to the next generation of engineers and continue contributing
    as a consultant on community-focused projects.
