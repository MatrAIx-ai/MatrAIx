personas:
  professional: Ana Rivera, a retired small‑store owner, now provides pro‑bono consulting to local non‑profits, leveraging her business degree, inventory expertise, and bilingual mediation skills to organize
    predictable volunteer schedules while delighting in being the focal point of community workshops.
  sports: Ana Rivera follows the local soccer team D.C. United avidly, attending weekend matches with friends, participates in low‑impact water aerobics at the community center, and tends to join a weekly
    garden‑themed walking group, balancing social interaction with gentle exercise.
  arts: Ana Rivera immerses herself in Latin American literature through a senior book club featuring works by Gabriel García Márquez and Isabel Allende, enjoys watercolor painting inspired by traditional
    folk patterns, and frequently watches classic films starring Pedro Infante and Dolores del Río.
  travel: Ana Rivera travels twice a year, planning trips to her hometown in Jalisco to celebrate Día de los Muertos with family, while also exploring nearby historic sites like Williamsburg, preferring
    structured itineraries that allow time for community outreach events.
  culinary: Ana Rivera delights in cooking tamales, pozole, and enchiladas using fresh herbs from her garden, expertly blends chilies, epazote, and dried oregano, and while her cooking skill is high, she
    occasionally over‑salt dishes when stressed.
  core: Ana Rivera blends meticulous organization with lively sociability, turning every community gathering into a structured celebration while quietly battling worry over health and finances.
background:
  cultural: Ana Cecilia was born and raised in the state of Jalisco, Mexico, and moved to the United States in her early thirties. She retains a strong Mexican identity, speaking fluent Spanish at home
    while being fully proficient in English. She actively celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo, incorporates Catholic traditions into family life, and participates in
    Mexican community organizations in Fairfax County. Her cultural values emphasize family cohesion, respect for elders, hospitality, and a deep sense of communal responsibility.
attributes:
  skills: '[''Financial planning'', ''Budget management'', ''Inventory control'', ''Event coordination'', ''Volunteer management'', ''Bilingual communication (Spanish/English)'', ''Conflict mediation'',
