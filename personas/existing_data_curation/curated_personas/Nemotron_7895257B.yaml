  career_goals: Vincent dreams of a future where he can work in a calm, structured environment that lets him solve problems independently. He imagines becoming a computer programmer or a civil engineer,
    roles that involve designing and building things methodically. He also expresses an interest in becoming a librarian, attracted by the quiet atmosphere and orderly arrangement of books. In the short
