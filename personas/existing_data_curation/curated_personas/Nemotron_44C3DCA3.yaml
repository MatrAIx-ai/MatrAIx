  hobbies: '[''Watercolor Painting'', ''Oil Sketching'', ''Landscape Photography'', ''Model Ship Building'', ''Heirloom Gardening'', ''Crossword Puzzles'', ''Chess'', ''Genealogy Research'', ''Volunteer
    Archiving at Historical Society'', ''Attending Local Art Exhibitions'']'
  career_goals: Approaching retirement, John aims to transition from full‑time clerical duties to a part‑time advisory role where he can mentor younger staff and share his decades of bookkeeping knowledge.
    He plans to volunteer as a financial‑literacy instructor at the local community college, helping seniors and small‑farm owners manage their finances. John also hopes to author a short guide on small‑town
    bookkeeping practices, preserving his expertise for future generations. To maintain mental well‑being and reduce stress, he seeks low‑pressure opportunities that still allow him to contribute to his
    community, while also pursuing lifelong learning through occasional art‑history courses at a nearby college.
