personas:
  professional: Mary Tucker, a dedicated healthcare support worker at a busy outpatient clinic, blends a practical, protocol‑driven approach with a curiosity for emerging health‑tech tools, skillfully monitors
    vitals and documents records while managing a relaxed, sometimes disorganized schedule that she balances with a cooperative spirit and occasional worry over missed details.
  sports: Mary Tucker, a loyal fan of the New Orleans Saints and Pelicans, plays in the Lafourche Bayou Builders adult softball league and stays fit by jogging along the levee each sunrise and attending
    weekly yoga, though they occasionally skip sessions when stress about work piles up.
  arts: Mary Tucker regularly immerses herself in Cajun and Zydeco music, attending live shows featuring Buckwheat Zydeco tribute bands and the BeauSoleil ensemble, and enjoying mystery novels by Tana French
    and Louise Penny, which they find soothing for anxiety and inspiring for their culinary experiments.
  travel: Mary Tucker favors low‑key getaways to Gulf coastal spots like Grand Isle and annual pilgrimages to New Orleans for Mardi‑Mardi celebrations, they often plan spur‑of‑the‑moment day trips to the
    Atchafalaya Basin, while dreaming of a future escape to Quebec’s Charlevoix region to explore French‑speaking culture, balancing limited savings with a desire for authentic, community‑focused experiences.
  culinary: Mary Tucker enjoys cooking traditional gumbo and crawfish étouffée, confidently sautéing the holy trinity of onions, bell peppers, and celery, seasoning with smoked andouille sausage and filé
    powder, and they often experiment with fresh Gulf shrimp for blackened fish tacos, a skill level that blends casual home‑cooking comfort with a creative flair nurtured by community festivals.
  core: Mary Tucker blends a practical, tech‑curious nursing mindset with a love for Cajun flavors, community festivals, and a tendency to worry about details, making them both a caring caregiver and a
    spontaneous, slightly disorganized planner.
background:
  cultural: Mary is a white woman raised in Larose, Louisiana, with deep roots in the Cajun‑French heritage of Lafourche Parish. She grew up in a close‑knit Catholic community where family gatherings, church
    events, and local festivals like the Lafourche Parish Cajun Music Festival were central to daily life. Her upbringing instilled a strong sense of Southern hospitality, an appreciation for Gulf seafood
    cuisine, and familiarity with the French language nuances heard in the region. These cultural influences shape her values of cooperation, community service, and a practical approach to life.
attributes:
  skills: '[''patient care'', ''vital signs monitoring'', ''infection control'', ''medical record documentation'', ''basic phlebotomy'', ''patient communication'', ''team collaboration'', ''appointment
    scheduling'', ''emergency response basics'', ''basic wound care'']'
  hobbies: '[''Cajun cooking'', ''gardening'', ''birdwatching'', ''listening to zydeco music'', ''attending local festivals'', ''reading mystery novels'', ''yoga'', ''volunteering at community health fairs'']'
  career_goals: Mary aims to earn a Certified Nursing Assistant (CNA) credential within the next year and later pursue a Medical Assistant certification to broaden her clinical skill set. She hopes to transition
    into a patient education role where she can combine her practical experience with her curiosity about emerging health technologies. Long‑term, Mary envisions starting a small home‑health agency that
    offers personalized, compassionate care to seniors in Lafourche Parish, allowing her to stay close to her family while making a meaningful impact on her community.
