personas:
  professional: Marbella Cabrera, a 26‑year‑old construction supervisor, blends a hands‑on curiosity for new building techniques with a practical improvisational style, and they keep bilingual crews on
    schedule, translating blueprints into clear daily tasks while nurturing a relaxed, cooperative vibe despite a habit of occasional disorganization.
  sports: Marbella Cabrera plays forward for a local Moreno Valley amateur soccer league, they cheer loudly for LAFC and follow the Los Angeles Dodgers, and they spend weekends hiking the San Bernardino
    foothills, balancing team camaraderie with solo trail runs.
  arts: Marbella Cabrera captures construction sites and community festivals through photography, immerses themselves in regional Mexican music by listening to Vicente Fernández and Calibre 50, and they
    read contemporary Mexican authors like Valeria Luiselli and Guadalupe Nettel, letting storytelling shape both leisure and work.
  travel: Marbella Cabrera prefers road‑trip adventures that blend cultural immersion with natural scenery, they have driven to Oaxaca to explore its markets and murals, and they are planning a future trek
    through the Grand Canyon and historic pueblos of New Mexico while budgeting carefully to fund upcoming construction certifications.
  culinary: Marbella Cabrera cooks tamales, pozole, and chiles en nogada for friends, wielding a well‑worn molcajete and balancing smoky chipotle with fresh epazote, and they enjoy occasional street‑taco
    runs after work, though they sometimes forget to defrost meat in time for weekend feasts.
  core: Marbella Cabrera is a sociable, slightly disorganized construction leader who balances a love for community‑rooted traditions with a restless drive to build affordable, green homes, and they constantly
    juggle anxiety‑induced worries with a penchant for spontaneous soccer matches.
background:
  cultural: Marbella is a second‑generation Mexican‑American raised in Moreno Valley. He grew up speaking Spanish at home and English at school, navigating a bicultural identity that blends Mexican family
    traditions—such as Día de los Muertos altars, quinceañeras, and communal meals—with Southern California life. He remains active in the local Latino community, supporting events that celebrate Mexican
    heritage and advocating for immigrant workers' rights. His cultural roots influence his love of Mexican food, music, and storytelling, and they inform his desire to give back through community‑focused
    construction projects.
