  career_goals: Marbella aims to earn a Construction Management certification and eventually a Project Management Professional (PMP) credential so he can move from first‑line supervision to managing multi‑million‑dollar
    projects. He envisions launching his own construction firm focused on affordable, energy‑efficient housing for Latino families in Riverside County. Alongside career advancement, he wants to improve
    his organizational habits to reduce stress, mentor younger workers from his community, and become an advocate for safer, greener building standards.
