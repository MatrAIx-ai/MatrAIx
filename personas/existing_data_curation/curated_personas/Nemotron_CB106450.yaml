  hobbies: '[''Hiking and nature walks'', ''Birdwatching'', ''Stargazing'', ''Reading speculative fiction and philosophy'', ''Listening to jazz and folk music'', ''Playing acoustic guitar'', ''Watercolor
    painting'', ''Experimental cooking'', ''Woodworking small furniture'', ''Meditation'', ''Reflective journaling'']'
  career_goals: Erick aims to turn his artistic talents into a sustainable freelance career, offering illustrated stories, custom prints, and photo essays for online publications and local businesses. He
    envisions launching a small e‑commerce shop to sell his handcrafted art and garden produce, eventually expanding to host monthly workshops that teach creative skills to neighbors. To deepen his expertise,
    he plans to enroll in a community college certificate program in horticulture and a weekend graphic design course, providing a steadier income while preserving his flexible, novelty‑driven lifestyle.
