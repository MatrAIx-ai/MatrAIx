  career_goals: Bernard aspires to earn a scholarship to attend a technical college where he can study engineering, ideally civil or mechanical engineering, with a long‑term goal of designing community
    infrastructure projects that improve neighborhoods in Baltimore County. He also hopes to become a mentor for younger students, sharing his organized approach to learning and encouraging practical curiosity.
    In the near term, he plans to complete his high school equivalency (GED), obtain certifications in IT fundamentals (CompTIA A+), and secure an apprenticeship in a local trade.
