persona_description: A neurosurgeon who is involved in the development and testing of new medical devices, particularly those related to the treatment of brain diseases such as stroke. He is a professor
  at the Medical University of South Carolina and is the principal investigator for the VIPS for the Non-Invasive Detection of Hemispheric Bioimpedance Asymmetry in Severe Brain Pathology (VITAL) study.
  His research interests include the use of imaging technologies, particularly spectroscopy, to diagnose and treat brain diseases, and the development of medical devices that can provide accurate and timely
  information to emergency medical personnel.
