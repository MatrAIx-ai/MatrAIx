  career_goals: Kevin aims to combine his love of farming with technical skills, hoping to become a certified farm equipment technician or a manager of a small family-owned farm that adopts smart-agriculture
    technology. He also considers opening a mobile repair service for rural equipment, or pursuing an apprenticeship in automotive or mechanical trades after high school, while staying close to his community.
