  hobbies: '[''Hiking'', ''Nature photography'', ''Watercolor painting'', ''Attending art galleries'', ''Gardening'', ''Farm-to-table cooking'', ''Volunteering teaching art'', ''Organizing craft fairs'']'
  career_goals: Karen aims to advance to a supervisory or senior safety analyst position within the Pennsylvania Department of Transportation, where she can shape regional inspection policies and lead a
    team of inspectors. She plans to obtain the Certified Transportation Safety Specialist (CTSS) credential and contribute to statewide initiatives that reduce roadway accidents. Long-term, she hopes to
    develop a community outreach program that educates local drivers, especially seniors, about safe driving practices and emerging transportation technologies.
