  hobbies: '["Vegetable gardening","Southern cooking","Hiking local trails","Reading mystery and historical fiction","Book club participation","Knitting and leading a senior knitting circle","Volunteering
    at community center"]'
  career_goals: Loni aims to build on her practical experience by earning a Certified Nursing Assistant (CNA) credential within the next year, followed by an associate degree in health sciences to become
    a licensed practical nurse (LPN). She is particularly interested in specializing in geriatric and dementia care, and hopes to pursue additional training in hospice support. In the longer term, Loni
    envisions taking on a supervisory role in a home‑health agency or starting her own small business that provides personalized care services to the Altavista community, combining her organizational strengths
    with her desire to make a meaningful impact.
