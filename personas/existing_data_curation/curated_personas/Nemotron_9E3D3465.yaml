personas:
  professional: Loni Byrd, a 26‑year‑old personal care aide in Campbell County, blends meticulous scheduling, CPR certification, and wound‑care expertise with a compassionate yet assertive bedside manner,
    making them a reliable advocate for their clients and a natural candidate for upcoming CNA certification.
  sports: Loni Byrd enjoys weekend hikes on the rolling trails of Campbell County and seasonal runs with the local “Trailblazers” running group, while they cheer on the Virginia Tech Hokies football team
    and catch the Richmond Flying Squirrels minor‑league baseball games as part of their balanced active lifestyle.
  arts: Loni Byrd regularly participates in a mystery‑and‑historical‑fiction book club featuring authors like Agatha Christie and Hilary Mantel, leads a senior knitting circle where they craft intricate
    patterns to folk tunes by Alison Krauss, and occasionally attends community theater productions of classic dramas.
  travel: Loni Byrd prefers meticulously planned weekend road trips to historic towns such as Charleston and Asheville, as well as day hikes in Shenandoah National Park, balancing their modest travel budget
    with occasional reward‑point getaways to New Orleans for culinary exploration, and they relish the mix of adventure and relaxation.
  culinary: Loni Byrd brings a home‑grown touch to classic Southern dishes—slow‑cooking fried chicken with buttermilk brine, simmering collard greens with smoked ham hocks, and tossing fresh heirloom tomatoes,
    cucumbers, and basil into garden salads—while they also master the art of peach cobbler in their well‑worn cast‑iron skillet.
  core: Loni Byrd is a methodical caregiver who balances a love for garden‑fresh Southern cooking with a disciplined drive toward nursing credentials, all while quietly juggling a thread of mild anxiety
    and a habit of arranging their knitting yarn by color, and they rarely miss a chance to plan their next project.
background:
  cultural: Loni grew up in Altavista, a small town in Campbell County, Virginia, where Southern Appalachian values shape daily life. Her upbringing emphasized community, self‑reliance, and a strong work
    ethic, which are reflected in her practical and organized approach to both work and leisure. She was raised in a Methodist family that attends church regularly, fostering a sense of compassion and service.
    Local traditions such as storytelling, folk music, and seasonal festivals have given her a deep appreciation for the region’s cultural heritage, while her white, working‑class background has kept her
    grounded in the modest, close‑knit social fabric of rural Virginia.
attributes:
