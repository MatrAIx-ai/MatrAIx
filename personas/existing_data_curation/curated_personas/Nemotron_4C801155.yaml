  career_goals: Digna aims to move into a supervisory role within the next two years, targeting a position such as Warehouse Operations Supervisor or Inventory Control Manager. She plans to earn the Certified
    in Production and Inventory Management (CPIM) credential to deepen her strategic understanding of supply chain processes. Her long‑term ambition is to lead a regional distribution center, where she
    can implement lean inventory practices and mentor a team of clerks and technicians. Additionally, Digna is interested in spearheading a technology upgrade project to transition her facility to a cloud‑based
    WMS, believing that data‑driven decision‑making will improve accuracy and reduce labor costs. She wants her career progression to reflect her competitive drive while maintaining the work‑life balance
    that supports her family.
