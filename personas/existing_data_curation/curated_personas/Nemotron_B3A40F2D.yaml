  hobbies: '[''Community soccer league'', ''Salsa/Bachata dancing'', ''Cooking Puerto Rican dishes'', ''Scale brick‑laying kits'', ''DIY home‑improvement projects'', ''Weightlifting'', ''Volunteering at
    cultural festivals'']'
  career_goals: Rafael aims to secure journeyman certification within the next two years and advance to a foreman position on larger commercial projects. He plans to complete a construction management certificate
    at a local community college to broaden his supervisory capabilities. Long‑term, he envisions launching his own masonry contracting business that specializes in high‑end residential finishes and historic
    preservation work in the Reading area. His competitive drive pushes him to develop a reputation for flawless workmanship, and he hopes to mentor apprentices, fostering a skilled, reliable team. He also
    intends to join the local bricklayers' union to gain access to mentorship programs and larger network opportunities.
