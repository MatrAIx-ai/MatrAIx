personas:
  professional: Rafael Ramos, a 23‑year‑old brick mason with a knack for precision, leverages his methodical planning and strong communication to interpret blueprints, oversee small crews, and ensure every
    mortar joint meets code, all while eyeing journeyman certification and a future foreman role.
  sports: Rafael Ramos plays forward in a neighborhood soccer league, hits the gym for weightlifting three times a week, follows the Philadelphia Eagles for football and the Phillies for baseball, and occasionally
    volunteers with a local rowing club during the summer, balancing a competitive drive on the field with a structured training routine.
  arts: Rafael Ramos channels his love for rhythm into salsa and bachata nights, admires the choreography of dancers like Luis Torres, enjoys the music of Marc Anthony and Celia Cruz, and appreciates the
    craftsmanship of historic brickwork in colonial architecture, often visiting local galleries that showcase such heritage.
  travel: Rafael Ramos frequents weekend trips to the historic streets of Philadelphia and the vibrant markets of New York City, dreams of exploring the cobblestone plazas of Cartagena and the baroque hill
    town of Guanajuato, but balances these aspirations with a modest travel budget and a job schedule that limits longer vacations.
  culinary: Rafael Ramos’s cooking skill sits between confident home‑cook and aspiring chef, perfecting traditional dishes like arroz con gandules, pasteles, and sofrito‑spiced stews, while also experimenting
    with modern twists using plantain flour and smoked paprika, and enjoys dining out at local farm‑to‑table spots that serve seasonal vegetable risottos.
  core: Rafael Ramos combines a meticulous work ethic with an energetic social flair, turning bricklaying precision into community leadership while juggling salsa rhythms, soccer goals, and a disciplined
    financial plan, even if occasional over‑commitment and competitive stubbornness sometimes trip them up.
background:
  cultural: Rafael was raised in a bilingual Puerto Rican household in Reading, Pennsylvania. His parents emigrated from Puerto Rico in the early 2000s, bringing with them strong family values, a love for
    Caribbean cuisine, and a vibrant musical tradition. Growing up, he celebrated holidays such as Puerto Rican Day and participated in local bomba and plena gatherings, which reinforced his connection
    to his heritage. He speaks both Spanish and English fluently, and he frequently integrates Puerto Rican holidays, food, and music into his social life. While he identifies as an American, Rafael balances
    the practical, structured mindset of his work life with the warmth and rhythm of Puerto Rican culture, creating a hybrid identity that guides his interactions and ambitions.
attributes:
  skills: '[''Bricklaying'', ''Stone setting'', ''Blueprint reading'', ''Mortar mixing'', ''Material inventory management'', ''Construction safety compliance (OSHA)'', ''Team coordination'', ''Problem solving'',
