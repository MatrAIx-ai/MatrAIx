personas:
  professional: A seasoned landscape architect, Alexandria King translates client visions into sustainable, buildable designs using AutoCAD, Vectorworks, and GIS while leading multidisciplinary teams with
    an assertive yet collaborative style, balancing curiosity for innovative green‑infrastructure with practical, organized project management, and channels their sociable energy into community garden projects
    and historic preservation initiatives.
  sports: An avid hiker and community fitness enthusiast, Alexandria King spends Saturday mornings trekking the Pine Barrens with the Mount Holly Hiking Club, supports the New Jersey Devils and Philadelphia
    Eagles in the winter, and supplements outdoor activity with weekly yoga and Pilates sessions to maintain flexibility and core strength.
  arts: A dedicated visual storyteller, Alexandria King captures the interplay of flora and architecture in her nature photography, drawing inspiration from Ansel Adams and Georgia O’Keeffe, regularly attends
    exhibitions at the Princeton Art Museum, and enjoys live performances by the local folk group The Barnacres at town festivals.
  travel: A thoughtfully adventurous traveler, Alexandria King plans weekend getaways that blend garden tours and historic sites, having visited Kew Gardens in London, the Zen gardens of Kyoto, Asheville’s
    Biltmore Estate, and the Cape Cod cranberry marshes, while hoping to explore the terraced rice paddies of Bali’s Jatiluwih landscape next year.
  culinary: A seasonal chef in the making, Alexandria King masters dishes such as rosemary‑infused grilled salmon with beetroot purée, heirloom tomato salad with basil vinaigrette, and wild mushroom risotto,
    sourcing ingredients from local farms, preserving excess produce through pickling, and occasionally over‑spices her sauces when experimenting with new herb blends.
  core: Alexandria King blends sociable energy, green‑focused design expertise, and a habit of impulsively acquiring new plant varieties into a life that constantly cultivates community, creativity, and
    a garden that never quite stays put.
background:
  cultural: Alexandria grew up in a middle‑class, white suburban family in the Mid‑Atlantic region, with deep roots in New Jersey and ancestral ties to German and Irish immigrants. Her upbringing emphasized
    community involvement, self‑reliance, and an appreciation for the outdoors, shaped by the region’s blend of rural landscapes and proximity to major cultural hubs like Philadelphia and New York City.
    She maintains traditions of seasonal gardening passed down through generations, participates in local civic events, and values the pragmatic, collaborative ethos typical of her community. Her cultural
    perspective combines a respect for historical continuity with an openness to innovative, environmentally conscious practices.
attributes:
  skills: '[''Landscape Design'', ''Site Analysis'', ''Plant Selection'', ''AutoCAD'', ''Vectorworks'', ''GIS Mapping'', ''Sustainable Design'', ''Project Management'', ''Client Relations'', ''Construction
