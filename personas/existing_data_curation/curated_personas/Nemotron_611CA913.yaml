  hobbies: '[''Community Gardening'', ''Hiking'', ''Nature Photography'', ''Volunteer Historic Preservation'', ''Yoga'', ''Pilates'', ''Farm‑to‑Table Cooking'', ''Local Festival Participation'', ''Senior‑Center
    Horticulture Programs'']'
  career_goals: At this stage, Alexandria aims to deepen her influence on regional sustainable design by attaining LEED Accredited Professional status and mentoring emerging designers within her firm. She
    plans to expand her consultancy to include public‑realm projects, such as revitalizing historic parks and creating resilient streetscapes in Burlington County. Over the next five years, she envisions
    launching a small boutique studio focused on climate‑adaptive landscapes, publishing a guidebook on Mid‑Atlantic planting strategies, and serving on the local planning board to advocate for greener
    zoning policies.
