  career_goals: Christopher aims to become a professional soccer player, hoping to join a youth academy and eventually compete in the MLS. He dreams of one day captaining a team, where he can combine his
    competitive drive with his knack for organization and responsibility. He also enjoys figuring out how things work, so he aspires to be a mechanical engineer or a hands‑on mechanic, building and fixing
    machines. In the longer term, he imagines a role that lets him help his community, such as a firefighter, where structured training and teamwork are essential.
