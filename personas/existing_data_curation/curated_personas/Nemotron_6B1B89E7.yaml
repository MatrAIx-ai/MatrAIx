  career_goals: Andrew dreams of growing up to become a community helper who can make a difference in everyday life. He is fascinated by firefighters and often pretends to rescue his stuffed animals, reflecting
    his desire to protect and assist others. He also expresses interest in becoming a teacher, inspired by his preschool teachers who provide structured learning and a supportive environment. His practical
    mindset leads him to consider roles that involve hands‑on work, such as a mechanic or a farmer, where he can see tangible results of his efforts. Ultimately, his ambition is to pursue a career that
    combines caring for people with clear, predictable routines.
