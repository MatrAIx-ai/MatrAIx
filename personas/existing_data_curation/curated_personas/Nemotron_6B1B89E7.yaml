personas:
  professional: Andrew Bryant, a four‑year‑old ‘mini‑architect’ at his neighborhood preschool, meticulously arranges Lego bricks, thriving on the predictable click‑clack pattern while occasionally indulging
    in spontaneous, chaotic builds that reveal a playful side. They proudly display the tower to classmates, balancing structure with flexibility.
  sports: Andrew Bryant loves joining the ‘Little Tigers’ soccer club on Saturday mornings, diligently following the coach’s drills while cheering for the local baseball team, the City Raptors, and they
    also enjoy unstructured tag games at the park, where their cooperative nature shines.
  arts: Andrew Bryant delights in drawing cartoon heroes from ‘Paw Patrol’ and watching ‘Bluey’ for both laughs and life lessons, often humming simple tunes on a toy xylophone; they eagerly share crafts
    with friends, reflecting a kind, harmonious spirit.
  travel: Andrew Bryant enjoys family road trips to the nearby Adventureland theme park, clutching a favorite stuffed giraffe during the ride, and they eagerly point out the desert dunes of Arizona from
    a picture book, dreaming of a future visit while preferring well‑planned, short excursions over long, unpredictable journeys.
  culinary: Andrew Bryant adores buttery macaroni‑and‑cheese, crunchy carrot sticks dipped in hummus, and has a quirky habit of licking the spoon after stirring pancake batter; they are a picky eater at
    times but surprise parents by munching on mango slices when they’re served.
  core: Andrew Bryant is a four‑year‑old who thrives on the predictable rhythm of building blocks and piggy‑bank savings, yet occasionally surrenders to spontaneous ice‑cream detours and a stubborn spoon‑licking
    habit, all while maintaining a calm, cooperative demeanor.
background:
  cultural: Andrew lives in Hinckley, a small rural community in DeKalb County, Illinois. His family reflects typical Midwestern values of friendliness, modesty, and a strong sense of community. He often
    participates in local events such as farm fairs, community picnics, and holiday celebrations that emphasize togetherness and cooperation. The cultural environment emphasizes practicality, self‑reliance,
    and a respect for routines, which aligns with Andrew's preference for structure. At home, he is exposed to simple, wholesome meals and traditions that celebrate the changing seasons, and his early experiences
    are shaped by the warm, supportive atmosphere of his town and family.
