  hobbies: '[''fishing'', ''hunting'', ''hiking'', ''DIY home improvement projects'', ''restoring motorcycles'', ''reading about warehouse technology'', ''strategy video gaming'', ''listening to classic
    rock'', ''cooking/barbecuing'', ''small community potlucks'']'
  career_goals: Jesse aims to move into a supervisory or specialist role within the logistics field over the next few years. He plans to earn a Certified Logistics Associate credential and pursue a part‑time
    certification in supply‑chain management at a local community college. His goal is to become a shift lead who can mentor newer workers, improve safety and efficiency, and introduce modest technology
    upgrades such as handheld scanning devices or small‑scale automation tools. While he values the stability of a steady paycheck, he also entertains the idea of eventually starting his own small moving
    or freight service, where he could combine his practical knowledge with the flexibility to set his own schedule. He prefers advancing in a way that keeps him hands‑on the floor rather than moving into
    a purely office‑based role.
