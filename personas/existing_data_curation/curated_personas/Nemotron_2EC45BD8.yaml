personas:
  professional: Johnathan Azan is a budding robotics hobbyist who channels their love for LEGO engineering and astronomy into leading his middle‑school STEM club, where they balance meticulous planning
    with flexible creativity while embodying the community‑first spirit of Topeka’s youth groups.
  sports: Johnathan Azan is a dedicated middle‑school basketball player for the Topeka Tritons, an avid cyclist with the Topeka Bike Club, and a weekend angler who follows the Kansas City Chiefs and watches
    the Kansas City Royals during the off‑season, and they relish the camaraderie of team practice while also savoring solitary rides through prairie trails.
  arts: Johnathan Azan is a sci‑fi enthusiast who devours Andy Weir novels, binge‑watches the Star Wars saga, builds LEGO spacecraft while they listen to Hans Zimmer’s scores, and enjoys the high‑energy
    tunes of Blink‑182 during study sessions.
  travel: Johnathan Azan is an adventure‑curious teen who dreams of road‑tripping to Yellowstone National Park and camping under the stars, hopes to visit the U.S. Space & Rocket Center in Alabama, and
    saves allowance for a future family getaway to the Grand Canyon, all while they balance a limited budget with a love for hands‑on exploration.
  culinary: Johnathan Azan is a budding home cook who can whisk together a buttery mac‑and‑cheese with sharp cheddar, loves a well‑grilled Kansas‑style BBQ rib, delights in fresh garden tomatoes and basil
    for homemade pizza, yet they often leave dishes in the sink forgetting to clean up.
  core: Johnathan Azan is a pragmatic dreamer who builds LEGO rockets, saves every spare coin, tackles robotics with methodical curiosity, and they habitually hit the snooze button, arriving late but always
    enthusiastic.
background:
  cultural: 'Johnathan’s cultural background is rooted in the Midwestern values of Kansas. Raised in Topeka’s diverse yet close‑knit community, he grew up with an emphasis on hard work, self‑reliance, and
    community service—traits common among families with German and Irish ancestry in the region. Local traditions such as county fairs, 4‑H programs, and school sports fostered a sense of collective responsibility
    while honoring individual initiative. He participates in a small-town Methodist youth group, where cooperative values are reinforced. This cultural milieu, combined with the practical, no‑frills ethos
    of the plains, shapes his balanced outlook: curiosity is encouraged, but it is always tied to useful, real‑world applications.'
