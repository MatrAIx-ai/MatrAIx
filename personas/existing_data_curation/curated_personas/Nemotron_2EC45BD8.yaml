  career_goals: Johnathan aims to pursue a STEM‑focused career that merges his love of invention with tangible community impact. He envisions studying mechanical or robotics engineering at a university
    such as the University of Kansas, followed by internships with aerospace or renewable‑energy firms. Long‑term, he hopes to design practical technologies—like affordable robotics for agricultural tasks—that
    solve real problems in his home state. He also plans to mentor younger students through school clubs and local Maker workshops, channeling his curiosity into educational outreach while maintaining a
    balanced, pragmatic approach to his professional development.
