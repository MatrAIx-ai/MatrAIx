  hobbies: '[''DIY electronics (Arduino, Raspberry Pi)'', ''Hiking & trail walking'', ''Bike commuting'', ''Reading sci‑fi & popular science'', ''Woodworking'', ''Puzzle solving (logic games, Sudoku)'',
    ''Nature photography'', ''Home coffee brewing'']'
  career_goals: Jay aims to transition into a flexible, project‑based consulting role that leverages his technical expertise while providing a predictable schedule to reduce stress. He is interested in
    developing a small venture focused on sustainable home‑automation solutions, combining his DIY skills with market‑oriented products. Long‑term, he hopes to mentor junior engineers, contribute to community
    maker spaces, and achieve a balanced work‑life rhythm that supports his family and personal well‑being.
