persona_description: A researcher and scholar who studies the effects of dating abuse in the Internet age, particularly in relation to non-physical abuse such as stalking through text messages. She is interested
  in developing programs to prevent dating violence and intervening when it occurs. Her research focuses on the health and behavior of adolescents aged 13-19 who have experienced both physical and non-physical
  dating abuse. She is particularly interested in the effects of non-physical abuse on health and well-being, and the need for targeted programs to prevent and intervene in dating violence.
