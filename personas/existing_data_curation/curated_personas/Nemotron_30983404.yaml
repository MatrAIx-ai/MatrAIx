  career_goals: Brenda dreams of growing up to be a teacher because she loves organized classrooms, routine, and helping friends learn together. She also imagines caring for animals as a veterinarian, reflecting
    her compassionate side. Her broader ambition is to become a community helper—someone who contributes to a safe, supportive environment for children and families in Fayetteville.
