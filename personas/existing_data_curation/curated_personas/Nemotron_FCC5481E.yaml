personas:
  professional: Jorge Peralta is a hands‑on materials engineer who blends rigorous testing, CAD modeling, and lean‑manufacturing principles with an artistic curiosity, designing eco‑friendly composites
    for public installations while navigating a flexible, sometimes disorganized schedule.
  sports: Jorge Peralta fuels their energetic social life by playing pickup basketball at the Brooklyn Bridge Park courts, cheering on the New York Knicks and Brooklyn Nets, participating in New York Road
    Runners community runs, and occasionally shooting hoops for a local YMCA club, all while maintaining a laid‑back approach to formal training.
  arts: Jorge Peralta immerses themselves in Brooklyn’s vibrant art scene, strolling through Bushwick murals by artists like Banksy and Kenny Scharf, sketching ideas for material‑based sculptures, tinkering
    with a desktop 3D printer to create sci‑fi inspired prototypes after reading authors like Neal Stephenson, and dancing salsa nights that fuse rhythm with visual expression.
  travel: Jorge Peralta prefers spontaneous, budget‑friendly travel, taking weekend trips by train to Philadelphia for an art exhibition, day‑hiking the Catskills, and dreaming of a future visit to the
    Venice Biennale, while balancing school fees and a modest savings cushion that shapes their travel decisions.
  culinary: Jorge Peralta loves cooking Dominican comfort dishes such as sancocho and mangú for family gatherings, experimenting with fusion twists like plantain‑infused tacos, and boasts a knack for balancing
    spices, though they sometimes over‑salt meals when deep into late‑night 3D‑printing projects.
  core: Jorge Peralta is a curious, art‑driven materials engineer whose relaxed yet resilient nature fuels a blend of creative prototypes, spontaneous social outings, and a charming habit of juggling projects
    with occasional disorganization.
background:
  cultural: 'Jorge grew up in a close‑knit Dominican household in Brooklyn’s Sunset Park, where Spanish and English flow interchangeably. Family gatherings are marked by lively music, storytelling, and
    shared meals, reinforcing a strong sense of community and hospitality. This bicultural upbringing shapes his collaborative work style: he values collective input, celebrates diverse perspectives, and
    often brings a rhythmic, energetic presence to group projects. Dominican traditions of rhythm and improvisation echo in his appreciation for spontaneous creative problem‑solving, while the community’s
    emphasis on resilience and optimism mirrors his calm, steady demeanor in high‑pressure engineering contexts.'
