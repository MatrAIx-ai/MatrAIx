    science‑fiction novels"]'
  career_goals: Jorge aims to formalize his engineering knowledge with a bachelor's degree in Materials Science within the next two years, followed by professional certification (e.g., ASME‐certified Materials
    Engineer). His long‑term ambition is to become a senior engineer leading R&D projects that develop eco‑friendly composites for use in art installations and green building interiors. He hopes to bridge
    his artistic interests and technical expertise by partnering with designers and local artists, eventually founding a boutique consultancy that offers material innovation services to cultural institutions
    and start‑ups focused on sustainable design.
