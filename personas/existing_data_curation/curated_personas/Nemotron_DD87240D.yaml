personas:
  professional: Julie Westley, a budding young engineer, designs functional LEGO catapults and simple machines, and they apply their curious yet practical mindset, organized planning, and competitive drive
    to turn imaginative ideas into reliable, hands‑on creations.
  sports: Julie Westley plays forward on her school’s U‑8 soccer team and avidly follows the New England Revolution, and they train with a fierce competitive edge during the season while also joining the
    Gales Ferry Explorers Hiking Club for weekend trail runs, blending team drills with solo nature cardio.
  arts: Julie Westley attends a weekly art class where she sketches forest scenes inspired by Eric Carle’s vivid illustrations and experiments with charcoal after watching videos of Yayoi Kusama’s polka‑dot
    installations, and they blend curiosity and practicality by planning their artwork before diving into spontaneous color experiments.
  travel: Julie Westley loves weekend excursions to the nearby Mystic River and a family road‑trip to Acadia National Park, and they dream of exploring Costa Rica’s rainforests and Iceland’s geysers, favouring
    itineraries that mix guided nature tours with ample free time for independent rock‑collecting adventures.
  culinary: Julie Westley enjoys assembling peanut‑butter‑banana sandwiches drizzled with honey and building snack towers of cheese cubes and grape halves, and they help their mom stir macaroni and cheese
    with shredded cheddar while occasionally experimenting with quinoa salads featuring mango and cucumber, showcasing a playful yet practical palate.
  core: Julie Westley is a curious, competitively spirited seven‑year‑old who balances her love of nature, LEGO engineering, and soccer with a practical streak that keeps her organized, though she sometimes
    hoards rocks and forgets to clean her glasses.
background:
  cultural: 'Julie is raised in a white, middle‑class family in Gales Ferry, a small village in New London County, Connecticut. Her upbringing reflects the typical New England sub‑urban environment: close
    ties to the local public school, participation in community events like the annual town fair and seasonal harvest festivals, and regular visits to nearby coastal areas where the family enjoys beach
    outings and learning about the region’s maritime history. Family traditions include Sunday dinner gatherings featuring classic American dishes, and occasional church services that emphasize community
    service. The region’s emphasis on education and nature appreciation has nurtured Julie’s curiosity and practical approach to learning.'
