  career_goals: Julie dreams of becoming a veterinarian because she loves caring for animals and enjoys learning about their biology. She is also fascinated by engineering and imagines designing bridges
    or space rockets, reflecting her blend of curiosity and practicality. Occasionally, she imagines being a detective, using her keen observation skills to solve mysteries in her favorite storybooks. While
    she understands these are big goals, she approaches them with a competitive spirit, wanting to excel and be recognized for her achievements.
