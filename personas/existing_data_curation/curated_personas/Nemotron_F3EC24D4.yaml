personas:
  professional: A budding digital illustrator and junior game developer, Nyla Moore channels their curiosity and love of storytelling into sketching vibrant characters, crafting comic strips for friends,
    and coding simple Scratch games, all while balancing school assignments with a disciplined schedule that leaves room for spontaneous bursts of unconventional design ideas.
  sports: An energetic beach‑side swimmer and forward for the Seabreeze Soccer Club’s U‑11 team, Nyla Moore devotes Saturday mornings to collecting shells after sunrise surf sessions, trains with teammates
    twice a week, and avidly follows the professional soccer club LA Galaxy, often mimicking their favorite players’ moves during backyard drills.
  arts: A versatile creative, Nyla Moore draws inspiration from graphic novelist Raina Telgemeier, digital art influencer Loish, and the animated storytelling of Studio Ghibli, while dancing to Ariana Grande
    and BTS tracks, spending afternoons perfecting watercolor landscapes, sketching comic heroes, and swapping tips in an online art community for kids.
  travel: An intrepid explorer, Nyla Moore has built sandcastles on the Gulf Coast, toured the interactive exhibits at the City Science Museum, and now dreams of snorkeling on the Great Barrier Reef and
    visiting the whimsical streets of Barcelona’s Park Güell to gather fresh scenery for future comic adventures.
  culinary: A budding food enthusiast, Nyla Moore loves blending mango, strawberry, and kiwi into rainbow smoothies, relishes cheesy macaroni bites after soccer practice, enjoys occasional sushi rolls with
    avocado and cucumber, yet sometimes skips vegetables in favor of candy‑filled cereal during late‑night gaming sessions.
  core: Nyla Moore is a bright, art‑obsessed 10‑year‑old whose boundless curiosity fuels creative projects while their high‑energy temperament and occasional anxiety spark a mix of meticulous planning and
    spontaneous bursts of expressive play.
background:
  cultural: Nyla’s cultural background is rooted in the African‑American community of Fort Lauderdale, a city known for its diverse Black heritage and vibrant arts scene. Her family celebrates traditions
    such as Juneteenth, Black History Month, and church gatherings where gospel and soul music are central. She participates in local youth programs like the Boys & Girls Club and attends community art
    workshops that highlight Black artists and muralists who color the city’s streets. The coastal setting and the influence of Caribbean rhythms in Broward County also shape her appreciation for beach
    activities, dance, and rhythmic music. These cultural experiences nurture her pride, creativity, and sense of belonging.
