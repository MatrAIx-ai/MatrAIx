  career_goals: Guided by her love of art and desire to help others, Nyla dreams of becoming an illustrator who creates bright, uplifting murals and picture books that inspire children to express their
    emotions. She also envisions herself studying marine biology, merging her fascination with the ocean and her artistic talent to illustrate sea life and raise awareness of coastal conservation. Ultimately,
    she hopes a future career will allow her to blend creativity, community engagement, and a compassionate voice.
