persona_description: A woman who advocates for gender equality and is a member of a women's rights organization in Africa. She has been working to change discriminatory laws that restrict women's rights
  and has been a vocal supporter of the Malawian constitution's provisions on full and equal protection by the law. She is aware of the challenges faced by women in Southern Africa, including the slow pace
  of constitutional litigation and the resistance from men and women alike to changes to traditional customs. She is committed to the idea that customary laws regulating women's inheritance rights should
  be adapted to reflect the changing circumstances of African societies and is actively involved in discussions about how to achieve this.
