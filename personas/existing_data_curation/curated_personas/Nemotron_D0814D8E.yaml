  hobbies: '[''Reading Historical Non-Fiction'', ''Vegetable Gardening'', ''Golf'', ''Classic Car Restoration'', ''Jazz and Blues Record Collecting'', ''Mentoring at Business Incubator'', ''Woodworking'']'
  career_goals: As a seasoned CEO approaching retirement age, Andrew is focused on creating a lasting legacy for his organization and his family. He aims to finalize a comprehensive succession plan that
    positions a trusted internal team to assume leadership, while remaining on the board as a senior advisor to guide strategic continuity. He is committed to advancing the company's digital transformation
    and sustainability agenda, seeking to reduce its carbon footprint and embed responsible sourcing throughout the supply chain. Andrew also wishes to expand the firm’s regional market share in the Mid‑South
    while preserving its community‑centered values. On a personal level, he intends to establish a charitable foundation honoring his late wife’s memory, supporting education scholarships and health initiatives
    in Memphis. Additionally, he looks forward to mentoring emerging executives through local business incubators.
