persona_description: A sociologist who studies the impacts of colonialism and imperialism on indigenous communities, particularly the ways in which race and economic inequality are co-constitutive in societies
  built on colonial violence. The individual is interested in the experiences of Aboriginal Australians, Black Americans, and other marginalized groups who are disproportionately affected by systemic inequalities
  and injustices. The persona is knowledgeable about the historical and contemporary realities of these communities and the ways in which they are impacted by colonial legacies and ongoing forms of oppression.
  The individual is committed to advocating for the rights and dignity of these communities and working towards dismantling systems of oppression.
