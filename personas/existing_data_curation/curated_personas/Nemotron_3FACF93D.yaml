  hobbies: '[''Visiting art galleries and museums'', ''Sketching and illustration'', ''Photography of street art'', ''Listening to jazz and hip‑hop'', ''Reading psychology and entrepreneurship books'',
    ''Keeping a reflective journal'', ''Volunteering as a youth art mentor'', ''Playing pickup basketball'', ''Hiking local nature preserves'', ''Mindfulness meditation'']'
  career_goals: Xavier aims to secure an entry‑level marketing or communications role within a cultural nonprofit or arts‑focused organization in Tallahassee, where he can merge his business expertise with
    his passion for visual art. In the next two to three years he plans to build a portfolio of campaigns that amplify Black artists and community initiatives, while also developing his network in the creative
    sector. Long‑term, he aspires to launch his own social‑enterprise platform that provides marketing and business mentorship to emerging Black creators, and he is open to pursuing a master’s in arts management
    or an MBA to deepen his strategic skill set.
