personas:
  professional: James Burrus, a 20‑year‑old front‑line wholesale sales associate in Fort Worth, blends their calm, resilient demeanor with a practical curiosity for industrial automation, turning client
    conversations into clear value propositions while juggling a flexible, low‑structure work style that still consistently meets sales targets.
  sports: James Burrus follows the Dallas Cowboys and the Texas Rangers with steadfast loyalty, spends early Saturday mornings fishing at Lake Worth as a personal sport, participates in the Fort Worth Anglers
    Association’s weekly meet‑ups, and occasionally hits the gym for a quick weight‑lifting session, and they enjoy the camaraderie of a local 5‑a‑side soccer league.
  arts: James Burrus tunes into classic rock legends like Lynyrd Skynyrd and country staples such as George Strait, collects vinyl records, enjoys live performances at the Fort Worth Community Arts Center,
    and they transform their woodworking projects into functional art pieces inspired by the rustic aesthetic of Texas ranches.
  travel: James Burrus prefers low‑key road trips that balance budget and adventure, having already driven to Austin for its live‑music scene, explored Hill Country wineries, camped near the Guadalupe River,
    and they dream of a solo trek through the Great Smoky Mountains and a cross‑country drive to the Pacific Northwest.
  culinary: James Burrus enjoys smoking brisket with a dry rub of brown sugar, paprika, and cumin, grilling lake‑caught catfish seasoned with lemon and cayenne, and whipping up a hearty chili con carne
    loaded with beans and chilies, and they showcase a moderate cooking skill that blends their love for BBQ traditions and fresh‑catch flavors.
  core: James Burrus is a calm, curiosity‑driven sales rookie who balances spontaneous spending with diligent saving, enjoys solitary fishing and hands‑on tinkering, and they live by a quiet, resilient,
    low‑drama philosophy.
background:
  cultural: James grew up in Fort Worth, Texas, within a working‑class white family that values independence, self‑reliance, and hospitality. The city’s blend of traditional cattle‑ranch heritage and modern
    manufacturing has influenced his practical outlook and appreciation for both established methods and new ideas. He was raised with Southern‑influenced customs—such as weekend barbecues, a love of country
    music, and a strong sense of community—but also absorbs the broader Anglo‑American work ethic that prizes steady employment and personal responsibility. Though not strongly religious, he occasionally
    participates in community church events and respects the regional emphasis on modesty and calm composure. This cultural mix shapes his reserved demeanor, his preference for small‑group interactions,
    and his resilient, low‑drama attitude toward life.
attributes:
  skills: '["Sales negotiation", "Customer relationship management", "Product knowledge (industrial goods)", "CRM software (e.g., Salesforce)", "Basic inventory management", "Adaptability", "Problem solving",
