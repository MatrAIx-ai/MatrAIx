  hobbies: '["Fishing", "Woodworking", "Electronics tinkering (Arduino/Raspberry Pi)", "Reading non-fiction (technology, business, history)", "Playing strategy video games", "Listening to classic rock and
    country music", "Attending small community gatherings (local BBQs, Fort Worth Stock Show)", "Casual basketball with friends", "Volunteering at local food bank"]'
  career_goals: James aims to become a senior sales manager within the next five years, specializing in a high‑margin product segment such as industrial automation components. He plans to deepen his technical
    expertise through industry certifications and on‑the‑job training, while also pursuing a GED and a certificate in business administration to broaden his strategic skill set. Long‑term, he envisions
    launching his own small distribution company that leverages his network of regional manufacturers and his reputation for reliability and calm under pressure. He also seeks to develop stronger organizational
    habits to increase his efficiency and leadership credibility.
