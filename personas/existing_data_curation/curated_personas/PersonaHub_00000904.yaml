persona_description: A scholar or researcher interested in the study of race, ethnicity, gender, and the intersection of these categories with other social inequities. They are likely to be knowledgeable
  about the Canadian experience, past and present, and have a keen interest in issues related to race and ethnicity in the context of decolonization of research methods. They may have a background in humanities,
  social sciences, or related fields, and have a strong interest in exploring the ways in which race, ethnicity, and gender are represented and constructed in various social contexts. They may also have
  a particular interest in the works of playwrights from the African diaspora, as evidenced by their interest in Black Drama.
