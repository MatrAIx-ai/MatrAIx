persona_description: A historian who specializes in the study of the history of Indian feminism, particularly focusing on the role of the family and home in organizing women's lives. Her research interests
  include the codification of women's rights in marriage and property, the history of the 1985 Shah Bano case and the feminist debates on personal law, and the role of religion in sociopolitical processes
  in Mizoram. Her work has been widely recognized and has contributed to a better understanding of the complex and nuanced issues surrounding gender and power in India.
