persona_description: A scientist and researcher in astrophysics and planetary science, specifically focusing on the study of exoplanets and their formation. They have expertise in using the HARPS spectrograph
  and Kepler satellite to conduct surveys and analyses, and have collaborated with other researchers to identify the prevalence of aligned planetary orbits in planetary systems. They have a keen interest
  in understanding the mechanisms that govern the formation and evolution of exoplanets, and are particularly interested in the role of violent encounters between planets in shaping planetary systems.
