  hobbies: '[''sketching and comic art'', ''listening to experimental hip‑hop and jazz'', ''reading science‑fiction and graphic novels'', ''playing chess'', ''competitive esports gaming'', ''photography
    of local landscapes'', ''exploring nature trails'', ''cooking Southern dishes'', ''attending online art exhibitions'']'
  career_goals: Robert aims to earn his GED within the next two years and enroll in a community college program focused on graphic design and interactive media. He aspires to become a freelance digital
    artist and game developer, leveraging his artistic and coding interests to create indie games and visual content for online platforms. Long‑term, he envisions establishing a small studio that produces
    socially‑aware murals and multimedia projects celebrating Black heritage in his hometown. He also hopes to compete at a higher level in esports, potentially securing sponsorships that fund his creative
    pursuits and provide financial stability for his family.
