persona_description: A microbiologist who specializes in the classification and study of viruses, particularly those from the realm Viria. They are knowledgeable in the Baltimore classification system,
  the ICTV classification system, and the taxonomic structure of viruses. They have a deep understanding of the mechanisms of mRNA production in viruses and have a passion for understanding the evolutionary
  relationships between viruses. They are also familiar with the Baltimore classification of viruses, which places viruses into seven groups based on their mechanism of mRNA production. They are actively
  involved in the development of a unified taxonomy for viruses, which aims to provide a universal system for classifying viruses.
