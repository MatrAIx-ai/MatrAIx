personas:
  professional: Violet Mejia, a 54‑year‑old executive with over three decades of strategic leadership, marries data‑driven practicality with a curiosity for new ESG frameworks, steering the company toward
    responsible growth while building a mentorship pipeline for emerging women leaders and Latinx talent; they approach every board meeting as an opportunity to embed ethical practices into the core of
    the business.
  sports: Violet Mejia participates in weekly yoga classes at the Riverfront Community Center, supports the Portland Timbers and the Portland Trail Blazers, and runs with the Portland Running Club during
    spring marathons, balancing low‑impact fitness with community camaraderie; they appreciate the quiet focus of solo runs as much as the collective spirit of cheering for a hometown team.
  arts: Violet Mejia immerses themselves in the literary world through a small‑group book club that dissects works by Isabel Allende and Gabriel García Márquez, attends Portland Center Stage productions
    starring local talent, and curates playlists featuring Mercedes Sosa and Yo‑Yo Ma during dinner gatherings; they find that stories and music deepen the empathy that fuels their leadership style.
  travel: Violet Mejia prefers thoughtfully curated trips, having explored Antigua, Guatemala for its market spices, trekked the coffee farms of Oaxaca, Mexico, and planning a future pilgrimage to Cusco,
    Peru to study quinoa cultivation, all while budgeting with a travel fund that balances family obligations; they often travel with a close circle of friends to keep the experience intimate and manageable.
  culinary: Violet Mejia cultivates cilantro, oregano, and fiery chilies in their urban garden to perfect traditional dishes like pepian and kak'ik, often mixing root vegetables with epazote and a hint
    of roasted cacao, and delights in hosting intimate dinner parties where they over‑season to ensure bold flavors; they consider the kitchen a laboratory where curiosity meets comfort.
  core: Violet Mejia blends executive poise with garden‑grown spices, quietly championing sustainable leadership while nurturing a compassionate, curiosity‑driven approach to life; they often surprise colleagues
    with unexpected, well‑timed insights.
background:
  cultural: Violet’s Guatemalan heritage infuses her worldview with a deep respect for family, community, and cultural tradition. Raised in a bilingual household, she is fluent in Spanish and conversant
    in several Mayan phrases, which enriches her cross‑cultural communication skills. The vibrant music of marimba, the storytelling traditions of her ancestors, and the communal celebrations of festivals
    like La Feria de la Cosecha have shaped her compassionate and cooperative nature. These cultural roots drive her dedication to fostering inclusive workplaces and supporting the Latinx diaspora in Atlanta,
    while the pragmatic values of her upbringing guide her balanced approach to innovation and tradition.
attributes:
