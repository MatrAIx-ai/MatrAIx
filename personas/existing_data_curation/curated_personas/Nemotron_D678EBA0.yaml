  hobbies: '[''Gardening'', ''Cooking Guatemalan Cuisine'', ''Reading Historical Fiction'', ''Pottery'', ''Volunteering at Community Food Banks'', ''Yoga'', ''Small-group Book Club'']'
  career_goals: Violet aims to scale her company’s impact by integrating sustainability and ESG standards into every business unit, positioning the firm as a leader in responsible growth. She plans to establish
    a formal mentorship program that supports emerging women leaders and Latinx talent within the organization. Over the next five years, she envisions transitioning to a board advisory role while championing
    industry‑wide diversity initiatives. Additionally, she aspires to author a leadership memoir that highlights the balance between curiosity, compassion, and practical execution, and to expand the company's
    community outreach through strategic partnerships with local non‑profits.
