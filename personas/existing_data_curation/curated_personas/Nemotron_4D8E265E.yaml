    "Journaling", "Community art workshops"]'
  career_goals: Brian hopes to turn his love of art and storytelling into a future career as an illustrator or concept artist, eventually working on graphic novels or video game design. He also dreams of
    contributing to community art projects and possibly becoming a museum curator who creates interactive exhibits that help visitors explore emotions and creativity. In the short term, he aims to improve
    his drawing techniques, learn more advanced programming (Python), develop a personal portfolio that showcases his artistic and technical work, and build confidence in managing stress through organized
    planning and supportive collaborations.
