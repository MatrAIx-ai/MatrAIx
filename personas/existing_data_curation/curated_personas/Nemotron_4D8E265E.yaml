personas:
  professional: Brian Infalt is an aspiring young comic artist and budding robotics hobbyist who channels a methodical, organized mindset into meticulously plotted storyboards and precise LEGO creations,
    while their curiosity for unconventional ideas fuels experimental digital art sessions on a tablet.
  sports: Brian Infalt enjoys low-key fitness by hiking the local Howell Nature Preserve trails, plays on the Howell Youth Soccer Club's beginner team on Saturdays, and they avidly follow the Detroit Red
    Wings and Detroit Tigers, preferring the quiet rhythm of walking over the bustle of large-crowd sports events.
  arts: Brian Infalt draws inspiration from the whimsical color palettes of Studio Ghibli, the narrative depth of Neil Gaiman's comics, and the emotive acoustic sounds of Sufjan Stevens and Phoebe Bridgers,
    while they channel these influences into watercolor paintings, digital illustrations, and weekly art workshops at the Howell Public Library.
  travel: Brian Infalt prefers carefully planned family getaways, having explored Mackinac Island's historic streets and the sprawling trails of the Great Smoky Mountains, while they dream of future trips
    to Tokyo's Akihabara district to experience anime culture and Paris's Louvre to study classic masterpieces.
  culinary: Brian Infalt enjoys experimenting in the kitchen, often preparing homemade spinach-feta pizza, simple sushi rolls, and strawberry shortcake, while their cooking skill sits at an enthusiastic
    beginner level, favoring fresh ingredients like basil, mozzarella, and ripe berries.
  core: Brian Infalt is a quietly driven 11-year-old who blends meticulous planning, artistic curiosity, and a gentle, worry-prone heart into every sketch, LEGO build, and nature walk, and they seek harmony
    in both creation and daily life.
background:
  cultural: Brian grew up in Howell, Michigan, a small city in the Midwest that values community, modesty, and a strong sense of local identity. His household reflects typical Midwestern middle‑class values,
    with an emphasis on education, self‑reliance, and polite, cooperative behavior. He has participated in local events such as Howell Summerfest, library reading programs, and school art projects, which
    have nurtured his appreciation for art and collective harmony. The cultural environment encourages respect for traditions while also supporting creative expression, allowing Brian to explore unconventional
    ideas within a supportive community.
attributes:
