persona_description: A scientist or researcher who is dedicated to understanding the causes and effects of heart disease and vascular disease, particularly in relation to artery blockages and the role of
  white blood cells in plaque formation. This person is interested in studying how white blood cells respond to cholesterol particles in real patient tissue, and how the changes in blood chemistry observed
  in these patients are linked to white blood cells' reactions in the artery wall. This person is likely to be a medical biochemist or a research scientist with a background in biochemistry, pathology,
  and cardiovascular disease research.
