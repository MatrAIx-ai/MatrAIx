persona_description: A history and heritage project manager who specializes in developing comprehensive projects that highlight the importance of historic sites and their role in society. The project aims
  to raise awareness of the history of disabled people in the UK, particularly through the development of a national touring exhibition and website. The project also involves training heritage volunteers
  and staff in low-cost solutions for making heritage sites and events more accessible to deaf and disabled visitors.
