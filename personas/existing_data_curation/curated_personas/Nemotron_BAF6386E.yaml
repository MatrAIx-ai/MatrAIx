  career_goals: Although currently not in the workforce, Selden aims to leverage his practical expertise by offering part‑time consulting for local hobbyists and small businesses in need of mechanical or
    woodworking advice. He is also interested in mentoring younger community members through a local makerspace, sharing his knowledge while learning new digital fabrication techniques. Long‑term, he hopes
    to develop a modest home‑based workshop that could generate supplemental income and serve as a hub for skill‑sharing events.
