  career_goals: Although retired from formal employment, Brendon aims to stay actively engaged in his community. His primary ambition is to volunteer as a STEM mentor for local high‑school and middle‑school
    robotics clubs, sharing his technical know‑how while satisfying his curiosity for new ideas. He also hopes to co‑lead a neighborhood garden project that blends his practical skills with his love of
    group activities. On a personal level, he seeks to improve his emotional wellbeing by participating in mindfulness workshops and by authoring a short memoir that chronicles his lifelong learning journey,
    hoping it will inspire peers to pursue curiosity despite age-related anxieties.
