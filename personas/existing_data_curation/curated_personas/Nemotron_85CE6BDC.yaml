  career_goals: Although he has retired from formal employment, Frank aims to channel his disciplined mindset and creative curiosity into legacy‑building projects. He plans to establish a community arts
    workshop that pairs seniors with local youth to explore watercolor painting, storytelling, and cultural heritage. He hopes to compile and publish a memoir of his life experiences, interwoven with a
    collection of poems reflecting his emotional journey. Frank also aspires to become a senior ambassador for Jefferson Parish, coordinating health and wellness walking groups, and advocating for mental‑health
    resources for older adults. He continues to pursue lifelong learning, enrolling in online courses on art history and African‑American studies.
