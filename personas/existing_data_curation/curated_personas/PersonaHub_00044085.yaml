persona_description: A highly trained and skilled radiation oncologist who specializes in the treatment of cancer. They receive extensive training and are well-paid, with an average salary of $477,807 per
  year as reported by the Medical Group Management Association. They are also part of the highly paid group of hematologist-oncologists, with an average salary of $367,978 per year as reported by Jackson
  & Coker. They are interested in the study and treatment of cancers and are well-versed in the use of radiation sources to kill cancer cells and provide relief from physical symptoms caused by tumors.
  They are also aware of the importance of radiation oncology in the medical profession and are optimistic about the job growth of 24 percent for physicians and surgeons between 2010 and 2020.
