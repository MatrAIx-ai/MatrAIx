personas:
  professional: Selina Henderson, a seasoned police investigator with a STEM degree, channels their analytical rigor, competitive drive, and fascination with contemporary art into pioneering data‑driven
    art‑theft investigations and mentoring junior detectives, while they keep a healthy skepticism of suspect narratives, ensuring evidence drives the case, and they aspire to a future leadership role in
    the county’s cyber‑crime unit.
  sports: Selina Henderson enjoys weekend hikes in the Blue Ridge footholds with the Charlotte Hiking Club, follows the Charlotte Hornets basketball season with a competitive eye for statistics, attends
    Carolina Panthers football games in the winter, and they fit in early‑morning cardio sessions at the local gym, while they remain skeptical of overly hyped sports trends and choose to measure progress
    via personal data, reflecting a flexible yet somewhat unstructured fitness routine.
  arts: Selina Henderson captures the bold colors of Charlotte’s street murals—often featuring works by Banksy and local artist Kati Craig—while frequenting contemporary galleries showcasing Kehinde Wiley,
    savoring late‑night jazz sessions with pianist Wynton Marsalis at The Barwick, maintaining a skeptical stance toward overly commercialized art spaces, and they immerse themselves in the narratives of
    James Baldwin and Toni Morrison, allowing the art’s nuance to sharpen their investigative eye.
  travel: Selina Henderson favors spontaneous, low‑key getaways over rigid itineraries, remaining skeptical of packaged tours, and they often jet from Charlotte to the historic streets of Kyoto for silent
    meditation retreats, bike through Barcelona’s modernist neighborhoods for architectural inspiration, and embark on weekend drives to Asheville’s Blue Ridge vistas to photograph graffiti festivals, all
    while balancing travel with modest family budgets.
  culinary: Selina Henderson, an amateur home‑cook with a modest vegetable garden, whips up seasonal dishes such as roasted heirloom tomatoes with fresh basil, grilled sweet‑potato wedges tossed in smoked
    paprika, and occasionally attempts sushi rolls using garden‑grown cucumber and avocado, while they remain skeptical of trendy diet fads, focusing on whole, garden‑grown produce, and they savor a nightly
    cup of pour‑over coffee made with Ethiopian Yirgacheffe beans.
  core: Selina Henderson, a detective who solves crimes with a lens on street art and a habit of leaving coffee mugs in the car, blends a fiercely competitive mind with a laissez‑faire approach to daily
    chores, while they keep a healthy skepticism toward conventional directives, and they let curiosity guide both investigations and weekend drone builds.
background:
  cultural: Selina is an African‑American woman born and raised in Charlotte, the daughter of parents who migrated from the rural South during the civil‑rights era. Her upbringing was steeped in the traditions
    of the Black community—church music, storytelling, a strong emphasis on education, and a commitment to civic responsibility. The legacy of the civil‑rights movement and the ongoing pursuit of social
    justice shape her dedication to fair policing and community engagement. Selina’s cultural identity is expressed through her love of jazz, blues, African‑American literature, and participation in local
    heritage events such as Charlotte’s Black History Month celebrations.
attributes:
  skills: '["Data-driven crime analysis", "Forensic evidence collection", "Digital forensics", "Cyber‑crime detection", "Statistical crime pattern modeling", "Tactical firearms proficiency", "Art‑theft
    and cultural‑heritage investigations", "Critical‑thinking mentorship", "Crisis negotiation", "Community policing"]'
  hobbies: '["Visiting contemporary art galleries", "Street photography", "Reading detective novels and tech nonfiction", "African‑American literature", "Puzzle solving and chess", "DIY electronics and
    drone building", "Hiking", "Gardening", "Attending intimate jazz sessions", "Book club on Black authors", "Volunteering at youth art workshops"]'
  career_goals: Selina aspires to become a senior detective and eventually lead a specialized unit such as the Cyber‑Crime or Art‑Theft Division within the Mecklenburg County Police Department. She aims
    to develop a county‑wide predictive‑analytics platform to guide resource allocation and to launch community‑oriented art programs that engage at‑risk youth. Over the next five years, she plans to earn
    a master’s degree in criminal justice, obtain advanced certifications in forensic science, and position herself for a precinct commander role where she can influence policy toward equity, innovation,
    and data‑driven policing.
