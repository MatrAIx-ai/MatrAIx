    nature'']'
  career_goals: John aims to advance into a senior regional management position within the next three to five years, overseeing a team of agents across Riverside County and driving performance through strategic
    use of digital tools. He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen his technical expertise. Long‑term, he envisions launching his own boutique insurance
    agency focused on serving underserved communities and retirees, offering personalized wealth‑preservation solutions. Throughout his career progression, John is committed to mentoring emerging agents
    and contributing to insurance education programs at local community colleges.
