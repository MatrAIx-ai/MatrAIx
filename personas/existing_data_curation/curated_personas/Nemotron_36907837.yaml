  hobbies: '[''Gardening (tomatoes, chilies)'',''Fishing on the Rio Grande'',''Woodworking'',''Listening to norteño and banda music'',''Cooking Tex‑Mex meals'',''Attending church services'',''Reading historical
    biographies'',''Solving crossword puzzles'',''Volunteering at the food bank'']'
  career_goals: As he approaches retirement, Gilberto aims to solidify his role as a senior inspector, earning an ASQ Certified Quality Inspector credential and a Six Sigma Yellow Belt to formalize his
    expertise. He wishes to mentor younger team members, lead a small safety‑committee within the plant, and introduce modest process improvements that enhance efficiency without disrupting routine. Beyond
    the plant, he envisions a part‑time advisory role for local manufacturers, allowing him to share his practical knowledge while spending more time with his family and community.
