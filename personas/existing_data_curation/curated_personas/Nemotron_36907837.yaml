personas:
  professional: Gilberto Casanova, a senior quality inspector at a regional food processing facility, blends precise calibration of digital balances and bilingual communication skills with a preference
    for steady, predictable workflows, while their relaxed view of obligations steers them toward modest, low‑key process improvements and mentorship of younger staff.
  sports: Gilberto Casanova follows the Dallas Cowboys and the Texas Rangers with devoted weekday rituals, fishes the Rio Grande on weekends, and participates in a local senior walking club that meets at
    the community park, valuing low‑intensity activity over competitive sports.
  arts: Gilberto Casanova delights in listening to Los Tigres del Norte and Banda El Recodo while carving simple wooden toys in their workshop, and they regularly attend community theater productions at
    the local cultural center, where they enjoy the blend of live música and folkloric dance.
  travel: Gilberto Casanova prefers relaxed road trips that combine family visits with cultural stops, having driven to the historic missions of San Antonio and planning a future pilgrimage to the desert
    town of Santa Fe, while their modest budget keeps occasional cross‑border trips to a nearby border town on the itinerary.
  culinary: Gilberto Casanova excels at cooking home‑style Tex‑Mex meals—hand‑rolled enchiladas, fresh salsa with roasted tomatillos, and simmered chile con carne—using garden‑grown tomatoes and jalapeños,
    though they often swear at themselves for over‑salting when they’re in a hurry.
  core: An meticulous senior inspector who gardens, fishes, and hums norteño tunes, Gilberto Casanova balances a love of tradition with a habit of missing appointments and a stubborn refusal to overhaul
    routine, yet they still manage to keep the family’s kitchen stocked with fresh salsa.
background:
  cultural: Gilberto was born and raised in El Paso, Texas, within a close‑knit Mexican‑American family. He grew up bilingual, speaking Spanish at home and English at school, and was raised Catholic, celebrating
    Día de los Muertos, Las Posadas, and local fiestas with modest, family‑focused gatherings. His culture blends the traditions of his Mexican heritage—such as a love for traditional music, cooking, and
    community service—with the pragmatic work ethic common in the Southwest. He participates in community events at the local Hispanic cultural center and values the intergenerational bonds that connect
    his family to both sides of his heritage.
attributes:
