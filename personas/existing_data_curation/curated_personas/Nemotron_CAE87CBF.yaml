  career_goals: Rico’s primary ambition is to progress from first‑line supervision to a district‑manager role within the next five years, overseeing multiple store locations in the region. To achieve this,
    he plans to earn a professional certification in Retail Management and to deepen his expertise in data‑driven decision making. He is passionate about creating a mentorship program that supports younger
    retail workers, especially those from underrepresented backgrounds, and hopes to be recognized as a champion of workplace well‑being. In the longer term, he envisions opening a community‑focused boutique
    that highlights Black cultural fashion and crafts while providing apprenticeships for local artisans. Parallel to his career aspirations, he aims to develop stronger coping strategies for anxiety, including
    attending leadership workshops that integrate mental‑health awareness.
