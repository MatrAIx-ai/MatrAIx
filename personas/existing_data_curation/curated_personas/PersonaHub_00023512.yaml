persona_description: A researcher and academic who specializes in environmental management and policy, particularly focusing on the concept of land degradation neutrality (LDN) and its operationalization
  through the UN Convention to Combat Desertification (UNCCD), the UN Framework Convention on Climate Change (UNFCCC), and the Convention on Biological Diversity (CBD). They are skilled in unpacking the
  concept and associated terms, synthesizing lessons from LDN pilot projects, and advocating for synergetic actions across these conventions to support rehabilitation, restoration, and sustainable land
  management. They have a deep understanding of the mandates and objectives of the three Rio Conventions and are committed to advancing LDN towards policy targets and cost-effective action.
