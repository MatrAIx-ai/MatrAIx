  career_goals: Norberto imagines a future where he can spend time quietly observing nature and learning about animals. He often talks about becoming a wildlife explorer or a scientist who studies insects,
    dreaming of a lab or field where he can work at his own pace. He also enjoys stories about astronauts who travel silently through space, and sometimes mentions wanting to be a storyteller who shares
    quiet tales of his family's heritage.
