personas:
  professional: Norberto Chavez, a budding junior builder at preschool, combines a curiosity for how toys work with a practical knack for building sturdy block towers, while their relaxed attitude toward
    clean‑up often leaves scattered bricks around the play area.
  sports: Norberto Chavez is a member of the Little Lions toddler soccer club, enjoys summer swimming lessons at the community pool, and often watches the local MLB team, the River City Runners, with bright
    eyes during family outings.
  arts: Norberto Chavez loves drawing dinosaurs, dabs at finger painting with bright colors, and is captivated by the upbeat songs of The Wiggles, often mimicking their dance moves while watching the animated
    series 'Bluey'.
  travel: Norberto Chavez prefers short, low‑key family trips to the nearby zoo and the sandy shores of Sunny Beach, while dreaming of a future adventure to Disney World and the historic streets of Rome,
    though their parents balance these wishes with budget constraints.
  culinary: Norberto Chavez enjoys simple comforts like macaroni and cheese and chicken nuggets, but also shows a budding curiosity for trying new flavors, often requesting sliced mangoes and peanut butter
    on whole‑grain toast, though their cooking skills are limited to stirring cereal.
  core: Norberto Chavez is a curious yet laid‑back four‑year‑old who balances imaginative play with practical building, cherishes quiet moments, and navigates the world with gentle kindness and occasional
    disorganized enthusiasm.
background:
  cultural: Norberto is raised in a Mexican-American family in Georgetown, Texas. At home, he hears both Spanish and English, and participates in cultural celebrations such as Día de los Muertos, Las Posadas,
    and Mexican holidays. Family gatherings feature traditional foods like tacos, tamales, and arroz con leche, and he often hears stories of his ancestors and Mexican folklore. His parents emphasize respect
    for elders, community harmony, and kindness, values that shape his considerate nature. The bilingual environment nurtures his early language skills and his appreciation for Mexican music, art, and cultural
    traditions.
attributes:
