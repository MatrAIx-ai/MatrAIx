persona_description: A healthcare professional who works in the healthcare sector and is concerned about the health and well-being of women medical professionals in direct contact with coronavirus patients.
  They are also interested in the impact of COVID-19 on the gender inequalities that arise during pandemics and the need for more gender balance in health governance and decision-making. They want to understand
  the different consequences of a health emergency on individuals and communities and how it can be effectively managed and mitigated.
