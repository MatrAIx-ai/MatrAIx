personas:
  professional: Hoa Nguyen is a budding LEGO architect who combines a love of meticulous building with a practical curiosity about how things work, often turning backyard nature finds into imaginative structures
    while occasionally forgetting to tidy up their creations.
  sports: Hoa Nguyen enjoys playing on the local youth soccer team, idolizes the Houston Dynamo, and watches the Houston Astros on game nights, but they prefer the quiet challenge of a backyard nature trek
    over large crowds, making their fitness routine a blend of solo exploration and occasional team practice.
  arts: Hoa Nguyen is a quiet sketch artist who fills their sketchbook with detailed animal drawings, loves the whimsical stories of Mo Willems, and spends hours assembling LEGO worlds inspired by the adventures
    of beloved characters, while occasionally humming to the upbeat tunes of children’s singer Raffi.
  travel: Hoa Nguyen loves short family trips to nearby Galveston Beach for sandcastle building, dreams of exploring the Grand Canyon’s red cliffs, and prefers carefully planned weekend outings that balance
    familiar routines with a pinch of adventure, though they sometimes worry about new places.
  culinary: Hoa Nguyen delights in rolling spring rolls with rice paper, fresh herbs, and shrimp, enjoys sipping warm pho broth flavored with basil and cilantro, and is proud of their skill at making peanut
    butter and jelly sandwiches, yet they often forget to wash their hands before meals, reflecting a mix of curiosity and practical oversight.
  core: Hoa Nguyen, a 7‑year‑old thinker, blends a love for solitary LEGO building, careful savings, and cautious health habits with a competitive edge and a tendency to over‑worry about both big and small
    tasks.
background:
  cultural: Hoa is the daughter of Vietnamese immigrants living in Sugar Land, Texas, a city with a vibrant Vietnamese community. At home she speaks Vietnamese and English, celebrates Tet and other traditional
    festivals, and helps her family prepare dishes like pho and spring rolls. She attends a public elementary school where she integrates into a multicultural environment, yet she maintains strong ties
    to her heritage through weekend Vietnamese language classes and community gatherings at the local temple. This blend of Vietnamese customs and American upbringing shapes her values of family respect,
    practicality, and curiosity about the world.
