  career_goals: Hoa dreams of becoming a wildlife biologist or veterinarian so she can explore and protect animals, reflecting her curiosity and practical desire to help living things. She also imagines
    herself as a young engineer or inventor who designs simple tools for environmental care. Her competitive streak fuels a goal to win school science fairs and earn recognition, while her cautious side
    pushes her to focus on concrete steps like improving her science skills and learning animal care basics.
