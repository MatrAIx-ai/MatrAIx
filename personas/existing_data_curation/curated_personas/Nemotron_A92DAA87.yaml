personas:
  professional: Raven Desir, a 48-year-old community program director-aspirant, leverages their strong communication, grant-writing, and event-planning expertise to design arts-based senior and youth initiatives,
    drawing on their curiosity, practical organization, and sociable energy to galvanize volunteers and donors alike.
  sports: Raven Desir enjoys weekend walks with their garden crew, participates in a church-sponsored softball league, follows the Tampa Bay Buccaneers, Orlando Magic, and Tampa Bay Rays, and balances a
    love for low-impact yoga with a seasonal habit of joining a local walking club that meets at the Lakeland downtown trail.
  arts: Raven Desir, a passionate poet and community-theater enthusiast, draws inspiration from Maya Angelou's verses, Aretha Franklin's gospel anthems, and the plays of August Wilson, regularly performs
    with their church choir, leads book-club discussions on historical fiction, and curates local art showcases that celebrate oral histories.
  travel: Raven Desir prefers purposeful travel that blends historical exploration with family connections, having visited Charleston's historic district, the civil-rights landmarks of Birmingham, and a
    recent cultural tour of Ghana, while planning a future pilgrimage to the Gullah-Geechee communities of the Sea Islands, all arranged with a mix of advance research and flexible, last-minute bookings
    to accommodate volunteer commitments.
  culinary: Raven Desir, an adept home chef, frequently prepares soul-food classics like smoked collard greens, fried chicken, sweet-potato pie, and jambalaya using home-grown herbs such as thyme, basil,
    and okra, enjoys experimenting with spice blends, but often over-season dishes when multitasking between garden chores and book-club prep.
  core: Raven Desir, a 48-year-old storyteller-turned-community catalyst, balances relentless curiosity with a habit of late-night TV marathons, weaving Southern traditions into every project while never
    missing a chance to chat with a stranger.
background:
  cultural: Raven is an African‑American woman whose family roots trace back to the Great Migration and the Southern United States. Growing up in Central Florida, she was immersed in a rich tapestry of
    church life, storytelling traditions, and community festivals such as Juneteenth celebrations. Her cultural identity blends Southern soul food, gospel music, and a deep respect for African‑American
    history and heritage, which she actively preserves through volunteer work, oral‑history projects, and participation in local cultural events.
attributes:
  skills: '[''Public speaking'', ''Workshop facilitation'', ''Event planning and coordination'', ''Community outreach'', ''Grant writing'', ''Writing and editing'', ''Oral history collection'', ''Digital
