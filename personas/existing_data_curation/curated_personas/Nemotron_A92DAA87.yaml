  hobbies: '[''Reading historical fiction'', ''Writing poetry'', ''Gardening'', ''Cooking Southern cuisine'', ''Singing in church choir'', ''Community theater acting'', ''Hosting book club'', ''Volunteering
    at senior center'', ''Collecting oral histories'', ''Crocheting'']'
  career_goals: Raven aims to re‑enter the nonprofit sector as a community program director or volunteer coordinator, focusing on arts‑based initiatives that serve seniors and youth in Lakeland. She hopes
    to launch a local oral‑history project that preserves African‑American stories from Polk County, and plans to publish a memoir reflecting her journey through grief, resilience, and community activism.
    Long‑term, she envisions establishing a small cultural center that offers workshops, performances, and mentorship opportunities.
