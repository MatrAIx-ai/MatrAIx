  hobbies: '[''Reading historical fiction and African American literature'', ''Journaling'', ''Herb and vegetable gardening'', ''Knitting and quilting'', ''Solo nature walks in historic Yorktown'', ''Home‑based
    yoga practice'', ''Volunteer work at museum archives'']'
  career_goals: Kendra aims to move into a Sales Operations Manager role where she can formalize and scale the structured processes she values, implement predictive analytics for forecasting, and design
    a comprehensive onboarding program for new salespeople. Over the next five years she plans to earn a Certified Professional Sales Leader credential and begin an MBA part‑time to deepen her strategic
    business acumen. Ultimately, she envisions becoming a Regional Sales Director for the Mid‑Atlantic, leading a disciplined team while maintaining a balanced workload that supports her well‑being.
