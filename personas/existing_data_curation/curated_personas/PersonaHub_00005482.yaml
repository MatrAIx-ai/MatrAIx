persona_description: A geologist who studies the tectonic history of the Earth, particularly the collisions and movements of tectonic plates. The individual is interested in the details of the collision
  between India and Asia, including the timeline of the event and the geological evidence it left behind. They are curious about the size of India before the collision and how the collision changed its
  shape. The geologist is also interested in the implications of the study for understanding the Earth's tectonic history and the dynamics of plate movement.
