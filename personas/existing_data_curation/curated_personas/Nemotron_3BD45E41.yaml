personas:
  professional: Michelle Wendler is a retired business administrator who dedicates her meticulous recordkeeping and budgeting expertise to coordinating volunteer programs at a local soup kitchen, leading
    a senior‑center reading circle, mentoring new volunteers, and documenting Springfield’s oral histories for the public library archive, while they weave their compassionate nature into every community
    project.
  sports: Michelle Wendler enjoys low‑impact fitness through daily walks with the Springfield Senior Walking Club, bird‑watching hikes in Oak Grove Park, and follows the St. Louis Cardinals and the local
    Springfield High School football team, while they refrain from competitive sports but cherish the camaraderie of weekly community fitness meet‑ups.
  arts: Michelle Wendler finds creative fulfillment in quilting inspired by the patterns of William Morris, attends folk music concerts featuring artists like Joan Baez and local troubadour Sam Whitaker,
    and volunteers at the Springfield Community Theatre where they occasionally help set the stage for productions of “Our Town,” allowing them to blend heritage crafts with contemporary cultural experiences.
  travel: Michelle Wendler prefers thoughtfully planned trips that balance comfort with curiosity, having visited the historic sites of Williamsburg, the fall foliage of New England’s Green Mountains, and
    the wildlife preserves of Canada’s Banff National Park, while they dream of a leisurely river cruise along the Mississippi to document Midwestern stories, always traveling with a detailed itinerary
    and a spare pair of walking shoes.
  culinary: Michelle Wendler delights in baking classic Midwestern pies such as apple‑cinnamon, rhubarb‑strawberry, and pumpkin‑ginger, expertly preserves garden harvests into jars of spiced pickles and
    homemade jam, and pairs wholesome meals with ingredients like butter, fresh herbs, and locally sourced honey, while they occasionally over‑salt their famous chicken pot pie in pursuit of the perfect
    flavor.
  core: Michelle Wendler is a pocket‑sized powerhouse of organization, compassion, and curiosity, who balances a love of quiet gardening and quilting with a steadfast commitment to community service, even
    if they sometimes forget to water the tomatoes until the last minute.
background:
  cultural: Michelle grew up in a modest, middle‑class family of German and Irish descent in the heart of the Midwest. Raised in Springfield, MO, she was immersed in the region’s Protestant (Methodist)
    values of modesty, hard work, and service to community. Her upbringing emphasized self‑reliance, respect for tradition, and a love of local customs such as the Missouri State Fair and community potlucks.
    The cultural emphasis on neighborly support and civic participation shaped her compassionate, cooperative nature. While she identifies as American, she maintains an appreciation for her ancestors’ folk
    songs, recipes, and stories that have been passed down through generations.
