  career_goals: Although retired, Michelle aims to deepen her community involvement by leading a senior-center reading circle, mentoring newly-recruited volunteers, and documenting local history stories
    for the Springfield public library archive. She hopes to complete a memoir that weaves family heritage with reflections on the changing Midwest, and she is learning basic digital photography to capture
    her garden and community events. She also aspires to maintain her health and independence through regular walking and gardening, and to foster intergenerational harmony within her family.
