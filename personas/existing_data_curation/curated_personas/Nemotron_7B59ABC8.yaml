personas:
  professional: Jorge, a budding little scientist, spends afternoons at the kindergarten science corner building simple experiments with blocks and magnets; they blend childlike curiosity with a pragmatic
    preference for hands‑on, easily observable outcomes, and they often volunteer to help classmates solve puzzles, showing early cooperative leadership.
  sports: Jorge, a member of the local under‑5 soccer league playing for the Little Lions, they love sprinting after the ball during recess, they enjoy group games on the playground, and they occasionally
    join parents for weekend bike rides, showcasing an energetic, sociable approach to fitness.
  arts: Jorge, an enthusiastic fan of animated sing‑alongs, especially the songs of The Wiggles and the storytelling of Pixar’s Toy Story, they love drawing colorful pictures of superheroes, and they frequently
    mimic favorite characters during pretend play, letting a creative side flourish.
  travel: Jorge, a curious little traveler who has taken family road trips to the nearby beach, a weekend visit to the city zoo, and a summer adventure at the Grand Canyon’s junior ranger program, they
    prefer trips that mix playful exploration with familiar comforts like bedtime stories, and they often pack a favorite stuffed animal for reassurance.
  culinary: Jorge, a self‑declared mac‑and‑cheese connoisseur who loves creamy pasta, chicken nuggets with honey mustard, apple slices, and strawberry yogurt, they enjoy helping stir batter in the kitchen
    but they are notoriously picky about broccoli, often trading a bite of vegetables for a sweet cookie.
  core: Jorge, a four‑year‑old bundle of boundless energy and heartfelt compassion, they balance a love for hands‑on discovery with occasional emotional storms, and they navigate the world with a flexible,
    socially‑oriented spirit, albeit with a touch of disorganization and impulsive spending.
background:
  cultural: Jorge’s family is Salvadoran, and their household in Stockton, CA, maintains vibrant cultural traditions. He grows up speaking both Spanish and English, hearing Salvadoran lullabies and stories.
    The family celebrates holidays such as Día de los Reyes and Semana Santa, enjoys traditional foods like pupusas, tamales, and yuca frita, and participates in community gatherings at the local Catholic
    church. These cultural experiences shape his daily life, meals, language use, and the values of family cohesion and hospitality.
attributes:
  skills: '["basic motor skills", "bilingual communication (English and Spanish)", "simple block building", "age‑appropriate puzzle solving", "empathy and comforting peers", "participation in group play",
