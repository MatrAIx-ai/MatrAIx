  hobbies: '["building block towers", "drawing and coloring", "dancing to music", "group games at the park", "pretend superhero/firefighter play", "listening to storytime", "helping with simple kitchen
    tasks", "exploring nature (rock collecting, insect watching)"]'
  career_goals: Jorge imagines a future where he can help others and make the world a safer, happier place. He dreams of becoming a superhero‑like figure, a firefighter who rescues people, or a teacher
    who shares knowledge, driven by his strong compassion. He is also fascinated by how toys and simple machines work, so he sometimes talks about wanting to be an engineer or a mechanic who can fix things
    for his friends and family.
