personas:
  professional: A seasoned HVAC technician named Darius Mcneil leverages his deep technical expertise in heating, ventilation, air conditioning, and refrigeration, combined with a hands‑on, collaborative
    work style, to deliver energy‑efficient retrofits while mentoring apprentices, and they thrive on structured troubleshooting yet appreciate the flexibility of on‑site improvisation.
  sports: A community‑oriented sports fan named Darius Mcneil avidly supports the Jacksonville Jaguars, participates in a local flag‑football league each spring, joins the St. Johns River Fishing Club for
    weekend angling outings, and they also cheer for the Jacksonville Jumbo Shrimp minor‑league baseball team.
  arts: A soulful musician and vinyl collector named Darius Mcneil fuels his love for classic soul and blues by playing drums in his church’s gospel band, spinning records from Otis Redding, Aretha Franklin,
    and Stevie Wonder, and occasionally attending live tribute shows at the Florida Theatre, and they find artistic expression both in rhythm and in the tactile process of woodworking.
  travel: A weekend explorer named Darius Mcneil prefers low‑key road trips that blend fishing, cultural festivals, and Southern cuisine, having driven down to New Orleans for its blues scene, strolled
    the historic streets of Savannah, and planning a future visit to Asheville’s mountain retreats, and they favor flexible itineraries over rigid schedules, often packing a cooler for impromptu picnics.
  culinary: A barbecuing enthusiast named Darius Mcneil delights in preparing low‑smoke smoked pork ribs with a dry rub of brown sugar, paprika, and cayenne, crafting collard greens seasoned with smoked
    ham hocks, and experimenting with garden‑fresh tomatoes in a spicy jambalaya, and they are a competent home cook who enjoys sharing meals at weekend gatherings and occasionally indulges in a slice of
    pecan pie.
  core: Darius Mcneil blends technical mastery with a communal spirit, balancing structured HVAC projects and relaxed barbecues while navigating finances with a mix of prudence and occasional splurges,
    and staying rooted in music, fishing, and Southern hospitality.
background:
  cultural: Darius is a first‑generation African‑American from Jacksonville’s historically Black East Side. He was raised in a close‑knit family where church, soul food, and community gatherings were central.
    The local Black culture—with its emphasis on mutual support, storytelling through music, and pride in self‑reliance—has shaped his values of cooperation and service. He draws inspiration from the legacy
    of Jacksonville’s civil‑rights leaders and incorporates the warmth of Southern hospitality into his personal and professional interactions.
attributes:
  skills: '[''HVAC system troubleshooting'', ''Refrigerant recovery and charging (EPA certified)'', ''Preventive maintenance for residential and commercial systems'', ''Blueprint and duct design interpretation'',
    ''Energy-efficiency retrofitting (SEER upgrades, smart thermostats)'', ''Basic electrical wiring and component repair'', ''OSHA safety compliance and hazard mitigation'', ''Customer communication and
    service'', ''Project coordination for small installation teams'', ''Troubleshooting improvisation and adaptive problem solving'']'
  hobbies: '[''Fishing on the St. Johns River'', ''Gardening (vegetable and ornamental plants)'', ''Playing drums in a church gospel band'', ''Collecting and listening to soul and blues vinyl'', ''Weekend
    barbecues with friends'', ''DIY woodworking and home improvement projects'', ''Mentoring youth in vocational trade programs'', ''Attending Jacksonville Jaguars football games'', ''Participating in local
    community festivals'']'
  career_goals: Darius aims to attain NATE Master Technician certification within the next two years, followed by Certified Energy Manager credentials, positioning himself as a leader in energy‑efficient
    HVAC solutions. He envisions moving into a supervisory role where he can mentor apprentices, especially those from under‑represented backgrounds, and eventually launch his own locally‑owned HVAC service
    firm that emphasizes sustainable retrofits and reliable, affordable service for Jacksonville’s diverse neighborhoods. Continuing education through night courses to complete his associate degree in mechanical
    technology is also a priority, as is building a reputation for trustworthy, customer‑focused service.
