  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Reading speculative fiction and philosophy'', ''Poetry and short‑story writing'', ''Arduino and electronics tinkering'', ''Exploring AI‑generated
    art tools'', ''Puzzle solving (crosswords, sudoku, logic games)'', ''Container gardening'', ''Listening to jazz and classical music'', ''Visiting local art galleries and museums'']'
  career_goals: Mardochee aims to transition from operational supervision to a strategic role that shapes organizational efficiency on a broader scale. Over the next five years he plans to earn a Six Sigma
    Green Belt and a Project Management Professional (PMP) certification, positioning himself for a senior process‑improvement or business‑analysis position within his county’s public‑service sector. He
    is also interested in mentoring emerging professionals, especially those from underrepresented backgrounds, and hopes to develop a workshop series on data‑driven workflow design. Ultimately, he envisions
    a flexible senior‑leadership role that balances high‑impact decision making with the autonomy to pursue personal creative projects.
