personas:
  professional: Itza Cubias is a budding junior coder who spends afternoons tinkering with tablet coding games, blending curiosity about how things work with a practical mindset, while they often forget
    to finish the little projects before moving on to the next adventure.
  sports: Itza Cubias is a member of the Decatur Girls Soccer Club, roots for Atlanta United FC, and spends Saturday mornings at the local park playing soccer drills and chasing butterflies, balancing their
    love for competition with a spontaneous habit of improvising games with friends.
  arts: Itza Cubias draws vibrant comic‑style characters inspired by the bright colors of traditional papel picado, jams to the upbeat tunes of Los Ángeles Azules and Maná, and volunteers at the school
    art club where they showcase their sketches of hummingbirds, often staying up late to binge‑watch animated series like Coco for artistic inspiration.
  travel: Itza Cubias dreams of exploring the Grand Canyon’s red cliffs after their family’s trip to the Georgia Aquarium, loves spontaneous road trips to nearby parks like Stone Mountain, and hopes to
    visit their aunt’s hometown in the Southwest to taste authentic street tacos and see desert cacti.
  culinary: Itza Cubias loves the tangy taste of fresh salsa, helps their mom roll homemade tamales and bake pan dulce with cinnamon‑sugar dust, and often experiments by adding avocado slices to quesadillas,
    though they sometimes sneak extra chocolate chips into the batter when no one’s watching.
  core: Itza Cubias is a curious, spontaneous nine‑year‑old whose love of insects and coding collides with a sweet tooth and a habit of leaving half‑finished projects in a trail of crayons and stickers,
    and they constantly chase the next spark of inspiration.
background:
  cultural: Itza is raised in a Mexican‑American household in Decatur, Georgia, where both Spanish and English are spoken daily. Family gatherings celebrate traditions such as Día de los Muertos, Christmas
    posadas, and quinceañera preparations, instilling pride in her heritage. She enjoys Mexican cuisine, from tacos to tamales, and participates in community events organized by the local Latino cultural
    center, which blend Mexican customs with Southern influences.
