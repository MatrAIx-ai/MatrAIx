personas:
  professional: Cody Mccard, a diligent entertainment attendant in the hospitality sector, they apply meticulous attention to detail, reliable cash handling, and calm crowd‑management skills to ensure smooth
    event operations while quietly fostering a cooperative atmosphere for staff and patrons alike.
  sports: Cody Mccard rallies behind the Dallas Cowboys and the Denton High School Bulldogs, they stay active by fishing at Lake Ray Roberts, hiking the Denton County prairies, and maintaining a modest
    routine of weekend weight‑lifting at the local community gym, favoring steady low‑intensity workouts over high‑impact sports leagues.
  arts: Cody Mccard unwinds to classic rock legends such as Led Zeppelin and The Rolling Stones, while savoring country staples by George Strait and Willie Nelson, they occasionally attend local community‑theater
    productions and read historical biographies by David McCullough, which together shape their modest yet earnest artistic palate.
  travel: Cody Mccard prefers road‑trip getaways to nearby gems like Austin’s live‑music scene, the rugged trails of Big Bend National Park, and family‑friendly stays in Galveston, they balance modest budgets
    with a love for fresh air and quiet evenings, while dreaming of a future cross‑country drive to Nashville to soak in its famed songwriting heritage.
  culinary: Cody Mccard excels at Texas‑style barbecue, frequently mastering smoked brisket, dry‑rubbed pork ribs, and hickory‑infused mesquite chicken, while also crafting hearty Tex‑Mex chili with jalapeños
    and black beans, and they relish pairing their meals with homemade peach cobbler and locally sourced honey‑glazed carrots.
  core: Cody Mccard balances meticulous routine with quiet compassion, they often lose track of time while perfecting a smoked brisket, compulsively double‑checking event rosters, and harbor a harmless
    habit of hoarding extra wood chips for future barbecues.
background:
  cultural: Cody is a White American of Anglo‑American descent who grew up in suburban Texas. His upbringing reflects a blend of Southern hospitality and Midwestern pragmatism, emphasizing family, hard
    work, and community involvement. He was raised with traditional American holidays, Texas barbecue, country music, and the local love of football and rodeo culture. His family attended a Southern‑Baptist
    church, reinforcing values of compassion, cooperation, and service to others. While he holds conventional viewpoints, he is open to diverse perspectives and strives to maintain harmony within his community.
