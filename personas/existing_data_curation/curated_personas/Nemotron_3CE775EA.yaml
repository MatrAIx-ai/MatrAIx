  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Grilling'', ''Listening to Classic Rock and Country Music'', ''Volunteer Work at Community Center'', ''Reading Non-Fiction (History, Self-Improvement)'',
