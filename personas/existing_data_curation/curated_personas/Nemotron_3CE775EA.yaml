  career_goals: Cody aims to advance within the entertainment and hospitality sector by moving into a supervisory or venue‑manager role over the next five years. He plans to complete a bachelor's degree
    in hospitality management or business administration, acquire budgeting and staffing experience, and develop formal leadership training. His long‑term ambition is to oversee operations for a mid‑size
    concert hall or amusement venue, implementing efficient, routine‑driven processes that ensure reliable service for patrons. He also hopes to launch a modest community‑event planning side business that
    leverages his organizational strengths while providing stable income for his growing family.
