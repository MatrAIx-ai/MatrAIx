persona_description: A scientist who studies the interactions between genetics and environment in the development of health conditions. This scientist is particularly interested in understanding how environmental
  factors, such as exposure to toxins or pathogens, can influence the immune system and alter genetic expression. This scientist has conducted research on monozygotic and dizygotic twins, comparing the
  immune system components and activities of pairs of twins to determine the relative contributions of genetics and environment in health conditions. This scientist is likely to be interested in the work
  of Petter Brodin, MD, PhD, who led the study, and Mark Davis, PhD, who was the senior author of the paper.
