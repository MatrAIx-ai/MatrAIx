personas:
  professional: James Lee is a wholesale sales strategist who blends artistic flair with analytical negotiation; they excel at high‑stakes deals, organize multiple accounts using Salesforce, and maintain
    a flexible, competitive edge.
  sports: James Lee follows the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp with avid loyalty; they play competitive chess at the Riverside Community Chess Club, join weekly pick‑up basketball
    games at the Riverside Sports Complex, and opt for solitary morning runs along the St. Johns River as a stress‑relief routine.
  arts: James Lee immerses themselves in the visual arts by frequenting the Cummer Museum and local galleries; they sketch in a weathered notebook, collect limited‑edition prints by artists such as Mark
    Rothko, Yayoi Kusama, and Damien Hirst, and annotate contemporary philosophy and art‑history texts, allowing artistic curiosity to shape both leisure and professional creativity.
  travel: James Lee designs solo, meticulously planned trips to culturally rich cities—having explored Venice’s canals, Barcelona’s street art, and Kyoto’s temples—and they dream of strolling through Berlin’s
    Museum Island and the Paris Musée d’Orsay, balancing a modest travel budget with a desire for artistic immersion.
  culinary: James Lee enjoys moderate cooking skills, often preparing Mediterranean dishes like grilled octopus with preserved lemon; they also indulge in spicy ramen on rainy evenings and savor matcha
    lattes, while their palate craves experimental gastronomy at upscale pop‑up restaurants featuring locally sourced ingredients.
  core: James Lee is a 29‑year‑old wholesale sales professional; they blend an artistic soul, meticulous mind, and anxiety‑driven quest for control into a solitary, competitive, and deeply reflective approach
    to work, money, health, sport, art, travel, and food.
background:
  cultural: James grew up in a middle‑class, predominantly white neighborhood in Jacksonville, Florida, and his family’s roots trace back several generations in the American South. The region’s blend of
    Southern hospitality and a burgeoning arts scene, especially the vibrant street‑art and museum culture in Jacksonville, shaped his appreciation for both tradition and contemporary expression. His arts
    and humanities degree further broadened his cultural perspective, exposing him to global artistic movements while reinforcing his connection to Southern values of reliability and self‑reliance.
