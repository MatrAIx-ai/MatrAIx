  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Collecting Limited‑Edition Prints'', ''Reading (Philosophy, Art History, Speculative Fiction)'', ''Chess'', ''Board‑Game Nights (small groups)'',
