  career_goals: James aims to advance to a regional sales manager position within the next three years, overseeing a team and integrating data‑driven strategies to boost revenue. Long‑term, he aspires to
    launch his own boutique wholesale firm that specializes in artistic and design‑focused products, merging his sales expertise with his passion for the arts. He also seeks to develop a mentorship program
    for junior sales staff, emphasizing ethical negotiation and resilience under stress.
