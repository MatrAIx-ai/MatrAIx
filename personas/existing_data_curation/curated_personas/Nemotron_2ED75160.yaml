personas:
  professional: A budding preschool organizer, Mae Glover loves planning storytime circles, meticulously arranging crayons by color, and leading her classmates in imaginative play, showcasing her keen imagination
    and methodical nature.
  sports: Mae Glover loves kicking a soccer ball with the Little Giants club after school, dribbling a mini basketball during rainy days, and cheering loudly for the New York Yankees and New York Knicks
    alongside her family.
  arts: Mae Glover spends afternoons sketching vibrant patterns inspired by traditional African motifs while humming soulful tunes from artists like Otis Redding and Beyoncé, letting the rhythm guide her
    brush strokes.
  travel: Mae Glover cherishes road trips to the Bronx Zoo and weekend ferry rides to Coney Island, and dreams of flying to Paris to see the Eiffel Tower’s sparkle.
  culinary: Mae Glover delights in sweet potato fries and buttery cornbread at family meals, eagerly helps Mom mash the greens, and adores strawberry‑banana smoothies after school.
  core: Mae Glover is a bright, organized five‑year‑old whose boundless imagination fuels meticulous play, a love for rhythmic music, and a penchant for sweet treats, all while balancing cozy alone time
    with caring friendships.
background:
  cultural: Mae is a Black girl growing up in Yonkers, New York, a multicultural community that blends urban energy with suburban neighborhoods. Her family celebrates African‑American traditions, sharing
    meals of collard greens, cornbread, and sweet potatoes on weekends, and observing cultural holidays such as Kwanzaa and Juneteenth. Music at home often includes soul, jazz, and contemporary R&B, which
    shapes her love of rhythmic beats. Her parents emphasize storytelling, often recounting tales of historic figures like Harriet Tubman and Maya Angelou, fostering pride in her heritage. She participates
    in community events at the local cultural center, where she learns about African art motifs that inspire her drawings. At preschool, a multicultural curriculum introduces her to African‑American literature
    and encourages respect for diverse backgrounds, reinforcing her cooperative and considerate nature.
attributes:
  skills: '[''early reading and phonics'', ''basic counting and addition'', ''crayon drawing and coloring'', ''block and Lego construction'', ''routine organization'', ''educational tablet app navigation'',
