  hobbies: '[''reading picture books'', ''drawing and painting'', ''block and Lego building'', ''pretend space explorer play'', ''listening to music and dancing'', ''nature walks and park exploration'',
    ''library storytime attendance'']'
  career_goals: Mae dreams of becoming an astronaut who explores the cosmos and draws the wonders she discovers, or a teacher who shares stories and inspires other children to imagine. She also imagines
    herself as an artist or wildlife photographer, using her love of colors and nature to create beautiful works that bring joy to others. Her ambition is to blend creativity with discovery, always learning
    new things and helping her friends and family.
