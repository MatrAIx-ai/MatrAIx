personas:
  professional: Faustina Fernandez, a retired arts historian and seasoned curator, leverages their bilingual expertise, meticulous archival research, and competitive analytical mindset to design community
    exhibitions that spotlight overlooked artists, while rigorously planning each detail and maintaining a measured distance from collaborators.
  sports: Faustina Fernandez, who enjoys low‑impact fitness through morning walks with the Balboa Park Seniors Walking Club, follows the San Diego Padres for baseball, participates in occasional friendly
    tennis matches at the local community center, and channels their competitive spirit into weekly birdwatching challenges that track rare species sightings.
  arts: Faustina Fernandez, who spends afternoons painting delicate water‑color seascapes of the Pacific coastline, practices calligraphy for family invitations, devotes evenings to studying monographs
    on Frida Kahlo, Diego Rivera, and Georgia O’Keeffe, and curates informal reading circles where they discuss under‑represented artists with fellow enthusiasts.
  travel: Faustina Fernandez, who prefers meticulously planned journeys that balance cultural immersion with comfortable pacing, has visited the historic hill towns of Oaxaca and Jalisco on a genealogy‑focused
    spring trip, enjoys leisurely weekends in the vineyards of Napa Valley, and dreams of a tranquil retreat to the coastal cliffs of Monterey, all while limiting travel frequency to avoid the fatigue of
    crowded airports.
  culinary: Faustina Fernandez, who excels at perfecting traditional mole with a complex blend of dried chilies, nuts, cocoa, and aromatic spices, hand‑rolls tamales using fresh corn husks and locally sourced
    masa, cultivates oregano, cilantro, and rosemary in a backyard herb garden, and delights in serving these dishes alongside saffron‑infused rice during family gatherings.
  core: Faustina Fernandez is a methodical, solitary scholar‑curator whose competitive love of puzzles coexists with a tender devotion to preserving overlooked artistic legacies, often juggling detailed
    research schedules while forgetting to water their herb garden.
background:
  cultural: Faustina is a first‑generation Mexican‑American whose parents emigrated from the state of Oaxaca in the 1950s. Raised in a bilingual household in San Diego’s historic Barrio Logan, she was immersed
    in Mexican traditions such as Día de los Muertos, Las Posadas, and the vibrant mural culture of the region. Her Catholic upbringing intertwined with folk practices, shaping a worldview that values family,
    community, and respect for heritage. Fluent in Spanish, she routinely participates in local cultural events at the Mexican Cultural Institute and volunteers at community centers that promote Mexican
    arts and language. These experiences inform her scholarly interests and her dedication to preserving and sharing Mexican cultural narratives within the broader Southern California context.
attributes:
  skills: '[''Mexican & Southwestern art history'', ''Archival research'', ''Bilingual Spanish‑English translation'', ''Curatorial documentation'', ''Scholarly writing'', ''Project planning and organization'',
    ''Genealogical research'', ''Critical source evaluation'', ''Puzzle solving (crosswords, Sudoku)'', ''Calligraphy'']'
  hobbies: '[''Reading historical novels and art monographs'', ''Watercolor painting'', ''Herb gardening'', ''Traditional Mexican cooking'', ''Genealogical research'', ''Birdwatching in Balboa Park'', ''Crossword
    and Sudoku solving'', ''Calligraphy'']'
  career_goals: Despite being retired from formal employment, Faustina remains driven to make a lasting impact on her community's cultural memory. She aims to curate a series of small‑scale exhibitions
    at the San Diego Museum of Art that spotlight Mexican‑American artists whose contributions have been overlooked. Concurrently, she is working on a memoir that weaves her family's migration narrative
    with broader Mexican cultural history, intending to publish it through a local university press. Faustina also plans to establish a modest oral‑history archive, recording the stories of elder neighbors
    and relatives, and to mentor emerging scholars through occasional one‑on‑one workshops, all while maintaining her solitary, focused work style.
