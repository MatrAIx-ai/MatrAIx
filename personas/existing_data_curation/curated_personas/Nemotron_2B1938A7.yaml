  career_goals: David aims to advance to a store manager position within the next two years, focusing on creating streamlined, predictable operations that improve sales performance and customer satisfaction.
    He aspires to develop a comprehensive training program for new hires that emphasizes reliability and accountability. Long‑term, he envisions moving into a district supervisory role or consulting for
    small‑business retailers, leveraging his structured approach to help other stores achieve consistent growth while securing a stable financial future for his family.
