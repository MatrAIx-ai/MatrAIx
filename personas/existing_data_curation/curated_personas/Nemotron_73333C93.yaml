  career_goals: Even at her young age, Gai shows curiosity about the world and expresses simple aspirations shaped by her environment and personality. She often talks about wanting to 'help people' like
    her mother, and she enjoys role‑playing as a teacher with stuffed animals. As she grows, she is likely to aim for a career that combines structure, caring for others, and community involvement—such
    as becoming a teacher, a school librarian, or a pediatric nurse. Her methodical nature suggests she will appreciate professions that involve planning, organization, and routine.
