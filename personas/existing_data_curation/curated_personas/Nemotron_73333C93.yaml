personas:
  professional: A budding entrepreneur who runs a pretend lemonade stand in the front yard, Gai Gallagher demonstrates organized, methodical planning by arranging cups and tallying pretend sales with a
    crayon ledger, and they relish the order of each transaction, reflecting their early love of structure and reliability.
  sports: A lively participant in the neighborhood toddler soccer class and a keen observer of Saturday high‑school football games, Gai Gallagher loves sprinting after bright orange balls on the grassy
    field, and they proudly wear a miniature Tennessee Titans cap alongside a McNairy County Wildcats jersey, embodying a blend of early athletic curiosity and community team spirit.
  arts: A tiny music aficionado who claps along to bluegrass rhythms and sings nursery rhymes, Gai Gallagher taps a small drum on the coffee table while humming Dolly Parton's hits, and they proudly showcase
    hand‑drawn pictures of farm animals inspired by Eric Carle's books, weaving early artistic appreciation into daily play.
  travel: A curious explorer who loves family road trips to the Great Smoky Mountains and occasional visits to the Selmer county fair, Gai Gallagher enjoys watching passing trucks from the back seat and
    they eagerly point out deer and rolling hills, while dreaming of a future adventure to Nashville's Country Music Hall of Fame.
  culinary: A picky eater with a sweet spot for crispy fried chicken, buttery biscuits, and cheesy mac and cheese, Gai Gallagher insists on extra syrup on their pancakes and they occasionally trade half
    a peeled grape for a piece of banana, showcasing a blend of comforting Southern flavors and a developing palate.
  core: Gai Gallagher is a bright, methodical two‑year‑old who balances structured play with spontaneous bursts of curiosity, often seen with a stuffed rabbit in hand and a pocketful of coins, while occasionally
    refusing bedtime for an extra story they love.
background:
  cultural: Gai comes from a white, Southern family residing in Selmer, a small town in McNairy County, Tennessee. Her upbringing reflects the region’s close‑knit community values, with frequent family
    gatherings, church attendance, and participation in local traditions such as county fairs, bluegrass and country music events, and seasonal outdoor activities. The family’s lifestyle emphasizes hospitality,
    respect for nature, and a strong sense of belonging to a rural Appalachian‑influenced culture. These cultural elements shape Gai’s early experiences, from the foods she enjoys (like fried chicken and
    biscuits) to the stories she hears (folk tales and local history).
