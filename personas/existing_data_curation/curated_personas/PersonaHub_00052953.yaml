persona_description: A teacher who is responsible for planning, assessing, and reporting learning programs for children in the Western Australian curriculum. This persona is interested in understanding
  the specific content for each learning area and year level, and how it can be differentiated to meet the needs of children with additional needs. They are also interested in maximizing children's learning
  by making knowledgeable decisions about teaching and learning in the five learning and development areas identified in the curriculum. This persona is likely to be a specialist in the Western Australian
  curriculum, with a deep understanding of the learning areas and the specific content for each year level. They are also likely to be a strong advocate for equity and fairness in education, and are interested
  in supporting families and support personnel in their efforts to differentiate learning opportunities for children with additional needs.
