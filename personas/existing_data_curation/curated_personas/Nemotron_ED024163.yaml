personas:
  professional: Luis Chan, a budding naturalist and Lego engineer in kindergarten, channels curiosity and practicality by cataloguing collected leaves and rocks while constructing intricate models that
    blend imaginative wildlife scenes with systematic organization.
  sports: Luis Chan loves the outdoors, playing in the Riverdale Elementary soccer club during fall, cheering on the Seattle Seahawks on weekends, and joining family hikes in nearby woods where they collect
    pinecones for a personal nature trophy collection.
  arts: Luis Chan, an avid drawer of wildlife and tribal symbols, spends afternoons sketching squirrels and totem‑inspired designs, delights in picture books by Eric Carle, listens to traditional narratives
    from grandparents, and admires the cello performances of Yo‑Yo Ma while watching "Finding Nemo" on repeat.
  travel: Luis Chan enjoys short family trips to the nearby Cascades, especially exploring Mount Rainier National Park’s meadow trails, and dreams of seeing the giant redwoods of California, preferring
    meticulously planned day hikes over long vacations because familiar routines provide reassurance.
  culinary: Luis Chan favors simple snacks like apple slices with peanut butter and homemade trail mix with raisins and sunflower seeds, enjoys helping assemble cardboard pizza for play, habitually refuses
    broccoli, and occasionally sneaks a cookie after a stressful day as a self‑soothing treat.
  core: Luis Chan is a curious, quietly meticulous six‑year‑old who blends a love for nature and Lego construction with a sensitive heart that seeks comfort in routine, nature walks, and the gentle hum
    of creative expression.
background:
  cultural: Luis is a member of the Yakama Nation, raised in Toppenish, Washington, where his family blends everyday life with tribal traditions. His household speaks both English and basic Yakama, and
    he participates in community events at the Yakama Cultural Center, including seasonal celebrations, storytelling circles, and introductory craft workshops. The agricultural setting of the Yakima Valley
    shapes his daily routine, as his family tends to a small farm and values stewardship of the land, lessons that are woven into his upbringing alongside modern school experiences.
attributes:
  skills: '[''reading simple words'', ''counting to 20'', ''drawing and coloring'', ''building with Lego'', ''following multi-step instructions'', ''basic Yakama greetings'', ''organizing school supplies'',
