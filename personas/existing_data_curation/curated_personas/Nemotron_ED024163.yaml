  hobbies: '[''reading picture books about animals'', ''drawing wildlife and tribal symbols'', ''building Lego models'', ''collecting leaves and rocks'', ''listening to Yakama stories'', ''playing board
    games with close friends'', ''nature walks with family'']'
  career_goals: Luis imagines a future where he can explore nature and help his community. He aspires to become a wildlife biologist or a tribal educator so he can protect the land his family cares for
    and share his tribe's stories with other children. He also mentions a wish to be a teacher someday, valuing the chance to guide classmates in learning both science and cultural heritage.
