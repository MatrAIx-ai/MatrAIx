  hobbies: '[''Gardening'', ''Baking'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Hiking and nature walks'', ''Quilting'', ''Knitting'', ''Community health volunteer work'', ''Reading self‑help
    and wellness literature'']'
  career_goals: Vanna aims to advance her nursing credentials by completing an RN associate degree and eventually earning a BSN, allowing her to take on greater clinical responsibilities and leadership
    roles such as charge nurse in her rural health center. She is interested in specializing in community health nursing to better serve the underserved populations of Montgomery County. Long‑term, she
    envisions becoming a certified diabetes educator and possibly pursuing a nursing educator role to mentor new LPNs, while also seeking certification in mental health nursing to address the emotional
    distress she often witnesses among patients. Her goal is to blend structured professional development with compassionate care, creating a stable, impactful career path in her hometown.
