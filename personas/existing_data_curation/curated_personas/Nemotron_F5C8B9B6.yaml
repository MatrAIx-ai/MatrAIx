  career_goals: Inger aims to leverage her retail experience and artistic interests into a career that blends both worlds. She plans to enroll in a community college program in visual arts or museum studies
    while continuing part‑time work. Over the next five years, she hopes to transition into visual merchandising for a boutique or museum gift shop, eventually moving into a curatorial or education role
    where she can design exhibitions that engage the community. Long‑term, she envisions opening a small online boutique that showcases works by emerging Midwestern artists, using her organizational skills
    and digital marketing knowledge to give them broader exposure.
