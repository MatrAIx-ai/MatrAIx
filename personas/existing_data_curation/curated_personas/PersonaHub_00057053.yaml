persona_description: A scientist who studies the impact of artificial lighting on the environment and human health, particularly in relation to outdoor lighting standards and the transition to LED lighting.
  This scientist is interested in documenting the growth of artificial lighting and its effects on the environment, and is looking for evidence that LED lighting is not having the anticipated benefit in
  terms of global reductions in energy usage. This scientist is also interested in the environmental impact of artificial light at night, particularly on the health and wellbeing of organisms on Earth,
  including humans.
