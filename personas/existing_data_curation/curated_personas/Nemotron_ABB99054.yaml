  career_goals: Mirjana aims to move into a regional management position within the next five years, where she can oversee multiple store locations and implement consistent, people-focused operational standards.
    She plans to earn a Certified Manager credential and to develop a structured mentorship program for junior staff. Additionally, she hopes to expand her organization’s community outreach efforts, creating
    partnerships with local charities and senior services to embed social responsibility into everyday business practice.
