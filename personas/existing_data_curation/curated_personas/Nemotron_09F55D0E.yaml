  career_goals: Maria aims to advance to a senior design role within the next three years, eventually becoming a creative director who leads multidisciplinary teams. She is passionate about integrating
    Guatemalan cultural motifs into mainstream design projects, particularly those that amplify Latinx voices. Long‑term, she envisions launching her own boutique design consultancy focused on socially
    responsible branding for community organizations. She also hopes to speak at industry conferences, mentor emerging designers, and contribute to design curricula that emphasize cross‑cultural perspective.
