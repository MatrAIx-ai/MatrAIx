personas:
  professional: Maria Aguirre is a Los Angeles‑based versatile designer who blends UI/UX expertise, brand identity, illustration, and motion graphics into culturally resonant digital experiences, leveraging
    bilingual fluency and a design‑thinking mindset while balancing meticulous organization with spontaneous creative pivots.
  sports: Maria Aguirre enjoys weekend hikes with a local Santa Monica Mountains club, follows the Los Angeles Lakers for basketball and the LA Galaxy for soccer, participates in community yoga flow classes
    for fitness, and occasionally joins a recreational beach volleyball league in the summer, balancing competitive spirit with a laid‑back love for the outdoors.
  arts: Maria Aguirre immerses herself in the LA art world, attending exhibitions at LACMA and The Broad, snapping photos of street murals by artists like Shepard Fairey and Banksy, drawing inspiration
    from contemporary creators such as Kehinde Wiley and Yayoi Kusama, and curating an Instagram feed that blends modern design with traditional textile patterns.
  travel: Maria Aguirre prefers thoughtfully curated trips that blend cultural immersion with visual exploration, having already trekked Patagonia’s cliffs, wandered Oaxaca’s colorful markets, and planned
    a future pilgrimage to Barcelona’s historic studios, while also squeezing spontaneous weekend drives to Santa Barbara and Big Sur into her busy schedule, using flexible flight‑booking apps to keep options
    open.
  culinary: Maria Aguirre’s cooking skill sits at a confident home‑chef level, expertly preparing family‑heritage dishes like pepian stew and tamales while experimenting with fusion twists such as chili‑infused
    quinoa salads and avocado‑lime ceviche, and they relish gathering fresh ingredients like chiles de árbol, masa harina, and heirloom tomatoes at local farmers’ markets.
  core: Maria Aguirre is a curiosity‑driven designer who balances meticulous organization with spontaneous creativity, fuels her days with yoga, street‑art photography, and occasional coffee‑shop procrastination,
    and constantly weaves her cultural heritage into modern visual narratives.
background:
  cultural: Maria is a first‑generation Guatemalan‑American whose family maintains strong ties to their Mayan roots. She grew up hearing stories of traditional weaving, vibrant festivals like Semana Santa,
    and the rhythmic beats of marimba music. Bilingual in Spanish and English, she navigates both cultures seamlessly, drawing inspiration from indigenous textiles, bold color palettes, and the communal
    values of her heritage. Living in Los Angeles, she blends this background with the city's multicultural tapestry, allowing her to infuse her design work with a rich, cross‑cultural perspective that
    honors her ancestry while engaging diverse audiences.
