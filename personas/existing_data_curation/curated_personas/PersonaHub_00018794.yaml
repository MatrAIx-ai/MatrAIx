persona_description: The Nevada Division of Forestry, a government agency responsible for managing Nevada's natural resources, including forests, wildlife, and water. The division is focused on addressing
  significant threats to the state's natural resources, including invasive weeds, wildland fire and pest control, and the protection of state's natural resources from wildfires and native and exotic forest
  pests. The division is also interested in enhancing native plant communities, watersheds, and the services they provide, and is working to conserve Nevada's wildland communities, endangered flora, and
  water resources. The division is led by Kacey KC, who is an acting state forester and responsible for overseeing the division's efforts to address the identified threats.
