persona_description: A professional engineer or technician who specializes in the use of thermocouples in industrial applications. They are interested in selecting the appropriate cables for connecting
  thermocouples to instruments, considering factors such as conductor size, conductor sheaths, and the type of thermocouple. They may also be looking for cables that are compatible with the thermocouple's
  characteristic and have a signal that is compensated for errors in the hot and cold points of the thermocouple. Additionally, they may be interested in the different configurations available for the cables
  to suit different industrial needs.
