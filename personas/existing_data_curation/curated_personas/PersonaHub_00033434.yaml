persona_description: A scientist with expertise in mineral weathering, particularly in the characterization of microbe-mineral interfaces at submicron scales. They are interested in developing methods to
  assess the nanoscale and in situ biological contributors to incipient weathering in natural settings, using high-resolution microscopy techniques such as helium ion microscopy and scanning electron microscopy.
  They are also familiar with the use of these techniques in the earth and ecosystem sciences.
