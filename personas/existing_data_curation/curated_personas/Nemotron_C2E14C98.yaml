personas:
  professional: Soriah Rasheed is a community event organizer who leverages an associate’s degree in Business Administration to meticulously plan drum‑circle festivals and youth tutoring programs, using
    Excel budgets and Google Workspace to coordinate volunteers, negotiate vendor contracts, and ensure smooth logistics, all while delivering confident public speaking and calm on‑site safety management.
  sports: Soriah Rasheed stays active by hiking Lookout Mountain trails each weekend with the Chattanooga Hiking Club, cheering on the Chattanooga Lookouts baseball team during spring and summer, and joining
    pickup basketball games at the local YMCA, while balancing a disciplined cardio routine with relaxed social dancing at community events.
  arts: Soriah Rasheed finds artistic inspiration in the rhythmic pulse of drum circles, the storytelling of Ta‑Nehisi Coates and Chimamanda Ngozi Adichie, and the soulful sounds of Nina Simone and Leon
    Bridges, often weaving these influences into community dance evenings and potluck gatherings.
  travel: Soriah Rasheed prefers budget‑friendly road trips that blend nature and culture, having explored the Blue Ridge Parkway, the historic streets of Savannah, and the music scene of New Orleans, while
    dreaming of a future hiking adventure in the Great Smoky Mountains and a weekend getaway to Austin’s live‑music festivals.
  culinary: Soriah Rasheed cooks Southern comfort food with a modern palate, expertly preparing smoked paprika shrimp and grits, honey‑lime fried chicken, and collard greens seasoned with fresh basil from
    their community garden, while experimenting with cumin‑infused cornbread and sharing these dishes at neighborhood potlucks.
  core: Soriah Rasheed is a methodical community builder who balances a love for rhythmic drum circles and modern Southern cooking with disciplined budgeting, calm resilience, and a penchant for turning
    every garden herb into a culinary experiment.
background:
  cultural: Soriah grew up in a historically Black neighborhood of Chattanooga, where church, family, and community played central roles in daily life. Her upbringing emphasized collective support, education,
    and cultural pride, influencing her participation in church youth groups, local festivals, and community service. She celebrates traditions such as Juneteenth and the vibrant music scene of soul, R&B,
    and hip‑hop, while also appreciating Southern culinary heritage. These cultural influences shape her values of kindness, cooperation, and a strong desire to contribute to the well-being of her community.
attributes:
  skills: '[''Event Planning'', ''Volunteer Coordination'', ''Budget Management'', ''Community Outreach'', ''Public Speaking'', ''Conflict Resolution'', ''Mentoring'', ''Digital Communication'', ''Basic
