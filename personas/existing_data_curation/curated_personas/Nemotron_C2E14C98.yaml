  hobbies: '[''Community Drum Circle'', ''Social Dancing'', ''Cooking Southern Cuisine'', ''Community Gardening'', ''Reading Contemporary African American Literature'', ''Volunteer Tutoring'', ''Hiking'',
    ''Knitting'']'
  career_goals: Soriah aims to enroll in a bachelor's program in Public Administration within the next two years, building on her associate's foundation to qualify for a full-time role as a Community Program
    Coordinator at a local nonprofit serving youth and families. In the medium term, she envisions leading larger community development initiatives, eventually becoming a Director of Community Development
    for Hamilton County, where she can design systemic solutions for affordable housing and job training. She also aspires to launch a mentorship network linking college students with high schoolers in
    her neighborhood, creating a sustainable pipeline of support and guidance.
