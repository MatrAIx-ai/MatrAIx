  hobbies: '[''Technical Journals'', ''Historical Novels'', ''Science Fiction'', ''Birdwatching'', ''Nature Photography'', ''Gardening'', ''Woodworking'', ''Jigsaw Puzzles'', ''Classical Music Listening'',
    ''Meditation'', ''Long-distance Cycling'', ''Habitat for Humanity Volunteering'']'
  career_goals: Mary aims to advance to a principal civil engineer role where she can lead city‑wide sustainable infrastructure projects such as green stormwater systems and climate‑resilient bridges. She
    plans to maintain her professional engineering license while earning a PMP certification, influencing local policy on adaptive design, and publishing a textbook on modern civil engineering practices.
    Mentoring the next generation of engineers and transitioning to part‑time consulting after retirement are also key ambitions.
