personas:
  professional: Mary Stone, a veteran civil engineer with two decades of structural and geotechnical experience, leverages advanced BIM tools and lean construction principles to deliver cost-effective,
    climate-resilient infrastructure while they competitively mentor junior staff and drive results-oriented project outcomes.
  sports: Mary Stone, a dedicated long-distance cyclist, trains on quiet Texas backroads with the Lone Star Cycling Club, occasionally joins the Dallas Cowboys' charity bike-rides, and they balance their
    fitness regimen with seasonal birdwatching hikes in the Hill Country.
  arts: Mary Stone, an avid lover of classical music, attends solo piano recitals featuring works by Brahms and Debussy, curates a nature-themed photography collection inspired by Ansel Adams, and they
    find solace in woodworking pieces that echo the minimalist aesthetics of sculptor Donald Judd.
  travel: Mary Stone prefers meticulously planned solo trips, such as a photography expedition to Big Bend National Park and a sustainability conference tour across Copenhagen and Zurich, and they balance
    their love for quiet nature with a budget that leaves room for future retirement travel.
  culinary: Mary Stone enjoys farm-to-table cooking, often preparing grilled pecan-crusted trout with a side of roasted native Texas chilies, while weekend gardening supplies fresh herbs for homemade salsa,
    and they rarely order take-out, favoring the controlled precision of home-cooked meals.
  core: Mary Stone is a results-driven, solitary engineer who channels competitive curiosity into sustainable infrastructure, balances meticulous financial planning with a penchant for quiet hobbies, and
    they occasionally let their editorial skepticism surface in both professional and personal realms.
background:
  cultural: Mary grew up in a modest, family‑oriented community within the Dallas–Fort Worth metroplex. Her ancestry is primarily German and Irish, reflecting a tradition of hard work, self‑reliance, and
    community service. Raised in a Protestant environment, she internalized values of dedication, humility, and education. The Texan cultural emphasis on pragmatic problem‑solving, hospitality, and appreciation
    for outdoor spaces shaped her worldview. While her marriage and local ties keep her connected to regional traditions, her STEM education and civil‑engineering career have exposed her to broader national
    and international professional cultures.
