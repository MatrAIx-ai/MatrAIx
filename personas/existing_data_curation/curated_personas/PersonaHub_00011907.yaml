persona_description: A United Nations health agency official who is responsible for managing and overseeing global efforts to control and eliminate malaria, including developing strategies and interventions
  to prevent and treat the disease. This person is committed to reducing the number of malaria cases and deaths worldwide and ensuring that universal access to prevention and treatment is achieved. They
  are aware of the challenges and threats facing the fight against malaria, including emerging parasite resistance to artemisinin and mosquito resistance to insecticides, and are working to find innovative
  tools and technologies to sustain and accelerate progress.
