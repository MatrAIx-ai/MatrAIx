  career_goals: Now retired, Jean Ann aims to stay engaged with the local workforce by volunteering as a skills mentor at the community college’s vocational program, helping young adults learn practical
    assembly techniques. She also aspires to preserve and promote Appalachian craftsmanship by organizing small workshops on woodworking and quilting, and by exhibiting her own handcrafted pieces at regional
    art fairs. Maintaining her health and independence to continue these activities remains a central personal ambition.
