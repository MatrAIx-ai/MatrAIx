personas:
  professional: Jean Dickert, a retired assembler and fabricator from West Virginia, now volunteers as a skills mentor at the community college’s vocational program and leads small workshops on woodworking
    and quilting, blending meticulous craftsmanship with a curious, unconventional flair that keeps their projects organized yet flexible.
  sports: Jean Dickert enjoys cheering on the West Virginia Black Bears minor‑league baseball team and the Appalachian State Mountaineers football squad, while staying active through gentle morning walks
    along the Ohio River, tending a modest vegetable garden, and occasionally joining a senior‑friendly softball league organized by their church.
  arts: Jean Dickert paints watercolor landscapes of the Ohio River Valley with daring color mixes, quilts intricate blankets featuring traditional folk motifs, sings in the church choir, and draws inspiration
    from folk legends like Ola Belle Reed and the Carter Family, often attending the annual Vandalia Folk Festival to stay connected to the region’s musical heritage.
  travel: Jean Dickert favors short road trips to nearby historic sites such as Harpers Ferry and the New River Gorge, dreams of a relaxed river cruise on the Mississippi and a pilgrimage to the Blue Ridge
    Mountains, and plans each outing around their volunteer schedule, limited budget, and a preference for low‑key, culturally rich experiences.
  culinary: Jean Dickert delights in cooking hearty Appalachian fare, often simmering beans and smoked pork shoulder with sage and thyme, baking fresh cornbread, experimenting with wild mushroom risotto
    for a creative twist, and growing heirloom tomatoes and lettuce in a modest garden, while still savoring a slice of pecan pie from the local bakery after church gatherings.
  core: Jean Dickert blends a lifetime of hands‑on craftsmanship with a playful artistic spirit, mentoring young makers, tending a garden, and sketching river scenes, yet habitually misplaces their glasses
    and indulges in extra sugar cookies at the senior center.
background:
  cultural: Jean Ann was raised in the Appalachian region of West Virginia during the mid‑20th century, in a working‑class family that valued self‑reliance, community support, and church involvement. Her
    upbringing emphasized practical skills, modest education, and a strong sense of regional pride. The cultural landscape of Point Pleasant, with its blend of industrial heritage and rich folk traditions,
    shaped her appreciation for both hard‑working craftsmanship and artistic expression. This background informs her resilient yet compassionate outlook, her respect for tradition, and her willingness to
    explore unconventional ideas within a familiar cultural framework.
