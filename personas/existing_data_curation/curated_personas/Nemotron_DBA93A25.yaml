personas:
  professional: Miguel Rodriguez, a 15-year-old budding manga illustrator, channels his curiosity and methodical planning into leading his high-school art club with weekly digital-painting workshops, while
    his sociable charisma makes him the go-to presenter at school exhibitions and his occasional assertiveness helps him secure new resources for the club.
  sports: Miguel Rodriguez, a dedicated member of the Cerro Azul Soccer Academy, plays weekly matches with friends, follows the City Lions FC passionately, and supplements his routine with occasional basketball
    during the winter, showcasing his sociable nature and organized training habits.
  arts: Miguel Rodriguez, whose creative outlet blends sketching cityscapes with manga-style characters, draws inspiration from legend-making artists such as Katsuhiro Otomo and Masashi Kishimoto, attends
    local gallery openings featuring emerging local painters, and immerses himself in indie cinema by directors like Greta Gerwig while his talkative flair fuels lively debates about the latest graphic
    novels by Brian K. Vaughan.
  travel: Miguel Rodriguez, who enjoys meticulously planning weekend getaways, has explored the coastal town of Salinas for its famous seafood festival and dreams of visiting Tokyo's Akihabara district,
    the historic ruins of Machu Picchu, and the vibrant streets of Barcelona to soak in diverse art and culinary scenes, balancing school commitments with a curiosity-driven travel appetite.
  culinary: Miguel Rodriguez, an enthusiastic home-chef who regularly helps his family prepare ceviche with fresh lime-marinated fish, golden empanadas stuffed with seasoned beef, and mote flavored with
    corn and cheese, shows a growing proficiency on the stovetop while occasionally neglecting the cleanup, reflecting his talkative, sociable habit of lingering over meals to share stories.
  core: Miguel Rodriguez, a 15-year-old charismatic creator who blends manga artistry, soccer camaraderie, and cultural cooking into a methodical yet adventurous outlook, constantly curates connections
    and projects while juggling a lively social circle and a habit of over-talking.
background:
  cultural: Miguel was raised in a bicultural household in Charlotte, where Spanish is spoken at home and Ecuadorian traditions are celebrated. His family maintains strong ties to their Andean roots, observing
    holidays like Carnaval, Día de los Difuntos, and the celebration of La Flor de Mayo with traditional music, dance, and cuisine. He grew up tasting a blend of Southern U.S. food and Ecuadorian staples,
    shaping his palate and identity. The Ecuadorian community in Mecklenburg County provides him with a sense of belonging through cultural centers and community events, while his American environment encourages
    his curiosity about new ideas and diverse experiences. This blend of cultures informs his artistic perspective, his sociable nature, and his desire to act as a cultural bridge.
attributes:
  skills: '["Bilingual (English/Spanish)", "Digital illustration", "Basic photo editing (Adobe Photoshop)", "Public speaking", "Debate club participation", "Student council leadership", "Event coordination",
    "Organizational planning", "Introductory Python programming", "Social media content creation", "Team collaboration"]'
  hobbies: '["Digital drawing and illustration", "Acoustic guitar playing", "Soccer", "Visiting art exhibitions", "Watching indie films", "Reading graphic novels", "Cooking traditional Ecuadorian dishes",
    "Volunteering at cultural festivals"]'
  career_goals: Miguel aspires to merge his love for art, technology, and people by pursuing a career in multimedia communication or creative direction. He envisions studying graphic design or media production
    in college, eventually working as a content strategist or creative director for a multicultural brand that celebrates diverse stories. He is also interested in community arts outreach, hoping to develop
    programs that bring Ecuadorian cultural experiences to the wider Charlotte community. In the long term, Miguel dreams of establishing a boutique agency that produces visual campaigns and cultural events
    that bridge North American and Latin American audiences.
