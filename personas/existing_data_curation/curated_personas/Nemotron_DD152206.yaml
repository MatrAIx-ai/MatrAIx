personas:
  professional: Robert Curtis is a budding block architect who spends hours meticulously arranging wooden building blocks into practical, sturdy structures, preferring familiar designs over whimsical ones,
    and proudly insists on a tidy play area before moving on to the next project.
  sports: Robert Curtis thrives in the local toddler soccer circle, arriving at the weekly practice exactly at 10 am, scoring goals with fierce competition, yet equally enjoys quiet moments on the playground
    swing where they can have a brief solo break.
  arts: Robert Curtis delights in coloring within the lines of picture books featuring classic characters like The Cat in the Hat, favoring the familiar palette of primary colors and humming nursery rhymes
    that echo the structured rhythm of their daily routines.
  travel: Robert Curtis loves family trips to the nearby botanical garden, where the predictable path of the winding trails and the familiar sight of the butterfly enclosure provide comfort, while they
    skeptically approach the bustling downtown carousel, preferring the calm of the small-town park.
  culinary: Robert Curtis’s palate is anchored by buttery macaroni and cheese and crunchy apple slices, which they demand at each meal, while they skillfully stir canned soup under adult supervision, yet
    they stubbornly reject trying new sauces, insisting that the familiar taste of ketchup is enough.
  core: Robert Curtis is a routine‑obsessed, competitively spirited three‑year‑old who balances organized play with moments of solitary reflection, handling setbacks with calm composure and rarely succumbs
    to tantrums.
background:
  cultural: Robert is raised in a Black family in Wynne, Arkansas, where Southern African-American traditions blend with the close-knit community of the Arkansas Delta. Weekly church attendance introduces
    him to gospel music and the values of respect, perseverance, and communal support. Family gatherings feature soul-food dishes such as fried chicken, collard greens, cornbread, and sweet potato pie.
    His parents emphasize practical life skills, self-reliance, and the importance of maintaining strong family bonds.
attributes:
  skills: '[''sorting toys by color and shape'', ''building Duplo block towers'', ''simple puzzle solving'', ''alphabet recitation'', ''counting to ten'', ''basic self-care (dressing, toileting)'']'
  hobbies: '[''building with Duplo bricks'', ''solving simple wooden puzzles'', ''crayon drawing'', ''Simon Says game'', "listening to gospel and children''s songs", ''playing at the park (running, climbing,
    racing)'']'
  career_goals: Robert often talks about growing up to work in a hands-on, structured job. He imagines becoming a construction worker or mechanic, careers he sees as practical, reliable, and built on clear
    step-by-step processes. He also expresses excitement about being a firefighter, attracted by the defined responsibilities and teamwork.
