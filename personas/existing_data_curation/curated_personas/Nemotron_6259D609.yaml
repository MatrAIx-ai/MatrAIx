  hobbies: '[''Reading historical and non-fiction literature'', ''Gardening tropical orchids and herbs'', ''Hiking in Coamo’s hills'', ''Nature photography'', ''Yoga and meditation'', ''Cooking traditional
    Puerto Rican dishes'', ''Playing the cuatro (informally)'']'
  career_goals: Melissa aims to obtain CPA and CIA certifications within the next two years to qualify for a senior audit manager position at a regional firm. She intends to lead a team that enhances financial
    controls and compliance for small and medium Puerto Rican enterprises, integrating data‑analytics tools that satisfy both her curiosity and practical focus. In the long term, Melissa envisions establishing
    her own boutique consultancy in the Coamo region, offering personalized compliance, process‑optimization, and advisory services. This venture will allow her to work autonomously, maintain a quiet work
    environment, and mentor emerging women accountants, aligning with her cooperative yet assertive personality.
