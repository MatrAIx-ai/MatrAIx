  hobbies: '["sketching in parks", "visiting art museums (Andy Warhol Museum)", "reading graphic novels", "photography and photo editing", "participating in community art workshops", "listening to indie
    music", "journaling", "reading philosophy essays"]'
  career_goals: Mildred aspires to turn her passion for visual arts into a professional career. Her short‑term goal is to earn a portfolio‑ready scholarship for a community college or a specialized art
    program, focusing on illustration or graphic design. In the longer run, she hopes to work as a freelance illustrator for books and independent games, or secure a role as a junior curator or assistant
    at a local museum such as the Carnegie Museum of Art. She is also interested in eventually establishing her own online art shop where she can sell prints and custom commissions. While competitive, she
    aims to be recognized for the originality and conceptual depth of her work, and she seeks to develop a disciplined, self‑driven work ethic to manage her tendency toward worry and stress.
