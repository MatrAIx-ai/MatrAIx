personas:
  professional: Mildred Perry, a 17‑year‑old aspiring illustrator, channels their meticulous sketching and digital design skills into a growing portfolio while navigating scholarship applications with a
    disciplined work ethic tempered by a lingering worry about competition.
  sports: Mildred Perry follows the Pittsburgh Steelers with analytical enthusiasm, joins a weekend pick‑up basketball game at the South Side Community Center when they feel socially comfortable, and primarily
    satisfies their fitness need by jogging along the Allegheny River trail while sketching the industrial skyline during the spring.
  arts: Mildred Perry admires Andy Warhol’s pop‑culture critique, draws inspiration from graphic novels like ‘Saga’ and the melancholic sounds of The National, and channels this blend into collaborative
    murals at the Carnegie Library and a personal blog that reviews exhibitions by emerging artists such as Tschabalala Self.
  travel: Mildred Perry enjoys planning modest weekend trips, such as a recent day‑long visit to Phipps Conservatory and a weekend art‑focused excursion to the Philadelphia Museum of Art, while dreaming
    of a solo study‑abroad semester in Glasgow to explore the works of the Scottish Colourists, balancing wanderlust with high‑school budget constraints.
  culinary: Mildred Perry prefers crafting simple yet vibrant meals, often perfecting avocado‑lime toast sprinkled with chili flakes and experimenting with matcha‑infused oatmeal bowls, while indulging
    in occasional homemade ramen with fresh bok choy and soft‑boiled eggs as a creative outlet after long sketching sessions.
  core: Mildred Perry, a 17‑year‑old visual‑arts enthusiast, balances relentless curiosity and a perfectionist’s worry with a habit of hoarding sketchbooks and late‑night coffee, making them both a disciplined
    creator and an occasional over‑thinker.
background:
  cultural: Mildred was born and raised in Pittsburgh’s South Side, a neighborhood marked by its historic steel‑mill roots and a vibrant, working‑class culture. Her family’s background is primarily of Irish
    and German descent, reflected in family traditions such as weekend gatherings centered around home‑cooked meals and an appreciation for folk music. Growing up in Allegheny County, she has been shaped
    by the city’s blend of industrial heritage and a growing arts scene, from the murals that adorn the streets to the eclectic music venues along the river. The region’s emphasis on resilience and community
    involvement influences her worldview, even as she navigates the pressures of adolescence. Her cultural milieu includes exposure to Pittsburgh sports culture, local festivals like the Three Rivers Regatta,
    and a strong sense of local pride that informs her artistic sensibilities.
attributes:
  skills: '["drawing", "watercolor painting", "digital illustration", "photo editing (GIMP)", "basic graphic design", "art research", "curating virtual exhibitions", "blog writing", "project organization",
