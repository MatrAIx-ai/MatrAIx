    junior technicians", "Technical negotiation"]'
  hobbies: '["Coaching senior basketball league", "Model rocketry club", "Weekend barbecues", "Game nights", "Fishing", "Woodworking", "Listening to aerospace podcasts", "Attending maker fairs", "STEM outreach
    volunteering", "Mentoring high‑school engineering students"]'
  career_goals: Clyde aims to transition from day‑to‑day engineering tasks to a senior technical consultant role where he can codify his practical knowledge into standardized procedures for the aerospace
    industry. He wants to lead a small, high‑performance team that focuses on developing reliable, low‑cost satellite components for commercial launch providers. As he approaches retirement, Clyde is also
    looking to secure a legacy by publishing a guide on pragmatic aerospace maintenance for technicians without advanced degrees. While he values stability and predictability, his competitive nature pushes
    him to take on challenging projects that can demonstrate measurable performance improvements and position him as a go‑to expert in the Sacramento aerospace community.
