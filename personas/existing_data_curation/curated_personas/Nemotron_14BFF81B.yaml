    at a local community kitchen'']'
  career_goals: Sheila aims to move from a line‑level food‑preparation role to a head chef position within the next three years, ideally at a restaurant that marries artistic cuisine with locally sourced
    New England ingredients. To support this, she plans to enroll in an associate‑degree culinary program to earn formal certification in culinary arts and food styling. Long‑term, she aspires to open a
    boutique bistro in the Pioneer Valley that showcases experimental dishes inspired by abstract art, while competing in regional cooking competitions to build her reputation and refine her craft.
