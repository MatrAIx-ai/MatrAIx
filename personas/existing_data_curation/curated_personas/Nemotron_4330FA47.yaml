personas:
  professional: Ernesto Solano, a 94‑year‑old horticulture specialist with an associate’s degree, draws on decades of municipal grounds‑keeping expertise, meticulous record‑keeping, and a calm, cooperative
    demeanor to design sustainable gardens, mentor younger crew members, and champion a legacy‑building mentorship program in San Diego.
  sports: Ernesto Solano enjoys low‑impact fitness by strolling coastal trails with the San Diego Senior Walkers Club, follows the San Diego Padres baseball season, occasionally catches San Diego Wave FC
    matches on TV, and participates in a community garden‑themed charity run each spring.
  arts: Ernesto Solano joyfully fills mornings with classic merengue and bachata on a portable radio, treasures photographs of sunrise landscapes reminiscent of Ansel Adams, and often revisits biographies
    of historical figures like Simón Bolívar and Harriet Tubman, while also appreciating the soulful voice of Celia Cruz and the guitar artistry of Juan Luis Guerra.
  travel: Ernesto Solano favors leisurely travel that blends historical immersion with natural scenery, having visited historic Old San Juan for its colonial architecture, taken a calm cruise through the
    Caribbean islands to sample local cuisines, and planning a future trip to the lavender fields of Provence, all while preferring to travel with a small group of close friends and arranging detailed itineraries
    well in advance.
  culinary: Ernesto Solano delights in preparing traditional island meals such as spiced plantain mash and a hearty stew brimming with root vegetables, fresh herbs from his garden, and slow‑cooked meat,
    often pairing them with citrus‑infused sauces made from home‑grown lemons and oranges, and he relishes sharing these dishes during family gatherings.
  core: Ernesto Solano blends a century‑long love of plants, meticulous craftsmanship, and classic tropical rhythms into a quiet yet purposeful life, where sunrise walks, garden journals, and a flair for
    mentoring keep him engaged, even as occasional forgetfulness about watering or medication adds a touch of human imperfection.
background:
  cultural: Ernesto was born in the Dominican Republic during a period of significant social change and immigrated to the United States in his early thirties, settling in San Diego where he built a life
    with his wife. His Dominican heritage is woven into daily rituals—spiritual devotion rooted in Catholic traditions, a love for vibrant family gatherings, and a palate for Caribbean flavors. Bilingual
    fluency allows him to bridge cultural gaps, often translating for older Spanish‑speaking neighbors. He remains an active participant in the local Dominican community, contributing his gardening expertise
    to cultural festivals and communal gardens. While fully integrated into Californian life, he maintains the rhythmic storytelling style, warmth, and resilience characteristic of his Caribbean upbringing,
    enriching his surroundings with a blend of Caribbean and Southern‑California sensibilities.
attributes:
  skills: '[''Plant identification (native and exotic)'', ''Soil testing and amendment'', ''Irrigation system design and maintenance'', ''Hard‑scape construction and repair'', ''Operation of commercial
    grounds‑keeping equipment'', ''Sustainable landscaping (xeriscaping, native planting)'', ''Integrated pest management'', ''Safety compliance and OSHA procedures'', ''Project budgeting and record‑keeping'',
    ''Bilingual communication (English/Spanish)'', ''Team mentorship and training'']'
  hobbies: '[''Backyard gardening (heirloom vegetables, citrus, herbs)'', ''Birdwatching and field journaling'', ''Listening to merengue and bachata music'', ''Preparing traditional Dominican cuisine'',
    ''Coastal nature walks and photography'', ''Reading historical biographies'', ''Volunteering at the Dominican cultural center'', ''Maintaining a personal garden journal'']'
  career_goals: Even at 94, Ernesto remains driven by a desire to leave a lasting, green legacy for his San Diego community. He aims to formalize a mentorship program that pairs senior groundskeepers with
    younger apprentices, preserving time‑tested practices while introducing eco‑friendly innovations. Ernesto also hopes to volunteer his expertise to maintain a historic neighborhood garden, ensuring it
    serves as an educational space for local schools and cultural groups. By documenting his horticultural knowledge in a simple guide for senior gardeners, he seeks to empower peers to stay active, healthy,
    and connected through gardening.
