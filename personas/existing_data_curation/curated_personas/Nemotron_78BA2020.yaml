personas:
  professional: Shaundarius Latham is an aspiring junior digital storyteller who combines meticulous character sketching, Scratch programming logic, and a love for sci-fi narratives to create short animated
    scenes, applying their organized planning habit to weekly project milestones.
  sports: Shaundarius Latham plays point guard for the community center's after-school basketball club, the Thunderbolts, practices three times a week, models their dribble moves after NBA star Jayson Tatum
    of the Boston Celtics, and adds weekend park jogs to stay fit.
  arts: Shaundarius Lathan devotes afternoons to sketching dynamic superhero poses inspired by Alex Ross and manga creator Eiichiro Oda, animates short clips set to classic soul tracks like Marvin Gaye's
    Let's Get It On and jazzy improvisations by Miles Davis, and draws creative fuel from Studio Ghibli films such as Princess Mononoke, often showcasing their work at community art workshops.
  travel: Shaundarius Latham, a curious explorer, loves weekend hikes in the nearby Emerald Woods nature preserve for on-the-spot wildlife sketches, day-trips to the Metropolitan Museum of Art's science
    exhibit, and dreams of a future family vacation to Japan's Akihabara district to soak up anime culture, all while respecting a school-centric schedule and family budget by crafting detailed packing
    lists and travel budgets months in advance.
  culinary: Shaundarius Latham enjoys customizing pepperoni pizza with extra mozzarella and a drizzle of hot honey, whips up bright mango-spinach smoothies blended with chia seeds for after-practice refuel,
    and crafts a signature mac-and-cheese using sharp cheddar, a pinch of smoked paprika, and a breadcrumb topping, proudly sharing these creations with friends during sleepovers.
  core: Shaundarius Latham is a methodical, curious 11-year-old who turns sketchbooks into storyboards, balances basketball drills with coding sprints, hoards spare change for new art tech, and can't resist
    a good jazz riff while perfecting a three-point shot.
background:
  cultural: Shaundarius comes from an African‑American family with deep roots in the Midwest; his grandparents moved from the Southern United States during the Great Migration. Growing up in Akron, Ohio,
    he is immersed in the local Black community’s cultural traditions, including church gatherings, Juneteenth celebrations, and community events that highlight African‑American history, music, and art.
    His family emphasizes education, resilience, and creativity, often sharing stories of their heritage that shape his appreciation for artistic expression and collective achievement.
