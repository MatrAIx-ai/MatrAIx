personas:
  professional: Wendy Seghers, a 33‑year‑old maintenance specialist renowned for her mechanical troubleshooting expertise and methodical, organized workflow, channels her competitive spirit and strong communication
    skills into training junior staff and driving performance metrics as she pursues a senior facilities‑management role at a regional hospital.
  sports: Wendy Seghers embraces energetic group activities like line dancing to country hits, weekly Zumba classes, and weekend hikes along the Natchez Trace, cheering on the Mississippi State Bulldogs
    and occasionally joining community runs organized by the local YMCA.
  arts: Wendy Seghers expresses her curiosity through painting vibrant landscapes, shaping pottery inspired by Delta blues motifs, and capturing candid moments with a vintage Nikon, while she unwinds listening
    to acoustic folk artists such as Gillian Welch and the soulful guitar work of Eric Clapton, frequently attending the annual Grove Art Festival.
  travel: Wendy Seghers favors road‑trip adventures that blend cultural immersion and relaxation, having explored New Orleans’ French Quarter, the music scene of Nashville, and a weekend retreat in Asheville’s
    Blue Ridge Mountains, while she dreams of a future getaway to Savannah’s historic squares and the coastal charm of Charleston.
  culinary: Wendy Seghers delights in Southern staples like crispy fried catfish, fluffy buttermilk biscuits with honey butter, and sweet tea, yet she also experiments by adding Cajun spices to jambalaya
    and perfecting a rosemary‑infused potato gratin, often sourcing fresh shrimp at the local fish market.
  core: Wendy Seghers balances an inquisitive, artistic soul with a disciplined, competitive work ethic, yet her penchant for worry and occasional skepticism adds a relatable, human edge to her otherwise
    driven personality.
background:
  cultural: Wendy grew up in Lumberton, Mississippi, steeped in Southern hospitality, close‑knit community values, and a strong church presence. She enjoys traditional Southern cuisine like fried catfish,
    biscuits, and sweet tea, and appreciates the region's musical heritage, especially blues and country. Her college experience broadened her worldview, fostering an openness to diverse artistic expressions
    and unconventional ideas. While she remains rooted in the pragmatic, down‑to‑earth sensibility of rural Mississippi, she actively participates in local festivals, church events, and community arts programs,
    blending her cultural heritage with a modern, curious outlook.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical maintenance'', ''HVAC servicing'', ''Plumbing repairs'', ''Carpentry and fixture installation'', ''Preventive maintenance scheduling'', ''Facility
    management software (CMMS)'', ''Inventory control'', ''Safety compliance and OSHA standards'', ''Team coordination and staff training'']'
  hobbies: '[''Painting'', ''Pottery'', ''Photography'', ''Volunteer home‑repair projects'', ''Line dancing'', ''Zumba classes'', ''Hiking'', ''Trivia nights'', ''Escape rooms'', ''Classic‑car restoration'',
    ''Mindfulness journaling'', ''Listening to folk music'']'
  career_goals: Wendy aims to move from a general maintenance role to a senior facilities management position within the next five years, targeting roles such as Facility Supervisor or Maintenance Manager
    at a regional hospital, school district, or manufacturing plant. She plans to earn certifications like Certified Maintenance & Reliability Professional (CMRP) and Certified Facility Manager (CFM) while
    completing an associate degree in Facility Operations. Her ambition includes implementing sustainable, energy‑efficient repair practices, reducing equipment downtime, and leading a high‑performing maintenance
    team. Ultimately, she envisions launching her own small maintenance consulting business that blends technical expertise with an eye for aesthetic improvements.
