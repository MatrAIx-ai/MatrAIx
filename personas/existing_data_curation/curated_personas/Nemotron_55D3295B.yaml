  career_goals: Phuc aims to achieve a GED and enroll in a vocational certification program—preferably in HVAC or automotive technology—to secure a stable, predictable technical position. He envisions progressing
    to a supervisory role where he can apply his organizational strengths, and eventually hopes to launch a small, independent maintenance business that offers routine, reliable services to his community.
    Financial security and a structured work environment are his primary career aspirations.
