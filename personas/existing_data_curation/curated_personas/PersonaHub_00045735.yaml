persona_description: A medical professional who specializes in cardiology and arrhythmia treatment. They are knowledgeable about the various types of arrhythmias, their causes, and the various treatment
  options available. They are also skilled in managing and treating arrhythmias that cause significant symptoms or increase the risk for more serious conditions. They may work in a hospital, clinic, or
  research institution and have experience with a variety of arrhythmia treatments, including lifestyle measures, drugs, vagal maneuvers, implantable devices, cardioversion, catheter ablation, and open-heart
  surgery.
