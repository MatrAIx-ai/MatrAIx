personas:
  professional: Gabriela Regalado, a budding robotics enthusiast who mixes curiosity about programming with a practical love for building simple devices, channels her teamwork skills from soccer and compassion
    from choir into collaborative school projects, often leading the club while ensuring everyone's ideas are heard and turning concepts into functioning prototypes.
  sports: Gabriela Regalado plays forward for the Eastside Eagles Youth Soccer Team, enjoys Saturday morning drills, and cheers for the local professional club City United FC; she values fitness through
    group play, balances competitive drive with fair play, and maintains stamina by jogging after school and stretching before matches.
  arts: Gabriela Regalado sings in the bilingual school choir, performing songs by artists like Shakira and Luis Fonsi, and she practices basic guitar chords inspired by Ed Sheeran; her sketchbooks are
    filled with comic‑style illustrations reminiscent of Stan Lee and Hayao Miyazaki, reflecting her desire to promote kindness and cooperation through visual storytelling.
  travel: Gabriela Regalado prefers weekend trips that blend adventure and family bonding, such as hiking in the nearby national park, visiting the historic old town of San Antonio, and dreaming of exploring
    the bustling markets of Mexico City; she often maps out itineraries in a notebook, balancing budget constraints with a love for cultural immersion.
  culinary: Gabriela Regalado loves helping her grandmother prepare tamales and enchiladas, mastering the art of seasoning corn masa, roasted chiles, and fresh cilantro, while she experiments with simple
    side dishes like guacamole and grilled corn; she enjoys cooking at a beginner level, often tasting the sauce and adjusting the heat to her liking.
  core: Gabriela Regalado is a curiosity‑driven, compassionate teen who balances robotics tinkering with soccer kicks, sketching heroic comics, and family cooking, all while occasionally misplacing her
    cleats and over‑indulging in comic book marathons.
background:
  cultural: 'Gabriela grew up in a close‑knit Mexican‑American household in Seagoville, Texas. Her parents immigrated from Jalisco and keep many traditions alive: celebrating Día de los Muertos with homemade
    altars, preparing holiday tamales, and speaking Spanish at home while also embracing Texan customs. She attends a public middle school in Dallas County, where she participates in cultural events like
    Hispanic Heritage Month. The blend of Mexican family values—respect for elders, communal gatherings, and a strong sense of hospitality—shapes her compassionate outlook. At the same time, living in the
    diverse Dallas metro area exposes her to a variety of cuisines, music, and community service opportunities, fostering a bicultural identity that balances pride in her heritage with a broader American
    perspective.'
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Basic computer troubleshooting'', ''Scientific method and simple experiments'', ''Organizational planning and time‑management'', ''Peer mediation
    and conflict resolution'', ''Elementary first‑aid knowledge'']'
  hobbies: '[''Reading mystery novels'', ''Playing soccer'', ''Cooking traditional Mexican dishes with family'', ''Robotics club projects'', ''Singing in a bilingual choir'', ''Sketching comic‑style illustrations'']'
  career_goals: Gabriela dreams of a future where she can combine her love for helping others with her interest in science. She aspires to become a pediatric nurse or a community health worker, envisioning
    a role that lets her support children and families in her neighborhood. She also entertains the idea of studying environmental science to protect local parks and promote sustainability in Seagoville.
    In the short term, she aims to earn a high school diploma with honors, participate in the school’s health‑camps club, and gain a part‑time volunteer badge at the nearby community center.
