  career_goals: Motivated by his love for art and his desire to help others, Mohammad aims to become an art therapist or community arts coordinator who designs inclusive art programs for youth. In the short
    term, he plans to deepen his artistic techniques through advanced after‑school art classes, build a portfolio of digital and traditional work, and continue volunteering with local after‑school programs.
    Long‑term, he envisions studying visual design and psychology in college to blend creativity with empathy, ultimately creating spaces where art fosters emotional wellbeing and social connection.
