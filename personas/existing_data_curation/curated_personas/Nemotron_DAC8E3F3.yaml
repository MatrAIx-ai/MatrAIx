personas:
  professional: Mohammad Smith is an aspiring young robotics enthusiast who blends a knack for building simple machines with a curiosity for basic coding, channeling the same meticulous yet flexible mindset
    that guides their sketching of New England shorelines into innovative school projects.
  sports: Mohammad Smith is an energetic member of the South Shore Soccer Club, cheering on the Boston Red Sox and New England Patriots, while regularly swimming laps at the town pool and balancing school
    robotics work with weekend pickup games on the community field.
  arts: Mohammad Smith channels their love for coastal scenery into sketching New England shorelines inspired by Winslow Homer, experiments with digital painting on a tablet reminiscent of the vibrant palettes
    of contemporary artist Loish, strums acoustic renditions of John Mayer while devouring graphic novels like "Saga" and "Watchmen" during museum visits at the Museum of Fine Arts, Boston.
  travel: Mohammad Smith plans modest family weekend trips to nearby coastal towns such as Newport and scenic getaways to Acadia National Park, dreaming of future adventures to the Louvre in Paris while
    using a hand‑drawn travel journal to map out each itinerary and balancing the desire for exploration with a limited allowance.
  culinary: Mohammad Smith prefers fresh seafood dishes like clam chowder and fish tacos, experiments with making simple pasta primavera using basil and cherry tomatoes, and indulges in Saturday night pizza
    slices topped with pepperoni while occasionally trying their hand at smoothie bowls flavored with mango and spinach.
  core: Mohammad Smith is a curiosity‑driven teen who merges artistic passion with hands‑on engineering, balances community service with lively social circles, and occasionally forgets to stretch after
    long robotics sessions.
background:
  cultural: Although identified as White, Mohammad's family reflects a blend of New England coastal traditions and a broader multicultural heritage suggested by his name. Growing up in Cohasset, a historic
    maritime town in Norfolk County, he participates in community events like Harborfest and feels a strong connection to the sea, which often influences his artwork. At home, his household observes traditions
    from diverse cultural backgrounds, fostering an early appreciation for cultural diversity, inclusivity, and the value of community harmony.
