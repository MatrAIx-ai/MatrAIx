personas:
  professional: Tammy Wiley channels their curiosity and knack for organization into a budding career in arts administration, leveraging their talent in painting, digital illustration, event facilitation,
    and grant writing to craft community workshops and exhibitions while confidently asserting their vision in collaborative settings.
  sports: Tammy Wiley fuels their love of the Pacific Northwest through weekend hikes up Mount St. Helens, kayaking the Cowlitz River with the local kayak club, and cheering for the Seattle Seahawks and
    Portland Timbers while participating in a volunteer trail‑maintenance crew that keeps them fit and community‑connected.
  arts: Tammy Wiley blends brushstrokes and improv jokes, painting misty rainforest scenes inspired by Emily Carr while performing with a community theater improv troupe, attending exhibitions at the Seattle
    Art Museum, and curating playlists of indie folk favorites like Bon Iver and Phoebe Bridgers to soundtrack their creative process.
  travel: Tammy Wiley curates weekend escapes to coastal gems such as Cannon Beach, Astoria, and Port Townsend, meticulously planning itineraries in a shared Google Sheet, opting for boutique B&Bs over
    hotels, and balancing the urge for spontaneous tide‑pooling adventures with a modest travel budget that fuels a growing blog audience.
  culinary: Tammy Wiley cooks with a garden‑fresh confidence, regularly whipping up pan‑seared wild salmon with dill and lemon, herb‑infused quinoa salads featuring basil and mint, and hearty mushroom risotto,
    while savoring farm‑to‑table dinners at eateries like Canlis and indulging in occasional midnight chocolate fondue experiments.
  core: Tammy Wiley is a 34‑year‑old art‑enthusiast who tags every weekend hike with a new watercolor sketch, hoards souvenir seashells in a mason‑jar, and meticulously balances their creative side‑hustle
    with a disciplined budgeting habit.
background:
  cultural: Tammy grew up in a middle‑class white family in the Pacific Northwest, absorbing the region’s blend of outdoors‑oriented lifestyle, progressive social attitudes, and a strong community focus
    on arts and environmental stewardship. Her upbringing involved frequent visits to regional museums, participation in school art programs, and family trips to the coast. While identifying as white American,
    she has developed respect for the local Cowlitz tribal heritage through community events and incorporates that awareness into her community work.
attributes:
  skills: '["Digital illustration", "Painting", "Graphic design (Adobe Photoshop, Illustrator)", "Event planning and coordination", "Volunteer management", "Public speaking and workshop facilitation", "Creative
    writing and blogging", "Research and grant proposal writing", "Social media content creation", "Basic photography"]'
  hobbies: '["Hiking in the Pacific Northwest", "Kayaking on the Cowlitz River", "Visiting art galleries and museums", "Painting (landscapes, mixed media)", "Community theater and improv", "Hosting social
    gatherings", "Herb gardening", "Reading contemporary fiction", "Listening to indie folk music", "Travel blogging about regional trips"]'
  career_goals: Tammy aims to transition into a career that merges her love for art and community engagement. She plans to pursue a certificate in arts administration or nonprofit management within the
    next year, and to secure a part‑time role or internship at a local arts organization or community center. Her longer‑term ambition is to become an arts program director, curating exhibitions and leading
    educational outreach, or to launch her own freelance creative consultancy offering event design and visual storytelling services. She also hopes to create a sustainable online platform showcasing regional
    artists and her own artwork.
