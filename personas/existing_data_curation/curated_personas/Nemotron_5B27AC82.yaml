personas:
  professional: Eleanor Harris, a one-year-old toddler, showcases an unusually organized playstyle - sorting blocks by shape and color, methodically building structures, and gently coaching fellow playmates
    through shared activities, hinting at early leadership potential.
  sports: Eleanor Harris delights in baby swim lessons at the local community pool and joins the toddlers' gym where they practice wobble-board balance, cheering for the nearby minor league baseball team
    through plush mascot scarves.
  arts: Eleanor Harris is captivated by lullabies from classic composers like Mozart and dances to the upbeat tunes of modern kids' performer JoJo Siwa, often painting with non-toxic finger paints, favoring
    bright blues and greens.
  travel: Eleanor Harris enjoyed a family road trip to the Grand Canyon's rim, where the stroller-friendly viewpoint sparked fresh curiosity, and they now dream of a gentle beach getaway to Maui's calm
    sands.
  culinary: Eleanor Harris prefers smooth mashed sweet potatoes, soft avocado slices, and the occasional tiny piece of banana, but will dramatically protest the texture of peas, showing a picky yet adventurous
    palate for sweet flavors.
  core: Eleanor Harris is a methodical, compassionate toddler who balances curiosity with routine, worries over slight discomforts, and channels their organized spirit into playful leadership and careful
    snack selections.
background:
  cultural: Eleanor is raised in a white, Southern family in Shreveport, Louisiana. Her upbringing reflects the region’s blend of Southern hospitality, Methodist church traditions, and the culinary flavors
    of Cajun and Creole cuisine that her family enjoys at gatherings. She frequently attends Sunday school, where she learns stories and values of community service, and she partakes in local celebrations
    such as Mardi Gras parades and Louisiana’s music and food festivals. These cultural experiences shape her early love for music, communal harmony, and a practical respect for tradition, while also exposing
    her to the diverse linguistic accents and friendly, neighborly atmosphere characteristic of Caddo Parish.
attributes:
  skills: '["fine‑motor coordination (grasping, stacking, shape‑sorting)", "early speech (babbling, first words)", "emotional attunement and empathy", "routine following and anticipation", "cause‑and‑effect
