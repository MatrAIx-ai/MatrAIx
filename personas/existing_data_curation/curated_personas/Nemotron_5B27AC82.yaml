  hobbies: '["sensory water play", "listening to Southern lullabies", "interactive picture‑book reading", "building block towers", "shape‑sorting puzzles", "garden walks and leaf collecting"]'
  career_goals: Although only a toddler, Eleanor’s parents nurture her natural compassion and curiosity with the hope that she will grow into a career that lets her help others and apply her practical mindset.
    They envision her pursuing a role such as an early‑childhood educator, pediatric nurse, or community health worker, where her organized, reliable nature and desire for harmony can thrive. Long‑term,
    she is encouraged to develop leadership skills and a methodical approach that could also suit professions like project coordination or social services, aligning with her ambition to make a positive,
    tangible difference.
