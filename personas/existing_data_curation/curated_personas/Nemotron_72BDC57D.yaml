personas:
  professional: Merrill Prieto is a seasoned butcher who blends meticulous carcass breakdown expertise with a curious, experimental approach to charcuterie, while their relaxed attitude toward scheduling
    sometimes leads to a cluttered prep area.
  sports: Merrill Prieto dominates the local adult softball league, roots for the Louisville Bats and Indianapolis Colts, spends weekends fishing the Ohio River, hunting in nearby woods, and hits the gym
    for high‑intensity interval training, all while maintaining a competitive edge that fuels their drive on and off the field.
  arts: Merrill Prieto immerses themselves in live music at neighborhood pubs, especially enjoying the gritty blues of Gary Clark Jr., the folk storytelling of The Avett Brothers, and the soulful funk of
    St. Paul and The Broken Bones, which inspire their creative rub blends and knife‑sharpening rituals.
  travel: Merrill Prieto favors spontaneous road trips, having road‑tripped to Nashville for a weekend of live music, Asheville for its renowned BBQ scene, and the historic river towns along the Ohio River,
    while dreaming of a future RV adventure down the Mississippi River that balances work, friends, and budget constraints.
  culinary: Merrill Prieto is a grill‑obsessed culinary tinkerer who perfects smoked brisket with hickory chips, cedar‑plank salmon seasoned with coffee‑infused rubs, and house‑made sausage spiced with
    smoked paprika and garlic, wielding a collection of razor‑sharp knives as both tools and meditative companions.
  core: Merrill Prieto is a sociable, competitive 32‑year‑old butcher whose curiosity fuels culinary experiments, yet a relaxed, sometimes disorganized streak and frequent worries keep their life a vivid
    mix of ambition and stress.
background:
  cultural: Merrill grew up in a white, Midwestern family in Indiana, with roots tracing back to German and Irish immigrants who settled in the region in the early 20th century. His upbringing was shaped
    by the values of hard work, modesty, and community involvement typical of small‑town Indiana. He attended the local public high school, where he participated in the Future Farmers of America (FFA) program,
    fostering his early interest in agriculture and meat processing. Family gatherings center around holiday meals featuring traditional home‑cooked dishes, reinforcing a practical, food‑centric culture.
    He identifies with the regional love of basketball and the strong sense of neighborhood camaraderie found in Jeffersonville, often volunteering at the county fair and local food banks. His cultural
    outlook blends a respect for tradition with a willingness to explore new culinary ideas, reflecting both his practical roots and his curious nature.
attributes:
  skills: '[''Meat cutting and custom portioning'', ''Fish filleting and processing'', ''Animal anatomy knowledge'', ''Commercial band‑saw and grinder operation'', ''Food safety and USDA compliance'', ''Charcuterie
    and curing techniques'', ''Inventory management'', ''Customer service and product recommendation'', ''Equipment maintenance and basic repair'']'
  hobbies: '[''Adult softball league'', ''Community barbecues'', ''Live music and karaoke nights'', ''Grilling and smoking experiments'', ''Knife collecting and sharpening'', ''Fishing on the Ohio River'',
    ''Hunting trips'', ''DIY home improvement'', ''High‑intensity interval training (HIIT) at the gym'']'
  career_goals: Merrill aims to become the leading meat specialist in the Jeffersonville area by earning an advanced Food Safety Manager certification and completing a short‑term culinary arts program focused
    on charcuterie. He dreams of opening a small, community‑oriented butcher shop that offers handcrafted sausages, smoked meats, and premium cuts sourced from local farms. While his laid‑back nature makes
    rigid career plans challenging, he is driven by competition and wants his shop to be recognized as the top quality meat provider in Clark County. He also hopes to mentor new labors, sharing his practical
    expertise and fostering a collaborative yet high‑performing shop culture.
