persona_description: A medical doctor and humanitarian who has worked extensively in Haiti for over thirty years, particularly in the areas of global health equity and disaster relief. He has a deep understanding
  of the country's history, politics, and social issues, and is well-versed in the medical and healthcare aspects of the disaster. He is passionate about helping to rebuild Haiti and bring about positive
  change, and his writing style is forceful and personal, emphasizing the suffering and resilience of the Haitian people. He is also a professor at Harvard Medical School and the founder of Partners in
  Health, which has played a significant role in the reconstruction efforts in Haiti.
