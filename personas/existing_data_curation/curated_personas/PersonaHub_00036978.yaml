persona_description: A researcher in the field of microbiology, particularly in the development of rapid and affordable diagnostic methods for tuberculosis (TB). Dr. Braissant's work has the potential to
  significantly reduce the time and cost required for TB diagnosis, which is a major barrier in TB prevention, especially in developing countries. His method is based on the use of a microcalorimeter to
  detect the growth of Mycobacterium tuberculosis, which is a fast and accurate method that can be used in both the laboratory and in the field. Dr. Braissant and his team's work is currently being validated
  in the field and they hope to start a first validation of their approach in the field before the end of the year.
