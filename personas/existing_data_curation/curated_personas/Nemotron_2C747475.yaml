  career_goals: Although only three years old, Rosa’s emerging interests hint at future aspirations. She often watches her parents cook Argentine dishes and imagines helping in the kitchen, suggesting a
    budding ambition to become a chef who shares her cultural cuisine. Her love for storybooks and her bilingual ability point toward a future goal of being a bilingual teacher or storyteller, preserving
    Argentine traditions while bridging cultures. Rosa also enjoys dancing to tango music, indicating a long‑term dream of performing or teaching traditional Argentine dance.
