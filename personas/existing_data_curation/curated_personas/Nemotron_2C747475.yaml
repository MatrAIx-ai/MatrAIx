personas:
  professional: Rosa Cepero, a three‑year‑old aspiring builder, channels their curiosity and practicality into constructing intricate block forts, showcasing early organization, disciplined focus on achievement,
    and patient negotiation of play roles with peers.
  sports: Rosa Cepero, a three‑year‑old member of the Tiny Tigers T‑ball league who idolizes the New York Yankees, eagerly participates in weekly soccer sessions with the Little Kicks Club and balances
    structured practice with spontaneous backyard sprints, showing disciplined enthusiasm for seasonal sports and team loyalty.
  arts: Rosa Cepero, a three‑year‑old who delights in drawing vivid crayon dinosaurs and singing along to Sesame Street’s Elmo and the Rocky soundtrack, regularly attends community story‑time performances
    and integrates artistic expression as a core part of daily play.
  travel: Rosa Cepero, a three‑year‑old who enjoys family road trips to the sunny beaches of Santa Monica and the excitement of a short flight to Tokyo Disneyland, prefers structured itineraries with snack
    breaks yet delights in spontaneous sandcastle building, navigating travel within the comforting constraints of parental supervision.
  culinary: Rosa Cepero, a three‑year‑old who loves mac and cheese with cheddar, refuses peas, enjoys dipping carrot sticks in ranch, and often helps stir batter for banana pancakes, displaying a selective
    palate yet growing curiosity in the kitchen.
  core: Rosa Cepero, a meticulously curious three‑year‑old who balances disciplined block building with occasional bedtime tantrums, sees the world as a puzzle where rules and imagination must coexist.
background:
  cultural: Rosa is raised in a bilingual Argentine household in Miami, where Spanish is spoken at home and English is used in the community. Her family celebrates Argentine traditions such as Día de la
    Tradición, enjoys foods like empanadas, dulce de leche, and asado, and frequently listens to tango and folk music. The multicultural environment of Miami exposes her to diverse Latin American festivals,
    reinforcing her pride in her Argentine roots while fostering an appreciation for the broader Hispanic diaspora. This cultural blend influences her language development, culinary curiosity, and artistic
    interests.
