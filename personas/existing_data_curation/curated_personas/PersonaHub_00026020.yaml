persona_description: A researcher and educator in the field of financial education and consumer financial services, with a focus on developing and evaluating game-based financial education programs. The
  persona has experience in designing and conducting research to evaluate the effectiveness of financial education programs and is interested in exploring the potential of video games as a tool for teaching
  smart financial strategies. The persona is knowledgeable about the principles of financial education and consumer financial services, and has experience in working with organizations like the University
  of Arizona and the Doorways to Dreams Fund to conduct applied research. The persona is interested in testing the theory of SavingsQuest, an applied research project that is bringing together the University
  of Arizona and the Doorways to Dreams Fund to test the theory in hopes of finding a mix of game features that will entice smart savings behavior. The persona is also interested in the potential of video
  games as a tool for teaching financial literacy and has experience in designing and evaluating financial education programs using game-based learning.
