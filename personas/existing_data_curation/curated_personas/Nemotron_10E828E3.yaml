  hobbies: '[''Heirloom vegetable gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Local history research'', ''Knitting'', ''Cooking Southern cuisine'', ''Small book club participation'',
    ''Genealogy'', ''Church choir involvement'', ''Volunteering at county fair'']'
  career_goals: Although retired from formal employment, Patricia aims to deepen her community involvement. She plans to lead a flexible neighborhood garden project, mentor younger volunteers at the local
    senior center, and compile oral histories of Milton’s longtime residents for the county historical society. She also hopes to master digital photography to document local wildlife and eventually publish
    a small memoir of her life in rural Kentucky. Maintaining her health and independence remains a personal priority.
