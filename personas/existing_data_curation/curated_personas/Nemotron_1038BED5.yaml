  hobbies: '[''Bridge'', ''Chess'', ''Walking Club'', ''Community Gardening'', ''Historical Society Volunteering'', ''Woodworking'', ''Digital Literacy Tutoring'', ''Attending Lectures'', ''Reading Classic
