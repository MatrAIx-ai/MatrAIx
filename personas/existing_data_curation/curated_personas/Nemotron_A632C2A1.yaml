personas:
  professional: Jonathan Navab, a 14‑year‑old competitive gamer and budding technologist, channels his strategic mindset from Fortnite and Valorant into creating custom Raspberry Pi mods and model‑rocket
    designs, balancing curiosity with practical execution while dreaming of a future in esports engineering.
  sports: Jonathan Navab plays point guard for his middle school basketball team, follows the St. Louis Cardinals and Chicago Bulls, and spends weekends fishing on the Mississippi River, where he balances
    competitive dribbling drills with patient casting practice.
  arts: Jonathan Navab captures the quiet beauty of local wetlands and historic river towns with his DSLR, drawing inspiration from Ansel Adams and Steve McCurry, while devouring sci‑fi novels by Isaac
    Asimov and Neil Gaiman, which fuels his creative eye and storytelling flair.
  travel: Jonathan Navab prefers short, purposeful road trips with his dad to fishing spots along the Mississippi, but dreams of visiting the Pacific Northwest’s rainforests and the historic streets of
    New Orleans, planning routes with Google Maps and saving for train tickets on school holidays.
  culinary: Jonathan Navab enjoys quick meals like pepperoni pizza, nachos with jalapeños, and occasional Cajun jambalaya after a day of gaming, while attempting simple kitchen experiments such as microwave
    mug cakes and grilled cheese sandwiches, often forgetting to clean up the crumbs.
  core: Jonathan Navab is a competitive teen gamer who balances strategic brilliance with an impulsive love for gadgets, late‑night snacks, and fishing trips, all while juggling a skeptical edge and a habit
    of staying up too late.
background:
  cultural: Jonathan was raised in a white, Southern family in Vicksburg, Mississippi, where community life revolves around church, school sports, and local traditions. He grew up hearing stories about
    the historic Vicksburg siege, listening to country and blues music, and sharing meals of catfish, hush puppies, and sweet tea at family gatherings. The community values self‑reliance, modesty, and respect
    for heritage, while supporting youth activities such as school clubs, basketball leagues, and regional festivals.
attributes:
  skills: '[''Python (introductory)'', ''Scratch visual programming'', ''Video editing (Shotcut)'', ''Basic automotive maintenance'', ''Team leadership in school projects'']'
  hobbies: '[''Competitive video gaming (Fortnite, Valorant)'', ''Basketball'', ''Fishing on the Mississippi River'', ''Model rocketry'', ''Reading science‑fiction'', ''Raspberry Pi tinkering'', ''Nature
    photography'']'
  career_goals: Jonathan aspires to become a software engineer who builds practical, user‑focused applications. He hopes to join his high school robotics team, compete in coding contests, and earn a scholarship
    to a university with a strong engineering program. He also admires the technical training offered by the U.S. Navy and keeps the option open to enlist after high school to gain hands‑on experience in
    electronics and mechanics.
