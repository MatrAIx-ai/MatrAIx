personas:
  professional: Constance Ramia, a veteran secondary‑school teacher, channels her vivid imagination and structured flexibility into designing interdisciplinary curricula that weave literature, visual arts,
    and digital media, while they mentor peers and champion creative pedagogy at district meetings.
  sports: Constance Ramia stays active with weekend hikes as a member of the Hudson Valley Hiking Club, follows the New York Knicks during the basketball season, cheers for the New York Yankees in the summer,
    and they occasionally join a community yoga class to balance their love of solitude with gentle movement.
  arts: Constance Ramia expresses her artistry through watercolor landscapes of the Hudson, finds inspiration in the dreamlike films of David Lynch, the lyrical folk of Joni Mitchell and Sufjan Stevens,
    the painting techniques of Claude Monet and Georgia O'Keeffe, and they curate small‑scale exhibits that showcase emerging local talent alongside classics.
  travel: Constance Ramia prefers meticulously planned weekend retreats to the Hudson Valley’s quiet farms and historic towns, yet dreams of a literary pilgrimage to Dublin’s pubs, a solo trek across Iceland’s
    volcanic terrain, and a cultural immersion in the Scottish Highlands, and they balance limited vacation time with a desire for both reflective solitude and adventurous discovery.
  culinary: Constance Ramia enjoys crafting seasonal meals—such as a roasted beet and goat cheese salad drizzled with walnut‑infused olive oil, a creamy wild mushroom risotto finished with thyme, and a
    tangy sourdough loaf they knead on Sunday mornings—while they savor occasional indulgences like fresh figs and artisanal dark chocolate at local farm‑to‑table bistros.
  core: Constance Ramia navigates life with a ribbon of imagination tied to disciplined routines, often losing track of time mid‑painting, hoarding watercolor sketchbooks, and compulsively annotating classroom
    plans in the margins of every notebook, and they find solace in the quiet hum of their piano keys.
background:
  cultural: Constance grew up in a middle‑class white family in the suburban region of New York State, where a strong emphasis on education and community involvement was a core value. Living in Nyack, a
    town known for its artistic vibrancy and cultural diversity, she has absorbed progressive, inclusive attitudes while retaining the traditions of her Anglo‑American heritage. This blend of a stable,
    education‑focused upbringing with exposure to a multicultural, creative community informs both her teaching philosophy and her personal artistic interests.
attributes:
  skills: '["Curriculum design", "Project-based learning", "Instructional technology integration", "Creative writing instruction", "Interdisciplinary arts integration", "Classroom management", "Assessment
    design", "Professional development facilitation", "Digital media production", "Mentoring"]'
  hobbies: '["Watercolor painting", "Poetry and short-story writing", "Reading speculative and literary fiction", "Attending independent film screenings", "Exploring Hudson River Valley hiking trails",
    "Playing piano for personal relaxation", "Participating in small-group book clubs", "Volunteering at local literacy outreach programs", "Curating community art exhibits", "Gardening with native plants"]'
  career_goals: Constance aims to become a district curriculum coordinator specializing in arts integration, where she can scale her interdisciplinary projects across multiple schools. She plans to develop
    a district‑wide program that embeds creativity and abstract thinking into core subjects, present her work at national education conferences, and publish a guide on fostering imagination in secondary
    classrooms. Additionally, she is considering pursuing an Ed.D. focused on creative pedagogy while continuing to exhibit her own artwork in local galleries and mentor aspiring teachers.
