personas:
  professional: A budding robotics engineer, Gary Navarrete channels their curiosity and disciplined mindset into building LEGO robotics kits, programming them with precision, and applying strategic thinking
    from chess to solve complex problems.
  sports: A disciplined young athlete, Gary Navarrete participates in their school’s cross‑country club, follows the Seattle Seahawks, Seattle Mariners, and Seattle Sounders FC for inspiration, and spends
    weekend hikes in the Cascade foothills while occasionally trying snowboarding in winter.
  arts: A creatively inclined teen, Gary Navarrete devotes spare time to sketching fan art of Star Wars, listening to Imagine Dragons, and binge‑watching Studio Ghibli movies, while also collecting graphic
    novels by Neil Gaiman, which shape their imaginative storytelling.
  travel: A methodical young explorer, Gary Navarrete plans trips with a checklist, has already hiked Olympic National Park and toured Seattle’s Pike Place Market, and dreams of photographing Iceland’s
    waterfalls and Japan’s Kyoto temples, balancing family budget constraints with a thirst for adventure.
  culinary: A budding chef, Gary Navarrete enjoys assembling simple dishes like pepperoni pizza, spaghetti carbonara, and sushi rolls, experiments with ingredients such as fresh basil, soy sauce, and parmesan,
    and often practices cooking under the watchful eye of a parent, though they sometimes forget to preheat the oven.
  core: A disciplined and curious 11‑year‑old, Gary Navarrete blends meticulous robotics building, competitive chess, careful budgeting, and nature photography into a quiet but confident outlook, marked
    by healthy skepticism and high standards.
background:
  cultural: Gary grows up in East Wenatchee, Washington, a modest, primarily White community with deep agricultural roots. His family’s background includes generations of orchard and farming work, fostering
    an appreciation for self‑reliance, outdoor recreation, and community values. The regional emphasis on education, technology, and the natural environment shapes his practical curiosity and disciplined
    outlook.
