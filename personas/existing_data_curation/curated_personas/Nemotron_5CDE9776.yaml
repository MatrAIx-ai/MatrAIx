personas:
  professional: Javier Cruzmartinez, a tech‑savvy high‑school senior, blends programming curiosity with a community‑first mindset, creating simple Python scripts and web pages while volunteering as a peer
    tutor and organizing bilingual cultural events, all driven by a practical desire to build educational apps for fellow bilingual learners.
  sports: Javier Cruzmartinez, an avid supporter of the Miami Heat and Inter Miami CF, follows NBA and MLS seasons closely, participates in a neighborhood soccer pickup game on weekends, and enjoys casual
    basketball hoops at the local park, though they prefer organized viewing over intense personal competition.
  arts: Javier Cruzmartinez, a quiet sketcher of urban skylines, finds inspiration in the rhythmic beats of reggaetón, bachata, and classic folk melodies, while admiring artists such as Bad Bunny, Romeo
    Santos, and local muralists, weaving these influences into occasional doodles and digital art projects.
  travel: Javier Cruzmartinez, a budget‑conscious explorer, frequently visits Miami’s Little Haiti and Wynwood for street art tours, dreams of a future trip to San José to study regional cuisine, and plans
    a spring weekend getaway to the Florida Keys, balancing family obligations with a desire for new cultural experiences.
  culinary: Javier Cruzmartinez, a capable home cook, masters the preparation of traditional dishes like vigorón, nacatamales, and gallo pinto, experiments with seasoning plantain tostones, and occasionally
    tries to recreate a perfect pizza dough, all while sharing meals that reinforce family bonds.
  core: Javier Cruzmartinez, a reserved yet curious teen, juggles coding projects, solitary gaming marathons, and family‑centered cooking, all while battling occasional worry and striving to turn bilingual
    tech ideas into real‑world solutions.
background:
  cultural: Javier was born in Hialeah to parents who emigrated from Nicaragua in the early 2000s. His household is primarily Spanish‑speaking, and he celebrates Nicaraguan holidays such as Día de la Independencia
    and traditional Catholic feasts. Family gatherings often feature dishes like vigorón, nacatamales, and gallo pinto, reinforcing his connection to his roots. Growing up amidst the vibrant Hispanic mosaic
    of Miami‑Dade County, he has absorbed elements of both Central American culture and the multicultural rhythms of South Florida. This blend shapes his identity, giving him a strong sense of community,
    respect for family, and a bilingual perspective that informs his daily interactions.
