  career_goals: Javier plans to complete his GED within the next year and earn a scholarship to a community college where he can study computer science. He aims to become a software developer who designs
    educational apps tailored for bilingual learners, merging his curiosity for new technology with his practical desire to help his community. In the longer term he hopes to open a modest family‑run restaurant
    that celebrates Nicaraguan cuisine, providing stable income for his parents while preserving his cultural heritage. Throughout his career path, he seeks positions that offer a supportive team environment,
    clear responsibilities, and the opportunity to grow his technical expertise while maintaining a work‑life balance that helps manage his stress.
