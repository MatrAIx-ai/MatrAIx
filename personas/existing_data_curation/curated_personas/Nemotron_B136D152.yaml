  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Reading Non-fiction'', ''Hiking'', ''Mindfulness Walking'', ''Jazz Listening Sessions'', ''Book Club (Black Authors)'', ''Financial Literacy
    Volunteering'', ''Cooking Fusion Cuisine'', ''Food Photography'']'
  career_goals: Driven by her calm resilience and a desire to blend her financial expertise with her love of the arts, Doris plans to earn her CPA license within the next two years. She aims to progress
    to a senior auditor role, then to audit manager, where she can mentor junior staff and lead complex engagements. Long‑term, she envisions launching a boutique accounting practice that specializes in
    serving small creative enterprises—galleries, artists, and cultural nonprofits—particularly those owned by under‑represented communities in Southern California. She also hopes to become a certified
    internal auditor to broaden her strategic advisory capabilities and eventually take on a finance director role that balances analytical rigor with community impact.
