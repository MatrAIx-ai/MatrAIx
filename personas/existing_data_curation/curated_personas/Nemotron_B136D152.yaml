personas:
  professional: Doris Roberson, a 34‑year‑old accountant and auditor in Riverside County, leverages advanced Excel modeling, SAP FI/CO expertise, and meticulous attention to detail to craft data‑visualization
    dashboards that streamline audit processes while quietly infusing their love of contemporary art into client presentations and mentorship, and they are known for a calm resilience and curiosity that
    drives innovative solutions.
  sports: Doris Roberson hikes solo in the Cleveland National Forest, attends a weekly yoga class to maintain flexibility, they cheer on the Los Angeles Lakers and the Los Angeles Rams from their living
    room, and they run the Riverside 5K charity race each spring while being a member of the local Riverside Hiking Club.
  arts: Doris Roberson spends evenings at the Riverside Art Museum, sketching watercolor studies inspired by Julie Mehretu and Shepard Fairey, they curate pop‑up showcases for emerging Menifee artists,
    and they host intimate jazz listening sessions featuring Miles Davis and John Coltrane for close friends.
  travel: Doris Roberson favors mindful solo travel, having trekked the cliffs of Big Sur, explored Barcelona’s Gothic Quarter, and are planning a pilgrimage to Kyoto’s historic tea houses, they always
    book budget‑friendly hostels yet splurge on local art workshops and cultural immersion experiences.
  culinary: Doris Roberson experiments with Korean‑Mexican fusion tacos topped with gochujang‑marinated pork, kimchi slaw, and fresh cilantro, delights in photographing avocado‑miso toast on a rustic wooden
    board, and balances their palate with seasonal ingredients like heirloom tomatoes, miso, and saffron, while they occasionally over‑salt dishes in their zeal for bold flavor.
  core: Doris Roberson is a calm, curiosity‑driven accountant who merges precise financial rigor with a thriving artistic soul, often found sketching in galleries while they quietly budget for the future
    boutique practice.
background:
  cultural: Doris identifies as African‑American and was raised in a close‑knit Black community in the Inland Empire. Family gatherings, church participation, and community celebrations such as Juneteenth
    have instilled a strong sense of heritage and collective responsibility. She draws inspiration from the legacy of civil‑rights activism and the vibrant Black arts movement in Southern California, often
    supporting local Black artists and entrepreneurs. Her cultural roots influence her professional ethos—valuing integrity, perseverance, and community uplift—while informing her personal interests in
    Black literature, music, and cultural history.
