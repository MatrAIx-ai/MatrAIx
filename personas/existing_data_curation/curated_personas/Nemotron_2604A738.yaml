personas:
  professional: Andrew Shehadeh, a diligent food science undergraduate, leverages their farm-rooted work ethic and precise laboratory expertise in microbial enumeration, chromatography, and GIS mapping
    to design sustainable preservation methods, while their habit of over-organizing data sometimes slows fieldwork.
  sports: Andrew Shehadeh, a dedicated member of the Stillwater Trail Runners club, enjoys early-morning prairie hikes, participates in intramural soccer, and passionately supports the Oklahoma Sooners
    football team and the Oklahoma City Thunder, blending local pride with college spirit.
  arts: Andrew Shehadeh, an acoustic guitar hobbyist, spends evenings playing folk and blues classics by Bob Dylan, Gillian Welch, and Muddy Waters, while attending local folk festivals to capture candid
    photographs of performers, merging their love for music and visual storytelling.
  travel: Andrew Shehadeh prefers low-cost, purpose-driven trips, having backpacked through the Great Plains to photograph wildflowers in Badlands National Park, and dreams of visiting the Netherlands to
    study sustainable dairy farms and a research exchange in Kenya, all while budgeting carefully.
  culinary: Andrew Shehadeh, an experimental home cook, transforms classic chicken fried steak into a quinoa-crusted, low-fat version using heirloom tomatoes and locally sourced kale, confidently masters
    sous-vide techniques yet occasionally over-salts sauces, reflecting their blend of scientific precision and culinary curiosity.
  core: Andrew Shehadeh is a methodical, farm-inspired food scientist who balances meticulous lab work with solo hikes, vintage guitar riffs, and a penchant for over-planning every detail.
background:
  cultural: Andrew grew up in a mid‑western, white family with deep ties to agriculture in Oklahoma. His grandparents were dairy and wheat farmers, and family gatherings often centered around farm work
    and community fairs. The cultural values of hard work, self‑reliance, and neighborly cooperation were reinforced by his involvement in the local 4‑H club and church youth group. While he respects traditional
    Midwestern customs, he also embraces progressive ideas about sustainable agriculture and food equity. His upbringing in Stillwater, a college town, exposed him to a blend of rural and academic influences,
    shaping a balanced worldview that values both practicality and social responsibility.
attributes:
  skills: '[''Microbial enumeration'', ''Chromatography'', ''Nutrient analysis'', ''Soil and plant sampling'', ''Data analysis with Excel and R'', ''Statistical testing'', ''Predictive modeling'', ''GIS
