  hobbies: '[''Hiking prairie trails'', ''Nature photography'', ''Experimental cooking'', ''Acoustic guitar'', ''Woodworking'', ''Volunteering at local food bank'', ''Reading scientific journals'', ''Historical
    novels'', ''Puzzle games'']'
  career_goals: Andrew aims to finish his bachelor's degree in Food Science within the next two years, securing a research internship with the Oklahoma State University Extension Service. He plans to pursue
    a master's and eventually a PhD focused on sustainable food production and food safety for underserved rural populations. His ambition is to develop affordable preservation techniques and resilient
    crop management strategies that can be adopted by small family farms in Oklahoma. In the longer term, he hopes to lead a research team or serve as a senior scientist at a state agricultural agency,
    translating scientific findings into community outreach programs and policy recommendations.
