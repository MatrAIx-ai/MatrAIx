  hobbies: '[''Art gallery visits'', ''Industrial photography'', ''DIY electronics and drone building'', ''Indie video gaming'', ''Science-fiction novels'', ''Hiking and kayaking'', ''Music festivals'',
    ''Experimental cooking'', ''Creative writing'', ''Improvisational comedy'']'
  career_goals: Kirkpatrick aspires to become a senior lead engineer driving innovative product development in emerging fields such as sustainable robotics or smart materials. He aims to file at least two
    patents within the next five years and eventually launch his own tech startup that merges engineering precision with artistic design. While valuing flexibility, he seeks a role that offers autonomy
    to experiment and collaborate across disciplines, and he is motivated to mentor junior engineers, positioning himself as a respected thought leader in his industry.
