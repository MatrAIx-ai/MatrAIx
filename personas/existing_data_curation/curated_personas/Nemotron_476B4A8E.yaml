personas:
  professional: Andres Guevara, a meticulous curator and bilingual art historian in his seventies, they leverage decades of archival expertise, research acumen, and compassionate mentorship to design intimate
    museum tours that spotlight Latin American and Caribbean artists while orchestrating community exhibitions that preserve island heritage, all the while managing an undercurrent of worry about meeting
    every deadline.
  sports: Andres Guevara, a lifelong supporter of the Pittsburgh Steelers and Pirates, they join a senior walking group at Schenley Park, enjoy occasional pickleball matches at the local community center,
    and follow Atlético Nacional's soccer season on television, preferring small, familiar gatherings over large stadium crowds.
  arts: Andres Guevara, an avid watercolorist and poetry lover, they spend afternoons sketching childhood scenes while listening to Bill Evans, John Coltrane, and the classic salsa of Celia Cruz, and frequently
    attend intimate readings featuring verses by Pablo Neruda and contemporary island poets, letting music and verse guide their brushstrokes.
  travel: Andres Guevara, an introspective traveler, they have revisited the historic streets of Old San Juan to capture its pastel architecture, dream of exploring the colonial art museums of Quito, and
    favor carefully planned day trips to nearby state parks for bird‑watching, always packing their trusty canvas bag and a crossword puzzle.
  culinary: Andres Guevara, a devoted herb gardener, they delight in preparing classic island dishes such as arroz con gandules, pernil, and mofongo, seasoning them with fresh cilantro, oregano, and a pinch
    of adobo, though they often over‑season and have the quirky habit of tasting sauces straight from the spoon.
  core: Andres Guevara, a quietly curious septuagenarian, they weave their love of art, heritage, and herb‑infused cooking into a life of meticulous community service, while their perfectionist streak and
    health‑related worries occasionally slow their otherwise steady rhythm.
background:
  cultural: Andres was raised in a bilingual Puerto Rican household that immigrated to the United States when he was a child. His upbringing blended Caribbean rhythms such as plena and bomba with the flavors
    of arroz con gandules, and was guided by cultural values of family cohesion (familismo) and respect for elders (respeto). Catholic traditions, including celebrations of Semana Santa and Nochebuena,
    shaped his early experiences, while storytelling and oral history from his family preserved island heritage. In Pittsburgh, he remains closely connected to the Puerto Rican diaspora through regular
    communication with relatives, participation in local Hispanic community events, and integrating Caribbean aesthetics into his artistic and volunteer pursuits.
attributes:
  skills: '["Art history (Latin American & Caribbean)", "Research and archival documentation", "Bilingual Spanish-English communication", "Curatorial planning and exhibition design", "Community outreach
    and volunteer coordination", "Intergenerational mentorship", "Written analysis and critical essays", "Conflict mediation and facilitation", "Organizational and project management", "Cultural translation
    and storytelling"]'
  hobbies: '["Watercolor painting", "Sketching", "Listening to jazz and salsa music", "Reading historical novels and poetry", "Herb gardening", "Cooking traditional Puerto Rican cuisine", "Bird-watching
    during park walks", "Solving crossword puzzles", "Attending small poetry readings", "Participating in community cultural festivals"]'
  career_goals: Andres aims to deepen his understanding of contemporary art while volunteering as a docent at the Carnegie Museum of Art, leading intimate tours that highlight Latino artists. He aspires
    to mentor young artists within Pittsburgh's Puerto Rican community, documenting and sharing his family's migration story through a memoir. Additionally, he seeks to contribute to preserving Puerto Rican
    heritage locally by creating oral‑history projects and curating community exhibitions that celebrate the island's artistic legacy.
