persona_description: A medical oncologist who specializes in the treatment of carcinoid tumors, particularly those with the Carcinoid Syndrome. They have expertise in the use of various chemotherapy drugs,
  somatostatin analogues, and newer drug combinations. They are familiar with the Patient Assistance Now Program provided by Novartis Pharmaceuticals Corporation and have experience with the use of interferon
  and radiotherapy in treating carcinoid tumors. They are also knowledgeable about the latest research in the field, including the use of Yttrium 90 in treating liver metastases.
