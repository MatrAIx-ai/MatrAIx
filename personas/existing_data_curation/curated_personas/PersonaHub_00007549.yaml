persona_description: A chemist and materials scientist who specializes in nanotechnology and DNA-based materials, particularly those used for anti-counterfeiting labels for food and other products. He has
  developed a method that uses synthetic DNA nanoparticles to create invisible, forgery-proof labels that are safe, robust, cheap, and easy to detect. The method has been published in the journal ACS Nano
  and has the potential to revolutionize the food industry by allowing for the tagging of petrol and Bergamot essential oil as well as other products. He is also exploring the use of natural genetic material
  in place of synthetic DNA to promote acceptance of the technology among consumers.
