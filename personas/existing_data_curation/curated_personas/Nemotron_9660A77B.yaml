personas:
  professional: Linda Wolf, a 21‑year‑old paramedic trainee, marries rapid patient assessment, advanced cardiac life support, and equipment troubleshooting with a talent for watercolor procedural illustrations
    that turn chaotic emergency scenes into clear visual narratives, while their imaginative curiosity and calm under pressure make them a natural leader of small response teams.
  sports: Linda Wolf fuels fitness through weekend hikes on the Raven Rock Trail with the Harnett Trails Society, follows the Carolina Panthers and Charlotte Hornets for a dose of gridiron and hardwood
    excitement, and caps the week with a pick‑up basketball game at the local community center, balancing cardio and strength while keeping a relaxed, low‑pressure approach to competition.
  arts: Linda Wolf channels their speculative‑fiction love into detailed watercolor anatomical sketches inspired by Albrecht Dürer and modern illustrator James Gurney, curates a modest collection of vintage
    medical instruments as artistic curiosities, enjoys the ambient soundtracks of The Cinematic Orchestra while reading N.K. Jemisin, and regularly shares their creations at the town library's monthly
    art showcase.
  travel: Linda Wolf prefers meticulously planned nature escapes, having trekked the Blue Ridge Parkway and photographed the misty peaks of the Great Smoky Mountains, while dreaming of an Icelandic aurora‑chasing
    adventure and occasionally slipping into spontaneous weekend road trips to Asheville for indie sci‑fi conventions, all while balancing a modest travel budget with occasional gear splurges.
  culinary: Linda Wolf is a competent home cook who whips up quinoa‑roasted‑vegetable bowls drizzled with lemon‑tahini, loves the aromatic punch of fresh basil in homemade pesto pasta, experiments with
    falafel and hummus for protein‑rich meals, and treats themselves to craft coffee and occasional craft beer after long EMS shifts.
  core: Linda Wolf blends high‑octane emergency care with a quiet, imaginative artistry, turning life‑saving protocols into vivid visuals while juggling disciplined training, vintage medical quirks, and
    a love for speculative worlds.
background:
  cultural: Linda was raised in a small‑town Southern environment in Lillington, North Carolina, where community ties, self‑reliance, and a sense of place are deeply valued. Her upbringing emphasized hospitality,
    family gatherings, and an appreciation for the natural surroundings of the region. Attending a state university broadened her worldview, exposing her to diverse perspectives and fueling her passion
    for STEM and the arts. This blend of traditional Southern values—such as responsibility to community and respect for local traditions—and a progressive, curiosity‑driven mindset shapes how she approaches
    both her work as a paramedic and her personal creative endeavors.
attributes:
  skills: '["Patient assessment and triage", "Advanced Cardiac Life Support (ACLS)", "Pediatric Advanced Life Support (PALS)", "IV therapy and medication administration", "Trauma care and immobilization",
    "Airway management and ventilation", "Emergency scene leadership", "Health informatics and data entry", "Medical equipment troubleshooting", "Crisis communication and de‑escalation", "Community health
    education", "Creative medical illustration and documentation"]'
  hobbies: '["Sketching anatomical and procedural illustrations", "Watercolor painting", "Reading speculative fiction and science‑fiction novels", "Hiking and nature photography", "DIY electronics and Python
    health‑data scripts", "Small‑group book club participation", "Yoga and mindfulness meditation", "Collecting vintage medical instruments"]'
  career_goals: Linda aspires to expand her EMS career beyond ground transport. Her short‑term goal is to obtain Critical Care Paramedic certification and join a regional air‑medical service as a flight
    paramedic, gaining experience with high‑acuity patient care in austere environments. Long‑term, she plans to earn a master's degree in Emergency Management or Public Health, positioning herself for
    an EMS director role in Harnett County. She also hopes to merge her artistic inclination with her profession by developing visual storytelling workshops that teach emergency preparedness to the community
    and fellow responders, and to contribute to research on integrating emerging technologies—such as drone‑delivered medical kits—into rural emergency response.
