persona_description: A climate scientist who specializes in the study of atmospheric circulation patterns and their impacts on global climate. He/she is particularly interested in the effects of climate
  change on the circulation of the atmosphere and its potential to lead to changes in weather patterns, such as increased turbulence. The person is likely to be involved in research and analysis of climate
  data, and is likely to be familiar with supercomputer simulations and climate models. They may also be involved in developing improved turbulence forecasts to reduce the risk of injuries to passengers
  and lower the cost of turbulence to airlines.
