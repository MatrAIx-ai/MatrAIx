  hobbies: '[''gardening'', ''fishing'', ''woodworking'', ''home improvement projects'', ''watching Indiana Hoosiers basketball'', ''listening to classic rock'', ''reading historical non-fiction'', ''volunteering
    at church'']'
  career_goals: He aims to advance within the retail sector by securing a shift-supervisor role within the next two years, followed by progression to store manager. To support these ambitions, Robert plans
    to complete a management certification program at a local community college and develop leadership skills through mentorship. Ultimately, he envisions owning a small convenience store in his hometown,
    leveraging his operational expertise and community ties while maintaining a stable work-life balance.
