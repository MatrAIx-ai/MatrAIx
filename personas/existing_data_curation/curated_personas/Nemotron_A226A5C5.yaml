  hobbies: '[''Gardening'', ''Home Cooking (Puerto Rican cuisine)'', ''Fishing'', ''Hiking'', ''Listening to Salsa and Jazz'', ''Attending Cultural Festivals'', ''Chess Club'', ''Reading Historical Biographies'',
    ''Volunteering for Hispanic Outreach'']'
  career_goals: Juan aims to leverage his decades of operational experience to drive large‑scale efficiency initiatives and mentor emerging operations professionals. Within the next five years he hopes
    to transition into a senior director or part‑time consulting role where he can design sustainable, technology‑enabled processes that boost profitability while reducing waste. He also wants to establish
    a consulting practice serving small Michigan businesses, allowing a balanced work‑life rhythm as he approaches retirement, and to champion diversity and inclusion programs that highlight his Puerto
    Rican heritage within corporate culture.
