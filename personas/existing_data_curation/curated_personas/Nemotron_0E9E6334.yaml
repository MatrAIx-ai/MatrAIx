    response and CPR certification'', ''Shift supervision and mentoring of new staff'']'
  hobbies: '[''Group hiking and nature walks'', ''Community theater improv'', ''Hosting dinner parties and potlucks'', ''Yoga and mindfulness meditation'', ''Herb gardening and cooking'', ''Volunteering
    at the animal shelter'', ''Book club and mystery novels'', ''Swing dancing'', ''Watercolor painting'']'
  career_goals: Zan aims to transition into a nurse educator role where she can blend her practical expertise with her love of teaching, eventually earning her RN license and a BSN. She aspires to develop
    a community health outreach program in Marin County focused on stress reduction and mental wellness for seniors, leveraging her own experiences with anxiety to inform program design. Additionally, she
    plans to obtain a gerontology certification and lead quality improvement projects that integrate data-driven protocols with flexible, patient-centered care models.
