personas:
  professional: Zan Simone, a 54‑year‑old Licensed Practical Nurse in Marin County, blends meticulous clinical assessment and data‑driven quality improvement with a calm, collaborative leadership style,
    channeling their love of teaching into shift supervision and mentoring while dreaming of a future as a nurse educator.
  sports: Zan Simone enjoys weekly group hikes along Marin’s coastal trails, follows the San Francisco Giants for spring training, participates in a local adult recreational softball league, and prefers
    low‑impact yoga over high‑intensity cardio, balancing an active lifestyle with a need for flexibility.
  arts: Zan Simone channels their energetic spirit into community theater improv nights, sways to the big‑band swing sounds at the local jazz club, and spends quiet evenings painting watercolors of coastal
    sunsets, often quoting Maya Angelou during discussions.
  travel: Zan Simone plans relaxed, nature‑focused getaways, favoring weekend trips to coastal Maine lighthouses, a yearly wine‑tour pilgrimage to Napa Valley, and a dream itinerary that includes the lavender
    fields of Provence, all while budgeting carefully to keep travel costs within modest savings.
  culinary: Zan Simone favors fresh, garden‑to‑table meals, frequently cooking herb‑infused salmon with lemon‑dill sauce, whipping up a hearty ratatouille on chilly evenings, and enjoys the occasional indulgence
    of artisan cheese boards with a glass of pinot noir, though they sometimes over‑season dishes in a rush.
  core: Zan Simone is a socially vibrant, detail‑oriented nurse who balances a love for community engagement with a lingering anxiety and a penchant for spontaneous garden‑based cooking experiments.
background:
  cultural: Zan grew up in a middle‑class, European‑American family in the Bay Area, absorbing the region's emphasis on education, self‑reliance, and progressive community values. Her upbringing combined
    traditional American holidays and family gatherings with an appreciation for the natural environment that characterizes Marin County. Influenced by the area's vibrant, inclusive culture, she values
    community service, environmental stewardship, and collaborative problem‑solving. Her STEM education at a California state university reinforced a pragmatic, data‑driven outlook, while the liberal, socially
    conscious atmosphere of her hometown shaped her commitment to equity, patient advocacy, and holistic well‑being.
attributes:
  skills: '[''Clinical assessment and monitoring'', ''Medication administration and dosage calculation'', ''Wound care and dressing changes'', ''IV therapy initiation and maintenance'', ''Electronic health
