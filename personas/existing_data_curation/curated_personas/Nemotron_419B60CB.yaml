  career_goals: Stephanie aims to earn the Chartered Financial Analyst (CFA) designation within the next two years and advance to a senior investment analyst role, with the long‑term objective of becoming
    a portfolio manager responsible for a diversified equity fund. She is keen to integrate ESG criteria into investment decisions, leveraging her humanities background to assess cultural and societal impact.
    Over the next decade, she envisions leading a cross‑functional investment team, mentoring junior analysts, shaping the firm’s strategic direction, and launching community outreach initiatives that promote
    financial literacy and responsible investing.
