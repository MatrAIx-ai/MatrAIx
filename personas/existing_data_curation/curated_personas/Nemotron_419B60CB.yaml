personas:
  professional: Stephanie Mcdaniel is a disciplined financial analyst who merges rigorous equity research with a humanities‑inspired storytelling approach, crafting detailed financial models in Excel and
    Python while delivering clear, data‑driven presentations that reflect her competitive drive and organized mindset.
  sports: Stephanie Mcdaniel is an avid member of the Rocky Mountain Explorers hiking club, a regular participant in weekend yoga at Mountain Zen Yoga, and a competitive runner who logs weekly 5K training
    for the Denver Road Runners, while cheering for the Denver Broncos, Colorado Avalanche, and Colorado Rockies.
  arts: Stephanie Mcdaniel volunteers as an event‑planning assistant at the Denver Art Museum, channels her literary passion through a historical‑fiction book club discussing works by Hilary Mantel and
    Ken Follett, and regularly attends concerts featuring the Colorado Symphony, The Lumineers, and local indie painter exhibitions at the RedLine Art District.
  travel: Stephanie Mcdaniel prefers meticulously planned getaways that blend outdoor adventure with cultural immersion, having hiked the Inca Trail to Machu Picchu, explored the frescoed halls of Florence’s
    Uffizi Gallery, and spent weekend retreats in Colorado’s Estes Park and Moab, while budgeting travel through a points‑earned credit card.
  culinary: Stephanie Mcdaniel enjoys preparing Mediterranean fare at a community kitchen, often whipping up Greek moussaka with lamb, oregano‑infused olive oil, and feta, or crafting a vibrant Lebanese
    tabbouleh dressed in lemon and mint, showcasing an intermediate‑to‑advanced cooking skill set and a love for fresh herbs, olives, and citrus.
  core: Stephanie Mcdaniel is a hyper‑organized finance professional who balances data‑driven investment strategies with a love for group hikes, historic novels, and occasional impulsive art‑ticket splurges,
    all while keeping a meticulous habit of color‑coding every calendar entry.
background:
  cultural: Stephanie hails from a white, middle‑class American family with roots in the Midwest, where values of self‑reliance, community involvement, and structured work habits were emphasized. She earned
    a bachelor’s degree in humanities, fostering an appreciation for literature, history, and the arts. After relocating to Littleton, Colorado, she embraced the region’s outdoor lifestyle while staying
    closely connected to Denver’s cultural institutions. Her cultural upbringing informs her pragmatic, organized outlook, her competitive drive in professional settings, and her commitment to both personal
    achievement and active participation in community and artistic endeavors.
