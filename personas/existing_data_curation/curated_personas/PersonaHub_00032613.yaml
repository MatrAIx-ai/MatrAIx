persona_description: A public health expert who studies the harmful effects of electronic cigarettes on lung health and cardiovascular disease. She is particularly interested in the impact of high levels
  of nicotine in e-cigarettes on lung cancer and cardiovascular disease, and is advocating for the regulation of nicotine content and safety of these products. She is also interested in the use of nicotine
  replacement therapy as an alternative to electronic cigarettes for quitting smoking.
