  hobbies: '[''Gardening'',''Baking'',''Knitting'',''Crossword puzzles'',''Sudoku'',''Reading mystery novels'',''Yoga'',''Meditation'',''Volunteering at historical society'',''Organizing neighborhood clean‑up
    events'']'
  career_goals: She aims to advance her qualifications by earning a Certified Nursing Assistant (CNA) credential and subsequently an LPN license, leveraging her organized approach to transition into supervisory
    roles within home health services. Over the next five years, Jessica plans to become a lead care coordinator, establish a small agency that emphasizes structured, high‑quality care, and develop training
    programs that integrate stress‑management techniques for staff. She also aspires to complete a bachelor's degree in nursing to broaden her clinical expertise while maintaining the high standards she
    values.
