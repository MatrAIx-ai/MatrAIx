  career_goals: He dreams of one day becoming an engineer who designs tools and sustainable solutions for farms in the Central Valley, combining his love for science with the practical needs of his community.
    He also imagines working as a veterinarian to help the many animals on local ranches, reflecting his caring nature. In the short term, he aims to keep exploring new scientific topics, improve his coding
    skills, and stay involved in school projects that benefit his neighborhood.
