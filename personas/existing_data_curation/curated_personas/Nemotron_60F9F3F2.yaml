personas:
  professional: Rigoberto Duran is a budding engineer‑in‑training who spends afternoons constructing intricate LEGO models that blend creative curiosity with practical problem‑solving, yet they often leave
    scattered bricks around the living room because a relaxed approach to organization outweighs strict tidiness.
  sports: Rigoberto Duran plays on the Eastside Junior Soccer Club, dashing across the field after school and cheering for the LA Galaxy whenever they watch a match on TV, balancing energetic practice with
    occasional forgetfulness about water breaks, which they quickly correct after a coach’s reminder.
  arts: Rigoberto Duran sketches original comic heroes inspired by the adventures of Rick Riordan’s characters, listens to folk duo Los Sonidos del Valle and pop star Taylor Swift while they craft blocky
    kingdoms in Minecraft, and they eagerly flip through graphic novels on rainy afternoons.
  travel: Rigoberto Duran loves family road trips to the Grand Canyon and the interactive exhibits at Disneyland, and they day‑dream about a future adventure to Kyoto’s bamboo forests and Barcelona’s whimsical
    architecture, preferring hands‑on exploration over strict itineraries.
  culinary: Rigoberto Duran enjoys helping their mother in the kitchen, deftly rolling corn dough for tamales and flipping cheesy quesadillas, and they love the aroma of fresh cilantro, roasted chilies,
    and melted cheese that fills the house, though they sometimes sneak extra tortilla chips when no one is looking.
  core: Rigoberto Duran is a curious, easy‑going nine‑year‑old who alternates between building LEGO skyscrapers and scoring goals on the soccer field, yet they habitually forget to finish homework before
    bedtime and leave a trail of scattered crayons across the kitchen table.
background:
  cultural: Rigoberto is a first-generation Mexican-American growing up in Sanger, California, a town surrounded by agricultural fields. Spanish is spoken at home, and he celebrates Mexican traditions such
    as Día de los Muertos, Cinco de Mayo, and family gatherings centered around food like tamales and pozole. He participates in his local parish’s celebrations and community events, reflecting the strong
    familismo and communal values of his heritage. At school, he navigates both Mexican cultural narratives and mainstream American curricula, giving him a bicultural perspective that informs his interests
    and aspirations.
