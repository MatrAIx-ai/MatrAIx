personas:
  professional: Hector Mcintosh is a budding robotics enthusiast who applies the precision of their LEGO engineering to school projects, leveraging their disciplined, organized mindset to lead their robotics
    club’s small‑scale builds while balancing their curiosity for new ideas with the practical constraints of limited resources.
  sports: Hector Mcintosh is a dedicated member of the Oakwood Junior Soccer Club, playing forward during fall leagues and joining the local community’s youth basketball pick‑up games in winter, while they
    cheer on the regional baseball team, the River City Bears, and the international soccer squad, Manchester United, for inspiration.
  arts: Hector Mcintosh channels creativity through elaborate LEGO builds inspired by the works of architect Frank Gehry, enjoys watching animated films by Pixar like "Inside Out" for storytelling cues,
    and they practice playing the recorder, often humming to tracks by the band Imagine Dragons while sketching wildlife scenes from National Geographic Kids.
  travel: Hector Mcintosh prefers family‑friendly adventures, having explored the nearby Redwood State Park and the interactive science pavilion at the local science museum, and they dream of visiting Kennedy
    Space Center and the Grand Canyon, balancing meticulous trip planning with a love for spontaneous nature walks during weekend hikes.
  culinary: Hector Mcintosh delights in building and devouring homemade pizza topped with mozzarella, pepperoni, and a sprinkle of oregano, enjoys making quick peanut butter‑banana sandwiches, and relishes
    the sweet zing of mango‑flavored fruit snacks, and they rarely attempt to cook beyond simple stovetop noodles.
  core: Hector Mcintosh is an organized, anxiety‑prone ten‑year‑old who merges LEGO engineering with budding robotics, saves earnestly for space‑themed kits, and finds solace in journaling, soccer, and
    imaginative play.
background:
  cultural: Hector was raised in a predominantly white, middle‑class suburb of Liberty, Missouri, within a community that values hard work, family, and modesty. His family attends a local Methodist church,
    where emphasis is placed on service, discipline, and respectful behavior. The region’s Midwestern culture encourages participation in school activities, community fairs, and local sports, reinforcing
    his organized and achievement‑oriented mindset. The community supports curiosity about the natural world through library programs and STEM clubs, while also promoting practical responsibility. These
    cultural influences shape Hector’s disciplined approach to studies, his love of hands‑on projects, and his desire to help peers cope with emotional challenges.
attributes:
  skills: '[''Organized note‑taking and planner use'', ''High reading comprehension and math problem solving'', ''Basic Scratch programming'', ''LEGO engineering with focus on stability'', ''Conducting
    simple home science experiments'', ''Emotional self‑monitoring through journaling'']'
  hobbies: '[''LEGO building (rockets, vehicles)'', ''Scratch coding (games and animations)'', ''Reading science and nature books'', ''School robotics club projects'', ''Playing soccer with friends'', ''Nature
    walks and leaf collecting'', ''Daily journaling for self‑reflection'', ''Helping with Liberty Fall Festival community events'']'
  career_goals: Hector dreams of one day becoming an aerospace or robotics engineer, working on designing spacecraft or advanced robots. He is fascinated by NASA missions and hopes to contribute to space
    exploration. At the same time, he wants to study psychology so he can create programs that help other children manage strong emotions like anxiety and sadness. His long‑term ambition is to blend technical
    innovation with compassionate mentorship for youth.
