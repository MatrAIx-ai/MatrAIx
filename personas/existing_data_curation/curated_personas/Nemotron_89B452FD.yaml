  hobbies: '[''watercolor painting'', ''reading literary fiction'', ''gardening'', ''genealogy research'', ''attending art shows'', ''cooking Tex-Mex dishes'', ''nature walks in Hill Country'', ''quilting'',
    ''book club'', ''mindfulness meditation'']'
  career_goals: Lauren hopes to transform her artistic and organizational talents into a modest home-based business, selling her watercolor prints and hand-crafted quilts through local fairs and an online
    shop. She plans to complete a certificate in peer support counseling to better help neighbors manage anxiety and stress. She also aims to launch a community art program at the Von Ormy community center
    that offers workshops for seniors and youth. Continuing personal growth, she intends to take online courses in digital photography and small-business management, and to integrate mindfulness practices
    into her daily routine to reduce worry.
