  career_goals: David aims to secure a stable, entry‑level position in the skilled trades—ideally as an apprentice carpenter or maintenance technician—while completing his GED and a vocational certification.
    He wants to build a reputation as a reliable handyman in his community, eventually launching a small independent repair service that can provide a steady income for his family. Ensuring financial security
    and reducing reliance on external contractors for his family property are top priorities. Over the long term, he aspires to become the go‑to resource for practical problem‑solving in Pike County, gaining
    respect through competence, reliability, and a track record of delivering quality work.
