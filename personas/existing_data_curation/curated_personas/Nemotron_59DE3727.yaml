personas:
  professional: David Shasky, a 34-year-old aspiring apprentice carpenter, blends his hands-on experience repairing farm equipment and vintage motorcycles with a methodical, step-by-step planning style,
    making them a reliable go-to handyman for their community while balancing relentless curiosity for new building techniques with a pragmatic focus on delivering solid results.
  sports: David Shasky enjoys hunting small game in the fall, fishing the Levisa Fork in summer, supports the Louisville Bats minor-league baseball team, and competes in target shooting contests with the
    Pike County Rifle Club, where their competitive nature pushes them to perfect their marksmanship.
  arts: David Shasky spends evenings listening to bluegrass legends such as Bill Monroe and the Stanley Brothers while restoring a 1970 Harley-Davidson, and occasionally attends performances by the local
    folk theater troupe, finding that the storytelling rhythm mirrors the puzzles and technical manuals that captivate them.
  travel: David Shasky prefers low-key road trips that combine fishing on West Virginia’s New River and touring historic coal-town museums in Virginia, planning each itinerary on a handwritten map but often
    limiting travel due to family responsibilities and a tight budget.
  culinary: David Shasky favors hearty mountain stew made with pork shoulder, potatoes, carrots, onions, garlic, and smoked paprika, rounds it off with roasted corn on the cob and a strong black coffee,
    and while their cooking skill is modest, they take pride in perfectly timing the stew—a small victory that eases daily stress.
  core: David Shasky, a meticulous 34-year-old handyman, fuses frugal self-reliance with relentless curiosity, tackling each project and worry methodically, even if occasional stress drives them to over-analyze
    and hoard tools.
background:
  cultural: David grew up in a traditional Appalachian setting in eastern Kentucky. His family’s roots trace back several generations of small‑scale farmers and coal‑mining laborers, fostering a culture
    of self‑reliance, frugality, and strong community ties. Local customs—such as church gatherings, bluegrass music, and a deep respect for the natural landscape—have shaped his values. While formal education
    opportunities were limited, the region’s emphasis on practical skills, oral storytelling, and mutual aid has informed his pragmatic outlook and preference for hands‑on learning. His cultural identity
    blends a respect for Appalachian heritage with a modern curiosity for technical knowledge.
