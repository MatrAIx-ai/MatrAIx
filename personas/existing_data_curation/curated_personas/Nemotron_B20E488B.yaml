personas:
  professional: An ambitious full‑stack software developer named Drew Capps blends Python, Go, and Java back‑ends with JavaScript, TypeScript, React, and Vue.js front‑ends to craft cloud‑native, art‑focused
    platforms, channeling their curiosity, competitive drive, and balance of organization and flexibility into leading architecture design and mentoring junior engineers within agile teams.
  sports: A competitive athlete named Drew Capps rides with the Cedar Rapids Cycle Club on weekend road trips, dominates in intramural basketball at the local community college, and fervently supports the
    Iowa Hawkeyes football team, treating fitness as a social playground where personal performance metrics fuel their drive, and they see each session as a chance to outdo their previous best.
  arts: A culturally engaged creator named Drew Capps frequents contemporary galleries showcasing Refik Anadol’s immersive media, strums guitar covers of Tame Impala and Jimi Hendrix at weekend jam sessions,
    and performs improv with a local troupe inspired by Second City alumni, weaving these artistic experiences into their UI/UX design sensibility, and they let the rhythm of live shows influence how they
    structure code.
  travel: An adventure‑seeking tech‑art enthusiast named Drew Capps prefers spontaneous itineraries to tech‑art conferences in Berlin and Tokyo, often booking last‑minute flights and staying in boutique
    hostels, while also carving out weekend road trips to the Appalachian Trail for photography hikes, balancing cultural immersion with a demanding startup‑focused schedule, and they always document each
    trip with high‑resolution photography.
  culinary: A culinary explorer named Drew Capps, a self‑taught home chef, thrives on cooking spicy Korean bibimbap with gochujang, perfecting coffee‑infused espresso panna cotta, and hunting craft tacos
    topped with pickled radish at local food trucks, showcasing a palate that craves bold, cross‑cultural flavors, and they love pairing dinner with a vinyl record session.
  core: Drew Capps is a caffeine‑fuelled, curiosity‑driven technophile who compulsively collects vinyl records and attends midnight hackathons, yet often forgets to reply to text messages, living at the
    intersection of code, canvas, and community, and they proudly wear a vintage band tee to every hackathon.
background:
  cultural: 'Drew grew up in Cedar Rapids, Iowa, within a predominantly white Midwestern community that values hard work, practicality, and neighborly support. His upbringing blended traditional Midwestern
    values—such as community service, attendance at county fairs, and a love of outdoor recreation—with exposure to the city’s growing arts scene, including local theater, museum exhibits, and music festivals.
    This cultural mix fostered a balanced perspective: he respects the region’s pragmatic roots while actively seeking unconventional ideas and artistic experiences that broaden his worldview.'
