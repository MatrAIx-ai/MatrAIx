  career_goals: Drew aims to become a lead engineer or principal architect within the next five years, steering projects that blend technology with artistic expression—such as immersive media platforms
    or interactive museum installations. He plans to earn advanced certifications in cloud architecture and machine learning, while contributing to open‑source art‑tech libraries. Competitive by nature,
    Drew seeks early promotions and is driven to spearhead high‑impact product teams. Long‑term, he envisions launching his own startup that empowers creators with accessible, real‑time digital tools, and
    mentoring emerging developers in the Cedar Rapids tech community.
