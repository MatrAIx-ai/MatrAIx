personas:
  professional: Per Morgan is an entry‑level civil engineer who leverages AutoCAD, Civil 3D, and surveying technology to produce precise municipal designs while channeling their talkative, community‑focused
    personality into clear client briefings and effective crew coordination.
  sports: Per Morgan is a forward for the Franklin Community Basketball League, hits the gym for cross‑training, pedals daily on a road bike, roots for the Indiana Pacers and the Indianapolis Colts, and
    volunteers as a water‑monitor at Brookville Lake during summer fishing tournaments.
  arts: Per Morgan entertains friends with acoustic guitar covers of John Mayer and Jason Mraz at informal gatherings, performs improv comedy with the Franklin Improv Collective, and draws inspiration from
    the paintings of Grant Wood and the films of Wes Anderson, often slipping their witty lines into rehearsals.
  travel: Per Morgan prefers weekend road trips that blend outdoor adventure and small‑town charm, having explored the Indiana Dunes, sipped coffee in Asheville’s arts district, and dreaming of hiking the
    Canadian Rockies while always budgeting travel costs within a modest savings plan.
  culinary: Per Morgan enjoys home‑cooked, hearty Midwestern fare such as pork tenderloin with apple chutney and sweet corn casserole, balances this with a growing skill in preparing fresh sushi rolls with
    tuna, avocado, and pickled ginger, and frequents local diners to savor the legendary fried pork tenderloin sandwich at the county fair.
  core: Per Morgan blends structured engineering precision with a gregarious, worry‑prone spirit, juggling community service, improv humor, and a disciplined financial plan while never missing a chance
    to play basketball or strum a guitar.
background:
  cultural: Per grew up in a traditionally Midwestern white family in Franklin, Indiana. His upbringing reflects the region’s emphasis on community, self-reliance, and a strong work ethic. He regularly
    attends his local Methodist church, participates in the annual Johnson County Fair, and supports the Franklin high-school sports teams. The small-town culture values friendly neighborliness, direct
    communication, and civic participation, all of which shape his collaborative yet assertive approach at work. While rooted in conservative Midwestern values, he is open‑minded, enjoying the cultural
    diversity of his college‑age peers and embracing inclusive community initiatives.
attributes:
  skills: '[''AutoCAD'', ''Civil 3D'', ''Microsoft Project'', ''Laser & GPS surveying'', ''Construction site supervision'', ''Basic structural analysis'', ''Indiana building code knowledge'', ''Cost estimation
    and budgeting'', ''Technical report writing'', ''Public presentation and stakeholder coordination'', ''Team communication and leadership'']'
  hobbies: '[''Improv comedy with community theatre'', ''Adult basketball league'', ''Habitat for Humanity volunteering'', ''Hiking in Hoosier National Forest'', ''Fishing at Brookville Lake'', ''LEGO model
    bridge building'', ''Cycling around Franklin'', ''Gym workouts'', ''Meditation for stress management'', ''Acoustic guitar playing'', ''Attending the county fair'']'
  career_goals: Per aims to earn a Bachelor’s degree in Civil Engineering while working full-time, secure his Professional Engineer (P.E.) license within the next five years, and transition from assistant
    to project manager on municipal infrastructure projects in Johnson County. He is driven to lead the design and implementation of sustainable road upgrades, flood mitigation systems, and community-centered
    green spaces. In the longer term, he aspires to launch a small consulting firm that offers cost-effective, environmentally responsible engineering solutions for local governments and nonprofit builders,
    leveraging his strong local network and public-engagement skills.
