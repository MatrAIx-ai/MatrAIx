  career_goals: Juan aims to transition from his current informal employment situation into a stable, skilled trade. He plans to enroll in a community college vocational program to earn a certification
    as an HVAC technician within the next two years, leveraging his mechanical aptitude and desire for structured work environments. In the longer term, he hopes to secure a full‑time position with a reputable
    service company in Los Angeles, eventually progressing to a supervisory role where his reliability and organizational strengths can benefit a larger team. He also keeps the possibility of starting a
    small, family‑run food cart featuring Salvadoran cuisine as a side venture once his primary career is established.
