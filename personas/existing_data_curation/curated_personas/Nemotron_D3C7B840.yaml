  career_goals: In her post‑retirement phase, Sarada aims to mentor emerging engineers, lead volunteer projects that improve local infrastructure resilience, preserve historic building fabric, contribute
    articles to regional engineering and heritage publications, and serve on advisory boards shaping Chapel Hill’s sustainable development policies.
