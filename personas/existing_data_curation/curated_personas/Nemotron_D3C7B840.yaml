personas:
  professional: Sarada Maloof, a veteran civil engineer with five decades of experience in structural analysis, sustainable site design, and historic preservation, channels their curiosity and organizational
    flexibility into mentoring emerging engineers and steering community‑focused infrastructure resilience projects.
  sports: Sarada Maloof, a devoted member of the Chapel Hill Senior Walking Club who tracks the UNC Tar Heels basketball season and watches Carolina Panthers games with friends, also participates in low‑impact
    tennis at the local recreation center and enjoys occasional bridge tournaments that keep their mind sharp.
  arts: Sarada Maloof, an avid watercolorist inspired by Monet and O'Keeffe, regularly visits the Ackland Art Museum and the Hunt Gallery, attends performances by the North Carolina Symphony, and often
    discusses the intersection of engineering and art at community lectures.
  travel: Sarada Maloof, who favors meticulously planned trips that blend cultural enrichment with gentle adventure, frequently returns to Charleston’s historic district, explores the Blue Ridge Parkway’s
    scenic overlooks, and dreams of attending the Venice Biennale, all while balancing travel expenses with a modest pension.
  culinary: Sarada Maloof, a confident home cook, delights in preparing heirloom tomato gazpacho, shrimp and grits seasoned with fresh rosemary and thyme, and roasted root vegetables with Appalachian sorghum
    glaze, and relishes discovering farm‑to‑table dishes at Asheville’s Riverside Restaurant.
  core: Sarada Maloof fuses engineering precision with artistic curiosity, mentoring the next generation while nurturing a vibrant garden, yet often forgets to water indoor plants when engrossed in a bridge
    strategy.
background:
  cultural: Raised in a middle‑class white family in the American South, Sarada’s upbringing emphasized self‑reliance, community service, and respect for tradition, while her adult life in Chapel Hill exposed
    her to a vibrant academic and cultural milieu that blends Southern hospitality with progressive liberal arts values, shaping her appreciation for both technical rigor and artistic expression.
