  hobbies: '["Sketching and watercolor painting", "Reading graphic novels", "Participating in school robotics and science clubs", "Playing piano", "Folklorico dance", "Cooking traditional Mexican recipes
    with family", "Creating papel picado and other crafts", "Exploring digital art tools"]'
  career_goals: Alexis dreams of turning her love for art and technology into a career as a graphic designer or visual storyteller. She wants to pursue formal training in illustration and digital media,
    eventually creating culturally‑rich artwork that celebrates her Mexican heritage. In the longer term, she hopes to teach art workshops for younger kids in her community, using bilingual resources to
    inspire the next generation of creators.
