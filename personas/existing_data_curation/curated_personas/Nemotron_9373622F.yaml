personas:
  professional: Alexis Superville, a budding robotics enthusiast, merges their curiosity and methodical planning to design and program Lego‑based automatons, often volunteering to help classmates troubleshoot
    while meticulously tracking every step of the build.
  sports: Alexis Superville follows the Houston Astros and Dallas Cowboys on TV, plays forward for the McAllen Youth Soccer Club during the fall season, and spends Saturday mornings at the local swim pool
    practicing freestyle laps to stay fit.
  arts: Alexis Superville channels their love for storytelling into watercolor sketches of folklore characters, drawing artistic inspiration from Jeff Smith’s 'Bone' graphic novel, John Singer Sargent’s
    luminous portraits, and the melodic piano works of Ludwig van Beethoven, while also dancing to the vibrant rhythms of Los Lobos during folklorico practice.
  travel: Alexis Superville curates family vacations with a mix of carefully mapped museum visits to the San Antonio River Walk and spontaneous beach days at South Padre Island, while dreaming of a spring‑break
    snorkeling adventure on Cozumel’s reefs and a future trip to the historic streets of Paris.
  culinary: Alexis Superville spends weekend afternoons with grandparents learning to fold masa into tamales, simmering salsa verde with fresh tomatillos, jalapeños, and cilantro, and perfecting the crispness
    of churros dusted with cinnamon sugar, while also experimenting with homemade pizza topped with mozzarella and basil.
  core: Alexis Superville is a curious, organized twelve‑year‑old who blends a love for folk art and robotics, often juggling sketchbooks and circuit boards while occasionally forgetting to finish homework
    before losing sleep over new graphic novels.
background:
  cultural: Alexis is a second‑generation Mexican American raised in McAllen, Texas, where Mexican traditions blend with a vibrant border‑town culture. She speaks Spanish at home and English at school,
    celebrating holidays like Día de los Muertos and Cinco de Mayo with family gatherings, altars, and traditional foods. Her community emphasizes close family ties, respect for elders, and a strong sense
    of mutual support, all of which shape her values of kindness, cooperation, and cultural pride. These influences inform her artistic interests and her aspiration to preserve and share her heritage through
    creative expression.
attributes:
  skills: '["Artistic drawing and painting", "Bilingual Spanish and English proficiency", "Reading and writing comprehension", "Basic coding with Scratch", "Organizational skills for school projects", "Teamwork
