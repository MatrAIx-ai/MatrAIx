  hobbies: '[''Gardening'', ''Reading'', ''Knitting and crocheting'', ''Bird-watching'', ''Cooking and recipe experimentation'', ''Crossword puzzles & Sudoku'', ''Community theater attendance'', ''Walking'',
    ''Volunteer reading facilitation'', ''Neighborhood potluck participation'']'
  career_goals: Hazel aims to deepen her digital skills to stay connected with family, mentor younger volunteers at the senior center, compile her life stories in a memoir that preserves her Greek‑American
    heritage, contribute oral histories to the local historical society, serve on the community advisory council to ensure inclusive programs for seniors, and maintain an active, healthy lifestyle while
    exploring new interests.
