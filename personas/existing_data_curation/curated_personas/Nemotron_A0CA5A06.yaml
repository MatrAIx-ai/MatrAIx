personas:
  professional: Hazel Leonti, a 70‑year‑old community garden coordinator and senior‑center volunteer manager, merges meticulous event planning with hands‑on culinary knowledge, using their curious‑but‑practical
    mindset to mentor younger volunteers while keeping senior programs organized yet flexible.
  sports: Hazel Leonti, a devoted daily walker with the local senior walking club, occasionally joins the community’s shuffleboard league, cheers on the Chicago Cubs during baseball season, and embraces
    light gardening as a form of low‑impact exercise.
  arts: Hazel Leonti, a regular attendee of community theater productions like 'The Miracle Worker,' finds inspiration while knitting to the classic recordings of Nina Simone and enjoys reading the memoirs
    of Maya Angelou, often quoting lines from Arthur Miller’s 'Death of a Salesman' during book‑club discussions.
  travel: Hazel Leonti prefers slow‑paced road trips, having explored the historic streets of Charleston, the island charm of Mackinac, and dreaming of a summer visit to the Amalfi Coast, while balancing
    travel costs with a modest travel fund that prioritizes family visits over spontaneous getaways.
  culinary: Hazel Leonti, an accomplished home cook, delights in blending Midwestern staples with Mediterranean flair, mastering dishes such as lemon‑herb chicken with corn polenta, wildflower‑honey glazed
    carrots, and a feta‑infused tomato bean stew, while experimenting with new spices despite occasionally burning the edges of a tomato sauce.
  core: Hazel Leonti, a septuagenarian who knits stories into sweaters, tends heirloom gardens, and balances curiosity with calm pragmatism, all while keeping a playful rivalry with crossword puzzles and
    a habit of misplacing glasses on cookbook tops.
background:
  cultural: Hazel is a third‑generation Greek‑American raised in Northfield, Ohio. Her family maintains Greek Orthodox traditions, celebrating holidays such as Easter and Name Day with foods like spanakopita
    and baklava, and preserving Greek language phrases and music. Simultaneously, she embodies the practical, neighborly values of the rural Midwest—self‑reliance, community service, modesty, and a strong
    work ethic—which together shape her outlook on family, food, and communal responsibility.
attributes:
  skills: '[''Culinary arts'', ''Gardening'', ''Community event planning'', ''Volunteer coordination'', ''Basic computer literacy'', ''Caregiving'', ''Knitting and crocheting'', ''Budgeting and financial
