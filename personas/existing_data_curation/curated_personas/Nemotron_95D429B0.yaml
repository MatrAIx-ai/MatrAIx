personas:
  professional: A teen robotics enthusiast and budding content creator, Henry Rodriguez blends curiosity with practicality by designing LEGO robotics projects and editing YouTube videos, while balancing
    school responsibilities with a collaborative spirit.
  sports: Henry Rodriguez, an active member of the Riverside Middle School soccer team, enjoys pick‑up basketball on weekends while cheering for the Los Angeles Lakers and Manchester United, and spends
    evenings at the downtown skate park perfecting tricks.
  arts: Henry Rodriguez channels creative energy through acoustic guitar renditions of John Mayer and Billie Eilish, scripts short YouTube sketches inspired by Peter McKinnon, and shines on stage in drama
    club productions like Hamilton, all while integrating a love for graphic design.
  travel: Henry Rodriguez dreams of weekend road trips to the Grand Canyon, a family vacation in Tokyo, and occasional summer camping at Yosemite, preferring a mix of adventure and cultural immersion while
    budgeting within a parent's allowance and school break schedule.
  culinary: Henry Rodriguez, an enthusiastic beginner in the kitchen, loves whipping up tacos al pastor with fresh cilantro and avocado, perfecting spaghetti carbonara for family dinners, and refueling
    after gaming marathons with a steaming bowl of miso ramen, though they often raid the snack drawer for cheesy poutine while studying.
  core: Henry Rodriguez is a socially charged, curiosity‑driven teen who balances a love for robotics, sports, and the arts with occasional impulsive spending and a knack for turning setbacks into fresh
    projects.
background:
  cultural: Henry comes from a white, culturally mixed family with roots in both the United States and the Hispanic tradition reflected in his surname, Rodriguez. Growing up in Neptune, New Jersey, he has
    been shaped by the diverse environment of Monmouth County, attending a public middle school with a multicultural student body. His household celebrates typical American holidays such as Thanksgiving
    and Christmas alongside Hispanic customs like Día de los Muertos and family gatherings featuring Spanish-language meals. He occasionally attends a local Catholic parish with his family, adding a communal
    and service‑oriented dimension to his upbringing. This blend of suburban American life, coastal recreational activities, and his family's bilingual background influences his worldview, fostering a strong
    sense of community and openness to diverse perspectives.
