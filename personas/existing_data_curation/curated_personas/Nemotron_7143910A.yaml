  career_goals: Her next career move is to transition from a senior analyst role into a portfolio‑manager or chief investment officer position that blends conventional finance with cultural and sustainable
    investing. She aspires to launch a boutique advisory focused on high‑net‑worth individuals and institutions seeking exposure to art, heritage assets, and impact‑driven portfolios. Concurrently, Charlotte
    wants to mentor junior analysts, champion mental‑health awareness in the finance sector, and contribute to community outreach programs that use art as a tool for social cohesion. She envisions leveraging
    her Midwestern roots and network in the Quad Cities to build a regional hub for innovative investment research.
