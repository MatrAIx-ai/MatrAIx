personas:
  professional: An aspiring mini‑architect, James Rutledge, spends hours arranging block sets into orderly cityscapes, meticulously labeling each building and insisting on following his own exact blueprint
    before any play begins.
  sports: A competitive starter in the Greenfield Tots Soccer Club, James Rutledge always lines up for drills at exactly 9:00 am, insists on wearing the same bright red jersey for good luck, and roots for
    the Chicago Cubs, shouting “Let’s win!” during games while sometimes feeling upset if a teammate misses a pass, and they often demand a rematch to prove they can do better.
  arts: A devoted fan of kid‑friendly performers, James Rutledge loves listening to Raffi’s “Baby Beluga,” dancing to the “Moana” soundtrack, drawing detailed pictures of their favorite dinosaur, and they
    keep a tidy sketchbook organized by color.
  travel: A curious explorer with a love for scheduled adventures, James Rutledge has visited the Children’s Museum in Chicago, taken a family road trip to the Grand Canyon, and dreams of seeing the Eiffel
    Tower, always packing a personalized travel checklist and insisting on exact departure times to avoid anxiety.
  culinary: A budding chef in the kitchen, James Rutledge delights in making crunchy carrot sticks with hummus, crafting perfect peanut butter and jelly sandwiches, and mastering the “no‑spill” technique
    with their favorite dinosaur‑shaped bowl, though they sometimes over‑salt their mac and cheese in a quest for flavor.
  core: James Rutledge is a detail‑obsessed four‑year‑old who thrives on routine, competes fiercely in play, worries about small mishaps, and channels anxiety into meticulous habits.
background:
  cultural: James is raised in a white, middle‑class family in Riverbank, a small city in the agricultural region of San Joaquin County, California. His upbringing blends mainstream American traditions—celebrating
    holidays like Thanksgiving, Fourth of July, and Halloween—with the local community’s ties to farming and county‑fair activities. The family emphasizes punctuality, responsibility, and respect for rules,
    mirroring broader American values of order and self‑reliance. Exposure to the nearby fire station, public parks, and a diverse school environment adds subtle multicultural influences, though his cultural
    background remains rooted in a typical white American suburban setting.
