  career_goals: James often talks about future jobs that involve clear rules, responsibility, and a chance to be the best. He says he wants to be a firefighter because he admires the uniform, the teamwork,
    and the predictable routines of helping people. He also mentions becoming a builder or engineer, imagining himself constructing things with blocks and tools and finishing projects first. These aspirations
    reflect his desire for structure, competition, and a sense of duty.
