  career_goals: Danielle aims to advance within the Pinellas County Sheriff's Office, targeting a promotion to detective and eventually to sergeant. She is particularly interested in specializing in cyber‑crime
    and financial fraud investigations, areas where her curiosity for new investigative methods can thrive. In the long term, she envisions taking on a leadership role that shapes departmental training
    programs, emphasizing community engagement and ethical policing. She also plans to complete her bachelor's degree in criminal justice and pursue a master's in public administration to broaden her strategic
    and policy expertise.
