  hobbies: '[''Visiting art galleries'', ''Painting and drawing'', ''Digital illustration'', ''Photography'', ''Listening to Latin music'', ''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Exploring
    new restaurants'', ''Attending cultural festivals'', ''Volunteering at community events'', ''Karaoke'', ''Reading contemporary fiction'', ''Journaling'', ''Hiking'']'
  career_goals: Elisa aims to advance from a machine feeder to a production supervisor within the next three years, obtaining certifications in CNC operation and lean Six Sigma. She plans to enroll in a
    bachelor's program in industrial engineering or business administration at a nearby community college, leveraging her curiosity for new ideas and her desire for stable, supportive work environments.
    Long‑term, Elisa hopes to blend her technical expertise with her artistic passions by transitioning into a manufacturing‑focused design role or a marketing coordinator position for a culturally oriented
    organization. She also envisions launching a small side‑business offering custom digital illustrations and culturally inspired merchandise, allowing her to express her creativity while maintaining financial
    independence.
