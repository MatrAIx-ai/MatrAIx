  career_goals: Melissa aspires to turn her passion for visual storytelling into a professional career. Her short‑term goal is to complete her GED, build a polished portfolio, and enroll in a community‑college
    art program or an intensive summer art institute in Southern California. She hopes to earn a scholarship that will enable her to pursue a BFA in illustration or graphic design. In the long term, she
    envisions working as a concept artist for video games or creating graphic novels that blend her love of abstract ideas with vivid imagery. She also considers becoming an art therapist, using her empathy
    and artistic skills to help others manage emotional distress.
