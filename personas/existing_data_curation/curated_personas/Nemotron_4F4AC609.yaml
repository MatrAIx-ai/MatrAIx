personas:
  professional: Melissa Norman, an aspiring concept artist and illustration student, blends meticulous project planning with their empathetic listening skills to produce immersive visual narratives while
    balancing rigorous schoolwork and personal art commissions, and they constantly seek feedback to refine their style.
  sports: Melissa Norman enjoys weekend beach volleyball at Huntington Beach, follows the Los Angeles Lakers and Anaheim Ducks with fervor, maintains a seasonal commitment to their high school cross‑country
    team, often uses trail hikes as both exercise and creative inspiration, and they find that the rhythmic breathing of running helps calm their mind.
  arts: Melissa Norman immerses themselves in the vibrant Southern California arts scene by frequenting the Orange County Museum of Art, drawing inspiration from watercolor master Georgia O'Keeffe, digital
    illustrator Loish, and the whimsical storytelling of Hayao Miyazaki, while unwinding to the indie sounds of Tame Impala and the powerful poetry of Amanda Gorman, and they often sketch in the museum’s
    coffee shop during exhibitions.
  travel: Melissa Norman prefers short, budget‑friendly getaways, exploring coastal trails in Laguna, the street art of Downtown Los Angeles, and dreaming of a future study‑abroad semester in Kyoto to experience
    Japanese animation culture, which they plan to finance through part‑time freelance illustration work.
  culinary: Melissa Norman, a modest home cook, delights in crafting avocado toast topped with heirloom tomatoes, savoring miso ramen from their favorite Little Tokyo stall, and experimenting with fresh
    fish tacos drizzled with mango salsa, though they often over‑sauce their creations and rely heavily on takeout.
  core: Melissa Norman channels their vivid imagination and anxious energy into nightly sketches, and they often indulge in endless Instagram scrolling and occasional late‑night snacking that disrupts their
    sleep schedule.
background:
  cultural: Melissa is a white teenager raised in the suburban community of Orange, California. Her family reflects a typical middle‑class, Anglo‑American upbringing, celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July, while also embracing the multicultural environment of Orange County. Growing up near the Pacific coast, she enjoys occasional beach outings and the region’s vibrant
    arts scene. Her household emphasizes kindness, cooperation, and academic perseverance, which shape her considerate and organized personality. Exposure to diverse cultural events in the county has broadened
    her appreciation for varied artistic expressions, influencing her own creative pursuits.
