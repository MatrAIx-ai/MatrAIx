personas:
  professional: Brandan Benson, a 21‑year‑old visual communications enthusiast, fuses graphic design, beat‑making, and community event planning to craft culturally resonant marketing campaigns for nonprofits,
    balancing meticulous organization with spontaneous creative bursts.
  sports: Brandan Benson plays pickup basketball at the local community park, cheering for the Wichita State Shockers and following the NBA's Denver Nuggets, and uses weekend runs and occasional yoga classes
    to channel his high‑energy sociability into stress relief.
  arts: Brandan Benson visits Wichita's art galleries and street‑art walls, sketches in a battered notebook while listening to Kendrick Lamar, Miles Davis, and Erykah Badu, curates genre‑blending mixtapes,
    and shares spoken‑word pieces at open‑mic nights at The Music Box, all while devouring graphic novels like Saga and Maus.
  travel: Brandan Benson loves weekend road trips to vibrant creative hubs—he's taken a two‑day spin to Memphis for blues and cuisine, a day‑long outing to Chicago's Museum of Contemporary Art, and dreams
    of wandering Berlin's street‑art districts, always planning on a tight budget and preferring group travel to mitigate his anxiety.
  culinary: Brandan Benson's kitchen is a laboratory for soul-food fusion, perfecting buttermilk fried chicken, slow-cooked collard greens with smoked turkey, and experimenting with kimchi-infused collard
    greens or truffle-oil-drizzled mac and cheese, while his weekly meal-prep routine keeps his pantry stocked with hot sauce, cornmeal, and garlic.
  core: Brandan Benson, a 21‑year‑old cultural connector, blends beat‑making, community activism, and soul-food cooking, juggling a tight budget and anxiety‑driven perfectionism, often pulling all‑nighters
    to finish event plans.
background:
  cultural: Brandan grew up in Wichita’s historically Black neighborhoods, where family gatherings, church services, and local community events shaped his identity. His grandparents were part of the Great
    Migration from the South, bringing traditions of soul food, gospel music, and storytelling that continue to influence his household. He is connected to the city’s African‑American cultural institutions,
    such as the Sedgwick County Museum’s Black History exhibits and the annual Wichita Black Arts Festival, which reinforce his pride in Black heritage. Living in a largely white Midwestern environment
    has made him especially aware of the nuances of representation and motivated him to create inclusive spaces for Black youth. These cultural experiences inform his artistic taste, community involvement,
    and his ambition to uplift under‑represented voices through art and mentorship.
