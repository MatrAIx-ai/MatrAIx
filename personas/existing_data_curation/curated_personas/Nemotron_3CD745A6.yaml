  hobbies: '[''Visiting art galleries and street‑art murals'', ''Sketching and photography'', ''Music production (beat‑making)'', ''Listening to hip‑hop, jazz, neo‑soul'', ''Playing pickup basketball'',
    ''Participating in open‑mic poetry slams'', ''Improvisational theater'', ''Board‑game nights'', ''Cooking soul‑food and fusion meals'', ''Listening to science and philosophy podcasts'', ''Reading graphic
    novels'']'
  career_goals: Brandan aims to turn his passion for art, community engagement, and digital storytelling into a professional career. In the short term, he plans to enroll in an associate‑degree program
    in visual communications or marketing at Wichita Area Technical College while taking certificates in event management and social‑media strategy. He aspires to work as a community arts coordinator or
    marketing coordinator for a nonprofit that serves youth and under‑represented populations, designing campaigns, organizing street‑art festivals, and creating safe spaces for creative expression. Long‑term,
    he envisions establishing his own creative collective that blends visual art exhibitions, live performances, and mentorship programs, providing opportunities for emerging Black artists in the Midwest.
    He also hopes to develop skills in mental‑health advocacy to better support peers facing anxiety and depression.
