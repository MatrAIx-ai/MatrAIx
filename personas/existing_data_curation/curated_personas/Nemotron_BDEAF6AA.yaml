  hobbies: '[''Visiting Art Galleries and Museums'', ''Attending Local Cultural Festivals'', ''Wine Tasting Tours in Temecula Valley'', ''Playing Recreational Soccer'', ''Hiking in Santa Rosa Plateau'',
    ''Cooking and Exploring Fusion Cuisine'', ''Book Club focused on Contemporary and Black Literature'', ''Street Photography'', ''Yoga and Meditation'', ''Traveling to Cities with Rich Artistic Heritage'']'
  career_goals: Jamel aims to transition from his current managerial role to senior executive leadership, such as Director of Operations or Vice President of Strategy, where he can drive innovative, cross‑industry
    initiatives that blend business performance with creative culture. He is passionate about championing diversity, equity, and inclusion programs and hopes to launch a mentorship series that supports
    emerging Black professionals in the Riverside region. To broaden his strategic toolkit, he plans to pursue an MBA with a focus on sustainable business practices and earn certifications in change management
    and mindfulness to better manage his own stress and support team resilience. In the longer term, he envisions founding a boutique consulting firm that helps mid‑size companies integrate artistic branding,
    community engagement, and socially responsible growth strategies.
