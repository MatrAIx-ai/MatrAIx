personas:
  professional: Mary Detreville, a retired curriculum specialist and lifelong educator, channels her methodical organization, competitive drive, and curiosity for modern art into leading a volunteer community
    art‑education hub that offers free workshops for seniors and youth, while they pursue a counseling certificate to better support emotional wellbeing.
  sports: Mary Detreville, an avid hiker and birdwatcher, spends weekends trekking the Kootenai National Forest with the Idaho Trails Hiking Club, joins the local senior yoga class to stay limber, follows
    the Boise State Broncos football season loyally, and in winter enjoys cross‑country skiing on nearby trails to maintain fitness while they balance social interaction with solitary contemplation.
  arts: Mary Detreville, a watercolor painter of Idaho’s landscapes, regularly attends community theater productions and exhibitions featuring artists such as Yayoi Kusama, Anselm Kiefer, and local Indigenous
    creators, while they volunteer as a docent at the Boise Art Museum and draw inspiration from the performances of the Boise Philharmonic and the poetry readings of Mary Oliver.
  travel: Mary Detreville plans thoughtful cultural getaways, having recently visited the Museum of Modern Art in Santa Fe and the Uffizi Gallery in Florence, Italy, they budget these trips through a dedicated
    savings account, prefer guided tours that allow ample time for sketch‑book journaling, and balance adventure with the comfort of staying in boutique B&Bs that respect their need for quiet reflection.
  culinary: Mary Detreville enjoys cooking simple Idaho‑style dishes like pan‑seared rainbow trout with sage‑infused butter, herb‑roasted finger‑ling potatoes, and homemade blackberry cobbler, sourcing
    fresh ingredients from the local farmers market, while they occasionally treat themselves to a farm‑to‑table dinner featuring lamb stew with rosemary when anxiety spikes, and they pride themselves on
    a moderate skill level that blends comfort cooking with occasional experimental plating.
  core: Mary Detreville, a fiercely curious yet emotionally intense retiree, weaves art, education, and meticulous planning into a vibrant community presence, while battling anxiety with mindfulness, occasionally
    splurging on art supplies, and maintaining a skeptical eye toward others’ motives.
background:
  cultural: Mary grew up in a middle‑class white American family with Upper‑Midwestern roots, where education and community involvement were core values. After moving to Cataldo, Idaho, she embraced the
    Pacific Northwest’s blend of frontier self‑reliance, close‑knit small‑town culture, and growing appreciation for the arts. She respects the local heritage of the Coeur d’Alene Tribe and integrates this
    awareness into her community work, reflecting a cultural identity that balances traditional American values with the evolving artistic and environmental consciousness of the region.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Project Management'', ''Grant Writing for Arts'', ''Community Outreach'', ''Workshop Facilitation'', ''Art History Knowledge'', ''Mentorship
    of Emerging Educators'']'
  hobbies: '[''Museum and Gallery Visits'', ''Watercolor Painting'', ''Reading Art & Philosophy'', ''Hiking'', ''Birdwatching'', ''Native Plant Gardening'', ''Journaling'', ''Community Theater'', ''Mindfulness
    Meditation'']'
  career_goals: Although retired from formal employment, Mary aims to channel her skills into meaningful volunteer leadership. She plans to establish a community art‑education hub that offers free workshops
    for seniors and youth, mentor aspiring teachers through a local apprenticeship program, and author a reflective memoir that blends her educational insights with her love of art. Additionally, she hopes
    to pursue a certificate in counseling to better support individuals facing anxiety and emotional distress within her community.
