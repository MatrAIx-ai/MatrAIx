  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical biographies'', ''Knitting and crocheting'', ''Book club participation'', ''Baking and preserving'', ''Genealogy research'', ''Low-impact
    yoga'', ''Walking in parks'']'
  career_goals: Ann Sue intends to return to formal education by enrolling in a community‑college program to complete the associate degree she began in the 1960s, focusing on local history and public service.
    She also aspires to write and publish a memoir that weaves together her personal experiences, family genealogy, and observations of societal change over the past eight decades. In the volunteer arena
    she aims to expand her leadership at the Bryn Mawr senior center by developing intergenerational reading and craft workshops, and to spearhead a community garden project that promotes sustainable practices
    and social connection. On a personal level she wishes to improve her digital literacy, learning basic photography and video‑calling to stay connected with distant relatives, and hopes to travel to a
    coastal destination she has long imagined visiting, enriching her later years with new experiences.
