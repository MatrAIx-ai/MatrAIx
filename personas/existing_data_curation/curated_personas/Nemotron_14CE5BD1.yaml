personas:
  professional: Jacqueline Dabbs, an 11‑year‑old budding coder, channels their love of routine and competition into building intricate Scratch games and meticulously assembling model kits, demonstrating
    a methodical problem‑solving style while often resisting strict deadlines.
  sports: Jacqueline Dabbs, an early‑morning jogger who favors solitary exercise, avidly follows the New York Knicks and the New York Yankees, and participates in the local community center’s beginner archery
    club during spring, preferring low‑key, self‑paced activities over team sports that they find draining.
  arts: Jacqueline Dabbs, a quiet connoisseur of mystery literature, delves into Agatha Christie’s detective novels and Hergé’s Tintin graphic adventures, while listening to Ludovico Einaudi’s piano compositions
    and watching Studio Ghibli’s animated films by Hayao Miyazaki, which together fuel their imagination and lend a subtle artistic flair to their hobbies.
  travel: Jacqueline Dabbs favors meticulously planned weekend getaways to nearby natural wonders such as Redwood National Park and the Japanese garden at Lan Su in Portland, dreams of a future solo trek
    through Edinburgh’s historic Old Town, and balances their wanderlust with a tight allowance and parental supervision.
  culinary: Jacqueline Dabbs delights in baking chocolate‑chip cookies using unsalted butter, dark chocolate chunks, and a pinch of sea salt, experiments with rosemary‑infused shortbread using herbs from
    their garden, and occasionally treats themselves to sugary cereal for quick snacks, though they sometimes over‑mix the batter, leading to overly dense cookies.
  core: Jacqueline Dabbs is a methodical 11‑year‑old who thrives on solitary challenges—from chess puzzles to cookie recipes—yet often procrastinates on school assignments despite their fierce competitive
    spirit.
background:
  cultural: Jacqueline comes from a white, middle‑class family in Bridgeville, Delaware, a small town in Sussex County with strong ties to the agricultural and coastal heritage of the Delmarva Peninsula.
    Her upbringing reflects Mid‑Atlantic values of self‑reliance, modesty, and community involvement, often centered around local church gatherings, county fairs, and family traditions. She celebrates typical
    American holidays and participates in community events that emphasize practicality, quiet family time, and an appreciation for the natural environment of the region.
