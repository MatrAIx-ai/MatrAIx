  hobbies: '["Soccer and baseball (team sports)", "LEGO and K''NEX building", "Reading adventure books", "Nature walks and birdwatching", "Collecting insects", "Strategic board games", "Organizing family
    game nights"]'
  career_goals: Shane dreams of becoming a firefighter because he admires teamwork, bravery, and the chance to help his community, while also being fascinated by how things work, leading him to imagine
    building robots or designing bridges as an engineer. He is intrigued by animals and hopes to study wildlife biology later in life. Combining his curiosity with a practical desire to serve others, Shane
    aims for a career that lets him solve problems, collaborate with people, and make a positive, tangible impact.
