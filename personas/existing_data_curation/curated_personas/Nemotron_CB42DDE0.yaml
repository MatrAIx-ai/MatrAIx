personas:
  professional: Shane Boone is a budding junior engineer who transforms LEGO cities and model airplanes into miniature laboratories, using his curiosity‑driven imagination and practical organization to
    solve playground puzzles, lead family game nights, and imagine future inventions.
  sports: Shane Boone thrives in the spring with the Midtown Kids Soccer Club, cheers on his teammates in the Little League Tigers baseball team during summer, roots for the Chicago Cubs on baseball weekends,
    and loves organizing pick‑up games in his cul‑de‑sac where he proudly wears his cleats and baseball glove.
  arts: Shane Boone immerses himself in artistic worlds through adventure books like "Magic Tree House" and "The Hardy Boys", the playful illustrations of Jeff Kinney’s "Diary of a Wimpy Kid", and the upbeat
    tunes of Imagine Dragons, channeling that inspiration into elaborate LEGO creations that echo the imagination of architects like Frank Lloyd Wright.
  travel: Shane Boone’s travel scrapbook features a summer road trip to Yellowstone National Park with eagle‑spotting birdwatch sessions, a family excursion to the Smithsonian National Air and Space Museum
    in Washington, D.C., and a birthday wish to visit the Space Center in Houston to see real rockets up close.
  culinary: Shane Boone enjoys crafting mini‑pizzas at home topped with pepperoni, mozzarella, and sliced olives, munching on carrot sticks and apple slices while building LEGO models, and occasionally
    trades his allowance for a super‑sized chicken nugget at the neighborhood fast‑food joint, though he staunchly refuses broccoli because the small green trees remind him of unfinished LEGO projects.
  core: Shane Boone is an energetic 8‑year‑old who orchestrates playground games, LEGO skyscrapers, and family board nights with equal gusto, yet habitually misplaces his favorite blue LEGO piece and forgets
    to finish his vegetables.
background:
  cultural: Shane comes from a white, Southern‑Midwestern background in Wilmot, Ashley County, Arkansas. His family has deep roots in the local farming community and actively participates in a nearby Baptist
    church, county fairs, and communal celebrations such as Fourth of July barbecues and parades. The small‑town setting emphasizes hospitality, community service, and a close connection to nature, shaping
    Shane's values of cooperation, responsibility, and respect for others. School experiences reinforce personal relationships with teachers and classmates, fostering a supportive environment that aligns
    with his sociable and considerate personality.
attributes:
