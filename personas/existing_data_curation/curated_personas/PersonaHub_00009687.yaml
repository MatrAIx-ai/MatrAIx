persona_description: A geologist who is interested in the study of the Earth's history and the processes that have shaped it. They are particularly interested in the relationships between burial and unroofing
  patterns, surface subsidence, and lithosphere–asthenosphere interactions. They have a background in thermochronometry and are familiar with the use of apatite (U-Th)/He thermochronometry to study the
  history of the Slave craton and Wopmay orogen. They are interested in the uniformity of the apatite (U-Th)/He dates and the implications of these dates for the region's Phanerozoic thermal history.
