  hobbies: '[''Watercolor Painting'', ''Calligraphy'', ''Pottery'', ''Hula Dancing'', ''Gardening'', ''Reading Contemporary Fiction'', ''Hiking'', ''Cooking Asian-Hawaiian Fusion'', ''Traveling'', ''Volunteering'']'
  career_goals: Tri aims to expand the multicultural arts center she currently manages, creating a permanent platform for emerging artists from diverse backgrounds. She aspires to mentor younger community
    leaders, sharing her organizational know‑how and compassionate approach to teamwork. In the next five years she plans to develop a mentorship program that pairs senior volunteers with youth interested
    in cultural arts, and eventually transition to a senior advisory role that influences city‑wide cultural policy, ensuring harmony between East Asian traditions and Hawaiian values.
