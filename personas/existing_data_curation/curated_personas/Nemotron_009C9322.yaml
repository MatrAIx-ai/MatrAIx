personas:
  professional: Tri Qiu, a seasoned multicultural arts center director, combines meticulous project management, fluent English‑Mandarin communication, and a compassionate, community‑focused leadership style
    to orchestrate events that weave East Asian and Hawaiian traditions into vibrant public programs.
  sports: Tri Qiu, an avid hiker who belongs to the Kailua Trail Club, also follows the University of Hawaii Rainbow Warriors basketball team, joins a senior‑friendly beach volleyball league at Ala Moana
    Beach, and makes it a point each spring to run the Honolulu Marathon’s senior division.
  arts: Tri Qiu, a passionate watercolorist and calligrapher, draws creative inspiration from Claude Monet’s impressionist palette, the fluid brushwork of Wang Xizhi’s calligraphy, the melodic ukulele strums
    of Israel Kamakawiwo'ole, and the whimsical storytelling of Studio Ghibli’s Hayao Miyazaki, often integrating these influences into community art workshops.
  travel: Tri Qiu, who favors carefully planned itineraries blended with spontaneous art festival visits, cherishes past trips to Kyoto’s historic temples and Barcelona’s modernist architecture, while dreaming
    of exploring Iceland’s geothermal landscapes and the vibrant street art scene of Valparaíso, Chile, all within a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: Tri Qiu, a confident home chef, delights in crafting Asian‑Hawaiian fusion dishes such as char‑siu kalua pork tacos topped with pineapple salsa, miso‑marinated ahi poke bowls sprinkled with
    furikake, and ube‑infused mochi served alongside fresh coconut milk, while regularly sourcing local ingredients like taro, mahi‑mahi, and kaffir lime leaves at the farmer’s market.
  core: Tri Qiu blends disciplined leadership with boundless artistic curiosity, juggling community program deadlines, a modest retirement portfolio, knee‑friendly hikes, and a kitchen habit of experimenting
    with bold, cross‑cultural flavors—all while humming a favorite ukulele tune.
background:
  cultural: Tri was born to Chinese immigrant parents who valued respect for elders, education, and community service. Growing up in a close‑knit East Asian household, she celebrated Lunar New Year and
    practiced traditional arts such as calligraphy and tea ceremony. After moving to Honolulu in her thirties, she embraced the islands’ multicultural ethos, adopting the Hawaiian principles of aloha (love,
    compassion) and mālama (care for people and the environment). She weaves these influences into her daily life, honoring her heritage while actively contributing to the vibrant cultural tapestry of Honolulu.
attributes:
