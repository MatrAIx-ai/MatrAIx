  career_goals: Milind dreams of becoming a multidisciplinary creator who blends art, technology, and social impact. He aspires to study graphic design, animation, or game development at a university like
    the University of Michigan, and later design inclusive digital experiences that share stories from his South Asian heritage while encouraging mental‑health awareness among youth. He wants his career
    path to stay flexible, allowing him to explore teaching, community art projects, or entrepreneurship.
