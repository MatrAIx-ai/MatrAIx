personas:
  professional: Milind Raheja, an aspiring comic strip creator, blends hand‑drawn storytelling with digital illustration tools, channeling a curious, open‑minded outlook into quirky characters while juggling
    a laid‑back attitude toward school deadlines.
  sports: Milind Raheja, an energetic midfielder for the Ann Arbor Youth Soccer Club, spends weekends sprinting across the fields while cheering for the Detroit Lions and Detroit Tigers, and dreams of one
    day joining the Michigan Wolverines soccer program.
  arts: Milind Raheja, a budding comic creator, draws inspiration from the narrative flair of Stan Lee, the visual poetry of Hayao Miyazaki’s animated films, and the rhythmic beats of A.R. Rahman, while
    jamming to Tame Impala, using this eclectic mix to fuel their own graphic storytelling.
  travel: Milind Raheja, a spontaneous explorer who maps out weekend hikes through Michigan’s Nichols Arboretum and plans future trips to Kyoto’s bamboo groves and Paris’s art museums, favors low‑budget
    adventures mixed with occasional family vacations to the Great Lakes.
  culinary: Milind Raheja, an enthusiastic junior chef, loves whipping up quick family‑style dishes like dal with turmeric and cumin or aloo gobi topped with fresh cilantro, experimenting with spices while
    still mastering the perfect chai brew.
  core: Milind Raheja, a 13‑year‑old creative whirlwind, blends comic art, soccer, and cultural rhythms into a curious but sometimes disorganized life, constantly juggling enthusiasm with pockets of worry.
background:
  cultural: Milind belongs to a South‑Asian (Indian) family that emigrated to the United States. At home, Gujarati and Hindi are spoken alongside English, and cultural traditions such as Diwali, Holi, and
    weekend family meals featuring biryani or samosa are important. Growing up in Ann Arbor, he blends his heritage with Midwestern culture, participating in multicultural school events and community festivals.
    His family emphasizes respect for elders, education, and community service, shaping his collaborative and caring nature while giving him a rich cultural lens for his artistic pursuits.
