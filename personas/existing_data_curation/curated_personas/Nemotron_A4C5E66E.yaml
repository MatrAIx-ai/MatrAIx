  career_goals: Carmella aspires to earn a scholarship to a reputable high school and later pursue a degree in nursing or social work, driven by her desire to care for others in her community. In the short
    term, she aims to graduate high school with honors, become a certified peer counselor, and launch a youth mentorship program at her local community center. She dreams of one day advocating for mental‑health
    resources in schools and serving as a trusted health professional in Cabarrus County.
