personas:
  professional: Carmella Jones, a diligent high‑school sophomore, applies their curiosity, disciplined organization, and compassionate nature by leading the library’s tutoring program, writing poetry that
    intertwines scientific ideas, and balancing academic achievement with digital art and piano practice.
  sports: Carmella Jones plays pickup basketball after school, is a member of the local junior varsity basketball club, and follows professional teams such as the Los Angeles Lakers and the Chicago Bulls,
    often analyzing those teams’ plays to improve their own game, and they channel that strategic mindset into balancing competition with academic stress.
  arts: Carmella Jones creates digital artwork inspired by Loish and Studio Ghibli, practices piano ranging from Debussy’s Clair de Lune to Ariana Grande’s pop hits, and curates a personal poetry journal
    that blends contemporary fiction themes with lyrical nods to Kendrick Lamar’s storytelling, all of which they share on their school’s art showcase.
  travel: Carmella Jones plans trips with spreadsheet precision, dreaming of a family road trip to the Grand Canyon, a cultural weekend in Boston’s museums, and a serene retreat at a nearby state park,
    yet their anxiety about school commitments often curtails spontaneous adventures, and they sometimes postpone bookings until the last minute out of worry.
  culinary: Carmella Jones experiments with healthy dishes like quinoa‑black‑bean salads, roasted beet hummus, and oat‑banana muffins, harvesting herbs from their garden and following Ina Garten’s tutorials,
    yet when stressed they sometimes over‑salt their meals in an attempt to mask tension.
  core: Carmella Jones is a hyper‑organized 15‑year‑old whose insatiable curiosity drives academic and creative pursuits, while a persistent undercurrent of worry colors their interactions and decisions.
background:
  cultural: Carmella is a Black teen growing up in Concord, North Carolina, where her family’s Southern roots blend with the rich cultural heritage of the African‑American community. Her upbringing includes
    regular participation in church gatherings, family cook‑outs featuring soul food traditions, and community events that celebrate Black history and resilience. She values the strong sense of kinship
    in her neighborhood, draws inspiration from local Black leaders, and carries forward a legacy of perseverance and communal support.
