personas:
  professional: Alcide Norton is a 27‑year‑old machinist who leverages their CNC expertise and competitive drive to optimize tool paths, they lead peer challenges, and pursue a trajectory toward process
    engineering and shop‑floor supervision in high‑precision aerospace and automotive sectors.
  sports: Alcide Norton fuels their competitive edge by weekend off‑road ATV rides with the Cascadia ATV Club, weekly paintball scrimmages in a local league, occasional fly‑casting trips on Lake Washington,
    and cheering the Seattle Seahawks and Mariners while they keep a modest gym routine focused on functional strength.
  arts: Alcide Norton channels creative energy into electric‑guitar riffs at open‑mic nights, drawing inspiration from Jimi Hendrix, Led Zeppelin, and modern metal act Gojira, while also collecting classic
    car design sketches and they occasionally sketch custom parts between gigs.
  travel: Alcide Norton prefers spontaneous, adventure‑focused trips that blend ATV trails with scenic fishing, having already tackled the rugged dunes of Moab, Utah, and the turquoise lakes of Banff, while
    dreaming of a tech‑tour through Tokyo’s robotics districts and a pit‑stop at Munich’s automotive museums, and they plan to document each ride with a GoPro.
  culinary: Alcide Norton, a competent home‑cook, often fires up their backyard smoker to perfect Texas‑style smoked brisket with hickory wood chips, whips up spicy Cajun gumbo using Andouille sausage and
    cayenne, and experiments with homemade jerky seasoned with coffee and chipotle, and they love pairing meals with craft beers.
  core: Alcide Norton is a fiercely competitive, hands‑on tinkerer whose love for high‑speed machining, off‑road thrills, and spontaneous guitar jams shapes a life driven by curiosity, a need for speed,
    and a habit of diving headfirst into the next challenge, and they constantly seek the next adrenaline‑fueled project.
background:
  cultural: Alcide grew up in a small farming community in northern Oklahoma before moving to Stillwater for college and work. His family’s roots trace back to German‑American and Irish‑American settlers
    who valued hard work, self‑reliance, and community service. The blend of a rural, agrarian heritage and the collegiate atmosphere of Stillwater has given him a pragmatic outlook tempered by openness
    to new ideas. He participates in local events such as the Oklahoma State Fair and the Stillwater Farmers’ Market, reflecting an attachment to Midwestern values of modesty, loyalty, and a strong work
    ethic.
attributes:
  skills: '[''CNC programming'', ''Manual milling'', ''Turning'', ''Blueprint reading'', ''GD&T interpretation'', ''CAD/CAM software (Fusion 360, Mastercam)'', ''Tool path optimization'', ''Preventative
    equipment maintenance'', ''Metallurgy basics'', ''Welding and sheet‑metal fabrication'']'
  hobbies: '[''ATV off‑road riding'', ''Classic car restoration'', ''CNC competition and maker fairs'', ''Fishing and fly‑casting'', ''Playing electric guitar'', ''Paintball'', ''Archery'']'
  career_goals: Alcide aims to move from journeyman machinist to lead machine tool operator and eventually to shop‑floor supervisor. Over the next three years he plans to earn a bachelor’s degree in manufacturing
    engineering, leveraging his hands‑on experience to transition into process engineering. He is drawn to high‑precision industries such as aerospace and automotive, hoping to lead a team that develops
    innovative machining processes. Long‑term, he envisions opening his own custom‑fabrication shop that blends traditional machining with modern digital fabrication, allowing him to compete in regional
    maker contests and supply niche components to local startups.
