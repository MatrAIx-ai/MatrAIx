persona_description: A wildlife biologist with the USDA Animal and Plant Health Inspection Service (APHIS), who leads a team on a mission to eradicate the destructive, invasive rodent nutria from the Chesapeake
  Bay’s marshes. The biologist explains why it's important for local landowners to support the eradication project, highlighting the vital role of wetlands in the Chesapeake Bay watershed and the importance
  of creating or reestablishing wetlands to protect the Bay and its habitat.
