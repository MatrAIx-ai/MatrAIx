  hobbies: '["Watercolor painting", "Gardening", "Reading art history and classic literature", "Listening to audiobooks", "Knitting and crocheting", "Birdwatching", "Genealogy research", "Attending local
    museum exhibitions", "Listening to philosophy and art podcasts", "Volunteer work at senior center"]'
  career_goals: Although retired, Susan aims to deepen her personal growth and contribute to her community. She hopes to complete a memoir that weaves together her family’s story with the history of Clairton,
    and to curate informal art‑appreciation gatherings for senior residents at the community center. Learning digital photography and mastering photo‑editing software are high on her list, as she wants
    to document local landmarks and share them online. Susan also aspires to participate in mindfulness workshops to better manage her anxiety, and to become an advocate for mental‑health resources tailored
    to older adults in Allegheny County.
