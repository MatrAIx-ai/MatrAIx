personas:
  professional: An aspiring LEGO engineer who merges hands‑on building with basic programming, Lisandro Duran channels curiosity and practicality into designing custom brick models that can roll, light
    up, or evolve, while their relaxed approach to deadlines and occasional disorganization means prototypes often linger unfinished until a spark of inspiration strikes.
  sports: A low‑key sport enthusiast who plays forward for the Victorville Youth Soccer Club and follows the Los Angeles Galaxy in the MLS, Lisandro Duran enjoys weekend swim practices at the community
    pool during summer and occasionally joins school cross‑country meets, preferring small‑team camaraderie over loud stadium crowds.
  arts: A cartoon‑drawing hobbyist who spends afternoons sketching comic strips inspired by Bill Watterson, while evenings are filled with the melodic strains of Lila Downs and traditional Mexican folk
    songs, Lisandro Duran also recites verses from Pablo Neruda, finding creative release in both visual art and lyrical poetry.
  travel: An inquisitive explorer who favors day‑trips to nearby Joshua Tree National Park and annual family vacations to the Grand Canyon, Lisandro Duran dreams of a future road‑trip to Mexico City’s historic
    center to experience its street art, balancing meticulous trail maps with a spontaneous appetite for discovering hidden desert birdwatching spots.
  culinary: A budding snack chef who can assemble fish tacos with fresh cilantro, lime, and a drizzle of chipotle mayo, Lisandro Duran loves experimenting with homemade guacamole and often adds a personal
    touch by building edible LEGO‑shaped pretzel bites, although they sometimes forget to set a timer and end up burnt nachos.
  core: Lisandro Duran is a curious, slightly disorganized 12‑year‑old who blends LEGO engineering, strategic gaming, and quiet creativity into a quietly ambitious life peppered with occasional worry and
    a love for spontaneous desert adventures.
background:
  cultural: Lisandro was raised in a Mexican‑American household in Victorville, California. He is bilingual in Spanish and English, and his family celebrates Mexican traditions such as Día de los Muertos,
    Las Posadas, and enjoys cooking dishes like tacos and tamales together. The close‑knit family environment emphasizes respeto and collectivismo, shaping his caring and cooperative nature. At school and
    in the wider community, he blends these Mexican cultural values with the diverse influences of Southern California, fostering a sense of pride in both his heritage and his American identity. The desert
    landscape of the Mojave also informs his appreciation for nature and outdoor activities.
attributes:
  skills: '[''Problem solving'', ''Basic coding (Scratch & Introductory Python)'', ''Building and troubleshooting LEGO robotics'', ''Basic electronics and soldering'', ''Bilingual (Spanish/English) communication'',
