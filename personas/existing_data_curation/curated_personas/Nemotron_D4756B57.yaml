  hobbies: '[''Building custom LEGO models'', ''Playing strategy video games (Minecraft, Civilization)'', ''Reading science and nature books'', ''Exploring desert trails and birdwatching'', ''Listening
    to Mexican folk music'', ''Drawing cartoons'', ''Learning Spanish poetry'', ''Collecting model airplanes'']'
  career_goals: Lisandro dreams of becoming a robotics engineer who creates sustainable, solar‑powered technologies to help his desert community. He is also fascinated by environmental science and hopes
    to protect local wildlife through innovative engineering solutions. He wants his future work to benefit others, especially by mentoring younger students in STEM and fostering collaborative projects
    that blend technology with environmental stewardship.
