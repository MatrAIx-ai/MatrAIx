personas:
  professional: Arlene Nieves, an 18‑year‑old registered nurse, leverages their methodical assessment skills, EPIC documentation expertise, and bilingual Spanish‑English communication to deliver culturally
    attuned patient care while juggling a rigorous schedule of clinical rotations, community health volunteer work, and a full academic load, embodying their organized, reliable, and sociable nature.
  sports: Arlene Nieves stays fit through co‑ed recreational soccer, weekend hikes in the Franklin Mountains, and bike rides along the Rio Grande trail, and follows El Paso Locomotive FC and the Texas Rangers,
    embodying their energetic yet organized commitment to regular exercise.
  arts: Arlene Nieves expresses creativity through salsa dancing inspired by icons like Celia Cruz and Marc Anthony, while immersing in contemporary fiction from authors such as Sally Rooney and Colson Whitehead,
    showcasing their sociable yet methodical appreciation for music, dance, and literature.
  travel: Arlene Nieves plans trips with the precision of a nursing schedule, favoring weekend road‑trips to nearby national parks like Big Bend and the Grand Canyon and dreaming of a cultural immersion
    tour of Oaxaca, balancing a modest student budget with a love for adventure and relaxation.
  culinary: Arlene Nieves cooks family mole and pozole with meticulous care, using dried ancho and pasilla chiles, cacao, pork shoulder, hominy, and fresh cilantro, and frequently hosts potluck gatherings
    where they perfect their mole sauce while pairing dishes with locally brewed craft beer.
  core: Arlene Nieves blends a nurse’s disciplined precision with a salsa‑infused social spark, constantly juggling schedules, spreadsheets, and a love for mole, yet can’t resist buying extra dance shoes
    on impulse.
background:
  cultural: Arlene grew up in a bilingual, bicultural household in El Paso, Texas, where her Mexican heritage is a central part of daily life. Her parents instilled strong family values, respect for tradition,
    and a sense of community service. She celebrates Mexican holidays such as Día de los Muertos and Las Posadas with family gatherings, traditional foods, and music. Fluent in both Spanish and English,
    she navigates the border’s multicultural environment with ease, often serving as a cultural bridge between patients and healthcare providers. Her upbringing emphasized "familismo" and collectivism,
    shaping her cooperative and caring nature, and motivating her commitment to improve health outcomes for the Hispanic community.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''IV insertion'', ''Medication administration'', ''Wound care'', ''Basic ECG interpretation'', ''Electronic health record documentation (EPIC)'',
