  hobbies: '[''Salsa dancing'', ''Volunteering at community health fairs'', ''Cooking Mexican family recipes'', ''Hiking in the Franklin Mountains'', ''Biking along the Rio Grande trail'', ''Playing recreational
    soccer'', ''Journaling'', ''Travel planning'', ''Reading contemporary fiction'']'
  career_goals: Arlene aims to advance her nursing career while staying rooted in community health. In the short term, she plans to complete her Bachelor of Science in Nursing (BSN) and obtain certifications
    in pediatric and community health nursing. Long-term, she aspires to become a Family Nurse Practitioner (FNP) serving underserved families on the U.S.-Mexico border, and eventually take on a nursing
    leadership role such as a nurse manager or clinical educator. She is also motivated to develop outreach programs focused on preventive care, diabetes education, and maternal‑child health for the Mexican-American
    population in El Paso.
