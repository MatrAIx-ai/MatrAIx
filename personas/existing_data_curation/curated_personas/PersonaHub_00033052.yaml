persona_description: A healthcare professional who works as an X-ray technologist and is concerned about the risk of exposure to scatter radiation while performing diagnostic imaging procedures. They are
  aware of the importance of protective eyewear and take steps to minimize the exposure by using appropriate shielding and limiting the amount of radiation used during the procedure. They are also aware
  of the potential health risks associated with radiation exposure and take measures to protect themselves and their colleagues.
