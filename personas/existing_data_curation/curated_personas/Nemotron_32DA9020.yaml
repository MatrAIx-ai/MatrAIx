  career_goals: Mohammad aims to complete his bachelor's degree in Early Childhood Education and obtain a California teaching credential within the next two years. In the medium term, he hopes to become
    a lead teacher or curriculum coordinator at his preschool, where he can introduce culturally responsive STEM modules that reflect both his Central Asian heritage and the diverse community of Modesto.
    He is also interested in pursuing a master's degree in Education Leadership, with the long‑term ambition of opening a community‑run early learning center that offers bilingual (English‑Uzbek) programs
    and supports immigrant families through parent workshops and after‑school enrichment. Additionally, Mohammad envisions contributing to local education policy discussions to advocate for inclusive early‑learning
    standards across Stanislaus County.
