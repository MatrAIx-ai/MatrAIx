persona_description: A legal consultant who specializes in human rights law and has a particular interest in the rights of people with psychosocial disabilities. She has a deep understanding of the constitutional
  and international norms and obligations related to access to health care services for adults with psychosocial disabilities, and has conducted a comprehensive study to analyze the current state of mental
  healthcare in South Africa. She is passionate about addressing the major deficiencies in the system and advocating for improved resource allocation, monitoring and information systems, and engagement
  with people with psychosocial disabilities and their representative organisations. She is committed to ensuring that people with psychosocial disabilities have access to the necessary resources and services
  in rural areas as well.
