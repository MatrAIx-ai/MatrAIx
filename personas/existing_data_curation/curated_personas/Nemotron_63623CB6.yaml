  career_goals: James dreams of becoming a scientist‑engineer who explores space and invents new technologies, and he also imagines creating his own art gallery one day. In the short term, he aims to maintain
    top grades, win his elementary school’s science fair, and earn a spot in a specialized STEM program. These goals align with his love for discovery, high standards, and disciplined approach to achievement.
