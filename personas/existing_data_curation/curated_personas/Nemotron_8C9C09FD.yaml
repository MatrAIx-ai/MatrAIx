personas:
  professional: David Bicknell, a 55‑year‑old teaching assistant with a knack for breaking down complex physics and math into clear, step‑by‑step lab modules, uses his love of structure and meticulous record‑keeping
    to design highly organized classroom experiments while quietly competing with colleagues for the most efficient assessment tools.
  sports: David Bicknell, a solitary fitness enthusiast who hikes the Wasatch foothills year‑round and jogs alone on crisp autumn mornings, follows the Utah Jazz for NBA excitement while wearing a modest
    BYU Cougars cap during weekend games, and they volunteer as a lone trail‑maintenance partner with the Wasatch Outdoor Club.
  arts: David Bicknell channels his analytical eye into photography, capturing the delicate interplay of light and rock in the Wasatch ranges, while drawing inspiration from the monochrome mastery of Ansel
    Adams, the subtle brushwork of Albert Bierstadt, and the minimalist piano compositions of Philip Glass during his quiet evenings, and they often spend evenings editing images with meticulous attention
    to contrast.
  travel: David Bicknell, a methodical planner, prefers low‑key solo trips that blend scenic hiking with scholarly pursuits, having explored Yellowstone, the Canadian Rockies, and Kyoto’s historic temples,
    and now they are plotting a meticulous itinerary to trek the Inca Trail to Machu Picchu while budgeting each expense in a custom spreadsheet.
  culinary: David Bicknell enjoys cooking modest but nutritious meals such as quinoa‑seed salads topped with roasted beetroot and feta, slow‑cooked lamb stew seasoned with rosemary and cumin, and occasionally
    experiments with homemade kimchi, all prepared with a precise, step‑by‑step method that mirrors his lab work, and they keep a detailed notebook of spice ratios.
  core: David Bicknell, a solitary, puzzle‑loving analyst who schedules even their coffee breaks to the minute, quietly competes with themselves to solve a new chess problem each week while meticulously
    tracking every expense and health metric.
background:
  cultural: David grew up in a middle‑class, predominantly white community in the Intermountain West, where values of self‑reliance, hard work, and respect for tradition are common. Living in Provo, Utah
    County, he has been shaped by the region’s strong emphasis on education, outdoor recreation, and a community-oriented yet privacy‑respecting culture. While the area is heavily influenced by Latter‑Day
    Saint traditions, David’s personal background is more secular, though he appreciates the local emphasis on punctuality, orderly conduct, and volunteerism. His divorce and preference for solitude reflect
    a personal adaptation to the social expectations of his environment.
attributes:
  skills: '[''Mathematics instruction (calculus, linear algebra)'', ''Physics laboratory facilitation'', ''Computer programming (Python, MATLAB)'', ''Data analysis and statistical modeling'', ''Technical
    troubleshooting of lab equipment'', ''Curriculum development and lesson planning'', ''Academic mentoring and tutoring'', ''Learning management system administration (Canvas, Blackboard)'', ''Assessment
    design and grading'', ''Technical writing and documentation'']'
  hobbies: '[''Solo hiking in Wasatch Mountains'', ''Reading scientific and non-fiction books'', ''Electronic kit building and model rocketry'', ''Chess (online and computer opponent)'', ''Programming small
    utility scripts (Python)'', ''Landscape photography'', ''Puzzle solving (crosswords, logic puzzles)'']'
  career_goals: David aims to transition from his current teaching assistant role to a full-time adjunct or lecturer position at a community college or university, leveraging his strengths in structured
    instruction. He plans to enroll in a part‑time master's program in Education or Applied Mathematics to deepen his pedagogical knowledge. His long‑term ambition includes authoring a textbook on introductory
    physics lab techniques and developing a modular, competency‑based STEM curriculum that can be adapted for remote learning. He also seeks certification as a Certified Academic Support Professional to
    formalize his expertise and expand his impact on student success.
