personas:
  professional: Jerrell Bonner, a veteran education mentor with three decades of classroom support, channels their boundless curiosity and flexible approach into crafting art‑infused lesson plans, coaching
    new teachers, and troubleshooting unexpected challenges with a calm, adaptable demeanor.
  sports: Jerrell Bonner, a loyal fan of the Orlando Magic and Orlando City SC, enjoys weekend walks around Lake Eola, participates in a senior‑focused yoga class at the community center, and occasionally
    joins a local pickleball league, balancing low‑impact exercise with a relaxed commitment to staying active.
  arts: Jerrell Bonner, an avid watercolorist inspired by Jacob Lawrence and Kehinde Wiley, regularly visits the Orlando Museum of Art, attends live productions of "A Raisin in the Sun", and shares a love
    for John Coltrane’s jazz in a weekly church listening circle, letting these artistic experiences shape their identity.
  travel: Jerrell Bonner, a leisurely explorer with a penchant for historical journeys, prefers spontaneous day trips to nearby Savannah’s historic district, annual pilgrimages to Washington, D.C.’s civil‑rights
    museums and a vibrant weekend in New Orleans for jazz, while dreaming of a future Mediterranean cruise, balancing modest budgets with the desire to share experiences with adult children.
  culinary: Jerrell Bonner, a competent home cook with a love for soul‑food classics like jambalaya, gumbo, and Cajun shrimp étouffée, often seasons dishes with garden‑fresh thyme, rosemary, and basil,
    and experiments with Thai green curry and Indian dal, showcasing a curious palate that blends familiar flavors with global twists.
  core: Jerrell Bonner, a curious, slightly disorganized retiree who sketches birds during lake walks, misplaces their glasses at least weekly, and collects vintage postcards, lives life with a relaxed
    rhythm that balances artistic passion with an easygoing approach to obligations.
background:
  cultural: Jerrell is an African‑American who grew up in the South during the height of the civil‑rights movement, shaping his deep appreciation for education as a tool for empowerment. He earned his degree
    from a historically Black college, where he was immersed in Black cultural traditions, gospel music, and oral storytelling. Living in Orlando, he remains connected to the city’s diverse Black community,
    participating in church activities, Black History Month events, and local cultural festivals that celebrate African‑American art and heritage. His cultural identity informs his teaching philosophy,
    emphasizing respect, resilience, and the celebration of each student’s cultural narrative.
attributes:
  skills: '[''Classroom Management'', ''Individualized Student Support'', ''Art-Integrated Instruction'', ''Educational Technology Integration'', ''Behavioral Intervention'', ''Mentoring New Teachers'',
