  hobbies: '[''Visiting Art Museums'', ''Watercolor Painting'', ''Reading History and Biography'', ''Jazz Listening Sessions'', ''Gardening'', ''Walking in Parks'', ''Cooking International Cuisine'', ''Attending
    Community Theater'']'
  career_goals: Although approaching retirement, Jerrell aims to expand his impact beyond his school by developing a community art‑education program for seniors and local youth. He plans to volunteer as
    a cultural liaison for the Orlando Museum of Art’s outreach initiatives, creating workshops that blend African‑American history with visual storytelling. He also hopes to author a memoir reflecting
    on his experiences as a Black educator during the civil‑rights era, to inspire future teachers. Additionally, he is interested in pursuing a certificate in digital media arts to stay current with emerging
    creative teaching tools.
