persona_description: A Soldier who is involved in foot march operations and is interested in injury prevention. They are particularly concerned about the common medical problem of foot blisters and the
  measures they can take to prevent them. They are likely to be familiar with the causes and symptoms of foot blisters, and the importance of wearing properly sized boots, conditioning feet through regular
  road marching, wearing socks that reduce friction and moisture, and possibly applying antiperspirants to the feet. They may also be interested in learning more about the different types of blisters and
  how to treat them.
