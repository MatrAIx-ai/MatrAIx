personas:
  professional: Josefina Ray, a retired curriculum designer and educational strategist, channels their meticulous organization and curiosity into creating interdisciplinary arts‑education workshops for
    seniors and youth, drawing on their expertise in curriculum design, digital learning platforms, and community project management.
  sports: Josefina Ray, an avid hiker and seasonal skier, trails the Chautauqua Park loop weekly, participates in Colorado Mountain Club hikes, enjoys cheering on the Colorado Rockies and Denver Broncos,
    and plays pickleball at the senior center to sustain cardiovascular health.
  arts: Josefina Ray, a watercolor landscape painter and macro photographer, frequents the Boulder Museum of Contemporary Art, studies the works of Ansel Adams and Georgia O'Keeffe, and volunteers as a
    docent, channeling their love of art history into weekly workshops that blend visual art with reflective discussion.
  travel: Josefina Ray, a methodical traveler, plans detailed itineraries for weekend escapes to Rocky Mountain National Park, cultural pilgrimages to Florence, Italy, and annual trips to Santa Fe's art
    market, balancing budget constraints with a willingness to splurge on guided museum tours.
  culinary: Josefina Ray, a home‑cook with a farm‑to‑table focus, delights in preparing Colorado elk chili with heirloom tomatoes, quinoa salads tossed with wildflower honey, and roasted trout seasoned
    with garden‑grown herbs, though they sometimes let expired spices linger in the pantry.
  core: Josefina Ray, a meticulously organized yet creatively curious former educator, blends their love of Colorado’s wilderness, arts, and community service into a purposeful retirement, even as their
    zeal for volunteer projects occasionally eclipses personal downtime.
background:
  cultural: Josefina's cultural background reflects a White American upbringing rooted in the Rocky Mountain West. Growing up in Colorado, she internalized a respect for the outdoors, self-reliance, and
    community stewardship that are characteristic of the region. Her family placed a high value on education and civic participation, leading her to pursue graduate studies in education and to remain active
    in local schools and nonprofit boards. While she identifies with broader American middle-class cultural norms - emphasizing individual achievement, volunteerism, and a balanced work-life ethic - she
    also embraces the eclectic, progressive cultural currents of Boulder County, such as appreciation for the arts, environmental consciousness, and inclusive community dialogue.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Arts integration in education'', ''Project management'', ''Event planning'', ''Budgeting and financial oversight'', ''Adult learning facilitation'',
