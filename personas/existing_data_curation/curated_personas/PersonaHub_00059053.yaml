persona_description: A marine biologist who specializes in the study of marine migrations and seasonal patterns, particularly in the California Current. They have conducted research on the mechanisms and
  cues that allow species to home with such fidelity to seasonal pathways, and have identified the mechanisms and cues that control their movements. They have used satellite observations of temperature
  and chlorophyll concentrations to predict when and where individual species are likely to be in a given ocean region and begin to understand factors that control their movements.
