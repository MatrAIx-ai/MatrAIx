personas:
  professional: Lucia Sotero, a seasoned registered nurse in Polk County, blends meticulous clinical expertise in IV therapy, wound management, and Epic documentation with their bilingual fluency to lead
    culturally attuned patient education while driving quality‑improvement projects and preparing for a future role as a certified nurse manager.
  sports: Lucia Sotero stays active by leading salsa workshops at the community center, they attend weekly Zumba and HIIT classes, hike the Lake Louisa State Park trails with the Polk County Trails Club,
    cheer on the Tampa Bay Buccaneers on Sundays, follow the Orlando Magic, and occasionally join a local 5K run organized by the Haines City Running Group.
  arts: Lucia Sotero finds creative inspiration in the rhythmic salsa of Celia Cruz and Marc Anthony, they also enjoy the theatrical flair of Lin‑Manuel Miranda’s Broadway productions, devour historic narratives
    set in Caribbean‑inspired novels on quiet evenings, often attend performances at the Orlando Shakespeare Theater, and explore local art fairs for cultural enrichment.
  travel: Lucia Sotero plans their trips with meticulous itineraries, favoring cultural immersion in cities like San Juan, Cartagena, and New Orleans, while weekend getaways to the Everglades and Asheville
    satisfy their love for nature, and they balance their travel budget by leveraging reward points and traveling off‑season, though they occasionally splurge on a boutique salsa night in Havana.
  culinary: Lucia Sotero is a passionate home chef who expertly prepares mofongo, arroz con gandules, and pasteles using fresh plantains, pork, sofrito, and a dash of annatto, they relish sourcing ingredients
    at the local farmer’s market, host lively dinner gatherings for friends, yet they often leave the kitchen a mess after a cooking marathon and admit to a weakness for late‑night espresso drinks topped
    with sweet caramel.
  core: Lucia Sotero blends disciplined, detail‑oriented professionalism with a vivacious love for salsa, community service, and flavorful home cooking, all while they occasionally procrastinate on paperwork
    and leave a trail of kitchen chaos behind them.
background:
  cultural: Lucia was raised in a close‑knit Puerto Rican family that emphasized bilingual communication, Catholic traditions, and a strong sense of community. She grew up celebrating festivals such as
    Three Kings Day and the Puerto Rican Carnaval, and the rhythms of plena and bomba remain integral to her identity. This heritage influences her cooking, her love of dance, and her commitment to serving
    the Latino population in Florida. While fully integrated into the multicultural fabric of Haines City, Lucia maintains regular contact with relatives in Puerto Rico, often traveling back for family
    reunions and bringing back stories and recipes that enrich her life and the lives of those around her.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Medication administration'', ''Wound care'', ''Electronic health record (EHR) documentation'', ''Health education and counseling'', ''Bilingual communication
    (Spanish/English)'', ''Team coordination and shift management'', ''Quality improvement and patient safety initiatives'', ''Emergency triage and response'']'
  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Volunteering at community health fairs'', ''Gardening'', ''Reading historical fiction'', ''Group fitness classes'', ''Hiking local nature
    trails'']'
  career_goals: Lucia aims to build on her practical experience by earning a Bachelor of Science in Nursing within the next two years, followed by a Certified Nurse Manager (CNM) credential. She envisions
    stepping into a charge‑nurse or unit‑manager role where she can design and lead structured care pathways that improve patient outcomes. Passionate about community health, she plans to spearhead a outreach
    program targeting Puerto Rican seniors in Haines City, offering preventive screenings and health‑literacy workshops in both Spanish and English. Long‑term, Lucia hopes to contribute to nursing education
    as a preceptor or adjunct instructor, sharing her methodical expertise with the next generation of nurses.
