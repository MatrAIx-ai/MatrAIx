  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Photography (historical architecture, nature)'', ''Hiking in Shenandoah'', ''Hosting dinner parties'', ''Board game nights'', ''Community
    theater volunteering'', ''Book club (creativity & psychology)'', ''Acoustic guitar playing'', ''Vinyl record collecting'', ''Charity runs for animal shelter'']'
  career_goals: In the next 12–24 months, James aims to advance to a Customer Service Team Lead position, where he can mentor new representatives and shape service standards. Over the next five years, he
    aspires to become a Customer Experience Manager or Operations Supervisor, overseeing cross‑functional initiatives that blend service quality with innovative customer engagement. To support these goals,
    he plans to pursue an associate degree in Business Administration and earn certifications in Service Design and Leadership. Long‑term, James envisions launching a boutique consultancy that helps small
    regional businesses improve their customer experience while also supporting local arts initiatives through community events.
