  career_goals: Xavier aims to move from a senior sales representative to a regional sales manager within the next three years, overseeing multiple stores across central Puerto Rico. He aspires to develop
    a data‑driven sales strategy that blends innovative digital tools with proven face‑to‑face techniques. Ultimately, he hopes to open his own retail outlet that offers locally sourced products, leveraging
    his deep knowledge of the market and his competitive drive to build a leading brand in the island’s consumer sector.
