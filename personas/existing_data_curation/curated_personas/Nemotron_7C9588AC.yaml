personas:
  professional: Oswaldo Dejesusortiz, a meticulous teen technician‑in‑training, leverages their bilingual fluency and disciplined approach to excel in custom PC building, spreadsheet‑driven parts inventory,
    and mentoring a small chess club, and they aim to earn ASE certification to open a family‑run repair shop.
  sports: Oswaldo Dejesusortiz, a disciplined player on the Riverside Rovers community soccer team, trains twice weekly, follows the tactical play of FC Barcelona, supplements on‑field work with weekly
    chess‑inspired mental drills, and they adhere to a strict pre‑match routine that includes a 20‑minute static stretch.
  arts: Oswaldo Dejesusortiz, a quietly competitive gamer and budding audiophile, spends evenings dissecting strategy in Civilization VI, immerses themselves in instrumental rock by Explosions in the Sky,
    watches tech documentaries by Linus Tech Tips, and they collect limited‑edition chess sets featuring artwork by Jim Sullivan.
  travel: Oswaldo Dejesusortiz, an aspiring tech‑nerd with a structured travel plan, prefers short, itinerary‑driven road trips to national parks like Zion, dreams of attending the Tokyo Electronics Expo,
    and they budget their wanderlust through a dedicated trip‑savings jar, though they hesitate to book spontaneous flights.
  culinary: Oswaldo Dejesusortiz, a methodical home‑cook, perfects hand‑rolled corn tortillas, braised pork shoulder with orange‑clove glaze, and spicy tomatillo salsa, documenting every ratio in a spreadsheet,
    while they occasionally over‑season in the pursuit of the perfect balance.
  core: Oswaldo Dejesusortiz blends disciplined tech tinkering, strategic gaming, and meticulous budgeting into a focused teen life, yet they occasionally sacrifice sleep and skip flossing, revealing a
    pragmatic yet slightly neglectful streak.
background:
  cultural: Oswaldo comes from a Mexican-American family that settled in Milwaukee’s South Side. At home, Spanish is spoken alongside English, preserving cultural ties through food, music, and celebrations
    such as Día de los Muertos and Mexican Independence Day. His family places a strong emphasis on hard work, respect for elders, and maintaining close-knit relationships, which shape his disciplined outlook.
    The blend of Mexican heritage and Midwestern environment has given him a dual perspective—proud of his cultural roots while navigating the opportunities of his local community.
attributes:
  skills: '[''time management and scheduling'', ''computer hardware assembly and troubleshooting'', ''spreadsheet data analysis (Excel)'', ''basic mechanical repair (bicycles, small engines)'', ''Spanish-English
