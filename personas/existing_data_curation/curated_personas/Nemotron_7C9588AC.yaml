  hobbies: '[''custom PC building'', ''strategy video gaming'', ''chess club'', ''community soccer'', ''cooking Mexican dishes'', ''reading self-improvement books'', ''personal finance budgeting'']'
  career_goals: Oswaldo aims to earn his GED within the next year and enroll in a vocational training program for automotive technology or electrical systems. His long-term ambition is to become a certified
    technician, gain enough expertise to open a small, family-run repair shop, and eventually secure a stable income that supports his relatives. He also hopes to acquire certifications such as ASE (Automotive
    Service Excellence) or a Journeyman electrician license, positioning himself as a top performer in his trade.
