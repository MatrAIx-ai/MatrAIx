  career_goals: Although retired, Maria aims to remain self‑sufficient and mentally active. She plans to complete a community‑college certificate in digital literacy to stay connected with her grandchildren
    via social media. She wishes to compile a family memoir that weaves together oral histories, photographs, and her own reflections, preserving her heritage for future generations. Maria also hopes to
    expand her volunteer role by mentoring younger seniors in the library’s reading program, and she aspires to hike the coastal trail in Maine during the summer, balancing her love of exploration with
    her desire for health and independence.
