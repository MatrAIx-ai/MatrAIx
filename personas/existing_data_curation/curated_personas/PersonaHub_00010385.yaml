persona_description: A local government official or planner who is committed to reducing greenhouse gas emissions and promoting sustainable energy practices in their community. They are interested in developing
  innovative and effective strategies for reducing emissions in the built environment, urban planning, and public and private transport. They are also interested in promoting citizen and civil society participation
  in sustainable energy actions and are looking for inspiration and best practices from other local governments. They are familiar with the Covenant of Mayors – The Sustainable Energy Action Plan (SEAP)
  and its key sectors and actions, and are interested in learning more about the role of local governments in promoting sustainable energy. They are also interested in the Mexico City Pact, the World Mayors
  Summit on Climate, and other related events and organizations, and are looking for ways to integrate these into their local climate action plan.
