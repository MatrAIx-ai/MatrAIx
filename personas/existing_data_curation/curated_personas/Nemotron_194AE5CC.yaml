  hobbies: '[''drawing with crayons'', ''building block towers'', ''listening to children’s songs'', ''exploring the garden'', ''watching birds and small animals'', ''looking at picture books'']'
  career_goals: Even at a young age, Giselle imagines growing up as a caring adult who supports her family and community. She often talks about wanting to ‘help people’ like a teacher or a nurse, and she
    is fascinated by animals, dreaming of one day caring for a pet or working with farm animals. Her long‑term ambition is to maintain a harmonious home environment and be someone others can rely on.
