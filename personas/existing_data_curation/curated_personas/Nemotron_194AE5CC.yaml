personas:
  professional: Giselle Ley, a 2‑year‑old aspiring organizer, spends her days arranging colorful blocks into tidy rows like a tiny librarian, demonstrating practical attention to detail, a preference for
    predictable routines, and a relaxed tolerance for occasional mess, and they take pride in the neatness of their little "library."
  sports: Giselle Ley, a 2‑year‑old, delights in toddler gym classes at the Little Sprouts Playgroup, loves splashing in the community pool's shallow section, and often watches the Seattle Mariners on TV
    with their family, cheering quietly from the couch, while they occasionally join the Northwest Toddlers Soccer Club's Mini Team for a gentle game of kick‑about.
  arts: Giselle Ley, a 2‑year‑old, enjoys dancing to The Wiggles' "Fruit Salad" and humming "Let It Go" from Frozen, while drawing bright crayon pictures of Pixar's "Toy Story" characters, especially Woody,
    and they proudly display these artworks on the refrigerator.
  travel: Giselle Ley, a 2‑year‑old, recently visited Walt Disney World’s Magic Kingdom in Florida, where they adored the spinning teacups and the colorful parade, and now they dream of seeing the splash
    zones at the Great Barrier Reef Aquatic Center, preferring trips planned months ahead with a familiar stroller route that keeps their favorite blanket close.
  culinary: Giselle Ley, a 2‑year‑old, loves soft foods like mashed banana with a drizzle of honey, scrambled eggs sprinkled with cheddar cheese, and bite‑size avocado toast, often attempting to feed themselves
    with a plastic spoon while firmly rejecting broccoli and carrots, and they get extra smiles when a piece of sweet potato fry appears.
  core: Giselle Ley, a tiny meticulous explorer, arranges toys in perfect rows, worries when their blankie goes missing, and never passes up a chance to share a giggle with a playmate, even if it means
    an occasional crumb‑covered shirt.
background:
  cultural: Giselle was born and raised in Winnsboro, a small town in Franklin Parish, Louisiana. Her family’s white Southern heritage includes regular attendance at a local Baptist church, participation
    in community gatherings such as church picnics and county fairs, and a love for regional foods like jambalaya and biscuits. The rural setting gives her frequent exposure to farmland, local wildlife,
    and a close‑knit neighborhood where neighbors often look out for each other.
