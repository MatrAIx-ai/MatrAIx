  career_goals: James aspires to become a senior mechanical engineer leading innovative product development teams, focusing on sustainable and high‑performance solutions for the automotive or aerospace
    sectors. He plans to obtain his Professional Engineer (PE) license within the next three years and to contribute to patents that integrate cutting‑edge materials with artistic design. Over the longer
    term, he envisions transitioning into a technical director or engineering manager role where he can mentor junior engineers, shape strategic R&D direction, and foster a collaborative, low‑stress work
    environment that balances creativity with rigorous engineering standards.
