persona_description: A researcher who specializes in the study of small-scale fisheries management and policy development, particularly in the context of artisanal fisheries in Chile. This individual has
  extensive experience in conducting research on the impacts of policy changes on artisanal fishers, the development and implementation of small-scale comanagement policies, and the legal institutionalization
  of exclusive territorial user rights for fisheries. They have a deep understanding of the challenges and opportunities associated with sustainable exploitation of coastal seabed resources and have contributed
  to the scientific knowledge base through their research and publications. This individual is likely to be a key player in the development and implementation of sustainable fisheries management policies
  in Chile.
