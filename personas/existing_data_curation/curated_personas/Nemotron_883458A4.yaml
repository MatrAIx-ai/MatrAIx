personas:
  professional: A seasoned facilities maintenance specialist named Hsueh Shin leverages decades of hands‑on janitorial expertise, a meticulous eye for detail, and an emerging passion for eco‑friendly art
    preservation to troubleshoot building systems while championing sustainable practices in museum and university environments, and they aim to translate this blend of practical skill and creative respect
    into a supervisory role.
  sports: Hsueh Shin enjoys hiking the expansive state park trails of the Midwest, often capturing geological textures with a camera, follows the Buffalo Bills for football and the New York Knicks for basketball,
    and they play occasional pickup soccer at the community center to stay agile and fit.
  arts: Hsueh Shin spends weekends sketching Rochester neighborhoods in watercolor, draws inspiration from Claude Monet’s light studies and the bold ink strokes of contemporary calligraphers, regularly
    attends gallery openings featuring artists like Kehinde Wiley and local muralist Jane Smith, and they let those encounters fuel their own creative experiments.
  travel: Hsueh Shin favors spontaneous, low‑cost travel itineraries, having recently explored the historic temples of Kyoto on a backpacking trip and the art‑rich streets of Florence, while dreaming of
    a future road‑trip across the Pacific Northwest to photograph coastal cliffs and small‑town murals, and they often plan trips with a flexible schedule that leaves room for impromptu art discoveries.
  culinary: Hsueh Shin experiments in the kitchen by marrying traditional dishes like bibimbap and kimchi‑jigae with Midwestern staples such as sweet corn, cheddar cheese, and locally sourced pork, often
    seasoning meals with gochujang and finishing with fresh herbs from the farmer’s market, and they enjoy sharing these fusion plates with friends at casual potlucks.
  core: A curious, eco‑mindful facilities guru with a competitive streak, Hsueh Shin balances meticulous cleaning expertise with spontaneous art pursuits, frequent hikes, and a habit of turning everyday
    chores into creative experiments, all while occasionally letting disorganization slip into their schedule.
background:
  cultural: Hsueh is a first‑generation American whose parents immigrated from South Korea in the 1980s. He grew up in the Midwest, navigating a blend of Korean household traditions—such as celebrating
    Chuseok, speaking Korean with family, and cooking ancestral dishes—and the everyday rhythms of Rochester life. This bicultural upbringing gives him a deep respect for hard work and community while fostering
    an openness to diverse artistic expressions. He remains bilingual, often switching between English and Korean, and draws on his heritage when exploring Asian art, traditional calligraphy, and the values
    of humility and perseverance that shape his personal and professional outlook.
attributes:
  skills: '[''Commercial floor care and polishing'', ''Chemical safety and MSDS compliance'', ''Minor electrical and plumbing repairs'', ''Operation of floor scrubbers and pressure washers'', ''Customer
    interaction and conflict resolution'', ''Eco‑friendly cleaning practices'', ''Basic art preservation techniques'', ''DIY carpentry and furniture assembly'']'
  hobbies: '[''Watercolor painting'', ''Visiting local art galleries'', ''Reading philosophy and science‑fiction'', ''Hiking in state parks'', ''Photography of natural textures'', ''Cooking Korean‑Midwestern
    fusion meals'', ''Building small electronic kits'', ''Playing strategy board games'']'
  career_goals: Driven by a competitive streak, Hsueh aims to earn his GED and pursue a certification in facilities management within the next two years. He aspires to move into a supervisory role overseeing
    building operations at a cultural institution such as a museum or university, where he can combine his cleaning expertise with his appreciation for art. Long‑term, he envisions launching a boutique
    cleaning company that specializes in sustainable services for art spaces, allowing him to compete with larger firms while staying true to his flexible and innovative work style.
