persona_description: A researcher or scientist who studies movement in various contexts, including humans, vertebrate and invertebrate animals, and microorganisms. They may focus on the act, process, or
  result of passing from one place or position to another, which differs from locomotion in that it encompasses both locomotion but also a change of the position of the whole body or any of its parts. They
  may also differentiate between movement associated with behavior and motor activity, and may be interested in the total number of publications written about "Movement" by people in the URMC Research Network
  by year, and whether it was a major or minor topic of these publication.
