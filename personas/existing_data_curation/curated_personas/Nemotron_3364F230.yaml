personas:
  professional: Elizabeth Taylor, a curious three-year-old who constantly explores colors, shapes, and building blocks, already demonstrates early problem-solving and collaborative play, and they often
    imagine designing whimsical toys for friends, hinting at a future career in creative design.
  sports: Elizabeth Taylor, a lively three-year-old who attends the Little Explorers Soccer Club on Tuesdays and splashes around in toddler swim lessons at the community pool, idolizes the New York Knicks,
    and they often pretend to dribble a basketball during backyard play.
  arts: Elizabeth Taylor, an imaginative three-year-old who delights in finger-painting bright swirls, sings along to Raffi's 'Baby Beluga', and watches the animated adventures of Moana and 'Sesame Street',
    they find comfort and identity in vivid visual and musical storytelling.
  travel: Elizabeth Taylor, a curious three-year-old whose family’s weekend road trips often take them to the colorful splash pads of Disney World in Orlando, the majestic vistas of the Grand Canyon, and
    the friendly petting zoo at the nearby county fair, they prefer flexible schedules that allow spontaneous naps and snack breaks.
  culinary: Elizabeth Taylor, a picky three-year-old who adores creamy mac and cheese sprinkled with sharp cheddar, loves dipping crisp apple slices in honey, and proudly helps stir banana-muffin batter,
    they consistently resist broccoli and other green vegetables, turning family dinner into a gentle negotiation over bite-size portions.
  core: Elizabeth Taylor, a tender-hearted yet worry-prone three-year-old who thrives on spontaneous art, loves bright stickers, occasionally throws temper-tantrums over fallen towers, they quietly navigate
    big feelings with a gentle, resilient spirit.
background:
  cultural: Elizabeth is a white child raised in Charlotte, North Carolina, within a suburban middle‑class family that embraces Southern hospitality and mainstream American customs. Her upbringing includes
    celebrating holidays such as Thanksgiving with traditional Southern dishes, attending community events at the Charlotte Children’s Museum and local library storytimes, and participating in church‑related
    activities that emphasize kindness and cooperation. The family’s cultural environment blends contemporary U.S. culture with gentle Southern values, providing her exposure to diverse artistic experiences,
    outdoor play, and a strong sense of community.
