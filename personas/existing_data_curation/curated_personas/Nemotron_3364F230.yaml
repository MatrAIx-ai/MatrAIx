  career_goals: Though only three, Elizabeth often talks about wanting to become someone who helps others and creates beautiful things—she imagines being a teacher who tells stories or an artist who paints
    bright pictures. Her current ambition is to explore more colors, learn new words, and make friends who share her love of gentle, creative play.
