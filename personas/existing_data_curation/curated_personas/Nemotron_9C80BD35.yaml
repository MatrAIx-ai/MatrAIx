  hobbies: '[''Reading'', ''Gardening'', ''Cooking'', ''Church choir'', ''Bridge'', ''Bingo'', ''Volunteer work at library'', ''Story‑time facilitation'', ''Beach walks'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Marie aims to expand her impact as a community mentor and cultural steward. She plans to compile a memoir that intertwines her personal experiences
    with the broader African‑American history of the South, and to publish a collection of local oral histories. Marie also hopes to develop a youth mentorship program through the Jacksonville library,
    offering workshops in creative writing and heritage research. Continuing her commitment to family, she aspires to support her grandchildren’s education by providing tutoring and scholarships, while
    remaining active in church leadership and senior‑center activities.
