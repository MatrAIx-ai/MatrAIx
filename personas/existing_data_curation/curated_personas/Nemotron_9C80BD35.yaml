personas:
  professional: Marie Carraway is a retired humanities graduate who now serves as a community mentor and oral-history coordinator, leveraging her communication, event planning, and research skills to lead
    story‑time sessions, senior book club discussions, and local heritage projects while maintaining a practical, organized approach and a warm, collaborative demeanor
  sports: Marie Carraway enjoys low‑impact activities like morning walks along the nearby Atlantic beach and weekly tai‑chi classes at the senior center, and they avidly follow the regional baseball team,
    the Jacksonville Jumbo Shrimp, while occasionally participating in friendly bridge tournaments that keep their mind agile
  arts: Marie Carraway immerses themselves in music by listening to gospel choirs, classic jazz from the Miles Davis era, and soulful R&B ballads, often humming along while gardening, and they regularly
    attend performances at the local community theater, especially productions of classic Southern dramas and live piano recitals by regional artists
  travel: Marie Carraway prefers short, purposeful trips that combine family visits and cultural exploration, such as annual weekend getaways to Savannah’s historic district, a beloved spring pilgrimage
    to the historic plantations along the James River, and occasional day trips to the nearby Outer Banks to collect seashells and photograph wildflowers, all planned well in advance to accommodate their
    mobility needs
  culinary: Marie Carraway delights in preparing Southern comfort fare like shrimp and grits, collard greens seasoned with smoked turkey, and heirloom tomato jam, cooking with fresh herbs such as basil,
    thyme, and oregano from their garden, and they frequently share these dishes at church potlucks where their signature pecan pie becomes a crowd favorite
  core: Marie Carraway is a curious, organized senior who blends community storytelling, garden‑to‑table cooking, and low‑impact fitness while dutifully juggling modest finances and a gentle stubbornness
    about missing a medication dose
background:
  cultural: Marie is an African‑American woman who grew up in the Jim Crow South and carries a deep respect for the Black church, oral‐storytelling traditions, and Southern cuisine. Her cultural identity
    is shaped by the civil‑rights era, the resilience of her community, and the rich musical heritage of gospel and jazz. She maintains family ties and intergenerational connections, often sharing recipes,
    histories, and values with her grandchildren. Living in Jacksonville, NC, she blends the coastal coastal lifestyle with a strong sense of Southern Black heritage, celebrating both the historic struggles
    and the vibrant cultural expressions of her community.
