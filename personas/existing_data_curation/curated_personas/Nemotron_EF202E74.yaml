personas:
  professional: Tessi Sun, a Miami‑based network and computer systems administrator with two decades of experience designing Cisco‑ and Juniper‑driven LAN/WAN architectures, virtualizing servers on VMware
    and Hyper‑V, and automating tasks with PowerShell and Python, leverages their boundless curiosity and love of unconventional problem‑solving to craft flexible infrastructure blueprints while often juggling
    multiple projects in a relaxed, slightly disorganized fashion.
  sports: Tessi Sun channels rhythmic energy into salsa dancing classes and weekly kayak excursions on Biscayne Bay, cheers for the Miami Heat and the Miami Marlins, and is a member of the local Biscayne
    Bay Kayak Club, though their laid‑back attitude sometimes leads to missed sessions after a late‑night gallery opening.
  arts: Tessi Sun roams contemporary galleries featuring Jeff Koons and vibrant Miami muralists, captures neon‑lit streets in spontaneous street‑photography, and unwinds to the salsa beats of Celia Cruz
    while devouring sci‑fi novels by Neal Stephenson and N.K. Jemisin, letting the city’s artistic pulse inspire both their tech projects and weekend social life.
  travel: Tessi Sun prefers spontaneous, short‑haul getaways—kayaking trips to the Florida Keys, weekend art festivals in New Orleans, and a lingering dream of exploring Barcelona’s Gothic Quarter—planning
    just enough to book a flight while leaving ample room for on‑the‑fly discoveries and late‑night tapas.
  culinary: Tessi Sun blends modest culinary confidence with a love for bold flavors, regularly preparing avocado‑lime ceviche, roasted sweet‑potato tacos with chipotle, and garden‑fresh cilantro pesto
    for pasta, while occasionally treating themselves to a classic Cuban sandwich after an evening at a gallery opening.
  core: Tessi Sun is a tech‑savvy network architect‑in‑the‑making who fuses artistic spontaneity with a delightfully haphazard planning habit, often juggling gadgets, garden herbs, and salsa steps while
    dreaming of AI‑driven network orchestration.
background:
  cultural: Tessi is a white American whose family roots trace back to the Midwest, where she grew up in a small suburban town before moving to Miami for her career. The multicultural fabric of South Florida
    has deeply influenced her outlook; she embraces the city’s Latin rhythms, culinary flavors, and bilingual atmosphere, even though she speaks only limited Spanish. Her upbringing emphasized independent
    thinking and community involvement, values she carries into her professional collaborations and volunteer work. This blend of Midwestern practicality and Miami’s artistic diversity shapes her open‑minded,
    curiosity‑driven personality.
attributes:
  skills: '[''Network design and implementation'', ''Cisco IOS & Juniper Junos configuration'', ''Server administration (Windows, Linux)'', ''Virtualization (VMware, Hyper‑V)'', ''Cloud services basics
    (AWS, Azure)'', ''Network security fundamentals'', ''Automation scripting (PowerShell, Python)'', ''Vendor management and procurement'', ''User support and training'', ''Technical documentation and
    process improvement'']'
  hobbies: '[''Contemporary art gallery visits'', ''Street photography'', ''Salsa dancing'', ''Beach kayaking'', ''Urban balcony gardening'', ''Reading sci‑fi and fantasy novels'', ''DIY electronics and
    hardware repurposing'', ''Volunteer tech workshops for seniors'']'
  career_goals: Tessi aims to transition from her current administrator role to a senior network architect position, leading larger infrastructure projects and shaping the strategic direction of her organization’s
    IT roadmap. She plans to earn advanced certifications such as Cisco CCNP/CCIE and AWS Solutions Architect to deepen her technical credibility. Beyond titles, she is passionate about mentoring women
    in technology, fostering inclusive team cultures, and eventually launching a boutique consulting service focused on small‑business network optimization. Her long‑term ambition includes integrating AI‑driven
    monitoring tools to proactively manage network health while preserving the flexibility she values in her work style.
