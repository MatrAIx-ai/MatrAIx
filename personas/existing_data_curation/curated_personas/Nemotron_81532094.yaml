  career_goals: Stefanie aims to enroll in a competitive visual‑arts program at a liberal‑arts college where she can refine her illustration and UI/UX design skills. She aspires to build a professional
    portfolio that showcases innovative, concept‑driven artwork, eventually securing freelance commissions for indie game studios, publishing houses, or boutique design agencies. Long‑term, she envisions
    establishing her own small design studio that blends fine art with interactive media, earning recognition in national art competitions and contributing to museum exhibition design.
