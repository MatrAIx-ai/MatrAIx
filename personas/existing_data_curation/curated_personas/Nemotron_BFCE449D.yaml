  career_goals: Tyryn aims to transition into a senior strategic advisory role where he can lead enterprise‑wide digital transformation projects and shape technology roadmaps. He aspires to mentor junior
    analysts and underrepresented talent, championing inclusive hiring practices within the tech community. Pursuing advanced certifications in cloud architecture and data analytics is on his roadmap, as
    is authoring a practitioner guide on best practices for systems analysis. Ultimately, he envisions contributing to policy development that promotes equitable access to technology across his region.
