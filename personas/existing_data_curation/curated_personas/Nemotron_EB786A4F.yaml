personas:
  professional: Meghan Lane is a clinical psychologist with extensive expertise in CBT, DBT, psychometric testing, and quantitative research, who blends evidence‑based therapy with Southern storytelling
    to resonate with clients, and they meticulously manage case documentation while mentoring junior clinicians.
  sports: Meghan Lane enjoys early‑morning hikes on the Tennessee River Trail, practices yoga twice per week, follows the Tennessee Titans and Nashville Predators with fan enthusiasm, and they belong to
    the local women’s hiking club 'Trailblazers', which meets each weekend to explore nearby state parks.
  arts: Meghan Lane channels a love for Appalachian folk music by playing acoustic guitar at community gatherings, drawing inspiration from the dulcet tones of 'Doc Watson' and the storytelling of Dolly
    Parton, while also finding solace in the novels of Brené Brown and the paintings of Andrew Wyeth displayed at regional art fairs, and they often reflect on how music informs their therapeutic practice.
  travel: Meghan Lane plans trips with the same meticulous checklists they use for case notes, favoring weekend escapes to the Great Smoky Mountains or a serene yoga retreat in Sedona, while dreaming of
    a research‑inspired pilgrimage to the Science Museum’s brain exhibit in London and a restful hike through New Zealand’s South Island, yet balancing family commitments and a modest budget.
  culinary: Meghan Lane transforms their garden’s bounty into low‑sugar Southern dishes like collard greens sautéed with garlic and smoked turkey, baked peach cobbler sweetened with monk fruit, and a tangy
    okra and heirloom tomato stew, cooking with confidence while they occasionally over‑season with molasses in pursuit of the perfect sweet‑savory balance.
  core: Meghan Lane is a methodical therapist who blends data‑driven care with Southern hospitality, tends a thriving garden, and they can’t resist a midnight cup of coffee before a client session.
background:
  cultural: Meghan is a white Southern woman raised in Middle Tennessee, steeped in the region’s values of hospitality, strong family ties, and community service. Her upbringing blended Methodist church
    traditions with an appreciation for Appalachian folk music and local culinary customs. While she honors these heritage roots, her academic and professional experiences have broadened her worldview,
    fostering cultural humility and a commitment to inclusive, evidence‑based practice. She actively participates in local cultural events such as the Maury County Fair, supports regional arts initiatives,
    and integrates Southern storytelling techniques into therapeutic contexts to resonate with her clients.
attributes:
  skills: '["Clinical assessment","Cognitive‑behavioral therapy (CBT)","Dialectical behavior therapy (DBT)","Trauma‑informed care","Psychometric testing","Research design and data analysis (SPSS, R)","Case
    management","Crisis intervention","Supervision and training of staff","Telehealth service delivery","Mindfulness‑based interventions","Program development and community outreach"]'
  hobbies: '["Hiking and nature walks","Yoga and mindfulness practice","Gardening (vegetables and native wildflowers)","Farm‑to‑table cooking","Volunteering at a science museum (brain‑health workshops)","Book
    club (psychology and nonfiction)","Acoustic guitar playing","Genealogy research"]'
  career_goals: Meghan aims to establish a private practice in Maury County that integrates evidence‑based therapy with telehealth services to increase accessibility for rural populations. She plans to
    pursue a doctoral degree (Ph.D. or Psy.D.) to deepen her research credentials and eventually lead a regional mental‑health consortium focused on early intervention for adolescents. A long‑term ambition
    is to author a guidebook on resilience building and to cultivate a mentorship pipeline for emerging psychologists, particularly women in the South. She also aspires to develop a community‑based mental‑health
    education program in partnership with local schools and faith groups.
