  career_goals: Jacob aims to transition from a general office clerk to an office manager or operations coordinator within the next three to five years. He plans to earn a bachelor's degree in Business
    Administration or obtain a Certified Administrative Professional (CAP) credential to solidify his qualifications. Driven by his competitive nature, he wants to lead process‑improvement projects that
    streamline administrative workflows and reduce errors. Eventually, he envisions supervising a small team and potentially launching a side consultancy that offers freelance office organization and efficiency
    consulting to Sacramento‑area small businesses. He also seeks a role that offers a clearer structure to mitigate his stress and worry about work demands.
