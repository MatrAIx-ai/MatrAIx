personas:
  professional: Belkis Lucas leverages her precise circuit‑design and PLC‑programming expertise, paired with a creatively curious mindset and a well‑balanced blend of organization and flexibility, to drive
    renewable‑energy projects—particularly solar integration for residential and commercial clients—while mentoring junior technicians and championing smart‑grid innovation as she pursues a lead engineering
    role.
  sports: Belkis Lucas fuels her fitness routine with weekly excursions in the Texas Hill Country as a member of the Hill Country Hiking Club, supplements it with sunrise yoga at a downtown studio, and
    energetically supports the Dallas Cowboys and Houston Astros while keeping a relaxed yet consistent exercise schedule.
  arts: Belkis Lucas immerses herself in the local art scene, frequenting gallery openings that showcase abstract works reminiscent of Rothko and Basquiat, while her evenings resonate with the smooth jazz
    of Miles Davis, the neo‑soul grooves of Erykah Badu, and the contemporary R&B stylings of H E R, fueling her own experimental acrylic paintings.
  travel: Belkis Lucas curates her travel around off‑beat nature retreats—having trekked the red rocks of Sedona, the art‑filled streets of Santa Fe, and the vineyards of Napa Valley—and is planning a solar‑focused
    tour of Iceland, balancing a modest vacation budget with a desire for both adventure and restorative downtime.
  culinary: Belkis Lucas delights in crafting Southern‑comfort meets Tex‑Mex plates, such as shrimp and grits crowned with a chipotle‑tomato glaze, pimento cheese enchiladas, and collard greens sautéed
    with smoked poblano, while also perfecting sweet‑potato cornbread, showcasing her confident, experimental kitchen style.
  core: Belkis Lucas is a curiosity‑driven engineer‑artist who balances meticulous circuitry with spontaneous acrylic splashes, mentors budding technologists, hikes hills for inspiration, and occasionally
    forgets sunscreen while juggling a pragmatically flexible life.
background:
  cultural: Belkis identifies as African American and grew up in the vibrant, multicultural environment of the Austin metropolitan area before settling in Dripping Springs. Her family traditions, which
    include soulful music, storytelling, and community gatherings, have shaped her values of resilience, collaboration, and pride in cultural heritage. She regularly participates in local Juneteenth celebrations
    and supports initiatives that highlight Black contributions to science and technology. While embracing the Texan outdoors lifestyle, she also maintains close ties with church and community groups that
    reinforce a sense of belonging and mutual support. This blend of Southern Black cultural influences and the progressive, tech‑forward atmosphere of Central Texas informs both her personal outlook and
    professional drive.
attributes:
  skills: '[''Circuit Design'', ''PCB Layout'', ''PLC Programming'', ''Industrial Automation (LabVIEW, RSLogix)'', ''Signal Analysis'', ''Instrumentation'', ''Safety Compliance (NFPA 70E)'', ''Technical
    Documentation'', ''CAD Schematic Capture'', ''Project Coordination'', ''Mentoring and Training'', ''Cross‑functional Communication'']'
  hobbies: '[''Acrylic Painting'', ''Visiting Art Galleries'', ''Listening to Jazz/Neo‑Soul'', ''DIY Electronics Projects'', ''Hiking Texas Hill Country'', ''Nature Photography'', ''Cooking Fusion Meals
    (Southern & Tex‑Mex)'', ''STEM Mentorship for Youth'']'
  career_goals: Belkis aims to transition from a senior technologist role to a lead engineering position where she can oversee renewable energy projects, particularly solar integration for residential and
    commercial clients in Central Texas. She plans to earn the Certified Engineering Technician (CET) designation and become a recognized specialist in smart grid technologies. Long‑term, she envisions
    establishing a mentorship program that supports underrepresented youth in STEM, leveraging her industry experience to bridge gaps in opportunity. She also aspires to contribute to innovative product
    development that blends cutting‑edge electronics with sustainable design principles.
