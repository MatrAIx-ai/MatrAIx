persona_description: A user who is interested in using nomadic applications and is looking for a rating of their usability based on the five properties of usability (easiness of usage, mistake handling,
  efficiency, effectivity, and satisfaction) and the learnability of the system interface. They are also looking for a questionnaire to measure the usability of the nomadic application interface based on
  the properties of serviceability and the three user interfaces (Harmonizing to the definition of serviceability, that is concerned with the properties of the merchandise that make it apprehensible, learnable,
  easy to utilize and attractive). They are likely to be a user who is familiar with nomadic applications and is looking for ways to improve their experience with the system.
