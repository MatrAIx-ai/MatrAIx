  hobbies: '[''Visiting art galleries and museums'', ''Attending live jazz and hip‑hop concerts'', ''Playing basketball in community leagues'', ''Cooking experimental meals with spouse'', ''Hiking local
    trails'', ''Reading science‑fiction and medical innovation books'', ''Digital photography'', ''Volunteering as a health educator at community events'', ''Participating in African‑American cultural festivals'']'
  career_goals: Shahid plans to pursue a Master of Science in Nursing with a focus on Nursing Administration or a Nurse Practitioner track, aiming to transition into senior leadership positions such as
    charge nurse, unit manager, or director of nursing. He aspires to spearhead community health outreach programs in Prince George’s County that address health disparities affecting Black communities,
    develop an art‑infused patient education curriculum, and become a mentor and preceptor for newly licensed nurses. Long‑term, he envisions influencing health policy to promote culturally competent care
    and equitable access to services.
