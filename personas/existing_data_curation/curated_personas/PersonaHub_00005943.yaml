persona_description: A scientist who studies evolutionary biology, particularly the study of finch beak evolution on Daphne Island. Their research interests include the genetic basis of beak size and shape
  variation in the Galapagos finches, and the effects of environmental factors on beak size and shape. They are interested in understanding how natural selection has shaped the finches' beak traits, and
  how this has led to the observed variation and convergence in beak size and shape across the different species on Daphne Island.
