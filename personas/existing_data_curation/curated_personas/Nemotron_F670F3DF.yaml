  hobbies: '[''Watercolor Painting'', ''Poetry Writing'', ''Book Club Participation'', ''Local Theater Attendance'', ''Gardening'', ''Genealogy Research'', ''Travel to Art Museums'', ''Volunteering as Art
    Gallery Docent'']'
  career_goals: Though retired, Erik aims to continue contributing to New Haven's cultural life. He plans to publish a collection of essays on modern art, launch a senior-led oral history project, and establish
    a low‑cost community art studio that offers interdisciplinary workshops. He also hopes to travel to European museums for research collaborations and to work with local universities on public lecture
    series that bridge art and philosophy.
