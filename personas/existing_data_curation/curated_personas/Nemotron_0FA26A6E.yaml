  hobbies: '[''Salsa dancing'', ''Cooking traditional Cuban dishes'', ''Reading Latin American literature'', ''Beach jogging'', ''Photography'', ''Yoga and meditation'', ''Playing chess'', ''Volunteering
    at community cultural events'']'
  career_goals: Luis aims to advance to a senior program‑management role where he can lead large‑scale, cross‑functional initiatives that serve Miami’s Cuban‑American community, such as cultural‑heritage
    revitalization projects or nonprofit arts programs. He plans to earn a PMP certification and pursue an MBA to strengthen his strategic leadership skills. Additionally, Luis seeks to mentor junior project
    managers, embed inclusive practices in his organization, and design workflows that reduce stress and promote work‑life balance for himself and his team.
