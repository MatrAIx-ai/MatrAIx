personas:
  professional: Luis Olmo, a 38‑year‑old bilingual project manager, blends rigorous CAPM‑backed planning with the human‑centered sensitivity cultivated by years of community event coordination, using MS
    Project, Asana, and Tableau to deliver cross‑functional initiatives that honor family‑focused values and keep teams on schedule while they negotiate stakeholder expectations with calm precision.
  sports: Luis Olmo channels his energy into early‑morning beach jogs with the Miami Beach Running Club, supports the Miami Heat and Miami Marlins, plays weekend salsa at a local dance studio as cardio,
    and they also enjoy seasonal beach‑volleyball tournaments that let them combine social interaction and fitness.
  arts: Luis Olmo is an avid reader of Gabriel García Márquez and Mario Vargas Llosa, a photographer who captures the vibrant street life during San Juan de Dios festivals, a playlist enthusiast spiraling
    through son, bolero, and Rubén Blades, and they regularly attend live performances by local son bands to stay connected to the rhythmic pulse of their community.
  travel: Luis Olmo’s travel style blends cultural immersion with relaxed beach getaways; they have explored the historic plazas of Cartagena, the jazz clubs of New Orleans, and the art districts of Barcelona,
    while dreaming of a future trip to the ancient ruins of Sicily, all while balancing family commitments and a modest travel budget.
  culinary: Luis Olmo’s kitchen is a hub where they perfect ropa vieja, moros y cristianos, and tostones, seasoning dishes with citrus mojo, garlic, and adobo, their cooking skill sits between confident
    home‑chef and enthusiastic hobbyist, and they love pairing meals with a crisp mojito made from fresh mint and lime.
  core: Luis Olmo balances meticulous project planning with a restless mind, using yoga and chess to tame worry, yet they often over‑commit to community events, leading to occasional stress‑induced splurges.
background:
  cultural: Luis was born and raised in Miami Beach to Cuban‑immigrant parents who settled in Little Havana after the 1990s. He grew up bilingual, celebrating Cuban traditions such as San Juan de Dios festivals,
    family gatherings, and the music of son and bolero. This heritage instilled in him a strong sense of community, respect for family ties, and a deep appreciation for the arts and cuisine of his ancestry.
    He remains actively involved in Cuban cultural clubs, using his professional expertise to bridge his community’s needs with municipal and nonprofit initiatives.
