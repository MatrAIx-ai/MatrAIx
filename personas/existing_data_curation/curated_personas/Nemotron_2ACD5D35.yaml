  hobbies: '[''painting (fine art)'', ''visiting art galleries'', ''mixed media experiments'', ''DIY home improvement'', ''photography'', ''hiking'', ''yoga'', ''reading design and architecture magazines'',
    ''listening to podcasts on entrepreneurship'', ''volunteering for community mural projects'']'
  career_goals: Gloria aims to earn Certified Paint Contractor status and eventually launch her own boutique interior‑finishing firm that blends high‑quality painting with artistic mural work. She plans
    to build a reputation in the Greater Trenton area for delivering meticulously detailed projects on time and within budget, leveraging her methodical approach and competitive spirit. Long‑term, she hopes
    to expand into commercial spaces, mentor apprentices, and become a recognized advocate for sustainable, design‑forward painting practices.
