personas:
  professional: Victoria Scott, a seasoned custodial supervisor with over three decades of experience, leverages her artistic eye and passion for green cleaning to design efficient, eco‑friendly schedules,
    mentor diverse crews, and champion the preservation of public art installations as she pursues Certified Facility Manager credentials.
  sports: Victoria Scott enjoys low‑impact fitness, joining a senior walking club that meets three times a week on the Cedar River trail, cheering for the Iowa Hawkeyes football team, and participating
    in a community bridge league, while they maintain a light cardio routine through gardening chores.
  arts: Victoria Scott spends her afternoons at the Cedar Rapids Museum of Art, drawing inspiration from Monet’s water lilies and Ansel Adams’ photography to create delicate watercolors and black‑and‑white
    prints, and she contributes handmade quilts to local theater fundraisers, often quoting Georgia O’Keeffe in her creative process.
  travel: Victoria Scott prefers thoughtfully planned weekend getaways, exploring nearby destinations such as the Amana Colonies, the Great Smoky Mountains, and the historic streets of Savannah, while dreaming
    of a month‑long art pilgrimage to Paris and the Uffizi Gallery, balancing travel costs with her modest savings.
  culinary: Victoria Scott enjoys cooking garden‑fresh meals, often preparing ratatouille with tomatoes, zucchini, and fresh basil harvested from her backyard, alongside a signature chicken potpie seasoned
    with thyme and rosemary, and they cherish an occasional slice of pecan pie from a beloved local bakery.
  core: Victoria Scott blends a meticulous custodial career with a creative soul, balancing green cleaning experiments, watercolor painting, and avid birdwatching, yet they have a habit of hoarding unused
    cleaning sprays that clutter the garage.
background:
  cultural: Victoria grew up in a small Midwestern town in Iowa, raised in a working‑class, predominantly Anglo‑American family with deep roots in agricultural communities. Her upbringing emphasized hard
    work, community service, and modesty, values reinforced by involvement in her local Methodist church and the town’s volunteer fire department. While her early life was shaped by the traditional Midwestern
    ethic of reliability and cooperation, she also embraced the region’s growing appreciation for the arts, attending local fairs, music festivals, and museum events. This blend of Midwestern pragmatism
    and a budding curiosity for cultural experiences informs her balanced, harmonious outlook today.
attributes:
  skills: '[''Team leadership'', ''Staff training and development'', ''Scheduling and workflow optimization'', ''Inventory and supply management'', ''OSHA safety compliance'', ''Green cleaning practices'',
