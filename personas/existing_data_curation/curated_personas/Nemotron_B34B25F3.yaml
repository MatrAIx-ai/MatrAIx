  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Birdwatching'', ''Attending community theater'', ''Volunteering
    at local museum'', ''Walking the Cedar River trail'']'
  career_goals: Victoria aims to transition from supervisory duties to a facility management role within the next five years, pursuing certifications such as Certified Facility Manager (CFM) and Certified
    Green Cleaning Professional. She hopes to spearhead a campus‑wide sustainability program that integrates eco‑friendly cleaning with the preservation of art installations in public buildings. Mentoring
    the next generation of custodial staff is a personal ambition, and she plans to develop a structured apprenticeship program at her workplace. Long‑term, she envisions consulting for local schools and
    museums, offering expertise on maintaining clean, safe, and aesthetically pleasing environments.
