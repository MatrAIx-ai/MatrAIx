personas:
  professional: Justin Primm, a veteran landscaping specialist with three decades of hands‑on turf management, irrigation design, and certified pesticide application, leverages his methodical planning and
    community‑first mindset to lead small crews on sustainable native‑plant projects while eyeing a supervisory role that eases physical strain.
  sports: Justin Primm, an avid supporter of the Browns and a regular participant in the local community softball league, spends his weekends hiking Cuyahoga Valley trails, casting a line on Lake Erie,
    and cheering on the Guardians at Progressive Field, while also following the Cleveland Cavaliers' season and occasionally joining friends for a pickup soccer game with Cleveland SC.
  arts: Justin Primm, a weekend acoustic‑guitar player at neighborhood potlucks, avid blues enthusiast who frequents House of Blues Cleveland to hear tributes to Muddy Waters and B.B. King, and a nature
    photographer who captures sunrise over the lake, also enjoys the Cleveland Play House productions and keeps a collection of vintage vinyl from the Rolling Stones.
  travel: Justin Primm, who favors road‑trip adventures in his well‑worn pickup, has explored the Adirondack lakes, made a nostalgic pilgrimage to the Irish coastal town of Dingle, and plans a future visit
    to Bavaria’s Alpine trails, while balancing budget constraints by prioritizing short getaways to Niagara Falls and occasional weekend stays at Lake Erie cabins.
  culinary: Justin Primm, a backyard chef who blends his garden’s fresh tomatoes, peppers and herbs into a signature grilled trout with lemon‑dill glaze, swaps stories over a plate of Cleveland‑style chili
    topped with corned‑beef, and seasons his occasional Irish soda‑bread with a splash of rye whiskey, all while savoring a pint of Great Lakes Brewing’s Dortmunder Lager.
  core: Justin Primm balances a pragmatic, community‑driven landscaping career with a restless curiosity, channeling his anxiety into meticulous planning, group hobbies, and occasional spur‑of‑the‑moment
    splurges on gear and craft beer.
background:
  cultural: Justin descends from German and Irish ancestors who settled in Cleveland’s northeast neighborhoods in the early 1900s. Growing up in a blue‑collar, working‑class community in Cuyahoga County,
    he internalized Midwestern values of hard work, reliability, and neighborly support. Local customs—such as cheering for the Browns, summer outings on Lake Erie, and seasonal potluck gatherings—have
    shaped his identity. The region’s distinct four‑season climate fuels his passion for horticulture, while his pride in Cleveland’s industrial heritage and resilient neighborhoods informs his commitment
    to community‑focused landscaping projects.
attributes:
  skills: '[''Turf management and lawn care'', ''Tree and shrub pruning'', ''Irrigation system design, installation, and repair'', ''Soil testing and amendment'', ''Landscape design and project planning'',
