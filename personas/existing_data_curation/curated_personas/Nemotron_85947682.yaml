    service and client communication'']'
  hobbies: '[''Community gardening'', ''Hiking in Cuyahoga Valley National Park'', ''Fishing on Lake Erie'', ''Playing acoustic guitar'', ''Attending live blues and music performances'', ''Watching Cleveland
    Browns games'', ''Photography of nature and seasonal garden changes'', ''DIY home‑improvement projects'', ''Participating in local brewery tours and tastings'', ''Volunteer clean‑up events'', ''Reading
    horticulture and sustainability books'', ''Mindfulness journaling and meditation'']'
  career_goals: Looking ahead, Justin aims to transition into a supervisory role that allows him to share his knowledge while reducing the physical strain of field work. He plans to earn a Certified Landscape
    Technician (CLT) credential and a specialization in sustainable horticulture, positioning himself to launch a boutique landscaping firm focused on native‑plant installations and community garden projects
    in the Cleveland area. Over the next five years, he hopes to build a portfolio of public green‑space improvements, mentor apprentices, and secure a stable, less‑hands‑on position that supports his desire
    for financial security and personal growth.
