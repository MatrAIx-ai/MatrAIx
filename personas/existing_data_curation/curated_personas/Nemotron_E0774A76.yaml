  career_goals: Gregory aims to advance into senior executive support roles such as Executive Office Manager or Director of Administrative Services, where he can lead a team and shape organizational efficiency.
    He plans to obtain the Certified Administrative Professional (CAP) credential and eventually launch a consultancy that helps small businesses streamline their operations. Additionally, he hopes to blend
    his passion for the arts by taking on administrative leadership within a regional museum or cultural center, contributing both his expertise and his appreciation for creative endeavors.
