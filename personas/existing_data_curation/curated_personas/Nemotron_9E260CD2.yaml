  career_goals: Peter aspires to turn his love of performance and storytelling into a full‑time career as an online content creator and multimedia journalist. He envisions launching a YouTube channel that
    explores the unique intersection of Redwood‑coastal culture, environmental activism, and emerging art scenes, while also hosting a weekly podcast featuring local musicians, activists, and eccentric
    personalities. In the longer term, he hopes to open a community arts hub in Eureka where workshops on video production, street art, and skate culture can thrive. He is also interested in studying digital
    media production at a community college or trade school, aiming to blend his hands‑on skills with formal training to eventually work as a freelance videographer or creative director for eco‑focused
    campaigns.
