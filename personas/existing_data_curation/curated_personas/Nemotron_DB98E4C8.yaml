personas:
  professional: A mural specialist named Sun Park, 35, blends precise wallpaper installation expertise with adventurous mixed‑media murals, channeling boundless curiosity and spontaneous design instincts,
    and they often grapple with deadline anxiety due to a natural aversion to rigid structures.
  sports: A nature‑focused 35‑year‑old Sun Park hikes the Front Range with the Englewood Outdoor Club, follows the Denver Broncos and Colorado Avalanche seasons, attends weekly yoga classes at a downtown
    studio, and they occasionally volunteer for trail‑maintenance projects, yet avoids competitive team sports because large crowds make them uneasy.
  arts: A creatively inquisitive 35‑year‑old Sun Park sketches Colorado mountain vistas, paints intimate canvases echoing Georgia O’Keeffe’s vibrant forms, practices calligraphy inspired by traditional
    brushwork, and they draw fresh ideas from street‑art works by local muralist Jeremy J. Pritchard and exhibitions featuring Ai Weiwei, while their reserved nature leads them to prefer solitary studio
    time over gallery crowds.
  travel: A thoughtfully planned 35‑year‑old Sun Park designs weekend trips that combine adventurous hikes in the Swiss Alps with tranquil tea‑ceremony retreats in Kyoto, balances limited vacation days
    by seeking short‑haul destinations like Santa Fe and Patagonia, and they dream of an artistic residency in Barcelona’s Gothic Quarter, though their worry about budget overruns often curtails spontaneity.
  culinary: A culinary enthusiast named Sun Park, 35, perfects aromatic bibimbap bowls and hand‑rolled kimchi with gochujang, masters traditional tea‑ceremony preparation using high‑grade green tea, experiments
    with charcoal‑grilled vegetables, and they indulge in handcrafted pour‑over coffee at local roasters, yet sometimes over‑spice dishes when stressed.
  core: An eccentric yet diligent 35‑year‑old muralist, Sun Park fuses spontaneous creativity with meticulous craftsmanship, battles deadline anxiety, and they find equilibrium through yoga, tea ceremonies,
    and sketching Colorado’s mountains.
background:
  cultural: Sun Park is a second‑generation Korean‑American. Her parents immigrated to the United States in the early 1990s and raised her in the Denver metro area. Family life centered around Korean traditions
    such as Chuseok celebrations, kimchi making, and respect for elders. She is fluent in both English and Korean, and she maintains ties to the local Korean community through cultural festivals and language
    classes. Her heritage informs her aesthetic sensibility, often incorporating subtle calligraphic lines, natural motifs, and a balanced use of negative space in her decorative work.
