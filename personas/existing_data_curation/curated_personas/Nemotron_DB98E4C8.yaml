  career_goals: Sun aims to evolve from a paper‑hanging contractor into an independent artist‑decorator who is known for custom mural work that blends East Asian motifs with the natural aesthetics of Colorado.
    Over the next five years she hopes to build a portfolio of signature wall art, secure at least three public or commercial commissions, launch a boutique studio that offers personalized interior finishes
    and workshops, and develop a systematic business approach that helps her manage deadlines and stress.
