personas:
  professional: Deedee Connelley is a high-school sophomore who blends a love of livestock and photography into an emerging focus on sustainable agriculture, volunteering with the 4-H club to raise show
    chickens while documenting their growth for school science fairs, and they often share their photos with classmates.
  sports: Deedee Connelley enjoys riding their family's horse across the prairie, hikes the local nature preserve during spring and summer, and stays active by joining the high school cross-country team
    (the Wildcats) in the fall, while over the winter they cheer on the Denver Broncos and occasionally practice yoga to keep flexible.
  arts: Deedee Connelley immerses themselves in creative outlets, strumming acoustic guitar while listening to indie pop artists like Phoebe Bridgers and Tame Impala, devouring science-fiction novels from
    N.K. Jemisin, snapp-shooting sunrise over the fields with a vintage 35mm camera, and they draw inspiration from nature documentaries narrated by David Attenborough.
  travel: Deedee Connelley prefers short, spontaneous road trips to nearby state parks such as Badlands National Park and the local prairie preserve, dreaming of future backpacking adventures in Iceland's
    volcanic highlands and Japan's cherry-blossom season, yet their travel plans often stay flexible to accommodate school obligations and limited funds, and they imagine exploring these distant landscapes
    one day.
  culinary: Deedee Connelley enjoys simple farm-to-table meals, frequently cooking scrambled eggs fresh from their chickens with a side of roasted sweet potatoes and local honey, savoring homemade apple
    crumble for dessert, and they occasionally experiment with herb-infused tea blends featuring lavender and mint.
  core: Deedee Connelley is a curious, nature-loving teen who balances a love for livestock, indie music, and photography with a tendency toward worry and a relaxed, sometimes disorganized approach to responsibilities,
    and they often find solace in sunrise photography.
background:
  cultural: As a white teen growing up in Houghton, South Dakota, Deedee’s cultural roots are steeped in the rural Midwestern tradition. Her family traces its ancestry to German and Norwegian immigrants
    who settled the region in the late 19th century, and the household still observes Lutheran customs, including Sunday services and holiday meals featuring traditional dishes like lefse and sauerkraut.
    Community life revolves around the county fair, high‑school sports, and church gatherings, fostering a sense of neighborly support and self‑reliance. The prairie landscape, open skies, and agricultural
    lifestyle shape her values of hard work, practicality, and appreciation for the outdoors. While she embraces modern technology and pop culture, she also respects the slower, seasonal rhythms that define
    life in Brown County.
