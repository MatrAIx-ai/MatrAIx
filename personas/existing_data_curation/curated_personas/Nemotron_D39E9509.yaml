    and wildlife)'', ''Journaling'', ''Sketching/drawing'', ''Yoga and meditation'', ''Playing acoustic guitar'', ''Listening to indie pop music'', ''Farm‑simulation video games (Stardew Valley)'']'
  career_goals: Deedee’s primary ambition is to work with animals in a hands‑on capacity while still embracing the practical side of agriculture. She aims to finish high school, obtain a GED if needed,
    and then enroll in a community‑college program in animal science or veterinary technology, with the long‑term goal of becoming a licensed veterinary technician or pursuing veterinary school to specialize
    in large‑animal care. Simultaneously, she hopes to develop a small freelance photography business that captures the rural landscape and local events, giving her the flexibility to balance work with
    personal interests. She also wishes to volunteer as a peer mentor to support fellow students dealing with stress and anxiety, integrating her personal experiences into a future role that blends caregiving
    with community service.
