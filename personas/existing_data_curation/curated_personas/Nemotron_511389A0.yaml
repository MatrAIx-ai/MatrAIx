  hobbies: '[''listening to indie and classic rock'', ''visiting art galleries'', ''sketching street scenes'', ''photography'', ''pickup basketball'', ''group fishing trips'', ''car meet attendance'', ''bike
    customization'', ''co‑op video gaming'', ''food truck exploration'', ''street art appreciation'']'
  career_goals: Kevin aims to secure a commercial driver's license (CDL Class A) within the next two years to transition into long‑haul trucking. He envisions founding his own logistics company that specializes
    in the careful transport of artwork and specialty goods, blending his love of art with his driving career. In the short term, he seeks a promotion to sales supervisor to increase his earnings and gain
    management experience, while taking community‑college courses in logistics and business management to strengthen his organizational abilities. Ultimately, Kevin wants to be recognized as a reliable
    regional carrier, enjoy the freedom to travel across the country, and mentor new drivers, all while maintaining a flexible lifestyle that allows him to explore new ideas and experiences.
