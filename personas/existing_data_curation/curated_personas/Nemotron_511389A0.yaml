personas:
  professional: Kevin Castro is a sales associate who also delivers light‑truck loads for a local logistics firm, blending their knack for improvising routes, street‑level art knowledge, and outgoing, competitive
    personality to close deals, while they work toward a CDL Class A and dream of launching their own art‑focused freight company.
  sports: Kevin Castro plays pickup basketball at the Montgomery community center, follows the Alabama Crimson Tide football and the Atlanta Hawks, and participates in a local anglers’ club that meets for
    weekend fishing trips, preferring casual cardio and community sports over regimented gym routines.
  arts: Kevin Castro frequents downtown art galleries showcasing emerging street artists, streams indie bands like Tame Impala and classic rock icons such as Led Zeppelin, and shares their own digital sketches
    inspired by Shepard Fairey on social media, using these creative outlets to unwind after long drives.
  travel: Kevin Castro enjoys spontaneous road trips down the Gulf Coast—spending a weekend in Gulf Shores and a night under the stars in the Great Smoky Mountains—while they dream of a future cross‑country
    haul to Seattle, favoring flexible itineraries over rigid tour packages.
  culinary: Kevin Castro is a self‑taught grill enthusiast who loves devouring shrimp po’boys, birria tacos, and smoked brisket from local food trucks, seasoning with smoked paprika and lime, and they occasionally
    attempt to recreate these dishes at home with mixed results.
  core: Kevin Castro blends a restless curiosity for art and engines with a laid‑back, sometimes forgetful streak, juggling midnight brainstorming sessions for a future art‑logistics startup while they
    habitually misplace keys after each spontaneous road trip.
background:
  cultural: Kevin grew up in Brent, a small community in Bibb County, Alabama, within a white, Southern family. His upbringing was shaped by the region’s strong sense of community, where church gatherings,
    high school football games, and neighborhood barbecues were central to social life. The local culture emphasized hospitality, self‑reliance, and a deep respect for tradition, yet his high school’s modest
    arts program sparked an early appreciation for visual arts and music. This blend of Southern heritage and an openness to new ideas has fostered Kevin’s curiosity about diverse experiences while grounding
    him in the values of hard work, independence, and community engagement.
