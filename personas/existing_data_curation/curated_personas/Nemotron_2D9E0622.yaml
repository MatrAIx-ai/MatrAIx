  hobbies: '[''Marathon training (running)'', ''Weightlifting/strength training'', ''Competitive chess'', ''Toastmasters public speaking'', ''Hosting board game nights'', ''Fishing on Lake Michigan'', ''Seasonal
    hunting'', ''Craft‑beer tasting and brewery tours'', ''Custom PC building'', ''Raspberry Pi and maker projects'']'
  career_goals: Jeffrey aims to advance from senior systems analyst to IT manager within the next three years, leveraging his organizational strengths to lead cross‑functional technology initiatives. He
    plans to earn a PMP certification and TOGAF to deepen his project and enterprise architecture capabilities. Long‑term, he envisions guiding a regional digital transformation program or establishing
    his own consultancy that helps mid‑size Midwest businesses modernize IT infrastructure while maintaining cost efficiency. Financial stability and building a legacy of mentorship for younger analysts
    are also central to his ambition.
