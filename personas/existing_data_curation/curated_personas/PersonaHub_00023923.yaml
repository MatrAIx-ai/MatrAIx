persona_description: A researcher in the field of early childhood studies, particularly interested in the study of children's mobility practices and their role in the collective routine of walking in line
  in preschools. The individual is likely to be familiar with the theories on space, mobilities, and peer culture, and has conducted empirical research on walking in line in public spaces. They are also
  likely to have a background in video-ethnography and have a keen interest in understanding how children negotiate mobility practices and engage in embodied learning in the context of walking in line.
