  hobbies: '[''Abstract watercolor painting'', ''Sketching'', ''Reading (speculative fiction & philosophy)'', ''Attending art exhibitions'', ''Community theater acting & set design'', ''Salsa dancing'',
    ''Volunteer beach clean‑ups'', ''Playing bridge'', ''Trivia nights'', ''Gardening (native plants)'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Through volunteering and personal projects, Earl seeks to leave a lasting creative legacy in his community. He aims to establish a weekly senior art workshop at the local community center,
    where he can teach watercolor techniques and inspire artistic expression among peers. He also hopes to compile his autobiographical reflections and poems into a small chapbook, and to serve on the town
    council’s cultural affairs committee, advocating for more public art installations and senior‑friendly recreational programs. Additionally, he is interested in designing and selling a line of handcrafted
    wooden furniture, merging his craftsmanship with his love for functional art.
