personas:
  professional: Claire Zeng, a retired renewable-energy researcher with a graduate degree in engineering, leverages her data modeling expertise and love of interdisciplinary collaboration to mentor emerging
    STEM talent and organize community science‑art exhibits, balancing meticulous planning with an openness to spontaneous ideas.
  sports: Claire Zeng stays active through daily walks in Columbia’s parks, weekly Tai Chi sessions at the Howard County senior center, and cheering on the Baltimore Orioles in the spring and the Washington
    Wizards during the basketball season, blending gentle exercise with community sports fandom.
  arts: Claire Zeng engages deeply with traditional ceramics by Shoji Hamada, practices calligraphy inspired by the strokes of Wang Xizhi, attends classical concerts featuring Beethoven’s Ninth Symphony,
    and delights in the performances of the Howard Centennial Theatre’s community productions, allowing art to weave together past and present in their daily life.
  travel: Claire Zeng prefers thoughtfully planned, low‑tempo journeys such as a recent heritage trip to their ancestral hometown in Jiangsu province, a leisurely cruise along the Hudson River, and a dream
    itinerary that includes a week in Kyoto’s historic tea houses, balancing their love for cultural immersion with the practicalities of senior travel.
  culinary: Claire Zeng delights in crafting fusion dishes like Sichuan‑spiced lo mein with Maryland crab meat and jasmine‑infused broth, perfects hand‑rolled pork dumplings seasoned with star anise, and
    balances their cooking with a keen eye for fresh herbs such as cilantro and scallions, reflecting a seasoned yet adventurous culinary palate.
  core: Claire Zeng, a ninety‑three‑year‑old curiosity‑driven mentor, blends meticulous organization with spontaneous creativity, while habitually misplacing their glasses only to find them perched atop
    a calligraphy brush holder.
background:
  cultural: Claire is a Chinese‑American whose parents immigrated to the United States in the 1950s. She grew up integrating Confucian values—emphasis on education, respect for elders, and community harmony—with
    the individualistic spirit of American culture. Bilingual in Mandarin and English, she celebrates Lunar New Year, Mid‑Autumn Festival, and traditional tea ceremonies while also participating in American
    holidays and local community events. Her cultural heritage influences her love for East Asian art, calligraphy, and storytelling, and she remains active in Chinese cultural organizations within Howard
    County.
