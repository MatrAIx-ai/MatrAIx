    response and accident reporting'', ''Inventory tracking with handheld scanners'', ''Time management with flexible scheduling'', ''Problem-solving under pressure'', ''Communication with dispatch, clients,
    and crews'', ''Basic mechanical troubleshooting'']'
  hobbies: '[''Fishing on the St. Johns River'', ''Exploring local seafood restaurants and food trucks'', ''Listening to travel and road‑trip podcasts'', ''Reading memoirs of itinerant writers'', ''Gardening
    (vegetables and herbs)'', ''Watching Jacksonville Jaguars games'', ''Karaoke with friends'', ''Community clean‑up volunteer work'', ''DIY home improvement projects'', ''Collecting vintage road maps'']'
  career_goals: Anita’s next career step is to transition from a driver‑sales hybrid role into a supervisory logistics position within her company. She aims to earn the Certified Transportation Professional
    (CTP) credential and master advanced fleet‑management software, positioning herself for a logistics manager role. Over the next five years she hopes to lead a team of drivers, develop route‑planning
    strategies that reduce fuel costs, and mentor new entrants to the trucking industry. Her long‑term ambition is to launch a family‑run local delivery service that combines her love of driving with her
    sales acumen, offering same‑day delivery for small businesses in the Jacksonville metro area. This goal balances her desire for greater financial stability with the flexibility she values for family
    time.
