personas:
  professional: Anita Hampton blends a decade of hands‑on truck‑driving expertise with sales acumen, using her curiosity for route‑optimization software and telematics to keep deliveries on time while her
    relaxed, sometimes disorganized planning style makes her a go‑to problem‑solver, and she aims to move into a logistics supervisory role.
  sports: Anita Hampton spends her weekends casting lines on the St. Johns River and staying fit by jogging with the Jacksonville Running Club, cheers loudly for the Jacksonville Jaguars and the Jacksonville
    Jumbo Shrimp, and joins a local recreational softball league each summer, balancing a relaxed approach to exercise with occasional competitive drive.
  arts: Anita Hampton stitches her love of coastal life into evenings of karaoke where they belt out Jimmy Buffett and Dolly Parton, attends occasional live shows featuring an Allman Brothers Band tribute,
    and fills downtime listening to storytelling podcasts by Steve Earle, letting music fuel their narrative‑rich road‑trip fantasies.
  travel: Anita Hampton plans road‑trip adventures with a mix of spontaneity and modest budgeting, having already driven the scenic route to the Florida Keys, trekked historic Savannah, and day‑tripped
    to Charleston, while they dream of a weekend escape to the Bahamas and a springtime bike tour along the Gulf Coast.
  culinary: Anita Hampton is a confident home cook who perfects shrimp etouffée with fresh crawfish tail and okra, grills catch‑of‑the‑day fish tacos with mango‑salsa and cilantro, and never passes a food‑truck
    serving conch ceviche, while they record favorite seafood joints in a handwritten log that doubles as a menu for friends.
  core: Anita Hampton is a curious, road‑loving logistics pro who balances a relaxed, sometimes scattered lifestyle with a fierce drive to mentor the next generation of truckers, and they never miss a chance
    to share a fishing story.
background:
  cultural: Anita grew up in a middle‑class white family in the Jacksonville area, attending a public high school where she earned her driver’s license and developed an early interest in automobiles. Her
    family’s Southern roots are reflected in a strong work ethic, a love of outdoor activities, and a respect for community traditions such as church gatherings and neighborhood barbecues. Although she
    did not pursue college, she has continued learning through on‑the‑job training and adult‑education workshops, a testament to her practical curiosity. Her cultural identity blends a classic Floridian
    coastal lifestyle—beaches, fishing, and a laid‑back tempo—with the pragmatic mindset of a working‑class professional. She values independence, self‑reliance, and loyalty to family, while also appreciating
    the cultural diversity of Jacksonville’s growing population through daily interactions with clients and coworkers from various backgrounds.
attributes:
  skills: '[''Commercial Driver License (CDL)'', ''Long-haul and local delivery driving'', ''Vehicle inspection and basic maintenance'', ''Route optimization software'', ''GPS navigation and telematics'',
