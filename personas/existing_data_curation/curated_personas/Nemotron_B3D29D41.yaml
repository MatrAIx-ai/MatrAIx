  hobbies: '[''Birdwatching'', ''Nature photography'', ''Reading (art monographs, biographies, speculative fiction)'', ''Collecting vintage jazz/blues vinyl'', ''Maintaining a vegetable garden'', ''Playing
    harmonica'', ''Writing memoirs and genealogy scrapbook'', ''Chess (senior club)'', ''Attending local lectures'', ''Home brewing'', ''Listening to classical and experimental music'']'
  career_goals: Although retired, Guy is focused on legacy‑building and continued learning. He aims to finish a comprehensive family genealogy book that can be shared with his grandchildren and archived
    online. He plans to refine advanced digital‑photography techniques and curate a small exhibition of his nature images at the local community center. He aspires to learn conversational French through
    online courses, adding a new cultural dimension to his curiosity. Maintaining physical health through gardening and daily walks is a priority to preserve independence. He also hopes to write a series
    of reflective essays on art criticism for the local newspaper and volunteer as an informal mentor for the high‑school art club, sharing his critical eye and unconventional perspectives.
