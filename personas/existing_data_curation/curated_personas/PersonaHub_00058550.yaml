persona_description: A technology enthusiast who is interested in the latest developments in small cell technology, specifically in the areas of edge-based intelligence, licensed spectrum, and operator-managed
  systems. They are looking for information on the benefits of small cells for improving cellular coverage, capacity, and applications in homes, enterprises, metropolitan, and rural public spaces. They
  are also interested in the technology agnostic and independent nature of the Small Cell Forum and its goals of promoting adoption, creation of open standards, and development of an ecosystem of small
  cell providers. They are eager to learn about the Forum's three main aims and how they can contribute to the industry's innovation.
