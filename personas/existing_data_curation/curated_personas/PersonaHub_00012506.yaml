persona_description: Gaston Maspero, a French Egyptologist and director general of excavations and antiquities for the Egyptian government, responsible for locating a collective royal tomb of prime historic
  importance. His expertise includes teaching Egyptian language, archaeological missions, museum work, and the excavation of the pyramids at Ṣaqqārah. Maspero's writings include Histoire ancienne des peuples
  de l’Orient classique, L’Archéologie égyptienne, Les Contes populaires de l’Égypte ancienne, and Causeries d’Égypte. His second, long tenure as director general (1899–1914) regulated excavations, tried
  to prevent illicit trade in antiquities, sought to preserve and strengthen monuments, and directed the archaeological survey of Nubia. Maspero's unique contributions include his suspicion that a royal
  tomb had been discovered by grave robbers, which led to the apprehension of a thief who revealed a tomb secreted in a cliff near Dayr al-Baḥrī, containing 40 mummies, including those of the pharaohs Seti
  I, Amenhotep I, Thutmose III, and Ramses II, in inscribed sarcophagi, as well as a profusion of decorative and funerary artifacts.
