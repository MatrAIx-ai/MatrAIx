  hobbies: '["Medical illustration", "Digital painting", "3D printing of anatomical models", "Speculative fiction reading", "Indie film watching", "Board games (e.g., Settlers of Catan)", "Fusion cooking",
    "Hiking", "Yoga/meditation", "Volunteer work at health fairs"]'
  career_goals: Qing aims to advance from surgical technologist to a certified surgical first assistant, eventually taking on leadership roles such as operating room manager or educator. He plans to obtain
    advanced certifications (e.g., Certified Surgical First Assistant) and pursue a master’s degree in biomedical engineering to deepen his expertise in medical device innovation. His long‑term ambition
    is to bridge his technical and artistic talents by developing cutting‑edge surgical tools and simulations, contributing to 3D‑printed training models, and creating visual educational resources for patients
    and staff. He also hopes to mentor aspiring technologists, share his passion for creativity in medicine, and present his work at national conferences.
