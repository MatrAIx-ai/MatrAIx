  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Local History Research'', ''Book Club'', ''Hiking'', ''Community Festival Participation'', ''Historical Society Volunteering'', ''Knitting'',
    ''Southern Cooking'', ''Watercolor Painting'']'
  career_goals: She aims to transition the community association she oversees into a model of sustainable and resident‑focused management, implementing energy‑efficiency upgrades and stronger financial
    reserves. Over the next five years, Maria hopes to mentor a junior property manager to ensure continuity, and she plans to earn a Certified Property Manager (CPM) designation. Ultimately, she envisions
    stepping back into a consultancy role, helping neighboring districts improve their property and HOA practices while maintaining a balanced workload that allows more time for family and personal interests.
