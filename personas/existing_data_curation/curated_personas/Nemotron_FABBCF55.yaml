personas:
  professional: Maria Causey, a veteran property manager in the Bristol, VA area, blends three decades of lease‑negotiation, budgeting, and regulatory‑compliance expertise with a practical, structure‑loving
    mindset, yet their relaxed attitude toward obligations lets them adapt schedules flexibly while maintaining a cooperative but assertive presence in tenant disputes.
  sports: Maria Causey stays fit by joining the local senior walking club for weekly hikes along the Blue Ridge trails, roots for the Washington Nationals during baseball season, and occasionally participates
    in community pickleball games at the town recreation center.
  arts: Maria Causey channels creative energy into watercolor landscapes of the countryside, collects historical fiction by authors like Philippa Gregory and Ken Follett, and enjoys listening to Appalachian
    folk singer Joan Baez and classic films starring Meryl Streep.
  travel: Maria Causey favors low‑key road trips that combine historic towns and natural beauty, having explored the Shenandoah Valley, Savannah’s historic district, and a recent wish to wander the streets
    of Asheville, while budgeting travel around a modest retirement income.
  culinary: Maria Causey delights in cooking Southern staples such as shrimp and grits, collard greens flavored with fresh garden thyme, biscuits, and peach cobbler, showcasing a middling kitchen skill
    that shines when using home‑grown herbs like rosemary and basil, yet they sometimes forget to label leftovers, leading to occasional food waste.
  core: Maria Causey balances a love for meticulous planning with a relaxed, sometimes disorganized outlook, sprinkling daily life with garden‑centered hobbies, cooperative community work, and a penchant
    for splurging on festival treats.
background:
  cultural: Maria was raised in a middle‑class family in southwestern Virginia, steeped in Southern hospitality and a strong sense of community. Her upbringing emphasized respect for tradition, church involvement,
    and participation in local events such as county fairs and bluegrass gatherings. The region’s Appalachian heritage shaped her appreciation for folk music, storytelling, and preservation of historic
    sites. Her education in the humanities reinforced a love for literature, history, and the arts, which she integrates into her community work and personal life.
attributes:
  skills: '[''Property Management'', ''Lease Negotiation'', ''Tenant Relations'', ''Budgeting and Financial Reporting'', ''Maintenance Coordination'', ''Regulatory Compliance'', ''HOA Governance'', ''Community
