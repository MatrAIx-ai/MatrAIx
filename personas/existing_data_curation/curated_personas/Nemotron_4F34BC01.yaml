personas:
  professional: Arundhati Bajwa, a driven art club leader and budding graphic design student, channels their meticulous project coordination skills and Adobe expertise into curating campus visual exhibitions,
    while their curious, sociable nature fuels collaborative brainstorming and assertive decision‑making.
  sports: Arundhati Bajwa embraces outdoor fitness by hiking the nearby Appalachian trails each weekend, practices yoga three times a week, and cheers on the Toronto Raptors and Vancouver Canucks while
    playing for a local mixed‑gender intramural soccer club called the Fredericton Firebirds.
  arts: Arundhati Bajwa immerses themselves in contemporary art by visiting galleries showcasing works by Yayoi Kusama and Banksy, sketches urban landscapes inspired by the photography of Henri Cartier‑Bresson,
    and regularly attends live performances of musicians like Kacey Musgraves and theater productions of "Hamilton."
  travel: Arundhati Bajwa prefers meticulously planned cultural trips, having explored the historic streets of Edinburgh during its arts festival, savored the street food markets of Bangkok on a backpacking
    adventure, and dreaming of a future study abroad stint in Florence to study Renaissance art, all while budgeting carefully on a student allowance.
  culinary: Arundhati Bajwa enjoys mastering traditional butter chicken and sarson da saag at home, often experimenting with quinoa‑based fusion bowls and adding ingredients like smoked paprika and kale,
    while they frequent local farmers' markets for fresh herbs and occasionally indulge in upscale sushi rolls at the downtown bistro.
  core: Arundhati Bajwa is a hyper‑organized art enthusiast who blends disciplined project leadership with spontaneous creativity, often juggling multiple club events while secretly habit‑forming a nightly
    habit of scrolling through meme pages before bed.
background:
  cultural: Arundhati comes from a Punjabi Sikh family that emigrated from the Punjab region of India to the United States before she was born. Raised in New Brunswick, NJ, she grew up navigating both Indian
    cultural traditions—celebrating Vaisakhi, Diwali, and participating in Gurdwara services—and typical American suburban life. She is bilingual in English and Punjabi and maintains strong ties to the
    local South Asian community through family gatherings, cultural events, and community service. Her heritage influences her artistic sensibilities, evident in her appreciation for vibrant colors, intricate
    patterns, and storytelling in visual media.
