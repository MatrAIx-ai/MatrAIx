  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Photography'', ''Attending live music and theater performances'', ''Participating in cultural festivals'',
    ''Organizing art club events'', ''Cooking Punjabi and fusion cuisine'', ''Yoga'', ''Hiking'', ''Volunteering as an art workshop facilitator'']'
  career_goals: Arundhati plans to transfer to a four‑year university to obtain a Bachelor of Fine Arts in Graphic Design with a focus on visual communication and arts administration. She aims to combine
    her passion for art with her disciplined, achievement‑driven mindset, ultimately seeking a role as a creative director or arts program manager for a cultural nonprofit. In the long term, she hopes to
    launch a community arts initiative in New Brunswick that offers workshops and exhibition space for emerging South Asian artists, and she aspires to earn a Master’s degree in Arts Management to deepen
    her expertise.
