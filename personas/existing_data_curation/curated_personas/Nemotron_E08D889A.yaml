personas:
  professional: Kimngan Sou is an aspiring marine explorer who loves sorting shells and marine life pictures, using their love for structure to create tidy displays, and they eagerly share their findings
    with classmates during playtime.
  sports: Kimngan Sou enjoys splashy fun at the local family pool where they participate in the Dolphin Tots swim class, cheer loudly for the Miami Dolphins on game days, and they love sprinting in the
    sand with their preschool soccer squad, the Shoreline Strikers.
  arts: Kimngan Sou delights in crafting colorful origami cranes during Lunar New Year, dancing to the upbeat tunes of Disney's Let It Go and the playful melodies of children's singer Raffi, and they proudly
    display their crayon-filled masterpieces on the refrigerator.
  travel: Kimngan Sou loves short family getaways, especially building sandcastles on Fort Walton Beach and exploring the rides at Disney World in Orlando, and they dream of flying to Tokyo to see the towering
    cherry blossoms and taste real dumplings someday.
  culinary: Kimngan Sou favors sweet rice cakes during Lunar New Year celebrations, adores crunchy chicken nuggets with honey mustard at school lunch, enjoys helping mix batter for banana pancakes, and
    they are always on the lookout for a new flavor of strawberry-filled dumpling in the neighborhood market.
  core: Kimngan Sou blends a love for tidy playrooms, energetic group games, and cultural celebrations with occasional sticker-splurges and a habit of hiding pocket change, crafting a bright, organized,
    and delightfully curious outlook on life.
background:
  cultural: Kimngan comes from an East Asian family that maintains cultural traditions while living in Fort Walton Beach, Florida. At home, she hears the family’s native language and celebrates Lunar New
    Year with traditional foods like dumplings and rice cakes. The family blends cultural practices with local life, taking frequent trips to the beach where Kimngan learns about marine environments. Her
    parents encourage bilingual exposure and incorporate cultural stories and songs into bedtime routines, fostering a sense of heritage alongside her American upbringing.
attributes:
  skills: '["counting to ten", "recognizing colors and shapes", "basic puzzle solving", "drawing simple pictures", "following short instructions", "cooperative play", "singing children’s songs", "basic
