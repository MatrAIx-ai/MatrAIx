  hobbies: '["building with Duplo blocks", "drawing and coloring", "listening to and singing children’s songs", "dancing", "playing group games (e.g., Duck, Duck, Goose)", "sandcastle building at the beach",
    "collecting seashells", "simple arts‑and‑craft projects (e.g., paper lanterns)"]'
  career_goals: Kimngan loves helping her friends and often says she wants to be a teacher or a caregiver when she grows up, because she enjoys sharing what she knows and seeing others learn. She also expresses
    a budding fascination with marine life after beach trips, dreaming of being a marine biologist who can explore the ocean and protect sea creatures.
