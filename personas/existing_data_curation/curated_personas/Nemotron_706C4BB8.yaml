  hobbies: '["Gardening", "Knitting and quilting", "Reading classic literature", "Book discussion groups", "Volunteering at historical society", "Walking nature trails", "Crossword puzzles", "Listening
    to classic radio dramas", "Church attendance"]'
  career_goals: Although retired, Madison sets clear, attainable goals to stay mentally active and socially connected. She aims to complete a memoir of her life and family stories before turning 85, to
    lead the senior book club at the Morrisville community center for the next five years, and to organize an annual home-coming exhibition for the Bucks County Historical Society. She also strives to maintain
    a daily wellness routine that reduces anxiety, to mentor younger volunteers in event coordination, and to ensure her husband enjoys a comfortable, stress-free lifestyle.
