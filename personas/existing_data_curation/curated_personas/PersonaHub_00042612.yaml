persona_description: A scientist and researcher who specializes in the study of ion channels, particularly the mechanisms of ion channel activation by temperature and mechanical stimulation. The individual
  aims to identify the structures and mechanism that underlie temperature-activation and mechanical-activation of ion channels, with a focus on Piezos, a novel gene family that induces mechanical-sensitive
  cationic currents to various cell types. The research is expected to contribute to the development of efficient and specific drugs for pharmaceutical targets, such as TRP channels.
