personas:
  professional: Hyo Tang is a project management veteran in education innovation, blending agile methodology with art-integrated curriculum design, and their spontaneous, harmony-seeking nature drives collaborative,
    flexible workshops while occasionally slipping on strict deadlines.
  sports: Hyo Tang is a casual fan of the Seattle Seahawks and Portland Timbers, hikes with the Northwest Hiking Club in the Cascades during summer, practices yoga thrice weekly, and swaps seasonal snowshoeing
    for indoor cardio during winter, blending team spirit with personal fitness.
  arts: An avid gallery-hopper, Hyo Tang draws inspiration from the immersive installations of Yayoi Kusama and the street-wise wit of Banksy, paints vibrant acrylic abstracts in a home studio while strumming
    the ukulele to the mellow chords of Jack Johnson, and volunteers at local youth arts workshops where they mentor budding creators.
  travel: Passionate about both spontaneous escapes and carefully curated itineraries, Hyo Tang has trekked the misty trails of Olympic National Park, explored the temples of Kyoto, and dreams of a retreat
    in Lisbon's Alfama district, balancing weekend road trips with a modest travel budget and occasional family commitments.
  culinary: Hyo Tang, an intermediate home cook, delights in crafting fusion plates such as gochujang-glazed salmon with rosemary potatoes and kimchi-infused tacos, frequently sources fresh market herbs
    and fermented sauces, and savors dining out at modern Asian-Pacific restaurants that showcase innovative plating.
  core: Balancing a curiosity for art and technology with a spontaneous work style, Hyo Tang harmonizes community-focused leadership while occasionally bagging deadlines in a whirlwind of acrylic paint
    splatters and ukulele chords.
background:
  cultural: Born into an East Asian family (of Korean heritage), Hyo grew up valuing education, community harmony, and respect for elders. She celebrates traditions such as Lunar New Year and incorporates
    Korean language and culinary customs into her daily life. Living in Vancouver, WA, she blends these roots with the multicultural fabric of the Pacific Northwest, often drawing on East Asian philosophies
    of balance and mindfulness to inform her professional and personal choices.
attributes:
  skills: '[''Project Planning'',''Stakeholder Engagement'',''Curriculum Design'',''Workshop Facilitation'',''Agile & Kanban Methodologies'',''Cross-cultural Communication'',''Risk Management'',''Data-driven
    Evaluation'',''Learning Management Systems (Moodle, Canvas)'',''Korean-English Bilingual'',''Creative Problem Solving'',''Conflict Mediation'',''Art Integration in Education'']'
  hobbies: '[''Visiting art galleries and museums'',''Acrylic painting'',''Creative writing'',''Reading contemporary non-fiction'',''Yoga and meditation'',''Hiking in the Pacific Northwest'',''Cooking fusion
    cuisine'',''Playing the ukulele'',''Volunteering with youth arts programs'',''Traveling to cultural sites'']'
  career_goals: Hyo aims to transition into a senior leadership role such as Director of Educational Innovation, where she can steer large-scale, interdisciplinary projects that embed art and technology
    into community learning. She also envisions launching a non-profit program that provides under-served youth access to creative arts education, and she seeks to mentor emerging project managers while
    refining her own organizational strategies to meet deadlines more consistently.
