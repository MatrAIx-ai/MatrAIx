  career_goals: Jose aims to move from his current cashier role into a supervisory position, such as assistant store manager, within the next two years. He plans to enroll in a part-time Business Administration
    program to earn a bachelor’s degree, positioning himself for a future store manager or regional operations role. Additionally, he hopes to combine his passion for art and his Costa Rican heritage by
    eventually opening a small café that showcases local artwork and serves specialty coffee, creating a cultural hub in his community.
