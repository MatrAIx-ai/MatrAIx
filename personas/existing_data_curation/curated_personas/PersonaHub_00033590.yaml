persona_description: Albert Einstein, a renowned theoretical physicist and philosopher of science, known for his contributions to the development of modern physics, particularly his work on the general
  theory of relativity. He is best known for his mass–energy equivalence formula E = mc2, which has been dubbed "the world's most famous equation". Einstein received the 1921 Nobel Prize in Physics for
  his "services to theoretical physics", in particular his discovery of the photoelectric effect, a pivotal step in the evolution of quantum theory.
