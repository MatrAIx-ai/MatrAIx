  hobbies: '["Soccer","Tag and capture‑the‑flag games","LEGO building","Reading adventure and animal books","Simple science experiments (slime, volcanoes)","Nature walks and rock/leaf collection","Gardening
    with family","Community art workshops","Dance classes","School science club"]'
  career_goals: Awatif dreams of turning her curiosity into a future career that blends hands‑on creation with helping living things. She hopes to become a wildlife biologist who explores forests and rivers,
    a mechanical engineer who designs fun, safe playground equipment, and one day an astronaut who discovers new worlds. In the near term she wants to lead a school science club, win a regional soccer tournament,
    and help her community build a small garden space where children can learn about nature.
