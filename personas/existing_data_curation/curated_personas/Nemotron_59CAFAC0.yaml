  hobbies: '[''Model building'', ''Arduino/electronics tinkering'', ''Introductory game development'', ''Strategy video gaming'', ''Reading (science‑fiction & engineering non‑fiction)'', ''Acoustic guitar'',
    ''Hiking'', ''Community library tech volunteer'']'
  career_goals: Preston aims to graduate high school with a solid foundation in STEM, taking advanced shop and computer science classes. In the short term, he plans to earn a CompTIA A+ certification and
    join his school's robotics club to build hands‑on experience. He hopes to attend Purdue University or a community college to study mechanical engineering or automotive technology, ultimately securing
    a stable career as a design engineer or skilled technician. He also envisions opening a small workshop where he can design and repair custom mechanical projects, blending his love of practical work
    with creative problem‑solving.
