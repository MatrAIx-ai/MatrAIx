personas:
  professional: A budding engineer named Preston Raff, a 15‑year‑old high‑school student, blends a love for model airplanes, Arduino tinkering, and simple game coding into a self‑directed portfolio of hands‑on
    projects, while volunteer work at the community library’s tech help desk sharpens their troubleshooting skills and reveals a pragmatic, structure‑seeking mind that still thrives on flexible, solitary
    creation.
  sports: The solitary yet adventurous Preston Raff enjoys weekend hikes with a small group of friends on local trail networks, belongs to the neighborhood "Trailblazers" hiking club, and follows the hometown
    high school soccer team while also keeping an eye on the NBA’s Golden State Warriors and the MLB’s New York Yankees, though they rarely participate in organized team sports themselves.
  arts: Preston Raff finds creative release strumming acoustic guitar with a repertoire that includes classics like "Blackbird" by The Beatles and contemporary folk hits such as "Skinny Love" by Bon Iver,
    while their reading list is peppered with Frank Herbert’s Dune and the technical non‑fiction "The Design of Everyday Things," and they quietly appreciate indie films by directors like Christopher Nolan
    and musicians like Tame Impala during quiet evenings.
  travel: Preston Raff prefers low‑key, nature‑focused travel, having explored nearby national parks such as Yosemite’s Mist Trail and dreaming of a summer road‑trip to the Pacific Northwest to visit Seattle’s
    tech museums, while they tend to plan these escapes in a loosely organized notebook, balancing a desire for adventure with the practical limits of a teenage allowance and school schedule.
  culinary: The fifteen‑year‑old Preston Raff enjoys straightforward, energy‑rich meals like homemade ramen with sliced pork, soft‑boiled egg, and scallions, as well as crafting trail‑ready granola bars
    featuring rolled oats, honey, and almonds, while their cooking skill sits at an intermediate level—confident in assembling quick dishes but they are still prone to burning toast during late‑night gaming
    sessions.
  core: Preston Raff is a pragmatic teen tinkerer who turns solitary tech projects into creative outlets, balances a laid‑back spending habit with modest savings, manages mild allergies and acne with occasional
    discipline lapses, and finds solace in hiking, guitar, and indie sci‑fi while they occasionally forget to finish chores.
background:
  cultural: Preston was raised in West Lafayette, Indiana, a predominantly white, middle‑class community that blends a traditional Midwestern small‑town atmosphere with the academic presence of Purdue University.
    His family values practicality, self‑reliance, and community involvement, typical of the region. He grew up participating in local 4‑H and community service programs, which emphasized hands‑on learning
    and modesty. The proximity to the university exposed him to STEM outreach events and a culture of curiosity, shaping his interest in engineering and technology while reinforcing the Midwestern ideals
    of hard work and collegiality.
attributes:
  skills: '[''Mechanical repair (bicycles, small engines)'', ''Basic computer hardware troubleshooting and assembly'', ''Introductory Python programming'', ''Practical problem solving'', ''Calm under pressure'',
