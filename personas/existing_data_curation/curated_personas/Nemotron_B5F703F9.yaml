personas:
  professional: James Singleton is an aspiring junior inventor who merges their love for drawing fantastical creatures with hands‑on experiments in the school science club, and they often translate spontaneous
    sketch ideas into LEGO prototypes that showcase a creative, unstructured problem‑solving style.
  sports: James Singleton is a lively forward on the Columbia Youth Soccer League's 'Mizzou Minors' team, and they cheer on the Kansas City Chiefs and St. Louis Cardinals during game nights, channeling
    their competitive edge into every practice and match.
  arts: James Singleton spends weekends sketching dragons and nebulae, drawing inspiration from Hayao Miyazaki's vivid animation and Ariana Grande's energetic pop beats, and they regularly attend the Columbia
    Arts & Music Festival to meet local illustrators and explore the Museum of Art and Natural History's dinosaur exhibit.
  travel: James Singleton prefers family road trips that blend outdoor adventure—like biking the trails of Ha Ha Tonka State Park—with museum excursions, such as a day at the Smithsonian National Air and
    Space Museum, while dreaming of a future visit to Space Center Houston to see real rockets.
  culinary: James Singleton loves cheesy pepperoni pizza and dinosaur‑shaped chicken nuggets, and they can expertly assemble a peanut‑butter‑and‑jelly sandwich while proudly adding a splash of ketchup to
    their mac and cheese, relishing the aroma of fresh‑baked cookies from the family kitchen.
  core: James Singleton is a curious, art‑obsessed eight‑year‑old whose boundless imagination fuels a love of space‑themed sketches, spontaneous LEGO builds, and a competitive streak that makes every soccer
    game feel like a quest for glory, even as they sometimes forget to finish homework.
background:
  cultural: James grows up in Columbia, Missouri, a mid‑sized college town in the American Midwest. His family lives in a suburban neighborhood where community events, such as the annual Columbia Arts &
    Music Festival, are common. The presence of the University of Missouri provides access to museums, science talks, and diverse cultural programs that fuel his curiosity. He attends a public elementary
    school that emphasizes both core academics and creative arts, and many of his peers share a similar Midwestern background, valuing friendliness, modesty, and a strong work ethic. Although his ethnic
    background is white, his environment includes exposure to a variety of cultures through university events, international food fairs, and school diversity initiatives.
