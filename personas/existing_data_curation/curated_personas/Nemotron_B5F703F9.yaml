  career_goals: James dreams of a future where he can blend his love of art and science. He imagines becoming an astronaut who sketches the cosmos, a video‑game designer who builds immersive worlds, or
    a professional soccer player who competes at the highest level. He wants a career that allows him to explore new ideas, create visually striking work, and be recognized as one of the best in his field,
    while also finding a supportive environment that helps him manage his worries.
