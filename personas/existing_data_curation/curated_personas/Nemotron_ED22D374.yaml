personas:
  professional: Keith Avant, a 23‑year‑old retail sales specialist in a Michigan department store, leverages their methodical organization, calm conflict‑resolution style, and keen eye for visual merchandising—shaped
    by a love of contemporary art—to drive sales, mentor new staff, and pursue an assistant‑manager position within two years.
  sports: Keith Avant, a weekend jogger in Southgate’s parks and occasional pick‑up basketball player with the Southgate Hawks, follows the Detroit Tigers, Lions and Red Wings closely, and they also belong
    to the Detroit Road Runners club for structured training during the spring and fall.
  arts: Keith Avant, who spends his free time roaming the Detroit Institute of Arts and local galleries to absorb the work of outsider painter Henry Darger and minimalist Agnes Martin, captures urban scenes
    on 35 mm film inspired by Henri Cartier‑Bresson, and they unwind with vinyl spins of David Bowie and The Velvet Underground while sketching line drawings in a pocket sketchbook.
  travel: Keith Avant, who favors low‑cost road trips and meticulously planned itineraries, regularly explores Michigan’s Upper Peninsula and the Ann Arbor Art Fair, has a bucket‑list entry for Berlin’s
    street‑art districts, and they hope to someday trek the Pacific Northwest’s coastal highways on a weekend adventure.
  culinary: Keith Avant, a casual home cook who favors minimalist, season‑forward meals such as herb‑roasted chicken with lemon‑zest quinoa and caramelized carrots, often adds a pinch of smoked paprika,
    indulges in Detroit‑style pizza, occasionally prepares pierogi for friends during holiday gatherings, and they savor a well‑brewed espresso from a local café after a long shift.
  core: Keith Avant, a quietly ambitious 23‑year‑old who blends a Midwestern work ethic with an obsessive love of analog photography, vinyl jazz, and meticulously organized visual displays, often juggles
    a spreadsheet of inventory while sketching minimalist line art in store break rooms, and they habitually over‑plan weekend photo outings, sometimes to the point of missing spontaneous moments.
background:
  cultural: Keith was raised in Southgate, a suburban community in Wayne County, Michigan, within a predominantly white, middle‑class, working‑class environment. His family background includes German and
    Polish ancestry, typical of many Detroit‑area families. The region's industrial heritage and proximity to Detroit’s vibrant art scene have given him an appreciation for both practicality and creativity.
    He grew up in a close‑knit neighborhood where community events, high school sports, and local festivals were common, fostering a grounded, cooperative outlook while his Midwestern upbringing emphasized
    reliability, modesty, and calm resilience.
attributes:
  skills: '["Customer service", "Effective communication", "Conflict resolution", "Point-of-sale system operation", "Cash handling", "Inventory management", "Visual merchandising", "Staff training", "Basic
    graphic design (Adobe Photoshop)", "Photography composition"]'
  hobbies: '["Visiting art galleries and museums", "Analog photography", "Sketching and painting", "Reading speculative fiction and philosophy", "Jogging in local parks", "Playing strategic board games
    with close friends", "Listening to vinyl records", "Exploring local coffee shops"]'
  career_goals: Keith aims to advance within retail management, targeting an assistant store manager position within the next two years and eventually becoming a store manager and district manager. He aspires
    to leverage his organizational strengths and artistic sensibility to lead visual merchandising initiatives. Long‑term, he hopes to open a boutique that blends curated clothing with local artwork, and
    he plans to pursue part‑time studies in Business Administration to support that goal.
