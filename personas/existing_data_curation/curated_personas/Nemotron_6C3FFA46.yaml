    with LEGO and magnetic tiles'', ''basic coding with Scratch'', ''Mandarin calligraphy'', ''small reading circle participation'']'
  career_goals: Kim dreams of becoming a children's author‑illustrator who can bring imaginative worlds to life on the page and screen. She hopes to combine her love for art, story, and simple coding to
    create interactive picture books or animated shorts that teach friendship and harmony. Over the long term, she envisions studying visual arts and digital media, eventually working as a multimedia storyteller
    or educational game designer who inspires other kids to explore creativity and curiosity.
