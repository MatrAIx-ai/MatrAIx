personas:
  professional: Kim Peng, a 9‑year‑old aspiring visual storyteller, blends imaginative drawing, beginner Scratch animation, and careful LEGO engineering into comic‑strip adventures that teach marine science,
    while their quiet curiosity and organized approach ensure they meet school art project deadlines on time.
  sports: Kim Peng enjoys beginner surf lessons at Half Moon Bay, explores tide pools with the local junior marine club, plays forward on the Half Moon Bay Youth Soccer team, and passionately follows the
    San Francisco Giants and Golden State Warriors.
  arts: Kim Peng spends weekends drawing fantastical sea‑creatures inspired by Studio Ghibli’s “Princess Mononoke,” practices piano pieces by Debussy to set the mood for their comic narratives, refines
    traditional brush‑style calligraphy with their grandmother, and collects sketches of coastal scenery reminiscent of East Asian landscape painters.
  travel: Kim Peng loves family road trips to the Monterey Bay Aquarium, weekend camping at Big Sur’s coastal trails, and dreaming of a future visit to the Ghibli Museum in Mitaka, Japan, preferring itineraries
    that blend ocean exploration with cultural storytelling.
  culinary: Kim Peng enjoys rolling pork dumplings with their grandmother during Lunar New Year, loves the salty‑sweet taste of seaweed‑wrapped sushi rolls, experiments with simple stir‑fry using ginger,
    garlic, and soy sauce, and occasionally over‑seasones their ramen, a habit they’re learning to balance.
  core: Kim Peng, a 9‑year‑old quiet dreamer, merges ocean‑inspired art, disciplined allowance habits, and a love for tiny adventures into a uniquely organized yet imaginative outlook.
background:
  cultural: Kim is raised in a Chinese‑American household where both English and Mandarin are spoken at home. Her family celebrates Lunar New Year with traditional foods, lanterns, and storytelling, while
    also embracing coastal Californian holidays like the Half Moon Bay Art & Pumpkin Festival. Her parents value education, kindness, and community harmony, encouraging her to help with family gatherings
    and to consider others' feelings. She learns Chinese calligraphy from her grandmother, enjoys cooking simple dishes such as dumplings, and integrates the aesthetic of East Asian brush art into her own
    drawings. Growing up in Half Moon Bay, Kim also feels a strong connection to the ocean, which blends her cultural heritage with the local environment to shape her worldview.
