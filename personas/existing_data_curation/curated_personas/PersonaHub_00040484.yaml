persona_description: A team of researchers and medical engineers from Monash University and Monash Health, collaborating with clinicians from Monash Partners Academic Health Science Centre, who are developing
  innovative solutions to mitigate the spread of COVID-19 in the healthcare setting. The team is working to adapt snorkel masks for respiratory therapy, develop modified CPAP ventilation masks, and optimize
  treatment protocols while minimizing the risk of viral spread. The research team includes experts in respiratory medicine, materials science, psychology, and physiology, and their work has the potential
  to improve health outcomes for critically ill patients and keep frontline healthcare staff safe.
