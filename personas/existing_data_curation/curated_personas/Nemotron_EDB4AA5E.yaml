personas:
  professional: Yaritza, a two‑year‑old who spends hours arranging her wooden blocks and toy kitchen utensils into neat rows, they already exhibit the disciplined organization and practical curiosity that
    foreshadow a future in design or engineering.
  sports: Yaritza, a two‑year‑old who gleefully splashes in her mom’s toddler swim class at the Long Beach community pool and toddles through mini‑kick soccer sessions with the Long Beach Little Kickers,
    they often wave a tiny Dodgers cap while cheering for the LA Lakers, displaying a gentle enthusiasm for movement that balances solitary play with brief group activity.
  arts: Yaritza, a two‑year‑old who loves humming the playful tunes of Sesame Street and giggling to the bright nursery‑rhythm of "Baby Shark" while proudly coloring scenes inspired by the animated works
    of Pixar and the gentle piano melodies of Ludovico Einaudi, they find that music and visual art are essential companions to their quiet imagination.
  travel: Yaritza, a two‑year‑old who prefers short, stroller‑friendly excursions and delights in sandy shoreline picnics at local Long Beach beaches, they have already enjoyed family trips to the San Diego
    Zoo and a breezy weekend getaway to Santa Barbara, and they dream of exploring the vibrant markets of Mexico City with their parents, reflecting a budding curiosity balanced by the comfort of familiar
    routines.
  culinary: Yaritza, a two‑year‑old who adores the soft, warm texture of mini chicken tacos topped with mild cheese and avocado slices, they reach eagerly for fresh mango chunks and sweet corn on the cob,
    and while still unable to cook, they proudly assist by stirring batter with a tiny wooden spoon and insist on sprinkling a pinch of cinnamon on their oatmeal, showcasing a developing palate that blends
    comfort foods with bright, fresh flavors.
  core: Yaritza, a two‑year‑old who blends meticulous block‑sorting with a love of sweet fruit snacks and a habit of humming nursery rhymes while quietly observing the world, they embody a uniquely disciplined
    curiosity tempered by occasional stubbornness over bedtime.
background:
  cultural: Yaritza is raised in a Mexican‑American household in Long Beach, California, where both Spanish and English fill the home. Family traditions such as Día de los Muertos altars, Las Posadas during
    Christmas, and weekly gatherings featuring tacos, tamales, and fresh fruit infuse her daily life with cultural richness. The diverse coastal community of Long Beach adds influences from various cultures,
    fostering an inclusive outlook while reinforcing her family's Mexican heritage. This bilingual, multicultural environment supports her language development, culinary preferences, and appreciation for
    communal harmony, all of which shape her identity and interpersonal values.
