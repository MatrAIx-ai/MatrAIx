  career_goals: Although Yaritza is only a toddler, her play often hints at future aspirations rooted in her caring and organized disposition. She frequently pretends to be a teacher, arranging her stuffed
    animals in a classroom‑like setting and 'giving lessons,' which suggests a budding interest in early childhood education. As she grows, she may aim to become a teacher, pediatric nurse, or community
    support worker—roles that combine her desire to help others, her love for structure, and her natural inclination toward harmonious interactions. Her disciplined nature may also guide her toward careers
    that value precision and routine, such as administrative support or library services.
