persona_description: A biologist who specializes in the study of rodents, particularly the biology and behavior of rats. Her research interests include, but are not limited to, the ecology and behavior
  of rats in urban and suburban environments, the impact of rats on human health and the economy, and the conservation and management of rat populations. She is also interested in the evolution and adaptation
  of rats, and how their behavior and ecology have evolved to adapt to their environment. She is passionate about the importance of protecting and preserving rat populations, and works to educate the public
  about the role of rats in the ecosystem and their value as a food source for predators.
