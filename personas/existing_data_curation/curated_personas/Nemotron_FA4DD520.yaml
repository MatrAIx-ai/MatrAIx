personas:
  professional: Marion Doucet, a 43‑year‑old grocery store cashier with over fifteen years of retail expertise, leverages precise cash handling, POS mastery, and calm conflict‑resolution skills to keep
    the checkout line moving while eyeing a supervisory role that will let them blend their practical, organized mindset with a natural flair for mentoring and stress‑reduction workshops.
  sports: Marion Doucet fuels their energetic lifestyle with Saturday hikes in Hocking Hills, weekly line‑dancing at the community center, and leading a cardio boot‑camp class at FitCo Gym, while cheering
    on the Cleveland Browns during football season and the Columbus Blue Jackets in the winter.
  arts: Marion Doucet brings storytelling to life on stage with the local community theater, devours mystery novels from Agatha Christie and Gillian Flynn, and finds inspiration in performances by the Cincinnati
    Symphony Orchestra and classic film noir marathons.
  travel: Marion Doucet prefers well‑planned weekend road trips to state parks like Shenandoah and the Great Smoky Mountains, but also dreams of a spring adventure to the Canadian Rockies, balancing budget
    constraints with a desire for scenic hikes and cultural festivals.
  culinary: Marion Doucet enjoys experimenting with farm‑to‑table recipes, often whipping up rosemary‑infused roasted chicken, homemade sourdough bread, and a signature rosemary‑chocolate chip pancake,
    while sourcing fresh herbs from their garden and occasionally over‑seasoning in the enthusiasm of trial.
  core: Marion Doucet is a socially vibrant, practical 43‑year‑old who juggles retail expertise, community theater, and a DIY spirit while battling stress‑induced worry and dreaming of a boutique future.
background:
  cultural: Marion grew up in a middle‑class, white, Midwestern family in Central Ohio, where community, hard work, and modesty were core values. The culture of Thornville and the surrounding Fairfield
    County emphasizes neighborly support, seasonal county fairs, and a strong sense of local identity rooted in agriculture and small‑town traditions. Her upbringing in a predominantly Protestant environment
    instilled an appreciation for community gatherings, holiday celebrations like Thanksgiving and Fourth of July parades, and a pragmatic, down‑to‑earth worldview. These cultural influences shape her friendly
    demeanor, collaborative spirit, and practical approach to both work and leisure.
attributes:
  skills: '["Cash Handling", "POS System Operation", "Customer Service", "Conflict Resolution", "Inventory Management", "Basic Bookkeeping", "Time Management", "Multitasking Under Pressure", "Adaptability
