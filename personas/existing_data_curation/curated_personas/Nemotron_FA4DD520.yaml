  hobbies: '["Line dancing", "Hiking in Hocking Hills", "Community theater acting", "Gardening", "DIY home projects", "Cooking and recipe experimentation", "Reading mystery novels", "Book club participation",
    "Volunteering at the food bank", "Fitness classes"]'
  career_goals: Marion aims to move into a supervisory role within the next two years, leveraging her hands‑on experience to oversee a team of cashiers and improve store operations. She plans to complete
    a part‑time certificate in Retail Management offered by a community college nearby, which will prepare her for a shift‑leader or department manager position. In the longer term, she hopes to open a
    small boutique that combines her love of local artisan products with her practical business sense, providing a stable income that supports her independence after the separation. She also wants to mentor
    younger employees and possibly lead a stress‑reduction workshop for frontline staff.
