persona_description: A scientist or engineer involved in the field of spectroscopy and semiconductor materials, particularly focused on the development and application of FTIR-spectroscopy for precise measurements
  of concentration levels in materials like aluminum-doped silicon. They are likely to be interested in the details of the experiment performed by the CiS Research Institute for Microsensor Systems and
  Photovoltaics in Erfurt, Germany, including the use of a Cryostation to cool the sample down to 10 K for the measurement of aluminum concentration. They may also be interested in the technical details
  of the spectrograph used, such as the proprietary Tensor 27 from Bruker and the use of a Cryostation to control the sample temperature.
