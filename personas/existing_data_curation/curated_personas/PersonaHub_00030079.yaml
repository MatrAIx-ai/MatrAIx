persona_description: A scientist and researcher who specializes in the study of animal behavior, particularly in chimpanzees and their behavior in captivity. This individual is skeptical of previous negative
  findings on altruistic behavior in chimpanzees and has documented the same behavior in a controlled environment. This individual is interested in the complex and unique existence of non-human animals
  and their right to exist and live their lives without negative human influence. This individual is likely to be interested in the environmental perspective and the need for humans to take into account
  the inherent right of non-human animals to exist and live their lives as free from negative human influence as possible.
