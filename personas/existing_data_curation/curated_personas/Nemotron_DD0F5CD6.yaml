personas:
  professional: Herbert McMahon, a 43‑year‑old library professional, blends meticulous cataloguing expertise in Dewey Decimal and Library of Congress systems with a talent for designing data‑driven information
    literacy workshops, applying their organized, methodical nature to ensure every patron receives reliable research support.
  sports: Herbert McMahon follows the Myrtle Beach Pelicans baseball team and supports the South Carolina Gamecocks football program, participates in the Coastal Anglers Association for competitive bass
    fishing, and keeps fit by walking the Intracoastal Waterway trail each sunrise, preferring low‑impact activity over team sports.
  arts: Herbert McMahon cultivates a quiet love for the visual arts by photographing coastal sunsets in the style of Ansel Adams, collects first‑edition historical novels by Ken Follett, and enjoys listening
    to folk legends like Bob Dylan while reading biographies of Irish poets, weaving these inspirations into their woodworking projects.
  travel: Herbert McMahon prefers meticulously planned road trips, having explored historic Charleston and Savannah, and dreams of tracing Irish roots in Galway, yet they limit long vacations to short,
    budget‑friendly getaways that fit around family commitments.
  culinary: Herbert McMahon enjoys cooking fresh catches of the day such as grilled shrimp with garlic and lemon, often incorporating home‑grown tomatoes and zucchini from their garden into a lowcountry
    boil, and they pride themselves on mastering sourdough starter while still ordering takeout on rainy evenings.
  core: Herbert McMahon, a methodical 43‑year‑old librarian, balances solitary curiosity with community stewardship, but can’t resist hoarding fishing lures and a growing stack of unfinished woodworking
    plans.
background:
  cultural: Herbert grew up in a middle‑class Southern family in Horry County, where community service and respect for education were core values. His family’s Irish heritage is celebrated through annual
    St. Patrick’s Day gatherings and an appreciation for storytelling. Raised in the Baptist tradition, he remains active in his local church’s outreach programs. The coastal culture of Myrtle Beach—tourism,
    fishing, and a strong connection to the natural environment—shapes his recreational interests and his commitment to preserving local history. He values Southern hospitality tempered by a preference
    for privacy, and he sees the public library as a civic hub that bridges diverse populations, including long‑time residents and seasonal visitors.
attributes:
  skills: '["Cataloguing (Dewey Decimal, Library of Congress)", "Library Management Software (Koha, SirsiDynix)", "Reference and Research Assistance", "Information Literacy Instruction", "Digital Archiving
    and Digitization", "Collection Development and Assessment", "Records Management", "Program Planning and Small-Group Facilitation", "Volunteer Training and Mentoring", "Grant Research and Basic Writing",
    "Data Analysis of Library Usage", "Customer Service"]'
  hobbies: '["Fishing", "Birdwatching", "Reading historical fiction and local history", "Genealogy research", "Vegetable gardening", "Woodworking", "Digital photography", "Small book club participation",
    "Volunteer work at historical society"]'
  career_goals: Herbert aims to earn a Master of Library and Information Science within the next three years to qualify for a librarian position. He aspires to lead the development of a digital local‑history
    archive for the Myrtle Beach region, securing grant funding to modernize the library’s technology infrastructure. In the long term, he envisions becoming a branch manager or regional coordinator, where
    he can mentor staff, expand community outreach programs, and integrate innovative instructional services. He also hopes to author a guide on information literacy for adult learners and maintain a balanced
    professional life that supports his family.
