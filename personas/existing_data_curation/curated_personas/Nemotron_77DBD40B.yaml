personas:
  professional: An aspiring visual artist and future indie game concept illustrator, Chloe Beesley blends pencil, watercolor, and digital Procreate work to translate their vivid sci‑fi/fantasy imagination
    into compelling character designs, yet their flexible, often disorganized schedule leads to bursts of creativity punctuated by last‑minute deadline scrambles.
  sports: A weekend cyclist who rides the corn‑streaked backroads with the Iowa Bike Explorers club, Chloe Beesley also follows the Iowa Hawkeyes football team, dabbles in seasonal intramural soccer, and
    practices yoga at a community studio to balance the physical demands of their bike‑laden afternoons.
  arts: An avid participant in daily drawing challenges and fan‑fiction forums, Chloe Beesley draws inspiration from artists like James Jean and Hayao Miyazaki, playlists of Sufjan Stevens and lo‑fi beats
    from Chillhop, and frequents the local art museum’s teen nights to soak up contemporary exhibitions, all of which shape their evolving illustrative voice.
  travel: When not sketching in the Iowa fields, Chloe Beesley embarks on spontaneous road trips to nearby state parks such as Effigy Mounds, has visited Chicago for a gallery crawl, and dreams of an artist
    residency in Portland, Oregon and a summer workshop in Kyoto, Japan, balancing a limited travel budget with a hunger for cultural immersion and sunset photography.
  culinary: A modest home cook, Chloe Beesley loves whipping up corn‑bread with fresh Iowa sweet corn, crafting avocado‑toast topped with radish and feta, and experimenting with homemade ramen bowls flavored
    with miso and shiitake, often pairing meals with matcha lattes while sketching at the kitchen table.
  core: Chloe Beesley channels a torrent of imagination and anxiety into vibrant sketches and lo‑fi melodies, yet their habit of losing track of assignments and an obsessive need to capture every sunset
    often leaves them scrambling under looming deadlines.
background:
  cultural: 'Chloe grew up in Odebolt, a small agricultural town in Sac County, Iowa. Her family’s heritage is rooted in the traditional Midwestern white community, with a modest emphasis on church attendance,
    community fairs, and family gatherings centered around home-cooked meals. While the local culture values practicality, hard work, and close‑knit neighborly ties, Chloe’s household also encouraged curiosity,
    providing her with access to books, a modest art supply drawer, and a modest internet connection that opened doors to broader cultural currents. This blend of small-town groundedness and online exposure
    has given her a dual perspective: she feels attached to the rhythms of rural life—seasonal festivals, high-school sports nights, and county fairs—while simultaneously identifying with global creative
    subcultures that celebrate imagination, inclusivity, and self-expression. The combination influences her artistic voice, which often juxtaposes the pastoral Midwest scenery with surreal, otherworldly
    elements.'
attributes:
  skills: '["Creative writing (poetry & short stories)", "Sketching with pencil, charcoal, and watercolor", "Digital illustration (Procreate, Photoshop)", "Basic photography & photo editing", "DIY crafts
    & upcycling", "Social media content creation (Instagram, TikTok)", "Abstract conceptual brainstorming", "Basic ukulele playing (self‑taught)"]'
  hobbies: '["Sketching and doodling in a journal", "Reading sci‑fi/fantasy novels and writing fan‑fiction", "Listening to lo‑fi, indie and ambient music", "Bike rides and nature photography", "Playing
    ukulele (self‑taught)", "Digital art challenges & Instagram/TikTok content creation", "Attending local library reading events as a volunteer", "Creating mood boards and collage art"]'
  career_goals: Though still in her teens, Chloe envisions a future where her artistic impulses become a livelihood. She aspires to attend a liberal-arts college with a strong visual-arts program, ultimately
    working as an independent illustrator or concept artist for indie video-games and graphic novels. Her love for emotional expression also draws her toward art therapy; she hopes to earn a graduate degree
    in that field so she can help other young people manage anxiety through creative work. In the near term, she is building an online portfolio on Behance and Etsy, aiming to sell prints and custom designs,
    and she dreams of traveling to attend art residencies that expose her to new cultures and artistic practices.
