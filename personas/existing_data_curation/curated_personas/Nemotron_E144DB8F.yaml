  hobbies: '[''Soccer'', ''Hiking in Blue Ridge Mountains'', ''Camping trips'', ''Playing guitar'', ''Board-game nights'', ''Volunteer at community events'', ''DIY electronics projects (Arduino, drones)'',
    ''Photography (nature and night sky)'', ''Multiplayer video gaming'', ''Astronomy stargazing'']'
  career_goals: Kenneth aims to translate his technical expertise into a role that blends engineering with community impact. He is seeking an entry‑level position in renewable‑energy systems or data analytics
    where he can work on projects that benefit rural Virginia, while also developing project‑management skills. Over the next five years, he hopes to become a certified project coordinator, lead multidisciplinary
    teams, and eventually contribute to designing sustainable infrastructure for small towns. He values a structured work environment that still offers flexibility for collaborative problem‑solving and
    personal development.
