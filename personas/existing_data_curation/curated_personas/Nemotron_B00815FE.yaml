  career_goals: Donald dreams of a future where he can explore the unknown and create beautiful works. He imagines becoming an astronaut who travels among the stars, an illustrator who paints quiet natural
    scenes, or a wildlife researcher who studies animals in peaceful habitats. He hopes to combine his love of art, curiosity about the world, and preference for solitary, focused work into a career that
    lets him discover and create in a calm environment.
