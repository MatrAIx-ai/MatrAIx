personas:
  professional: Kristen Jarvis, a field interviewer renowned for rapid rapport-building and meticulous data quality, blends curiosity with practical protocol adherence and a competitive drive to consistently
    exceed interview completion targets while they flexibly adapt scripts for unexpected respondent cues, positioning them for a senior research manager role within five years.
  sports: Kristen Jarvis, a forward for the North Side Co‑ed Soccer Club who never misses a Pittsburgh Steelers game, cheers on the Penguins in winter, and joins the city’s annual Three Rivers Regatta run‑watch,
    blends competitive drive with community spirit by leading pre‑match warm‑ups, tackling weekly hikes along the Allegheny River Trail, and they stay fit through a mix of soccer drills and strength training.
  arts: Kristen Jarvis, an enthusiastic participant in Pittsburgh’s Second City improv troupe and a trivia night captain, immerses themselves in live music ranging from Bruce Springsteen to the indie folk
    vibes of The Avett Brothers, admires the cinematic storytelling of Sofia Coppola and the visual mastery of Ansel Adams, and they often draw inspiration from these experiences for their own on‑stage
    performances.
  travel: Kristen Jarvis, who plans trips using a blend of spreadsheet budgeting and spontaneous day‑trip spontaneity, enjoys weekend escapes to Ohiopyle State Park for white‑water rafting, has already
    explored Toronto’s Distillery District and New York’s Broadway, and they dream of a cultural pilgrimage to County Kerry in Ireland and a culinary tour of Berlin’s street‑food markets.
  culinary: Kristen Jarvis, a self‑taught home chef capable of rolling perfect pierogi stuffed with potato and cheddar and crafting smoky Pittsburgh‑style pizza topped with local sausage, relishes pairing
    meals with craft brews featuring hop varieties like Citra and Mosaic, experiments with fresh basil, smoked paprika, and caramelized onions in weekday cooking, and they sometimes default to late‑night
    takeout after a marathon of field interviews.
  core: Kristen Jarvis, a fiercely competitive 33‑year‑old field interviewer, blends curiosity‑driven questioning with a community‑first mindset, thriving on group energy while they keep a skeptical eye
    on others’ motives.
background:
  cultural: Kristen grew up on Pittsburgh’s North Side in a working‑class family with Irish and German roots, reflecting the city’s historic immigrant waves tied to the steel industry. The neighborhood’s
    close‑knit community, pride in the Steelers, and traditions like pierogi festivals and the Three Rivers Regatta have shaped her practical outlook and love for collective experiences. While she completed
    high school without obtaining a diploma, she later earned a GED and pursued informal education through workshops and online courses, embodying the city’s resilient, self‑reliant spirit. Her cultural
    identity blends Mid‑Atlantic American values of hard work, community solidarity, and an appreciation for both new ideas and time‑tested customs.
attributes:
