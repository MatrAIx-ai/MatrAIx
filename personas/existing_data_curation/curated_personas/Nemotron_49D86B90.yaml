  hobbies: '[''Soccer league'', ''Community‑theater improv'', ''Trivia team competitions'', ''Craft‑brew tasting'', ''Allegheny River trail hiking'', ''Urban photography'', ''Podcast listening (psychology,
    journalism)'', ''Volunteering at arts and mentorship events'']'
  career_goals: Kristen aims to advance from field interviewer to senior research manager within the next five years, leading a multidisciplinary team that designs cutting‑edge interview methodologies for
    market‑research and user‑experience projects. She plans to earn a bachelor’s degree in communication or psychology through part‑time coursework, supplementing her practical experience with formal theory.
    Long‑term, she envisions launching her own consultancy that helps organizations blend innovative qualitative techniques with proven data‑validation frameworks, positioning herself as a recognized thought
    leader in interview research. Her ambition is fueled by a desire to outpace peers, secure internal awards for interview quality, and contribute to high‑impact studies for regional businesses in Pittsburgh.
