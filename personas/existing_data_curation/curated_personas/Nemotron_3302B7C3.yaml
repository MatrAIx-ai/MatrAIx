  hobbies: '["Visiting art museums and galleries", "Reading historical fiction and biographies", "Gardening (heirloom vegetables, wildflowers, herb patch)", "Quilting", "Attending community theater and
    literary readings", "Volunteering at the local library (archiving, tech assistance)", "Birdwatching", "Walking nature trails", "Photography of local historic sites", "Participating in horticulture contests"]'
  career_goals: Although retired from formal employment, Catherine aims to deepen her impact on Thomasville’s cultural landscape. She seeks a leadership role on the board of the Thomasville Art Council
    to shape programming that highlights senior artists and underrepresented voices. She plans to launch an annual intergenerational art exhibition that pairs local high school students with senior mentors.
    Another ambition is to compile and publish a coffee‑table book titled Thomasville Through Time, combining her genealogical research, historic photographs, and personal narratives from longtime residents.
    Catherine also aspires to secure a regional grant that will fund a community garden and outdoor sculpture garden, reinforcing the town’s commitment to both art and nature. Her competitive streak drives
    her to strive for recognition through awards such as the North Carolina Arts Preservation accolade.
