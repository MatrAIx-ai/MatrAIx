  hobbies: '[''Experimenting with Recipes'', ''Reading Food Blogs'', ''Home Gardening'', ''Chinese Calligraphy'', ''Tai Chi'', ''Book Club (Multicultural Literature)'', ''Attending Community Festivals'']'
  career_goals: Although she is not currently employed, Mei aims to deepen her involvement in the local community. She hopes to launch a series of informal cooking workshops at the South Plainfield community
    center, sharing her culinary heritage while learning new culinary technologies. She also aspires to serve on the town’s multicultural advisory board, helping to bridge cultural gaps. In the longer term,
    Mei would like to co-found a neighborhood garden cooperative that provides fresh produce to seniors and low-income families, combining her love of gardening with a practical commitment to health and
    sustainability.
