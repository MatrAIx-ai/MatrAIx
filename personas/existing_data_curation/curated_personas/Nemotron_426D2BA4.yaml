  career_goals: Although retired, Toni aspires to mentor high‑school students in science through local after‑school programs, to document her family's history in a memoir, to provide occasional consulting
    on environmentally friendly gardening practices for community projects, and to keep her mind active by completing online courses in horticulture and digital photography.
