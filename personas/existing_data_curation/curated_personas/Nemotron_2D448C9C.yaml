  career_goals: Approaching retirement, Tin Min aims to transition from full‑time classroom teaching to a mentorship and advocacy role. She plans to lead a community‑based art‑and‑culture program for preschoolers,
    develop a resource guide on integrating multicultural art into early childhood curricula, and conduct workshops for new teachers on flexible, child‑centered instruction. Additionally, she hopes to co‑author
    a book sharing her decades‑long experience with storytelling and visual arts in preschool education, and to volunteer as a cultural liaison between local schools and the Asian‑American community.
