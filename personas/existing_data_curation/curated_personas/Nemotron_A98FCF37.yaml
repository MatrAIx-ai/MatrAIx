personas:
  professional: Nneka Parker, a 69‑year‑old community arts facilitator and aspiring art‑history scholar, channels their disciplined organizational flair, empathic listening, and boundless curiosity into
    curating intergenerational workshops, documenting elder oral histories, and guiding visitors through Brooklyn museum exhibits with a calm, solitary composure.
  sports: Nneka Parker enjoys low‑impact fitness routines such as morning walks in Prospect Park and weekend yoga sessions with the Brooklyn Botanical Garden seniors’ wellness group, and they follow the
    New York Knicks and Brooklyn Nets avidly on television, while also participating in a casual walking club that meets after the Brooklyn Botanic Garden’s seasonal flower shows.
  arts: Nneka Parker’s artistic life revolves around sketching Brooklyn streetscapes while listening to John Coltrane, Miles Davis, and Fela Kuti, devouring the poetry of Langston Hughes and Maya Angelou,
    studying the works of Romare Bearden and contemporary visual‑artist Kehinde Wiley, and attending intimate gallery openings featuring installations by Theaster Gates and Kara Walker, where they often
    engage in thoughtful dialogue with curators.
  travel: Nneka Parker prefers curated, low‑key trips that blend cultural immersion with tranquility, often planning week‑long explorations to historic art hubs like Paris’s Musée d’Orsay and New Orleans
    for jazz festivals, whilst also enjoying day‑trips to the Hudson Valley’s wineries and the botanical gardens of Kyoto, balancing their love of nature with a penchant for solo reflection.
  culinary: Nneka Parker, an adept home cook, reimagines classic soul‑food staples such as collard greens with smoked turkey by adding fresh basil, thyme, and quinoa, whips up their signature herb‑infused
    gumbo with shrimp, smoked sausage, and a bouquet garni of rosemary, sage, and bay leaf, and they frequently bake spiced sweet‑potato pie with ginger and cardamom, showcasing a love for bold flavors
    and garden‑fresh herbs.
  core: Nneka Parker is a solitary, curiosity‑driven cultural steward who knits intricate quilts from balcony‑grown herbs, chronicles daily observations in a handwritten journal, and occasionally forgets
    to water their succulents while never missing a museum’s senior‑guide shift.
background:
  cultural: Nneka is a Black woman of Nigerian Igbo descent, born and raised in Brooklyn’s Crown Heights neighborhood. Her family blends Nigerian cultural practices—such as storytelling, traditional music,
    and aromatic cooking—with the vibrancy of the New York City Black diaspora. Growing up during the civil‑rights and Black‑power movements, she internalized a strong sense of social justice and community
    responsibility. She participates in cultural celebrations like Juneteenth, the Nigerian New Yam Festival, and local African art fairs, preserving her heritage while engaging with the broader multicultural
    fabric of Brooklyn. This dual cultural identity informs her artistic tastes, culinary experiments, and her commitment to fostering harmony within her community.
