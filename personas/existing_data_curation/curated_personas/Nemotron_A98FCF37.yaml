  career_goals: Nneka aims to deepen her knowledge of African diaspora art and translate that expertise into community service. She plans to complete an online certificate in art history, volunteer as a
    senior guide at a local museum, and curate a small exhibition of works by Black senior artists in Brooklyn. She also aspires to lead an intergenerational reading circle focusing on Black literature,
    document oral histories of elder Black women in her neighborhood, and mentor youth interested in creative expression. Ultimately, she hopes to be recognized as a cultural steward who bridges generations
    and promotes inclusive artistic dialogue.
