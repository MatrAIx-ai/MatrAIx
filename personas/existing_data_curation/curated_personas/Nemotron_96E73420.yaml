  hobbies: '[''Minecraft building and modding'', ''Streaming gameplay on Twitch'', ''Listening to hip‑hop and R&B'', ''Playing basketball'', ''Sketching urban scenes'', ''Digital beat‑making'', ''Volunteering
    at community center (tech tutoring)'', ''Cooking Ethiopian dishes'']'
  career_goals: In the short term, Yonas aims to finish his high school diploma with a focus on STEM courses, earn a certification in Python coding, and join his school's robotics team. He wants to win
    a regional hackathon and create a mobile app that provides mental-health resources for teens. Long-term, he envisions becoming a software engineer who designs educational technology that bridges the
    digital divide in under-resourced communities. He also keeps an eye on the possibility of pursuing a professional basketball career, viewing athletics as both a personal challenge and a platform to
    inspire younger kids. Yonas is determined to blend his technical expertise with his competitive drive to make a tangible impact.
