personas:
  professional: Yonas Elliott, a 15‑year‑old budding Minecraft modder and Twitch streamer, blends natural curiosity with methodical problem‑solving to design intricate game mechanics while staying fiercely
    competitive about viewer counts, yet they sometimes over‑analyze feedback due to their skeptical streak and emotional reactivity.
  sports: Yonas Elliott, a 15‑year‑old basketball enthusiast, spends after‑school hours at the community center’s under‑16 league, shooting hoops with a competitive edge that mirrors their gaming mindset,
    avidly follows the Los Angeles Lakers and participates in weekend pick‑up games while occasionally joining local soccer drills in the summer to diversify fitness.
  arts: Yonas Elliott immerses himself in hip‑hop and R&B by curating vinyl collections featuring Kendrick Lamar, J. Cole, SZA, and Anderson .Paak, while simultaneously sketching gritty cityscapes in a
    pocket journal and crafting beats on FL Studio, forging a personal soundtrack that fuels both his gaming builds and his competitive drive.
  travel: Yonas Elliott dreams of balancing meticulous planning with spontaneous adventures, often weekend‑hopping to nearby national parks like Zion for hiking, while fantasizing about future trips to
    Tokyo’s Akihabara for gaming culture, Berlin’s street‑art scene to inspire his sketches, and a family pilgrimage to Ethiopia’s historic sites, despite current budget constraints limiting travel to local
    camps.
  culinary: Yonas Elliott, an experimental teenage cook, spends weekends mastering traditional Ethiopian dishes such as injera, doro wat, and tibs with berbere spice, while also throwing together quick
    ramen bowls and peppered chicken wings, balancing a modest kitchen skill set with a fearless curiosity that sometimes results in over‑salty experiments.
  core: Yonas Elliott is a 15‑year‑old Minecraft modder and vinyl‑collecting beat‑maker whose competitive streak fuels both basketball courts and Twitch streams, yet their intense anxiety often turns late‑night
    gaming marathons into both creative breakthroughs and restless nights.
background:
  cultural: Yonas is a Black teenager raised in Buffalo’s vibrant East Side, where African-American cultural traditions intersect with the city’s growing Ethiopian immigrant community. His mother’s family
    emigrated from Ethiopia in the early 2000s, so he grew up hearing Amharic at home, celebrating Enkutatash (Ethiopian New Year), and helping prepare injera for family gatherings. At the same time, he
    participates in the local Baptist church, observes Kwanzaa, and is influenced by the hip‑hop and basketball culture that dominate much of his peer group. This blend of African-American and Ethiopian
    heritage gives him a strong sense of identity, a respect for community solidarity, and an appreciation for both Western pop culture and his ancestral customs.
