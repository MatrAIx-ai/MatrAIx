personas:
  professional: Yashica Murray, a seasoned drywall and ceiling‑tile installer, uses rapid site assessments, precise measuring, and clear crew communication to deliver flawless finishes, while their charismatic,
    talk‑ative nature turns routine briefings into lively brainstorming sessions, and their relaxed approach to scheduling sometimes leaves paperwork for later as they juggle ambitions for a supervisory
    license and a boutique decorative‑finishes business.
  sports: Yashica Murray stays fit by joining a weekend adult softball league with the Austin Alamo Sports Club, cheering on the Texas Longhorns football team, the Austin FC soccer club, and the Houston
    Astros, while also hitting the local climbing gym for bouldering sessions in the cooler months.
  arts: Yashica Murray dives into the local live‑music scene, regularly attending blues shows by B.B. King tributes and jazz nights featuring John Coltrane classics, while they paint small canvases inspired
    by Georgia O'Keeffe's desert palettes and sketch during construction breaks, and they often quote lines from the film 'La La Land' to fuel their creative drive.
  travel: Yashica Murray prefers spontaneous weekend road trips, having already explored New Orleans for its vibrant jazz and cuisine, Santa Fe for its art galleries, and Oaxaca for its rich Tex‑Mex flavors,
    while dreaming of a future cross‑country tour of the historic Route 66 towns, balancing travel cravings with a modest budget and occasional family commitments.
  culinary: Yashica Murray enjoys cooking soulful Southern dishes like shrimp and grits, chicken fried steak, and Tex‑Mex enchiladas, seasoning with smoked paprika, chipotle peppers, fresh cilantro, and
    a dash of lime, showcasing moderate culinary skill by hosting lively dinner parties where they experiment with homemade mole sauce and artisanal cornbread.
  core: Yashica Murray blends hands‑on construction expertise with a magnetic social streak, turning drywall projects into artistic canvases, karaoke nights into networking gold, and occasional impulsive
    spending into fuel for their dream of a boutique decorative‑finishes business.
background:
  cultural: Yashica is an African‑American woman who grew up in the Greater Austin area, deeply rooted in the traditions of the Black community in Central Texas. Her family maintains strong ties to the
    local Black church, where gospel music, fellowship, and community service have shaped her values of resilience and collective uplift. She celebrates cultural holidays like Juneteenth and participates
    in neighborhood block parties that blend Southern culinary traditions with the diverse flavors of Texas. As a Black professional in a predominantly male trade, she draws strength from the legacy of
    pioneering Black women in construction and the support network of local trade unions that advocate for diversity. Her upbringing has instilled a blend of Southern hospitality, a love for rhythmic music,
    and an emphasis on mentorship, all of which influence how she approaches work, relationships, and her aspirations.
attributes:
  skills: '["drywall installation", "ceiling‑tile grid assembly", "joint taping and finishing", "basic blueprint reading", "power‑tool operation", "hand‑tool proficiency", "on‑site problem solving", "team
    coordination", "client communication", "decorative plaster techniques"]'
  hobbies: '["attending live‑music events (blues, jazz, Tex‑Mex fusion)", "karaoke nights with friends", "cooking Southern and Tex‑Mex dishes", "painting and sketching", "DIY home‑decor projects", "visiting
    art galleries and street‑art tours", "volunteering at community art workshops", "gardening in the backyard", "listening to podcasts on construction, art, and self‑improvement"]'
  career_goals: Yashica aims to formalize her expertise by earning a vocational certification in commercial finishing and eventually a supervisor’s license. She aspires to become a crew lead, overseeing
    larger projects and mentoring new installers, especially other women and people of color entering the trade. In the longer term, she envisions launching a small, boutique contracting business that specializes
    in decorative ceiling and wall finishes, offering clients artistic options like stenciled plaster or custom‑tiled designs. Her charismatic personality also fuels a side ambition to create short video
    tutorials and a YouTube channel where she shares practical tips, tool reviews, and occasional “behind‑the‑scenes” looks at art‑inspired construction projects, turning her love of social interaction
    into a platform for education and brand building.
