  career_goals: Thomas aims to become a senior partner at his firm by establishing a dedicated practice group that serves artists, cultural nonprofits, and community‑led creative enterprises. He plans to
    expand pro bono legal services for underrepresented creative professionals, serve on the board of the local arts council, and mentor aspiring Black lawyers through bar association diversity programs.
    In the longer term, he hopes to author a guidebook on navigating legal issues in the arts and teach a seminar on law and culture at a nearby university. He also seeks to influence state policy to increase
    funding for arts education and cultural heritage preservation, leaving a legacy of greater access to both legal and artistic resources.
