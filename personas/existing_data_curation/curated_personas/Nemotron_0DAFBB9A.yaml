  career_goals: Even at two, Quyen shows budding aspirations. She loves storytime and often says she wants to be a teacher so she can read books to other children. She delights in drawing with crayons and
    imagines becoming an artist who creates beautiful pictures. Influenced by her caring nature, she also expresses a wish to help people, echoing the nurturing role of a doctor or nurse. These ambitions
    reflect her desire for creativity, sharing knowledge, and contributing to the well‑being of others.
