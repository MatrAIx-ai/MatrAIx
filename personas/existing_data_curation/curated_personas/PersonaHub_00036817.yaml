persona_description: A linguist or a historian of linguistics who is interested in the reconstruction of the Proto-Indo-European language and the analysis of its features, particularly in the context of
  Slavic languages. They are knowledgeable about the segmental and prosodic features of Slavic languages and are familiar with the multifarious accentual developments in these languages. They are interested
  in the recent developments in the field of accentology and are aware of the importance of taking into account the complicated nature of historical accentology in the reconstruction of the Proto-Indo-European
  language.
