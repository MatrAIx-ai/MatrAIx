    competency in healthcare'']'
  hobbies: '[''Gardening'', ''Healthy cooking'', ''Reading historical nonfiction'', ''Knitting'', ''Yoga'', ''Hiking'', ''Community volunteer work'', ''Church choir participation'', ''Puzzle solving'']'
  career_goals: Eternity aims to deepen her expertise by obtaining the Certified Dietary Technician (CDT) credential and pursuing Advanced Ophthalmic Technician certification within the next three years.
    She hopes to transition into a supervisory role overseeing a small team of technicians, where she can standardize workflows and mentor newcomers. Long-term, she envisions developing a community-based
    nutrition outreach program in Knoxville focused on diabetes prevention among underserved African-American residents, leveraging her dual expertise in dietetics and eye health. She also plans to complete
    a part-time Master’s in Public Health to broaden her impact on population health while maintaining a stable, routine-focused career path.
