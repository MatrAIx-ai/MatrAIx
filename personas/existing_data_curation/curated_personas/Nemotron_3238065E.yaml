personas:
  professional: Eternity Singleton combines meticulous dietetic assessments with precise ophthalmic testing, leveraging their strong analytical background to streamline clinic workflows while training new
    staff through clear, routine-focused instruction.
  sports: Eternity Singleton enjoys early-morning hikes on Great Smoky Mountains trails with the local Knoxville Hiking Club, practices yoga twice weekly at a community studio, follows the Tennessee Titans
    and Nashville Predators, and occasionally joins a casual weekend softball league with coworkers.
  arts: Eternity Singleton weaves colorful scarves for friends while humming hymns in their church choir, finds inspiration in the spoken-word recordings of Maya Angelou, the acoustic folk of Alison Krauss,
    and the classic films of Audra Reynolds, and relaxes by solving crossword puzzles supplied by The New York Times.
  travel: Eternity Singleton prefers purpose-driven trips that blend nature and cultural heritage, often planning weekend getaways to Asheville’s Blue Ridge Parkway or annual volunteer trips to a community
    garden in Oaxaca, Mexico, while saving for a longer trek along the Appalachian Trail.
  culinary: Eternity Singleton transforms classic Southern comfort foods into healthier fare, baking crispy chicken with almond-flour coating, swapping traditional white-sugar biscuits for oat-honey versions,
    and seasoning smoky collard greens with a dash of smoked paprika and olive oil, all while experimenting with heirloom tomatoes from their garden.
  core: Eternity Singleton is a routine-loving health technician who balances data-driven precision with garden-fresh cooking, quiet choir humming, and a disciplined savings plan, occasionally letting crossword
    puzzles keep them up past bedtime.
background:
  cultural: Eternity was raised in a close-knit African-American community in Knoxville, where church, family, and food formed the core of daily life. Her parents emphasized academic achievement and cultural
    pride, encouraging her to attend the University of Tennessee where she earned a STEM degree while actively participating in the Black Student Union. She carries forward Southern black culinary traditions,
    often integrating soul-food flavors into nutritionally balanced meals for her patients. Her involvement in local cultural events, such as the Knoxville African-American Heritage Festival, and her volunteer
    work with community health initiatives reflect a deep commitment to uplifting her community and honoring her heritage.
