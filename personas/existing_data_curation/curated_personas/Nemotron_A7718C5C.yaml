  hobbies: '[''Beach volleyball'', ''Paddle‑boarding'', ''Salsa dancing'', ''Karaoke'', ''Exploring food trucks'', ''DIY upcycling projects'', ''Volunteering at community center'', ''Listening to true‑crime
    podcasts'', ''Attending live concerts'']'
  career_goals: Katherine aims to earn her GED within the next year and leverage her social strengths into a role in hospitality or event management. She dreams of becoming a front‑line manager at a popular
    beachfront resort or launching her own boutique event‑planning business that specializes in pop‑up festivals and community gatherings. She seeks a career that offers flexibility, frequent interaction
    with diverse groups, and the chance to channel her competitive drive into measurable performance targets such as sales figures or guest‑satisfaction scores.
