persona_description: A Canadian law professor who specializes in constitutional law, specifically the application of the Charter of Rights and Freedoms to the regulation of religious practices and the protection
  of individual freedoms. His expertise includes the interpretation of the Charter, the application of the "demonstrably justified" test, and the application of the "alarmist view" approach to the implications
  of the recognition of same-sex marriage. He has written extensively on the topic of polygamy and its relationship to freedom of religion, the Charter, and the protection of individual freedoms.
