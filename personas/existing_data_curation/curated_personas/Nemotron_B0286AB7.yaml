personas:
  professional: Omar Spells, an administrative specialist with a knack for meticulous calendar management, leverages a curiosity for visual storytelling and a collaborative yet assertive style to keep small
    arts teams organized while adapting quickly to last‑minute exhibition changes.
  sports: Omar Spells keeps a casual fitness routine by jogging with the Raleigh Runners Club, cheering on the Carolina Hurricanes during hockey season and the NC State Wolfpack during March Madness, and
    occasionally joins a regional 5K charity run organized by the Triangle Half Marathon Association.
  arts: Omar Spells immerses themselves in the local art scene by attending openings featuring muralist Jamel Glover, curating flyers with Canva inspired by the bold typography of Shepard Fairey, and recombining
    playlists that weave together Kendrick Lamar’s introspective hip‑hop, Kamasi Washington’s expansive jazz, and Mavis Staples’ soulful gospel.
  travel: Omar Spells plans weekend getaways with a balance of spreadsheet‑guided itineraries and spur‑of‑the‑moment detours, favoring culturally rich cities like Asheville, NC, New Orleans, LA, and Lisbon,
    Portugal, while keeping a modest travel budget that sometimes forces them to postpone longer trips to Europe until a year‑end bonus arrives.
  culinary: Omar Spells enjoys cooking soulful comfort meals such as shrimp and grits spiced with smoked paprika and occasional experimental twists like kimchi‑infused collard greens, confidently handling
    the stovetop but still relying on quick‑fix recipes when time runs short.
  core: Omar Spells blends a meticulous administrative mind with an insatiable curiosity for art, juggling stress‑induced worry with spontaneous creativity, and occasionally impulsively splurges on concerts
    while hoarding a habit of over‑organizing their calendar.
background:
  cultural: Omar identifies as a Black man raised in the American South, drawing on a rich African‑American heritage that blends church community traditions, family gatherings, and a deep appreciation for
    Black artistic expression. Growing up in Raleigh, he was exposed to the city’s historic Black neighborhoods, local gospel choirs, and the communal spirit of barbershop culture. This background informs
    his love for soul food, his respect for storytelling through music and visual art, and his commitment to uplifting Black voices in the local arts scene. While navigating the challenges of limited formal
    education, Omar's cultural upbringing has instilled resilience, a strong sense of community responsibility, and an ongoing desire to contribute positively to the cultural fabric of Wake County.
attributes:
  skills: '[''calendar management'', ''meeting coordination'', ''travel arrangement'', ''Microsoft Office Suite proficiency'', ''basic database entry'', ''professional correspondence drafting'', ''filing
    and record keeping'', ''simple graphic design (Canva)'', ''vendor negotiation'', ''flexible task prioritization'', ''stress‑management techniques'']'
  hobbies: '[''visiting museums and galleries'', ''attending local art festivals'', ''volunteering at community arts events'', ''listening to hip‑hop, jazz, and gospel music'', ''basic photography of murals
    and performances'', ''reading African‑American literature and personal‑development books'', ''cooking soulful Southern dishes'', ''mindful walking in local parks'']'
  career_goals: Omar aims to formalize his administrative expertise by earning a GED and completing a community‑college certificate in Office Administration within the next two years. He envisions moving
    into a senior administrative or office‑manager role at a cultural institution—such as a museum, art gallery, or community arts center—where he can merge his organizational strengths with his love for
    art. Long‑term, Omar hopes to transition into program coordination for community arts outreach, using his administrative background and cultural insights to facilitate workshops, exhibitions, and youth
    mentorship programs that highlight Black artistic contributions in the Raleigh area.
