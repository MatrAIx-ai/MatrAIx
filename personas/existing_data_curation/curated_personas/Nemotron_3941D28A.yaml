personas:
  professional: Sherry Waterhouse is an aspiring junior programmer who blends a methodical love for LEGO engineering with a practical curiosity for coding simple Scratch games, approaching each project
    like a puzzle they rigorously plan before launching.
  sports: Sherry Waterhouse is a dedicated member of the Saint Paul Youth Chess Club, treating competitive matches like sport, and they also sprint in the Twin Cities Junior Track and Field program during
    the spring, cheering for the Minnesota Vikings while favoring the strategic precision of chess over crowded team sports.
  arts: Sherry Waterhouse channels creative energy into designing intricate LEGO dioramas inspired by sci-fi novels, while they unwind listening to the indie folk sounds of Bon Iver and the pop hits of
    Billie Eilish, and they occasionally sketch characters from their favorite books with a pencil set they keep organized by color.
  travel: Sherry Waterhouse prefers meticulously planned weekend getaways to nearby natural spots like Lake Harriet and Voyageurs National Park, where they follow a checklist of bird species to spot, while
    dreaming of a summer road trip to the Grand Canyon and a future study-exchange visit to Tokyo for its cutting-edge tech museums.
  culinary: Sherry Waterhouse enjoys assembling simple meals such as grilled cheese sandwiches with sharp cheddar and apple slices, but they also love experimenting with homemade sushi rolls and baking
    raspberry swirl muffins, often borrowing recipe cards from their parents' collection and insisting on measuring every ingredient to the gram.
  core: Sherry Waterhouse is a methodical puzzle-solver who balances a quiet competitive streak with a love for structured learning, often charting their progress on a spreadsheet while occasionally hoarding
    extra LEGO bricks for secret projects.
background:
  cultural: Sherry is a White Midwestern American raised in Saint Paul, Minnesota. Her family’s roots trace back to German and Scandinavian immigrants who settled in the region in the late 19th century.
    Growing up, she has been shaped by the local climate, enjoying winter activities like ice skating and the community spirit of the Saint Paul Winter Carnival. The pragmatic, self‑reliant values of the
    Upper Midwest, along with a modest emphasis on education and community participation, influence her organized and practical outlook.
