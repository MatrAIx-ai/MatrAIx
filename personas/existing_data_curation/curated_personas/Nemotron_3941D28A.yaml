  career_goals: Sherry aims to attend a specialized STEM high school where she can deepen her knowledge in engineering and data analysis. She hopes to win a regional science fair with a project that applies
    her curiosity to solve a practical environmental problem. Long‑term, she aspires to become a civil engineer or data scientist, designing infrastructure that improves her community. She is motivated
    to earn scholarships that recognize her reliability and competitive achievements, and she plans to participate in robotics and math competitions to build a strong foundation for college.
