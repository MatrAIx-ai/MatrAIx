personas:
  professional: Samuel Funderburg, a retired electrical engineering R&D specialist turned community STEM mentor, channels his circuit design and data analysis expertise into guiding high‑school robotics
    clubs, serving on the Sacramento Museum of Art and Science advisory board, and developing interdisciplinary technology‑art workshops for seniors, leveraging his methodical, compassionate nature while
    occasionally over‑preparing due to a persistent worry.
  sports: Samuel Funderburg, an avid hiker of the Sierra foothills and member of the Sacramento senior walking club, embraces seasonal trail outings, regularly follows the Sacramento River Cats baseball
    season, and participates in a low‑impact pickleball league, balancing cardiovascular fitness with gentle joint‑friendly activities.
  arts: Samuel Funderburg, a dedicated landscape photographer and watercolorist, draws inspiration from Ansel Adams and Georgia O'Keeffe, attends modern art exhibitions featuring Yayoi Kusama and David
    Hockney, and enriches creative sessions with the sounds of Miles Davis, John Coltrane, and Beethoven, weaving visual and auditory art into his everyday life.
  travel: Samuel Funderburg, a meticulous planner who prefers purposeful trips, has trekked Yosemite’s Mist Trail, savored wine tours in Napa Valley, explored the historic streets of Kyoto, and dreams of
    strolling the Louvre in Paris, often pairing museum visits with nature hikes and seasoned travel companions.
  culinary: Samuel Funderburg, a garden‑to‑table enthusiast, cultivates rosemary, basil, and heirloom tomatoes, delights in preparing grilled salmon with dill‑lemon glaze, slow‑cooked ratatouille, and rosemary‑roasted
    potatoes, and occasional treats themselves to a classic French onion soup at a downtown bistro, reflecting both modest cooking skills and a penchant for occasional culinary indulgences.
  core: Samuel Funderburg, a 59‑year‑old retired engineer, blends methodical curiosity with artistic pursuits and community service, balancing diligent planning and compassionate mentorship while wrestling
    with a habit of over‑thinking that fuels both thoroughness and occasional stress.
background:
  cultural: Samuel is a third‑generation White American of German ancestry. He was raised in a middle‑class family that valued education, self‑reliance, and community involvement, with occasional participation
    in a Lutheran congregation. Relocating to Rancho Cordova, California, in his thirties, he embraced the region’s blend of suburban life and access to the vibrant cultural scene of Sacramento. His upbringing
    emphasized respect for tradition while encouraging curiosity, which informs his appreciation for both scientific rigor and artistic expression. He identifies with broader American cultural values of
    individualism, volunteerism, and a commitment to lifelong learning.
attributes:
  skills: '[''Circuit Design'', ''Signal Processing'', ''Embedded Systems Programming (C/C++/Python)'', ''Data Analysis'', ''Statistical Modeling'', ''CAD (SolidWorks, AutoCAD)'', ''Project Management'',
    ''Technical Writing'', ''Grant Writing'', ''Mentoring'', ''Volunteer Coordination'', ''Conflict Resolution'']'
  hobbies: '[''Landscape Photography'', ''Watercolor Painting'', ''Hiking'', ''Gardening (native plants)'', ''Reading (science history, art journals)'', ''Visiting Art Galleries'', ''Volunteer Tutoring'',
    ''Organizing Community Clean‑ups'', ''Playing Chess'', ''Listening to Classical/Jazz Music'']'
  career_goals: Now retired from full‑time work, Samuel aims to channel his expertise into community service and lifelong learning. He plans to volunteer as a STEM mentor for local high‑school robotics
    clubs, serve on the advisory board of the Sacramento Museum of Art and Science, and develop a workshop series that blends technology with artistic expression for seniors. He also hopes to author a guide
    on accessible electronics projects for hobbyists, deepen his knowledge of art history, and practice mindfulness techniques to better manage his tendency toward worry.
