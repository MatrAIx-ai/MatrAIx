persona_description: A veterinarian who specializes in the diagnosis and treatment of Addison's disease in dogs, particularly those with chronic cortisol deficiency. They have a thorough understanding of
  the symptoms of the disease and the appropriate treatment plans, including lifelong medication and regular checkups. They are knowledgeable about blood tests and the ACTH stimulation test, and are experienced
  in administering drugs and supplements to replace deficient hormones. They are also familiar with the signs of Addisonian crisis and the emergency care that is necessary to save the life of a dog in this
  condition.
