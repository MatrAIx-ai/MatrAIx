personas:
  professional: Tamara Fannin, a seasoned business strategist turned senior-focused mentor, leverages her graduate business training and decades of small-enterprise management to consult local entrepreneurs,
    orchestrate volunteer events, and curate exhibits at the Berkeley County Historical Society, all while embracing a relaxed, curiosity-driven approach to leadership.
  sports: Tamara Fannin enjoys moderate hiking on the nearby Appalachian trails, supports the West Virginia Mountaineers football team, and participates in a senior bridge league that doubles as a strategic
    mental sport for her sharp mind.
  arts: Tamara Fannin spends afternoons painting watercolors of rolling hills, curates historical exhibits featuring folk artists like Grandma Moses, and captures seasonal changes through digital photography,
    while regularly attending community theater productions starring local talent such as Mary Beth Henderson.
  travel: Tamara Fannin plans leisurely trips to historic Appalachian sites such as the Blue Ridge Parkway, the Thomas Wolfe House, and the Great Smoky Mountains, favoring small-group tours and bed-and-breakfast
    stays that allow her to blend genealogy research with scenic exploration.
  culinary: Tamara Fannin delights in traditional Appalachian cooking, perfecting dishes like cornmeal biscuits, apple butter, fried green tomatoes, and chicken and dumplings, often using garden-grown herbs,
    heirloom tomatoes, and hand-picked blackberries to craft her signature meals.
  core: Tamara Fannin, a 76-year-old watercolorist, gardener, and mentor, weaves curiosity and community service into every day, even if she sometimes misplaces her glasses and forgets to file receipts.
background:
  cultural: 'Tamara’s upbringing in Hedgesville reflects the rich Appalachian cultural tapestry of West Virginia: a heritage of Scots‑Irish and German ancestry, deep community ties, and a reverence for
    storytelling, folk music, and self‑reliance. She has long participated in local church and community events, values the region’s natural beauty, and embraces the traditions of seasonal harvest festivals,
    bluegrass music, and crafts such as quilting and woodworking. This background fuels her appreciation for art, history, and the collaborative spirit of her neighbors.'
