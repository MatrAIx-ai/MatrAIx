personas:
  professional: John Reyes, a 21‑year‑old warehouse stocker and order filler at a Midwestern distribution center, uses their curiosity‑driven mindset and mechanical aptitude to devise quick inventory hacks,
    even as they love spontaneity and sometimes clash with the rigid scheduling of shift work, all while eyeing promotion to shift supervisor and a future in logistics analysis.
  sports: John Reyes spikes a ball in pickup soccer games around Ann Arbor while they cheer for Detroit City FC, root for the Detroit Lions on Sundays, and spend Saturday mornings kayaking on Lake Michigan
    with the local watersports club, balancing competitive team spirit with solo fitness routines at the gym.
  arts: John Reyes dives into fast‑paced shooter titles and strategy games after work, while they listen to a mixtape that alternates between Bad Bunny, Vicente Fernández, and the Foo Fighters, and they
    regularly attend the Holland Tulip Festival and Mexican Día de los Muertos celebrations, finding inspiration in vibrant street art and live mariachi performances.
  travel: John Reyes prefers spontaneous road trips that blend Midwest scenery with cultural stops, having driven the Upper Peninsula’s scenic byways to Houghton for a weekend hike, explored Chicago’s sports
    bars for a Cubs game, and dreaming of a future trip to Oaxaca to explore its culinary markets, while they balance a limited student budget with a desire for adventure.
  culinary: John Reyes cooks up street‑style tacos with grilled carne asada, homemade corn masa, fresh cilantro, and a smoky chipotle salsa, while also perfecting tamales with masa harina and masa dough,
    and their favorite side dish remains a creamy guacamole spiked with diced jalapeños and lime zest, which they serve to family during weekend gatherings.
  core: John Reyes blends a competitive gamer’s edge with a hands‑on warehouse hustle, constantly juggling spontaneous road trips, late‑night taco experiments, and an ever‑growing list of DIY tech projects,
    all while confronting occasional back pain and a habit of impulsively splurging on gaming gear, which they rationalize as leveling up.
background:
  cultural: John is a second‑generation Mexican American raised in Holland, Michigan. His family speaks Spanish at home and celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Mexican
    Independence Day, while also observing Catholic holidays. Growing up in a town known for its Dutch heritage, John has absorbed elements of the local culture, participating in events like the Tulip Festival
    and appreciating Midwestern values of community and modesty. This blended cultural upbringing gives him a strong sense of family, hospitality, and hard work. He navigates both worlds by integrating
    Mexican culinary practices with local community gatherings, and his bilingual ability helps him bridge cultural gaps in both his personal and professional life.
attributes:
  skills: '[''Inventory Management'', ''Order Fulfillment'', ''Forklift Operation'', ''Warehouse Management Systems'', ''Bilingual Communication (English/Spanish)'', ''Physical Stamina'', ''Basic Mechanical
