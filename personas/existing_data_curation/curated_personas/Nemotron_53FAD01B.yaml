  hobbies: '[''Competitive video gaming'', ''Pickup soccer games'', ''Fishing'', ''Kayaking'', ''DIY electronics (Raspberry Pi projects)'', ''Cooking Mexican cuisine'', ''Attending local festivals'', ''Reading
    tech blogs'', ''Spontaneous road trips'', ''Weightlifting'']'
  career_goals: John aims to advance from his current floor‑level position to a shift supervisor within the next two to three years, leveraging his practical experience and curiosity about process improvement.
    He plans to earn an associate’s degree in Supply Chain Management while working part‑time, and to obtain certifications such as the Certified Production and Inventory Management (CPIM). In the longer
    term, he envisions moving into logistics coordination or a logistics analyst role at a larger distribution center. Additionally, John harbors an entrepreneurial ambition to open a small convenience
    store that blends Mexican snacks with local favorites, eventually expanding to multiple locations. His career trajectory reflects a blend of competitive drive, a desire for upward mobility, and a commitment
    to applying his hands‑on expertise to broader operational challenges.
