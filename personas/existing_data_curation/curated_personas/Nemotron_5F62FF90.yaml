    heritage preservation'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (vegetables, herbs, ornamental flowers)'', ''Social dancing (cumbia, salsa)'', ''Volunteering at the senior community center'', ''Attending
    church services and cultural festivals'', ''Reading historical fiction and memoirs'', ''Traveling to visit family in Mexico'', ''Photography of local events'', ''Knitting and quilting'']'
  career_goals: Although retired from formal employment, Laura aims to deepen her role as a community elder. She hopes to lead a weekly cooking class that teaches traditional Mexican recipes at the local
    community center, organize the annual Día de los Muertos celebration, and create a series of recorded oral histories from senior residents to preserve their stories. Laura also aspires to mentor teens
    interested in culinary arts and to volunteer as a liaison between the senior center and local health agencies, ensuring her peers receive timely information and support. Her overarching ambition is
    to remain an active, resilient contributor to her neighborhood while maintaining her health and well‑being.
