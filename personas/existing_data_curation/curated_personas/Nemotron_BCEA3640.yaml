  hobbies: '[''Gardening (native palms, citrus, and seasonal flowers)'', ''Knitting and quilting'', ''Reading historical biographies and classic literature'', ''Genealogy research'', ''Volunteer work at
    hospice and senior centers'', ''Attending intimate church services'', ''Participating in local historical society events'']'
  career_goals: Even at 94, Celeste remains driven to leave a lasting, positive imprint on her community. Her primary ambition is to mentor younger volunteers and emerging nonprofit leaders, sharing her
    practical wisdom and compassionate approach to teamwork. She hopes to document her extensive experience in a memoir that highlights the value of resilience, humility, and service, and to donate her
    well‑tended garden to a local senior‑center program, ensuring a green space for future generations. Celeste also seeks to serve as an honorary advisor for the West Palm Beach Historical Society, helping
    preserve the region’s mid‑20th‑century heritage while encouraging intergenerational dialogue.
