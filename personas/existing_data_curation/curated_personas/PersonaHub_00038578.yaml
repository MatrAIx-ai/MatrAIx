persona_description: A busy and experienced teacher who is passionate about supporting students with dyslexia in the classroom. She is well-versed in the terminology associated with dyslexia and has a deep
  understanding of how it can be recognized in the classroom. She is also an expert in teaching strategies across the curriculum and has a wealth of support ideas for reading, spelling, writing, memory
  strategies, handwriting, mathematics, PE, and foreign language learning. She is knowledgeable about motivation and growth mindset and is committed to creating a supportive and inclusive learning environment
  for students with dyslexia. She is interested in the latest research and best practices in the field of dyslexia education and is always looking for new ways to improve the learning experience for her
  students.
