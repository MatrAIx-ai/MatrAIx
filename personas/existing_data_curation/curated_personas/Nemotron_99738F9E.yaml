  career_goals: Winnie dreams of attending a specialized arts high school and eventually earning a degree in visual communication or game design. She aspires to become a concept artist for video games or
    a graphic novelist, blending her love for abstract ideas with storytelling. In the longer term she hopes to run a freelance studio that creates immersive indie games, illustrated books, and community
    murals, using her art to bring people together and spark curiosity.
