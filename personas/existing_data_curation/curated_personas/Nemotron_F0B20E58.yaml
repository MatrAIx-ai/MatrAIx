personas:
  professional: Arnold Gomez, a diligent primary‑school student, merges a love for structured LEGO engineering with an adventurous reading habit to excel in class projects, applying practical attention
    to detail while thriving when given the freedom to design imaginative solutions.
  sports: Arnold Gomez, who enjoys the camaraderie of a neighborhood youth soccer club in the spring and follows the New York Yankees and Los Angeles Lakers on TV, treats weekend nature walks as low‑key
    cardio, prefers solo LEGO sessions over team drills, and channels competitive instincts into collecting baseball cards.
  arts: Arnold Gomez, a devoted fan of the LEGO Movie, the adventure novels of Rick Riordan, and the whimsical scores of Michael Giacchino from Pixar’s Up, channels imagination into building intricate LEGO
    dioramas while humming the soundtrack of their favorite films and occasionally sketches characters from the books in a tattered notebook.
  travel: Arnold Gomez loves weekend trips to the nearby state park for nature walks, remembers a family vacation to Washington D.C.’s National Museum of Natural History, and dreams of exploring the Amazon
    rainforest someday, preferring carefully planned itineraries that balance familiar comfort with the thrill of discovery.
  culinary: Arnold Gomez, who can independently make a peanut‑butter‑and‑jelly sandwich and favors cheese pizza topped with pepperoni and olives, also enjoys the crunchy texture of carrot sticks and the
    sweet tang of strawberry yogurt, often experimenting with simple LEGO‑shaped cookies using flour, butter, and chocolate chips.
  core: Arnold Gomez is a structured‑yet‑imaginative 7‑year‑old who turns anxiety into meticulous LEGO creations, trades allowance for collectibles, and navigates the world with a competitive spark tempered
    by a love for quiet adventure.
background:
  cultural: Arnold grew up in a small, predominantly White community in Lebanon, Tennessee, where family ties, church gatherings, and local events like the Smith County fair shape daily life. His upbringing
    emphasizes modesty, respect for tradition, and a close‑knit neighborhood atmosphere, while school introduces him to broader American cultural staples such as holiday celebrations and community service
    projects.
