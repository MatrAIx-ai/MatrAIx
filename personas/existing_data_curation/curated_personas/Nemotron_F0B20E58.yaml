  career_goals: Arnold dreams of becoming a firefighter one day because he admires the predictability of a station’s schedule and the chance to help his community right away. In the short term, he aims
    to be the class line‑leader and win the school’s spelling bee, hoping these achievements will boost his confidence and reduce his anxiety about performance.
