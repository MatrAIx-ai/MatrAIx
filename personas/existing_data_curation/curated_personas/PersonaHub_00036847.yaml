persona_description: A researcher at the University of Montreal who studies the impact of daycare on the nutritional health of children. The researcher is interested in the potential of daycare to reduce
  weight problems in children and believes that it has the potential to promote physical activity and healthy eating. The researcher is financially supported by the Canadian Institutes of Health Research
  and has a background in group theory and the study of subgroups and isomorphisms. The researcher is also an Honorary Research Associate at the Institute of Child Health, University College London.
