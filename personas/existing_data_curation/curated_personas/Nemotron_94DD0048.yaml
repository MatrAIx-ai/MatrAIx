personas:
  professional: Julio Alberto, a 36‑year‑old freelance visual storyteller, blends digital illustration, abstract watercolor painting, bilingual poetry, and community art‑therapy facilitation into client
    commissions while pursuing a graphic‑design certificate, channeling their restless imagination into a sustainable creative practice.
  sports: Julio Alberto finds cardio in salsa dancing at the local Salsa Miami studio, attends weekly yoga sessions at Bayfront Park, and supports the Miami Heat and Inter Miami CF, yet they rarely join
    organized sports leagues, preferring informal beach volleyball games at South Beach during the summer months.
  arts: Julio Alberto immerses themselves in the vivid brushstrokes of Frida Kahlo, the magical realism of Gabriel García Márquez, the rhythmic complexity of Tito Puente’s salsa, and the bold abstractions
    of Mark Rothko, channeling these influences into daily sketchbooks, digital commissions, and poetry that explores the interplay of memory and identity.
  travel: Julio Alberto approaches travel as a sensory research project, meticulously planning weekend trips to Miami’s Wynwood Arts District and Key West, while occasionally booking spontaneous flights
    to Barcelona’s street‑art neighborhoods and Oaxaca’s culinary festivals, all balanced against their freelance cash‑flow and a desire to gather fresh visual and poetic inspiration.
  culinary: Julio Alberto enjoys crafting traditional ropa vieja with slow‑cooked shredded beef, sweet plantains, cumin, oregano, and sour orange juice, while also experimenting with pastelitos filled with
    guava jam and cream cheese, and their kitchen often fills with the aromas of sautéed onions, garlic, and cilantro, reflecting an intermediate cooking skill that serves as both nostalgic comfort and
    artistic expression.
  core: Julio Alberto, a 36‑year‑old visual poet, channels relentless creativity into watercolor and digital art while battling a habit of late‑night caffeine binges that fuel anxiety‑driven bursts of productivity,
    and they frequently procrastinate on administrative tasks until deadlines loom.
background:
  cultural: Julio was raised in the vibrant Cuban diaspora of Miami, inheriting a rich blend of Afro‑Cuban rhythms, Catholic traditions, and the spirited language of Spanish. Family gatherings revolve around
    shared meals, music, and storytelling, reinforcing a strong sense of identity and community loyalty. He effortlessly navigates both English‑speaking American contexts and Spanish‑dominant Cuban circles,
    often acting as a cultural bridge. The legacy of Cuban literature, from José Martí to contemporary novelists, fuels his love for storytelling, while the city’s murals and festivals inspire his visual
    art. Despite feeling the pull of his heritage, Julio also contends with the complexities of a bicultural identity, which informs his artistic focus on memory, migration, and belonging.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Creative writing (poetry and short stories)'', ''Photography (street and portrait)'', ''Basic web design (HTML/CSS,
