  hobbies: '[''Painting and sketching'', ''Digital illustration'', ''Poetry writing (Spanish and English)'', ''Street and mural photography'', ''Salsa dancing and live music'', ''Cooking Cuban dishes'',
    ''Reading magical realism and philosophy'', ''Meditation and journaling'', ''Attending art exhibitions and festivals'', ''Volunteering at community mental‑health workshops'']'
  career_goals: Julio aims to channel his artistic talents into a sustainable freelance career, building a diverse portfolio that blends visual art, writing, and cultural storytelling. He plans to enroll
    in a community college program for graphic design to formalize his skills while continuing to sell prints and digital commissions through an online shop. Long‑term, he dreams of opening a modest community
    space in Miami that serves as a gallery, workshop venue, and café featuring Cuban cuisine, providing a platform for emerging artists and a supportive environment for mental‑health awareness through
    art. He also wishes to develop his abilities as an art‑therapy facilitator, using his personal experience with anxiety to help others express and manage emotions creatively.
