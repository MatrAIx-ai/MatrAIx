personas:
  professional: A budding problem-solver, Edgar Fajardo shows early signs of systematic problem solving as they stack blocks with methodical precision, hinting at future engineering or scientific endeavors.
  sports: A playful early sports fan, Edgar Fajardo delights when the New York Yankees mascot appears on television and participates in a parent‑child splash‑together swim class at the community pool, reflecting
    his budding affinity for team spirit and movement.
  arts: A budding connoisseur of sound and color, Edgar Fajardo is enchanted by Yo‑Yo Ma’s gentle cello lullabies and the vivid animation of Disney’s 'Moana', often clutching a soft stuffed Mickey Mouse
    while babbling along to the classic 'The Wheels on the Bus' melody.
  travel: A curious explorer, Edgar Fajardo enjoys weekend trips to the nearby zoo and a family‑friendly beach resort in Maui, with his parents meticulously packing a clearly labeled diaper bag and favorite
    blanket to ease his need for routine and comfort.
  culinary: A developing palate, Edgar Fajardo prefers smooth avocado‑banana mash and soft sweet‑potato puree, insisting on the same brightly colored bowl each feeding, while his caregiver’s precise meal
    prepping ensures a balanced diet that satisfies his methodical, routine‑loving demeanor.
  core: Nervous yet methodical, Edgar Fajardo, a one‑year‑old, constantly re‑arranges his stacking blocks in perfect rows, clings to his favorite soft blanket for comfort, and expresses an uncanny early‑life
    blend of curiosity, practicality, and a tendency to fret over the slightest change.
background:
  cultural: Edgar comes from a Mexican family living in Adelanto, California. His home is bilingual, with Spanish spoken alongside English, and cultural traditions such as celebrating Día de los Muertos,
    enjoying Mexican cuisine like tacos and tamales, and listening to regional music are woven into daily life. The community’s strong family ties and emphasis on respect for elders shape his early social
    experiences.
