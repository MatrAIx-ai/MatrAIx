persona_description: A political scientist who specializes in the study of totalitarian systems, particularly those based on lies and compulsion. Their expertise lies in the analysis of the ideologies,
  tactics, and outcomes of such systems, and their research interests include the impact of totalitarianism on society, the role of propaganda and control in maintaining power, and the challenges faced
  by those who seek to challenge or undermine such systems. They have a keen understanding of the parallels between the Soviet Union and the Islamic Republic of Iran, and their work has been published in
  academic journals and presented at conferences on the subject.
