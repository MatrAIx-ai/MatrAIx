persona_description: A Briton who played a significant role in the history of lunar exploration, particularly through the design of Houston's Mission Control Center and the creation of the oldest surviving
  naked-eye map of the Moon. He is also known for his contributions to the Apollo programme, including the development of spacecraft tracking stations worldwide and the establishment of procedures for rescuing
  returning astronauts from the Pacific Ocean. His achievements include introducing cricket to his American colleagues and being influential in the design of Houston's Mission Control Center. He is also
  an Anglophile with British forebears and has been interviewed about his contributions to the Apollo programme.
