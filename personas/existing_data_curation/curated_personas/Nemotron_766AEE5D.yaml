personas:
  professional: Mei Cheng is an instructional designer and library science specialist who blends meticulous data analytics, Python-driven workflow automation, and bilingual metadata curation into innovative
    digital literacy programs, allowing their love of abstract concepts and organized planning to shine in every workshop they lead.
  sports: Mei Cheng enjoys weekend hikes on the Billy Goat Trail, follows the Washington Capitals for NHL excitement, and plays in a local co‑ed recreational softball league that practices at the Virginia
    Beach YMCA, balancing low‑key fitness with community camaraderie.
  arts: Mei Cheng paints watercolors inspired by the delicate brushwork of traditional Chinese calligraphy and the atmospheric tones of Ando Hiroshige, attends intimate gallery openings featuring emerging
    artists like Sarah Mash, and finds calm in piano renditions of Debussy’s "Clair de Lune" and Chopin nocturnes.
  travel: Mei Cheng loves thoughtfully planned trips that blend cultural immersion and nature, having trekked the Red Rock Canyon trails during a weekend getaway, explored the historic alleyways of Kyoto,
    and dreaming of returning to the lantern‑lit streets of Taipei for a culinary and artistic retreat.
  culinary: Mei Cheng is a confident home cook who experiments with fusion dishes such as miso‑marinated tofu tacos and scallion‑infused dumpling soup, favoring fresh ginger, Sichuan peppercorns, and locally
    sourced heirloom tomatoes to create meals that celebrate both heritage flavors and contemporary twists.
  core: Mei Cheng is a detail‑oriented library innovator who balances a love for abstract art with disciplined financial habits, yet occasionally gets lost in endless watercolor projects and forgets to
    water their indoor plants.
background:
  cultural: Mei is a second‑generation East Asian American, born to immigrant parents who maintain strong cultural ties to their homeland while embracing American values. She grew up bilingual, speaking
    Mandarin at home and English in school, which shaped her appreciation for cross‑cultural communication and harmony. Family traditions such as Lunar New Year celebrations and respect for education influence
    her organized and cooperative nature. Living in McLean, VA, she engages with a diverse community, incorporating inclusive programming in her professional work and fostering a multicultural perspective
    in her personal life.
