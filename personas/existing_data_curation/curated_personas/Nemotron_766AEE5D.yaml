  career_goals: Mei aspires to move into a senior leadership role within a university or public library system, such as Director of Instructional Services or Chief Librarian, where she can champion innovative
    learning experiences that blend technology, art, and abstract thinking. She aims to spearhead programs that use AI-driven research tools and immersive media to enhance information access. Additionally,
    Mei plans to mentor emerging library professionals, promote inclusive services for underrepresented communities, and pursue a doctoral degree in Library and Information Science to deepen her research
    on user-centered design.
