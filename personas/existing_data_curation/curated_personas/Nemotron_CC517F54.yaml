  career_goals: John aims to become a senior audit manager within the next three years, positioning himself for a partner track at his firm while gaining expertise in forensic accounting and data‑driven
    audit technologies. He plans to obtain a Certified Information Systems Auditor (CISA) credential and lead cross‑functional projects that integrate automation into audit workflows. Long‑term, he envisions
    transitioning to a CFO role for a mid‑size tech company in the Pacific Northwest, where he can blend his solid accounting foundation with strategic financial planning, all while maintaining a sustainable
    work‑life balance to mitigate his stress sensitivity.
