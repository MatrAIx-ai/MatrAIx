persona_description: A researcher from the Food and Agriculture Organization of the United Nations (FAO) who specializes in the study of global food security, sustainable resource management, and climate
  change. They have experience in leading research conferences and working with senior researchers from the CGIAR and other research organizations to examine the contribution that public research must make
  to food security and nutrition, natural resource management, and climate change. They have a unique understanding of the challenges of the coming years and are committed to renewing efforts to address
  these challenges and set priorities for the path forward.
