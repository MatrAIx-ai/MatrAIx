persona_description: A public health researcher who specializes in the analysis and interpretation of mortality data from developing countries. They are interested in the limitations and limitations of
  civil registration systems, and how they can be improved to obtain more representative data on age-, gender- and social stratum-specific mortality rates for major diseases. They are also interested in
  the measurement of infectious diseases, particularly meningitis, and chronic diseases such as myocardial infarction. They have a keen interest in the use of verbal autopsies for child deaths and the addition
  of verbal autopsies to Demographic and Health Surveys (DHS) and other surveys. They have a deep understanding of the major causes of death worldwide and are skilled in the analysis of mortality data from
  developing countries.
