personas:
  professional: Selena Jenkins, a veteran facilities maintenance technician with thirty years of experience, leverages their meticulous organization and curiosity for smart‑home automation, and they consistently
    apply a relentless drive for high standards to lead complex preventative‑maintenance projects, positioning themselves for a senior supervisory role.
  sports: Selena Jenkins hikes the surrounding Allegheny hills with a local senior walking group, birdwatching along trails, follows the Baltimore Ravens and the Maryland Terrapins football team with spirited
    loyalty, and occasionally joins a town softball league, balancing their competitive nature with a love for outdoor fitness, and they always finish each session with a series of stretch routines.
  arts: Selena Jenkins dedicates her evenings to watercolor and pottery workshops at the Wellsville Arts Center, draws artistic inspiration from the bold colors of Georgia O’Keeffe and the earthy textures
    of local folk artist Mary Curran, and they proudly display her creations at the annual Allegany County craft fair, where they also mentor novice painters and occasionally experiment with mixed‑media
    collage.
  travel: Selena Jenkins favors road‑trip journeys that combine historical sites and natural scenery, having explored the Blue Ridge Parkway, the Gettysburg battlefield, and a weekend getaway to the Adirondacks,
    while they plan a future cultural pilgrimage to Edinburgh’s historic Old Town, all within a budget‑conscious travel plan anchored by her retirement savings.
  culinary: Selena Jenkins savors farm‑to‑table cooking, frequently preparing roasted beet and goat‑cheese salad, heirloom tomato gazpacho, and her signature chicken pot pie made with carrots, potatoes,
    and fresh rosemary harvested from her garden, while they experiment with homemade sourdough starter and locally sourced honey, and they often host neighborhood potluck evenings to share her dishes.
  core: Selena Jenkins blends a tradesman’s exacting discipline with an artist’s curiosity, turning every maintenance task, horticultural harvest, and community project into a competitive, creatively structured
    endeavor, while they safeguard their finances with a wary eye toward value.
background:
  cultural: Selena grew up in a working‑class family of English‑Irish ancestry in the Southern Tier of New York. The region’s pragmatic, self‑reliant ethos shaped her disciplined approach to work and community.
    She was raised in the Methodist tradition and remains active in her local church’s service projects. Wellsville’s blend of rural farming, logging history, and modest industrial presence gave her a deep
    respect for the land and for fellow neighbors, while exposure to the nearby Seneca Nation’s heritage fostered an appreciation for local indigenous history. Seasonal town festivals, barn dances, and
    the close‑knit community gatherings are central to her cultural identity, and she often incorporates that sense of fellowship into her social and volunteer activities.
attributes:
  skills: '[''Electrical troubleshooting'', ''Wiring and circuit repair'', ''Plumbing repair'', ''HVAC servicing'', ''Preventative maintenance planning'', ''Small‑engine repair'', ''Blueprint and schematic
    reading'', ''OSHA safety compliance'', ''CMMS (Computer‑Aided Maintenance Management) operation'', ''Carpentry'', ''Welding'', ''Inventory management'', ''Budgeting and cost control'', ''Vendor negotiation'',
    ''Apprentice training and mentorship'']'
  hobbies: '[''Watercolor painting'', ''Pottery'', ''Historic preservation volunteering'', ''Vintage farm‑equipment restoration'', ''Hiking and birdwatching'', ''Gardening (vegetable and native perennials)'',
    ''Trivia night hosting'', ''Crossword puzzle competition'', ''Bridge club'', ''DIY home‑repair teaching'', ''Smart‑home automation experiments'']'
  career_goals: Selena aims to transition from a general maintenance technician to a senior facilities supervisor or plant manager for a municipal or regional organization within the next five years. She
    plans to earn the Certified Maintenance & Reliability Professional (CMRP) credential and complete a bachelor’s degree in Facilities Management through a local community college. Her long‑term ambition
    is to lead a team that implements energy‑efficiency upgrades, such as solar thermal and LED retrofits, and to develop a mentorship program that passes her high‑standard work ethic to the next generation
    of tradespeople. Ultimately, she hopes to launch a small consulting firm that offers preventive‑maintenance audits for small businesses in Allegany County.
