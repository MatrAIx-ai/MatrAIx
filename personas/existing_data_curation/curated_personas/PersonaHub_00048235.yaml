persona_description: A political scientist who specializes in the study of American politics, particularly the role of the Electoral College in shaping the outcome of presidential elections. His research
  interests include, but are not limited to, the impact of money on campaigns and candidates, the role of the media in elections, and the use of direct democracy at the state level. He is knowledgeable
  about the process of electing electors and the criteria for electors, and has a deep understanding of the history and evolution of the Electoral College. He is also well-versed in the arguments in favor
  and against the Electoral College, and is skilled in analyzing and interpreting election data.
