personas:
  professional: Annasha Ridgeway, an experienced building and construction inspector with an associate's degree, leverages her knack for translating complex code language into clear, actionable reports
    while balancing her curiosity about sustainable materials with a practical, cost-effective mindset, often mediating contractor disputes and using iAuditor and Bluebeam to streamline inspections.
  sports: Annasha Ridgeway, a casual fitness enthusiast, participates in a local Sunday morning 5K run organized by the Cincinnati Running Club, practices gentle yoga twice weekly at the Yoga Tree studio,
    follows the Cincinnati Reds during baseball season, and enjoys weekend hikes in Eden Park while occasionally joining a co-ed recreational softball league.
  arts: Annasha Ridgeway, an avid lover of the arts, regularly attends live jazz sets featuring artists like Kamasi Washington at Cincinnati’s Peacock Alley, enjoys R&B evenings headlined by H.E.R., curates
    an eclectic collection of architecture books ranging from Frank Lloyd Wright to contemporary sustainable design, and finds inspiration for her gardening in the botanical illustrations of Pierre-Joseph
    Redouté.
  travel: Annasha Ridgeway favors purposeful travel that blends relaxation with sustainable learning, often weekend-tripping to Hocking Hills State Park for hiking, dreaming of a future study tour of green-building
    projects in Denmark’s Copenhagen, while also planning family-friendly vacations to Asheville’s artsy downtown and occasional road-stops at farmers’ markets along the Ohio River.
  culinary: Annasha Ridgeway, a self-taught home chef, adapts classic soul food staples like collard greens and sweet potato pie with health-focused twists—using smoked turkey, quinoa, almond flour, and
    fresh herbs from her garden—while frequently hosting potluck gatherings centered around dishes such as kale-and-black-bean tacos and herb-marinated grilled chicken.
  core: Annasha Ridgeway bridges the rigor of building code enforcement with a green-thumbed passion for gardening, juggling a habit of occasional procrastination, persistent worry, and a love for soulful
    cooking and downtown jazz nights.
background:
  cultural: Annasha is a second‑generation African‑American who grew up in a close‑knit Black community in Cincinnati. Her family’s roots trace back to the Great Migration, bringing stories of resilience
    and self‑reliance that shape her values. She maintains strong ties to the local church, participates in annual Juneteenth celebrations, and supports community initiatives that promote economic empowerment
    and representation in skilled trades. Her cultural heritage influences her love for music, storytelling, and food, and she often incorporates these traditions into her social gatherings and mentoring
    work.
attributes:
  skills: '[''Building Code Compliance'', ''Structural System Inspection'', ''Electrical and Mechanical Systems Review'', ''Blueprint and Plan Interpretation'', ''Safety Regulation Enforcement'', ''Construction
    Site Documentation'', ''Report Writing and Digital Documentation'', ''Use of Inspection Software (iAuditor, Bluebeam)'', ''Conflict Resolution and Stakeholder Communication'', ''Problem Solving and
    Critical Thinking'', ''Knowledge of Sustainable Building Practices'', ''Flexible Project Coordination'']'
  hobbies: '[''Backyard Gardening'', ''Cooking (Soul Food & Healthy Adaptations)'', ''Reading (Architecture, Sustainable Design, African‑American History)'', ''Yoga and Mindfulness Meditation'', ''Hiking
    in Local Parks'', ''Attending Live Jazz/R&B Shows'', ''Volunteering with Youth Construction Program'']'
  career_goals: Annasha aims to obtain her Certified Building Official (CBO) credential within the next two years and eventually move into a supervisory role where she can lead a team of inspectors. She
    is interested in specializing in green‑building inspections, integrating energy‑efficiency standards and LEED certification criteria into her work. Long‑term, she hopes to launch a consultancy that
    offers independent compliance audits and mentorship programs for women and minorities entering the construction trades. Balancing her ambition with her desire for flexibility, she also plans to improve
    her organizational systems to reduce stress and better manage her workload.
