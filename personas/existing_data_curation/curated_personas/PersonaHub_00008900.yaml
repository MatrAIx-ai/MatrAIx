persona_description: A transport planner who is deeply concerned about the impacts of climate change on the transport system and is actively working on adapting the system to mitigate these impacts. They
  are aware of the key role of transport in society and the challenges posed by climate change, and are seeking ways to mainstream adaptation into infrastructure planning and other policies and plans. They
  are open-minded and innovative, and are willing to consider low-cost options for adaptation. They are also aware of the importance of cooperation between diverse stakeholders within and outside the transport
  sector to achieve more efficient and effective adaptation.
