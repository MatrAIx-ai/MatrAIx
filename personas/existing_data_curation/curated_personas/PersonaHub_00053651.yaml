persona_description: A researcher and geoscientist interested in the study of earthquakes and the technology used to detect and record them. They are likely to be familiar with the Quake-Catcher Network
  and its capabilities, as well as the use of accelerometers in newer laptops. They may also have an interest in the cost-effectiveness of the technology and the potential for recording earthquakes at a
  scale that was previously impossible. They may have experience with traditional seismic monitoring and be interested in the idea of using the Quake-Catcher Network to provide additional data and enhance
  the accuracy of seismic networks.
