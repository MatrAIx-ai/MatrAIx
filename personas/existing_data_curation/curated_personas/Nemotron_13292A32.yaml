personas:
  professional: Mercedes Berggren is a seasoned medical records specialist who leverages her expertise in ICD-10 coding, Epic EHR administration, and data quality auditing to drive process‑improvement projects
    while mentoring junior staff, balancing her curiosity for AI‑assisted tools with a pragmatic focus on compliance and measurable outcomes.
  sports: Mercedes Berggren enjoys low‑impact fitness, joining a local senior walking club that meets twice weekly on the nature trail where she also indulges in birdwatching, and she roots for the local
    baseball team and follows the national soccer league, balancing leisurely activity with occasional community bowling league participation.
  arts: Mercedes Berggren immerses herself in historical fiction by Hilary Mantel, classical music by Bach, and the paintings of Claude Monet, often attending a monthly book club discussion and visiting
    the community theater's classic play revivals, while her knitting hobby reflects an appreciation for craft traditions and the tactile arts.
  travel: Mercedes Berggren favors carefully planned, low‑key travel, taking weekend retreats to nearby state parks such as Shenandoah for hiking and birdwatching, and she dreams of touring the historic
    gardens of the Cotswolds and exploring the fjords of Norway, always drafting itineraries that balance serenity with cultural enrichment.
  culinary: Mercedes Berggren enjoys farm‑to‑table cooking, frequently preparing dishes like heirloom tomato ratatouille, roasted beet and goat‑cheese salad with fresh dill, and a weekend cinnamon‑spiced
    apple crisp, showcasing her moderate cooking skill and preference for seasonal, locally sourced ingredients.
  core: Mercedes Berggren blends meticulous organization with a quiet curiosity, juggling a thriving health‑IT career, a thriving garden, and a penchant for over‑analyzing grocery receipts while never missing
    a weekly crossword puzzle deadline.
background:
  cultural: Mercedes grew up in a white, Midwestern family with German and Scandinavian ancestry, values that emphasize practicality, self‑reliance, and community service. Living in Maineville, Ohio, she
    embodies the region's modest, hardworking ethos, balancing personal privacy with a deep sense of neighborliness. Family gatherings, church holidays, and local festivals have reinforced her appreciation
    for tradition while allowing room for curiosity‑driven learning. The cultural norm of respecting personal space aligns with her reserved demeanor, and the collaborative spirit of the Midwest supports
    her cooperative yet assertive approach to professional and personal relationships.
attributes:
  skills: '[''Medical coding (ICD-10, CPT)'', ''Electronic Health Record (EHR) administration (Epic)'', ''HIPAA privacy and security compliance'', ''Health information governance and policy'', ''Data quality
    auditing and integrity checks'', ''SQL query writing and data extraction'', ''Process improvement and workflow optimization'', ''Staff training and mentorship'', ''Project coordination for health IT
    initiatives'']'
  hobbies: '[''Reading historical fiction and non-fiction'', ''Gardening (flowers & vegetables)'', ''Birdwatching during local nature walks'', ''Knitting and crocheting'', ''Cooking experimental but balanced
    meals'', ''Puzzle solving (crosswords, sudoku)'', ''Genealogy research'', ''Small‑group community book club'']'
  career_goals: Mercedes aims to advance to a health information manager or director of medical records within the next five years, leveraging her practical experience to lead a department that balances
    rigorous compliance with innovative data analytics. She plans to earn the RHIA (Registered Health Information Administrator) certification and possibly a master's degree in health informatics. Her ambition
    includes implementing AI‑assisted record summarization tools while safeguarding patient privacy, building robust data pipelines for quality‑improvement research, and creating mentorship programs for
    emerging health‑IT professionals. Throughout her career progression, she seeks to maintain a stable work‑life balance that allows sustained involvement in family and community activities.
