persona_description: A Native American speaker who advocates for the sharing of oral history and cultural information, especially in environmental and resource management contexts. They are known for their
  expertise in balancing intellectual property, oral history, and cultural information, and for their ability to find the right balance in sharing this information. They also advocate for the use of the
  word "decolonize" to characterize the intent of the actions, and for the elevation of the oldest data set available, which is from tribes. They have received calls and questions about their presentations,
  and have a quick response back to people who question tribal knowledge.
