  career_goals: Bobbie is fascinated by caring for living things and exploring the natural world. He dreams of becoming a veterinarian or wildlife biologist because he wants to help animals and protect
    their habitats. He also loves art and imagines a future where he could merge science and creativity, perhaps as an environmental illustrator or product designer focused on sustainable solutions. While
    his ambitions are still forming, he consistently seeks a career that allows him to help others, contribute to harmony, and apply his curiosity and artistic sensibility.
