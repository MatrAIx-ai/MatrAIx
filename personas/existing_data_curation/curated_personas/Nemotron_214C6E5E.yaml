  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Reading Poetry and Contemporary Literature'', ''Participating in Small Book Clubs'', ''Cooking Traditional Puerto Rican Cuisine'', ''Gardening'',
    ''Yoga and Mindfulness Practice'', ''Hiking Trails in Morovis'', ''Listening to Bomba and Plena Music'']'
  career_goals: Rosario aims to progress from first‑line supervision to a mid‑level management role overseeing multiple administrative departments within the municipal government. She plans to earn a Project
    Management Professional (PMP) certification and to develop a community‑arts liaison program that bridges municipal services with local cultural initiatives. Additionally, she seeks mentorship opportunities
    to empower other women in administrative leadership and to cultivate a healthier work‑life balance through stress‑management training.
