persona_description: A programmer or developer who is new to UEFI and is interested in understanding the key concepts and APIs used in UEFI development. This person is looking for a comprehensive introduction
  to UEFI's basic programming model, objects managed by UEFI-conformant firmware, UEFI system table, task priority levels, UEFI driver binding model, boot manager and console management, EDK II libraries,
  and the UEFI Shell command line interface. This person is also interested in learning about useful UEFI Shell commands and the open source project EDK II and its related documentation.
