personas:
  professional: Lisa Wick, a seasoned pharmacy technician with decades of hands‑on experience in medication dispensing, sterile and non‑sterile compounding, and inventory control, leverages their imaginative
    problem‑solving and competitive drive to mentor new staff, streamline quality‑assurance processes, and champion community health‑education events that blend art therapy with medication safety.
  sports: Lisa Wick, an enthusiastic participant in community walking groups and salsa dancing classes, follows the Sioux Falls Storm indoor football team and the Rapid City Rush hockey club with a competitive
    spirit, while also practicing weekly yoga to maintain flexibility for pottery, and they cheer loudly at local college baseball games of the South Dakota State Jackrabbits during summer.
  arts: Lisa Wick, an abstract watercolor painter inspired by Kandinsky and O’Keeffe, a pottery hobbyist admiring Bernard Leach’s techniques, a photographer who emulates Ansel Adams’ chiaroscuro in the
    Badlands, and a theater aficionado who regularly attends productions at the South Dakota Repertory Theatre featuring works by August Wilson, channels their creative energy into curating mini‑exhibits
    for health‑education events.
  travel: Lisa Wick, a thoughtful traveler who prefers planned, budget‑conscious road trips to regional art festivals—having recently showcased work at the Santa Fe Indian Market and longing to explore
    the Venice Biennale—balances wanderlust with family responsibilities and uses a detailed itinerary to maximize gallery visits and photography opportunities.
  culinary: Lisa Wick, a confident home cook who enjoys preparing prairie turnip quinoa salad, grilled trout with lemon‑dill sauce, and buttery cornbread seasoned with fresh lavender from their garden,
    often pairing meals with locally sourced bison stew and a glass of Pinot Noir while discussing the day’s watercolor experiments.
  core: Lisa Wick, a 61‑year‑old pharmacy technician turned community artist, merges meticulous scientific expertise with boundless creative curiosity, leading health‑education workshops that sparkle with
    watercolor palettes while competitively seeking the best deals on supplies and staying energetically engaged in salsa, walking, and lifelong learning.
background:
  cultural: Lisa is a white American raised in the rural environment of Burke, South Dakota, within a close‑knit Midwestern community that values self‑reliance, neighborly support, and modesty. Her family's
    roots in small‑town life instilled a strong work ethic and a deep appreciation for community traditions, such as local fairs and prairie folk art. Pursuing a bachelor's degree in the humanities broadened
    her cultural outlook, exposing her to global artistic movements, literature, and philosophical ideas. This blend of Midwestern pragmatism and an expansive intellectual curiosity shapes her worldview,
    allowing her to honor local heritage while embracing diverse artistic expressions and innovative community initiatives.
