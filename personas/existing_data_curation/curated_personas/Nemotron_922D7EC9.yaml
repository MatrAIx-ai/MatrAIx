  career_goals: Lisa aims to become the lead pharmacy technician at her clinic, guiding a team through mentorship programs and quality‑control initiatives. She plans to earn the Certified Pharmacy Technician
    (CPhT) credential and later pursue a certificate in health education to develop community workshops that blend medication safety with art therapy. Long‑term, she hopes to spearhead a collaborative program
    with the local senior center and a nearby art museum, offering creativity‑based health sessions. While staying active in her professional field, she also envisions launching a small home studio where
    she can produce and sell abstract watercolor pieces, and she aspires to travel to regional art festivals to showcase her work. Her competitive drive fuels her desire to lead state‑level pharmacy tech
    quality‑improvement competitions and to be recognized for innovative community outreach.
