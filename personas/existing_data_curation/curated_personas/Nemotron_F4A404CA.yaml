  hobbies: '["Visiting Art Galleries and Museums", "Amateur Photography", "Hiking and Nature Walks", "Reading Science Fiction & Fantasy", "Attending Live Music Performances", "Board Games", "Home Brewing",
    "Cooking Experimental Recipes", "Volunteering at Community Art Workshops"]'
  career_goals: Ronald aims to move from receptionist to office manager within the next three years, targeting an associate degree in Business Administration to strengthen his managerial credentials. He
    aspires to lead a small team, oversee facility operations, and introduce initiatives that blend his artistic interests with workplace culture—such as quarterly art exhibitions featuring local creators.
    Long‑term, he envisions a senior administrative role in a cultural institution (museum, community arts center) where he can apply his operational expertise and passion for the arts to enhance public
    engagement.
