  career_goals: Dominick plans to bridge to a registered nurse role through an accelerated LPN‑to‑RN program, then earn a BSN and pursue advanced certifications in wound care and health informatics. Within
    five years, he aims to step into an advanced practice position such as a nurse practitioner or clinical educator, leading quality‑improvement projects and integrating data‑driven care pathways. He also
    aspires to develop a community health outreach initiative in underserved San Diego neighborhoods, leveraging his competitive drive to achieve measurable improvements in preventive care outcomes.
