personas:
  professional: Dominick Pittman, a meticulous clinical nurse with a STEM bachelor’s foundation, blends advanced wound care expertise and data‑driven quality‑improvement skills to train junior staff while
    methodically pursuing RN certification and future informatics leadership, and they are known for organizing patient charts like a puzzle.
  sports: Dominick Pittman competes in a mixed‑gender ultimate frisbee league with the South Bay Spinners, rows with the San Diego Kayak Club on weekends, faithfully follows the San Diego Padres and LA
    Galaxy, and they carve out Sunday mornings for a run along the Torrey Pines Trail.
  arts: Dominick Pittman strums a battered acoustic guitar inspired by Bob Dylan, Bonnie Raitt, and Gary Clark Jr., immerses themselves in science nonfiction by Siddhartha Mukherjee, and they regularly
    attend intimate folk gigs at San Diego’s Coffee‑Cortado.
  travel: Dominick Pittman plans trips with spreadsheet precision, favoring self‑guided road trips along California’s Pacific Coast—from a sunrise hike at Big Sur to a sunset kayak at Santa Barbara—while
    dreaming of a culinary pilgrimage to Crete and the Amalfi Coast, and they prefer combining adventure with affordable lodging.
  culinary: Dominick Pittman enjoys creating Mediterranean‑inspired meals such as grilled branzino with lemon‑olive oil, chickpea‑cucumber salad with feta and oregano, and weekend shakshuka spiced with
    smoked paprika and harissa, and they constantly experiment with fresh herbs to perfect flavor balance.
  core: Dominick Pittman is a curiosity‑driven, competitively meticulous nurse who balances nightly crossword puzzles with relentless data‑focused improvement projects, and they can’t resist a perfectly
    organized medical chart—even if that means a lingering espresso habit fuels their over‑ambitious schedule.
background:
  cultural: Dominick grew up in a middle‑class suburban neighborhood of San Diego, rooted in a family of Irish‑German ancestry. His upbringing reflected mainstream West Coast American values—independence,
    environmental awareness, and a fast‑paced lifestyle—while also exposing him to the multicultural tapestry of Southern California, including Hispanic food, festivals, and bilingual interactions. He celebrates
    typical American holidays, enjoys coastal leisure activities, and has cultivated cultural competence through his nursing career, frequently using basic Spanish phrases to communicate with patients.
    His cultural identity blends mainstream American norms, scientific rationality, and an appreciation for the diverse community that shaped his formative years.
