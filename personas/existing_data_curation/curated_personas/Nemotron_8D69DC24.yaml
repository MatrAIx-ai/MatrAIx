  career_goals: Frederick aims to pursue a career in engineering, with a focus on sustainable infrastructure or software development that addresses real-world environmental challenges. He plans to graduate
    high school with honors, earn a scholarship to Oregon State University for a degree in civil or computer engineering, and secure internships that let him apply his practical problem-solving skills.
    Long-term, he hopes to lead projects that blend technology and community benefit, such as designing energy-efficient public spaces or creating data-driven tools for local environmental stewardship.
