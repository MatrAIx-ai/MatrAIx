personas:
  professional: A veteran acute‑care nurse with four decades of clinical expertise, Noelis Perez combines meticulous patient assessment and advanced health‑informatics skills with a natural curiosity for
    art, seamlessly integrating watercolor‑inspired calming techniques into wound‑care routines while pursuing their transition to mentorship and community‑based holistic health workshops.
  sports: As an avid hiker of the Texas Hill Country’s scenic trails, Noelis Perez supplements weekend treks with gentle yoga sessions at the community center, follows the Texas Rangers for baseball, and
    participates in a senior walking group that meets every Saturday at Lady Bird Lake.
  arts: Immersed in watercolor painting reminiscent of Winslow Homer’s landscapes, Noelis Perez also crafts pottery inspired by folk traditions, regularly attends mariachi performances by Los Guitarreros
    and community theater productions at the Austin Playhouse, and draws artistic motivation from the vibrant canvases of Georgia O'Keeffe and contemporary watercolorist Yao Cheng.
  travel: Preferring relaxed, spontaneous road trips over rigid itineraries, Noelis Perez explores the historic towns of Fredericksburg and Marfa in Texas, enjoys the Southwestern charm of Santa Fe and
    Sedona’s red rock vistas, and dreams of wandering the blue streets of Chefchaouen in Morocco on a future sabbatical.
  culinary: An enthusiastic home cook, Noelis Perez blends the heat of fresh jalapeños, the aroma of cilantro and epazote, and the comfort of slow‑braised chicken into dishes like chiladelphia stew and
    roasted corn salsa, displaying a confident intermediate level in both stovetop and open‑flame cooking while occasionally treating friends to handcrafted tamales during festive gatherings.
  core: Noelis Perez is a curious, art‑infused nurse who balances a lifelong dedication to patient care with spontaneous watercolor sessions, occasional financial disarray, and a gentle habit of worrying
    about every detail.
background:
  cultural: Noelis’s Mexican heritage permeates her daily life, from the bilingual conversations she shares with her husband and extended family to the vibrant celebrations of Día de los Muertos and Semana
    Santa that she helps organize in her community. Raised in a close‑knit Mexican‑American household, she values family loyalty, respect for elders, and the communal spirit of sharing food and stories.
    Living in Burnet, Texas, she blends these traditions with the rural Texas ethos of self‑reliance and neighborly support, creating a hybrid cultural identity that informs both her compassionate nursing
    style and her artistic pursuits. Her fluency in Spanish allows her to provide culturally sensitive care to Spanish‑speaking patients, and her cooking often fuses Tex‑Mex flavors, reflecting the rich,
    interwoven tapestry of her background.
