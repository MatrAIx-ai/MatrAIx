  career_goals: Noelis aims to transition from bedside nursing to a mentorship and educator role within the next three years, seeking a position as a clinical instructor or preceptor for nursing students
    at a nearby community college. She also hopes to develop a community-based health workshop series that blends conventional nursing practices with creative arts, such as watercolor painting and music,
    to promote holistic well‑being among seniors in Burnet and surrounding rural areas. Ultimately, she wishes to publish a guide on integrating cultural sensitivity and artistic expression into patient
    care, positioning herself as a thought leader in compassionate, innovative nursing.
