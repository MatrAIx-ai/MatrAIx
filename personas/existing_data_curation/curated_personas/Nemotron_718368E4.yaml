  hobbies: '["School drama club", "Flamenco dancing", "Reading adventure novels", "Soccer", "Science experiment kits", "Digital storytelling with Scratch", "Cooking Spanish recipes with family", "Community
    clean‑up projects", "Drawing and illustration", "Board games with friends"]'
  career_goals: Maria dreams of becoming a bilingual elementary school teacher or a youth mentor in her community, where she can combine her love for learning, her ability to connect with others, and her
    desire to support classmates. She hopes to create inclusive classroom environments that celebrate both Spanish and American cultures, and to use her organizational skills to develop engaging, hands‑on
    projects for children. Long‑term, she envisions leading community outreach programs that promote cultural exchange and academic enrichment.
