personas:
  professional: Maria Mena, an enthusiastic 11‑year‑old budding performer, blends acting, dance, and digital storytelling by leading school drama productions, choreographing flamenco routines at home, and
    creating interactive Scratch narratives, showcasing her organizational flair, boundless curiosity, and natural ability to captivate audiences.
  sports: Maria Mena, a forward for the River City Youth Soccer Club, spends Saturdays sprinting on the field, proudly wears a jersey of the hometown professional team, the River City Rovers, and joins
    school track meets for the 100‑meter dash, exemplifying their energetic sociability and love of teamwork.
  arts: Maria Mena, an avid creator, draws comic‑style cartoons inspired by the whimsical lines of Bill Watterson, sketches nature scenes echoing the palette of Claude Monet, dances flamenco at home with
    rhythms reminiscent of Sara Baras, and stages school plays with a flair influenced by Lin‑Manuel Miranda’s musical storytelling.
  travel: Maria Mena delights in weekend explorations of the nearby seaside village of Coral Cove, where they hunt for tide‑pool critters, and dreams of a summer trip to the historic streets of Granada
    to see the Alhambra, balancing a love for local nature and an adventurous curiosity about world heritage.
  culinary: Maria Mena enjoys helping their grandmother simmer a family paella flavored with saffron, chicken, and smoky chorizo, perfecting a side of patatas bravas seasoned with smoked paprika, and topping
    each plate with fresh parsley and lemon wedges, showcasing a developing palate for vibrant Mediterranean flavors.
  core: Maria Mena is a charismatic, drama‑loving pre‑teen who seamlessly blends curiosity with practicality, turning every stage, soccer field, and kitchen into a playground for creativity, kindness, and
    calm resilience.
background:
  cultural: Maria grows up in a Spanish‑heritage household in Pueblo, Colorado. Her parents speak Spanish at home, and she attends a bilingual elementary program that reinforces both English and Spanish
    language skills. The family celebrates traditional Spanish holidays such as Día de los Reyes, Semana Santa, and enjoys cooking paella, churros, and other regional dishes together. She participates in
    local Hispanic festivals, learning flamenco dance and folk songs, while also engaging in typical American school activities, giving her a rich bicultural perspective.
