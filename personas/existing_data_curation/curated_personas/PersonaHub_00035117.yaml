persona_description: A young African American student who participated in the Moton High School strike in 1951. He was an excellent student and athlete who traveled widely to participate in interscholastic
  events and as president of the statewide New Farmers of America organization. He witnessed the conditions in other school systems and districts and saw signs that life could be better. He organized a
  strike with other students to demand better facilities at Moton High School and persuaded the students' parents to respect the action. He had unique knowledge and skills in education and social justice,
  particularly in the context of the Jim Crow era in the United States.
