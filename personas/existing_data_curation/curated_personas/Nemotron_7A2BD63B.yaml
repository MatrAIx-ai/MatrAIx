  career_goals: Janet aspires to transition into a senior technical leadership role where she can guide cross‑functional teams, mentor junior developers, and shape product strategy. She hopes to deepen
    her expertise in cloud‑native architecture and AI‑driven applications, eventually moving into a principal engineer or tech‑lead position that balances technical challenge with flexible, people‑focused
    project management. Long‑term, she envisions launching her own consultancy that helps midsize companies adopt inclusive, user‑centric software solutions while maintaining a healthy work‑life balance.
