personas:
  professional: Janet Oates, a full‑stack software engineer known for clean code and agile collaboration, blends curiosity with practicality, and they mentor junior developers, drive cross‑functional product
    strategy, and champion inclusive, user‑centric design while embracing a laid‑back, flexible work rhythm.
  sports: Janet Oates competes in a local co‑ed recreational soccer league, follows the Miami Heat and Tampa Bay Buccaneers for weekend thrills, and they spend Saturday mornings kayaking the Indian River
    Lagoon and hiking the Everglades, preferring fun, social exercise over rigid training plans.
  arts: Janet Oates is a regular at live music venues where they enjoy the soulful sounds of John Mayer and the vibrant rhythms of the Florida Orchestra, often unwind with beginner salsa dancing at a downtown
    studio, host board‑game nights featuring Catan, and capture sunrise landscapes inspired by Ansel Adams with their camera.
  travel: Janet Oates blends spontaneous weekend getaways to Florida’s natural gems—Everglades National Park, Key West, and Amelia Island—with dream trips to Iceland for northern‑light photography and Costa
    Rica for river kayaking, planning adventures around community meetups and a modest travel fund while always packing a camera and reusable water bottle.
  culinary: Janet Oates loves staging themed dinner parties that showcase dishes like shrimp‑and‑grits, mango sticky rice, and homemade lavender lemonade, sourcing fresh herbs such as basil and mint from
    their garden, experimenting with spice blends, yet they sometimes overindulge in rich desserts like key‑lime pie, reflecting a playful but occasionally indulgent culinary style.
  core: Janet Oates merges tech curiosity, social energy, and a penchant for spontaneous board‑games and themed meals, while they juggle occasional disorganization, a habit of forgetting to log workouts,
    and a love for late‑night coding marathons.
background:
  cultural: Janet comes from a middle‑class white American family that settled in Central Florida during the 1970s. Her upbringing reflected a blend of suburban Sun‑belt culture—outdoor recreation, community
    festivals, and a relaxed pace—combined with broader mainstream American values such as individualism and egalitarianism. She identifies with the region’s emphasis on flexibility, friendliness, and collaborative
    community spirit, which informs both her professional style and personal interests.
