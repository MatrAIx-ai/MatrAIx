  career_goals: 'Ernest aims to ascend to a senior managerial role within Wake County’s administrative services, such as Director of Office Operations, where he can shape departmentwide efficiency standards
    and mentor emerging supervisors. He also wishes to channel his passion for the arts by leading a community‑focused cultural liaison program that integrates artistic initiatives into municipal projects.
    To cement his credibility, he plans to earn a Project Management Professional (PMP) certification and complete a graduate certificate in Cultural Management. Ultimately, Ernest envisions publishing
    a guide titled “Artful Administration: Leveraging Creativity for Organizational Excellence," positioning himself as a thought leader who blends rigorous management with unconventional artistic insight.'
