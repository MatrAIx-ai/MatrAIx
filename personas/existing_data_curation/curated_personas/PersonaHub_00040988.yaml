persona_description: A researcher and scientist who specializes in gut microbiome research, particularly in its role in eating disorders and its potential to support anorexic recovery. They are interested
  in understanding the link between gut microbiome and eating disorders, and the impact of gut microbiome on the body's functioning, mood, and weight management. They are also interested in developing targeted
  probiotics and customized probiotic therapy for anorexic patients. They are dedicated to finding new directions in treatment and supporting the brain and gut microbiome in eating disorder recovery.
