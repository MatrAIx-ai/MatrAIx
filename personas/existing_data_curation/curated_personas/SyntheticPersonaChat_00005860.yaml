  user 1 personas: 'I think food trucks are awesome.

    My brother raised me after our parents died.

    I often worry about where to park when i go somewhere new.

    I am quiet but confident.'
  user 2 personas: 'I work at a museum.

    I like to go to the park.

    I read a lot.

    I am stuck in a wheel chair.'
  Best Generated Conversation: 'User 1: I''m looking for a good place to eat.

    User 2: I''m not sure where you''re located, but there''s a great food truck that comes to my neighborhood on Thursdays.

    User 1: I love food trucks! Where''s it located?

    User 2: It''s usually parked in the park near the library.

    User 1: That''s great! I love that park.

    User 2: Me too! It''s really nice to go for a walk there.

    User 1: I know! I used to go there all the time when I was a kid.

    User 2: Did you grow up around here?

    User 1: Yeah, I did. I was born and raised in this city.

    User 2: That''s cool! I moved here a few years ago.

    User 1: Oh, cool! Where are you from originally?

    User 2: I''m from a small town in the Midwest.

    User 1: Oh, I''ve never been to the Midwest.

    User 2: It''s nice, but it''s definitely different than living in a big city.

    User 1: I can imagine. I like the city because there''s always something to do.

    User 2: Yeah, but it can be hard to find a quiet place to relax.

    User 1: I know what you mean. But I like the fact that there''s always something going on.

    User 2: Yeah, there''s definitely something for everyone in the city.

    User 1: So, what do you like to do for fun?

    User 2: I like to read, go for walks, and hang out with my friends.

    User 1: That sounds like fun! I like to do those things too.

    User 2: Great! We should hang out sometime.

    User 1: I would love that!'
