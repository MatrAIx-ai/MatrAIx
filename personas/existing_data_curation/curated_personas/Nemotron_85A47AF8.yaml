  hobbies: '[''Visiting local galleries'', ''Sketching and photography'', ''Playing acoustic guitar'', ''Open‑mic nights'', ''Swamp hiking and nature photography'', ''Cooking Southern cuisine'', ''Reading
    sci‑fi/fantasy novels'', ''Volunteering at food bank'', ''Organizing block parties'']'
  career_goals: James aims to obtain his GED within the next year and enroll in a community college program focused on hospitality management or visual arts. He aspires to secure a stable, part‑time position
    at a local community center, museum, or art‑focused nonprofit where he can apply his event‑planning and artistic skills. Over the next five years, he hopes to progress to a program coordinator role
    that blends his love for community engagement with art education. A key personal ambition is to establish a routine that reduces his stress and worry, including regular mental‑health counseling and
    a balanced work‑life schedule.
