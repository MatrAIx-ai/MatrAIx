personas:
  professional: James Dunham is a community‑center aspiring program coordinator who blends their knack for event planning with a budding eye for visual arts, leveraging strong interpersonal skills, flexible
    organization, and DIY resourcefulness to orchestrate low‑budget art workshops and neighborhood block parties, and they view each successful event as a step toward a stable part‑time role while completing
    a GED and college coursework.
  sports: James Dunham enjoys weekend swamp hikes that double as low‑intensity cardio, joins a community 5K running club in the spring, follows the local minor‑league baseball team, the River Town Runners,
    and they occasionally play pickup basketball at the neighborhood rec center, preferring activities that blend social interaction with gentle exercise.
  arts: James Dunham frequents small galleries, mural tours, and regional craft fairs, draws inspiration from folk legends like Bob Dylan and contemporary street artist Banksy, showcases original acoustic
    renditions of simple folk songs at open‑mic nights, and they use free graphic‑design tools to create flyers for community events, weaving visual and musical creativity into daily life.
  travel: James Dunham prefers short, budget‑friendly road trips, revisiting the historic streets of Savannah, exploring misty trails of the Great Smoky Mountains, dreaming of an extended artistic retreat
    in Sedona, Arizona, and they balance wanderlust with the need to stay close to family and volunteer commitments, often planning trips around community event calendars.
  culinary: James Dunham cooks classic Southern comfort food like shrimp and grits, collard greens with smoked turkey, and pecan pie for community potlucks, mastering the perfect buttery cornbread crust,
    enjoys experimenting with fresh herbs such as thyme and oregano, and they occasionally over‑season dishes in their enthusiasm, prompting laughter from fellow diners.
  core: James Dunham is a 32‑year‑old community‑oriented creative who channels curiosity and social energy into art and volunteer work, yet they battle chronic worry that fuels late‑night budgeting and
    occasional over‑committing.
background:
  cultural: James is a white male raised in Oakdale, a small town in Rapides Parish, Louisiana. He grew up within a close‑knit Southern community where church gatherings, high‑school football games, and
    family barbecues are central social events. The region’s Cajun and Creole influences have shaped his culinary tastes and appreciation for lively music. Local traditions like Mardi Gras celebrations,
    crawfish boils, and community festivals fostered his love for group activities and communal harmony. His upbringing emphasizes hospitality, self‑reliance, and a respect for local heritage while also
    exposing him to the modest economic challenges of rural life.
