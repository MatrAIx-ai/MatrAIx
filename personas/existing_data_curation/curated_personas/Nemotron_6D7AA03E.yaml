personas:
  professional: Laura Lucario, a seasoned computer support specialist with three decades of experience, leverages their methodical problem‑solving skills and friendly demeanor to mentor junior technicians
    while aiming for a CompTIA Security+ certification and spearheading senior‑focused digital‑inclusion workshops at the Cleveland Public Library.
  sports: Laura Lucario enjoys daily walks along the Lake Erie shoreline, supports the Cleveland Browns and Guardians, participates in a senior‑friendly rowing club on the Cuyahoga River, and occasionally
    joins a community basketball pick‑up game at the local recreation center.
  arts: Laura Lucario expresses their creative side through watercolor landscapes of the Cuyahoga Valley, regularly attends performances by the Cleveland Orchestra and local folk singer Sarah Low, and collects
    prints from Midwestern realist painter John Baeder, finding artistic inspiration in the region’s industrial heritage.
  travel: Laura Lucario favors short, purposeful trips to historic Ohio towns like Marietta and Oberlin, plans weekend getaways to the Amish Country in Holmes County, and dreams of a leisurely cruise along
    the Great Lakes, balancing their love for heritage exploration with a modest travel budget.
  culinary: Laura Lucario delights in preparing fresh garden‑grown roasted beet and goat‑cheese salads, hearty chicken‑and‑dumpling soup with locally sourced carrots, and classic Cleveland‑style chili topped
    with shredded cheddar, often seasoning dishes with rosemary and smoked paprika.
  core: Laura Lucario blends Midwestern pragmatism with a generous community spirit, channeling decades of tech expertise into mentorship while nurturing a garden, watercolor hobby, and a love of local
    music, all tempered by a tendency to over‑schedule themselves.
background:
  cultural: Laura grew up in a working‑class, white Midwestern family in Cleveland, rooted in the city’s early 20th‑century European immigrant neighborhoods. Raised in a Catholic household, she was taught
    the values of hard work, community service, and modest ambition. The Rust‑Belt atmosphere of reliability and practicality shaped her pragmatic outlook, while the vibrant cultural scene of Cleveland
    nurtured her love of music, art, and collective activities. Her background blends traditional Midwestern sensibilities with a lifelong curiosity for technology and learning.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware repair'', ''Software installation and configuration'', ''Network setup and troubleshooting'', ''Remote desktop support'', ''User training and onboarding'',
