  hobbies: '[''Gardening'', ''Walking along Lake Erie shoreline'', ''Book club'', ''Bridge (card game)'', ''Volunteering at community tech workshops'', ''Watercolor painting'', ''Live music concerts'',
    ''Traveling to nearby historical sites'']'
  career_goals: Looking ahead, Laura hopes to shift from day‑to‑day ticket resolution to a mentorship and consulting role. She plans to earn the CompTIA Security+ certification within the next year to deepen
    her cybersecurity knowledge. She aims to lead a volunteer program that teaches basic computer skills to seniors at the Cleveland Public Library and to serve as an interim trainer for junior technicians
    at her organization, helping to build a pipeline of reliable support staff. Ultimately, she wants to contribute to closing the digital‑divide gap in her community while maintaining a flexible schedule
    that allows her to stay engaged in local social groups.
