    User 1: That sounds like a lot of fun. I love to read too.

    User 2: What are some of your favorite books?

    User 1: I love the Harry Potter series. I also love the Hunger Games series.

    User 2: I''ve heard good things about the Harry Potter series. I''ll have to check it out.

    User 1: You should! It''s a great series.

    User 2: So, what do you like about reading?

    User 1: I love the way it can take me to a different world. I can escape from my own problems and just enjoy the story.

    User 2: I can see why you would like that. I love that too.

    User 1: What do you like about dancing?

    User 2: I love the way it makes me feel. It''s so freeing and expressive.

    User 1: I can see why you would like that. It does look like a lot of fun.

    User 2: It is! I''m glad you''re not letting your past hold you back. I think you''re really strong.

    User 1: Thank you. That means a lot'
