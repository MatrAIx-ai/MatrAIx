persona_description: A microbiologist with expertise in microbial ecology and decomposition processes. This person is interested in understanding how microorganisms interact with each other and how they
  contribute to the overall ecosystem. They are particularly curious about the role of protists in soil decomposition and the potential interactions between microbes and protists. They are looking for a
  research project that combines their expertise in microbiology with their knowledge of protists and decomposition processes to investigate the potential mechanisms behind the observed changes in decomposition
  rate with and without protists.
