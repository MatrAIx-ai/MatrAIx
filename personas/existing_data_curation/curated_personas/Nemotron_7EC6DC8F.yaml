    stress‑relief practices'']'
  hobbies: '[''Sketching in a notebook'', ''Digital illustration on a tablet'', ''Photography (urban and nature)'', ''Reading speculative fiction and poetry'', ''Creative writing (short stories, poetry,
    journaling)'', ''Visiting museums and art galleries'', ''Attending small art workshops'', ''Knitting or crochet'', ''Yoga and mindfulness meditation'', ''Listening to indie folk music'', ''Volunteering
    at an animal shelter'']'
  career_goals: Violet aims to turn her passion for visual storytelling into a professional career. She plans to enroll in a college art program or a community‑college visual‑communication track to earn
    a degree in illustration or graphic design. Her long‑term ambition is to become a freelance illustrator or concept artist, creating artwork for independent publishers, video games, and online platforms
    while maintaining the flexibility to manage her own schedule and stress levels. In parallel, she hopes to work part‑time at a local museum or community art center, developing educational materials and
    leading small workshops for youth, which aligns with her cooperative nature and desire to foster harmony. She also envisions building an online shop for prints and custom commissions, allowing her to
    share her art with a broader audience while preserving a balanced, self‑care‑focused lifestyle.
