personas:
  professional: Violet Gruszecki is an aspiring illustration student who blends meticulous sketching skills with digital Procreate flair, channeling their quiet curiosity into freelance concept art while
    they juggle a part‑time museum assistant gig to nurture youth workshops.
  sports: Violet Gruszecki enjoys leisurely runs along the Indianapolis Cultural Trail in spring, practices yoga at a local studio year‑round, follows the Indianapolis Colts in fall football and the Indiana
    Pacers in winter basketball, and they play in a community art‑themed cycling club that meets Saturday mornings, preferring low‑pressure, small‑group activity over competitive leagues.
  arts: Violet Gruszecki spends evenings sketching while they listen to indie folk artists like Sufjan Stevens and Phoebe Bridgers, draws inspiration from contemporary illustrators such as Loish and Kim
    Jung Gi, visits the Indianapolis Museum of Art to study works by Yayoi Kusama, and they actively participate in small‑group workshops featuring local watercolorist Naomi Carter.
  travel: Violet Gruszecki plans trips with a blend of careful budgeting and spontaneous day‑trips, often biking to nearby Chicago for mural tours, dreaming of a solo pilgrimage to Kyoto’s zen gardens,
    and they cherish annual family visits to the Great Smoky Mountains for quiet hikes and night‑time astrophotography.
  culinary: Violet Gruszecki, a self‑taught kitchen experimenter, favors simple yet vibrant meals like quinoa bowls with roasted beetroot, avocado, and feta, whips up occasional matcha‑green tea cookies,
    indulges in strawberry‑rhubarb pie from the farmer’s market, and they rely on a well‑worn cast‑iron skillet for sautéed seasonal vegetables.
  core: Violet Gruszecki is a quietly ambitious teen artist whose love for subtle storytelling is balanced by a penchant for mindfulness, meticulous budgeting, and occasional bouts of worry that keep them
    both grounded and creatively introspective.
background:
  cultural: Violet comes from a white American family with Polish roots; the Gruszecki surname reflects several generations of Polish immigrants who settled in the Midwest after World War II. Raised in
    a modest, middle‑class neighborhood of Indianapolis, she grew up with a blend of Polish household traditions—such as holiday meals featuring pierogi and occasional use of Polish phrases—and mainstream
    Midwestern values of politeness, community involvement, and a strong work ethic. Her family placed a high value on education and cultivated an appreciation for the arts, regularly visiting the Indianapolis
    Museum of Art, attending local theater productions, and participating in community cultural festivals. This cultural mix gives Violet a respectful outlook toward heritage, a sense of belonging in a
    diverse city, and an openness to varied artistic experiences.
attributes:
