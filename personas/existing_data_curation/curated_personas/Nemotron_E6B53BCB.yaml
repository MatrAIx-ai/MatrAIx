  career_goals: As he approaches the final decade of his professional life, Sarmed aims to channel his expertise into roles that leave a lasting, community‑focused legacy. He is pursuing a senior advisory
    position with St. Tammany Parish’s engineering department to guide resilient flood‑control and coastal‑protection projects that address the region’s hurricane risk. Simultaneously, he plans to launch
    a boutique consulting practice that offers pragmatic, data‑backed engineering solutions while allowing a controlled workload to mitigate stress. His competitive spirit drives him to publish a practical
    guide on project management for senior engineers and to become a frequent speaker at regional ASME and NSPE conferences. Mentorship is a core ambition; he intends to formalize a scholarship for local
    high‑school STEM students and to lead a mentorship program for early‑career engineers. Ultimately, Sarmed hopes to blend his curiosity for emerging sustainable technologies with his reliability to shape
    infrastructure that safeguards his community for generations.
