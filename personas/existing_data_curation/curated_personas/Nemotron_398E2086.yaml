  hobbies: '[''Book club'', ''Community volunteering (food pantry)'', ''Gardening'', ''Cooking and hosting dinner parties'', ''Weekly Zumba class'', ''Hiking'', ''Amateur theater'', ''Family game nights'',
    ''Travel with family'', ''Wine tasting club'']'
  career_goals: Tracy aims to advance to a senior analytics leadership role within the next five years, such as Analytics Team Lead or Operations Manager, where she can shape strategic decisions through
    data‑driven insights. She plans to earn a Six Sigma Black Belt and a PMP certification to bolster her credibility in process improvement and project delivery. Long‑term, she aspires to become a director
    of operations research for a regional manufacturing firm, championing continuous improvement initiatives that enhance productivity while maintaining a healthy work‑life balance for herself and her team.
    She also hopes to mentor women entering the analytics field and contribute to community‑focused economic development projects in Butler County.
