personas:
  professional: Tracy Frymyer is a seasoned operations research analyst and business analytics lead who leverages linear programming, Python, R, and Lean Six Sigma to translate complex data into actionable
    PowerBI dashboards, while her preference for routine and collaborative workshops keeps projects on schedule and her team feel supported.
  sports: Tracy Frymyer thrives on weekly Zumba classes, weekend hikes in the state parks, and fuels her competitive spirit by cheering the Cincinnati Bengals at the stadium while also playing in a local
    co‑ed recreational soccer league.
  arts: Tracy Frymyer delights in performing as a lead in the town’s summer amateur theater, especially in productions like "Our Town" and "A Midsummer Night’s Dream," while also finding inspiration in
    the music of Hozier and the films of Greta Gerwig, which shape her creative hosting style.
  travel: Tracy Frymyer prefers meticulously planned weekend getaways, having explored Asheville’s Blue Ridge Mountains and Savannah’s historic district, while dreaming of a spring road trip through Scotland’s
    Highlands to capture the scenery for her garden’s new floral designs.
  culinary: Tracy Frymyer showcases her garden’s bounty by crafting rosemary‑infused roasted chicken, beet‑and‑goat‑cheese salads, and homemade gnocchi, often pairing meals with locally sourced apple cider
    and inviting friends for themed dinner parties that feature a curated playlist of classic Broadway numbers.
  core: Tracy Frymyer blends analytical rigor with community‑centered enthusiasm, habitually structuring her life around routines, garden‑fresh meals, and group activities while occasionally over‑committing
    to social events at the expense of personal downtime.
background:
  cultural: Tracy grew up in the rural‑suburban setting of Western Pennsylvania, shaped by the region’s Appalachian‑Midwestern blend of practical work ethic, family‑centered values, and community involvement.
    Her ancestry includes German and Irish roots common to Butler County, and she was raised in a Protestant household that emphasized modesty, reliability, and community service. Local traditions—such
    as weekend family barbecues, attending county fairs, and participating in church‑based outreach—have reinforced her appreciation for routine, collaboration, and giving back. While she respects these
    heritage values, Tracy also embraces contemporary professional development and diverse social circles, balancing tradition with a forward‑looking mindset.
attributes:
  skills: '[''Linear programming'', ''Integer optimization'', ''Simulation modeling'', ''Statistical analysis (R, Python, SAS)'', ''Advanced Excel modeling'', ''Data visualization (PowerBI, Tableau)'',
