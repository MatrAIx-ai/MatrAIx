  career_goals: Inspired by his love of the ocean and his caring nature, Sebastian dreams of becoming a marine biologist who studies and protects coastal ecosystems. He also envisions a future as a teacher
    or community helper, where he can share knowledge and support others in a structured, reliable environment.
