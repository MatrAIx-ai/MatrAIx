  career_goals: Michael aims to channel his professional legacy into community impact. He hopes to establish a mentorship program that pairs retired engineers with high‑school students interested in STEM,
    particularly those from under‑represented backgrounds. He also aspires to co‑author a series of articles that explore the intersection of art and engineering, fostering interdisciplinary curiosity.
    Serving on the advisory board of the Overland Park Science and Art Museum is another ambition, where he can help shape exhibits that inspire lifelong learning. Throughout, he wants to nurture his own
    curiosity, stay mentally vibrant, and maintain his health to enjoy new experiences with his wife.
