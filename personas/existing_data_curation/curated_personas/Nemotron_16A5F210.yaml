personas:
  professional: Nicole Edwards is a data‑analytics graduate who leverages Python, R, and GIS mapping to build reproducible environmental models, applying their disciplined, organized nature and cooperative
    spirit to deliver clean, actionable insights for nonprofit agencies while managing their own anxiety through structured project workflows.
  sports: Nicole Edwards enjoys low‑impact fitness, hiking the Sandhills prairie trails and birdwatching on weekends, practices yoga three times a week at a local studio, follows the Nebraska Cornhuskers
    football team, and occasionally runs with the Lincoln Running Club during spring marathons.
  arts: Nicole Edwards finds solace in listening to Sufjan Stevens and the ambient scores of Brian Eno while painting watercolor landscapes of the prairie, attends indie film screenings at the Nebraska
    Repertory Theatre featuring directors like Greta Gerwig, and collects limited‑edition prints by contemporary artist Kehinde Wiley.
  travel: Nicole Edwards prefers meticulously planned road trips to national parks such as Badlands and Yellowstone, has a wish list that includes bird‑watching in Iceland’s Westfjords and hiking the Torres del Paine
    circuit in Chile, but budget constraints keep most journeys within the Midwest, where they savor weekend getaways to Iowa’s Loess Hills.
  culinary: Nicole Edwards loves cooking comfort foods, whipping up creamy mac and cheese with sharp cheddar, baking banana bread with walnuts, and crafting a hearty vegetable minestrone using fresh rosemary
    and thyme, while refining their baking technique through late‑night experiments with sourdough starter.
  core: Nicole Edwards blends analytical rigor with a love for nature, balancing meticulous data work and anxiety‑driven self‑care rituals while quietly perfecting comfort‑food recipes for close friends.
background:
  cultural: Nicole was raised in a predominantly white, Midwestern family in Lancaster County near Lincoln, Nebraska. Her cultural upbringing blends typical Midwestern values—hard work, humility, community
    orientation, and respect for the agricultural landscape—with a family heritage that includes German and English roots. She grew up attending local fairs, community theater, and seasonal festivals, which
    fostered a strong sense of belonging and practicality. The region’s emphasis on outdoor activities, self‑reliance, and collective support shapes her cooperative nature and appreciation for both small‑group
    intimacy and broader scientific curiosity.
attributes:
  skills: '[''Python programming'', ''R and SQL data analysis'', ''Statistical modeling'', ''Laboratory techniques'', ''Technical writing'', ''Project management'', ''Time management'', ''Process optimization'',
