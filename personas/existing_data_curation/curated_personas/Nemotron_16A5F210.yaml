  hobbies: '[''Reading scientific journals'', ''Journaling'', ''Personal coding projects'', ''Hiking and birdwatching'', ''Strategy board games (e.g., Settlers of Catan)'', ''Cooperative card games'', ''Yoga
    and mindfulness meditation'', ''Cooking and baking'', ''Science museum volunteer work'']'
  career_goals: Nicole aims to secure a data‑focused role that blends her curiosity about new technologies with practical impact, ideally in environmental sustainability or public‑health analytics for a
    nonprofit or government agency in Nebraska. She plans to build a robust portfolio of data visualizations and predictive models, earn certifications such as Tableau and AWS, and eventually pursue a master’s
    degree in Data Science. Her long‑term ambition is to become a lead analyst who transforms complex data into actionable solutions while working in a supportive, collaborative environment that respects
    mental‑health needs and offers clear pathways for achievement.
