persona_description: A Forest Supervisor who is responsible for overseeing the development and implementation of monitoring plans for National Forests. This person is skilled in managing and coordinating
  complex monitoring programs, collaborating with partners and scientists, and conducting research to improve management practices. They are committed to conducting meaningful and accountable monitoring
  strategies that allow for responsive management through an open, structured, and collaborative public process. They are interested in using scientific methods to assess information, maintain dialogues
  with communities, and identify the kinds of data that are useful for understanding conditions and trends relevant to management.
