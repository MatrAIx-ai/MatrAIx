personas:
  professional: Nelson Delrosario, a 42‑year‑old interdisciplinary designer and technologist, fuses Python, JavaScript, and advanced CAD tools with a flamboyant improv spirit, crafting kinetic art installations
    that thrive on spontaneous collaborations, bold public showcases, and the competitive rush of hackathons, even as his relaxed approach to deadlines often leaves paperwork for the last minute.
  sports: Nelson Delrosario embraces weekend hikes along the Santa Monica coastal trails with his wife, joins a casual beach‑volleyball group at Ocean Park, and avidly roots for the Los Angeles Lakers and
    Dodgers, preferring spontaneous, low‑key workouts over regimented gym schedules.
  arts: Nelson Delrosario fuels his creative drive by painting abstract canvases inspired by Agnes Martin, curating experimental electronic playlists featuring Aphex Twin and Autechre, performing improv
    sketches at the Upright Citizens Brigade, and absorbing immersive light installations by James Turrell at LACMA gallery openings.
  travel: Nelson Delrosario favors impulsive road trips down the Pacific Coast Highway, weekend maker‑fair pilgrimages to Austin’s South by Southwest, and dream‑chasing voyages to Tokyo’s Akihabara and
    Iceland’s geothermal wonders, often booking flights on a whim while juggling studio deadlines.
  culinary: Nelson Delrosario experiments in the kitchen with Mexican‑California fusion, whipping up grilled corn elote drizzled with chipotle‑lime mayo, avocado‑crema fish tacos, and quinoa‑infused burrito
    bowls, while savoring spontaneous pop‑up sushi nights and hunting fresh cilantro and poblano peppers at the Santa Monica Farmers Market.
  core: Nelson Delrosario, a 42‑year‑old kinetic‑art tinkerer, lives by the credo that imagination trumps order, juggling endless creative projects while habitually misplacing spare change, missing bill
    due dates, and thriving on the buzz of impromptu crowds.
background:
  cultural: Nelson is a first‑generation Mexican‑American whose family roots trace back to Jalisco. He grew up bilingual, celebrating Día de los Muertos, quinceañeras, and other Mexican traditions that
    continue to shape his artistic sensibility and storytelling. The close‑knit, multigenerational household taught him the value of family gatherings, homemade cuisine, and oral histories—elements he often
    weaves into his creative projects. Living in Agoura Hills, he balances a suburban Californian lifestyle with his heritage, actively participating in local cultural festivals, mentoring youth from the
    Mexican‑American community, and infusing his work with a blend of Mexican motifs and contemporary design.
attributes:
  skills: '[''Python programming'', ''JavaScript development'', ''CAD design (SolidWorks, Fusion 360)'', ''3D modeling (Blender)'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Digital illustration'',
    ''Experimental photography'', ''Video editing'', ''Public speaking'', ''Workshop facilitation'', ''Critical design analysis'', ''Hackathon participation'']'
  hobbies: '[''Abstract painting'', ''Experimental electronic music production'', ''Arduino kinetic sculptures'', ''Sci‑fi short story writing'', ''Improv theater'', ''Cooking Mexican‑California fusion
    cuisine'', ''Hiking in the Santa Monica Mountains'', ''Collecting vintage analog synthesizers'', ''Strategy board games'', ''Attending art gallery openings'', ''Participating in maker fairs'']'
  career_goals: Nelson aims to turn his imagination into a boutique creative‑technology studio that produces immersive, interactive installations for public spaces, festivals, and corporate events. He plans
    to secure seed funding for a first project—a sensor‑driven light sculpture inspired by Mexican folklore—while building a reputation as a thought‑leader at conferences on speculative design and maker
    culture. Over the next five years he envisions launching a YouTube channel that teaches DIY tech‑art, mentoring young makers in the Agoura Hills community, and eventually scaling his studio into a consultancy
    that bridges artistic vision with practical engineering solutions.
