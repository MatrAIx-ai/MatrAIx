personas:
  professional: Donald James is a community‑focused project coordinator who leverages his DIY carpentry and digital marketing savvy to organize local festivals, while they apply disciplined curiosity to
    pursue an HVAC certification and eventually launch their own tour‑guide venture.
  sports: Donald James stays active by fishing on Lake Michigan, hiking the Sleeping Bear Dunes, cycling with the Traverse Bike Club, and playing in the community’s Cherry Pickers basketball league, while
    they cheer for the Detroit Pistons and root for the Michigan State Spartans during college basketball season.
  arts: Donald James immerses himself in the local music scene, attending the Cherry Festival’s nightly concerts featuring folk acts like The Lumen and catching The Lumineers at nearby venues, and they
    curate playlists of classic rock icons such as Bruce Springsteen to fuel their DIY projects.
  travel: Donald James prefers weekend road trips that blend adventure with practicality, having explored the Pictured Rocks National Lakeshore and taken a DIY road trek to Vancouver, and they dream of
    a summer sailing excursion through Iceland’s fjords once their tour‑guide business stabilizes.
  culinary: Donald James delights in cooking pan‑fried perch with lemon‑herb butter, cherry‑scented scones whipped from fresh orchard fruit, and a hearty Michigan‑style cherry chili, and they showcase intermediate
    culinary skills and a love for locally sourced ingredients.
  core: Donald James is a hyper‑organized, community‑centric tinkerer whose relentless curiosity is balanced by a chronic worry that fuels both meticulous planning and occasional overcommitment, and they
    often find themselves juggling multiple projects at once.
background:
  cultural: Donald grew up in a mid‑western, white, working‑class family in Michigan, shaped by community‑centric values and a blend of Protestant (often Lutheran) and secular traditions. He identifies
    strongly with the local culture of Traverse City—seasonal festivals, the annual cherry harvest, lake‑based recreation, and a pride in self‑reliance and neighborly support. While he respects his family's
    possible German‑Polish heritage, he also embraces the diverse influences brought by tourism and new residents, reflecting a balance of tradition and openness to new ideas.
attributes:
