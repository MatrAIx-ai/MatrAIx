personas:
  professional: Christie Mays is a community‑center organizer who leverages their natural talent for coordinating volunteers, managing modest budgets, and teaching quilting and cooking workshops, while
    their relaxed approach to planning and outgoing energy keep the senior program lively and adaptable.
  sports: Christie Mays stays active by dancing to classic soul and gospel tunes at church, participating in low‑impact Zumba classes for seniors at the community center, enjoying daily walks through their
    garden paths, and cheering enthusiastically for the local high‑school basketball team, the Wildcats.
  arts: Christie Mays expresses creativity through singing in the church choir, dancing to the music of Aretha Franklin and Mahalia Jackson, quilting intricate patterns inspired by traditional folk motifs,
    and devouring memoirs by Maya Angelou and historical novels that echo community stories, while also enjoying classic films starring Sidney Poitier.
  travel: Christie Mays dreams of road‑tripping to their family’s hometowns in the South to trace ancestral stories, has already visited Savannah and Natchez on weekend getaways, prefers traveling by car
    with a flexible schedule, takes advantage of senior discounts on accommodations, and balances travel ambitions with health considerations and a modest budget.
  culinary: Christie Mays delights in cooking soul‑inspired dishes such as fried chicken with a crisp cornmeal coating, collard greens seasoned with smoked turkey, sweet‑potato pie spiced with cinnamon,
    and fresh herb‑infused vinaigrette made from garden‑grown thyme and rosemary, while their skill level is that of a seasoned home chef who often prepares large potluck meals for the church and neighborhood.
  core: Christie Mays blends infectious sociability, a relaxed yet practical outlook, and a penchant for quilting, cooking, and choir singing into daily rituals that keep them energetically connected to
    their community while occasionally battling forgetfulness and a love of spontaneous spontaneity.
background:
  cultural: Christie’s cultural identity is rooted in the Black community of Dayton, Ohio, with family origins tracing back to the American South. Growing up during the civil‑rights era, she experienced
    both the challenges and the solidarity of a close‑knit neighborhood. Her life center revolves around the church, gospel music, and the tradition of soul food. Storytelling, music, and communal gatherings
    are central to her worldview, reinforcing values of resilience, mutual support, and celebration of heritage. These influences shape her daily interactions, her love for sharing food and crafts, and
    her commitment to nurturing the next generation.
