  hobbies: '[''Basketball (pick-up and coaching)'', ''Road trips along the NC coast'', ''Hip-hop and soul music listening'', ''Barbecue and soul food cooking'', ''Video gaming (strategy games)'', ''Volunteering
    at church youth program'', ''Coaching high school basketball'', ''Hiking in Croatan National Forest'', ''Fishing at local lakes'', ''Attending live music events'']'
  career_goals: Michael aims to rise to senior leadership within the manufacturing sector, targeting roles such as Senior Operations Manager and eventually Director of Operations for a regional distribution
    hub. He plans to augment his bachelor's degree with an MBA or a PMP certification to deepen his strategic and project‑management capabilities. In the longer term, he envisions launching his own operations
    consulting firm that specializes in helping small businesses in Eastern North Carolina improve efficiency and workforce development. Parallel to his professional ascent, he is committed to mentoring
    aspiring Black professionals through local chambers of commerce and youth programs, hoping to broaden representation in managerial positions.
