  career_goals: Angela aims to advance to a store manager role within the next two years, using her organizational strengths to improve sales performance and employee satisfaction. She hopes to integrate
    her love of art into the store by curating rotating local‑artist displays and hosting community workshops. She plans to enroll in a part‑time retail management certification program to formalize her
    expertise. Long‑term, she envisions opening a modest boutique that showcases regional crafts and artwork, providing a flexible schedule that allows more time for her creative pursuits and family.
