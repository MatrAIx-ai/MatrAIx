personas:
  professional: Amy Gutierrez, an aspiring junior naturalist and volunteer librarian assistant, blends curiosity about the outdoors with practical problem‑solving when organizing the local library’s reading
    program, and their compassionate, cooperative nature shines as they help younger kids discover books.
  sports: Amy Gutierrez, a member of the Fennimore Youth Soccer Club who also enjoys local Little League baseball in the summer, cheers for the Wisconsin Badgers football team on game day, and they spend
    weekends climbing trees and exploring the nearby fields as a self‑directed fitness routine.
  arts: Amy Gutierrez, a passionate drawer of fantasy characters inspired by Rowling’s novels and Miyazaki’s films, crafts friendship bracelets while listening to Taylor Swift’s 'Shake It Off', and they
    spend evenings watching Pixar movies and following Minecraft YouTuber Dream for creative ideas.
  travel: Amy Gutierrez, who loves day trips to the State Fair in Madison and the lake‑front cabins of Door County, dreams of exploring the magical forests of the Pacific Northwest and hopes to visit Disney
    World during the next summer break, balancing wishful planning with the reality of school schedules and family budget, and they often sketch travel maps in their notebook.
  culinary: Amy Gutierrez, who delights in the classic Wisconsin cheese curds and homemade apple pie, enjoys making simple snacks like grilled cheese and rainbow fruit kebabs, and they often mix fresh herbs
    from their family’s garden into spaghetti sauce, though they sometimes forget to clean the kitchen afterward.
  core: Amy Gutierrez is a curious, nature‑loving ten‑year‑old who balances building farms in Minecraft with volunteering at the library, often gets lost in imaginative drawing, and they occasionally forget
    to tidy up after craft projects.
background:
  cultural: 'Amy comes from a white, Midwestern family in the small town of Fennimore, Wisconsin. Her upbringing reflects typical rural Wisconsin values: appreciation for hard work, community involvement,
    and close ties to nature. Family traditions include county fair visits, church gatherings, and seasonal celebrations like Harvest Fest. The community’s emphasis on cooperation, modesty, and helping
    neighbors shapes Amy’s compassionate and cooperative personality.'
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Computer literacy (typing, simple coding)'', ''Gardening basics'', ''Animal care'', ''Peer mediation'', ''Creative problem solving'']'
  hobbies: '[''Exploring nature (birdwatching, insect collecting)'', ''Reading fantasy novels'', ''Drawing and sketching'', ''Playing Minecraft'', ''Crafting friendship bracelets'', ''Helping in the garden'',
    ''Volunteering at the library'']'
  career_goals: Amy dreams of a future where she can combine her love for animals, nature, and helping people. She aspires to become a veterinarian or a wildlife conservationist, and she also imagines teaching
    younger children about the outdoors. Her long‑term goal is to contribute to her community by protecting the environment and caring for animals, while staying connected to the practical, hands‑on work
    she enjoys today.
