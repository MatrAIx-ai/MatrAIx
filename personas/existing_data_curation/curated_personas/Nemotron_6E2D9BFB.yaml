personas:
  professional: Gina Miller, a budding front‑end developer and UI/UX advocate whose curiosity fuels rapid prototyping with React and Python, yet whose relaxed stance on deadlines often leads to last‑minute
    sprint marathons, and whose compassionate nature drives mentorship at community coding workshops.
  sports: Gina Miller, a casual fitness enthusiast who joins a small Saturday morning cycling group on the Milwaukee County Trail, attends weekly yoga at a local studio, plays pickup basketball with a close
    circle of friends, and fervently supports the Milwaukee Bucks and Brewers while preferring low‑key, community‑oriented activities over competitive sports.
  arts: Gina Miller, an acrylic painter who draws inspiration from contemporary artists like Yayoi Kusama and Kerry James Marshall, curates jazz playlists featuring Miles Davis and Kamasi Washington alongside
    neo‑soul stars Erykah Badu and Jorja Smith, and regularly explores Milwaukee's contemporary galleries such as the Milwaukee Art Museum and local pop‑up exhibitions.
  travel: Gina Miller, an adventurous yet budget‑conscious traveler who spontaneously plans weekend road trips to Chicago's art districts, Madison's breweries, and the New Orleans Jazz & Heritage Festival,
    while dreaming of a spring backpacking journey through Berlin's street‑art scene and Kyoto's serene temples, and who favors solo exploration or small‑group escapades over large tour groups.
  culinary: Gina Miller, a moderately skilled home cook who loves crafting avocado toast topped with radish and feta, whipping up ramen bowls with miso broth and shiitake mushrooms, savoring Milwaukee's
    cheese curds paired with local craft beer, and occasionally experimenting with vegan lentil shepherd's pie but often resorts to quick microwave meals during hackathon marathons.
  core: Gina Miller, a creatively curious front‑end developer who blends art, tech, and community service into a flexible, compassionate, albeit sometimes disorganized, life.
background:
  cultural: Gina grew up in a close‑knit African‑American family in Milwaukee, immersed in the city’s historic Black community. Family traditions such as Juneteenth celebrations, church choir singing, and
    soul‑food gatherings shaped her cultural identity. She is actively involved with the Milwaukee Black Arts Consortium and draws inspiration from Black artists, musicians, and writers. Her upbringing
    emphasized community support, social justice, and the importance of mentoring the next generation, which fuels her passion for using technology as a tool for empowerment and equity within her community.
attributes:
  skills: '[''HTML'', ''CSS'', ''JavaScript'', ''React'', ''Python'', ''UI/UX design'', ''Git'', ''Debugging'', ''Problem solving'', ''Computer literacy tutoring'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries'', ''Jazz and neo‑soul music'', ''Speculative fiction reading'', ''Narrative video games'', ''Small‑team hackathons'', ''Volunteer coding mentorship'']'
  career_goals: Gina aspires to become a user experience designer or front‑end developer focused on building accessible digital products that serve underrepresented communities. She plans to complete a
    bachelor’s degree in Computer Science or Human‑Computer Interaction, secure internships at socially responsible tech firms, and eventually launch a nonprofit tech initiative that provides digital equity
    training in Milwaukee’s Black neighborhoods. Her long‑term ambition is to lead projects that blend technology with social impact, ensuring that her work fosters inclusion and community empowerment.
