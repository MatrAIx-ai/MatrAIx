persona_description: A weather and fire safety expert who is responsible for monitoring and managing the Lincoln National Forest's fire danger rating system. They are aware of the effects of low moisture,
  persistent drought, winds, and warm weather on the forest's ecosystem and are responsible for elevating the fire danger rating to high and the other districts to moderate in the Guadalupe Ranger District.
  They are also aware of the risks associated with unattended campfires and the potential for fires to spread rapidly and large. They are responsible for providing information about the forest and its resources
  to the public and are available for consultation on matters related to fire safety.
