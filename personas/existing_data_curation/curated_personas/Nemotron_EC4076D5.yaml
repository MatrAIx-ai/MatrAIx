personas:
  professional: Ellis Davalos, a retired multiskilled handyman and community mentor, leverages decades of plumbing, electrical, carpentry, and small‑engine repair expertise to keep neighbors’ homes running
    while quietly orchestrating senior‑center workshops, preferring the predictability of routine tasks and shying away from flashy leadership roles.
  sports: Ellis Davalos, who walks the Miami Riverwalk five mornings a week and engages in casual dominoes that double as mental exercise, avidly supports the Miami Heat during basketball season and the
    Miami Marlins in baseball, and belongs to the local 'Riverwalk Seniors' walking club, preferring low‑impact, routine‑based activity over competitive sports.
  arts: Ellis Davalos fills the kitchen and garden with the sounds of Juan Luis Guerra, Romeo Santos, and classic bolero singer Armando Manzanero, and unwinds by watching timeless films such as 'Casablanca',
    'The Godfather', and 'Singin’ in the Rain', often quoting favorite lines to friends at the senior center, which satisfies their love for familiar, emotionally resonant art.
  travel: Ellis Davalos dreams of a leisurely cruise to San Juan, Puerto Rico, and a nostalgic road trip to the coastal town where their parents once lived, preferring organized group tours with clear itineraries
    and traveling with grandchildren to keep costs manageable and health risks low, while also enjoying occasional day trips to nearby state parks for quiet reflection.
  culinary: Ellis Davalos, an accomplished home chef, perfects mangú with ripe plantains, simmers hearty sancocho brimming with yucca, green plantains, and pork, crafts pastelitos stuffed with seasoned
    beef, and delights in seasoning dishes with fresh cilantro, ají dulce, and a splash of lime, often sharing surplus portions with neighbors after a day of repairs.
  core: Ellis Davalos balances a meticulous devotion to routine—budget sheets, garden rows, and domino strategies—with a lingering worry that fuels over‑checking of health stats, all while secretly hoarding
    extra bags of cilantro for ‘rainy day’ cooking marathons.
background:
  cultural: Ellis was born to Dominican parents who settled in Lawrence, Massachusetts, as part of the mid‑20th‑century migration wave. He grew up in a bilingual household where Spanish was spoken at home
    and English at school, fostering a deep connection to both Dominican traditions and American life. Catholicism has been a cornerstone of his upbringing, influencing his participation in church festivals,
    processions, and community celebrations. He maintains strong ties to the Dominican diaspora in Lawrence, frequently attending cultural gatherings that feature music, dance, and cuisine from his homeland.
    Dominican holidays such as Independence Day and Semana Santa are observed with family meals and communal activities, reinforcing his identity and sense of belonging within the broader New England Latino
    community.
attributes:
  skills: '[''Handyman repairs (plumbing, electrical, carpentry)'', ''Small‑engine maintenance'', ''Cooking traditional Dominican dishes'', ''Bilingual communication (Spanish/English)'', ''Household budgeting
    and financial management'', ''Community volunteer coordination'', ''Garden cultivation and maintenance'', ''Dominoes strategy and gameplay'']'
  hobbies: '[''Cooking traditional Dominican dishes'', ''Gardening and vegetable cultivation'', ''Walking in local parks and along the river'', ''Listening to merengue, bachata, and bolero music'', ''Playing
    dominoes with a small group of friends'', ''Reading the local newspaper'', ''Attending weekly Catholic Mass and community events'']'
  career_goals: Although retired from formal employment, Ellis aims to stay actively involved in his community and family. He aspires to mentor his grandchildren, passing down cultural traditions, cooking
    techniques, and practical life skills. He hopes to organize a yearly family reunion that celebrates Dominican heritage and fosters intergenerational bonding. Additionally, Ellis wishes to contribute
    to the local senior center by leading workshops on budgeting and home maintenance, and to document his life story in a memoir that preserves the immigrant experience for future generations. Maintaining
    his health and independence so he can continue these activities remains a top priority.
