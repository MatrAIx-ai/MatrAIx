personas:
  professional: Connor Jones, a dedicated school psychologist working in a rural district, blends evidence‑based assessment with art‑based therapeutic techniques, orchestrating IEPs, crisis interventions,
    and collaborative counseling while pursuing a specialist graduate degree to spearhead a district‑wide mental‑health initiative.
  sports: Connor Jones fuels their love of the outdoors by hiking the local Blue Ridge trail system every other weekend, participates in a community soccer league with the River Valley Rovers, and supports
    the nearby Minor League baseball team, the River City Cats, while using brisk walks as personal reflective time.
  arts: Connor Jones spends evenings sketching plein‑air watercolors of the surrounding hills, strums acoustic renditions of Nick Drake and Joni Mitchell on a battered Gibson guitar, and volunteers at the
    town’s community theater, where they admire the direction of local playwrights and draw inspiration from Ansel Adams’ black‑and‑white photography.
  travel: Connor Jones prefers thoughtfully planned road trips that balance artistic immersion and natural wonder, having recently explored the geysers of Yellowstone and the cliffside villages of Cinque Terre,
    they now dream of photographing the aurora borealis in Iceland and attending a tea ceremony in Kyoto while budgeting for modest accommodations.
  culinary: Connor Jones experiments in the kitchen with dishes like Thai green curry simmered with lemongrass and kaffir lime, Moroccan chicken tagine spiced with saffron and preserved lemons, and Mexican
    tacos al pastor finished with pineapple, showcasing a solid intermediate skill set and a penchant for bold flavors.
  core: Connor Jones fuses a therapist’s analytical mind with an artist’s wanderlust, juggling meticulous data charts by day and sketchbooks by night, all while habitually forgetting their own lunch.
background:
  cultural: Connor comes from a multigenerational white, middle‑class family rooted in the Mid‑Atlantic region. His grandparents emigrated from Ireland and Germany, and family traditions include attending
    county fairs, seasonal festivals, and church gatherings in the small‑town environment of Preston, Maryland. Growing up, he was immersed in a close‑knit community that valued public service, education,
    and a strong work ethic. This background fostered his appreciation for both rural heritage and the broader cultural tapestry of the United States, influencing his commitment to inclusive, community‑focused
    mental‑health practice.
attributes:
  skills: '[''Psychoeducational assessment'', ''Behavioral evaluation'', ''Individualized Education Program (IEP) development'', ''Individual and group counseling'', ''Crisis intervention'', ''Conflict
