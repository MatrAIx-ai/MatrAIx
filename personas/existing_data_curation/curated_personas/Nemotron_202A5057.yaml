  hobbies: '[''Sketching and watercolor painting'', ''Landscape and street photography'', ''Playing acoustic guitar'', ''Hiking and nature walks'', ''Reading psychology, philosophy, and contemporary fiction'',
    ''Attending community theater and art exhibitions'', ''Cooking experimental international recipes'', ''Volunteering as a mentor in youth art programs'', ''Improvisational theater classes'', ''Meditation
    and yoga'']'
  career_goals: Connor aims to earn a specialist‑level graduate degree in school psychology within the next three years to become fully licensed. He envisions leading a district‑wide mental health initiative
    that integrates creative arts into standard counseling services, especially for underserved rural students. In the long term, he aspires to conduct research on the impact of art‑based interventions
    on adolescent resilience and to publish his findings in peer‑reviewed journals. He also hopes to mentor new school psychologists and to advocate for increased mental‑health resources at the state policy
    level.
