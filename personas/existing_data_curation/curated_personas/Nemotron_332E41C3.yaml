  hobbies: '[''salsa dancing'', ''visiting art museums and galleries'', ''cooking Puerto Rican cuisine'', ''gardening'', ''reading historical fiction'', ''trivia and board game nights'', ''volunteering
    at senior centers'', ''photography'', ''learning about art history'', ''listening to Bomba and Plena music'']'
  career_goals: Although retired from formal employment, Maria aims to deepen her impact as a volunteer leader at Philadelphia's cultural institutions. She hopes to launch a senior art‑workshop series that
    integrates hands‑on creation with art history, and to develop a community oral‑history project that records the stories of Puerto Rican elders in the city. Maria plans to enroll in a museum studies
    or arts‑administration certificate program offered by a local college, and she dreams of traveling back to Puerto Rico to reconnect with her family roots. She also aspires to mentor younger Puerto Rican
    residents, helping them navigate education, career choices, and cultural identity.
