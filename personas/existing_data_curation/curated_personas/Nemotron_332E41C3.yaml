personas:
  professional: Maria Perez, a retired volunteer coordinator turned community arts champion, leverages their bilingual fluency, event‑organizing expertise, and critical eye to lead senior‑focused art workshops
    and coordinate an oral‑history project for local elders in Philadelphia’s cultural institutions.
  sports: Maria Perez, a salsa‑dance enthusiast who also enjoys low‑impact Zumba classes at the senior center, is a loyal fan of the Philadelphia Eagles and Philadelphia Union, and they participate in the
    local senior bowling league at the community center.
  arts: Maria Perez, an avid museum visitor and amateur photographer, frequently captures street festivals and family gatherings, shares images on community social media, and they draw artistic inspiration
    from Frida Kahlo, Diego Rivera, and the soulful vocals of Celia Cruz.
  travel: Maria Perez, who dreams of returning to the island to reunite with family and has already explored Cartagena’s historic walled city and New Orleans’ jazz scene, prefers group tours organized by
    senior travel clubs, and they balance cultural immersion with the comfort of accessible accommodations.
  culinary: Maria Perez, a passionate home chef, perfects mofongo with plantains, garlic, pork cracklings and fresh cilantro from their balcony garden, and regularly prepares arroz con gandules seasoned
    with sofrito, tostones, and a splash of adobo, often pairing meals with guava paste and coffee.
  core: Maria Perez blends a fierce competitive spirit with a deep love for community culture, driving them to lead senior art workshops, meticulously garden herbs for signature dishes, and dominate trivia
    nights, all while occasionally forgetting their glasses and dental appointments.
background:
  cultural: Maria is a first‑generation Puerto Rican American who grew up in a bilingual household in Philadelphia. Her upbringing was steeped in Puerto Rican customs, from celebrating San Juan and other
    island festivals to enjoying Bomba, Plena, and salsa rhythms. Family gatherings often featured traditional foods, storytelling, and a strong emphasis on respect for elders. Though she lives in the United
    States, Maria maintains a deep connection to her heritage through language, cuisine, music, and active participation in the local Puerto Rican diaspora community, fostering cultural continuity across
    generations.
attributes:
  skills: '[''bilingual communication (English/Spanish)'', ''community event planning'', ''arts programming and curation'', ''critical analysis of media'', ''mentoring and peer support'', ''basic digital
