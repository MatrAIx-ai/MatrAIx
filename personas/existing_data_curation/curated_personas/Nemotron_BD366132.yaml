  career_goals: Although retired, Katherin aims to deepen her contribution to her community. Her primary ambition is to document and preserve Homestead’s local history by completing a volume of oral histories
    and photographs. She seeks to mentor younger volunteers, especially high‑school students interested in heritage projects. She also hopes to expand the senior center’s intergenerational programming,
    creating more structured activities such as art workshops and storytelling circles. Additionally, she plans to write a memoir reflecting on her experiences as a widowed senior, blending personal narrative
    with observations of the region’s cultural changes.
