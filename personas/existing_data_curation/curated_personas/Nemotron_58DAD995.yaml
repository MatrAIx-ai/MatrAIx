  hobbies: '[''Cooking Cuban dishes'', ''Listening to Cuban music and dancing'', ''Herb gardening'', ''Visiting art galleries and murals'', ''Knitting and crocheting'', ''Reading historical fiction and
    poetry'', ''Learning digital photography'', ''Practicing gentle yoga'', ''Solving crossword puzzles'']'
  career_goals: Although Daniela is officially retired, she remains motivated to contribute to her community and to preserve her cultural legacy. She aims to compile and self‑publish a memoir‑style cookbook
    that intertwines family stories with traditional Cuban recipes, hoping to pass this heritage to future generations. She also plans to lead a weekly art‑talk circle at the local senior center, where
    she can share her knowledge of Cuban and Latin American art and encourage participants to create their own works. Daniela wishes to deepen her digital skills by completing an online course in basic
    photography and photo‑editing, enabling her to document neighborhood events and create a visual archive for a community exhibition. Finally, she aspires to mentor younger volunteers, offering guidance
    on event planning and budgeting, and to support local initiatives that celebrate multicultural heritage.
