  career_goals: Nghien dreams of a future where she can turn her love of animals, science, and people into a career. She hopes to become a veterinarian who uses both hands‑on knowledge and technological
    tools to care for pets and wildlife. At the same time, she imagines herself designing interactive educational games that teach kids about biology, blending her curiosity for new ideas with proven teaching
    methods. She wants to stay connected to her community, perhaps leading outreach programs that introduce other children to science and coding in a fun, flexible way.
