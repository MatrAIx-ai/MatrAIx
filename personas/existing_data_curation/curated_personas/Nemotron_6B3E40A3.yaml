personas:
  professional: Nghien Orejola is a budding technologist who merges curiosity with practicality, building simple robots in an after‑school club while sketching comic‑book characters that later inspire their
    designs, and they thrive on collaborative projects despite occasional disorganization.
  sports: Nghien Orejola dominates the midfield for their middle school soccer team, cheers on Dallas FC during weekends, practices hip‑hop dance at a local studio, and they treat each game as an improvisational
    performance, balancing assertive playmaking with a laid‑back attitude toward strict training regimens.
  arts: Nghien Orejola channels the storytelling flair of Stan Lee and the visual rhythm of Pharrell Williams into their own comic‑book sketches and short videos, spending evenings editing clips for family
    sharing while they collect Lego sets that fuel the imaginative worlds they build, even if their workspace often ends up a colorful mess.
  travel: Nghien Orejola prefers spontaneous day trips to nearby Dallas County parks like Cedar Hill State Park for bird‑watching, enjoys family road trips to the San Antonio River Walk, and they dream
    of a future adventure to Kyoto’s bamboo forests, often planning with a loose list of must‑see spots rather than a rigid itinerary.
  culinary: Nghien Orejola loves whipping up homemade bánh mì with crusty baguettes, pickled carrots, lemongrass‑marinated pork, and fresh cilantro under their mother’s guidance, and they eagerly experiment
    with spring rolls stuffed with rice noodles and shrimp, though they sometimes forget to seal the wrappers properly, resulting in a tasty, if messy, kitchen adventure.
  core: Nghien Orejola is a kinetic, curious 11‑year‑old who blends soccer, robotics, and comic‑book artistry into a vibrant, slightly disorganized whirlwind of creativity and friendship, and they radiate
    energy in every group activity.
background:
  cultural: Nghien comes from a Vietnamese‑American family that settled in the Dallas area after immigrating in the early 2000s. At home, Vietnamese language, music, and traditions like Tet celebrations
    and offering incense to ancestors are woven into daily life. She attends a weekend Vietnamese language school, where she learns calligraphy and folk songs, reinforcing a strong sense of heritage. Growing
    up in Texas, she also embraces American customs, from football games to Thanksgiving, creating a blended cultural identity. Her family values of respect for elders, community responsibility, and hard
    work shape her worldview, while the multicultural environment of Sachse encourages her to share her culture with friends and celebrate diversity.
