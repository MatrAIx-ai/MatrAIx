  career_goals: Brien aims to transform his trade into a boutique studio that blends high-quality painting services with bespoke artistic finishes. Over the next five years he plans to earn a Certified
    Painting Contractor credential, expand his portfolio of custom murals for residential and commercial clients, and launch a small-scale gallery space where he can exhibit his own paintings. He is driven
    by a competitive desire to be recognized as one of the top decorative painters in the Desert Southwest, and he hopes that a stronger personal brand will provide the financial stability that reduces
    his chronic worry. Completing his associate degree in interior design is also on his list, as it would give him formal grounding to offer design consulting alongside his hands-on work.
