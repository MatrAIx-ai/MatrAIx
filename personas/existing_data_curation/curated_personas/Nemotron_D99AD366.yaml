  career_goals: Though no longer in formal employment, Richard aims to channel his talents into a lasting community impact. He plans to volunteer as a coordinator for a local art nonprofit, creating a monthly
    "Art & Stories" workshop where seniors and youth collaborate on visual projects. He hopes to launch a modest pop‑up gallery in Garden City that showcases neighborhood artists and preserves the area's
    cultural memory through photo essays. Over the next few years, Richard aspires to mentor aspiring photographers, publish a community‑focused photo book, and develop a small grant‑writing skill set to
    secure funding for arts programming. Personal ambitions also include strengthening his emotional resilience through regular mindfulness practices and staying socially active within his network of friends
    and family.
