  career_goals: Cierra aims to transition from a receptionist role to an office manager or operations coordinator within the next three to five years. She plans to complete her bachelor's degree in Business
    Administration, obtain the Certified Administrative Professional (CAP) credential, and acquire project-management experience through internal initiatives. Her ambition is to lead a team, design efficient
    workflows, and eventually move into a senior administrative or human-resources role at a forward-thinking company in the Twin Cities. Her competitive drive also fuels a longer-term goal of launching
    a boutique coworking space that blends her love for community networking with efficient office services.
