personas:
  professional: Susan Schneider, an aspiring junior engineer who spends hours constructing LEGO sets and solving jigsaw puzzles, channels their love of routine and methodical thinking into designing elaborate
    building plans and mastering the strategic rules of board games like Monopoly, and they consistently apply a step‑by‑step approach to every creative project they undertake.
  sports: Susan Schneider, a member of the local kids’ soccer league and a fan of the Chicago Cubs, enjoys weekend hikes in nearby foothills, competes fiercely in backyard tag games, and they cheer loudly
    for their team while applying the same strategic mindset they use in Monopoly to their sports play.
  arts: Susan Schneider, an avid reader of the 'Magic Tree House' and 'Diary of a Wimpy Kid' series, enjoys watching Disney animated movies, listens to the 'Frozen' soundtrack and 'The Beatles' classics,
    and they often create elaborate LEGO dioramas inspired by their favorite books and movies.
  travel: Susan Schneider, who loves short family trips, has explored the local state park's lake, hiked the nearby foothills, dreams of visiting Disneyland in California and the Grand Canyon, and they
    always plan itineraries with checklists to ensure every activity fits their structured routine.
  culinary: Susan Schneider, who helps bake chocolate‑chip cookies using a step‑by‑step recipe, favors pepperoni pizza and homemade peanut butter‑jelly sandwiches, experiments with adding sprinkles to cupcakes,
    and they keep a tidy kitchen station while sometimes forgetting to clean up the flour spills.
  core: Susan Schneider is a meticulous, routine‑loving 8‑year‑old who blends structured play with creative projects, competes fiercely in games, and they manage a modest allowance with careful budgeting.
background:
  cultural: Susan was raised in a middle‑class White American family in Denver, Colorado. Her upbringing reflects the mainstream cultural values of the region, including an emphasis on education, community
    participation, and an appreciation for the outdoors. Family traditions involve regular attendance at local events such as the Denver County Fair and occasional weekend trips to nearby mountains for
    hiking or skiing, fostering a balanced view of both structured indoor activities and active outdoor experiences.
