  career_goals: Susan imagines a future where she can combine her love for order and caring for living things. She often says she wants to become a veterinarian because she likes the clear routine of caring
    for animals and the practical nature of the work. She also dreams of being an architect or civil engineer, fields where she can design functional spaces and follow structured planning processes. These
    ambitions reflect her preference for practical, organized careers with tangible outcomes.
