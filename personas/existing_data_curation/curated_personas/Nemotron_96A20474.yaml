  hobbies: '[''Gardening'', ''Historical nonfiction reading'', ''Genealogy research'', ''Cooking and hosting dinner parties'', ''Volunteer work at senior center'', ''Community theater attendance'', ''Yoga'',
    ''Traveling to historic sites'', ''Knitting'']'
  career_goals: Although retired from formal employment, Mary Ann aims to deepen her impact on the Caldwell community by securing a senior leadership role on the local civic association board and spearheading
    a community garden initiative. She plans to complete a series of online courses in local history and digital storytelling to share the town’s heritage. Mentoring younger volunteers and fostering intergenerational
    programs are also central to her ambitions. Additionally, she hopes to travel to historic sites linked to her family’s genealogy while maintaining a vibrant social network and a healthy lifestyle.
