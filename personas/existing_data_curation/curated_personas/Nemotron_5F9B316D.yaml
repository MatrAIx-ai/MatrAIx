  career_goals: As he approaches the final years of his surgical career, Emanuel aims to ensure a smooth transition of leadership within the hospital’s surgery department, mentor the next generation of
    surgeons, and contribute to medical education through publications and guest lectures. He hopes to author a handbook on surgical risk management and to support the development of a tele‑medicine consultation
    service for rural patients in North Carolina. Additionally, he aspires to volunteer his expertise for community health initiatives and to establish a scholarship fund for students pursuing medicine,
    thereby leaving a lasting professional legacy.
