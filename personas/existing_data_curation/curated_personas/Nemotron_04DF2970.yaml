  career_goals: Nicholas aims to secure certification as a Certified Professional Investigator within the next two years and eventually transition to lead his own boutique investigative firm specializing
    in art fraud and high‑tech cybercrime. He also aspires to develop a proprietary case‑management software that integrates spatial analysis with psychological profiling, author a guidebook on unconventional
    investigative methods, and mentor younger detectives on stress‑resilience practices.
