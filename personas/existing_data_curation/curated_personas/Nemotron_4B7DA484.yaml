  career_goals: Ivan aims to move into a senior management role within the collections field, eventually leading a team of collectors and shaping data‑driven recovery strategies. He plans to earn the Certified
    Credit and Collection Professional (C2P) credential and pursue an MBA with a focus on finance to broaden his strategic expertise. Long‑term, he envisions launching a community‑focused financial literacy
    program for Spanish‑speaking residents of San Diego, leveraging his practical STEM background and his passion for helping others achieve economic stability.
