personas:
  professional: Lavette Andrews is a people‑centric manager at a mid‑size tech services firm who blends design‑thinking with agile project planning to nurture collaborative teams, excels at conflict resolution
    and coaching junior staff, and channels their love of art and community outreach into creative branding initiatives while navigating occasional disorganization that threatens deadline adherence.
  sports: Lavette Andrews stays fit through a disciplined yoga practice, occasional pick‑up basketball games at the local park where they root for the Charlotte Hornets, and they cheer on the Carolina Panthers
    on Sundays while participating in the Raleigh Running Club’s weekend 5K runs, though their spontaneous nature sometimes leads them to skip a session for an impromptu art event.
  arts: Lavette Andrews immerses themselves in the Raleigh arts scene, frequenting the Contemporary Art Museum and sketching in the margins of gallery openings, while they dabble in watercolor landscapes
    inspired by speculative novels from N.K. Jemisin and Ann Leckie, and they unwind at intimate jam sessions featuring the folk duo River & Reed and the indie band Moonlit Strings.
  travel: Lavette Andrews favors spontaneous, budget‑friendly getaways, often road‑tripping to Asheville for mountain hikes, exploring Savannah’s historic squares for inspiration, dreaming of a cultural
    immersion in Kyoto’s art districts, yet they carefully balance travel dreams with saving for their future nonprofit venture.
  culinary: Lavette Andrews cooks Southern soul‑food with an artistic twist, turning classic collard greens into a miso‑infused sauté, perfecting a honey‑chipotle fried chicken, and reinventing shrimp and
    grits with caramelized onions and smoked paprika, all while they experiment with new ingredients like quinoa and gochujang in their weekend kitchen sessions.
  core: Lavette Andrews blends artistic curiosity with compassionate leadership, navigating a spontaneous yet occasionally disorganized approach to champion community‑focused creativity, all while juggling
    a love for watercolor, yoga, and Southern cooking.
background:
  cultural: Lavette identifies as Black American and grew up in a close-knit African-American community in the greater Raleigh area. Her family traditions blend Southern cultural heritage—such as soulful
    cooking, church gatherings, and storytelling—with a strong emphasis on education and community uplift. She actively participates in local cultural festivals, supports Black artists and entrepreneurs,
    and incorporates the values of resilience, solidarity, and creative expression that are central to her cultural identity.
