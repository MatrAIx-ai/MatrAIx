  career_goals: In the next few years, Lavette aims to progress to a senior management role where she can shape corporate social responsibility programs and lead community-engagement initiatives across
    the Raleigh region. She aspires to become a director of community affairs or a program manager for a nonprofit that leverages arts and culture to empower under-served youth. Long-term, she envisions
    launching her own nonprofit arts education center that blends her managerial expertise with her passion for creative expression and social impact.
