persona_description: A scientist who is interested in the complex interplay between the genetic material of bacteria and the human body, particularly focusing on how the DNA contained in the trillions of
  bacterial cells on and inside us affects human health, aiding in our immune responses and helping newborns break down milk into vital vitamins. This person also has a deep understanding of the genes in
  our mitochondria, the result of a bacterial invasion into our ancestors’ cells 1.8 billion years ago, and how these genes can go awry, introducing mutations that cause hereditary diseases. This person
  is likely to read the above text as they are a scientist who is passionate about understanding the complex interplay between genetics and the human body.
