personas:
  professional: Brenda Stpierre, a seasoned geriatric nurse, blends meticulous evidence‑based practice with a passion for art‑based therapy, and their organized, skeptical mindset drives them to lead quality‑improvement
    projects, mentor new staff, and flawlessly manage shift schedules.
  sports: Brenda Stpierre follows the Atlanta Falcons and the Atlanta Braves with fervor, participates in a senior walking club at the local park, occasionally joins a community softball league, and they
    value low‑impact fitness that fits their organized routine and preference for small‑group activities.
  arts: Brenda Stpierre spends weekends painting watercolors of Georgia’s pine forests, frequents the High Museum of Art, admires Monet and O’Keeffe, and they bring that artistic enthusiasm into community
    theater productions and church choir rehearsals, using art as both personal solace and therapeutic tool.
  travel: Brenda Stpierre enjoys meticulously planning trips to historic towns like Savannah, takes yearly weekend getaways to the Blue Ridge Mountains, and they have a bucket list that includes a cultural
    pilgrimage to New Orleans during Mardi Gras, always securing senior discounts and preferring guided tours that blend art, history, and local cuisine.
  culinary: Brenda Stpierre loves preparing classic Southern biscuits, collard greens, and peach cobbler, but also experiments with Mediterranean dishes like shrimp paella, using fresh herbs from their
    garden, and they consider themselves an intermediate cook who delights in both comforting family recipes and occasional culinary adventures.
  core: Brenda Stpierre is a disciplined, art‑loving geriatric nurse who balances meticulous clinical work with watercolor painting, garden stewardship, and a competitive streak that drives them to out‑budget
    peers while never missing a community service commitment.
background:
  cultural: Brenda was born and raised in the rural South of Georgia, emerging from a family with deep roots in the region’s French-Huguenot heritage, reflected in her maiden name Stpierre. Her upbringing
    emphasized Southern hospitality, church involvement, and a strong work ethic. The community’s values of reliability, modesty, and mutual support shaped her organized and dependable nature. While she
    honors traditional Southern cuisine and holidays, her curiosity drives her to explore diverse artistic and intellectual experiences, bridging her local cultural identity with broader, unconventional
    perspectives.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care'', ''Chronic disease management'', ''Evidence-based practice research'', ''Healthcare documentation'', ''Shift scheduling
