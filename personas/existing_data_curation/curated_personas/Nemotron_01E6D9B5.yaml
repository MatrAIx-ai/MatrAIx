    and parts management'']'
  hobbies: '[''Visiting museums and art galleries'', ''Community theater and performance'', ''Mentoring STEM students'', ''Hiking and nature photography'', ''Gardening and sustainable living'', ''DIY home-improvement
    and creative upcycling'', ''Book club discussions on contemporary literature and philosophy'']'
  career_goals: Hailey aims to advance to a senior lead technician role where she can oversee a multidisciplinary repair team and shape workshop best practices. She plans to earn the Certified Precision
    Instruments Specialist (CPS) credential and develop a training program for aspiring instrument technicians in the Riverside region. Over the next five years she also hopes to launch a boutique repair
    studio that partners with local art galleries and makerspaces, merging her technical expertise with her love for art by maintaining and customizing interactive installations.
