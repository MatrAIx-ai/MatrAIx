  career_goals: Jacqueline aims to advance into a senior director role where she can shape organizational strategy and champion large‑scale initiatives that blend technology with community impact. She aspires
    to lead a portfolio of projects that foster social responsibility, such as sustainable infrastructure and arts‑focused public spaces, leveraging her creative problem‑solving skills. Over the next five
    years, she plans to earn an MBA with a focus on innovation management, deepen her expertise in hybrid project frameworks, and build a mentorship program that empowers women and underrepresented professionals
    in project leadership. Ultimately, she envisions establishing her own consultancy that partners with nonprofits and forward‑thinking enterprises to design and execute purpose‑driven projects.
