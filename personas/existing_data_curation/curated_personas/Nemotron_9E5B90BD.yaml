personas:
  professional: Angela Thomas, a budding field service engineer specializing in mechanical and electrical maintenance of coin‑operated amusement machines, blends their DIY electronics curiosity with practical
    PLC programming skills, delivers calm, reliable service while dreaming of leading an IoT‑enabled team and eventually launching a sustainable repair startup.
  sports: Angela Thomas enjoys hiking the Pine Barrens on weekends, follows the New York Mets in baseball, the Philadelphia Eagles in football, and the New Jersey Devils in hockey, practices yoga at the
    local Ascent Fitness studio, and occasionally joins a community 5K run hosted by the Woodbury Running Club.
  arts: Angela Thomas unwinds after a repair shift by devouring sci‑fi novels by Neil Gaiman and Isaac Asimov, attending indie concerts featuring Tame Impala, catching off‑beat comedy at the Garden State
    Playhouse, and hosting board‑game nights that showcase strategy titles like Terraforming Mars.
  travel: Angela Thomas prefers low‑key, self‑planned road trips that blend nature hikes with tech‑tour stops, has explored the Jersey Shore, Philadelphia’s museum district, and a weekend retreat in the
    Poconos, and dreams of a future adventure to Japan’s Akihabara district to study emerging robotics trends.
  culinary: Angela Thomas, an adept home cook, frequently whips up a classic margherita pizza with fresh basil and mozzarella, savors a proper Philadelphia cheesesteak with provolone, experiments with stir‑fried
    ramen noodles tossed in sriracha and sesame oil, and treats themselves to a banana split topped with dark chocolate chips on weekends.
  core: Angela Thomas balances a relentless curiosity for electronics with a calm, methodical work ethic, occasionally hoarding spare LEDs like trophies, and never lets anxiety derail their steady climb
    toward an IoT‑driven engineering future.
background:
  cultural: Angela was raised in a middle‑class, European‑descent family in Woodbury, New Jersey. Her upbringing blended typical American values—celebrating holidays like Thanksgiving and the Fourth of
    July, weekend trips to the Jersey Shore, and a love for local sports—with exposure to the diverse cultural offerings of nearby Philadelphia and Atlantic City. She speaks English fluently and has a basic
    familiarity with Spanish from community outreach, reflecting the region's multicultural environment.
attributes:
  skills: '[''Mechanical maintenance'', ''Electrical troubleshooting'', ''PLC programming'', ''Coin mechanism repair'', ''Digital payment integration'', ''Preventive maintenance scheduling'', ''Safety compliance'',
    ''Customer service'', ''Inventory management'', ''Technical documentation'']'
  hobbies: '[''DIY electronics projects'', ''Custom LED display building'', ''Reading science‑fiction and mystery novels'', ''Board‑game nights'', ''Hiking in local state parks'', ''Volunteer robotics teaching'',
    ''Baking simple desserts'', ''Sketching mechanical diagrams for fun'']'
  career_goals: Angela aims to become a senior field service engineer, eventually earning industry certifications such as the Certified Service Technician (CST) and completing her associate degree in electronics
    technology. She hopes to lead a team that implements IoT‑enabled solutions for vending and amusement equipment, and one day launch her own specialized repair business focused on sustainable, upgradable
    machine designs.
