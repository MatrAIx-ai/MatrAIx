  career_goals: Cody dreams of becoming a robotics engineer or software developer, envisioning a future where he designs and programs autonomous machines. He aims to lead a team in creating innovative tech
    projects, compete in school science fairs, and eventually contribute to space exploration technology. His ambition is fueled by a desire to excel academically in math and science, earn scholarships
    for STEM programs, and be recognized as a top performer in technology competitions.
