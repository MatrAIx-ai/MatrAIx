personas:
  professional: Cody Bose is a budding strategist who treats every school project like a miniature business, using LEGO and robotics to prototype solutions while meticulously organizing group work and schedules.
  sports: Cody Bose is a forward for the Riverside Youth Soccer Club, loves cheering for the MLS team LAFC, and spends weekends hiking the nearby state park while timing laps to improve stamina, preferring
    structured drills over spontaneous games.
  arts: Cody Bose is a LEGO architect who follows the creations of LEGO master builder Nathan Sawaya, collects limited‑edition Minecraft art prints, and sketches tactical game maps, all of which fuel a
    strategic imagination.
  travel: Cody Bose enjoys organized day trips to the local science museum and has a wish‑list that includes a family vacation to Yellowstone National Park, preferring itineraries with set activity blocks
    and plenty of photo‑ops for their card collection.
  culinary: Cody Bose favors homemade pizza topped with pepperoni and extra mozzarella, loves making peanut butter‑banana sandwiches, and can meticulously assemble a taco bar for friends, yet often skips
    breakfast before school.
  core: Cody Bose blends a hyper‑organized mind with high‑energy social play, turning every hobby from soccer to LEGO into a competitive, meticulously planned adventure, even as worry often shadows their
    optimism.
background:
  cultural: Cody was born and raised in a middle‑class white family in the suburban community of Alpharetta, Georgia. The region's Southern hospitality, strong emphasis on school involvement, and community
    sports programs have shaped his upbringing. He participates in local youth leagues, attends community events at the county library and recreation center, and is exposed to a blend of traditional Southern
    values—such as respect for teamwork and community service—and the tech‑savvy culture of a rapidly growing metropolitan area near Atlanta. This mix encourages his curiosity about technology while grounding
    him in the cooperative, family‑oriented atmosphere typical of his neighborhood.
