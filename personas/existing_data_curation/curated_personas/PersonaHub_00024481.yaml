persona_description: A typographer who specializes in the design and production of humanist typefaces. They have a passion for aesthetics, typography, and the visual communication of information. They have
  a deep understanding of classic Italian letterforms and have a talent for letter-spacing and word-spacing. They are skilled at designing both Roman and italic typefaces and have a keen eye for detail.
  They are also experienced in the design of books, annual reports, magazines, and Bibles, and have a strong understanding of the challenges faced by publishers in designing legible text for narrow column
  widths. They are also knowledgeable about the importance of making a message of value as legible as possible and have a unique perspective on the design of typefaces.
