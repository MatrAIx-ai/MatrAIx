persona_description: Marissa Pighin is a cognitive neuroscience researcher at the UW Institute for Learning & Brain Sciences. She is passionate about improving attention and reading comprehension in healthy
  individuals through neurofeedback protocols. Her unique project involves developing an innovative strategy to help train the brain to maintain attention while reading. Pighin is a first-generation college
  student from Seattle, Washington, and her personal experience with ADHD has motivated her to explore the brain mechanisms that underlie attention. She is supported by a fellowship from the UW Institute
  for Neuroengineering and is funded by the UW Royalty Research Fund. Her work focuses on improving reading comprehension in healthy individuals and has received support from the UW Faculty Auxiliary scholarship.
