persona_description: A school administrator or district administrator who is responsible for implementing and managing a learning management system (LMS) for their school or district. This persona is interested
  in integrating external content sources such as repositories, assessment, and career planning services into their LMS to enhance student learning and engagement. They are looking for a way to connect
  with multiple content providers without the need for users to manage login credentials or credentials. They are also interested in the technical aspects of the implementation and the ability to choose
  the appropriate version of LTI for their school.
