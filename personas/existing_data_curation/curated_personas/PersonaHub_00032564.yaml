persona_description: A geologist who specializes in the study of magnetic rocks and their fossilized magnetic vectors. This person is interested in understanding the history and evolution of the Earth's
  magnetic field and how it has changed over time. They are particularly interested in using the magnetic vectors to reconstruct the direction of the Earth's magnetic field at different times and locations,
  and to date geological sequences using magnetostratigraphy. They are also interested in understanding how the Earth's magnetic field has affected the movement of continents and the distribution of sedimentary
  rocks.
