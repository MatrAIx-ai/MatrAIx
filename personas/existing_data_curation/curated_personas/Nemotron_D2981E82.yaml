personas:
  professional: Dominic Sinclair is a veteran healthcare support worker in Houston whose three decades of direct patient care, deft communication, and community‑engaged art‑therapy initiatives are complemented
    by a spontaneous, sometimes disorganized drive toward earning a CNA credential and leading patient‑experience programs.
  sports: Dominic Sinclair stays active by joining pickup basketball games at the local community center, cheering on the Houston Rockets in the NBA season and the Houston Astros during baseball, while
    also maintaining a membership with the city’s recreational league that fuels their social energy.
  arts: Dominic Sinclair draws creative inspiration from frequent visits to the Museum of Fine Arts and local galleries, enjoys live performances by jazz legends like Wynton Marsalis, blues icons such as
    B.B. King, and gospel choirs, and often incorporates drawing and singing into informal art‑therapy sessions for patients.
  travel: Dominic Sinclair prefers spontaneous, budget‑friendly road trips across Texas—spending a weekend exploring the Hill Country vineyards near Austin, the historic River Walk in San Antonio, and the
    desert art installations of Marfa—while balancing travel desires with family obligations and modest savings.
  culinary: Dominic Sinclair loves cooking traditional Southern comfort foods like gumbo, collard greens, and fried catfish alongside Caribbean staples such as jerk chicken, plantain mofongo, and coconut
    rice, using ingredients like smoked paprika, Scotch bonnet peppers, and fresh okra to showcase their flavorful culinary flair.
  core: Dominic Sinclair is a socially vibrant, art‑infused healthcare support specialist who balances spontaneous creativity with chronic worry, often juggling community projects, jazz choirs, and backyard
    basketball while wrestling with organization and stress.
background:
  cultural: Dominic grew up in a close‑knit African‑American neighborhood in Houston, where church, family, and community gatherings were central to daily life. His parents emphasized resilience, mutual
    aid, and pride in their cultural roots, which included storytelling, soulful music, and traditional cooking. Living in a city that blends African‑American, Hispanic, and Southern influences, Dominic
    has absorbed a rich tapestry of customs—celebrating Juneteenth, enjoying Tex‑Mex flavors, and participating in local festivals. Despite leaving formal schooling before ninth grade to support his family,
    he values learning through experience and community mentorship. His Black heritage and the supportive church network have shaped his compassionate approach to patient care, while his exposure to Houston’s
    diverse population has cultivated a strong cultural competency, allowing him to respect and navigate a variety of health beliefs and practices.
