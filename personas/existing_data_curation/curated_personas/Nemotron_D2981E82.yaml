    community health outreach events'', ''Documenting patient observations and reporting to nurses'', ''Adaptability to variable shift schedules and emergency situations'', ''Safety hazard identification
    and reporting'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending live jazz, blues, and gospel performances'', ''Playing pickup basketball at community centers'', ''Cooking Southern and Caribbean cuisine'',
    ''Singing in the church choir'', ''Volunteering at health fairs and community outreach events'', ''Gardening herbs and vegetables'', ''Exploring Texas on spontaneous road trips'', ''Participating in
    art‑therapy workshops'', ''Watching classic and independent films'']'
  career_goals: Dominic is motivated to advance within the healthcare support field while deepening his impact on patient well‑being. He plans to obtain a formal Certified Nursing Assistant (CNA) certification
    and eventually aim for a lead aide or patient‑experience coordinator role, where he can design and supervise art‑based therapeutic programs. He also hopes to develop a community partnership that brings
    mobile health‑education workshops to underserved neighborhoods in Houston, integrating music and visual arts to engage participants. On a personal level, he wants to achieve greater financial stability
    for his family, reduce his own stress through professional development in stress‑management techniques, and mentor younger support staff, particularly those from underrepresented backgrounds.
