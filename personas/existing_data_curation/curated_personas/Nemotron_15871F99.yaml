  career_goals: In the near future Vianka aims to complete her high school education, either by earning a GED or re‑entering a traditional high‑school program. She is drawn to the practical and creative
    aspects of culinary work, so she plans to enroll in a community‑college culinary arts program where she can deepen her knowledge of Mexican regional cuisine and modern cooking techniques. Her long‑term
    ambition is to open a family‑owned taqueria in Bakersfield that celebrates her cultural heritage while providing a welcoming space for the local community. Alongside her culinary dreams, Vianka is motivated
    to become a mental‑health advocate for teens, using her own experiences with worry and stress to support peers through school‑based counseling programs and volunteer workshops. She envisions combining
    these paths by offering healthy, culturally resonant meals in community centers and partnering with local health initiatives to promote both nutrition and emotional well‑being.
