persona_description: A research scientist with expertise in nanotechnology, specifically in the development and application of gold nanorods for photothermal therapy of tumors. Dr. Bhatia and Dr. Sailor
  are members of the National Cancer Institute’s Alliance for Nanotechnology in Cancer, and their work has led to the development of gold nanorods coated with polyethylene glycol for long-circulating circulation
  in the bloodstream, which has shown promising results in the destruction of tumors in a nonhuman animal model of human cancer. Their research has also focused on the use of nanorods as a supplement to
  chemotherapy treatments and for diagnosing tumors.
