personas:
  professional: Kendall Obryant, a veteran retail cashier with a reputation for flawless cash handling and keen inventory insight, leverages their detail‑oriented mindset and competitive drive to mentor
    new staff, aspiring to a supervisory role and eventual part‑time bookkeeping for local businesses.
  sports: Kendall Obryant, a dedicated birdwatcher and nature enthusiast, follows the New York Yankees baseball team and participates in the Putnam County Senior Walking Club, favoring low‑impact cardio
    over competitive sport; they find the rhythm of walking trails soothing.
  arts: Kendall Obryant, a diligent knitter and puzzle solver, finds solace in the music of Yo‑Yo Ma, the poetry of Mary Oliver, and the paintings of Winslow Homer, attending monthly historical society
    lectures where they share insights on period art.
  travel: Kendall Obryant, an avid genealogist, prefers slow, research‑oriented road trips to historic sites such as Colonial Williamsburg, the Gettysburg battlefield, and the Hudson Valley, often planning
    visits around off‑peak seasons to keep costs low; they relish the quiet of early‑morning drives and the chance to photograph ancestral homesteads.
  culinary: Kendall Obryant, an enthusiastic home gardener, cooks seasonal vegetable soups, rosemary‑infused roast chicken, and apple‑cinnamon pie, favoring fresh herbs like thyme and basil, while occasionally
    indulging in a chocolate fudge square after a long puzzle session, and they often pair meals with a cup of chamomile tea.
  core: Kendall Obryant, a 64‑year‑old solitary scholar with a razor‑sharp eye for detail, blends meticulous cash‑handling prowess, an insatiable curiosity for history, and a competitive streak into a life
    of disciplined independence, punctuated by garden‑grown meals, daily puzzles, and a cautious, yet thorough, approach to finance and health; they cherish quiet moments that fuel their relentless pursuit
    of accuracy.
background:
  cultural: Kendall grew up in a middle‑class white family in upstate New York, raised with modest, Protestant values that emphasized self‑reliance, hard work, and respect for privacy. She has lived most
    of her adult life in Garrison, a small community in Putnam County, where close ties to nature and local history are part of daily life. Her marriage, long‑standing and steady, reinforces a preference
    for stability and practicality. While she appreciates broader cultural ideas, she remains rooted in the quiet, community‑oriented lifestyle typical of her generation.
