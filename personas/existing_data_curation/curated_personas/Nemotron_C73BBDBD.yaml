  hobbies: '[''Reading historical non-fiction'', ''Genealogy research'', ''Birdwatching'', ''Walking nature trails'', ''Gardening'', ''Knitting'', ''Jigsaw puzzles'', ''Sudoku'', ''Journaling'', ''Listening
    to podcasts'', ''Online learning (basic coding)'']'
  career_goals: Kendall aims to leverage her experience and precision to move into a supervisory or training role within the retail environment, focusing on improving transaction accuracy and staff efficiency.
    She aspires to earn a certification in bookkeeping to supplement her associate degree, eventually offering part‑time bookkeeping services to small local businesses, which aligns with her practical ambition
    for financial security before retirement. Her competitive drive motivates her to exceed performance benchmarks and to be recognized as a model employee.
