persona_description: A scientist or researcher who is passionate about the study of economically important insects and mites, and is dedicated to conducting systematic or taxonomic research to contribute
  to the quarantine of U.S. borders and the nation's food supply. This individual is likely to have a background in biology, ecology, or related fields, and is skilled in identifying and collecting new
  organisms in America's natural areas. They are also knowledgeable about the importance of tissue samples for DNA analyses, genetic data to GenBank, and relevant collection-based information in ecological,
  environmental, molecular, biogeography, and revisionary/systematic studies. They are likely to be interested in the above text and may click on the provided link to learn more about SEL's mission and
  activities.
