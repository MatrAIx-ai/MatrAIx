personas:
  professional: John Holmes, a retired business manager with decades of mid‑size corporate experience, channels their strategic planning, budgeting, and mentorship skills into volunteering at the Rock County
    Small Business Development Center, where their organized yet flexible approach and occasional stubbornness help guide local entrepreneurs.
  sports: John Holmes, a devoted fan of the Green Bay Packers and Milwaukee Brewers, spends weekend afternoons watching games at the local tavern while maintaining a low‑impact fitness regimen that includes
    weekly walks with the Rock County Senior Walking Club and occasional shoreline fishing on Lake Koshkonong, preferring practical activity over intense sports.
  arts: John Holmes, a quiet aficionado of American folk and classic country, regularly listens to Johnny Cash and Bob Dylan while perusing works by Norman Rockwell at the Milwaukee Art Museum, enjoys the
    occasional community theater production of Our Town starring local actors, and collects vintage historical photographs, finding these artistic pursuits a reflective counterpoint to their practical hobbies.
  travel: John Holmes, a methodical traveler who favors historically rich road trips, has explored Colonial Williamsburg, the battlefields of Gettysburg, and the scenic charm of Door County, and now dreams
    of a leisurely cruise to the Norwegian fjords to trace ancestral roots, always planning itineraries around senior discounts, modest budgets, and a preference for guided tours over spontaneous wanderings.
  culinary: John Holmes, an adept home cook with a penchant for hearty Midwestern comfort food, regularly prepares garden‑fresh vegetable stew seasoned with garlic and thyme, grills bratwurst with sautéed
    onions and sauerkraut, savors cheese curds from a local dairy, and occasionally treats themselves to a Friday night fish fry featuring perch coated in cornmeal, while still experimenting with a sourdough
    starter on weekends.
  core: John Holmes, a disciplined yet occasionally absent‑minded retiree, blends meticulous financial planning with a love for woodworking—often ending up with splintered fingers and a half‑finished walnut
    chair—while savoring quiet evenings of chess and historical reading.
background:
  cultural: John was raised in a Midwestern, white family with deep roots in Wisconsin's agricultural and manufacturing heritage. His upbringing emphasized modesty, hard work, community responsibility,
    and a strong sense of self‑reliance, values commonly associated with the region's German‑Scandinavian and Irish immigrant influences. He maintains participation in local church activities and community
    events that celebrate regional traditions, while also embracing the broader American cultural emphasis on individualism and lifelong learning.
