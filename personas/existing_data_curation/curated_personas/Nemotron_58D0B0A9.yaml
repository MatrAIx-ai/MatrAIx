  career_goals: Although retired from full‑time employment, John aims to channel his business acumen into volunteer mentorship for local entrepreneurs and small‑business owners through the Rock County Small
    Business Development Center. He also hopes to author a concise guide on practical financial planning for retirees and to stay engaged in community projects that blend his curiosity for new ideas with
    his preference for proven, tangible outcomes.
