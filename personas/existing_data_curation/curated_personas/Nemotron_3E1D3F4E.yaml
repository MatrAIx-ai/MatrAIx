    Illustrator)'', ''Public speaking and presentation'']'
  hobbies: '[''Hiking in the Cascade foothills'', ''Nature photography'', ''Attending contemporary art exhibitions'', ''Gardening (herbs and native plants)'', ''Cooking with locally sourced ingredients'',
    ''Yoga and mindfulness practice'', ''Book club focusing on modern fiction and non‑fiction'', ''Volunteering at community theater'']'
  career_goals: Janille aims to step into a senior executive role—such as Vice President of Marketing—where she can champion purpose‑driven advertising that blends creativity with measurable impact. She
    is passionate about cultivating innovative, unconventional campaigns that address social and environmental issues, positioning her agency as a leader in sustainable brand storytelling. Mentorship is
    a priority; she wants to formalize a program to guide emerging women marketers. Ultimately, she seeks a balanced career that maintains her flexibility and allows ample time for personal creative pursuits
    and family life.
