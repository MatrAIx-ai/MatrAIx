personas:
  professional: A purpose-driven marketing executive, Janille Myers leverages a solid STEM foundation and over twenty years of advertising leadership to turn data-driven insights into compelling, socially
    responsible brand narratives, and they champion mentorship programs for emerging women marketers while embracing a flexible, relaxed approach to project timelines.
  sports: An avid outdoor enthusiast, Janille Myers spends weekends tackling the Cascade foothills, attending Portland Timbers matches, cheering for the Seattle Seahawks, and they belong to the Cascade
    Trail Runners club, integrating yoga into their fitness routine to stay flexible.
  arts: An enthusiastic patron of contemporary art, Janille Myers regularly attends exhibitions featuring Damien Hirst, Kehinde Wiley, and local Portland artist Casey Wien, they curate neighborhood showcases
    and volunteer to design sets for the community theater, blending visual storytelling with their marketing flair.
  travel: An exploratory traveler, Janille Myers delights in spontaneous trips to Pacific Northwest gems like Olympic National Park and Vancouver Island, they also dream of wandering the temples of Kyoto
    and the vineyards of Tuscany, preferring flexible, last‑minute planning over rigid itineraries.
  culinary: A culinary experimenter, Janille Myers loves farm‑to‑table cooking with fresh herbs like rosemary, sage, and native wild mushrooms, they often prepare rosemary‑infused lamb, wild mushroom risotto,
    and pickled ramps, while exploring Eugene’s eclectic food scene for seasonal produce.
  core: Janille Myers is a curious, art‑loving marketing veteran who balances flexible ambition with a love for hiking, community creativity, and sustainable living, all while occasionally misplacing keys
    in their garden.
background:
  cultural: Janille is a white American who grew up in the Pacific Northwest, immersed in Oregon’s outdoor‑centric, progressive culture. She earned a STEM degree at the University of Oregon before transitioning
    into advertising, blending analytical rigor with creative flair. Her upbringing emphasized community participation, environmental stewardship, and an appreciation for diverse artistic expressions—values
    that continue to shape her professional ethos and personal life in Eugene, Lane County.
attributes:
  skills: '[''Strategic brand development'', ''Integrated marketing campaign management'', ''Data‑driven audience analysis'', ''Creative copywriting'', ''Digital media buying'', ''Social media strategy'',
