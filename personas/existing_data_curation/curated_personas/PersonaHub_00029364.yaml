persona_description: A safety professional with expertise in human factors, specializing in the application of scientific knowledge and principles, as well as lessons learned from previous incidents and
  operational experience, to optimise health, safety, well-being, overall system performance and reliability. They are familiar with the importance of designing activities, plants, processes, and procedures
  in such a way that takes into account human imperfections, and are adept at identifying the Performance Influencing Factors that are often-cited as causes in accidents. They are also skilled at managing
  human factors, including ensuring a good 'fit' between people, the equipment they use, the task they carry out, and the environment in which they work, and are proficient in implementing effective measures
  to control risks, including design of the job and equipment, procedures, and training.
