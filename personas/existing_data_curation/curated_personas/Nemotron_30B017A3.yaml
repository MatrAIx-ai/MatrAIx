personas:
  professional: Constance Buchanan, a 43‑year‑old veteran vending‑machine technician with an associate degree in electronics, blends two decades of hands‑on troubleshooting of arcade cabinets, coin‑operated
    snack dispensers, and modern NFC payment modules with a pragmatic curiosity that fuels they earn the Certified Vending Technician credential and move toward a lead‑tech or service‑manager role while
    mentoring apprentices and shaping industry standards.
  sports: Constance Buchanan enjoys hiking the rolling Flint Hills trails in spring and fall with the local Prairie Trail Club, follows the Kansas City Royals and the Chiefs on game days, and spends occasional
    evenings playing pickup softball at the community field, preferring low‑impact outdoor activity over a rigid gym routine.
  arts: Constance Buchanan’s artistic side thrives on retro gaming culture—flipping through Retro Gamer magazines, listening to classic rock legends like Led Zeppelin and The Rolling Stones on long drives,
    and attending Riverfest where they dance to country‑music icons such as George Strait, while their woodworking projects often incorporate vintage arcade artwork motifs.
  travel: Constance Buchanan favors spontaneous weekend road trips to retro arcade museums in Texas, annual visits to the Kansas City Riverfest grounds, occasional pilgrimages to Japan’s Akihabara for early‑era
    arcade cabinets, and short hikes in nearby state parks, balancing a modest travel budget with the occasional splurge for a collector’s fair.
  culinary: Constance Buchanan enjoys cooking simple, garden‑to‑table meals like herb‑roasted chicken with homegrown tomatoes and carrot salad, pairs them with classic diner comforts such as milkshakes
    and burgers, and frequently snacks on nostalgic arcade treats like caramel‑coated popcorn and cheese‑puffs, reflecting a blend of practical home cooking and retro comfort foods.
  core: Constance Buchanan is a hands‑on, curiosity‑driven tinkerer who balances practical discipline with a relaxed, sometimes disorganized lifestyle, turning vintage arcade restoration into both a passion
    and a budding business.
background:
  cultural: Constance grew up in a modest, middle-class family in rural Kansas and has spent most of her adult life in Wichita, an industrial hub known for its aviation heritage and eclectic Midwestern
    culture. Her white, primarily Anglo-German ancestry reflects the broader settlement patterns of the state, and she carries forward the Midwest’s values of practicality, self-reliance, and community
    cooperation. Local traditions—county fairs, church gatherings, and the annual Riverfest—have shaped her appreciation for communal celebration and modest entertainment. While she embraces the down-to-earth
    work ethic of the heartland, she also enjoys the cultural diversity of Wichita, from its growing foodie scene to the blend of historic and modern influences that inform her balanced outlook on new ideas
    and established practices.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical diagnostics'', ''Coin mechanism repair'', ''Arcade cabinet maintenance'', ''IoT vending system integration'', ''Soldering'', ''Light welding'', ''Technical
    documentation reading'', ''Diagnostic software operation'', ''Inventory management'', ''Customer service communication'', ''Team mentorship'']'
  hobbies: '[''Restoring vintage arcade cabinets'', ''Collecting antique coin tokens'', ''Woodworking'', ''Gardening'', ''Attending local music festivals'', ''Hiking in the Flint Hills'', ''Volunteering
    for community tech workshops'', ''Reading retro gaming magazines'']'
  career_goals: Looking ahead, Constance aims to transition into a lead technician or service manager role that offers the flexible schedule she values, allowing her to balance work with family commitments.
    She plans to earn the Certified Vending Technician (CVT) credential and stay ahead of digital-payment trends such as mobile wallets and AI-driven inventory monitoring. Parallel to her day job, she hopes
    to launch a small side business refurbishing vintage arcade cabinets for collectors and local venues. In the longer term, she envisions contributing to industry standards through a regional vending-machine
    association, mentoring apprentices, and sharing her practical know-how while still keeping space for creative tinkering.
