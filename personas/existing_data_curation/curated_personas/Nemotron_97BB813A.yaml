personas:
  professional: John Lumpkin, a 46‑year‑old barber‑entrepreneur, merges precise fade and sculpted beard techniques with a painter’s mastery of color theory, runs his shop with disciplined inventory control
    and charismatic client engagement, and they envision a boutique grooming studio that doubles as an ever‑changing art gallery.
  sports: John Lumpkin participates in a weekly community basketball league, roots for the Idaho State Bengals men’s basketball team and the Boise State Broncos football squad, hikes the Caribou–Targhee
    National Forest on weekends, and they occasionally attend Utah Jazz games during travel.
  arts: John Lumpkin spends evenings oil‑painting vibrant portraits, sketches street‑level studies inspired by Henri Cartier‑Bresson, plays acoustic guitar covering John Mayer and Bon Iver at local open‑mic
    nights, and they draw creative inspiration from Frida Kahlo’s bold palettes for hair‑color designs.
  travel: John Lumpkin loves road‑tripping to Yellowstone and Grand Teton for sunrise hikes, enjoys weekend getaways to Portland’s music festivals, dreams of a summer tour of the Scottish Highlands to explore
    whisky‑making traditions, and they balance these adventures with a tight budget that prioritizes family time.
  culinary: John Lumpkin brews small‑batch hop‑infused craft beers featuring Idaho berries, cooks huckleberry‑glazed pork ribs and masters sourdough starter, favors dishes like finger‑steak with herb butter,
    and they relish experimenting with local barley and pine‑needle smoked cheese in their kitchen.
  core: John Lumpkin, a disciplined yet wildly imaginative barber‑artist, spends his nights turning hair into canvases, brewing inventive beers, and sketching strangers on city streets, all while battling
    a habit of staying up too late perfecting every detail, and they frequently juggle these passions with a need for caffeine.
background:
  cultural: Raised in a working‑class white family in Pocatello, John’s cultural roots are steeped in the small‑town values of Idaho’s Intermountain West. His upbringing combined a modest, self‑reliant
    ethos with exposure to the university town’s diverse ideas, fostering a respect for tradition alongside an openness to new artistic influences. He identifies with the region’s appreciation for the outdoors,
    community solidarity, and a straightforward, practical sensibility, while also embracing the emerging multicultural facets of the city, such as local Native American and Basque traditions, which he
    honors through community events. His high‑school education and limited formal training have been supplemented by a lifelong habit of self‑directed learning, reflecting his intellectually curious nature.
