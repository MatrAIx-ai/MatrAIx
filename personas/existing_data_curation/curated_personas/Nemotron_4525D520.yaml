  hobbies: '[''Gardening and vegetable cultivation'', ''Woodworking'', ''Cooking traditional Mexican cuisine'', ''Participating in and organizing community cultural festivals'', ''Reading non‑fiction on
    sustainable living'', ''Hiking in Kern County trails'']'
  career_goals: Jose aims to re‑enter the workforce by establishing a modest, family‑run landscaping and property‑maintenance business that leverages his practical skills and reliable work ethic. He plans
    to enroll in a community‑college certification program for horticulture or HVAC to broaden his technical expertise. Over the next five years, he aspires to grow his business to serve residential clients
    throughout Kern County, while also mentoring younger members of the Mexican community in practical trades and financial literacy. He seeks a stable income that supports his wife and children, and values
    a work schedule that allows for regular family time.
