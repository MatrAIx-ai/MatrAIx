  hobbies: '[''Cooking Mexican Dishes'', ''Salsa Dancing'', ''Gardening'', ''Volunteering at Community Center'', ''Attending Cultural Festivals'', ''Family Walks/Hiking'', ''Reading'', ''Crocheting'']'
  career_goals: Jeannette plans to re‑enter the workforce by building on her existing strengths. In the next two years she intends to complete an associate’s degree in Business Administration or Health
    Sciences, which will qualify her for part‑time roles as a bilingual outreach coordinator at a community health clinic or as a client services representative in a local nonprofit. Parallel to her studies,
    she is exploring the launch of a home‑based catering service that showcases family recipes, aiming to create a modest supplemental income while preserving flexibility for her family responsibilities.
    Long‑term, she hopes to achieve a stable career that combines her organizational talent, cultural insight, and desire to support other Spanish‑speaking families in Stockton.
