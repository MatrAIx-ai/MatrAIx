personas:
  professional: Jeannette Rodriguez is a soon‑to‑be bilingual outreach coordinator in training, and they leverage their associate‑degree studies, meticulous budgeting, and event‑planning savvy to launch
    a home‑based catering side‑hustle that showcases family recipes while supporting Stockton’s community groups.
  sports: Jeannette Rodriguez stays active through weekly salsa dancing classes and occasional pickup soccer games with the local adult league, they cheer on the Stockton Ports baseball team, and tend a
    vegetable garden that provides low‑impact cardio, embodying a balanced, community‑centric fitness routine.
  arts: Jeannette Rodriguez’s artistic life revolves around crocheting vibrant blankets for family gatherings, attending mariachi performances featuring Lila Downs and Vicente Fernández, and they participate
    in community mural projects that celebrate local folk motifs, all of which fuel their creative outlet while honoring tradition.
  travel: Jeannette Rodriguez prefers low‑key road trips that blend cultural curiosity with family time, having already explored the vineyards of Napa Valley and the historic adobe districts of Santa Fe,
    and they dream of a culinary pilgrimage to Oaxaca’s central plateau while budgeting carefully around their children’s school calendar.
  culinary: Jeannette Rodriguez excels at crafting authentic tamales, mole poblano, and sopes using home‑grown cilantro and poblano peppers, experimenting with regional sauces like pasilla de Oaxaca, and
    they channel this expertise into a budding home‑catering service that offers weekend feasts for neighborhood celebrations.
  core: Jeannette Rodriguez blends meticulous organization, vibrant community spirit, and a love for traditional flavors into a life where spreadsheets meet salsa steps, and the kitchen is both a budget
    hub and cultural sanctuary, they often juggle multiple schedules with a cup of robust coffee in hand.
background:
  cultural: Jeannette is a first‑generation Mexican American whose family maintains strong ties to Mexico’s central plateau traditions. Growing up in a bilingual household, she learned Spanish at home and
    English at school, giving her a fluid bicultural identity. Family gatherings centered around shared meals, Catholic holidays such as Día de los Muertos and Las Posadas, and community celebrations in
    Stockton’s vibrant Hispanic district. These experiences instilled a deep respect for family cohesion, communal support, and the cultural richness of Mexican cuisine, music, and folk art. While she fully
    participates in American civic life, she remains proud of her heritage and actively contributes to the local Mexican‑American community through volunteering and cultural events.
