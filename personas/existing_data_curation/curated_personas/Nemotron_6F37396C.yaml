  hobbies: '[''soccer'', ''LEGO building'', ''Scratch coding'', ''reading adventure books'', ''drawing comics'', ''hiking'', ''cooking Mexican dishes'']'
  career_goals: Raul dreams of becoming an engineer who designs sustainable playgrounds and community spaces. He is fascinated by how things work, enjoys building with LEGO, and wants to apply those skills
    to real‑world projects that help his neighborhood. He also hopes to explore space science, imagining a future where he could contribute to NASA missions while staying grounded in practical problem‑solving.
