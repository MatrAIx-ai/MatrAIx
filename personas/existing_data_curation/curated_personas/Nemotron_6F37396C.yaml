personas:
  professional: Raul Roman, an eight‑year‑old budding coder, merges his love for Scratch programming with the methodical patience of LEGO engineering, turning playful curiosity into early problem‑solving
    projects while staying reliably organized for school assignments.
  sports: Raul Roman dashes across the field for his local Denver Youth Soccer club, idolizes the Colorado Rapids, and swaps the soccer cleats for skis during Colorado winters, approaching each season with
    energetic teamwork and a practical habit of stretching before every game.
  arts: Raul Roman channels his imagination into comic panels inspired by Stan Lee and LEGO landscapes that echo the vivid worlds of Pixar, while devouring adventure novels by J.K. Rowling, marrying his
    curiosity with a disciplined sketch schedule that he keeps on his bedroom wall.
  travel: Raul Roman prefers family road trips that blend spontaneous Saturday hikes in the Colorado foothills with planned visits to iconic spots like Yellowstone and Disneyland, balancing a love for adventure
    with the practical limits of a modest travel budget.
  culinary: Raul Roman, a budding kitchen helper, expertly mashes avocados for guacamole, assembles tacos with seasoned chicken, fresh salsa, and cilantro, and occasionally burns the cheese on quesadillas,
    showcasing both his enthusiastic participation and his occasional over‑enthusiastic heat‑control mishap.
  core: Raul Roman blends boundless curiosity with calm resilience, juggling soccer cleats, LEGO bricks, and Scratch code while maintaining a meticulously organized backpack that sometimes overflows with
    random comic sketches.
background:
  cultural: Raul’s family maintains strong Mexican traditions while living in Lafayette, Colorado. He grows up speaking both Spanish and English, celebrates holidays such as Día de los Muertos and Mexican
    Independence Day with family gatherings, and enjoys the flavors of Mexican cuisine at home. At the same time, he participates in local community events, school activities, and Colorado outdoor culture,
    giving him a blended cultural identity that values family, community, and the natural environment.
