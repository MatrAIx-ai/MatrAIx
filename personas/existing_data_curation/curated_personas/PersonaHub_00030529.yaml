persona_description: A scientist who specializes in plant genetic engineering and molecular biology, particularly in the area of Bt protein production in transgenic plants. They have worked on Agrobacterium
  transformation and microprojectile bombardment, and have expertise in the selection of transformants and the modification of Bt endotoxin coding sequences to improve their expression by plant cells. They
  are knowledgeable about the potential risks and benefits of Bt protein use, including food and feed safety, effects on non-target organisms, weediness potential of transgenics, and the potential for pest
  resistance development. They have experience in regulatory compliance and product characterization, including molecular analysis and homology searches. They are also interested in human health related
  studies and other procedures required by the regulatory agency.
