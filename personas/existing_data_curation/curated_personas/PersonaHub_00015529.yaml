persona_description: A conservation biologist who specializes in the study of primates and their habitats, particularly the critically endangered greater bamboo lemur. Their research interests include the
  conservation status of mammals worldwide, the drivers of habitat loss and degradation, and the potential for successful conservation efforts to bring back species from the brink of extinction. They are
  also passionate about the importance of ecosystems and the benefits that mammals provide to humans.
