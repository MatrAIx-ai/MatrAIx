persona_description: A researcher and scientist who is part of a team leading an international project focused on advancing the relationship between robots and humans, specifically in the development of
  interactive, emotionally intelligent, companion technology. The project aims to explore how people can develop a long-term relationship with artificial creatures in everyday settings, and to predict what
  the intelligent machines of tomorrow might look like and how we should treat them. The project involves a consortium of nine other internationally leading European partners, and will run for four and
  a half years. The team will be studying existing technology to understand people's perceptions of robots, and will be looking for inspiration in creating synthetic companions from studies of the way that
  humans and pet dogs bond and interact.
