    and hackathons'', ''Journaling'', ''Curating synth‑pop playlists'']'
  career_goals: She aims to become a senior product designer within the next five years, leading cross‑functional teams to create intuitive, data‑driven digital experiences. Melissa hopes to specialize
    in designing for emerging technologies such as AR/VR and IoT, integrating her technical background to craft seamless human‑centered interfaces. In the longer term, she envisions launching her own boutique
    design studio focused on sustainable product design, while also mentoring emerging designers and contributing to inclusive design standards.
