  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries'', ''Attending experimental theater'', ''Reading contemporary fiction and design nonfiction'', ''Hiking local trails'', ''Practicing
    yoga'', ''Cooking fusion cuisine'', ''Volunteering at library art workshops'']'
  career_goals: Jaci aims to move beyond her cashier role into supervisory and managerial positions within retail. She plans to enroll in a bachelor’s program in Business Administration, building on her
    associate’s degree, and to earn a Certified Retail Manager credential. In the medium term, she hopes to become a store manager, overseeing staff training, visual merchandising, and operational efficiency.
    Long‑term, she envisions opening a boutique that blends her love for art and commerce, featuring locally made crafts and curated artworks, while also mentoring young entrepreneurs in her community.
