persona_description: A professional in the field of 3D modeling and CAD software, who is skilled in using VectorWorks software for 3D modeling, editing, and manipulating objects. They have experience with
  various 3D modeling operations, including solids, subtracting solids, and intersecting solids. They are comfortable with using the Organize >Edit Group command to restore the condition of 3D objects before
  certain operations and are familiar with the Blend Edge tool for rounding sharp edges in 3D objects. They have a deep understanding of Boolean operations and are proficient in using the VectorWorks software
  to modify and manipulate 3D objects.
