  career_goals: Yer aspires to move beyond the floor‑level role into a supervisory or quality‑assurance position within the packaging department of a mid‑size manufacturing firm. She aims to obtain a certification
    in Sustainable Packaging Design within the next two years, which will enable her to lead initiatives that reduce waste and improve product presentation. Long‑term, she envisions establishing a small
    home‑based consultancy that offers custom, environmentally friendly packaging solutions for local artisans and boutique food producers, allowing her to blend her technical expertise with her artistic
    curiosity while maintaining a quiet work environment that supports her emotional well‑being.
