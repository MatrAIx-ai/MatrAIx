persona_description: A medical device researcher who is familiar with the regulatory evaluation of devices and has experience conducting clinical trials for medical devices. They are aware of the differences
  between the regulatory landscape for medical devices in the U.S. and the EU and are skilled in navigating the complexities of medical device trials. They have a deep understanding of the ethical considerations
  and reporting requirements for devices and have experience with the use of double-blind device trials. They are also familiar with the use of notified bodies in the EU to perform conformity assessments
  and enforce regulation through unannounced inspections of manufacturing processes.
