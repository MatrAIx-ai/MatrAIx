  hobbies: '[''Gardening'', ''Woodworking'', ''Genealogy research'', ''Historical writing'', ''Bridge (card game)'', ''Classic jazz and country music listening'', ''Volunteer work at the local library'',
    ''Church participation'', ''Model train building'', ''Fishing'']'
  career_goals: Although retired, John strives to remain an active contributor to Ooltewah’s community. His primary goals are to complete a memoir documenting his family’s Appalachian roots, to continue
    serving on the board of the local historical society, and to mentor high‑school students interested in history and civic engagement. He also aims to maintain his health, support his wife’s involvement
    in the church, and ensure the family’s financial affairs are orderly for future generations.
