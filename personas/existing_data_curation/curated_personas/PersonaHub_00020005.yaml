persona_description: A paleontologist who specializes in the study of dinosaur fossils, particularly those of the horned dinosaur subgroup. He has extensive knowledge of the characteristics and differences
  between Torosaurus utahensis and other dinosaurs, including the skull characteristics that Douglas Lawson reassigned to this species. He is also aware of the difficulties in assigning specimens to Torosaurus
  utahensis and the importance of finding complete or near-complete specimens to resolve the debate over the validity of Torosaurus utahensis. He is interested in the potential for Torosaurus utahensis
  to be a different genus of dinosaur, and he is eager to find evidence to support or refute this hypothesis.
