data:
  user 1 personas: 'I want to be a music teacher.

    My favorite color is red orange.

    I enjoy watching horror flicks.

    I play the violin.'
  user 2 personas: 'I work at a bar.

    I surf everyday.

    People say i can cook well.

    I can play piano.

    I like to listen to country music.'
  Best Generated Conversation: 'User 1: Hey! What''s up?

    User 2: Not much, just got home from work. How about you?

    User 1: Just got back from a violin recital, I''m tired but happy!

    User 2: That''s awesome, I''m glad you did well!

    User 1: Thanks! Me too! I''m really excited to be a music teacher someday.

    User 2: That''s great! I''m sure you''ll be great at it.

    User 1: Thanks! I hope so!

    User 2: What do you like about music?

    User 1: I love everything about it! The way it makes me feel, the way it can connect people, the way it can tell stories.

    User 2: I totally agree! Music is my favorite thing in the world.

    User 1: Mine too! I''m so glad we met!

    User 2: Me too! I think we''re going to be friends.

    User 1: I think so too!

    User 2: What do you like to do for fun?

    User 1: I love to play the violin, watch horror movies, and go on adventures.

    User 2: I love playing the piano, surfing, and cooking.

    User 1: That''s awesome! I love piano too!

    User 2: Me too! It''s so much fun.

    User 1: What''s your favorite horror movie?

    User 2: I''m not sure, I love so many of them. But The Conjuring is definitely up there.

    User 1: I love that movie! It''s so scary.

    User 2: Me too! I love how it''s based on a true story.

    User 1: Me too! It makes it even more scary.

    User 2: I know right! So, what are you up to this weekend?

    User 1: I''m not sure yet, I might go see a horror movie.

    User 2: That sounds like a great idea! I''m sure there''s a good one playing this weekend.

    User 1: Yeah, I think so too.

    User 2: Well, I''m going to go make dinner. It was great talking to you!

    User 1: It was great talking to you too! See you around!'
