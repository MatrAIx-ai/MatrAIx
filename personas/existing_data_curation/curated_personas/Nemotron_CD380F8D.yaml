personas:
  professional: Roy Wiggins, a three-year-old with a budding fascination for building blocks, demonstrates professional-like precision by methodically arranging LEGO bricks into orderly structures, planning
    each step ahead, and proudly completing the designs without deviation, showing they thrive on predictable outcomes.
  sports: Roy Wiggins, a three-year-old enrolled in a toddler soccer class at the community park, wears a miniature Los Angeles Dodgers cap during games, enjoys cheering for the local youth baseball team,
    follows a structured weekly practice schedule that satisfies their need for routine, and they feel a sense of belonging when the team chants.
  arts: Roy Wiggins, a three-year-old who spends afternoons drawing with Crayola crayons, idolizes the vibrant illustrations of Eric Carle, and watches Sesame Street episodes featuring Elmo, channels their
    kindness into sharing their artwork with friends during playdates, and they take pride in the neat rows of colored pictures they create.
  travel: Roy Wiggins, a three-year-old who loves well‑planned outings, recently visited the nearby zoo with a detailed itinerary, dreams of a family trip to Disneyland next summer, prefers travel experiences
    that include a set snack schedule and familiar bedtime routine, showing they feel most comfortable when each step is mapped out.
  culinary: Roy Wiggins, a three-year-old who favors soft, familiar foods like macaroni and cheese, banana slices, and tiny turkey meatballs, enjoys helping stir mashed potatoes with a small wooden spoon,
    habitually sprinkles grated cheddar on almost every bite, and they take pride in the small kitchen tasks they master.
  core: Roy Wiggins, a three-year-old who blends an innate love for orderly play, meticulous saving, gentle kindness, and occasional resistance to sudden changes, navigates their world with methodical curiosity
    and a cheerful smile, and they consistently seek predictability in daily routines.
background:
  cultural: Roy is a white child raised in Saint Charles, Missouri, a suburban community in the Midwestern United States. His family participates in local traditions such as Fourth of July fireworks, community
    picnics, and church gatherings typical of the region's Protestant heritage. The Midwestern emphasis on politeness, community involvement, and a steady routine influences his preference for structure
    and reliability. He is exposed to a multicultural environment through the city's public library storytimes and preschool, which introduce him to diverse holidays like Thanksgiving and Halloween while
    reinforcing core Midwestern values of hard work, kindness, and cooperation.
