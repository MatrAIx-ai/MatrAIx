personas:
  professional: Aileen Garcia is a bilingual community‑oriented culinary educator who leverages her practical cooking expertise and interpersonal skills to design flexible, low‑stress cooking workshops
    at local cultural centers, while they sometimes scramble to finalize details at the last minute due to a relaxed approach to scheduling.
  sports: Aileen Garcia follows the Chicago Cubs and Chicago Fire with loyal enthusiasm, joins a Saturday morning walking group at the nearby park, and occasionally participates in a community center’s
    beginner volleyball league, preferring relaxed, social fitness activities over intense competition.
  arts: Aileen Garcia delights in the vivid brushwork of Frida Kahlo, the heartfelt songs of Lila Downs, and the electrifying guitar of Carlos Santana, while frequent pottery and watercolor workshops at
    the local studio satisfy their hands‑on creative cravings.
  travel: Aileen Garcia prefers spontaneous weekend trips to river towns like Galena and culinary pilgrimages to Oaxaca, balancing modest budgeting with a desire to explore authentic regional markets, though
    their laid‑back planning style sometimes leads to missed early‑bird deals.
  culinary: Aileen Garcia, a seasoned home chef, masterfully blends traditional dishes such as mole poblano and chiles en nogada with modern twists like gluten‑free tamales, regularly harvesting cilantro,
    epazote, and jalapeños from their backyard garden to infuse fresh, authentic flavor into each meal.
  core: Aileen Garcia navigates life with a warm, community‑focused heart, a penchant for last‑minute flexibility, and a lingering worry that fuels both meticulous culinary experiments and occasional procrastination.
background:
  cultural: Aileen grew up in a Mexican‑American household in the Chicago suburbs, where Spanish was spoken at home and cultural celebrations like Día de los Muertos, Cinco de Mayo, and the Feast of Our
    Lady of Guadalupe were central to family life. These traditions fostered a strong sense of community, hospitality, and respect for family ties. Living in Lemont, Illinois, she stays connected to the
    local Mexican community through church events, cultural festivals, and a neighborhood market that supplies authentic ingredients. Her bicultural identity shapes values of collectivism, modesty, and
    a deep appreciation for Mexican music, dance, and cuisine.
