personas:
  professional: Trevon Mitchell, a veteran automotive service technician with 35 years of hands‑on experience, channels their structured, methodical approach and calm reliability into mentoring junior mechanics
    while streamlining shop workflows toward a future service‑manager role.
  sports: Trevon Mitchell, a member of the Lake Conway Anglers club, follows the Arkansas Razorbacks football schedule, roots for the St. Louis Cardinals in baseball, and participates in a senior softball
    league each summer, balancing gentle cardio from fishing with occasional group drills.
  arts: Trevon Mitchell, an avid listener of Marvin Gaye, Aretha Franklin, and Mahalia Jackson, regularly sings in their church’s gospel choir, spends evenings reading biographies of civil‑rights leaders,
    and channels artistic appreciation into precise woodworking projects.
  travel: Trevon Mitchell prefers meticulously planned road trips, having already explored the Henry Ford Museum in Dearborn, the blues heritage of Memphis, and the music scene of Nashville, while dreaming
    of a tranquil cabin stay in the Great Smoky Mountains for reflective relaxation.
  culinary: Trevon Mitchell, an enthusiastic home‑cook, often seasons the catfish caught at Lake Conway with smoked paprika and lemon, pairs it with classic collard greens, cornbread, and a sweet‑potato
    casserole, and even crafts a custom cutting board from reclaimed wood for their kitchen.
  core: Trevon Mitchell is a methodical, community‑rooted automotive veteran whose disciplined work ethic, quiet anxiety, and love for classic cars, gospel music, and purposeful mentorship shape a life
    of steady service and thoughtful preservation.
background:
  cultural: Trevon grew up in the rural South as part of a close‑knit Black community in Pulaski County, where church, family, and mutual aid were central pillars of daily life. His upbringing was shaped
    by the legacy of the civil‑rights era, instilling a strong sense of perseverance and pride in his heritage. The Southern automotive culture—where many local men worked as mechanics—provided a practical
    pathway to self‑reliance and respect. Regular attendance at the Baptist church reinforced values of humility, service, and structured worship, while community events like church potlucks and local car
    shows offered him modest social connections. These cultural experiences continue to influence his work ethic, his desire to mentor younger Black youth, and his preference for small, meaningful gatherings
    over large, chaotic ones.
attributes:
  skills: '[''Engine diagnostics'', ''Brake system repair'', ''Suspension and steering repair'', ''Emission testing and compliance'', ''Hybrid and electric vehicle service'', ''HVAC and climate control
    repair'', ''Computerized OBD‑II troubleshooting'', ''Parts inventory management'', ''Workshop safety and compliance'', ''Mentoring and training junior technicians'']'
  hobbies: '[''Classic car restoration'', ''Fishing at Lake Conway'', ''Woodworking'', ''Listening to soul and gospel music'', ''Small‑group gospel choir participation'', ''Reading African‑American history
    biographies'']'
  career_goals: Trevon aims to transition into a service manager role within the next two years, leveraging his organizational strengths to streamline shop operations and reduce workflow variability. Long‑term,
    he envisions opening a locally owned garage that specializes in classic car restoration and offers apprenticeships for young African‑American people interested in trades. He also hopes to secure a stable
    pension plan and health coverage before retirement, allowing him to maintain his structured routine without financial anxiety. Additionally, he seeks to cultivate a reputation as a dependable, compassionate
    leader who can balance the shop’s bottom line with the well‑being of his team.
