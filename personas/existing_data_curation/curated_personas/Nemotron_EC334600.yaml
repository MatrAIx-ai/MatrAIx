personas:
  professional: Mary Smith, a 4‑year‑old aspiring storyteller who runs a make‑believe classroom at home, uses their natural curiosity and methodical nature to line up picture books, plan tiny dramatic performances,
    and confidently direct stuffed‑animal audiences, while they occasionally fret over forgotten props.
  sports: Mary Smith attends a local preschool soccer program on Tuesday afternoons, proudly wears their tiny jersey of the neighborhood's junior soccer club, practices simple dribbling drills at home,
    but they prefer the quiet of the sandbox after a game to recharge alone.
  arts: Mary Smith loves finger‑painting rainbows, can recite the lyrics to "Baby Shark" on demand, delights in listening to Raffi’s “Singable Songs”, and spends weekend afternoons at the community library’s
    story hour, where they often volunteer to turn pages.
  travel: Mary Smith enjoys family road trips to a nearby state park where they collect pinecones, recently visited a Santa workshop at a theme park, and now dreams of exploring tide pools along the Pacific
    coast.
  culinary: Mary Smith favors macaroni and cheese with a sprinkle of cheddar, adores strawberry yogurt with honey granola, and is notorious for insisting on dipping apple slices in peanut butter while they
    shun broccoli like a tiny tyrant.
  core: Mary Smith is a curious, meticulously organized 4‑year‑old who balances imaginative play with careful saving, worries over small setbacks, and delights in art and simple adventures.
background:
  cultural: Mary Ann grows up in Maysville, Kentucky, a small city along the Ohio River with a strong sense of community and Mid‑Appalachian influences. Her family participates in local traditions such
    as river festivals, church gatherings, and seasonal celebrations like pumpkin carving. The town’s slower pace, emphasis on neighborly support, and exposure to regional folk music, bluegrass, and craft
    activities shape her appreciation for art and orderly routines. While her background is primarily white, her upbringing reflects the values of hospitality, family cohesion, and respect for the natural
    surroundings of the river valley.
attributes:
  skills: '[''drawing simple shapes'', ''coloring within lines'', ''building block construction'', ''basic counting (up to ten)'', ''story retelling'', ''following multi-step instructions'', ''organizing
