  hobbies: '[''drawing and coloring'', ''building block play'', ''simple puzzles'', ''listening to picture books'', ''nature walks and leaf collecting'', ''dancing to folk and children’s music'', ''organizing
    make-believe games during playdates'']'
  career_goals: Although only four, Mary Ann often shares her dreams of the future. She imagines herself as a kindergarten teacher who can create orderly, creative classrooms, or as an artist who paints
    bright pictures that make people smile. She hopes to combine her love of art, curiosity, and organized nature into a career where she can help others learn and feel safe, and she sometimes says she
    wants to become a veterinarian to care for animals she worries about.
