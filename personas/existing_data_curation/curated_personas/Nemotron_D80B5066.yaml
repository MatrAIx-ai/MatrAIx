personas:
  professional: Bianca Terriquez is a kindergarten explorer who delights in solving simple puzzles and sharing crayons, mixing curiosity with the practical habit of keeping her desk tidy, and their cooperative
    nature makes group activities smooth.
  sports: Bianca Terriquez enjoys snowball games and learning to ski at nearby winter hills, plays T‑ball on the Little Lions community team in spring, and proudly cheers for the Colorado Avalanche and
    Denver Broncos, balancing active play with quiet time on the park swings.
  arts: Bianca Terriquez loves drawing colorful papel picado patterns, singing along to songs by Luis Miguel and listening to mariachi encores, and is captivated by Pixar’s ‘Coco’ and the dance performances
    of local folkloric groups, enriching their imagination with vibrant cultural art.
  travel: Bianca Terriquez dreams of visiting the high peaks of Rocky Mountain National Park and, after a memorable family trip to a coastal town in Mexico for Día de los Muertos celebrations, hopes to
    explore Disneyland and the historic streets of Santa Fe, preferring short, family‑guided trips over long solo voyages.
  culinary: Bianca Terriquez relishes homemade tamales with red chili sauce and crunchy tacos, while also enjoying mac and cheese and strawberry‑filled crepes, often helping stir guacamole with avocado,
    lime, and cilantro, and shows a particular fondness for sweet churros dusted with cinnamon sugar.
  core: Bianca Terriquez is a curious yet practical five‑year‑old who balances quiet solo play with cooperative group fun, carefully saves allowance in a piggy bank, monitors mild allergies with help, and
    fills life with vibrant art, sport, and family‑centered traditions.
background:
  cultural: Bianca grows up in a Mexican‑American household in Erie, Colorado, where family traditions blend with the local mountain lifestyle. She celebrates Día de los Muertos with vibrant papel picado
    and family altars, and enjoys traditional foods like tamales and tacos during gatherings. Bilingual at home, she speaks Spanish with grandparents and English at school, giving her a rich linguistic
    foundation. Community events at the nearby cultural center expose her to folk dances, mariachi music, and stories that connect her to her heritage while fostering a sense of belonging in the diverse
    Boulder County area.
