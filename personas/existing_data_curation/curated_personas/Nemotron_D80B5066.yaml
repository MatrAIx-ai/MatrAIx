    board games'']'
  career_goals: Bianca dreams of one day becoming a teacher or a wildlife caretaker, roles where she can share knowledge and help others. In the near term, she aims to read fluently, master writing her
    name, and explore science kits that let her discover how things grow. Her curiosity drives a budding ambition to explore nature and maybe, someday, become an astronaut who can see the world from above.
