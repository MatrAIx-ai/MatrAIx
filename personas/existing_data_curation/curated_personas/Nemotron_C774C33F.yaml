  hobbies: '[''Car modification and maintenance'', ''Listening to hip‑hop and R&B music'', ''Racing video games'', ''Weight training and fitness'', ''Reading personal development books'', ''Cooking Southern
    cuisine'', ''Street photography'', ''Attending small church gatherings'']'
  career_goals: Reginald plans to obtain his commercial driver's license (CDL) within the next two years and secure a steady position as a long‑haul or regional truck driver. He hopes to later move into
    fleet management or launch his own small delivery business, leveraging his hands‑on experience and logistical knowledge. Recognizing the value of formal education, he intends to earn his GED and enroll
    in a community‑college program focused on logistics or business administration. In the longer term, he aspires to become a sales manager at a local automotive dealership, combining his frontline experience
    with managerial skills.
