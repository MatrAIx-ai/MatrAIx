persona_description: 'A Canadian inventor who is passionate about teaching the invention process and encouraging an innovative mindset in students. They are a Science educator with over twenty years of
  teaching experience and currently serve as the STEM & Science Facilitator K-12 with the Durham District School Board. They have extensive experience in fostering a love for inquiry-based, hands-on, innovative
  experiential learning for students and teachers alike. They have also served as the Program Director and Lead Coach for the NIHF Canada summer and virtual camps: Camp Invention and Camp Invention Connect.
  They are a lawyer and trademark agent with a background in private practice and in-house on matters relating to trademark and copyright infringement, litigation, managing global trademark portfolios,
  domain name disputes, and anti-counterfeiting issues. They currently leads NIHF Canada’s mission to inspire young inventors through innovative educational programming. They are interested in incorporating
  intellectual property (IP) into the classroom and encouraging an innovative mindset in students.'
