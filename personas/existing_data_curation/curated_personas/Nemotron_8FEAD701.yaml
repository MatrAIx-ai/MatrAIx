  hobbies: '["Fly fishing", "Hunting", "Woodworking", "Restoring classic cars", "Attending live rock concerts", "Barbecue cooking", "Reading technology magazines", "Playing chess", "Volunteering at a vocational
    program", "Camping in the Cascades"]'
  career_goals: Tyrone aims to transition into a supervisory role on the shop floor, securing a shift‑supervisor position within the next two years. He plans to earn a CNC programmer certification and leverage
    his expertise to mentor younger technicians, formalizing a mentorship program at his plant. Long‑term, he envisions consulting for small manufacturers on lean process improvements and possibly teaching
    part‑time courses in machining technology at Spokane Community College, allowing him to share his practical knowledge while maintaining a flexible schedule.
