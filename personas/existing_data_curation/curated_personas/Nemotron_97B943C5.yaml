  hobbies: '[''Community gardening'', ''Reading historical fiction and biographies'', ''Walking in Prospect Park'', ''Attending outdoor concerts'', ''Baking Scandinavian breads and pastries'', ''Knitting
    scarves & blankets for seniors'', ''Participating in a book club'', ''Volunteering at a senior center'']'
  career_goals: Samantha aims to transition into a nurse educator role at a community college or hospital‑based training program, where she can formalize her mentorship experience and develop curricula
    that blend practical bedside insights with the latest evidence‑based research. She also aspires to serve on a local health advisory board to advocate for senior health services and to contribute occasional
    health columns to a neighborhood newspaper. Additionally, she is interested in establishing a part‑time consultancy that assists home‑bound seniors in managing medication regimens and navigating the
    healthcare system.
