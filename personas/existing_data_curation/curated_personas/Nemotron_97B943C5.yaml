personas:
  professional: Samantha Ingebretsen, a veteran acute care and geriatric nurse with 35 years of bedside expertise, blends meticulous wound management and IV therapy knowledge with a curiosity for evidence‑based
    practice, and they mentor new staff while preparing curricula for a future nurse‑educator role.
  sports: Samantha Ingebretsen enjoys low‑impact fitness, walking daily with a local walking group through Prospect Park, and they cheer for the Brooklyn Nets and New York Yankees while occasionally joining
    a senior swim class at the community center.
  arts: Samantha Ingebretsen indulges in the arts through their Brooklyn book club, where they discuss historical fiction by Hilary Mantel and biographies of medical pioneers, attend free outdoor concerts
    featuring folk violinist Chris Thile and lilting melodies of traditional northern folk music, and they knit scarves while listening to piano concertos.
  travel: Samantha Ingebretsen favors thoughtfully planned trips, often joining small‑group cultural tours to fjord‑lined villages in the north, weekend getaways to the Hudson Valley’s farm‑to‑table retreats,
    and occasional cruises to coastal towns in Maine, and they balance adventure with the comfort of familiar community rituals.
  culinary: Samantha Ingebretsen delights in baking cardamom‑spiced rye bread, crisp lefse, and buttery krumkake, seasoning their garden‑grown rosemary and thyme into hearty vegetable stews, while they
    showcase these dishes at Lutheran potlucks and neighborhood gatherings.
  core: Samantha Ingebretsen is a steady, curiosity‑driven nurse‑educator‑in‑the‑making who weaves gardening, baking, and knitting into a balanced life, and they often over‑read historical novels before
    bedtime.
background:
  cultural: Samantha is of Norwegian descent, a lineage reflected in her family surname Ingebretsen. She grew up in a modest white, middle‑class household in upstate New York, where traditional Scandinavian
    holidays such as St. Lucia Day and a strong emphasis on community service were celebrated. After moving to Brooklyn, she embraced the borough’s cultural diversity, integrating multicultural perspectives
    into her nursing practice. She remains active in a local Lutheran congregation, where she participates in holiday potlucks featuring Norwegian recipes and supports outreach programs that serve immigrant
    and senior populations.
attributes:
  skills: '[''Acute care nursing'', ''Geriatric patient care'', ''Wound management'', ''IV therapy'', ''Medication administration'', ''Electronic health records (Epic, Cerner)'', ''Infection control'',
