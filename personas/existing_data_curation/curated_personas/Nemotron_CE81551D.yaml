  hobbies: '["Reading (classic literature and contemporary fiction)", "Journaling and personal writing", "Sketching and digital illustration", "Nature photography (macro and landscape)", "Herb gardening",
    "Knitting and crochet", "Crossword and puzzle solving", "Bird‑watching", "Basic Python coding for small projects", "Listening to ambient music and educational podcasts"]'
  career_goals: Maura aims to complete her GED within the next year and enroll in a community‑college program focused on business administration or library science. She seeks a stable, low‑stress role that
    offers predictable routines and minimal social pressure, such as a library assistant, data entry clerk, or medical records technician. Long‑term, she hopes to secure a position that allows her to work
    independently, continue developing her organizational expertise, and contribute reliably to a supportive environment while maintaining the quiet, structured lifestyle she values.
