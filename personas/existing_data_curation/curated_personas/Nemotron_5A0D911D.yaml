  hobbies: '[''Woodworking'', ''DIY furniture building'', ''Jogging'', ''Reading technical manuals'', ''Puzzle‑based video gaming'', ''Guided meditation'', ''Maker’s club participation'']'
  career_goals: Katrina aims to obtain AWS welding certifications and a CNC machining certification within the next two years to solidify her technical credentials. She plans to pursue a GED to broaden
    future educational opportunities and eventually enroll in an associate program for industrial technology. Her long‑term ambition is to progress to a shift supervisor role, where she can apply her organized,
    methodical approach to improve production efficiency and mentor newer workers. Ultimately, she hopes to launch a small custom metal‑fabrication shop that serves local businesses and hobbyists, providing
    a stable, structured environment that aligns with her preference for predictable outcomes.
