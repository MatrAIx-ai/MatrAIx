personas:
  professional: Katrina Brotzman, a 22‑year‑old CNC machinist and certified welder, applies her methodical, safety‑first mindset to operate milling and lathe machines, conduct rigorous quality inspections,
    and lead small production teams, all while mapping out clear step‑by‑step workflows that reflect her ambition to become a shift supervisor and eventually run her own custom metal‑fabrication shop.
  sports: Katrina Brotzman is an avid jogger on local trails, a member of the Greenway Runners club, follows the Seattle Seahawks football team, and participates in a community flag‑football league for
    occasional team competition, balancing solitary cardio with light social sport to stay fit.
  arts: Katrina Brotzman channels creative energy into building custom furniture, drawing design inspiration from the clean lines of Charles and Ray Eames, listening to instrumental post‑rock groups like
    Godspeed You! Black Emperor while working, and regularly visiting the local maker’s market where they admire ceramics by artist Maya Lin.
  travel: Katrina Brotzman prefers meticulously planned trips, often road‑tripping to destinations such as the Alpine Lakes Wilderness in Washington and the historic streets of Savannah, Georgia, while
    saving for an upcoming workshop in Copenhagen to learn Scandinavian metal‑joinery techniques.
  culinary: Katrina Brotzman’s culinary taste leans toward precise, savory dishes like rosemary‑roasted chicken, handmade ramen with fresh pork belly, and they relish the tactile process of kneading dough
    for sourdough bread, favoring high‑quality ingredients such as heirloom tomatoes, black peppercorns, and locally sourced steel‑cut oats.
  core: Katrina Brotzman, a 22‑year‑old precision‑driven maker, balances a strict, schedule‑obsessed work ethic with a secret penchant for late‑night puzzle video games, yet often battles overthinking and
    the occasional coffee‑filled all‑nighter.
background:
  cultural: Katrina grew up in a middle‑class, white American suburban environment in Harford County, Maryland. Her family has a tradition of blue‑collar work, emphasizing hard work, reliability, and practical
    skills. Community values such as punctuality, self‑reliance, and mutual respect for labor shaped her upbringing. While she identifies with mainstream American cultural norms, she also appreciates the
    close‑knit, working‑class community ties prevalent in her hometown, which support her structured and collaborative outlook.
attributes:
  skills: '[''Metal fabrication'', ''Plastic injection molding operation'', ''MIG/TIG welding'', ''CNC machine operation'', ''Blueprint reading'', ''Quality inspection'', ''Industrial safety compliance'',
