  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (herbs and roses)'', ''Walking her dog in the local park'', ''Attending cultural festivals like Charro Days'', ''Volunteering at a community
    center teaching English'', ''Reading historical fiction'', ''Listening to Mexican folk music'', ''Painting landscapes'', ''Traveling to Mexico to visit family'']'
  career_goals: Marisol aims to move from a first‑line supervisor role to a department manager position where she can shape broader operational strategies. She plans to earn a Project Management Professional
    (PMP) certification to lead digital transformation projects that modernize office workflows. Mentoring younger employees, especially women from Hispanic backgrounds, is a key ambition, as is establishing
    a part‑time consulting practice that helps local small businesses streamline their administrative processes before she fully retires.
