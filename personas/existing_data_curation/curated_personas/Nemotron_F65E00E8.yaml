personas:
  professional: Maria Monjaras is a meticulous fabricator and welding specialist in a high‑volume manufacturing plant, leveraging MIG/TIG expertise, CNC machining, and quality inspection acumen while mentoring
    teammates and spearheading lean‑manufacturing initiatives toward a future as a shift supervisor and boutique shop owner.
  sports: Maria Monjaras enjoys weekend hikes on the Texas Hill Country trails, practices yoga three times weekly for flexibility, loyally follows Austin FC in MLS, roots for the Texas Rangers during baseball
    season, and occasionally joins a recreational volleyball league at the community center.
  arts: Maria Monjaras immerses themselves in vibrant cultural rhythms, regularly dancing to salsa and folkloric beats, curating playlists featuring Vicente Fernández, Lila Downs, and Carlos Santana, and
    attending local theater productions of classic Mexican folklore adaptations at the community arts center.
  travel: Maria Monjaras balances a love for local road trips—like exploring the Bluebonnet Trails in spring—with aspirations to visit the historic districts of Oaxaca, the art museums of Barcelona, and
    the national parks of Patagonia, planning each journey using a spreadsheet to harmonize budget constraints with immersive cultural experiences.
  culinary: Maria Monjaras showcases advanced cooking skills by mastering tamales, mole poblano, and chiles en nogada, sourcing fresh chilies, masa, and Mexican chocolate from farmers' markets, and hosting
    potluck gatherings where they experiment with infusing handcrafted copper cookware into traditional recipes.
  core: Maria Monjaras is a hyper‑organized, upbeat fabricator who blends technical mastery with a relentless curiosity for DIY projects, never misses a salsa class, meticulously tracks every expense, and
    quietly battles a stubborn back pain with daily stretching.
background:
  cultural: Maria is a first‑generation Mexican‑American whose parents emigrated from Michoacán. Growing up in Taft’s close‑knit Latino community, she was immersed in family‑centered traditions such as
    Día de los Muertos, quinceañeras, and weekly Sunday gatherings centered around shared meals. Bilingual in Spanish and English, she values the respect for hard work and collectivism (familismo) that
    shaped her upbringing. Her cultural heritage informs her love for Mexican music, dance, and cuisine, and she often incorporates these elements into her social life and future business ideas, aiming
    to celebrate and preserve her roots while contributing to the local economy.
attributes:
  skills: '[''MIG/TIG welding'', ''CNC milling and turning'', ''Blueprint reading'', ''Quality inspection (calipers, CMM)'', ''Polymer injection molding operation'', ''Material selection (metals and plastics)'',
    ''Basic CAD (SolidWorks) modeling'', ''Preventive equipment maintenance'', ''Lean manufacturing principles (5S, Kaizen)'', ''Safety compliance (OSHA)'', ''Team training and mentorship'', ''Process troubleshooting
    and optimization'']'
  hobbies: '[''Salsa and folkloric dancing'', ''Cooking Mexican cuisine'', ''DIY home‑improvement projects'', ''Woodworking and furniture making'', ''3D printing and model design'', ''Hiking in the Kern
    County hills'', ''Yoga and meditation'', ''Volunteering at the food bank'', ''Community gardening'', ''Listening to mariachi and regional Mexican music'']'
  career_goals: Maria aims to become a shift supervisor or lead technician within the next three years, earn AWS Certified Welder status, and complete a certification in CNC programming. She plans to lead
    a lean‑manufacturing project to reduce waste and improve cycle times at her plant. Long‑term, she dreams of opening her own boutique fabrication shop that combines her technical expertise with Mexican
    artistic motifs, offering custom metal and plastic pieces for local businesses and community events. She also hopes to mentor younger workers, especially women and members of the Latino community, to
    pursue careers in trades.
