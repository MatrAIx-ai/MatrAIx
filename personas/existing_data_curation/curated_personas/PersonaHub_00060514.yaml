persona_description: A linguist or language enthusiast who is interested in the Totonac-Tepehua language family and its diverse languages spoken in the area where the states of Puebla, Veracruz, and Hidalgo
  meet. They are knowledgeable about the agglutinating, polysynthetic nature of Coatepec Totonac and its intricate TAM categories, subject and non-subject marking, and verb complex structure, which is an
  important aspect of the language. They are also interested in the broader Totonacan family and its various languages, which is evident from their mention of the Tepehua and Totonac branches and the description
  of the Sierra or Highland language Coatepec Totonac.
