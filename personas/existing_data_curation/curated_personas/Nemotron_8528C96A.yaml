  career_goals: Akil intends to earn his GED within the next year and enroll in a vocational automotive‑technology program at a nearby community college. His short‑term goal is to obtain an entry‑level
    mechanic certification and secure a stable, full‑time position at a local dealership or manufacturing plant where he can apply his routine‑driven work style. Long‑term, he hopes to become a lead technician
    or foreman, leveraging his reliability and organizational skills to oversee a workshop team. Eventually, he aspires to open a modest, family‑run auto‑repair shop that serves the Gould community, providing
    consistent, trustworthy service.
