personas:
  professional: Akil Gotell, a 23‑year‑old aspiring automotive technician, leverages their methodical hand‑craft skills and love of routine to excel in a community‑college workshop, where they track every
    repair in meticulous logs and aim to become a foreman at a local dealership.
  sports: Akil Gotell spends early mornings fishing the Mississippi River and joins a local hunting club during deer season, while cheering for the St. Louis Cardinals and following the nearby junior high
    football team, the Gould Tigers, as a quiet fan.
  arts: Akil Gotell’s evenings echo with classic Delta blues legends like Muddy Waters and B.B. King and gospel voices such as Mahalia Jackson, while they sharpen strategic thinking by playing chess against
    a computer and occasionally humming along while woodworking.
  travel: Akil Gotell prefers low‑key road trips that blend work and leisure, having driven to the Ozark National Forest for a fishing weekend, taken a weekend ride to Nashville to explore music history,
    and dreaming of a future fishing expedition to the Canadian Great Lakes once finances allow.
  culinary: Akil Gotell enjoys cooking simple, hearty meals such as pan‑fried catfish with cornmeal crust, homemade collard greens seasoned with smoked ham hocks, and a weekend habit of baking fresh cornbread
    while experimenting with a new spice blend each month.
  core: Akil Gotell is a routine‑driven, hands‑on 23‑year‑old who balances solitary woodworking, disciplined financial tracking, modest health routines, and a quiet love for blues, fishing, and strategic
    chess, all while planning a future auto‑repair shop.
background:
  cultural: Akil was raised in the rural African‑American community of Gould, Arkansas, a part of the historic Mississippi Delta. His family’s history includes generations of sharecroppers and factory workers
    who emphasized self‑reliance, hard work, and close family ties. The local church has been a central institution, shaping his values of respect, humility, and community service. Growing up, he was immersed
    in the musical traditions of the Delta — blues, gospel, and soul — which he still listens to today. The cultural fabric of his upbringing blends Southern hospitality with a pragmatic approach to life,
    reinforcing his preference for routine, practicality, and reliability. He is aware of the broader social challenges faced by Black residents in the region and draws strength from the resilience and
    solidarity of his community.
