  career_goals: Andrew dreams of combining his curiosity for how things work with a desire to help his community. He aspires to become an engineer—preferably in robotics or mechanical design—so he can create
    tools that solve everyday problems. In the near term, he wants to join his middle‑school robotics team, win a regional competition, and attend a STEM‑focused high school. He also entertains the idea
    of future service roles such as a firefighter or wildlife rehabilitator, reflecting his practical, community‑oriented ambition.
