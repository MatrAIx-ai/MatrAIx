personas:
  professional: Andrew Crowell is a budding technologist who channels his curiosity and practicality into after‑school robotics and coding clubs, building LEGO machines and simple Scratch games while balancing
    organized project plans with a willingness to improvise during group challenges.
  sports: Andrew Crowell thrives on weekend soccer matches with the neighborhood Dynamo Kids club, idolizes Lionel Messi and closely follows FC Barcelona, while also joining the school’s track‑and‑field
    program in spring and tracking personal performance with a fitness smartwatch.
  arts: Andrew Crowell channels imagination into intricate LEGO builds inspired by the architectural styles of Frank Lloyd Wright, enjoys composing simple game soundtracks with chiptune influences from
    Anamanaguchi, and draws storytelling cues from adventure novelist Rick Riordan and sci‑fi documentaries narrated by Neil deGrasse Tyson.
  travel: Andrew Crowell prefers hands‑on trips, revisiting the family’s annual fishing excursions at Lake Tahoe and planning a future hike through the red‑rock trails of Sedona, while dreaming of a tech‑focused
    weekend in Tokyo to explore robotics exhibits.
  culinary: Andrew Crowell favors hearty pizza slices topped with pepperoni and extra cheese, crafts quick snack wraps with ham, cheese, and lettuce after soccer practice, and enjoys trying fresh trout
    grilled on a campfire during weekend fishing outings.
  core: Andrew Crowell blends a competitive curiosity with practical tinkering, turning every LEGO set, coding challenge, and soccer game into a chance to test ideas and outscore peers, all while juggling
    a skeptical eye on shortcuts and a knack for turning boredom into invention.
background:
  cultural: Andrew was raised in Seminole, Oklahoma, a small town in Seminole County where community ties, family involvement, and local traditions play a central role. His family participates in community
    events such as the county fair, church gatherings, and volunteer projects, reflecting the region’s emphasis on practicality, self‑reliance, and respect for the area's agricultural and Native American
    heritage. Growing up in a predominantly white, Midwestern‑American environment, he has been shaped by values of hard work, teamwork, and a balanced respect for both new ideas and established customs.
