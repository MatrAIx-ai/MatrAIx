  career_goals: Although retired, Donna aims to stay intellectually active by volunteering as a docent at the local historical museum, leading informal art appreciation workshops for seniors, and documenting
    the oral histories of Carterville residents. She also hopes to travel to at least three new cultural destinations within the next five years and perhaps compile a small memoir of her experiences and
    family heritage.
