  hobbies: '[''Non‑fiction reading (technology, psychology, self‑improvement)'', ''Cycling around Boston Harbor and Dorchester neighborhoods'', ''Board‑game meetups and competitive online gaming'', ''Raspberry
    Pi and DIY electronics projects'', ''Weight training at local gym'', ''Volunteer work at community kitchen'']'
  career_goals: Ming aims to finish his bachelor's degree in a quantitative field such as business analytics or information systems within the next two years, followed by earning industry‑recognised certifications
    like the Google Data Analytics Professional Certificate and the PMP. His short‑term goal is to secure an entry‑level data analyst position at a regional firm where he can apply his analytical skill
    set and disciplined workflow. Over the medium term, he aspires to advance to a senior analyst or product manager role, leading cross‑functional projects and driving data‑informed decision‑making. Ultimately,
    Ming hopes to launch his own niche e‑commerce consultancy that helps small businesses optimise inventory and marketing through data insights, leveraging his competitive drive and high standards for
    achievement.
