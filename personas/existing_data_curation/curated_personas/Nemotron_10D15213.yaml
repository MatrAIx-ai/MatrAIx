personas:
  professional: Rosaura Darias, a 19‑year‑old apprentice electrician with a knack for merging sustainable tech and artistic lighting, uses their bilingual fluency and love for intricate patterns to design
    bespoke LED installations that double as visual storytelling, while juggling a relaxed attitude toward deadlines.
  sports: Rosaura Darias, a casual runner who joins the Cleveland Trail Club for weekend hikes, follows the San Diego Wave FC in the NWSL, squeezes in sunrise yoga sessions at the local beach, and prefers
    low‑impact workouts like Pilates to keep their nervous system calm.
  arts: Rosaura Darias, an avid low‑light photographer inspired by the chiaroscuro of Edward Hopper and the murals of local street artist Daejan, curates a personal playlist of ambient composers like Brian
    Eno and experimental soundscapes by Tim Hecker, and frequents the San Diego Museum of Art to study installations by Olafur Eliasson, which fuel their lighting design concepts.
  travel: Rosaura Darias, who plans most getaways on a shoestring budget using discount airlines like Southwest, enjoys spontaneous weekend drives to Joshua Tree for stargazing, dreams of exploring the
    colonial streets and vibrant mercados of Oaxaca, and prefers a mix of guided museum tours in San Diego and solitary hikes in the Sierra Nevada that satisfy their wanderlust.
  culinary: Rosaura Darias, a self‑taught home chef who masterfully prepares mole poblano with dried pasilla chilies and chocolate, rolls tender tamales stuffed with pork and masa, and experiments with
    fusion dishes like avocado‑lime sushi rolls, often sourcing fresh cilantro, epazote, and heirloom corn from the local farmers market for their solo meals.
  core: Rosaura Darias, a bright‑minded yet scatterbrained 19‑year‑old who can rig an Arduino‑controlled lighting system in a single night but habitually forgets to water their succulents, seeks solace
    in shadows and finds comfort in the rhythm of ambient music.
background:
  cultural: Rosaura is a second‑generation Mexican‑American who grew up in a bilingual household in Fallbrook, California. Her family maintains Mexican traditions such as celebrating Día de los Muertos,
    preparing mole and tamales, and creating papel picado decorations during holidays. These cultural experiences have instilled in her an appreciation for vibrant colors, intricate patterns, and storytelling
    through visual art, which she channels into her interest in lighting design. While she feels a strong connection to her Mexican heritage, she also embraces the outdoor, laid‑back lifestyle of Southern
    California, often blending the two influences in her cooking, music choices, and community involvement. Her bilingual ability allows her to navigate both the Mexican community and the broader Californian
    context with ease.
attributes:
  skills: '[''residential wiring'', ''conduit installation'', ''circuit troubleshooting'', ''reading electrical schematics'', ''knowledge of California Electrical Code'', ''LED lighting installation'',
    ''smart‑home device setup'', ''basic solar panel installation'', ''manual dexterity'', ''creative lighting design'', ''bilingual communication (Spanish/English)'', ''self‑directed learning of emerging
    electrical technologies'']'
  hobbies: '[''photography (especially low‑light and architectural)'', ''sketching and drawing'', ''hiking in the Cleveland National Forest'', ''reading science‑fiction and philosophy'', ''DIY home improvement
    projects'', ''cooking traditional Mexican dishes'', ''collecting vintage light fixtures'', ''experimenting with Arduino and Raspberry Pi for smart‑home prototypes'', ''meditation and yoga'', ''listening
    to ambient and experimental music'']'
  career_goals: Rosaura aims to become a fully licensed journeyman electrician within the next two years and to specialize in sustainable and artistic lighting solutions. She plans to earn certifications
    in solar photovoltaic installations and advanced smart‑home integration, ultimately positioning herself to launch a boutique contracting firm that merges eco‑friendly technology with bespoke lighting
    design for residential and small commercial spaces. While she values flexibility and a low‑stress work environment, she also wants to develop leadership skills that allow her to mentor other young women
    entering the trades, balancing her personal well‑being with a meaningful, community‑focused career.
