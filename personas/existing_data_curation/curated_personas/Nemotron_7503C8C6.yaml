personas:
  professional: Dustin Glisson is a seasoned journeyman electrician who blends deep-rooted craftsmanship with a curiosity for renewable-energy and smart-home technologies, mentoring apprentices while tackling
    projects with improvisational flair despite a sometimes‑messy workshop; they often find themselves rummaging through a chaotic toolbox for the right part.
  sports: Dustin Glisson follows the Philadelphia Eagles with fervor, plays occasional weekend softball with the Danielsville Firefighters' League, and spends early mornings fishing the Lehigh River, using
    those quiet hours as his personal low‑impact cardio routine; they also enjoy brief hikes on local trails to stay active.
  arts: Dustin Glisson finds artistic inspiration in the rhythmic strums of Alison Krauss, the storytelling of David McCullough, and the craftsmanship of Sam Maloof, while they spend evenings carving reclaimed
    wood and attending occasional performances at the local community theater.
  travel: Dustin Glisson prefers practical road trips, often weekend‑driving to historic Amish Country, the Blue Ridge Parkway, or the museums of Washington, D.C., while dreaming of a summer pilgrimage
    to the Scottish Highlands to trace ancestral roots, balancing his travel budget with family responsibilities; they usually plan trips around long‑weekend holidays to minimize time away from work.
  culinary: Dustin Glisson enjoys hearty home‑cooked meals such as chicken pot pie, roasted pork shoulder with rosemary, and apple crisp made from orchard fruit he harvests himself, often swapping recipes
    with fellow DIY enthusiasts while their cooking skill hovers between competent and experimental; they relish the simple pleasure of sharing a freshly baked loaf with neighbors.
  core: Dustin Glisson is a quietly curious, pragmatic electrician whose love of handcrafted projects and occasional anxiety fuels a life of solitary tinkering, modest thrift, and a habit of misplacing
    their tools; they often laugh at the chaos in their workshop.
background:
  cultural: Dustin is a white American with deep roots in the Pennsylvania Dutch and British‑Scottish heritage typical of Northampton County. Raised in a modest, working‑class household in rural Danielsville,
    he learned the value of hard work, self‑reliance, and modest living from a family of tradespeople. His upbringing was shaped by a close‑knit community centered around a local Methodist church, where
    family gatherings and community events reinforced a preference for privacy, small‑group interaction, and practical problem‑solving. These regional and familial influences combine with his personal curiosity,
    creating a blend of traditional work ethic and an openness to new, technology‑driven approaches within his profession and personal life.
attributes:
  skills: '[''Residential Wiring'', ''Commercial Electrical Systems'', ''Electrical Code Compliance (NEC)'', ''Troubleshooting and Diagnostics'', ''Blueprint and Schematic Interpretation'', ''Solar Photovoltaic
    System Installation'', ''Smart Home Automation'', ''Team Leadership and Mentoring'', ''Safety Training and OSHA Compliance'', ''Project Estimation and Cost Management'']'
  hobbies: '[''Woodworking'', ''Arduino/Raspberry Pi Home Automation Projects'', ''Birdwatching'', ''Fishing'', ''Reading Historical Non‑Fiction'', ''Community Gardening'', ''Volunteer Firefighting'']'
  career_goals: Over the next several years Dustin aims to earn Master Electrician certification and transition his business toward specialty work in renewable energy and home‑automation retrofits for small‑scale
    residential clients. He envisions launching a boutique contracting firm that values flexibility and hands‑on craftsmanship, allowing him to choose projects that align with his curiosity while maintaining
    a manageable workload. Mentoring the next generation of electricians remains a priority, and he hopes to eventually move into a consulting or code‑inspection role that offers a steadier schedule and
    lower physical strain as he approaches retirement. Throughout, he seeks to balance financial security for his family with a work environment that minimizes stress and respects his preference for smaller,
    collaborative teams.
