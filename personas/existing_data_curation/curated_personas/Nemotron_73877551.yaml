personas:
  professional: Joshua Summerlin, a 19‑year‑old aspiring automotive technician, blends their routine‑focused car maintenance and carpentry skills with a solitary freelance video‑editing practice, allowing
    them to work independently, avoid high‑pressure client interactions, and steadily pursue certifications for a future independent repair shop.
  sports: Joshua Summerlin enjoys quiet outdoor sports, spending weekends fishing on Pamlico Sound, hiking secluded coastal trails, and cheering for the Carolina Hurricanes while they occasionally participate
    in a local anglers’ club that meets at dawn.
  arts: Joshua Summerlin immerses in mystery novels by Gillian Flynn, plays narrative‑driven RPGs like The Witcher 3, edits short videos set to soundtracks by Hans Zimmer, and they collect scale model kits
    of WWII aircraft, all of which satisfy their solitary creative drive.
  travel: Joshua Summerlin prefers low‑key travel, often planning solo fishing trips to the Outer Banks, short hikes in the Great Smoky Mountains, and a dream itinerary to Iceland’s remote fjords, and they
    balance a modest travel budget with a need for quiet, reflective environments.
  culinary: Joshua Summerlin favors simple, protein‑rich meals such as grilled trout caught at the sound, a go‑to shrimp boil with Old Bay seasoning, and rustic mac and cheese, relying on basic cooking
    tutorials and they occasionally treat themselves to a spicy chicken sandwich from a local diner.
  core: Joshua Summerlin is a 19‑year‑old solitary tinkerer who channels anxiety into meticulous car repairs, model building, and late‑night thriller reads, while they battle procrastination and an unrelenting
    quest for routine.
background:
  cultural: 'Joshua grew up in Tarawa Terrace, a small community in Onslow County, North Carolina, surrounded by a blend of Southern coastal culture and the presence of nearby Marine Corps Base Camp Lejeune.
    His family adheres to traditional Southern values: strong work ethic, self‑reliance, and modesty, often reinforced through church participation and community gatherings. He was raised on regional foods
    like barbecue and fried fish, and his upbringing included listening to classic country and blue‑grass music at family events. The local emphasis on outdoor recreation—fishing, hunting, and beach outings—shaped
    his appreciation for solitary time in nature. While his community values routine and practicality, Joshua’s personal inclination toward spontaneity creates a quiet tension between fitting in and carving
    his own path.'
attributes:
  skills: '[''Automotive maintenance'', ''Basic carpentry and woodworking'', ''Computer hardware troubleshooting'', ''Video editing (Adobe Premiere Pro)'', ''Introductory Python programming'']'
  hobbies: '[''Reading mystery novels'', ''Single‑player video gaming'', ''Fishing'', ''Hiking on coastal trails'', ''Model kit building'', ''Journaling and mindfulness writing'']'
  career_goals: Joshua aims to secure a certification as an automotive service technician or HVAC specialist within the next two years, valuing the practical, repeatable nature of these trades. He envisions
    eventually opening a small, independently‑run repair shop where he can set his own schedule and limit customer interaction to the level he finds comfortable. Simultaneously, he hopes to grow a freelance
    video‑editing side business, offering low‑pressure work for local businesses and hobbyists. His long‑term ambition is to achieve a balanced career that provides financial stability and predictable routines
    while preserving the flexibility to pursue personal creative projects and manage his anxiety.
