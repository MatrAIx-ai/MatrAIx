  career_goals: Harold aims to finish high school equivalency and earn a scholarship to study environmental engineering or computer science. He wants to combine his love of nature with technology by designing
    sustainable solutions, such as energy‑efficient devices or software tools for conservation. Short‑term, he hopes to secure a summer internship with a local renewable‑energy firm or a community science
    program. Long‑term, he envisions a career that lets him apply technical skills to real‑world challenges while staying engaged in community service and mentorship.
