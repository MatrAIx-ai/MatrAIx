personas:
  professional: Harold White is a budding environmental technologist who blends practical hands‑on tinkering—building model airplanes, fixing household items—and emerging Python programming skills to prototype
    low‑energy devices, and their thoughtful, collaborative style makes them a reliable partner in school group projects and the neighborhood library’s tech assistance sessions.
  sports: Harold White enjoys solo jogs along the Westchester trails, participates in the Westchester Trail Runners club, follows the New York Yankees, New York Knicks and New York Giants on game days,
    and prefers low‑key fitness activities like weekend hikes and occasional intramural soccer matches with a small group of friends.
  arts: Harold White finds creative release in strumming acoustic versions of Bob Dylan and Iron & Wine, sketching Hudson River vistas inspired by the Hudson River School, and editing short video tributes
    to favorite sci‑fi authors such as Margaret Atwood, which they share during library reading sessions.
  travel: Harold White plans trips with meticulous research, favoring modest adventures like weekend hikes in the Appalachian Trail sections of Westchester, day trips to the museums of New York City, a
    recent visit to Washington D.C.’s National Museum of Natural History, and a future dream to explore Iceland’s geothermal sites, all while balancing a limited teen budget.
  culinary: Harold White enjoys cooking simple yet sustainable meals, such as tofu stir‑fry with broccoli, garlic, and soy sauce, pesto pasta made with fresh basil and pine nuts, and baking apple pie with
    a flaky crust, displaying an intermediate skill level and a preference for sourcing ingredients from local farmer’s markets.
  core: Harold White is a quietly curious builder who balances meticulous tinkering with a love for nature, using tech and art to turn ideas into sustainable, low‑key solutions while navigating teenage
    life with a calm, organized rhythm.
background:
  cultural: Harold grew up in the predominantly white, suburban community of Chappaqua, New York. His family traces its roots to German and Irish ancestry, and the local culture emphasizes academic achievement,
    self‑reliance, and community involvement. The affluence of Westchester County provides access to well‑stocked libraries, public parks, and extracurricular programs, which have nurtured his blend of
    curiosity and practicality. While respecting traditional values of hard work and cooperation, he also benefits from an environment that encourages exploration of new ideas and technologies.
attributes:
  skills: '["Basic Python programming", "Video editing with Adobe Premiere", "Basic woodworking", "Research and fact‑checking", "Organizational planning", "Active listening"]'
