persona_description: A conservation biologist who is interested in understanding the dynamics of carnivore and ungulate populations in mixed-use landscapes, specifically in the context of a communally-owned
  rangeland in Kenya. This person is knowledgeable in the study of carnivore and ungulate ecology, including factors such as habitat fragmentation, conflict, and the role of human land use. They are interested
  in the spatial and temporal patterns of niche partitioning, and how these factors influence the coexistence of carnivores, native ungulates, and people in this landscape.
