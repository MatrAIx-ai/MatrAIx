persona_description: A lexicographer or someone interested in the history of English words and names, particularly those related to the military, heraldry, and the arts. The person is likely to have a strong
  interest in the Middle English and Anglo-Norman dictionaries, as well as the works of scholars such as P.H. Reaney and R.M. Wilson, and may have expertise in the use of Middle English and Anglo-Norman
  forms. The person is interested in identifying and assessing the proper identification of words and names, and may be willing to provide additional information from sources such as the Middle English
  Dictionary, Anglo-Norman Dictionary, and works by scholars like B. Thuresson and G. Fransson.
