  career_goals: Martha dreams of exploring the marine world along the Massachusetts coast and hopes to become a marine biologist who protects ocean creatures. She also loves neighborhood pets and imagines
    working as a veterinarian. Occasionally, she mentions wanting to be a teacher who makes learning fun and engaging. Her practical side leads her to think about future work in environmental conservation,
    where she can combine her love of nature with helping others.
