persona_description: A pediatrician who specializes in the study of obesity and its impact on children's health. She is interested in developing alternative physical activity programs for children who do
  not enjoy traditional physical education classes. Her research focuses on the use of active video games in physical education classes to increase physical activity levels and combat childhood obesity.
  She is looking for evidence to support the effectiveness of active video games in improving physical activity levels in children of different ages and genders.
