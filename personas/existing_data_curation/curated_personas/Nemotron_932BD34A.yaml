  career_goals: Although retired from full‑time work, Sabrina aims to stay mentally active and contribute to her community by volunteering as a STEM mentor for local middle‑school students and leading workshops
    at the Arlington senior center. She hopes to author a practical guide on DIY home‑improvement projects that blend engineering concepts with everyday tasks. Additionally, she aspires to apply her technical
    skills to sustainable gardening initiatives and to be recognized as a reliable resource for neighbors seeking practical solutions.
