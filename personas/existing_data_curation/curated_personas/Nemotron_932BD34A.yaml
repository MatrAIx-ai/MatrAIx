personas:
  professional: Sabrina Frith, a retired civil engineer who now volunteers as a STEM mentor, applies their methodical workflow and MATLAB expertise to design practical DIY home-improvement guides and leads
    structured workshops at the Arlington senior center, where they blend technical rigor with patient instruction.
  sports: Sabrina Frith, an avid member of the Arlington senior walking club, clocks 5-kilometer strolls along the Trinity River each morning, follows the Dallas Cowboys during football season, and participates
    in occasional community softball games, reflecting their balanced mix of low-impact fitness and regional sports fandom.
  arts: Sabrina Frith, an enthusiastic crocheter and classic literature aficionado, regularly attends local art gallery openings featuring Monet reproductions, enjoys Beethoven’s Ninth Symphony on vinyl,
    and tunes in to performances by the Dallas Symphony Orchestra, all of which weave a gentle cultural thread into their evenings.
  travel: Sabrina Frith, a meticulous planner, prefers road trips to nearby historic towns such as Galveston and Austin, has already visited the Grand Canyon and Savannah on a well-organized itinerary,
    and now dreams of exploring the historic streets of Edinburgh while sticking to a budget-friendly schedule.
  culinary: Sabrina Frith, a garden-to-table chef, delights in preparing roasted vegetable medleys with heirloom tomatoes, fresh basil, and garlic, crafts hearty bean chili seasoned with cumin and smoked
    paprika, and bakes an apple crumble using locally sourced apples, showcasing their love of seasonal, straightforward cooking.
  core: Sabrina Frith, a routine-loving engineer-turned-mentor, meticulously logs garden yields, double-checks their budget spreadsheet, habitually corrects neighbors’ DIY plans, and occasionally indulges
    in late-night TV drama, which they relish after a long day of volunteering.
background:
  cultural: Sabrina descends from a multi‑generational European‑American family that settled in Texas in the early 1900s. Raised in a mid‑century suburban environment, she absorbed values of self‑reliance,
    hard work, and community service common to her region. The excitement of the space race era sparked her interest in science, leading her to pursue a graduate degree in a STEM field. As a lifelong resident
    of the Dallas‑Fort Worth metro area, she blends traditional Southern hospitality with the forward‑looking spirit of Texas’s growing tech landscape, maintaining strong ties to local churches, senior
    centers, and volunteer organizations.
