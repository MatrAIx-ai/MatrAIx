  hobbies: '[''Fantasy drawing'', ''Digital painting'', ''Reading speculative fiction'', ''Playing chess'', ''Tabletop role‑playing games (D&D)'', ''Abstract photography'', ''Listening to ambient music'',
    ''Creative writing'', ''Online art community participation'']'
  career_goals: Faye aspires to turn her imaginative talents into a professional career in the creative industries. She hopes to attend a specialized art high school and later study illustration or concept
    art at a college, ultimately working as a concept artist for video games or animated films. She also dreams of publishing her own graphic novel or webcomic, blending her storytelling and visual skills.
    In the longer term, she is intrigued by the possibility of developing indie games that integrate her narrative and artistic vision.
