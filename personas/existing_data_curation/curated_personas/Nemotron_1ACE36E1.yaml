personas:
  professional: Faye Zarrella, a teenage concept artist and budding narrative designer, channels an imaginative curiosity and competitive edge into detailed creature sketches and speculative worldbuilding,
    yet their relaxed attitude toward obligations often leaves project timelines in a hazy, disorganized state.
  sports: Faye Zarrella, who occasionally jogs with the school’s cross‑country club and watches the Chicago Bulls and the New York Yankees for inspiration, approaches fitness with a laid‑back, disorganized
    schedule, preferring spontaneous skate sessions over regimented drills yet competes fiercely in chess tournaments, treating mental stamina as a sport.
  arts: Faye Zarrella immerses themselves in surrealist visual culture, drawing inspiration from Salvador Dalí, H.R. Giger, and contemporary digital illustrator Sakimi Chan while listening to ambient pioneers
    Brian Eno, Aphex Twin, and lo‑fi curator Chillhop Music, a habit that fuels their nightly habit of posting original creature concepts to ArtStation and TikTok.
  travel: Faye Zarrella explores travel through a blend of spontaneous road trips to the misty forests of the Pacific Northwest and dream‑like itineraries to Iceland’s northern lights, while budgeting modestly
    from part‑time art commissions, they favor unstructured itineraries that allow impromptu photo shoots of abandoned urban spaces.
  culinary: Faye Zarrella, an intermediate home‑cook with a penchant for experimental flavor pairings, frequently crafts spicy miso ramen topped with charcoal‑black sesame oil, perfects avocado toast sprinkled
    with edible flower petals, and blends matcha latte with a dash of smoked sea salt to accompany their late‑night sketching sessions.
  core: Faye Zarrella is a day‑dreaming strategist who thrives on sketching impossible beasts, obsessively rearranges their desk for aesthetic flow, often forgets homework, and can lose hours chasing the
    perfect shadow in a photograph.
background:
  cultural: Faye was raised in a middle‑class white family in Warren, Michigan, a suburb of Detroit. Her heritage blends Italian‑American and German‑American roots, typical of many families in the region.
    The local culture is marked by the legacy of the auto industry, community‑oriented values, and a modest Midwestern work ethic. She has grown up attending public schools, participating in community events
    at the local library and youth center, and being exposed to a mix of classic American teen culture and the vibrant arts scene of the greater Detroit area.
attributes:
