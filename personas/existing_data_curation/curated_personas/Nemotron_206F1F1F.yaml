personas:
  professional: Rafael Aguirre, a 33‑year‑old aspiring automotive technician, blends his hands‑on expertise in basic car maintenance and DIY electronics with a relaxed, sometimes disorganized workflow,
    allowing them to prioritize practical problem‑solving over rigid planning while competitively seeking to turn their curiosity into a community‑focused repair shop.
  sports: Rafael Aguirre stays fit by tackling weekend hikes in the Cleveland National Forest, participates in a casual co‑ed soccer league with the South Orange County Soccer Club, and follows the Los Angeles
    Dodgers, Los Angeles Galaxy, and Los Angeles Lakers, cheering for them while maintaining a competitive edge that drives their own modest training regimen.
  arts: Rafael Aguirre immerses themselves in classic cinema—rewatching Orson Welles' "Citizen Kane" and Hitchcock's "Vertigo"—while listening to a mix of The Rolling Stones, traditional Salvadoran folk
    group Los Hermanos Flores, and occasional jazz standards, using these artistic moments to unwind after a day of tinkering.
  travel: Rafael Aguirre prefers low‑key road trips that balance nature and culture, having explored Joshua Tree and the coastal towns of San Diego County, while dreaming of a heartfelt pilgrimage to El Salvador
    to reunite with family and a future adventure to the historic streets of Oaxaca, all planned around a modest travel budget and a flexible schedule.
  culinary: Rafael Aguirre delights in cooking traditional Salvadoran pupusas stuffed with quesillo and loroco, seasoning garden‑grown tomatoes, serrano peppers, and fresh cilantro for a vibrant salsa,
    and confidently replicates hearty chili‑verde using home‑grown herbs, showcasing a culinary skill set that blends modest expertise with a love for authentic flavors.
  core: Rafael Aguirre is a solitary, curiosity‑driven tinkerer whose competitive drive fuels a relaxed, often disorganized quest to turn hobbyist skills into a stable, community‑oriented livelihood.
background:
  cultural: Rafael grew up in a Salvadoran household in Hemet, with his parents immigrating from El Salvador in the 1990s. He was raised speaking Spanish at home while learning English in school, giving
    him a bicultural perspective. Family gatherings often feature traditional foods like pupusas and tamales, and celebrations such as Día de los Santos and the Feast of the Virgin of Guadalupe are observed.
    He participates in the local Salvadoran community center, where he helps organize cultural events and supports newer immigrants. While he embraces American customs typical of Southern California, his
    Salvadoran roots remain a central part of his identity.
