  career_goals: Rafael aims to obtain his GED within the next year, followed by vocational training in automotive technology or HVAC. He hopes to secure a stable full‑time position in a local garage, eventually
    opening his own modest auto‑repair shop that serves the community. Additionally, he wants to develop a side business offering home‑repair services, leveraging his hands‑on expertise. He also aspires
    to achieve financial independence, enabling him to support his family and possibly travel to visit relatives in El Salvador.
