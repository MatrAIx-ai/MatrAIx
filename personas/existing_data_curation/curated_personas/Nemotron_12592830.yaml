  career_goals: While still a toddler, Carlos imagines future roles that involve helping others and operating within clear structures. He is fascinated by firefighters and police officers who have predictable
    schedules and defined duties, often role‑playing with a toy fire truck and a police badge. His caregivers nurture this interest by reading picture books about community helpers, reinforcing his desire
    to "be useful" and maintain order. As he grows, Carlos aims to channel his sociable, cooperative nature into a career that blends service with routine, such as a teacher, firefighter, or community safety
    officer.
