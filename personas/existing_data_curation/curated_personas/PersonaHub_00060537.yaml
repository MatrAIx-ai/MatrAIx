persona_description: Richard Fayerweather Babcock was an influential illustrator, painter, muralist, and educator known for his contributions to the field of graphic design. He was born in Denmark, Iowa
  in 1887 and educated at the Art Students League in New York City, the School of the Art Institute of Chicago, two art schools in Munich, Germany, and in Spain. Babcock focused on poster design during
  his time in Europe and began living in the Chicago suburb of Evanston, Ill., in 1913, where he taught poster design at the Art Institute’s School. He was a member of the National Association of Amateur
  Chamber Music Players and the Cliff Dweller’s Club. Babcock created illustrations for the Encyclopedia Britannica, the World Book encyclopedia, and Compton’s Encyclopedia. His murals include "Wilderness,
  Winter River Scene" (1934) for the Legler Branch of the Chicago Public Library, depicting Father Jacques Marquette (1637-1675) and Native Americans, and "Russians Outside Port Arthur" for the U. S. Grant
  Hotel in San Diego. Babcock was also a musician and founder of the Chicago Business Men’s Symphony Orchestra in 1921 (later the Chicago Metropolitan Symphony Orchestra). He died in Evanston in 1954.
