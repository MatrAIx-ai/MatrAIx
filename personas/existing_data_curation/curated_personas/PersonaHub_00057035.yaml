persona_description: A historian who specializes in the study of racial and ethnic tensions in South Africa during the 20th century, particularly the interactions between Indians and Africans in Durban.
  The historian is interested in the historical context in which the charges of racism against Gandhi and the sharp ill-feelings reflected in the unveiling of Gandhi’s statue and Ngema’s song were made,
  and how these tensions have continued to find fertile ground among Indians well into the 1990s and beyond. The historian is also interested in the development of Gandhi’s views on race and ethnicity,
  particularly his maturing ideas about the value of modern industrialization and his holistic view about the individual’s well-being. The historian is likely to be interested in the study of South African
  history and its impact on contemporary politics, as well as the role of history in shaping public opinion and understanding of race and ethnicity in South Africa.
