  hobbies: '[''Visiting art galleries and museums'', ''Photography (landscape and street)'', ''Playing acoustic guitar'', ''Home brewing craft beer'', ''Hiking and fishing in Nebraska state parks'', ''Reading
    philosophy and science non-fiction'', ''Volunteering at the Omaha Community Art Center'', ''Collecting vintage vinyl records'', ''Traveling to culturally rich cities'']'
  career_goals: Ryan aims to transition into a senior executive role—such as Director of Operations or Vice President of Business Development—where he can shape organizational culture and integrate creative
    thinking into strategic initiatives. He is also exploring the possibility of launching an independent consulting practice that helps mid‑size companies blend operational efficiency with innovative,
    arts‑focused employee engagement programs. A key personal ambition is to achieve greater work‑life balance, reducing stress by implementing more structured time‑management habits while continuing to
    mentor emerging leaders.
