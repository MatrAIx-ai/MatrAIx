personas:
  professional: Hiawatha Shazer is a curious five‑year‑old who leads playground building projects with a practical, organized flair, hinting at a future as a community planner.
  sports: Hiawatha Shazer is an enthusiastic member of the Philadelphia Youth Soccer Club's under‑5 team, regularly practices dribbling drills, cheers for the Philadelphia Eagles on game days, and enjoys
    spontaneous dance sessions to classic R&B at the neighborhood park.
  arts: Hiawatha Shazer is a budding choir participant at their Sunday Baptist service, loves singing Stevie Wonder and Beyoncé, spends afternoons drawing vibrant city scenes, and collects storybooks about
    local heroes and legends.
  travel: Hiawatha Shazer is an adventurous little explorer who loves weekend visits to the Liberty Bell, family road trips to Washington, D.C., and dreams of one day touring Disney World in Orlando.
  culinary: Hiawatha Shazer is a budding kitchen helper who enjoys stirring collard greens, helping slice sweet potatoes for pie, proudly eats mac and cheese with a dash of hot sauce, and often asks for
    extra cornbread.
  core: Hiawatha Shazer is a bright five‑year‑old who balances curiosity with community spirit, organizes play, saves pennies, sings in choir, and occasionally competes fiercely for the best Lego build
    while managing asthma.
background:
  cultural: Hiawatha is raised in an African American family in West Philadelphia, where community and cultural traditions shape her everyday life. Her family celebrates holidays such as Juneteenth and
    Kwanzaa, and they regularly attend Sunday services at a local Baptist church, where she participates in choir rehearsals and learns the value of service. Family meals often feature soulful dishes like
    collard greens, cornbread, and sweet potato pie, connecting her to culinary heritage. Evenings at her grandparents' house are filled with storytelling about the civil‑rights movement and notable Philadelphia
    figures, fostering pride in her roots. Neighborhood block parties bring together generations through music ranging from classic R&B to contemporary hip‑hop, and she takes part in community clean‑up
    events, reflecting a practical, service‑oriented mindset. The multicultural environment of Philadelphia exposes her to diverse cuisines, languages, and arts, enriching her worldview while grounding
    her in the values of resilience, curiosity, and communal responsibility.
