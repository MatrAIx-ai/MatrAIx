  career_goals: Anthony hopes to obtain his GED within the next year and then enroll in a local apprenticeship program in automotive technology or electrical work, where he can apply his curiosity for how
    things function in a practical setting. In the medium term, he aims to become a certified mechanic or electrician, eventually opening a modest shop that serves the Lafayette community and offers on-the-job
    training for other youth. He also wants to stay connected to his peers by volunteering as a mentor for the city's after-school youth programs, combining his outgoing personality with a desire to give
    back.
