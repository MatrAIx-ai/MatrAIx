personas:
  professional: Anthony Doner, an aspiring automotive technician, blends hands‑on curiosity with a knack for explaining mechanical concepts to friends, leads impromptu garage projects, and balances a spontaneous,
    sometimes disorganized style with a strong work ethic, and they often draw on community values to stay grounded.
  sports: Anthony Doner dominates pickup basketball games at the Lafayette Recreation Center, shreds at the local skate park as a member of the Lafayette Skate Crew, follows the Indiana Pacers and Purdue
    Boilermakers, while using weekend fishing trips at Tippecanoe Lake to stay fit, and they relish the camaraderie of team sports as a way to unwind from school pressures.
  arts: Anthony Doner strums an acoustic guitar, writes indie‑rock songs reminiscent of John Mayer and Tame Impala, posts video edits of their performances on Instagram Stories, and enjoys catching live
    shows at Purdue Hall featuring local folk bands, and they often use music as a release for their frequent worries.
  travel: Anthony Doner prefers spontaneous road trips, having camped at Hoosier National Forest’s Cedar Ridge and fished at Michigan’s Upper Peninsula, while dreaming of a future visit to Detroit’s Henry
    Ford Museum and a cross‑country bike ride through the Rockies, and they plan each adventure on a whim, balancing school responsibilities with a craving for new horizons.
  culinary: Anthony Doner loves classic Midwestern fare like pork tenderloin sandwiches and cheese curds, cooks simple meals with cheddar, bacon, and jalapeños, experiments with homemade pizza topped with
    pepperoni and fresh basil during weekend hangouts, and they often host friends for after‑game meals, using food as a way to bond and unwind.
  core: Anthony Doner is a high‑energy, curious teen who fixes cars, strums guitars, worries about deadlines, and can’t resist a late‑night gaming purchase or a fresh batch of cheese curds, and they constantly
    juggle their many hobbies with a mix of enthusiasm and occasional procrastination.
background:
  cultural: Anthony comes from a white, Midwestern American family with deep roots in Indiana, tracing back to German and Irish immigrants who settled the region in the late 19th century. Growing up in
    Lafayette, he has been shaped by the small-town values of community cooperation, modesty, and a strong work ethic, while also being exposed to the university atmosphere of Purdue, which fuels his curiosity
    about technology and engineering. Family gatherings often feature traditional Midwestern foods, church involvement, and attendance at county fairs, reinforcing a sense of local identity and pride.
