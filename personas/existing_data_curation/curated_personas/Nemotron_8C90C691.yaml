  career_goals: Silvia aims to graduate high school with strong grades, earn a scholarship, and pursue a degree in accounting or civil engineering. She envisions a stable, structured career as a certified
    public accountant or civil engineer, working on community infrastructure projects in a predictable environment. She plans to obtain professional certifications (CPA or PE) to ensure long‑term job security
    and to contribute reliably to her hometown.
