personas:
  professional: Erin Mendelsohn is a veteran community arts educator who designs and runs interactive, curiosity‑driven workshops for seniors and adult learners, seamlessly blending watercolor painting,
    pottery, and basic digital media while leveraging strong facilitation, storytelling, and conflict‑mediation skills, and they embrace a flexible, sometimes disorganized approach to deadlines that fuels
    their competitive drive to keep participants energized.
  sports: Erin Mendelsohn energizes their weekly routine with Zumba dance classes, competes in the Howard County Senior Badminton League, and passionately supports the Washington Capitals and Baltimore
    Orioles, balancing a competitive spirit on the court with a relaxed approach to scheduling workouts and game nights.
  arts: Erin Mendelsohn frequents local galleries such as the Baltimore Museum of Art, draws inspiration from Monet and Georgia O'Keeffe while experimenting with Banksy‑style street motifs in their watercolors,
    attends avant‑garde theatre at the Hippodrome, and spearheads neighborhood art fairs that showcase emerging artists, reflecting their deep curiosity and sociable flair.
  travel: Erin Mendelsohn enjoys spontaneous, culturally immersive trips to destinations like Florence, Kyoto, and Oaxaca, often booking last‑minute flights to explore local museums and artisan workshops,
    and they aspire to launch a pop‑up art series in Marrakesh that merges travel experiences with community creativity.
  culinary: Erin Mendelsohn, an enthusiastic gardener, delights in preparing Mediterranean dishes such as rosemary‑infused lamb chops, basil‑laden quinoa salads, and delicate peach galettes, while also
    mastering homemade sushi rolls with avocado and pickled ginger, showcasing a moderate cooking skill that balances experimental meals with comfort food.
  core: Erin Mendelsohn is a 64‑year‑old, art‑driven community catalyst whose competitive edge, laid‑back planning, and love for watercolor, Zumba, and spontaneous travel shape a vibrant yet occasionally
    disorganized lifestyle.
background:
  cultural: Erin comes from an Ashkenazi Jewish family that originally settled in the American Midwest before relocating to Maryland. While she identifies as white and embraces a secular, multicultural
    American identity, her upbringing was steeped in values of curiosity, lifelong learning, and community responsibility. Family traditions—such as celebrating cultural holidays, sharing stories, and cooking
    heritage recipes—instilled an appreciation for the arts and diverse perspectives. These influences, combined with her experience living in Columbia, MD, shape her inclusive approach to teaching and
    community engagement.
attributes:
  skills: '[''Workshop facilitation'', ''Adult education'', ''Community outreach'', ''Art instruction (painting, pottery, mixed media)'', ''Public speaking'', ''Storytelling'', ''Conflict mediation'', ''Flexible
    curriculum design'', ''Digital media basics'', ''Group dynamics management'']'
  hobbies: '[''Visiting art galleries & museums'', ''Watercolor painting'', ''Theatre attendance'', ''Gardening'', ''Group dance classes (e.g., Zumba)'', ''Traveling to cultural destinations'', ''Reading
    philosophy & innovation'', ''Hosting book clubs'', ''Playing bridge (competitive)'', ''Volunteering for community events'']'
  career_goals: Erin aims to broaden her impact by establishing a community arts hub in Howard County that offers flexible, curiosity-driven programs for seniors and adult learners. She aspires to mentor
    emerging community educators, develop a traveling pop‑up art series that brings workshops to local neighborhoods, and author a guidebook on integrating art and creative thinking into everyday life for
    lifelong learners. Additionally, she hopes to collaborate with local museums to curate interdisciplinary exhibitions that bridge art, history, and contemporary ideas.
