persona_description: A feminist scholar and researcher who specializes in studying the social and cultural practices that contribute to the elimination of female infants in North India, particularly in
  the states of Madhya Pradesh, Rajasthan, Himachal Pradesh, Haryana, and Punjab. Her research focuses on uncovering the everyday practices, concealed within families and communities, that explain the paradoxes
  of child sex ratios and the surge in sex selective abortions. She is known for her meticulous fieldwork, in-depth analysis, and her ability to uncover hidden practices that are often overlooked. Her work
  has been groundbreaking and has shed light on the complex and nuanced issues surrounding gender inequality and violence against women.
