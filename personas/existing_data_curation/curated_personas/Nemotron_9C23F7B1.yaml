personas:
  professional: Susie Harbison, a 16‑year‑old aspiring administrative professional, demonstrates they blend meticulous scheduling, strong Microsoft Office and Google Suite skills, and a calm under‑pressure
    demeanor to excel in school projects and volunteer tasks, laying a foundation for a future medical office manager role.
  sports: Susie Harbison, a fan of the Oakville Tigers high‑school football team and a regular viewer of the Kansas City Chiefs, channels their love for routine into a modest fitness regimen that includes
    thrice‑weekly 30‑minute jogs, occasional yoga sessions through their school’s wellness club, and weekend hikes with family, always tracking progress in a spreadsheet.
  arts: Susie Harbison’s artistic side shines through evenings spent crocheting cross‑stitch patterns to the soothing strains of Dolly Parton and Luke Bryan, weekend reads of John Green’s teen novels and
    Brené Brown’s self‑help guides, and occasional trips to the community theater to see productions starring local talent like Emma Hart, all of which feed their structured yet creative mindset.
  travel: Susie Harbison approaches travel like a carefully plotted puzzle, meticulously mapping out road‑trip itineraries to nearby state parks such as Shenandoah and planning future visits to iconic destinations
    like New York City’s Broadway district and the Grand Canyon, balancing their modest teen budget with a desire for both relaxation at cozy B&Bs and the adventure of low‑key hiking trails.
  culinary: Susie Harbison, with modest kitchen confidence, delights in baking perfectly measured chocolate‑chip cookies, whipping up classic chicken pot pie using carrots, peas, and flaky crust, and experimenting
    with lemon‑zest scones, while savoring the occasional crunch of warm pretzels seasoned with sea salt.
  core: Susie Harbison, a 16‑year‑old puzzle‑lover, turns every aspect of life into a structured challenge—except for flossing, which they habitually forget.
background:
  cultural: Susie was raised in Round Rock, Texas, a suburban community within Williamson County that blends traditional Texan values with modern suburban life. Her family’s white, middle‑class background
    includes a strong emphasis on community involvement, personal responsibility, and faith‑based traditions common in the region. Local customs such as attending high‑school football games, enjoying Texas
    barbecue, and participating in neighborhood gatherings have shaped her sense of belonging. The blend of Southern hospitality, Texan independence, and the proximity to Austin’s cultural diversity gives
    her an appreciation for both local traditions and broader cultural experiences.
