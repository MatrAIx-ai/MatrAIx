  career_goals: Short‑term, Susie aims to earn her GED within the next year and enroll in a community‑college program focused on business administration. Long‑term, she aspires to become an administrative
    professional—ideally a medical office manager or human‑resources coordinator—where she can apply her organizational talent to support team operations, ensure smooth service delivery, and achieve a stable,
    reliable career path.
