  hobbies: '[''Beach volleyball'', ''Stand‑up paddleboarding'', ''Kayaking'', ''Fishing'', ''Fantasy football'', ''Trivia nights'', ''Tech DIY projects'', ''Arduino building'', ''Reading science non‑fiction'',
    ''Cooking seafood dishes'']'
  career_goals: Skyler aims to transition from a frontline representative to a supervisory or operations‑management role within the next three years, leveraging his analytical skills to lead a team that
    drives customer‑experience metrics. He plans to earn certifications such as Six Sigma Green Belt and PMP to strengthen his credentials in process optimization and project leadership. Long‑term, he envisions
    moving into a product‑support engineering position or consulting role where he can merge his technical background with his customer‑centric expertise, ultimately contributing to strategic decisions
    that enhance service quality and efficiency.
