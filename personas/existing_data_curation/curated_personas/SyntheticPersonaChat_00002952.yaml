  user 1 personas: 'Some jokes go too far.

    I like simple jokes.

    My friend likes cartoons like south park.

    I like the flintstones.

    I prefer the simpler times.'
  user 2 personas: 'I am twenty six years old this may.

    My mother was a famous ballet dancer in london.

    I work at a gas station as a cashier.

    I will be moving to san diego in two months.

    My favorite band is the punk band rancid.'
  Best Generated Conversation: 'User 1: I''m not a fan of edgy jokes. I think they''re often in poor taste.

    User 2: I agree. Some jokes just go too far.

    User 1: I think it''s important to be able to laugh at yourself, but there''s a difference between that and making fun of others.

    User 2: Exactly. I like simple jokes that are funny without being mean.

    User 1: Me too. I like jokes that make me laugh, but I don''t like jokes that make me feel bad.

    User 2: I agree. I think jokes should be about making people laugh, not about making them feel bad.

    User 1: What are some of your favorite cartoons?

    User 2: I like South Park, The Simpsons, and Family Guy.

    User 1: I like those too! I also like The Flintstones.

    User 2: I''ve never seen that one. What''s it about?

    User 1: It''s about a family of cavemen living in the Stone Age. It''s a really funny show.

    User 2: That sounds fun! I''ll have to check it out.

    User 1: You should. It''s a classic.

    User 2: I''m sure I''ll like it.'
