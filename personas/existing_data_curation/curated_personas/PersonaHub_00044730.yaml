persona_description: A researcher and climate change expert who is focused on understanding the impact of climate change on small European nations and the transnational dimension of these impacts. Hedlund's
  research is particularly relevant to the field of transnational adaptation governance and the role of international cooperation in reducing climate risks in global systems. She has a deep understanding
  of the complexities involved in assessing vulnerability to climate change, particularly in terms of exposure and sensitivity to transnational impacts. Her work is informed by a methodological approach
  that recognizes the transnational dimension of climate change impacts and highlights the importance of transnational cooperation in addressing climate risks.
