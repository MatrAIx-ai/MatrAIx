  career_goals: Han aims to advance into a senior operations manager role within the next five years, overseeing larger cross-functional teams and driving strategic initiatives. He plans to obtain a PMP
    certification and Six Sigma Green Belt to deepen his project management and process excellence credentials. Additionally, he hopes to mentor emerging supervisors, champion a healthier workplace culture
    that reduces stress, and eventually transition into a consultant role where he can help other organizations streamline their administrative operations. Balancing his ambition with his personal well-being,
    he also seeks a more predictable schedule to better manage his stress levels.
