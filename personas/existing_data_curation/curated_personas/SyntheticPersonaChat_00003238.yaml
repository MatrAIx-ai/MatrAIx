    User 1: That sounds like fun.

    User 2: It is! I love going out to bars with my friends.

    User 1: So, what are you looking for in a friend?

    User 2: I''m looking for someone who is kind, funny, and intelligent.

    User 1: Those are all great qualities to look for in a friend.

    User 2: I think so too.

    User 1: Well, it sounds like we have a lot in common.

    User 2: I think so too!

    User 1: So, maybe we could hang out sometime?

