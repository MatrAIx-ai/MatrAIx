personas:
  professional: Luis Figueroa is an aspiring digital comic creator who blends folklore‑inspired sketches with interactive Scratch stories, channeling their curiosity and love for unconventional ideas into
    ever‑evolving art projects, even as they wrestle with a relaxed, sometimes disorganized workflow that favors flexibility.
  sports: Luis Figueroa enjoys playing soccer with the U12 City Dragons youth league in the fall, swings a baseball bat for the local junior club during spring, jogs through community parks for fitness,
    and follows professional teams like the Los Angeles Lakers in basketball and the Chicago Cubs in baseball for inspiration.
  arts: Luis Figueroa immerses themselves in drawing folklore‑inspired characters, dedicates weekends to mastering digital illustration on Procreate, looks up to creators such as Stan Lee, Hayao Miyazaki,
    and Neil Gaiman, and proudly showcases their comic panels at school art fairs, where their shy yet assertive personality shines.
  travel: Luis Figueroa prefers low‑key family trips that balance adventure and relaxation, has explored the coastal cliffs of Big Sur and the historic streets of Barcelona, dreaming of a sunrise hike in
    Patagonia and weekend camping at a nearby state park whenever school allows.
  culinary: Luis Figueroa relishes spicy ramen, homemade pizza topped with fresh basil and mozzarella, and crafting simple desserts like chocolate‑dipped strawberries, though their cooking skills are still
    beginner‑level, often relying on YouTube tutorials and parental supervision in the kitchen.
  core: Luis Figueroa is a curious, art‑driven 11‑year‑old whose vivid imagination fuels digital comics and sketch‑filled daydreams, yet lingering anxiety and a love for flexibility make them both a spontaneous
    creator and a lovable procrastinator.
background:
  cultural: Luis comes from a Mexican‑American family that maintains strong ties to Mexican traditions while living in Orange, California. At home, Spanish is spoken alongside English, and he celebrates
    holidays such as Día de los Muertos and Mexican Independence Day with family gatherings, traditional foods, and vibrant decorations. These cultural experiences influence his artwork, often incorporating
    bright colors, papel picado motifs, and iconic symbols from Mexican folklore. He feels a deep connection to his community’s bicultural identity, which shapes his perspective on creativity and belonging.
