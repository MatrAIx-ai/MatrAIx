  hobbies: '[''drawing'', ''digital art'', ''comic creation'', ''Scratch programming'', ''listening to music'', ''reading graphic novels'', ''nature sketching'', ''mindful drawing'', ''small art workshops'']'
  career_goals: Luis dreams of becoming an illustrator for children’s books or a concept artist for video games, fields where he can blend his love of art, storytelling, and inventive ideas. He is also
    fascinated by the possibility of designing characters that reflect his Mexican heritage and personal emotions. In the long term, he hopes to work in a small, creative studio environment that values
    flexibility and encourages unconventional thinking, allowing him to grow his artistic style while managing his personal well‑being.
