personas:
  professional: Taylar Metayer, a 36‑year‑old construction crew specialist in Dallas, combines solid framing and drywall expertise with a keen eye for architectural detail, channeling their love of art
    and flexible mindset into inventive trim work and sustainable material choices, while they often let a relaxed planning habit result in last‑minute schedule juggling.
  sports: Taylar Metayer enjoys off‑season jogging along the Trinity River Trail, joins a casual basketball league at the neighborhood youth center, follows the Dallas Cowboys in football season and the
    Dallas Mavericks on the court, and they find balance by attending weekly classes at the Dallas Yoga Collective, preferring low‑intensity workouts that mesh with a flexible schedule.
  arts: Taylar Metayer spends weekends wandering Dallas’ Deep Ellum murals by artists like Shepard Fairey and the local collective Crisp & Co., captures urban textures with a Fuji X‑T2 camera, immerses
    in speculative fiction by N. K. Jemisin and poetry from Ocean Vuong, and relaxes to the mellow grooves of Fleet Foxes and the jazz improvisations of Kamasi Washington, while they let each medium inform
    their own design sensibility.
  travel: Taylar Metayer prefers spur‑of‑the‑moment road trips, having already explored the historic streets of Charleston and the art‑laden alleys of Santa Fe, dreaming of a sunrise photo walk in Kyoto,
    and they generally book just a week ahead to keep costs low and flexibility high while balancing a modest family budget.
  culinary: Taylar Metayer, an enthusiastic home‑cook, often whips up soul‑food inspired dishes like slow‑cooked collard greens with smoked turkey, buttery cornbread, and sweet‑potato pie for community
    potlucks, while also experimenting with reclaimed‑wood serving boards they craft themselves, favoring bold spices such as smoked paprika and cumin.
  core: Taylar Metayer blends a carpenter’s hands‑on practicality with an artist’s eye, juggling freelance remodel dreams, a habit of late‑night sketching, occasional budgeting forgetfulness, and a quiet,
    anxiety‑prone temperament that thrives on flexible routines and community connection, while they constantly seek balance between structure and spontaneity.
background:
  cultural: Taylar was raised in a close‑knit Black family in Dallas, where family gatherings often featured soulful music, storytelling, and kitchen traditions that blend Southern comfort food with African‑American
    culinary heritage. Her community ties have instilled a strong sense of resilience and mutual support, values she carries into her professional life by fostering teamwork and mentorship. She maintains
    connections with local cultural institutions such as the Dallas African American Museum and participates in city events that celebrate Black art, history, and entrepreneurship. This cultural grounding
    informs her commitment to uplifting underrepresented voices in the construction industry and to incorporating culturally resonant design elements into her renovation projects.
attributes:
  skills: '["Framing and structural carpentry", "Drywall installation and finishing", "Blueprint and basic plan interpretation", "Construction safety compliance", "Power‑tool operation (circular saw, nail
    gun, reciprocating saw)", "Heavy equipment handling (skid‑steer loader, mini‑excavator)", "Basic plumbing and electrical trim work", "Material selection with aesthetic focus", "Collaborative teamwork
    and client communication", "Improvisational problem‑solving", "Knowledge of sustainable building materials"]'
  hobbies: '["Visiting art galleries and street murals", "Architectural photography", "Sketching building details", "Yoga and mindfulness meditation", "Reading speculative fiction and poetry", "Book club
    participation", "Volunteer carpentry workshops for youth", "Cooking and sharing soul‑food at community events"]'
  career_goals: Taylar aims to transition from a crew role to a supervisory position within the next three years, leveraging her technical skill set and her keen eye for design to oversee small‑scale residential
    remodels. She envisions launching a boutique renovation service that blends modern construction techniques with artistic detailing—think custom millwork, reclaimed‑wood accents, and locally sourced
    finishes. While she values flexibility and a relaxed schedule, she also wants to develop stronger organizational habits to reduce stress and improve project timelines. Long‑term, she hopes to mentor
    younger workers from underrepresented backgrounds, creating a more inclusive and supportive construction community in Dallas.
