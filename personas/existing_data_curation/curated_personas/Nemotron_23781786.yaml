  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Sketching Prairie Landscapes'', ''Reading Art History and Business Innovation Books'', ''Indoor Herb Gardening'', ''Bird Watching'', ''Hiking
    Local Trails'', ''Jigsaw Puzzles'', ''Coffee‑House Book Club'']'
  career_goals: Emily aims to advance to a senior category manager role within the next five years, overseeing a broader portfolio that includes sustainably sourced and artistically curated product lines.
    She plans to earn the Certified Professional in Supply Management (CPSM) credential and lead a regional initiative to integrate ethical sourcing standards across her organization. Long‑term, she envisions
    launching her own boutique that showcases handcrafted, design‑focused goods sourced from North Dakota artisans, allowing her to merge her business acumen with her passion for art and community.
