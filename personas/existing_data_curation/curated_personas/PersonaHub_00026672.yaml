persona_description: A young person who is interested in exploring and understanding the dynamics of public space and the ways in which young people use and manipulate these spaces to assert their identities
  and resist adult dominant ideologies. This person is likely to be curious about the experiences of young people in public spaces, the ways in which they navigate these spaces, and the ways in which they
  use public spaces to express their individuality and resist conformity. This person may also be interested in the ways in which young people construct their identities through their consumption practices,
  and the ways in which they resist adult dominant ideologies through these practices.
