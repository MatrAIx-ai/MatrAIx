  hobbies: '[''Visiting Art Galleries & Museums'', ''Live Music & Jazz Nights'', ''Experimental Theater'', ''Street Photography'', ''Improv Comedy'', ''Fusion Cooking & Dinner Parties'', ''Pick‑up Basketball'',
    ''Science‑Fiction Book Club'', ''STEM Outreach & Mentoring'']'
  career_goals: Jorrell aims to become a leading innovator in interdisciplinary education, expanding the integration of the arts into STEM curricula at his institution. Over the next five years, he plans
    to secure a major NSF grant to launch a campus‑wide STEAM initiative, develop a makerspace that serves both students and the local community, and author a textbook on creative pedagogy. He aspires to
    attain tenure and eventually serve as department chair, where he can champion flexible, student‑centered teaching policies. Long‑term, he envisions founding a regional consortium that connects colleges,
    museums, and industry partners to create public science outreach programs, leveraging his sociable nature to build strong networks. He also hopes to write a popular‑science book that translates complex
    ideas into accessible, engaging narratives, reflecting his love for varied experiences and unconventional thinking.
