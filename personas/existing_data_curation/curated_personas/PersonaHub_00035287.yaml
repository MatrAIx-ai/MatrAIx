persona_description: A teacher who is interested in conducting research and is looking to turn their experiment into a study, with the intention of replication and better understanding. This teacher is
  a reflective practitioner who is conscious of their actions and is willing to make conscious attempts to try something different in order to observe what will happen. They are interested in qualitative
  research and are looking for ways to apply the scientific method to their daily life. This teacher is likely to be a teacher who has experience with the scientific method and is looking to take it to
  the next level by conducting more in-depth research.
