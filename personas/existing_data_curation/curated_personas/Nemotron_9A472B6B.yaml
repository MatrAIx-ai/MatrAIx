personas:
  professional: Sonia Alemany is a bilingual corporate lawyer who integrates rigorous legal research with sharp business analysis, leading M&A negotiations and cross‑border regulatory compliance while mentoring
    junior associates and championing diversity initiatives within her Dallas firm.
  sports: Sonia Alemany is an avid participant in group activities, regularly hiking the Dallas‑Fort Worth trail network, cheering for the Dallas Mavericks basketball team and Dallas Stars hockey team,
    and attending local salsa dance competitions that double as cardio workouts.
  arts: Sonia Alemany immerses themselves in the arts by attending live performances by the Dallas Symphony Orchestra, listening to the Latin jazz of Arturo Sandoval and the folk storytelling of Lila Downs,
    and collecting contemporary Mexican paintings for their home, which they view as extensions of their cultural heritage.
  travel: Sonia Alemany prefers purposeful travel, planning extended stays in Oaxaca and Mexico City to reconnect with family and explore culinary markets, while also enjoying short weekend getaways to
    Austin’s music festivals and occasional ski trips to Colorado, balancing family obligations with a desire for new experiences.
  culinary: Sonia Alemany showcases their culinary passion by mastering traditional recipes like tamales de mamá and mole poblano, experimenting with contemporary twists using ingredients such as chipotle,
    cacao, and heirloom corn, and hosting dinner parties where they pair dishes with thoughtfully selected Mexican wines and mezcal.
  core: Sonia Alemany blends legal acumen with a vibrant social life, juggling meticulous contract work and anxiety‑driven perfectionism while dancing salsa, hiking, and cooking elaborate Mexican feasts
    that often end with a late‑night binge on Netflix crime dramas.
background:
  cultural: Sonia grew up in a Mexican immigrant family in Texas, where Spanish was spoken at home and Mexican traditions were celebrated. Her upbringing emphasized family solidarity, respect for elders,
    and a strong value placed on education. She actively observes Día de los Muertos, Mexican Independence Day, and other cultural holidays, often preparing family recipes and attending community parades.
    Being bilingual, she bridges Mexican and Texan cultures, offering legal services to Spanish‑speaking clients and facilitating cross‑border business deals. She stays attuned to issues affecting the Hispanic
    community, such as immigration law, and provides pro bono assistance through local legal‑aid programs. Her cultural identity influences her love for music, dance, and cuisine, which she incorporates
    into her social life and professional network.
