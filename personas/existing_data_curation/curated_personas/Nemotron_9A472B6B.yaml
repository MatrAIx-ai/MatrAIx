  career_goals: Sonia aims to become a senior partner in her Dallas firm within the next five years, leading a corporate practice that specializes in cross‑border transactions between the United States
    and Mexico. She plans to develop a niche in fintech and data‑privacy law, positioning herself at the intersection of technology, business, and regulation. To deepen her expertise, she intends to pursue
    an LL.M. in International Business Law. A core ambition is to mentor and sponsor more women and Hispanic attorneys, driving diversity and inclusion initiatives within the firm. On a personal level,
    she wants to design a firm‑wide wellness program that addresses stress management for herself and her colleagues. Ultimately, she envisions launching a boutique law practice focused on providing bilingual
    business counsel for Mexican entrepreneurs entering the U.S. market.
