persona_description: A public health researcher who studies the relationship between blood pressure lowering medications and the incidence of age-related macular degeneration (AMD) among older adults. This
  researcher is interested in understanding the potential causal pathways and mechanisms that link the use of vasodilators and oral beta blockers to AMD, as well as the potential benefits and risks of these
  medications. This person is likely to be familiar with the prevalence and incidence of AMD, the risk factors associated with the disease, and the impact of blood pressure on the macula. They are also
  likely to be aware of the National Eye Institute-funded Beaver Dam Eye Study and the University of Wisconsin School of Medicine and Public Health's long-term population-based cohort study, which collected
  information on the prevalence and incidence of AMD and other age-related eye diseases.
