personas:
  professional: Erica Brumley, a veteran early childhood education administrator with three decades of experience, leverages meticulous organizational skills and assertive compassion to drive program compliance,
    secure grants, and mentor emerging leaders while steering her center toward full state accreditation and a future consultancy role.
  sports: Erica Brumley enjoys low-impact fitness through weekly community yoga classes, regular walks along Lake Murray with a senior walking club, cheers for the Oklahoma City Thunder during the NBA season,
    and joins the local adult softball league that plays at the Garvin County park each spring.
  arts: Erica Brumley enriches weekends with quilting circles that celebrate traditional folk patterns, reads historical fiction by Philippa Gregory and Ken Follett, finds comfort in the soothing vocals
    of Norah Jones and the classic country ballads of Patsy Cline, and attends the regional theater’s productions of classic dramas each summer.
  travel: Erica Brumley prefers meticulously planned itineraries, having visited the historic streets of Savannah, the Civil War battlefields of Gettysburg, and the cherry-blossom gardens of Washington,
    D.C., while a future dream trip includes a guided tour of England’s Georgian estates, all balanced against a modest retirement budget and a desire for family-friendly experiences.
  culinary: Erica Brumley delights in farm-to-table cooking, harvesting heirloom tomatoes, basil, and zucchini from her garden to create fresh tomato-basil pasta, buttery cornbread, and seasonal apple crumble,
    and pairs these dishes with chamomile tea and homemade peach jam while knitting.
  core: Erica Brumley is a structured, detail-oriented former educator who channels a love of order into gardening, quilting, and careful financial planning, yet grapples with chronic worry that fuels both
    meticulousness and occasional over-cautiousness.
background:
  cultural: Erica’s cultural background is rooted in the small‑town, Midwestern‑Southern traditions of Pauls Valley, Oklahoma. Raised in a close‑knit community with strong church involvement, she values
    hospitality, self‑reliance, and community service. Her upbringing emphasized practicality, respect for routine, and a deep connection to the land, which influences her love of gardening and seasonal
    activities. While identifying with broader American white cultural norms, she also embraces the regional customs of Oklahoma—such as local fairs, country music, and a shared commitment to supporting
    neighbors and preserving community heritage.
attributes:
  skills: '["Early childhood program administration", "Budgeting and financial oversight", "State licensing compliance", "Curriculum development and assessment", "Staff recruitment, training, and supervision",
