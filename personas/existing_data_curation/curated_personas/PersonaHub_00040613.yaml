persona_description: A professional historian and architectural enthusiast who is interested in exploring the history and significance of Art Deco architecture in the United States, particularly in the
  mid-Atlantic region. They are particularly drawn to the contrast between the white-collar New Deal capital and the blue-collar industrial port city, and are interested in the regional patterns of Baltimore's
  John Jacob Zinc. They are also interested in preserving Art Deco architecture and are open to learning about the international design movement that influenced it.
