  career_goals: As she approaches retirement, Jennifer aims to leave a lasting legacy by establishing a sustainable arts‑integration program at her school, securing a grant to fund interdisciplinary projects,
    and mentoring a cohort of younger educators in innovative teaching methods. She hopes to transition into a part‑time consulting role, offering professional development workshops on creative curriculum
    design for district schools. Additionally, Jennifer plans to author a children’s picture book that celebrates local Wisconsin nature and to volunteer as a guest lecturer at the nearby community college,
    sharing her passion for the humanities with adult learners.
