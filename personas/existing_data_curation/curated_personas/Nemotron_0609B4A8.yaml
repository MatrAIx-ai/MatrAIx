personas:
  professional: Jennifer Oneill, a seasoned elementary and middle‑school educator in Wisconsin, blends her curiosity for art with a rigorous curriculum design, creating differentiated language‑arts units
    that pair classic novels with watercolor projects; they excel at mentoring new teachers, securing a $25,000 arts‑integration grant, and orchestrating school‑wide art festivals, all while balancing the
    competitive drive to out‑innovate peer districts with a skeptical eye toward admin promises.
  sports: Jennifer Oneill stays active through seasonal outdoor pursuits and local team loyalties, hiking the Kettle Moraine State Forest trails each fall, joining a senior walking club that meets at the
    Milwaukee Art Museum’s sculpture garden, and cheering the Milwaukee Brewers at home games while also holding a season ticket for the Chicago Bulls; they compete in Scrabble tournaments with the same
    competitive edge they bring to a weekend tennis match at the community recreation center.
  arts: Jennifer Oneill immerses herself in the visual and literary arts, spending weekends at the Milwaukee Museum of Art and the Art Institute of Chicago, painting Wisconsin lake scenes in the style of
    Monet and Ansel Adams, quoting Mary Oliver in her poetry, and quoting both contemporary fiction by Sally Rooney and classics like Austen in her book‑club discussions; they host quarterly gallery walks
    for students, collect limited‑edition prints from local ceramists, and occasionally indulge in late‑night sketching sessions that reveal a competitive streak to perfect every brushstroke.
  travel: Jennifer Oneill curates travel experiences that blend cultural immersion with garden‑inspired retreats, having explored the historic streets of Prague’s Old Town, toured the Monet‑filled gardens
    of Giverny, and visited the National Gallery of Canada in Ottawa, all while planning future trips to Tuscany’s Chianti region to study vineyard landscapes; they prefer meticulously planned itineraries
    but allow spontaneous detours for local art fairs, balancing a modest travel budget with occasional splurges funded by a travel rewards card.
  culinary: Jennifer Oneill delights in cooking with fresh garden harvests and regional Wisconsin flavors, whipping up beet and goat‑cheese salads, skillet‑fried cheese curds, and wild‑rice soup seasoned
    with sage and fresh thyme, while also experimenting with Mediterranean dishes like ratatouille and paella that feature heirloom tomatoes and saffron; they bake a weekly sourdough loaf using locally
    sourced grains and pair meals with craft microbrews from a Milwaukee brewery, though they sometimes over‑season out of nervous energy before guests arrive.
  core: Jennifer Oneill, a 62‑year‑old educator‑turned‑arts consultant, blends meticulous organization with a curious, competitive spirit, juggling garden‑to‑canvas projects, cautious finances, mild health
    anxieties, and a love for hiking, museum visits, and purposeful travel.
background:
  cultural: Jennifer is a white Midwestern American with Irish and German ancestry, raised in a small‑town community in Wisconsin that values public education, volunteerism, and connection to the natural
    landscape. Her upbringing included participation in county fairs, community theater, and church gatherings, fostering an early love for the arts and collective experiences. While grounded in Midwestern
    pragmatism, she maintains an enduring curiosity about broader artistic and intellectual ideas, which shapes both her personal interests and her professional dedication to enriching students’ cultural
    awareness.
