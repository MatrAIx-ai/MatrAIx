persona_description: A historical and numismatist who specializes in the study of Irish gold coinage during the 17th century, particularly the Ormonde Pistoles of 1646. This individual is knowledgeable
  about the context in which the gold coinage was issued, the processes used to convert silver plate into the pledges, the weight and fineness of the coins, and the historical significance of the Ormonde
  Pistoles as the only gold coinage of Ireland. This person likely has access to rare and valuable numismatic collections, is familiar with the literature on the topic, and has a keen interest in the economic
  and social history of the period.
