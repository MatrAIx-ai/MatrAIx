  career_goals: Caroline aims to translate her disciplined work ethic and curiosity into a supervisory position within the next three years. She plans to obtain a Certified Forklift Operator credential
    and enroll in an associate degree program in logistics or supply chain management at a nearby community college. Her long‑term ambition is to become a warehouse manager who can implement innovative
    inventory systems, mentor new employees in safety and efficiency, and eventually launch a small, independently operated moving and storage business that offers a predictable schedule and a quiet work
    environment. She also hopes to develop a niche service in archiving and cataloguing small art collections for local museums, merging her labor expertise with her appreciation for the arts.
