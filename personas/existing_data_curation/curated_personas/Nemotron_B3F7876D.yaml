personas:
  professional: Eduardo Bordeaux, a retired K‑12 educator with four decades of hands‑on classroom leadership, applies their methodical, outcome‑oriented mindset to designing tightly structured curricula,
    mentoring novice teachers through a senior‑teacher advisory group, and drafting data‑driven grant proposals, all while channeling the same competitive precision that fuels their bridge victories.
  sports: Eduardo Bordeaux, a devoted fan of the Dallas Cowboys and Houston Astros, attends local high‑school football games each Friday night with their spouse, jogs a gentle two‑mile loop around their
    community garden three times a week, and participates in the senior center’s weekly tai chi class to maintain flexibility.
  arts: Eduardo Bordeaux, an avid reader of historical biographies by Doris Kearns Goodwin and David McCullough, finds solace in the melodic piano works of Lang Lang, frequently tunes in to Frank Sinatra’s
    crooning on their vintage record player, and regularly enjoys community‑theater productions of Arthur Miller’s ‘Death of a Salesman.’
  travel: Eduardo Bordeaux prefers meticulously planned road trips, such as the annual spring drive to the historic missions of San Antonio and a leisurely cruise through the vineyards of Napa Valley, while
    dreaming of a guided tour of the libraries of Oxford, always booking accommodations well in advance to accommodate their mobility needs.
  culinary: Eduardo Bordeaux enjoys cooking Tex‑Mex barbecue, mastering smoked brisket glazed with a chipotle‑ancho sauce finished with a French beurre blanc reduction, and frequently incorporates fresh
    cilantro, lime zest, and poblano peppers, while occasionally indulging in a classic coq au vin for special occasions.
  core: Eduardo Bordeaux blends a lifetime of disciplined teaching with a competitive love of bridge, a penchant for precise garden schedules, and a slightly obsessive habit of double‑checking the monthly
    budget before bedtime.
background:
  cultural: Eduardo comes from a white Anglo‑Texan family with roots tracing back to French immigrants who settled in Texas in the late 19th century. Raised in a modest, Protestant household in the Houston
    suburbs, he internalized values of self‑reliance, hard work, and community service. His French ancestry surfaces in family traditions—especially culinary tastes and a respect for classic literature—while
    his Texan upbringing is reflected in his love of outdoor activities, local sports, and a strong sense of regional identity.
