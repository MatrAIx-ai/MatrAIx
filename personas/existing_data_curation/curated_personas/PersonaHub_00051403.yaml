persona_description: A scientist or environmental scientist who studies soil chemistry, specifically the use of foliar Ca/Sr discrimination and 87Sr/86Sr ratios to determine the sources of calcium to sugar
  maple foliage in a northern hardwood forest. This scientist is interested in the recycling of calcium between litter, organic soil horizons, and vegetation in northern hardwood ecosystems, and is looking
  for ways to improve the use of Ca/Sr and 87Sr/86Sr ratios to trace calcium sources to plants.
