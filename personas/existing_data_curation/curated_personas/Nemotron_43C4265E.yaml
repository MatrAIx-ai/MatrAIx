  career_goals: John aims to channel his steady demeanor and analytical curiosity into a leadership track within the customer experience field. Over the next two years, he plans to complete his bachelor’s
    degree in Business Administration, earn certifications in Customer Success Management and Data Analytics, and take on mentorship responsibilities to refine his coaching abilities. His short‑term goal
    is to become a Team Lead or Quality Assurance Analyst, where he can influence support processes and training programs. Long‑term, he envisions stepping into a Customer Experience Manager or Director
    role, driving data‑informed service strategies, or eventually launching his own consultancy that helps tech startups design resilient, customer‑centric support operations.
