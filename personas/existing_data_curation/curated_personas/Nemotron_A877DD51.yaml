personas:
  professional: Lydia Delacruz is a retired applied physicist who now channels their curiosity and sociable energy into designing community STEM‑arts workshops, using their Python and data‑visualization
    expertise and their flexible, sometimes disorganized planning style to bring together seniors and high‑school students in collaborative exhibitions that celebrate scientific concepts through paint and
    code.
  sports: Lydia Delacruz is a regular member of the Laredo Senior Walking Club and a casual fan of the Laredo Heat soccer team, often joining community dance nights that double as low‑impact cardio, while
    they occasionally dabble in beginner’s yoga at the local senior center during the spring.
  arts: Lydia Delacruz is a passionate painter whose canvases blend fractal patterns and planetary scenes inspired by Yayoi Kusama and the cosmic works of Carl Sagan, while they regularly attend performances
    by local folk groups, enjoy the music of Astor Piazzolla, and bring their theatrical flair to community theater productions that weave educational narratives.
  travel: Lydia Delacruz is an adventurous traveler who prefers flexible, low‑stress itineraries, having already explored the historic missions of San Antonio and the art districts of Santa Fe, and now
    they dream of a month‑long pilgrimage to central Mexico to visit Teotihuacan, Oaxaca’s pottery workshops, and the colonial charm of San Miguel de Allende, budgeting the trip through a dedicated travel
    savings envelope.
  culinary: Lydia Delacruz is an avid home cook who skillfully prepares tamales, pozole, and mole, layering flavors with roasted ancho chilies, fresh epazote, and toasted pumpkin seeds, while they experiment
    with herb‑infused oils and occasionally improvise with unfamiliar spices, though they sometimes forget to label leftovers in the fridge.
  core: Lydia Delacruz is a curious, sociable septuagenarian who fuses science and art in their community work, manages a relaxed yet slightly chaotic schedule, and delights in painting, cooking, and dancing
    while occasionally misplacing their glasses.
background:
  cultural: Lydia grew up in a bilingual household on the U.S.–Mexico border, absorbing both Mexican traditions and Texan influences. Her parents, originally from the state of Tamaulipas, instilled in her
    a deep respect for Mexican customs—celebrating Día de los Muertos, gathering for family meals featuring handmade tortillas, and participating in community festivals such as Charro Days. Fluent in Spanish
    and English, Lydia navigates both cultures effortlessly, often serving as a bridge between older Spanish‑speaking residents and newer English‑dominant community initiatives. The vibrant cross‑border
    environment of Laredo, with its murals, music, and commerce along the Rio Grande, shaped her appreciation for art, music, and the fluid exchange of ideas. This bicultural perspective informs her values
    of community solidarity, lifelong learning, and the belief that scientific inquiry and artistic expression are complementary pathways to understanding the world.
attributes:
  skills: '[''Statistical analysis'', ''Data visualization'', ''Python programming'', ''R programming'', ''Experimental design'', ''Technical writing'', ''Public speaking'', ''Mentoring and tutoring'',
