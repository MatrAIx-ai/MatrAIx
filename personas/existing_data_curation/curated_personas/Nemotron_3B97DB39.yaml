  hobbies: '[''Reading non-fiction and detective novels'', ''Strategy video games (e.g., Civilization)'', ''Solo runs along the Chain of Lakes'', ''Nature photography'', ''Home coffee brewing'', ''Woodworking
    projects'', ''Listening to data analytics podcasts'', ''Quiet visits to art museums'']'
  career_goals: Joseph aims to advance to a senior management analyst role within the next two years, taking on larger cross-functional projects that blend data-driven insight with strategic planning. He
    intends to pursue an MBA or a professional certification in analytics to deepen his quantitative toolkit and broaden his leadership credentials. In the medium term, he envisions moving into management
    consulting, where his competitive edge and skepticism can be leveraged to diagnose complex business problems. Ultimately, Joseph aspires to launch a boutique consultancy focused on operational efficiency
    for midsize Midwest firms, allowing him to maintain a degree of autonomy, work primarily in quiet, analytical settings, and shape business outcomes on his own terms.
