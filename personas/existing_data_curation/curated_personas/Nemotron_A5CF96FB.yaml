  career_goals: Salvador aims to advance within the United States Postal Service by obtaining a shift supervisor certification and eventually moving into an operations manager role. He plans to complete
    his associate degree in logistics or business administration to strengthen his qualifications for supervisory positions. His ambition includes spearheading efficiency‑improvement projects that integrate
    newer sorting technologies, while also advocating for employee wellness programs to address workplace stress. Ultimately, he seeks a stable, higher‑responsibility role that provides financial security
    for his family and allows him to balance his professional responsibilities with his personal well‑being.
