  career_goals: Marilin aims to lead an independent research group that pioneers novel materials for sustainable energy, integrating artistic visualization to enhance public outreach and interdisciplinary
    dialogue. She seeks tenure‑track or senior research positions at a research university or national lab where she can secure competitive grants, publish in high‑impact journals, and build cross‑disciplinary
    partnerships with the local arts community in Austin. A personal ambition is to develop a program that supports mental‑health resilience among scientists, drawing on her own experiences with anxiety
    and emotional reactivity. Ultimately, she wishes to leave a legacy of scientific innovation that is both technically rigorous and culturally resonant.
