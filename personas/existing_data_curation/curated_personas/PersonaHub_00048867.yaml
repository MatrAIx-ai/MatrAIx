persona_description: A neuroscientist who studies the mechanisms of neurotransmitter interactions in the brain, particularly the connections between the hippocampus and prefrontal cortex. They are interested
  in the disruption of communication between these regions and the potential implications for mental illnesses such as schizophrenia. They have published research on the relationship between dopamine and
  NMDA receptors and how over-activation of D2-like dopamine receptors leads to a decrease in NMDA receptor function at the synaptic connection between these regions. They are likely to be interested in
  the latest findings in the field of neurobiology and the potential for new treatments for mental illnesses.
