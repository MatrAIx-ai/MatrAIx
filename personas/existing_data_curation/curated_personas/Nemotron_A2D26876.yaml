  hobbies: '[''Gardening'', ''Herb cultivation'', ''Historical fiction reading'', ''Local history research'', ''Genealogy'', ''Quilting'', ''Baking Southern desserts'', ''Birdwatching'', ''Church choir
    participation'', ''Volunteer community clean-up'', ''Nature trail walking'']'
  career_goals: Katelyn aspires to transform her extensive volunteer experience into a part-time professional role that leverages her organizational strengths and community ties. She plans to complete her
    associate degree, focusing on nonprofit management or community development, and is considering certification as a Professional Organizer or as a Community Health Worker. Her medium-term goal is to
    launch a home-based consulting service assisting seniors and local families with household organization, budgeting, and gardening projects. Long-term, she hopes to serve on the board of a local historic
    preservation society, mentor younger volunteers, and potentially lead a community garden initiative that combines her passion for horticulture, education, and sustainable living.
