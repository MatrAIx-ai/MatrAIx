  career_goals: Lawrence aspires to combine his passion for art and technology by pursuing a degree in architecture, industrial design, or user‑experience design. He aims to earn a scholarship to a top
    university, build a strong portfolio of design and engineering projects, and eventually work as a design engineer or UX designer creating functional yet aesthetically compelling spaces and products.
    Influenced by the nearby Air Force base, he also entertains the possibility of studying aerospace engineering. He is focused on maintaining high academic standards, expanding his technical skill set,
    and securing internships that meld creativity with engineering.
