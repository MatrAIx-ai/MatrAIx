  career_goals: He hopes to turn his love of art and technology into a future career as a game designer or visual artist, where he can create interactive stories that convey emotion. He is also fascinated
    by how cities function and dreams of studying urban planning or environmental science to improve neighborhoods like his own Brooklyn community. Over time, he wants to develop skills that enable him
    to help peers manage stress, perhaps through art therapy or mentorship.
