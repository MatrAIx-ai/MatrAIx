  career_goals: In the coming years Philip plans to transition from full‑time contracting to a part‑time role as the lead craftsman of a small workshop he will establish on the outskirts of Dover Plains.
    There he intends to create art‑inspired wood pieces, document the process in a photo‑journal that blends carpentry with storytelling, and mentor a local apprentice interested in traditional woodworking.
    A personal milestone is completing the restoration of his grandparents' 19th‑century farmhouse, a project that will preserve family heritage and serve as a showcase of his craft. He also hopes to travel
    to a few renowned wood‑craft museums and regional art galleries across the United States, drawing new design ideas while maintaining a flexible schedule that honors his love of solitude and low‑stress
    living.
