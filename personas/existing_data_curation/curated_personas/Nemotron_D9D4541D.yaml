  career_goals: Marietta aims to pursue a bachelor’s degree in Visual Arts and Communication at a liberal‑arts university, with a focus on interdisciplinary media and cultural studies. She envisions a career
    that bridges creative design and community impact, aspiring to become a creative director for socially‑driven campaigns or a museum curator who highlights emerging artists. Long‑term, she hopes to launch
    her own studio that offers collaborative art workshops and visual storytelling services, leveraging her organizational strengths to manage projects and her artistic sensibility to produce compelling
    work. She also intends to study abroad in a culturally vibrant city to broaden her perspective and incorporate global design influences into her practice.
