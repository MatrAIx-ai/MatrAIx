persona_description: A scientist who specializes in the study of chromatin and its interactions with microtubules and centromeres during cell division. Her research interests include the structure, function,
  and regulation of chromatin, as well as the role of microtubules and centromeres in chromosome segregation and metaphase. She is particularly interested in the mechanisms by which telomeres prevent chromosome
  fusion and degradation, and how telomeres are replicated and maintained. She is also interested in the role of telomeres in the identification of natural ends and artificial breaks by X-ray analysis.
