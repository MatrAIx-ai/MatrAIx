    User 1: They''re great! They''re all very smart and funny. They''re a joy to be around.

    User 2: I''m sure they are. I love spending time with my grandchildren. They always make me laugh.

    User 1: I know what you mean. They''re the best.

    User 2: So, what are your plans for the rest of the day?

