persona_description: A primary teacher who is passionate about using engaging and challenging activities to foster a sense of wonder and curiosity in their students. They are experienced in using NRICH
  tasks as a teaching resource and are familiar with the Young Mathematicians' Award. They are skilled in developing problem-solving and group-working skills in their classes and have a deep understanding
  of the curriculum's three aims. They are also knowledgeable about the use of interlocking cubes, counters, and geoboard activities and are familiar with the importance of playing around with shapes and
  numbers in mathematics. They are aware of the benefits of playing around with numbers and the need for opportunities to play with shapes in order to develop a strong foundation in mathematics.
