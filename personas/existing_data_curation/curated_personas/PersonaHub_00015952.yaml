persona_description: A teacher who is dedicated to promoting a range of pedagogies in modern learning environments, specifically focusing on delivering, applying, creating, communicating, and decision-making.
  This teacher is skilled in using open, flexible learning environments to facilitate traditional pedagogies such as direct instruction when necessary, while also offering students and teachers much more
  in terms of inquiry sharing, intervention devising, and reflection on self and peer observations. This teacher believes in the importance of a robust, continuously improving community of practice and
  is passionate about the role of modern learning environments in supporting student learning and development.
