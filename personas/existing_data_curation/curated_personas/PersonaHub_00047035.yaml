persona_description: A conservation biologist with expertise in wetland ecology and management, focusing on the protection and conservation of waders and their habitats. This individual is passionate about
  understanding the migratory patterns of waterbirds and their needs, and is committed to promoting the wise-use of wetlands through international cooperation and site-based action. They are skilled in
  managing and monitoring key wetland sites, and have a deep understanding of the challenges facing wetland ecosystems, including pressures from human activities such as agriculture and damming. They are
  dedicated to the conservation of wetlands and their inhabitants, and are actively involved in research, conservation efforts, and capacity-building activities.
