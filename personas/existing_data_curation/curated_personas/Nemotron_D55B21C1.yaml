personas:
  professional: Anastasia Jones, an aspiring clinical mental‑health counselor, leverages their strong research and writing skills, empathy, and improvisational problem‑solving to create student‑focused
    mental‑health guides and YouTube videos, while navigating their own anxiety and a relaxed attitude toward strict deadlines.
  sports: Anastasia Jones enjoys weekend hikes along the Appalachian Trail, is a casual member of the local ultimate‑frisbee league, passionately follows the Ohio University Bobcats basketball team and
    the Cleveland Guardians, and they prefer low‑intensity outdoor activity over competitive sports, balancing a love for community and personal fitness.
  arts: Anastasia Jones writes acoustic folk songs for open‑mic nights at the local coffeehouse, draws inspiration from artists like Iron & Wine and Phoebe Bridgers, captures misty mountain landscapes and
    candid street moments with their DSLR, and they devour psychological thrillers such as Gone Girl and memoirs like Educated, weaving these influences into their creative expression.
  travel: Anastasia Jones prefers budget‑friendly road trips to nearby hikes in Shenandoah National Park and a solo weekend getaway to Asheville’s Blue Ridge Mountains, dreams of trekking the Tongariro
    Alpine Crossing in New Zealand, and relies on student discounts and flexible itineraries that let them balance adventure with academic commitments.
  culinary: Anastasia Jones, a moderately skilled cook, loves experimenting with plant‑based recipes like roasted cauliflower tacos, lentil shepherd’s pie, and avocado‑quinoa bowls, often incorporates fresh
    herbs from the community garden, and treats themselves to occasional fair‑ground deep‑fried treats like corn dogs when they need a comfort boost.
  core: Anastasia Jones is a creatively empathetic, anxiety‑prone 18‑year‑old who channels their love for folk music, hiking, and mental‑health advocacy into spontaneous yet purpose‑driven projects, and
    they juggle a laid‑back approach to organization and finance.
background:
  cultural: Anastasia grew up in a middle‑class white family in the small‑town environment of Athens, Ohio, where the local culture blends Mid‑Midwestern sensibilities with Appalachian roots. The community
    places a strong emphasis on close‑knit relationships, local festivals, and support for the university town’s artistic scene. Her family values education and self‑reliance, and she was raised with an
    appreciation for seasonal outdoors activities like hiking and gardening. Although she identifies with broader American culture, she feels a particular connection to the regional emphasis on community
    solidarity, storytelling, and a pragmatic, down‑to‑earth outlook.
attributes:
  skills: '[''academic research'', ''academic writing'', ''empathetic listening'', ''peer counseling'', ''digital media creation'', ''Google Workspace'', ''Canva'', ''basic video editing'', ''improvisational
    problem solving'']'
  hobbies: '[''journaling'', ''creative writing'', ''acoustic guitar'', ''songwriting'', ''hiking'', ''bird‑watching'', ''photography'', ''volunteering at community garden'', ''volunteering at campus counseling
    center'', ''reading contemporary fiction'', ''plant‑based cooking'']'
  career_goals: Anastasia aims to complete a bachelor's degree in psychology and pursue a master's in clinical mental‑health counseling. She hopes to become a licensed therapist who can work with young
    adults dealing with anxiety and depression, while also maintaining a freelance side‑business creating mental‑health content for platforms such as YouTube and Instagram. In the longer term, she envisions
    opening a small community counseling practice in Athens, offering both in‑person and virtual services, and perhaps authoring a memoir about coping with emotional distress.
