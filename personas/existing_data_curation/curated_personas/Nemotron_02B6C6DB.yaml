  career_goals: Kenneth aims to become the school's STEM curriculum coordinator, developing a district‑wide robotics and coding program that balances structured learning with student‑driven projects. He
    wants to mentor new teachers, lead professional‑development workshops on technology integration, and expand after‑school science clubs to serve underrepresented students in the community. Long‑term,
    he envisions moving into an assistant principal role where he can influence school policy to promote equity, collaborative learning, and a supportive environment for both staff and families.
