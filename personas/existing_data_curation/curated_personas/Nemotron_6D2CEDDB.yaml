  hobbies: '[''Gardening'', ''Yoga'', ''Hiking'', ''Reading historical non-fiction'', ''Puzzle solving'', ''Cooking and meal planning'', ''Visiting museums'', ''Wine tasting with friends'', ''Volunteer
