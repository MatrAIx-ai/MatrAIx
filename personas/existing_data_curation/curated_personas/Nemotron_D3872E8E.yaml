  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Cooking'', ''Evening walks'', ''Knitting'', ''Crocheting'', ''Jigsaw puzzles'', ''Library book clubs'', ''Neighborhood potluck dinners'']'
  career_goals: Pamela aims to complete her associate degree in business administration and earn a Certified Administrative Professional (CAP) credential within the next two years. She aspires to transition
    from a general office clerk to an office manager or senior administrative coordinator, where she can apply her strengths in organizing systems, coaching team members, and improving efficiency while
    maintaining a steady work‑life balance. She also hopes to mentor newer employees and contribute to a positive, collaborative workplace culture.
