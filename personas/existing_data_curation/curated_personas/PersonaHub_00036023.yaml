persona_description: A microbiologist who studies the composition and dynamics of the gut microbiota in the context of the pathogenesis of Clostridioides difficile infection (CDI). The individual is interested
  in the mechanisms of colonization and the role of the microbiota in the pathogenic process. They are knowledgeable about the role of the commensal microbiota in the barrier effect against colonization
  and the importance of targeted strategies for microbiota modulation. The persona is likely to be interested in the use of bacteriotherapy and the potential benefits of restoring the microbiota composition
  in the treatment of CDI.
