  career_goals: Zachary aspires to pursue a career in engineering, ideally focusing on robotics or mechanical design, where he can merge his curiosity about how things work with a practical drive to create
    functional solutions. He plans to study engineering at a university such as the University of Oklahoma, seeking internships and STEM summer programs to gain hands‑on experience. He hopes to earn certifications
    in CAD software (e.g., Autodesk Fusion 360) and deepen his programming skills, ultimately aiming to design automated systems that improve everyday life, possibly in fields relevant to Oklahoma such
    as precision agriculture or energy technology.
