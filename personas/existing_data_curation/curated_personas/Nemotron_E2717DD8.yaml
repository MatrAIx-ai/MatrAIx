personas:
  professional: Anton Estes, an aspiring robotics engineer, they channel their love for routine and precision into building functional model airplanes and competition‑ready robots for the middle school
    robotics club, where their systematic problem‑solving and attention to detail consistently earn top placement at regional challenges.
  sports: Anton Estes plays midfield for the Poway United Youth Soccer Club, they follow the San Diego Padres baseball season religiously and watch San Diego State Aztecs men’s soccer games for inspiration,
    and they train twice a week on the neighborhood field, balancing structured practice drills with spontaneous pickup games that keep their fitness routine both disciplined and adaptable.
  arts: Anton Estes balances scientific precision with creative expression by practicing piano daily—mastering pieces such as Beethoven’s Moonlight Sonata and Yiruma’s River Flows in You—while also immersing
    themselves in video‑game soundtracks composed by Nobuo Uematsu and watching animated films from Studio Ghibli, especially Spirited Away, which fuels their imagination.
  travel: Anton Estes prefers well‑planned weekend getaways that blend adventure with familiarity, such as annual family hikes in Torrey Pines State Natural Reserve and spring trips to Yosemite’s waterfall
    trails, while dreaming of a future visit to Japan’s Osaka Expo to explore cutting‑edge robotics and savor authentic sushi rolls.
  culinary: Anton Estes enjoys straightforward, flavor‑rich meals—favoring chicken quesadillas with melted cheddar, homemade spaghetti carbonara using pancetta, and occasional sushi rolls with avocado and
    soy sauce—though they are more adept at assembling a perfect pizza topping arrangement than mastering complex baking techniques, often relying on family recipes for guidance.
  core: Anton Estes is a methodical 13‑year‑old whose love for structured hobbies, punctual routines, and a hint of video‑game‑driven ambition makes them the go‑to problem solver in school projects, even
    if they occasionally forget to take out the trash on time.
background:
  cultural: Anton grew up in Poway, a suburban community in San Diego County known for its family-oriented neighborhoods, good schools, and proximity to both coastal and mountain recreation. His family's
    cultural background is rooted in traditional American middle-class values, emphasizing punctuality, self-reliance, and community service. He participates in local scouting programs and attends a public
    middle school where multicultural events are common, giving him exposure to a blend of Californian openness and his own family's emphasis on practicality and routine.
