persona_description: A scientist and researcher who specializes in climate change and its impacts on agriculture, particularly in the U.S. Midwest. The scientist has conducted extensive research on the
  effects of excessive rainfall on crop yields, including the physical damage to crops, delay in planting and harvesting, restriction of root growth, and oxygen deficiency and nutrient loss. The scientist
  is also aware of the potential for the region to experience more frequent and intense precipitation events in the coming decade due to climate change models. The scientist has found that excessive rainfall
  is the major cause of crop damage currently in the U.S. for corn, and also has broad impacts for other staple crops such as soybeans and wheat. The scientist suggests that as rainfall becomes more extreme,
  reforms will be needed in the U.S. crop insurance industry in order to better meet planting challenges faced by farmers.
