personas:
  professional: Monica Shiloh is a practical, detail‑oriented electrician who leverages their routine‑driven mindset and sociable flair to explain complex wiring systems to clients while leading safety
    briefings and mentoring apprentices, all while aiming for a journeyman license and a future Master Electrician business that champions women and minorities in the trades.
  sports: Monica Shiloh dominates weekly pickup basketball games at Sunrise Park, proudly dons a Florida Rockets cap while cheering for the team, and regularly attends Miami Heat matches whenever their
    schedule permits, balancing their love for fast‑paced court action with occasional participation in a community run‑club during cooler evenings.
  arts: Monica Shiloh fuels their vibrant social life with nightly hip‑hop and Afro‑beat dance sessions to the beats of Burnaboy and Kendrick Lamar, dominates karaoke nights belting out Beyoncé and John Legend,
    and unwinds listening to gospel powerhouses Tasha Cobbs and Marvin Sapp, all of which shape their confident, expressive identity.
  travel: Monica Shiloh favors spontaneous weekend road trips along Florida’s coast, having already explored the Keys, Tampa, and a quick getaway to Savannah, Georgia, while they day‑dream about a future
    escape to Jamaica’s beaches or the vibrant streets of New Orleans, always juggling their love for adventure with a tight travel budget and the need to leave time for community volunteering.
  culinary: Monica Shiloh is an intermediate home chef who masterfully blends classic soul‑food staples like mac and cheese and collard greens with Caribbean twists such as jerk‑spiced chicken, coconut
    rice, and fried plantains, frequently seasoning with scotch bonnet peppers and fresh herbs, and loves hosting weekly cook‑outs where friends gather around a smoky grill and a simmering pot of callaloo.
  core: Monica Shiloh, a 22‑year‑old electrician, blends meticulous routine with a magnetic love for performance, often juggling late‑night karaoke mic rentals and an almost compulsive need to keep every
    tool labeled, while dreaming that they will launch a women‑focused contracting firm.
background:
  cultural: Monica is an African‑American woman raised in Orlando’s diverse Orange County. Her family’s Southern roots bring traditions of gospel music, church fellowship, and strong community bonds, while
    the multicultural fabric of the city exposes her to Caribbean and Latino cultural celebrations. She actively participates in local Juneteenth events, Black History Month activities, and church service
    projects, blending these influences with her own modern, sociable outlook. This blend of heritage and community engagement shapes her identity and informs both her professional ethos and personal interests.
attributes:
  skills: '[''Residential wiring'', ''Commercial lighting installation'', ''Conduit bending'', ''Electrical troubleshooting'', ''Blueprint reading'', ''National Electrical Code compliance'', ''Safety inspections'',
    ''Low‑voltage communication wiring'', ''Solar panel installation basics'', ''Team coordination'', ''Apprentice mentorship'', ''Client communication'']'
  hobbies: '[''Hip‑hop dancing'', ''Afro‑beat dancing'', ''Karaoke'', ''Soul‑food cooking'', ''Caribbean cuisine experimentation'', ''Community center mentorship'', ''Pickup basketball'', ''Listening to
    gospel and R&B music'', ''Following Florida Rockets basketball'']'
  career_goals: Monica aims to earn her journeyman license within the next year and become a Master Electrician in the next three years, focusing on solar PV and energy‑efficiency projects that are growing
    in Florida. She plans to leverage her leadership and communication skills to move into a supervisory role, eventually opening her own contracting business that prioritizes hiring and mentoring women
    and minorities in the trades. Additionally, she hopes to serve as a union representative to advocate for worker safety and fair wages while continuing community outreach.
