  hobbies: '["Reading historical fiction and nonfiction", "Journaling", "Crossword and Sudoku puzzles", "Crocheting and knitting", "Baking", "Nature walks", "Podcast listening", "Volunteering at animal
    shelter"]'
  career_goals: Minna aims to obtain her GED within the next year and enroll in an associate degree program in Business Administration or Human Services at a local community college. She aspires to secure
    an entry‑level administrative role at a non‑profit organization where she can support community programs and apply her organizational strengths. In the longer term, she hopes to become a program coordinator
    or project manager for youth outreach or social services, and she is interested in pursuing a bachelor's degree in Social Work or Public Administration to deepen her impact.
