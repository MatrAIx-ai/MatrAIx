personas:
  professional: Minna Olsen is a meticulous aspiring administrative assistant who leverages her strong organization, Microsoft Office and Google Workspace expertise, and knack for coordinating small events
    to support non‑profit programs while quietly excelling in behind‑the‑scenes planning.
  sports: Minna Olsen enjoys low‑key fitness routines such as brisk nature walks with the local park’s walking club, follows the city’s minor league baseball team the River Runners, and participates in
    a seasonal community volleyball league during summer evenings.
  arts: Minna Olsen cultivates creative expression through crocheting cozy scarves, binge‑reading Hilary Mantel’s historical novels, listening to Sufjan Stevens’ indie‑folk albums, and attending the downtown
    community theater’s productions of classic Shakespeare with an appreciative eye for storytelling.
  travel: Minna Olsen favors modest, itinerary‑heavy weekend trips to nearby historic towns like Salem and forested retreats in the Catskills, while dreaming of a future solo backpacking adventure through
    the historic sites of Edinburgh and Dublin once finances allow.
  culinary: Minna Olsen, a budding home baker, delights in mastering simple sourdough bread, flaky cinnamon rolls, and buttery scones, often using whole‑wheat flour and a dash of cinnamon, while also experimenting
    with crocheted pastry‑shaped ornaments for festive gatherings.
  core: Minna Olsen blends quiet curiosity with methodical reliability, turning solitary hobbies into purposeful daily rituals while quietly battling occasional procrastination and a sweet tooth.
background:
  cultural: Minna comes from a Midwestern white‑American background, with family roots tracing back to Norwegian immigrants, reflected in her last name Olsen. She was raised in Columbus, Ohio, where she
    absorbed the practical, community‑oriented values of the Midwest—emphasis on reliability, modesty, and helping neighbors. Her upbringing included participation in local Lutheran church gatherings and
    annual family traditions such as the Ohio State Fair and holiday celebrations that blend Scandinavian customs with typical American holidays. These cultural influences shape her reserved yet cooperative
    demeanor and her desire to contribute positively to her community.
attributes:
  skills: '["Organizational planning", "Microsoft Office Suite proficiency", "Google Workspace proficiency", "Basic bookkeeping and budgeting", "Data entry", "Written communication", "Simple graphic design
