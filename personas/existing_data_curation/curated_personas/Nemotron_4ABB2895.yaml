  career_goals: Robert's primary career goal is to maintain steady, part‑time employment that provides financial stability while allowing him flexibility to pursue his personal interests. He hopes to transition
    into a mentorship role, guiding younger colleagues with his practical knowledge of efficient stock handling. Additionally, he aspires to launch a modest side venture refurbishing vintage furniture,
    merging his curiosity about restoration techniques with his hands‑on skills. Over the next few years, he plans to gradually reduce his work hours, aiming for retirement that includes volunteer work
    at the local community center where he can organize low‑stress, competitive games for seniors. His competitive nature drives him to seek measurable improvements in his work processes, yet his skeptical
    outlook makes him evaluate new opportunities carefully before committing.
