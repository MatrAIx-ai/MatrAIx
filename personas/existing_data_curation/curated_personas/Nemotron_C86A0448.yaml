personas:
  professional: Antara Solis, an 82‑year‑old volunteer coordinator, blends meticulous event planning with a warm, sociable spirit to orchestrate senior‑center workshops, intergenerational storytelling sessions,
    and community festivals while managing tight budgets and volunteer schedules with practiced precision.
  sports: Antara Solis walks the nearby bayou trails three times a week, participates in a senior yoga group, and cheers passionately for the New Orleans Saints and the local high‑school basketball team,
    while also joining weekly bridge tournaments that keep her mind sharp and socially engaged.
  arts: Antara Solis sings in her church choir, finds inspiration in the melodies of Louis Armstrong and contemporary jazz vocalist Gregory Porter, reads historical fiction by authors like Colson Whitehead,
    and translates that love for narrative into intricate quilts that honor family stories and local heritage.
  travel: Antara Solis travels by car to visit her grandchildren in Baton Rouge and great‑grandchildren in Lafayette, enjoys annual trips to New Orleans for Mardi Gras where she indulges in music and street
    food, and dreams of a relaxed river cruise along the Mississippi to explore neighboring river towns.
  culinary: Antara Solis excels at Creole cooking, regularly preparing gumbo with okra, filé powder, and andouille sausage, jambalaya with smoked chicken and shrimp, and her signature praline‑topped sweet
    potato pie, while also teaching younger families to balance these rich flavors with fresh garden herbs like thyme and bay leaf.
  core: Antara Solis is a methodical, community‑focused elder who balances a love of gardening, quilting, and Creole cuisine with an energetic commitment to volunteerism, all while navigating the quirks
    of senior life with humor and a penchant for occasional bingo streaks.
background:
  cultural: Antara was raised in the heart of St. Charles Parish, where the African‑American community intertwines with the Creole and Cajun heritage of South Louisiana. Her upbringing was shaped by gospel
    music, church fellowship, and the vibrant culinary traditions of gumbo, jambalaya, and étouffée. Family gatherings featuring storytelling, music, and shared meals reinforced a strong sense of communal
    responsibility and cultural pride. Growing up during the civil‑rights era, she values resilience and activism, while maintaining the warmth and hospitality characteristic of Southern Black culture.
    These influences continue to inform her daily life, from the foods she cooks and the songs she sings to the stories she preserves for future generations.
