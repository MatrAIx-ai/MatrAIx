  hobbies: '[''Gardening'', ''Creole Cooking'', ''Quilting'', ''Church Choir Singing'', ''Local Festivals'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Bayou Walking'', ''Bridge'', ''Bingo'']'
  career_goals: Even at 82, Antara aims to remain a vibrant pillar of her community. She plans to expand her role as a volunteer coordinator at the local senior center, develop an intergenerational storytelling
    workshop to preserve local African‑American histories, and continue her culinary classes for younger families. She also hopes to complete a senior-friendly digital certification to help other elders
    navigate online platforms, maintain her health through regular walking and yoga, and travel to visit her grandchildren and great‑grandchildren across Louisiana.
