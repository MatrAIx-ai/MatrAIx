personas:
  professional: Alexander Torres is an aspiring digital illustrator who spends afternoons turning fantasy sketches into vibrant tablet paintings, blending bold blocky characters with motifs reminiscent
    of family gatherings, and they approach every art project with the same organized flexibility prized by their schoolwork.
  sports: Alexander Torres plays forward on the school’s soccer team affiliated with the local Hoosier Youth Soccer Club, cheers for the Indianapolis Colts during football season, and whenever the Indiana
    Pacers have a home game they gather with friends to watch while staying active by sprinting drills after practice.
  arts: Alexander Torres devotes spare time to sketching characters inspired by graphic novels like Amulet and Bone, admires the street art of Banksy, enjoys the music of Lin‑Manuel Miranda and the orchestral
    scores of Studio Ghibli, and regularly attends performances at the Indianapolis Museum of Art where they soak up inspiration for their drama club productions.
  travel: Alexander Torres loves weekend road trips to nearby Chicago to explore the Art Institute, dreams of visiting Mexico City’s historic markets to taste authentic tacos al pastor, and prefers well‑planned
    family vacations with itineraries that balance museum visits, outdoor hikes, and plenty of time for spontaneous Minecraft building challenges.
  culinary: Alexander Torres enjoys helping their family prepare homemade enchiladas and guacamole during Sunday gatherings, experiments with adding spices like cumin and cilantro to classic mac and cheese,
    and often practices digital cooking tutorials to perfect a sushi roll for a school fundraiser.
  core: Alexander Torres is a curious, energetic middle‑schooler whose imagination fuels endless sketches and video‑game worlds, yet their habit of staying up late worrying about schoolwork and money occasionally
    leaves them exhausted.
background:
  cultural: Alexander comes from a mixed‑heritage family in Indianapolis, where his paternal lineage is of European descent and his maternal side has Hispanic roots, which is reflected in his surname Torres.
    Growing up in the Midwest, he has been immersed in typical American community values—friendliness, modesty, and a strong emphasis on school and extracurricular involvement—while also celebrating Hispanic
    traditions like weekend family gatherings with Spanish-language meals and music. The city's vibrant arts scene, including the Indianapolis Museum of Art and the annual Latino Heritage Festival, has
    nurtured his curiosity for diverse artistic expressions, giving him a blended cultural perspective that informs both his creative work and his social outlook.
