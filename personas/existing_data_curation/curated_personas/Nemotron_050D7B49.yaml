  career_goals: Alexander dreams of turning his love for art and technology into a career that lets him create immersive visual experiences. He hopes to attend a specialized high school for the arts, later
    major in both fine arts and computer science, and eventually work as a multimedia artist or creative technologist for a video‑game studio or interactive museum. He also envisions establishing a community
    youth arts program in Indianapolis, giving other kids a space to explore creativity. While his ambitious plans sometimes feel overwhelming, he is motivated to develop the resilience and skills needed
    to achieve them.
