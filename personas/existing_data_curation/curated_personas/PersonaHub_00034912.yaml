persona_description: A conservation biologist who specializes in the study of the Chatham Island petrel, a species that has undergone a severe decline over the last century. She has been involved in intensive
  searches for the species and has led efforts to protect its breeding areas and monitor its activities. She has also worked on developing methods for captive rearing of the species. She is passionate about
  conservation and has established a trust to provide legal status to the conservation work focussed on this species.
