personas:
  professional: Edward Mayhue, a 79-year-old senior-center coordinator and seasoned community volunteer, leverages his decades of woodworking, home-repair, and organic gardening expertise with a compassionate,
    organized yet adaptable style to lead intergenerational programs and mentor younger volunteers.
  sports: Edward Mayhue, an early-morning angler on Lake Dardanelle and a devoted fan of the Arkansas Razorbacks football team, stays active by walking with the Lonoke Senior Walkers group, tending his
    garden, and helping neighbors with barn repairs, balancing low-impact exercise with occasional hand-intensive woodworking projects.
  arts: Edward Mayhue, a harmonica enthusiast who regularly performs at church gatherings, finds inspiration in classic films like "Casablanca" and "The African Queen," and channels his love for Southern
    storytelling through quilting with the Lonoke Heritage Guild while devouring historical novels by William Faulkner and Eudora Welty.
  travel: Edward Mayhue, a careful planner who prefers leisurely road trips, spends his vacations traveling to visit his grandchildren in Missouri and Tennessee twice a year, enjoys weekend getaways to
    historic Hot Springs, Arkansas, and the riverfront city of Memphis, while dreaming of a future pilgrimage to Savannah, Georgia.
  culinary: Edward Mayhue, an avid home gardener, cooks garden-fresh ratatouille and grilled lake trout seasoned with lemon and dill, complements his meals with classic Southern sides like cornbread, collard
    greens, and peach cobbler, and enjoys experimenting with rose-petal jam he harvests from his own rose garden.
  core: Edward Mayhue, a 79-year-old community pillar, blends pragmatic hands-on expertise with boundless compassion, juggling early-morning fishing, harmonica jams, and senior-center leadership while occasionally
    misplacing his glasses and splurging on vintage musical instruments.
background:
  cultural: Edward was born and raised on a family farm near Lonoke, Arkansas, in a close‑knit white Southern community steeped in Baptist traditions. His upbringing emphasized hospitality, respect for
    the land, and a strong sense of duty to family and neighbors. He grew up attending church potlucks, county fairs, and community picnics, absorbing Southern folklore, country music, and home‑cooked cuisine.
    While he holds many conservative values rooted in his rural heritage, his lifelong curiosity has led him to embrace new ideas, especially in gardening, technology, and intergenerational collaboration.
    His identity is closely tied to the rhythms of the Arkansas countryside and the lasting bonds of his hometown.
