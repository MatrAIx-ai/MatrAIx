  career_goals: Even at 79, Edward remains focused on giving back and ensuring a stable future for his wife. He aims to continue leading the senior center’s weekly activities, expand intergenerational mentoring
    programs, and document the oral histories of longtime Lonoke residents for the county archive. He hopes to pass on his woodworking and gardening skills through workshops, and to travel to visit his
    grandchildren in neighboring states at least twice a year. Maintaining his health, staying active, and preserving the family’s financial security are also top priorities.
