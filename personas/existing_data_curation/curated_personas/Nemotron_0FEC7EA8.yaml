  career_goals: Lois aims to advance from her current usher and lobby attendant role to a supervisory position, such as Lobby Manager or Shift Lead, where she can shape staffing schedules and mentor new
    hires. She plans to enroll in a bachelor's program in Hospitality or Event Management to deepen her strategic understanding of large‑scale events. In the longer term, she envisions moving into event
    operations coordination for a regional conference center, leveraging her hands‑on experience to streamline guest flows and integrate digital ticketing solutions. Throughout her career progression, she
    seeks to champion workplace efficiency initiatives and foster a supportive team culture.
