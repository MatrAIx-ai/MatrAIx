persona_description: A historian or archaeologist who specializes in the study of pre-Columbian civilizations in the Mississippi Valley, particularly the Mississippian culture and its influence on the development
  of early American Indian societies. This individual is well-versed in the use of historical and archaeological methods to uncover and interpret the rich cultural heritage of the Mississippi Valley. They
  have a keen interest in the interactions between indigenous peoples and European explorers, particularly those who traded with the Indians and all settlers for their pelts, skins, hides, etc., and how
  this trade affected the development of the region. They have a deep understanding of the cultural and economic changes that occurred during this period, and are skilled at analyzing and interpreting the
  artifacts and evidence found in the archaeological sites of the Mississippi Valley.
