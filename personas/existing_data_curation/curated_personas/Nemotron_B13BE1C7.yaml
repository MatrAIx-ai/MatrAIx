  career_goals: Linda aims to leverage her analytical background to advance into retail management within the next three years, targeting a store manager position where she can apply data‑driven decision‑making
    to improve sales performance and employee development. She plans to supplement her experience with certifications in business analytics and supply‑chain management, positioning herself for a future
    role as a regional operations analyst or a technology‑focused sales specialist. Long‑term, she envisions opening a small boutique that blends curated tech‑friendly products with a community‑oriented
    shopping experience, where she can continue to blend her curiosity for new gadgets with practical business acumen.
