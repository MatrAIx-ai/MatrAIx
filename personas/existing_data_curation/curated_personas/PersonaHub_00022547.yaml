persona_description: A university professor who specializes in the translation and comparative study of English and Chinese, particularly focusing on the cohesive devices and strategies used in each language.
  They have experience in teaching students how to enhance their translations through the application of textual cohesion and are well-versed in the use of various cohesive devices such as reference, ellipsis,
  substitution, lexical cohesion, and conjunction. They have a strong interest in teaching students how to improve their translations and have a deep understanding of the importance of cohesive devices
  in text organization and meaning.
