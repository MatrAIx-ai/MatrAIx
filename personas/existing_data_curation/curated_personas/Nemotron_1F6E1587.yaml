  career_goals: Although retired, Jacob intends to channel his accumulated knowledge into mentoring emerging entrepreneurs, authoring a book that weaves together business strategy and creative thinking,
    and establishing a boutique consultancy focused on sustainable business models that partner with local arts organizations. He aspires to serve on the board of the Sharon Arts Council, develop a mentorship
    program for high‑school students, and continue his own learning in emerging technologies such as AI‑driven design.
