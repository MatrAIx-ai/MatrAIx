persona_description: A historian specializing in the study of economic and social changes in developed and less developed regions of the world. Her research interests include the economic incentives behind
  population growth, the role of women in traditional and modern cultures, and the impact of globalization on family structures. She is particularly interested in the experiences of women who have had to
  make difficult choices between careers and families, and the effects of economic incentives on birth rates and family size. She is also interested in the changing roles of men and women in traditionally
  male-dominated cultures and the impact of globalization on traditional gender roles.
