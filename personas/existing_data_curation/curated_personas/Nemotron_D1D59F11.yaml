  career_goals: Antonio aims to enroll in a community‑college program in Business Administration or Project Management while working part‑time to support his family. In the next few years he plans to obtain
    a project‑management certification and secure an entry‑level role with a local nonprofit focused on youth empowerment. Long‑term, he aspires to lead community‑development initiatives in Suffolk, eventually
    establishing his own nonprofit that provides mentorship, job‑training, and safe spaces for at‑risk youth. He also intends to incorporate mental‑health awareness into his programs and continue personal
    growth through counseling and resilience training.
