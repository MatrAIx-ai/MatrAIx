personas:
  professional: Minna Boyette, a budding junior illustrator and enthusiastic fundraiser who channels their curiosity, methodical planning, and love for community into creating vibrant artwork for school
    projects and coordinating neighborhood charity events.
  sports: Minna Boyette, a spirited member of the Saginaw United Youth Soccer Club who spends Saturdays dribbling on the field, cheers for the Detroit Lions on game nights, and dreams of catching a puck
    at a Detroit Red Wings game each winter while also enjoying weekend hikes in the nearby state parks.
  arts: Minna Boyette, an enthusiastic participant in the school art club who dives into the vivid worlds of J.K. Rowling and C.S. Lewis, emulates the bold colors of Mary Blair in their paintings, and regularly
    visits the Saginaw Art Museum for inspiration from local exhibitions.
  travel: Minna Boyette, a curious weekend explorer who has hiked the Sleeping Bear Dunes, picnicked on Mackinac Island, and dreams of a family trip to Disney World and the ancient ruins of Pompeii, always
    drafting colorful itineraries in a notebook.
  culinary: Minna Boyette, a budding kitchen helper who can whisk pancake batter, loves cheesy macaroni, proudly bakes holiday gingerbread cookies, and champions the family’s signature pierogi and apple
    pie at dinner time.
  core: Minna Boyette, an eight‑year‑old art‑obsessed, community‑driven whirlwind who balances LEGO skyscrapers with soccer kicks, penny‑saving precision, and a never‑ending curiosity for colorful new adventures.
background:
  cultural: Minna grows up in a typical Midwestern American household in Saginaw, Michigan. Her family celebrates holidays such as Thanksgiving and Christmas with community gatherings, enjoys local traditions
    like the Saginaw County Fair, and values friendliness, cooperation, and community involvement. The cultural environment encourages outdoor activities, school participation, and an appreciation for local
    arts. Her white ethnic background reflects the diverse European ancestry common in the region, including German, Irish, and Polish roots, which shape family recipes and occasional cultural celebrations.
