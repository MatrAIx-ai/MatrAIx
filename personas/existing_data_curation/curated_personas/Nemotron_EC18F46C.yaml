  career_goals: Even at two, Carmen imagines a future where she can paint bright pictures, dance to lively music, and tell stories to friends. She dreams of becoming an artist or dancer and also envisions
    helping others as a teacher or storyteller, reflecting her curiosity, love of art, and desire to share experiences with others.
