personas:
  professional: Carmen Godoy is a budding mini-architect who assembles wooden blocks into imaginative structures, showcasing a curious mind, a knack for organized yet flexible design, and a sociable, cooperative
    spirit that thrives in group play.
  sports: Carmen Godoy eagerly joins the Little Leapers toddler soccer club, idolizing the local minor‑league baseball team the Brooksville Bats, and enjoys impromptu dance breaks during play, balancing
    structured practice with free‑form movement.
  arts: Carmen Godoy delights in finger painting bright orange swirls and dancing to The Wiggles and Sesame Street, eagerly mimicking rhythms from playground drums, showcasing an early appreciation for
    unconventional artistic expression.
  travel: Carmen Godoy loves family road trips to the seaside boardwalk and weekend visits to Central Park’s playground, dreams of seeing the dinosaurs at the Natural History Museum, and prefers flexible
    itineraries that allow spontaneous sand‑castle building.
  culinary: Carmen Godoy favors creamy macaroni‑and‑cheese, soft avocado slices, and banana mashed with a splash of cinnamon, proudly using a tiny fork to self‑feed, yet often leaves a trail of food glittering
    the high chair, reflecting enthusiastic but messy culinary exploration.
  core: Carmen Godoy is a curious, sociable 2‑year‑old who blends organized block‑building with spontaneous art, thrives in group play, and sometimes indulges in impulsive candy cravings.
background:
  cultural: Carmen is raised in a bilingual Peruvian‑American household in Manassas, Virginia. Her family speaks both Spanish and English and celebrates Peruvian traditions such as Día de la Independencia
    with foods like arroz con pollo and kid‑friendly ceviche, while also sharing Andean music, cumbia, and folk songs. These customs blend with the multicultural environment of Prince William County, giving
    her a rich cultural tapestry that values family, community, and artistic expression.
