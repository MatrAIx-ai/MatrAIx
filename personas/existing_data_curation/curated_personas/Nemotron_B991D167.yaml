personas:
  professional: Aline Townsend is an aspiring illustration and graphic design student whose adeptness with sketching, watercolor, and digital tools like Procreate and Photoshop, combined with a meticulously
    organized yet flexible workflow and a natural tendency to mediate group dynamics, drives their vision of creating concept art for video games and eventually directing community‑focused creative studios.
  sports: Aline Townsend stays active by hiking the Lake Wylie trail system with the Lake Wylie Trail Club and training on the Tyrone High cross‑country team during fall, while cheering on the Carolina
    Panthers, Charlotte Hornets, and Charlotte FC, embodying a balanced mix of solo endurance pursuits and community‑rooted sports fandom.
  arts: Aline Townsend draws artistic fuel from attending the Art in the Park festival and exploring works by James Jean, Hayao Miyazaki, and Audrey Kawasaki, while immersing themselves in fantasy literature
    by J.R.R. Tolkien and composing poetry under the indie folk tunes of Phoebe Brides, weaving these influences into a distinctive mixed‑media style that defines their personal identity.
  travel: Aline Townsend plans trips with the same meticulous notebook system they use for sketches, favoring sunrise hikes in Asheville, weekend visits to Charleston’s historic art districts, and dreaming
    of a summer residency in Kyoto’s Ghibli Museum and a spring workshop in Barcelona’s street‑art scene, though family finances keep long‑haul travels limited to school breaks.
  culinary: Aline Townsend, an eager home cook, graces their kitchen with simple yet vivid dishes like avocado toast topped with radish and microgreens, creamy miso ramen garnished with chashu and soft‑boiled
    eggs, and seasonal strawberry‑topped lemon muffins, while savoring fresh herbs like basil and cilantro and treating dining out as a chance to study plating at local farm‑to‑table bistros.
  core: Aline Townsend, a 16‑year‑old sketch‑obsessed storyteller, balances a hyper‑organized notebook habit with spontaneous sunrise hikes, channels imagination into mixed‑media art and poetry, dreams
    of shaping video‑game worlds, all while occasionally procrastinating on schoolwork and hoarding limited‑edition sketch pens.
background:
  cultural: Aline was raised in Tyrone, GA, within a family that values Southern hospitality, a strong sense of community, and close ties to local traditions. Her upbringing includes regular participation
    in a Methodist church, where music and service projects are central, and family gatherings that celebrate holidays such as Thanksgiving and the Fourth of July with home‑cooked meals. While grounded
    in these Southern customs, Aline’s proximity to Atlanta exposes her to a broader cultural mosaic through school field trips, regional art events, and online communities, fostering an appreciation for
    diverse artistic styles and ideas beyond her immediate environment.
attributes:
  skills: '["sketching", "watercolor painting", "digital illustration (Procreate, Photoshop)", "creative writing (poetry, short stories)", "basic photography", "photo editing (Lightroom)", "time management",
