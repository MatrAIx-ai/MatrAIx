  hobbies: '["sketching", "watercolor painting", "visiting local galleries", "attending Art in the Park festival", "reading fantasy novels", "creative writing (poetry, short stories)", "nature photography",
    "hiking", "DIY crafting (journal making, jewelry)", "theater set and costume design"]'
  career_goals: Aline aspires to pursue a Bachelor of Fine Arts with a focus on illustration and graphic design at a college that offers strong studio programs. She dreams of working as a concept artist
    for video games or as an art director at a community‑focused creative studio where she can blend traditional media with digital techniques. Long‑term, she hopes to establish an after‑school art mentorship
    program in Tyrone to give younger students access to art supplies and instruction. She also aims to travel abroad for artist residencies, believing that new cultural experiences will deepen her artistic
    perspective.
