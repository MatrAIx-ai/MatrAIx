personas:
  professional: Joanne White is a hands‑on construction technician with a solid grasp of residential framing, concrete mixing, and blueprint reading, who leverages a curious yet practical mindset to champion
    eco‑friendly building methods while keeping small crews organized and safety‑first.
  sports: Joanne White is an avid hiker on the local Caro trail system, a seasonal fly‑fisher on nearby lakes, and a dedicated supporter of the Detroit Lions and Detroit Tigers, while also playing in a
    co‑ed softball league at the community park every summer.
  arts: Joanne White finds solace in folk and classic rock legends like Bob Dylan, Joni Mitchell, and The Rolling Stones, sketches sustainable home designs inspired by Frank Lloyd Wright, and enjoys board‑game
    nights featuring titles such as Catan and Ticket to Ride with a close‑knit circle of friends.
  travel: Joanne White prefers low‑key road trips that blend nature and architecture, having camped at Michigan’s Porcupine Mountains, explored the historic streets of Mackinac Island, and visited Chicago’s
    Architecture Biennial, while dreaming of a future sustainable‑building tour of Portland, Oregon, and a study trip to the Bauhaus sites in Dessau, Germany.
  culinary: Joanne White loves cooking garden‑fresh meals, often grilling trout with rosemary and thyme, whipping up a hearty quinoa and roasted root vegetable salad, and baking sourdough bread with locally
    milled flour, yet admits to over‑salting dishes when experimenting with new herb blends.
  core: Joanne White blends a pragmatic construction skillset with a green‑building curiosity, balances disciplined budgeting with occasional splurges, manages back aches through routine stretches, and
    finds calm in quiet hikes, folk music, and the occasional over‑salted dinner.
background:
  cultural: Joanne grew up in Caro, a small town in Michigan’s Thumb region, where Midwestern values of hard work, modesty, and community support are deeply ingrained. Her family has a mix of farming and
    trade roots, with generations working in agriculture and skilled trades, which fostered a practical, self‑reliant outlook. Local culture emphasizes seasonal outdoor activities, neighborly assistance,
    and a respectful, polite demeanor. While her upbringing includes traditional Christian community gatherings and family celebrations, the town’s close‑knit nature also encourages openness to new ideas,
    especially those that improve local livelihoods, such as sustainable building practices. This blend of tradition and pragmatic curiosity shapes Joanne’s personal and professional identity.
attributes:
  skills: '[''Residential framing'', ''Concrete mixing and pouring'', ''Drywall installation'', ''Power tool operation'', ''Blueprint reading'', ''OSHA safety compliance'', ''Material inventory management'',
