  hobbies: '[''DIY woodworking'', ''Garden tending'', ''Hiking local trails'', ''Fishing'', ''Reading about sustainable architecture'', ''Watching construction documentaries'', ''Community cleanup volunteering'',
    ''Small‑group board games'', ''Sketching building designs'', ''Jigsaw puzzles'', ''Listening to folk and classic rock music'']'
  career_goals: Joanne aims to solidify her foundation in construction by completing an associate’s degree in construction management and obtaining OSHA 30‑hour certification within the next two years.
    She plans to qualify for a foreman position by mastering additional trade skills such as electrical and HVAC basics, and to transition into a project coordinator role in a medium‑sized residential contractor.
    Long‑term, she envisions launching her own small‑scale construction firm focused on energy‑efficient homes for the Caro community, blending her practical expertise with her curiosity for sustainable
    building practices. Throughout her career, she seeks to mentor other workers, fostering a collaborative and safety‑focused work environment.
