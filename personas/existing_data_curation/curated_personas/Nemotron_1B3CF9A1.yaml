  career_goals: Elizabeth aims to advance to a senior maintenance supervisor role where she can mentor junior mechanics and shape maintenance strategy for a large manufacturing plant. She plans to earn
    certifications such as Certified Maintenance & Reliability Technician (CMRT) and an advanced welding certification, and to develop expertise in IoT‑enabled predictive maintenance systems. Long‑term,
    she envisions launching a boutique consulting firm that assists small industrial facilities with efficiency upgrades and safety programs, allowing her to blend her curiosity for new technologies with
    a more predictable schedule that reduces stress.
