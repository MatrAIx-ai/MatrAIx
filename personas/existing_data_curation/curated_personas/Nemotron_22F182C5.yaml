  career_goals: Catherine dreams of becoming someone who can blend art and discovery—perhaps an illustrator who brings stories to life, a wildlife artist who sketches animals, or a junior scientist who
    explores nature. She often talks about wanting to make her own picture books or discover new creatures, showing early ambition toward creative and exploratory careers.
