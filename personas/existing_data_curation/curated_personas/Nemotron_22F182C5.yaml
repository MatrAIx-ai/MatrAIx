personas:
  professional: Catherine Pierson, a 7‑year‑old budding visual storyteller, channels curiosity and love for fantasy into detailed animal drawings and LEGO creations, often juggling a disorganized workspace
    but thriving on the competitive thrill of winning school art contests, while they remain skeptical of adult critiques and occasionally worry about making mistakes.
  sports: Catherine Pierson, a 7‑year‑old member of the Greenfield Tigers youth soccer club who eagerly roots for the United States Women’s National Soccer Team during the World Cup, spends summer afternoons
    sprinting in backyard races, winter evenings in a community ice‑skating class, and they approach every game with a competitive edge that sometimes overshadows teamwork.
  arts: Catherine Pierson, a 7‑year‑old avid fan of Studio Ghibli’s 'My Neighbor Totoro,' the whimsical illustrations of Beatrix Potter, and the vibrant colors of Mary GrandPré’s Harry Potter books, spends
    weekends drawing fantastical creatures, singing along to 'Let It Go' from Frozen, and immerses themselves in animated movie soundtracks that fuel their boundless imagination.
  travel: Catherine Pierson, a 7‑year‑old explorer who delights in backyard treasure hunts, enjoys family trips to the nearby botanical garden and occasional visits to Yellowstone National Park, and dreams
    of seeing the Eiffel Tower in Paris, and they plan trips with spontaneous sketch‑map routes and often worry about missing familiar comforts.
  culinary: Catherine Pierson, a 7‑year‑old who loves the cheesy stretch of macaroni and cheese, the sweet combo of peanut butter and jelly, and the bright taste of strawberry‑banana smoothies, can assemble
    a basic fruit salad using apples, grapes, and bananas but often spills milk on the floor, and they eagerly request pizza topped with pepperoni and fresh basil for special occasions.
  core: Catherine Pierson, a curious and competitively spirited 7‑year‑old artist who balances imaginative play with occasional worries and a love for spontaneous backyard adventures, and they define their
    world with vivid drawings, LEGO builds, and a fearless yet slightly skeptical outlook.
background:
  cultural: Catherine comes from a white, middle‑class family in Belmont, North Carolina, a small town with strong Southern community ties. Her upbringing includes attending local community events, family
    visits to nearby parks and farms, and occasional church gatherings. The region’s emphasis on hospitality, respect for tradition, and appreciation for outdoor activities informs her love of nature and
    her relaxed, flexible approach to daily routines.
