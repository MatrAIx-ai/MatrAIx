personas:
  professional: A veteran educator and curriculum innovator, Carolyn Kozer leverages three decades of classroom experience to design interdisciplinary, technology‑rich units that blend science, literature,
    and local ecosystems, and they balance meticulous planning with the flexibility to adapt to each student’s needs.
  sports: An enthusiastic yoga practitioner and seasonal bird‑watching trekker, Carolyn Kozer joins a local senior fitness group at the community center, follows the Miami Heat and the Tampa Bay Rays, and
    they favor low‑impact cardio over heavy weight training.
  arts: A devoted patron of the regional art scene, Carolyn Kozer regularly visits galleries showcasing works by contemporary Florida artists, delights in live performances by jazz legends like Wynton Marsalis,
    and they collect vintage photography prints of Everglades landscapes.
  travel: A weekend road‑trip aficionado, Carolyn Kozer has explored historic St. Augustine, savored the seafood markets of Savannah, and dreams of a leisurely cruise to the Bahamas, always planning trips
    around family commitments and a modest travel budget.
  culinary: A skilled home cook with a Caribbean flair, Carolyn Kozer often prepares grilled snapper with mango‑coconut salsa, conch fritters, and key lime pie, and they relish sourcing fresh ingredients
    at local farmers’ markets while occasionally experimenting with spicy Scotch bonnet peppers.
  core: Carolyn Kozer blends scholarly rigor with a love for Florida’s wetlands, turning classroom lessons into living experiences while never missing a jazz set, and they balance curiosity with practical
    self‑care.
background:
  cultural: Carolyn is a white American who grew up in the Midwest before moving to West Palm Beach, Florida, in her thirties. Her upbringing emphasized hard work, self‑reliance, and community service,
    while her life in South Florida has immersed her in the region’s multicultural tapestry, including strong Latino and Caribbean influences. She blends these perspectives, valuing individual responsibility
    alongside collective well‑being, and incorporates inclusive, culturally responsive practices into her teaching.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Classroom Management'', ''Formative Assessment'', ''Project‑Based Learning'', ''Mentorship'',
    ''Community Engagement'', ''Educational Psychology'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Yoga'', ''Visiting Art Galleries'', ''Jazz Concerts'', ''Reading Historical Fiction'', ''Seafood Cooking'', ''Volunteer Tutoring'', ''Road Trips'', ''Photography'']'
  career_goals: As she approaches the next phase of her career, Carolyn aims to transition into a mentorship and advocacy role, developing a community‑based after‑school program that blends environmental
    education with the arts, authoring a practical guide on integrating technology in middle‑school classrooms, and serving on the local school district’s curriculum review board. She also hopes to continue
    her lifelong learning by studying gerontology and incorporating intergenerational learning projects, while remaining grounded in the practical needs of her students and school community.
