persona_description: A researcher interested in the study of national anthems, particularly those from English-speaking countries in West Africa. This person is likely to have a strong interest in linguistics,
  communication skills and literature. They would be interested in the themes and language used in the anthems, how they are projected linguistically and literarily, and how these themes relate to the colonial
  history, language and geographical location of the countries. They would also be interested in the figures of speech employed to convey the various themes.
