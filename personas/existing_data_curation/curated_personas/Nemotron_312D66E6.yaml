personas:
  professional: Dennis Spraggins, a budding junior architect of his own LEGO metropolis, channels his curiosity and spontaneous energy into designing towering block structures while often misplacing instruction
    manuals and racing his friends to see who can build the most imaginative city.
  sports: Dennis Spraggins zips around the neighborhood field dribbling a soccer ball for the Junior Rangers Soccer Club, idolizing FC Barcelona’s quick passing in his backyard games while also cheering
    for the Los Angeles Lakers during weekend TV marathons, and his boundless energy fuels daily kick‑about sessions throughout the fall and winter, turning fitness into a friendly competition.
  arts: Dennis Spraggins splashes neon crayon on his sketchbook to emulate Dr. Seuss’s whimsical lines, composes clunky riffs on his small keyboard reminiscent of the “Super Mario” theme, and binge‑watches
    the cartoon series “Adventure Time” featuring the voice of John DiMaggio, while his dinosaur figurines serve as muse for his impromptu stop‑motion videos.
  travel: Dennis Spraggins dreams of embarking on a jungle trek in Costa Rica after his family’s triumphant trip to Disney World in Orlando, eagerly maps out future expeditions to the Grand Canyon and a
    weekend camping adventure in the woods behind his house, preferring hands‑on exploration over organized tours, yet his travel plans often hinge on his parents’ schedule and budget.
  culinary: Dennis Spraggins insists on topping his homemade macaroni‑and‑cheese with crunchy breadcrumbs and extra cheddar, devours peanut butter and jelly sandwiches for lunch, and drinks strawberry‑flavored
    iced tea while often sneaking bite‑sized chocolate chips into his cereal, revealing a sweet tooth that rivals his love for LEGO.
  core: Dennis Spraggins is a wildly curious six‑year‑old whose boundless energy fuels spontaneous LEGO creations, competitive backyard soccer, a skeptical habit of double‑checking every dinosaur figurine’s
    authenticity, and an occasional bout of disorganization that leaves crayons and soccer socks scattered across his room.
background:
  cultural: Dennis was raised in Spring, Texas, in a suburban, middle‑class white family that values community gatherings, school events, and outdoor activities. His family’s traditions include celebrating
    holidays like Fourth of July with fireworks, attending a local Sunday school, and participating in neighborhood baseball games. He is exposed to a blend of Southern Texan hospitality and contemporary
    American pop culture, which nurtures his outgoing, competitive spirit.
