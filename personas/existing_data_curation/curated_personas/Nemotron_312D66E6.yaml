  hobbies: '[''drawing'', ''LEGO building'', ''soccer'', ''exploring outdoors'', ''space documentaries'', ''playing keyboard'', ''collecting dinosaur figurines'']'
  career_goals: Dennis dreams of exploring the world in big ways—he wants to become an astronaut who can see Earth from space, a video game designer who creates worlds for his friends to explore, and a
    superhero who helps others. He often talks about leading a team of explorers and winning competitions at school.
