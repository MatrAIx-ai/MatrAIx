  career_goals: At this stage, Mary aims to transition into a senior advisory role where she can influence complex claim strategies and policy improvements. She plans to obtain CPCU certification to deepen
    her technical expertise and to lead a specialized investigative team within her organization. Mentorship is a priority; she wants to develop formal training programs for newer adjusters, sharing her
    practical knowledge and people‑skills. Mary also seeks greater work‑life flexibility, exploring part‑time consulting projects that allow spontaneous travel and community involvement, while positioning
    herself as a trusted expert in high‑value loss investigations.
