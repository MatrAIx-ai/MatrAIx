  hobbies: '[''chess'', ''building Lego constructions'', ''coding simple games in Scratch'', ''reading mystery and adventure books'', ''drawing and digital illustration'', ''collecting and organizing stickers'']'
  career_goals: She envisions a future where she can combine her love of technology, logical challenges, and competitive spirit. Ramona aspires to become a software engineer or data analyst, aiming to develop
    educational games and data‑driven tools that reward skill and precision. She hopes to win a regional science fair, earn a STEM scholarship, and eventually lead a tech project team where structure and
    flexibility are both valued. Her long‑term ambition includes mentoring younger students in coding clubs, allowing her to channel her critical mindset into constructive guidance while managing her own
    stress about performance.
