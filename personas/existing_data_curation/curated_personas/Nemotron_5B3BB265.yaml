personas:
  professional: Ramona Rayo, an 11‑year‑old budding game developer, combines her love for strategy and detail by creating Scratch games that mimic chess puzzles, and she approaches each project with a competitive
    edge, constantly refining code until it meets her exacting standards despite occasional frustration when bugs appear.
  sports: Ramona Rayo swims at the local community‑center’s year‑round aquatic program, where the structured drills satisfy her need for order, and she cheers for the Chicago Cubs in baseball and the Chicago
    Bulls in basketball, while occasionally joining a weekend youth soccer league that emphasizes clear rules and teamwork.
  arts: Ramona Rayo expresses her creativity through digital illustration in Procreate, drawing inspiration from the meticulous line work of Hayao Miyazaki’s anime and the vivid colors of pop‑artist Takashi
    Murakami, while she enjoys listening to the melodic cello pieces of Yo‑Yo Ma and the chart‑topping pop of Billie Eilish for background music while she builds intricate Lego sculptures.
  travel: Ramona Rayo prefers meticulously planned day trips, having visited Washington D.C.’s National Museum of Natural History and Disneyland with a detailed itinerary, and she dreams of a future solo‑guided
    tour of Tokyo’s Akihabara district to explore tech shops, though she worries about navigating unfamiliar locales without a clear map.
  culinary: Ramona Rayo enjoys assembling homemade pizza with a precise arrangement of mozzarella, pepperoni, and fresh basil, feels confident following step‑by‑step recipes for chocolate chip cookies,
    but often skips breakfast in favor of a quick granola bar, and she delights in tasting sushi rolls that feature avocado and cucumber when dining out with her family.
  core: Ramona Rayo is an analytical 11‑year‑old who thrives on structure in chess, coding, and Lego, yet battles perfectionist stress and a tendency to over‑worry about tiny details.
background:
  cultural: Ramona’s family originates from Spain, and they keep many Spanish traditions alive at home. She hears Spanish spoken around the dinner table, celebrates holidays such as Día de los Reyes and
    Semana Santa, and enjoys family meals featuring paella and tapas. Living in Modesto’s diverse community, she also participates in local Hispanic festivals and school events that highlight Latino culture.
    While she feels proud of her Spanish heritage, her everyday life blends this background with typical Californian influences, from soccer games in the park to after‑school coding clubs.
attributes:
  skills: '[''basic programming with Scratch'', ''critical reading and comprehension'', ''strategic board games (chess)'', ''digital illustration'', ''step‑by‑step time management for school projects'',
