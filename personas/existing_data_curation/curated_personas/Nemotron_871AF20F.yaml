  hobbies: '[''Vegetable gardening'', ''Hiking'', ''Bird watching'', ''Crossword puzzles'', ''Sudoku'', ''Baking'', ''Knitting'', ''Book club (mystery & historical non-fiction)'', ''Volunteer scheduling
