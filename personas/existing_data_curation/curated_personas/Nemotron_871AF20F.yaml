  career_goals: Tamera aims to become a senior sales manager within her agency, overseeing a team of agents and driving regional market growth. She plans to obtain additional licensing for commercial insurance
    lines and pursue the Chartered Property and Casualty Underwriter (CPCU) designation to deepen her expertise. Over the next five years, she aspires to rank among the top producers in New Hampshire, mentor
    new agents, and eventually open her own boutique insurance agency that emphasizes personalized service and rigorous risk analysis. She also seeks to implement structured performance metrics and streamlined
    workflows to improve agency efficiency.
