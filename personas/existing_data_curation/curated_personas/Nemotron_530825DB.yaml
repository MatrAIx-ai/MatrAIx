personas:
  professional: Sovanna Lum, a 22-year-old line cook at a bustling downtown kitchen, leverages rigorous food-safety protocols, precise knife work, cost-effective menu planning, and attentive staff mentorship
    to keep her stations efficient, reflecting her methodical, organized nature and ability to assertively balance creativity with operational demands.
  sports: Sovanna Lum channels her fitness through weekend hikes along the Mississippi River bluff and occasional runs with the Riverbank Running Club, prefers low-impact cardio over team sports, yet cheers
    enthusiastically for the nearby minor-league baseball team, the Savanna Scribes, during off-season.
  arts: Sovanna Lum captures the aesthetics of her culinary creations in vivid Instagram posts, draws inspiration from food-photographer Tien-Hsing Lee and indie folk musician Jack Johnson, practices ukulele
    renditions of classic songs, and sketches menu layouts with a flair reminiscent of graphic novelist David Mazzucchelli, intertwining visual art into her cooking narrative.
  travel: Sovanna Lum favors road-trip adventures that blend food and nature, having explored New Orleans' spice markets, Portland's farmer’s markets, and the tranquil Mississippi River bluffs, she dreams
    of a culinary pilgrimage to Chiang Mai but plans trips around her part-time student schedule and modest savings, often documenting journeys in a handwritten journal.
  culinary: Sovanna Lum cultivates herb and microgreen windowsill gardens to enrich dishes like fragrant Vietnamese pho broth, Thai green curry with kaffir lime, and salads tossed with basil and edamame,
    expertly balances Southeast Asian aromatics with Midwestern produce, and documents each experiment in a meticulously organized recipe journal.
  core: Sovanna Lum, a detail-driven 22-year-old line cook, merges Southeast Asian spice with Midwest freshness, catalogs every trial in a blog, yet procrastinates on finishing her culinary certificate
    while hoarding vintage ukulele tabs.
background:
  cultural: Sovanna’s family traces its roots to Cambodia, where her grandparents grew up amidst rice paddies and river markets. At home, Khmer language phrases, traditional celebrations such as Khmer New
    Year, and classic dishes like amok and kuy teav remain central to family life. The values of hospitality, respect for elders, and communal meals were instilled early, shaping her approach to cooking
    as a means of bringing people together. Living in Savanna, Illinois, she integrates these cultural influences with Midwestern sensibilities—appreciating local farming, self‑reliance, and community involvement.
    This blend informs both her cooking style, which fuses Southeast Asian spice profiles with locally sourced ingredients, and her personal outlook, balancing curiosity about new flavors with practical,
    organized execution.
attributes:
  skills: '["Southeast Asian cuisine preparation", "Food safety and sanitation", "Menu planning and cost control", "Knife handling and precision cutting", "Inventory management", "Recipe development and
    adaptation", "Team coordination and training", "Time management in fast‑paced kitchens"]'
  hobbies: '["Herb and microgreen gardening", "Food photography", "Hiking local trails", "Reading culinary history", "Ukulele playing", "Volunteer cooking at shelter", "Recipe journaling and sketching"]'
  career_goals: Sovanna aims to earn a culinary certificate through a local community college while continuing her work as a line cook. In the next three to five years she hopes to be promoted to sous‑chef,
    taking on greater responsibility for menu creation, budgeting, and staff supervision. Long‑term, she dreams of opening a modest, community‑focused café in Savanna that blends Southeast Asian flavors
    with Midwestern farm‑to‑table ingredients, offering cooking workshops for small groups. She also wishes to develop a food‑blog that documents her recipe experimentation and celebrates her cultural heritage,
    providing a platform to share her practical culinary knowledge with a broader audience.
