  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Digital photography'', ''Reading contemporary fiction'', ''Experimental cooking'', ''Herb and vegetable gardening'', ''Book
    club participation'', ''Attending local theater productions'', ''Spontaneous road trips to historic sites'', ''Yoga and mindfulness practice'', ''Community dance nights'']'
  career_goals: Jessica hopes to finish the bachelor’s degree in Art History she began in college, transitioning to a part‑time role as a community arts coordinator at the Litchfield County Arts Center.
    She envisions launching a modest home‑based online shop for her handmade jewelry and textiles, allowing her to blend creativity with a flexible schedule. Additionally, she wants to develop and facilitate
    a small support group for women dealing with stress and anxiety, drawing on her own experiences. Over the next five years, she aims to travel to major European art hubs such as Paris and Florence, and
    eventually mentor younger volunteers at local senior and arts programs.
