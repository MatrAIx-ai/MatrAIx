  career_goals: Over the next few years, Steve aims to advance into a regional sales director role where he can shape broader market strategies while still maintaining a hands‑on connection with his team.
    He intends to launch a formal mentorship program to pass his practical knowledge to younger sales professionals and plans to earn a sales management certification to sharpen his organizational skills.
    Ultimately, he envisions transitioning to part‑time consulting, giving him more flexibility to pursue personal interests and community involvement after his tenure as a manager.
