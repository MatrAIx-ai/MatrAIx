  career_goals: Joshua aims to become the head coach of the Peoria high school varsity program, establishing a culture that integrates athletic excellence with personal character development. Within the
    next five years, he plans to transition into a senior scouting role for a Minor League baseball organization, using his deep local connections to uncover under‑the‑radar talent. He also hopes to author
    a coaching philosophy guide that merges practical techniques with humanistic perspectives and eventually launch a community sports academy that offers affordable training and mentorship to youth in
    the Peoria area.
