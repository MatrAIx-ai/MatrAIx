  career_goals: Melanie aims to step into a senior portfolio manager role within the next two years, focusing on sustainable investment strategies in the gaming and hospitality sector. She plans to complete
    her CFA charter, mentor junior analysts, and eventually launch a boutique advisory firm that serves retirees in Nevada, helping them create low‑risk, income‑focused portfolios. Additionally, she hopes
    to author a guide on disciplined investing for older adults and contribute thought leadership on risk‑aware investment practices.
