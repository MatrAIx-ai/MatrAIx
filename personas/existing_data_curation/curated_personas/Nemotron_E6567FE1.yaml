personas:
  professional: An aspiring junior robotics builder, Duc Persaud channels their curiosity and practicality into designing LEGO-powered contraptions while balancing meticulous planning with the flexibility
    to tinker on the fly, showing a reliable yet talkative presence when collaborating on school STEM clubs.
  sports: Duc Persaud kicks the ball for the local youth soccer team, the Riverdale Rovers, idolizes the professional club Manchester United, and they balance a love for vigorous weekend matches with occasional
    reluctance to join extra drills due to a lingering fear of injury.
  arts: Duc Persaud devotes evenings to sketching Marvel comic heroes and creating digital fan art inspired by Studio Ghibli’s “My Neighbor Totoro,” often sharing their work on a safe online platform while
    occasionally staying up late, despite the anxiety that a looming school deadline brings.
  travel: Duc Persaud dreams of exploring the bustling night markets of Tokyo and the historic temples of Angkor Wat, but currently enjoys weekend trips to the regional science museum and family visits
    to the nearby beach resort, planning each outing with a colorful map and a checklist to soothe their anxiety about the unknown.
  culinary: Duc Persaud loves helping in the kitchen by mastering the roll of fresh spring rolls filled with shrimp, vermicelli, and cilantro, as well as gently shaping sushi with seasoned rice and nori,
    occasionally over‑seasoning with soy sauce due to a lingering habit of seeking bold flavors.
  core: Balancing a bright curiosity for building robots with a sensitive, anxiety‑prone heart, Duc Persaud is a diligent kid who thrives on structured play, vivid imagination, and occasional bursts of
    impulsive snack cravings.
background:
  cultural: Duc is raised in a multicultural household that blends Vietnamese and Indo‑Caribbean influences. His mother emigrated from Vietnam and maintains traditions such as celebrating Tet (Lunar New
    Year), cooking pho and spring rolls, and speaking Vietnamese at home. His father, originally from Guyana, introduces Caribbean flavors like roti and celebrates occasions like Diwali and Christmas, reflecting
    his Indo‑Guyanese background. Living in Anaheim, the family participates in the vibrant local Asian community, attending cultural festivals at the Orange County Fair and joining a weekend Vietnamese
    language school. This mixed cultural environment enriches Duc’s worldview, giving him exposure to both Southeast Asian customs and Caribbean diaspora traditions.
