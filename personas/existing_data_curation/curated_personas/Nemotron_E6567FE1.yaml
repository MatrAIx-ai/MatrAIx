  career_goals: Duc dreams of becoming an engineer or a computer scientist who can design helpful technologies. He is fascinated by how things work, especially robots and space exploration, and expresses
    a wish to one day work for NASA or a tech company that creates educational tools for kids. He also hopes to travel the world to experience different cultures, reflecting his love for learning and desire
    to connect people. In the near term, he aims to improve his coding skills, join a youth robotics team, and maintain good grades to keep his options open.
