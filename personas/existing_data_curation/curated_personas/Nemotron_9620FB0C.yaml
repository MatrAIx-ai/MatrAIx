personas:
  professional: Andrew Mcinnis, a methodical operations manager at a regional retail chain, leverages his expertise in staff scheduling, inventory control, and process improvement to keep stores running
    like well‑tuned machines, while his knack for clear communication and steady calm under pressure makes him a natural mentor for frontline employees.
  sports: Andrew Mcinnis, a dedicated member of the Medford community softball league and an avid cross‑country skier, routinely hits the trails for snowshoeing in winter, follows the Milwaukee Bucks and
    Green Bay Packers religiously, and treats his weekly workouts as both a personal challenge and a way to stay resilient for his demanding work schedule.
  arts: Andrew Mcinnis, an enthusiastic woodworker and history‑novel reader, finds artistic inspiration in the folk storytelling of the Avett Brothers, the lyrical poetry of Leonard Cohen, and the regional
    realism of Grant Wood, often playing acoustic guitar while shaping pine tables and attending the local theater’s seasonal productions.
  travel: Andrew Mcinnis favors carefully planned road trips that blend outdoor adventure with modest budgets, such as weekend canoeing excursions on the Boundary Waters, a summer getaway to Door County’s
    apple orchards, and an aspirational cultural tour of Bavaria to glimpse the landscapes that shaped his family’s agrarian roots.
  culinary: Andrew Mcinnis enjoys cooking freshly caught lake trout with lemon‑butter sauce, hearty beef and vegetable stew seasoned with home‑grown carrots and potatoes, and treats himself to cheese‑curd
    fries and a slice of homemade apple pie, while his modest kitchen skills are highlighted by his precise, methodical approach to seasoning and timing.
  core: Andrew Mcinnis, a structured yet community‑oriented 25‑year‑old, balances a disciplined career trajectory and frugal finances with a love for woodworking, outdoor sports, and modest culinary comforts,
    all while occasionally neglecting flossing in favor of extra sleep.
background:
  cultural: Andrew was raised in a middle‑class, white Midwestern family in Medford, Wisconsin, with ancestral ties to German and Irish immigrants. The local culture emphasizes hard work, self‑reliance,
    modesty, and neighborly support. Raised with Protestant values that stress stewardship and community service, he embodies a practical, problem‑solving mindset and a deep appreciation for the natural
    environment that surrounds his hometown.
