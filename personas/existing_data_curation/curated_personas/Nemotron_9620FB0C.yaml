  career_goals: Andrew plans to complete a bachelor’s degree in Business Administration within the next two years and later pursue an MBA to broaden his strategic expertise. Over the next five years he
    aims to be promoted to district manager, then to a regional operations director role. Long‑term, he envisions launching his own family‑run retail business, leveraging his experience in supply‑chain
    logistics, project management, and employee development to create a sustainable enterprise that serves his community.
