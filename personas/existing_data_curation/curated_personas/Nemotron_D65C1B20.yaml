personas:
  professional: Fatu Smith is a community arts facilitator‑in‑training who leverages their quilting expertise, event‑planning experience, and knack for budgeting to design intergenerational craft workshops
    at the Twiggs County senior center, and they flourish in group settings thanks to their curious, organized yet flexible personality.
  sports: Fatu Smith enjoys walking briskly with the Twiggs County Senior Walking Club, follows the Atlanta Falcons and Atlanta Braves on TV, participates in a local senior softball league, and they occasionally
    join golden‑age tennis matches at the community recreation center.
  arts: Fatu Smith regularly visits the High Museum of Art and the Savannah Folk Art Festival, draws inspiration from the bold hues of Henri Matisse and the narrative storytelling of folk‑artist Grandma
    Moses, and they share gospel concerts featuring the local choir at the historic downtown theater.
  travel: Fatu Smith prefers relaxed road trips to historic Southern towns like Savannah, Charleston, and Natchez, often traveling with a small group of friends and budgeting carefully to include entry
    to antebellum museums and local culinary tours, while they dream of a pilgrimage to the New Orleans Jazz District for its vibrant music scene.
  culinary: Fatu Smith’s kitchen is a hub for soul‑food classics such as smoked collard greens, buttery cornbread, and pan‑fried catfish seasoned with garlic and cayenne, and they relish using fresh tomatoes,
    okra, and sweet potatoes from their garden, though they sometimes over‑salt dishes in excitement.
  core: Fatu Smith is a curious, community‑driven quilt enthusiast who balances meticulous budgeting with occasional impulse splurges, embraces Southern art and food, and they remain steadfastly sociable
    despite managing chronic health conditions.
background:
  cultural: Fatu was raised in a tight‑knit African‑American family in Dry Branch, Georgia, where the rhythms of church life, Southern hospitality, and community solidarity shaped her worldview. Her grandparents
    were part of the Great Migration, moving from the rural South to agricultural work in Twiggs County, and they passed down oral histories, gospel traditions, and the craft of quilting as a means of cultural
    expression and economic empowerment. Growing up, she attended a historically Black school, celebrated Juneteenth, and participated in local festivals that highlighted African‑American folk art and music.
    The influence of Southern cuisine, storytelling, and a strong church community informs her daily practices, while her curiosity drives her to blend these traditions with contemporary ideas, creating
    a bridge between heritage and innovation.
attributes:
