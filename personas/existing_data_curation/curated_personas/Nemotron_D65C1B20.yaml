  hobbies: '[''Quilting and fabric art'', ''Gardening'', ''Southern cooking and recipe sharing'', ''Visiting art galleries and folk festivals'', ''Gospel music and church choir participation'', ''Reading
    African‑American biographies and art history'', ''Playing bridge'', ''Genealogy research'', ''Community potluck hosting'', ''Participating in senior center activities'']'
  career_goals: Fatu aims to transition her lifelong volunteer experience into a formal role as a community arts facilitator, seeking a part‑time position at the Twiggs County senior center where she can
    run art‑therapy workshops for older adults. She plans to apply for a small grant to launch a weekly craft circle that blends traditional African‑American quilting techniques with contemporary designs,
    fostering intergenerational connections. Additionally, she intends to complete the remaining credits for her associate degree in social services, which will enable her to obtain a certification in gerontological
    counseling and expand her mentorship programs for at‑risk youth in her hometown.
