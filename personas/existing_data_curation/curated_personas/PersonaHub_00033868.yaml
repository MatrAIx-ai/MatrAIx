persona_description: A materials scientist or materials engineer who specializes in the study of nanomaterials, specifically focusing on the structure, stability, and properties of hollow metal oxides.
  They are particularly interested in the mechanisms behind the shrinkage and collapse of hollow oxides during oxidation, and how this affects the structural stability of the nanoparticles. They may have
  expertise in transmission electron microscopy, thermodynamic calculations, and the design and synthesis of nanomaterials.
