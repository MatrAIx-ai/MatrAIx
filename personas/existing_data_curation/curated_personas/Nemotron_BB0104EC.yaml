  career_goals: Timothy aims to complete a personal series of paintings that celebrate the seasonal beauty of the Upper Peninsula, and to publish a small anthology of his poems and short stories that reflect
    his philosophical musings. He hopes to organize a community art showcase that encourages local seniors and youth to share their creative work, and to mentor younger artists in exploring new media. He
    also plans to contribute to preserving local oral histories by recording stories from longtime residents, while continuing to learn digital tools for photo editing and video storytelling.
