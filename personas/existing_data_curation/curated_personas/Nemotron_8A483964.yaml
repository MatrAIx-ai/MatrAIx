  career_goals: Jarrod aims to move from plant‑level management to a regional operations director role, overseeing multiple facilities and driving a shift toward sustainable, low‑waste manufacturing practices.
    He plans to earn an associate’s degree in industrial technology and acquire a PMP certification to strengthen his project‑leadership credentials. Over the next five years, he hopes to launch a consulting
    practice that helps midsize manufacturers adopt lean and environmentally friendly processes, while also championing mental‑health‑focused workplace policies that reduce employee anxiety. On a personal
    level, he wants to master advanced data‑analytics tools to become a data‑driven decision maker and to mentor younger workers from non‑traditional educational backgrounds.
