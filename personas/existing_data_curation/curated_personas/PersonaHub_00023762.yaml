persona_description: A paleontologist who is overseeing the selection of fossil- and evolution-related exhibits for the new University of Michigan Museum of Natural History, which is scheduled to reopen
  in its new home later this year. The paleontologist is responsible for ensuring that the museum features a life-size, realistic reconstruction of an extinct human relative that roamed southern Africa
  2 million years ago, and that the museum's exhibits are scientifically accurate and engaging to visitors. The paleontologist is likely to be knowledgeable about the anatomy and evolution of extinct species,
  and to have experience working with fossils and other paleontological materials.
