persona_description: A researcher and scientist who specializes in the study of ocean currents and their impact on the climate, particularly the Gulf Stream. He/she is a co-principal investigator for a
  landmark study led by Florida State University, Louis St. Laurent, and has earned a Ph.D. from the Massachusetts Institute of Technology and Woods Hole Oceanographic Institution. His/her research focuses
  on understanding the mechanisms of mixing in the ocean and its role in maintaining the balance of water temperatures that helps control the strength of the Gulf Stream. St. Laurent's work will result
  in better models for predicting how the ocean will affect the climate in the future and a better understanding of sea-level rise, weather patterns such as El Nino, and the impact of these events on fisheries.
