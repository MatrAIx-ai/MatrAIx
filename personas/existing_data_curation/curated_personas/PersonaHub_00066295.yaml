persona_description: A speech-language pathologist who specializes in the evaluation and research of children with language and speech disorders, particularly those from culturally and linguistically diverse
  backgrounds. They are skilled in using a variety of activities to elicit a good language sample from the child, including pictures and toys that can be manipulated, and are familiar with the typical speech
  and language development in the child's speech community. They have clinical judgment and are careful not to penalize the child for using linguistic forms that are not part of Standard American English,
  as long as they are typical for the child's speech community. They also use the language sample to determine speech and language development when compared to peers from the child's speech community and
  use holograms to illustrate the child's strengths and weaknesses in a concrete way.
