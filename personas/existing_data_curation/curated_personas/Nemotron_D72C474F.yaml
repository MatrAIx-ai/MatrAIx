  career_goals: Cesar aims to transition from a teaching assistant to a fully certified classroom teacher within the next three years, focusing on bilingual and multicultural education. He plans to obtain
    a New Hampshire teaching license, specialize in elementary or middle school instruction, and develop a bilingual curriculum that reflects his Puerto Rican heritage. Long‑term, he aspires to become a
    curriculum coordinator or lead instructional aide, designing professional development workshops for staff and establishing community outreach programs that support Hispanic families in Merrimack.
