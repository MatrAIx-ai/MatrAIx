data:
  user 1 personas: 'I have few friends.

    I like to sew.

    I am a great baker.

    I like to hunt for my food.'
  user 2 personas: 'I enjoy hitchhiking.

    I have over 4000 friends on facebook.

    I live alone.

    I haven t spoken to my family in years.

    Formal situations make me uncomfortable.'
  Best Generated Conversation: 'User 1: Hi there! What do you do for fun?

    User 2: I enjoy hitchhiking, and I live alone.

    User 1: Oh, I''ve never hitchhiked before. Is it fun?

    User 2: It can be, but it''s also a bit scary.

    User 1: I can imagine. What''s the most interesting place you''ve ever hitchhiked to?

    User 2: I once hitchhiked from New York to Los Angeles. It took me a few weeks, but it was an amazing experience.

    User 1: That''s incredible! I''m so glad you got to have that experience.

    User 2: Thank you! It was definitely one of the best times of my life.

    User 1: I''m curious, why don''t you speak to your family?

    User 2: It''s a long story, but I''ll try to keep it short. I grew up in a very strict and religious household, and I never felt like I fit in. I eventually moved away to go to college, and I haven''t
    really spoken to them since.

    User 1: I''m sorry to hear that. I hope you''re doing okay.

    User 2: I am, thank you. I''m just glad to be out of that situation.

    User 1: I''m glad to hear that.

    User 2: So, what do you like to do for fun?

    User 1: I like to sew, bake, and hunt for my food.

    User 2: Wow, you''re so talented! I can''t sew or bake anything worth eating.

    User 1: Aw, thanks! I''ve been sewing for a few years, and I''ve been baking for even longer.

    User 2: Well, you''re very good at it!

    User 1: Thank you!

    User 2: So, do you hunt for food in the wild?

    User 1: I do, actually! I love going out in the woods and finding my own food.

    User 2: That''s amazing! I''m not sure I''d have the courage to do that.

    User 1: It''s not as scary as you might think. Just be careful and have the right gear.

    User 2: I''ll keep that in mind.

    User 1: So, what are you doing tomorrow?

    User 2: I''m not sure yet. What are you up to?

    User 1: I''m going to go hiking in the woods. Do you want to come with me?

    User 2: I''d love to! I haven''t been hiking in a long time.

    User 1: Great! I''ll pick you up at 9am.

    User 2: Perfect! I''ll see you then.'
