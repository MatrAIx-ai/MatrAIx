personas:
  professional: Sara Ball is a seasoned endurance athlete specializing in triathlon competition; they combine methodical periodized training plans, data‑driven GPS and power‑meter analytics, sports‑nutrition
    expertise, and injury‑prevention strategies to coach group sessions, organize local races, and deliver public talks, all while channeling their curiosity for emerging sports‑science research into the
    practical goal of founding an affordable community performance center for underserved athletes.
  sports: Sara Ball fuels their fitness regimen with beach volleyball at the Panhandle Sand Spikers, weekly sunrise yoga, and disciplined tri‑training as a member of the Gulf Coast Tri Club, while cheering
    on the Florida State Seminoles football team and tracking the Tour de France, reflecting a balanced love of team sports, individual endurance, and seasonal variety.
  arts: Sara Ball enjoys live performances at Tallahassee’s The Moon, often catching shows by Leon Bridges, Hozier, and local folk singer Savannah Grace, while also hosting board‑game nights featuring Catan
    and Ticket to Ride, illustrating how music and interactive storytelling shape their social life.
  travel: Sara Ball plans trips with a mix of meticulous itineraries and spontaneous detours, having hiked the Apalachicola National Forest trails and explored the Great Smoky Mountains, while dreaming
    of competing in Kona, unwinding at a Bali yoga retreat, and chasing the northern lights in Iceland, all balanced against their training schedule and modest budget.
  culinary: Sara Ball cooks health‑focused Southern dishes such as baked catfish with lemon‑herb glaze, collard greens sautéed with smoked turkey, and quinoa‑cornbread stuffing flavored with thyme and pimento
    cheese, constantly experimenting with ingredients like sweet potatoes, okra, and smoked paprika, yet they occasionally indulge in a midnight plate of spicy jambalaya.
  core: Sara Ball is a data‑driven endurance athlete who balances a relentless quest for performance perfection with a worry‑prone mind, channeling stress into yoga, community mentoring, and a dream of
    building an inclusive performance hub—all while occasionally over‑analyzing training metrics to the point of paralysis.
background:
  cultural: Sara grew up in a middle‑class white family in Crawfordville, Florida, where community and Southern hospitality shaped her worldview. Her parents, both educators, emphasized the importance of
    reliability, hard work, and helping neighbors, values that underpin her organized and cooperative nature. The local high school sports culture introduced her early to competitive athletics, and the
    region’s love for outdoor activities fostered her passion for running and water sports. While rooted in traditional Southern customs—such as church involvement, family gatherings, and comfort‑food cooking—she
    also embraces a progressive mindset, championing gender equity in sports and seeking diverse perspectives through travel and competition.
attributes:
  skills: '["Endurance training (running, cycling, swimming)", "Periodized program design", "Sports nutrition planning", "Injury prevention and rehabilitation", "Performance analytics (GPS, HR, power data)",
    "Team leadership and group dynamics", "Youth coaching and mentorship", "Event planning and race logistics", "Public speaking and community outreach", "First aid & CPR certification"]'
  hobbies: '["Triathlon training", "Beach volleyball", "Yoga and meditation", "Hiking in Apalachicola National Forest", "Cooking healthy Southern cuisine", "Reading sports science and personal development
    books", "Listening to podcasts", "Volunteer coaching at youth sports programs", "Attending live music events", "Board game nights"]'
  career_goals: Short‑term, Sara aims to qualify for the Ironman World Championship in Kona and secure a sponsorship that supports her training. She plans to complete her bachelor’s degree in kinesiology,
    followed by certification as a Certified Strength and Conditioning Specialist (CSCS). Long‑term, she envisions opening a community‑focused performance center in Leon County that offers affordable training,
    nutrition counseling, and mental‑skill workshops, especially for girls and under‑served athletes. She also aspires to become a national speaker on gender equity in endurance sports and to transition
    into a sports administration role after her competitive career.
