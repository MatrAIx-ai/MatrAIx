personas:
  professional: Jadon Robinson is a seasoned CPA who blends rigorous audit expertise with a passion for data-driven storytelling, leveraging Power BI and Python to transform financial oversight into strategic
    advisory work while mentoring junior talent and championing sustainability reporting for cultural nonprofits.
  sports: Jadon Robinson enjoys sailing on Biscayne Bay with the local yacht club, follows the Miami Heat and Inter Miami CF with fervor, participates in weekend tennis matches at a community court, and
    maintains a low‑impact fitness routine that includes brisk walks along the beach while occasionally neglecting strength training.
  arts: Jadon Robinson immerses themselves in Miami's vibrant art scene, regularly touring the Pérez Art Museum, snapping photos of Wynwood murals by artists like Shepard Fairey, playing chess at Café La
    Trova while debating contemporary installations, and volunteering to curate community murals that celebrate local heritage.
  travel: Jadon Robinson prefers curated cultural trips, often spending a week exploring the colonial streets of Old Havana, savoring the Caribbean flavors of Jamaica's Blue Mountains, and taking short
    road trips to the historic Vizcaya Museum, balancing a modest travel budget with a desire for immersive architectural tours.
  culinary: Jadon Robinson delights in cooking Cuban classics such as Ropa Vieja and Arroz con Pollo, experimenting with Caribbean spices like allspice and Scotch bonnet pepper in Jerk chicken, and perfecting
    the art of slow‑cooked yuca, all while treating their kitchen as a laboratory for flavor fusion.
  core: Jadon Robinson is a detail‑oriented accountant who channels their love for art, sailing, and sustainable finance into a life that balances meticulous spreadsheets, spontaneous photography expeditions,
    and occasional forgetfulness about taking medication.
background:
  cultural: Born into a middle-class white family in the American Midwest, Jadon was raised with a strong emphasis on education, community involvement, and practical problem-solving. Relocating to Miami
    Beach in his thirties, he immersed himself in the city's multicultural environment, adopting a love for Latin American art, music, and cuisine while maintaining his core values of reliability and collaboration.
    His cultural identity blends a traditional American upbringing with the vibrant, diverse influences of South Florida's coastal community.
