  career_goals: Jadon aims to transition from routine audit engagements to a senior advisory role where he can embed advanced data analytics and sustainability metrics into financial oversight. He plans
    to earn the Certified Internal Auditor (CIA) credential, mentor emerging accounting talent, and eventually launch a boutique consulting practice focused on fiscal stewardship for arts and cultural nonprofit
    organizations in South Florida. This blend of professional expertise and personal passion for the arts reflects his long-term ambition to leave a legacy of both financial integrity and cultural enrichment.
