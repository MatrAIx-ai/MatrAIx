  career_goals: Although still young, Robert dreams of a future where he can combine his love for art, science, and helping others. He hopes to become a marine biologist‑illustrator who studies Florida’s
    coastal ecosystems and creates vivid drawings and stories that teach children about ocean conservation. He also envisions a role as an elementary‑school teacher or community mentor, designing harmonious
    classrooms and after‑school art projects that encourage curiosity and cooperation among peers. As he grows, he aims to develop strong coping skills for his worries, so he can support others facing stress
    as well.
