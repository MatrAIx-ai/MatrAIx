personas:
  professional: Robert Mitchell, an aspiring marine storyteller who blends his love for ocean wildlife sketches, fantasy reading, and LEGO engineering into imaginative narratives, demonstrates keen observational
    skills and a meticulous yet playful approach to projects, and uses they curiosity to explore scientific concepts through storytelling.
  sports: Robert Mitchell, a budding junior swimmer who participates in the Jacksonville Beach Youth Aquatics program, follows the Jacksonville Jaguars with enthusiasm, joins a community soccer league during
    fall, and balances weekly bike rides in the mangroves with a love for casual basketball pickup games with friends.
  arts: Robert Mitchell, a watercolor enthusiast in the Jacksonville Public Library art club who sketches dolphins and turtles after watching Wyland’s marine paintings, practices simple recorder melodies
    of The Beatles and Taylor Swift, and channels the imaginative worlds of J.K. Rowling and Brandon Sanderson into vibrant illustrated storyboards.
  travel: Robert Mitchell, an adventurous road‑trip fan who loves spontaneous beach days at St. Augusta’s shores, dreams of exploring the Everglades by kayak, cherishes annual family visits to Washington,
    D.C. for the Fourth of July fireworks, and prefers short, family‑guided excursions over long solo travels.
  culinary: Robert Mitchell, a curious young foodie who enjoys finger‑licking fried chicken with sweet tea at family gatherings, raids the kitchen to help grill shrimp tacos with lime and cilantro, loves
    mac and cheese on rainy afternoons, but often sneaks extra cookies while reading and forgets to brush teeth afterwards.
  core: Robert Mitchell, a curious, compassionate nine‑year‑old who weaves oceanic wonder into stories, saves allowance with colorful charts, battles seasonal allergies, swims with vigor, paints marine
    life, dreams of kayaking the Everglades, and secretly hoards extra cookies.
background:
  cultural: Robert is a White American boy raised in Jacksonville, Florida, a city known for its coastal environment, diverse neighborhoods, and Southern hospitality. His family celebrates traditional American
    holidays such as Thanksgiving, Christmas, and the Fourth of July, often gathering for home‑cooked meals that blend Southern comforts like fried chicken and sweet tea with fresh seafood from the nearby
    Atlantic. He participates in community events at the Jacksonville Public Library, local nature centers, and occasional city festivals that showcase Latin, African‑American, and Caribbean music and food,
    reflecting the multicultural fabric of the area. This mix of Southern traditions and exposure to a variety of cultural influences nurtures his openness to new ideas, his appreciation for varied experiences,
    and his compassionate outlook toward others.
