  their team to achieve success, and who is comfortable with the challenges and responsibilities of managing a group of people. They may have experience in using both transactional and transformational
  styles of leadership, and may be able to recognize the unique qualities of different types of leadership. This person is likely to have a deep understanding of the concepts of management and leadership,
  and may be able to apply these concepts to their work and personal life.
