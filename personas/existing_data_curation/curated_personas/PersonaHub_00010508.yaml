persona_description: A marine biologist and ecologist who specializes in studying the nitrogen cycle in coastal marine ecosystems, particularly in the Pacific Northwest. Her research focuses on the interactions
  between microorganisms and larger organisms, particularly animals, plants, and algae, and how these interactions affect nitrogen cycling and ecosystem productivity. She is interested in how these interactions
  are shaped by human activity and the potential for microbial diversity to be different in different ecosystems. Her research has been published in the journal Frontiers in Ecology and the Environment
  and has led to the development of tools and models that can be applied in more complex, rapidly changing ecosystems.
