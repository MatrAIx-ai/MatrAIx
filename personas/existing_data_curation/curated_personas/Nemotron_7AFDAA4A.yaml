personas:
  professional: Edwin Gold is a high‑school senior whose methodical mind and love for precise instructions drive their involvement in model‑building, programming puzzles, and the school chess club, laying
    a disciplined foundation for a future in civil or mechanical engineering; they meticulously document every project in a digital log and approach each academic challenge like a blueprint.
  sports: Edwin Gold follows the River City Mariners baseball team on weekends and runs with the high‑school cross‑country club during early mornings, preferring solitary jogs that fit their structured
    schedule; they also occasionally lift weights at the local gym to build the strength needed for carpentry projects.
  arts: Edwin Gold immerses themselves in engineering‑inspired art, admiring the designs of Frank Lloyd Wright and Zaha Hadid, listening to the minimalist compositions of Philip Glass while assembling scale
    models, and sketching technical drawings that blend function with aesthetic; they occasionally visit the modern art museum to study structural installations.
  travel: Edwin Gold has toured the historic Brooklyn Bridge on a school field trip and dreams of exploring Tokyo’s Shinkansen system and the Mori Tower, preferring meticulously planned itineraries that
    prioritize punctuality, educational tours of engineering landmarks, and ample time for solo reflection; they keep a travel checklist in the same spreadsheet they use for school projects.
  culinary: Edwin Gold favors meals that can be measured and timed precisely, often cooking al dente spaghetti with cherry tomatoes, basil, and Parmesan while using a kitchen timer to perfect the sauce;
    they snack on lightly salted pistachios after model‑building sessions, though they sometimes skip dinner to finish a challenging Sudoku puzzle.
  core: Edwin Gold is a disciplined, solitary teen who blends a love for precision, structured routines, and quiet problem‑solving into every facet of life, from building scale models to budgeting and dreaming
    of engineering feats; they approach each task with methodical focus.
background:
  cultural: Edwin grew up in North Little Rock, Arkansas, in a family that traces its roots several generations back to the rural South. His upbringing reflects a blend of Mid‑South values—self‑reliance,
    respect for hard work, and community involvement—often expressed through church attendance and local volunteer events. He is familiar with regional traditions such as high school football games and
    community festivals, though he prefers quieter, behind‑the‑scenes roles. The cultural emphasis on practicality and modesty aligns with his preference for structured, predictable pursuits.
attributes:
  skills: '[''Organizational and time‑management'', ''Basic programming (Scratch, Python)'', ''Spreadsheet and data‑entry proficiency'', ''Model building and basic carpentry'', ''Clear written communication'']'
  hobbies: '[''Scale model building'', ''Chess'', ''Programming puzzles'', ''Sudoku and logic puzzles'', ''Reading engineering and architecture non‑fiction'', ''Documentary watching'']'
  career_goals: Edwin aims to finish his high school education with a strong GPA and then pursue a technical degree in engineering, preferably civil or mechanical engineering, so he can work on concrete,
    predictable projects that improve his community’s infrastructure. He envisions a career where he can apply his methodical problem‑solving skills to design and build durable structures, and he hopes
    to eventually obtain a professional engineer (PE) license. In the short term, he plans to enroll in a community‑college pre‑engineering program, acquire a summer internship with a local construction
    firm, and develop a portfolio of personal design projects.
