personas:
  professional: Poh Drapiza is a disciplined financial manager at a mid-sized technology firm, leveraging advanced Excel, SQL, and Python to deliver precise forecasts, variance analyses, and risk assessments
    while guiding a small team with a blend of assertive leadership and quiet empathy.
  sports: Poh Drapiza is a regular attendee of San Jose Earthquakes matches, a member of the San Mateo Hiking Club for weekend treks in the Santa Cruz Mountains, and occasionally joins a local badminton
    league that meets at the community center on Tuesday evenings.
  arts: Poh Drapiza enjoys listening to Beethoven’s late string quartets while coding, attends the San Francisco Symphony’s performances of Mahler’s Ninth Symphony, and follows Yo‑Yo Ma’s collaborations
    with traditional East Asian musicians, finding the fusion of classical and cultural sounds soothing.
  travel: Poh Drapiza prefers purposeful travel, having explored the historic gardens of Kyoto during a Lunar New Year visit, trekked the Redwood National Park with a small group of close friends, and plans
    a future retreat to the serene lavender fields of Provence, balancing work constraints with a modest travel budget.
  culinary: Poh Drapiza excels at preparing home‑cooked dim sum, particularly shrimp har gao and pork siu mai, and skillfully balances flavors with ginger, star anise, and Sichuan peppercorn in mapo tofu,
    while reserving weekends for a low‑key family dinner featuring steamed fish with soy‑ginger glaze.
  core: Poh Drapiza blends meticulous financial acumen with a calm, structured lifestyle, tempered by a persistent worry that fuels disciplined self‑care routines and a quiet devotion to family traditions.
background:
  cultural: Born to first‑generation Chinese immigrants, Poh Chun grew up in a bilingual household where Mandarin (and Cantonese) were spoken alongside English. His upbringing emphasized Confucian values
    such as respect for elders, diligence, humility, and collective responsibility, which guided his academic pursuit of a STEM degree and his commitment to professional excellence. Celebrating Lunar New
    Year, the Mid‑Autumn Festival, and other traditional customs, he maintains strong family ties while also embracing the multicultural, tech‑driven environment of San Mateo, California. This blend of
    East Asian heritage and Bay Area culture shapes his worldview, work ethic, and personal interests.
