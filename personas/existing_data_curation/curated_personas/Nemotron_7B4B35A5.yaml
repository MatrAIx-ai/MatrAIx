  career_goals: Poh Chun aims to advance to a chief financial officer role within the next five to seven years, pursuing CPA and CFA certifications to deepen his technical credentials. He seeks to lead
    finance‑transformation projects that integrate automation and data‑driven decision‑making, strengthen the company’s risk‑management framework, and foster a culture of financial discipline. Additionally,
    he aspires to mentor junior finance staff and to establish a more balanced work‑life routine that mitigates stress and supports his family life.
