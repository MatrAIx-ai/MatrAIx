  hobbies: '["Community theater acting", "Competitive trivia nights", "Organic gardening", "Cycling on the Great Miami Trail", "Volunteer work at the Dayton Food Bank", "Reading contemporary nonfiction"]'
  career_goals: Hope aims to advance to a regional director of facilities position within the next five years, overseeing multiple sites across Ohio and Indiana. She plans to champion comprehensive sustainability
    programs that reduce carbon footprints and operational costs, pursuing LEED AP certification to strengthen her credibility. In parallel, she wants to build a mentorship pipeline for emerging facilities
    professionals, leveraging her sociable nature to create networking circles and training workshops. Ultimately, she envisions influencing corporate strategy by integrating data analytics and smart-building
    technologies to drive continuous improvement across the organization.
