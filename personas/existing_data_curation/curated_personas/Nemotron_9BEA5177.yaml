personas:
  professional: Hope Broussard is a seasoned facilities manager who leverages two decades of strategic budgeting, preventive maintenance design, and vendor negotiation expertise, while channeling their
    talkative, competitive drive and pragmatic skepticism into leading cross-functional teams and championing data-driven sustainability initiatives across Dayton's commercial portfolio.
  sports: Hope Broussard cycles the Great Miami Trail every weekend with the Dayton Cycling Club, occasionally joins a co-ed intramural softball league, and passionately roots for the Dayton Flyers men's
    basketball team and the Cincinnati Bengals during football season.
  arts: Hope Broussard dazzles as both performer and stage manager in a community theater troupe staging seasonal productions, frequently channels the wit of Lin-Manuel Miranda and the drama of Shakespeare,
    and uses theater gatherings as a platform to network and later host a monthly contemporary nonfiction book discussion.
  travel: Hope Broussard prefers weekend getaways that blend outdoor adventure with cultural immersion, planning trips to the Ohio River islands, a cabin in the Hocking Hills, and an annual spring visit
    to Asheville, North Carolina, while balancing travel costs with a disciplined savings plan.
  culinary: Hope Broussard cultivates an organic vegetable garden and loves turning harvested heirloom tomatoes, zucchini, and fresh basil into a sun-dried tomato pesto pasta, while also indulging in a
    Saturday night charcoal-grilled salmon with mango salsa, reflecting both a health-focused home-cooking skill set and a penchant for occasional upscale dining.
  core: Hope Broussard is a charismatic, competition-driven facility leader who thrives on public attention, balances pragmatic curiosity with skeptical analysis, and can be found hiking, rehearsing lines,
    and meticulously tracking every expense—even if they occasionally forget to water a newly seeded plot.
background:
  cultural: Hope was raised in Dayton’s Montgomery County, coming from a multigenerational white Midwestern family with roots in the region’s early manufacturing era. Her upbringing emphasized a strong
    work ethic, community involvement, and modest self-reliance—core values of the Ohio heartland. She attended local public schools, participated in church youth programs, and maintains longstanding ties
    to regional traditions such as county fairs, the Rotary Club, and local volunteer initiatives. While she identifies with mainstream Midwestern cultural norms, her curiosity drives her to embrace Dayton’s
    growing cultural diversity and modern civic life.
attributes:
  skills: '["Facilities Operations Management", "Strategic Budget Development", "Preventive Maintenance Planning", "Vendor Negotiation and Contract Management", "Regulatory Compliance (OSHA, EPA)", "Project
