  career_goals: Ngoc aims to become a senior engineering leader who drives innovative, user-centered product development at the intersection of technology and art. Over the next five years she plans to
    obtain her Professional Engineer (PE) license and a Master’s degree in Engineering Management, positioning herself to lead interdisciplinary R&D teams that create sustainable consumer products with
    aesthetic appeal. She aspires to file patents, present at international conferences, and ultimately take on a Director of Product Development role. Parallel to her corporate trajectory, she hopes to
    launch a community makerspace in Louisville that empowers underrepresented youth—especially women of Southeast Asian heritage—to explore engineering and creative expression.
