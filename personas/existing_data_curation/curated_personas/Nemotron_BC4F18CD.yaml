personas:
  professional: Ngoc Van, a 32-year-old mechanical engineer, merges expertise in SolidWorks, Python, and Lean Six Sigma with a vivid artistic imagination, delivering user-centered product designs while
    meticulously planning project timelines and mentoring junior teammates, and they thrive on bridging technical rigor with creative storytelling.
  sports: Ngoc Van, a 32-year-old outdoor enthusiast, attends weekly high-intensity group fitness classes, hikes the rugged trails of the Ohio River Valley each weekend with the Louisville Hiking Society,
    cycles with the Louisville Cycling Club, roots for the Kentucky Wildcats basketball team and the Cincinnati Reds during the baseball season, and they treat each workout as a creative problem-solving
    session that balances their need for structure with their love of novelty.
  arts: Ngoc Van, a 32-year-old visual storyteller, spends evenings painting abstract watercolors inspired by Kandinsky's bold colors, crafting digital illustrations that echo the geometric playfulness
    of Yayoi Kusama's work, snapping candid street photographs reminiscent of Henri Cartier-Bresson's style, attending open-mic nights featuring musicians like St. Vincent, and they regularly draw on traditional
    motifs to fuse heritage with contemporary design trends.
  travel: Ngoc Van, a 32-year-old explorer, meticulously plans weekend trips with a color-coded spreadsheet, opting for short, high-impact adventures such as a hike in Red River Gorge, an art workshop retreat
    in Chiang Mai, a culinary tour of Barcelona's tapas bars, and annual stays at the family-favored Blue River State Park, and they balance wanderlust with a tight vacation budget that fuels their meticulous
    budgeting habit.
  culinary: Ngoc Van, a 32-year-old culinary experimenter, blends fragrant lemongrass, fish sauce, and fresh herbs to reinvent classic pho as a noodle-less bowl of rice-paper rolls, masters Italian risotto
    with saffron, creates miso-glazed salmon, delights friends at potlucks with hand-rolled spring rolls, experimental matcha-infused desserts, and they treat each dish as a canvas for merging cultural
    flavors with modern technique.
  core: Ngoc Van, a 32-year-old engineer-artist, channels boundless curiosity into seamless fusions of tech and art, battles chronic worry with daily meditation, and habitually carries a sketchbook, a multitool,
    and a reusable water bottle to every meeting.
background:
  cultural: Ngoc Van is a second‑generation Vietnamese‑American raised in Louisville’s vibrant multicultural neighborhoods. Her parents emigrated from Ho Chi Minh City in the early 1990s, instilling a deep
    respect for Vietnamese traditions—Tet celebrations, ancestor worship, and the communal preparation of dishes like phở and bánh xèo. Bilingual in English and Vietnamese, she navigates both the collectivist
    values of her heritage and the individualistic ethos of American society. Her cultural identity informs her artistic sensibilities, from incorporating lotus and calligraphic patterns in her artwork
    to blending Vietnamese flavors with Southern cuisine. Actively involved in the local Vietnamese community, Ngoc volunteers at cultural festivals, mentors youth through language‑exchange programs, and
    helps organize diaspora networking events, all while embracing the hospitality and community spirit of Kentucky.
