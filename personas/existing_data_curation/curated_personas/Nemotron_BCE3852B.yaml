personas:
  professional: Yuying Lou, a budding young architect, channels a love for structured play into LEGO construction projects, using methodical planning, meticulous sorting of bricks, and a cooperative mindset
    that keeps group builds orderly and on schedule.
  sports: Yuying Lou dribbles the ball for the "Little Lions" U8 soccer club, delighting in the predictable twice‑weekly practices and cheering for the city's professional soccer squad, the Metro FC, while
    occasionally forgetting to stretch before games.
  arts: Yuying Lou sketches adorable rabbit and fox characters inspired by Beatrix Potter, practices piano twice a week playing simple Mozart minuets and Disney melodies, and sings traditional folk songs
    at family celebrations, though they sometimes trip over lyrics when excited.
  travel: Yuying Lou enjoys family hikes in nearby state parks and dreams of seeing the Grand Canyon after completing a school geography project, favoring trips with a detailed packing list, scheduled rest
    stops, and familiar snacks over spontaneous adventures.
  culinary: Yuying Lou, a budding home chef, delights in assembling peanut butter‑jelly sandwiches, mixing mango smoothies, and watching cheese melt on pizza, yet often pushes broccoli aside and eagerly
    begs for chocolate chip cookies after dinner.
  core: Yuying Lou is a structured, kind‑hearted 7‑year‑old who blends methodical creativity with a love for LEGO building, piano practice, soccer, and diligent saving, while occasionally forgetting jackets
    on breezy days.
background:
  cultural: Yuying is a second‑generation Vietnamese‑American. Her parents immigrated from Vietnam and maintain many traditions at home, such as speaking Vietnamese, celebrating Tết (Lunar New Year), and
    preparing Vietnamese dishes like phở and bánh mì. Growing up in Anaheim’s diverse Orange County, she is exposed to both her heritage and the broader American culture. The family places a strong emphasis
    on education, respect for elders, and community involvement, which shapes Yuying’s values of harmony, reliability, and cooperation.
attributes:
  skills: '[''Reading (grade 2)'', ''Basic addition and subtraction'', ''Writing short sentences'', ''Organizing school supplies'', ''Following daily routines'', ''Cooperative group work'', ''Bilingual:
    English and Vietnamese'', ''Basic digital literacy'']'
  hobbies: '[''Reading'', ''LEGO building'', ''Drawing'', ''Piano lessons'', ''Soccer'', ''Nature hikes'', ''Origami'', ''Singing Vietnamese folk songs'']'
  career_goals: Yuying dreams of becoming someone who helps others learn and stay healthy. She often says she wants to be a teacher who can organize a classroom and make lessons fun, or a doctor who cares
    for children. She also imagines herself as a scientist exploring nature. Her immediate ambition is to earn good grades, be the class “helper,” and win a school reading award, which she believes will
    set the foundation for her future studies.
