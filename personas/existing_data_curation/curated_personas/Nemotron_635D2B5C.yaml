personas:
  professional: Tiffany Fisher is an aspiring LEGO architect who combines a vivid imagination with a practical eye for structural stability, and they channel their curiosity into designing intricate models
    while their relaxed approach to deadlines sometimes leaves projects half‑finished.
  sports: Tiffany Fisher is a budding basketball enthusiast who spends afternoons shooting hoops at the neighborhood park, follows the Philadelphia 76ers for inspiration, and they join school hopscotch
    tournaments with a competitive edge that sometimes overshadows cooperative play.
  arts: Tiffany Fisher is a creative storyteller who doodles elaborate scenes inspired by the whimsical worlds of Dr. Seuss and the vibrant colors of Studio Ghibli, while they sing along to classic soul
    tracks by Aretha Franklin and modern R&B hits by Beyoncé during dance parties in the living room.
  travel: Tiffany Fisher is an eager explorer who loves weekend trips to the Philadelphia Zoo, day‑long picnics at Fairmount Park, and fantasizes about visiting the interactive exhibits at the Children's
    Museum of Indianapolis, often planning spontaneous outings with a backpack full of snacks and a sketchbook.
  culinary: Tiffany Fisher is a picky yet adventurous eater who favors cheese‑laden pizza and macaroni‑and‑cheese, delights in assembling fruit kebabs with strawberries, grapes, and bananas, and they occasionally
    help stir pancake batter, though they routinely hide broccoli under a blanket of cheese.
  core: Tiffany Fisher is a curious, competitively spirited 7‑year‑old who blends imagination with practicality, often juggling half‑finished LEGO projects, pocket‑money jars, and spontaneous park adventures,
    while their relaxed attitude and occasional skepticism keep them both adaptable and a bit disorganized.
background:
  cultural: Tiffany is raised in a close‑knit African‑American family in West Philadelphia. Her grandparents share stories of the city’s rich Black history, and she often visits the African American Museum
    in Philadelphia with school field trips. Family gatherings feature soulful gospel music, call‑and‑response games, and traditional dishes like collard greens and cornbread. She attends a local church
    where she sings in the children’s choir, reinforcing a sense of community and cultural pride. The vibrant neighborhood, with murals celebrating Black leaders and community events such as Juneteenth
    celebrations and the annual Philly Summer Festival, shapes her identity and fuels her enthusiasm for learning about her heritage.
