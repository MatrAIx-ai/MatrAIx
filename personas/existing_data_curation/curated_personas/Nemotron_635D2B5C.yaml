  career_goals: Tiffany dreams of becoming a scientist‑engineer who builds things that help people, inspired by watching astronauts and engineers on TV. She wants to one day design rockets or create inventions
    that solve everyday problems for her neighborhood. She also imagines herself as a teacher who can share cool experiments with younger kids, blending her love of learning with a practical desire to help
    her community. Her competitive spirit fuels an ambition to win school science fairs and pursue STEM studies throughout middle school and beyond.
