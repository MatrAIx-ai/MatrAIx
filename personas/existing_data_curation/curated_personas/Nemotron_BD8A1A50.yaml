  career_goals: Kassidi aims to transition from full‑time management to a senior advisory role where she can mentor emerging leaders—especially women—in the hospitality sector. She plans to develop a structured
    mentorship program within her organization to ensure a smooth succession and sustain high standards of service. Additionally, she aspires to integrate sustainable, cost‑effective practices into operations,
    reduce stress through improved delegation, and eventually serve on the board of a local community nonprofit focused on historic preservation and tourism. Financial security for retirement and a legacy
    of disciplined, compassionate leadership drive her strategic ambitions.
