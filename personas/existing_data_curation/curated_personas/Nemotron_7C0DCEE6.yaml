personas:
  professional: Kim Kunihiro, a 16‑year‑old aspiring freelance illustrator in Los Angeles, blends digital mastery in Procreate and Photoshop with traditional watercolors to craft manga‑inspired visual narratives
    that explore anxiety and multicultural identity, while volunteering to run art workshops and juggling school assignments with a disciplined yet flexible schedule.
  sports: Kim Kunihiro enjoys casual weekend basketball pick‑up games at a neighborhood park and follows the Los Angeles Lakers and Dodgers for their visual storytelling on the court and field, while also
    practicing yoga to soothe anxiety and occasionally joining a school swim club for low‑impact cardio.
  arts: Kim Kunihiro immerses themselves in the works of manga legend Naoko Takeuchi, indie J‑pop duo YOASOBI, contemporary street artist Banksy, and Studio Ghibli’s Hayao Miyazaki, drawing inspiration
    for sketches and digital illustrations while frequenting LACMA and local galleries for fresh artistic perspectives.
  travel: Kim Kunihiro favors mindful, budget‑friendly travel, having explored Griffith Observatory, downtown Los Angeles’ murals, and a weekend road trip to San Diego, while dreaming of a cultural exchange
    in Kyoto to attend a calligraphy workshop and a future art pilgrimage to Paris’ Musée d’Orsay.
  culinary: Kim Kunihiro’s palate balances comfort foods like ramen and sushi with Los Angeles staples such as avocado toast and Korean BBQ tacos, cooking a modest tonkotsu ramen at home on weekends yet
    often opting for take‑out from a favorite neighborhood izakaya after marathon illustration sessions.
  core: Kim Kunihiro is a 16‑year‑old visual storyteller whose artistic curiosity and anxiety‑driven introspection fuel a habit of late‑night sketching, occasional overspending on supplies, and a relentless
    quest to blend multicultural narratives into every canvas.
background:
  cultural: Kim is a second‑generation Japanese‑American raised in Los Angeles. Her family blends traditional Japanese customs—such as celebrating Obon, preparing sushi at home, and speaking some Japanese—with
    the multicultural, creative atmosphere of Southern California. Growing up near the city's vibrant Asian community, she has been influenced by both Japanese pop culture (anime, manga, J‑pop) and the
    diverse local art scene, shaping a hybrid identity that values harmony, respect for elders, and artistic self‑expression.
attributes:
  skills: '[''Digital illustration'', ''Watercolor painting'', ''Sketching'', ''Basic HTML/CSS'', ''Active listening'', ''Empathy'', ''Conversational Japanese'']'
  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Museum visits'', ''Japanese pop music'', ''Calligraphy'', ''Reading graphic novels'', ''Journaling'', ''Mindfulness meditation'',
    ''Volunteering at community art workshops'']'
  career_goals: Kim aims to attend a specialized art program in high school and later study graphic design or visual storytelling at a university. She envisions a career as a freelance illustrator and concept
    artist, creating work that explores mental‑health themes and celebrates multicultural identities. In the long term, she hopes to combine her artistic talent with her personal experience of anxiety by
    becoming an art therapist or community art facilitator, helping others express themselves through creative media while honoring her Japanese‑American heritage.
