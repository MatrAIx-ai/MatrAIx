  hobbies: '["Playing soccer in community leagues", "DIY classic‑car restoration", "Cooking Mexican cuisine", "Hosting family and friends for dinner gatherings", "Attending local cultural festivals", "Volunteering
    for youth mentorship programs", "Listening to automotive technology podcasts", "Reading automotive magazines"]'
  career_goals: Victor aims to advance from parts salesperson to a senior parts manager within the next three years, overseeing a larger inventory and a team of sales associates. He plans to complete a
    bachelor’s degree in Business Administration to strengthen his strategic management skills. Long‑term, he hopes to become the director of parts for a regional dealership network or to launch his own
    independent auto‑parts store that emphasizes sustainable, high‑quality components. He is also interested in obtaining certified parts specialist credentials and mentoring younger employees in his community.
