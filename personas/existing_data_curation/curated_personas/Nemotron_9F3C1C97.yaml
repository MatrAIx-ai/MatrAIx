  hobbies: '[''LEGO building'', ''Scratch game creation'', ''Biking and hiking'', ''Soccer'', ''Reading graphic novels and sci‑fi books'', ''Minecraft redstone engineering'', ''Simple cooking'', ''School
    science club projects'']'
  career_goals: Mark dreams of turning his curiosity into a career that creates tangible solutions. He hopes to become a robotics or mechanical engineer who can design gadgets that make everyday tasks easier,
    such as smart bike accessories or eco‑friendly playground equipment. He also imagines developing simple video games that teach science concepts to kids. While he enjoys the idea of playing soccer at
    a high level, his primary ambition is to combine his love for building, coding, and problem‑solving into a future where he leads a small innovation lab or a community makerspace, encouraging other kids
    to experiment and create.
