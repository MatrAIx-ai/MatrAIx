personas:
  professional: An aspiring young engineer, Mark Carroll blends a love for LEGO mechanics with Scratch programming, turning spontaneous curiosity into practical mini‑robot projects that they proudly showcase
    in school science fairs.
  sports: Mark Carroll sprints across the neighborhood field as a forward for the Greenfield Tigers youth soccer club, pedals local trails on a mountain bike, and roots for the Chicago Cubs during weekend
    games, all while juggling a habit of forgetting to stretch after matches, which they sometimes overlook.
  arts: 'Mark Carroll devours graphic novels like ''Amulet'' and ''Bone'', streams animated series such as ''The Dragon Prince'' and ''Star Wars: The Clone Wars'', and crafts whimsical Minecraft soundtracks
    inspired by C418, letting these creative outlets shape their imaginative storytelling in Scratch, which they eagerly share with friends.'
  travel: Mark Carroll dreams of a summer road trip to the Grand Canyon after a family visit to the nearby science museum, but currently spends weekends exploring local hiking paths and camping under the
    stars, balancing adventure with school constraints, which they navigate with a flexible schedule.
  culinary: Mark Carroll whips up banana‑peanut butter smoothies and trail mix with almonds, pretzels, and chocolate chips for after‑soccer snacks, experimenting with simple recipes while still relying
    on pizza night as a go‑to comfort food, which they consider a tasty reward after a busy day.
  core: Mark Carroll is a curious 11‑year‑old who engineers LEGO contraptions, tackles Scratch games, and fumbles with organization while juggling soccer, snack experiments, and a pocket‑sized budget, which
    they manage with spontaneous optimism.
background:
  cultural: 'Mark grew up in a white, middle‑class family in Morganville, New Jersey, a suburban community within Monmouth County. His family’s cultural life reflects mainstream American traditions: celebrating
    Thanksgiving, the Fourth of July, and seasonal holidays, attending community events at the local library and recreation center, and participating in youth sports leagues. The region’s proximity to the
    diverse New York metropolitan area provides occasional exposure to a variety of cultural cuisines and celebrations, enriching his awareness of different backgrounds. His upbringing blends a practical,
    self‑reliant mindset with encouragement to explore curiosity, reflecting the typical suburban American values of independence, teamwork, and community involvement.'
attributes:
  skills: '[''LEGO building'', ''Scratch coding'', ''Reading comprehension'', ''Basic geometry and fractions'', ''Snap Circuits troubleshooting'', ''Team soccer coordination'', ''Natural observation (insects,
