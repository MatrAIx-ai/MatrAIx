personas:
  professional: Wilhelmina Sankar, a retired elementary and adult educator, channels decades of curriculum design and community outreach into a structured yet adaptable fellowship, mentors emerging teachers,
    and launches intergenerational reading circles, and they balance a love for predictable routines with a spontaneous flair for group activities.
  sports: Wilhelmina Sankar walks daily along the Chicago lakefront with the Lakefront Senior Walking Club, enjoys low‑impact fitness at the community center, avidly roots for the Chicago Cubs during baseball
    season, and they steer clear of high‑intensity sports, preferring gentle movement that suits their joints.
  arts: Wilhelmina Sankar sings in the church choir, dances to blues legends like B.B. King and soul icons such as Aretha Franklin at community gatherings, and they spend quiet evenings quilting to the
    rhythms of Duke Ellington, drawing inspiration from both music and classic literature.
  travel: Wilhelmina Sankar prefers short, leisurely trips that combine family visits and cultural enrichment, such as weekend getaways to historic Galena, an annual pilgrimage to Oak Park to explore Frank
    Lloyd Wright architecture, and a hopeful future river cruise on the Mississippi, and they plan these journeys around their church calendar and limited mobility.
  culinary: Wilhelmina Sankar delights in preparing Southern‑style comfort foods like collard greens, cornbread, and herb‑infused chicken stew using rosemary, thyme, and basil from their garden, and they
    cook at a modest skill level that emphasizes homey flavors and seasonal freshness.
  core: Wilhelmina Sankar blends a love for structured community service with a spontaneous, sociable spirit, often juggling choir rehearsals and garden duties while they occasionally misplace their reading
    glasses, embodying a warm, resilient, yet delightfully disorganized octogenarian.
background:
  cultural: Wilhelmina is an African American who grew up on Chicago's South Side during the post-World War II era, the child of parents who migrated from the rural South during the Great Migration. Her
    upbringing was shaped by the vibrant church community, neighborhood block parties, and the legacy of civil-rights activism in the city. She carries forward culinary traditions of Southern soul food,
    a love of gospel and blues music, and a deep respect for oral storytelling. Her identity is interwoven with the values of community resilience, education as a path to empowerment, and the collective
    memory of Chicago's Black neighborhoods.
