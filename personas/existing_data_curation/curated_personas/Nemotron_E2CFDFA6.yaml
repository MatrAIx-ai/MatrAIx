  hobbies: '["Church choir singing","Blues and gospel dancing","Community gardening","Traditional Southern cooking","Bridge club","Quilting circle","Storytelling sessions with youth","Walking along the
    lakefront","Reading historical fiction and memoirs","Scrapbooking family history"]'
  career_goals: Although retired, Wilhelmina remains driven to give back. She aims to mentor at least five emerging teachers each year through a retired-teachers fellowship, launch an intergenerational
    reading circle at her local library that pairs seniors with elementary students, and document the oral histories of Chicago's Black elders for the city's historical archive. She also hopes to write
    a memoir that captures her journey in education and the evolution of the African American community, contribute culturally responsive curriculum resources to Chicago Public Schools, and continue coordinating
    food drives and holiday events with her church's outreach ministry.
