  career_goals: Devin aims to advance to a store manager position within the next two years, leveraging his sales record and leadership capabilities. He aspires to develop a regional visual‑merchandising
    role where he can merge his artistic appreciation with retail strategy, eventually seeking a corporate training position to mentor new sales talent. Long‑term, he dreams of opening a boutique that showcases
    local artisans, combining his community ties with his love for art.
