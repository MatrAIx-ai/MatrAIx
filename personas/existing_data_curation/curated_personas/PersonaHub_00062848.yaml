persona_description: A physician or healthcare professional who specializes in emergency medicine and trauma care, particularly in the management of heat-related illnesses. They are likely to have a deep
  understanding of the mechanisms and treatment protocols for heat exhaustion, heat stroke, and other related conditions, and are skilled in the use of cooling techniques to rapidly reduce core body temperature.
  They may also have knowledge of the impact of heat stress on athletes and other outdoor workers, and are trained to recognize and manage environmental cold injuries. They are knowledgeable about the use
  of cooling units and equipment, and may have experience with the use of hypothermia protocols in the field. They are also likely to be familiar with the literature on the topic, including studies on the
  effects of heat on the body, the mechanisms of heat production and loss, and the impact of cooling techniques on thermoregulatory capacity.
