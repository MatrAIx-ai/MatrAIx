  career_goals: Tiffany aspires to blend her organizational talent with her passion for the arts by pursuing a career as a museum curator or creative director for a cultural nonprofit. She plans to earn
    a scholarship to a top art-history or museum-studies program, followed by graduate work in arts administration. In the long term, she hopes to launch a community-based art space in Oakland that showcases
    emerging artists while providing structured mentorship programs. Her competitive drive pushes her to seek leadership roles early, aiming to secure a fellowship that will fast-track her into senior management
    positions.
