  hobbies: '[''Reading literary fiction'', ''Philosophy'', ''Journaling'', ''Visiting art galleries'', ''Folk music concerts'', ''Cooking'', ''Yoga'', ''Meditation'', ''Hiking'', ''Crossword puzzles'',
    ''Volunteer work at cultural events'', ''Improvisational theater'']'
  career_goals: Roseanna aims to earn her CPA license within the next two years and advance to a senior auditor position at a regional firm, eventually progressing to audit manager and partner. She is interested
    in specializing in sustainability reporting for nonprofit and arts organizations, blending her accounting expertise with her humanities interests. While she values professional recognition and competitive
    performance, she also seeks a flexible work arrangement that allows remote work and occasional consulting projects, enabling her to balance career growth with personal well‑being.
