personas:
  professional: An ambitious auditor with a talent for weaving literary nuance into rigorous financial analysis, Roseanna Couch leverages deep GAAP expertise, advanced Excel and Tableau skills, and a pragmatic
    curiosity to produce audit reports that satisfy both regulatory demands and the storytelling sensibilities of nonprofit arts clients, while juggling a relaxed approach to deadlines that sometimes leaves
    their inbox messy.
  sports: A weekend hiker and yoga enthusiast, Roseanna Couch joins the Greenville Running Club for early morning trail runs in the Blue Ridge, roots for the Carolina Panthers and Clemson Tigers during
    football season, and occasionally attends Charleston Battery soccer matches, preferring low‑impact fitness that meshes with their love of nature and modest competitive edge.
  arts: A devoted patron of the arts, Roseanna Couch frequents Greenville’s Gallery 26 and the Peace Center, delights in the folk melodies of The Avett Brothers and Neko Case, enjoys improv nights with
    the local Lantern Players, and often quotes Toni Morrison and Simone de Beauvoir in their journal, weaving those influences into a personal aesthetic that balances curiosity and tradition.
  travel: A thoughtful explorer, Roseanna Couch prefers meticulously planned weekend getaways that blend hiking in Asheville’s Blue Ridge Mountains with culinary tours of New Orleans, while daydreaming
    about a longer pilgrimage through Portugal’s historic towns, balancing a modest travel budget with occasional splurges on boutique inns that offer yoga retreats.
  culinary: An adventurous home‑cook, Roseanna Couch fuses Southern staples like shrimp and grits with miso glaze and collard greens simmered in kimchi broth, often topping banana pudding with cardamom‑infused
    whipped cream, and while their skill level hovers between confident experimenter and occasional culinary disaster when juggling too many flavors at once.
  core: Roseanna Couch is a detail‑driven auditor with a literary soul, a yoga‑fueled stress‑battler, a competitive yet flexible planner, and an experimental chef whose penchant for late‑night crossword
    puzzles occasionally delays deadlines.
background:
  cultural: Roseanna grew up in a middle‑class family in the Greenville area of North Carolina, shaped by Southern customs such as hospitality, church community involvement, and a love for regional cuisine.
    Her upbringing combined rural sensibilities with the progressive environment of a liberal arts college, giving her a blend of traditional values and broader cultural awareness. While identifying as
    white and Southern, she embraces diverse literature, arts, and historical perspectives, reflecting the influence of her humanities education on her worldview.
attributes:
  skills: '[''Financial statement preparation'', ''Audit risk assessment'', ''Internal controls evaluation'', ''Tax compliance'', ''QuickBooks'', ''Sage 50'', ''Microsoft Dynamics'', ''Advanced Excel'',
