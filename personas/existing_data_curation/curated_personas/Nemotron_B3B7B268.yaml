  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Hiking'', ''Reading contemporary fiction'', ''Reading popular science'', ''Photography'', ''Organic gardening'', ''Cooking experimental recipes'',
    ''Attending local art fairs'', ''Volunteering at community library'']'
  career_goals: Sarah aims to re‑enter the workforce on her own terms by combining her scientific expertise with her love of art and community. She plans to launch a part‑time freelance science‑communication
    practice, creating blog posts, videos, and workshop curricula that explore the intersection of ecology and visual arts. In parallel, she hopes to establish a small, seasonal studio in Bemus Point where
    she can sell nature‑inspired handcrafted items while offering after‑school science‑art programs to local children. Her longer‑term ambition is to author a popular‑science book that weaves personal narratives,
    field observations, and artistic illustration, thereby fostering curiosity in a broader audience.
