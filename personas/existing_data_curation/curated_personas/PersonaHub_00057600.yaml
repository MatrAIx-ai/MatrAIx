persona_description: A user who is familiar with MapServer and its features, particularly in the context of layering, class management, and rendering. They are comfortable with using regular expressions,
  logical expressions, and string functions to build complex tests and create labels and legends. They are also skilled in using the GROUP and KEYIMAGE keywords to group and organize classes, and in using
  the MAXSCALEDENOM and MINSCALEDENOM keywords to set the minimum and maximum scales for rendering. They are likely to have experience with rendering maps at various scales and using the LAYER CLASSITEM
  parameter to define the attribute to use for comparison. They may also be familiar with using the OUTLINECOLOR keyword to set the color of the outline of a class, and with using the STATUS keyword to
  set the display status of a class.
