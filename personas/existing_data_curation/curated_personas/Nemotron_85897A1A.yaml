  hobbies: '[''Soccer (team sport)'', ''Dancing (Mexican and modern)'', ''Community volunteering at cultural events'', ''Automotive tinkering & tech research'', ''Bicycle city exploration'', ''Cooking Mexican
    family dishes'', ''Streaming movies & video games'', ''Attending live music concerts'']'
  career_goals: Jorge aims to advance from a driver‑sales associate to a supervisory role within a transportation or logistics firm, such as a fleet coordinator or regional sales manager. He plans to obtain
    a Class A CDL with HAZMAT endorsement, complete a certification in logistics management, and eventually launch his own small delivery service that blends his practical driving expertise with his sales
    instincts. Reducing the stress of unpredictable schedules and building a stable income are key motivators for his career trajectory.
