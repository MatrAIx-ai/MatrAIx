personas:
  professional: Max Johnson is an aspiring senior property manager who applies rigorous record‑keeping, systematic budgeting, and meticulous scheduling to community association oversight, while they channel
    their love of analytical puzzles into data‑driven decision making.
  sports: Max Johnson is a solitary runner who logs daily jogs on the River Trail, belongs to the River Trail Runners club, follows the Chicago Bulls and Chicago Cubs for their disciplined play, and they
    supplement cardio with bodyweight circuits to maintain core strength.
  arts: Max Johnson is a quiet enthusiast of modern architecture who studies Zaha Hadid and Frank Lloyd Wright, listens to ambient compositions by Brian Eno, and they spend evenings constructing architectural
    LEGO sets while watching design documentaries featuring Ken Burns.
  travel: Max Johnson is a methodical planner who prefers solo trips to structured destinations, has explored the orderly streets of Cambridge, UK and the efficient transit of Tokyo, Japan, and they aim
    to visit Munich, Germany to study its precision‑focused design, all while maintaining a detailed itinerary in a spreadsheet.
  culinary: Max Johnson is a precision‑focused home chef who specializes in sous‑vide cooking, frequently prepares steak au poivre with thyme‑infused butter and perfectly set egg yolks, sources premium
    Wagyu beef, fresh herbs, and vacuum‑seal bags, and they treat each recipe as a carefully timed workflow.
  core: Max Johnson is an 18‑year‑old who transforms solitary hobbies—puzzles, jogs, and sous‑vide dishes—into meticulously planned rituals, while they occasionally overlook social niceties like timely
    replies and regular flossing.
background:
  cultural: Max grew up in a middle‑class, white suburban family in Commack, Long Island, where community stability and personal responsibility are emphasized. His upbringing blended typical American values
    of self‑reliance with frequent exposure to homeowners association meetings through his parents, fostering an early awareness of property management and local regulations. The multicultural fabric of
    Suffolk County has given him a respectful appreciation for diverse neighborhoods, while his family’s focus on disciplined work ethic and academic achievement shaped his practical, achievement‑driven
    outlook.
attributes:
  skills: '[''Property Lease Administration'', ''Facility Maintenance Coordination'', ''Budget Development & Financial Reporting'', ''Regulatory Compliance (NY Real Estate Law, Building Codes)'', ''Tenant
