    ''Analytical Reporting (Excel, PowerBI basics)'']'
  hobbies: '[''Reading non‑fiction (finance, real estate, self‑improvement)'', ''Sudoku and crossword puzzles'', ''Architectural LEGO model building'', ''Solo jogging on local trails'', ''Precision cooking
    (sous‑vide, baking)'', ''Single‑player strategy video games (Civilization, city‑building)'', ''Basic Python programming for data analysis'']'
  career_goals: Max aims to become a senior property manager within the next five years, earning professional credentials such as Certified Property Manager (CPM) and Certified Manager of Community Associations
    (CMCA). He plans to deepen his expertise in PropTech tools and sustainable building practices to eventually lead a large homeowners association or a portfolio of residential complexes. In the longer
    term, Max aspires to launch his own property management firm that emphasizes data‑driven decision making and consistent, high‑standard service delivery, reflecting his personal drive for achievement
    and structured career progression.
