  hobbies: '["Hiking in Sonoma County", "Community cycling group rides", "Volunteering at Petaluma farmers market", "Women’s craft‑brewing club", "Woodworking projects", "Reading welding technical journals",
    "Beach volleyball", "Attending live music festivals", "Exploring local vineyards"]'
  career_goals: Cynthia aims to advance into a senior supervisory role where she can mentor the next generation of boilermakers and oversee large‑scale boiler installations. She plans to obtain Certified
    Welding Inspector (CWI) certification and pursue specialized training in automated welding and additive manufacturing for steel components. Long‑term, she envisions launching a consulting practice that
    offers safety audits and efficiency‑improvement services to industrial facilities throughout Northern California. Her competitive drive pushes her to achieve the highest safety record in her union and
    to be recognized as a leader in innovative, cost‑effective fabrication.
