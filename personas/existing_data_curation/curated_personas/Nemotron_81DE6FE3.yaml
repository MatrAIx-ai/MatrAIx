  career_goals: Laura aims to solidify the operational excellence of her current eatery by implementing a sustainable sourcing program and a mentorship pipeline for emerging supervisors, ensuring a smooth
    leadership transition as she gradually reduces her hours. Within the next three years, she hopes to launch a community‑focused culinary workshop series that shares her expertise in Southern and Italian
    home cooking, and eventually transition into a part‑time advisory role for local restaurants, allowing her to stay active in the industry while enjoying more time for family and personal pursuits.
