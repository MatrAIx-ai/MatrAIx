personas:
  professional: Carolina Rivera, a 27‑year‑old security surveillance officer at a bustling casino, leverages her STEM training, Python data‑extraction skills, and advanced video‑analytics platforms to meticulously
    monitor betting patterns, produce concise compliance reports, and chart a structured path toward senior security management and AI‑driven risk solutions.
  sports: Carolina Rivera runs daily along Barcelona’s Barceloneta shoreline, attends weekly yoga classes for flexibility, supports FC Barcelona in football and Bàsquet Manresa in basketball, and occasionally
    joins a local beach‑volleyball league to satisfy her competitive streak.
  arts: Carolina Rivera captures Barcelona sunsets and festival scenes with her Canon EOS, drawing inspiration from Steve McCurry’s storytelling, while expressing rhythm through salsa and bomba dances set
    to Celia Cruz and Bad Bunny, and occasionally attends performances by the National Ballet of Spain.
  travel: Carolina Rivera favors meticulously planned short escapes, having explored Lisbon’s historic alleyways, Marrakesh’s vibrant souks, and now eyeing a tech‑focused pilgrimage to Tokyo that blends
    an AI‑security conference with nighttime street‑photography expeditions.
  culinary: Carolina Rivera’s kitchen doubles as a culinary lab where she perfects mofongo with plantain crisps, arroz con gandules flavored with rich sofrito, and experiments with Mediterranean dishes
    like grilled octopus, often swapping recipes with friends over weekend brunch gatherings.
  core: Carolina Rivera melds rigorous analytical precision with a love for rhythm—whether decoding betting data, timing coastal jogs, or dancing salsa—balancing a structured, skeptical outlook with spontaneous
    creativity while staying emotionally resilient.
background:
  cultural: Carolina was raised in Barceloneta, a tight‑knit fishing town on Puerto Rico's northern coast, where family and community bonds are paramount. Her upbringing immersed her in Spanish language,
    Caribbean rhythms, and the island's festive traditions such as the patron saint festivals and Noche de San Juan. The local economy's blend of tourism, fishing, and gambling shaped her appreciation for
    both cultural heritage and modern industry. Fluent in both Spanish and English, she carries forward Puerto Rico's values of resilience, hospitality, and pride in local cuisine, while also embracing
    the island's growing tech and security sectors.
attributes:
  skills: '[''CCTV operation'', ''Video‑analytics software (Milestone, Genetec)'', ''Data analysis with Python and Excel'', ''Cybersecurity fundamentals'', ''Situational awareness'', ''Evidence documentation'',
    ''Report writing'', ''Bilingual communication (Spanish/English)'', ''Conflict de‑escalation'', ''Physical security procedures'', ''First aid and CPR'', ''Knowledge of Puerto Rican gaming regulations'']'
  hobbies: '[''Coastal jogging'', ''Yoga'', ''Chess'', ''Puzzle solving'', ''Strategic video gaming'', ''Street photography'', ''Cooking traditional Puerto Rican dishes'', ''Salsa and bomba dancing'', ''Volunteering
    at safety workshops'', ''Reading mystery and true‑crime novels'']'
  career_goals: Carolina aims to progress from frontline surveillance officer to senior security manager within the next five years, overseeing a team of analysts and integrating AI‑driven monitoring tools
    into daily operations. She plans to obtain the Certified Protection Professional (CPP) credential and later the Certified Information Systems Security Professional (CISSP) to broaden her expertise into
    cyber‑security for gambling platforms. Long‑term, she envisions establishing a boutique security‑consulting firm that advises multiple casinos and entertainment venues across Puerto Rico, emphasizing
    data‑driven risk management and staff training.
