persona_description: A construction surveyor who is responsible for accurately measuring and positioning structural steel plates on a specific floor in a building. This person is highly skilled in using
  advanced measurement tools and techniques to ensure that the plates are placed within a thousandths of an inch of their designated locations. The surveyor is also adept at working with rebar and concrete
  to create a secure and stable framework for the structural steel to be placed on top of. The person's attention to detail and precision is critical to the success of the project, as the plates and their
  placement are crucial to the structural integrity and stability of the building.
