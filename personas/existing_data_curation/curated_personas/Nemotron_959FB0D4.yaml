personas:
  professional: Teresa Brown, a 30‑year‑old first‑line supervisor of office and administrative support staff, they blend their humanities‑infused communication skills with a relaxed, flexible leadership
    style, mentoring a small team through creative workflow solutions while occasionally misplacing meeting notes due to end‑of‑day disorganization.
  sports: Teresa Brown, a 30‑year‑old who enjoys solitary nature walks in Kisatchie National Forest, they follow the New Orleans Saints in the NFL and the LSU Tigers in college football, are a member of
    the Kisatchie Trail Runners hiking club, and they treat fitness as a low‑key, occasional activity rather than a regimented routine, preferring gentle trail jogging over organized team sports.
  arts: Teresa Brown, a 30‑year‑old avid visitor of the Louisiana Art & Science Museum, they attend intimate talks by local painter Emily Crouch, find inspiration in Monet’s impressionist water lilies and
    the jazz trumpet of Wynton Marsalis, and they spend weekend afternoons sketching the Red River while curating a personal collection of art‑themed poetry books.
  travel: Teresa Brown, a 30‑year‑old who favors flexible, solo road trips, they have explored the historic streets of Natchitoches, the oak‑lined squares of Savannah, and the adobe alleys of Santa Fe,
    while dreaming of a quiet sunrise in Kyoto, and they rely on spontaneous itinerary tweaks rather than rigid booking, often balancing travel with modest savings and occasional family responsibilities.
  culinary: Teresa Brown, a 30‑year‑old with an intermediate kitchen skill set, they enjoy preparing southern‑style shrimp étouffée with fresh okra and Andouille sausage, crafting a crispy catfish po'boy
    for weekend meals, and experimenting with bright flavors like citrus‑glazed carrots and fresh basil in their watercolor‑inspired plating.
  core: Teresa Brown, a 30‑year‑old who balances a love for quiet artistic pursuits with a habit of letting paperwork pile up, they navigate life with a relaxed, curiosity‑driven mindset that thrives on
    solitary walks, spontaneous watercolor sessions, and occasional bursts of organized chaos.
background:
  cultural: Teresa was raised in Alexandria, Louisiana, a city steeped in Southern hospitality and a blend of Creole, Cajun, and Anglo-American traditions. Her family’s roots trace back to early 20th-century
    migrants from the Midwest who settled in central Louisiana, giving her a cultural inheritance of modest, community-oriented values. Growing up, she experienced weekly church gatherings, local high-school
    football Saturdays, and annual festivals such as the Alexandria Mardi Gras celebrations, which sparked her early appreciation for regional art, music, and food. While she identifies as white, she embraces
    the multicultural tapestry of her hometown—drawing influence from the nearby Creole cuisine, the lingering French language traces in place names, and the storytelling traditions of Southern folklore,
    all of which inform her artistic curiosity and collaborative work style.
