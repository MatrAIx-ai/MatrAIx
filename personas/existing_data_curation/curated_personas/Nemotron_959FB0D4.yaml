  career_goals: Teresa aspires to move beyond supervisory duties into a mid-level management role such as Office Manager or Operations Coordinator, where she can shape organizational culture and introduce
    innovative workflow solutions. She is also considering a graduate certificate in arts administration to combine her love for the arts with her administrative expertise, potentially leading a community
    arts center or cultural programming office in central Louisiana. In the next five years she hopes to mentor emerging staff, champion employee‑wellness initiatives, and achieve a balanced career that
    leaves room for her personal creative projects.
