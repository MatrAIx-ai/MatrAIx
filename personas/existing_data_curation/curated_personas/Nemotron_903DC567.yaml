  career_goals: Richard aims to transition from a purely transactional role to one that leverages his experience and interests in a more community‑focused capacity. Over the next few years he hopes to take
    on a supervisory position within the store, overseeing staff scheduling, training programs, and store layout projects that incorporate his artistic sensibility. He also aspires to obtain a certification
    in small‑business consulting so he can mentor local entrepreneurs and perhaps volunteer as a financial literacy coach at the community center. Ultimately, he wants to blend his business acumen with
    his passion for the arts by helping to organize cultural events or exhibitions in Pryor, creating a bridge between commerce and community culture before he fully retires.
