  career_goals: At two years old, Ana does not have defined career goals yet, but she exhibits a natural curiosity about caring for others—she often pretends to feed her stuffed animals and enjoys helping
    her parents stir batter in the kitchen. These early signs hint at possible future interests in nurturing professions such as early childhood education, caregiving, or healthcare, where she can combine
    her practical, organized approach with her compassionate side.
