personas:
  professional: Ana Martinez is a budding sandbox architect who meticulously arranges building blocks into orderly patterns, turning play into a practice of structure and predictability, and they take pride
    in seeing each piece fit perfectly.
  sports: Ana Martinez enjoys structured play at the neighborhood park, where they swing on the swing set and kick a soft foam soccer ball as part of the “Tiny Kickers” kids’ club, preferring organized
    games over free‑form running.
  arts: Ana Martinez loves finger painting with bright colors, especially replicating the bold reds and blues of Henri Matisse’s cut‑outs, and they organize their crayons by hue before each creative session.
  travel: Ana Martinez favors short family outings to the local botanical garden’s butterfly pavilion, navigating stroller‑friendly paths with confidence, and they delight in predictable routines like feeding
    the fish at the pond.
  culinary: Ana Martinez prefers smooth pureed carrots and banana bites, insisting on exact spoonful sizes and a consistent temperature, though they occasionally sneak a taste of their parent’s spicy salsa
    when left unattended.
  core: Ana Martinez, a two‑year‑old with a natural inclination for order, transforms everyday routines—from block building to coin sorting—into miniature projects, and they balance curiosity with a steadfast
    need for predictability.
background:
  cultural: Ana is a second‑generation Salvadoran‑American raised in Philadelphia. At home she hears Spanish, celebrates Salvadoran traditions such as Día de los Farolitos, and enjoys family dishes like
    pupusas and tamales. She participates in community events at the local Latino cultural center, blending Salvadoran family customs with the diverse urban culture of Philadelphia. This bicultural environment
    shapes her worldview, language use, culinary tastes, and appreciation for both Hispanic and broader American cultural practices.
