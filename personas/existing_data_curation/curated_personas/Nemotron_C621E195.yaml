  hobbies: '[''Crocheting'', ''Quilting'', ''Gardening'', ''Cooking Colombian cuisine'', ''Attending church services'', ''Listening to 1960s boleros'', ''Community volunteer work'', ''Walking in local parks'']'
  career_goals: Rafaela aims to transition toward a mentorship role within her workplace, teaching younger colleagues the craft of sewing and emphasizing the importance of consistency and care. She also
    hopes to volunteer her sewing skills for community charities, such as creating blankets for local shelters. Financially, she seeks to maintain a stable retirement income through part‑time consulting
    and occasional custom garment orders, while preserving her health through a balanced routine.
