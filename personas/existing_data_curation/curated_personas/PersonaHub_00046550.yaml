persona_description: A Cardiologist who specializes in the analysis and interpretation of electrocardiograms (ECGs), particularly in the interpretation of chest leads (V1 to V6) and their deflections. They
  have a keen interest in the principles of galvanometer writing and the graphical representation of vectorial currents. They are skilled in the use of advanced cardiac imaging techniques such as echocardiography
  and MRI to diagnose and manage cardiac conditions. They have a deep understanding of the anatomy and physiology of the heart and are adept at interpreting ECGs in various clinical settings.
