  career_goals: Michael’s imagination is already forming future ambitions. He frequently talks about becoming an astronaut to explore new ideas and a firefighter to help others, showing his competitive
    drive to excel in challenging roles. He also dreams of being an engineer or inventor, motivated by a desire to create practical solutions and lead projects. While his goals are rooted in childlike wonder,
    they reflect a budding ambition to learn, master skills, and contribute meaningfully to his community.
