persona_description: A scientist at the Max Delbrück Center for Molecular Medicine (MDC) Berlin-Buch who specializes in the study of neural tube defects, specifically the malformation of the forebrain called
  holoprosencephaly (HPE). Her research focuses on understanding the molecular mechanisms underlying this malformation and the role of cholesterol in controlling the development of the neural tube. She
  is particularly interested in the receptor LRP2, which is formed in the neural tube and binds lipoproteins, and its role in driving the accumulation of SHH and inducing the development of the forebrain
  structures. Her work has implications for understanding the genetic and environmental factors that contribute to HPE and the potential treatment options for affected individuals.
