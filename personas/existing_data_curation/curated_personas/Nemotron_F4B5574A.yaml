personas:
  professional: Gianna Jones, a retired community organizer with a humanities background, leverages their knack for structuring events, clear communication, and empathetic mentorship to lead intergenerational
    arts workshops and local oral‑history projects, while they also let spontaneity keep gatherings lively and inclusive.
  sports: Gianna Jones stays active by hiking the trails of Rankin County with the local Rankin County Trail Club, cheering on the Mississippi State Bulldogs football team and the New Orleans Saints, while
    they occasionally join a friendly softball league at the community center during spring.
  arts: Gianna Jones immerses herself in the arts through singing gospel hymns with her church choir, knitting scarves while listening to Aretha Franklin and B.B. King, and discussing classics ranging from
    Jane Austen to Toni Morrison in her book club, allowing their creative spirit to weave community narratives into personal expression, and they often share these stories at neighborhood gatherings.
  travel: Gianna Jones prefers road‑trip adventures that blend heritage exploration with family bonding, revisiting historic towns like Natchez and Savannah, planning future visits to the Blue Ridge Parkway
    and a literary pilgrimage to Paris, all while they balance travel costs within a fixed family vacation budget.
  culinary: Gianna Jones delights in cooking classic Southern dishes such as shrimp and grits, collard greens, and pecan pie, seasoning them with fresh herbs from her garden like rosemary and thyme, and
    they enjoy sharing these meals at neighborhood potlucks while savoring sweet tea and homemade buttermilk biscuits.
  core: Gianna Jones blends garden‑grown flavors, community storytelling, and a love for spontaneous gatherings into a structured yet flexible life, all while they occasionally misplace knitting needles
    and overcommit to volunteer projects.
background:
  cultural: Gianna is a White Southern, raised in Mississippi within a middle‑class family deeply rooted in Baptist traditions. Her upbringing emphasized Southern hospitality, community service, and a love
    for regional customs such as gospel music, soul food, and storytelling. A bachelor's degree in the humanities broadened her appreciation for literature, art, and cultural preservation, which she now
    integrates into her volunteer work and everyday life, balancing respect for tradition with an openness to new experiences.
