  hobbies: '[''Gardening'', ''Cooking'', ''Knitting'', ''Book club'', ''Church choir singing'', ''Animal shelter volunteering'', ''Hiking'', ''Photography'', ''Family road trips'']'
  career_goals: Now retired, Gianna aims to deepen her impact in Brandon by leading intergenerational arts workshops, documenting local history through oral‑history projects, and eventually publishing a
    memoir that weaves her family’s Southern heritage with broader cultural reflections. She plans to improve her digital photography skills to visually capture community life, continue fundraising for
    the local community center, and sustain a balanced routine that honors both her need for structure and her love of spontaneous social gatherings. Personal health, lifelong learning, and nurturing her
    marriage are also central ambitions.
