personas:
  professional: Xin To, a 15‑year‑old high‑school student in Portland, lets their curiosity and love for unconventional narratives drive them toward becoming an aspiring illustrator, spending afternoons
    sketching park scenery and manga‑inspired characters while hoping to build a freelance portfolio that blends street‑mural aesthetics with lo‑fi album art.
  sports: Xin To enjoys weekend hikes through the Columbia River Gorge, follows the Portland Timbers and Trail Blazers religiously, and participates in a local youth outdoor club that organizes casual trail
    runs and community garden physical activity sessions, which they find both grounding and socially rewarding.
  arts: Xin To spends afternoons sketching in Portland’s parklands, draws inspiration from muralist Shepard Fairey, graphic novelists like Alan Moore and manga such as One Piece, composes lo‑fi ukulele
    melodies reminiscent of Jack Johnson, and attends local art walks to soak in the city’s vibrant creative scene, which they cherish as a quiet social outlet.
  travel: Xin To prefers spontaneous low‑budget trips to nearby nature spots like Oregon’s coast and Mt. Hood, has already visited Seattle’s Pike Place Market and plans a future adventure to Tokyo’s Akihabara
    for manga pilgrimages, and they relish the unpredictability of each journey while balancing a school schedule and limited family finances.
  culinary: Xin To experiments with simple Asian‑inspired dishes at home, often whipping up stir‑fried noodles with ginger, soy sauce and tofu, rolling basic sushi rolls with cucumber and avocado, perfecting
    a quick miso soup, and they delight in sharing the meals with close friends despite still mastering the art of seasoning.
  core: Xin To is a quiet, art‑obsessed teen who balances sketch‑filled park afternoons with ukulele meditation, anxious introspection, and a habit of impulsively buying graphic novels.
background:
  cultural: Xin is a second‑generation East Asian American whose parents immigrated from China, bringing with them traditions such as celebrating Lunar New Year, honoring family elders, and emphasizing
    communal harmony. Growing up in Portland's multicultural neighborhoods, he has blended these cultural values with the city's progressive arts scene, participating in local cultural festivals and community
    art projects. His bilingual upbringing and respect for both his heritage and the diverse environment have shaped his compassionate outlook and his appreciation for varied artistic expressions.
