  career_goals: Xin aspires to attend a specialized arts high school and later earn a Bachelor of Fine Arts in illustration, with the long‑term goal of becoming a community‑focused visual storyteller. He
    envisions creating graphic novels and editorial artwork that raise awareness about teen mental health and promote empathy, blending his artistic passion with his desire to help others. He also hopes
    to develop workshops that use art as a therapeutic tool, allowing him to nurture harmony while maintaining the flexible, creative workflow he values.
