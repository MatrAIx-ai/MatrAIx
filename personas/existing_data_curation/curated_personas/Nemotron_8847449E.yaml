  career_goals: Keyla aims to transition into a senior leadership role such as Procurement Manager or Director of Purchasing within the next few years, focusing on implementing more structured, sustainable
    procurement processes that reduce operational stress for her team. She plans to earn the Certified Professional in Supply Management (CPSM) credential and to champion supplier diversity by increasing
    participation of Latin American vendors. She also wishes to mentor younger colleagues, share her expertise through part‑time teaching at a community college, and eventually serve as a consultant helping
    small businesses develop efficient purchasing strategies.
