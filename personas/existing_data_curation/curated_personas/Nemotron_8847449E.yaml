personas:
  professional: Keyla Rodriguez, a seasoned procurement specialist with deep expertise in SAP and Oracle, leverages her methodical planning, bilingual negotiation skills, and sociable charisma to streamline
    supplier contracts while championing Latin American vendor diversity on her path to a director role.
  sports: Keyla Rodriguez stays active with daily brisk walks through Flushing Meadows Corona Park, joins a senior badminton club at the local recreation center, and roots for the New York Mets and Knicks
    while cheering from her balcony during the baseball and basketball seasons.
  arts: Keyla Rodriguez channels her sociable energy into coordinating salsa and cumbia workshops at the cultural center, while she relaxes with historical fiction novels by Hilary Mantel and tunes in to
    classic Latin singers like Mercedes Sosa and contemporary guitarist Carlos Vives.
  travel: Keyla Rodriguez plans her trips with a detailed itinerary, spending her yearly vacation visiting relatives in the Andean highlands of Ecuador and later exploring historic sites in Spain’s Andalusia,
    balancing cultural immersion with leisurely garden walks while keeping travel costs within her modest budget.
  culinary: Keyla Rodriguez, an adept home chef, delights in preparing ceviche with fresh citrus‑marinated fish, empanadas stuffed with seasoned beef and plantain, and arroz con menestra flavored with cumin,
    cilantro, and achiote, while cultivating herbs like cilantro and epazote on her balcony for a farm‑to‑table touch.
  core: Keyla Rodriguez blends meticulous organization with a gregarious spirit, juggling supplier contracts, community festivals, and garden herbs, all while wrestling with a habit of over‑worrying that
    fuels her relentless pursuit of structure.
background:
  cultural: Keyla was born to Ecuadorian immigrant parents who settled in Queens in the 1970s. She grew up speaking Spanish at home and celebrating Ecuadorian traditions such as Carnaval, Día de los Difuntos,
    and Independence Day with family gatherings, music, and folk dances. Her Catholic upbringing influences her values of community, humility, and respect for elders. She remains active in the Ecuadorian-American
    community in Rego Park, participating in local cultural festivals, supporting Ecuadorian artisans, and serving as a liaison for Spanish‑speaking vendors. Her bicultural experience informs her inclusive
    approach to work and social interactions.
