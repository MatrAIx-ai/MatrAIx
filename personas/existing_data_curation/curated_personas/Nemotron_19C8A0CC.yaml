  career_goals: Nilda aims to earn her Certified Public Accountant (CPA) license within the next three years and advance from a junior accountant to a senior audit role at a reputable firm. She is determined
    to lead audit engagements, specialize in forensic accounting, and eventually move into a managerial position overseeing a team of auditors. Long‑term, she envisions a stable career path that balances
    the routine she values with opportunities for professional recognition and leadership in the finance sector.
