  hobbies: '["Building block towers", "Dancing to children''s music", "Singing nursery rhymes with friends", "Drawing pictures of animals", "Pretend play doctor/nurse", "Exploring nature and collecting
    leaves", "Group storytime at the library", "Playing simple board games (Candy Land)"]'
  career_goals: Robin often talks about wanting to help people when she grows up. She dreams of becoming a teacher who can guide younger children, a veterinarian who cares for animals, or a community helper
    who makes sure everyone feels safe and happy. Her ambitions are rooted in her compassionate nature and desire to maintain harmony, combined with her practical curiosity about how things work.
