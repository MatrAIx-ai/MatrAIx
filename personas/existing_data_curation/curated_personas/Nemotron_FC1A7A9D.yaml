  hobbies: '[''Abstract Painting'', ''Digital Illustration'', ''Modern Mexican Cooking'', ''Hiking in Orange County'', ''Community Youth Mentorship'', ''Science‑Fiction Reading'', ''Spoken‑Word Poetry Events'',
    ''Salsa Dancing'']'
  career_goals: Felix aims to transition into a supervisory role within the next two years, leveraging his reliability and leadership instincts to manage a customer experience team. He plans to complete
    his bachelor's degree in Business Administration with a focus on Organizational Behavior, which will support his ambition to become a Customer Experience Manager. Long‑term, Felix envisions spearheading
    a multilingual support program that integrates cultural insights to improve satisfaction among diverse client bases, and he hopes to mentor younger professionals from the Mexican‑American community
    to foster inclusive workplace pathways.
