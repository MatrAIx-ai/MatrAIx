persona_description: A historian or an archaeologist who is interested in the history and geography of Florida, particularly the explorations of Juan Ponce de Leon. They are knowledgeable about the debate
  over the year 1512 versus 1513 as the year of Ponce de Leon's arrival in Florida and are familiar with the historical sources used by authors in the late 19th and early 20th centuries. They are also aware
  of the modern debate over the location of Ponce de Leon's landing and the various claims made by different regions on the east coast of Florida.
