personas:
  professional: Kiranmai Singh, a 44-year-old postsecondary business instructor, leverages their analytical acumen and cross-cultural communication skills to design curricula that fuse traditional theory
    with real-world sustainability and tech entrepreneurship projects while energizing students through dynamic workshops and community-based research collaborations.
  sports: Kiranmai Singh, an avid participant in the San Antonio Hill Country Hiking Club, follows the Spurs during basketball season, supports San Antonio FC in the USL, joins a community soccer league
    on weekends, and they balance these pursuits with regular yoga practice to maintain flexibility and stress relief.
  arts: Kiranmai Singh energizes their artistic side by performing in a local Bollywood dance troupe set to A.R. Rahman's scores, attends monthly theatre nights featuring works by contemporary playwrights,
    devours novels by Chimamanda Ngozi Adichie and Haruki Murakami, and they curate playlists that mingle classic Bollywood hits with indie folk artists like Fleet Foxes.
  travel: Kiranmai Singh blends structured itineraries with spontaneous cultural immersion, having explored business hubs in Singapore and sustainability projects in Denmark, cherished a road-trip through
    the Southwestern US to visit national parks, and they now dream of a study-tour of entrepreneurial ecosystems in Nairobi while budgeting trips around family commitments.
  culinary: Kiranmai Singh, a confident home chef, hosts lively cooking gatherings featuring aromatic biryani, tangy chana masala, and smoky Texas-style brisket, meticulously layers spices like cumin, cardamom,
    and smoked paprika, yet they occasionally over-salt dishes when juggling event prep and work stress.
  core: Kiranmai Singh thrives on connecting people through food and dance, channels their worry into meticulous planning, yet they can’t resist a nightly cup of chai while endlessly scrolling through grant
    opportunities.
background:
  cultural: Kiranmai comes from a South Asian family originally rooted in the Punjab region of India, where she was raised in a household that valued education, community, and cultural tradition. Fluent
    in English and Punjabi, she celebrates Diwali, Vaisakhi, and other festivals, keeping familial customs alive while embracing the multicultural environment of San Antonio. The blend of South Asian heritage
    with Texan influences shapes her inclusive worldview, fostering a respect for diverse perspectives and a commitment to bridging cultural gaps through education and community engagement.
attributes:
  skills: '[''Curriculum Development'', ''Adult Learning Theory'', ''Strategic Business Planning'', ''Financial Analysis'', ''Project Management'', ''Cross-cultural Communication'', ''Online Teaching Platforms
    (Canvas, Blackboard)'', ''Student Advising'', ''Public Speaking'', ''Grant Writing'']'
  hobbies: '[''Cooking South Asian Cuisine'', ''Community Volunteer Work'', ''Hiking in Hill Country'', ''Bollywood Dance Classes'', ''Reading Contemporary Fiction'', ''Yoga and Mindfulness'', ''Traveling
    to explore global business practices'']'
  career_goals: Kiranmai aims to advance to a senior faculty role, eventually becoming department chair or program director for a business entrepreneurship concentration. She plans to develop interdisciplinary
    courses that integrate sustainability, technology, and social impact, positioning her institution as a hub for innovative business education. A key ambition is to secure research funding for community‑based
    entrepreneurship studies, publish case studies on local startups, and mentor first‑generation college students from underrepresented backgrounds. She also seeks to expand partnerships with local businesses
    and nonprofit organizations in San Antonio, fostering experiential learning opportunities that bridge academia and the regional economy.
