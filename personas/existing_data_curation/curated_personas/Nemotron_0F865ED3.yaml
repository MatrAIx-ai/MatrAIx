  career_goals: Shirley dreams of becoming a veterinarian or wildlife conservationist to help animals and protect nature. She also envisions a future as a teacher or counselor, where she can support other
    children and foster a harmonious environment. Ultimately, she aims to blend her curiosity about science with hands‑on ways to make a positive difference in her community.
