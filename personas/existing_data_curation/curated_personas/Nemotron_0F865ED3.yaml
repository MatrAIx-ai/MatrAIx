personas:
  professional: Shirley Coble is a budding junior scientist in her school’s science club, blending a curiosity for fantasy worlds with practical problem‑solving, and they often channel their compassion
    into group projects while struggling to keep lab notes organized.
  sports: Shirley Coble is a lively member of the Northwest Falls Youth Soccer Club, attends weekly practices, cheers for the Seattle Seahawks and Portland Timbers, enjoys spontaneous bike rides through
    the Columbia River Gorge, and uses a local community recreation center for swimming, though they often forget to bring a water bottle.
  arts: Shirley Coble is an avid illustrator who sketches fantasy characters inspired by J.K. Rowling and Studio Ghibli, practices piano pieces like Debussy’s “Clair de Lune,” and delights in crafting Minecraft
    sculptures, though they sometimes leave their drawing supplies scattered around the living room.
  travel: Shirley Coble loves spontaneous weekend trips to nearby places like the Columbia River Gorge, the Oregon Coast, and occasional family vacations to Vancouver’s Capilano Suspension Bridge or Kyoto’s
    historic temples, preferring nature hikes over amusement parks but limited by school schedules.
  culinary: Shirley Coble enjoys helping make mac and cheese with sharp cheddar, loves fresh strawberries in a strawberry shortcake, favors grilled salmon with lemon and garlic, experiments with honey‑roasted
    carrots, and often forgets to wash their hands before cooking.
  core: Shirley Coble is a compassionate, curious ten‑year‑old who balances fantasy‑filled imagination with a love for outdoor adventure, yet often wrestles with organization and occasional worries.
background:
  cultural: Shirley is raised in a white, middle‑class family in Vancouver, Washington, immersed in Pacific Northwest suburban culture. She celebrates typical American holidays such as Thanksgiving and
    the Fourth of July, enjoys regional activities like hiking in the Columbia River Gorge, and participates in community events like the Clark County Fair. Her family values education, outdoor recreation,
    and volunteerism, which nurture her compassionate and cooperative nature.
