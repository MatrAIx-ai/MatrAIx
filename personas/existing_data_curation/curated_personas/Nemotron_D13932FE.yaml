  career_goals: Shane aims to progress to a district managerial role within the next three to five years, overseeing several stores and implementing innovative visual‑merchandising concepts that fuse local
    art with retail strategy. He also dreams of eventually launching his own boutique that highlights regional artists while offering curated retail experiences. Developing stronger organizational habits
    and stress‑management techniques are personal goals to support his professional growth.
