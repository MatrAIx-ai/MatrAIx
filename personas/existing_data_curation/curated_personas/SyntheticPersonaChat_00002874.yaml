    User 1: They''re pretty interesting. They''re not regulated by any government, so they''re not like regular currency.

    User 2: That sounds like it could be a problem.

    User 1: It can be, but it can also be a good thing. It means that they''re not subject to the same kind of inflation that regular currency is.

    User 2: I see. So, what do you do with them?

    User 1: You can use them to buy things online.

    User 2: Oh, okay. That makes sense.

    User 1: Yeah, they''re pretty cool.

    User 2: I''ll have to learn more about them.

    User 1: You should. They''re pretty interesting.'
