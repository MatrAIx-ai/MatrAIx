  career_goals: Zion aims to transition into a senior technical leadership role where he can shape product strategy for educational technology solutions. He aspires to become a lead architect or engineering
    manager, guiding cross‑functional teams to deliver high‑impact learning platforms. Over the next five years, he hopes to obtain a Scrum Master certification and speak at regional tech conferences, sharing
    insights on integrating pedagogy with software design. He also envisions launching a community coding boot‑camp in Cullman to mentor high‑school students, using his combined expertise in education and
    software development to create a lasting legacy.
