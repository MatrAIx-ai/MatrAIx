  career_goals: Aaron aspires to advance from a clerk role to a supervisory or management position within the billing department, aiming to obtain a Certified Billing and Coding Specialist credential and
    possibly an associate degree in business administration. He also hopes to blend his love for the arts with his professional experience by leading financial operations for a local museum or cultural
    nonprofit, where he could contribute to programming and community outreach. In the longer term, he envisions developing a part‑time community art workshop series that provides low‑cost classes while
    still maintaining a stable career in finance.
