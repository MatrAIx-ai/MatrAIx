  hobbies: '[''Gardening'', ''Knitting'', ''Traditional South Asian cooking'', ''Reading spiritual and historical literature'', ''Walking in the Cleveland Metroparks'', ''Listening to classical Indian music'',
    ''Volunteering at the local community center'']'
  career_goals: Approaching retirement, Anuradha’s primary career goal is to secure a stable, well‑compensated position that will support a comfortable pension and health benefits. She aims to transition
    into a supervisory or lead‑trainer role where she can formalize her mentoring skills, promote a culture of safety, and help streamline processes for younger staff. Additionally, she hopes to volunteer
    her expertise in local vocational programs, offering workshops on workplace safety and basic machining skills for community members seeking entry‑level jobs.
