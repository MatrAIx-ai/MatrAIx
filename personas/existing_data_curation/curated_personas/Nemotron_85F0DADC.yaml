  career_goals: Cindy dreams of working with animals and nature when she grows up. She imagines herself as a veterinarian or a wildlife biologist, inspired by the farm life around her and the animals she
    cares for. She also enjoys helping people, so she thinks about becoming a teacher who can share her love of science and the outdoors. While she sometimes worries about the future, her curiosity and
    practical mindset keep her motivated to explore different possibilities.
