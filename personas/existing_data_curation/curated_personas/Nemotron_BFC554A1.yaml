  hobbies: '[''drawing and coloring'', ''watercolor painting'', ''building with blocks and Lego'', ''singing and dancing in groups'', ''storytime at the library'', ''nature walks and collecting natural
    objects'', ''preschool art classes'', ''helping set up community craft events'']'
  career_goals: Even at five, Rita often talks about growing up to be someone who can both create beautiful things and help others. She dreams of becoming an art teacher or a community artist who leads
    collaborative murals and workshops for children, blending her love for creativity with her desire to foster harmony and compassion in her community. She also imagines helping people in other ways—perhaps
    as a nurse or a teacher—where she can use her organized nature and high standards to make a positive difference.
