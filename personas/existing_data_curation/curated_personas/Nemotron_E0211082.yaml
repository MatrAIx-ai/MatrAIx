personas:
  professional: Lynda Robinson, an aspiring graphic designer and digital media enthusiast, blends self‑taught Photoshop, Canva, and basic HTML/CSS skills with a love for desert‑sunset photography and sketching,
    while their laid‑back yet curious nature lets them thrive in flexible freelance projects and community after‑school mentorship, even if they sometimes forget deadlines.
  sports: Lynda Robinson enjoys low‑key fitness like weekend hikes in Red Rock Canyon with the local Red Rock Hiking Club, occasional yoga sessions at the community center, and roots for the Vegas Golden
    Knights and Las Vegas Raiders, preferring the flexibility of walking trails over organized team sports.
  arts: Lynda Robinson immerses themselves in creative expression by sketching original characters while listening to indie artists like Phoebe Bridgers, Tame Impala, and Mitski, curating a personal collection
    of speculative fiction from Neil Gaiman and Ursula Le Guin, and frequenting local art‑shop pop‑ups that showcase street‑art influences from Banksy and animated storytelling inspired by Hayao Miyazaki.
  travel: Lynda Robinson prefers spontaneous, budget‑friendly trips, often road‑tripping to nearby wonders like the Grand Canyon, Sedona, and Zion National Park, while dreaming of a future backpacking adventure
    in Japan’s anime districts and the historic streets of Barcelona, planning just enough to secure transportation but leaving room for last‑minute detours.
  culinary: Lynda Robinson, a modest home‑cook, enjoys whipping up quick, nutritious meals such as avocado‑lime quinoa bowls, black bean tacos with fresh cilantro and pico de gallo, and tomato‑basil bruschetta
    using herbs from their backyard garden, though they sometimes forget to clean the cutting board, resulting in a perpetually cluttered kitchen counter.
  core: Lynda Robinson is a creatively curious teen who merges sketching, desert photography, and DIY tech with a relaxed, slightly disorganized vibe, always balancing school, art, and garden while nurturing
    a cooperative spirit.
background:
  cultural: Lynda grew up in a middle‑class suburban neighborhood of Las Vegas, Nevada, within a predominantly Anglo‑American household. Her family observes typical American traditions such as Thanksgiving,
    the Fourth of July, and holiday celebrations that blend suburban customs with the city’s entertainment culture. The multicultural, tourist‑driven atmosphere of Las Vegas has given her a relaxed openness
    toward diverse people, and she has picked up a few Spanish phrases from classmates and community interactions. The surrounding desert landscape nurtures an appreciation for outdoor activities like hiking
    and gardening, while the city’s vibrant nightlife and neon aesthetic subtly influence her creative interests.
attributes:
  skills: '[''Photo and video editing with iMovie/Canva'', ''Graphic design for flyers and social media'', ''Basic HTML/CSS web development'', ''Babysitting and youth mentorship'', ''Household cooking and
    meal preparation'', ''Garden maintenance'', ''Conversational Spanish'', ''Customer service basics from community volunteering'']'
  hobbies: '[''Sketching and drawing'', ''Photography of desert and city scenes'', ''Reading speculative fiction'', ''DIY crafts and upcycling projects'', ''Puzzle and adventure video games'', ''Listening
    to indie/alternative music'', ''Gardening'', ''Hiking in Red Rock Canyon'', ''Board game nights with close friends'', ''Visiting museums and online tutorials'']'
  career_goals: Lynda plans to earn her GED within the next year and then enroll in a community‑college program focused on graphic design or digital media. She hopes to secure an internship with a local
    resort or entertainment venue, where she can apply her visual‑communication skills while learning the business side of hospitality. Long‑term, she aims to build a freelance design studio that offers
    flexible hours, allowing her to continue personal creative projects, support her family, and perhaps mentor other teens interested in tech and art. She also envisions occasional part‑time work at a
    youth center, combining her cooperative nature with community outreach.
