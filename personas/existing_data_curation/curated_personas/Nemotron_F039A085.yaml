  hobbies: '[''Cooking traditional Mexican meals'', ''Gardening in community plot'', ''Knitting and crocheting'', ''Reading historical novels'', ''Watching Mexican telenovelas'', ''Attending weekly Catholic
    mass'', ''Listening to corridos and Cajun zydeco'', ''Volunteering at local food bank'']'
  career_goals: At 61, Maritza’s primary ambition is to secure a stable position that allows her to continue contributing while gradually easing into a mentorship role. She hopes to become a lead packer
    or safety liaison, where she can formalize her training of younger colleagues and champion a culture of consistency and safety. Obtaining a forklift certification and completing a short safety-officer
    course are on her short-term checklist. Long-term, she envisions a phased retirement that includes part-time volunteer work at the local community center, helping senior residents navigate the food-distribution
    system she knows so well.
