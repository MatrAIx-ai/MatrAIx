persona_description: A passionate and knowledgeable advocate and explorer of the potential of the arts in healing and transformation, Cathy Malchiodi, a PhD in psychology, specializes in the use of expressive
  arts therapy for trauma recovery and community development. Her website and recent articles and interviews highlight her expertise in using color, sound, and movement to help people express themselves
  and heal from trauma. Malchiodi is also a founder of Art Therapy Without Borders and The Trauma Informed Practices and Expressive Arts Therapy Institute, and her work is featured on Psychology Today.
