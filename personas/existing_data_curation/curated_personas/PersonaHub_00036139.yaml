persona_description: A weather expert and climate scientist who is monitoring and forecasting weather conditions in the Central Pacific Basin. They are responsible for producing the Central Pacific hurricane
  outlook, which is a general guide to the overall seasonal hurricane activity in the central Pacific and does not predict whether, where, when, or how many of these systems will affect Hawaii. They are
  also responsible for continuously monitoring weather conditions, employing a network of satellites, land- and ocean-based sensors, and aircraft reconnaissance missions to supply information for complex
  computer modeling and human expertise that serves as the basis for the hurricane center’s track and intensity forecasts that extend out five days.
