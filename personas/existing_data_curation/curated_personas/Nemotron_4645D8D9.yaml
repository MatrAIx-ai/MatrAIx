  career_goals: Although retired from formal employment, Dorothy remains driven by a desire to leave an enduring cultural imprint on Blairstown. She aims to complete a series of large-scale abstract murals
    for the Warren County library, documenting the town’s history through symbolic imagery. She also intends to publish a memoir that weaves together her family’s lineage with reflections on art and community
    service. Within the next five years, she aspires to establish a mentorship program for youthful artists, leveraging her organizational expertise to secure grants and coordinate workshops. Finally, she
    seeks to master advanced digital illustration techniques, integrating them with her traditional mixed-media practice to create a groundbreaking exhibition.
