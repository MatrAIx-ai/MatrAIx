  career_goals: Although she is no longer part of the formal workforce, Elizabeth aims to deepen her impact in the Bedford community. She plans to serve on the board of the local senior center, where she
    can apply her budgeting expertise to help manage program funds. She also wishes to mentor younger women on financial literacy through workshops at the public library. On a personal level, she hopes
    to complete a certificate in nonprofit management to formalize her volunteer leadership, and she dreams of traveling with her husband to historic sites in New England while maintaining a balanced, structured
    lifestyle.
