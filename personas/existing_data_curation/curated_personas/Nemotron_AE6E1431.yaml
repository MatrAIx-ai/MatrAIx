  career_goals: Mary aspires to become a teacher or community mentor who can help younger students succeed. She also imagines working at the local library or as a youth basketball coach, roles that blend
    her love for structure, helping others, and teamwork. In the longer term, she is curious about becoming a veterinarian to care for animals she loves.
