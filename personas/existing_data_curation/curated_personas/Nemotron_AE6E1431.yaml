personas:
  professional: Mary Jamison, an aspiring basketball player who also sketches cartoon panels after school, blends her love for clear team rules with a spontaneous creative streak, making her a diligent
    but slightly disorganized on‑court strategist who thrives on predictable practice drills while dreaming up new characters during free moments.
  sports: Mary Jamison plays point guard for the Junior Tornadoes Basketball Club, idolizes the Los Angeles Lakers, and spends weekends sprinting laps with the local community center while keeping a flexible,
    low‑stress approach to fitness that favors fun over strict regimens.
  arts: Mary Jamison fills sketchbooks with cartoon scenes inspired by their neighborhood, devours graphic novels like *Saga* and *Spider‑Man*, and grooves to R&B icons Beyoncé and hip‑hop legends Kendrick Lamar,
    blending visual creativity with a soundtrack that fuels their imagination.
  travel: Mary Jamison has trekked the nearby bayous on family nature walks, explored the Everglades on a school field trip, and dreams of visiting the historic streets of New Orleans and the amusement
    parks of Orlando, always planning trips with a mix of structured itineraries and spontaneous detours.
  culinary: Mary Jamison helps their mom stir a rustic jambalaya of andouille sausage, shrimp, bell peppers, and rice, enjoys perfecting a simple peanut‑butter‑banana sandwich, and prefers hands‑on cooking
    lessons that let them taste while they master the kitchen at a beginner level.
  core: Mary Jamison balances structured team play with free‑form doodling, saves allowance in pockets of order and occasional impulse, and tackles health and hobbies with a calm, adaptable spirit.
background:
  cultural: Mary is an African‑American girl raised in Covington, Louisiana, a city known for its blend of Southern hospitality and Creole culture. Her family places a strong emphasis on church involvement,
    community events, and family gatherings centered around soul food and local dishes like gumbo and jambalaya. The rhythms of jazz, the festivities of Mardi Gras, and the oral storytelling tradition enrich
    her upbringing. These cultural touchstones, combined with the supportive neighborhood and a heritage of resilience, shape her identity and worldview.
