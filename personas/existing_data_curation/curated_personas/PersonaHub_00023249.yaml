persona_description: A French multinational corporation, Total, that is actively investing in carbon capture and storage (CCS) technology as a means to reduce greenhouse gas emissions. The company has been
  working on a project in Rousse, France, to capture and store CO2 in a porous sedimentary rock formation. Total is also involved in three other projects to research different technologies for carbon capture
  and storage, including the France-Nord scheme, the ArcelorMittal project, and the EDF-Allston project. The company is committed to reducing the costs associated with capturing and storing CO2 and is working
  towards the goal of neutralizing one-fifth of anthropogenic CO2 emissions by 2050.
