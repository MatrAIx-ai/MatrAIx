  hobbies: '[''Hiking'', ''Gardening'', ''Reading historical fiction'', ''Cooking'', ''Yoga'', ''Volunteer work at food pantry'', ''Antique furniture restoration'', ''Landscape photography'']'
  career_goals: Faye aspires to advance into a sales management role within the next three to five years, overseeing a regional team and shaping strategic sales initiatives for a niche product line. She
    plans to earn professional certifications such as the Certified Professional Sales Person (CPSP) and deepen her expertise in supply‑chain logistics. Long‑term, she envisions mentoring emerging sales
    talent—especially women—in her industry and may eventually launch her own small‑scale distribution business that reflects her commitment to reliable service and community values.
