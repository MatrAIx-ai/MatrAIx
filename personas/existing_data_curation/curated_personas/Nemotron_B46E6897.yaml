personas:
  professional: A seasoned correctional officer named Adrienne Gargan combines twelve years of hands‑on security experience with a people‑first mindset, expertly using conflict‑resolution and de‑escalation
    techniques while maintaining rigorous surveillance and precise report‑writing; their natural curiosity drives them to adopt emerging best practices, and despite a relaxed approach to paperwork that
    can leave a desk slightly disorganized, they aim to step into a shift‑lead role within five years to mentor peers and embed humane rehabilitation programs.
  sports: An outdoor‑oriented fitness enthusiast named Adrienne Gargan spends weekends hiking the rolling hills with the Coffee County Trail Club, enjoys early‑morning fishing trips on Tims Ford Lake, and
    follows the Tennessee Titans and Nashville Predators with faithful devotion, while also participating in a community softball league each summer that satisfies their love for friendly competition.
  arts: A Southern‑rooted arts lover named Adrienne Gargan finds solace in the storytelling of mystery authors Agatha Christie and Gillian Flynn, tunes into true‑crime podcasts like Criminology, and fills
    the house with the sounds of Dolly Parton, Chris Stapleton, and local bluegrass band The Gibson Brothers, while occasionally attending the community theater’s production of A Streetcar Named Desire,
    which nourishes her appreciation for narrative depth and emotional honesty.
  travel: A flexible road‑trip explorer named Adrienne Gargan prefers spontaneous itineraries, often driving the Appalachian backroads to the Great Smoky Mountains for weekend hikes, savoring Creole cuisine
    on a spur‑of‑the‑moment visit to New Orleans, and dreaming of a future cultural pilgrimage to Dublin to trace the roots of their ancestors, all while balancing travel with the occasional budget constraint
    that nudges them toward affordable cabin rentals.
  culinary: A home‑cooking storyteller named Adrienne Gargan delights in preparing Southern comfort classics such as fried chicken with a buttermilk brine, slow‑simmered chicken and dumplings, collard greens
    flavored with smoked ham hocks, buttery cornbread, and peach cobbler topped with toasted pecans, often harvesting fresh tomatoes, okra, and sweet potatoes from her garden, though she occasionally over‑salt
    a pot roast in her enthusiastic quest for bold flavor.
  core: Adrienne Gargan is a compassionate, curiosity‑driven correctional officer who balances Southern hospitality with a relaxed, sometimes disorganized approach to planning, channeling empathy into security
    work while indulging in spontaneous garden projects and mystery novels.
background:
  cultural: Adrienne is a white Southern woman raised in a small town near Tullahoma, Tennessee. Her family’s roots trace back to Anglo-American and Irish settlers who have lived in the region for generations.
    She grew up immersed in Southern hospitality, church life (Baptist), and community service, values that emphasized respect for law, family loyalty, and practical resilience. Local customs such as country-music
    gatherings, seasonal festivals, and home-cooked meals shaped her identity, while her natural curiosity drives her to explore new ideas and perspectives beyond her hometown.
