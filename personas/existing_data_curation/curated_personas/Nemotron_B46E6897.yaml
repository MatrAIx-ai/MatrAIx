  hobbies: '[''Hiking in the Tennessee hills'', ''Fishing at Tims Ford Lake'', ''Gardening'', ''Cooking Southern cuisine'', ''Reading mystery and true-crime books'', ''Listening to criminal-justice podcasts'',
