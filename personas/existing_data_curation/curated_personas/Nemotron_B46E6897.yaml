  career_goals: Adrienne aims to move into a supervisory role within the next five years, targeting a shift-lead or unit-manager position where she can mentor junior staff and influence policy. She hopes
    to champion rehabilitative programs that blend security with humane treatment, such as mentorship initiatives for at-risk inmates. To support these ambitions, she plans to earn an associate’s degree
    in criminal justice and obtain certification as a correctional counselor. Ultimately, she envisions a senior leadership role—deputy warden or director of inmate services—where she can shape a more compassionate
    and effective correctional system.
