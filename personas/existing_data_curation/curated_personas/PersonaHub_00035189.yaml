persona_description: A political activist and leader who has taken deliberate action on the distribution of public goods, particularly in the area of indigenous rights. Morales has overcome corruption scandals
  and has forged the ideas of a social movement into state building. He has a strong following among the grassroots leaders at the helm of the progressive movement and has a vision for the future of Bolivia.
  Morales' political vision is based on the idea that the current government is on the side of the people and that he is the guarantor of the democratic institutions.
