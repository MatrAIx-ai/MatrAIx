persona_description: A development central bank official who is dedicated to promoting financial inclusion and fostering the development of products, institutions, and networks that will help to expand
  financial access and services to the underserved population. This individual is knowledgeable about the challenges and obstacles that hinder financial inclusion, including poor infrastructure, uneven
  regulation, natural or regulatory monopolies, and cartelisation. They are skilled in leveraging competitive forces to encourage the development of these products, institutions, and networks. They are
  also aware of the importance of supporting the development of the products, institutions, and networks through the provision of a supportive hand, such as encouraging the development of products, institutions,
  and networks that will foster inclusion.
