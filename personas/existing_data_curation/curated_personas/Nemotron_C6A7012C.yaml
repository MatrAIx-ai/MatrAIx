personas:
  professional: Juan Dominguez, a methodical high school junior with a knack for Python scripting and Arduino tinkering, leverages their organized, curiosity‑driven mindset and bilingual communication to
    design small‑scale tech solutions for school projects and community apps, and they consistently meet deadlines while iterating on feedback.
  sports: Juan Dominguez, an occasional weekend soccer player in the North Dallas youth league who roots for FC Dallas and follows the Dallas Mavericks, balances their love for team sport with solitary
    fitness routines like jogging in the park and a disciplined habit of stretching after gaming sessions, and they value the camaraderie of small‑group matches.
  arts: Juan Dominguez, an avid digital creator who crafts sleek Canva graphics inspired by Aaron Draplin’s bold typographic style while blasting a mixtape of Bad Bunny, J Balvin, and Arctic Monkeys, also
    enjoys indie films by Greta Gerwig and spends quiet evenings sketching fan art of favorite video‑game characters, and they often share their creations online for feedback.
  travel: Juan Dominguez, who prefers meticulously planned weekend getaways over spontaneous backpacking, often explores nearby destinations like San Antonio and Galveston with family, and they dream of
    a future solo trip to Tokyo to experience its cutting‑edge tech culture.
  culinary: Juan Dominguez, a modest home‑cook who enjoys mastering traditional dishes like pupusas filled with cheese and pork and tamales seasoned with achiote, while also experimenting with sushi rolls
    featuring avocado and spicy mayo and perfecting a simple Margherita pizza topped with fresh basil, often pairing meals with homemade guacamole and a splash of cold horchata, and they relish the chance
    to blend heritage flavors with modern twists.
  core: Juan Dominguez, a quietly ambitious teen who can spend an entire night solving Portal puzzles or crafting Python scripts yet still makes time for soccer with friends and family‑style pupusa nights,
    all while habitually forgetting to set their alarm and relying on caffeine to stay alert, and they constantly chase the next challenge.
background:
  cultural: Juan is a second‑generation Salvadoran American born and raised in Dallas, Texas. His parents immigrated from El Salvador in the early 2000s, and Spanish is spoken at home alongside English.
    He grows up celebrating Salvadoran holidays such as Día de los Farolitos and the Feast of San Salvador, and he enjoys traditional foods like pupusas, yuca frita, and tamales. The Salvadoran community
    in Dallas, especially neighborhoods like Oak Cliff and Pleasant Grove, provides him with a strong sense of cultural identity and a supportive network. Juan balances family values of hard work, respect,
    and community service with the broader American cultural environment of his city, shaping both his personal outlook and his future aspirations.
