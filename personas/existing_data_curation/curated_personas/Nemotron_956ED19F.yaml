  career_goals: Though retired from formal employment, Huong aims to deepen her impact within the Santa Fe Springs community. She aspires to expand mentorship programs for local students interested in science
    and engineering, fostering a supportive pipeline for underrepresented groups. She also hopes to document and share traditional Southeast Asian recipes and stories through a community cookbook, preserving
    cultural heritage for future generations. Maintaining her health and emotional well-being remains a priority, guiding her to adopt gentle fitness practices and mindfulness techniques. Ultimately, Huong
    envisions herself as a trusted elder and resource, bridging generations through knowledge, care, and cultural continuity.
