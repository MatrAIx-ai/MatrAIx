personas:
  professional: Caroline Metz, an aspiring art‑therapy facilitator and community volunteer, weaves her self‑taught knowledge of art history and watercolor techniques with deep empathic listening to lead
    informal workshops, while her spontaneous, structure‑averse temperament often leads her to improvise lesson plans at the last minute, occasionally causing deadline stress.
  sports: Caroline Metz, a solo hiker who traverses the Rocky Mountains in summer and snowshoes through the foothills in winter, supplements her outdoor routine with weekly yoga classes, proudly wears a
    Denver Broncos cap, follows the Colorado Avalanche and Colorado Rockies, and occasionally joins the Rocky Mountain Hiking Society for guided weekend treks.
  arts: Caroline Metz spends evenings sketching in the style of Georgia O’Keeffe, draws inspiration from Frida Kahlo’s bold colors, attends intimate poetry readings featuring voices like Ocean Vuong, and
    curates eclectic playlists that swing from Sufjan Stevens to Miles Davis, while she often cites the surreal works of Salvador Dalí as a catalyst for her own watercolor experiments.
  travel: Caroline Metz favors low‑key, solo getaways that blend nature and culture, planning month‑long dreams of wandering Kyoto’s bamboo groves and exploring the vineyards of Tuscany, yet she routinely
    escapes to nearby Estes Park for weekend hikes and to Sedona’s red‑rock vistas when time or budget constraints arise.
  culinary: Caroline Metz delights in farm‑to‑table cooking, regularly preparing quinoa salads tossed with roasted beets, goat cheese, pistachios, and a drizzle of lemon‑thyme vinaigrette, has mastered
    a tangy sourdough starter she bakes into crusty loaves on Sundays, but often forgets to defrost her chicken thighs until the last minute, leading to hurried pan‑searing.
  core: Caroline Metz is a creatively restless 49‑year‑old who channels her wanderlust, worry, and love of art into watercolor prints, solo mountain hikes, and a modest online craft shop, while habitually
    battling last‑minute scrambling and the tendency to over‑commit socially.
background:
  cultural: Caroline grew up in a predominantly white, middle‑class neighborhood in the Denver metropolitan area. Her family’s roots trace back to German and Irish ancestry, and she was raised with values
    emphasizing self‑reliance, outdoor recreation, and respect for Colorado’s natural landscape. Living in Denver exposed her to a vibrant, multicultural arts scene and the cultural traditions of Native
    American and Hispanic communities, sparking her curiosity about diverse artistic expressions. She identifies strongly with the regional culture of the Rockies—valuing independence, an appreciation for
    nature, and a relaxed, informal lifestyle—while remaining open to incorporating broader cultural influences into her personal interests.
