  career_goals: Caroline hopes to re‑enter formal education by earning a GED and taking community‑college courses in art or counseling, with the long‑term aim of becoming a certified art‑therapy facilitator.
    In the near future, she plans to volunteer at a local art center to lead informal workshops for small groups, and to launch a modest online shop featuring her handmade watercolor prints and crafts.
    She seeks flexible, part‑time work that aligns with her creative interests and allows her to balance personal well‑being, while also developing healthier coping strategies for stress and worry.
