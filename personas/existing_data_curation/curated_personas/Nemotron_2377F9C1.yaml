personas:
  professional: Yamira Ruiz is an aspiring junior illustrator who translates her vivid imagination into fantastical creature sketches, turning school art projects into mini comic strips and meticulously
    organizing her LEGO creations alongside her drawings, and they often share their work with the after-school art club.
  sports: Yamira Ruiz enjoys kicking a soccer ball with the neighborhood Starfire youth team on Saturdays, practices basic gymnastics moves in the school gym, and they prefer playing in small, friendly
    scrimmages over large, noisy matches.
  arts: Yamira Ruiz immerses herself in creative expression by drawing intricate mandala designs, building narrative mini comics inspired by Studio Ghibli and Dr. Seuss, and dancing to traditional folk
    rhythms during community classes, while they collect limited-edition Pixar stickers as a personal art treasure.
  travel: Yamira Ruiz dreams of backpacking through the pine forests of the Pacific Northwest, has already visited the local aquarium and a weekend trip to the desert museum, and they favor trips with a
    clear itinerary that include time for sketching wildlife, though they sometimes get anxious about long flights.
  culinary: Yamira Ruiz loves helping in the kitchen, especially mastering the art of folding quesadillas stuffed with cheddar and sautéed peppers, mashing ripe avocados for guacamole, and they enjoy mixing
    mango chunks into yogurt smoothies while sprinkling cinnamon on their oatmeal.
  core: Yamira Ruiz is a vivid-imagined, quietly curious 7-year-old who channels anxiety into art, hoards glittery supplies, and they keep a meticulously organized piggy bank to fund future creations.
background:
  cultural: Yamira comes from a Mexican‑American family in Cerritos, California. Her parents speak Spanish at home and celebrate Mexican traditions such as Día de los Muertos, Las Posadas, and Mexican Independence
    Day, often blending them with local community festivals. She grew up listening to mariachi music, enjoying dishes like tacos, enchiladas, and tamales, and learning simple Spanish prayers and stories
    from her grandparents. The bicultural environment has fostered a strong sense of family, community, and pride in her heritage, while also exposing her to the diverse cultures of Los Angeles County,
    encouraging openness to new ideas and artistic expression.
