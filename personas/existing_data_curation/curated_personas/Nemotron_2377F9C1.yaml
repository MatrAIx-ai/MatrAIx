  career_goals: Although still young, Yamira dreams of growing up to become an illustrator and author of picture books that blend Mexican folklore with imaginative, abstract themes. She also imagines exploring
    careers in scientific illustration or designing educational media that make complex ideas accessible to children. In the future, she hopes to combine her love of art and curiosity about the natural
    world to become a museum educator or a science communicator.
