personas:
  professional: Franklin Lambert, a 22‑year‑old aspiring project coordinator, blends a modest grasp of Python and digital‑marketing basics with sharp organizational skills and an outgoing personality to
    deliver reliable, data‑informed results for sustainability‑focused start‑ups while carefully managing the stress of ambiguous expectations.
  sports: Franklin Lambert, a 22‑year‑old soccer enthusiast, plays in a local rec‑soccer league, cheers for the Denver Broncos and Colorado Avalanche, hikes with the Arvada Trail Club on weekends, and balances
    his fitness routine with occasional missed sessions when stress spikes.
  arts: Franklin Lambert, a 22‑year‑old board‑game aficionado, frequently hosts strategy game nights featuring titles like Terraforming Mars and Wingspan, binge‑watches documentaries such as "Our Planet"
    and "The Social Dilemma," and draws creative inspiration from indie folk artist Phoebe Bridgers.
  travel: Franklin Lambert, a 22‑year‑old who favors budget‑friendly adventure, often road‑trips to Rocky Mountain National Park and the Great Sand Dunes, plans weekend hikes with friends using a detailed
    spreadsheet, and dreams of backpacking through Iceland’s sustainable eco‑lodges once his career stabilizes.
  culinary: Franklin Lambert, a 22‑year‑old home‑cook, enjoys preparing simple yet nutritious meals like quinoa‑black bean bowls, avocado‑chickpea salads, and roasted sweet‑potato tacos, experimenting with
    seasonal Colorado produce while occasionally over‑seasoning dishes in a quest for bold flavors.
  core: Franklin Lambert, 22, channels a curiosity‑driven, socially vibrant but worry‑prone personality into organized projects, eco‑minded living, and a habit of over‑planning board‑game nights that sometimes
    spill over into late‑night snack catastrophes.
background:
  cultural: Franklin grew up in Arvada, a suburban community in Jefferson County, Colorado, surrounded by a blend of Mid‑Western and Rocky‑Mountain cultural influences. His family traces its roots to German
    and Irish immigrants, and their traditions emphasize self‑reliance, community involvement, and an appreciation for the outdoors. Local customs—like weekend hikes, neighborhood barbecues, and a strong
    emphasis on environmental stewardship—have shaped his values. He identifies with broader American cultural norms such as individualism and optimism while also feeling a strong connection to the collaborative,
    outdoors‑oriented spirit of the Denver metropolitan area.
