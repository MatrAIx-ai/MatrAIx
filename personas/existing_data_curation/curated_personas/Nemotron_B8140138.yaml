  career_goals: Franklin aims to secure a role that allows him to merge his curiosity for new ideas with a hands‑on, practical workflow. He is targeting entry‑level positions in project coordination or
    marketing within a sustainability‑focused start‑up or a mid‑size tech firm in the Denver‑Arvada area. He wants to develop a reputation for delivering organized, reliable results while still having room
    to explore innovative approaches. Recognizing his tendency toward worry, he plans to prioritize roles that offer clear expectations, supportive team dynamics, and opportunities for professional development
    to manage stress and build confidence.
