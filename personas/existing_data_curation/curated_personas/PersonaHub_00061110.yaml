persona_description: A radiologist who is interested in the study of medical imaging devices, particularly X-rays and radioactive objects, and the interpretation of medical images to diagnose and treat
  diseases. They are skilled in using radiation, high energy sources, and radioisotopes to treat abnormal growths in the body and give patients substances called radiopaques so they can see parts inside
  the body on x-ray films or fluoroscopic screens. They have a 4-year degree in medical school, passing a licensing exam, and completing at least four years of graduate medical education (residency). They
  are highly skilled in their field and have a strong interest in the humanities and ethics behind treating diseases. They are likely to be interested in working for clinics, HMOs, hospitals, the government,
  the Department of Veterans Affairs hospitals, the Department of Health and Human Services, and private practice. They are also likely to have a sub-specialty in a field such as nuclear medicine, pediatric
  radiology, radiation oncology, radiobiology, neuroradiology, or diagnostic radiology.
