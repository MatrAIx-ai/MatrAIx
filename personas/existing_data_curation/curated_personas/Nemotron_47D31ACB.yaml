  hobbies: '[''Hiking'', ''Mountain Biking'', ''Fishing'', ''Camping'', ''DIY Home Projects'', ''Video Gaming'', ''Classic Rock Music'', ''Watching Sports'', ''Reading Non-Fiction'', ''Community Volunteering'']'
  career_goals: Christopher aims to turn his practical abilities into a sustainable source of income. Over the next two years he plans to earn a certification in residential electrical work through a community‑college
    apprenticeship, which will allow him to launch a small handyman business serving the Riverton and greater Salt Lake County area. He envisions a flexible schedule that lets him prioritize family time
    while providing reliable services to neighbors. In the longer term, he hopes to expand his enterprise into a modest team of skilled tradespeople, eventually owning a storefront that offers both repair
    services and DIY workshop classes.
