personas:
  professional: Cheryl Greene, a 12-year-old budding content creator and school choir soloist, channels her practical love of structure into planning weekly vlog outlines while letting her talkative, competitive
    spirit drive spontaneous TikTok dances, though she often relaxes on deadlines and lets disorganization creep in.
  sports: Cheryl Greene, a dedicated member of the local ATSC (Atlanta Youth Soccer Club) and a fan of the Atlanta United soccer team, spends weekends on the field honing competitive skills, yet her relaxed
    approach to scheduling means she often misses practice unless friends remind her, while she also cheers for the Atlanta Falcons during football season.
  arts: Cheryl Greene, an enthusiastic school choir lead who idolizes Ariana Grande and Taylor Swift, fills her sketchbooks with comic‑style characters inspired by Disney movies, and records TikTok dance
    reels set to the latest pop hits, though her critical streak sometimes leads her to harshly edit her own videos.
  travel: Cheryl Greene prefers family road trips that mix structured itineraries—like the organized day‑tour of Savannah’s historic district—with spur‑of‑the‑moment stops at roadside ice‑cream stands,
    having already visited Disney World in Orlando and the National Mall in Washington D.C., while dreaming of a weekend in New York City.
  culinary: Cheryl Greene, a self‑declared fan of buttermilk fried chicken, classic sweet tea, and homemade mac & cheese, enjoys helping her mom bake chocolate brownies while often experimenting with TikTok‑inspired
    snack hacks like spicy honey‑glazed chicken wings, despite a habit of leaving a trail of crumbs on the kitchen counter.
  core: Cheryl Greene is a talkative, competitive 12‑year‑old who blends a love for structured school projects with spontaneous TikTok flair, thrives on social interaction, yet often worries and relaxes
    deadlines.
background:
  cultural: 'Cheryl comes from a white Southern family that has lived in Stockbridge, Georgia for several generations. Her upbringing reflects typical suburban Georgia life: weekend barbecues with family,
    Southern comfort foods like fried chicken and sweet tea, and regular attendance at a local Baptist church where community and hospitality are emphasized. The region’s warm climate and nearby parks provide
    opportunities for outdoor play, while the close‑knit nature of Clayton County fosters strong neighborhood connections. Her family values hard work, personal responsibility, and a polite, friendly demeanor,
    yet they also encourage her to speak her mind and pursue her interests boldly.'
