  hobbies: '[''Soccer'', ''School choir singing'', ''Minecraft building'', ''TikTok video creation'', ''Reading mystery novels'', ''Sketching cartoons'', ''Journaling'', ''Youth group volunteering'']'
  career_goals: Cheryl dreams of turning her love for the spotlight and her competitive edge into a career that lets her engage large audiences. She aspires to become a sports broadcaster or live‑streaming
    personality, combining her knowledge of games and athletics with her knack for lively commentary. She also envisions herself as a digital content creator who produces entertaining videos that spark
    conversation. In the longer term, she hopes her debate skills could lead to a role in journalism or law, where she can continue to argue, persuade, and influence public opinion.
