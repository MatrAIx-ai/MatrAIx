  career_goals: Although no longer in the formal workforce, Ana aims to stay purposefully active by volunteering as a mentor for new teachers at the local school district and by leading a seasonal community
    garden that combines practical food production with cultural education. She wishes to document and share family recipes in a modest, self‑published cookbook, hoping to preserve culinary heritage while
    gaining gentle recognition for her efforts. Her goals are deliberately flexible—she prefers short‑term, low‑pressure commitments that allow her to manage stress and avoid the feeling of being overwhelmed.
