  career_goals: Madison's career aspirations are centered on meaningful, low‑stress contributions to her community. She aims to become the unofficial historian of Stuyvesant Falls, compiling oral histories
    and publishing a booklet for the town library. She hopes to mentor younger volunteers at the local senior center, teaching organizational skills and preserving community stories. Over the next few years,
    she plans to launch a modest online shop selling handmade quilts and locally sourced preserves, turning her hobbies into a sustainable supplemental income while maintaining her preferred balance of
    solitude and small‑group collaboration. Additionally, she seeks to complete a certified stress‑management program to better handle her propensity for worry.
