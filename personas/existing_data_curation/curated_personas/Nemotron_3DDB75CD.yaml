  hobbies: '[''Watercolor Painting'', ''Community Theater Participation'', ''Reading Contemporary Non‑fiction & Philosophy'', ''Pottery'', ''Quilting'', ''Gardening'', ''Hiking'', ''Cooking Southern‑Fusion
    Recipes'', ''Volunteer Art Mentor'', ''Attending Gallery Openings'']'
  career_goals: Cynthia aims to transition into a senior HR leadership role within the next five years, aspiring to become HR Manager or Director at her organization. She wants to spearhead culture‑building
    initiatives that integrate arts and wellness, such as a monthly 'Creative Corner' for staff. She plans to obtain the SHRM‑Senior Certified Professional (SHRM‑SCP) designation to deepen her strategic
    HR knowledge. Additionally, she hopes to mentor emerging HR professionals in Floyd County and eventually move to a part‑time consultancy role focused on employee‑engagement strategies, allowing more
    time for her personal artistic pursuits.
