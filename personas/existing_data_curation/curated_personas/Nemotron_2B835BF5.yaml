  career_goals: Yubo aims to secure tenure within the next three years while building a signature interdisciplinary program that integrates business strategy with visual arts and design. She seeks to publish
    a series of peer‑reviewed articles on creative entrepreneurship and to launch a community incubator that supports underrepresented student founders. In the long term, she aspires to become a department
    chair or dean who champions innovative pedagogy and to author a book on mindful leadership in high‑stress academic environments.
