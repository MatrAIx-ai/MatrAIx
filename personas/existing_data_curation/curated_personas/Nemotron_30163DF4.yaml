personas:
  professional: Wanda Adam, a seasoned elementary and middle school teacher, blends three decades of classroom experience with a vivid imagination and compassionate leadership to craft interdisciplinary,
    project‑based curricula that weave visual arts, literature, and social studies, while also mentoring peers, securing arts grants, and championing inclusive education across Cherokee County.
  sports: Wanda Adam enjoys early‑morning hikes with the Cherokee County Trailblazers club, follows the Atlanta Falcons and Atlanta Hawks loyally, participates in seasonal community yoga classes, and surprisingly
    joins a local senior softball league each summer, balancing gentle cardio with light team sport.
  arts: Wanda Adam spends weekends painting watercolor vistas of downtown Woodstock, curates mixed‑media collages inspired by the works of Georgia O'Keeffe and Yayoi Kusama, and regularly attends performances
    by the local theater troupe featuring actors like Audra McDonald, all of which fuel her storytelling evenings and teaching philosophy.
  travel: Wanda Adam prefers thoughtfully planned road trips to historic small towns such as Cooperstown, NY, where she sketches landmarks, dreams of a spring pilgrimage to the cherry blossoms of Kyoto,
    yet balances travel with family commitments and a modest travel budget.
  culinary: Wanda Adam, an enthusiastic home chef, favors Mediterranean dishes like grilled lemon‑herb salmon with fresh basil pesto, harvests rosemary, thyme, and lavender from her butterfly garden for
    cooking, and enjoys experimenting with colorful vegetable stir‑fry bowls, though she occasionally over‑spices her recipes in moments of artistic fervor.
  core: Wanda Adam blends a lifelong passion for arts education with compassionate community leadership, balances disciplined finances with occasional creative splurges, and navigates health challenges
    through yoga, all while sprinkling her days with watercolor brushes, spirited storytelling, and a love for hiking.
background:
  cultural: Wanda grew up as a white Southern woman in Woodstock, Georgia, steeped in the traditions of the American South. Her family’s deep roots in Cherokee County emphasized hospitality, community service,
    and active church involvement. These Southern values—respect for elders, a love of storytelling, and an appreciation for local history—shape her teaching style and personal life. Her graduate studies
    in arts and humanities broadened her worldview, fostering a passion for literature, visual arts, and cultural diversity that drives her commitment to inclusive education. She actively participates in
    local cultural events, supports the preservation of regional heritage, and champions contemporary artistic expression, blending reverence for Southern customs with a lifelong intellectual curiosity.
