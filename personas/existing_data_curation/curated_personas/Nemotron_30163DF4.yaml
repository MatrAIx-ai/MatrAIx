    involvement and school volunteer work'', ''Cooking with fresh herbs and sharing meals with neighbors'']'
  career_goals: Wanda aims to transition from full‑time teaching to a mentorship and advocacy role that expands arts education across Cherokee County. She intends to develop a district‑wide arts curriculum,
    secure sustainable funding for after‑school creative programs, and serve as an instructional coach for educators seeking imagination‑driven pedagogy. She also aspires to author a teaching resource book
    on integrating literature and visual art, and to establish a community art space that fosters intergenerational collaboration. In addition, she plans to pursue part‑time service on the local school
    board or education advisory committee to influence policies that support compassionate, inclusive learning environments, leaving a lasting legacy of curiosity and creativity for future generations.
