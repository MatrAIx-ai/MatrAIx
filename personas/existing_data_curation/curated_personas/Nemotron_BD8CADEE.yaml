  career_goals: Germaine often imagines herself as a creator who can share new ideas with the world. She says she wants to become an artist who paints pictures that tell stories, or a scientist who discovers
    how things work. She enjoys the idea of being a teacher who explains interesting concepts to friends and family. As she grows, her ambition is to combine her love for art and curiosity for how things
    work, aiming for a future role such as a design engineer, illustrator, or educator who encourages unconventional thinking.
