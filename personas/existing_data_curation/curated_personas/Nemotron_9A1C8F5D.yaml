  hobbies: '[''reading technical manuals'', ''DIY woodworking'', ''vegetable gardening'', ''mechanical puzzles'', ''knitting'', ''listening to blues/jazz/gospel'', ''volunteering at church events'', ''teaching
    home‑repair basics'']'
  career_goals: Kesha aims to advance to a senior maintenance supervisor role within the next three years, overseeing a small team and managing larger facility operations in Little Rock. She plans to earn
    certifications in HVAC technology and building‑automation systems to broaden her technical scope. Long‑term, she envisions establishing her own consultancy that offers affordable, high‑quality maintenance
    services to local small businesses and community centers, while also mentoring young people—especially women of color—who are interested in trades.
