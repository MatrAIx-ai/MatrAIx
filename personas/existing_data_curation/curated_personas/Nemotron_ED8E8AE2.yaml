  hobbies: '[''Reading contemporary fiction'', ''Listening to R&B and jazz'', ''Custom PC building'', ''Pick‑up basketball'', ''Cooking soul food'', ''Volunteering at a community kitchen'', ''Hiking local
    nature trails'']'
  career_goals: Alvin aims to complete his associate degree in Business Administration within the next two years, focusing on logistics and supply‑chain fundamentals. He envisions securing an entry‑level
    position as a logistics coordinator or inventory specialist at a local distribution center, where he can apply his practical problem‑solving skills in a structured setting while still having room for
    flexibility. Long‑term, he hopes to advance to a supervisory role that lets him mentor newer employees and contribute to a collaborative, supportive workplace culture. He also entertains the idea of
    eventually launching a small, community‑focused car‑service venture that blends his hands‑on expertise with his desire to serve neighbors.
