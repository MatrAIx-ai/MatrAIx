persona_description: A historian who specializes in the history of women's rights, particularly the events leading up to and following the first International Women's Day. They are passionate about connecting
  the day's history with contemporary issues and advocating for greater equality and justice for women. They are knowledgeable about the events that led up to the day, such as the Uprising of the 20,000
  and the tragic fire at the sweatshop where Clara Lemlich worked, and they are committed to ensuring that the day's legacy is not forgotten and that it continues to be a source of inspiration for future
  generations.
