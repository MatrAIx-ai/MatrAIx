personas:
  professional: Ronnie Rodriguez, a junior urban sketch artist and budding robotics hobbyist, channels an inquisitive mind and spontaneous flair into creating quick charcoal cityscapes and coding simple
    interactive stories on a tablet, yet often battles disorganization when school projects demand strict deadlines.
  sports: Ronnie Rodriguez, a spirited 11‑year‑old basketball enthusiast, spends afternoons at the community gym challenging friends in fast‑break drills, idolizes the Chicago Bulls and their pick‑and‑roll
    flair, joins a local youth league that fuels their competitive edge, but occasionally skips practice to finish a sketch or tinker with a robot.
  arts: Ronnie Rodriguez, an avid sketcher of Chicago's murals and graffiti, devours graphic novels like "Saga" and "Bone", delights in the rhythmic beats of The Strokes, Kendrick Kendrick and Tame Impala,
    and bursts onto school talent nights with improvised monologues that echo the city's vibrant street culture.
  travel: Ronnie Rodriguez, who loves weekend bike rides along the Lakefront Trail and musical expeditions to nearby Milwaukee's street‑art districts, dreams of exploring the sprawling murals of Berlin,
    wishes to experience the neon‑lit streets of Tokyo, but family constraints keep most trips within the Midwest, often at the hands of parents and school field trips.
  culinary: Ronnie Rodriguez, a picky yet adventurous eater, favors thick‑crust Chicago deep‑dish pizza, homemade nachos with jalapeños, and occasionally tries sushi rolls after watching cooking videos,
    but often forgets to finish veggies, relying on quick snacks like cheese sticks to fuel late‑night gaming sessions.
  core: Ronnie Rodriguez is a curiosity‑driven 11‑year‑old who sketches city walls, dominates the basketball court, battles anxiety when structure closes in, and can’t resist a fresh sketchbook or a quick
    gaming marathon.
background:
  cultural: Ronnie grew up in a working‑class neighborhood on Chicago’s Northwest Side. His family identifies with mainstream Midwestern American culture—celebrating holidays such as Thanksgiving and the
    Fourth of July, enjoying Chicago‑style pizza and hot dogs, and cheering for city sports teams like the Bulls and Bears. The city's rich, multicultural environment has exposed him to diverse artistic
    influences, from street murals in Pilsen to museum exhibitions in Grant Park, fostering his appreciation for varied art forms while keeping him grounded in the urban, community‑oriented lifestyle of
    Chicago.
