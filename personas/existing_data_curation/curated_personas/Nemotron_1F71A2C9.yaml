  career_goals: Ronnie dreams of turning his love for art and technology into a career as a multimedia creator. He hopes to earn a spot at a specialized arts high school, later study graphic design and
    game development, and eventually work as a video‑game designer or graphic novelist who blends illustration, animation, and interactive coding. He also aspires to organize community art projects that
    bring his friends together, using his competitive drive to lead collaborative events while learning to manage his strong emotions under pressure.
