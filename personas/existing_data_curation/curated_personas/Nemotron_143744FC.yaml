  career_goals: Jeffrey aims to advance to a senior systems analyst role within the next three to five years, then transition into a solutions architect position where he can design end‑to‑end technology
    strategies. He plans to earn industry certifications such as AWS Solutions Architect, Certified ScrumMaster, and PMP to formalize his expertise. Driven by his curiosity about emerging technologies,
    he wants to deepen his knowledge of AI/ML and embed intelligent automation into business processes. Ultimately, he envisions working for a tech company that serves creative industries—such as a digital
    media platform for artists—allowing him to merge his technical skills with his appreciation for art. In the long term, he hopes to launch a consultancy that helps museums, galleries, and design firms
    modernize their digital infrastructure, while mentoring junior analysts and sharing his self‑directed learning journey.
