personas:
  professional: Zellena Haley is a budding museum enthusiast who merges sketching with curiosity, turning after‑school drama and coding clubs into a tiny personal research lab where their improvisational
    flair fuels early investigations into exhibit narratives.
  sports: Zellena Haley energizes weekends by playing midfield for the Brookside Youth Soccer Club in Rock Creek Park, cheering for DC United during televised matches, and joining spontaneous pickup basketball
    games with neighborhood friends.
  arts: Zellena Haley spends afternoons sketching scenes from the National Museum of African American History and Culture, rehearses hip‑hop dance moves to Kendrick Lamar while listening to Miles Davis
    on a portable speaker, and brings Lin‑Manuel Miranda’s lyrical storytelling into school drama productions.
  travel: Zellena Haley prefers spontaneous day trips, often hopping the Metro to explore the Smithsonian museums in Washington, D.C., wandering the historic streets of Alexandria, Virginia, and dreaming
    of a family road trip to the Grand Canyon, balancing curiosity with a limited allowance.
  culinary: Zellena Haley favors bold flavors, frequently making homemade tacos with fresh avocado, melting cheese on pizza slices, and blending colorful fruit smoothies with basil and lime, but often leaves
    a trail of glittery art supplies on the kitchen counter after cooking.
  core: Zellena Haley is a curious, art‑driven ten‑year‑old who trades a disorganized schedule for spontaneous creativity, turning museum visits into sketchbooks and soccer games into improvised stageplays.
background:
  cultural: Zellena is an African‑American girl raised in Washington, DC, where she experiences a vibrant blend of Black cultural traditions and the city's multicultural atmosphere. Her family celebrates
    holidays such as Juneteenth and Kwanzaa, sharing stories of Black history and emphasizing community service. Frequent visits to the African American Museum and participation in local cultural festivals
    deepen her sense of identity. Growing up in a diverse neighborhood, she interacts with peers from many backgrounds, fostering an inclusive worldview while maintaining pride in her heritage, which is
    reflected in her artwork and community involvement.
attributes:
  skills: '["Drawing", "Mixed-media collage", "Basic chemistry experiments", "Collaborative group work", "Digital art using tablets", "Scratch programming", "Storytelling", "Organizing group activities"]'
  hobbies: '["Sketching", "Visiting museums", "After-school drama club", "Dance", "Science experiments", "Scratch coding", "Lego building", "Soccer", "Exploring local parks", "Listening to music (hip-hop,
    jazz)"]'
  career_goals: While still in elementary school, Zellena dreams of becoming a creative professional who can blend art and technology. She envisions herself as a future illustrator for children's books,
    a museum curator who designs interactive exhibits, or an animator who brings her imaginative worlds to life. She also hopes to use her creativity to inspire other kids in her community, perhaps by leading
    art workshops or contributing to public murals that celebrate African‑American heritage in Washington, DC.
