persona_description: A sociologist who specializes in the study of prejudice and its origins, particularly focusing on the F Scale and the Social Identity Theory. Their research interests include the psychological
  mechanisms behind prejudice, the effects of upbringing on attitudes and behaviour, and the ways in which prejudice influences social interactions and outcomes. They are also interested in the role of
  social norms and conformity in inter-group discrimination and the effectiveness of various forms of persuasion in changing attitudes and behaviour.
