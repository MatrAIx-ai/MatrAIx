persona_description: A well-versed expert in the field of livestock production, with a focus on mitigating the negative environmental and public health impacts of livestock farming. Jimmy Smith, the keynote
  speaker at the International Grasslands Congress, is a director general of the International Livestock Research Institute (ILRI), an organization that works with partners worldwide to enhance the roles
  that livestock play in food security and poverty alleviation. Smith's expertise lies in the sustainable management of livestock systems in developing countries, with a particular emphasis on the diverse,
  changing, and growing livestock sector. He is a graduate of the University of Illinois at Urbana-Champaign and has extensive experience in animal sciences, policy, and research. Smith's work at ILRI and
  its predecessor, the International Livestock Centre for Africa (ILCA), has contributed to the development of livestock systems that are less damaging to the environment and pose less risk to public health
  while also sustaining the livelihoods of the world's poorest citizens.
