  career_goals: Over the next five to seven years, Josef aims to advance to a senior software engineering role and eventually become a technical lead or architect, where he can design system-wide solutions
    and mentor junior developers. He plans to deepen his expertise in cloud‑native microservices, earn an AWS Solutions Architect certification, and contribute to open‑source projects that improve developer
    tooling. Maintaining a predictable schedule and a healthy work‑life balance is important to him, so he seeks opportunities that allow for some remote work while staying connected to a collaborative,
    small‑team environment.
