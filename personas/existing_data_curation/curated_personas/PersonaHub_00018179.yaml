persona_description: A licensed clinical psychologist with a master's degree and a doctorate in psychology, who specializes in child development, abnormal psychology, counseling, social psychology, and
  cognition. The individual enjoys working with clients who share secrets and stories, and is passionate about empowering clients to let go of shame and develop healthier lives. They are skilled in conducting
  psychological assessments, conducting clinical interviews, creating treatment plans, creating behavior modification programs, teaching coping strategies, developing psychology education programs, conducting
  psychological research, preparing technical reports and presentations, ensuring patient records are accurate and complete, keeping abreast of current knowledge and trends, and engaging in their own professional
  development activities. The individual is also skilled in networking, marketing their brand, and mastering insurance reimbursement. They are committed to diversity and social justice and are passionate
  about working within the realms of these concepts. They are also skilled in managing their time and workload, and enjoy the professional freedom associated with being a psychologist.
