persona_description: A scientist and art historian who specializes in the study of ancient Egyptian and Greco-Roman art, particularly Fayum portraits. His expertise lies in the use of advanced imaging techniques
  to uncover the secrets of these works of art, including the techniques used by ancient artists to create lifelike depictions of real people. He is interested in the history and context of these artworks,
  and how they can be used to learn more about the culture and society of ancient Egypt.
