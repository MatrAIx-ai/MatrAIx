personas:
  professional: Aubrey Bell is a civil engineer in the DC metro area who blends meticulous structural analysis with a community‑first mindset, leveraging their curiosity and practical outlook to navigate
    tight deadlines, mediate between contractors, regulators, and neighborhood groups, and drive green‑infrastructure projects that reflect both technical rigor and social equity.
  sports: Aubrey Bell is a devoted member of the Capital City Cyclists club, logging weekend rides along the C&O Canal towpath, cheering on the Washington Capitals, the Washington Wizards, and D.C. United
    during games, while also participating in a salsa‑dance fitness class and squeezing in sunrise yoga sessions to maintain a balanced, low‑impact fitness routine.
  arts: Aubrey Bell frequents the Smithsonian’s National Museum of Natural History and the Hirshhorn for contemporary installations, eagerly attends live shows by indie artists like St. Vincent and Janel
    Monáe at the 9:30 Club, and spends quiet evenings dissecting modern fiction by authors such as Sally Rooney while solving logic puzzles that feed their creative curiosity.
  travel: Aubrey Bell prefers purposeful getaways that blend adventure with cultural immersion, having explored the historic streets of Williamsburg, trekked the Shenandah Skyline Drive in fall, and dreaming
    of a salsa‑filled spring trip to Barcelona, all booked through meticulous planning on travel apps and spontaneous weekend road‑trips when work deadlines allow.
  culinary: Aubrey Bell enjoys a semi‑home‑chef lifestyle, turning balcony‑grown basil, rosemary, and mint into vibrant herb‑infused olive oil for homemade chickpea falafel and lemon‑garlic grilled salmon,
    while occasionally indulging in the Pacific Rim tacos at a local Wharf eatery, and treating themselves to craft coffee at the neighborhood roastery during afternoon breaks.
  core: Aubrey Bell is a detail‑driven civil engineer who balances analytical rigor with community advocacy, harmonizes a social, stress‑prone nature through yoga and cycling, and channels curiosity into
    sustainable design, mindful finance, and vibrant cultural pursuits.
background:
  cultural: Aubrey grew up in a middle‑class, suburban family in the Maryland suburbs of Washington, DC, where her parents valued education, civic responsibility, and community involvement. As a white American
    of primarily Anglo‑German ancestry, she was raised with common Mid‑Atlantic cultural touchstones—high school sports, Fourth of July celebrations, and an appreciation for the region’s historical heritage.
    Living in the nation’s capital has exposed her to a diverse population and a politically engaged environment, shaping her worldview toward inclusivity and public service. Her family’s tradition of volunteerism
    and her own experiences in a multicultural city inform her commitment to integrating social equity considerations into the infrastructure projects she works on.
attributes:
  skills: '[''Structural analysis'', ''Transportation system design'', ''Water resource engineering'', ''AutoCAD'', ''Civil 3D'', ''Revit'', ''GIS mapping'', ''Cost estimation'', ''Regulatory compliance'',
