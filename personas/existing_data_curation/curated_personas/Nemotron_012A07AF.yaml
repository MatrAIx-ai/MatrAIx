  hobbies: '[''Cycling club'', ''Salsa dancing'', ''Volunteer logistics for food bank'', ''Yoga'', ''Mindfulness meditation'', ''Balcony gardening'', ''Visiting museums (Smithsonian)'', ''Live music concerts'',
    ''Reading contemporary fiction'', ''Logic puzzles'']'
  career_goals: Aubrey aims to become a licensed Professional Engineer within the next two years, positioning herself to lead larger multidisciplinary projects focused on sustainable and resilient infrastructure
    in the Washington, DC metro area. She aspires to transition from a project engineer to a senior project manager and eventually to an engineering director, where she can influence city‑wide planning
    policies and champion green‑infrastructure initiatives such as storm‑water mitigation and low‑impact development. At the same time, she seeks to mentor junior engineers, especially those from non‑traditional
    backgrounds, and to develop a personal brand as a reliable yet innovative problem‑solver who balances technical rigor with community needs.
