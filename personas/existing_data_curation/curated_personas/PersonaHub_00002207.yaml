persona_description: A teacher at The Pilgrim School who specializes in teaching computing and ICT, especially in the use of technology to develop critical thinking, collaborative skills, communication,
  and creativity in children. The teacher is well-versed in the latest National Curriculum guidelines for Computing and ICT and uses the 'Switch On Computing' scheme to deliver the curriculum and use ICT
  in cross-curricular activities. The teacher is knowledgeable about the cloud computing and its benefits in engaging pupils in a variety of computing activities both at school and at home. The teacher
  is passionate about teaching and encourages parents to discuss any details with the class teachers or ICT coordinator.
