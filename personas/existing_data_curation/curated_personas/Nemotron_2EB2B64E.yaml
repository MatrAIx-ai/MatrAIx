personas:
  professional: Demi Smith, a veteran Fullerton police officer with twenty years of patrol and investigative experience, merges meticulous crime‑scene processing and precise report writing with a curiosity‑driven
    pursuit of restorative‑justice methods, allowing them to excel as a disciplined yet innovative detective candidate, and they are noted for turning every case file into a learning opportunity.
  sports: Demi Smith follows the Los Angeles Lakers and Dodgers with loyal enthusiasm, runs with the OC Trail Runners Club on weekend hikes along the coast, and balances the physical demands of police work
    with early‑morning yoga sessions and occasional pickup basketball games, and they consider the yoga routine essential for maintaining flexibility.
  arts: Demi Smith immerses in the visual arts by attending Fullerton Museum Center openings featuring works by Claude Monet and Ansel Adams, paints watercolor seascapes inspired by J.M.W. Turner, and spends
    evenings playing Debussy on piano while listening to Joni Mitchell, weaving artistic appreciation into both professional and personal life, and they often share their own watercolor sketches during
    community workshops.
  travel: Demi Smith prefers meticulously planned road trips along the Pacific Coast Highway, savoring stops at Big Sur, Laguna Beach, and Joshua Tree, while nurturing a dream of cultural immersion in Kyoto’s
    temples and Florence’s Renaissance streets, balancing solitary exploration with occasional family visits, and they meticulously document each journey in a leather‑bound journal.
  culinary: Demi Smith enjoys experimental cooking, frequently preparing miso‑glazed salmon with ginger‑infused quinoa, hand‑rolling avocado‑lime sushi, and perfecting rosemary‑garlic focaccia, demonstrating
    a moderate skill level and a penchant for bold, Mediterranean‑Asian flavor combos, and they love pairing each dish with a carefully selected vintage wine.
  core: Demi Smith is a disciplined detective hopeful who blends a love of art and community with a methodical, curiosity‑driven policing style, often fuelled by late‑night coffee, and they habitually sketch
    crime scenes in watercolor during quiet shifts.
background:
  cultural: Demi is a white Anglo-American raised in the suburban environment of Southern California. Her parents, both public-service employees, instilled a sense of civic duty and modest exposure to the
    arts through museum trips and community theater. Growing up in the diverse yet traditionally middle-class setting of Orange County, she absorbed a blend of conservative respect for law and order and
    progressive openness to multicultural ideas. The regional culture—characterized by a laid-back coastal lifestyle, an emphasis on personal responsibility, and a growing appreciation for creative expression—has
    shaped her values of discipline, community harmony, and curiosity. As a separated adult in her mid-forties, she navigates personal resilience within a cultural context that values independence and self-improvement,
    which informs both her professional ambitions and her artistic pursuits.
