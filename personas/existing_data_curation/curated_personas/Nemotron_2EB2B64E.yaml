  career_goals: Demi is working toward a promotion to detective within the department's investigative unit, where she hopes to specialize in community-focused investigations and restorative-justice programs.
    She plans to complete a bachelor's degree in criminal justice while earning a certification in forensic digital analysis. Long-term, she aims to become a sergeant or training officer, designing curricula
    that integrate art-based community outreach and mental-health response techniques. She also dreams of establishing a city-wide partnership that pairs police officers with local artists to create public-art
    projects that deter crime and strengthen neighborhood cohesion.
