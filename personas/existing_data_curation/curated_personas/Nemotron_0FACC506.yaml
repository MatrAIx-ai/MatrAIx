personas:
  professional: Matthew Fitzpatrick is an aspiring LEGO city planner who spends hours arranging brick structures, experimenting with basic Scratch code, and dreaming of one day designing real‑world neighborhoods
    with the same precision and teamwork they practice on the soccer field.
  sports: Matthew Fitzpatrick plays forward on the Catoosa Youth Soccer Club during fall, proudly wears a Catoosa Pirates high‑school football jersey on game days, follows the Oklahoma Sooners football
    team, and uses structured drills and weekend family bike rides to stay fit while balancing schoolwork, and they always check the schedule on their planner before each practice.
  arts: Matthew Fitzpatrick enjoys listening to classic country hits by Dolly Parton and Garth Brooks while drawing scenes from his Magic Tree House books, admires the whimsical animation of Hayao Miyazaki’s
    My Neighbor Totoro, and collects stickers of his favorite cartoon characters, reflecting how music and visual art spark their imagination; they often hum the melodies while building LEGO structures.
  travel: Matthew Fitzpatrick loves family road trips that include stops at the Oklahoma City National Memorial, a weekend hike in the Ozarks, and a dream visit to Disney World in Orlando, preferring the
    predictability of a printed itinerary but they always leave room for spontaneous rock‑collecting at roadside parks.
  culinary: Matthew Fitzpatrick favors backyard BBQ ribs, chicken nuggets with honey‑mustard dip, mac and cheese, and apple pie, and they often help their family prepare a classic potato salad using mayo,
    mustard, pickles, and boiled eggs, while proudly mixing their own trail‑mix of pretzels, raisins, and chocolate chips for snack breaks.
  core: Matthew Fitzpatrick is a calm, organized eight‑year‑old who builds intricate LEGO cities, saves their allowance with meticulous care, thrives in structured soccer practice, and enjoys quiet rock‑collecting,
    though they sometimes forget to finish chores before bedtime.
background:
  cultural: 'Matthew comes from a white, middle‑class family in Catoosa, Oklahoma, a suburb of Tulsa with strong Midwestern values. His household celebrates typical regional traditions: family barbecues,
    attending Sunday services at a local Protestant church, and watching Friday night high‑school football games. The community emphasizes politeness, respect for authority, and helping neighbors, which
    aligns with Matthew’s cooperative yet assertive nature. Exposure to Oklahoma’s outdoors, country music, and local fairs also shapes his interests in nature collection and community involvement.'
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Following multi‑step instructions", "Organizing personal items", "Collaborative group play", "Basic Scratch programming", "Lego construction", "Puzzle
    solving"]'
  hobbies: '["Lego building", "Minecraft world design", "Reading adventure books", "Soccer practice", "Scratch programming", "Rock collecting", "Participating in church community events"]'
  career_goals: Matthew frequently talks about wanting to become a civil engineer or a firefighter when he grows up. He is fascinated by how bridges and roads are built, loves the idea of designing safe
    structures, and appreciates the clear procedures and teamwork that firefighting requires. His ambition is framed in child‑friendly terms – he imagines drawing blueprints on paper, helping his community,
    and wearing a uniform that lets him follow rules while making a real difference.
