personas:
  professional: Alexis Davenport, a five-year-old aspiring engineer, excels at constructing sturdy LEGO structures and conducting basic water-flow experiments, applying methodical planning, organized sorting,
    and a practical curiosity that balances fresh ideas with proven building techniques, while they remain quietly assertive when choosing the best design.
  sports: Alexis Davenport darts onto the local Bright Stars gymnastics mat every Tuesday, follows a structured warm‑up routine, cheers quietly for the Chicago Cubs on game day, and, while they love the
    rhythm of movement, they sometimes fret about falling and insist on meticulously checking the equipment before each session.
  arts: Alexis Davenport spends afternoons drawing bright dinosaurs inspired by the animated world of Pixar's "Finding Nemo" and humming the playful tunes of children's musician Raffi, especially "Baby
    Beluga", which fuels their quiet imagination and offers a soothing escape when they feel overwhelmed.
  travel: Alexis Davenport prefers short, well‑planned family trips that follow a familiar schedule, delights in revisiting the magical lands of Orlando’s Disney World and the awe‑inspiring vistas of the
    Grand Canyon, and dreams of someday seeing the Eiffel Tower in Paris while they carefully pack their favorite stuffed bunny to ease any stress.
  culinary: Alexis Davenport favors creamy mac and cheese, crunchy carrot sticks, and peanut‑butter‑and‑jelly sandwiches, eagerly assists in mixing pancake batter using a tiny whisk, and, when dining out,
    requests the mild cheese pizza with extra mozzarella and a side of apple slices, showing a picky yet comfort‑seeking palate.
  core: Alexis Davenport blends meticulous curiosity with a touch of anxious perfectionism, organizing toys by color, obsessively counting steps on a walk, and retreating into quiet play when crowds become
    overwhelming, because they seek order amidst the chaos.
background:
  cultural: 'Alexis grows up in a close‑knit African‑American family in Columbia, South Carolina. Her household blends Southern traditions with Black cultural heritage: family meals often feature collard
    greens, cornbread, and sweet tea, and Sundays begin with church services where gospel music fills the air. She celebrates Juneteenth and Kwanzaa with stories passed down from grandparents, learning
    the importance of community and resilience. Community events at the local church and neighborhood center provide opportunities for small group gatherings, where Alexis feels comfortable sharing and
    listening. These cultural anchors shape her values of cooperation, respect for tradition, and a deep appreciation for the rich tapestry of African‑American Southern life.'
attributes:
  skills: '[''basic reading'', ''sight word recognition'', ''counting to 100'', ''sorting by attributes'', ''puzzle solving'', ''toy organization'', ''following daily routines'', ''basic cooking assistance'',
