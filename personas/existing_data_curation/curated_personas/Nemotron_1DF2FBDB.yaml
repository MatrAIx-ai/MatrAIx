  hobbies: '[''reading picture books'', ''building with wooden blocks'', ''nature walks'', ''drawing and coloring'', ''singing & rhythmic clapping games'', ''baking with family'', ''simple board games'',
    ''collecting stickers'']'
  career_goals: Alexis dreams of becoming a teacher or a librarian, where she can combine her love of books, her natural organization, and her desire to help other children learn. She also imagines caring
    for animals as a veterinarian, reflecting her curiosity about the natural world. Her practical side leads her to think about growing up to run a community garden, allowing her to use systematic planning
    and provide fresh food for her neighborhood.
