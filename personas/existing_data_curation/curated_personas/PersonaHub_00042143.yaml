persona_description: A person who values education, wisdom, and learning. They are interested in various fields of study and strive to improve their knowledge and understanding through reading, writing,
  and other methods. They are open-minded and willing to learn from different sources and perspectives. They are also skilled in blending different ideas and concepts into a cohesive whole, and they are
  not afraid to add their unique perspective to the mix. They are not content with merely copying others, but strive to understand and improve upon what they have learned. They are aware of the value of
  indifferents and use them well, but they also seek to elevate their own thoughts and perspectives. They are not focused on the low (indifferents), but rather on the high - taking a perspective from above.
