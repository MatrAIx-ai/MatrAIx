persona_description: A professor at the University of Delaware who is leading the V2G program and is working on the development of electric cars that give power back to the grid. He is passionate about
  the potential of electric cars as a reliable source of energy for the grid in a future with increasingly fluctuating renewable energy sources. He is also interested in the economic benefits of the V2G
  program, as he argues that the cost of electric cars will eventually fall as production increases. He is optimistic about the future of electric cars and sees them as a key factor in the transition to
  a carbon-free power grid.
