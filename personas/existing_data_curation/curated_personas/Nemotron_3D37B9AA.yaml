personas:
  professional: Sonia Figueroaalvarado combines a methodical, data-driven approach to civil engineering with a competitive drive to beat schedules, excelling at BIM modeling, structural analysis, and LEED-focused
    design while mentoring junior team members and championing AI-assisted optimization in Bay Area infrastructure projects, and they keep every detail documented in meticulous logs.
  sports: Sonia Figueroaalvarado channels their energetic side into a co-ed soccer league where they play midfield for the San Jose Strikers, follows the San Jose Earthquakes avidly, and spends Saturday
    mornings conquering the Santa Cruz Mountain trails with a local hiking club, often timing routes with a Garmin watch.
  arts: Sonia Figueroaalvarado winds down by salsa dancing to classic cha-cha beats, curates street-photography walks in the Mission District capturing vibrant murals, and devours sci-fi novels by Kim Stanley
    Robinson and Octavia Butler while attending occasional Cirque du Soleil performances, and they often share their photos on social media for instant feedback.
  travel: Sonia Figueroaalvarado prefers curated eco-adventures, having trekked the cloud forests of Costa Rica, explored the archaeological sites of Machu Picchu, and planned a future road trip along Route
    66 to study mid-century highway design, all while leveraging airline miles earned from conference travel, and they keep a detailed travel blog to track lessons learned.
  culinary: Sonia Figueroaalvarado spends weekend evenings perfecting mole negro with toasted chilies, simmering pozole broth with hominy and pork shoulder, and hand-folding tamales stuffed with masa and
    cheese, often mixing in an experimental dash of cocoa, though they sometimes over-season in their enthusiasm to wow friends.
  core: Sonia Figueroaalvarado is a methodical yet competitive civil engineer who balances a love for sustainable design, salsa rhythms, and mountain hikes with meticulous budgeting and a stubborn habit
    of over-cooking signature dishes, and they approach each challenge with a pragmatic curiosity.
background:
  cultural: Sonia grew up in a bilingual Mexican-American household, with parents who emigrated from Jalisco. Family gatherings revolve around traditional celebrations such as Dia de los Muertos, Cinco
    de Mayo, and Christmas posadas, where music, dancing, and handmade foods play central roles. Her upbringing emphasized the value of hard work, education, and community support, shaping her competitive
    yet collaborative spirit. Living in Santa Clara, she blends her heritage with the multicultural Silicon Valley vibe, participating in local Mexican cultural festivals, supporting community murals, and
    incorporating Mexican design motifs into her personal style. This bicultural perspective informs her professional focus on equitable, sustainable infrastructure that serves diverse communities.
attributes:
  skills: '[''Structural analysis'', ''Concrete and steel design'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''SAP2000'', ''ETABS'', ''GIS mapping'', ''Python programming'', ''MATLAB'', ''Project management
    (PMI)'', ''Primavera P6 scheduling'', ''Cost estimation'', ''LEED sustainability principles'', ''Technical report writing'', ''Public speaking'']'
  hobbies: '[''Hiking in Santa Cruz Mountains'', ''Co-ed soccer league'', ''Salsa dancing'', ''Mexican home cooking (mole, pozole, tamales)'', ''Habitat for Humanity volunteer work'', ''Tech meetups on
    BIM, 3-D printing, AI in construction'', ''Reading science-fiction and sustainability books'', ''Yoga'', ''Street photography'']'
  career_goals: Sonia aims to obtain her California Professional Engineer (PE) license within the next three years, deepen her expertise in sustainable infrastructure, and eventually lead large-scale transportation
    or public works projects in the Bay Area. She plans to pursue a master's degree in structural engineering focused on resilient design, and to become a project manager who can integrate emerging technologies
    such as AI-driven design optimization and advanced BIM workflows. Her competitive drive pushes her to deliver projects ahead of schedule and under budget, while her curiosity motivates her to pilot
    innovative construction methods that meet LEED certification standards. In the longer term, she hopes to mentor junior engineers and champion inclusive, community-focused engineering solutions.
