persona_description: A healthcare professional who works as an Advanced Practice Nurse (APRN) and is part of a team that provides specialized care and services to children. They are knowledgeable, skilled,
  and use evidence-based practice to ensure that children receive the highest standard of care. APRNs may work independently in some states, while other states require a physician to be available for collaboration.
  They may work in all settings and are involved in research and administration. APRNs and physicians share the goal of providing the best care for their patients.
