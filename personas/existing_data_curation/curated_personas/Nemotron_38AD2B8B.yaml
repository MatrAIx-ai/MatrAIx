personas:
  professional: Laura Chiu, an aspiring visual communicator and interdisciplinary artist, leverages Adobe Creative Suite, digital illustration, and improvisational performance to craft immersive installations
    and strategic brand narratives, and they often struggle to meet tight project deadlines due to their spontaneous nature.
  sports: Laura Chiu, an enthusiastic hiker on the Natchez Trace, participates in the campus ultimate Frisbee club, roots for the Memphis Grizzlies, and they balance weekend trail treks with occasional
    yoga sessions to stay limber.
  arts: Laura Chiu, a devoted participant in the local art scene, draws inspiration from contemporary visionaries like Yayoi Kusama, Banksy, and the surreal narratives of Haruki Murakami, regularly showcases
    digital collages on Instagram, and they perform spoken-word poetry at open-mic nights.
  travel: Laura Chiu, a budget-conscious wanderer, has backpacked through Asheville’s art districts, visited the historic streets of New Orleans for jazz and soul food, and they plan a spring trip to Santa
    Fe to explore Southwestern mural traditions.
  culinary: Laura Chiu, an adventurous home cook, loves remixing Southern staples such as shrimp-and-grits with miso glaze, collard-green tacos with smoked paprika, and peach-bourbon cobbler, and they blend
    fresh herbs like thyme and basil into inventive dishes.
  core: Laura Chiu blends relentless creativity with a love for community, and they balance spontaneous artistic pursuits with occasional deadline-driven chaos.
background:
  cultural: Laura grew up in Saltillo, a small town in Lee County, Mississippi, within a predominantly white, Southern community. Her family embodies traditional Southern hospitality, regular church involvement,
    and community gatherings such as county fairs and potluck meals. She was raised on Southern culinary staples like fried chicken, biscuits, and collard greens and was exposed to local music styles—including
    country, blues, and gospel. While her upbringing emphasized close‑knit relationships, modesty, and respect for tradition, her college experiences have broadened her worldview, fostering an appreciation
    for diverse artistic expressions and global cultural ideas.
