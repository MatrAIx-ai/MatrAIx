  career_goals: Laura aims to complete a degree in Visual Communication or Fine Arts to become a multidisciplinary artist and creative strategist. She envisions launching an independent art collective that
    creates immersive installations and community workshops, and eventually securing a role within a museum education department or arts nonprofit where she can blend creativity with community engagement.
    She also aspires to build a freelance portfolio in graphic design and digital media that offers flexibility, artistic freedom, and the opportunity to collaborate on innovative projects.
