personas:
  professional: Rosanna Burks, a high school senior with a knack for organizing community events, they blend their natural charisma, basic carpentry, and budding digital media skills to lead their town's
    bake‑sale club while laying the groundwork for a future as a geriatric CNA.
  sports: Rosanna Burks plays forward for the Mount Pleasant Community Soccer Club, they idolize the US Women’s National Team and follow the Pittsburgh Steelers, while also joining the local hiking group
    that tackles the Laurel Highlands trail each spring, balancing competitive matches with weekend outdoor workouts.
  arts: Rosanna Burks contributes to the town’s community theater by handling set construction and occasionally stepping onstage for improv, they curate an Instagram feed featuring local artist Timeless
    Oak’s watercolor prints and indie folk singer Sufjan Stevens, and find inspiration for DIY projects while listening to his album “Carrie & Lowell.”
  travel: Rosanna Burks dreams of backpacking through the Appalachian Trail after high school, they have already visited the historic Gettysburg battlefield on a school trip and love weekend road trips
    to the nearby Laurel Creek Vineyards, preferring budget hostels and shared rides to maintain a modest travel fund.
  culinary: Rosanna Burks loves baking double‑chocolate zucchini muffins for the bake‑sale club, they experiment with seasonal farm‑to‑table dishes like roasted beet salad with goat cheese, and frequently
    improvise with fresh basil and lemon zest from their garden, though they sometimes over‑salt their soups when excited.
  core: Rosanna Burks is a community‑minded teenage organizer who swaps DIY furniture projects for soccer goals, sugar‑laden bake‑sale treats for compassionate senior visits, they always keep a spare screwdriver
    in their pocket, despite a habit of forgetting to water plants on rainy days.
background:
  cultural: Rosanna grew up in a predominantly white, working‑class community in the foothills of western Pennsylvania. Her family’s roots trace back to German and Irish immigrants who settled in the region
    during the early 1900s, and many relatives have histories tied to the area’s coal‑mining and manufacturing heritage. Local culture emphasizes self‑reliance, neighborly support, and modest, down‑to‑earth
    values. Weekly church gatherings, high‑school football games, and town fairs are central social fixtures, and the close‑knit nature of Mount Pleasant has reinforced Rosanna’s collaborative and compassionate
    outlook. These regional traditions have shaped her strong sense of community responsibility and her desire to give back through service and teamwork.
