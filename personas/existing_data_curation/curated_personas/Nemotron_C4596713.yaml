  career_goals: Rosanna plans to earn her GED within the next year and then enroll in the Certified Nursing Assistant (CNA) program at Westmoreland County Community College. Her long‑term ambition is to
    become a registered nurse specializing in geriatric care, allowing her to combine her compassion for older adults with her practical skill set. Parallel to her healthcare path, she hopes to develop
    leadership experience that will enable her to coordinate youth mentorship programs in Mount Pleasant, creating safe, supportive spaces where teenagers can develop social and academic skills.
