personas:
  professional: April Perry is a seasoned registered nurse with deep clinical expertise in patient assessment, IV therapy, wound care, and medication management, who leverages her educational background
    to design curricula, lead quality‑improvement audits, and mentor staff, embodying a structured yet compassionate approach that balances meticulous documentation with supportive mentorship.
  sports: April Perry enjoys weekly line‑dancing classes at the community center, hikes the Texas Hill Country trails with the local Trailblazers Hiking Club, and cheers for the Dallas Cowboys and the Houston
    Astros, while also playing as a utility member of a senior recreational softball league, reflecting a socially active and physically engaged lifestyle.
  arts: April Perry engages deeply with the arts by reading historical romance novels such as Julia Quinn’s 'The Duke and I', singing in the church choir performing hymns and contemporary gospel songs by
    Kirk Franklin, and attending the Texas Shakespeare Festival where actors like Audra McDonald appear, while also appreciating classic country music by Willie Nelson and folk art inspired by Frida Kahlo.
  travel: April Perry prefers road‑trip adventures across Texas and the Southwest, having driven the Hill Country wine trail to Fredericksburg, explored San Antonio’s historic missions, and taken a weekend
    getaway to Santa Fe for its art markets; they dream of a vacation in Napa Valley’s vineyards and occasionally plan group trips with the book club to historic sites like Colonial Williamsburg.
  culinary: April Perry delights in crafting Tex‑Mex meals, often preparing chicken enchiladas with homemade salsa verde, grilled corn elote topped with queso fresco and cilantro, and spicy black bean soup,
    using fresh vegetables from their backyard garden such as tomatoes, peppers, and avocados; their cooking skill is intermediate, and they love hosting communal taco nights where friends exchange recipes
    and stories.
  core: April Perry is a community‑oriented nurse‑educator‑in‑training who balances meticulous health‑care leadership with line‑dancing shoes, a thriving vegetable garden, and a worry‑filled journal, all
    while humming gospel hymns and planning her next hill‑country hike.
background:
  cultural: April grew up in Central Texas, steeped in a blend of Anglo‑American and regional Hispanic influences that characterize Bexar County. Her family emphasized self‑reliance, community service,
    and respect for tradition, often celebrating holidays with both classic Texan barbecue and local Mexican dishes. Attending a modest Protestant church instilled values of humility and cooperation, while
    her professional identity as a registered nurse reinforced a culture of evidence‑based practice, patient advocacy, and interdisciplinary teamwork. These cultural threads shape her pragmatic outlook,
    her commitment to organized care, and her strong dedication to the well‑being of her community.
