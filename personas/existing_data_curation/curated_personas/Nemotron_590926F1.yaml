  hobbies: '[''Line dancing'', ''Gardening'', ''Book club'', ''Cooking Tex‑Mex meals'', ''Hill Country hiking'', ''Church choir'', ''Food bank volunteering'', ''Quilting'', ''Yoga'', ''Reading historical
    romance novels'']'
  career_goals: She aims to transition into a formal Nurse Educator role within the next two years, developing comprehensive onboarding and continuing education programs for the hospital staff. Long‑term,
    she envisions leading the nursing education department, obtaining a Master’s in Nursing Education, and establishing community health workshops focused on chronic disease prevention for older adults
    in the Castroville area. She also seeks to earn certification in gerontological nursing to better serve the aging population she often cares for.
