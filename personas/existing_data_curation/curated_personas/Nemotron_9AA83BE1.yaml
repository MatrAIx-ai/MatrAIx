  career_goals: He aims to become a Director of Technology within the next five years, overseeing digital transformation initiatives that leverage AI and machine learning to improve operational efficiency.
    Santa plans to earn PMP and CISSP certifications, build a reputation as a thought leader in IT governance, and eventually launch his own consultancy that helps midsize firms streamline their IT operations
    while maintaining robust security. A parallel personal goal is to develop a stable work‑life rhythm that reduces his anxiety and allows him to mentor young professionals, especially those from Latinx
    backgrounds.
