personas:
  professional: Santa Ocampo is a senior enterprise IT architect who orchestrates cloud migrations across AWS and Azure, leads cybersecurity risk assessments, and drives Agile project delivery, leveraging
    their meticulous organization, competitive drive, and sociable presence to push teams toward high‑performance goals while managing the anxiety that fuels their relentless pursuit of excellence.
  sports: Santa Ocampo channels competitive energy into daily weight‑training and calisthenics at the local CrossFit box ‘Wilmington Iron’, follows the Philadelphia Eagles and 76ers loyally, and participates
    in weekend amateur chess tournaments that double as mental sport, reflecting a blend of physical and strategic drive.
  arts: Santa Ocampo immerses themselves in salsa and bachata nights, dancing to the rhythms of Celia Cruz and Marc Anthony, while also sharpening strategic thinking at weekly trivia nights and admiring
    the choreography of contemporary dance performances by the local Wilmington Dance Theatre.
  travel: Santa Ocampo plans trips with the precision of a project schedule, preferring tech conferences in Austin and cultural food tours in Barcelona, while dreaming of a future visit to Tokyo for an
    AI expo, always balancing itineraries against their budget and occasional anxiety about travel delays.
  culinary: Santa Ocampo enjoys cooking traditional pepian de pollo and corn tamales, skillfully blending roasted pepitas, annatto, and masa, often experimenting with spice levels while using fresh cilantro
    and tomatillos to recreate the flavors of their family’s heritage and impress friends at weekend dinner gatherings.
  core: Santa Ocampo is a fiercely organized, competitively driven IT leader who thrives on social interaction, channels anxiety into disciplined fitness and meticulous budgeting, and dances through life’s
    challenges with salsa steps and strategic chess moves.
background:
  cultural: 'Santa was born to Guatemalan parents who immigrated to the United States in the early 1990s. He grew up bilingual, speaking Spanish at home while attending English‑language schools in the Wilmington
    area. His family preserved many traditions: weekly homemade meals featuring corn‑based dishes, participation in Catholic celebrations such as Semana Santa, and an appreciation for Guatemalan coffee
    culture. These roots instilled a strong work ethic and a sense of pride in his heritage. Although he values personal achievement and competition, he maintains ties to the local Guatemalan diaspora through
    community events, occasional trips to Guatemala to visit relatives, and volunteering at cultural festivals. His cultural background influences his collaborative style—he is comfortable engaging diverse
    audiences, and he often incorporates Guatemalan motifs in his cooking and dance hobbies as a way to stay connected to his identity.'
