  hobbies: '["Basketball (playing and watching)", "Cooking Southern and soul‑food dishes", "Street photography", "Toastmasters public speaking", "Mentoring youth in entrepreneurship", "Attending live music
    and cultural festivals", "Strategic board games", "Traveling to explore diverse cultures", "Reading business and personal development books"]'
  career_goals: Dwayne aims to become the director of a regional network of high‑quality childcare centers within the next five years, leveraging his business background to improve operational efficiency
    and expand access to early‑learning services in underserved neighborhoods. He plans to earn a Master’s in Education Administration, develop a data‑focused model for measuring child outcomes, and eventually
    influence county‑wide early‑education policy. His long‑term ambition includes founding a nonprofit that blends entrepreneurial strategy with culturally responsive childcare programs.
