    ''Customer communication and service'']'
  hobbies: '[''Community workshop facilitation'', ''Fishing on St. Joseph River'', ''Karaoke and community theater participation'', ''Gardening'', ''Vintage motorcycle restoration'', ''Volunteer work at
    local food bank'', ''Senior mentorship programs'']'
  career_goals: Andre aims to transition from full‑time field work to a mentorship and consultancy role, establishing a small local training program for aspiring electricians. He wants to expand his expertise
    in renewable energy installations, helping homeowners in Elkhart adopt solar and energy‑saving technologies. He also hopes to volunteer as a safety instructor for community workshops, and eventually
    serve on the board of the local trade union to advocate for fair wages and continuing education.
