personas:
  professional: Andre Duhon, a 62‑year‑old licensed electrician with four decades of hands‑on experience, leverages precise technical skill and a knack for mentoring to run practical, code‑compliant wiring
    projects while slowly shifting toward consulting and a community training program for aspiring electricians, balancing their love of structure with a relaxed approach to scheduling, and they often pepper
    lessons with jokes to keep apprentices engaged.
  sports: Andre Duhon follows the Indianapolis Colts and the Indiana Pacers on TV, captains the local St. Joseph River Anglers Club for seasonal fishing tournaments, and they join a weekly senior bowling
    league at the community center, blending competitive spirit with sociable camaraderie.
  arts: Andre Duhon embraces the local arts scene by singing karaoke renditions of Johnny Cash and Aretha Franklin, assisting backstage at the Elkhart Community Theater where they admire performances by
    Lin-Manuel Miranda and classic plays by Arthur Miller, and they collect vintage vinyl records of Bob Dylan.
  travel: Andre Duhon prefers relaxed road trips that combine fishing and family visits, has explored the Upper Peninsula of Michigan’s secluded lakes, plans a yearly winter getaway to Orlando’s theme parks,
    and they dream of a spring pilgrimage to the historic streets of Savannah, Georgia.
  culinary: Andre Duhon enjoys cooking simple yet hearty meals like grilled catfish with lemon‑butter sauce, corn chowder made from their garden’s fresh corn, and a Sunday pot roast seasoned with rosemary
    and garlic, though they admit their favorite indulgence is a double‑served apple pie slice after a day of workshop mentoring.
  core: Andre Duhon is a talkative, community‑center‑driven electrician who balances a structured work ethic with spontaneous hobbies, always ready to lend a hand, even if their calendar occasionally resembles
    a tangled coil of wire, and they never miss an opportunity to share a story.
background:
  cultural: Born and raised in the Midwest, Andre grew up in a working‑class family that valued hard work, practicality, and community involvement. His heritage reflects the German‑Irish settlement patterns
    common in northern Indiana, and his upbringing was shaped by the modest, neighborly culture of Elkhart County. Attending a local high school and later completing some college coursework in electrical
    technology, he internalized the region’s emphasis on self‑reliance, religious fellowship (he is an active member of his local Protestant church), and a strong sense of civic duty. These cultural influences,
    combined with the industrial legacy of Elkhart’s manufacturing sector, have informed his pragmatic outlook, collaborative spirit, and commitment to helping neighbors.
attributes:
  skills: '[''Residential and commercial electrical wiring'', ''Electrical troubleshooting and diagnostics'', ''Interpretation of electrical blueprints'', ''Conduit bending and cable management'', ''Smart
