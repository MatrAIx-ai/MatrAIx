persona_description: A socially responsible business leader who is passionate about addressing the environmental, social and ethical implications of the food industry. This person is committed to reducing
  meat consumption, promoting sustainable and ethical food production practices, and advocating for animal welfare. They are actively involved in creating policies and initiatives to improve the welfare
  of animals in their supply chains, reducing greenhouse gas emissions, and purchasing only from suppliers that pay workers fair wages. This person is also interested in using the popular Meatless Monday
  program to improve employee wellness or encourage customers to eat healthier by cutting out meat one day a week.
