  career_goals: Stevie aims to move from a single‑store supervisor role to a district or regional manager within the next five years, overseeing multiple locations and driving revenue growth through data‑driven
    strategies. She plans to augment her STEM background with an MBA focused on retail analytics, positioning herself to lead digital transformation initiatives and mentor emerging leaders. Long‑term, she
    aspires to launch her own retail consulting firm that helps independent stores adopt technology while fostering inclusive workplace cultures.
