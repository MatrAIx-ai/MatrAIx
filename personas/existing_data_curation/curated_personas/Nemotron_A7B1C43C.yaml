personas:
  professional: Stevie Singletary is a retail operations leader who combines a STEM‑driven analytical mindset with hands‑on store management, using Power BI dashboards and advanced POS analytics to streamline
    inventory, train first‑line sales teams, and drive consistent sales growth while planning the next step toward a district‑manager role.
  sports: Stevie Singletary leads a community adult basketball league, runs with the Brockton Trail Runners in the spring, cheers for the Boston Celtics and New England Patriots, and incorporates weekly
    HIIT sessions to balance strength and endurance.
  arts: Stevie Singletary expresses creativity through hip‑hop dance classes inspired by Missy Elliott and Kendrick Lamar, curates a personal playlist of contemporary R&B while attending live shows at the
    Cosgrove Center, and contributes insights to a women’s leadership book club that often discusses works by Sheryl Sandberg.
  travel: Stevie Singletary prefers weekend getaways that blend adventure and culture, having recently hiked the Blue Hills, booked a culinary tour of New Orleans for its jazz and gumbo scene, and plans
    a future trip to Lisbon to explore its historic neighborhoods and emerging food scene.
  culinary: Stevie Singletary enjoys modernizing classic soul‑food at home, frequently preparing shrimp‑and‑grits with miso butter, collard greens seasoned with smoked paprika, and sweet‑potato pie topped
    with chai‑infused whipped cream, while sourcing organic produce from the local farmer’s market.
  core: Stevie Singletary blends analytical precision with vibrant social energy, obsessively tracks metrics at work and in fitness, yet can’t resist a late‑night dance class or a spontaneous run on a scenic
    trail.
background:
  cultural: Stevie grew up in a close‑knit African‑American family in Brockton, where church gatherings, family storytelling, and community solidarity were central. Her parents emphasized education and
    resilience, teaching her the value of hard work and cultural pride. She celebrates Black History Month and participates in local Juneteenth events, staying connected to her heritage through music, cuisine,
    and mentorship of younger Black professionals. Her cultural identity informs her leadership style—emphasizing inclusivity, empowerment, and a collaborative spirit within the diverse teams she manages.
