  career_goals: Chong aspires to pursue a career in engineering, ideally in robotics or computer science, where he can blend his love for problem‑solving with practical invention. He plans to attend a STEM‑focused
    high school and later a university engineering program, aiming to design assistive technologies that improve daily life for seniors and people with disabilities—reflecting his caring nature. He also
    hopes to maintain his bilingual ability, eventually working on projects that bridge Korean and American tech communities. Long‑term, he dreams of leading a small research team that values collaboration,
    harmony, and thoughtful, well‑planned innovation.
