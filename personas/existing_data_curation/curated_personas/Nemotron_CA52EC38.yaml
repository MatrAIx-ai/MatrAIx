personas:
  professional: Chong Noh, a 12‑year‑old budding robotics enthusiast, blends a love for building Lego robotics kits with a methodical, practical mindset, channeling curiosity into structured experiments
    while reliably meeting school project deadlines.
  sports: Chong Noh enjoys weekend hikes along Cherokee County trails with a close friend, follows the Atlanta Braves for baseball and the Cherokee High School Tigers soccer team, and occasionally practices
    beginner basketball at the community center.
  arts: Chong Noh expresses creativity through drawing manga characters, practicing calligraphy, and immersing in K‑pop hits from BTS and BLACKPINK as well as Korean dramas starring Lee Min‑ho, which together
    shape a vibrant artistic identity.
  travel: Chong Noh prefers low‑key adventures, planning day trips to the Great Smoky Mountains and dreaming of a future trip to Tokyo’s anime districts, while recalling a memorable visit to the Smithsonian
    National Air and Space Museum and hoping to camp under the Milky Way in the Atacama Desert.
  culinary: Chong Noh enjoys the comforting taste of ramen and the spicy kick of tteokbokki, can skillfully whip up a basic kimchi fried rice with a beginner’s cooking set, but sometimes neglects breakfast
    in favor of late‑night candy runs.
  core: Chong Noh is a curious, quietly diligent 12‑year‑old who balances a love for robotics, manga, and stargazing with a cautious nature, occasional worry, and a penchant for saving pocket money toward
    future tech gadgets.
background:
  cultural: Chong is a Korean‑American growing up in Cumming, Georgia. His family maintains strong cultural traditions, celebrating holidays such as Lunar New Year and Chuseok with Korean dishes, ancestral
    rites, and the practice of speaking Korean at home. The household places a high value on education, respect for elders, and community harmony—principles that shape his polite and cooperative demeanor.
    While he enjoys Southern hospitality and engages with the local community through school activities and occasional church gatherings, his Korean heritage remains a central part of his identity, influencing
    his language skills, culinary preferences, and interest in Korean arts and media.
attributes:
