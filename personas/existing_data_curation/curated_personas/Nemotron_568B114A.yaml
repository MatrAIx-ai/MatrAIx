  hobbies: '[''Reading books'', ''Drawing animals'', ''LEGO building'', ''Collecting rocks and leaves'', ''Solitary puzzle games'', ''Listening to audiobooks'', ''Writing short stories'', ''Visiting the
    library'']'
  career_goals: Allison dreams of a future where she works in a calm, predictable environment that lets her help others while largely working independently. She often imagines herself as a veterinarian,
    caring for animals in a routine-driven clinic, or as a librarian, organizing books and guiding quiet readers. Her long-term ambition is to study biology and literature so she can combine her love of
    animals, learning, and orderly spaces into a career that feels both practical and rewarding.
