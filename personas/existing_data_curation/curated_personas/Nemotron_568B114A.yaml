personas:
  professional: Allison Cure, a budding junior naturalist, channels her love for structure into meticulously cataloguing backyard wildlife, building detailed LEGO ecosystems, and drafting illustrated field
    notes that hint at an early scientific career, and they proudly display each completed project on their bedroom shelf.
  sports: Allison Cure, a quiet fan of the Chicago Cubs and a member of the Kids Nature Explorers Club, prefers solitary nature walks over team sports but joins the school’s after‑school walking challenge
    to stay active and earn their own step‑count badge.
  arts: Allison Cure, a dedicated wildlife sketcher, draws inspiration from National Geographic photo essays and the animated films of Hayao Miyazaki, while listening to the soothing piano arrangements
    of The Piano Guys during art sessions.
  travel: Allison Cure, who loves planning low‑key adventures, has explored the nearby state park’s canyon trails and the local natural history museum, and dreams of a family trip to the Grand Canyon and
    the Smithsonian in Washington, D.C., while keeping excursions short to fit school schedules.
  culinary: Allison Cure, an enthusiastic junior chef, enjoys arranging colorful fruit salads with blueberries, strawberries, and kiwi, perfecting peanut butter and banana sandwiches, and experimenting
    with simple chocolate‑chip cookie recipes featuring rolled oats.
  core: Allison Cure, a solitary seven‑year‑old explorer, balances a love for structured curiosity with a flexible, quietly assertive personality, often losing track of chores while immersing in detailed
    nature projects.
background:
  cultural: Allison is a white, Midwestern child raised in Milwaukee County, Wisconsin. Her family’s roots trace back to German and Irish immigrants, and she grew up with modest, community-focused values
    typical of the region. She regularly visits the Milwaukee Public Library, participates in seasonal community events like the Summerfest family zone and local farmers' markets, and enjoys regional foods
    such as cheese curds and fresh berries. The city’s strong emphasis on public education, library programs, and outdoor recreation has reinforced her love for reading, quiet study spaces, and exploring
    nature in the nearby parks and along Lake Michigan’s shoreline.
