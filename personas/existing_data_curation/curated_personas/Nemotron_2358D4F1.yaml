  hobbies: '[''Basketball'', ''Competitive video gaming'', ''Fishing on Lake Martin'', ''Weightlifting'', ''Listening to hip‑hop, R&B, and gospel music'', ''Car detailing'']'
  career_goals: Austin aims to obtain his full real estate license within the next year and transition from an entry‑level broker’s assistant to a top‑producing agent in Calhoun County. He envisions building
    a personal client base that generates $200,000 in sales volume annually by age 25. In the longer term, he hopes to open his own boutique brokerage focused on serving first‑time homebuyers and minority
    investors, and eventually develop a small portfolio of rental properties to create passive income. His competitive drive pushes him to earn regional awards and become a recognized mentor for other young
    agents.
