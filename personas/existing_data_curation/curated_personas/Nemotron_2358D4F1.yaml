personas:
  professional: Austin Thompson, an 18‑year‑old broker’s assistant in Calhoun County, leverages meticulous paperwork skills, data‑driven pricing, and a fiercely competitive negotiating style to close beginner‑friendly
    deals while eyeing a top‑producing agent status within a year.
  sports: Austin Thompson anchors a pick‑up basketball team at the local community center, follows the NBA’s Miami Heat, supports the Alabama Crimson Tide men’s basketball, and spends early mornings lifting
    at the town gym while also joining the Lake Martin anglers’ club for weekend fishing trips.
  arts: Austin Thompson curates dynamic playlists featuring Kendrick Lamar, H.E.R., and Kirk Franklin, and spends downtime listening to these hip‑hop, R&B, and gospel blends while detailing his older sedan
    and winding down after intense gaming sessions.
  travel: Austin Thompson favors budget road trips, having road‑tripped to New Orleans for its music scene and to the Gulf Coast for beach sunsets, while dreaming of a future solo adventure to Seattle’s
    tech hubs once his real‑estate earnings stabilize.
  culinary: Austin Thompson enjoys a mix of Southern comfort foods like shrimp‑and‑grits, grilled chicken wings with a spicy rub, and protein‑packed smoothies, cooking simple meals at home yet often treating
    themselves to late‑night fast‑food tacos after intense gaming nights.
  core: Austin Thompson balances a hyper‑structured work ethic with competitive gaming, basketball, and a lingering worry about performance, driving a relentless pursuit of real‑estate success tempered
    by occasional over‑thinking and a love for detailed car care.
background:
  cultural: Austin grew up in a close‑knit African‑American community in the rural South, where church, family gatherings, and Southern hospitality shaped his worldview. Weekly services at a historically
    Black Baptist church taught him the value of resilience, communal support, and public speaking. Southern culinary traditions and weekend barbecues are part of his family life. Living in Alabama exposed
    him to the region’s civil‑rights legacy, which fuels his awareness of social inequities and motivates him to serve as a trusted advisor for other Black homebuyers. He carries the cultural pride of Southern
    Black heritage while navigating the challenges of being a young professional in a predominantly white industry.
attributes:
