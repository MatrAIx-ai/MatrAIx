personas:
  professional: A diligent office administrator with a talent for streamlining clerical workflows, Lois Risley leverages their sharp interpersonal skills and curiosity about new processes to lead a small
    team, while their relaxed attitude toward strict scheduling sometimes leads to last‑minute scrambles when transitioning to a full office manager role.
  sports: An enthusiastic hiker of Cherokee National Forest trails, Lois Risley also enjoys weekend yoga sessions, follows the Tennessee Volunteers football team and the Nashville Predators hockey club,
    and occasionally joins a local recreational soccer league, viewing fitness as a blend of adventure and community.
  arts: A passionate visual creator, Lois Risley paints acrylic landscapes inspired by Georgia O’Keeffe, captures black‑and‑white scenes echoing Ansel Adams, sketches architectural details reminiscent of
    Frank Lloyd Wright, and regularly attends exhibitions featuring contemporary artists like Kehinde Wiley and Maya Lin.
  travel: A weekend road‑trip aficionado, Lois Risley plans spontaneous drives along the Blue Ridge Parkway and seasonal festivals in Asheville, while dreaming of a fall pilgrimage to Kyoto’s temples, balancing
    a modest travel budget with a love for cultural immersion.
  culinary: A home‑cook who blends Southern comfort with modern flair, Lois Risley whips up shrimp and grits with fresh basil, peach‑glazed BBQ ribs, and collard greens tossed with miso, often harvesting
    thyme and rosemary from their modest herb garden.
  core: Lois Risley juggles a restless curiosity for art and administrative excellence with a habit of procrastinating paperwork, a lingering anxiety, and a stubborn devotion to spontaneous creativity.
background:
  cultural: Lois grew up in Vonore, a small town in Monroe County nestled in the Appalachian foothills of East Tennessee. Her family embodies the traditional Southern hospitality and close-knit community
    values typical of the region, with a background in church-centered gatherings and local festivals such as the annual Apple Festival. While raised with a respect for regional customs—folk music, quilting,
    and home-cooked comfort food—Lois has always been curious about broader cultural experiences. She regularly travels to nearby Knoxville for museum visits and performances, integrating a more eclectic
    artistic palate while staying grounded in her Appalachian roots. This blend of small-town Southern upbringing and an openness to new ideas shapes her worldview, balancing a reverence for community with
    a desire to explore unconventional perspectives.
