  career_goals: Lois aims to transition from a first-line supervisor to a full office manager within the next three years, gaining a broader strategic perspective on operations. She plans to complete a
    bachelor's degree in Business Administration, pursue the Certified Administrative Professional (CAP) credential, and acquire basic project-management training such as a Scrum Master or PMP introductory
    course. Her ambition includes leading cross-departmental initiatives that reduce administrative overhead, mentoring junior staff, and ultimately positioning herself for an operations-manager role in
    a regional firm. Parallel to her professional trajectory, she hopes to integrate her artistic interests by establishing a small community art space or workshop that could serve as both a creative outlet
    and a venue for local talent.
