  hobbies: '[''Beach volleyball'', ''Sailing'', ''Hiking and nature walks'', ''Beach clean‑up volunteering'', ''Digital photography'', ''Social‑media art projects'', ''Journaling and mindfulness'', ''Reading
    mystery novels'', ''Community theatre involvement'']'
  career_goals: Lyndsey aims to enroll in a community college program in environmental studies or marine science, with the long‑term ambition of becoming a marine conservation specialist who designs sustainable
    tourism experiences on Martha’s Vineyard. She also hopes to obtain certification as a peer‑support counselor, leveraging her own experiences with anxiety to help other adolescents navigate emotional
    challenges. In the short term, she plans to secure part‑time work in a local eco‑tourism business to gain hands‑on experience, while building a portfolio of photography and social‑media projects that
    promote responsible island stewardship.
