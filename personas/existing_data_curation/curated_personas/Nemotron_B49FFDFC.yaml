  career_goals: Kareem aims to become a senior investment strategist or portfolio manager at a leading hedge fund, where he can lead a quantitative research team and develop innovative AI‑driven investment
    strategies. He plans to earn the CFA charter and pursue an MBA to deepen his strategic acumen. Over the next five years, he aspires to launch a fintech startup focused on socially responsible investing,
    publish thought‑leadership articles, and become a frequent speaker at industry conferences, cementing his reputation as a forward‑thinking finance professional.
