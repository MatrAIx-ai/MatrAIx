personas:
  professional: Christon Golen is a seasoned management analyst who leverages advanced analytics tools like SQL, Tableau, and Python to transform complex data into strategic roadmaps, while employing design‑thinking
    workshops and empathetic leadership to guide cross‑functional teams through large‑scale change initiatives.
  sports: Christon Golen is a sailing enthusiast who spends weekends with the Jacksonville Sailing Club and paddleboards along the Atlantic, while cheering for the Jacksonville Jaguars, following the Florida
    Gators football season, and occasionally playing pick‑up basketball at the local YMCA.
  arts: Christon Golen regularly visits the Cummer Museum to study Monet and Rothko, sketches installations at Moccasin Creek Art Gallery, captures contemporary works through a Leica camera inspired by
    Ansel Adams, and finds creative spark in the ambient performances at the Florida Theatre featuring artists like Yo‑Yo Ma.
  travel: Christon Golen plans travel with a blend of spreadsheet precision and spontaneous curiosity, favoring sailing trips to the Bahamas, cultural immersion in Barcelona’s art districts, weekend road‑trips
    to Savannah’s historic squares, and keeps an eye on budget constraints to balance family commitments with personal adventure.
  culinary: Christon Golen experiments with regional Florida cuisine by crafting dishes such as cracked conch with citrus vinaigrette, smoked trout grits, and key‑lime infused seafood paella, sourcing native
    ingredients like sawgrass and prickly pear, while occasionally over‑seasoning to the point of heat overload and hosting tasting evenings for friends.
  core: Christon Golen fuses analytical rigor with an artist’s curiosity, steering strategic transformation by day and recharging through sailing, mentorship, and daring culinary experiments, all while
    wrestling with a penchant for over‑planning and occasional impulsive splurges on art supplies.
background:
  cultural: Christon grew up in a middle‑class, white Southern family with roots in the Mid‑Atlantic, blending traditional Southern hospitality with a broader American cultural exposure. His upbringing
    in Florida's coastal environment has ingrained a relaxed, outdoor‑oriented lifestyle, while his education in business introduced him to diverse perspectives and global market dynamics. He values community
    involvement, embraces the multicultural vibrancy of Jacksonville Beach, and enjoys the region’s mix of beach culture, arts festivals, and Southern culinary traditions, all of which shape his balanced,
    open‑minded outlook.
attributes:
  skills: '["Data Analysis and Visualization", "Strategic Planning", "Process Improvement", "Financial Modeling", "Project Management (Agile & Waterfall)", "Stakeholder Engagement", "Design Thinking", "Facilitation
    and Workshop Leadership", "Conflict Resolution", "Empathetic Leadership"]'
  hobbies: '["Art gallery visits and sketching", "Photography (especially coastal and architectural subjects)", "Sailing and paddleboarding", "Volunteer mentorship for youth", "Experimental cooking", "Reading
    philosophy and contemporary non‑fiction", "Gardening (native Floridian flora)"]'
  career_goals: Christon aims to advance into senior leadership, targeting roles such as Director of Business Transformation or Chief Strategy Officer within the next five years. He is committed to leading
    large‑scale organizational change that blends analytical rigor with human‑centered design, fostering inclusive cultures and sustainable growth. He plans to earn a PMP certification and possibly pursue
    an executive MBA to deepen his strategic acumen. A long‑term ambition is to launch a community‑focused consultancy that offers pro‑bono strategic services to non‑profits and social enterprises in the
    Jacksonville area, leveraging his passion for helping others and building harmonious workplaces.
