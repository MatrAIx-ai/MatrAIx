  career_goals: Although retired, Hoan aims to leverage his technical background and love for the arts to mentor the next generation of STEM enthusiasts, especially those from immigrant families. He hopes
    to develop a community‑based program that pairs senior engineers with youth for hands‑on projects in robotics and digital art. He also dreams of compiling a memoir that intertwines his migration story
    with reflections on art and innovation, and to exhibit his photography series capturing everyday life in Philadelphia’s diverse neighborhoods. Ultimately, he wishes to become a cultural ambassador,
    fostering dialogue between the Vietnamese diaspora and the broader local arts scene.
