  career_goals: Jeffrey aims to channel his blend of curiosity and practical thinking into a technology-focused career. In the short term, he plans to graduate high school with a strong academic record,
    earn a certification in Python programming, and join his school's robotics or engineering club to deepen his hands-on experience. He aspires to pursue a bachelor's degree in computer science or mechanical
    engineering, with an eye toward designing and developing innovative products such as autonomous devices or smart-home solutions. Ultimately, Jeffrey envisions working as a software or hardware engineer,
    contributing to interdisciplinary teams, and perhaps leading projects that integrate his interests in coding, electronics, and systematic problem solving.
