personas:
  professional: Jeffrey Nyman is a diligent high school sophomore who excels in the robotics club, meticulously codes Arduino projects, volunteers at the community library to organize tech workshops, and
    envisions a future as an electrical engineer designing sustainable consumer gadgets.
  sports: Jeffrey Nyman plays pick‑up basketball at the local park, idolizes the New York Knicks and follows the NBA season closely, cheers for the New York Giants during football season, and also participates
    in the high school intramural soccer league on weekends.
  arts: Jeffrey Nyman devotes weekend evenings to reading classic science‑fiction novels like Dune and Ender's Game, captures sunrise shots of Rockland County’s parks with a DSLR inspired by Ansel Adams,
    and jams to indie rock bands such as The Strokes and Arctic Monkeys while editing his photos.
  travel: Jeffrey Nyman loves planning day trips that blend nature and city life, revisiting the Hudson River waterfront and the bustling streets of Manhattan, while dreaming of a future road trip to the
    Grand Canyon and a weekend getaway to Washington D.C.'s Smithsonian museums.
  culinary: Jeffrey Nyman enjoys crafting homemade pepperoni pizza with a crisp cauliflower crust, perfecting classic mac and cheese using sharp cheddar, and topping off his snacks with fresh strawberries
    and artisan chocolate chip cookies.
  core: Jeffrey Nyman is a systematic teen tinkerer who balances basketball courts with Arduino projects, yet hoards stray wires in their backpack and occasionally skips bedtime for late‑night gaming sessions.
background:
  cultural: Jeffrey grew up in Spring Valley, a suburban community in Rockland County, New York, within a predominantly white, middle-class environment. His family's cultural roots trace back to European
    ancestry, with traditions drawn from Irish-American and broader Anglo-Saxon customs. He was raised with typical American suburban values that emphasize education, community involvement, and civic holidays
    such as Thanksgiving and the Fourth of July. Local influences include participation in school clubs, attendance at nearby county fairs, and occasional trips to New York City, which expose him to a mix
    of cultural experiences while reinforcing the steady, practical outlook characteristic of his upbringing.
