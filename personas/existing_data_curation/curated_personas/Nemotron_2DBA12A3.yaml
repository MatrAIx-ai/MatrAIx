  career_goals: Jonathan dreams of turning his love for building and coding into a career. He hopes to attend a specialized STEM high school where he can deepen his programming skills and join a competitive
    robotics team. His long‑term ambition is to become a software engineer who designs interactive games or educational robots, merging his curiosity with practical problem‑solving. He also envisions playing
    varsity basketball in high school and possibly earning a scholarship that could fund his engineering studies. He sees these goals as a way to prove his abilities, stay ahead of his peers, and eventually
    develop tech projects that benefit his neighborhood.
