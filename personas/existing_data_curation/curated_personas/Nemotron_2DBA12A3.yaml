personas:
  professional: Jonathan Perez, a 12‑year‑old budding robotics enthusiast, channels his curiosity and practicality into building intricate LEGO creations with motorized parts, programming basic Mindstorms
    robots at his after‑school club, and sketching sci‑fi comic‑inspired designs that blend imagination with functional prototypes, all while maintaining a competitive edge that drives him to out‑engineer
    his peers.
  sports: Jonathan Perez spends afternoons shooting hoops at the Brooklyn community court, idolizes the New York Knicks, competes for a starting point‑guard spot in the local youth basketball club Brooklyn
    Hoops, and cycles to Prospect Park for warm‑ups, showcasing a fast‑paced, competitive spirit that fuels both his love of basketball and his need for flexible, spontaneous exercise.
  arts: Jonathan Perez devours graphic novels such as Saga and Teenage Mutant Ninja Turtles, sketches superhero renditions in a well‑worn sketchbook, streams indie rock bands like The Strokes and hip‑hop
    artists like Kendrick Lamar while building LEGO contraptions, and follows the latest Marvel cinematic releases, reflecting a blend of visual storytelling, musical enthusiasm, and hands‑on creativity.
  travel: Jonathan Perez favors spontaneous weekend trips, biking to the nearby Coney Island boardwalk for amusement rides, joining school field trips to the American Museum of Natural History, dreaming
    of a future visit to Tokyo’s Akihabara for tech and anime, while staying budget‑conscious and relying on parents for longer vacations.
  culinary: Jonathan Perez loves quick kitchen experiments like crafting mini pepperoni pizzas on an English muffin with shredded mozzarella and a dash of oregano, occasionally adds pineapple for a sweet
    twist, snacks on fresh carrot sticks, and sometimes raids the fridge for leftover chicken nuggets, showing a penchant for convenience, flavor exploration, and occasional messy indulgence.
  core: Jonathan Perez is a curious, competition‑driven tinkerer who blends spontaneous LEGO engineering with basketball hustle, yet often forgets homework and misplaces their snack stash.
background:
  cultural: Jonathan is a White American raised in the vibrant, multicultural neighborhoods of Brooklyn and Queens. His family traces its roots to Irish and German ancestry, and they celebrate typical American
    holidays such as Thanksgiving and Christmas, often adding a few traditional dishes like Irish soda bread or German pretzels. Growing up in a densely populated urban setting, he regularly interacts with
    peers from Latino, Asian, and African‑American backgrounds, which has exposed him to a variety of languages, foods, and community events. He attends a public elementary school that emphasizes cultural
    inclusivity, and he participates in after‑school programs like the Boys & Girls Club and a community robotics workshop. While his household primarily speaks English, the neighborhood’s diversity enriches
    his worldview, fostering both curiosity and a cautious, competitive edge when navigating social situations.
