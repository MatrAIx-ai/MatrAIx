personas:
  professional: Chou Tang is an aspiring computer science student who blends bilingual fluency and a love of strategic video games to prototype multilingual mobile apps, and they often serve as the calm
    mediator in small programming teams thanks to a pragmatic, curiosity‑driven mindset.
  sports: Chou Tang enjoys weekend hikes in Rockefeller State Park, follows the New York Knicks and New York Giants with fervor, joins a local hiking club for monthly trail outings, and they occasionally
    play pickup basketball with friends, balancing low‑intensity endurance with moments of competitive spirit.
  arts: Chou Tang expresses creativity through street photography inspired by Sebastião Salgado, curates playlists featuring Tame Impala and Jay Chou, and they frequently experiment with graphic design
    using Adobe Illustrator for personal projects, seeing visual arts as a quiet complement to their analytical mindset.
  travel: Chou Tang prefers flexible, low‑key travel, often planning spontaneous weekend getaways to the Adirondacks or short flights to Taiwan and Kyoto, while they stash savings for a future backpacking
    tour across Europe, favoring off‑beat neighborhoods over tourist crowds.
  culinary: Chou Tang enjoys cooking home‑cooked versions of mapo tofu and pork dumplings, infusing them with locally sourced ginger, Sichuan peppercorns, and occasionally a dash of espresso for an unexpected
    twist, and they also experiment with Western dishes like avocado toast topped with miso butter, reflecting a blend of tradition and personal creativity.
  core: Chou Tang is a pragmatic yet curious 19‑year‑old tech enthusiast who balances bilingual software projects with late‑night puzzle games, spontaneous photography walks, and experimental cooking, while
    they habitually let chores slip and thrive on low‑key spontaneity.
background:
  cultural: Chou was born in Scarsdale, NY, to first‑generation Chinese immigrants who maintain many traditional customs at home, such as celebrating Lunar New Year, speaking Mandarin, and practicing ancestor
    veneration. While his family upholds Confucian values that emphasize education, respect, and harmony, they also embrace the suburban American lifestyle, encouraging participation in local community
    events and extracurricular activities. This blend of Chinese heritage and the opportunities of a diverse, affluent New York environment has shaped his worldview, fostering both a strong sense of cultural
    identity and an openness to new ideas.
