  career_goals: Chou plans to enroll in a university program focused on Computer Science or Human‑Computer Interaction, seeking an environment that balances rigorous academics with flexibility. In the next
    five years he aims to develop multilingual software tools—such as mobile apps that simplify language translation—and to secure internships at tech start‑ups where he can apply his programming and design
    skills. Ultimately, he envisions a career as a software engineer or product designer who leverages his cultural fluency and pragmatic problem‑solving to create user‑centric technology solutions.
