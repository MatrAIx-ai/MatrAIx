  career_goals: At 59, John aims to transition from a frontline phlebotomist to a senior mentor and quality‑improvement lead within his laboratory. He plans to obtain the Certified Phlebotomy Specialist
    (CPS) credential to formalize his expertise, and to spearhead a lab‑wide initiative that streamlines specimen processing to lower error rates. John also hopes to train a cohort of junior phlebotomists,
    cultivating a culture of precision and patient‑centered care. While competitive in performance metrics, he balances this drive with a practical desire to leave a lasting, positive impact on his department
    before retirement, possibly moving into a part‑time consulting role for community health clinics.
