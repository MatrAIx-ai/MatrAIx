personas:
  professional: Sonny Brafford, a senior mechanical and systems engineer with over thirty years designing municipal infrastructure on Florida’s Space Coast, leverages their meticulous problem‑solving, clear
    technical writing, and sociable leadership to guide multidisciplinary teams toward cost‑effective, safety‑first, and increasingly sustainable solutions.
  sports: Sonny Brafford cycles with the Space Coast Cycling Club on sunny mornings, rows their boat on the Indian River during summer, fishes in the Mosquito Lagoon year‑round, roots for the Tampa Bay
    Buccaneers, the Tampa Bay Lightning, and the Orlando Magic on game days, and enjoys occasional rounds at the Emerald Golf Club on weekends.
  arts: Sonny Brafford relaxes by strumming acoustic covers of Jimmy Buffett and Tom Petty at neighborhood barbecues, collects vintage Fender guitars, attends live performances at the Brevard Performing
    Arts Center featuring acts like the Savannah Philharmonic, and they frequently watch space‑themed documentaries by Ron Howard and Brian May.
  travel: Sonny Brafford plans trips on a detailed spreadsheet, favoring a blend of mission‑centric tours to Kennedy Space Center and leisurely getaways to the Bahamas, while their bucket‑list includes
    chasing the aurora borealis in Iceland and embarking on a heritage road‑trip along Route 66, all balanced against family commitments and a modest travel budget.
  culinary: Sonny Brafford showcases their grilling prowess by marinating fresh‑caught grouper in lime, cilantro, and habanero, perfecting a smoky brisket rub with paprika, brown sugar, and coffee grounds,
    and they regularly incorporate garden‑grown heirloom tomatoes into caprese salads and pineapple‑salsa tacos.
  core: Sonny Brafford is a pragmatic, community‑driven engineer who melds a love for hands‑on DIY, weekend boat rides, and mentorship with an obsessive habit of tracking every budget line, even if it sometimes
    leads them to late‑night CAD crunch sessions and a lingering coffee habit.
background:
  cultural: Sonny grew up in a middle-class, Anglo-American family that valued hard work, practical problem-solving, and community involvement. Raised near the Space Coast, he was immersed early in the
    region’s aerospace and engineering culture, which sparked his curiosity about how things work. The multicultural flavor of Palm Bay—mixing retirees, military families, and a growing Hispanic community—has
    taught him to appreciate diverse perspectives while maintaining a pragmatic, methodical approach to life. His cultural identity blends traditional American individualism with a strong sense of local
    civic duty.
