  hobbies: '[''Boating'', ''Fishing'', ''Cycling'', ''Hiking'', ''Community Volunteering (STEM outreach)'', ''Attending Space Launch Events'', ''DIY Home Improvement'', ''Gardening'', ''Barbecue Cooking'',
