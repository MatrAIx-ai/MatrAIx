  career_goals: At 55, Sonny aims to step into a senior technical leadership role where he can mentor the next generation of engineers and spearhead sustainability initiatives for the region, such as integrating
    renewable energy solutions into municipal infrastructure. He is pursuing his Professional Engineer (PE) license and plans to earn a PMP certification to formalize his project-management expertise. In
    the longer term, he hopes to transition to independent consulting, focusing on green engineering projects that balance cost-effectiveness with environmental stewardship.
