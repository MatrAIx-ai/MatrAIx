personas:
  professional: Kara Carter, a 16‑year‑old aspiring civil engineer, leads her high school robotics club while applying the disciplined repetition of their piano practice to meticulous Excel‑based project
    tracking and team scheduling, showcasing their strong organizational abilities, competitive drive, and passion for concrete, community‑focused infrastructure.
  sports: Kara Carter competes in cross‑country during the fall with their high school team, training rigorously to improve times while idolizing the Ohio State Buckeyes track & field program and cheering
    on the Cleveland Browns on weekends for a balanced mix of personal competition and community spirit.
  arts: Kara Carter is an intermediate pianist who regularly interprets Beethoven’s 'Moonlight Sonata' and enjoys listening to Lang Lang's performances, while they also attend the local symphony's concerts
    and dive into true‑crime novels by Ann Rule for narrative intrigue.
  travel: Kara Carter prefers structured weekend trips, having explored Hocking Hills State Park and taken a school field trip to Washington, D.C., and dreams of visiting the Swiss Alps to study sustainable
    bridge designs and the historic wooden bridges of Kyoto, Japan, where they balance adventure with purposeful learning.
  culinary: Kara Carter cooks with methodical precision, often preparing chicken stir‑fry with broccoli, garlic, and soy sauce, perfecting banana pancakes for weekend brunch, and tracking nutritional macros
    in a spreadsheet to maintain energy for their running and robotics projects.
  core: Kara Carter is a meticulous teen who transforms every academic or extracurricular challenge into a structured puzzle, driven by a competitive spirit and a constant undercurrent of anxiety that fuels
    both their relentless self‑improvement and occasional over‑analysis.
background:
  cultural: Kara comes from a family of Bulgarian‑American immigrants who settled in the Midwest. While English is spoken at home and in school, her parents maintain several Eastern European traditions,
    such as celebrating St. George’s Day, preparing dishes like banitsa and baklava, and occasionally teaching her basic Bulgarian phrases. Growing up in Aurora, Ohio, a predominantly white, middle‑class
    suburb, she has been shaped by typical Midwestern values of hard work, community involvement, and modesty. Her cultural heritage reinforces a respect for discipline and structure, while the surrounding
    American environment encourages a practical, goal‑oriented outlook.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Detail-oriented note taking'', ''Basic spreadsheet analysis (Excel/Google Sheets)'', ''Introductory Python programming'', ''First aid & CPR
    certification'', ''Intermediate piano'', ''Robotics team leadership'']'
  hobbies: '[''Piano (classical practice)'', ''Sudoku and logic puzzles'', ''Cross-country running'', ''Reading true-crime & self-help books'', ''Robotics kit programming (Python)'', ''Journaling and mindfulness
    meditation'', ''Strategic board games (chess, Settlers of Catan)'']'
  career_goals: Kara is driven to pursue a career that offers clear structure, tangible outcomes, and a sense of responsibility to her community. Her primary goal is to earn a bachelor's degree in civil
    engineering with a focus on transportation infrastructure, eventually becoming a licensed Professional Engineer who designs safe and sustainable roads and bridges in Ohio. In the short term, she intends
    to boost her math and physics grades, secure a summer internship at a local engineering firm, and obtain her driver's license to increase independence. She also plans to achieve the Engineer-in-Training
    (EIT) certification after college and aim for top placements in engineering competitions. As a backup, she remains interested in nursing, valuing its stability and direct impact on community health.
