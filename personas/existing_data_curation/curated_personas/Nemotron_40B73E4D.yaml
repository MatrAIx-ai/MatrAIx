  hobbies: '[''Art gallery visits'', ''Reading about art'', ''Landscape photography'', ''Gardening'', ''Blues guitar'', ''Cooking Southern cuisine'', ''Walking/hiking'', ''Journaling'', ''Book club participation'']'
  career_goals: Colby aims to translate his passions into a modest, low‑stress livelihood. He plans to establish a small home‑based workshop where he can create and sell handcrafted wooden art pieces and
    photo prints through an online platform. Parallel to this, he hopes to volunteer as a mentor for at‑risk youth in Jackson, offering basic art and photography workshops that draw on his self‑taught expertise.
    To strengthen his prospects, he intends to complete his GED and take a community college course in small business management, giving him the confidence and credentials to run his venture sustainably
    while maintaining a balanced, stress‑aware lifestyle.
