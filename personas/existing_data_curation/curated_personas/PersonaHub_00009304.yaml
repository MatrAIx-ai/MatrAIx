persona_description: A Java programmer who is interested in learning about the limitations and restrictions of Java's generics feature, particularly in relation to the types that can be put into a collection.
  The person is likely to be interested in learning about the practical implications of the warning generated by the compiler when allowing anything into a collection, and how this relates to the types
  that can be put into a collection. The person is likely to be interested in understanding the theoretical aspects of generics in Java, such as the fact that they are only applied at compile time and the
  types that can be put into a collection. The person is likely to be interested in learning about the practical limitations of using generics in Java, such as the fact that the types running in the JVM
  would still look like the legacy code above and the fact that the compiler enforces what can be put into a collection.
