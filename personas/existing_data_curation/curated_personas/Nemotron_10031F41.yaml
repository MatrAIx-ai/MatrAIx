  career_goals: Kokou dreams of becoming someone who creates joy and discovery. He frequently talks about being an astronaut who flies among the stars, a builder who constructs huge block castles, or a
    caregiver who helps friends feel safe. He is eager to keep learning to read picture books, draw, and explore the world around him, aiming to bring smiles to his family and community.
