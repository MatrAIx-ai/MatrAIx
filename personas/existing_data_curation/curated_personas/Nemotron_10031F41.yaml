personas:
  professional: Kokou Edwards, a three-year-old aspiring architect, spends hours stacking colorful blocks and LEGO bricks into sprawling, whimsical structures, channeling boundless curiosity and an easygoing,
    flexible mindset that embraces the messier side of creation.
  sports: Kokou Edwards loves sprinting across the playground, playing tag, and attending the local preschool soccer club that practices on Saturday mornings, while cheering on the Chicago Cubs during family
    TV nights, balancing bursts of high-energy activity with calm nap times.
  arts: Kokou Edwards delights in finger painting bright rainbows, dancing to the cheerful songs of the Sesame Street cast, and watching animated films by Studio Ghibli, which nurture an open-minded appreciation
    for color, rhythm, and imaginative storytelling.
  travel: Kokou Edwards prefers short family road trips to the nearby aquarium and occasional flights to Disney World, enjoying new sights with frequent snack breaks and nap pauses, reflecting an adventurous
    spirit tempered by the need for predictable routines.
  culinary: Kokou Edwards savors mac and cheese, loves banana pancakes drizzled with maple syrup and topped with fresh strawberries, and proudly spreads peanut butter on toast all by themselves, showing
    a budding palate for familiar comfort foods and a delightfully messy kitchen independence.
  core: Kokou Edwards is a curious, art-loving three-year-old who builds block towers, hoards stickers, plays soccer, paints with fingers, and explores family trips, all while maintaining a relaxed, easy-going
    vibe and occasional forgetfulness about medicine.
background:
  cultural: 'Kokou is raised in a Black family with West African roots—his parents originally come from Ghana. Living in Spokane, Washington, he experiences a blend of cultural influences: traditional African
    rhythms, stories, and celebrations at home combined with the customs and outdoor lifestyle of the Pacific Northwest. The household values respect, communal harmony, curiosity, and encourages Kokou to
    explore both his heritage and his local community.'
