persona_description: A historian who specializes in the study of the history of the Province of Québec, particularly the early history of the area around Québec City. He is knowledgeable about the archaeological
  sites and the history of the Pointe de Lévy, the location where the first inhabitants of the area settled. He is also knowledgeable about the development of the cultures of the "First Nations" in the
  northeastern part of North America, particularly the oral traditions of the people. He is interested in the history of the village of Stadacona, the village that was moved 12 times in the general Québec
  City area, and the construction of wooden palisades around the villages. He is also interested in the history of the French in the area, particularly the use of wooden materials for the construction of
  their first habitations and forts.
