  career_goals: Even at eight, Daisy dreams of a future where she can combine her love of art and helping others. She hopes to become an artist who creates vibrant murals that brighten her community, or
    a teacher who inspires children to explore creativity. She also imagines working with animals as a veterinarian, reflecting her curiosity about the natural world, and she aspires to travel and share
    her cultural heritage through art.
