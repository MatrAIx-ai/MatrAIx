personas:
  professional: Daisy Pereira, age 8, is an aspiring junior illustrator who devotes their afternoons to experimenting with bright watercolors and sketching leaves, translating their natural curiosity and
    love for vibrant nature scenes into a small portfolio they share with classmates and teachers.
  sports: Daisy Pereira enjoys sprinting in the school’s track club, cheering for the Winston‑Salem Dash baseball team, and attending after‑school gymnastics sessions at the Wolfpack Gymnastics Club where
    they practice on the balance beam twice a week.
  arts: Daisy Pereira’s artistic world includes painting vibrant scenes inspired by nature while they listen to Frida Kahlo’s folk songs and Disney soundtracks, admiring the whimsical illustrations of Chris
    Van Allsburg, and dancing to upbeat rhythms of Grupo Sonora and pop hits by Taylor Swift during weekend family gatherings.
  travel: Daisy Pereira loves weekend trips to the Great Smoky Mountains for leaf‑collecting hikes, family outings to Carowinds amusement park, and day visits to the historic Old Salem district in Winston‑Salem
    where they explore living‑history museums and local craft fairs.
  culinary: Daisy Pereira enjoys helping in the kitchen by learning to roll simple tacos with corn tortillas, mix fresh guacamole with ripe avocados and lime, and sprinkle queso fresco on quesadillas, while
    their favorite snack after art class is a colorful fruit salad with mango, pineapple, and strawberries.
  core: Daisy Pereira, an energetic 8‑year‑old, blends bright nature‑inspired art, a pocket‑sized savings habit for paint sets, and a love for outdoor play while juggling mild allergies and a penchant for
    dance‑floor pop beats.
background:
  cultural: Daisy is raised in a Mexican‑American household in Winston‑Salem, North Carolina. At home, Spanish is spoken alongside English, and she celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings with homemade tacos, tamales, and pozole. Her parents, originally from Jalisco, have instilled values of family unity, respect, and community service. She participates
    in the local Hispanic cultural center’s activities and enjoys blending her heritage with the Southern hospitality of her neighborhood.
