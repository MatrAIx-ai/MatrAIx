    developments'']'
  career_goals: Rachid aims to become a senior underwriter specializing in emerging risk domains such as cyber liability and climate‑related exposures. He plans to earn the Chartered Property‑Casualty Underwriter
    (CPCU) designation within the next three years and pursue an MBA to broaden his strategic perspective. Long‑term, he hopes to lead a data‑driven underwriting team that integrates AI‑based analytics,
    shape innovative insurance products, and eventually launch his own InsurTech venture that leverages technology to improve risk transparency.
