  career_goals: Now retired, Todd aims to stay engaged by volunteering as a coordinator for the Jefferson City Senior Center, leading local history documentation projects, and mentoring high‑school students
    interested in civic service. He also seeks to meet personal fitness goals, such as completing a senior 5K walk‑run series, and to channel his competitive spirit by winning a regional senior bridge tournament.
    Additionally, he hopes to author a short memoir reflecting on his life in mid‑Missouri and the evolution of his community.
