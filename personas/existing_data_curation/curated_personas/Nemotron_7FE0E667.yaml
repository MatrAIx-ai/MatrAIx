  career_goals: Samuel dreams of a future where he can blend his love for technology and the outdoors. He aspires to become a robotics engineer or a mechanical engineer who designs machines that help people
    and protect the environment. He also imagines working as an environmental scientist, developing sustainable solutions for local rivers and parks. His ambition is to create practical inventions that
    solve real‑world problems, and he hopes to be respected for his ingenuity. At the same time, he worries about the pressure of big projects and hopes to find a balance that lets him stay calm and focused.
