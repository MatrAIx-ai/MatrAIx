personas:
  professional: Samuel Campbell is an aspiring young naturalist and budding electronics hobbyist who blends a fierce curiosity about ecosystems and space with practical tinkering—building redstone contraptions
    in Minecraft and assembling tiny circuit kits—yet often sidetracks from school assignments because they resist rigid deadlines.
  sports: Samuel Campbell is a member of the local youth basketball club, the Riverside Raptors, and also enjoys shooting hoops at the community park after school, while cheering for the NBA’s Golden State
    Warriors and the Major League Soccer team Seattle Sounders, but their spontaneous nature leads them to skip practice when a new LEGO set arrives.
  arts: Samuel Campbell channels their love for storytelling into drawing weekly comic strips inspired by classic creators like Stan Lee and modern series such as Adventure Time, while also diving into
    the pixel art world of Minecraft and building moving LEGO models that echo the mechanical brilliance of Rube Goldberg machines, though they often leave the sketchbook open and forget to finish panels.
  travel: Samuel Campbell dreams of exploring the Redwood National Forest and the Smithsonian National Air and Space Museum in Washington, D.C., having already camped in the backyard woods nearby for weekend
    adventures, and they plan their next family trip with a detailed map—except when a sudden rainstorm forces them to improvise a new indoor scavenger hunt.
  culinary: Samuel Campbell loves helping in the kitchen by mastering the art of homemade pizza—tossing the dough, sprinkling mozzarella, pepperoni, and sliced bell peppers—while also whipping up quick
    spaghetti with marinara sauce, but they often forget to wash their hands after handling raw chicken, a habit they’re trying to improve.
  core: Samuel Campbell is a curious, slightly anxious 11‑year‑old who thrives on exploring nature, tinkering with gadgets, and sketching comics, yet habitually drags out school projects and forgets to
    floss.
background:
  cultural: Samuel grew up in a predominantly white, middle‑class neighborhood in Springfield, Ohio, a typical Midwestern small city. His family participates in community events such as the county fair,
    local sports leagues, and holiday celebrations that emphasize togetherness and modesty. He attends a public elementary school where he experiences American cultural traditions, from school spirit weeks
    to Thanksgiving assemblies. The regional culture values practicality, hard work, and community support, which aligns with Samuel's practical curiosity and cooperative nature. His upbringing includes
    exposure to Midwestern values of modesty, helpfulness, and a strong sense of belonging to his local community.
