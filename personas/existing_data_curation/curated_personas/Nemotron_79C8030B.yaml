personas:
  professional: Thu Wu, a civil engineer who blends structural analysis expertise with a flair for artistic visualisation, uses Revit, Navisworks, and Grasshopper to craft sustainable, community-focused
    designs, and they let their imaginative, flexible nature drive pioneering public-art installations even if it sometimes bends strict project timelines.
  sports: Thu Wu, an energetic hobbyist, joins the local Salsa Fusion Dance Studio and the Alabama Hiking Club for weekend treks, rallies behind the Alabama Crimson Tide football team and the Montgomery
    Biscuits minor-league baseball squad, and they view fitness as a social adventure rather than a regimented regimen, often swapping a structured gym session for an impromptu dance class.
  arts: Thu Wu, a lover of visual and performing arts, frequents the Montgomery Museum of Fine Arts to admire works by Kerry James Marshall and James Turrell, volunteers backstage for community theater
    productions starring local talent like Michael O'Connor, and they draw creative fuel from musicians such as Nina Simone and the indie folk band Fleet Foxes, letting these influences shape their sketching
    style and design sensibility.
  travel: Thu Wu, an imaginative explorer, prefers loosely planned weekend getaways to nearby gems like Asheville's Blue Ridge Parkway and Savannah's historic district, while dreaming of a summer trip to
    Barcelona for its architecture and to Kyoto's temples, and they keep their itinerary balanced between affordable road trips and occasional DIY travel hacks due to a modest budget and occasional project
    deadlines.
  culinary: Thu Wu, an experimental home chef, delights in fusing flavors by preparing spicy fermented cabbage slaw with a tangy mayo, cajun-spiced dumplings, and peach-glazed pork ribs, mastering the art
    of balancing hot chili paste, smoked paprika, and fresh corn, and they love hosting neighborhood dinners where they pair these creations with craft beers from local breweries like Good People Brewing
    Co.
  core: Thu Wu, a 33-year-old civil engineer with a boundless imagination, balances a love for public art and sustainable design with an endearingly chaotic schedule that often leaves their inbox overflowing,
    and they frequently find their salsa shoes worn out from spontaneous dancing.
background:
  cultural: Thu was raised in a bilingual household with roots in Taiwan, where traditional festivals like Lunar New Year and the Mid‑Autumn Festival were celebrated with family gatherings, lantern displays,
    and homemade dumplings. Her parents emphasized education, respect for elders, and community responsibility, values that continue to shape her collaborative work style. After moving to Montgomery, she
    blended these cultural practices with Southern hospitality—joining local community events, exchanging recipes with neighbors, and participating in multicultural festivals that showcase Asian arts. This
    bicultural upbringing fuels her appreciation for diverse perspectives and informs her ambition to create infrastructure that honors both cultural heritage and local identity.
attributes:
  skills: '["Structural analysis", "BIM (Revit, Navisworks)", "AutoCAD", "Grasshopper (parametric design)", "Sustainable infrastructure design", "Project coordination", "Stakeholder communication", "Public
    speaking", "Sketching & visual rendering", "Community outreach"]'
  hobbies: '["Exploring local art galleries", "Participating in community theater productions", "Salsa dancing", "Cooking fusion dishes (Asian‑Southern)", "Hiking in nearby state parks", "Photography",
    "Sketching architectural forms", "Volunteering for neighborhood park clean‑ups", "DIY home renovation projects", "Reading speculative fiction"]'
  career_goals: Thu aspires to become a licensed Professional Engineer and eventually a principal engineer who leads landmark infrastructure projects that blend functionality with public art. She aims to
    champion sustainable, community‑focused designs for bridges, parks, and public spaces in Montgomery and beyond. Over the next five years, she plans to earn a master's degree in Sustainable Design, expand
    her expertise in advanced digital fabrication, and build a reputation as an innovator who mentors junior engineers and encourages interdisciplinary collaboration. Ultimately, she envisions launching
    her own consultancy that specializes in integrating artistic concepts into civil engineering solutions for underserved neighborhoods.
