personas:
  professional: Wendy Jones is a retail specialist known for turning inventory data into eye‑catching displays, leveraging their solid customer service acumen and competitive drive to meet sales targets
    while mentoring new staff toward a structured, results‑focused environment.
  sports: Wendy Jones is a regular on Zumba and spin classes, hits the local state park trails for weekend hikes, cheers on the nearby NBA team the Denver Nuggets and the NFL’s Denver Broncos while never
    missing a game night with friends, and schedules occasional tennis matches at the community club to stay active.
  arts: Wendy Jones immerses themselves in live music, favoring country legends like Dolly Parton and classic rock icons such as The Rolling Stones, while their book club often debates contemporary fiction
    by authors like Emily St. John Mandel, and they enjoy crafting home décor inspired by folk art aesthetics.
  travel: Wendy Jones prefers spontaneous weekend escapes to state parks such as Zion and Shenandoah, yet they also dream of a summer road trip along the Pacific Coast Highway and a cultural tour of New Orleans,
    planning trips with a flexible itinerary that leaves room for impromptu hikes and local music festivals.
  culinary: Wendy Jones loves cooking hearty comfort foods, regularly whipping up chili con carne with ground beef, kidney beans, cumin, and a dash of chipotle, while also mastering a quick lemon‑garlic
    shrimp pasta, and they enjoy sourcing fresh produce at farmers' markets for a seasonal veggie stir‑fry.
  core: Wendy Jones blends a pragmatic retail mindset with an outgoing, competitive spirit, turning group workouts, DIY projects, and spontaneous outings into a balanced life that values structure yet embraces
    flexibility.
background:
  cultural: Wendy grew up in a working‑class family in Campbell County, Kentucky, where community ties and self‑reliance are emphasized. She was raised with Southern hospitality, participating in church
    gatherings, county fairs, and regional traditions such as home‑cooked comfort food and local music. Her family valued education, encouraging her to pursue a liberal arts degree, and instilled a pragmatic
    outlook that blends Midwestern practicality with Appalachian cultural influences. Though she respects many of these traditions, her experience as a divorced mother has fostered a strong sense of independence
    and a competitive drive to shape her own path.
attributes:
  skills: '["Customer service", "Retail sales", "Inventory management", "Visual merchandising", "POS system operation", "Data analysis (Excel)", "Staff training and coaching", "Conflict resolution", "Negotiation",
