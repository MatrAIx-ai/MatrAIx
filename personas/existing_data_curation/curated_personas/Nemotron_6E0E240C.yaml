  hobbies: '["Group fitness classes (Zumba, spin)", "Book clubs", "Hiking in state parks", "DIY home‑decor crafting", "Game nights and trivia contests", "Volunteering at the food pantry", "Live music events
    (country, classic rock)"]'
  career_goals: Wendy aims to progress to a store manager position within the next two years, focusing on boosting sales metrics, streamlining staff scheduling, and introducing data‑driven merchandising
    strategies. In the longer term, she aspires to move into regional management or launch her own boutique that curates lifestyle and home‑decor items, leveraging her eye for design and community connections.
    To support these goals, she plans to obtain retail management certifications, attend leadership workshops, and network with industry mentors.
