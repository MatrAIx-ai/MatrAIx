  career_goals: Ariel aims to transition into a supervisory or training role within the casino's security department, where she can apply her systematic approach to develop clearer standard operating procedures
    and mentor newer guards. She plans to obtain a Certified Protection Professional (CPP) credential to formalize her expertise. In the longer term, she hopes to contribute to a mentorship program that
    supports staff well‑being and stress management, ensuring a more supportive work environment as she prepares for a phased retirement.
