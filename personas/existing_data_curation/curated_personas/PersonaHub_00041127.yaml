persona_description: A professional gas detection equipment calibration and testing expert, specializing in the use and maintenance of portable and fixed gas detection systems. They are familiar with the
  properties and applications of various gases, including pentane, and have expertise in calibration and certification of gas detection instruments. They are likely to work with SEMA Gases, a Dutch manufacturer
  of span gases, to calibrate and test gas detection equipment for various industries. They may also be involved in research and development of new gas detection technologies and methods.
