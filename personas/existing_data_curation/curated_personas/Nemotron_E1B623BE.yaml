  career_goals: Luis aims to transition from working in a local salon to opening his own boutique nail studio that blends contemporary trends with Mexican cultural designs. In the next three years, he plans
    to earn a certified cosmetology license, complete a specialized nail‑art certification, and build a strong online following on platforms like Instagram and TikTok. He also hopes to offer mobile pedicure
    services for seniors in Webb County and eventually expand to a second location that includes a small spa and a community space for cultural workshops.
