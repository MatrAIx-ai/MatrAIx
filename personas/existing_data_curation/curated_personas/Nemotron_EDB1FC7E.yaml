personas:
  professional: A seasoned retired craftsman and community organizer, Charles Bennett combines their woodworking, furniture restoration, and digital photography expertise to volunteer as a docent at the
    Historic Lincolnville House, orchestrate intergenerational art workshops, and curate a small coastal‑photo exhibition.
  sports: A lifelong outdoors enthusiast, Charles Bennett fills their mornings paddling a small dory on Penobscot Bay, hikes the Bangor Trail in summer, attends Portland Sea Dogs games with a group of friends,
    and they join a community walking club that meets twice weekly, treating fitness as a social ritual.
  arts: A dedicated art aficionado, Charles Bennett spends afternoons sketching the jagged shoreline, collects prints by Winslow Homer and local folk singer Andy Pratt, volunteers backstage at the Lincolnville
    Playhouse, and they regularly attend concerts by the acoustic duo The Milk Carton Kids, letting creative expression color both their canvas and social circles.
  travel: A relaxed traveller, Charles Bennett prefers scenic road trips along the eastern seaboard, having explored Acadia National Park’s sunrise at Cadillac Mountain, taken a weekend ferry to Halifax’s
    historic waterfront, and they dream of a summer pilgrimage to the fishing villages of Cornwall, England, always balancing adventure with modest travel costs.
  culinary: A passionate home cook, Charles Bennett delights in preparing buttery lobster rolls, creamy New England clam chowder, and grilled scallops seasoned with thyme and lemon zest, they often grow
    parsley and dill in their garden to garnish dishes, and they host weekly seafood feasts that become the social highlight for family and friends.
  core: Charles Bennett, a gregarious retired carpenter with a photographer’s eye and an occasional habit of misplacing their spectacles while sketching, balances a love for community storytelling with
    a disciplined habit of daily sunrise paddles, and they often linger over a cup of coffee reminiscing about the town’s maritime festivals.
background:
  cultural: Charles grew up in a multigenerational white New England family with deep roots in coastal Maine. His ancestors arrived from England and Ireland in the late 19th century, working as fishermen
    and boatbuilders along the Atlantic. The maritime heritage, self‑reliance, and tight‑knit community ethos of Waldo County shaped his values of cooperation, humility, and respect for nature. He was raised
    in a small‑town environment where seasonal festivals, church gatherings, and volunteer spirit were integral to daily life. This background, combined with a lifelong exposure to Maine’s rugged natural
    beauty and a tradition of craftsmanship, informs his identity and his ongoing commitment to preserving local culture while embracing new artistic experiences.
