personas:
  professional: Clayton Weeks is a seasoned psychiatric aide and hospital orderly with over twenty years of hands‑on experience, excelling at patient transport, vital sign monitoring, crisis de‑escalation,
    and meticulous documentation, while his preference for structure and practical mindset drives him to mentor new staff and streamline shift schedules toward a future supervisory role.
  sports: Clayton Weeks is a devoted fan of the St. Louis Cardinals baseball team and the St. Louis Blues hockey club, participates in a senior recreational softball league at the community center, and
    maintains personal fitness through early‑morning fishing trips and weekend walks around local lakes.
  arts: Clayton Weeks finds creative balance in crafting wooden furniture inspired by artisans like Sam Maloof, devouring mystery novels by Agatha Christie and Gillian Flynn, and attending performances
    at the St. Louis Repertory Theatre, while his playlist often includes classic folk singers such as Woody Guthrie and contemporary artists like John Mayer.
  travel: Clayton Weeks prefers low‑key road trips to fishing splendors like Lake of the Ozarks and the Adirondack Lakes, planning itineraries months in advance to secure affordable cabins, while dreaming
    of a future cross‑country drive along Route 66 to explore small‑town America.
  culinary: Clayton Weeks enjoys farm‑to‑table cooking, often preparing grilled catfish seasoned with garlic, paprika, and fresh garden herbs, hearty vegetable stews, and homemade cornbread, boasting a
    solid intermediate skill level in wood‑fired grilling and occasional forays into smoking ribs.
  core: Clayton Weeks blends methodical discipline with rustic hands‑on hobbies, channeling his structured mindset into patient care, woodworking, and meticulous budgeting, yet occasionally indulges in
    impulsive splurges on fishing gear and late‑night mystery novels.
background:
  cultural: Clayton grew up in a small-town Midwestern environment in Johnson County, Missouri, where a Protestant work ethic, community involvement, and self-reliance are core values. His family's roots
    are tied to local agriculture and small-business stewardship, fostering a strong sense of loyalty to neighbors and local institutions. These cultural influences shape his practical outlook, emphasis
    on reliability, and commitment to service both at work and in his community.
attributes:
  skills: '[''Patient transport and mobility assistance'', ''Vital signs measurement and basic health monitoring'', ''Crisis de-escalation and conflict resolution'', ''Safe handling of restraints and seclusion
    procedures'', ''Infection control and sanitation'', ''Accurate documentation and record-keeping'', ''Medication assistance under supervision'', ''Team collaboration with nurses, therapists, and physicians'',
    ''Emergency first aid and CPR certification'', ''Safety checks and environmental hazard identification'', ''Training and mentoring new aides'', ''Scheduling and inventory management'']'
  hobbies: '[''Freshwater fishing'', ''Vegetable gardening'', ''Woodworking and furniture making'', ''Reading mystery and crime novels'', ''Playing chess at the community center'', ''Volunteering at church
    food bank'', ''Watching St. Louis Cardinals baseball games'', ''Restoring a classic car'']'
  career_goals: Clayton aims to advance to a shift-lead or supervisory role within the psychiatric unit to oversee staff coordination and quality-improvement initiatives. He plans to earn a Certified Nursing
    Assistant (CNA) credential and eventually complete an associate degree in health sciences, positioning himself for a patient-care coordinator or case-management position. He also hopes to mentor younger
    colleagues and contribute to community mental-health outreach programs.
