  career_goals: Desiree aims to become a leading advocate for arts‑rich curricula within her district. She plans to pursue a master’s degree in curriculum and instruction with a focus on arts integration
    and social‑emotional learning, eventually moving into a teacher‑leadership role such as Instructional Coach or Curriculum Coordinator. Her ambition is to design a district‑wide interdisciplinary program
    that uses visual and performing arts to support students’ emotional well‑being and academic growth. She also hopes to publish articles on innovative teaching methods, earn recognition as a Florida Teacher
    of the Year finalist, and mentor novice teachers to cultivate a collaborative, high‑performing faculty culture.
