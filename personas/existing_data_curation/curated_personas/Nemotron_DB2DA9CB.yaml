personas:
  professional: Rodney Harris is an aspiring marine explorer who channels his methodical curiosity into documenting tide‑pool ecosystems, building detailed Lego marine habitats, and dreaming of a future
    career as a marine biologist.
  sports: Rodney Harris, a member of the Sunflower Kids Soccer League, eagerly practices beginner soccer drills each weekend, loves swimming laps at the nearby community pool, and proudly cheers for the
    local professional team the Mariners, approaching every game with disciplined teamwork and a love for structured play.
  arts: Rodney Harris expresses their love for the ocean through vibrant crayon drawings of sea turtles, enjoys the storytelling of Eric Carle’s picture books, listens to Jack Johnson’s beach‑inspired songs
    while building Lego seascapes, and looks forward to watching The Little Mermaid during family movie nights.
  travel: Rodney Harris delights in family trips that combine beach adventures and learning, such as building sandcastles at Gulf Shores, exploring the Seattle Aquarium, and dreaming of a future vacation
    to the Great Barrier Reef, where they plan to map out tide‑pool tours with their parents’ detailed itineraries.
  culinary: Rodney Harris prefers fish‑shaped goldfish crackers and crunchy fish sticks, delights in helping their mom whisk together a creamy clam chowder, and enjoys creating fruit skewers that look like
    sea creatures, always adding a dash of ketchup as their secret seasoning.
  core: Rodney Harris blends a calm, methodical curiosity about marine life with a love for structured games and Lego, turning every day into a meticulously planned adventure in shells, crayons, and teamwork.
background:
  cultural: 'Rodney grows up in Cape Coral, a coastal suburb of Lee County, Florida, where family life often revolves around water‑based activities like boating, fishing, and beach outings. His household
    reflects typical Southern‑Florida middle‑class values: politeness, community involvement, and regular church attendance. Family gatherings frequently feature backyard barbecues and community festivals
    that celebrate local seafood and Florida’s natural heritage. The diverse tourism in the area exposes him to a mix of cultures—Caribbean music at local events, Hispanic food stalls at fairs, and environmental
    education programs about the Everglades and marine life. These influences shape his appreciation for both tradition and new ideas, reinforcing his calm, cooperative demeanor.'
