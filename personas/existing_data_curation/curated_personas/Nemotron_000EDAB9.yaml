personas:
  professional: Adriana Abad, a seasoned title examiner and abstractor with a decade of experience, leverages bilingual expertise and metadata standards like MARC and Dublin Core to produce precise abstracts
    for art and literature documents, while quietly mentoring junior staff and envisioning a digital archive that spotlights folk narratives and regional art movements.
  sports: Adriana Abad enjoys early morning hikes in the Sierra Nevada foothills, follows the Sacramento Kings for basketball, supports the Chico State Wildcats women's soccer team, and participates in
    a local adult recreational softball league, though they tend to skip the weekly yoga class when work deadlines loom.
  arts: Adriana Abad frequents Chico’s art galleries, soaking in exhibitions by regional painters like Samira Lopez and the subtle tones of Frida Kahlo’s folk‑inspired watercolors, while also attending
    intimate talks featuring emerging creators such as John Miller and Maya Alvarado, and they regularly volunteer art‑therapy workshops that blend watercolor techniques with storytelling.
  travel: Adriana Abad prefers thoughtfully planned journeys that balance cultural immersion with scenic solitude, having trekked the Inca Trail to Machu Picchu, explored the historic plazas of Santa Fe,
    savored the coastal charm of Puerto Vallarta, and now dreams of a winter retreat in the Japanese Alps, all while budgeting for family visits and art‑related research trips.
  culinary: Adriana Abad is an enthusiastic home cook who perfects dishes like mole negro, tamales de hoja, and chiles en nogada using fresh corn masa, roasted cacao, and local herbs from their garden,
    and they often experiment with regional spice blends while streaming cooking tutorials that sometimes lead to a cluttered kitchen and a lingering scent of simmering broth.
  core: Adriana Abad blends meticulous analytical precision with a quiet love for folk art, spontaneous hikes, and a habit of hoarding vintage postcards, creating a life that balances structured work, creative
    solitude, and occasional organizational slip‑ups.
background:
  cultural: Adriana’s cultural identity is rooted in her Mexican heritage, shaped by family traditions, bilingual communication, and a deep appreciation for Mexican visual and literary arts. Raised with
    stories of Día de los Muertos, folkloric music, and communal celebrations, she carries forward a sense of collectivism and respect for intergenerational knowledge. Living in Chico, California, she blends
    these traditions with the region’s agricultural and outdoor lifestyle, often participating in local cultural festivals that celebrate Mexican food, dance, and crafts. Her bicultural experience informs
    her worldview, allowing her to navigate both Mexican and American cultural contexts with ease, and she frequently draws on Mexican artistic motifs and linguistic nuances in her professional and creative
    endeavors.
attributes:
  skills: '["Title examination and abstracting","Metadata curation (MARC, Dublin Core, RIS)","Advanced information retrieval and database searching","Bilingual Spanish‑English translation and interpretation","Art
