  hobbies: '["Visiting art galleries and artist talks","Watercolor painting (Mexican folklore and California landscapes)","Bilingual book club focusing on Mexican literature","Traditional Mexican cooking
    and recipe experimentation","Solo hiking in the Sierra Nevada foothills","Gardening native California and Mexican herbs","Street‑art photography","Volunteer art‑therapy workshops at community center"]'
  career_goals: Adriana seeks to advance to a senior or supervisory role where she can lead a team of abstractors and shape best‑practice guidelines for title examination in her organization. She aims to
    integrate her passion for the humanities by developing a digital archive that highlights Mexican and Latin American art and literature, making primary sources more accessible to scholars and the public.
    Over the next five years, she hopes to earn a certification in archival studies, mentor emerging professionals, and collaborate with local museums in Chico to curate community exhibitions that blend
    her information‑science expertise with her artistic interests. Ultimately, she envisions publishing a bilingual compendium of Mexican artistic movements and contributing to cross‑cultural research initiatives.
