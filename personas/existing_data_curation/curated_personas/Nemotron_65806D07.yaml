personas:
  professional: Thomas Camilo, a preschool-age explorer who treats the classroom sandbox as a laboratory, demonstrates budding problem-solving skills and a love for both new toy experiments and the familiar
    routine of daily circle time.
  sports: Thomas Camilo, a cheerful member of the local toddler soccer group Little Kickers, dashes across the grass every Saturday while rooting for the nearby professional baseball team the Chicago Cubs
    during family watch-parties.
  arts: Thomas Camilo, a tiny enthusiast of bright, rhythmic tunes, sings along to the Wiggles, dances to Sesame Street's Bounce song, and can often be found drawing cartoon heroes like Peppa Pig and Dora
    the Explorer.
  travel: Thomas Camilo, after a memorable family road-trip to the Grand Canyon where they chased a tumbleweed, now dreams of the colorful excitement of Disneyland and loves looking at picture books about
    the Eiffel Tower.
  culinary: Thomas Camilo, a picky but adventurous eater, devours buttery macaroni and cheese, loves chicken nuggets with sweet potato fries, and gets thrilled when a strawberry-yogurt parfait appears on
    their plate.
  core: Thomas Camilo, a vivid three-year-old who blends endless curiosity with a steadfast love of routine, narrates every activity aloud and habitually hides their favorite red truck under the couch for
    later play.
background:
  cultural: Thomas is a Puerto Rican boy raised in Ensenada, a small coastal community in the municipality of Guánica. He grows up immersed in the Spanish language and the rhythmic sounds of bomba, plena,
    and contemporary Latin pop that fill his home. Family gatherings, community festivals such as the annual San Isidro celebration, and shared meals of traditional dishes like arroz con gandules and alcapurrias
    shape his sense of belonging. The surrounding natural landscape—sugarcane fields, mangroves, and coral reefs—feeds his fascination with the environment, while the close‑knit neighborhood fosters his
    social, outgoing spirit.
