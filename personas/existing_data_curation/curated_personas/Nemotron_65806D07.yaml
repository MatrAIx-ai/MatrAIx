  career_goals: Although still three, Thomas already imagines a future where he can explore and protect his coastal environment. He dreams of becoming a marine scientist or ocean explorer, combining his
    love for the sea, his natural curiosity about how things work, and his desire to help his community. He also enjoys the idea of caring for others, so he hopes to volunteer in local beach clean‑ups and
    later work in roles that keep people safe, like a lifeguard or rescue worker.
