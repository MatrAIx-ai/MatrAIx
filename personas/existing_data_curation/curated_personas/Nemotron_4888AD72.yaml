personas:
  professional: Betty Willis, a Certified Nursing Assistant who excels at vital signs monitoring, wound care, and phlebotomy, blends her curiosity for infection‑control best practices with her methodical,
    reliable nature to become a trusted liaison between patients, families, and the nursing team while meticulously organizing charts and supplies.
  sports: Betty Willis, an avid jogger who logs early morning runs along the Bayou Teche trail, participates in the Bayou Running Club, follows the New Orleans Saints, LSU Tigers football, and New Orleans
    Pelicans basketball, and practices beginner yoga twice weekly to balance cardio with flexibility.
  arts: Betty Willis, a committed member of her church choir, delights in harmonizing classic gospel works by Mahalia Jackson and contemporary worship by Kirk Franklin, while winding down with historical
    fiction novels such as Kathleen Grissom’s The Kitchen House and attending local theater productions featuring performances by the Baton Rouge Playhouse.
  travel: Betty Willis prefers meticulously planned weekend getaways that blend cultural immersion and relaxation, having explored New Orleans’ French Quarter, Savannah’s historic squares, and the Gulf
    Coast’s fishing villages, while dreaming of a road trip through the Great Smoky Mountains and a future spring visit to Washington DC’s National Museum of African American History on a modest student
    budget.
  culinary: Betty Willis, an enthusiastic home cook, experiments with low‑sodium gumbo featuring smoked turkey, okra, and quinoa, perfects baked collard greens seasoned with garlic and smoked paprika, and
    often pairs her meals with homemade sweet‑potato cornbread, while occasionally treating herself to a weekend brunch of shrimp and grits at a local Cajun bistro.
  core: Betty Willis balances a relentless curiosity for medical knowledge with a practical, organized routine, but can’t resist late‑night binge‑reading historical novels and occasionally forgets to drink
    enough water after her jogs.
background:
  cultural: Betty grew up in Amite, Louisiana, within a close‑knit African‑American community deeply rooted in Southern traditions and the Black church. Family gatherings often feature vibrant gospel music,
    storytelling, and cooking that blends Creole flavors with classic Southern dishes. Her upbringing emphasized community responsibility, faith, and resilience, shaping her compassionate yet pragmatic
    outlook. Betty participates in local cultural events such as the Louisiana Folk Festival and church home‑coming celebrations, which reinforce her connection to the region’s rich heritage and inspire
    her commitment to serve her neighbors through healthcare.
attributes:
  skills: '[''CNA certification'', ''vital signs measurement'', ''patient hygiene and mobility assistance'', ''basic wound care'', ''phlebotomy assistance'', ''electronic health record (EHR) documentation'',
    ''infection control compliance'', ''medication administration support'', ''inventory management'', ''team communication and patient advocacy'', ''time management and task prioritization'']'
  hobbies: '[''southern soul food cooking'', ''church choir singing'', ''historical fiction reading'', ''journaling'', ''jogging along bayou trails'', ''beginner yoga'', ''after‑school tutoring volunteer'']'
  career_goals: Betty aims to leverage her nursing assistant experience to enroll in an Associate of Science in Nursing (ASN) program within the next year, with the goal of becoming a Registered Nurse (RN)
    specializing in community health. She is motivated to work in underserved areas of southern Louisiana, improving health outcomes through education and preventive care. Over the next five years, she
    envisions obtaining a Bachelor of Science in Nursing (BSN) and pursuing a Nurse Educator certification so she can mentor future CNAs and advocate for culturally competent care. Ultimately, Betty hopes
    to lead a community health outreach initiative focused on chronic disease management for African‑American elders in Livingston Parish.
