  hobbies: '[''Model kit building (cars, planes)'', ''Woodworking'', ''Gardening (vegetables and herbs)'', ''Traditional cooking (Guatemalan dishes)'', ''Listening to marimba and folk music'', ''Reading
    technical manuals and non‑fiction'', ''Walking/jogging'', ''Chess'', ''Single‑player video games'']'
  career_goals: Cesar aims to secure a stable, hands‑on career that offers a predictable routine and tangible results. He plans to enroll in a vocational automotive technology program after obtaining his
    GED, with the goal of becoming a certified automotive technician. Over the next decade, he aspires to work as an experienced mechanic, eventually opening a modest repair shop that can serve his local
    community and provide financial support for his family. He also expresses interest in obtaining forklift certification to work in warehouse logistics, seeing it as an alternative pathway that aligns
    with his love for organized, structured environments.
