personas:
  professional: Cesar Dieppa, a 17‑year‑old high‑school senior, spends afternoons performing oil changes and brake checks for neighbors while meticulously documenting each task, and they are preparing to
    enroll in a vocational automotive technology program to become a certified mechanic and eventually open a modest repair shop serving their community.
  sports: Cesar Dieppa follows the Boston Red Sox in baseball, the New England Patriots in football, and the Boston Celtics in basketball, while maintaining a disciplined early‑morning jogging routine along
    Lynn’s waterfront trail and they occasionally join the Lynn Youth Badminton Club for low‑key competition.
  arts: Cesar Dieppa immerses themselves in the rhythmic sounds of the Marimba Vázquez Ensemble and the folk storytelling of Woody Guthrie, and they also meticulously build scale model kits of classic aircraft,
    solve chess puzzles on Chess.com, and lose hours to the strategy‑heavy video game Civilization VI.
  travel: Cesar Dieppa enjoys planning low‑budget weekend trips, having already explored the historic streets of Boston and taken a family road trip to the coastal town of Provincetown, while they dream
    of a future backpack adventure through the highlands of Central America to experience coffee farms and traditional market festivals.
  culinary: Cesar Dieppa delights in crafting tamales stuffed with pork and achiote, simmering peppery pepian with roasted tomatillos and plantains, and pairing their garden’s fresh cilantro, chiles, and
    zucchini into a spicy salsa, while they hone kitchen timing to the rhythm of their family’s folk songs.
  core: Cesar Dieppa blends methodical precision with cultural devotion, turning routine car repairs, meticulous budgeting, and careful garden care into daily rituals that keep their world orderly and quietly
    vibrant, and they take pride in the quiet consistency of their routine.
background:
  cultural: Cesar comes from a first‑generation Guatemalan family that settled in Lynn, Massachusetts. At home, Spanish is the primary language, and the household observes Catholic traditions, celebrating
    holidays such as Navidad, Semana Santa, and Día de los Muertos with family gatherings and traditional foods like tamales and pepián. The family participates in local Latino community events, including
    the annual Fiesta de los Posaderos, where music, dance, and communal meals reinforce cultural ties. While adapting to American life, Cesar maintains a strong respect for his heritage, often sharing
    Guatemalan recipes, stories, and values of familial responsibility with his peers. This blend of cultural pride and practical adaptation shapes his worldview and daily practices.
attributes:
  skills: '[''Basic automotive repair'', ''Traditional cooking and food preparation'', ''Household budgeting'', ''Inventory management'', ''Spanish‑English translation'', ''Basic computer use (Microsoft
