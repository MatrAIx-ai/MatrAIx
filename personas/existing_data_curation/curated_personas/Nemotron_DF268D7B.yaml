personas:
  professional: Laura Dickey, a 19‑year‑old designer specializing in UI/UX and branding, blends meticulous organization with a love for Southern storytelling, delivering user‑centered interfaces that honor
    local narratives, though they sometimes get sidetracked perfecting typography for hours.
  sports: Laura Dickey, a fan of the Ole Miss Rebels football team and member of a local hiking club, balances structured gym sessions with weekend trail runs in nearby forests, and they find the mix of
    predictable workouts and spontaneous outdoor exploration energizing.
  arts: Laura Dickey fuels her creative identity by sketching daily, studying the bold lines of Henri Matisse, listening to the soulful melodies of Adele, and collaborating on community mural projects that
    echo the storytelling depth of Margaret Atwood, and they often stay up late perfecting digital illustrations.
  travel: Laura Dickey prefers carefully planned road trips across the Deep South—such as a weekend in Natchez and a sunrise hike in the Great Smoky Mountains—yet they dream of a solo art retreat in Oaxaca,
    Mexico to gather fresh visual inspiration.
  culinary: Laura Dickey experiments with Southern comfort food twists—like shrimp and grits with miso butter, collard‑green tacos, and sweet‑potato pie with a rosemary crust—showcasing confident sauté
    skills and a love for fresh herbs such as thyme and cilantro, though they often forget to clean the cutting board right after cooking.
  core: Laura Dickey is a structure‑loving, 19‑year‑old designer who merges Southern storytelling with modern UI, fuels creativity with late‑night sketch marathons, and they occasionally lose track of time
    perfecting a single font.
background:
  cultural: Laura is a Black woman raised in the deep‑South town of Lucedale, Mississippi, where she grew up in a close‑knit African‑American community anchored by church, family gatherings, and a rich
    oral storytelling tradition. Her cultural identity is shaped by Southern soul food, gospel and blues music, and a strong sense of community solidarity. The presence of her middle name "Taiwan" reflects
    a familial connection to Asian heritage, sparking her interest in cross‑cultural aesthetics and inclusive design. These influences combine to give her a unique perspective that blends Southern Black
    cultural roots with an appreciation for diverse artistic expressions.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''UI/UX design'', ''Typography'', ''Branding'', ''Layout design'', ''HTML/CSS basics'', ''User research'', ''Project
    coordination'']'
  hobbies: '[''Digital illustration'', ''Sketching'', ''Photography'', ''Cooking Southern comfort food'', ''Reading African American literature'', ''Hiking'', ''Community mural projects'', ''Journaling'']'
  career_goals: Laura aims to build a robust professional portfolio that showcases culturally inclusive design work, with a focus on supporting local Black‑owned businesses and community initiatives in
    Mississippi. She plans to secure a junior UI/UX position at a regional design firm while pursuing certifications in user experience research. In the next five years, she aspires to become a mid‑level
    designer leading projects that blend Southern aesthetics with modern digital experiences, and eventually launch her own studio dedicated to empowering underrepresented voices through design.
