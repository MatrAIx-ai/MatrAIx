persona_description: A healthcare professional who is interested in understanding the function and health of the heart, specifically the left ventricle, and how it can be assessed through various tests
  and evaluations. They are likely to be familiar with medical history, physical exams, and echocardiograms, and may have a background in cardiology or a related field. They are interested in learning more
  about the Cedars-Sinai hospital's performance on a measure that reports on the percentage of patients with heart failure who receive an in-depth evaluation of heart muscle function while in the hospital,
  and may be looking for ways to improve their own practice in this area.
