  career_goals: Vijaykumar aims to advance from a laborer to a supervisory position within the next three to five years. He plans to obtain certifications such as Certified Forklift Operator, OSHA Outreach
    Trainer, and a Logistics Associate credential. His long‑term ambition is to become a warehouse manager or logistics coordinator, where he can apply his organized mindset to improve operational efficiency,
    mentor newer workers, and lead safety initiatives. He also aspires to save enough to eventually start a modest family‑owned transport or moving service that serves the Fairfield community.
