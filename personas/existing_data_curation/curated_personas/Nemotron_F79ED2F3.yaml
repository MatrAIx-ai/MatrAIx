personas:
  professional: Teresa Common is a seasoned flight attendant who blends meticulous safety expertise, fluent Spanish, and a curatorial eye for in-flight cultural programming, turning each cabin into a calm,
    art-inspired sanctuary while they mentor crew with methodical precision and proactively anticipate passenger needs.
  sports: Teresa Common stays fit by attending early-morning yoga sessions at the local wellness studio and runs with the Ness City Running Club, cheering on the Kansas City Chiefs in the fall and the Kansas
    City Royals in the summer, while they occasionally join pick-up volleyball games during layovers to break up long flights.
  arts: Teresa Common channels their love of visual storytelling by painting watercolors inspired by Henri Matisse's vibrant palettes, volunteering on set design for community theatre productions of Arthur
    Miller, curating in-flight playlists featuring Buena Vista Social Club and indie folk artist Sufjan Stevens, and they regularly attend local gallery openings to stay plugged into emerging talent.
  travel: Teresa Common prefers spontaneous layover photo expeditions, mapping out micro-itineraries that combine sunrise hikes in Patagonia, night markets in Bangkok, and weekend road trips to the Ozark
    National Forest, while they save travel funds in a dedicated travel CD account and dream of turning those experiences into guest stories at their future B&B.
  culinary: Teresa Common experiments with global flavors in their kitchen, mastering dishes like Spanish paella with saffron and chorizo, Thai green curry with lemongrass and kaffir lime, and Midwestern
    beet salad, often they source fresh herbs from their own garden and host potluck dinners where they showcase these creations.
  core: Teresa Common is a curiosity-driven, art-loving flight attendant who balances meticulous safety work with impromptu photography, garden-to-table cooking, and they have a habit of overpacking camera
    lenses for every trip.
background:
  cultural: Teresa was raised in a close‑knit small town in central Kansas, coming from a family with deep agricultural roots and Midwestern Protestant traditions. Her upbringing emphasized hard work, hospitality,
    and community involvement—values that continue to guide her daily life. While her cultural heritage is firmly grounded in rural American customs, her career as a passenger attendant has exposed her
    to a wide array of global cultures, languages, and artistic expressions. This blend of heartland sensibilities with a curiosity for the world has shaped a hybrid identity that embraces both local traditions
    and international perspectives.
