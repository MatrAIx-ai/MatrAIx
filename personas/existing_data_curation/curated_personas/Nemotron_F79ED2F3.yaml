  career_goals: Teresa aims to advance to a senior cabin crew or lead flight attendant position within the next two years, where she would mentor junior crew members and help shape service policies. She
    plans to obtain a certification in aviation safety management and pursue an associate degree in hospitality or business administration to broaden her qualifications. In the long term, she aspires to
    move into airline operations or corporate training, using her organizational strengths and love of cultural exchange to influence company-wide standards. Ultimately, she hopes to open a boutique bed‑and‑breakfast
    in Ness City that showcases local art and offers travelers an authentic Midwestern experience.
