personas:
  professional: Johney Brown is a meticulous CNC machinist who combines flawless blueprint interpretation and precision measurement with a collaborative work ethic, aiming to earn SME certification, lead
    a shop floor team, and eventually launch a hybrid workshop that fulfills both industrial contracts and custom metal‑art commissions.
  sports: Johney Brown channels their sociable energy into rock climbing at the local gym, weekend hikes in the Wasatch Range, seasonal skiing at Alta, and competitive ultimate frisbee with the Salt Lake
    City Flyers, while cheering on the Utah Jazz and Real Salt Lake as their favorite professional teams.
  arts: Johney Brown nurtures a creative side through landscape photography inspired by Ansel Adams, frequent trips to contemporary galleries, crafting DIY metal sculptures that echo the geometric boldness
    of Andy Warhol, and playing rhythm guitar in a community band that covers classic rock legends like Metallica and The Rolling Stones.
  travel: Johney Brown favors spontaneous road trips to national parks such as Zion, Bryce Canyon, and Arches, enjoys annual ski vacations in Colorado's Aspen resort, and dreams of a cultural immersion
    tour of Japan's metal‑working districts, balancing a love for adventure with a practical budgeting approach that reserves funds for both local escapades and future overseas exploration.
  culinary: Johney Brown delights in high‑protein meals like grilled elk steak with rosemary, pan‑seared trout seasoned with smoked paprika, and hearty campfire chili peppered with quinoa, while also savoring
    artisanal coffee and occasional craft‑brew tastings, reflecting a culinary palate that values both rugged outdoor fare and refined flavor experiments.
  core: Johney Brown is a calm, curious machinist‑artist who blends precision metalwork with outdoor adventure, thrives on community collaboration, occasionally over‑engineers projects, and balances disciplined
    finance with spontaneous creative indulgences.
background:
  cultural: Johney is a White American who grew up in the suburbs of Salt Lake City, Utah. His upbringing reflects a blend of traditional American values and the region's strong outdoor‑recreation culture,
    fostering a community‑oriented mindset. While not strictly religious, he is familiar with the local cultural emphasis on neighborliness, self‑reliance, and an appreciation for both the natural landscape
    and the burgeoning arts scene in the area.
