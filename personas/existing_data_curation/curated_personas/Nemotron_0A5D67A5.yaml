    in community events'']'
  career_goals: Johney aims to advance to a lead machinist or shop supervisor role within the next three years, earning SME certification and expanding his CNC programming skills. He hopes to blend his
    technical expertise with his artistic curiosity by taking on custom metal‑art projects and eventually opening a small workshop that serves both industrial clients and local artists. Long‑term, he envisions
    pursuing an associate degree in manufacturing technology to broaden his career options.
