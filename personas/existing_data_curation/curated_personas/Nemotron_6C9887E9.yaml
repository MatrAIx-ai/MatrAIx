  hobbies: '[''Visiting art galleries and museums'', ''Reading African American literature and history'', ''Listening to jazz, blues, and gospel music'', ''Gardening (vegetable and ornamental)'', ''Woodworking
    and crafting small furniture'', ''Writing memoirs and reflective essays'', ''Nature walks and birdwatching'', ''Community theater attendance'', ''Volunteer storytelling at senior center'']'
  career_goals: Maceo’s current ambitions focus on personal enrichment and community contribution. He aims to document the oral histories of Deltona’s older Black residents by writing a memoir and launching
    a modest podcast series that pairs his storytelling with digital recordings. He plans to learn digital photography and video editing to capture local cultural events and share them online. An important
    goal is to organize an intergenerational art workshop at the senior center, combining his love of art, mentorship, and community harmony. He also hopes to earn a certificate in nonprofit volunteer management
    to formalize his volunteer leadership, while maintaining his health and developing coping strategies for anxiety and sadness.
