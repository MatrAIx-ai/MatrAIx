persona_description: A health professional who is concerned with the prevention and control of mosquito-borne diseases, particularly dengue fever. This person is well-versed in the symptoms, diagnosis,
  and treatment of dengue fever, as well as the importance of early diagnosis and treatment in preventing epidemics. They are likely to be familiar with the recent outbreaks of dengue fever in Brazil and
  Venezuela, and are dedicated to spreading awareness and education on the disease. They are also likely to be part of a research team studying the transmission and control of mosquito-borne diseases.
