  career_goals: Even at two, Aida enjoys imagining future roles. She often declares she wants to be a teacher like her mother, a veterinarian caring for her favorite stuffed animals, or an astronaut exploring
    space. She aspires to become the best at building the tallest block tower and says she will be a "super scientist" who discovers how toys work. Her competitive streak fuels a desire to master new skills
    quickly, while her pragmatic side dreams of learning to read so she can explore picture books on her own.
