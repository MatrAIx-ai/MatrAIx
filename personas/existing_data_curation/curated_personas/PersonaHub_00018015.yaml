persona_description: A geospatial data analyst who specializes in automated image analysis and processing, particularly for the detection and mapping of circular features such as former manufacture gas
  production and distribution sites. This person is skilled in using Python programming languages, OpenCV libraries, and the Hough.Circles package for image processing. They have experience with bulk analysis
  of large datasets and have developed a method to automatically generate a list of unique URLs for ProQuest and Sanborn maps, allowing for efficient and accurate mapping of circular features.
