personas:
  professional: Adam Brooks, a 17‑year‑old aspiring automotive technician, blends hands‑on car maintenance expertise with the strategic quick‑thinking honed from competitive first‑person shooters, applying
    a structured, detail‑oriented approach to every repair while keeping a skeptical eye on shortcuts and a competitive drive to be the best in the garage.
  sports: Adam Brooks enjoys weekend fishing trips on the Matanzas River, plays casual beach volleyball with the St. Johns Beach Volleyball League in summer, roots for the Jacksonville Jaguars in football
    and the Florida Gators in college basketball, and maintains a personal fitness routine of quick body‑weight drills to stay sharp for gaming competitions.
  arts: Adam Brooks immerses themselves in classic rock legends like Led Zeppelin and AC/DC as well as hip‑hop artists such as Kendrick Lamar, while devouring mystery novels by Agatha Christie for their
    logical twists and building intricate model ship kits that satisfy their creative and methodical side.
  travel: Adam Brooks prefers meticulously planned road trips, having already explored Orlando’s theme parks, the Florida Keys’ fishing spots, and a weekend getaway to Detroit’s automotive museums, while
    dreaming of a future tech‑focused pilgrimage to Japan’s tuning shops and a cultural tour of Italy’s historic vineyards.
  culinary: Adam Brooks favors hearty, protein‑rich meals like grilled fish tacos with chipotle lime sauce, homemade cheeseburgers topped with avocado, and occasional shrimp gumbo, cooking at a moderate
    skill level in the family kitchen while often ordering pizza after marathon gaming sessions.
  core: Adam Brooks is a 17‑year‑old future mechanic whose competitive gaming edge fuels a relentless pursuit of precise car repairs, yet the same drive fuels bouts of anxiety and impulsive spending that
    keep their life a balance of structure and chaos.
background:
  cultural: Adam grew up as a white American in Saint Augustine, Florida, a city steeped in historic Spanish colonial heritage and vibrant tourism. His family is middle‑class, with parents who worked in
    local service and construction jobs, emphasizing self‑reliance, practical skills, and a strong work ethic. He was raised with Southern‑influenced values of community, modesty, and hospitality, and his
    family attended a nearby Christian church, which contributed to a sense of belonging and routine. The coastal environment fostered an appreciation for outdoor activities like fishing and beach sports,
    while the city’s historic sites sparked an interest in local history. Exposure to a diverse visitor population gave him a broader cultural awareness, but his personal identity remains rooted in the
    pragmatic, family‑centered lifestyle of his hometown.
attributes:
