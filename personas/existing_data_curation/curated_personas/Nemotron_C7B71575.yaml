  hobbies: '[''Competitive first‑person shooter gaming'', ''Car engine tinkering and repair'', ''Model ship building'', ''Fishing at the Matanzas River'', ''Music listening (classic rock, hip‑hop)'', ''Mystery
    novel reading'', ''Casual beach volleyball'']'
  career_goals: Adam aims to earn his GED within the next year and enroll in a vocational automotive technology program at a community college. He wants to become a certified automotive technician, secure
    a stable position at a reputable garage in the St. Johns County area, and eventually open his own small auto‑repair shop. In parallel, he hopes to leverage his computer hardware knowledge to earn extra
    income by building custom gaming PCs for local friends and online clients. Achieving clear certifications and steady work is important to him for reducing anxiety and providing a predictable career
    path.
