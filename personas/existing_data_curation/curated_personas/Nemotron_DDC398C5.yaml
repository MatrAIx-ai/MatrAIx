  career_goals: Carlos aims to ascend to the role of museum or cultural center director, where he can shape bold, interdisciplinary exhibitions that blend technology and traditional art forms. He intends
    to expand community‑focused programming, develop robust digital archives, and champion a workplace culture that prioritizes flexibility and creative autonomy. In the longer term, he envisions launching
    his own consultancy that helps arts organizations adopt innovative, data‑informed strategies while preserving artistic integrity.
