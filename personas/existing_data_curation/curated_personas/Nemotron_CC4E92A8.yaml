personas:
  professional: Teresa Jacobs is a 31-year-old statistician who blends rigorous multivariate modeling and machine-learning expertise with an imaginative flair for visual storytelling, leading interdisciplinary
    public-health analytics, mentoring junior analysts, and navigating the pressure of aspiring senior leadership, and they balance meticulous organization with flexible creativity.
  sports: Teresa Jacobs enjoys weekend hikes on the Sandhills trails with the Trailblazers Hiking Club, follows the Carolina Panthers and Charlotte Hornets on game nights, and maintains personal fitness
    through early-morning yoga and occasional pick-up tennis, though they often skip scheduled workouts when work-related stress peaks.
  arts: Teresa Jacobs channels her imagination into abstract acrylics inspired by Helen Frankenthaler, experimental photography echoing Gregory Crewdson’s chiaroscuro, and piano improvisations that weave
    together Debussy and Radiohead motifs, regularly attending intimate openings at the Greenville County Museum of Art and solving intricate jigsaw puzzles with friends, yet they sometimes stay up late
    perfecting a piece at the expense of sleep.
  travel: Teresa Jacobs prefers meticulously planned solo getaways that blend scenic hikes with cultural immersion, having trekked the Blue Ridge Parkway and captured Reykjavik’s art scene, while eyeing
    a future photography expedition to Kyoto’s temples, though budgeting for consulting work sometimes limits longer trips.
  culinary: Teresa Jacobs loves cooking hearty Southern staples like shrimp and grits and collard greens using fresh garden herbs, experiments with Mediterranean fare such as eggplant caponata, often ending
    evenings with sweet tea and a slice of pecan pie, and they occasionally overindulge on artisanal chocolates when stress mounts.
  core: Teresa Jacobs is a data-driven visionary who balances statistical rigor with midnight painting sessions, tends toward anxiety-driven over-planning, and secretly hoards vintage paint tubes for spontaneous
    creativity.
background:
  cultural: Teresa grew up in a middle‑class family of European (German and Irish) descent in the small town of Lexington, South Carolina. Her upbringing was shaped by Southern hospitality, a close‑knit
    community, and frequent family gatherings featuring traditional Southern cuisine and church involvement. While respecting regional customs, her parents emphasized academic achievement and encouraged
    curiosity beyond local norms, leading her to pursue a STEM degree at a large university where she encountered a diverse set of peers and ideas. Today, she blends her Southern roots—valuing community
    service, modesty, and a love for the outdoors—with a progressive outlook that embraces artistic expression and interdisciplinary collaboration.
