  hobbies: '["Abstract painting", "Experimental photography", "Reading speculative fiction", "Hiking", "Gardening", "Journaling", "Piano composition", "Visiting art galleries", "Jigsaw puzzles", "Strategy
    board games"]'
  career_goals: Teresa aims to transition into a senior leadership role where she can guide a multidisciplinary analytics team focused on public‑health initiatives in the Carolinas. She plans to pursue
    a PhD in biostatistics to deepen her methodological expertise and to publish research on innovative statistical techniques. In the medium term, she hopes to develop predictive models that inform community
    health interventions and to establish a quarterly workshop series that bridges data science with artistic creativity. Ultimately, she envisions launching her own consulting practice that offers methodological
    consulting and training for nonprofit organizations while maintaining a strong presence in academic collaborations.
