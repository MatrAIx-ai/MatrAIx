persona_description: A scientist working in the field of neuroscience, particularly in the study of ion channels and their role in brain disorders. This scientist is interested in the identification of
  new compounds that selectively modify neuronal activity in the brain, with a focus on ion channel modulators. This scientist is experienced in using computer-based modeling and virtual screening to identify
  new compounds and has a track record of successfully identifying novel compounds with subunit-specificity. This scientist is also interested in the development of potential treatments for brain disorders,
  including epilepsy and alcohol use disorder.
