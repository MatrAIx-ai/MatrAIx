  career_goals: Deborah aims to advance her healthcare career by completing an associate degree in nursing to become a Licensed Practical Nurse (LPN) within the next two years, followed by pursuing RN licensure.
    She is particularly interested in specializing in geriatric care and hopes to lead a patient‑education program that incorporates art‑based therapeutic techniques for seniors in her community. Additionally,
    Deborah aspires to mentor newer nursing assistants, fostering a supportive and high‑performing team environment at the local hospital. Long‑term, she envisions opening a small home‑health agency that
    blends medical support with creative wellness activities for aging clients.
