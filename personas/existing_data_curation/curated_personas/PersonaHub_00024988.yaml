persona_description: A food safety expert with extensive knowledge and experience in foodborne illness outbreaks, particularly those involving raw or lightly cooked sprouts. This individual has been involved
  in the investigation and prevention of outbreaks related to mung bean sprouts and alfalfa sprouts, and has been advocating for the importance of thorough cooking and avoiding the consumption of raw or
  lightly cooked sprouts. They are knowledgeable about the potential risks associated with sprouts, including the risk of Salmonella and E. coli O157:H7 infections, and have been working to educate the
  public and food industry stakeholders on the importance of safety measures.
