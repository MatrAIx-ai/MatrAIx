persona_description: A researcher who specializes in ecological studies, particularly focusing on the impacts of land use and rangeland degradation on vegetation cover and animal distribution in the southern
  Kalahari, Botswana. Their research interests include conducting dual-scale analyses to assess farm-scale patterns of ecological change and landscape-scale patterns of change in vegetation cover and animal
  distribution. They have experience with ecological transect studies away from waterpoints, regional remotely sensed analysis of vegetation cover and animal numbers across the southern Kalahari, and have
  conducted studies on the invasion of exotic species such as Prosopis glandulosa Torr. and Rhigozum trichotomum Kuntze. They have a strong understanding of the need for integrated landscape-scale planning
  of land use if the ecological value and biodiversity of the southern Kalahari are to be retained.
