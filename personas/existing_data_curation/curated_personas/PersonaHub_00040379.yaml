persona_description: A scientist from the Council of Scientific & Industrial Research (CSIR) National Environmental Engineering Research Institute (NEERI) in Nagpur, India, who specializes in developing
  environment-friendly technologies and collaborating with international scientific communities to develop innovative and sustainable systems for environmental implementation. He has experience in developing
  and commissioning Phytorid-based sewage treatment plants and is keen on exploring areas of development for materials for environmental technologies. He has a keen interest in the functioning of Phytorid
  sewage treatment plants and is currently collaborating with the International Advanced Research Centre for Powder Metallurgy & New Materials (ARCI) in Hyderabad, India, to establish the first Phytorid-based
  Sewage Treatment Plant in Telangana.
