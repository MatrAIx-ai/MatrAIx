  hobbies: '["Watercolor painting", "Reading poetry and literature", "Volunteering at the historical society", "Native gardening", "Crocheting for charity", "Birdwatching", "Genealogy research"]'
  career_goals: Although retired from formal employment, Sima aims to leave a lasting cultural legacy in Powhatan County. She plans to establish a local oral‑history archive that captures stories of long‑time
    residents, mentor younger artists and writers through a weekly mentorship circle, and collaborate with the county library to create a series of public lectures on the intersection of art and regional
    history. She also hopes to publish a memoir intertwining personal reflections with her family's generational narrative, thereby enriching community identity and preserving heritage for future generations.
