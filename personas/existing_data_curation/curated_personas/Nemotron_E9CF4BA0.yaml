  hobbies: '[''Hiking'', ''Yoga'', ''Cooking (seasonal recipes)'', ''Reading personal development books'', ''Journaling'', ''Volunteer work at food bank'', ''Community service projects'']'
  career_goals: Colleen aims to become a senior sales manager within the next five years, overseeing a regional team and shaping strategic growth initiatives. She plans to pursue a bachelor's degree in
    business administration to deepen her managerial expertise and eventually lead sustainability‑focused sales programs that help manufacturers adopt greener practices. Long‑term, she envisions mentoring
    junior sales representatives and contributing to community economic development in Howard County.
