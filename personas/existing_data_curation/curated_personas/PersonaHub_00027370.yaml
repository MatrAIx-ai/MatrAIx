persona_description: A public health scientist who is deeply involved in the development and research of vaccines, particularly the polio vaccine. She has a strong background in epidemiology and public
  health and has worked closely with Jonas Salk and Thomas Francis, mentors at the School of Public Health. She is passionate about the impact of the polio vaccine on public health and is committed to continuing
  the tradition of vaccine research at the School of Public Health. She is also interested in the development of new influenza vaccines, as she has worked with Francis on developing an influenza vaccine
  using a live attenuated virus.
