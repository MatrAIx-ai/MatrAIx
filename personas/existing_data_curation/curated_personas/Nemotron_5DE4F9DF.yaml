  hobbies: '[''Co-ed softball league'', ''Indoor rock climbing'', ''Hiking Finger Lakes trails'', ''Women-in-mining network participation'', ''Salsa dancing'', ''Community garden volunteering'', ''Vintage
    motorcycle restoration'', ''Reading science-fiction'', ''Listening to mining industry podcasts'']'
  career_goals: Tracie aims to move from machine operator to a supervisory role, such as shift supervisor or mine foreman, where she can shape safety culture and operational efficiency. She is pursuing
    additional certifications in mine safety management and plans to complete a bachelor's degree in occupational health and safety or mechanical engineering. Her competitive drive pushes her to become
    a leading voice in the adoption of automation technologies at her mine, and she hopes to eventually transition into a mine safety trainer or consultant role. Long‑term, she envisions influencing industry
    standards and mentoring the next generation of women in mining.
