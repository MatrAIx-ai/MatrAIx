personas:
  professional: Joseph Myers is an aspiring young engineer who channels his love for organized group activities into methodical LEGO building, strategic Minecraft world‑crafting, and a competitive drive
    that shines on the soccer field and in classroom leadership.
  sports: Joseph Myers competes on the Warrensburg Wildcats youth soccer team and the local Little League baseball squad, idolizes the Kansas City Chiefs and Kansas City Royals, follows a regimented warm‑up
    routine, practices drills daily with a competitive spirit, and enjoys weekend hikes in nearby woods and streams.
  arts: Joseph Myers immerses themselves in creative play through building custom LEGO models after following instructions, reading the Magic Tree House series by Mary Pope Osborne, listening to kid‑friendly
    pop tunes from the Disney Encanto soundtrack, and crafting pixel‑art designs in Minecraft, which together shape a vivid imagination and a critical eye for detail.
  travel: Joseph Myers prefers structured, family‑guided trips that blend adventure with learning, having visited Lake of the Ozarks State Park to fish and collect pinecones, and dreaming of a future excursion
    to Yellowstone National Park’s geysers and the historic castles of Europe after saving enough allowance for a family vacation.
  culinary: Joseph Myers favors familiar foods such as cheese pizza, chicken nuggets, and mac‑and‑cheese, enjoys assembling their own mini turkey‑and‑cheese sandwiches, delights in snack‑time pine‑nut trail
    mix, and occasionally insists on extra cheese on their spaghetti.
  core: Joseph Myers is a methodical, competitive seven‑year‑old who thrives on structured group play, obsessively organizes LEGO creations, saves every spare change, and can be stubbornly skeptical about
    new rules, yet never misses a chance to lead the classroom line.
background:
  cultural: Joseph comes from a white, European‑American family with German and Irish ancestry living in the small town of Warrensburg, New York. The community emphasizes outdoor recreation, seasonal celebrations,
    and close‑knit school involvement. His family observes typical American holidays such as Thanksgiving and the Fourth of July, while also participating in regional traditions like local Oktoberfest gatherings
    in the town hall. He attends a nearby public elementary school and a community church, reflecting the modest, family‑oriented culture of Warren County.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "LEGO construction", "Team coordination", "Simple coding (Scratch)"]'
  hobbies: '["Soccer", "Little League baseball", "LEGO building", "Reading adventure books", "Exploring nature", "Minecraft", "Classroom leadership"]'
  career_goals: Joseph dreams of becoming an astronaut because he loves space facts and building rockets with LEGO. He is also fascinated by the idea of being a firefighter, attracted to the structured
    training and the chance to help people. His competitive spirit drives him to aim for the captaincy of his soccer team and to be the top scorer in Little League baseball. Additionally, he enjoys solving
    puzzles and imagines a future as a detective, reflecting his critical and skeptical mindset.
