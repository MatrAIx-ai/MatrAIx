personas:
  professional: Manuel Almeyda, an 85‑year‑old retired handyman and beloved senior‑center volunteer, they bring decades of carpentry, plumbing, and electrical troubleshooting to fix neighbors’ homes while
    informally mediating disputes in both Spanish and English, blending a practical curiosity with a spontaneous, low‑structure approach to community projects.
  sports: Manuel Almeyda, a devoted follower of the Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals, they stay active by walking the East Verde River banks and joining a senior walking group that
    meets weekly, occasionally participate in low‑impact community yoga classes at the church hall, and enjoy cheering on their favorite teams on Saturday afternoons with a cold jar of cactus fruit juice.
  arts: Manuel Almeyda, an avid listener of mariachi and ranchera tunes, they often strum an old acoustic guitar inherited from their father while humming classic songs by Vicente Fernández, capture desert
    sunsets and community festivals with their Canon EOS camera, and regularly attend the local church’s seasonal pageants featuring performances of traditional folk dances.
  travel: Manuel Almeyda, who prefers relaxed road trips over fast flights, they have explored the red rocks of Sedona, the historic streets of Santa Fe, and the Tonto National Forest trails, dream of returning
    to their hometown in Jalisco for a reunion when health allows, and carefully budget each journey to ensure their modest pension covers lodging and meals without compromising garden projects.
  culinary: Manuel Almeyda, a seasoned cook who expertly prepares tamales, pozole, and mole using heirloom chilies, masa, and locally sourced cactus fruit, they delight neighbors with experimental pepper
    hybrids nurtured in their garden, enjoy the ritual of hand‑rolling tortillas for casual meals, and occasionally treat themselves to a sweet slice of pan de muerto during Día de los Muertos celebrations.
  core: Manuel Almeyda, an 85‑year‑old garden‑loving handyman, they have a penchant for spontaneous guitar jam sessions, a habit of overwatering their pepper seedlings, and an unwavering commitment to helping
    anyone in need, embodying a blend of curiosity, compassion, and gentle stubbornness.
background:
  cultural: Manuel was born in the small town of San Juan de los Lagos in Jalisco, Mexico, and moved to Arizona in his early thirties seeking work in construction. Growing up in a close‑knit Mexican family,
    he absorbed traditions such as Día de los Muertos, Christmas posadas, and the daily preparation of homemade tortillas and tamales. In Arizona he blended these customs with Southwest influences—adopting
    local foods like cactus fruit and participating in community events at the Payson County Fair. He remains fluent in Spanish, using it daily to converse with fellow Mexican‑American seniors and to help
    newcomers navigate local services. His Catholic faith, reinforced by the local parish, has shaped his compassionate outlook and volunteer spirit. Manuel's cultural identity is a tapestry of Mexican
    heritage, migrant resilience, and the desert‑driven lifestyle of the American Southwest, which he proudly shares through food, stories, and community involvement.
