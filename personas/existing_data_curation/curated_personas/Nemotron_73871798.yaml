personas:
  professional: Maritza Ramirez, a seasoned sheet‑metal fabricator with over twenty years of hands‑on experience, combines precise cutting, shaping, and welding skills with a talent for reading technical
    drawings and coordinating safety protocols, making them the shop’s indispensable troubleshoot‑engineer and mentor as they pursue journeyman certification and a foreperson role.
  sports: Maritza Ramirez energizes weekends by playing forward for the community women’s soccer team the Riverbend Rovers, keeps a fitness routine of early‑morning jogs, and fervently follows professional
    matches, cheering for the Los Angeles Galaxy in MLS and the New York Yankees in baseball whenever possible.
  arts: Maritza Ramirez weaves cultural rhythm into their life by dancing cumbia and punta at local festivals, filling their kitchen with the vibrant sounds of Carlos Vives, Marc Anthony, and Celia Cruz
    while admiring the bold colors of Frida Kahlo’s paintings, which inspire the intricate metal‑craft designs they create in spare moments.
  travel: Maritza Ramirez prefers road‑trip adventures that blend family visits and community service, having driven to the historic towns of Antigua and Granada for cultural immersion, while dreaming of
    a future pilgrimage to the coastal fishing villages of the Caribbean to taste fresh seafood and explore artisan markets.
  culinary: Maritza Ramirez, an adept home chef, delights friends with homemade baleadas filled with refried beans, cheese, and ripe avocado, simmers fragrant garísol soup enriched with plantains and corn,
    and perfects pupusas seasoned with achiote and freshly grated queso fresco, reflecting a love for bold, home‑grown flavors and a willingness to experiment beyond tradition.
  core: Maritza Ramirez blends meticulous metalwork expertise with a vibrant community spirit, juggling a disciplined savings plan, regular health checks, weekend soccer matches, and spontaneous kitchen
    concerts, all while habitually misplacing their keys just before a shift.
background:
  cultural: Born in Honduras and raised in a close‑knit immigrant community in Houston, Maritza blends Central‑American traditions with Texan life. She speaks Spanish at home, celebrates Honduran holidays
    such as Feria Juniana, and maintains strong family ties. Her Catholic faith and involvement in the local Honduran diaspora shape her values of generosity, cooperation, and community service, while her
    daily life reflects the multicultural vibrancy of Harris County.
