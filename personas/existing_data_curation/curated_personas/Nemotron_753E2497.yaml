  hobbies: '[''Rock climbing'', ''Hiking in Wasatch Mountains'', ''Snowboarding'', ''Model kit building'', ''3D printing projects'', ''Video gaming'', ''DIY home improvement'', ''Cooking'', ''Attending
    live music'', ''Community volunteering'']'
  career_goals: Christian aims to become a lead fabricator and eventually a shop foreman, obtaining his journeyman welding certification and completing an associate’s degree in industrial technology. He
    is interested in integrating additive manufacturing and sustainable material practices into the local shop, with a long‑term ambition to launch his own small‑scale custom metal‑plastic fabrication business
    that can support his growing family while staying adaptable to new technologies.
