personas:
  professional: Christian Jones is a hands‑on metal and plastic fabricator who blends MIG/TIG welding, CNC milling, and budding SolidWorks design with a practical curiosity for additive manufacturing, and
    their relaxed‑yet‑assertive approach lets them troubleshoot shop line stoppages swiftly while coordinating small crews and juggling inventory spreadsheets as they work toward journeyman certification
    and a future foreman role.
  sports: Christian Jones spends weekends rock climbing with The Front Climbing Club on the Wasatch cliffs, shreds powder at Snowbird during winter, tracks trail runs that they sometimes trade for video‑game
    nights, and roots for the Utah Jazz and Real Salt Lake when not on the shop floor.
  arts: Christian Jones channels creativity into 3D‑printing custom keycaps, assembling model kits of classic cars, and attending live‑music shows featuring The Strokes, local indie group The Oh Hellos,
    and occasional jazz nights at Red Butte Garden, which together satisfy their blend of tactile craftsmanship and modern pop culture appreciation.
  travel: Christian Jones favors spontaneous road trips to nearby national parks like Zion, Bryce Canyon, and Arches, enjoys weekend climbing excursions in the Colorado Rockies with their spouse, and dreams
    of a future tech‑tour of Japan’s industrial districts, all while balancing a modest travel budget.
  culinary: Christian Jones cooks simple yet flavorful meals such as pepper‑corn steak, spicy tuna rolls, and homemade pizza topped with fresh basil, brews French press espresso for morning focus, and adds
    a kick to weekend avocado toast with a drizzle of sriracha, reflecting a hands‑on approach to both food and fabrication.
  core: Christian Jones merges a hands‑on fabrication career with a love for outdoor adventure and DIY projects, tempered by a relaxed, sometimes disorganized approach to budgeting, yet driven by a pragmatic
    curiosity that fuels aspirations for a future custom metal‑plastic business.
background:
  cultural: Christian grew up in Provo, Utah, within a predominantly LDS community that emphasized family, hard work, and community service. While his upbringing instilled strong values of reliability and
    self‑reliance, his time at a local college exposed him to a broader, more secular perspective and sparked his interest in modern manufacturing technologies. He balances respect for traditional cultural
    norms with a pragmatic curiosity about new tools and methods, reflecting the blend of western frontier spirit and contemporary innovation characteristic of many young adults in the area.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC machine operation'', ''SolidWorks CAD'', ''Blueprint reading'', ''Quality inspection'', ''Metal fabrication'', ''Plastic injection molding basics'', ''Equipment
