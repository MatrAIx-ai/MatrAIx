  career_goals: Michael aims to advance to a leadership position within the San Bernardino County Fire Department, such as station captain or district chief, where he can champion innovative fire‑prevention
    initiatives that blend his artistic imagination with public safety. He is particularly interested in developing community murals and interactive workshops that teach fire safety through visual storytelling.
    Additionally, Michael plans to obtain certification as a fire investigator to satisfy his curiosity about fire origins and cause analysis. Long‑term, he envisions mentoring younger firefighters and,
    after retirement, establishing a community art space that celebrates Mexican cultural heritage and offers creative programs for youth.
