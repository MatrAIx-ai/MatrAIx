personas:
  professional: Michael Estrada, a seasoned structural firefighter and EMT‑B with hazardous‑materials expertise, they leverage his vivid imagination and rapid, creative problem‑solving to design fire‑prevention
    workshops that combine large‑scale murals, bilingual storytelling, and hands‑on safety drills, while his laid‑back attitude sometimes leaves paperwork trailing behind.
  sports: Michael Estrada hikes the San Gabriel Mountains with the San Gabriel Trailblazers club, joins the San Bernardino Stallions amateur softball team each summer, and passionately follows the Los Angeles
    Lakers and Dodgers, using his outdoor pursuits as his primary fitness regimen.
  arts: Michael Estrada channels his creative energy into painting large‑scale murals that echo folk motifs and abstract designs while strumming acoustic renditions of songs by Leonard Cohen, Nick Drake,
    and Joni Mitchell, photographing sunrise vistas reminiscent of Ansel Adams, and performing in improv nights inspired by Tina Fey and the Second City sketch troupe.
  travel: Michael Estrada prefers weekend getaways to the rugged deserts of Joshua Tree, cultural festivals in Santa Fe, and family camping trips in Yosemite, while dreaming of photographing the sunrise
    over Machu Picchu and the aurora borealis in Iceland for his next landscape series.
  culinary: Michael Estrada enjoys cooking hearty dishes such as spicy chiles rellenos, slow‑cooked carnitas, and mole verde, they savor ingredients like roasted tomatillos, corn masa, and smoked paprika,
    and occasionally experiment with vegetarian tacos using black beans and grilled zucchini.
  core: Michael Estrada blends daring fire‑fighting instincts with a painter’s eye, navigating emergencies with impromptu mental sketches, while his spontaneous art purchases and occasional missed deadlines
    reveal a charismatic yet delightfully disorganized soul.
background:
  cultural: Michael is a Mexican‑American raised in Fontana, California, where his family maintains strong ties to Mexican traditions while embracing the multicultural fabric of Southern California. He
    grew up celebrating Día de los Muertos, quinceañeras, and other Mexican holidays, and is fluent in both Spanish and English. This bicultural upbringing informs his values of community solidarity, respect
    for elders, and a deep appreciation for oral and visual storytelling. Michael frequently incorporates traditional Mexican motifs and colors into his artistic projects and uses his cultural perspective
    to connect with diverse community members during fire‑prevention outreach.
