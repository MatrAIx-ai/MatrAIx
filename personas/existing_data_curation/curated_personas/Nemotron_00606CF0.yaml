    ''Storytelling at community events'']'
  career_goals: Although retired, Vanessa aspires to leave a lasting creative and historical legacy in her community. She plans to complete a memoir that weaves together family stories and genealogical
    findings, and to curate a small exhibition of her abstract watercolor series at the local community center. She also hopes to launch a senior‑focused support group that uses art and journaling to help
    cope with anxiety, and to mentor younger relatives and neighbors in quilting and storytelling, ensuring that traditional crafts and local history are passed on.
