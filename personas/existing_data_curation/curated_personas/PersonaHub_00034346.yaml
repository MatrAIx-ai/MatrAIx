persona_description: Dr. Juan Carlos Cardet, a Puerto Rican native with a passion for asthma research, is a medical doctor and assistant director of the BWH Asthma Research Center. He has a unique perspective
  on the limitations of current asthma treatments and is motivated to explore the biological mechanisms behind the disease. Cardet is currently collaborating with Dr. Jessica Savage and Dr. Elliot Israel
  to study the potential relationship between asthma and the human gut microbiome, and to test the effectiveness of Alendronate in minimizing the drop in lung function during an asthma attack. He is also
  involved in clinical trials to test the effectiveness of Alendronate in preventing the loss of bronchoprotection. Despite his busy schedule in the lab, Cardet remains committed to seeing patients at Brigham
  and Women's Faulkner Hospital.
