personas:
  professional: Roger Trost, a 16‑year‑old aspiring automotive technician in Kentucky, leverages his meticulous model‑kit building experience and 4‑H hands‑on projects to excel at repairing lawnmowers and
    small engines, while using Excel and Google Calendar to meticulously schedule his part‑time apprenticeship applications and GED study plan.
  sports: Roger Trost enjoys seasonal hunting trips and weekend fishing on Kentucky’s lakefronts, follows the University of Kentucky Wildcats basketball team, and runs on his high school cross‑country team
    while occasionally training at a local gym for functional strength.
  arts: Roger Trost, a budding acoustic guitarist, frequently performs traditional gospel songs like 'Amazing Grace' at church gatherings and reveres classic rock artists such as Johnny Cash and Lynyrd
    Skynyrd, while also appreciating model‑kit craftsmanship as a form of artistic expression.
  travel: Roger Trost prefers road‑trip adventures that combine his love for nature and mechanics, having camped in the Great Smoky Mountains and planned a future visit to the Henry Ford Museum in Detroit
    to study historic automobiles, yet he balances trips with school responsibilities.
  culinary: Roger Trost enjoys cooking simple, hearty meals like chicken fried steak with mashed potatoes, seasoning with onion‑powder and paprika, and often experiments with grilling freshly caught catfish,
    though he relies heavily on ready‑made pizza when late on a project.
  core: Roger Trost is a methodical, 16‑year‑old DIY enthusiast who balances structured planning with outdoor solitude, but sometimes over‑organizes to the point of missing spontaneous fun.
background:
  cultural: Roger grew up in Falmouth, Kentucky, a small town in Bracken County characterized by a close‑knit, predominantly White community with deep roots in agriculture and modest industry. His family
    values hard work, self‑reliance, and community service, traditions reinforced by regular attendance at a local Baptist church and participation in town events like county fairs and high school football
    games. The regional culture emphasizes hospitality, modesty, and a respect for practical skills, which have shaped Roger’s organized, dependable personality and his desire to contribute meaningfully
    to his community.
