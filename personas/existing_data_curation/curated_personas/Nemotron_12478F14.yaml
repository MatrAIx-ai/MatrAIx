  career_goals: In the short term, Roger aims to earn his GED and enroll in a local community college’s automotive or electrical trade certification program, seeking a part‑time apprenticeship to gain hands‑on
    experience. Mid‑term, he aspires to become a certified automotive technician or electrician, working for a reputable business where schedules are predictable and responsibilities are clearly defined.
    Long‑term, he envisions a stable career in the skilled‑trade sector, potentially running a small family repair shop or advancing to a supervisory role with a utility company. He also hopes to serve
    his community as a volunteer EMT or firefighter, leveraging his reliable nature to help neighbors, and to hold a leadership position in a local youth organization, coordinating events and mentoring
    peers.
