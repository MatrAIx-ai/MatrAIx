persona_description: A scientist and ecologist who is passionate about the conservation and sustainable use of natural resources. She is a forest ecologist at The Evergreen State College in Olympia, Washington,
  and has expertise in the cultivation and conservation of mosses. Her research interests include the economic and ecological benefits of moss cultivation, as well as the sustainable use of natural resources.
  She is also interested in the development of new techniques for the cultivation of mosses and the potential for using minimum security prisons as a base of operations for her experiments.
