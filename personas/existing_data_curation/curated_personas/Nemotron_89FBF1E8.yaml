  career_goals: Even in retirement, Avis is driven to expand her impact on the Cottontown community. She hopes to formalize a mentorship program at the local senior center, pairing seniors with younger
    volunteers for skill‑sharing and companionship. Additionally, she aims to develop a community garden project that encourages intergenerational participation and ensures fresh food for local families.
    Avis also plans to improve her digital literacy to stay connected with her grandchildren and to document her family’s history for future generations.
