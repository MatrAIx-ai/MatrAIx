    road trips'', ''DIY home improvement projects'', ''Participating in local fairs'']'
  career_goals: Zeb aims to advance from a senior installer to a shop foreman or manager within the next three to five years, overseeing a small team of technicians and ensuring consistent quality and safety
    standards. He plans to obtain the National Glass Association’s Certified Glass Technician (CGT) and Certified Manager (CM) credentials to formalize his expertise. In the longer term, Zeb dreams of opening
    his own independent auto‑glass service in the surrounding rural communities, providing reliable, reasonably priced repairs while creating stable jobs for his family and friends. He also hopes to reduce
    the stress of his current workload by streamlining processes and adopting more predictable scheduling, which would support his desire for routine and financial security for his wife and children.
