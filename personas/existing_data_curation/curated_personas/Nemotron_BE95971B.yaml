personas:
  professional: Zeb Lemus is a seasoned automotive glass installer who leverages fifteen years of hands‑on precision, meticulous documentation, and a calm, teamwork‑focused demeanor to train new technicians
    and streamline shop operations, all while eyeing a foreman role that aligns with his love for routine and community stability.
  sports: Zeb Lemus coaches youth baseball at the local community center, chews on fresh‑caught trout after early‑morning fishing trips on Lake Winnebago, roots for the Green Bay Packers on Sundays, and
    occasionally joins a regional hunting club’s fall deer outings, embodying the Midwest’s love of outdoor team and individual sports.
  arts: Zeb Lemus spins classic rock vinyl from Neil Young and country hits by Garth Brooks while grilling barbecue, regularly attends the annual Wisconsin State Fair’s music stage featuring folk bands,
    and participates in his community theater’s set‑building crew, where his woodworking skills meet his appreciation for live performance.
  travel: Zeb Lemus favors family road trips along Wisconsin’s scenic byways, most recently exploring the historic lighthouses of Door County and the craft breweries of Milwaukee, while keeping a tentative
    wishlist that includes a drive to Mackinac Island for its vintage car tours, always balancing budget constraints with a desire for relaxed, nature‑rich stops.
  culinary: Zeb Lemus enjoys grilling bratwursts and corn on the cob using locally sourced pork, perfecting his homemade fish fry with walleye, and seasoning dishes with a pinch of smoked paprika and fresh
    dill, while his woodworking hobby often spills into kitchen projects like building a custom cutting board.
  core: Zeb Lemus is a routine‑driven, community‑centric handyman who worries about schedules, perfects every windshield install, and finds peace in fishing, classic rock, and backyard barbecues.
background:
  cultural: Zeb grew up in a small, predominantly white, working‑class community in central Wisconsin, where German‑Scandinavian heritage and Midwestern values shape daily life. The local culture emphasizes
    hard work, modesty, community participation, and practical self‑reliance. Family and church gatherings, local fairs, and community sports are central social pillars. Zeb’s upbringing in this environment
    instilled a respect for routine, a preference for tangible results, and a strong sense of responsibility toward his family and neighbors. The region’s love of outdoor recreation, such as fishing and
    hunting, and a modest, frugal lifestyle further influence his attitudes and habits.
