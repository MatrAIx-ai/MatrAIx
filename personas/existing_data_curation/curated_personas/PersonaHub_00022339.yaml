persona_description: A senior government official with expertise in environmental policy, sustainability, and the promotion of green building practices. The individual is responsible for leading and implementing
  strategies to encourage the use of wood as a green building material and to promote the adoption of sustainable building practices. They are committed to using local and domestic resources, and are interested
  in exploring innovative ways to use smaller diameter timber and leftover branches and limbs for wood products. The individual is also interested in research and development around green building materials
  and has a strong understanding of the environmental and economic benefits of using wood as a building material.
