  career_goals: Mehmed aims to move into a supervisory role within the warehouse, such as shift lead or warehouse manager, where he can apply his organizational strengths and innovative layout ideas. He
    plans to earn additional certifications in logistics management and sustainable supply‑chain practices, positioning himself to eventually open a family‑owned moving and storage business that combines
    reliable service with community‑focused initiatives. Providing greater financial stability for his wife and children and contributing to local economic development are central motivations behind his
    career ambitions.
