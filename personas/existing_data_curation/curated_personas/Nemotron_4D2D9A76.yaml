  hobbies: '[''solo hiking'', ''birdwatching'', ''nature photography'', ''gardening (native and vegetable)'', ''reading mystery and historical fiction'', ''knitting and crocheting'', ''small‑group book
    club'', ''community garden volunteering'', ''meditation'']'
  career_goals: Linda aims to re‑enter the workforce in a role that blends her practical abilities with her interest in community sustainability. She plans to obtain a certification in horticulture or sustainable
    landscaping within the next year, positioning herself for part‑time work at a local garden center or environmental nonprofit. Concurrently, she wishes to develop a modest side business creating custom
    planters and offering workshops for small groups, leveraging her DIY and gardening expertise. Over the next five years, Linda hopes to become a recognized resource in her Denver neighborhood for eco‑friendly
    home projects, while maintaining a flexible schedule that respects her need for solitude and personal resilience.
