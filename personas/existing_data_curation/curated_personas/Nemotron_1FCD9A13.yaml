  career_goals: Although no longer seeking full‑time employment, Vilayvone aims to turn his lifelong passions into a lasting community legacy. He hopes to open a modest art studio in Fountain Valley where
    he can mentor immigrant youth in painting and photography, and host monthly exhibitions that celebrate Southeast Asian aesthetics. He also aspires to compile a memoir of his family's refugee journey
    paired with a collection of poems inspired by abstract concepts, and to publish it either in print or as an e‑book. In the longer term, he would like to secure a grant to develop a multicultural garden
    that doubles as an outdoor classroom for local schools.
