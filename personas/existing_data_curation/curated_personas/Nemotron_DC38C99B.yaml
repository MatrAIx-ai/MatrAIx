  career_goals: Although retired from formal employment, Sheri aims to continue contributing her business acumen to Gillette’s community. She aspires to mentor emerging entrepreneurs through a local incubator,
    serve on the board of the Gillette Chamber of Commerce, and lead a senior-citizen advocacy group that influences city policies on health and accessibility. Additionally, she wishes to develop a volunteer-driven
    emergency-preparedness program for rural neighborhoods and to document the town’s history through oral-history interviews, blending her curiosity with a practical desire to preserve local heritage.
