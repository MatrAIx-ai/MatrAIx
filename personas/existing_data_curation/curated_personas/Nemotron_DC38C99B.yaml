personas:
  professional: Sheri Holland, a retired corporate strategist turned community mentor, leverages her decades‑long expertise in financial planning, small‑business consulting, and event coordination to guide
    emerging entrepreneurs, serve on the Gillette Chamber of Commerce board, and design emergency‑preparedness workshops that blend meticulous organization with flexible, on‑the‑fly problem solving.
  sports: Sheri Holland enjoys moderate hikes along the Red Desert trail network, follows the Wyoming Cowboys football team, occasionally joins the Gillette Trail Club for weekend walks, and plays bridge
    competitively at the local senior center, viewing it as both mental fitness and friendly sport.
  arts: Sheri Holland is an avid reader of historical fiction by authors like Ken Follett and Philippa Gregory, attends the Gillette Community Theater's productions of classic plays, listens to folk legends
    such as John Denver while knitting, and captures the high‑plain sunsets through her digital‑photography workshops, often displaying the images at the town’s art fair.
  travel: Sheri Holland prefers well‑planned road trips that blend scenic drives with cultural stops—her recent itinerary included a week‑long loop through Yellowstone, a visit to the historic mining town
    of South Pass, and a weekend retreat at a lake cabin in Colorado, always budgeting for a modest souvenir and a notebook for oral‑history interviews.
  culinary: Sheri Holland experiments with traditional Wyoming fare, perfecting a hearty bison chili with garden‑grown beans and heirloom tomatoes, while also mastering rye bread and sweet potato casserole,
    and she often gifts her homemade pies to the local senior center after a vigorous cleaning of the garden yields fresh produce.
  core: Sheri Holland balances spreadsheets with seed packets, mentors budding entrepreneurs with gentle assertiveness, hikes at a measured pace, and never lets a stray knitting needle escape her grip.
background:
  cultural: Sheri comes from a White, Midwestern-American background with deep roots in the Northern Plains. Raised on a family farm in Nebraska before moving to Gillette, she embodies the frontier values
    of self-reliance, community cooperation, and respect for the natural landscape. Her cultural identity is shaped by the modest, pragmatic ethos of the American West, blended with a strong sense of civic
    duty and an appreciation for family traditions. She celebrates local holidays, contributes to town events like the annual rodeo, and maintains ties to regional heritage through participation in the
    local historical society.
