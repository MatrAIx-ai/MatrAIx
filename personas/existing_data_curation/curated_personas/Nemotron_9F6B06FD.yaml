  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Reading Appalachian history'', ''Genealogy research'', ''Playing bridge'', ''Church community involvement'', ''Volunteering at the library'']'
  career_goals: Although retired, Blaine aims to stay actively engaged by offering mentorship to local start‑ups, serving on the board of the Preston County Chamber of Commerce, and volunteering his financial
    expertise to nonprofit organizations. He hopes to author a practical guide on small‑business management, preserve his family's business legacy through oral histories, and maintain his health so he can
    continue enjoying quality time with his wife and grandchildren.
