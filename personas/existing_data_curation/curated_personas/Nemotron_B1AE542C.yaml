personas:
  professional: Marie Sullivan, an aspiring museum curator in training, channels their sharp analytical eye and digital illustration skills into independent research projects on contemporary visual art
    while balancing a part‑time library assistant role; their organized self‑management and preference for solitary work help them thrive in cataloguing internships at the Princeton University Art Museum
    and the Stockton University Gallery, and they envision a parallel freelance career creating illustrations for indie books.
  sports: Marie Sullivan, a low‑key fitness enthusiast, spends their weekends hiking the trails of Wharton State Forest and cycling alone along the Garden State Parkway, roots for the New Jersey Devils
    and the Rutgers Scarlet Knights basketball team, and occasionally joins a campus yoga class to counterbalance sedentary studio time.
  arts: Marie Sullivan, a dedicated visual arts aficionado, draws inspiration from Georgia O’Keeffe, the minimalist works of Agnes Martin, and the digital illustrations of Loish, regularly attends virtual
    art talks hosted by the Museum of Modern Art and local gallery openings in Princeton, and they journal reflections on the narrative potential of photography after each nature shoot.
  travel: Marie Sullivan, an intentional traveler, prefers train journeys to nearby cultural hubs such as Philadelphia’s Museum of Art and New York’s Metropolitan Museum, savors quiet weekends at the historic
    seaside town of Cape May, and they dream of a future study‑abroad semester in Florence to explore Renaissance masterpieces firsthand.
  culinary: Marie Sullivan, a modest yet experimental home cook, favors simple vegetarian dishes like quinoa‑and‑roasted‑vegetable bowls, enjoys crafting avocado toast with fresh basil and cherry tomatoes,
    occasionally indulges in handmade ramen with matcha‑infused broth, and they treat themselves to buttery croissants from a local bakery on rainy afternoons.
  core: Marie Sullivan, a solitary yet socially conscious art student, blends meticulous research with creative illustration, budgets carefully while treating themselves to high‑quality supplies, monitors
    anxiety with yoga, hikes for fitness, draws inspiration from classic and digital artists, travels by train to cultural sites, and experiments with wholesome, artful meals.
background:
  cultural: Marie was raised in Hammonton, New Jersey, a small town known as the "Blueberry Capital of the World." Her family is primarily of Irish descent and belongs to the town's middle‑class community.
    Growing up, she experienced a blend of agricultural heritage and a slowly expanding local arts scene, participating in community fairs, library programs, and small-town cultural events. This environment
    fostered her appreciation for both quiet, natural surroundings and the value of preserving and sharing cultural artifacts, influencing her current interests in art, research, and community‑focused cultural
    work.
attributes:
  skills: '[''Digital illustration'', ''Photo editing (Adobe Photoshop, Lightroom)'', ''Adobe Illustrator (intermediate)'', ''Academic writing'', ''Critical reading'', ''Literature review'', ''Research
    methods'', ''Time-management'', ''Project planning'', ''Archival organization'']'
  hobbies: '[''Sketching'', ''Nature photography'', ''Digital illustration'', ''Reading art history'', ''Reading philosophy'', ''Literary fiction'', ''Journaling'', ''Volunteering at local library'', ''Attending
    virtual art talks'']'
  career_goals: Marie aims to complete a bachelor's degree in Art History or Museum Studies, ideally at a regional university such as Rutgers or a local community college, and secure an internship with
    a nearby museum or gallery (e.g., Princeton University Art Museum or Stockton University Gallery). Her long‑term ambition is to become a museum curator or archivist focusing on contemporary visual arts,
    a role that blends her love of solitary research with her desire to foster cultural harmony. She also envisions a parallel freelance career as a visual storyteller, creating illustrations for independent
    books and digital media, allowing her the flexibility to work from quiet, personal spaces while contributing to community arts education.
