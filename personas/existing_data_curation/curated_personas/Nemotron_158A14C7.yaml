personas:
  professional: An experienced school bus driver named Edna Smith leverages her CDL, defensive‑driving expertise, and on‑the‑spot troubleshooting to keep kids safe while sprinkling each route with impromptu
    storytelling that reflects her curious, art‑infused outlook, even as her relaxed attitude toward scheduling sometimes leads to last‑minute route tweaks.
  sports: Edna Smith enjoys low‑key fitness by jogging with the Racine Runners club during spring, cheering on the Milwaukee Bucks at home games and the Green Bay Packers on Sundays, while occasionally
    squeezing in a weekend pickup basketball game at the local community center to keep flexible and avoid the rigidity of formal gym routines.
  arts: Edna Smith immerses herself in Racine’s modest art world, sketching urban scenes in Riverside Park, attending Thursday jazz evenings at The Watch It! Café featuring artists like Cassandra Wilson,
    and collecting limited‑edition prints from photographer Ansel Adams, all of which fuel her watercolor practice and inspire the storytelling workshops she leads for after‑school youth.
  travel: Edna Smith prefers spontaneous, budget‑friendly road trips that blend photography with garden stops, having already captured sunrise over Door County’s shores, explored the vibrant food markets
    of New Orleans, and now dreaming of a week‑long visit to the lavender fields of Provence, while usually planning itineraries on a loose notepad rather than rigid booking sites.
  culinary: Edna Smith cooks soulful meals like collard‑green‑infused stew and fried chicken with a secret spice blend from her grandmother’s recipe book, often garnishing dishes with fresh basil and rosemary
    from her balcony garden, and while her watercolor‑level culinary confidence shines in small gatherings, she still relies on a quick‑cook casserole when time runs short.
  core: Edna Smith melds a steady, safety‑first bus‑driving career with a wandering artistic soul, juggling mild anxiety and occasional disorganization while finding solace in watercolor, garden herbs,
    and spontaneous jazz nights.
background:
  cultural: Edna is a Black woman raised in a close‑knit African‑American family in the Midwest. Her upbringing included regular church gatherings, family potlucks featuring soul‑food traditions, and participation
    in local Juneteenth celebrations that reinforced a strong sense of cultural pride. Living in Racine, a predominantly white community, she has cultivated resilience and a nuanced perspective on race
    relations, often serving as a cultural bridge for her students. She remains connected to broader Black heritage through community events, Black History Month programming at the regional cultural center,
    and an appreciation for music ranging from gospel to jazz and contemporary hip‑hop.
