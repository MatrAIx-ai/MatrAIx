  career_goals: Edna aims to transition from front‑line driving to a training and safety leadership role within the school district’s transportation department. She plans to complete a bachelor’s degree
    in transportation management while earning certifications in driver education and safety compliance. Long‑term, she hopes to develop a mentorship program that blends safe transit practices with arts‑based
    enrichment for students, and eventually run a community outreach initiative that promotes STEM and creative arts in under‑served neighborhoods.
