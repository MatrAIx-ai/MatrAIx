  hobbies: '[''Landscape painting'', ''Speculative fiction reading'', ''Acoustic guitar playing'', ''Nature photography'', ''Gardening'', ''Hiking'', ''Astronomy/stargazing'', ''Book club participation'',
    ''Model building'', ''Community theater volunteering'']'
  career_goals: Burt aims to become an instructional coach or curriculum coordinator for his district, focusing on expanding arts integration across subjects. He plans to earn a Master’s degree in Education
    with a specialization in arts‑infused pedagogy, and eventually author a guidebook on imaginative teaching practices. Additionally, he hopes to launch a community after‑school program that combines literature,
    visual arts, and digital media, fostering creative confidence among local youth.
