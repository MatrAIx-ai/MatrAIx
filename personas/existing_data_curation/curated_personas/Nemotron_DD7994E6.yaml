personas:
  professional: An imaginative middle‑school teacher, Burt Curtis blends English Language Arts with visual arts, designing interdisciplinary project‑based curricula that spark curiosity while maintaining
    the organized structure they need to keep their classroom running smoothly.
  sports: A community‑focused outdoor enthusiast, Burt Curtis hikes the state park trails with the Union Trail Club, follows the Carolina Panthers and South Carolina Gamecocks on game days, and occasionally
    joins a pickup basketball game at the local YMCA, though they rarely run unless it's a scenic sunrise jog.
  arts: A devoted creative hobbyist, Burt Curtis paints tranquil Upstate South Carolina landscapes inspired by Bob Ross and Georgia O'Keeffe, captures twilight skies with a Nikon D5600, strums acoustic
    folk tunes reminiscent of Neil Young, and volunteers backstage at the Union Community Theater, handling set design and lighting while they regularly attend performances by the local choir and the Charleston
    Symphony.
  travel: An intentional traveler, Burt Curtis prefers modest road trips to nearby gems like Savannah’s historic district, Asheville’s art scene, and the Blue Ridge Parkway, while dreaming of a once‑in‑a‑lifetime
    aurora‑watching expedition to Iceland, and they meticulously plan itineraries using Travelodge and budget‑friendly Airbnb stays, yet they often postpone longer vacations due to school commitments.
  culinary: A seasoned home‑cook with a penchant for Southern comfort, Burt Curtis frequently whips up shrimp and grits, collard greens, and peach cobbler using fresh vegetables from their garden, enjoys
    experimenting with smoked paprika in roasted sweet potatoes, but they have a habit of over‑salting their tomato salad and occasionally indulge in late‑night pizza delivery after grading papers.
  core: Burt Curtis is an imaginative, community‑rooted educator who balances disciplined planning with spontaneous creativity, channels Southern hospitality into nurturing young minds, and they quietly
    fight off occasional over‑indulgences in art splurges and late‑night snacks.
background:
  cultural: Burt grew up in a close‑knit family in Union County, South Carolina, where Southern hospitality and community ties are deeply valued. His upbringing involved frequent family gatherings centered
    around seasonal festivals, home‑cooked meals featuring traditional Southern dishes, and participation in church and local civic events. The region’s rich natural surroundings—rolling hills, pine forests,
    and historic textile towns—shaped his appreciation for landscape art and outdoor recreation. While rooted in these traditions, Burt’s curious nature drives him to explore novel ideas and global perspectives,
    blending respect for his local heritage with an openness to innovative, artistic expression.
attributes:
  skills: '[''Curriculum development'', ''Interdisciplinary project‑based learning'', ''Differentiated instruction'', ''Creative writing mentorship'', ''Visual arts integration'', ''Technology‑enhanced
