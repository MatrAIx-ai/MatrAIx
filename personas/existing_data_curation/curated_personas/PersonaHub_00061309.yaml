persona_description: A neuroscientist who specializes in the study of brain plasticity, particularly the ways in which the brain adapts and changes in response to experience. Their research focuses on the
  role of the visual cortex in language processing and the ability of blind individuals to process language in their unused visual cortex. They are interested in the potential for blind people to be better
  at difficult linguistic tasks and their active visual cortex making them ideal literary critics.
