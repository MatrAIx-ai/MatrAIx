    live music performances (jazz, folk)'', ''Exploring local history and historic sites'']'
  career_goals: William aims to translate his lifelong passion for helping people into a senior advisory role that shapes a more compassionate, culturally enriched workplace. Over the next five years he
    plans to design a comprehensive employee‑wellness program that integrates local art workshops, mindfulness activities, and community‑service projects to reduce stress and foster harmony. He also seeks
    to mentor junior HR staff, share his experiential knowledge, and earn a SHRM‑CP certification to formalize his expertise. Ultimately, he envisions transitioning to a part‑time consultancy serving small
    businesses in the Sedalia region, leveraging his unique blend of HR pragmatism and creative thinking.
