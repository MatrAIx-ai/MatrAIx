  hobbies: '["Basketball league", "Running club", "Cooking Chinese and New England cuisine", "Live music concerts", "Indie film screenings", "Hiking in New England", "Mahjong", "Celebrating Chinese New
    Year", "Volunteering at community food bank", "Tech meet‑ups on AI in retail"]'
  career_goals: Han Li aims to rise to senior leadership within the retail procurement arena, targeting the role of Head of Category Management for a major national retailer within the next five years.
    He plans to deepen his data‑analytics capabilities by mastering AI‑driven demand forecasting tools and obtaining the Certified Professional in Supply Management (CPSM) credential. Long‑term, he envisions
    launching a boutique consulting firm that helps U.S. retailers streamline sourcing from East Asian suppliers, emphasizing sustainability and ethical production. To support these ambitions, he intends
    to pursue an executive MBA part‑time, expand his professional network through industry conferences, and lead high‑visibility buying projects that showcase measurable cost savings and profit margin improvements.
