  career_goals: Even at six, Lorena often talks about growing up to be a teacher or a community librarian, where she can create safe, organized spaces for other children to learn and play. She is also fascinated
    by astronauts and imagines working at a space center, hoping to help people understand the world in a clear, structured way. Her ambition is driven by a desire to provide stability for others and to
    lead small‑group activities with confidence.
