personas:
  professional: Lorena Gadsden is a budding junior artist who channels their love for drawing animals into meticulously labeled sketchbooks, revealing a preference for structure, while spontaneous bursts
    of imagination spill onto blank pages during impromptu playground sessions.
  sports: Lorena Gadsden enjoys swinging at the neighborhood park and chasing butterflies, while cheering on the Washington Capitals and Washington Wizards on TV, and participates in the Brookside Little
    Kickers soccer team during the fall season, balancing a love of casual play with a budding interest in organized sport.
  arts: Lorena Gadsden delights in drawing animals inspired by the bold colors of Eric Carle’s books, sings along to the playful tunes of Sesame Street, and eagerly shares their creations at the after‑school
    art club, where they admire the whimsical animation of Hayao Miyazaki.
  travel: Lorena Gadsden loves family trips to the Smithsonian’s National Air and Space Museum and dreams of visiting the Kennedy Space Center, while also imagining a future adventure to the giraffe savannahs
    of Kenya and the glittering lights of Paris, preferring structured itineraries that include plenty of hands‑on museum tours and quiet reading corners.
  culinary: Lorena Gadsden prefers mild, familiar foods like creamy macaroni‑and‑cheese with cheddar, strawberry‑banana smoothies, and peanut‑butter‑and‑jelly sandwiches, often helping stir the batter and
    carefully arranging cut fruit into smiley faces, yet they occasionally demand extra cookies before dinner, a sweet habit that sometimes leads to a mild tummy rumble.
  core: Lorena Gadsden navigates the world with a meticulous love for drawing animals, a habit of sorting every allowance coin, a worry‑prone mind that frets over lost stickers, and a delightful tendency
    to burst into spontaneous butterfly chases during quiet library visits.
background:
  cultural: Lorena is an African American girl raised in Washington, DC, where she experiences a rich Black cultural heritage. Her family celebrates traditions such as Juneteenth, Kwanzaa, and Sunday church
    gatherings, sharing stories of the civil‑rights movement and community resilience. She enjoys soul‑food meals like collard greens and sweet potatoes, listens to gospel and jazz with her grandparents,
    and participates in community events at the local African American museum. This vibrant cultural environment, combined with her family's emphasis on education and community service, shapes her identity
    and worldview.
