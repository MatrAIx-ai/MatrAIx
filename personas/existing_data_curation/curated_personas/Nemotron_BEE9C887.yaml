    fiction and philosophy'', ''Mindfulness meditation and journaling'', ''Volunteering for youth art workshops'']'
  career_goals: Brian aims to become a department head within the next three years, first earning a master’s degree in Educational Leadership. He hopes to champion district‑wide arts integration, develop
    a mentorship program that pairs experienced teachers with new hires, and spearhead a school‑wide mental‑health initiative that teaches students stress‑management techniques. Long‑term, he envisions
    moving into a curriculum specialist role at the county level, authoring resources that embed creative arts across core subjects, and eventually publishing a guide on using art to foster critical thinking
    in adolescents. He also seeks recognition for his students’ achievements in state debate and art competitions.
