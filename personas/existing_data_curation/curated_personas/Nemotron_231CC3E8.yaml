personas:
  professional: Jose Estrada, a budding technophile, spends weekends building Arduino robots and crafting strategy in video games, channeling his curiosity into practical tinkering while dreaming of becoming
    a game developer or robotics engineer.
  sports: Jose Estrada enjoys informal soccer matches with three friends at the neighborhood park, favoring the tight teamwork of a small side, and roots for the local professional club Metro United while
    occasionally joining the school’s after‑school soccer club.
  arts: Jose Estrada creates digital comic strips featuring sci‑fi heroes and everyday teen life, draws inspiration from the storytelling styles of manga and the lyrical vibes of artists like Los Tigres
    del Norte, Shakira, and The Strokes, and spends evenings immersed in novels by Brandon Sanderson and Liu Cixin.
  travel: Jose Estrada loves weekend family hikes through nearby state parks, dreams of exploring the Grand Canyon’s cliffs, the historic streets of Quito, and attending a robotics convention in Tokyo,
    often planning trips around school breaks with friends and family.
  culinary: Jose Estrada, an emerging teen chef, can whip up quick tacos al pastor with store‑bought salsa, enjoys perfecting cheesy quesadillas, and balances indulgence with occasional pizza nights, while
    experimenting with sushi rolls after watching online tutorials.
  core: Jose Estrada is a curious, tech‑savvy teenager who conquers puzzle video games, assembles Arduino robots, and sketches sci‑fi comics, all while navigating a delightfully chaotic schedule that leaves
    school assignments scattered on the floor.
background:
  cultural: Jose is a first‑generation Mexican‑American living in Mesquite, Texas. He grew up in a bilingual household where Spanish is spoken at home and English at school, giving him fluency in both languages.
    His family observes Mexican traditions such as Día de los Muertos, celebrating with homemade altars and sharing pan de muerto, and they enjoy cooking family recipes like tacos al pastor and elote. At
    school, he participates in a multicultural club that highlights Hispanic heritage, reinforcing values like respeto (respect for elders) and solidaridad (community support). The blend of Mexican cultural
    values and the diverse Texan environment shapes his cooperative, harmony‑seeking personality, and his love for both new ideas and established customs.
