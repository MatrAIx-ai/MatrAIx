  career_goals: Jose aims to become a software engineer or game developer who designs interactive, educational apps that make learning fun for kids in his community. He hopes to attend a university with
    a strong computer science program, learn advanced programming and design, and eventually start his own tech startup that bridges cultural gaps with bilingual educational tools. He also envisions pursuing
    an engineering degree that equips him with practical problem‑solving skills, allowing him to contribute to community projects such as building low‑cost robotics kits for local schools.
