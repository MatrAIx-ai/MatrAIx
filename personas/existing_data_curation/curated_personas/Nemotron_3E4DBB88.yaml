personas:
  professional: Michael Jones, an aspiring junior engineer, channels their curiosity and practicality into building moving LEGO contraptions and inventing playground gadgets, and they reliably organize
    parts while staying flexible enough to iterate on designs.
  sports: Michael Jones, a keen member of the Brookfield Rangers youth soccer club, idolizes the city’s professional soccer team, the Metro FC, enjoys weekend games at the local park, and complements soccer
    with seasonal baseball with the Little Leaguers and frequent climbing sessions that keep them agile, while they also practice basic strength drills after practice.
  arts: Michael Jones delights in sketching cartoon heroes like Charlie Brown, inspired by Charles Schulz, and creates vibrant digital illustrations on a tablet, often drawing scenes from the animated series
    'Adventure Time' and experimenting with bright, electric colors such as neon green and electric blue, and they frequently share their artwork with friends online.
  travel: Michael Jones loves short family road trips to the nearby science museum, a weekend adventure at the coastal town of Seaside where they build sandcastles, and dreams of exploring the Grand Canyon
    and visiting the Smithsonian’s National Air and Space Museum, and they always plan routes with a colorful map pinned on their wall.
  culinary: Michael Jones prefers simple, hands‑on meals, regularly helping make cheese‑laden pepperoni pizza slices and spiced taco bowls with smashed avocado, enjoys snacking on crunchy carrot sticks
    and mango cubes, can whip up a quick banana‑pancake breakfast with just flour, eggs, and honey, and they often experiment by adding a dash of cinnamon for extra flavor.
  core: Michael Jones is a curious, organized eight‑year‑old who blends a love for building, exploring, and drawing, balances saving allowance with occasional splurges, actively manages mild allergies,
    and thrives on team sports and imaginative play.
background:
  cultural: Michael comes from a white family with Irish‑American roots; his parents often share stories of their ancestors’ immigration and celebrate holidays like St. Patrick’s Day with traditional foods
    and music. Growing up in East Elmhurst, Queens, he is exposed to a vibrant mix of cultures, hearing multiple languages on the streets and attending community events that showcase food from around the
    world. This multicultural environment enriches his worldview, encouraging openness while his family maintains certain customs such as Thanksgiving turkey dinner and occasional visits to a local Catholic
    church.
