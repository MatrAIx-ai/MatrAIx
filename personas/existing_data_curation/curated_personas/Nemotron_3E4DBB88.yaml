  career_goals: He dreams of becoming an astronaut or engineer who can design tools to help people, inspired by his love of space and building things. He also imagines helping animals as a veterinarian
    because he's compassionate toward pets. Michael sees himself studying science in high school, joining robotics clubs, and eventually working on projects that combine his curiosity about how things work
    with a practical aim to solve real‑world problems.
