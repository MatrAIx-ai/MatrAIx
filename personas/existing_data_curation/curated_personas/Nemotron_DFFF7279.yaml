  hobbies: '[''Hiking'', ''Salmon Fishing'', ''Skiing'', ''Trivia Nights'', ''Game Hosting'', ''Volunteering at Fur Rendezvous'', ''Acoustic Guitar'', ''Open‑mic Performances'', ''Anchorage Seawolves Hockey'',
    ''Cooking Seafood'']'
  career_goals: Seeking to advance to an office manager or operations supervisor position within a municipal or community organization in Anchorage, Eric aims to complete his bachelor's degree in Business
    Administration while earning a Certified Administrative Professional (CAP) credential. He aspires to lead a team, streamline office workflows, and develop programs that support local cultural events.
    In the longer term, he envisions taking on a senior managerial role that blends his practical skills with his talent for bringing people together.
