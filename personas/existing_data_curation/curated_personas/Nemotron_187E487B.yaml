personas:
  professional: Jayden Rolon works as a hands‑on groundskeeper in Riverside County, merging horticultural expertise, precise AutoCAD and SketchUp layouts, and a curiosity for Mexican mural aesthetics to
    deliver organized, water‑wise xeriscapes that meet client budgets and artistic aspirations, and they always double‑check each detail before final approval.
  sports: Jayden Rolon spends weekends trekking desert trails with the Riverside Desert Trekkers hiking club, follows the Los Angeles Dodgers and LA Galaxy for sport updates, and they join a local Sunday
    pickup soccer league to stay fit.
  arts: Jayden Rolon draws inspiration from Mexican muralists Diego Rivera and José Clemente Orozco, studies contemporary watercolors by Agnes Cecile, and they unwind by listening to indie folk artist Phoebe
    Bridgers while painting desert vistas in oil.
  travel: Jayden Rolon prefers self‑guided road trips that blend outdoor adventure and cultural immersion, having recently explored Joshua Tree National Park and Oaxaca’s historic markets, while they eye
    future journeys to Barcelona’s Park Güell and the Sonoran desert at sunrise.
  culinary: Jayden Rolon experiments with a modern spin on classic Mexican tamales, incorporating roasted nopal, chipotle‑marinated pork, and a drizzle of lime‑infused crema, while they master fresh guacamole
    with heirloom avocados, toasted pepitas, and a pinch of smoked sea salt for gatherings.
  core: Jayden Rolon channels a meticulous, competition‑driven work ethic into desert‑inspired design, balancing it with a relentless curiosity for art, while they habitually over‑plan projects and stash
    a secret collection of sketchbooks in the garage.
background:
  cultural: Jayden is a second-generation Mexican-American raised in Southern California. He grew up in a bilingual household where family gatherings, Día de los Muertos celebrations, and home-cooked Mexican
    cuisine reinforced his cultural identity. His grandparents' stories of migration and resilience shape his work ethic and community focus. He draws artistic inspiration from Mexican muralism, using bold
    colors and symbolic patterns in his landscape concepts, while honoring the native plants of the California desert that have long been part of Indigenous Chumash and Serrano stewardship. Fluent in English
    and conversational in Spanish, he bridges cultural perspectives in client consultations and often incorporates traditional Mexican garden elements, such as ornamental agave and terracotta tile accents,
    into his projects.
attributes:
  skills: '[''Landscape design'', ''Horticulture and plant identification'', ''Irrigation system design and maintenance'', ''Hardscaping (pavers, retaining walls, stone work)'', ''Equipment operation (walk-behind
    mowers, trimmers, power tools)'', ''Project planning and scheduling'', ''Budget management and cost estimating'', ''Client consultation and sales'', ''Sustainable/Waterwise landscaping'', ''SketchUp
    and AutoCAD drafting'', ''Native desert plant selection (California)'', ''Team leadership and training'']'
  hobbies: '[''Landscape photography'', ''Sketching and painting natural scenes'', ''Hiking desert trails and studying native flora'', ''Visiting art galleries and street murals'', ''DIY garden projects
    and plant propagation'', ''Playing strategy and building video games (e.g., Cities: Skylines)'', ''Cooking Mexican and fusion dishes'', ''Volunteer park clean-up events'', ''Reading design and architecture
    books'', ''Listening to eclectic music genres'']'
  career_goals: Jayden aims to transition from a skilled groundskeeper to a certified landscape architect and eventually launch his own sustainable-design firm focused on xeriscaping and culturally resonant
    public spaces in Riverside County. Over the next five years he plans to complete a bachelor's degree in Landscape Architecture, earn the Certified Professional Landscape Contractor (CPLC) credential,
    and build a portfolio of projects that integrate Mexican artistic motifs with California native planting. He aspires to win regional design competitions, become a go-to consultant for municipal green-space
    initiatives, and mentor younger workers from his community.
