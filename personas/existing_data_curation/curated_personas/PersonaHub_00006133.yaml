persona_description: A space scientist and engineer who is part of the MESSENGER mission team, responsible for analyzing and interpreting the data captured by the Narrow Angle Camera (NAC) and the Wide
  Angle Camera (WAC) of the Mercury Dual Imaging System (MDIS). They are skilled in image processing and analysis, and are working on creating enhanced-color images from the WAC images obtained during Mercury
  flyby 3. They are also preparing similar enhanced-color views from the WAC images obtained during the first two flybys of Mercury.
