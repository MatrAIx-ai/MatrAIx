personas:
  professional: Isabelle Teli, an aspiring teenage robotics engineer, merges their methodical planning and competitive spirit to dominate school science fairs, code intricate puzzles, and design autonomous
    drones, all while balancing their curiosity for sci-fi concepts with a practical approach to engineering challenges.
  sports: Isabelle Teli, a member of the middle-school soccer team and a dedicated swimmer at the community pool, channels their competitive drive into rigorous practice schedules, follows the Los Angeles
    Lakers for inspiration, and enjoys solo evening jogs to decompress from academic pressures.
  arts: Isabelle Teli, an avid sketch artist and piano player, draws detailed fan-art inspired by Brandon Sanderson’s worlds, practices classical pieces by Ludwig van Beethoven alongside contemporary piano
    covers of Yiruma’s River Flows in You, and participates in traditional dance performances during cultural celebrations, all while devouring the animated films of Hayao Miyazaki and the novels of J.K.
    Rowling for creative fuel, channeling their imagination into every stroke.
  travel: Isabelle Teli, who meticulously plans trips with spreadsheets, has explored the Smithsonian National Air and Space Museum and dreams of attending the Tokyo International Anime Fair, strolling
    through New York’s Broadway district, and hiking the Grand Canyon, but they balance these ambitions with parental budget limits and school schedule constraints.
  culinary: Isabelle Teli, a confident home cook, loves preparing spiced lentil dal, buttery chicken tikka, and creamy mango lassi with fresh cilantro and turmeric, experiments with homemade sushi rolls
    and margherita pizza on weekends, yet they occasionally over-cook rice when distracted by a new coding puzzle.
  core: Isabelle Teli is a fiercely curious, ultra-organized teen who, despite intense anxiety, channels their energy into meticulous robotics projects and artistic sketches, even if it means burning a
    few slices of toast along the way.
background:
  cultural: Isabelle comes from a South Asian family that blends cultural traditions with life in the United States. At home, she celebrates holidays such as Diwali and other regional festivals with customary
    foods, music, and dance, and sometimes converses in a heritage language (e.g., Hindi, Urdu, or Bengali) with relatives. Her upbringing stresses respect for education, close family connections, and community
    involvement, shaping her values and aspirations. Living in Sterling, Virginia, she also engages with a diverse, multicultural community, broadening her worldview while maintaining strong ties to her
    cultural roots.
