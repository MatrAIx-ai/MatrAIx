  career_goals: Although still in middle school, Isabelle aims to pursue a STEM‑focused career, ideally in computer science or engineering. She envisions attending a top university for a degree in Computer
    Engineering or Biomedical Engineering, where she can combine her curiosity with practical problem‑solving. Long‑term, she hopes to develop technology that improves everyday life and to champion mental‑health
    awareness among her peers, using her own experiences to guide supportive initiatives.
