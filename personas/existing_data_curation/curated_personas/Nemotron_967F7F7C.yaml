personas:
  professional: Alberto Zelada, a budding aerospace hobbyist, combines a methodical, planner‑like mindset with a passion for model rockets and intricate LEGO constructions, documenting each build in meticulous
    notebooks that showcase their organized, reliability‑driven approach to engineering concepts, and they consistently apply this precision to every experiment.
  sports: Alberto Zelada stays active by trekking the Sierra Nevada foothills with the Sierra Explorers Hiking Club, cheering on the Sacramento Kings during basketball season, and occasionally joining a
    middle‑school cross‑country team that blends endurance training with their love for nature, and they relish the quiet satisfaction of a sunrise run.
  arts: Alberto Zelada nurtures their creative side by practicing acoustic guitar with a repertoire that includes John Mayer’s “Stop This Train” and Andy McKee’s fingerstyle pieces, sketching Sierra vistas
    inspired by Claude Monet’s impressionist landscapes, and binge‑watching classic Star Trek episodes for sci‑fi storytelling inspiration, and they often write short verses about space in the margins of
    their sketchbooks.
  travel: Alberto Zelada plans trips with the same precision he uses for his rockets, favoring adventure‑filled weekend hikes in Yosemite National Park and dreaming of a family vacation to the Kennedy Space
    Center in Florida to see the launch pads up close, all while budgeting his allowance to cover travel costs, and they keep a travel journal to record each trail’s highlights.
  culinary: Alberto Zelada enjoys grabbing a slice of pepperoni pizza after a LEGO marathon, relishes homemade spaghetti carbonara with pancetta and pecorino, and often experiments with a simple grilled
    cheese sandwich using sharp cheddar and sourdough bread, though their cooking skill tops out at mastering the perfect scrambled egg, and they sometimes burn the toast when distracted by a new rocket
    design.
  core: Alberto Zelada, the methodical teen who sketches mountain horizons between rocket launches, turns every allowance dollar into a carefully plotted LEGO purchase, and never misses a chance to strum
    a quiet guitar riff, embodies a blend of curiosity, disciplined planning, and a touch of organized day‑dreaming, and they often get lost in thought while counting the steps of a new model.
background:
  cultural: Alberto comes from a Mexican‑American family that maintains strong cultural ties. At home, Spanish is spoken alongside English, and he helps his parents prepare traditional dishes such as tacos
    al pastor and tamales during holidays. He participates in community celebrations for Día de los Muertos and Mexican Independence Day, where he learns about his heritage through music, storytelling,
    and crafts. Living in Reno, he blends these traditions with the local desert culture, enjoying the outdoor lifestyle and regional festivals. His family emphasizes values of respect, hard work, and community
    support, which shape his cooperative and considerate nature.
attributes:
  skills: '[''Mathematics (algebra and geometry)'', ''Basic Python programming'', ''Robotics kit assembly and programming (Lego Mindstorms)'', ''Bilingual communication (English/Spanish)'', ''Organizational
    planning and time management'']'
  hobbies: '[''LEGO building and robotics'', ''Model rocketry'', ''Reading sci‑fi and science non‑fiction'', ''Acoustic guitar practice'', ''Hiking and sketching nature'', ''Tabletop strategy games (e.g.,
    Settlers of Catan)'']'
  career_goals: He aspires to pursue a career in engineering, preferably in robotics or civil engineering, where he can combine his love for problem‑solving with tangible contributions to his community.
    In the short term, he aims to earn a spot in a competitive STEM high‑school program, obtain certifications in coding (such as Scratch or Python), and take on leadership roles in his robotics club. Long‑term,
    he envisions studying engineering at a university and eventually designing environmentally‑friendly infrastructure or autonomous systems that improve everyday life.
