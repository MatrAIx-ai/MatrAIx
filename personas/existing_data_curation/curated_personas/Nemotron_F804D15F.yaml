personas:
  professional: Joshua Schmitt, a 17‑year‑old aspiring concept artist, blends self‑taught digital illustration skills with a knack for organizing youth art events, approaching each project with a balance
    of meticulous planning and spontaneous creativity.
  sports: Joshua Schmitt, an avid hiker of the Columbia River Gorge, spends weekends on trail runs and occasional rock‑climbing sessions, while cheering on the Portland Timbers in the MLS and the Seattle
    Seahawks during football season, maintaining a relaxed fitness routine that favors outdoor exploration over structured gym workouts.
  arts: Joshua Schmitt, a sketch‑loving teen who spends evenings listening to Bon Iver and Fleet Foxes while experimenting with Procreate, draws inspiration from concept artists such as Feng Zhu and the
    atmospheric illustrations of Hayao Miyazaki, and regularly visits local galleries to absorb contemporary art, all of which fuel his own narrative‑driven visual storytelling.
  travel: Joshua Schmitt, who prefers low‑budget backpacking trips that blend city art tours in Portland, Seattle, and San Francisco with day hikes in nearby national parks, plans itineraries using free
    online maps and occasionally saves on accommodation by couch‑surfing with friends' families, balancing his wanderlust with the need to keep a part‑time job.
  culinary: Joshua Schmitt, a self‑taught kitchen experimenter, enjoys crafting simple dishes like avocado toast with smoked salmon, homemade ramen bowls, and spiced vegetarian tacos, favoring fresh, locally
    sourced ingredients such as heirloom tomatoes and cilantro, while often ordering indie‑café sandwiches and coffee for a quick creative boost.
  core: Joshua Schmitt, a 17‑year‑old art‑obsessed dreamer who balances meticulous event planning with spontaneous midnight sketch sessions, thrives on indie folk playlists, yet repeatedly forgets to charge
    their phone before school, revealing a quirky blend of discipline and absent‑mindedness.
background:
  cultural: Joshua was raised in Vancouver, Washington, a suburban community in the Pacific Northwest that shares close cultural ties with the vibrant arts scene of nearby Portland. His family, of predominantly
    Anglo-American heritage, values education, artistic expression, and outdoor recreation. The region’s emphasis on environmental stewardship, independent music, and grassroots arts collectives has shaped
    his appreciation for nature, indie culture, and community collaboration. Seasonal traditions such as Thanksgiving gatherings, holiday light displays, and summer barbecues are part of his family life,
    while local events like the Vancouver Farmers Market and Portland Art Walks regularly expose him to diverse creative influences.
