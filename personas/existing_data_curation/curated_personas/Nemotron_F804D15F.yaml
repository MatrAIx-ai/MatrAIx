  career_goals: Joshua plans to obtain his GED within the next year and then enroll in a community-college program focused on graphic design or visual arts. He aspires to become a professional concept artist
    or multimedia designer, creating visual assets for video games, film, or interactive media. He also hopes to blend his artistic skills with community outreach by eventually establishing a youth-focused
    art studio that offers workshops, mentorship, and collaborative projects. Long-term, he envisions traveling to cultural hubs like Portland, Seattle, and San Francisco to study contemporary art and contribute
    to sustainable design initiatives.
