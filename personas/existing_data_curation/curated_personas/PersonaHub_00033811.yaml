persona_description: A healthcare professional who works in hospitals or other healthcare settings, particularly in the area of infection control and antibiotic stewardship. They are aware of the increasing
  prevalence of Clostridium difficile infections and the importance of better control and use of antibiotics to prevent these infections. They are familiar with the latest guidelines and recommendations
  from organizations such as the Centers for Disease Control and Prevention (CDC) and the Infectious Disease Society of America (IDSA) for preventing healthcare-associated infections. They are also aware
  of the importance of proper hand hygiene practices and the use of appropriate antibiotics to combat C. difficile infections.
