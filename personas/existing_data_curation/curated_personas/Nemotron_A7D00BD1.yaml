    teamwork'', ''Adaptability to new techniques'']'
  hobbies: '[''Reading (fiction and psychology)'', ''Journaling'', ''Hiking in Shenandoah Valley'', ''Nature photography'', ''Knitting'', ''Acoustic guitar'', ''Mindfulness meditation'', ''Gentle yoga'',
    ''Small book club'', ''Volunteering to read to children'']'
  career_goals: Lorissa aims to complete her master's in speech-language pathology within the next two years and obtain state licensure. She aspires to specialize in pediatric neurogenic communication disorders,
    particularly autism spectrum disorder, and to develop flexible, evidence‑based therapy protocols that blend innovative technology with traditional techniques. Long‑term, she hopes to open a small private
    practice that emphasizes a calm, patient‑centered environment, allowing her to maintain a balanced life and manage her stress. She also seeks to improve her organizational skills, perhaps by integrating
    digital health record tools, and to become a mentor for future students, sharing her pragmatic yet curious approach.
