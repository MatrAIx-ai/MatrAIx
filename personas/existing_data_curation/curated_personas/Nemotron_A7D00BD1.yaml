personas:
  professional: Lorissa Seal is a budding speech-language pathologist who conducts detailed articulation, language, and fluency assessments for children and adults, skillfully integrates telepractice and
    AAC technology into evidence-based therapy plans, and leverages their natural curiosity to stay current on innovations while often letting organization slip due to a relaxed attitude toward record-keeping.
  sports: Lorissa Seal enjoys seasonal hikes along the Shenandoah Trail with the local Shenandoah Hiking Society, pairs that with weekly gentle yoga sessions, follows the Washington Commanders and the Washington
    Capitals for a touch of city spirit, but prefers solitary outdoor movement over organized team sports.
  arts: Lorissa Seal channels creative energy into photographing river and forest scenes inspired by Ansel Adams, knits scarves while listening to indie folk legends like Iron & Wine and Sufjan Stevens,
    and nurtures a love for contemporary fiction by devouring novels from Sally Rooney and Celeste Ng, often sharing favorite passages during their local library book club.
  travel: Lorissa Seal favors low-key nature getaways, planning spontaneous day hikes in the Blue Ridge Parkway and weekend trips to Asheville, while dreaming of a tranquil Icelandic fjord adventure in
    the summer, yet budget constraints and a preference for quiet over crowds keep most vacations within the Mid-Atlantic region.
  culinary: Lorissa Seal prefers simple, wholesome meals, often whipping up quinoa bowls with roasted beet, kale and feta, brewing mint-chamomile tea while knitting, and treating themselves to avocado toast
    topped with smoked salmon and capers when dining out at cozy farm-to-table cafés.
  core: Lorissa Seal is a gentle, curiosity-driven speech-pathology student who balances solitary creative pursuits with a habit of letting details slip, all while quietly wrestling with anxiety and a relaxed
    approach to organization.
background:
  cultural: Born and raised in Fredericksburg, Virginia, Lorissa comes from a middle‑class white family with deep roots in the Mid‑Atlantic region. Her upbringing was shaped by the town’s historic colonial
    and Civil War heritage, community festivals, and a strong sense of Southern hospitality. She attended local public schools and was involved in a Protestant church’s youth group, where she learned the
    value of community service. The proximity to the Rappahannock River and the Blue Ridge Mountains fostered her love for outdoor activities and an appreciation for the natural landscape of the area. While
    her ethnic background reflects a blend of English and German ancestry typical of many Virginian families, Lorissa is conscious of broader cultural dynamics and strives to approach each individual with
    empathy and respect.
