  career_goals: Virendra aims to grow his boutique into a regional hub for sustainable floral design by opening a combined retail and greenhouse space that showcases native Kansas flora. He plans to develop
    an online curriculum and author a guide on integrating traditional Midwestern plants with contemporary design, positioning himself as a mentor to emerging florists in the area. Additionally, he seeks
    certification as a Master Floral Designer and hopes to establish an annual Burlington Flower Festival that highlights local growers and supports community arts.
