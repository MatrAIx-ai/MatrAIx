personas:
  professional: An experienced education administrator, Marilyn Johnson leverages fifteen years of expertise in program design, curriculum alignment, and budget oversight—combined with methodical organization
    and compassionate assertiveness—to drive data‑driven improvements in early childhood and K‑12 settings while mentoring emerging leaders.
  sports: Marilyn Johnson stays active by hiking the Rocky Mountain trails, participating in a local women’s running club that trains for the Colorado Marathon, cheering on the Denver Broncos in fall football,
    and attending Colorado Avalanche games for a winter ice‑hockey fix.
  arts: Marilyn Johnson nurtures her creative side through community theater roles, regularly reading historical fiction by Philippa Gregory, and enjoying the folk melodies of John Denver alongside classic
    films starring Meryl Streep, which together inform her storytelling sessions at the library.
  travel: Marilyn Johnson prefers thoughtfully planned road trips that blend hiking adventures in places like Zion National Park with cultural stops in Santa Fe, while dreaming of an extended trek through
    Patagonia’s Torres del Paine after retiring from her administrative duties.
  culinary: Marilyn Johnson, a confident home cook, delights in preparing wholesome meals such as quinoa‑kale salads with roasted Colorado carrots, pan‑seared trout seasoned with sage and rosemary, and
    herbal teas brewed from locally foraged mint and chamomile, while occasionally treating herself to a fine‑dining tasting menu for special occasions.
  core: Marilyn Johnson balances a rigorous, data‑driven professional life with a love of outdoor hikes, yet often jokes that her habit of over‑organizing grocery lists can turn a simple trip to the market
    into a spreadsheet exercise.
background:
  cultural: Marilyn was raised in a small Midwestern town in Kansas, growing up in an Anglo‑American, Protestant‑influenced family that emphasized community service, self‑reliance, and modesty. Relocating
    to Brighton, Colorado, she has adopted the region’s outdoor‑oriented lifestyle and values the agricultural heritage of Adams County. She celebrates traditional American holidays while also participating
    in Colorado‑specific events such as the local county fair, the Boulder 10K, and community festivals that highlight the growing cultural diversity of her school district. Her background blends Midwestern
    roots with a strong appreciation for the Rocky Mountain environment and the inclusive spirit of her Colorado community.
attributes:
  skills: '[''Program design'', ''Staff recruitment and supervision'', ''Curriculum alignment'', ''Budget development'', ''Regulatory compliance'', ''Grant writing'', ''Data‑driven decision making'', ''Strategic
