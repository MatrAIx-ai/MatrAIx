persona_description: A team of researchers at BioServe, a company specializing in space biology and microbiology, working on the Deep Space Radiation Genomics (DSRG) experiment. The team aims to study the
  effects of space radiation on yeast cells, which are a model organism for studying human DNA repair mechanisms. The experiment will involve growing identical cultures of yeast on the International Space
  Station and on the ground in Boulder, Colorado, and analyzing their response to space radiation. The team's expertise includes microbiology, space biology, and genomics.
