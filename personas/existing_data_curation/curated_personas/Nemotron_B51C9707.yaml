  hobbies: '["Cooking Traditional Mexican Dishes", "Hosting Community Potlucks", "Reading Mexican & Latin American Literature", "Salsa & Folklórico Dancing", "Gardening (Vegetables & Herbs)", "Volunteering
    as After-School Tutor", "Playing Piano (Church Choir)", "Participating in Trivia Competitions", "Attending Cultural Festivals", "Leading Book Club Discussions"]'
  career_goals: Maria aims to transition into a district-wide instructional coach role where she can lead the expansion of bilingual programs and design professional-development workshops for teachers.
    She intends to secure larger grants to fund community literacy initiatives and mentor new educators through a structured induction program. Over the next five years, she hopes to author a resource guide
    on culturally responsive teaching for Texas schools and serve on the local school board to advocate for policies that support early childhood education and mental health resources for students and staff.
