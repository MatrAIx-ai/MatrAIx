personas:
  professional: Maria Toledosantiago, a veteran elementary and middle‑school teacher with a razor‑sharp command of bilingual curriculum design and TEKS alignment, blends curiosity‑driven lesson innovation
    with methodical data‑driven assessment, while leveraging their competitive edge; they mentor peers and champion district‑wide bilingual program expansion as an aspiring instructional coach.
  sports: Maria Toledosantiago, an enthusiastic participant in community salsa and folklórico lessons, supports the local soccer club FC Dallas, joins the senior center’s weekly walking group that circles
    the neighborhood park, and they channel their competitive spirit into friendly fitness challenges during seasonal club tournaments.
  arts: Maria Toledosantiago, an avid reader of Latin American literature, frequently debates works by Gabriel García Márquez and Isabel Allende at their book club, transports the melodies of Celía Cruz
    to the church choir on piano, and they attend regional folk dance festivals to immerse themselves in traditional performance art.
  travel: Maria Toledosantiago, a meticulous planner, prefers organized cultural tours to Oaxaca’s Guelaguetza festival and a road‑trip along Route 66 to Santa Fe, yet also cherishes spontaneous weekend
    visits to nearby historic missions, balancing their love of discovery with budget‑conscious travel choices, and they often keep a handwritten travel journal to track each adventure.
  culinary: Maria Toledosantiago, a seasoned cook, prepares homemade enchiladas, tamales, and pozole using garden‑fresh chilies, tomatoes, and corn, delights neighbors with their signature mole sauce, and
    they occasionally over‑spice dishes in their quest to out‑do their own potluck standards.
  core: Maria Toledosantiago blends methodical organization, vibrant sociability, and a competitive drive to champion bilingual education while they juggle worry‑laden financial caution and a love for dance,
    food, and literary debate.
background:
  cultural: Maria was raised in a bilingual Mexican household in Houston, where Spanish was spoken daily and Mexican traditions were celebrated with fervor. She observes Día de los Muertos, celebrates quinceañera
    milestones, and participates in Catholic observances. Her family places high value on communal meals, music like mariachi and ranchera, and close ties with extended relatives. These cultural roots inform
    her teaching philosophy, emphasizing respect for heritage, the importance of family engagement, and the inclusion of culturally relevant content in the classroom.
attributes:
  skills: '["Curriculum Development", "Classroom Management", "Bilingual Education (Spanish-English)", "Differentiated Instruction", "Data-Driven Assessment", "Community Outreach", "Parent-Teacher Communication",
