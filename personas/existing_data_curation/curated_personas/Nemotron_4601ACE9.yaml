  career_goals: Even at three, Justin expresses a desire to work with things that stay orderly and help others. He talks about becoming a builder who constructs tall towers and makes sure everything is
    in its right place, and he often imagines himself as a firefighter who rescues people and restores order after a fire. His short‑term ambition is to learn to read simple books so he can follow instructions
    on his own and to master writing his name, paving the way for future roles that require precision and reliability.
