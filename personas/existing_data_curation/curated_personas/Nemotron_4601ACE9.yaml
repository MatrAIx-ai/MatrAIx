personas:
  professional: Justin Trautman, a three‑year‑old budding mini‑engineer who meticulously builds block towers and schedules snack breaks, demonstrates early organizational talent and a craving for structure
    that foreshadows a future in project management.
  sports: Justin Trautman, a three‑year‑old who sprint‑runs around the backyard for his daily five‑minute training session, proudly wears his Little Lions soccer jersey for the neighborhood kids’ league,
    and tracks the season schedule of the nearby River City Runners baseball team, reflecting a competitive yet organized fitness mindset.
  arts: Justin Trautman, a three‑year‑old who fills sketchbooks with crayon dinosaurs, sings along to Baby Shark by Pinkfong and Let It Go by Idina Menzel, and stages imaginative puppet shows starring his
    favorite characters, letting these artistic influences shape his playtime.
  travel: Justin Trautman, a three‑year‑old who enjoys short family road trips to the local beach and the nearby amusement park, prefers predictable itineraries, yet dreams of visiting Disneyland someday,
    balancing his love for routine with occasional excitement.
  culinary: Justin Trautman, a three‑year‑old who favors chicken nuggets, macaroni‑and‑cheese, and strawberry‑banana smoothies, loves stirring batter with his tiny wooden spoon, but stubbornly refuses broccoli,
    showcasing a selective palate and budding kitchen curiosity.
  core: Justin Trautman is a three‑year‑old whose love for tidy toy rows, relentless counting of snack pieces, and desire to win every hide‑and‑seek game combine into a meticulously structured yet endearingly
    competitive toddler.
background:
  cultural: Justin grew up in Kew Gardens, Queens, a neighborhood that blends suburban calm with New York City’s diversity. His family, identified as white and middle‑class, celebrates mainstream American
    traditions such as Thanksgiving, Christmas, and birthdays with structured meals and festive rituals. Living in Queens exposes him to a mosaic of cultures, so he often hears languages like Spanish, Mandarin,
    and Bengali in his community, which fuels his curiosity about ordering and categorizing the world around him.
