  career_goals: Kennedy aims to advance within the federal service by moving into a senior analyst or program manager role, where she can influence eligibility policy design and improve service delivery
    outcomes. She plans to pursue a Master’s degree in Public Policy or Social Work to deepen her expertise in program evaluation and social equity. Over the next five years, she envisions leading a team
    of interviewers, developing training modules, and contributing to policy revisions that enhance access to government assistance while maintaining rigorous standards.
