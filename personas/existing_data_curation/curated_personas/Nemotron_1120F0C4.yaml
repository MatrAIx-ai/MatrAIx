  hobbies: '[''Reading sci‑fi and graphic novels'', ''Digital sketching and illustration'', ''Competitive video gaming (Fortnite, Rocket League)'', ''Listening to R&B and hip‑hop music'', ''Writing rap
    lyrics and journaling'', ''Participating in community center art workshops'']'
  career_goals: Brenda aims to finish high school and then pursue a degree in digital media or graphic design, with a long‑term goal of becoming a freelance content creator who can blend storytelling with
    visual design. She is drawn to UI/UX and game development because they let her apply both creative ideas and practical solutions. While she values independence and competition, she also hopes to use
    her skills to spotlight Black youth experiences and community issues, building a portfolio in high school, joining a coding club, and seeking part‑time junior design work or internships to gain real‑world
    experience.
