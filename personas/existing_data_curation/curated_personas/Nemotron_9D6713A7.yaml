personas:
  professional: Amy Hendrix, a 17‑year‑old senior, combines disciplined military‑base upbringing with a passion for visual storytelling, leveraging Photoshop, Canva, and video editing to lead school media
    projects while honing debate‑driven critical thinking for a future in public‑affairs communications or creative direction.
  sports: Amy Hendrix hits the basketball court after school, cheering for the Charlotte Hornets and playing on the Camp Lejeune Rec League team, while hitting coastal trail hikes on weekends and occasionally
    joining the local yoga club for flexibility.
  arts: Amy Hendrix immerses themselves in painting, sketching, and short‑film production, draws inspiration from street artist Banksy, admires the cinematography of Edgar Wright, and frequently attends
    community theater showcases starring local talent like Maya Ramirez.
  travel: Amy Hendrix plans trips with a blend of meticulous checklists from their family’s military travel tradition and spur‑of‑the‑moment road trips, having explored Washington, D.C., visited a Marine
    base in Germany, and dreaming of a solo pilgrimage to Kyoto for its anime culture.
  culinary: Amy Hendrix enjoys grilled shrimp po’boys, taco bowls with chipotle aioli, and occasionally experiments with sumac‑spiced quinoa, boasting a decent knack for whipping up quick pasta dishes but
    often neglects proper kitchen cleanup after midnight snack sessions.
  core: Amy Hendrix is a curiosity‑driven, disciplined teen who juggles artistic projects, debate victories, and late‑night snack binges, constantly battling a tendency to overcommit and a habit of scrolling
    social media until sunrise.
background:
  cultural: Amy is a White American raised in a Marine Corps family on Camp Lejeune, North Carolina. The military environment instills a sense of discipline, patriotism, and exposure to a diverse population
    of service members and their families. This background fosters her appreciation for varied experiences, an openness to unconventional ideas, and a strong community orientation, while also influencing
    her competitive spirit and drive for personal achievement.
attributes:
