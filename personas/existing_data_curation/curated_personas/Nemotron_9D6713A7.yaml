  hobbies: '[''painting'', ''sketching'', ''photography'', ''short film creation'', ''community theater'', ''basketball'', ''hiking'', ''discovering new music'', ''reading sci‑fi novels'', ''debate club'',
    ''volunteering at base events'']'
  career_goals: Amy aims to attend a college with a strong digital media or communications program, where she can earn a degree in graphic design, multimedia journalism, or marketing. She aspires to become
    a creative director or content strategist, building a personal brand that blends visual storytelling with social impact. She also entertains the idea of serving in the military as a public affairs specialist,
    leveraging her communication skills and appreciation for service, while remaining open to entrepreneurial opportunities in the creative industry.
