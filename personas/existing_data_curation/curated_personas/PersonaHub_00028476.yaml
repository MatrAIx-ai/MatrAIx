persona_description: A legal scholar who specializes in constitutional law, particularly the interpretation of the Australian Constitution. This individual is highly knowledgeable about the principles of
  international law and human rights, and how they relate to the interpretation of the Constitution. They are also skilled in critical analysis and have a keen interest in the role of judges in society.
  They are likely to be familiar with the interpretive principle and its limitations, and have a deep understanding of the importance of human dignity and the role of the judge in upholding moral values.
