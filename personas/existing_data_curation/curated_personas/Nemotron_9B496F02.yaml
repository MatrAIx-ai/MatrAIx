personas:
  professional: Maria Garcia is a veteran construction specialist with 15+ years of hands‑on experience, adept at reading blueprints, operating heavy equipment, and managing crew safety, who leverages a
    meticulous, structure‑driven mindset to keep projects on schedule while quietly eyeing the foreperson role and preparing for OSHA‑30 and NCCER credentials.
  sports: Maria Garcia is an avid solo hiker who tackles the foothills each weekend, follows the regional soccer club Valley United with fervor, and roots for the River City Raptors minor‑league baseball
    team, while occasionally joining a community walking club that meets after Sunday church services.
  arts: Maria Garcia immerses herself in the rhythmic beats of cumbia legends like Los Sonidos del Corazón, the storytelling folk tunes of artists such as Joan Baez, and the twists of mystery novels by
    authors like Tana French, finding quiet inspiration for her woodworking projects in the lyrical narratives they enjoy.
  travel: Maria Garcia prefers low‑key road trips that blend hiking in national parks with visits to historic small towns, having explored the winding streets of Santa Fe and the red‑rock trails of Sedona,
    while dreaming of trekking to Machu Picchu and strolling the coastal villages of Cinque Terre, all planned around a tight family budget and school schedules.
  culinary: Maria Garcia delights in crafting traditional home‑cooked dishes such as pupusas filled with cheese and pork, and tamales seasoned with annatto and wrapped in corn husks, often incorporating
    fresh tomatoes, chilies, and herbs from her modest garden while maintaining an intermediate skill level that balances confident hand‑pressing techniques with occasional over‑filling mishaps.
  core: Maria Garcia is a pragmatic, detail‑oriented construction pro who channels her love for hands‑on projects into precise home improvements, disciplined budgeting, and solitary hikes, all while juggling
    a competitive edge and a penchant for quirky tool‑collecting.
background:
  cultural: Maria was raised in a Salvadoran immigrant household in the Central Valley, growing up bilingual with Spanish spoken at home and English learned at school. Her family emphasizes close‑knit relationships,
    collective responsibility, and a strong work ethic rooted in their heritage. She celebrates Salvadoran traditions such as Día de la Independencia on September 15 and observes Catholic holidays with
    family gatherings, music, and traditional foods. Maria preserves her cultural identity through cooking, storytelling, and occasional participation in local Salvadoran community events in nearby Fresno.
    Her Catholic upbringing informs her values of humility, perseverance, and community service, which she expresses by volunteering at her church's food pantry.
attributes:
  skills: '["Concrete finishing", "Formwork construction", "Blueprint reading", "Heavy equipment operation (forklift, backhoe)", "OSHA safety compliance", "Material inventory management", "Basic carpentry",
    "Electrical wiring basics", "Plumbing repairs", "Problem solving on site", "Team coordination", "Time management"]'
  hobbies: '["DIY home improvement projects", "Vegetable gardening", "Cooking Salvadoran cuisine (pupusas, tamales)", "Reading mystery novels", "Listening to cumbia and folk music", "Solo hiking in foothills",
    "Community church gatherings", "Woodworking", "Tool‑sharing group participation", "Crossword puzzles"]'
  career_goals: Maria aims to transition from laborer to foreperson or site supervisor within the next three to five years. To achieve this, she plans to earn an OSHA 30‑hour certification, obtain NCCER
    credentials, and complete a short construction‑management certification to bolster her associate's degree. Long‑term, she envisions launching her own small residential‑remodeling subcontracting business,
    where she can mentor younger workers, maintain a structured work environment, and provide a stable income for her family while preserving work‑life balance.
