personas:
  professional: Bettie Wiseman, an experienced CAD drafter in Central California, leverages mastery of AutoCAD, Revit, and SolidWorks to produce meticulously detailed architectural and mechanical drawings,
    systematically coordinates with engineers, contractors, and project managers, and pursues a BIM manager role while they are planning to earn Autodesk Certified Professional credentials.
  sports: Bettie Wiseman, an avid hiker and occasional paddle‑boarder, joins the Coastal Trail Explorers for weekend treks, tracks fitness during sunrise beach walks, follows the Los Angeles Dodgers and
    Golden State Warriors, and they prefer low‑impact cardio over high‑intensity gym workouts.
  arts: Bettie Wiseman, a dedicated photographer of sunrise seascapes and mystery‑novel enthusiast, draws creative inspiration from Ansel Adams’ black‑and‑white landscapes and the folk sounds of Fleet Foxes
    and Sufjan Stevens, and they often display their own beach photographs in a home gallery.
  travel: Bettie Wiseman, who favors meticulously planned coastal getaways that blend relaxation with subtle adventure, frequently retreats to Big Sur and Napa Valley, while dreaming of a summer road trip
    along the Pacific Coast Highway to explore Iceland’s rugged cliffs and Kyoto’s cherry‑blossom avenues, and they often map out detailed itineraries to ensure every stop aligns with their love of nature
    and culture.
  culinary: Bettie Wiseman, a competent home cook who thrives on farm‑to‑table meals, regularly prepares dishes such as grilled salmon with lemon‑thyme quinoa, roasted heirloom tomatoes with fresh basil,
    and zucchini noodles tossed in homemade pesto featuring garden‑grown basil and pine nuts, and they love to experiment with herb‑infused sauces.
  core: Bettie Wiseman, a detail‑obsessed CAD specialist who balances sunrise beach walks with an over‑organized digital filing system and a habit of sipping three coffees before noon, embodies a blend
    of structure and laid‑back coastal charm, and they often find themselves humming a favorite melody while reviewing drafts.
background:
  cultural: Bettie is a white American who grew up in a middle‑class family in Southern California and now resides in Grover Beach, a small coastal community in San Luis Obispo County. The region’s blend
    of beach culture, agricultural heritage, and a strong emphasis on environmental stewardship has shaped her appreciation for outdoor recreation, sustainable living, and community involvement. While her
    upbringing emphasized self‑reliance and practical responsibility, the local emphasis on cooperation and neighborly support aligns with her considerate and harmonious nature. These cultural influences
    are reflected in her work ethic, her volunteerism, and her preference for activities that balance structure with the relaxed pace of coastal life.
