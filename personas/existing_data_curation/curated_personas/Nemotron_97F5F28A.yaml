  hobbies: '[''Beach Walks'', ''Gardening'', ''Photography'', ''Reading Mystery Novels'', ''Cooking'', ''Wine Tasting'', ''Hiking'', ''Paddle‑boarding'', ''Jigsaw Puzzles'', ''Community Volunteering'']'
  career_goals: Bettie aims to progress from senior drafter to CAD manager within the next five years, deepening her expertise in Building Information Modeling (BIM) and obtaining an Autodesk Certified
    Professional credential. She plans to pursue an associate’s degree in architectural technology to broaden her technical foundation and eventually take on project‑lead responsibilities that blend drafting
    with coordination of multidisciplinary teams. Her long‑term ambition is to mentor junior drafters and contribute to sustainable design projects that reflect the coastal environment of Central California.
