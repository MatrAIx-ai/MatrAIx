    ''Yoga'', ''Bridge'', ''Trivia Night'']'
  career_goals: Olivia aims to transition into a mentorship-focused role, guiding emerging arts administrators and project managers in Colorado Springs. She plans to launch a community-driven arts incubator
    that provides seed funding, training, and collaborative space for local artists and cultural entrepreneurs. Additionally, she seeks to contribute her expertise to municipal cultural policy, advocating
    for increased support for public art and arts education. In the longer term, Olivia hopes to author a collection of essays reflecting on the evolution of arts project management over the past five decades,
    cementing her legacy as a bridge between tradition and innovation.
