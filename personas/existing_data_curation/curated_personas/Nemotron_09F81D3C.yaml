  career_goals: Alethea often imagines a future where she can combine her love of art, curiosity, and quiet, focused work. She dreams of becoming an artist who paints stories about nature, a wildlife illustrator
    who studies animals, or a scientist who explores the natural world and shares discoveries through picture books. She also expresses interest in becoming a librarian or museum curator, roles that let
    her organize information and create spaces for learning while working primarily behind the scenes, offering a calm, predictable environment.
