personas:
  professional: Alethea Lee, a curious 5-year-old who spends hours arranging LEGO bricks into intricate cityscapes, already displays the methodical planning and solitary focus of a future architect.
  sports: Alethea Lee, a 5-year-old gymnastics enthusiast who trains at the Tiny Tigers Gymnastics Club and quietly roots for the nearby Seattle Mariners baseball team, enjoys practicing balance beams alone
    at home and prefers solitary play over team scrimmages.
  arts: Alethea Lee, a 5-year-old who devotes afternoons to drawing whimsical creatures inspired by Eric Carle's illustrations and sings along to Disney's animated soundtracks, often creating collages from
    magazine cutouts while quietly humming her favorite song "Let It Go".
  travel: Alethea Lee, a 5-year-old who loves quiet family trips to the nearby state park's serene lake, has visited the bright lights of Disneyland but prefers the calm of the Japanese garden at the local
    botanical conservatory, and dreams of exploring the quiet lavender fields of Provence someday.
  culinary: Alethea Lee, a 5-year-old with a particular fondness for cheesy macaroni, crisp apple slices, and strawberry banana smoothies, enjoys helping her mother whisk cookie dough but is picky about
    vegetables, often refusing broccoli in favor of carrot sticks.
  core: Alethea Lee, a curious yet solitary 5-year-old, meticulously organizes her toys, worries about tiny details, and finds comfort in art and quiet routines while occasionally battling a penchant for
    overthinking.
background:
  cultural: Alethea was born and raised in Chapel Hill, North Carolina, within a close‑knit Black family that blends Southern heritage with the vibrant, academic atmosphere of a university town. Her parents,
    both educators, weave African‑American cultural traditions into daily life—celebrating Juneteenth with music and food, sharing family stories from their ancestors in Georgia, and attending community
    events at the Chapel Hill African American Cultural Center. Regular visits to local museums and toddler art workshops expose her to works by Black artists such as Alma Thomas and Jacob Lawrence, nurturing
    her appreciation for art and history. Extended family gatherings often include traditional songs, cooking, and storytelling, reinforcing a sense of identity and resilience. Growing up near the University
    of North Carolina, she also benefits from open‑air concerts, science fairs, and library programs that encourage curiosity and new ideas, shaping a worldview that values both cultural roots and independent
    exploration.
