persona_description: A team leader in plant genetic research, particularly interested in the evolution of flowering plants and the study of their genome. They are part of a consortium of five universities
  that is working on the $7.3 million project to sequence the genome of Amborella trichopoda, a large shrub found only on the South Pacific island of New Caledonia. They are using microscopic fluorescent
  labels to map specific genes on the plant's chromosomes and assembling smaller sequences of DNA generated at other institutions into the complete Amborella genome. Their research has implications for
  improving agriculture and forestry by giving plant biologists a reference point for understanding all other flowering plant genomes.
