personas:
  professional: Allison Graves, a budding junior coder and community library volunteer, blends curiosity with practicality by turning Scratch projects into interactive storybooks while reliably meeting
    school deadlines and occasionally insisting on perfect code, revealing a competitive edge even in collaborative projects.
  sports: Allison Graves, a midfielder on the Cedar Valley Middle School soccer team and member of the local Trailblazers Cycling Club, follows the Seattle Seahawks and the Seattle Sounders FC avidly, wakes
    up for sunrise hikes on the Greenbelt Trail, and incorporates daily bike rides to build stamina, all while keeping a competitive streak that pushes her to win scrimmage matches.
  arts: Allison Graves, who spends weekend afternoons painting pastel landscapes of the forest and listening to the whimsical scores of composer John Williams, especially the themes from "E.T." and "Harry
    Potter," also enjoys drawing comic strips inspired by the pixel art of early video games and reciting favorite passages from "The Magic Tree House" series, melding her love for visual art with narrative
    storytelling.
  travel: Allison Graves, whose travel philosophy blends curiosity with a love for the outdoors, has trekked the Redwood National Forest, dream‑toured the Grand Canyon’s South Rim, and keeps a scrapbook
    of postcards from Kyoto’s bamboo groves, favoring trips that involve hiking and birdwatching over all‑inclusive resorts.
  culinary: Allison Graves, an enthusiastic home‑chef in training, whips up banana pancakes using ripe bananas and cinnamon, loves building custom pizza toppings with pepperoni, mushrooms, and fresh basil,
    and swears by crunchy carrot sticks dipped in hummus as her go‑to snack after a soccer match.
  core: Allison Graves is a curious, competitively spirited ten‑year‑old who blends outdoor adventure, coding creativity, and an endless stash of LEGO bricks with a habit of misplacing her sketchbook while
    constantly seeking the next challenge.
background:
  cultural: Allison lives in Trinidad, a small town in southern Colorado with a strong frontier and ranching heritage. Her family’s cultural background reflects typical white American rural values that
    emphasize independence, hard work, and community participation. The region’s history of mining and agriculture, combined with the nearby Hispanic influences from New Mexico, means she occasionally hears
    Spanish phrases and attends multicultural events like the county fair’s Hispanic Heritage celebration. Community life revolves around school activities, church gatherings, and outdoor recreation, fostering
    a deep appreciation for the high‑desert landscape, wildlife, and local traditions.
