  career_goals: Allison dreams of a career that blends her love of nature, science, and helping others. She aspires to become a wildlife biologist or park ranger who studies and protects the high‑desert
    ecosystems around the Raton Mesa and the San Isabel National Forest. She is also intrigued by veterinary science and hopes to care for local animals. In the short term, she aims to excel in school science
    fairs, earn a place in a specialized STEM program for middle school, and eventually secure a scholarship to pursue an environmental science degree.
