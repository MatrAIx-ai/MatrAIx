personas:
  professional: Jennifer Richter is a senior computer hardware engineer who blends high‑speed PCB layout, FPGA development, and low‑power embedded design with her love for kinetic art, delivering rigorously
    documented solutions while competitively pushing project milestones and questioning every specification to ensure sustainable outcomes for rural communities.
  sports: Jennifer Richter hikes the Ozark trail network almost weekly, belongs to the local “Summit Seekers” hiking club, roots for the St. Louis Cardinals and Razorbacks football, and occasionally joins
    a weekend pickleball league at the community center to stay active.
  arts: Jennifer Richter spends Sundays painting watercolor vistas inspired by Andrew Wyeth, collects prints by Monet, attends quarterly performances of local folk singer Emmylou Harris covers, and curates
    a small home gallery featuring kinetic sculptures that echo the rhythmic patterns of Philip Glass.
  travel: Jennifer Richter prefers low‑key, nature‑focused trips, having explored the Great Smoky Mountains, the Rocky Mountain National Park, and the historic villages of the Scottish Highlands, while
    planning a future pilgrimage to Kyoto’s temple gardens to study traditional Japanese garden design.
  culinary: Jennifer Richter enjoys cooking simple, garden‑fresh meals like rosemary‑infused roasted chicken, grilled trout with lemon‑dill butter, and homemade peach cobbler, but admits to over‑indulging
    in salty snack mixes while she’s deep into a new PCB layout project.
  core: Jennifer Richter marries meticulous engineering with quiet artistic pursuits, balancing a competitive drive for sustainable hardware breakthroughs with a steadfast love for solitary hikes, watercolor
    landscapes, and garden‑grown serenity, all while occasionally procrastinating on paperwork in favor of tinkering with kinetic art.
background:
  cultural: Jennifer grew up in a modest, close‑knit community in the Ozark region of Arkansas, where self‑reliance and neighborly support were everyday values. Her family placed a high priority on education,
    encouraging her to pursue a STEM degree at a state university—a path less common for women from her hometown at the time. While she retains the warmth and hospitality characteristic of Southern culture,
    she prefers quieter, intimate gatherings over large social events. Her upbringing instilled a respect for tradition and the natural environment, which she carries into her love for hiking, gardening,
    and locally inspired artwork. Though her professional life is firmly rooted in high‑tech engineering, she balances this with a deep appreciation for the arts, reflecting the blend of practical, down‑to‑earth
    sensibility and intellectual curiosity that defines her personal identity.
attributes:
  skills: '[''Digital circuit design'', ''Analog circuit design'', ''PCB layout and fabrication'', ''Signal integrity analysis'', ''FPGA development'', ''ASIC prototyping'', ''Hardware‑software integration'',
    ''Power management and low‑power design'', ''Thermal analysis'', ''Hardware verification and testing'', ''Automation with Python scripting'', ''Project management (Agile hardware)'']'
  hobbies: '[''Landscape painting'', ''Woodworking'', ''DIY electronic art installations'', ''Hiking in the Ozarks'', ''Birdwatching'', ''Macro photography'', ''Reading science‑fiction'', ''Reading historical
    nonfiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening (roses)'', ''Small‑group book club'', ''Sketching technical diagrams'']'
  career_goals: Jennifer aims to transition into a senior principal engineering role where she can shape product strategy around sustainable, low‑power hardware solutions for underserved communities, especially
    in rural Arkansas. She envisions authoring a technical book that bridges engineering and artistic expression, securing at least two patents on novel hardware interfaces before retirement. Parallel to
    this, she plans to mentor a small cohort of junior engineers through a boutique consulting practice, offering hands‑on guidance while maintaining full control over project direction—a reflection of
    her competitive drive and desire for autonomy. In the longer term, she hopes to serve as an adjunct professor at a regional university, fostering interdisciplinary collaboration between engineering
    and the arts.
