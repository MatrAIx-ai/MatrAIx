personas:
  professional: Teresita Rivero, an aspiring youth event coordinator, channels their energetic sociability and routine‑driven practicality into planning community club activities, leveraging a knack for
    rallying friends while tolerating occasional disorganization.
  sports: Teresita Rivero, a dedicated midfielder for her town’s youth soccer club, trains five days a week after school, studies Manchester United’s Premier League tactics for inspiration, and mixes salsa‑style
    dance drills into workouts to boost agility, though they occasionally skip cool‑down stretches when rushing home.
  arts: Teresita Rivero, a crafty teen who hand‑makes beaded bracelets while streaming Shakira’s latest hits and binge‑watching Pedro Almodóvar’s vibrant films, channels their outgoing energy into TikTok
    salsa‑pop dance routines inspired by J Balvin’s rhythms.
  travel: Teresita Rivero, who dreams of swapping weekend trips to the nearby beach for a summer adventure in Rome’s historic streets, balances limited pocket money and school schedules by planning excursions
    around holidays, hoping one day to explore Barcelona’s bustling La Ramblas with friends.
  culinary: Teresita Rivero, a budding home chef, loves preparing their family’s signature stew of tender beef, potatoes, carrots, and a dash of cumin, alongside quick‑fix cheesy quesadillas topped with
    fresh salsa, cilantro, and lime, often livestreaming the cooking process for friends.
  core: Teresita Rivero, a sociable teen who thrives on routine yet habitually misplaces school assignments, channels competitive fire into soccer while juggling a lingering skepticism toward new acquaintances
    and a tendency to procrastinate on budgeting, and they often rely on spontaneous group plans to stay motivated.
background:
  cultural: Teresita comes from a Costa Rican family that immigrated to Panama City, Florida. Her household maintains many Costa Rican traditions, such as celebrating Semana Santa, cooking dishes like gallo
    pinto and arroz con pollo, and speaking Spanish as the primary language. The family’s Catholic faith influences holidays and community involvement. Living in a diverse Florida community, Teresita blends
    her heritage with local customs, often sharing her culture through food, music, and participation in multicultural school events.
