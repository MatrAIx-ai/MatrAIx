  career_goals: Teresita hopes to pursue a stable, people‑oriented career after high school that blends her practical talents with her desire to help others. She is interested in attending a vocational
    program to become a certified nursing assistant or to study hospitality management so she can work in a resort or hotel environment. Her ambition is to support her family, stay connected to her community,
    and build a reliable future while still enjoying the social interactions she values.
