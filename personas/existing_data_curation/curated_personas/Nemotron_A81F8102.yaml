  hobbies: '["Local history research", "Genealogy", "Fishing", "Woodworking", "Reading non-fiction (technology, self-improvement)", "Volunteer work at Dubuque Public Library", "Competitive board gaming",
    "Hiking in state parks"]'
  career_goals: James aims to advance from his current receptionist role to an office manager position within the next three to five years. He plans to enroll in a bachelor’s program in business administration
    to deepen his understanding of organizational leadership and financial management. His competitive drive pushes him to seek supervisory responsibilities, mentor junior staff, and implement process improvements
    that boost office efficiency. Ultimately, he envisions leveraging his experience to consult small businesses in the Dubuque area on streamlining front‑office operations.
