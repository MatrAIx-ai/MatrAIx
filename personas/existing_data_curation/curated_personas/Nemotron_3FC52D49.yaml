personas:
  professional: Pedro Stefanski, a seasoned veterinary technologist in a busy small‑animal clinic, blends meticulous anesthesia monitoring, surgical assistance, and precise diagnostic work with a calm,
    solitary demeanor; they follow a structured approach to protocols while flexibly mentoring junior staff and crafting custom animal enclosures during quiet evenings.
  sports: Pedro Stefanski, an avid freshwater angler who spends early mornings casting on Waterford’s lakes and belongs to the Waterford Fly‑Fishing Club, follows the Detroit Tigers and Detroit Lions with
    casual loyalty, and incorporates low‑impact cardio by hiking local trails, though they prefer solitary fitness over team sports.
  arts: Pedro Stefanski, a nature‑focused photographer who captures local wildlife with a DSLR inspired by Ansel Adams, collects bird‑song recordings, and unwinds to the folk melodies of John Denver and
    classical piano works by Ludovico Einaudi, while they occasionally attend the regional art museum’s photography exhibit.
  travel: Pedro Stefanski, a methodical planner for long‑distance trips yet spontaneous weekend explorer, has trekked the bird‑rich cliffs of Iceland, explored the historic castles of Scotland, and frequents
    regional escapes like Mackinac Island and the Door County shoreline for quiet fishing and photography, always balancing family commitments with their solo wanderlust.
  culinary: Pedro Stefanski, a competent home cook who cultivates basil, rosemary, and thyme in a modest herb garden and regularly prepares herb‑crusted grilled trout, mushroom risotto, and rustic ratatouille,
    while they indulge in an occasional fish‑and‑chips plate at the local waterfront shack and savor a strong black coffee each morning.
  core: Pedro Stefanski, a solitary yet meticulously organized veterinary technologist, balances a love for quiet nature pursuits—fishing, birdwatching, and woodworking—with a pragmatic approach to career
    growth and personal finance, yet they sometimes forget to water their herb garden until the last minute.
background:
  cultural: Pedro is of Polish‑American heritage; his grandparents emigrated from the Silesian region of Poland to the Midwest in the mid‑20th century. Raised in Waterford, Michigan, he grew up with traditional
    Polish customs such as making pierogi with family on holidays, celebrating Wigilia and Dyngus Day, and attending a local Catholic parish on occasion. The Midwestern values of hard work, modesty, and
    community service shape his outlook, while his love for the outdoors reflects the regional appreciation for Michigan’s lakes and forests.
attributes:
  skills: '["Animal restraint", "Anesthesia monitoring", "Surgical assistance", "Medical imaging (radiography)", "Laboratory diagnostics", "Pharmacy compounding", "Electronic medical records management",
