  hobbies: '["Fishing", "Woodworking", "Birdwatching", "Nature photography", "Gardening (herbs)", "Model kit building", "Reading non-fiction", "Listening to podcasts"]'
  career_goals: Pedro aims to obtain his Certified Veterinary Technician (CVDVT) credential and specialize in anesthesia and dentistry within the next two years. He plans to enroll in an associate degree
    program in veterinary technology to deepen his scientific knowledge while maintaining a predictable morning shift that supports his family life. Long‑term, he aspires to become the lead technologist
    at his clinic, develop a niche in exotic and small‑animal care, and eventually launch a community outreach program that offers pet first‑aid workshops and low‑cost wellness checks for local residents.
