personas:
  professional: Betsy Greenawalt is a 32‑year‑old wholesale sales representative who turns client meetings into friendly gatherings, leverages her keen product knowledge and negotiation skills to close
    deals on a predictable schedule, and uses her routine‑oriented mindset to mentor junior reps while eyeing a territory‑manager promotion within the next few years.
  sports: Betsy Greenawalt spikes the ball in a town softball league every Thursday, cheers for the Chicago Cubs at the local sports bar, and joins a casual bowling league at the community center to stay
    active while balancing a demanding work schedule, and they enjoy the camaraderie of teammates as a boost to their social energy.
  arts: Betsy Greenawalt sings classic country songs by Johnny Cash and Dolly Parton with her church choir, enjoys the rock harmonies of Lynyrd Skynyrd and The Eagles on weekend drives, curls up with romance
    novels by Nora Roberts for escapism, and they often attend the county's summer theater productions starring local talent.
  travel: Betsy Greenawalt prefers short, well‑planned road trips that combine garden tours in Napa Valley, a weekend hike in Shenandoah National Park, and a nostalgic visit to the historic Ozark folk festivals,
    all while using a travel checklist to manage the anxiety of unfamiliar itineraries, and they savor the sense of discovery within familiar comforts.
  culinary: Betsy Greenawalt delights in baking chocolate chip cookies and lemon‑blueberry scones for neighborhood gatherings, seasons garden‑fresh rosemary and thyme into a rustic focaccia, savors a homemade
    apple‑cinnamon crumble after a long day of sales calls, and they pride themselves on sharing these treats as tokens of community goodwill.
  core: Betsy Greenawalt, a 32‑year‑old sales professional anchored in routine and community, pursues steady career growth while navigating anxiety‑fuelled emotional highs and lows, and they rely on daily
    checklists to stay grounded.
background:
  cultural: Betsy was raised in a small, predominantly white, working‑class community in Noble, Illinois, with family roots tracing back to German and Irish immigrants who settled southern Illinois in the
    19th century. The local culture emphasizes practical self‑reliance, a strong work ethic, deep community ties, and regular participation in church and town events. These values have shaped her appreciation
    for routine, tradition, and collaborative, harmonious relationships.
