  career_goals: Betsy aims to transition from a sales representative to a territory manager or senior sales lead within the next three to five years, seeking a role that offers greater stability, predictable
    routines, and the ability to mentor newer reps. She hopes to secure a position that provides reliable benefits and a steady income, allowing her to build a more secure future after her divorce. Long‑term,
    she envisions possibly opening a small, community‑focused retail or service business that leverages her sales experience while maintaining the familiar, practical environment she thrives in.
