persona_description: A conservation biologist who is interested in the decline of freshwater mussel species in the Kansas River basin. They are familiar with the historical changes in the occurrence and
  distribution of freshwater mussels in Kansas, and have conducted research on the topic. They have access to data from the Kansas Department of Health and Environment and have collaborated with Steve Cringan
  and Clint Goodrich to provide comments on the species. They are also knowledgeable about the mussel inventory and interested in the conservation status of the species in Kansas.
