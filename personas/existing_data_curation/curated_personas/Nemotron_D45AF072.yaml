  career_goals: Although retired, Bridget aims to continue contributing to education by mentoring novice teachers, volunteering as a tutor for elementary students, and establishing a small scholarship fund
    for local high school seniors pursuing teaching degrees. She also wishes to document her life story and educational philosophy in a memoir, and to lead a local history preservation project. Ultimately,
    she aspires to leave a lasting legacy of organized, compassionate learning in her community.
