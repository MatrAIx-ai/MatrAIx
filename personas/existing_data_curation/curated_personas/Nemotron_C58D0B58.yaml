  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Gardening indoor herbs and tropical plants'', ''Walking along the beach and local nature trails'', ''Reading contemporary fiction and self‑help
    books'', ''Listening to salsa, bolero, and reggaeton music'', ''Practicing beginner yoga and mindfulness exercises'']'
  career_goals: Maria aims to secure a full‑time administrative or office‑support position that offers clear routines and predictable responsibilities, allowing her to leverage her organizational strengths
    while providing financial stability. She plans to complete her associate degree in business administration within the next two years and to acquire a certification in community health outreach, hoping
    eventually to work for a local non‑profit that serves families in Humacao. In the longer term, she dreams of launching a small, home‑based catering service featuring her grandmother’s recipes, which
    would combine her love of cooking with the desire for entrepreneurial independence.
