personas:
  professional: Miguel Morales is a 16-year-old high-school student with a talent for troubleshooting computers and maintaining bikes, who dreams of earning a certification in automotive technology or culinary
    arts and applies their methodical yet sometimes lax planning style to both hobby projects and school assignments.
  sports: Miguel Morales joins a local pickup soccer team on weekends, cheers for New York City FC, follows the New York Knicks for inspiration, rides their bike through Levittown for cardio, and treats
    fitness as a flexible outlet, though they sometimes skip workouts when school stress peaks.
  arts: Miguel Morales sketches comic-style characters in a battered sketchbook, drawing inspiration from Alex Ross and Neil Gaiman, while their playlists blend Bad Bunny, J Balvin, and classic salsa, turning
    music and drawing into a personal creative sanctuary.
  travel: Miguel Morales enjoys weekend trips to the Atlantic City boardwalk and family visits for Carnival celebrations, they dream of backpacking through the Andean highlands and exploring Quito’s historic
    center, but they balance these aspirations with the practical constraints of a teen budget and school commitments.
  culinary: Miguel Morales loves preparing empanadas de viento with airy dough, tangy ceviche with lime, cilantro, and shrimp, and hearty arroz con menestra with beans and pork, and they also crave a pepperoni-jalapeño
    pizza, expertly balancing traditional flavors with teenage fast-food cravings.
  core: Miguel Morales combines a love for systematic problem-solving with a spontaneous, sometimes disorganized streak, they juggle bike repairs, video-game strategies, and family recipes while wrestling
    with anxiety and procrastination.
background:
  cultural: Miguel grew up in a bilingual Ecuadorian household in Levittown, New York. His parents emigrated from Ecuador and keep many cultural traditions alive—celebrating Carnaval, preparing foods like
    empanadas de viento and ceviche, and listening to a mix of traditional música and modern Latin pop. Spanish is spoken at home, while English dominates school and public life, giving him fluency in both
    languages. The local Hispanic community provides a network of extended family, cultural events at community centers, and youth soccer leagues where he interacts with peers who share his background.
    These cultural influences shape his identity, daily routines, food preferences, and the values he places on family gatherings and community support.
attributes:
  skills: '[''bilingual Spanish–English communication'', ''basic computer troubleshooting'', ''bike maintenance and minor repairs'', ''preparing traditional Ecuadorian dishes'', ''strategic video gaming'']'
  hobbies: '[''playing strategy video games (e.g., Civilization, FIFA)'', ''soccer with local pickup teams'', ''sketching comic‑style illustrations'', ''cooking Ecuadorian dishes with family'', ''listening
    to reggaeton and Latin pop music'', ''bike riding and tinkering'']'
  career_goals: Miguel wants to finish his high school equivalency and enroll in a vocational program that offers certifications in either automotive technology or culinary arts. He sees automotive work
    as a reliable path that matches his mechanical aptitude and desire for steady income, while also providing the structured environment he values. At the same time, he dreams of someday opening a modest
    food stall or pop‑up kitchen serving Ecuadorian street food, allowing him to keep a creative outlet and stay connected to his heritage. In the short term, he hopes to secure a part‑time apprenticeship
    after obtaining his certification, and his longer‑term ambition is to become a respected technician or chef who is known for reliability, attention to detail, and a friendly, community‑focused attitude.
