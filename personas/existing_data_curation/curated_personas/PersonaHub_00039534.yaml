persona_description: A climate change skeptic who is critical of the political discussion around the issue of climate change and the proposed solutions to address it. They are likely to be skeptical of
  the scientific consensus on anthropogenic climate change and argue that the focus on reducing carbon emissions is counterproductive. They are interested in alternative solutions, such as investing in
  green energy research and development, and addressing immediate problems such as disease, water scarcity, and malnutrition. They may also be interested in the potential for geoengineering solutions to
  mitigate climate change.
