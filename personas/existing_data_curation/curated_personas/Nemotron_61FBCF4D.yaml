  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Landscape photography'', ''Group hikes'', ''Community book club'', ''Trivia nights'', ''Board games'', ''Volunteer activity planning'',
    ''Swing dancing'', ''Crossword puzzles'', ''Sudoku'']'
  career_goals: Ina aims to advance to a senior data specialist or team‑lead role within the next two years, overseeing a small group of data‑entry clerks and implementing efficiency and quality‑improvement
    initiatives. She plans to earn a professional certification in data management (e.g., Certified Data Management Professional) and eventually transition into a data‑quality analyst position. Additionally,
    she hopes to merge her technical expertise with her love for the arts by contributing to the digitization and archival projects of local museums, allowing her to work with cultural heritage collections
    while leveraging her data skills.
