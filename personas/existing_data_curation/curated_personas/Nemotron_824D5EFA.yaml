  career_goals: Ritchel aims to become a certified elementary-school teacher with a focus on inclusive education and social-emotional learning. She intends to pursue state teacher certification while gaining
    hands-on experience through volunteering as a tutor for at-risk youth in Norristown. Over the next five years she hopes to specialize in special-education support, helping students who experience anxiety
    or learning challenges. Long-term, she envisions working as an educational consultant who designs flexible, mindfulness-infused curricula for schools that value both creativity and practical outcomes.
    She prefers roles that offer a degree of schedule flexibility to accommodate her own mental-health needs while allowing her to nurture a harmonious classroom environment.
