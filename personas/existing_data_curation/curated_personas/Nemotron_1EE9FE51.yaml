  career_goals: Heather aims to stay mentally sharp and socially engaged by deepening her understanding of visual arts through weekend watercolor workshops and local art‑history lectures. She hopes to share
    her life experience by mentoring younger volunteers at the community center and by preserving her family’s narrative in a written memoir and a digital photo archive. Maintaining independence and health
    is a priority, so she plans a regular walking and gardening routine. She also dreams of taking a short road trip to visit the Art Institute of Chicago and to explore historic sites linked to her ancestors
    in Pennsylvania, while continuing to contribute as a volunteer guide at the regional museum.
