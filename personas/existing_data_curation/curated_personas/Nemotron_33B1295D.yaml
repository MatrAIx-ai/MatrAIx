  career_goals: In the next five years, Diana aims to cement a sustainable legacy for the company by guiding a seamless leadership transition to the next generation of executives she has mentored. She plans
    to embed long‑term financial stability and operational resilience while expanding the firm’s commitment to environmentally responsible practices. Additionally, she aspires to increase the organization’s
    community impact through structured philanthropy programs, leveraging her board experience to serve on nonprofit advisory councils. Her overarching ambition is to be remembered as a steady, principled
    steward who balanced profitability with social responsibility.
