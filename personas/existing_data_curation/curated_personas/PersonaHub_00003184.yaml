persona_description: A chemist who specializes in the analysis of pesticides and their formulations, particularly those that are insoluble in water. They are interested in the determination of impurities
  and insoluble materials in water-soluble technical pesticides or in formulations that could cause blockage of sieves or jets in spray machinery. They are skilled in the use of various methods, including
  hot solution, cold solution, coarse material, and materials insoluble in aqueous solutions of pesticides, to accurately determine the content of such materials.
