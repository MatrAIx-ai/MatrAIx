personas:
  professional: Henry Gomez, a budding visual storyteller, merges traditional papel picado motifs with watercolor and digital illustration on a tablet, crafting whimsical graphic novels and simple Scratch
    games that reflect their curiosity, meticulous organization, and preference for quiet, solitary creation, and they subtly champion community harmony through narrative themes.
  sports: Henry Gomez enjoys playing soccer with the local youth club, cheering for the Houston Dynamo during MLS matches, and spending relaxed Saturday mornings swimming at the community pool, preferring
    low‑pressure drills that let them hone skills in quiet, focused practice without the bustle of large crowds.
  arts: Henry Gomez, a budding artist, draws inspiration from the whimsical storytelling of Neil Gaiman and the vibrant palettes of Frida Kahlo, creating watercolor caricatures and digital sketches that
    incorporate papel picado motifs, and they regularly attend the city’s cultural arts fair featuring live mariachi music while re‑watching Studio Ghibli classics like Spirited Away for fresh ideas.
  travel: Henry Gomez favors family‑planned trips that combine quiet beach days on Galveston with cultural visits to San Antonio’s River Walk and interactive exhibits at the Houston Museum of Natural Science,
    yet they daydream about future adventures exploring the ancient ruins of Chichén Itzá and sampling street tacos in Mexico City.
  culinary: Henry Gomez, an eager junior chef, delights in helping Mom prepare tacos al pastor with marinated pork, pineapple, cilantro, and fresh lime, perfecting guacamole with ripe avocados and jalapeños,
    and experimenting with toppings for enchiladas suizas, all while they savor sweet mango slices and crunchy churros for dessert.
  core: Henry Gomez, an introspective 11‑year‑old, blends traditional papel picado designs into digital art, balances quiet creativity with occasional impulsive marker splurges, and they navigate school
    life with a gentle, harmony‑seeking spirit.
background:
  cultural: Henry grew up in a bicultural Mexican‑American household in Alvin, Texas. His family celebrates Día de los Muertos, Semana Santa, and Tex‑Mex holidays, infusing his daily life with vibrant colors,
    music, and food. Fluent in Spanish, he often hears traditional stories from his grandparents, which inspire his artistic projects. The mix of Southern Texas community values and Mexican heritage gives
    him a unique perspective on identity, encouraging him to incorporate cultural motifs—like papel picado patterns and papel de alebrije designs—into his artwork. Henry’s cultural roots also shape his
    sense of community, kindness, and respect for collective harmony.
attributes:
