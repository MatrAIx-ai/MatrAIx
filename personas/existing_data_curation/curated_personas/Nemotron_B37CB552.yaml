  career_goals: Henry dreams of turning his love for art and technology into a career that lets him create immersive visual worlds. He aspires to become a concept artist or illustrator for video games and
    graphic novels, where he can work largely independently while collaborating when needed. He also imagines exploring cultural storytelling, perhaps as a digital animator who brings Mexican folk tales
    to life for a global audience. In the longer term, Henry hopes to study graphic design or interactive media at a college, eventually freelancing or joining a creative studio that values innovative,
    quiet‑focused creators.
