  hobbies: '[''Reading speculative fiction'', ''Writing short stories'', ''Digital painting'', ''Astrophotography'', ''Model building (aircraft, spacecraft)'', ''Amateur astronomy'', ''Woodworking'', ''Gardening'',
    ''Arduino programming'', ''Local history research'']'
  career_goals: In retirement, Jose aims to bridge his scientific background and artistic passions by creating a series of illustrated speculative essays that explore emerging technologies and their societal
    impact. He intends to author a memoir that weaves personal narratives with reflections on the evolution of engineering practices. He also aspires to mentor a small group of high‑school students in a
    community robotics club, fostering curiosity while maintaining his competitive drive. Additionally, he hopes to organize a local exhibition showcasing his digital paintings and astrophotography, thereby
    contributing to the cultural life of Saint Marys.
