  career_goals: Steven aims to progress into a technical lead or software architect role where he can influence architectural decisions while fostering an inclusive, collaborative team culture. He hopes
    to champion projects that improve accessibility and educational technology, contributing to open-source initiatives that serve under-served communities. Long-term, he envisions launching a community-based
    coding program in the Memphis area to mentor youth, leveraging his flexible work schedule to balance professional growth with family life.
