personas:
  professional: Steven Garcia, a versatile full‑stack software developer proficient in Python, JavaScript, React, and cloud‑native architectures, channels their curiosity‑driven practicality into building
    maintainable, user‑centric applications, and they balance a relaxed, sometimes disorganized workflow.
  sports: Steven Garcia, a dedicated weekend hiker of Meeman‑Shelby Forest State Park and occasional pick‑up basketball player, roots for the Memphis Grizzlies and tracks the Tennessee Titans' season, and
    they occasionally join a local running club for the spring 5K races.
  arts: Steven Garcia, who unwinds to the soulful strains of B.B. King and Odetta while binge‑watching classic film noir like Double Indemnity and navigating narrative‑rich indie games such as Disco Elysium,
    often cites authors like Neal Stephenson and they attend occasional open‑mic folk nights at local cafés.
  travel: Steven Garcia, who favors spontaneous weekend road trips to nearby cities like Nashville and Austin and dreams of a spring pilgrimage to Japan’s cherry‑blossom festivals, plans most journeys on
    a shoestring budget but they splurge on flight upgrades when a coding conference aligns with a travel desire.
  culinary: Steven Garcia, an adventurous home chef blending Southern comfort with Mexican heat, frequently whips up dishes like chipotle‑glazed collard greens, shrimp‑and‑grits enchiladas, and mezcal‑marinated
    pork tacos, while they source fresh produce from the garden and master the art of homemade salsa verde.
  core: Steven Garcia embodies a curious‑practical mind tempered by a laid‑back, sometimes scattered lifestyle, channeling compassion into mentorship while they obsessively tinker with custom mechanical
    keyboards and savor the quiet rhythm of solo hikes.
background:
  cultural: Steven was raised in a middle-class suburb of Germantown, Tennessee, within a family that combines Anglo-American roots with a few generations of Mexican ancestry, reflected in his surname and
    occasional family recipes. The Southern cultural milieu emphasized hospitality, church involvement, and strong community ties, shaping his compassionate and cooperative nature. He embraces the region’s
    values of modesty, practicality, and a relaxed social demeanor while also appreciating multicultural influences, which inform his openness to diverse ideas and his desire to give back to the local community.
