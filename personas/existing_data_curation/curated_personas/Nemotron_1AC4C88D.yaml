personas:
  professional: Louis Nguyen, a three-year-old who delights in constructing intricate block towers and sorting puzzle pieces, displays early spatial reasoning and meticulous attention to detail that hint
    at a future in architecture or civil engineering, where they love structure, predictability, and quiet focus that will shape their professional path.
  sports: Louis Nguyen loves watching the local community baseball team, the Riverbank Rattlers, during family outings and participates in a toddler gymnastics class at BrightStart Play Center, preferring
    predictable routines over chaotic free play while still cheering enthusiastically when the Rattlers score a home run, and they always sit politely for the post-game snack.
  arts: Louis Nguyen enjoys listening to Yo-Yo Ma's soothing cello suites, watching Studio Ghibli's My Neighbor Totoro on family movie nights, and drawing their favorite characters like Totoro and Pikachu
    with beloved Crayola crayons, and they let these artistic experiences shape a gentle imagination and love for quiet creativity.
  travel: Louis Nguyen relishes short weekend trips to the nearby botanical garden and the family's annual vacation to San Diego's SeaWorld, and they daydream about future adventures to Tokyo's Disneyland
    and the Great Barrier Reef after seeing vivid picture books.
  culinary: Louis Nguyen favors bite-size foods such as chicken nuggets, mac and cheese, and strawberry-flavored yogurt, can skillfully use a child-sized fork to sprinkle shredded cheddar on their peas,
    and they delight in occasional family-style meals featuring soft steamed carrots and mashed sweet potatoes.
  core: Louis Nguyen is a meticulous little builder who seeks order in play, saves every shiny coin, manages their eczema with routine care, and they balance solitary creativity with occasional bursts of
    cartoon-driven excitement.
background:
  cultural: Louis is raised in a predominantly white, suburban New Jersey family. His household observes typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and incorporates
    family rituals like weekend picnics and neighborhood block parties. While his cultural identity is primarily white American, his family occasionally includes elements of Vietnamese heritage—such as
    sharing traditional dishes during family meals—providing him with a modest, multicultural awareness.
