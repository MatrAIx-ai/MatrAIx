personas:
  professional: Autumn Smith, a 27‑year‑old sheet‑metal specialist and certified welder, channels their industrial‑design training and improvisational flair into rapid prototyping of custom metal art, thriving
    in collaborative makerspace projects where their outgoing personality drives team morale, even as they wrestle with the occasional deadline‑driven stress due to a spontaneous work style.
  sports: Autumn Smith fuels their fitness by mountain‑biking with the Eagle Point Riders club in summer, hiking the Columbia River Gorge, cheering for the Portland Timbers in MLS and the Seattle Seahawks
    in the NFL, swapping snowshoes for cross‑country skiing in winter, and they also maintain a casual weekly yoga routine to counterbalance welding‑related stiffness.
  arts: Autumn Smith expresses creativity through abstract acrylic paintings inspired by Jackson Pollock, metal sculptures echoing David Smith’s work, improv performances with the local theater troupe,
    and acoustic guitar covers of Bon Iver and Phoebe Bridgers at open‑mic nights, and they find the vibrant artistic community shaping their identity.
  travel: Autumn Smith favors spontaneous road trips to Oregon’s rugged coastline, the Hoh Rainforest in Washington, and occasional weekend getaways to Boise’s art scene, while they also dream of a creative
    retreat in Iceland’s black‑sand beaches, usually funding travel through freelance metal‑fabrication commissions and a modest travel fund.
  culinary: Autumn Smith enjoys cooking at an intermediate level, often preparing pan‑seared salmon with miso glaze, wild mushroom risotto featuring morels, and kimchi fried rice, while they savor a daily
    pour‑over from Stumptown and snack on homemade jerky during welding sessions, reflecting a palate that blends Pacific Northwest freshness with bold global flavors.
  core: Autumn Smith is a 27‑year‑old welding virtuoso who fuses industrial precision with spontaneous artistic bursts, juggling a love for mountain‑bike trails, open‑mic guitars, and occasional impulsive
    purchases, while they habitually over‑commit to projects and rely on community support to stay grounded.
background:
  cultural: Autumn grew up in a white, working‑class family in Eagle Point, Oregon, where self‑reliance, community ties, and a love of the outdoors are core values. The Pacific Northwest’s blend of rugged
    natural beauty and a growing maker culture has shaped her worldview, fostering an appreciation for sustainable living, hands‑on creativity, and collaborative community projects. Her upbringing reflects
    a mix of Midwestern pragmatism and Northwestern environmental consciousness, influencing both her work ethic and her artistic expression.
attributes:
  skills: '[''Welding (MIG, TIG, stick)'', ''Metal cutting and forming'', ''Blueprint and technical drawing interpretation'', ''Industrial design basics'', ''Rapid prototyping'', ''Improvisational troubleshooting'',
    ''Team leadership and mentorship'']'
  hobbies: '[''Sketching and abstract painting'', ''Metal sculpture and DIY craft'', ''Hiking and mountain biking in the Cascades'', ''Photography of natural scenery'', ''Acoustic guitar and open‑mic performances'',
    ''Improv theater'', ''Volunteering at a makerspace'']'
  career_goals: Autumn aims to blend her technical expertise with her artistic passions by moving into custom metal art and product design. Over the next five years she plans to earn a certified welding
    specialist credential, build a modest studio space in Eagle Point, and launch a small business creating bespoke metal sculptures and functional art for local businesses and community projects. She also
    hopes to collaborate with regional makerspaces, teach workshops, and eventually transition into a design‑focused role that allows her to lead creative fabrication teams.
