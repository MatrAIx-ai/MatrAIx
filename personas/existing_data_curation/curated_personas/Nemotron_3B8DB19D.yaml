  hobbies: '[''DIY electronics projects'', ''Woodworking'', ''Listening to jazz and soul music'', ''Barbecue cooking'', ''Fishing'', ''Attending local church events'', ''Community volunteer work'', ''Reading
    technical and historical magazines'', ''Playing chess'', ''Watching classic action movies'']'
  career_goals: Vidal aims to progress into a senior lead‑technician or supervisory role where he can shape workflow standards and mentor the next generation of assemblers. He plans to earn a Certified
    Maintenance & Reliability Technician (CMRT) credential and a Six Sigma Green Belt to enhance his process‑improvement capabilities. While valuing stability for his family, he also wants to explore integrating
    IoT and Industry 4.0 technologies into the plant’s assembly processes, positioning his team at the forefront of modern manufacturing. Long‑term, he envisions opening a small community‑focused electronics
    repair shop that offers apprenticeships for local youth.
