  hobbies: '["Visiting Art Museums and Galleries (e.g., Cincinnati Art Museum, Contemporary Arts Center)", "Improv Comedy Workshops", "Co‑ed Softball League", "Hiking the Ohio River Trail", "Trivia Nights
