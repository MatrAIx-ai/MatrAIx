personas:
  professional: Mandy Armstead leverages her STEM‑trained analytical skills and personable admin talent to streamline office workflows, curate impromptu art displays in conference rooms, and coordinate
    travel for executives, even though they sometimes let a loose schedule slide in favor of spontaneous team collaborations.
  sports: Mandy Armstead is a co‑ed softball league regular who hikes the Ohio River Trail on Saturday mornings, cheers loudly for the Bengals and the Reds, and joins a local cycling club during summer,
    but they prefer spontaneous group workouts over rigid training schedules.
  arts: Mandy Armstead frequents the Cincinnati Art Museum and MOCA, participates in improv comedy workshops, captures street scenes with a DSLR, and draws inspiration from musicians like The National and
    St. Vincent, actors such as Jeff Wright, and contemporary visual artist Jaune Jones, all while they weave these influences into their office décor.
  travel: Mandy Armstead enjoys spontaneous road trips that blend Midwest brewery crawls with visits to Oktoberfest celebrations in Munich, weekend escapes to Asheville’s arts district, and occasional flights
    to Berlin for a deep‑dive into European craft‑beer culture, yet they budget carefully, often opting for group travel discounts to keep expenses manageable.
  culinary: Mandy Armstead experiments in the kitchen with homemade sauerkraut‑pork tacos, spicy ramen bowls, and occasional gluten‑free goulash, preferring to source fresh herbs and craft‑brew pairings
    from local farmers’ markets, though they sometimes over‑complicate recipes, ending up ordering takeout on nights when creativity stalls.
  core: Mandy Armstead is a socially magnetic, art‑obsessed admin who thrives on spontaneous collaboration, harbors a competitive streak, and habitually juggles multiple projects while they occasionally
    forget at least one detail.
background:
  cultural: Mandy grew up in a middle‑class white family in the Greater Cincinnati area, absorbing Midwestern values of community, modesty, and hospitality. Her upbringing included exposure to the region’s
    German heritage—celebrating Oktoberfest events and enjoying the local craft‑brew scene—while also embracing the city’s diverse cultural tapestry through music, theater, and ethnic festivals. She earned
    her STEM bachelor’s degree from the University of Cincinnati, which fostered a blend of analytical rigor and creative curiosity that now informs both her professional work and personal pursuits.
