  career_goals: Mandy aims to move from a secretary role into senior administrative management, eventually becoming an Office Manager or Executive Assistant with strategic responsibilities. She plans to
    earn the Certified Administrative Professional (CAP) credential and complete a project management certification (PMP) to transition into a project coordinator role within a tech‑focused company. Long‑term,
    she envisions launching a boutique consulting service that helps organizations streamline workflows while embedding artistic and cultural elements into the workplace environment.
