  hobbies: '[''Painting'', ''Experimental art techniques'', ''Visiting galleries'', ''Cooking Mexican recipes'', ''Gardening'', ''Spanish-language poetry'', ''Family photo album creation'', ''Attending
    unconventional lectures'', ''Digital photography'', ''Small-group art critique'']'
  career_goals: Alisha aims to launch a modest community art studio in Canal Winchester where locals can gather for informal workshops, open critiques, and occasional exhibitions, emphasizing experimental
    and unconventional approaches. She also hopes to compile and publish a family cookbook that blends classic Mexican dishes with creative twists using Ohio-grown ingredients. Additionally, she aspires
    to become a mentor for emerging artists in her neighborhood, documenting her family's genealogy through a multimedia project that combines oral histories, photography, and digital archiving. While she
    is not seeking formal employment, she wishes to be recognized for her contributions to the local cultural scene and to inspire others through her art and storytelling.
