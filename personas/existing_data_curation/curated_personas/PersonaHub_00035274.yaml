persona_description: A motivated and passionate STEM educator who is dedicated to promoting STEM education and awareness among economically disadvantaged girls. This individual is passionate about bringing
  STEM to middle-school girls and encouraging them to explore and envision themselves in rewarding STEM careers. They have a deep understanding of the barriers that limit middle-school girls' engagement
  in STEM, such as inadequate access, opportunity, academic preparation, and attitudinal barriers, and are committed to addressing these barriers through the STEM Stars program. They have a strong passion
  for mentoring and providing hands-on project-based STEM activities, as well as life skills development and pre-college experiences, to help these girls succeed and persist in STEM education. They are
  committed to increasing the number of women and underrepresented minorities employed in STEM fields and are working to reverse the disturbing trend of underrepresentation in STEM by bringing STEM to middle-school
  girls and encouraging them to pursue STEM studies early on.
