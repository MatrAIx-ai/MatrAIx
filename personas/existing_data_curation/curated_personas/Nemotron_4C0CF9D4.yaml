personas:
  professional: Daniel Costello is a detail‑oriented food‑service manager who leverages rigorous inventory control, data‑driven budgeting, and an artistic eye for plating, using their organized, competitive
    drive to set performance targets while their skeptical side keeps them vigilant about staff motives, sometimes bordering on micromanagement.
  sports: Daniel Costello plays on a Friday‑night rec basketball league with the Downtown Dribblers, roots for the Portland Trail Blazers and Portland Thorns, follows the Seattle Seahawks for football and
    the Portland Timbers for soccer, and maintains a fitness routine that mixes competitive play with yoga to keep both body and mind balanced.
  arts: Daniel Costello spends weekends exploring Portland's Pearl District galleries, decoding street‑mural narratives by Banksy and Ai Weiwei, catching live shows by Tame Impala and The Strokes, and channels
    that visual stimulation into experimental plating designs that echo modern art concepts, often sketching ideas on a battered notebook during breaks.
  travel: Daniel Costello prefers immersive cultural escapes, having sampled sushi at Tokyo's Tsukiji market, tasted mole in Oaxaca, and dreaming of a spring stroll through Florence's Uffizi, they meticulously
    plan itineraries down to museum opening hours and budget allocations, balancing adventure with a careful eye on savings, yet sometimes overpacks the tiniest souvenirs.
  culinary: Daniel Costello crafts Mexican‑Italian fusion dishes like chorizo carbonara drizzled with pomegranate reduction, garnished with microgreens and edible flowers, demonstrating a moderate cooking
    skill that blends culinary theory from textbooks with spontaneous kitchen experiments, and treats plating as a visual performance, often spending hours perfecting a single plate.
  core: Daniel Costello is a competitive, art‑driven food‑service manager who channels curiosity and anxiety into meticulously curated menus, strategic budgeting, and a socially vibrant life centered on
    basketball, galleries, and ambitious travel plans.
background:
  cultural: Daniel grew up in Sanford, a historic city in central Florida known for its lakes, downtown charm, and proximity to Orlando’s tourism hub. He descends from a mix of Italian and Irish ancestry;
    his grandparents emigrated from Italy in the 1960s, bringing a tradition of home‑made pasta and pizza that shaped family meals. The local community blends Southern hospitality with the vibrant multicultural
    flavors of Florida’s Latino and Caribbean populations, exposing him early to Cuban sandwiches, Haitian griot, and the state’s citrus harvests. Raised in a middle‑class, Christian household, church gatherings
    and community events emphasized service and togetherness. After earning an associate’s degree in hospitality management at a nearby community college, he entered the food‑service industry, merging his
    methodical training with the eclectic culinary scene of Central Florida. His cultural identity balances a mainstream white American upbringing with a deep appreciation for the artistic and culinary
    diversity that defines his hometown.
attributes:
  skills: '[''Food service management'', ''Staff scheduling'', ''Inventory control'', ''Budgeting and cost analysis'', ''Menu development'', ''Food safety compliance (ServSafe)'', ''Vendor negotiation'',
