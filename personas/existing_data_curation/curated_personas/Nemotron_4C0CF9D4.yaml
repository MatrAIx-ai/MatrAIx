  hobbies: '[''Visiting art galleries and street murals'', ''Attending live music and theater performances'', ''Exploring food festivals and farmers markets'', ''Recreational basketball'', ''Experimental
    cooking and recipe development'', ''Reading modern art and culinary theory'', ''Listening to hospitality podcasts'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Volunteering at community
    food banks'']'
  career_goals: Daniel aims to rise to a regional manager position within a national restaurant chain over the next five years, overseeing multiple locations and implementing innovative service models that
    blend culinary art with technology. He plans to complete a bachelor’s degree in hospitality management to strengthen his strategic acumen. Ultimately, he dreams of opening his own boutique café that
    functions as a gallery‑café hybrid, showcasing local artists while offering art‑inspired, experimental cuisine. His competitive drive pushes him to seek industry recognition, such as restaurant design
    awards, and to mentor emerging managers as a future director of operations.
