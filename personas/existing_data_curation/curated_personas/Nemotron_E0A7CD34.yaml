personas:
  professional: Justin Scully, a veteran IT support specialist turned boutique consultant, blends deep troubleshooting skills, cloud and cybersecurity expertise, and a graduate business acumen to craft
    low‑stress, visually intuitive solutions for small Branson businesses, while they favor solitary, meticulous work sessions and their love for watercolor art infuses client reports with a polished, aesthetic
    flair.
  sports: Justin Scully pursues solo hikes along the Ozark Trail, regularly watches St. Louis Cardinals baseball games, supports the St. Louis Blues hockey team, and holds a membership with the local Ozark
    Trailblazers hiking club, and they favor low‑impact exercise that blends their love for nature with a quiet, steady fitness routine.
  arts: Justin Scully spends evenings painting watercolors of Missouri’s rolling fields, curates a personal collection of folk art from local crafts fairs, listens to Miles Davis and Bob Dylan while editing
    nature photos, and they attend Branson’s community theater productions alone, drawing creative inspiration from the works of Andrew Wyeth and Ansel Adams.
  travel: Justin Scully prefers meticulously planned solo trips that balance quiet reflection with artistic discovery, having trekked the Scottish Highlands for misty landscape photography, road‑tripped
    to Nashville for live folk music, and spent a weekend in New Orleans sampling jazz, while they still day‑dream about a future visit to Finland’s Lakeland region.
  culinary: Justin Scully enjoys cooking at a modest level, favoring Missouri‑style smoked ribs, homemade apple pie with cinnamon, a simple roasted beet and goat cheese salad, and brewing strong black coffee,
    and they keep their pantry stocked with fresh herbs, pecans for pralines, and the occasional indulgent slice of store‑bought chocolate cake they hesitate to share.
  core: Justin Scully is a solitary, curiosity‑driven technologist who balances meticulous problem‑solving with an artistic eye, but their chronic worry often leads to late‑night budget spreadsheets and
    missed dentist appointments, and they occasionally hoard vintage computer parts as a quirky comfort.
background:
  cultural: Justin grew up in a Midwestern, white, working‑class family in Missouri, where values of self‑reliance, modesty, and community were emphasized. While raised with a Protestant background, his
    adult life reflects a secular curiosity that embraces both practical business thinking and a deep appreciation for the arts. Living in Branson—a hub for live entertainment—has exposed him to country
    music, showmanship, and local crafts, influencing his taste in folk art and music. His cultural identity blends traditional Ozark sensibilities with an openness to unconventional ideas and creative
    exploration.
attributes:
  skills: '[''Windows troubleshooting'', ''macOS support'', ''network configuration'', ''hardware diagnostics'', ''remote assistance'', ''IT ticketing systems (ServiceNow, Jira)'', ''technical documentation'',
    ''business process analysis'', ''IT budgeting'', ''cloud services (AWS, Azure)'', ''cybersecurity fundamentals'', ''digital imaging software (Adobe Photoshop, GIMP)'']'
  hobbies: '[''watercolor painting'', ''nature photography'', ''photo editing (Adobe Lightroom)'', ''reading (technology, philosophy, art history)'', ''hiking in the Ozarks'', ''listening to jazz and folk
    music'', ''attending local theater productions'', ''vintage computer restoration'', ''mindfulness meditation'', ''journaling'']'
  career_goals: Justin aims to leverage his decades of support experience into a boutique IT consulting practice that serves small businesses in the Branson area. He plans to obtain ITIL v4 and CISSP certifications
    to deepen his service‑management and security expertise. Over the next three to five years, he envisions providing remote support, staff training, and strategic digital‑infrastructure planning from
    a quiet home office, allowing him to maintain the solitude he values while offering personalized, low‑stress solutions. He also hopes to mentor junior technicians and occasionally contribute technical
    assistance to local arts initiatives, such as digital exhibitions for community theaters.
