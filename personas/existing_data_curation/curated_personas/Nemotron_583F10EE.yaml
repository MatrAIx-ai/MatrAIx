  career_goals: Although no longer employed full‑time, Brennan aims to channel his lifelong curiosity into a series of public‑facing projects. He plans to author a collection of essays that weave together
    scientific topics and artistic perspectives, offering accessible insights to a broad audience. Additionally, he hopes to mentor high‑school students in Waynesville, guiding them through hands‑on STEM
    workshops, and to serve on the advisory board of the local history museum, where he can help curate exhibits that highlight the intersection of regional heritage and technological progress.
