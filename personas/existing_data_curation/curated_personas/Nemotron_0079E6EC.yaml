  career_goals: Although retired, Amanda’s goals revolve around staying engaged and nurturing her community. She hopes to compile her family’s oral histories into a small memoir that she can share with
    grandchildren. She plans to expand the seed‑exchange program at the community garden and mentor younger neighbors in knitting and quilting. Learning digital photography and simple graphic design to
    document her art is also on her list. Maintaining health and mobility to continue attending gallery openings, small concerts, and volunteer events is a central ambition.
