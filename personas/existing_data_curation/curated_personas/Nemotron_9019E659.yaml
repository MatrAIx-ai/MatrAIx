personas:
  professional: Delores Sarda is a meticulous fast-food crew member who excels at operating POS systems, enforcing strict food-safety protocols, and coaching new staff, all while actively pursuing ServSafe
    Manager certification and a shift-manager promotion within the next year; they leverage their business coursework to keep inventory balanced and shift schedules orderly.
  sports: Delores Sarda enjoys low-impact fitness, walking the local Riverside Park trail three times weekly and practicing yoga via YouTube, while rooting for the City FC soccer team and occasionally joining
    a small group of friends for casual pickup basketball games on weekends; they balance these activities with a priority for calm.
  arts: Delores Sarda finds solace in contemporary mystery novels such as 'The Likeness' by Tana French and 'Sharp Objects' by Gillian Flynn, spends evenings crocheting intricate patterns while listening
    to folk-rock artists like Mumford & Sons, and occasionally attends indie-film screenings featuring directors like Greta Gerwig, where they relish the quiet, introspective atmosphere.
  travel: Delores Sarda prefers structured, budget-friendly trips, having road-tripped to Shenandoah National Park and taken a low-key cultural weekend in New Orleans, and they now dream of a solo retreat
    in Kyoto to study traditional tea ceremonies and meditative garden design.
  culinary: Delores Sarda is an enthusiastic home baker who perfects banana bread with almond flour, dark chocolate chip cookies, and lemon-zest scones, often pairing them with Earl Grey tea, and they frequently
    bake extra loaves to donate to the local animal shelter.
  core: Delores Sarda blends a love for detailed routine—from meticulous cash-register work to daily journaling—with a quiet creative side in crocheting and baking, all while navigating intense anxiety
    that drives both their structured approach and occasional impulsive comfort purchases.
background:
  cultural: Delores grew up in Marion, Illinois, a small Midwestern town with a predominantly white, working‑class community. Her upbringing emphasized practicality, punctuality, and a strong work ethic—values
    common in the region. Family and community traditions, such as attending local fairs, supporting the high school football team, and participating in church gatherings, reinforced a sense of modesty
    and cooperation. This cultural backdrop fostered her preference for predictable routines, reliability, and close‑knit social circles, while also shaping her desire for stability in both career and personal
    life.
attributes:
  skills: '[''POS cash handling'', ''order taking'', ''food preparation'', ''food safety & sanitation'', ''inventory tracking'', ''shift scheduling'', ''team collaboration'', ''customer conflict resolution'',
