  hobbies: '[''Journaling'', ''Reading mystery novels'', ''Crocheting'', ''Home baking'', ''Walking in local parks'', ''Board game nights'', ''True crime podcasts'', ''Yoga'', ''Animal shelter volunteering'']'
  career_goals: Delores aims to transition from a crew member to a shift manager within the next year, seeking a role that offers more predictable responsibilities and the chance to mentor others. She plans
    to obtain a ServSafe Manager certification and eventually enroll in a hospitality management degree program to qualify for a store manager position. Her long‑term ambition is to secure a stable supervisory
    role in the restaurant industry that provides structured hours, enabling her to better manage her anxiety while fostering a supportive, cooperative team environment.
