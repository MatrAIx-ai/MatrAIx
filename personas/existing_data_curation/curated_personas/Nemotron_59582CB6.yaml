personas:
  professional: Cecelia Sauve is a diligent animal control officer who blends solid biological knowledge with GIS‑driven data collection, using their competitive drive to set ambitious performance benchmarks
    while their occasional disorganization forces improvisation during unpredictable field encounters.
  sports: Cecelia Sauve spends weekends defending the net for the Bountiful Barracudas volleyball league, scaling routes with the Wasatch Mountaineering Club, and cheering for the Utah Jazz, balancing competitive
    play with seasonal hikes to stay fit.
  arts: Cecelia Sauve cultivates a creative side through wildlife photography inspired by Ansel Adams, unwinds listening to indie folk duo The Head and the Heart, and occasionally attends productions of
    Shakespeare’s A Midsummer Night’s Dream at the Bountiful Community Theater.
  travel: Cecelia Sauve prefers road‑trip adventures across the American West, having driven the Pacific Coast Highway to Big Sur and dreaming of trekking Patagonia’s Torres del Paine, yet they plan trips
    around a modest budget and family obligations back in Bountiful.
  culinary: Cecelia Sauve enjoys high‑protein meals like quinoa‑black bean salads with roasted sweet potatoes, indulges in a Utah‑style fry sauce‑smeared burger on cheat days, and experiments with chili‑infused
    dog treats for the foster pups they care for.
  core: Cecelia Sauve mixes a relentless competitive streak with a deep commitment to community service, but their habit of letting paperwork pile up fuels chronic worry and occasional procrastination.
background:
  cultural: Cecelia grew up in the suburban outskirts of Bountiful, Utah, within a predominantly white, middle‑class community that values outdoor recreation, community service, and self‑reliance. Her family
    traces its roots to Northern European ancestry, and while she was exposed to the region’s LDS cultural influences, she identifies with a broadly secular outlook, emphasizing personal responsibility
    and environmental stewardship. The local culture’s emphasis on public safety, respect for wildlife, and volunteerism shaped her decision to pursue a career in animal control. She participates in neighborhood
    clean‑up events and local festivals, reflecting a strong sense of civic pride and connection to Utah’s natural landscape.
attributes:
  skills: '[''Animal handling and restraint'', ''Wildlife behavior assessment'', ''Knowledge of Utah animal welfare statutes'', ''Humane capture techniques'', ''Public safety and conflict resolution'',
    ''GIS mapping and spatial analysis'', ''Field data collection and reporting'', ''Data analysis and trend interpretation'', ''Community outreach and education'', ''First aid for animals'', ''Basic veterinary
    care knowledge'', ''Emergency response coordination'', ''Team communication and coordination'', ''Problem‑solving under pressure'', ''Use of technology (GPS, mobile data platforms)'']'
  hobbies: '[''Group hiking and trail running'', ''Rock climbing with local clubs'', ''Volunteering at animal shelters'', ''Weekend volleyball league'', ''Board game nights (strategy games)'', ''Yoga and
    mindfulness journaling'', ''Wildlife photography'', ''Drone piloting for aerial surveys'', ''Community education workshops'', ''Tech forums on GIS and drone tech'']'
  career_goals: Cecelia aims to advance within the animal control field to a supervisory or program‑manager role within the next five years. She plans to obtain certification as a Wildlife Law Enforcement
    Officer and pursue a master's degree in Conservation Biology or Environmental Policy to deepen her expertise. Her long‑term ambition is to lead a county‑wide initiative that integrates GIS‑driven population
    management with community education, reducing stray animal incidents by at least 30% within her jurisdiction. She also aspires to influence state‑level legislation on humane wildlife management and
    to mentor new recruits, leveraging her competitive drive to set performance benchmarks and foster a data‑focused culture.
