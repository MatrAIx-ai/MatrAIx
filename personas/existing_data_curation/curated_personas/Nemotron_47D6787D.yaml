personas:
  professional: Rio Castillo is a diligent teen aspiring to combine culinary arts and health services, leveraging strong organizational skills, bilingual fluency, and basic first‑aid knowledge to coordinate
    community events while planning to earn a food‑safety certificate and a medical‑assistant credential.
  sports: Rio Castillo plays forward for the Grady County Girls’ Soccer Club, looks up to the Houston Dash, and balances her fitness routine with daily jogs, weekend salsa rehearsals, and a collection of
    supportive ankle sleeves she never forgets to wear.
  arts: Rio Castillo unwinds with sketchbooks, drawing neighborhood scenes and decorative motifs inspired by Frida Kahlo, while her evenings are filled with salsa and folkloric dance practice to rhythms
    reminiscent of regional folk tunes and contemporary pop hits from Taylor Swift and Karol G.
  travel: Rio Castillo dreams of a road trip along the Gulf Coast to explore pastel‑colored seaside towns and vibrant street‑food markets, cherishes weekend visits to the state fair in Dallas, and hopes
    to backpack through the national parks of the Southwest, such as Zion and the Grand Canyon, once she saves enough from her part‑time gigs.
  culinary: Rio Castillo often prepares tamales, pozole, and spicy chilaquiles, mastering corn‑masa dough with ancho chilies and fresh cilantro, while also experimenting with churro batter and chocolate
    ganache for her friends, always organizing her pantry and timing each step with a detailed checklist.
  core: Rio Castillo merges a planner’s precision with a chef’s curiosity, spicing her teenage years with disciplined study, community volunteering, and a habit of leaving a flour‑dust trail on the kitchen
    floor after late‑night snack experiments.
background:
  cultural: Rio comes from a Mexican‑American family whose roots trace back to Veracruz, Mexico. At home, Spanish is spoken daily, and the family maintains traditions such as Día de los Muertos altars,
    Las Posadas celebrations, and a quinceañera ceremony for her older sister. Catholic values and strong family ties shape her worldview, emphasizing respect for elders and cooperation. Living in Cairo,
    Georgia, she blends Mexican customs with Southern hospitality, often preparing Mexican dishes for local church potlucks and participating in the town's annual fair. This bicultural experience enriches
    her identity, giving her a deep appreciation for cultural diversity and a desire to bridge her two worlds.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic culinary techniques (Mexican cuisine)'', ''Organizational planning and scheduling'', ''Community volunteering and event coordination'',
