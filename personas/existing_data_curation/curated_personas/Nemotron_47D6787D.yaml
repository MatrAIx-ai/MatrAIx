  hobbies: '[''Cooking and baking'', ''Salsa and folkloric dancing'', ''Drawing/sketching'', ''Soccer'', ''Reading young adult fiction'', ''Crafting (papel picado, embroidery)'', ''Volunteering at community
    center'', ''Listening to music (regional Mexican, pop)'']'
  career_goals: Rio aims to obtain her GED within the next year and enroll in a community college program that blends her interests in culinary arts and health services. In the short term, she plans to
    earn a food safety certification and a basic medical assistant certification, giving her both practical job options. Her long‑term ambition is to open a family‑run restaurant in Grady County that showcases
    authentic Mexican flavors with a Southern twist, providing a gathering place that celebrates both her heritage and her community. She also envisions a role as a bilingual liaison for local health and
    social services, helping immigrant families navigate resources while maintaining stable employment that supports her family.
