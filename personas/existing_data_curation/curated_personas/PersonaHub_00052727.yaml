persona_description: A team of engineers working on a project to design and develop robotic legs for helicopters. They are focused on minimizing the weight of the robotic legs while ensuring they can support
  the necessary loads and provide the necessary motion and control. They are dedicated to minimizing the weight of the robotic legs, and their research interests include the selection of materials for building
  lightweight legs, the design of motion and control logic for the legs, and the testing of the control logic during the flight. They are also interested in the at-sea design of the robotic legs, where
  they plan to test both the Rotor Buzz flight control logic and the option that continuously monitors pitch and roll.
