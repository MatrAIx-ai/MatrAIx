  hobbies: '[''Reading science-fiction and fantasy'', ''Photography (landscape and urban)'', ''Acoustic guitar playing'', ''Board gaming with friends'', ''Volunteering at animal shelter'']'
  career_goals: James aims to complete his bachelor’s degree in environmental studies or sociology and then work as a program coordinator for a local nonprofit focused on community health or sustainability.
    In the long term, he plans to pursue a master’s degree in public health or social work to design evidence‑based interventions that improve quality of life for underserved neighborhoods in Rochester.
    He also aspires to lead volunteer initiatives that bridge academic research with practical community action, fostering collaboration between students and local organizations.
