personas:
  professional: James Mayer is a sophomore environmental studies major whose research and analytical strengths, combined with practical skills in Excel and Tableau, enable them to coordinate volunteer programs
    at a local animal shelter while balancing coursework, board‑gaming evenings, and a budding interest in community health initiatives.
  sports: James Mayer follows the Rochester Red Wings baseball team and the Buffalo Bills football club, rides a weekend cycling club along the Finger Lakes trail, and they join intramural soccer matches
    with a close‑knit group of friends, balancing structured exercise with relaxed rides.
  arts: James Mayer devours speculative fiction by authors such as N.K. Jemisin and Neal Stephenson, strums acoustic guitar in finger‑picking style inspired by John Fahey, captures urban textures and natural
    vistas with a DSLR reminiscent of Ansel Adams, and they regularly attend indie concerts featuring Sufjan Stevens and local performances at Boxcar Theatre.
  travel: James Mayer enjoys spontaneous road trips to the Finger Lakes and occasional weekend getaways to New York City’s museums, dreams of backpacking through Iceland’s volcanic landscapes, and they
    meticulously plan travel budgets in a spreadsheet to stretch a modest student fund while favoring off‑peak visits to dodge crowds.
  culinary: James Mayer loves preparing simple, hearty dishes like quinoa‑beet salad with feta, homemade ramen broth, and occasional Margherita pizza topped with fresh basil, often sourcing kale, heirloom
    tomatoes, and locally‑roasted coffee beans, though they sometimes over‑salt meals when experimenting with new recipes.
  core: James Mayer blends a curious, analytical mind with a hands‑on, compassionate spirit, juggling studies, volunteer work, and creative hobbies while occasionally forgetting to floss and over‑budgeting
    on board games.
background:
  cultural: James comes from a white, multi‑generational American family rooted in Rochester, New York. His upbringing reflects the region’s mix of industrial heritage and progressive academic environment,
    fostering respect for hard work, community solidarity, and civic engagement. Raised in a modest, middle‑class household with Protestant cultural traditions, he was taught the values of modesty, service,
    and the importance of education. Exposure to local cultural institutions such as the Rochester Museum & Science Center and events like the Lilac Festival has given him a nuanced appreciation for both
    local history and contemporary cultural diversity.
attributes:
  skills: '[''Research and data analysis'', ''Written communication'', ''Microsoft Office and Google Workspace proficiency'', ''Data visualization (Excel, Tableau)'', ''Active listening and conflict resolution'',
