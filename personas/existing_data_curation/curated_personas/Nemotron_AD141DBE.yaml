personas:
  professional: Susan Barker, a 17-year-old aspiring graphic designer, leverages their disciplined, self-taught skills in digital illustration, photography, and basic web development to plan and execute
    school-spirit events and local craft fairs while building an online portfolio that showcases Appalachian landscapes and aims to secure freelance commissions after earning their GED.
  sports: Susan Barker, an avid hiker of the Appalachian Trail's Buchanan Ridge segment and a dedicated basketball enthusiast who practices drills at the local community gym, they follow the West Virginia
    Mountaineers men's basketball team and the Pittsburgh Steelers, and they join a regional mountain-running club where they compete in timed trail events.
  arts: Susan Barker, a watercolor painter of mountain vistas inspired by Winslow Homer and an avid collector of early-20th-century postcards, they regularly attend craft fairs to learn techniques from
    folk artist Nellie Blythe, enjoy the fiddle tunes of Bill Monroe, and experiment with digital filters in Procreate to blend traditional and modern aesthetics.
  travel: Susan Barker, who balances their school schedule with weekend hikes, they have trekked sections of the Appalachian Trail in Shenandoah National Park, visited the historic town of Bristol, Tennessee
    for a folk-music festival, and dream of completing the entire trail from Georgia to Maine as well as exploring the Canadian Rockies in Banff National Park, planning each trip with a detailed spreadsheet
    and a modest budget.
  culinary: Susan Barker, a creative cook who reimagines Appalachian staples such as sorghum-glazed cornbread, smoked pork shoulder with apple cider reduction, and bean soup enriched with black beans and
    kale, they often add unexpected ingredients like jalapeno honey and fresh rosemary, and hone their skills by mastering the perfect crumble topping for strawberry rhubarb crisp.
  core: Susan Barker, a fiercely organized teen with a competitive streak, channels their curiosity into watercolor landscapes, vintage postcard collecting, and disciplined budget-keeping, while occasionally
    neglecting sleep to polish digital art.
background:
  cultural: 'Susan grew up in Camp Creek, a small, close‑knit community in Mercer County, West Virginia. Her family traces its roots to early 19th‑century Scotch‑Irish settlers who cultivated the hillsides
    and passed down a strong sense of self‑reliance, storytelling, and reverence for the land. The region’s cultural fabric is woven from church gatherings, bluegrass music sessions, and seasonal festivals
    celebrating Appalachian craft and folklore. Susan’s upbringing was shaped by these traditions: weekly church choir rehearsals, family outings to nearby forests for foraging, and communal potlucks where
    recipes and oral histories were shared. This heritage fuels her fascination with art, her respect for local history, and her desire to preserve and reinterpret Appalachian cultural narratives through
    modern media.'
attributes:
  skills: '["Digital illustration", "Photography", "Blog writing", "Basic graphic design (Canva/Procreate)", "Event planning", "Budget management", "Time management", "Critical analysis", "Basic HTML/CSS",
    "Woodworking", "Knitting", "Competitive track training"]'
  hobbies: '["Watercolor painting", "Hiking", "Listening to bluegrass and old‑time music", "Collecting vintage postcards", "Attending craft fairs", "DIY woodworking", "Reading speculative‑fiction novels",
    "Digital art experimentation", "Basketball drills", "Cooking traditional Appalachian dishes with a twist"]'
  career_goals: Susan aims to earn her GED within the next year and enroll in a community‑college program in graphic design or visual communications. She envisions building a robust online presence that
    showcases her artwork and the unique cultural heritage of the Appalachian region, eventually securing freelance commissions and partnering with local craft markets. Her long‑term ambition is to curate
    a small gallery‑café in a nearby town where emerging Appalachian artists can exhibit their work, and to produce a documentary series that preserves oral histories and folk traditions. She also hopes
    to win regional art competitions, which would provide scholarships and further validate her competitive drive.
