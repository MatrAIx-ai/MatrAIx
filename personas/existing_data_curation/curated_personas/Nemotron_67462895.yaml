personas:
  professional: Beckham Harris is a budding engineer‑in‑training who spends afternoons constructing moving LEGO mechanisms, coding simple Scratch games, and entering local science fairs, blending a curious
    mind with a methodical, organized approach while competitively challenging teammates to improve designs.
  sports: Beckham Harris is a dedicated soccer enthusiast playing for the Champaign Soccer Club’s under‑8 team, idolizing Chicago Fire forward Derrick Lewis, practicing drills on a disciplined schedule,
    cheering for the Illinois Fighting Illini basketball team in winter, and frequently challenging friends to backyard penalty‑kick contests.
  arts: 'Beckham Harris immerses themselves in creative pursuits by building complex LEGO sets inspired by master builder Nathan Sawaya, reading adventure‑science fiction like Andy Weir’s "Artemis," humming
    "Everything Is Awesome" from The Lego Movie, and sketching scenes from Star Wars: The Clone Wars, often debating plot details with siblings.'
  travel: Beckham Harris loves weekend road‑trips that blend education and fun, such as visits to Chicago’s Museum of Science and Industry, exploring the historic Cahokia Mounds, and camping at Indiana
    Dunes, where they meticulously draw maps of each stop and plan snack breaks.
  culinary: Beckham Harris prefers kid‑friendly classics like pepperoni pizza and mac & cheese, enjoys helping a parent assemble mini tacos with shredded cheddar, diced tomatoes, and salsa, can proudly
    craft a LEGO‑shaped fruit salad using grapes, melon cubes, and blueberries, yet stubbornly refuses broccoli.
  core: Beckham Harris is a methodical, soccer‑loving LEGO builder with a competitive streak who balances curiosity with practical routines, often over‑planning games and savings while occasionally forgetting
    to eat veggies.
background:
  cultural: Beckham is a White American boy raised in Champaign, Illinois, a Midwestern community known for its friendly neighborhoods and strong emphasis on education. His family participates in local
    events such as the Champaign County fair and supports the University of Illinois' outreach programs, giving him early exposure to scientific topics. The cultural environment blends practical Midwestern
    values—hard work, community involvement—with access to a university town’s resources, fostering his curiosity and organized mindset.
