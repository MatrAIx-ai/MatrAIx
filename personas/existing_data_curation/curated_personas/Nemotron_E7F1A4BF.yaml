personas:
  professional: Elliot Perry thrives as a management analyst who blends data‑driven strategic planning with a flair for narrative storytelling, using Excel, Power BI, and Tableau to turn complex metrics
    into compelling visual decks, while their improv background fuels quick‑thinking workshops that persuade senior stakeholders and secure buy‑in for change initiatives.
  sports: Elliot Perry stays fit by joining pickup basketball games at the Lawrenceville courts, rooting for the Pittsburgh Steelers in football season and the Pittsburgh Penguins in hockey, and participates
    in a local strategy board‑gaming club that doubles as a weekly darts league, treating each match as a tactical workout.
  arts: Elliot Perry immerses themselves in the avant‑garde scene, performing acoustic originals at open‑mic nights, improvising with a local comedy troupe, and curating blog reviews that link the installations
    of Yayoi Kusama, Kehinde Wiley, and emerging street artist Vhils to business innovation, while frequenting the Mattress Factory and the Andy Warhol Museum for fresh inspiration.
  travel: Elliot Perry fuels their curiosity by traveling to historic cities like Florence, Kyoto, and Cartagena, photographing vibrant street art with a Sony A6400, and planning future trips to Oslo’s
    design museums, all while balancing a modest budget that favors weekend getaways over luxury resorts.
  culinary: Elliot Perry loves brunch, mastering avocado toast topped with poached eggs and smoked salmon, experimenting with homemade ramen broth seasoned with miso, kombu, and chashu, and savoring single‑origin
    Ethiopian coffee, though they often default to late‑night pizza delivery after rehearsals.
  core: Elliot Perry is a data‑savvy storyteller who blends analytical rigor with artistic flair, thriving on stage and in strategy meetings while juggling a competitive edge, occasional late‑night cravings,
    and an insatiable curiosity about the world.
background:
  cultural: Elliot grew up in Ambridge, a small industrial town in Allegheny County, shaped by a middle-class, white American upbringing with roots in European immigration. His family emphasized education,
    community involvement, and a respect for hard work. The region’s strong industrial heritage and vibrant local arts scene—especially the community theater and annual arts festivals—instilled in him an
    appreciation for both pragmatic problem solving and creative expression. While he identifies with mainstream American cultural values, his university experience broadened his perspective, exposing him
    to global artistic movements and diverse viewpoints that now inform his worldview.
