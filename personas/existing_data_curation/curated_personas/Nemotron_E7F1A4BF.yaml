  career_goals: Elliot aims to ascend to senior management consulting roles within the next five years, leveraging his unique blend of analytical rigor and artistic sensibility. He seeks to lead high-impact
    strategic projects that bridge business performance with creative innovation, eventually becoming a Director of Strategy for a cultural institution or a tech company with a strong design focus. To support
    this trajectory, he plans to earn a professional certification in data analytics and enroll in an MBA program, while publishing thought pieces on the intersection of art and business.
