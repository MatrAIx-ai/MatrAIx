personas:
  professional: Elizabeth Sexton is a seasoned accounting and audit leader who draws on over 25 years of GAAP and IFRS expertise, advanced Excel modeling, Power BI visualizations, SAP FICO and Oracle Financials
    fluency, and a penchant for Lean Six Sigma process improvement to translate curiosity and practicality into data‑driven strategic financial planning, and they consistently apply methodical organization
    to guide cross‑functional audit transformations.
  sports: Elizabeth Sexton enjoys weekend hikes on Great Falls Park trails as a member of the Washington Hiking Club, and they cheer for the Washington Capitals in the winter, the Washington Nationals in
    the summer, and occasionally play in a community tennis league at the local recreation center, blending seasonal outdoor activity with a love of local sports fandom.
  arts: Elizabeth Sexton regularly immerses themselves in historical fiction by Philippa Gregory and Ken Follett, attends wine‑tasting events that feature live recordings of Miles Davis, enjoys piano renditions
    of The Beatles Hey Jude in their living room, and they unwind by watching Broadway revivals starring Meryl Streep, letting artistic appreciation shape their leisure time.
  travel: Elizabeth Sexton prefers meticulously planned journeys that blend cultural immersion with culinary exploration, having recently visited the vineyards of Bordeaux, the art museums of Florence,
    and the historic streets of Charleston, while they keep a bucket list that includes the cherry blossoms of Kyoto, the Inca Trail to Machu Picchu, and weekend retreats to the Great Smoky Mountains, balancing
    limited vacation days with family responsibilities.
  culinary: Elizabeth Sexton relishes experimenting with international cuisines, often turning garden‑grown heirloom tomatoes into fresh Italian bruschetta, mastering Thai green curry with lemongrass and
    galangal, and they occasionally over‑salt a Moroccan tagine in pursuit of depth, pairing each dish with carefully selected Napa Valley wines.
  core: Elizabeth Sexton is a data‑driven accounting veteran who balances garden‑fresh meals, yoga resilience, and a love of historic novels, and they often over‑organize spreadsheets while indulging in
    spontaneous wine splurges.
background:
  cultural: Elizabeth grew up in a middle-class, white American family in the Mid-Atlantic region, with roots tracing back to Irish and German ancestry. Her upbringing emphasized hard work, community service,
    and a balanced respect for tradition and innovation. Living in Vienna, Virginia—a suburban area near Washington, D.C.—has exposed her to a diverse, educated community, shaping a pragmatic yet open-minded
    worldview. She identifies with mainstream American cultural values while also appreciating the multicultural influences of the metropolitan area, which inform her inclusive approach at work and in her
    volunteer activities.
attributes:
  skills: '["Financial reporting (GAAP/IFRS)", "Tax compliance", "Internal control design", "Risk assessment", "Audit planning and execution", "Advanced Excel modeling", "Data visualization (Power BI)",
    "SAP FICO", "Oracle Financials", "QuickBooks", "Process improvement (Lean Six Sigma basics)", "Project management", "Emerging financial technologies (AI analytics, blockchain)"]'
  hobbies: '["Gardening (vegetable and flower)", "Hiking (Great Falls Park and local trails)", "Reading historical fiction", "Book club participation", "Wine tasting events", "Volunteer tax preparation
    for low-income families", "Yoga", "Cooking international cuisines", "Board-game nights with friends", "Attending local theater performances"]'
  career_goals: She aims to move into a senior leadership role such as Chief Financial Officer or Audit Director within the next five years, leveraging her expertise to guide strategic financial planning
    and risk management. Elizabeth intends to obtain CPA certification (if not already) and a certification in data analytics, and to spearhead the integration of advanced analytics into the audit function
    of her organization. She also aspires to mentor junior accountants, develop a small-business consulting side-venture focused on sustainable financial practices, and speak at industry conferences about
    the practical application of technology in finance.
