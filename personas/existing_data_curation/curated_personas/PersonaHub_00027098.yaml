persona_description: A conservation biologist who specializes in the study of the ecological and environmental impact of human activities on ecosystems, particularly those of the Southwestern United States.
  She is particularly interested in the decline and loss of the Rio Grande cottonwood, a native tree species, and the complex interactions between the tree, its habitat, and the surrounding ecosystem. She
  is also knowledgeable about the broader impacts of human activities on the region's water resources and the ecosystems that depend on them.
