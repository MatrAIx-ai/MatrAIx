personas:
  professional: Ashley Thomas, a 21‑year‑old front‑of‑house specialist, leverages her methodical organization, polished customer service, and knack for juggling reservations and peak‑hour rushes to keep
    the bustling café running smoothly while mentoring new hosts and planning for a future floor‑supervisor role.
  sports: Ashley Thomas channels her high energy into Zumba, spin classes, and weekend hikes on the Ozark Trail, lines up with the local community‑center line‑dancing club, and cheers for the St. Louis
    Cardinals, St. Louis Blues, and Kansas City Chiefs while keeping a disciplined workout routine that balances cardio and core strength.
  arts: Ashley Thomas finds balance in contemporary fiction by authors like Sally Rooney and personal‑development reads by Brené Brown, enjoys crafting DIY décor inspired by indie artist Lisa Congdon, and
    curates indie‑folk playlists featuring Hozier and Phoebe Bridgers for her board‑game evenings.
  travel: Ashley Thomas prefers weekend road trips that blend coffee‑culture scouting with nature, having explored coffee roasters in Austin, hiked the Great River Road, and planning a future pilgrimage
    to Portland’s famed coffee scene while keeping travel costs low through shared rides and hostel stays.
  culinary: Ashley Thomas mixes a love of baking with seasonal ingredients, often whipping up basil‑infused lemon ricotta pancakes, peach crumble bars, and espresso‑enhanced chocolate brownies while perfecting
    latte art designs of hearts and ferns for her coworkers and friends.
  core: Ashley Thomas blends hyper‑organized planning with a zest for community, turning every shift, hike, and latte into a chance to connect, even if that sometimes means over‑scheduling and obsessively
    polishing their barista skills.
background:
  cultural: Ashley grew up in Neosho, Missouri, a small Midwestern town where community ties run deep. Her family traces its roots to German and Irish ancestors, reflecting the region’s historic European
    settlement. The local culture emphasizes hospitality, hard work, and neighborly support—values reinforced through church gatherings, the annual Newton County Fair, and frequent family pot‑luck dinners.
    These traditions fostered Ashley’s love for communal activities, her commitment to reliable service, and her appreciation for local cuisine and seasonal produce. Her upbringing in a close‑knit, modest
    environment has shaped her practical outlook, organized habits, and desire to give back to the community.
