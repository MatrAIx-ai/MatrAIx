  hobbies: '[''Group fitness classes'', ''Line dancing'', ''Volunteering at food bank'', ''Hiking the Ozark Trails'', ''Cooking and baking'', ''Reading contemporary fiction'', ''Herb gardening'', ''DIY
    home décor crafting'', ''Coffee tasting and latte art'', ''Board games with friends'']'
  career_goals: Ashley aims to advance from host to floor supervisor within the next year and secure a restaurant manager position within three years. She plans to complete her bachelor's degree in Hospitality
    Management, obtain ServSafe certification, and gain experience in a larger urban restaurant to broaden her skill set. Long-term, she dreams of opening a community-focused coffee shop or boutique café
    in Neosho that emphasizes sustainability, local sourcing, and a welcoming space for neighborhood gatherings. She also hopes to mentor other young hospitality workers and potentially pursue a certification
    in event planning.
