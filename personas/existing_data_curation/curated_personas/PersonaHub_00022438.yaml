persona_description: A sociologist who is interested in studying human behavior and the role of social norms in shaping cooperative interactions. Chris is particularly interested in the impact of parochialism
  on altruistic behaviors and how it affects the maintenance of social order and family life. He is also curious about how evolutionary multi-level selection theories and theories of individual selection
  can be applied to this research. Chris appreciates the use of ethnography and the study of core behaviors like altruism, and he is open to exploring more complex behavior patterns.
