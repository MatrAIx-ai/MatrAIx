  career_goals: Archie aspires to turn his creative talents into a sustainable livelihood. He aims to earn his GED within the next two years and enroll in a community college art program, with the long-term
    goal of becoming a freelance digital illustrator and graphic designer for local businesses, agricultural brands, and online clients. He also dreams of establishing an art hub in Tulia that offers workshops
    for youths, merges visual storytelling with community history, and potentially expands into animation or indie game design as he gains technical skills.
