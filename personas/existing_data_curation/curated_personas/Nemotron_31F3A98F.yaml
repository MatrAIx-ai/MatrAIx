  career_goals: Marilyn dreams of growing up to be an artist who can illustrate the natural world or a scientist who explores how things work. She often says she would like to become a wildlife illustrator,
    a marine biologist, or an inventor who creates fun gadgets for kids. She also hopes to continue helping her friends and community, maybe as a teacher or community organizer when she’s older.
