personas:
  professional: Marilyn Speedling is an aspiring junior architect who transforms LEGO bricks into imaginative townscapes while sketching backyard scenes; they bring natural curiosity and love for flexible
    play into a creative problem‑solving style that thrives on open‑ended projects.
  sports: Marilyn Speedling participates in the Summerville Youth Soccer Club’s under‑8 team during spring, cheers for the South Carolina Gamecocks football team on Saturdays, and spends summer afternoons
    swimming at the community pool, though they often forget their water bottle and end the practice feeling parched.
  arts: Marilyn Speedling immerses themselves in creative expression by sketching magnolia blossoms at the annual Summerville Art & Music Festival, singing along to upbeat hits by Taylor Swift and gospel
    hymns sung at church gatherings, and collecting prints by Mary Cassatt that inspire their own crayon portraits; they adore the blend of local tradition and contemporary pop culture.
  travel: Marilyn Speedling enjoys family road trips that blend visits to a peach orchard stand in the Lowcountry, exploring the historic streets of Charleston, and a yearly cabin retreat in the Blue Ridge
    Mountains, yet they habitually overpack plush toys, causing cramped seating on the highway.
  culinary: Marilyn Speedling shows a budding palate for Southern comfort foods by eagerly helping whisk peach cobbler batter, sprinkling fresh basil on homemade tomato soup, and mastering the perfect crispy
    chicken nugget, though they sometimes over‑salt the mashed potatoes during solo kitchen experiments.
  core: Marilyn Speedling balances a boundless curiosity for sketching backyard wildlife with a laid‑back approach to chores, they often swap a tidy LEGO set for a spontaneous creek adventure, and habitually
    leave a trail of crayons across the living room floor.
background:
  cultural: Marilyn is raised in a white, Anglo‑American family in the suburb of Summerville, South Carolina. Her upbringing reflects the gentle rhythm of the Lowcountry, where Southern hospitality, community
    church gatherings, and local traditions such as the Peach Festival and holiday parades shape her worldview. She often hears stories about the region’s history from grandparents and participates in school
    activities that celebrate local art, music, and nature. The supportive, family‑centered environment encourages her curiosity and appreciation for both traditional Southern crafts and contemporary creative
    expression.
