personas:
  professional: Ashley Arteaga, a seasoned ASE Master Technician with expertise across gasoline, diesel, hybrid, and electric powertrains, combines a data‑driven diagnostic mindset with meticulous hands‑on
    craftsmanship, and they are organized, competitive, and their drive fuels a goal to become lead technician before launching a boutique garage that champions high‑performance restorations and mentorship
    for under‑represented women.
  sports: Ashley Arteaga, an avid solo fitness enthusiast, hikes the Cascades with the local Cascades Hiking Club, rides mountain‑bike trails in the winter, keeps a competitive personal record on weekend
    trail runs, and follows the Seattle Seahawks, Seattle Sounders FC, and the Portland Trail Blazers, attending games when time permits but preferring solitary exercise.
  arts: Ashley Arteaga, a quiet connoisseur of automotive art and classic rock, spends evenings listening to Led Zeppelin, AC DC, and The Rolling Stones while sketching custom car designs inspired by Chip
    Foose, and they collect meticulously painted scale model cars, attending occasional vintage‑car exhibitions that blend engineering and aesthetic nostalgia.
  travel: Ashley Arteaga, a meticulous trip planner, maps road‑trips along the Pacific Coast Highway, savors weekend getaways to the San Juan Islands and Washington’s Yakima Valley vineyards, revisits family
    in Oaxaca for Día de los Muertos celebrations, and dreams of trekking Patagonia’s glaciers, balancing adventure with the financial realities of launching a new garage.
  culinary: Ashley Arteaga, a skilled home cook, blends traditional family recipes like tamales and mole with fresh garden produce such as cilantro, tomatillos, and heirloom tomatoes, experiments with dried
    ancho and chipotle chilies, pairs each dish with classic‑rock playlists, and they occasionally grill smoked pork shoulder over a backyard smoker.
  core: Ashley Arteaga, a disciplined yet curious 46‑year‑old master technician, channels solitary craftsmanship, data‑driven precision, and quiet ambition into a path toward entrepreneurial independence,
    and they consistently set measurable milestones.
background:
  cultural: Ashley identifies as Mexican‑American, growing up in a bilingual household where Spanish was spoken daily. Her family’s roots trace back to the state of Jalisco, and she maintains close ties
    with relatives who still live in Mexico, visiting during holidays and celebrating Día de los Muertos and Mexican Independence Day with traditional foods and music. The strong work ethic and pride in
    craftsmanship passed down from her parents shape her approach to automotive repair. In the Pacific Northwest she has navigated being one of the few Mexican women in a male‑dominant trade, drawing on
    her cultural resilience to mentor other women of color interested in the automotive field. She is active in the local Hispanic community, occasionally volunteering at car‑safety clinics that serve Spanish‑speaking
    residents.
attributes:
  skills: '["Advanced diagnostic and troubleshooting of ICE, hybrid and electric vehicles","Engine rebuilding and performance tuning","Transmission repair and fluid exchange","Brake system service and ABS
    calibration","OBD‑II and CAN‑bus analysis with software tools","Emissions testing and Washington state compliance","ASE Master Technician certification (multiple categories)","Workshop organization,
    inventory management, and work‑order tracking","Bilingual technical communication (English/Spanish)","Welding and custom metal fabrication"]'
  hobbies: '["Restoring a 1972 Chevrolet Camaro","Building scale model cars","Reading automotive engineering journals and service manuals","Hiking in the Cascade foothills","Vegetable gardening and bird‑watching","Cooking
    traditional Mexican dishes (tamales, mole, etc.)","Listening to classic rock and automotive podcasts","Woodworking – constructing custom workbenches and tool storage"]'
  career_goals: As a competitive and forward‑looking professional, Ashley aims to solidify her standing as an industry expert. Within the next 18 months she plans to obtain additional ASE Master certifications
    in hybrid and electric vehicle systems and to become the lead technician at her shop. Her longer‑term ambition is to open a boutique auto‑repair garage that specializes in high‑performance and classic‑car
    restoration, offering a welcoming space for under‑represented clients, especially women. She also intends to develop a series of Spanish‑language tutorial videos and write technical articles, positioning
    herself as a thought leader while eventually pursuing a small‑business management certificate to support her entrepreneurial goals.
