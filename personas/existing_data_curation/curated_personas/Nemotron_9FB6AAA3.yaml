  career_goals: Angela aspires to become a professional visual artist and multimedia storyteller who can merge illustration, digital design, and narrative writing. She hopes to attend a specialized arts
    high school or a summer intensive program, then pursue a degree at a top art college such as RISD or the School of Visual Arts. She envisions working as a concept artist for video games, an illustrator
    for graphic novels, or a creative director for digital media. She also wants to build an online portfolio and a YouTube channel where she shares art tutorials and critiques, aiming to stand out in national
    art competitions like the Scholastic Art & Writing Awards. Her competitive nature drives her to set ambitious milestones, such as winning a regional illustration contest by the time she graduates high
    school.
