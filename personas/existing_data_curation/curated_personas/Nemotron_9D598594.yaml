personas:
  professional: Jessica Rao, a budding mini-architect, spends hours building elaborate towers with interlocking blocks, meticulously arranging each piece, yet gleefully reconfigures them mid‑play when new
    ideas spark, showing they balance order and spontaneity.
  sports: Jessica Rao proudly plays on the Little Lions preschool soccer team, cheers for the local MLS club the City United, and enjoys weekly tumble‑time gymnastics at the community center, balancing
    energetic play with occasional quiet time in the shade, showing they thrive on both teamwork and solitary focus.
  arts: Jessica Rao immerses themselves in drawing vibrant pictures of rainbows and dinosaurs, sings along to classic Disney tunes like 'When You Wish Upon a Star', and attends a Saturday story‑time session
    featuring books by Mo Willems, letting their imagination swirl in color.
  travel: Jessica Rao loves family road trips to the nearby seaside boardwalk, eagerly counts shells at the beach, and dreams of visiting the towering Eiffel Tower after seeing it in a picture book, preferring
    short, structured outings with frequent snack breaks, because they savor a blend of adventure and routine.
  culinary: Jessica Rao prefers mac and cheese, loves crunchy carrot sticks with hummus, and can masterpiece a simple peanut‑butter‑jelly sandwich, yet often refuses broccoli, insisting on a second serving
    of strawberries for dessert, reflecting they are a selective eater with occasional indulgent cravings.
  core: Jessica Rao blends meticulous block building with spontaneous crayon splashes, treasures tiny savings, bravely tackles allergies, scores goals on the preschool soccer field, and dreams of distant
    landmarks while savoring cheesy pasta, illustrating they balance structure, creativity, and curiosity.
background:
  cultural: Jessica is raised in a white Southern family in Jonesboro, Bienville Parish, Louisiana. Her upbringing blends rural Louisiana life with the region’s Cajun and Creole influences, exposing her
    to Southern hospitality, gospel and country music, and community traditions such as church gatherings, local craft workshops, and the annual Mardi Gras celebrations. Family meals often feature classic
    Southern dishes like biscuits and gravy, while parents encourage artistic expression through weekly art classes at the community center. This cultural milieu fosters Jessica’s love of art, curiosity
    about nature, and comfort in both group activities and quiet independent play.
