  career_goals: As a four‑year‑old, Jessica often dreams about becoming a painter who fills canvases with bright animals, a teacher who reads beloved stories to classmates, or a wildlife explorer who discovers
    bugs and butterflies in the Louisiana woods. She is eager to keep learning, create art, and share her imagination with friends and family.
