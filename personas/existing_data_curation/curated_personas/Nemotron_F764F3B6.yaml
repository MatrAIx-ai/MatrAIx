    in cultural practices'']'
  hobbies: '[''Visiting art museums'', ''Watercolor and abstract painting'', ''Cooking Mexican dishes with creative variations'', ''Salsa dancing'', ''Bingo and trivia competitions'', ''Reading poetry (Spanish
    and English)'', ''Herb and chili gardening'', ''Crocheting blankets for charity'', ''Listening to Mexican folk music'', ''Walking in parks'']'
  career_goals: Blanca hopes to deepen her artistic practice by taking affordable watercolor and abstract art workshops at the local community college, aiming to exhibit a small collection at a neighborhood
    gallery. She aspires to become a volunteer coordinator for the Houston Mexican Cultural Center, overseeing festivals and workshops that showcase Mexican folk arts. She wants to author a bilingual memoir
    of her family's migration story, preserving it for future generations. She also strives to improve her digital confidence so she can host virtual storytelling sessions for seniors. Her competitive streak
    drives her to win at least one senior bingo tournament and a regional cooking contest. Managing stress, she plans to practice mindfulness through gardening and guided meditation, hoping to feel more
    balanced.
