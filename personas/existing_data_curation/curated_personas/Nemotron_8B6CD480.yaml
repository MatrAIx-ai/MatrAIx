  hobbies: '[''improv comedy'', ''street basketball'', ''digital photography'', ''visiting art galleries'', ''hip‑hop and Bollywood music'', ''creating short videos'', ''spoken word poetry'', ''competitive
    video gaming'', ''cooking South Asian recipes'', ''attending community festivals'', ''skateboarding'', ''reading graphic novels'']'
  career_goals: Gurmit aims to study communications or media production at a university and launch a personal digital‑media brand that showcases cross‑cultural art, music, and storytelling. He envisions
    working for an innovative advertising agency or a television network where he can blend his love for performance, visual media, and community outreach. Long‑term, he hopes to found his own multimedia
    production company and become a recognized event producer for multicultural festivals in the Chicago area, using his networking talent and competitive drive to create memorable experiences that bridge
    his South‑Asian heritage with contemporary American culture.
