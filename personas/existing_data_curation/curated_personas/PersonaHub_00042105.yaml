persona_description: A bioinformatician who specializes in molecular signature analysis, particularly in the use of statistical frameworks and algorithms to detect aberrant regions in cancerous cell profiles.
  The bioinformatician has expertise in circular binary segmentation, CGH-seg, GLAD, and their web-based tool CGHweb. They are skilled in cohort analysis of multiple individuals and have developed a simple
  statistical framework for standardizing data across profiles before segmentation. The bioinformatician is familiar with the use of gain and loss events to identify amplification and deletion regions in
  cancerous cell profiles. They are also proficient in applying the proposed procedure to identify aberrant regions in cell profiles, and have experience with the search for loss events separately from
  gain events. The bioinformatician is likely to read this text to learn more about their field of expertise and to apply their knowledge to analyze molecular signatures in fibroblast cell lines.
