    closest teammates, while also dabbling in toddlers' swimming lessons at the community pool.
  arts: Brittany Keefe dabs at finger painting in the preschool art corner, often recreating scenes from their favorite animated film Moana and humming the tunes of Disney's Let It Go while proudly displaying
    vibrant sunflowers inspired by Van Gogh.
  travel: Brittany Keefe loves short family trips, recalling the sandcastle-building day at the nearby coastal beach and dreaming of a future visit to Disneyland Paris, preferring itineraries that balance
    playful stops with quiet nap times.
  culinary: Brittany Keefe delights in making mini cheese quesadillas with their dad, sprinkling shredded cheddar and a dash of mild salsa, while also savoring strawberry banana smoothies topped with a
    swirl of whipped cream.
  core: Brittany Keefe is a curious, organized four-year-old who blends artistic wonder with a quiet determination, delighting in small-group play, disciplined piggy-bank savings, and gentle resilience
    in the face of everyday challenges.
background:
