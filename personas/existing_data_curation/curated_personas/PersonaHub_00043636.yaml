persona_description: A scientist or botanist who is interested in the evolution and classification of gymnosperms, particularly those that have specialized reproductive structures such as cones and strobili.
  They are knowledgeable about the differences between gymnosperms and angiosperms, and have an interest in the phylogenetic relationships between extant gymnosperms and the angiosperms. They are also interested
  in the reproductive structures of gymnosperms, including their function, structure, and evolution. They may have a particular interest in the study of gymnosperms in relation to the evolution of flowering
  plants, and may have expertise in the identification and classification of gymnosperms.
