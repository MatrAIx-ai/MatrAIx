  hobbies: '[''Sketching and painting'', ''Playing soccer'', ''Exploring virtual reality games'', ''Reading graphic novels and vintage comic books'', ''Attending local art workshops'', ''Listening to modern
    R&B and neo-soul music'']'
  career_goals: Korrina aspires to become a multimedia artist who merges visual storytelling with interactive technology. She envisions a future as a concept artist or UI/UX designer for video games and
    digital platforms, aiming to create immersive experiences that challenge traditional narratives. To achieve this, she plans to attend a specialized high school with a strong arts and technology curriculum,
    secure scholarships for summer coding and art workshops, and build a robust portfolio that showcases her unique blend of artistic vision and technical skill. She also hopes to mentor younger students
    in her community, fostering creativity and encouraging underrepresented youth to pursue careers in digital art and tech.
