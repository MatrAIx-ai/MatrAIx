personas:
  professional: Korrina Brown, a 13‑year‑old aspiring digital illustrator, channels their curiosity for graphic novels and street art into disciplined sketch‑daily routines, and they translate their competitive
    edge into bold, color‑rich character designs that aim for future comic‑book publication.
  sports: Korrina Brown plays for the Selma Youth Soccer Club, idolizing North Carolina FC and Manchester City for their dynamic midfield play, and they spend weekends balancing drills with casual pick‑up
    games at the local park, using soccer as a release from screen time.
  arts: Korrina Brown immerses in the world of graphic novels, drawing inspiration from artists like Alex Ross, Marjane Satrapi, and the graffiti murals of Banksy, while listening to neo‑soul icons such
    as H.E.R. and Anderson .Paak to fuel their sketching sessions, and they regularly contribute to the community art workshops hosted by the local church hall.
  travel: Korrina Brown dreams of visiting the historic streets of Charleston, the bustling art districts of New York City’s Chelsea, and the ancient ruins of Savannah’s historic district, planning trips
    with their family around school holidays and they use a travel journal to sketch each locale, though budget constraints keep overseas adventures for later years.
  culinary: Korrina Brown loves the tangy zest of collard greens, the buttery smoothness of shrimp and grits, and the sweet comfort of peach cobbler, often experimenting by adding smoked paprika to mac and cheese,
    and they currently hover at a confident beginner level in cooking, frequently trying new recipes from their grandmother’s handwritten cookbook.
  core: Korrina Brown is a fiercely curious teen artist who balances sketchbooks with soccer cleats, saves diligently for creative gadgets, and they navigate health, culture, and ambition with a competitive,
    slightly perfectionist streak.
background:
  cultural: Korrina is rooted in her African American heritage, which influences her artistic perspective and community involvement. Growing up in Selma, North Carolina, she participates in family gatherings
    that emphasize storytelling, music, and food traditions typical of Southern Black culture. She celebrates cultural events such as Juneteenth and Black History Month, often creating artwork that honors
    notable figures and historical narratives. The support of her church community and local mentors provides her with role models who encourage academic and creative excellence. These cultural experiences
    enrich her creative voice, prompting her to incorporate themes of resilience and empowerment into her art.
