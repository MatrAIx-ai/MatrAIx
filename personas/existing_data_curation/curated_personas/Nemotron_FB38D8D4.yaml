    and mentorship'']'
  hobbies: '[''Morning jogging along the Rio Grande Trail'', ''Weekend hiking in the Sandia Mountains'', ''Assembling model airplane kits'', ''Cooking healthy southwestern meals'', ''Volunteering at the
    local food pantry'', ''Reading non‑fiction on productivity and psychology'', ''Playing strategy video games (e.g., Civilization VI)'', ''Practicing basic Spanish'']'
  career_goals: Cain aims to build a stable, upward‑moving career in customer experience. Over the next 18‑24 months he plans to secure a Team Lead position on his current call‑center, where he can mentor
    colleagues and oversee quality‑control metrics. He is enrolling in online courses to complete a Bachelor’s degree in Business Administration and is pursuing the Certified Customer Service Professional
    (CCSP) credential. In the longer term, he hopes to become a Customer Operations Manager, overseeing multiple service teams and shaping service policies that prioritize consistency and customer satisfaction.
    Throughout his progression he wants to remain in roles that let him help people directly and contribute to a harmonious workplace.
