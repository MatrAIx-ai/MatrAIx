persona_description: A network administrator who is responsible for configuring and managing redundant network devices, specifically in the context of load-sharing and switchover scenarios. This individual
  is skilled in configuring redundancy groups (RGs) and is proficient in using control links, data synchronization links, and hello messages to determine the pairs of interfaces affected by switchover events.
  The persona is also knowledgeable in configuring priority settings and thresholds to determine when switchover occurs, and is adept at handling syslog entries to monitor and troubleshoot network failures.
