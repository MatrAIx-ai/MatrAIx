  career_goals: Kavita aspires to move into senior finance leadership within the next five years, aiming for roles such as Director of Finance or Chief Financial Officer in a mid‑size firm. She also plans
    to obtain a Certified Financial Planner (CFP) credential to deepen her advisory capabilities. Beyond title advancement, she is passionate about mentoring younger South Asian women entering the financial
    sector and launching a community‑focused financial‑literacy program that empowers immigrant entrepreneurs.
