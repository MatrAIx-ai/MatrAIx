personas:
  professional: Kavita Dhar is a senior finance professional who combines over twenty years of budgeting, cash‑flow analysis, and strategic modeling with bilingual communication skills to lead a disciplined
    team, championing process efficiency while mentoring emerging women who share her cultural background and nurturing a collaborative, achievement‑driven workplace culture.
  sports: Kavita Dhar enjoys weekly bowling league nights, follows the New York Knicks and New York Yankees with fervor, practices seasonal yoga for flexibility, and participates in a summer recreational
    soccer team, blending competitive spirit with community‑oriented fitness.
  arts: Kavita Dhar engages in Bollywood dance classes, admires icons such as Madhuri Dixit and A.R. Rahman, regularly attends Broadway productions like "Hamilton" and local cultural festivals, weaving
    cinematic rhythm and theatrical storytelling into their creative downtime.
  travel: Kavita Dhar prefers meticulously planned trips that balance family reunions and personal discovery, having explored London's historic districts, the sunlit islands of Santorini, and weekend retreats
    to the Catskill Mountains, while dreaming of a solo pilgrimage to the Himalayan foothills to deepen her spiritual practice.
  culinary: Kavita Dhar is a skilled home chef who expertly crafts traditional dishes such as dal makhani, paneer tikka, and khandvi for vibrant gatherings, yet sometimes over‑spices experimental masala
    tacos, showcasing a love for culinary heritage blended with daring flavor twists.
  core: Kavita Dhar blends spreadsheet precision with a passion for communal feasts, uses yoga to counter work‑driven stress, and despite a tendency to over‑commit socially, they maintain disciplined financial
    habits and a curiosity that drives both professional ambition and personal growth.
background:
  cultural: Kavita is a first‑generation American whose parents emigrated from Gujarat, India, to New York in the early 1980s. Raised in a close‑knit South Asian neighborhood in Queens, she grew up immersed
    in Gujarati customs, language, and values such as family cohesion, respect for elders, and the importance of communal celebrations like Diwali and Navratri. While she embraces her Indian heritage—through
    language, cuisine, and religious observances—she also integrates the multicultural vibrancy of Elmhurst, fostering a hybrid identity that balances tradition with the dynamism of urban American life.
