  hobbies: '[''Gardening'', ''Book club'', ''Community theater'', ''Church choir'', ''Cooking Southern recipes'', ''Walking/hiking'', ''Genealogy research'', ''Volunteering at the library'', ''Bridge'',
    ''Knitting'', ''Crossword puzzles'']'
  career_goals: Even at 80, Matel remains driven to leave a lasting educational legacy. She aims to volunteer as a reading tutor for at‑risk youth, establishing an after‑school program that blends academic
    support with life‑skills workshops. She plans to mentor retiring teachers and guide new educators through a community‑based coaching circle. Writing a memoir that captures her journey through desegregation,
    curriculum changes, and community building is a personal ambition. She also aspires to serve on the Pitt County School Board to advocate for inclusive policies, mental‑health resources for students,
    and intergenerational learning projects that connect seniors with schoolchildren.
