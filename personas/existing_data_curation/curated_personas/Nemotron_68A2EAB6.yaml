  hobbies: '[''Visiting art galleries and museums'', ''Traditional beadwork and pottery'', ''Reading about Indigenous history and Southwest culture'', ''Community storytelling and oral history projects'',
    ''Hiking and birdwatching in the Sonoran Desert'', ''Digital photography and online courses'', ''Cooking traditional and fusion recipes'', ''Gardening native plants'']'
  career_goals: Concepcion aims to leverage her decades of experience to become a trusted mentor and educator within her agency and the broader Native American community. Over the next few years she plans
    to obtain the Certified Insurance Counselor (CIC) designation, develop and lead a series of workshops on insurance literacy for seniors and tribal members, and gradually shift to a part-time consulting
    role focused on culturally-responsive insurance solutions. She also hopes to document her insights in a guidebook to help younger agents navigate the intersection of cultural sensitivity and sales excellence,
    ultimately leaving a lasting impact on both her profession and her community.
