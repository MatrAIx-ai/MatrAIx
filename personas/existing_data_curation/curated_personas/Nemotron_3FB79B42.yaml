personas:
  professional: Andrea Mitchem is a versatile full‑stack developer who blends a production‑focused mindset with a curiosity for emerging tech, writing clean JavaScript and Python code, debugging legacy
    systems, and building rapid prototypes while navigating their own tendency toward disorganization and stress‑induced worry.
  sports: Andrea Mitchem is an avid hiker who explores the sandhills and prairie trails near Scribner, occasionally joins the local running club for weekend trail runs, roots for the Nebraska Cornhuskers
    football team, and maintains a modest membership at the community gym to balance solitary outdoor activity with occasional team sports.
  arts: Andrea Mitchem is a sci‑fi aficionado who devours novels by Neal Stephenson, Liu Cixin, and Margaret Atwood, listens to indie folk artists like Sufjan Stevens and Phoebe Bridgers while tinkering
    with Arduino‑driven light installations, and attends the annual Scribner Arts Festival to support local theater and visual arts.
  travel: Andrea Mitchem is a low‑key traveler who prefers spontaneous road trips to Midwestern state parks such as Badlands and Cuyahoga Valley, occasionally saves for a budget‑friendly overseas adventure
    to Kyoto to explore Japanese street food, but balances travel ambitions with a modest travel budget and a need for flexible planning to avoid stress.
  culinary: Andrea Mitchem is an experimental home cook who reinvents Midwest comfort dishes like mac and cheese with kimchi, deep‑dish pizza with harissa, and fried chicken glazed with gochujang, enjoys
    sourcing fresh ingredients at farmers' markets, and uses a Raspberry Pi‑controlled sous‑vide setup to perfect temperature‑sensitive recipes.
  core: Andrea Mitchem is a curiosity‑driven full‑stack developer who combats chronic worry with hands‑on tinkering, hiking, and culinary experiments, while juggling a competitive edge, occasional disorganization,
    and a quest for balanced well‑being.
background:
  cultural: Andrea grew up in a small farming community in Dodge County, Nebraska, with German‑Scandinavian ancestry typical of the region. Her upbringing emphasized self‑reliance, modesty, and a pragmatic
    work ethic, values that continue to shape her professional approach. While she cherishes the close‑knit community traditions—church gatherings, farmers' markets, and volunteer events—she also feels
    at home in the broader digital culture of software development. This blend of Midwestern practicality and a curiosity for new ideas informs her balanced perspective on both personal life and career.
attributes:
  skills: '[''JavaScript (Node.js, React)'', ''Python (Django, Flask)'', ''SQL (PostgreSQL, MySQL)'', ''Git version control'', ''Automated testing (PyTest, Jest)'', ''CI/CD pipelines (GitHub Actions, Jenkins)'',
    ''Debugging and performance optimization'', ''Legacy code refactoring'', ''Serverless architecture (AWS Lambda)'']'
  hobbies: '[''Raspberry Pi and Arduino tinkering'', ''Hiking (Nebraska sandhills & prairie trails)'', ''Cooking (Midwest comfort food with global twists)'', ''Reading (science fiction, psychology)'', ''Local
    low‑key coding meetup'', ''Personal tech and wellness blog'', ''Gardening (vegetable patch)'']'
  career_goals: Andrea aims to progress to a technical lead or software architect position within the next five years, where she can shape system design while mentoring junior developers. She wants to deepen
    her expertise in cloud platforms (AWS, Azure) and champion initiatives that blend innovative approaches with proven, reliable practices. Recognizing her tendency toward stress, she seeks a role that
    offers clearer project boundaries, supportive team dynamics, and opportunities for professional growth without sacrificing personal well‑being. Ultimately, she hopes to lead a balanced, high‑impact
    engineering team that values both creativity and pragmatic delivery.
