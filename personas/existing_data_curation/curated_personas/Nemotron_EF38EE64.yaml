personas:
  professional: Karina Lewis, a seasoned precision‑instrument repair specialist with over three decades of electronics expertise, combines meticulous calibration skills, ISO‑compliant documentation, and
    a flair for artistic problem‑solving to mentor junior technicians, lead regional service teams, and develop innovative equipment‑repurposing workshops.
  sports: Karina Lewis, an avid hiker of the Ozark trails and member of a local bird‑watching club, supports the St. Louis Cardinals baseball team, participates in a community volleyball league on weekends,
    and embraces seasonal trail runs, though they occasionally overestimate stamina on steep climbs.
  arts: Karina Lewis, a watercolor and ceramics enthusiast who frequents gallery openings, draws creative inspiration from Georgia O'Keeffe and Yayoi Kusama, sings mezzo‑soprano in a mixed‑age community
    choir covering songs from Leonard Cohen to Adele, and repurposes vintage scientific equipment into kinetic art installations.
  travel: Karina Lewis, a 53‑year‑old explorer, plans meticulously structured road trips to national parks such as Yellowstone and Grand Teton, enjoys weekend getaways to Asheville’s craft breweries, embarks
    on an annual art pilgrimage to Florence, Italy, and balances these adventures with a modest travel budget and family commitments.
  culinary: Karina Lewis, a farm‑to‑table cooking enthusiast, often prepares roasted beet and goat‑cheese salads, herb‑infused grilled salmon, and homemade kimchi using vegetables from their backyard garden,
    while experimenting with matcha‑flavored watercolors for dessert plating, though they sometimes over‑season dishes when excitement takes over.
  core: Karina Lewis, a curious calibration veteran with a passion for art and community, balances meticulous technical work with vibrant hobbies, never misses a bird‑watching call, and occasionally trades
    late‑night coffee for a stray vintage screwdriver.
background:
  cultural: Karina grew up in a small Midwestern town in the Ozarks of Missouri, where community ties and self‑reliance are deeply valued. Her upbringing fostered a pragmatic work ethic, respect for local
    traditions, and an appreciation for the natural landscape that surrounds Stone County. While identifying as White, she embraces the region’s multicultural heritage through participation in county fairs,
    local art festivals, and volunteer initiatives that bring together residents of diverse backgrounds. The blend of rugged rural life and close‑knit community support has shaped her collaborative spirit,
    her commitment to lifelong learning, and her enthusiasm for sharing knowledge both in the workshop and in community settings.
attributes:
  skills: '[''Precision Calibration of Scientific and Medical Instruments'', ''Electrical and Mechanical Troubleshooting'', ''Schematic Diagram Interpretation'', ''PCB Rework and Assembly'', ''Embedded
    Controller and PLC Programming'', ''Metrology Tool Operation (Laser Interferometry, Micrometry)'', ''ISO 9001 & ISO/IEC 17025 Compliance'', ''Preventive Maintenance Scheduling'', ''Root‑Cause Failure
    Analysis'', ''Vendor Liaison and Parts Procurement'', ''Technical Documentation and Audit Reporting'', ''Mentoring and Training of Junior Technicians'']'
  hobbies: '[''Watercolor Painting'', ''Ceramics'', ''Gallery Visits'', ''Hiking the Ozark Trails'', ''Macro Photography'', ''Bird‑Watching Club'', ''Volunteer Demonstrator at Science Museum'', ''Hosting
    Game Nights'', ''Singing in Community Choir'', ''Gardening'', ''Reading Historical Fiction'', ''Book Club Participation'']'
  career_goals: Karina aims to transition into a senior technical specialist role where she can lead a regional service team and shape calibration standards for a network of laboratories. She plans to earn
    the Certified Calibration Technician (CCT) and Certified Maintenance & Reliability Professional (CMRP) credentials to formalize her expertise. Over the next five years she hopes to launch a part‑time
    consulting practice offering on‑site calibration and equipment optimization services to rural clinics and research facilities. Passionate about education, she also envisions developing a community workshop
    series at the local maker space, merging her technical knowledge with her love for art by teaching participants how to repurpose vintage equipment into functional art pieces.
