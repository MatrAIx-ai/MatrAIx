  career_goals: Julian aims to translate his love for structure and reliability into a stable, long‑term career. His immediate goal is to earn his GED within the next two years, after which he plans to
    enroll in a vocational program at a local community college to become a certified automotive technician. He is drawn to the clear progression paths and hands‑on problem‑solving of the trade, and hopes
    to eventually open a small, family‑run auto‑repair shop that can serve the Houston Hispanic community. Recognizing his bilingual ability and caring disposition, Julian also envisions taking certification
    courses in customer service or community liaison work, allowing him to assist non‑English‑speaking residents with navigating local services. Throughout his career development, he values predictable
    schedules, clear expectations, and the opportunity to contribute positively to his family’s financial security.
