persona_description: A game designer who specializes in creating educational games for babies and toddlers, particularly those that use interesting visuals, interactive elements, and music to make learning
  fun and engaging. They have a deep understanding of cognitive development and how to use game mechanics to support learning in the early stages of language acquisition. Their goal is to create games that
  not only entertain but also help babies and toddlers develop their skills in reading, writing, and other areas of language and literacy. They have experience designing games that use visual cues, sound
  effects, and physical interaction to help babies learn and retain information. They are constantly experimenting with new game mechanics and technologies to create innovative and effective learning tools
  for babies.
