personas:
  professional: Yun Tan, an 11-year-old budding robotics enthusiast, blends a love for precise engineering with a spontaneous knack for tinkering as they assemble and program simple machines for the school
    club, often prioritizing fun over meticulous documentation and occasionally missing deadlines because organization feels restrictive.
  sports: Yun Tan, a regular participant on the Riverdale Rangers youth soccer team, thrives on the clear structure of scheduled Saturday matches and follows the professional City United FC, yet they sometimes
    wander off to the park's climbing wall, delaying drills because a spur-of-the-moment adventure feels more appealing.
  arts: 'Yun Tan, an avid anime artist, spends evenings sketching characters from My Hero Academia while looping BTS tracks and binge-watching Avatar: The Last Airbender, often losing track of time in creative
    bursts that clash with their need to complete school assignments on schedule.'
  travel: Yun Tan, who has visited the coastal boardwalk of Haeundae and taken a dream trip to Tokyo's Akihabara district, prefers detailed itineraries for theme-park tickets but frequently deviates to
    explore hidden manga shops on a whim, mixing careful planning with spontaneous discoveries.
  culinary: Yun Tan enjoys stirring kimchi fried rice with crunchy kimchi, egg, and gochujang and rolling pork-and-cabbage dumplings, yet they often pause to sketch anime characters, leaving the kitchen
    a bit messy and the family laughing at their playful, slightly chaotic cooking style.
  core: Yun Tan is an 11-year-old who merges methodical robotics projects with spontaneous Minecraft builds, saves allowance in a piggy bank while splurging on surprise K-pop merch, tackles mild allergies
    and occasional wrist strain, balances disciplined soccer practice with impromptu park explorations, draws anime characters while listening to pop hits, dreams of future travel, and cooks family dishes
    with a messy, creative flair.
background:
  cultural: Yun is a second‑generation East Asian American raised in San Jose's diverse community. His parents immigrated from Korea (or China) and maintain many family traditions, such as celebrating Lunar
    New Year, Chuseok (or Mid‑Autumn Festival), and preparing holiday foods together. At home, bilingual conversations blend English with Korean (or Mandarin), fostering cultural fluency. The family values
    education, respect for elders, and community involvement, while also encouraging Yun to explore his individual interests. Living near Silicon Valley exposes him to cutting‑edge technology and a multicultural
    environment that shapes his identity as a proud East Asian American.
