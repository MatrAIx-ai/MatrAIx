  career_goals: Yun dreams of creating his own video games or apps one day, inspired by the tech culture of Silicon Valley. He hopes to study computer science in high school and later attend a university
    known for engineering, aiming to become a software developer or game designer. He also imagines building interactive robots, so a future in robotics engineering is appealing. While still young, he is
    eager to explore different STEM pathways and looks forward to opportunities that blend creativity with technology.
