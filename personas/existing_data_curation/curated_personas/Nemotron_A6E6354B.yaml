personas:
  professional: Katie Williams is an aspiring digital artist and storyteller who blends methodical planning with vivid imagination to craft desert‑inspired illustrations and narrative worlds, thriving as
    the lively center of their school’s drama and debate scenes, where they effortlessly command attention.
  sports: Katie Williams enjoys hiking the nearby desert trails and plays forward for the Desert Rattlers youth soccer league in the fall, while cheering on the Arizona Diamondbacks and Phoenix Suns, approaching
    fitness with a competitive edge that mirrors their chess battles.
  arts: Katie Williams immerses themselves in creating vivid desert paintings reminiscent of Georgia O'Keeffe, crafting digital fan art of Brandon Sanderson’s Mistborn characters, practicing piano pieces
    by Ludovico Einaudi, and drawing theatrical inspiration from Lin‑Manuel Miranda’s musical numbers.
  travel: Katie Williams loves weekend hikes to the nearby Sonoran Desert but dreams of exploring Monument Valley’s towering sandstone arches and the medieval castles of Scotland, planning each adventure
    with meticulous checklists and a photographer’s eye for dramatic landscapes.
  culinary: Katie Williams favors spicy chicken tacos topped with fresh cilantro and lime, enjoys experimenting with homemade pizza dough and mozzarella with sun‑dried tomatoes, snacks on dehydrated mango
    and cactus pear, yet habitually leaves the kitchen a mess after cooking.
  core: Katie Williams is a fiercely imaginative, competition‑driven 11‑year‑old who can spend hours building elaborate LEGO kingdoms, yet habitually leaves sketchbooks scattered across the house and thrives
    on being the center of any drama club scene, where they love to command the audience.
background:
  cultural: Katie was raised in a middle‑class family in Douglas, Arizona, a small town on the U.S.–Mexico border. Her upbringing blends classic Southwest values—appreciation for the wide desert scenery,
    community fairs, and outdoor recreation—with exposure to the multicultural atmosphere of the region, including occasional Spanish language and cuisine at local events. Her family celebrates typical
    American holidays and participates in community traditions such as the Douglas Balloon Festival and school volunteer programs, fostering a strong sense of neighborhood connectedness and cultural awareness.
attributes:
