  career_goals: Katie dreams of becoming a multidisciplinary creative professional—such as a concept artist or video game designer—who can blend storytelling, visual art, and interactive technology. She
    aims to master advanced digital art tools, study game development, and eventually lead a studio that creates immersive, narrative‑driven experiences. In the long term, she hopes to launch a youth art
    and tech program in Douglas to give other kids opportunities to explore imagination and innovation.
