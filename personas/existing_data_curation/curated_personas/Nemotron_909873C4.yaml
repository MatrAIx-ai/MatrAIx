personas:
  professional: Bertha Payne, a community arts facilitator with a flair for organizing intimate watercolor, horticulture, and local‑history workshops, leverages their meticulous budgeting skills and natural
    empathy to create harmonious yet flexible learning experiences for small groups.
  sports: Bertha Payne enjoys morning river walks and weekly paddle‑boarding with the Pasquotank River Paddle Club, roots for the Carolina Hurricanes in hockey and follows the NC State Wolfpack basketball
    season, and they play in a recreational tennis league at the Elizabeth City Community Center.
  arts: Bertha Payne immerses themselves in watercolor painting inspired by Andrew Wyeth’s muted palettes and Mary Whyte’s river scenes, curates monthly photo exhibitions that echo Ansel Adams’s black‑and‑white
    vistas, and unwinds to the folk sounds of The Avett Brothers while revisiting classic films starring Tom Hanks.
  travel: Bertha Payne favors thoughtfully planned weekend escapes that blend quiet reflection with cultural immersion, frequently exploring nearby treasures like the Outer Banks and historic Bath, while
    dreaming of extended journeys to Lisbon’s pastel‑colored alleys, Kyoto’s serene gardens, and the sun‑kissed cliffs of Dubrovnik.
  culinary: Bertha Payne is a seasoned home cook who perfects soulful Southern staples such as shrimp and grits, collard greens slow‑cooked with smoked turkey, and honey‑glazed sweet‑potato bisque seasoned
    with fresh thyme and rosemary, often adding a daring pinch of chipotle to their cornbread and sourcing heirloom tomatoes and garden herbs for every dish.
  core: Bertha Payne blends a quiet, methodical love for community art with an insatiable habit of collecting vintage camera lenses that sometimes tip their budget, finds peace sketching riverside at dawn,
    yet they can let perfectionism stall a painting until the perfect light fades.
background:
  cultural: Bertha is rooted in a close‑knit African‑American community in the Outer Banks region of North Carolina. Raised in a family that values church, gospel music, and oral storytelling, she grew
    up attending the First Baptist Church where she learned the importance of service and fellowship. Her grandparents were part of the Great Migration, bringing Southern traditions and resilience to the
    area. Family gatherings often feature collard greens, cornbread, and sweet potato pie, and celebrations include Juneteenth and Emancipation Day. Bertha is knowledgeable about the local Black heritage
    of Pasquotank County, including historic neighborhoods like the Hogsback community. This cultural foundation informs her appreciation for African‑American art, literature, and the collective memory
    of her community.
attributes:
  skills: '[''Community workshop facilitation'', ''Art appreciation and critique'', ''Basic photography and Lightroom editing'', ''Digital literacy (Microsoft Office, email, social media)'', ''Household
    budgeting and organization'', ''Conflict mediation and active listening'', ''Gardening and horticulture'', ''Culinary skills (Southern and soul food)'']'
  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading (fiction, poetry, African-American literature)'', ''Gardening (herbs, native flowers)'', ''Cooking soulful Southern dishes'', ''Local
    history research'', ''Walking and nature observation along the Pasquotank River'', ''Participating in small community art workshops'']'
  career_goals: Bertha aims to complete her associate degree in early childhood education or community arts, leveraging her love for learning and youth mentorship. She aspires to secure a part‑time position
    at the Elizabeth City public library or the local community center where she can design and run arts‑based programs. Long‑term, she envisions launching a home‑based business selling handcrafted items
    and printed photographs that celebrate the cultural heritage of Eastern North Carolina. Additionally, she hopes to become a cultural liaison for local Black history projects, helping to document and
    share stories of her community with younger generations.
