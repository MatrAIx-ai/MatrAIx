  career_goals: Martha aims to leverage her extensive clinical background to assume a senior leadership role within the radiology department, such as Imaging Services Manager or Radiation Safety Officer.
    She plans to obtain board-level certification in MRI physics and spearhead a department-wide initiative to reduce radiation dose while preserving diagnostic quality. Over the next five years, she hopes
    to publish a series of case studies on low-dose protocol development in peer-reviewed journals and to formalize a mentorship program for new technologists. Ultimately, she envisions transitioning to
    part-time consulting, helping community hospitals adopt innovative imaging workflows and integrating artistic visual concepts into patient education materials.
