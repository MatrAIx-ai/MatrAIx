  hobbies: '[''Quilting'', ''Gardening'', ''Reading historical fiction'', ''Walking her dog'', ''Volunteering at senior center'', ''Attending farmers’ markets'', ''Collecting vintage postcards'']'
  career_goals: While approaching retirement age, Lindy aims to transition from full‑time factory work to a part‑time mentoring role, teaching sewing fundamentals to community‑college students and local
    hobbyists. She is curious about sustainable fabrics and hopes to incorporate eco‑friendly techniques into a small home‑based custom alteration service. Ultimately, she would like to compile a ‘Practical
    Sewing Handbook’ that blends traditional methods with modern innovations, sharing her expertise while maintaining a flexible schedule that respects her love of spontaneity.
