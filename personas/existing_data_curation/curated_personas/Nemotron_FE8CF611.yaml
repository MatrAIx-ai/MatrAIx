personas:
  professional: Jammie Addison is a detail‑oriented electrical engineer who leverages MATLAB and Python to design robust circuit boards, applies Lean Six Sigma to streamline renewable energy projects, and
    balances curiosity about emerging technologies with practical project planning to mentor diverse teams on the road to a PE license.
  sports: Jammie Addison’s fitness routine blends weekly hikes through the Texas Hill Country with sunrise yoga sessions, membership in the Hill Country Hiking Club, occasional pickup volleyball in the
    summer, and avid support for the Dallas Cowboys, Dallas Mavericks, and Texas Rangers.
  arts: Jammie Addison expresses creativity by playing acoustic guitar at informal gatherings, drawing inspiration from John Mayer and Norah Jones, while also devouring sci‑fi works by Isaac Asimov and
    N.K. Jemisin and attending performances at the AT&T Performing Arts Center featuring the Dallas Symphony Orchestra.
  travel: Jammie Addison prefers a mix of structured itineraries and spontaneous detours, having trekked the rainforest of Costa Rica, explored the historic streets of New Orleans during Mardi Gras, and
    dreamed of witnessing the aurora borealis in Reykjavik while balancing a modest travel budget and occasional family commitments.
  culinary: Jammie Addison’s kitchen is a laboratory where they expertly prepare Southern comfort dishes like shrimp and grits and Caribbean‑inspired jerk chicken, experimenting with ingredients such as
    smoked paprika, coconut milk, and Scotch bonnet peppers, while sharing meals with friends over playlists of mellow acoustic tunes.
  core: Jammie Addison is a methodical engineer who balances a curiosity for futuristic tech with a love for Southern and Caribbean cooking, hikes, guitar strums, and a disciplined approach to finances
    and wellness, even if they sometimes burn the occasional dinner.
background:
  cultural: Jammie grew up in a close‑knit African‑American family in the Dallas metro area where church, music, and community service were central values. Her upbringing emphasized academic excellence
    and giving back, which inspired her pursuit of a graduate degree in STEM. She remains connected to her cultural roots through participation in local Black cultural events, church choirs, and support
    networks like the Dallas chapter of NSBE. These experiences inform her collaborative work style, her commitment to mentorship, and her appreciation for blending tradition with innovation.
attributes:
  skills: '[''Project Management'', ''Circuit Design'', ''Python Programming'', ''MATLAB'', ''Finite Element Analysis'', ''AutoCAD'', ''Technical Writing'', ''Lean Six Sigma'', ''Team Leadership'']'
  hobbies: '[''Reading science-fiction novels'', ''STEM mentorship volunteering'', ''Cooking Southern and Caribbean dishes'', ''Yoga and meditation'', ''Hiking in Texas Hill Country'', ''Traveling to cultural
    festivals'', ''Playing acoustic guitar'']'
  career_goals: Jammie aims to become a senior engineer leading innovative projects in renewable energy systems and smart infrastructure within the Dallas‑Fort Worth region. She plans to earn her Professional
    Engineer (PE) license, deepen her expertise in sustainable design, and eventually transition into an engineering management role where she can mentor diverse talent. Additionally, she seeks to contribute
    to professional societies such as the National Society of Black Engineers, advocating for greater inclusion and representation in STEM fields.
