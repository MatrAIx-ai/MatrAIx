  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Genealogy research'', ''Book club participation'', ''Quilting'', ''Crocheting'', ''Cooking'', ''Church social events'', ''Bridge'', ''Nature
    walks'']'
  career_goals: Although retired, Melissa aims to deepen her impact as a volunteer leader. She plans to launch a quarterly intergenerational storytelling series at the local library, mentor new volunteers
    in event management, and compile a family cookbook that blends traditional Southern recipes with health‑conscious tweaks. She also hopes to document the genealogy of her Cornelius roots, preserving
    local history for future generations while staying active, engaged, and supportive of her community.
