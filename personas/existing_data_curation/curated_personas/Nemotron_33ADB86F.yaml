  hobbies: '[''Hiking'', ''Recreational Basketball'', ''Trivia Nights'', ''Community Theater'', ''Volunteer Tutoring'', ''Book Club'', ''DIY Home Improvement'', ''Cooking'', ''Cycling'', ''Chess Club'']'
  career_goals: Robert aims to re‑enter the education field as a freelance consultant, helping Spokane schools and community organizations create practical, research‑backed curricula. He aspires to publish
    a guide on balancing innovative teaching methods with real‑world constraints, and to become a sought‑after speaker at regional education conferences. In the longer term, he dreams of launching a non‑profit
    that offers after‑school STEM programs for underserved youth, positioning himself as a leader who combines curiosity, practicality, and competitive drive to make measurable impact.
