personas:
  professional: Robert Eddy is an experienced instructional designer and educational consultant who leverages their analytical rigor, organized methodology, and sociable charisma to craft data‑driven curricula
    for Spokane schools while navigating competitive grant landscapes.
  sports: Robert Eddy is a regular member of the Spokane Sprinters cycling club, competes in a local recreational basketball league, and spends weekends tackling the Cascades’ trails while cheering for
    the Spokane Chiefs hockey team.
  arts: Robert Eddy participates in Spokane Civic Theatre both onstage as a supporting actor and behind the scenes designing sets, while also attending weekly improv nights featuring performer Tim D'Angelo
    and playing chess at the Riverfront Chess Club.
  travel: Robert Eddy prefers meticulously planned weekend getaways, favoring nearby escapes to Leavenworth and the North Cascades for hikes, and dreams of a summer road trip through the Canadian Rockies,
    especially Banff and Lake Louise.
  culinary: Robert Eddy experiments with sous‑vide salmon and foraged mushroom risotto, frequently sourcing wild Pacific Northwest ingredients like cedar‑plank wood chips and locally brewed IPAs to pair
    with their homemade sourdough.
  core: Robert Eddy blends a competitive curiosity with methodical pragmatism, turning community theater, basketball, and curriculum design into arenas where their organized, skeptical yet sociable nature
    shines, all while occasionally hoarding trivia trophies and overlooking routine health screens.
background:
  cultural: Born and raised in the Pacific Northwest, Robert embodies a blend of Midwestern pragmatism and Spokane's outdoor‑centric lifestyle. His upbringing in a middle‑class, white family emphasized
    the value of education, community involvement, and self‑reliance. He grew up attending local schools where collaborative projects and extracurricular activities were encouraged, shaping his sociable
    and competitive nature. The region's appreciation for nature, combined with a strong public‑service ethic, informs his love for hiking, volunteer work, and commitment to improving local educational
    resources.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Educational Technology Integration'', ''Program Evaluation'', ''Data Analysis'', ''Project Management'', ''Workshop Facilitation'', ''Mentoring'',
