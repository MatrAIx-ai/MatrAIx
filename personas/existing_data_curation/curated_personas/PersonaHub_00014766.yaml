persona_description: A healthcare professional who is a dermatologist and specializes in the treatment of cellulitis. They have a thorough understanding of the causes, symptoms, and treatments for cellulitis,
  including the use of antibiotics and non-steroidal anti-inflammatory agents. They are also aware of the complications associated with untreated cellulitis, such as infections of the blood, bone, and underlying
  muscle, and are trained to prevent these complications through proper diagnosis and treatment. They are skilled in the surgical excision and drainage of affected areas, particularly in cases of necrotic
  or dead tissue.
