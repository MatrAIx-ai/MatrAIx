  hobbies: '[''Adult soccer league'', ''Vovinam martial arts practice'', ''Cooking Vietnamese cuisine and hosting potlucks'', ''Live music and karaoke nights'', ''Attending cultural festivals'', ''Volunteer
    mentorship at community center'', ''Reading historical fiction'', ''Biking along the Hudson River waterfront'']'
  career_goals: Dung aims to advance to a supervisory role such as Shift Commander within the next three years, and eventually pursue an Assistant Warden position. He plans to obtain a master's degree in
    Criminal Justice or Social Work to deepen his understanding of rehabilitation and reentry services. He is passionate about designing and leading an in‑house educational program that pairs vocational
    training with cultural support for Southeast Asian inmates, and he hopes to spearhead community‑outreach partnerships that smooth the transition for released individuals back into Jersey City neighborhoods.
