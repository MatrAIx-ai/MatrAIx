  career_goals: Katherine's primary ambition is to maintain her financial independence while channeling her practical abilities into a modest home‑based venture that balances her love of structure with
    a need for flexibility. She plans to launch a small online shop offering desert‑grown herb mixes and homemade preserves, allowing her to apply her gardening and cooking skills on a manageable schedule.
    To expand her community impact, she aims to obtain a volunteer coordinator certification so she can lead workshops for seniors on budgeting, navigating local services, and simple home maintenance. In
    the longer term, Katherine hopes to author a concise guide to low‑maintenance desert gardening tailored for retirees, establishing herself as a trusted resource within her neighborhood.
