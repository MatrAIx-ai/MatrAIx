personas:
  professional: Perry Moon, a seasoned construction laborer with a decade of hands‑on experience in framing, concrete work, and power‑tool operation, blends his practical reliability with a curiosity for
    sustainable building methods, often mentoring new crew members and calmly solving on‑site challenges while pursuing OSHA‑30 and NCCER certifications to move into foreman and eventually own an eco‑friendly
    remodeling firm.
  sports: Perry Moon follows the Philadelphia Phillies and the Lehigh Valley Phantoms from the comfort of his modest living room, spends Saturday mornings casting on the Lehigh River, hikes the Appalachian
    Trail sections of local state parks with the Lehigh Valley Hiking Club, and joins a low‑key pickup basketball league at the community center to keep his fitness routine varied.
  arts: Perry Moon indulges in the melodic storytelling of Bruce Springsteen and the acoustic calm of John Denver while pausing his Civilization marathons to watch Wes Anderson’s whimsical films, frequently
    tunes into the “Modular Building Today” podcast for professional inspiration, and occasionally catches a small‑scale production of ‘Our Town’ at the community theater, finding that these artistic lenses
    reinforce his balance of creative curiosity and grounded practicality.
  travel: Perry Moon favors low‑key weekend road trips along the Blue Ridge Parkway and overnight stays at Shenandoah National Park’s campgrounds, savoring solo hikes and river fishing, while his long‑term
    travel dream is a guided eco‑construction tour of Sweden and Norway to study Scandinavian green building practices, though limited budget and night‑school commitments keep most voyages within a three‑hour
    drive radius.
  culinary: Perry Moon enjoys the simple pleasure of cooking his catch of river trout, typically grilled with lemon, dill, and a brush of garlic butter, complements it with roasted sweet potatoes and seasonal
    greens, and on colder evenings whips up a thick, bean‑laden chili served with crusty sourdough, all while his modest kitchen skillset balances between confident grillmaster and occasional over‑salted
    experiment.
  core: Perry Moon is a meticulous, eco‑focused construction veteran who balances solitary river fishing and DIY projects with a quiet, compassionate drive to mentor others, all while wrestling with a worry‑driven
    perfectionism that fuels both his ambition and occasional over‑cautiousness.
background:
  cultural: Perry grew up in a working‑class, predominantly white community in Allentown, Pennsylvania, where Pennsylvania‑Dutch and Irish‑German heritage are common. His family’s values emphasize hard
    work, modesty, self‑reliance, and a strong sense of neighborhood solidarity. The region’s industrial past and the Protestant‑Christian cultural milieu have shaped his practical, no‑nonsense outlook
    while also fostering a cooperative spirit that drives his desire to help others and maintain harmony on the job site.
attributes:
  skills: '["Framing and structural carpentry", "Concrete mixing and finishing", "Power‑tool and light‑equipment operation", "Blueprint reading", "OSHA safety compliance", "Basic project coordination",
    "Mentoring new crew members", "Sustainable building material knowledge"]'
  hobbies: '["Fishing", "Hiking", "DIY home‑improvement projects", "Listening to construction‑technology podcasts", "Strategy video games", "Habitat for Humanity volunteering"]'
  career_goals: Perry aims to earn an OSHA 30‑hour certification and a NCCER credential within the next year, then move up to a foreman position within three years. He hopes to later become a site supervisor
    and eventually launch a small, owner‑operated contracting firm that specializes in eco‑friendly residential remodels. While pursuing these goals, he plans to complete a GED and take night courses in
    construction management, so he can blend his practical experience with formal qualifications and continue to support his community through reliable, safety‑first construction work.
