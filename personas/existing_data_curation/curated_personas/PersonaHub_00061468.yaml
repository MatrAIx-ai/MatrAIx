persona_description: A researcher or healthcare professional involved in conducting clinical trials, particularly in the field of public health. They are familiar with the terminology and concepts related
  to cluster randomised trials, co-applicants, study arms, data monitoring committees, and evidence-based medicine. They are interested in understanding the potential benefits and risks of clinical trials
  and the importance of ethical considerations in the design and implementation of clinical studies. They are likely to have a strong interest in the field of public health and the application of evidence-based
  medicine in healthcare.
