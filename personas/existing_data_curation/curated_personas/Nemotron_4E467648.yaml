  career_goals: Although retired from full‑time work, Madeleine aims to stay professionally active by volunteering as a business mentor for Latina entrepreneurs in the San Bernardino County area. She hopes
    to join the board of a local nonprofit focused on economic empowerment, where she can apply her structured, results‑oriented mindset to program development. Long‑term, she aspires to earn a Certified
    Financial Planner (CFP) designation so she can offer pro‑bono financial counseling to low‑income families, blending her expertise with her desire to support community harmony.
