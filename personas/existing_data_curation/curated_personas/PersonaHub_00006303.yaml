persona_description: A mathematician who specializes in the study of combinatorics, particularly the enumeration of maps and their embeddings. He has a deep understanding of the Atlas of Smaller Maps and
  is skilled in using it to prove conjectures and explore the properties of maps. His expertise extends to working with orientable and non-orientable surfaces, and he is well-versed in the theory of maps.
  He is also interested in the application of combinatorial techniques to other areas of mathematics, and his research interests include the spectral theorem, non-existence of the Borromean earrings, and
  the non-existence of the b-conjecture.
