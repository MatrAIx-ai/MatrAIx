personas:
  professional: Eli Tangarife, a data‑driven administrative specialist with a STEM bachelor's, employs Python scripts and VBA macros to automate routine office tasks while leveraging bilingual English‑Spanish
    communication to keep teams coordinated, and their calm under pressure makes them the go‑to person for crisis scheduling and conflict resolution as they aim for an Office Manager role.
  sports: Eli Tangarife, a midfielder on a Houston recreational soccer league team, blends the same relaxed focus they bring to yoga with a love for weekend pick‑up games, while cheering for the Houston
    Dynamo in MLS and the Houston Astros in baseball, and they supplement their fitness routine with occasional gym visits and weekly yoga classes.
  arts: Eli Tangarife, who captures cityscape photos with a Canon EOS R and frequents live music venues like Warehouse Live to dance to cumbia beats from Los Ángeles Azules and indie tunes from Tame Impala,
    uses art as a social catalyst, often hosting impromptu photo‑exhibits and jam sessions for friends.
  travel: Eli Tangarife, an avid traveler who mixes spontaneous road trips through the Texas Hill Country with annual flights to visit family in Puebla, Mexico, and dreams of photographing sunrise over
    Kyoto, prefers last‑minute flight bookings to snag deals yet maintains a dedicated travel fund for culinary experiences abroad.
  culinary: Eli Tangarife, a self‑taught home chef, routinely prepares tacos al pastor with pineapple‑infused salsa, smoky chipotle guacamole, and queso fundido for brunch gatherings, experimenting with
    fresh cilantro, lime, and corn masa while also indulging in occasional sushi orders when friends request something different.
  core: Eli Tangarife, a sociable, curiosity‑driven 26‑year‑old who balances laid‑back spontaneity with calm resilience, fuels their world with tech tinkering, lively cooking, and community‑centric leadership,
    even if their schedule sometimes resembles a mild chaos.
background:
  cultural: Raised in a bilingual Mexican‑American household in Houston, Eli grew up celebrating traditions such as Día de los Muertos and family gatherings centered around Mexican cuisine. He balances
    his heritage's emphasis on community and collective celebration with the multicultural dynamics of Houston, speaking both Spanish and English fluently. This dual cultural lens informs his social confidence,
    respect for diverse perspectives, and dedication to maintaining strong family and community ties while navigating a vibrant, urban professional environment.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Data entry and database management'', ''Bilingual communication (English/Spanish)'', ''Customer service and client
