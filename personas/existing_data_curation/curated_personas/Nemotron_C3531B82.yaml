    for data analysis'', ''CRM software familiarity (e.g., Salesforce)'']'
  hobbies: '[''Cooking and experimenting with Mexican/Tex-Mex recipes'', ''Playing recreational soccer'', ''Attending live music and cultural festivals'', ''Tech meetups and DIY electronics projects'',
    ''Casual video gaming'', ''Traveling (especially to Mexico)'', ''Photography of cityscapes'', ''Yoga and mindfulness practices'']'
  career_goals: Eli aspires to move from his current administrative support role into an Office Manager position, eventually stepping into Operations Management where he can apply his analytical background
    to streamline business processes. He aims to obtain a PMP certification and consider a part‑time MBA to deepen his strategic skill set. While pursuing these goals, Eli wants to maintain flexibility
    that allows him to stay socially engaged, mentor junior staff, and champion an inclusive workplace culture that reflects his collaborative personality.
