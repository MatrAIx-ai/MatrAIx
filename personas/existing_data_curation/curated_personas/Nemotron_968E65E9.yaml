  career_goals: Pearl aspires to rise to a supervisory detective role within the Prince George's County Major Crimes Unit, eventually specializing in forensic illustration and cyber‑crime investigations.
    She plans to earn a bachelor's degree in criminal justice and pursue certifications in digital forensics and forensic art. Long‑term, she envisions establishing a community outreach program that mentors
    at‑risk youth—especially young women of color—by teaching investigative thinking and creative problem‑solving skills, thereby reducing crime and fostering empowerment.
