personas:
  professional: Pearl Marshall, a 25‑year‑old detective in the Prince George's County Major Crimes Unit, blends rigorous crime‑scene documentation with vivid watercolor‑inspired visualizations, using lateral‑thinking
    and burgeoning digital‑forensics skills to reconstruct events while nurturing a goal of becoming a supervisory detective specializing in forensic illustration and cyber‑crime.
  sports: Pearl Marshall jogs the Anacostia River trail three times a week, belongs to the Capital Trail Runners club, follows the Washington Capitals and Washington Wizards avidly, plays competitive chess
    at the Bethesda Chess Club, and squeezes in weekend pickup basketball games with coworkers to balance mental focus and physical release.
  arts: Pearl Marshall frequents the Torpedo Factory Art Center, draws inspiration from Wassily Kandinsky’s abstractions and Vivian Maier’s street photography, writes speculative flash fiction after listening
    to Sufjan Stevens’ “The Age of Reason,” attends spoken‑word nights featuring poet Sarah Kay, and collects watercolor supplies that double as visual brainstorming tools for case scenarios.
  travel: Pearl Marshall enjoys spontaneous weekend road trips to historic Annapolis and the Shenandoah Valley, has already explored New York’s MoMA and Montreal’s Jazz Festival, plans an upcoming solo
    journey to Kyoto to study its tea‑house aesthetics, and balances travel dreams with a modest budget that necessitates careful use of airline points and budget accommodations.
  culinary: Pearl Marshall, an intermediate home cook, loves preparing Maryland crab cakes with Old Bay, crafting vegan avocado toast topped with radish and microgreens, experimenting with turmeric‑infused
    ramen broth, and pairing meals with single‑origin Ethiopian coffee, yet frequently forgets to grocery shop and ends up ordering delivery of fast‑food burritos during late‑night casework.
  core: Pearl Marshall is a creatively driven detective whose vivid imagination fuels meticulous investigations, but their high‑octane anxiety and impulsive splurges on art supplies keep them constantly
    balancing brilliance with burnout.
background:
  cultural: Pearl is an African‑American woman rooted in the rich tapestry of the DMV region. Her family traces its lineage to Southern migrants who settled in Prince George's County during the Great Migration,
    bringing traditions of soulful music, storytelling, and community solidarity. Growing up, she participated in church choirs, community festivals, and local mentorship programs that emphasized education
    and service. This heritage instilled a strong sense of cultural pride and an acute awareness of the social dynamics within her neighborhood, informing both her investigative approach and her commitment
    to uplifting her community.
