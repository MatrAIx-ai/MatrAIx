  career_goals: Regina aims to obtain her GED within the next year and pursue certification as a home health aide or certified nursing assistant, leveraging her caregiving experience to secure part‑time
    work in supportive care. She also dreams of launching a small home‑based catering service that focuses on healthy, family‑friendly meals, and plans to enter local cooking competitions to test and showcase
    her culinary skills. Achieving greater financial stability and contributing meaningfully to her family's income are central to her ambitions.
