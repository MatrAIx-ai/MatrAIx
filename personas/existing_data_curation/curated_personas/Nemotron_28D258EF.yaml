personas:
  professional: Yisell Colon, a seasoned bilingual teacher with fifteen years of experience in Orange County, blends project‑based learning with tools like Google Classroom while honoring community storytelling
    traditions and maintaining a relaxed yet assertive classroom management style.
  sports: Yisell Colon, an enthusiastic supporter of the Los Angeles Dodgers and LA Galaxy, participates in a local co‑ed salsa dance fitness class, hikes the Laguna Coast Wilderness Preserve monthly, and
    joins a recreational volleyball league at the community center.
  arts: Yisell Colon, a devoted lover of storytelling, devours contemporary fiction by Chimamanda Ngozi Adichie and children’s books by Mo Willems, attends concerts featuring Carlos Vives and Selena, and
    volunteers at mural festivals working alongside local artists such as Maria Esquivel.
  travel: Yisell Colon, a balanced traveler, has explored the vibrant markets of Oaxaca, the wine country of Napa Valley, enjoys weekend road trips to Big Sur for sunrise hikes, and dreams of a wellness
    retreat in Bali, financing trips with a mix of rewards points and a dedicated travel savings jar.
  culinary: Yisell Colon, an avid home chef, excels at making tamales de elote, citrus‑bright ceviche with cilantro, and crispy plantain tostones, sources heirloom corn and chilies at farmer’s markets,
    and loves pairing dishes with locally roasted coffee while occasionally experimenting with Asian‑inspired fusion sauces.
  core: Yisell Colon, a socially vibrant teacher who channels community traditions into innovative classrooms, worries a bit too often, but balances life with salsa, yoga, and a love for home‑cooked flavors.
background:
  cultural: Yisell grew up in a bilingual Guatemalan household, where Spanish was spoken at home and cultural traditions such as Día de los Muertos and Guatemalan Independence Day were celebrated with family
    gatherings and traditional foods. Her heritage instilled a deep respect for community, family bonds, and the value of storytelling, all of which she weaves into her teaching practice. Living in Irvine,
    she balances her Guatemalan roots with the multicultural fabric of Southern California, actively participating in local Latinx events and serving as a cultural bridge between her students' diverse backgrounds
    and the broader community.
attributes:
  skills: '[''Bilingual Instruction (English-Spanish)'', ''Curriculum Development'', ''Project‑Based Learning Design'', ''Technology Integration (Google Classroom, EdTech tools)'', ''Collaborative Learning
