  hobbies: '[''Cooking traditional Latin American cuisine'', ''Salsa dancing'', ''Hiking in Orange County'', ''Yoga and meditation'', ''Volunteer tutoring at the community library'', ''Reading contemporary
    fiction and children’s books'', ''Gardening'', ''Participating in local cultural festivals'']'
  career_goals: Yisell aims to expand her impact beyond the classroom by pursuing a master's degree in educational leadership and transitioning into an instructional coaching role. She envisions leading
    the development of a school‑wide bilingual immersion program that blends innovative teaching methods with culturally relevant content. She also hopes to champion student wellness initiatives, drawing
    on her own experience with stress and worry to create supportive environments for both students and staff. Over the next five years, Yisell plans to become a curriculum coordinator, mentor a larger
    cohort of teachers, and eventually partner with local community organizations to launch an after‑school hub that offers tutoring, cultural workshops, and mindfulness resources.
