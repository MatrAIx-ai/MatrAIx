personas:
  professional: Dalton Bertrand, a ten‑year‑old aspiring architect and junior coder, channels curiosity, methodical planning, and collaborative energy into designing intricate LEGO structures, sketching
    museum‑inspired concepts, and experimenting with simple tablet coding projects, often leading group builds that balance creativity with organized execution.
  sports: Dalton Bertrand, an energetic member of the Eastside Junior Basketball Club, spends after‑school hours honing dribbling and shooting skills at the neighborhood park, follows the Los Angeles Lakers
    for inspiration, and approaches fitness with a methodical routine of warm‑ups, team drills, and friendly scrimmages.
  arts: Dalton Bertrand, a budding sketch artist, draws daily inspiration from the Impressionist works of Claude Monet at the City Art Museum, the dinosaur exhibits at the Natural History Museum, and the
    melodic simplicity of Beethoven’s Moonlight Sonata, while channeling this creativity into detailed LEGO builds and piano practice.
  travel: Dalton Bertrand, who loves meticulously planned museum excursions, has toured the Smithsonian National Air and Space Museum in Washington D.C., explored the interactive exhibits at the Exploratorium
    in San Francisco, and dreams of a future family trip to the Louvre in Paris, balancing structured day‑by‑day itineraries with spontaneous snack‑break discoveries.
  culinary: Dalton Bertrand, an enthusiastic junior cook, loves crafting homemade cheese‑pizza slices topped with fresh basil, whipping up strawberry‑banana smoothies, and assembling LEGO‑shaped vegetable
    platters, mixing playful presentation with a genuine curiosity for diverse flavors.
  core: Dalton Bertrand, a keenly curious and methodically organized ten‑year‑old, wields a sketchbook, LEGO bricks, and a basketball alike, yet habitually leaves socks mismatched, revealing a delightful
    blend of disciplined creativity and charming quirks.
background:
  cultural: Dalton was raised in Woodside, Queens, a vibrant, multicultural neighborhood where diverse cultures intersect daily. Though his family’s heritage is white—rooted in Irish-American traditions—he
    grows up surrounded by a mosaic of languages, cuisines, and customs, from bustling Asian markets to nearby Latino bakeries. This environment nurtures his open‑mindedness, curiosity about the world,
    and appreciation for varied artistic expressions.
