persona_description: A researcher or public health official interested in evaluating the effectiveness of influenza vaccines in elderly populations, particularly those with limited access to medical care.
  They are concerned about the potential for bias and confounding in observational studies and are interested in incorporating prospectively collected data to minimize these issues. They are also interested
  in the potential for residual bias and confounding in the results of existing studies and are looking for ways to incorporate these insights into future research.
