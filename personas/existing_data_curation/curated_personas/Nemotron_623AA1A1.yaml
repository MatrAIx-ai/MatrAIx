  hobbies: '[''Watercolor painting'', ''Reading contemporary fiction and philosophical essays'', ''Creative writing (poetry, short stories)'', ''Local book club participation'', ''Attending small‑town art
    exhibitions and theater'', ''Nature walks along the Mohawk River'', ''Knitting'', ''Online courses in art history and abstract concepts'']'
  career_goals: Sabrina aims to transition into a supervisory role within the next two years, focusing on leading a small team of customer service representatives and shaping the department’s service culture.
    She is pursuing a certification in Customer Experience Management to deepen her strategic expertise. Long‑term, she envisions leveraging her business background and creative problem‑solving skills to
    become a Customer Experience Consultant for small businesses in upstate New York, allowing her to blend her passion for innovative service design with a flexible work schedule that supports her family
    and personal interests.
