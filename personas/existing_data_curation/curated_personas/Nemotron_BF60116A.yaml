personas:
  professional: Vera Oconnell is a seasoned retail associate in a busy Los Angeles department store, leveraging expert knowledge of modern POS systems, precise cash handling, and staff training to turn
    their curiosity about art into compelling product recommendations, while their competitive streak pushes them to exceed weekly sales targets and their flexible organization keeps the floor running smoothly
    during traffic spikes.
  sports: Vera Oconnell enjoys weekend hikes in the San Bernardino foothills, trains with the Southern California Trail Running Club, roots for the LA Dodgers in baseball season and the LA Lakers in basketball,
    and incorporates a mix of cardio and light weight‑lifting to stay fit for both art‑sessions and store duties.
  arts: Vera Oconnell frequents contemporary galleries such as The Broad and Hauser & Wirth, draws inspiration from artists like Yayoi Kusama and Ai Weiwei for their own acrylic paintings, volunteers at
    the local library's children's art program, and attends productions by the East LA Stage, all of which feed their curiosity and open‑minded outlook.
  travel: Vera Oconnell plans trips with a blend of research and spontaneity, prefers weekend escapes to Joshua Tree for sunrise photography and longer voyages to Barcelona to explore Mediterranean cuisine
    and street art, balancing a moderate budget with a desire for cultural immersion.
  culinary: Vera Oconnell cooks Mediterranean fare ranging from grilled halloumi with za'atar to shrimp saganaki with feta and fresh basil, enjoys experimenting with olive oil, lemon, and oregano, and rates
    themselves as an intermediate home chef who often hosts dinner parties for fellow artists.
  core: Vera Oconnell is a competitive yet curious retail professional who channels their love of art into both work and weekend canvas, occasionally over‑spends on supplies but always balances it with
    disciplined budgeting, and can be found sketching in a coffee shop while eyeing the next sales goal.
background:
  cultural: Vera is a fourth‑generation American of Irish descent. Raised in the suburban communities of San Bernardino County, she grew up in a mixed‑religion household that blended Catholic traditions
    with a pragmatic, secular outlook. The region’s mix of agricultural roots and growing suburban culture shaped her values of hard work, community involvement, and appreciation for diverse cultural expressions.
    Living in Yucaipa, she participates in local festivals, supports the farmers’ market, and embraces the multicultural fabric of Southern California while maintaining a sense of her Irish heritage through
    family stories and occasional visits to Ireland.
attributes:
