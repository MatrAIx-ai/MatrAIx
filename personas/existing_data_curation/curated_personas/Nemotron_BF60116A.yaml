  hobbies: '[''Visiting art galleries'', ''Acrylic painting'', ''Street photography'', ''Hiking'', ''Mediterranean cooking'', ''Community theater'', ''Mystery reading'', ''Volunteer art program'']'
  career_goals: Vera aims to move from cashier to shift supervisor within the next year, leveraging her training and organizational skills to qualify for a store‑manager position within two to three years.
    She plans to enroll in evening courses toward a bachelor’s degree in Business Management to support a future regional manager role. Simultaneously, her passion for the arts fuels an ambition to open
    a small boutique that combines a coffee corner with a curated selection of art supplies, local crafts, and rotating gallery space, allowing her to blend retail expertise with artistic expression.
