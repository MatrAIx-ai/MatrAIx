personas:
  professional: Terry Purvis, a newborn, displays an early fascination with bright shapes and textures—a trait that could one day translate into a career in industrial design, while presently they delight
    in exploring the world through the soft feel of blankets and the sound of crinkly toys.
  sports: Terry Purvis, a newborn, enjoys gentle baby yoga sessions and watches the New York Yankees games on a family TV, often drifting into sleep while they hear the crowd roars.
  arts: Terry Purvis, a newborn, responds enthusiastically to Mozart’s "Eine kleine Nachtmusik" and bright illustrations from Dr. Seuss books, showing an early appreciation for both classical music and
    whimsical visual art, and they often smile at the gentle rustle of pages.
  travel: Terry Purvis, a newborn, has already visited the Grand Canyon on a family road trip and, according to their parents’ travel dreams, hopes for future adventures in Kyoto’s cherry‑blossom festivals,
    while they coo at the sight of new scenery.
  culinary: Terry Purvis, a newborn, prefers the gentle sweetness of pureed carrots and the creamy texture of avocado, while their primary nourishment comes from breastmilk, and they occasionally fuss over
    overly sweet formula.
  core: Terry Purvis, a newborn, blends innate curiosity with a calm disposition, yet they are prone to occasional fussiness, irregular nap schedules, and a disorganized feeding routine.
background:
  cultural: Terry is raised in a white, Midwestern family in Greenville, Michigan, a small community in Kent County. The local culture emphasizes modesty, community cooperation, and an appreciation for
