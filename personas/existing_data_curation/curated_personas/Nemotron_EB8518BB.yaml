  hobbies: '[''Organic Gardening'', ''Birdwatching'', ''Hiking in the San Gabriel Mountains'', ''Reading (history and biographies)'', ''Woodworking'', ''Home‑brewing craft beer'', ''Cooking Vietnamese cuisine'',
    ''Nature photography'', ''Playing chess'']'
  career_goals: Hieu aims to transition into a part‑time advisory role where he can mentor emerging sales talent and help small businesses refine their go‑to‑market strategies. He envisions establishing
    a boutique consulting practice focused on pragmatic sales solutions for niche markets, allowing him to maintain flexibility, continue learning, and give back to his community without the demands of
    full‑time management.
