  career_goals: Maria aims to become a senior site supervisor for a reputable development firm in the Bronx, overseeing larger multi‑family projects and mentoring younger technicians. She hopes to earn
    a professional certification such as the Construction Management Association of America (CMAA) credential to formalize her expertise. Additionally, she wants to launch a small consulting side‑business
    that helps local contractors navigate NYC building regulations, especially for immigrant‑owned firms. While she values stability, she also seeks recognition for her problem‑solving abilities and hopes
    to secure a promotion that puts her in charge of budgeting and strategic planning for a portfolio of projects.
