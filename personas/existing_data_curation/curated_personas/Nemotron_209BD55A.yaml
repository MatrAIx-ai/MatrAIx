personas:
  professional: Maria Soto, a veteran civil engineering field specialist with over twenty years of hands‑on construction management in the Bronx, leverages meticulous blueprint interpretation, concrete
    mix calculations, and strong client relations to keep projects on schedule, while their love for routine and practical solutions makes them a reliable supervisor, even as their relaxed approach to obligations
    sometimes leads to slight disorganization.
  sports: Maria Soto stays active by leading a walking group through Bronx parks, attending Zumba classes twice a week, cheering on the New York Yankees, Knicks, and Giants, and occasionally playing recreational
    softball with a community league.
  arts: Maria Soto nurtures artistic passion by dancing salsa and merengue at the local cultural center, singing in the church choir, listening to Latin radio and telenovelas featuring stars like Thalía,
    and enjoying music from Celia Cruz, Marc Anthony, and Juan Luis Guerra for inspiration.
  travel: Maria Soto prefers short, family‑focused trips that blend relaxation with cultural immersion, often visiting nearby Puerto Rico or Florida for beach getaways while dreaming of a future tour of
    historic Barcelona and the vibrant streets of New Orleans during festival season.
  culinary: Maria Soto delights in cooking traditional dishes like mangú, sancocho, and herb‑infused roasted chicken, expertly using fresh cilantro, hot peppers, and plantains harvested from their rooftop
    garden, while occasionally treating themselves to a weekend steak and wine dinner.
  core: Maria Soto balances a vibrant community spirit and hands‑on construction expertise with a habit of procrastinating paperwork, making them both the life of the party and a dependable, if occasionally
    scatterbrained, site supervisor.
background:
  cultural: Maria is a first‑generation Dominican American whose parents immigrated to the Bronx in the 1970s. She grew up in a close‑knit Spanish‑speaking household, celebrating Dominican holidays like
    Carnaval and Día de la Independencia with food, music, and family gatherings. Her bilingual fluency and deep ties to the Dominican community inform both her work style and social life, as she often
    serves as a cultural bridge between English‑speaking contractors and Spanish‑speaking clients. The values of hard work, family loyalty, and community support, deeply rooted in Dominican culture, shape
    her outlook and daily interactions.
attributes:
  skills: '[''Blueprint reading'', ''Concrete mix design'', ''Site safety inspections'', ''Local building code compliance'', ''Project scheduling'', ''Team coordination'', ''Client liaison'', ''Cost estimating'']'
