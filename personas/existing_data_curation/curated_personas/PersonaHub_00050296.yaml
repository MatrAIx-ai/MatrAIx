persona_description: A geologist who specializes in water quality and mining, particularly in the analysis of water quality and the potential impact of mining on water quality. This individual has experience
  in studying the chemical and aesthetic quality of water discharging from strip-mined basins and the relatively unmined basins on the Cumberland Plateau in Tennessee. They are interested in understanding
  the chemical and aesthetic quality of the water flowing through a proposed national river and recreation area and are looking for ways to improve the quality of the water.
