    equipment troubleshooting'', ''EMS documentation and quality‑control'', ''Training and mentorship of EMTs'', ''Community health education'']'
  hobbies: '[''Classic truck restoration'', ''Reading (medical journals, history, survival guides)'', ''Fishing'', ''Hiking'', ''Vegetable gardening'', ''First‑aid instruction volunteer'', ''Chess club'',
    ''Landscape photography'']'
  career_goals: Shawn aims to advance into a senior leadership role within his county’s EMS system, such as EMS Operations Manager or Training Coordinator, where he can shape protocols and mentor the next
    generation of emergency responders. He plans to pursue an associate degree in EMS Management to complement his field experience and to obtain a Certified Emergency Manager (CEM) credential. Long‑term,
    he envisions establishing a community‑focused disaster preparedness program that integrates local volunteers, schools, and first responders, improving response times and resource allocation during severe
    weather events typical of the Midwest. Additionally, he hopes to author a handbook on rural emergency care best practices, sharing his practical insights with peers nationwide.
