  hobbies: '[''Hiking on local trails'', ''Gardening (community vegetable plot)'', ''Cooking experimental recipes'', ''Puzzle solving (Sudoku, cryptic crosswords, logic games)'', ''Volunteering for STEM
    outreach programs'', ''Reading science and mathematics non-fiction'', ''Playing the piano'']'
  career_goals: Aneesa aims to advance into senior leadership within the next five years, targeting roles such as Principal Data Scientist or Director of Analytics where she can shape strategic, data‑driven
    initiatives for regional manufacturing and logistics firms. She plans to deepen her expertise by completing a master's in data science (or pursuing a PhD) and publishing research on applied optimization
    in industry settings. Long‑term, she envisions establishing a consultancy that helps mid‑size companies adopt evidence‑based decision‑making frameworks, while also creating mentorship programs to support
    women and underrepresented groups in STEM fields.
