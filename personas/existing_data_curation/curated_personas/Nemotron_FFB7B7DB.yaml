  career_goals: Jean Anne aims to advance to a regional Director of Operations role, where she can shape service standards across multiple locations and mentor emerging managers. She is pursuing certification
    in hospitality management and plans to integrate data-driven tools to elevate client experiences. Long‑term, she envisions launching a boutique personal concierge firm that blends her Southern hospitality
    roots with cutting‑edge service design, focusing on senior citizens and busy professionals in the Appalachian region.
