personas:
  professional: Jean Reddy is a detail‑driven operations manager in the hospitality sector, leveraging a humanities background and a disciplined, client‑focused mindset to streamline service protocols across
    multiple locations while mentoring emerging leaders, and they consistently apply data‑driven tools to elevate client experiences.
  sports: Jean Reddy hikes the foothills of the Appalachian region on weekends, belongs to the local Trail Runners Club, and they are an avid fan of the Tennessee Volunteers football team, attending games
    whenever possible.
  arts: Jean Reddy cultivates a love for bluegrass, regularly attending concerts featuring Bill Monroe tribute bands and the Del McCoury Band, while they also devour classics like Jane Austen and immerse
    themselves in historical reenactments that bring Civil War narratives to life.
  travel: Jean Reddy prefers carefully planned road trips that blend history and nature, such as a weekend drive to the Great Smoky Mountains followed by a visit to the historic district of Asheville, and
    they keep a bucket‑list entry for a cultural tour of Edinburgh’s festivals.
  culinary: Jean Reddy enjoys cooking Southern comfort foods—shrimp and grits, fried chicken, collard greens, and sweet tea—using garden‑fresh herbs like sage and thyme, and while they are confident in
    the kitchen, they occasionally over‑salt dishes when multitasking between work calls.
  core: Jean Reddy blends Southern hospitality with operational precision, balancing meticulous planning, a love for history and nature, and a habit of treating themselves to creative indulgences despite
    a tendency toward work‑driven stress, and they always strive to keep harmony in both professional and personal realms.
background:
  cultural: Raised in Rogersville, Tennessee, Jean Anne grew up in a close‑knit Appalachian community steeped in Southern hospitality and church fellowship. Her family lineage traces back to English, Scottish,
    and Irish ancestors who settled the region, fostering a deep appreciation for tradition, communal harmony, and storytelling. While she honors local customs—such as seasonal festivals, gospel music,
    and home‑cooked meals—her humanities education and curiosity inspire her to explore broader cultural perspectives and integrate them into her personal and professional life.
