persona_description: A community leader and advocate for reconciliation who has personally experienced the trauma of genocide and has dedicated their life to helping others heal and move towards reconciliation.
  They understand the power of shared responsibility and the importance of bridging the gap between survivors and perpetrators. They have a deep understanding of the cultural significance of cows and the
  role they play in reconciliation processes. They are committed to research and data analysis to better understand the impact of the Cow for Peace project and how it can be scaled up to reach more survivors
  and perpetrators.
