personas:
  professional: Federico Fernandez, a retired civil engineer with four decades of designing mining and municipal infrastructure in Idaho, they leverage their methodical, organized nature and bilingual fluency
    to mentor apprentices, document engineering challenges in rural projects, and volunteer their AutoCAD and structural analysis expertise at the local community center.
  sports: Federico Fernandez enjoys early‑morning fly‑fishing in the Snake River, they follow the Boise State Broncos football team each fall, and they participate in a senior cycling club that meets every
    Saturday, though they often skip the rides when a woodworking project captures their attention.
  arts: Federico Fernandez spends evenings listening to classical guitar recordings by Andrés Segovia, they read biographies of engineers such as John Smeaton, and they attend community theater productions
    of classic plays, while their habit of humming old ranchera tunes while building birdhouses adds a personal soundtrack to their creative pursuits.
  travel: Federico Fernandez prefers low‑key, family‑oriented trips, they return each spring to their hometown in Jalisco, Mexico, while also planning leisurely drives to Yellowstone National Park and weekend
    visits to Santa Fe’s art markets, always budgeting their travel expenses within their fixed retirement income.
  culinary: Federico Fernandez, an adept home cook, they regularly prepare mole poblano using dried ancho chilies, sesame seeds, and chocolate, alongside fresh heirloom tomato salsa and grilled trout seasoned
    with rosemary from their garden, and they proudly serve these dishes at intimate family gatherings, though they sometimes forget to refrigerate leftovers promptly.
  core: Federico Fernandez is a methodical, curiosity‑driven octogenarian who blends engineering precision with a love for gardening, woodworking, and Mexican cooking, while they habitually misplace their
    reading glasses and hoard vintage model rail cars.
background:
  cultural: Federico was born in a small town near Guadalajara and moved to the United States as a teenager. He grew up in a Mexican Catholic household where family, respect for elders, and communal celebrations
    such as Día de los Muertos were central. In Idaho he adopted the self-reliant, frontier values of his community while preserving his Mexican heritage through language, cuisine, and holiday observances.
    He bridges both cultures by participating in local volunteer groups and sharing Mexican traditions with his neighbors, embodying a bicultural identity that honors his roots and his adopted home.
attributes:
  skills: '["Civil Engineering", "Structural Design", "Project Management", "AutoCAD Drafting", "Technical Writing", "Bilingual Spanish-English", "Carpentry", "Electrical Troubleshooting", "Gardening"]'
  hobbies: '["Woodworking", "Gardening", "Model Railroading", "Reading Historical Biographies", "Chess", "Fishing", "Cooking Traditional Mexican Cuisine", "Volunteer Teaching Basic Computer Skills"]'
  career_goals: Although retired, Federico aims to preserve his professional legacy by documenting the engineering challenges he faced in rural Idaho and sharing those lessons with local apprentices and
    his grandchildren. He hopes to mentor youth in STEM through occasional workshops at the community center, contribute to preserving local history, and maintain his health to enjoy travel to his hometown
    in Mexico each year.
