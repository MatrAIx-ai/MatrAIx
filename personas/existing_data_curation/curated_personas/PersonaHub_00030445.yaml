persona_description: A historian and author who is fascinated by the rich history and unique culture of Montauk, New York. Dr. Lewis Gross, the author of Montauk Dental, is known for his deep understanding
  of the island's past and his ability to bring it to life in his novel. His interest in Montauk extends beyond the historical aspects and he is drawn to the island's natural beauty and the unique way of
  life of its Native American tribe. Dr. Gross is a passionate advocate for the preservation of Montauk's history and culture and is dedicated to researching and writing about the island's past to educate
  and inspire future generations.
