  career_goals: Dianna aims to move from her current clerk role into a supervisory position, such as office manager or operations coordinator, where she can shape workplace culture and introduce more creative
    workflow solutions. She is also considering a pivot toward community-focused roles that blend her administrative expertise with her love of art and sociability, like a cultural program coordinator for
    a local nonprofit or a marketing associate for a boutique creative firm. To support this transition she plans to complete a bachelor's degree in communications or arts management and to earn a certification
    in project management.
