persona_description: A healthcare professional who is a specialist in the treatment of bacterial infections, particularly those caused by Gram-positive bacteria. They are knowledgeable about the mechanism
  of action of vancomycin and its pharmacology, and are skilled in administering it safely and effectively. They are also aware of the potential side effects of vancomycin and the importance of therapeutic
  drug monitoring to avoid toxicity. They may be required to adjust dosages based on renal function, age, and other factors, and they have a deep understanding of the clinical pharmacology of vancomycin.
