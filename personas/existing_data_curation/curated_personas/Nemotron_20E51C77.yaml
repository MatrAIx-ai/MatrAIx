  hobbies: '[''Gardening'', ''Fishing'', ''Cooking traditional Mexican cuisine'', ''Listening to regional Mexican music'', ''Watching baseball games'', ''DIY woodworking projects'', ''Community volunteer
    work'', ''Attending local cultural festivals'']'
  career_goals: Looking ahead, Michael aims to move into a district‑manager role where he can influence multiple stores and mentor younger supervisors. He also hopes to design a stress‑reduction workflow
    that leverages his data‑driven background while providing more predictable schedules for his team. As retirement approaches, he plans to secure a stable financial footing, possibly by obtaining a supply‑chain
    certification or an MBA‑level credential, and he is considering opening a small family‑run convenience store that blends his retail expertise with his Mexican culinary heritage.
