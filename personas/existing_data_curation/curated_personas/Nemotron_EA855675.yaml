personas:
  professional: Florcel Rivera, a 20‑year‑old New York City taxi driver, leverages bilingual fluency, keen navigation instincts, and a friendly yet assertive demeanor to deliver safe rides while constantly
    experimenting with ride‑hailing tech and optimizing routes for efficiency.
  sports: Florcel Rivera enjoys jogging through Central Park three times a week, follows the New York Knicks and the New York City FC for their community vibe, and occasionally joins a local pickup basketball
    game, balancing personal fitness with casual spectator loyalty.
  arts: Florcel Rivera immerses themselves in contemporary Latin American fiction, especially works by Valeria Luiselli and Jorge Volpi, while attending salsa nights and appreciating street murals captured
    through their camera, allowing artistic expression to shape evenings and inspire creative storytelling.
  travel: Florcel Rivera prefers weekend getaways that blend cultural immersion and off‑beat exploration, such as a day trip to Brooklyn’s Williamsburg for its street art, a long weekend in a historic coastal
    town known for vibrant murals and fresh seafood, and dreaming of a solo trek through the Andes once financial stability allows.
  culinary: Florcel Rivera delights in cooking arroz con gandules and mofongo for family gatherings, skillfully balances spices with a modest culinary confidence, yet sometimes over‑sanders dishes when
    experimenting, and enjoys pairing meals with a cold horchata or a glass of white wine.
  core: Florcel Rivera is a socially attuned, curiosity‑driven 20‑year‑old taxi driver who harmonizes disciplined scheduling with spontaneous city adventures, all while dancing, cooking, and dreaming of
    leading an eco‑friendly fleet for their community.
background:
  cultural: Floricel was born in New York City to parents who emigrated from Puerto Rico. She grew up in a bilingual household where Spanish was spoken at home and English at school, giving her a strong
    connection to both cultures. Family traditions such as celebrating Nochebuena, preparing lechon, and participating in the annual Puerto Rican Day Parade in Manhattan remain central to her identity.
    She maintains close ties with the Puerto Rican community in the Bronx and Queens, regularly attending cultural events, listening to reggaeton and plena, and supporting local Puerto Rican businesses.
    Floricel's cultural background informs her values of family solidarity, perseverance, and a vibrant social life, while also shaping her desire to serve and represent her community through her work as
    a driver.
attributes:
  skills: '[''Safe Driving'', ''Navigational Knowledge of NYC'', ''Bilingual Communication (Spanish/English)'', ''Customer Service'', ''Digital Ride-hailing Platform Proficiency'', ''Cash Handling'', ''Basic
