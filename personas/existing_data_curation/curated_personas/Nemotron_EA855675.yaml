  hobbies: '[''Salsa and Bachata dancing'', ''Cooking traditional Puerto Rican dishes'', ''Urban street photography'', ''Reading contemporary Latin American literature'', ''Jogging in Central Park'', ''Volunteering
    as a Spanish tutor'', ''Exploring New York neighborhoods'']'
  career_goals: Floricel's career aspirations combine her curiosity for the logistics side of transportation with her practical desire for stability and growth. In the next two years she plans to obtain
    a commercial driver's license and complete a certification in transportation logistics. She also intends to enroll part-time at a community college to earn an associate's degree in business administration,
    preparing her for managerial responsibilities while maintaining a balanced schedule that allows time for personal pursuits. Ultimately, Floricel hopes to launch a modest fleet of eco-friendly taxis
    that cater primarily to the Puerto Rican and broader Hispanic communities in New York, and to serve as a mentor for younger drivers, advocating for fair working conditions and community-oriented services.
