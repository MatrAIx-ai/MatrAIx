  hobbies: '[''Cooking Mexican cuisine'', ''Garden maintenance (vegetables and herbs)'', ''Bilingual church choir'', ''Volunteering at local food pantry'', ''Walking club'', ''Knitting and crocheting'',
    ''Card games (bridge, rummy)'', ''Attending local cultural festivals'', ''Senior center activities'']'
  career_goals: Blanca aims to move from cashier to shift supervisor within the next two years, using her routine‑driven work style and people‑centered approach to lead a small team. She plans to complete
    a Certified Retail Supervisor program offered by a nearby community college and take a basic accounting course to strengthen her bookkeeping abilities. In the longer term, she hopes to transition into
    a part‑time community liaison role at the local senior center, where she can organize volunteer drives, senior‑discount shopping days, and cultural events. Her ultimate ambition is to combine her retail
    expertise with her passion for helping others, creating a bridge between the store and the surrounding community while keeping a stable, predictable schedule that fits her lifestyle.
