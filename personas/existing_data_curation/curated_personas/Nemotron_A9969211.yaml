personas:
  professional: Blanca Estarita is a seasoned retail cashier with flawless POS accuracy and bilingual fluency, who leverages her calm demeanor and love for routine to train new staff and resolve customer
    issues with empathy, positioning herself for a shift supervisor role.
  sports: Blanca Estarita enjoys low‑impact exercise through a Saturday walking club at the town park, follows the local baseball team, the Riverbend Rovers, and cheers on the city’s women’s soccer league,
    balancing social camaraderie with a steady fitness habit.
  arts: Blanca Estarita finds artistic fulfillment in singing bilingual hymns with her church choir, listening to folk singer Joan Baez, admiring the murals of Diego Rivera, and watching the telenovela
    “Rubí” with friends, which colors her leisure time with vibrant storytelling.
  travel: Blanca Estarita favors organized group trips, such as a yearly pilgrimage to a historic mission in the state, weekend getaways to the nearby mountain resort of Pinecrest, and a long‑awaited vacation
    to the coastal town of Cartagena, balancing her love of routine with occasional adventure.
  culinary: Blanca Estarita is a confident home cook who perfects tamales, pozole, and fresh salsa using heirloom corn, hominy, and cilantro from her garden, while also experimenting with chiles de árbol
    for heat and occasionally binge‑watching cooking shows for new recipes.
  core: Blanca Estarita blends steadfast routine with boundless compassion, leading a calm, community‑focused life that includes meticulous budgeting, diligent health checks, and a habit of knitting extra
    blankets for neighbors, even if they sometimes over‑commit to volunteer shifts.
background:
  cultural: Blanca was born to Mexican immigrant parents and grew up in a bilingual household where Spanish and English were spoken interchangeably. Catholic traditions shaped her early years; she still
    celebrates Día de los Muertos, Navidad, and family quinceañeras with customary foods, music, and prayers. Though she resides in Gowen, MI, she maintains strong ties to her Mexican heritage through cooking,
    the local Hispanic community church, and annual visits to relatives in Mexico. At the same time, she has embraced Midwestern values of practicality, punctuality, and neighborly assistance. This blend
    of Mexican cultural pride and Michigan small‑town sensibility informs her worldview, reinforcing her dedication to routine, community service, and harmonious relationships.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Bilingual communication (Spanish/English)'', ''Customer service'', ''Inventory management'', ''Basic bookkeeping'', ''Conflict resolution'', ''Training
