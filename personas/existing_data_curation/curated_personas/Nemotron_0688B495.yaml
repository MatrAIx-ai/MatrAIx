personas:
  professional: Thomas Sheppard is a 29‑year‑old associate pastor in Brooklyn who fuses analytical STEM thinking with deep theological training to craft data‑rich sermons, lead small‑group worship, and
    manage digital livestreams, while their relaxed attitude toward deadlines and occasional disorganization are offset by pragmatic problem‑solving and a compassionate, assertive counseling style.
  sports: Thomas Sheppard stays active by hiking with the Prospect Park Trailblazers club on weekends, attending Brooklyn Nets games for a basketball fix, cheering the New York City FC during the MLS season,
    and squeezing in solo jogs along the East River Greenway, though they often skip post‑workout stretches due to their relaxed scheduling.
  arts: Thomas Sheppard expresses creativity through acoustic worship sets featuring Leonard Cohen’s Hallelujah and Sufjan Stevens’ The Only Thing, captures dusk cityscapes inspired by Vivian Maier’s street
    photography, immerses in indie narrative games like What Remains of Edith Finch, and occasionally attends BAM performances of contemporary playwrights, all of which feed their reflective journal entries.
  travel: Thomas Sheppard prefers low‑key, solo pilgrimages to spiritually resonant sites such as Jerusalem and the Scottish Highlands, mixes them with short weekend escapes to nearby locales like the Hudson
    Valley and Montreal, plans trips on a flexible spreadsheet that leaves room for spontaneous worship gatherings, but often delays booking due to their laid‑back approach to obligations.
  culinary: Thomas Sheppard enjoys preparing simple yet wholesome meals like quinoa‑and‑roasted‑vegetable bowls seasoned with rosemary and cumin, hearty lentil soup with kale, and occasional brunch avocado
    toast topped with smoked salmon and capers, cooking at a confident amateur level while also savoring a Saturday brunch at a local Brooklyn bagel shop for their beloved bagel‑with‑cream‑cheese and lox.
  core: Thomas Sheppard is a contemplative pastor‑tech hybrid who balances scientific curiosity with devotional depth, yet constantly battles lingering anxiety and a habit of leaving tasks to the last minute.
background:
  cultural: Thomas grew up in a middle‑class Anglo‑American family in the New York suburbs, raised in a mainline Protestant tradition (Episcopal) that emphasized both academic achievement and regular church
    participation. Relocating to Brooklyn for his ministry exposed him to the borough’s multicultural tapestry, including diverse worship styles, Caribbean rhythms, and social activism, shaping a blend
    of traditional New England religious customs, the intellectual rigor of his STEM education, and the progressive, inclusive ethos of urban Brooklyn while identifying culturally as white American.
attributes:
  skills: '[''Pastoral counseling'',''Sermon writing'',''Biblical exegesis'',''Conflict mediation'',''Community outreach planning'',''Data analysis with Excel'',''Introductory Python scripting'',''Audio‑visual
