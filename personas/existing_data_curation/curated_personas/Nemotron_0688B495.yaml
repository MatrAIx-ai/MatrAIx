  hobbies: '[''Reading science non‑fiction'',''Theological commentary study'',''Reflective journaling'',''Acoustic guitar playing'',''Hiking in Prospect Park'',''Urban photography'',''Logic puzzles'',''Indie
    narrative video games'',''Volunteering at food pantry'']'
  career_goals: Thomas aspires to become the lead pastor of an urban, socially engaged congregation where he can integrate scientific perspectives with faith, plans to pursue a Master of Divinity with a
    focus on spiritual care and mental health, aims to launch a community counseling center offering theological guidance and evidence‑based stress‑management workshops, hopes to author a book exploring
    the dialogue between modern science and Christian belief, and intends to develop a weekly podcast that reaches a broader audience beyond his Brooklyn parish.
