  career_goals: Blanca envisions a career that blends her artistic flair with her passion for communication and community. She aims to study visual communication or multimedia arts in college, with the
    long‑term goal of becoming a creative director or content strategist for a cultural organization that highlights Mexican‑American stories. She also dreams of launching a youth‑led digital media platform
    that showcases emerging artists from West Sacramento, while possibly pursuing a degree in community development or social work to advocate for under‑represented voices. In the short term, she plans
    to secure a scholarship by excelling in regional art competitions and debate tournaments, and to build a robust portfolio of illustrated works and video projects.
