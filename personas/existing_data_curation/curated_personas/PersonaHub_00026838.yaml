persona_description: A mathematician or engineer who specializes in the study of uniform polyhedra and their duals, particularly those with antiparallelogram vertex figures. They are skilled in using antiparallelograms
  as a form of four-bar linkage and have a keen interest in the design of Hart's inversor and other mechanisms that can convert rotary motion to straight-line motion. They are also knowledgeable about the
  role of antiparallelograms in the solution of the n-body problem in the study of point masses under Newton's law of universal gravitation.
