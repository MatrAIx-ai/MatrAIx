personas:
  professional: Edna Watkins is a warehouse associate proficient in material handling, pallet-jack operation, and basic forklift safety, who relies on a practical, structured mindset and strong teamwork,
    and they keep inventory accurate while eyeing a shift-supervisor promotion despite a habit of letting paperwork pile up.
  sports: Edna Watkins enjoys casual basketball games at the community center, follows the Atlanta Hawks enthusiastically, participates in a church-sponsored pick-up league, and they maintain fitness through
    light jogs and weekend stretch sessions, preferring a relaxed routine over rigorous training.
  arts: Edna Watkins frequently listens to R&B legends like Marvin Gaye and gospel powerhouses such as Kirk Franklin, binge-watches drama series like Grey's Anatomy, devours romance novels, and they unwind
    knitting colorful scarves while humming soulful tunes.
  travel: Edna Watkins prefers budget-friendly road trips to Southern cities like Savannah, Charleston, and New Orleans to savor local cuisine and church music, while dreaming of a Caribbean beach escape
    they plan through a mix of travel blogs and spontaneous decisions, balancing modest finances with a love for new experiences.
  culinary: Edna Watkins loves cooking Southern comfort dishes such as fried chicken, collard greens, mac and cheese, cornbread, and peach cobbler, seasoning them with fresh garden herbs like thyme and
    basil while playlists of R&B and gospel fill the kitchen, and they often experiment with homemade hot sauce for an extra kick.
  core: Edna Watkins blends a practical, structured work ethic with a laid-back love of soulful food, music, and community, juggling precise inventory skills with occasional disorganization and a habit
    of humming while knitting.
background:
  cultural: Edna is a 24‑year‑old African American woman raised in Hampton, GA, where close‑knit family ties, church involvement, and Southern traditions shape daily life. Growing up in a working‑class
    neighborhood, she learned the value of mutual support, communal meals, and storytelling rooted in the region’s Black heritage. Her cultural identity is reflected in her love for gospel music, soul food
    cooking, participation in local church activities, and a strong sense of community responsibility.
attributes:
  skills: '[''Material handling'', ''Pallet jack operation'', ''Warehouse inventory tracking'', ''Basic forklift safety'', ''Physical stamina and endurance'', ''Team collaboration'', ''Problem solving in
    fast‑paced settings'', ''Basic computer data entry'', ''Safety compliance and OSHA awareness'']'
  hobbies: '[''Cooking Southern comfort foods'', ''Listening to R&B and gospel music'', ''Gardening'', ''Church fellowship and community events'', ''Casual basketball with friends'', ''Binge‑watching TV
    series'', ''Reading romance novels'', ''Knitting and crocheting'']'
  career_goals: Edna aims to obtain her GED within the next year and earn a certified forklift operator license. She hopes to advance to a shift‑supervisor role in her current warehouse, gaining more predictable
    hours and a modest increase in responsibility. Long‑term, she envisions moving into a logistics coordination position or eventually starting a small community‑focused moving and delivery service that
    lets her help neighbors while maintaining a stable schedule.
