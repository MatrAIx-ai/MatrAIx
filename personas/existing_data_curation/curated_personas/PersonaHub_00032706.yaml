persona_description: A radiographer who specializes in taking X-rays of patients in a clinical setting, performing procedures needed during surgery, and working with people of all age groups. They have
  a Bachelor's or Master's degree in radiography, and are certified as a Radiologic Assistant through the American Registry of Radiologic Technicians. They have experience working in a hospital or clinic,
  and are detail-oriented and patient, with the ability to further their education and specialize in additional diagnostic imaging technologies such as computerized tomography (CT scan) and magnetic resonance
  imaging (MRI).
