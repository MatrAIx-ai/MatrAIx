  career_goals: Saleh aspires to pursue a career in engineering, drawing inspiration from his love of building and problem‑solving. He hopes to study aerospace or software engineering at a university that
    values hands‑on projects and research. His long‑term ambition is to design sustainable technology—such as eco‑friendly drones or efficient software systems—that can address real‑world challenges. He
    also aims to mentor younger students in coding and robotics, sharing his methodical approach and encouraging curiosity balanced with practicality.
