personas:
  professional: Saleh Ballard, a budding teenage technologist, merges a love for science‑fiction storytelling with a methodical talent for building intricate LEGO creations and coding simple Python games,
    approaching each project with meticulous planning, reliable follow‑through, and a collaborative mindset honed on the soccer field.
  sports: Saleh Ballard plays midfielder for the North Branch Stars youth soccer club in the Essex County League, cheers for the New York Knicks, New York Giants, and New York Rangers, enjoys occasional
    pick‑up basketball at the local community center, and hikes the South Mountain Reservation trails where they practice endurance and take inspiration for rocket designs.
  arts: 'Saleh Ballard spends evenings strumming an acoustic guitar, covering folk legends like Bob Dylan and modern pop hits by Ed Sheeran and Olivia Rodrigo, binge‑watches classic sci‑fi films such as
    Blade Runner and the Star Trek: The Next Generation series, sketches rocket concepts influenced by H.R. Giger in a well‑used sketchbook, and attends occasional workshops at the Newark Museum’s youth
    art program.'
  travel: Saleh Ballard has explored nearby attractions such as the Newark Museum, the New York City High Line, and Washington, D.C.’s National Air and Space Museum, dreams of visiting the Kennedy Space
    Center in Florida to witness a live rocket launch, hopes to trek the Appalachian Trail’s portion through New Jersey, and plans a future trip to Tokyo’s Ghibli Museum to see the animation art that fuels
    their sci‑fi imagination.
  culinary: Saleh Ballard enjoys classic pepperoni pizza with mozzarella and tomato sauce, homemade mac and cheese made with sharp cheddar, occasional sushi rolls featuring tuna, avocado, and cucumber that
    they learned to assemble via a YouTube tutorial, and snack on trail mix containing almonds, raisins, and dark chocolate while hiking; their cooking skill level is beginner, capable of following simple
    recipes for vegetable stir‑fry using soy sauce, garlic, and bell peppers.
  core: Saleh Ballard fuses a relentless curiosity for space and technology with a methodical, organized approach to hobbies, balancing spirited soccer teamwork with quiet coding sessions, yet occasionally
    procrastinates on school work when a new LEGO set arrives.
background:
  cultural: Saleh grew up in Wenham, a historic New England suburb of Massachusetts. His family reflects a typical middle‑class American upbringing, placing a strong emphasis on education, community involvement,
    and seasonal celebrations like Thanksgiving, Fourth of July fireworks, and local town fairs. The town’s cultural fabric includes a mix of traditional New England values—respect for history, outdoor
    recreation, and civic responsibility—combined with an openness to diversity that is common in the greater Boston area. Saleh’s home environment encourages curiosity, cooperation, and a balanced social
    life, aligning with the community’s supportive school programs and extracurricular activities.
