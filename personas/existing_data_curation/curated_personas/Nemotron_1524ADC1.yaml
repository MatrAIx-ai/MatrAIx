  hobbies: '["Visiting Art Galleries", "Indie Film Screenings", "Photography", "Reading Psychology & Philosophy Nonfiction", "Acoustic Guitar Playing", "Hiking in the Berkshires", "Yoga and Mindfulness
    Meditation", "Small Book Club", "Cooking Experimental Recipes", "Craft‑Beer Tasting", "Volunteering at Community Theater"]'
  career_goals: He aims to progress to a senior HR leadership role, such as HR Business Partner or Director of People, where he can integrate data‑driven strategies with a culture‑building focus that values
    creativity and employee well‑being. Over the next five years he plans to earn the SHRM‑SCP certification, lead a company‑wide diversity and inclusion program, and pilot a workplace art‑inspired collaboration
    space. Ultimately, he envisions founding a boutique HR consultancy that helps midsize firms embed holistic wellness and innovative talent practices.
