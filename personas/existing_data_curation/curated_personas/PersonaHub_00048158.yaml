persona_description: A project facilitator who is responsible for establishing and overseeing the Adult Reading Benchmarks (ARB) project, a comprehensive adult literacy reading benchmarking initiative funded
  by Alberta Enterprise and Advanced Education. The ARB project was established in 2010 to create a set of comprehensive adult literacy reading benchmarks that are accompanied by implementation guides and
  teaching resources. The ARB project aims to provide a common language for learners and practitioners to discuss learning in reading, and to establish seven levels of reading benchmarks for adult literacy,
  upgrading, and essential skill building. The project has conducted a pilot phase to determine the practicality of the benchmarks in the field of adult literacy, and has developed training resources for
  practitioners who want to use the benchmarks in their programs. The ARB project has the potential to contribute to the adult literacy and essential skills field by providing a common language for learners
  to understand their own reading skill development, and by developing useful resources and materials for practitioners to use in reading instructions.
