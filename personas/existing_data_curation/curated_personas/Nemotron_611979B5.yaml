  hobbies: '[''Visiting Art Galleries and Museums'', ''Exploring New Culinary Experiences'', ''Traveling to Culturally Rich Destinations'', ''Group Fitness Classes (Dance, Zumba)'', ''Hiking and Outdoor
    Activities'', ''Volunteering for STEM Mentorship Programs'', ''Supporting Local Arts Initiatives'', ''Photography'', ''Wine Tasting in Napa Valley'', ''Attending Live Music and Cultural Events'']'
  career_goals: Corrine’s primary ambition is to step into a Director of Sales role at an innovative technology company, where she can shape growth strategy, embed AI-driven insights into the sales pipeline,
    and champion diversity and inclusion initiatives. She plans to earn an executive MBA and acquire advanced sales leadership certifications within the next three years, positioning herself for senior
    executive responsibilities. Leveraging her outgoing personality, she seeks to become a sought-after speaker at industry conferences, sharing creative, art-inspired sales methodologies. In the longer
    term, she envisions launching a boutique consultancy that helps startups blend technical expertise with compelling storytelling to accelerate market entry.
