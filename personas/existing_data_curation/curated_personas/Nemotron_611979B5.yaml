personas:
  professional: Corrine Smith leverages a decade of sales leadership and a graduate STEM education to drive data‑driven strategy, fluent in Salesforce, SQL, Tableau, and presents pitches with art‑inspired
    storytelling, while her methodical planning and sociable charisma position her to step into a director role at a cutting‑edge tech firm.
  sports: Corrine Smith stays active by leading Zumba and dance sessions at Midtown Fitness Studio, tackling the Sacramento River Trail with the River Runners Hiking Club, and cheering on the Sacramento
    Kings in the NBA and the Oakland Athletics in MLB, while occasionally joining the Calm Waters Bike Club for weekend rides.
  arts: Corrine Smith channels her curiosity for art through regular visits to Sacramento’s Crocker Art Museum, where she admires works by Frida Kahlo and Yayoi Kusama, captures street and portrait shots
    inspired by Henri Cartier‑Bresson, and relaxes listening to the improvisational jazz of Kamasi Washington, while also drawing creative inspiration from the theatrical performances of Lin‑Manuel Miranda’s
    Hamilton.
  travel: Corrine Smith favors culturally immersive trips, meticulously planning weekend getaways to Napa Valley wineries, a spring pilgrimage to Barcelona’s modernist architecture, and a summer adventure
    in Kyoto’s temples, balancing a busy work schedule with a desire for both art‑focused exploration and occasional beach relaxation in Santa Barbara.
  culinary: Corrine Smith enjoys exploring new culinary scenes, often savoring Napa Cabernet paired with a perfectly seared ahi tuna steak topped with sesame‑soy glaze, while at home she experiments with
    crafting artisanal sourdough bread infused with rosemary and chopping fresh heirloom tomatoes for a quick Caprese salad, reflecting a moderate cooking skill that blends confidence with occasional recipe
    improvisation.
  core: Corrine Smith merges data‑driven sales acumen with an artist‑like flair, balancing meticulous planning with spontaneous wine‑tasting outings, a tendency to over‑schedule group activities, and a
    habit of photographing every espresso foam art she encounters.
background:
  cultural: Corrine identifies as African American and was raised in Sacramento’s diverse cultural landscape, where she experienced a blend of Black heritage and the wider California arts community. Family
    values emphasized education, resilience, and community service, shaping her commitment to uplifting underrepresented voices. She celebrates Juneteenth, enjoys soul food traditions, and participates
    in local Black business and professional networks. Influenced by African American artists, writers, and storytellers, she incorporates cultural perspectives into her work, fostering inclusive sales
    strategies and mentorship for emerging talent.
attributes:
