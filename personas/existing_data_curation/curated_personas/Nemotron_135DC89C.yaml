    grandchildren'', ''Learning digital tools for sharing art and recipes'']'
  career_goals: Although retired from formal employment, Ha aspires to deepen her involvement in the Bay Area’s senior arts program, mentor younger volunteers in cultural storytelling, and launch a small
    community workshop series that teaches Chinese calligraphy and traditional cooking to neighbors of all ages. She also hopes to complete an online art history course to broaden her appreciation of contemporary
    art, and eventually curate a rotating display of artwork created by senior participants at her local community center. Maintaining her health, independence, and vibrant social network remains a core
    personal ambition.
