persona_description: A school principal who is passionate about the impact of educational experiences on student learning and writing. They are dedicated to promoting a culture of writing and literacy within
  their school, encouraging children to explore, plan, draft, edit, and revise their work. They are also interested in the development of children's writing skills and the progression from talking to planning
  to drafting to editing to final form. They are committed to celebrating children's writing and displaying recent pieces of writing in the classroom to show progress and inspire others.
