  career_goals: Rajubhai dreams of a future where he can apply his love for structure and predictability to a career that builds tangible, reliable outcomes. He is fascinated by LEGO constructions and often
    imagines designing real bridges and buildings, so he aspires to become a civil engineer. He also enjoys explaining how things work to his younger cousins, which fuels an interest in eventually becoming
    a teacher who can share organized, step-by-step learning methods. His long-term ambition is to pursue a STEM education that lets him create safe, well-planned infrastructure and mentor others, while
    maintaining a stable and orderly professional life.
