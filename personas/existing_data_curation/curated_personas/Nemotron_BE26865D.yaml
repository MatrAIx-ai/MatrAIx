personas:
  professional: Rajubhai is a budding young technologist who designs intricate Minecraft survival strategies and assembles complex LEGO sets, applying his love for step‑by‑step instructions and practical
    problem‑solving while navigating occasional worries about meeting his own high standards.
  sports: Rajubhai plays midfield for the Union City Soccer Club U10 team, admires the LA Galaxy, and squeezes in after‑school jogs to stay fit, though he occasionally skips warm‑ups when anxious about
    upcoming drills.
  arts: Rajubhai delights in Bharatanatyam lessons at the local cultural center, where he practices routines set to music by A.R. Rahman, while also collecting Marvel graphic novels and drawing fan art
    of Spider‑Man, reflecting his blend of tradition and pop culture.
  travel: Rajubhai enjoys meticulously planned family trips—recently exploring the backwaters of Kerala during Onam and a weekend road‑trip to San Francisco’s Golden Gate Park—and he dreams of an adventurous
    trek to Japan’s cherry‑blossom festivals, balancing his love for structured itineraries with a budding curiosity for new cultures.
  culinary: Rajubhai, an eager home chef, follows detailed recipes to make coconut‑milk appam, cheesy pizza, and mango lassi, favoring ingredients like coconut oil and mozzarella, yet sometimes forgets
    to clean up his workspace after cooking.
  core: Rajubhai is a meticulous 10‑year‑old who thrives on ordered play, balancing LEGO precision, Minecraft planning, and Bharatanatyam rhythm, while his occasional worry sparks spontaneous snack raids
    and occasional overspending on collectible cards.
background:
  cultural: Rajubhai comes from a South Asian Indian family with roots in Kerala, a state on the southwestern coast of India. His surname, Menon, reflects a Malayali heritage, and at home he hears Malayalam
    spoken alongside English. The family observes traditional festivals such as Onam, Vishu, and Diwali, blending Hindu cultural practices with the multicultural environment of Union City, California. They
    attend a local Hindu temple for weekly worship and community events, and they also engage in American customs like celebrating Halloween and Thanksgiving. This dual cultural exposure influences Rajubhai’s
    values—emphasizing education, community service, and respect for tradition—while allowing him to comfortably navigate both Indian and American social settings.
