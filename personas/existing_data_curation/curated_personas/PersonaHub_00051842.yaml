persona_description: A public health official who works in the District of Columbia Department of Health and Services. This person is responsible for inspecting food establishments, conducting foodborne
  illness inspections, and working with the Public Health Laboratory Division to prevent and control foodborne illnesses. They are skilled in using the method of whole genome sequencing (WGS) to quickly
  identify outbreaks and their causes, allowing them to embargo and remove those food items or stop the practices that are making people sick. They are also knowledgeable in the use of Twitter to identify
  and respond to food poisoning outbreaks.
