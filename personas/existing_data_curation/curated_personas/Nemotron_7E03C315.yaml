  hobbies: '[''Visiting Art Galleries'', ''Painting and Pottery'', ''Reading (Art & Psychology)'', ''Hiking'', ''Gardening'', ''Community Art Volunteering'', ''Puzzle Solving'', ''Cooking Experiments'']'
  career_goals: Donna aims to complete her bachelor's degree in Business Administration within the next two years and obtain a Certified Administrative Professional (CAP) credential. She aspires to move
    into a senior manager role overseeing multiple departments within her organization or a municipal agency. Additionally, she hopes to lead community outreach initiatives that blend her leadership experience
    with her passion for the arts, such as organizing local art exhibitions or cultural events.
