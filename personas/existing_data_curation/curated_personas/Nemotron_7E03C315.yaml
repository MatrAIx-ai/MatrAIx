personas:
  professional: An administrative leader named Donna Wright, 45, leverages her meticulous budgeting and scheduling expertise alongside a love for creative problem‑solving to streamline office operations,
    mentor staff, and embed artistic elements into municipal projects while pursuing a Business Administration degree and CAP certification.
  sports: Donna Wright, an avid hiker and casual runner, joins a local foothill trail club, attends Boise State Broncos football games each fall, supports the Idaho Falls Chukars during summer baseball,
    and maintains a consistent routine of morning stretches and weekend cycling, preferring low‑impact workouts that complement her gardening and scheduling demands.
  arts: Donna Wright immerses herself in the arts by leading community art workshops, attending gallery openings featuring regional painters like Thomas Kline, collecting prints of Van Gogh’s Starry Night,
    getting inspired by folk singer Sufjan Stevens, and regularly experimenting with pottery techniques taught by local ceramist Elise Hall.
  travel: Donna Wright plans her trips with a blend of itinerary precision and spontaneous stops, preferring fall road trips to the Columbia River Gorge, weekend getaways to Yellowstone and Banff for hiking,
    cultural days in Portland’s art districts, and occasional overseas tours of Copenhagen’s design museums, all while balancing family commitments and a modest travel budget.
  culinary: Donna Wright, an intermediate home chef, delights in crafting Idaho potato gratin, searing rainbow trout with lemon‑dill sauce, baking rustic sourdough using local wheat, and experimenting with
    spice‑rich beet hummus, though she occasionally forgets to defrost the meat in time, leading to hastily improvised dinner plans.
  core: Donna Wright, a 45‑year‑old admin powerhouse with a puzzle‑solving habit, blends disciplined organization, a knack for art‑inspired innovation, and a penchant for spontaneous weekend hikes that
    keep her balanced between structure and spontaneity.
background:
  cultural: Donna is a White American raised in the rural valleys of Bannock County, Idaho. Her family’s roots trace back to German and Scandinavian immigrants who settled the Pacific Northwest in the early
    1900s. Growing up in a close‑knit small‑town community, she was taught the values of self‑reliance, hard work, and neighborly cooperation. The region’s strong connection to the outdoors and a modest
    but vibrant local arts scene shaped her appreciation for nature, community events, and creative expression. These cultural influences are evident in her organized yet open‑minded approach to both work
    and personal life.
attributes:
  skills: '[''Administrative Management'', ''Team Leadership'', ''Staff Scheduling'', ''Budgeting'', ''Process Improvement'', ''Conflict Resolution'', ''Customer Service'', ''Training & Development'', ''Microsoft
