persona_description: A materials scientist who specializes in the design and development of high-performance optical devices. His research focuses on the creation of dielectric mirrors and their applications,
  as well as the development of polymer fibers with controlled optical properties. He is particularly interested in the use of polymer fibers in commercial applications such as raincoats and protective
  suits. He has led the research team that created the polymer fiber with alternating index of refraction forming a cylindrical perfect mirror, which has potential applications in optical fiber technology
  and thermal radiation control.
