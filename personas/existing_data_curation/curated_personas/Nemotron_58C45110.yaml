  career_goals: Jeremy aims to transition from patrol work to a detective role within the next five years, focusing on cases that benefit from his creative analytical style and community‑focused approach.
    He wants to develop a specialized community‑policing initiative that incorporates local art projects—such as mural collaborations and youth art workshops—to strengthen trust between law enforcement
    and residents. In the long term, he aspires to become a precinct sergeant or lieutenant, where he can influence policy to prioritize flexibility, mental‑health awareness, and innovative problem‑solving
    within the department. He also plans to enroll in part‑time criminal‑justice courses to broaden his theoretical knowledge.
