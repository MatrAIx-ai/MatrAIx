  hobbies: '["Road trips across Texas and neighboring states","Cooking traditional Mexican dishes","Listening to regional Mexican and Tejano music","Gardening (herbs and succulents)","Attending local cultural
    festivals","Volunteer work at community centers","Reading about automotive technology","DIY vehicle maintenance projects"]'
  career_goals: Cristina aims to earn her high school equivalency (GED) and add a hazardous‑materials endorsement to her CDL within the next two years. She aspires to become a senior driver who mentors
    new hires and eventually transition into a scheduling or operations role within the transit agency. Long‑term, she hopes to start a community‑focused transportation service that offers affordable rides
    for seniors and low‑income families in the Midland area.
