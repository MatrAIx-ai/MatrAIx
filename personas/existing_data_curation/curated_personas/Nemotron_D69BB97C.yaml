personas:
  professional: Cristina Victorero, a seasoned intercity bus driver in West Texas, leverages her fluency in Spanish and English, practical problem‑solving skills, and calm demeanor to keep routes running
    smoothly while they informally mentor newer drivers on the road.
  sports: Cristina Victorero, an avid fan of Texas sports, follows the Dallas Cowboys and Houston Astros, participates in a weekend adult soccer league with the Midland Community Center Soccer Club, and
    they fit in quick jogs along the Pecos River Trail when the schedule permits.
  arts: Cristina Victorero, a lover of regional Mexican and Tejano music, fills road‑trip playlists with Selena, Los Tigres del Norte, and Flaco Jiménez, attends monthly community theater productions at
    the Midland Arts Center, and they occasionally dabble in creating hand‑painted talavera‑style tiles for home décor.
  travel: Cristina Victorero, who craves the open road, plans spontaneous weekend getaways to destinations like Big Bend National Park, Marfa’s art installations, and Austin’s music scene, and they balance
    a love for rugged scenery with a tight travel budget and occasional family obligations.
  culinary: Cristina Victorero, an enthusiastic home‑cook, perfects dishes such as cochinita pibil, chiles en nogada, and fresh salsa verde using herbs from their backyard garden, and they delight friends
    with weekend potluck feasts while occasionally over‑salting in a playful culinary experiment.
  core: Cristina Victorero, a 28‑year‑old intercity bus driver with a passion for spontaneous road trips and garden‑to‑table Mexican cooking, balances curiosity and practicality while they pursue mentorship
    roles and a future community‑focused transit service.
background:
  cultural: Cristina grew up in a Mexican‑American household in Midland, Texas. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco de Mayo, and honoring Catholic
    holidays. She is bilingual, speaking Spanish at home and English in the broader community, which allows her to bridge cultural gaps in her workplace and social circles. Her upbringing blends Mexican
    family values—such as close‑knit relationships and communal support—with the independent, frontier spirit of West Texas, shaping a resilient, adaptable identity.
attributes:
  skills: '["Commercial Driver''s License (CDL) Class B","Safe driving practices","Route planning and navigation","Bilingual communication (Spanish/English)","Basic vehicle maintenance and troubleshooting","Customer
