  career_goals: Although retired from formal employment, Loretta aims to leave a lasting artistic and cultural imprint on her community. She plans to complete a memoir that weaves personal history with
    reflections on art and nature, and to publish a small collection of her poems and illustrations. She intends to organize a yearly solo exhibition at the Cortland Public Library showcasing her watercolors
    and handcrafted textiles. Furthermore, she hopes to develop a digital archive of local family histories, mentoring younger volunteers in research and preservation techniques. Through these projects,
    she seeks to nurture creativity in others while fulfilling her own lifelong curiosity.
