personas:
  professional: Rosario Rojas, a precocious three‑year‑old, already acts as a miniature project manager of playtime, they line up blocks in perfectly straight rows, insist on a strict clean‑up routine,
    and assign roles in make‑believe games with an achievement‑driven, highly organized flair.
  sports: Rosario Rojas proudly wears a mini jersey of the local Springfield Sluggers, they participate in a toddler soccer class at the township recreation center, enjoy weekend gymnastics sessions at
    Tiny Tumblers Club, and eagerly track the games of the regional basketball team, the Capital City Hawks.
  arts: Rosario Rojas, a budding art enthusiast, they spend afternoons coloring with bold crayon strokes inspired by Eric Carle's collage style, dance along to Raffi's folk tunes like "Baby Beluga", and
    watch classic Sesame Street episodes featuring the whimsical antics of Cookie Monster, all of which shape their playful imagination and brief bursts of creative expression.
  travel: Rosario Rojas enjoys family outings that follow a predictable itinerary, they love weekend trips to the local state park's picnic area, a day at the sandy shores of Santa Cruz, and a seasonal
    visit to Disneyland, while dreaming of a future adventure to the Grand Canyon where they can count the towering rock layers like building blocks.
  culinary: Rosario Rojas, a picky eater with a developing palate, they adore creamy macaroni and cheese made with sharp cheddar, reach for peanut butter‑spread crackers and banana slices as go‑to snacks,
    tolerate soft avocado mash, yet consistently reject broccoli and spicy foods, preferring familiar textures and mild flavors.
  core: Rosario Rojas, a three‑year‑old with an uncanny love for order, they turn bedtime into a regimented ceremony, sweep toys into perfect lines, worry when routines shift, and habitually hum the same
    lullaby on repeat.
background:
  cultural: Rosario is raised in a Mexican‑American household in Lakeside, California. Her parents speak both Spanish and English at home, celebrating traditions such as Día de los Muertos, Christmas Posada,
    and weekly family meals featuring tacos, tamales, and salsa. She attends community events at the local Mexican cultural center, where she learns traditional dances and songs, blending her heritage with
    Southern California's multicultural environment.
attributes:
  skills: '["following structured daily routines", "sorting shapes and colors", "counting to ten", "recognizing letters A–F", "basic bilingual vocabulary (Spanish & English)", "completing 12-piece jigsaw
    puzzles", "organizing toy collections", "imitating household chores"]'
  hobbies: '["building block construction", "coloring within lines", "sorting and organizing toys", "listening to and dancing to Mexican folk music", "helping with simple kitchen tasks", "playing on structured
    playground equipment", "solving age‑appropriate puzzles"]'
  career_goals: Although still a toddler, Rosario frequently expresses a desire to become a teacher who can help children learn in organized ways, and she also dreams of cooking traditional Mexican dishes
    for her family. She aspires to grow up in a role where she can maintain order and guide others, reflecting her competitive and achievement‑oriented nature.
