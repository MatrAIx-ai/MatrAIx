persona_description: A professional working with children with visual impairments, especially those who have conditions such as Central Visual Impairment (CVI) and Amblyopia. This professional is experienced
  in conducting assessments, developing goals, and creating a communication plan to support the child's learning. They are skilled in managing the environment to accommodate the child's needs and are knowledgeable
  about strategies to help the child adapt to their environment. They are also adept at visualizing and explaining concepts to children who have difficulty with language.
