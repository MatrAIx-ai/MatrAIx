persona_description: A mental health professional with a background in psychiatry and a specialization in the use of electroconvulsive therapy (ECT). The individual has over 30 years of experience in performing
  ECT and publishing research articles on the subject. They have been a collaborator in the Consortium for Research in ECT (CORE) and have co-authored many key articles with that most important of ECT research
  groups. They have a thorough understanding of the medical workup and management of ECT patients, as well as the role of anesthesia during the procedure. They are familiar with the cognitive effects of
  ECT and the relative roles of ECT vs TMS, MST, tDCS, VNS, etc. They have a keen interest in the practical aspects of ECT practice, including patient selection, medical work-up, anesthesia management,
  and the actual delivery of ECT. They are interested in the latest research findings and have a comprehensive understanding of the ECT practice.
