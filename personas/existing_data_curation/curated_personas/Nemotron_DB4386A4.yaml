personas:
  professional: Matthew Olmstead, an aspiring young coder and storyteller, combines a love for drawing cartoons with Scratch programming to create interactive comic adventures, applying a methodical, step‑by‑step
    approach learned from building LEGO engineering kits.
  sports: Matthew Olmstead, a regular on the community soccer league’s U‑9 team, cheers for the Charlotte FC during weekend matches, enjoys attending Carolina Panthers games with family, and balances structured
    practice with spontaneous backyard frisbee games, approaching fitness with the same organized planning as their LEGO builds.
  arts: Matthew Olmstead, an avid visitor to the local art museum, draws inspiration from classic Disney animators like Glen Keane and contemporary cartoonist Jim Benton, spends weekends sketching scenes
    from Adventure Time, and uses LEGO bricks to recreate famous paintings, blending visual art with tactile creativity.
  travel: Matthew Olmstead prefers family road trips that combine nature hikes in the Great Smoky Mountains with stops at historic museums in Asheville, has already explored the Outer Banks’ sandy beaches,
    and dreams of a spring visit to Washington, D.C.’s Smithsonian museums, balancing careful itinerary planning with spontaneous snack breaks at local diners.
  culinary: Matthew Olmstead loves homemade mac and cheese with a sprinkle of sharp cheddar, enjoys crafting pepperoni pizza slices shaped like LEGO tiles, can whip up banana‑pancake stacks for weekend
    brunch, but occasionally forgets to eat vegetables, relying on ketchup as a favorite condiment.
  core: Matthew Olmstead is a curious, organized eight‑year‑old who blends cartoon storytelling with code, savors LEGO engineering, balances modest saving habits with snack cravings, and navigates school
    life with steady optimism and occasional forgetfulness.
background:
  cultural: Matthew comes from a white Southern family in Gastonia, North Carolina, where community ties and family traditions are important. He experiences a blend of rural and suburban influences, participating
    in local school events, church gatherings, and community festivals that celebrate regional culture. His family values education, creativity, and modest independence, encouraging him to explore new ideas
    while maintaining a grounded, reliable approach to responsibilities.
