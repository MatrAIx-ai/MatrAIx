  hobbies: '[''Visiting murals and art galleries'', ''Participating in folkloric dance group'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Playing soccer in a local league'',
    ''Volunteering at a community garden'', ''Attending art walk events'']'
  career_goals: Rafael aims to formalize his experience by earning his GED and obtaining Certified Nursing Assistant (CNA) certification within the next year. He plans to pursue an LPN program, with a long‑term
    goal of becoming a licensed practical nurse specializing in geriatric and community health. Rafael is also passionate about advocating for Hispanic patients; he envisions leading a community‑outreach
    program that provides health‑literacy workshops and culturally tailored resources. Additionally, he hopes to mentor entry‑level staff, fostering a supportive learning environment within his workplace.
