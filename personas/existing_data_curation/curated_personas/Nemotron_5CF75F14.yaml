  hobbies: '[''Coding small web projects'', ''Chess'', ''Hiking and nature photography'', ''Video and photo editing'', ''Reading graphic novels and sci‑fi'', ''Traditional Mexican cooking'']'
  career_goals: Johanna aspires to enter a university program that blends technology with creative problem solving, such as computer science or interaction design. She hopes to secure an internship in a
    tech startup where she can apply her coding and multimedia skills while learning professional workflows. In the long term, she aims to become a UI/UX designer or a front‑end developer who builds accessible,
    culturally inclusive digital experiences, and she envisions launching her own freelance consultancy that helps small Mexican‑American businesses establish an online presence.
