personas:
  professional: Johanna Barsallo, a self‑taught front‑end developer who blends analytical curiosity with pragmatic design, spends evenings building accessible web prototypes while meticulously tracking
    milestones in digital planners, and approaches mentorship with a healthy skepticism that drives them to prove their capabilities before accepting guidance.
  sports: Johanna Barsallo, an avid solo hiker who explores the rugged coastal trails of Santa Barbara with the Coastal Trail Explorers club, cheers for the UCSB Gauchos basketball team from the stands,
    prefers the quiet rhythm of sunrise treks over crowded gyms, and keeps a competitive edge by timing each ascent against personal bests.
  arts: Johanna Barsallo, a dedicated graphic‑novel enthusiast who devours Alan Moore’s Watchmen and the sci‑fi epic Saga while refining their own photography in Lightroom to capture the Pacific’s golden
    light, draws inspiration from Wes Anderson’s cinematic palettes and Radiohead’s ambient soundscapes during editing sessions, and critically evaluates mainstream art trends before incorporating subtle
    references into their multimedia projects.
  travel: Johanna Barsallo, a meticulous planner who maps weekend hikes along Big Sur’s cliffs and Catalina Island’s breezy paths, dreams of a solo backpacking trek through Kyoto’s cherry‑blossom season,
    balances wanderlust with a high‑schooler’s limited budget by prioritizing domestic nature escapes, and uses a digital travel board to research each destination’s hidden trails.
  culinary: Johanna Barsallo, an experimental home cook who lovingly prepares tamales with masa and smoky chipotle fillings and simmers a complex mole sauce featuring ancho chilies, cinnamon, and dark chocolate
    for family gatherings, yet often forgets to let the masa rest, resulting in a slightly dense texture they humorously call a ‘perfectly imperfect’ signature.
  core: Johanna Barsallo, a curious yet pragmatic teen who channels solitary coding marathons, competitive chess tactics, and a penchant for perfecting family recipes into a quietly ambitious drive to craft
    inclusive digital experiences.
background:
  cultural: Johanna grew up in a Mexican‑American household in Goleta, where both Spanish and English are spoken daily. Her family celebrates Mexican holidays such as Día de los Muertos and Las Posadas,
    and she frequently helps prepare festive dishes that connect her to her heritage. The multicultural environment of Santa Barbara County, with its vibrant Latino community and proximity to the Pacific
    coast, influences her worldview, fostering a respect for both her cultural roots and the diverse perspectives she encounters at school and online.
attributes:
  skills: '[''Web Development (HTML, CSS, JavaScript)'', ''Python scripting'', ''Bilingual Spanish–English communication'', ''Digital organization & task management'', ''Strategic gaming (chess)'', ''Photography'',
