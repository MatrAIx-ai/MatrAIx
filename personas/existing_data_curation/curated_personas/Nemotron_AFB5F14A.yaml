  career_goals: Patrick is determined to transition from his current idle status into a career that leverages his sociable nature and practical skills. In the near term, he plans to earn his GED and enroll
    in a community‑college program focused on business administration or hospitality management. He aims to secure an entry‑level position in retail sales or as a brand ambassador, where he can apply his
    persuasive communication and competitive drive. Within five years, he hopes to ascend to a supervisory or regional sales manager role, overseeing a team and shaping sales strategies. Long‑term, Patrick
    envisions running his own small event‑planning or community‑engagement firm that would let him blend his love of structure, people interaction, and hands‑on problem solving, while providing a stable,
    predictable work environment.
