personas:
  professional: Mabel Owen is a budding young marine illustrator and comic creator, merging meticulous LEGO engineering with vivid digital art to craft detailed seascape stories that showcase their imaginative
    curiosity and organized yet flexible work style.
  sports: Mabel Owen enjoys swimming in the Corpus Christi shoreline, participates in after‑school kick‑ball with the Cameron Youth Soccer Club, and often roots for the Corpus Christi Hookers while taking
    daily bike rides along the harbor to stay fit, proving they value both team spirit and personal endurance.
  arts: Mabel Owen draws inspiration from Claude Monet’s seascapes, the whimsical animation of Studio Ghibli, the bold line work of comic artist Kelly Sue DeConnick, and the soothing piano compositions
    of Ludovico Einaudi, weaving these influences into their own comic panels and paintings.
  travel: Mabel Owen plans weekend family trips to Padre Island for tide‑pool exploration, dreams of snorkeling the Great Barrier Reef, and pins maps of Kyoto and Reykjavik in their room, favoring guided
    tours that blend educational marine stops with hands‑on art workshops, reflecting that they seek both adventure and learning.
  culinary: Mabel Owen delights in assembling coastal shrimp tacos with fresh cilantro, lime, and corn tortillas, blending blueberry‑banana smoothies in a blender, and occasionally rolling simple sushi
    with cucumber and avocado, proudly serving their creations at family meals.
  core: Mabel Owen is an imaginative, organized 11‑year‑old who blends a love for marine life, comic artistry, and disciplined savings into a whimsical yet grounded daily routine, punctuated by piano practice
    and beach clean‑up missions, through which they channel their boundless curiosity.
background:
  cultural: Mabel was raised in Corpus Christi, a coastal city on the Gulf of Mexico in Texas. Her family celebrates typical Texan traditions—barbecue on holidays and a fondness for country music—while
    also enjoying the region’s vibrant Hispanic culture, such as tasting tamales during festivals and hearing Spanish phrases at school. The warm, breezy climate and proximity to the beach have shaped her
    love for marine life, and she often joins community events like Bayfest and local beach clean‑ups. Growing up in a diverse, family‑oriented neighborhood, she values community harmony and appreciates
    both the independent spirit of Texas and the communal vibes of her coastal town.
attributes:
