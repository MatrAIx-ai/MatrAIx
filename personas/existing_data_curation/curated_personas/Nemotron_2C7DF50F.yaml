  hobbies: '["Drawing comics and characters", "Painting seascapes with watercolors", "Building LEGO constructions", "Exploring tide pools and beach shells", "Reading fantasy and sci‑fi novels", "Writing
    short stories in a journal", "Playing the keyboard", "Participating in a junior astronomy club", "Attending local art workshops", "Collecting and categorizing shells"]'
  career_goals: Mabel dreams of blending her love for art and the ocean into a career as a marine conservation artist. She envisions creating illustrated educational materials that inspire children to protect
    coastal ecosystems, and eventually leading community projects that combine creative workshops with marine science outreach. In the longer term, she hopes to study marine biology and graphic design in
    college, and perhaps work as a museum curator for a coastal natural history museum. She also aspires to write graphic novels that explore abstract themes of environmental stewardship.
