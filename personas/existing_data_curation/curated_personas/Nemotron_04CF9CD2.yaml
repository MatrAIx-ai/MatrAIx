  hobbies: '["Playing soccer in a local league", "Cooking traditional Mexican dishes (tamales, mole)", "Exploring Los Angeles street‑food festivals", "Building scale model kits", "Video gaming (RPGs and
    strategy games)", "Listening to regional Mexican, reggaeton, and indie rock music", "Volunteering at a community youth center"]'
  career_goals: Ruben aims to complete his associate degree in Business Administration within the next year and then pursue a certification in digital marketing to boost his employability. He envisions
    starting in an entry‑level role such as a marketing assistant or community outreach coordinator for a local nonprofit, where he can blend his practical business knowledge with his desire to support
    his neighborhood. Over the long term, Ruben hopes to launch a modest food‑truck business that features modern twists on classic Mexican street foods, leveraging his cooking skills and entrepreneurial
    aspirations. He wants a career that offers a predictable schedule while still allowing for occasional spontaneous projects that keep him engaged and motivated.
