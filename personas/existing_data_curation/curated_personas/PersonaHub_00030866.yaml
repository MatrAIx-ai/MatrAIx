persona_description: A geriatric emergency medicine (GED) expert who has extensive knowledge and experience in geriatric care, emergency medicine, and geriatric emergency department models. They are familiar
  with the challenges faced by emergency departments in providing optimal care to older adults and have a deep understanding of the importance of tailoring emergency care to meet the unique needs of this
  population. They have expertise in geriatric screening assessments, staff and provider education, and community connection strategies, and have worked to establish GEDs in hospitals around the world.
  They are committed to improving the quality of emergency care for older adults and have a passion for making a positive impact on the health care system.
