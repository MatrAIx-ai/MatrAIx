  in legal analysis and research, and is likely to be actively engaged in the debate about media freedom and the role of the media in society. This person is likely to be concerned about the chilling effects
  of RTBF on the production of relevant, high-quality content, and the potential for governments to use censorship as a tool to curb journalism and free expression. This person is likely to be interested
  in the impact of RTBF on the circulation of information and the potential for the Right to Be Forgotten to endanger public information.
