persona_description: A cosmologist who is leading a research team to measure the Hubble constant, a key parameter in understanding the expansion of the universe. Suyu's team is using advanced telescopes
  and computer models to achieve a precision of 3.8 percent, which is one of the most sought-after prizes in cosmological research today. Suyu's work is part of the Max Planck@TUM program, which combines
  research as a Max Planck Research Group Leader with a Tenure Track professorship at TUM.
