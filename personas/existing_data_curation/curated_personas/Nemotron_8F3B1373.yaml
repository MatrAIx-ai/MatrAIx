personas:
  professional: Argelis Navarro, a 45‑year‑old procurement specialist at a Fortune‑500 manufacturing firm, leverages fluency in English and Spanish, advanced Excel, Power BI, and SAP to drive strategic
    sourcing that trims spend by double digits, while her methodical, skeptical yet competitive mindset pushes her to secure diverse, women‑owned suppliers and mentor emerging women leaders.
  sports: Argelis Navarro spends Saturday mornings in a co‑ed softball league and cheers for the Houston Astros, Houston Rockets, and Houston Dynamo, while also fitting in sunrise jogs along Buffalo Bayou
    and occasional tennis matches in spring, balancing her competitive drive on the field with a pragmatic approach to staying fit.
  arts: Argelis Navarro captures Houston's skyline with her DSLR, draws inspiration from photographer Edward Burtynsky, enjoys the soulful blues of Leon Bridges, the cross‑cultural melodies of Lila Downs,
    and attends the annual Cinco de Mayo art walk, letting visual and musical storytelling shape her creative downtime.
  travel: Argelis Navarro plans her trips with spreadsheet precision, returning each spring to her relatives in Central America, dreaming of exploring Oaxaca’s mezcal distilleries, while also favoring U.S.
    road adventures to Austin’s live‑music scene and the desert vistas of New Mexico’s White Sands National Park.
  culinary: Argelis Navarro blends traditional pepian with Texas barbecue by slow‑cooking pork shoulder over mesquite, seasoning with ancho chilies, cilantro, and cumin, while her herb garden supplies fresh
    tomatillos and epazote for homemade tamales, and she proudly perfects a smoky brisket rub that incorporates orange zest and smoked paprika.
  core: Argelis Navarro fuses data‑driven procurement expertise with a love for pepper‑spiced cooking, turning every cost‑saving sprint into a culinary experiment and vice versa.
background:
  cultural: Ar grew up in a close‑knit Guatemalan household in Houston, where Spanish was spoken daily and family gatherings centered around traditional foods, music, and celebrations like Semana Santa
    and Día de Los Muertos. Her parents’ immigrant experience instilled a strong work ethic, respect for community, and a deep appreciation for both Guatemalan and Texan cultures. She maintains fluency
    in Spanish, travels to Guatemala each year to visit relatives, and actively participates in the vibrant Guatemalan diaspora events held throughout the city. These cultural ties influence her professional
    values—emphasizing reliability, hospitality, and collaborative problem solving—while also informing her personal interests such as cooking heritage recipes and supporting community initiatives that
    empower Latinx families.
attributes:
