  career_goals: Ar aims to progress from purchasing agent to senior procurement manager and eventually director of supply chain within the next five years. She plans to earn a Certified Professional in
    Supply Management (CPSM) credential and pursue a part‑time MBA focused on sustainable operations. Her ambition is to lead enterprise‑wide sourcing initiatives that prioritize cost efficiency, environmental
    responsibility, and supplier diversity, especially by expanding partnerships with women‑owned and Latin American firms. She also seeks to mentor emerging women professionals in the field and contribute
    to corporate social‑responsibility projects that support immigrant and low‑income communities.
