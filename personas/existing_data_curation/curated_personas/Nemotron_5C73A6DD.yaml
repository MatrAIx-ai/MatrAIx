personas:
  professional: Janet Hamilton, an aspiring master colorist and senior humanities student at Arizona State University, blends precise cutting and nuanced color work with a painterly sensibility, organizing
    client consultations with meticulous empathy while curating a calming salon environment that reflects her love of texture and light despite her stress‑prone nature.
  sports: Janet Hamilton, an avid desert hiker, frequents the Sonoran Trail near Tempe and participates in a local weekend yoga club, while cheering on the Phoenix Suns during the NBA season and the Arizona
    Cardinals in the fall, using these low‑impact activities to counterbalance the sedentary demands of salon work.
  arts: Janet Hamilton, a devoted visual artist, spends weekends sketching watercolors of hair textures, curates visits to the Phoenix Art Museum and local indie film screenings, draws inspiration from
    Frida Kahlo, Yayoi Kusama, and the lo‑fi sounds of Sufjan Stevens, and captures portrait photography of friends with a vintage 35mm Leica, while listening to lo‑fi beats that fuel her creative flow.
  travel: Janet Hamilton, a wanderlust‑tinged student, has explored the desert landscapes of Sedona and the Grand Canyon, dreams of studying hair art in Barcelona’s El Raval district, and prefers meticulously
    planned, budget‑friendly trips that combine art festivals with quiet nature retreats, often traveling with a small circle of like‑minded friends.
  culinary: Janet Hamilton, a self‑described novice cook, favors fresh avocado toast topped with microgreens, enjoys crafting quinoa salads with prickly pear glaze inspired by desert botanicals, and occasionally
    treats herself to spicy chicken tinga tacos, though she often skips meals while immersed in studio work.
  core: Janet Hamilton is an artistic, stress‑sensitive 18‑year‑old whose life balances salon precision, desert hikes, and a habit of impulsively splurging on art supplies while meticulously saving for
    a future boutique‑gallery.
background:
  cultural: Janet comes from a middle‑class Anglo‑American family that has lived in the Phoenix metropolitan area for generations. Her parents encouraged a love of literature and visual arts, blending Midwestern
    values of responsibility and politeness with the multicultural vibe of Arizona’s desert cities. Growing up near Tempe, she has been regularly exposed to Southwestern art, Native American motifs, and
    the vibrant Latino community, which broadened her aesthetic sensibilities. While she celebrates mainstream American holidays, she also participates in local cultural festivals and supports community
    arts initiatives, reflecting a mix of traditional and progressive cultural influences.
attributes:
  skills: '[''Hair cutting and precision styling'', ''Advanced hair coloring and balayage techniques'', ''Texture manipulation (perm, relaxer, wave styling)'', ''Creative updos and bridal styling'', ''Scalp
    health assessment and product recommendations'', ''Makeup application for events and photo shoots'', ''Portfolio curation and social media marketing for salon work'', ''Appointment scheduling and salon
    management software (Mindbody, Vagaro)'', ''Customer service excellence and conflict resolution'', ''Knowledge of sustainable and eco‑friendly hair products'', ''Basic illustration and design drawing
    for concept sketches'', ''Interpersonal empathy and active listening for client comfort'']'
  hobbies: '[''Oil painting'', ''Watercolor sketching'', ''Visiting art galleries and museums'', ''Reading contemporary poetry'', ''Indie film watching'', ''Portrait photography'', ''Hiking in the Sonoran
    Desert'', ''Yoga and meditation'', ''Journaling for self‑reflection'', ''Listening to indie and lo‑fi music'']'
  career_goals: Short‑term, Janet aims to complete her Bachelor of Arts in Humanities at Arizona State University while earning her master cosmetology license and building a robust portfolio of artistic
    hairwork. She plans to attend advanced colorist workshops and gain certification as a Master Colorist. Long‑term, she envisions opening a boutique salon in Tempe that doubles as a gallery space for
    local visual artists, offering eco‑friendly haircare services and personalized artistic styling. She also hopes to develop a line of sustainable hair products inspired by desert botanicals and eventually
    collaborate on interdisciplinary art‑therapy projects that use hair and styling as expressive mediums.
