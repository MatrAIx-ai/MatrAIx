  career_goals: Alicia aims to move into a supervisory role within the next two years, such as shift supervisor or assistant manager, where she can apply her organizational strengths and mentor younger
    cashiers. She hopes to develop a small‑group training program that blends her curiosity for new retail technologies with proven best practices. Ultimately, she envisions a part‑time consulting role
    for local small businesses, helping them streamline cash operations and improve customer interaction before she fully retires.
