personas:
  professional: Alicia Bridges, a seasoned retail cashier with over 30 years of precise cash handling, rapid POS operation, and staff training expertise, channels their curiosity for emerging retail technologies
    and practical problem‑solving into streamlining checkout procedures while maintaining a calm, friendly demeanor that soothes anxious shoppers, reflecting their sociable yet emotionally reactive nature.
  sports: Alicia Bridges, who energizes herself through weekly line‑dancing classes at the Galveston community center and a senior walking club that meets every Saturday along the Seawall, watches the Houston
    Astros' spring training at Minute Maid Park with devotion, and occasionally joins a casual pickleball league at the local recreation center, balancing social camaraderie with low‑impact exercise.
  arts: Alicia Bridges, an avid participant in a mystery‑themed book club that devours titles by Agatha Christie and Hilary Mantel, also finds inspiration in the soulful accordion sounds of Flaco Jiménez
    and the cinematic scores of Hans Zimmer, weaving these artistic threads into their cooking and social gatherings.
  travel: Alicia Bridges, who prefers organized group tours that blend cultural sightseeing with culinary stops, has explored New Orleans' historic French Quarter and the vibrant markets of Oaxaca, and
    now dreams of a relaxed road trip along the Gulf Coast to explore the barrier islands of the Florida Keys, balancing a desire for adventure with the comfort of familiar companions.
  culinary: Alicia Bridges, a confident home chef who masterfully blends Tex‑Mex flair with Gulf‑coast seafood, frequently prepares shrimp fajitas with cumin‑spiced peppers, homemade guacamole featuring
    ripe Hass avocados, and heirloom tomato gazpacho, often inviting neighbors over for communal meals that celebrate fresh, locally sourced produce.
  core: Alicia Bridges, a charismatic 59‑year‑old cashier‑turned‑mentor, fuels their days with line‑dancing, puzzle‑solving, and spicy cuisine, yet habitually checks their bank balance multiple times a
    day, and sometimes lets anxiety drive impulsive snack runs at midnight.
background:
  cultural: Alicia was raised in the Gulf Coast region of Texas, where Southern hospitality and community solidarity are deeply valued. Her upbringing reflects a blend of traditional Texan customs—such
    as a love for hearty home‑cooked meals, neighborhood gatherings, and a reverence for local festivals—and an openness to new ideas encouraged by her practical curiosity. While she identifies with mainstream
    White American cultural norms, she also embraces the multicultural influences of the coastal area, including Hispanic culinary traditions and the festive spirit of Galveston’s Mardi Gras celebrations.
