  hobbies: '[''Line dancing'', ''Book club (mystery & historical novels)'', ''Gardening (heirloom vegetables)'', ''Cooking Tex‑Mex and Gulf‑coast seafood'', ''Volunteering at senior center'', ''Puzzle solving'',
