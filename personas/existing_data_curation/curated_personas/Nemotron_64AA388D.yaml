  career_goals: Edward aims to obtain formal credentials that bridge his practical abilities with a stable career. He plans to earn a CompTIA A+ certification and attend a community‑college IT support program,
    or alternatively pursue a vocational certificate in automotive technology. His long‑term ambition is to become a certified technical support specialist or automotive technician, achieve financial independence,
    and eventually launch a small business offering tech repair and maintenance services. He views concrete qualifications as a way to reduce his anxiety about future prospects and build a reliable professional
    path.
