personas:
  professional: Roberto Mikel is a diligent maintenance technician who leverages methodical troubleshooting, CAD drafting basics, and strong communication to exceed productivity metrics, while their competitive
    drive pushes them to constantly optimize facility operations.
  sports: Roberto Mikel enjoys playing intramural basketball at the local community center, follows the Nebraska Cornhuskers football and Kansas City Chiefs fervently, maintains a weekly jog through the
    Sandhills, and is a member of the Kearney Gold's Gym weight‑training club, all while they stay socially active and competitive on the court.
  arts: Roberto Mikel immerses themselves in the regional art scene by attending Kearney Community Theatre productions, studying the prairie landscapes of Grant Wood, photographing Great Plains sunsets
    with their DSLR, and collecting prints by local artist Nikki Glenn, often chatting with fellow creators about design ideas.
  travel: Roberto Mikel prefers road‑trip adventures that blend nature and small‑town culture, having driven to Yellowstone National Park, explored Chicago’s art museums, and planning a future trek to the
    Scottish Highlands to connect with their ancestral roots, while they budget each journey using a meticulously planned spreadsheet.
  culinary: Roberto Mikel enjoys cooking hearty Midwestern fare such as bison chili, runza pastries, and fresh corn succotash, experimenting with wood‑fired grilling and occasional DIY kitchen upgrades,
    though they often forget to finish a side dish when a new project calls.
  core: Roberto Mikel is a hands‑on, socially vibrant maintenance professional whose curiosity for design, competitive edge, and love of community events drive a life that balances practical problem‑solving
    with artistic expression, even as they over‑commit to trivia nights and occasionally neglect flossing.
background:
  cultural: Roberto was raised in Kearney, a small Midwestern city in Nebraska, within a family of mixed European ancestry that includes German and Irish roots. His upbringing emphasized the Midwestern
    values of hard work, community involvement, and self‑reliance, while also fostering an openness to new ideas and cultural experiences. He grew up attending local festivals, high school sports events,
    and community art programs, which shaped his appreciation for both the practical and creative aspects of life. Although he identifies as a white American, Roberto values the diversity of his hometown
    and actively engages with a range of cultural activities that reflect the evolving character of the region.
