  hobbies: '[ ''Visiting art galleries and exhibitions'', ''Community theater involvement'', ''Digital photography'', ''DIY woodworking'', ''Bar trivia nights'', ''Intramural basketball'', ''Volunteering
    at the county fair'', ''Camping and hiking in the Sandhills'', ''Learning smart‑home and IoT technologies'', ''Playing acoustic guitar'' ]'
  career_goals: Roberto aims to advance from a general maintenance technician to a senior facilities manager within the next five years. He plans to earn a bachelor's degree in facilities management or
    industrial engineering, and pursue certifications such as the Certified Maintenance & Reliability Professional (CMRP). His long‑term ambition is to lead a large‑scale maintenance team that integrates
    emerging technologies like IoT predictive maintenance and energy‑efficient retrofits. He also hopes to combine his appreciation for art and design by overseeing renovation projects that enhance the
    aesthetic and functional quality of public and commercial spaces, eventually establishing his own maintenance contracting firm focused on innovative, client‑centered solutions.
