  hobbies: '["Urban walking photography", "Community art circles", "Live jazz and folk concerts", "Yoga", "Rooftop gardening", "Food‑bank volunteering", "Mystery novels", "Knitting"]'
  career_goals: Angela hopes to transform her freelance practice into a sustainable community‑focused studio that offers low‑cost portrait sessions for underserved Brooklyn families. She aspires to curate
    a rotating exhibition space that showcases neighborhood stories, and to teach a series of beginner photography workshops that blend technical skill with the art of seeing everyday life. While she wishes
    to expand her brand, she remains practical; she plans to invest in a modest, rent‑controlled loft space that reduces overhead and eases her financial worries. Long‑term, she dreams of publishing a coffee‑table
    book of her 30‑year chronicle of Brooklyn’s evolving streets, marrying her curiosity with a legacy project that honors the people she photographs.
