personas:
  professional: Emma Metheny, a budding preschool architect, delights in arranging Lego bricks into orderly structures while equally relishing spontaneous storytelling sessions, displaying a practical yet
    flexible approach to early learning.
  sports: Emma Metheny participates in a preschool soccer class, loves cheering for the New York Yankees during family game nights, and enjoys unstructured tag on the playground in the spring, preferring
    spontaneous play over strict training schedules.
  arts: Emma Metheny, a tiny virtuoso of crayons, loves drawing bright dinosaurs while humming Raffi's 'Baby Beluga' and quoting Sesame Street characters, turning playtime into a lively performance for
    their stuffed audience.
  travel: Emma Metheny relishes family trips to the city zoo and the beach, favors spontaneous road-trip pit stops at quirky attractions over rigid itineraries, and dreams of exploring Disney World's magical
    realms.
  culinary: Emma Metheny adores peanut butter and banana sandwiches, crunchy chicken nuggets with honey-mustard dip, and creamy macaroni-and-cheese, often pretending to season mini-pizza slices with glittery
    sprinkles in their play kitchen.
  core: Emma Metheny is a structured yet adaptable four-year-old who thrives on predictable play routines, occasionally misplaces socks, and balances spontaneous adventures with a habit of hoarding stickers.
background:
  cultural: Emma is raised in a white, Midwestern family in West Point, Nebraska. Her upbringing reflects typical rural Nebraskan values such as close‑knit community ties, hard work, modesty, and appreciation
    for the outdoors. Family traditions include attending church on Sundays, celebrating holidays like Thanksgiving and Christmas with extended family, and participating in community events such as county
    fairs and school functions. The local culture emphasizes practical skills, respect for nature, and a gentle, supportive social environment.
