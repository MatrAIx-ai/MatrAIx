  career_goals: Emma loves to imagine caring for animals and helping others. She often dreams of becoming a veterinarian who can care for farm animals, or a preschool teacher who can share her love of stories
    and routines with younger children. She also enjoys helping on her family's farm and sees a future where she can combine her interest in animals, teaching, and the rhythm of farm life.
