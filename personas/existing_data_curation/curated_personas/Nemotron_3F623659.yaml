  hobbies: '[''Running (local 5K club)'', ''Adult basketball league'', ''Tennis'', ''Gardening'', ''Hiking in the Ozarks'', ''Cooking and hosting potluck dinners'', ''Yoga and meditation'', ''Habitat for
    Humanity volunteering'', ''STEM outreach mentorship'', ''Reading engineering journals'']'
  career_goals: Susan aims to become a senior project director overseeing statewide transportation and flood‑control initiatives, positioning herself as a champion of sustainable infrastructure in Missouri.
    She plans to earn her Professional Engineer (PE) license, publish research on resilient design, and secure a leadership role within the Missouri Society of Professional Engineers. In the longer term,
    she envisions launching her own consultancy that helps small communities upgrade aging bridges and water‑management systems, while mentoring the next generation of female engineers and earning recognition
    through industry awards.
