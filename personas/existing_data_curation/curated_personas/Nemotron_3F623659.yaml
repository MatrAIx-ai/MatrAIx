personas:
  professional: Susan Edwards, a senior structural engineer specializing in sustainable bridge and flood‑control design, blends a practical, problem‑solving mindset with a curiosity for innovative materials
    to deliver projects that meet strict Missouri codes while strengthening community resilience.
  sports: Susan Edwards runs with the River Run 5K club, plays competitively in the Pike County Hoopers adult basketball league, matches weekly at the Ozark Tennis Club, passionately supports the Kansas
    City Chiefs and St. Louis Cardinals, and treats each workout as a strategic challenge, often letting rivalry spark friendly banter.
  arts: Susan Edwards enjoys the Americana sounds of The Avett Brothers and the soulful blues of St. Louis legend Charles Walker, attends the annual Ozark Folk Festival, collects hand‑crafted quilts from
    local artisans, and binge‑watches period dramas starring Meryl Streep to recharge after demanding engineering projects.
  travel: Susan Edwards prefers road‑trip adventures along the Great River Road and hiking in the Ozark National Forest, has a bucket‑list destination of New Zealand’s South Island for its dramatic fjords,
    but balances travel with family commitments and a modest retirement fund, often planning trips around community events or engineering conferences.
  culinary: Susan Edwards is an adept home cook who frequently prepares Southern‑inspired dishes like buttermilk fried chicken, collard greens sautéed with smoked turkey, bourbon‑glazed pork ribs, and a
    famed pecan pie, using heirloom tomatoes and sweet corn from her garden, and eagerly shares these meals at potluck gatherings.
  core: Susan Edwards is a pragmatic yet curious engineer who channels competitive energy into community sports, battles stress with yoga, occasionally splurges on kitchen gadgets, and never misses a chance
    to showcase garden‑fresh Southern cooking at friends’ potlucks.
background:
  cultural: Susan grew up in the close‑knit, rural communities of Pike County, Missouri, where Midwestern values of self‑reliance, community service, and practical problem‑solving were emphasized. Her family’s
    involvement in local church and county fairs instilled a respect for tradition, while her early fascination with science fairs sparked a lifelong curiosity for how things work. Living near the Mississippi
    River has made flood resilience a personal concern, shaping her professional focus on sustainable infrastructure. She remains deeply connected to her hometown, regularly volunteering at community events
    and supporting local high‑school robotics clubs, which reflects her blend of heritage, practicality, and forward‑looking curiosity.
