personas:
  professional: Jean Myers, a seasoned event planner specializing in hybrid conventions, channels their curiosity for emerging formats and pragmatic expertise in budgeting, vendor negotiation, sustainability,
    and technology integration, and they maintain a flexible yet reliably structured planning style that consistently earns client trust.
  sports: Jean Myers pursues fitness through weekend hikes in the Colorado Rockies as a member of the local Rocky Mountain Hiking Club, complements this with weekly Vinyasa yoga at the Denver Mindful Studio,
    and they stay cheering for the Denver Broncos (NFL) and Colorado Avalanche (NHL) while occasionally joining amateur trail‑run meet‑ups during summer.
  arts: Jean Myers channels their love of visual storytelling through candid photography captured on a Nikon D750 at community festivals, frequents galleries like the Denver Art Museum and local art shows
    featuring Colorado‑based painter Maya Buck, draws inspiration from musician Neko Case, and they enjoy the indie performances of actress Frances McDormand’s films on quiet evenings.
  travel: Jean Myers curates travel with a blend of meticulous itinerary planning for cultural immersion and spontaneous road‑tripping for adventure, having explored the peaks of Banff, the culinary streets
    of Barcelona, and the desert vistas of Sedona, while they dream of trekking Patagonia’s Torres del Paine once their boutique firm stabilizes financially.
  culinary: Jean Myers experiments with seasonal Colorado cuisine, skillfully preparing quinoa‑crusted trout with local lemon and rosemary, heirloom beet salad with goat cheese, and rosemary‑infused roasted
    chicken, and they often source kale, butternut squash, and native honey from their own garden to craft comforting, health‑focused meals for intimate dinner gatherings.
  core: Jean Myers blends a pragmatic event‑director mindset with a coffee‑addicted, early‑riser habit, channeling a love for sunrise hikes into disciplined planning, and they sometimes overload their calendar
    to the point of sleepless nights.
background:
  cultural: Jean is a White American whose family roots trace back to German and Irish ancestry. She grew up in a Midwestern suburb before relocating to the Denver metropolitan area for college and eventually
    settling in Aurora, Colorado. The mountain lifestyle, outdoor recreation culture, and the diverse, cosmopolitan atmosphere of Denver have shaped her appreciation for both individual autonomy and community
    collaboration. Jean respects the rich indigenous heritage of Colorado and often incorporates local artisans and sustainable practices into her event work, reflecting a nuanced blend of her heritage
    and regional influences.
attributes:
  skills: '[''Event concept development'', ''Logistics coordination'', ''Budget creation and tracking'', ''Vendor negotiation'', ''Hybrid and virtual event technology integration'', ''Sustainability and
    green event planning'', ''Risk assessment and contingency planning'', ''Stakeholder communication'', ''Team leadership and staff training'', ''Project management software (Cvent, Eventbrite, Asana)'',
    ''On‑site event execution'', ''Post‑event evaluation and reporting'']'
  hobbies: '[''Hiking in the Rockies'', ''Yoga and mindfulness practice'', ''Cooking and experimenting with seasonal recipes'', ''Photography (candid event shots)'', ''Reading about design and event technology
    trends'', ''Volunteer work with local community festivals'', ''Gardening'', ''Board game nights with close friends'']'
  career_goals: Jean aims to advance to a senior event director role where she can oversee large‑scale conventions and mentor a growing team of planners. She aspires to earn the Certified Meeting Professional
    (CMP) designation and complete a bachelor's degree in hospitality management to deepen her strategic expertise. Long‑term, she envisions launching her own boutique event planning firm that specializes
    in sustainable, community‑focused events for the Colorado region. Jean also hopes to become a speaker and thought leader on hybrid event best practices, sharing her balanced perspective on innovation
    and practicality with industry peers.
