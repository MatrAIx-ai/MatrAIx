  career_goals: Even at five, Michael dreams of becoming someone who helps others grow. He imagines himself as a teacher who inspires children to learn, or as a community health worker who keeps families
    healthy. His ambition is fueled by his love for sharing knowledge, his disciplined approach to tasks, and his desire to maintain harmony in his community.
