personas:
  professional: Michael Young is a budding builder who spends hours arranging LEGO bricks with meticulous precision, inventing new structures while eagerly testing out the step‑by‑step instructions his
    parents read to him.
  sports: Michael Young is a lively member of the neighborhood soccer club, cheering for the local professional team the Seattle Sounders, and after practice they love to mimic their favorite player’s goal
    celebration, though they occasionally forget to stretch and end up a little sore.
  arts: Michael Young is an enthusiastic doodler who fills sketchbooks with bright dinosaurs and superhero portraits, delights in watching performances by the Disney Channel’s “Mickey Mouse Clubhouse,”
    and can recite verses from Dr. Seuss with dramatic flair, even if they sometimes draw over the same page many times.
  travel: Michael Young enjoys family road trips to the Grand Canyon and the local aquarium, preferring hands‑on exploration over long car rides, and they dream of visiting Tokyo’s Pokémon Center after
    seeing it in a cartoon, despite the fact they get restless on long flights.
  culinary: Michael Young loves building his own mini pizza with pepperoni slices and bell‑pepper circles, proudly claims the title of “sauce master” while stirring the tomato sauce, yet they often sneak
    extra cheese when Mom isn’t looking.
  core: Michael Young blends meticulous curiosity with boundless energy, crafting perfect LEGO towers while fiercely guarding a piggy bank, battling sneezes, scoring soccer goals, sketching dinosaurs, planning
    epic trips, and secretly adding extra cheese to every bite.
background:
  cultural: Michael grows up in a close‑knit African American community in Vienna, Georgia. Family gatherings, church events, and neighborhood picnics are central to his life, reinforcing traditions of
    storytelling, gospel music, and shared meals featuring Southern soul food. The local church provides a foundation for his moral values and offers opportunities for group singing and community service.
    He is immersed in a heritage that honors resilience, mutual support, and a deep connection to the land, reflecting both the rural Southern environment and the rich cultural tapestry of Black life in
    the American South.
