personas:
  professional: A budding young architect, Thu Ly channels methodical planning and love for routine into constructing intricate LEGO structures, carefully following step-by-step guides and ensuring each
    piece fits perfectly, and they take pride in finishing every set without error.
  sports: An enthusiastic team player, Thu Ly joins the Maple Grove Dragonflies U10 soccer team in the fall, participates in after-school gymnastics at the community center, practices traditional dance
    routines from their cultural club, and they view both activities as structured yet fun ways to stay active.
  arts: A picture-book enthusiast, Thu Ly treasures stories by Mo Willems and Dr. Seuss, enjoys listening to The Wiggles and Disney soundtracks while crafting paper lanterns in the cultural club, often
    recreates scenes with colored pencils imitating the style of illustrator Eric Carle, and they can recite favorite verses from memory.
  travel: A curious explorer, Thu Ly has visited the local aquarium and the historic downtown museum on school field trips, spent a weekend at the seaside town of Beacon Bay building sandcastles, dreams
    of traveling to Paris to see the Eiffel Tower and draw the skyline in a sketchbook, and they carefully mark each destination on a world map at home.
  culinary: A kitchen apprentice, Thu Ly follows step-by-step recipes for chocolate chip cookies, rice-filled spring rolls, and spaghetti Bolognese, proudly measuring ingredients with a bright plastic set,
    yet they sometimes rush the mixing stage, resulting in a slightly crumbly cookie texture, and they love sprinkling extra chocolate chips on top.
  core: Thu Ly blends disciplined routine with playful creativity, building LEGO marvels, charting savings, and arranging puzzle pieces while occasionally misplacing instruction manuals and demanding extra
    snack time before bedtime, and they giggle when they finally find the missing piece.
background:
  cultural: Thu belongs to an East Asian family that maintains strong cultural traditions while living in Cedar City, Utah. Her household values respect for elders, harmony in relationships, and practical
    education, which shape her daily routines and social interactions. Family gatherings often include sharing meals with dishes that reflect her heritage, celebrating holidays such as Lunar New Year with
    traditional foods, storytelling, and cultural performances. These experiences foster her appreciation for community, order, and the balance between personal time and social responsibilities.
attributes:
  skills: '["Reading comprehension","Basic arithmetic","Following step-by-step instructions","Using educational apps","Keeping personal spaces organized"]'
  hobbies: '["Building LEGO sets","Completing jigsaw puzzles","Reading picture books","Cooking with family using recipes","Participating in a youth cultural club (traditional dance and crafts)"]'
  career_goals: Even at nine, Thu dreams of a future where she can help others in a practical, structured way. She imagines becoming a veterinarian because she loves animals and appreciates the clear, routine
    care they need, or a school teacher because she enjoys sharing knowledge and seeing everyone succeed. Her long‑term goal is to work in a career that combines kindness, reliability, and a well‑ordered
    environment.
