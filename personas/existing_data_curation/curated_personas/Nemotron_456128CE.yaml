    and quilting'', ''Hiking local nature trails'', ''Volunteering at church soup kitchen'', ''Community theater backstage support'']'
  career_goals: Linda aims to transition from line cook to a leadership role by becoming an executive chef at a locally owned restaurant that celebrates farm‑to‑table Southern flavors. She dreams of opening
    a boutique catering business that offers seasonal, art‑inspired menus for community events. Additionally, she hopes to author a cookbook that melds her culinary expertise with personal stories and reflections
    on art, and to start a series of hands‑on cooking classes at the local community center to share her knowledge with neighbors of all ages.
