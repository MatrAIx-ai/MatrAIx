  career_goals: Looking ahead, Gregory aims to move into a regional sales management role where he can shape strategy for multiple market segments across the Bay Area. He plans to earn an executive MBA
    to deepen his financial and strategic acumen, and to spearhead the development of an innovative, data‑centric sales training program that blends traditional techniques with creative problem‑solving.
    Over the next five years, he envisions himself mentoring emerging sales leaders, contributing thought pieces to industry publications, and eventually taking on a senior director position that allows
    him to influence company‑wide growth initiatives while championing a culture of continuous learning and artistic curiosity.
