personas:
  professional: Kayla Glover, a senior clinical laboratory scientist with three decades of hematology and clinical chemistry expertise, leverages her methodical, Lean‑Six‑Sigma mindset to streamline lab
    workflows, mentor staff, and champion quality‑driven automation initiatives.
  sports: Kayla Glover stays active by walking the Charlotte Mecklenburg Trails with her husband and golden retriever, cheering on the Charlotte Hornets during the NBA season, and playing gentle doubles
    tennis at the local seniors’ club each spring.
  arts: Kayla Glover weaves cultural narratives into her quilting projects while listening to classic soul icons like Aretha Franklin and Marvin Gaye, and she regularly attends community theater productions
    of August Wilson’s plays.
  travel: Kayla Glover prefers meticulously planned road trips that blend history and nature, having explored the Savannah historic district and the Blue Ridge Parkway, while she dreams of a gentle Mediterranean
    cruise to visit the Amalfi Coast and historic sites in Italy.
  culinary: Kayla Glover, an adept home chef, crafts soulful yet health‑conscious dishes such as spiced quinoa‑stuffed bell peppers, kale and sweet‑potato salads, and low‑fat collard‑green casseroles, often
    seasoning with fresh rosemary and turmeric for church potluck gatherings.
  core: Kayla Glover blends scientific precision with garden‑grown creativity, channeling a love for order into vibrant quilts and meticulous health tracking, though she sometimes forgets to water the heirloom
    tomatoes amid her bustling schedule.
background:
  cultural: Kayla’s cultural background is rooted in the African‑American community of the American South. Born and raised in a close‑knit Black neighborhood of Charlotte, she grew up hearing stories of
    the civil‑rights movement from her grandparents, who were active in local voter‑registration drives. The church has been a central pillar of her family life, shaping values of service, resilience, and
    communal harmony. She celebrates Juneteenth and Kwanzaa, and she participates in community events that honor Black heritage, such as the Charlotte Black Cultural Festival. These experiences have instilled
    in her a strong sense of responsibility to address health inequities and to mentor younger Black professionals, influencing both her career focus and her community involvement.
