    Communication'', ''Documentation and SOP Development'']'
  hobbies: '[''Vegetable Gardening'', ''Reading Historical Fiction & Biographies'', ''Genealogy Research'', ''Cooking Health‑Conscious Soul Food'', ''Quilting'', ''Volunteering at Community Health Fairs'',
    ''Walking in Local Parks'', ''Senior Yoga'', ''Church Choir Participation'']'
  career_goals: Looking ahead, Kayla aims to transition into a leadership role where she can drive laboratory-wide quality and safety initiatives, particularly the adoption of automation technologies that
    enhance efficiency without compromising patient care. She plans to pursue a master's degree in Health Informatics to deepen her expertise in data‑driven decision making. A core ambition is to mentor
    and sponsor the next generation of Black women in STEM, establishing a community outreach program that offers workshops on laboratory careers and health literacy in underserved neighborhoods of Charlotte.
    Additionally, she hopes to contribute to regional efforts that reduce diagnostic disparities for minority patients.
