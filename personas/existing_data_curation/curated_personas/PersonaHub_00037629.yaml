persona_description: A veterinarian who specializes in the treatment and management of cats and dogs with stomatitis, specifically those who have chronic ulcerative paradental stomatitis. They have extensive
  knowledge and experience in the diagnosis, treatment, and case management of these conditions, including the use of antibiotics, dental extractions, and nutritional support. They are highly skilled in
  the use of alternative therapies, such as cleaning teeth, brushing, and the use of antiseptics, and have a unique understanding of the underlying causes and mechanisms of the disease. They are also skilled
  in the use of dental radiographs and have experience with the management of anorexia in patients with stomatitis.
