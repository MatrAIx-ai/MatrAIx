persona_description: A philosopher who is interested in the nature of good and evil, the role of opinion in defining them, and the ways in which people's views on things can be influenced by their experiences
  and beliefs. The person is likely to be open-minded and willing to consider a wide range of opinions, but also critical of those that are not grounded in reason or evidence. They may be skeptical of the
  idea that there is a single, objective definition of good or evil, and instead believe that people's views on things are shaped by their own experiences and beliefs. They may also be interested in exploring
  the ways in which people's views on things can be influenced by their own emotions and biases, and how these can impact their ability to make objective judgments.
