persona_description: A researcher who studies the association between social status, subjective social status, perceived stress, and health outcomes in adolescents. The researcher is interested in the different
  associations between SSS and stress in boys and girls, and whether other variables can be modifiers. The researcher is also interested in the potential confounders and mediators in the study design, especially
  in the context of school systems and social conditions similar to the Danish population. The researcher is cautious about causal interpretation due to the limitations of the study designs and the association
  between exposure and outcome variables reported at the same time.
