personas:
  professional: David Bennett, a seasoned postal service clerk with decades of experience in mail sorting, route optimization, and data entry, leverages his meticulous attention to detail and compassionate
    nature to mentor new clerks while ensuring the community’s mail service runs smoothly.
  sports: David Bennett stays active through daily walks in his garden and weekly bench‑press sessions at the Prosperity senior recreation center, cheers on the Carolina Panthers and the University of South
    Carolina Gamecocks, follows local high school football games, and plays on the Prosperity Pioneers 55‑plus softball league.
  arts: David Bennett spends his evenings listening to the blue‑grass sounds of Ralph Stanley, the gospel harmonies of his church choir, and the storytelling songs of Johnny Cash, while regularly visiting
    the Columbia Museum of Art to admire Southern realist painters such as William H. Johnson.
  travel: David Bennett prefers meticulously planned road trips that blend historical exploration with relaxed downtime, such as his annual drives to the historic districts of Charleston and Savannah, a
    spring visit to the National Archives in Washington, D.C. for genealogy research, and a summer retreat to the Gulf Coast town of Gulf Shores, Alabama.
  culinary: David Bennett enjoys preparing Southern staples like shrimp and grits, low‑sodium collard greens, and smoked pork ribs, often incorporating heirloom tomatoes, fresh basil, and sweet corn straight
    from his garden, and his modest cooking skills shine in pickling cucumbers and baking homemade cornbread.
  core: David Bennett is a pragmatic yet curious lifelong community servant who balances meticulous postal work, humble gardening, and gentle humor, though they often forget to water their begonias when
    engrossed in bridge.
background:
  cultural: David was born and raised in Newberry County, South Carolina, into a multi‑generational family with deep roots in the rural South. His cultural background reflects traditional Anglo‑American
    Southern values such as hospitality, community service, and a strong attachment to the local church. Growing up during the civil rights era, he witnessed the evolution of the region’s social fabric,
    shaping his compassionate and cooperative outlook. He maintains close ties with extended family, participates in local traditions like high school football games and church potlucks, and values the
    modest, pragmatic ethos that characterizes his hometown of Prosperity.
attributes:
  skills: '["Mail sorting", "Route planning and logistics", "Customer service and conflict resolution", "Data entry and record keeping", "Basic computer troubleshooting", "Time management", "Interpersonal
