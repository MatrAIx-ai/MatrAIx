personas:
  professional: Donald Adams, a 47‑year‑old postsecondary instructor, blends adult learning theory with cutting‑edge instructional technology to design flexible curricula, captivates large classes with
    their stage‑ready public speaking, mentors faculty through workshops, and channels their chronic worry into meticulous grant proposals, all while eyeing a future as director of the Center for Teaching
    Excellence.
  sports: Donald Adams, a 47‑year‑old community mentor, coaches youth basketball at his church while cheering on the Charlotte Hornets and the North Carolina Tar Heels, hikes the Piedmont Trail system on
    weekends for cardio, and they belong to a local running club that meets every Saturday morning.
  arts: Donald Adams, a 47‑year‑old community‑theater enthusiast, stars in productions of classic plays like 'Our Town' and contemporary pieces by Lin‑Manuel Miranda, leads a Toastmasters club where they
    polish their oratory skills, and they find artistic inspiration in the performances of Meryl Streep and Hugh Jackman.
  travel: Donald Adams, a 47‑year‑old history buff, plans road trips to American heritage sites such as Gettysburg, the Freedom Trail in Boston, and the Civil Rights Trail in Montgomery, prefers mid‑week
    travel to avoid crowds, and they often bring family along for weekend stays at historic inns.
  culinary: Donald Adams, a 47‑year‑old backyard pitmaster, perfects Southern barbecue recipes like smoked brisket with hickory wood, Carolina‑style pulled pork glazed with apple cider vinegar and brown
    sugar, and beans simmered with smoked sausage, while they occasionally overindulge in rich sauces as a comfort habit.
  core: Donald Adams, a 47‑year‑old educator who thrives on the spotlight, meticulously budgets, battles chronic worry with barbecue, leads community initiatives, and they can’t resist a good board‑game
    marathon.
background:
  cultural: Donald grew up in a middle‑class, white Southern family in the Atlanta metropolitan area. His upbringing was shaped by Southern hospitality, a strong sense of community, and regular participation
    in a Baptist church, where service and fellowship were emphasized. The values of hard work, respect for tradition, and an appreciation for education were instilled early on, guiding his pursuit of a
    graduate degree in education. Living in McDonough and Rockdale County, he enjoys the blend of suburban calm and cultural access to the city, fostering a connection to both local traditions—like family
    barbecues and church events—and broader academic and artistic pursuits.
attributes:
  skills: '[''Curriculum design'', ''Instructional technology integration'', ''Adult learning theory'', ''Public speaking and seminar facilitation'', ''Student advising and mentorship'', ''Educational psychology
    research'', ''Grant writing'', ''Data‑driven assessment'', ''Conflict resolution'', ''Team leadership'']'
  hobbies: '[''Community theater acting'', ''Toastmasters public speaking'', ''Youth basketball coaching'', ''Gardening'', ''Barbecue cooking'', ''Hiking in the Piedmont'', ''Listening to education and
    technology podcasts'', ''Reading historical biographies'', ''Traveling to historical sites'', ''Playing strategy board games'']'
  career_goals: Donald aims to transition into a leadership role within his institution, such as Director of the Center for Teaching Excellence or Department Chair, where he can shape pedagogical strategy
    and support faculty development. He is passionate about expanding the use of blended and immersive learning technologies, and plans to secure a major grant to pilot a university‑wide digital learning
    initiative. Additionally, Donald wants to champion mental‑health resources for both students and staff, drawing on his own experiences with stress and worry to foster a more supportive campus environment.
    Long‑term, he hopes to publish a seminal text on integrating curiosity‑driven inquiry with practical classroom management, establishing himself as a thought leader in higher‑education teaching innovation.
