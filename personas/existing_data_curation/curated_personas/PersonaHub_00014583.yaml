persona_description: A survey team member who is responsible for preparing and submitting a list of properties for inclusion in a Landmark District. The person is experienced in conducting research and
  analyzing data to determine the historic significance of individual properties. They are detail-oriented and meticulous in their work, ensuring that all sources of historical information are consulted
  and incorporated into the survey data sheet. The person is also skilled in using GIS technology to coordinate and manage the final work products, including the creation of the final GIS mapping.
