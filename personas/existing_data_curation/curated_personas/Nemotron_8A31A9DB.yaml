  hobbies: '[''Block parties'', ''Bingo'', ''Church choir'', ''Waterfront walks'', ''Reading African‑American literature'', ''Balcony gardening'', ''Cooking'', ''Knitting and quilting'', ''Listening to
    jazz and gospel'', ''Storytelling circles'', ''Volunteer computer tutoring'']'
  career_goals: Even at ninety, Tyra remains forward‑looking. She aims to capture and publish a collection of oral histories from Brooklyn’s senior Black residents, ensuring their stories are archived for
    future generations. She wishes to establish a small scholarship fund, named after her parents, to support local high‑school students pursuing higher education in social work or the arts. Tyra continues
    to lead the senior‑center’s annual cultural festival, hoping to expand its reach to neighboring boroughs. She also plans to write a memoir that blends her personal journey with the broader history of
    the civil‑rights era in New York. Finally, she aspires to mentor her grandchildren and great‑grandchildren, imparting practical life skills and cultural pride, while staying active in her church’s outreach
    programs.
