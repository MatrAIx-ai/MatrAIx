personas:
  professional: Tyra Meekins, a veteran community organizer and senior‑center facilitator, leverages meticulous event planning, budgeting, and storytelling skills to coordinate neighborhood block parties,
    cultural festivals, and digital workshops, while mentoring volunteers with a balanced mix of curiosity and practicality.
  sports: Tyra Meekins follows the Brooklyn Nets, the New York Yankees, and the New York Knicks, participates in a senior walking club at Brooklyn Bridge Park, attends a weekly low‑impact aqua‑fitness class
    at the community pool, and enjoys casual games of bocce with neighbors at the senior center during the summer.
  arts: Tyra Meekins sings in her church choir, delights in the jazz of John Coltrane, the gospel power of Mahalia Jackson, and the lyrical flow of Kendrick Lamar, devotes evenings to reading works by Toni
    Morrison and James Baldwin, and curates neighborhood art displays featuring local painters like Sara Lowes and photographers such as Marcus Reed.
  travel: Tyra Meekins enjoys short weekend trips to historic towns like Woodstock, NY, and coastal getaways in Cape Cod, has taken a memorable cruise to the Caribbean islands of Jamaica and the Bahamas,
    and dreams of visiting the national parks of Utah, especially Zion, for a serene escape.
  culinary: Tyra Meekins specializes in comforting Southern‑inspired dishes like herb‑crusted baked chicken and slow‑cooked collard greens, blends in Caribbean spices such as Scotch bonnet pepper and thyme
    when making a tomato‑based stew, and favors fresh basil, cilantro, and garlic from her balcony garden to garnish meals like garlic‑infused pasta and homemade tomato soup.
  core: Tyra Meekins is a 90‑year‑old community champion who blends organized activism, soulful creativity, and disciplined self‑care into a lively, hands‑on lifestyle that never stops learning or giving.
background:
  cultural: Tyra Latoya Meekins was born in 1935 in the Jim Crow South and moved with her parents to Brooklyn as part of the Great Migration, settling in Bedford‑Stuyvesant. Raised in a close‑knit Black
    church community, she grew up surrounded by gospel music, soul food, and the civil‑rights activism that shaped the 1960s. Her family’s Southern roots blend with the vibrant Caribbean influences that
    later arrived in Brooklyn, giving her a rich tapestry of culinary and cultural traditions. Over the decades, she witnessed the transformation of her neighborhood—from a haven of Black entrepreneurship
    to the diverse, gentrifying landscape of modern Brooklyn. Tyra’s identity is deeply tied to these histories; she celebrates Juneteenth, honors family reunions, and actively participates in local cultural
    festivals that highlight African‑American heritage. This background informs her commitment to preserving community stories, mentoring youth, and keeping cultural practices alive for future generations.
