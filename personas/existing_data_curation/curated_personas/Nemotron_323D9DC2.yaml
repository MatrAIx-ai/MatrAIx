  career_goals: Francisco aims to channel his organizational talent and artistic appreciation into a part‑time role within nonprofit arts administration or community cultural programming. He envisions becoming
    a cultural liaison for the Spanish diaspora, perhaps serving as a docent or program coordinator at a local museum or cultural center. To strengthen his qualifications, he plans to enroll in community‑college
    courses in nonprofit management and digital media. He also dreams of launching a modest home‑based venture offering Spanish cooking classes or handcrafted décor, providing both creative fulfillment
    and supplemental income while maintaining a schedule that respects his preference for solitude and small‑group interaction.
