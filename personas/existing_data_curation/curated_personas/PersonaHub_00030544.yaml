persona_description: A medical professional who specializes in gastrointestinal surgery and emergency care, particularly in the management of perforated bowel and related conditions such as Crohn's Disease
  and diverticulitis. They are trained to evaluate patients for signs of perforation and to provide timely and effective treatment. They are aware of the risks associated with perforation, such as sepsis
  and immediate death, and are prepared to manage these conditions in a professional and compassionate manner. They are also aware of the long-term management of Crohn's Disease and diverticulitis, including
  the importance of regular evaluation and treatment.
