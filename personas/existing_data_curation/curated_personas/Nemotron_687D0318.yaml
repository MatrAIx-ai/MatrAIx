  career_goals: Although still a toddler, Maria often talks about wanting to become a teacher or an artist when she grows up. She dreams of sharing stories and songs with other children, drawing colorful
    pictures on a big canvas, and performing on stage to make people smile. She also imagines helping other kids feel safe and happy, reflecting her caring nature.
