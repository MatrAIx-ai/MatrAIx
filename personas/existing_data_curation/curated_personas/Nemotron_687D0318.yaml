personas:
  professional: Maria Morales is a budding creative director who stages elaborate puppet shows for their playgroup, using their curiosity, love of unconventional ideas, knack for balancing organization
    with flexibility, and sociable charisma to keep everyone engaged and delight in the role of center stage.
  sports: Maria Morales enthusiastically participates in the Tiny Tigers Soccer Club during the spring, spends sunny summer afternoons at the community splash pad, and proudly dons a cap of the local minor‑league
    baseball team, the River City Rookies, embodying a playful yet team‑spirit focused approach to fitness that they pursue with boundless energy.
  arts: Maria Morales delights in fingerpainting with vibrant acrylics, dances to the upbeat rhythms of Pharrell Williams and the classic Disney lullaby 'A Whole New World', and spends weekends watching
    animated films starring the voice of Idina Menzel, allowing these artistic experiences to shape their early sense of creativity and self‑expression.
  travel: Maria Morales enjoys family road trips to the sandy shores of Santa Cruz, where they collect seashells and build sandcastles, and dreams of exploring the historic castles of Edinburgh after watching
    a travel documentary, balancing a love for relaxed beach days with an emerging curiosity for far‑off adventures.
  culinary: Maria Morales favors spaghetti with marinara sauce sprinkled with parmesan, golden chicken nuggets dipped in honey mustard, and fresh mango slices, often helping stir the pot with a plastic
    spoon and insisting on a dash of parsley before each bite, which they consider the perfect finishing touch.
  core: Maria Morales is a bright, talkative three‑year‑old whose boundless curiosity and love for art often clash with intense emotional meltdowns whenever routines are disrupted, leaving them swinging
    between exuberant chatter and sudden tears.
background:
  cultural: Maria was born into a white, middle‑class family in Wichita, Kansas. Her upbringing reflects Midwestern values such as community involvement, modesty, and a love for local traditions like the
    county fair and church gatherings. She attends a community preschool where she is exposed to diverse activities including art, music, and nature exploration, fostering her curiosity and sociable personality.
