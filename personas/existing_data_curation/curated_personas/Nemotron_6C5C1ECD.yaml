personas:
  professional: Donna Campbell, a 28‑year‑old high school STEM teacher, leverages her physics, chemistry, and mathematics expertise along with meticulous lesson planning and data‑driven assessments to create
    structured yet adaptable classroom experiences, and they channel their outgoing energy into leading vibrant robotics clubs and community outreach programs.
  sports: Donna Campbell stays active through weekly hikes with the Long Island Coastal Trails Club, they also join a local salsa‑dance crew for cardio fun, and cheer on the New York Islanders and New York
    Yankees while they schedule regular strength‑training sessions at a community gym to balance endurance with muscle tone.
  arts: Donna Campbell immerses herself in the arts by attending off‑Broadway productions like “The Lightning Thief” and touring exhibitions at the Metropolitan Museum of Art featuring works by Kehinde
    Wiley, they relish reading contemporary fiction by Sally Rooney and popular science by Neil deGrasse Tyson, and they channel this cultural appetite into baking sourdough loaves inspired by French patisserie
    traditions.
  travel: Donna Campbell prefers meticulously planned weekend getaways that blend cultural immersion with relaxation, they have explored the historic neighborhoods of Boston and the vibrant street art scene
    in Austin, Texas, while dreaming of a spring trip to Kyoto’s cherry‑blossom gardens once they save enough for international travel.
  culinary: Donna Campbell, an avid home baker, delights in crafting crusty sourdough loaves and rosemary‑infused focaccia using fresh herbs from her backyard garden, they complement their creations with
    seasonal salads tossed with heirloom tomatoes and feta, and they often treat friends to decadent chocolate‑lavender tarts after a night of salsa dancing.
  core: Donna Campbell balances a love for structured STEM curricula with spontaneous salsa nights, they habitually over‑schedule their weekends, occasionally forget to water their garden, yet their relentless
    optimism and meticulous planning keep their life buzzing with purpose.
background:
  cultural: Donna Anne is a third‑generation American of Irish and English ancestry, raised in a middle‑class suburban family in Long Island. Her parents emphasized education, community service, and the
    value of reliable, cooperative relationships. She grew up attending a Catholic parish, participating in holiday traditions such as Thanksgiving feasts, Easter brunches, and Fourth of July barbecues,
    which reinforced a sense of community and shared celebration. The loss of her spouse early in adulthood brought her closer to her extended family and local support networks, deepening her appreciation
    for empathy and collective resilience. Living in Glen Cove, a town with a mix of long‑standing families and diverse newcomers, has exposed her to a variety of cultural events—from local art fairs to
    multicultural festivals—shaping an inclusive outlook that she brings into her classroom and community involvement.
attributes:
  skills: '["STEM subject expertise (physics, chemistry, math)", "Lesson planning and curriculum design", "Classroom management with structured flexibility", "Educational technology integration (Google
    Classroom, interactive whiteboards)", "Data-driven assessment and progress tracking", "Coaching extracurricular STEM clubs (robotics, Science Olympiad)", "Cross-disciplinary project collaboration",
    "Professional development facilitation for teachers", "Effective communication and public speaking", "Organizational and project management (scheduling, budgeting, field trips)"]'
  hobbies: '["Salsa dancing", "Long Island hiking and nature walks", "Volunteer work at Glen Cove Food Bank", "Book club (contemporary fiction & science writing)", "Baking artisanal breads and desserts",
    "Weekend trips to NYC cultural events", "Coaching youth robotics team", "Backyard gardening (herbs and vegetables)"]'
  career_goals: Over the next few years Donna Anne aims to earn a Master’s in Educational Leadership and step into the role of STEM department head at her school. She wants to spearhead an interdisciplinary
    STEM program that ties real‑world problem solving to classroom learning, expand extracurricular offerings like a robotics club and coding bootcamps, and mentor new teachers entering the field. Participation
    in district curriculum committees is a priority, as she seeks to influence policy and resource allocation. Ultimately, she envisions moving into school administration—potentially as a principal—where
    she can champion inclusive education, community partnerships, and innovative teaching practices.
