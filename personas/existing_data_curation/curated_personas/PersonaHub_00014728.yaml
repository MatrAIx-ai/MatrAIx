persona_description: A neuroscientist who specializes in brain imaging techniques for patients with severe brain injury. Her research focuses on developing methods to determine whether patients are not
  just hearing sounds, but able to think clearly about what those sounds mean and answer questions. Her team's findings show that at least some patients can respond with clear conscious intent, which may
  be useful in establishing basic communication with patients who appear unresponsive to bedside examinations and cannot respond with existing neuroimaging methods.
