personas:
  professional: Ivan Irias, a veteran counselor with three decades of experience in community mental health, leverages a methodical, routine‑oriented approach and bilingual cultural competence to design
    evidence‑based counseling programs, mentor junior staff, and systematically track outcomes, while their competitive drive fuels a push toward senior program director leadership.
  sports: Ivan Irias, a devoted baseball enthusiast, faithfully follows the Miami Marlins and the island baseball league, regularly attends games at loanDepot park, and participates in the local senior
    pick‑up softball league during the spring season.
  arts: Ivan Irias, an avid salsa dancer, immerses themselves in the rhythm of classic salsa nights, regularly listening to the iconic sounds of Marc Anthony, Gloria Estefan, and Tito Puente while attending
    cultural festivals that showcase traditional dance performances.
  travel: Ivan Irias, a methodical traveler, plans trips months in advance, preferring short flights to nearby Caribbean islands to visit family and to historic cities like New Orleans and Savannah, while
    occasionally indulging in spontaneous weekend getaways to Miami Beach festivals.
  culinary: Ivan Irias, an intermediate home chef, delights in preparing classic island dishes such as ropa vieja and arroz con pollo, spicing them with cumin, oregano, and fresh garden tomatoes and herbs,
    and often hosts potluck gatherings where their signature citrus‑marinated pork draws applause from guests.
  core: At 61, Ivan Irias blends disciplined routine with vibrant community engagement, turning mentorship, salsa, and heritage cooking into a uniquely organized yet culturally rich life.
background:
  cultural: Ivan is a first-generation Cuban American who grew up in the vibrant Cuban enclave of Hialeah, Florida. He was raised in a bilingual household where Spanish was spoken daily, and Cuban traditions
    such as quinceañeras, San Juan celebrations, and family-centered gatherings were central to his upbringing. His Catholic faith and strong sense of family loyalty reflect typical Cuban cultural values.
    Ivan maintains close ties to his extended family in Cuba, regularly participates in community events at local Cuban social clubs, and incorporates his cultural heritage into his counseling practice
    by using culturally resonant metaphors, respecting familial hierarchies, and honoring the importance of community support.
attributes:
  skills: '[''Individual counseling'', ''Group facilitation'', ''Crisis intervention'', ''Case management'', ''Program development and evaluation'', ''Bilingual communication (Spanish/English)'', ''Cultural
    competency with Cuban-American communities'', ''Educational planning'', ''Mentoring junior staff'', ''Conflict resolution'']'
  hobbies: '[''Salsa dancing'', ''Cooking Cuban cuisine'', ''Playing dominoes'', ''Gardening'', ''Watching baseball'', ''Volunteering at church youth program'', ''Attending Cuban cultural festivals'', ''Reading
    historical biographies'', ''Traveling to Cuba'']'
  career_goals: Ivan aspires to become a senior program director at a community mental-health center in Miami-Dade, where he can institutionalize culturally tailored counseling services for Cuban-American
    families. He plans to obtain his Licensed Professional Counselor (LPC) credential and complete a master's in counseling to deepen his clinical expertise. Ivan also aims to develop a community outreach
    curriculum that combines mental-health education with traditional Cuban wellness practices, mentor emerging counselors, and publish a guide on culturally competent counseling for Latino populations.
    His competitive drive pushes him to seek leadership roles and measurable improvements in client outcomes.
