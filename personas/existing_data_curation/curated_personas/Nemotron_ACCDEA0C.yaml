  career_goals: William aims to progress from his current administrative support role to an office manager or operations coordinator position within the next three years. He plans to earn a Six Sigma Yellow
    Belt and a Certified Associate in Project Management (CAPM) to formalize his process‑improvement expertise. He aspires to lead initiatives that automate routine tasks, reduce workflow bottlenecks, and
    improve team efficiency, positioning himself as the go‑to problem solver in his organization. Long‑term, he envisions launching a freelance consultancy that helps small businesses streamline their office
    operations, leveraging his competitive drive to win contracts through measurable performance gains.
