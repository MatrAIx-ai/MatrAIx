  career_goals: Kleber dreams of becoming a robotics engineer or a tech entrepreneur who designs affordable educational gadgets for his community. He aims to win the regional science fair, earn a scholarship
    to a specialized STEM high school, and eventually create software that supports bilingual learning. In the short term, he wants to make the varsity soccer team at his middle school, be recognized as
    the top coder in his age group, and develop a prototype robot that can assist with simple household tasks.
