personas:
  professional: Kleber Garay is a budding game creator who builds simple adventure games in Scratch, applying their meticulous curiosity and practical mindset to write clean, organized code, while their
    competitive streak pushes them to fine‑tune every pixel and they constantly double‑check for hidden bugs.
  sports: Kleber Garay is a soccer enthusiast who practices dribbling and shooting with a tight circle of friends, passionately follows the local professional team (the city’s MLS side), and they approach
    each training session with a competitive edge, meticulously tracking progress in a notebook while occasionally overlooking the fun of spontaneous play.
  arts: Kleber Garay spends afternoons constructing intricate LEGO models and coding short animations, while they unwind listening to folk melodies by traditional musicians like Lila Downs and Victor Jara,
    letting the rhythms inspire their own storytelling during family gatherings.
  travel: Kleber Garay dreams of exploring the ancient ruins of Machu Picchu and wandering the colorful markets of Oaxaca after a school field trip to the nearby national park, and they prefer well‑planned
    itineraries that balance adventure with the comfort of staying with relatives.
  culinary: Kleber Garay enjoys helping their mother wrap tamales with masa and pork filling, savoring smoky chipotle and sweet corn flavors, and they often experiment by adding a pinch of cumin to the
    broth while listening to family stories behind each recipe.
  core: Kleber Garay is a curious yet skeptical 10‑year‑old who builds LEGO castles, codes tiny games, solves brainteasers, and worries about missing the next challenge, balancing competitive drive with
    a love for quiet, structured creativity.
background:
  cultural: Kleber is raised in a Mexican‑heritage household in Whittier, California. His parents immigrated from Mexico and maintain strong ties to their cultural roots, speaking Spanish at home and celebrating
    traditions such as Día de los Muertos, Cinco de Mayo, and family holiday gatherings centered around homemade comida. The local Latino community provides a supportive environment where bilingualism is
    valued, and community events often feature mariachi performances, folkloric dance, and shared meals. Kleber’s upbringing blends Mexican familial values—respect for elders, emphasis on family cohesion,
    and appreciation of cultural cuisine—with the multicultural influences of Southern California, giving him a fluid identity that honors both his heritage and his American surroundings.
