    in small professional circles'', ''Flexible project management'']'
  hobbies: '[''Visiting art galleries and local museums'', ''Attending live jazz and blues performances'', ''Collecting vintage advertising posters'', ''Reading contemporary fiction and African American
    literature'', ''Participating in a neighborhood book club'', ''Gardening in her backyard'', ''Practicing yoga and meditation'', ''Experimenting with watercolor painting'', ''Exploring new restaurants
    and food trucks'', ''Traveling to cultural festivals'']'
  career_goals: Alicia aims to move into senior leadership within her agency, targeting a role such as Senior Account Director where she can guide larger client portfolios and mentor junior staff. She is
    also exploring the possibility of launching her own boutique agency that focuses on culturally resonant campaigns for local businesses and community organizations in the South. Ultimately, she hopes
    to become a recognized advocate for inclusive advertising practices, using her platform to elevate underrepresented voices.
