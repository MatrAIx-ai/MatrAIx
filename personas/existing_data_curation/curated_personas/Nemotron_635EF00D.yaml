personas:
  professional: Alicia Hanks, a 43-year-old senior account strategist at a regional advertising agency, blends a sharp commercial instinct with a deep appreciation for visual storytelling, leveraging their
    curiosity for emerging cultural trends and their calm, resilient demeanor to negotiate high‑stakes client deals, and they often wrestle with a disorganized filing system.
  sports: Alicia Hanks, an avid supporter of the Atlanta Falcons, Atlanta Hawks, and Atlanta Braves, joins a local women's running club for weekend jogs and enjoys seasonal basketball pick‑up games, yet
    they prefer the meditative flow of yoga over high‑intensity workouts.
  arts: Alicia Hanks immerses herself in the arts by curating a small collection of vintage advertising posters, attending live jazz and blues shows featuring John Coltrane tributes and B.B. King covers,
    exploring gallery exhibitions that showcase contemporary storytellers like Kara Walker, and they occasionally express their own voice through watercolor painting inspired by the narratives they cherish.
  travel: Alicia Hanks favors spontaneous road trips that weave through Southern cultural gems such as Savannah, New Orleans, and Charleston, while dreaming of a month‑long sojourn in Santa Fe to soak up
    its art scene and a future European tour of Paris and Florence, and they balance these wanderlust plans against the financial and family obligations of launching their boutique agency.
  culinary: Alicia Hanks delights in exploring food trucks serving kimchi tacos and Caribbean jerk chicken, savors family‑run Southern staples like peach cobbler and shrimp and grits, experiments with cooking
    using fresh basil, smoked paprika, and heirloom tomatoes, yet they admit their confidence in the kitchen stops short of mastering complex sauces.
  core: Alicia Hanks, at 43, fuses a calm, resilient outlook with a curious, art‑driven mind, navigating career ambitions and a love of vintage ads while they battle a habit of misplaced files and occasional
    overspending on collectibles.
background:
  cultural: Alicia is a proud African‑American woman rooted in the Southern traditions of Georgia. Her upbringing in a close‑knit Black community instilled a deep respect for oral storytelling, gospel music,
    and communal support networks, which she carries into her professional life. She draws inspiration from the rich heritage of Southern Black art and literature, often integrating elements of that cultural
    tapestry into her advertising ideas. Family ties, church gatherings, and community celebrations continue to shape her values of resilience, collective uplift, and authentic representation.
