  career_goals: Chad aspires to study marketing or business administration at a university and later launch his own digital‑marketing agency that blends data‑driven strategy with creative storytelling.
    He dreams of becoming a brand strategist or creative director for a major consumer‑goods company, where he can harness his love of art, his organized work style, and his talent for engaging audiences.
    Long‑term, Chad hopes to mentor younger students in Overland Park, helping them develop leadership and communication skills while fostering a culture of healthy competition and innovative thinking.
