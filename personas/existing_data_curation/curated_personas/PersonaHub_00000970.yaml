persona_description: A chemist who specializes in the study of supramolecular chirality, specifically focusing on the design and synthesis of bis-porphyrinoids with chiral linkage for enantioselective recognition
  and detection of chiral molecules. The chemist has experience in the synthesis of bis-porphyrinoids with chiral linkage, the optical characterization of their chirality, and the application of these compounds
  for enantioselective recognition and detection. The chemist's expertise extends to the solid-state properties of bis-porphyrinoids and the development of nanogravimetric sensors based on these compounds.
