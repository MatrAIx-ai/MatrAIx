personas:
  professional: Shantoria Garrett, a retired community organizer, leverages her culinary mastery, garden stewardship, and choir leadership to mentor younger generations while meticulously coordinating church
    and neighborhood events, balancing routine with a competitive drive to be recognized as the town’s cultural keeper.
  sports: Shantoria Garrett follows the LSU Tigers football team with fervor, participates in a weekly senior bowling league at the local community center, and joins church‑hosted walking clubs, though
    she sometimes skips post‑garden stretching due to stubborn knee soreness.
  arts: Shantoria Garrett sings gospel in her church choir, delights in classic black‑and‑white films by Charlie Chaplin and Buster Keaton, reads historical fiction by authors such as Walter Dean Myers,
    and displays framed prints of the Harlem Renaissance, reflecting her love for storytelling through music, cinema, and literature.
  travel: Shantoria Garrett enjoys weekend road trips to the historic French Quarter of New Orleans, seasonal visits to Charleston’s historic district, and annual pilgrimages to Washington, D.C.’s National
    Museum of African American History, planning each journey with a meticulous itinerary that balances sightseeing with ample rest periods.
  culinary: Shantoria Garrett excels at simmering gumbo with Andouille sausage, slow‑cooking jambalaya over a cast‑iron pot, and braising collard greens with smoked turkey, favoring ingredients like okra,
    filé powder, and a pinch of cinnamon, while her garden yields fresh tomatoes and bell peppers that she incorporates into weekly family feasts.
  core: Shantoria Garrett blends meticulous routine with vibrant community storytelling, channeling her competitive spirit into preserving Southern culinary traditions, garden stewardship, and gospel music,
    while occasionally letting stubbornness keep her from modern health checks.
background:
  cultural: Shantoria grew up as a Black woman in rural central Louisiana, steeped in Southern Black cultural traditions that blend African-American gospel music, Creole cuisine, and a strong church community.
    Her family’s history includes experiences of segregation, the Civil Rights movement, and the resilience of a close‑knit extended family. She embraces the values of hospitality, faith, and self‑reliance
    passed down through generations, while also being fluent in the local dialects and customs of Avoyelles Parish, where African-American, Cajun, and Creole influences converge. Her cultural identity is
    expressed through food, music, oral storytelling, and community service.
