  career_goals: Although retired, Shantoria aims to leave a lasting legacy by documenting her family’s recipes and oral histories in a written memoir, establishing a community garden that supplies fresh
    produce to neighbors, mentoring her grandchildren and other youth in cooking, quilting, and financial stewardship, and continuing to serve as a respected elder and organizer of church events. She also
    hopes to host an annual senior cooking competition that celebrates Black Southern cuisine and to be recognized as a cultural keeper of her community’s traditions.
