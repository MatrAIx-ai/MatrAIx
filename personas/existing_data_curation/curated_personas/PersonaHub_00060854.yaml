persona_description: A historian who specializes in the study of Georgian architecture and town planning, particularly the evolution of the Mews from private stables and livery yards to integral parts of
  Georgian estate building. Her research interests include, but are not limited to, the social and economic contexts of the time, the architectural styles and designs of the period, and the impact of the
  Mews on the development of London. She is particularly interested in the practical and aesthetic reasons for the separation of primary, secondary, and tertiary accommodation, and how this planning principle
  underlies Georgian Town Planning. She is also interested in the social and economic conditions of the time, particularly the usage of the Mews and the reasons for their perceived agricultural nature.
