personas:
  professional: Christina Colorado, a 41-year-old front-of-house professional with bilingual fluency, leverages her curiosity about food and people to manage a bustling dining room, resolve guest concerns
    with calm empathy, and train teammates on Spanish-New Mexican menu fusions while juggling a relaxed approach to scheduling that sometimes leaves paperwork a bit scattered.
  sports: Christina Colorado hikes the Organ Mountains on weekends, practices yoga at a local studio, cheers for the El Paso Chihuahuas baseball team and the New Mexico State Aggies football squad, and
    joins a community salsa-dance fitness class that doubles as cardio.
  arts: Christina Colorado captures desert sunsets through photography, reveres the soulful guitar of Paco de Lucía and the vibrant salsa rhythms of Celia Cruz, relaxes with mystery novels by Tana French,
    and often attends community theater productions of classics like "A Streetcar Named Desire".
  travel: Christina Colorado favors spontaneous weekend road trips to nearby gems such as Santa Fe and Tucson, dreams of a culinary pilgrimage to Barcelona’s tapas bars, and balances her love for adventure
    with careful budgeting that keeps long-haul overseas vacations on hold until her tapas-bar project secures stable income.
  culinary: Christina Colorado, a seasoned home chef, delights in preparing paella with saffron-infused rice alongside smoky carne adovada and roasted green chile, frequently experiments with blending Spanish
    tapas such as patatas bravas with New Mexican red-chile enchiladas, and stocks her pantry with garlic, oregano, and ancho chile powder for spontaneous flavor fusions.
  core: Christina Colorado, a 41-year-old bilingual hospitality enthusiast, balances a penchant for spontaneous salsa nights and impulsive kitchen gadget splurges with a chronic worry that fuels nightly
    journaling and yoga, all while dreaming of opening a flexible-hours tapas bar that marries Spanish flair with New Mexican heat.
background:
  cultural: Christina is of Spanish heritage and was raised in a bilingual household where both Spanish and English were spoken daily. Her upbringing emphasized family meals, hospitality, and traditional
    celebrations such as Día de los Reyes and Semana Santa. Living in Las Cruces, New Mexico, she blends these Spanish roots with the rich Hispanic and Native‑American cultural tapestry of the Southwest,
    developing a deep appreciation for both tapas‑style dining and the region’s chile‑infused cuisine. She participates in local Spanish cultural groups, celebrates Hispanic holidays, and incorporates Spanish
    values of solidarity, warmth, and generosity into her interactions at work and in the community.
attributes:
  skills: '["Customer service", "Bilingual communication (Spanish/English)", "Cash handling and POS operation", "Food safety & sanitation compliance", "Team collaboration", "Event coordination", "Menu knowledge
    (Spanish & New Mexican cuisine)", "Problem solving under pressure", "Conflict resolution", "Flexible time management"]'
  hobbies: '["Cooking Spanish and New Mexican dishes", "Flamenco and salsa dancing", "Hiking in the Organ Mountains", "Volunteering at community festivals", "Language exchange meetups", "Photography", "Gardening",
    "Reading mystery novels", "Yoga and mindfulness practice", "Attending local cultural fairs"]'
  career_goals: Christina aims to transition from a waitstaff role to a supervisory position within the next two years, pursuing a hospitality management certificate to strengthen her leadership abilities.
    She envisions eventually opening a small family‑run tapas bar that blends traditional Spanish dishes with New Mexican flavors, offering a flexible schedule that aligns with her preference for adaptable
    work hours. In the longer term, she hopes to mentor younger staff, become an active contributor to the local culinary community, and achieve greater financial stability to support herself after her
    divorce. To reduce her natural tendency toward worry, she plans to adopt more structured planning tools while still preserving the flexibility she values.
