  career_goals: Rina aims to complete her Bachelor’s degree in Applied Mathematics within the next two years and secure a full‑time data analyst position in the healthcare or environmental sector, where
    she can apply her quantitative skills to improve outcomes. She plans to pursue a Master’s in Biostatistics or Data Science to deepen her expertise and eventually transition into a senior research analyst
    role that balances technical rigor with meaningful impact on public health. Because she values predictability and a supportive environment, she seeks workplaces that prioritize clear processes, mentorship,
    and mental‑health resources, allowing her to manage her anxiety while advancing her career.
