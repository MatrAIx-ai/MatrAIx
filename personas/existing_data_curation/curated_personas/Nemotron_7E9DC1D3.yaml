personas:
  professional: Michael Thomas, a veteran carpenter in rural North Carolina, blends three decades of hand‑crafted joinery expertise with a curiosity for modern tools like cordless routers and laser levels,
    yet his relaxed, sometimes loosely organized scheduling reveals a preference for flexibility over strict deadlines while managing small crews and negotiating client contracts.
  sports: Michael Thomas, an avid follower of the Carolina Panthers and a regular attendee of Pitt County high school football games, doubles his love for the outdoors with early‑morning fishing on Lake
    Phelps, and participates in a seasonal community softball league where his competitive edge sometimes overshadows camaraderie.
  arts: Michael Thomas, who builds small wooden sculptures for personal enjoyment, joins acoustic guitar jam sessions at the local diner featuring songs by Neil Young and the Allman Brothers, and spends
    evenings at the community library immersed in historical novels by Ken Follett, all of which feed his creative impulse.
  travel: Michael Thomas prefers low‑key road trips that combine history and nature, having driven the Blue Ridge Parkway to explore Shenandoah’s Civil‑War sites, while dreaming of a guided tour of colonial
    Williamsburg, yet he balances such wanderlust against a modest retirement budget and family obligations.
  culinary: Michael Thomas, a competent home cook, delights in grilling freshly caught bass from Lake Phelps with a lemon‑herb butter, whipping up his garden’s tomatoes into a rustic marinara, and serving
    a hearty pork‑and‑bean chili seasoned with smoked paprika and crushed garlic, though he occasionally over‑salisifies his dishes.
  core: Michael Thomas, a laid‑back master carpenter with a competitive streak, balances rugged DIY projects, early‑morning fishing, and late‑night acoustic jams while navigating mild health issues and
    a relaxed approach to money.
background:
  cultural: Michael grew up in a working‑class family in eastern North Carolina, where the rhythms of rural life, church gatherings, and community events shaped his values. His upbringing emphasized self‑reliance,
    practical skill, and a strong sense of neighborly duty, which continue to inform his work ethic and his preference for hands‑on problem solving. While he identifies with the broader Southern cultural
    milieu—appreciating regional foods, local folklore, and a relaxed pace of life—he also draws from the diverse craftsmanship traditions of the area, blending them with modern, eco‑conscious building
    ideas. His divorce and years as a single parent have reinforced a pragmatic outlook, balancing independence with occasional reliance on local support networks.
