  hobbies: '[''Fishing at Lake Phelps'', ''Vegetable gardening'', ''Woodcarving and small sculpture'', ''Attending high school football games'', ''Reading historical novels'', ''Playing acoustic guitar'',
    ''Volunteering at the community garden'', ''DIY home improvement projects'']'
  career_goals: Michael aims to solidify his reputation as the go‑to carpenter for historic home restorations in Pitt County, expand his business to include a small workshop for custom furniture, and mentor
    a handful of apprentices before retirement. He is also interested in integrating more sustainable materials—reclaimed wood and low‑VOC finishes—into his projects, and hopes to secure a steady line of
    contracts with local developers that will provide financial security for his retirement while allowing him the flexibility he values.
