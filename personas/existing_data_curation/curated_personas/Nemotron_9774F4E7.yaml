  hobbies: '["Historical reading", "Genealogy research", "Gardening", "Birdwatching", "Model ship building", "Walking/hiking", "Fishing", "Cooking", "Listening to jazz and classic pop", "Visiting museums"]'
  career_goals: Although retired, Roger aims to stay purposefully engaged in his community. He aspires to mentor younger volunteers at the neighborhood garden, ensuring his practical knowledge of gardening
    and maintenance is passed on. He hopes to complete a comprehensive family genealogy project that documents his ancestors' ties to Jacksonville and to publish a modest booklet for his relatives. Additionally,
    Roger wants to serve on the local community association board to help preserve and improve shared public spaces, leaving a lasting legacy of service and reliability.
