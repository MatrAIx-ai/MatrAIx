personas:
  professional: Roger Mallett, an 87‑year‑old retired handyman, channels his decades of plumbing, carpentry, and budgeting expertise into mentoring volunteers at the community garden while serving as its
    treasurer, and they pursue a seat on the local association board to safeguard public spaces.
  sports: Roger Mallett enjoys leisurely walks along the St. Johns River trail, follows the Jacksonville Jaguars in the NFL and the Jacksonville Jumbo Shrimp in minor‑league baseball, participates in the
    local senior fishing club, and they attend the annual community softball tournament as a spectator.
  arts: Roger Mallett spends evenings listening to the timeless voice of Frank Sinatra and the swing of Duke Ellington, collects vintage vinyl of Ella Fitzgerald, and they regularly visit the Cummer Museum
    to view works by Frederic Remington and contemporary regional painters.
  travel: Roger Mallett prefers well‑planned road trips to historic Southern towns, has already toured Savannah’s riverfront and Charleston’s historic district, dreams of seeing the National Mall in Washington,
    D.C., and they travel primarily by car, keeping a notebook of genealogical stops along the route.
  culinary: Roger Mallett delights in cooking Southern‑inspired fare such as shrimp and grits, braised pork shoulder with apple‑cider glaze, and fresh tomato‑basil soup made from garden harvest, and they
    favor ingredients like citrus zest, fresh thyme, and cracked black pepper, while occasionally ordering a crab boil at the local riverfront restaurant.
  core: Roger Mallett, 87, blends meticulous stewardship with a quietly curious spirit, never missing a garden watering schedule, yet habitually misplaces their glasses and still writes shopping lists on
    napkins.
background:
  cultural: Roger is a white American who grew up in the American South during the post‑World War II era. His upbringing was shaped by the values of hospitality, community cooperation, and a strong work
    ethic that were common in mid‑century Jacksonville. He experienced the city's growth, the civil‑rights movement, and the evolution of Southern culture, adopting a respect for tradition while remaining
    open to new ideas. His culinary tastes include classic Southern dishes such as shrimp and grits and collard greens, and he participates in local cultural events like the Jacksonville Jazz Festival and
    the Riverside Arts Market, reflecting a deep connection to his regional heritage.
attributes:
  skills: '["Home maintenance and repair", "Plumbing", "Electrical troubleshooting", "Carpentry", "Landscaping", "Budgeting and financial management", "Record-keeping", "Volunteer organization", "Basic
