  career_goals: Jincy aims to leverage her extensive cleaning expertise into her own small‑scale housekeeping business within the next two years. She plans to attain a Certified Professional Housekeeper
    credential and enroll in a community‑college business management course to sharpen her entrepreneurial skills. Building on her competitive nature, she wants to become a preferred service provider for
    high‑end residential clients in the Spearfish area, eventually expanding to manage a team of cleaners. Financial independence is a key ambition; she hopes to purchase a modest home in Butte County and
    invest in property management opportunities. While her sensitivity to stress makes her cautious about taking big risks, she is determined to create a stable, reputable brand that reflects her reliability
    and meticulous standards.
