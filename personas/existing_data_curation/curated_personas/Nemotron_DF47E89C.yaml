personas:
  professional: Jincy Gomez, a meticulous professional housekeeper, leverages their expert cleaning techniques, eco‑friendly product knowledge, and methodical schedule management to exceed client expectations
    while channeling their competitive drive and stress‑sensitive need for order into building a reputable boutique cleaning business.
  sports: Jincy Gomez, an avid hiker and weekend runner, joins the Spearfish Trailblazers Hiking Club, schedules regular treks in the Black Hills, follows the Rapid City Rush hockey team, and maintains
    fitness by completing a 5K race each spring, balancing competitive spirit with the calming effects of nature.
  arts: Jincy Gomez, a landscape photography enthusiast, draws inspiration from Ansel Adams, curates a collection of vintage lenses, enjoys listening to folk‑rock acts like The Lumineers and classic films
    starring Meryl Streep, and spends quiet evenings knitting scarves while humming to their favorite playlists.
  travel: Jincy Gomez, a meticulous planner, prefers road trips to nearby gems like Badlands National Park and weekend getaways to Chicago’s art museums, while dreaming of a solo pilgrimage to Kyoto’s gardens
    and a summer retreat in Santorini, always budgeting each journey in their travel ledger.
  culinary: Jincy Gomez, a home‑cooking aficionado, crafts simple yet wholesome dishes such as rosemary‑infused roasted root vegetables, lentil and quinoa soup with fresh basil, and sourdough bread from
    their starter, regularly harvesting herbs from their garden to flavor meals shared with close friends.
  core: Jincy Gomez, a detail‑driven organizer, combats worry with puzzles and precise cleaning routines, yet sometimes over‑plans to the point of micro‑managing both work and personal life.
background:
  cultural: Jincy was raised in a predominantly white, rural community in the Upper Midwest, where her family’s German and Irish roots shaped a strong work ethic and a value for self‑reliance. She attended
    a local Lutheran church that emphasized community service and modest living. Although her surname reflects a Mexican heritage from her maternal grandmother, most of her upbringing was within mainstream
    Midwestern American culture, with occasional family gatherings that featured traditional Hispanic dishes and celebrations. Living in Spearfish, South Dakota, she identifies with the regional culture
    of close‑knit neighborhoods, respect for the outdoors, and a practical, no‑nonsense approach to daily life. Her cultural mix gives her a subtle appreciation for both the simple, stoic traditions of
    her European ancestry and the warm, communal flavors of her Hispanic lineage.
attributes:
  skills: '[''Deep‑cleaning upholstery and carpets'', ''Eco‑friendly chemical handling'', ''Detailed cleaning schedule creation'', ''Household inventory control'', ''Basic home‑maintenance (light repairs,
