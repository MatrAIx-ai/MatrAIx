  hobbies: '[''gardening (native plants)'', ''watercolor painting'', ''photography (architecture and nature)'', ''attending small art talks and chamber‑music concerts'', ''playing chess in a weekly senior
    club'', ''volunteering as a museum docent'']'
  career_goals: Although retired from formal employment, Carl aims to continue contributing to his community and expanding his creative horizons. He plans to curate a small exhibition of his woodworking
    and photography at the Reynolda House Museum, and to author a photo book highlighting historic neighborhoods in Winston‑Salem. Carl also wishes to develop a mentorship program that teaches basic woodworking
    and craft skills to seniors, fostering intergenerational connections. On a personal level, he is enrolled in an online art‑history course to deepen his understanding of unconventional art movements,
    and he hopes to learn digital illustration to blend his traditional crafts with modern media. Ultimately, Carl aspires to document his life experiences in a memoir that explores how curiosity and mindful
    practices have helped him navigate stress and worry.
