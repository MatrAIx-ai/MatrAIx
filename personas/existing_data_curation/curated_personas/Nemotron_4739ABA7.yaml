  career_goals: Even in retirement, Nhu aspires to leave a creative and cultural legacy. He plans to author a family memoir that weaves his Vietnamese heritage with his Michigan life, publish a collection
    of poems and original paintings, and earn modest supplemental income through commissioned artwork. Additionally, he seeks to mentor younger Asian‑American adults by offering workshops on calligraphy,
    gardening, and storytelling, while fine‑tuning his financial management to ensure lasting stability for his modest retirement savings.
