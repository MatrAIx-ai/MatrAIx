personas:
  professional: Sonya Viswanathan, a diligent Business Administration student with a talent for meticulous scheduling and data organization, channels their practical mindset into coordinating campus events
    and streamlining volunteer workflows, showcasing clear written communication and assertive mediation that foreshadows a future as a project manager.
  sports: Sonya Viswanathan enjoys low‑impact fitness by practicing sunrise yoga on Folly Beach and joining the Charleston Battery’s community running club for weekly 5‑k runs, while cheering modestly for
    the Carolina Panthers in the fall and the South Carolina Gamecocks during college football season.
  arts: Sonya Viswanathan nurtures their artistic side by capturing Charleston’s pastel colonial facades with a vintage Nikon, journaling reflections beside the work of photographer Annie Leibovitz, and
    unwinding to the soothing piano compositions of Ludovico Einaudi and the folk storytelling of Joni Mitchell.
  travel: Sonya Viswanathan prefers meticulously planned solo getaways, having already explored the historic streets of Savannah, the coastal charm of Amelia Island, and the tea gardens of Kyoto, while
    dreaming of a quiet retreat in the Scottish Highlands to photograph ancient castles.
  culinary: Sonya Viswanathan delights in cooking Southern comfort staples such as shrimp and grits, buttery biscuits, and collard greens, often experimenting with heirloom tomatoes, smoked paprika, and
    a dash of cayenne to reinvent family recipes while maintaining a modest proficiency in the kitchen.
  core: Sonya Viswanathan balances a disciplined, structure‑driven mind with a quiet love for solitary wanderings, meticulous note‑taking, and a habit of impulsively acquiring obscure gardening tools that
    clutter their otherwise orderly desk.
background:
  cultural: Sonya grew up in Charleston, South Carolina, within a white, middle‑class family that has deep Lowcountry roots. Her upbringing reflects Southern traditions of hospitality, a strong sense of
    community, and an appreciation for local history and cuisine. While her surname hints at Indian heritage in her extended family, her daily cultural experience is grounded in the customs, social norms,
    and seasonal rhythms of the American South, including participation in regional festivals, attending church gatherings, and valuing close‑knit relationships with friends and family.
