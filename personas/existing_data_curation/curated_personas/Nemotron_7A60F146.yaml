  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Yoga practice'', ''Walking along Folly Beach'', ''Photography of historic architecture'', ''Journaling'', ''Crossword puzzles'', ''Cooking Southern
    comfort foods'']'
  career_goals: Sonya aims to complete her bachelor's degree in Business Administration within the next two years, focusing on operations and project management. Her short‑term goal is to secure an entry‑level
    project coordinator position with a regional firm or nonprofit that values structured processes and clear expectations. In the longer term, she aspires to become a project manager overseeing logistics
    and team workflows, eventually moving into a senior operations role where she can apply her organizational strengths to drive efficiency and sustainable growth.
