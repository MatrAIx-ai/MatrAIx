  hobbies: '[''Fishing'', ''Hiking'', ''True-crime podcast listening'', ''Forensic nonfiction reading'', ''Tactical video gaming'', ''Pickup basketball'', ''Drone piloting'', ''Journaling'', ''Mindfulness
    meditation'', ''Acoustic guitar playing'']'
  career_goals: Erwin aims to move from his current supervisory role into a detective position within the Major Crimes Unit by age thirty, focusing on homicide and organized-crime investigations. He plans
    to earn a bachelor's degree in criminal justice and obtain advanced certifications in forensic science, predictive policing, and crisis negotiation. Long-term, he aspires to become a lieutenant and
    eventually a captain, where he hopes to introduce data-driven strategies and mental-health support programs for officers, drawing on his own experience with anxiety. His competitive drive pushes him
    to rank among the top candidates in promotion boards and to lead high-visibility investigations.
