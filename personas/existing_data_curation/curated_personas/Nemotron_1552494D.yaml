personas:
  professional: Erwin Alley is a police supervisor who blends frontline tactical expertise with data‑driven investigative techniques, steering active‑scene management and team de‑escalation while leveraging
    their competitive, skeptical mindset to extract clear evidence and write meticulous reports.
  sports: Erwin Alley is a pickup basketball regular at the precinct gym, a devoted Detroit Pistons fan who watches every game before shift, and a weekend hiker who tackles the Porcupine Mountains trails
    while fishing the Huron River for trout, balancing a love of team sports with solitary outdoor pursuits.
  arts: Erwin Alley is an acoustic‑guitar hobbyist who dabbles in fingerpicking folk tunes by Neil Young and Ed Sheeran after shift, while devouring true‑crime podcasts like My Favorite Murder and watching
    crime dramas such as Mindhunter, letting these narratives shape their investigative imagination.
  travel: Erwin Alley is a spontaneous weekend explorer who prefers impromptu road trips to Michigan’s Upper Peninsula, especially Mackinac Island for its historic charm, and dreams of a future fishing
    expedition to the Florida Keys, planning trips on a whim rather than following strict itineraries.
  culinary: Erwin Alley is a competent home cook who relishes pan‑frying perch caught on the Huron River with lemon‑butter sauce, pairing it with a side of classic Michigan coney dog fries and a dash of
    smoked paprika, and enjoys occasional ventures into making cherry‑pie desserts despite a tendency to over‑season when stressed.
  core: Erwin Alley is a competitive, anxiety‑prone police supervisor who blends tactical grit with data‑driven curiosity, often juggling spontaneous outdoor hobbies, impulsive spending, and a relentless
    drive toward detective rank.
background:
  cultural: Erwin grew up in the Detroit metropolitan area in a middle-class, white American family with Irish-German heritage. His parents worked in the automotive industry and healthcare, instilling a
    solid work ethic and a respect for community service. Attending a public high school in Dearborn, he participated in football, JROTC, and local service projects, reinforcing Midwestern values of reliability,
    modesty, and neighborly cooperation. Living in Dearborn—a city notable for its large Arab-American community—exposed him to multicultural influences, including familiarity with Arabic greetings and
    participation in cultural festivals. While he identifies culturally as white American, his upbringing blends traditional Midwestern ethos with an awareness of the city’s diverse social fabric.
