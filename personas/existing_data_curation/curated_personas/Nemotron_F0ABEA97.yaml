personas:
  professional: Susan Evans, a seasoned material mover with eight years of hands‑on warehouse and logistics experience, channels her love for structure and practical problem‑solving into meticulous load
    planning, OSHA safety compliance, and mentoring new teammates, while her sociable, flexible attitude lets her navigate the occasional disorganization of shift changes with a smile and they frequently
    lead team huddles to keep morale high.
  sports: Susan Evans throws right‑handed pitches for a community softball league, follows the St. Louis Cardinals for baseball inspiration, hikes the Katy Trail and joins a local cycling club that rides
    the scenic routes of nearby state parks, and they regularly attend weekend pick‑up soccer games at the municipal recreation field.
  arts: Susan Evans fuels her love for live music by attending performances at The Pageant featuring classic rock tribute acts like a Rolling Stones cover band and discovering emerging indie artists such
    as The Larks, while they also curate personal playlists featuring Led Zeppelin, Fleetwood Mac, and local folk singer‑songwriter Maeve.
  travel: Susan Evans favors spontaneous weekend road trips with her husband, often heading to Missouri state parks like Ha Ha Tonkawa and the Ozark Scenic Riverways for hiking and kayaking, while they
    keep a modest travel fund for occasional longer escapes to Nashville’s music scene and Austin’s food festivals, balancing adventure with the need to stay within a family budget.
  culinary: Susan Evans, an avid backyard griller, loves perfecting smoked pork ribs with a homemade rub of brown sugar, smoked paprika, and cumin, experiments with a peach‑chipotle glaze, and they often
    complement the meat with fresh garden harvests of zucchini, heirloom tomatoes, and sweet corn, while occasionally treating herself to street‑style tacos al pastor from a local food truck.
  core: Susan Evans balances a no‑nonsense warehouse work ethic with a love for classic‑rock‑driven DIY projects, a tendency to leave tools scattered in the garage, and a habit of planning spontaneous road
    trips that often end with a backyard barbecue, reflecting a practical yet fun‑loving spirit that they cherish.
background:
  cultural: Susan grew up in a suburban Midwestern environment in St. Charles, Missouri, where family, community, and modesty are deeply valued. Her upbringing in a predominantly Protestant, white family
    emphasized practical work ethic, reliability, and polite interaction. Local traditions such as backyard barbecues, river festivals, and strong support for regional sports teams shaped her sense of identity.
    These cultural influences fostered her sociable, cooperative personality and her preference for structure balanced with flexibility. She carries a mild Midwestern accent and often uses regional expressions
    like "you bet" when affirming plans.
attributes:
  skills: '["forklift operation", "pallet jack handling", "inventory control", "warehouse safety compliance", "basic equipment maintenance", "load planning", "team coordination", "barcode scanning", "basic
