  career_goals: Susan aims to move into a supervisory role within the next three years, targeting a shift‑lead or assistant warehouse manager position. She plans to earn an OSHA 30‑Hour certification and
    become a certified forklift trainer to broaden her leadership credentials. Long‑term, she hopes to manage an entire distribution center, overseeing safety programs, staff development, and process improvements.
    Her ambitions are grounded in providing a stable income for her family, offering mentorship to younger workers, and achieving a work‑life balance that lets her enjoy time with her husband and community.
