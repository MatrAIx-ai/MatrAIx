personas:
  professional: Betty Lewis, a 15‑year‑old aspiring visual storyteller, they blend hand‑sketched portraits and cityscapes with digital painting on a tablet, channel their curiosity into Scratch‑based interactive
    narratives, and volunteer at a community garden, demonstrating early professional ambition and an organized‑yet‑flexible work ethic.
  sports: Betty Lewis, a member of the school’s casual intramural basketball league, they cheer for the Atlanta Hawks, spend weekends walking the community garden’s pathways for light exercise, and enjoy
    watching Atlanta United matches on television, balancing a low‑key fitness routine with their artistic pursuits.
  arts: Betty Lewis, an avid sketcher and digital painter, they draw inspiration from the bold lines of Jean‑Michel Basquiat, the vivid storytelling of Frida Kahlo’s portraits, the lyrical rhythms of spoken‑word
    poet Saul Williams, and they regularly attend exhibitions at the Museum of Discovery and local galleries, while devouring graphic novels like 'Saga' and poetry collections by Ocean Vuong.
  travel: Betty Lewis, a weekend explorer, they love day trips to the historic district of Savannah for its cobblestone streets, dream of a spring visit to New York’s MoMA to see contemporary installations,
    and favor budget‑friendly family road trips that blend art museum stops with local food markets.
  culinary: Betty Lewis, a budding home‑cook, they help prepare traditional Southern dishes such as buttermilk biscuits, collard greens seasoned with smoked ham hocks, and peach cobbler during holidays,
    enjoy experimenting with sweet tea infused with rosemary, and can skillfully follow a simple recipe for shrimp and grits, though they sometimes over‑salt their dishes in enthusiasm.
  core: Betty Lewis, a curious teen who fuses analog sketches with digital art, balances structured routines with spontaneous creativity, prefers quiet collaboration, occasionally splurges on art supplies,
    and tends to procrastinate on schoolwork when caught up in storytelling projects.
background:
  cultural: Betty comes from a multigenerational African‑American family rooted in the North Little Rock area of Arkansas. Her upbringing blends Southern Black cultural traditions—such as gospel music,
    church fellowship, and family gatherings centered around dishes like collard greens, fried catfish, and sweet tea—with a strong emphasis on community storytelling and resilience. Celebrations like Juneteenth
    and church youth programs have reinforced her sense of identity and collective responsibility. Exposure to local Black artists, community mural projects, and oral histories shared by elders has shaped
    her appreciation for art as a vehicle for personal expression and social change, influencing both her creative pursuits and her future aspirations.
