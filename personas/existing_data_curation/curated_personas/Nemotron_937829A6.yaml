  hobbies: '[''Sketching'', ''Digital art'', ''Reading graphic novels'', ''Listening to music'', ''Visiting museums'', ''Scratch coding'', ''Creative writing'', ''Community art workshops'', ''Gardening'',
    ''Cooking family recipes'']'
  career_goals: Betty aims to build a strong artistic portfolio during high school to earn a scholarship for a visual‑arts program at a state university. She dreams of becoming a professional illustrator—perhaps
    creating children's books or graphic novels that reflect diverse stories—and later hopes to blend her art with technology by learning UI/UX design. Long‑term, she envisions opening a community art space
    in North Little Rock where local youth can explore creative media and receive mentorship, thereby giving back to the community that has nurtured her own talents.
