personas:
  professional: Melisha Monteiro, a seasoned residential carpenter, they blend three decades of expertise in custom cabinetry, fine furniture, and restorative woodwork with meticulous blueprint reading,
    sustainable timber selection, and a curiosity for artistic motifs, balancing organized project management and flexible problem‑solving while mentoring apprentices and championing community‑focused builds.
  sports: Melisha Monteiro, an avid hiker who joins the Warner Robins Trail Club for weekend treks, they enjoy cheering on the Atlanta Falcons and Georgia Bulldogs, and they participate in a low‑impact
    yoga class at the local community center to maintain flexibility and joint health.
  arts: Melisha Monteiro, a devoted lover of African‑diaspora visual art, they regularly visit exhibitions featuring Kehinde Wiley and Amy Sherald, spend evenings playing acoustic gospel tunes inspired
    by Leon Bridges at church gatherings, knit contemporary quilts, volunteer in community theater set design, and draw creative inspiration from the choreography of Alvin Ailey.
  travel: Melisha Monteiro, who favors road‑trip adventures that blend cultural immersion and relaxation, they have explored Savannah’s historic squares, the jazz clubs of New Orleans, and a week‑long art
    pilgrimage to the Louvre in Paris, while planning future visits to Caribbean islands that echo their family’s island lineage.
  culinary: Melisha Monteiro, an inventive home chef, they transform classic soul‑food staples like collard greens, sweet potato pie, and shrimp and grits with Caribbean spices such as allspice and mango‑chili
    glaze, skillfully balancing a seasoned palate with a willingness to experiment on the weekend family table.
  core: Melisha Monteiro bridges masterful woodworking with community mentorship, they turn every project into a canvas for cultural storytelling while juggling a love for gospel guitar, a penchant for
    spontaneous tool purchases, and a steadfast commitment to sustainable, affordable design.
background:
  cultural: Melisha identifies as African American with deep roots in the Southern Black community of Georgia. Her family history includes stories of the Great Migration, civil‑rights activism, and a multi‑generational
    tradition of carpentry passed down from her grandfather. She is active in her local church, where gospel music and communal service are central. The surname Monteiro reflects a Portuguese‑Caribbean
    lineage, adding an Afro‑Caribbean dimension to her heritage. This blend informs her appreciation for diverse artistic expressions and her incorporation of African cultural motifs into her woodworking
    designs. Values of community solidarity, storytelling, and resilience shape her daily life and interactions.
