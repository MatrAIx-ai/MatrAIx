  hobbies: '[''visiting art museums'', ''quilting'', ''gardening'', ''cooking soul food'', ''acoustic guitar'', ''community volunteering'', ''attending woodworking clubs'', ''reading historical biographies'',
    ''participating in local theater'', ''hiking'']'
  career_goals: Melisha aims to transform her carpentry practice into a community‑focused studio that offers affordable custom furniture while providing training opportunities for young women interested
    in the trades. She plans to develop a line of artistic wood pieces inspired by African‑American cultural motifs for local galleries, obtain a certificate in construction management to broaden her service
    scope, and eventually establish a nonprofit that provides free home repairs for low‑income seniors in Warner Robins. She also seeks to deepen her own artistic practice through collaborations with local
    visual artists.
