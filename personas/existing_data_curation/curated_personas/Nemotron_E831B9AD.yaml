  career_goals: Peter aims to leverage his hands‑on experience to become a certified nursing assistant instructor, eventually obtaining an RN license through the credits he earned in college. He is ambitious
    about leading a unit at a local hospital or long‑term care facility, where he can integrate his competitive drive with his passion for group activities by establishing patient‑centered wellness programs
    that incorporate art, music, and community outings. In the longer term, Peter envisions a role as a community health outreach coordinator, designing health‑education workshops that blend clinical best
    practices with cultural enrichment for residents of Tioga County.
