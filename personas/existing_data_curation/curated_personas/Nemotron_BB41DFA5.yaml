personas:
  professional: Preya Easley, a three-year-old budding block architect, channels a love for structure and predictability into meticulously planned tower‑building sessions, carefully selecting and sorting
    each colorful block before inviting a small circle of playmates to help, while displaying a practical, cooperative spirit that makes them the go‑to organizer for the classroom’s tidy‑up time and they
    often narrate their building plans to the group.
  sports: Preya Easley, a three-year-old who delights in toddler gymnastics at the community center and a Saturday swim class, often mimics the celebratory dances of the city’s baseball team, the River
    City Raptors, and they proudly don the Tiny Tigers shirt from their neighborhood preschool soccer club.
  arts: Preya Easley, a three-year-old who spends hours finger‑painting rainbows and building towers with Play‑Doh while humming along to Raffi’s Baby Beluga and The Wiggles’ Fruit Salad, enjoys storytime
    at the neighborhood library where they listen intently to the animated readings of Dr. Seuss, and they proudly display hand‑drawn crayon portraits of their favorite animated characters on the fridge.
  travel: Preya Easley, a three-year-old adventure‑curious traveler who prefers guided stroller‑friendly outings, has explored the nearby city zoo and spent sunny afternoons building sandcastles at the
    family‑favorite beach in San Diego, while they dream aloud about a future trip to Disneyland Paris where they can meet beloved cartoon characters in person.
  culinary: Preya Easley, a three-year-old budding chef who proudly spreads peanut butter on whole‑grain toast, mixes banana slices into fluffy pancakes with a tiny wooden spoon, savors cheesy macaroni
    baked with a dash of cheddar, and insists on the perfect crunchy bite of carrot sticks, they often present their creations to family before devouring them with a satisfied grin.
  core: Preya Easley, a three-year-old who thrives on predictable routines, quietly orchestrates playtime with a meticulous eye, shows boundless kindness to friends while guarding a small stash of favorite
    stickers, and they occasionally refuse to wear shoes unless the laces are perfectly aligned.
background:
  cultural: Preya is raised in a white, middle‑class family in Hackensack, New Jersey. Her family observes common American holidays such as Thanksgiving, Christmas, and Independence Day, participates in
    community activities at the local library and neighborhood park, and carries a subtle Northern European heritage while being gently influenced by the diverse multicultural atmosphere of Bergen County.
attributes:
  skills: '[''color and shape identification'', ''simple sentence formation'', ''block stacking'', ''crayon drawing'', ''basic puzzle solving'', ''routine adherence'', ''emotional self‑regulation'']'
  hobbies: '[''building blocks'', ''simple puzzles'', ''picture book reading'', ''crayon drawing'', ''nursery rhyme singing'', ''short nature walks'']'
  career_goals: She imagines growing up to become a preschool teacher or librarian, valuing a calm, organized environment where she can help other children learn through predictable routines, and also expresses
    a gentle wish to care for animals as a future veterinarian.
