  career_goals: Brandy aims to obtain her GED within the next year and enroll in a community‑college program that leads to a certification as a medical office assistant or administrative professional. She
    wants a stable, structured career that utilizes her organizational strengths, such as working in a clinic front desk, a small business office, or a logistics setting. In the longer term, she aspires
    to become a certified medical records specialist or to open a home‑organization consulting service for families in her community.
