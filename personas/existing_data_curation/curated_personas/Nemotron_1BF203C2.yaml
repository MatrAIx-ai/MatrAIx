personas:
  professional: Brandy Mirabella, a 17-year-old aspiring medical office assistant, leverages their meticulous bullet-journal planning and hands-on experience with budgeting, spreadsheets, and routine auto-maintenance
    to excel in organized, front-desk environments where methodical follow-through and calm under pressure are essential.
  sports: Brandy Mirabella enjoys structured fitness through early morning nature walks in Willow Creek Park, occasionally participates in the local youth soccer league, and follows the Chicago White Sox,
    combining solitary cardio with low-key team sport commitment.
  arts: Brandy Mirabella finds creative fulfillment in bullet-journaling with pastel inks, knitting scarves inspired by folk patterns while listening to Bon Iver and Iron & Wine, and completing intricate
    jigsaw puzzles featuring classic Art Nouveau prints, grounding their introverted nature in quiet artistic expression.
  travel: Brandy Mirabella prefers low-cost, well-planned trips that allow for scenic hiking, such as a weekend camping adventure in the Great Smoky Mountains and a day visit to Burlington, Vermont's waterfront,
    always drafting detailed itineraries in their journal before departure.
  culinary: Brandy Mirabella enjoys simple, wholesome meals like lentil soup with carrots, spinach, and cumin, skillfully prepares homemade mac and cheese using sharp cheddar and elbow pasta, and delights
    in trying new yarn-inspired recipes such as cinnamon-spiced oat cookies, reflecting a practical cooking style with occasional culinary curiosity.
  core: Brandy Mirabella is a detail-obsessed teen who regulates every aspect of life from budgeting to knitting, yet sometimes trades their methodical calm for a compulsive urge to finish every checklist
    in sight.
background:
  cultural: Brandy grew up in a middle‑class, white family in the Dayton–Greene County area of Ohio, where Midwestern values of hard work, modesty, and community involvement are emphasized. Her family often
    attends a local Protestant church, and regional traditions such as seasonal festivals, community picnics, and support for local sports teams shape her sense of belonging. The practical, down‑to‑earth
    culture of the area reinforces her preference for structure, reliability, and modest personal expression.
attributes:
  skills: '[''Household management'', ''Budgeting'', ''Basic computer skills (email, spreadsheets)'', ''Routine automotive maintenance'', ''Furniture assembly'', ''Inventory tracking'']'
