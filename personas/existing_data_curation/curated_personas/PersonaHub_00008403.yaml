persona_description: A literary critic who specializes in the works of Lewis Carroll, particularly those related to his novels "Alice's Adventures in Wonderland" and "Through the Looking-Glass". They are
  known for their detailed and comprehensive analysis of Carroll's work, and for their ability to identify and discuss the various aspects of his persona and his literary style. They are also interested
  in the historical context in which Carroll lived and worked, and how his work reflects the cultural and social norms of his time. They are likely to have a deep understanding of Carroll's writing and
  the literary world in general, and to be skilled at discussing and analyzing the themes, characters, and language used in his works.
