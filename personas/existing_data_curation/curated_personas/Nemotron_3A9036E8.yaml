personas:
  professional: Thomas Vernon, a 45‑year‑old aspiring part‑time handyman and custom‑furniture craftsman, transforms his seasoned mechanical know‑how, precise woodworking ability, and methodical planning
    into a boutique workshop where his curiosity drives unconventional designs and his competitive, skeptical nature pushes him to price commissions aggressively.
  sports: Thomas Vernon, an outdoors‑oriented 45‑year‑old, spends spring mornings fishing on Lake Red Rock, joins occasional 5K races with the Des Moines Road Runners, and closely follows the Iowa Hawkeyes
    football team and the Iowa Cubs minor‑league baseball club, while his disciplined weekend hikes keep him fit without the pressure of team sports.
  arts: Thomas Vernon immerses himself in visual arts by restoring vintage furniture inspired by James Krenov, capturing Iowa sunsets in the style of Ansel Adams, and studying the moody canvases of Edward
    Hopper, while his evenings feature folk playlists from Bob Dylan and contemporary singer‑songwriter The Tallest Man on Earth, all of which shape his eclectic creative output.
  travel: Thomas Vernon plans his trips with meticulous itineraries, favoring road‑trip photography adventures that include the Badlands’ rugged terrain and the serene gardens of Kyoto to fuel his artistic
    projects, yet his limited budget often confines him to weekend getaways in neighboring Nebraska and an annual cultural jaunt to Chicago’s Art Institute.
  culinary: Thomas Vernon, a confident home cook, frequently prepares farm‑to‑table meals such as roasted heirloom carrots with rosemary, pan‑seared trout seasoned with lemon and dill from his garden, and
    a hearty apple crisp made from orchard apples and a oat‑cinnamon crumble, relishing the tactile satisfaction of hand‑mixing dough for fresh bread.
  core: Thomas Vernon blends a solitary, art‑driven soul with a razor‑sharp competitive edge, channeling his meticulous DIY prowess into handcrafted furniture while hoarding a secret stash of vintage tool
    catalogs and occasionally neglecting sleep for late‑night photo edits.
background:
  cultural: Thomas grew up in a small, predominantly white, Midwestern community in Iowa. His family's roots trace back to German and Irish immigrants who settled the region in the early 20th century. The
    cultural environment emphasized self-reliance, modesty, and a strong work ethic, while also fostering an appreciation for community events such as county fairs and church gatherings. Although he was
    raised in a Protestant (United Methodist) setting, his personal interests have led him to explore broader artistic traditions, blending his Midwestern practicality with a curiosity for unconventional
    ideas. He maintains a respectful connection to his regional heritage through participation in local volunteer projects and by preserving rural craftsmanship.
attributes:
  skills: '["Mechanical troubleshooting", "Automotive maintenance", "Small-engine repair", "Woodworking and furniture making", "DIY home renovation", "Tool and equipment maintenance", "Project planning
    and scheduling", "Budgeting and personal finance management", "Basic computer literacy", "Digital photography editing"]'
  hobbies: '["Woodworking", "Furniture restoration", "Painting (watercolor and oil)", "Landscape photography", "Gardening", "Fishing", "Visiting local art galleries", "Reading art history", "Participating
    in online art forums", "DIY home improvement projects"]'
  career_goals: Although currently not employed, Thomas aims to turn his practical skills into a part-time handyman and custom-furniture business that serves the Roland community. He hopes to secure a small
    workshop space where he can accept commissions, offer repair services, and perhaps teach weekend woodworking classes. He also aspires to deepen his knowledge of visual arts, planning to attend regional
    art workshops and eventually curate a small exhibit of his own work and that of local amateur artists. In the longer term, he would like to contribute to a community arts program for youth in Hamilton
    County, leveraging his organizational strengths to coordinate events and secure funding.
