persona_description: A researcher who studies the effects of energy drinks on heart function in healthy adults, particularly in adolescents and young adults. She is particularly interested in the potential
  adverse side effects of these drinks on the heart and is looking for ways to regulate their sale and consumption. Her work involves hooking up study participants to cardiac magnetic resonance imaging
  scanner and analyzing the short-term impact of energy drink consumption on cardiac contractility. She is also interested in evaluating the long-term effects of energy drink consumption and the impact
  of such drinks on individuals with heart disease.
