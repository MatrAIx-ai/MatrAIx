    scheduling and resource allocation"]'
  hobbies: '["Watercolor painting", "Sketching and drawing", "Pottery", "Visiting art galleries", "Reading contemporary fiction and philosophy", "Writing poetry and journaling", "Photography", "Yoga and
    mindfulness meditation", "Gardening", "Volunteer health education at community fairs", "Exploring health tech and apps"]'
  career_goals: Patricia aims to transition into a nursing leadership role, such as a nurse manager or clinical educator, where she can merge her clinical expertise with her business acumen to improve patient
    care delivery in a community health setting. She plans to pursue a BSN/RN qualification followed by a Master’s in Nursing Leadership to broaden her clinical scope and strategic influence. A key ambition
    is to develop and implement a pilot program that integrates visual arts into recovery protocols, advocating for holistic patient care policies. Additionally, she aspires to mentor emerging nurses, fostering
    a supportive, collaborative workplace culture.
