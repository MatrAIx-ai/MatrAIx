  hobbies: '["Sketching and drawing", "Street photography", "Hip‑hop and jazz music listening", "Attending open‑mic and poetry slams", "Hip‑hop dance practice", "Competitive video gaming (eSports)", "Creative
    writing and poetry", "Journaling for stress management", "Cooking family recipes (soul food, Caribbean)", "Volunteering at community art workshops"]'
  career_goals: Lasonja aspires to turn her passion for visual storytelling into a career as a multidisciplinary artist and creative strategist. In the short term, she aims to complete her high school education,
    build a robust portfolio, and earn a scholarship to an art-focused college such as Pratt Institute or the School of Visual Arts. She envisions working as a freelance graphic designer and content creator,
    collaborating with community organizations to amplify Black and immigrant voices in Brooklyn. Long‑term, she dreams of founding a nonprofit arts hub that offers mentorship and exhibition space for under‑represented
    youth, eventually becoming a creative director who shapes culturally resonant campaigns.
