personas:
  professional: Lasonja Gales is an aspiring multidisciplinary artist and creative strategist who blends digital illustration, street photography, and video editing to craft socially resonant visual narratives,
    leveraging organized yet flexible planning skills and a competitive drive to pursue a scholarship at a top art institute while mentoring peers through community workshops, and they regularly share their
    process on social media.
  sports: Lasonja Gales channels kinetic energy into hip‑hop dance crew practice, weekend pickup basketball games at the local park, and avidly follows the Brooklyn Nets and New York City FC, preferring
    street‑style workouts over regimented gym routines, and they often incorporate freestyle dance moves into their basketball warm‑ups.
  arts: Lasonja Gales curates a personal soundtrack of Kendrick Lamar, A Tribe Called Quest, Miles Davis, and spoken-word poet Saeed Jones, while sketching inspirations from Shepard Fairey murals and attending
    open-mic nights that feature emerging poets and experimental jazz ensembles, and they regularly post photo essays on Instagram to highlight local street artists.
  travel: Lasonja Gales dreams of weekend trips to the Hamptons for sunrise photography, a cultural immersion tour of New Orleans to trace jazz roots, and a future backpacking adventure through Berlin's
    street-art districts, all planned around a limited student budget and reliance on public transit, and they keep a travel journal to document each new neighborhood's visual vibe.
  culinary: Lasonja Gales enjoys cooking family-style dishes such as jerk chicken, collard greens with smoked ham hocks, and sweet-potato pie, experimenting with allspice, scotch-bonnet peppers, and fresh
    herbs while also seeking out Brooklyn food-truck tacos and Caribbean-fusion pop-ups, and they often host dinner nights for friends to showcase their latest culinary experiments.
  core: Lasonja Gales is a curiosity-driven, competitively spirited teen who balances organized creative projects with moments of stress-induced overthinking, a habit of late-night gaming, and a relentless
    pursuit of authentic visual storytelling, and they sometimes stay up until dawn perfecting a new illustration.
background:
  cultural: Lasonja is an African‑American teenager raised in the culturally rich neighborhoods of Brooklyn, where the rhythms of hip‑hop, the colors of street art, and the flavors of Caribbean and Southern
    soul food intersect. Her family maintains strong ties to church and community centers that host youth programs and cultural festivals. She is influenced by the legacy of Black artistic movements in
    New York, from the Harlem Renaissance to contemporary graffiti collectives. The diverse mosaic of her borough—its immigrant neighbors, local musicians, and neighborhood storytellers—shapes her worldview,
    grounding her identity in resilience, creativity, and a deep appreciation for her heritage.
attributes:
  skills: '["Digital illustration (Procreate, Canva)", "Street photography", "Basic graphic design", "Video editing (iMovie)", "Creative writing (poetry, short stories)", "Analytical problem solving", "Debate
