  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Reading popular science'', ''Woodworking'', ''Traditional South Asian cooking'', ''Chess club'', ''Small‑group cultural gatherings'', ''Volunteer
    computer tutoring'']'
  career_goals: Although retired, Anil aims to stay intellectually active and give back to his community. He aspires to expand his mentorship role at the local senior center, develop a small workshop series
    on sustainable home practices for neighbors, and co‑author a reflective memoir that blends his technical experience with cultural heritage. He also hopes to serve on the advisory board of a nonprofit
    promoting STEM education for underprivileged youth, balancing his desire for meaningful contribution with a manageable, low‑stress commitment.
