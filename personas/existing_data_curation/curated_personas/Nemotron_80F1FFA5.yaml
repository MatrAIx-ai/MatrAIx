personas:
  professional: Angelia Oleary is a freelance art curator and consultant who leverages a sharp eye for unconventional creativity and basic graphic‑design skills to stage pop‑up exhibits, mentor emerging
    Midwestern artists, and launch an online platform, all while wrestling with a natural aversion to rigid deadlines and a competitive drive for excellence.
  sports: Angelia Oleary enjoys weekend hikes in nearby state parks, practices beginner’s yoga at the community center, follows the Chicago Cubs and Minnesota Timberwolves for sport fandom, and occasionally
    joins a local pickleball league for light competition.
  arts: Angelia Oleary spends evenings at gallery openings, draws inspiration from the surreal photography of Annie Leibovitz, the minimalist paintings of Agnes Martin, and the experimental music of Björk,
    often sketching interpretations in a weathered sketchbook while curating pop‑up exhibits that blend these influences.
  travel: Angelia Oleary prefers spontaneous, budget‑friendly road trips that weave through the Midwest’s hidden art towns, has already explored Santa Fe’s adobe galleries and the folk festivals of Asheville,
    and daydreams about a future trek to Norway’s fjords to capture midnight light with their DSLR.
  culinary: Angelia Oleary, an intermediate home chef, delights in experimental dishes such as miso‑glazed sous‑vide carrots, fermented kimchi tacos, and rosemary‑infused focaccia, often sourcing heirloom
    tomatoes from their garden and pairing meals with a curated vinyl soundtrack.
  core: Angelia Oleary is a curiosity‑driven, spontaneous art curator who balances a competitive edge with a love for solitude, dabbling in experimental cooking and mindful travel while wrestling with deadline‑aversion
    and occasional health‑monitoring lapses.
background:
  cultural: Angelia grew up in Muncie, Indiana, in a middle‑class Irish‑American family with deep roots in the region's modest, community‑oriented culture. Her upbringing included participation in local
    church events, county fairs, and school arts programs, fostering a strong sense of Midwestern independence and self‑reliance. While she values the traditions of her heritage—such as an appreciation
    for folk music and communal gatherings—she also embraces diverse artistic influences from her travels and exposure to contemporary media, blending the familiar with the unconventional.
attributes:
  skills: '[''Art appreciation'', ''Creative problem solving'', ''Digital photography'', ''Basic graphic design'', ''Community event coordination'', ''Critical thinking'', ''Adaptability'', ''Independent
    research'', ''Negotiation and advocacy'']'
  hobbies: '[''Visiting art galleries'', ''Sketching and painting'', ''Nature photography'', ''Reading speculative fiction'', ''Experimental cooking'', ''Garden design'', ''Volunteering for community art
    programs'', ''Curating pop‑up exhibits'']'
  career_goals: Angelia aims to re‑enter the workforce on her own terms by establishing a freelance art‑curation and consulting practice that allows for flexible scheduling and spontaneous project selection.
    She hopes to launch an online platform that showcases emerging Midwestern artists, providing workshops and mentorship that reflect her competitive drive for excellence and desire for authentic community
    impact. Long‑term, she envisions developing a modest but sustainable income through art sales, commissions, and speaking engagements, while maintaining the independence and low‑structure environment
    that supports her creative spontaneity.
