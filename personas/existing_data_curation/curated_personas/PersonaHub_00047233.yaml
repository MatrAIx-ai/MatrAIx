persona_description: A Florida state senator who is a Democrat and the first openly gay member of the Florida Senate. He is known for advocating for the rights of Black and LGBT youth and has spoken out
  against discriminatory state laws. He has won multiple primary races and is optimistic about the state's future, but also recognizes the need for government investment in mental health support for LGBT
  students and the importance of having caring and concerned adults in their lives. He is a vocal advocate for passing legislation to protect Black and LGBT youth from discrimination and is committed to
  creating public schools where Black children can thrive.
