personas:
  professional: Carlene Ratliff is an organized, community‑oriented junior choir member and basketball captain who channels a love for structure and teamwork into planning school events and mentoring younger
    teammates, and they demonstrate early promise as a future community program coordinator.
  sports: Carlene Ratliff dribbles for the East Chicago Middle School basketball team, follows the Indiana Pacers and the Chicago Bulls with fervor, and spends Saturdays at the community center's youth
    volleyball league, approaching fitness with a methodical warm‑up routine and a competitive yet cooperative spirit, and they relish the camaraderie of team practices.
  arts: Carlene Ratliff arranges scrapbook pages featuring soulful gospel hymns by Kirk Franklin and contemporary R&B from Beyoncé, sings harmonies from classic composers like Bach in the junior choir,
    devours mystery novels by Agatha Christie, and they let these artistic influences color their creative expressions and weekend leisure.
  travel: Carlene Ratliff enjoys day trips to the Indiana Dunes and weekend visits to Chicago’s lakefront festivals, dreams of exploring New Orleans for its jazz and barbecue heritage, and they plan each
    outing with a detailed itinerary on their phone, balancing a modest travel budget with a craving for new cultural flavors.
  culinary: Carlene Ratliff loves cooking family’s signature fried chicken, collard greens, and cornbread, skillfully chops onions for a hearty gumbo while they knit, favors ingredients like smoked paprika,
    sweet potatoes, and fresh herbs, and they occasionally burn toast when rushing to finish homework.
  core: Carlene Ratliff is a meticulous teen who blends choir harmonies, basketball drills, and community service into a disciplined yet socially vibrant daily rhythm, while they quietly wrestle with anxiety
    and a penchant for midnight snack raids.
background:
  cultural: Carlene is a Black teen raised in East Chicago, Indiana, a city with a rich industrial history and a close‑knit African‑American community. Her family’s cultural traditions, including church
    gatherings, soulful music, and community barbecues, have shaped her sense of identity and belonging. She participates in local youth programs at the community center and her church, where intergenerational
    stories and mentorship are valued. This environment has fostered her respect for collective support, resilience, and the importance of contributing positively to her neighborhood.
