  hobbies: '[''Junior choir'', ''Basketball'', ''Reading mystery and adventure novels'', ''Journaling'', ''DIY crafts (knitting, scrapbooking)'', ''Cooking family recipes'', ''Volunteering at community
    center'', ''Playing Minecraft'', ''Listening to hip‑hop music'']'
  career_goals: Carlene aims to graduate high school with strong academic standing, especially in science and health‑related subjects. She plans to attend a community college in Indiana to pursue an associate
    degree in nursing, with the long‑term goal of becoming a registered nurse. She is drawn to the structured, team‑oriented environment of healthcare and hopes to combine her organizational strengths with
    a desire to support others' well‑being. Additionally, she is interested in contributing to community health outreach programs in East Chicago, helping peers navigate health resources and stress management.
