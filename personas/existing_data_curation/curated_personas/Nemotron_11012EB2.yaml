  career_goals: Jenifer aims to transition from labor to leadership within the construction field. She plans to complete her college education with a focus on construction management or civil engineering,
    obtain a certification in green building, and eventually become a site supervisor or project manager. Her long‑term ambition is to launch her own small renovation business that emphasizes environmentally
    friendly methods and incorporates artistic design elements, while also mentoring other women who wish to enter the trades. She is also committed to developing stress‑management strategies to sustain
    her well‑being in a demanding industry.
