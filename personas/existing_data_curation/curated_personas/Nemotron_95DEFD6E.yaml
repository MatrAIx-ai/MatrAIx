  hobbies: '[''drawing and painting'', ''digital illustration'', ''photography of coastal scenes'', ''playing acoustic guitar'', ''writing poetry and short stories'', ''reading graphic novels and contemporary
    fiction'', ''visiting art museums and local art fairs'', ''volunteering at the community library'', ''beachcombing and shell collecting'', ''gardening an herb balcony'']'
  career_goals: Michele aspires to turn her artistic passion into a professional career. She plans to enroll in a community‑college art program or an associate’s degree in graphic design, then build a freelance
    portfolio that blends visual storytelling with environmental themes. Her long‑term ambition is to work as a marine‑focused illustrator or creative consultant for the Pensacola tourism board, a museum,
    or a nonprofit dedicated to coastal conservation, using her art to raise awareness and celebrate the Gulf Coast’s natural beauty. She also hopes to eventually launch her own online shop selling prints,
    custom designs, and eco‑friendly merchandise.
