personas:
  professional: Michele Stanley is a 17‑year‑old aspiring visual artist and budding graphic designer whose curiosity and organized flexibility let them seamlessly blend watercolor seascapes with digital
    illustrations on Procreate, while they coordinate community art projects and maintain a sleek HTML‑based portfolio that showcases their marine‑focused storytelling.
  sports: Michele Stanley stays active by playing beach volleyball at Gulf Pier and paddling with a local surf club during summer, while cheering on the Pensacola Blue Wahoos and the New Orleans Saints,
    and they occasionally join a high‑school cross‑country running club for cooler‑season workouts.
  arts: Michele Stanley cultivates a vibrant artistic life that blends sketching sunrise‑lit beaches à la Claude Monet with digital marine illustrations inspired by contemporary creator Lisa Congdon, while
    they unwind on acoustic guitar with covers of Bob Dylan and John Mayer and draw narrative influence from graphic novelists Chris Ware and Alison Bechdel.
  travel: Michele Stanley favors loosely planned coastal getaways, having already road‑tripped to Key West and taken a budget‑friendly ferry to the Bahamas, while they dream of a bike‑friendly art retreat
    in Santorini, balancing their love of spontaneous beachcombing with a modest student‑budget mindset.
  culinary: Michele Stanley enjoys preparing simple, herb‑infused seafood meals like lemon‑garlic shrimp tacos topped with fresh mango salsa and a sprinkle of balcony‑grown basil, while they occasionally
    indulge in buttery croissants from a local bakery and experiment with matcha‑green tea lattes.
  core: Michele Stanley is a sea‑loving teen artist who balances a meticulous budget and proactive health habits with spontaneous beach‑combing, and they have a quirky habit of turning every freshly‑found
    shell into a tiny, hand‑crafted necklace.
background:
  cultural: Michele comes from a white Southern‑American family that has lived in Pensacola for several generations. Growing up on the Gulf Coast, she was immersed in a blend of Southern hospitality, naval
    community traditions, and coastal lifestyle. Family gatherings often feature classic Southern dishes such as fried green tomatoes, shrimp and grits, and homemade pies, while weekend trips to the beach
    and participation in local festivals reinforce a strong connection to the ocean. Her community is diverse, with influences from nearby Caribbean tourism and historic Spanish‑French heritage, which she
    appreciates through the city’s multicultural art scene. These cultural strands shape her values of cooperation, kindness, and a deep respect for the natural environment.
