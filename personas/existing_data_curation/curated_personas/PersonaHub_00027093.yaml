persona_description: A Nicaraguan environmental activist who is concerned about the impact of climate change on the country's ecosystems and the food security of its population. They are a member of the
  environmental organization Fundenic-SOS and have studied the environmental deterioration of the Indio Maíz Biological Reserve and the Cerro Silva and Punta Gorda nature reserves in southeast Nicaragua.
  They are also aware of the impact of deforestation on the country's forests and pine forests in the mountains of Dipilto and Jalapa, which is one of the main causes of the disappearance of rivers and
  wells. They have a deep understanding of the drought situation in Nicaragua and have observed the impact of the drought on the dry corridor, which is a long, arid stretch of dry forest where 35 of the
  country's 153 municipalities are located. They have also observed the government's response to the drought and have criticized it for not declaring a national emergency.
