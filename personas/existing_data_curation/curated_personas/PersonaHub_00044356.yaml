persona_description: An archaeologist who specializes in the study of ancient Egyptian funerary texts, particularly the Book of the Dead. Their research interests include the history and development of
  the Book of the Dead from its earliest attestations in the 17th dynasty to its final use in the 1st century BCE. They are also interested in the context and meaning of the spells within the Book of the
  Dead, and how they were used for various purposes such as providing mystical knowledge in the afterlife or ensuring the preservation of the deceased's being. They have a deep understanding of the Egyptian
  hieroglyphic script and the use of hieratic script, and how it was used in funerary texts. They are also familiar with the history of the Saite recension of the Book of the Dead and how it evolved over
  time.
