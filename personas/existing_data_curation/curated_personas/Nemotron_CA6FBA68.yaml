personas:
  professional: Yolanda Roman, a 42‑year‑old first‑line supervisor of office administration, uses their bilingual fluency and Lean‑style process improvements to streamline clerical workflows while balancing
    a competitive drive for metrics with a practical, results‑oriented mindset that sometimes leans toward flexibility over strict planning.
  sports: Yolanda Roman enjoys low‑impact fitness through weekly hikes with the Hill Country Hikers club, occasional birdwatching outings, and regular gentle yoga sessions, while cheering on the San Antonio
    Spurs during the NBA season and participating in a casual adult soccer league with friends, and they often track mileage on a Garmin watch.
  arts: Yolanda Roman finds artistic escape in devouring mystery novels by Gillian Flynn and Agatha Christie, attending local cultural festivals featuring performers like Lila Downs and Carlos Santana,
    and savoring the occasional live folk‑music set at the Austin City Limits venue, while they occasionally write book reviews for a community newsletter.
  travel: Yolanda Roman prefers relaxed, budget‑conscious travel, often planning weekend escapes to Hill Country vineyards such as Becker Vineyards, occasional road trips to Santa Fe for art and cuisine,
    and dreaming of a future cultural immersion tour of Barcelona, always using a spreadsheet to track expenses, and they favor off‑peak booking to stretch their budget.
  culinary: Yolanda Roman, an avid home gardener, transforms their fresh cilantro, jalapeños, and heirloom tomatoes into traditional tamales and enchiladas with a Tex‑Mex twist, confidently layering chipotle‑infused
    salsa and homemade corn masa, while they experiment with slow‑cooked mole on special family gatherings, and they take pride in serving dishes that showcase garden harvests.
  core: Yolanda Roman balances a competitive, metric‑driven career with a love for quiet garden‑to‑table cooking, occasional over‑scheduling of mystery‑novel marathons, and a habit of double‑checking every
    spreadsheet – even when the numbers already match, and they often find themselves humming a tune from a favorite folk song while preparing meals.
background:
  cultural: Yolanda is a first-generation Mexican-American who grew up celebrating the customs of her Mexican heritage while assimilating into the multicultural fabric of New Braunfels, Texas. The city’s
    blend of German and Mexican influences is reflected in its food, music, and community events, which she embraces through annual observances like Día de los Muertos, Cinco de Mayo, and local Tex-Mex
    festivals. She is bilingual, speaking Spanish at home with her parents and extended family, and English at work and in the broader community. Her Catholic upbringing informs family traditions such as
    Sunday meals and holiday gatherings, emphasizing close-knit relationships and mutual support. This cultural grounding contributes to her strong work ethic, her appreciation for communal meals, and her
    commitment to mentoring younger members of the community.
attributes:
  skills: '[''Team supervision'', ''Scheduling and staffing'', ''Budget monitoring'', ''Bilingual communication (Spanish/English)'', ''Office software (Microsoft Office, Google Workspace)'', ''Process improvement
