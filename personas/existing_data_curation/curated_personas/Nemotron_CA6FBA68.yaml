  hobbies: '[''Gardening'', ''Cooking Mexican & Tex-Mex cuisine'', ''Reading mystery and self-help books'', ''Yoga'', ''Hiking in Hill Country'', ''Birdwatching'', ''Attending local cultural festivals'',
    ''Volunteer English tutoring'']'
  career_goals: Yolanda aims to progress from a first-line supervisory position to an office manager or operations manager within the next three years. She plans to complete an Associate’s degree in Business
    Administration and earn the Certified Administrative Professional (CAP) credential to strengthen her qualifications. She wants to lead larger teams, design and implement efficient office processes,
    and champion a workplace culture that balances structure with the flexibility she values. In the longer term, she is considering launching a consulting service for small businesses in the Texas Hill
    Country, helping them improve administrative efficiency and staff productivity while offering stress-management strategies. Financial stability and the ability to support her own future are central
    motivations for her career trajectory.
