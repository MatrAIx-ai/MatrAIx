persona_description: A New Zealand and Australian whale researcher who is highly critical of Japan's whaling practices and advocates for non-lethal whale research methods. They are experienced in conducting
  research in the Southern Ocean and have a strong background in marine mammal biology and conservation. They are passionate about the importance of effective whale conservation and management, and are
  committed to working towards these goals through non-lethal research methods. They are also knowledgeable about the scientific methods used in whale research and are willing to share their expertise with
  the International Whaling Commission.
