persona_description: A conservation biologist with expertise in the assessment and management of threatened plant species, particularly in the Illawarra Region of New South Wales, Australia. This person
  has conducted extensive research and evaluations on the status and threats facing threatened plant species, and has developed and evaluated decision-making tools and criteria for classification of extinction
  risk in vascular plants. They have also worked on the management and rehabilitation of threatened plant species, and have experience in the design and implementation of nature conservation plans for rural
  lands.
