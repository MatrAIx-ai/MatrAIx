  career_goals: Antonin aims to rise to a senior leadership role in Learning and Development within the next five years, ideally as a Director of Talent Development for a technology‑driven firm in the Intermountain
    West. He wants to champion a data‑centric training strategy that integrates immersive technologies such as AR/VR, while maintaining a rigorous evaluation framework. In the longer term, he hopes to author
    a guide on blending artistic creativity with corporate learning, and to speak at niche conferences that explore unconventional instructional methods. His competitive nature drives him to achieve measurable
    improvements in employee performance and to be recognized as a benchmark for training excellence in his industry.
