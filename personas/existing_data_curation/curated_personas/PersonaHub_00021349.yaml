persona_description: A historian who is interested in the life and reign of Herod the Great, particularly his rule in Judea and the chaos that followed his death. This person is also interested in the historical
  context of the time, including the political and social influences that led to the downfall of Herod's sons and the rise of Rome's control over Judea. They are likely to be curious about the relationship
  between Herod and Pilate, and how it relates to the events leading up to Christ's crucifixion.
