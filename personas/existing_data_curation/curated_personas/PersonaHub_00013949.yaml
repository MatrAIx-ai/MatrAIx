persona_description: A medical professional specializing in the diagnosis and treatment of gastrointestinal disorders, particularly those involving the intestines and the nervous system. This individual
  is knowledgeable about the various causes and symptoms of chronic intestinal pseudo-obstruction, as well as the underlying causes of neurogenic and myogenic pseudo-obstruction. They have experience in
  the management of the disease, including the use of nutritional support, antibiotics, and further tests to identify and treat coexisting conditions. They are skilled in the use of diagnostic tools, such
  as manometry, and may work in a multidisciplinary team to provide comprehensive care for their patients.
