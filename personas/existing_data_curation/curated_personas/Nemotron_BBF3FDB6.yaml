  career_goals: 'Emmanuel aims to complete a bachelor’s degree in communications or public relations within the next three years, leveraging his bilingual skills to secure a full‑time position as a community
    outreach coordinator for a nonprofit serving the Latinx community in Southern California. He aspires to progress to a project‑management role where he can design and implement culturally responsive
    programs. Long‑term, Emmanuel dreams of opening a small, community‑focused Mexican bakery‑café in Rancho Cucamonga, providing a gathering spot that celebrates his heritage while offering stable employment
    for local residents.

