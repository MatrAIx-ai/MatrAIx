  career_goals: Maricel aims to advance within the banking industry by moving into a senior teller or branch supervisor role, where she can lead a team and spearhead community outreach initiatives. She
    plans to earn a certification in financial planning to enhance her ability to offer tailored advice. In the longer term, she envisions transitioning to a nonprofit or community organization as a financial
    education coordinator, using her banking experience to run regular financial‑literacy workshops for the Hispanic community in Omaha and help families achieve greater economic stability.
