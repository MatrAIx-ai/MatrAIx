personas:
  professional: Danny Haber, a 51‑year‑old self‑taught woodworker and gardener, channels their meticulous problem‑solving and love of quiet independence into a modest online shop selling handcrafted furniture
    and seasonal produce, while volunteering as a mentor at the local community garden to share sustainable practices.
  sports: Danny Haber, an avid fly‑fisher who spends early mornings casting at Lake Tohopekaliga, follows the Orlando Magic and Tampa Bay Lightning from the comfort of home, occasionally joins the community’s
    seasonal 5K charity run, and prefers low‑impact activities that complement the rhythm of their woodworking schedule.
  arts: Danny Haber, a quiet appreciator of American folk and classic country, often listens to Johnny Cash, Willie Nelson, and John Denver while shaping wood, visits the local heritage museum’s occasional
    Florida natural‑history exhibits for inspiration, and supports neighborhood potlucks that feature acoustic bluegrass performances.
  travel: Danny Haber, who prefers leisurely road trips over hectic itineraries, enjoys weekend drives to the Everglades for bird‑watching, plans an annual family visit to the Great Smoky Mountains to combine
    hiking with storytelling, and occasionally explores antique fairs in North Carolina during off‑season sales to scout unique vintage tools.
  culinary: Danny Haber, a devoted home cook, favors the regional fish‑fri​e tradition—grilling fresh catfish with a cornmeal crust and lemon‑pepper seasoning—paired with garden‑grown tomatoes, basil, and
    a side of coleslaw, while also perfecting a slightly over‑sweet key lime pie that often becomes the centerpiece of neighborhood potlucks.
  core: Danny Haber, a 51‑year‑old solitary craftsman who blends precise woodworking, modest online entrepreneurship, and a devotion to Florida’s outdoors, is renowned for their relentless attention to
    detail and a quirky habit of over‑watering their garden.
background:
  cultural: Danny comes from a white, middle‑American background with roots in the Midwest that were transplanted to Florida in his early adulthood. He reflects the laid‑back, outdoors‑oriented culture
    of Central Florida, valuing self‑reliance, neighborly helpfulness, and modesty. His family practices a traditional Protestant Christian faith, attending a local church on Sundays and observing community
    gatherings. He embraces regional customs such as seasonal fish fries, neighborhood potlucks, and volunteer clean‑up events at local parks, while maintaining the quiet, family‑centered values that shape
    his daily life.
