persona_description: A registered physiotherapist specializing in treating babies with torticollis and muscle imbalance, with a background in pediatrics and a specialization in treating plagiocephaly and
  head tilt. They have a unique understanding of the development of movement in children and are able to recognize and measure head positioning and rotation, as well as provide support, exercises, and suggestions
  for managing the condition. They are able to recognize when to recommend bracing or referrals to specialized clinics, and are able to provide ongoing monitoring to ensure that the baby is developing as
  they should.
