persona_description: A musicologist who is interested in the history and development of music, particularly in the fields of folk music, early American song, minstrels, vaudeville, blues, and jazz. They
  are also knowledgeable about the history of literature and the role of women in music. They are open to alternative viewpoints and are willing to consider the validity of other scholars' arguments, but
  they also have their own research to support their thesis. They are interested in the intersection of music and culture and are looking for a comprehensive history of the love song.
