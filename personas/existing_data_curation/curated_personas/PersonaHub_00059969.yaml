persona_description: A healthcare professional who specializes in the diagnosis and treatment of asthma in children, especially in New Zealand. They are knowledgeable about common causes of asthma, the
  signs and symptoms of asthma, and the proper management of asthma through inhaled medication and preventer medication. They are experienced in using inhaled medication and are familiar with the importance
  of prompt treatment and the potential for damage to the lungs if asthma is not properly managed. They are also skilled in managing asthma patients and providing advice on the correct use of inhalers and
  devices.
