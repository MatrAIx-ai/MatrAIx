personas:
  professional: Frank Barton is a veteran secondary school teacher who blends structured lesson planning with improv-inspired spontaneity, using their public‑speaking flair, inclusive pedagogy, and community
    outreach expertise to engage students while juggling the dual pressures of meeting academic deadlines and nurturing a supportive classroom environment.
  sports: Frank Barton coaches a youth basketball team through the Oakland County YMCA, follows the Detroit Pistons and Tigers on television, jogs the Detroit Riverwalk each spring, practices yoga for flexibility,
    and joins a community softball league, though busy rehearsal schedules sometimes cause them to miss workouts.
  arts: Frank Barton stars in Hazel Park community theater productions, leads improv sketch nights at a downtown coffeehouse, strums acoustic guitar at neighborhood gatherings, and they draw inspiration
    from Lin‑Manuel Miranda’s storytelling and Bob Dylan’s folk lyricism.
  travel: Frank Barton prefers road‑trip adventures that blend history and relaxation, having driven the historic Route 66 to the Grand Canyon, explored Milwaukee’s craft‑brew scene, taken weekend retreats
    to Mackinac Island, and dreaming of a culinary tour of Tuscany, yet they always plan trips around school holidays and budget constraints.
  culinary: Frank Barton enjoys cooking hearty Midwestern comfort foods such as rosemary‑roasted chicken pot roast, homemade mac and cheese, and garden‑fresh roasted vegetables, while they experiment with
    spice blends for weekly world cuisine dinner parties that feature dishes like Thai green curry and Mexican enchiladas.
  core: Frank Barton embodies a pragmatic yet spontaneous spirit, marrying Midwestern modesty with a love for spotlight‑stealing improv, community service, and a constant balancing act between structure
    and creative freedom, while they navigate daily pressures with humor and occasional worry.
background:
  cultural: Frank grew up in suburban Detroit, raised in a middle‑class Anglo‑American family with deep roots in the Midwest. He attended public schools in Oakland County and later took college courses
    in education at a local community college. The Midwestern values of practicality, modesty, and strong community involvement shape his outlook. Living in Hazel Park, a diverse and tightly knit community,
    has exposed him to a variety of cultural perspectives, which he brings into his classroom through inclusive teaching practices and community outreach.
attributes:
  skills: '[''Lesson Planning'', ''Classroom Management'', ''Curriculum Development'', ''Public Speaking'', ''Educational Technology Integration'', ''Improvisational Teaching'', ''Group Facilitation'',
    ''Conflict Resolution'', ''Student Mentoring'', ''Community Outreach'', ''Stress Management'']'
  hobbies: '[''Community Theater'', ''Improv Comedy'', ''Youth Basketball Coaching'', ''Guitar Playing'', ''Hosting Dinner Parties'', ''Cooking'', ''Jogging'', ''Yoga'', ''Gardening'', ''Reading History'']'
  career_goals: Frank aims to complete his bachelor's degree in Education and pursue a master's in Educational Leadership within the next three years. He aspires to become a curriculum coordinator or assistant
    principal, where he can shape school‑wide policies that promote structured learning while fostering flexibility and student well‑being. He also hopes to design and implement a comprehensive mental‑health
    support program for his school, leveraging his experience with stress management and his strong community connections.
