persona_description: A cardiologist who specializes in the study of the heart and its functions, particularly in the right ventricle. He is particularly interested in arrhythmogenic right ventricular cardiomyopathy
  and its diagnosis and treatment. His research interests include the functional and structural changes in the heart and how they relate to arrhythmias, as well as the impact of exercise and endurance sports
  on the heart. He is known for his expertise in quantitative angiography and his ability to accurately diagnose arrhythmias in athletes with VA.
