  hobbies: '[''Group Fitness Classes (Zumba, Spin)'', ''Community Theatre Acting'', ''Kayaking and Fishing on Saginaw Bay'', ''Photography'', ''Cooking Club'', ''Volunteering at Local Food Bank'', ''Trivia
    Nights at Local Bars'']'
  career_goals: Beverly aims to transition from a sales associate role to a supervisory position within the next two years, targeting a sales team lead or assistant manager role at her retail outlet. She
    plans to acquire a professional sales certification (e.g., Certified Professional Sales Leader) and deepen her expertise in digital sales channels. Long‑term, she envisions becoming a regional sales
    manager overseeing multiple stores in the Great Lakes area, with the ultimate ambition of launching her own boutique retail business that blends her love for community engagement and curated product
    experiences.
