persona_description: An environmental photographer who specializes in photography of salamanders and their habitats. Edwin Giesbers is a professional photographer who has published his work in prestigious
  magazines such as BBC Wildlife Magazine, National Geographic, Terre Sauvage, and Camera Natura. He has also collaborated with Dutch Media to produce a nature photography book in the Netherlands and Belgium.
  His work focuses on the decline of salamander populations in Europe and the efforts being made to stop the spread of a fungal skin disease that has killed fire salamanders. His camera equipment includes
  a Canon G15 with a 28-140mm f1.8-2.8 lens, and he often uses a Canon housing to protect his equipment from the elements.
