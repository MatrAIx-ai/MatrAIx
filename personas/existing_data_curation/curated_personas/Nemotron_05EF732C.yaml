  career_goals: Jennifer intends to build a strong portfolio of visual art and aims to enroll in a specialized visual‑arts high‑school program or the University of Florida’s School of Art and Art History.
    Her long‑term ambition is to become a professional graphic designer or illustrator, eventually working in a creative agency or as a freelance artist. She also hopes to combine her interest in technology
    and design by pursuing UI/UX design, and she plans to compete in state art competitions to gain recognition. Her organized nature drives her to set concrete milestones, such as completing a series of
    digital art projects each semester and mastering advanced Photoshop techniques.
