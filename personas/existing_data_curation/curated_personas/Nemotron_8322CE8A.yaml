  hobbies: '[''Playing guitar'', ''Soccer on community league'', ''Sketching urban scenes'', ''Volunteering at local animal shelter'', ''Creating short TikTok videos'', ''Reading contemporary YA fantasy'',
    ''Hiking in Shaw Nature Reserve'', ''Experimenting with DIY science kits'']'
  career_goals: Thomasina aims to merge her love of animals, science, and community outreach by eventually becoming a wildlife rehabilitator or veterinarian focused on urban ecosystems. In the short term,
    she plans to run for student council president and launch a school club that promotes environmental stewardship and animal care. She also envisions creating an educational YouTube channel where she
    can share simple science experiments and pet‑care tips, capitalizing on her outgoing personality and digital media skills. Long‑term, she hopes to study environmental science or veterinary medicine
    in college and lead initiatives that improve both human and wildlife health in the St. Louis area.
