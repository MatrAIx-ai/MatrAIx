personas:
  professional: Thomasina Masten, an aspiring teenage musician and DIY science enthusiast, writes acoustic songs about friends and hometown while they produce spontaneous TikTok videos that showcase hands‑on
    experiments, balancing curiosity with the practical need to juggle schoolwork and occasional missed deadlines.
  sports: Thomasina Masten plays forward for the River Valley Rovers U‑15 soccer team, thriving on the energy of teamwork and weekly matches against local rivals, while they root for the professional club
    Seattle Sounders FC, using a mix of spontaneous drills and disciplined conditioning to stay fit despite occasional procrastination on scheduled workouts.
  arts: Thomasina Masten creates intricate sketch‑based comic strips of urban skylines and writes heartfelt lyricism inspired by contemporary YA fantasies like "Six of Crows," drawing artistic influence
    from comic artist Bryan Lee O'Malley and musician Billie Eilish, while they channel their sociable spirit into local open‑mic nights and spontaneous doodle sessions.
  travel: Thomasina Masten explores the winding trails of Shaw Nature Reserve on weekends and dreams of backpacking through Yosemite National Park and attending a music festival in Austin, Texas, planning
    trips on a whim with friends while budgeting carefully to fit their modest savings.
  culinary: Thomasina Masten enjoys whipping up quick meals like avocado toast with a drizzle of sriracha and experimenting with DIY food science kits to make homemade ice cream, showing beginner‑level
    cooking confidence but often neglecting kitchen cleanup in favor of sketching or guitar practice.
  core: Thomasina Masten is a curiosity‑driven, socially vibrant teen who balances spontaneous creativity in music, art, and science with occasional anxiety‑fuelled procrastination and a habit of impulsive
    spending.
background:
  cultural: Thomasina’s family has deep Midwestern roots, blending German and Irish ancestry that surfaces in holiday traditions such as Thanksgiving feasts and baking pretzels and soda bread. Growing up
    in suburban St. Louis County, she’s immersed in the city’s sports culture, cheering for the Cardinals and the Blues, and attending local events like the St. Louis Fair. Her community emphasizes friendliness,
    volunteerism, and modesty, shaping her cooperative and compassionate demeanor. While her household follows a broadly Protestant (UCC) tradition with occasional church gatherings, she also experiences
    St. Louis’s multicultural vibrancy through school programs and diverse neighborhood interactions.
