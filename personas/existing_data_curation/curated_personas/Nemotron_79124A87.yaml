  hobbies: '[''Journaling for emotional regulation'', ''Reading self-help and contemporary fiction'', ''Volunteering at local animal shelter'', ''Gardening (maintaining a tidy flower bed)'', ''Simple cooking
    and baking'', ''Puzzle solving (crosswords, Sudoku)'', ''Walking in Prince William County parks'', ''Crafting (knitting, crocheting)'', ''Listening to podcasts about mental health'', ''Attending community
    mindfulness workshops'']'
  career_goals: Shirley's immediate goal is to finish her high school education or obtain a GED within the next two years, providing a solid foundation for a helping‑profession career. She is drawn to roles
    that blend her compassion with her organizational strengths, such as becoming a certified nursing assistant, a peer support specialist, or a community outreach coordinator for a mental‑health nonprofit.
    In the long term, she aspires to earn a degree in social work or nursing so she can deliver direct care and advocacy for individuals experiencing emotional distress, while working in a structured, predictable
    environment that lets her make a tangible, positive impact.
