  hobbies: '[''Watercolor Painting'', ''Birdwatching'', ''Prairie Wildflower Gardening'', ''Community Theater Attendance'', ''Knitting'', ''Bridge (Card Game)'', ''Reading Historical Fiction'', ''Church
    Choir'', ''Volunteer Storytelling'', ''Local History Research'']'
  career_goals: Eva’s current ambitions focus on lifelong learning and community enrichment rather than traditional career advancement. She plans to complete her associate’s degree in Art History, develop
    a permanent community art gallery in McClusky, and mentor younger volunteers in arts and heritage preservation. She aspires to document the town’s oral histories in a published collection, travel to
    regional art museums to broaden her exposure to contemporary art, and lead a statewide senior arts network to promote creative engagement among older adults.
