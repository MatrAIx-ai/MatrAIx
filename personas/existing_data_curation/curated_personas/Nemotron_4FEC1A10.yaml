personas:
  professional: Eva Carter, a seasoned community art coordinator in McClusky, leverages her decades of volunteer leadership, digital photography skills, and love for prairie storytelling to organize weekly
    art workshops, manage senior‑center schedules, and champion the creation of a permanent local gallery, and they maintain a flexible yet reliable approach that balances structure with spontaneous creativity.
  sports: Eva Carter, a devoted fan of the North Dakota State Bison football team and regular attendee of Fargo‑Moorhead RedHawks baseball games, sustains fitness through daily walks along the Sheyenne
    River, participates in the senior center’s gentle yoga class, and they enjoy bird‑watching hikes that keep her joints moving despite osteoarthritis.
  arts: Eva Carter, a watercolorist whose palette echoes the prairie tones of Thomas Hart Benton, frequent attendee of McClusky Community Theater productions starring local talent like Judy Miller, and
    dedicated soprano in St Mary's Church choir, draws inspiration from folk singer Joan Baez and contemporary prairie artist Susan Russell, and they weave those influences into weekly art workshops for
    seniors.
  travel: Eva Carter, who prefers organized group tours that balance comfort with cultural immersion, has explored the Minneapolis Institute of Art and the Art Institute of Chicago, dreams of visiting the
    Smithsonian American Art Museum in Washington DC, and enjoys weekend trips to the Badlands and Yellowstone, always planning around her volunteer schedule and modest senior‑center travel fund, and they
    cherish each journey as a chance to gather new artistic inspiration.
  culinary: Eva Carter, a proficient home cook who delights in hearty prairie‑style dishes such as wild‑rice casserole, honey‑glazed salmon, and rhubarb pie, regularly harvests sage, dill, and wildflowers
    from her garden to flavor meals, bakes rye bread, preserves blackberry jam with fresh meadow berries, and they savor sharing these seasonal plates with friends at community gatherings.
  core: Eva Carter, a 78‑year‑old prairie‑spirit artist‑activist, blends community leadership, relentless curiosity, and a love for watercolor landscapes while knitting scarves for charity and documenting
    local history, and they approach life with a balance of gentle organization and spontaneous creativity.
background:
  cultural: Eva grew up in a small farming community in the Great Plains, raised in a family of German‑Russian descent that emphasized hard work, self‑reliance, and close‑knit community values. The cultural
    fabric of rural North Dakota, with its Lutheran church traditions, county fairs, and collective barn‑raising spirit, shaped her appreciation for communal gatherings, folk art, and the seasonal rhythms
    of agricultural life. Her white Midwestern heritage informs her modest demeanor, love of plain‑spoken conversation, and respect for traditions while remaining open to new ideas and artistic expression.
attributes:
  skills: '[''Community Event Coordination'', ''Art Workshop Facilitation'', ''Quilting and Knitting Instruction'', ''Digital Photography'', ''Basic Photo Editing'', ''Email and Social Media Management'',
