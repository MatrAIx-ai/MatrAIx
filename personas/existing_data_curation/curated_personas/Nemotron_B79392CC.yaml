  hobbies: '[''Hiking and backcountry trekking'', ''Snowboarding and cross-country skiing'', ''Pickup basketball'', ''DJing at local gatherings'', ''Community theater acting'', ''Cooking regional recipes'',
    ''Nature photography'', ''Volunteer work at wildlife rehabilitation center'']'
  career_goals: Alvin aims to complete his associate degree—leaning toward Environmental Studies or Hospitality Management—so he can secure a role that merges his outdoor passion with people‑focused service.
    He envisions becoming an adventure guide or seasonal park ranger in the Adirondacks, where he can lead groups on hikes, ski tours, and wildlife education programs. Long‑term, he hopes to launch a community‑run
    eco‑tourism business that offers guided nature experiences, seasonal equipment rentals, and workshops for local youth, allowing him to stay flexible while giving back to his hometown.
