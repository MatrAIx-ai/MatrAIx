persona_description: A professional who manages environmental resources, particularly those with a coastal or watershed focus. They are knowledgeable about their systems but not necessarily sophisticated
  about climate science or risk management. They may be addressing a myriad of issues that require immediate attention and have limited time to focus on adaptation planning for the future. Furthermore,
  they may need to adapt to climate change impacts within their organization's existing resources. Despite these challenges, managers who realize that climate change will affect their ability to meet their
  goals will see the need to incorporate climate change risk into their planning.
