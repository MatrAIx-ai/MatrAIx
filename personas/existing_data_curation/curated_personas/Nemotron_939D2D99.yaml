personas:
  professional: Eugene Coleman, a seasoned carpenter with expertise in framing, finish carpentry, and custom cabinetry, blends meticulous organizing with on‑site flexibility to meet tight deadlines while
    integrating BIM and reclaimed‑wood techniques into every project.
  sports: Eugene Coleman, an avid participant in pickup basketball games at the Woodbridge community center, supplements the sport with weekend runs along the Potomac, follows the Washington Commanders,
    Capitals, and Nationals for regional pride, and occasionally joins local adult softball leagues to diversify their fitness routine.
  arts: Eugene Coleman’s creative backdrop is a rotating playlist of Kendrick Lamar, H.E.R., and classic soul icons Marvin Gaye and Aretha Franklin, complemented by occasional visits to the local jazz club
    where they admire the improvisations of Kamasi Washington, while the visual storytelling of Barry Jenkins inspires their design aesthetics.
  travel: Eugene Coleman favors weekend road trips that combine hiking and food discoveries, having recently trekked the Blue Ridge Mountains and sampled Asheville barbecue, while aspiring to explore Lisbon’s
    historic neighborhoods and planning a family camping adventure in Shenandoah National Park, all folded into a modest budget and a schedule that must accommodate on‑site project demands.
  culinary: Eugene Coleman, an enthusiastic grill master, regularly prepares smoked brisket with a coffee rub, applewood‑infused pork ribs paired with a tangy mustard‑based Carolina slaw, and experiments
    with low‑VOC wood‑smoked salmon, often finishing meals with a craft‑beer pairing from local microbreweries.
  core: Eugene Coleman is a driven, hands‑on craftsman who merges competitive ambition with sustainable design, a love of soulful music, and weekend basketball, all while juggling a secret stash of late‑night
    snack chips that occasionally sabotage their diet.
background:
  cultural: Eugene grew up in a close‑knit African‑American family in the Washington, D.C. metropolitan area, with deep roots in community churches and neighborhood gatherings. His upbringing emphasized
    resilience, storytelling, and a strong work ethic, values that continue to shape his approach to carpentry and life. Living in Woodbridge, VA, he maintains connections to both his cultural heritage—participating
    in local Juneteenth celebrations and African‑American history events—and the diverse suburban environment. These experiences inform his appreciation for collaborative community projects, his respect
    for tradition, and his drive to innovate within the trades while honoring the legacy of Black artisans who came before him.
attributes:
  skills: '["Framing", "Finish carpentry", "Custom cabinetry", "Blueprint reading", "Building code compliance", "Project estimation", "Advanced power‑tool operation", "Sustainable material integration",
