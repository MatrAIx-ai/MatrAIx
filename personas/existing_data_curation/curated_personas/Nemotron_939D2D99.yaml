  hobbies: '["Home woodworking projects", "Pickup basketball", "Hip‑hop and R&B music", "Barbecue cooking", "Hiking Potomac River trails", "Youth mentorship volunteering", "Reading construction trade magazines",
    "African‑American genealogy research", "Attending local cultural festivals"]'
  career_goals: Eugene aims to earn a state‑licensed general contractor credential within the next two years, allowing him to expand from carpentry into full‑scale residential construction. He aspires to
    launch a boutique line of custom furniture that blends contemporary design with traditional woodworking techniques, emphasizing eco‑friendly materials. Competitive by nature, he plans to enter regional
    woodworking and home‑building contests to gain recognition and build a reputation for excellence. Additionally, Eugene is motivated to mentor apprentices from his community, fostering the next generation
    of skilled tradespeople while strengthening local networks.
