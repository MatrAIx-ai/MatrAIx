personas:
  professional: An enthusiastic classroom helper named Divina Sanchez loves to assist the preschool teacher by sorting crayons, guiding playmates in building block towers, and turning storytime into an
    interactive adventure, balancing curiosity with a practical eye for order while they sometimes leave a few toys scattered at the end of the day.
  sports: A budding athlete named Divina Sanchez laces up tiny sneakers for the Fort Lauderdale Mini‑Stars soccer club every Saturday, delights in cheering for the Miami Dolphins during family game nights,
    and attends weekly swim lessons at the community pool, approaching fitness with playful enthusiasm while they sometimes forget to stretch before practice.
  arts: A creative spark named Divina Sanchez spends afternoons drawing colorful scenes of enchanted forests and dancing to the upbeat rhythm of Shakira’s “Waka Waka” and the classic melodies of The Jackson 5,
    while they also enjoy watching live folk‑dance performances at the local cultural center, letting music and art shape their imaginative playtime.
  travel: An adventurous explorer named Divina Sanchez has visited Miami Beach’s sandy shores, taken family road trips to the Everglades, and spent a magical weekend at Orlando’s theme parks, and they dream
    of someday soaring over Angel Falls and strolling through the historic streets of Cartagena, balancing a love for relaxed beach days with curiosity about far‑off destinations.
  culinary: A budding food enthusiast named Divina Sanchez helps their family prepare crispy arepas filled with melty cheese and sweet guava jam, loves to dip carrot sticks in hummus, and enjoys nibbling
    on mac and cheese bites and fresh watermelon slices, though they often forget to wash their hands before grabbing a snack, showcasing a blend of practical cooking skills and endearing quirks.
  core: Divina Sanchez is a compassionate, inquisitive 5‑year‑old who balances playful imagination with a practical knack for helping others, juggling a colorful piggy bank, crayons, and occasional forgotten
    allergy medicine while delighting in arepas and soccer.
background:
  cultural: Divina is raised in a Venezuelan household in Fort Lauderdale, where Spanish is spoken daily alongside English. Her family maintains cultural traditions such as celebrating Día de los Reyes,
    preparing arepas, and sharing stories about Venezuelan folklore. She participates in community events at the local Latin American cultural center, which reinforces her bilingual identity and sense of
    belonging. This blend of Venezuelan heritage and Floridian environment shapes her worldview, encouraging her to value family, community, and cultural diversity.
