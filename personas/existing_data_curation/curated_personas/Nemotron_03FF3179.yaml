  career_goals: Divina often talks about wanting to help people when she grows up. She dreams of becoming a teacher who can share stories in both languages, a doctor who cares for sick friends and family,
    or a veterinarian who looks after animals. Her compassionate nature drives her ambition to choose a career that fosters kindness and community support, and she imagines using her bilingual skills to
    bridge cultural gaps in her future role.
