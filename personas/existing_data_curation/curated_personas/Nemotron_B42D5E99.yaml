  career_goals: Michael aims to move from sales associate to a shift supervisor within the next two years, using the role to develop stronger organizational and leadership skills. He plans to earn his GED
    and attend a short certification program on retail management to boost his qualifications. In the longer term, he dreams of opening a small neighborhood convenience store in Buford, where he can combine
    his competitive drive with a more controlled, structured business environment. He also hopes to reduce his work‑related stress by learning time‑management techniques and building a supportive network
    of coworkers.
