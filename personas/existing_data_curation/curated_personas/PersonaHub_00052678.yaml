persona_description: A physiotherapist who specializes in the treatment of ankle sprains and ankle fractures, particularly those involving the distal tibiofibular syndesmosis. They are skilled in interpreting
  plain radiographs, CT and MR images, in ankle arthroscopy and in therapeutic management. They are aware of the importance of understanding the exact anatomy of the syndesmosis in order to provide effective
  treatment and to prevent potential complications.
