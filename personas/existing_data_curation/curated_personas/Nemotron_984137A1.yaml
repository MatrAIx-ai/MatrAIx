  career_goals: William aims to re‑enter the workforce by obtaining a certification in residential HVAC or electrical work, leveraging his hands‑on experience to launch a small contracting business. He
    also seeks part‑time work as a project coordinator for a local nonprofit focused on community garden initiatives, allowing him to blend his organizational strengths with his interest in sustainable
    living. In the long term, he hopes to achieve financial independence through a combination of his own contracting services and passive income from modest property rentals.
