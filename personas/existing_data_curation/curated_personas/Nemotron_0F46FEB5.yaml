  hobbies: '[''church choir'', ''youth mentorship'', ''cooking Southern cuisine'', ''vegetable gardening'', ''book club'', ''competitive board games (Scrabble, chess)'', ''line dancing'', ''African drumming'',
    ''community volunteering'']'
  career_goals: Mary aims to complete her associate degree in Business Administration and later earn a bachelor's degree in Marketing, with the long‑term goal of launching a home‑based catering and event‑planning
    business that highlights Southern comfort food with a modern twist. She also seeks a part‑time administrative coordinator role with a local nonprofit to apply her organizational strengths while staying
    connected to her community. Over the next five years, she plans to obtain certifications in food safety and small‑business management, build a loyal client base, and achieve financial independence that
    supports both her family and future college tuition for her children.
