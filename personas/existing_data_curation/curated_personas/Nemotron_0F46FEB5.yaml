personas:
  professional: Mary Nelson, a 32‑year‑old aspiring administrative coordinator and future marketing professional, leverages her meticulous budgeting, event‑planning expertise, and competitive edge to streamline
    nonprofit operations while championing community‑focused initiatives, and they pride themselves on delivering precise, deadline‑driven results.
  sports: Mary Nelson, a fan of the Atlanta Falcons, Atlanta Hawks, and Atlanta United, joins a local women’s softball league every spring, participates in community 5K charity runs, and they blend their
    competitive spirit with a love for line dancing at weekend socials, keeping active year‑round.
  arts: Mary Nelson, a dedicated gospel choir member who studies the works of Kirk Franklin and Mavis Staples, attends line‑dancing classes set to country classics, participates in African‑drumming workshops,
    and they discuss novels by James Baldwin and Toni Morrison in a book club that fuels their appreciation for storytelling and soulful expression.
  travel: Mary Nelson, who plans most trips on a tight budget yet enjoys indulging in weekend road‑trips to Savannah’s historic squares, New Orleans’ jazz festivals, and Asheville’s mountain retreats, prefers
    itineraries that combine cultural heritage tours with family‑friendly dining, and they keep a travel journal to track memories and future destinations like Charleston and Nashville.
  culinary: Mary Nelson, an accomplished home chef who perfects collard greens simmered with smoked turkey, fried catfish with a citrus‑herb crust, peach cobbler topped with dollops of whipped butter, and
    they regularly experiment with fresh okra, heirloom tomatoes, and sweet potatoes from their garden to modern‑twist Southern comfort cuisine.
  core: Mary Nelson blends structured budgeting, community‑driven ambition, and a love of gospel music, home‑cooked Southern dishes, and competitive spirit into a vibrant, organized life that balances responsibility
    with soulful celebration.
background:
  cultural: Mary identifies as African‑American and grew up in the Deep South, where church, family, and community have shaped her worldview. She embraces Southern Black traditions, from gospel music and
    soul food to storytelling and church fellowship. Her family's roots in Georgia trace back generations, and she maintains strong ties to extended relatives who gather for holidays and cultural celebrations.
    The values of resilience, hospitality, and communal support characteristic of her heritage inform her daily life, encouraging her to contribute to local initiatives and preserve cultural practices such
    as cooking heritage dishes and participating in church‑based service projects.
attributes:
