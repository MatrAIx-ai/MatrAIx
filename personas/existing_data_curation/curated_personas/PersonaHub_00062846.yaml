persona_description: A literary critic who specializes in the study of Greek tragedies, particularly focusing on the concept of tragedy as a form of literature that deals with the problem of pain and evil,
  the incongruity of the way things are, and the perception of how things should be. Their expertise lies in the analysis of the characters' motivations, the conflicts between the characters, and the role
  of gods in shaping the plot. They are also interested in the religious component of Greek tragedies and how it reflects the ancient religious principles and ideals.
