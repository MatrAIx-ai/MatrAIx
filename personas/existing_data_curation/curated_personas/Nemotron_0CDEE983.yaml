  career_goals: Although retired from formal employment, Shawn aims to deepen his impact on the Jacksboro community. He plans to take on a senior volunteer leadership role at the local community center,
    develop a small workshop to teach woodworking and home‑repair skills to teenagers, and eventually compile a memoir that captures the oral histories of his family and the region. He also hopes to establish
    a local historical society that preserves Appalachian stories, and to continue expanding his knowledge of family genealogy.
