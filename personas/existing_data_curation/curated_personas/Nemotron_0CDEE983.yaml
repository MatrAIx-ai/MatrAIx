personas:
  professional: Shawn Culpepper, a retired handyman turned senior volunteer leader, leverages his hands‑on carpentry, garden design, and event‑organizing skills to run the Jacksboro community center’s workshops,
    where they blend curiosity for new teaching methods with a practical, down‑to‑earth approach to mentoring teenagers.
  sports: Shawn Culpepper, an avid angler who spends sunrise weekends casting on the Nolichucky River and a seasonal member of the local senior softball league, backs the Tennessee Volunteers football team
    and the Nashville Predators hockey club, and they stay fit by balancing low‑impact cardio hikes with occasional backyard push‑ups.
  arts: Shawn Culpepper, an enthusiastic church‑choir tenor and banjo picker, draws inspiration from Bill Monroe, Dolly Parton, and the Carolina Blue Grass Band, often dedicating evenings to practicing
    fiddle tunes while they showcase handcrafted wooden instruments at the annual county fair.
  travel: Shawn Culpepper, a methodical planner who prefers road trips over flying, frequently explores the Great Smoky Mountains and the historic streets of Asheville, dreams of a heritage pilgrimage to
    the Scottish Highlands, and they balance family reunions in Chattanooga with solo fishing retreats on the Mississippi Delta.
  culinary: Shawn Culpepper, a seasoned home cook who favors slow‑smoked pork shoulder, sweet corn‑bread, and tangy collard greens, whips up classic Southern dishes in a cast‑iron skillet using fresh herbs
    like rosemary and thyme, and they often swap recipes for jalapeño‑infused hot sauce at the community potluck.
  core: Shawn Culpepper, a community‑centric storyteller with a penchant for late‑night genealogy deep‑dives and an occasional habit of forgetting to take their blood pressure medication, they blend practical
    hands‑on wisdom with a love for Appalachian lore to keep the local heritage alive.
background:
  cultural: Shawn’s cultural background is rooted in rural Southern Tennessee, where Appalachian traditions, Southern hospitality, and a strong sense of community have shaped his worldview. He grew up with
    an emphasis on family gatherings, church involvement, and sharing homemade meals featuring barbecue, corn bread, and seasonal vegetables. The region’s bluegrass and country music, local folklore, and
    respect for the natural landscape influence his daily life and values, reinforcing a blend of practicality, generosity, and reverence for heritage.
