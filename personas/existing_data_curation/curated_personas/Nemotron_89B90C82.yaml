personas:
  professional: Carrol Garner is an aspiring junior scientist who blends a love for watercolor sketches of insects with building LEGO habitats; they channel their curiosity and love for unconventional ideas
    into imagining new ways nature could work.
  sports: Carrol Garner loves energetic group games – they sprint in tag, spin in dance class, and cheer for the Maple Grove Cubs youth soccer team while also enjoying weekend trips to the community swimming
    pool.
  arts: Carrol Garner immerses themselves in creative expression by dyeing watercolors to paint whimsical forests inspired by Eric Carle and practicing free‑hand sketching while watching Bob Ross, making
    art a central part of playtime.
  travel: Carrol Garner is a budding explorer who has trekked through the nearby Redwood State Park, splashed at the family beach vacation in Florida, and dreams of a magical trip to Disney World, favoring
    hands‑on nature walks over rigid itineraries.
  culinary: Carrol Garner delights in simple, colorful meals, frequently mixing mac and cheese with peas, crafting fruit kebabs of grapes and strawberries, and proudly assisting in making peanut‑butter
    banana roll‑ups, though they often sneak extra chocolate chips when no one is looking.
  core: Carrol Garner is a curious, energetic six‑year‑old who turns everyday moments into imaginative adventures, juggling a love for art, nature, and group play while occasionally losing socks in their
    creative chaos.
background:
  cultural: Carrol grows up in Waynesville, a small community in Camden County, Georgia, surrounded by the gentle rhythms of rural Southern life. Her family participates in local traditions such as community
    fairs, neighborhood picnics, and school events that emphasize togetherness and hospitality. The region’s appreciation for storytelling, folk art, and music subtly informs her love for drawing and imaginative
    play. While she enjoys the simple pleasures of country living—wide-open spaces, friendly neighbors, and seasonal celebrations—she also has access to modern learning tools at school, blending traditional
    Southern values with contemporary educational experiences.
