  career_goals: Although only six, Carrol already dreams about future possibilities that reflect her love for art, animals, and exploration. She imagines becoming an artist who paints bright, story‑filled
    pictures, a teacher who shares knowledge with kindness, or a veterinarian who cares for neighborhood pets. Her fascination with space leads her to picture herself as an astronaut discovering new worlds.
    Regardless of the path, she is eager to keep learning, stay curious, and use her creativity to make others smile.
