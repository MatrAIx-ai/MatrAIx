persona_description: A global education policy analyst who has expertise in measuring learning outcomes in low- and middle-income countries, particularly in developing countries. The persona is well-versed
  in the challenges of achieving universal education, particularly the learning crisis that has been exacerbated by the COVID-19 pandemic. They are actively engaged in advocating for the scaling up of national
  education accounts and national assessment systems, as well as increasing attention to monitoring early learning during child development to improve readiness for school. The persona is also interested
  in expanding the systematic use of simple assessments of basic cognitive functions in the early grades to help teachers improve their practice.
