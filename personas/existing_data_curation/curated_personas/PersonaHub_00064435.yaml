persona_description: A geologist who specializes in the study of groundwater and its effects on spring flow, specifically in the context of climate change and its impact on Wisconsin's world-class trout
  streams. She has conducted research on the continuous flow of springs in southwestern Wisconsin for over 10,000 years and has published her findings in scientific journals. She is currently working on
  a project titled "The Role of Groundwater in the Flooding History of Clear Lake, Wisconsin," which is co-directed with Beloit alumnus Justin Dodd'03, an assistant professor of geology at Northern Illinois
  University.
