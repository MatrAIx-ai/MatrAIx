personas:
  professional: Heather Fowler, a senior engineer in San Antonio specializing in mechanical and civil infrastructure, leverages advanced CAD, Python, and systems integration to drive rapid prototyping of
    smart‑city projects while her competitive streak, curiosity, and relaxed, sometimes scattered, approach push her to champion agile workflows and persuade skeptical stakeholders.
  sports: Heather Fowler competes in the San Antonio Women's Volleyball League, practices salsa dancing at the local studio, hikes the Texas Hill Country with the Hill Country Trailblazers club, and roots
    for the San Antonio Spurs and San Antonio FC, turning their games into weekend social events.
  arts: Heather Fowler channels her outgoing spirit into improv comedy workshops at Second City San Antonio, revels in live music festivals featuring Tame Impala, Kacey Musgraves, and a local Tejano tribute
    to Selena, and draws creative inspiration from the vibrant murals of San Antonio street artist John Miller.
  travel: Heather Fowler curates spontaneous road‑trip itineraries that whisk her from the Texas Hill Country to weekend getaways in Santa Fe, while she dreams of cultural immersion in Barcelona’s Gaudí‑filled
    streets and Oaxaca’s bustling markets, balancing adventure with a modest budget that favors short‑haul flights and Airbnb stays.
  culinary: Heather Fowler’s culinary hobby centers on mastering Tex‑Mex staples like carne asada tacos, chicken fajitas, and smoky chipotle guacamole, where she seasons with fresh cilantro, lime zest,
    and ancho chili powder, proudly serving friends at weekly potlucks while occasionally indulging in a decadent slice of churro‑topped cheesecake.
  core: Heather Fowler blends relentless curiosity and a competitive edge with a laid‑back, sometimes disorganized, lifestyle, channeling worry into reflective journaling, improv comedy, and occasional
    impulsive splurges on concerts and volleyball gear.
background:
  cultural: Heather comes from a White American background rooted in the cultural tapestry of Texas. Her family traditions blend classic Southern hospitality—such as Sunday brunches, community gatherings,
    and a love of country music—with modern Texan influences like celebrating Fiesta San Antonio, exploring the River Walk, and enjoying regional foods like barbecued brisket and chile con carne. She identifies
    with the independent, resilient spirit common to Texas residents, while also valuing the inclusive, collaborative ethos of her multicultural hometown. This cultural mix informs her appreciation for
    both long‑standing local customs and innovative, forward‑looking ideas.
