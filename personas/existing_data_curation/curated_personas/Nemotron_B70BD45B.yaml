  career_goals: Heather aims to advance from senior engineer to project lead on large‑scale infrastructure initiatives that prioritize sustainability and smart‑city technologies. She plans to obtain her
    Professional Engineer (PE) license within the next two years and is eyeing a future where she can head a multidisciplinary engineering team, champion innovative design practices, and influence corporate
    strategy. Long‑term, she aspires to launch her own consulting firm focused on integrating AI‑driven optimization into civil and mechanical projects, while also mentoring women and underrepresented groups
    in STEM to broaden the pipeline of talent.
