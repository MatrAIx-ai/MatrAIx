personas:
  professional: Benjamin Radzicki, a 29‑year‑old automotive technician, blends systematic engine diagnostics, advanced electronic control module troubleshooting, and a painter’s eye for custom finishes
    to deliver meticulous classic car restorations while coaching apprentices with clear technical documentation.
  sports: Benjamin Radzicki follows the Atlanta Falcons and Atlanta United FC with fervor, enjoys local pickup soccer games at the Newnan community park, hikes the Appalachian Trail in the spring, and participates
    in a weekend cycling club that explores Georgia’s scenic byways, all while occasionally joining friends for casual basketball at the nearby high school gym.
  arts: Benjamin Radzicki channels a love for blues legends like B.B. King and classic rock icons such as The Rolling Stones into their automotive sketches, paints vintage Mustang silhouettes inspired by
    the works of automotive designer Harley Earl, curates photo series of Georgia’s pine forests reminiscent of Ansel Adams, and frequents the Newnan Artspace gallery to discover avant‑garde installations
    that spark unconventional design ideas.
  travel: Benjamin Radzicki prefers meticulously planned road trips that combine classic car shows with scenic drives, having recently toured the Blue Ridge Parkway to photograph mountain vistas, visited
    Detroit’s Henry Ford Museum to study historic models, and taken a weekend getaway to Savannah’s historic district for culinary exploration, while always reserving a spare night for spontaneous detours
    to local art festivals.
  culinary: Benjamin Radzicki balances a modest cooking skill set with a palate for Southern comfort foods, regularly preparing fried chicken with collard greens, shrimp and grits seasoned with smoked paprika,
    and a slice of peach cobbler for dessert, while sipping black coffee as they mix custom paint blends, and occasionally treats themselves to a BBQ rib platter after completing a demanding restoration
    project.
  core: Benjamin Radzicki, a 29‑year‑old automotive artisan, fuses precision mechanics with a painter’s creativity, navigates intense anxiety through structured routines, and quietly curates classic cars
    and blues vinyl in solitary workshops.
background:
  cultural: Benjamin was raised in the close‑knit community of Newnan, Georgia, where Southern hospitality, modesty, and a strong work ethic are deeply valued. His family’s roots in the area exposed him
    early to the region’s car culture, from Saturday‑night NASCAR viewing to local classic‑muscle gatherings. Church and community events reinforced a sense of responsibility and cooperation, shaping his
    reliable and methodical outlook. While he carries traditional Southern values—respect for family, neighborliness, and a love of regional cuisine—his innate curiosity drives him toward unconventional
    ideas, art appreciation, and emerging automotive technologies, blending the cultural heritage of the South with a forward‑looking, creative mindset.
attributes:
  skills: '[''Engine diagnostics'', ''Hybrid/Electric vehicle maintenance'', ''Electronic control module troubleshooting'', ''Brake and suspension repair'', ''HVAC system servicing'', ''Diagnostic software
    proficiency (Mitchell 1, Alldata, OBD‑II)'', ''Custom paint and upholstery work'', ''Shop inventory management'', ''Safety compliance and OSHA standards'', ''Technical documentation and service reporting'',
    ''Customer communication and education'']'
  hobbies: '[''Sketching and painting'', ''Building scale model cars'', ''Attending classic car shows'', ''Photography (automotive & nature)'', ''Listening to blues and classic rock music'', ''Participating
    in small‑group board game nights'', ''Reading science fiction'', ''Hiking local trails'', ''Volunteering at community youth garage'', ''Exploring local art galleries'']'
  career_goals: Benjamin aims to achieve ASE Master Technician certification within the next two years, with a specialization in electric vehicle service. He plans to become a certified technical trainer,
    sharing his systematic approach with apprentices and peers. Long‑term, he envisions opening a boutique garage that focuses on high‑end classic car restoration and artistic customizations, creating a
    space where technical excellence meets creative expression. He also hopes to develop community outreach programs that introduce local youth to automotive trades and hands‑on STEM experiences.
