  career_goals: Rose Marie aims to advance to a store manager position where she can shape store culture, implement systematic inventory practices, and mentor younger associates. She also envisions a phased
    retirement that includes part‑time consulting for local small businesses, helping them streamline sales processes, and possibly opening a small boutique that highlights regional crafts and produced
    goods.
