  hobbies: '["Softball (recreational league)", "Hiking in Finger Lakes state parks", "Community event volunteering (street fair)", "Truck maintenance & customization", "Classic rock music appreciation",
    "Fishing on Chemung River", "Barbecue cooking", "Weekend road trips", "Automotive technology forums"]'
  career_goals: Looking ahead, Richard aims to transition from hands‑on driving to a supervisory logistics role within the next five years. He plans to earn a Certified Professional in Logistics (CPL) credential
    and to complete a short‑term community‑college program in supply‑chain management. His ambition is to become a route manager or logistics coordinator for a regional transportation firm, overseeing driver
    schedules, optimizing load planning, and mentoring new drivers. He also aspires to eventually own a small independent trucking business that focuses on local deliveries and environmentally‑friendly
    practices, leveraging his sales experience to grow a niche client base.
