persona_description: A collector of historical and educational maps, particularly those related to the state of New York. They are interested in detailed maps that provide a comprehensive view of the county
  and its surrounding areas, and are drawn to maps that are well-detailed and provide valuable information. They appreciate the inclusion of statistical data and maps that show the route of the Erie Canal,
  as well as maps that show the location of major towns and cities in the county. They are also drawn to maps that include illustrations and drawings, such as the one of General Herkimer's home.
