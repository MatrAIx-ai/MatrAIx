  career_goals: Jonathan dreams of merging his love for art and technology. He aims to attend a high school with a strong arts program, then pursue a bachelor’s degree in multimedia design, animation, or
    interactive media. His long‑term ambition is to become a video game designer or multimedia artist who creates immersive, story‑driven experiences. He also hopes to travel to major art museums and cultural
    festivals worldwide, eventually opening his own creative studio where he can mentor other young artists.
