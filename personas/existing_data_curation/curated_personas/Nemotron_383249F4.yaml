personas:
  professional: Jonathan Salido, a 12‑year‑old aspiring comic book creator and LEGO architect, channels their curiosity and love for open‑ended storytelling into daily sketchbooks and elaborate block builds,
    thriving on the freedom to experiment rather than rigid school assignments.
  sports: Jonathan Salido, a 12‑year‑old skateboard enthusiast, spends afternoons at the Jenks community skate park mastering new tricks, cheers on FC Tulsa soccer and the Oklahoma City Thunder whenever
    they play, and they occasionally join a youth hockey clinic during winter break.
  arts: Jonathan Salido, a 12‑year‑old budding visual artist, fills their walls with comic strips inspired by Jim Lee and Studio Ghibli, listens to Tame Impala and The Beatles while practicing piano, and
    they regularly visit the Gilcrease Museum and local gallery openings with their family.
  travel: Jonathan Salido, a 12‑year‑old adventure‑curious traveler, loves weekend hikes along the Arkansas River Trail, has explored the Grand Canyon on a family road trip, dreams of visiting Kyoto to
    see the anime art studios, and they eagerly plan their next summer outing to Disney World in Florida.
  culinary: Jonathan Salido, a 12‑year‑old with a growing palate, enjoys building their own pizza with pepperoni and extra mozzarella, relishes Oklahoma‑style smoked brisket tacos with cilantro and lime,
    and they often whip up banana‑nut smoothies after school.
  core: Jonathan Salido is a curious, sketch‑loving, LEGO‑building teen who balances impulsive spending with a secret savings stash, embraces a laid‑back schedule, and they turn their disorganized workspace
    into a vibrant creative laboratory.
background:
  cultural: Jonathan was raised in Jenks, Oklahoma, a suburban community in Tulsa County that blends Midwestern values with a vibrant local arts scene. His family is white and middle‑class, participating
    actively in community events, church gatherings, and school programs. While his upbringing reflects traditional American customs—such as celebrating Fourth of July fireworks and local high‑school football
    games—he’s also exposed to Oklahoma’s broader cultural tapestry, including Native American history taught in school and museum visits at the Gilcrease Museum. The region’s emphasis on friendly neighborliness,
    self‑reliance, and appreciation for the outdoors and the arts has cultivated his open‑minded, curious personality.
