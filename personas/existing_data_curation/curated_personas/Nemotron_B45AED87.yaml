personas:
  professional: Jennifer Savage, a veteran property appraiser with deep expertise in real‑estate market analysis, GIS mapping, and specialized valuation software, blends her curiosity‑driven quest for innovative
    AI tools with a pragmatic, client‑focused communication style, and they champion a modernization project at Cook County’s assessment department while mentoring emerging assessors and drafting policy
    papers on equitable taxation.
  sports: Jennifer Savage, a daily walker who logs miles along Chicago’s Lakefront Trail and cheerfully supports the Chicago Bulls at United Center while also playing pick‑up pickleball at a neighborhood
    recreation center, combines low‑impact cardio with light competition to stay fit, and they relish the social camaraderie of post‑game coffee gatherings.
  arts: Jennifer Savage, an enthusiastic patron of Chicago’s cultural scene, regularly attends Goodman Theatre productions, delights in live jazz sessions at the Green Mill featuring artists like Wynton
    Marsalis, showcases her historic‑architecture photography at local galleries, and they eagerly discuss performance nuances at Toastmasters meetings, though they sometimes argue passionately over ticket
    prices.
  travel: Jennifer Savage, who plans trips with a blend of structured itineraries and spontaneous photo walks, enjoys weekend escapes to historic Galena, embarks on a long‑awaited genealogy tour of Bruges,
    Belgium, and they often pack rooftop‑garden herbs for culinary experiments abroad, while balancing travel costs with a modest senior‑discount budget.
  culinary: Jennifer Savage, a home‑cook devoted to classic Midwestern comfort food, regularly prepares Chicago‑style deep‑dish pizza, pork tenderloin with apple‑sauce, buttery cornbread, and a signature
    caramel‑apple pie using fresh basil and rosemary from their rooftop garden, and they love sharing these dishes at dinner parties, despite occasionally over‑salting the sauce when distracted by conversation.
  core: Jennifer Savage blends a lifelong curiosity for Chicago’s history with a pragmatic, community‑focused mindset, turning every appraisal, photograph, and garden harvest into an opportunity to connect,
    teach, and celebrate the city’s heritage.
background:
  cultural: Jennifer is a lifelong Chicago native raised in a mixed German‑Irish working‑class neighborhood, embodying the Midwest’s pragmatic values of hard work, fairness, and community service. Her cultural
    upbringing emphasized civic engagement, which she expressed through volunteerism and a deep respect for the city’s diverse heritage. As an unmarried professional woman, she cultivated independence and
    a strong sense of self‑reliance, while still cherishing the communal ties that characterize the city’s neighborhoods. This background informs her balanced approach to both personal and professional
    life, merging curiosity with practicality and compassion with assertiveness.
