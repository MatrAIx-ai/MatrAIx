  career_goals: Looking ahead, Jennifer aims to lead a modernization initiative within Cook County’s assessment department, integrating AI-driven valuation tools while preserving transparency and fairness.
    She is passionate about mentoring emerging appraisers, hoping to create a structured apprenticeship program that blends practical fieldwork with the latest analytical techniques. Over the next few years
    she also envisions contributing to policy discussions on equitable property taxation and possibly authoring a guidebook on best practices for assessors. As she approaches retirement, she plans to transition
    into a part‑time consulting role, offering expertise to municipalities seeking to improve their assessment processes, thereby ensuring her legacy of balanced, community‑focused valuation endures.
