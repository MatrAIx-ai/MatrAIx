persona_description: A historian who specializes in the study of housing policies and their impact on society, particularly during the 19th and 20th centuries. They have a deep understanding of the role
  of government and private entities in providing housing for the poor, the working classes, and the unemployed. They are knowledgeable about the various housing policies and programs implemented by local
  councils and the government, including the Housing for the Working Classes Act of 1890, the campaign of "Homes for Heroes" during World War I, and the Right to Buy program of the 1980s. They are also
  familiar with the issues and challenges faced by local councils in building and maintaining housing estates and tower blocks, and the criticisms and debates surrounding the program of "Right to Buy".
