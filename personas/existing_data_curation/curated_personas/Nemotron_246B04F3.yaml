personas:
  professional: Eduardo Dominguez is an emerging junior soccer strategist who leverages their meticulous LEGO city designs as tactical blueprints, bringing a practical, structure-loving yet occasionally
    disorganized style to team play, where their competitive streak and skeptical eye keep opponents on their toes.
  sports: Eduardo Dominguez is a member of the Midland Strikers U6 soccer team, where they idolize the Houston Dynamo and the Dallas Cowboys, regularly practicing on the open desert fields and leading peers
    in fast-paced, competitive drills while striving to improve teamwork.
  arts: Eduardo Dominguez spends afternoons drawing heroic figures like Spider-Man and the classic Mexican legend El Charro, assembling elaborate LEGO cities inspired by the vibrant beats of Mariachi Vargas
    de Tecalitlán and Los Tigres del Norte, and mimicking animated scenes from Pixar’s The Incredibles, weaving a colorful tapestry of cross-cultural creative expression.
  travel: Eduardo Dominguez has explored the nearby desert landscape of Carlsbad Caverns and the rocky trails of Big Bend National Park, dreaming of a future trip to Disneyland in California and a family
    vacation to the historic streets of Barcelona, balancing a love for local adventures with curiosity for far-off wonders.
  culinary: Eduardo Dominguez loves the tangy crunch of cheese quesadillas with fresh salsa, enjoys building mini tacos al pastor topped with cilantro and lime, and often helps stir mango sorbet with pineapple
    chunks, showing a budding kitchen confidence that favors bold, colorful flavors.
  core: Eduardo Dominguez is a hyper-structured yet impulsively competitive six-year-old who builds LEGO fortresses, dominates soccer scrimmages, hoards spare change in a piggy bank, and worries over every
    little detail.
background:
  cultural: Eduardo grows up in a Mexican‑American household in Midland, Texas. At home, Spanish is spoken alongside English, and family meals feature traditional Mexican dishes such as tacos, tamales,
    and quesadillas. He celebrates cultural holidays like Día de los Muertos and Mexican Independence Day, while also participating in local West Texas traditions like rodeos and school field trips to the
    nearby desert. This blend of Mexican heritage and Texan environment shapes his bilingual abilities, his love for music and food, and his comfort navigating both cultures.
attributes:
  skills: '["bilingual basic reading (Spanish & English)", "counting to 100", "simple addition and subtraction", "soccer dribbling and rule-following", "LEGO construction", "group activity coordination"]'
  hobbies: '["playing soccer", "building LEGO structures", "drawing cartoons", "listening to mariachi/norteño music", "rock collecting and desert exploring", "watching animated TV shows"]'
  career_goals: Although only six, Eduardo already imagines future roles that combine his love for structure, helping others, and excitement. He aspires to become a firefighter because he admires the organized
    training and opportunities to protect his community. He also dreams of being a professional soccer player, seeing it as a way to compete and showcase his skills. Occasionally he mentions wanting to
    be a bilingual teacher, reflecting his pride in speaking Spanish and English and his desire to share his culture.
