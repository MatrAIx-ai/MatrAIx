persona_description: A healthcare professional who is experienced in treating injuries to the musculoskeletal system, including fractures, dislocations, and sprains. They are skilled in the use of splints
  to immobilize these injuries and are familiar with the methods used to treat them. They may work in a hospital, clinic, or emergency department and are trained in the use of various types of splints,
  including traction splints, pneumatic splints, wire ladder splints, SAM splints, anatomical splints, and improvised splints. They may also be familiar with the causes, effects, and treatment of these
  injuries, including the use of compression garments, ice therapy, and physical therapy.
