  hobbies: '[''Gardening and horticulture'', ''Canning and preserving seasonal produce'', ''Reading (historical fiction, memoirs, genealogy)'', ''Quilting and textile crafts'', ''Birdwatching'', ''Walking/hiking
    in local nature areas'', ''Volunteer work at the local church'', ''Community event planning'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: Donna aims to re-enter the workforce in a part‑time role that leverages her organizational strengths and community ties. In the short term she plans to complete a GED and obtain a certification
    in office administration, positioning herself for a clerical or office support position at the local school district or a nonprofit organization. Longer‑term, she aspires to launch a small home‑based
    business offering homemade preserves, baked goods, and handcrafted textiles for local markets and church events. Additionally, she hopes to become a certified grief support facilitator so she can lead
    a support group for widows in the Queen City area, combining her empathy with her assertive, cooperative nature.
