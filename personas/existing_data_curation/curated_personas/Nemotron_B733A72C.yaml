personas:
  professional: Maria Hernandez, a retired community organizer and senior‑center volunteer, leverages their bilingual fluency, meticulous planning, and passion for storytelling to lead intergenerational
    cooking workshops, curate local art appreciation sessions, and coordinate cultural festivals that blend traditional island celebrations with Florida’s multicultural vibe.
  sports: Maria Hernandez follows the Tampa Bay Buccaneers and the Miami Heat with loyal enthusiasm, plays shuffleboard at the local senior recreation center, and joins a weekly low‑impact water aerobics
    class at the community pool, while occasionally cheering on the North Fort Myers amateur softball league where their grandson pitches.
  arts: Maria Hernandez immerses themselves in watercolor painting of Gulf Coast sunsets, frequently visits the Southwest Florida Art Museum to view works by Georgia O’Keeffe and Frida Kahlo, dances to
    the rhythms of son and salsa at community festivals, and cherishes the poetry of Pablo Neruda, letting these artistic experiences shape their storytelling workshops.
  travel: Maria Hernandez prefers leisurely road trips that blend cultural curiosity with natural beauty, having recently explored the historic streets of a Caribbean island where their ancestors hailed,
    followed by a scenic drive along the Florida Keys, a week‑long visit to New Orleans for its jazz heritage, and plans to photograph the autumn foliage in New England next spring, always budgeting travel
    expenses carefully around family events.
  culinary: Maria Hernandez delights in preparing classic dishes such as ropa vieja, picadillo, and sweet tostones, infuses every meal with a homemade sofrito made from fresh herbs from their garden, shares
    tropical desserts like flan de coco with neighbors, and teaches cooking classes at the senior center, though they sometimes over‑salt the stew when caught up in conversation.
  core: Maria Hernandez, a 76‑year‑old bilingual storyteller who blends meticulous planning with a love for watercolor sunsets, aromatic kitchens, and community festivals, balances disciplined budgeting
    with occasional indulgences, maintains active health routines despite arthritis, and revels in sharing cultural rhythms while never missing a chance to garden or mentor younger volunteers.
background:
  cultural: Maria’s cultural background is rooted in her Cuban heritage, which she proudly preserves while blending into the vibrant multicultural fabric of South‑west Florida. Raised by parents who migrated
    from Havana in the 1960s, she grew up speaking Spanish at home, celebrating traditional holidays like San Juan and Día de Los Muertos with music, dance, and family feasts. The rhythms of son, salsa,
    and bolero have shaped her taste in music, and the flavors of sofrito, plantains, and tostones remain central to her cooking. Her Catholic faith, reinforced by community church events, has reinforced
    values of family solidarity and service. Living in North Fort Myers, a city with a significant Cuban‑American population, she participates in local cultural festivals, contributes to the Cuban heritage
    association, and shares her family’s stories with younger generations, ensuring that the legacy of resilience, hospitality, and artistic appreciation endures.
attributes:
