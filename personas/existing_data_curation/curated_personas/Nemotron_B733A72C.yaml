  hobbies: '[''Painting and watercolor'', ''Visiting art galleries and museums'', ''Cooking Cuban cuisine'', ''Gardening (herbs, vegetables, flowers)'', ''Birdwatching'', ''Walking along the Caloosahatchee
    River'', ''Reading historical fiction and memoirs'', ''Salsa dancing'', ''Knitting and quilting'', ''Volunteer work at senior community center'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Maria remains driven to contribute to her community and preserve her family’s heritage. She aims to expand the intergenerational cooking program
    at the senior center, author a memoir that weaves together personal memories, Cuban cultural traditions, and Florida’s natural landscape, and mentor younger volunteers in event planning and cultural
    storytelling. Maria also hopes to develop a community garden in North Fort Myers that showcases both Caribbean and local plant species, fostering environmental stewardship and cultural exchange. Additionally,
    she aspires to continue learning—taking a beginner’s digital photography class to document her garden and local art events, and attending workshops that deepen her understanding of contemporary art.
    Ultimately, her ambition is to leave a lasting imprint of Cuban‑American identity and community service for future generations.
