  career_goals: Carlos aims to transition from a marketing manager to a director‑level role where he can shape the overall brand strategy for a company with a strong community focus. He is driven to lead
    large‑scale, cross‑cultural campaigns that celebrate Latino heritage in the Midwest and to mentor emerging marketers, especially those from under‑represented backgrounds. In the next five years, he
    hopes to earn a professional digital‑marketing certification, launch a consultancy that helps small Mexican‑American businesses thrive, and champion flexible, people‑first work policies within his organization.
