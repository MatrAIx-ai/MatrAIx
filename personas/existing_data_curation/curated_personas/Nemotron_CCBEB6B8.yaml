  hobbies: '[''Dancing (folk, salsa)'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Yoga and mindfulness'', ''Walking in Prospect Park'', ''Volunteer financial‑literacy workshops'',
    ''Socializing with friends and family'']'
  career_goals: Altagracia aims to move into a supervisory role within the collections department, where she can lead a team and implement training programs that emphasize respectful, culturally aware debt
    resolution. She is interested in obtaining a Certified Debt Collection Professional (CDCP) credential and plans to attend workshops on financial counseling to better serve her Mexican‑American community.
    Long‑term, she envisions transitioning into a community financial‑education specialist role, helping immigrant families in Brooklyn develop budgeting skills and avoid predatory lending.
