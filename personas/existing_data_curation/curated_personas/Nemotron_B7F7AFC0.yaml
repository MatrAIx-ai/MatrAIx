personas:
  professional: Otis Salazar, a 23‑year‑old aspiring automotive service technician, channels their curiosity‑driven tinkering and disciplined note‑keeping into diagnosing and repairing vehicle systems,
    blending organized workflow with flexible problem‑solving to out‑perform peers and lay groundwork for a future mobile repair business, where they hope to balance independence with community service.
  sports: Otis Salazar, a 23‑year‑old weight‑lifting enthusiast, hits the Iron Club gym five times weekly, roots for the Chicago Bears and Chicago Cubs, and competes in a Lake Michigan bass‑catching league
    that meets at the dunes each weekend, where they relish the quiet competition.
  arts: Otis Salazar, a quiet folk‑music hobbyist, plucks acoustic melodies inspired by Bob Dylan and Gillian Welch; they occasionally perform at the local coffee‑house open‑mic and study the guitar techniques
    of John Fahey while also collecting vintage vinyl from the 1970s.
  travel: Otis Salazar, a thrifty 23‑year‑old with a love for lakes, plans weekend road trips to the Upper Peninsula’s Porcupine Mountains, seasonal visits to Chicago’s lakefront festivals, and dreams of
    a summer fishing expedition to Norway’s fjords, all while they budget each trip through a detailed spreadsheet.
  culinary: Otis Salazar, an amateur cook with a penchant for lakeside fare, often grills perch fillets with lemon‑butter, whips up hearty beef chili on cold evenings, and perfects a simple chicken‑and‑vegetable
    stir‑fry using fresh bell peppers and garlic, while they keep their culinary confidence modestly in the backyard.
  core: Otis Salazar blends relentless DIY curiosity with disciplined budgeting, preferring solitary tinkering over social scenes, yet they harbor a competitive streak that fuels both chess matches and
    bass‑catching contests, all while occasionally forgetting to stretch after weightlifting, leading to recurring back aches.
background:
  cultural: Otis grew up in Michigan City, Indiana, a Midwestern lakeside community with deep ties to industry and outdoor recreation. His family is of mixed German and Irish ancestry, and the household
    emphasized modesty, hard work, and self-reliance—core Midwestern values. Local customs such as attending county fairs, community church gatherings, and seasonal trips to the Indiana Dunes have shaped
    his appreciation for practicality and nature. While he identifies with mainstream American culture, he also carries the regional ethos of quiet competence and a respect for tradition.
attributes:
  skills: '[''Automotive Repair'', ''Computer Hardware Troubleshooting'', ''Basic Carpentry'', ''DIY Home Improvement'', ''Strategic Gaming'', ''Problem Solving'', ''Time Management'', ''Budgeting'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Strategic Video Games'', ''DIY Electronics Projects'', ''Reading Science & Technology Articles'', ''Weightlifting'', ''Acoustic Guitar'']'
  career_goals: Otis aims to turn his practical skill set into a stable, well-paid trade. He plans to enroll in a community-college certification program for automotive technology or HVAC, with the long-term
    ambition of becoming a certified service technician. Eventually he hopes to open his own mobile repair business, allowing him to set his own schedule while continuing to learn new technologies. He also
    wants to achieve financial independence within the next five years, purchase a home in Michigan City, and possibly mentor younger apprentices in his field.
