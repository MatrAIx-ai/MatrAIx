  hobbies: '["herb gardening","reading culinary history","listening to food-science podcasts","woodworking for bakery tools","fishing","road trips to historic bakeries","collecting vintage kitchen equipment"]'
  career_goals: Howard aims to transform his passion for bread into a boutique bakery that becomes a quiet sanctuary for customers seeking high-quality, handcrafted loaves. His short-term goal is to master
    advanced sourdough techniques and earn a professional baking certification to deepen his technical knowledge. Long-term, he dreams of opening a small storefront in South Elgin that showcases experimental
    grain blends and seasonal herb-infused breads while retaining a low-key, solitary work environment. He also hopes to publish a modest cookbook documenting his unique recipes and the science behind them,
    and to establish wholesale relationships with local restaurants that value artisanal products. To support these ambitions, Howard plans to adopt a simple digital inventory system to improve organization
    without sacrificing his flexible schedule.
