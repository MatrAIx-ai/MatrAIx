  career_goals: Although retired from full‑time employment, Christopher aims to stay intellectually active and give back to his community. He aspires to mentor young engineers and artists through local
    STEM‑arts outreach programs, serve on the board of a nonprofit art museum, and lead workshops that blend technology with creative expression. He also hopes to author a series of reflective essays on
    the intersection of engineering and art, and to travel to international art festivals to broaden his cultural perspective. Maintaining his health and managing stress through mindfulness practices are
    also key personal objectives.
