  hobbies: '["drawing", "building with LEGO", "reading picture books about space and animals", "exploring nature", "listening to children''s music and bluegrass instrumentals", "creating stories with toys"]'
  career_goals: Steven dreams of becoming an astronaut who explores distant planets and paints the stars he sees, an inventor who designs toys that spark curiosity, or a visual artist who creates whimsical
    worlds on canvas. He is eager to learn more about how things work, especially space travel, animals, and natural phenomena, and hopes his future work will blend his love of science with his passion
    for art and storytelling.
