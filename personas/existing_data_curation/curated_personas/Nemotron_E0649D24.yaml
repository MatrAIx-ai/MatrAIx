  career_goals: While retired, Michael is intent on leaving a lasting imprint on his community. He aims to become a senior mentor for youth and adults at the local community college, sharing his practical
    knowledge in trades and project management. He also wishes to document his life story and lessons learned, possibly publishing a memoir that highlights generational change in Fresno’s agricultural landscape.
    Additionally, he aspires to serve on the board of a local nonprofit focused on seniors’ wellness, ensuring programs remain structured and effective.
