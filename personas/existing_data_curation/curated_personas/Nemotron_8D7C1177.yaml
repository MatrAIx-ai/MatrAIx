  career_goals: Zaira aspires to earn a scholarship to a top university where she can study biomedical engineering or computer science, aiming to develop innovative medical technologies that improve community
    health. She is determined to become a research scientist or tech entrepreneur, blending her curiosity for new ideas with practical problem‑solving. Zaira also wants to create a mentorship program for
    Latino youth in her area, helping them access STEM opportunities and encouraging academic excellence. Her competitive nature drives her to achieve high academic standing and secure internships that
    build real‑world experience.
