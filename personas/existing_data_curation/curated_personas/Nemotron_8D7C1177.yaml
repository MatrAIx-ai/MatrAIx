personas:
  professional: Zaira Rodriguez is a teenage robotics hobbyist who channels their curiosity and methodical mindset into building Arduino‑controlled line‑following bots after school, keeping meticulous project
    logs and planning each iteration with the precision of an aspiring engineer.
  sports: Zaira Rodriguez is a midfielder for the Riverside High School Lions, a role that lets them blend strategic thinking from robotics with quick footwork, and they follow professional clubs like Club
    América and Manchester United while training twice weekly, joining a local futsal league on weekends, and using a smartwatch to monitor VO2 max and sprint intervals.
  arts: Zaira Rodriguez immerses themselves in Latin pop, streaming artists such as Shakira, Bad Bunny, and Rosalía while practicing salsa steps at home, and they spend weekends attending community dance
    workshops where they learn traditional folkloric choreography, a habit that fuels their creative confidence and balances their analytical pursuits.
  travel: Zaira Rodriguez dreams of touring the historic plazas of Mexico City and the ruins of Machu Picchu, but until then they explore nearby cultural sites such as the San Antonio River Walk and the
    Texas Hill Country during school breaks, preferring group trips organized through their community center that combine volunteer service with immersive language practice, while budgeting each journey
    with a spreadsheet they update before departure.
  culinary: Zaira Rodriguez enjoys cooking family recipes like tamales and enchiladas, meticulously measuring masa and chilies, and they experiment with a pinch of smoked paprika in the enchilada sauce
    for a modern twist, though they occasionally burn the edges of tamales when multitasking with robotics projects.
  core: Zaira Rodriguez is a methodical 15‑year‑old who balances a competitive drive on the soccer field with a curious knack for robotics, they weave in nightly salsa practice, and they maintain a meticulous
    budgeting habit that fuels their future tech ambitions.
background:
  cultural: Zaira comes from a Hispanic family with roots in Mexico, growing up in a bilingual household in Glen Ridge, NJ. At home, Spanish is spoken daily, and she participates in cultural celebrations
    such as Día de los Muertos and Cinco de Mayo, where traditional foods and music play central roles. Her family places high value on education, hard work, and respect for elders, influencing her organized
    and reliable personality. She is involved in a school Hispanic cultural club, attends Spanish language enrichment classes, and frequently helps organize community events that showcase Latino heritage,
    reinforcing her sense of identity and community responsibility.
