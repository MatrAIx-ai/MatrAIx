  career_goals: Although retired, Roy’s ambition is to remain an active contributor to his community. He plans to lead a neighborhood community garden that blends sustainable practice with food‑security
    outreach, mentor younger residents through a senior‑to‑youth workshop series, and complete a digital photography course so he can archive his family’s stories for future generations. He also hopes to
    be recognized as a reliable volunteer coordinator for his church’s outreach programs.
