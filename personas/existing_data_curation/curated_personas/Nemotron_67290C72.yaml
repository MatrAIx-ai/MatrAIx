personas:
  professional: Roy Fields, a retired maintenance technician with three decades of mechanical and electrical repair experience, now channels their practical curiosity into leading a neighborhood community
    garden, mentoring youth through senior‑to‑youth workshops, and coordinating church outreach, while they juggle a new digital photography class to archive family stories.
  sports: Roy Fields is a faithful follower of the Kansas City Chiefs, occasionally joins a local walking club that meets at the park before Sunday games, and they support the Kansas City Royals during
    the baseball season, balancing sedentary fandom with mild exercise to keep their knees limber.
  arts: Roy Fields spends weekend evenings listening to classic jazz icons like Miles Davis and blues legends such as B.B. King, reads biographies of influential leaders for inspiration, and they attend
    the annual Kansas City Jazz & Blues Festival, letting the music fuel their creative woodworking projects.
  travel: Roy Fields favors low‑cost, purpose‑driven trips, having driven to New Orleans for its rich culinary scene and to the Great Smoky Mountains for a weekend hike, while they dream of a spring visit
    to the historic gardens of England’s Cotswolds, always planning around a modest retirement budget and family commitments.
  culinary: Roy Fields blends traditional soul food staples—like fried chicken, collard greens, and sweet potato casserole—with Kansas‑inspired barbecue ribs, often seasoning dishes with home‑grown herbs
    from the garden and cooking on a cast‑iron skillet while they hum along to blues records.
  core: Roy Fields balances a pragmatic, slightly skeptical nature with a love of gardening, woodworking, and jazz, tends to hoard every spare tool as a precaution, and they remain fiercely competitive
    even in friendly bridge games.
background:
  cultural: Roy is an African‑American who grew up during the latter years of the Great Migration, with family roots in the rural South before settling in the Midwest. Living in Lenexa, a predominantly
    white suburb of Kansas City, he has maintained strong ties to the local Black community through his church, where gospel music, fellowship, and community service are central. He celebrates cultural
    milestones such as Juneteenth and honors family traditions through soulful cooking, oral storytelling, and intergenerational gatherings. His cultural identity blends the resilience and communal spirit
    of Midwestern Black life with a pragmatic approach shaped by his lifelong work in public maintenance.
