persona_description: A geneticist who specializes in the study of Y-chromosome DNA haplogroups, particularly the Haplogroup J haplogroup and its subclades. His research interests include the geographical
  spread of the J haplogroup, the presence of the Cohen modal haplotype among the Lemba, and the decline of the black Jews of Africa. He is particularly interested in the subclades J1 and J2 and their distribution
  across Africa and among the Semitic-speaking peoples of Tigriniya, Amhara, and Oromiya. He has a unique understanding of the historical and cultural context of the black Jews of Africa and their relationship
  to the Jewish population.
