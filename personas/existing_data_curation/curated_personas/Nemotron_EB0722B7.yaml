personas:
  professional: Raschid Hines is a self-taught tech enthusiast who blends their curiosity for coding with hands-on repair skills, building custom PCs and writing Python scripts, and they reliably organize
    neighborhood gaming sessions while aiming to secure a GED and pursue an apprenticeship in computer networking or automotive technology.
  sports: Raschid Hines enjoys pickup basketball at Reilly Bowl Park, follows the Charlotte Hornets for NBA action and the Carolina Hurricanes for hockey, participates in the school's spring track club
    for occasional jogging, but they prefer low-key, short-duration workouts that fit around their study and coding schedule.
  arts: Raschid Hines immerses themselves in hip-hop (Kendrick Lamar), jazz (Miles Davis), and R&B (Erykah Badu) while sketching Charlotte skylines in a battered notebook, and they channel the rhythms into
    short stories and poetry that echo the lyrical depth of Nas and the visual intrigue of street artist Banksy.
  travel: Raschid Hines prefers budget-friendly road trips, often mapping weekend escapes to Asheville's mountain arts scene or Washington DC's tech museums, yet they dream of a solo pilgrimage to Tokyo's
    Akihabara district to dive into the heart of gaming culture, balancing an adventurous curiosity with the constraints of a teen's limited budget and parental permission.
  culinary: Raschid Hines gravitates toward comfort foods, regularly whipping up seasoned fried chicken, mac and cheese, and spicy collard greens with a splash of hot sauce, while experimenting with building
    custom pizzas topped with pepperoni and basil, yet they often skip nutritious meals in favor of late-night pizza slices after gaming sessions.
  core: Raschid Hines is a solitary, curiosity-driven teen who builds PCs, sketches cityscapes, and worries about tomorrow's next line of code, and they trade occasional impulsive gaming splurges for a
    disciplined pursuit of practical tech mastery.
background:
  cultural: Raschid grew up in East Charlotte, a historically Black neighborhood where Southern African‑American traditions run deep. His family places strong emphasis on church involvement, community solidarity,
    and soul‑food cooking, with family meals often featuring dishes like collard greens, fried chicken, and sweet potato pie. He is influenced by the vibrant local hip‑hop scene, the storytelling legacy
    of his grandparents, and the resilience and mutual support that characterize his community. These cultural threads shape his values, his creative interests, and his desire to give back to the neighborhood
    that raised him.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic coding (Python, HTML)'', ''PC building and customization'', ''Basic carpentry'', ''Vehicle maintenance'', ''Organizing small‑group activities'',
    ''Active listening and peer support'']'
  hobbies: '[''Strategy video gaming'', ''Online coding tutorials'', ''Sketching urban landscapes'', ''Listening to hip‑hop, jazz, and R&B'', ''Writing short stories and poetry'', ''Small‑group basketball'',
    ''Church youth outreach volunteering'']'
  career_goals: Raschid aims to obtain his GED within the next year and then enroll in a trade apprenticeship program, ideally in computer networking or automotive technology. He wants a career that lets
    him blend his curiosity for technology with a reliable, practical skill set, eventually becoming a certified IT support specialist or an automotive technician. Long‑term, he hopes to use his knowledge
    to mentor younger community members and help them navigate educational and career pathways.
