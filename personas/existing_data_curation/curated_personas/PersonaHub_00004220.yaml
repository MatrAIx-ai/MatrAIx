persona_description: A marine biologist who is interested in the application of bioremediation and biodegredation to wastewater treatment. They are likely to be familiar with the history of wastewater treatment
  and the use of microorganisms in the treatment of wastewater. They may also have knowledge of the processes involved in biodegredation, including the use of naturally occurring organisms like bacteria,
  fungi, and yeast to grow on organic compounds. They are interested in learning more about the Parkson Biolac (R) Aeration System, a bioremediation technology for wastewater treatment.
