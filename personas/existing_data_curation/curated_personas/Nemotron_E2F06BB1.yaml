personas:
  professional: Wanda Southern, a one‑year‑old who thrives on the predictable rhythm of nap and feed times yet delights in the spontaneous discovery of garden insects, already exhibits meticulous observation
    and gentle patience that foreshadow a future career as a horticultural researcher specializing in sustainable agriculture.
  sports: Wanda Southern, a one‑year‑old who loves crawling on the grassy field behind the community church, cheering on the Detroit Tigers on a backyard TV while attending parent‑led toddler gymnastics
    at the local recreation center and joining the neighborhood baby‑splash swim group each summer, embraces both structured play and spontaneous bursts of energy.
  arts: Wanda Southern, a one‑year‑old who is enchanted by the fiddle reels at the spring county fair and the gentle lullabies of folk singer Raffi, delights in finger‑painting bright swirls on large paper
    and mimics the hand motions of the local puppet theater’s characters, letting music and visual art shape her early sense of expression.
  travel: Wanda Southern, a one‑year‑old who has visited the family’s farm in Genesee County, taken a weekend road trip to Mackinac Island’s historic fort, and dreams of seeing the Eiffel Tower in Paris
    while her parents plan a future beach vacation in the Florida Keys, balances structured family outings with a budding curiosity for new horizons.
  culinary: Wanda Southern, a one‑year‑old who prefers soft, mildly sweet textures such as mashed sweet potatoes, applesauce, oatmeal, and cheese‑crackers, enjoys self‑feeding with a colorful silicone spoon
    and occasionally refuses the occasional peas, reflecting a blend of predictable palate and occasional adventurous bite.
  core: Wanda Southern, a gentle one‑year‑old who balances a love of predictable nap and mealtime routines with spontaneous bursts of curiosity during community potlucks, delights in soothing lullabies,
    yet sometimes throws a brief tantrum when her pacifier is taken away.
background:
  cultural: Wanda was born into a white, Midwestern family in Stockbridge, Michigan, a small community in Livingston County known for its close‑knit neighborhoods and agricultural heritage. Her family follows
    typical Midwestern values such as modesty, community involvement, and a strong emphasis on family and church life. Local traditions, including seasonal festivals, community potlucks, and church gatherings,
    provide a framework of social harmony and cooperation that aligns with Wanda's kind and considerate nature. The region’s pragmatic, down‑to‑earth outlook influences the structured routines of mealtimes
    and naps that give her predictability while allowing space for spontaneous play and exploration.
