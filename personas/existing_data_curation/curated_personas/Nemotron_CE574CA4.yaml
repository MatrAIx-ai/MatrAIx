personas:
  professional: Sean Wilson is a retired archival manager and public historian who channels decades of historical research, grant writing, curriculum design, and digital preservation into community‑focused
    projects; their methodical nature ensures every project follows a rigorous timeline, while their competitive streak pushes them to secure funding and outpace peer initiatives, and their skeptical eye
    guarantees every source is thoroughly vetted.
  sports: Sean Wilson stays active by joining the Tampa senior walking club for weekly guided tours of historic neighborhoods, cheering on the Tampa Bay Rays during baseball season, and playing pickleball
    at the community center, while their competitive nature fuels a personal challenge to improve their step count; they also enjoy occasional fishing trips along the Gulf Coast as a relaxing counterbalance
    to structured exercise.
  arts: Sean Wilson immerses themselves in the arts by curating a personal collection of vintage jazz vinyl from legends like John Coltrane and Miles Davis, savoring blues classics by B.B. King and Muddy
    Waters, and photographing the ornate facades of Tampa’s historic districts, often displaying their work at the Tampa Museum of Art’s community exhibit and attending live performances at the Straz Center,
    where their keen eye for detail informs both their visual and auditory appreciation.
  travel: Sean Wilson approaches travel with a meticulously planned itinerary, favoring historic destinations such as St. Augustine, Savannah, Charleston, and New Orleans for their rich architecture, while
    also scheduling day trips to Florida’s own heritage sites like the Castillo de San Marcos in St. Pete Beach and the marine museums of Key West; they blend solitary photography sessions with guided walking
    tours, and a long‑standing wish remains to explore the antebellum homes of Natchez, MS, once their calendar permits.
  culinary: Sean Wilson showcases their culinary roots by regularly preparing Southern comfort foods such as shrimp and grits, smoked ham‑hock collard greens, and fried catfish served with buttery cornbread,
    using fresh tomatoes, okra, and sweet potatoes harvested from their own garden; their cooking skill sits at an adept amateur level, allowing them to experiment with spice blends while delighting friends
    with hearty, home‑cooked meals at weekend gatherings.
  core: Sean Wilson is a detail‑driven, community‑focused retiree who blends a disciplined, skeptical mindset with a love for historic storytelling, gardening, and soulful blues, all while navigating the
    quirks of aging with pragmatic resolve.
background:
  cultural: Sean grew up in a close‑knit African‑American family in the South, with deep roots in the cultural and historical fabric of Florida. Family gatherings were often centered around storytelling,
    gospel music, and shared meals, instilling a strong sense of community and respect for heritage. He continues to participate in local Black cultural events, such as Juneteenth celebrations and church
    activities, and he draws on the values of perseverance, education, and civic responsibility that were emphasized by his parents and elders.
attributes:
  skills: '[''Historical research'', ''Archival management'', ''Grant writing'', ''Curriculum development'', ''Public speaking'', ''Project management'', ''Writing and editing'', ''Community outreach'',
    ''Event planning'', ''Digital preservation'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Historical non‑fiction reading'', ''Genealogy research'', ''Chess'', ''Historic walking tours'', ''Photography'', ''Jazz and blues listening'', ''Cooking Southern
    cuisine'']'
  career_goals: Although retired, Sean is driven to leave a lasting scholarly record of the African‑American experience in the Tampa Bay area. He intends to write and publish a comprehensive history of
    Black communities in Hillsborough County, secure a grant to fund an interactive museum exhibit, and mentor emerging local historians through workshops. He also aims to serve as a volunteer docent at
    the regional heritage museum and to contribute op‑eds that highlight underrepresented stories in local media.
