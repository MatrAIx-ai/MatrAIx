  career_goals: Cortez often talks about growing up to be a firefighter because he admires the bright trucks and wants to help people, and he also imagines being a teacher so he can share his favorite stories
    with classmates. Occasionally he mentions wanting to be an astronaut after watching space books, reflecting his curiosity for new ideas while wanting a practical way to make a difference.
