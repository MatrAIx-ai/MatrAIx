personas:
  professional: Cortez Jackson is an aspiring mini-architect who obsessively arranges his colorful building blocks into precise cityscapes while eagerly experimenting with new configurations, and they confidently
    lead playtime discussions and reassure peers with practical explanations whenever a tower wobbles.
  sports: Cortez Jackson is a lively member of the Little Lions Soccer Club who thrives on organized drills at the community park, loves to sprint after the ball during matches, enjoys cheering teammates,
    yet occasionally worries about missing a goal and asserts themselves by calling out plays to stay involved, and they cheer loudly when a teammate scores.
  arts: Cortez Jackson is a budding performer who sings along to Sesame Street's "Letter of the Day" and dances to Disney's "Let It Go," often reenacting scenes with action figures, eagerly shares his "art
    gallery" of crayon drawings with family, and they relish being the center of attention even when a smudge appears.
  travel: Cortez Jackson is an enthusiastic little traveler who prefers well‑planned trips to familiar places like the local children’s museum and the nearby beach, yet their eyes light up at the thought
    of visiting Disney World in Orlando, and they cling to a favorite stuffed giraffe for comfort during longer car rides, balancing excitement with occasional worry about new environments.
  culinary: Cortez Jackson is a curious eater who loves cheesy macaroni, crunchy carrot sticks, and strawberry‑topped pancakes, often insists on stirring the batter himself, but can become fussy about foods
    with mixed textures, leading parents to offer bite‑size portions of new dishes to ease his worry about unfamiliar flavors, and they proudly proclaim the best dish of the day after tasting.
  core: Cortez Jackson blends boundless curiosity with a practical streak, leading play and negotiations, yet often battles worry and stress, and they are a charismatic yet thoughtfully cautious four‑year‑old.
background:
  cultural: Cortez comes from an African‑American family with deep roots in California’s Central Valley. His grandparents migrated from the South during the Great Migration, bringing traditions of Southern
    cooking, gospel music, and oral storytelling. The family celebrates Juneteenth, Kwanzaa, and participates in local community festivals, and they regularly attend a neighborhood church where music and
    communal gatherings are central. Growing up in Oakdale, Cortez is exposed to a multicultural environment that blends African‑American cultural influences with broader Californian customs, enriching
    his language, music preferences, and social values.
