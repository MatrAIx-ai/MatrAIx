  career_goals: Angel aspires to become a senior data architect leading enterprise‑wide data strategy, championing robust governance and innovative cloud migrations. She aims to obtain advanced certifications
    (e.g., AWS Certified Solutions Architect, Oracle Certified Master) and to mentor junior DBAs, fostering a collaborative, high‑performing team. Long‑term, she envisions leveraging her humanities background
    to direct data‑driven cultural heritage projects, integrating Mexican historical archives into modern analytics platforms while maintaining a balanced, low‑stress work environment.
