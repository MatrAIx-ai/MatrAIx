  career_goals: Though retired, Victoria aims to deepen her impact on the Burlington community. She plans to expand the senior‑center’s technology tutoring program, mentoring younger volunteers and helping
    peers navigate digital tools. She also hopes to develop a small community garden that supplies fresh produce to local food‑pantries, combining her love of horticulture with a desire to give back. Writing
    a memoir of family recipes and oral histories is another ambition, preserving her Italian‑American heritage for future generations. Overall, her goals reflect a balance of continued learning, practical
    service, and the nurturing of intergenerational connections.
