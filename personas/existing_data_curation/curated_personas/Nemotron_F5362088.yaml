personas:
  professional: Johnny Floyd is a seasoned electrician whose methodical mastery of residential and commercial wiring, low‑voltage systems, and emerging solar and EV‑charging installations is amplified by
    their sociable, talkative demeanor that makes them a natural mentor and on‑site coordinator, driving their ambition toward Master Electrician status and a future sustainable‑contracting business.
  sports: Johnny Floyd stays active by joining the Solano County Trail Runners club for weekend hikes, fervently following the San Francisco 49ers and Golden State Warriors, and playing pickup basketball
    with a local YWCA league, using these activities as both social outlets and stress relief, and they relish the camaraderie of community sports.
  arts: Johnny Floyd channels their creative energy into acoustic guitar sessions featuring classics by Bob Dylan, John Mayer, and Neil Young, captures stark industrial silhouettes inspired by Sebastião
    Salgado, and they sharpen their spontaneity at Bay Area improv workshops hosted by the San Francisco Improv Alliance, weaving music, photography, and comedy into a vibrant personal tapestry.
  travel: Johnny Floyd prefers road‑trip adventures that blend scenic hikes with renewable‑energy curiosity, having explored Napa Valley vineyards, the towering redwoods of Northern California, and planning
    a future trek through Iceland’s geothermal landscapes, where they intend to photograph hydroelectric plants and soak in hot springs.
  culinary: Johnny Floyd’s culinary repertoire ranges from grilling cedar‑plank salmon seasoned with fresh dill and lemon to whipping up a hearty California‑style BBQ rub for spare ribs, while their weekend
    experiments in brewing kombucha and baking sourdough with rosemary and thyme reflect a hands‑on approach to flavor that mirrors their DIY ethos, and they often share the results at neighborhood gatherings.
  core: Johnny Floyd balances a buzzing sociability and meticulous craftsmanship with occasional anxiety‑driven over‑planning, a habit of late‑night tool‑shopping sprees, and a relentless curiosity that
    fuels both DIY projects and community performances, and they often find themselves juggling multiple commitments.
background:
  cultural: Johnny grew up in Northern California’s Solano County, a region that blends suburban life with its proximity to the Bay Area’s tech culture. As a white American from a working‑class family,
    he was raised with values of self‑reliance, hands‑on craftsmanship, and community responsibility. He celebrates traditional American holidays while also participating in regional events like the Solano
    County Fair and local farmers’ markets. The progressive, environmentally‑focused atmosphere of nearby San Francisco has influenced his interest in renewable‑energy technologies, while the close‑knit
    community ethos of Fairfield reinforces his cooperative and considerate nature.
attributes:
  skills: '[''Residential & commercial wiring'', ''Low‑voltage and data cabling'', ''Solar PV system installation'', ''EV charger installation'', ''Electrical code compliance (NEC)'', ''Circuit troubleshooting'',
