  hobbies: '[''Acoustic guitar playing'', ''Improv comedy workshops'', ''DIY home‑improvement projects'', ''Volunteering at community events'', ''Hiking Solano County trails'', ''Amateur (ham) radio operation'',
    ''Industrial‑landscape photography'', ''Reading about smart‑home tech'', ''Cooking with friends'']'
  career_goals: Johnny aims to achieve Master Electrician status within the next two years and eventually obtain a contractor’s license so he can launch his own electrical contracting firm focused on sustainable
    building solutions. He plans to deepen his expertise in smart‑home automation, energy‑storage systems, and IoT‑enabled devices, positioning his business at the intersection of traditional trades and
    modern technology. He also aspires to become a mentor for young apprentices in the Bay Area, creating a supportive learning environment that balances rigorous skill development with emotional well‑being.
    Financial stability and a reputation for reliability are core drivers of his long‑term ambition, providing a safety net for his anxiety‑prone nature.
