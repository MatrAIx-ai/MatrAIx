personas:
  professional: Tina Chavis, a retired STEM curriculum designer, leverages their analytical problem‑solving background and spreadsheet expertise to mentor adult learners at the local library, where their
    skeptical eye ensures program rigor while their outgoing energy fuels lively workshop discussions.
  sports: Tina Chavis enjoys daily morning walks along the nearby nature trail, engages in birdwatching for local warblers, competes in senior bridge tournaments with the strategic intensity of a sport,
    and cheerfully roots for the regional minor‑league baseball team the River City Rangers.
  arts: Tina Chavis regularly attends productions at the historic Willow Creek Theater, delights in the music of Ella Fitzgerald and the storytelling of August Wilson, and crafts charity scarves while humming
    classic Johnny Cash tunes, letting the arts infuse their social gatherings with warmth.
  travel: Tina Chavis favors organized, senior‑discount day trips, having explored the historic streets of Savannah, the misty vistas of the Great Smoky Mountains, and they dream of a leisurely cruise to
    Charleston’s waterfront, always planning itineraries with detailed notes and a contingency for extra rest stops.
  culinary: Tina Chavis experiments with recipes from their 1950s upbringing, often combining heirloom tomatoes, fresh basil, and wild mushrooms into a rustic ratatouille, while also perfecting a tangy
    dill pickle brine and knitting culinary curiosities into dishes that showcase garden harvests, even if they sometimes over‑season out of enthusiasm.
  core: Tina Chavis blends a lifelong curiosity and competitive spirit with a pragmatic, detail‑oriented approach, channeling skepticism into mentorship, meticulous budgeting, proactive health monitoring,
    and a vibrant social life enriched by arts, nature, and experimental cooking.
background:
  cultural: Tina was born in 1945 in the Midwestern United States and moved to the Pacific Northwest as a teenager, settling in Spokane County. Her upbringing reflects post‑World War II American values—self‑reliance,
    hard work, and community service—shaped by a modest, white, middle‑class family with roots in farming and small‑town industry. A lifelong Methodist, she embraces the region’s outdoor ethic, appreciating
    the forests, rivers, and seasonal cycles that define Spokane’s culture. Her experiences during the civil‑rights era and the 1960s counterculture have left her both curious about new ideas and pragmatic
    about tradition.
