  hobbies: '[''Community gardening'', ''Bridge (card game)'', ''Historical biography reading'', ''Hiking on local trails'', ''Birdwatching'', ''Volunteer work at the community center'', ''Cooking and recipe
    experimentation'', ''Genealogy research'', ''Participating in senior book club'', ''Knitting and quilting'']'
  career_goals: Although retired, Tina aims to channel her curiosity and practicality into mentoring younger generations in STEM, particularly through after‑school workshops at the local library. She plans
    to lead a community‑garden project that combines sustainable gardening with intergenerational learning. Writing a memoir that captures her life through the lens of mid‑century American change is another
    personal ambition. Tina also hopes to earn a certification in senior health promotion, improve her stress‑management toolkit, and win a regional senior bridge tournament, reflecting her competitive
    spirit.
