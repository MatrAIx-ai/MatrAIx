personas:
  professional: Alberto Mendoza is a junior full-stack developer in New York who blends Python and JavaScript expertise with a keen eye for UI/UX, channeling a love of contemporary art into clean, visually
    striking web applications while methodically planning projects in JIRA and mentoring peers through pair programming, and they consistently bring their organized mindset to meet tight deadlines.
  sports: Alberto Mendoza cycles through Brooklyn's waterfront trails with the NYC Cyclists club, follows the New York Knicks, Mets, and New York City FC, and balances weekend salsa dancing with occasional
    pickup basketball games at a local community center, treating fitness as a social extension of their artistic lifestyle, and they view each bike ride as a creative recharge.
  arts: Alberto Mendoza immerses themselves in New York's contemporary art scene, regularly sketching installations at MoMA, draws inspiration from artists like Yayoi Kusama and Banksy, and fuels their
    musical palate with salsa legends such as Marc Anthony, jazz icons like John Coltrane, and emerging indie bands like Tame Impala, which shape their aesthetic sensibility in both work and leisure, and
    they often translate that inspiration into code.
  travel: Alberto Mendoza prefers short, budget-friendly trips that blend cultural immersion and tech curiosity, having explored the historic streets of Boston, the tech hub of Austin during a hackathon,
    and dreaming of a future visit to Buenos Aires to experience its vibrant tango scene while balancing student loan constraints, and they plan each getaway with meticulous spreadsheets.
  culinary: Alberto Mendoza enjoys cooking island-style staples such as arroz con gandules and mofongo, experimenting with fusion twists that pair plantains with Korean gochujang, while displaying a solid
    intermediate skill level that lets them host weekly dinner gatherings for friends, often seasoning dishes with sofrito, garlic, and cilantro, and they love sharing stories behind each recipe.
  core: Alberto Mendoza is a curiosity-driven coder who sketches code diagrams on cafe napkins, fuels mornings with espresso, forgets to water succulents, and constantly juggles art, salsa, and sprint planning
    with a friendly, methodical flair, and they thrive on multitasking.
background:
  cultural: Alberto is a first‑generation American of Puerto Rican heritage. His parents emigrated from San Juan, and he was raised in a bilingual household where Spanish and English intertwine daily. Family
    gatherings feature traditional dishes like lechón asado and music ranging from plena to reggaetón. He grew up in New York’s East Harlem, a hub of Latino culture, and regularly participates in community
    events such as the annual Puerto Rican Day Parade and local salsa nights. These experiences instilled a strong sense of pride in his island roots, shaping his worldview and informing his desire to create
    technology that celebrates and preserves Puerto Rican cultural expression.
