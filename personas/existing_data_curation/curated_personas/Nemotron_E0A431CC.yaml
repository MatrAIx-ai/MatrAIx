  career_goals: Alberto aims to progress from his current junior programming role to a senior full‑stack engineer within the next three to five years, eventually taking on a technical lead or engineering
    manager position where he can shape product vision and mentor junior teammates. He is particularly interested in building applications that enhance access to the arts and preserve cultural heritage,
    such as interactive museum guides or community storytelling platforms for the Puerto Rican diaspora. To support this, he plans to deepen his expertise in cloud architecture and machine‑learning pipelines,
    and is considering a part‑time master’s program in Computer Science or Human‑Computer Interaction. He also aspires to contribute to open‑source projects focused on accessibility and to speak at tech
    meetups about inclusive design.
