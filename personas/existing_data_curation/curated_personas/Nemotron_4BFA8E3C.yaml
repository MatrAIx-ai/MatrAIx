  hobbies: '["Reading historical fiction", "Gardening", "Quilting and knitting", "Genealogy research", "Walking and birdwatching", "Attending local theater", "Cooking and baking traditional recipes", "Crossword
    puzzles", "Mindfulness meditation", "Community storytelling"]'
  career_goals: Ashley aims to transition from full-time cashier duties to a part-time role that leverages her humanities education, such as a library assistant or museum docent focusing on local history.
    She hopes to develop and lead a senior storytelling program that captures oral histories of Youngstown residents, preserving community memory. Additionally, she plans to supplement her retirement income
    by offering freelance writing and editing services for local nonprofits. On a personal level, she aspires to complete a mindfulness course to better manage her worry and stress, and to take a community
    college class in digital photography to complement her interest in documenting regional heritage.
