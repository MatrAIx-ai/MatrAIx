personas:
  professional: An experienced cashier turned community chronicler, Ashley Mcleod blends precise POS handling with a deep love of Rust Belt history, mentoring younger coworkers while they pursue a part‑time
    library assistant position to share local stories.
  sports: A dedicated walker and birdwatcher, Ashley Mcleod spends evenings strolling the Mahoning River trail while cheering on the Youngstown State Penguins and the Cleveland Browns, and they join a local
    senior fitness club for low‑impact aerobics each spring, balancing gentle activity with a love for community sports camaraderie.
  arts: An avid supporter of local theater and classic literature, Ashley Mcleod attends weekly productions at the Youngstown Playhouse, delights in the works of author Geraldine Brooks and poet Mary Oliver,
    and they spend quiet nights quilting to folk melodies by Bob Dylan, letting artistic expression soothe their frequent anxieties.
  travel: A nostalgic traveler with a modest budget, Ashley Mcleod has explored nearby industrial cities like Detroit and Pittsburgh, dreams of a heritage tour of the Great Lakes shoreline, and they prefer
    meticulously planned road trips with stops at historic cemeteries and genealogy archives, balancing wanderlust with retirement constraints.
  culinary: An enthusiastic home cook with a flair for comfort food, Ashley Mcleod frequently prepares chicken pot pie, cornbread, and apple crisp for church potlucks, using fresh heirloom tomatoes from
    their garden and experimenting with homemade sourdough starter, though they sometimes over‑salt dishes when stressed.
  core: At 64, Ashley Mcleod is a history‑loving cashier turned community storyteller who balances meticulous organization with gentle curiosity, loves gardening, quilting, and local theater, and they wrestle
    with worry and occasional splurges on hobby supplies.
background:
  cultural: Ashley comes from a working‑class, white Midwestern family with Irish and German ancestry, typical of the Youngstown area. Raised in the Rust Belt during the decline of steel production, she
    internalized values of hard work, self‑reliance, and community solidarity. Her upbringing involved regular church attendance, neighborhood block parties, and participation in local cultural festivals
    that celebrated regional history and folk arts. These experiences fostered a deep respect for local traditions, a modest demeanor, and a strong sense of family loyalty. While she values practical, proven
    methods, her humanities education sparked a lifelong curiosity about cultural narratives and social change, which she now channels into community outreach and historical preservation.
attributes:
