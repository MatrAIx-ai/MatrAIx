  hobbies: '[''Visiting Museums and Galleries'', ''Sketching Contemporary Art'', ''Reading Afro‑Futurist Literature'', ''Listening to Jazz and Poetry Slams'', ''Cooking African‑Diaspora Cuisine'', ''Hiking
    in Rock Creek Park'', ''Mindfulness Meditation'', ''Volunteering at Youth Arts Programs'']'
  career_goals: Gloria aims to earn a Certified Quality Inspector (CQI) credential within the next two years and leverage that to move into a supervisory role overseeing a quality‑assurance team. She plans
    to enroll in an associate‑degree program in Industrial Technology or Quality Assurance to deepen her technical knowledge. Long‑term, she envisions becoming a Process Improvement Analyst who designs
    lean‑manufacturing initiatives and mentors women of color entering the manufacturing sector. She also hopes to contribute to community outreach by organizing STEM workshops for local youth.
