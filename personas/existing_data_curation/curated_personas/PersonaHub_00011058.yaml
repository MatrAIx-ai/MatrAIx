persona_description: A prevention services specialist who is passionate about creating positive school environments and cultures to eliminate barriers to success. They are skilled in developing systems
  of support for children and families, addressing the mental wellness of children and adults, and improving the academic success for all students. They collaborate with professionals from various departments
  to foster student success, and have experience in providing technical assistance, training, and coaching in Multi-tiered System and Supports, Positive Behavior Intervention and Support (PBIS), and developing
  system-wide frameworks for positive school climate. They are also skilled in improving student attendance through a multi-agency collaborative support model, and have direct services and guidance to districts
  for support to Placer's most at-risk populations.
