persona_description: A historian who is interested in the study of political and social history, particularly the Mexican Revolution. They are particularly interested in the life and times of Alvaro Obregón,
  the last caudillo in Mexico's revolutionary past. They are also interested in the role of leadership, the nature of revolution, and the complex forces that helped shape modern Mexico. They are looking
  for a comprehensive and analytical study of Obregón's life and times, as well as an overview of the social forces and political events that shaped Mexico during this critical time in its history. They
  are also interested in the historiography of the Latin American strongman or "caudillo" in considering Obregón the last of that lineage, to come to an end when institutions, political parties, enforceable
  laws, bureaucracy, "systems" and "networks" overwhelmed for better or worse the many vicissitudes of individual power.
