personas:
  professional: A dental and ocular prosthetics laboratory technician, Angelia Haygood blends meticulous manual craftsmanship with cutting‑edge CAD/CAM and 3‑D printing technologies, channeling their curiosity
    for new methods into practical workflow improvements while consistently delivering precise, patient‑focused results.
  sports: An avid outdoors enthusiast, Angelia Haygood regularly hikes the James River Trail, participates in a neighborhood walking club, and pitches in a local co‑ed softball league, cheering on the Richmond
    Flying Squirrels and the Washington Capitals on game nights.
  arts: A creative community member, Angelia Haygood sings in their church choir, devours contemporary novels like Haruki Murakami’s "Kafka on the Shore" and Maggie O'Farrell’s "Hamnet", and spends evenings
    quilting, woodworking, and 3‑D printing bespoke accessories inspired by vintage design.
  travel: A balanced explorer, Angelia Haygood plans weekend escapes to Shenandoah National Park and Asheville’s Blue Ridge Mountains, enjoys spontaneous trips to New Orleans for its music and food, and
    dreams of a cultural immersion tour of Morocco, all while keeping travel costs within a modest budget and coordinating trips around family obligations.
  culinary: A soulful home chef, Angelia Haygood perfects classic dishes such as fried catfish, collard greens simmered with smoked turkey, and sweet cornbread, while experimenting with spice blends like
    smoked paprika and cayenne, and occasionally attempts modern twists by 3‑D printing garnish molds for plating.
  core: A technically savvy, community‑driven craftsman, Angelia Haygood merges high‑precision lab work with a love for gardening, choir, and DIY projects, always balancing curiosity and practicality while
    juggling a busy schedule and a penchant for occasional impulse buys.
background:
  cultural: Angelia's cultural background is rooted in her African-American heritage and the deep Southern traditions of Virginia's Black community. Raised in a close-knit extended family, she grew up attending
    a historically Black Baptist church where gospel music, lively worship, and community service were central. Family gatherings often featured soul-food cooking, storytelling, and the preservation of
    Southern culinary customs passed down through generations. The legacy of the Great Migration and local civil-rights activism informs her sense of social responsibility and pride in Black history. Living
    in New Canton, she participates in county-wide Juneteenth celebrations, honors the contributions of Black artisans and healers, and supports local initiatives that preserve African-American cultural
    sites. This rich cultural tapestry shapes her values of resilience, communal support, and a commitment to uplifting the next generation of Black professionals.
attributes:
  skills: '[''Prosthetic dental appliance fabrication'', ''Crown and bridge design and construction'', ''Complete denture creation'', ''Orthodontic appliance manufacturing'', ''Digital impression scanning
    and processing'', ''CAD/CAM prosthetic design (3Shape, Exocad)'', ''Ocular prosthesis customization'', ''Lens grading and fitting'', ''Eyeglass frame adjustment and repair'', ''Materials science (ceramics,
    acrylics, metal alloys, high-index lenses)'', ''Quality control and inspection'', ''Infection control and OSHA compliance'', ''Technical troubleshooting of lab equipment (milling machines, 3-D printers)'',
    ''Interpreting dental and ophthalmic prescriptions'', ''Customer service and patient communication'', ''Process improvement and workflow optimization'', ''Team collaboration and training of new staff'']'
  hobbies: '[''Singing in church choir'', ''Cooking soul-food recipes'', ''Vegetable gardening'', ''Hiking local trails'', ''Participating in neighborhood walking club'', ''Volunteering at health fairs
    and church outreach events'', ''Reading contemporary fiction and non-fiction by Black authors'', ''DIY crafting (quilting, woodworking)'', ''Hobbyist 3-D printing'', ''Playing in a co-ed softball league'',
    ''Attending African-American cultural festivals'']'
  career_goals: Angelia aims to earn her Certified Dental Technician (CDT) and Certified Ocularist credentials within the next two years, positioning herself for a supervisory or lab-manager role. She envisions
    integrating advanced digital workflows, such as 3-D printing and intra-oral scanning, to increase efficiency and expand the range of custom prostheses offered at her facility. In the longer term, she
    aspires to open her own community-focused dental and ophthalmic lab that provides affordable, high-quality appliances to low-income families in Buckingham County. Angelia also seeks to mentor aspiring
    Black women in technical health professions, serve on professional committees within the American Dental Association and the National Association of Ocularists, and lead community health-fair workshops
    that promote oral and visual health education.
