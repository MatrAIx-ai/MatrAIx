  career_goals: Steven aims to become a senior technical leader within the aerospace industry, focusing on the development of next‑generation, low‑emission propulsion technologies for both commercial and
    defense platforms. Over the next five years he plans to earn his Professional Engineer (PE) license, lead a multidisciplinary design team, and secure a role that oversees large‑scale systems integration
    projects for reusable launch vehicles. He also hopes to mentor junior engineers and contribute to the company's strategic roadmap for sustainable aerospace solutions, ultimately positioning himself
    for a future director‑level position in engineering management.
