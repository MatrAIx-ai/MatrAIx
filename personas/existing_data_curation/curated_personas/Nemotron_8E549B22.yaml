personas:
  professional: Steven Ashraf, a 29‑year‑old aerospace engineer specializing in mechanical design, fluid dynamics, and propulsion, they leverage their methodical, routine‑driven mindset and meticulous documentation
    habits to lead cross‑functional teams delivering low‑emission propulsion projects on tight schedules.
  sports: Steven Ashraf regularly runs the Virginia Beach boardwalk with the Bay Area Running Club, they cheer for the Washington Capitals and Nationals, and they participate in an amateur sailing league
    that doubles as a fitness regimen.
  arts: Steven Ashraf immerses himself in classic literature, often revisiting Tolstoy while listening to Beethoven's Ninth Symphony, they attend occasional performances at the Kennedy Center, and they
    collect vintage aerospace posters that line his workshop.
  travel: Steven Ashraf prefers meticulously planned trips that blend historic tours of places like Colonial Williamsburg and the Smithsonian Air & Space Museum with short sailing excursions in the Caribbean,
    they balance a limited vacation budget with a desire for both cultural depth and nautical adventure.
  culinary: Steven Ashraf enjoys cooking precise, repeatable meals such as perfectly seared Maryland blue crab with Old Bay and a side of roasted asparagus, they follow detailed recipes like a lab protocol,
    and they treat their Saturday wood‑fired pizza nights as a controlled experiment in flavor.
  core: Steven Ashraf is a disciplined aerospace engineer who channels his love of routine into sailing, rocket building, and a data‑driven life, they even indulge in occasional coffee overindulgence and
    demonstrate a stubborn reluctance to deviate from the plan.
background:
  cultural: Steven grew up in a middle‑class suburban community near Norfolk, Virginia, in a family that valued practical skills, reliability, and service. His upbringing was shaped by the region’s strong
    connection to the military and maritime industries, fostering a respect for discipline, routine, and teamwork. He identifies with mainstream American cultural norms, celebrating holidays such as Independence
    Day with community barbecues, and he participates in local STEM outreach programs that encourage young students to explore science and engineering. His married life reflects a partnership built on shared
    values of stability, mutual support, and a balanced social life that respects both togetherness and personal downtime.
