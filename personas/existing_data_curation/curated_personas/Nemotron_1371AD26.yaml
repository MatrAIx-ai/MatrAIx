  career_goals: Hannah plans to obtain her GED this year and enroll in a community‑college program in office administration or health information management to earn a professional certificate. In the short
    term she aims to secure a part‑time administrative assistant role at a local nonprofit or small business where she can apply her organizational strengths. Her medium‑term goal is to become an office
    manager, overseeing daily operations and supporting staff. Ultimately, she hopes to combine her administrative expertise with entrepreneurial ambition by opening a boutique that curates vintage apparel,
    allowing her to blend structured management with creative retail.
