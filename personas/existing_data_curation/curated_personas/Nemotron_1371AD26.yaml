personas:
  professional: Hannah Stalcup, a 19‑year‑old aspiring administrative assistant, combines razor‑sharp scheduling skills with a pragmatic, detail‑oriented mindset, using bullet‑journal systems and Microsoft
    Office to keep nonprofit operations running smoothly while assertively handling unexpected staffing hiccups.
  sports: Hannah Stalcup, an avid weekend hiker on the Blackstone River Bikeway, follows the Boston Red Sox and New England Patriots, participates in a local volunteer trail‑maintenance crew, and occasionally
    joins a co‑ed rec soccer league in Providence, balancing structured fitness with low‑key outdoor recreation.
  arts: Hannah Stalcup, a budding photographer of everyday moments, finds inspiration in the street work of Henri Cartier‑Bresson, playlists featuring Tame Impala and Phoebe Bridges for board‑game nights,
    and enjoys occasional DIY home‑organization projects inspired by the minimalist aesthetic of IKEA catalogs.
  travel: Hannah Stalcup, a meticulous planner, prefers budget‑friendly weekend getaways to nearby Newport, Boston, and the White Mountains, books trips months in advance using spreadsheet itineraries,
    and dreams of exploring the historic streets of Prague while keeping travel costs under $1,200 per year.
  culinary: Hannah Stalcup, a simple‑recipe cook, regularly whips up budget dishes like black‑bean tacos, quinoa‑vegetable stir‑fry, and one‑pot pasta arrabbiata, enjoys experimenting with pantry staples
    such as canned tomatoes, brown rice, and sweet potatoes, and pairs meals with a strong cold‑brew coffee they brew at home.
  core: Hannah Stalcup blends relentless organization with a love for low‑key creativity, managing a bullet‑journal‑driven life while secretly hoarding vintage clothing finds for a future boutique.
background:
  cultural: Hannah’s cultural background reflects a typical New England upbringing in a predominantly white, middle‑class community in Providence, Rhode Island. She grew up celebrating regional traditions
    such as Thanksgiving turkey roasts, Fourth of July fireworks over the Providence River, and summer trips to the Rhode Island shoreline. Her family maintains a blend of Anglo‑American and Irish heritage,
    evident in occasional gatherings featuring Irish music and storytelling. Living in Providence has exposed her to the city’s vibrant arts scene, historic architecture, and close‑knit community values
    that emphasize self‑reliance, education, and civic participation.
