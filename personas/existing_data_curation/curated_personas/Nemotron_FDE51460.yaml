personas:
  professional: A seasoned plant‑level manager, Hooshang Robison leverages strategic planning, budgeting, and performance analytics with Excel, PowerBI, and SQL while channeling their sociable, talkative
    nature into dynamic team briefings and mentorship, and balances disciplined SOP creation with a competitive drive that pushes departmental KPIs beyond targets.
  sports: Hooshang Robison plays a weekly round of golf at Oakwood Country Club, competes in the Eastside Bowling League, pedals the scenic trails of Kensington Metropark with the local biking club, and
    passionately supports the Detroit Lions and Detroit Tigers, often wearing their colors at games, and they proudly display team scarves during the season.
  arts: Hooshang Robison immerses in the arts by listening to Einaudi’s piano suites, savoring Miles Davis’s trumpet improvisations, attending productions at the local Chicago Shakespeare Theater, reading
    Oliver Sacks’s books on the brain, and practicing the craft of storytelling in Toastmasters, which they view as performance art.
  travel: Hooshang Robison plans travel with spreadsheet precision, favoring well‑organized road trips to Michigan’s Upper Peninsula, weekend stays at Mackinac Island, and annual culinary pilgrimages to
    Tuscany, Italy, while occasionally squeezing a spontaneous bike‑tour of Ontario’s Niagara Parkway when family schedules permit, and they relish the blend of structure and spur‑of‑the‑moment adventure.
  culinary: Hooshang Robison, a competent home cook, delights in preparing homemade spaghetti carbonara with pancetta, Pecorino Romano, and fresh black pepper for family dinners, balances weekend barbecues
    featuring smoked ribs with locally sourced corn on the cob, and experiments with basil‑infused pesto and aged balsamic vinegar, though they sometimes over‑season out of nervous excitement.
  core: Hooshang Robison blends a disciplined, data‑driven operational mind with a gregarious, competitive spirit, all while wrestling with anxiety that fuels both meticulous planning and occasional over‑reactivity,
    and they constantly oscillate between confidence and self‑doubt.
background:
  cultural: Hooshang grew up in the Detroit suburbs of Michigan, raised in a middle‑class, white, Midwestern family with deep roots in the automotive manufacturing sector. His upbringing emphasized hard
    work, reliability, and community involvement, values that still shape his professional demeanor. He attended local public schools and later took courses at a community college, gaining a practical education
    that complemented his on‑the‑job learning. While culturally aligned with traditional Midwestern customs—pragmatism, modesty, and a straightforward communication style—he has also embraced the region’s
    growing cultural diversity through work and community events, which tempered his natural skepticism with a broader perspective. His marriage and long‑term residence in Madison Heights reflect a strong
    commitment to family and local community ties.
