  career_goals: Hooshang aims to move from a plant‑level manager to a regional director of operations within the next five years, overseeing multiple facilities across the Midwest. He is working toward
    an associate’s degree in Business Administration and plans to earn a Lean Six Sigma Green Belt to bolster his credentials. Long‑term, he envisions launching a boutique consulting firm that helps midsize
    manufacturers balance efficiency with employee well‑being, leveraging his experience in both operational excellence and emotional resilience coaching. He also hopes to mentor emerging managers, sharing
    his practical insights and coping strategies for high‑stress environments.
