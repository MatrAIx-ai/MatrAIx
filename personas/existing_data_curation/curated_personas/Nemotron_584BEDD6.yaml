  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Gardening'', ''Walking local trails'', ''Volunteering at community events'', ''Reading mystery novels'', ''Participating in book clubs'',
    ''Attending church gatherings'', ''Hosting family gatherings'']'
  career_goals: Maritza aims to transition from a senior administrative assistant role to an office manager position within the next two years, overseeing a small team and streamlining office procedures.
    She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise. Long‑term, she envisions leveraging her bilingual skills and administrative background to lead
    operations at a community‑based nonprofit serving the Puerto Rican diaspora in upstate New York. Additionally, she hopes to mentor younger administrative staff, sharing best practices for organization,
    communication, and career development.
