persona_description: A family nurse practitioner who specializes in the prevention and management of nosocomial infections. They have experience in informatics and have used nursing informatics to develop
  skills in data collection, health record synchronization, and genetic research. They are dedicated to educating patients and healthcare providers on the importance of hand washing and hygiene in preventing
  the spread of nosocomial infections. They have a passion for improving healthcare through evidence-based practice and are committed to using informatics to solve human problems.
