personas:
  professional: Briana Cerino is a seasoned food‑service supervisor who leverages two decades of fast‑paced kitchen leadership, meticulous inventory control, and a people‑centric communication style to
    keep peak‑hour service running like clockwork while mentoring staff toward higher performance.
  sports: Briana Cerino cheers on the Dallas Cowboys, follows the Houston Astros, and participates in a local co‑ed adult softball league, while maintaining fitness through yoga, weekend line‑dancing classes,
    and her backyard garden chores.
  arts: Briana Cerino finds creative release in karaoke nights where she belts out Garth Brooks and Dolly Parton, enjoys line‑dancing to classic country hits by Carrie Underwood and Luke Bryan, and fills
    leisure time with binge‑watching culinary shows hosted by Bobby Flay and watching classic films like "Steel Magnolias".
  travel: Briana Cerino prefers road‑trip adventures that blend food scouting and family bonding, having mapped out weekend getaways to Austin’s food trucks, New Orleans for Creole cuisine, and the Hill
    Country wineries, while planning trips around her children’s school calendar and budgeted savings.
  culinary: Briana Cerino experiments with Texas‑style brisket smoked over mesquite, pepper‑crusted smoked ribs, and Southern classics such as chicken‑fried steak and collard greens, showcasing a confident
    intermediate cooking skill set, often seasoning dishes with fresh herbs from her garden and sharing the meals at church potlucks.
  core: Briana Cerino balances a high‑energy social life and meticulous kitchen leadership with a penchant for spontaneous karaoke performances, a watchful eye on her health numbers, and a pragmatic, savings‑first
    mindset that fuels her dream of a Texas‑inspired catering boutique.
background:
  cultural: Briana grew up in a middle-class Texan family where hospitality and community were core values. Raised in the Dallas-Fort Worth metro area before moving to Sanger, she was immersed in Southern
    hospitality traditions, from family Sunday meals to church-centered service. Her white, Anglo-American heritage blends with the regional Texan culture, influencing her love for hearty, locally sourced
    food, appreciation for outdoor gatherings, and a strong sense of neighborly responsibility. These cultural roots reinforce her sociable, cooperative personality and her desire to create welcoming environments
    both at work and in her community.
attributes:
  skills: '[''Team Leadership'', ''Food Safety & Sanitation'', ''Inventory Management'', ''Scheduling & Staffing'', ''Cost Control & Budgeting'', ''Menu Planning'', ''Customer Service'', ''Conflict Resolution'',
    ''Training & Mentoring'', ''POS System Operation'', ''Health Code Compliance'', ''Quick Decision-Making Under Pressure'']'
  hobbies: '[''Home Cooking & Recipe Development'', ''Volunteer Work at Food Bank'', ''Karaoke'', ''Line Dancing'', ''Yoga'', ''Gardening'', ''Attending Community Festivals'', ''Reading Mystery Novels'']'
  career_goals: Briana aims to progress from her current supervisory role to a restaurant manager position within the next three years, and eventually open a boutique catering service that highlights Texas-inspired
    comfort food. She plans to complete a bachelor's degree in Hospitality Management and obtain ServSafe Manager and Certified Food Safety Manager certifications. Additionally, she hopes to develop leadership
    workshops for food-service staff to improve stress resilience and teamwork.
