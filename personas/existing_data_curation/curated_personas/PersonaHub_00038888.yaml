  and the totemic relationships they have with humans. They are also familiar with the myths and legends associated with animals, including those of Mesoamerica and Crete, and the role of animals in the
  mythology of these cultures. They have a passion for understanding the connections between humans and animals in their respective cultures and the role of animals in shaping human beliefs and practices.
