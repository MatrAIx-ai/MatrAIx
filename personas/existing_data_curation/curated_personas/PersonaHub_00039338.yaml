persona_description: A systems engineer who specializes in the design and analysis of digital circuits and systems, particularly in the high-precision domain where 14 or more bits of precision are needed.
  They are skilled in managing noise and timing margins, parasitic inductances and capacitances, and filtering power connections. They are experienced in designing digital systems that manage intermittent
  problems such as glitches, runt pulses, and metastability, and they are skilled in calculating more repeatably due to their high noise immunity. They are also knowledgeable in the high-precision domain
  and are skilled in designing analog circuits that can interface to digital circuits or systems driven from a different clock.
