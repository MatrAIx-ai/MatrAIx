  career_goals: David imagines a future as a community helper who protects and teaches others, such as a firefighter, a park ranger, or a farmer who cares for animals. He is fascinated by the idea of designing
    fun playground equipment, hinting at an aspiring engineer who blends creativity with practical problem‑solving. In the near term, his goal is to become a confident reader, a reliable friend in his classroom,
    and a trusted helper during family chores and school projects.
