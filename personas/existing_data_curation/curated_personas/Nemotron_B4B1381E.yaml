personas:
  professional: David Huang, a budding animal-care enthusiast, spends their afternoons pretending to be a veterinarian at the family's farm visits, using their curious yet practical mind to memorize animal
    names while delighting friends with gentle pretend check-ups.
  sports: David Huang, a member of the Wallace Little League Tigers baseball team and a regular fan of the Carolina Panthers, spends Saturday mornings tossing a ball in the backyard, cheering on the Panthers
    on TV, and joining neighborhood tag games after school, always eager to wear their favorite sun-visored cap.
  arts: David Huang, who adores listening to Dolly Parton's country hits, the church gospel choir's uplifting hymns, and the children's songs of The Wiggles, often sings along while coloring pictures of
    farm animals, and can recite the chorus of "You Are My Sunshine" with a grin.
  travel: David Huang, who delights in family road trips to the nearby Heritage Farm and the Outer Banks for sandcastle adventures, plans short weekend getaways with Mom using a colorful map covered in
    stickers, dreams of seeing Disney World in Florida and the Grand Canyon's vistas, prefers the comfort of familiar routes over long flights, yet their endless curiosity about maps and airplane windows
    fuels a growing desire for wider horizons.
  culinary: David Huang, who loves the taste of crispy fried chicken, buttery mac and cheese, sweet peach cobbler, and refreshing sweet tea, often helps Mom stir the biscuit dough, proudly adds extra cheese
    to their macaroni, and insists on sprinkling cinnamon on their pancakes.
  core: David Huang is a lively, curious five-year-old who balances their love of farm animals, bright piggy-bank savings, and country music with occasional forgetfulness about bedtime, making every day
    an energetic blend of play, learning, and community spirit.
background:
  cultural: David lives in Wallace, a small town in Duplin County, North Carolina, where Southern rural traditions shape daily life. His family participates in community gatherings such as church services,
    church potlucks, local harvest festivals, and seasonal barbecues. They celebrate the region's love of country and gospel music, attend school events featuring line dancing and craft fairs, and enjoy
    summertime visits to nearby farms where they learn about livestock and crop planting. Though his surname hints at a diverse ancestry, the family identifies as white and embraces the values of neighborly
    support, respect for nature, and a strong sense of community that are hallmarks of the local culture.
