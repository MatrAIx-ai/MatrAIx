  hobbies: '["Hosting dinner parties", "Book club participation", "Volunteering at the county food pantry", "Organizing community clean-up events", "Cooking and recipe experimentation", "Hiking in Wayne
    National Forest", "Fishing on the Ohio River", "Attending financial and technology seminars", "Practicing yoga", "Traveling to historic sites"]'
  career_goals: Melissa aims to transition into a certified financial planner role, pursuing the CFP designation and eventually leading a regional office as a senior financial advisor. She aspires to mentor
    junior sales agents, develop a community financial literacy program for Meigs County, and integrate sustainable investment options into her portfolio offerings. Leveraging her curiosity for emerging
    technologies, she plans to adopt digital advisory platforms to enhance client service and efficiency. Long-term, she hopes to combine her practical sales experience with advanced certifications to become
    a trusted financial leader in her region.
