  career_goals: He aspires to pursue a career that blends his love of technology with his desire to help others and protect the environment. In the long term, Hong Chieh hopes to become an environmental
    engineer or marine‑conservation technology specialist, designing affordable sensor systems and robotic tools to monitor and restore Hawaii’s coral reefs while also creating outreach programs that engage
    youth in scientific stewardship.
