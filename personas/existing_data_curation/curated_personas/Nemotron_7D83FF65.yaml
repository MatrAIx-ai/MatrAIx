personas:
  professional: Hong Li is an aspiring teen game developer who channels curiosity into building simple 2D platformers during after‑school coding club sessions, methodically planning each level's logic while
    weaving compassionate narratives that encourage cooperation among players, and they always test the games for accessibility.
  sports: Hong Li is a casual water‑sport enthusiast who snorkels the crystal‑clear reefs off Kailua’s shoreline, practices swimming with the Kailua Youth Swim Club, and avidly supports the Hawaii Rainbow
    Warriors basketball team while dreaming of joining the local junior surf league next summer, and they often log their training in a detailed spreadsheet.
  arts: Hong Li is an avid manga sketcher who idolizes the art of Eiichiro Oda and studios like Studio Ghibli, often spending evenings drawing original characters inspired by the sci‑fi novels of Isaac
    Asimov, while they also listen to the soundtracks of Hayao Miyazaki’s films to fuel their creative flow.
  travel: Hong Li prefers purpose‑driven travel, meticulously planning weekend trips that combine snorkeling at Molokini crater, exploring the historic sites of Pearl Harbor, and occasional family vacations
    to Japan’s Kyoto to experience authentic manga culture, balancing a modest budget with a yearning for immersive adventure, and they always keep a detailed travel journal.
  culinary: Hong Li enjoys the vibrant flavors of Hawaiian poke bowls, especially those featuring ahi tuna and avocado, and at home experiments with simple sushi rolls and mango sticky rice, though they
    often cheat on their kitchen ambitions by ordering pizza after marathon puzzle sessions.
  core: Hong Li is a methodical, introverted teen whose curiosity fuels coding and marine exploration, yet their tendency to worry leads to occasional over‑cautiousness and midnight puzzle binges, and they
    always double‑check their backpack before school.
background:
  cultural: Hong Chieh comes from a second‑generation East Asian family—his parents immigrated from Taiwan—living in Kailua, O‘ahu. He grew up in a bicultural environment that blends traditional Chinese
    values of education, respect for elders, and family cohesion with Hawaiian ‘ohana’ principles of community harmony and respect for nature. He celebrates Lunar New Year and Cheng‑Yuan Festival at home
    while also participating in local Hawaiian traditions such as Lei Day and beach clean‑up events, making him comfortable navigating both cultures.
