personas:
  professional: Shayna Bari, a 43‑year‑old farm manager and aspiring Certified Professional Agronomist, blends liberal‑arts insight with precision‑farming expertise to design structured, regenerative farm
    plans while leveraging their competitive edge and skeptical eye to negotiate contracts, secure grants, and mentor emerging women farmers on the Minnesota Farm Bureau board.
  sports: Shayna Bari hits the trails for cross‑country skiing with the Lakeville Nordic Club in winter, hikes the Boundary Waters in summer, fishes on Lake Pepin for trout and walleye, and cheers for the
    Minnesota Twins and Minnesota Wild while participating in a community softball league and a local kayaking club.
  arts: Shayna Bari curates historical exhibits at the Lakeville Historical Society, discusses Mary Oliver and Doris Kearns Goodwin in a book club, and finds inspiration in the folk songs of Bob Dylan and
    the landscape paintings of Grant Wood, often attending performances at the Guthrie Theater and regional folk festivals.
  travel: Shayna Bari prefers meticulously planned road trips that combine agritourism and nature, having explored Dutch precision‑farming hubs in Rotterdam, the vineyards of Napa Valley, and the rugged
    coast of Maine, while dreaming of an immersive stay in Japan’s rice terraces once the farm’s agritourism program stabilizes.
  culinary: Shayna Bari, an adept farm‑to‑table chef, transforms heirloom carrots, fresh trout, and heritage tomatoes into dishes like pan‑seared trout with dill‑butter sauce, roasted root‑vegetable medley,
    and fermented kimchi, while occasionally over‑salting to compensate for fatigue after long field days and proudly hosting farm‑to‑table dinner events for CSA members.
  core: Shayna Bari’s pragmatic optimism fuels a relentless drive to turn her family farm into a regenerative haven, even as they hoard spreadsheets, over‑cook quinoa, and skeptically challenge every new
    tech pitch.
background:
  cultural: Shayna identifies as a Midwestern American with family roots in German and Swedish immigrants who settled in Minnesota in the early 20th century. Growing up on a family farm near Lakeville,
    she internalized the region's values of hard work, self‑reliance, and community cooperation. Her liberal‑arts education broadened her perspective, fostering an appreciation for cultural diversity and
    historic preservation, which she expresses through her involvement in local heritage projects and community outreach.
attributes:
  skills: '[''Strategic farm planning'',''Crop rotation and soil health management'',''Livestock health monitoring'',''Precision agriculture technology (GPS, drones)'',''Financial budgeting and cost analysis'',''Regulatory
