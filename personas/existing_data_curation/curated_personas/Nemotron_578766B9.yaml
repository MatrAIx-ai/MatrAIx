    development'',''Sustainable and regenerative farming practices'',''Equipment maintenance and troubleshooting'']'
  hobbies: '[''Community event planning'',''Book club participation'',''Hiking and cross‑country skiing'',''Fishing'',''Farm‑to‑table cooking'',''Historical society volunteering'',''Gardening (herb and
    ornamental)'',''Participating in local 5K runs'',''Attending live music concerts (folk and bluegrass)'']'
  career_goals: She aims to transform her family farm into a model of regenerative agriculture and agritourism within the next five years, expanding direct‑to‑consumer sales through a CSA program and farm‑to‑table
    events. Shayna seeks to earn Certified Professional Agronomist designation and to serve on the board of the Minnesota Farm Bureau, where she can mentor emerging women farmers. Long‑term, she hopes to
    document the regional farming heritage through a published oral‑history series, preserving the stories of Midwestern agriculture for future generations.
