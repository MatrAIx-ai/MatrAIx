personas:
  professional: Rohan Doyle, a budding engineer, channels their love for LEGO construction and methodical instructions into early tinkering, applying an unusually disciplined and organized mindset for a
    six‑year‑old and constantly seeks to meet the high standards they set for themselves in every small project.
  sports: Rohan Doyle plays left wing for the South Side Soccer Stars, thriving on the regimented twice‑weekly practice schedule, idolizing Chicago Fire FC’s forward and mimicking their precise footwork,
    while also cheering for the Chicago Bulls during family game nights.
  arts: Rohan Doyle expresses creativity by drawing neat, line‑perfect pictures and arranging action figures, they enjoy listening to gospel choir recordings from church gatherings and upbeat child‑friendly
    hip‑hop tracks by artists like Lil Nas X, and they eagerly anticipate the annual community festival where local musicians perform.
  travel: Rohan Doyle dreams of visiting the Museum of Science and Industry in Chicago and the nearby Great Lakes shoreline, but their travel style is family‑oriented, preferring carefully planned day trips
    with a clear itinerary, while they hope someday to explore a space camp at the Kennedy Space Center.
  culinary: Rohan Doyle loves the comfort of chicken tenders and mac and cheese, delights in the sweet corn on the cob served at neighborhood block parties, and enjoys helping stir batter for pancakes on
    weekend mornings, though they can be picky, refusing green beans unless they’re cut into fun shapes.
  core: Rohan Doyle mixes disciplined LEGO mastery with a sweet‑tooth impulse, organized piggy‑bank savings, and a love for structured soccer, all while navigating mild allergies and a vivid imagination.
background:
  cultural: Rohan comes from an African‑American family living in Chicago’s vibrant South Side community. His family celebrates cultural traditions such as Juneteenth, storytelling evenings, church gatherings,
    and local festivals that blend music, food, and community spirit. He is exposed to a mix of contemporary Black culture, including gospel and hip‑hop music, as well as the rich history of Chicago’s neighborhoods.
    His parents emphasize the importance of education, discipline, and pride in his heritage, encouraging him to participate in community programs and to remember the achievements of Black pioneers in science
    and the arts.
attributes:
  skills: '[''Organizing toys and school supplies'', ''Sorting objects by attributes'', ''Reciting short poems'', ''Recognizing letters and reading sight words'', ''Following multi‑step instructions'',
