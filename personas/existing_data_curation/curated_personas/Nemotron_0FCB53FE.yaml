  hobbies: '[''LEGO building'', ''Reading picture books'', ''Playing structured board games'', ''Drawing and coloring'', ''Youth soccer'', ''Collecting and arranging action figures'']'
  career_goals: Rohan dreams of becoming an astronaut or engineer who builds things that follow precise plans. He imagines designing rockets or constructing tall buildings in a city like Chicago. He also
    wants to be a leader in his class, perhaps a class monitor, to set high standards for himself and his peers. He is motivated to excel in school, aiming for top grades in math and science, and eventually
    pursue a career that values organization, structure, and problem‑solving.
