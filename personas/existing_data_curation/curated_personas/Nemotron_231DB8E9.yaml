personas:
  professional: Carina Castellano is a seasoned registered nurse whose expertise in acute patient assessment, IV therapy, and wound care combines with a pragmatic curiosity for telehealth and point‑of‑care
    diagnostics, allowing them to thrive in high‑stress emergency settings while spontaneously adapting to schedule changes, competitively pursuing a charge‑nurse role, and designing a coastal health outreach
    program for elderly residents.
  sports: Carina Castellano fuels her active lifestyle by hiking the rugged coastal trails of Quebradillas with the local Quebradillas Outdoor Club, paddling the Atlantic in a weekend kayak group, cheering
    for the San Juan Capitals basketball team, and supplementing her routine with twice‑weekly yoga sessions.
  arts: Carina Castellano immerses herself in lively salsa nights where the beats of plena and bomba echo the music of Celia Cruz and Rubén Blades, unwinds with Agatha Christie mystery novels, and occasionally
    attends indie film screenings featuring performances by Jennifer Lawrence.
  travel: Carina Castellano prefers spontaneous short‑haul escapes, having trekked the hidden waterfalls of Culebra, explored the colonial charm of Old San Juan, and dreaming of a culinary pilgrimage to
    Barcelona, all while navigating the limited vacation time afforded by a demanding nursing schedule.
  culinary: Carina Castellano channels her creativity into preparing traditional mofongo with garlic‑shrimp sauce and alcapurrias stuffed with seasoned pork, while also experimenting with herb‑infused succulent
    potting mixes and savoring sweet guava pastries for dessert.
  core: Carina Castellano is a competitive, curiosity‑driven nurse who balances high‑pressure emergency care with spontaneous salsa dancing, rugged coastal hikes, and a vigilant yet anxiety‑prone approach
    to personal and professional growth.
background:
  cultural: Carina grew up in Quebradillas, a small coastal municipality that blends mountainous scenery with vibrant sea‑side life. Her family reflects the rich tapestry of Puerto Rican heritage, rooted
    in Spanish colonial, African, and Taíno influences. The concept of "familismo" shaped her upbringing, emphasizing close family ties, respect for elders, and collective responsibility. Catholic traditions
    and local festivals featuring bomba, plena, and fireworks are integral to her community life. These cultural values fostered her compassionate approach to nursing, inspiring her to give back through
    community health initiatives. Carina’s bilingual fluency and familiarity with island customs allow her to connect deeply with patients, while her pride in Puerto Rican resilience fuels her ambition
    to improve healthcare access across the island.
