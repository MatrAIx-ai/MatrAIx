  career_goals: Carina aims to earn her Bachelor of Science in Nursing within the next two years, positioning herself for an advanced practice role such as Nurse Practitioner or Clinical Nurse Specialist.
    She is driven to lead a unit as a charge nurse, championing patient safety initiatives and evidence‑based practice improvements in her hospital. Combining her competitive streak with a desire for community
    impact, she plans to develop a coastal‑area health outreach program that focuses on preventive care for elderly residents and disaster preparedness. Long‑term, Carina hopes to mentor younger nurses,
    publish articles on adaptable nursing workflows, and attain certification in emergency nursing to further bolster her expertise in fast‑paced clinical settings.
