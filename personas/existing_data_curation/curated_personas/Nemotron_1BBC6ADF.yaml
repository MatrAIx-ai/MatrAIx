personas:
  professional: Charles Myers, a budding robotics enthusiast, channels a practical and organized mindset into building autonomous line‑followers for the school robotics club, and they thrive on collaborative
    projects that let their sociable and compassionate nature shine.
  sports: Charles Myers, a dedicated midfielder for the Sandia Soccer Club, balances weekend matches with a love for cheering on New Mexico United in the USL, follows the Los Angeles Dodgers during baseball
    season, and they incorporate daily hikes in the Sandia Mountains into their fitness routine to stay agile and resilient.
  arts: Charles Myers, an avid guitarist who strums classic rock staples like Led Zeppelin's 'Stairway to Heaven' and contemporary pop hits by Dua Lipa, complements their music passion by collecting graphic
    novels such as 'Watchmen' and 'Saga', attending local art fairs, and they often draw creative inspiration from the vibrant street murals that line Albuquerque's downtown.
  travel: Charles Myers, a weekend adventurer, regularly plans day trips to Santa Fe's historic plaza and the nearby Jemez Springs hot springs, dreams of hiking the Grand Canyon and exploring Kyoto's temples,
    and they prefer budget‑friendly road trips that blend hiking with occasional family camping under the New Mexican night sky.
  culinary: Charles Myers enjoys the bold flavors of New Mexican cuisine, often ordering green chile cheeseburgers and sopapillas, can whip up a simple yet tasty chicken chile verde at home, delights in
    experimenting with homemade pizza toppings, and they savor classic soda floats for a nostalgic treat.
  core: Charles Myers blends a structured, sociable spirit with a love for robotics, soccer, guitar riffs, and community service, while they juggle teenage impulsivity and a habit of staying up late streaming
    strategy games.
background:
  cultural: Charles is raised in a white, middle‑class family that has lived in Albuquerque for several generations. His household blends traditional Anglo‑American customs—such as Thanksgiving and Fourth
    of July barbecues—with the Southwest’s regional flavor, including an appreciation for New Mexican cuisine (green chile, sopapillas) and occasional exposure to Spanish through school and community events.
    He feels a strong local identity, enjoys outdoor activities in the nearby mountains, and participates in community service that reflects the collaborative spirit of the city.
