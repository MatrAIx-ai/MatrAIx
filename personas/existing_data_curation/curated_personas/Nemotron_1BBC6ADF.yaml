  career_goals: Charles plans to graduate high school with strong grades and pursue a degree in emergency medical services or public health, aiming to become a paramedic who can help his community. He is
    also intrigued by civil engineering and hopes to study ways to improve local infrastructure, especially in underserved neighborhoods. In the short term, he intends to earn an EMT‑B certification through
    a youth program and volunteer with the local fire department.
