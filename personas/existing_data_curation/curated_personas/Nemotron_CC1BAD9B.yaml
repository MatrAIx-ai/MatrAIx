  hobbies: '[''watercolor painting'', ''reading about contemporary art'', ''experimental cooking'', ''crocheting'', ''herb container gardening'', ''listening to Mexican folk music'', ''attending small art
    workshops'']'
  career_goals: Although retired from formal employment, Ana aims to deepen her impact on the Shelbyville community by establishing a rotating exhibit of Mexican folk art at the local senior center and
    coordinating quarterly art‑appreciation sessions for small groups. She plans to record and preserve her family’s oral histories, eventually compiling them into a memoir that celebrates her Mexican heritage
    and the immigrant experience in Tennessee. Recognizing the value of formal education, she intends to pursue a GED to validate the knowledge she has acquired over a lifetime. Ana also aspires to mentor
    younger volunteers, sharing her organizational expertise and cultural insights, while maintaining her health to remain an active contributor for years to come.
