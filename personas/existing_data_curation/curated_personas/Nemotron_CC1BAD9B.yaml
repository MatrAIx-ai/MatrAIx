personas:
  professional: Ana Rivera, a retired community organizer turned senior‑center curatorial volunteer, leverages meticulous record‑keeping and bilingual translation abilities to design rotating folk‑art exhibits
    while channeling her competitive drive to meet high standards for every showcase.
  sports: Ana Rivera enjoys gentle morning walks with the Shelbyville Senior Walking Club, follows the Tennessee Titans’ games every Sunday, and occasionally attends Nashville Predators hockey matches,
    all while maintaining a disciplined weekly stretching routine to ease her arthritis.
  arts: Ana Rivera spends afternoons painting watercolors of rolling hills using bold, unconventional palettes, crocheting intricate shawls inspired by the motifs of Diego Rivera, and curating intimate
    folk‑art shows that feature the music of Lila Downs and the melodies of classic mariachi ensembles.
  travel: Ana Rivera prefers low‑key, culturally rich getaways, such as a spring day trip to the lavender fields of Provence, a weekend exploring the historic art galleries of Santa Fe, and a nostalgic
    pilgrimage to the mission towns of Texas, always planning each itinerary with a detailed spreadsheet to keep costs within her modest budget.
  culinary: Ana Rivera delights in merging traditional recipes like chipotle‑spiced carnitas and tamales filled with Southern sweet potatoes with fresh herbs from her garden—cilantro, oregano, and rosemary—while
    occasionally treating herself to a slice of jalapeño‑infused cornbread for brunch.
  core: Ana Rivera’s disciplined, curiosity‑driven soul balances a competitive streak for flawless community projects with a solitary love for watercolor experiments, meticulous receipt‑keeping, and an
    unending quest to preserve her family’s stories before the ink runs out.
background:
  cultural: Ana’s cultural identity is rooted in her Mexican heritage, passed down through stories, music, and cuisine from her parents and grandparents who immigrated to the United States. Growing up,
    Spanish was spoken at home, and celebrations such as Día de los Muertos and Las Posadas were integral to family life. After moving to Shelbyville, Tennessee, she blended Mexican traditions with Southern
    customs, creating a unique bicultural household that honors both Catholic and local community celebrations. Ana remains an active participant in the small Mexican‑American community in Franklin County,
    where she shares traditional recipes, preserves folk art, and fosters intergenerational connections, all while embracing the modest, close‑knit spirit of her town.
