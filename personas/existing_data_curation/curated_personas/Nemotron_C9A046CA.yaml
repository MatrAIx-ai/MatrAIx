  career_goals: Although retired, Cynthia’s primary ambition is to maintain her health and independence while contributing to her community. She hopes to continue volunteering at the Bay City senior center,
    offering her organizational experience to streamline program schedules and mentor newer volunteers. Cynthia also aims to preserve her family’s legacy by compiling a handwritten cookbook of traditional
    Midwestern recipes and creating a patchwork quilt that will be passed down to her grandchildren. Her long‑term goal is to ensure her financial affairs remain secure so she can support small charitable
    initiatives for aging residents in Bay County.
