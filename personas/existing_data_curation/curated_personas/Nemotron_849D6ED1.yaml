  hobbies: '[''Softball league'', ''Reading mentorship'', ''Book club facilitation'', ''Hiking'', ''Seasonal cooking'', ''Yoga'', ''Community theater participation'', ''Gardening'']'
  career_goals: Sandra aims to transition into a school leadership role, such as instructional coach or assistant principal, where she can shape district-wide teaching practices and champion inclusive education.
    She plans to pursue a Master's in Educational Leadership within the next two years, followed by a doctoral degree focusing on curriculum innovation. Her ambition includes establishing a community-based
    STEM enrichment program that partners local businesses and museums, and publishing articles on project-based learning in professional journals. Ultimately, she envisions becoming a mentor for educators
    across Frederick County, fostering a collaborative network that balances innovative pedagogy with proven instructional methods.
