personas:
  professional: Sandra Eberly, an experienced elementary and middle school curriculum specialist, blends meticulous lesson planning with flexible differentiated instruction, and they channel their sociable,
    assertive energy into leading collaborative teacher workshops while championing data‑driven, inclusive STEM literacy initiatives.
  sports: Sandra Eberly stays active through the Frederick County Co‑ed Softball League in spring, hikes the Catoctin Trail year‑round, practices yoga for resilience, and they cheer on the Baltimore Ravens
    in the fall and the Washington Nationals during summer, while also following the Washington Capitals on the ice.
  arts: Sandra Eberly regularly attends productions at the Maryland Ensemble Theater, revels in community theater workshops, and they are an avid fan of Lin‑Manuel Miranda’s musical scores, Brandi Carlile’s
    folk‑rock songs, and the jazz improvisations of Herbie Hancock.
  travel: Sandra Eberly prefers weekend road‑trip adventures to nearby Appalachian destinations like Shenandoah National Park, has trekked the Blue Ridge Parkway, enjoys culinary tours of Tuscany, and they
    dream of witnessing Kyoto’s cherry blossoms in spring while balancing budget constraints and family commitments.
  culinary: Sandra Eberly, an enthusiastic seasonal cook, perfects dishes such as pumpkin risotto, Maryland crab cakes seasoned with Old Bay, and spring asparagus tart, often sourcing heirloom tomatoes
    and fresh herbs from the local farmer’s market, while they experiment with fermentation projects like kimchi for fun.
  core: Sandra Eberly blends organized curiosity with sociable energy, steering education innovation while secretly hoarding an ever‑growing collection of scented candles that they light during late‑night
    lesson planning.
background:
  cultural: Sandra was raised in a middle‑class suburban family in Frederick, Maryland, with roots tracing back to German and Anglo‑American ancestors who settled in the region in the early 1900s. The Mid‑Atlantic
    cultural milieu, marked by an emphasis on public education, community involvement, and seasonal celebrations such as the Frederick Fall Festival, has shaped her values of civic responsibility and lifelong
    learning. She identifies with a culturally pluralistic American identity, balancing traditional family customs with the progressive, diverse environment of modern Frederick County.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''STEM integration'', ''Literacy instruction'', ''Educational technology integration'', ''Data-driven assessment'',
