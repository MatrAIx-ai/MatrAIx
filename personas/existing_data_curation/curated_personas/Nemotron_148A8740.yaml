  career_goals: Melody dreams of a future where she can share her imagination with others. She hopes to become a children’s author or illustrator, creating stories and artwork that spark curiosity and bring
    people together. She also envisions combining her love for storytelling and coding to become a digital content creator, making animated books or interactive games. Another ambition is to be a teacher
    who uses art, music, and playful experiments to help classmates learn, always fostering harmony and joy.
