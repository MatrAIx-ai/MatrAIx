persona_description: A microbiologist who specializes in the study of bacteria and their interactions with humans, particularly in the context of bank notes. He has conducted research on the contamination
  levels of bank notes from various Asian countries and has found that older notes are more likely to carry bacteria. He has also developed measures to prevent the spread of viruses through the handling
  of banknotes in Japan and has found that newer notes are less contaminated. He believes that consumers need to take precautions by improving personal hygiene or washing their money.
