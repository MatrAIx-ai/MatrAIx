    ''Project coordination and small team leadership'', ''Mentoring apprentices'', ''Low‑voltage data and communication cabling'']'
  hobbies: '[''Gardening (perennials and vegetable gardening)'', ''Hiking in local parks and nature trails'', ''DIY home improvement projects'', ''Reading (technical trade publications and mystery novels)'',
    ''Cooking family meals'', ''Volunteering (teaching basic electrical safety to youth)'', ''Exploring and configuring smart home devices'', ''Attending local farmers markets and community events'']'
  career_goals: Christy aims to achieve Master Electrician certification within the next two years and to leverage that credential to lead larger commercial projects and eventually launch her own contracting
    firm that specializes in sustainable energy retrofits and smart‑home solutions. She also aspires to become a certified trainer for apprenticeship programs, mentor the next generation of electricians,
    and serve in a union leadership role that advocates for workplace safety and continuing education.
