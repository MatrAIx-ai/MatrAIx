personas:
  professional: Christy Rush, a 47-year-old licensed journeyman electrician with over twenty years of residential and commercial experience, merges a meticulous grasp of the National Electrical Code with
    a curiosity for emerging sustainable technologies, and they channel this balance of practicality and innovation into leading smart-home retrofits, mentoring apprentices, and steering toward Master Electrician
    certification.
  sports: Christy Rush enjoys weekend hikes with the local Trailblazers Hiking Club, follows the regional Major League baseball team the River City Reds, and they also participate in a community softball
    league, balancing their love for outdoor fitness with a practical approach to staying active despite a demanding work calendar.
  arts: Christy Rush indulges in mystery novels from Agatha Christie and Tana French, attends live folk performances by artists like Gillian Welch, and they appreciate the impressionist works of Monet at
    local museum exhibits, letting these creative interludes shape their problem-solving mindset and provide a leisurely escape from technical schematics.
  travel: Christy Rush prefers road-trip adventures that blend nature and sustainability, having explored Yellowstone National Park, the vineyards of Napa Valley, and a recent eco-tour of Copenhagen, and
    they are planning a future family vacation to the historic gardens of Kyoto to meld their gardening passion with cultural immersion.
  culinary: Christy Rush enjoys cooking hearty meals such as rosemary-roasted carrots, grilled salmon with lemon-dill sauce, and a weekly quinoa-kale salad, often sourcing fresh produce from farmers markets
    and experimenting with seasonal herbs like basil and thyme, and they occasionally over-salt dishes when troubleshooting flavors.
  core: Christy Rush is a calm, resilient electrician-entrepreneur who balances curiosity for smart-home tech with practical craftsmanship, they channel their love for gardening and mystery novels into
    problem-solving, and they habitually keep a spare screwdriver in every bag for both work and life's unexpected twists.
background:
  cultural: Christy was raised in Livonia, Michigan, in a middle‑class white family with German and Polish ancestry. The Midwestern values of practicality, self‑reliance, and community service were emphasized
    throughout her upbringing, shaping her balanced approach to work and life. Family traditions such as celebrating Thanksgiving, Fourth of July barbecues, and preserving cultural recipes have reinforced
    a sense of continuity, while her community involvement—through local churches, schools, and neighborhood associations—reflects the region’s collaborative spirit. This cultural backdrop blends a respect
    for established practices with an openness to innovation, resonating with her professional and personal outlook.
attributes:
  skills: '[''Residential wiring and remodeling'', ''Commercial electrical systems'', ''Electrical code compliance (NEC)'', ''Troubleshooting and fault diagnosis'', ''Smart home automation'', ''Solar photovoltaic
