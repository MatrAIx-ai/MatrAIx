  hobbies: '[''Senior Baseball League'', ''Bridge Club'', ''Rotary Club Volunteering'', ''Church Outreach'', ''Gardening'', ''Classic Car Restoration'', ''Barbecue Cooking'', ''Texas History Museum Visits'',
