  career_goals: Alan dreams of a future where he can combine his love of science and art. He hopes to become a creative engineer or a video‑game designer who builds immersive worlds, or perhaps an astronaut
    who explores new frontiers. He is also fascinated by museum work and imagines one day curating exhibitions that inspire other kids. His short‑term ambition is to win his school’s science‑fair and to
    join the after‑school robotics club, building a foundation for his long‑term goal of working in a STEM‑related field that also values creativity.
