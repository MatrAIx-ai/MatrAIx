personas:
  professional: Alan Mitchell, a budding game designer at age ten, channels their curiosity and methodical planning into creating Scratch games that blend space myths with playful cartoon characters, often
    presenting their projects at the school tech fair.
  sports: Alan Mitchell stars as a forward for the Riverside Rovers youth soccer team, cheers on Manchester United and the United States women’s national team, and spends Saturday mornings sprinting drills
    at the community park while also joining the after‑school basketball club to stay versatile.
  arts: Alan Mitchell, a sketch‑enthusiast, fills their art club notebooks with cartoon panels inspired by the whimsical style of Dr. Seuss and the dynamic storytelling of Hayao Miyazaki, and spends evenings
    listening to the indie tunes of Tame Impala and the classic melodies of The Beatles while practicing the recorder.
  travel: Alan Mitchell dreams of visiting the Kennedy Space Center to stand beneath a real launch pad, enjoys trips to the local science museum in their hometown, and hopes to one day explore the historic
    streets of Rome to see ancient mythology murals, balancing their love of adventure with their parents’ budget‑friendly family road‑trip plans.
  culinary: Alan Mitchell loves baking chocolate‑chip cookies with a precise three‑minute timer, enjoys adding a pinch of cinnamon to oatmeal, experiments with peanut butter and jelly on whole‑wheat toast,
    yet they often sneak extra sprinkles into the batch when no one is watching.
  core: Alan Mitchell blends a curious imagination with methodical organization, turning playground energy into creative projects, disciplined savings, and a love for soccer, art, and cookies—all while
    navigating typical childhood quirks and occasional forgetfulness.
background:
  cultural: Alan is a White American raised in Berwyn, a diverse suburb of Chicago in Cook County. His family’s roots trace back to mid‑western European ancestors, with traditions that blend typical Midwestern
    values—such as community involvement, school pride, and celebration of holidays like Thanksgiving and Fourth of July—with exposure to the rich cultural offerings of the Chicago metropolitan area. Visits
    to nearby museums, the Art Institute of Chicago, and the Adler Planetarium have nurtured his appreciation for art and science. The multicultural environment of the region, combined with his family’s
    emphasis on education and community service, shapes Alan’s open‑minded outlook and his desire to contribute positively to society.
