    ''Listening to music while coloring'', ''Backyard treasure hunts'']'
  career_goals: Dennis dreams of a future where he can combine his love for art and the ocean, imagining himself as a marine illustrator who creates vibrant pictures of sea life for books and museums. He
    also expresses excitement about becoming an explorer who discovers hidden reefs and shares his findings through sketches and stories. Occasionally he mentions wanting to be an astronaut who paints the
    view of Earth from space, reflecting his open‑minded curiosity.
