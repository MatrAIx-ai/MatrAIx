    and mentorship'', ''Crisis management'']'
  hobbies: '[''Gardening (native Southern plants)'', ''Reading historical biographies and mystery novels'', ''Quilting and small quilting circle'', ''Bird‑watching walks'', ''Gentle yoga'', ''Volunteering
    with bereavement support group for seniors'']'
  career_goals: Looking ahead, Michelle aims to transition into a mentorship and consultancy role that allows her to shape the next generation of occupational therapists while maintaining a structured work
    schedule. She plans to create a community‑based outreach program for seniors in Mobile that offers home‑based therapy and adaptive‑technology workshops. Additionally, she hopes to contribute to state
    policy advocacy for expanded Medicaid coverage of occupational therapy services and to co‑author a handbook on evidence‑based adaptive equipment for older adults. By balancing these goals with self‑care
    practices, she seeks to preserve her high standards of achievement without compromising her emotional well‑being.
