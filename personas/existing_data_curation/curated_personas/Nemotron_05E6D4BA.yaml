personas:
  professional: Michelle Mikolaizyk, a seasoned occupational therapist with 35 years of experience, blends rigorous STEM-based assessment methods, adaptive equipment design, and meticulous documentation
    to lead interdisciplinary teams, while their love of structure and deep empathy drive them to mentor younger clinicians and champion evidence-based practice.
  sports: Michelle Mikolaizyk enjoys gentle fitness through weekly bird-watching hikes at the nearby nature preserve and a senior yoga class at the Mobile Community Center, while cheering on the New Orleans
    Saints in the fall and the Tampa Bay Rays during baseball season, and they hold a membership with the Mobile Senior Cyclists Club for occasional low-impact rides.
  arts: Michelle Mikolaizyk finds artistic fulfillment in quilting patterns inspired by the works of William Morris, devouring the mystery novels of Agatha Christie and the historical biographies of David
    McCullough, while they regularly attend performances by the Mobile Theatre Company featuring classics by Tennessee Williams and enjoy listening to folk-blues guitarist John Moore during quiet evenings.
  travel: Michelle Mikolaizyk plans their trips with a detailed itinerary, favoring leisurely road-trips to Southern gems such as Charleston, Savannah, and the Gulf Islands National Seashore, while dreaming
    of a guided tour of the historic gardens of Versailles and a quiet cabin retreat in the Scottish Highlands, always balancing travel costs with their modest retirement budget.
  culinary: Michelle Mikolaizyk delights in cooking wholesome Southern fare such as shrimp-and-grits with fresh okra and smoked sausage, a perfectly spiced jambalaya, and occasional peach cobbler, showcasing
    a competent but unpretentious kitchen style that leans on their garden's bounty of basil, lemons, and sweet potatoes for bright, home-grown flavor.
  core: Michelle Mikolaizyk is a meticulously organized therapist-turned-mentor whose love of structure fuels both professional excellence and soothing garden routines, yet their tendency to over-plan often
    fuels anxiety, leading them to double-check everything from therapy notes to grocery lists.
background:
  cultural: Michelle was born and raised in Mobile, Alabama, within a family that traces its roots to Polish‑Lithuanian immigrants who settled on the Gulf Coast in the early twentieth century. Growing up
    in the Deep South, she absorbed the region’s emphasis on community, hospitality, and church involvement, while her household preserved Eastern European traditions such as holiday pastries, folk music,
    and a strong work ethic centered on education. This blended heritage nurtures her appreciation for structured, disciplined pursuits and her warm, cooperative disposition. Her pursuit of a STEM‑related
    graduate degree reflects a family value placed on academic achievement and practical problem‑solving, which she continues to apply in her occupational therapy practice.
