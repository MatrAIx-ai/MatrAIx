personas:
  professional: Nancy Vittal is a senior nurse practitioner with three decades of acute and chronic care experience, and they blend health informatics expertise and telehealth savvy with traditional healing
    wisdom to mentor staff and design culturally resonant health programs across remote villages.
  sports: Nancy Vittal embraces seasonal outdoor activities, hiking the Palmer Twin Lakes trail in summer, joining the local sled dog club for weekly runs, and cheering on the University of Alaska Fairbanks
    Nanooks hockey team, and they maintain a relaxed fitness routine that favors group walks over regimented workouts.
  arts: Nancy Vittal expresses creativity through intricate beadwork and loom weaving, drawing inspiration from the storytelling songs of folk legend Odetta and the contemporary paintings of Alaska‑based
    artist Dale Gutzman, and they regularly attend community performances featuring local drummers and the theater group Arctic Circle Playwrights.
  travel: Nancy Vittal prefers purposeful journeys that combine cultural immersion and nature, having explored Denali National Park on a guided trek, visited the historic salmon hatchery in Kodiak, and
    they dream of a summer trip to the coastal villages of British Columbia to share health workshops and photograph sea otters.
  culinary: Nancy Vittal delights in preparing traditional salmon stew simmered with birch syrup, wild berries, and spruce tips, while also mastering a modern quinoa‑and‑root vegetable salad, and they skillfully
    balance fire‑cooked dishes with occasional indulgences like reheated frybread topped with reindeer sausage.
  core: Nancy Vittal blends nursing expertise, tribal traditions, and an upbeat, slightly disorganized spirit into a life devoted to community health, storytelling through craft, and spontaneous adventures,
    and they approach each day with a curious yet practical mindset.
background:
  cultural: Nancy is an Alaska Native who grew up in a close‑knit community near Palmer that values a deep connection to the land, seasonal subsistence practices, and collective responsibility. Her upbringing
    involved participation in traditional ceremonies, oral storytelling, and crafts such as beadwork and weaving, emphasizing respect for elders and harmony among community members. These cultural foundations
    shape her caring, cooperative nature and her commitment to promoting health and well‑being within her tribe and the broader Matanuska‑Susitna region.
attributes:
  skills: '[''Acute Care Nursing'', ''Chronic Disease Management'', ''Wound Care'', ''Emergency Response'', ''Telehealth Coordination'', ''Electronic Health Record Management'', ''Health Data Analytics'',
