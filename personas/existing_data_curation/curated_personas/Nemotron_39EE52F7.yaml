  hobbies: '[''Hiking in the Matanuska Glacier region'', ''Traditional beadwork and basket weaving'', ''Community potluck and storytelling gatherings'', ''Birdwatching and nature photography'', ''Dog sledding
    with local mushers'', ''Volunteering at the local health clinic or community center'', ''Participating in tribal cultural dances and festivals'', ''Gardening in the summer vegetable garden'', ''Reading
    historical novels'', ''Knitting and quilting circles'']'
  career_goals: Looking ahead, Nancy aims to transition into a senior advisory role within the regional tribal health organization, where she can shape policies that blend modern medical practice with Alaska
    Native healing traditions. She is passionate about expanding telehealth services to reach isolated villages, developing culturally tailored health education workshops, and mentoring the next generation
    of nurses. Ultimately, she hopes to leave a lasting impact on health equity for her community while maintaining a flexible schedule that allows her to stay engaged in community life.
