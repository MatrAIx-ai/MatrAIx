persona_description: A scholar with a deep understanding of International Relations, particularly the theories and concepts related to the sovereignty of independent territorial states. They are knowledgeable
  about the variance of states, the influence of non-state actors, the levels of analysis in International Relations, and the impact of technological change on international relations. They are also aware
  of China's increasingly central role in world politics and the impact of globalization on international relations. They are conversant with the General Agreement on Tariffs and Trade (GATT) and the World
  Trade Organisation (WTO), and have a keen interest in the current debate relating to globalization and national culture.
