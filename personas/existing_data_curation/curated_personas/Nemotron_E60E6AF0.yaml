  career_goals: George aims to blend his passion for visual storytelling with community involvement. He plans to attend a college with a strong visual arts or media production program, ultimately pursuing
    a career as a multimedia artist or documentary filmmaker focusing on environmental and cultural topics relevant to upstate New York. He hopes to deepen his technical expertise in digital media, expand
    his creative repertoire, and later lead community art projects or workshops that inspire youth participation. In the long run, he envisions opening a collaborative studio that serves as a creative hub
    for local artists, activists, and students.
