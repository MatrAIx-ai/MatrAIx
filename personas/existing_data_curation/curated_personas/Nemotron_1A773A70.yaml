  career_goals: Bruno aims to transform his charisma and love for community interaction into a career as a events coordinator or a social‑media influencer focused on Latino culture in West Texas. He plans
    to enroll in a hospitality‑management certificate program, eventually launching a small food‑truck business that blends traditional Mexican dishes with modern twists while providing a stage for local
    musicians and artists. By combining his practical curiosity with a flexible, people‑centric approach, he hopes to build a stable income that supports his creative passions and helps him manage his anxiety
    through purposeful work.
