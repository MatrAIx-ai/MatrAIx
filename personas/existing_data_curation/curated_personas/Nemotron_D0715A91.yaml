  hobbies: '[''Gardening'', ''Fly-fishing'', ''Golf'', ''Scale model train building'', ''Chess'', ''Reading historical non-fiction'', ''Reading business literature'', ''Volunteer STEM mentoring'', ''Community
    church activities'']'
  career_goals: Brian aims to leverage his extensive analytical experience to lead enterprise-wide transformation projects before transitioning into a senior advisory role. He seeks to mentor emerging analysts,
    obtain a Six Sigma Black Belt certification, and author a best-practice guide on data-driven decision making for public-sector organizations. Ultimately, he hopes to leave a legacy of sustainable operational
    efficiencies and a well-structured succession plan for his department, while maintaining a balanced work-life rhythm as he approaches retirement.
