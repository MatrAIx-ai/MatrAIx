personas:
  professional: David Cortes, a 39‑year‑old roofing specialist, excels at installing shingles, metal panels, and flat membranes while rigorously adhering to safety protocols, reading blueprints, and leading
    small crews, using their critical, skeptical eye and routine‑focused mindset to anticipate material issues and keep projects on schedule.
  sports: David Cortes is an avid Chicago Cubs fan who plays in a weekend recreational softball league with the Northbrook Softball Association and joins the Lake Shore Fishing Club for seasonal bass trips
    on Lake Michigan, combining low‑key social sport with routine physical activity to balance work intensity.
  arts: David Cortes finds solace in the timeless melodies of ranchera legends like Vicente Fernández, the lively brass of mariachi ensembles, and classic regional cinema, often attending community folk
    festivals where these artistic expressions keep their family traditions alive.
  travel: David Cortes prefers short, well‑planned road trips that blend adventure with familiarity, having driven to Austin’s live‑music scene, explored the Texas Hill Country vineyards, taken a weekend
    getaway to the coastal town of Galveston, and yearning to cruise the Pacific Coast Highway to experience the towering redwoods.
  culinary: David Cortes enjoys cooking cherished family recipes such as tacos al pastor with pineapple‑marinated pork and pozole simmered with hominy, chiles, and cilantro, yet often leaves the kitchen
    in a mess, allowing a stack of unwashed dishes to become a constant, slightly anxiety‑inducing reminder of unfinished tasks.
  core: David Cortes is a pragmatic roofer with a competitive edge, driven by routine and a skeptical mind, who calms anxious nerves through woodworking, gardening, and the steady rhythm of a Cubs game.
background:
  cultural: David is a Mexican‑American who grew up in a bilingual household in the Chicago suburbs. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Mexican Independence
    Day, and other cultural holidays with traditional foods and community gatherings. The cultural emphasis on hard work, family loyalty, and practical skill development shaped his choice of a roofing career
    and his routine‑focused lifestyle. While he primarily uses English at work, he remains fluent in Spanish, communicating with relatives and members of the local Mexican community.
attributes:
  skills: '[''Roof installation'', ''Roof repair'', ''Shingle replacement'', ''Metal roofing expertise'', ''Safety regulations compliance'', ''Blueprint interpretation'', ''Team coordination'', ''Tool and
    equipment maintenance'', ''Problem diagnosis and troubleshooting'']'
  hobbies: '[''Woodworking'', ''DIY home projects'', ''Gardening'', ''Listening to Mexican music'', ''Cooking traditional Mexican dishes'', ''Watching Chicago Cubs games'', ''Fishing at local lakes'', ''Attending
    Mexican community festivals'']'
  career_goals: David aims to transition from day‑to‑day roofing work to a supervisory role, eventually earning a contractor’s license so he can launch his own small roofing business. He wants a predictable
    schedule that reduces his anxiety and provides steady income, while also allowing him to showcase his practical expertise and competitive drive by delivering high‑quality, reliable service. Long‑term,
    he hopes to mentor younger workers, building a trusted team that values routine, safety, and professionalism.
