  hobbies: '[''Cooking traditional South Asian cuisine'',''Watching cricket'',''Truck maintenance and DIY repairs'',''Fishing'',''Hiking in Texas Hill Country'',''Attending mosque community events'',''Volunteer
    neighborhood clean‑up'']'
  career_goals: Shaukat aims to advance from a laborer to a foreman or site supervisor within the next five years, pursuing certifications such as NCCER and the OSHA 30‑hour training. He envisions eventually
    starting his own small residential remodeling business, leveraging his practical experience and community connections. He is motivated to provide stable, well‑built homes for families in the Rockwall
    area while ensuring a safe work environment for his crew.
