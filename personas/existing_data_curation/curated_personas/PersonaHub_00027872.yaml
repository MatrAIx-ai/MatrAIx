persona_description: A conservation biologist who specializes in the study of marine ecosystems, particularly those around Lake Victoria. They are currently conducting preliminary studies to identify threatened
  areas in the lake basin, and are expected to develop a digital map with help from the Regional Centre for Mapping of Resources for Development. The map will indicate fish breeding sites, wetlands, river
  mouths, endangered areas, cultural significance, and habitats of endangered birds and animals. The map will also form a basis to lobby for the formulation of appropriate laws to conserve and protect these
  endangered areas. The studies will end in February, and by the end of the year, the endangered areas would be gazetted as protected areas and appropriate legislation presented to the East African Legislative
  Assembly. The digital map will strengthen Kenya's case as it prepares to petition the secretariat of the Ramsar Convention to designate parts of the lake basin as endangered areas.
