personas:
  professional: Yosmani Hernandez, a seasoned janitorial professional in Clovis, blends meticulous restroom sanitation, floor care expertise, and an inquisitive embrace of green cleaning technologies while
    casually mentoring newcomers despite a penchant for spontaneous scheduling.
  sports: Yosmani Hernandez enjoys low‑impact fitness through morning walks on the Bosque del Apache Trail, follows New Mexico United soccer and the Aggies football teams on weekends, and belongs to a senior
    walking club that meets weekly, preferring gentle activity over competitive sports.
  arts: Yosmani Hernandez finds solace in the timeless boleros of Luis Miguel and the contemporary Latin pop of Bad Bunny while also cherishing classic Spanish cinema, often humming while crocheting blankets
    and occasionally attending local church choir rehearsals that celebrate traditional folk songs.
  travel: Yosmani Hernandez favors relaxed road trips to culturally rich destinations like Santa Fe, San Miguel de Allende, and the historic missions of Southern New Mexico, planning itineraries loosely
    around family gatherings and religious festivals while keeping a modest travel budget.
  culinary: Yosmani Hernandez excels at preparing empanadas, arroz con pollo, and chiles rellenos using fresh cilantro, cumin, and locally grown corn masa, mixing traditional recipes with experimental herb
    blends from her container garden, and delights in sharing hearty meals with neighbors after a day of cleaning.
  core: Yosmani Hernandez is a curious, environmentally mindful janitor who balances spontaneous generosity with occasional disorganization, turning everyday chores into quiet acts of stewardship.
background:
  cultural: Yosmani’s heritage is rooted in a Spanish‑American family that settled in New Mexico generations ago. Bilingual in English and Spanish, she weaves both languages into daily life, from the recipes
    she prepares to the conversations she shares with neighbors. Her upbringing emphasized strong family bonds, Catholic traditions, and community service, which manifest in her participation in local church
    events and neighborhood gatherings. She celebrates cultural holidays such as Día de los Muertos and traditional Spanish fiestas, preserving culinary customs like making empanadas and arroz con pollo.
    The blend of Hispanic pride and Southwestern resilience informs her work ethic, hospitality, and the warm, respectful manner she brings to her role as a janitorial professional in Clovis.
