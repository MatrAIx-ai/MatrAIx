persona_description: A historian who specializes in ancient Greek history, particularly the Wars of the Diadochi and the Eastern Wars. His research interests include the causes and consequences of these
  wars, the strategies and tactics employed by the various parties involved, and the impact of these conflicts on the political and social landscape of ancient Greece. He is particularly interested in the
  role of individual figures and their actions in shaping the course of these wars. He is also interested in the broader themes of power, politics, and war in ancient Greece.
