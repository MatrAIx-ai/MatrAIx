  hobbies: '[''Fishing'', ''Hunting'', ''Classic Truck Restoration'', ''Reading True‑Crime Novels'', ''Documentary Watching'', ''Small‑Group Community Club Participation'']'
  career_goals: Joshua seeks to transition from day‑to‑day truck driving to a supervisory role in fleet management within the next five years. He aims to obtain a certification in transportation logistics
    and complete a short‑term course in supply‑chain analytics to broaden his strategic perspective. Ultimately, he hopes to launch his own small trucking company that combines reliable freight services
    with a customer‑focused sales approach, allowing him to apply his curiosity for new technologies while maintaining the practical, safety‑first mindset that defines his work. Reducing his exposure to
    high‑stress routes and establishing a steadier schedule are also personal priorities to support his emotional well‑being.
