personas:
  professional: Rita Munday is an aspiring junior scientist who channels her curiosity about space and nature into meticulous Scratch Jr. projects, using her organized, methodical nature to keep detailed
    logs for the school science club and they reliably collaborate with peers on experiments.
  sports: Rita Munday plays midfield on the Clearfield Community Soccer Club’s U‑9 team, follows the Utah Royals FC in the National Women’s Soccer League for inspiration, and they join a fall youth hiking
    group that explores the Wasatch foothills, approaching fitness with a blend of team cooperation and personal resilience.
  arts: Rita Munday practices piano twice a week, favoring Mozart’s Piano Sonata No. 16, draws whimsical scenes inspired by Eric Carle’s collage style, enjoys watching animated films featuring voice actor
    Tom Hanks, and they let these artistic experiences shape a calm yet imaginative personal aesthetic.
  travel: Rita Munday favors family weekend trips to the Antelope Island State Park for bird‑watching, dreams of a school field trip to Yellowstone National Park’s geysers, and they keep a small notebook
    of travel ideas that include a future visit to the Kennedy Space Center, planning each adventure with a mix of careful list‑making and spontaneous curiosity.
  culinary: Rita Munday loves homemade chicken noodle soup, frequently assembles fruit parfaits with granola and berries for breakfast, helps her mom bake blueberry muffins, and they often end up with a
    flour‑covered kitchen floor from enthusiastic mixing.
  core: Rita Munday is a meticulous young explorer whose love of nature, space, and structured projects is balanced by a sweet tooth and occasional unfinished LEGO sets, and they are both reliably organized
    and delightfully curious.
background:
  cultural: Rita grows up in a white, middle-class family in Clearfield, Utah, where community values such as cooperation, self-reliance, and service are emphasized. The town's small-city atmosphere offers
    easy access to outdoor recreation, church-based youth programs, and school-centered activities. Family traditions include seasonal celebrations, weekend hikes in the Wasatch foothills, and participation
    in local events like the Davis County fair. These cultural influences foster her appreciation for nature, the importance of community involvement, and a balanced blend of independence and teamwork.
