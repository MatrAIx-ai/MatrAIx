  career_goals: Rita dreams of a future where she can combine her love of animals, science, and building things. She often talks about becoming a wildlife biologist or a veterinarian who helps protect local
    wildlife and cares for pets. She also imagines designing habitats or parks, so she sometimes says she might be an environmental engineer. Her ambition is to keep learning, stay organized, and use her
    knowledge to make a positive impact on her community and the natural world.
