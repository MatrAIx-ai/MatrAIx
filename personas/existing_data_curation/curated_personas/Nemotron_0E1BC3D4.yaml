personas:
  professional: Edward Webster is an aspiring multimedia storyteller who intertwines disciplined project planning with boundless curiosity, turning Arduino‑built robots and game‑development tutorials into
    narrative experiments for his digital comics.
  sports: Edward Webster channels their love for water into weekly kayaking sessions with the Harbor Youth Paddle Club, cheers for the local Coastal Mariners baseball team, and maintains overall fitness
    by joining the school's cross‑country running squad each fall.
  arts: Edward Webster immerses themselves in the world of graphic storytelling, drawing inspiration from creators like Bryan Lee O’Malley, Adrian Tomine, and the indie film ‘Moonlight’, while also curating
    a personal playlist featuring Tame Impala and Mitski during art workshops.
  travel: Edward Webster dreams of swapping their sketchbook for a passport, having already explored the nearby marine sanctuary and the historic streets of Charleston, while planning a future snorkeling
    adventure in the Great Barrier Reef and a cultural art tour of Kyoto.
  culinary: Edward Webster enjoys cooking simple yet vibrant meals such as sushi‑style poke bowls with fresh tuna, avocado, and sesame seeds, and occasionally whips up robot‑themed cupcakes topped with
    edible blue‑green frosting, reflecting a love for both seafood flavors and playful presentation.
  core: Edward Webster blends meticulous organization with a restless creative spark, juggling Arduino robotics, digital comics, and a penchant for late‑night snack raids on leftover sushi, all while never
    missing a community‑service shift at the marine center.
background:
  cultural: Edward was raised in a suburban family in Cape Coral, Florida, within a broadly American cultural context infused with the coastal lifestyle of the Gulf Coast. His upbringing reflects a mix
    of Midwestern values—hard work, politeness, and community orientation—combined with the region's love for outdoor recreation, boating, and marine conservation. He celebrates typical American holidays,
    participates in local festivals such as the Cape Coral Seafood Festival, and has been exposed to diverse influences through school and community programs, fostering an open‑minded yet grounded worldview.
attributes:
  skills: '[''Digital illustration'', ''Basic Python programming'', ''HTML/CSS web design'', ''Project organization'', ''Public speaking'', ''Research and analysis'', ''Critical thinking'', ''Team collaboration'']'
  hobbies: '[''Digital drawing and comics'', ''Beginner game development'', ''Arduino robotics projects'', ''Snorkeling and kayaking'', ''Reading graphic novels'', ''Attending art workshops'', ''Volunteering
    at marine conservation events'']'
  career_goals: Edward aims to combine his love for art and technology by pursuing a career in game design or interactive media. He envisions studying graphic design and computer science in college, eventually
    working as a creative director where he can shape immersive experiences. In the short term, he plans to develop a personal portfolio of artwork and simple video games, win a regional youth art competition,
    and take leadership roles in his school's art and robotics clubs. He also hopes to contribute to community projects that integrate environmental education with digital storytelling.
