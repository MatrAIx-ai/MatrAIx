personas:
  professional: Kareem Thornton is a veteran low‑country landscaper turned part‑time sustainability consultant, whose meticulous record‑keeping, precision pruning, and expertise in native‑plant irrigation
    guide churches, schools, and small businesses toward low‑maintenance gardens that honor historic Southern agrarian practices, and they bring a methodical, quiet confidence to every project.
  sports: Kareem Thornton is a devoted fan of the Carolina Panthers and the South Carolina Gamecocks, attends occasional local baseball games with the Charleston RiverDogs, and participates in the Charleston
    Senior Walking Club, preferring gentle cardio over high‑intensity sports, and they cherish the camaraderie of these low‑key gatherings.
  arts: Kareem Thornton finds artistic fulfillment in woodworking birdhouses, listening to folk and blues legends such as Bob Dylan, Muddy Waters, and B.B. King, and attending the annual Spoleto Festival,
    where they appreciate the blend of music, theater, and visual art that reflects the region’s cultural tapestry.
  travel: Kareem Thornton prefers low‑key, nature‑focused trips, having explored Savannah’s historic squares, Asheville’s Blue Ridge Parkway, and the historic gardens of Charleston, while dreaming of a
    quiet retreat in the Great Smoky Mountains and carefully planning each journey to avoid peak crowds, and they favor slow, reflective travel over rushed itineraries.
  culinary: Kareem Thornton enjoys cooking seasonal dishes like herb‑roasted chicken with lemon‑thyme glaze, shrimp and grits, and sweet potato pie, often incorporating home‑grown heirloom tomatoes, fresh
    basil, and rosemary into their meals, while their culinary skill ranges from modest home cooking to confident garden‑to‑table preparations, and they love sharing these dishes with close friends during
    quiet evenings.
  core: Kareem Thornton blends a lifelong dedication to low‑maintenance landscaping with a quiet, methodical spirit, channeling solitary hikes, meticulous budgeting, and a love for native flora into a legacy
    of sustainable gardens and humble, garden‑inspired meals, and they delight in the simple rhythm of planting and pruning.
background:
  cultural: Kareem James Thornton is a third‑generation African‑American from the rural outskirts of Elgin, South Carolina. His grandparents worked as sharecroppers in the post‑Reconstruction era, cultivating
    cotton and vegetables on small family plots. The family’s deep connection to the land was reinforced by the Black church’s emphasis on self‑sufficiency and communal gardening, traditions that Kareem
    carried into his own career. Growing up during the civil‑rights movement, he internalized a strong work ethic, resilience, and a reverence for Black Southern heritage, especially the Gullah‑influenced
    planting knowledge passed down through oral histories. Though now widowed, he remains active in the local African‑American community, attending church gatherings and contributing his expertise to neighborhood
    beautification projects, while honoring the cultural legacy of stewardship and quiet perseverance.
