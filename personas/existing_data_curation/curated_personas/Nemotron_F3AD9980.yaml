    apprentices'']'
  hobbies: '[''birdwatching'', ''native‑plant gardening'', ''reading horticulture and history journals'', ''woodworking (garden benches and birdhouses)'', ''genealogy research'', ''walking nature trails'',
    ''volunteering at community garden'']'
  career_goals: In the coming years, Kareem aims to transition from full‑time grounds‑keeping to a part‑time consulting role, helping local churches, schools, and small businesses create sustainable, low‑maintenance
    gardens that reflect the native flora of the Carolina Lowlands. He wishes to document and share traditional African‑American gardening practices of the South through workshops and a modest handbook.
    Additionally, he hopes to establish a small demonstration plot on his own property where he can trial drought‑resistant native species and mentor a handful of younger landscapers, ensuring his practical
    knowledge endures beyond his retirement.
