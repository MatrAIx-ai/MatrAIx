    use'']'
  hobbies: '[''Quilting'', ''Fabric painting'', ''Attending art exhibitions'', ''Listening to jazz and gospel music'', ''Community theater'', ''Karaoke'', ''Reading fashion history'', ''Morning walks'',
    ''Gardening'', ''Teaching sewing to youth'']'
  career_goals: Brenda aspires to advance her career within the textile manufacturing sector by becoming a shift supervisor and eventually a training coordinator, where she can shape the development of
    new operators. She aims to complete her degree in textile design or business management to gain formal credentials. In the long term, she dreams of launching her own boutique that blends contemporary
    fashion with traditional African-American quilting motifs, using her sewing expertise and artistic curiosity to create unique apparel. She also hopes to organize a community sewing guild in Fayetteville
    to mentor youth and promote cultural heritage through textile arts.
