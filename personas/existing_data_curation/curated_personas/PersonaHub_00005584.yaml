persona_description: An infectious disease doctor and survivor of the Ebola virus, who has dedicated their career to understanding the virus and its habits in humans. They have experienced the virus firsthand
  and are currently studying the persistence of the virus in bodily fluids, particularly the testis. They are interested in the biological mechanisms of the largest Ebola outbreak in history and are advocating
  for better public health practices to prevent the reintroduction of the virus.
