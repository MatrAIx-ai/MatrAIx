  career_goals: Nancy aspires to blend her love for art and science, dreaming of becoming a wildlife illustrator or an environmental designer who creates eco-friendly spaces. She also imagines exploring
    careers in space exploration as an astronaut or a museum curator who brings scientific discoveries to the public. Her short-term goal is to win her school's science fair and contribute artwork for the
    community mural project.
