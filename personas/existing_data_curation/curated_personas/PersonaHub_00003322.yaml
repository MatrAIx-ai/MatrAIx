persona_description: A student who is interested in project and construction management, has a background in mechanical engineering and has taken the course of Project Management. They are looking to deepen
  their knowledge in the field by attending the course of Project Management II and are interested in the topics covered in the course, such as assembly of mechanical components, surface treatment and thermal
  insulation, assembly of electrotechnical and electrical components, and the use of project management software tool MS Project. They are also interested in the business game component of the course and
  are willing to apply their knowledge and skills to plan and schedule a project built according to the theory and to the bibliographic material. They are interested in learning how to evaluate the main
  construction techniques of industrial plants from a project manager perspective and to assess the impact of decisions on the expected performances of a project.
