persona_description: A University of Georgia Extension agronomist who specializes in the study of tobacco cultivation and disease management. He has extensive experience in developing and implementing preventative
  measures against diseases such as tomato spotted wilt virus and has a deep understanding of the factors that influence the disease's occurrence. His research interests include the use of pesticides and
  other management techniques to control disease in tobacco crops. He has published several papers on the topic and has been recognized for his contributions to the field.
