persona_description: A licensed health care professional (LHP) who is knowledgeable in the medical model and functional neurology paradigm for treating post-concussion syndrome. They are familiar with the
  screening tools used by coaches and athletic trainers, as well as the symptoms and complications associated with concussions. They are aware of the new diagnosis of chronic traumatic encephalopathy (CTE)
  and the recent attention it has garnered. They are trained in hyperbaric oxygen therapy and antioxidants, but recognize that no universally accepted treatment for post-concussion syndrome exists. They
  are aware of the limitations of medical management and the importance of reprogramming the cerebellum and frontal lobes through functional neurologic treatments. They are optimistic about the potential
  for partial or full recovery through these treatments.
