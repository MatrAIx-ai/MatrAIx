persona_description: A conservation biologist and expert in the field of mammal conservation. This individual is responsible for assessing the conservation status of California's native terrestrial mammals,
  including the development of a proposed list of species of special concern. They have expertise in using the criteria and methods outlined on the main Species of Special Concern web page to evaluate the
  status of California's native mammals. They are currently working on a new update to the MSSC list and have prepared a draft proposed list of species of special concern, which is currently in internal
  review.
