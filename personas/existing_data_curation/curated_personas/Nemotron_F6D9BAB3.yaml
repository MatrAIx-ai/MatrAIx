personas:
  professional: Imelda Marcos, an 18‑year‑old budding visual‑communications enthusiast, leverages bilingual fluency, a keen photographic eye, and a knack for social‑media storytelling to craft culturally
    resonant content for Miami’s art scene, balancing meticulous project planning with spontaneous creative experiments that they execute with confidence.
  sports: Imelda Marcos, an avid skateboarder who frequents the Wynwood skate park, also follows the Miami Heat, participates in local salsa‑dance fitness classes, and they merge urban skate culture with
    the rhythmic cardio of dance.
  arts: Imelda Marcos, a passionate photographer and digital illustrator inspired by vibrant street murals, regularly sketches Caribbean‑inspired motifs while listening to the sounds of 'Celia Cruz' and
    'Bad Bunny', and they curate mini‑exhibitions at their high school featuring emerging teen artists.
  travel: Imelda Marcos, who plans trips with an eye for artistic immersion, has explored the Wynwood Arts District, taken weekend road trips to Key West’s historic galleries, and they balance budget constraints
    with a desire for cross‑cultural inspiration, dreaming of attending Art Basel in Basel, Switzerland.
  culinary: Imelda Marcos, a home‑cook who delights in preparing 'arroz con pollo', plantain fritters, and mango‑salsa‑topped grilled fish, they enjoy experimenting with achiote seasoning and coconut milk
    in soups, yet often forget to prep balanced side dishes due to a bustling creative schedule.
  core: Imelda Marcos, an endlessly curious 18‑year‑old, blends organized project management with spontaneous skateboarding and artistic exploration, and they compete fiercely in school debates while maintaining
    a laid‑back vibe that sometimes leads to impulsive splurges on art supplies.
background:
  cultural: Imelda was born and raised in Miami's Little Havana neighborhood to Cuban immigrant parents who arrived in the United States during the 1990s. Her household blends Cuban traditions—such as Sunday
    family meals featuring arroz con pollo, listening to classic son and bolero, and celebrating Carnaval Miami—with the broader multicultural fabric of South Florida. As a bilingual child, she navigated
    both Spanish‑speaking community events and English‑language school activities, fostering a strong bicultural identity. Family visits to Cuba during her early years deepened her connection to the island's
    heritage, while her daily life in Miami exposed her to a diverse array of artistic influences, from Latin street art to contemporary American design. This dual exposure informs her appreciation for
    cultural hybridity and fuels her desire to represent and celebrate her community through creative work.
