  hobbies: '[''Street‑art exploration and photography'', ''Salsa dancing'', ''Digital illustration'', ''Skateboarding'', ''Cooking Cuban cuisine'', ''Reading contemporary fiction'', ''Volunteering at community
    art workshops'', ''Playing guitar'', ''Blogging about art and culture'', ''Attending live music performances'']'
  career_goals: Imelda aims to earn a bachelor's degree in Visual Communications, Journalism, or Media Studies at a university that values multicultural perspectives. She aspires to become a cultural content
    strategist or journalist who highlights Cuban‑American and broader Caribbean artistic voices in mainstream media. In the short term, she plans to intern with a local magazine or digital platform that
    covers Miami's vibrant arts scene. Long‑term, she envisions launching her own online hub that showcases emerging young artists, curates virtual exhibitions, and fosters cross‑cultural dialogue, positioning
    herself as a bridge between her community's heritage and contemporary creative expression.
