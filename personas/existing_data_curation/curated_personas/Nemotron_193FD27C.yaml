  hobbies: '[''Watercolor and mixed-media painting'', ''Reading modernist poetry and Caribbean literature'', ''Writing poetry and journal entries'', ''Listening to salsa, bomba, plena, and jazz'', ''Playing
    acoustic guitar'', ''Cooking Puerto Rican cuisine (e.g., mofongo, pasteles)'', ''Gardening native plants'', ''Birdwatching at local parks'', ''Photography of everyday scenes'', ''Volunteering at senior
    center art programs'', ''Participating in local cultural festivals'', ''Genealogy research'']'
  career_goals: In retirement Hector aims to channel his lifelong curiosity into creative projects that celebrate his heritage and inspire others. He plans to complete a memoir that weaves personal memories
    with reflections on Puerto Rican culture, and to publish a collection of poems centered on themes of memory, migration, and nature. He hopes to curate a traveling mini-exhibition of Puerto Rican visual
    art that can tour community centers and libraries across Georgia. Hector also intends to volunteer as a Spanish-language art instructor at the local community center, learn digital illustration tools
    such as Procreate, and mentor senior-citizen art groups. A personal ambition is to revisit Puerto Rico with his wife, document family stories, and integrate those narratives into his artistic practice.
