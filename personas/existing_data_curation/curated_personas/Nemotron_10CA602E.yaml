  hobbies: '["Visiting art galleries", "Watercolor painting", "Gardening (native plants, orchids)", "Birdwatching", "Scenic coastal drives", "Reading art history", "Volunteer art workshops for seniors",
    "Attending poetry readings", "Exploring local murals"]'
  career_goals: In the coming years, Constance aims to transition from full‑time driving to a part‑time mentorship and consulting role, guiding younger drivers and small business owners in effective logistics
    and customer relations. She aspires to share her love of the arts by curating a modest community art showcase for senior residents and leading small‑group tours of local galleries and mural sites in
    Boca Raton. Ultimately, she seeks a balanced retirement that combines occasional supervisory driving assignments, volunteer art education, and leisurely travel along Florida’s scenic coastal routes,
    all while maintaining the harmony and supportive connections she values deeply.
