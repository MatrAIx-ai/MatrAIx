personas:
  professional: Steve Martin, a budding tech enthusiast, merges his curiosity for Minecraft world-building with hands-on Arduino projects, applying practical problem-solving and organized planning while
    still balancing school responsibilities.
  sports: Steve Martin enjoys shooting hoops at the local park with friends, follows the University of New Mexico Lobos men's basketball and the Albuquerque Isotopes baseball team, and participates in the
    Sun Valley youth basketball league during winter, balancing competitive drive with a love for outdoor hikes in the Sandia Mountains.
  arts: Steve Martin channels his love for indie and classic rock—listening to Arctic Monkeys, The Strokes, The Rolling Stones, and Led Zeppelin—into sketching comic-style panels and devouring sci-fi novels
    by Isaac Asimov and Leigh Bardugo, while occasionally visiting the Albuquerque Museum’s exhibitions for inspiration.
  travel: Steve Martin prefers spontaneous weekend road trips to New Mexico gems like Carlsbad Caverns and the Santa Fe Plaza, while dreaming of a future family vacation to Tokyo’s Akihabara district to
    explore gaming culture, balancing careful budgeting with his adventurous spirit.
  culinary: Steve Martin, a budding home cook, loves whipping up green-chile cheeseburgers, skillet-cooked posole with hominy and cilantro, and simple cheese-filled empanadas, often experimenting with fresh
    Hatch chilies and corn tortillas while still relying on instant noodles for late-night study sessions.
  core: Steve Martin, a curious yet anxiety-prone twelve-year-old, balances Minecraft world-building, Arduino tinkering, and a cautious saving habit with a habit of over-packing his backpack and worrying
    about upcoming school projects.
background:
  cultural: Steve grew up in a middle‑class family in Albuquerque, immersed in the blend of Southwestern culture that defines the region. While his household reflects typical white American customs, he
    regularly participates in community events such as the Albuquerque International Balloon Fiesta and embraces the outdoor lifestyle common to New Mexico, including hiking, camping, and regional cuisine
    like green chile dishes. His school environment is diverse, exposing him to Hispanic and Native American traditions, which broadens his perspective and fosters an appreciation for the area's multicultural
    heritage.
attributes:
  skills: '[''Basic programming (Scratch)'', ''LEGO model building'', ''Problem‑solving in math and science'', ''Organizing school projects'', ''Teamwork in basketball'', ''Basic electronics tinkering'',
