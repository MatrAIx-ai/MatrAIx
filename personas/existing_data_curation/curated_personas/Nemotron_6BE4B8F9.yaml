  hobbies: '[''Playing Minecraft'', ''Reading science‑fiction novels'', ''Basketball'', ''Hiking in the Sandia Mountains'', ''Building Arduino projects'', ''Listening to indie and classic rock music'',
    ''Sketching comic‑style drawings'']'
  career_goals: Steve dreams of combining his curiosity for how things work with a practical career path. He is fascinated by aerospace engineering, inspired by New Mexico’s strong aerospace presence, and
    hopes to design spacecraft components one day. At the same time, his desire for stability and a supportive community leads him to consider roles where he can mentor younger students or work on educational
    technology, ensuring he can help others while maintaining a reliable livelihood. His ambition also includes developing personal coping strategies for stress, such as learning mindfulness, to stay resilient
    in a demanding field.
