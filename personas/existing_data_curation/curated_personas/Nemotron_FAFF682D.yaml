  career_goals: Martha aims to deepen her technical expertise and move into a supervisory role within the facilities management field. Over the next five years she plans to obtain EPA certification for
    refrigerant handling and pursue an accredited certification in facilities management. She hopes to become a shift supervisor or lead technician, overseeing a small team and implementing more structured
    maintenance protocols to reduce workplace stress. Long‑term, she is interested in starting her own handyman business that offers reliable, low‑cost repair services to the Laurel community, while also
    completing a bachelor’s degree in facilities management to broaden her career options.
