personas:
  professional: Martha Woollard, a 32‑year‑old general maintenance technician in Howard County, blends their hands‑on expertise in HVAC, plumbing, and electrical systems with a pragmatic curiosity that
    drives them to experiment with efficiency‑boosting repair techniques while eyeing a supervisory role and future handyman business.
  sports: Martha Woollard avidly follows the Baltimore Ravens and the Washington Capitals, and they regularly hike the Patapsco Valley State Park with the Patapsco Valley Hiking Society while also playing
    Thursday evening pickleball matches with the Laurel Community Pickleball Club, preferring low‑impact group activities over intense solo workouts.
  arts: Martha Woollard enjoys the nostalgic world of vintage radio dramas like Orson Welles’ The War of the Worlds, indulges in science‑fiction novels by Octavia Butler, frequently visits the Charles Theatre
    for classic film screenings, and they curate a small collection of jigsaw puzzles featuring the works of Vincent van Gogh.
  travel: Martha Woollard’s travel style blends meticulous planning for weekend nature escapes—like sunrise hikes in Shenandoah National Park and kayaking on the Chesapeake Bay—with dream trips abroad to
    Iceland’s geothermal springs and Norway’s Northern Lights, all balanced against a modest budget and a desire for quiet, low‑key experiences, and they often map routes on paper rather than relying on
    digital apps.
  culinary: Martha Woollard, an experimental home cook, loves cultivating heirloom tomatoes and kale in their backyard garden and turning them into rustic ratatouille, grilled corn on the cob with smoked
    paprika, and fresh herb pesto, while also mastering the art of a perfectly seared salmon with a maple glaze, reflecting their hands‑on, trial‑and‑error kitchen approach.
  core: Martha Woollard is a practical tinkerer with a curiosity for efficient fixes, a habit of worrying over details, and a penchant for solitary puzzles and vintage radio, all while they nurture a modest
    garden and dream of a low‑cost handyman venture.
background:
  cultural: Martha is a white American raised in the suburban environment of Howard County, Maryland. She grew up in a working‑class family where both parents held blue‑collar jobs—her father in manufacturing
    and her mother in local government maintenance. The family emphasized hard work, self‑reliance, and modesty, values that continue to shape her outlook. She attended public schools and earned an associate
    degree from a community college, reflecting a practical approach to education. While her cultural identity is primarily Anglo‑American, living in a diverse county has exposed her to a variety of traditions
    and perspectives. She occasionally participates in her local Methodist church’s community service projects and values the close‑knit relationships within her neighborhood.
