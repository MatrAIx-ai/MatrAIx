personas:
  professional: Sonny Elie is a one‑year‑old budding architect in the world of stacking blocks, whose love for predictability and neat organization translates into meticulously aligned towers that reflect
    early problem‑solving skills and a practical mindset.
  sports: Sonny Elie delights in toddler‑friendly gym sessions at the local community center, where they practice crawling races and parent‑guided mini‑soccer dribbles, cheering on the hometown Dodgers
    while wearing a tiny cap.
  arts: Sonny Elie is fascinated by the colorful illustrations of Eric Carle and the gentle lullabies of singer Jewel, often humming A Whole New World while turning pages of picture books, letting these
    artistic moments shape their early sense of wonder.
  travel: Sonny Elie’s travel style is stroller‑centric, favoring family trips to nearby botanical gardens and the Disney Resort in Orlando, where predictable itineraries and familiar sensory experiences
    soothe their need for routine while offering fresh sights.
  culinary: Sonny Elie prefers soft‑textured foods like ripe avocado mash, steamed carrot ribbons, and mild apple sauce, proudly using a small plastic spoon to feed themselves and occasionally insisting
    on their favorite hummus dip, which satisfies both curiosity and comfort.
  core: Sonny Elie blends a toddler’s need for predictable routines with a surprisingly cooperative spirit, constantly arranging toys, saving coins, and embracing calm health check‑ups while delighting
    in gentle songs and steady snack times.
background:
  cultural: Sonny is an African‑American toddler raised in New York City’s vibrant, multicultural tapestry. His family celebrates Black cultural traditions such as listening to classic soul and jazz records,
    attending community block parties, and sharing stories of heritage during family gatherings. Growing up in a city neighborhood with access to public libraries, children’s museums, and community centers,
    he is exposed to a mix of urban rhythms and cultural celebrations that reinforce values of cooperation, respect, and community harmony. His caregivers emphasize consistent routines and a supportive
    environment, reflecting both cultural emphasis on family cohesion and the practical demands of city life.
