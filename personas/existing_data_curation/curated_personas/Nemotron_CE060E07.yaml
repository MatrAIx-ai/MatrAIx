  career_goals: Looking ahead, Sonny’s caring nature and love for predictable environments shape his budding ambition to work in a role that supports community well‑being. He dreams of becoming a teacher
    or childcare provider who creates structured, nurturing classrooms for young children, or a community organizer who builds safe, reliable spaces for families. His practical mindset drives him to seek
    careers that turn everyday challenges into orderly solutions, such as a youth program coordinator or a school counselor.
