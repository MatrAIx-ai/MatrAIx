    and supply management'', ''Basic horticulture knowledge'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Woodworking (furniture and outdoor projects)'', ''Model train building and layout design'', ''Guided meditation and journaling'', ''Fishing on Lake
    Wateree'', ''Birdwatching on local nature trails'', ''Listening to classic country and Southern rock music'', ''Volunteer community clean‑up events'', ''Attending local church fellowship'']'
  career_goals: Jacob aims to move into a supervisory role within the Chester County Parks and Recreation department, where he can lead a grounds‑keeping team and apply his methodical planning skills to
    larger municipal projects. He plans to earn the Certified Professional Horticulturist (CPH) and Certified Arborist credentials over the next two years to deepen his expertise. In the longer term, Jacob
    hopes to launch a small, environmentally‑focused landscaping business that offers native‑plant installations and water‑conservation services, providing him with stable income and the flexibility to
    balance work with personal well‑being. Achieving these goals will also give him greater financial security after his divorce and reduce his anxiety about the future.
