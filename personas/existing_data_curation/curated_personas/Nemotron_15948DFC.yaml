personas:
  professional: Jacob Gibson, a seasoned groundskeeper with a strong background in horticulture and business, leverages their methodical planning, meticulous project scheduling, and strict adherence to
    safety protocols to excel in managing municipal landscaping crews while quietly battling anxiety that drives them to over‑document every task.
  sports: Jacob Gibson enjoys quiet, low‑impact recreation such as early‑morning fishing trips on Lake Wateree and birdwatching along local nature trails, follows the Carolina Panthers and the Savannah
    Bananas for occasional community camaraderie, and they keep fit with weekend walks on park trails.
  arts: Jacob Gibson’s artistic outlet revolves around listening to classic country legends like Johnny Cash and Southern rock icons such as Lynyrd Skynyrd while crafting hand‑made furniture, reflecting
    a quiet appreciation for tradition and craftsmanship that they nurture during evenings on the model‑train layout.
  travel: Jacob Gibson prefers low‑stress, nature‑focused road trips, planning weekend escapes to Asheville’s Blue Ridge Parkway and Virginia’s Shenandoah National Park, while dreaming of a longer pilgrimage
    to the ancient gardens of Kyoto for horticultural inspiration, and they balance travel planning with their need for predictability.
  culinary: Jacob Gibson, an intermediate home cook, favors simple Southern fare like shrimp and grits, collard greens sautéed with smoked turkey, and fresh tomato‑basil bruschetta made with herbs from
    their garden, often sourcing local honey and heirloom tomatoes for added flavor.
  core: Jacob Gibson balances a meticulous, structure‑driven work ethic with a quiet anxiety that fuels both compulsive journaling and occasional over‑planning of even the smallest weekend outing, and they
    find solace in the predictable rhythm of their garden and workshop.
background:
  cultural: Jacob grew up in a working‑class white family in rural South Carolina, where a strong work ethic, self‑reliance, and community ties were central values. His upbringing was steeped in Southern
    hospitality, Christian church life, and a close connection to the outdoors, including family traditions of gardening, hunting, and fishing. Attending a local community college for horticulture and business
    courses reinforced his practical, hands‑on learning style. The regional culture’s emphasis on reliability, modesty, and respect for nature continues to shape his approach to work, his appreciation for
    native plants, and his participation in community activities.
attributes:
