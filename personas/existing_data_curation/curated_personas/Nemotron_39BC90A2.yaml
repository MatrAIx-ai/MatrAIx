  career_goals: Even in retirement, Debra seeks to deepen her engagement with the arts and community. She aims to complete a senior fellowship program at a local museum, develop a small intergenerational
    art project that pairs seniors with middle‑school students, and compile a memoir of her life’s experiences for her grandchildren. She also hopes to continue learning about contemporary art movements
    through online courses and maintain her independence by staying physically and mentally active.
