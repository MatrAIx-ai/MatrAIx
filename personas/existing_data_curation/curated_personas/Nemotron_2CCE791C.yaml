personas:
  professional: Jie Cheng, a 16‑year‑old aspiring concept artist and creative technologist, blends meticulous planning with boundless imagination to produce detailed character sketches, 3D models, and interactive
    story prototypes using Procreate, Blender, and Python, while leading school art clubs and coordinating community events, and they thrive on collaborative creation.
  sports: Jie Cheng plays in the San Jose Youth Basketball Association league on weekends, practices at the local park, idolizes the Golden State Warriors, and mixes cardio drills with strategy board‑game
    nights to stay both physically and mentally fit, and they relish the camaraderie of team sports.
  arts: Jie Cheng immerses themselves in the worlds of Hayao Miyazaki’s animated epics, Beeple’s daily digital art drops, and the synthwave soundtrack of Daft Punk, while regularly sketching at anime conventions
    and curating VR installations inspired by Refik Anadol, and they constantly seek fresh visual vocabularies to enrich their storytelling.
  travel: Jie Cheng plans trips around immersive art experiences, having visited the Anime Expo in Los Angeles and the teamLab Borderless exhibit in Tokyo, and dreams of a future backpacking adventure through
    Berlin’s contemporary galleries and the neon‑lit streets of Seoul, and they love mapping out itineraries that balance creativity and exploration.
  culinary: Jie Cheng enjoys mastering the art of hand‑rolled dumplings, sizzling mapo tofu, and fragrant scallion pancakes, often experimenting with Sichuan peppercorns and fermented black beans, while
    occasionally treating themselves to sushi rolls and bubble tea after long art sessions, and they take pride in sharing these dishes with friends during weekend gatherings.
  core: Jie Cheng fuses relentless imagination with a planner’s precision, spending midnight hours perfecting 3‑D character rigs while habitually losing sleep over limited‑edition figurine drops and a stubborn
    tendency to color‑code every notebook, and they never miss a deadline for a club event.
background:
  cultural: Jie grew up in a bilingual household with roots in East Asia; his parents are first‑generation immigrants who speak Mandarin at home while encouraging English fluency. The family celebrates
    Lunar New Year, Mid‑Autumn Festival, and other cultural traditions, and participates in community events at the local Asian cultural center. These experiences have shaped his appreciation for East‑Asian
    visual styles—from calligraphy to manga—which he blends with Western pop culture in his artwork. While his family values academic perseverance, Jie balances those expectations with his passion for art
    and technology, fostering a cross‑cultural perspective that informs both his creative practice and collaborative spirit.
