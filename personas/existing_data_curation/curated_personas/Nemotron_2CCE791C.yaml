  career_goals: Jie aspires to attend a specialized art‑technology program and become a concept artist and creative technologist, creating visual narratives for video games, animated films, or immersive
    media. He aims to build a professional portfolio that blends illustration, storytelling, and interactive prototypes, eventually joining a collaborative studio where he can lead creative projects and
    mentor younger artists. In the long term, he hopes to launch a youth‑focused art collective that merges East‑Asian aesthetic influences with cutting‑edge digital tools.
