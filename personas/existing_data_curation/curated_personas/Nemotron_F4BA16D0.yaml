personas:
  professional: Keenan Osmer, a Maryland‑licensed civil engineer specializing in structural analysis, transportation design, and GIS‑driven stormwater management, merges a love for systematic documentation
    with a spontaneous, people‑focused problem‑solving style that keeps project teams agile under tight deadlines.
  sports: Keenan Osmer channels competitive energy into a local ultimate frisbee league and the Chesapeake Bay Kayak Club, hikes the Patuxent River Trail year‑round, and avidly follows the Washington Commanders,
    Washington Capitals, and Baltimore Orioles, often sporting their jerseys during post‑game bar trivia nights.
  arts: Keenan Osmer strums acoustic guitar at informal jam sessions, drawing inspiration from Bob Dylan, The Avett Brothers, and local folk singer Jamie LeRoy, while devouring science‑fiction works by
    Neal Stephenson and Octavia Butler and occasionally catching indie films featuring actors like Tilda Swinton at the St. Mary’s County Cultural Center.
  travel: Keenan Osmer favors spontaneous weekend road trips that blend kayaking on Assateague Island, historic tours of St. Mary’s City, and foodie stops in D.C., yet also plans annual overseas getaways
    to Iceland’s waterfalls and Japan’s Kyoto temples, balancing adventure with a modest travel budget.
  culinary: Keenan Osmer cooks confidently at the grill, perfecting Maryland crab cakes with lump crab meat and Old Bay, mastering smoked pork ribs with a honey‑chipotle glaze, and experimenting with cedar‑plank
    salmon seasoned with lemon and dill, while often over‑salting dishes during enthusiastic barbecues.
  core: Keenan Osmer blends disciplined engineering precision with a spontaneous love for outdoor camaraderie, balancing meticulous project plans against impromptu ultimate frisbee tournaments and the occasional
    over‑commitment to community clean‑ups.
background:
  cultural: Keenan grew up in a middle‑class, predominantly White suburban environment in Maryland, with family roots in German‑Irish ancestry typical of the Chesapeake region. Raised in a Methodist household
    that emphasized community service and modesty, he absorbed the maritime culture of the Bay, the presence of the Naval Air Station, and the rural traditions of St. Mary’s County. These influences fostered
    his love for outdoor recreation, local seafood cuisine, and a strong sense of civic duty. His STEM education and exposure to diverse peers have broadened his perspective, blending regional customs with
    a progressive, collaborative outlook.
