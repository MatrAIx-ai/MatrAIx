  career_goals: Keenan aims to advance to a senior project manager role within the next five years, leading large‑scale infrastructure projects that enhance the resilience of Maryland’s coastal and rural
    communities. He plans to deepen his expertise in sustainable engineering through a master’s program and earn additional certifications in green infrastructure. Ultimately, he envisions founding his
    own consulting firm focused on eco‑friendly stormwater and flood mitigation solutions. He also wishes to serve on the St. Mary’s County planning commission, mentor junior engineers, and contribute to
    community development initiatives that align with his collaborative values.
