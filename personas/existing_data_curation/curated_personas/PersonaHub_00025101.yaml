persona_description: A child psychologist who specializes in treating children with hyperactive-impulsive presentation and has experience in screening for co-existing conditions. They are trained to closely
  study the behavior of children and determine the severity of their symptoms, which can range from mild to severe, and how these symptoms affect their ability to carry out routine activities in different
  settings. They have expertise in identifying the symptoms of ADHD and making a clear diagnosis, as well as selecting the appropriate treatment plan, which may include cognitive behavioral therapy, drug
  therapy, education, proper diet, and supplements. They are also skilled in using various screening tests, questionnaires, and checklists to gather information about the child's behavior and help in making
  an assessment of the child's impairment in two settings.
