personas:
  professional: George Goldenberg, a 23‑year‑old maintenance technician, applies his Industrial Maintenance Technology training to keep HVAC, hydraulic, and pneumatic systems humming in an agricultural
    processing plant, thriving on the predictable rhythm of routine inspections while they still occasionally misplace a wrench because they prefer flexibility over rigid organization.
  sports: George Goldenberg, a 23‑year‑old who satisfies his need for solitary activity through early‑morning fishing trips on Lake Texoma and annual deer hunts in the Oklahoma prairie, cheers for the Oklahoma
    City Thunder and the University of Oklahoma Sooners, and holds a membership in a local target‑shooting club where they practice precision shooting as a low‑key fitness routine.
  arts: George Goldenberg, a 23‑year‑old woodworker turned DIY artist, finds inspiration in the rustic designs of folk furniture while listening to classic country legends like Willie Nelson and modern
    instrumental composer Ólafur Arnalds, spends evenings polishing finished pieces to the soundtrack of video‑game pixel art in Minecraft, and they occasionally attend a regional community‑theater production
    of a classic Western for a touch of live drama.
  travel: George Goldenberg, a 23‑year‑old who charts low‑key road trips that blend work and wilderness, meticulously plans weekend hunting expeditions to the Texas Hill Country and fishing excursions to
    Yellowstone’s Madison River, while they also dream of a solo backpacking adventure through the Canadian Rockies once their savings for a new tool chest are secured.
  culinary: George Goldenberg, a 23‑year‑old home‑brewer and occasional grill master, follows a strict weekly schedule to craft a crisp pilsner and a malt‑rich amber ale, whips up a reliable Oklahoma‑style
    barbecue rib recipe seasoned with smoked paprika, brown sugar, and garlic, and they pair their brews with freshly caught catfish fried in cornmeal, always keeping a stash of hops, malt extract, and
    fresh herbs on hand.
  core: George Goldenberg is a routine‑driven 23‑year‑old who thrives in solitary, hands‑on work, from maintaining farm equipment to perfecting his home‑brewed beer, even if they sometimes misplace a wrench
    during a busy workday.
background:
  cultural: George grew up in Paoli, a small town in McClain County, Oklahoma, within a predominantly white, working‑class community. His family emphasized self‑reliance, a strong work ethic, and respect
    for tradition, commonly found in rural Midwestern culture. He was raised with modest exposure to organized religion, attending a local Methodist church on holidays, which reinforced values of modesty
    and community responsibility. The regional culture of close‑knit neighborhoods, appreciation for outdoor pursuits, and practical problem‑solving has shaped his worldview, reinforcing his preference
    for routine, practicality, and solitary activities.
attributes:
  skills: '["Preventive Maintenance", "Hydraulic and Pneumatic Systems", "Electrical Troubleshooting", "MIG/TIG Welding", "HVAC Installation and Repair", "Small Engine Repair", "Technical Blueprint Reading",
    "CMMS Software", "Computer Hardware Repair", "Basic Carpentry"]'
  hobbies: '["Fishing", "Hunting", "Woodworking", "Computer Hardware Assembly and Repair", "Solo Video Gaming (Minecraft, Stardew Valley)", "Reading Mechanical Manuals", "Home Brewing"]'
  career_goals: George aims to secure a stable, routine‑focused position as a maintenance technician in a manufacturing or agricultural facility where he can work largely independently. He plans to obtain
    additional certifications in HVAC and industrial welding to increase his employability and eventually start a small, solo‑operated service business offering equipment repair and preventive maintenance
    to local farms and businesses. His ideal career provides predictable daily tasks, minimal social demands, and the opportunity to apply his practical, hands‑on expertise.
