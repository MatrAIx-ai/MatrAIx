persona_description: A researcher or archivist interested in the history of news media, specifically focusing on the development of the concept of news and newspapers in the 17th-18th centuries. They are
  familiar with the Burney Collection and the ECCO database, and are looking for access to the full runs of 48 newspapers and partial runs of 131 more, selected by the British Library to best represent
  nineteenth-century Britain. They are also interested in the Nineteenth Century Collections Online and Nineteenth Century Masterfile databases, which provide access to primary sources dealing with various
  topics such as East-West diplomacy, British politics and society, British theater, music, and literature, European literature, photography, science, technology, and medicine, and the status of women.
