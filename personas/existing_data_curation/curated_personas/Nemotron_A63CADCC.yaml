personas:
  professional: Harmeet, a three‑year‑old, runs a pretend “office” for their stuffed animal staff, arranging tiny desks in neat rows, assigning each a task and using a toy pencil to check off a daily “to‑do”
    list, and they delight in the predictable routine.
  sports: Harmeet, a three‑year‑old from the Bay Area, participates in the “Tiny Tigers” toddler soccer club, loves cheering for the San Francisco Giants on TV, and they fiercely compete to be the first
    to kick the ball during practice, showing their competitive edge and love for predictable game routines.
  arts: Harmeet, a three‑year‑old, delights in drawing rainbow‑filled pictures with Crayola crayons, sings along to Raffi’s “Baby Beluga” and The Wiggles’ “Fruit Salad,” and they often line up their stuffed
    animals to watch the animations, revealing a methodical appreciation for colorful creative expression.
  travel: Harmeet, a three‑year‑old, enjoys family trips to the local zoo where they follow a detailed map of animal habitats, looks forward to a yearly visit to Disneyland, and they prefer itineraries
    that include set nap times and snack breaks, reflecting their need for structure and predictability while exploring.
  culinary: Harmeet, a three‑year‑old, favors creamy macaroni and cheese, banana slices, and peanut butter toast, can be picky about any vegetables, and they insist on eating foods in a specific order—first
    fruit, then the main dish—showcasing their organized approach to meals and occasional stubbornness.
  core: Harmeet, a three‑year‑old, balances an innate love for orderly routines with a competitive spark, often arranging toys in perfect rows, counting coins, and demanding predictable snack sequences,
    yet they occasionally resist change with a stubborn tantrum.
background:
  cultural: Harmeet comes from a South Asian Indian family that blends Punjabi Sikh and Kerala Christian traditions, reflecting the mix of the names Harmeet, Kuruvilla, and Hamid. At home, he hears English
    and Punjabi, and occasionally Malayalam, and celebrates a variety of festivals such as Diwali, Eid, and Christmas with his extended family. The family participates in local cultural gatherings in the
    Four Oaks area and values education, respect for elders, and community service. This multicultural environment shapes his early worldview, providing him with a rich tapestry of foods, music, and stories.
