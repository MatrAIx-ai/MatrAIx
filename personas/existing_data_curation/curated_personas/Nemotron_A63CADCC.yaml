  career_goals: Even at three, Harmeet enjoys imaginative play that hints at future ambitions. He loves pretending to be a builder or a teacher, often arranging his toys in orderly rows and explaining rules
    to peers. He expresses a desire to help others and to “be in charge” during play, aiming to become a teacher or an engineer who designs safe structures. He also dreams of being a community leader who
    organizes events, reflecting his competitive and organized temperament.
