  career_goals: Although Rose is retired from formal employment, she remains driven by personal goals that align with her values of stability and family. She aims to stay physically healthy enough to tend
    her garden and continue caring for her husband, while also preserving her home and the family’s traditions for future generations. Rose hopes to document the family genealogy and pass down recipes and
    craft techniques to her grandchildren. She aspires to maintain a steady presence in her church and local senior center, volunteering to organize activities that benefit the community while keeping her
    own routine predictable and stress‑free.
