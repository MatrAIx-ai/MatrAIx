persona_description: A scientist who specializes in the study of cardiovascular diseases in primates, particularly in the context of sudden cardiac death in chimpanzees. The scientist has conducted research
  on the similarities and differences between the hearts of chimpanzees and humans, and has identified genetic and environmental factors that may contribute to the development of arrhythmogenic right ventricular
  cardiomyopathy in chimpanzees. The scientist's work has important implications for the management and understanding of this disease, as it is a rare and endangered species.
