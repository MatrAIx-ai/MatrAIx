personas:
  professional: Jenny Todd, a retired community organizer turned volunteer docent at the Trenton historical museum, leverages their curiosity and methodical planning to design engaging tours, mentors younger
    volunteers in public speaking, and channels their competitive edge into orchestrating an annual regional art fair that showcases local talent, all while maintaining a healthy skepticism toward vendors'
    motives.
  sports: Jenny Todd stays active by participating in low-impact senior aerobics at the community center, follows the St. Louis Cardinals and the Kansas City Chiefs on television, and joins the local Saturday
    Walking Club for three-mile strolls around the historic downtown square, balancing competitive enthusiasm for team scores with a methodical approach to personal health that they apply to their own fitness
    routine.
  arts: Jenny Todd expresses their artistic soul through watercolor landscapes reminiscent of Monet and O'Keeffe, volunteers as a curator for small exhibitions featuring folk painter Howard Finster, and
    enjoys local theater productions starring Sarah McCaffrey, all of which reinforce their appreciation for both classic and unconventional art forms.
  travel: Jenny Todd plans their trips months in advance, preferring regional art festivals like the Springfield Art Fair and the Asheville Folk Art Festival, while dreaming of a summer pilgrimage to Provence's
    historic villages and a scenic river cruise along the Mississippi, balancing their love of culture with a modest travel budget.
  culinary: Jenny Todd delights in farmhouse cooking, regularly preparing heirloom tomato gazpacho with fresh basil, sherry vinegar, and cucumber, baking sourdough loaves that incorporate rye flour and
    rosemary sprigs from their garden, and experimenting with seasonal squash gratins flavored with sage and nutmeg.
  core: Jenny Todd blends relentless curiosity with meticulous planning, turning every community event into a well-orchestrated showcase while they secretly hoard extra paint tubes for late-night canvas
    sessions.
background:
  cultural: Jenny grew up in a small, predominantly white Midwestern town in Missouri, with deep roots in German‑American farming communities. Her upbringing emphasized self‑reliance, modesty, and strong
    community ties, often centered around the local church and town events. While she respects traditional values and local customs, her curiosity and openness have led her to embrace diverse artistic expressions
    and new ideas. The cultural landscape of Trenton, with its annual county fairs, historic preservation societies, and close‑knit neighborly networks, has shaped her sociable yet competitive spirit, encouraging
    her to contribute actively to communal life while maintaining a skeptical eye toward motives.
