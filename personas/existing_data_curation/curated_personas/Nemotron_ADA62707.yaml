  career_goals: Lubna aspires to become a creative professional—perhaps an illustrator, writer, or designer—who can weave stories that celebrate her cultural heritage. She also dreams of studying science
    or technology to explore how things work, hoping to mentor other children from immigrant families and eventually contribute to community arts programs.
