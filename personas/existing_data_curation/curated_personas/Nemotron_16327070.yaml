  hobbies: '[''Watercolor painting and sketching'', ''Reading historical fiction'', ''Birdwatching and nature observation'', ''Backyard gardening with heirloom vegetables'', ''Small‑group book club participation'',
    ''Attending local art gallery openings'', ''Knitting and quilt making'', ''Experimenting with seasonal cooking and foraged ingredients'', ''Holding modest potluck gatherings with family and friends'',
    ''Exploring regional museums and cultural sites'']'
  career_goals: Audrey aims to transition from a teaching assistant to a fully credentialed elementary teacher, with a focus on integrating arts and experiential learning into the district’s curriculum.
    She plans to enroll in a part‑time Master’s program in Education specializing in arts integration and inclusive pedagogy. Over the next five years, she hopes to spearhead a community‑wide arts‑based
    after‑school program that engages both students and senior residents of Houlton, fostering intergenerational creativity. Audrey also aspires to become a mentor for new teaching assistants, sharing her
    flexible classroom strategies and fostering a supportive professional network within the school. Ultimately, she envisions taking on a leadership role that allows her to advocate for more adaptable,
    student‑centered learning environments in rural Maine schools.
