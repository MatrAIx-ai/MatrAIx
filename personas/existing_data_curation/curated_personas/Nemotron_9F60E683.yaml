    shelter'']'
  career_goals: Madisen aims to advance within the correctional system, seeking a shift‑supervisor role within the next two years and eventually a deputy warden position. She is motivated to develop and
    implement evidence‑based rehabilitation programs that balance security with inmate empowerment. Leveraging her business background, she hopes to lead initiatives that streamline operations, reduce costs,
    and improve staff morale. To support these ambitions, she plans to pursue a master's degree in criminal justice or public administration while cultivating mentorship relationships with senior correctional
    leaders. She also values achieving a healthier work‑life balance to mitigate stress and maintain long‑term effectiveness.
