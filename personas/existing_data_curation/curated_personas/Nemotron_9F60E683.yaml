personas:
  professional: Madisen Hubbard, a 28-year-old correctional operations specialist, leverages their expertise in inmate supervision, crisis negotiation, and data-driven budgeting to streamline facility processes,
    while they apply a curiosity for evidence‑based rehabilitation and a practical, detail‑oriented mindset to balance security with inmate empowerment.
  sports: Madisen Hubbard channels their love of the Idaho outdoors into weekend hikes with the Boise Hills Hiking Club, tracks the Boise State Broncos football and Seattle Seahawks NFL teams for a communal
    sports fix, and they balance this with regular yoga practice and occasional snowshoeing during the winter months.
  arts: Madisen Hubbard satisfies their curiosity through true‑crime podcasts such as Serial and My Favorite Murder, devours Malcolm Gladwell’s non‑fiction works, finds solace in the folk melodies of Sufjan
    Stevens, and they occasionally attend performances at the Idaho Shakespeare Festival.
  travel: Madisen Hubbard favors low‑key, nature‑focused travel, often planning weekend escapes to Yellowstone and the Sawtooth Mountains while dreaming of a solo trek through Iceland’s volcanic highlands,
    and they meticulously budget each trip using a spreadsheet to balance their love of adventure with financial prudence.
  culinary: Madisen Hubbard, a budding home chef, experiments with dishes like roasted beet and goat‑cheese salad, homemade kimchi, and zucchini noodles tossed with basil and lemon, drawing fresh ingredients
    from their modest vegetable garden, and they showcase their intermediate cooking skill at intimate dinner gatherings of four to six friends.
  core: Madisen Hubbard, a 28‑year‑old correctional officer with a habit of over‑analyzing every scenario, balances a relentless curiosity for self‑improvement with a practical, budget‑conscious lifestyle,
    while they often wrestle with nighttime worry that fuels both meticulous planning and occasional insomnia.
background:
  cultural: Madisen was raised in Menan, a small town in Madison County, Idaho, within a largely white, rural community that emphasizes self‑reliance, hard work, and community service. Her family has generational
    ties to farming and small‑town trades, instilling a practical work ethic and respect for nature. Local cultural influences include participation in county fairs, 4‑H projects, and church gatherings,
    fostering a sense of close‑knit community and modest social norms. Growing up in the intermountain West exposed her to outdoor recreation and a deep appreciation for Idaho’s landscapes, while her education
    introduced broader perspectives and curiosity about diverse ideas. This blend of Midwestern‑Western values and personal ambition shapes her approach to both her career and personal life.
