  career_goals: Looking ahead, Sumit hopes to turn his passion for technology and structured problem‑solving into a career as a software engineer, ideally focusing on game development or robotics. He dreams
    of earning a scholarship to a top engineering program, where he can deepen his coding expertise and eventually work on creating interactive experiences that blend his love for strategy games and hands‑on
    engineering. While his competitive streak drives him to aim for high academic achievement, his desire for a reliable future also makes him consider fields like computer science or mechanical engineering
    that offer clear career pathways and the flexibility to work on personal projects.
