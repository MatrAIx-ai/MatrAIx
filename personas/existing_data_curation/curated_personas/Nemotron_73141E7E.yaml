personas:
  professional: Sumit Patel, a budding robotics enthusiast and strategy‑gaming aficionado, they channel a love of structured problem‑solving into building VEX kits and leading the school’s small robotics
    club, while also keeping a competitive edge by mastering chess openings and sketching digital art concepts for future game levels.
  sports: Sumit Patel, a competitive youth athlete, they play on the local U‑14 soccer team, follow the Los Angeles Lakers for basketball and the New York Yankees for baseball, and spend weekends at the
    community pool for swimming drills, preferring structured practice sessions over casual pick‑up games, yet their reserved nature makes them favor small‑team environments.
  arts: Sumit Patel, an imaginative digital creator, they sketch sci‑fi landscapes on a tablet inspired by artists like Ross Tran and Hidetaka Tenjin, practice short piano pieces by Yiruma, and devour novels
    by Brandon Sanderson and N.K. Jemisin, often weaving these influences into storyboards for personal game mods, while occasionally staying up late to perfect a pixel‑art sprite despite feeling fatigued.
  travel: Sumit Patel, an adventurous yet planner‑oriented teen, they have visited the Grand Canyon and Disneyland with family, dream of touring Tokyo’s Akihabara district, prefer itineraries with clear
    checkpoints while leaving room for spontaneous detours to local arcades, yet they frequently worry about missing a scheduled activity, leading them to double‑check travel plans repeatedly.
  culinary: Sumit Patel, a budding home cook, they help prepare family meals on weekends, experimenting with spice blends in a homemade spicy chicken stew, enjoy crafting personalized pizzas topped with
    mozzarella, bell peppers, pineapple, and a drizzle of sriracha, and love trying new ingredients like miso paste and smoked paprika in a fusion taco, though they sometimes over‑season dishes in pursuit
    of bold flavors.
  core: Sumit Patel, a strategic, slightly anxious teen tinkerer, they blend competitive gaming, robotics, and creative arts into a structured yet flexible worldview.
background:
  cultural: Sumit’s family originates from Gujarat in India, and he grew up in a bilingual household where Gujarati and Hindi are spoken alongside English. Their home traditions include celebrating Diwali,
    Holi, and the Gujarati New Year with festive meals, music, and community gatherings at the local Hindu temple in nearby Dallas. While he attends a mainstream public middle school in Justin, Texas, his
    family places a strong emphasis on academic achievement and cultural heritage, encouraging him to learn classical Indian music and to help prepare traditional dishes such as dhokla and biryani. This
    blend of South Asian customs and Texas suburban life shapes his identity, offering both a sense of belonging to his heritage and a connection to his broader American community.
attributes:
