  career_goals: Now in her eighties, Christina aims to give back by mentoring younger craftsmen through a local community‑college trade program and by offering workshops that preserve traditional sheet‑metal
    skills. She hopes to document her experiences in a memoir that highlights the evolution of the trade and to stay actively involved with Habitat for Humanity, applying her practical expertise while learning
    sustainable building methods. Maintaining health, independence, and a sense of purposeful contribution to her church and neighborhood remain central to her ambitions.
