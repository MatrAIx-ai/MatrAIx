personas:
  professional: Doretha Rhodes, a retired community volunteer and senior‑center mentor, draws on their storytelling, budget‑savvy, and event‑coordination expertise to guide younger helpers and preserve
    oral histories, and they embrace a relaxed, flexible attitude that lets occasional disorganization become a source of creative problem‑solving.
  sports: Doretha Rhodes enjoys gentle morning walks in their neighborhood park, participates in the local seniors' walking club, and they root for the Atlanta Falcons, Atlanta Braves, and Georgia Bulldogs,
    while occasionally joining a friendly bridge tournament that doubles as a mental‑exercise sport.
  arts: Doretha Rhodes’s artistic life weaves quilting inspired by folk patterns, crocheting to the rhythms of gospel legend Mahalia Jackson, jazz great Ella Fitzgerald, and blues icon B.B. King, and they
    attend weekly performances at the historic local theatre, where classic Southern narratives come alive.
  travel: Doretha Rhodes takes purposeful road trips to trace her family’s roots in rural Georgia, visits the National Civil Rights Museum in Memphis, explores the historic streets of Savannah, and they
    dream of a leisurely Mississippi River cruise, balancing detailed planning with an easy‑going flexibility that allows spontaneous detours.
  culinary: Doretha Rhodes blends masterful Southern comfort cooking—perfectly seasoned fried catfish, smoky collard greens simmered with ham hocks, sweet potato pie, and cornbread—using garden‑fresh okra,
    tomatoes, and sweet corn, while they experiment with soul‑food twists like peanut‑sauce‑glazed chicken that honor family recipes yet invite new flavors.
  core: Doretha Rhodes is a garden‑to‑table storyteller who balances meticulous budgeting with impulsive splurges on craft supplies, worries about every detail yet they find solace in gospel hums, and they
    navigate life with a flexible, slightly disorganized charm that keeps their community rooted.
background:
  cultural: Doretha is a second-generation African-American from the deep South, raised on a modest farm in rural Georgia during the era of desegregation. Her upbringing was shaped by strong church ties,
    community solidarity, and the oral traditions of her grandparents, who migrated north during the Great Migration before returning to Georgia. The blended heritage of Southern hospitality, gospel music,
    and a legacy of civil-rights activism informs her values of resilience, mutual support, and reverence for family history. Living now in Smyrna, within Cobb County's vibrant Black community, she continues
    to celebrate and preserve the cultural rituals, cuisine, and storytelling that link her past to the present.
attributes:
  skills: '[''Home cooking (Southern comfort cuisine)'', ''Gardening (vegetables and ornamental flowers)'', ''Household budgeting and finance management'', ''Basic computer literacy (email, video calls,
