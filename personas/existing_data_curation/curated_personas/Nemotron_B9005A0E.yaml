  hobbies: '[''Gardening (vegetable beds and roses)'', ''Cooking traditional Southern and soul-food dishes'', ''Reading historical novels and African-American memoirs'', ''Quilt making and other textile
    crafts'', ''Attending church services and choir rehearsals'', ''Genealogy research and family history documentation'', ''Volunteering at the local senior center'', ''Walking in neighborhood parks and
    birdwatching'', ''Playing bridge and other card games with friends'', ''Listening to gospel, jazz, and blues music'']'
  career_goals: Although retired, Doretha wants to continue contributing to her community and family. She plans to compile a written memoir of her life and family's journey from the rural South to the Atlanta
    suburbs, which she hopes to donate to the Cobb County Historical Society. She aims to become a mentor for younger volunteers at the senior center, teaching them how to organize events and use digital
    tools. Doretha also wishes to deepen her proficiency with tablets and video-chat platforms to stay engaged with her grandchildren and distant relatives. Maintaining her health and independence is a
    priority, so she seeks to stay active through gardening and regular walks, and she aspires to join a local walking group for seniors.
