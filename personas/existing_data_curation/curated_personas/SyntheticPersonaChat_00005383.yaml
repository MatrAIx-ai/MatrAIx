    User 1: Thanks. I hope so!

    User 2: Good luck! I''m sure you''ll do great!

    User 1: Thanks! I appreciate it!

    User 2: So, what kind of music do you like to sing?

    User 1: I like to sing all kinds of music, but I''m best at singing pop songs.

    User 2: Oh, I love pop music too! Do you have a favorite song to sing?

    User 1: I do! I love singing "My Heart Will Go On" by Celine Dion.

    User 2: That''s a great song! I love it too.

    User 1: Thanks! Me too!

    User 2: So, what are you most nervous about?

    User 1: I''m just nervous about being in front of a crowd. I''m not used to it.

    User 2: I can understand that. But just remember, everyone is there to support you and they want you to do well.

    User 1: Thanks. I''ll try to remember that.

    User 2: Good luck! I''m sure you''ll do great!

    User 1: Thanks! I appreciate it!'
