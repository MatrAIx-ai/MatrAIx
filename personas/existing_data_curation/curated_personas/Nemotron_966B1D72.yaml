personas:
  professional: Prabha Bunyi is a veteran special-education teacher with three decades of experience designing data-driven IEPs for students with autism and dyslexia, expertly integrating assistive technologies
    while leveraging their organized, competitive nature to exceed district metrics and lead professional-development workshops that showcase their sociable, authoritative presence.
  sports: Prabha Bunyi enjoys weekend hikes along the Texas Hill Country trails, practices yoga three times weekly, follows the Dallas Mavericks and the Austin FC soccer team, and participates in a local
    senior walking club that meets at sunrise.
  arts: Prabha Bunyi curates an eclectic home soundtrack that swings from ghazal legends like Ghulam Ali to jazz greats such as Miles Davis, volunteers as stage manager and occasional actress with the community
    theatre, and leads book-club discussions that juxtapose classic Punjabi poetry with contemporary American novels by Toni Morrison and Jhumpa Lahiri.
  travel: Prabha Bunyi plans meticulously organized trips that blend cultural pilgrimage to heritage sites in Punjab with leisurely drives through the Texas Hill Country, favoring off-season travel to avoid
    crowds, and keeps a travel journal of the best bhangra-inspired street food stalls in Lahore and the quiet vineyards of Fredericksburg.
  culinary: Prabha Bunyi experiments with Punjabi-Tex-Mex fusion dishes such as butter-chicken tacos, paneer-stuffed jalapeño poppers, and cilantro-lime biryani chili, drawing fresh flavors from cilantro,
    garam masala, and fire-roasted tomatoes cultivated in their backyard herb garden, while hosting monthly pot-luck evenings for the neighborhood food-bank volunteers.
  core: Prabha Bunyi blends a meticulous, competitive spirit with warm sociability, turning every classroom, kitchen, and community stage into a well-orchestrated performance, even as they habitually triple-check
    herb labels and occasionally binge on classic poetry at night.
background:
  cultural: 'Prabha was born in Punjab, India, into a Sikh family that emphasized seva (service), education, and community cohesion. She grew up speaking Punjabi, celebrating Gurpurab, Vaisakhi, and Diwali,
    and participating in Langar at the local gurdwara. After moving to the United States in her early twenties, she settled in Humble, Texas, where she blended her Sikh values with American cultural norms.
    Her heritage informs her teaching philosophy: she regularly incorporates Punjabi folklore, moral stories, and multilingual perspectives into lesson plans to honor diverse student backgrounds. Active
    in the regional Sikh diaspora, she helps organize cultural festivals, supports new immigrants, and maintains strong ties with relatives in India, all while navigating a single, independent life that
    reflects both her personal resilience and the Sikh principle of self‑reliance.'
attributes:
  skills: '["IEP Development and Implementation","Positive Behavioral Support","Applied Behavior Analysis (ABA)","Assistive Technology Integration","Differentiated Instruction for Humanities","Data‑Driven
    Assessment and Progress Monitoring","Curriculum Adaptation for Diverse Learners","Public Speaking and Workshop Facilitation","Mentorship and Teacher Coaching","Special Education Law (IDEA) Compliance"]'
  hobbies: '["Reading Punjabi poetry and American literature","Cooking Punjabi‑Tex‑Mex fusion dishes","Gardening (herb garden)","Yoga and mindfulness practice","Community theatre (acting and stage management)","Volunteering
    at local food bank","Traveling to Punjab heritage sites and Texas Hill Country hiking","Listening to ghazals and jazz music","Collecting vintage books on education and philosophy"]'
  career_goals: Prabha aims to transition from classroom teaching to a district‑wide special‑education leadership role, where she can design systemic supports for students with disabilities across multiple
    schools. She aspires to develop a model inclusive humanities curriculum that weaves South Asian narratives into mainstream lessons, publishing a guidebook on cultural competency for special‑education
    teachers. Securing a research grant to study multilingual instruction’s impact on students with learning disabilities is a top priority, as is building a statewide professional‑development series that
    equips educators with practical, evidence‑based tools. Ultimately, she hopes to mentor a new generation of teachers, influence Texas Education Agency policy, and be recognized for her contributions
    to inclusive education at the national level.
