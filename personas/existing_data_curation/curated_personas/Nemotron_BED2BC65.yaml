  hobbies: '["Visiting art galleries and street art tours","Urban photography","Cooking Vietnamese and fusion dishes","Volunteering at community centers","Leading youth art workshops","Yoga and mindfulness
    practice","Salsa dance classes","Hosting themed dinner parties for friends"]'
  career_goals: Anh aspires to build a career that merges her love for the arts with her passion for community service. She aims to secure a role as an Arts Program Coordinator or Community Outreach Manager
    within a nonprofit or municipal cultural organization in Los Angeles. Over the next few years, she plans to pursue a certificate in Arts Administration or a master's degree in Social Work to deepen
    her expertise. Ultimately, Anh hopes to design inclusive art programs that empower underrepresented youth, foster cross-cultural dialogue, and contribute to a more harmonious community.
