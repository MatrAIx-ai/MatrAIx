  hobbies: '[''Tech meetups'', ''Hackathons'', ''Pickup basketball'', ''Hip‑hop beat production'', ''R&B and soul concerts'', ''Cooking Southern comfort food'', ''Indie video gaming'', ''Improvisational
    comedy'', ''Volunteer tutoring in coding'', ''Street photography'', ''Spontaneous travel'']'
  career_goals: Gregory aims to evolve from a junior developer into a senior full‑stack engineer and eventually a technical lead who can shape product strategy while nurturing team cohesion. He is particularly
    drawn to projects that have tangible community impact, and he aspires to launch a startup that delivers affordable, culturally relevant ed‑tech tools for Black middle‑school students in the Southeast.
    To support these ambitions, he plans to deepen his expertise in cloud‑native architectures, machine‑learning integration, and product design, while also strengthening his project‑management and time‑boxing
    skills—areas he identifies as growth opportunities given his tendency toward spontaneity. Gregory also envisions a future where he regularly speaks at conferences, mentors aspiring Black technologists,
    and champions inclusive hiring practices within the tech industry.
