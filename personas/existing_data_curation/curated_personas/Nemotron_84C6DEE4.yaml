personas:
  professional: Angela Gales, a budding miniature architect, spends hours designing intricate LEGO structures and crafting pixelated builds in Minecraft Education, and they channel their innate curiosity
    and practical mindset into early engineering play.
  sports: Angela Gales, a quiet observer of the local park’s junior soccer league, prefers solitary leaf‑collecting hikes and occasional playground tag where they compete with a personal streak, cheers
    quietly for the nearby Riverside Ravens, and proudly wears a badge from a local nature‑explorer club.
  arts: Angela Gales, an avid young illustrator, fills sketchbooks with detailed drawings of rocks, leaves, and insects they find, listens to gentle R&B and classic children’s songs as a soothing backdrop,
    and they occasionally join their family’s church choir for special performances, finding comfort in melody and colour.
  travel: Angela Gales, who loves organized adventures, enjoys weekend trips to the nearby botanical garden and a family road‑trip to the coastal town of Seaside, prefers carefully planned itineraries over
    spontaneous outings, and they dream of visiting the National Museum of Natural History in Washington, D.C.
  culinary: Angela Gales, a selective eater with a love for crunchy carrots, cheese‑filled quesadillas, and strawberry‑topped cupcakes, enjoys helping their mother mix batter for banana muffins, but they
    can become easily distracted by a newly found rock collection during mealtime.
  core: Angela Gales, a six‑year‑old curiosity‑driven builder, blends meticulous LEGO engineering with quiet contemplation, competitive spark, and a subtle anxiety that fuels their habit of double‑checking
    everything.
background:
  cultural: Angela belongs to an African American family with deep roots in Southern Maryland. Her grandparents grew up in close‑knit Black communities that valued storytelling, gospel music, and intergenerational
    support. Family gatherings often feature soul food, rhythmic drumming, and stories about resilience and the civil‑rights era, fostering a strong sense of heritage. Living in Waldorf, she is exposed
    to the local history of African American contributions to the region, including the Chesapeake Bay’s maritime traditions. Celebrations like Kwanzaa, Black History Month events, and church services reinforce
    her cultural identity, while the surrounding natural environment encourages her love of nature and scientific curiosity.
