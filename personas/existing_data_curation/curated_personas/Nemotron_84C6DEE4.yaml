  career_goals: Angela dreams of becoming a scientist who works closely with nature—specifically an entomologist or marine biologist—so she can study insects and the Chesapeake Bay’s ecosystems. She is
    also fascinated by how things are built and hopes to be an engineer who designs practical solutions to everyday problems. Her competitive streak leads her to envision winning school science fairs and
    earning recognition for inventive projects. Ultimately, she wants a career that lets her work independently, apply her curiosity, and make a tangible impact on protecting the environment.
