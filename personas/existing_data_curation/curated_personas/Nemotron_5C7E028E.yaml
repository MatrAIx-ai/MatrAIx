personas:
  professional: Anita Jourdan, a retired school office assistant turned volunteer guest curator, leverages decades of meticulous record‑keeping and budgeting experience to research, plan, and coordinate
    thematic exhibitions at the Boise Art Museum, and they also juggle occasional bridge nights and journal‑filled sketch sessions.
  sports: Anita Jourdan enjoys modest trail hikes with the Boise Hiking Club, regularly attends local Boise Hawks minor league baseball games and supports the Boise State Broncos football team, and they
    find the strategic challenge of bridge nights with close friends as a mental sport that satisfies their competitive streak.
  arts: Anita Jourdan spends countless hours perfecting watercolor landscapes of the Boise foothills, captures vintage black‑and‑white photographs of seasonal festivals, draws inspiration from Georgia O’Keeffe,
    Monet, and beloved local folk artist David Mack, and they contribute thoughtful essays to the Boise Art Museum newsletters while curating small community exhibitions.
  travel: Anita Jourdan celebrates their love of art and nature by taking weekend road trips to the Columbia River Gorge, planning annual pilgrimages to the Musée d'Orsay in Paris and the Van Gogh Museum
    in Amsterdam, while also cherishing nearby craft fairs in Portland and the annual Idaho Folk Art Festival, and they prefer traveling with a carefully pre‑planned itinerary to manage their anxiety.
  culinary: Anita Jourdan, an avid home chef, delights in preparing Idaho potato gnocchi with sage‑brown butter, roasting trout with lemon and dill, simmering classic Swedish meatballs infused with lingonberry
    glaze, and crafting huckleberry jam, and they enjoy pairing meals with locally sourced honey‑drizzled goat cheese while occasionally over‑seasoning dishes in a burst of experimental zest.
  core: Anita Jourdan combines a lifelong habit of meticulous organization, a fierce competitive edge in puzzles and bridge, a deep emotional sensitivity that fuels both artistic brilliance and occasional
    anxiety, and they maintain a quiet devotion to preserving community folk traditions.
background:
  cultural: Anita grew up in a modest, agricultural community in southeastern Idaho, where self‑reliance and strong work ethic were core values. Her family’s roots trace back to early 20th‑century Scandinavian
    and German immigrants who settled the region, bringing with them a tradition of communal gatherings and an appreciation for folk art. While the local culture emphasized practicality and modesty, Anita’s
    exposure to school programs and community theater sparked a lifelong fascination with visual arts and new ideas. Now residing in Boise, she blends the quiet, introspective sensibilities of her rural
    upbringing with the eclectic, progressive energy of the city’s art scene, creating a unique cultural perspective that honors her heritage while embracing broader artistic influences.
attributes:
  skills: '["Meticulous record keeping", "Budget management for community projects", "Event planning and coordination", "Art historical research", "Digital photography and photo editing", "Creative writing
    for art newsletters", "Crossword and puzzle solving", "Small‑group facilitation", "Volunteer outreach"]'
  hobbies: '["Watercolor painting", "Visiting art galleries and museums", "Reading art history and contemporary theory", "Journaling with sketching", "Crossword and logic puzzles", "Bridge (card game) with
    a small group", "Hiking the Boise foothills", "Vintage film photography"]'
  career_goals: Although retired from formal employment, Anita aims to deepen her impact on Boise's cultural scene by volunteering as a guest curator for the Boise Art Museum, where she can apply her research
    skills to develop thematic exhibitions. She also aspires to complete a personal memoir that intertwines her life story with reflections on the art movements she has followed, and to publish a small
    booklet of her watercolor illustrations of Idaho’s landscapes. Additionally, Anita hopes to achieve a certification in basic art conservation techniques, enabling her to assist in preserving local artworks
    while maintaining her independence and emotional wellbeing.
