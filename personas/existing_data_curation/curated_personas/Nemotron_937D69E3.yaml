personas:
  professional: Makeda Griffin, a retired clerical assistant from a local health clinic who now channels decades of office coordination and budgeting expertise into organizing community art workshops, uses
    their meticulous planning skills to curate exhibitions and mentor senior artists, while allowing their vivid imagination to guide abstract painting sessions.
  sports: Makeda Griffin, an avid walker who joins a senior nature‑trail club each morning, follows the Kentucky Wildcats men’s basketball and the Louisville Cardinals football seasons with spirited devotion,
    occasionally attends Cincinnati Reds games when in Ohio, and participates in the town’s gentle‑pacing senior softball league, embodying a balanced, low‑impact approach to fitness that they cherish.
  arts: Makeda Griffin, a passionate abstract painter and poet inspired by Alma Thomas’s vibrant canvases, the soulful sounds of Nina Simone and Miles Davis, and the literary brilliance of Octavia Butler
    and Toni Morrison, spends afternoons mixing acrylics while they write short stories that weave community oral histories into speculative narratives.
  travel: Makeda Griffin, whose travel style favors meticulously planned road trips to nearby cultural hubs like Nashville, New Orleans, and the Great Smoky Mountains, has also ventured to Savannah’s historic
    district, and now dreams of a pilgrimage to Dakar, Senegal to explore ancestral roots, balancing modest budgeting with a love for immersive, slower‑paced journeys that they relish.
  culinary: Makeda Griffin, an inventive home cook who delights in preparing shrimp and grits with smoked paprika, collard greens simmered with ham hocks, and sweet‑potato pie spiced with cinnamon, frequently
    seasons dishes with fresh rosemary, thyme, and basil from their porch herb garden, and treats weekend meals as experimental canvases for flavor, a habit they proudly share with visiting friends.
  core: Makeda Griffin, a 67‑year‑old retired clerk turned community artist, blends disciplined organization with boundless imagination, nurturing their town’s cultural memory while quietly indulging in
    morning herb tea and late‑night acrylic whispers, a rhythm they follow each day.
background:
  cultural: Makeda is an African‑American woman who grew up in rural Kentucky during the civil‑rights era, shaped by a strong church community, family storytelling traditions, and the resilience of Black
    Southern culture. Her heritage is reflected in her love for gospel music, Southern cuisine with African influences, and a deep respect for oral history. In Hopkinsville she remains active in the local
    Black community, celebrating Juneteenth and contributing to preservation projects that document African‑American history in Todd County. Her cultural identity informs her artistic expression, which
    often merges contemporary abstract forms with motifs that honor her ancestry and community experiences.
