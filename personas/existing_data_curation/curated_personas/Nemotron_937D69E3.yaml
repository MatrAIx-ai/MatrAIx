  career_goals: Makeda aims to deepen her artistic practice and share her knowledge with her community. She plans to complete a series of abstract paintings that explore memory and cultural identity, and
    to compile a memoir of her life and family history for publication. She hopes to establish a community art workshop for seniors in Hopkinsville, where she can mentor younger artists and organize exhibitions
    of local African‑American creators. Additionally, she intends to expand her work documenting oral histories, creating a digital archive that preserves the stories of the Black community in Todd County.
