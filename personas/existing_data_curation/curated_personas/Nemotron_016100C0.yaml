  career_goals: Richard dreams of a future where he can help people every day. He imagines becoming a teacher or a community firefighter because he wants to protect and guide others, especially the younger
    kids in his neighborhood. He also thinks about being a doctor one day, inspired by his desire to care for those who are sick. These aspirations reflect his compassionate nature and his love for teamwork
    and harmony.
