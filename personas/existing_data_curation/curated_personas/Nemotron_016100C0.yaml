personas:
  professional: Richard Prophet is a budding community helper who leads his church youth group’s weekly cleanup crew, channeling his natural curiosity and practical mindset into organized, fun projects
    that make his peers smile.
  sports: Richard Prophet plays forward for the Macon Soccer Club Thunder U‑8 team, attends the Atlanta United FC youth camp each summer, watches the Atlanta Braves on TV with his dad, and cheers loudly
    for the Atlanta Falcons on Sundays, approaching fitness with high‑energy drills and a love for group competition.
  arts: Richard Prophet dances to the gospel rhythms of Kirk Franklin and the upbeat vibes of Megan Thee Stallion, sings along to CeCe Winans during church gatherings, and spends weekends building intricate
    LEGO scenes inspired by adventure books like The Adventures of Tintin, letting music and storytelling fuel his creative spark.
  travel: Richard Prophet loves road trips that combine adventure and family bonding; he’s visited the historic squares of Savannah, explored the aquarium in Atlanta, and hopes to see the monuments of Washington,
    D.C., while his parents let him map the route with colorful stickers, balancing his desire for excitement with his need for routine.
  culinary: Richard Prophet enjoys the comfort of crispy fried chicken with honey glaze, creamy mac and cheese, and sweet potato fries, can skillfully spread peanut butter on toast, loves the taste of cheddar
    cheese, and eagerly helps his mom stir a pot of buttermilk biscuits, though he often sneaks an extra cookie when no one’s watching.
  core: Richard Prophet is a spirited 7‑year‑old who blends teamwork, early responsibility, and boundless curiosity into every game, project, and family ritual, even if he sometimes forgets his chores or
    sneaks extra cookies.
background:
  cultural: Richard grows up in Macon, Georgia, a city with a rich African‑American heritage in music, faith, and community. His family is active in a local Baptist church, where gospel music, storytelling,
    and fellowship shape his weekly routine. They celebrate cultural traditions such as Juneteenth and family reunions that emphasize togetherness and respect for ancestors. The neighborhood's strong sense
    of kinship and collective responsibility fosters Richard's compassionate outlook and his desire to contribute positively to his community.
