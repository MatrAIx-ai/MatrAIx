  hobbies: '[''Sketching landscapes and people'', ''Visiting local art galleries and street murals'', ''Cooking experimental dishes at home'', ''Reading speculative fiction'', ''Listening to jazz and neo‑soul
    music'', ''Photography of urban and rural scenes'', ''Gardening at community garden'', ''DIY upcycled jewelry making'', ''Attending small poetry readings'', ''Hiking local trails'']'
  career_goals: Kiyani aims to enroll in a culinary arts program at a local community college to transition from a dishwasher to a line cook and eventually a sous chef. She aspires to blend her love for
    food and visual art by opening a small café that showcases local Black artists and serves innovative soul‑food-inspired dishes. Long‑term, she hopes to mentor youth from under‑represented backgrounds,
    offering culinary workshops and art‑focused community events that celebrate their cultural heritage.
