personas:
  professional: Kiyani Pasley is a high‑volume dishwasher at a bustling Athens bistro who leverages meticulous sanitation knowledge, quick inventory restocking, and seamless teamwork, channeling their curiosity
    and easygoing flexibility into a kitchen culture that subtly blends functional efficiency with spontaneous artistic touches.
  sports: Kiyani Pasley enjoys casual pick‑up basketball in winter and weekend jogs with the Athens Running Club, cheerfully rooting for the Georgia Bulldogs on Saturdays and the Atlanta Braves during the
    spring, while generally shunning rigid gym routines in favor of flexible, low‑key movement.
  arts: Kiyani Pasley immerses themselves in Athens’ street murals, snapping photos of works by local graffiti artists like Dextro, while listening to Miles Davis, Erykah Badu, and Kendrick Lamar as they
    sketch and craft upcycled jewelry, and they regularly attend poetry nights featuring readings by Ocean Vuong.
  travel: Kiyani Pasley prefers spontaneous weekend escapes, having road‑tripped to Savannah’s historic squares and Asheville’s art‑filled downtown, while dreaming of a summer sojourn to Lisbon’s vibrant
    azulejo‑laced streets to chase more mural inspiration.
  culinary: Kiyani Pasley experiments in the kitchen with a refined yet daring palate, whipping up dishes like miso‑glazed shrimp & grits, collard greens seasoned with smoked paprika and sumac, and a chocolate‑tahini
    mousse infused with a hint of gochujang, reflecting a solid grasp of basic techniques and an appetite for bold flavor pairings.
  core: Kiyani Pasley is a creatively restless 22‑year‑old who mixes art and food, thrives on spontaneous inspiration, but often forgets appointments and lets dishes linger in the sink longer than they
    intend.
background:
  cultural: Kiyani was raised in a close‑knit Black family in the South, where Sunday church gatherings, soul food traditions, and storytelling shaped her early worldview. Growing up in Oconee County, she
    absorbed the rhythms of Southern gospel, blues, and the burgeoning indie music scene of nearby Athens. Her family emphasized the importance of community solidarity, respect for cultural heritage, and
    the encouragement of artistic expression. These values inform her appreciation for African‑American culinary legacies, her participation in local cultural festivals such as Juneteenth celebrations,
    and her commitment to uplifting her community through food and art.
