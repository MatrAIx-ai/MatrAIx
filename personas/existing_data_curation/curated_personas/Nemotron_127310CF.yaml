personas:
  professional: Morgan Moyers, a seasoned construction and building inspector with over two decades of experience, leverages her meticulous, methodical approach and strong communication skills to interpret
    and enforce the Florida Building Code, conduct detailed safety inspections using laser distance meters and moisture meters, and mediate disputes with contractors and homeowners, while her curiosity
    about sustainable materials and artistic design inspires her to integrate aesthetic considerations into every compliance report.
  sports: Morgan Moyers, a regular at the Lee County Fitness Center where she enjoys aqua aerobics, weekend pick‑up tennis with the Lee County Tennis Association, and early morning jogs along the Caloosa
    Preserve, passionately follows the Tampa Bay Buccaneers, the Tampa Bay Rays, and the Orlando Magic, and incorporates her salsa dancing cardio sessions into her overall fitness routine.
  arts: Morgan Moyers, whose evenings blend watercolor painting inspired by Monet and O'Keeffe with community theater rehearsals where she admires the dynamic storytelling of Lin‑Manuel Miranda’s Hamilton
    and the nuanced performances of Meryl Streep, channels her artistic curiosity into both her personal creations and her professional eye for aesthetic details in building inspections.
  travel: Morgan Moyers, a meticulous traveler who plans trips around historic architecture, has explored the colonial charm of Charleston, the Creole vibrancy of New Orleans, and the Art Deco allure of
    Miami, while dreaming of strolling the Gothic cathedrals of Barcelona and the Spanish colonial streets of Savannah, often coordinating group outings with her salsa classmates to blend cultural immersion
    with relaxed beach time within a modest budget.
  culinary: Morgan Moyers, an intermediate home cook who relishes blending Southern comfort with Caribbean zest, frequently prepares citrus‑glazed grilled snapper topped with fresh hibiscus salad, savors
    homemade key‑lime pie, and enjoys the occasional plate of Cuban ropa vieja, all crafted from the fresh citrus and herbs she tends in her garden.
  core: Morgan Moyers, a detail‑oriented building inspector with an artistic soul, balances her anxiety‑driven mindfulness rituals with a habit of over‑checking code details late into the night, often staying
    up rereading inspection manuals while slipping in spontaneous salsa steps between reports.
background:
  cultural: Morgan grew up in a suburban white community in Central Florida, absorbing a blend of traditional Southern hospitality and the laid‑back beach lifestyle of the Gulf Coast. Her family values
    emphasize reliability, community involvement, and a strong work ethic, which align with her methodical and organized personality. Living in Lehigh Acres, a diverse yet predominantly middle‑class area,
    she is regularly exposed to Hispanic and Caribbean cultural influences that enrich her culinary tastes and social activities, such as salsa dancing and participation in local festivals. Morgan’s upbringing
    includes regular church attendance and involvement in neighborhood associations, fostering a sense of collective responsibility. These cultural threads—Midwestern‑rooted modesty, Southern friendliness,
    and the multicultural vibrancy of South Florida—shape her identity and inform her approach to both professional duties and personal interests.
attributes:
  skills: '[''Florida Building Code interpretation'', ''site safety inspections'', ''detailed compliance reporting'', ''use of inspection tools (laser meters, moisture meters, digital cameras)'', ''effective
    stakeholder communication'', ''dispute mediation'', ''OSHA 30‑hour Construction Safety certification'', ''Certified Building Inspector (CBI) credential'', ''sustainable construction knowledge'', ''ADA
    accessibility standards'', ''knowledge of emerging building technologies'', ''artistic design evaluation'']'
  hobbies: '[''watercolor painting'', ''local artists’ collective participation'', ''community theater acting and set design'', ''hosting DIY Home Safety meet‑ups'', ''gardening (hibiscus and citrus)'',
    ''volunteering for coastal clean‑ups'', ''traveling to historic architectural sites'', ''salsa dancing'', ''mindfulness meditation'', ''support group attendance'']'
  career_goals: Morgan aims to advance to a senior inspector or lead inspector position within the Lee County Building Department, where she can mentor junior staff and shape quality‑control protocols.
    She plans to obtain the Certified Building Official (CBO) credential to broaden her authority over code development and enforcement. Morgan is also passionate about community education; she hopes to
    design workshops that blend building safety with artistic design principles, encouraging homeowners to create safe yet visually engaging spaces. Over the next five years, she envisions transitioning
    into a consulting role that advises small developers on compliant, sustainable, and aesthetically pleasing construction, while continuing to prioritize her mental‑health strategies to manage anxiety
    and maintain work‑life balance.
