personas:
  professional: Marie Augustin is a seasoned personal financial advisor in South Florida who combines meticulous portfolio construction, tax‑efficient estate and retirement planning, and a curiosity‑driven
    exploration of sustainable and alternative assets with an organized, empathetic approach that steadies even the most stress‑prone clients.
  sports: Marie Augustin enjoys early‑morning beach jogs along the Atlantic, participates in a co‑ed tennis league at the Coral Reef Country Club, follows the Miami Heat basketball and Miami Dolphins football
    teams with keen interest, uses their weekly yoga practice as the cornerstone of their fitness routine, and they view each season as a chance to blend competition with community.
  arts: Marie Augustin frequently visits Miami’s Pérez Art Museum and the Wolfson Campus galleries, sketches watercolor seascapes inspired by the Florida coastline in a style reminiscent of John Singer
    Sargent, curates a modest collection that includes works by contemporary African‑American artists such as Mickalene Thomas and Kehinde Wiley, and they often reflect on the narrative depth of Jacob Lawrence’s
    paintings during their solitary evenings.
  travel: Marie Augustin plans trips with a mix of structured itineraries and spontaneous detours, favoring culturally rich cities like New Orleans for its jazz and Creole cuisine, the Caribbean island
    of Barbados for its vibrant markets and sailing experiences, and European art hubs such as Florence and Paris, while balancing these adventures with a mindfulness to budget constraints and family commitments,
    and they consider each journey an opportunity to recharge their creative spirit.
  culinary: Marie Augustin, an adept home cook, often experiments with Caribbean staples like jerk‑spiced chicken, callaloo soup, and sweet plantain, blends them with Southern comfort dishes such as shrimp‑and‑grits
    and collard greens, and they showcase their skills by hosting intimate dinner parties where they pair these flavors with locally sourced seafood, fresh tropical fruits, and aromatic ingredients like
    allspice, Scotch bonnet peppers, and smoked paprika.
  core: Marie Augustin is a curiosity‑driven, detail‑obsessed financial planner who balances a love for solitary watercolor painting and mindful meditation with a lingering habit of over‑analyzing every
    client portfolio, and they often stay up late perfecting both spreadsheets and sea‑scapes.
background:
  cultural: Marie identifies as an African‑American woman with roots in the Caribbean; her grandparents immigrated from Haiti, bringing a legacy of resilience and culinary traditions that she honors today.
    Growing up in Fort Lauderdale, she was immersed in the multicultural tapestry of South Florida, celebrating Juneteenth, Haitian Flag Day, and local music festivals. Her faith community, a historically
    Black church, has shaped her values of service, cooperation, and collective uplift. These cultural influences inform her dedication to bridging financial gaps within underserved Black communities, integrating
    culturally relevant perspectives into her advisory practice and community outreach.
