  career_goals: Marie aims to advance to a senior leadership role within a boutique wealth‑management firm in South Florida, eventually becoming a partner who shapes the firm’s strategic direction. She
    plans to earn the Certified Financial Planner (CFP) credential and deepen her expertise in impact investing to serve socially conscious clients. A core ambition is to launch a community‑focused financial
    literacy program targeting Black and Afro‑Caribbean families in Broward County, helping them navigate wealth building and intergenerational wealth transfer. Over the next five years, she also hopes
    to author a guidebook on personal finance for mid‑career professionals and to speak at industry conferences about integrating holistic well‑being into financial planning.
