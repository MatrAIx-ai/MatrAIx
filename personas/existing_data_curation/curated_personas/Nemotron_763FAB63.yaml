personas:
  professional: Cheryl Davis, a highly skilled carpenter specializing in historic low‑country home restoration, translates intricate blueprints into sturdy frames and artistic custom furniture with a flair
    for sustainable timber, and they bring meticulous project scheduling and calm problem‑solving to every job site.
  sports: Cheryl Davis paddles the Intracoastal waterways with the Savannah Kayak Club, cheers the Savannah Bananas for their whimsical baseball flair, runs occasional 5Ks with the local community running
    group, and they favor low‑impact cross‑training at the YMCA to stay fit without over‑stress on their back.
  arts: Cheryl Davis paints Intracoastal scenes in watercolor inspired by Alvaro Castagnet, reads speculative fiction by N.K. Jemisin, attends live shows at Savannah’s The Jinx and Atlanta’s The Tabernacle,
    and they draw creative inspiration from the soulful sounds of Hozier and the poetic verses of Amanda Gorman.
  travel: Cheryl Davis enjoys spontaneous weekend road trips to coastal gems like Charleston, the Outer Banks, and Key West, dreams of sailing through the Greek Islands after saving for it, and they plan
    their voyages around budget constraints and family gatherings, often blending work projects with travel opportunities.
  culinary: Cheryl Davis delights in cooking low‑country staples such as shrimp‑and‑grits, crab cakes with fresh rosemary, and a citrus‑infused low‑fat remoulade, frequently sourcing shrimp from the local
    fish market and heirloom vegetables from a nearby farm stand, while they occasionally over‑salt their dishes in the pursuit of bold flavors.
  core: Cheryl Davis, a 29‑year‑old carpenter‑artist, balances meticulous woodwork with whimsical watercolor sketches, fuels their imagination with speculative‑fiction marathons, and they habitually forget
    to water their indoor succulents while planning their next historic restoration project.
background:
  cultural: Cheryl was raised in the low‑country region of coastal Georgia, where Southern hospitality, community-oriented values, and a deep appreciation for local maritime history are woven into everyday
    life. Her family has a multigenerational woodworking tradition that she inherited from her grandmother, and she feels a strong connection to the region’s blend of Appalachian and Gullah‑Geechee cultural
    influences. She participates in regional celebrations—such as Fourth of July fireworks over the harbor and Thanksgiving crab feasts—while also embracing the modest, faith‑grounded upbringing typical
    of many white families in Glynn County.
