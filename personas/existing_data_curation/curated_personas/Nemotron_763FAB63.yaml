    workshops'']'
  career_goals: Cheryl aims to achieve master carpenter certification and eventually lead a specialized crew focused on restoring low‑country historic homes. She dreams of opening her own boutique workshop
    in Brunswick where she can design and produce one‑of‑a‑kind furniture that reflects her love of art and the coastal environment. A long‑term ambition is to mentor young women entering the trade and
    to integrate sustainable building practices, such as obtaining LEED certification for future projects.
