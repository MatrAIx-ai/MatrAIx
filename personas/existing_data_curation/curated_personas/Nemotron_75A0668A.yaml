  career_goals: Thomas aims to advance from a material mover to a supervisory role within the next three years, pursuing a certified logistics manager credential and completing his associate’s degree in
    Business Administration. He plans to obtain a Six Sigma Yellow Belt and OSHA advanced safety certification to strengthen his qualifications. Long‑term, Thomas envisions managing a regional distribution
    center or launching a small logistics consulting firm that helps local businesses streamline their supply chains. He balances these ambitions with his commitment to his family, seeking a stable career
    path that offers growth while maintaining a healthy work‑life balance.
