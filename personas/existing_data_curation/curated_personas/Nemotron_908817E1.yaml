  career_goals: Imani aims to pursue a career in nursing, envisioning herself as a registered nurse who can combine her compassionate nature with her desire for a structured, stable profession. She plans
    to attend a community college with a strong health sciences program, earn an associate degree in nursing, and later transfer to a four‑year university to become a registered nurse. Her long‑term ambition
    includes working in a community health clinic in Sumner County, where she can give back to the neighborhood that raised her. She also hopes to mentor younger students, encouraging them to consider healthcare
    as a viable and rewarding path.
