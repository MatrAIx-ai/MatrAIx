personas:
  professional: Imani Williams is a budding storyteller who blends writing, music, and code, using their practical, organized mindset to craft interactive narratives on Scratch while leading the school
    choir’s tech support and maintaining a disciplined practice schedule for hip‑hop dance.
  sports: Imani Williams loves playing pickup basketball at the community park, follows the NBA’s Denver Nuggets for inspiration, participates in the local Saturday Hoops League, and balances cardio with
    a weekly attendance at the high school’s hip‑hop dance class as an alternative form of cross‑training.
  arts: Imani Williams immerses themselves in the arts by reading YA novels by Angie Thomas and Brit Bennett, listening to R&B singers H.E.R. and SZA as well as hip‑hop icons Kendrick Lamar and J. Cole,
    drawing comic‑style sketches inspired by manga artist Naoki Urasawa, and performing in the school choir that frequently covers songs by Beyoncé and Sam Smith.
  travel: Imani Williams enjoys weekend trips to nearby Washington, D.C., for its museums and has a summer vacation plan to visit the beaches of Miami and the historic streets of Boston, while day‑dreaming
    about future trips abroad to Tokyo for its pop‑culture scene and Paris for its art galleries, preferring a blend of structured itineraries and spontaneous local explorations.
  culinary: Imani Williams often bakes vanilla cupcakes topped with salted caramel frosting and chewy chocolate‑chip cookies, delights in experimenting with matcha green‑tea frosting and homemade buttercream,
    while skillfully whipping up simple pasta dishes like garlic‑butter spaghetti for family meals, yet occasionally forgets to set a timer, resulting in slightly over‑baked treats.
  core: Imani Williams is an organized teen who balances creative coding, baking, and basketball with a disciplined routine, a love for R&B and hip‑hop, and occasional impulse buys of streetwear.
background:
  cultural: Imani grew up in a close‑knit African American family in White House, Tennessee, where church, community, and family traditions shape daily life. Her parents are active members of the local
    Baptist congregation, and she has been involved in church youth programs and choir since childhood. Family gatherings often feature Southern comfort food such as collard greens, fried chicken, and cornbread,
    while storytelling about her grandparents' migration from the rural South to Tennessee reinforces a sense of resilience and pride. The community’s emphasis on mutual support and education has encouraged
    Imani to value both academic achievement and service, influencing her aspirations to become a nurse who can give back to her hometown.
