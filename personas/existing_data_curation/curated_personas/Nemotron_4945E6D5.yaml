personas:
  professional: Mia Orellana, an aspiring multidisciplinary visual artist, channels their curiosity and methodical planning into meticulous sketching, digital illustration, and folk‑inspired canvases, while
    they use their outgoing energy and assertive reliability to drive the school art club’s exhibitions and community event designs.
  sports: Mia Orellana stays active through weekly hip‑hop dance sessions, seasonal community swimming at the Houston YMCA in summer, and occasional pickup basketball games while they cheer on the Houston
    Rockets, Astros, and Dynamo as their favorite professional sports teams.
  arts: Mia Orellana immerses themselves in artistic creation—sketching daily in a vibrant journal, producing digital illustrations inspired by Frida Kahlo’s folk palettes, painting canvases echoing the
    color stories of Diego Rivera, practicing guitar to the rhythms of Tame Impala, and they draw narrative inspiration from YA authors like Sarah J. Maas and indie filmmaker Greta Gerwig.
  travel: Mia Orellana favors weekend day trips to Houston’s Museum District, Galveston’s beachside boardwalk, and the vibrant San Antonio River Walk, while they dream of a cultural immersion tour in Oaxaca
    to study traditional folk art and a future backpacking adventure through Barcelona’s street murals and Tokyo’s neon design districts.
  culinary: Mia Orellana enjoys a flavorful mix of homemade chicken tacos with cilantro‑lime salsa, creamy avocado guacamole, and occasionally attempts authentic mole sauce, balancing a moderate cooking
    skill that lets them whisk together fresh ingredients while they also indulge in late‑night pizza slices topped with pepperoni and jalapeño.
  core: Mia Orellana blends meticulous organization with a restless creative spark, often staying up late perfecting sketches while they habitually forget to water their succulents and lose sleep over unfinished
    projects.
background:
  cultural: Mia is a first‑generation Mexican‑American raised in Houston's vibrant multicultural neighborhood. Her household speaks Spanish, and she celebrates Mexican traditions such as Día de los Muertos,
    quinceañera celebrations, and family gatherings featuring tamales and pozole. She regularly attends local cultural festivals like Cinco de Mayo parades and participates in community Mexican dance classes,
    preserving her heritage through music, art, and cuisine. At the same time, she embraces the Texan influence of the city, blending diverse cultural experiences into her identity and using her bilingual
    background to bridge communities.
