    ''Reading contemporary YA novels'', ''Writing short stories'', ''Community center volunteering'', ''Visiting museums and galleries'', ''Indie film watching'', ''Creative video gaming (Minecraft)'']'
  career_goals: Mia aims to attend a specialized high‑school program in visual arts and later pursue a bachelor's degree in graphic design or museum studies. She dreams of becoming a curator or community
    arts educator who can design inclusive, bilingual cultural programs for youth in Houston. By combining her artistic skills with technology, she also envisions a career in UI/UX design that creates accessible
    digital experiences. Mia is determined to earn scholarships that support her education, and she hopes to eventually work at the Houston Museum of Fine Arts or launch a youth art mentorship initiative
    that celebrates Mexican‑American heritage.
