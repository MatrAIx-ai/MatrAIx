personas:
  professional: Tou Boen, a senior architectural drafter with nearly two decades of experience mastering AutoCAD, Revit, and SolidWorks, channels a methodical, deadline-driven workflow into flawless construction
    documents while mentoring junior staff and laying the groundwork to become their firm's BIM manager.
  sports: Tou Boen follows the Los Angeles Dodgers and the LA Lakers, joins the Downtown LA Road Runners club for early morning interval runs, practices yoga at a local studio twice weekly, and keeps their
    fitness tracker calibrated to hit a 10,000-step daily goal, though they prefer solitary cardio over team sports.
  arts: Tou Boen cultivates artistic expression through piano practice of Debussy's Arabesques and Chopin's Etudes, admires the architectural photography of Iwan Baan and the designs of Frank Lloyd Wright,
    and regularly visits LACMA to view contemporary installations, while occasionally collecting scale model kits of historic landmarks.
  travel: Tou Boen meticulously plans trips using spreadsheets, has explored Kyoto's historic temples and Barcelona's Gaudi sites to feed their architectural curiosity, prefers structured city tours over
    spontaneous beach vacations, and aims to hike the Appalachian Trail in the coming year while balancing their work commitments.
  culinary: Tou Boen applies their precision mindset to cooking, perfecting hand-folded jiaozi with exact weight ratios, mastering sushi rice fermentation with a rice-to-vinegar 1:0.12 measurement, and
    sourcing specialty ingredients like nori sheets and fresh wasabi, while occasionally treating themselves to a high-end omakase experience.
  core: Tou Boen is a 40-year-old drafting expert who fuses meticulous engineering rigor with solitary creative hobbies, a competitive drive for error-free work, and a habit of obsessively tracking every
    detail—from budget line items to sushi rice ratios.
background:
  cultural: Tou Boen was born in Pomona, CA, to parents who emigrated from Taiwan in the early 1980s. Growing up in a bilingual household, she spoke Mandarin at home while attending English‑language schools,
    giving her fluency in both languages. Her family placed a strong emphasis on education, discipline, and respect for tradition—values that shaped her organized and methodical personality. She regularly
    observes cultural celebrations such as Lunar New Year and the Mid‑Autumn Festival, preparing traditional dishes and sharing them with friends and coworkers. While she cherishes her East Asian heritage,
    she also embraces the multicultural environment of Southern California, participating in local community workshops that promote STEM outreach to under‑represented youth. Her cultural background informs
    her appreciation for precision, harmony in design, and a balanced perspective between collective responsibility and personal ambition.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SolidWorks'', ''BIM Coordination'', ''California Building Code compliance'', ''ANSI/ISO drafting standards'', ''3D modeling'', ''Technical detail drawing'', ''Clash
    detection'', ''Project scheduling (MS Project)'', ''Quality assurance and control'', ''Cost estimation basics'']'
  hobbies: '[''Sudoku and complex puzzle solving'', ''Urban gardening'', ''Precision cooking (Chinese dumplings, Japanese sushi)'', ''Scale model kit building'', ''Architectural photography'', ''Piano practice'',
    ''Mandarin language study'']'
  career_goals: Tou aims to transition from senior drafter to BIM manager within her firm, leading the implementation of standardized BIM processes across projects in Los Angeles County. She is pursuing
    the Autodesk Certified Professional – Revit credential and plans to enroll in a part‑time Master’s program in Construction Management to deepen her knowledge of project delivery and sustainable construction.
    Over the next five years she hopes to champion workflow‑optimization initiatives that cut drafting turnaround time by at least 15%, earn recognition for error‑free documentation, and eventually mentor
    a small team of drafters while contributing to the firm’s bid strategy for large public infrastructure contracts. Her competitive drive and desire for personal mastery motivate her to continuously refine
    her technical skills and assume greater leadership responsibilities.
