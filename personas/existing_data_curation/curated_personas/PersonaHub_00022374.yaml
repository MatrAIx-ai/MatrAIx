persona_description: A microbiologist who specializes in the study of superbugs, particularly those that cause diseases in humans and animals. She heads up the Bioluminescent Superbugs Lab at the University
  of Auckland and has been awarded the New Zealand Order of Merit for services to microbiology and science communication. Her research interests include the evolution of superbugs, the development of new
  antibiotics, and the use of fungi to combat antibiotic resistance.
