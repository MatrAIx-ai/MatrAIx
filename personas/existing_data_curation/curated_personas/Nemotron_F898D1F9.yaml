personas:
  professional: Brandon Perry, a pint-sized architect in the making, constructs elaborate block castles at preschool, channeling a balance of curiosity and practicality while preferring solo play over group
    projects.
  sports: Brandon Perry dabbles in the neighborhood kids' soccer league with the 'Cedar Rapids Cubs' while dreaming of cheering for the Chicago Cubs on TV, and after practice he loves hopping on a tricycle
    to mimic his favorite basketball star LeBron James' rebounds.
  arts: Brandon Perry spends afternoons drawing pictures of dinosaurs in the style of Eric Carle, watches Mister Rogers' Neighborhood for gentle storytelling, and sings along loudly to The Wiggles' 'Fruit
    Salad', turning his living room into a miniature stage.
  travel: Brandon Perry prefers low‑key family outings, like weekend trips to the nearby lake where he can splash in the water, but his imagination soars when he watches videos of Disneyland in Anaheim,
    which he hopes to experience someday, while his parents carefully plan every detail to avoid stress.
  culinary: Brandon Perry favors creamy mac and cheese, chicken nuggets with ketchup, and banana slices dipped in peanut butter, often demanding the extra sprinkle of shredded cheddar on his toast, yet
    he stubbornly refuses peas and broccoli, making dinner negotiations a nightly routine.
  core: Brandon Perry is a curious yet wary four‑year‑old who builds block fortresses, saves coins in a messy piggy bank, battles itchy skin, idolizes superheroes, and quietly dreams of distant theme parks
    while preferring quiet corners.
background:
  cultural: Brandon is raised in a white, middle‑class family in Lehi, Utah. His household blends typical suburban American customs with local Utah influences, such as weekend family gatherings, celebration
    of Western European holidays, and a strong appreciation for the surrounding natural landscape. The community values safety, modesty, and outdoor recreation, shaping Brandon’s preference for quiet, nature‑related
    activities and his cooperative, considerate demeanor.
attributes:
  skills: '[''fine‑motor coordination (block stacking, crayon use)'', ''basic narrative language skills'', ''simple puzzle solving'', ''following short routines'', ''cooperative play with peers'']'
  hobbies: '[''building with wooden blocks'', ''drawing/coloring'', ''listening to bedtime stories'', ''watching nature/science videos'', ''sensory play (sand, water)'']'
  career_goals: Even at his age, Brandon imagines future roles that combine curiosity with a desire to help others, such as a "science explorer" who discovers how things work or a "teacher" who shares knowledge.
    He is drawn to occupations that let him work independently in a calm setting while still contributing to a harmonious group, reflecting his kind and cooperative nature.
