persona_description: A scientist at Florida State University and the National Oceanic and Atmospheric Administration who specializes in the study of ocean and atmospheric dynamics, particularly storm surge
  modeling and forecasting. His research interests include the development of new models and procedures for improving the accuracy of storm surge forecasts for the Gulf Coast from Florida to Texas. He has
  published his findings in the journal Geophysical Research Letters and has received funding from a NOAA Applied Research Center grant to support his research.
