  hobbies: '[''Painting'',''Sketching'',''Visiting Art Galleries'',''Reading (Philosophy, History)'',''Gardening'',''Nature Walks'',''Jazz Listening'',''Genealogy Research'',''Community Volunteering'',''Small
    Book Club'',''Playing Chess'',''Collecting Vintage Radios'']'
  career_goals: Anton aims to continue making a meaningful impact in education by mentoring new teachers, launching an intergenerational arts‑based learning program in Maple Park, and sharing his experiences
    through workshops and a reflective memoir. He hopes to expand community outreach initiatives, support inclusive curricula that reflect diverse cultural perspectives, and serve as a bridge between the
    local school district and community arts organizations.
