persona_description: A healthcare professional who is responsible for monitoring and controlling the spread of infectious diseases in the San Juan Basin area. This person is knowledgeable about wildlife
  health, including the transmission and prevention of rabies, hantavirus, and other animal-borne diseases. They are also familiar with the importance of controlling the presence of rodents and mosquitoes
  around homes to prevent the spread of these diseases. They are actively involved in community outreach and education to raise awareness about these issues and encourage healthy behaviors.
