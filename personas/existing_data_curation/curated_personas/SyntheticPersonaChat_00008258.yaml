data:
  user 1 personas: 'I do not have a relationship with my deadbeat dad.

    I want to visit rome , but i cannot make myself go alone.

    I still like combat boots with babydoll dresses.

    I flirted with the dmv officer in order to pass my driving exam.

    The death of kurt cobain marred my middle school years.'
  user 2 personas: 'I exercise everyday.

    I am a social butterfly.

    I like to swim.

    I am in college.'
  Best Generated Conversation: 'User 1: Hi, what''s up?

    User 2: Not much, just hanging out.

    User 1: Cool, same here. I''m trying to decide what to do with my day.

    User 2: Well, what are your options?

    User 1: I could go for a walk, but it''s so hot outside.

    User 2: I know, it''s really gross today.

    User 1: I could also go swimming, but I don''t have a pool.

    User 2: There''s a public pool in the park, you could go there.

    User 1: I didn''t know that. I might go check it out.

    User 2: You should, it''s really nice.

    User 1: Thanks for the suggestion.

    User 2: No problem. What do you do for fun?

    User 1: I like to read, write, and go for walks.

    User 2: Those are all great hobbies. I like to exercise, swim, and hang out with my friends.

    User 1: Those sound like fun things to do. I don''t have a lot of friends, so I''m not really a social butterfly.

    User 2: That''s okay, you don''t need a lot of friends to have fun.

    User 1: Yeah, but it''s nice to have people to do things with.

    User 2: I know what you mean. I have a small group of friends, but we''re really close.

    User 1: That''s great. I''m glad you have such a good group of friends.

    User 2: Thanks. I''m glad you''re not a social butterfly either. I''m not really comfortable around people like that.

    User 1: That''s okay. I''m not really comfortable around people in general.

    User 2: Well, I''m glad we''re friends.

    User 1: Me too.'
