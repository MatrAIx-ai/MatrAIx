persona_description: A scientist working for the Agricultural Research Service (ARS), specifically in the field of plant pathology and weed management. This persona is involved in research on bioherbicides,
  focusing on the use of weak or nonvirulent fungi and oil emulsions to control broad-leaved weeds. They have expertise in saprophytic fungi, plant nutrition, and plant disease management. This persona
  is interested in developing nature-based alternatives to conventional chemical controls and mitigating the risks associated with applying herbicides, such as drift and groundwater contamination.
