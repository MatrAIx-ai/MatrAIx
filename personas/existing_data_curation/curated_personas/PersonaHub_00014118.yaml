persona_description: A healthcare professional who is responsible for processing claims and ensuring that they are correctly coded according to the International Classification of Diseases Codes, 9th Revision,
  Clinical Modification (ICD-9-CM). This individual is required to use the ICD-9-CM system to accurately describe illnesses, injuries, and accidents for the purpose of medical research and reporting. They
  are responsible for ensuring that the primary diagnosis is listed first, and that the codes used are medically relevant and substantiate the need for the level of service provided. Confusion on the part
  of the payer can be avoided by including the ICD-9-CM code on each claim and limiting the codes used to those most pertinent and most clearly medically related to the services provided.
