  career_goals: John aspires to pursue a career that blends his love of science, hands‑on problem solving, and community involvement. In the short term, he aims to maintain strong grades in math and science,
    take on leadership roles in the school robotics club and student council, and earn a badge in first aid. Long‑term, he hopes to study civil or mechanical engineering at a university, work on sustainable
    infrastructure projects that benefit Englewood and the greater Denver area, and mentor younger students through STEM outreach programs.
