personas:
  professional: A budding robotics enthusiast and self‑taught electronics tinkerer, John Alderson channels his methodical planning and sociable energy into building Scratch games, leading his middle‑school
    robotics club, and coordinating volunteer tech setups at the annual Fourth of July community festival where they mentor teammates and schedule weekly build sessions.
  sports: A dedicated midfielder for the Englewood Junior Soccer Club, John Alderson combines weekend practices with hikes up the nearby foothills, cheers on the Colorado Avalanche and Denver Broncos, and
    follows a disciplined routine of stretching and cardio drills that they track on a fitness app.
  arts: A high‑energy drummer in the youth band “Peak Rhythm,” John Alderson draws inspiration from Foo Fighters and Imagine Dragons, spends free time building LEGO sculptures of famous album covers, and
    mixes tracks on a beginner’s digital audio workstation while listening to Billie Eilish on repeat.
  travel: Having camped in Rocky Mountain National Park and ski‑lifted at Vail with their family, John Alderson dreams of a road trip along the Pacific Coast Highway to explore San Francisco’s tech museums,
    preferring detailed itineraries that balance adventure hikes with scheduled rest stops at local pizza joints.
  culinary: A budding home‑cook, John Alderson loves whipping up pepperoni pizza with extra mozzarella, crafting chocolate chip banana muffins after soccer, and assembling trail‑mix snack bags of almonds,
    dried cranberries, and pretzel sticks for weekend hikes, though they often over‑salt the pasta sauce in their enthusiasm.
  core: John Alderson is a methodical, socially‑charged teen who juggles robotics projects, drum beats, and a relentless quest for the perfect LEGO set, even if that means staying up late scrolling through
    online hobby forums.
background:
  cultural: John comes from a white, middle‑class family with roots in the American Midwest and the Rocky Mountain West. Growing up in Englewood, Colorado, he has been shaped by the region’s strong outdoor
    culture, community‑oriented values, and a blend of traditional American holidays with local traditions such as Fourth‑of‑July parades and city festivals. His family emphasizes education, volunteerism,
    and enjoying the surrounding foothills and ski resorts. While primarily identifying with mainstream American culture, John is aware of the multicultural makeup of his community and respects diverse
    perspectives.
