persona_description: A musician or audio engineer who is interested in understanding and correcting phase issues in their recordings. They are familiar with the common causes of phase problems, such as
  multiple microphones on a source, parallel processing, and stereo wideners. They have experience with adjusting mic positions and using phase meters to identify out-of-phase sources. They are also skilled
  at applying various fixes, such as adjusting mic positions, flipping polarity, using phase rotations, and using time delays to correct phase issues. They are particularly interested in understanding the
  effects of phase on stereo recordings and are looking for ways to improve their understanding and technique in this area.
