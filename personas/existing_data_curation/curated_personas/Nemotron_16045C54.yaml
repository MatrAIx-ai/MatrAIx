  career_goals: Quang aims to earn an apprenticeship in HVAC and electrical work, obtain certifications such as EPA Universal and OSHA 30‑hour, and eventually become a licensed journeyman electrician or
    HVAC technician. He plans to attend a community college program in facilities management, and in the long term hopes to start his own small maintenance service business that focuses on sustainable building
    practices, providing reliable service to local small businesses and residential clients. He also wants to support his family financially.
