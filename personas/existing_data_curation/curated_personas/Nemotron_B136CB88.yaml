personas:
  professional: Suzanne Corcoran, a budding kindergarten “storytime curator” who loves to arrange picture books and craft mini art displays, exhibits a natural curiosity and an open mind, thrives in flexible,
    unstructured play, prefers small, quiet circles of peers, and they bring kindness and cooperation to every group activity.
  sports: Suzanne Corcoran, who delights in weekly Mini Soccer Club sessions with the ‘Little Tigers’ during fall, enjoys splash‑time swim lessons in winter, prefers informal backyard games over organized
    drills, and they cheer enthusiastically for the New York Yankees whenever a game airs.
  arts: Suzanne Corcoran, who spends afternoons coloring with Crayola crayons, is fascinated by the bright swirls of Van Gogh’s ‘Starry Night’ in picture‑book form, sings along to Idina Menzel’s ‘Let It
    Go’ from Frozen, enjoys watching Sesame Street’s Elmo, and they often stage imaginative puppet shows for their small circle of friends.
  travel: Suzanne Corcoran, who enjoys spontaneous family trips to the local zoo and seaside boardwalk, eagerly anticipates a future holiday to Disneyland and dreams of seeing the Eiffel Tower in Paris
    one day, prefers short, familiar outings over extended travel, and they collect tiny stickers from each destination in a travel journal.
  culinary: Suzanne Corcoran, who delights in digging into creamy mac and cheese and crunchy apple slices with a drizzle of caramel, helps whisk batter for banana pancakes with flour, sugar, and mashed
    bananas under parental supervision, and they favor bright, sweet flavors while occasionally sneaking a bite of the secret chocolate chip topping.
  core: Suzanne Corcoran, a curious five‑year‑old who relishes quiet art corners, spontaneous piggy‑bank savings, occasional sticky‑fingered snack raids, and they gently guide small friend groups with a
    calm, kind heart.
background:
  cultural: Suzanne is raised as a White child in Lakeville, Minnesota, a suburban community in Scott County that reflects typical Midwestern values of modesty, community cohesion, and appreciation for
    the outdoors. Her family observes seasonal celebrations such as Thanksgiving, Christmas, and summer community picnics, often incorporating simple traditions like holiday crafts and nature walks. The
    local early‑learning environment emphasizes creative play, early literacy, and social cooperation, aligning with the region’s emphasis on kindness, respect, and a relaxed approach to daily routines.
