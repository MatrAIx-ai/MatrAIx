  career_goals: Even at five, Suzanne dreams of becoming someone who creates and shares beauty. She often talks about wanting to be an artist—perhaps a painter or illustrator—who can bring her colorful
    ideas to life. She also imagines helping animals as a future veterinarian or caring for children as a teacher, reflecting her kind and cooperative nature. Her ambitions are guided by a desire for flexibility
    and the freedom to explore new ideas rather than a fixed, rigid career path.
