persona_description: A researcher who specializes in the study of animal behavior, particularly the social and physical adaptations of tree-climbing animals. They are particularly interested in the solitary
  and asocial behavior of the cuscus, their nocturnal foraging habits, and their use of sounds and chemicals to communicate. They are also interested in the dietary habits of the cuscus and their reproductive
  behavior, including the development of young and the feeding of offspring. They have conducted extensive research on the cuscus in Australia, New Zealand, and associated islands, and have published their
  findings in scientific journals.
