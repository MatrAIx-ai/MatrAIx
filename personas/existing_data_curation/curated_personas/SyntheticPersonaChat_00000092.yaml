    User 2: Grey is a nice color. I like it too.

    User 1: What do you like to do for fun?

    User 2: I like to read, go for walks, and spend time with my friends and family.

    User 1: That sounds like fun. I like to do those things too.

    User 2: I''m glad!

    User 1: So, what are you reading right now?

    User 2: I''m reading The Great Gatsby by F. Scott Fitzgerald.

    User 1: Oh, that''s a great book! I''ve read it a few times.

    User 2: I''m enjoying it so far.

    User 1: It''s a classic for a reason.

    User 2: I can see why.

    User 1: What''s your favorite drink?

    User 2: My favorite drink is Dr Pepper.

    User 1: Dr Pepper is good. I like it too.

    User 2: I''m glad!

    User 1: So, what''s the craziest thing you''ve ever seen in the emergency room?

    User 2: I''ve seen a lot of crazy things, but one that sticks out is the time a guy came in with a snake stuck in his pants.

    User 1: Oh my god! That''s crazy!

    User 2: I know, right? It was a wild day.

    User 1: I''m sure it was.

    User 2: It was.

    User 1: Well, it was nice talking to you. I have to go now.

    User 2: It was nice talking to you too. Have a good day!

    User 1: You too!'
