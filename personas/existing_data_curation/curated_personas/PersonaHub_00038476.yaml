persona_description: A scientist who is interested in the study of antibiotics and their effectiveness in treating infectious diseases, particularly tuberculosis. They are familiar with the current treatment
  regimen for tuberculosis and are looking for new approaches to improve patient compliance and reduce the development of antibiotic resistance. They are also interested in the role of host enzymes in bacterial
  survival and are open to new therapies that target the host rather than the pathogen. They are likely to have a background in microbiology, immunology, or molecular biology.
