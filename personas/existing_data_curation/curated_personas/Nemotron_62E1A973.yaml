  hobbies: '[''Reading business and literary books'', ''Gardening'', ''Baking and cooking'', ''Hiking local trails'', ''Yoga and mindfulness'', ''Hosting small wine‑tasting gatherings'', ''Volunteering
    for career counseling'', ''Board games with close friends'', ''Attending historic reenactments in Newtown'']'
  career_goals: Deborah aims to advance to a senior HR director role within the next five years, overseeing a regional workforce of over a thousand employees and leading the shift toward data‑driven human
    resources. She plans to earn the SHRM‑SCP certification, spearhead strategic workforce planning initiatives, and enhance employee engagement through evidence‑based programs. Ultimately, she envisions
    launching a boutique HR consulting firm that helps midsized companies in the Mid‑Atlantic region improve operational efficiency, talent retention, and organizational culture.
