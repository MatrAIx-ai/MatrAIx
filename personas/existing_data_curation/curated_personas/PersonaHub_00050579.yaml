persona_description: A scientist working at the USDA's Sustainable Perennial Crops Laboratory in Beltsville, Maryland, who specializes in mycology and has expertise in biological control of plant diseases.
  He collaborates with Peruvian collaborators to conduct cacao collection expeditions and identify new varieties of cacao. His research focuses on the potential of fungi found in wild Peruvian cacao trees
  for biological control of cacao diseases such as witches' broom disease.
