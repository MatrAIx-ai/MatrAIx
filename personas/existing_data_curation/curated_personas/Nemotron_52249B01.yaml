  hobbies: '[''Classic car shows'', ''Vintage truck restoration'', ''Fishing'', ''Woodworking'', ''Listening to classic rock and podcasts'', ''Reading DIY and tech articles'', ''Community clean-up volunteering'']'
  career_goals: Danial aims to move into a supervisory role overseeing a fleet maintenance department, eventually managing a team of cleaners and mechanics for a regional logistics company. He plans to
    obtain certification in industrial cleaning safety and explore eco‑friendly detailing methods. In the long term, he aspires to launch his own auto‑detailing business that emphasizes sustainable practices
    and offers apprenticeship opportunities for local youth. He also wants to develop a community mentorship program that shares practical maintenance skills with older adults and teenagers in his county.
