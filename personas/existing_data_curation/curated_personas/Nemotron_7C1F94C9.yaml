  career_goals: Laurie's career goals build on her current role and her desire for advancement and impact. In the next two years she aims to become a Customer Service Team Lead, supervising a small group
    of reps and driving performance metrics. She plans to pursue a bachelor's degree in Business Administration part‑time, positioning herself for a Department Manager role within five years. Long‑term,
    she envisions moving into Operations Management, overseeing multiple service channels and shaping customer‑experience strategy. Additionally, she hopes to integrate her love of art by spearheading a
    corporate community‑outreach program that partners the call center with local art festivals and schools. Eventually, she may open a boutique art‑and‑craft shop in Jasper, combining entrepreneurship
    with her creative interests.
