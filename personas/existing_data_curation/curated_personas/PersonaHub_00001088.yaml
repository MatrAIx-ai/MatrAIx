persona_description: Jennifer Bristol, a state coordinator for Texas Children in Nature, has a passion for connecting children with nature and has created award-winning conservation education curriculum
  and youth development programs. She is interested in improving how children interact with nature through technology and has a unique perspective on how to build relationships in unexpected places. She
  is knowledgeable about apps that can be used to explore the outdoors, such as iTrack Wildlife, Backpacker GPS Trails, Audubon field guides, Leafsnap, and iMap 5.0. Her expertise lies in the field of conservation
  education and youth development, and she is passionate about creating resources for children to explore the outdoors.
