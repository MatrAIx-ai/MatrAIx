personas:
  professional: Pho Tapaoan, a ten‑year‑old budding coder, channels curiosity and practicality into designing simple adventure games on Scratch, often documenting each project in a neatly organized journal
    while sharing the finished games with her small circle of friends.
  sports: Pho Tapaoan, a fan of the Colorado Rockies and Denver Broncos, spends weekends jogging through Littleton’s community park with the Littleton Nature Walkers club and participates in the Littleton
    Youth Soccer League, preferring low‑intensity activities that let her observe birds while staying active.
  arts: Pho Tapaoan, who sketches manga‑style heroes inspired by Hayao Miyazaki’s films and listens to Ludovico Einaudi’s piano pieces while reading adventure novels like The Hobbit, often rehearses simple
    melodies on her piano and draws comfort from the storytelling of Studio Ghibli.
  travel: Pho Tapaoan, who plans trips with meticulous notebook maps, dreams of exploring Yellowstone’s geysers and the Grand Canyon’s rims while also yearning to experience Tokyo’s anime districts, yet
    her family’s modest budget keeps her adventures mostly to local weekend hikes in Colorado’s foothills.
  culinary: Pho Tapaoan, an enthusiastic junior sous‑chef, helps stir fragrant pho broth seasoned with star anise, ginger, and fresh cilantro, enjoys rolling spring rolls with rice paper and shrimp, and
    delights in perfecting her pancake flips, showcasing a budding culinary skill set for her age.
  core: Pho Tapaoan, a ten‑year‑old who blends quiet curiosity with careful organization, finds solace in journaling, coding simple games, and the comforting aroma of family‑made broth, even as they wrestle
    with frequent worries.
background:
  cultural: Pho’s family originated from Vietnam’s central highlands and settled in Littleton, Colorado, after immigrating in the early 2000s. At home, Vietnamese is spoken alongside English, and the household
    observes cultural traditions such as Tet, the Mid‑Autumn Festival, and offering incense at the local Buddhist temple. Foods like pho, bánh mì, and spring rolls are prepared together, linking Pho to
    her heritage. While embracing American school life and community values, she retains a strong sense of collectivism, respect for elders, and the importance of harmony—principles that shape her compassionate
    outlook and collaborative spirit.
