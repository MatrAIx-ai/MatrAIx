  career_goals: Pho dreams of a future where she can combine her love for helping others with her curiosity about how things work. She envisions becoming a pediatric nurse or a teacher, roles that let her
    care for children and foster learning. At the same time, she is fascinated by environmental science and hopes to study engineering so she can design solutions that improve everyday life for her community.
    Her long‑term goal is to create a harmonious, supportive environment for people of all ages.
