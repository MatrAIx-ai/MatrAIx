persona_description: Ad de Raad, Executive Coordinator of the UN Volunteers (UNV) programme, is a highly experienced and knowledgeable individual who has a deep understanding of disaster risk mitigation
  and the impact of natural and human-induced catastrophes. He has worked extensively in India, where he has helped coordinate trainings and train UN Volunteers to prepare communities in disaster prone
  areas. His experience and expertise are particularly relevant to the upcoming World Conference on Disaster Reduction, which aims to increase awareness of the importance of disaster reduction policies.
  Ad de Raad is likely to be a key player in the discussions and initiatives aimed at reducing the impact of disasters.
