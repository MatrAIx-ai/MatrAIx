  career_goals: Julio aims to become a leader in community health, seeking a fellowship in preventive medicine to deepen his expertise in population health. He hopes to establish a clinic that provides
    affordable primary care for underserved Hispanic and immigrant families in the Dallas‑Fort Worth area. He also aspires to publish research on diabetes management in Peruvian‑American populations and
    secure a faculty position to mentor the next generation of physicians. Additionally, he is interested in taking on a department leadership role to influence policy and improve health equity.
