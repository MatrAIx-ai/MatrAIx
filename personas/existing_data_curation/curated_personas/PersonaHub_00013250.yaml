persona_description: A researcher at IBM who specializes in photovoltaic technology, specifically focused on the development and improvement of solar cells using more abundant materials. The researcher
  has made significant progress in increasing the efficiency of solar cells made from copper, zinc, tin, and selenium (CZTS), aiming to achieve efficiencies high enough to make them commercially viable.
  The researcher is working with Japanese thin-film solar company Solar Frontier to further improve the efficiency of CZTS solar cells.
