  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Reading Latin American literature'', ''Playing soccer'', ''Dancing (cumbia, salsa)'', ''Volunteer work at community center'', ''Attending art exhibitions'',
    ''Hiking'', ''Family genealogy research'', ''Mindfulness practice'']'
  career_goals: Although currently not in the formal workforce, Bernardo aims to channel his expertise into community impact. He plans to establish a neighborhood cultural center where he can host workshops
    on Mexican art, language, and cooking, and provide mentorship to local youth. He also aspires to publish a collection of essays documenting Mexican‑American heritage in Southern California, and is considering
    certification in community development to formalize his volunteer leadership. Balancing his curiosity with practicality, he intends to build a modest family‑run Mexican bakery that serves as both a
    business venture and a cultural gathering spot.
