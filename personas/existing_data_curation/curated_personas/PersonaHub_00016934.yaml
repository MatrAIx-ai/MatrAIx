persona_description: A network engineer who is familiar with the implementation and configuration of Layer-2 and Layer-3 protocols, particularly in the context of a network topology with multiple switches
  and routers. They are interested in understanding the implementation details of the Spanning Tree Protocol (STP) in a network with multiple VLANs and the implications of the network topology on the performance
  and stability of the network. They are also interested in the use of ISL trunks and PVST Spanning Tree in the network topology and the impact of the network topology on the performance and stability of
  the network.
