  career_goals: Brando aims to move from a senior production operator to a production supervisor within the next two years, eventually targeting a plant manager role. He plans to earn a Lean Six Sigma Green
    Belt and complete his associate degree in Mechanical Engineering, which will equip him to drive automation projects such as integrating IoT sensors for real-time equipment monitoring. His long-term
    ambition includes establishing a small consultancy that helps regional manufacturers adopt lean practices while also ensuring a stable financial future for his family.
