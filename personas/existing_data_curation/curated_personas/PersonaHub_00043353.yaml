persona_description: A historian or detective who is interested in the history of crime and the study of criminal organizations, particularly those from the 1820s in the Louisiana Territory. They are knowledgeable
  about the Yokum Gang and its members, including Susan Callier, Matthew Yokum, and James Callier. They are also familiar with the events that led to the hangings of Thomas Yokum and the dispersal of the
  gang. They have a keen interest in the details of the gang's activities, including their methods of operation, their targets, and their victims. They are also interested in the broader context of the
  time period, including the economic and social conditions of the region, and the role of the gang in the local community.
