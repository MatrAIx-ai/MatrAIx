personas:
  professional: Bob Tomlinson, a budding robotics enthusiast and digital illustrator, blends methodical programming skills with a vivid imagination, channeling their curiosity into self‑made robots that
    compete in school tournaments while their competitive edge fuels meticulous project planning.
  sports: Bob Tomlinson, a member of the Ridge Riders Cycling Club and the Meadowbrook Middle School basketball team, cheers for the Golden State Warriors and often challenges friends to pickup games, demonstrating
    their competitive spirit and organized training routines.
  arts: Bob Tomlinson, a passionate sketcher and digital creator, idolizes comic legends like Jack Kirby and contemporary artists such as Loish, regularly attends community art fairs, and gamifies their
    drawing practice by incorporating sci‑fi themes inspired by author Brandon Sanderson.
  travel: Bob Tomlinson, who loves weekend cycling trips to the nearby Blue Ridge Mountains and dreams of visiting Kyoto’s manga districts, plans excursions with spreadsheets and often arranges group outings
    to amusement parks, balancing school constraints with a thirst for new cultural experiences, and they relish the anticipation of each new destination.
  culinary: Bob Tomlinson, a self‑titled pizza aficionado, enjoys whipping up pepperoni pizza with homemade dough, snacks on ramen bowls flavored with miso and sriracha, and experiments with baking chocolate
    chip cookies, though they often skip breakfast to maximize gaming time.
  core: Bob Tomlinson, a curious yet competitively driven teen, channels organized energy into robotics, art, and basketball, but they often procrastinate on chores while obsessively tracking comic releases.
background:
  cultural: Bob grew up in Hertford, a small town in Chowan County, North Carolina, within a predominantly White community that values close family ties and community involvement. He has been exposed to
    Southern traditions such as local fairs, high school football culture, and gatherings at churches and town halls. While rooted in these regional customs, his school offers diverse perspectives, fostering
    his curiosity about broader cultures and ideas. This blend of Southern hospitality and openness to new experiences shapes his outlook and daily life.
