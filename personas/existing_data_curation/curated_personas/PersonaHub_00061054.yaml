persona_description: A historian and preservationist who is passionate about documenting and restoring historic buildings and communities. They have a deep understanding of the history of Cairo, Massac,
  Alexander, and Pulaski counties, and have a particular interest in the Civil War era. They have worked with the Heritage Conservation Network and Paducah contractor Bill Black Jr. to restore a shotgun
  style house at 2710 Sycamore Street and are currently involved in the restoration of other historic homes and structures in Cairo. They are also interested in the lives of special and significant Cairo
  residents of the era and the impact of the African American population on the area.
