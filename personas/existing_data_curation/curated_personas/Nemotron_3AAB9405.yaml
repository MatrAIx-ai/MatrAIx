  hobbies: '[''community choir singing'', ''cooking soul food'', ''gardening'', ''volunteering at youth center'', ''recreational basketball'', ''DIY home improvement'', ''traveling to historic African-American
    sites'', ''reading African-American literature'']'
  career_goals: Lisa aims to move into a foreman or shop-supervisor role where she can mentor more apprentices and influence workflow efficiency. She plans to obtain her Certified Welding Inspector (CWI)
    credential and eventually open a boutique metal-fabrication studio that serves local community projects, such as custom playground equipment and public art. Additionally, she hopes to take on a leadership
    position within her local union to advocate for better training opportunities for women in the trade.
