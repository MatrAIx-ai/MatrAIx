personas:
  professional: Lisa Anyim, a veteran sheet‑metal fabricator with 25 years mastering press brakes, CNC plasma cutters, and MIG/TIG welding, blends practical problem‑solving with a curiosity for new techniques
    as they mentor apprentices, oversee quality inspections, and pursue a foreman role and a future boutique studio.
  sports: Lisa Anyim energizes the local women's basketball league each week, they cheer for the nearby WNBA team the Sky while maintaining fitness through early‑morning jogs in the neighborhood park and
    occasional tennis matches with choir friends, demonstrating a competitive yet sociable approach to exercise.
  arts: Lisa Anyim lifts their spirit in the church choir, performing gospel classics by artists like Kirk Franklin and traditional hymns, they unwind with contemporary literature from authors such as Toni
    Morrison and enjoy soulful jazz by John Coltrane, weaving music and reading into their weekly routine.
  travel: Lisa Anyim favors spontaneous weekend road trips to historic heritage sites such as the Freedom Trail in Boston, the preserved district of Savannah, and the Civil Rights Museum in Memphis, preferring
    flexible itineraries over rigid plans while seeking cultural enrichment.
  culinary: Lisa Anyim delights in cooking soulful comfort meals like smoked collard greens, seasoned fried chicken, sweet‑potato pie, and cornbread, they often incorporate fresh vegetables from their garden
    and season dishes with homemade spice blends.
  core: Lisa Anyim blends seasoned metal‑craft expertise with a warm, community‑focused heart, thriving on spontaneous creativity while occasionally juggling disorganized schedules and a lingering habit
    of over‑committing to every new project.
background:
  cultural: Lisa is an African-American who grew up in the Greater New York-Connecticut corridor, where her family blended Southern gospel traditions with the urban culture of the Northeastern United States.
    She celebrates Juneteenth, participates in local Black History Month events, and maintains culinary traditions such as collard greens, cornbread, and sweet potato pie. Her church community and extended
    family network have fostered a strong sense of resilience, collaboration, and mentorship, which she brings to both her personal life and her work in the sheet-metal industry.
attributes:
  skills: '[''press brake operation'', ''metal shearing'', ''CNC plasma cutting'', ''MIG/TIG welding'', ''blueprint reading'', ''OSHA safety compliance'', ''apprentice training'', ''quality inspection'',
