  hobbies: '[''Gardening'', ''Hiking'', ''Woodworking'', ''Model Railroading'', ''Reading Historical Non-Fiction'', ''Chess'', ''Local Wine Tasting'', ''Volunteer Mentoring at Community Center'']'
  career_goals: As he approaches retirement, Daniel aims to cement his legacy by mentoring junior HR staff, formalizing a comprehensive employee‑handbook, and leading a small‑scale project to upgrade the
    organization’s HRIS platform before stepping back. He also hopes to earn the SHRM Senior Certified Professional credential to validate his expertise and to serve as a part‑time HR consultant for local
    non‑profits, ensuring they benefit from reliable HR practices. Ultimately, his ambition is to leave a well‑organized, resilient HR function that can operate smoothly without his day‑to‑day involvement.
