persona_description: A state Department of Parks environmental resource specialist who has been overseeing a project to unlock the mysteries of a cave that yielded a treasure trove of prehistoric animal
  bones from 1906 to 1910 but has been out of the public eye since then. His research has taken him into the cave itself as well as a nearby one that paleontologists are hoping to excavate. His work has
  also put him in contact with relatives of Auburn dentist-paleontologist J.C. Hawver, who found the cave in December 1906.
