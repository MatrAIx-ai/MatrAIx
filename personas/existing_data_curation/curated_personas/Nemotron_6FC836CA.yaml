  hobbies: '[''drawing and painting'', ''collecting shells at the beach'', ''reading picture books and early chapter books'', ''building with LEGO bricks'', ''participating in kids art workshops'', ''listening
    to music and dancing'', ''exploring nature trails'', ''creative storytelling'']'
  career_goals: She dreams of becoming an artist who can paint pictures that tell stories, a marine biologist who explores the Gulf of Mexico’s sea life, or a scientist who invents fun ways to learn. She
    often says she wants to 'make the world more colorful' and 'discover new creatures under the water'. These goals reflect her curiosity, love of art, and desire for varied experiences.
