personas:
  professional: Jane Taylor, a budding junior marine explorer who mixes a love for shells and LEGO engineering, dreams of becoming a marine biologist, and they channel their curious, art‑appreciating nature
    into detailed sketches of ocean creatures while navigating the chaos of a scattered desk with joyful flexibility.
  sports: Jane Taylor, a lively member of the Seaside Sunfish Swim Club who splashes through summer pool laps, also dribbles a soccer ball for the Coastal Kids Soccer Team in the fall, and they cheer loudly
    for the San Francisco Giants while balancing a love for free‑form beach games with a relaxed, unstructured approach to fitness.
  arts: Jane Taylor, an avid doodler of marine scenes, fills her art journal with vibrant hues inspired by marine illustrator John J. Muth and swirls of turquoise reminiscent of the ocean, while dancing
    to Jack Johnson and The Beach Boys, and they often re‑enact scenes from Pixar’s 'Finding Nemo' after watching the film.
  travel: Jane Taylor, an adventurous planner who prefers spontaneous day trips over rigid itineraries, spends weekends combing the local boardwalk and nearby state park trails, has already visited the
    Monterey Bay Aquarium, and dreams of snorkeling at Australia’s Great Barrier Reef and hiking among the towering Redwoods in California.
  culinary: Jane Taylor, a budding chef who loves the salty‑sweet crunch of shrimp tacos with mango salsa, crafts pasta shaped like tiny shells using whole‑wheat flour, and experiments with colorful fruit
    skewers of pineapple, strawberries, and kiwi, often adding a pinch of sea‑salt to her dishes while proudly serving her family at weekend picnics.
  core: Jane Taylor is a beach‑loving, shell‑collecting, LEGO‑building wonder whose boundless curiosity is balanced by a delightfully disorganized routine and a habit of turning every ordinary day into
    a splashy art adventure.
background:
  cultural: Jane is raised in a predominantly white, middle‑class family in North Port, Florida. Her upbringing reflects a blend of suburban American life and the coastal culture of Sarasota County, where
    beach outings, marine wildlife, and community festivals are common. She experiences a mix of Southern Florida hospitality, local school traditions, and family values that emphasize curiosity, independence,
    and a relaxed approach to daily routines.
attributes:
  skills: '[''reading simple chapter books'', ''basic arithmetic (addition and subtraction)'', ''drawing and painting'', ''storytelling'', ''basic digital literacy (tablet use)'', ''creative problem solving'',
