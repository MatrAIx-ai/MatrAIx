personas:
  professional: Belen Perez, a seasoned building inspector with deep expertise in the Illinois Building Code, OSHA safety standards, and local zoning ordinances, leverages her bilingual fluency and meticulous,
    methodical reporting to ensure rigorous compliance while quietly mentoring junior staff and championing a bilingual outreach program aimed at improving safety for Spanish‑speaking homeowners.
  sports: Belen Perez enjoys leisurely walks on local nature trails and participates in a senior fitness class at the community center, while cheering for the Chicago Cubs and the Chicago Bears from her
    living room, and she follows the seasonal rhythm of joining a neighborhood walking club each spring.
  arts: Belen Perez finds creative fulfillment in quilting intricate patterns inspired by traditional textile designs and immerses herself in historical fiction, often devouring works by authors such as
    Philippa Gregory and Cormac McCarthy, while also appreciating folk music of her heritage, especially the soulful melodies of artists like José José and listening to classic films starring Rita Moreno
    in her downtime.
  travel: Belen Perez prefers thoughtfully planned trips that blend cultural immersion with comfort, favoring destinations like the historic colonial town of Guanajuato, the adobe villages of New Mexico,
    and the peaceful lakeside retreats of northern Michigan, all while balancing a modest travel budget and occasional family obligations.
  culinary: Belen Perez’s culinary repertoire showcases her skill in preparing heritage dishes such as mole poblano, hand‑made tamales, and fresh salsa verde, expertly seasoning them with garden‑grown tomatoes,
    chilies, cilantro, and epazote, and she takes pride in her moderate kitchen confidence that turns family gatherings into flavorful celebrations.
  core: Belen Perez is a methodical building inspector who channels her love for structure into meticulous inspections, disciplined budgeting, low‑impact fitness, and a quiet devotion to heritage cooking
    and quilting, punctuated by occasional indulgences in premium fabric and specialty chilies.
background:
  cultural: Belen is a first‑generation Mexican‑American whose parents emigrated from Jalisco. Raised in a bilingual household, she fluently speaks Spanish and English and celebrates Mexican traditions
    such as Día de los Muertos, Cinco de Mayo, and family fiestas, while also embracing the Midwestern values of practicality and community involvement. Her Catholic faith and strong family ties shape her
    compassionate yet self‑reliant worldview. Living in Minooka, Illinois, she blends her cultural heritage with the local small‑town atmosphere, contributing to both the Mexican community and the broader
    county through her professional expertise and community service.
attributes:
  skills: '[''Illinois Building Code Knowledge'', ''OSHA Safety Compliance'', ''Blueprint Interpretation'', ''Structural Assessment'', ''Fire Safety Inspection'', ''Report Writing'', ''Data Management'',
    ''Bilingual Communication (Spanish/English)'', ''Inspection Software Proficiency'', ''GIS Mapping'', ''Scheduling and Coordination'', ''Risk Mitigation'', ''Customer Service'', ''Conflict Resolution'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Quilting'', ''Reading historical fiction'', ''Walking nature trails'', ''Crossword puzzles'', ''Sudoku'', ''Volunteer work at church food bank'']'
  career_goals: Belen aims to advance to a senior supervisory role within the county’s building department, where she can mentor newer inspectors and spearhead a bilingual outreach program that educates
    Spanish‑speaking homeowners on building safety and code compliance. She plans to obtain the Certified Building Official (CBO) credential and to specialize in historic building inspections, preserving
    the architectural heritage of Midwestern towns. As she approaches retirement, she envisions establishing a small consultancy offering home safety audits and energy‑efficiency assessments, while continuing
    to volunteer her expertise for community workshops.
