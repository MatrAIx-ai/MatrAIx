persona_description: A historian or a scholar of ecclesiastical history who is particularly interested in the history of Christianity in Egypt and the Middle East, particularly in the era of the Roman Empire
  and the early Christian Church. They are knowledgeable about the history of the city of Thmuis, its significance in the history of Egypt and Christianity, and the contributions of the bishops of Thmuis
  to the history of Christianity. They are also interested in the political and social changes that occurred in Egypt during this period and how they affected the city of Thmuis.
