personas:
  professional: John Lamerton is an aspiring robotics enthusiast and indie game modder who blends their love of strategy gaming with hands‑on hardware tinkering, using Python scripting to customize game
    mechanics while applying a practical, step‑by‑step mindset to LEGO Technic builds, yet often struggles to meet project deadlines because of their spontaneous aversion to rigid schedules.
  sports: John Lamerton spends weekends shredding at the Orange County Skate Park, cheering on the Los Angeles Dodgers and Lakers while occasionally joining the school’s after‑school Fit Club for group
    workouts, but they sometimes skip warm‑ups before a skate session, resulting in minor bruises.
  arts: John Lamerton dives into the sci‑fi worlds of Isaac Asimov and Neal Stephenson, streams Daft Punk and M83 while building LEGO creations, and follows the YouTube channel of Adam Savage for inspiration,
    and they often emulate Adam Savage’s problem‑solving style, letting these artistic influences shape their imaginative approach to both coding and model building.
  travel: John Lamerton’s travel style blends family‑oriented weekend road trips to San Diego’s beaches and the Redwood forests with a budding fascination for overseas tech hubs, dreaming of a future backpacking
    adventure to Tokyo’s Akihabara district while they budget their allowance for occasional airfare.
  culinary: John Lamerton favors California burritos, spicy ramen, and avocado toast, often experimenting with homemade guacamole using ripe avocados, lime, and cilantro, but they keep their cooking skills
    limited to assembling quick skillet meals and occasional LEGO‑themed cupcake decorations.
  core: John Lamerton is a curious, hands‑on teen who builds robots and LEGO sets, codes game mods on a whim, prefers quiet small‑group hangouts, and balances a kind, cooperative spirit with a habit of
    procrastinating on organization, often telling themselves that they’ll get to it later.
background:
  cultural: John was raised in a middle‑class suburban household in Orange, California. His family’s cultural roots trace back to several generations of American residents of European ancestry, and his
    upbringing reflects a blend of typical West Coast suburban values—emphasis on education, community involvement, and an active outdoor lifestyle. Growing up in the diverse Orange County region, he has
    been exposed to a variety of cultural influences and community programs, shaping a respectful and inclusive outlook while maintaining the traditions and expectations of his own family background.
