  career_goals: John is drawn to careers that combine his love of hands‑on problem solving with his preference for thoughtful, independent work. He dreams of studying engineering—particularly mechanical
    or environmental engineering—so he can design practical solutions that improve everyday life. He also entertains the idea of becoming a video game developer, where he could blend his coding hobby with
    creative storytelling. While he remains open to various paths, his long‑term ambition is to pursue higher education in a STEM field that lets him work on tangible projects and collaborate in small,
    focused teams.
