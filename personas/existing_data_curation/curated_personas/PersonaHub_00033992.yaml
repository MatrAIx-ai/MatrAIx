persona_description: A Soviet mathematician, computer specialist, and economist who was part of a group of scientists who proposed the idea of building a nationwide computer network in the USSR. He was
  interested in the political reasons behind the Soviet Union's decision not to build the Internet and the broader implications of cybernetic applications of computers in the national economy. He was a
  member of the group that published the collection of papers called "Cybernetics in the Service of Communism" in October, 1961, and he was a prominent figure in the movement to reform Soviet science under
  the banner of cybernetics, mathematical modeling, and computer simulation. He was also a specialist in military computing and proposed a network of computer centers that would be used for both economic
  and military purposes.
