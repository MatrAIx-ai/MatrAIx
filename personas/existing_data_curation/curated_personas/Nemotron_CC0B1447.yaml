personas:
  professional: A budding robotics enthusiast named Aaron Cwalinski channels curiosity and practicality into designing LEGO-based mechanisms for their school’s robotics club, where they balance meticulous
    documentation with spontaneous improvisation during competitions.
  sports: An energetic soccer aficionado named Aaron Cwalinski captains the Oak Ridge Lions youth team and follows the professional club River City FC, where they blend competitive drills with weekend fishing
    trips on Lake Hartwell and occasionally join a community basketball pick‑up league during winter.
  arts: A dynamic creative explorer named Aaron Cwalinski immerses themselves in the worlds of LEGO building, the rhythmic adventures of the soundtrack from 'The Lego Movie', the storytelling of the 'Percy
    Jackson' series, and the animated works of Pixar, while they consider Taylor Swift their favorite musician for her catchy pop anthems that accompany their building sessions.
  travel: An adventure‑seeking explorer named Aaron Cwalinski prefers short, well‑planned family trips, having camped at Shenandoah National Park, fished on Lake Erie, and visited the interactive Science
    Museum of Minnesota, while they dream of a future expedition to the Grand Canyon to combine hiking and geological experiments.
  culinary: A young foodie named Aaron Cwalinski delights in pepperoni pizza, homemade mac and cheese, and crafting their own tacos with corn tortillas, shredded cheddar, seasoned ground beef and fresh
    salsa, while they often attempt to replicate the ketchup‑glazed meatballs from their favorite cooking show.
  core: Aaron Cwalinski is a fiercely curious, competitively spirited nine‑year‑old who blends LEGO engineering with soccer tactics, saves every spare dime for future builds, meticulously manages their
    mild allergies, and remains remarkably calm even amid the fiercest board game battles, while they always keep a smile ready for the next challenge.
background:
  cultural: Aaron lives in Conroe, a suburban city in Montgomery County, Texas, where he experiences a blend of Southern Texan culture and the diverse community of the Greater Houston area. His family is
    of Polish‑American descent, preserving traditions such as celebrating Polish holidays and cooking dishes like pierogi, while also embracing broader American customs such as Fourth of July fireworks
    and local high school football games. Although his middle name, Mohammad, reflects a family connection to friends of Middle‑Eastern background, the household is primarily secular and encourages respect
    for various cultural perspectives. Aaron attends a public elementary school, participates in community events like the Conroe Arts Fair, and enjoys the warm, friendly atmosphere typical of the region.
