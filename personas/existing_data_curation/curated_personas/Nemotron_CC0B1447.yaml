  career_goals: Aaron dreams of becoming an astronaut or a robotics engineer, roles that combine his love for exploration, problem‑solving, and practical application. He also envisions leading a sports
    team, aspiring to be a team captain or a professional soccer player, reflecting his competitive spirit. He wants to use his calm resilience to tackle challenging projects and eventually contribute to
    community STEM outreach programs, helping other kids discover science and technology.
