    ''Team Leadership and Training'', ''Effective Communication'']'
  hobbies: '[''Yoga'', ''Meal Planning and Cooking'', ''Gardening'', ''Reading Non Fiction (Health Policy, Self Improvement)'', ''Volunteering at Health Fairs'', ''Community Clean Up'', ''Hiking on Local
    Trails'', ''Board Game Nights'', ''Attending Local Cultural Events'']'
  career_goals: She aims to advance to a senior leadership role such as Director of Operations or Vice President of Clinical Services within a large health system. She plans to obtain the Certified Medical
    Manager (CMM) credential and eventually an MBA in Healthcare Management. Her long term ambition is to lead system-wide initiatives that improve patient outcomes while fostering a supportive, resilient
    workplace culture, especially for women and new parents.
