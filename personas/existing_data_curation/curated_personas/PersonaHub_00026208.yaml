persona_description: A college admissions officer who is committed to increasing the value of college degrees and restoring the relevance of higher education in the job market. This person values the soft
  skills that are often overlooked in admissions, such as problem-solving, collaboration, customer service, and communication. They recognize the importance of adaptability, culture fit, and growth potential,
  and believe that these qualities are more predictive of future job performance than university qualifications. This person is dedicated to helping students develop these skills through a variety of programs
  and initiatives, and is passionate about restoring the value of higher education in a rapidly changing job market.
