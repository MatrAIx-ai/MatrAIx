personas:
  professional: Ruby Shadgett, an aspiring multimedia designer and freelance photographer, blends their knack for digital storytelling—capturing spontaneous street art on a DSLR, crafting eye‑catching Instagram
    Reels, and designing event flyers in Canva—with a curious, organized yet flexible demeanor that energizes community projects and keeps volunteer crews on schedule.
  sports: Ruby Shadgett, a regular at the local youth soccer league and enthusiastic fan of the Staten Island Yankees, the New York Knicks, and the New York Rangers, spends weekends cheering at the stadium,
    while balancing personal fitness through hip‑hop dance classes and occasional jogs along the waterfront.
  arts: Ruby Shadgett, a budding community theater actor and backstage crew member who sketches Brooklyn street‑art legends like Banksy and local muralist Tom Burchfield, curates Instagram reels featuring
    The Strokes' live performances and Basquiat‑inspired pop‑up shows, and draws creative inspiration from Broadway shows starring Lin‑Manuel Miranda, seamlessly weaving these influences into their own
    visual storytelling.
  travel: Ruby Shadgett, who alternates weekend bike rides across the Staten Island Greenbelt with spontaneous day trips to the Hamptons and annual school‑exchange visits to London’s Tate Modern, prefers
    budget‑friendly hostels and train travel that allow enough free time to sketch street scenes and capture local cafés on Instagram.
  culinary: Ruby Shadgett, a self‑proclaimed coffee‑shop hopper, delights in hazelnut cold‑brew lattes, flaky almond croissants, and homemade avocado toast topped with feta and chili flakes, while occasionally
    experimenting with a weekend pasta al pesto recipe that showcases her modest yet enthusiastic cooking skills.
  core: Ruby Shadgett, the 17‑year‑old art‑obsessed social media whiz who never leaves home without a sketchbook, balances community‑first projects with a habit of binge‑editing videos until sunrise, and
    occasionally forgets to turn off phone notifications during class.
background:
  cultural: Ruby grows up in a white, middle‑class family on Staten Island, a borough that blends suburban calm with the cultural diversity of New York City. Her family’s roots trace back to Northern European
    ancestors, and she was raised with a mix of traditional American holidays and an appreciation for the city’s eclectic arts scene. Living near the waterfront and close to the Staten Island Museum and
    the Staten Island Children’s Museum, she’s been exposed to local history and contemporary art. While she identifies with mainstream American pop culture—music, fashion, and media—she also values the
    community‑first ethos of her borough, participating in neighborhood block parties, youth sports leagues, and local volunteer initiatives.
