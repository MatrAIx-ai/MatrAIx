  career_goals: Ruby aims to earn her GED within the next year and enroll in a community college program focused on visual communications or multimedia design. She hopes to build a freelance portfolio of
    photography, graphic design, and video content, eventually securing a part‑time role as a social media coordinator for a local nonprofit or small business. Long‑term, she envisions working in a creative
    agency, producing campaigns that blend art and community storytelling, and possibly launching her own boutique branding studio that offers design services to other youth organizations.
