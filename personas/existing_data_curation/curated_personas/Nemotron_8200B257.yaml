personas:
  professional: Adam Moore, a 29‑year‑old full‑stack software engineer specializing in JavaScript (React, Node.js) and Python, leverages their curiosity and artistic eye to rapidly prototype user‑centric,
    visually striking web applications while thriving in flexible, loosely structured Agile teams, even as their relaxed approach to deadlines sometimes leads to last‑minute code sprints.
  sports: Adam Moore enjoys weekend hikes along the Pacific coastline, practices yoga three times a week, follows the Los Angeles Lakers and Dodgers with fervor, and occasionally joins a local recreational
    basketball league, preferring low‑pressure, mindful movement over intense training regimens that suit their pace.
  arts: Adam Moore spends their evenings sketching in Procreate while listening to Flying Lotus and Radiohead, curates visits to contemporary art havens like The Broad and street‑art tours featuring works
    by Shepard Fairey, and draws inspiration from filmmakers such as Alex Garland and Denis Villeneuve to fuel their own generative art coding projects.
  travel: Adam Moore prefers spontaneous, budget‑friendly trips that blend cultural immersion and natural exploration, having backpacked through Japan’s art districts, surfed in Costa Rica’s Nicoya Peninsula,
    and plotted a future road‑trip along the Pacific Coast Highway to study coastal murals, all while they juggle limited vacation days and a modest travel fund.
  culinary: Adam Moore, a competent home cook, loves crafting avocado‑toast bowls topped with poached eggs, pickled radish, and sriracha, indulges in sushi rolls featuring toro and uni, and frequently experiments
    with kimchi‑fried rice and turmeric‑infused smoothies, while also seeking out pop‑up vegan eateries that serve creative plant‑based dishes for their palate.
  core: Adam Moore is a curiosity‑driven coder‑artist who blends digital creation with spontaneous art‑fuelled spending, wrestles with stress‑induced procrastination, and thrives on late‑night solo coding
    marathons punctuated by yoga breaths that soothe their mind.
background:
  cultural: Adam grew up in a middle‑class Anglo‑American household in Orange County, California. His upbringing combined traditional US suburban values—self‑reliance, individualism, and a strong work ethic—with
    the multicultural vibe of Southern California, where Mexican, Asian, and Latin cultures are prominent. Exposure to a diverse community shaped his open‑minded outlook and his appreciation for artistic
    expression, especially the vibrant street‑art scene of nearby Los Angeles. While his heritage is primarily European (German and Irish ancestry), his daily life reflects the eclectic, progressive atmosphere
    of modern Californian urban life.
