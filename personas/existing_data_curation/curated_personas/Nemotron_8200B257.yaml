  career_goals: Adam aims to progress to a senior or lead engineering role where he can guide a small team in creating user‑centric, visually compelling products. He is eager to champion design‑driven development,
    integrating artistic sensibilities into software experiences such as interactive installations or generative art platforms. Over the next five years, he hopes to spearhead open‑source projects that
    bridge code and creativity, while also establishing a sustainable work rhythm that mitigates his stress‑prone tendencies. In the longer term, he contemplates launching a boutique studio that offers
    custom digital experiences for cultural institutions.
