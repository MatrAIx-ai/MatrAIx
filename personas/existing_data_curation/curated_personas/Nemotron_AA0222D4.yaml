  hobbies: '[''Drawing and watercolor painting'', ''Digital illustration'', ''Photography of rural landscapes'', ''Acoustic guitar playing'', ''Reading sci-fi/fantasy literature'', ''Listening to indie/experimental
    music'', ''Competitive online strategy gaming'', ''Arduino electronics tinkering'', ''Motorcycle maintenance'']'
  career_goals: He aims to turn his artistic passions into a freelance career as a multimedia creator, producing digital art, video content, and music for online platforms. Michael hopes to enroll in a
    full-time graphic design program after a gap year, eventually working for a creative agency or running his own studio that also focuses on mental-health advocacy through art. He wants to keep a flexible
    schedule to manage his anxiety while pursuing projects that challenge conventional aesthetics.
