personas:
  professional: Michael Snow, an ambitious teenage multimedia creator, merges watercolor and mixed‑media collages with digital illustration in Photoshop and Illustrator, produces short videos in Premiere
    Pro, and composes acoustic guitar soundtracks for online commissions, leveraging their strategic gaming mindset and relaxed attitude toward deadlines while they often battle disorganized workflow habits.
  sports: Michael Snow, a laid‑back sports enthusiast, spends weekends riding their motorcycle across Ohio’s open plains and joining impromptu pickup basketball games at the community center, while they
    remain a devoted fan of the Cleveland Browns and cheer on the Guardians during baseball season.
  arts: Michael Snow, a visual‑arts aficionado, captures abandoned Ohio barns in watercolor before layering them into surreal collages inspired by Wassily Kandinsky and the glitchy soundscapes of experimental
    musicians such as Oneohtrix Point Never and Grimes, they also find narrative ideas in speculative fiction by Ted Chiang and N. K. Jemisin.
  travel: Michael Snow, an independent‑spirit traveler, prefers spontaneous road trips charted in a worn notebook, having already explored the misty ruins of Detroit’s abandoned factories, roamed the open
    plains of Nebraska, and day‑tripped to Cuyahoga Valley National Park, while they dream of a solo bike pilgrimage through the Scottish Highlands to fuel future art projects.
  culinary: Michael Snow, an experimental home cook, frequently tosses avocado toast brushed with lemon‑infused olive oil, whips up cumin‑spiced lentil soup for comfort, and perfects late‑night ramen bowls
    topped with soft‑boiled eggs, they also snack on charcoal‑grilled vegetables after long editing sessions.
  core: Michael Snow, an 18‑year‑old multimedia artist with a restless curiosity, channels anxiety and a competitive streak into a blend of watercolors, digital design, guitar, and garage tinkering, they
    navigate the chaos of freelance life with occasional procrastination and impulsive art‑supply splurges.
background:
  cultural: Michael grew up in a small, predominantly white community in Pawnee County, Oklahoma. His upbringing blends Midwestern values—such as a strong sense of self-reliance, community involvement through
    local church and county fairs, and a close connection to the land—with an openness to broader cultural influences he discovers online and through art. He respects the regional heritage, including the
    history of the Pawnee people, and often incorporates motifs inspired by the prairie landscape into his work.
