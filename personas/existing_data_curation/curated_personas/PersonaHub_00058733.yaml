persona_description: A software developer who is responsible for programming safety-critical applications and ensuring that the applications are secure. This persona is aware of the risks associated with
  security vulnerabilities and is committed to adopting sound measures to prevent and mitigate these risks. This person is familiar with the IEC61508 and DO178B/C standards and is skilled in translating
  functional safety requirements into efficient, secure, high integrity software. The persona is aware of the importance of integrating security hardening actions at all levels of the software development
  process and is committed to ensuring that the focus is not only on software development but also on ensuring the safety and security of the applications.
