personas:
  professional: Jose Ochoa, a 27-year-old master‑in‑training plumber and steamfitter, combines meticulous blueprint reading, MIG/TIG welding precision, and systematic crew coordination with a structured,
    forward‑thinking mindset, positioning himself for supervisory roles and eventually launching his own contracting firm.
  sports: Jose Ochoa, a forward on a local recreational soccer league, trains three times a week to stay match‑ready, cheers for El Paso Locomotive FC during the USL season and roots for the Dallas Cowboys
    on Sundays, and blends his love of team sports with regular weight‑lifting sessions to counteract work‑related back strain.
  arts: Jose Ochoa finds creative release strumming his acoustic guitar to the rhythms of Carlos Santana and classic ranchera tunes at family gatherings, enjoys occasional trips to see local theater productions
    featuring plays by August Wilson, and unwinds by solving complex jigsaw puzzles while listening to the latest releases from the Foo Fighters.
  travel: Jose Ochoa prefers meticulously planned road trips that balance adventure and family time, having already explored the historic streets of San Antonio and the vibrant markets of Mexico City, he
    now dreams of a weekend hike in Zion National Park and a cultural immersion stay in Oaxaca, while budgeting his travel around his project contracts and seasonal work peaks.
  culinary: Jose Ochoa, an adept backyard grill master, whips up carne asada marinated in citrus, cumin, and a splash of orange juice, prepares chiles rellenos stuffed with cheese and pine nuts, and crafts
    fresh salsa with jalapeños, cilantro, and lime, while occasionally experimenting with smoked brisket to impress his soccer teammates.
  core: Jose Ochoa blends disciplined trade expertise with a lively social spirit, juggling meticulous project plans, a penchant for spontaneous barbecue indulgences, and occasional stress‑driven worry
    that fuels his drive for safety advocacy.
background:
  cultural: Jose was raised in a bilingual Mexican‑American household in El Paso, where both Spanish and English are spoken daily. He embraces Mexican cultural traditions such as Día de los Muertos and
    Cinco de Mayo celebrations, and he stays connected to his heritage through music, dance, and family gatherings. At the same time, he navigates the Texan landscape, blending Hispanic customs with Southwestern
    influences. This dual cultural identity shapes his strong sense of community, his appreciation for lively social interactions, and his respect for hard work and family values.
attributes:
  skills: '["Pipe layout and installation","Welding (MIG, TIG)","Blueprint and schematic reading","Pressure testing and leak detection","Hydraulic and steam system maintenance","Safety compliance (OSHA,
