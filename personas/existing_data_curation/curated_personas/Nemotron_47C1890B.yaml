  hobbies: '["Recreational soccer league","Mexican barbecue cooking","DIY woodworking projects","Motorcycle maintenance","Group hiking excursions in the desert","Playing guitar at social events","Volunteering
    with Habitat for Humanity","Watching NFL football games","Puzzle solving (crosswords, Sudoku)"]'
  career_goals: Jose aims to earn his master plumber and steamfitter certifications within the next three years, positioning himself for supervisory roles on larger industrial projects. He envisions eventually
    launching his own contracting firm in El Paso, where he can apply his structured planning skills to deliver reliable, high‑quality services. Additionally, he hopes to become a union representative,
    advocating for better safety protocols and work‑life balance for fellow tradespeople, while also pursuing continuing education in advanced welding and renewable energy system installation.
