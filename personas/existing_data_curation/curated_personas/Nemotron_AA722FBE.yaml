personas:
  professional: Ginny Hanley, a budding marine explorer with a natural knack for detailed observation and step-by-step construction, channels their love of ocean books and LEGO building into a future ambition
    of marine biology, and they apply their practical, organized mindset to every mini‑experiment and aquarium project.
  sports: Ginny Hanley, a disciplined member of the local community pool’s junior swimming squad, practices freestyle and butterfly laps with the same focus they apply to assembling LEGO kits, proudly wears
    a small Seattle Mariners cap as a nod to their love of the sea, and occasionally joins a weekend kids’ beach volleyball clinic during the summer, though they prefer the solitary rhythm of swimming over
    team sports.
  arts: Ginny Hanley, an avid sketcher of marine life, spends quiet afternoons drawing seahorses and coral reefs while listening to Jack Johnson’s mellow acoustic songs, draws inspiration from Claude Monet’s
    water lily paintings and the vivid ocean scenes of Pixar’s Finding Nemo, proudly displays a sticker collection featuring characters from the animated film 'Ponyo' on their notebook, and they often daydream
    about turning their sketches into ocean murals.
  travel: Ginny Hanley, a curious tide‑pool explorer, spends family weekends combing the rock pools of Monterey Bay and day‑tripping to the Seattle Aquarium, dreams of snorkeling over the Great Barrier
    Reef someday, prefers carefully planned, short-duration trips that fit within their parents’ vacation budget and school schedule, and they keep a scrapbook of each adventure to revisit later.
  culinary: Ginny Hanley, a budding chef in their kitchen, can whisk together a kid‑friendly grilled cheese with a side of tomato soup, loves creating simple fish‑shaped fruit plates using melon and berries,
    delights in munching on seaweed snacks and occasional crab cake bites at family gatherings, and proudly states that their favorite ingredient is cheddar cheese, though they often forget to add a pinch
    of pepper.
  core: Ginny Hanley, a detail‑obsessed seven‑year‑old who arranges their seashells by size, compulsively counts their LEGO steps, refuses to share stickers unless swapped immediately, blends a love of
    order with a fierce curiosity about the ocean, and they insist on keeping every collection in its perfect place.
background:
  cultural: Ginny is a white American child of Irish ancestry raised in Hilo, Hawaii. Her family blends mainland U.S. traditions with the vibrant local culture of the Big Island. She greets friends with
    Aloha and knows a handful of Hawaiian words such as Mahalo. She participates in community events like Lei Day and the Merrie Monarch Festival, enjoying the music and dance while respecting Hawaiian
    customs. At home, the Hanley family celebrates Irish holidays such as St. Patrick’s Day, and they share stories of their heritage. Growing up in a multicultural environment, Ginny is exposed to Hawaiian,
    Japanese, Filipino, and other Pacific Island influences, fostering an appreciation for diverse languages, foods, and values.
