personas:
  professional: Elizabeth Davis, a fifteen‑year‑old high‑school STEM enthusiast, channels their curiosity and methodical nature into building modest robotics projects—like automated feeders for the local
    animal shelter—while nurturing a budding interest in veterinary science, reflecting their competitive spirit and organized approach.
  sports: Elizabeth Davis runs the 800‑meter and 1600‑meter events for their high‑school track team, hikes the nearby Cascades on weekends, avidly follows the Seattle Seahawks (NFL) and Seattle Kraken (NHL),
    and belongs to the local youth cross‑country club, the Cascades Runners.
  arts: Elizabeth Davis expresses their creative side by playing piano pieces ranging from Ludovico Einaudi’s minimalistic melodies to Taylor Swift’s pop ballads, occasionally composing short motifs, and
    captures wildlife photographs inspired by Ansel Adams’ landscape mastery.
  travel: Elizabeth Davis prefers weekend escapes to nearby Olympic National Park for wildlife photography, has visited the Grand Canyon with their family, and dreams of trekking the Icelandic Highlands
    to photograph volcanic landscapes.
  culinary: Elizabeth Davis enjoys cooking simple yet nutritious meals like quinoa salad with roasted rosemary potatoes and avocado, experiments with homemade sushi rolls and matcha‑infused desserts, but
    they often succumb to stress‑induced bowls of sugary cereal at night.
  core: Elizabeth Davis is a highly organized, curiosity‑driven teenager who balances a competitive spirit with a penchant for solitary reflection, channeling their worries into structured hobbies like
    robotics, chess, and journaling.
background:
  cultural: 'Elizabeth was raised in Willard, a small town in Huron County, Ohio, within a multi‑generational white Anglo‑American family that values hard work, community involvement, and modesty. Her upbringing
    reflects typical Midwestern cultural traits: punctuality, reliability, and a strong sense of neighborly responsibility. She regularly participates in local events such as the county fair, church youth
    groups, and community service projects organized by the town''s volunteer fire department. The rural setting has exposed her to agricultural life, fostering an appreciation for nature and animal care,
    which is evident in her involvement with the local 4‑H club and animal shelter. Family traditions emphasize education, self‑reliance, and giving back to the community, shaping her balanced perspective
    of curiosity tempered by practicality.'
