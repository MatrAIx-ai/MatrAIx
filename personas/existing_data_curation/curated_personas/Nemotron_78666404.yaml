  career_goals: Elizabeth aims to graduate high school with honors and pursue a bachelor's degree in engineering, with a particular interest in biomedical or mechanical engineering that merges her curiosity
    about how things work with a desire to create practical solutions for health and sustainability. In the short term, she plans to join her high school's robotics team, secure a summer internship at a
    local manufacturing firm, and earn a merit-based scholarship. Long‑term, she envisions designing medical devices or sustainable energy systems that improve community well‑being, and ultimately hopes
    to work in a research‑driven environment where she can lead projects that balance innovative ideas with real‑world impact. She also hopes to continue volunteering at the animal shelter, integrating
    her compassion for animals with her technical aspirations.
