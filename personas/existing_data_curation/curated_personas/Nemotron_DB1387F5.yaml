personas:
  professional: Lena Phillips, a seasoned retail stock and order fulfillment specialist, brings over three decades of inventory expertise to her role; they balance curiosity and practicality by experimenting
    with shelf layouts while coaching new hires in a friendly, cooperative way.
  sports: Lena Phillips rallies with fellow seniors to cheer on the Atlanta Falcons, the Atlanta Hawks, and the Atlanta Braves, and they stay active by walking with the Golden Years Walking Club three times
    a week, preferring low‑impact exercise that fits their joint concerns.
  arts: Lena Phillips delights in singing gospel and classic R&B with her church choir—often performing hits by Aretha Franklin, Marvin Gaye, and Sam Cooke—while they quilt with friends, attend vintage
    film screenings of Casablanca and Singin’ in the Rain at the downtown cultural center, and cherish the storytelling found in Southern oral histories.
  travel: Lena Phillips enjoys weekend road trips to historic Southern sites like Savannah’s riverfront, the Civil Rights Trail in Birmingham, and the Great Smoky Mountains, planning trips spontaneously
    while they balance travel with grandchildren’s school calendars and a modest travel budget.
  culinary: Lena Phillips prefers home‑cooked Southern comfort dishes such as collard greens, cornbread, sweet‑potato pie, and jambalaya, skillfully tossing fresh herbs from her community garden into the
    pot; they enjoy sharing these meals at church potlucks and block parties, though they sometimes rely on ready‑made TV dinners when a long shift leaves them exhausted.
  core: Lena Phillips is a sociable, curiosity‑driven retiree who blends practical retail expertise with a love for gospel music, gardening, and community, all while they juggle worry‑laden budgeting and
    occasional forgetfulness about appointments.
background:
  cultural: Lena is a lifelong resident of Atlanta’s Clayton County, raised in a close‑knit African‑American family that valued faith, storytelling, and community service. Growing up during the post‑civil‑rights
    era, she witnessed the power of collective action and the importance of preserving cultural traditions such as soul cooking, gospel worship, and oral histories passed down through generations. Her cultural
    identity is reflected in her love for Southern comfort foods, involvement in church ministries, and participation in local festivals that celebrate Black heritage. Lena’s experiences in a predominantly
    Black neighborhood have instilled a deep sense of solidarity, a respect for elders, and a commitment to uplifting others through everyday kindness and cooperation.
