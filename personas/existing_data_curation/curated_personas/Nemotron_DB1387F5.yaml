  hobbies: '[''Church choir singing'', ''Community gardening'', ''Neighborhood block parties'', ''Quilting circles'', ''Listening to R&B and gospel music'', ''Watching classic movies'', ''Reading memoirs
    and oral histories'', ''Mentoring teens at the community center'']'
  career_goals: Lena’s primary career ambition is to gain a supervisory role on the shop floor where she can blend her practical knowledge with her curiosity for improving processes. She hopes to become
    a shift lead or a training mentor, helping newer staff learn efficient stock‑room habits while also championing small, employee‑driven improvements such as faster restocking routes or clearer labeling
    systems. In parallel, she plans to enroll in a community‑college GED program to formalize her reading and math skills, which will open up possibilities for part‑time administrative support work at the
    local senior center. Ultimately, she wants to maintain a steady income that supports her grandchildren while preserving the flexible schedule that lets her stay active in her church and community groups.
