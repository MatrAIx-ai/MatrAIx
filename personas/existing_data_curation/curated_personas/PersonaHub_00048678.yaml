persona_description: A scientist who is concerned about the impact of ocean power generation projects on marine species, particularly salmon and other sensitive species that rely on internal compasses.
  The scientist is also interested in the potential for electromagnetic fields created by the power-generating devices and cables to interfere with the marine environment. The scientist is studying the
  reactions of marine species, including salmon, dungeness crab, halibut, and American lobsters, when copper wiring near their tanks is energized. The scientist is seeking scientific guidance before moving
  forward with ocean power generation projects.
