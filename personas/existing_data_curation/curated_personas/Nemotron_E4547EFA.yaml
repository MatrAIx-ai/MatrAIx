personas:
  professional: Benson Celenza, a retired civil engineer with four decades of experience in structural design, site planning, and infrastructure budgeting, leverages their methodical, organized nature and
    AutoCAD expertise to mentor high-school students and volunteer on historic downtown preservation projects in Maquoketa.
  sports: Benson Celenza, an avid fisherman who joins the local senior walking club in the spring and plays weekly bridge tournaments, follows the Iowa Hawkeyes football team and the Chicago Cubs with loyal
    enthusiasm, and maintains a modest fitness routine by tending their garden and doing light woodworking lifts.
  arts: Benson Celenza, who spends quiet evenings listening to the violin concertos of Yo-Yo Ma, reading biographies of engineering pioneers like John Smeaton, and admiring the regional landscape paintings
    of Grant Wood, weaves these influences into their model-railroad layouts and community library volunteer work.
  travel: Benson Celenza, who prefers carefully planned road trips over spontaneous adventures, has revisited historic St. Louis and the Grand Canyon with their spouse, dreams of a leisurely cruise along
    the Norwegian fjords, and annually returns to the Iowa State Fair to reconnect with familiar faces.
  culinary: Benson Celenza, an experienced home cook who delights in preparing vegetable stew with heirloom carrots, rosemary potatoes, and fresh corn from their garden, bakes rustic sourdough rye bread,
    and occasionally treats themselves to a local Iowa pork tenderloin sandwich with tangy mustard.
  core: Benson Celenza, a methodical garden-guru and vintage-farm-equipment aficionado, blends their love of order with a stubborn tendency to over-schedule every summer weekend, even if it means skipping
    a nap.
background:
  cultural: Benson grew up in a multigenerational white Midwestern family of German and Irish ancestry in rural Iowa. His upbringing was shaped by farm life, a close‑knit community, and a Lutheran church
    that emphasized service, modesty, and self‑reliance. He carries the Midwestern values of hard work, punctuality, and hospitality, celebrating traditions such as Thanksgiving family gatherings, the county
    fair, and community potlucks. His cultural identity is rooted in the simple, steady rhythms of small‑town life and a lifelong commitment to contributing to the well‑being of his neighbors.
attributes:
  skills: '["Structural design", "Site planning", "Infrastructure project management", "AutoCAD and CAD drafting", "Finite-element analysis", "Technical writing", "Budgeting and cost estimation", "Woodworking",
