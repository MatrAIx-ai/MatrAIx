  hobbies: '[''Traditional Mexican cooking'', ''Vegetable gardening'', ''Salsa and folk‑dance classes'', ''Hiking local nature trails'', ''Card and chess games with friends'', ''Volunteering at food bank'',
    ''Reading Mexican‑American history'', ''DIY woodworking projects'', ''Attending cultural festivals'']'
  career_goals: Alberto aims to deepen his involvement with the Salem community by taking on a formal volunteer coordinator role at the local senior center, where he can design programs that blend cultural
    heritage with practical support for older adults. He hopes to launch a bilingual mentorship program that pairs Latino seniors with younger volunteers to preserve language and traditions. Organizing
    an annual Mexican‑heritage festival is another long‑term ambition, showcasing music, food, and crafts while fostering intercultural understanding. He also plans to document his family’s migration story
    for the Marion County historical museum, ensuring that his community’s narrative is recorded for future generations.
