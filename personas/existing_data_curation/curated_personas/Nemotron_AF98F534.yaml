personas:
  professional: Alberto Borrero, a community program organizer with a knack for meticulous budgeting, bilingual outreach, and hands‑on carpentry, channels their practical precision and warm sociability
    into senior‑center initiatives that fuse cultural festivities with tangible support services for older adults.
  sports: Alberto Borrero stays active by hiking the Willamette River trails, attending weekly salsa and folk‑dance sessions, cheering on the Portland Timbers and Oregon Ducks, and participating in the
    Salem Senior Walkers Club where they log consistent brisk walks to manage joint discomfort and maintain cardiovascular health.
  arts: Alberto Borrero nurtures a love for vibrant music, often playing recordings of Carlos Santana and Celia Cruz during cooking sessions, attending local folk‑dance performances featuring Los Lobos
    tributes, and finding inspiration in the visual storytelling of filmmaker Guillermo del Toro, which informs their own woodworking designs.
  travel: Alberto Borrero prefers culturally immersive trips, planning modest‑budget visits to places like Santa Fe’s Pueblo markets, the vibrant streets of Seville, Spain, and the ancient terraces of Cusco,
    Peru, while often traveling with a small group of friends from the senior center to share stories and keep costs manageable.
  culinary: Alberto Borrero, a proficient home cook, delights in crafting traditional tamales, rich mole sauces, and hearty bean stews using garden‑fresh tomatoes, chilies, and corn, balancing meticulous
    recipe steps with a penchant for adding a dash of extra spice that sometimes leaves guests reaching for water.
  core: Alberto Borrero blends methodical planning, deep communal ties, and a zest for sharing flavorful traditions, even if occasional over‑spicing and late‑night drama marathons reveal a delightfully
    human side.
background:
  cultural: Alberto is a first‑generation Mexican‑American whose parents arrived from Michoacán in the early 1960s. Raised in a bilingual household in Oregon, he grew up celebrating Día de los Muertos,
    Semana Santa, and regional festivals that blended Catholic traditions with Mexican folk customs. He maintains strong ties to the local Latino community, frequently participating in cultural events,
    supporting Mexican restaurants, and teaching younger members about family recipes and stories. His identity is shaped by a deep respect for family gatherings, communal meals, and the value of mutual
    assistance, which he carries into his volunteer work and everyday interactions.
