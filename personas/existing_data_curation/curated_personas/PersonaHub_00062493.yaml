persona_description: A historian who is interested in the history of universities, particularly those founded in Germany. This person is particularly interested in the history of Julius-Maximilians-Universität
  Würzburg, which has a rich history dating back to its founding in 1402. They are also interested in the contributions of famous scientists and scholars who have worked at JMU, such as Rudolf Virchow,
  Carl Siebold, and Franz Brentano. Additionally, this person is interested in the expansion of the university since its founding, particularly in the 1960s and beyond, and the current expansion of the
  university to include the newly established Campus Nord.
