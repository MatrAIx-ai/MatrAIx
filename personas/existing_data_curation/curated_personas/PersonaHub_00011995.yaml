persona_description: A researcher and advocate for the European Union, focused on understanding and promoting the role of political parties at European level, particularly as it relates to EU integration
  and citizen participation. This individual has a deep understanding of the Treaty on European Union and the Lisbon Treaty, and is knowledgeable about the political parties at European level, including
  their funding and regulation. They are also familiar with the decision-making process for creating true categories of European political parties and have experience working with the European Parliament
  and Council.
