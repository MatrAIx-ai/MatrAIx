personas:
  professional: Bradley Stanley, a curious 2‑year‑old, already shows budding architectural talent by meticulously stacking and arranging building blocks, demonstrating a natural affinity for structure,
    practical problem‑solving, and teamwork as they invite peers to join in cooperative play.
  sports: Bradley Stanley loves the splashy fun of toddler swim lessons at the community pool, regularly participates in mini‑soccer circles at the local park, and proudly wears a tiny jersey of the Seattle
    Mariners while cheering on the team during family game nights.
  arts: Bradley Stanley delights in dancing to the upbeat tunes of The Wiggles and Raffi, giggles at Sesame Street skits featuring Elmo, and loves coloring pictures of Van Gogh’s "Starry Night" with chunky
    crayons, showing a vibrant early appreciation for music, performance, and visual art.
  travel: Bradley Stanley prefers short car rides to Grandma’s house in the countryside, gets wide‑eyed excitement from family trips to Disneyland in Anaheim, and enjoys a splashy day at the sandy beaches
    of Myrtle Beach, always demanding a stuffed animal as a travel companion.
  culinary: Bradley Stanley’s palate revolves around cheesy macaroni, buttery toast strips, and sweet banana slices, though they stubbornly reject broccoli, preferring to self‑feed with a plastic fork while
    their parents encourage healthy bites by hiding peas within their favorite dishes.
  core: Bradley Stanley, the 2‑year‑old who transforms any room into a tidy block kingdom, saves every coin in a rhythmic ritual, battles a stubborn eczema flare‑up with occasional forgetfulness, and refuses
    broccoli while energetically dancing to The Wiggles.
background:
  cultural: Bradley is raised in a middle‑class, white American family in Fredericksburg, Virginia, within Stafford County. His household follows a typical suburban routine, with regular meals, nap times,
    and preschool schedules that provide structure. He celebrates common American holidays such as Thanksgiving, Christmas, and the Fourth of July, often attending community events like local parades and
    fairs. His family participates in a local community church, which reinforces values of kindness, cooperation, and respect for others. The regional culture blends Mid‑Atlantic historical influences with
    Southern hospitality, shaping his respectful and sociable demeanor.
