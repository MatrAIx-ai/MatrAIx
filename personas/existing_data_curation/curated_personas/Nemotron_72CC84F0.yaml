  hobbies: '[''Church choir singing'', ''Community dancing (Marinera)'', ''Knitting and crocheting'', ''Textile weaving'', ''Art‑history lectures'', ''Documentary watching'', ''Gardening'', ''Bridge and
    bingo'', ''Reading poetry'']'
  career_goals: Although retired, Monica aims to leave a living legacy of her cultural roots and community spirit by compiling a handwritten and digital family recipe book that includes stories behind each
    dish, mentoring younger members of the Hendersonville Hispanic network in cooking and storytelling, launching a weekly art‑craft circle at the senior center that integrates Peruvian artistic techniques,
    improving her tablet skills to join virtual museum tours and stay in touch with her grandchildren abroad, and preserving her health while staying socially engaged and inspiring others to value cultural
    exchange.
