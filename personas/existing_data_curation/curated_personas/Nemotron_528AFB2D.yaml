personas:
  professional: Ryan Marshall, a seasoned groundskeeper turned aspiring crew foreman, combines hands‑on expertise in heavy‑equipment maintenance, irrigation design, and meticulous budgeting with a disciplined,
    detail‑oriented leadership style that balances competitive drive with reliable, structured project management.
  sports: Ryan Marshall’s athletic outlet is pick‑up basketball at the community park, where they admire the Charlotte Hornets and play three‑on‑three games each weekend, while they also enjoy early‑morning
    fishing trips on Lake Marion and cheer for the Carolina Panthers during NFL season, reflecting a practical yet competitive approach to fitness.
  arts: Ryan Marshall’s artistic palate centers on Southern soul legends like Aretha Franklin and Otis Redding, gospel harmonies from the Blind Boys of Alabama, and live blues shows at the Columbia Blues
    Festival, while their woodworking hobby lets them translate musical rhythm into handcrafted benches and birdhouses that echo folk‑art aesthetics.
  travel: Ryan Marshall prefers low‑key, nature‑focused trips, planning weekend getaways to nearby Congaree National Park and road‑tripping to Asheville’s Blue Ridge Mountains, while dreaming of an eco‑tour
    along the Oregon Coast and a future family vacation to the Grand Canyon, balancing an outdoorsy spirit with a modest travel budget and limited vacation days.
  culinary: Ryan Marshall enjoys cooking with home‑grown produce, frequently preparing tomato‑basil bruschetta, zucchini cornbread, and shrimp‑and‑grits seasoned with smoked paprika, indulges in Southern
    BBQ ribs with collard greens on occasion, yet their hectic schedule often pushes them toward quick microwave meals for dinner.
  core: Ryan Marshall is a detail‑driven landscaper who tempers a competitive edge and chronic worry with a love for gardening, woodworking, and soulful gospel, meticulously budgeting while occasionally
    splurging on premium wood.
background:
  cultural: Ryan is a Black man raised in Timmonsville, a small town in Florence County, South Carolina. His family’s roots trace back to generations of agricultural laborers who cultivated the land, fostering
    a deep respect for the earth and a strong work ethic. The local Black community’s emphasis on church, family gatherings, and communal support shaped his social values, reinforcing the importance of
    reliability, mutual aid, and perseverance. Southern Black culinary traditions—such as cooking collard greens, cornbread, and gumbo—are part of his family’s weekly meals and holiday celebrations. He
    identifies with the resilience and pride of the rural Black South, which informs his competitive drive and cautious approach to new relationships. Community events like Juneteenth and local church picnics
    provide cultural touchstones that keep him connected to his heritage while inspiring his desire to give back through beautifying neighborhood spaces.
attributes:
  skills: '[''Landscape design fundamentals'', ''Plant identification and horticultural maintenance'', ''Heavy equipment operation and maintenance'', ''Irrigation system design, installation, and repair'',
