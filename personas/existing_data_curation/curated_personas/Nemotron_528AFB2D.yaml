    ''Customer service and client communication'']'
  hobbies: '[''Home vegetable gardening'', ''Fishing at Lake Marion'', ''Listening to Southern soul, R&B, and gospel music'', ''Church attendance and community gatherings'', ''Pick‑up basketball'', ''Woodworking
    (bench and birdhouse making)'', ''Watching nature documentaries'', ''Reading about sustainable landscaping'']'
  career_goals: Ryan aims to transition from labor‑intensive tasks to a supervisory role within the next three years, targeting positions such as crew foreman for a regional landscaping firm or a park maintenance
    supervisor for Florence County. He plans to earn his GED and pursue an associate degree in horticulture or landscape technology, followed by certifications like Certified Landscape Technician (CLT)
    and Irrigation Specialist. Long‑term, he dreams of founding his own landscaping business that emphasizes sustainable, native‑plant designs for underserved neighborhoods, providing stable income for
    his family and reducing personal stress by delegating routine tasks. He wants to be recognized as a reliable, detail‑oriented leader who can balance structure with creative problem‑solving.
