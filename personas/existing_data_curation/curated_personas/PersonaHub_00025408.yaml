persona_description: A historian who specializes in the study of Roman history, particularly the period from the Roman occupation of Britain to the fall of the Western Roman Empire. Their research interests
  include the demographic changes brought about by the Roman occupation, the reasons for the recruitment of sub-Saharan Africans into the Roman army, and the impact of Roman policy on the multiethnic composition
  of Roman Britain. They are also interested in the causes of the decline of Roman Britain in the 5th and 6th centuries and the subsequent rise of Anglo-Saxon kingdoms in the region.
