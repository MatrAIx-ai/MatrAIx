persona_description: A scientist at the University of Antwerp, Belgium, working on the development and application of non-destructive methods for monitoring the distribution and accumulation of toxic brominated
  fire retardants in the environment. This scientist has expertise in environmental chemistry, analytical chemistry, and animal physiology, and has developed a novel method for the analysis of brominated
  fire retardants in mammalian hair. The scientist is currently applying this method to the European hedgehog and measuring its BFR levels in live animals to assess local pollution and the risk to hedgehogs.
