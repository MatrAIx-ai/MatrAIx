  career_goals: Although not seeking formal employment, Adam aims to become a recognized community leader in El Cajon. He hopes to formally volunteer as a coordinator for the local senior center, launch
    a neighborhood art‑and‑garden project that pairs youth mentorship with urban greening, and eventually serve on the board of a nonprofit focused on cultural enrichment. He also plans to deepen his knowledge
    of art history to help curate free community exhibitions and to mentor younger volunteers in public‑speaking and event management.
