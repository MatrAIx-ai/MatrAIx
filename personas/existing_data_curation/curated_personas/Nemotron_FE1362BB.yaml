  career_goals: Though retired from formal employment, Ashley aims to deepen her impact on the North Hollywood arts scene. She aspires to join the board of a local museum or cultural center, where she can
    influence programming and community engagement. She plans to launch a quarterly art‑therapy workshop for seniors, combining her love of creative expression with her mentoring skills. Additionally, Ashley
    hopes to complete a memoir chronicling her experiences with the evolving cultural landscape of Los Angeles, and she is interested in teaching occasional adult‑education classes on art appreciation and
    event management at the community college level.
