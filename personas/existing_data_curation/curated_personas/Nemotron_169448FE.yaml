  hobbies: '[''Historic walking tours'', ''Attending art museum exhibitions'', ''Community theater acting and directing'', ''Volunteering in library literacy program'', ''Maintaining an herb garden'', ''Experimenting
    with Mediterranean cooking'', ''Hosting book‑club meetings'', ''Leading high school literary magazine'', ''Traveling to cultural festivals'', ''Participating in local folk dance events'']'
  career_goals: Approaching retirement, Elisabeth aims to cement a legacy of innovative, arts‑rich learning at her school. She plans to transition into an instructional coach role where she can mentor emerging
    educators and expand the school's interdisciplinary arts program. She also hopes to author a practical guide on integrating local history and visual arts into secondary curricula, and to serve on the
    Williamsburg School Board to advocate for equitable, culturally responsive policies. Traveling to national education conferences and presenting her work at the National Art Education Association are
    long‑term ambitions that reflect her love of new ideas.
