  hobbies: '[''Sketching and painting'', ''Creative writing (short stories, poetry)'', ''Hiking local trails'', ''Nature photography'', ''Playing guitar and karaoke'', ''Organizing game nights'', ''Curating
    playlists'', ''Volunteering at community center'', ''Attending indie‑folk concerts'', ''Participating in county‑fair activities'']'
  career_goals: Donna aspires to blend her people‑skills with her artistic passions by pursuing a degree in communications or graphic design. She envisions moving from cashier work into a role such as social‑media
    manager, community outreach coordinator, or marketing assistant for a local boutique or creative agency. Long‑term, she hopes to open a community‑focused art shop or café where local makers can showcase
    their work and where she can host workshops, live‑music nights, and creative gatherings.
