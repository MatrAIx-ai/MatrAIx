personas:
  professional: Donna Verkest, a 20‑year‑old cash‑handling veteran with a flair for digital illustration, blends warm small‑town hospitality with a creative eye as she coordinates community events and crafts
    eye‑catching social‑media content for local boutiques, aiming to eventually run her own art‑focused café.
  sports: Donna Verkest cheers loudly for the local high‑school football team on Friday nights, follows the Tennessee Volunteers football and Nashville Predators hockey teams on TV, and spends Saturday
    afternoons hiking the foothills with the Morristown Trail Club, though she often skips the weekly yoga class she signed up for.
  arts: Donna Verkest finds inspiration in indie‑folk acts like The Avett Brothers and Sufjan Stevens, sketches abstract forms while listening to Leon Bridges and Taylor Swift, and curates a small Instagram
    gallery featuring works by regional painter Beth Mann, blending Southern storytelling with contemporary visual language.
  travel: Donna Verkest has road‑tripped to Asheville’s Blue Ridge Parkway and Nashville’s music scene, dreams of backpacking through New Zealand’s Southern Alps, and prefers spontaneous weekend getaways
    over meticulously planned vacations, often budgeting her travel fund by cutting back on boutique coffee orders.
  culinary: Donna Verkest loves the comfort of fried chicken, collard greens, peach cobbler, and sweet tea at family potlucks, but also experiments with sushi rolls and avocado toast at home, regularly
    whipping up a pepper‑jack mac 'n cheese while sprinkling fresh basil from her windowsill garden.
  core: Donna Verkest, a 20‑year‑old art‑infused social‑butterfly, balances spontaneous creativity with a laid‑back approach to responsibilities, channeling Southern hospitality into community‑driven projects
    while occasionally letting disorganization and impulse spending slip through the cracks.
background:
  cultural: Donna grew up as a white resident of Morristown, Tennessee, a small town in the foothills of the Appalachian region. Her upbringing reflects a blend of traditional Southern hospitality and modest,
    community‑oriented values, with frequent participation in local gatherings such as high‑school football games, county fairs, and neighborhood potlucks. While she appreciates regional customs like home‑cooked
    Southern meals and folk music, she is also deeply influenced by contemporary pop culture, digital media, and the broader artistic community she discovers online. This hybrid cultural experience fuels
    her love for both grassroots community events and modern, experimental art forms.
attributes:
