  hobbies: '["Gardening", "Cooking", "Reading historical fiction", "Genealogy", "Knitting", "Birdwatching", "Local history walking tours", "Volunteer work at the senior center", "Crossword puzzles"]'
  career_goals: Although retired from formal employment, Sherrie’s ambitions focus on enriching her community and preserving her family legacy. She hopes to mentor younger volunteers at the senior center,
    design an intergenerational storytelling program that pairs seniors with schoolchildren, and compile a digital archive of her family’s genealogy and local historical anecdotes. She also aspires to publish
    a modest cookbook featuring her favorite Midwest recipes, and to maintain her independence and well‑being by staying active both mentally and physically.
