    "Electronics prototyping"]'
  hobbies: '["Model rocketry", "Woodworking (fishing rods, furniture, jigs)", "Science‑fiction reading", "Chess", "Listening to jazz and blues", "Small‑group church study", "STEM mentoring at community
    center", "Fishing trips in local rivers", "Gardening" ]'
  career_goals: Roland aims to ascend to a principal engineer role where he can lead a multidisciplinary team developing next‑generation, low‑emission propulsion systems for commercial spaceflight. He hopes
    to secure multiple patents on lightweight composite structures and to establish a small consulting practice that assists regional aerospace firms in adopting sustainable design practices. Passionate
    about representation, he also plans to expand his involvement with the National Society of Black Engineers and local STEM outreach programs, eventually launching a mentorship scholarship for Black high‑school
    students in rural Georgia who aspire to engineering careers.
