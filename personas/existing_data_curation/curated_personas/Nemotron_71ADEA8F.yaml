  hobbies: '[''hiking'', ''fishing'', ''pickup basketball'', ''woodworking'', ''strategy video games'', ''puzzle solving'', ''journaling'', ''mindfulness breathing'']'
  career_goals: Vadim aims to obtain an OSHA 30‑hour certification and enroll in a journeyman carpentry apprenticeship within the next two years. He plans to pursue a community‑college certificate in construction
    management to qualify for supervisory roles, with the goal of becoming a foreman on larger projects. In the longer term, he dreams of launching his own small remodeling business focused on energy‑efficient
    home upgrades for Spokane residents. He seeks a stable, predictable career path that provides financial security, the ability to purchase a home, and eventually support a family, while building a reputation
    as a dependable, safety‑focused leader.
