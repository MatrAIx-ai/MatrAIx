personas:
  professional: Harrison Devlin, a pint-sized architect in the making, leverages a love for routine and practicality to meticulously arrange LEGO bricks into orderly cityscapes, turning spontaneous play
    sessions into structured designs while maintaining a cooperative spirit with fellow playground builders.
  sports: Harrison Devlin, a member of the local kids’ soccer club the Greenfield Gators and an avid fan of the hometown baseball team the River City Rovers, enjoys energetic after‑school games of tag and
    seasonal soccer practice, balancing spontaneous bursts of activity with a love for predictable weekly match schedules.
  arts: Harrison Devlin, a budding storyteller who reenacts scenes from Disney’s "Frozen" and sings along to songs by Idina Menzel, regularly draws colorful pictures of the Sesame Street crew and Dr. Seuss
    characters, finding comfort in familiar melodies and illustrated worlds while experimenting with new crayons and stickers.
  travel: Harrison Devlin, who eagerly recalls family trips to Orlando’s Disney World and weekend visits to the Grand Canyon, now dreams of exploring Tokyo Disneyland and the sunny beaches of Maui, favoring
    carefully planned itineraries that include plenty of rest breaks to keep their routine intact.
  culinary: Harrison Devlin, a picky yet adventurous five‑year‑old, prefers classic mac and cheese and crunchy carrot sticks with hummus, loves the sweet tang of strawberry jam on peanut butter toast, and
    occasionally helps stir batter for chocolate chip pancakes, proudly presenting their own "chef" hat.
  core: Harrison Devlin blends a steadfast love for routine with a relaxed, kind nature, occasionally slipping into sweet snack cravings and spontaneous play, yet always returns to orderly LEGO building
    and caring for friends.
background:
  cultural: Harrison is raised in a middle‑class white family in Saint Paul, Minnesota, where Midwestern values of community, politeness, and practicality are emphasized. Family traditions include celebrating
    Thanksgiving, Christmas, and local Fourth of July events with seasonal foods and outdoor activities. The regional culture encourages kindness, modesty, and an appreciation for nature, all of which align
    with his cooperative, routine‑loving, and emotionally stable personality.
