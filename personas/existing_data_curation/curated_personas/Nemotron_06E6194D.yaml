  career_goals: Harrison often talks about wanting to become a firefighter because he likes the idea of helping people and keeping his community safe. He also imagines being a teacher, sharing what he knows
    with friends, and sometimes mentions being a veterinarian to care for animals. These ambitions reflect his desire for practical, service‑oriented roles that bring harmony and order.
