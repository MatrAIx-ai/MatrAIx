persona_description: An archaeologist who specializes in the study of prehistoric cultures, particularly those from the Middle Archaic period. She has expertise in the analysis and interpretation of artifacts,
  particularly those associated with the Apex complex. Her research interests include the cultural significance and significance of these artifacts, as well as the relationship between them and the ancestors
  of Puebloan people of the American southwest. She is interested in the context in which these artifacts were used, the social and economic practices of the people who created them, and the ways in which
  they reflect the changing landscape of the region.
