    Food Festivals'', ''Family Travel'']'
  career_goals: John aims to become the head of the STEM department within the next three years, using that platform to champion flexible, inquiry‑based curricula that honor both curiosity and practical
    application. He plans to mentor a cohort of early‑career teachers, fostering collaborative practices that balance structured planning with improvisational freedom. Over the next decade, John hopes to
    author a series of articles on integrating emerging technologies in secondary science classrooms and to present at regional education conferences. He is also interested in pursuing a doctoral degree
    in education leadership to deepen his impact on school policy. As retirement approaches, he envisions transitioning to a part‑time advisory role, supporting community STEM outreach programs while maintaining
    a balanced work‑life schedule.
