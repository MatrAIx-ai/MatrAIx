  career_goals: Jerry wants to complete his GED within the next year, then enroll in a vocational program at a community college to earn an Automotive Technology certification. He aims to become a certified
    auto technician, gain experience at a local dealership, and eventually open his own repair shop that can serve the Hispanic community in Hilliard. He also considers pursuing a journeyman electrician
    apprenticeship as a backup, valuing stable, routine work with clear advancement pathways. His long‑term ambition is to achieve financial independence, support his family, and be recognized for his reliability
    and craftsmanship.
