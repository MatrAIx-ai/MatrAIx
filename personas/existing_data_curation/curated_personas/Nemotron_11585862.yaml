personas:
  professional: Jerry Ortiz, a dedicated aspiring automotive technician, combines hands‑on car maintenance experience with meticulous organization and a strategic mindset honed from video‑gaming, making
    them the go‑to fixer in the family garage and a reliable leader in group projects.
  sports: Jerry Ortiz follows the Cleveland Browns and the Columbus Crew, hits the weight room at Hilliard Fitness Club three times weekly, and joins a small Saturday soccer pick‑up league, balancing competitive
    spirit with their structured training routine.
  arts: Jerry Ortiz channels their love for intricate model kits and simulation games into an appreciation for the meticulous art of Pixar animation, the synth‑driven soundscapes of Daft Punk, and the cinematic
    storytelling of director Guillermo del Toro, often listening to their work while painting car models.
  travel: Jerry Ortiz prefers road trips that blend their automotive passion and love for cultural flavors, planning a spring drive to the Henry Ford Museum in Dearborn, a summer weekend at the Grand Canyon,
    and dreaming of a future summer excursion to Mexico City’s bustling markets for authentic culinary inspiration.
  culinary: Jerry Ortiz excels at preparing family‑style tamales and mole, meticulously sourcing dried chiles, masa harina, and fresh pork shoulder, while also experimenting with grilled carne asada and
    homemade salsa verde, showcasing their detail‑oriented kitchen approach.
  core: Jerry Ortiz blends a methodical, competitive mind with a love for hands‑on projects, quietly dominates strategy games while obsessively cataloguing each car repair, yet they occasionally let procrastination
    slip on dentist appointments.
background:
  cultural: Jerry’s cultural background is shaped by his Mexican heritage and his upbringing in the suburban community of Hilliard, Ohio. He grew up in a bilingual household where Spanish is spoken daily,
    preserving family traditions such as celebrating Día de los Muertos, sharing homemade mole, and participating in local Hispanic festivals. The strong emphasis on family cohesion and respect for elders
    influences his sense of responsibility and desire to support his parents. While adapting to an American environment, he blends Mexican customs with Midwestern values, attending community events at the
    local Hispanic Center, and maintaining connections with extended relatives in Ohio and Mexico. His cultural identity informs his culinary interests, language proficiency, and his aspiration to serve
    the Hispanic community through his future automotive business.
