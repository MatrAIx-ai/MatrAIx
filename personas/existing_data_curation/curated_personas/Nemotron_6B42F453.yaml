  career_goals: Although retired from formal employment, Eddie aims to stay active and give back to his community. He plans to complete his GED to formalize his education, expand his digital skills by learning
    photography and basic graphic design, and become a mentor for younger volunteers at the senior center. He hopes to lead a neighborhood garden project, organize an annual classic‑car showcase for local
    enthusiasts, and be recognized as a reliable organizer of community events that bring people together.
