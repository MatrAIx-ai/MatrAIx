personas:
  professional: Eddie Bundy, a retired shipyard mechanic turned community organizer, blends his hands‑on expertise in automotive repair and woodworking with a competitive edge and meticulous budgeting to
    run senior‑center events, garden projects and classic‑car showcases, while staying skeptical of volunteers' reliability and constantly seeking practical solutions.
  sports: Eddie Bundy is a regular at the Bay Club’s bowling league, a faithful fan of the San Francisco Giants, Golden State Warriors, and San Jose Sharks, and they also enjoy occasional pick‑up basketball
    games in the park during summer, combining competitive bridge tournaments with a love for the outdoors.
  arts: Eddie Bundy finds creative respite in community choir rehearsals where they sing classics by Frank Sinatra and the Beatles, delights in karaoke renditions of Elvis Presley hits, and occasionally
    devotes evenings to photographing the polished lines of vintage cars, drawing inspiration from photographers like Ansel Adams.
  travel: Eddie Bundy prefers road‑trip adventures that blend scenic hikes with classic‑car enthusiasm, having driven the Pacific Coast Highway to Big Sur, trekked Yosemite’s Mist Trail, and taken a memorable
    week‑long tour of Tuscany to explore both vineyards and vintage automobile museums, while they now dream of hiking New Zealand’s Milford Track.
  culinary: Eddie Bundy enjoys cooking farm‑to‑table meals such as grilled salmon tacos topped with cilantro‑lime slaw, homemade vegetable ratatouille featuring their own garden tomatoes and zucchini, and
    expertly crafted apple‑cinnamon pie, while they also take pride in hand‑building cutting boards for prep work.
  core: Eddie Bundy is a hands‑on, competitively spirited senior who merges meticulous organization with a love for community, gardening, classic cars, and a dash of skeptical humor.
background:
  cultural: Eddie is a white American whose family roots trace back to mid‑western European immigrants who settled in the United States after World War II. He grew up in a small working‑class town during
    the post‑war boom, internalizing values of hard work, self‑reliance, and community solidarity. The cultural shifts of the 1960s and 1970s broadened his outlook, fostering a pragmatic curiosity about
    new ideas while retaining practical sensibilities. Relocating to South San Francisco placed him in a diverse, multicultural Bay‑Area environment, exposing him to a range of cultural influences while
    he continues to identify with the classic American working‑class ethos.
