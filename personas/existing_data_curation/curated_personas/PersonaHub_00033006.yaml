persona_description: Dr. Saurabh Kumar, an Indian scientist and researcher from the Centre for Nanoscience and Engineering at Indian Institute of Science, Bangalore, India, who is currently working on wearable
  sensors for point-of-care diagnostics. His research focuses on developing soft and conformal skin sensors that can monitor vital health parameters continuously without the need for bulky and rigid devices.
  He is also training students in cutting-edge biosensor technologies and actively engaged in developing tools for bio-research and clinical diagnosis.
