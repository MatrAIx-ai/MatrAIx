    design"]'
  hobbies: '["Oil painting", "Sketching", "Visiting art galleries and local art fairs", "Cooking traditional South Asian cuisine", "Yoga and mindfulness meditation", "Hiking in Patapsco Valley State Park",
    "Reading mystery and true‑crime novels", "Solving crossword puzzles", "Volunteer tutoring at community center"]'
  career_goals: Nazmoon aims to ascend to a supervisory role within the next two years, seeking promotion to shift supervisor and eventually to unit manager. She plans to complete an associate degree in
    criminal justice through a local community college to bolster her qualifications. Long‑term, she envisions spearheading a restorative‑justice initiative that integrates art‑based therapy and vocational
    training for inmates, leveraging her appreciation for the arts to reduce recidivism. She also aspires to contribute to policy development at the state level, advocating for more humane correctional
    practices while maintaining strict safety standards.
