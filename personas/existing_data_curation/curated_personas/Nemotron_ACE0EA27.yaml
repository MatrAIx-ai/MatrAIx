  career_goals: Doris aims to shift from day‑to‑day management to a mentorship and consulting role, helping younger food‑service professionals and small‑scale restaurateurs improve operational efficiency
    and incorporate artistic experiences into their venues. She also dreams of opening a modest, art‑focused café in Bonita where she can experiment with seasonal menus and rotate local artwork, creating
    a quiet gathering space that reflects her love of solitude and culture. Additionally, she plans to author a memoir that documents her three‑decade career and shares practical insights on sustainable
    kitchen practices, while volunteering to teach cooking and nutrition workshops at community centers.
