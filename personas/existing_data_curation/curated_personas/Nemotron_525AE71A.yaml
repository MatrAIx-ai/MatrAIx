personas:
  professional: Lijuan Do is a 25‑year‑old computer systems analyst who blends rigorous systems analysis, cloud architecture, and data‑visualization expertise with an artist’s imagination, delivering elegant,
    user‑centric solutions while championing collaborative harmony and mindful, iterative design; they thrive in Agile environments by balancing meticulous documentation with creative flexibility.
  sports: Lijuan Do hikes the winding trails of Hoosier National Forest on weekends, practices yoga twice a week to soothe anxiety, follows the Indianapolis Colts and Indiana Pacers as avid fans, and belongs
    to the Indiana Hiking Club where they occasionally join group runs for local 5k charity events.
  arts: Lijuan Do creates generative digital artworks in p5.js inspired by the ambient soundscapes of Brian Eno and the visual minimalism of Ryoji Ikeda, paints abstract watercolors echoing the color palettes
    of Yayoi Kusama, composes modular synth pieces that nod to Aphex Twin, and regularly attends poetry readings featuring voices like Ocean Vuong at intimate cafés, all of which weave a tapestry of speculative
    fiction influences from authors such as Ted Chiang and N.K. Jemisin into their creative practice.
  travel: Lijuan Do prefers thoughtfully planned trips that blend quiet contemplation with cultural immersion, having trekked the misty forests of Kyoto, sampled street food in Seoul, and explored the historic
    neighborhoods of New Orleans, while they dream of a future solo retreat to the Icelandic Highlands to sketch aurora‑lit skies and prototype generative art inspired by the landscape.
  culinary: Lijuan Do enjoys experimenting in the kitchen, skillfully preparing Sichuan dumplings with Korean‑inspired fillings using gochujang, doubanjiang, and Sichuan peppercorns, while they often pair
    the dishes with a glass of chilled Riesling and occasionally indulge in late‑night ramen noodle experiments when a coding breakthrough sparks a culinary curiosity.
  core: Lijuan Do is a harmonic blend of analytical rigor and artistic curiosity who channels anxiety into creative expression, juggling precise system designs, immersive digital art, and spontaneous culinary
    experiments while habitually over‑scheduling and sometimes neglecting practical chores.
background:
  cultural: Lijuan grew up in a Chinese immigrant family in the Midwest, speaking Mandarin at home while being educated in English. Her parents emphasized academic diligence, respect for elders, and community
    cohesion, values that shape her cooperative nature and desire for harmony. She also celebrates Korean customs from her father's side, including Chuseok and Korean language lessons, giving her a bicultural
    perspective. Living in West Lafayette, she is active in the Chinese Student Association and helps organize local Asian cultural festivals, often volunteering for Lunar New Year events and cultural showcases
    that blend Chinese calligraphy with Korean folk motifs. This blend of East Asian traditions—emphasis on education, familial interdependence, subtle emotional expression, and respect for collective well‑being—inform
    her respectful communication style, commitment to mentorship, and artistic sensibility.
