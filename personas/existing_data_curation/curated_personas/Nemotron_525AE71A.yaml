  hobbies: '[''Generative digital art (p5.js, Processing)'', ''Abstract watercolor painting'', ''Ambient electronic music composition'', ''Reading speculative fiction and philosophy'', ''Hiking in Hoosier
    National Forest'', ''Yoga and mindfulness meditation'', ''Cooking fusion East Asian dishes'', ''Volunteering teaching coding to youth'', ''Attending intimate poetry readings'', ''Sketching and visual
    brainstorming'']'
  career_goals: Lijuan aspires to become a senior systems architect who leads the creation of innovative, human‑centered technology platforms. She aims to integrate her artistic sensibility with technical
    expertise, pioneering AI‑driven solutions that support mental‑health and creative expression. Over the next three years she plans to earn a master’s degree in Human‑Computer Interaction and obtain certifications
    such as AWS Solutions Architect and Certified Scrum Professional. She envisions leading cross‑functional teams at a forward‑thinking tech firm or a small startup that values collaborative harmony and
    cultural diversity. Lijuan also hopes to publish research on ethical AI design, mentor emerging women in STEM—particularly those from East Asian backgrounds—and champion inclusive workplace cultures
    that balance high performance with emotional well‑being.
