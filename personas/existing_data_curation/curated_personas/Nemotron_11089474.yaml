personas:
  professional: Angela Diers, an aspiring teen playwright and comic illustrator, leverages her curiosity and practicality to craft engaging school productions while meticulously organizing set designs,
    and their talkative, charismatic presence makes them a natural leader in the drama and debate clubs.
  sports: Angela Diers, an outdoor‑enthusiast teen, plays on the local cross‑country ski club, avidly follows the Denver Broncos and the Montana Grizzlies football teams, joins the Butte High Bulldogs’
    varsity track squad during spring, and spends weekends snowshoeing and sledding, balancing structured training with spontaneous hikes along nearby trails.
  arts: Angela Diers, a vibrant creative spirit, sings in the school choir, draws comics inspired by Neil Gaiman and Studio Ghibli, idolizes the musical storytelling of Lin‑Manuel Miranda, and frequently
    binges on Taylor Swift’s discography while sketching characters during intermissions.
  travel: Angela Diers, a nature‑driven wanderer, has camped in Yellowstone’s geyser basins, fished for trout in Montana’s Madison River, dreams of hiking the fjords of Norway’s Sognefjord and exploring
    Japan’s cherry‑blossom festivals, and plans future family trips that blend rugged backpacking with occasional beach relaxation in the Caribbean.
  culinary: Angela Diers, a budding home chef, cultivates basil, thyme, and heirloom tomatoes in a backyard garden, whips up herb‑infused grilled trout with lemon‑dill sauce, loves hearty campfire chili
    with beans and smoked paprika, and treats themselves to s’mores after snowy sledding sessions, though they sometimes over‑season their dishes in a quest for bold flavor.
  core: Angela Diers is a talkative, curiosity‑driven teen who balances a love for wilderness adventures with a keen eye for artistic detail, yet often wrestles with worry and a tendency to over‑commit
    to both school and social life.
background:
  cultural: Angela grew up in the predominantly white, close‑knit community of Butte, Montana, a town shaped by its historic mining legacy and surrounded by the Rocky Mountains. Family life often revolves
    around backyard barbecues, local high‑school sports events, and community festivals that celebrate Montana’s frontier heritage, such as the annual St. Patrick’s Day Parade and Fourth of July fireworks.
    Seasonal traditions—summer camping trips, autumn harvest festivals, winter sledding, and spring trout fishing—are a core part of her upbringing. The town’s emphasis on self‑reliance, respect for the
    natural environment, and active community involvement informs her values, outlook, and social interactions.
