  career_goals: Angela dreams of combining her love for people and the Montana outdoors into a career that makes a tangible community impact. She envisions studying environmental science or journalism in
    college, aiming to become an environmental educator or community outreach coordinator who can translate scientific findings into accessible stories for her hometown. Long‑term, she hopes to launch a
    youth‑focused media platform that highlights local ecological issues and mental‑health resources, blending her communication strengths with her practical desire for a stable, purpose‑driven profession.
    Performing arts also remain a passion, so she plans to keep theater or music involved as a creative outlet alongside her professional goals.
