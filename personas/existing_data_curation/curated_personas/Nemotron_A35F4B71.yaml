  hobbies: '[''Fishing'', ''Kayaking'', ''Woodworking'', ''Classic car restoration'', ''Volunteering with veteran support groups'', ''Reading historical non‑fiction'', ''Reading marine biology'', ''Beach
    outings'', ''Coastal hiking'']'
  career_goals: Richard aims to transition his military logistics experience into a civilian role that leverages his practical expertise. He plans to earn a Certified Facility Manager (CFM) credential and
    explore part‑time consulting opportunities with local businesses needing process‑improvement guidance. In parallel, he hopes to launch a small handyman and auto‑service side business, allowing him to
    stay connected to the community at Camp Lejeune while maintaining a flexible schedule that accommodates his family commitments. Long‑term, he aspires to mentor younger veterans, helping them pursue
    certifications and steady employment.
