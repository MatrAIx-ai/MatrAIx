persona_description: A meteorologist or a climatologist who is interested in tracking and analyzing extreme weather events. They are particularly interested in the impact of climate change on temperature
  extremes and the down-slope warming phenomenon. They are also interested in the shift in the bell curve of temperature extremes and how it affects the occurrence of never-before-seen extremes. They are
  familiar with the historical data and trends of temperature records and are able to make predictions based on the current climate patterns. They have a keen eye for detail and are able to interpret the
  data accurately and accurately.
