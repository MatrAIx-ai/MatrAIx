  career_goals: At this stage, Tomas’s primary ambition is to gain greater independence—master walking, speak more words, and engage in simple cooperative play. His parents hope he will grow up to be a
    methodical, dependable adult who values family and community, perhaps pursuing a steady trade such as carpentry, plumbing, or a service‑oriented role where his reliability and cooperative nature will
    shine.
