persona_description: A scientist who specializes in the study of retinal development and disease, particularly in understanding the intrinsic systems and signaling pathways that orchestrate the development
  of the fovea centralis in the human retina. Her research interests include transcriptome and epigenome analyses of developing mouse photoreceptors, the role of epigenome in gene regulation, and the elucidation
  of intrinsic elements and signaling pathways that guide retinal development in humans. She is interested in integrating these studies with morphogenesis and function at the cellular level, and is seeking
  to understand the evolutionary relationships between retinal development and other vertebrate species.
