  career_goals: Rachel often says she wants to become a people‑maker – a teacher who can paint pictures for her class and make stories come alive. She also dreams of being an artist who fills a big canvas
    with bright colors, and sometimes mentions caring for animals as a veterinarian. While her ambitions are playful, she already shows a desire to help others feel safe and happy, and she is careful about
    doing things correctly, reflecting her worry about making mistakes.
