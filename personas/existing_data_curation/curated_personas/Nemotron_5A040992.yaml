personas:
  professional: A 1-year-old Alicia Campbell, already showing a penchant for structured cause-and-effect toys, is imagined as a future data‑analysis specialist who will apply meticulous, practical problem‑solving
    while they favor solitary work environments.
  sports: Alicia Campbell enjoys watching the Seattle Sounders FC matches on the family TV while snuggled in a blanket, and they participate in a toddler tumble class at the local community center, satisfying
    their desire for structured movement without the chaos of team sports.
  arts: Alicia Campbell spends mornings arranging colorful shape‑sorting blocks to the gentle lullabies of Beethoven and the modern pop melodies of Sia, and they often hum along to the melodies, revealing
    a critical ear for dissonance and a solitary appreciation of visual patterns.
  travel: Alicia Campbell took a short road‑trip with parents to the Grand Canyon, but they prefer the predictable comfort of home, and they dream of a quiet cabin retreat in the Swiss Alps where they can
    enjoy solitude surrounded by nature.
  culinary: Alicia Campbell favors smooth avocado mash, sweet apple purée, and soft oatmeal with a dash of cinnamon, yet they often refuse veggies like peas, displaying a picky palate that clings to familiar
    textures and flavors.
  core: Alicia Campbell, a 1‑year‑old with a love for orderly play, solitary cuddles, and a perpetual worry about noise, secretly hoards their favorite plush rabbit in a hidden drawer and they refuse to
    share it.
background:
  cultural: Alicia is raised in a predominantly white, middle‑class family in Peyton, Colorado, a semi‑rural community within El Paso County. Her family partakes in typical American cultural practices—celebrating
    holidays such as Thanksgiving and Fourth of July—and values a blend of suburban stability and an appreciation for the outdoors that characterizes the Colorado Front Range. The local culture emphasizes
    self‑reliance, respect for personal space, and a practical, down‑to‑earth outlook, all of which resonate with Alicia's emerging preference for routine, solitude, and tangible, hands‑on experiences.
