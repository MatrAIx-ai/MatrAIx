personas:
  professional: Sanjay Manikonda, a veteran naval architect and marine engineer, blends rigorous hull optimization, CFD modeling, and regulatory expertise with a vivid imagination that fuels generative
    design experiments, allowing them to translate abstract digital art concepts into eco‑friendly vessel prototypes while maintaining disciplined project management.
  sports: Sanjay Manikonda, a devoted follower of the Seattle Seahawks, Seattle Mariners, and Seattle Sounders FC, spends weekends rowing with the Seattle Amateur Sailing Club, practices light weight‑training
    and yoga for core strength, and joins seasonal community kayak races in the summer, preferring low‑impact endurance over high‑intensity competition.
  arts: Sanjay Manikonda, an avid digital painter, draws inspiration from the kinetic light installations of James Turrell and the algorithmic visualizations of Refik Anadol while mastering the sitar under
    the tutelage of recordings by Pandit Ravi Shankar, often composing ambient soundscapes that accompany their generative art exhibitions.
  travel: Sanjay Manikonda prefers meticulously planned voyages that blend marine research with cultural immersion, having scuba‑dove along the Great Barrier Reef, explored the historic shipyards of Galway,
    and dreamed of sailing the pristine fjords of Norway’s Lofoten Islands, all while balancing travel costs with a modest family budget.
  culinary: Sanjay Manikonda, a competent home chef, specializes in reimagining South Asian classics such as deconstructed vegetable biryani with saffron‑infused quinoa, coconut‑lime fish curry, and hand‑rolled
    dosa, frequently experimenting with locally sourced kelp and smoked salmon to fuse maritime flavors into his culinary canvases.
  core: Sanjay Manikonda fuses a naval architect’s precision with an abstract artist’s curiosity, devoting evenings to generative code, mornings to hull design, and weekends to sitar practice, all while
    habitually forgetting to water houseplants.
background:
  cultural: Sanjay was born to first‑generation South Asian immigrants from the Telugu‑speaking region of India who settled in California during the early 1980s. Growing up in a multicultural environment,
    he was raised with a strong emphasis on education, respect for elders, and communal values, celebrating festivals such as Diwali and Ugadi in his household. His cultural heritage is reflected in his
    appreciation for Indian classical music, cuisine, and storytelling, which he integrates with his American upbringing in Bakersfield's diverse community. Sanjay maintains connections with the local South
    Asian diaspora through cultural gatherings and volunteer mentorship programs, blending his heritage with his professional and personal pursuits.
