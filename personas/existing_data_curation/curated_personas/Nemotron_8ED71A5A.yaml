  career_goals: Sanjay aims to become a leading authority in eco‑friendly maritime design, spearheading research and development of low‑emission vessels and autonomous ship technologies. He aspires to obtain
    professional licensure as a naval architect, lead multidisciplinary teams on cutting‑edge projects for the commercial and offshore sectors, and mentor junior engineers through workshops and university
    adjunct teaching. Over the next decade, he envisions publishing thought‑leadership articles on sustainable shipbuilding, securing patents for innovative hull forms, and establishing his own consultancy
    that bridges artistic vision with rigorous engineering practice.
