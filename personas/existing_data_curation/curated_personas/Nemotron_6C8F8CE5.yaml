personas:
  professional: Teresa Stewart, a one-year-old budding architect of play, demonstrates an early love for arranging blocks in neat rows yet also delights in occasionally scattering them for spontaneous fun,
    showing a surprising preference for structure and predictability even as they babble happily to anyone in the room.
  sports: Teresa Stewart enjoys crawling races at the local toddler gym as well as spontaneous free-play sessions on the carpet, cheers on the neighborhood stroller marathon by clapping along, and they
    proudly wear a tiny Chicago Cubs cap during playtime, reflecting a budding interest in team spirit.
  arts: Teresa Stewart loves the rhythmic lullabies of Baby Einstein and the bright illustrations of Eric Carle, often humming 'The Wheels on the Bus' while improvising dances with a plush Mickey Mouse,
    showing how music and visual art shape their daily routine.
  travel: Teresa Stewart loves stroller safaris to the nearby botanical garden, where they point at vivid tulips and giggle at the koi pond, enjoys spontaneous visits to the local playground, and they dream
    of a family vacation to Disney World, a place they see in picture books and imagine exploring.
  culinary: Teresa Stewart delights in sweet-potato puree and banana mash while they cautiously explore new textures like avocado slices, preferring the familiar comfort of warm oatmeal with a dash of cinnamon
    yet occasionally experimenting with mild apple sauce.
  core: Teresa Stewart is a sociable, structure-loving one-year-old who lines up every toy into tidy rows yet delights in occasional chaotic play, thrives on attention, stays calm under routine stress,
    and navigates the world with a blend of playful assertiveness and relaxed flexibility.
