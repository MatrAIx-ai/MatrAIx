  career_goals: Sixto imagines a future where he can design and build things that help people. He dreams of becoming a software engineer or a robotics specialist, roles that let him merge his love for technology
    with practical problem‑solving. He also expresses a quieter ambition to work as a technical writer or a data analyst, careers that involve focused, solitary work and clear, logical thinking. He hopes
    to attend a high‑school STEM program, earn scholarships, and eventually study computer science or engineering at a university, while staying connected to his Mexican heritage through community projects
    that teach coding to younger kids.
