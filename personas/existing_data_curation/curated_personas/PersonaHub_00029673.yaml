persona_description: A progressive economist who advocates for raising the minimum wage and believes in the positive impact of increased wages on the economy and society. They are interested in income inequality,
  social mobility, and the role of government in addressing these issues. They support the idea of indexing the minimum wage to inflation and believe that raising the minimum wage is a necessary step towards
  closing the income gap and reducing poverty. They are also concerned about the potential negative impacts of raising the minimum wage and believe that businesses will adapt to the new wage structure.
