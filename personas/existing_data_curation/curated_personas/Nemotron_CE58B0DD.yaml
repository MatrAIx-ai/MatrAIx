personas:
  professional: Jenna Ramirez is a budding young scientist‑artist who blends meticulous experiment planning with vivid animal sketches, channeling their organized, curious nature into school science fairs
    and art projects.
  sports: Jenna Ramirez loves playing backyard soccer with friends after school, belongs to the neighborhood youth soccer club 'Rising Stars FC', and cheers for the Dallas Cowboys during football season,
    while they also dream of trying out for the local swim team in summer.
  arts: Jenna Ramirez delights in drawing colorful wildlife scenes inspired by Studio Ghibli films and listening to lively Latin folk melodies, and they also admire the whimsical illustrations of Eric Carle
    and the playful songs of the Disney soundtrack.
  travel: Jenna Ramirez enjoys weekend trips to the nearby state park's creek for leaf collecting, loves summer visits to the beach town of Santa Monica, and dreams of exploring the Grand Canyon and the
    bustling streets of New York City with family, while they keep a scrapbook of ticket stubs from each outing.
  culinary: Jenna Ramirez enthusiastically helps roll homemade tacos and shape tamales with their family, relishes cheesy quesadillas topped with fresh avocado, and they often experiment with making slime-inspired
    fruit salads featuring berries and melon.
  core: Jenna Ramirez is a curious, organized seven‑year‑old who balances bright imagination with bouts of anxiety, can lose focus mid‑project when overwhelmed, and secretly hoards glitter pens in their
    backpack, often whispering to themselves to stay calm as they work.
background:
  cultural: Jenna comes from a Mexican‑American family rooted in South Gate, California, where Spanish and English are spoken at home. Her household celebrates traditional holidays such as Día de los Muertos,
    Mexican Independence Day, and family birthdays with homemade foods like tamales, pozole, and fresh tortillas. Family gatherings are frequent, reflecting the strong value of familismo, and her grandparents
    often share stories and songs from Mexico, nurturing Jenna’s appreciation for her heritage. At school she participates in a bilingual program that reinforces her language skills, while community events,
    local parades, and the neighborhood’s vibrant Latino culture provide her with a sense of belonging. These cultural influences shape her kindness, cooperative spirit, and pride in creating art that reflects
    her Mexican roots.
