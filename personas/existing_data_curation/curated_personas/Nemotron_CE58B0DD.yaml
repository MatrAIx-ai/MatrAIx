    lessons)'', ''Curiosity in simple science experiments'']'
  hobbies: '[''Drawing and coloring'', ''Paper‑mâché and craft projects'', ''Reading picture books'', ''Building LEGO sets'', ''Simple science experiments (volcanoes, slime)'', ''Listening to music and
    learning folklórico dance'', ''Playing soccer'', ''Helping prepare family meals (tacos, tamales)'', ''Exploring parks and collecting natural objects'']'
  career_goals: Jenna dreams of growing up to combine her love of art and caring nature. She often says she wants to become an artist who creates bright pictures that make people smile, a teacher who helps
    children explore new ideas, or a veterinarian who looks after animals. She imagines studying art, biology, or education so she can one day design creative learning spaces where everyone feels welcomed
    and supported.
