  hobbies: '[''LEGO building'', ''Basketball'', ''Strategy video games (Minecraft, Civilization)'', ''Reading (space, engineering, Black innovators)'', ''Church youth group activities'', ''Journaling'',
    ''Sketching'', ''Chess'']'
  career_goals: Ivore aims to pursue a career in engineering, specifically civil or mechanical engineering, to design safe, accessible infrastructure in his community. He is motivated to attend a STEM‑focused
    high school and earn a scholarship to a university with strong engineering programs, eventually working on projects that improve neighborhoods in Charlotte and beyond. He also aspires to become a mentor
    for younger students, using his organizational strengths to lead after‑school tutoring or robotics workshops. In the longer term, he hopes to combine technical expertise with community advocacy, ensuring
    that development projects benefit all residents, especially underrepresented groups.
