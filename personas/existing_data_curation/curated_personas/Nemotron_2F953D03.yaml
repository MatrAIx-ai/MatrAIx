personas:
  professional: Ivore Epps is an aspiring junior engineer who channels a love for LEGO Technic, Minecraft, and Civilization into meticulous project planning, using a bullet‑journal to outline step‑by‑step
    builds and setting high standards for every creation while balancing schoolwork with disciplined practice.
  sports: Ivore Epps is a dedicated community‑center basketball player who emulates the disciplined routines of the Chicago Bulls, attends weekly after‑school drills, and practices chess moves to enhance
    strategic thinking on the court.
  arts: Ivore Epps is a creative youth who blends LEGO building with sketch‑drawing, participates in the church youth choir performing songs by artists such as Bruno Mars and Beyoncé, and draws inspiration
    from the cinematic scores of Hans Zimmer while exploring biographies of innovators for artistic storytelling.
  travel: Ivore Epps is an enthusiastic explorer who has visited the local space museum, plans a future trip to Washington, D.C.’s National Air and Space Museum, and enjoys weekend road trips to nearby
    state parks for photography and LEGO construction sessions.
  culinary: Ivore Epps is a budding cook who loves assembling customizable tacos with seasoned ground beef, fresh cilantro, and lime, perfecting homemade chocolate chip cookies, and experimenting with 'LEGO‑style'
    fruit kebabs for snack breaks.
  core: Ivore Epps is a meticulously organized teen who channels engineering curiosity, basketball discipline, and a bullet‑journal habit into a life of structured creativity, occasional anxious overthinking,
    and disciplined budgeting.
background:
  cultural: Ivore grew up in Charlotte’s historically Black neighborhoods within Mecklenburg County, where his family’s roots trace back to the Great Migration. His upbringing blends Southern Black culture,
    church traditions, and strong community ties. Family gatherings feature soul‑food meals, gospel music, and storytelling that emphasize respect, education, and mutual support. He participates in local
    cultural events such as Juneteenth parades, Black History Month programs at his school, and community volunteer projects at a neighborhood garden. These experiences have instilled in him a sense of
    pride in his heritage, an awareness of social equity, and an appreciation for collective harmony.
attributes:
  skills: '[''Organization and planning'', ''Time management'', ''Google Suite proficiency'', ''Scratch programming'', ''Basic Python'', ''Robotics club participation'', ''Team coordination'', ''Note‑taking'',
