persona_description: A horticulturist and designer who specializes in the cultivation and shaping of trees and shrubs, particularly through the use of pleaching and topiary techniques. They are interested
  in creating living structures that can support themselves and carry a working load, and have a particular interest in the design and maintenance of living tree houses and dome-like structures. They may
  also be interested in the use of living trees in urban and suburban environments, and the potential for these structures to serve as a means of creating boundaries, walls, and screens.
