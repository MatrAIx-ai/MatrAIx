personas:
  professional: Kurt Pettibone is an aspiring mechanical engineer who channels a blend of hands‑on tinkering and data‑driven analysis into renewable‑energy product concepts, leveraging Python scripting,
    Fusion 360 modeling, and 3D‑printing prototypes while thriving in roles that reward clear performance metrics and grant autonomy for side‑project explorations.
  sports: Kurt Pettibone routinely hikes the foothills near Golden and tackles crags at Eldorado Canyon, is a member of the Flatirons Climbing Club, follows the Colorado Avalanche and Denver Broncos avidly,
    and in winter swaps climbing for snowboarding at Loveland, preferring structured training plans that log elevation gain and climb grade improvements.
  arts: Kurt Pettibone captures Colorado’s sunrise‑lit peaks with a DSLR, curates a photo portfolio that blends technical precision with artistic composition, and balances that visual hobby with a playlist
    of indie folk like Bon Iver and cinematic scores from Christopher Nolan films, while occasionally attending the Boulder Museum of Contemporary Art’s installations.
  travel: Kurt Pettibone favors rugged weekend adventures—trekking the alpine trails of Rocky Mountain National Park, stargazing in Great Sand Dunes, and planning a future expedition to Iceland’s geothermal
    fields—yet relies on meticulous gear checklists and GPS waypoints for wilderness trips, while their spontaneous city visits are limited to budget‑friendly stays in Portland and Austin.
  culinary: Kurt Pettibone enjoys crafting quick, protein‑rich meals such as quinoa‑kale bowls spiced with smoked paprika, perfecting a home‑brewed cold brew coffee with beans from a local roastery, and
    indulging in occasional trail‑mix snack mixes, although their cooking skill hovers at functional level and they often resort to ordering a greasy pizza after a long climbing session.
  core: Kurt Pettibone is a pragmatic, solitary tinkerer who fuses engineering curiosity with outdoor grit, thriving on structured goals yet comfortably chaotic in daily planning, and habitually balances
    competitive chess victories with a lingering tendency to procrastinate on mundane chores.
background:
  cultural: Kurt grew up in the Western Colorado region, a predominantly white, middle‑class environment where outdoor recreation and self‑reliance are valued. His family’s roots in the area reflect a blend
    of suburban life in Golden and an appreciation for the nearby mountains, which has shaped his practical, independent outlook. He was raised with an emphasis on personal responsibility and critical thinking,
    encouraging a skeptical approach to information and a competitive spirit. While he is not strongly affiliated with any religious institution, he participates in community events such as local trail
    clean‑ups and occasional town festivals, reflecting a modest engagement with regional cultural traditions.
attributes:
  skills: '[''Python programming'', ''AutoCAD drafting'', ''Fusion 360 3D modeling'', ''Mechanical troubleshooting'', ''Data analysis with Excel'', ''Project planning basics'', ''Strategic thinking (chess
    & e‑sports)'', ''Orienteering and navigation'', ''Basic Arduino electronics'']'
  hobbies: '[''Hiking and trail exploration'', ''Rock climbing (indoor and outdoor)'', ''Competitive chess'', ''Strategy video gaming (eSports)'', ''3D printing hobby projects'', ''DIY electronics (Arduino)'',
    ''Landscape photography'', ''Reading non‑fiction (technology, psychology, sustainability)'', ''Miniature woodworking'']'
  career_goals: Kurt aims to leverage his technical foundation into a career as a mechanical engineer or product development specialist in the renewable‑energy sector, where he can create functional, sustainable
    solutions. He is attracted to roles that provide clear performance metrics and allow him to work autonomously, while also offering the flexibility to explore side projects. In the longer term he hopes
    to launch his own small‑scale design‑and‑fabrication business, focusing on bespoke 3D‑printed components for local makers and outdoor equipment companies.
