  hobbies: '[''Gardening'', ''Woodworking projects'', ''Reading historical biographies'', ''Jigsaw puzzles and crosswords'', ''Church choir participation'', ''Playing chess'', ''Volunteer event organization'',
    ''Genealogy research'']'
  career_goals: Although retired, Gustavo’s current ambitions focus on legacy and wellness. He aims to complete a memoir that captures his family’s Portuguese roots and the story of Hickory’s furniture
    industry, preserving these histories for his grandchildren. He also seeks to stay physically active through daily gardening and weekly walks, maintain his independence by keeping his affairs organized,
    and expand his mentorship role at the senior center, where he hopes to teach woodworking techniques to a new generation. Longer‑term, he hopes to travel to Portugal to visit his ancestral hometown once
    his health permits.
