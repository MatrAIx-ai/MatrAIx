  career_goals: Although retired from formal employment, Elizabeth aims to remain an active and reliable pillar of her community. Her goals include expanding intergenerational volunteer programs at the
    local senior center, mentoring youth through tutoring and life‑skill workshops, preserving family and community history through a personal memoir and scrapbook project, and maintaining her health and
    vitality to continue supporting her spouse and grandchildren. She also hopes to launch a small neighborhood garden initiative that blends horticulture with sustainability education.
