  career_goals: Priscilla dreams of a future where she can combine her love of art, storytelling, and technology. She aspires to become a digital illustrator or game designer who creates interactive stories
    that celebrate African‑American culture and the history of her hometown. She also imagines herself someday leading an after‑school arts program for other kids in Kinston, encouraging curiosity and creativity.
    While still young, she sets incremental goals such as mastering more advanced drawing techniques, learning coding languages like Python, and participating in local art contests.
