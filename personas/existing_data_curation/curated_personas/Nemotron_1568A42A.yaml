personas:
  professional: Priscilla Horton, a budding illustrator, channels their curiosity and competitive edge into mastering watercolors, digital drawing apps, and crafting intricate comic panels, while keeping
    a meticulously organized sketchbook that they update whenever inspiration strikes.
  sports: Priscilla Horton enjoys weekend soccer practice with the Oakwood Hurricanes U‑10 team, seasonal swimming lessons at the community pool, and hiking the Neuse River trails with their family, and
    they balance a competitive drive to win games with an organized routine that includes daily stretching and a habit of tracking progress on a brightly colored fitness chart.
  arts: Priscilla Horton dives into creative expression through drawing whimsical characters inspired by graphic novels, painting fluid watercolor scenes, experimenting with Procreate on their tablet, and
    singing soulful harmonies with the church youth choir, often citing artists like manga creator Naoko Takeuchi and painter Wassily Kandinsky as sources of inspiration, and they love swapping ideas with
    friends at school.
  travel: Priscilla Horton prefers short, family‑focused road trips, having already explored the historic streets of Charleston, the sandy dunes of Wrightsville Beach, and a weekend camp at Shenandoah National
    Park, where they planned their own nature journal entries, but they dream of visiting the towering castles of Scotland’s Highlands next summer.
  culinary: Priscilla Horton enjoys helping their mother in the garden and turning fresh tomatoes, basil, and zucchini into a simple pasta primavera, while also loving classic childhood staples like grilled
    cheese with cheddar and apple slices, and they can often be found mixing up strawberry‑banana smoothies after a rainy day of drawing.
  core: Priscilla Horton is a curious, competitively creative nine‑year‑old who balances a tidy sketchbook and a thriving LEGO collection with a love for music, nature trails, and a strategic allowance‑saving
    habit, all while they navigate occasional sneezes from spring allergies.
background:
  cultural: Priscilla is a Black girl raised in Kinston, a small city in eastern North Carolina with deep roots in African‑American history. Her family emphasizes strong community ties, church participation,
    and the preservation of cultural traditions such as soul food cooking, storytelling, and gospel music. She often celebrates holidays like Juneteenth and observes family customs passed down from great‑grandparents
    who lived through the Civil Rights era in the South. The local African‑American community’s focus on education, resilience, and artistic expression—evident in community events at the Slave History Museum
    and neighborhood murals—has shaped her worldview. The blend of Southern hospitality, church fellowship, and a growing appreciation for regional Black arts provides Priscilla with a rich cultural foundation
    that informs her interests in storytelling, music, and community engagement.
