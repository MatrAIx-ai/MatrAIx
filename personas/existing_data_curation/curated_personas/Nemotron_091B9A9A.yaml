personas:
  professional: Charles Dobbs is a veteran equipment cleaner in central Washington who leverages their meticulous routine and hands‑on mechanical know‑how—mastering pressure‑wash systems, chemical degreasers,
    and quick fault diagnosis—to ensure spotless farm machinery, while occasional spontaneous tinkering and a competitive edge drive them to mentor junior staff and push for supervisory responsibilities.
  sports: Charles Dobbs is a loyal fan of the Seattle Seahawks and the Washington State Cougars, regularly attending Quincy high‑school football games, while personal fitness revolves around seasonal river
    fishing, weekend hunting excursions, and occasional participation in a local 4‑H shooting league.
  arts: Charles Dobbs finds artistic solace in classic rock legends like Bruce Springsteen and country storytellers such as Willie Nelson, enjoys watching westerns starring John Wayne on Saturday nights,
    and showcases a creative side at regional classic‑car shows where they admire the craftsmanship of vintage vehicle restorations.
  travel: Charles Dobbs prefers short, purpose‑driven road trips that blend work and leisure, such as weekend drives to the Columbia River Gorge for fishing, family outings to the Oregon coast, and annual
    pilgrimages to the Seattle Auto Fair, while dreaming of a future fishing expedition to Alaska’s Kenai River when the business steadies.
  culinary: Charles Dobbs’s palate favors hearty, home‑cooked fare—grilled Columbia River trout, cedar‑plank salmon, smoked venison stew, and a signature apple‑pie with cinnamon—often prepared over a backyard
    smoker, and they relish the occasional fast‑food burger after a long day in the garage.
  core: Charles Dobbs is a routine‑driven, hands‑on detailer who balances practical frugality with spontaneous classic‑car projects, a competitive streak, and a deep love for the outdoors.
background:
  cultural: Charles comes from a white, working-class background typical of rural central Washington. His family has lived in the region for generations, with roots in farming and logging communities that
    emphasize self-reliance, practicality, and a strong work ethic. He was raised in a modest Protestant household where traditional values and community involvement, such as county fairs and high-school
    sports, were central. The cultural milieu of Quincy and Douglas County reinforces a respect for routine labor, modesty, and the importance of providing for one's family.
