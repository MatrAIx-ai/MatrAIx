  hobbies: '[''Fishing'', ''Hunting'', ''Classic car restoration'', ''Woodworking'', ''Home improvement'', ''Road trips'', ''Watching football'', ''Community clean-up volunteering'']'
  career_goals: Charles aims to advance from a hands-on cleaner to a supervisory role within the local equipment-maintenance industry. He plans to earn a Certified Automotive Detailing Technician credential
    and to expand his knowledge of commercial-fleet cleaning protocols. Over the next five years, he hopes to lead a small team, improve operational efficiency, and eventually launch his own mobile detailing
    service that serves farms and logging companies throughout Douglas County. His long-term ambition is to build a reliable business that secures a comfortable future for his wife and children while allowing
    him to maintain the routine work he enjoys.
