  career_goals: Leonildo aims to move into low‑stress, remote or home‑based work that lets him maintain autonomy and limit frequent social interaction. His ambitions include freelance technical support
    for small businesses, offering online budgeting or personal finance coaching, and eventually launching a modest e‑commerce shop selling handcrafted wooden items. He also hopes to complete a certification
    in IT fundamentals to bolster his credibility while preserving a flexible schedule.
