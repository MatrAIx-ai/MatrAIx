personas:
  professional: Isis Lopez is a community cultural mentor who leverages her bilingual communication, event‑planning experience, and practical curiosity to host intimate cooking workshops and church gatherings,
    all while favoring flexible, low‑stress schedules.
  sports: Isis Lopez enjoys daily sunrise walks along the Daytona Beach shoreline, where she birdwatches and engages in gentle stretching, and she cheers on the Tampa Bay Buccaneers and the Orlando Magic
    while playing weekly pickleball at the local senior center.
  arts: Isis Lopez immerses herself in creative pursuits by crocheting intricate blanket patterns while listening to salsa, bomba, and plena rhythms from artists like Celia Cruz and Willie Colón, and decompresses
    with historical fiction novels such as Ken Follett’s "Pillar of the Earth" and memoirs by Isabel Allende.
  travel: Isis Lopez favors leisurely weekend trips to historic coastal towns—like Savannah, SC and St. Thomas in the Virgin Islands—where she can combine genealogy research at local archives with tranquil
    beach walks, all while keeping travel costs modest.
  culinary: Isis Lopez delights in preparing classic island recipes such as arroz con gandules, mofongo, and alcapurrias, often experimenting by adding locally sourced herbs from her garden like cilantro
    and culantro to create family‑friendly twists that she shares during intimate Sunday meals.
  core: Isis Lopez embodies a quiet curiosity, balancing practical stewardship of her family’s traditions with a relaxed, flexible lifestyle that includes gardening, crochet, and breezy beach walks.
background:
  cultural: Isis is a first‑generation Puerto Rican American whose identity is shaped by the vibrant traditions of her island heritage and her life in Florida. She grew up speaking Spanish at home, celebrating
    Puerto Rican holidays, and learning the island's cuisine from her parents. In Daytona Beach, she blends these cultural roots with the local coastal lifestyle, maintaining a strong sense of community,
    family cohesion, and respect for the rhythms of both her ancestral and adopted homes.
