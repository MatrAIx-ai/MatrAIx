  career_goals: Although no longer in the formal workforce, Isis aims to deepen her role as a cultural mentor within her community. She hopes to host regular cooking workshops that blend curiosity for new
    flavor twists with practical, family‑friendly recipes, and to compile a small cookbook celebrating her family's culinary heritage. Additionally, she plans to improve her digital skills to create an
    online archive of Puerto Rican stories and recipes, ensuring that her traditions are preserved for future generations while maintaining a flexible, low‑pressure schedule.
