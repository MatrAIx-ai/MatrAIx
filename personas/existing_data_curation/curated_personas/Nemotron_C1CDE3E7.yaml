personas:
  professional: Omar Blanco, a retired small-business executive turned mentor, leverages decades of strategic planning, bilingual communication, and methodical curiosity to guide budding entrepreneurs while
    they meticulously document their business journey for a memoir.
  sports: Omar Blanco, a devoted early-morning fisherman, follows the Tampa Bay Buccaneers and Miami Marlins, and they maintain light fitness through shoreline walks, participation in the local Naples Sailing
    Club, and occasional darts at the senior center.
  arts: Omar Blanco, an aficionado of classic boleros by Benny Moré and Compay Segundo, spends evenings immersed in the melodies while they craft model ships, capture Gulf sunrise photographs, and devour
    novels by Gabriel Garcia Marquez alongside contemporary finance biographies.
  travel: Omar Blanco, a low-key planner, prefers brief road trips to Key West, Sanibel Island, and New Orleans, enjoys spontaneous sunrise photography along the Gulf, and they dream of exploring Cartagena’s
    historic old town while balancing limited mobility and a modest travel budget.
  culinary: Omar Blanco, an enthusiastic home cook, blends tradition and innovation by preparing ropa vieja with smoked paprika, picadillo with sweet plantains, and fresh citrus salads harvested from their
    garden, while they occasionally forget precise spice measurements, resulting in pleasant serendipitous flavors.
  core: Omar Blanco, an 86-year-old garden-loving former entrepreneur who balances solitary reflection with community mentorship, fuels daily life with early-morning fishing, bolero melodies, and a meticulous
    yet curious approach to finances and health, while they cherish quiet moments and sometimes overwater their prized ferns.
background:
  cultural: Omar was born in Cuba in the late 1930s and emigrated to the United States as a young adult, settling first in Miami before moving to Naples. He grew up immersed in Afro‑Cuban rhythms, family‑centered
    celebrations, and the Spanish language, while also adapting to American social norms. His Cuban heritage remains a core part of his identity, influencing his culinary preferences, music taste, and commitment
    to community. He maintains close ties with the Cuban diaspora in Florida, participates in cultural festivals, and values the transmission of Cuban traditions—such as storytelling, hospitality, and respect
    for elders—to younger generations. The blend of Cuban resilience and American entrepreneurship shapes his worldview and daily practices.
attributes:
  skills: '[''Financial analysis'', ''Budgeting'', ''Strategic planning'', ''Supply chain coordination'', ''Risk management'', ''Bilingual communication (Spanish/English)'', ''QuickBooks and accounting
