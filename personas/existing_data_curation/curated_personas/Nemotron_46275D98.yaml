personas:
  professional: Mark Huang, a budding robotics enthusiast with a talent for Arduino programming and meticulous model‑kit construction, applies his organized mindset and love of practical science to design
    functional prototypes that blend curiosity with disciplined engineering.
  sports: Mark Huang, an avid weekend hiker with the Springfield Youth Outdoor Club, explores the Ozark trail system, backs the St. Louis Cardinals and the Missouri Tigers, occasionally joins a neighborhood
    pickup basketball game, and enjoys weekend bike rides on local rails‑to‑trails.
  arts: Mark Huang, a quiet aficionado of visual and auditory arts, often studies the kinetic sculptures of Theo Jansen, listens to the ambient synth soundscapes of Vangelis, watches Christopher Nolan’s
    mind‑bending films, and spends free evenings drawing technical sketches that blur the line between engineering and art.
  travel: Mark Huang, a meticulous planner, spends his school breaks hiking the Ozark National Forest and visiting the St. Louis Science Center, dreams of attending the World Robot Expo in Osaka, Japan,
    and hopes to trek the Grand Canyon on a future family road trip, balancing modest savings with a preference for low‑key, nature‑focused getaways.
  culinary: Mark Huang, who favors practical yet tasty meals, frequently cooks a quick chicken‑and‑vegetable stir‑fry with soy sauce, garlic, bell peppers, and jasmine rice, enjoys mastering the perfect
    pepperoni pizza slice as a post‑project reward, and experiments with growing herbs in his garden to freshen his dishes.
  core: Mark Huang, a methodical 14‑year‑old who blends quiet curiosity with practical precision, channels his love for science, order, and small‑group collaboration into building Arduino gadgets, tending
    a garden, mastering chess, and balancing a disciplined allowance routine while occasionally losing track of time in cooperative video games.
background:
  cultural: Mark was raised in Springfield, Missouri, within a predominantly White, Midwestern community that blends suburban and rural influences. His family emphasizes modesty, self‑reliance, education,
    and community service. He celebrates traditional American holidays such as Thanksgiving and Independence Day, often attending local parades, county fairs, and school volunteer events. The regional culture
    values a strong work ethic, respect for tradition, and friendly neighborliness, which shape Mark's practical outlook, organized habits, and cooperative nature. He also experiences occasional exposure
    to the cultural diversity of Greene County through school and community activities, fostering an appreciation for inclusive collaboration.
