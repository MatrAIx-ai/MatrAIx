  career_goals: Mark aspires to turn his curiosity and practicality into a career in engineering, ideally civil or mechanical engineering, where he can design functional solutions for his community. In
    the near term, he plans to enroll in a STEM‑focused high school, join a robotics or engineering club, and earn a scholarship for an engineering degree. Long‑term, he hopes to work on infrastructure
    projects that improve Springfield's public spaces, such as parks, transportation, and sustainable housing, and to mentor younger students interested in STEM fields.
