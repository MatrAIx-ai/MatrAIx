persona_description: A researcher and scientist who is interested in conducting cloud observation and research, particularly in the field of tropical warm pools. They are likely to be contributing to the
  Tropical Warm Pool International Cloud Experiment (TWPICE) and will be interested in collecting data on cloud properties and the meteorological environment from the planetary boundary layer up to 15 km
  high. They will be using various instruments and platforms, such as soundings, in-situ observations, and remotely sensed information, to support cloud resolving and other modeling studies. They may also
  be interested in contributing to the design and execution of the experiment, and may have a background in meteorology, atmospheric science, or related fields.
