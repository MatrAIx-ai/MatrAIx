personas:
  professional: Neika Comeaux, a four‑year‑old budding architect in the backyard sandbox, meticulously sorts building blocks by shape and color, follows a daily schedule for play, and habitually checks
    that every tower stands straight, reflecting their love of structure, reliability, and cooperative play.
  sports: Neika Comeaux dotes on the Tiny Tots preschool gymnastics club, eagerly practices the forward roll every Thursday, and beams with excitement whenever the New York Yankees win, balancing structured
    activity with a love for organized team sports.
  arts: Neika Comeaux spends afternoons humming Disney classics like Let It Go by Idina Menzel, drawing vibrant pictures of Mickey Mouse and Sesame Street characters, and proudly reciting the alphabet song
    by The Wiggles, revealing how music and simple visual arts shape their playful identity.
  travel: Neika Comeaux loves family road trips that stick to a clear timetable, cherishes the recent visit to Orlando’s Disney World where they rode the carousel twice, and dreams of a future airplane
    adventure to the Grand Canyon, preferring destinations with familiar routines and kid‑friendly attractions.
  culinary: Neika Comeaux prefers predictable meals like grilled cheese on whole wheat bread with a side of apple slices, enjoys helping stir the batter for banana pancakes, and delights in tasting crunchy
    carrot sticks, showing a modest palate that values simple, familiar flavors.
  core: Neika Comeaux, a four‑year‑old with a penchant for order, turns every playtime into a well‑planned project, saves coins with military precision, and never lets a missing puzzle piece ruin a smile.
background:
  cultural: Neika is raised in an African‑American family in Anderson, South Carolina, where Southern traditions and community values shape her everyday life. Weekly church services, Sunday school, and
    gospel music provide a rhythmic backdrop to her upbringing. Family gatherings feature soul food staples such as fried chicken, collard greens, cornbread, and sweet tea, while celebrations of Juneteenth
    and Kwanzaa reinforce a sense of cultural pride. Her surname, Comeaux, hints at a Creole heritage that blends African, French, and Southern influences, enriching the stories, music, and foods she experiences
    at home.
