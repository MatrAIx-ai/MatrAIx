personas:
  professional: Carlton Adkison, a retired handyman turned community storyteller, blends decades of woodworking, small‑engine repair, and improvised problem‑solving with a natural flair for mediating conflicts
    and organizing town events, though their spontaneous nature often leaves workshop schedules loosely defined.
  sports: Carlton Adkison, a devoted fan of the Penn State Nittany Lions football team and the Philadelphia Eagles, spends Saturday afternoons watching games at the community center while swapping bridge
    hands, and maintains an informal membership in the Bellefonte senior walking club that follows the Nittany Trail each morning.
  arts: Carlton Adkison, a classic‑rock aficionado who spins The Rolling Stones, Led Zeppelin, and The Beatles on a vintage record player, channels that rhythm into hand‑carved wooden figurines, regularly
    attends community theater productions of Shakespeare’s plays, and quotes lines from old movies during the weekly coffee gathering.
  travel: Carlton Adkison, an 88‑year‑old explorer who favors leisurely road trips over the Blue Ridge Parkway, loves the historic charm of Gettysburg, the craft fairs of Asheville, and the serene vistas
    of Shenandoah Valley, but always plans trips around the family’s budget and the need to bring his dog, often improvising itineraries on the fly.
  culinary: Carlton Adkison delights in turning heirloom tomatoes, fresh basil, and rosemary from his garden into rustic bruschetta and summer soups, enjoys baking crusty sourdough bread with a sprinkling
    of sea salt, occasionally over‑salts his stew during an engrossing bridge game, and never misses a Sunday night meatloaf topped with a dollop of homemade ketchup.
  core: Carlton Adkison, an 88‑year‑old garden‑hand, woodworker, and raconteur, blends spontaneous curiosity with a warm, talkative spirit, often juggling community projects, vintage rock, and occasional
    forgetfulness about bills.
background:
  cultural: Carlton comes from a multi‑generational white Appalachian‑American family that settled in Centre County in the early 1900s. Raised in the small‑town values of Bellefonte, his upbringing emphasized
    self‑reliance, church participation, and community solidarity. He grew up hearing stories of the coal and rail industries that once shaped the region, and he maintains a strong connection to local traditions
    such as the annual Centre County Fair, the town’s historic preservation efforts, and the close‑knit social networks typical of rural Pennsylvania.
