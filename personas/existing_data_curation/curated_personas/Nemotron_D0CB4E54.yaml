  career_goals: Although retired, Carlton aims to stay an active, vibrant presence in Bellefonte. He hopes to document his family’s history and his own life stories in a memoir, share his woodworking knowledge
    through workshops at the local senior center, and continue supporting his wife’s involvement in the church choir. He also aspires to learn basic video‑calling technology to stay connected with distant
    grandchildren and to help preserve the town’s historic downtown through volunteer work with the historical society.
