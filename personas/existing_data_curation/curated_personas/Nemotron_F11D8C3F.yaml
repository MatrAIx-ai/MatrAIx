personas:
  professional: A budding builder, Alexandra Parker enjoys constructing tidy LEGO Duplo structures and arranging shelves with meticulous care, turning playtime into a practice of organization and disciplined
    focus.
  sports: An enthusiastic member of the local Kids' Gymnastics Club, Alexandra Parker practices routines twice a week, cheers for the nearby youth soccer team the Tigers, and finds comfort in the structured
    drills that mirror her love for order.
  arts: A precise colorer, Alexandra Parker fills picture books with crayons, hums along to The Wiggles' rhythmic songs at the library, and folds simple origami cranes inspired by Akira Yoshizawa, letting
    her artistic side flourish within clear guidelines.
  travel: A cautious explorer, Alexandra Parker has visited the nearby state park's nature trail, enjoyed a family weekend at Disneyland, and dreams of seeing the snowy peaks of the Rocky Mountains, preferring
    well‑planned itineraries over spontaneous trips.
  culinary: A budding chef in the kitchen, Alexandra Parker can assemble a perfect peanut‑butter‑and‑jelly sandwich, loves the taste of cheesy macaroni, enjoys snacking on carrot sticks with hummus, and
    delights in helping her mother water the basil plant that flavors their family meals.
  core: Alexandra Parker is a methodical, rule‑loving six‑year‑old who channels her need for order into building, saving, and carefully managed adventures, while navigating intense anxiety with quiet determination.
background:
  cultural: Alexandra is raised by a close‑knit Black family in Omaha, Nebraska. Her parents celebrate African‑American heritage through family gatherings that feature soulful music, storytelling about
    notable Black figures, and traditional dishes like collard greens and cornbread. She regularly participates in community events such as the annual Juneteenth celebration at the local cultural center,
    where she learns about the history of freedom and resilience. The neighborhood's public library runs a weekly 'Storytime for Kids' program that often highlights books by Black authors, reinforcing her
    cultural identity. These experiences shape her sense of belonging and foster pride in her cultural roots while grounding her in the diverse Midwestern community.
