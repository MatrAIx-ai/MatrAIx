  career_goals: Although she is only six, Alexandra often talks about the jobs she would like to have when she grows up. She aspires to become a teacher because she loves the idea of creating a calm, well‑organized
    classroom where every student knows what to expect. She is also fascinated by animals and says she might be a veterinarian, enjoying the prospect of caring for pets in a gentle, systematic way. Additionally,
    she imagines working in a library, arranging books and helping other children find the stories they love. These ambitions reflect her desire for predictable environments and her wish to support others.
