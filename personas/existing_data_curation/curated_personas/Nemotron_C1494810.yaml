personas:
  professional: Gabriela Rojo is a bilingual community volunteer who leverages their artistic eye and meticulous event coordination to lead small art workshops for seniors and immigrants, and as they pursue
    a nonprofit management certificate, they aim to become the volunteer coordinator of a cultural center, channeling their curiosity and compassionate nature into inclusive programming.
  sports: Gabriela Rojo enjoys low‑impact fitness through weekly hikes on the Wasatch Front, occasional snowshoeing in the Wasatch winter, and supports the Utah Jazz and BYU Cougars, balancing solitary
    exercise with gentle participation in a local senior fitness class.
  arts: Gabriela Rojo spends afternoons painting watercolors of Utah canyon vistas, curates informal gallery tours spotlighting Frida Kahlo, Diego Rivera, and Utah painter Emily Carver, and captures sunrise
    over Red Rock formations with her DSLR, all while weaving art‑history anecdotes into weekly workshops for seniors.
  travel: Gabriela Rojo prefers thoughtfully planned journeys that blend cultural immersion and natural wonder, having explored the historic streets of Cartagena, admired the Prado Museum in Madrid, and
    trekked Zion National Park and Sedona’s red cliffs, often traveling with a small circle of friends to keep budgets comfortable.
  culinary: Gabriela Rojo’s kitchen overflows with the aroma of corn‑masa arepas, richly spiced hallacas filled with pork, raisins, and olives, fresh avocado salads, and creative dishes that incorporate
    Utah heirloom tomatoes and seasonal squash, showcasing a cooking skill that comfortably spans traditional family recipes to adventurous fusion.
  core: Gabriela Rojo balances a quiet devotion to watercolor and gardening with an insatiable curiosity for cultural exchange, often hoarding art supplies while forgetting to water their succulents and
    sipping endless coffee during late‑night sketch sessions.
background:
  cultural: Gabriela's cultural background is rooted in her Venezuelan upbringing, where family gatherings, music, and culinary traditions formed a vibrant daily life. She grew up listening to joropo and
    salsa, celebrating holidays like Día de la Independencia and Christmas with the traditional foods of her homeland. After immigrating to the United States in her early thirties, she settled in Spanish
    Fork, Utah, joining a modest yet supportive Venezuelan expatriate community. While she has embraced aspects of Utah’s outdoor lifestyle and the local LDS cultural environment, she maintains her Venezuelan
    identity through regular cooking, storytelling, and participation in Latin American cultural events. Her bilingual fluency and deep appreciation for both cultures inform her compassionate approach to
    community work, allowing her to bridge gaps between diverse groups.
