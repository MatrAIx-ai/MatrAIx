  hobbies: '[''Painting'', ''Sketching'', ''Reading historical fiction'', ''Gardening'', ''Cooking Venezuelan dishes'', ''Volunteering at a senior center'', ''Hiking local trails'', ''Photography'', ''Attending
    art exhibits'', ''Spanish language tutoring'', ''Knitting'']'
  career_goals: Gabriela aims to translate her lifelong passion for art and her dedication to helping others into a meaningful role within her community. She seeks to become a volunteer coordinator for
    a local cultural center, where she can design and lead bilingual art‑education programs for seniors and immigrant families. She also aspires to develop a traveling exhibition that showcases Venezuelan
    folk art and to mentor youth interested in visual arts. To support these goals, she plans to obtain a certificate in art therapy and to complete a short course in nonprofit management. Ultimately, Gabriela
    hopes to leave a lasting legacy of cultural exchange and artistic enrichment in Spanish Fork and the broader Utah region.
