persona_description: A historical figure who has a deep interest in the history of England and particularly in the period from the 16th to the 18th century. This person is knowledgeable about the architecture,
  landscaping, and development of royal and aristocratic properties in England during this time period. They are particularly interested in the history of Montagu House, the properties of the Dukes of Montagu
  and Richmond, and the development of the London landscape. This person is also interested in the history of the London river and its foreshore, as well as the role of the Corporation of the City of London
  in the construction of the embankment.
