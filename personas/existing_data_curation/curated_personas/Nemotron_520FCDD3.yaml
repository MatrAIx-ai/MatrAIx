personas:
  professional: Arun Gandhi, a 48‑year‑old methodical home‑repair consultant and aspiring financial‑planning mentor, combines his hands‑on expertise in electrical troubleshooting, carpentry, and gardening
    with meticulous budgeting and project‑coordination skills to deliver low‑stress, reliable services while assertively managing community garden initiatives.
  sports: Arun Gandhi, though not a competitive athlete, routinely walks the nearby Ashwood Nature Preserve, joins a casual senior basketball league at the community center, and follows the Metro Strikers
    soccer club with weekend viewings, while occasionally playing chess in the park.
  arts: Arun Gandhi finds creative renewal in assembling detailed model kits of historic locomotives, listening to classical ragas performed on sitar by maestros, and watching classic film noir by directors
    known for nuanced social commentary, while also attending occasional local folk‑music performances that feature traditional percussion and melodic storytelling.
  travel: Arun Gandhi prefers low‑key, contemplative travel, having explored the serene gardens of Kyoto, the terraced rice paddies of Bali, and the historic monasteries of Meteora, while planning a future
    retreat to the Himalayan foothills for a meditation pilgrimage.
  culinary: Arun Gandhi expertly prepares aromatic lentil dal, spiced vegetable biryani, and hand‑rolled flatbreads seasoned with cumin, coriander, and fenugreek, often pairing them with homemade mango
    chutney and fresh pickles harvested from his garden, reflecting a deep appreciation for layered flavors and seasonal ingredients.
  core: Arun Gandhi balances a meticulous, low‑stress work ethic with intense bouts of anxiety, channeling his curiosity into model‑building and gardening while occasionally succumbing to perfection‑paralyzing
    over‑planning.
background:
  cultural: Arun comes from a South‑Asian (Indian) family that immigrated to the United States in the 1970s. He was raised in a bilingual household speaking Hindi (or Gujarati) and English, observing Hindu
    traditions such as Diwali and Navratri. He values family cohesion, respect for elders, and community service, while also embracing the progressive, multicultural environment of California's Bay Area.
    His cultural heritage informs his love for Indian cuisine, festival celebrations, and his commitment to supporting the local Indian diaspora.
attributes:
  skills: '[''Home Maintenance'', ''Electrical Troubleshooting'', ''Carpentry'', ''Gardening'', ''Budget Management'', ''Computer Literacy'', ''Community Event Coordination'', ''Volunteer Management'',
