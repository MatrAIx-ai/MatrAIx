  hobbies: '[''Reading non-fiction'', ''Gardening'', ''Cooking Indian cuisine'', ''Meditation'', ''Model building'', ''Chess'', ''Nature walks'', ''Participating in temple events'']'
  career_goals: He seeks to channel his organizational strengths into a part‑time consulting role helping neighbors with home repairs while developing a community garden that provides fresh produce and
    a therapeutic space for residents. He aspires to earn a certification in financial planning to offer budgeting counseling to low‑income families and to volunteer as a mentor for at‑risk youth, balancing
    purposeful work with a low‑stress, structured environment.
