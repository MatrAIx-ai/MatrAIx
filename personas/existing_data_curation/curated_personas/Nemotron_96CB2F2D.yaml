personas:
  professional: Sharon Patel, a 3‑year‑old budding organizer, runs a meticulously labeled pretend‑store in the living room, balancing curiosity about new toy products with practical price tags while they
    happily narrate the shop’s rules to an attentive circle of playmates.
  sports: Sharon Patel, a 3‑year‑old enthusiast of movement, attends weekly toddler gymnastics at the Little Sprouts Studio, cheers on the local baseball team the Cubs during family outings, and they eagerly
    practice kicking a soft soccer ball with the Mini Lions club, always ensuring all toys are neatly stored after play.
  arts: Sharon Patel, a vibrant 3‑year‑old lover of creative expression, spends mornings drawing animals with Jumbo Crayons, sings along to Raffi’s “Baby Beluga” while dancing, and they regularly request
    storytime from the picture‑book “Where the Wild Things Are,” immersing themselves in a world of colors and melodies.
  travel: Sharon Patel, a curious 3‑year‑old explorer, enjoys weekend trips to the seaside boardwalk, has visited the Grand Canyon on a family vacation, and they eagerly anticipate a future adventure to
    Disney World, preferring short drives and plenty of snack breaks.
  culinary: Sharon Patel, a picky‑but‑adventurous 3‑year‑old palate, loves macaroni and cheese topped with extra cheddar, munches on apple slices dipped in peanut butter, and they proudly help stir batter
    for banana pancakes, often sprinkling cinnamon for extra flavor.
  core: Sharon Patel is a talkative, methodical toddler who balances curiosity with practicality, loves to organize play, saves pennies like a mini‑banker, and radiates joy while occasionally forgetting
    sunscreen.
background:
  cultural: Sharon Marie Patel was born and raised in Sayreville, New Jersey, a suburban community in Middlesex County. Her family identifies as white and observes typical American cultural traditions,
    celebrating holidays such as Thanksgiving, Christmas, and Independence Day. Growing up in a diverse region, she is exposed to a variety of cultural influences through community preschool, local events,
    and neighborhood friendships, while her home life emphasizes kindness, cooperation, and community involvement.
