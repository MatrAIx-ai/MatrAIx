persona_description: A scientist who conducts research on the brain stem of infants who have died of Sudden Infant Death Syndrome (SIDS) and is interested in identifying the infants who are more susceptible
  to SIDS. She is also interested in the role of breastfeeding in reducing the risk of SIDS and has conducted research on the brain development of infants who have died of SIDS. She is looking for a way
  to identify the infants who have a serotonin deficit and to have a treatment for it. She is dedicated to improving the understanding of the pathophysiology of SIDS and to reducing the risk of SIDS through
  breastfeeding.
