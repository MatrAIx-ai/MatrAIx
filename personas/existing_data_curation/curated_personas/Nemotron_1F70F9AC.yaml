personas:
  professional: Matthew Lefrere is a budding multimedia strategist who channels their love for multiplayer games and improv drama into early experiments with interactive storytelling, using their sociable
    energy to rally friends into brainstorming sessions, while their practical curiosity and relaxed approach to deadlines mean they often sprint ahead with ideas but struggle to keep a tidy schedule.
  sports: Matthew Lefrere dribbles at the Prairie Community Center gym three times a week, cheering for the Los Angeles Lakers while also playing for the local youth league team, the Prairie Pythons, and
    they relish the high‑energy rush of a fast break, though they sometimes skip practice to linger on video game leaderboards.
  arts: Matthew Lefrere shines as a drama club star, delivering improvised scenes fueled by the comedic timing of TikTok creator Brittany Broski and the theatrical flair of Lin‑Manuel Miranda, while they
    edit quirky school‑life clips set to the soundtrack of Billie Eilish and enjoy watching the whimsical films of Tim Burton for inspiration.
  travel: Matthew Lefrere spends Saturdays wandering the lake shores of Lake Superior and the grass‑spattered paths of Prairie Creek State Park with family, preferring spontaneous day hikes over rigid itineraries,
    and they daydream about backpacking through Yellowstone and catching the aurora borealis in Iceland for their next big adventure.
  culinary: Matthew Lefrere is a self‑declared snack chef who can whip up a quick grilled cheese sandwich, a bowl of ramen noodles, or a DIY pepperoni pizza with a pre‑made crust, favoring bold flavors
    like mozzarella, pepperoni, and garlic; they also love munching on mango slices and strawberry‑banana smoothies while building LEGO sets, though they rarely venture beyond microwavable meals without
    parental supervision.
  core: Matthew Lefrere is an exuberant, socially‑charged twelve‑year‑old who blends a love for improv drama, gaming strategy, and spontaneous creativity with intense anxiety and a habit of splurging on
    the latest gadgets.
background:
  cultural: Matthew grew up in Watertown, South Dakota, a close‑knit Midwestern town where community events, school activities, and family gatherings shape daily life. His family blends typical Midwestern
    values—friendliness, cooperation, and a strong sense of community—with a touch of French‑Canadian heritage reflected in occasional family stories, bilingual grandparents, and traditional dishes passed
    down through generations. He attends Watertown Middle School, participates in local fairs, church gatherings, and enjoys the open‑prairie landscape that encourages outdoor recreation like hiking and
    fishing. This background instills in him a pragmatic outlook, a deep appreciation for collective harmony, and a desire to contribute positively to his community.
attributes:
  skills: '["Effective communication", "Team collaboration", "Basic Scratch programming", "LEGO building and design", "Storytelling and improvisation", "Empathy and active listening", "Basic basketball
