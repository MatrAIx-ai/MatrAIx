  hobbies: '["Multiplayer video gaming", "TikTok short video creation", "Drama club performances", "Basketball", "LEGO building and robotics kits", "Reading fantasy novels", "Hiking and fishing", "Journaling",
    "Sketching cartoons"]'
  career_goals: Matthew dreams of turning his love for technology and his desire to help others into a future career. He envisions becoming a software developer who creates educational games or community‑focused
    apps that bring people together. He also hopes to mentor younger kids through school clubs, perhaps as a teacher or youth counselor, where his sociable nature and kindness can foster a supportive learning
    environment. Long‑term, he would like to lead community projects in Watertown—organizing events, fairs, or service initiatives that combine his practical problem‑solving skills with his passion for
    harmony and collaboration.
