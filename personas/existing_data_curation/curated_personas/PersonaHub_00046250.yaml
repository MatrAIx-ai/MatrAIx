persona_description: A humanities instructor who is interested in developing pedagogical strategies that use digital media to promote and reinforce student engagement in personal and poetic expression.
  This person has experience teaching literature and writing, is familiar with the concept of the tethered self, and has worked with students in both synchronous and asynchronous contexts. They are interested
  in using social media resources to challenge the digital distractions their learners face on a daily basis and to develop a collaborative group poem and virtual chant based on Bukowsky's poem Bluebird.
