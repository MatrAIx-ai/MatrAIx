personas:
  professional: Daniel Bennett is a seasoned facility maintenance professional with a knack for troubleshooting mechanical, electrical, and carpentry issues; they channel a competitive drive into delivering
    flawless hand‑work while mentoring aspiring tradespeople through community workshops.
  sports: Daniel Bennett follows the New York Yankees and the New Jersey Devils with unabated loyalty, joins a local softball league on weekends, and maintains fitness through daily walks along the Passaic
    River trail, balancing competitive spirit with modest recreational play.
  arts: Daniel Bennett engages with the arts through the town historical society, enjoys Bruce Springsteen’s storytelling lyrics, attends community theater productions featuring classic American dramas,
    and collects vintage tool advertisements as decorative art.
  travel: Daniel Bennett prefers practical road trips to historic sites like Gettysburg and the Adirondack Mountains, planning itineraries around budget‑friendly B&Bs, while dreaming of a pilgrimage to
    the Irish coastal villages that echo family stories.
  culinary: Daniel Bennett delights in farm‑to‑table cooking, frequently serving garden‑fresh roasted beet salad with goat cheese, homemade chicken pot pie with heirloom vegetables, and the occasional river‑caught
    trout seasoned with rosemary and lemon.
  core: Daniel Bennett is a pragmatic, competitive handyperson who balances curiosity with careful budgeting, yet wrestles with chronic worry and occasional overspending on hobby tools.
background:
  cultural: Daniel comes from a white Anglo‑American background with family roots in the Northeastern United States, tracing back to English and Irish ancestors who settled in New Jersey in the early 20th
    century. He was raised in a modest, working‑class household in a suburban‑small‑town environment, where a strong work ethic, self‑reliance, and community involvement were emphasized. His cultural upbringing
    values practicality, modesty, and a sense of responsibility toward family and neighbors, while also exposing him to the diverse cultural fabric of the Greater New York metropolitan area. These influences
    shape his pragmatic approach to life, his competitive drive, and his cautious yet curious outlook.
