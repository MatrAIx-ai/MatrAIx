personas:
  professional: An aspiring mini-architect named Mone Mann, who channels a love for routine and precision into building LEGO masterpieces and meticulously organizing school projects, showcasing early spatial
    reasoning, problem-solving, and a dependable, methodical work ethic.
  sports: Mone Mann practices basketball drills with the neighborhood's Junior Hoops Club, cheers for the local high school Tigers during games, enjoys weekend fishing trips with the community Fishing Friends
    group, and collects baseball cards featuring the city's Minor League Sluggers.
  arts: Mone Mann delles into the worlds of adventure by reading 'The Chronicles of Narnia' and building elaborate Minecraft realms, while finding inspiration in LEGO designer Nathan Sawaya's sculpture
    videos and the whimsical tunes of the band Imagine Dragons.
  travel: Mone Mann prefers modest, well-planned trips, such as a family camping weekend at Cedar Creek State Park and a day excursion to the nearby aquarium in Oceanview, dreaming of someday exploring
    the natural wonders of Yellowstone National Park.
  culinary: Mone Mann loves assembling peanut butter and banana sandwiches on whole-grain bread, savoring crunchy carrot sticks seasoned with a dash of paprika, and helping the family garden harvest fresh
    tomatoes for homemade pizza topped with mozzarella and basil.
  core: Mone Mann is a routine-loving LEGO enthusiast who balances meticulous organization with a competitive streak, turning everyday chores into structured challenges while occasionally succumbing to
    the temptation of impromptu snack raids.
background:
  cultural: Mone grows up in a predominantly white, Southern community in Auburn, Alabama, where traditional values and a strong sense of local identity shape his worldview. His family participates in church
    activities and community events such as county fairs and high school football games, reinforcing a blend of Southern hospitality, modesty, and self‑reliance. The cultural emphasis on practicality, routine,
    and respect for established norms influences his daily habits and aspirations.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO construction and model assembly'', ''Organization and routine management'', ''Light woodworking assistance'', ''Basketball fundamentals
    and drills'', ''Strategic video gaming (Minecraft)'']'
  hobbies: '[''LEGO building'', ''Reading adventure and nature books'', ''Playing Minecraft'', ''Collecting and sorting baseball cards'', ''Fishing with family'', ''Practicing basketball drills'', ''Solving
    jigsaw puzzles'', ''Helping with gardening'']'
  career_goals: Mone envisions a future in a structured, hands‑on profession that lets him apply his love of routine and tangible results. He is drawn to skilled‑trade careers such as carpentry, automotive
    mechanics, or construction, and expresses interest in engineering fields that involve building and problem‑solving. He hopes to become someone who can reliably complete projects, compete with peers,
    and perhaps lead a team in a practical setting.
