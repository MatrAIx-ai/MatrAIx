    learning'', ''Critical thinking and problem‑solving'', ''Attention to detail in proofreading and editing'']'
  hobbies: '[''Reading (science nonfiction, psychology, classic literature)'', ''Bullet journaling and reflective writing'', ''Puzzle solving (crosswords, Sudoku)'', ''Yoga and guided meditation'', ''Nature
    sketching and drawing'', ''Basic photography (urban and nature subjects)'', ''Volunteer shelving at Louisville Main Library'']'
  career_goals: Sherrie intends to pursue higher education at the University of Louisville, aiming to major in Library and Information Science with a minor in Data Analytics. She is drawn to these fields
    because they blend her love for organized systems, quiet research environments, and practical problem‑solving. In the short term, she hopes to secure a scholarship and gain experience through internships
    at local libraries or archival institutions. Long‑term, Sherrie aspires to become a professional archivist or data analyst for a non‑profit organization focused on mental‑health advocacy, where she
    can apply her analytical skills to support evidence‑based programs while working in environments that respect her need for solitude and structured workflows.
