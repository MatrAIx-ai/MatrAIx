personas:
  professional: Sherrie Sayago, an aspiring library and information science student with a minor in data analytics, leverages meticulous note‑taking, spreadsheet wizardry, and basic Python scripting to
    organize research projects while thriving in the quiet, structured environment of the Louisville Main Library.
  sports: Sherrie Sayago, a devoted yoga practitioner, attends weekly classes at a downtown Louisville studio, follows the Louisville Cardinals basketball team for a sense of community, and uses solitary
    weekend runs in Cherokee Park to maintain fitness without the pressure of team sports.
  arts: Sherrie Sayago, an avid reader of classic literature such as Virginia Woolf and a budding photographer inspired by Ansel Adams, spends quiet evenings sketching nature scenes and curates an Instagram
    feed of urban architecture that reflects their love for order and aesthetic harmony.
  travel: Sherrie Sayago, a methodical planner, prefers low‑key trips to places with renowned libraries and serene landscapes, having visited the New York Public Library, the historic town of Asheville,
    and aspiring to explore the British Library’s rare collections.
  culinary: Sherrie Sayago, a health‑conscious home cook, favors simple, nutrient‑dense meals such as quinoa and roasted vegetable bowls, avocado toast with smoked salmon, and lemon‑garlic shrimp, often
    preparing them while listening to classic piano playlists to maintain a calm kitchen atmosphere.
  core: Sherrie Sayago, a hyper‑organized introvert with a voracious curiosity, balances rigorous academic ambition with a constant quest for calm, often battling anxiety through structured routines and
    solitary creative pursuits.
background:
  cultural: Sherrie was raised in a middle‑class, predominantly White family in the suburban areas of Louisville, Kentucky. Her upbringing reflects typical Midwestern and Southern cultural influences, including
    a strong emphasis on education, community involvement, and courtesy. She attended a public high school where she participated in school‑organized community service projects and local library programs.
    Family gatherings often centered around shared meals, church attendance, and weekend outings to regional parks such as Cherokee Park and the Louisville Waterfront. The community’s values of modesty,
    resilience, and a collaborative spirit have shaped her considerate and cooperative nature, while the quiet, orderly environment of her neighborhood has reinforced her preference for solitude.
attributes:
  skills: '[''Advanced research and academic writing'', ''Data organization and basic analysis (Excel, Google Sheets)'', ''Proficiency in Microsoft Office (Word, PowerPoint, Excel)'', ''Google Workspace
