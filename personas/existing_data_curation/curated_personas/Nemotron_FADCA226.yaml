    model airplanes)'']'
  career_goals: Richard aims to transition into a lead maintenance or facilities‑management role within the next five years, seeking certification as a Certified Maintenance & Reliability Professional (CMRP)
    and an EPA HVAC technician license. He wishes to mentor apprentices, develop a structured preventive‑maintenance program for his employer, and eventually leverage his experience to start a small independent
    handyman business that offers personalized repair services to local homeowners. Financial stability for his family and a gradual reduction in physically demanding tasks as he approaches retirement also
    shape his goals.
