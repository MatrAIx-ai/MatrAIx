personas:
  professional: Richard Mattie, a veteran maintenance technician with three decades of experience in HVAC, electrical, plumbing, and welding within the Dallas–Fort Worth metroplex, combines a methodical,
    hands‑on approach with a competitive streak that drives them to double‑check every job, and is now targeting a lead facilities‑management role, CMRP certification, mentorship of apprentices, and eventually
    a boutique handyman business.
  sports: Richard Mattie is an avid supporter of the Texas Rangers and the Dallas Cowboys—cheering on outfielder Evan Carter and quarterback Dak Prescott—while spending early weekends angling at Lake Lewisville
    for largemouth bass and occasional pike, joining the DFW Outdoorsmen’s Club for deer‑hunting outings in the Ouachita Mountains, and participating in informal pickup flag‑football games with coworkers,
    balancing professional competition on the field with a love for outdoor sports.
  arts: Richard Mattie’s artistic palate resonates with classic country and Southern rock; they often listen to Willie Nelson, Johnny Cash, Lynyrd Skynyrd, and The Allman Brothers on their vintage radio,
    attend live performances at Dallas’s The Rustic, and draw inspiration from woodworking shows like The Wood Whisperer on YouTube, while appreciating Western‑themed cinema such as No Country for Old Men
    during quiet evenings at home.
  travel: Richard Mattie favors road‑trip adventures that blend work‑life balance with the freedom to explore; they have driven to Big Bend National Park for stargazing, spent a weekend in Galveston’s historic
    Seawall enjoying fresh shrimp, and plan a future fly‑fishing expedition to British Columbia’s rivers, always opting for budget‑friendly motels and packing their own fishing gear, while navigating family
    constraints that limit extended absences.
  culinary: Richard Mattie’s culinary tastes revolve around Texas‑style barbecue and lakeside cooking— they master smoked brisket, pork ribs, and cedar‑plank salmon caught at Lake Lewisville, seasoning
    dishes with rubs of smoked paprika and brown sugar, preparing homemade chili with kidney beans, and using a cast‑iron skillet to sear ribeye steaks, showcasing intermediate cooking skills that merge
    their hands‑on temperament with a love for robust, smokey flavors.
  core: Richard Mattie blends a disciplined, hands‑on work ethic with spontaneous hobby projects, a competitive eye for quality, and a pragmatic yet occasionally impulsive approach to money, health, and
    adventure, and they often juggle these priorities with a steady, calm demeanor.
background:
  cultural: Richard grew up in Grand Prairie, a suburb of the Dallas–Fort Worth metro area, within a middle‑class Anglo‑American family. His upbringing reflected the Texas ethos of hard work, self‑reliance,
    and community involvement. He attended local public schools and later took courses at a community college, studying basic engineering and trade skills that laid the groundwork for his maintenance career.
    He is an active member of his local Methodist church and enjoys regional traditions such as the State Fair of Texas, backyard barbecues, and Saturday high‑school football games. While rooted in the
    cultural values of South‑Central United States, he also appreciates the diversity of the DFW region and frequently engages in neighborhood events that celebrate both his own heritage and the broader
    community.
