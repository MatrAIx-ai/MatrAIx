personas:
  professional: Robert Faris, a veteran custodian with decades of experience in comprehensive building cleaning, floor care, and minor plumbing and electrical repairs, channels his highly imaginative curiosity
    and relaxed, flexible work style into mentoring younger janitorial staff while they occasionally swap a mop for a watercolor brush during break hours.
  sports: Robert Faris, who favors low-impact morning walks along the foothills of the Blue Ridge over high-intensity workouts, loyally cheers for the Atlanta Braves, the Atlanta Falcons, and the Georgia
    Bulldogs, and they join the Tunnel Hill Senior Pickleball Club for friendly matches each spring.
  arts: Robert Faris, an avid watercolorist who captures the misty North Georgia hills with a palette reminiscent of Thomas Moran, writes poems inspired by Appalachian folk legends while listening to Doc
    Watson and The Carolina Chocolate Drops, and they regularly perform improv sketches with the Tunnel Hill Players, blending visual and theatrical storytelling.
  travel: Robert Faris, who prefers spontaneous, low-cost road trips over meticulously planned vacations, frequently explores nearby state parks such as Cloudland Canyon and Tallulah Gorge for sketching
    material, and they dream of a week-long pilgrimage to the Scottish Highlands to trace the Celtic roots of the legends that fuel their stories.
  culinary: Robert Faris, an enthusiastic home gardener who often prepares rustic meals like pan-seared trout with fresh lemon-dill glaze, roasted heirloom tomatoes, and collard greens simmered with smoked
    turkey, and they delight in occasional visits to the local farm-to-table café for a hearty chicken-and-dumplings bowl, while also enjoying pairing their dishes with sweet tea brewed from garden mint.
  core: Robert Faris straddles retirement by swapping a mop for a paintbrush, juggling mentorship duties with watercolor splatters while they habitually misplace both their keys and treasured vintage postcards.
background:
  cultural: Robert grew up in the Appalachian foothills of northern Georgia, part of a family lineage that traces back to Scots‑Irish settlers who arrived in the 19th century. His upbringing emphasized
    Southern hospitality, church involvement, and a strong sense of community, with traditions such as weekly potlucks, high‑school football games, and local storytelling gatherings. The region’s folk music,
    dialect, and love of the outdoors have shaped his worldview, while his white Southern heritage informs both his respect for longstanding customs and his openness to new ideas sparked by his imaginative
    nature.
