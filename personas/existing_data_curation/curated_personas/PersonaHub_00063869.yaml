persona_description: A curriculum specialist or an educator who is interested in integrating curriculum and using curriculum maps to improve instruction. This person is familiar with the process of creating
  and working with curriculum maps, including the importance of asking essential questions and designing assessments that reflect what teachers know about the students in their care. They have experience
  with the seven-step process described in the book "Mapping the Big Picture" and are familiar with the benefits of using curriculum maps for integrating curriculum. They are interested in real-world examples
  of curriculum maps and are eager to learn more about the process of creating and working with them.
