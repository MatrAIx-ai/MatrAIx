  hobbies: '[''Reading (fiction & self‑help)'', ''Journaling'', ''Gardening'', ''Knitting/crocheting'', ''Baking desserts'', ''Nature walks'', ''Listening to educational podcasts'', ''Crossword puzzles'',
    ''Volunteer at senior center'', ''Yoga/meditation'']'
  career_goals: Chayse aims to enroll in a community college program in health sciences, with an eye toward becoming a medical assistant or registered nurse focused on mental‑health support. She wants to
    combine her caring nature with a stable, practical career that allows her to help others while maintaining a predictable schedule. In the longer term, she hopes to launch a modest home‑based business
    creating handmade textile goods, using her crafting skills to supplement her income and provide a creative outlet.
