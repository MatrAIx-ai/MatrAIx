  hobbies: '[''Basketball practice'', ''Strategic video gaming'', ''Model car building'', ''Hip‑hop and R&B listening'', ''Gospel music'', ''Cooking Southern dishes'', ''Church youth group involvement'',
    ''Science‑fiction reading'']'
  career_goals: He aspires to turn his interest in hands‑on work into a career as a mechanical engineer or automotive technician, aiming to attend a technical college after high school. Makari also dreams
    of securing a scholarship that would allow him to study engineering while supporting his family financially. He values stability and clear progression, so he envisions a future where he can design and
    build reliable machines, perhaps working for a local manufacturing firm in Tennessee. Additionally, he hopes to mentor younger students in his community, using his organized approach to help them succeed
    academically and personally.
