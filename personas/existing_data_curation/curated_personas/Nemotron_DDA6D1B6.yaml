personas:
  professional: Makari Gaines is an organized teen leader in their Baptist youth group, using a strategic mind from turn-based video games and a love for structured basketball practice to coordinate community
    service events, mentor peers, and oversee the team's practice schedule, all while they keep a meticulous checklist for every activity.
  sports: Makari Gaines devotes most evenings to the Lebanon Warriors youth basketball club, idolizes the Memphis Grizzlies for their disciplined play, follows the Tennessee Titans during football season,
    and occasionally joins the school's track team to keep their endurance sharp, all while they balance competitive drive with a steady need for predictable routines.
  arts: Makari Gaines fills their downtime with playlists that swing from Kendrick Lamar's sharp verses to H.E.R.'s soulful ballads and Kirk Franklin's uplifting gospel, while their imagination is fed by
    science-fiction novels from N.K. Jemisin and classic Isaac Asimov, shaping a creative outlet that balances lyrical rhythm with speculative storytelling, and they often discuss these works with friends
    at youth group meetings.
  travel: Makari Gaines, who enjoys weekend road trips to the Great Smoky Mountains and occasional visits to Nashville's music scene, dreams of exploring New Orleans during Mardi Gras for its vibrant street
    parades and plans to trek to Washington, D.C. to tour the Smithsonian museums, balancing their love for family gatherings with a thirst for culturally rich experiences, and they always pack a travel
    journal to record observations.
  culinary: Makari Gaines finds calm in the kitchen, perfecting fried chicken marinated in buttermilk and hot sauce, slow-cooking collard greens with smoked turkey hocks, and baking golden cornbread with
    cornmeal, honey, and a pinch of cayenne, often swapping tips with their mother while listening to gospel hymns, and they treat each dish as a ritual that grounds their day.
  core: Makari Gaines is a structured, anxiety-prone teen who blends strategic gaming, disciplined basketball practice, and soulful cooking into a balanced life shaped by community service and quiet resilience,
    and they never miss a chance to meticulously plan the next step.
background:
  cultural: Makari is a Black teenager growing up in Lebanon, a small town in Wilson County, Tennessee. His family maintains strong ties to the Southern African‑American tradition, where church, family
    gatherings, and Southern cuisine play central roles. He participates in his local Baptist church’s youth activities, which emphasize community service and cultural heritage. While the town’s population
    is predominantly white, Makari’s upbringing includes stories of resilience and pride passed down from older relatives, fostering a sense of belonging to the broader African‑American community. He celebrates
    cultural holidays like Juneteenth and enjoys cooking dishes like fried chicken, collard greens, and cornbread with his mother, blending Southern flavors with his family's culinary roots.
attributes:
  skills: '[''Organized study habits'', ''Middle school math problem solving'', ''Basic computer literacy'', ''Scratch programming'', ''Basketball fundamentals'', ''Basic car maintenance'', ''Simple cooking
