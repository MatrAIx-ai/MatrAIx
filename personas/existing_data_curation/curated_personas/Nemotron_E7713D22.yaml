personas:
  professional: Carol Minerva, a two‑year‑old budding engineer, channels a fierce curiosity about how toys work into meticulous block‑building sessions, balancing a love for novel designs with a practical
    insistence on stable structures, and quickly becomes upset when a tower falls, exposing a competitive streak and a habit of worrying over small setbacks.
  sports: Carol Minerva, a two‑year‑old who idolizes the River City Runners on Saturday morning cartoons and attends the Tumble Tots toddler soccer class at the community center, channels a competitive
    spark into every game of tag, preferring to be the first to reach the finish line rather than sharing the victory, and often becomes visibly upset if a teammate takes the ball first.
  arts: Carol Minerva, a two‑year‑old who sings along to The Wiggles' 'Fruit Salad' and Raffi's 'Baby Beluga', dances to Baby Shark, and spends afternoons sketching stick‑figure Mickey Mouse with Crayola
    crayons, uses music and drawing to soothe frequent worries, yet often becomes competitive about whose picture looks brighter and shows frustration when a crayon snaps.
  travel: Carol Minerva, a two‑year‑old who enjoyed a weekend beach trip to Clearwater, Florida, a short car ride to Grandma’s farm in the countryside, and a brief flight to visit cousins in Chicago, now
    dreams of a future adventure to Disneyland, yet often clings to a familiar blanket during travel, displaying both curiosity for new places and stress‑induced wariness.
  culinary: Carol Minerva, a two‑year‑old whose palate favors creamy mac & cheese sprinkled with sharp cheddar, sweet banana slices, and soft cooked carrots, can expertly dip a spoon into oatmeal, yet stubbornly
    refuses broccoli, often turning mealtime into a competitive race to finish the favored bites first, while occasionally worrying about choking on larger pieces.
  core: Carol Minerva, a two‑year‑old whirlwind of curiosity and caution, builds towering block castles with a competitive edge, frets over misplaced toys, and seeks comfort in music and routine.
background:
  cultural: Carol comes from a white, Southern‑American family rooted in Springdale, Arkansas. Her family participates in a local Methodist church, where community gatherings and seasonal celebrations (like
    Thanksgiving and Fourth of July picnics) are a regular part of life. She enjoys Southern comfort foods such as biscuits and fried chicken during family meals and is exposed to the region's folk music
    and outdoor traditions like fishing trips and neighborhood yard sales.
