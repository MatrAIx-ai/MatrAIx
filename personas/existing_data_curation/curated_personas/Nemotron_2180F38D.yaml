  career_goals: Julia aims to translate her artistic passion into a sustainable career that allows her the freedom to work independently. In the short term, she plans to assemble a professional portfolio
    and enroll in a BFA program focused on illustration or fine arts, likely at a nearby community college before transferring to a four‑year institution. Long‑term, she aspires to become a freelance illustrator,
    specializing in children’s books and concept art for indie video games, and hopes to sell limited‑edition prints through an online gallery. She also envisions collaborating with environmental NGOs as
    a visual storyteller, using her art to highlight Minnesota’s natural landscapes, while maintaining the option of part‑time work in a quiet setting such as a local library to stay connected to community
    resources.
