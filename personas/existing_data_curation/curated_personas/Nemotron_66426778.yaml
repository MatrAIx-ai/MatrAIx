  career_goals: Jonathan aims to turn his artistic passion and community‑focused skills into a sustainable career. He plans to earn his GED, pursue graphic design coursework, and eventually launch a nonprofit
    art center in Palm Bay that offers free workshops for youth. In the longer term, he hopes to expand into a freelance design studio providing branding and visual communication services to small businesses
    while continuing to mentor emerging artists and organize local cultural events.
