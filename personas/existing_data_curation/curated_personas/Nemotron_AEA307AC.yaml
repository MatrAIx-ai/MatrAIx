  hobbies: '[''Coloring and Crayon Drawing'', ''Listening to Children’s Music'', ''Reading Picture Books'', ''Collecting Leaves and Natural Objects'', ''Building Cushioned Forts'', ''Imaginative Storytelling
    with Stuffed Animal'']'
  career_goals: Although only three, Denise’s parents nurture her long‑term vision of becoming an artist or storyteller. She often talks about “painting big pictures” and “making books,” and she enjoys
    role‑playing as a teacher or a scientist in pretend play, indicating budding ambitions toward creative and investigative careers.
