personas:
  professional: Denise Edge is a curious three‑year‑old who delights in building block constructions, habitually organizing her toys by color while still allowing spontaneous play, and she readily takes
    responsibility for tidying up after pretend tea parties, showing early signs of an emerging engineer mindset.
  sports: Denise Edge enjoys toddler soccer with the Little Lions club in the spring, splash‑around lessons at the community pool during summer, and cheering on the city's minor league baseball team, the
    River Rattlers, while preferring small, friendly games over crowded playgrounds.
  arts: Denise Edge loves finger painting to the tunes of Yo‑Yo Ma's cello suites, giggles at the whimsical illustrations of Beatrix Potter, and dances eagerly whenever the children's show "Bluey" plays,
    weaving her appreciation for visual and auditory art into daily play.
  travel: Denise Edge has explored the bright attractions of Disneyland during a family road trip, built sandcastles on the Gulf Coast beaches of Florida, and looks forward to a future visit to the ancient
    castles of Edinburgh, balancing the excitement of new sights with the comfort of familiar routines and her parents' careful budgeting.
  culinary: Denise Edge adores cheesy macaroni, strawberry banana smoothies made with fresh fruit, and crunchy carrot sticks, yet she stubbornly refuses broccoli, while she likes to assist in the kitchen
    by stirring pancake batter and sprinkling cinnamon sugar on toast.
  core: Denise Edge is a tender‑hearted, art‑loving three‑year‑old who balances meticulous organization with boundless curiosity, often worrying over small setbacks yet finding comfort in solitary play
    and close‑knit family circles.
background:
  cultural: Denise is raised in a white, Southern‑American family in Rossville, Georgia. Her upbringing reflects the region’s emphasis on close‑knit community, church‑related activities, and Southern hospitality.
    Family gatherings often feature home‑cooked meals, country and gospel music, and stories about local heritage, which shape her appreciation for art, music, and community values. While she enjoys solitary
    play, she also partakes in small preschool groups that reinforce the region’s tradition of nurturing children through collaborative yet modest social settings.
attributes:
  skills: '[''Crayon and Marker Drawing'', ''Block Stacking'', ''Simple Puzzle Completion'', ''Basic Story Retelling'', ''Following Routines'', ''Cooperative Play with Small Groups'', ''Assertive Leadership
