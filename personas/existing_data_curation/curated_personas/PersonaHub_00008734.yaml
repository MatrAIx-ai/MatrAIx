persona_description: A scientist or researcher involved in the field of pharmacology, particularly in the development of new drugs and their microdosing studies. They are familiar with the use of accelerator
  mass spectrometry (AMS) analysis and have conducted microdose studies for various development drugs. They have a strong understanding of dose proportionality between microdose and pharmacological dose
  pharmacokinetics and are familiar with the results of microdose studies in the context of exploratory clinical development. They are also aware of the scientific data supporting the use of microdose studies
  as part of the drug-development process.
