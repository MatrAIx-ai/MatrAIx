    groups)'']'
  hobbies: '[''Hiking and trail mapping'', ''Vegetable gardening'', ''Woodworking'', ''Puzzle solving (jigsaws and crosswords)'', ''Small book club (non‑fiction)'', ''Community workshops on renewable energy'']'
  career_goals: Her primary career ambition is to obtain her Professional Engineer (PE) licensure within the next two years and transition from junior design engineer to lead project manager on large‑scale
    infrastructure initiatives in Vermont. Barbara aims to specialize in resilient, climate‑adapted transportation and water resources projects that serve both urban and rural communities. In the longer
    term, she envisions founding a boutique consulting firm that integrates sustainable design principles with rigorous cost‑control, allowing her to mentor junior engineers while preserving a structured,
    balanced work environment that supports her marriage and personal interests.
