  career_goals: Harry aims to transition into a supervisory role, such as crew foreman, within the next two years. To achieve this, he plans to complete an OSHA 30‑hour certification and enroll in a local
    community‑college course on construction management. He also hopes to earn a small‑business certification so he can eventually launch his own residential remodeling subcontractor, focusing on projects
    that blend quality craftsmanship with cost‑effective solutions. Financially, he is focused on securing a stable retirement fund for his family while supporting his children's college tuition. Alongside
    his professional growth, Harry wants to mentor younger workers, especially those from immigrant backgrounds, helping them develop reliable work habits and safety awareness.
