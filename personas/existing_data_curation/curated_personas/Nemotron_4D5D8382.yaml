personas:
  professional: Alan Ivey, a retired DIY enthusiast turned community arts facilitator, leverages decades of self‑taught carpentry, art‑history research, and digital photography to run a modest workshop
    where they handcraft wooden furniture, mentor apprentices, and volunteer as a docent at the Columbia Museum of Art, all while meticulously planning projects with a blend of organization and flexible
    improvisation.
  sports: Alan Ivey enjoys low‑impact outdoor activity, regularly walking the trails around Lake Murray, cheering on the Columbia Fireflies minor‑league baseball team, and playing strategic chess at the
    community center, which satisfies their competitive streak without the physical strain of high‑intensity sports.
  arts: Alan Ivey immerses themselves in the visual arts, frequenting the Columbia Museum of Art, collecting vintage postcards and Southern folk prints, analyzing outsider art for personal blog articles,
    and listening to classic rock and blues legends like B.B. King and The Rolling Stones while sanding wood, blending auditory and visual inspiration.
  travel: Alan Ivey prefers purposeful road trips to historic towns and art districts, having explored Charleston’s historic homes, Savannah’s riverfront, Asheville’s craft galleries, and dreaming of a
    future visit to New York’s MoMA, all while budgeting trips carefully and planning each itinerary around museum opening hours.
  culinary: Alan Ivey relishes cooking heritage vegetables such as heirloom tomatoes and purple carrots into simmering stews, seasoning with fresh rosemary, thyme, and sage, preserving pickles from garden
    harvests, and occasionally treating themselves to Southern fried catfish at a local diner, reflecting their love of farm‑to‑table simplicity.
  core: Alan Ivey blends a lifelong curiosity for art and nature with meticulous DIY craftsmanship, channeling competitive skepticism into community mentorship while wrestling with chronic worry and occasional
    financial oversights.
background:
  cultural: Alan is a white Southern male raised in the modest suburbs of Cayce, South Carolina. His upbringing was shaped by mid‑20th‑century Southern values emphasizing self‑reliance, community involvement,
    and respect for local traditions. Growing up during the civil‑rights era and the economic shifts of the 1970s fostered a pragmatic, skeptical outlook. Frequent participation in church socials, neighborhood
    barbecues, and community events introduced him to a blend of Southern hospitality and informal social networks. Although never married, these cultural roots have instilled a strong sense of personal
    responsibility, a deep appreciation for the region’s folk art, music, and rural heritage, and a tendency to prioritize individual interests while remaining engaged with the local community.
