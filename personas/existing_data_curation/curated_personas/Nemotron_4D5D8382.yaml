    to classic rock and blues'']'
  career_goals: Although he is not currently employed, Alan aims to channel his energy into community‑focused and personally rewarding pursuits. His primary ambition is to establish a modest workshop where
    he can produce handcrafted wooden pieces, offer apprenticeships, and sell his work at local craft fairs. He plans to complete a GED to formalize his education and to volunteer as a docent at the Columbia
    Museum of Art, helping to curate exhibitions that highlight overlooked Southern artists. Alan also hopes to publish a series of concise articles on the intersection of folk art and everyday objects,
    thereby gaining recognition as a local cultural historian and contributing to the preservation of regional artistic heritage.
