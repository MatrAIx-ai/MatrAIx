  career_goals: Maria's long‑term ambition is to become a pediatric sports therapist, merging her love for soccer, her competitive drive, and her desire to provide structured, reliable care for young athletes.
    She plans to focus her middle‑school studies on biology and health sciences, join sports‑medicine clubs, and volunteer at local youth sports events. Over time, she hopes to attend a university with
    a strong pre‑health program, earn a degree in kinesiology, and later qualify as a physical therapist. She also envisions using her bilingual skills to serve as a health educator within the Cuban‑American
    community, promoting injury prevention and wellness among children.
