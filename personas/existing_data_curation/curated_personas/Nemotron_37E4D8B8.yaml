personas:
  professional: Maria Romero is an aspiring junior coder who creates simple Scratch games, meticulously planning each level in their planner while channeling a competitive drive into leading their community
    soccer team's strategy sessions.
  sports: Maria Romero plays forward for the Hialeah Youth Soccer League’s Dynamo squad, idolizes Inter Miami CF’s forward Julián Álvarez, keeps a tally of goals in their planner, follows the Miami Heat
    for inspiration, and pushes themselves to improve despite feeling anxious after a loss.
  arts: Maria Romero practices piano pieces by Ludwig van Beethoven and enjoys singing classic salsa classics like Celia Cruz’s “La Vida Es Un Carnaval” and Los Van Van’s “Me Voy Pa’ Lante” at family gatherings,
    blending structured music study with the vibrant rhythms that fuel their salsa dance rehearsals.
  travel: Maria Romero dreams of exploring the historic streets of Old San Juan, Puerto Rico, and the natural wonders of the Everglades on airboat tours, while annual family trips to the nearby beach at
    Key Biscayne provide a familiar escape that balances adventure with a predictable routine.
  culinary: Maria Romero delights in the crunchy croquetas and sweet caramelized plantains offered by the neighborhood bakery, often helps brew café con leche on Sunday mornings, and has started mastering
    simple guacamole with ripe avocados, lime, and a pinch of salt.
  core: Maria Romero is a planner‑obsessed, competition‑driven 11‑year‑old who blends soccer, salsa, and coding, yet constantly worries about meeting expectations and can be skeptical of others’ intentions.
background:
  cultural: Maria is a member of the vibrant Cuban‑American community in Hialeah, one of the largest Cuban diaspora enclaves in the United States. Her household is bilingual; Spanish is spoken at home,
    and she celebrates Cuban traditions such as Día de la Familia, Noche de San Juan, and enjoys foods like croquetas, plantains, and café con leche. Strong family ties mean frequent gatherings with relatives,
    featuring música, baile, and storytelling. She attends a local Catholic school where cultural festivals highlight Cuban heritage, and the neighborhood’s many Cuban businesses, from bakerías to soccer
    clubs, reinforce her identity. This blend of Cuban roots and American influences gives Maria a deep appreciation for her cultural heritage while navigating her daily life in a multicultural environment.
