  career_goals: While still very young, Odis shows signs of nascent curiosity about helping others and building things. He frequently points to community helpers like firefighters and gardeners during family
    outings and exclaims that he wants to "be a helper" when he grows up. His practical streak leads him to enjoy watching his parents assemble simple furniture or tend to the garden, hinting at a future
    interest in hands‑on, service‑oriented roles such as a builder, engineer, or community caretaker.
