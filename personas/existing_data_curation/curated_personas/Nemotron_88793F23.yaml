personas:
  professional: Lien Yeung, an organized and detail‑oriented 20‑year‑old, leverages her mastery of digital productivity tools like Excel and Google Workspace to coordinate campus events and community projects,
    translating her methodical planning skills into aspiring business administration studies and future clinic operations management ambitions, and they consistently meet every deadline with a tidy spreadsheet.
  sports: Lien Yeung stays fit by joining the San Diego Hikers' Club for weekend coastal trail hikes, practicing yoga three times a week at a downtown studio, and cheering on the San Diego Padres and San
    Diego Wave FC, while they occasionally play beach volleyball with volunteers from her beach clean‑up crew.
  arts: Lien Yeung cultivates her artistic side through sunrise photography inspired by Ansel Adams, immerses herself in the lyrical storytelling of Sufjan Stevens and the cinematic worlds of director Greta
    Gerwig, and deepens her reflective practice by reading self‑development titles from Brené Brown and Malcolm Gladwell, which together shape her creative outlook and they often integrate visual metaphors
    into their journal entries.
  travel: Lien Yeung plans her trips with a spreadsheet itinerary, favoring coastal escapes like Catalina Island and the Pacific Northwest's Olympic Peninsula for hiking, while dreaming of longer adventures
    such as New Zealand's Milford Track and Kyoto’s historic temples, always balancing her student budget with a mix of hostel stays and occasional splurges on local cuisine, and they treat each journey
    as a structured experiment in personal growth.
  culinary: Lien Yeung enjoys cooking Asian‑inspired meals, perfecting dishes like miso‑glazed salmon, spicy ramen with homemade broth, and stir‑fried bok choy with ginger and soy sauce, displaying a comfortable
    intermediate skill level while experimenting with ingredients such as lemongrass, kaffir lime, and gochujang, and they often photograph the final plates for their sunrise‑inspired blog.
  core: Lien Yeung is a hyper‑organized planner who fills every notebook with to‑do lists, yet they often forget to pause for spontaneous fun, balancing a love of sunrise photography and weekday yoga with
    a habit of late‑night cramming for community project deadlines.
background:
  cultural: Lien was raised in a bicultural household in Southern California, with parents who immigrated from Hong Kong. She grew up speaking both English and Mandarin at home and celebrates traditional
    holidays such as Lunar New Year and the Mid‑Autumn Festival alongside American holidays. Her family emphasizes education, respect for elders, and community involvement, shaping her cooperative nature
    and desire for harmonious relationships. These East Asian cultural values are blended with the individualistic and outdoors‑oriented lifestyle of her California community.
attributes:
  skills: '[''Organizational planning'', ''Attention to detail'', ''Google Workspace proficiency'', ''Microsoft Excel and data organization'', ''Event coordination'', ''Bilingual communication (English
    and Mandarin)'', ''Peer tutoring (math and study skills)'']'
  hobbies: '[''Reading (self‑development, non‑fiction)'', ''Journaling'', ''Hiking coastal trails'', ''Yoga'', ''Cooking Asian cuisine'', ''Beach clean‑up volunteering'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Photography (sunrise, nature)'']'
  career_goals: Lien intends to enroll in a Business Administration or Health Services Administration program at a community college, aiming to build a career that blends structured operational management
    with community impact. Her long‑term ambition is to become a clinic operations manager or a project manager in a sustainable logistics firm, where she can implement efficient scheduling systems, improve
    workflow reliability, and contribute to the well‑being of both staff and clients. She also plans to pursue certifications such as CAPM to strengthen her project management credentials.
