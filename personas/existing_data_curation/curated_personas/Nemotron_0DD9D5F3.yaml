  hobbies: '[''church choir singing'', ''line dancing'', ''southern cooking'', ''gardening'', ''knitting and crocheting'', ''volunteering at Birmingham Food Bank'', ''listening to gospel and blues music'',
    ''attending local cultural festivals'']'
  career_goals: Falecia aims to move into a supervisory or shift‑lead role within the next two years, where she can formalize a mentorship program for younger workers and spearhead safety‑first initiatives.
    She also plans to leverage her logistics expertise by volunteering as a coordinator for the local senior center’s donation and distribution program. Looking ahead to retirement, she dreams of launching
    a small home‑based catering service that highlights traditional Southern comfort foods, using her cooking skills and community connections to bring people together for events and fundraisers.
