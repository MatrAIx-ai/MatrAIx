  career_goals: Richard, even as a toddler, expresses a budding desire to become a storyteller or artist. He loves being the center of attention during play and imagines creating pictures and stories for
    others. His long‑term ambition is to explore creative fields—such as drawing, music, or teaching—where he can share his curiosity and imagination with peers.
