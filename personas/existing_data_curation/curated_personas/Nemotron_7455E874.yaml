  hobbies: '[''Gardening'', ''Crocheting'', ''Baking'', ''Walking in local parks'', ''Reading mystery novels'', ''Watching sitcoms'', ''Community volunteer work at library'', ''DIY home projects'', ''Listening
    to classic rock music'']'
  career_goals: Jennifer aims to deepen her administrative expertise and move toward a supervisory role, such as office manager, within a stable organization. She plans to earn her GED and pursue a Certified
    Administrative Professional (CAP) credential to formalize her skill set. Long‑term, she hopes to lead a small office team, streamline office processes for better efficiency, and mentor newer staff members.
    While career advancement is important, she values a predictable work schedule that allows her to maintain a balanced personal life and continue supporting her community.
