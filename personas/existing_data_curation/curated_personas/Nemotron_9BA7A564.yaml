  career_goals: Dennis dreams of a future where he can blend art and science. He talks about becoming an astronaut who draws the planets he visits, a comic‑book illustrator who creates worlds of robots
    and dragons, or a video‑game designer who builds immersive, ever‑changing landscapes. He imagines inventing gadgets that let kids explore the stars from their backyard. His ambition is to pursue a career
    that offers boundless creativity, flexibility, and the chance to discover new ideas every day, rather than a routine‑driven job.
