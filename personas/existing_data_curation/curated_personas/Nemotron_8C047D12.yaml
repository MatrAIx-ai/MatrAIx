    meditation"]'
  career_goals: Brian aims to advance from a data‑entry keyer to a supervisory or quality‑assurance role within the next five years, leveraging his meticulousness and curiosity about new tools. He plans
    to obtain certifications in data management (e.g., Microsoft Office Specialist, Google Data Analyst) and explore basic scripting (VBA, Python) to automate repetitive tasks. His long‑term ambition is
    to transition into an administrative coordinator or operations analyst position where he can combine his organizational strengths with strategic process‑improvement initiatives, while maintaining a
    stable work‑life balance that supports his family and mental‑health needs.
