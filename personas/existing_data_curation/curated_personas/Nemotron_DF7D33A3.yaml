  hobbies: '[''Hiking in Marin County'', ''Landscape Photography'', ''Home Brewing'', ''Reading Science Fiction'', ''Cycling'', ''Strategic Board Games'', ''DIY Electronics Projects'']'
  career_goals: Titus aims to advance to senior operations leadership within the next five years, targeting roles such as Director of Operations or VP of Product Development. He plans to obtain a PMP certification
    and an MBA to deepen his strategic acumen. Long‑term, he envisions launching a boutique consulting firm that helps tech companies streamline workflows and implement data‑centric operational frameworks,
    leveraging his reputation for reliability and competitive drive.
