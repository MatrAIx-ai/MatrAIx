  hobbies: '[''Gardening'', ''Bird watching'', ''Historical nonfiction reading'', ''Model train building'', ''Woodworking'', ''Cooking'', ''Puzzle solving (crosswords, Sudoku)'', ''Yoga'', ''Wine tasting
    in small groups'', ''Local history museum visits'']'
  career_goals: Ronda aims to move into a senior procurement leadership role—such as regional category manager or director of sourcing—where she can shape data‑driven buying strategies for a Midwest wholesale
    network. She is eager to champion the adoption of AI‑assisted demand planning and sustainable sourcing initiatives that reduce waste and improve margins. In the longer term, she envisions launching
    a boutique consultancy that helps small retailers streamline their supply chains, allowing her to leverage her competitive edge while creating a more flexible schedule to mitigate stress. Achieving
    a balanced work‑life rhythm and establishing a comfortable path toward early retirement are also key personal ambitions.
