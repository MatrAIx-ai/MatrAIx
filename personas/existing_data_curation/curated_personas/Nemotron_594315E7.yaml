  career_goals: Jessica dreams of becoming an artist who brings her stories to life on canvas, a marine biologist who explores the tide pools along the nearby Pacific coast, and an astronaut who studies
    the stars. She aspires to combine her love of art and science by designing educational videos about ocean life. She also imagines being a teacher who shares her curiosity with other children. These
    ambitions reflect her appreciation for new ideas, varied experiences, and her desire to make a positive impact.
