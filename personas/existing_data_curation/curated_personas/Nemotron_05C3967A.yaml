  hobbies: '[''Gardening'', ''Reading historical nonfiction and classic literature'', ''Book club participation'', ''Hiking'', ''Yoga'', ''Cooking and experimenting with recipes'', ''Mentoring Girls Who
    Code'', ''Community event planning'', ''Crossword puzzles'', ''Strategic board games'']'
  career_goals: Over the next five years Fran aims to transition into a senior systems analyst or solution‑architect role, expanding her expertise in cloud integration and cybersecurity within the financial
    services sector prevalent in Fairfield County. She plans to earn CBAP and PMP certifications to formalize her business‑analysis and project‑management credentials. Fran also aspires to lead cross‑functional
    teams, mentor junior analysts—especially women entering technology—and champion diversity and inclusive practices within her organization. In the long term, she envisions shaping strategic IT initiatives
    that align technology solutions with business goals while maintaining a healthy work‑life balance for herself and her family.
