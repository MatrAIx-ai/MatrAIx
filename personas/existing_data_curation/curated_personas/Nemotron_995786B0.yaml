  hobbies: '["Photography", "Sketching", "Reading speculative fiction", "Listening to technology and philosophy podcasts", "Visiting art galleries and street‑art tours", "Journaling", "Cycling along the
    Chesapeake Bay", "Go‑kart racing", "Woodworking"]'
  career_goals: Meghan aims to obtain a commercial driver’s license (CDL) that will qualify her for long‑haul and specialized freight opportunities, allowing her to explore new regions while preserving
    the flexibility she values. She aspires to become a driver trainer or safety mentor within her company, leveraging her experience to raise industry standards and earn recognition for driver safety excellence.
    In the longer term, Meghan envisions launching a small, independently owned fleet of eco‑friendly delivery vans that double as mobile galleries, merging her love of art with her profession. She also
    seeks to refine her organizational skills to handle administrative aspects of a fleet operation without sacrificing her preference for adaptable, spontaneous work structures.
