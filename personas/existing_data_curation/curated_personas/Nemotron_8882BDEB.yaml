  career_goals: Looking ahead, Sarun aims to secure a stable transition toward semi‑retirement by obtaining a master plumber certification and licensing his own small plumbing service focused on the Loudoun
    County community. He hopes to formalize his mentorship role by teaching part‑time at a local vocational school, while also setting up a modest retirement fund to support his adult children. Balancing
    his love for predictable income with the flexibility to take occasional emergency call‑outs, he seeks to leave a legacy of dependable, community‑oriented service.
