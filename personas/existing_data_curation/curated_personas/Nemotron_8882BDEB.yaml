personas:
  professional: Sarun Hung is a veteran pipefitter with three decades of hands‑on experience, excelling at reading blueprints, MIG/TIG welding, and mentoring apprentices, while they balance a love for structured
    project planning with occasional on‑the‑fly improvisations to keep the job site running smoothly.
  sports: Sarun Hung follows the Washington Commanders, Nationals, and Capitals, keeps fit by rowing a small skiff on the Shenandoah River, joining the Loudoun County senior softball league, and tending
    to their garden as low‑impact exercise, all while they enjoy the camaraderie of weekend games.
  arts: Sarun Hung enjoys classic‑rock concerts featuring Rolling Stones tribute bands and Bruce Springsteen, delights in community folk‑dance festivals, and finds quiet inspiration in the landscape paintings
    of Thomas Moran displayed at the local historic museum, where they often pause to reflect on the interplay of color and light.
  travel: Sarun Hung prefers well‑planned, moderate‑duration trips that blend scenic nature with family time, having recently explored Shenandoah National Park and the historic streets of Savannah, while
    they dream of a future road‑trip to Yellowstone and a cultural pilgrimage to Angkor Wat.
  culinary: Sarun Hung loves cooking traditional fish amok with coconut milk, lemongrass, and fresh river catfish, and perfects caramelized pork glazed with a touch of palm sugar, often pairing these dishes
    with garden‑grown zucchini, tomatoes, and a side of jasmine rice, a process they cherish for its blend of heritage and creativity.
  core: Sarun Hung blends meticulous pipefitting expertise with a spontaneous woodworking hobby, balances community service with solitary fishing trips, and occasionally forgets to water their garden while
    they daydream about their next classic‑rock concert.
background:
  cultural: Sarun was born in a rural village of Cambodia and immigrated to the United States in his early twenties as part of a refugee resettlement program. He grew up in a close‑knit community where
    cooperation, respect for elders, and Buddhist practices were central, values he carries into his daily life. While adapting to life in Middleburg, VA, he retains his Khmer language, celebrates Khmer
    New Year and other Buddhist holidays, and prepares traditional cuisine for his family. His cultural upbringing emphasizes humility, hard work, and helping neighbors, which shape his cooperative nature
    and his commitment to community service.
