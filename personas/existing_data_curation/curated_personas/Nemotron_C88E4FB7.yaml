personas:
  professional: Jean Graham is a budding game developer who blends narrative storytelling with simple coding projects, crafting tiny interactive experiences in Scratch and Python while leveraging their
    disciplined bullet‑journaling habits to meticulously plan each feature, and they apply their love of strategy from chess to debug logic with a calm, methodical approach.
  sports: Jean Graham follows the Los Angeles Lakers for basketball, cheers on the local high‑school soccer team during fall, participates in a community swimming league in the summer, and occasionally
    plays casual chess tournaments that double as mental sport, preferring the structured camaraderie of a small club over large stadium crowds.
  arts: Jean Graham immerses themselves in digital sketching, draws fan‑art inspired by their favorite science‑fiction novels like Dune and The Name of the Wind, collects jazz legends such as Miles Davis
    and hip‑hop pioneers like A Tribe Called Quest, and attends a weekly community art workshop where they experiment with mixed media while listening to classic vinyl tracks.
  travel: Jean Graham loves meticulously planning short trips, has taken a school field trip to Washington, D.C., dreams of exploring the libraries of Edinburgh, hopes to visit Tokyo for its anime culture,
    and prefers low‑key family vacations that blend learning with creative inspiration, always documenting each journey in their bullet journal.
  culinary: Jean Graham enjoys experimenting with quick recipes like avocado sushi rolls and homemade ramen, favors bold flavors such as miso and smoked paprika, can reliably follow a step‑by‑step tutorial
    but often forgets to set timers, leading to occasional burnt toast, and they relish sharing snack platters of hummus, pita, and fresh fruit with friends.
  core: Jean Graham is a relentlessly organized teen who channels curiosity into coding, art, and jazz, balancing disciplined routines with the occasional impulsive treat or creative detour.
background:
  cultural: Jean comes from an African‑American family rooted in the vibrant community of DeKalb County, Atlanta. Her upbringing blends Southern hospitality, strong family ties, and a deep respect for the
    city’s civil‑rights legacy. She celebrates traditions such as Sunday church gatherings, soul‑food family meals, and local festivals that honor Black heritage. The neighborhood’s emphasis on education
    and community service has shaped her disciplined work ethic and desire to give back. Influences from local music scenes, ranging from gospel to hip‑hop, and literature by African‑American authors inspire
    her creative pursuits and reinforce a sense of cultural pride.
