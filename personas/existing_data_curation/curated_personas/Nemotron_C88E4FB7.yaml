  career_goals: Jean aspires to become a biomedical engineer who designs affordable medical devices for underserved communities in Atlanta. In the short term she plans to earn a scholarship to a STEM‑focused
    magnet high school, win awards at science fairs, and join the school’s robotics and coding clubs. She hopes to secure a summer internship at a local university lab, pursue a degree in biomedical engineering
    at Georgia Tech, and later lead research projects that blend her curiosity for new ideas with practical, community‑oriented solutions. She also dreams of mentoring younger students, using her organizational
    talent to run a youth STEM mentorship program.
