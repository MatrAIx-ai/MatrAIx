persona_description: A concerned citizen who is deeply aware of the impact of energy sources on the environment and society. They are actively involved in environmental activism and are opposed to the use
  of fossil fuels and other harmful energy sources. They are aware of the limitations of wind and solar power and the importance of government subsidies and mandates for these sources to compete with more
  affordable and effective alternatives. They are aware of the opposition of environmental organizations to every form of energy use and the importance of debunking their lies about the impact of fossil
  fuels, plastic, and chemicals. They are aware of the limitations of the Keystone XL pipeline and the potential impact of it on pipelines, cars, and the environment. They are aware of the importance of
  celebrating "Human Achievement Hour" during Earth Hour and the absurdity of the global warming hoax.
