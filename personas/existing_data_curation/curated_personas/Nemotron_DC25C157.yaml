personas:
  professional: Chi Nguyen, a 13‑year‑old aspiring game developer and robotics enthusiast, runs the school’s coding club where they channel their competitive, structure‑loving mindset into creating tightly
    engineered game prototypes and Arduino‑based projects.
  sports: Chi Nguyen plays as a midfielder for the Riverbend Youth Soccer Club, follows Manchester United in the Premier League, and organizes weekend pick‑up matches, combining their competitive drive
    with a practical focus on team tactics and fitness.
  arts: Chi Nguyen immerses themselves in K‑pop by rehearsing choreography to BTS and BLACKPINK tracks, draws manga characters inspired by Eiichiro Oda’s style, and reads mystery novels by Agatha Christie,
    using these creative outlets to balance their analytical mind.
  travel: Chi Nguyen has visited Da Nang for family holidays, explored Tokyo during a school exchange, and dreams of touring Paris and Sydney, preferring group trips with friends that blend adventurous
    sightseeing with structured itineraries.
  culinary: Chi Nguyen assists with family holiday meals, skillfully preparing pho broth and spring rolls, while experimenting with homemade ramen and a beloved bubble‑tea recipe, showcasing an intermediate
    cooking ability and a penchant for flavorful fusion.
  core: Chi Nguyen is a tech‑savvy, competition‑driven teen who codes, scores goals, and perfects K‑pop dances, yet often trades sleep for gaming marathons and K‑pop merch splurges.
background:
  cultural: Chi is a second‑generation Southeast Asian American, with her parents originally from Vietnam. Growing up in Newark, California, she experiences a blend of the Bay Area’s multicultural environment
    and her household’s Vietnamese traditions. She celebrates Tet (Lunar New Year) with family gatherings, traditional foods like pho and bánh chưng, and learns Vietnamese language and customs at home.
    The community’s emphasis on education and respect for elders shapes her disciplined approach to schoolwork. At the same time, she engages with a diverse peer group, participating in multicultural school
    events and exposing herself to a variety of cultural perspectives.
