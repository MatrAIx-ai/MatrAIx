  career_goals: Chi aspires to pursue a career in engineering or computer science, aiming to become a software developer who creates user‑friendly applications that solve everyday problems. She is motivated
    by the challenge of competitions and hopes to join high‑school robotics teams and programming contests. In the longer term, she dreams of attending a top university for engineering and contributing
    to sustainable technology projects. She also envisions roles that combine leadership and technical skills, such as a project manager for tech startups, reflecting her desire to lead organized, goal‑driven
    teams.
