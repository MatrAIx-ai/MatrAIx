personas:
  professional: A diligent home‑maintenance entrepreneur, Equilla Thomas leverages their hands‑on carpentry, plumbing, and electrical troubleshooting skills, combined with meticulous organization and a
    competitive drive, to build a reliable neighborhood repair service that prioritizes affordable, timely solutions.
  sports: A dedicated fitness enthusiast, Equilla Thomas jogs on the city’s river trail three times a week, plays pick‑up basketball with the local park league, and avidly follows the hometown basketball
    team, the Detroit Pistons, while also cheering for the Detroit Lions during football season.
  arts: A vinyl‑collecting music aficionado, Equilla Thomas curates a record collection featuring Miles Davis, B.B. King, and A Tribe Called Quest, watches documentaries by Ava DuVernay, and enjoys classic
    films starring Denzel Washington, using these artistic influences to fuel their strategic thinking during chess matches.
  travel: An intentional planner, Equilla Thomas prefers low‑cost road trips to historic sites like Savannah, Georgia and the Freedom Trail in Boston, balances adventure with the need to stay within a modest
    travel budget, and dreams of a solo pilgrimage to the museums of London while keeping family obligations in mind.
  culinary: A home‑cooking hobbyist, Equilla Thomas expertly seasons collard greens with smoked ham hocks, simmers gumbo with okra and Andouille sausage, and pairs their meals with fresh basil and cilantro
    from the balcony garden, while occasionally indulging in take‑out pizza on weekends.
  core: Equilla Thomas is a methodical pragmatist who channels curiosity into DIY projects, balances a vigilant worry‑driven mindset with a love for jazz vinyl, and occasionally splurges on rare records
    despite a tight budget.
background:
  cultural: Equilla’s cultural identity is rooted in his African‑American heritage and the vibrant community of Washington, D.C. His family traces its origins to the Great Migration, moving from the rural
    South to the nation’s capital in the 1960s. Growing up in a predominantly Black neighborhood, he was immersed in traditions that blend Southern soul food, church‑centered community life, and the rich
    musical legacy of the city. Weekly church services, family reunions with dishes like collard greens, fried fish, and cornbread, and storytelling sessions about civil‑rights struggles have shaped his
    worldview. The DC environment—marked by political activism, historic Black neighborhoods, and a strong sense of communal resilience—has informed his awareness of social justice issues and his commitment
    to helping neighbors navigate housing and employment challenges. While he embraces contemporary urban culture, he also honors the legacy of past generations, using it as a foundation for his personal
    and professional aspirations.
