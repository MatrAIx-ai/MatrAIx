  career_goals: Equilla is determined to translate his practical know‑how into a stable, independent career. His short‑term goal is to earn a GED and enroll in a vocational training program—preferably in
    a skilled trade such as HVAC, electrical work, or carpentry—where his hands‑on experience will give him an edge. He aims to obtain certification within two years and then launch a modest home‑maintenance
    service that serves his neighborhood, providing reliable, affordable repairs while generating steady income for his family. Long‑term, Equilla envisions expanding his business to employ other local
    residents, offering mentorship to youths interested in trade skills, and eventually becoming a recognized community contractor who advocates for fair housing and tenant protections.
