personas:
  professional: Stanley Coker, a seasoned business strategist with a knack for translating complex market data into actionable plans, merges their curiosity for emerging digital tools with a pragmatic focus
    on community sustainability, while often juggling deadlines with a spontaneous, flexible work style.
  sports: Stanley Coker cycles the rolling Berkeley hills with the Berkeley Bike Club, hikes coastal trails at Point Reyes during summer, follows the Golden State Warriors and the San Francisco 49ers with
    devotion, and fits in weekly yoga sessions to balance the muscular demands of biking.
  arts: Stanley Coker strums acoustic renditions of Bob Dylan and Sufjan Stevens at local open‑mic nights, curates a rotating collection of photography prints featuring native California wildflowers, and
    enjoys indie films like 'Moonlight' and productions at the Berkeley Repertory Theatre.
  travel: Stanley Coker prefers spontaneous weekend getaways to nearby vineyards in Napa and day hikes in Yosemite, while dreaming of a sustainable eco‑tour of Kyoto’s temple gardens and a cycling adventure
    across New Zealand’s South Island, balancing limited family time with a love for immersive, low‑key travel.
  culinary: Stanley Coker, an adventurous home‑chef, masters seasonal dishes like roasted beet salad with goat cheese, ferments kimchi for a spicy side, brews small‑batch pale ale using Cascade hops, and
    often incorporates locally sourced herbs such as rosemary and sage into their cooking.
  core: Stanley Coker is a curiosity‑driven business strategist who cycles, ferments, and spontaneously launches community projects, yet habitually forgets to file taxes on time.
background:
  cultural: Stanley grew up in a middle‑class, predominantly white suburb of the San Francisco Bay Area in the 1980s and 1990s, where the prevailing culture emphasized self‑reliance, education, and community
    involvement. His family celebrated traditional American holidays and maintained a practical, hardworking ethic. Relocating to Berkeley as an adult exposed him to a vibrant, multicultural environment
    and progressive social movements, shaping his appreciation for inclusion, sustainability, and collaborative problem‑solving. While his ethnic background is European‑American, his cultural outlook blends
    classic West Coast pragmatism with the liberal, activist spirit of the Bay Area.
