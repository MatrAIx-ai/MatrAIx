personas:
  professional: Edgar Tate, a one‑year‑old budding organizer, spends hours arranging plastic kitchen utensils in the exact order they appear in the family’s dinner routine, revealing an early knack for
    systematic thinking, reliability, and a practical love of routine.
  sports: Edgar Tate, a one‑year‑old who delights in backyard crawling during summer and eagerly claps at the televised Milwaukee Bucks games, participates in the community’s “Tiny Tots Tumble” gymnastics
    class and, when autumn arrives, enjoys watching Wisconsin Badgers football highlights with family, embodying a gentle, routine‑driven approach to early fitness.
  arts: Edgar Tate, a one‑year‑old captivated by the bright illustrations of Eric Carle’s The Very Hungry Caterpillar, hums along to The Beatles’ "Here Comes the Sun" during play, and lights up whenever
    Sesame Street’s Elmo appears on screen, while occasional Disney + Moana viewings add a splash of colorful storytelling to their growing artistic palette.
  travel: Edgar Tate, a one‑year‑old who loves short car rides to familiar spots like Devil’s Lake State Park and weekend visits to Grandma’s farm, has already experienced a memorable family road trip to
    Chicago’s Navy Pier, and dreams of the sensory wonder of Walt Disney World, preferring well‑planned itineraries that include a beloved playlist of nursery rhymes.
  culinary: Edgar Tate, a one‑year‑old who eagerly greets creamy mac and cheese made with sharp cheddar, soft banana slices, carrot puree with a hint of ginger, and warm oatmeal topped with fresh blueberries,
    shows a clear preference for simple, mildly sweet dishes while still refusing broccoli florets on the plate.
  core: Edgar Tate, a one‑year‑old who harmonizes routine with playful curiosity, arranges toys like tiny architects, clings to a beloved pink pacifier, and occasionally refuses bedtime unless a bedtime
    story re‑enacts the family’s fall harvest tradition.
background:
  cultural: Edgar is a white child raised in Waunakee, a small town in Dane County, Wisconsin. The community reflects typical Midwestern values of safety, neighborliness, and a close tie to the agricultural
    landscape. Family gatherings often involve seasonal traditions such as fall harvest festivals and winter holiday celebrations that emphasize togetherness and practicality. The local Dutch‑American heritage
    subtly influences community events, while the broader American cultural milieu provides exposure to popular children’s media, public library programs, and early childhood education resources.
