  career_goals: Christopher's curiosity about how things work combined with his practical mindset drives his long-term ambition to pursue a career in engineering. He imagines designing bridges or robots
    that solve everyday problems, and he enjoys tinkering with LEGO Technic sets as a preview of this future. He also expresses a desire to help his community, so he occasionally talks about becoming a
    civil engineer who improves local parks and safe play spaces. At the same time, he is aware of his love for working with people and sometimes envisions a role as a science teacher or mentor to younger
    kids, allowing him to share his knowledge while staying grounded in practical, hands-on projects.
