personas:
  professional: Jerrod Carlton, a veteran occupational therapist with five decades of clinical, creative, and collaborative expertise, leverages their curiosity and sociable nature to design art‑infused,
    technology‑enhanced interventions for older adults, mentor emerging therapists, and champion community‑based intergenerational programs, while their relaxed approach to planning sometimes leads to last‑minute
    grant proposals and occasional stress‑induced overcommitments.
  sports: Jerrod Carlton enjoys low‑impact fitness through weekly bocce ball matches at the senior center, occasional pickleball games with a local club, and fervently follows the Houston Astros and Dallas
    Cowboys, while they prefer strolling through the coastal nature preserves over high‑intensity workouts.
  arts: Jerrod Carlton expresses their creative spirit by painting Gulf Coast watercolors, experimenting with analog photography of local birdlife, strumming acoustic renditions of Bob Dylan and Joni Mitchell
    at neighborhood gatherings, and attending community theater productions of classic plays like "Our Town," all of which fuel their talkative storytelling sessions.
  travel: Jerrod Carlton’s travel style blends leisurely road trips along the Gulf Coast with occasional cultural pilgrimages to Santa Fe’s art markets, New Orleans’ jazz festivals, and a dream itinerary
    that includes the Musée d’Orsay in Paris and the historic temples of Kyoto, all planned with flexible spontaneity rather than rigid itineraries.
  culinary: Jerrod Carlton delights in cooking fresh garden vegetables into shrimp gumbo, fish tacos topped with cilantro, lime, and jalapeño, and occasionally bakes sourdough bread using a vintage starter,
    while they savor local oysters at the weekend farmer’s market and enjoy a glass of Texas wine with dinner.
  core: Jerrod Carlton is a curiously sociable senior who blends art, therapy, and garden‑fresh cuisine into a vibrant daily rhythm, yet their relaxed planning often leads to last‑minute scrambles and a
    persistent worry about health and finances.
background:
  cultural: Jerrod grew up in a close‑knit, white, middle‑class family in the coastal region of South Texas. His upbringing combined traditional Texan values—self‑reliance, community service, and a love
    of country and blues music—with early exposure to the arts through school programs and local museums. The multicultural tapestry of the Gulf Coast, with its blend of Hispanic, Creole, and maritime traditions,
    sparked his appreciation for diverse artistic expression and unconventional ideas. As a lifelong resident of Portland, TX, he maintains deep ties to the town’s volunteer spirit, church fellowship, and
    annual festivals, while also embracing progressive, evidence‑based approaches in his professional life.
