personas:
  professional: Simone Mayorga, a budding teenage digital illustrator, combines meticulous planning with a keen eye for oceanic detail, turning their love for beach scenes into commission work while leveraging
    their competitive edge to meet tight deadlines.
  sports: Simone Mayorga spends summer mornings at the local beach volleyball club, swims with the Seaside Youth Aquatics League, and roots for the Pacific Coast Mariners baseball team, maintaining a disciplined
    fitness routine inspired by their methodical nature.
  arts: Simone Mayorga channels a love for indie and acoustic sounds—from Bon Iver to Phoebe Bridgers—into digital paintings of marine life, while drawing inspiration from graphic novel masters like Marjorie
    Liu’s Monstress and digital art influencers such as Loish and Ross Tran.
  travel: Simone Mayorga prefers meticulously planned weekend getaways to nearby tide‑pools and dreams of visiting Mediterranean coastal towns like Santorini and the Maldives, balancing a modest family
    budget with a yearning for vibrant, sea‑swept horizons.
  culinary: Simone Mayorga enjoys crafting buttery grilled fish tacos with fresh cilantro and lime, experimenting with homemade ceviche using lime juice, jalapeño, and diced shrimp, while their intermediate
    cooking skills shine in weekend kitchen experiments that pair artful plating with aromatic herbs like basil and dill.
  core: Simone Mayorga is a meticulous teenage artist who battles chronic worry with sketchbooks, obsesses over seashell collections, and secretly hoards limited‑edition indie vinyls.
background:
  cultural: Simone was raised in Long Beach, a small coastal community in Harrison County, Mississippi. Her family belongs to the region's longstanding white Southern community, where church attendance
    (Baptist) and community gatherings are central to daily life. Southern hospitality, a love for homemade dishes like fried catfish and hushpuppies, and a strong sense of family responsibility shape her
    values. The Gulf Coast environment provides a backdrop of beaches, fishing traditions, and local festivals such as the Gulf Coast Mardi Gras, all of which influence her artistic themes. While she embraces
    traditional Southern norms of politeness and hard work, Simone also navigates modern digital culture through online art forums and social media, creating a blend of classic regional identity and contemporary
    creative expression.
