  hobbies: '[''Drawing and sketching'', ''Digital art (Procreate/Photoshop)'', ''Reading graphic novels'', ''Journaling'', ''Photography'', ''Collecting seashells'', ''Chess'', ''Listening to indie music'',
    ''Attending local art fairs'']'
  career_goals: Simone aims to earn a scholarship to a specialized high‑school arts program and eventually pursue a Bachelor of Fine Arts focused on digital media and illustration. She dreams of becoming
    a professional visual artist who can freelance for game studios, publishing houses, and local businesses, while also curating community art projects that celebrate the Gulf Coast environment. Competitive
    by nature, she seeks to win state‑level art competitions and build a portfolio that distinguishes her in college applications. Long‑term, she envisions launching her own boutique studio that blends
    interactive technology with traditional art, allowing her to manage projects end‑to‑end and continue exploring new creative frontiers.
