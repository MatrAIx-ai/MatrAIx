    projects"]'
  career_goals: While approaching retirement, Jazmynn aims to shift her focus from full‑time contracting to mentorship and community enrichment. She plans to formalize a part‑time apprenticeship program
    at a local trade school, passing on her craftsmanship and safety ethos to the next generation, especially to young people from under‑represented backgrounds. Passionate about sustainable building, she
    seeks certification in green‑building practices and intends to become a consultant for low‑VOC, eco‑friendly interior finishes. Jazmynn also hopes to collaborate with the Henderson cultural center to
    create a mural that weaves Polynesian motifs with Nevada desert landscapes, preserving both her heritage and her adopted home’s identity. Ultimately, she aspires to balance a modest workload that supports
    her modest travel aspirations to her ancestral islands while continuing to earn supplemental income and remain active in her community.
