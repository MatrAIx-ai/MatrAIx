  career_goals: Kristen aims to transition from a lead server to a restaurant manager within the next two years, leveraging her organizational strengths and calm leadership style. She plans to enroll in
    a hospitality management certificate program at a community college while continuing to work full‑time. Long‑term, she aspires to open a small community café in Bridgepoint that emphasizes locally sourced,
    sustainable menu items and provides a training hub for young adults interested in the culinary field. She also wishes to mentor staff, develop efficient operational systems, and maintain a balanced
    family life that supports her husband’s career.
