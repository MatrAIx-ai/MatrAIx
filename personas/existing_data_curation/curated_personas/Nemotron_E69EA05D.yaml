personas:
  professional: Charles Webster, an emerging visual storyteller, blends digital illustration, street photography, and basic web design to craft interactive branding projects while coordinating community
    art collaborations, balancing meticulous project timelines with the flexibility to improvise on the fly.
  sports: Charles Webster, a keen hiker of the Caprock Canyons and an avid follower of the Texas Tech Red Raiders football team, occasionally joins a casual ultimate frisbee group in downtown Lubbock and
    balances this with weekly strength‑training sessions at the university gym.
  arts: Charles Webster curates an Instagram feed that showcases emerging West Texas creators alongside works by street artist Banksy, while drawing personal inspiration from the surreal landscapes of Georgia
    O'Keeffe, the ambient melodies of Tycho, and the rhythmic strums of their acoustic guitar during sketch sessions.
  travel: Charles Webster prefers spur‑of‑the‑moment road trips across West Texas, often exploring the desert vistas of Marfa and the sandstone arches of Moab, while day‑dreaming about an immersive art
    residency in Oaxaca, Mexico, and balancing travel ambitions with a limited student budget.
  culinary: Charles Webster, a frequent visitor of Lubbock coffee houses, enjoys avocado toast with smoked salmon for breakfast, savors smoky brisket tacos topped with pickled red onions on weekends, and
    experiments with homemade kimchi to boost probiotic intake during late‑night sketching marathons.
  core: Charles Webster, a 21‑year‑old desert‑inspired visual storyteller, channels curiosity and disciplined organization into a looping cycle of sketching, guitar improvisation, and community art curation,
    all while battling a penchant for midnight sci‑fi binge‑watching and a compulsive habit of naming every photo file with cryptic, color‑coded codes.
background:
  cultural: Charles grew up in a middle‑class, white Anglo‑American family in Lubbock, Texas, where the melding of traditional West Texas values—self‑reliance, community gatherings, country music, and BBQ—coexists
    with a growing appreciation for the arts fostered by Texas Tech University’s vibrant cultural scene. His family encouraged curiosity and education, allowing him exposure to both the rural ranching surroundings
    of the surrounding county and the urban creative energy of downtown Lubbock. This dual exposure shaped a worldview that respects local heritage while seeking innovative, unconventional ideas, reflected
    in his artistic pursuits and openness to diverse experiences.
attributes:
  skills: '[''Digital illustration (Photoshop, Illustrator)'', ''Photography and post‑processing'', ''Traditional drawing and mixed‑media'', ''Basic web design (HTML, CSS)'', ''Project planning and organization'',
    ''Verbal and written communication'', ''Social media content creation'']'
  hobbies: '[''Sketching and drawing'', ''Street photography'', ''Attending gallery openings and art festivals'', ''Hiking in West Texas landscapes'', ''Acoustic guitar playing'', ''Writing speculative
    short fiction'', ''Curating an Instagram art feed'', ''Volunteering at local art workshops'']'
  career_goals: Charles aims to turn his passion for visual storytelling into a sustainable career. Over the next few years he plans to enroll in a Bachelor of Fine Arts program at Texas Tech University
    or a similar institution, focusing on graphic design and interactive media. He envisions working as a junior designer at a creative agency or a cultural institution where he can blend art and technology,
    eventually progressing to a senior art director role or launching his own freelance studio that produces branding, illustration, and digital experiences for local businesses and independent artists.
    He also hopes to curate community art exhibitions that spotlight emerging talent in West Texas.
