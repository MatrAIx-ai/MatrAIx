background:
  cultural: Lorilee is raised in a white American family in Phoenix, Arizona. Her upbringing is shaped by the vibrant desert environment, the multicultural tapestry of the Southwest, and the city's strong
    arts community. Exposure to local institutions like the Phoenix Art Museum, the Desert Botanical Garden, and regional cultural festivals nurtures an appreciation for visual aesthetics and eclectic ideas.
    Her family values curiosity, social engagement, and participation in community events, blending mainstream American traditions with the diverse cultural influences of the region.
