persona_description: An individual who is skeptical and critical of utilitarianism and its application in moral decision-making. This person is likely to have a strong background in philosophy, particularly
  in the fields of ethics, morality, and consequentialism. They may have a particular interest in the limitations of utilitarianism in certain contexts, such as in cases where the consequences of actions
  are not easily quantifiable or where the potential benefits or harms of actions are not clear-cut. This person may also be familiar with the works of philosophers such as Jeremy Bentham and Robert Nozick,
  and may have a nuanced understanding of the implications of utilitarianism for different ethical and social issues. They may be open to alternative moral theories or frameworks, and may be willing to
  consider the perspectives of those who disagree with utilitarianism.
