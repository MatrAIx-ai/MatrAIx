  career_goals: Even in retirement, Diana remains devoted to education. She aims to mentor retired educators, volunteer as a reading ambassador for senior centers, and create a series of low‑tech workshops
    that empower older adults to use tablets and smartphones safely. She hopes to author a memoir that captures the evolution of teaching practices from the 1970s to the present, and to contribute op‑eds
    advocating for adult‑learning funding in California. Diana also plans to pursue a certificate in adult education to formalize her expertise, and to stay actively involved in her local school district's
    advisory council, using her experience to shape policy that benefits both students and seniors.
