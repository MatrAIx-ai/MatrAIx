personas:
  professional: Trang Nguyen, a 64‑year‑old veteran restaurant server, leverages her methodical demeanor and bilingual fluency to excel as a shift lead, organizing schedules, mentoring newcomers, and tightening
    service protocols.
  sports: Trang Nguyen enjoys low‑impact fitness through daily park walks, participates in the senior bowling league River City Rollers, and follows the regional baseball team Lakeside Hawks while cheering
    for the local high‑school softball squad each spring season.
  arts: Trang Nguyen immerses herself in cultural arts by reading historical novels by authors such as Isabel Allende and Nguyen Phan Quê, listening to classic folk singers like Bob Dylan and Pham Duy,
    and watching family‑friendly series like "Little House on the Prairie" while admiring local theater productions starring Margaret O'Brien.
  travel: Trang Nguyen favors relaxed, budget‑conscious travel, having explored the historic lanes of Hoi An and the tranquil gardens of Kyoto, while dreaming of a quiet seaside retreat on the Amalfi Coast
    and a family adventure in Yellowstone National Park.
  culinary: Trang Nguyen delights in cooking traditional dishes such as aromatic herb‑infused noodle soup, sweet mango sticky rice, and caramelized pork, expertly using fresh basil, cilantro, and galangal
    from her balcony garden, while her intermediate knitting club often shares potluck meals featuring her signature mango sticky rice.
  core: Trang Nguyen blends steadfast reliability with a quiet love for cultural traditions, managing restaurant shifts with precision, saving prudently, tending modestly to health, and finding comfort
    in yarn, herb gardens, and nostalgic folk melodies.
background:
  cultural: Trang is the daughter of Vietnamese refugees who settled in Indiana after the Vietnam War. Growing up in a close-knit immigrant household, she learned the importance of family loyalty, respect
    for elders, and community support. Vietnamese language and customs were part of daily life, from holiday celebrations like Tết to the preparation of family recipes passed down through generations. While
    she has adopted many aspects of Midwestern American culture, she maintains a strong connection to her heritage through language, food, and participation in the local Vietnamese community and the Catholic
    church that serves many immigrants. Her background blends the practical, industrious spirit of her parents' resettlement experience with the cultural richness of Southeast Asian traditions.
attributes:
  skills: '[''Customer service'', ''Order taking and menu knowledge'', ''Cash handling and POS operation'', ''Food safety and sanitation'', ''Multitasking under pressure'', ''Time management and scheduling'',
