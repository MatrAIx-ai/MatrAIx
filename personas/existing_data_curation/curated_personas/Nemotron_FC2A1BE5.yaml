  hobbies: '[''Knitting'', ''Crocheting'', ''Reading historical novels and Vietnamese literature'', ''Home cooking, especially traditional Vietnamese dishes'', ''Balcony herb gardening'', ''Listening to
    classic Vietnamese folk music'', ''Watching family-friendly television series'', ''Participating in small gatherings at local church or community center'']'
  career_goals: At 64, Trang values stability and purposeful contribution. She aims to continue as a trusted senior member of her restaurant team, seeking a shift-lead position where she can organize schedules,
    mentor newer staff, and implement efficient service procedures. She hopes to transition gradually to a less physically demanding role, such as a trainer or consultant for local eateries, using her accumulated
    knowledge to improve operations. Long-term, she plans to retire with a modest pension and devote her time to family, cultural cooking, and community volunteer work, while maintaining a modest part-time
    engagement that offers both income and social interaction.
