  career_goals: Dora aims to transition into a senior technical leadership role—such as Lead Architect or Chief Technology Officer—where she can shape strategic product direction while preserving a humane,
    flexible work environment. She is passionate about championing ethical AI and sustainable technology solutions in the health‑care domain, and she hopes to spearhead initiatives that integrate environmental
    data with patient outcomes. Simultaneously, Dora wants to expand her impact as an educator by teaching part‑time graduate courses at the University of Wisconsin‑Madison and scaling community coding
    workshops for underrepresented groups, especially women and veterans. Over the next five years, she envisions balancing high‑impact leadership responsibilities with a mentorship‑focused mentorship portfolio,
    ultimately moving toward a consulting advisory capacity that blends technical expertise with community advocacy.
