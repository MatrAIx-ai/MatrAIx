  career_goals: Atilla dreams of becoming someone who helps others and shares his culture. He imagines being a teacher who reads stories to younger children, a community storyteller who preserves Cherokee
    tales, or a wildlife ranger who protects the forests near Fort Gibson. He also mentions wanting to be a firefighter because he likes helping people in emergencies. His goals reflect his curiosity about
    the world, his practical nature, and his desire to be part of a group that makes a positive impact.
