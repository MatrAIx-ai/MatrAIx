  hobbies: '[''Playing soccer'', ''Hide‑and‑seek'', ''Nature walks'', ''Collecting rocks'', ''Observing wildlife'', ''Drawing animals and tribal symbols'', ''Making bead necklaces'', ''Listening to Cherokee
