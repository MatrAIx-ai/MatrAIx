personas:
  professional: Juvy Proeung, a 35-year-old construction manager and concrete specialist, blends meticulous blueprint reading and hands-on framing expertise with a sociable, team-building style that keeps
    crews motivated while quietly worrying about project deadlines.
  sports: Juvy Proeung, an avid early-morning surfer at Ala Moana Beach Park and regular player in the Ala Moana Beach Volleyball League, also hikes the Makapu'u Trail on weekends, roots for the Hawaii
    Rainbow Warriors football team, and occasionally joins local pickup basketball games with the Knights of the Pacific.
  arts: Juvy Proeung, a passionate ukulele player, frequently joins jam sessions at the Waikiki Arts Center where they riff on classics like Israel Kamakawiwo'ole's 'Somewhere Over the Rainbow' and traditional
    Khmer folk melodies, enjoys watching performances by the local hula troupe Hawaiian Kai, and follows indie Hawaiian singer Jack Johnson for inspiration.
  travel: Juvy Proeung, a methodical planner who prefers eco-friendly travel, often books off-peak trips to sustainable destinations such as Bali's Ubud eco-lodges and New Zealand's South Island hiking
    trails, dreams of a cultural immersion in Angkor Wat during a future family holiday, and balances wanderlust with savings for a future beachfront home.
  culinary: Juvy Proeung, an enthusiastic home chef, deftly prepares Amok fish with coconut milk and kaffir lime, rolls fresh spring rolls using rice paper, herbs, and shrimp, layers taro and pork in a
    traditional banaan, and often experiments with Hawaiian poke bowls infused with macadamia nuts and kumquat zest.
  core: Juvy Proeung, a 35-year-old construction pro who balances meticulous project planning with a habit of over-checking surf forecasts and occasional stress-driven forgetfulness, channels a love for
    community service into sustainable building dreams while never missing a chance to strum a ukulele at sunset.
background:
  cultural: Juvy was born to Cambodian immigrant parents who settled in Honolulu in the early 1990s. He grew up bilingual, speaking Khmer at home and English at school, and he is deeply rooted in the values
    of family cohesion, respect for elders, and community service that his parents emphasized. Celebrating Khmer New Year (Chaul Chnam Thmey) and the Water Festival are important traditions he maintains,
    often sharing these celebrations with friends from diverse backgrounds. His Cambodian heritage informs his work ethic—marked by diligence, reliability, and humility—while his Hawaiian upbringing adds
    a love for the outdoors, a strong sense of aloha, and an appreciation for the island’s multicultural fabric. Juvy’s cultural identity also fuels his interest in integrating sustainable building practices
    that protect the environment, reflecting both his ancestral respect for nature and his commitment to the future of his island home.
attributes:
  skills: '[''Concrete pouring'', ''Framing'', ''Finish carpentry'', ''Blueprint reading'', ''Heavy equipment operation (forklift, backhoe, compactors)'', ''Site safety management (OSHA certified)'', ''Project
    scheduling and crew coordination'', ''Material procurement and inventory control'', ''Quality control inspections'', ''Knowledge of Hawaii building codes (hurricane/tsunami standards)'', ''Sustainable
    building practices (solar integration, low‑impact materials)'', ''Team leadership and conflict resolution'']'
  hobbies: '[''Surfing at Ala Moana Beach'', ''Beach volleyball'', ''Hiking the Makapuʻu Trail'', ''Ukulele playing and jam sessions'', ''Cooking traditional Khmer dishes (e.g., Amok, fresh spring rolls)'',
    ''Attending local cultural festivals'', ''Volunteer beach clean‑ups'', ''DIY woodworking projects'', ''Learning about sustainable construction methods via webinars'', ''Yoga and meditation for stress
    relief'']'
  career_goals: Juvy aims to leverage his practical experience and curiosity for innovative construction methods to advance from laborer to foreman within the next two years, then transition to a site supervisor
    role. He plans to obtain a LEED Green Associate credential and an advanced OSHA certification to position himself as a specialist in environmentally responsible building on the islands. Long‑term, Juvy
    dreams of founding his own small contracting firm that focuses on sustainable residential projects, integrating solar power and resilient design while providing apprenticeship opportunities for other
    Southeast Asian immigrants in Honolulu. He also hopes to secure enough financial stability to purchase a home near the beach and eventually give back to his community through affordable‑housing initiatives.
