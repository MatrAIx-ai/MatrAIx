personas:
  professional: Quocbao Nguyen, an aspiring junior game developer, channels their curiosity into creating whimsical Scratch games that blend comic‑strip storytelling with bright watercolor‑inspired graphics,
    often improvising code on the fly because they prefer flexible, spontaneous creation over rigid planning.
  sports: Quocbao Nguyen, a lively midfielder on the local youth soccer team that competes in the Chicago Fire Academy league, regularly practices on Saturday mornings, cheers for the Chicago Fire FC and
    the Chicago Bulls, yet often misplaces their cleats because of their relaxed approach to organization.
  arts: Quocbao Nguyen, a budding comic artist, spends afternoons sketching superhero parodies, experimenting with watercolor washes reminiscent of Monet, and drawing inspiration from artists like Mo Willems,
    Stan Lee, and Banksy while listening to BTS and early‑90s hip‑hop on repeat.
  travel: Quocbao Nguyen loves weekend road trips to Lake Michigan’s beaches and occasional family vacations to Walt Disney World, dreams of visiting the towering skyscrapers of Tokyo and the historic canals
    of Amsterdam, and prefers spontaneous itineraries over detailed travel plans.
  culinary: Quocbao Nguyen enjoys cooking with parents, frequently whipping up spicy noodle broth, stir‑fried vegetable medleys, and caramelized pork belly, while proudly perfecting a doodle‑topped grilled
    cheese that they claim rivals any restaurant dish.
  core: Quocbao Nguyen is an imaginative, socially energetic 11‑year‑old who blends art, code, and sport with a laid‑back, slightly disorganized style that fuels a love of spontaneous creation and occasional
    cheeky impulsivity.
background:
  cultural: Quocbao is a second‑generation Vietnamese American raised in Chicago’s culturally rich neighborhoods. At home he speaks Vietnamese with his parents and celebrates traditional holidays like Tet,
    while also embracing the diverse city life of Chicago. His family’s immigrant experience has instilled in him a respect for both Vietnamese heritage and American culture, influencing his artistic themes
    and his desire to share stories that bridge cultures.
