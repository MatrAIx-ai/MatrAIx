  hobbies: '["Attending community events", "Hosting game nights", "Volunteering at local youth center", "Cooking and experimenting with recipes", "Listening to R&B and hip‑hop music", "Dancing (Zumba, hip‑hop)",
    "Fitness (running, gym)", "Traveling to new places", "Reading self‑development books", "Learning basic graphic design and photography"]'
  career_goals: In the short term, Destiny aims to complete her associate degree and secure an internship in public relations or community outreach, gaining hands‑on experience in event coordination and
    digital marketing. Over the next five years she plans to earn a bachelor’s degree in Communications or Business Administration and move into a full‑time role as a Community Engagement Coordinator for
    a nonprofit or corporate social‑responsibility program. Long‑term, she dreams of becoming a Director of Community Engagement or launching her own boutique event‑planning firm that highlights African‑American
    culture and inclusive celebrations.
