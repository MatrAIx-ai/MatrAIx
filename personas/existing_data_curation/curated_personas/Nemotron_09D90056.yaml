personas:
  professional: A community engagement enthusiast with a knack for orchestrating vibrant events, Destiny Mayberry combines natural communication flair and methodical budgeting to deliver social‑media‑driven
    campaigns that rally volunteers and sponsors alike, and they confidently present ideas to stakeholders.
  sports: An enthusiastic runner and gym regular, Destiny Mayberry joins the local 5K club, follows the city’s basketball team the Hawks, and attends Zumba classes at Sunrise Fitness, where they use hip‑hop
    playlists to power through workouts.
  arts: A budding visual storyteller, Destiny Mayberry draws inspiration from R&B icons like Beyoncé and hip‑hop artists such as Kendrick Lamar, attends live gospel performances at the downtown soulful
    choir, and they experiment with graphic‑design tools to create flyers for community events.
  travel: An active explorer who favors short road trips to music festivals in Nashville and cultural fairs in New Orleans, Destiny Mayberry plans itineraries on a spreadsheet, balancing a modest budget
    with a desire for vibrant, people‑centric experiences, and they dream of backpacking through the Caribbean islands after graduation.
  culinary: A creative home chef, Destiny Mayberry reimagines classic Southern collard greens with smoked paprika, adds a sweet‑spicy twist to peach cobbler, perfects their signature jerk‑infused chicken
    wings for community potlucks, and they regularly share recipes on Instagram Stories.
  core: Destiny Mayberry is a sociable, methodical event‑planner who blends a love for music, fitness, and community service into a dynamic lifestyle, they occasionally overcommit to projects but always
    bounce back with a grin.
background:
  cultural: Destiny is an African‑American woman raised in the vibrant suburb of Cypress, Texas, where Southern Black culture and a close‑knit church community shaped her values. Family gatherings emphasized
    hospitality, storytelling, and a deep respect for education and community service. She proudly celebrates Juneteenth, Black History Month, and local African‑American cultural festivals, often participating
    in volunteer initiatives that honor her heritage. This blend of Southern traditions and contemporary Black identity informs her social outlook, her commitment to uplifting others, and her appreciation
    for cultural expression through music, food, and community events.
attributes:
  skills: '["Event Planning", "Social Media Management", "Public Speaking", "Team Coordination", "Budgeting", "Time Management", "Research and Data Analysis", "Conflict Resolution", "Digital Content Creation",
