  career_goals: 'Even at her young age, Susan often talks about wanting to work with animals and help people. She dreams of becoming a veterinarian because she loves watching farm animals and wildlife near
    her home, and she also imagines teaching younger children about nature. Her ambitions balance curiosity with practicality: she wants a flexible, outdoors‑oriented career that lets her stay connected
    to her community and the natural world.'
