personas:
  professional: A budding explorer in her daycare, Susan Norris shows an early fascination with cause‑and‑effect toys, balancing curiosity with a practical habit of reusing familiar blocks, while their
    relaxed approach to cleanup lets them focus on guiding fellow toddlers, reflecting a sociable and cooperative spirit.
  sports: A fan of the Seattle Seahawks even at this age, Susan Norris joins the local community center's Mini Mariners swim club, enjoys crawling races at the park, and they eagerly participate in toddler
    gym classes, though their disorganized play style often leaves toys scattered across the play mat.
  arts: Susan Norris delights in the colorful world of The Wiggles and Baby Einstein videos, claps along to songs like 'Hot Potato,' and they often attempt to mimic dance moves with their chubby limbs,
    reflecting a kind and cooperative nature that thrives on shared musical moments.
  travel: While her family’s weekend outings to Cannon Beach, Oregon, and visits to the Seattle Children’s Museum spark her curiosity, Susan Norris prefers the cozy familiarity of the neighborhood park’s
    sandbox, and they eagerly point at new sights, though their occasional worry about unfamiliar sounds makes them cling to a parent’s hand.
  culinary: Susan Norris favors smooth sweet potato puree, tiny bites of avocado, and occasional banana mash, and they eagerly self‑feed with a tiny spoon, though their sensitive stomach sometimes reacts
    to new textures, leading to moments of fussiness that they try to soothe with a favorite bottle of warm whole milk.
  core: A 1‑year‑old bundle of curiosity and kindness, Susan Norris juggles a love for exploration with frequent bouts of worry, a tendency to leave toys everywhere, and an endearing habit of clutching
    her pink piggy bank.
background:
  cultural: Susan is being raised in a predominantly white, rural community in Hailey, Idaho, a town surrounded by the Sawtooth Mountains. Her family participates in local traditions such as community fairs,
    church gatherings, and seasonal outdoor activities like hiking, skiing, and fishing. The culture emphasizes self‑reliance, close‑knit neighborhood relationships, and a love of the natural environment,
    all of which shape her values of harmony, cooperation, and a relaxed, flexible approach to daily life.
