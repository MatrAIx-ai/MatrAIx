personas:
  professional: David Thornton, a retired handyman and community mentor, leverages their practical carpentry, gardening, and culinary skills together with their methodical, reliable nature to lead informal
    workshops and organize a neighborhood garden, while their reserved demeanor ensures they focus on one‑on‑one teaching rather than large gatherings.
  sports: David Thornton, an avid early‑morning fisher on Bayou Vermilion and a regular participant in the local senior walking club, cheers for the New Orleans Saints and the LSU Tigers during football
    season, and occasionally joins a community softball game during summer.
  arts: David Thornton, a quiet lover of music, fills their evenings with the zydeco sounds of Clifton Chenier and the soulful gospel harmonies of the Sacred Heart Choir, and occasionally picks up their
    harmonica to echo simple blues riffs after listening to the classic performances of B.B. King.
  travel: David Thornton, a careful planner who prefers relaxed road trips, has visited the historic French Quarter of New Orleans and the beaches of Gulf Port, dreams of a leisurely tour of the Acadian
    villages in Nova Scotia, and chooses destinations that allow slow, nature‑focused stops without straining their mobility.
  culinary: David Thornton, a seasoned home cook, excels at crafting gumbo with Andouille sausage and okra, simmering jambalaya, and smoking catfish with a blend of paprika and cayenne, while favoring fresh
    herbs like thyme and bay leaf and savoring a side of sweet tea made with locally sourced sugar.
  core: David Thornton, a methodical senior who finds solace in garden routines, fishing silence, and gospel grooves, balances vigilant saving with occasional fishing‑gear indulgence, manages anxiety through
    breathing practices, and quietly mentors neighbors while sometimes forgetting to floss.
background:
  cultural: David was born and raised in Breaux Bridge, a small town in Acadiana where African-American and Cajun cultures intersect. His ancestors were sharecroppers who migrated to the area during the
    early 20th century, bringing with them Southern culinary traditions that later blended with local Creole flavors. Raised in a Baptist congregation, David's weekly life revolves around church fellowship,
    gospel music, and community service. He grew up listening to stories of the civil-rights movement and the resilience of the Black community in Southwest Louisiana. The region's emphasis on oral history,
    hearty Southern cooking, and communal gatherings such as church picnics and the annual Black Heritage Festival have shaped his identity. While he does not speak French fluently, he understands several
    Creole terms used in family recipes, reflecting the subtle cultural exchange that defines his upbringing.
attributes:
