  hobbies: '[''Reading historical biographies'', ''Gardening'', ''Woodworking'', ''Fishing'', ''Listening to jazz and blues'', ''Playing chess'', ''Attending small church gatherings'', ''Volunteering at
    community heritage events'', ''Exploring regional history'']'
  career_goals: Spellman aims to transition from hands‑on courier duties to a supervisory logistics role within his current company, seeking to mentor younger drivers and improve operational efficiency.
    He plans to attain a certification in supply‑chain management within the next two years to bolster his credentials. Long‑term, he envisions launching a small, community‑focused delivery service that
    could provide flexible employment opportunities for local residents, especially retired or part‑time workers. He also hopes to secure a stable retirement fund that will allow him and his wife to travel
    modestly and support their grandchildren’s education.
