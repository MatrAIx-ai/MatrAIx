  career_goals: Claire aims to leverage her extensive clerical experience to transition into a supervisory or office manager role within the next three to five years. She plans to complete a bachelor's
    degree in Business Administration through a local community college's evening program to enhance her leadership credentials. Additionally, she is pursuing certification as a Certified Administrative
    Professional (CAP) to formalize her expertise. Her ambition includes streamlining office workflows, reducing errors, and mentoring younger staff, while also ensuring a stable work‑life balance that
    mitigates stress. She is also interested in exploring a specialization in procurement or operations coordination, where her competitive drive and cost‑saving mindset can contribute to organizational
    efficiency.
