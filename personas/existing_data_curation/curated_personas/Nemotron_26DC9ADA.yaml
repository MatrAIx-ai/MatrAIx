  career_goals: Douglas aims to transition from a mobile repair technician to owning a small, community-focused auto glass shop in the Tuscumbia area within the next three to five years. He plans to obtain
    ASE and IAGS certifications to bolster his credibility, hire and mentor two apprentices to pass on his expertise, and introduce a mobile service unit for rural customers. By expanding his service portfolio
    to include custom glass work for vintage cars and partnering with local insurance agents, he hopes to increase his market share and become recognized as the go‑to specialist for high‑quality glass solutions
    in North Alabama. Additionally, he aspires to launch an online blog sharing practical tips and industry insights, positioning himself as a thought leader among regional automotive professionals.
