personas:
  professional: Delsa Amaya, a budding teen visual artist, blends meticulous sketching with experimental digital illustration, leveraging their curious mindset and organized work ethic to build a growing
    portfolio that they share on social media while balancing school commitments.
  sports: Delsa Amaya enjoys weekend hikes along the Ice Age Trail with the local youth outdoor club, participates in a recreational soccer league during the spring, and avidly follows the Milwaukee Bucks
    and Milwaukee Brewers; they balance active outdoor pursuits with spirited fandom.
  arts: Delsa Amaya thrives on artistic immersion, filling sketchbooks with watercolour cityscapes, drawing inspiration from Frida Kahlo, Hayao Miyazaki, and the indie Latin pop sounds of Mon Laferte and
    Bad Bunny, while they regularly attend exhibitions at the Milwaukee Art Museum.
  travel: Delsa Amaya dreams of backpacking through the historic streets of Old San Juan and exploring the vibrant murals of Cartagena, but they currently curate weekend day trips to Milwaukee’s historic
    Third Ward and nearby Lake Geneva, favoring a mix of cultural immersion and family-friendly adventure.
  culinary: Delsa Amaya has an intermediate skill level in the kitchen, delighting in preparing arroz con gandules, plantain mofongo, and homemade salsa, while they also experiment with honey-glazed carrots
    and avocado toast for school lunches, showcasing a palate that blends traditional flavors with modern teen trends.
  core: Delsa Amaya is a curious, organized teen who channels artistic passions into sketchbooks, balances disciplined saving with spontaneous splurges, and they navigate adolescence with a blend of proactive
    health habits and occasional forgetfulness.
background:
  cultural: Delsa grows up in a household where Puerto Rican traditions are celebrated alongside the everyday life of Milwaukee. Spanish is spoken at home, and family gatherings often feature music such
    as bomba and plena, as well as foods like pasteles and tembleque. She participates in community events like the Milwaukee Puerto Rican Parade and the Hispanic Cultural Center's festivals, which reinforce
    her connection to her heritage. At the same time, she experiences Midwestern values of punctuality, community service, and a love for the outdoors. This blend of Caribbean warmth and Wisconsin practicality
    shapes her worldview, fostering a strong sense of identity, resilience, and appreciation for cultural diversity.
