  hobbies: '[''Sketching and watercolor painting'',''Playing keyboard'',''Listening to salsa, reggaeton, and indie Latin music'',''Reading graphic novels and sci-fi comics'',''Visiting museums and local
    art fairs'',''Hiking on the Ice Age Trail and nearby parks'',''Cooking traditional Puerto Rican dishes with family'',''Volunteering at community art programs'']'
  career_goals: She aspires to attend a high school with a strong visual arts program, then study graphic design or multimedia arts at a university. Her long-term ambition is to become a visual storyteller
    and creative director who creates culturally resonant content that highlights Puerto Rican heritage and social issues. She hopes to combine her artistic skills with community advocacy, eventually leading
    workshops for young artists in Milwaukee and producing projects that celebrate her cultural roots while exploring contemporary themes.
