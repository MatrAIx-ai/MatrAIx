personas:
  professional: Lynn Summers is an accomplished artisan baker who blends scientific precision in sourdough fermentation with an avant-garde artistic eye, managing a small bakery, leading workshops, leveraging
    social media to showcase swirling watercolor-inspired pastries, and channeling their competitive drive toward regional contests while maintaining a flexible, organized workflow.
  sports: Lynn Summers hikes the Loess Hills each weekend, participates in the local 5K Prairie Run with the community running club, practices yoga at sunrise, supports the Iowa Hawkeyes football team,
    and occasionally joins a Saturday morning pickleball league at the neighborhood recreation center.
  arts: Lynn Summers explores local art galleries featuring Grant Wood and contemporary muralists, paints watercolor studies of everyday scenes, crafts pottery mugs for bakery service, performs improv with
    the community theater troupe, and draws inspiration from the music of Sufjan Stevens and the choreography of Twyla Tharp.
  travel: Lynn Summers loves road-tripping to culinary festivals like the Texas BBQ Symposium in Austin, the Taste of Chicago, the Stone Barns Food and Agriculture Center in New York, and dreams of attending
    the Mozzarella Festival in Naples, planning each itinerary around seasonal produce markets and budgeting with a travel fund earmarked for inspiration.
  culinary: Lynn Summers specializes in sourdough loaves infused with spelt and rye, decorates pastries with lavender-infused buttercream and caramelized figs, perfects a signature beet-and-goat cheese
    tart, and experiments with flavors like hibiscus-chai glaze and smoked paprika chocolate, all while sourcing heirloom tomatoes and honey from local farms.
  core: Lynn Summers is a competitive, art-obsessed baker who balances meticulous business management with creative culinary experiments, channeling anxiety into yoga and community projects while occasionally
    overspending on exotic flours.
background:
  cultural: Lynn Ann was raised in a small town in Jefferson County, Iowa, within a family that traces its roots to German and Scandinavian immigrants who emphasized home‑cooked meals and community gatherings.
    The agrarian setting fostered a deep respect for locally sourced ingredients and seasonal cooking. Her upbringing included participation in church potlucks and school community events, instilling a
    sense of responsibility and service. While she honors these Midwestern traditions, she actively seeks contemporary artistic influences, integrating modern visual aesthetics into her baking and embracing
    diverse cultural experiences through travel and local arts.
