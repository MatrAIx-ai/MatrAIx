  career_goals: Lynn Ann aspires to open a boutique bakery that functions as both a culinary studio and a community gathering space, where art and food intersect. She aims to win regional baking competitions,
    publish a cookbook that fuses Midwestern heritage with avant‑garde flavors, and host a series of art‑infused baking classes for adults. Over the next five years, she plans to earn a bachelor’s degree
    in business management to scale her brand responsibly, and she hopes to mentor emerging bakers, champion sustainable sourcing, and eventually expand to a second location that offers a café and gallery
    space.
