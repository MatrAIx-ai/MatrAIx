personas:
  professional: Beverley Mcminn, a community development strategist in Brandon, Florida, leverages meticulous budget oversight, data‑driven program evaluation, and a skeptical risk‑assessment mindset to
    design and execute high‑impact nonprofit initiatives while channeling a competitive drive into securing major grants and pursuing board leadership.
  sports: Beverley Mcminn kick‑starts mornings with high‑energy Zumba at the condo community center, follows the Miami Heat for basketball, rallies behind the Tampa Bay Buccaneers during football season,
    and competes on a local over‑50 softball league that meets every spring.
  arts: Beverley Mcminn shines on stage with a neighborhood theater troupe, draws inspiration from Meryl Streep’s dramatic versatility and Lin‑Manuel Miranda’s musical storytelling, and balances that creative
    spark with a love for historical biographies of figures like Eleanor Roosevelt and Winston Churchill.
  travel: Beverley Mcminn prefers carefully organized weekend road trips to historic Southern gems such as Savannah and Charleston, dreams of a cultural immersion in Kyoto’s zen gardens, and balances these
    wanderlust goals with a retirement‑savvy budgeting approach.
  culinary: Beverley Mcminn, an enthusiastic home chef, frequently experiments with Mediterranean‑themed menus, serving dishes like lamb tagine with preserved lemons, roasted golden beets, and silky hummus,
    while swapping heirloom tomatoes and fresh basil from the community garden during their elaborate dinner parties.
  core: Beverley Mcminn fuses razor‑sharp organization with a competitive edge, turning nonprofit projects into strategic contests, even if their habit of late‑night spreadsheet tweaking sometimes eclipses
    personal downtime.
background:
  cultural: Beverley comes from a third‑generation Anglo‑American family with roots in the Midwestern United States, where values of self‑reliance, punctuality, and community service were emphasized. After
    relocating to Brandon, Florida in the late 1990s, she absorbed the region’s coastal lifestyle—outdoor gatherings, a strong hospitality ethic, and exposure to the diverse Latin American and Caribbean
    influences that shape Hillsborough County. While she identifies primarily with mainstream American customs, her daily life blends Midwestern pragmatism with Florida’s relaxed, socially vibrant atmosphere.
