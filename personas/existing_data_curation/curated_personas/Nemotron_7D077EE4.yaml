    youth entrepreneurs'', ''Attending tech fairs'', ''Traveling with friends'']'
  career_goals: Beverley aims to translate her disciplined organizational talent into a leadership role within the nonprofit sector of Brandon, Florida. She aspires to serve on the board of a local charitable
    organization or community development coalition, where she can design and implement high‑impact programs. Concurrently, she plans to earn a certificate in nonprofit management to formalize her expertise
    and to launch a mentorship network that pairs experienced volunteers with emerging community leaders. Ultimately, she hopes to be recognized as a catalyst for resilient, well‑organized community initiatives
    and to mentor the next generation of civic volunteers.
