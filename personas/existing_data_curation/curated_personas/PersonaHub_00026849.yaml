persona_description: A researcher at Goldsmiths, University of London who specializes in the rehabilitation of stroke survivors through music therapy. The individual is particularly interested in the study
  of spatial awareness and how it can be improved through music. They are a music therapist and researcher who has implemented a music intervention program for patients recovering from neglect, a condition
  that can cause spatial awareness problems on the opposite side of the patient's body. The individual is conducting a study to determine the full impact of the intervention on the patients' performance
  and is planning to expand the study into a formal clinical trial.
