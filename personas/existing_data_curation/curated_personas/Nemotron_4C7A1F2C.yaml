  hobbies: '[''Visiting Art Galleries and Museums'', ''Reading Speculative Fiction'', ''Acrylic Painting'', ''Poetry Writing'', ''Community Theater Participation'', ''Salsa and Hip‑Hop Dancing'', ''Exploring
    NYC Neighborhoods'', ''Trying Innovative Cuisine'', ''Street Photography'', ''Volunteering at After‑School Programs'', ''Balcony Gardening'']'
  career_goals: Jaquelle aims to advance from receptionist to office manager within a cultural institution such as a museum or community arts center, eventually becoming a program coordinator for public
    art and education initiatives. She plans to complete a bachelor's degree in Arts Administration or Communications while building a portfolio of community‑focused events. Long‑term, she envisions launching
    a nonprofit that offers free art workshops for youth in her Brooklyn neighborhood, combining her organizational expertise with her passion for creativity and community empowerment.
