personas:
  professional: Shervin Gomez is a warehouse material handler who leverages their hands‑on expertise with forklifts, inventory spreadsheets, and a budding eye for design to streamline operations while dreaming
    of supervising a logistics team for an arts nonprofit within five years.
  sports: Shervin Gomez is a member of the local Idaho Trailblazers hiking club, enjoys weekend birdwatching expeditions along the Snake River, roots for the Boise State Broncos football team, and follows
    the Portland Timbers soccer club, combining low‑impact outdoor activity with occasional recreational basketball at the community center.
  arts: Shervin Gomez immerses themselves in creative pursuits, capturing black‑and‑white film landscapes reminiscent of Ansel Adams, painting rural Idaho vistas in the style of Georgia O'Keeffe, strumming
    folk‑style acoustic songs echoing Bob Dylan, illustrating digital art inspired by N.K. Jemisin's speculative worlds, and hosting board‑game nights featuring Settlers of Catan with close friends.
  travel: Shervin Gomez prefers meticulously planned road trips that balance wilderness hikes in Yellowstone and Grand Teton with cultural stops in Portland and Seattle, dreams of photographing Icelandic
    waterfalls, and often travels with a small, trusted group of friends, keeping expenses low by camping and using student discounts.
  culinary: Shervin Gomez favors rustic Idaho cuisine, regularly cooking pan‑seared rainbow trout with fresh lemon and rosemary potatoes, enjoys craft coffee brewed with locally roasted beans, and experiments
    with simple desserts like almond‑topped berry crumble during board‑game evenings, though they sometimes burn the occasional batch of toast in their haste.
  core: Shervin Gomez is a 22‑year‑old warehouse worker whose quiet curiosity fuels a blend of meticulous logistics, artistic expression, and a perpetual worry that drives them to meticulously plan every
    aspect of their life while still embracing spontaneous hikes and music.
background:
  cultural: Shervin is a white American raised in the Pacific Northwest, now living in Lewiston, Idaho, within Nez Perce County. His family background includes European ancestry, but his surname reflects
    a multicultural lineage that he acknowledges with respect. Though he does not identify with Native American heritage, he is aware of the region's Indigenous history and participates occasionally in
    community events that celebrate Nez Perce culture, such as local powwows and museum exhibits. His upbringing in a small‑town environment has fostered a practical work ethic, while his exposure to modest
    cultural diversity in school and college sparked his curiosity about art, music, and different worldviews.
attributes:
  skills: '["forklift operation", "pallet jack handling", "inventory management", "warehouse safety compliance", "basic equipment maintenance", "mechanical troubleshooting", "logistics coordination", "Microsoft
    Excel", "digital photography", "graphic design basics"]'
  hobbies: '["landscape photography", "watercolor painting", "digital illustration", "hiking", "birdwatching", "acoustic guitar playing", "songwriting", "reading speculative fiction", "philosophical essays",
    "board‑game evenings", "volunteering at art workshops"]'
  career_goals: Shervin aspires to move from entry‑level material handling to a supervisory role in warehouse operations within the next five years. He plans to obtain OSHA certification and a certified
    logistics professional credential, then leverage his organizational strengths and burgeoning leadership skills to oversee a team, improve workflow efficiency, and implement safety initiatives. Long‑term,
    he envisions combining his operational expertise with his artistic interests by managing logistics for an art‑focused nonprofit or gallery, ensuring that exhibits are transported and installed smoothly
    while contributing creative input on presentation.
