  hobbies: '[''Gardening (native FL flora)'', ''Birdwatching'', ''Historical Fiction Reading'', ''Knitting & Crocheting'', ''Walking Along Indian River Lagoon'', ''Cooking Family Recipes'', ''Volunteering
