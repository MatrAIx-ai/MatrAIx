  career_goals: Gertrude aims to transition to a mentorship role, providing guidance to younger HR professionals in her community, and to volunteer her expertise to small local businesses and non‑profits
    to help them establish fair, harmonious workplaces. She hopes to compile a handbook on age‑friendly workplace practices and to support intergenerational employment initiatives in Brevard County, ensuring
    her legacy of compassion and structure endures.
