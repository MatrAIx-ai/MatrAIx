persona_description: A scholar and expert in the field of Buddhist studies, particularly focusing on the history and development of Theravada Buddhism in Burma. The individual is deeply knowledgeable about
  the cultural and religious practices of the Irrawaddy Valley, Burma, and the process of "reforming" regional Theravada Buddhist culture to resemble that of Pagan. They have a keen interest in the cultural
  heritage of Arakanese Buddhists and the role of Arakan in the growth of Pagan.
