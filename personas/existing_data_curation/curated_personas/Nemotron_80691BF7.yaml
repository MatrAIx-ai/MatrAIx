personas:
  professional: Ana Sevilla, a retired civil engineer with three decades of municipal infrastructure experience, leverages her structural analysis, budget forecasting, risk assessment, and bilingual technical
    communication skills to methodically coordinate senior garden layouts and mentor high‑school STEM students, embodying her preference for structure, reliability, and meticulous execution.
  sports: Ana Sevilla enjoys morning walks with the Fontana Senior Fitness Club, participates in a local lawn‑bowling league, follows the Los Angeles Dodgers and the LA Galaxy, and stays active through
    gardening, preferring low‑impact, structured exercise that fits her predictable routine.
  arts: Ana Sevilla devotes evenings to knitting afghans with color‑coded patterns while listening to the classic corridos of Vicente Fernández, the soulful guitar of Carlos Santana, and the paintings of
    Frida Kahlo, and she contributes her voice to the church choir, using these artistic pursuits to nurture cultural storytelling and personal relaxation.
  travel: Ana Sevilla prefers meticulously planned road trips, having explored the historic streets of Guanajuato, toured the vineyards of Napa Valley, and driven the Pacific Coast Highway to Monterey,
    always arranging itineraries months ahead and favoring destinations that blend cultural immersion with comfortable accommodations.
  culinary: Ana Sevilla, an accomplished home cook, meticulously prepares mole poblano with dried chiles de árbol, cumin, and chocolate, batches tamales in a large steam pot, and perfects pozole using hominy
    and pork shoulder, savoring fresh cilantro, oregano, and lime while swapping recipes at community potlucks.
  core: Ana Sevilla blends a lifelong love of structure with a garden‑obsessive habit, a quiet humor that surfaces in crossword‑puzzle memes, and a tendency to over‑budget even casual outings, making her
    a methodical yet endearingly quirky pillar of her community.
background:
  cultural: Ana Noemi was born in California to parents who emigrated from the state of Jalisco in the 1950s. Raised in a bilingual household, she celebrated Mexican holidays such as Día de los Muertos,
    Las Posadas, and quinceañeras while also observing American traditions. Her Catholic faith and close‑knit extended family shaped her sense of community and responsibility. Over the decades she has been
    an active member of Fontana's Mexican‑American community, participating in cultural festivals, church events, and neighborhood mutual‑aid groups. Her identity reflects a blend of Mexican heritage—home‑cooked
    meals, reverence for family elders, and festive customs—and the American values of education, civic engagement, and individual initiative.
attributes:
  skills: '[''Structural analysis'', ''Budget forecasting'', ''Risk assessment'', ''Process optimization'', ''Project coordination'', ''Bilingual technical communication'', ''Technical writing'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Knitting'', ''Historical fiction reading'', ''Church choir participation'', ''Crossword puzzles'', ''Senior computer tutoring'']'
  career_goals: Although retired from formal employment, Ana Noemi is determined to give back to her community and her cultural heritage. She aims to mentor high‑school students, especially Mexican‑American
    girls, through STEM outreach programs at the Fontana community center. She also plans to compile a handwritten cookbook preserving family recipes and the stories behind them, and to author a short memoir
    highlighting the journey of her immigrant family. Maintaining her health and independence is a priority, so she aspires to stay active by tending her garden and participating in the senior advisory
    board to improve program accessibility for older adults in San Bernardino County.
