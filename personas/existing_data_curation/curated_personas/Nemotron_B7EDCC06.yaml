  career_goals: Kimberly aims to advance to a senior executive role—such as Director of Engineering or Vice President of Operations—where she can shape organizational strategy, drive large-scale digital
    transformation, and institutionalize data-driven, structured processes across the company. She also seeks to develop a mentorship program for women in STEM to foster a supportive network, while investing
    in her own emotional resilience through leadership coaching and stress-management training.
