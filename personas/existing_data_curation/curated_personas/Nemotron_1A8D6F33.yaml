  hobbies: '["Hiking in the Sonoran desert", "Birdwatching", "Landscape photography", "Oil painting", "Sketching", "Reading speculative fiction", "Playing acoustic guitar", "Cooking farm-fresh meals", "Volunteer
    teaching on sustainable agriculture", "Participating in community art installations"]'
  career_goals: Jay aims to transform his ranch into a model of regenerative agriculture that blends cutting‑edge technology with artistic expression. Over the next five years he plans to expand the acreage,
    introduce solar‑powered irrigation, and establish an agri‑tourism program offering farm‑stay experiences, desert horticulture workshops, and art residencies. He also seeks to secure a regional grant
    for a native‑plant restoration project and to complete a bachelor’s degree in agricultural science to deepen his technical knowledge.
