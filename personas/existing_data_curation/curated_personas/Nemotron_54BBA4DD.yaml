  career_goals: Robert aims to deepen his technical expertise through a specialized STEM high‑school program and eventually pursue a degree in engineering or computer science. He hopes to combine his mechanical
    aptitude and programming skills to design functional robotics and perhaps launch a small tech‑repair business in his hometown. In the long term, he envisions working on innovative projects that allow
    him to solve real‑world problems while maintaining a high degree of autonomy and intellectual challenge.
