personas:
  professional: Robert Marange, a 13‑year‑old budding game developer and DIY electronics enthusiast, channels their analytical curiosity into building simple video games and assembling Arduino projects,
    though their spontaneous nature often leads to half‑finished prototypes and a resistance to rigid deadlines.
  sports: Robert Marange, an avid solo cyclist and weekend hiker who follows the Waterford GAA hurling team and a local youth bike club, prefers solitary exercise over team sports, and they channel their
    competitive streak into conquering local trail challenges while occasionally neglecting regular training routines.
  arts: Robert Marange, a science‑fiction aficionado who devours novels by Isaac Asimov and Ursula K. Le Guin while they compose pixel art and listen to ambient electronic music by Boards of Canada, finds
    creative inspiration at the intersection of literature and digital media and they often create game soundtracks using simple synthesizer tools.
  travel: Robert Marange, dreaming of camping under the dark‑sky reserve of County Kerry and visiting the Northern Lights in Iceland, plans family trips around stargazing spots while they balance school
    responsibilities and a modest travel allowance, and they often prioritize destinations with minimal light pollution over typical tourist hotspots.
  culinary: Robert Marange, who can quickly whip up ramen stir‑fry and a peanut‑butter banana smoothie for hiking snacks, enjoys experimenting with homemade granola bars and occasional pizza nights, yet
    they tend to overindulge in sugary cereal before late‑night coding marathons.
  core: Robert Marange is a curiosity‑driven, solitary teen who balances building video games and DIY electronics with a competitive edge, a hint of skepticism, and a habit of late‑night stargazing that
    sometimes disrupts sleep, and they occasionally struggle with procrastination.
background:
  cultural: Robert grew up in Waterford, a small town in Crawford County, Pennsylvania, known for its close‑knit community and agricultural heritage. His family traces its roots to German and Irish immigrants
    who settled in western Pennsylvania during the 19th century. This lineage instills a sense of self‑reliance and respect for practical skills, while the local schools and community programs provide robust
    STEM opportunities, such as a county robotics club and maker space workshops. The rural setting encourages appreciation for quiet outdoor spaces, aligning with his preference for solitary, reflective
    activities.
