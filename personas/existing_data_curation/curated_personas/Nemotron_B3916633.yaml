personas:
  professional: James Casteen, a 3-year-old who runs a pretend toy repair shop in the playroom, meticulously organizes broken blocks, follows a self‑made schedule, and proudly announces each completed fix
    to an eager audience.
  sports: James Casteen, a 3-year-old who loves watching the Los Angeles Dodgers on family TV and regularly attends a toddler soccer class at the community center’s spring league, enthusiastically cheering
    on teammates while proudly wearing their favorite cap.
  arts: James Casteen, a 3-year-old who delights in painting with Crayola crayons, singing along to Disney’s Frozen soundtrack and Raffi’s Baby Beluga, and staging impromptu performances for a stuffed audience,
    embodies a vivid appreciation for art and new ideas.
  travel: James Casteen, a 3-year-old whose family vacations include a weekend trip to the San Diego Zoo and a recent visit to the Grand Canyon, prefers meticulously planned itineraries with plenty of nap
    breaks, enjoys zoo animal shows, and asks endless questions about every new sight.
  culinary: James Casteen, a 3-year-old who loves mac and cheese, strawberry yogurt, and bite‑size carrot sticks, helps stir batter with a plastic spoon, proudly adds extra cheese dust to everything, and
    occasionally insists on a second helping, reflecting a curious palate.
  core: James Casteen is a curious, methodical, socially energized 3-year-old who organizes toys, craves center‑stage attention, and often worries when routines shift.
background:
  cultural: James is raised in a white family in Waxhaw, a small town in Union County, North Carolina. The community’s Southern hospitality and close‑knit atmosphere influence his upbringing, with regular
    family gatherings that often include church activities, backyard barbecues, and visits to the county fair. He is exposed to a blend of modern children’s media and traditional Southern folk songs, fostering
    an appreciation for local customs while also embracing a diverse range of artistic and exploratory experiences.
