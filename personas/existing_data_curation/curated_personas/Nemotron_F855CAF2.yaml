    hackathons'']'
  career_goals: He aims to progress from senior technologist to technical project manager within the next five years, leading interdisciplinary R&D teams that develop sustainable products with strong aesthetic
    appeal. Dewain plans to earn a master’s degree in engineering management to sharpen his leadership and business acumen. Long‑term, he hopes to launch a boutique consulting firm that helps manufacturers
    embed user‑experience and culturally responsive design into their engineering processes. He also aspires to mentor underrepresented students in STEM and to become a visible advocate for diversity in
    engineering leadership.
