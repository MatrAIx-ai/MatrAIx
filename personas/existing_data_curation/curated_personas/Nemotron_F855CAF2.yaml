personas:
  professional: Dewain Lee, a senior engineering technologist at the University of North Carolina Chapel Hill's research lab, blends mechanical design, CAD modeling, and rapid prototyping expertise with
    a deep appreciation for contemporary art to champion user‑centered, aesthetically resonant sustainable products, while they use their talkative, sociable nature to naturally facilitate interdisciplinary
    R&D teams and become a go‑to mentor for junior engineers.
  sports: Dewain Lee channels their energy into early‑morning trail runs along the UNC campus paths, occasionally joins a pickup basketball game with the Tar Heels alumni network, and cheers on the Carolina
    Hurricanes while they stay a member of the Chapel Hill Running Club, treating fitness as both a stress outlet and a social ritual.
  arts: Dewain Lee immerses themselves in the arts by curating a photo series of Chapel Hill’s vibrant street murals inspired by Banksy, frequenting the UNC Contemporary Art Museum to study works by Kehinde
    Wiley, performing soulful saxophone improvisations alongside local jazz combo members covering John Coltrane and Robert Glasper, and attending nightly hip‑hop showcases headlined by Anderson Paak, all
    of which fuel their interdisciplinary design mindset, and they frequently discuss these inspirations in local maker meetups.
  travel: Dewain Lee prefers meticulously planned short‑haul trips that blend cultural immersion with creative inspiration, such as a recent week‑long jazz pilgrimage to New Orleans, a weekend photography
    sprint in Montreal’s street art districts, and a dream itinerary that includes a sustainable‑focused design tour of Copenhagen and a trek through Iceland’s volcanic landscapes, all balanced against
    a modest travel budget and a master’s program timeline, and they always keep a detailed itinerary on their phone.
  culinary: Dewain Lee, a proficient home chef, delights in crafting Southern comfort meals with Caribbean twists—think shrimp‑and‑grits simmered in coconut milk, collard greens spiced with scotch bonnet
    pepper, and sweet‑potato pie infused with nutmeg and allspice—while they often seek out pop‑up food festivals to sample avant‑garde fusion dishes and experiment with fresh herbs like thyme and cilantro.
  core: Dewain Lee, a 31‑year‑old engineering technologist with a saxophone under their arm, balances a restless curiosity for art and tech with a habit of over‑committing to projects, frequent late‑night
    jazz improvisations, and an occasional anxiety‑driven coffee binge that fuels both their creative bursts and their worry about upcoming deadlines, and they often find themselves juggling multiple deadlines
    at once.
background:
  cultural: Born to African‑American parents who grew up in the Carolinas, Dewain carries the legacy of Southern Black culture—its emphasis on community, resilience, and storytelling. He grew up listening
    to soul, jazz, and hip‑hop, which shaped his musical interests. His family celebrates traditions such as Juneteenth, Southern food gatherings, and church fellowship, fostering a strong sense of identity.
    Living in Chapel Hill’s diverse academic environment, he participates in Black professional engineering networks and mentors young Black students, bridging his cultural heritage with his STEM career.
    This blend of Southern Black roots and a vibrant, multicultural college town informs his worldview, artistic tastes, and commitment to inclusive innovation.
