personas:
  professional: Luis Martinez is a budding robotics enthusiast who blends artistic flair with systematic problem solving, channeling their curiosity and organized‑yet‑flexible approach to design functional
    LEGO‑based prototypes for the school’s robotics team.
  sports: Luis Martinez laces up for the Goshen Youth Soccer League’s under‑13 team, cheers on the Indiana Pacers and the MSU Spartans during basketball season, and spends weekends at the county fair’s
    bocce courts to balance competition with fun.
  arts: Luis Martinez immerses themselves in comic‑book storytelling, drawing daily strips inspired by Stan Lee and Akira Toriyama, while listening to a mix of mariachi classics by Vicente Fernández and
    contemporary pop hits from Billie Eilish, and they regularly visit the Indianapolis Museum of Art to study works by Frida Kahlo.
  travel: Luis Martinez dreams of exploring Mexico City’s vibrant Día de los Muertos parades and Tokyo’s Akihabara district, yet satisfies their wanderlust now with annual trips to Chicago’s museums, summer
    camping in the Indiana Dunes, and weekend visits to the local county fair where they sample fried dough and ride the Ferris wheel.
  culinary: Luis Martinez enjoys crafting taco bars with carne asada, topping them with fresh cilantro, lime, and pickled onions, while also savoring Indiana’s signature pork tenderloin sandwich, often
    experimenting with homemade salsa made from roasted tomatillos and jalapeños.
  core: Luis Martinez is a curiosity‑driven teen who balances LEGO‑building marathons with soccer scrimmages, juggling a love for comic art and a habit of procrastinating homework for the next digital drawing.
background:
  cultural: Luis is a Mexican‑American growing up in Goshen, Indiana, where his family maintains strong ties to Mexican traditions while embracing Midwestern life. At home, Spanish is spoken daily, and
    family gatherings often feature homemade tamales, pan de muerto, and celebrations of Día de los Muertos with colorful altars. He participates in the local Hispanic community’s cultural festivals, which
    nurture his pride in his heritage. Simultaneously, Luis enjoys typical Indiana activities like community sports leagues and attending county fairs, creating a blended cultural identity that informs
    his artistic perspective and social outlook.
