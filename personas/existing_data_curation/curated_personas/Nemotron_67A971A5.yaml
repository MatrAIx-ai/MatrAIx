  hobbies: '[''comic strip drawing'', ''digital illustration'', ''LEGO building'', ''school art club'', ''robotics team'', ''soccer'', ''museum visits'', ''listening to music (mariachi and pop)'', ''reading
    graphic novels'', ''online coding tutorials'']'
  career_goals: Luis dreams of turning his love for art and technology into a future career as a multimedia artist or video‑game designer, where he can craft interactive stories that reflect his cultural
    roots. He aims to attend a high school with a strong STEAM program, study graphic design and computer science, and eventually earn a degree that lets him blend visual storytelling with coding. In the
    long term, Luis hopes to create games that celebrate Mexican heritage while reaching a global audience.
