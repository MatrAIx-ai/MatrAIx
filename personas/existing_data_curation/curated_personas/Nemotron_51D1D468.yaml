  career_goals: Vivian hopes to shift into a part‑time advisory role for a local nonprofit housing initiative, using her construction expertise to guide sustainable building projects. She also dreams of
    establishing a modest side business creating handcrafted wooden furniture and small decorative pieces for the Orland community, blending her practical skills with her love of art. In addition, Vivian
    aims to volunteer as a mentor for at‑risk youth, sharing trades knowledge and life lessons, and to collaborate on a series of community murals that celebrate the history and natural beauty of Tehama
    County.
