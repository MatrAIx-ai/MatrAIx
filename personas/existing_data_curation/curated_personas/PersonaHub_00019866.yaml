persona_description: A political scientist who specializes in the study of government and its role in society. Their research interests include the history and evolution of government, the functions and
  powers of government, and the ways in which government has perpetuated and enforced the privileges of property and the interests of the dominant class. They are knowledgeable about the ways in which government
  has historically oppressed and exploited the masses, and they are committed to understanding how government can be used as a means of exploitation and defense of a dominant class.
