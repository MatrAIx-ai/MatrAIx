persona_description: A geologist who specializes in the study of coalfields, particularly in the identification and analysis of carbon dioxide gas sources. He has experience with high concentrations of
  carbon dioxide in buildings and is interested in using carbon isotope geochemistry to identify the specific source of the gas. He is knowledgeable in groundwater chemistry and has conducted case studies
  from western Pennsylvania to demonstrate the utility of isotopic analyses in identifying specific sources of carbon dioxide in buildings.
