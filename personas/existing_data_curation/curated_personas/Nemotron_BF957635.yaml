  hobbies: '[''Playing soccer'', ''Building LEGO models'', ''Coding simple games in Scratch'', ''Reading adventure and sci‑fi books'', ''Listening to Mexican and pop music'', ''Playing basic guitar chords'',
    ''Helping prepare traditional Mexican dishes'', ''Hiking and nature photography'', ''Participating in school science fairs'']'
  career_goals: Fernando dreams of becoming an engineer who designs practical, community‑focused solutions. In the short term, he aims to join his school’s robotics club, earn a badge in the Boy Scouts’
    STEM program, and participate in regional science fairs. Over the next few years he hopes to attend a high school with a strong STEM curriculum, compete in robotics competitions, and eventually study
    mechanical or environmental engineering at a university. His ultimate ambition is to develop sustainable technologies—such as water‑conservation devices or renewable‑energy prototypes—that can benefit
    his hometown of Madera and support his family’s wellbeing.
