personas:
  professional: Fernando Olarte, an aspiring game designer who builds simple Scratch games and intricate LEGO creations, merges his methodical planning and curiosity to design detailed levels, while their
    sociable nature drives frequent collaborative play‑testing with friends, and their occasional worry pushes them to double‑check every code bug.
  sports: Fernando Olarte, a regular starter for the River City Juniors under‑13 soccer team, drills after school with teammates, idolizes the forward of the regional pro squad Cedar Rapids FC, and balances
    his love for the sport with weekend hikes on Pine Ridge Trail to stay fit and clear his mind.
  arts: Fernando Olarte, a budding LEGO architect and Scratch coder who strums basic chords to songs by Taylor Swift, Bad Bunny, and folk guitarist Carlos Mendoza, channels his organized creativity into
    elaborate builds and quirky game prototypes, while their outgoing spirit fuels animated discussions about art and music with classmates.
  travel: Fernando Olarte prefers organized weekend trips to nearby state parks like Eagle Creek, yet dreams of a summer adventure to Machu Picchu and a cross‑country road‑trip along the West Coast, often
    mapping routes in a notebook before setting off, balancing careful planning with a yearning for spontaneous discovery.
  culinary: Fernando Olarte, a junior kitchen assistant who confidently assembles carnitas tacos and chicken tamales using fresh corn masa, diced chilies, and ripe avocados, enjoys crafting guacamole on
    the side, yet sometimes burns the tortilla edges when racing against the timer.
  core: Fernando Olarte blends meticulous planning with boundless curiosity, turning soccer drills, LEGO builds, and Scratch coding into collaborative adventures, while a lingering worry about perfection
    fuels both their creativity and occasional night‑time anxiety.
background:
  cultural: Fernando comes from a Mexican‑American family that balances the traditions of his heritage with the lifestyle of the Central Valley. At home, Spanish is spoken daily, and he celebrates cultural
    holidays such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day with family meals, music, and crafts. The Olarte family enjoys cooking authentic dishes, sharing stories of their hometown
    in Mexico, and maintaining strong ties to their extended relatives. Living in Madera, California, Fernando also experiences the multicultural environment of his school and community, blending his Mexican
    roots with the broader Californian culture through bilingual communication, participation in local festivals, and friendships across diverse backgrounds.
