  hobbies: '[''Reading non-fiction (finance, psychology)'', ''Yoga and meditation'', ''Hiking local trails'', ''Strategic board games'', ''Cooking experimental recipes'', ''Volunteer financial literacy
    workshops'', ''Running'', ''Journaling'']'
  career_goals: Wenona aims to advance from her current credit counselor role to a senior loan officer position within the next three years, eventually becoming a credit manager overseeing a team of counselors.
    She plans to complete her bachelor’s degree in finance and obtain her NMLS certification to deepen her expertise. Long‑term, she aspires to earn an MBA and transition into a financial advisory role
    where she can design personalized financial plans for small‑business owners. Driven by her competitive nature, she targets top‑tier performance metrics and hopes to be recognized as a trusted financial
    mentor in the Dallas‑Fort Worth community, while also building a balanced lifestyle that mitigates stress.
