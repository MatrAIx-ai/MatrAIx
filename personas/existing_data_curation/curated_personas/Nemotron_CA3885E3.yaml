  career_goals: Shaila aims to move into a senior HR leadership role, such as HR Director, where she can shape organizational culture and drive strategic workforce initiatives. She seeks to leverage data‑driven
    analytics to improve retention, enhance diversity and inclusion, and develop mentorship programs for Latinx employees. Earning the SHRM‑Senior Certified Professional credential is a near‑term goal,
    and she envisions eventually launching a boutique HR consulting practice that offers flexible, culturally attuned solutions for small businesses in Bexar County.
