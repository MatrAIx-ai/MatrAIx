personas:
  professional: Marko Gonzalezrosado, a retired museum educator and art curator, leverages their bilingual fluency and meticulous project‑management skills to design community‑focused exhibitions that blend
    folk motifs with contemporary techniques, while their innate curiosity and high standards keep every detail from cataloguing to public presentation impeccably organized.
  sports: Marko Gonzalezrosado enjoys low‑impact activities like daily nature walks in Lake County Parks and participates in the senior center’s weekly shuffleboard league, while cheering on the Orlando
    Magic and the Tampa Bay Lightning from his living room, balancing passive fandom with gentle movement.
  arts: Marko Gonzalezrosado, a vibrant painter of folk‑inspired landscapes, regular attendee and reviewer of local gallery shows, often cites the works of Frida Kahlo, Diego Rivera, and contemporary artist
    Gabriel Orozco as influences, while leading a senior art appreciation class that blends storytelling with hands‑on creativity.
  travel: Marko Gonzalezrosado prefers weekend road trips to historic towns like San Miguel de Allende and Asheville for their artistic heritage, and dreams of a curated cultural cruise along the Mediterranean
    coasts of Spain and Italy, though budget constraints sometimes keep his voyages to day trips to nearby state parks.
  culinary: Marko Gonzalezrosado enjoys cooking mole poblano, tamales de elote, and fresh ceviche, often seasoning with epazote, ancho chilies, and freshly ground cumin, and rates his own horchata as the
    perfect complement to salsa dancing evenings.
  core: Marko Gonzalezrosado is a meticulously organized, curiosity‑driven cultural steward whose relentless standards and occasional worry fuel a lifelong mission to blend folk traditions with contemporary
    art while nurturing community.
background:
  cultural: Marko was born in Mexico and immigrated to the United States as a young adult, carrying with him a rich tapestry of Mexican customs, folklore, and Catholic traditions. He maintains fluency in
    Spanish and English, bridging cultural gaps in his community. His upbringing emphasized family gatherings, religious festivals like Día de los Muertos, and a deep appreciation for Mexican folk art such
    as alebrijes and Talavera pottery. Living in DeLand, FL, he blends this heritage with Southern hospitality, actively participating in local cultural celebrations while preserving his roots through storytelling,
    culinary practices, and mentorship of younger Mexican‑American artists.
