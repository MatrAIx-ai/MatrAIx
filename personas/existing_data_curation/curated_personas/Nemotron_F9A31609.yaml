  career_goals: Although retired, Marko is driven to leave a lasting cultural imprint on his community. He aims to launch a senior‑center art program that blends Mexican folk traditions with contemporary
    techniques, curate a traveling exhibition of Mexican folk art for Florida museums, and author a memoir that weaves personal history with broader immigrant narratives. He also aspires to mentor emerging
    local artists, secure sustainable funding for cultural projects, and establish a quarterly cultural festival that celebrates Mexican heritage while meeting his high standards for quality and organization.
