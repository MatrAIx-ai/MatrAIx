  career_goals: Although retired, Mary aims to continue contributing her organizational talents to her community. She aspires to become a senior‑center advisory board member, where she can help design structured
    programs for older adults. Mary wishes to mentor younger volunteers, sharing her bookkeeping and event‑planning expertise. She also intends to complete a family history manuscript, preserving stories
    for future generations. Maintaining her health and independence is a top priority; she plans to follow a consistent exercise routine and attend regular health screenings. Finally, Mary hopes to organize
    an annual intergenerational garden showcase, highlighting the fruits of her structured gardening methods.
