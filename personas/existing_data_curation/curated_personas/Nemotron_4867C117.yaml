  career_goals: As she grows older, Vickey intends to channel her love of organization and helping others into a career that offers clear structure and the chance to foster harmony. She envisions roles
    such as a teacher, librarian, or school administrator where she can maintain orderly environments, set high standards, and support the well‑being of her community.
