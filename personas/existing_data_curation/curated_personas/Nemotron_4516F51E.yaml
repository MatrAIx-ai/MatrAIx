personas:
  professional: Amrin Patel is an aspiring young robotics enthusiast who blends a love for sketching imaginative characters with a knack for tinkering on Arduino kits, often turning school projects into
    creative storytelling devices while thriving on the collaborative buzz of the art and robotics clubs.
  sports: Amrin Patel dashes across the school field as a forward for the Midtown Middle School Soccer Club, idolizing the speed of Lionel Messi and cheering for the local pro team, the Seattle Sounders,
    while also joining after‑school pick‑up games at the community park.
  arts: Amrin Patel fills notebooks with vibrant character designs inspired by Marvel comics, Hayao Miyazaki films, and street art by Banksy, and spends evenings practicing Indian classical dance routines
    that echo the rhythmic grace of traditional kathak while sharing their latest comic sketches at the art club.
  travel: Amrin Patel dreams of weekend trips to the sprawling museums of London and the colorful street festivals of Rio de Janeiro, but currently explores nearby heritage fairs and a family road‑trip
    to the Grand Canyon, favoring spontaneous itineraries over strict schedules.
  culinary: Amrin Patel enjoys mixing batter for fluffy dhokla, shaping crisp samosas with family, and experimenting with tangy mango‑chili chutney, while also attempting simple spaghetti carbonara, though
    they occasionally forget to turn off the stove and burn a pancake.
  core: Amrin Patel is a curiosity‑driven, chatty 11‑year‑old who juggles sketchbooks, soccer cleats, and kitchen spoons, thriving on social buzz while occasionally misplacing homework and snacks alike.
background:
  cultural: Amrin is a second‑generation South Asian American; her parents emigrated from Gujarat, India, and maintain cultural traditions such as celebrating Diwali, Holi, and Navratri. At home, the family
    speaks both English and Gujarati, and they enjoy Indian foods, music, and dance. Living in Walpole, MA, she experiences a blend of suburban New England life and South Asian heritage, participating in
    community events at the local Hindu temple and cultural center while fully engaging in American school and extracurricular activities.
