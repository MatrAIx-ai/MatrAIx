  career_goals: Amrin dreams of a future where she can blend art and technology—she imagines becoming an animator, graphic novelist, or digital storyteller who creates inclusive, multicultural content.
    She wants to travel, learn new artistic styles, and eventually lead community workshops that use art to bring diverse groups together. While she is confident about pursuing a creative path, she prefers
    to keep her options open and explore different fields before committing to a single career.
