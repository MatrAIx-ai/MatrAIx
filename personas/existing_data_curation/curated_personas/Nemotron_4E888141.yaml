  hobbies: '[''Line dancing'', ''Tennis'', ''Community garden volunteering'', ''Book club'', ''Traveling to lake towns'', ''Yoga'', ''Gardening'', ''Journaling'', ''Cooking healthy meals'']'
  career_goals: Faye aims to step into a leadership role within her outpatient clinic, launching a community‑focused fall‑prevention program for seniors in Hickory Hills. Over the next five years she plans
    to become a certified clinical instructor, mentoring new therapists while pursuing a graduate certificate in health coaching to broaden her holistic care toolkit. She also hopes to champion workplace
    wellness initiatives that reduce stress for staff and integrate mindfulness practices into everyday clinical routines.
