personas:
  professional: A seasoned physical therapist with three decades of hands‑on experience in musculoskeletal rehabilitation, Faye Cox combines a practical, evidence‑based mindset with a spontaneous flair
    for integrating new therapeutic modalities, leads interdisciplinary teams at an outpatient clinic in Cook County, and champions community fall‑prevention programs while mentoring aspiring therapists.
  sports: An avid tennis enthusiast who meets a small circle of friends for weekly matches at a local park, Faye Cox also follows the Chicago Cubs and Chicago Bears, participates in a senior line‑dancing
    class at the community center, and practices gentle sunrise yoga, blending competitive spirit with social fitness.
  arts: A dedicated book‑club member who enjoys delving into works by Toni Morrison and Haruki Murakami, Faye Cox also loves listening to folk legends such as Joan Baez and attending Chicago’s annual Blues
    Festival featuring Buddy Guy, letting literature and music enrich their social gatherings.
  travel: A structured yet spontaneous traveler, Faye Cox meticulously plans weekend getaways to nearby lake towns like Lake Geneva and Grand Haven, while also keeping a flexible bucket‑list that includes
    a dream visit to Kyoto’s historic temples, balancing relaxation with the excitement of new cultural experiences.
  culinary: A garden‑to‑table cook who delights in tossing fresh basil, heirloom tomatoes, and crisp lettuce into a homemade vinaigrette, Faye Cox also enjoys grilling salmon with a lemon‑dill glaze and
    treating themselves to warm apple crumble topped with vanilla ice cream on rainy evenings.
  core: An energetic, group‑oriented therapist who oscillates between meticulous schedule‑keeping and occasional last‑minute spontaneity, Faye Cox combats a chronic worry habit by journaling daily while
    sometimes over‑committing to community events.
background:
  cultural: Faye’s cultural roots lie in the Midwestern, white, working‑class environment of Cook County, Illinois. Raised in a close‑knit suburb, she internalized values of practicality, a strong work
    ethic, and community participation. These influences shape her pragmatic professional approach and her commitment to local service. While she embraces mainstream American cultural norms, she also appreciates
    the cultural diversity of the Chicago metropolitan area, incorporating inclusive health perspectives into her practice.
attributes:
  skills: '[''Manual therapy'', ''Therapeutic exercise prescription'', ''Gait analysis and training'', ''Post‑operative rehabilitation'', ''Chronic pain management'', ''Patient education and motivational
