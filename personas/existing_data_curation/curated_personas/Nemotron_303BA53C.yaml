personas:
  professional: Jesse Thurlow, a 17‑year‑old self‑taught illustrator and musician, blends charcoal portraits, digital collages, and folk melodies into freelance commissions, while their relaxed approach
    often leaves projects half‑finished but fuels a dream of opening a community art hub.
  sports: Jesse Thurlow, who enjoys wandering the Bear Creek Trail for solo hikes and occasionally joins a weekend pick‑up basketball game at the Warren County community center, roots for the New York Giants
    while cheering on the New York Knicks, embodying a low‑key, seasonal fitness vibe.
  arts: Jesse Thurlow, a regular at the downtown café’s open‑mic nights where they strum indie folk songs à la Bon Iver and share charcoal sketches inspired by The Lumineers, finds creative spark from Shepard
    Fairey’s street art and curates monthly collage swaps with fellow teenage artists.
  travel: Jesse Thurlow, who prefers spontaneous day trips to the Pocono Mountains for sunrise photography and occasional weekend bus rides to New York City’s Museum of Modern Art, dreams of backpacking
    through Portland’s indie art scene once they save enough from freelance gigs.
  culinary: Jesse Thurlow, an amateur cook who loves whipping up rustic apple‑cinnamon pancakes with locally sourced apples, experiments with homemade pesto pasta on weekends, and never says no to a perfectly
    crisp grilled cheese paired with a cold craft soda.
  core: Jesse Thurlow, a laid‑back 17‑year‑old with a penchant for unfinished collages, wandering guitar riffs, and a quiet ambition to turn their eclectic creativity into a community art sanctuary.
background:
  cultural: Jesse grew up in Andover, a small, rural town in Warren County, New Jersey. His family's roots trace back to generations of white, middle-class American settlers, primarily of English and German
    descent, who have lived in the region for decades. The community's emphasis on mutual support, local fairs, and modest suburban life shaped his appreciation for harmony and collaboration. Exposure to
    the local high school's art club, the county's seasonal farmers' market, and the nearby Appalachian cultural influences nurtured his curiosity for both traditional crafts and contemporary artistic expressions.
attributes:
  skills: '[''sketching'', ''digital illustration (Procreate, GIMP)'', ''photo editing'', ''video editing (basic)'', ''acoustic guitar playing'', ''creative writing (short stories, poetry)'', ''basic wood-working'',
