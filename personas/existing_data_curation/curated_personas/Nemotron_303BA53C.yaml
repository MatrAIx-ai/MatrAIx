  hobbies: '[''sketching and mixed-media collage'', ''digital illustration'', ''nature photography'', ''acoustic guitar playing and songwriting'', ''attending small art-oriented meetups'', ''reading about
    contemporary art and philosophy'', ''volunteering at community art events'']'
  career_goals: Jesse aspires to turn his artistic passions into a sustainable freelance career. He hopes to build a portfolio that will allow him to secure commissions for illustration, album cover design,
    and small-scale video projects. He also dreams of eventually opening a modest community art space in Warren County where he can host workshops and collaborate with other local creators. While he does
    not see himself thriving in a conventional 9-to-5 job, he is open to apprenticeship opportunities with local artisans or graphic design studios that value flexibility and creative freedom.
