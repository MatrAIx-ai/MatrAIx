personas:
  professional: Reginald Abraham, a seasoned handyman in Albany, blends practical carpentry, minor plumbing, and electrical repair skills with a curious, community‑oriented mindset; their calm resilience
    and flexible, sometimes disorganized schedule let them turn spontaneous fix‑ups into trusted neighborhood services while mentoring younger residents on DIY techniques.
  sports: Reginald Abraham stays active by joining a senior‑friendly basketball league that often plays against the University at Albany Great Danes alumni team, cheering on the Albany Empire indoor football
    squad on weekends, and taking leisurely walks with the Hudson River Trail walking club during the summer.
  arts: Reginald Abraham finds inspiration in the soulful sounds of Marvin Gaye and the improvisational brilliance of John Coltrane, regularly attends the Albany Cultural Heritage Festival where the Hudson
    Groove jazz ensemble performs, and channels that creative energy into carving small wooden figurines that echo the stories heard at church gatherings.
  travel: Reginald Abraham favors relaxed road trips that blend heritage and nature, having driven to Charleston, South Carolina to taste authentic Southern cuisine, exploring New Orleans during Mardi Gras
    for its jazz scene, and planning a future pilgrimage to Accra, Ghana to connect with ancestral stories, all while balancing a modest travel budget and family commitments.
  culinary: Reginald Abraham excels at soul‑food cooking, regularly preparing Southern‑style collard greens sautéed with smoked turkey, sweet‑potato cornbread spiced with a pinch of cayenne, and black‑eyed
    pea stew seasoned with thyme and scallions, often harvesting fresh herbs like basil and oregano from a backyard garden to enhance each meal.
  core: Reginald Abraham is a 55‑year‑old community handyman who turns spontaneous tool tinkering into trusted neighborhood fixes, hums classic jazz while tending the garden, and habitually misplaces a
    favorite wrench—only to discover it later buried under a pot of basil.
background:
  cultural: Reginald was raised in Albany’s close‑knit African‑American community, where church life, family gatherings, and neighborhood solidarity shaped his worldview. His family’s roots trace back to
    the Great Migration, bringing a blend of Southern culinary traditions and a strong emphasis on storytelling. Growing up during the civil‑rights era instilled in him a deep sense of resilience and pride
    in his heritage. Today, he draws on this cultural foundation to mentor younger neighbors, celebrate Black cultural festivals, and preserve the local histories that define Albany’s Black identity.
attributes:
  skills: '[''Handyman/home repair'', ''Basic carpentry'', ''Minor plumbing and electrical troubleshooting'', ''Garden cultivation'', ''Soul‑food cooking'', ''Household budgeting and financial management'',
