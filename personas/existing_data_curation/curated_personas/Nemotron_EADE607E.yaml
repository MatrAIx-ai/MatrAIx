  career_goals: David aims to blend his curiosity for how things work with a practical career path. He hopes to earn his GED, pursue an apprenticeship in automotive or mechanical technology, and eventually
    study engineering at a community college. He is also interested in creating online content that showcases DIY projects and gaming insights, viewing it as a possible side‑venture or future profession.
    His long‑term ambition is to work in a field where he can both design and build, such as mechanical engineering, automotive tech, or running a small custom‑bike workshop.
