personas:
  professional: Pauline Wolfe combines two decades of full-cycle talent acquisition and HR analytics expertise with a curator's eye for culture, using their methodical planning and calm resilience to design
    DEI strategies and arts-based wellness programs that transform employee engagement across midsize firms, and they always ensure each initiative resonates with the creative spirit of the workforce.
  sports: Pauline Wolfe fuels their energy by sprinting with the Bayou City Running Club in the spring, playing mixed-gender pickleball at a community center during summer, cheering the New Orleans Saints
    on Sundays, and attending Pelicans games in the winter, while maintaining a weekly yoga flow that balances their love for rhythmic movement with a low-impact cardio routine, and they feel revitalized
    after each session.
  arts: Pauline Wolfe immerses themselves in the visual and musical pulse of the Gulf Coast, painting bold acrylic abstracts inspired by the color palettes of George Rodrigue, attending live performances
    by the Preservation Hall Jazz Band and Trombone Shorty, curating monthly gallery tours that showcase emerging Creole and multicultural artists, and devouring novels by Toni Morrison and James Baldwin
    to deepen their storytelling sensibility, and they often host art-talk evenings to discuss the pieces.
  travel: Pauline Wolfe plans each getaway like a curated exhibition, favoring culturally rich festivals such as the New Orleans Mardi Gras, the Austin SXSW music conference, and the Savannah Music Festival,
    while also seeking international immersion in New Orleans-inspired Creole neighborhoods of Barcelona's El Born district, the historic streets of Charleston, and the jazz-laden Quarter in Havana, balancing
    these trips with budget-friendly off-season bookings and occasional family-oriented road trips to the Ozark Mountains, and they document each journey in a vibrant travel journal.
  culinary: Pauline Wolfe channels their culinary curiosity into potluck-ready Creole classics like gumbo rich with andouille sausage, shrimp, and file powder, jambalaya spiced with cayenne and thyme, and
    silky beignets dusted with powdered sugar, while their intermediate cooking skill lets them perfect a roux on a Sunday afternoon and experiment with locally sourced okra, fresh Gulf shrimp, and smoked
    chicken in weekly dinner parties, and they love to pair each dish with a curated playlist of jazz standards.
  core: Pauline Wolfe is a meticulously organized HR strategist who weaves art and wellness into corporate culture, yet they can't resist a nightly ritual of scrolling through gallery catalogs, often losing
    track of bedtime.
background:
  cultural: Born and raised in Baton Rouge, Pauline is part of the African‑American community that has deep roots in the Deep South. Her family traces its lineage to the era of the Great Migration and earlier
    enslaved ancestors who lived in the plantations of the Mississippi River delta, later settling in the vibrant Creole‑influenced neighborhoods of East Baton Rouge Parish. The cultural mosaic of Baton Rouge—mixing
    French‑Creole, Cajun, and Southern traditions—shapes her appreciation for music, food, and communal celebration. She grew up attending Baptist church services where gospel music and social outreach
    were central, fostering a strong sense of community service. The legacy of civil‑rights activism in Louisiana and the prominence of African‑American artistic movements (such as the New Orleans jazz
    scene and local spoken‑word poetry) have informed her identity and worldview. Her heritage also includes an intergenerational love of storytelling, oral history, and resilience, which she channels into
    both her professional role in HR and her personal pursuits of art and cultural engagement.
