    of employee‑engagement events'', ''Cultural competency'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Painting and mixed‑media artwork'', ''Attending jazz and blues concerts'', ''Participating in community theatre productions'', ''Cooking
    Creole and Cajun dishes'', ''Gardening'', ''Yoga and mindfulness practice'', ''Reading African‑American literature and poetry'', ''Volunteering at local youth arts programs'', ''Traveling to cultural
    festivals'', ''Hosting potluck gatherings for friends and colleagues'']'
  career_goals: Pauline aims to advance to a senior HR leadership role, such as HR Director or Vice President of People, within the next five years, focusing on integrating arts‑based wellness programs
    and DEI initiatives across the organization. She plans to earn SHRM‑Senior Certified Professional (SHRM‑SCP) credential, lead a cross‑functional diversity council, and eventually launch her own consultancy
    that helps midsize companies embed inclusive culture and creative employee‑experience strategies. She also aspires to become a recognized speaker on inclusive workplace design at regional conferences
    and to mentor emerging Black HR professionals in Louisiana.
