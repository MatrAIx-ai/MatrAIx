  hobbies: '[''Vintage pickup truck restoration'', ''Volunteer firefighting'', ''Organizing community potlucks'', ''Desert hiking'', ''Xeriscape gardening'', ''Pickup basketball at the recreation center'',
    ''DIY woodworking'', ''Attending local rodeos and county fairs'', ''Listening to classic rock'']'
  career_goals: Steven’s primary career goal is to secure stable, part‑time work that utilizes his mechanical and land‑management skills while allowing him to remain engaged with his community. He aims
    to obtain a certification in HVAC or commercial vehicle maintenance to expand his job prospects. In the longer term, he aspires to launch a small handyman and property‑maintenance business serving the
    residents of La Paz County, providing reliable services and creating a modest income stream.
