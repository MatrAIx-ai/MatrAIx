persona_description: A traveler who is fascinated by the history and culture of Hawaii, particularly the ancient Hawaiian civilization and its journey from the Marquesas Islands to Hawaii's Big Island.
  They are curious about the social hierarchy system introduced by the Tahitian natives and the impact of American missionaries on Hawaiian culture. They are also interested in the history of the Hawaiian
  Islands and their eventual annexation by the United States, as well as the economic changes brought about by the plantation industry and the impact of Japanese immigration.
