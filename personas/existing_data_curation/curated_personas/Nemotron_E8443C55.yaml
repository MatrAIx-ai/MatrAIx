  career_goals: John aims to re‑enter the workforce by leveraging his communication and arts background into a part‑time community arts coordinator role at the local library or a nonprofit cultural center.
    He plans to design and lead workshops that blend traditional craft with contemporary artistic expression, while also pursuing a peer‑counselor certification to formalize his supportive role. Long‑term,
    he dreams of opening a modest community art space that serves as a hub for creative learning, mental‑health outreach, and neighborhood connection, providing both personal fulfillment and financial stability.
