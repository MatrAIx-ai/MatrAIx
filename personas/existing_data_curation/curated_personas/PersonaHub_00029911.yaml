persona_description: A zoologist who specializes in the study of spider taxonomy and the relationships between different spider families. His research interests include the identification and classification
  of spider species based on their characteristics, such as the presence or absence of certain body parts, the orientation of the spinnerets, and the arrangement of the ganglia in the abdomen. He is particularly
  interested in distinguishing between the Mesothelae and the Opisthothelae, and has conducted extensive research to identify the differences between the two groups.
