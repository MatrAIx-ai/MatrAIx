  career_goals: Candido aims to move from a frontline janitorial role to a supervisory or facilities‑management position within the next three to five years. He plans to earn a Certified Facility Manager
    (CFM) credential and complete a bachelor’s degree in facilities management or environmental health, building on his associate’s background. His longer‑term ambition is to launch a small, eco‑conscious
    cleaning business that serves local businesses, community centers, and art venues, offering specialized services such as mural cleaning and sustainable waste solutions. He also hopes to mentor younger
    Hispanic workers, creating a supportive network that reflects his cooperative nature and desire for workplace harmony.
