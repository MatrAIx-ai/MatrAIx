personas:
  professional: Candido Olaya is a seasoned janitorial professional who blends deep expertise in commercial cleaning, floor care, and eco‑friendly waste management with a flair for small‑scale carpentry
    and mural upkeep, using their bilingual communication skills to train crews and resolve client concerns while they are ambitiously pursuing a facilities‑management supervisory role.
  sports: Candido Olaya enjoys weekend fishing at the pier, participates in casual beach volleyball pick‑ups with the local community league, and they loyally support the Carolina Panthers while they occasionally
    attend Myrtle Beach Pelicans games for a relaxed sports fix.
  arts: Candido Olaya is an active participant in the regional art scene, painting vibrant murals on beach pavilions, attending weekly community‑center art classes, and drawing creative inspiration from
    salsa legends like Marc Anthony, bachata star Victor Manuelle, and reggaetón hitmaker Bad Bunny, while they also savor local theater productions such as the community staging of 'West Side Story.'
  travel: Candido Olaya prefers spontaneous weekend getaways to coastal towns like Key West and Charleston, they plan trips over a cup of coffee after work, yet they harbor a long‑term dream of wandering
    Seville’s historic streets, balancing a modest travel budget with a desire to capture sunrise vistas along boardwalks for photography.
  culinary: Candido Olaya loves cooking aromatic island‑inspired dishes such as mofongo, arroz con gandules, and lechón, mastering the use of plantains, sofrito, and mojo sauce, while they also experiment
    with fresh‑caught grilled snapper and savor spicy salsa verde from local markets.
  core: Candido Olaya is a socially‑driven facilities expert with a creative streak, who balances meticulous organization with spontaneous art projects, but they often worry about upcoming deadlines and
    can’t resist a late‑night salsa rhythm.
background:
  cultural: Candido’s cultural identity is rooted in his Puerto Rican heritage. He grew up in a bilingual household where Spanish was spoken daily, and the island’s music, dance, and vibrant festivals were
    central to family life. Values of hospitality, community cohesion, and respect for elders were reinforced through large family gatherings and shared meals. Although he now resides in Myrtle Beach, he
    maintains strong ties to his roots by celebrating Puerto Rican holidays such as Noche de San Juan, playing traditional music at home, and preparing island dishes for neighbours. His Puerto Rican background
    informs his friendly, cooperative demeanor and his commitment to creating inclusive, harmonious environments both at work and in community activities.
