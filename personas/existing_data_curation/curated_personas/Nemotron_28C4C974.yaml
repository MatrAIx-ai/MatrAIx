personas:
  professional: George Morton, an aspiring young coder who blends LEGO engineering with Scratch animation, channels their practical curiosity and balanced organization into after‑school projects that solve
    classroom challenges while still finding time for piano practice.
  sports: George Morton, a member of the Helotes Little League Tigers who practices baseball every weekend, also cheers for the Texas Rangers and Dallas Cowboys, balances regular park workouts with a love
    for exploring local trails, and occasionally joins the community youth soccer club for cross‑training, demonstrating their energetic yet organized approach to fitness.
  arts: George Morton, who spends evenings practicing piano and listening to country stars like Luke Bryan and Carrie Underwood while also building storyboards for Scratch cartoons inspired by the sci‑fi
    books they devour, finds that music and visual storytelling shape their identity and leisure time.
  travel: George Morton, who enjoys family road trips to the San Antonio River Walk and the Hill Country’s bluebonnet fields, prefers hands‑on exploration over long flights but dreams of visiting Space
    Center Houston and the National Air and Space Museum in Washington, D.C., balancing modest vacation budgets with a thirst for adventure that they eagerly pursue.
  culinary: George Morton, an enthusiastic kitchen helper who loves licking the honey‑glazed brisket crust on Texas‑style barbecue, mixing jalapeños into homemade guacamole, and kneading dough for their
    family's pecan pie, shows a budding culinary skill set that blends bold flavors with a love for sweet desserts, reflecting their playful approach to cooking.
  core: George Morton, a pragmatic dreamer who meticulously saves for LEGO sets yet frequently forgets to finish homework before video game sessions, embodies a curious yet grounded ten‑year‑old balancing
    imagination with responsibility, and they often remind themselves to stay on track.
background:
  cultural: George was born and raised in Helotes, Texas, a small community that blends rural ranch traditions with close‑knit suburban life. His family’s heritage traces back to Anglo‑American settlers,
    with grandparents who grew up on farms in the Midwest before moving to Texas. The local culture emphasizes friendliness, community gatherings, and pride in Texas history, which George experiences through
    school celebrations of Texas Independence Day and family trips to nearby San Antonio. He enjoys Texas‑style barbecue, country and western music, and the annual Helotes Bluebonnet Festival. Growing up
    in a predominantly white neighborhood, he also learns to value diverse viewpoints from school friends, while his family’s Christian background shapes his sense of responsibility and kindness.
