  career_goals: George dreams of one day becoming an engineer who designs bridges or playgrounds that keep his community safe and fun. He is also fascinated by wildlife and imagines working as a Texas wildlife
    biologist, protecting the animals he spots on his nature walks. He often tells his teachers that he wants to build robots that help people, so an interest in robotics and computer science is growing.
    His short‑term goal is to win his school’s science fair with a simple robot, and his longer‑term ambition is to study engineering or environmental science in high school and college.
