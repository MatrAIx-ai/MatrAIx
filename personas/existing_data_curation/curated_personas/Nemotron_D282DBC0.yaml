personas:
  professional: Jeannie Stearns is a retired engineer who now channels their analytical acumen and meticulous project‑planning skills into mentoring younger generations in STEM, coordinating quarterly technology
    workshops at the local library, and drafting detailed volunteer schedules for the community board, all while they infuse their love of order into curriculum design and hands‑on troubleshooting.
  sports: Jeannie Stearns enjoys low‑impact fitness, joining the Golden Trails Senior Walking Club for spring and fall walks, playing biweekly pickleball at the community center, cheering for the nearby
    River City Royals baseball team each summer, and attending the local high school’s Friday night soccer matches, while they avoid strenuous activities that aggravate their knee osteoarthritis.
  arts: Jeannie Stearns finds solace in the church choir, where they sing excerpts from Handel’s Messiah and cherish the harmony of community voices, attend monthly classical concerts featuring violinist
    Hilary Hahn, collect vintage quilting patterns inspired by the works of Mary Meigs, and unwind with novels by Agatha Christie and the folk ballads of Joan Baez.
  travel: Jeannie Stearns prefers well‑planned trips that blend history and nature, having visited Colonial Williamsburg, the gardens of Versailles, and the Redwood National Park on guided tours, they now
    hope to explore the cherry blossom festivals of Kyoto and the coastal towns of Nova Scotia, always drafting itineraries in their notebook to keep stress at bay.
  culinary: Jeannie Stearns delights in cooking with produce from their own garden, mastering butternut squash risotto with sage, a fragrant ratatouille packed with zucchini and tomatoes, and baking lemon
    scones topped with clotted cream, while their modest culinary skill—limited to stovetop and oven—keeps their favored kitchen tools tidy and organized.
  core: Jeannie Stearns blends an engineer’s precision with a gardener’s calm, turning spreadsheets, quilts, and community workshops into meticulously ordered acts of quiet service, and they approach each
    task with soothing methodical focus.
background:
  cultural: Jeannie grew up in mid‑20th‑century suburban North Carolina within a white, European‑descended family that valued Southern hospitality, community involvement, and a strong work ethic. Her upbringing
    emphasized home‑cooked holiday meals, regular church attendance, and participation in local civic organizations. Experiencing the civil rights era and the rise of the women's movement, she developed
    a commitment to education, independence, and gender equality. These cultural influences blend traditional Southern community spirit with a progressive appreciation for scientific inquiry and social
    cooperation, shaping her considerate, organized, and somewhat cautious outlook on life.
attributes:
  skills: '["Statistical analysis", "Data visualization", "Basic Python scripting", "Advanced Excel modeling", "Project planning", "Technical troubleshooting", "Curriculum development for youth STEM", "Volunteer
    coordination", "Documentation and record keeping"]'
  hobbies: '["Gardening", "Jigsaw puzzles", "Crossword puzzles", "Knitting", "Quilting", "Book club", "Volunteer teaching senior computer classes", "Historic preservation walks", "Church choir"]'
  career_goals: Although retired, Jeannie aims to leave a lasting legacy by mentoring younger generations in STEM and promoting digital literacy among seniors. She plans to organize a quarterly technology
    workshop at the local library, write a memoir that chronicles her experiences as a woman in engineering during the 1960s and 70s, and provide occasional tutoring for her grandchildren to support their
    academic pursuits. Additionally, she aspires to maintain her health and manage stress through consistent routines, and she hopes to serve as a steady, caring presence on her community board, ensuring
    projects are executed with precision and compassion.
