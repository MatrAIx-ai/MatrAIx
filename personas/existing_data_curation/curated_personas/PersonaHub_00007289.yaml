persona_description: A professional with expertise in environmental impact assessment, particularly in the field of fire safety and environmental management. This person is likely to be interested in developing
  and implementing protocols for assessing the adverse environmental impacts of fires, including those from commercial and domestic premises, unenclosed sites, industrial and agricultural areas, and transport
  systems. They may also be interested in developing methods for post-fire analyses to identify the nature and extent of the adverse impacts and for collecting relevant data for use in environmental fire
  hazard assessments. This person may work for organizations such as firefighters, investigators, building owners and managers, storage facility operators, materials and product manufacturers, insurance
  providers, environmental regulatory authorities, civil defence organizations, and public health authorities.
