  career_goals: As he approaches retirement, Dane aims to transition into a senior consulting role focused on network architecture and security, allowing him to leverage his extensive practical knowledge
    while working part‑time. He plans to earn the Cisco CCNP certification within the next year to formalize his expertise. Additionally, he is committed to mentoring a successor to ensure a smooth handover
    of departmental responsibilities and to spearhead a community digital‑literacy program at the local senior center. Ultimately, he hopes to leave a lasting legacy of well‑documented processes and a stronger,
    more resilient IT environment for both his workplace and the broader Shelbyville community.
