personas:
  professional: Sterling Carter, a budding engineer in training who delights in building block towers, showcases an early knack for organized, methodical play that hints at future engineering prospects,
    as they meticulously arrange each piece and patiently follow the same routine daily.
  sports: Sterling Carter, a curious toddler attending a local baby swim class and weekly parent‑toddler gymnastics, cheers for the city’s baseball team, the River City Runners, and proudly wears a tiny
    cap of the hometown soccer club, the Metro United, whenever they splash in the kiddie pool.
  arts: Sterling Carter, an enthusiastic follower of classic nursery rhymes, loves listening to Raffi's 'Baby Beluga', watching Sesame Street, and flipping through the colorful pages of 'The Very Hungry
    Caterpillar', they find comfort in the rhythmic cadence that aligns with their love for predictable routines.
  travel: Sterling Carter, a wide‑eyed explorer who has already taken a weekend road trip to the seaside grandparents’ cottage, a short train ride to the city zoo, and dreams of a future family vacation
    to the Grand Canyon, they prefer planned itineraries with familiar car seats and frequent snack breaks.
  culinary: Sterling Carter, a picky eater who favors smooth pureed carrots, banana mash with a dash of cinnamon, and occasional soft cheese sticks, delights in the simple texture of oatmeal but stubbornly
    refuses lumpy peas, they often beg for the tiny silver spoon their mother uses for feeding.
  core: Sterling Carter, a methodical one‑year‑old who thrives on routine, quietly curates a collection of shiny coins, and asserts independence through stubborn refusal of messy foods, they find solace
    in predictable play.
background:
  cultural: Sterling is a Black child growing up in Chicago's vibrant South Side community. His family embraces African‑American cultural traditions, including the rhythms of gospel and jazz music, storytelling
    at family gatherings, and participation in neighborhood events that emphasize collective support. He benefits from a close‑knit extended family network that values resilience, community service, and
    cultural pride. While his immediate environment is urban and diverse, his upbringing reflects the rich heritage and values of African‑American culture in Chicago, shaping his sense of identity from
    an early age.
