  career_goals: Chris aspires to a career that blends his love of nature with practical problem solving, such as becoming an environmental engineer or wildlife conservationist. He envisions designing sustainable
    solutions for his rural community, protecting local habitats, and possibly teaching science to younger students one day. His goal is to make a tangible positive impact while working in a collaborative,
    supportive environment.
