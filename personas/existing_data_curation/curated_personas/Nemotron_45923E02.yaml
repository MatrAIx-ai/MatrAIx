personas:
  professional: A budding tech tinkerer, Daniel Garrett channels their curiosity and competitive spirit into constructing complex LEGO models and coding Scratch projects, demonstrating early engineering
    instincts, practical problem‑solving, organized yet flexible planning, and a skeptical eye for shortcuts, and they handle setbacks with calm composure.
  sports: A competitive young athlete, Daniel Garrett devotes after‑school hours to pickup basketball at the Bronx recreation center, idolizes the New York Knicks and follows the NBA season closely, roots
    for the New York Yankees during baseball season, and participates in the local Bronx Youth Basketball League, and they use each game as a chance to sharpen skills and prove themselves.
  arts: A creative enthusiast, Daniel Garrett immerses themselves in graphic novels by Alan Moore and Kieron Gillen, streams hip‑hop from Kendrick Lamar and R&B classics by Beyoncé, and they draw inspiration
    from the vibrant street art of the Bronx murals, often sketching comic‑style inventions during quiet moments.
  travel: An inquisitive traveler, Daniel Garrett loves exploring New York City’s museums—especially the American Museum of Natural History—has visited the historic streets of Boston and the Jersey Shore
    beaches on family trips, and they dream of wandering through Paris’s Eiffel Tower and the Great Wall of China, favoring guided tours that blend hands‑on learning with free play.
  culinary: A budding home chef, Daniel Garrett enjoys crafting personal‑size pepperoni pizza slices with extra mozzarella, mastering chocolate chip cookies using dark‑chocolate chips and sea salt, and
    blending DIY fruit smoothies with banana, strawberries, and almond milk, though they often forget to turn off the oven after baking.
  core: An inquisitive yet fiercely competitive 11‑year‑old, Daniel Garrett balances a love for building and coding with a skeptical edge, turning every challenge into a game, never shying away from out‑shining
    friends—often by monopolizing the LEGO supply—and they occasionally neglect bedtime to finish a new Scratch project.
background:
  cultural: Daniel is a Black youth raised in the Bronx, a borough where African‑American and Caribbean cultural threads intersect. His family upholds traditions that blend church gatherings, neighborhood
    block parties, and storytelling from older relatives, fostering a strong sense of identity and pride. The vibrant street art, local hip‑hop scene, and community murals celebrating Black history provide
    a dynamic backdrop that shapes his worldview. These influences nurture his ambition to give back, reinforcing values of resilience, community support, and the celebration of cultural heritage.
attributes:
  skills: '[''Mathematics (fractions, basic geometry)'', ''Reading comprehension (science texts, graphic novels)'', ''LEGO building and spatial design'', ''Scratch programming (simple game development)'',
    ''Basketball (dribbling, shooting, defense)'', ''Organization (color‑coded planner, task management)'', ''Critical evaluation of information'']'
  hobbies: '[''LEGO construction'', ''Scratch coding projects'', ''Basketball (pickup games)'', ''Reading graphic novels and science books'', ''Listening to Hip‑hop and R&B'', ''Attending Bronx cultural
    events (block parties, museum workshops)'']'
  career_goals: Daniel envisions a future where he can turn his love of technology and problem solving into a career that benefits his community. He aspires to become a software developer or engineer, creating
    educational apps or games that make math and science fun for other kids. His competitive drive pushes him toward earning a scholarship in computer science or engineering, and he also dreams of playing
    basketball at a high school level, using his platform to mentor younger peers. Ultimately, he hopes to combine his technical skills and athletic experience to lead community‑based STEM and sports programs
    in the Bronx.
