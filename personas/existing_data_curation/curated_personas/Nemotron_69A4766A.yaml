personas:
  professional: Dianna Henry, a budding junior explorer, channels her curiosity and practicality into weekly science fair projects, building intricate LEGO ecosystems and crafting simple Scratch games that
    blend organized step‑by‑step logic with spontaneous storytelling, while their competitive streak drives them to win the "Best Innovation" ribbon at school.
  sports: Dianna Henry plays forward for the Cedar Grove Soccer Club, fiercely competes to be the top scorer in the local league while also swimming laps at the Sunrise Community Pool under the guidance
    of Coach Ramirez, and idolizes the Seattle Seahawks, which fuels their competitive drive during every practice.
  arts: Dianna Henry, an avid sketcher of birds and bayou fish, practices piano daily with repertoire ranging from Mozart’s Sonatas to Debussy’s 'Clair de Lune,' often drawing inspiration from wildlife
    illustrator John James Audubon and channeling their creativity into elaborate LEGO sculptures that double as personal art installations.
  travel: Dianna Henry loves weekend trips to the nearby Atchafalaya Basin for kayaking, recalls a school field trip to the Grand Canyon that sparked a wish to hike Yellowstone, and daydreams about photographing
    the mangroves of the Florida Keys while balancing parental budget constraints.
  culinary: Dianna Henry favors buttery mac and cheese topped with extra cheddar, helps their mom roll homemade pizza dough on Saturday mornings, eagerly adds fresh shrimp to their seafood salads after
    beach foraging, but stubbornly refuses to eat Brussels sprouts, making their dinner routines a blend of enthusiastic cooking experiments and picky bites.
  core: Dianna Henry is a ten‑year‑old curiosity‑driven explorer who balances organized LEGO engineering with spontaneous Scratch game hacks, competes fiercely on the soccer field, and refuses to eat Brussels
    sprouts despite a kitchen full of culinary adventures.
background:
  cultural: Dianna was raised in Arabi, a close‑knit community within St. Bernard Parish near New Orleans. Her family follows mainstream American traditions with Southern influences, attending church, celebrating
    holidays like Thanksgiving and the local Parish Fair, and enjoying regional dishes such as gumbo and po'boys. Growing up in a diverse public school, she has been exposed to Cajun and Creole cultural
    elements, local music, and the history of the area, including the resilience shown after Hurricane Katrina. These experiences have shaped her respect for community, love of the Gulf Coast environment,
    and practical yet curious outlook on life.
