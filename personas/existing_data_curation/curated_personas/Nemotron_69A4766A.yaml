  career_goals: Dianna dreams of becoming a marine biologist or environmental scientist to protect the wetlands and marine life of the Gulf Coast she loves exploring. She also hopes to design educational
    video games that teach kids about science and nature, combining her curiosity with practical problem‑solving. In the near term, she aims to join a STEM‑focused middle school program, win a local science
    fair, and later attend a university with a strong marine science department, where she can mentor younger students.
