  hobbies: '[''Reading adventure novels'', ''Nature walks and birdwatching'', ''Shell collecting'', ''Sketching and drawing'', ''LEGO building'', ''Scratch coding'', ''Soccer'', ''Swimming'', ''Piano practice'',
