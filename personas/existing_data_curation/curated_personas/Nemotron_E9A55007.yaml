  hobbies: '["Ice Fishing", "Cross-country Skiing", "Hiking", "Adult Softball League", "Volunteer Food Bank", "Barbecue Cooking", "Woodworking", "Reading Historical Biographies", "Attending Swedish Heritage
    Festival", "Listening to Classic Rock"]'
  career_goals: Robert aims to transition into a senior leadership role, such as Director of a Project Management Office, where he can shape enterprise‑wide project standards and mentor the next generation
    of project managers. He plans to earn his PMP certification (if not already held) and pursue a master's degree in Management to deepen his strategic perspective. His long‑term ambition includes championing
    sustainable, community‑focused projects that improve local infrastructure while fostering collaboration across public, private, and nonprofit partners.
