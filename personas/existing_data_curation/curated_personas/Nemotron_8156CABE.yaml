  hobbies: '[''Watercolor painting (abstract)'', ''Gardening (herbs and native flowers)'', ''Quilting'', ''Knitting scarves'', ''Reading historical fiction and poetry'', ''Visiting museums and art galleries'',
    ''Birdwatching'', ''Genealogy research'', ''Cooking experimental recipes'', ''Attending community theater'']'
  career_goals: Though she is no longer employed in a formal capacity, Alexandera channels her ambitions toward personal enrichment and community contribution. She hopes to launch a modestly funded art
    atelier within the Independence community center, offering weekly workshops in watercolor, quilting, and mixed‑media that welcome both seniors and younger residents. She also wishes to compile and self‑publish
    a memoir that weaves together her childhood memories, her artistic evolution, and reflections on navigating worry and resilience. Over the next few years she plans to organize a small traveling exhibit
    of her abstract paintings at local libraries and coffee houses, and to continue participating in regional art fairs to broaden her exposure to novel styles. Additionally, she aspires to mentor a handful
    of budding artists, helping them integrate imaginative thinking with practical skill‑building.
