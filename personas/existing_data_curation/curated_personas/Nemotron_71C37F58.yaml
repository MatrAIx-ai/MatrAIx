  career_goals: He aspires to turn his passion for community and the outdoors into a career, aiming to work in sustainable tourism or coastal conservation. Over the next five years, he hopes to earn a certification
    in environmental management, secure a role with the local Chamber of Commerce or a nonprofit focused on beach preservation, and eventually launch his own eco‑friendly beachside activities business that
    combines guided tours, wellness workshops, and volunteer clean‑up programs.
