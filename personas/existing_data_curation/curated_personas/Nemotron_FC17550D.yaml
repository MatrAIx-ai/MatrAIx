personas:
  professional: Sandra Hudson, a budding junior inventor, merges LEGO building, Scratch coding, and fantasy storytelling into creative school projects, showing boundless curiosity and collaborative energy
    while often leaving her supplies scattered in a delightful, chaotic mess.
  sports: Sandra Hudson laces up for the Riverdale Rangers youth soccer team and twirls in the after-school Hip-Hop Hoops dance club, preferring fast-paced games that let them burn off energy while still
    chatting with teammates between drills.
  arts: Sandra Hudson devotes afternoons to sketching magical creatures inspired by Hayao Miyazaki's films and Beatrix Potter's illustrations while their playlist includes Pokémon theme songs and they idolize
    young YouTube artist Emma Kullberg for DIY craft tutorials.
  travel: Sandra Hudson prefers spontaneous weekend outings with friends, having already explored the winding trails of Yellowstone and the glittering rides of Disneyland, while dreaming of next summer's
    family road trip to the towering redwoods and a fantasy-filled visit to Edinburgh Castle.
  culinary: Sandra Hudson loves colorful rainbow cupcakes topped with sprinkles and can whip up a surprisingly decent mac and cheese, yet they often sneak extra chocolate chips into the family's cookie
    dough, a habit that leaves an occasional sugar-high.
  core: Sandra Hudson is a wildly imaginative ten-year-old whose boundless curiosity fuels a chaotic blend of LEGO engineering, fantasy writing, and craft-making, even if they constantly lose track of their
    supplies in the creative whirlwind.
background:
  cultural: Sandra grew up in a suburban community in Utah County, Utah, within a white American family that emphasizes curiosity, personal expression, and community involvement. Her upbringing blends mainstream
    U.S. cultural influences—such as exposure to a wide range of media, school arts programs, and team sports—with regional values that favor outdoor recreation, participation in local events, and supportive
    peer networks. These influences nurture her imaginative outlook and sociable nature.
