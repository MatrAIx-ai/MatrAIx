  career_goals: Minh aims to transition from his current gap period into a role where his technical depth and people skills intersect, such as product management at a tech startup focused on sustainable
    solutions or a leadership position in a nonprofit that expands STEM opportunities for Asian‑American youth. He plans to earn a Certified Scrum Master credential, build a portfolio of prototype products,
    and eventually launch his own venture that leverages data‑driven insights to improve local environmental health. Additionally, he envisions serving as a community ambassador, organizing hackathons and
    mentorship programs that empower the next generation of engineers and innovators.
