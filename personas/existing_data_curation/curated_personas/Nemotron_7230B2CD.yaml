personas:
  professional: Jeremy Dufrechou, an aspiring young visual storyteller, blends meticulous comic‑strip creations inspired by mythic narratives with beginner‑level Scratch programming, channeling an impressive
    drive for organization and achievement into school art projects and science‑fair entries.
  sports: Jeremy Dufrechou, an adventurous youngster who enjoys weekend hikes on the nearby desert hills, is a member of the school’s cross‑country team, follows the Phoenix Suns basketball club avidly,
    and incorporates short running drills to counterbalance sedentary creative work.
  arts: Jeremy Dufrechou, a prolific member of the school art club, spends evenings sketching comic panels featuring heroic beings from ancient myth, practices a wooden flute passed down from grandparents,
    and frequently references artists like Hayao Miyazaki and comic legend Jim Lee for inspiration.
  travel: Jeremy Dufrechou, a curious explorer, loves day trips to the nearby Canyon National Park and dreams of visiting the Natural History Museum in London, planning each outing with a hand‑drawn itinerary
    that lists must‑see exhibits and optional sketch‑stop spots.
  culinary: Jeremy Dufrechou, an eager junior cook, enjoys preparing easy dishes such as quesadillas with shredded cheese and local salsa, experimenting with toppings like avocado and corn, while also helping
    their family grill marinated chicken kebabs seasoned with cumin and oregano.
  core: Jeremy Dufrechou is an organized, imagination‑driven eleven‑year‑old who channels mythic storytelling into comics, meticulous coding projects, and desert explorations, all while juggling a strict
    allowance ledger, allergy management, and a habit of over‑planning every creative endeavor.
background:
  cultural: Jeremy is a member of the Diné (Navajo) Nation, raised in Tonalea, a small community on the Navajo reservation in northern Arizona. His family maintains ties to traditional practices such as
    storytelling, seasonal ceremonies, and language learning, while also engaging with contemporary education and technology. The high‑desert landscape, the principle of hózhó (balance and harmony), and
    a strong sense of community responsibility shape his worldview. He learns Navajo language and cultural values through family gatherings, school programs, and community events, often integrating these
    influences into his artwork and school projects.
attributes:
  skills: '[''hand‑drawing and sketching'', ''basic digital illustration (Procreate)'', ''creative writing and storytelling'', ''research and information synthesis'', ''time management and project planning'',
