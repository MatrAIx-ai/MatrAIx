  hobbies: '[''drawing comic strips'', ''reading fantasy and science literature'', ''exploring desert geology'', ''building LEGO models'', ''coding interactive stories in Scratch'', ''practicing Navajo
    flute'', ''participating in school art club'', ''creating storyboards'']'
  career_goals: Jeremy dreams of becoming a visual artist who weaves traditional Navajo motifs with modern digital media to tell compelling stories. He hopes to attend a specialized arts high school and
    later study graphic design or museum studies, eventually working as a multicultural illustrator or curator for a museum dedicated to Indigenous art. He also feels a strong pull toward environmental
    education, envisioning a role where he can protect the desert landscape of his homeland while sharing its cultural significance.
