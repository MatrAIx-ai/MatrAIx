personas:
  professional: A retired volunteer and community arts advocate, Bela Heath channels her deep art‑history knowledge and storytelling talent into mentoring senior‑center volunteers, organizing impromptu
    art workshops, and curating a collaborative scrapbook that chronicles Leesburg's artistic evolution.
  sports: A gentle‑sports enthusiast, Bela Heath enjoys low‑impact activities such as walking with the Leesburg Senior Walking Club, occasional laps in the community pool, and cheering for the Orlando Magic
    and Tampa Bay Buccaneers on game nights, while seldom missing the local senior softball game on Saturdays.
  arts: A lifelong art aficionado, Bela Heath paints watercolors inspired by Monet's lilies, creates mixed‑media collages echoing Frida Kahlo's symbolism, and volunteers backstage at the Leesburg Playhouse,
    where she designs simple set pieces and shares anecdotes about renaissance masters with fellow volunteers.
  travel: A spontaneous road‑trip explorer, Bela Heath embarks on short drives to historic towns like St. Augustine, Savannah, and Charleston, attends folk festivals such as the Florida Folk Festival and
    St. Augustine Art & Music Festival, and favors printed road maps and a well‑stocked cooler of iced tea over digital itineraries.
  culinary: A garden‑to‑table culinary enthusiast, Bela Heath delights in sautéing heirloom tomatoes for a fresh gazpacho, whipping up basil‑pesto pasta, and baking rosemary‑infused key‑lime pies, while
    her weekly tea gatherings feature mint tea with honey, homemade scones, and lively storytelling over the clink of porcelain cups.
  core: An ever‑curious, socially vibrant 93‑year‑old who blends art, gardening, and community gatherings into a lively, if occasionally disorganized, tapestry of life.
background:
  cultural: Bela Brooke Heath is a white American who grew up in the post‑World War II era, experiencing the cultural shifts of the 1960s and 1970s. Her family’s European roots—primarily English and Irish
    ancestry—combined with a Midwestern upbringing instilled values of hard work and community service. Relocating to Florida in her later years exposed her to Southern hospitality and a diverse mosaic
    of cultures within Lake County. Throughout her life, Bela has embraced the evolving American cultural landscape, celebrating both the classic traditions of her youth and the innovative, eclectic expressions
    of modern art and thought.
