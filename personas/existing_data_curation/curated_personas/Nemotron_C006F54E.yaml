  hobbies: '[''Mexican cuisine cooking club'', ''Folkloric dance classes'', ''Book club participation'', ''Genealogy research'', ''Community gardening'', ''Knitting and crocheting'', ''Volunteering at senior
    center'', ''Organizing Día de los Muertos celebrations'', ''Spanish‑English language exchange'', ''Historical documentary viewing'']'
  career_goals: Although retired from formal employment, Michelle aims to deepen her impact on the Racine community by taking on leadership roles within local cultural and senior organizations. She aspires
    to become a board member of the Mexican Heritage Association, organize a regional Día de los Muertos exhibition, and launch a scholarship fund for low‑income students pursuing humanities studies. Michelle
    also hopes to author a memoir that celebrates her family’s migration story and to be recognized with a community service award for her sustained contributions. Her competitive nature fuels her desire
    to leave a lasting legacy and inspire younger volunteers.
