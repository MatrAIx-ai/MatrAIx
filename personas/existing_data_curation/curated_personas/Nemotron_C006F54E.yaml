personas:
  professional: Michelle Barredo, a retired community organizer and bilingual grant writer, they leverage their methodical planning, competitive drive, and sociable nature to orchestrate cultural events,
    senior-center programs, and heritage exhibitions with meticulous budgets and timelines.
  sports: Michelle Barredo, an avid participant in the local senior walking club and a fan of the Milwaukee Brewers and Green Bay Packers, they incorporate low‑impact tai chi and folkloric dance classes
    into their weekly routine, preferring structured group activities over solitary workouts.
  arts: Michelle Barredo, a devoted lover of historic novels and traditional crafts, they regularly attend performances by mariachi ensembles, enjoy the music of Lila Downs and the paintings of Frida Kahlo,
    and find inspiration for their own papel picado and knitting projects from these artistic influences.
  travel: Michelle Barredo, an organized traveler who values both cultural immersion and comfort, they have planned group tours to Oaxaca’s historic plazas and the historic Mission San Juan in Wisconsin,
    while preferring to schedule trips months in advance to secure affordable accommodations and senior‑friendly itineraries.
  culinary: Michelle Barredo, a master of Mexican cuisine, they delight in preparing mole poblano with ancho chilies, chocolate, and spices, rolling tamales filled with pork and masa, and experimenting
    with fresh cilantro and epazote in soups, all while managing their cooking club’s budget and occasionally over‑seasoning in their competitive quest for the perfect flavor.
  core: Michelle Barredo, a structured yet sociable elder, they blend meticulous organization with a competitive spirit to champion community heritage, manage finances prudently, and nurture a vibrant cultural
    life despite occasional skepticism and a penchant for over‑cooking.
background:
  cultural: Michelle was raised in a Mexican‑American household that placed strong emphasis on family, faith, and community. Bilingual in Spanish and English, she blends traditional Mexican customs—such
    as celebrating Día de los Muertos, cooking mole and tamales, and attending Catholic mass—with the Midwestern values of practicality and hard work she adopted in Racine. Her cultural identity informs
    her volunteer work, as she often serves as a bridge between the Mexican community and the broader Racine population, promoting cultural exchange and preserving heritage. Michelle’s experiences as a
    first‑generation immigrant’s child have instilled in her a deep respect for her ancestors’ perseverance, shaping her commitment to mentorship, cultural preservation, and community empowerment.
attributes:
  skills: '[''Event planning and coordination'', ''Bilingual communication (Spanish-English)'', ''Budgeting and financial management'', ''Grant writing'', ''Adult education and mentorship'', ''Community
