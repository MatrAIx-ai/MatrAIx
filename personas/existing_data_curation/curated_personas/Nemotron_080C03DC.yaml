    control (Git) and CI/CD (Jenkins, GitHub Actions)'', ''Basic DevOps and Docker containerization'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Yoga and mindfulness meditation'', ''Hiking in the central mountain range (Cerro Gregorio)'', ''Volunteering for
    community beach clean-ups'', ''Reading science-fiction and tech literature'', ''Participating in hackathons and women-in-tech meetups'', ''Maintaining a food blog'']'
  career_goals: Norah aims to advance to a senior engineering leadership role where she can shape product strategy at the intersection of technology and business. Over the next five years she plans to become
    a lead software architect for a fintech startup that serves small Puerto Rican enterprises, leveraging her business acumen to create secure, user-friendly financial tools. She also aspires to earn a
    master's degree in Computer Science or an MBA to deepen her strategic perspective. In the longer term, Norah hopes to launch her own tech venture focused on digital education platforms for underserved
    youth in rural municipalities like Coamo, fostering community empowerment. Throughout her career she is committed to building inclusive, collaborative teams, championing mentorship for women in tech,
    and establishing work-life practices that mitigate stress.
