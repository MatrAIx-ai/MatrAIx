personas:
  professional: Norah Sanchez, a bilingual full‑stack engineering lead with a business degree, translates market demands into scalable cloud APIs while mentoring junior developers, and channels her sociable,
    detail‑oriented nature into collaborative sprint planning, though she often worries about meeting tight product deadlines.
  sports: Norah Sanchez stays active by trekking the Cerro Gregorio trails with the Coamo Hiking Club, joining weekend beach‑clean‑up runs organized by the Isla Verde Surfers, and passionately following
    the Cangrejeros de Santurce baseball team and the San Juan Knights basketball squad, using their games as social gatherings with friends.
  arts: Norah Sanchez expresses her creative side by curating salsa playlists featuring Marc Anthony, Carlos Vives, and modern reggaeton stars like Bad Bunny while also devouring sci‑fi novels by Liu Cixin
    and attending live theater productions of local playwrights, which she documents on her food blog’s cultural corner.
  travel: Norah Sanchez prefers weekend escapes to the historic streets of Old San Juan or the bioluminescent bays of Vieques, while dreaming of longer trips to the cobblestone alleyways of Barcelona and
    the cherry blossoms of Kyoto, planning each journey around limited vacation days and a modest travel fund.
  culinary: Norah Sanchez, an avid home chef, perfects arroz con gandules with a simmering sofrito of recao, ajo, and cilantro, rolls labor‑intensive pasteles using grated green plantains and pork, and
    delights friends with tembleque flavored with fresh coconut milk and a dash of cinnamon, often sharing step‑by‑step videos on her blog.
  core: Norah Sanchez blends a vibrant, talkative spirit with a knack for turning tech ideas into community‑focused solutions, all while juggling a lingering worry about work‑life balance and a love for
    salsa nights and yoga mornings.
background:
  cultural: Norah was born and raised in Coamo, a historic municipality in the heart of Puerto Rico. Her upbringing reflects the island’s blend of Spanish colonial heritage, African rhythms, and Taíno roots,
    which she experiences through family gatherings, music, and the vibrant festivals that mark the town’s calendar. Raised in a bilingual household, she grew up speaking both Spanish and English, allowing
    her to navigate both local culture and broader professional settings with ease. The close-knit community of Coamo, known for its agrarian traditions and the famed thermal springs, instilled in her a
    strong sense of familia and communal responsibility. These cultural values inform her cooperative nature and her desire to give back to the island, particularly by empowering local youth through technology
    education.
attributes:
  skills: '[''Full-stack web development (JavaScript, React, Node.js, Python/Django)'', ''API design and micro-services'', ''Cloud platforms (AWS, Azure)'', ''SQL and data visualization (Tableau, Power
