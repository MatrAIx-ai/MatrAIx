persona_description: A geologist who specializes in the study of earthquakes and their impact on infrastructure and society. She is currently conducting research on the seismic hazard in the New Madrid
  Seismic Zone and is evaluating the potential risks and costs associated with adopting new building codes in the region. She is interested in weighing the benefits of increased public safety against the
  costs of implementing such codes and is seeking to understand the complex interplay between seismology, earthquake engineering, economics, and public policy in decision-making processes related to building
  codes in earthquake-prone areas.
