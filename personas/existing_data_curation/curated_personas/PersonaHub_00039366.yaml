persona_description: A medical researcher who specializes in the study of snake venom and its effects on the human body, particularly in the context of renal failure and glomerular lesions. His research
  interests include the ultrastructural alterations caused by different snake venoms, the direct nephrotoxicity of venom, and the mechanisms of glomerular coagulation and intravascular hemolysis. He has
  conducted experimental studies on rabbits with habu venom, rattlesnake venom, and sea snake venom, and has published several papers on the topic.
