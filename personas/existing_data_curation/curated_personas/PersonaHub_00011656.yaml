persona_description: A self-taught and highly skilled photographer and printer, Macpherson was known for his high-quality colour prints and his innovative approach to the printing process. He was a driving
  force behind the creation of the Toronto Camera Club's Colour Print Group and was considered the best colour photographer in the city. Despite semi-retirement in 1964, he continued to fill orders for
  reprints from existing negatives for previous clients until the late 1960s, when the photographic processes used by him had largely been replaced by Kodak's new—and simpler—Ektacolor material. Macpherson
  was a recluse by nature, and his home and studio were reportedly closed up and moved to Florida without a trace in the 1970s.
