  career_goals: Although no longer employed, Kathy Ann intends to deepen her contribution to the Douglassville community. She aspires to join the board of the Berks County Historical Society, applying her
    organizational and research skills to preserve local heritage. She aims to lead a financial‑literacy workshop series for seniors at the community center, sharing her budgeting expertise. A personal
    ambition is to complete a written family memoir and comprehensive genealogy chart for her grandchildren, integrating her love of structure and documentation. Additionally, she plans to obtain a short
    certificate in digital archiving to help digitize historic records for the local library.
