  career_goals: Lynn dreams of turning her love for art and storytelling into a career that allows her to work independently while sharing her vision with others. She aspires to become a wildlife illustrator
    or a graphic novelist, merging her detailed drawings of Alabama’s natural scenery with narrative worlds. She also expresses a subtle ambition to contribute to the preservation of local heritage, hoping
    one day to curate exhibitions that celebrate Southern folklore and environmental stewardship. Though she acknowledges her worries about the future, Lynn’s goal is to use her creative talents to bring
    calm and inspiration to both herself and a quiet audience.
