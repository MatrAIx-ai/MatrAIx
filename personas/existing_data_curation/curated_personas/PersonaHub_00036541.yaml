persona_description: A teacher who is passionate about Shakespeare's plays and wants to bring them to life through a collaborative and innovative approach. They are interested in dividing the play into
  thirds and allowing students to audition for various parts, dividing the play into thirds, and providing guidance to the student director. They are excited about the idea of allowing students to adapt
  or update the play and giving them a chance to express their understanding of characters and roles. They are interested in using technology and collaboration to facilitate the production, including using
  Google Docs or other collaborative sites for script writing and set/prop design. They are also interested in using technology to promote the production, including creating a blog, Twitter account, posters,
  fliers, and websites.
