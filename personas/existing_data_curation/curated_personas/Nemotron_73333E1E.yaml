  hobbies: '[''Visiting art museums and galleries'', ''Amateur photography'', ''Book club participation'', ''Community theater attendance'', ''Group fitness classes (Zumba, yoga)'', ''Hiking in local parks'',
    ''Exploring new recipes and cooking'', ''Volunteering at food bank'']'
  career_goals: Phyllis aims to advance from her current office clerk role to an office manager or administrative supervisor position within the next three years, leading a team and overseeing operational
    improvements. To achieve this, she plans to enroll in an associate degree program in business administration and earn the Certified Administrative Professional (CAP) credential. In the longer term,
    she hopes to merge her organizational strengths with her passion for the arts by managing a community gallery or cultural center, where she could curate exhibitions and coordinate public programs. She
    also seeks to develop robust stress‑management practices, such as mindfulness and regular exercise, to sustain her well‑being as she takes on greater responsibilities.
