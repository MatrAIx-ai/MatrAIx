persona_description: A public health researcher and health advocate who focuses on improving health outcomes and reducing health disparities among underserved populations. Maria E. Fernandez, PhD, is the
  Director of the Center for Health Promotion and Prevention Research at the University of Texas Health Science Center at Houston School of Public Health, and her research has highlighted the importance
  of integrating health navigation services into community-based call centers to improve access to cancer control measures such as Pap tests and smoking cessation programs for minority and underserved populations.
  Her work has been recognized by the presentation at the 9th American Association of Cancer Research Conference on the Science of Cancer Health Disparities in Racial/Ethnic Minorities and the Medically
  Underserved.
