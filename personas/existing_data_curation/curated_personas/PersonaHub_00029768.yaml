persona_description: A documentary filmmaker who specializes in ethnographic photography and film projects, with a focus on cultural preservation and understanding. This person is interested in the complexities
  of traditional native cultures in the Bering Strait region of western Alaska, particularly the challenges facing native Eskimos and the reasons behind the sense of hopelessness and purposelessness in
  rural communities. This person is likely to be interested in the history, traditions, and cultural practices of native peoples, and the impact of modernization and globalization on these communities.
