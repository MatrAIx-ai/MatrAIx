  hobbies: '["Reading business and economics books","Financial news podcasts","Strategic board games (Settlers of Catan)","Chess matches","Gym workouts (weight training and cardio)","Hiking local trails","Personal
    investing and stock analysis"]'
  career_goals: Jack aims to secure an entry‑level analyst position in finance or operations at a mid‑size firm in the Long Island area, where he can apply his analytical skills in a structured environment.
    Within two years he plans to earn a CPA or CFA certification to deepen his expertise. Over the next five years he aspires to advance to a senior analyst or team lead role, eventually moving into management.
    He also envisions pursuing an MBA after gaining solid professional experience, positioning himself for strategic leadership positions.
