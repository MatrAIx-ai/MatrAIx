  hobbies: '[''Soccer'', ''Scratch coding'', ''Playing acoustic guitar'', ''Reading graphic novels'', ''Cooking Mexican dishes with family'', ''Participating in community festivals'', ''Helping neighbors
    with errands'', ''School science fair projects'']'
  career_goals: Humberto dreams of a future where he can blend his love for helping others with his interest in technology and community wellbeing. He hopes to become a bilingual community health advocate
    or a public‑service professional such as a firefighter, where he can protect and assist his neighbors. He is also fascinated by the idea of creating simple apps that translate local health resources
    for Spanish‑speaking residents. In the longer term, he envisions studying public health or engineering in college to design practical solutions that improve the quality of life in Seguin and surrounding
    neighborhoods.
