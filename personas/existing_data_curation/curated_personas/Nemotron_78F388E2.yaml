personas:
  professional: Humberto Gomez, an aspiring junior game developer, channels their curiosity and practicality into Scratch projects that blend simple coding puzzles with vibrant animated stories, they frequently
    showcase their creations to classmates and revel in the spontaneous brainstorming sessions that turn playtime into impromptu coding workshops.
  sports: Humberto Gomez, a dedicated member of the Seguin Youth Soccer League, thrives on competitive pick‑up games at the local park and avidly follows the LA Galaxy, balancing enthusiastic play with
    a casual approach to warm‑ups that occasionally results in a cramp, but never dampens their love for the sport; they keep a positive attitude regardless.
  arts: Humberto Gomez expresses their creative spark by strumming the guitar—often playing Ed Sheeran and traditional folk tunes at family gatherings—devouring graphic novels like Marvel’s Spider‑Man and
    the adventures of Scott Pilgrim, and crafting Scratch animations that echo the storytelling rhythms of their favorite comics and songs, they often experiment with sound effects to bring their code to
    life.
  travel: Humberto Gomez dreams of road‑tripping to the Grand Canyon and a family vacation at Disney World, prefers spontaneous day‑trip plans over rigid itineraries, and, within a modest family budget,
    saves bits of their allowance toward a travel fund while eagerly collecting postcards from each destination they visit.
  culinary: Humberto Gomez hones their cooking skills by preparing tacos with seasoned ground beef, fresh salsa made from tomatoes and cilantro, and tamales wrapped in corn husks, enjoying the hands‑on
    process, and they occasionally over‑spice the salsa as a playful experiment.
  core: Humberto Gomez blends boundless social energy with a love for tinkering, but their relaxed approach to organization often leaves school assignments scattered among a growing collection of Scratch
    games, soccer gear, and comic books, and they frequently scramble to locate them before deadlines.
background:
  cultural: Humberto grew up in a bilingual Mexican‑American household in Seguin, Texas. Spanish is spoken at home, preserving traditions such as Día de los Muertos, festive celebrations of Cinco de Mayo,
    and family gatherings centered around homemade Mexican cuisine. At school and in the broader community, he navigates Texan culture, attending local festivals, supporting high‑school football games,
    and engaging with a diverse neighborhood. His Catholic upbringing and close‑knit extended family reinforce values of respect, hospitality, and communal responsibility, shaping his compassionate and
    cooperative nature.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Interpersonal communication'', ''Conflict mediation'', ''Group activity coordination'', ''Basic coding in Scratch'', ''Problem‑solving (practical
