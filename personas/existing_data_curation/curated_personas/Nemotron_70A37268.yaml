  hobbies: '["Visiting art galleries and museums", "Photography", "Hiking in the Appalachian foothills", "Playing soccer in a local league", "Cooking Southern cuisine", "Collecting vintage vinyl records",
    "Reading science‑fiction novels", "Attending live music concerts", "Participating in improv theater workshops"]'
  career_goals: Thomas aims to become a senior partner at his firm, shaping its strategic direction toward technology and creative industries. He aspires to establish a boutique practice that bridges STEM
    innovation with artistic expression, offering specialized counsel to startups, artists, and cultural institutions. Long‑term, he envisions serving as a judge or public policy advisor on technology and
    cultural heritage issues, while also creating a regional legal clinic that provides pro bono services to underserved communities in Whitfield County.
