  career_goals: In the short term, Andy aims to obtain his GED and assemble a polished portfolio of illustrations, short animations, and live‑action sketches that showcase his eclectic style. He hopes to
    secure a part‑time apprenticeship at a local graphic‑design studio or a youth art program where he can learn professional workflows while still having flexibility for creative play. Long‑term, he envisions
    a career as a concept artist and multimedia storyteller for video‑game or animation studios, blending his love of abstract art, narrative improvisation, and interactive design. He also dreams of using
    his artistic skills to create a community‑focused art space or online platform that offers creative workshops and mental‑health support for teens in the Upper Midwest.
