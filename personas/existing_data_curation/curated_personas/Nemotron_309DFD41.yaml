  skills: '[''Carpentry'', ''Basic Electrical Work'', ''Home Repair'', ''Small-Scale Gardening'', ''Animal Husbandry'', ''Budgeting'', ''Record-Keeping'', ''Event Organization'', ''Volunteer Mentoring'']'
  hobbies: '[''Woodworking'', ''Vegetable Gardening'', ''Fishing'', ''Birdwatching'', ''Reading Historical Biographies'', ''Local History Research'', ''Church Choir'', ''Community Potlucks'', ''Photography'',
    ''Model Train Restoration'']'
  career_goals: Although retired, Patrick aims to stay active and purposeful. He wants to preserve his family's farm heritage by documenting its history and maintaining the garden as a teaching space for
    his grandchildren. He hopes to complete a memoir of his life in rural Minnesota, volunteer as a mentor for youth apprentices, and keep the house in good repair. He also wishes to take occasional trips
    to historic sites in the Upper Midwest and attend local senior-center workshops to keep his mind sharp.
