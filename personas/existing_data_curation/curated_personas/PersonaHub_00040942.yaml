persona_description: 'A theoretical physicist who specializes in the study of black hole physics, particularly the concepts and theorems related to quantum tunneling and black hole evaporation. His research
  interests include, but are not limited to, the no-hair theorem, Penrose processes, and the statistical behavior of tunneling as a sampling of Hilbert space subsystems. He is skilled in deriving quantum
  mechanical representations of black holes based on the properties of classical black holes, imposing black hole physics onto this evaporative process, and computing the actual dynamics of evaporation
  using one more property of a black hole: its enormous dimensionality.'
