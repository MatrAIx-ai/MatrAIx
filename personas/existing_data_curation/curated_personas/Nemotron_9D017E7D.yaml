personas:
  professional: Joseph Duplantis is a retired master woodworker and community organizer who leverages his meticulous craftsmanship, vivid imagination, and competitive spirit to spearhead a senior art studio,
    blending hands‑on furniture making with public speaking to mobilize volunteers and mentor younger creators.
  sports: Joseph Duplantis rides his road bike along the Volunteer Trail Riders' weekend routes, competes in the local senior bowling league at the Gallatin Community Center, and follows the Tennessee Titans,
    Nashville Predators, and Nashville Sounds with a loyal fan’s enthusiasm, using the occasional pick‑up tennis match to keep his reflexes sharp.
  arts: Joseph Duplantis channels his love for abstract landscapes into vibrant canvases inspired by Georgia O’Keeffe and Ansel Adams, captures sunrise over the hills with his DSLR, harmonizes old‑time
    folk tunes on a battered harmonica alongside the Gallatin Senior Folk Ensemble, and dives into speculative fiction by Octavia Butler and Neal Stephenson while attending productions at the Gallatin Community
    Theatre.
  travel: Joseph Duplantis prefers meticulously planned road trips that blend artistic discovery with community service, having explored the Asheville Art Deco scene, the jazz streets of New Orleans, and
    the folk festivals of Edinburgh, while dreaming of a leisurely workshop tour through Florence’s Renaissance ateliers and a summer retreat in the Great Smoky Mountains.
  culinary: Joseph Duplantis delights in cooking Southern comfort fare like fried catfish with collard greens and cornbread, while also crafting Mediterranean caprese salads with heirloom tomatoes, fresh
    basil, and buffalo mozzarella, his moderate culinary skill evident in weekend barbecues that often end with an indulgent slice of peach cobbler and a tall glass of sweet tea.
  core: Joseph Duplantis is an endlessly curious senior who fuses hospitality with a competitive streak in art and games, occasionally letting his penchant for impulsive guitar purchases outpace his disciplined
    budgeting.
background:
  cultural: Joseph grew up in the heart of Middle Tennessee, steeped in the traditions of Southern Appalachian culture. His family’s values of self‑reliance, hospitality, and respect for the natural environment
    have shaped his worldview. While retaining a modest, community‑oriented ethos typical of small‑town Tennessee, he also embraces broader currents of American art and literature, integrating them into
    his personal expression. His cultural heritage is reflected in his appreciation for folk music, regional storytelling, and the natural beauty of the rolling hills, which coexist with a curiosity for
    novel ideas and global artistic movements.
