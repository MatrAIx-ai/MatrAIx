  hobbies: '[''Watching soccer'', ''Cooking Honduran cuisine'', ''Gardening'', ''Reading practical manuals'', ''Carpentry projects'', ''Volunteer mentoring at church'']'
  career_goals: Javier aims to advance from his current managerial role to a senior operations director position within the next five years. He plans to earn a Certified Supply Chain Professional (CSCP)
    credential and complete a GED to solidify his academic foundation. He is also interested in mentoring newer employees, especially those from immigrant backgrounds, and eventually launching a small,
    family‑owned logistics consulting firm that could provide stable employment for members of his local Honduran community.
