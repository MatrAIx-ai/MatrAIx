  hobbies: '[''Gardening (vegetables and native herbs)'', ''Fishing on the Gulf of Mexico'', ''Boating'', ''Model train building'', ''Reading historical biographies'', ''Playing chess'', ''Volunteering
    as a technology helper at the library'']'
  career_goals: Although officially retired, Harold remains goal‑oriented. He aims to keep expanding his DIY skill set, particularly exploring solar‑panel installation and home‑automation integrations.
    He hopes to mentor younger neighbors through the local senior‑center workshops, teaching basic home‑repair and budgeting techniques. Over the next few years he plans to design and produce a limited
    line of custom wooden furniture to sell at community craft fairs, using his woodworking expertise. He also aspires to travel with his wife to visit historic sites and national parks across the United
    States, balancing his love of discovery with a realistic, well‑planned itinerary.
