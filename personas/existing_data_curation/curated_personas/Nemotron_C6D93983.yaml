personas:
  professional: Harold Dumo, a retired hands‑on handyman turned community tech mentor, blends decades of home‑repair expertise (electrical wiring, plumbing, woodworking) with a business‑savvy budgeting
    mindset, channeling their competitive edge into designing solar‑ready smart‑home prototypes for senior‑center workshops.
  sports: Harold Dumo spends early mornings casting lines off the Gulf, joins the local yacht club for weekend boating, plays weekly pickleball at the Seminole Community Center, and follows the Tampa Bay
    Rays and Buccaneers, channeling their competitive spirit into friendly rivalries on the court.
  arts: Harold Dumo immerses themselves in World War II literature, collects vintage model‑train ephemera, attends performances at the nearby community theater featuring local actors, and enjoys listening
    to Bob Dylan and classic folk ballads while crafting wooden furniture inspired by mid‑century American design.
  travel: Harold Dumo dreams of a meticulously planned road‑trip across historic America, with stops at Gettysburg, Monticello, and Yellowstone, while also revisiting beloved Florida gems like the Everglades,
    balancing a love of discovery with budget‑friendly off‑season travel.
  culinary: Harold Dumo cultivates tomatoes, hot peppers, and basil for fresh salsa, relishes grilling grouper with lemon‑herb butter, and perfects a key‑lime pie using locally sourced condensed milk, showcasing
    a solid home‑cooking skill set that blends Southern comfort with Mediterranean flair.
  core: Harold Dumo is a pragmatic, curious retiree who channels a competitive streak into community‑focused DIY projects, steady budgeting, and lifelong learning.
background:
  cultural: Harold is a white American who was raised in the Northeast but has lived in Central Florida for the past three decades. He identifies with the laid‑back, community‑focused culture of the Suncoast
    region, where outdoor recreation, retirees' social clubs, and a strong volunteer ethic are common. His family’s background includes Protestant Christian traditions, which have shaped his values of reliability,
    modesty, and respect for personal responsibility. He embraces the multicultural aspects of modern Florida, enjoying the region’s diverse cuisine and festivals while maintaining an appreciation for the
    historical heritage of his own Southern‑influenced upbringing.
attributes:
  skills: '[''Residential electrical wiring and troubleshooting'', ''Basic plumbing repairs'', ''Woodworking and furniture making'', ''Automotive maintenance and diagnostics'', ''Smart-home device setup
