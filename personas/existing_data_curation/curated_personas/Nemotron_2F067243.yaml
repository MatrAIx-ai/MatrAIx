  career_goals: Julio aims to obtain his CPA license within the next year and to progress to a senior audit manager role at a leading public accounting firm. Over the next five years, he plans to expand
    his expertise into forensic accounting and data-analytics-driven audit methodologies, positioning himself for a future transition to a controller or CFO role in a mid-size energy or manufacturing company
    in Houston. He also aspires to mentor junior accountants, lead cross-functional audit teams, and eventually launch a boutique accounting practice that serves the growing Latino business community while
    maintaining a balanced work-life schedule for his family.
