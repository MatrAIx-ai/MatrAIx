  hobbies: '[''Gardening (vegetable and flowering)'', ''Cooking Southern and seafood dishes'', ''Beach walks and shell collecting'', ''Birdwatching'', ''Knitting and crocheting'', ''DIY home improvement
    projects'', ''Reading mystery and historical fiction'', ''Volunteering at local food bank'', ''Attending community church events'', ''Puzzle solving (crosswords, Sudoku)'', ''Exploring new tech gadgets
    (Arduino, Raspberry Pi)'']'
  career_goals: Jan aims to transition from a clerk role to a supervisory position within the next three years, targeting a Warehouse Supervisor or Inventory Control Manager title. She plans to earn a Certified
    Supply Chain Professional (CSCP) credential and deepen her data‑analytics capabilities to lead process‑improvement projects that reduce manual errors and streamline shipping cycles. Ultimately, she
    envisions a senior logistics role that balances strategic planning with a predictable schedule, allowing her to maintain the routine she values while still employing her flexible problem‑solving instincts.
    She also hopes to mentor younger employees and possibly lead a community‑based training workshop on basic supply‑chain best practices.
