  hobbies: '["Neighborhood soccer league", "Community dance nights (regional Mexican music)", "Poker and strategic card games", "Garage tinkering and small mechanical projects", "River trail walking for
    stress relief", "Volunteering at cultural festivals (Cinco de Mayo, Día de los Muertos)"]'
  career_goals: Although he is not currently in the workforce, Francisco aims to channel his practical talents into meaningful community involvement and a modest entrepreneurial venture. His short‑term
    ambition is to obtain his GED, which he sees as a stepping stone toward a part‑time role as a workshop instructor at the local community center, teaching basic handyman skills and cooking classes. In
    the longer run, he hopes to launch a small weekend food stall selling his family’s signature tacos, providing a steady supplemental income while preserving his culinary heritage. He also aspires to
    become a mentor for at‑risk youth in Spokane, using his life experiences to foster resilience and practical independence. Achieving these goals would give him a sense of purpose, reduce his stress,
    and balance his competitive drive with a service‑oriented outlook.
