personas:
  professional: Francisco Correa, a 59‑year‑old aspiring community workshop instructor and weekend taco‑stand entrepreneur, channels his hands‑on handyman expertise, bilingual fluency, and competitive spirit
    into teaching practical repair skills and cooking classes while navigating spontaneous planning and a skeptical stance toward rigid curricula.
  sports: Francisco Correa, a 59‑year‑old active member of the Spokane River Soccer Club’s Sunday league, passionately cheers for the Seattle Seahawks and Mexican powerhouse Club América, and balances competitive
    matches with regular river‑trail walks to stay fit despite occasional knee discomfort.
  arts: Francisco Correa, a 59‑year‑old devotee of regional Mexican music, regularly dances to Los Tigres del Norte at community nights, restores vintage radios as a nostalgic art form, and finds inspiration
    in the bold murals of Diego Rivera for his culinary presentations.
  travel: Francisco Correa, a 59‑year‑old spontaneous traveler, favors affordable road trips to Seattle, Portland, and Yellowstone National Park while dreaming of a culturally rich pilgrimage to Oaxaca,
    balancing his wanderlust with modest savings and a competitive urge to collect unique souvenirs.
  culinary: Francisco Correa, a 59‑year‑old seasoned home chef, expertly prepares tacos al pastor with achiote‑marinated pork, pineapple, and locally sourced cilantro, hand‑rolls tamales and simmers mole
    with Oaxaca chocolate and regional chilies, and often experiments by incorporating fresh Pacific Northwest salmon into traditional recipes, though his competitive palate sometimes leads him to over‑season
    dishes.
  core: Francisco Correa, a 59‑year‑old competitive yet community‑focused tinkerer, channels curiosity into handyman workshops and fiery taco stalls while battling frequent worry, a habit of procrastinating
    paperwork, and an unyielding drive to out‑perform peers.
background:
  cultural: Francisco grew up in a Mexican‑American household that kept strong ties to the traditions of his parents' hometown in Jalisco. Bilingual in Spanish and English, he was raised with the values
    of family loyalty, respect for elders, and the communal spirit of Mexican neighborhoods. Religious customs such as attending mass and celebrating Día de los Muertos with altars and marigold flowers
    remain central to his identity. He carries forward culinary traditions—preparing mole, tamales, and homemade salsas—while also adapting to the Pacific Northwest’s seasonal ingredients. Though he now
    lives in Spokane, he maintains connections with a local Mexican community, participating in cultural events, supporting immigrant‑support groups, and teaching his grandchildren the Spanish language
    and cultural stories.
attributes:
  skills: '["Basic home repairs (plumbing, electrical, carpentry)", "Traditional Mexican cooking and recipe adaptation", "Bilingual communication (Spanish/English)", "Community event planning and coordination",
