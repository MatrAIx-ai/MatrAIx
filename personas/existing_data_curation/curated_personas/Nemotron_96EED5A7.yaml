  hobbies: '[''Reading classic literature'', ''Crossword puzzles'', ''Urban gardening'', ''Baking pies and biscuits'', ''Knitting scarves and blankets'', ''Listening to big‑band and jazz music'', ''Attending
    small tea circles'', ''Walking along the Inner Harbor'']'
  career_goals: Although retired, Molly’s primary ambition is to maintain her independence and health while deepening her contribution to her community. She aims to complete a memoir that captures her family’s
    stories, continue volunteering at the local senior center by mentoring new volunteers, and keep up her daily walking routine along the Inner Harbor. She also hopes to expand her gardening skills by
    experimenting with heirloom vegetables and to share her knitting creations with neighbors during small gatherings.
