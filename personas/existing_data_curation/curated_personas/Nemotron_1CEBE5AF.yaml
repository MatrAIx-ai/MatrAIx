  career_goals: In retirement, Seong Da aims to leave a lasting impact on the Cedar Grove community. He plans to formalize a mentorship network that pairs retired tradespeople with local youth interested
    in practical careers, guiding them through hands‑on projects and life‑skill workshops. He also hopes to travel to Fujian, China, to trace his family roots and record oral histories for preservation.
    Additionally, he aspires to publish a modest guide on sustainable gardening adapted to Wisconsin’s climate, combining his practical knowledge with his curiosity for new agricultural methods.
