personas:
  professional: Seong Ouyang, a retired farm operator and seasoned carpenter, channels decades of horticulture, carpentry, and bilingual communication into leading a community mentorship network that pairs
    retired tradespeople with local youth, blending meticulous organization with a flexible curiosity for both time‑tested techniques and new sustainable approaches.
  sports: Seong Ouyang enjoys early‑morning fishing trips on Lake Michigan with the Lake Michigan Anglers Association, supports the Green Bay Packers and Milwaukee Brewers in the winter, and maintains light
    fitness through weekly bird‑watching hikes alongside the Cedar Grove Audubon Society.
  arts: Seong Ouyang captures seasonal farm life through photography inspired by Ansel Adams, attends local theater productions starring veteran actor Jeff Daniels, and listens to classical guzheng performances
    and the folk tunes of Wisconsin’s folk band The Milk Carton Kids for creative rejuvenation.
  travel: Seong Ouyang plans a self‑guided cultural pilgrimage to Fujian, China to trace family roots while favoring meticulously planned road trips to Door County’s shoreline and spontaneous weekend visits
    to local state parks, balancing budget constraints with a desire for immersive experiences.
  culinary: Seong Ouyang delights in preparing homemade jiaozi, braised pork belly with star anise, and steamed white fish with ginger, pairing them with locally sourced Wisconsin cheddar and heirloom tomatoes,
    and they experiment with fermentation techniques to create their own pickled vegetables for seasonal meals.
  core: Seong Ouyang, a 67‑year‑old blend of steady hands, restless curiosity, and community spirit, often misplaces their favorite screwdriver but never forgets a neighbor’s birthday.
background:
  cultural: Seong Da Ouyang’s ancestry traces back to the Fujian province on China’s southeastern coast. He grew up in a bilingual household, speaking Mandarin with his parents while attending public school
    in the United States. Over the years, he blended the values of his Chinese heritage—respect for family, tradition, and community cohesion—with the Midwestern emphasis on humility, hard work, and neighborliness.
    He actively participates in Chinese cultural festivals in Wisconsin, shares traditional cuisine during holidays, and serves as an informal cultural liaison for newer Asian immigrants, helping them navigate
    everyday life while preserving his family’s customs.
