  hobbies: '[''Visiting art galleries and street murals'', ''Collecting and listening to vinyl records (hip‑hop, jazz)'', ''Playing basketball at community courts'', ''Photography of urban scenes and cars'',
    ''Attending local car shows'', ''DIY upcycling projects'', ''Hiking on beach trails'', ''Reading graphic novels'', ''Playing competitive video games'']'
  career_goals: Fawzy aims to move beyond entry‑level cleaning to become a supervisory manager of a fleet‑maintenance department, securing certifications in professional detailing and industrial safety.
    He plans to enroll in a GED program and take night courses in automotive technology, eventually launching his own mobile detailing business that blends his love for cars, art, and entrepreneurship.
    His competitive drive pushes him to outperform peers and build a reputable brand in South Florida's automotive scene.
