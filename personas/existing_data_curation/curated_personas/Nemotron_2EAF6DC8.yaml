personas:
  professional: An aspiring part-time office administrator and community outreach assistant, Susan Ricou leverages their meticulous budgeting, calendar management, and volunteer coordination experience
    to keep local library programs running like clockwork, while infusing Southern hospitality into every interaction.
  sports: An active low‑impact athlete, Susan Ricou enjoys early‑morning bird‑watching walks, belongs to a community walking club, and they cheerfully support the Carolina Panthers, the UNC Tar Heels, and
    the Raleigh FC when time permits, blending casual fandom with gentle exercise.
  arts: A devoted craft enthusiast and mystery lover, Susan Ricou knits intricate scarves inspired by Agatha Christie heroines, swaps crochet patterns at the Raleigh Little Theatre’s community arts evenings,
    and they relax to the smooth jazz of Norah Jones, weaving creativity into daily life.
  travel: A methodical planner with a modest travel budget, Susan Ricou favors weekend road trips to Asheville’s Blue Ridge Parkway, historic Charleston, and the Biltmore Estate, while they dream of a literary
    pilgrimage to Edinburgh’s Writers’ Festival, balancing nature, history, and family time.
  culinary: A modest home chef, Susan Ricou prepares simple dishes like lemon‑garlic roasted chicken, fresh garden tomato bisque, and blueberry muffins, seasoning with basil and thyme harvested from their
    own vegetable garden, and they occasionally treat themselves to a slice of pecan pie from a local bakery.
  core: Susan Ricou is a structured, community‑oriented multitasker who blends Southern modesty with a love for gardens, yarn, and meticulous budgeting, even if they sometimes over‑organize their day.
background:
  cultural: Susan grew up in the suburban regions of Wake County, North Carolina, where Southern hospitality, community cooperation, and a strong attachment to local traditions shaped her worldview. She
    was raised in a family that valued punctuality, modesty, and service to neighbors, often participating in church events and community volunteer projects. The cultural emphasis on close‑knit neighborhoods
    and self‑reliance has influenced her preference for small‑group gatherings, practical problem‑solving, and a deep respect for the rhythm of everyday life in the American South.
