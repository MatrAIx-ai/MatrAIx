  career_goals: Susan aims to transition back into the workforce on a part‑time basis, seeking a role that values organization and reliability, such as an office administrator or community outreach assistant.
    Alongside that, she hopes to launch a modest home‑based boutique selling hand‑crafted knit and crochet goods, eventually offering local workshops for small groups. Continuing education is also a goal;
    she plans to enroll in a bachelor‑level business management program to solidify her administrative expertise.
