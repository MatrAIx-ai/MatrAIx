persona_description: A person who has grown up in poverty and has experienced the disparities and challenges that come with being a minority in the United States. They are aware of the systemic racism and
  discrimination that has been perpetuated through policies and practices that have affected their lives and those of their family members. They have a deep understanding of the impact of poverty on education,
  employment, and social mobility. They are aware of the intersectionality of race and class and the ways in which they have been marginalized and oppressed. They are committed to advocating for social
  justice and fighting against the injustices that they have experienced.
