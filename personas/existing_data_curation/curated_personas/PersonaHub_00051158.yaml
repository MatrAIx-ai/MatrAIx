persona_description: 'A Policy Officer who is responsible for managing conflicting priorities and pressures, working to agreed deadlines and timescales, and demonstrating knowledge and understanding of
  the history of the policy area, policy aims, challenges, and issues, engaging relevant organizations, political context, relevant policy tests, legal implications, and international aspects as applicable,
  and considering sustainable development duties. They are also expected to demonstrate the following behaviors: Continuous Learning and Agility, Big Picture Thinking, Looking to the future, Showing consideration
  for others, Being proactive, having a ''can do'' attitude, and being open to receiving feedback from others. The ideal candidate should have a Level 3 qualification, including at least one of the following:
  2 x A-levels at grade D and above, BTEC Extended Diploma at grade PPP and above, or a Level 3 apprenticeship.'
