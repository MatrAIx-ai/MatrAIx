personas:
  professional: Carlos Mcintosh, a 5‑year‑old aspiring astronaut, channels his methodical love of structure into meticulously arranging his toy rockets, eagerly shares launch plans with friends, and reliably
    follows through on his imaginative missions.
  sports: Carlos Mcintosh, a lively member of the Little Tigers Soccer Club, dribbles energetically in fall matches, proudly wears the team jersey, and roots for the Cubs at baseball games, embodying enthusiasm
    for both participation and fandom.
  arts: Carlos Mcintosh, a budding Pixar enthusiast, spends afternoons drawing Buzz Lightyear, sings along to Pinkfong’s Baby Shark, and recites Dr. Seuss verses, letting his vivid imagination shape his
    creative play.
  travel: Carlos Mcintosh, an eager junior explorer, enjoys weekend trips to the city zoo where he sketches giraffes, dreams of visiting Disney World in Florida, and splashes in the sand at the local beach
    park during summer holidays.
  culinary: Carlos Mcintosh, a selective but adventurous eater, relishes creamy mac and cheese, assembles peanut‑butter‑banana sandwiches with care, and occasionally tries spicy chicken nuggets, showcasing
    a developing palate.
  core: Carlos Mcintosh is an organized, outgoing five‑year‑old who transforms routine into imaginative play, balances kindness with a love for structure, and occasionally lets curiosity lead to sticky‑fingered
    snack mishaps.
background:
  cultural: Carlos is raised in a bilingual Puerto Rican household in Jacksonville, Florida. His parents preserve Caribbean traditions, celebrating Three Kings Day, preparing dishes like arroz con gandules
    and pasteles, and playing plena, bomba, and salsa music at family gatherings. Spanish is spoken at home, while he learns English at preschool, giving him a natural fluency in both languages. The family
    values close-knit relationships, community involvement, and respect, which are reflected in his courteous and cooperative demeanor.
attributes:
  skills: '[''Following daily routines'', ''Organizing toys and crayons'', ''Counting to 20'', ''Letter recognition (A‑Z)'', ''Basic bilingual vocabulary (Spanish & English)'', ''Puzzle solving'', ''Building
    block construction'', ''Simple chore completion (e.g., snack plate setting)'', ''Cooperative play'']'
  hobbies: '[''Soccer'', ''Tag'', ''LEGO building'', ''Drawing'', ''Listening to salsa and reggaeton music'', ''Helping in the kitchen'', ''Bilingual storytime'']'
  career_goals: Carlos often talks about wanting to become a teacher or a firefighter when he grows up because both jobs involve clear rules, helping others, and working as a team. He also dreams of coaching
    a soccer team, imagining himself leading a group of friends on the field while keeping the game organized and fun.
