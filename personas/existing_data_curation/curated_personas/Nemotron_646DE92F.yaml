  hobbies: '[''Hiking'', ''Salsa Dancing'', ''Group Fitness Classes'', ''Softball League'', ''Community Volunteering'', ''Cooking Southern Cuisine'', ''Reading Contemporary Fiction'', ''DIY Home Décor Crafts'',
