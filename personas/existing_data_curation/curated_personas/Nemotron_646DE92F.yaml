  career_goals: Carol aims to advance from her current retail salesperson role to store manager within the next two years, then progress to a district manager position. She plans to complete a bachelor's
    degree in Business Administration while working, and to develop expertise in omnichannel retail and e‑commerce strategies. Long‑term, she dreams of opening her own boutique that emphasizes sustainable
    fashion and community engagement. She seeks leadership opportunities that allow her to mentor teammates, implement data‑driven sales initiatives, and be recognized as a top performer in the regional
    market.
