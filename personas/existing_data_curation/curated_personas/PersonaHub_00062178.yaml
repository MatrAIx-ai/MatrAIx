persona_description: An environmental biologist who is fascinated by the study of animal behavior and the evolution of species. They are particularly interested in the kea parrot, a bird that has been a
  subject of debate for over a century due to its contradictory nature. The biologists who wrote the comprehensive account of the kea's contradictory nature, Judy Diamond and Alan Bond, have gained a unique
  perspective on the kea's behavior and ecology, which they have combined with their fieldwork observations to provide a detailed analysis of the kea's story.
