  hobbies: '[''hiking local trails'', ''photography'', ''cooking South Asian cuisine'', ''listening to Bollywood and qawwali music'', ''meditation and yoga'', ''online chess'', ''community cultural events'',
    ''volunteering at food banks'', ''reading business and supply‑chain books'']'
  career_goals: Viswanathan aims to transition from a solo courier to a supervisory role in logistics, eventually becoming a fleet manager for a regional delivery company. He plans to earn a Certified Supply
    Chain Professional (CSCP) credential and perhaps enroll in a part‑time master’s program in supply‑chain management to deepen his strategic insight. In the longer term, he dreams of launching his own
    eco‑friendly parcel service that relies on electric bikes and serves local small businesses, allowing him to apply his business education, curiosity about sustainable tech, and desire for a steadier
    income that eases his stress. He also hopes to mentor younger drivers, sharing his cooperative attitude and practical knowledge.
