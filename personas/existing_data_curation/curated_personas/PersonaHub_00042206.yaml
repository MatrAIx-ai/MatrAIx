persona_description: A botanist who specializes in the study of rare and endangered plant species in the Eastern Arc Mountains of Tanzania and Kenya, particularly those that are endemic to the region. Their
  research interests include the distribution and distribution patterns of these plants, as well as the factors that contribute to their decline and the potential for future extinctions. They may also be
  interested in the role of local topography and climate in maintaining local ecosystem stability during periods of broader-scale climatic change.
