personas:
  professional: Odis Castano, a seasoned automotive body repair specialist with master-level welding and precision paint‑matching skills, leverages their methodical planning and vivid imagination to turn
    classic car restorations into moving works of art while mentoring apprentices and navigating insurance claims with charismatic clarity.
  sports: Odis Castano, a devoted member of the Rexburg Trails Hiking Club, spends weekend mornings scaling the Teton Range and casting for trout in its crystal streams, while cheering on the Idaho Vandals
    football team and the Seattle Seahawks, and squeezes in occasional pickup basketball at the local gym to keep the joints limber.
  arts: Odis Castano channels their love of drama and speculative fiction into starring roles in community theater productions of A Streetcar Named Desire and The Tempest, while devouring novels by Neal
    Stephenson and listening to the soundscapes of Brian Eno and the electric blues of Stevie Ray Vaughan, all of which fuel the abstract designs they splash onto car hoods.
  travel: Odis Castano prefers meticulously planned road trips that blend automotive pilgrimages—like a weekend spin through the Petersen Museum in Los Angeles and a revved‑up visit to the Nürburgring in
    Germany—with wilderness escapes to Yellowstone and the Teton Range, but budget constraints sometimes limit overseas voyages.
  culinary: Odis Castano, a competent home cook who favors grilled bison steak seasoned with smoked paprika, rosemary, and a dash of chipotle, often pairs it with a side of trout caught on the Snake River
    and a cold craft IPA, yet they occasionally indulge in sushi rolls at the downtown ramen bar, reflecting a palate that balances rugged frontier flavors with occasional cosmopolitan cravings.
  core: Odis Castano blends the precision of a master welder with the flair of an abstract painter, juggling community theater monologues and late‑night paint mixing sessions, all while habitually forgetting
    to schedule their own dentist appointments.
background:
  cultural: Odis grew up in a predominantly white, Latter‑Day Saints family in the Intermountain West, where a strong emphasis on family, self‑reliance, and community service shaped his worldview. The rural‑small‑town
    ethos of Idaho—valuing hard work, modesty, and a close‑knit social network—combined with exposure to BYU‑Idaho’s academic and cultural environment. This blend fostered his organized, dependable work
    ethic and his sociable, talkative demeanor. While rooted in the region’s outdoor traditions and conservative values, Odis also embraces artistic expression, allowing him to merge his cultural heritage
    with a personal drive for novelty and creativity.
attributes:
  skills: '["Collision repair", "Structural welding", "Custom paint graphics", "Workflow optimization", "Customer service and insurance liaison", "Mentoring apprentices", "Automotive electrical troubleshooting",
    "3D design visualization", "Eco‑friendly coating application"]'
  hobbies: '["Custom automotive painting", "Classic car restoration projects", "Community theater acting", "Amateur photography (landscape & vehicle focus)", "Hiking and fly‑fishing in the Teton area",
    "DIY woodworking and metal art", "Reading science fiction and fantasy", "Organizing local car shows and swap meets", "Teaching informal automotive workshops", "Socializing at community events and charity
    fundraisers"]'
  career_goals: Odis aims to transition from shop technician to owner‑operator of a boutique auto‑body studio that specializes in artistic restorations and custom finishes for classic and specialty vehicles.
    He plans to earn master ASE certification and become an I‑CAR instructor, eventually teaching advanced courses at the local community college. His ambition includes establishing a mentorship program
    for young craftsmen in Rexburg, fostering a culture of creativity, precision, and community service within the trade.
