persona_description: A local historian who specializes in the study of the history and archaeology of Preston, particularly the Lang survey and the discovery of Richard Kuerden's sketch plans. His research
  interests include the reconstruction of the landscape and urban core of Preston, the study of field names and their relationship to property deeds, and the impact of the Black Death on the town. He is
  knowledgeable about the development of the townscape and the Forest of Fulwood, and is skilled in the use of historical and archaeological data to reconstruct the past.
