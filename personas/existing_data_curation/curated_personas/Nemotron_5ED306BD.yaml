  hobbies: '[''Sketching downtown scenes'', ''Mural projects'', ''Acoustic guitar'', ''Open-mic performances'', ''Philosophy reading'', ''Hiking in the Great Smoky Mountains'', ''Volunteering at animal
    shelter'', ''Food bank volunteering'', ''Mindfulness meditation'', ''Journaling'', ''Improvisational theater'', ''Collecting vintage postcards'', ''Southern cooking'']'
  career_goals: Leonard aims to formalize his passion for community-centered art and social support by earning a GED and then pursuing an associate degree in arts administration or social work at a local
    community college. His long-term ambition is to become a community art program coordinator for a Knoxville non-profit, designing inclusive workshops that blend visual arts with peer mentorship for at-risk
    youth. He also hopes to develop a freelance practice as an art facilitator and peer counselor, offering flexible, project-based services that align with his spontaneous work style. Ultimately, Leonard
    wants to create spaces where creative expression and compassionate dialogue intersect, fostering harmony and personal growth within his community.
