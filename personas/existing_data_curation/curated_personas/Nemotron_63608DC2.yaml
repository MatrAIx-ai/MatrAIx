  career_goals: Jessica’s primary ambition is to stay intellectually active and give back to her community. She aims to mentor emerging entrepreneurs through local business incubators, volunteer on nonprofit
    boards focused on economic development, and offer workshops on practical business skills. She also hopes to compile a memoir reflecting her career lessons, travel to several national parks in the eastern
    United States, and maintain a healthy lifestyle that supports her active involvement in community events.
