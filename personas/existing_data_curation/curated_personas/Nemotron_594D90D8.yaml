  career_goals: Helen aspires to enroll in a high school that offers an advanced visual arts program, where she can further develop her illustration and design skills. She aims to build a strong portfolio
    that will earn her admission to a reputable Bachelor of Fine Arts program, with a focus on concept art or graphic design. Over the long term, she envisions a career as a professional visual storyteller—creating
    artwork for video games, animated films, or editorial publications. Parallel to her artistic ambitions, Helen is interested in museum curation, hoping to combine her research abilities and love for
    art history by eventually working as a curator or exhibition coordinator, bringing curated experiences to diverse audiences. She is motivated to earn scholarships that recognize both her artistic talent
    and academic diligence.
