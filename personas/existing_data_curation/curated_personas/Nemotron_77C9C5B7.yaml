personas:
  professional: Migdalia Villar, a seasoned HVAC/R mechanic who thrives on on‑the‑fly troubleshooting, blends their curiosity for cutting‑edge energy‑efficiency tech with a spontaneous, flexible work style,
    delivering rapid client solutions while often sidestepping the paperwork they find stifling.
  sports: Migdalia Villar, an avid walker who logs daily miles along the Bronx River Greenway and joins the Bronx River Runners club for weekend jogs, roots for the New York Yankees and supports the local
    pick‑up basketball games at Van Cortlandt Park, using fitness as a grounding ritual to temper anxiety.
  arts: Migdalia Villar, a fan of merengue and bachata rhythms, fills their evenings with playlists featuring artists like Romeo Santos, Elvis Crespo, and Juan Luis Guerra, while diving into sci‑fi worlds
    by authors such as Neal Stephenson and Margaret Atwood, and occasionally visits Bronx murals by local street artists for visual inspiration.
  travel: Migdalia Villar, a spontaneous traveler who prefers last‑minute weekend getaways, has explored the historic streets of Cartagena and the geothermal wonders of Iceland, and dreams of vacationing
    in Costa Rica's rainforests to see solar farms up close, balancing limited budget with a desire for eco‑focused adventures.
  culinary: Migdalia Villar, a competent home chef who lovingly prepares mangú with crisp plantains and hearty sancocho simmered with yucca, pork, and a fragrant blend of cilantro, oregano, and adobo, experiments
    with balcony‑grown herbs, but sometimes forgets to set timers, resulting in occasionally over‑cooked rice.
  core: Migdalia Villar, an energetic HVAC specialist with a DIY spirit, relentless curiosity, and a habit of juggling tools and anxiety alike, dreams of leading a sustainable service shop while dancing
    to bachata in their compact Bronx balcony garden.
background:
  cultural: Migdalia was raised in a Dominican household in the Bronx, the daughter of immigrants who emphasized hard work, family loyalty, and community involvement. She is fluent in both Spanish and English
    and participates in local Dominican cultural events such as Carnaval and the annual Merengue Festival. Her upbringing instilled a strong sense of resilience, a love for Dominican music and food, and
    a commitment to supporting her extended family and neighbors. She often volunteers in neighborhood initiatives that aid recent Dominican immigrants and low‑income families, reflecting her deep cultural
    ties and compassionate nature.
attributes:
  skills: '[''HVAC/R system installation and repair'', ''Refrigeration troubleshooting'', ''Energy‑efficiency retrofits'', ''Blueprint and schematic interpretation'', ''Bilingual communication (English/Spanish)'',
    ''Customer service and conflict resolution'', ''EPA certification compliance'']'
  hobbies: '[''DIY home‑repair projects'', ''Cooking Dominican cuisine'', ''Listening to merengue and bachata'', ''Balcony gardening'', ''Walking the Bronx River Greenway'', ''Reading science‑fiction'',
    ''Following green‑tech podcasts'']'
  career_goals: Migdalia aims to obtain her EPA Universal Certification and a journeyman HVAC license, becoming a lead technician within her company. She envisions eventually opening a small, community‑focused
    HVAC service that offers flexible scheduling to accommodate clients with unpredictable hours, while also providing mentorship opportunities for other women and Latinx technicians. Long‑term, she hopes
    to specialize in sustainable HVAC solutions, such as solar‑assisted cooling, and be recognized as a go‑to expert for energy‑saving retrofits in the Bronx.
