personas:
  professional: Shaun Cox, a 70‑year‑old retired mechanical engineer, translates their three‑decade career designing industrial equipment into mentorship for high‑school STEM students, spearheads a community
    scholarship for engineering majors, and advises local non‑profits on renewable‑energy projects with clear, jargon‑free communication.
  sports: Shaun Cox stays active by participating in weekly lawn‑bowls with the St. Martin’s Senior Club, follows the Atlanta Braves on spring‑training television, and enjoys casual walks with the church
    fellowship group, though they occasionally skip the optional senior gymnastics class due to lingering knee soreness.
  arts: Shaun Cox finds renewal singing in their church jazz and gospel choir, where they honor legends like Ella Fitzgerald, Louis Armstrong, and Aretha Franklin, while also enjoying the soulful piano
    of Ray Charles during quiet evenings at home.
  travel: Shaun Cox prefers modestly planned road trips that blend pilgrimages to civil‑rights landmarks such as Selma’s Edmund Pettus Bridge, the Birmingham Civil Rights Institute, and historic Southern
    plantations, while they always allocate a weekday morning for a spontaneous hike in a nearby state park.
  culinary: Shaun Cox’s culinary persona centers on mastering Southern comfort dishes—slow‑cooked collard greens seasoned with smoked turkey, crispy fried catfish, buttery cornbread, and peach cobbler—while
    their garden supplies fresh okra and sweet potatoes that they incorporate into meals, even if they sometimes over‑salt the greens in moments of stress.
  core: Shaun Cox is a curious yet pragmatic 70‑year‑old retiree who merges engineering precision with soulful community engagement, balancing a love of music, gardening, and mentorship against bouts of
    anxiety that they meet with mindfulness and therapy.
background:
  cultural: Shaun grew up in the heart of Atlanta during the 1960s, surrounded by the vibrant African‑American community that shaped his values of resilience, family, and collective uplift. He was raised
    in a church‑centered household, with gospel music and Sunday services influencing his social life. The civil‑rights movement left an indelible mark on his worldview, fostering a deep commitment to education,
    mentorship, and community activism. Today, he blends Southern hospitality with a strong sense of cultural pride, often sharing stories of Atlanta's historic neighborhoods and participating in local
    events that celebrate Black heritage.
