persona_description: A health official in Sri Lanka who is passionate about HIV/AIDS prevention and is actively involved in developing strategies and initiatives to control the epidemic. They are committed
  to ensuring that the country achieves the 'Triple Zeros' by 2030, which includes zero discrimination, zero new infections, and zero AIDS-related deaths. They are aware of the importance of correct and
  consistent use of condoms as a means of preventing sexual transmission of HIV and have collaborated with the United Nations Population Fund (UNFPA) to develop a national condom strategy and HIV/AIDS guides
  for primary health care workers and those working in condom programming. They are also involved in media sensitization events and have spoken at these events, emphasizing the importance of getting checked
  and screened for HIV/AIDS and spreading the message of condom use to ensure that the country is not faced with an HIV/AIDS epidemic.
