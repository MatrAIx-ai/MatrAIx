persona_description: A professor of psychiatry and behavioral neuroscience at the University of Chicago, with expertise in the effects of alcohol on the brain and the mechanisms behind progression of hazardous
  drinking and loss of control over time. His research focuses on understanding the factors that contribute to binge drinking, particularly among young adults, and how these factors differ between heavy
  drinkers and light drinkers. King's studies have implications for the development of effective interventions and treatments for alcohol abuse and dependence.
