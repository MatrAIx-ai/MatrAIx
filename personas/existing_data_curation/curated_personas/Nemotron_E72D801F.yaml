  career_goals: Shamica dreams of becoming a multidisciplinary creator who can blend art, technology, and community service. In the near future she aims to join her school’s art club, win a local youth
    coding competition, and volunteer at the Absecon public library’s storytime sessions. Long‑term, she imagines a career as a museum curator or interactive exhibit designer where she can inspire curiosity
    in others, or as an environmental educator who uses creative media to promote sustainability.
