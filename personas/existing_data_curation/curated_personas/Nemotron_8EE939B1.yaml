  career_goals: Mong aspires to pursue a career in engineering, ideally as a robotics or software engineer, where he can merge his curiosity for new technologies with practical problem‑solving. He aims
    to attend a top university with a strong STEM program, develop expertise in artificial intelligence, and eventually create tools or applications that help teenagers manage stress and anxiety. His long‑term
    ambition includes leading a small, focused development team that values precision, high standards, and empathetic design.
