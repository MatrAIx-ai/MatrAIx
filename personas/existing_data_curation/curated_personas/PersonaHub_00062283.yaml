persona_description: A podiatrist specializing in the diagnosis and treatment of neuromas, metatarsophalangeal joint pain, and other foot and ankle disorders. They are highly trained in the use of MRI and
  perineural infiltrations to rule out other interspace lesions or arthritis causing similar symptoms. They are also skilled in the use of orthotics, local anesthetic injection, and nerve ablation techniques
  to relieve symptoms. They have extensive experience in the management of metatarsophalangeal joint pain, including the diagnosis and treatment of misalignment of the joint surfaces, synovial impingement,
  and osteoarthritic synovitis. They are highly skilled in the use of orthotics and local injection therapy to relieve symptoms. They are also experienced in the management of metatarsophalangeal joint
  pain due to functional hallux limitus and direct trauma with stenosis of the flexor hallucis brevis.
