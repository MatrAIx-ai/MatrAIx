  hobbies: '["Bike rides through local neighborhoods","Urban photography","Recreational basketball","Hip‑hop and R&B music listening","DIY home‑improvement projects","Reading entrepreneurship and personal
    finance books","Strategy video games","Volunteering at community youth programs"]'
  career_goals: Cornelius aims to become a fully licensed Illinois real‑estate broker within the next two years and eventually launch his own boutique agency that specializes in first‑time homebuyers and
    affordable housing for underserved communities. He wants to be recognized as a trusted advisor in Hanover Park and the broader DuPage County area, achieve a minimum of $500,000 in annual sales volume
    within five years, and later pursue a business degree to expand his leadership capabilities. Community outreach—especially mentoring local youth about financial literacy and homeownership—is also central
    to his long‑term vision.
