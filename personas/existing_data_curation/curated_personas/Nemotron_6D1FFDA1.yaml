personas:
  professional: Cornelius Hayes leverages his hands‑on curiosity about neighborhood trends and polished negotiation skills to close real‑estate deals for first‑time buyers, while their spontaneous, people‑first
    style means they thrive on building trust but often wrestle with strict scheduling.
  sports: Cornelius Hayes burns calories on weekend rides with the Lincoln Park Bike Club, shoots hoops at the local park while cheering on the Chicago Bulls and Bears, and joins a seasonal pick‑up basketball
    league that keeps their fitness routine as flexible as their schedule.
  arts: Cornelius Hayes captures the soul of suburban streets through photography inspired by Vivian Maier, unwinds to Kendrick Lamar and H.E.R. on his playlists, and attends monthly art openings at the
    Chicago Cultural Center, where they often discuss the intersection of visual storytelling and community identity.
  travel: Cornelius Hayes favors spontaneous weekend road trips, having explored the breweries of Milwaukee, the music scene of Detroit, and the historic districts of New Orleans, while dreaming of a summer
    backpacking adventure through the Scottish Highlands once their real‑estate goals free up more time and funds.
  culinary: Cornelius Hayes, an intermediate home chef, whips up Chicago‑style deep‑dish pizza and spicy grilled chicken thighs with collard greens for family dinners, mixes in avocado toast for quick lunches,
    and relishes the aroma of slow‑cooked mac and cheese seasoned with smoked paprika.
  core: Cornelius Hayes blends street‑wise curiosity with community‑driven ambition, juggling spontaneous bike rides and meticulous market analyses while they can’t resist a catchy R&B hook and often forget
    to file receipts on time.
background:
  cultural: Cornelius identifies as African American, drawing on the rich cultural traditions of Chicago’s Black community. He grew up attending church services and community events that emphasized mutual
    support, resilience, and celebration of music and sports. The legacy of Black entrepreneurship in the city influences his drive to succeed in real estate and to create opportunities for other Black
    families. He is proud of his family's emphasis on hard work, education, and giving back, and he incorporates these values into both his professional conduct and community involvement.
attributes:
  skills: '["Negotiation","Client Relationship Management","Property Market Analysis","MLS Database Utilization","Social Media Marketing","Networking","Sales Presentation","Transaction Coordination","Mortgage
