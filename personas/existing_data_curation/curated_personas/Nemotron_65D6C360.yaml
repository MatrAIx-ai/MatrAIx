  hobbies: '[''Playing acoustic guitar'', ''Fishing at Lake Wateree'', ''Woodworking projects'', ''Friday night football watch parties'', ''Community barbecues'', ''Volunteering as youth mentor'', ''Attending
    local high school sports events'', ''Participating in outrigger canoe races'']'
  career_goals: As a 25‑year‑old electrician, Eugene aims to earn his Master Electrician license within the next three years, eventually qualifying to pull permits independently. He aspires to become a
    foreman leading a small crew, using his natural sociability to motivate teammates and maintain high morale. Long‑term, he envisions launching his own contracting company focused on residential and small‑scale
    commercial projects, with a particular interest in integrating solar‑photovoltaic installations to meet growing demand for renewable energy in the South Carolina market. He also plans to complete certifications
    in solar PV and programmable logic controllers to diversify his skill set. While he values the stability of a routine schedule, he seeks competitive recognition within local trade circles and hopes
    to be known as a reliable, trustworthy electrician who balances consistency with flexibility.
