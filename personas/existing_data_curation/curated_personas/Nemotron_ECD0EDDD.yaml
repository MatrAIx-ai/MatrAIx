personas:
  professional: Chao Min, a budding teen robotics programmer who builds and codes LEGO Mindstorms projects, channels their methodical planning and competitive streak into meticulous design and frequent
    participation in school science fairs, while their reserved nature keeps them focused on solo problem‑solving.
  sports: Chao Min trains three times a week at the City Youth Taekwondo Academy, competes in local sparring tournaments where their competitive edge shines, and follows the Chicago Cubs (MLB) and Liverpool
    FC (Premier League) for strategic inspiration, preferring disciplined drills over casual playground games.
  arts: Chao Min delights in folding intricate origami inspired by Akira Yoshizawa, tunes into Hans Zimmer’s film scores while building robotics, and watches classic sci‑fi series like 'Star Trek' and anime
    such as 'Steins;Gate' for creative spark, often sketching scenes during museum visits.
  travel: Chao Min has visited the local science museum and the Smithsonian National Air and Space Museum, dreams of a field trip to the Kennedy Space Center to see rockets up close, and hopes to one day
    explore the high‑tech exhibits of Tokyo’s Miraikan, all while budgeting trips meticulously to avoid surprise expenses.
  culinary: Chao Min enjoys simple, protein‑rich meals like teriyaki chicken rice bowls with soy sauce, steamed broccoli, and a side of edamame, can expertly assemble a basic sushi roll using sushi rice,
    nori, cucumber, and avocado, yet often skips vegetables when stress about schoolwork makes them reach for instant ramen.
  core: Chao Min is an organized, curiosity‑driven 11‑year‑old who balances a love for solitary scientific tinkering with a competitive edge, while worrying over details and occasionally overindulging in
    video games to unwind.
background:
  cultural: Chao comes from a Chinese immigrant family that settled in Chicago’s Chinatown area. Mandarin is spoken at home alongside English, and traditional customs—such as Lunar New Year celebrations,
    dragon dance performances, and family meals featuring dim sum—are integral to his upbringing. His parents emphasize education, perseverance, and respect for heritage, shaping his disciplined approach
    to schoolwork. While he embraces American pop culture and the diverse urban environment of Chicago, he also participates in community events at the local Chinese cultural center, maintaining a strong
    connection to his East Asian roots.
