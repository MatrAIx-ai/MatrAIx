persona_description: A historian who specializes in the study of the history of Vienna, particularly the period of the 19th century when the regulation of the Danube significantly impacted the city's landscape
  and infrastructure. His research interests include the development of the city's waterways, the impact of the regulation on the city's economy and culture, and the historical context of the Kaiserwasser
  arm of the Danube. He is particularly interested in the social and economic changes that occurred during this period and how they influenced the city's development.
