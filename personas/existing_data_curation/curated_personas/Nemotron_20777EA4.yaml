  career_goals: Approaching retirement, David aims to transition to a part‑time mentor role where he can share his wealth of customer‑service knowledge with younger colleagues. He plans to obtain a Certified
    Customer Service Professional (CCSP) credential to formalize his expertise and to contribute to improving service quality metrics at his company. Additionally, he hopes to volunteer as a trainer at
    the local senior center, helping retirees develop communication skills for community outreach, while maintaining enough flexibility to enjoy his personal interests.
