persona_description: A historian who specializes in the study of Chinese history, particularly the periods of the Tang and Ming dynasties, and the role of religion and philosophy in shaping Chinese society.
  Their research interests include the development of Confucianism, the impact of Buddhism on Chinese culture, and the interactions between religion and politics in China. They are also interested in the
  role of the civil service examinations in shaping the Chinese government and the influence of Confucianism on Chinese society.
