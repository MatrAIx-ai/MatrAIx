persona_description: A public health expert with a focus on tropical diseases, particularly yellow fever. This individual has extensive experience in managing and controlling yellow fever outbreaks, including
  the 1998-1999 epidemic in Brazil. They are knowledgeable in the epidemiology of yellow fever, including the transmission of the disease and the factors that contribute to its emergence and spread. The
  persona has also worked on developing and implementing vaccination campaigns to prevent yellow fever and has a deep understanding of the challenges associated with unvaccinated travelers visiting endemic
  areas. They are likely to be involved in research on the biology of the yellow fever virus and the development of new diagnostic tools for the disease.
