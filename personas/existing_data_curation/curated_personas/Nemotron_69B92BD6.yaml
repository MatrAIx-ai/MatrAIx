  hobbies: '["listening to R&B, soul, and hip hop music", "playing basketball at the community center", "cooking Southern dishes", "reading entrepreneurship and self‑improvement books", "volunteering for
    church choir and community service", "photography"]'
  career_goals: Ja aims to transition from a talented stylist to a salon owner, establishing a boutique hair studio in Jackson that blends cutting-edge techniques with reliable, methodical service. He plans
    to obtain advanced cosmetology certifications and eventually develop his own line of hair care products tailored to the needs of African‑American hair. Ja is also driven to give back to his community
    by creating mentorship programs for aspiring black hairstylists and offering workshops on entrepreneurship. His career ambitions are shaped by a desire for financial stability and reduced stress, allowing
    him to balance his practical nature with his curiosity for new industry innovations.
