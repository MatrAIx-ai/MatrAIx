personas:
  professional: Amanda Smith is a seasoned community organizer who leverages their practical horticultural expertise and knack for tech tutoring, and they skillfully coordinate intergenerational garden
    projects, senior‑center events, and library workshops, balancing reliability with flexible problem‑solving.
  sports: Amanda Smith enjoys low‑impact fitness, regularly walking the rural trails and taking senior dance classes, cheering for the University of Kentucky Wildcats basketball team, and they are an active
    member of the local walking club that meets every Saturday afternoon.
  arts: Amanda Smith is an avid reader in the community book club, a choir member who loves singing gospel hymns and the music of Dolly Parton, and they often knit while listening to the folk storytelling
    of James Taylor, frequently arranging craft displays at the county fair that showcase local artisans.
  travel: Amanda Smith dreams of road‑tripping with their husband to historic sites like Mammoth Cave, the Shiloh battlefield, and the bourbon distilleries of Lexington, and they plan each journey with
    senior‑friendly stops, budget‑conscious lodging, and a detailed photography itinerary to capture the scenery.
  culinary: Amanda Smith blends Southern comfort with health consciousness, preparing buttermilk biscuits with whole‑wheat flour, jalapeño‑infused cornbread, and peach cobbler made from garden‑grown peaches,
    while they experiment with substituting honey for refined sugar and adding fresh basil to tomato soup.
  core: Amanda Smith is a garden‑loving, choir‑singing community champion who balances bustling volunteerism with a sweet tooth for healthier Southern biscuits, all while keeping an eye on budgets, joint
    aches, and a love for gentle walks.
background:
  cultural: Amanda is a lifelong resident of Paris, Kentucky, and her cultural identity reflects the Southern Appalachian heritage of the region. Raised in a close-knit white family with Scots-Irish roots,
    she grew up with strong values of hospitality, self-reliance, and community service. Church attendance and participation in local traditions—such as the Nicholas County fair, bluegrass music gatherings,
    and communal potluck meals—have shaped her worldview. Family ties and intergenerational connections are central to her life, and she embraces the region's culinary traditions, folk crafts, and respect
    for the land. Her upbringing in a rural environment instilled a practical mindset balanced with an openness to new ideas, mirroring the blend of tradition and curiosity prevalent in her community.
