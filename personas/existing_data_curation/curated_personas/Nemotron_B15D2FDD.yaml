  hobbies: '[''Gardening'', ''Cooking and Baking'', ''Knitting and Crocheting'', ''Book Club'', ''Church Choir and Potluck Organization'', ''Bird Watching'', ''Senior Dance Classes'', ''Walking/Hiking'',
    ''Volunteering at County Fair'', ''Local History Research'']'
  career_goals: Amanda aims to deepen her involvement in the Nicholas County community by leading an intergenerational gardening program that pairs seniors with youth to share horticultural knowledge. She
    plans to serve on the board of the local senior center, advocating for more health-focused activities and technology workshops. Amanda hopes to compile a family cookbook that preserves beloved Southern
    recipes while incorporating healthier ingredient options, and to travel with her husband to visit historic sites in Kentucky and neighboring states. She also aspires to learn basic digital photography
    to document community events and her garden, and to continue her personal learning journey by taking a community-college class on local history.
