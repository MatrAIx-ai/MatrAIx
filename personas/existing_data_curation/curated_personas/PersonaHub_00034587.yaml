persona_description: A night sky enthusiast who is interested in measuring and comparing the brightness of the night sky at different sites. They want to document the evolution of light pollution in their
  area and monitor sky brightness through the night, night-to-night, and year-to-year. They are also interested in investigating how sky brightness correlates with the solar cycle and month-to-month sunspot
  activity. They want to make a correlation between the SQM reading and when the background reaches some ADC level, and they are willing to invest in the CCDS to calibrate the effect of sky brightness on
  qualitative measures such as the Bortle Scale. They are looking for a hand-held meter that is unprecedentedly sensitive, quantitatively documents the evolution of light pollution in their area, and provides
  local ground truth for future sky brightness prediction with the Clear Sky Clock. They are also interested in the precision readings at even the darkest sites, and the power-saving features designed in
  for maximum battery life.
