persona_description: A cognitive scientist who specializes in the study of human cognitive processes, particularly the role of implicit automatic mechanisms in social categorization and prejudice. They
  have conducted research on the brain's hard-wired tendency to categorize and stereotype, and have a deep understanding of how this mechanism affects human behavior. They are interested in exploring the
  potential for cognitive re-wiring and the possibility of changing social categorization patterns through education and awareness-raising.
