personas:
  professional: Hector Dalmau, a veteran municipal operations manager, leverages three decades of office expertise, bilingual fluency, and a flair for visual problem‑solving to redesign workflow charts
    in Canva while championing a digital heritage archive that balances meticulous record‑keeping with creative presentation.
  sports: Hector Dalmau, a devoted fan of the regional baseball team Leones de Ponce and the basketball squad Capitanes de Arecibo, participates in a senior walking club that meets at the municipal park
    every Saturday and occasionally joins salsa‑inspired Zumba classes to stay fit.
  arts: Hector Dalmau, an abstract painter who draws inspiration from the island’s vibrant hues, showcases his work alongside contemporary artists like Rafael Trelles, enjoys guitar sessions to the rhythms
    of Celia Cruz, and regularly volunteers to lead senior art workshops at community centers.
  travel: Hector Dalmau, who plans weekend road trips across the island to historic sites such as Old San Juan, El Yunque, and the Caguas Museum of Art, also dreams of a cultural pilgrimage to Mexico City’s
    Frida Kahlo Museum, balancing meticulous itineraries with spontaneous detours to local festivals.
  culinary: Hector Dalmau, a moderate home chef, cultivates recao and culantro in his garden to flavor traditional dishes like arroz con gandules and mofongo, experiments with herb‑infused ceviche, and
    enjoys occasional visits to a beloved seaside restaurant for fresh seafood paella.
  core: Hector Dalmau, an imaginative yet disciplined 61‑year‑old municipal veteran, channels his curiosity into art, mentorship, and a steady, low‑risk financial strategy, while battling occasional health
    complacency and a competitive edge that fuels his community projects.
background:
  cultural: Born and raised in Carolina, Puerto Rico, Hector embodies the island's vibrant blend of Spanish, African, and Taíno influences. He grew up immersed in the rhythms of plena and salsa, the flavors
    of arroz con gandules, and the communal spirit of neighborhood celebrations such as the Festival de la Calle San José. His bilingual upbringing and Catholic traditions have shaped his values of family,
    respect, and community service. Hector's deep appreciation for Puerto Rican art, folklore, and natural landscapes informs both his personal life and his professional drive to integrate cultural heritage
    into municipal initiatives.
