  career_goals: He aims to obtain a Hawaii life and health insurance license within the next year and pursue the Chartered Property Casualty Underwriter (CPCU) designation. In the short term, he seeks promotion
    to senior account executive, where he can lead a small team of agents and mentor new hires. Over the next five years, his ambition is to open a boutique agency that emphasizes transparent service, community
    outreach, and tailored risk‑management solutions for local small businesses. He also plans to develop expertise in risk‑management consulting, providing a stable and predictable career trajectory while
    maintaining a strong client focus.
