personas:
  professional: Armando Rivas is a veteran commercial driver turned sales strategist who leverages his Class A CDL expertise, bilingual negotiation skills, and meticulous route‑optimization know‑how to
    close deals and mentor drivers, while their natural curiosity about art fuels compelling storytelling in client presentations.
  sports: Armando Rivas anchors their fitness around Saturday soccer matches with the Scottsdale Community League team, avidly follows the Phoenix Suns and Arizona Diamondbacks, and complements the sport
    with rigorous hikes in the McDowell Sonoran Preserve to offset knee soreness caused by osteoarthritis.
  arts: Armando Rivas immerses themselves in the Scottsdale Museum of Contemporary Art scene, draws creative energy from Georgia O'Keeffe’s desert palettes and Diego Rivera’s mural narratives, and translates
    that inspiration into watercolor landscapes of the Sonoran desert displayed at local galleries.
  travel: Armando Rivas favors self‑guided road trips that blend cultural immersion and natural splendor, having driven the historic Route 66 to Santa Fe, trekked the red rocks of Moab, and planning a future
    pilgrimage to Oaxaca’s vibrant festival, all while meticulously planning routes to keep fuel costs low.
  culinary: Armando Rivas, an accomplished home cook, regularly prepares mole poblano with roasted chilies, chocolate, and spices, hand‑rolled tamales wrapped in corn husks, and experiments with fusion
    dishes like grilled fish tacos topped with mango salsa, showcasing their culinary creations at family gatherings.
  core: Armando Rivas merges disciplined logistics expertise with a restless artistic spirit, channeling their love of watercolor deserts, vintage Chevrolet restoration, and community soccer into a competitive
    edge that occasional late‑night chipotle cravings and a skeptical stance toward new collaborations expose.
background:
  cultural: Armando was born to Mexican immigrants in Arizona and grew up in a bilingual household, speaking Spanish at home and English at school. He maintains strong ties to his Mexican heritage through
    family traditions such as Día de los Muertos, Semana Santa, and weekly gatherings featuring Mexican music, dance, and cuisine. He participates in local Mexican-American organizations and frequently
    travels to Mexico to visit relatives, bringing home stories and cultural practices that he shares with his community in Scottsdale. His cultural identity shapes his values of family loyalty, respect
    for elders, and a commitment to giving back, which he expresses through volunteering at cultural festivals and mentoring young Hispanics entering the transportation industry.
