    and culinary experiences"]'
  career_goals: Armando's primary career goal is to advance into a supervisory or regional management position within his trucking and sales company, where he can oversee a fleet of drivers while integrating
    sales initiatives. He plans to earn advanced logistics certifications such as the Certified Transportation Professional credential and enroll in a part-time MBA program focused on supply-chain management.
    Over the next five years he aims to launch a niche transportation service that specializes in the safe movement of artwork and cultural artifacts for galleries and private collectors, leveraging his
    art appreciation and industry contacts. He also seeks to mentor younger drivers from the local Hispanic community and serve as a cultural liaison for company outreach programs.
