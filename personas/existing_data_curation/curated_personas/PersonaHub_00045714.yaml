persona_description: A medical epidemiologist with the Centers for Disease Control in Atlanta who specializes in the investigation and control of foodborne illnesses, particularly those related to antibiotic-laced
  meat. They have extensive experience in analyzing data and identifying the source of outbreaks, and have a deep understanding of the potential health risks associated with antibiotic-resistant bacteria.
  They are well-versed in the use of antibiotics and their impact on the development of antibiotic-resistant bacteria, and are concerned about the potential consequences of continued use of antibiotics
  in livestock. They are also aware of the complex and multifaceted nature of the problem, and are committed to finding solutions to address it.
