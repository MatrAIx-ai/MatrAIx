personas:
  professional: Sunnie Brown, a seasoned community volunteer coordinator, blends practical curiosity with reliable organization to lead horticulture workshops, quilting classes, and church events, and they
    assertively mentor younger women while flexibly handling last‑minute changes.
  sports: Sunnie Brown enjoys low‑impact fitness through weekly senior walking circles at the town park and seasonal bird‑watching hikes, cheerfully rooting for the nearby Willow Creek Panthers football
    team and the local Willow Creek Lady Hawks softball squad, and they avoid high‑intensity workouts due to their knee arthritis.
  arts: Sunnie Brown draws artistic joy from the colorful quilts of Faith Ringgold, the soulful melodies of Gillian Welch, and the golden‑era films of Doris Day, often playing these tracks during senior
    craft circles and quoting O’Keeffe’s vibrant brushstrokes while they guide fellow quilters.
  travel: Sunnie Brown prefers relaxed, purpose‑driven trips, often driving the scenic Blue Ridge Parkway to explore the historic gardens of Asheville’s Biltmore Estate and the coastal charm of Savannah,
    while they dream of a modest pilgrimage to the English countryside’s Cotswolds to study heirloom seed varieties and visit historic manor houses.
  culinary: Sunnie Brown delights in reimagining classic Southern fare, turning their heirloom tomato harvest into a spiced gazpacho, whisking buttermilk biscuits with a dash of lavender, and coaxing smoky
    collard greens with smoked paprika and fresh rosemary, while they proudly preserve their grandmother’s peach cobbler recipe for family gatherings.
  core: Sunnie Brown is a curious, hands‑on gardener‑chef‑quilter whose blend of meticulous organization and flexible creativity fuels a lifelong mission to preserve community traditions, even if it means
    hoarding extra seed packets and occasionally forgetting to water the indoor succulents, and they often smile at the thought of their next craft circle.
background:
  cultural: Sunnie was born and raised in the Deep South, specifically in the small towns surrounding Decatur, Alabama. Her upbringing was shaped by white, rural Southern culture that values hospitality,
    self‑reliance, and close ties to family and church. Growing up during the civil‑rights era, she witnessed social change that fostered a practical outlook tempered by a quiet curiosity about the wider
    world. The region’s culinary traditions, gospel music, and seasonal community fairs left an imprint on her daily life and inform her love for cooking and communal celebrations. Although she has never
    married, she built a network of friendships through church, the local senior center, and neighborhood gatherings, reinforcing the communal ethos typical of the area. Her cultural identity blends respect
    for longstanding Southern customs with an openness to new ideas—reflected in her willingness to incorporate contemporary cooking techniques, modern gardening practices, and digital tools into her traditionally
    rooted lifestyle.
attributes:
  skills: '["Southern cooking and recipe development", "Vegetable and flower gardening", "Quilt design and hand‑sewing", "Basic home maintenance and DIY repairs", "Volunteer event planning and coordination",
