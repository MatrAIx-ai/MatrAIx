  hobbies: '["Gardening (particularly heirloom tomatoes and native wildflowers)", "Reading historical fiction and regional history books", "Southern cooking and recipe experimentation", "Quilt‑making and
    textile arts", "Birdwatching at local parks", "Attending church socials and community gatherings", "Volunteering at the local library''s reading program", "Walking and exploring the Morgan County countryside"]'
  career_goals: In the coming years, Sunnie aims to deepen her community impact while also satisfying personal growth. She plans to earn a certificate in horticulture through a local extension program,
    enhancing her gardening expertise and offering workshops on sustainable gardening practices. She also wishes to mentor younger women in the community, sharing her cooking and quilting skills through
    intergenerational classes. A long‑standing ambition is to compile her recipes, garden notes, and life stories into a memoir that preserves local Southern traditions for future generations. Additionally,
    she wants to become more proficient with digital technology, learning to create simple instructional videos to share on social media, and perhaps volunteer as a digital liaison for her church’s senior
    members. Though she is not seeking paid employment, these goals reflect her desire to remain active, useful, and continuously learning.
