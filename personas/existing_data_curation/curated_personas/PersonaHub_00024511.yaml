persona_description: A geologist who specializes in the study of coal deposits and their exploitation, particularly in the New South Wales and Victoria regions. The geologist is interested in the stratigraphical
  and palaeontological evidence, as well as the geological and environmental factors that affect the coal deposits. They are also interested in the economic and social aspects of coal mining, including
  the cost of production, the price ruling for coal, and the impact of labour troubles on the industry. The geologist is likely to have a strong background in geology, paleontology, and economics, and a
  deep understanding of the coal industry's history and current state.
