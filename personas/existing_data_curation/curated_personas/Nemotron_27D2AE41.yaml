  hobbies: '[''Hiking the Yakima River Trail'', ''Birdwatching'', ''Home brewing craft beer'', ''Woodworking'', ''Reading science fiction and popular science'', ''DIY electronics and Raspberry Pi projects'',
    ''Gardening'', ''Chess'']'
  career_goals: Samuel aims to move into a regional sales leadership role within the next three years, overseeing a team of representatives and driving growth in the Northwest market. He seeks to deepen
    his expertise in sustainable manufacturing solutions, positioning his company as a go‑to partner for eco‑friendly equipment. He plans to develop a data‑analytics framework for sales forecasting and
    mentor junior colleagues. Long‑term, he envisions launching a boutique consultancy that helps midsize manufacturers adopt lean and green practices, leveraging his technical background and sales experience.
