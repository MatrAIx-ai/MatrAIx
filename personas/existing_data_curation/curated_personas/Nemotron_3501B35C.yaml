personas:
  professional: Laura Fite is an aspiring digital illustrator who blends traditional watercolor techniques with coding experiments on their tablet, channeling their curiosity and methodical planning into
    meticulously crafted fantasy scenes while maintaining a quiet, solitary workspace.
  sports: Laura Fite enjoys low-impact fitness like weekend hikes with the Green Trails Youth Club and occasional swimming at the community pool, follows the Seattle Seahawks for football and the Los Angeles
    Lakers for basketball on television, and prefers solitary exercise routines that align with their organized, methodical nature.
  arts: Laura Fite immerses themselves in creative expression, drawing inspiration from Claude Monet’s landscapes and Hayao Miyazaki’s storytelling, while listening to ambient compositions by Brian Eno,
    and sharpening their digital art skills in Procreate, often journaling ideas for future short stories.
  travel: Laura Fite prefers tranquil getaways, having explored the misty trails of the Great Smoky Mountains and the historic streets of Edinburgh, and dreams of a solo adventure to Iceland’s aurora-lit
    Reykjavik and the serene temples of Kyoto, planning each trip with meticulous itineraries.
  culinary: Laura Fite favors simple, health-focused meals like avocado toast with radish sprouts, homemade veggie sushi rolls, and roasted chickpeas, enjoys experimenting with fresh herbs such as basil
    and mint, but often forgets to finish homework before snacking on sugary cereal late at night.
  core: Laura Fite is a quiet, curiosity-driven teen who channels their organized mind into solitary art and coding, worries about every detail, and finds peace in nature’s quiet corners while occasionally
    succumbing to late-night snack cravings.
background:
  cultural: Laura grew up in Avoca, a small rural community in St. Clair County, Michigan. Her family reflects typical Midwestern values of self-reliance, community involvement, and appreciation for nature.
    She regularly participates in local library events, attends a modest church youth group, and helps with family chores on a nearby farm. The Great Lakes environment and seasonal outdoor activities shape
    her connection to the natural world, while the close-knit community fosters a sense of belonging and responsibility toward others.
