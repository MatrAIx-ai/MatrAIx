  career_goals: Laura hopes to pursue a career that blends her love for art, quiet research environments, and structured work. She aims to study museum studies or art conservation in college, eventually
    becoming a museum curator or archivist who preserves and interprets artworks. She also dreams of developing educational programs for young visitors that encourage curiosity and thoughtful engagement
    with art and history.
