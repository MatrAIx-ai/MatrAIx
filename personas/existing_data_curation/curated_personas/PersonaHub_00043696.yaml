persona_description: A highly knowledgeable and experienced individual who is deeply concerned with the impact of climate change on various sectors, including food, water, and energy. They are also aware
  of the need for drought preparedness and appropriate drought management policies for virtually all nations, given the current concerns with climate change and projected increases in the frequency, intensity,
  and duration of droughts. They are interested in the proceedings of an expert meeting that was held in July 2011 in Washington, D.C., where the editors of the Compendium on National Drought Policy, co-edited
  by Donald A. Wilhite, highlighted components that are likely to be helpful in various circumstances.
