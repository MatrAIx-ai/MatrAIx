  hobbies: '[''LEGO building'', ''School drama club and karaoke'', ''Board games and puzzles'', ''Reading adventure books'', ''Drawing and sketching'', ''Nature walks and collecting specimens'']'
  career_goals: Eileen dreams of a future where she can combine her love for organization, creativity, and being in the spotlight. She often imagines herself as a teacher who designs structured lessons
    and engages classmates, or as an event planner who coordinates school performances and birthday parties. Her fascination with space and orderly systems also fuels an ambition to become an astronaut,
    where she can apply her methodical thinking in a highly structured environment.
