  hobbies: '[''Visiting Art Galleries and Museums'', ''Sketching and Drawing'', ''Photography'', ''Reading Historical and Contemporary Fiction'', ''Listening to Blues and Jazz'', ''Southern Cooking'', ''Volunteer
    Driving for Seniors'', ''Learning Basic Spanish'', ''Road Trips'', ''Attending Community Theater'']'
  career_goals: Jeehae aims to turn her reliable reputation and organized mindset into a small, independent rideshare operation that could eventually include a fleet of eco‑friendly vehicles. She plans
    to complete a GED program and take online automotive‑technology courses to qualify for a certified mechanic license, allowing her to expand services to vehicle‑care and driver‑training. A long‑term
    ambition is to create “Art‑Taxi” tours that combine her love of visual art with her driving profession, partnering with local galleries and the university’s art department. She also hopes to mentor
    new drivers, especially women, and eventually move into a managerial role overseeing dispatch and driver scheduling for the local taxi cooperative.
