personas:
  professional: Jeehae Rodriguez is a seasoned taxi driver in Tuscaloosa who combines a calm, empathetic demeanor, precise navigation, and tech‑savvy use of ride‑hailing apps to deliver consistently reliable
    service while methodically planning an eco‑friendly, art‑themed rideshare operation and future driver‑training program.
  sports: Jeehae Rodriguez follows the Alabama Crimson Tide football team with fervor, occasionally joins a local recreational softball league, attends Birmingham Barons minor‑league baseball games, and
    maintains a weekly yoga class at the Tuscaloosa Community Center to balance the sedentary nature of driving.
  arts: Jeehae Rodriguez immerses themselves in Tuscaloosa’s art scene, regularly sketches cityscapes at the Riverwalk, captures roadside vistas on a vintage Leica, attends gallery openings featuring Southern
    folk artist Jane Davenport, enjoys blues legends like B.B. King, jazz great Miles Davis, and classic Southern rock icons The Allman Brothers Band, and participates in the Tuscaloosa Community Theatre’s
    monthly productions.
  travel: Jeehae Rodriguez prefers weekend road trips that blend meticulous route planning with spontaneous detours, having driven the scenic Natchez Trace to explore Nashville’s music venues, the historic
    French Quarter in New Orleans for culinary inspiration, and the misty Blue Ridge Parkway for sunrise photography, all while balancing a modest budget and occasional family obligations.
  culinary: Jeehae Rodriguez delights in Southern‑style cooking, frequently experiments with shrimp and grits seasoned with smoked paprika, perfects a tangy barbecue rib rub using brown sugar and cayenne,
    enjoys baking peach cobbler with fresh peaches and a flaky crust, and keeps a well‑stocked pantry of okra, collard greens, and hot sauce, though they admit to overindulging in sweet desserts after long
    shifts.
  core: Jeehae Rodriguez blends meticulous organization, artistic curiosity, and a calm, resilient outlook into a life that steers both passengers and personal ambitions through the streets of Tuscaloosa
    and beyond.
background:
  cultural: Jeehae was raised in a white, working‑class Southern family in Alabama, steeped in the region’s traditions of hospitality, community churches, and a strong work ethic. Growing up near the University
    of Alabama, she was exposed to college‑town energy, Crimson Tide sports enthusiasm, and a diverse student population, which broadened her perspective. Local cultural staples—barbecue, soul food, blues,
    and country music—are part of her everyday life, as are the historic narratives of the civil‑rights movement that shape Tuscaloosa’s identity. Though she identifies as white, her daily interactions
    with a multicultural rider base and the Latino heritage reflected in her surname have fostered an appreciation for cultural diversity, especially evident in her interest in language learning and the
    arts.
attributes:
  skills: '[''Customer Service'', ''Navigation and Route Optimization'', ''Basic Vehicle Maintenance'', ''Defensive Driving'', ''Time Management'', ''Financial Bookkeeping'', ''Conflict De‑escalation'',
