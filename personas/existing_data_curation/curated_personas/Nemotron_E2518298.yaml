  career_goals: Alisia dreams of turning her vivid imagination into a career as a multidisciplinary artist, blending visual art, interactive media, and storytelling. She aims to earn a scholarship to study
    visual arts or game design at a university, win national youth art competitions, and launch a youth‑focused creative collective that showcases Cuban‑American voices. Ultimately, she aspires to become
    a concept artist or creative director for games or film, creating work that merges her cultural heritage with cutting‑edge visual narratives while building confidence in her academic and organizational
    skills.
