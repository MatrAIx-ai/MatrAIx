personas:
  professional: Alisia Hernandez blends rapid visual conceptualization with digital illustration skills to lead spontaneous mural projects and early‑stage game concept designs, but they often battle deadlines
    due to a love for improvisation and an aversion to rigid schedules.
  sports: Alisia Hernandez channels their energy into weekly dance rehearsals that fuse salsa and hip‑hop, occasionally joins a community soccer league, and they root for the Houston Rockets and Astros,
    using movement as both fitness and creative outlet.
  arts: Alisia Hernandez spends free hours sketching large‑scale murals, crafting digital illustrations in Procreate, writing poetry inspired by the rhythms of salsa and hip‑hop, and they idolize artists
    like Frida Kahlo, Banksy, and Yoji Shinkawa while curating flash‑mob performances at neighborhood festivals.
  travel: Alisia Hernandez prefers spontaneous weekend road trips to the Houston Arts District, day‑long visits to the vibrant Miami waterfront for its beachside music scene, and they dream of a cultural
    immersion tour of Caribbean islands, balancing school constraints with a limited teen budget.
  culinary: Alisia Hernandez loves cooking family‑favorite dishes like ropa vieja and sweet plantains, often adding Texas‑style barbecue rubs or jalapeño twists, and they whip up a bold espresso brew reminiscent
    of the morning coffee ritual at home, yet they frequently forget to set timers, leading to occasional burnt edges.
  core: Alisia Hernandez is an endlessly imaginative, socially vibrant teen who fuses island‑rooted flavors and rhythms with digital art, yet they wrestle with anxiety and a habit of procrastination.
background:
  cultural: Alisia is a first‑generation Cuban‑American raised in Pearland, Texas. Her parents emigrated from Havana and keep Cuban culture alive through daily Spanish conversation, family meals featuring
    ropa vieja, plantains, and Cuban coffee, and lively music like salsa and son. She participates in the local Latinx community, attending Cuban cultural events in the Houston area, such as salsa nights,
    Carnaval celebrations, and the annual Cuban Heritage Festival. The Texan environment adds a Southern friendliness and love for outdoor gatherings, blending with the rhythmic energy of Cuban traditions
    to shape her artistic sensibility and worldview.
