  career_goals: Guided by his preference for predictable routines and his desire to reduce workplace stress, Rafael aims to transition from a frontline sales role to a supervisory position where he can
    shape operational procedures. Over the next three years he plans to complete a retail management certification, pursue a GED to broaden his qualifications, and secure a store-manager role that offers
    a stable schedule and clear performance metrics. In the longer term, he envisions opening a modest convenience store that reflects his Mexican roots and allows him to implement the organized, customer-focused
    standards he values. He also hopes to mentor younger employees, sharing his disciplined work ethic and bilingual communication skills.
