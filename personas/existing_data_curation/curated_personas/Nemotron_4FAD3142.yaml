  career_goals: Christopher dreams of a future where he can combine his love for art, science, and solitary creation. He aspires to become an astronaut‑artist who paints the cosmos and shares his visions
    through children's books. He also imagines designing interactive sci‑fi video games or creating wildlife documentaries that explore the ocean depths. Ultimately, he wants a career that lets him explore
    novel ideas, work independently, and inspire other curious minds.
