personas:
  professional: Emma Lugo, a seasoned network and systems administrator, blends meticulous process documentation, ITIL rigor, and a curiosity for emerging cloud technologies, using their competitive drive
    to lead cross‑functional projects and mentor women in tech while steering organizations toward zero‑trust architectures.
  sports: Emma Lugo, a competitive midfielder in a local co‑ed soccer league, also a dedicated salsa and bachata dancer who trains thrice weekly at the downtown Latin Dance Studio, cheers for the Dallas
    Cowboys, supports Austin FC, and joins the Texas Hill Country Running Club’s spring 10k races.
  arts: Emma Lugo, an avid landscape photographer who captures the wildflower‑filled Texas Hill Country at sunrise, showcases prints at community art fairs, reads sci‑fi authors such as Octavia Butler and
    N.K. Jemisin, and finds rhythm in the music of Celia Cruz and Marc Anthony, blending visual and literary arts into their creative outlook.
  travel: Emma Lugo, who frequently escapes to the Texas Hill Country for hikes at Enchanted Rock and night‑sky camping, dreams of photographing cherry blossoms in Kyoto, and plans a month‑long road trip
    along the Pacific Coast Highway with friends, balancing travel budgeting with a passion for high‑resolution gear.
  culinary: Emma Lugo, an enthusiastic cook of traditional Mexican dishes such as mole poblano, pozole, and tacos al pastor, relishes using fresh chiles, ancho, masa, and cilantro, regularly pairs meals
    with craft cerveza, and hosts lively dinner parties where stories from their cultural‑center volunteer work fuel the conversation.
  core: Emma Lugo, a disciplined network admin with a competitive edge, merges tech leadership, community activism, and vibrant artistic pursuits while juggling soccer, dance, and daring photography.
background:
  cultural: Emma is a second‑generation Mexican‑American who grew up in a bilingual household in the Houston metropolitan area. Her family maintains strong ties to Mexican traditions—celebrating Día de
    los Muertos, cooking regional specialties, and participating in community festivals in Katy. Fluent in both Spanish and English, she frequently bridges cultural gaps at work and in community projects,
    advocating for inclusive tech initiatives that serve the growing Hispanic population in Harris County. Her cultural identity reinforces values of family, community, resilience, and a collaborative spirit.
attributes:
  skills: '[''Network design and architecture'', ''Cisco routing and switching'', ''Firewall configuration (Cisco ASA, Palo Alto)'', ''Server virtualization (VMware vSphere, Hyper‑V)'', ''Cloud infrastructure
    (Microsoft Azure, AWS)'', ''Scripting (PowerShell, Python)'', ''ITIL change management'', ''Disaster recovery planning'', ''Network security and compliance (HIPAA, PCI DSS)'', ''Project management (Agile,
    Scrum)'', ''Documentation and SOP creation'', ''Vendor relationship management'']'
  hobbies: '[''Soccer (co‑ed league)'', ''Salsa and bachata dance classes'', ''Cooking traditional Mexican cuisine'', ''Volunteering at Mexican cultural center'', ''Landscape photography'', ''Hiking in
    Texas Hill Country'', ''Hosting women in IT meet‑ups'', ''Reading science‑fiction novels'']'
  career_goals: Emma aims to transition into an IT Infrastructure Manager or Director role, where she can lead larger teams and drive strategic initiatives such as cloud‑first transformations, zero‑trust
    security models, and digital resilience. She plans to earn Cisco CCNP and Microsoft Azure Solutions Architect certifications to deepen her technical leadership. In the medium term, she wants to spearhead
    cross‑functional projects that improve service delivery and operational efficiency, while fostering a high‑performance culture that rewards accountability. Her long‑term ambition is to launch a bilingual
    consultancy that helps small businesses, especially within the Hispanic community, modernize their IT environments and adopt best‑in‑class security practices.
