personas:
  professional: Amina Alexander is a seasoned community organizer who leverages meticulous record‑keeping and modest budget‑management skills; they coordinate volunteer events, mentor high‑school students,
    and document oral histories with methodical planning, pragmatic realism, and a steady, cooperative yet assertive demeanor.
  sports: Amina Alexander stays active through daily walks in Hermann Park; they also participate in weekly pickleball games at the senior center, and they support the Houston Astros and Houston Rockets,
    preferring low‑impact exercise that aligns with their structured routine and accommodates their osteoarthritis.
  arts: Amina Alexander nurtures their artistic side; they sing gospel classics by Mahalia Jackson and Aretha Franklin in their church choir, craft quilts inspired by folk art, and regularly attend exhibitions
    at the Museum of Fine Arts, Houston, and the Contemporary Arts Museum.
  travel: Amina Alexander prefers carefully planned road trips that blend cultural immersion with relaxation; they have taken annual weekend getaways to New Orleans for its Creole cuisine and a family vacation
    to Savannah’s historic district, while dreaming of a leisurely cruise along the Gulf Coast and a scenic visit to the Blue Ridge Mountains.
  culinary: Amina Alexander, an adept home chef, delights in preparing Creole‑style gumbo and jambalaya seasoned with fresh thyme, basil, and okra from their backyard garden, and they love serving homemade
    peach cobbler and chilled sweet tea at their frequent potluck gatherings.
  core: Amina Alexander blends meticulous organization with a mother‑hen’s love for community; they juggle their garden’s daily rituals, a secret stash of vintage sewing patterns, and a stubborn reluctance
    to replace analog clocks with digital ones.
background:
  cultural: Amina Patrice Alexander is an African‑American woman who grew up in Houston’s historic Third Ward, a community known for its strong church ties, soulful music, and rich culinary traditions.
    Her family’s roots trace back to the Great Migration, and she has carried forward values of community solidarity, respect for elders, and celebration of African‑American heritage through food, music,
    storytelling, and dedicated service to local organizations.
