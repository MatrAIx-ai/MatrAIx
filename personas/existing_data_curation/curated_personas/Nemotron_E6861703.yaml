  hobbies: '[''Gardening (roses, herbs)'', ''Cooking Creole and Southern cuisine'', ''Reading African‑American literature'', ''Bridge club'', ''Gospel choir participation'', ''Museum visits'', ''Walking
    in local parks'', ''Quilting'', ''Volunteer neighborhood clean‑up'']'
  career_goals: Amina aims to deepen her volunteer impact by establishing a mentorship program for high‑school students in her neighborhood, documenting oral histories of older African‑American residents
    in Houston, and learning photography to capture community moments, all while preserving her health and independence.
