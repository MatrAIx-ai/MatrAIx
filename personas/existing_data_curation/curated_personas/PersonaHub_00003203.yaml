persona_description: A scientist and geologist who specializes in the study of sedimentary rocks, particularly the Nemaha Ridge, and who has made significant contributions to the Kansas Geological Survey.
  He is known for his work in identifying and pinpointing the Nemaha Ridge on a cross section and for his marshalling of evidence that the drillers had encountered granite and quartzite, even though they
  did not. He is also known for his work as a paleontologist, with a particular interest in the Woodson County peridotite intrusive dome. He is likely to have a deep understanding of the geology of Kansas
  and a passion for uncovering the mysteries of the state's natural history.
