personas:
  professional: Heather Felix, a 34‑year‑old middle‑school teacher, leverages meticulous lesson planning, differentiated instruction, and a charismatic, talkative style to foster inclusive classrooms while
    championing community‑centered projects that reflect their deep‑rooted Southern hospitality and leadership ambitions; they often draw on personal experiences to connect with students.
  sports: Heather Felix enjoys weekend hikes through the pine forests of George County, supports the local high‑school Rebels football team, chants along with the New Orleans Saints on Sundays, and participates
    in a community yoga class that doubles as a low‑impact fitness routine; they thrive on the sense of camaraderie and the physical release it provides after long days at school.
  arts: Heather Felix sings in their church choir, crafts classroom décor inspired by the works of author James H. Hernandez, devours historical fiction by Philippa Graham, and regularly listens to Jason Isbell
    and the soulful storytelling of Dolly Parton while knitting during lunch breaks; they find that these artistic pursuits fuel both their creativity in the classroom and their love of community storytelling.
  travel: Heather Felix favors meticulously planned road trips to nearby cultural gems like Natchez, Vicksburg, and the Gulf Coast’s Biloxi beaches, dreams of a weekend hike in Asheville’s Blue Ridge Mountains,
    and balances travel ambitions with a modest teacher salary and family obligations; they often map out itineraries in a notebook to ensure every detail aligns with their organized nature and desire for
    meaningful experiences.
  culinary: Heather Felix loves cooking classic Southern dishes such as shrimp and grits, collard greens, and peach cobbler, frequently experiments with native ingredients like pecans and persimmons, and
    hosts monthly potlucks where friends praise their generous seasoning despite occasional over‑salting; they view each meal as a chance to nurture community bonds and share a slice of their heritage.
  core: Heather Felix blends Southern hospitality with methodical organization, turning classroom leadership, community outreach, and a flair for storytelling into a vibrant life balanced by worry‑driven
    self‑care rituals; they remain ever‑curious yet grounded in practical action.
background:
  cultural: Heather was raised in a small, close‑knit white community in rural Mississippi, steeped in Southern traditions and Protestant values. Growing up in Lucedale, she experienced the hospitality,
    strong sense of family, and community involvement typical of the region—church gatherings, county fairs, and local volunteerism. Her upbringing emphasized respect for heritage, storytelling, and a reverence
    for nature, which she carries into her teaching and personal life. While honoring these roots, she actively seeks inclusive practices and cultural awareness to serve the increasingly diverse student
    population in George County.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Curriculum development'', ''Formative and summative assessment design'', ''Educational technology integration'', ''Parent‑teacher
