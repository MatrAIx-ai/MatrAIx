  hobbies: '[''Reading historical fiction'', ''Gardening'', ''DIY classroom crafts'', ''Book club participation'', ''Cooking Southern meals'', ''Choir singing'', ''Yoga'', ''Hiking local trails'', ''Volunteering
    at community events'', ''Podcast listening'']'
  career_goals: Heather aspires to become a curriculum specialist within her district, eventually move into an instructional leadership role such as assistant principal or principal, obtain a master's degree
    in educational leadership, lead professional development workshops that blend innovative teaching strategies with proven practices, create a school‑wide wellness program to help teachers and students
    manage stress, and become a community liaison who bridges the school with local businesses and organizations. She also hopes to author a children's book that reflects the values of curiosity, kindness,
    and Southern heritage.
