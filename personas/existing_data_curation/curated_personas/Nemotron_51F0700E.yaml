personas:
  professional: Devin Stephens is a veteran data governance specialist in the health‑care and pharmaceutical industries, channeling three decades of SAS, R, SQL, and advanced Excel expertise into robust
    data‑quality frameworks and mentorship programs, while their methodical, organized nature guarantees precise model validation and SOP compliance.
  sports: Devin Stephens enjoys early‑morning fishing along the Atlantic, participates in a senior bowling league, follows the Miami Heat and Miami Dolphins with fervor, and maintains a routine of walks
    and occasional tennis at the Broward County senior fitness club.
  arts: Devin Stephens nurtures creativity by assembling intricate model ships, listening to gospel legends like Mahalia Jackson and soul icons such as Stevie Wonder, attending Miami Symphony Orchestra
    concerts, and devouring biographies of civil‑rights leaders, weaving music, craftsmanship, and history into daily life.
  travel: Devin Stephens prefers meticulously planned getaways that blend relaxation with cultural discovery, having toured the historic charm of Savannah, the jazz heritage of New Orleans, and the tropical
    allure of the Bahamas and Cuba, while balancing a modest travel budget to support future mentorship initiatives.
  culinary: Devin Stephens delights in preparing health‑conscious soul food, such as grilled catfish with collard greens, black‑eyed pea salads, and mango‑infused quinoa bowls, skillfully integrating Caribbean
    ingredients like plantains and Scotch bonnet peppers into traditional Southern flavors.
  core: Devin Stephens melds methodical data expertise with a steadfast love for sunrise fishing and model‑ship building, occasionally postpones dental visits and splurges on specialty fishing tackle, embodying
    disciplined ambition tempered by gentle indulgences.
background:
  cultural: Devin identifies as a Black American whose formative years were shaped by Southern African‑American traditions and the vibrant multicultural environment of South Florida. He grew up in a close‑knit
    family that emphasized respect for elders, communal support, and the importance of faith, attending a Baptist church that fostered both spiritual growth and community activism. Cultural touchstones
    such as gospel music, storytelling, and the celebration of milestones like Juneteenth remain central to his identity. Living in Broward County, he also embraces the diverse influences of the locale,
    including Latin rhythms, Caribbean cuisine, and the inclusive spirit of the coastal community. These experiences inform his commitment to mentoring younger Black professionals and participating in cultural
    heritage events that honor his heritage while promoting cross‑cultural connections.
attributes:
  skills: '[''Statistical Analysis (SAS, SPSS, R)'', ''Advanced Excel (pivot tables, macros, VBA)'', ''SQL Querying'', ''Data Quality Assurance'', ''Process Documentation (SOPs)'', ''Project Management
    (Agile basics)'', ''Technical Writing'', ''Mentoring and Training'', ''Problem Solving'', ''Mathematical Modeling'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Model Ship Building'', ''Reading Historical Biographies'', ''Chess'', ''Church Community Service'', ''STEM Mentorship for Youth'', ''Cooking'']'
  career_goals: Devin aims to progress to a Data Governance Lead role where he can shape enterprise‑wide data integrity policies and drive strategic analytics initiatives. He plans to obtain a Project Management
    Professional (PMP) certification to formalize his project coordination capabilities. Over the next five years, he wants to mentor a cohort of junior analysts, particularly those from underrepresented
    backgrounds, and to eventually launch a boutique consultancy focused on data quality and compliance for midsize health organizations. Throughout his career trajectory, he seeks stability, clear milestones,
    and the opportunity to leave a lasting impact on organizational data culture.
