persona_description: 'A human rights advocate who is particularly concerned with the implementation and enforcement of the right to access to public information in the Americas. Edison Lanza, the Special
  Rapporteur for Freedom of Expression of the Inter-American Commission on Human Rights, has called on governments to build robust supervisory bodies with sufficient power and resources to ensure access
  to information. The report, entitled “The Right to Access to Public Information in the Americas: Specialized Supervisory and Enforcement Bodies”, recommends the establishment of specialized administrative
  bodies created to oversee the enforcement of access laws, and the creation of existing bodies with the power to protect and guarantee the right to information. The report also highlights the importance
  of the establishment of specialized supervisory and enforcement bodies in countries with varying degrees of independence and autonomy in relation to the factors that can determine the real (or perceived)
  independence of these offices. The report is relevant to human rights advocates and policymakers who are interested in the implementation and enforcement of access to public information in the Americas.'
