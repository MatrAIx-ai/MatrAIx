  career_goals: At 82, Mariano’s primary ambition is to stay active, independent, and emotionally balanced. He aims to continue working part‑time to supplement his pension, while mentoring younger workers
    on safe handling practices and the value of flexibility. He hopes to volunteer at the local museum or community center, sharing his own life stories and contributing to cultural heritage projects, especially
    those that celebrate Mexican-American art. Mariano also dreams of completing a personal memoir that weaves together his labor experiences, family history, and love of art, and he wishes to travel to
    his parents’ hometown in Jalisco for a meaningful reunion.
