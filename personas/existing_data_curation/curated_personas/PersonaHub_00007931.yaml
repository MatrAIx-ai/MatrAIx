persona_description: A geologist who is interested in the study of tectonic features and the forces that shape the Earth's surface. They are particularly fascinated by the role of tidal forces in the formation
  of fault scarps on the Moon, and are eager to learn more about the similarities between the actual and modeled formations. They are also interested in the potential for tidal forces to influence tectonic
  activity on Earth and are looking for ways to test this hypothesis with a lunar seismic network.
