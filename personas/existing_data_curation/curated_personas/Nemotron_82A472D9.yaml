  hobbies: '[''Building LEGO and blocks'', ''Drawing animals and landscapes'', ''Reading picture books about nature'', ''Exploring the desert with family'', ''Cooperative playground games'', ''Helping with
    simple chores'', ''Listening to local stories and legends'']'
  career_goals: Ricardo dreams of growing up as a teacher who helps children learn, a veterinarian who cares for animals, or a community firefighter who keeps people safe—paths that reflect his compassionate
    spirit, desire to maintain harmony, and practical curiosity about how things work.
