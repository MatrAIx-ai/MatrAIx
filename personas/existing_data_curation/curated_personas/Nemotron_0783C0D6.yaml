personas:
  professional: Manuel Lorenzo, a veteran restaurant operations manager with over twenty years of experience, leverages their methodical approach, bilingual communication, and expertise in inventory control,
    cost reduction, and staff development to consistently deliver seamless service while planning meticulous SOPs for future multi‑unit expansion.
  sports: Manuel Lorenzo, an avid Texas Rangers supporter, attends home games regularly, follows the Dallas Mavericks and Dallas Stars, participates in a local community softball league, and maintains a
    weekend gardening routine as their primary low‑impact exercise.
  arts: Manuel Lorenzo expresses their creative side through acoustic guitar sessions featuring songs by Johnny Cash, Willie Nelson, and José González, attends monthly local history lectures, and enjoys
    performances by the Dallas Theater Center, particularly the works of Lin‑Manuel Miranda.
  travel: Manuel Lorenzo favors meticulously planned road trips, using spreadsheets to outline itineraries that blend culinary tours of Austin’s food trucks, cultural festivals in New Orleans, and weekend
    hikes in the Texas Hill Country, while they budget for occasional family visits to Oaxaca for authentic flavors.
  culinary: Manuel Lorenzo, an accomplished home cook, delights in crafting regional tacos with carne asada, chicken enchiladas topped with salsa verde, and homemade guacamole spiced with fresh jalapeños
    and cilantro, often experimenting with heirloom chilies from their garden despite occasionally overlooking proper food‑safety temperature logs.
  core: Manuel Lorenzo blends a regimented, checklist‑driven mindset with a love for spicy cuisine, garden‑grown herbs, and spontaneous guitar strums, yet they occasionally forget to water their chilies
    on busy weeks.
background:
  cultural: Manuel grew up in a Mexican‑American household that valued strong family ties, respect for elders, and communal celebrations. He maintains a deep connection to Mexican traditions such as Día
    de los Muertos, quinceañeras, and weekend family meals featuring arroz con pollo, tacos al pastor, and fresh salsa. Living in McKinney, Texas, he blends these cultural roots with the local Texan lifestyle,
    participating in community events, bilingual church services, and regional culinary exchanges. His bilingual fluency allows him to navigate both Mexican and mainstream American cultural contexts, fostering
    a sense of cultural bridge‑building in his personal and professional life.
attributes:
  skills: '["Restaurant operations management", "Team leadership and training", "Inventory and cost control", "Menu planning and development", "Food safety compliance (ServSafe, HACCP)", "Bilingual communication
    (English/Spanish)", "Budgeting and financial analysis", "Vendor negotiation", "POS and scheduling software proficiency", "Crisis and emergency response"]'
  hobbies: '["Cooking Mexican and Tex-Mex cuisine", "Gardening (chilies, herbs)", "Attending baseball games", "Playing acoustic guitar", "Participating in cultural festivals", "Volunteering at senior community
    nutrition programs", "Reading Texas and Mexican history"]'
  career_goals: Manuel aims to advance to a regional manager role overseeing multiple dining establishments within the Dallas‑Fort Worth metroplex. He is also exploring the possibility of opening a small,
    family‑style Mexican restaurant that blends traditional recipes from his heritage with contemporary Tex‑Mex flavors. To support these ambitions, he plans to complete his bachelor's degree in hospitality
    management, obtain advanced certifications in culinary arts, and develop a network of local suppliers. Additionally, he hopes to mentor younger managers and contribute to workforce development programs
    in the community.
