personas:
  professional: Diogenes Anguera, a hands‑on DIY specialist and aspiring community mentor, pairs a lifetime of carpentry, gardening, and automotive repair skills with a pragmatic curiosity to run free workshops
    at the senior center, while pursuing a GED and a modest home‑based salsa venture despite a relaxed, sometimes disorganized approach to planning.
  sports: Diogenes Anguera follows the Arizona Diamondbacks and Phoenix Suns, participates in a local senior walking club and plays occasional pickleball with friends, while channeling their competitive
    spirit from poker into friendly weekend sports debates.
  arts: Diogenes Anguera finds artistic inspiration in Mexican folk painting, the music of Los Lobos and Vicente Fernández, and the detailed craftsmanship of model train scenery, often attending community
    theater performances and reading biographies of frontier figures to blend history with creative expression.
  travel: Diogenes Anguera prefers road‑trip adventures to desert destinations like Saguaro National Park, historic towns such as Santa Fe, and cultural festivals in Oaxaca, planning trips on a modest budget
    and balancing curiosity for new sights with a desire for comfortable, familiar stops.
  culinary: Diogenes Anguera expertly prepares salsa verde, chiles rellenos, and pickled jalapeños using heirloom tomatoes, nopales, and dried chilies harvested from their garden, blending family recipes
    with modern twists like smoked chipotle honey glaze while enjoying the occasional experimentation with cilantro‑lime quinoa salads.
  core: Diogenes Anguera is a pragmatic, curious septuagenarian who blends hands‑on DIY mastery with a competitive card‑playing streak, a love for garden‑grown flavors, and a relaxed, slightly disorganized
    approach to life.
background:
  cultural: Diogenes was born in a small town in the state of Jalisco, Mexico, and moved to Arizona in his twenties, joining a vibrant Mexican‑American community in the Phoenix metropolitan area. His upbringing
    immersed him in traditional Mexican customs—celebrating Día de los Muertos, preparing mole and tamales with his family, and attending Catholic services—while his adult life in the desert Southwest introduced
    him to the region’s ranching and desert‑plant culture. He remains fluent in Spanish and English, often switching languages depending on context, and maintains close ties with relatives back in Mexico
    through regular calls and visits. His identity reflects a synthesis of Mexican heritage and the American Southwest, influencing his food, music preferences (rancheras and norteño), and his respect for
    both communal family values and individual self‑reliance.
