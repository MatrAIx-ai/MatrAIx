    after‑action analysis'', ''fire department technology (CAD, GIS, incident management software)'', ''equipment maintenance and apparatus inspection'', ''development of firefighter mental health support
    programs'']'
  hobbies: '[''watercolor painting'', ''visiting art museums and galleries'', ''reading art history and biographies'', ''hiking in local nature trails'', ''gardening native plants'', ''small‑group book
    club'', ''volunteering at animal shelter'', ''attending intimate jazz concerts'', ''baking artisanal bread'', ''photography of historic Baltimore architecture'']'
  career_goals: Valerie aims to advance to Battalion Chief within the next five years, leveraging her extensive field experience to lead larger operational units. She is passionate about championing mental‑health
    initiatives, planning a department‑wide wellness program that incorporates art‑therapy and peer support. To strengthen her strategic capabilities, she intends to complete a bachelor’s degree in Fire
    Administration. In the long term, she aspires to become Fire Chief, shaping city‑wide fire prevention policies that prioritize vulnerable neighborhoods and historic properties. Valerie also wishes to
    expand her community education outreach, increasing fire safety workshops in schools and senior centers, and to serve as a consultant on fire safety for Baltimore’s historic districts.
