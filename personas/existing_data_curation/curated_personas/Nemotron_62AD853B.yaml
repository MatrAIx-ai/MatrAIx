personas:
  professional: Rodneyka Gross, a 40‑year‑old teaching assistant, leverages meticulous lesson‑planning, Google Classroom expertise, and a calm, routine‑driven demeanor to create structured, supportive environments
    for students with special‑education needs while they quietly advocate for predictable classroom processes.
  sports: Rodneyka Gross, who finds solace in brisk walks along the Pine Grove nature trail watching bobwhite quails, supports the Atlanta Falcons and Atlanta Hawks from their living room, and occasionally
    joins a community walking club on Saturdays, they keep fitness low‑key and routine‑focused.
  arts: Rodneyka Gross, an avid reader of contemporary African‑American authors such as Ta‑Nehisi Coates and Jesmyn Ward, and a devoted listener of gospel legends like Mahalia Jackson and jazz icons like
    Miles Davis, weaves narratives and melodies into their evening porch routines, and they regularly attend small literary gatherings at the local library.
  travel: Rodneyka Gross, a planner who prefers weekend getaways with modest budgets, has explored the historic streets of Savannah, the jazz‑rich French Quarter of New Orleans, and the calming Blue Ridge
    Parkway, they favor destinations that offer quiet nature and cultural depth over crowded tourist hubs.
  culinary: Rodneyka Gross, who delights in preparing Southern staples like simmered collard greens seasoned with smoked ham hocks, crispy fried catfish, and sweet potato casserole with marshmallow topping,
    they often knit a new scarf while the kitchen fills with warm aromas, and they consider meal prep a therapeutic ritual.
  core: Rodneyka Gross, a routine‑oriented educator who channels their quiet resilience into nurturing classrooms, careful finances, and soulful crafts, they balance anxiety‑driven moments with steadfast
    dedication to community and personal rituals.
background:
  cultural: Rodneyka identifies as an African‑American woman raised in Valdosta, Georgia, within a close‑knit Southern Black community. Her upbringing was shaped by deep ties to historically Black churches,
    family gatherings centered around soul food, and a strong emphasis on education as a pathway to empowerment. The legacy of the civil‑rights movement and stories of resilience passed down through generations
    have reinforced her commitment to community service and personal advancement. She participates in local cultural events such as Juneteenth celebrations and church potlucks, and she takes pride in preserving
    the oral traditions, music, and culinary heritage of her ancestors while navigating the challenges of contemporary life in a rural Southern setting.
attributes:
  skills: '[''Classroom management support'', ''Lesson planning assistance'', ''One‑on‑one student tutoring'', ''Educational technology integration (Google Classroom, SMART Boards)'', ''Special education
    accommodations and IEP documentation'', ''Data collection and academic reporting'', ''Parent and guardian communication'', ''Behavioral support and de‑escalation techniques'', ''Curriculum alignment
    and resource curation'', ''Organizational and record‑keeping proficiency'']'
  hobbies: '[''Reading contemporary African‑American fiction and memoirs'', ''Knitting and crochet'', ''Gardening (vegetable and flower beds)'', ''Preparing traditional Southern and soul‑food recipes'',
    ''Walking in local nature trails and bird‑watching'', ''Listening to gospel and jazz music'', ''Participating in a small book club at the local library'', ''Volunteer tutoring for elementary students'']'
  career_goals: Rodneyka aims to transition from a teaching assistant to a fully licensed classroom teacher within the next three years, focusing on special‑education or reading intervention where her detail‑oriented
    approach can be most impactful. She plans to complete the Georgia teacher licensure program while pursuing a Master’s degree in School Counseling, which will equip her to design trauma‑informed support
    structures for students facing emotional challenges. Long‑term, she envisions a leadership role as a lead instructional coach or mentor for other teaching assistants, allowing her to create systematic,
    predictable processes that enhance instructional quality across her school district. Her career path is guided by clear milestones and a commitment to stability, community service, and personal growth
    in emotional resilience.
