persona_description: A firefighter turned writer who has a deep interest in the history and causes of the San Francisco Fire of 1906. Dennis Smith is known for his meticulous research and detailed accounts
  of historical events, and his book "San Francisco Is Burning" provides a gripping account of the disaster, including the bureaucratic errors that allowed the fire to spread and the role of dynamite in
  exacerbating the damage. Smith's book challenges the popular myth that the fire was unstoppable by human forces and argues that competent leadership could have mitigated the disaster. His knowledge and
  expertise in firefighting and disaster response make him a valuable source for understanding the causes and consequences of the San Francisco Fire.
