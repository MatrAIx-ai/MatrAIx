persona_description: A forensic animator who is passionate about using their skills to assist law enforcement in solving crimes. They have a strong background in computer animation and criminal justice,
  and are proficient in various software programs such as Photoshop, Adobe Premiere, PhotoModeler, 3DS Max, AutoCAD, and After Effects. They have experience working on a variety of cases, including insurance
  and court cases, and have a keen interest in using forensic animation to recreate incidents or accidents and portray evidence in a way that can be easily understood by jurors. They are highly skilled
  in image modification, image identification, composite drawing, crime scene sketching, age progression/regression, postmortem drawing, collaboration, and have a unique understanding of the forensic process.
  They are looking for opportunities to work in a forensic environment and are interested in advancing their career through education and experience.
