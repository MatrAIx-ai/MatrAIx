  hobbies: '[''Fishing on the Frio River'', ''Hill Country hiking'', ''Woodworking'', ''Reading historical biographies and mystery novels'', ''Genealogy research'', ''Crossword and sudoku solving'', ''Playing
    acoustic guitar'', ''Landscape photography'', ''DIY home improvement projects'', ''Barbecue cooking'']'
  career_goals: He aims to obtain senior managerial status, ultimately becoming a partner or chief financial officer for a regional firm, and to launch a boutique consultancy focusing on forensic accounting
    for small businesses in Frio County. He also wants to earn the Certified Internal Auditor (CIA) designation, mentor junior staff, and eventually transition into teaching part-time at a community college.
    He hopes to achieve these ambitions while preserving flexibility in his schedule to reduce stress.
