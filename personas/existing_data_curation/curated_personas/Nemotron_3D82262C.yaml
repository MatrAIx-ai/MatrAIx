  hobbies: '[''Playing soccer'', ''Community gardening'', ''Hiking'', ''Cooking Spanish cuisine'', ''Woodworking'', ''Attending cultural festivals'', ''Socializing at barbecues'', ''Watching baseball games'']'
  career_goals: Jose aims to move into a supervisory role within the next two years, becoming a crew lead or foreman, and eventually a landscape manager overseeing larger commercial projects that emphasize
    eco‑friendly design. He plans to earn certifications such as Certified Grounds Manager (CGM) and Sustainable Landscape Professional, and later launch his own landscaping business that combines reliability,
    community involvement, and sustainable practices.
