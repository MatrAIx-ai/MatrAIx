  career_goals: Maria aspires to a stable, people‑focused career in healthcare. She plans to enroll in a high‑school health‑science track, earn certifications such as Certified Nursing Assistant, and eventually
    pursue a Bachelor of Science in Nursing to become a registered nurse. The structured environment, clear responsibilities, and opportunity to help others appeal to her practical nature. She also keeps
    a secondary interest in veterinary technology, drawn by her love for animals and the routine of laboratory work. Maria aims to secure scholarships through academic competitions and maintain high grades
    to support these goals.
