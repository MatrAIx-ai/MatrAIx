  career_goals: Bobby aims to advance from bartender to head bartender and eventually become a bar manager within the next three years. He plans to earn a Certified Responsible Alcohol Service (CRAS) credential
    and enroll in a community‑college program for hospitality management. His long‑term ambition is to open his own neighborhood bar that showcases Southern-inspired craft cocktails and soul‑food bites,
    providing a welcoming space for his community. He also hopes to mentor other young workers, especially those from under‑represented backgrounds, and contribute to local economic development.
