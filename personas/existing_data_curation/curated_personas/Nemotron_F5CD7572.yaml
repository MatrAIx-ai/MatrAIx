personas:
  professional: Bobby Singleton, a diligent bartender, leverages their organized inventory system, precise POS handling, and calm customer service to train staff and meet health‑code standards, all while
    charting a clear path toward head bartender and future bar manager roles.
  sports: Bobby Singleton regularly joins pickup basketball games at the community gym, hones their shooting at Canton’s park, and passionately supports the Mississippi State Bulldogs, often wearing the
    team's teal and gold while watching Saturday night games.
  arts: Bobby Singleton, an avid saxophonist, immerses themselves in the sounds of Miles Davis and B.B. King, frequenting local jazz lounges and the annual blues festival to fuel both their musical improvisation
    and cocktail creativity.
  travel: Bobby Singleton enjoys weekend road trips to the Natchez Trace Parkway for bird‑watching, has visited New Orleans for its jazz scene, and dreams of exploring Asheville’s craft cocktail bars, balancing
    travel plans around their bar schedule and modest budget.
  culinary: Bobby Singleton masters Southern comfort dishes like fried catfish, collard greens, and cornbread, often pairing them with bourbon‑infused sauces and experimenting with homemade cocktails such
    as a peach‑bourbon smash featuring fresh garden herbs.
  core: Bobby Singleton blends a disciplined, methodical work ethic with a love for saxophone‑driven jazz, basketball, and Southern cooking, all while navigating the occasional late‑night fatigue and spontaneous
    whiskey indulgence.
background:
  cultural: Bobby was raised in Canton, Mississippi, within a close‑knit African‑American family that values church, community, and Southern traditions. His upbringing was steeped in gospel music, soul
    food, and stories of the Civil Rights movement, which fostered a strong sense of resilience and responsibility. The local church youth group offered mentorship and a platform for community service,
    reinforcing values of mutual support and perseverance. Culinary traditions at home blend classic soul food—collard greens, fried catfish, cornbread—with contemporary Southern flavors, influencing his
    palate and his interest in food‑and‑drink culture. Bobby participates in regional events such as the Canton River Festival, celebrating local heritage while strengthening his sense of belonging and
    pride in his cultural roots.
