persona_description: A medieval scholar who is interested in the study of English poetry and its development from the Middle English to the later periods. This person is likely to be familiar with the works
  of Piers Plowman and the C-text of the poem. They are also knowledgeable about the revision process of the poem, particularly the changes made by William Langland and the reasons for them. They may have
  an interest in the argument and design of the poem, and may be able to analyze and interpret the passages removed from the C-text.
