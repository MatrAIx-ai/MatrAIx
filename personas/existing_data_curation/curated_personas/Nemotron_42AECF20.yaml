personas:
  professional: Jomar Suminski, an 85‑year‑old seasoned educator at community colleges, blends their deep expertise in Spanish language and Argentine literature with a quiet, patient teaching style that
    emphasizes solitary, reflective learning and integrates watercolor sketching and vintage tango recordings into curricula.
  sports: Jomar Suminski enjoys daily walks through Central Park and the Prospect Park Loop, affiliates with the local seniors’ walking club, and follows the New York Knicks and Yankees from their favorite
    bench, though they rarely participate in team sports themselves.
  arts: Jomar Suminski immerses themselves in the arts by listening to Astor Piazzolla’s tango recordings, reading Borges and Cortázar, and creating delicate watercolor studies of New York parks inspired
    by Edward Hopper, while occasionally writing reflective poems that echo the melancholy of their favorite milonga tracks.
  travel: Jomar Suminski prefers low‑key travel, favoring quiet museum tours in Manhattan’s Met and leisurely strolls through Buenos Aires’s San Telmo district, and they dream of a serene retreat to Patagonia’s
    lakeside cabins to sketch and read in solitude.
  culinary: Jomar Suminski, a modest home chef, regularly prepares fragrant empanadas filled with spiced beef, slow‑cooked asado seasoned with homemade chimichurri, and enjoys pairing meals with fresh rosemary
    and oregano from their balcony garden.
  core: Jomar Suminski, an 85‑year‑old solitary scholar, blends quiet curiosity with a disciplined routine of art, literature, and gentle activism, balancing frugality and meticulous self‑care while nurturing
    an ever‑present undercurrent of worry.
background:
  cultural: Jomar was born in Buenos Aires to a family of mixed European descent, with Italian and Polish roots that are common among Argentinian immigrants. He grew up speaking Spanish at home, steeped
    in the traditions of tango, mate, and family gatherings centered around communal meals. After emigrating to the United States in his early twenties, he settled in Queens, where he has remained connected
    to the vibrant Argentine diaspora through the local cultural center, neighborhood festivals, and weekly gatherings. His identity blends the warm, expressive cultural heritage of Argentina with the quiet,
    reflective lifestyle he cultivated in New York, and he continues to preserve and share Argentine art, literature, and culinary customs within his community.
