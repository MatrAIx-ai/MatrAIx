personas:
  professional: An analytical civil engineer with a knack for sustainable stormwater design, Sara Spencer leverages AutoCAD, Civil 3D, GIS, and rigorous project coordination to deliver code‑compliant infrastructure
    while mentoring junior staff and aiming for her PE license within three years.
  sports: A devoted trail‑hiker who frequents Sam Houston National Forest and occasionally joins a local running club for weekend 5Ks, Sara Spencer roots for the Houston Astros, cycles with a community
    bike group on Saturday mornings, and enjoys occasional casual pick‑up soccer games with friends.
  arts: Passionate about visual storytelling and literature, Sara Spencer spends evenings photographing deer and hawks, curates a personal collection of Ansel Adams prints, devours Jane Austen novels alongside
    technical biographies, and enjoys relaxed board‑game nights featuring Settlers of Catan with a close circle of friends.
  travel: Guided by a love for solitary landscapes, Sara Spencer plans meticulous road trips to remote national parks like Glacier and Joshua Tree, combines stargazing nights at Dark Sky Parks with weekend
    escapades to New Mexico’s Taos Pueblo region, and dreams of witnessing the Southern Hemisphere’s Milky Way from Chile while balancing a modest travel budget.
  culinary: An enthusiastic home gardener, Sara Spencer harvests heirloom tomatoes, sweet peppers, and kale to craft fresh summer salads, experiments with a sourdough starter and pesto sauces, but often
    over‑spices her stir‑fry, and occasionally rewards herself with a cheat‑day slice of pepperoni pizza.
  core: Sara Spencer is a methodical, nature‑loving civil engineer who merges precise technical work with solitary outdoor pursuits, balancing disciplined finances and occasional indulgences while navigating
    mild health quirks and a curated set of hobbies.
background:
  cultural: Sara grew up in a suburban community near Conroe, Texas, within a middle‑class, Anglo‑American family with deep roots in the Southern United States. Her heritage includes English and German
    ancestry, and she was raised in a Protestant (Methodist) household that emphasized hard work, self‑reliance, and community service. The Texas culture of hospitality, modesty, and practical problem solving
    shaped her values, while the diverse, multicultural environment of the greater Houston area exposed her to a range of perspectives that broadened her outlook. Her suburban upbringing provided ample
    access to outdoor recreation, fostering a love for nature and an appreciation for the region’s blend of Southern tradition and modern growth.
attributes:
  skills: '[''AutoCAD'', ''Civil 3D'', ''GIS mapping'', ''Structural analysis'', ''Project management'', ''Microsoft Project'', ''Technical writing'', ''Data analysis'', ''Quality control'', ''Problem solving'',
