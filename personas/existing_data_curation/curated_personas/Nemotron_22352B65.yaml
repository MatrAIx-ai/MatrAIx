  hobbies: '[''Hiking'', ''Wildlife photography'', ''Reading technical non-fiction and classic literature'', ''DIY home improvement'', ''Vegetable gardening'', ''Puzzle solving (crosswords, Sudoku)'', ''Board
    games with close friends'', ''Amateur astronomy'']'
  career_goals: She aims to obtain her Professional Engineer (PE) license within the next three years, progress from a junior engineer to a lead project manager on sustainable infrastructure projects, and
    specialize in green stormwater management solutions for Montgomery County. Concurrently, Sara plans to complete a part‑time bachelor's degree in civil engineering to deepen her technical foundation.
    In the long term, she hopes to mentor emerging engineers and help shape community‑focused design standards that blend innovation with cost‑effective implementation.
