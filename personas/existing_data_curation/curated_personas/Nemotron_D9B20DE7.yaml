  hobbies: '[''Gardening'', ''Reading historical fiction and memoirs'', ''Crocheting and quilting'', ''Baking'', ''Walking along the Kankakee River'', ''Birdwatching'', ''Participating in book club'', ''Attending
    church services'', ''Volunteering at senior center'']'
  career_goals: Even in retirement, Maida is motivated to remain active and purposeful. She hopes to mentor younger volunteers at the community center, share her cooking knowledge through informal workshops,
    and document her family’s recipes in a personal cookbook. She also aspires to research and write a memoir that captures her experiences growing up and raising a family in Momence. Learning genealogy
    to trace her family’s roots and contributing to the local historical society are other ambitions. Maida aims to keep expanding her digital skills so she can record oral histories and stay engaged with
    distant relatives.
