personas:
  professional: Maida Ayers, a retired community volunteer turned informal mentor, blends their decades of event planning, budgeting, and DIY carpentry skills to guide younger volunteers at the senior center,
    coordinate church bake sales, and document family recipes, all while embracing a relaxed, flexible approach that values curiosity over rigid schedules.
  sports: Maida Ayers, an avid walker and birdwatcher, participates in the Momence Meadow Friends Walking Club, follows the Chicago Cubs, Chicago Bears, and Chicago Blackhawks, and enjoys occasional senior
    bowling league nights at the local community center.
  arts: Maida Ayers, a lifelong lover of the arts, attends local choral performances of John Rutter’s hymns, enjoys the folk storytelling of Pete Seeger, reads historical novels by Philippa Gregory at their
    book club, and follows crafting videos by Annie Sloan for quilting inspiration.
  travel: Maida Ayers, who prefers relaxed road trips, has visited Colonial Williamsburg, explored the historic battlefields of Gettysburg, taken weekend drives to the Indiana Dunes, and dreams of strolling
    through the gardens of the Biltmore Estate in Asheville, all while balancing a limited travel budget with family visits.
  culinary: Maida Ayers, an expert Midwestern home‑cook, perfects apple pie with Granny Smith apples, cinnamon, and nutmeg, bakes classic chicken pot pie using garden‑fresh thyme and rosemary, prepares
    pork chops with homemade skillet cornbread, and enjoys sharing these dishes at church potlucks, though they sometimes forget to pre‑heat the oven.
  core: Maida Ayers, a garden‑tending, quilting‑passionate, community‑spirit‑driven 75‑year‑old, balances cherished traditions with spontaneous curiosity, often misplacing their glasses while tending roses
    and remembering recipes by heart but not appointments.
background:
  cultural: Maida’s cultural background is rooted in the rural Midwestern traditions of central Illinois. As a lifelong resident of Momence, she grew up in a predominantly white, working‑class community
    with strong ties to agriculture and small‑town church life. Family gatherings centered around home‑cooked meals, seasonal celebrations, and an emphasis on self‑reliance and neighborliness. Her upbringing
    reflected the values of modesty, practicality, and collective responsibility common in the region, shaping her cooperative nature and focus on community harmony. Exposure to local folk music, Midwestern
    folklore, and seasonal festivals has further colored her sense of identity.
