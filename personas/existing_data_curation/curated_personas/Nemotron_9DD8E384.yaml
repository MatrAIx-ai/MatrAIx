  hobbies: '[''Gardening (vegetables and prairie flowers)'', ''Quilting and hand‑sewing'', ''Baking bread and canning preserves'', ''Reading historical fiction and local history'', ''Birdwatching'', ''Crossword
    puzzles'', ''Listening to classic country music'', ''Attending community theater performances'']'
  career_goals: Though retired from formal employment, Katherine aims to stay actively engaged in her community. She aspires to mentor younger volunteers at the local senior center, deepen her genealogical
    research using online archives, and perhaps compile a family memoir that captures the stories of her upbringing in rural Minnesota. Maintaining her health through daily walks along the Red Lake Falls
    trails and attending regular wellness workshops is also a priority, as is continuing her role as a dependable support for her spouse and grandchildren.
