personas:
  professional: Norma Statham is a seasoned construction professional with three decades of hands‑on experience operating forklifts, backhoes, and loaders, who leverages they practical problem‑solving instincts
    and collaborative crew leadership to mentor younger workers while pursuing an OSHA Certified Safety Professional credential and a crew‑supervisor role.
  sports: Norma Statham is an enthusiastic participant in line dancing and swing dancing classes at the local community center, and they also cheer on the Jacksonville Jaguars and Jacksonville Jumbo Shrimp
    while occasionally joining a senior walking club that meets at Riverside Park each Saturday.
  arts: Norma Statham cultivates a rich arts life by reading historical fiction by Hilary Mantel and Ken Follett, attending Jacksonville’s Riverfront Festival featuring Nina Simone and Duke Ellington tributes,
    and leading craft workshops where they guide participants through Martha Stewart‑inspired DIY home décor projects.
  travel: Norma Statham prefers low‑key road trips that blend social connection with discovery, such as weekend drives to St. Augustine’s historic district or a group cruise to Savannah, Georgia, and they
    often use senior discounts and a well‑worn travel journal to plan spontaneous outings with their dance friends.
  culinary: Norma Statham delights in cooking fresh garden herbs into dishes like shrimp & grits with lemon‑basil garnish and key‑lime pie, they easily whip up a batch of homemade pickles for neighbors,
    and they favor the bold flavors of grouper sandwiches at local fish markets.
  core: Norma Statham is a hands‑on, community‑driven DIY enthusiast who balances a love for heavy equipment and swing dancing with a habit of forgetting appointments but never forgetting to share a freshly
    baked treat with a neighbor.
background:
  cultural: Norma grew up in a middle‑class, working‑class family in the Jacksonville suburbs during the 1960s and 70s. Her parents' work in manufacturing instilled a strong work ethic and a sense of community
    responsibility. The Southern culture of hospitality, church involvement, and neighborhood gatherings shaped her compassionate, cooperative outlook. She maintains close ties with lifelong friends, regularly
    participates in local church service projects, and values both traditional practices and the curiosity to try new ideas, which is evident in her blend of established construction methods with modern
    techniques.
attributes:
  skills: '[''Heavy equipment operation'', ''Concrete mixing and finishing'', ''Framing and carpentry'', ''Roofing installation and repair'', ''Blueprint and plan interpretation'', ''OSHA safety compliance'',
