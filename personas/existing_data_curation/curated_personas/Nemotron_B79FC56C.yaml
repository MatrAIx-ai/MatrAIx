  hobbies: '[''Line dancing'', ''Swing dancing'', ''Gardening'', ''Community volunteer work at senior center'', ''Craft workshops'', ''Attending riverfront festivals'', ''Reading historical fiction'', ''DIY
    home improvement projects'']'
  career_goals: Norma aims to transition into a crew‑supervisor role within the next two years, earning an OSHA Certified Safety Professional credential to formalize her safety expertise. She wants to mentor
    younger workers, especially women entering the trades, and to volunteer as a project coordinator for Habitat for Humanity, applying her practical skills to community building projects. As she approaches
    retirement, she plans to scale back full‑time labor while launching a small handyman service focused on affordable repairs for senior neighbors, keeping her active and socially connected.
