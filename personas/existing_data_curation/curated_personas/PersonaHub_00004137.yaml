persona_description: A horticulturist who is interested in recent advances in horticultural practices for berry crops, including blueberry, blackberry, cranberry, raspberry, and strawberry. They are focused
  on improving both yield and fruit quality, and are constantly challenged by weather, pests and diseases, and market and labor requirements. They are looking for new information on practices for organic
  and soilless systems, and ideally include research from temperate, subtropical, and tropical climates. They are interested in contributing reviews and original research on topics such as soil and site
  preparation, cultivar selection, planting and establishment, pruning and training systems, mulching, irrigation and water requirements, nutrition and fertilizers, combating pests and diseases, and fruit
  harvest and handling.
