  career_goals: He aims to transition into a senior supervisory role, such as unit manager or deputy warden, where he can apply his business acumen to improve operational efficiency and develop innovative
    rehabilitation programs that incorporate arts and educational components. Long‑term, he envisions leading a district‑wide corrections training program, consulting on correctional reform initiatives
    at the state level, and possibly serving on a local public safety board to influence policy and community safety.
