  career_goals: In the short term, Michelle aims to become a shift supervisor and earn a retail management certification, applying her business knowledge to improve store efficiency and customer experience.
    Over the next five years she hopes to be promoted to store manager, where she can mentor staff and implement community‑focused initiatives, such as partnerships with local artists and charitable events.
    Long‑term, Michelle envisions opening a boutique that showcases work from Maryland artisans while providing apprenticeships for youth interested in the arts. To support this vision she plans to pursue
    a part‑time MBA and develop expertise in social entrepreneurship and small‑business operations.
