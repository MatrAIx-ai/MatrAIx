personas:
  professional: Michelle Tanner, a retail associate with an eye for community impact, leverages their POS expertise, conflict‑resolution skills and business degree to streamline store operations while championing
    local artist collaborations as they work toward a shift‑supervisor role.
  sports: Michelle Tanner, who channels their love for the Chesapeake Bay’s waterways into weekend kayaking trips, hikes the Patapsco Valley State Park trails, follows the Baltimore Ravens and Washington
    Capitals, and joins a local 5K charity run each spring, reflects a balanced, low‑impact fitness routine that they sustain through varied outdoor activities.
  arts: Michelle Tanner, an avid gallery‑hopper in the Washington‑Baltimore corridor, draws creative inspiration from watercolors by Alvaro Castagnet, the photography of Annie Leibovitz, and local Maryland
    muralists, while they curate community art fairs that spotlight emerging creators like glassblower Emily Song.
  travel: Michelle Tanner, whose travel style blends meticulous art‑museum itineraries with spontaneous weekend escapes, has explored the Smithsonian in D.C., the historic streets of Charleston, the Blue
    Ridge Parkway’s fall foliage, and dreams of strolling the galleries of Paris and Venice while keeping trips affordable through budget‑friendly Airbnb stays, ensuring they feed their curiosity without
    overspending.
  culinary: Michelle Tanner, an experimental home chef, frequently whips up Mediterranean‑inspired quinoa bowls with harissa and fresh basil, perfects Chesapeake‑style crab cakes, and tackles artisanal
    sourdough on Sunday mornings, all while sourcing ingredients at the local farmer’s market, where they enjoy chatting with stall owners about seasonal produce.
  core: Michelle Tanner, a calm, art‑driven community advocate who blends meticulous retail expertise with a passion for creativity, yoga, and social impact, constantly seeking balance between organization
    and spontaneous inspiration, while they occasionally overcommit to volunteer events.
background:
  cultural: Michelle is a white American with a mixed German‑Irish heritage whose family has lived in the Mid‑Atlantic for generations. Raised in a suburban community near Washington, D.C., she absorbed
    the region’s blend of historic Chesapeake Bay traditions—such as crab feasts, boating, and county fairs—and the cultural diversity of the capital’s museums and festivals. Her upbringing emphasized community
    service, education, and an appreciation for the arts, shaping a worldview that values both local heritage and broader creative expression.
