personas:
  professional: Awanda Bennett is a disciplined student leader who leverages her strong organizational skills and confident public speaking as vice‑president of the school’s student council to design eye‑catching
    flyers in Canva, coordinate neighborhood clean‑ups, and lay the groundwork for a future nonprofit focused on youth tutoring and leadership development.
  sports: Awanda Bennett plays midfield for Moreno Valley High School’s varsity soccer team, studies tactical formations of LAFC and the USWNT, trains twice a week with the local Moreno Valley Soccer Club,
    and habitually reviews game footage on YouTube to refine her strategic play, all while maintaining a competitive edge that sometimes overshadows collaborative team bonding.
  arts: Awanda Bennett fuels her creative side through hip‑hop and R&B dance routines set to tracks by SZA and Megan Thee Stallion, produces short‑form TikTok videos that blend choreography with community
    messages, and draws inspiration from vibrant street‑art murals by local muralists she discovers while exploring downtown Moreno Valley, often echoing the storytelling style of artists like Banksy.
  travel: Awanda Bennett loves weekend road trips to Joshua Tree National Park and spontaneous strolls through Los Angeles’ mural‑laden neighborhoods, dreams of a spring break adventure in New York City’s
    Broadway district, and meticulously co‑creates itineraries with friends on Google Docs while staying within a modest travel budget.
  culinary: Awanda Bennett delights in preparing cherished family soul‑food dishes such as crispy fried chicken, buttery collard greens seasoned with smoked turkey, and sweet cornbread, while also experimenting
    with TikTok‑trending quick meals like garlic‑butter shrimp tacos, though she often leaves her kitchen a mess after enthusiastic cooking sessions.
  core: Awanda Bennett is an ultra‑organized, competitively driven teen who blends community activism, soccer strategy, and TikTok creativity into a bustling life, yet occasionally spirals into late‑night
    phone scrolling and maintains a skeptical eye toward others’ motives.
background:
  cultural: Awanda is African‑American and was raised in a multigenerational household in Moreno Valley, California. Her family traces its roots to the Southern United States, and she grew up immersed in
    the traditions of the Black community, including church gatherings, family storytelling, and celebrations of Juneteenth and Kwanzaa. Living in the culturally diverse Riverside County, she has also been
    influenced by neighboring Latino and Asian cultures, which has fostered an inclusive outlook and a respect for multicultural collaboration in her community activities.
