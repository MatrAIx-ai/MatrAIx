  hobbies: '[''Soccer (midfield)'', ''Hip‑hop and R&B dancing'', ''TikTok video creation'', ''Reading contemporary YA novels'', ''Volunteer tutoring at community center'', ''Cooking family recipes'', ''Exploring
    street art murals'']'
  career_goals: Awanda aims to earn her GED within the next year, then enroll in a community college to study Business Administration with a concentration in nonprofit management. She envisions a career
    that combines her organizing talent and passion for community service, either as a community outreach coordinator for a public‑health agency or by launching her own youth‑empowerment nonprofit focused
    on academic tutoring and leadership development. In the longer term, she hopes to obtain a bachelor’s degree in Public Administration and become a recognized advocate for educational equity in Riverside
    County. She also plans to continue competing in soccer at the collegiate level.
