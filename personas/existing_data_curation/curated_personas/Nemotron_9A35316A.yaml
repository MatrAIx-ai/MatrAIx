personas:
  professional: Cheryl Joy, a veteran correctional officer with twenty years of inmate supervision, crisis de‑escalation, and security protocol mastery, channels her curiosity and hands‑on woodworking knack
    into mentoring new staff while championing an art‑therapy pilot that blends her watercolour hobby with rehabilitative justice, all the while juggling the occasional disorganized paperwork with a laid‑back,
    flexible mindset.
  sports: Cheryl Joy embraces low‑impact fitness, hitting the Lookout Mountain trails for weekly hikes, casting a line on the Tennessee River for occasional fishing, and cheering on the Chattanooga Lookouts
    baseball team, the Tennessee Titans, and Chattanooga FC soccer matches, while their irregular shift schedule sometimes makes consistent gym sessions a challenge.
  arts: Cheryl Joy immerses themselves in the Chattanooga art scene by roaming galleries, admiring street murals by local creators like Rosa Martinez, painting watercolour landscapes reminiscent of Winslow
    Homer, and attending bluegrass concerts featuring Bill Monroe and The Avett Brothers, finding that each brushstroke and song fuels both personal reflection and ideas for inmate art‑therapy programs.
  travel: Cheryl Joy prefers spontaneous weekend escapes, often driving to the Great Smoky Mountains or Asheville for mountain hikes and craft brewery tours, dreaming of a summer art retreat in Santa Fe
    and a cultural pilgrimage to Florence, Italy, yet their relaxed planning style sometimes results in last‑minute hotel bookings and forgotten travel checklists.
  culinary: Cheryl Joy enjoys cooking Southern comfort dishes—shrimp and grits, peach cobbler, and smoked brisket—while seasoning meals with fresh basil, thyme, and mint from their backyard garden, boasts
    a solid home‑cook skill set that includes making jambalaya and homemade cornbread, and occasionally indulges in a locally brewed craft beer after a long shift.
  core: Cheryl Joy blends a disciplined correctional career with a free‑spirited love of art, hiking, and spontaneous adventures, navigating life with a relaxed, sometimes disorganized, yet deeply curious
    and compassionate outlook.
background:
  cultural: Born into a middle‑class white family in the Appalachian region of Tennessee, Cheryl grew up with Southern hospitality, strong community ties, and a modest, work‑oriented upbringing. Her family
    attended church regularly and valued tradition, yet encouraged curiosity and lifelong learning, nurturing her open‑minded view of art and new ideas. Living in Hixson, a suburban enclave of Chattanooga,
    she experiences a blend of Appalachian cultural heritage—folk music, quilting, storytelling—and the city’s growing artistic vibrancy. Her career, exposing her to diverse inmate populations, has broadened
    her cultural sensitivity, fostering respect for varied backgrounds while retaining her Southern‑rooted values of perseverance, respect, and a relaxed approach to life.
attributes:
  skills: '[''Inmate supervision and safety management'', ''Crisis de‑escalation and conflict resolution'', ''Incident reporting and documentation'', ''First aid, CPR, and defensive tactics certification'',
    ''Situational awareness and search procedures'', ''Interpersonal communication and team coordination'', ''Mentorship and training of new officers'', ''Knowledge of criminal justice policies and rehabilitation
    concepts'', ''Basic woodworking and DIY home repair'', ''Art appreciation and program development ideas'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Watercolour painting'', ''Hiking and nature walks on Lookout Mountain'', ''Fishing'', ''Attending bluegrass and folk concerts'', ''Reading contemporary
    fiction, philosophy, and true‑crime books'', ''Journaling'', ''Woodworking small projects'', ''Gardening'']'
  career_goals: Cheryl aims to advance into a supervisory or administrative position within the corrections system, such as shift commander or facility manager, by completing her associate degree in criminal
    justice and earning certifications in corrections leadership. She is passionate about integrating arts and creative therapies into inmate rehabilitation and hopes to lead a pilot program partnering
    with local art organizations. Long‑term, she envisions influencing policy reforms that emphasize restorative justice and staff well‑being while maintaining the flexibility needed to continue her personal
    art pursuits and community involvement.
