persona_description: A member of the Inter-Agency Standing Committee (IASC) SWG on Preparedness, who is responsible for coordinating and managing the information content, design, and organization of the
  Inter-Agency Standing Committee (IASC) Humanitarian Early Warning Service (HEWSweb) on behalf of the Inter-Agency Standing Committee and its members. The persona has expertise in disaster risk reduction
  and management, and is well-versed in the use of early warning systems to mitigate the impact of natural hazards. The persona has a deep understanding of the global humanitarian community and the various
  institutions that provide early warning information, and is skilled in coordinating and managing the information content, design, and organization of HEWSweb. The persona has a strong commitment to improving
  disaster preparedness and reducing the impact of natural hazards on the humanitarian community.
