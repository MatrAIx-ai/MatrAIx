  career_goals: Deborah dreams of becoming a marine biologist who explores tide pools and discovers new sea creatures, hoping to share her findings through kid‑friendly videos and school presentations.
    She also aspires to design interactive educational toys that blend fun with learning, allowing other children to experiment and discover the world in a practical way. Ultimately, she sees herself as
    a future science communicator who can inspire peers to ask questions and pursue their own curiosities.
