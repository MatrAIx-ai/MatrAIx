  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Reading Speculative Fiction'', ''Poetry'', ''Philosophy'', ''Visiting Art Galleries'', ''Attending Community Art Shows'', ''Creative Writing'', ''Journaling'',
    ''Mindfulness Meditation'', ''Solo Hiking'', ''DIY Crafts'', ''Indoor Gardening'']'
  career_goals: Natasha aims to advance into a middle‑management role where she can lead larger administrative teams while integrating her creative interests into workplace initiatives. She plans to complete
    a bachelor’s degree in Business Administration or Arts Management to broaden her strategic perspective. Her long‑term ambition is to become an Office Operations Manager or a Learning & Development Lead,
    creating mentorship programs and stress‑reduction practices that support employee well‑being. She also dreams of launching a small side venture offering art‑focused workshops for local businesses, blending
    her supervisory experience with her passion for novelty and creativity.
