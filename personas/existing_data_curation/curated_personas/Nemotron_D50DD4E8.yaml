  career_goals: Although still a toddler, Andrew displays a budding curiosity about how things work and a love for creativity. He often talks about making things, drawing pictures for everyone, and exploring
    the world, hinting at future aspirations to become a scientist‑inventor, an artist, or a builder who creates and discovers new things for his community.
