personas:
  professional: Andrew Lee, a two-year-old budding architect, transforms everyday playtime into methodical construction projects by meticulously arranging wooden blocks into towering cityscapes, rigidly
    following a self-made blueprint and fiercely competing with peers to see whose structure endures the longest.
  sports: Andrew Lee, a two-year-old member of the Sunshine Tots Soccer Club, energetically chases a miniature orange ball around the foam field, proudly dons a junior Manchester United jersey, imitates
    the celebratory moves of Marcus Rashford, and obsessively lines up his tiny trophy after each mini-match to prove his competitive edge.
  arts: Andrew Lee, an imaginative preschooler, delights in splashing vivid watercolors across oversized paper, rhythmically claps along to the catchy tune of 'Baby Shark' by Pinkfong, proudly displays
    crayon-drawn dinosaurs next to a poster of Disney's 'Moana', and mimics the playful storytelling style of Pixar's 'Toy Story'.
  travel: Andrew Lee, an inquisitive explorer, treasures family outings to the local zoo and the sunny sands of Santa Monica Beach, marvels at the dazzling lanterns during the summer street fair, and daydreams
    about strolling through Tokyo's neon-lit Harajuku district after hearing vivid tales of the city's vibrant culture.
  culinary: Andrew Lee, a selective eater with a surprisingly sophisticated palate for a two-year-old, demands buttery macaroni and cheese seasoned with a pinch of paprika, eagerly dips crisp cucumber sticks
    into smooth hummus, and insists on a nightly banana split crowned with a drizzle of rich chocolate syrup.
  core: Andrew Lee, a two-year-old whirlwind of curiosity, methodical block-building, disciplined coin-saving, sneeze-fighting routines, soccer enthusiasm, vivid art explorations, globe-trotting imagination,
    and surprisingly refined taste buds, balances a competitive streak with a calm, stress-resilient demeanor.
background:
  cultural: Andrew is raised in a white Southern family in Moss Point, Mississippi. His upbringing blends Gulf‑Coast coastal life with community church gatherings and family traditions of Southern cuisine,
    blues and gospel music, and outdoor activities like fishing trips and beach outings. He experiences a close‑knit community that values hospitality, modesty, and resilience.
