personas:
  professional: A future-focused preschooler named Asia Nebrasky meticulously arranges her classroom library, habitually sorts books by color and size, and practices role‑playing as a librarian, showcasing
    an early love for structure and responsibility.
  sports: Asia Nebrasky, a budding soccer enthusiast, proudly dons the Springfield Strikers youth jersey, attends scheduled practice every Thursday with precise punctuality, and blends structured drills
    with imaginative backyard games, manifesting a love for order in athletic pursuits.
  arts: Asia Nebrasky delights in drawing vibrant pictures of her favorite cartoon character Moana, enjoys listening to upbeat tunes by the Sesame Street cast, and meticulously arranges her crayon creations
    on a special display board, revealing a creative spirit tempered by a need for organization.
  travel: Asia Nebrasky, a curious five‑year‑old, dreams of revisiting Disney World after a memorable family vacation, decorates her travel journal with color‑coded stickers to map out each day, yet also
    cherishes short weekend trips to the nearby lake where she can follow a familiar routine of picnicking and building sandcastles.
  culinary: Asia Nebrasky prefers bite‑size chicken nuggets, apple slices with peanut butter, and lovingly separates each food item into neat sections on her plate; she sometimes gets frustrated when stray
    broccoli florets tumble out of their designated corner, highlighting her orderly yet occasionally impatient dining habits.
  core: Asia Nebrasky is a detail‑oriented five‑year‑old who thrives on routine, saves her allowance with fervor, worries about small health hiccups, and channels imagination into structured play, all while
    maintaining a charmingly tidy appetite for both books and bites.
background:
  cultural: Asia comes from a white Southern family in Sulphur Springs, Texas, a small town in Delta County. Her family observes traditional Southern customs, including regular attendance at a local Baptist
    church, participation in Sunday school, and involvement in community events like the annual Sulphur Springs Fest. Family meals often feature regional comfort foods such as chicken fried steak, biscuits,
    and sweet tea, reflecting the area's culinary heritage. She has been raised with an emphasis on politeness, hospitality, and respect for elders, and she takes part in school and community activities
    that highlight Texas’s rural roots, such as 4‑H club meetings and local parades.
attributes:
  skills: '[''Counting to 20'', ''Alphabet recognition'', ''Sorting objects by color and shape'', ''Following multi-step routines (e.g., dressing, packing a backpack)'', ''Coloring within lines'', ''Cutting
