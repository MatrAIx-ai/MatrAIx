  hobbies: '[''Jigsaw puzzles (up to 100 pieces)'', ''LEGO building'', ''Guided coloring books'', ''Reading picture books with repetitive text'', ''Garden planting with parents'', ''Sunday school crafts'',
    ''Clapping games and rhythmic movement'', ''Listening to lullabies'', ''Deep-breathing relaxation games'', ''Playing with animal figurines'']'
  career_goals: Although still early, Asia often talks about helping others and keeping things orderly. She says she wants to become a teacher because she loves books and enjoys guiding friends through
    learning activities, and she also imagines being a librarian to keep stories organized. Occasionally she mentions caring for animals and hopes to be a veterinary assistant one day. Her ambitions reflect
    her love for routines, structure, and making environments neat and supportive.
