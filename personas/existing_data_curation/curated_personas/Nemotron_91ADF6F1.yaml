  career_goals: Samuel dreams of turning his passion for visual storytelling into a career as an illustrator or animator, creating comics that explore themes of identity and emotional resilience. He is
    also fascinated by interactive media and hopes to learn advanced game development skills to build games that promote empathy and mental health awareness. In the longer term, he envisions using his art
    and technology expertise to launch a youth-focused digital platform that offers creative outlets and supportive resources for peers facing anxiety and depression. He aspires to attend a high school
    arts magnet program and eventually earn a degree in visual arts or interactive media, while staying connected to his community through mentorship and volunteer work.
