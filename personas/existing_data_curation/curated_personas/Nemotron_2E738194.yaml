  hobbies: '[''line dancing'', ''book club (mystery/historical fiction)'', ''community garden volunteering'', ''potluck cooking and hosting'', ''DIY home projects'', ''walking local nature trails'', ''senior
    fitness classes (Zumba)'', ''participating in church outreach events'']'
  career_goals: Carolyn aims to transition into a senior supervisory role within the next three years, obtaining EPA and OSHA certifications to deepen her technical credibility. She wishes to mentor younger
    technicians, sharing both her structured methods and her adaptable problem‑solving mindset. Long‑term, she envisions establishing a part‑time consultancy focused on energy‑efficient retrofits for small
    businesses in the Arlington area, allowing her to combine her practical expertise with her desire for flexible, community‑oriented work that supports local sustainability goals.
