  hobbies: '[''Attending Art Exhibitions'', ''Photography'', ''Woodworking'', ''Metal Fabrication'', ''Community Theater'', ''Toastmasters'', ''Hiking'', ''Fishing'', ''Cooking (Midwestern Barbecue)'',
    ''Reading Non‑Fiction (Technology & Philosophy)'']'
  career_goals: Jack aims to transition into senior consulting, helping mid‑size manufacturers adopt digital‑twin technologies and sustainability upgrades. He also aspires to become an adjunct professor
    at the University of Findlay, teaching product design and lean manufacturing. Over the next five years, he plans to launch a community maker‑lab that blends engineering projects with art workshops,
    providing a collaborative space for local youth and hobbyists. Additionally, Jack hopes to publish a series of articles exploring the intersection of engineering and creative expression in industry
    journals and to serve on the board of a regional non‑profit that promotes STEM education and the arts.
