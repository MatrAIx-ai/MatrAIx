personas:
  professional: Jack Parrish, a senior mechanical and systems engineer with three decades of experience, combines AutoCAD, SolidWorks, ANSYS, and PLC programming expertise with a natural ability to present
    complex ideas to diverse audiences; they are curious and sociable, mentoring junior staff and leading lean‑six sigma projects that cut downtime, while their love of storytelling fuels a vision of consulting
    and teaching that bridges engineering precision with creative expression.
  sports: Jack Parrish roots for the Cleveland Browns and follows the Cleveland Cavaliers closely, often watching games at a local sports bar while debating play strategies with fellow fans; they stay active
    by joining a community walking club that meets on Saturday mornings, play casual pickup basketball at the Findlay recreation center each winter, and wind down in the summer with weekend fishing trips
    on Lake Findlay that double as low‑intensity cardio.
  arts: Jack Parrish channels a lifelong love of visual storytelling into curating exhibitions at the Crosby Art Center, where they champion works by regional painter Susan Harris and classic photographers
    like Ansel Adams; they regularly attend performances by the local jazz trio The Rivertones, keep a vinyl collection featuring Bob Dylan and Bruce Springsteen, and draw inspiration from the bold colors
    of Georgia O'Keeffe for their own landscape photography.
  travel: Jack Parrish prefers road‑trip adventures that blend scenic photography with local culture, planning routes on paper maps and stopping at small towns to sample regional cuisine; they have explored
    Hocking Hills State Park, taken a weekend ferry to Mackinac Island, and dream of photographing the fjords of Norway while staying in a modest B&B that fits their retirement budget.
  culinary: Jack Parrish boasts a solid grasp of heartland‑style barbecue, spending Saturday afternoons smoking pork ribs with hickory chips, hand‑mixing a tangy barbecue sauce featuring apple cider vinegar,
    brown sugar, and smoked paprika; they pair the meals with homemade coleslaw, cornbread, and a rotating selection of local craft ales, and occasionally experiment with a wood‑fired pizza topped with
    smoked sausage and fresh rosemary.
  core: Jack Parrish blends engineering precision with artistic spontaneity, juggling spreadsheets and camera lenses while habitually quoting philosophy during board meetings and never missing a Friday
    night improv session.
background:
  cultural: Jack grew up in a small town in north‑central Ohio, steeped in Midwestern values of hard work, community responsibility, and modesty. His family background was rooted in the region’s agricultural
    and manufacturing traditions, fostering a respect for practical problem‑solving and self‑reliance. He was raised in a Protestant environment that emphasized service and civic engagement, which later
    translated into his volunteer work and community involvement. The close‑knit social fabric of Hancock County shaped Jack’s sociable nature, while the local appreciation for both industry and the arts
    gave him a balanced perspective that blends technical rigor with creative curiosity.
