personas:
  professional: Jorge Aguilar, a doctoral candidate in STEM education who blends advanced data analysis (Python, R, MATLAB) with oil‑painting visualizations, leverages their relaxed, flexible approach to
    design interdisciplinary curricula, and uses their empathetic, collaborative nature to mentor under‑represented undergraduate students.
  sports: Jorge Aguilar, an avid weekend hiker who captures sunrise shots along the Pacific Crest Trail, plays casual soccer with the community club Trailblazers FC, follows the Los Angeles Dodgers and
    Golden State Warriors, and treats gym sessions as flexible extensions of their research breaks rather than regimented workouts.
  arts: Jorge Aguilar, a dedicated oil painter who channels the surrealism of Salvador Dalí and the vibrant colors of Frida Kahlo into classroom visuals, strums acoustic guitar to the tunes of José González
    and John Mayer, and curates weekly visits to local galleries showcasing emerging artists like Maya Lin, allowing them to weave artistic inspiration into every lesson.
  travel: Jorge Aguilar, who prefers loosely planned road trips that combine hiking in Patagonia, street‑food tasting in Oaxaca, and spontaneous photo‑ops at Barcelona’s Sagrada Família, yet dreams of witnessing
    the Northern Lights over Iceland’s icy landscapes next winter, often mapping out itineraries with their phone’s wanderlust app.
  culinary: Jorge Aguilar, an enthusiastic home‑cook who masters dishes such as cochinita pibil, chiles en nogada, and homemade corn tortillas, enjoys experimenting with ancho chilies, epazote, and fresh
    tomatillos, but often forgets to set timers, resulting in the occasional charred taco.
  core: Jorge Aguilar, a 39‑year‑old STEAM‑focused scholar who swaps lab coats for paintbrushes, hikes with a camera, and habitually misplaces research notes while still finding time to jam on their acoustic
    guitar.
background:
  cultural: Born to Mexican immigrants in Leeds, Alabama, Jorge grew up bilingual, juggling Spanish at home and English in school. He celebrates Mexican traditions such as Dia de los Muertos, posadas, and
    family gatherings, while also embracing Southern hospitality and community values. His heritage informs his collaborative, harmony-seeking personality and drives his commitment to supporting under-represented
    students in STEM. He often weaves Mexican folk-art motifs and stories into his visual presentations, creating a cultural bridge between his Mexican roots and his American environment.
attributes:
  skills: '["Python programming", "R statistical analysis", "MATLAB", "Experimental design", "Laboratory safety and protocols", "Scientific writing", "Curriculum development", "Student mentorship", "Public
    speaking", "Digital data visualization", "Educational technology (LMS, virtual labs)", "Digital illustration"]'
  hobbies: '["Oil painting", "Sketching", "Visiting art galleries and museums", "Photography", "Playing acoustic guitar", "Cooking traditional Mexican dishes", "Reading science-fiction and magical realism",
    "Listening to podcasts on science, philosophy, and art", "Hiking on local trails", "DIY electronics projects (Arduino, Raspberry Pi)", "Volunteering for community science outreach programs"]'
  career_goals: Jorge is pursuing a doctoral degree in STEM education with a focus on STEAM integration, aiming to secure a tenure-track faculty position where he can develop interdisciplinary courses that
    blend scientific rigor with artistic creativity. He aspires to establish a community outreach program that mentors Mexican-American and other under-represented students in STEM, and to publish research
    on innovative teaching methods that promote flexible, student-centered learning environments. Flexibility and the opportunity to explore new ideas remain central to his long-term career vision.
