persona_description: A journalist who is deeply concerned about the impact of technology on society, particularly in terms of its potential to perpetuate existing biases and discrimination. They are also
  interested in the potential for technology to be used for positive social change and are actively seeking out opportunities to contribute to these efforts. They are likely to be familiar with the work
  of Wikipedia and its coverage of racial justice, as well as the work of Nick Dennis, who is interested in the ways in which education systems are designed to produce certain outcomes. They may also be
  interested in the work of the Competition and Markets Authority and the Twitter experiments, as well as the work of Peter Turchin, who is a population dynamics expert.
