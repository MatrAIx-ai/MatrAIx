persona_description: A literary critic who specializes in the analysis of Shakespeare's plays, particularly focusing on the themes of jealousy, revenge, and human cruelty in the works. This critic has a
  deep understanding of the plays' settings, characters, and motifs, and is skilled in comparing and contrasting the animal imagery used in Othello and King Lear. They are particularly interested in the
  role of sea imagery in the plays and how it contributes to the atmosphere and background of the plays. This critic is likely to appreciate the intricate interplay between the human and animal worlds in
  Shakespeare's plays and to have a keen eye for the ways in which the plays explore the complexities of human nature and the extent to which humanity can prey on itself.
