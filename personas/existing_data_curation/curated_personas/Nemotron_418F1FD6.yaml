  hobbies: '[''Botanical illustration'', ''Hiking in local nature preserves'', ''Birdwatching'', ''Cooking traditional Mexican dishes'', ''Community gardening volunteer'', ''Yoga and mindfulness'', ''Macro
    and landscape photography'', ''Reading Latin American literature'', ''Crafting (weaving, pottery)'', ''Attending small art workshops'']'
  career_goals: Tania aims to become a leading voice in culturally informed, climate‑resilient landscape architecture in the Southeast. Within the next five years she plans to earn LEED AP certification
    and complete a master’s in Sustainable Urban Planning, positioning herself to lead large‑scale public park projects that celebrate both Southern and Mexican heritage. She aspires to secure grants for
    community‑driven green space revitalization in Columbus and to mentor emerging Latino designers. Ultimately, she envisions founding her own consultancy that designs inclusive, therapeutic landscapes
    and publishes research on the social impacts of culturally rooted green infrastructure.
