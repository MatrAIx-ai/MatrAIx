personas:
  professional: A landscape architect named Tania Riveraruiz leverages their expertise in plant ecology, climate‑adaptation modeling, and botanical illustration to create climate‑resilient public parks
    that weave native flora with culturally resonant garden motifs, balancing rigorous site analysis with community storytelling and empathetic stakeholder engagement.
  sports: Sportingly, Tania Riveraruiz enjoys weekend hikes in local nature preserves and birdwatching with the Columbus Hiking Club, practices yoga twice a week for flexibility, follows the Columbus Crew
    SC soccer team and the Cleveland Guardians baseball club, and occasionally joins community trail‑run meetups to stay active.
  arts: Artistically, Tania Riveraruiz dedicates evenings to detailed botanical illustrations and woven textile projects inspired by traditional patterns, devours Latin American literature by authors such
    as Gabriel García Márquez and Isabel Allende, attends intimate workshops featuring contemporary muralists, and finds creative stimulus in the works of Frida Kahlo and Diego Rivera.
  travel: Travel-wise, Tania Riveraruiz plans purposeful trips that blend research and relaxation, having explored Oaxaca’s historic gardens and Patagonia’s trekking routes, while also seeking inspiration
    in Asheville’s horticultural festivals and Kyoto’s Zen gardens, and they prefer detailed itineraries that balance cultural immersion with solo reflection.
  culinary: Culinary-wise, Tania Riveraruiz delights in preparing traditional dishes like mole poblano, chiles en nogada, and homemade corn tortillas using fresh cilantro, epazote, and dried chilies, cooks
    at a moderate skill level that shines during small gatherings, occasionally over‑seasoning to achieve bold flavors, and enjoys pairing meals with locally sourced mezcal or craft beer.
  core: Evolving as a 33‑year‑old landscape architect, Tania Riveraruiz channels scientific rigor, artistic sensitivity, and a compassionate, slightly anxious disposition into designing climate‑resilient,
    culturally rich green spaces that nurture community wellbeing.
background:
  cultural: Raised in a Mexican‑American household, Tania grew up with the vibrant colors, textures, and garden traditions of her heritage. Her parents taught her the value of communal spaces, from family
    courtyards to neighborhood fiestas, which informs her commitment to designing public realms that foster social connection. Bilingual in English and Spanish, she often incorporates Mexican plant species
    such as agave, bougainvillea, and Mexican feather grass into her Southern projects, adapting them to the USDA Hardiness Zone of Lowndes County. She stays connected to the local Latino community through
    cultural festivals, cooking circles, and mentorship programs, using her background to bridge cultural narratives with the ecological needs of the Mississippi landscape.
