  hobbies: '[''Landscape photography'', ''Sketching and mixed‑media art'', ''DIY woodworking projects'', ''Reading about agricultural technology'', ''Off‑road ATV riding'', ''Fishing'', ''Attending county
    fairs and rodeos'', ''Community volunteer work'', ''Listening to classic country and folk music'']'
  career_goals: Michael aims to earn advanced certifications such as the OSHA forklift operator credential and the Certified Heavy Equipment Operator (CHEO) designation within the next two years. He envisions
    moving into a supervisory role, overseeing a fleet of tractors and industrial trucks while mentoring newer operators. Long‑term, he aspires to launch a modest agribusiness service that integrates modern
    telematics and sustainable fuel practices, allowing him to combine his technical expertise with innovative, environmentally conscious solutions for local farms.
