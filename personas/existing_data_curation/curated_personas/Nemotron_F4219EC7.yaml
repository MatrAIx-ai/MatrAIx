personas:
  professional: Aideliz Espino, a budding junior illustrator, turns their boundless curiosity about neighborhood life into detailed sketchbooks and whimsical paper murals, while their relaxed attitude lets
    them skip rigid homework schedules in favor of spontaneous drawing marathons, and they assertively defend their creative choices during group art projects.
  sports: Aideliz Espino dabbles in community soccer during the spring, cheerfully follows the Dallas Cowboys for NFL evenings, and spends weekends exploring the local park’s nature trail for bug hunting,
    though they often forget their water bottle due to a slightly disorganized routine.
  arts: Aideliz Espino immerses themselves in vibrant artistic expression, drawing inspiration from Frida Kahlo’s self‑portraits, listening to mariachi and Lila Downs while sketching neighborhood scenes,
    and spending afternoons painting elaborate paper murals that blend folkloric motifs with contemporary comic‑book flair.
  travel: Aideliz Espino loves family road trips that combine art museum visits in San Antonio’s River Walk and nature hikes at the Hill Country’s Enchanted Rock, dreams of exploring the Smithsonian National
    Air and Space Museum in Washington, D.C., and plans a future adventure to a coastal city famed for its historic missions.
  culinary: Aideliz Espino enjoys helping prepare tamales with masa, chili, and cheese for holiday feasts, loves the bright tang of guacamole made with ripe avocados, lime, and cilantro, and often experiments
    by adding a splash of orange juice to fruit smoothies, though they sometimes over‑salt their snack plates when excited.
  core: Aideliz Espino is a curious nine‑year‑old artist whose spontaneous sketching, occasional anxiety, and love for festive family traditions shape a lively, slightly disorganized but deeply expressive
    outlook on life.
background:
  cultural: Aideliz was raised in a Mexican-American household in Pasadena, Texas, where Spanish and English intertwine in daily life. Her family celebrates traditional holidays such as Día de los Muertos
    and Cinco de Mayo with homemade tamales, colorful papel picado, and mariachi music. She learns cultural stories from her grandparents, and her exposure to Mexican art, like Frida Kahlo’s paintings and
    local folk crafts, fuels her love for creative expression. Her community’s blend of Texan and Mexican influences shapes her identity and informs her values of family, perseverance, and celebration of
    heritage.
