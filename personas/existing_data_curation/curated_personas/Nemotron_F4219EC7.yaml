  career_goals: She dreams of becoming an artist who can share her feelings through pictures, or perhaps a scientist who explores the natural world. She also imagines working with animals as a veterinarian,
    inspired by trips to the local farm. Aideliz hopes to travel and experience different cultures while keeping a flexible lifestyle that allows her to create art whenever inspiration strikes.
