  hobbies: '[''Pick‑up basketball'', ''Listening to hip‑hop and R&B'', ''Podcast listening'', ''Reading graphic novels'', ''Cooking family recipes'', ''Exploring local parks and coastal trails'']'
  career_goals: Over the next few years, Moses aims to earn his GED and enroll in an associate degree program in Library and Information Science. He aspires to become a certified library technician and
    eventually take on a supervisory role overseeing community outreach and youth literacy programs. He hopes to design and lead an after‑school reading club that integrates technology and cultural storytelling,
    and later pursue a bachelor's degree to qualify for a full librarian position.
