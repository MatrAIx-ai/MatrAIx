personas:
  professional: Moses Jeter, a 24‑year‑old library assistant, blends curiosity and practicality by using digital platforms and community tutoring to run informal literacy events while navigating a relaxed,
    sometimes disorganized schedule that nevertheless delivers reliable service and keeps them on track toward a certified library technician credential.
  sports: Moses Jeter regularly joins pick‑up basketball at the community park, cheers for the Golden State Warriors and follows the San Francisco 49ers, belongs to the Bay Area Amateur Basketball League,
    and participates in weekend hikes with the local Coastline Hiking Club.
  arts: Moses Jeter curates playlists featuring Kendrick Lamar, J Cole, H.E.R., and Anderson .Paak, attends live shows at the historic Fillmore, reads graphic novels like Saga and The Sandman, and cites
    Hamilton and Black Panther as favorite performances that shape their creative outlook.
  travel: Moses Jeter enjoys weekend getaways to coastal towns such as Santa Cruz and Monterey, has backpacked sections of the Oregon Coast Trail, and dreams of exploring the historic streets of New Orleans
    and the beaches of Maui, balancing spontaneous road trips with occasional budget constraints.
  culinary: Moses Jeter experiments in the kitchen with Southern staples like shrimp & grits, collard greens, and cornbread, spices them with hot sauce, while also mastering quick ramen bowls and weekend
    taco nights, showcasing a moderate cooking skill that blends family tradition and youthful curiosity.
  core: Moses Jeter blends a laid‑back curiosity with a passion for community storytelling, juggling a love for hip‑hop beats, pick‑up basketball, and Southern cooking while navigating occasional disorganization
    and a craving for new experiences.
background:
  cultural: Moses was raised in Brockton’s vibrant African‑American community, where family ties and neighborhood support are central. His parents, both first‑generation immigrants from the Southern United
    States, instilled a respect for storytelling, music, and community service. He grew up attending local church gatherings and cultural events that celebrated black history and resilience, such as Juneteenth
    parades and African‑American heritage festivals. These experiences have shaped his worldview, emphasizing collective uplift, the importance of education, and a deep appreciation for cultural expression
    through music, food, and oral tradition.
attributes:
  skills: '[''Customer Service'', ''Library Cataloging'', ''Digital Resource Navigation'', ''Community Outreach'', ''Basic Tutoring'', ''Event Coordination'', ''Reading Program Assistance'', ''Microsoft
