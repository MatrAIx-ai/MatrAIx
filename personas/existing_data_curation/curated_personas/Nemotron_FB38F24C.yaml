  hobbies: '[''Walking and Trail Biking'', ''Mindfulness Meditation'', ''Gardening'', ''Reading True‑Crime Books'', ''Journal Writing'', ''Knitting'', ''Amateur Photography'', ''Small‑Group Book Club'',
    ''Cooking Family Recipes'']'
  career_goals: Deborah aims to transition into a supervisory role within the next three years, seeking promotion to Sergeant to lead a crisis‑intervention unit. She hopes to develop a department‑wide training
    program focused on mental‑health crisis response and officer well‑being, leveraging her own experience with anxiety and emotional resilience. Long‑term, she envisions a role as a community liaison or
    senior trainer, bridging law‑enforcement practices with community needs and fostering trust in the Lansing‑Cook County area.
