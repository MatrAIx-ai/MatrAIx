personas:
  professional: An experienced police officer, Deborah Sutkowski leverages two decades of frontline patrol, crisis‑intervention training, and meticulous investigative skills to lead calm, empathetic responses
    to domestic‑violence calls while quietly mentoring junior officers toward community‑oriented policing, a role they find both challenging and fulfilling.
  sports: A dedicated low‑impact athlete, Deborah Sutkowski enjoys regular walks on the Kalamazoo River trail, weekly rides with the Lansing Cycle Club, and occasional pick‑up basketball games at the Michigan
    State campus gym, cheering on the Detroit Lions on Sundays and following the Lansing Lugnuts during spring and summer, a routine they maintain to keep stress at bay.
  arts: An avid cultural consumer, Deborah Sutkowski devours true‑crime masterpieces by Ann Rule and Michelle McNamara, sketches seasonal Midwestern landscapes inspired by Ansel Adams, knits scarves while
    listening to folk singer Sarah Jarosz, and participates in a small‑group book club that discusses contemporary crime documentaries, which they find both soothing and intellectually stimulating.
  travel: A thoughtful explorer, Deborah Sutkowski prefers low‑key weekend getaways to places like Mackinac Island, Door County, and the Upper Peninsula's Pictured Rocks, planning trips around daylight
    hours to avoid jet lag, often traveling by car to stay within a modest budget and to bring along her portable garden harvest for fresh meals, while dreaming of a solo autumn drive through New England's
    foliage, which they consider a quiet antidote to city stress.
  culinary: A home‑grown food enthusiast, Deborah Sutkowski cultivates carrots, beets, and kale in her backyard and translates those harvests into rustic dishes such as roasted beet and goat cheese salad,
    skillet zucchini frittata, and herb‑infused chicken broth, displaying intermediate cooking skill while occasionally indulging in a family‑style Sunday pot roast that they consider the centerpiece of
    their close‑knit gatherings.
  core: Deborah Sutkowski, a diligent police veteran with a keen eye for detail, balances a love for solitary nature walks, meticulous budgeting, and heartfelt knitting against a backdrop of anxiety that
    fuels both their empathy and occasional over‑cautiousness.
background:
  cultural: Deborah’s family is of Polish‑American descent, a heritage reflected in her surname Sutkowski and in occasional participation in local Polish festivals and church traditions in the Chicago suburbs.
    Growing up in the Midwest, she internalized values of practicality, community responsibility, and modesty. The mix of Midwestern work ethic and Polish cultural emphasis on family and charity influences
    her cooperative approach at work and her dedication to community‑focused policing. While she identifies primarily as American, she maintains a connection to her heritage through traditional holiday
    foods and a small community of Polish‑speaking relatives.
attributes:
  skills: '[''Patrol Operations'', ''Traffic Enforcement'', ''Community Policing'', ''Crisis Intervention'', ''Domestic Violence Response'', ''Mental‑Health Emergency Management'', ''Conflict Mediation'',
