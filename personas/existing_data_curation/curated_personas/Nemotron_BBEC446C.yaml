    ''Data analysis and machine learning (Python, MATLAB)'', ''3D printing for rapid prototyping'', ''Custom pigment and color science for art collaborations'', ''Grant writing'', ''Mentoring and team leadership'',
    ''Regulatory compliance and safety management'']'
  hobbies: '[''Visiting art museums (High Museum, MOCA GA)'', ''Attending jazz and blues concerts'', ''Playing saxophone'', ''DIY pigment creation using natural materials'', ''Street‑art photography along
    the BeltLine'', ''Herb gardening and organic dye production'', ''Cooking soul‑food with contemporary twists'', ''Reading science‑fiction and philosophy'', ''Mentoring youth through community science
    outreach'', ''Exploring local festivals and cultural events (Juneteenth, Atlanta Black Arts Festival)'']'
  career_goals: Wilbert aims to spearhead a sustainability‑focused R&D program within his company, creating biodegradable polymer systems that replace petro‑based plastics. He envisions securing a patent
    for a novel bio‑composite material and publishing a series of papers that link material science with visual art. Beyond corporate achievements, he plans to mentor the next generation of Black scientists
    through university outreach and community workshops, and to launch a public art initiative that uses his material innovations in large‑scale installations across Atlanta. As he approaches retirement,
    Wilbert hopes to transition into a consulting role that allows him to advise startups on green material strategies while authoring a popular‑science book that celebrates curiosity and unconventional
    thinking in scientific careers.
