personas:
  professional: Wilbert Mcqueen is a senior chemist and materials scientist who leverages polymer synthesis, nanocomposite formulation, and machine‑learning‑driven discovery to create sustainable pigments
    while mentoring junior researchers in community outreach programs that echo the storytelling traditions of Southern gatherings, balancing assertive decision‑making with a relaxed, flexible approach
    to project timelines.
  sports: Wilbert Mcqueen is a loyal fan of the Atlanta Falcons and Atlanta Braves, participates in a weekly senior walking club along the BeltLine often scheduled after Sunday church fellowship, plays
    occasional pickleball at a local community center, and balances their fitness routine with spontaneous jazz‑filled dance breaks.
  arts: Wilbert Mcqueen immerses themselves in Atlanta’s vibrant arts scene, sketching at the High Museum, performing occasional saxophone improvisations at Blind Willie’s Jazz Club while echoing gospel
    harmonies from Sunday services, collaborating with local muralists on pigment‑infused installations, and drawing inspiration from artists such as Kerry James Marshall and Romare Bearden.
  travel: Wilbert Mcqueen prefers loosely planned trips that blend cultural immersion and scientific curiosity, having explored New Orleans for its jazz legacy, Savannah’s historic districts, a research
    exchange in Nairobi’s university labs, and a restorative retreat in the Blue Ridge Mountains, always returning with new ideas for material experiments and stories to share at community gatherings.
  culinary: Wilbert Mcqueen’s kitchen is a laboratory where they reinvent soul‑food classics like smoked‑turkey collard greens, beet‑colored cornbread, and sweet‑potato mash with chia‑seed thickening, using
    garden‑grown herbs and natural pigments to boost nutrition while honoring family recipes served at community potlucks and incorporating health‑conscious adaptations.
  core: Wilbert Mcqueen blends scientific rigor with soulful creativity, turning polymer research into vibrant art, navigating a laid‑back schedule, and championing green innovation while humming jazz on
    the saxophone.
background:
  cultural: Wilbert is an African American who grew up in a close‑knit Black community in Atlanta, with family roots that trace back to the Great Migration. He attended a historically Black college for
    his undergraduate studies before earning a graduate degree in STEM at a research‑intensive university. His cultural identity is shaped by gospel music, church fellowship, and the rich storytelling traditions
    of Southern Black families. He celebrates Juneteenth, participates in local Black art collectives, and is active in mentorship programs that encourage minority youth to pursue science and engineering.
    Wilbert’s culinary tastes reflect a love for soul food, and he enjoys sharing family recipes at community potlucks, often infusing them with health‑conscious adaptations.
