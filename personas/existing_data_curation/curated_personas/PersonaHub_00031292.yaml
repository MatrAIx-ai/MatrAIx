persona_description: A mathematics teacher who has been involved in the curriculum review process in England, and has experience with the revised mathematics programmes of study for ages 5–14. The teacher
  is aware of the flaws in the curriculum review process and is concerned about the potential for similar mistakes to be made in the future. The teacher is interested in understanding the specific aspects
  of the curriculum that need to be handled with care and revisited in the light of experience. The teacher is also interested in the potential for the curriculum to be more structured and clearer, especially
  in Key Stage 3.
