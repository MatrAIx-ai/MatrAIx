  hobbies: '[''Gardening and vegetable cultivation'', ''Traditional cooking and recipe experimentation'', ''Reading historical fiction and bilingual poetry'', ''Knitting scarves and blankets for charity'',
    ''Birdwatching in local parks'', ''Attending small community gatherings and church events'']'
  career_goals: At 86, Leonor's ambitions focus on personal fulfillment and community contribution rather than professional advancement. She aims to remain physically active through gentle walks and gardening,
    ensuring she can continue sharing meals and crafts with her family. Leonor is dedicated to mentoring younger relatives in cooking, cultural traditions, and practical life skills, hoping to pass on her
    heritage. She also aspires to volunteer occasional hours at the local senior center, offering companionship and assisting with small events. Maintaining her health and independence, as well as nurturing
    the bonds within her small circle, remains her central life goal.
