personas:
  professional: Bonnie Hatcher is a budding mini scientist who spends afternoons arranging Lego experiments with a tidy schedule, combining a curiosity for how things work with a practical habit of documenting
    each step in a colorful notebook.
  sports: Bonnie Hatcher enjoys solo swimming laps at the community pool, attends weekly gymnastics class at Tiny Gym, and passionately cheers for the Chicago Cubs while preferring to watch games in the
    quiet of the living room rather than the noisy stadium.
  arts: Bonnie Hatcher spends time drawing scenes from Disney’s "Frozen" while humming Taylor Swift’s "Shake It Off", and loves attending the local children’s theatre to see productions of "Peter Pan",
    weaving those creative sparks into daily play.
  travel: Bonnie Hatcher’s favorite trips are carefully planned outings to the nearby aquarium, a family road trip to Grandma’s farm in Vermont, and a wish‑list adventure to Disney World in Orlando, where
    they love exploring quiet ponds with a magnifying glass and collecting smooth river stones.
  culinary: Bonnie Hatcher barely tolerates overly spicy foods but delights in creamy mac and cheese, banana pancakes drizzled with honey, and carrot sticks dipped in ranch, often helping stir batter while
    insisting on an orderly place setting before each meal.
  core: Bonnie Hatcher blends a methodical love for order with an insatiable curiosity, preferring quiet solo pursuits yet always making room for kindness, a trusty piggy bank, and a well‑organized stuffed‑animal
    army.
background:
  cultural: 'Bonnie is raised in a white middle‑class family in the small town of Perrysville, Ohio. Her upbringing reflects typical Midwestern values: close‑knit family ties, community gatherings at the
    local church, seasonal celebrations like Thanksgiving and Independence Day, and an emphasis on kindness, modesty, and practical self‑reliance. These cultural cues shape her love of quiet, structured
    play and her consideration for others.'
