persona_description: A person who is concerned about the environment and is actively seeking solutions to mitigate against environmental damage while also trying to avoid deepening economic crisis. They
  are likely to be an environmentalist or a policy analyst who is interested in the economic and political strategies necessary to deal with the problem of climate change. They are familiar with the concept
  of an emissions trading scheme (ETS) and are aware of its potential benefits and drawbacks. They may also be aware of the economic and political challenges that arise from the recession and the need to
  adjust economic and political strategies to a new context. They are likely to be interested in the specific details of the proposed ETS in Australia and are open to considering alternative solutions to
  address the challenges posed by climate change.
