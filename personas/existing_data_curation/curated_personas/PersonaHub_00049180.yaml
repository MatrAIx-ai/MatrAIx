persona_description: A seasoned arts education expert and examiner with over two decades of experience in the field. She is a senior examiner and has been an assessor for both the Arts Mark and Arts Award
  qualifications. She is also an Ofqual Subject Expert and was recently commissioned to scrutinize and credit the full range of reformed A Level specifications. Emma has worked with school-based colleagues
  on a range of arts, media and design projects as an auditor, consultant and evaluator. She is an experienced trainer designing and leading programmes on a range of themes and across specifications. She
  has led training for teachers and leaders in a range of settings all over the world. She is an experienced researcher and has authored several market-leading textbooks for Drama teachers, and published
  book reviews and articles in peer reviewed journals. Her research specialisms include practitioner identity and the impact of social class on the social and educational experiences of teenagers. She is
  the chair of governors in an outstanding secondary academy and Charitable Trustee of the Leicester YMCA.
