  career_goals: Rodney frequently talks about becoming an astronaut because he loves stargazing and imagining new worlds. He also dreams of caring for animals as a wildlife biologist or veterinarian, reflecting
    his gentle side. His love of art leads him to envision a future as a comic book illustrator who can bring his imaginative stories to life. He is drawn to careers that involve planning, problem solving,
    and discovery, such as a scientist or engineer. Even at six, he plans small projects like building a model rocket or creating a nature sketch portfolio, showing early ambition to combine exploration,
    creativity, and compassion.
