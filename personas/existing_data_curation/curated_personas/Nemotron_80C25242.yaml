personas:
  professional: Rodney Obando, a budding junior explorer, channels their curiosity and methodical nature into building intricate space-themed LEGO constructions, treating each set like a miniature engineering
    project.
  sports: Rodney Obando, a member of the Riverdale Rovers youth soccer club, spends Saturday afternoons practicing drills before cheering for the Seattle Mariners, and they approach fitness with the same
    careful order they apply to LEGO builds, preferring structured play over chaotic free-run.
  arts: Rodney Obando, who devotes afternoons to drawing vibrant space scenes, draws inspiration from the whimsical worlds of Dr. Seuss and the bold color palettes of Mary Blair, and they eagerly absorb
    the storytelling of Pixar's "Wall-E" while attending library art workshops that feed their imaginative curiosity.
  travel: Rodney Obando, whose wanderlust is guided by picture-book maps, has explored the local zoo and nearby state park on family nature walks, dreams of visiting the Smithsonian National Air and Space
    Museum in Washington D.C., and they favor short, well-planned trips with a parent's hand in hand over spontaneous long journeys.
  culinary: Rodney Obando, who delights in the tactile fun of making a peanut-butter-and-jelly sandwich and proudly mixes sliced strawberries into a bowl of vanilla yogurt, shows modest kitchen confidence
    by stirring pancake batter, yet they often resist broccoli on their plate, preferring cheese pizza and carrot sticks.
  core: Rodney Obando is a methodical mini-scientist whose endless curiosity fuels meticulous LEGO constructions, yet their worry-prone temperament leads to occasional meltdowns over spilled crayons.
background:
  cultural: Rodney is a White American child raised in Basom, a small hamlet in Erie County, New York. His family lives a typical middle‑class suburban lifestyle that values education, community involvement,
    and outdoor activities tied to the four‑season climate of upstate New York. He attends the local elementary school and participates in community events such as county fairs, library storytimes, and
    seasonal celebrations like Thanksgiving and the Fourth of July. The family observes common American holidays and often gathers for neighborhood block parties in the summer. Growing up in this region,
    Rodney is exposed to a blend of mainstream American culture—baseball, cartoons, school recess—and local traditions, including winter sledding and summer trips to nearby lakes. His upbringing reflects
    a blend of practical diligence, curiosity encouraged by his parents, and a gentle appreciation for the arts and nature that shape his personality.
