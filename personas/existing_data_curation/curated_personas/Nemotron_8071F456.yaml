personas:
  professional: Joshua Scroggin, a reliable hospitality professional who currently works as a baggage porter and concierge, they leverage their methodical approach to luggage handling, guest interaction,
    and property management software to consistently deliver seamless service, while actively pursuing a Certified Hospitality Supervisor credential and a future role as a Bellhop Team Lead or Front Desk
    Manager at a mid‑size resort.
  sports: Joshua Scroggin, an avid hiker and fisherman, they map and tackle the Selkirk and Coeur d’Alene mountain trails each weekend, frequent Lake Coeur d’Alene for trout fishing, support the Spokane
    Chiefs hockey team, and participate in a local adult soccer league to stay active.
  arts: Joshua Scroggin, a lover of historical fiction by Ken Follett and Bernard Cornwell, they capture sunrise vistas inspired by Ansel Adams with their DSLR, craft wooden furniture in their spare time,
    and wind down listening to Sufjan Stevens' folk‑indie albums while sipping coffee.
  travel: Joshua Scroggin, a meticulous planner, they prefer road‑trip adventures that start with detailed topographic maps, have already conquered Glacier National Park’s Going‑to‑the‑Sun Road, and dream
    of hiking the Canadian Rockies in Banff, balancing budget constraints with a thirst for scenic discovery.
  culinary: Joshua Scroggin, a modest home chef, they delight in cooking family‑style campfire chili with beans, potatoes, and smoked paprika, master pan‑seared trout with lemon‑dill butter, and experiment
    with rosemary‑infused roast potatoes, though they occasionally overcook rice when distracted by a chess match.
  core: Joshua Scroggin, who blends meticulous planning with outdoor adventure and hands‑on craftsmanship, they embody a life that values structure, harmony, and the quiet satisfaction of a well‑executed
    plan.
background:
  cultural: Joshua is a White American raised in the Pacific Northwest, drawing on a family heritage rooted in Midwestern and Anglo-Celtic traditions. Growing up in a modest, close-knit community in Idaho,
    he internalized values of hard work, self-reliance, and neighborly cooperation. The region's strong connection to outdoor recreation and seasonal cycles influences his appreciation for nature, fishing,
    and hiking. His humanities education adds a layer of cultural curiosity, while his work in hospitality reflects the American tradition of service and hospitality. He observes traditional holidays such
    as Thanksgiving and the Fourth of July, and participates in local events that emphasize community cohesion.
attributes:
  skills: '[''Luggage handling'', ''Concierge services'', ''Guest relations'', ''Reservation system management (OPERA)'', ''Logistics coordination'', ''Time management'', ''Team collaboration'', ''Conflict
    resolution'', ''Safety and inventory protocols'', ''Local area knowledge (Idaho outdoor recreation)'']'
  hobbies: '[''Hiking in Idaho\''s mountain trails'', ''Fishing on Lake Coeur d\''Alene'', ''Reading historical fiction'', ''Nature photography'', ''Woodworking projects'', ''Cooking for family'', ''Playing
    chess'', ''Volunteering at local community events'']'
  career_goals: Joshua aims to leverage his structured work style into a supervisory position within the hospitality field, such as a Bellhop Team Lead or Front Desk Manager, within the next three years.
    He plans to obtain a Certified Hospitality Supervisor credential and eventually a Bachelor's in Hospitality Management to broaden his managerial expertise. His long-term ambition is to oversee guest-service
    operations at a mid-size resort or to co-own a boutique bed-and-breakfast that highlights the natural beauty of the Kootenai region. Throughout his career progression, he is committed to improving guest
    satisfaction scores and streamlining service processes.
