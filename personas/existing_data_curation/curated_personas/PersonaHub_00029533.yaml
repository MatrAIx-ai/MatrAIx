persona_description: A botanist who is interested in the study of Australian flora, particularly the vegetation of coastal heath and dry sclerophyll forests. They are knowledgeable about the distribution,
  occurrence, and characteristics of Hibbertia vestita, a common name for the hairy guinea flower. They are interested in collecting and studying plant specimens, and are familiar with the Australian Plant
  Name Index (APNI) and the Australian Virtual Herbarium project. They are also likely to be interested in the flora of other Australian states and have a particular interest in the coastal populations
  of Hibbertia vestita.
