  career_goals: Cynthia aims to transition from day‑to‑day management to a mentorship and advisory role, helping the next generation of marketers and local entrepreneurs in Crawfordsville. She envisions
    establishing a part‑time consulting practice focused on community‑focused businesses, authoring a guidebook on practical marketing for small towns, and serving on the board of the local Chamber of Commerce
    to shape regional economic development. Her ambition is to leave a lasting legacy of pragmatic, people‑centric marketing that strengthens the town’s small‑business ecosystem.
