personas:
  professional: Cynthia Rood, a seasoned marketing strategist in Crawfordsville, blends decades of small‑business brand storytelling with a hands‑on, data‑driven approach, mentoring local entrepreneurs
    while juggling a flexible schedule and a competitive drive that pushes their teams to outpace regional benchmarks.
  sports: Cynthia Rood stays active by line‑dancing at the community hall, cheering for the Indianapolis Colts and Purdue Boilermakers, and participating in a senior bowling league at the local recreation
    center during the fall season, where they enjoy friendly competition.
  arts: Cynthia Rood leads a beloved book club featuring authors like John Steinbeck and Barbara Kingsolver, enjoys classic folk music from The Wailin’ Jennys, and attends monthly performances at the historic
    Crawfordsville theater, where they often discuss the plays with fellow members.
  travel: Cynthia Rood prefers spur‑of‑the‑moment road trips to Midwest destinations such as Letchworth State Park, the Amish country of Holmes County, and the annual Tulip Festival in Geneva, balancing
    their love of regional festivals with a limited travel budget and a flexible itinerary.
  culinary: Cynthia Rood delights in cooking classic Midwestern dishes like chicken and dumplings, corn casserole, and apple‑butter pork tenderloin, often using fresh herbs from their garden such as basil
    and thyme, though they sometimes forget to restock staples like flour and sugar.
  core: Cynthia Rood is a curious yet practical 71‑year‑old who blends community‑centric marketing expertise with a love of gardening, line‑dancing, and spontaneous road trips, all while juggling a relaxed
    approach to organization and a competitive edge that drives them forward.
background:
  cultural: Cynthia was raised in a white, Midwestern family with deep roots in Indiana’s farming communities, tracing ancestry to German and Irish immigrants who settled in Fountain County. Her upbringing
    emphasized self‑reliance, modesty, and community service—values reinforced through regular church attendance and local civic engagements. The small‑town culture prized friendly interaction, practical
    problem‑solving, and a healthy skepticism toward outside influences, shaping Cynthia’s balanced outlook that blends curiosity with grounded, practical decision‑making.
