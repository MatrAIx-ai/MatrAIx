persona_description: A pediatrician or public health expert who is conducting research on the effectiveness of intermittent preventive treatment in children (IPTc) for preventing malaria in preschool children
  living in malaria endemic areas with seasonal transmission. The researcher is interested in evaluating the effects of IPTc to prevent malaria in children aged six years or less, taking into account the
  potential benefits and risks of the treatment. The researcher is looking for evidence-based recommendations for the implementation and management of IPTc in these settings.
