  career_goals: Francisco aims to transition from a senior information systems manager to a Chief Information Officer within the next five years, positioning himself as a strategic leader who can drive
    digital transformation while preserving organizational flexibility. He aspires to champion innovative tech‑art initiatives that blend his managerial expertise with his love for contemporary art, possibly
    launching a cross‑disciplinary consultancy that serves museums, cultural institutions, and creative startups. Additionally, he seeks to mentor emerging Puerto Rican talent in the tech sector, fostering
    greater representation and community development in South Florida.
