personas:
  professional: Francisco Urbina, a senior information systems manager with a knack for aligning cloud strategy (AWS, Azure) and cybersecurity risk assessment to business goals, leverages their calm, resilient
    nature and curiosity for unconventional thinking to mentor their team and embed user‑experience design into tech solutions, all while juggling a loosely organized schedule that favors flexibility over
    strict planning.
  sports: Francisco Urbina enjoys weekend sailing with the South Florida Intracoastal Yacht Club, plays pick‑up basketball at a Miami community court, follows the Miami Heat and Miami Dolphins avidly, and
    jogs along the beach to stay fit, though their disorganized schedule sometimes leads to missed gym sessions.
  arts: Francisco Urbina frequently visits small galleries showcasing contemporary Caribbean painters like Luis Camnitzer and attends intimate concerts featuring the salsa rhythms of Eddie Palmieri, the
    jazz improvisations of Pat Metheny, and the indie folk stylings of Sufjan Stevens, drawing inspiration from these experiences for their digital photography projects.
  travel: Francisco Urbina prefers spontaneous, mid‑week escapes, sailing the Florida Keys, exploring the historic streets of Old San Juan, and dreaming of a future trek to the Caribbean island of Dominica
    for its volcanic landscapes, all while balancing a modest budget that favors off‑peak airfare and boutique B&Bs over luxury resorts.
  culinary: Francisco Urbina enjoys cooking traditional Caribbean dishes such as mofongo made with plantains, chicharrón, and sofrito, alongside arroz con gandules seasoned with epazote and achiote, boasting
    a solid home‑chef skill level that blends experimental plating with occasional over‑spicing, and they relish dining at food‑focused pop‑up events featuring chefs like José Andrés.
  core: Francisco Urbina is a calm, curiosity‑driven tech leader who balances a love for avant‑garde art and sailing with a relaxed, sometimes chaotic approach to organization, often forgetting to file
    paperwork but never missing a sunset shot.
background:
  cultural: Francisco is a proud Puerto Rican who grew up bilingual, speaking both Spanish and English at home. His family traditions—weekly "comida" gatherings, celebration of festivals like San Juan,
    and the rhythmic sounds of bomba and plena—remain central to his identity. Living in West Palm Beach, he engages with the vibrant Caribbean community, participating in cultural events and supporting
    local Latin art initiatives. His heritage informs his values of family cohesion, resilience, and a collective spirit, which he brings to both his professional collaborations and community volunteer
    work.
