personas:
  professional: Brandon Hodge, a retired hand‑yman turned senior‑center mentor, channels their meticulous carpentry, small‑engine repair, and spreadsheet‑level budgeting skills into designing highly structured
    wellness workshops that pit participants in friendly competition while they vigilantly guard program quality against any slack, reflecting their practical, competitive, and slightly skeptical nature.
  sports: Brandon Hodge, a dedicated member of the Whitehall senior bowling league and a regular at the Muskegon county low‑impact aerobics class, roots for the Detroit Tigers while swapping fishing tales
    from Lake Michigan and hunting stories of seasonal deer, and they proudly wear their vintage Tigers cap during every community game night.
  arts: Brandon Hodge, an avid fan of classic cinema, quotes lines from Casablanca and watches Humphrey Bogart films on Sunday evenings, while their evenings also feature listening to Woody Guthrie’s folk
    ballads and attending Muskegon Museum of Art’s regional folk‑art exhibits, a blend that shapes their reflective yet grounded identity.
  travel: Brandon Hodge, a methodical planner who maps out road trips on a printed atlas, enjoys day‑long fishing expeditions to Door County’s quiet bays and cultural tours of Mackinac Island’s historic
    fort, and they dream of a guided journey to Colonial Williamsburg to deepen their love for early American history, all while budgeting travel costs to protect their retirement savings.
  culinary: Brandon Hodge, a competent home cook who harvests heirloom tomatoes and beans from their garden to whip up rustic tomato‑bean stew, lovingly prepares apple crumble for church potlucks, and they
    occasionally over‑salt their whitefish chowder in an effort to guarantee flavor, showcasing their practical yet occasionally over‑zealous culinary approach.
  core: Brandon Hodge blends a competitive, structure‑obsessed mindset with a warm, community‑driven spirit, yet their chronic worry and occasional over‑careful micromanagement make them both a dependable
    mentor and a self‑critical planner.
background:
  cultural: Brandon grew up in a post‑World‑War II, working‑class family in the Upper Midwest. His ancestors are of German‑Polish descent, a common heritage in northwestern Michigan, and his family maintained
    the Lutheran faith, later embracing the local Catholic church community. The tightly knit, blue‑collar culture of Michigan’s small towns instilled in him values of self‑reliance, hard work, and community
    service. Seasonal rituals—such as the annual county fair, Fourth of July fireworks over Lake Michigan, and a traditional Thanksgiving turkey hunt—are central to his identity. He appreciates the region’s
    outdoor traditions, including fishing, hunting, and gardening, and he carries a strong sense of loyalty to his hometown of Whitehall. These cultural influences shape his preference for structured community
    involvement and his competitive spirit in local sports leagues.
attributes:
