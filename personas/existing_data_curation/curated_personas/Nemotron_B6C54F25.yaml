  hobbies: '["Senior bowling league", "Bridge club", "Community church potluck gatherings", "Low‑impact aerobics classes", "Fishing trips on Lake Michigan", "Woodworking projects", "Gardening (vegetable
    and flower planting)", "Volunteer work at local food bank", "Muskegon County historical society meetings", "Classic movie watching", "Reading historical nonfiction"]'
  career_goals: Although retired, Brandon aims to channel his competitive drive and love of structure into a lasting community impact. He hopes to become a lead mentor for the senior center, designing structured
    wellness and skill‑sharing programs that encourage participation while fostering responsibility. He aspires to obtain a certification as a Medicare counselor to help fellow retirees navigate health
    coverage, reducing the stress he once felt. Brandon also wants to maintain his physical health by staying active in the local bowling league and achieving a top‑ranking spot, reflecting his competitive
    nature. Additionally, he seeks to develop his digital literacy—mastering video‑chat tools and social media—to stay connected with his grandchildren and document his family’s local history for future
    generations.
