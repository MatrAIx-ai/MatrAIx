personas:
  professional: Samiah Grijalva is an aspiring digital illustrator and budding interactive storyteller, merging hand‑drawn urban‑folk characters with Scratch‑coded narratives, and they channel their curiosity
    and relaxed, disorganized workflow into experimental visual projects for the school art club.
  sports: Samiah Grijalva enjoys casual hikes on Redwood trails and occasional after‑school jogs with the East Bay Youth Hiking Club, follows the San Jose Earthquakes for soccer inspiration, and they participate
    sporadically in the school’s cross‑country team, preferring low‑key, flexible fitness over regimented training.
  arts: Samiah Grijalva immerses themselves in graphic novels like 'Sandman' and 'Attack on Titan', draws inspiration from street muralist Shepard Fairey, watches anime director Hayao Miyazaki’s films,
    and they groove to musicians such as Rosalía, Bad Bunny, Phoebe Bridgers, and Tame Impala, weaving these influences into sketchbook characters that blend urban life with island folklore.
  travel: Samiah Grijalva prefers spontaneous weekend day‑trips to nearby Redwood forests and occasional family tours to coastal towns like Santa Cruz, while they dream of future adventures to Barcelona’s
    street‑art districts and Tokyo’s manga cafés, balancing a love for discovery with the modest budget of a high‑school student.
  culinary: Samiah Grijalva assists with family cooking, skillfully preparing aromatic rice and bean stews, sizzling plantain fritters, and fresh cilantro‑lime salsa, and they show an intermediate cooking
    level that mixes following beloved recipes with improvising extra herbs and spices for flavor.
  core: Samiah Grijalva is a curious, laid‑back teen who flips between sketching vibrant urban‑folk characters, coding quirky interactive stories, and day‑dreaming about street art adventures, and they
    occasionally misplace their sketchbook and forget to log money deposits.
background:
  cultural: Samiah’s family is of Puerto Rican descent, and she grew up in a bilingual household where Spanish is spoken alongside English. Cultural practices such as celebrating Three Kings Day, cooking
    platos like mofongo and arroz con gandules, and dancing to bomba and plena rhythms are woven into her daily life. Living in Redwood City, she experiences a vibrant mix of Bay Area multiculturalism,
    which deepens her appreciation for both her Caribbean heritage and the diverse artistic scene around her. She identifies strongly with the Puerto Rican diaspora, often sharing stories of the island’s
    history and contemporary issues with her peers, and seeks to bridge her cultural roots with the broader community through art.
attributes:
  skills: '[''Digital illustration (hand and tablet)'', ''Basic photo editing (GIMP/Canva)'', ''Bilingual communication (English/Spanish)'', ''Research and visual synthesis'', ''Storytelling through comics
    and photo essays'', ''Introductory coding (Scratch, Python)'', ''Collaborative project coordination (small groups)'', ''Empathetic communication and conflict resolution'', ''Creative problem‑solving'']'
  hobbies: '[''Sketching and digital illustration'', ''Reading graphic novels and manga'', ''Photography of street art and nature'', ''Listening to salsa, reggaeton, and indie music'', ''Bilingual journaling'',
    ''Cooking Puerto Rican dishes with family'', ''Participating in school art club'', ''Introductory coding with Scratch'', ''Hiking Redwood trails'', ''Visiting local museums and cultural festivals'']'
  career_goals: Samiah aspires to turn her artistic passions into a career that celebrates her cultural roots while embracing technology. She hopes to attend an arts‑focused high school and later study
    graphic design or illustration at a university in the Bay Area. Her long‑term ambition is to become a multidisciplinary visual storyteller—creating illustrated books, digital comics, or interactive
    media that highlight Puerto Rican stories and contemporary social themes. She also envisions launching a community art space or online platform where young Latinx creators can share their work and mentor
    each other.
