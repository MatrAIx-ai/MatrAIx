persona_description: A pediatric ophthalmologist who specializes in the diagnosis and treatment of glaucoma in children, particularly those with primary congenital glaucoma. They have experience with medical
  therapy, surgery, and the use of glaucoma drainage devices, and are knowledgeable about the potential side effects and limitations of these treatments. They are aware of the importance of lifelong follow-up
  and the need for individualized treatment plans, and are skilled in preparing patients and parents for the challenges of glaucoma surgery. They are also aware of the importance of informed consent and
  compliance issues in the management of children with glaucoma.
