personas:
  professional: Hoang Scarisbrick, a 34-year-old animal care specialist at a regional Texas shelter, blends meticulous observation skills with hands‑on woodworking to craft enrichment for small mammals
    and birds, and they channel a competitive, evidence‑driven mindset toward earning CVT certification and eventually leading a nonprofit wildlife‑rehabilitation center.
  sports: Hoang Scarisbrick enjoys solitary workouts like hiking the trails of Arbor Hills and birdwatching, participates in the Texas Ornithological Society’s weekend outings, and follows the Dallas Mavericks
    and Texas Rangers with a competitive streak, cheering quietly while keeping a modest, self‑paced fitness routine.
  arts: Hoang Scarisbrick finds creative renewal in wildlife documentaries by David Attenborough, Vietnamese folk ballads of Trịnh Công Sơn, and indie folk music from Bon Iver, while they occasionally unwind
    with the novel "The Overstory" and practice nature photography during quiet evenings.
  travel: Hoang Scarisbrick prefers meticulously planned nature‑focused trips, having explored the remote highlands of Vietnam during Tet, trekked Yellowstone National Park’s geyser basins, and visited
    the Texas Hill Country’s wildflower fields, and they now aim to journey to Borneo’s orangutan sanctuaries and Patagonia’s glacier trails while balancing a modest travel budget.
  culinary: Hoang Scarisbrick cooks Vietnamese staples like pho and bánh mì with confidence, seasoning broth with star anise, lemongrass, and fish sauce, and assembling sandwiches with cilantro, pickled
    carrots, and jalapeño; they enjoy experimenting by adding Texas smoked brisket to bánh mì, revealing a playful yet disciplined culinary style.
  core: Hoang Scarisbrick is a solitary, data‑driven animal‑care enthusiast whose competitive streak fuels meticulous welfare innovations, while anxiety and a love for quiet nature balance their pragmatic
    yet curious worldview.
background:
  cultural: Hoang is a first‑generation American of mixed heritage—his mother is Vietnamese and his father is of Anglo‑British descent, reflected in his surname Scarisbrick. Raised in a bilingual household
    in Texas, he speaks both English and Vietnamese and celebrates traditional holidays such as Tet, where family gatherings feature homemade dishes and ancestral veneration. The Vietnamese cultural emphasis
    on respect for nature and communal responsibility subtly informs his dedication to animal welfare, while the Texan work ethic reinforces his practical, hands‑on approach. Navigating these intersecting
    identities, Hoang balances the modest, reserved demeanor valued in his Vietnamese roots with the individualistic, competitive spirit he observes in his local community.
attributes:
  skills: '[''Animal handling (small mammals, birds, reptiles)'', ''Animal health monitoring and basic first aid'', ''Veterinary assisting (medication administration, wound care)'', ''Behavioral observation
    and assessment'', ''Habitat maintenance and enrichment design'', ''Nutritional planning for diverse species'', ''Digital record‑keeping and data management'', ''Emergency response and crisis management'',
    ''Client communication and education'', ''Inventory and supply management'', ''Familiarity with Texas animal‑welfare regulations'', ''Basic horticulture for enclosure plants'']'
  hobbies: '[''Birdwatching'', ''Hiking in nature preserves'', ''Journaling animal observations'', ''Woodworking for enrichment fixtures'', ''Reading scientific journals on animal welfare'', ''Meditation
    and deep-breathing exercises'', ''Cooking Vietnamese cuisine'', ''Watching wildlife documentaries'', ''Participating in online animal caretaker forums'', ''Playing simulation video games (e.g., Planet
    Zoo)'']'
  career_goals: Hoang aims to earn Certified Veterinary Technician (CVT) credentials within the next two years, positioning himself for a supervisory role at a regional animal shelter. He aspires to eventually
    lead a nonprofit wildlife‑rehabilitation center that rescues native Texas fauna, integrating data‑driven enrichment programs he develops. Driven by a competitive streak, he plans to become a recognized
    innovator in sanctuary design, publishing his methods in professional journals and mentoring newer caretakers while maintaining a pragmatic, evidence‑based approach.
