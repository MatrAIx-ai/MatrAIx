persona_description: A scientist who specializes in the study of genetic engineering, particularly the development and regulation of genetically modified organisms (GMOs) and the potential risks associated
  with them. The scientist is interested in the comparative evaluation of regulatory practices for GMOs containing dsRNA and the development of improved risk assessment procedures. The scientist has a background
  in molecular biology, genetics, and biochemistry and has conducted research on the safety and potential risks of genetically modified organisms. The scientist is a member of the European Network of Scientists
  for Social and Environmental Responsibility (ENSSER) and has published papers on the topic of genetic engineering and risk assessment. The scientist is interested in advancing public-good science and
  research for the protection of the environment, biological diversity, and human health against adverse impacts of new technologies and their products. The scientist is a strong advocate for benign and
  peaceful use of scientific discoveries and technological developments while expanding diverse approaches to assess their utility and safety in society.
