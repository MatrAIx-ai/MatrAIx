personas:
  professional: Jaclyn Sohn is a seasoned heavy‑duty diesel mechanic with three decades of hands‑on expertise, now channeling her curiosity and practical mindset into a consulting vision for regional fleets
    while juggling a relaxed, sometimes disorganized work style and a competitive edge that fuels her quest for ASE Master Technician certification.
  sports: Jaclyn Sohn, a member of the Western Oklahoma Fly‑Fishing Club, enjoys occasional mornings of fly‑fishing on the North Canadian River, follows the Oklahoma City Thunder and Dallas Cowboys with
    quiet enthusiasm, and maintains a simple fitness routine of weekend prairie walks and light weightlifting at the local senior recreation center.
  arts: Jaclyn Sohn finds artistic solace in the tactile rhythm of woodworking while listening to classic folk legends like Johnny Cash and Bob Dylan, peruses vintage automotive magazines and the writings
    of Henry Ford, and admires Ansel Adams' black‑and‑white prairie photography, letting those influences color her leisure time.
  travel: Jaclyn Sohn favors spontaneous road trips in her restored diesel tractor to scenic prairie towns like Medora, ND, and to the rugged beauty of Theodore Roosevelt National Park, balances a modest
    budget with a love for low‑key hikes at the Great Sand Dunes, and dreams of a future expedition to the historic diesel museum in West Fargo, all while preferring simple, driver‑less itineraries over
    elaborate tours.
  culinary: Jaclyn Sohn relishes hearty Midwestern fare—savoring chicken‑fried steak with homemade cornbread, whipping up smoked trout caught on her own fly‑fishing outings, and brewing a strong cup of
    dark roast coffee using a hand‑crank grinder—yet often misplaces ingredients while working on her bench, a quirk that adds a dash of chaos to her otherwise meticulous kitchen.
  core: Jaclyn Sohn is a calm, curiosity‑driven mechanic‑turned‑consultant who thrives in solitary, tactile projects, balances a competitive edge with a laid‑back, sometimes disorganized lifestyle, and
    lets the quiet of the prairie guide her pragmatic approach to life.
background:
  cultural: Jaclyn grew up in a multi‑generational farming family in western Oklahoma, inheriting the Midwestern work ethic and self‑reliance typical of white Oklahoman communities. Her heritage includes
    German and Irish ancestry, and she was raised in a Protestant (Methodist) household that emphasized modesty, community service, and practical problem‑solving. The rural culture of Custer County, with
    its strong ties to agriculture and the oil‑field economy, has shaped her pragmatic outlook and her preference for modest, close‑knit social circles.
attributes:
  skills: '["Diesel engine repair", "Hydraulic system maintenance", "Electrical diagnostics", "Welding and fabrication", "Preventive maintenance planning", "Telematics and emissions control", "Parts inventory
    management", "OSHA safety compliance", "Apprentice mentorship"]'
  hobbies: '["Vintage tractor restoration", "Reading automotive manuals", "Woodworking", "Bird‑watching", "Fly‑fishing", "Small‑group mechanics round‑table"]'
  career_goals: Jaclyn aims to transition from day‑to‑day shop work to a consulting role where she can advise regional fleets on reliability and cost‑effective maintenance strategies. She plans to obtain
    ASE Master Technician certification and to develop a mobile‑service unit that can travel to remote job sites across western Oklahoma. Over the next five years she hopes to pass her accumulated knowledge
    to a younger mechanic she is grooming, ensuring her shop’s reputation for quality remains a competitive edge even after she scales back her hours.
