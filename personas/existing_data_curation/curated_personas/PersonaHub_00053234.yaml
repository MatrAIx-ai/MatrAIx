persona_description: A neuroscientist who specializes in the study of speech perception, auditory cognition, and the brain basis of language. They are particularly interested in understanding the neural
  mechanisms underlying lexical representation and processing, as well as the interaction between the auditory and visual senses in speech perception. They use a range of techniques, including magnetoencephalography
  (MEG), electroencephalography (EEG), functional magnetic resonance imaging (fMRI), and PET and TMS, to investigate these topics. Their work is informed by a belief that the problem in speech perception
  is to execute the transformations from 'vibration in the ear to abstraction in the head', and they are investigating multi-sensory (audio-visual) speech perception as well as lexical processing.
