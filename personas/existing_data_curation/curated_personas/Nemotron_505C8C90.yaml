personas:
  professional: Janet Alexander is a seasoned convention event planner whose two‑decade mastery of budget control, vendor negotiation, and meticulous timeline creation is amplified by their love of routine,
    methodical organization, and a quiet, collaborative demeanor that keeps client stress low.
  sports: Janet Alexander enjoys low‑impact fitness, joining the Naperville Walking Club for weekend strolls and following the Chicago Cubs and Chicago Bulls loyally, while they occasionally play casual
    mixed‑age tennis at the Westside Community Center during spring.
  arts: Janet Alexander immerses themselves in the arts by leading discussions of historical novels by Hilary Mantel and biographies of Maya Angelou in their book club, coordinating author talks featuring
    writers like Donna Tartt at the Naperville Public Library, and winding down to listening to Norah Jones and watching classic films starring Meryl Streep, all of which feed their love for nuanced storytelling
    and cultural continuity.
  travel: Janet Alexander plans every voyage with a spreadsheet, having already explored historic sites such as Rome’s Colosseum, Prague’s Old Town, and Edinburgh’s Castle, while they dream of a carefully
    mapped itinerary to Vienna’s museums and Lisbon’s coastal neighborhoods, balancing limited vacation days with a preference for guided day‑tours over spontaneous wanderings.
  culinary: Janet Alexander loves cooking Midwestern comfort foods—they perfect creamy chicken pot pie, thick beef stew with garden‑grown carrots and potatoes, and tangy apple crisp with fresh orchard apples—while
    they experiment by adding herb‑infused sauces from their homegrown basil and thyme, though they occasionally over‑salt their dishes when multitasking.
  core: Janet Alexander is a meticulous, routine‑loving event planner who balances a calm domestic world of gardening, knitting, and classic comforts with a quiet, anxiety‑taut interior that thrives on
    careful planning, while they also nurture a generous spirit through community service.
background:
  cultural: Janet grew up in a suburban Midwestern family of German-Irish descent near Chicago, where practical values and community involvement were emphasized. Raised in a Protestant tradition, she celebrated
    holidays with long-standing family customs and participated in local church outreach programs. Her education in the humanities nurtured a deep appreciation for American and European cultural heritage,
    which she regularly explores through museum visits, regional theater, and historical reenactments. Living in Naperville, a city known for its strong public schools and civic engagement, she reflects
    the area's emphasis on order, reliability, and service to others.
attributes:
  skills: '["Event logistics planning", "Budget management", "Vendor negotiation", "Timeline development", "Risk assessment", "Contract negotiation", "Client liaison", "Conference program design", "AV and
