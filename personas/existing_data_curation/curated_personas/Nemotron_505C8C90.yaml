    communication"]'
  hobbies: '["Gardening (flowers and vegetables)", "Knitting and crocheting", "Reading historical fiction and biographies", "Book club participation", "Attending live theater and classical music concerts",
    "Volunteering for community events", "Yoga and mindfulness meditation", "Cooking and baking classic American dishes", "Travel planning to historical sites", "Genealogy research"]'
  career_goals: Janet aims to advance to a senior leadership role, such as Director of Events or Vice President of Conference Services, within a large corporation or a respected nonprofit. She plans to
    earn the Certified Meeting Professional (CMP) designation within the next two years and to lead a team of planners, mentoring newer staff while championing best-practice standards. Long-term, she envisions
    launching her own boutique event-planning firm that specializes in intimate, culturally rich gatherings for professional associations, emphasizing sustainability and meticulous service. Balancing her
    career aspirations with family commitments, she also seeks to strengthen her stress-management repertoire to maintain emotional well-being.
