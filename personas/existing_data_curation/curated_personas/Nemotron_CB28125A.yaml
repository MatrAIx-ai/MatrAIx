personas:
  professional: Andrew Zaldivar is a budding heavy equipment operator with a solid grasp of hydraulic systems, rigging techniques, and safety protocols, whose curiosity and artistic appreciation drive them
    to propose ergonomic, eco‑friendly design tweaks while confidently leading crew briefings and troubleshooting on construction sites.
  sports: Andrew Zaldivar fuels their energetic social life by playing pickup basketball at a Queens park, cheering for the New York Knicks and the New York Mets on weekends, and is a casual member of a
    local youth basketball league that meets after school, while they also enjoy occasional skate sessions at a nearby skate park.
  arts: Andrew Zaldivar immerses themselves in the street‑art scene, sketching murals inspired by the bold colors of Banksy and Shepard Fairey, while dancing to the rhythms of salsa legends like Marc Anthony
    and blending reggaeton beats from Bad Bunny with smooth jazz from Kamasi Washington during evening listening sessions.
  travel: Andrew Zaldivar prefers spontaneous weekend getaways by bus to explore mural‑rich neighborhoods in Philadelphia and Brooklyn, spikes the itinerary with an annual visit to their family’s homeland
    in the Caribbean to savor local traditions, and dreams of eco‑adventures hiking the cloud forests of Costa Rica.
  culinary: Andrew Zaldivar loves bold, hearty dishes like sancocho brimming with plantains, yucca, and chicken, often spices their home‑cooked empanadas with queso fresco and cilantro, and delights in
    street‑food tacos al pastor topped with pineapple, while they consider themselves a beginner cook who relies heavily on YouTube tutorials.
  core: Andrew Zaldivar blends a mechanic’s precision with a graffiti‑loving imagination, juggling crane manuals and sketchpads, thriving on social buzz but habitually staying up late gaming after long
    shifts.
background:
  cultural: Andrew grew up in the heart of Ozone Park, a neighborhood known for its dense Dominican community. He speaks fluent Spanish at home and English at school and work, embodying a bicultural identity
    that blends Caribbean warmth with the fast‑paced New York vibe. Family gatherings often revolve around music, dance, and meals like mangú and arroz con pollo, reinforcing strong familial bonds and a
    sense of communal responsibility. He was raised Catholic, attending local parishes where community service and celebrations of Dominican holidays—such as Independence Day and the feast of Our Lady of
    Altagracia—play central roles. This cultural immersion has instilled in him a deep respect for tradition, a love for rhythmic expression, and a drive to represent his heritage proudly, whether through
    the colors he wears, the music he enjoys, or the community events he supports.
attributes:
  skills: '[''Heavy equipment operation (conveyor, dredge, hoist, winch)'', ''Hydraulic systems troubleshooting and maintenance'', ''Load chart calculation and rigging safety'', ''Preventive mechanical
    maintenance'', ''Technical blueprint and schematic interpretation'', ''OSHA/NCCER safety compliance'', ''Basic mechanical engineering principles'', ''CAD (basic) and spreadsheet data analysis'', ''Team
    coordination and communication'', ''Physical stamina and problem‑solving under pressure'']'
  hobbies: '[''Sketching street murals and graffiti'', ''Playing pickup basketball'', ''Listening to and dancing to reggaeton, bachata, hip‑hop, and jazz'', ''Attending live concerts and community dance
    events'', ''Volunteering at Dominican cultural festivals and parades'', ''Building model engines and Arduino projects'', ''Exploring contemporary art museums (e.g., MoMA, Met)'', ''Cooking traditional
    Dominican dishes with family'']'
  career_goals: In the next three to five years, Andrew plans to obtain a Certified Crane Operator license and NCCER level‑III certification in hydraulic equipment while completing his associate’s degree
    in Mechanical Engineering Technology, followed by a bachelor’s in Mechanical Engineering. He aims to advance from operator to site foreman or equipment manager, overseeing large‑scale construction and
    marine projects and mentoring new operators. Inspired by his appreciation for design, he also hopes to integrate sustainable engineering practices and collaborate with industrial designers to make heavy
    machinery more ergonomic and environmentally friendly. Ultimately, he envisions a career that blends technical expertise with innovative, eco‑conscious solutions, positioning him as a forward‑thinking
    leader in the industry.
