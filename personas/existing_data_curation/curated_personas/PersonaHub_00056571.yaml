persona_description: A scientist who conducts research on the distribution and concentration of contaminants of concern in surface waters, specifically focusing on the Lake Erie-Lake St. Clair drainages.
  This scientist has expertise in chemical classes, data analysis, and comparison to effects-based sediment-quality guidelines. They have experience with hydrodynamic models and are interested in the spatial
  distribution of contaminant concentrations, their relationship to the distribution of trace elements, and the comparison of contaminant mixtures against effects-based biota data. They are interested in
  collecting and analyzing data from multiple locations within the study area, including tributaries, marinas, and headwaters.
