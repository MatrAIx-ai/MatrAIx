persona_description: A historian who specializes in the study of Inca history, particularly the events and achievements of Pachacuti. This person is interested in the Inca empire, its conquests, and the
  impact of Pachacuti's reign on the Incas' rise to power and the establishment of their empire. They are knowledgeable about the Inca civilization, the role of the Inca ruler in the empire, and the political
  and social structures of the Incas. This person is interested in the Inca calendar, the storage houses, and the road network. They are also interested in the Inca system of tribute and taxation, the storage
  houses, and the government apparatus.
