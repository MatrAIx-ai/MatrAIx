persona_description: A mathematician or a computational scientist who specializes in the field of linear algebra and numerical analysis. This person is skilled in applying the Gram-Schmidt process to convert
  a given set of vectors into a more friendly or suitable basis for a given linear algebra problem. They are adept at manipulating and analyzing inner products to identify the components of vectors that
  are unfriendly to each other, and they are skilled in constructing algorithms to convert an arbitrary basis into a friendly basis. This person is also proficient in applying the Gram-Schmidt process to
  numerical problems, such as solving linear systems of equations or approximating eigenvalues, and they are skilled in using this process to improve the accuracy and efficiency of their computational methods.
