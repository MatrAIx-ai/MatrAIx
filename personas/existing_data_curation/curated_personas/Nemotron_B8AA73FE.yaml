  career_goals: Marlene aims to advance to a regional operations manager role within the next five years, overseeing multiple locations and driving efficiency initiatives across the network. She plans to
    complete her bachelor's degree in Business Administration and eventually pursue an MBA to broaden her strategic perspective. Her ambition is to be recognized for delivering measurable cost‑savings and
    cultivating high‑performing, self‑sufficient teams, while securing a work structure that preserves her need for quiet, focused work periods. In the longer term she envisions launching a niche boutique
    store that combines her managerial expertise with her love for curated, solitary retail experiences.
