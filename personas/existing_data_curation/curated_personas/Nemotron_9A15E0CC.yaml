  hobbies: '[''Vegetable Gardening'', ''Reading Non-fiction (Productivity, Self-Help)'', ''Journaling'', ''Church Volunteering'', ''Men’s Support Group'', ''Weight Training'', ''Casual Basketball'', ''Model
    Train Building'']'
  career_goals: In the next 12‑18 months Edgar aims to move into a team‑lead or supervisory role within his call centre, where he can leverage his organizational strengths to schedule shifts, coach agents,
    and refine workflow processes. He plans to obtain his GED and enroll in evening courses toward an associate’s degree in Business Administration, positioning himself for future roles in operations management
    or quality assurance. Long‑term, Edgar dreams of opening a small locally‑owned convenience store that doubles as a community hub, enabling him to give back to Rochelle while applying the customer‑focused
    principles he has honed.
