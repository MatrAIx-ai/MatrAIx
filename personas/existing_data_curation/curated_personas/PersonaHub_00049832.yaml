persona_description: A researcher in the field of neurobiology and auditory neuroscience, specifically studying the effects of antidepressants on the brain and the auditory system. They are particularly
  interested in the role of serotonin in the auditory system and the impact of antidepressants on the sensory processing in the dorsal cochlear nucleus (DCN). They have conducted research on the effects
  of selective serotonin reuptake inhibitors (SSRIs) on tinnitus and have found that the use of SSRIs may exacerbate the condition. They are currently working on finding ways to inhibit a specific ion channel
  in the DCN that is activated by serotonin and may enable SSRIs to ease depression without making tinnitus worse.
