  hobbies: '[''Gardening'', ''Quilting'', ''Crocheting'', ''Cooking traditional Appalachian and Polish dishes'', ''Church volunteering'', ''Bowling league'', ''Hiking'', ''Reading mystery novels'', ''Crossword
    puzzles'', ''Genealogy research'', ''Listening to bluegrass music'']'
  career_goals: Shannon aims to translate her reliable performance into a supervisory role. She hopes to secure a promotion to shift supervisor within the next two years, followed by a store manager position.
    To support this trajectory, she plans to complete her in-progress college coursework toward an associate degree in business administration and earn a retail management certification. Looking further
    ahead, she envisions owning a modest community-focused convenience store that could serve as a hub for local seniors. Achieving financial stability for a comfortable retirement and mentoring younger
    employees remain central motivations.
