persona_description: 'A political scientist who is interested in the role of the United States in establishing institutions to which we, as a nation, are accountable, the significance of the rule of law,
  and the dangers posed by U.S. resistance to such law. They are also interested in the nature and purpose of the International Criminal Court, the prevention of genocide, war crimes, and crimes against
  humanity, and the effectiveness of such laws in preventing these crimes. They are a liberal internationalist who believes in the importance of diplomacy and economic assistance in preventing armed conflict,
  and in the role of soft power in achieving national security. They are also interested in the progress in democratization and the prevention of armed conflict over the past 30 years, and the new paradigm
  for securing peace: national and international security.'
