  career_goals: Andrea aspires to become a Director of Operations within the next three years and ultimately advance to a Vice President of Operations or Chief Operating Officer role. She aims to lead large-scale
    transformation initiatives that embed innovation, sustainability, and employee well-being into the organization’s core processes. Mentoring emerging women leaders in operations and fostering a collaborative,
    inclusive culture are central to her long-term vision, while maintaining a healthy work-life balance to manage her stress-prone nature.
