  career_goals: Although retired from formal employment, Alberto aims to leave a lasting cultural legacy. He plans to volunteer at the local senior center, teaching basic cooking classes and sharing Mexican
    folk art techniques with younger participants. He also hopes to compile a memoir of his family's migration story, preserving it for future generations. In the next few years, he aspires to refine his
    photography skills to document community events, and perhaps travel back to Mexico to reconnect with extended family and participate in regional festivals.
