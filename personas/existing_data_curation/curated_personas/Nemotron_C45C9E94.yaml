personas:
  professional: Alberto Maldonado, a retired handyman turned senior‑center volunteer, leverages his self‑taught carpentry, plumbing, and culinary expertise with a meticulous yet adaptable approach, making
    them a trusted, slightly skeptical mentor who balances competition with collaboration in community workshops.
  sports: Alberto Maldonado, a member of the local senior walking club who enjoys sunrise hikes across the Mojave, roots for the Las Vegas Raiders in football season and the Las Vegas Aces in basketball,
    and prefers low‑impact exercise over competitive sports, reflecting their balanced yet competitive spirit.
  arts: Alberto Maldonado, an avid watercolorist inspired by Mexican folk motifs, frequents the Nevada Museum of Art to study works by Frida Kahlo and Diego Rivera, and curates a small home gallery of his
    own sunrise photographs, blending a curious eye with a competitive urge to perfect technique.
  travel: Alberto Maldonado, who plans trips with meticulous checklists yet leaves room for serendipity, has already explored the historic streets of Oaxaca, dreams of returning to his familial hometown
    for the Day of the Dead festival, and enjoys weekend drives to the Grand Canyon for sunrise photography.
  culinary: Alberto Maldonado, a proficient home chef, specializes in traditional Mexican dishes like mole poblano, chiles en nogada, and tamales, often daringly incorporating local desert herbs such as
    epazote and sage, while maintaining a habit of tasting sauces with a wooden spoon while humming folk tunes.
  core: Alberto Maldonado navigates life with a curious, detail‑driven mind, a competitive streak at card tables, a love for sunrise photography, and a habit of misplacing their spectacles on the kitchen
    counter.
background:
  cultural: Alberto’s Mexican heritage is a cornerstone of his identity. He grew up in a close‑knit family that emphasized respect for elders, the importance of communal meals, and the celebration of traditions
    such as Día de los Muertos and quinceañeras. Bilingual in Spanish and English, he bridges cultural norms from his upbringing with the multicultural environment of Las Vegas. He regularly attends local
    Mexican community gatherings, supports Latino businesses, and contributes to cultural preservation initiatives. His love for Mexican art, music, and cuisine is interwoven with his curiosity for new
    ideas, allowing him to appreciate both his roots and the diverse influences of his current city.
