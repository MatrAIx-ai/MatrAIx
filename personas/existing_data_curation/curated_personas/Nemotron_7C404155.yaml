  career_goals: Ninoshka aims to re‑enter the workforce in a role that blends her technical abilities with her passion for community impact. Her short‑term goal is to secure an entry‑level position as a
    data analyst or GIS specialist with a nonprofit or municipal agency focused on environmental health in South Florida. She plans to obtain a GIS certification and deepen her Python data‑science skills
    within the next year. In the medium term, she hopes to transition into a project coordinator role where she can lead sustainability initiatives that serve the growing Latino community, designing data‑driven
    interventions while fostering inclusive participation. Ultimately, Ninoshka envisions a career path that offers clear project milestones, flexible work hours, and a supportive team culture that acknowledges
    mental‑health needs, enabling her to balance professional growth with personal wellbeing.
