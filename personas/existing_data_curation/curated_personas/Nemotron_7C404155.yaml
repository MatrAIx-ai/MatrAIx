personas:
  professional: Ninoshka Santiesteban is a detail‑oriented aspiring data analyst who leverages Python, AutoCAD, and solid statistical skills to translate community health data into actionable insights for
    nonprofit projects, while their cooperative spirit and love for flexible teamwork often counterbalance their tendency to drift from strict deadlines, and they strive to keep project milestones clear
    despite occasional disorganization.
  sports: Ninoshka Santiesteban enjoys early‑morning beach volleyball at Hollywood Beach, follows the Miami Heat for basketball thrills, supports Inter Miami CF for soccer, and participates in a local salsa‑dance
    fitness class that doubles as cardio, balancing competitive spirit with community camaraderie, and they relish the blend of solo and group exercise.
  arts: Ninoshka Santiesteban expresses creativity through lively salsa and zouk dancing to the rhythms of Marc Anthony and Celia Cruz, they capture street life with a Canon EOS in the style of Henri Cartier‑Bresson,
    and lose themselves in mystery novels by Gillian Flynn while attending local art showcases featuring emerging Latinx muralists.
  travel: Ninoshka Santiesteban prefers thoughtfully planned weekend getaways that blend relaxation and cultural immersion, revisiting family in Panama during holidays, dreaming of eco‑tourism in Costa
    Rica’s rainforests, and they savor the vibrant street art of Cartagena, all while budgeting to keep travel expenses in line with their modest savings.
  culinary: Ninoshka Santiesteban delights in cooking sancocho, empanadas, and arroz con pollo with fresh cilantro, plantains, and ají chombo, skillfully balancing traditional flavors and modern twists,
    yet they occasionally forget to finish prep due to spontaneous invites, leading to last‑minute pantry raids for ingredients like lime and garlic.
  core: Ninoshka Santiesteban is a community‑driven data enthusiast who blends technical precision with flexible teamwork, worries about stress, loves salsa, cooks hearty meals, and they navigate life with
    a mix of structure and spontaneous kindness.
background:
  cultural: Ninoshka’s cultural identity is rooted in her Panamanian heritage and the vibrant Latino community of South Florida. Born to parents who immigrated from Panama, she grew up speaking Spanish
    at home and celebrating traditions such as Carnaval de Panama, Semana Santa processions, and family gatherings centered around music and dance. She maintains close ties with relatives back in Panama
    through regular video calls and often sends homemade treats for holidays. In Hollywood, FL, she participates in local Panamanian festivals, volunteers at the Panamanian cultural association, and helps
    organize Spanish‑language workshops for recent immigrants. Her upbringing emphasized collectivism, respect for elders, and a strong sense of community, which influence her cooperative nature and desire
    to contribute to the wellbeing of her neighborhood. While she has embraced the multicultural environment of Broward County, she continues to blend American independence with Panamanian values, creating
    a hybrid cultural perspective that informs both her personal and professional life.
