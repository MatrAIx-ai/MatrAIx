  hobbies: '[''Cooking Panamanian cuisine'', ''Salsa dancing'', ''Yoga'', ''Beach walking'', ''Reading mystery and sci‑fi books'', ''Documentary watching'', ''Arduino DIY projects'', ''Photography'', ''Volunteer
