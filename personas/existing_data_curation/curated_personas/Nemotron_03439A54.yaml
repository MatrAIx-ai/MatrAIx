personas:
  professional: Sheena Walden is a seasoned community organizer who leverages her Excel expertise and meticulous event‑planning skills to coordinate church functions, neighborhood potlucks, and volunteer
    outreach, all while maintaining a calm, detail‑oriented approach that balances practicality with compassionate leadership.
  sports: Sheena Walden enjoys low‑impact fitness, walking the Wasatch foothills three times a week, cheering for the Utah Jazz during the NBA season and Real Salt Lake in the MLS, and participates in a
    senior walking club that meets at the community center for gentle group hikes.
  arts: Sheena Walden finds creative solace in quilting—crafting patterned blankets for family gifts—while devouring historical fiction by Philippa Gregory and biographies of Maya Angelou, and unwinds to
    folk melodies from Emmylou Harris and classic films starring Diane Keaton.
  travel: Sheena Walden plans trips with meticulous checklists, favoring nature‑focused getaways like a spring road‑trip to Zion National Park and a summer visit to Maui’s Upcountry farms, while keeping
    a modest bucket‑list pilgrimage to Bath, England for its Georgian architecture, and always balances travel desires with family obligations and a limited vacation budget.
  culinary: Sheena Walden is a devoted baker who perfects sourdough loaves and seasonal fruit preserves—such as peach jam spiced with ginger—and enjoys low‑salt roasted root vegetable salads seasoned with
    rosemary and juniper berries, rating her tools—from a cast‑iron skillet to a Stand Mixer—on practicality and durability.
  core: Sheena Walden blends a love for structured community service with quiet creativity, navigating life’s worries through routine, gardening, and homemade comforts while quietly pursuing modest entrepreneurial
    dreams.
background:
  cultural: Sheena grew up in a largely White, middle‑class family in the Salt Lake City area, with deep ties to the cultural traditions of the Church of Jesus Christ of Latter‑day Saints. Her upbringing
    emphasized family cohesion, community service, and a respect for routine and practicality, values that still shape her daily life. While she identifies with the broader Western American culture, she
    also incorporates the modest and service‑oriented ethos of her LDS community, participating regularly in church events, potlucks, and neighborhood outreach. This cultural blend informs her preferences
    for organized activities, her dedication to family, and her desire to contribute meaningfully to her local community.
