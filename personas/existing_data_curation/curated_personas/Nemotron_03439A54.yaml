  hobbies: '[''gardening (native plants, xeriscaping)'', ''baking sourdough and preserves'', ''quilting'', ''reading historical fiction and biographies'', ''nature photography'', ''walking the Wasatch foothills'',
    ''women’s book club'', ''volunteering at community center'']'
  career_goals: Although currently not in the formal workforce, Sheena aims to stay engaged through community service and personal enrichment. She plans to take a short certification course in senior wellness
    to volunteer as a health mentor for older adults in her neighborhood. She also hopes to launch a modest home‑based business selling her homemade jams and quilts, allowing her to blend creativity with
    income generation. Additionally, Sheena wishes to improve her stress‑management techniques, perhaps by attending mindfulness workshops, and to become a mentor for younger women navigating work‑family
    balance. Her long‑term ambition is to ensure a secure retirement for her family while maintaining an active presence in her local church and community garden.
