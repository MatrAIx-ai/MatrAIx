  career_goals: Ashlyn aspires to pursue a career in a STEM field that blends her curiosity with practical impact. She hopes to study environmental engineering or computer science in college, aiming to
    develop sustainable solutions for her local agricultural community. In the short term, she plans to win her middle school science fair and take on a leadership role in her school's robotics club. Long‑term,
    she dreams of becoming a professional who can design eco‑friendly technologies while also mentoring younger students through community outreach programs.
