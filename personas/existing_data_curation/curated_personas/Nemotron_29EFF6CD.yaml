personas:
  professional: Ashlyn Maldonado is an aspiring junior robotics enthusiast who channels their curiosity and methodical nature into designing simple Arduino projects, debugging code with a step‑by‑step checklist,
    and leading the school robotics club’s build sessions with reliable, organized precision.
  sports: Ashlyn Maldonado plays forward for the neighborhood youth soccer team, the River Valley Ravens, cycles the local park trails on weekends, and follows the professional games of the state’s minor‑league
    baseball club, the Canyon Creek Owls, balancing a structured training schedule with spontaneous trail rides.
  arts: Ashlyn Maldonado fills their sketchbook with playful doodles inspired by the whimsical style of Studio Ghibli films, evenings are spent listening to Taylor Swift’s upbeat tracks while assembling
    LEGO mosaics, and their library shelf stacks favor the adventurous series of Rick Riordan and the classic mysteries of Agatha Christie, all of which fuel their creative imagination.
  travel: Ashlyn Maldonado approaches travel like a mission briefing, mapping out each day on color‑coded charts, cherishes past excursions to the Grand Canyon and historic Washington, D.C., and dreams
    of exploring Tokyo’s neon districts with a family‑friendly cultural tour, always budgeting a portion of their allowance for souvenirs.
  culinary: Ashlyn Maldonado enjoys assembling simple yet wholesome meals such as vegetable stir‑fry with bell peppers, snap peas, and tofu, pepperoni‑free mini pizzas topped with fresh backyard tomatoes
    and basil, and is comfortable following illustrated recipes, though they occasionally forget to set the timer, resulting in slightly over‑cooked pasta.
  core: Ashlyn Maldonado blends inquisitive curiosity with nit‑picky organization, turning LEGO builds, robotics code, and garden rows into disciplined adventures, yet they sometimes lose track of time
    daydreaming about space while forgetting to water the seedlings.
background:
  cultural: Ashlyn was raised in a middle‑class, white American family in Olivehurst, a small town in Yuba County, California. Her upbringing reflects a blend of suburban stability and the agricultural
    heritage of the Sacramento Valley. Family traditions include celebrating major holidays such as Thanksgiving, Christmas, and the Fourth of July with community fireworks and local potlucks. She frequently
    participates in town events like the Olivehurst Farmers Market and school‑organized clean‑up days, which have fostered a respect for community service and the environment. While her cultural identity
    is primarily mainstream American, exposure to the diverse community around her has broadened her appreciation for different customs and perspectives.
