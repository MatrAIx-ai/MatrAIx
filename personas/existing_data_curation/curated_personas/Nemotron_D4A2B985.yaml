personas:
  professional: An elder community facilitator with a knack for mobilizing seniors, Hannah Mercurio blends their watercolor painting and quilting talents to create inclusive art workshops at the Jonesboro
    senior center, while they loosely plan events that nevertheless inspire creative storytelling and oral‑history archives.
  sports: Hannah Mercurio keeps active with daily walks through their vegetable garden, cheerfully follows the Arkansas Razorbacks football team, enjoys occasional senior volleyball at the community center,
    and tunes into the New York Yankees broadcasts while never missing the annual local marching band parade.
  arts: Hannah Mercurio expresses themselves through watercolor depictions of the Arkansas countryside, intricate quilts weaving southern magnolia motifs with Italian lace patterns, and they occasionally
    attend the Jonesboro Little Theatre to see productions of ‘Our Town’ and Puccini’s ‘La Bohème’ performed by the local opera club.
  travel: Hannah Mercurio dreams of museum pilgrimages, having already visited the Art Institute of Chicago, the Metropolitan Museum of Art in New York, and the Uffizi Gallery in Florence, and they prefer
    loosely planned road trips that stop at farm‑to‑table restaurants and historic Catholic churches along the way.
  culinary: Hannah Mercurio’s kitchen is a fusion of Southern comfort and Italian tradition, where they simmer fresh garden tomatoes into marinara for homemade lasagna, bake rosemary focaccia alongside
    cornbread, and celebrate holidays with panettone, cannoli, and a beloved chicken‑and‑dumplings stew seasoned with sage and oregano.
  core: Hannah Mercurio, a spirited 71‑year‑old community artist, blends Southern hospitality with Italian culinary flair, floats through life with a relaxed schedule, and transforms every gathering into
    a colorful, story‑filled celebration where they encourage everyone to share a memory.
background:
  cultural: Hannah grew up in a white, Southern‑American family with deep Italian roots; her grandparents immigrated from northern Italy and retained Catholic traditions, family recipes, and a love for
    folk celebrations. Raised in Jonesboro, Arkansas, she embodies Southern hospitality—valuing community gatherings, church involvement, and shared meals—while also honoring her Italian heritage through
    holiday breads, pasta-making, and an appreciation for classical art. This blend of Southern and Italian influences shapes her worldview, artistic taste, and social engagement.
