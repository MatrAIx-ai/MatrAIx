  hobbies: '["Watercolor painting","Quilting","Gardening","Genealogy research","Reading historical fiction","Cooking Southern‑Italian dishes","Visiting art museums and galleries","Attending community theater","Participating
    in local book clubs","Playing bridge and bingo"]'
  career_goals: Although retired, Hannah aims to spearhead a community arts program at the Jonesboro senior center, creating a regular showcase for local older artists. She hopes to compile a digital archive
    of neighborhood oral histories, blending her love of storytelling with new technology. A personal ambition is to refine her planning skills so her projects run smoothly, while also traveling to renowned
    museums in Chicago, New York, and Florence to deepen her appreciation for art and bring fresh ideas back to her community.
