persona_description: A scientist working in the field of RNA editing and miRNA biogenesis, focusing on understanding the functions of ADAR and the cellular processes regulated by A-to-I RNA editing. Their
  research interests include the regulation of the host RNAi mechanism by editing of EBV miR-BART6 RNAs, the role of A-to-I RNA editing in the control of miRNA biogenesis, and the potential human diseases
  caused by malfunction of these processes. They have a strong background in molecular biology, genetics, and biochemistry, and are skilled in analyzing phenotypes of mice with a mutation of the ADAR1 gene
  and studying the molecular mechanism underlying the embryonic lethal phenotype of ADAR1 null mutant mice.
