  career_goals: Although retired, Francisco aims to stay intellectually active by volunteering as a docent at nearby art museums, mentoring youth about Latin American culture, and authoring a memoir that
    intertwines his personal life with Costa Rican heritage. He aspires to launch a series of community arts workshops that use creative expression to support mental wellness for seniors, and he hopes to
    learn basic digital archiving to preserve family photographs and documents for future generations.
