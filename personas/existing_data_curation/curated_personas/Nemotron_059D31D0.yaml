personas:
  professional: Donald Perry, a budding aeronautical hobbyist, meticulously constructs model aircraft and car kits with the strategic mindset honed from science‑fiction novels and turn‑based video games;
    they channel their love for structure into detailed blueprints while still embracing occasional flexibility demanded by middle‑school projects.
  sports: Donald Perry, a member of the local youth cycling club and a seasonal volunteer on his high‑school track team, pedals the rolling hills of Moniteau County, follows the St Louis Cardinals in baseball
    and the Kansas City Chiefs in football with avid enthusiasm, and they also enjoy weekend fishing trips to Lake of the Ozarks as a low‑key sport.
  arts: Donald Perry, who plays acoustic covers of John Denver and Jason Mraz on a battered guitar, sketches sweeping Missouri farmland scenes inspired by Grant Wood while devouring science‑fiction novels
    by Isaac Asimov and Octavia Butler, and they regularly attend community theater productions that showcase classic westerns echoing their rural upbringing.
  travel: Donald Perry, who prefers short, budget‑conscious road trips over lengthy vacations, has explored the historic streets of St Louis, camped at the Lake of the Ozarks, dreams of hiking the red‑rock
    canyons of Utah, and they have added a future pilgrimage to Japan’s Ghibli Museum to their growing travel wish list.
  culinary: Donald Perry, who loves cooking simple comfort fare such as skillet cornbread with honey butter, fried catfish seasoned with Cajun spice, and apple pie made from fresh orchard apples, often
    experiments with new recipes after school but sometimes forgets to clean the kitchen, and they embody a blend of culinary curiosity and teenage disorganization.
  core: Donald Perry blends rural self‑reliance with meticulous model‑building, disciplined saving, and a calm, solitary charm, punctuated by a habit of sketching unfinished landscapes and an occasional
    indulgence in impulsive video‑game purchases that they rationalize as creative inspiration.
background:
  cultural: Donald was raised in Versailles, a small town in Moniteau County, Missouri, within a white, Midwestern, rural community. His family values self‑reliance, modesty, and community involvement.
    He grew up attending a local Methodist church, participating in county fairs, and helping with seasonal farm work. The cultural environment emphasizes friendship through small gatherings, appreciation
    for the outdoors, and a strong sense of patriotic and local pride, all of which shape his worldview and daily life.
