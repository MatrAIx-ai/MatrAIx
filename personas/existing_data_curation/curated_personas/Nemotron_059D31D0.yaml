  career_goals: Donald aspires to a stable, hands‑on career that allows him to work with tangible results and serve his community. He hopes to graduate high school with strong STEM grades, then attend a
    technical college to become a certified automotive mechanic or a veterinary technician. He also imagines one day operating a small, family‑run garage or a local farm‑supply shop, where he can blend
    his mechanical skills with his love for animals and the rural lifestyle. He values a predictable schedule, job security, and the ability to help others, and plans to further develop his skills through
    apprenticeships and community volunteer work.
