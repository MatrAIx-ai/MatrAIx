personas:
  professional: Maria Garcia, a full‑stack software developer proficient in Python, JavaScript, Django, Flask, and React, leverages their practical mindset and collaborative empathy to translate business
    needs into clean, test‑driven code while mentoring juniors, even as their relaxed approach to planning sometimes leads them to juggle multiple tasks in a delightfully disorganized yet effective fashion.
  sports: Maria Garcia, a hiking enthusiast who joins the Orlando Outdoor Hiking Club on weekends and plays casual soccer with the Orlando Latin Soccer League, proudly follows Orlando City SC in MLS and
    cheerfully watches the Tampa Bay Lightning during hockey season, balancing their love of nature with a community‑spirit approach to fitness and they often finish a trail run with a refreshing mango
    smoothie.
  arts: Maria Garcia indulges in speculative fiction by devouring novels from N.K. Jemisin and Octavia Butler, while their evenings often echo with salsa classics from Celia Cruz and merengue hits by Juan
    Luis Guerra, and they occasionally attend local theater productions of Lin‑Manuel Miranda’s works, letting these artistic experiences color their creativity both at home and in code.
  travel: Maria Garcia prefers flexible, low‑key travel itineraries that blend adventure with cultural immersion, having trekked the rainforests of Costa Rica, explored the vibrant streets of Cartagena,
    Colombia, and road‑tripped through the Florida Keys, yet they balance these escapes with family obligations and a modest travel budget, often booking last‑minute stays through Airbnb.
  culinary: Maria Garcia, a confident home chef, masters traditional gallo pinto and nacatamales while experimenting with fusion twists—such as adding coconut milk and lemongrass to gallo pinto—and they
    routinely harvest fresh cilantro, thyme, and jalapeños from their patio garden to season their dishes, savoring the blend of comfort and creativity in every bite.
  core: Maria Garcia blends a tech‑savvy curiosity with a laid‑back, garden‑loving soul, often juggling code and cilantro in equal measure, while their habit of misplacing coffee mugs and occasionally missing
    deadlines adds a charmingly chaotic rhythm to their otherwise compassionate, community‑focused life.
background:
  cultural: Maria was raised in a bilingual household where Spanish and English blended seamlessly. Her Nicaraguan roots are central to her identity; she celebrates cultural holidays like La Purísima and
    Semana Santa, participates in community festivals, and maintains close ties with extended family in Nicaragua through regular video calls and annual visits. The values of family cohesion, hospitality,
    and mutual support common in Nicaraguan culture inform her cooperative and harmony‑seeking personality. Living in Kissimmee’s multicultural environment, she also draws from the diverse Latin‑American
    diaspora, blending traditional customs with Floridian life, which enriches her perspective both socially and professionally.
