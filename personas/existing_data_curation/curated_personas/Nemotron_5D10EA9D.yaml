  career_goals: Looking ahead, Maria aims to transition into a senior or technical lead role where she can shape architectural decisions and foster inclusive engineering practices. She is eager to deepen
    her expertise in cloud platforms such as AWS and Azure, earn certifications, and eventually guide cross‑functional teams on building scalable, user‑friendly products that serve diverse communities.
    One long‑term ambition is to launch a consultancy that offers affordable software solutions to small businesses in Central‑American immigrant neighborhoods, while also creating mentorship programs for
    aspiring developers from underrepresented backgrounds.
