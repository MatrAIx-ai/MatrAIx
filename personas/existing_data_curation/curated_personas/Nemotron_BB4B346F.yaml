  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Birdwatching'', ''Reading (nature, DIY)'', ''Model train building'', ''Journaling'', ''Listening to folk and classic rock music'']'
  career_goals: Richard hopes to translate his practical abilities into a reliable part‑time handyman position that can provide a steadier income and a sense of purpose. He is considering enrolling in a
    GED program to formalize his education, which would open doors to more structured employment opportunities. In the longer term, he dreams of launching a modest home‑repair service focused on serving
    elderly neighbors and low‑income households in his community. Parallel to his work ambitions, he aspires to deepen his volunteer impact by establishing a community garden where he can teach sustainable
    gardening practices and mentor younger residents who share his love of nature.
