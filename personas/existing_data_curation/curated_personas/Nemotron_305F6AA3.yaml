personas:
  professional: John Baker is a budding outdoor guide and handyman who leverages years of ranch work, carpentry, equipment repair, and target shooting expertise into a modest side business, balancing a
    love for structure with spontaneous problem‑solving, while they are driven by a competitive edge that fuels excellence in fire‑department drills and guide certifications.
  sports: John Baker is an avid outdoorsman who hunts elk and deer, fishes the Sawtooth rivers, and participates in cross‑country skiing and snowshoeing during winter, while also regularly shooting at the
    local gun club and cheering for the Idaho Vandals basketball team and the Boise State Broncos football squad.
  arts: John Baker immerses themselves in frontier literature, devouring biographies of Lewis and Clark and the works of Zane Grey, while restoring vintage radios to the crackle of early‑20th‑century jazz
    legends like Louis Armstrong and Duke Ellington, and playing chess at the community center to satisfy their strategic mind.
  travel: John Baker prefers low‑key, self‑driven getaways, having trekked the backcountry of Yellowstone and explored Banff's alpine lakes, while dreaming of a remote cabin stay in Patagonia's Torres del
    Paine, planning trips with meticulous gear checklists yet leaving room for spontaneous hunting opportunities.
  culinary: John Baker enjoys cooking over open fire, favoring elk stew with juniper berries, pan‑seared trout with wild herbs, and a side of pine‑nut bread, possessing intermediate cooking skills that
    blend practical field recipes with occasional attempts at gourmet plating, and they savor strong black coffee with a dash of smoked salt.
  core: John Baker is a solitary, competitive craftsman‑guide who balances meticulous budgeting and DIY problem‑solving, thrives on wilderness challenges, and occasionally lets complacency in health checks
    slip.
background:
  cultural: John is a white American with deep roots in the mountain West. His ancestry is primarily German and English, traced back to families that settled in eastern Idaho's ranching communities in the
    early 20th century. Raised in a multi‑generational farming household, he grew up with an emphasis on self‑reliance, hard work, and a respect for the natural environment. His upbringing was modest and
    Protestant, fostering a conservative outlook that values independence and skepticism toward external authority. Living in Hailey, Idaho, he maintains a connection to local traditions such as community
    harvest festivals and volunteer fire service, while generally keeping a low social profile and preferring the solitude of the surrounding wilderness.
attributes:
  skills: '[''carpentry'', ''fence building'', ''small engine repair'', ''snowmobile maintenance'', ''wilderness first aid'', ''hunting and firearms safety'', ''basic navigation'', ''budgeting and self‑sufficiency'',
