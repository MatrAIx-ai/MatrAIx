  hobbies: '[''hunting'', ''fishing'', ''hiking'', ''snowshoeing'', ''cross‑country skiing'', ''woodworking'', ''target shooting'', ''reading historical biographies'', ''strategic board games (chess)'',
    ''vintage radio restoration'']'
  career_goals: Although currently out of the formal workforce, John aims to translate his eclectic skill set into a modest side business offering handyman services and seasonal guide work for hunters and
    anglers visiting the Blaine County area. He plans to obtain a wilderness first‑aid certification to enhance his credibility as an outdoor guide and to formalize his knowledge of safety protocols. A
    secondary ambition is to complete the construction of a tiny cabin on a parcel of land he intends to purchase, using his carpentry and budgeting skills while imposing a more disciplined schedule to
    finally finish the project. He also hopes to become a trusted, if low‑profile, volunteer for the local fire department, where his competitive nature can drive him to excel in training drills.
