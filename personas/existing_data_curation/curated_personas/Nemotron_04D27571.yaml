  hobbies: '["Visiting art galleries","Live music and spoken‑word events","Acrylic painting","Digital illustration","Photography","R&B and hip‑hop dancing","Cooking Southern-inspired meals","Yoga","Hiking","Volunteering
    at community art workshops"]'
  career_goals: Ernisha aspires to re-enter the workforce in a role that merges her passion for the arts with her organizational strengths. She aims to secure a position as a community arts program coordinator
    or a freelance social media manager for local cultural organizations. Over the next few years, she hopes to complete a bachelor's degree in Arts Management to deepen her expertise, and eventually launch
    her own boutique creative studio offering event planning, branding, and visual storytelling services for small businesses and community groups. She also envisions mentoring youth in Apopka, especially
    through after‑school art workshops, to give back to her community.
