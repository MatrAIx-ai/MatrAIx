  hobbies: '[''Visiting art galleries and museums'', ''Digital illustration'', ''Photography'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''Board-game evenings'', ''Hiking Appalachian Trail'', ''Volunteering
    at community makerspace'', ''Mentoring teens in coding and electronics'']'
  career_goals: Leny aims to re‑enter the professional arena in a role that blends her analytical strengths with her creative inclinations. In the next two years she plans to secure a data‑science or product‑development
    position within a health‑tech or sustainable‑design startup in the Mid‑Atlantic, where she can lead cross‑functional teams to develop user‑centered solutions. She intends to deepen her expertise by
    completing a machine‑learning certification and a short UX research bootcamp, building a portfolio that showcases interdisciplinary projects. Long‑term, she envisions advancing to a senior product manager
    or research lead, while also establishing a community mentorship program that encourages Mexican‑American and other under‑represented youth to pursue STEM careers.
