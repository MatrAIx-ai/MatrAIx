personas:
  professional: Leny Perez, a methodical biomedical engineer turned data‑science enthusiast based in the Mid‑Atlantic, blends Python‑driven analytics, advanced lab expertise, and a flair for visual storytelling
    to craft user‑centered health‑tech or sustainable‑design solutions, leveraging their competitive spirit and organized planning to lead cross‑functional product teams while pursuing a machine‑learning
    certification and a UX research bootcamp.
  sports: Leny Perez tackles the Appalachian Trail sections near Hagerstown with the Mid‑Atlantic Hiking Club on Saturday mornings, roots for the Baltimore Ravens on Sundays, tracks the Washington Capitals’
    playoff runs, and occasionally joins pick‑up volleyball games at a local community park.
  arts: Leny Perez curates a vibrant visual diary of light‑filled photographs and digital illustrations inspired by frequent visits to the Baltimore Museum of Art and the Smithsonian American Art Museum,
    drawing creative cues from Kehinde Wiley’s bold palettes, Ansel Adams’s stark contrasts, and the rhythmic flair of salsa performances.
  travel: Leny Perez prefers meticulously planned weekend escapes to nearby attractions like Gettysburg and Shenandoah National Park, while dreaming of immersive cultural journeys to Oaxaca’s bustling markets
    and Kyoto’s serene temples, balancing adventure with budget‑savvy group bookings and shared Airbnb stays.
  culinary: Leny Perez delights in mastering regional Mexican dishes such as mole poblano, chiles en nogada, and tamales, meticulously grinding dried chilies, roasting cacao nibs, and whisking masa harina
    into silky dough, yet sometimes over‑salts the salsa while reminiscing about late‑night kitchen experiments during lively dinner parties with friends.
  core: Leny Perez is a curiosity‑driven, color‑coded planner who fuses data‑science precision with a love for salsa, art, and spicy cuisine, yet often approaches collaboration with a healthy dose of skepticism
    and a competitive edge.
background:
  cultural: Leny grew up in a bicultural Mexican‑American household where Spanish and English were spoken interchangeably, and family gatherings emphasized shared meals, music, and storytelling. She maintains
    strong ties to Mexican cultural traditions such as Día de los Muertos, Día de la Madre, and the celebration of regional festivals, often preparing homemade tamales and pan dulce with her family. Living
    in Hagerstown, Maryland, she has integrated into the local community while actively participating in the city’s Hispanic cultural association, attending multicultural events and volunteering with organizations
    that support immigrant families. Her cultural heritage informs her worldview, fostering a deep respect for community solidarity, educational achievement, and the blend of Mexican values with the diverse
    perspectives of the Mid‑Atlantic region.
