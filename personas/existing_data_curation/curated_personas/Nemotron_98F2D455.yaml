personas:
  professional: Linda Spicer is a meticulous interior painter and paperhanger whose precision, OSHA‑compliant safety practices, and ability to read blueprints allow her to deliver flawless high‑end residential
    finishes while preserving the solitary work style that fuels her competitive drive.
  sports: Linda Spicer spends sunrise fishing on Lake Charles, maintains a modest strength routine at the local YMCA, cheers the New Orleans Saints on Sundays, roots for the LSU Tigers during college football
    season, and participates in the Bay Area Anglers Club, which meets monthly to share tackle tips.
  arts: Linda Spicer channels a quiet creative spark by painting lake‑side landscapes in the style of Winslow Homer, photographing historic homes after studying Stephen Shore’s compositions, and unwinding
    with mystery novels by Tana French while occasionally listening to the soulful blues of Muddy Waters.
  travel: Linda Spicer plans low‑key road trips that blend coastal scenery with historic architecture, favoring day excursions to Gulf Islands National Seashore, weekend getaways to Savannah’s historic
    district, and a long‑awaited tour of Quebec City’s Old Town, all while keeping travel budgets tight to fund her business expansion.
  culinary: Linda Spicer enjoys home‑cooking Creole classics such as gumbo and blackened catfish, often incorporating garden‑grown tomatoes, okra, and sweet onions into the pot, but prefers simple prep
    with a cast‑iron skillet and occasionally treats herself to a shrimp po’boy from a local dockside stall.
  core: Linda Spicer embodies disciplined self‑reliance, thriving on solitary precision and a competitive edge while quietly wrestling with stress‑induced worries.
background:
  cultural: Linda grew up in a modest, working‑class Southern family in Lake Charles, Louisiana, where practical skills and self‑reliance are deeply valued. The Gulf Coast’s blend of Southern hospitality,
    Cajun and Creole influences, and a community accustomed to hurricane preparedness shaped her disciplined, risk‑aware mindset. While she identifies with broader White Southern American culture—marked
    by a strong work ethic, respect for craftsmanship, and appreciation for the outdoors—her personal preferences lean toward solitude and quiet, reflecting a nuanced balance between regional community
    ties and her introspective nature.
attributes:
  skills: '[''Interior painting'',''Wallpaper hanging'',''Surface preparation'',''Color mixing'',''Blueprint reading'',''Project estimating'',''Safety compliance (OSHA, lead‑safe)'',''Tool maintenance'',''Time
