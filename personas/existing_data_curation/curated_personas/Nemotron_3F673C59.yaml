  hobbies: '[''tropical gardening'', ''birdwatching'', ''refurbishing vintage electronics'', ''cooking soul-food with seafood'', ''church choir singing'', ''reading mystery novels'', ''gentle yoga'']'
  career_goals: Approaching retirement, Deborah aims to transition into a senior supervisory or consulting role where she can share her extensive hands-on knowledge with the next generation of maintenance
    workers. She plans to obtain a Certified Facility Manager (CFM) credential and an OSHA 30-hour safety certification within the next year. Additionally, she hopes to lead a small team tasked with upgrading
    the aging infrastructure of the community center in Apollo Beach, focusing on energy-efficient solutions. Long-term, Deborah envisions part-time freelance work providing home-repair services for senior
    neighbors, allowing her to stay active while maintaining a flexible schedule that respects her desire for autonomy.
