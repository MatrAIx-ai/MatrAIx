personas:
  professional: Deborah Walker, a veteran facility maintenance specialist with three decades of hands‑on experience, blends a pragmatic troubleshooting instinct with a curious streak for emerging energy‑saving
    technology, and despite a habit of misplacing paperwork, she is poised to earn her Certified Facility Manager credential while mentoring a new crew on the upcoming community‑center retrofit.
  sports: Deborah Walker, a regular at the Gulf‑side walking trail and a member of the Apollo Beach senior pickleball league, roots for the Tampa Bay Buccaneers in fall football, the Tampa Bay Rays during
    the baseball season, and squeezes in weekend yoga to keep her joints flexible.
  arts: Deborah Walker, whose Sunday mornings echo with the harmonies of Mahalia Jackson and Aretha Franklin as she sings in her church choir, also delights in the crackle of refurbished vintage radios
    while winding down with Agatha Christie mystery novels.
  travel: Deborah Walker, who prefers low‑key road trips, has driven the Florida Turnpike to explore the Everglades and Key West, dreams of a Caribbean cruise to the Bahamas, and keeps a list of nearby
    Gulf‑side cottages for spontaneous weekend getaways.
  culinary: Deborah Walker, an adept home cook, merges soul‑food staples like collard greens and smoked paprika with fresh Gulf shrimp to create signature dishes such as shrimp gumbo and fish étouffée,
    and she never skips her Sunday pot roast with a side of cornbread.
  core: Deborah Walker, a pragmatic tinkerer with a green thumb, balances a competitive edge in maintenance work with a laid‑back, slightly scatter‑brained love for gospel music, vintage radios, and spontaneous
    gardening sessions.
background:
  cultural: Deborah was raised in a close-knit African-American community in Central Florida, where church, family gatherings, and neighborhood block parties formed the core of her cultural life. Her grandparents
    were part of the Great Migration, bringing Southern culinary traditions that she blends with the coastal flavors of Florida. She identifies strongly with the resilience and collective support that characterize
    Black communities in the region, often volunteering at the local historically Black church for community clean-up projects. Her cultural heritage informs her work ethic, emphasizing reliability, hands-on
    problem solving, and a willingness to mentor younger Black youths entering skilled trades. Deborah also celebrates Juneteenth and participates in cultural festivals that showcase African-American art,
    music, and history, keeping her connected to her roots while embracing the diverse, multicultural environment of Apollo Beach.
attributes:
