persona_description: A researcher who specializes in comparative genomics and neuroimaging, particularly in the study of interneuron populations in different species. The individual is interested in understanding
  the similarities and differences in gene expression patterns between marmosets and mice, and between marmosets and humans. They are also interested in the integration of different datasets to obtain more
  comprehensive insights into the interneuron populations in different species. The individual is likely to be familiar with neuroimaging techniques such as functional MRI, and has experience working with
  RNA-seq and single-cell RNA-seq data. They are also likely to have experience working with Python and R programming languages.
