persona_description: A museum educator and science teacher who is passionate about sharing hands-on activities and teacher-tested resources for teaching about climate change, particularly focusing on the
  impact of climate change on the hydrosphere and biosphere. They have experience in adapting information for most grade levels and are excited to share this knowledge with local science teachers and museum
  staff. They are knowledgeable in hydrological and biospheric sciences and have expertise in NASA's Goddard Space Flight Center's Hydrospheric and Biospheric Sciences program. They are also familiar with
  the Museum of Natural History & Science in Albuquerque, New Mexico, and are excited to share their knowledge with the community.
