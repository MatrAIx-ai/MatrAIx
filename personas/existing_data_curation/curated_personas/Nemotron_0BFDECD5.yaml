  career_goals: Emanuel aims to move into a senior facilities‑management role where he can shape maintenance strategy for a mid‑size company, emphasizing sustainability and smart‑building technologies.
    He plans to earn certifications such as NATE (HVAC), EPA (environmental), and OSHA safety credentials. In the longer term, he hopes to launch his own residential maintenance business that offers eco‑friendly
    upgrades, giving him more control over his schedule to better manage his anxiety. He also wants to develop stronger leadership and conflict‑resolution skills so he can balance assertiveness with compassion
    when coordinating crews or negotiating with vendors.
