  hobbies: '[''gardening'', ''fishing'', ''cooking Southern and Cajun cuisine'', ''quilting'', ''attending church gatherings'', ''listening to country music'', ''volunteering with Habitat for Humanity'',
    ''DIY home repair projects'', ''walking local trails'', ''playing board games with family'']'
  career_goals: Selina aims to move into a foreman or site‑supervisor role within the next few years, leveraging her practical knowledge to lead crews and improve on‑site safety. She plans to complete an
    OSHA 30‑hour certification and enroll in a short‑term green‑building workshop to learn about sustainable materials and energy‑efficient construction methods. In the longer term, she hopes to start a
    small hand‑yman service that can serve her neighborhood, allowing her to mentor younger workers while creating a flexible schedule for her family as she approaches retirement.
