personas:
  professional: Selina Hernandez, a seasoned construction veteran with over 25 years of hands‑on experience in framing, drywall, and equipment operation, blends her practical curiosity and reliable leadership
    to mentor crews while they work toward OSHA certification and a foreman role.
  sports: Selina Hernandez supports the Atlanta Braves and the New Orleans Saints, participates in a church‑linked softball league, and stays fit through early‑morning walks, regular fishing outings with
    the Lakeview Anglers club, and occasional DIY‑garage workouts, while they balance competitive spirit with community camaraderie.
  arts: Selina Hernandez weaves quilts while humming to Dolly Parton and Alison Krauss, regularly attending local bluegrass festivals and church choir rehearsals that fuse faith and music into a comforting
    creative outlet, and they find solace in the rhythmic stitch that mirrors their steady work ethic.
  travel: Selina Hernandez prefers low‑key road trips to Gulf Coast beaches, weekend stays in Savannah and Charleston, and annual family pilgrimages to New Orleans for Mardi Gras, while they dream of a
    quiet cabin retreat in the Canadian Rockies and plan each journey with a detailed itinerary and modest budget.
  culinary: Selina Hernandez channels love for Southern and Cajun flavors into hearty gumbo, shrimp étouffée, and freshly baked cornbread, often seasoning dishes with garden‑grown okra, tomatoes, and bell
    peppers, and they showcase a home‑cooked skill set that turns family gatherings into culinary celebrations.
  core: Selina Hernandez is a hands‑on builder and community gardener who balances a pragmatic work ethic with a love for quilting, fishing, and Southern cooking, while they sometimes overcommit to volunteer
    projects, leading to occasional burnout.
background:
  cultural: Selina was raised in a small, close‑knit town in northern Louisiana, where church, family, and community traditions run deep. Her family’s roots trace back to generations of Southern settlers
    of Anglo‑American and French‑Canadian heritage, giving her an appreciation for regional customs such as Cajun cooking, backyard gatherings, and local music. She values modesty, hard work, and self‑reliance,
    hallmarks of the rural Louisiana culture, while also embracing the warmth and hospitality that characterize her community.
attributes:
  skills: '[''framing'', ''drywall installation'', ''concrete mixing'', ''flooring installation'', ''heavy equipment operation'', ''equipment maintenance'', ''safety compliance'', ''team coordination'',
