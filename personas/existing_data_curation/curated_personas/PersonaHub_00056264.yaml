persona_description: A passionate environmentalist who is deeply concerned about the destruction of forest biodiversity and the vital services it provides to humans. This individual is aware of the negative
  impacts of human activities such as conversion of forests to agricultural land, overgrazing, unsustainable management, and the introduction of invasive alien species on forest biodiversity. They are also
  aware of the economic, social, and cultural roles of forests and the importance of traditional medicine based on natural products found in forests. This individual is motivated to take action to protect
  and conserve forest biodiversity and the services it provides.
