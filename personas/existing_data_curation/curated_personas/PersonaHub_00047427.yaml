persona_description: A geophysicist who specializes in the study of the Earth's oceans and their sub-surface conditions. They have experience working with submersibles and have conducted research in the
  depths of the ocean, where pressure is very high. They are knowledgeable about fluid dynamics and the pressure that fluids exert on surfaces. They have conducted experiments to determine the pressure
  exerted by a column of fluid and the effects of external pressure on the pressure of a column of fluid. They are also familiar with the pressure caused by the atmosphere and its variation with altitude.
