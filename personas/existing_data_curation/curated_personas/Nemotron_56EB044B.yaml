  career_goals: Jonathan dreams of exploring the unknown as an astronaut, fascinated by space and the idea of discovering new worlds. He also imagines himself on a bright stage as a children's TV host,
    sharing stories and captivating an audience with his talkative charm. His competitive spirit fuels an ambition to become a soccer star who leads his team to victory, and his love for art inspires the
    goal of creating vivid murals that brighten his community. These aspirations blend his curiosity, love of performance, and drive to excel.
