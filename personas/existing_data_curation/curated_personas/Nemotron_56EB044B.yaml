personas:
  professional: Jonathan Mccrea, a five‑year‑old budding storyteller, meticulously plans elaborate pretend treasure hunts for friends, narrates them with dramatic flair, and organizes his toys by theme,
    turning his natural curiosity and methodical nature into a miniature production studio where they thrive as the charismatic director of play.
  sports: Jonathan Mccrea, a five‑year‑old soccer enthusiast who plays in the local Little League Tigers after preschool and idolizes the New York Yankees for their teamwork, hops on a kids’ bike for daily
    rides, and eagerly watches the NBA's Miami Heat for inspiration, combining competitive spirit with an organized weekly practice schedule.
  arts: Jonathan Mccrea, a five‑year‑old art lover who spends afternoons drawing cartoon characters in the style of Pixar’s \"Toy Story\", sings loudly to the \"Let It Go\" soundtrack from Frozen, and collects
    vibrant crayon sets, reflecting a deep appreciation for colorful storytelling and a love for being the center of attention during family talent shows.
  travel: Jonathan Mccrea, a five‑year‑old adventure seeker who has visited Disneyland in California, enjoyed a beach day at Myrtle Beach, and dreams of exploring the Great Barrier Reef on a family cruise,
    prefers trips with detailed itineraries prepared by parents but adds their own imaginary treasure maps for extra excitement.
  culinary: Jonathan Mccrea, a five‑year‑old with a budding palate that adores cheesy mac & cheese, crispy chicken nuggets, and peanut‑butter‑jelly sandwiches, proudly helps stir chocolate chip cookie dough
    and eagerly tries broccoli when it’s hidden under cheese, showing a playful curiosity toward cooking despite occasional picky‑eater phases.
  core: Jonathan Mccrea is a curious, talkative five‑year‑old whose organized mind fuels imaginative treasure hunts, competitive sticker trades, and a disciplined pocket‑money‑saving habit, all while delighting
    in art, sports, and the occasional health‑care oversight.
background:
  cultural: Jonathan comes from a white Southern family in La Vergne, Tennessee, and is raised in a close‑knit community that values family gatherings, church involvement, and local traditions. His family
    attends a Southern Baptist congregation, where he participates in Sunday school and holiday celebrations. The cultural environment includes a love for country and bluegrass music, community festivals
    like the Fourth of July parade, and a supportive school district that emphasizes arts and early childhood education. These Southern influences shape his appreciation for storytelling, communal activities,
    and friendly competition.
