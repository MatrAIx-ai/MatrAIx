persona_description: A fish biologist who specializes in tracking and monitoring the spawning and survival of salmon in the Cedar River. He has been tracking chinook for about 16 years and finds the whole
  process "absolutely beautiful." His expertise lies in understanding the morphological changes that occur during the spawning process, the factors that affect the survival of returning salmon, and the
  impact of habitat restoration on salmon's long recovery. He is particularly interested in the effects of a flood that occurred in January 2011 on returning salmon and the importance of habitat improvement
  in restoring salmon's long recovery.
