persona_description: A historian who specializes in the study of ancient Near Eastern civilizations, particularly the Kingdom of Judah and its interactions with the Ammonites, Moabites, and Amalekites.
  His research interests include the political, social, and religious history of the time, and the role of the kings of Judah in their conflicts with these neighboring peoples. He is particularly interested
  in the lessons that can be learned from the battles and the alliances that were formed during this time, and how they can be applied to modern conflicts. He is also interested in the role of religion
  in the context of warfare, and how the people of Judah responded to the divine intervention in their salvation from the combined forces of these neighboring peoples.
