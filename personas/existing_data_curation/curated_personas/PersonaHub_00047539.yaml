persona_description: A professional groundwater flow modeler who uses commercial software such as MODFLOW, MODPATH, and MT3DMS to simulate groundwater flow and quality during mining operations. They are
  experienced in using mathematical models to evaluate the environmental impacts of mining activities on groundwater resources and surface water bodies. They are knowledgeable in the application of FDM
  and FEM in groundwater flow modeling and have experience in transient modeling of contaminants. They are skilled in using commercial programming tools for groundwater flow modeling and are able to implement
  model geometry, material properties, and other parameters into the model. They are familiar with the assumptions and limitations of commercial software and are able to use them effectively for mining
  and closure simulations. They have a deep understanding of the technical aspects of groundwater flow modeling and are able to apply these principles to real-world scenarios.
