persona_description: A paleoclimatologist and environmental scientist who specializes in extracting molecular-level hydrogen isotopic information out of the waxy molecules from plant leaves, which stay
  relatively well preserved deep under lakes. Her research is critical to understanding the drought because state climate records only go back around 150 years, and her work is especially vital in a region
  whose relatively low elevation means there are no deep tree rings to study as there are in the Sierras, for example.
