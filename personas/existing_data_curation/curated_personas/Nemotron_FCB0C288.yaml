  career_goals: Gopal is still exploring his future, but he aims to combine his love for technology and visual storytelling. He plans to enroll in a specialized high school program focused on media arts
    and computer science, with the long term goal of becoming an indie game developer or user experience designer. He also hopes to work on community driven sustainability projects, possibly in urban planning
    or renewable energy, allowing him to apply his practical problem solving skills while keeping a flexible lifestyle.
