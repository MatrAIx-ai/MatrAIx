personas:
  professional: Krista Wilkins, a 33‑year‑old senior drafting specialist in an architecture firm, leverages advanced CAD/BIM expertise (AutoCAD, Revit, SolidWorks, MicroStation) and a methodical, curiosity‑driven
    workflow to produce code‑compliant 2D drawings and parametric 3D models while leading a small team with clear, solitary‑focused project management.
  sports: Krista Wilkins maintains fitness through solitary early‑morning runs in Prospect Park, follows the Brooklyn Nets and New York Rangers with quiet enthusiasm, participates in the Brooklyn Running
    Club’s weekend runs, prefers the meditative rhythm of solo mileage over crowded gym classes, and occasionally practices indoor rock climbing at a local bouldering gym during winter months.
  arts: Krista Wilkins enriches their creative life by sketching historic facades while listening to the ambient piano works of Max Richter and the classical sonatas of Ludwig van Beethoven, frequently
    attending exhibitions by contemporary artists like Ai Weiwei and Kerry James Marshall at the Brooklyn Museum, and enjoying quiet evenings at the Poetry Project to hear readings by local spoken‑word
    poets.
  travel: Krista Wilkins favors meticulously planned short‑haul getaways that blend solitude with cultural depth, having solo‑traveled to Kyoto’s Zen gardens and the fjord‑lined towns of Norway, while dreaming
    of a quiet autumn hiking trek through the Scottish Highlands and a future immersion in the artisans’ villages of Oaxaca for craft workshops.
  culinary: Krista Wilkins, an intermediate home chef, delights in preparing Mediterranean‑style quinoa‑tabbouleh with fresh basil, mint, and lemon zest from their balcony garden, often serving herb‑crusted
    salmon with roasted Brussels sprouts, and occasionally indulges in a comforting bowl of butternut‑squash risotto seasoned with sage during chilly Brooklyn winters.
  core: Krista Wilkins is a detail‑oriented drafting professional who balances a relentless curiosity for sustainable design with a deep need for solitude, managing anxiety through disciplined routines
    while quietly pursuing fine‑grained hobbies like sketching, piano, and solo travel.
background:
  cultural: Krista grew up in a middle‑class suburban community in northern New Jersey, raised by parents who emphasized education, self‑reliance, and modest social engagement. Her family heritage is primarily
    Northern European, and while culturally she identifies as a white American, she has been exposed to the diverse cultural tapestry of the New York metropolitan area since moving to Brooklyn for work.
    The urban environment has broadened her appreciation for multicultural arts, cuisine, and progressive civic values, yet her personal preference for solitude leads her to curate quieter, introspective
    experiences within the city. She maintains a blend of traditional holiday celebrations from her upbringing—such as Thanksgiving gatherings with extended family—and contemporary urban rituals like weekend
    visits to farmers’ markets and local art galleries. This hybrid cultural perspective informs her pragmatic outlook and her respect for both established practices and innovative ideas.
attributes:
  skills: '["AutoCAD", "Revit", "SolidWorks", "MicroStation", "Building code compliance", "Construction documentation", "BIM workflow development", "Geometric Dimensioning & Tolerancing (GD&T)", "Project
    time and cost estimation", "Sustainable design integration"]'
  hobbies: '["Architectural sketching", "Reading historical nonfiction", "Walking in Prospect Park", "Mindfulness meditation", "Yoga", "Playing piano", "Balcony gardening", "Listening to ambient music and
    tech podcasts", "Personal journaling", "Quiet coffee shop visits"]'
  career_goals: Krista aims to transition into a senior drafting specialist role within the next three years, leading a small team and overseeing complex multi‑disciplinary projects. She plans to obtain
    Autodesk Certified Professional credentials and a LEED Green Associate certification, solidifying her expertise in BIM and sustainable design. Long‑term, she aspires to become a BIM Manager, championing
    data‑driven workflows that streamline collaboration while reducing error rates. She is also considering a part‑time Master’s program in Construction Management to broaden her strategic perspective.
    Throughout her career progression, she remains committed to balancing her curiosity for new technologies—such as AI‑enhanced design automation—with the practical need to deliver accurate, code‑compliant
    drawings on schedule. Managing her anxiety, she seeks environments that value clear processes, supportive mentorship, and opportunities for focused, solitary work.
