persona_description: A historian who specializes in the study of coal mining disasters in the North Staffordshire Coalfield, particularly those that occurred in the early 20th century. His research interests
  include the causes and effects of the disasters, the impact on the local communities, and the legacy of the disasters on the industry. He is particularly interested in the accidents that occurred at the
  Florence colliery, Harriseahead colliery, and Birchenwood colliery, and the impact of these disasters on the local economy and society. He is also interested in the role of the colliery rescue stations
  and the efforts to prevent future disasters.
