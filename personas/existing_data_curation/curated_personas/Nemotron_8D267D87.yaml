personas:
  professional: Mariadejesus Hurtado, a methodical project coordinator with a STEM bachelor's degree, leverages bilingual communication and meticulous budgeting to steer community STEM workshops, and they
    are preparing for a data analytics certification and a part-time remote analyst role that balances family duties.
  sports: Mariadejesus Hurtado, an avid hiker of Piedmont Park's trails and a seasonal participant in the Atlanta Hiking Club, follows the Atlanta Falcons in football, tunes into Atlanta Hawks games for
    basketball, and attends live matches of Atlanta United FC, while they integrate weekly yoga sessions to balance activity with flexibility.
  arts: Mariadejesus Hurtado, a connoisseur of contemporary Mexican music, fills evenings with Los Tigres del Norte and Natalia Lafourcade, immerses in literary worlds of Elena Poniatowska and Arturo Islas,
    and occasionally watches Alejandro González Iñárritu's films at the Atlantican Film Forum, allowing cultural stories to inform their community engagement, and they often share insights during volunteer
    workshops.
  travel: Mariadejesus Hurtado, a planner who prefers curated itineraries, has explored Oaxaca's markets and the historic streets of San Miguel de Allende, enjoys weekend getaways to Savannah, Georgia,
    and dreams of trekking the ruins of Teotihuacan while budgeting travel funds through a dedicated wanderlust savings envelope, and they schedule trips around school calendars to minimize family disruption.
  culinary: Mariadejesus Hurtado, a disciplined home chef, perfects mole poblano using dried chiles guajillo, ancho, and pasilla, crafts tamales with masa and pork shoulder, and experiments with chiles
    en nogada that feature walnuts and pomegranate seeds, while they occasionally over-spice dishes in their quest for authentic depth.
  core: Mariadejesus Hurtado merges analytical precision with cultural passion, orchestrating community STEM mentorships and authentic Mexican catering ideas while they navigate budget constraints and occasional
    impulsive spice splurges.
background:
  cultural: Mariadejesus was raised in a bilingual household by Mexican parents who immigrated to the United States, speaking both Spanish and English at home. She maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, regional holidays, and family gatherings centered around authentic food. Living in Atlanta's DeKalb County, she actively participates in the vibrant Mexican‑American
    community, attending cultural events, supporting Spanish‑language schools, and sharing her heritage through cooking classes and community outreach. Her cultural identity reinforces values of family
    cohesion, respect for elders, and communal reciprocity, shaping both her personal life and community involvement.
attributes:
  skills: '["Data analysis", "Project management", "Bilingual communication (English-Spanish)", "Technical troubleshooting", "Budgeting and financial planning", "Culinary arts (Mexican cuisine)", "Community
    outreach and event planning", "Mentoring and tutoring in STEM"]'
  hobbies: '["Gardening", "Cooking Mexican cuisine", "Attending cultural festivals", "Hiking", "Reading historical fiction", "Yoga", "Volunteering at community centers", "Exploring new technology"]'
  career_goals: She aims to re‑enter the professional arena within the next two years by obtaining a data analytics certification and securing a part‑time remote analyst role that allows flexibility to
    maintain her family responsibilities. In parallel, she aspires to launch a monthly STEM mentorship series for middle‑school students in the Mexican community of Atlanta, and eventually to open a small
    family‑run catering business that showcases traditional Mexican cuisine, using her organizational expertise to blend entrepreneurship with cultural preservation.
