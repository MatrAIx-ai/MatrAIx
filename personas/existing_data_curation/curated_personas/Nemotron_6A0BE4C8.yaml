personas:
  professional: Heather Boykins is an aspiring digital storyteller who blends mural art, comic strip creation, and Scratch programming, using their curiosity and love for group collaboration to turn community
    narratives into vibrant visual projects.
  sports: Heather Boykins plays forward for the Frisco Freedom Soccer Club, trains with friends on Saturday mornings, cheers on the Dallas Cowboys during football season, and treats fitness as a fun social
    outing rather than a strict regimen, often forgetting to stretch after games but staying energized by the team's camaraderie.
  arts: Heather Boykins is a budding muralist and comic artist who draws inspiration from street artist Banksy, comic creator Jeff Smith, and singer‑songwriter Alicia Keys, channeling their love for storytelling
    and choir harmonies into colorful wall projects and interactive Scratch stories that celebrate community legends.
  travel: Heather Boykins enjoys spontaneous weekend trips with family to Austin’s live‑music venues, the historic River Walk in San Antonio, and the Space Center in Houston, while dreaming of a future
    adventure to London to explore the British Museum and West End theater scene.
  culinary: Heather Boykins loves soul‑food classics like fried chicken, collard greens, and cornbread, pairs them with Tex‑Mex tacos topped with fresh cilantro and lime, and often experiments with making
    homemade mac and cheese using sharp cheddar and a dash of hot sauce for an extra kick.
  core: Heather Boykins is a curiosity‑driven, art‑obsessed 11‑year‑old who balances a love for community storytelling with a relaxed, sometimes disorganized, approach to school and life.
background:
  cultural: Heather comes from an African‑American family that balances Southern Texas traditions with a rich heritage of storytelling, music, and community gatherings. Family Sundays often include church
    worship, soul‑food meals, and shared oral histories that connect her to ancestors’ experiences. Living in Frisco, she enjoys the multicultural fabric of the Dallas–Fort Worth area, participating in
    Juneteenth celebrations, attending local art workshops, and listening to a mix of R&B, hip‑hop, and contemporary pop that reflects her cultural roots while embracing the diverse influences of her Texas
    community.
