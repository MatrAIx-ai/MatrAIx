  career_goals: Heather dreams of a future where she can blend art, storytelling, and technology to inspire other kids. She envisions herself as a children's book author and illustrator, or perhaps a graphic
    designer who creates inclusive digital experiences. She also hopes to become a youth mentor who leads community art projects and coding clubs, showing peers how creativity can solve everyday challenges.
