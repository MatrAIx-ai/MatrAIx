persona_description: A scientist and plant breeder who specializes in the study of plant breeding, particularly in the area of viburnum breeding. He has extensive knowledge and experience in the use of
  naturally cross-pollinating shrubs and extracted seed embryo tissue culture to create modern viburnum hybrid shrubs and cultivars. His investigations and patience have provided tremendous insight into
  the genetics, relationships, and procedures for crossing different woody plants. He is particularly interested in the sectioning of viburnum plants based on their seed wall structure and the successful
  cross-pollination of viburnums using controlled methods. His work has been influential in increasing understanding of genetic relationships among viburnums through DNA analysis at the molecular level.
