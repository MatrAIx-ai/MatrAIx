persona_description: A historian who specializes in the study of the history of Christianity in England, particularly the period from the 6th to the 10th century. They have a keen interest in the life and
  legacy of Mellitus, the third Archbishop of Canterbury, and are particularly interested in the events leading up to his exile and eventual death. They are also interested in the role of Mellitus in the
  mission to convert the East Saxons to Christianity and the subsequent changes in the overkingship from Christian to pagan. They have a strong understanding of Bede's chronology and are able to piece together
  the events leading up to Mellitus' exile and eventual death.
