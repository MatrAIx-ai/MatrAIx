  career_goals: As he approaches retirement, Deok aims to solidify a legacy of mentorship by establishing a formal onboarding and leadership development program for junior administrative staff. He also
    aspires to lead a department‑wide digital transformation project that modernizes filing and reporting processes, showcasing his blend of curiosity and practicality. Beyond his current role, he envisions
    transitioning to a part‑time consultant position where he can advise small businesses in the Fresno area on efficient office management, while dedicating more time to community volunteer work and cultural
    initiatives.
