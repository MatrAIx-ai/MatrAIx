  career_goals: Kathy aims to translate her extensive front‑line experience into a supervisory or management position within the hotel. Over the next three to five years she plans to earn a Certified Hospitality
    Supervisor (CHS) credential, take on lead‑trainer responsibilities for new staff, and advance to a Front‑Desk Manager or Operations Supervisor role. She is motivated to mentor junior employees, streamline
    service processes, and contribute to a culture of reliability and hospitality excellence while maintaining the stable work‑life balance that supports her family.
