personas:
  professional: Kathy Figueroa, a seasoned hospitality professional with a decade of front‑line experience in Davenport's hotels, leverages her meticulous scheduling and inventory control expertise to streamline
    operations, while her practical mindset and calm demeanor have earned her a reputation for turning guest complaints into service improvements.
  sports: Kathy Figueroa, an avid supporter of the Quad Cities River Bandits and a seasonal member of the Davenport Community Center’s senior softball league, finds her fitness routine in brisk river‑trail
    walks, weekend bird‑watching hikes, and a weekly low‑impact aquatics class that keeps her agile for the physical demands of the hospitality floor.
  arts: Kathy Figueroa, a regular attendee of Figge Art Museum exhibitions and a weekend devotee of Ansel Adams’ black‑and‑white nature photography, fills her downtime knitting while listening to the folk
    stylings of Joan Baez and the smooth jazz of Miles Davis, and they often quote passages from Hilary Mantel’s historical novels during quiet evenings.
  travel: Kathy Figueroa, a meticulous planner who maps out itineraries in spreadsheet form, prefers relaxed weekend getaways to historic river towns such as Galena and New Orleans, while dreaming of a
    spring tour of the vineyards in Mendoza, Argentina, and they allocate a modest travel budget each year to fund these low‑key explorations without compromising family responsibilities.
  culinary: Kathy Figueroa, a confident garden‑to‑table cook, delights in slicing home‑grown zucchini into ratatouille, simmering a slow‑cooked beef chili with cumin and smoked paprika, and she regularly
    trades home‑made sourdough loaves for fresh cheese at the local farmers’ market, though she occasionally splurges on a midnight slice of pepperoni pizza after a long shift.
  core: Kathy Figueroa, a disciplined hospitality veteran who spends evenings tending a meticulous garden and solving crossword puzzles, secretly hoards hotel key cards as a quirky reminder of past shifts,
    embodying quiet reliability and a love for order.
background:
  cultural: Kathy was raised in a middle‑class, white, Protestant family in a small town near Davenport, Iowa. The community emphasized hard work, courtesy, and a strong sense of neighborhood responsibility,
    fostering values of modesty, reliability, and collective harmony. While her heritage is primarily Anglo‑American, her career in hospitality exposed her to a diverse array of travelers, giving her a
    pragmatic appreciation for different cultures while staying rooted in Midwestern customs. She participates in local traditions such as Fourth of July parades, county fairs, and church gatherings, values
    family meals, and is active in community service initiatives.
