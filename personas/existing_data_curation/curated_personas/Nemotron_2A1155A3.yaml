personas:
  professional: Anna Wiggins, a seasoned Licensed Practical Nurse with four decades of geriatric and palliative care expertise, blends meticulous patient assessment and wound‑care skills with her love of
    watercolor art to craft informal art‑therapy sessions, all while navigating a relaxed, sometimes disorganized, mentorship style that still drives competitive quality‑improvement initiatives.
  sports: Anna Wiggins enjoys low‑impact exercise through a weekly senior walking club that explores the Texas Hill Country, follows the Dallas Cowboys (NFL) and the San Antonio Spurs (NBA), and participates
    in the local bird‑watching league’s early‑morning nature walks, favoring flexibility over rigid training regimes.
  arts: Anna Wiggins spends weekends sketching watercolor landscapes inspired by the vibrant palettes of artist Mary Ann Hobbs and the folk motifs of Peter Max, attends community theater productions by
    the Hill Country Players, and curates a rotating quilt exhibit that pays homage to traditional Día de los Muertos patterns while listening to the music of Robert Earl Keen and Kaki King.
  travel: Anna Wiggins favors spontaneous road trips across the Texas Hill Country, has visited the historic San Antonio River Walk, the art‑rich town of Santa Fe, and spent a week exploring the markets
    of Oaxaca, Mexico, and dreams of a leisurely Mediterranean cruise, balancing her love of unplanned detours with a modest travel budget.
  culinary: Anna Wiggins, a self‑taught home chef, blends classic Tex‑Mex staples with creative twists such as chipotle‑spiced chicken enchilada casserole and quinoa‑infused black‑bean tacos, regularly
    prepares cochinita pibil tacos with mango salsa, and occasionally over‑salts dishes due to her relaxed approach to precise measurements.
  core: Anna Wiggins, a resilient 68‑year‑old nurse‑artist, balances a love for watercolor, quilting, and senior mentorship with a laid‑back, sometimes disorganized, yet fiercely curious and competitively
    spirited outlook on life.
background:
  cultural: Anna was raised in a middle‑class, white Texan family with deep roots in the Hill Country, where a blend of Southern hospitality and frontier independence shaped her values. Her upbringing emphasized
    community service, modesty, and a respect for tradition, while also exposing her to the rich musical and artistic heritage of Central Texas. These cultural influences foster her appreciation for local
    art, her commitment to helping neighbors, and her relaxed yet resilient attitude toward life's obligations.
attributes:
  skills: '["Patient assessment and vital‑sign monitoring", "Wound‑care management", "Medication administration", "Geriatric and palliative nursing", "Patient education and health coaching", "Community
    health outreach", "Basic art‑therapy facilitation", "Electronic medical record documentation", "Quality‑improvement project participation", "Mentorship of LPNs and nursing assistants"]'
  hobbies: '["Watercolor painting of Texas landscapes", "Quilting with folk‑art motifs", "Attending art fairs and community theater", "Gardening and birdwatching", "Cooking experimental Tex‑Mex fusion dishes",
    "Playing bridge at a community club", "Reading historical mystery novels", "Volunteering to teach art to seniors"]'
  career_goals: Anna aims to transition into a senior mentorship role within her health‑care network, eventually earning a Certified Nursing Assistant Educator credential to formally train the next generation
    of caregivers. She also hopes to develop a small‑scale art‑therapy program for the local senior community, blending her nursing background with her passion for creativity. Additionally, she plans to
    obtain a Geriatric Nursing Certification to deepen her expertise and lead quality‑improvement projects that enhance patient outcomes in long‑term care settings.
