personas:
  professional: Rochelle Thakkar, a nine‑year‑old budding software hobbyist, enjoys mapping out flowcharts before coding in Scratch, and they channel their love for order and creativity into projects that
    solve simple real‑world puzzles.
  sports: Rochelle Thakkar, a competitive member of the local U‑10 soccer team, thrives on structured drill practices, follows the tactics of Manchester United’s youth academy, and they cheer for the women’s
    national team during big tournaments.
  arts: Rochelle Thakkar, an avid LEGO architect and clay sculptor, draws inspiration from Mary Pope Osborne’s Magic Tree House adventures, the whimsical illustrations of Studio Ghibli’s films, and the
    bold lines of Keith Haring’s artwork, and they often recreate favorite scenes in miniature form.
  travel: Rochelle Thakkar, who prefers trips with detailed itineraries, has visited the Grand Canyon on a family weekend getaway, spent a summer camp week in the Blue Ridge Mountains, and they dream of
    exploring the historic castles of Scotland on a future vacation.
  culinary: Rochelle Thakkar, a junior chef in training, loves assembling mini‑pizzas topped with mozzarella, pepperoni, and fresh basil, crafts colorful fruit kebabs with strawberries, grapes, and banana
    slices, and they enjoy measuring ingredients with a toy kitchen scale, though they sometimes forget to clean the kitchen afterward.
  core: Rochelle Thakkar blends a nine‑year‑old’s curiosity with a knack for order, turning LEGO bricks, chess moves, and Scratch code into a disciplined playground of creativity and competition.
background:
  cultural: Rochelle was raised in Naperville, Illinois, within a middle‑class, suburban white American family that values education, community involvement, and seasonal celebrations such as Thanksgiving,
    Halloween, and Fourth of July fireworks. While her family identifies as white, her paternal lineage includes Indian ancestry, which occasionally introduces her to cultural traditions like sharing Indian
    sweets during special family gatherings. This blend of Midwest American customs and subtle multicultural influences enriches her upbringing, fostering an appreciation for both local community events
    and broader cultural diversity.
