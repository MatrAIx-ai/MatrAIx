personas:
  professional: Maria Olmos, an avid junior storyteller, channels her love for adventure mysteries into crafting illustrated short stories for school newsletters, leveraging her disciplined routine, competitive
    edge, and meticulous attention to detail to meet weekly deadlines and outshine peers.
  sports: Maria Olmos, a spirited forward on the Riverside Tigers U‑12 soccer team, trains thrice weekly, idolizes FC Barcelona’s Lionel Messi, and channels her competitive nature into both match play and
    weekend pick‑up games with friends.
  arts: Maria Olmos, a budding illustrator, fills sketchbooks with vibrant scenes inspired by the rhythmic melodies of Lila Downs and Carlos Santana, while her afternoons are spent crafting papel picado
    and delicate embroidery pieces that echo the patterns she admires in traditional festivals.
  travel: Maria Olmos, who has explored the bustling streets of the capital city and collected shells on the sandy shores of Puerto Escondido, dreams of trekking the stone pyramids of Teotihuacan and skiing
    down the Swiss Alps, preferring carefully mapped itineraries that blend family time with a dash of adventure.
  culinary: Maria Olmos, a kitchen apprentice, delights in shaping corn masa for chicken tamales, kneading dough for pan dulce scented with piloncillo and cinnamon, and proudly presents her conchas garnished
    with bright red fruit jam to family gatherings.
  core: Maria Olmos is a routine‑loving, puzzle‑driven eleven‑year‑old who balances competitive soccer, vivid illustration, and family‑centric cooking, all while keeping a secret stash of hidden snack wrappers.
background:
  cultural: Maria Isabel comes from a Mexican‑American family that blends rich Mexican traditions with Texan life. At home she speaks Spanish and celebrates holidays such as Día de los Muertos, Cinco de
    Mayo, and family reunions centered on food and music. She participates in community events at the local Hispanic cultural center in Boerne and attends a bilingual church. Her upbringing emphasizes practicality,
    respect for tradition, and a strong sense of community, all of which shape her daily routines and outlook.
attributes:
  skills: '["Organizational planning", "Bilingual reading (English & Spanish)", "Basic computer literacy", "Mathematical problem‑solving", "Following detailed recipes", "Collaborative teamwork", "Time management"]'
  hobbies: '["Reading adventure/mystery books", "Drawing and illustration", "Soccer", "Traditional crafts (papel picado, embroidery)", "Baking Mexican pastries (tamales, pan dulce)", "Puzzle solving (Sudoku,
    chess)", "Listening to Mexican folk music"]'
  career_goals: Maria Isabel dreams of becoming a veterinarian so she can care for animals in her community, and she is also intrigued by the idea of designing safe, practical spaces as a civil engineer.
    She is motivated to keep her grades high, win science fair competitions, and develop the problem‑solving skills that will support these future careers.
