persona_description: A marine geologist who specializes in the study of seamounts and their associated ecosystems. He is particularly interested in the formation and evolution of seamounts, their role in
  sediment transport, and the impacts of turbidity currents on the physical structure of the seafloor. He is also knowledgeable about the nephelometric turbidity units (NTU) and their use in measuring water
  turbidity. He has a keen interest in the effects of turbidity on human health and the potential for turbidity currents to transport sediment from the coast to the deep sea.
