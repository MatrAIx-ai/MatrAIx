  career_goals: Kim Ann hopes to combine her love for art and her desire to help others by pursuing a career in illustration and art therapy, aiming to create therapeutic visual resources for children.
    In the near term, she wants to attend a specialized high school program in visual arts, develop a portfolio for college, and volunteer with youth mental‑health initiatives. Long‑term, she envisions
    working as a children’s book author/illustrator or as an art‑based community program coordinator.
