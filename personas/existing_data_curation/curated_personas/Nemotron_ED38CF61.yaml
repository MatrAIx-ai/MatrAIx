  hobbies: '[''community mural volunteering'', ''local history tours'', ''farmers market socializing'', ''recreational softball'', ''Syracuse Orange sports fandom'', ''hiking in Onondaga Lake Park'', ''evening
    color theory classes'', ''collecting vintage painting tools'']'
  career_goals: Jamal aims to transition from employee to owner‑operator by establishing his own boutique finishing company that blends high‑quality craftsmanship with artistic interior design. He plans
    to obtain certification from the Painting and Decorating Contractors of America, mentor apprentices, and eventually expand his services to include custom mural work for local businesses and community
    spaces. A long‑term ambition is to curate a quarterly art‑inspired showcase where tradespeople display their creative projects, positioning him as a bridge between the local craft community and the
    Syracuse arts scene.
