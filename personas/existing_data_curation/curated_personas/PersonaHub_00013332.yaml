persona_description: 'A historian specializing in the study of the interactions between indigenous peoples and Europeans in the southeastern United States during the early contact period, focusing on the
  agency and social lives of past indigenous communities. Edmond A. Boudreaux III is the director of the Center for Archaeological Research and an associate professor of anthropology at the University of
  Mississippi. He is the author of The Archaeology of Town Creek and coeditor of Archaeological Perspectives on the Southern Appalachians: A Multiscalar Approach. Maureen Meyers is an associate professor
  of anthropology at the University of Mississippi, and Jay K. Johnson is the editor of Remote Sensing in Archaeology: An Explicitly North American Perspective. Together, they contribute to the field of
  early contact studies by providing new research on the ways Native societies responded to early contact with Europeans, tracing the ways Native institutions changed as a result of colonial encounters,
  and emphasizing the agency of indigenous populations in situations of contact.'
