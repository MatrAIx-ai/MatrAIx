personas:
  professional: Inez Close is an aspiring junior naturalist who spends free time exploring the wooded trails behind their house, using a pocket guidebook to identify insects and collecting leaves, while
    they channel that curiosity into building detailed LEGO habitats that mirror the ecosystems they study.
  sports: Inez Close plays forward on the Maple Grove Under-8 soccer team, pedals a teal bike around the neighborhood park with a group of friends on Saturday afternoons, and they cheer for the local youth
    baseball league's 'River Raptors' while balancing a love for both team sports and solo bike rides.
  arts: Inez Close builds elaborate LEGO cities, sketches woodland animals with colored pencils, delights in Sunday school crafts featuring paper lanterns, and they share a favorite playlist of soft acoustic
    tunes by Jack Johnson and the whimsical scores of Studio Ghibli's 'My Neighbor Totoro'.
  travel: Inez Close loves weekend family hikes to Blue Ridge Trail, dreams of camping under the towering redwoods of California's Redwood National Park, and they have already taken a simple road trip to
    the state fair in Nashville, where the bright rides sparked a yearning for future adventure travel.
  culinary: Inez Close prefers homemade pizza with mozzarella, pepperoni, and pineapple, enjoys making fruit kebabs of strawberries and grapes, and they often help their parent stir marinara sauce for spaghetti
    while discovering a fascination for bright orange carrots and sweet corn kernels that add color to their meals.
  core: Inez Close is a curious, slightly disorganized 7-year-old who balances boundless exploration of nature with a love for LEGO building, often calming anxiety through drawing and soft music, yet sometimes
    forgets to tidy up their creations or save every coin.
background:
  cultural: Inez grew up in Loganville, a small town in Walton County, Georgia, within a middle‑class white family that values Southern hospitality, close‑knit community, and church involvement. Her upbringing
    includes frequent family gatherings, community events like local football games, and participation in church activities. The region’s natural landscape—forests, farms, and seasonal wildlife—has shaped
    her love for the outdoors. While she speaks with a gentle Southern lilt, her family emphasizes respect, courtesy, and a practical work ethic, encouraging her curiosity while grounding her in everyday
    responsibilities.
attributes:
  skills: '[''Reading fluently'', ''Basic arithmetic'', ''Curiosity-driven problem solving'', ''Storytelling and illustration'', ''Simple coding (Scratch Jr.)'', ''Empathetic peer mediation'']'
  hobbies: '[''Exploring nature trails'', ''Collecting and identifying leaves and insects'', ''Building LEGO creations'', ''Drawing and illustration'', ''Reading adventure books'', ''Biking with friends'',
    ''Playing soccer at the park'', ''Sunday school crafts'', ''Listening to music for relaxation'']'
  career_goals: Inez dreams of becoming a veterinarian or wildlife biologist, drawn by her love of animals and her desire to understand how living things work. She also imagines herself as a scientist who
    can discover new things while helping her community stay safe and healthy. In the longer term, she hopes to combine her curiosity with practical skills to become a teacher who makes learning fun for
    other kids.
