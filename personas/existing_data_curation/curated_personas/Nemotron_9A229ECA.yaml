  career_goals: He aims to advance to a plant manager or regional operations role within the next five years, leveraging his practical knowledge to drive higher efficiency and safety benchmarks. Jorge also
    plans to earn an associate degree in industrial technology to formalize his expertise, and to mentor emerging leaders in his facility. Financially, he seeks to secure a larger home and fund his children's
    college education while maintaining a stable work‑life balance.
