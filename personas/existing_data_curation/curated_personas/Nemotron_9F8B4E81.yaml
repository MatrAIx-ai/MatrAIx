personas:
  professional: Samuel Caspar, a budding junior architect in the world of imagination, channels his curiosity and practicality by designing elaborate Lego structures while learning basic engineering concepts,
    and his balanced organization and flexibility lets him adapt plans when new ideas spark during play.
  sports: Samuel Caspar, an energetic member of the Maple Grove Youth Soccer Club, thrills on the weekend field with friends, cycles around the neighborhood as part of the local bike club, and roots for
    the United States Men's National Soccer Team while also cheering for the hometown basketball team, the River Rapids, during school breaks.
  arts: Samuel Caspar finds joy in drawing dinosaurs and rockets inspired by the illustrations of Mary Blair, humming along to The Wiggles' upbeat songs while watching nature documentaries narrated by David
    Attenborough, and occasionally reenacting scenes from the animated film Moana during family movie nights.
  travel: Samuel Caspar loves planning mini‑adventures to the nearby city zoo and the beach, dreams of seeing the Grand Canyon and the Great Barrier Reef on family vacations, but prefers short trips where
    they can bring their Lego travel kit and a sketchbook to capture new creatures.
  culinary: Samuel Caspar enjoys building pizza slices topped with mozzarella, pepperoni, and pineapple, munching on carrot sticks with hummus, proudly stirring spaghetti sauce with tomatoes, basil, and
    garlic, and experimenting with simple no‑bake Lego‑shaped rice balls during weekend cooking sessions.
  core: Samuel Caspar, a curious and kind 7‑year‑old, balances massive Lego kingdoms with soccer kicks, saves spare change for future sets, forgets chores when a new puzzle appears, and always wears a dinosaur‑themed
    backpack for good luck.
background:
  cultural: Samuel grows up in a middle‑class white family in Oklahoma City, where Midwestern and Southern cultural influences shape his upbringing. Family life revolves around community events, church
    gatherings, and local traditions like Friday night football, barbecues, and country music. His heritage includes German and Irish ancestry, celebrated through occasional cultural dishes and holiday
    customs. The values of kindness, cooperation, and respect for others are reinforced at school and in the neighborhood, reflecting the friendly, close‑knit spirit of the Cleveland County area.
