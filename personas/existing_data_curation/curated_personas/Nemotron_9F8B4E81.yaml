  career_goals: He dreams of becoming an astronaut or engineer who designs rockets, inspired by his fascination with space and how things work, while also imagining a future as a veterinarian to care for
    animals. Samuel wants a career that merges his curiosity with practical problem‑solving, allowing him to help people, protect the environment, and contribute to his community.
