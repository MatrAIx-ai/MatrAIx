  hobbies: '[''Community volunteering'', ''Gardening'', ''Cooking (Texas BBQ)'', ''Hiking'', ''Softball league'', ''Live music concerts'', ''Reading mystery novels'', ''DIY home projects'']'
  career_goals: Geraldine aims to obtain advanced certifications such as the Certified Instrumentation and Control Technician (CICT) and become a lead installer or supervisor within a major petrochemical
    facility in the Houston area. She wants to mentor apprentices, improve process safety standards, and eventually transition into a consulting role that helps small businesses optimize their valve maintenance
    programs while maintaining a balanced family life.
