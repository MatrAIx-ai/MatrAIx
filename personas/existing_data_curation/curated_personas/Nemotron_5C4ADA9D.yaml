  hobbies: '["Drawing comics", "Creative writing (fantasy stories)", "Digital painting", "Coding simple interactive games", "Listening to lo‑fi music", "Playing indie video games", "Drama club and improv
    acting", "Cooking Vietnamese dishes", "Skateboarding", "Attending cultural festivals"]'
  career_goals: Giang dreams of becoming a multimedia artist who can merge visual art, narrative storytelling, and interactive technology. He hopes to attend a specialized high school for the arts and later
    study visual arts or game design at university, eventually working as a concept artist or creative director for video games or animated series. He also wants to launch a YouTube channel that showcases
    his art process while sharing Vietnamese cultural stories, inspiring other young creators. In the longer term, he envisions creating community art programs that empower teens to express themselves through
    art and storytelling.
