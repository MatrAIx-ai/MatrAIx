personas:
  professional: An aspiring digital storyteller, Giang Khamphanh blends comic illustration, fantasy short stories, and beginner Python or Scratch coding into interactive narratives, harnessing their talkative,
    sociable energy to lead school art and drama projects and turn abstract ideas into collaborative creations.
  sports: A weekend skateboarder, Giang Khamphanh spends afternoons at the local San Antonio skate park mastering ollies and kickflips, roots for the San Antonio FC soccer team, and occasionally joins friends
    for pickup basketball games at the community center.
  arts: An enthusiastic visual artist, Giang Khamphanh draws inspiration from Studio Ghibli’s whimsical animation, Shaun Tan’s graphic storytelling, and the lo‑fi beats of Nujabes, while actively performing
    improv at the school drama club and curating a zine featuring indie comic creator Noelle Stevenson’s work.
  travel: A curiosity‑driven explorer, Giang Khamphanh enjoys weekend road trips to Austin’s live‑music scene, day trips to the historic River Walk in San Antonio, and dreams of a future backpacking adventure
    through Kyoto’s lantern‑lit streets, balancing family budget constraints with a love for cultural festivals.
  culinary: A budding home chef, Giang Khamphanh loves crafting aromatic pho broth with star anise, simmering pork for bánh mì, and rolling fresh spring rolls with shrimp, rice noodles, herbs, and fish
    sauce, often teaming up with parents to perfect the balance of lime and fresh cilantro, while occasionally experimenting with fusion tacos that blend Mexican chilies with the fragrant spices of their
    family’s recipes.
  core: Giang Khamphanh is a 14‑year‑old imagination‑fuelled creator who balances spontaneous art projects, skate‑park thrills, and a love of family cooking, all while navigating teen finances and health
    with a chatty, slightly disorganized charm.
background:
  cultural: Giang is a second‑generation Vietnamese‑American raised in San Antonio, Texas. At home, his family speaks Vietnamese and celebrates traditions such as Tet, making phở and bánh mì, and honoring
    elders. Growing up in a multicultural city, he has absorbed Texan and broader American customs, blending them with his heritage. He appreciates Vietnamese artistic traditions like lacquer painting and
    calligraphy, often incorporating motifs from his cultural background into his artwork. He participates in local Vietnamese community events and serves as a cultural bridge between his peers and his
    family’s traditions. This bicultural upbringing fuels his desire to share and celebrate Southeast Asian culture through creative media.
