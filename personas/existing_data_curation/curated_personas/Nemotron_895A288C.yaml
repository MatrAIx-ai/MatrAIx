  hobbies: '[''Hiking and Trail Photography'', ''Reading Mexican Literature'', ''Cooking Traditional Mexican Dishes'', ''Acoustic Guitar Playing'', ''Volunteer English Tutoring'', ''Strategy Board Games'',
    ''DIY Electronics and PC Building'', ''Mindfulness Journaling'']'
  career_goals: Alvin aims to advance to a senior program‑manager role within the next five years, overseeing large‑scale, multi‑disciplinary initiatives that blend technology with community development.
    He plans to earn the PMP certification and pursue an MBA to deepen his strategic and financial acumen. A long‑term ambition is to mentor emerging Latino professionals in project management and eventually
    launch his own consultancy focused on sustainable development projects in Riverside County. He also hopes to lead initiatives that celebrate and preserve his Mexican cultural heritage while creating
    measurable social impact.
