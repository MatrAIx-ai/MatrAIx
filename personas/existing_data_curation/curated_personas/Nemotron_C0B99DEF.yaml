personas:
  professional: Jose Perez, an 8‑year‑old junior builder who transforms LEGO sets into experimental prototypes, melding curiosity with practical problem‑solving, yet often skips step‑by‑step instructions
    in favor of spontaneous building, leading to occasional frustration when structures wobble and a competitive drive to out‑build peers.
  sports: Jose Perez darts onto the local park's soccer field every Saturday, competing fiercely for the forward position on the neighborhood team called the Red Rangers, skeptical of teammates' effort,
    prefers the fast‑paced summer league, and also joins a community baseball club in the fall, channeling their competitive streak into every game.
  arts: Jose Perez spends afternoons sketching heroes and monsters inspired by comic creator Stan Lee and animated storyteller Hayao Miyazaki, eagerly watches science‑themed shows like 'Mystery Lab', enters
    school art contests where their competitive edge shines, yet they sometimes begrudge critique and worry about their drawings not being perfect.
  travel: Jose Perez loves spontaneous weekend trips to nearby river valleys and state parks, collecting rocks and leaves for later study, dreams of exploring the Grand Canyon and Yellowstone National Park,
    plans trips with a quick checklist but often worries about forgetting essential gear, balancing adventure with a need for familiar comforts.
  culinary: Jose Perez enjoys helping prepare family recipes such as seasoned rice, bean stew, and homemade salsa, experimenting with a pinch of cumin or chili powder to satisfy their curious palate, skillfully
    chops vegetables with growing confidence, yet occasionally neglects to wash hands after handling Lego pieces.
  core: Jose Perez, an inquisitive eight‑year‑old whose curiosity fuels Lego engineering, soccer competition, and artistic sketches, battles spontaneity‑driven disorganization and worry‑induced stress while
    striving to turn every hobby into a personal triumph.
background:
  cultural: Jose is a first-generation Mexican-American growing up in Garden City, Kansas. He speaks Spanish at home and English at school, weaving both languages into daily life. Family gatherings feature
    tacos, tamales, and stories from his grandparents about life in Mexico, while local Midwestern traditions—like county fairs and baseball games—also shape his experiences. He celebrates Día de los Muertos
    with homemade altars, enjoys Mexican music and dance, and feels a strong sense of pride in his heritage, which blends with the close-knit, rural community of Gray County.
