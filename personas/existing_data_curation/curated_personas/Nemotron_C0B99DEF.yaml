  career_goals: Even at eight, Jose dreams big. He imagines himself designing rockets as an astronaut-engineer, inventing gadgets that solve everyday problems, or becoming a veterinarian who helps animals.
    His love of competition fuels a goal to be a star soccer player, while his skeptical side makes him curious about mysteries, so he sometimes says he'd like to be a detective. He wants to keep learning,
    make his family proud, and prove he can turn his ideas into real things.
