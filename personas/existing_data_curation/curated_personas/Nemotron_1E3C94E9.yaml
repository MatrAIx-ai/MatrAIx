personas:
  professional: Erica Fletcher is an energetic teen who combines a talent for rallying peers on the basketball court with a flair for crafting TikTok content, and they use those communication and quick‑thinking
    abilities to coordinate community gatherings and aim for a future as a dental assistant or nurse, preferring structured tasks while still enjoying on‑the‑fly flexibility.
  sports: Erica Fletcher is a dedicated basketball enthusiast who dominates pick‑up games at the Riverside Youth Basketball Association, roots for the Los Angeles Lakers and the LA Dodgers, and they participate
    in after‑school training sessions with the local high‑school team, using sport as a primary outlet for competition and stress relief.
  arts: Erica Fletcher channels their love of music and dance into viral TikTok routines set to tracks by H.E.R., SZA, and Kendrick Lamar, and they attend local block parties that feature performances by
    up‑and‑coming hip‑hop crews and appreciate classic R&B icons like John Legend, shaping their identity through rhythmic self‑expression.
  travel: Erica Fletcher enjoys weekend road trips to Joshua Tree National Park and spontaneous visits to San Diego’s beach boardwalk, and they dream of exploring New York City’s basketball courts and attending
    a music festival in Austin, while budgeting limited funds with a part‑time job to make these adventures feasible.
  culinary: Erica Fletcher loves cooking soul‑food staples such as collard greens with smoked turkey, sweet‑potato pie, and crispy chicken wings, and they also experiment with tacos al pastor topped with
    fresh cilantro and lime, often blending family recipes with ingredients like smoked paprika, black‑eyed peas, and avocado for a modern twist.
  core: Erica Fletcher is a lively, community‑focused teen who balances a competitive drive with creative flair, often juggling a structured future plan and spontaneous fun, yet they occasionally let worry
    and disorganization get the best of them.
background:
  cultural: Erica comes from an African American family that has lived in Riverside for several generations. Her parents and grandparents emphasize resilience, community, and the importance of education,
    despite the systemic challenges their community faces. Growing up in a diverse city with large Latino and Asian populations, she experiences a blend of cultural influences—she enjoys soul food recipes
    passed down from her grandmother while also celebrating the multicultural festivals that Riverside hosts. Church and the local Black Student Union provide her with supportive networks, and she takes
    pride in observing Juneteenth and Kwanzaa traditions with her family. This cultural grounding gives her a strong sense of identity and fuels her desire to uplift other young black teens from her neighborhood.
