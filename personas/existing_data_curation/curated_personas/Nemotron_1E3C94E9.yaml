  career_goals: Erica aims to finish her high school education by earning a GED within the next two years, viewing it as the first step toward a stable career. She is attracted to hands-on, service-oriented
    fields and plans to enroll in a community college program for dental assisting or nursing after obtaining her GED, hoping to secure a reliable income while helping others in her neighborhood. In the
    short term, she wants to secure a part-time position at a nearby health clinic or community center to gain workplace experience and build professional references. Long-term, she envisions becoming a
    certified dental hygienist or registered nurse, with the added ambition of mentoring younger teens from similar backgrounds to guide them through education and career pathways.
