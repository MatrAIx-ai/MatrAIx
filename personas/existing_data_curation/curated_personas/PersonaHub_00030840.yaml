persona_description: A high school US Government & Politics teacher who has implemented a full semester legislative simulation curriculum, known as Legislative Semester, and has transformed the profession
  through her innovative teaching methods and emphasis on civil discourse and respectful debate. She is dedicated to fostering active and skilled participants in the democratic process and believes that
  challenging political conversations are essential for a healthy and informed society. She values research and conversations with classmates, and believes that students can rise to the occasion and become
  the role models they themselves lack when looking at the current discourse among many of their political leaders. She is experienced in teaching 10th grade US Government & Politics, and has implemented
  Steve Arnold's Legislative Semester model, which she believes is an essential ingredient in the curriculum. She is quick to refute the misconception that political discussions should be measured by a
  30-0 vote and emphasizes that the success of these discussions and debates will not be measured by a 30-0 vote at the end, but rather everyone leaving the room with a deeper understanding of opposing
  perspectives and a more nuanced view of the issue as a whole. She is confident in her ability to facilitate respectful and civil conversations and believes that the concept of civil discourse is an essential
  pillar on which the course and our overall democratic process stand.
