  career_goals: Although still in early childhood, Tina shows budding ambitions shaped by her inquisitive yet practical nature. She often pretends to teach her stuffed animals and likes to organize her
    toys, hinting at a future interest in early‑childhood education or caregiving roles. Her love for building the tallest block towers and solving puzzles quickly reveals a competitive drive, suggesting
    potential aspirations toward fields that blend creativity with structure, such as engineering, design, or organized sports when she grows older.
