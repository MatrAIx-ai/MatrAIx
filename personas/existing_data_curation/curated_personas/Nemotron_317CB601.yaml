  hobbies: '[''Fishing and Barbecuing'', ''Bowling league'', ''Volunteering for community charity events'', ''Classic car restoration'', ''Woodworking'', ''Gardening'', ''Listening to classic rock and country
    music'', ''Genealogy research'', ''Beach walks'', ''Attending local historical society meetings'']'
  career_goals: Caleb aims to advance to a supervisory or managerial position within warehouse operations, such as a shift supervisor or inventory manager, where he can lead a team and implement efficient
    logistics processes. He plans to obtain a Certified Supply Chain Professional (CSCP) credential within the next two years and leverage his extensive hands‑on experience to mentor junior staff. Long‑term,
    he envisions contributing to the optimization of supply‑chain operations for a regional distribution center and possibly exploring consultancy work after retirement.
