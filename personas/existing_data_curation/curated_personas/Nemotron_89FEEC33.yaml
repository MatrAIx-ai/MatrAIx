  career_goals: As he approaches retirement, Marvin aims to secure a senior supervisory role where he can oversee a small production team and lead continuous‑improvement projects that boost efficiency and
    product quality. He also wishes to mentor younger workers, passing on his practical knowledge before transitioning to a part‑time consulting position focused on lean‑process advisory. A long‑term ambition
    includes turning his woodworking hobby into a modest side business that provides supplemental income after retirement.
