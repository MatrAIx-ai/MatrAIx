  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Hiking in coastal and forest trails'', ''Analog photography'', ''Python‑based photo editing'', ''Science‑fiction book club'', ''Technology literacy
    volunteering'', ''Native plant gardening'']'
  career_goals: Kelly aims to transition from full‑time employment to a part‑time consulting role that allows her to mentor emerging developers in the Pacific Northwest, particularly underrepresented women
    in tech. She wants to lead a community‑driven open‑source project that monitors coastal water quality using sensor data, merging her technical expertise with her love for the local environment. Additionally,
    she hopes to curate a small exhibition series that showcases the intersection of technology and visual art, fostering dialogue in her town. In the long term, she plans to write a reflective memoir on
    her career journey, focusing on the balance of technical rigor and creative curiosity.
