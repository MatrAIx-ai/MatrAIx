personas:
  professional: Kelly Awbrey, a seasoned full‑stack developer and cybersecurity architect approaching retirement, leverages their meticulous Agile leadership and creative UX flair to mentor emerging women
    engineers, and they shepherd a community‑driven open‑source coastal‑water quality platform.
  sports: Kelly Awbrey, who prefers gentle cardio over competitive play, maintains a routine of sunrise hikes with the Oregon Hiking Federation and birdwatching walks through the Siskiyou trail system,
    cheers on the Portland Trail Blazers during basketball season and the Seattle Seahawks in fall football, and they occasionally join a senior cycling club for weekend rides.
  arts: Kelly Awbrey channels an affection for Thomas Cole's landscapes and Ansel Adams' black‑and‑white vistas into a personal watercolor series of Oregon’s coastline, while listening to folk legends like
    Joan Baez and attending intimate chamber concerts by the Portland Symphony, and they regularly discuss the works of Margaret Atwood and Frank Herbert in their book club.
  travel: Kelly Awbrey favors low‑key, meticulously planned escapes that blend photography and nature, such as weekend drives along the Oregon coast to capture tide‑pools, a summer trek through the Redwood
    forest of northern California, and a dream itinerary to photograph the misty lochs of the Scottish Highlands while savoring tranquil tea houses in Kyoto, and they always carry a lightweight tripod for
    spontaneous shots.
  culinary: Kelly Awbrey, an avid gardener of native ferns and rhododendrons, enjoys preparing simple yet refined dishes such as cedar‑plank salmon with a wild garlic vinaigrette, sautéed fiddlehead ferns,
    and fresh beet salads drizzled with locally sourced apple cider vinaigrette, and they balance a moderately skilled kitchen hand with a love for farm‑to‑table markets in Portland.
  core: Kelly Awbrey, a 64‑year‑old tech‑savvy watercolorist who channels worry into meticulous code and birdwatching, balances a disciplined consulting agenda with spontaneous analog photo experiments,
    and they never start a project without a cup of Earl Grey and a fresh fern leaf for inspiration.
background:
  cultural: Kelly comes from a multigenerational white American family with deep roots in the Pacific Northwest. Her grandparents settled in Oregon during the post‑World War II migration, emphasizing self‑reliance,
    community involvement, and an appreciation for the region’s rugged coastline and forests. Growing up in a small town similar to Coquille, she internalized a modest, earnest work ethic and a respect
    for the natural environment. While her upbringing was culturally mainstream, she was exposed to the arts through local theater groups and community galleries, fostering an open‑minded, eclectic outlook.
    These cultural influences, combined with her STEM education, shape her balanced worldview that values both analytical rigor and creative expression.
attributes:
  skills: '[''Full‑Stack Web Development'', ''Data Analysis and Visualization'', ''Systems Architecture'', ''Cybersecurity'', ''Agile Project Management'', ''User Experience (UX) Design'', ''Technical Writing'',
