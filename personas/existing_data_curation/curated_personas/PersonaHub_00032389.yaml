persona_description: Shannon Fie is an Associate Professor of Anthropology who specializes in the study of prehistoric Native American groups and their interactions with other groups. Her research interests
  include the role of exchange interaction in the development and adoption of social practices. Fie is known for her work in developing the new "Doing Anthropology" curriculum and is interested in the social
  interactions that must have happened between groups from different areas. She is also interested in the role of everyday objects and people in shaping prehistoric societies.
