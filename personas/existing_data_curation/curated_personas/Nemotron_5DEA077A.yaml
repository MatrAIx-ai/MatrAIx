personas:
  professional: Kassandra Dixon is a budding performance artist who blends impromptu drama club monologues, freestyle rap battles, and hip‑hop dance routines into a lively repertoire they showcase during
    school assemblies and local community events, leveraging their natural stage presence and talkative confidence to command attention while experimenting with new creative ideas.
  sports: Kassandra Dixon is a dedicated skateboarder who spends afternoons at the local Kalamazoo skate park mastering street tricks, also cheering for the Kalamazoo Wings hockey team and the Detroit Pistons
    during basketball season, while occasionally joining after‑school intramural volleyball for a quick cardio burst.
  arts: Kassandra Dixon immerses themselves in the hip‑hop culture, freestyling verses inspired by Megan Thee Stallion and Kendrick Lamar, dancing to beats by Cardi B, and capturing candid street scenes
    with a Sony α6000, often editing clips to the soundtrack of Tyler, the Creator for their TikTok channel.
  travel: Kassandra Dixon favors spontaneous weekend getaways, having road‑tripped with friends to the vibrant art scene of Grand Rapids, day‑tripped to Chicago's Millennium Park for photography, and dreaming
    of a future trip to New York’s Broadway to experience theater firsthand, all while working within their parents’ budget constraints and relying on rideshare apps for local travel.
  culinary: Kassandra Dixon enjoys quick, flavor‑packed meals like chicken‑and‑waffle sliders, spicy avocado toast with sriracha, and homemade taco bowls featuring cilantro, lime, and chipotle, often preparing
    these dishes after skate sessions, though they sometimes skip breakfast in favor of an energy‑drink before school.
  core: Kassandra Dixon is a socially magnetic teen who fuses performance art, skateboarding, and spontaneous creativity, juggling impulsive spending and occasional sleep deprivation while chasing the next
    viral trend.
background:
  cultural: Kassandra was raised in a close‑knit Black family in Kalamazoo, where traditions like Sunday church gatherings, soul‑food cooking, and celebrations of Juneteenth are woven into daily life. The
    city’s vibrant African‑American history, local blues and hip‑hop scenes, and community centers have shaped her sense of identity, giving her a strong appreciation for her heritage while also encouraging
    her to be an active participant in broader multicultural dialogues.
