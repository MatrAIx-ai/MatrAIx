persona_description: A pediatrician and researcher who conducted pioneering experiments on the teratogenic effects of excessive vitamin A and its metabolites, specifically vitamin A, in pregnant women.
  Cohlan's work on vitamin A's teratogenicity was one of the first to indicate how nutritional excesses and deficiencies in a pregnant woman's diet can adversely affect fetal development. His experiments
  on vitamin A and other substances brought attention to how nutrition and environmental agents can affect human pregnancy outcomes. Cohlan's discovery of vitamin A's teratogenicity was one of the first
  discoveries that indicated nutritional excesses and deficiencies in a pregnant woman's diet had the ability to adversely affect fetal development. Cohlan's work prompted hundreds of other experiments
  in the following decades examining how excessive vitamin A and its metabolites, called retinoids, impacted fetal development.
