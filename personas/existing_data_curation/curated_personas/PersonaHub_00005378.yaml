persona_description: A speech pathologist who specializes in the study of stuttering, particularly the relationship between linguistic factors and stuttering. She has conducted research on the impact of
  stuttering on communication at various language levels, including the effects on syntax, semantics, and pragmatics. She has presented her findings at the 2003 Speech Pathology Australia National Conference
  and is interested in exploring the link between stuttering and the use of language, particularly in the area of modality.
