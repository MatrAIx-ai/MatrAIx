persona_description: A political scientist who specializes in the study of Sri Lanka's history, politics, and society. He is particularly interested in the role of religion, language, and education in shaping
  the country's identity and the dynamics of ethnic and social conflict. His research interests include, but are not limited to, the history of British colonialism in Sri Lanka, the role of missionary activity
  in the Tamil areas, the impact of affirmative action policies on Tamil students, the relationship between religion and politics in Sri Lanka, and the role of language in shaping identity. He is also interested
  in the political economy of Sri Lanka and the impact of external factors such as the Korean New Economic Policy and the Malaysian New Economic Policy on the country's development.
