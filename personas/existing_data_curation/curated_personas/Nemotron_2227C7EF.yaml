personas:
  professional: Jonathan Haigh, a 25-year-old aspiring arts administrator and community‑focused curator, combines a methodical research mindset with a competitive drive, and they channel their DIY event‑planning
    experience and meticulous budgeting into a curatorial eye that spotlights Philadelphia’s street art in a forthcoming museum internship.
  sports: Jonathan Haigh supports the Philadelphia Eagles and 76ers, joins a weekly pick‑up basketball game at Clark Park, participates in a local 5K run that doubles as a street‑art scavenger hunt, and
    they fit in occasional weekend bike rides along the Schuylkill River Trail to clear their mind.
  arts: Jonathan Haigh curates an art‑focused blog where they dissect the work of muralist Shepard Fairey, rave about experimental musicians like Aphex Twin and Arca, dissect indie films such as Kelly Reichardt’s
    *Wendy and Lucy*, and blend philosophy from Žižek with contemporary art history to keep their audience both informed and provoked.
  travel: Jonathan Haigh has trekked through Berlin’s East Side Gallery, explored the vibrant murals of Mexico City’s La Roma district, and they plan a photo‑essay road trip to Valparaíso, Chile, aiming
    to capture the city’s hillside graffiti while balancing travel costs against their education fund.
  culinary: Jonathan Haigh, a self‑taught home cook, loves brewing oat‑milk latte art, frequently prepares simple yet artful dishes like avocado toast with radish ribbons and spaghetti aglio‑olio with fresh
    basil, but they often indulge in late‑night cheesesteak cravings after gallery openings.
  core: Jonathan Haigh is a meticulous, art‑obsessed planner whose competitive edge fuels both their curatorial ambitions and a relentless worry‑driven quest for perfection.
background:
  cultural: Jonathan grew up in a working‑class neighborhood of Philadelphia, where the city’s rich historical tapestry and vibrant street‑art scene shaped his worldview. His family’s roots trace back to
    Irish and German ancestors who settled in Pennsylvania generations ago, imparting a modest, community‑oriented upbringing. Exposure to the city’s diverse neighborhoods, from the historic Old City to
    vibrant murals in North Philadelphia, fostered an appreciation for both traditional art institutions and grassroots cultural expression. While he does not identify strongly with any particular religion,
    the multicultural fabric of Philadelphia—its festivals, public art programs, and community workshops—has profoundly influenced his artistic sensibilities and his desire to contribute to the local cultural
    landscape.
attributes:
  skills: '[''DIY home repair'', ''Basic carpentry'', ''Personal budgeting'', ''Schedule and project planning'', ''Research and synthesis'', ''Art-focused writing'', ''Beginner graphic design (Canva, Photoshop)'',
