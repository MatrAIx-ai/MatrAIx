  hobbies: '[''Exploring murals and galleries'', ''Sketching and drawing'', ''Urban photography'', ''Maintaining an art blog'', ''Attending indie film screenings'', ''Listening to experimental music'',
    ''Reading philosophy and contemporary non‑fiction'', ''Volunteering at community mural projects'', ''Playing strategy video games'', ''Mindfulness meditation'']'
  career_goals: Jonathan aims to turn his passion for art and his organizational strengths into a career within the cultural sector. Over the next two years he plans to enroll in a community‑college certificate
    program in Museum Studies or Arts Administration while securing a part‑time entry‑level position at a local gallery or the Philadelphia Museum of Art. He envisions building a robust portfolio of curated
    blog posts, photo essays, and volunteer‑led community art projects that demonstrate his curatorial eye. Ultimately, his ambition is to become an assistant curator or program coordinator for a community‑focused
    art institution, where he can merge his competitive drive with his love for unconventional ideas and help launch innovative exhibitions that engage diverse Philadelphia audiences.
