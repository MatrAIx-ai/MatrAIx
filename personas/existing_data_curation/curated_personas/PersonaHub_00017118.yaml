persona_description: A social historian and archaeologist who specializes in understanding the complex shipboard culture of seafarers and their role in world economies and cultures. She is passionate about
  storytelling and critical analysis of evidence, and her next project is to write a book that combines social history and archeology to start asking and answering questions about the realities of seafarers'
  lives and their impact on society. She encourages students to embrace the interdisciplinary nature of archeology and apply it to their own place in the world, and she is known for her patience and perseverance
  in the archeological process.
