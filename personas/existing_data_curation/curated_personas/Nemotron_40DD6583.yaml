  career_goals: Amber aims to earn her Certified Public Accountant (CPA) license within the next three years, positioning herself for a senior accounting role. She envisions moving from a clerk‑level position
    to a senior accountant or financial analyst role at a midsized firm, eventually progressing to a controller or finance manager position in an organization that emphasizes community impact, such as a
    nonprofit focused on local development. In parallel, she plans to lead a small team of junior bookkeepers, introduce efficient cloud‑based accounting workflows, and mentor others using her compassionate,
    collaborative style. Amber also hopes to volunteer her expertise during tax season for low‑income families, merging her professional growth with her desire to help others.
