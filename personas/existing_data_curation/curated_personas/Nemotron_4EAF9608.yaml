    competency in Hispanic health", "Routine clinical workflow optimization"]'
  hobbies: '["Cooking traditional Mexican dishes", "Salsa dancing", "Morning jogging", "Reading contemporary romance novels", "Gardening vegetables on a balcony", "Volunteering at free‑clinic health fairs",
    "Knitting scarves and blankets"]'
  career_goals: Yvette aims to complete a Bachelor of Science in Nursing within the next three years, followed by certification as a Certified Nurse Manager (CNM) and a wound‑care specialist. She envisions
    advancing to a charge‑nurse position on a medical‑surgical unit, where she can implement standardized workflows and lead quality‑improvement projects that enhance patient safety. Ultimately, she aspires
    to become a nurse manager overseeing a unit that serves the Latino community, leveraging her competitive nature and practical mindset to achieve high performance metrics and mentor junior staff. She
    also hopes to develop a community health outreach program that provides bilingual health education and preventive care to underserved Mexican‑American families in San Antonio.
