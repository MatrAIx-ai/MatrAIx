personas:
  professional: Yvette Mejia, a 20‑year‑old registered nurse, thrives on structured routines and meticulous documentation to deliver bilingual, evidence‑based patient care; they excel in vital‑sign monitoring,
    IV insertion, wound management, and health education while competitively driving unit efficiency improvements.
  sports: Yvette Mejia kicks off each day with a disciplined early‑morning jog along the River Walk, joins the River Run Club for weekend runs, and channels cardio energy into salsa dancing classes, all
    while cheering for the San Antonio Spurs and supporting San Antonio FC, balancing a competitive streak with occasional lapses in consistency when night shifts run long.
  arts: Yvette Mejia finds solace in the rhythms of Celia Cruz and Marc Anthony while polishing a scarf for a community donation, spends evenings devouring romance novels by Nora Roberts and Christina Lauren,
    and often visits the San Antonio Museum of Art to admire murals by local artists, blending cultural celebration with personal creative expression.
  travel: Yvette Mejia prefers well‑planned short getaways, often weekend‑hopping to Austin’s live‑music scene, exploring Santa Fe’s art markets, and savoring New Orleans’ Creole cuisine, while dreaming
    of a spring pilgrimage to Barcelona’s Gothic Quarter; they budget trips through a dedicated travel fund and balance the desire for adventure with the constraints of nursing school and family responsibilities.
  culinary: Yvette Mejia enjoys crafting intermediate‑level tortilla‑based dishes—such as homemade tostadas topped with grilled chicken, fresh pico de gallo, avocado, and queso fresco, or chilaquiles smothered
    in roasted rojo salsa—experimenting with corn masa, poblano peppers, fresh cilantro, and homemade corn tortillas during weekend family gatherings.
  core: Yvette Mejia is a routine‑driven, bilingual nurse who balances a competitive drive for professional excellence with a love for early jogs, salsa rhythms, and late‑night romance novels, while occasionally
    succumbing to coffee‑induced insomnia.
background:
  cultural: Yvette was raised in a close‑knit Mexican‑American family in San Antonio's predominantly Hispanic neighborhoods. She grew up bilingual, speaking Spanish at home and English at school, and her
    upbringing emphasized family loyalty, Catholic traditions, and community solidarity. Celebrations like Día de los Muertos, quinceañeras, and Mexican holidays are integral parts of her life, reinforcing
    cultural pride and a sense of belonging. Her heritage influences her nursing practice, as she frequently bridges cultural gaps for patients by providing culturally sensitive care, interpreting health
    information in Spanish, and advocating for traditions such as family involvement in medical decisions. Yvette’s identity reflects a blend of Mexican customs and the broader Texan milieu, shaping both
    her personal values and professional ethos.
attributes:
  skills: '["Vital‑sign monitoring", "Medication administration", "IV catheter insertion", "Wound care", "Patient education on chronic disease management", "Bilingual communication (Spanish/English)", "Epic
