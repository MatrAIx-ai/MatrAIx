  career_goals: Sharon dreams of becoming an artist who illustrates storybooks about nature and animals. She also imagines herself as a teacher or community art instructor who helps young children explore
    their creativity and learn to handle emotions. In the future she hopes to blend art with caring for others, perhaps as a school counselor who uses drawing as a therapeutic tool.
