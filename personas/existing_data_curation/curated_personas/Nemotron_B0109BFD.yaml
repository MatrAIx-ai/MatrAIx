personas:
  professional: Sharon Thomas, a budding junior illustrator and nature explorer, blends her love for drawing animals with her curiosity about the outdoors, using watercolors and LEGO to prototype imaginative
    scenes, and showcases her collaborative spirit by sharing her sketches with classmates while often forgetting to tidy up her workspace, reflecting her relaxed approach to obligations.
  sports: Sharon Thomas enjoys playing on the Greenfield Cubs youth soccer team during the fall, practices gymnastics at the community center in the spring, cheers on the River City Ravens minor league
    baseball squad on weekends, and loves building snow forts in winter, balancing a love for team activities with quiet moments watching birds from the backyard.
  arts: Sharon Thomas, an avid creator, spends afternoons sketching squirrels in the style of Beatrix Potter, crafting bead necklaces while listening to the upbeat tunes of Kidz Bop and the whimsical scores
    of Disney's Moana, and draws inspiration from the vibrant colors of artist Mary Blair.
  travel: Sharon Thomas loves weekend hikes through the nearby pine forest, occasional family trips to the state museum and the coastal boardwalk, and dreams of visiting the Eiffel Tower in Paris and snorkeling
    over the Great Barrier Reef in Australia, planning trips with a mix of spontaneous curiosity and the occasional need for parental approval.
  culinary: Sharon Thomas enjoys grilled cheese sandwiches with sharp cheddar, apple slices sprinkled with cinnamon, and helping stir spaghetti sauce made with tomatoes, basil, and garlic, but often forgets
    to wash her hands after painting, leading to a habit of smudged fingertips on the dinner table.
  core: Sharon Thomas is a curiosity‑driven young artist who balances a love for nature and crafts with occasional worry and a habit of leaving crayons scattered across the living room.
background:
  cultural: Sharon is a white child raised in Richmond, a small town in Madison County, Kentucky. Her family participates in Southern‑Appalachian traditions such as Sunday church services, community picnics,
    and the annual county fair. The region’s emphasis on hospitality, storytelling, and folk arts like quilting and bluegrass music has nurtured her love of art, curiosity for new ideas, and appreciation
    for varied experiences.
