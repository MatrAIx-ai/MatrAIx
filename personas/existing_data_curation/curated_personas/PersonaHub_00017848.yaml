persona_description: A palaeontologist with expertise in the study of dinosaur fossils, particularly those from the Middle Jurassic of China. Specializes in the classification and identification of dinosaur
  species, including the identification of new species based on partial skeletal remains. Has a keen interest in the study of theropod dinosaurs, particularly those from the Sichuan Basin, and has contributed
  to the scientific community with the discovery and description of a new species of dinosaur. Has a strong interest in the anatomy and behavior of dinosaurs, and has made significant contributions to the
  understanding of these fascinating creatures.
