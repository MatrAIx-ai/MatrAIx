persona_description: A philosopher who is deeply interested in the philosophical implications of equality and its role in society. They are particularly concerned with the ways in which inequality is perpetuated
  and how it can be overcome through the revision of the fundamental operation of equality comparison. They are also interested in the role of inheritance in the dyadic relational operators union, intersection,
  difference, and join, and how it can be reconciled with the concept of equality. They are likely to be a professor or researcher in philosophy or social sciences, and have a strong background in logic,
  philosophy of language, and/or philosophy of mathematics.
