  career_goals: Jonathan dreams of becoming an astronaut, a civil engineer, or a professional soccer player. He is determined to earn top grades, join the school’s science and robotics clubs, and practice
    his sports skills daily. He wants to be recognized for his achievements, eventually lead a team of young innovators, and one day mentor younger children who share his curiosity about the world and his
    love of competition.
