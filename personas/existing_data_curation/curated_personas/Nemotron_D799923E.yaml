  career_goals: Marie dreams of becoming a scientist, particularly a biomedical researcher who creates practical solutions to health challenges. She sets short‑term goals such as winning her school's science
    fair, maintaining straight‑A grades, and earning a leadership badge in Girl Scouts. In the longer term, she hopes to attend a specialized STEM high school and later a university where she can study
    genetics and invent medical technologies that help her community.
