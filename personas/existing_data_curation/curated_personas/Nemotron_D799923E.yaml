personas:
  professional: Marie Jones is an aspiring junior architect, using their love of detailed LEGO models and Girl Scouts STEM badges to design intricate play structures while applying their natural discipline
    and curiosity to plan each build methodically.
  sports: Marie Jones plays forward for the Midtown Youth Soccer League, cheers on the local professional baseball team the Springfield Cardinals, and supplements their weekly park drills with weekend bike
    rides, balancing competitive drive with a disciplined training schedule.
  arts: Marie Jones draws cartoon strips inspired by Bill Watterson’s Calvin and Hobbes, devours adventure mysteries like The Hardy Boys, and dances to Beyoncé and Drake whenever the family playlist of
    R&B and hip‑hop spins, weaving artistic expression into their everyday play.
  travel: Marie Jones enjoys family road trips to nearby historic sites such as Washington, D.C., dreams of visiting New Orleans for its music and soul‑food, and meticulously packs a travel journal and
    map checklist for each adventure, balancing their curiosity about new places with a practical need for organization.
  culinary: Marie Jones loves helping their mom prepare soul‑food staples like collard greens and sweet potato pie, can whisk together a simple mac and cheese using cheddar and pasta, and dreams of baking
    chocolate chip cookies shaped like LEGO bricks, though they often forget to clean the kitchen afterward.
  core: Marie Jones is an organized 8‑year‑old whose curiosity drives them to master LEGO engineering, mystery reading, and soccer while dancing to hip‑hop beats, all guided by a disciplined, slightly bossy
    yet compassionate personality.
background:
  cultural: Marie is an African American girl growing up in Clarkston, Michigan, a suburban community in Oakland County with strong ties to the greater Detroit area. Her family observes cultural traditions
    such as celebrating Juneteenth, attending a local African American church, and preparing soulful dishes like fried chicken, cornbread, and sweet potato pie for holidays. She is exposed to the rich musical
    heritage of black artists, which influences her love for rhythm and dance. Her community includes a blend of long‑standing Black families and newer residents, giving her a sense of cultural pride while
    also navigating broader Midwestern social norms.
