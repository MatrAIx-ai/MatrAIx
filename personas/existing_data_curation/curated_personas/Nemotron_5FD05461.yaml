  career_goals: Jeremy dreams of a future where he can combine his love for the ocean with his desire to help people. He often talks about becoming a marine biologist who studies and protects the coastal
    ecosystem around Nantucket, or a teacher who shares his excitement for science with other kids. He also imagines working as a community volunteer, organizing beach clean‑ups, or even becoming a park
    ranger on the island. While his ambitions are still playful, they reveal a growing sense of responsibility and a practical view of how his interests could translate into a meaningful career.
