personas:
  professional: Katharine Brown, a methodical community organizer with a talent for event planning, leverages their calm, detail-oriented approach to coordinate monthly book-club gatherings, volunteer food-pantry
    drives, and is now pursuing a GED to launch a part-time home-based catering service and a role as a community-center coordinator.
  sports: Katharine Brown follows the River City Rattlers minor-league baseball team with season tickets, cheers on the Valley Vixens women's soccer squad, and stays fit by joining the local walking club
    that explores scenic trails every Saturday, while also participating in a low-impact aqua-fitness class at the community center.
  arts: Katharine Brown blends literary curiosity and textile art, devouring mystery novels by Agatha Christie and historical epics like Hilary Mantel's Wolf Hall, while they stitch intricate quilts inspired
    by the patterns of Anni Albers and attend folk concerts featuring The Milk Carton Kids.
  travel: Katharine Brown prefers budget-friendly road trips, having driven the Blue Ridge Parkway to explore Shenandoah National Park, taken a weekend ferry to Cape Cod for fresh clams, and dreams of a
    genealogy pilgrimage to Edinburgh, Scotland, all planned with a detailed itinerary spreadsheet that balances cost, time, and family commitments.
  culinary: Katharine Brown experiments with seasonal produce, turning garden-fresh heirloom tomatoes into a chilled gazpacho, roasting beetroot with goat cheese and walnuts for a fall salad, and perfecting
    a sourdough loaf infused with rosemary, all while documenting recipes in a handwritten kitchen journal.
  core: Katharine Brown is a curiosity-driven, methodical planner who fuses community service, seasonal cooking, and quilting, yet occasionally succumbs to impulsive fabric purchases that disrupt their
    tight budget.
background:
  cultural: Katharine is a white Midwestern American raised in the Detroit suburbs, with roots in German‑Polish immigrant families common to the area. Her upbringing emphasized hard work, modesty, church
    involvement, and strong neighborhood ties. The region’s blue‑collar heritage, communal spirit, and love of practical, hands‑on activities shape her values of reliability, cooperation, and a balanced
    curiosity about new ideas.
attributes:
  skills: '["Household budgeting","Meal planning and cooking","Event planning and coordination","Community volunteering and organization","Basic computer skills (email, spreadsheet, online banking)","Gardening
