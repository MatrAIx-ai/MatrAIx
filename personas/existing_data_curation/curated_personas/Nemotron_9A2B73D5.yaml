  career_goals: She aims to earn her GED within the next year, then explore part‑time work that leverages her organizational talents, such as a community center coordinator or a home‑based catering business.
    In parallel, she plans to take adult‑education courses in small‑business management and to assume a leadership role on her homeowner‑association board, while continuing to build a secure retirement
    fund for her family.
