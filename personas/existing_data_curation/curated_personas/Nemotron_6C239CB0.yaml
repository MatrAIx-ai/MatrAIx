  hobbies: '["Reading contemporary fiction and biographies","Cooking and experimenting with soul‑food recipes","Barista craft and latte art practice","Yoga","Hiking local nature trails","Community volunteering","Listening
    to R&B and soul music","Street photography","Attending dance workshops","Growing herbs for cooking and coffee"]'
  career_goals: Deaundra aims to transition from host to supervisory roles within the next three years, seeking a floor‑manager position where she can mentor new staff and shape the guest experience. She
    plans to complete a hospitality management certification and enroll in business courses to build a solid foundation for eventually opening her own community‑focused coffee shop that highlights locally
    sourced beans and hosts cultural events. Her long‑term ambition is to create a space that blends her love for hospitality, Black culinary traditions, and community empowerment, while maintaining the
    flexibility and creativity she values.
