personas:
  professional: Deaundra Walker is a front‑of‑house hospitality maestro who blends her curiosity‑driven mastery of POS and reservation systems with a spontaneous, guest‑centric approach, effortlessly defusing
    tense moments while resisting rigid schedules to keep the dining floor fluid and welcoming.
  sports: Deaundra Walker fuels her fitness routine with weekend hikes on the Cascades, weekly yoga, and Saturday night dance‑fusion classes, while cheering on the Seattle Seahawks in the fall, the Seattle
    Sounders FC during the summer soccer season, and the Seattle Kraken on icy evenings.
  arts: Deaundra Walker regularly devours contemporary fiction by Celeste Ng and biographies like Michelle Obama’s 'Becoming', immerses herself in live R&B shows featuring H.E.R. and Leon Bridges, captures
    street vibrancy through analog photography inspired by Henri Cartier‑Bresson, and perfects latte‑art designs that echo the fluidity of Kehinde Wiley’s brushwork.
  travel: Deaundra Walker favors spur‑of‑the‑moment road trips to nearby nature retreats like the Oregon Coast and the San Juan Islands, while also daydreaming about a coffee‑centric pilgrimage to Florence’s
    historic cafés and a cultural immersion in Tokyo’s third‑wave coffee scene, balancing limited vacation days with a penchant for flexible, un‑scripted itineraries.
  culinary: Deaundra Walker’s culinary experiments blend classic comfort dishes—like rosemary‑marinated fried chicken, collard greens tossed with garden‑grown mint, and sweet‑potato pie spiced with smoked
    paprika—with her passion for coffee, often finishing a meal with a meticulously brewed Ethiopian Yirgacheffe pour‑over or a latte crowned by a fern‑leaf latte‑art design.
  core: Deaundra Walker navigates life with a curious, flexible spirit that flips between spontaneous coffee‑art sessions and meticulous guest service, yet habitually forgets to file receipts, all while
    never missing a chance to snap a street photo on the way home.
background:
  cultural: Deaundra is a Black American who grew up in a close‑knit family with deep ties to the African‑American community in the Midwest. Her grandparents were part of the Great Migration, bringing Southern
    traditions that continue to shape family gatherings, church participation, and holiday celebrations. She takes pride in Black culinary heritage, often sharing dishes from her cultural background with
    friends and customers. Active in Bellevue’s local Black cultural events—such as Juneteenth festivals and community dialogues—she values storytelling, resilience, and collective uplift. Her cultural
    perspective informs her inclusive hospitality approach, ensuring every guest feels welcome and respected.
attributes:
  skills: '["Customer service","Interpersonal communication","Conflict resolution","Reservation management","POS system operation","Menu and coffee knowledge","Barista skills and latte art","Adaptability
