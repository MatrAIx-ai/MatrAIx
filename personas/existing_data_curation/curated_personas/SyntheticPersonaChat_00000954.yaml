    User 2: You would. It''s a great way to meet new people and make new friends.

    User 1: What do you like least about being a bartender?

    User 2: The long hours can be tough. I usually work 12-hour shifts, and sometimes even longer.

    User 1: That sounds like a lot of work.

    User 2: It can be, but it''s worth it for the money.

    User 1: I''m sure it is. So, do you have any plans for the future?

    User 2: I''m not sure yet. I''m still trying to figure out what I want to do with my life.

    User 1: Well, I''m sure you''ll figure it out. You seem like a smart and capable person.

    User 2: Thanks. I appreciate that.

    User 1: So, what do you like to do for fun?

    User 2: I like to read, write poetry, and hang out with my friends.

    User 1: Oh, that''s cool. I like to read too. What are some of your favorite books?

    User 2: I like to read a lot of different things, but I especially like poetry and novels.

    User 1: I like poetry too. I think it''s a beautiful way to express yourself.

