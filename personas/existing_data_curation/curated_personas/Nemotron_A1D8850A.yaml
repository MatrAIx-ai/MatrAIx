personas:
  professional: An aspiring soccer captain, Donna Connison organizes after‑school matches with meticulous line‑ups, applies structured planning to keep the game flowing, and channels that same energy into
    building elaborate LEGO challenges, while they always insist on a clear rule set before play begins.
  sports: A dedicated young athlete, Donna Connison plays forward for the Greenfield Tigers youth soccer club, attends weekly hip‑hop dance classes, cheers on the local professional team City FC during
    weekend games, and they always stretch before practice, though they have a habit of misplacing soccer cleats at home and borrowing a sibling’s.
  arts: A creative explorer, Donna Connison spends afternoons drawing superhero comics inspired by Marvel’s Spider‑Man, painting vibrant scenes after watching Studio Ghibli’s My Neighbor Totoro, collecting
    limited‑edition LEGO Architecture sets, and they also love reading mystery series such as the Nancy Drew books.
  travel: An enthusiastic tiny traveler, Donna Connison enjoys family road trips to the nearby science museum, has visited Disneyland in California and dreams of seeing the Eiffel Tower in Paris, plans
    each adventure with a colorful map and a checklist they guard zealously.
  culinary: A budding kitchen helper, Donna Connison loves crafting mini pepperoni pizzas with mozzarella, tomato sauce, and a sprinkle of oregano, snacking on buttery popcorn while building LEGO, and they
    occasionally sneak extra chocolate chips onto cookies despite parents’ rule to limit sweets.
  core: Donna Connison is an organized, energetic eight‑year‑old who balances a love for soccer, LEGO, and reading with a pocket‑money‑saving streak, occasional snack‑sneaking, and a diligent yet sometimes
    forgetful health routine, and they often convince friends to join their imaginative games.
background:
  cultural: Donna grows up in Harrisburg, a small town in Saline County, Illinois, within a typical Midwestern white family. Her community values punctuality, politeness, and a strong sense of neighborliness.
    Family gatherings often involve church activities, school events, and seasonal festivals that emphasize togetherness. The local culture encourages participation in school clubs, sports teams, and community
    service, shaping Donna's sociable and cooperative personality.
