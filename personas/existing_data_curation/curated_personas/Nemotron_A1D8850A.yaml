  career_goals: Donna dreams of a future where she can help and guide others. She envisions becoming a teacher or a veterinarian because both careers let her work with people or animals in structured, caring
    environments. She also imagines leading community projects, such as school clubs or neighborhood clean‑up events, where she can use her organizational strengths and social energy.
