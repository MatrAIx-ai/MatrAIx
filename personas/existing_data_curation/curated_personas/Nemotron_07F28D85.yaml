personas:
  professional: Maria Molinary, an ambitious high‑school senior who excels in bilingual communication, research, and event coordination, channels their curiosity and disciplined organization into leading
    student‑council mental‑health initiatives while planning a future as a community outreach coordinator for underserved Spanish‑speaking populations in Central Florida.
  sports: Maria Molinary, an avid jogger who runs the leafy trails of DeLand’s parks with the local running club, enthusiastically supports the Orlando Magic and the Orlando Pride, and blends cardio with
    salsa and reggaetón dance classes as a lively form of exercise.
  arts: Maria Molinary, a spirited member of a community theater troupe who writes a blog featuring cultural recipes and mental‑health tips, draws creative inspiration from performers like Lin‑Manuel Miranda
    and musicians such as Bad Bunny, and balances their expressive storytelling with the rhythm of dance.
  travel: Maria Molinary, an organized traveler who dreams of exploring the historic streets of Old San Juan, the vibrant festivals of New Orleans, and the art museums of Barcelona, plans each trip with
    a detailed itinerary in their bullet journal, balancing a limited student budget with a deep desire for cultural immersion.
  culinary: Maria Molinary, a budding home chef, masters the preparation of traditional island classics such as mofongo, arroz con gandules, and pernil, experimenting with fresh cilantro, adobo, and sofrito,
    while sharing recipes on their blog and often cooking for family gatherings to keep culinary traditions alive.
  core: Maria Molinary, a diligent, socially‑wired teen who balances fierce organization with a love for dance, community service, and cultural cooking, quietly wrestles with anxiety and a perpetual worry
    about the future.
background:
  cultural: Maria Eugenia comes from a close‑knit Puerto Rican family that moved to Central Florida when she was a child. She grew up speaking both Spanish and English at home, celebrating traditional holidays
    such as Three Kings' Day, Puerto Rican Christmas, and the island's vibrant summer festivals, while also embracing Florida customs like Thanksgiving. Her family values the concept of "familia"—strong
    familial bonds, mutual support, and community responsibility— which has shaped her compassionate outlook. She enjoys the island's music, from bomba to reggaetón, and often shares homemade dishes like
    arroz con gandules and pasteles at neighborhood gatherings. This bicultural upbringing has given her a fluid cultural identity, allowing her to navigate and bridge both Puerto Rican traditions and mainstream
    American life in DeLand.
attributes:
  skills: '["Bilingual Spanish‑English communication", "Academic writing and research", "Public speaking", "Event planning and coordination", "Time‑management and organization", "Peer mentorship", "Conflict
