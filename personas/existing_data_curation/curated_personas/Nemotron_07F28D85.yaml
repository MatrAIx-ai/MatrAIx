  hobbies: '["Salsa and reggaetón dancing", "Volunteering at local food banks", "Animal shelter assistance", "Community theater participation", "Travel and food blogging", "Yoga for stress relief", "Bullet
    journaling", "Reading psychology and self‑help books", "Jogging in local parks", "Cooking traditional Puerto Rican cuisine"]'
  career_goals: Maria Eugenia plans to attend a Florida university to earn a bachelor's degree in Public Health or Social Work, with a focus on community mental‑health outreach. She aims to become a bilingual
    community outreach coordinator who designs and implements preventive health programs for the Puerto Rican and broader Hispanic populations in Central Florida. Over the next five years, she hopes to
    secure a leadership role in a non‑profit organization, eventually pursuing a master's degree in counseling to expand her capacity to provide direct support. Her career vision balances a practical, data‑driven
    approach with a genuine curiosity about cultural health disparities, and she strives to create inclusive, evidence‑based services that promote well‑being and social harmony.
