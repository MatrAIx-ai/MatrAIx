personas:
  professional: Norma Taylor is an inquisitive toddler who transforms everyday play with building blocks and shape sorters into practical experiments, favoring flexible, open-ended activities over rigid
    schedules.
  sports: Norma Taylor is a crawling enthusiast who enjoys a weekly stroller-walk club at the neighborhood park, watches their parents cheer for the Seattle Sounders soccer team on TV, and splashes in the
    community pool during summer baby swim classes.
  arts: Norma Taylor delights in the colorful prints of Claude Monet displayed in the nursery, giggles at Sesame Street characters, sways to the lullabies of Brahms and the gentle folk tunes of Bob Dylan,
    and claps along to the whimsical melodies of Disney's classic songs.
  travel: Norma Taylor loves car rides to the grandparents' farm in Vermont, a weekend adventure to Disney World in Florida, and dreams of a stroller-friendly stroll through Kyoto's cherry-blossom gardens.
  culinary: Norma Taylor prefers smooth pureed carrots, ripe banana mash, avocado for its creamy texture, and occasionally sneaks a bite of the family's cheesy mac and cheese, always insisting on warm,
    not too hot, milk.
  core: Norma Taylor is a curious yet anxious infant who balances a love for free-form play with a preference for familiar comfort, often worrying over new sounds while delighting in solitary discovery.
background:
  cultural: Norma is raised in a white, middle‑class family in Monroe, New York, a suburban community in Orange County. Her household observes typical American cultural traditions, celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and participates in local community events like town fairs and church gatherings. The family emphasizes close family bonds, modest independence,
    and exposure to a mix of suburban American values and the cultural diversity of the broader Hudson Valley region.
