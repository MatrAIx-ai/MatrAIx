  career_goals: At her current age, Norma does not have defined career goals, but her caregivers notice early signs of curiosity about the world and a practical approach to problem‑solving. They nurture
    her interest in music, colors, and simple cause‑and‑effect play, hoping it may lead to future ambitions in creative or scientific fields such as art, music, or early childhood education. For now, her
    primary ambition is to gain independence in mobility and communication, which lays the foundation for any future career path.
