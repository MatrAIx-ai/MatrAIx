  career_goals: Nancy dreams of becoming a scientist‑engineer who creates practical inventions, an astronaut who explores new frontiers, or a veterinarian who cares for animals. Her competitive streak drives
    her to aim for roles where she can solve problems, test ideas, and apply proven methods while discovering novel solutions.
