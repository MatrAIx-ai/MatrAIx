personas:
  professional: Nancy Godin, an aspiring kindergarten engineer, builds intricate LEGO towers during playtime, channeling her curious yet practical mindset into organized classroom projects while still reveling
    in the freedom to experiment, and they often challenge peers with competitive puzzle races.
  sports: Nancy Godin, a budding soccer enthusiast in the North Canton Tots club, dribbles with a bright orange ball at community fields, cheers for the Cleveland Browns on game nights, and they relish
    the seasonal excitement of the county fair’s sack race.
  arts: Nancy Godin, a miniature art aficionado, spends afternoons sketching woodland creatures after storytime at the local library, idolizes illustrator Mary Blair’s vibrant palettes, and they sing along
    to Raffi’s “Baby Beluga” while drawing inspiration from Disney’s “Frozen”.
  travel: Nancy Godin enjoys family road trips to the nearby pumpkin patch and an occasional visit to Cedar Point, planning her mini itineraries with stickers on a map, favoring hands‑on adventures over
    long flights but dreaming of a future Disney World vacation.
  culinary: Nancy Godin, a tiny culinary explorer, favors cheesy macaroni, chicken nuggets, and apple slices, often helping mom sprinkle cinnamon on oatmeal, and they proudly claim the title of “official
    cookie dough tester” during weekend bake‑offs.
  core: Nancy Godin is a curious, competitive five‑year‑old who balances meticulous saving and meticulous LEGO building with a shy yet determined spirit that loves small‑group play and a stubborn reluctance
    to share favorite snacks.
background:
  cultural: Nancy was raised in North Canton, Ohio, a small Midwestern city where her family participates in community events, local church gatherings, and school activities. She celebrates typical American
    holidays such as Thanksgiving, Christmas, and the Fourth of July, and enjoys regional traditions like county fairs and pumpkin patches. The local public library provides regular storytime and children's
    programs, reinforcing values of practicality, modesty, and a strong sense of community.
