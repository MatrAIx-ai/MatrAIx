personas:
  professional: Melissa Oneal, an aspiring health-care aide and community-center project coordinator, leverages their methodical planning, social-media savvy, and first-aid training to streamline youth-program
    events while balancing coursework and weekly intramural soccer practice; they thrive on transforming chaotic schedules into smooth operations.
  sports: Melissa Oneal plays intramural soccer weekly, hikes the Prairie Creek and Muncie State Park trails each fall, follows the Indiana Hoosiers basketball team and the Indianapolis Colts football team,
    often dons their jerseys to games with friends, and adheres to a disciplined routine of morning jogs and weekend group workouts to balance their energetic social life; they enjoy the camaraderie of
    team sports as a way to stay motivated.
  arts: Melissa Oneal captures sunrise moments on Muncie trails with a DSLR, curates playlists featuring indie rock bands like Arctic Monkeys and folk singer Sufjan Stevens, attends local concerts headlined
    by The Avett Brothers, and draws DIY home décor inspiration from Instagram creators such as Natacha Owl, weaving these artistic threads into a vibrant personal aesthetic; they consider each photo a
    story and each décor piece a conversation starter.
  travel: Melissa Oneal enjoys weekend road trips to nearby Oxford, Indiana for its historic square and the Indianapolis Zoo, dreams of a summer backpacking adventure through the Scottish Highlands, and
    meticulously plans itineraries using free online tools, balancing wanderlust with academic commitments; they schedule trips around exam periods to ensure both adventure and academic success.
  culinary: Melissa Oneal experiments with 30-minute Mediterranean meals, frequently prepares chicken shawarma wraps seasoned with cumin, garlic, and fresh tzatziki, perfects banana-coconut pancakes on
    lazy Sundays, mixes seasonal farmers-market vegetables into stir-fry bowls, though they sometimes forget to defrost the chicken before cooking.
  core: Melissa Oneal blends methodical organization with a love for spontaneous concert outings, juggling a packed volunteer schedule while occasionally neglecting to answer personal texts until the last
    minute, and they have a habit of over-seasoning dishes.
background:
  cultural: Melissa is a White Midwestern American who grew up in Muncie, Indiana, a city with a strong sense of community and small‑town values. Her family has deep roots in the region, and she was raised
    with an emphasis on hard work, reliability, and community involvement, often participating in church youth groups and local volunteer activities. The local culture blends practicality and modesty with
    a friendly, sociable spirit, and Melissa reflects this heritage while also embracing contemporary interests in health, technology, and diverse community experiences.
