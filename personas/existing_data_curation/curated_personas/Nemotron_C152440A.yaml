  hobbies: '[''intramural soccer'', ''hiking'', ''photography'', ''cooking'', ''DIY home décor'', ''listening to health/psychology/technology podcasts'', ''volunteering at community center'', ''attending
    local concerts'', ''participating in community festivals'']'
  career_goals: Melissa plans to obtain her GED within the next year and enroll in a community‑college program in health sciences or business administration. She aims to become a certified medical assistant
    or health‑care aide, gaining practical experience through part‑time work at a local clinic while continuing to volunteer in community health outreach. In the longer term, she aspires to earn a bachelor’s
    degree in public health or health‑care administration and eventually lead health‑education programs that combine her organizational talent with her passion for helping others in the Muncie area.
