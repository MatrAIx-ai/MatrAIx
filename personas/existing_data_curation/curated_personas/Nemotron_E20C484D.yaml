  career_goals: Atlantis often talks about wanting to become a teacher when he grows up because he likes the idea of creating a warm, organized classroom where every day follows a clear schedule. He imagines
    helping younger children learn, keeping the room tidy, and making sure everyone feels safe and included. His goal reflects his caring nature, desire for predictability, and wish to contribute to a harmonious
    community.
