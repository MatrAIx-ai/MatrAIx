personas:
  professional: A meticulous mini‑classroom organizer, Atlantis Scott loves arranging blocks by color, leading snack‑time routines, and ensuring friends follow the daily schedule, showing early leadership
    despite occasional worries about making mistakes.
  sports: A budding sports enthusiast, Atlantis Scott plays on the under‑5s soccer team called the Riverdale Rookies, cheerfully watches the hometown baseball club the Springfield Stars on game days, and
    enjoys practicing simple gymnastics moves at the community center, though they sometimes get frustrated when they miss a goal.
  arts: A lively lover of music and storytelling, Atlantis Scott dances to The Wiggles, sings along with Pixar’s Toy Story soundtrack, draws colorful pictures of their favorite character Elsa from Frozen,
    and eagerly collects stickers of cartoon animals, yet they can get upset if a story ends abruptly.
  travel: An adventurous little explorer, Atlantis Scott has visited the local zoo in San Diego, taken a family road trip to Disneyland, and dreams of seeing the Eiffel Tower in Paris, often packing a beloved
    stuffed toy for comfort during journeys.
  culinary: A selective foodie, Atlantis Scott adores cheesy macaroni, chicken nuggets with honey mustard, strawberry yogurt with fresh berries, and can surprisingly whip up a banana split with chocolate
    sauce for dessert, though they often reject vegetables unless presented in fun shapes.
  core: Atlantis Scott, a five‑year‑old with a love for order and bright colors, balances gentle leadership with occasional worry‑driven meltdowns, hoards stickers, and insists on bedtime routines that
    keep the world feeling safely predictable.
background:
  cultural: Atlantis comes from a multicultural Black heritage that blends African‑American and Ethiopian roots. While his family lives in Takoma Park, Maryland, they preserve Ethiopian traditions such
    as the coffee ceremony, Amharic greetings, and sharing injera during special meals. At the same time, they celebrate African‑American cultural events like Kwanzaa and attend a local community church
    that emphasizes harmony and service. This rich cultural tapestry, combined with the diverse, progressive environment of Montgomery County, shapes his worldview, fostering both a strong sense of community
    and an appreciation for cultural diversity.
