personas:
  professional: Jeneen Lafountain is an experienced freelance painter and paperhanger who merges a budget‑conscious, hands‑on expertise in surface preparation, color matching, and eco‑friendly finishing
    techniques with a curiosity‑driven willingness to test new paint formulations, and they manage flexible client schedules while calmly resolving unexpected on‑site challenges.
  sports: Jeneen Lafountain enjoys seasonal hiking the Rocky Mountains, participates in a local trail‑running club, occasionally joins the Eagle County pick‑up basketball league, roots for the Colorado
    Avalanche, Denver Broncos, and Colorado Rockies, and they favor low‑impact fitness activities that complement their physically demanding trade.
  arts: Jeneen Lafountain captures Colorado sunsets through landscape photography inspired by Ansel Adams, sketches travel journals echoing the bold lines of Henri Matisse, relaxes with vinyl records by
    Fleetwood Mac and Nina Simone, and they draw artistic inspiration from these creative pursuits to inform bold color choices in their painting projects.
  travel: Jeneen Lafountain plans trips with a blend of spontaneity and modest budgeting, favoring weekend hikes in Banff, road trips along Route 66 to Albuquerque, and dreaming of a spring workshop in
    the Tuscan countryside to study fresco techniques, and they often delay booking due to a relaxed attitude toward deadlines.
  culinary: Jeneen Lafountain experiments with outdoor grilling, mastering dishes like charcoal‑seared salmon with rosemary, Colorado green chili stew, and grilled heirloom tomato and corn kebabs, and they
    enjoy quick, flavor‑focused meals that showcase their practical cooking style while occasionally indulging in a gourmet sous‑vide experiment.
  core: Jeneen Lafountain blends pragmatic trade expertise with a wander‑lust curiosity, juggling flexible work schedules, occasional financial procrastination, a love for mountain hikes, and a habit of
    leaving paint‑brushes in the bathtub overnight, and they find balance by carving out quiet evenings for mystery novels.
background:
  cultural: Jeneen grew up in a white, rural Colorado family with deep roots in the mountain community of Eagle County. The region’s outdoors‑oriented, self‑reliant culture shaped her practical work ethic
    and love for nature. Local traditions of neighborly help, seasonal festivals, and a growing appreciation for sustainable living influence her values. While she shares a broader American cultural identity,
    her daily life reflects a blend of Western frontier heritage, small‑town camaraderie, and an emerging eco‑conscious mindset common among younger residents of the Rockies.
attributes:
  skills: '["Interior painting", "Exterior painting", "Surface preparation", "Wallpaper installation", "Drywall repair", "Color matching", "Material estimation", "Ladder safety", "Customer communication",
