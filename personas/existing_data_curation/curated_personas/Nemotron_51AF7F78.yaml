  hobbies: '["Hiking", "Landscape photography", "DIY home projects", "Gardening", "Community volunteering", "Reading mystery novels", "Cooking on a portable grill", "Board games with friends", "Sketching",
    "Birdwatching"]'
  career_goals: Jeneen’s main ambition is to grow her freelance painting and paperhanging work into a respected small contracting firm that specializes in eco‑friendly paints and custom wall finishes. In
    the next three to five years she plans to obtain professional certification from the Painting and Decorating Contractors of America, expand her service area throughout Eagle County, and hire an apprentice
    to share her trade knowledge. She also hopes to host occasional community workshops on DIY painting techniques, allowing her to teach while keeping a flexible schedule that supports her family life.
