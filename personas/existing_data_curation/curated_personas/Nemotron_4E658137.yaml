  hobbies: '[''Reading'',''Gardening'',''Cooking/baking'',''Knitting'',''Quilting'',''Photography'',''Nature walks'',''Book club'',''DIY upcycling'',''Sustainable living projects'']'
  career_goals: Rita intends to re‑enter the workforce on a part‑time basis in a role that blends her practical abilities and community focus, such as a library aide, community‑center coordinator, or administrative
    assistant. She plans to complete her associate degree in business administration through evening courses and obtain a certification in early childhood education. Long‑term, she hopes to launch a small
    online shop selling handmade home‑decor items and to serve on the board of a local sustainability or garden committee.
