personas:
  professional: Rammohan Awan is a community‑focused handyman‑entrepreneur who blends hands‑on repair expertise with meticulous event‑planning skills, leveraging their organized and competitive nature,
    and they reliably deliver affordable home services while coordinating local cultural gatherings.
  sports: Rammohan Awan plays forward for the Sonora Community Soccer League, follows the San Francisco Giants and the Golden State Warriors, and hikes the Sierra foothills each weekend with a local club,
    balancing competitive play with low‑impact cardio to stay fit, and they often organize community match‑day socials to bring neighbors together.
  arts: Rammohan Awan enjoys Bollywood soundtracks by Arijit Singh and A. R. Rahman, watches cricket as cultural performance, and spends evenings assembling wooden model kits inspired by historic forts,
    finding creative release in both music and craftsmanship, and they often share playlists with friends during community events.
  travel: Rammohan Awan prefers weekend road trips in a reliable sedan, often heading to Yosemite National Park or the Napa Valley wine region for relaxation, while dreaming of a cultural immersion tour
    of Kerala, India, though budget constraints keep international travel on the back‑burner, and they meticulously plan itineraries using a spreadsheet.
  culinary: Rammohan Awan excels at cooking authentic Indian dishes like dhokla, thepla, and chicken biryani, skillfully blending mustard seeds, cumin, and fresh cilantro, and they love hosting neighborhood
    potlucks where their signature mango‑chutney becomes a crowd favorite.
  core: Rammohan Awan is a methodical community fixer who channels a competitive drive into both home repairs and chess, yet their worry‑prone nature often leads to late‑night over‑thinking about business
    growth, and they constantly juggle social commitments with personal stress.
background:
  cultural: Rammohan is a first‑generation American of Gujarati Indian descent. His parents immigrated to California in the early 1970s, bringing with them Hindi and Gujarati language, Hindu customs, and
    a strong emphasis on family and community. Growing up in the rural town of Sonora, he learned to blend his South Asian heritage—celebrating Diwali, Holi, and cooking traditional dishes—with the local
    Californian lifestyle, including participation in town events and outdoor activities. He maintains fluency in Gujarati and conversational Hindi, and he often acts as a cultural liaison, introducing
    Indian festivals and cuisine to his neighbors while preserving the values of respect, hospitality, and resilience that were instilled by his family.
