  hobbies: '[''Reading historical fiction and memoirs'', ''Knitting and crocheting'', ''Garden cultivation'', ''Cooking traditional Puerto Rican meals'', ''Listening to salsa and bomba music'', ''Puzzles
    and trivia games'', ''Small book club or coffee group meetings'']'
  career_goals: Taylor hopes to earn her GED as a personal milestone and to bolster her confidence. She aims to volunteer at the local senior center, teaching cooking classes and basic Spanish to younger
    participants. She also dreams of compiling a community recipe book that celebrates Puerto Rican culinary heritage, while staying active and independent through regular gardening and low‑impact exercise.
