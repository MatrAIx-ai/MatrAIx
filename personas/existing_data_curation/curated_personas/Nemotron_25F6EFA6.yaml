personas:
  professional: Taylor Perez, a retired home maintenance enthusiast turned community cooking volunteer, leverages bilingual fluency, practical repair skills, and a love of storytelling to teach cooking
    and basic Spanish at the senior center, even though they often misplace lesson plans due to a relaxed approach to organization.
  sports: Taylor Perez enjoys low‑impact fitness through daily garden walks, participates in a senior walking club that meets at the community park, and avidly follows the local baseball team, the River
    City Runners, while they also tune into the New York Yankees broadcasts on summer evenings.
  arts: Taylor Perez fills evenings with the lively brass of salsa legend Marc Antonio and the steady beats of bomba master Roberto J. López, while they devour historical fiction by Isabel Allende and sift
    through memoirs about the island diaspora, and they occasionally craft handwritten quilts inspired by folk art patterns.
  travel: Taylor Perez prefers relaxed, small‑group trips that blend cultural immersion with comfortable pacing, having explored the cobblestone streets of Old San Juan and the historic forts of Cartagena,
    and they now yearn to wander the serene vineyards of Spain’s Rioja region on a modest budget.
  culinary: Taylor Perez boasts a seasoned hand at cooking classic island dishes such as mofongo with garlic‑scented pork, arroz con gandules, and hearty sancocho stew, while they savor the aroma of freshly
    harvested cilantro, sweet plantains, and locally sourced annatto in their garden‑to‑table meals.
  core: Taylor Perez blends a fiercely independent spirit with a nostalgic love for stories, knitting scarves for grandchildren while they fiercely guard a stubborn skepticism about new gadgets and savor
    salsa rhythms on the porch.
background:
  cultural: Taylor’s cultural identity is rooted in her Puerto Rican heritage, which shapes her language, food, and celebrations. She grew up hearing stories of her parents’ migration during the island’s
    economic shifts and maintains a strong connection to the island’s traditions—celebrating Nochebuena, honoring patron saints, and preserving family recipes. Living in Woonsocket, RI, she blends those
    roots with the local New England Latino community, participating in neighborhood events, church gatherings, and sharing her cultural knowledge with younger generations.
