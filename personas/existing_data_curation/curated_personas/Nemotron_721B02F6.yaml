personas:
  professional: Teresa Beumer, a middle-school robotics club member and budding Scratch programmer, channels their methodical, competitive streak into designing precise, logic-driven game prototypes while
    meticulously documenting each iteration in a personal development journal.
  sports: Teresa Beumer, a member of the local youth running club that meets every Saturday, prefers solo jogs along the scenic Des Plaines River trail over team sports, but they cheer passionately for
    the Chicago Cubs on game days and recently joined a beginner's chess-themed hurdle race organized by their school.
  arts: Teresa Beumer channels their curiosity into both reading and creation, devouring mystery novels by Agatha Christie, sketching LEGO-inspired designs while listening to pop-rock hits from artists
    like Billie Eilish and Imagine Dragons, and attending the local public library's Saturday storytelling hour where they sometimes perform their own short sci-fi scripts.
  travel: Teresa Beumer dreams of swapping their backyard for a hands-on visit to the Kennedy Space Center in Florida, already ticking off a family road-trip to the Museum of Science and Industry in Chicago
    and a weekend camping stint at Starved Rock State Park, all while meticulously planning each outing on a colorful printable itinerary they design in Scratch.
  culinary: Teresa Beumer, an avid LEGO builder, loves crafting homemade sushi rolls with avocado and cucumber to mimic brick colors, whipping up quick spaghetti carbonara for late-night study sessions,
    and treating themselves to pepperoni pizza slices topped with extra mozzarella after every successful robotics competition, though they sometimes skip breakfast in the rush of morning coding.
  core: Teresa Beumer is a hyper-organized 12-year-old with a competitive edge, a chronic worry habit, and a penchant for turning every hobby—from chess to coding—into a meticulously planned project, even
    if it means sacrificing sleep.
background:
  cultural: Teresa grows up in a middle‑class, suburban Midwestern family in Des Plaines, Illinois. Her household reflects typical American values such as punctuality, personal responsibility, and an emphasis
    on education. She celebrates national holidays like Thanksgiving and the Fourth of July, and participates in community events at the local library and the town's summer fair. The multicultural influence
    of nearby Chicago provides exposure to diverse ideas, but her immediate environment is largely homogeneous, shaping a cultural background rooted in Midwestern pragmatism, community involvement, and
    a focus on academic achievement.
