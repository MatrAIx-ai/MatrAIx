    on local trails'', ''Journaling'']'
  career_goals: Teresa aims to pursue a STEM‑focused high school track, win regional science fairs, and eventually attend a university where she can study biomedical engineering or forensic science. She
    envisions herself designing practical solutions to real‑world problems, such as creating low‑cost medical devices. In the short term, she wants to lead her school's robotics team to a state competition
    and earn a leadership role in the chess club, using these experiences to build a competitive edge for future academic and career opportunities.
