  and the importance of avoiding contact with other people's wounds or bandages. They are knowledgeable about the different types of MRSA infections and the best ways to prevent them, and are knowledgeable
  about the impact of MRSA infections on the healthcare system. They are also aware of the importance of antibiotic-resistant infections and the need for continued research into the causes and prevention
  of antibiotic resistance.
