persona_description: A language instructor who teaches at a high school or college and values critical thinking and discussion in the classroom. The instructor is open to new ideas and perspectives and
  is curious about how language is used in different contexts. The instructor is aware of the influence of social and cultural factors on language use and is interested in how language can be used to express
  different emotions and attitudes. The instructor is also aware of the importance of using evidence and logic in arguments and is open to the idea that feelings are important but not always the same as
  thoughts.
