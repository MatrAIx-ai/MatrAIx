personas:
  professional: Luis Sarmiento, a 21‑year‑old automotive technician in Orange County, leverages his ASE training, turbo engine expertise, 3‑D printing skills, and eye for custom paint wraps to turn high‑performance
    builds into kinetic works of art, thriving in the fast‑paced, unstructured shop environment where their curiosity and competitive edge drive rapid problem‑solving.
  sports: Luis Sarmiento fuels their competitive edge by regularly competing in Southern California Autocross Club events and the West Coast Drag Association, while cheering on the LA Dodgers, LA Rams,
    and LA Lakers, and maintains a minimalist fitness regime of sprint intervals and weekend track days that keep reflexes sharp without the time commitment of a traditional gym.
  arts: Luis Sarmiento channels their love for visual storytelling through sunset‑lit car photo shoots and mural tours featuring works by Shepard Fairey and local street‑art collectives, draws design cues
    from automotive artists Chip Foose and Ken Block, and scores their creative endeavors to an eclectic playlist ranging from Arctic Monkeys and Tame Impala to Kendrick Lamar and regional corridos while
    dissecting avant‑garde films by David Lynch and Alejandro Jodorowsky.
  travel: Luis Sarmiento prefers spontaneous, garage‑laden road trips, often loading their modified car onto the Pacific Coast Highway for a sunset drive to Monterey, cutting a quick detour to the Nürburgring
    for a winter track sprint, or heading to Baja California’s desert for off‑road testing, all while balancing a modest student budget with the ambition to fund their future boutique garage.
  culinary: Luis Sarmiento, an enthusiastic home‑chef, masters traditional dishes like chilaquiles and mole, frequently fusing them with unexpected flavors such as gochujang‑glazed ribs or quinoa‑infused
    sauces, and showcases a solid yet experimental skill set that leans on fresh corn masa, ancho chilies, Mexican chocolate, and a pinch of smoked paprika.
  core: Luis Sarmiento blends raw mechanical talent with an artist’s eye, turning midnight garage sessions into kinetic canvases while wrestling with impulsive spending and a perpetual battle against disorganized
    workspaces.
background:
  cultural: Luis is a second‑generation Mexican‑American whose parents immigrated from Jalisco. He grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties to Mexican
    cultural practices, such as celebrating Día de los Muertos, enjoying mariachi and regional Mexican music, and preparing family meals rooted in traditional cuisine. The vibrant Latino community of Southern
    California, particularly in Orange County, shaped his identity, blending Mexican heritage with the multicultural environment of Buena Park. He values familismo, respect for elders, and a hardworking
    ethic, which he carries into his professional life. Inspired by the rich tradition of Mexican muralism, Luis incorporates an artistic perspective into his automotive work, viewing cars as moving canvases
    for creative expression.
attributes:
  skills: '["Automotive diagnostics (OBD‑II, CAN‑bus)", "Engine repair and rebuilding", "Transmission service (automatic, manual, dual‑clutch)", "Hybrid/Electric vehicle systems", "Electrical wiring and
    ECU programming", "Welding (MIG/TIG) and metal fabrication", "Custom bodywork and paint detailing", "3D modeling and printing for prototype parts", "Performance tuning for street and track", "Problem‑solving
    under pressure", "Self‑directed technical learning"]'
  hobbies: '["Photographing cars at golden hour", "Sketching automotive design concepts", "DIY custom paint and wrap projects", "Participating in autocross and weekend drag races", "Tinkering with Arduino
    and Raspberry Pi vehicle gadgets", "Cooking traditional and fusion Mexican dishes", "Reading science‑fiction novels", "Listening to eclectic music (indie, hip‑hop, regional Mexican)", "Visiting local
    art galleries and street‑art tours", "Playing racing simulator games"]'
  career_goals: Luis aims to earn ASE Master Technician certification within the next two years while also obtaining specialized credentials in electric‑vehicle technology and high‑performance tuning. He
    envisions opening a boutique garage in Orange County that offers bespoke custom modifications, artistic vehicle wraps, and performance upgrades, merging his love for art with his mechanical expertise.
    He plans to compete regularly in regional autocross and drag‑racing events to test and showcase his builds, eventually becoming a recognized figure in Southern California’s car‑culture scene. In the
    longer term, Luis hopes to mentor aspiring technicians, especially those from underrepresented backgrounds, by establishing an apprenticeship program that emphasizes hands‑on learning, creativity, and
    entrepreneurial skills.
