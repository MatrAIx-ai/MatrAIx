persona_description: Dr. Robert F. Graboyes is a health economist who specializes in the study of health economics and health policy. He is interested in exploring the impact of scarcity, choices, and incentives
  on health outcomes. Dr. Graboyes' research interests include the cost-effectiveness of medical interventions, the economic evaluation of health policies, and the impact of health care on patient outcomes.
  He is known for his expertise in health economics and his ability to explain complex health policy issues in a clear and accessible manner.
