  hobbies: '[''Visiting art galleries'', ''Community theater'', ''Historical biography reading'', ''Birdwatching'', ''Gardening'', ''Woodcraft'', ''Vintage radio restoration'', ''Cooking Tex‑Mex and fusion
    dishes'', ''Jazz and blues listening'', ''Spanish language learning'']'
  career_goals: Clifford aims to earn his GED within the next year as a personal milestone and to qualify for more formal volunteer roles. He aspires to become a certified docent at the San Antonio Museum
    of Art, using his love of art and history to guide visitors. Simultaneously, he hopes to launch a modest home‑based business creating handcrafted wooden frames and small furniture pieces for local artists,
    allowing him to merge his woodworking skill with his artistic interests. Long‑term, he would like to document oral histories of older San Antonio neighborhoods, preserving community memory while staying
    intellectually engaged.
