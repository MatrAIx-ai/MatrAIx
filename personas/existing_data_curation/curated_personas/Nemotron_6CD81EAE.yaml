personas:
  professional: Amy Roberts, a 10‑year‑old with a natural knack for teamwork and problem‑solving, channels her curiosity and methodical nature into leading after‑school science club experiments and designing
    playful Scratch animations that blend logical structure with storytelling flair, and they proudly present each project to the class.
  sports: Amy Roberts, a regular on the school’s varsity soccer and basketball teams, also rides with the Wasatch Trail Runners youth club, cheers for the Utah Jazz and Real Salt Lake for professional inspiration,
    and spends weekends hiking the Wasatch foothills or biking the Jordan River trail, always competing to beat personal best times and earn the ‘most improved’ award, and they love challenging themselves
    with new drills each season.
  arts: Amy Roberts, an avid LEGO architect and DIY tie‑dye enthusiast, spends free afternoons crafting Scratch animations that echo the humor of Pixar’s ‘The Incredibles,’ while listening to the upbeat
    pop of Olivia Rodrigo and reading Enid Blyton’s mystery series, which fuels her imaginative play and inspires new creative projects they proudly showcase at school fairs.
  travel: Amy Roberts, who enjoys both spontaneous bike rides and well‑planned family trips, has already explored the Great Salt Lake and the historic streets of Salt Lake City, dreams of a summer camping
    adventure in Zion National Park, and prefers itineraries that blend a moderate hike with a stop at a local ice‑cream shop, and they often map out routes using a colorful kids’ travel journal.
  culinary: Amy Roberts, who happily swaps chicken nuggets for homemade veggie pizzas topped with mozzarella, pepperoni, and pineapple, enjoys blending fresh strawberries into a banana‑yogurt smoothie,
    and proudly dons a tie‑dye apron while helping to stir mac and cheese on the stovetop, and they occasionally sneak a piece of dark chocolate for a post‑dinner treat.
  core: Amy Roberts is a fiercely competitive, organized 10‑year‑old who balances a love for team sports, LEGO building, and meticulous budgeting with a healthy dose of skepticism, and they have a knack
    for turning curiosity into creative projects.
background:
  cultural: Amy is raised in Salem, Utah, a small town in a predominantly white, family‑oriented community where outdoor recreation is a central part of life. The local culture emphasizes self‑reliance,
    community service, and participation in school and church activities. Seasonal traditions such as Pioneer Day celebrations, local fairs, and volunteer projects foster a sense of belonging and encourage
    teamwork. Growing up in Utah County also provides Amy with easy access to the mountains and parks, shaping her love for hiking, biking, and sports. Her upbringing blends mid‑western pragmatism with
    the region’s strong emphasis on community involvement and appreciation for the natural landscape.
