  career_goals: Amy dreams of a future where she can combine her love of planning and building with her competitive spirit. She hopes to become an architect or civil engineer who designs parks and community
    spaces that encourage outdoor activity in Utah’s mountains. She also imagines leading a youth robotics team, merging her technical skills with her desire to mentor peers. Ultimately, Amy wants a career
    that lets her turn ideas into tangible projects while staying active and engaged with her community.
