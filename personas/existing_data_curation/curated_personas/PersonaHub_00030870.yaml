persona_description: Colleen Riordan, a junior majoring in biochemistry at Notre Dame, is a contributing member of the Schulz Lab, which focuses on developing instruments and methods to analyze molecules
  using laser spectroscopy. She uses her chemistry and biology background to contribute to cancer research, focusing on her own project using Surface Enhanced Raman Spectroscopy to detect and differentiate
  low concentrations of simple carbohydrates. Her ultimate goal is to detect simple sugars in flow, something that has not been done before. Colleen's immediate future plans include making contributions
  that will be published while at Notre Dame and continuing research in graduate school, hoping to make her experiences at Notre Dame helpful in her future endeavors.
