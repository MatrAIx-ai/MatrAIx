  career_goals: Mercedes dreams of becoming a teacher or a community health worker, inspired by her strong desire to help others and create harmonious environments. She also imagines herself as a veterinarian
    caring for animals, reflecting her love for pets and her compassionate nature. In the long term, she hopes to contribute to her neighborhood by supporting children and families, combining her curiosity
    for learning with a practical, organized approach to problem‑solving.
