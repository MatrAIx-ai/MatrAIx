personas:
  professional: Mercedes Rodrigueznieves, an enthusiastic elementary student who is already exploring environmental science, leads her classroom’s recycling program, meticulously draws ecosystems in science
    notebooks, and balances her curiosity with practical organization, reflecting her compassionate and reliable nature.
  sports: Mercedes Rodrigueznieves, a spirited member of the Oklahoma City Youth Soccer Association’s U8 team, practices weekly with a focus on teamwork inspired by the Oklahoma City Thunder’s collaborative
    play, enjoys weekend nature hikes at Scissortail Park, and they embrace a cooperative, resilient attitude both on and off the field.
  arts: Mercedes Rodrigueznieves, a budding creative who colors vibrant scenes reminiscent of Frida Kahlo’s bold palettes while listening to Luis Miguel’s melodic ballads and building imaginative LEGO worlds,
    they often reenact stories from the animated film "Coco," showcasing their love for storytelling, cultural motifs, and collaborative play.
  travel: Mercedes Rodrigueznieves treasures family road trips to the Oklahoma City Zoo and weekend camping at Lake Murray, dreams of visiting the ancient pyramids of Teotihuacan and the colorful streets
    of Barcelona, and they plan each journey with a mix of detailed maps and spontaneous snack stops, balancing adventure with comfort.
  culinary: Mercedes Rodrigueznieves, a keen junior cook, loves assembling tacos with seasoned ground beef, fresh cilantro, lime wedges, and homemade guacamole made from ripe avocados and a pinch of salsa
    verde, they proudly master the art of rolling corn tortillas, yet they often forget to tidy the kitchen after cooking.
  core: Mercedes Rodrigueznieves is a compassionate, organized seven‑year‑old who blends bright curiosity with practical routines, sometimes gets distracted by shiny stickers, and they find joy in drawing,
    soccer, and sharing homemade tacos with friends.
background:
  cultural: Mercedes comes from a Mexican‑American family that maintains strong ties to its cultural roots while living in Oklahoma City. She grows up speaking Spanish at home and English at school, celebrating
    traditions such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day with family gatherings, traditional foods, and music. Her family participates in local Mexican cultural festivals and
    community events, fostering pride in her heritage. The blend of Mexican customs—like hospitality, respect for elders, and communal cooking—with the Midwestern community environment shapes her values
    and daily experiences.
