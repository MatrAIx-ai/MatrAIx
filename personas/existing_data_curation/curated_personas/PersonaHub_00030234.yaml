persona_description: A professional route surveyor who specializes in the compilation and updating of topographical, geological, soil, and other maps during linear surveys, as well as in the study of the
  dynamics of natural and socioeconomic phenomena in a narrow strip of terrain. They are skilled in using methods of instrument surveying (plane-table, tachymetric, and aerial phototopographic surveying)
  or exploratory surveying, and are familiar with ground-level route surveying techniques for mapping inaccessible areas. They are also proficient in aerial route surveying for specific purposes such as
  recording the ice conditions at sea, the boundaries of river flooding, and the centers of forest fires.
