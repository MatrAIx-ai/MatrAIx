  career_goals: Even in retirement, Jennifer aims to continue contributing to the nursing field by volunteering at the local senior center, mentoring nursing students, and advocating for policies that improve
    elder‑care services in Minnesota. She hopes to share her wealth of knowledge through informal workshops and storytelling sessions for both caregivers and seniors, and to create a supportive network
    that promotes practical, compassionate care. Additionally, she wishes to document her experiences in a memoir that highlights the importance of routine, kindness, and community in healthcare.
