personas:
  professional: Jennifer Wyman, a retired registered nurse with six decades of geriatric expertise, excels at meticulous patient assessment, medication administration, and wound care while using their love
    of routine and sociable, compassionate nature to mentor younger nurses and lead community health outreach at the local senior center.
  sports: Jennifer Wyman enjoys leisurely walks in the park each morning, follows the Minnesota Twins baseball season, watches the Minnesota Vikings on Sundays, and participates in low‑impact senior yoga
    classes at the community center, while occasionally joining a friendly bridge tournament that feels like a mental sport.
  arts: Jennifer Wyman sings alto in her church choir performing hymns by Fanny Crosby, knits while listening to Bob Dylan and Emmylou Harris, cherishes the storytelling evenings featuring Garrison Keillor’s
    tales, and enjoys the Minnesota Orchestra’s renditions of Tchaikovsky, all of which enrich her social gatherings.
  travel: Jennifer Wyman prefers short, organized trips such as a weekend cruise on Lake Superior, a nostalgic drive to Mackinac Island, and a summer visit to the historic streets of St. Paul’s Lowertown,
    while avoiding long‑haul flights due to health considerations, planning each outing with a detailed itinerary and a pocket‑sized map.
  culinary: Jennifer Wyman delights in cooking classic Minnesota hotdish with tater tots, honey‑glazed carrots from her garden, and homemade lefse, while also baking apple crisp made with tart Granny Smith
    apples and sprinkling cinnamon, balancing simple comfort foods with occasional experimental recipes for friends.
  core: Jennifer Wyman is a steadfast, routine‑loving senior who blends a warm, community‑focused spirit with a knack for occasional yarn‑obsessed chaos, navigating life with calm resilience and a gentle
    humor.
background:
  cultural: 'Jennifer was born and raised in the Upper Midwest, growing up in a family with Norwegian‑Swedish ancestry. Her upbringing embodied classic Midwestern values: hard work, practicality, modesty,
    and a deep sense of community. A lifelong member of a Lutheran congregation, she celebrates seasonal holidays with traditional customs and enjoys the region’s love for outdoor activities and seasonal
    foods. Her white Midwestern cultural background emphasizes respect for tradition, civic responsibility, and an appreciation for simple, reliable routines.'
