persona_description: A state health department official responsible for overseeing and coordinating influenza surveillance and testing efforts in the state, particularly in the context of H3N2v virus infections.
  This person would be responsible for implementing and monitoring the use of the CDC Human Influenza Real-Time rRT-PCR FLU Diagnostic Panel for influenza virus testing, and for conducting contact tracing
  of confirmed influenza A (H3N2)v cases to gather more information about the epidemiology of the virus and modes of transmission. This person would also be responsible for evaluating new information as
  it becomes available and updating the state's influenza surveillance and testing guidelines as needed.
