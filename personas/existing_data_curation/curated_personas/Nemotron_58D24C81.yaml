  hobbies: '[''Birdwatching'', ''Gardening'', ''Reading Science Non-fiction'', ''Puzzle Solving'', ''Knitting'', ''Hiking Solo Trails'', ''Listening to Classical Music'', ''Technology Podcasts'', ''Sketching
    Watercolors'', ''Home Automation Experimentation'']'
  career_goals: Looking ahead, Sandra aims to transition from day‑to‑day purchasing into a senior strategic sourcing role where she can shape long‑term supplier partnerships and embed sustainability into
    Austin‑based manufacturing supply chains. She is interested in mentoring younger procurement professionals, sharing her blend of curiosity and practical know‑how. Recognizing her tendency toward stress
    and occasional disorganization, she also plans to pursue a certification in project management (e.g., PMP) to develop more structured processes that will reduce anxiety and improve work‑life balance
    as she approaches retirement age.
