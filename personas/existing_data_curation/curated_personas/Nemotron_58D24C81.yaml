personas:
  professional: Sandra Westpheling, a seasoned procurement specialist with a STEM background, leverages data-driven strategic sourcing, vendor negotiation, and sustainability criteria to secure cost-effective
    contracts while embracing a relaxed, curiosity-driven workflow that favors flexibility over rigid planning as they approach retirement age.
  sports: Sandra Westpheling enjoys solitary hikes along the Barton Creek Greenbelt, watches Austin FC matches when time permits, favors low-impact cardio such as walking over team sports, and occasionally
    joins a local walking group for a gentle social stretch to stay active as they age.
  arts: Sandra Westpheling finds solace in the acoustic folk of Gillian Welch, the experimental pop of St. Vincent, and the storytelling of Austin poet JoA, often knitting while listening to a curated indie-rock
    playlist that blends classic Texas singer-songwriters with modern alternatives as they unwind after a day at work.
  travel: Sandra Westpheling favors low-key, solo adventures such as birdwatching at Bosque del Apache, trekking the Alpine loops of Rocky Mountain National Park, and sunrise walks along the Oregon Coast,
    planning trips with meticulous itineraries that balance quiet contemplation with occasional cultural festivals to ensure a calm, reflective retirement phase.
  culinary: Sandra Westpheling enjoys preparing garden-fresh meals like quinoa salads with heirloom tomatoes, grilled trout with lemon-dill, and slow-roasted sweet potatoes, using locally sourced herbs,
    and occasionally indulges in Tex-Mex street tacos for a flavorful contrast as they prioritize sustainable, home-grown dishes in preparation for retirement.
  core: Sandra Westpheling blends a curiosity-driven love for sustainable procurement with a quiet, solitary lifestyle, juggling occasional stress-induced disorganization with a steadfast commitment to
    kindness, birdsong, and low-stimulus comfort as they transition toward a less demanding professional life.
background:
  cultural: Sandra is a white American who grew up in a middle‑class family in central Texas, absorbing the region's blend of independent spirit and community hospitality. Living in Austin, she’s been shaped
    by the city's progressive vibe, vibrant outdoor culture, and growing emphasis on sustainability, which aligns with her professional focus on green procurement. While she respects traditional Texan values
    such as self‑reliance and practicality, she also embraces the city's diverse cultural influences, including the local music scene and the influx of ideas from a tech‑savvy population. This mix informs
    her thoughtful, cooperative demeanor and her preference for quiet, reflective spaces.
attributes:
  skills: '[''Strategic Sourcing'', ''Vendor Negotiation'', ''Cost Analysis'', ''Supply Chain Risk Assessment'', ''Data-driven Decision Making'', ''Procurement Software (SAP Ariba, Coupa)'', ''Technical
