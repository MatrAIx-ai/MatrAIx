  career_goals: 'Roberto’s play reveals budding ambitions: he loves pretending to be an artist who paints bright pictures, a singer who entertains friends, and a community helper who rescues others like
    a firefighter. He expresses a desire to bring joy and laughter to people around him, dreaming of a future where he can combine his love of art, music, and caring for others. While these goals are still
    playful, they reflect his sociable nature, creativity, and emerging sense of purpose.'
