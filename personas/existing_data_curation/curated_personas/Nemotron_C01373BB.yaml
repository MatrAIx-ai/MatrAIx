    a balanced love for lively sports culture and gentle physical activity.
  arts: Carolina Cruz grows up surrounded by salsa rhythms from family celebrations, vibrant Frida Kahlo prints on her nursery wall, and the playful melodies of Disney's 'Moana', while she giggles at episodes
    of 'Bluey', cultivating an early affinity for colorful, melodic artistic expression.
  travel: Carolina Cruz has already enjoyed short trips to Miami Beach and the Everglades with her parents and dreams of one day exploring Bogotá’s historic La Candelaria district, embodying a blend of
    local adventure and curiosity about distant cultural roots.
  culinary: Carolina Cruz's palate currently embraces pureed carrots, avocado, banana, and rice cereal, with a special fondness for a spoonful of coffee‑infused oat cereal inspired by her family's morning
    brew, reflecting a budding appreciation for subtle flavors and nutritious foods.
  core: Carolina Cruz is a newborn whose early blend of practical curiosity, disciplined routine, and cultural rhythm sets the stage for a future marked by thoughtful competition, resilient calm, and a
    love for lively traditions.
background:
