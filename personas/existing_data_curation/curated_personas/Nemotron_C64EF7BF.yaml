  hobbies: '[''Cooking and experimenting with recipes'', ''Exploring local hiking and bike trails'', ''Listening to music (country, indie folk, classic rock)'', ''Reading mystery novels'', ''Gardening'',
    ''Attending community festivals'', ''Playing beginner guitar'', ''Watching cooking and mixology shows'']'
  career_goals: Linda aims to become a shift supervisor or lead bartender within the next two to three years. She plans to earn a Certified Bartender credential and a ServSafe Manager certification, and
    to enroll part‑time in a bachelor's program in hospitality management. Long‑term, she aspires to open a small community‑focused café or food‑truck that blends Southern comfort foods with creative global
    twists inspired by the cuisines she explores. She also wishes to mentor new staff and contribute to local initiatives that promote hospitality training for youth.
