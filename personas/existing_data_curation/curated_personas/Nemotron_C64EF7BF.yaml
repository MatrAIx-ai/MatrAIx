personas:
  professional: A front‑of‑house professional named Linda Oshea blends ServSafe certification, cash‑handling precision, and a pragmatic curiosity for new beverage technologies to keep high‑volume service
    running smoothly, yet their relaxed attitude toward strict scheduling sometimes leaves the bar area a bit cluttered, prompting them to step in assertively when supervisory support is needed, and they
    often rely on teammates to maintain an organized workspace.
  sports: An outdoor‑oriented enthusiast named Linda Oshea spends weekends hiking the trails of Lenoir County parks and biking along the Neuse River, while cheering for the Down East Wood Ducks and the
    Carolina Hurricanes, and they maintain a laid‑back fitness routine that they prioritize over formal gym sessions.
  arts: A culturally tuned individual named Linda Oshea immerses themselves in contemporary country hits by Luke Combs, indie folk from Mumford & Sons, and classic rock anthems by Foo Fighters, while devouring
    mystery novels by Tana French and Gillian Flynn, following cooking and mixology shows like Chef’s Table and The Great British Bake Off, and strums simple chords on a beginner’s guitar during quiet evenings,
    allowing them to blend auditory and literary inspirations into their daily life, and they often share the music they discover with friends at the bar.
  travel: A spontaneous traveler named Linda Oshea has road‑tripped along the Blue Ridge Parkway, explored the historic streets of Savannah, and enjoyed weekend getaways to the Outer Banks, while dreaming
    of a culinary pilgrimage to Oaxaca, preferring spur‑of‑the‑moment itineraries that fit within their modest budget and work commitments, and they often pack a mix of snacks inspired by their kitchen
    experiments.
  culinary: A kitchen experimenter named Linda Oshea reimagines classic Southern staples such as shrimp and grits, fried chicken, and cornbread by infusing them with Thai basil, Korean gochujang, and North
    African harissa, favoring ingredients like sweet potatoes, okra, miso, and jalapeño, while also honing mixology skills to craft cocktails inspired by The Craft Cocktail Club, allowing them to serve
    up globally‑spiced comfort food, and they regularly test new flavor pairings on friends before finalizing a recipe.
  core: Linda Oshea blends hospitality expertise, a daring palate for global twists on Southern comfort, and a flexible yet occasionally scatterbrained approach into a vision of a community‑centric café
    that celebrates food, friendship, and flavor, and they hope it becomes a local gathering hub.
background:
  cultural: Linda was raised in the close‑knit, Southern‑influenced community of Kinston, North Carolina. Her family places a high value on hospitality, community service, and sharing meals. She grew up
    attending a local Methodist church, participating in church potlucks and volunteer food‑bank drives, and celebrating regional events such as the Azalea Festival and the NC Folk Heritage Festival. The
    area's agricultural roots and proximity to the Atlantic coast have shaped her appreciation for fresh, locally sourced ingredients and Southern culinary traditions. This cultural backdrop informs her
    warm, personable service style and her desire to create community‑focused food ventures.
