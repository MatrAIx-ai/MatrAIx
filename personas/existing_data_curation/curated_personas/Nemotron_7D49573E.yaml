  hobbies: '["Reading contemporary fiction","Watching automotive documentaries","Cooking traditional Dominican cuisine","Listening to bachata and merengue music","Walking in Bronx River parks","DIY car‑maintenance
    projects","Mentoring elementary students","Small‑group dance gatherings"]'
  career_goals: Esmeralda aims to advance within the school transportation system by obtaining a commercial driver’s license for larger passenger vehicles and pursuing an associate degree in transportation
    logistics at a local community college. She hopes to move into a supervisory or fleet‑management role, where she can contribute to improving route efficiency and safety protocols. Long‑term, she envisions
    launching a community‑focused shuttle service that provides reliable transport for senior citizens and low‑income families in the Bronx, combining her practical driving expertise with her desire to
    give back to her neighborhood.
