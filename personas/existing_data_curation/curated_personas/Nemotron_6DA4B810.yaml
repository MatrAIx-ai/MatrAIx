personas:
  professional: Judith Wixon, a 16‑year‑old visual artist and budding web designer, blends hand‑drawn sketches, watercolor and acrylic experiments, digital illustration in Procreate and Photoshop, and basic
    HTML/CSS to create narrative‑driven online portfolios while coordinating small art‑workshop projects at the community library with a mix of meticulous planning and spontaneous creative improvisation.
  sports: Judith Wixon enjoys weekend hikes along the foothills of the Rockies, occasionally joins the local youth climbing gym, follows the Denver Broncos (NFL) and Colorado Avalanche (NHL) for a communal
    sense of local pride, and maintains a habit of stretching and yoga to stay limber for long photography walks.
  arts: Judith Wixon draws inspiration from Frida Kahlo, Hayao Miyazaki, Sufjan Stevens, and Explosions in the Sky, frequently visits the Denver Art Museum and nearby galleries, and spends evenings experimenting
    with digital collages in Photoshop while playing acoustic guitar to the tunes of Elliott Smith.
  travel: Judith Wixon prefers low‑key, nature‑focused trips, planning detailed itineraries for weekend getaways to Rocky Mountain National Park and annual family trips to the Grand Canyon, while dreaming
    of witnessing the Northern Lights in Iceland and exploring the street art of Berlin on a future gap‑year exchange.
  culinary: Judith Wixon favors fresh, colorful meals such as quinoa‑citrus salads, avocado toast topped with feta and cherry tomatoes, and homemade ramen bowls, often experimenting with matcha‑infused
    desserts and using their sketchbook to doodle plating designs before cooking.
  core: Judith Wixon is a 16‑year‑old dreamer who sketches sunrise over the Rockies at midnight, hoards watercolor pencils, and habitually forgets to water their houseplants while day‑dreaming about future
    murals.
background:
  cultural: Judith was raised in Elizabeth, a small, close‑knit town in Elbert County, Colorado. Her family’s roots trace back several generations to the agricultural and ranching communities of the Rocky
    Mountain region, fostering a deep respect for self‑reliance, neighborly support, and the natural environment. Local traditions such as county fairs, community potlucks, and participation in church and
    library events have shaped her sense of community and cooperation. While grounded in these rural American values, Judith also draws inspiration from contemporary art and digital culture through school
    programs and online networks, creating a blend of traditional modesty and modern creative curiosity.
