  hobbies: '[''drawing'', ''painting'', ''creative writing'', ''photography'', ''hiking'', ''stargazing'', ''playing acoustic guitar'', ''visiting art galleries'', ''digital art experimentation'', ''volunteering
    at community art workshops'']'
  career_goals: Judith aspires to turn her artistic passions into a professional career. She aims to attend a college or art institute with a strong fine‑arts or visual‑communication program, where she
    can refine her illustration and design skills. Her long‑term goal is to work as a concept artist or freelance illustrator for video games, film, or publishing, creating evocative visuals that blend
    imagination with narrative. She also hopes to integrate her love for community by leading collaborative mural projects or visual‑storytelling workshops in her hometown. In the future, she envisions
    building an online presence that showcases her portfolio and eventually launching a small creative studio focused on socially‑conscious art.
