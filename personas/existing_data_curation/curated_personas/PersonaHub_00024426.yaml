persona_description: A neurologist and epilepsy specialist who has expertise in the diagnosis, classification, and treatment of seizures. They are knowledgeable about the use of EEGs in the diagnosis of
  seizures and epilepsy, and have experience in providing treatment options for refractory epilepsy, including non-pharmacological therapies. They are also knowledgeable about the management of patients
  having a seizure, anti-epileptic drug treatment, and the decision-making process for choosing between medication, surgery, or a vagal nerve stimulator. They have a deep understanding of the importance
  of providing advice to patients about driving and have experience in providing this advice. They are likely to be a part of a hospital or medical institution and are responsible for providing educational
  programs on epilepsy and its treatment.
