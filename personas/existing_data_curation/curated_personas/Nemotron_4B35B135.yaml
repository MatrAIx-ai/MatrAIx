  hobbies: '["Volunteering at community center", "Stamp collecting (philately)", "Cooking and baking", "Gardening", "Hiking", "Karaoke nights", "Book club (mystery novels)", "DIY crafts"]'
  career_goals: In the next few years, Lacy aims to step into a supervisory position within her post office, such as shift supervisor or station manager, where she can lead a team and drive service‑quality
    improvements. She plans to earn a certification in supply‑chain management or logistics to deepen her expertise and to spearhead pilot projects that streamline package handling and improve customer
    satisfaction. Long‑term, Lacy envisions either becoming a postmaster overseeing multiple locations or launching a small e‑commerce venture that sells handcrafted goods, leveraging her business background
    and postal logistics knowledge. Throughout, she wants to maintain a flexible schedule that supports her family life and community involvement.
