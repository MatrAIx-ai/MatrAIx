  career_goals: Michael aims to transition into a senior technical leadership role, such as Director of R&D or Plant Operations, where he can drive the adoption of green chemistry initiatives and champion
    innovative, art‑inspired material solutions. He is motivated to secure patents for sustainable process technologies, expand the company’s footprint in the Southeast’s emerging biotech sector, and become
    an active contributor to professional societies like AIChE. Ultimately, he hopes to mentor the next generation of engineers while positioning his organization as a benchmark for competitive excellence
    and responsible engineering practice.
