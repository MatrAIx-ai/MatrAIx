personas:
  professional: Michael Eliott is a budding electrical design engineer who leverages his expertise in analog/digital circuit design, Altium PCB layout, and microcontroller programming while applying his
    curious‑practical mindset to mentor junior staff and drive reliable solutions for renewable energy projects.
  sports: Michael Eliott thrills to weekly intramural basketball games with the Austin Hoops Club, hikes the Hill Country trails as a member of the Austin Hikers Guild, and avidly follows the Dallas Cowboys,
    Houston Astros, and Austin FC, balancing competitive play with outdoor endurance.
  arts: Michael Eliott channels his outgoing spirit into guitar jam sessions at Luckenbach's Live Music Hall, where he reveres the sounds of Willie Nelson, Chris Stapleton, and Kacey Musgraves, and also
    enjoys attending live performances by the Texas Symphony Orchestra.
  travel: Michael Eliott prefers road‑trip adventures, having explored the Texas Hill Country, a weekend getaway to New Mexico's White‑Sands National Monument, and a cultural immersion in Mexico City, while
    dreaming of touring Iceland's geothermal sites and Germany's renewable‑energy research hubs.
  culinary: Michael Eliott showcases his cooking skill by mastering Texas‑style brisket, smoked ribs, and jalapeño‑infused corn salsa, often experimenting with woods like mesquite and hickory, and he delights
    in pairing his BBQ creations with craft beers from local microbreweries.
  core: Michael Eliott blends engineering precision with a laid‑back Southern BBQ soul, juggling circuit boards, guitar strings, and basketballs while rarely showing stress, though he can be a night‑owl
    tinkering on Arduino projects after midnight.
background:
  cultural: Michael was raised in a close‑knit, small‑town environment in central Texas, where community values and a strong work ethic are emphasized. His family’s Anglo‑American heritage, combined with
    a deep appreciation for local traditions such as rodeos, country music, and outdoor recreation, shapes his cultural outlook. While he identifies with the broader Texan identity, he remains open to diverse
    ideas, reflecting a balance between traditional roots and contemporary curiosity. His marriage and involvement in local church activities further reinforce a sense of community responsibility and collaborative
    spirit.
attributes:
  skills: '[''circuit design'', ''PCB layout'', ''microcontroller programming'', ''PLC programming'', ''electrical load analysis'', ''NEC code compliance'', ''system troubleshooting'', ''technical documentation'',
    ''simulation (LTspice, MATLAB/Simulink)'', ''team collaboration'']'
  hobbies: '[''basketball'', ''hiking'', ''guitar playing'', ''live music events'', ''Texas BBQ cooking'', ''DIY electronics'', ''home automation projects'', ''volunteering (youth robotics, church outreach)'']'
  career_goals: He aims to earn a Professional Engineer (PE) license within the next three years, progress to a senior design engineer role, and eventually lead multidisciplinary projects focused on renewable
    energy integration and smart‑grid technologies. Michael is interested in managing a team of engineers, driving innovative yet reliable solutions, and later establishing his own consulting firm to serve
    small‑town infrastructure projects across Texas. He also plans to contribute to community STEM outreach programs and mentor aspiring engineers.
