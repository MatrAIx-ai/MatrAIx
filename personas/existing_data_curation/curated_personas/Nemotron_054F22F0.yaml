personas:
  professional: Anna Park is a certified home appliance technician who leverages a solid electrical engineering foundation and a calm, methodical demeanor to diagnose and repair everything from vintage
    refrigerators to smart ovens, while they assertively communicate the repair process and safety checks to each customer.
  sports: Anna Park stays active by hiking the rolling hills of the Daniel Boone National Forest with the Kentucky Trails Hikers Club, cheering on Louisville City FC during the soccer season, and playing
    casual pick‑up volleyball at the local community center, while they balance structured workouts with spontaneous outdoor adventures.
  arts: Anna Park nurtures a love for folk and bluegrass music, frequently attending gigs featuring the Del McCoury Band and listening to Emmylou Harris, while they unwind with novels by Wendell Berry and
    occasional screenings of independent films by the Kentucky Film Office, weaving these cultural threads into their DIY repair projects.
  travel: Anna Park prefers low‑key road trips that blend nature and history, having explored Mammoth Cave and the Red River Gorge on weekend drives, dreaming of a future bicycle‑friendly tour through the
    Scottish Highlands to study vintage engineering heritage, while they always budget travel costs through a dedicated savings fund.
  culinary: Anna Park enjoys cooking hearty Southern comfort food—such as fried chicken, bourbon‑glazed pork ribs, collard greens, and sweet potato pie—leveraging their hands‑on skill with vintage stovetops
    and a newly refurbished smart oven, while they also experiment with a solar‑powered dehydrator for homemade jerky, preferring meals that celebrate local produce and traditional flavors.
  core: Anna Park is a calm, resilient tinkerer who transforms broken appliances into community teaching tools, balances a strict budget with a love for gourmet comfort food, and never skips evening mindfulness
    meditation despite a habit of hoarding spare parts, while they always keep a spare fuse on hand for any unexpected short.
background:
  cultural: Anna grew up in a close‑knit white Appalachian family in central Kentucky, where values of hard work, self‑reliance, and community service were emphasized. Her upbringing blended traditional
    Southern hospitality with a modern appreciation for technology, reflected in family gatherings that often featured homemade meals and discussions about practical problem‑solving. The local culture’s
    emphasis on neighborly assistance and modest living has shaped her cooperative yet assertive personality, while the region’s natural scenery nurtured her love for outdoor activities. Though she enjoys
    contemporary digital media, she also respects the cultural heritage of the area, participating in community fairs and supporting local artisans.
attributes:
  skills: '[''Electrical troubleshooting'', ''Diagnostic testing with multimeters and scope analyzers'', ''Repair of refrigeration and HVAC components'', ''Smart appliance firmware updates'', ''Customer
    communication and service reporting'', ''Workshop organization and inventory management'', ''Basic plumbing and gas line maintenance'']'
  hobbies: '[''Restoring vintage appliances'', ''Reading nonfiction on renewable energy and engineering'', ''Hiking in the Daniel Boone National Forest'', ''Volunteering at the community garden'', ''Participating
    in a local makers’ club'', ''Mindfulness meditation'']'
  career_goals: Anna aims to earn Certified Appliance Service Technician (CAST) credentials and eventually become a master technician recognized within her regional service network. She envisions opening
    her own boutique repair shop in Somerset that emphasizes sustainable repair practices, parts recycling, and community workshops that teach DIY maintenance. Over the next five years, she plans to mentor
    apprentices, expand her expertise into emerging smart‑home technologies, and potentially partner with local vocational schools to develop a hands‑on training program.
