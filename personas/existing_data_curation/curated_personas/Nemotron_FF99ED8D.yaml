personas:
  professional: Teresa Summers blends her STEM analytical background with a compassionate counseling style, expertly delivering CBT and Motivational Interviewing in group therapy while they leverage meticulous
    organization and tech‑savvy record‑keeping to mentor junior counselors and coordinate care across providers.
  sports: Teresa Summers is an avid Saturday hiker on the Front Range trails, holds a membership in the Front Range Hiking Club, enjoys cheering for the Denver Broncos and Colorado Rockies, and participates
    in a local line‑dancing league that doubles as a low‑impact cardio workout.
  arts: Teresa Summers finds creative fulfillment humming in the community theater choir, knitting patterned blankets while listening to John Denver and the folk storytelling of Bob Dylan, and discussing
    favorite novels alongside adaptations of Arthur Miller’s plays in her book club, where they often quote lines from “Death of a Salesman.”
  travel: Teresa Summers prefers well‑planned weekend getaways that combine light adventure with comfort, often driving to Rocky Mountain National Park, taking a yearly family trip to Banff, and dreaming
    of a relaxed retirement retreat in the vineyards of Napa Valley after budgeting for travel around her fixed income.
  culinary: Teresa Summers cooks hearty comfort meals such as shepherd’s pie, pot roast with rosemary, and homemade green chili topped with fresh corn tortillas, drawing vegetables from their garden and
    perfecting the flaky crust of a classic chicken pot pie, while they enjoy occasional indulgence in a rich chocolate lava cake at a local bistro.
  core: Teresa Summers embodies a methodical yet sociable spirit, balancing a love for routine‑driven counseling and garden‑fresh cooking with a penchant for spontaneous yarn purchases and a habit of double‑checking
    every calendar entry before the day ends.
background:
  cultural: Teresa grew up in a middle‑class white family in the Denver suburbs during the 1960s and 1970s. Her upbringing was shaped by a Protestant, community‑service ethic that valued hard work, self‑reliance,
    and modesty. The region’s strong outdoor culture fostered her lifelong appreciation for nature and physical activity, while the local emphasis on education steered her toward a STEM bachelor’s degree.
    After marrying her high‑school sweetheart, she settled in Brighton, Colorado, where she has lived for the past three decades. Her cultural identity blends traditional Midwestern values—family stability,
    routine, and practicality—with an inclusive, community‑oriented outlook that embraces the growing diversity of her county. She actively participates in local farmers’ markets, volunteers for town events,
    and respects the blend of rural and suburban influences that define her hometown.
attributes:
  skills: '["Cognitive Behavioral Therapy (CBT)", "Motivational Interviewing", "Group Therapy Facilitation", "Crisis Intervention", "Client Assessment and Intake", "Case Management", "Program Development
    and Evaluation", "Evidence‑Based Practice Implementation", "Electronic Health Record (EHR) Management", "Telehealth Counseling", "Professional Supervision", "Research and Data Analysis", "Grant Writing",
    "Community Outreach and Education"]'
  hobbies: '["Hiking on the Colorado Front Range", "Gardening (vegetable and flower beds)", "Cooking traditional comfort foods", "Book club (fiction and psychology)", "Volunteer counseling at community
    centers", "Knitting and crocheting", "Line dancing", "Yoga practice", "Participating in local theater productions"]'
  career_goals: Teresa aims to become a senior clinical supervisor at her community mental‑health center, where she can shape policy and mentor the next generation of counselors. She plans to earn a master's
    degree in counseling to obtain LPC certification and pursue board certification as a Clinical Mental Health Counselor. Over the next five years, she hopes to design and launch a structured anxiety‑management
    program that integrates biofeedback technology, reflecting her STEM interests. Teresa also aspires to publish a handbook on routine‑focused therapy for adults, present at regional conferences, and serve
    on the Brighton County Mental Health Advisory Council to improve access to services in her hometown.
