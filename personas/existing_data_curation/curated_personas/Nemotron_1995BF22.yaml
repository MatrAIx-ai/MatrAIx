  career_goals: She aspires to become a senior leader in the public‑sector infrastructure domain, aiming to direct a department of resilient urban design within the District’s Department of Planning. In
    the long term, Dae wants to launch her own boutique consultancy that blends engineering excellence with public art, creating spaces that are both functional and culturally enriching. She is motivated
    to mentor the next generation of women engineers, champion the integration of artistic elements in civic projects, and influence policy that mandates sustainability and aesthetic quality in all new
    construction.
