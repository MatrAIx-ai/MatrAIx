personas:
  professional: A civil engineer with a talent for marrying structural rigor and artistic nuance, Dae Pai applies advanced BIM tools, LEED‑certified sustainable design, and meticulous project management
    to deliver multi‑story buildings and bridges that both serve public needs and incorporate subtle public‑art elements, driven by a fiercely competitive streak and a disciplined work ethic.
  sports: A dedicated solo runner, Dae Pai follows a steady regimen of 5‑10 km trail runs in Rock Creek Park, is a member of the Rock Creek Runners Club, and regularly attends yoga classes; she roots for
    the Washington Capitals in hockey and DC United in soccer, and she is training for a half‑marathon but often skips long runs when project deadlines loom.
  arts: An avid supporter of contemporary art, Dae Pai frequents the Hirshhorn Museum and the Renwick Gallery, draws creative fuel from installation works by Do Ho Suh and paintings by Kerry James Marshall,
    unwinds with watercolor sketches of D.C.’s urban streets and disciplined calligraphy sessions, and curates her personal soundtrack with the atmospheric folk of Bon Iver while delving into speculative
    fiction by Ted Chiang and psychological treatises such as The Body Keeps the Score.
  travel: A meticulous planner, Dae Pai has explored sustainable architecture in Copenhagen, trekked the volcanic landscapes of Iceland, and toured the historic neighborhoods of New Orleans, always preferring
    small‑group, research‑focused trips that align with her professional curiosity, and she eyes a future pilgrimage to Bhutan’s monasteries to study how cultural heritage informs resilient design.
  culinary: An avid home chef, Dae Pai skillfully prepares kimchi jjigae, doenjang stew, and experimental kimchi‑pasta fusions, sourcing fresh herbs like cilantro and napa cabbage from local farmers’ markets,
    and she regularly hosts intimate dinner gatherings where meticulous plating competes with lively conversations about design and art.
  core: Dae Pai, a 41‑year‑old civil engineer who blends disciplined engineering excellence with a secret love for watercolor and quiet trail runs, habitually over‑analyzes both project risks and personal
    anxieties, yet finds solace in precise calligraphy strokes and the occasional indulgent art‑themed dinner.
background:
  cultural: Dae Kim Pai is a second‑generation Korean‑American. Raised in a bilingual household, she grew up celebrating Chuseok and Seollal while also embracing the multicultural environment of the Washington,
    DC area. Her family placed a strong emphasis on academic achievement and collective responsibility, which reinforced her disciplined work ethic. At the same time, her exposure to both Korean artistic
    traditions, such as calligraphy and pottery, and the vibrant DC art scene has cultivated a hybrid cultural perspective that values both precision and creative expression.
