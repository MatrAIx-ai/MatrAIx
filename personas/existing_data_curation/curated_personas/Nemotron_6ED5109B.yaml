personas:
  professional: Dayna Miller is a budding kindergartner who loves to experiment with building blocks and sketch simple inventions, channeling their natural curiosity and competitive spark into leading mini
    science challenges while happily ignoring tidy‑up rules.
  sports: Dayna Miller is a member of the Sunshine City Tiny Turtles soccer team, proudly wears the jersey of the hometown baseball club the River Raptors, and prefers impromptu backyard obstacle courses
    over formal drills, though their competitive streak pushes them to be the first to finish a game of tag.
  arts: Dayna Miller delights in coloring pages of Van Gogh’s Sunflowers, can hum the tune of "Let It Go" from Disney’s Frozen, and often sketches whimsical creatures after watching Studio Ghibli’s My Neighbor
    Totoro, as they cherish solitary art time over group crafts.
  travel: Dayna Miller has explored the local children’s museum and the nearby state park’s butterfly garden, and has a vivid wish to visit the Smithsonian in Washington, D.C., favoring short car trips
    with a parent that allow spontaneous stops for ice‑cream over long flights.
  culinary: Dayna Miller favors homemade macaroni and cheese with extra cheddar, enjoys strawberry slices and avocado toast on whole grain bread, and occasionally sneaks a bite of sushi roll at family gatherings
    while still mastering the art of stirring a pot solo.
  core: Dayna Miller is a calm, fiercely curious five‑year‑old who thrives on spontaneous solo art projects, competes in every playground game, and habitually misplaces crayons yet simply smiles and moves
    on.
background:
  cultural: Dayna is raised in a close-knit Black family in Abbeville, Louisiana, where African-American heritage blends with the Cajun and Creole traditions of Vermilion Parish. Her family's roots include
    participation in a historic Black church that emphasizes gospel singing, communal storytelling, and monthly fellowship meals. The sounds of blues and zydeco music fill their home, and family gatherings
    often feature shared plates of gumbo, jambalaya, and hush-puppies prepared from recipes passed down through generations. Local festivals celebrating Louisiana’s musical legacy expose Dayna to fiddles,
    accordions, and lively dances, while the bayou environment nurtures a respect for nature and outdoor play. This rich cultural tapestry informs her love for music, art, food, and community connection.
