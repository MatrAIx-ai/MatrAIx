  career_goals: Dayna dreams of a future where she can turn her love of art and discovery into a career that lets her create and explore freely. She imagines becoming a children's book illustrator who captures
    the colors and sounds of her hometown, earning recognition in art contests and sharing her unique perspective. She also wonders about exploring science, perhaps as a young scientist or astronaut, because
    she loves learning new ideas. Ultimately, she hopes for a path that balances creative freedom with the chance to inspire others, without rigid schedules that would limit her curiosity.
