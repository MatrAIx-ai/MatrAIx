  hobbies: '[''Trail running'', ''Hiking'', ''Wildlife photography'', ''Reading sports-science literature'', ''Bike maintenance'', ''Woodworking'', ''Meditation'']'
  career_goals: John aims to qualify for the national track championships within the next two years and secure a professional contract with a competitive distance-running team. He envisions transitioning
    to a sports performance coaching role after his competitive career, eventually opening a boutique training center that blends data-driven methods with individualized, practical coaching. He also hopes
    to earn a sports-science certification to deepen his expertise and maintain a sustainable career in athletics.
