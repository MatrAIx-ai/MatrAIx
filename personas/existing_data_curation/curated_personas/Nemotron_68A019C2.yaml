personas:
  professional: John Banks is a disciplined endurance runner who leverages video analysis, wearable metrics, and meticulous macronutrient tracking to self‑coach their interval training, applying basic biomechanical
    tweaks and mental‑toughness strategies as they chase a national track championship and a future boutique coaching venture.
  sports: John Banks is a member of the Davenport Trail Runners Club and a dedicated fan of the Chicago White Sox and Iowa Hawkeyes track, regularly logging long forest trail runs, weekend hill sprints,
    and seasonal cross‑country skiing while maintaining a rigorous strength routine at the local university gym, and they proudly wear the club’s teal vest during competitions.
  arts: John Banks finds creative release in wildlife photography, often emulating the composition style of Ansel Adams, while listening to instrumental composers like Max Richter and Ólafur Arnalds during
    meditation, and they occasionally attend local art gallery openings to study photo exhibitions, though they rarely mingle beyond the quiet gallery walls.
  travel: John Banks prefers solo, nature‑focused getaways, having hiked the Appalachian Trail’s Shenandoah segment and trekked Patagonia’s Fitz Roy, while dreaming of future trips to New Zealand’s Milford
    Sound and the Scottish Highlands, planning each adventure with meticulous route mapping but often delaying bookings until the last minute due to training commitments.
  culinary: John Banks cooks high‑protein meals centered on grilled salmon, quinoa, sweet potatoes, and roasted kale, perfecting a signature quinoa‑salmon bowl with a lemon‑tahini drizzle, while also mastering
    a wild mushroom risotto for occasional indulgence, yet they habitually skip post‑run meals in favor of a quick protein shake.
  core: John Banks blends relentless data‑driven training with solitary outdoor pursuits, juggling a disciplined athlete’s schedule, a near‑obsessive budgeting habit, and occasional caffeine‑fueled insomnia,
    all while constantly fine‑tuning their performance and quietly avoiding social distractions.
background:
  cultural: John comes from a white, Midwestern–Pacific Northwest background. He was raised in a small, close-knit community in Lincoln County, where self-reliance, hard work, and modesty are valued. His
    family’s roots trace back to German and Irish immigrants who settled the region in the early 20th century. Local traditions such as community fairs, outdoor recreation, and a strong connection to the
    land shaped his appreciation for solitude and the natural environment. Though married at 21, he and his spouse share a pragmatic outlook on life, prioritizing stability and personal growth.
