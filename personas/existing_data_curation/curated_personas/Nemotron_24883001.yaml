  career_goals: Although currently not employed full‑time, Peter aims to transition into a part‑time role as a community program coordinator where he can leverage his organizational talent and compassion.
    He plans to obtain a certification in Mental Health First Aid to better support individuals coping with stress and anxiety. Over the next few years, he hopes to complete a bachelor's degree in Social
    Work, allowing him to expand his impact on vulnerable populations. He also aspires to launch a modest home‑repair service that offers discounted rates to seniors in Marshfield, blending his practical
    skills with his desire to help others.
