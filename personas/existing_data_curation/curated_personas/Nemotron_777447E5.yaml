  hobbies: '["Fishing", "Birdwatching", "Hiking", "Cross-country skiing", "Snowshoeing", "Woodworking", "DIY home projects", "Reading practical manuals", "Single-player puzzle video games", "Community volunteer
    repairs"]'
  career_goals: Kevin aims to obtain EPA Section 608 certification and become a lead technician or foreman within his current service company, providing stable, routine work while mentoring younger technicians.
    Over the next five years he hopes to establish a modest, family-owned HVAC service focused on residential clients in Chisago County, emphasizing reliable service and community trust. Long-term, he envisions
    transitioning to part-time training at a regional technical college, sharing his practical expertise and fostering a cooperative learning environment before retiring with a reputation as a trusted local
    tradesperson.
