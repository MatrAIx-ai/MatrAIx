  career_goals: Karen aims to translate her practical mindset and caring nature into a career in health and community service. In the next year she plans to enroll in a community college program in health
    sciences, earn a Certified Nursing Assistant (CNA) credential, and complete additional certifications in phlebotomy and health education. Her medium‑term goal is to transfer to a four‑year university
    to pursue a bachelor’s degree in nursing, with a focus on community health nursing. Ultimately, Karen envisions working as a registered nurse in her hometown or nearby, providing home health care and
    leading preventive health workshops. She also hopes to launch a youth mentorship program that combines her organizational skills with her desire to foster curiosity and practical learning among high‑school
    students.
