personas:
  professional: Inja Diwan, a 41‑year‑old strategic arts manager in San Diego, leverages razor‑sharp project planning, meticulous budget stewardship, and magnetic public speaking to orchestrate community‑focused
    festivals while rallying sponsors and empowering emerging creators; they thrive on turning interdisciplinary ideas into tangible programs.
  sports: Inja Diwan, a devoted fan of the San Diego Padres and the Wave, attends most home games, participates in a weekly beach volleyball league, practices yoga three times a week, and runs the annual
    San Diego Bay 5K fundraiser, though they sometimes neglect strength training when work demands rise.
  arts: Inja Diwan, whose cultural calendar includes gallery openings featuring Kehinde Wiley, performance art by Marina Abramović, indie film screenings of Greta Gerwig’s latest work, and experimental
    theater at the La Jolla Playhouse, also curates personal photo essays that capture bustling street mosaics and coastal landscapes.
  travel: Inja Diwan, a meticulous planner who alternates between immersive trips to historic sites like Jaipur’s Amber Fort and spontaneous weekend escapes to Oaxaca’s Day of the Dead celebrations, balances
    a love for deep cultural experiences with the demanding schedule of a senior arts professional and family responsibilities; they value both structured itineraries and spontaneous detours.
  culinary: Inja Diwan, an adventurous home chef who blends spice‑infused tacos seasoned with garam masala, brews chai‑scented panna cotta for dessert, and crafts avocado‑coconut ceviche, enjoys sourcing
    fresh herbs at the farmers’ market, yet sometimes over‑spices dishes in the quest for bold flavors.
  core: Inja Diwan, a hyper‑organized yet socially magnetic creative strategist, channels curiosity and disciplined ambition into building inclusive arts platforms, even if it means sacrificing sleep for
    grant deadlines.
background:
  cultural: Inja is a first‑generation American of South Asian descent, with family roots in the Indian states of Gujarat and Tamil Nadu. She grew up celebrating Diwali, Navratri, and Onam, while also embracing
    American holidays and the multicultural tapestry of San Diego. Fluent in English and conversational in Gujarati and Tamil, she often bridges cultural gaps through storytelling and culinary events. Her
    South Asian heritage informs her appreciation for vibrant colors, rhythmic music, and communal gatherings, which she integrates into her professional work and personal life. She values the principles
    of hospitality (atithi devo bhava) and community service, which shape her collaborative approach in both the workplace and her volunteer activities.
