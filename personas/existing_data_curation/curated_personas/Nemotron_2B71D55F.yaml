  hobbies: '[''Gallery and museum visits'', ''Theater and indie film attendance'', ''Photography and photo essays'', ''Fusion cooking (South Asian & Californian)'', ''Yoga and meditation'', ''Volunteer
    art workshops for youth'', ''Travel to South Asian cultural festivals'']'
  career_goals: Inja aims to advance to a senior leadership role, such as Director of Community Arts Programs, where she can shape regional cultural policy and expand inclusive arts access across San Diego
    County. She aspires to launch a flagship interdisciplinary arts center that blends South Asian heritage with contemporary American art forms, fostering dialogue and collaboration. Over the next five
    years, she plans to secure major funding grants, build a network of corporate and philanthropic partners, and mentor emerging arts professionals, particularly women and under‑represented minorities.
    Ultimately, she envisions establishing her own consultancy that advises nonprofits and municipal agencies on cultural strategy and community engagement.
