    senior center'', ''Birdwatching'', ''Local history reading'', ''Genealogy research'', ''Volunteering at the public library'', ''Listening to classic rock and folk music'', ''Informal storytelling evenings'']'
  career_goals: Although retired, Michael is driven to stay socially active and useful. He aims to become a regular volunteer at the Thief River Falls senior center, leading workshops on simple home repairs
    and basic gardening. He hopes to mentor younger community members through the local garden program and to serve on the board of the regional historical society, helping preserve and share local stories.
    Michael is also planning to launch a modest podcast that records oral histories of longtime residents, blending his love of storytelling with his curiosity about the past. Personal health and emotional
    well‑being are also priorities; he intends to attend weekly mindfulness classes to manage his anxiety and to maintain an active lifestyle through regular outdoor activities.
