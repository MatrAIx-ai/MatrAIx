personas:
  professional: Suzanne Blackmon is a meticulous digital collections librarian who leverages her STEM‑honed Python scripting and deep mastery of MARC21 and Dublin Core to build resilient metadata frameworks,
    and their competitive drive pushes them to benchmark best practices across consortia while rigorously vetting vendor solutions for long‑term sustainability.
  sports: Suzanne Blackmon is a devoted member of the Chenango Trail Hikers club who schedules weekly hikes along the River Trail as her primary exercise, supports the New York Knicks as a nostalgic fan,
    and they favor low‑intensity, predictable workouts that neatly fit into their structured weekly routine.
  arts: Suzanne Blackmon immerses herself in classic literature by rereading Jane Austen and Mary Shelley, finds solace in the piano sonatas of Beethoven, and they occasionally attend off‑beat productions
    of Shakespeare at the local community theater, while their small book‑exchange circle introduces them to contemporary historians like Doris Kearns Goodwin.
  travel: Suzanne Blackmon prefers meticulously planned solo trips to historically rich locales—such as a two‑week itinerary through the colonial towns of New England, a curated tour of Bath and Stonehenge
    in England, and a weekend hike in the Adirondacks—balancing their wanderlust with a modest travel budget and limited vacation time.
  culinary: Suzanne Blackmon enjoys cooking seasonal vegetable dishes like roasted heirloom carrots with thyme, hearty lentil stew, and a simple caprese salad using tomatoes from her garden, while they
    remain a self‑taught home cook who occasionally indulges in a slice of New York‑style cheesecake as a rare treat.
  core: Suzanne Blackmon is a detail‑driven, quietly competitive librarian whose love for order, solitary puzzles, and carefully cultivated routines colors every facet of their professional, financial,
    and personal life.
background:
  cultural: Suzanne was raised in a middle‑class, suburban community in upstate New York, the daughter of a high‑school teacher and a civil engineer. Her family emphasized academic achievement, self‑reliance,
    and community service, values that shaped her methodical approach to work. As a white American with deep roots in the region, she identifies with the modest, practical cultural norms of the Northeastern
    United States while also embracing the diverse academic environment of Binghamton. Her professional identity is informed by the library field’s traditions of intellectual freedom, collaborative stewardship
    of information, and a commitment to equitable access, which she balances with her personal preference for structured, small‑scale interactions.
attributes:
  skills: '[''Cataloging (MARC21, RDA)'', ''Metadata schema development (Dublin Core, MODS)'', ''Digital preservation planning'', ''Data analysis and statistical reporting'', ''Python scripting for library
    automation'', ''Digital asset management (CONTENTdm, Fedora)'', ''Information literacy instruction for small groups'', ''Project management for digitization initiatives'', ''Vendor evaluation and contract
    negotiation'']'
  hobbies: '[''Crossword puzzles'', ''Jigsaw puzzles'', ''Vegetable gardening'', ''Reading historical nonfiction and classic literature'', ''Small book‑exchange group'', ''Mindful journaling'', ''Beginner
    yoga'', ''Hiking on local trails (Chenango River Trail)'']'
  career_goals: She aims to become the senior manager of digital collections at a regional research library, leading a multi‑institution digitization consortium that makes local historical media accessible
    online. Over the next five years, Suzanne plans to earn an ALA/MLA certification in Digital Curation, publish research on metadata interoperability, and secure grant funding for a community‑driven open‑access
    repository. She also aspires to mentor junior librarians, establishing a structured professional development program that reflects her values of reliability and structured growth.
