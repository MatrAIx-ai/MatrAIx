  career_goals: Wanda aims to complete her GED within the next year and earn entry‑level IT certifications such as CompTIA A+. She plans to enroll in a community college program for an Associate's degree
    in Computer Information Systems, with the long‑term goal of securing a junior software development or quality assurance role at a tech company in the Seattle area. Over time, she aspires to become a
    product manager focusing on educational technology, ultimately developing tools that help peers organize their study schedules. Her competitive drive pushes her to participate in local hackathons and
    coding competitions to build a strong portfolio.
