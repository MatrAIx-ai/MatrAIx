  hobbies: '[''Chess'', ''Competitive Video Gaming'', ''Running & Weightlifting'', ''Reading Non-Fiction (History & Politics)'', ''Blogging on Current Events'', ''Community Volunteering (Voter Registration)'',
    ''Board Games (Strategic)'', ''Python Coding Projects'']'
  career_goals: Monte aims to attend a top university in the Washington, DC area, majoring in political science, economics, or business with the goal of entering public service or a policy‑focused career.
    He envisions starting as a legislative aide or policy analyst at a think‑tank or federal agency, where he can apply his analytical and organizational strengths. Long‑term, he plans to pursue a JD to
    become a public‑policy lawyer or transition into management consulting that serves government clients. Monte is drawn to roles with clear hierarchies, measurable outcomes, and opportunities for rapid
    achievement, and he is also considering an Army ROTC commission to blend leadership development with disciplined service.
