personas:
  professional: Monte Sallette, an aspiring political science undergraduate, leverages their Excel modeling, data synthesis, and disciplined planning to excel in mock legislative analyses, where their competitive
    drive and skepticism of others' motives sharpen policy briefs and debate performances.
  sports: Monte Sallette trains with the Capital Running Club, lifts at Iron Core Gym, follows the Washington Capitals, Washington Wizards, and DC United, competes in local intramural basketball each spring,
    and integrates disciplined weekly long-distance runs with structured weight-training schedules.
  arts: Monte Sallette admires Lin-Manuel Miranda's narrative craftsmanship in the musical Hamilton, Ken Burns's meticulous documentary storytelling, and actress Viola Davis's compelling performances, often
    weaving these artistic influences into tabletop game nights and blog analyses.
  travel: Monte Sallette maps travel plans in Excel, prefers structured cultural tours over spontaneous trips, has explored the National Mall and historic Annapolis, and dreams of studying policy in London's
    Westminster and hiking the Swiss Alps while budgeting each itinerary to the last dollar.
  culinary: Monte Sallette, a competent home chef, favors protein-rich meals such as grilled chicken breast with quinoa salad seasoned with smoked paprika and garlic, regularly logs macros, enjoys sushi
    rolls and artisan pizza on weekends, and experiments with pre-workout smoothies packed with berries and whey.
  core: Monte Sallette blends razor-sharp organization with a competitive spirit, channeling disciplined routines into politics, data, fitness, and gaming, yet occasionally succumbs to caffeine-fueled late-night
    coding marathons and perfectionist over-analysis.
background:
  cultural: Monte is a white American raised in a middle‑class family in the Washington, DC metropolitan area. His mother is a public‑school teacher and his father works as a civil servant in a federal
    agency, both emphasizing education, routine, and civic responsibility. The household celebrates traditional American holidays such as Thanksgiving and the Fourth of July, while also honoring his European
    ancestry with occasional family gatherings featuring Italian cuisine. Growing up in the capital, Monte has been exposed to a diverse cultural landscape, fostering an appreciation for varied perspectives
    yet maintaining a strong sense of personal discipline and achievement.
attributes:
  skills: '[''Advanced Organizational Planning'', ''Complex Spreadsheet Modeling (Excel)'', ''Research & Data Synthesis'', ''Public Speaking & Debate'', ''Strategic Game Analysis (Chess)'', ''Basic Python
