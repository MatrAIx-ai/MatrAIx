personas:
  professional: Cynthia Wilson is a budding junior naturalist who spends afternoons cataloguing shells and insects in a well-worn sketchbook, turning their practical curiosity and competitive spirit into
    early science projects that hint at future ambitions in wildlife research.
  sports: Cynthia Wilson is a lively member of the Lafourche Kids Soccer Club, loves swimming laps at the community pool each summer, cheers for the New Orleans Saints during football season, and they approach
    fitness with a competitive edge, often challenging friends to goal-scoring contests.
  arts: Cynthia Wilson shines in the church choir, lifting gospel classics by Mahalia Jackson, twirls to zydeco beats from Clifton Chenier at family gatherings, sketches turtles and dragonflies in a well-worn
    sketchbook, and they craft colorful bead bracelets, drawing inspiration from the rhythmic pulse of their bayou community.
  travel: Cynthia Wilson prefers short, well-planned road trips with their mom, often heading to the nearby Gulf Coast beaches of Grand Isle, the bustling French Quarter of New Orleans, and school field
    trips to the Audubon Zoo, while they dream of future adventures to the Everglades and a Disney World vacation.
  culinary: Cynthia Wilson delights in helping mom stir jambalaya seasoned with cayenne and thyme, loves the buttery crunch of cornbread, enjoys tasting gumbo brimming with okra and shrimp, and they boast
    a budding ability to roll simple spring rolls using rice paper and fresh veggies.
  core: Cynthia Wilson is a spirited nine-year-old who balances a love for structured science projects with a spontaneous zest for soccer, gospel singing, and the colorful rhythms of their bayou community.
background:
  cultural: Cynthia grows up in Cut Off, a close‑knit part of Lafourche Parish, where her Black Southern heritage blends with the rich Cajun and Creole traditions of the region. Family and church play central
    roles in her life; Sunday services feature gospel music, and community celebrations often include zydeco dancing and potluck meals featuring jambalaya, gumbo, and cornbread. Stories of resilience and
    communal support are passed down through generations, shaping her strong sense of identity and her appreciation for both the natural bayou environment and the vibrant cultural rhythms of her hometown.
