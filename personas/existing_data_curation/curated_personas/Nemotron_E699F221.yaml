  career_goals: Cynthia dreams of a future where she can combine her love for animals, the outdoors, and helping others. She hopes to become a wildlife conservationist or marine biologist, studying the
    bayous and Gulf ecosystems near her hometown, while also envisioning herself as a teacher who can inspire younger kids with hands‑on science lessons. Her competitive spirit drives her to aim for leadership
    roles, such as a team captain in sports or a class representative, all while staying grounded in the community values she cherishes.
