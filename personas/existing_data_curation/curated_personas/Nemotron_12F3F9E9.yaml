  career_goals: Jayantibhai aspires to pursue a career that blends his love for structure, problem‑solving, and community service. He dreams of becoming a civil engineer who designs safe, sustainable infrastructure
    for neighborhoods like his own in Queens, with a particular interest in green building and disaster‑resilient design. He is also drawn to software development, hoping to create apps that help students
    manage their schedules and reduce stress. In the longer term, he envisions taking on a leadership role in community programs that mentor younger children and promote cultural exchange, using his organizational
    strengths to build supportive networks.
