personas:
  professional: Dorothy Robinson leverages over two decades of hands‑on facilities and commercial cleaning expertise to drive eco‑friendly floor‑care protocols, and they channel their competitive edge into
    streamlining crew schedules and advancing toward a lead custodian role.
  sports: Dorothy Robinson enjoys early morning jogs through the city’s greenways, follows the Charlotte Hornets and Carolina Panthers fervently, and they belong to a local pickleball league that meets
    at the community recreation center every Saturday.
  arts: Dorothy Robinson frequents the Mint Museum and neighborhood galleries, immerses themselves in the brushstrokes of Georgia O'Keeffe and the vibrant murals of local artist Sam Rivers, and they translate
    that inspiration into watercolor sketches and street‑photography with a vintage Leica.
  travel: Dorothy Robinson prefers carefully planned weekend getaways to art‑rich destinations like Asheville’s Biltmore Estate or Paris’s Musée d’Orsay, and they balance a love for quiet garden walks with
    occasional adventurous hikes in New Zealand’s Fiordland, all while budgeting around family commitments.
  culinary: Dorothy Robinson experiments in the kitchen with seasonal ingredients harvested from their backyard, mastering dishes such as heirloom tomato ratatouille, miso‑glazed salmon with bok choy, and
    lavender‑infused shortbread, and they relish the solitary joy of plating each creation like a piece of visual art.
  core: Dorothy Robinson blends a meticulous cleaning craft with an artistic soul, obsessively tracking expenses, wrestling with anxiety, and they find solace in solitary garden walks and spontaneous watercolor
    bursts.
background:
  cultural: Dorothy grew up in a modest, middle‑class white family in the Carolinas, absorbing Southern values of modesty, self‑reliance, and a strong work ethic. Living in Charlotte’s Mecklenburg County,
    she enjoys the city’s blend of traditional Southern hospitality and growing cultural diversity, which informs her appreciation for local art scenes and community events. Her upbringing emphasized practicality
    and resilience, shaping her competitive yet diligent approach to work. Married with a supportive partner, Dorothy balances her professional responsibilities with a quiet home life that includes weekend
    trips to regional farms and participation in a small, close‑knit church community, reflecting a blend of Southern tradition and contemporary personal interests.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip‑mop‑wax, carpet maintenance)'', ''Health and safety compliance (OSHA)'', ''Inventory management'', ''Basic building maintenance (minor repairs, painting)'',
    ''Team supervision'', ''Time management'', ''Attention to detail'', ''Budget tracking'', ''Eco‑friendly cleaning practices'', ''Customer service for small groups'']'
  hobbies: '[''Visiting art galleries and museums'', ''Photography (urban and nature)'', ''Sketching and watercolor painting'', ''Reading nonfiction on psychology and self‑improvement'', ''Gardening'',
    ''Cooking experimental recipes'', ''Walking in local parks'', ''Attending community theater'', ''Listening to podcasts about sustainability'', ''Journaling for stress management'']'
  career_goals: Dorothy aims to move into a supervisory role within facilities management, seeking a lead custodian or facilities coordinator position that allows her to implement streamlined cleaning protocols
    and sustainability initiatives. She plans to complete her associate degree in facilities management, building on her some‑college coursework, to qualify for higher‑responsibility roles. In the longer
    term, Dorothy envisions launching her own small cleaning business that emphasizes environmentally safe practices and offers tailored services to boutique office spaces and art galleries, merging her
    professional expertise with her passion for the arts. Financial stability and a reduced stress environment for her family are central to her ambition, prompting her to seek roles with predictable schedules
    and clear advancement pathways.
