personas:
  professional: Minh Ligad is a budding Python coder who spends after‑school hours designing simple games, channeling their methodical planning and love of routine into every line of code while eagerly
    sharing prototypes with teammates during collaborative sessions.
  sports: Minh Ligad trains twice weekly with the Eastside Tigers youth soccer squad, follows Manchester United’s Premier League matches religiously, and hones disciplined kicks and forms in Vovinam classes,
    treating every practice as a competitive benchmark for personal improvement.
  arts: Minh Ligad builds intricate LEGO dioramas after school, finds inspiration in the pixel art of classic Nintendo titles, and unwinds listening to Ludovico Einaudi’s piano pieces while occasionally
    humming the theme from The Legend of Zelda, all of which shape their creative outlook.
  travel: Minh Ligad prefers meticulously planned weekend getaways to nearby nature reserves like Redwood National Park and day trips to historic waterfront towns, while dreaming of a future spring adventure
    to Tokyo’s cherry‑blossom festivals, balancing family budget limits with a thirst for cultural immersion.
  culinary: Minh Ligad assists with family meals by expertly rolling spring rolls filled with shrimp, rice noodles, and fresh herbs, and simmering aromatic pho broth seasoned with star anise and fish sauce,
    developing a solid home‑cooking skill set while favoring bold flavors like lime, basil, and chili.
  core: Minh Ligad is a routine‑driven, socially energetic teen who blends disciplined soccer drills and Vovinam training with a competitive streak in gaming, all while juggling meticulous schoolwork, LEGO
    creations, and a disciplined pocket‑money plan.
background:
  cultural: Minh is a second‑generation Vietnamese‑American born and raised in Tulsa, Oklahoma. His parents immigrated from Vietnam after the war and maintain a bilingual household where Vietnamese language
    and customs are central. The family celebrates Tet (Lunar New Year) and the Mid‑Autumn Festival with traditional foods, decorations, and community gatherings. Emphasis on education, respect for elders,
    and modesty are core family values. Minh participates in a local Vietnamese cultural club at school, where he shares his heritage with peers while also navigating mainstream American teenage life.
