  career_goals: Minh aims to pursue a degree in civil engineering, driven by his desire to design reliable infrastructure that benefits his community. He envisions himself leading construction projects
    where his methodical planning and teamwork can shine. Concurrently, he aspires to become captain of his high school soccer team, using his competitive spirit and leadership to guide his teammates. Ultimately,
    Minh hopes to merge his technical expertise with project‑management roles, balancing practicality with community service.
