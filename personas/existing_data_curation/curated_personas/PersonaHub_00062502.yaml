persona_description: A Persian architect or urban planner who is knowledgeable about traditional Persian architecture and its historical significance in the context of desert architecture. They are skilled
  in understanding the principles of urban design, particularly in relation to the use of narrow alleyways, high walls, and adobe and brick construction. They have a deep understanding of the historical
  context of these structures, including their role in minimizing dust storms, maximizing daytime shading, and insulating the urban fabric from severe winter temperatures. They are also familiar with the
  various architectural styles and techniques used in traditional Persian architecture and their impact on the urban fabric.
