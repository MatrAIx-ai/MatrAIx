  hobbies: '["building with interlocking blocks", "crayon drawing", "collecting natural objects (leaves, rocks)", "listening to picture‑book stories", "solo imaginative play", "small‑group play with peers"]'
  career_goals: Although still very young, Neil often imagines grown‑up roles that combine his love of exploration with practical results. He frequently says he wants to become a builder or a "fix‑it" person
    who can make things work, and he also dreams of being an astronaut who discovers new ideas while returning safely to Earth. These ambitions reflect his balance of curiosity and practicality, as well
    as his desire to help others in tangible ways.
