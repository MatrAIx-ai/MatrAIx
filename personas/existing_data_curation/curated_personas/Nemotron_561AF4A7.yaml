personas:
  professional: Neil Thomas, a budding builder who stacks and deconstructs Lego towers with quiet curiosity, blends a practical eye for stability with a love for trying out new block configurations, all
    while preferring the flexibility of free play over rigid schedules.
  sports: Neil Thomas, an energetic member of the Tiny Tumble Tots soccer club who loves sprinting after the orange ball at the local park, cheers for the New York Yankees on TV, and prefers small‑group
    games over large crowds, often mixing up his soccer cleats with his sand‑filled shoes after a beach outing.
  arts: Neil Thomas, who hums along to The Wiggles' 'Fruit Salad', giggles at Sesame Street characters, enjoys finger‑painting while listening to Raffi's 'Baby Beluga', and treats story‑time with picture
    books as a mini‑performance, shaping his identity through simple, colorful creative expression.
  travel: Neil Thomas, who has delighted in family trips to the nearby zoo, a sunny weekend at the beach in San Diego, and a short drive to the Grand Canyon’s rim, now dreams of someday seeing the Eiffel
    Tower and the Great Wall of China, while his itinerary planning remains spontaneous and largely driven by parental suggestion.
  culinary: Neil Thomas, who adores mac and cheese with a generous sprinkle of cheddar, loves banana slices dipped in peanut butter, proudly helps stir batter for homemade pancakes, and occasionally refuses
    green peas, showcasing a budding palate that favors simple, familiar flavors with occasional adventurous bites.
  core: Neil Thomas blends a quiet curiosity with a spontaneous love for sticker hoarding, occasional stubbornness at doctor visits, and a playful insistence on building block towers that wobble just enough
    to keep him engaged.
background:
  cultural: Neil is a White American child raised in Columbus, Ohio, within a Midwestern environment that values community, practicality, and personal space. His family participates in local neighborhood
    events, attends a preschool that emphasizes cooperative learning, and celebrates common American holidays. This setting provides him with a blend of mainstream U.S. cultural norms and the quieter, family‑oriented
    atmosphere typical of the region.
attributes:
  skills: '["basic verbal communication", "color and shape identification", "block stacking", "simple counting (1‑10)", "basic problem solving", "fine‑motor coordination (crayon drawing, puzzle assembly)",
