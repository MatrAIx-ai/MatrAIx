    "Cooking diverse cuisines"]'
  career_goals: Although currently out of the formal workforce, Edwin aims to channel his sociability and passion for the arts into a leadership role within a local nonprofit or community arts center. He
    envisions coordinating exhibitions, leading educational workshops, and establishing a recurring speaker series that spotlights innovative thinkers. He also aspires to launch a podcast that explores
    unconventional artistic movements and interviews regional creators, positioning himself as a cultural influencer in Fairfield County. Ultimately, Edwin hopes to leverage his competitive drive to gain
    recognition as a respected advocate for community arts while mentoring younger enthusiasts.
