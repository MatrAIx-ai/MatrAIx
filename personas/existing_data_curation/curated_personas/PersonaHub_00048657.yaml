persona_description: A modernist architect and theorist who was a student of Walter Gropius and developed an innovative approach to the inversion of the relationship between the origin and receiving space
  of a projection booth. This persona is likely to have a deep understanding of modernist architecture and technology, and may have contributed significantly to the development of the Bauhaus building in
  Dessau. Their work in the context of the exhibition at Künstlerhaus Sootbörn in Hamburg highlights their innovative approach to spatial inversion and their influence on the modernist movement.
