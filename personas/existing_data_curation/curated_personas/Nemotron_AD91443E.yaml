  career_goals: Even at 87, Hoi Wan aims to continue contributing his educational expertise by mentoring younger teachers and volunteering as a reading tutor for immigrant children. He is working on a memoir
    that captures his life story and family history, hoping to preserve cultural heritage for his grandchildren. He aspires to serve as a cultural ambassador within the West Islip Chinese community, organizing
    small‑group workshops on calligraphy and language. Maintaining mental sharpness is a priority, so he attends lectures on educational theory and Eastern philosophy at the local senior center. Additionally,
    he seeks to ensure a stable, organized home environment for his wife, supporting her health and wellbeing through careful planning and routine.
