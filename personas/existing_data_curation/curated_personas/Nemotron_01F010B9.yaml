  career_goals: Ernesto aims to advance to a senior HR leadership role within the next five years, targeting positions such as HR Manager or HR Business Partner at a mid‑sized tech firm in the Seattle metropolitan
    area. He plans to obtain the SHRM‑CP certification, followed by SHRM‑SCP, and deepen his expertise in data‑driven people analytics to inform strategic decisions. Long‑term, he aspires to become Director
    of People, leading organization‑wide culture initiatives that balance employee well‑being with business performance, while maintaining a structured, compassionate approach. He also hopes to mentor junior
    HR professionals, champion inclusive workplace practices, and develop flexible work policies that support employees' work‑life balance without compromising organizational goals.
