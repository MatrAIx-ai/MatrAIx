  hobbies: '[''Visiting art museums'', ''Playing piano'', ''Reading philosophy and literature'', ''Hiking Minnesota state trails'', ''Photography'', ''Participating in book clubs'', ''Exploring new cuisines'',
    ''Attending cultural lectures'', ''Volunteering with community theater'', ''Integrating arts into worship'']'
  career_goals: Joseph aims to expand his congregation’s impact by establishing a church‑affiliated arts and cultural center that serves both worshippers and the broader Minneapolis community. He plans
    to pursue a Master of Divinity to deepen his scholarly work and eventually teach at a regional seminary. Long‑term, he envisions leading a network of progressive churches focused on social justice,
    mental‑health outreach, and innovative worship experiences, while authoring a book on integrating art and spirituality in contemporary ministry.
