  hobbies: '[''Woodworking Projects'',''Fishing'',''Gardening'',''Listening to Soul and Gospel Music'',''Attending Local Sports Events'',''Mentoring Youth in Carpentry Workshops'',''Model Train Building'',''Cooking
    Southern Comfort Dishes'']'
  career_goals: Robert aims to transition from full-time contracting to running a small boutique workshop where he can design and produce high-quality bespoke pieces. He wants to mentor a couple of apprentices,
    passing on his trade knowledge while building a reputation for sustainable, reclaimed-material projects. Over the next five years he plans to secure a stable retirement income by expanding a side line
    of selling finished furniture online and by consulting for local home-building firms. He also hopes to contribute to community development by offering free woodworking classes at the local community
    center.
