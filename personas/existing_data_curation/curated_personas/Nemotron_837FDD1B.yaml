personas:
  professional: Robert Tanner, a veteran carpenter with over three decades of experience, blends meticulous blueprint reading and crew supervision with a relaxed approach to deadlines, allowing them to
    craft bespoke reclaimed-material furniture while mentoring apprentices in the boutique workshop they plan to launch.
  sports: Robert Tanner follows the Riverside Raiders, the local high school football team, attends Friday night games with apprentices, supports the regional college Bulldogs, spends leisurely weekends
    fishing at Lake Willow—a low-key cardio session—and they maintain a membership in the community senior softball league.
  arts: Robert Tanner is an avid listener of soul and gospel legends such as Aretha Franklin, Marvin Gaye, and Kirk Franklin, regularly attends Sunday services where the choir’s harmonies inspire their
    woodworking rhythm, and spends quiet evenings curating vinyl collections while occasionally sketching designs for detailed model train layouts, which they view as an extension of their craft.
  travel: Robert Tanner prefers road-trip adventures that blend work and leisure—having driven the Blue Ridge Parkway to study historic timber framing in Asheville, exploring Charleston’s historic districts,
    and dreaming of a future cabin retreat in the Adirondacks where they can fish, garden, and craft furniture away from the bustle—but they balance these trips with retirement budgeting and family commitments.
  culinary: Robert Tanner loves cooking Southern comfort fare—slow-cook pulled pork, buttery cornbread, collard greens seasoned with smoked ham hocks, and peach cobbler—using fresh herbs from their garden
    and occasionally experimenting with smoked trout from lake catches, though their habit of over-salting dishes sometimes forces family members to reach for water.
  core: Robert Tanner is a seasoned carpenter who harmonizes a love for reclaimed-wood craftsmanship, soulful gospel tunes, and community mentorship, navigating life with structured expertise tempered by
    laid-back flexibility and a tendency to splurge on premium tools, which they proudly showcase in their workshop.
background:
  cultural: Robert is an African American who grew up in the Dallas-Fort Worth metroplex of Texas. His upbringing was shaped by Southern hospitality, strong church involvement, and the rich tradition of
    Black artisans emphasizing craftsmanship and community service. He values family connections, celebrates African American cultural events such as Juneteenth, and draws inspiration from gospel music,
    soul artists, and the legacy of Black craftsmanship in woodworking. His cultural identity informs his commitment to mentorship, community volunteerism, and preserving heritage through historic home
    restoration.
