  career_goals: In the short term, Michael aims to complete his GED and obtain a certification in call‑center management to strengthen his qualifications. He seeks a promotion to senior representative and
    eventually a team‑lead position within his current organization, where he can mentor new hires and shape workflow processes. Long‑term, he envisions moving into operations management for a regional
    call center or launching his own small business—such as a local coffee shop or convenience store—in Shelbyville, providing both financial stability and a rooted presence in his community. Throughout
    his career progression, Michael values structured advancement pathways while maintaining enough flexibility to adapt to evolving opportunities.
