  hobbies: '[''Reading graphic novels'', ''Journaling'', ''Digital illustration'', ''Coding simple games in Python'', ''Puzzle solving (crosswords, Sudoku)'', ''Playing piano'', ''Online chess'', ''Watching
    documentaries on science and Black history'']'
  career_goals: Beryl aspires to pursue a career that blends her love for structure, technology, and solitary work. She hopes to become a software developer or data analyst, focusing on creating accessible
    tools that help people manage information. She also considers a future in library and information science, envisioning a role as a digital archivist where she can preserve cultural histories. In the
    longer term, she wants to use her technical skills to develop mental‑health resources for other teens facing anxiety.
