personas:
  professional: Beryl Tuckertaylor, an aspiring game developer and digital illustrator, blends methodical coding of simple Python games with disciplined journaling, allowing their quiet, structured mindset
    to produce polished indie‑style projects despite a tendency toward anxiety.
  sports: Beryl Tuckertaylor, who prefers low‑key physical activity, joins a local after‑school running club for weekend jogs, practices yoga at home to calm anxiety, follows the Los Angeles Lakers for
    basketball inspiration, and occasionally participates in school‑organized intramural soccer despite a realistic view of stamina.
  arts: Beryl Tuckertaylor, an avid sketcher and digital painter, draws inspiration from graphic novelists like Raina Telgemeier and Noelle Stevenson, studies the minimalist piano works of Ludovico Einaudi,
    and enjoys the storytelling of filmmaker Ava DuVernay, while spending evenings replaying pieces by Debussy to unwind.
  travel: Beryl Tuckertaylor, who prefers meticulously planned trips, cherishes memories of a family road‑trip to Yellowstone National Park and a weekend visit to the local science museum, and dreams of
    exploring Kyoto’s historic temples and the vibrant streets of London’s Camden Market, all while budgeting their allowance for future travel.
  culinary: Beryl Tuckertaylor, an emerging home‑chef with a modest skill set, loves whipping up avocado toast topped with cherry tomatoes and feta, perfecting a simple ramen bowl with miso paste, soft‑boiled
    eggs, and sliced pork, and treats themselves to homemade chocolate chip cookies after long coding sessions, though they often forget to clean the kitchen promptly.
  core: Beryl Tuckertaylor, a quiet, puzzle‑loving teen who journals every feeling, crafts digital art in solitude, yet frequently over‑analyzes social invitations and leaves a trail of half‑finished snack
    experiments on the kitchen counter.
background:
  cultural: Beryl is an African-American teen growing up in the vibrant, multicultural community of Minneapolis. Her family traces its roots to the Great Migration, and she has been raised with stories
    of resilience and cultural pride. She celebrates traditions such as Juneteenth, Kwanzaa, and Black History Month, and participates in community events at the local African American cultural center.
    The city's strong arts scene and access to libraries have nurtured her interest in literature and digital media. While she values her cultural heritage, Beryl also navigates the experience of being
    a Black student in a predominantly white school district, which informs her perspective and fuels her desire to create inclusive technology.
