    gatherings)"]'
  career_goals: William aims to advance from an entry‑level management analyst to a senior analyst role within the next three to five years, eventually leading a small team that focuses on data‑informed
    policy for regional development and tribal affairs. He plans to earn a certification in Business Analytics (CBAP) and pursue a master's degree in Public Administration or Business Analytics to deepen
    his expertise. Long‑term, he hopes to become a strategic advisor who bridges government initiatives with the interests of his Native community, ensuring data solutions respect cultural values and promote
    sustainable economic opportunities.
