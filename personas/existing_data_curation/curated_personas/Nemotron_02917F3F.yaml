personas:
  professional: An aspiring teen game developer, Adrian Mosby blends coding small games with digital art, using their curiosity‑driven yet pragmatic mindset to iterate quickly while keeping project deadlines,
    and often leads school hackathons with a balanced mix of organization and creative flexibility.
  sports: A dedicated midfielder for the Riverside Youth Soccer Club, Adrian Mosby trains five days a week, follows the LA Galaxy and Manchester United for tactical inspiration, and treats the summer track
    season as a chance to improve endurance, while also participating in local LEGO‑built obstacle courses for fun.
  arts: A digital art enthusiast, Adrian Mosby draws inspiration from pixel‑artist Paul Robertson and the surreal installations of Refik Anadol, spends weekends recreating scenes from sci‑fi novels in Blender,
    and swears by listening to the synth‑pop sounds of Daft Punk while building LEGO sculptures.
  travel: A budding explorer, Adrian Mosby prefers structured family road trips to nearby historic sites like Santa Fe, dreams of attending Japan’s Tech Expo in Tokyo for inspiration, and keeps a scrapbook
    of passport stamps from a weekend visit to Mexico City, where they tasted authentic street tacos.
  culinary: A kitchen apprentice, Adrian Mosby masters the balance of sweet and smoky by preparing tacos al pastor with pineapple and chipotle, crafts tamales wrapped in corn husks, and experiments with
    homemade pizza topped with fresh cilantro and mozzarella, though they often forget to pre‑heat the oven.
  core: Adrian Mosby is a methodical teen who juggles code, soccer, and LEGO with a habit of over‑organizing schedules while secretly hoarding extra candy for late‑night gaming marathons.
background:
  cultural: Adrian is a first-generation Mexican-American raised in Munster, Indiana. His parents emigrated from Guadalajara, and the household blends Mexican traditions with Midwestern values. Spanish
    is spoken at home, and family gatherings often feature celebrations of Dia de los Muertos, quinceanera planning, and the weekly preparation of homemade mole and tamales. At school, Adrian participates
    in the Latino cultural club, where he shares stories, music, and recipes with peers. The multicultural environment of Lake County, combined with his family's emphasis on hard work and community, has
    shaped his identity, giving him a strong sense of pride in his heritage while also fostering an ability to navigate the broader American culture.
