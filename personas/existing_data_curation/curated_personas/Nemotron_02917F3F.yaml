  hobbies: '[''Coding simple games (Scratch, Python)'', ''Digital illustration'', ''Soccer'', ''LEGO Technic building'', ''Cooking Mexican cuisine'', ''Reading science-fiction'', ''Watching engineering
    documentaries'']'
  career_goals: Adrian aims to channel his curiosity and practical mindset into a career in robotics or mechanical engineering. He plans to enroll in a strong STEM program at a university such as Purdue
    or the University of Michigan, where he can deepen his coding and hardware skills. Ultimately, he hopes to design affordable, community-focused robotics solutions that could help local farms or small
    businesses in Indiana. He also envisions mentoring younger students, especially those from bilingual backgrounds, by running after-school STEM clubs that blend his love for technology with his commitment
    to cultural representation.
