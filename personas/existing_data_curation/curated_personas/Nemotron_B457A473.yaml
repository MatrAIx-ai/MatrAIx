personas:
  professional: Roi Miah is a budding block architect who spends hours arranging colored building bricks into predictable towers, they show a practical focus on immediate structures while their relaxed
    attitude toward cleaning up reveals a flexible, unstructured play style.
  sports: Roi Miah joins the local preschool soccer club on Tuesdays, they idolize the neighborhood junior team the Ravens but prefer the structured rhythm of sandbox sandcastle building over competitive
    play, occasionally pouting when a teammate takes the ball.
  arts: Roi Miah loves drawing vivid pictures of dinosaurs and frequently sings along to the playful tunes of “Baby Shark” and “Twinkle Twinkle Little Star,” they channel the imaginative spark of their
    favorite cartoon character, Bluey, into colorful creations.
  travel: Roi Miah has explored the family’s nearby beach at Oceanview Cove, they delighted in building sandcastles and now dream of a future trip to Disney World’s Magic Kingdom, preferring short, familiar
    journeys over long, unpredictable adventures.
  culinary: Roi Miah’s favorite dish is cheesy macaroni with crunchy breadcrumbs, they happily mash banana slices into peanut‑butter toast yet stubbornly refuse broccoli, opting for comfort foods that feel
    predictable and safe.
  core: Roi Miah is a three‑year‑old bundle of structured play and emotional swings, they love perfect block towers and cling to a blanket, revealing a delicate balance between predictability and heart‑on‑sleeve
    intensity.
background:
  cultural: Roi comes from a South Asian family that migrated to the United States and settled in West Roxbury, MA. At home, he is exposed to both English and a South Asian language (such as Bengali or
