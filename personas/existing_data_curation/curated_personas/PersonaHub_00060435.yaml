persona_description: A nuclear power industry expert who is interested in understanding and managing materials degradation in nuclear reactors. They are knowledgeable about the Advanced Instrumentation,
  Information, and Control (II&C) Systems Technologies pathway of the Light Water Reactor Sustainability (LWRS) Program and have experience with non-destructive evaluation (NDE) methods for cables, concrete,
  reactor pressure vessel, and piping. They are interested in the safety margin management for light water reactors and are familiar with the challenges associated with aging and mitigation of weld residual
  stresses and repair of highly irradiated materials. They are also interested in the development of a systematic knowledge base for the thermal aging behavior of cast stainless steels (CASSs) within a
  limited time of five years.
