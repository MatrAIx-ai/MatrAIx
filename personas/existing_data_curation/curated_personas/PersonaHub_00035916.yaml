persona_description: A researcher in the field of infectious diseases, particularly focusing on the role of autophagy in antiviral defense against herpes simplex virus. This persona is interested in the
  mechanisms by which autophagy protects neurons from viral infections and how it can be applied to prevent herpes virus infections in the clinic. They are likely to be familiar with the research of Akiko
  Iwasaki at Yale University School of Medicine and her colleagues, and have a strong background in immunology, virology, and cell biology.
