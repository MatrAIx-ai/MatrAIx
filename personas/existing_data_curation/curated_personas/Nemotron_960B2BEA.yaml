  hobbies: '[''Reading historical fiction and maritime history'', ''Cooking Rhode Island seafood recipes'', ''Coastal hiking and beach walks'', ''Crocheting (handmade scarves, blankets)'', ''Small‑group
    dinner gatherings'', ''Kayaking outings'', ''Attending folk‑music sessions'', ''Visiting historic mansions'']'
  career_goals: In the near term, Elizabeth aims to formalize her on‑the‑job expertise with a Lean Six Sigma Green Belt certification and to take on a supervisory role on her current shift. Over the next
    five years she hopes to progress to a Production Team Lead position, where she can guide process‑improvement projects and mentor a small crew. Ultimately, she envisions moving into a production planning
    or operations analyst role that blends her hands‑on knowledge with data‑driven decision‑making, potentially complemented by an associate’s degree in Operations Management. While she values the stability
    of a steady production career, she also wants occasional opportunities to explore new departments or take short‑term assignments that break routine and expand her skill set.
