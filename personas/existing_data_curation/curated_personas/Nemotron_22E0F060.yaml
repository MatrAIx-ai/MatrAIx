  career_goals: Jenna aims to shift from a senior assembler to a supervisory role within the next three years, targeting a shift‑leader position that will let her formalize her process‑improvement initiatives
    and mentor larger teams. She plans to earn a NICET Level III certification and enroll in a part‑time bachelor’s program in Electrical Engineering Technology to deepen her theoretical knowledge. Long‑term,
    Jenna envisions moving into a production‑manager capacity where she can blend her technical expertise with strategic planning, drive lean‑manufacturing projects, and champion a culture of continuous
    learning. Parallel to her professional aspirations, she dreams of launching a weekend side business that creates DIY electronic art kits for schools and community makerspaces, merging her love of electronics
    with her passion for creative expression. Balancing these ambitions, Jenna is committed to developing stronger stress‑management habits—such as regular yoga and mindfulness practice—to sustain her well‑being
    while pursuing career growth.
