persona_description: A researcher or academic who studies the interaction between human bodies and digital technologies, particularly focusing on infants and young children. They are interested in the ways
  in which these technologies shape and are shaped by the bodies of these children, and how this interaction generates new knowledges and practices. They are likely to be familiar with literature from sociocultural
  theorising of the body, childhood, digital technologies, and big data, and they use the sociomaterial perspective to understand the complex relationship between bodies and technologies. They are interested
  in the development of infants and young children's bodies through the use of digital technologies, and how this interaction influences their development and well-being. They may also be interested in
  the ethical implications of these interactions, particularly in relation to privacy, data privacy, and the potential for abuse or exploitation.
