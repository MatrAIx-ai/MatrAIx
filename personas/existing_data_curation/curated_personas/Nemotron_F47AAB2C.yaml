  career_goals: Nhung aims to transition from his current inactivity into a stable mid‑level operations or supply‑chain management position with a logistics or agri‑business firm in the Central Valley within
    the next two years. To boost his competitiveness, he plans to earn a PMP certification and a Lean Six Sigma Green Belt. In the longer term, he envisions launching a family‑run specialty grocery and
    prepared‑food venture that highlights Vietnamese and Filipino cuisine, providing both financial security for his wife and a cultural hub for the local immigrant community. His ambition is driven by
    a desire for measurable results, disciplined performance, and long‑term stability.
