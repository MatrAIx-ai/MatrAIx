  hobbies: '[''Visiting art galleries and museums'', ''Painting (watercolors, acrylics)'', ''Ceramic crafting'', ''Photography (urban and cultural subjects)'', ''Cooking traditional Cuban dishes and experimenting
    with fusion recipes'', ''Gardening (herbs and tropical plants)'', ''Reading Cuban literature and cultural history'', ''Volunteering at local cultural festivals and community events'']'
  career_goals: Vanessa aims to formalize her knowledge by earning a GED and enrolling in adult‑education courses focused on culinary arts and visual arts. She hopes to launch a small home‑based catering
    service that showcases modern twists on classic Cuban dishes, while also offering occasional art workshops for seniors and youth in her neighborhood. Additionally, she seeks a leadership role in the
    annual Cuban heritage festival in Miami, using her organizational skills to expand its reach and foster intergenerational exchange. In the long term, she envisions becoming a cultural liaison who connects
    local institutions with the Cuban diaspora, preserving stories and traditions for future generations.
