personas:
  professional: Vanessa Maya, a community event coordinator with bilingual translation expertise, leverages their meticulous planning and flexible creativity to orchestrate cultural festivals while eyeing
    a home‑based catering venture.
  sports: Vanessa Maya enjoys staying active through a weekly membership in the Little Havana Seniors Walking Club, follows the Miami Heat for basketball thrills, and participates in a community salsa‑dance
    fitness class each Thursday, combining low‑impact cardio with lively social exercise.
  arts: Vanessa Maya immerses themselves in Miami’s art scene, collecting limited‑edition prints by Romero Britto, attending vibrant mural openings by Kongo, and channeling an appreciation for poetry from
    their family’s island roots into delicate watercolor landscapes and handcrafted ceramics.
  travel: Vanessa Maya prefers carefully planned cultural pilgrimages, having spent months researching trips that took them to Havana’s historic plazas, Barcelona’s art‑filled streets, and the tranquil
    Bahamian islands, and they now dream of a future pilgrimage to San Juan, Puerto Rico to study colonial architecture.
  culinary: Vanessa Maya, a seasoned home chef, perfects classic dishes from their family’s island roots—such as slow‑cooked pork stew and black‑bean soup—while infusing them with roasted poblano‑pepper
    purée, fresh cilantro, and a hint of orange‑marinated pork, delighting friends at balcony‑garden dinner parties that showcase both tradition and experimental fusion.
  core: Vanessa Maya blends cultural stewardship with entrepreneurial curiosity, balancing meticulous organization and spontaneous creativity, while occasionally procrastinating on paperwork and obsessively
    double‑checking recipes before sharing them.
background:
  cultural: Vanessa Maya was born and raised in Miami to parents who emigrated from Cuba during the 1970s. Growing up in a close‑knit Cuban enclave, she learned to speak Spanish at home while attending
    English‑language schools, giving her a bicultural perspective. Family gatherings were anchored by music—son, salsa, and trova—and home‑cooked meals that celebrated Cuban culinary heritage. The diaspora
    experience taught her the value of preserving cultural identity while adapting to American life. She participates in community celebrations such as Carnaval Miami and the annual Cuban Heritage Parade,
    and she actively works to keep Cuban stories, recipes, and artistic expressions alive for younger generations.
attributes:
  skills: '[''Bilingual Spanish/English communication'', ''Traditional Cuban cooking'', ''Fusion cuisine experimentation'', ''Painting and ceramics'', ''Photography'', ''Community event planning and coordination'',
