  career_goals: Yanet aims to advance to a Director of Operations role within the next five years, while completing a bachelor’s degree in Business Administration to deepen her strategic expertise. She
    is passionate about designing structured employee wellness programs that address anxiety and stress, drawing on her personal experiences to shape supportive policies. In the long term, she envisions
    launching a consulting practice that helps small and mid‑size Texas firms create resilient, culturally inclusive operations, integrating efficiency with employee well‑being.
