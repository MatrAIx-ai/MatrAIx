personas:
  professional: Tiffany Dunlap, a retired homemaker turned senior‑center coordinator, they leverage decades of budgeting, meal‑planning, and home‑repair expertise to organize low‑key workshops that blend
    practical life skills with nostalgic storytelling, balancing cautious curiosity about new technologies with steadfast reliability.
  sports: Tiffany Dunlap, a loyal fan of the Detroit Tigers, Lions, and Red Wings, they attend occasional games with friends, belong to a senior walking club that meets thrice weekly at the local park,
    and prefer gentle gardening and light stretching over competitive sports.
  arts: Tiffany Dunlap, an enthusiastic listener of Ella Fitzgerald, Glenn Miller, and The Beatles, they spend evenings knitting while classic swing fills the room, attend community‑theater matinees of
    historic dramas, and lose themselves in historical novels by Ken Follett and local Dearborn histories, letting music and literature shape their identity.
  travel: Tiffany Dunlap, who favors relaxed, well‑planned road trips over spontaneous adventures, they have explored Mackinac Island and Saugatuck, enjoy weekend drives along Lake Michigan’s shoreline,
    and dream of a gentle cruise through England’s countryside to see the castles that echo the historical novels they cherish.
  culinary: Tiffany Dunlap, an adept Midwestern cook, they perfect chicken pot pie with a flaky crust, simmer hearty beef stew seasoned with home‑grown rosemary and thyme, bake golden cornbread, and lovingly
    preserve strawberries into jam for tea time, often pairing meals with classic soda pop from the local diner.
  core: Tiffany Dunlap, a cautious yet curious retiree who clings to tidy budgets, cherishes nostalgic music, worries about every detail, and habitually misplaces their glasses while knitting.
background:
  cultural: Tiffany is a White Midwestern American who grew up in Dearborn, Michigan, amid the post‑war automotive boom. Her upbringing reflects the modest, self‑reliant values of the region, with strong
    ties to a local Protestant (or Catholic) community that emphasizes service and responsibility. She has lived through significant social changes, from the civil‑rights era to the digital age, which has
    fostered a balanced respect for tradition and a cautious curiosity about new ideas.
attributes:
  skills: '[''Home management and budgeting'', ''Cooking traditional Midwestern dishes'', ''Knitting and crocheting'', ''Gardening'', ''Senior‑friendly technology use'', ''Community volunteer coordination'',
    ''Storytelling and oral history preservation'', ''Basic first aid'']'
  hobbies: '[''Reading historical fiction'', ''Knitting scarves and blankets'', ''Gardening herbs and flowers'', ''Listening to big‑band and classic rock music'', ''Attending small church group gatherings'',
    ''Volunteering at community kitchen'', ''Genealogy research'', ''Gentle neighborhood walks'']'
  career_goals: Although retired, Tiffany aims to stay mentally sharp and physically independent by learning to use a tablet for video calls and digital photo archives. She wishes to expand her volunteer
    role at the senior center, organizing modest workshops that share her life stories and practical skills with younger neighbors. Preserving her family genealogy and passing that knowledge to grandchildren
    is a personal ambition, as is maintaining the ability to manage her own affairs without relying on others.
