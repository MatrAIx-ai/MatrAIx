persona_description: A scientist and engineer specializing in space weather forecasting and the development of new technologies to protect against solar storms. They are responsible for creating detailed
  and localized warnings about potential solar disruptions and ensuring the safety of the energy infrastructure. They have a deep understanding of the dynamics of space weather, the effects of solar storms
  on various systems, and the impact of these storms on the United States and the world. They are also skilled in using data from spacecraft positioned between Earth and the sun to produce color-coded maps
  showing which regions on the planet are most and least likely to be affected, with as much as 45 minutes lead time.
