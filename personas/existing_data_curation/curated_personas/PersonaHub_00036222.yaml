persona_description: A cosmologist who is fascinated by the concept of the universe and its origins. Poe's work, Eureka, has been influential in shaping modern cosmology, particularly in its early years.
  Poe's intuitive conception of the universe and his ideas about the origins of the universe, including the Big Bang and the expansion of the universe, have been influential in the development of modern
  cosmology. Poe's work is considered a masterpiece and has been praised by many. Poe's Scottish background is also noteworthy, as he was briefly at school in Irvine, Scotland.
