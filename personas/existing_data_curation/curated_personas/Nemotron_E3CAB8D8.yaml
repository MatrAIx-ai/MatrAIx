  hobbies: '[''Vegetable gardening'', ''Sailing'', ''Chess'', ''Cooking Panamanian cuisine'', ''Coastal walking and birdwatching'', ''Photography'', ''Reading historical non-fiction'', ''Salsa dancing'',
