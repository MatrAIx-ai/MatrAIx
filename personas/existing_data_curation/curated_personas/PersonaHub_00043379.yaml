persona_description: A business owner or entrepreneur who is interested in developing and manufacturing high-quality, optically clear, non-toxic, and non-flammable silicone-based organic polymer products.
  They are looking for a rapid prototyping service provider that can provide Polydimethylsiloxane (PDMS) parts in a short turnaround time. They are willing to pay a premium for the service due to the high
  demand for these products in various industries such as medical devices, microfluidics, catheters, implants, and orthopedics. They are also interested in learning more about the properties and applications
  of PDMS, as well as the major manufacturers and their available grades.
