persona_description: A nutritionist or dietitian who is interested in the latest research on diet and health, particularly in the context of preventing long-term degenerative diseases such as cancer and
  coronary disease. They are looking for ways to tailor their diet to treat existing or potential health problems and are open to exploring the concept of 'designer' or 'functional' foods. They are curious
  about the latest research on food and its effects on gut function and health, and are interested in the potential for future developments in this area. They are also interested in the idea of matching
  foods to an individual's risk for chronic disease and are open to exploring the possibility of creating foods that are better for people.
