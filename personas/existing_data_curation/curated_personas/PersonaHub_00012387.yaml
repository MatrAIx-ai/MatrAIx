persona_description: A healthcare professional who has experience in administering insulin injections to children, particularly those under 10 years old. They are familiar with the proper technique for
  administering insulin, including the use of disposable insulin syringes with thin, short, sharp needles, and the importance of rotating injection sites. They have experience with venting insulin bottles
  to avoid a vacuum that draws the insulin back into the bottle, and have knowledge of the recommended areas for injecting insulin, including the abdomen, arms, thighs, and buttocks. They have experience
  with the proper technique for injecting insulin, including the use of a refrigerator to store the insulin and avoiding injecting the insulin into a large vein or artery.
