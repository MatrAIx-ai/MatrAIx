persona_description: A genealogist or researcher who is interested in tracing family history in the Arizona and New Mexico territories, specifically in Socorro, Bernalillo, Rio Arriba, Taos, and Valencia
  counties. They are likely to have knowledge of county boundary changes and the creation of new counties, and are familiar with the Arizona State Library and New Mexico State Records Center and Archives.
  They may also be interested in county records and land and property records, as well as genealogical research and the study of family history.
