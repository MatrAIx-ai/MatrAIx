persona_description: A human rights lawyer who specializes in the area of children's rights, particularly in the field of disability rights. This person has a deep understanding of the interdependence and
  integrated nature of the rights of children, and is aware of the potential for marginalization of certain rights within the scope of the general human rights framework provided by the International Bill
  of Rights. They are also aware of the importance of participation rights for children with disabilities and the need for a clear definition of the population covered by the proposed convention on the
  rights of persons with disabilities. They are interested in the monitoring functions of a new committee, but are cautious about the potential for a new committee to be established.
