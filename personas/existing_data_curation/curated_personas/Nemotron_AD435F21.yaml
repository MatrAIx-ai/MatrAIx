  hobbies: '[''Visiting art galleries and museums'', ''Exploring contemporary Korean cinema'', ''Experimenting with fusion cooking'', ''Home gardening (herbs and vegetables)'', ''Digital photography'',
    ''Practicing Korean calligraphy'', ''Strategic board games (Go, chess)'', ''Reading non-fiction about cultural history'', ''Attending small community workshops'', ''Travel planning and cultural exploration'']'
  career_goals: Although retired from formal employment, Hee Go aspires to deepen her expertise in Korean culinary arts and launch a series of community workshops that blend cooking with cultural storytelling.
    She aims to curate intimate art exhibitions at Gardena's cultural center, highlighting emerging East Asian artists. By developing a blog and a modest YouTube channel, she hopes to document her culinary
    experiments, photography, and art reflections, reaching a wider audience while preserving her personal narratives. Traveling to Seoul to explore its contemporary art scene and culinary innovations is
    a long‑term ambition. She also seeks to mentor younger Korean‑American women, fostering intergenerational connections through shared workshops and informal tutoring.
