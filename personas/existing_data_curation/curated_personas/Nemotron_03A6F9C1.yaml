  career_goals: Arlene aims to advance to a lead engineering or engineering‑manager role within the next five years, focusing on architecting high‑availability systems for sectors such as healthcare or
    fintech. She plans to earn an AWS Solutions Architect certification and deepen her cloud security expertise to become the go‑to authority on stable, scalable infrastructure at her company. In parallel,
    she wants to cultivate a team culture that balances clear processes with flexibility, ensuring predictable schedules and a supportive environment that reduces stress for all members. She is also committed
    to mentoring junior developers through formal workshops and community outreach, and hopes to contribute to open‑source projects that improve CI/CD reliability and monitoring.
