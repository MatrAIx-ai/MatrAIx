persona_description: A person interested in understanding the characteristics, number, and lived realities of children born to at least one foreign-born parent, specifically those born to immigrants. This
  person is curious about the trends in the population of children of immigrants and their families, including their location, citizenship, length of residence in the US, income, employment, and benefits,
  education, household structure, and more. They are interested in accessing data and visualizations to track changes in these characteristics and how they have evolved over time. This person may be looking
  for information on children of immigrants in their state or country of origin, and may be interested in how these children are faring in terms of economic well-being. They may also be interested in how
  children of immigrants are changing the face of their communities and the country as a whole.
