    and reporting'', ''Customer service and stakeholder liaison'']'
  hobbies: '[''Community volunteering'', ''Gardening'', ''Bridge club'', ''Senior dance class'', ''Reading historical fiction'', ''Exploring sustainable cleaning technologies'', ''Weekend road trips with
    spouse'', ''Attending local fairs and festivals'']'
  career_goals: Isabel aims to move into a supervisory role within the next two years, seeking the title of Lead Janitorial Supervisor or Facilities Coordinator for a larger institutional campus. She plans
    to earn certifications from the International Sanitary Supply Association (ISSA) and the Certified Facility Manager (CFM) program to broaden her expertise. Her longer‑term ambition is to transition
    into facilities management, overseeing budgeting, vendor contracts, and sustainability initiatives. She also envisions launching a family‑owned cleaning consultancy that emphasizes environmentally friendly
    practices, allowing her to mentor new entrants to the trade while leveraging her organizational strengths.
