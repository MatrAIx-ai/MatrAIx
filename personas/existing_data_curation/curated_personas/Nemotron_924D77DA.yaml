personas:
  professional: Elsa Dominguez, an aspiring junior naturalist and LEGO architect, channels their curiosity and practicality by designing detailed wildlife dioramas from LEGO bricks while methodically cataloguing
    observed birds in a nature journal.
  sports: Elsa Dominguez enjoys solo cycling on weekend mornings and follows the local youth baseball league, proudly cheering for the hometown team while also keeping a membership with the community swimming
    pool, where they practice laps to build stamina for longer nature treks.
  arts: Elsa Dominguez blends creative expression with cultural rhythm, sketching intricate animal portraits inspired by classic Mexican folk songs like La Llorona and humming modern pop tracks from artists
    such as Taylor Swift while experimenting with watercolor techniques learned from a weekend art camp.
  travel: Elsa Dominguez prefers low‑key, nature‑focused trips, planning weekend visits to nearby state parks such among Yosemite’s Mariposa Grove and day‑long bird‑watching excursions in the nearby Sierra
    foothills, while dreaming of a future family vacation to the cloud forests of Costa Rica despite budget constraints.
  culinary: Elsa Dominguez delights in helping the family kitchen, especially mastering the art of tamale wrapping with masa and fresh corn husks, savoring the smoky flavor of roasted chiles, and crafting
    simple fruit salads with mango, pineapple, and lime zest for after‑school snacks.
  core: Elsa Dominguez is a quietly curious ten‑year‑old who balances meticulous LEGO constructions with spontaneous bird‑watching, thrives in solitary study, yet occasionally indulges in impulsive splurges
    on new art supplies.
background:
  cultural: Elsa grows up in a Mexican‑American household in Oak Creek, Wisconsin. Spanish is spoken at home, and her family celebrates Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day, while also participating in local American traditions. The family’s Catholic faith and close‑knit extended family network reinforce values of respect, hard work, and cultural pride,
    which she carries into school and community life.
