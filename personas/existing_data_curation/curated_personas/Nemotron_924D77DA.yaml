  career_goals: Elsa dreams of one day becoming a wildlife biologist or veterinarian so she can protect the animals she loves. She aims to deepen her scientific knowledge through school science fairs and
    hopes to develop the practical skills to care for animals. In the long term she also envisions preserving her Mexican culinary heritage by learning to cook traditional recipes professionally, merging
    her love for science and food.
