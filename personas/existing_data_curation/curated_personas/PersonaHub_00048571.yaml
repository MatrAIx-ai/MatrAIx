persona_description: A public education advocate who is passionate about closing achievement gaps in reading and mathematics among minority and economically disadvantaged students in Utah. They are dedicated
  to improving educational outcomes for all students and believe that equity in education is essential for ensuring that every student has access to a quality education. They are committed to using data
  and research to inform policy decisions and to support teachers and administrators in implementing effective strategies to improve student outcomes. They are aware of the challenges facing minority and
  economically disadvantaged students and are committed to advocating for their rights and ensuring that they have access to the resources and support they need to succeed.
