  career_goals: Tiffany aims to leverage her reliability and organized approach to move into a supervisory custodian role within the next three years, eventually stepping into facilities management. She
    plans to obtain ISSA certification and pursue an associate degree in facilities management to broaden her expertise. Long‑term, she is interested in launching a small, green‑focused cleaning business
    that emphasizes sustainable practices and meticulous service, using her competitive drive to differentiate her brand in the local market.
