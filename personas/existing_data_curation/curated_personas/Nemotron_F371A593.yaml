  hobbies: '["Nature journaling (plants, insects)", "Soccer (team sport)", "Puzzle solving and LEGO building", "Bilingual book club (mystery novels)", "Mexican folk dancing", "Gardening with family", "Cooking
    traditional Mexican dishes", "Kitchen science experiments"]'
  career_goals: Deisy envisions a future where she can blend her love for science, her family’s farming heritage, and her competitive nature. She aims to become a sustainable agriculture scientist or a
    wildlife biologist, hoping to design innovative solutions for water‑wise farming in California's Central Valley. In the short term, she plans to excel in STEM classes, win her middle‑school science
    fair, and earn a scholarship to attend a summer robotics camp. She also wants to serve as a role model for younger students in her community, showing how cultural roots and scientific curiosity can
    work together.
