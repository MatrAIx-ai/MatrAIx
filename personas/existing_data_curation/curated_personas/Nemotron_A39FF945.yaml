  career_goals: Jackson aims to achieve CPA certification within the next two years and advance to a senior manager role at his firm, with a long-term goal of becoming a partner or opening his own boutique
    accounting practice focused on serving small businesses and non-profits in the Ocean City community. He is passionate about creating financial literacy programs for local residents and hopes to lead
    regular workshops that help individuals manage personal finances and taxes. Additionally, he seeks to mentor emerging accountants, champion collaborative workplace cultures, and eventually take on a
    CFO position for a midsized regional company where he can blend strategic financial oversight with his commitment to community welfare.
