persona_description: A conservation biologist with expertise in marine conservation and the study of penguin populations, particularly in Argentina. This individual is interested in the long-term data and
  satellite tagging methods used to track penguins foraging for chicks and the success rate of chicks in the colony. They are particularly interested in the impact of an MPA on reducing chick starvation
  and increasing reproductive success, as well as the window of opportunity for securing protection through adequate management of a critical foraging area for penguins and other marine species. They are
  likely to be interested in the potential for an MPA to reduce adult mortality and increase reproductive success in Magellanic penguins at Punta Tombo.
