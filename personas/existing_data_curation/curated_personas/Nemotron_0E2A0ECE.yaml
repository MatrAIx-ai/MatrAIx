  career_goals: Although officially retired, Rebekah is driven to document the oral histories of Fairhope’s long‑time residents and compile them into a community archive. She aims to curate an intergenerational
    art project that pairs senior artists with schoolchildren, fostering creativity and cultural exchange. Rebekah also hopes to publish a memoir that blends personal recollections with reflections on the
    region’s artistic evolution, ensuring her experiences inspire future generations. Ultimately, she aspires to remain an active ambassador for seniors at local civic events, championing inclusive participation
    and lifelong learning.
