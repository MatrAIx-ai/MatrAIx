  hobbies: '[''Softball league'', ''Gardening'', ''Baking and dessert decorating'', ''Community potlucks'', ''Volunteering at food bank'', ''Town clean‑up coordination'', ''Book club (contemporary fiction
    & practical self‑help)'', ''DIY home projects'']'
  career_goals: Kelly aims to complete her bachelor's degree in education within the next year and subsequently earn a master's in educational leadership, positioning herself for a role as a curriculum
    coordinator or assistant principal in the Wise County Independent School District. She aspires to spearhead a district‑wide STEM initiative that blends practical, hands‑on experiments with traditional
    teaching methods, reinforcing her belief in practicality over abstraction. Long‑term, Kelly hopes to be recognized as a model educator who mentors new teachers, leads professional‑development workshops,
    and cultivates a culture of high expectations and collaborative competition among staff.
