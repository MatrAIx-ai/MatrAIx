personas:
  professional: Kelly Greer, a 34‑year‑old elementary and middle‑school teacher in Wise County, blends meticulous lesson planning with a competitive drive to raise student achievement, leveraging Google
    Classroom and SMART Boards to enforce routine and data‑driven instruction while spearheading extracurricular clubs and community outreach.
  sports: Kelly Greer competes in a local women’s softball league, roots for the Texas Rangers during baseball season, and jogs with the Decatur Running Club in the spring, treating both organized matches
    and informal cardio sessions as essential outlets for their competitive energy.
  arts: Kelly Greer delights in decorating seasonal desserts inspired by pastry chefs like Dominique Ansel, curls up with contemporary fiction from authors such as Sally Rooney and Tasha Suzanne, and enjoys
    the soulful guitar of John Mayer, letting these artistic touches infuse her community gatherings and classroom projects.
  travel: Kelly Greer prefers meticulously planned road trips, having mapped out seasonal weekend escapes to Asheville’s Blue Ridge Mountains and the Grand Canyon, while budgeting for family‑friendly stays
    and juggling holiday travel around school breaks.
  culinary: Kelly Greer’s culinary persona combines garden‑fresh tomatoes, basil, and heirloom carrots into rustic ratatouille, while her baking prowess shines in elaborate holiday gingerbread houses speckled
    with sugared peppermint and edible glitter.
  core: Kelly Greer, a 34‑year‑old educator with a competitive streak, juggles lesson plans, softball stats, and a meticulously labeled spice rack, yet habitually forgets to water houseplants on rainy days
    because they rely on routine over spontaneous care.
background:
  cultural: Kelly grew up in a middle‑class, White family in East Texas, where values of hard work, modesty, and community involvement are emphasized. Raised in Decatur, she was immersed in the rural, small‑town
    culture of Wise County, participating in church gatherings, local fairs, and school events that celebrate Texan traditions such as barbecue, Independence Day celebrations, and county rodeos. Her upbringing
    reinforced a respect for practical solutions, personal responsibility, and a strong sense of belonging to the close‑knit community that still shapes her outlook and daily routines.
attributes:
  skills: '[''Classroom management'', ''Lesson planning'', ''Curriculum development'', ''Educational technology (Google Classroom, SMART Boards)'', ''Student assessment and data analysis'', ''Parent and
