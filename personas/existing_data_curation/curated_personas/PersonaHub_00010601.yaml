persona_description: A public official or a community leader who is passionate about promoting gender equality and ensuring access to education for all girls, particularly in low-income areas. This person
  is dedicated to working with stakeholders from the public and private sectors to address the challenges of poor access to school water, sanitation, and hygiene education for young adolescent girls in
  Lilongwe, Malawi. This person is also skilled in promoting adolescent girls' hygiene through menstrual hygiene management and distributing re-usable sanitary pads. This person is committed to ensuring
  the effectiveness and sustainability of the hygiene and MHM component of the initiative, and is recognized for their efforts in mobilizing mothers and other female figures in the surrounding communities.
  This person is also inspired by examples of positive behaviors in maintaining a gender parity mindset that takes inclusiveness as a central point of their efforts in making the world a decent and better
  place to live.
