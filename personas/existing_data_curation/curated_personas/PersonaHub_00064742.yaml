persona_description: A British colonial administrator who oversaw the establishment and expansion of English education and administration in India. This persona was responsible for the creation of educational
  institutions, the promotion of English as the language of administration and education, and the establishment of a class of educated Indians that could serve as a link between the rulers and ruled. This
  persona was also involved in the translation of ancient texts, the writing of grammars, the compilation of dictionaries, and the collection of manuscripts for research on India. This persona was instrumental
  in the shift from Sanskrit and Arabic to English as the primary medium of education in India, and their efforts laid the foundation for the establishment of various educational institutions and the growth
  of the English-educated elite in India.
