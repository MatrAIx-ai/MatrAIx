  hobbies: '[''Acoustic Guitar'', ''Cooking Puerto Rican Cuisine'', ''Jogging in Parque de la Ceiba'', ''Mindfulness Meditation'', ''Chess'', ''Reading Self-help and Psychology Books'', ''Volunteering at
    Community Center (English Tutoring)'']'
  career_goals: Jose Manuel aims to transition from a frontline representative to a supervisory role within the next two to three years, leveraging his reliability and structured approach to lead a small
    team. He plans to complete a bachelor's degree in Business Administration, obtain a Customer Experience Management certification, and develop expertise in quality-assurance metrics to improve call-center
    processes. Long-term, he envisions a managerial position that allows him to design supportive work practices, reduce employee stress, and enhance overall customer satisfaction while maintaining a steady,
    predictable career path.
