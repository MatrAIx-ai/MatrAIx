persona_description: A Singapore-based medical diagnostics company that specializes in developing rapid-assay test kits for mosquito-borne diseases such as malaria and dengue fever. The company's technology
  uses breakthrough molecular technology from the National University of Singapore to detect Plasmodium and dengue fever in a matter of hours, with early detection enabling earlier medical attention and
  preventing serious complications. The company has licensed its technology to Veredus Laboratories and has produced several diagnostic kits, including the world's first validated commercial avian flu diagnostic
  kit. The company is also developing kits for encephalitis, SARS, yellow fever, Japanese encephalitis, and chicken pox.
