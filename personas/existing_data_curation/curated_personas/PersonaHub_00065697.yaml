persona_description: A biologist who specializes in the study of shorebirds, particularly the use and behavior of shorebirds in coastal habitats. They have conducted research on shorebirds in protected
  waters and are interested in understanding the use and behavior of shorebirds in ocean beaches. They have conducted a comprehensive study of shorebird use in the Copper River Delta, a protected area,
  and are interested in comparing their findings with those in protected waters. They have also observed the behavior of shorebirds in the dune system of Egg Island's outer shore and are interested in understanding
  the differences in behavior between spring and fall migration.
