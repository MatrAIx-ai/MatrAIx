persona_description: A political scientist who specializes in the study of political communication and media coverage of political issues, particularly the role of media in shaping public opinion and the
  effectiveness of political campaigns. This persona is likely to have a strong interest in understanding how political candidates use the media to their advantage and how the media influences public perceptions
  of political candidates and issues. They are likely to be familiar with concepts such as the media's role in framing political issues and the impact of media coverage on public opinion. This persona is
  also likely to have a deep understanding of the political landscape in the United States and the role of the media in shaping public opinion in that context.
