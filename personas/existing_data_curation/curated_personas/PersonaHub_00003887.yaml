persona_description: A teacher who is passionate about improving the academic achievement of K-12 students, particularly those who are at risk of scoring below the passing level on standardized tests. They
  are skilled in using the Whole-Faculty Study Group (WFSG) method for teachers to explore and develop content knowledge, research-based instructional and assessment strategies, classroom management techniques,
  and technology skills. They are also experienced in providing additional, focused instruction in the identified subject area(s) for students identified at risk of scoring below the passing level on the
  English/language arts or mathematics portions of the Louisiana Educational Assessment Program (LEAP) test. They are familiar with the Louisiana Components of Effective Teaching, which are the basis for
  all technology-connected lessons and lesson planning activities. They are dedicated to providing students with personalized learning opportunities and are willing to go the extra mile to ensure that they
  succeed in their academic journey.
