  career_goals: Jill aims to deepen her supply‑chain knowledge by completing a bachelor's degree in Business Administration with a concentration in Logistics within the next three years. She plans to obtain
    APICS certifications (CPIM or CSCP) and a Lean Six Sigma Green Belt to strengthen her competency in continuous improvement. Her medium‑term ambition is to move into a senior production planner role,
    leading a small planning team and driving efficiency projects across the plant. Ultimately, Jill envisions a transition to a logistics manager position where she can shape strategic sourcing decisions
    and mentor junior staff while maintaining the structured, results‑oriented environment she thrives in.
