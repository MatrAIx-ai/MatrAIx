  career_goals: He envisions a future where he can blend his love for technology and competition. In the next few years, he aims to earn certifications in computer hardware repair and to win local eSports
    tournaments. Long‑term, he hopes to secure an apprenticeship with an automotive or computer‑hardware company, eventually becoming a skilled technician or engineer who can design and optimize performance‑focused
    systems. He also dreams of developing his own indie video‑game or mod, leveraging his programming skills and strategic mindset.
