personas:
  professional: Robert Link is a budding competitive gamer whose strategic mindset from League of Legends and Rocket League fuels meticulous work on model kits and electronics tinkering, and they show early
    signs of a future in game design or mechanical engineering.
  sports: Robert Link enjoys solitary fishing trips with the Ionia County Youth Fishing Club, hikes the forests of the Ionia County State Recreation Area, and they root for the Detroit Tigers in baseball
    while occasionally following the Michigan Wolverines football team during the fall season.
  arts: Robert Link channels their creative side through assembling Tamiya model kits, devouring sci‑fi classics by Isaac Asimov and Frank Herbert, writing fan‑fiction set in the Mass Effect universe, and
    they listen to Daft Punk’s electronic anthems while sketching futuristic vehicle designs.
  travel: Robert Link has explored nearby destinations such as the Upper Peninsula’s Pictured Rocks and local lake cabins, and they dream of a future trip to Tokyo for the Summer Game Fest, balancing their
    wanderlust with school responsibilities and parental budget limits.
  culinary: Robert Link favors pepperoni pizza, grilled cheese sandwiches, and homemade fish tacos seasoned with cilantro, lime, and a dash of hot sauce, and they, while limited to microwave snacks, occasionally
    experiment with simple sauces for their model‑kit‑themed pizza parties.
  core: Robert Link is a skeptical, solitary teen who blends a competitive edge from online gaming with meticulous model‑kit building and occasional fishing, and they juggle a relaxed attitude toward obligations
    with a tendency to procrastinate on chores.
background:
  cultural: Robert grew up in Ionia, Michigan, a small Midwestern town where community ties and a strong work ethic are common cultural touchstones. His family’s background reflects typical white, lower‑middle‑class
    values of self‑reliance, practicality, and respect for local traditions such as high‑school sports and seasonal outdoor activities. The region’s automotive heritage and emphasis on hands‑on trades have
    shaped his interest in mechanics and technology. While he appreciates the town’s modest social gatherings, his reserved nature leads him to find comfort in solitary pursuits and small‑group collaborations,
    aligning with the individualized, modest ethos of the surrounding culture.
