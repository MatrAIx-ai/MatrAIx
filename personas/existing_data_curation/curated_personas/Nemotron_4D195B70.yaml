  career_goals: Brandy dreams of turning her love for storytelling and visual art into a career as a multimedia creator—she envisions herself as a graphic novelist or animation director who blends narrative,
    illustration, and interactive technology. She hopes to earn a scholarship to a specialized arts high school and later study game design or visual communication at a university where she can develop
    immersive experiences that invite audience participation. In the short term, she aims to win state‑level creative writing and science fair competitions, build a portfolio of original comic strips, and
    lead a youth‑run creative club that showcases student work. Ultimately, she aspires to launch her own indie studio that produces games or animated series that explore abstract ideas and encourage curiosity
    in other young minds.
