personas:
  professional: Robert Henriquez, a 16‑year‑old aspiring environmental engineer, blends his self‑taught Python coding, hands‑on woodworking, and first‑aid certification with a deep compassion for community,
    making him a natural leader in his school’s robotics club and local food‑bank projects.
  sports: Robert Henriquez spends weekends kayaking Lake Michigan and hiking the Indiana Dunes, supports the Detroit Tigers and Red Wings, and participates in his high school’s cross‑country team, balancing
    a love for endurance training with casual fishing trips to stay grounded.
  arts: Robert Henriquez unwinds by strumming acoustic renditions of Bob Dylan and The Avett Brothers on his guitar, attends local folk festivals, and enjoys indie films by Greta Gerwig, letting music and
    storytelling shape his reflective teen outlook.
  travel: Robert Henriquez prefers spontaneous weekend getaways to nearby Mackinac Island and Chicago's lakefront, while dreaming of backpacking through Norway's fjords to study glacial ecosystems, balancing
    tight teen budgets with an adventurous spirit.
  culinary: Robert Henriquez enjoys cooking fresh‑caught trout with lemon‑dill butter and cherry pie made from local orchard fruit, favoring simple, hearty meals he prepares on his family’s backyard grill,
    though he sometimes burns the edges of his pizza crust in his youthful enthusiasm.
  core: Robert Henriquez is a curiosity‑driven, community‑oriented teen who balances meticulous planning with spontaneous outdoor escapades, yet habitually forgets to charge his phone before fishing trips.
background:
  cultural: Robert was raised in Traverse City, Michigan, a Midwestern community known for its lakes, cherries, and tight‑knit social fabric. While his family identifies as White, his surname reflects Hispanic
    ancestry, exposing him to occasional Spanish language use and cultural celebrations within the family. He grew up with typical Midwestern values of hard work, modesty, and community service, and he
    also participates in multicultural traditions such as family gatherings that blend American and Hispanic customs. The region’s emphasis on outdoor recreation and community involvement has profoundly
    shaped his interests and worldview.
