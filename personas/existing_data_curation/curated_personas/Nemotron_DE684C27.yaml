  career_goals: Robert aspires to merge his curiosity about the natural world with his desire to help his community by pursuing a career in environmental science or natural resource management. He hopes
    to attend a university with a strong sustainability program, earn a degree in environmental engineering, and eventually work for the Michigan Department of Natural Resources or a nonprofit focused on
    Great Lakes conservation. As a backup, he is interested in public health, driven by his compassion for community well‑being.
