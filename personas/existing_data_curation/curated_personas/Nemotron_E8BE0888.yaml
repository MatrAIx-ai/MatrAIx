  hobbies: '[''Vegetable gardening'', ''Baking pies and bread'', ''Knitting and crochet projects'', ''Reading cozy mystery novels'', ''Crossword puzzles and Sudoku'', ''Reflective journaling'', ''Small‑group
    church Bible study'', ''Nature walks and birdwatching'', ''Volunteering for senior tech tutoring'']'
  career_goals: Frances aims to find a part‑time role that offers a predictable routine and allows her to contribute to her community. She is interested in administrative or bookkeeping positions with a
    small local business or community center, or in starting a home‑based consultancy teaching digital literacy to older adults. She also hopes to earn a certification as a certified nursing aide to volunteer
    in senior care, combining her desire for practical service with a structured schedule.
