    planning"]'
  career_goals: Although retired, Melissa aims to deepen her impact in the community by establishing a neighborhood garden that provides fresh produce for local seniors and teaches sustainable gardening
    practices. She also hopes to compile a family‑focused cookbook featuring traditional Wisconsin recipes and her own canning tips, preserving culinary heritage for future generations. Mentoring younger
    volunteers at the senior center and documenting local oral histories for the town archive are additional ambitions, reflecting her desire to blend practical contributions with cultural preservation.
