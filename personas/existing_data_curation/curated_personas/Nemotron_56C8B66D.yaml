  career_goals: Ernesto dreams of combining his love for art and technology. He aspires to become an astronaut or aerospace engineer, hoping to design spacecraft that explore new worlds. He also envisions
    creating video games that tell stories inspired by Mexican folklore, aiming to win his school’s science fair and later join a competitive robotics team. In the long term, he wants to be recognized as
    a leading young innovator who bridges cultural art and scientific discovery.
