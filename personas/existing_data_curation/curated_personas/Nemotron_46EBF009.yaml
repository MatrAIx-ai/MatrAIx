  career_goals: Jeffrey aims to progress to a senior manager or director role in public relations within the next five years, leading a team that designs ethically grounded, community‑centric campaigns.
    He is particularly interested in specializing in crisis management for regional nonprofits and public institutions, positioning himself as a trusted voice in the Maine public‑affairs arena. In the longer
    term, he envisions launching his own boutique consultancy that helps small coastal businesses and cultural organizations communicate sustainably, while maintaining a healthy work‑life balance that supports
    his marriage and personal wellbeing. He also plans to pursue a part‑time Master’s in Strategic Communication to deepen his analytical and leadership capabilities.
