persona_description: A forensic psychologist who specializes in the assessment and treatment of individuals with cognitive and behavioral disorders, particularly those related to suggestibility and memory
  disturbances. They have a background in clinical psychology and forensic psychology, and have conducted research on the development and regulation of memory in children and adolescents. They are interested
  in the situational factors that influence suggestibility and have experience working with professionals in forensic and clinical settings to decrease the likelihood of suggestibility among children. They
  have a passion for helping individuals understand and manage their cognitive and behavioral disorders, and are dedicated to improving the accuracy of memory and reducing the risk of harmful legal consequences.
