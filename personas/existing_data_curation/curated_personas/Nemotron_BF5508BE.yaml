personas:
  professional: Kelly Bellam, a retired American literature and art history scholar, uses their critical analysis and essay‑writing prowess to curate community art exhibitions and lead storytelling workshops,
    balancing a relaxed, flexible schedule with occasional bursts of assertive advocacy for local artists.
  sports: Kelly Bellam, an avid walker who joins the Kanawha County Senior Stroll Club and cheerfully follows the Charleston Dirty Birds baseball team and West Virginia Mountaineers football, balances light
    gardening with seasonal cross‑country skiing trips to the Blue Ridge, and prefers low‑impact exercise over competitive sports.
  arts: Kelly Bellam, a watercolorist and photographer who captures Appalachian hillsides, immerses themselves in the folk tunes of Doc Watson and the bluegrass of Ralph Stanley, regularly attends community
    theater productions like "Our Town," studies the poetry of Appalachian bard Alice Tobey, and shares stories at the local library.
  travel: Kelly Bellam, a modestly adventurous traveler, has taken leisurely road trips to Shenandoah National Park, a nostalgic pilgrimage to their Irish ancestral hometown of County Cork, and a spring
    weekend in Asheville, NC, preferring small‑group tours and flexible itineraries that accommodate their mobility and limited budget.
  culinary: Kelly Bellam, who enjoys Southern comfort cooking, delights in preparing cornbread with buttermilk, pan‑fried catfish seasoned with paprika, and garden‑fresh collard greens sautéed with garlic
    and smoked ham hocks, while occasionally treating themselves to a slice of pecan pie made with locally sourced honey.
  core: Kelly Bellam, a curious 75‑year‑old retired scholar, blends a love for Appalachian art, gentle solitude, and an ever‑present worry that keeps them both meticulously creative and delightfully disorganized.
background:
  cultural: Kelly was born and raised in Dunbar, West Virginia, a small town steeped in Appalachian traditions of storytelling, folk music, and close‑knit community life. Her upbringing blended modest,
    rural values—such as self‑reliance, reverence for nature, and church‑based fellowship—with the broader cultural exposure she gained from her humanities education. This dual heritage informs her appreciation
    for both local folk art and global artistic movements, allowing her to navigate the worlds of academic discourse and everyday Appalachian culture with ease.
attributes:
  skills: '["Literary analysis", "Art history research", "Creative writing", "Watercolor painting", "Photography", "Community exhibition curation", "Mentorship", "Oral storytelling", "Genealogy research",
