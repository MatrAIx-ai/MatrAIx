  hobbies: '["Reading classic literature", "Watercolor painting", "Photography", "Genealogy research", "Gardening", "Attending community theater", "Listening to folk and bluegrass music", "Writing memoirs",
    "Participating in book clubs", "Birdwatching"]'
  career_goals: Although retired, Kelly aims to leave a lasting cultural imprint on her hometown by compiling a memoir that intertwines her personal journey with the artistic heritage of Kanawha County.
    She aspires to edit and publish a small anthology of Appalachian folk art and poetry, providing a platform for younger local creators. She also hopes to establish a modest endowment that funds mobile
    art workshops for seniors, allowing her to continue mentoring while preserving the flexibility she values.
