    in local parks'', ''Attending small art workshops'']'
  career_goals: Tomas aims to transition from a front-line production worker to a supervisory or training role where he can mentor newer employees and champion a safety-first, collaborative culture. He
    plans to earn an OSHA 30-hour certification and a CNC machining credential within the next two years. In parallel, he hopes to develop a small side business creating handcrafted wooden décor inspired
    by Mexican folk art, allowing him to blend his technical skills with his love of art. Ultimately, he envisions a flexible career that lets him stay connected to the production floor while also pursuing
    creative projects and community-based workshops.
