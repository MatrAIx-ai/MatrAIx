  hobbies: '[''Attending jazz concerts'', ''Cooking Creole cuisine'', ''Gardening'', ''Listening to spoken‑word poetry'', ''Playing chess'', ''Participating in Mardi Gras celebrations'', ''Reading biographies'',
    ''Volunteering at senior center'']'
  career_goals: Although retired, Jaylen aims to leave a lasting legacy by documenting and archiving the oral histories of his neighborhood, creating a community‑based memoir that captures the cultural
    evolution of Kenner and Jefferson Parish. He hopes to organize intergenerational art and music workshops that blend jazz appreciation with storytelling, and to serve as a volunteer coordinator at the
    local senior center, fostering connections between seniors and younger community members. His ambition is to ensure that the rich traditions of his community are celebrated and passed on to future generations.
