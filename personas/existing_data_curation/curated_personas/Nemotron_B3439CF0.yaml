personas:
  professional: A meticulous library information specialist, Autumn Verdi blends deep cataloging expertise with emerging technology fluency to design quiet, tech‑enhanced study spaces, and they apply their
    curiosity for digital archives alongside disciplined, solitary workflow to meet high service standards.
  sports: Autumn Verdi enjoys low‑key fitness through early morning walks around Lake Apopka and occasional yoga sessions, while they cheer quietly for the Orlando Magic from an aisle seat and support the
    Orlando City SC women’s team on weekends when their schedule permits.
  arts: Autumn Verdi immerses herself in the quiet elegance of Ansel Adams’ black‑and‑white landscapes, the lyrical piano works of Ludovico Einaudi, and the classic novels of Toni Morrison, often pairing
    their digital flora photography with the ambient soundscapes of Brian Eno, and they attend occasional local gallery openings featuring Mediterranean‑inspired watercolor paintings.
  travel: Autumn Verdi prefers meticulously planned solo trips that blend quiet reflection with cultural discovery, such as a week‑long photography retreat in Tuscany’s rolling hills, a day‑long bird‑watching
    excursion in the Everglades, and a leisurely stroll through Kyoto’s temple gardens, and they always book boutique inns that offer tranquil workspaces.
  culinary: Autumn Verdi, a confident home cook, habitually prepares wholesome dishes like slow‑cooked minestrone, rosemary‑infused roasted chicken, and hand‑rolled gnocchi tossed in sage butter, delighting
    in the aroma of fresh basil and the satisfaction of perfecting a crusty sourdough loaf on weekends, and they often experiment with seasonal ingredients from their garden.
  core: Autumn Verdi is a methodical archivist who curates quiet spaces, balances meticulous order with quiet curiosity, and secretly hoards vintage cameras for weekend photography escapes, a quirk that
    reveals they love solitary exploration.
background:
  cultural: Autumn is a White American with a strong Italian lineage reflected in her surname, Verdi. She was raised in a middle‑class suburban community in Central Florida, where she absorbed the region’s
    blend of Southern hospitality and multicultural openness. While she identifies with mainstream American cultural norms—valuing independence, self‑reliance, and a pragmatic work ethic—her family traditions
    have introduced her to Italian cuisine, language snippets, and an appreciation for art and storytelling. Living in Orlando’s diverse environment has broadened her perspective, but her preference for
    solitude leads her to seek quiet corners both at work and in her personal life.
