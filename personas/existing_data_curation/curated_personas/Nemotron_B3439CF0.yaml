  career_goals: Autumn aims to pursue a bachelor's degree in Library and Information Science within the next two years, followed by professional certification from the American Library Association. Her
    long‑term ambition is to move into a supervisory or branch‑manager role where she can lead a team in developing digital archive initiatives and redesigning library spaces to prioritize calm, solitary
    study areas. She also hopes to mentor junior staff, champion accessibility standards, and eventually author a guide on best practices for integrating technology while preserving the quiet ethos of public
    libraries.
