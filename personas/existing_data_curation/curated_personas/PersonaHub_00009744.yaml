persona_description: A research scientist who studies the effects of solitary drinking on the development of alcohol problems in adolescents and young adults. Her research interests include alcohol use
  disorders, adolescent and young adult development, and the impact of early risk factors on alcohol problems. She is particularly interested in the gender differences in solitary drinking and the potential
  for female adolescents to have higher risk for developing alcohol problems.
