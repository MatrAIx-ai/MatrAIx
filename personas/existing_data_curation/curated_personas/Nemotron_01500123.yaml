  hobbies: '[''visiting art museums'', ''sketching'', ''watercolor painting'', ''nature hikes'', ''listening to art and philosophy podcasts'', ''cooking'', ''baking'', ''reading design and art books'',
    ''attending local art talks'', ''solving jigsaw puzzles'', ''indoor gardening'']'
  career_goals: She aims to transition from cashier to a role that blends her retail experience with her passion for the arts. Over the next three years Susan plans to enroll in community college courses
    in business administration and arts management, with the goal of securing a position as a gallery assistant or museum educational coordinator in the Fort Worth arts community. She also aspires to earn
    a supervisory certification to become a department lead in a boutique that sells art supplies, allowing her to mentor new staff while maintaining a quiet, organized work environment. In the longer term
    she hopes to curate small community exhibitions that highlight emerging local artists.
