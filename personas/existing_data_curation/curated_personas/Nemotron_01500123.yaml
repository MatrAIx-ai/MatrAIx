personas:
  professional: Susan Miller, a diligent frontline retail cashier renowned for precise cash handling, inventory control and calm conflict resolution, channels their organized yet flexible mindset and quiet
    curiosity into thoughtful product recommendations, while concurrently pursuing business and arts‑management courses to pivot into a gallery assistant or museum education coordinator role.
  sports: Susan Miller, a solitary fitness enthusiast, spends Saturday mornings hiking the trails of Cedar Ridge Nature Preserve, practices gentle Vinyasa yoga at the local Yoga Tree studio, cheers on the
    Dallas Cowboys and follows the Texas Rangers, and occasionally joins the North Star Running Club’s early‑morning 5 k runs, where they enjoy the brief camaraderie before returning to a quiet routine.
  arts: Susan Miller, an avid museum visitor and watercolorist, regularly sketches impressions from the Amon Carter Museum and Modern Art Museum of Fort Worth, draws inspiration from Georgia O’Keeffe, Monet
    and local Fort Worth artist Lauren Rice, playlists country‑folk favorites like Kacey Musgraves while painting, and they deepen their knowledge by listening to the Art History Babes podcast during afternoon
    baking sessions.
  travel: Susan Miller, a thoughtful weekend explorer, prefers low‑key road trips to cultural gems such as Santa Fe’s art galleries and Austin’s live‑music scene, books boutique B&B stays through Airbnb,
    saves diligently for an annual European museum pilgrimage to Florence, yet balances wanderlust with budget constraints by planning trips around long‑holiday weekends and occasional Fourth of July family
    reunions, where they relish the quiet moments in historic plazas.
  culinary: Susan Miller, an intermediate home cook with a love for Texas barbecue and fresh herbs from their indoor garden, perfects smoked brisket and pecan pie for weekend gatherings, experiments with
    watercolor‑inspired plating on dishes like cilantro‑lime shrimp tacos, enjoys baking sourdough loaves while listening to philosophy podcasts, and they balance indulgence by limiting take‑out to one
    night per week.
  core: Susan Miller blends meticulous organization with quiet curiosity, turning a disciplined retail career into a passionate pursuit of art, solitude, and thoughtful self‑care, while they occasionally
    overindulge in espresso and postpone dentist appointments.
background:
  cultural: Susan was raised in a middle‑class, suburban family in the Dallas‑Fort Worth metroplex. Her cultural upbringing reflects a blend of traditional Texan values such as community fellowship, love
    of BBQ and country music, and an appreciation for the region’s growing arts scene. Though she identifies as White American, she grew up attending local church events, Fourth of July celebrations, and
    community festivals that exposed her to Southern hospitality and diverse cultural expressions. Living in Fort Worth she is familiar with the city’s historic Stockyards, its western heritage, and the
    vibrant contemporary art districts, all of which shape her worldview and sense of belonging.
attributes:
  skills: '[''cash handling'', ''POS operation'', ''inventory control'', ''basic bookkeeping'', ''sales reconciliation'', ''attention to detail'', ''problem solving'', ''conflict de‑escalation'', ''self‑directed
