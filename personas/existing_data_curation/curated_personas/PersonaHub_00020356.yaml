persona_description: A conservation biologist with expertise in the ecological and biogeographic aspects of the Pacific Northwest forest ecosystem, particularly focusing on the relationships between biodiversity,
  habitat quality, and conservation strategies. They are particularly interested in the effectiveness of marine reserves and protected areas in conserving reef ecosystems and resources, as well as the impact
  of brush management on water resource characteristics in the Virgin Islands and Puerto Rico. They also have a background in fractured rock research, with a focus on understanding the movement of water
  through fracture networks and the field conditions that influence contaminant migration. They are also interested in the relationships between wetland habitat dynamics and life history, as well as the
  development of management techniques to reduce hazards in the Sierra Nevada forests, California shrublands, Mojave, and Sonoran deserts.
