  career_goals: Monty frequently imagines becoming a firefighter or a teacher when he grows up, drawn to the clear structure, helping role, and community interaction each profession offers. He also expresses
    excitement about being an astronaut, attracted by the adventurous and competitive aspects. In the short term, Monty aims to master tying his shoes, help set the dinner table, and eventually lead a small
    group of friends in a game of "Simon Says," showcasing his budding sense of responsibility and leadership.
