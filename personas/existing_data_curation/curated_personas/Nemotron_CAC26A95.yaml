personas:
  professional: Monty Mccollum, a three‑year‑old who delights in arranging colorful building blocks into perfectly aligned towers, shows early signs of an architect’s mindset, balancing a love for predictable
    structure with a spontaneous urge to experiment, and they already insist on a tidy play area before moving on.
  sports: Monty Mccollum, a three‑year‑old who joins the Little Sprouts toddler soccer club at the local community center, proudly wears a Chicago Cubs cap while cheering on the team on TV, and they love
    trying to mimic the high‑energy moves of their favorite cartoon hero, the Power Rangers.
  arts: Monty Mccollum, who bursts into song with Disney’s ‘Let It Go’, sketches whimsical creatures on Crayola paper inspired by Dr. Seuss, and meticulously lines up their LEGO minifigures to reenact scenes
    from beloved ‘Bluey’ episodes.
  travel: Monty Mccollum, who enjoys family road trips to the nearby zoo and a magical week at Disney World in Orlando, favors traveling with their beloved stuffed bear in hand, and they dream of one day
    seeing the towering cliffs of the Grand Canyon.
  culinary: Monty Mccollum, who favors creamy mac and cheese with extra cheddar, delights in fresh strawberry slices as a snack, proudly stirs pancake batter with a wooden spoon, yet they secretly sneak
    a chocolate chip cookie when no one is looking.
  core: Monty Mccollum, a three‑year‑old who blends a love for orderly block towers with a competitive dash to be first on the playground, all while they harbor a mischievous habit of sneaking cookies.
background:
  cultural: Monty is raised in a white, middle‑class family in Meadville, Pennsylvania. His upbringing reflects typical small‑town Midwestern values, emphasizing community gatherings, family meals, and
    seasonal celebrations such as Halloween, Thanksgiving, and Independence Day. He attends a local preschool that blends play‑based learning with exposure to regional traditions, including field trips
    to the Crawford County Historical Society and participation in community sports leagues. The cultural environment encourages friendliness, practical responsibility, and a love for organized group activities.
