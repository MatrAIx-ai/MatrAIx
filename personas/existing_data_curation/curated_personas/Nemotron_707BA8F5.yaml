    (rock and insect collecting)'']'
  career_goals: His biggest dream is to explore space as an astronaut, because the stars and rockets capture his imagination. He also hopes to become an inventor who designs solutions that combine art and
    engineering, inspired by his love for drawing and building LEGO. He envisions winning science fair competitions and art contests, and one day leading a museum exhibit where he can share his creations.
    While his competitive spirit drives him to aim for top honors, he also wants to help friends succeed, reflecting his sociable nature.
