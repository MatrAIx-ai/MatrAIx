persona_description: A student from a school located near a waterway, who is interested in environmental science and wants to gain hands-on experience with water testing equipment, data collection, and
  scientific problem solving. They are willing to dedicate 2-4 days to the program and are comfortable with the concept of learning about what we are testing for, why we are testing, and how to use equipment.
  They are also interested in mapping out the watershed and calculating runoff produced by their school. They are ready to work through the scientific method and use equipment to test local water quality.
