personas:
  professional: Jennifer Willman, a seasoned logistics professional with deep expertise in supply chain optimization, Lean Six Sigma, and ERP integration, leverages their methodical and competitive mindset
    to drive data‑driven, sustainable improvements across multi‑site distribution networks.
  sports: Jennifer Willman spends Saturday mornings trail running with the Denver Road Runners Club, winter weekends snowshoeing on the Pike Peak Trail, and cheering for the Colorado Avalanche and Denver
    Broncos, while they occasionally join the local community league’s softball team for a brief social escape.
  arts: Jennifer Willman cultivates their creative side through landscape photography inspired by Ansel Adams and modern wildlife photographer Jimmy Chin, curating a portfolio of Rocky Mountain vistas,
    and unwinds by listening to The Lumineers and John Denver while attending the Boulder International Film Festival each fall.
  travel: Jennifer Willman plans their escapes in meticulous spreadsheets, favoring week‑long trips to Colorado's hidden gems like Great Sand Dunes and out‑of‑country adventures to Patagonia's Torres del Paine
    and Iceland's geothermal lagoons, balancing adrenaline‑filled hikes with occasional spa stays to recharge before work resumes.
  culinary: Jennifer Willman delights in cooking Mediterranean‑inspired dishes such as grilled branzino with lemon‑thyme, chickpea falafel, and tabbouleh using Colorado’s farm‑fresh herbs, but their habit
    of over‑seasoning sometimes overpowers the subtle flavors they love.
  core: Jennifer Willman blends a competitive, data‑driven mindset with a love for solitary mountain trails, turning every logistical challenge into an eco‑friendly solution while occasionally letting their
    perfectionism spill into over‑planned weekend itineraries.
background:
  cultural: Jennifer grew up in a suburban Midwest environment before moving to Colorado for college. Her family emphasized self‑reliance, education, and community involvement, values that have carried
    over into her adult life. Living in Westminster, she embraces the Western Colorado ethos of outdoor recreation, environmental consciousness, and a balanced lifestyle that blends work dedication with
    personal well‑being. Her cultural identity is rooted in mainstream American traditions while also reflecting the progressive, health‑focused, and nature‑appreciating culture of the Denver metropolitan
    area.
attributes:
  skills: '[''Supply Chain Management'', ''Logistics Planning'', ''Route Optimization'', ''Data Analysis (Excel, SQL, Python)'', ''Lean Six Sigma Process Improvement'', ''Regulatory Compliance (DOT, OSHA)'',
