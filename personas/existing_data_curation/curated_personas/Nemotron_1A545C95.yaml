  hobbies: '[''Hiking and Trail Running'', ''Snowshoeing'', ''Landscape Photography'', ''STEM Volunteer Outreach'', ''Food‑Bank Volunteering'', ''Reading Non‑Fiction Tech and Business Books'', ''Cooking
    Mediterranean Cuisine'']'
  career_goals: Jennifer aims to advance to a regional director of distribution within the next five years, overseeing multiple facilities and integrating sustainable logistics practices such as electric
    fleet adoption and carbon‑footprint tracking. She plans to earn APICS CPIM and CSCP certifications to deepen her strategic expertise. Long‑term, she envisions establishing a consultancy that helps mid‑size
    companies transition to data‑driven, eco‑friendly supply chains, while also mentoring women pursuing STEM careers in logistics and operations.
