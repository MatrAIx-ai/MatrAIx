personas:
  professional: Neidi Vasquez, a veteran secondary STEM educator and curriculum architect, blends rigorous data‑driven assessment with hands‑on inquiry labs, leveraging bilingual instruction to bridge English
    and Spanish speakers while steering their school toward a district‑wide STEM partnership program.
  sports: Neidi Vasquez, an avid hiker of the Appalachian foothills, is a member of the Blue Ridge Trail Club, roots for the Carolina Hurricanes and the Charlotte Hornets, and leads a weekend walking group
    that combines cardio with informal soccer drills for their teenage mentees.
  arts: Neidi Vasquez, a passionate salsa and bachata dancer, regularly performs to the rhythms of Marc Anthony and Celia Cruz, volunteers as a cultural‑arts liaison at local festivals, and dives into historical
    fiction by Ken Follett and Hilary Mantel during quiet evenings.
  travel: Neidi Vasquez, who favors purposeful travel, has explored the colonial streets of Antigua, Guatemala, revisited family roots in San Salvador, and enjoys weekend road trips to Asheville, North
    Carolina, where they combine hiking, local food markets, and community dance workshops.
  culinary: Neidi Vasquez, a home‑cook who masters pupusas stuffed with queso fresco and revives yuca frita crisped in avocado oil, cultivates cilantro, oregano, and chiles in their backyard garden, and
    delights friends with their signature salsa verde made from freshly harvested tomatillos.
  core: Neidi Vasquez blends scientific rigor with cultural vibrancy, using their curiosity, organization, and compassion to nurture minds, gardens, and community connections while dancing through life's
    challenges.
background:
  cultural: Neidi was born in El Salvador and immigrated to the United States in her early teens, settling in the vibrant Salvadoran community of Atlanta’s DeKalb County. She grew up speaking Spanish at
    home and maintains strong ties to her heritage through family celebrations of Día de los Muertos, La Cumbia festivals, and the preparation of traditional foods. Her Catholic upbringing informs her values
    of compassion, communal responsibility, and respect for elders. These cultural roots shape her teaching philosophy, driving her to create inclusive classrooms where bilingual students feel seen and
    valued, and to champion cultural representation in STEM curricula.
attributes:
  skills: '["Curriculum development","STEM instruction","Project-based learning","Bilingual teaching (English/Spanish)","Educational technology integration","Classroom management","Student mentorship","Data-driven
