  hobbies: '["Salsa dancing","Cooking Salvadoran cuisine","Gardening","Hiking","Reading historical fiction","Volunteering at community festivals","Mentoring youth"]'
  career_goals: Neidi aims to become a department chair or instructional coach within her district, leading a district-wide STEM initiative that bridges classroom learning with local industry partnerships.
    She plans to pursue a master's in educational leadership to influence curriculum policy, expand after-school STEM programs for underrepresented students, and mentor new teachers. Long-term, she envisions
    establishing a community learning center that offers bilingual STEM workshops for immigrant families and high-school students.
