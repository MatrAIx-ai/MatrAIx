  career_goals: He aims to transition from a frontline inspector to a supervisory role, such as Quality Assurance Manager, within the next five years. To support this, he plans to complete his bachelor's
    degree in Industrial Engineering, obtain ASQ Certified Quality Engineer and Six Sigma Black Belt certifications, and lead continuous improvement projects that reduce waste and improve product reliability.
    Long‑term, he envisions establishing a boutique consulting firm that helps small manufacturers implement robust quality systems, allowing him to combine his technical expertise with his passion for
    innovative problem solving.
