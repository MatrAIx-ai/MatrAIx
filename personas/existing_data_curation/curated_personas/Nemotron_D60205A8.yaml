  career_goals: Inspired by his love for art and imagination, Tuan dreams of becoming an illustrator or graphic designer who creates comics and animated stories that make people smile. He is also fascinated
    by how technology can bring ideas to life, so he hopes to explore game design or interactive media in the future. Guided by his caring side, he imagines using his creative skills to teach younger children
    art or to develop programs that help kids manage stress and express emotions. Ultimately, he wants a career that blends creativity, community impact, and the freedom to experiment with new ideas.
