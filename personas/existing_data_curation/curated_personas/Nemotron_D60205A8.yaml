personas:
  professional: Tuan Chaleunsouk is an aspiring junior architect and comic storyteller whose curiosity drives them to experiment with LEGO cityscapes and Minecraft builds, while their love of art and flexible
    approach lets them sketch imaginative narratives without strict schedules.
  sports: Tuan Chaleunsouk enjoys playing on the local youth soccer team, cheering for the regional club, and joining weekend pick‑up basketball games at the community center, while they avidly follow the
    national soccer league’s matches on TV.
  arts: Tuan Chaleunsouk immerses themselves in drawing comic panels, painting watercolor fantasy scenes, listening to pop hits from Ariana Grande and K‑pop group BTS, and contributing to the school’s Art
    Club and after‑school robotics projects.
  travel: Tuan Chaleunsouk loves exploring nearby state parks on nature walks, visiting the city’s science museum during school trips, and dreaming of a family vacation to the Ghibli Museum in Japan, balancing
    curiosity with the comfort of familiar family outings.
  culinary: Tuan Chaleunsouk delights in helping prepare traditional family dishes like spring rolls and pho broth, experimenting with colorful watercolor‑inspired pancakes topped with blueberry swirls,
    and eagerly tasting pizza with extra cheese during weekend movie nights.
  core: Tuan Chaleunsouk is a creatively curious 9‑year‑old who blends imagination from LEGO and Minecraft with a passion for art, yet often battles disorganization and occasional worries, making every
    day a vibrant, slightly chaotic adventure.
background:
  cultural: Tuan comes from a Southeast Asian (Vietnamese) family that balances cultural traditions with life in Sacramento. At home, he hears Vietnamese spoken alongside English, celebrates Tet with festive
    meals and red envelopes, and helps his parents prepare dishes like pho and spring rolls. The family participates in the local Vietnamese community’s cultural festivals, which expose Tuan to traditional
    music, dance, and crafts. While embracing his heritage, he also enjoys the diverse multicultural environment of Sacramento, making friends from various backgrounds and sharing experiences from both
    cultures.
