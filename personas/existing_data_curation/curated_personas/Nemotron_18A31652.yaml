  career_goals: Although retired from full‑time work, Joshua seeks to channel his business acumen and artistic passion into community‑focused roles. He aims to serve on the board of the local art museum,
    mentor emerging entrepreneurs through a small‑business incubator, and author a series of essays exploring the intersection of strategic thinking and creativity. He also plans to enroll in a semester‑long
    art history course at a nearby college and embark on curated travel trips to European cultural capitals with his wife, seeking flexible, enriching experiences rather than rigid commitments.
