personas:
  professional: An enthusiastic five‑year‑old learner named Xochil Zorrilla delights in exploring new ideas during preschool, balancing a love of organized craft projects with spontaneous story‑telling,
    and often challenges classmates with competitive puzzles while they remain reliably attentive to classroom responsibilities.
  sports: A budding sports enthusiast named Xochil Zorrilla joins the Little Lions Soccer Club, cheering for the local junior baseball team the Junior Cubs, enjoys kicking a bright orange soccer ball at
    the community park, and balances energetic play with occasional quiet moments to draw strategies on a notepad, reflecting their competitive spirit and love for organization.
  arts: A curious five‑year‑old named Xochil Zorrilla spends afternoons sketching whimsical animals inspired by Dr. Seuss, listens to The Wiggles and enjoys the vibrant animations of Pixar’s 'Toy Story',
    and regularly participates in preschool art circles where they propose unconventional color combinations, revealing their appreciation for creative expression and skeptical eye for typical conventions.
  travel: An adventurous five‑year‑old named Xochil Zorrilla loves family road trips to the Grand Canyon and a memorable weekend at Disneyland, eagerly plans small excursions with a hand‑drawn map of local
    parks, and balances excitement for new scenery with occasional preference for familiar bedtime routines, showing a mix of curiosity and need for stability.
  culinary: A playful five‑year‑old named Xochil Zorrilla prefers macaroni and cheese, chicken nuggets with ketchup, and strawberry‑banana smoothies, enjoys helping stir batter for pancakes, but often sneaks
    extra raisins into cookies despite parents' reminders, illustrating both a budding culinary curiosity and a small mischievous habit.
  core: Xochil Zorrilla is a fiercely curious five‑year‑old who balances organized creativity with spontaneous play, competes enthusiastically, saves pocket change for prized toys, and navigates health,
    sport, art, and travel with a mix of meticulousness and delightful quirks.
background:
  cultural: Xochil grows up in a bilingual Cuban household where Spanish is spoken alongside English, and family traditions like preparing ropa vieja, plantain fritters, and celebrating Carnaval infuse
    her daily life with rich cultural flavors. The rhythm of Cuban music fills the home, influencing her love for dancing and melodic play. Living in Austin, she experiences a vibrant multicultural environment,
    attending community festivals that showcase a blend of Texan and Latin American arts. This dual exposure nurtures her appreciation for varied artistic expressions, fuels her curiosity about diverse
    cultures, and shapes her identity as a young Cuban‑American who proudly embraces both her heritage and her Texas surroundings.
