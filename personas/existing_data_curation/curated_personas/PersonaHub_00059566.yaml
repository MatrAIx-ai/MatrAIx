persona_description: A bioethicist who advocates for the ethical use of animal-human chimeras in organ donation and opposes the use of Federal funds for this type of research. They are concerned about the
  urgency of the situation but also believe in the need for adequate funding for this type of research to ensure its ethical use. They are interested in new and emerging technologies and are not willing
  to accept them unreservedly based on scientific hypotheses. They are also concerned about the lack of finance from the NIH given the potential advances that can be made with this type of research.
