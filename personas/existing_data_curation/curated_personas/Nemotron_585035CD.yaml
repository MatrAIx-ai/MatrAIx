personas:
  professional: Mary Jenkins, a 21‑year‑old food‑preparation specialist in Tulsa’s bustling restaurant scene, leverages her ServSafe certification, high‑pressure line‑cooking expertise, and natural mentorship
    instincts to keep kitchen stations organized while constantly tweaking recipes—balancing her curiosity for new flavors with the practicality demanded by a fast‑paced service.
  sports: Mary Jenkins spikes for the Tulsa Thunderbirds in the local adult volleyball league, attends weekly line‑dancing classes, and follows the Oklahoma City Thunder and Tulsa Drillers fervently, using
    their games as social gatherings with teammates.
  arts: Mary Jenkins captures food moments with a photo style inspired by Annie Leibovitz, belts out ABBA’s 'Dancing Queen' at karaoke, and draws creative inspiration from musicians like Brittany Howard
    and the theatrical flair of Lin‑Manuel Miranda’s 'Hamilton.'
  travel: Mary Jenkins plans road‑trip itineraries that blend culinary pilgrimages—like Austin’s Food & Wine Festival, Kansas City’s Barbecue Bash, and a weekend rendezvous in Santa Fe—to satisfy her foodie
    curiosity, but she prefers budget‑friendly stays in motels and often books last‑minute to keep costs low.
  culinary: Mary Jenkins, an adept home cook with ServSafe credentials, loves reimagining Southern classics such as shrimp‑and‑grits with basil pesto, collard greens sautéed with garlic and rosemary, and
    crispy fried chicken drizzled with hot honey, always pairing them with farm‑fresh herbs from her balcony garden.
  core: Mary Jenkins is a socially charged, competitive kitchen whiz who swaps high‑energy volleyball spikes for spicy herb‑infused plates, all while juggling a skeptical streak and a habit of snapping
    food photos at every meal.
background:
  cultural: Mary grew up in a middle‑class white family in Tulsa, Oklahoma, where Midwestern values of hard work, hospitality, and community are emphasized. Her family’s heritage includes German and Irish
    ancestors, and family gatherings often revolve around hearty home‑cooked meals such as fried chicken, barbecue ribs, and pot roast, reflecting the broader Southern‑Midwest culinary tradition of the
    region. She was raised attending a local Methodist church, participating in youth group activities that fostered her outgoing nature. The diverse cultural tapestry of Tulsa—Native American, African‑American,
    and Hispanic influences—exposed her to a wide array of flavors, prompting her curiosity about regional cuisines and encouraging her to incorporate multicultural elements into her cooking.
attributes:
  skills: '["ServSafe certification", "Line cooking", "Recipe scaling and adaptation", "Portion control", "Commercial kitchen equipment operation", "Sanitation and hygiene compliance", "Inventory management
    and waste reduction", "Team coordination and mentorship", "Time management under pressure", "Customer service orientation"]'
  hobbies: '["Volleyball (adult league)", "Line dancing", "Karaoke with friends", "Food photography", "Exploring Tulsa''s restaurant scene", "Herb gardening", "Community volunteering at food banks", "Cooking
    competition show fandom", "Experimental home cooking", "Road trips to regional food festivals"]'
  career_goals: Mary aims to leverage her hands‑on experience into a culinary leadership role. In the next two years she plans to enroll in an associate's program in culinary arts at a community college
    near Tulsa, while pursuing advanced certification in nutrition and sustainable cooking. Her medium‑term ambition is to become a sous chef at a farm‑to‑table restaurant that showcases Oklahoma's local
    ingredients. Long‑term, Mary aspires to open her own casual eatery that blends Southern comfort food with inventive, health‑focused twists, and to compete in regional cooking contests to build her reputation.
    She also wishes to mentor other young workers, especially those from the Tulsa community, fostering a culture of practical skill‑building and creative exploration.
