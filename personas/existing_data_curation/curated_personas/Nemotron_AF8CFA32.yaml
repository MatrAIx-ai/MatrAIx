  career_goals: Looking ahead to high school and beyond, Terry aims to turn her curiosity for technology into a career that blends creativity with practical problem solving. She envisions becoming a software
    developer or UX designer who creates user‑friendly apps that simplify everyday tasks, such as school organization tools or environmental awareness platforms. Inspired by local hikes, she also has an
    interest in green technology and environmental science. Her overarching ambition is to stay adaptable, keep learning new skills, and eventually work in a tech‑forward but socially responsible industry.
