persona_description: A systems engineer who specializes in the design and analysis of complex mechanical systems, particularly those involving gears and levers. This individual has a deep understanding
  of the principles of mechanical advantage, gear ratios, and the effects of resistance on the transfer of power. They are skilled in the use of mathematical models and simulations to optimize the performance
  of these systems. This persona is likely to be involved in the development and testing of various types of mechanical systems, such as automotive vehicles, construction equipment, and industrial machinery.
  They may also be involved in the design of new gear systems or the optimization of existing ones for improved efficiency and performance.
