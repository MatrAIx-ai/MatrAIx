persona_description: A logistics company that specializes in sea freight, aiming to reduce their carbon footprint and save money on fuel by partnering with carriers that invest in energy-efficient technology.
  The company is looking for a way to demonstrate their capabilities to their customers and gain a better understanding of the environmental performance of their subcontractors. The company is also interested
  in partnering with ship owners, charterers, builders, and engineers to launch the Sustainable Shipping Initiative. The company is committed to making the vessels themselves more efficient and is looking
  for ways to make the logistics chain as a whole more sustainable.
