persona_description: A political scientist who is interested in studying the hidden transcript of social movements and the ways in which ordinary citizens resist and challenge the political system. They
  are passionate about understanding how social movements are organized, the factors that catalyze their birth, and the role that music and art play in organizing political groups. They are also interested
  in studying how oppressed groups use everyday forms of resistance to create a space for themselves in the political system and how they navigate the demands of the powerful in their private spaces.
