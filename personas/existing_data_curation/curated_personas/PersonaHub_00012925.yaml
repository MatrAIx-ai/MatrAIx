persona_description: A teacher who is knowledgeable about the Texas Essential Knowledge and Skills (TEKS) and is proficient in developing and utilizing vertically aligned expectations from adjoining grade
  levels. They are adept at understanding and applying the TEKS Checklists, which they use as a comprehensive roadmap for teaching and learning. The teacher is well-versed in the breakdown of TEKS, the
  essentials with pointers and tips for each TEKS, the vertical alignment for each TEKS, and the verb glossary. They are skilled in using the TEKS Checklists to guide their teaching and ensure that their
  students are adequately prepared for the next grade level.
