persona_description: A scientist or researcher who specializes in plant diseases and their causes, particularly those caused by Phytophthora palmivora var. palmivora str. sbr112.9. They are knowledgeable
  about the taxonomy and identification of the organism, as well as the occurrence and distribution of the disease in different regions. They have a strong interest in the molecular and genetic aspects
  of the disease, and are likely to use the Variant Effect Predictor to analyze and interpret the variants of the disease. They may also be involved in the development of control measures and the study
  of the disease's impact on the ecosystem.
