  hobbies: '[''Painting (folk art)'', ''Sketching'', ''Visiting art museums'', ''Live music & concerts'', ''Cultural festivals (Día de los Muertos)'', ''Cooking Mexican & fusion cuisine'', ''Yoga and mindfulness'',
