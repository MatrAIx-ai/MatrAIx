  career_goals: Amber aims to advance into a strategic HR leadership role, such as HR Business Partner or Director of People & Culture within a mid-size tech or creative firm in the Austin‑Round Rock corridor.
    She plans to earn her SHRM‑SCP certification and pursue a master's degree in Organizational Psychology to deepen her expertise in employee well‑being and behavioral design. Long-term, she envisions
    launching her own consultancy that integrates artistic methodologies into corporate culture, helping companies cultivate innovative, inclusive workplaces. She also aspires to mentor emerging HR professionals,
    especially those from under‑represented backgrounds, and to contribute thought‑leadership articles on the intersection of creativity and human capital.
