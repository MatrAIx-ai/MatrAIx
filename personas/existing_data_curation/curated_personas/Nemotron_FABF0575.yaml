personas:
  professional: Amber Caballero is a full‑cycle recruitment and employee‑relations specialist who blends meticulous HR analytics with vibrant storytelling, turning onboarding sessions into mini‑art exhibits
    while using their sociable, talkative flair to champion inclusive culture and mitigate workplace stress.
  sports: Amber Caballero follows Austin FC passionately, joins a community soccer league in the fall, balances a weekly yoga practice at a local studio, and dabbles in weekend hiking with the Texas Hill
    Country Trail Club, using these activities to offset stress from work.
  arts: Amber Caballero fills spare moments painting bright Mexican folk art motifs inspired by Frida Kahlo and Diego Rivera, attends indie folk shows featuring Sufjan Stevens and local mariachi evenings,
    and volunteers as a docent at the Round Rock Art Museum, letting their vibrant imagination shape both personal and professional narratives.
  travel: Amber Caballero curates travel itineraries that blend artistic inspiration with cultural immersion, having explored Oaxaca’s vibrant markets, the mural‑laden streets of Guanajuato, and the modern
    galleries of Barcelona, while planning future trips to Kyoto for its Zen gardens and to New Orleans for its jazz heritage, all within a budget that balances airfare and occasional splurges on culinary
    workshops.
  culinary: Amber Caballero is a home‑cooking experimenter who perfects mole poblano, crafts tacos al pastor with fresh pineapple, and fuses them with quinoa‑based bowls, frequently sourcing heirloom chilies
    and avocados at local farmers’ markets while occasionally over‑salting dishes in the excitement of trying new flavor combos.
  core: Amber Caballero is an imaginative HR strategist who blends art, community values, and a touch of worry‑driven perfectionism into every professional and personal pursuit, from vibrant onboarding
    workshops to meticulously planned museum‑filled vacations.
background:
  cultural: Amber was raised in a bilingual household in Round Rock, Texas, where Mexican traditions were woven into daily life. Her parents immigrated from Jalisco, bringing customs such as Día de los
    Muertos altars, quinceañera celebrations, and a love for mariachi music. Speaking Spanish at home gave her deep cultural fluency, and she regularly participates in local Hispanic community events, volunteering
    at the Round Rock Mexican Cultural Center. These experiences fostered a strong sense of family loyalty, communal responsibility, and pride in Mexican folk art, which influences her personal style, culinary
    tastes, and her professional emphasis on inclusive workplace culture.
