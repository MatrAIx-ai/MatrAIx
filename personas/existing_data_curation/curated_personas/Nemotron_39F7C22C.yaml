personas:
  professional: Alexei Snow, a 23‑year‑old aspiring automotive technician and self‑taught IT support specialist, translates their hands‑on curiosity and methodical problem‑solving into a blend of engine
    diagnostics, electronic repairs, and simple scripting, all while maintaining a relaxed, flexible work style that favors independent projects over rigid office schedules.
  sports: Alexei Snow, a solitary hiker and avid angler, belongs to the regional prairie outdoors club where they seasonally fish for trout and hunt deer, and they cheer for the Kansas City Chiefs in football
    and the Kansas City Royals in baseball, using weekend hikes through the Flint Hills as their primary fitness routine.
  arts: Alexei Snow, a sci‑fi aficionado, devours novels by Isaac Asimov and Philip K. Dick while listening to Vangelis’s synth‑driven scores and M83’s ambient tracks, and they unwind after a day of tinkering
    by replaying episodes of The Expanse and sketching concept art inspired by the futuristic tech they read about.
  travel: Alexei Snow prefers low‑key, self‑planned road trips to remote natural sites like Yellowstone, the Badlands, and the Icelandic highlands, combining brief research on forums with a flexible itinerary
    that lets them pause for a solitary hike or a quiet fishing spot whenever the mood strikes.
  culinary: Alexei Snow, a competent but modest home cook, often prepares grilled trout with lemon‑dill, smoky venison stew over a campfire, and quick ramen infused with shiitake mushrooms, favoring simple,
    protein‑rich meals that refuel them after long hikes or DIY sessions.
  core: Alexei Snow, a solitary, anxiety‑driven tinkerer with a competitive streak, converts restless energy into meticulous DIY projects and dreams of a solo repair shop that blends automotive work with
    tech.
background:
  cultural: Alexei grew up in Riley, Kansas, a small, predominantly white farming community in Riley County. The town’s culture emphasizes self‑reliance, practicality, and modesty—values that echo his own
    blend of curiosity and groundedness. His family’s roots trace back to German and Czech immigrants who settled the region in the early 1900s, and he was raised on a modest farm where he learned the basics
    of vehicle upkeep and maintenance from a young age. Local traditions such as county fairs, high‑school sports events, and community potlucks formed the backdrop of his adolescence, though he gravitated
    toward quieter, solitary activities. While the community’s church gatherings are a familiar part of local life, Alexei prefers personal reflection over group worship, finding comfort in the open plains
    and the steady rhythm of hands‑on work.
