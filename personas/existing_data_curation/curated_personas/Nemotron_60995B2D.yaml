personas:
  professional: Paula Maderagarcia, a seasoned technical support and network administration professional with over ten years of experience, leverages her love for routine and clear documentation to streamline
    IT operations while mentoring junior staff through structured, hands‑on training sessions.
  sports: Paula Maderagarcia enjoys salsa dancing at the community center, hikes the familiar Sandia Mountain trails with the New Mexico Trails club, and roots for the Albuquerque Isotopes, balancing her
    active lifestyle with a social, team‑oriented sports enthusiasm.
  arts: Paula Maderagarcia finds creative release in salsa music, regularly listening to Celia Cruz and Los Tigres del Norte while dancing, admires Diego Rivera’s murals at local galleries, and engages
    in board‑game culture, favoring titles like Catan and Ticket to Ride during her weekly game nights.
  travel: Paula Maderagarcia plans her travels with meticulous itineraries, favoring weekend getaways to Santa Fe’s art districts, annual culinary trips to Oaxaca to explore mole origins, and dreams of
    strolling Barcelona’s Gothic Quarter, all while budgeting within her financial plan.
  culinary: Paula Maderagarcia takes pride in crafting authentic tamales and mole poblano, meticulously grinding dried pasilla and ancho chilies with cacao and spices, and balances her cooking hobby with
    occasional experimentations like homemade pho, though she often forgets to pre‑heat the oven when multitasking between PC builds.
  core: Paula Maderagarcia blends a routine‑driven IT career, vibrant salsa socials, community cooking, and a penchant for late‑night custom PC builds into a balanced, socially‑engaged lifestyle.
background:
  cultural: Paula was raised in a bilingual Mexican‑American household in Albuquerque, with her parents emigrating from Jalisco. She grew up speaking Spanish at home and English in school, giving her a
    strong bicultural identity. Family gatherings centered around religious traditions such as celebrating Día de los Muertos and attending Mass, and weekly meals featured dishes like pozole and enchiladas,
    reinforcing her connection to Mexican culinary heritage. She actively participates in the local Hispanic community, joining cultural festivals, supporting Mexican art exhibits, and mentoring younger
    women interested in tech careers. These experiences have shaped her values of community service, respect for elders, and pride in her cultural roots.
attributes:
  skills: '[''Technical troubleshooting'', ''Network configuration and management'', ''Help desk support'', ''Hardware repair and maintenance'', ''System documentation and SOP development'', ''Basic Python
