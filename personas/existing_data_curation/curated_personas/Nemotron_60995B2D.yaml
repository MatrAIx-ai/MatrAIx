  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Hiking in the Sandia Mountains'', ''Volunteering at the local library’s digital‑literacy program'', ''Board game nights'', ''Gardening'',
    ''Custom PC building'', ''Reading mystery novels'']'
  career_goals: Paula aims to complete her bachelor's degree in Information Technology within the next two years while earning industry certifications such as CompTIA Security+ and Cisco CCNA. Her longer‑term
    ambition is to transition into a supervisory role, overseeing a small IT support team for a county agency or nonprofit organization. She also hopes to leverage her community‑focused mindset to develop
    a local tech‑support outreach program that helps small businesses and seniors adopt reliable digital tools. Ultimately, she wants to blend her practical expertise with leadership responsibilities, ensuring
    reliable technology services while fostering a collaborative workplace culture.
