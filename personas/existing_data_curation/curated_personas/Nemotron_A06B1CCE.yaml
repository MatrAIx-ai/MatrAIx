  hobbies: '[''Gardening'', ''Knitting'', ''Reading (classics, biography, local history)'', ''Bridge'', ''Crossword Puzzles'', ''Walking in Parks'', ''Church Choir'', ''Genealogy Research'', ''Baking'']'
  career_goals: Even in retirement, Mary aims to leave a positive legacy by mentoring new teachers, volunteering as a reading program facilitator at the library, and establishing a modest scholarship for
    education majors at a nearby college. She hopes to complete a comprehensive family genealogy project and perhaps write a memoir capturing her three decades of teaching experiences. Maintaining her health,
    staying active in her church choir, and continuing to play bridge with her peers are also central personal ambitions.
