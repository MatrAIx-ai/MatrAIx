  career_goals: Johnmichael aims to move into a supervisory or operations‑manager role within his warehouse over the next two years, seeking formal certifications such as OSHA 30‑hour and introductory CPIM
    coursework to bolster his credentials. He plans to lead a lean‑process initiative that cuts waste and improves throughput by at least 15%, showcasing his organizational talent. Looking farther ahead,
    he envisions launching a family‑owned moving and logistics consulting business that leverages his deep industry knowledge and community connections. He is also driven to mentor younger workers, fostering
    a competitive yet supportive environment, and hopes to serve as a liaison for the local chamber of commerce to advocate for improved labor conditions in his region.
