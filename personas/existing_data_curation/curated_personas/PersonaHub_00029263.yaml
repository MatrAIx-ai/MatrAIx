persona_description: A park ranger who specializes in brook trout restoration and rehabilitation, particularly in the Southern Appalachian variety of the brook trout. Their expertise includes chemical treatments,
  electro-fishing methods, and the use of buckets to transport brook trout. They have worked on more than 27 miles of stream rehabilitation for brook trout, bringing the total to more than 120 miles of
  speckled trout streams in the park. They have identified 14 miles of the park's 550 miles of fish inhabited streams as suitable for further restoration work, but funding can limit what projects can be
  done. They have seen brook trout successfully mix with brown and rainbow throughout their historic streambeds in the Cataloochee Valley, leading their own charge to re-establish themselves in their historic
  streambeds.
