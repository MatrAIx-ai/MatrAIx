personas:
  professional: An experienced grocery cashier with three decades of meticulous cash handling and bilingual customer service, Jessica Zeledon now channels their methodical expertise into mentoring new cashiers
    and coordinating the senior center's Cultural Cafe, and they balance a love for structured routines with a natural flair for leading group activities.
  sports: A devoted fan of Texas sports, Jessica Zeledon follows the Dallas Cowboys and Houston Astros religiously, they attend senior-center game-watch gatherings, and they participate in a light-impact
    walking group that meets after bingo night, while steering clear of high-intensity activities that aggravate their knees.
  arts: A charismatic member of the local Catholic choir, Jessica Zeledon delights in leading bolero sing-alongs featuring Luis Miguel and Chavela Vargas, they teach folk-dance steps at community workshops,
    and they host crocheting circles where they share patterns inspired by traditional designs, all of which satisfy their sociable nature and need for predictable creative routines.
  travel: An organized traveler, Jessica Zeledon prefers short, well-planned trips such as seasonal visits to the San Antonio River Walk and annual family reunions in Oaxaca, they meticulously arrange accommodations
    and itineraries months in advance, and they budget modestly to keep the adventure within a fixed travel fund.
  culinary: A devoted home chef, Jessica Zeledon masterfully prepares mole, pozole, and pan de muerto using home-grown chilies, cilantro, and marigolds, they refine their tamale recipe for a prospective
    farmer's market kiosk, and they enjoy the predictable rhythm of chopping, simmering, and sharing dishes with neighbors and family.
  core: Jessica Zeledon, a 76-year-old organized social butterfly, blends meticulous routines with community-centered joy, and they often channel their worry into careful planning that colors their vibrant
    daily life.
background:
  cultural: Born and raised in Weslaco, Texas, Jessica grew up in a bilingual Mexican-American household where Spanish was spoken at home and English at school. Her family observed traditional Mexican celebrations
    such as Día de los Muertos, Las Posadas, and quinceañeras, and she learned to prepare staple dishes like tamales and mole from her abuela. The close-knit, border-region community of Hidalgo County,
    where Mexican customs intertwine with Texan influences, shaped her values of family loyalty, respect for elders, and communal reciprocity. A devout Catholic, she attends Mass regularly and participates
    in parish festivals that blend religious and cultural rituals. Jessica’s heritage instills a strong sense of pride, and she actively works to preserve and share Mexican traditions with younger generations
    through cooking classes, storytelling, and cultural events.
