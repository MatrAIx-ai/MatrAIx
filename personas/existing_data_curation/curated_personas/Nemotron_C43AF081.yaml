  hobbies: '[''Church choir singing'', ''Senior center bingo participation'', ''Crocheting circle leadership'', ''Gardening (chilies, cilantro, marigolds)'', ''Traditional Mexican cooking'', ''Walking along
    Rio Grande promenade'', ''Listening to boleros on portable radio'', ''Folk-dance workshops'', ''Storytelling sessions at senior center'', ''Organizing Cultural Café events'']'
  career_goals: Even at 76, Jessica’s career aspirations are grounded in her desire for stability, purposeful engagement, and a legacy of community service. She aims to shift from full-time cashier responsibilities
    to a part-time mentorship role, formally guiding newly hired cashiers through best practices and procedural standards. Additionally, she seeks to become the lead coordinator for her senior center’s
    weekly “Cultural Café,” designing orderly programming that celebrates Mexican traditions, facilitates group dancing, and hosts storytelling sessions. A long-held dream is to open a modest kiosk at the
    Weslaco farmers market, selling her family’s homemade tamales and café de olla, thereby creating a small, sustainable income stream. Underpinning these goals is her focus on a predictable schedule that
    eases her anxiety, financial independence, and continued social interaction.
