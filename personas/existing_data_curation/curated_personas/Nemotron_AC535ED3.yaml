  career_goals: Although retired, Akhilesh aims to remain active and independent by preserving his health through daily walks and regular wellness check‑ups. He wishes to document his family’s recipes and
    stories in a handwritten memoir to share with his grandchildren, reinforcing cultural heritage. He also aspires to expand his role at the senior center by leading a weekly gardening club, fostering
    community among a small, familiar group, and to support his wife by handling more of the household logistics as they age.
