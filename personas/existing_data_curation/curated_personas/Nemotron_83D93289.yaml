  career_goals: Even at three, Dyllan loves to imagine grown‑up roles. He frequently pretends to be a firefighter, marveling at the bright trucks and the idea of helping people, and he aspires to be a teacher
    one day because he enjoys showing friends how to build towers. His ambition is guided by a desire to be helpful, brave, and admired by his peers, and he often talks about future adventures like driving
    a big truck or rescuing animals.
