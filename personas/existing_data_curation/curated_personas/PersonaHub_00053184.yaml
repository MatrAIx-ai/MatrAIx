persona_description: A teacher who uses literature to teach about Native Americans and counter the idea that they no longer exist. They have a passion for multicultural education and social justice, and
  believe that literature has a crucial role to play in promoting an understanding of different cultures and perspectives. They are skilled in using a variety of teaching strategies, such as using photo
  essays and other texts to introduce students to Native children and their families, and creating Venn diagrams to compare and contrast their ideas about Native Americans at the beginning of the lesson
  with what they now know. They are knowledgeable about the Common Core State Standards and have aligned this lesson plan to the standards in the states in which it has been adopted.
