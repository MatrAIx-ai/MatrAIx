  career_goals: Diana dreams of a future where she can combine her love for animals, her desire to help others, and her appreciation for structure. She hopes to become a veterinarian so she can care for
    pets and wildlife, providing a stable and predictable career path. At the same time, she envisions herself as a science teacher for younger students, where she can share her curiosity and create a supportive,
    orderly classroom environment. Later, she also imagines working in community health or youth counseling within the Latino community, using her kindness and cooperative nature to promote harmony and
    well‑being.
