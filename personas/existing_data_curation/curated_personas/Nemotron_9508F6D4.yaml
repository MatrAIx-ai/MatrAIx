personas:
  professional: Diana Hernandez is an aspiring game‑strategist and comic‑creator who blends her love of fantasy storytelling with strategic video‑game thinking, channeling her structured mindset into meticulous
    plot outlines while allowing her spontaneous curiosity to spark unexpected twists in her artwork.
  sports: Diana Hernandez follows the Springfield Tigers youth soccer team and is a fan of the Chicago Bulls, participates in cultural dance classes that double as exercise, trains with the Springfield
    Youth Soccer Club, and occasionally joins the school’s after‑school track club, preferring small‑group drills over large crowds.
  arts: Diana Hernandez draws inspiration from Hayao Miyazaki’s whimsical animation, Neil Gaiman’s mythic prose, and Stan Lee’s dynamic comic storytelling, spends evenings listening to indie band The Paper
    Kites while sketching comic strips, and attends community theater productions of ‘Peter Pan’ whenever possible.
  travel: Diana Hernandez has explored the Grand Canyon and the Smithsonian National Museum of Natural History, dreams of wandering Kyoto’s bamboo forest and the streets of Barcelona, prefers planning trips
    with detailed itineraries yet occasionally adds spontaneous stops at quirky roadside diners, and balances family budget constraints with a passion for cultural immersion.
  culinary: Diana Hernandez enjoys cooking homemade pizza topped with mozzarella, pepperoni, and fresh basil, has mastered chocolate chip cookies, experiments with sushi rolls using nori, sushi rice, and
    avocado, yet often over‑salts sauces when distracted by background music.
  core: Diana Hernandez is a quiet yet curious 12‑year‑old who balances meticulous planning with sudden bursts of imagination, channels worries into journal pages, and occasionally forgets to finish homework
    in favor of sketching epic comic scenes.
background:
  cultural: Diana comes from a Mexican‑American family that keeps many traditions alive in their home in Perris, California. Spanish is spoken daily alongside English, and family gatherings often feature
    celebrations of Día de los Muertos, Mexican Independence Day, and holiday feasts of tamales, pozole, and homemade salsa. She participates in a local cultural club where she learns folkloric dance and
    helps prepare dishes for community events. Her family places high value on close‑knit relationships, respect for elders, and mutual support, which influence her cooperative and harmony‑seeking personality.
    Growing up in Riverside County, Diana blends these cultural influences with the diverse environment of Southern California, shaping her identity and outlook on community involvement.
