  hobbies: '[''Abstract watercolor painting'', ''Reading poetry and literature'', ''Creative journaling'', ''Herb gardening'', ''Traditional Southeast Asian cooking'', ''Photography of nature'', ''Crocheting'',
    ''Attending art fairs and cultural festivals'', ''Listening to classical piano music'', ''Calligraphy'']'
  career_goals: Even at 81, Phokham aims to leave a lasting cultural legacy. She hopes to curate a community exhibition showcasing senior artists, publish a memoir that weaves together her migration story,
    artistic journey, and family oral histories, and develop a mentorship program that connects local youth with Southeast Asian art practices. She also wishes to travel back to Laos to reconnect with her
    roots and record traditional recipes for future generations, while maintaining her health and independence to continue creating and sharing her work.
