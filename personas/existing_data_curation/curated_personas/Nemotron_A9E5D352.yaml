  career_goals: Ramon aspires to become a civil engineer, motivated by a desire to design safe, functional infrastructure that benefits his community in rural Georgia. He plans to attend a reputable engineering
    program, earn a degree, and eventually work on projects that improve roads, bridges, and public facilities in his hometown. He also hopes to mentor younger students, combining his technical interests
    with his compassionate and cooperative nature, perhaps by volunteering as a tutor or leading a youth STEM club.
