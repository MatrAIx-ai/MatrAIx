  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non‑fiction'', ''Volunteering at historical society'', ''Bridge'', ''Community theater attendance'', ''Shoreline walks'', ''Birdwatching'',
    ''Photography'']'
  career_goals: Although retired, Rory aims to keep his mind active and his skills sharp. He plans to master advanced woodworking techniques, such as dovetail joinery and furniture restoration, and to document
    his knowledge in a handwritten guide for younger hobbyists. He also aspires to expand his volunteer role by leading a neighborhood "handy‑person" mentorship program, helping seniors with home maintenance
    while fostering intergenerational connections. Managing his anxiety remains a priority, so he is committed to regular mindfulness practice and participating in a local support group for seniors experiencing
    emotional distress.
