persona_description: A professional educator who is passionate about promoting stress management and emotional resilience in students, especially in grades one to six. They are experienced in teaching and
  implementing various strategies to help students understand and cope with stress. They have a deep understanding of the impact of stress on health and learning and are committed to helping educators,
  social service workers, caregivers, and parents create teachable moments to introduce stress management strategies and build emotional resiliency. They are interested in purchasing the Kids Have Stress
  Too! Grade 1-3 Guide and would like to attend the 2.1b Kids Have Stress Too! Grades 1-6 Training to gain a deeper understanding of the program content and stress management activities for the classroom
  and beyond.
