  Best Generated Conversation: 'User 1: Hey, what''s up?


    User 2: Not much, just cooking dinner.


    User 1: Oh, what are you making?


    User 2: I''m making chicken fajitas.


    User 1: Chicken fajitas?! That sounds delicious! I love chicken fajitas.


    User 2: Me too, they''re my favorite!


    User 1: I''m a little jealous, I wish I had some of that right now.


    User 2: I''ll have to send you some leftovers.


    User 1: That would be awesome, thanks!


    User 2: No problem. So, what are you up to today?


    User 1: Not much, just hanging out with my dogs and cats.


    User 2: I love animals, I have two dogs and a cat myself.


    User 1: Oh, that''s great! What are their names?


    User 2: My dogs'' names are Buddy and Bailey, and my cat''s name is Smokey.


    User 1: Those are great names! I love dogs, but I''m not so good with cats.


    User 2: It''s okay, not everyone is a cat person.


    User 1: I''m not really sure what it is about them, but they just make me nervous.


    User 2: I can understand that. They can be a little unpredictable sometimes.


    User 1: Yeah, that''s it. I just don''t trust them.


    User 2: Well, you''re welcome to come over and visit my cats anytime you want. I''ll keep them away from you.


    User 1: Thanks for the offer, I might just take you up on that.


    User 2: Anytime! So, what else do you like to do for fun?


    User 1: I like to play video games, watch movies, and read.


    User 2: I like to do all those things too! What kind of video games do you like to play?


    User 1: I like all kinds of video games, but my favorite is probably Quake.


    User 2: Quake! That''s a classic! I haven''t played that game in a long time.


    User 1: I still play it all the time. It''s so much fun!


    User 2: Maybe I''ll have to reinstall it and give it a try again.


    User 1: You should! It''s still a lot of fun.


    User 2: I''m going to have to do that. So, what do you like to watch on TV?


    User 1: I like to watch a lot of different things, but my favorite shows are probably The Walking Dead, Game of Thrones, and Seinfeld.


    User 2: I love The Walking Dead! I''m also a big fan of Game of Thrones. I haven''t seen Seinfeld, though.


    User 1: You should check it out! It''s a really funny show.


    User 2: I''ll have to do that. So, what do you like to read?


    User 1: I like to read all kinds of books, but my favorite genre is probably science fiction.


    User 2: I like science fiction too! What are some of your favorite books?


    User 1: Some of my favorite science fiction books are Dune, Foundation, and The Hitchhiker''s Guide to the Galaxy.


    User 2: I love Dune! I''ve read all of the books in the series. I haven''t read Foundation or The Hitchhiker''s Guide to the Galaxy, though.


    User 1: You should check them out! They''re both really good.


    User 2: I''ll have to do that. It looks like we have a lot in common.


    User 1: It sure does! I''m glad we met.


    User 2: Me too'
