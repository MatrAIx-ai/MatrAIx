  career_goals: Although still young, Apolinar dreams of becoming an aerospace engineer or astronaut, inspired by his fascination with rockets and space exploration. He aims to maintain top grades in math
    and science throughout middle school, win regional robotics competitions, and eventually attend a STEM‑focused high school. He also hopes to design sustainable infrastructure for his hometown, blending
    his practical mindset with his curiosity. Long‑term, he wants to lead a team that creates innovative, environmentally friendly technologies.
