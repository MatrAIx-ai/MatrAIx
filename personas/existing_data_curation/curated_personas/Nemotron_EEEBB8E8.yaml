personas:
  professional: Apolinar Gaviria is a budding software tinkerer who translates the strategic depth of chess and the structural logic of complex LEGO sets into Scratch game prototypes, applying a practical
    curiosity and reliable attention to detail while they competitively test each creation against friends.
  sports: Apolinar Gaviria plays forward for the Bayside Strikers U10 soccer team, training twice a week at the community field where they hone teamwork and competitive drive, while also dedicating solo
    dribbling drills after school and cheering for Metro City FC during weekend broadcasts.
  arts: Apolinar Gaviria channels creativity through LEGO architect Nathan Sawaya’s designs, crafts Scratch games while listening to the playful piano pieces of Yiruma, and they immerse themselves in family
    festivities by dancing to the lively rhythms of the folk trio Los Tres and singing along to the animated film 'Coco' soundtrack.
  travel: Apolinar Gaviria prefers family‑led trips that blend hands‑on learning with adventure, having explored the local science museum’s planetarium, taken a weekend road‑trip to the Grand Canyon, and
    joined grandparents on a countryside garden stay, while they daydream about a future visit to the Kennedy Space Center in Florida and a cultural excursion to Barcelona’s Gaudí sites, always balancing
    parental budget limits with school calendars.
  culinary: Apolinar Gaviria serves as the junior sous‑chef in their grandparents’ kitchen, expertly whisking batter for chocolate chip cookies, rolling masa for pork tamales with salsa verde, and assembling
    cheese‑laden tacos with fresh cilantro and lime, while they also enjoy pepperoni pizza and swap avocado slices into homemade guacamole.
  core: Apolinar Gaviria is a curious, competitive nine‑year‑old who juggles LEGO engineering, Scratch coding, chess strategy, soccer drills, and lively family traditions, and they balance solo problem‑solving
    with vibrant communal celebrations.
background:
  cultural: Apolinar grows up in a Mexican‑American household in Santa Maria, a city with a strong Latino presence. Spanish is spoken at home, and he learns to switch seamlessly between Spanish and English.
    He participates in cultural celebrations such as Día de los Muertos, Las Posadas, and Cinco de Mayo, where he helps prepare tamales, piñatas, and other traditional foods. His family follows Catholic
    traditions, attending Mass regularly and observing religious holidays. The close‑knit family structure and community values of hard work, respect for elders, and mutual support shape his disciplined
    yet flexible approach to tasks. At school, he navigates a bicultural environment, appreciating both his Mexican heritage and the broader American culture.
