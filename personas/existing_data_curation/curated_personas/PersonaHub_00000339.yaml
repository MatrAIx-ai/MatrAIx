persona_description: A theatre historian with a specialization in the study of early Kentucky theatre, focusing on the development and growth of the theatre scene in Lexington, Frankfort, and Louisville.
  They are interested in the impact of the theatre on the cultural and social life of the region, and have a particular interest in the role of smaller towns in the development of the theatre. They have
  a deep understanding of the literary and cultural context of the time, and are skilled in using primary sources such as Ralph Leslie Rusk's The Literature of the Middle Western Frontier to gather information
  for their thesis.
