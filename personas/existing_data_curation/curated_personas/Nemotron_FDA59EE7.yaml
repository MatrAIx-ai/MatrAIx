personas:
  professional: Jose Leon, a 34‑year‑old front‑end developer and UX designer, blends Python‑backed data analysis expertise with a keen eye for visual storytelling, applying systematic problem‑solving and
    collaborative project management to craft accessible digital experiences for socially‑impactful platforms serving under‑represented communities.
  sports: Jose Leon, an avid hiker in the Blue Ridge foothills, is a member of the Asheville Trailblazers climbing club, follows the Carolina Hurricanes for winter excitement, and joins a weekend pick‑up
    soccer league that keeps a casual yet competitive edge to their fitness routine.
  arts: Jose Leon regularly immerses themselves in contemporary art by visiting exhibitions featuring artists like Ai Weiwei, Yayoi Kusama, and Banksy, while their own digital photography projects capture
    candid street moments inspired by the cinematic lighting of Wong Kar‑Wai and the surreal compositions of Alex Prager.
  travel: Jose Leon loves thoughtfully curated trips that blend cultural immersion and visual inspiration, having explored the murals of Valparaíso, the historic cafes of Granada, and frequently day‑trips
    to Asheville’s Blue Ridge Parkway while planning a future visit to Kyoto’s seasonal temples for photographic research.
  culinary: Jose Leon enjoys cooking hearty heritage‑inspired dishes such as a rice and bean stew seasoned with achiote and citrus, slow‑roasted pork shoulder, and handmade tamales, showcasing a moderate
    skill level that balances precise plating for guests with spontaneous improvisation in the kitchen.
  core: Jose Leon is a curious, art‑driven technologist who transforms data into beautiful user experiences, often juggling late‑night coding sessions with spontaneous camera walks, all while hoarding a
    collection of vintage lenses that never quite fits in any bag.
background:
  cultural: Jose grew up in a bilingual household of Nicaraguan immigrants, preserving traditions such as celebrating La Purísima, cooking gallo pinto, and sharing stories of his family’s roots in Granada.
    He maintains close ties to the Nicaraguan diaspora in Fayetteville, often attending cultural events at the local Centro Nicaragüense and speaking Spanish at home. While fully integrated into American
    life, his heritage influences his worldview, fostering a strong sense of community, family loyalty, and appreciation for Latin American art and music.
attributes:
  skills: '[''Python programming'', ''Java development'', ''Data analysis (Pandas, SQL)'', ''Project management'', ''UX/UI design'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Bilingual communication
    (English/Spanish)'', ''Problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Digital photography'', ''Graphic design and illustration'', ''Cooking Nicaraguan cuisine'', ''Listening to and dancing to Latin music'', ''Hiking in
    the Blue Ridge foothills'', ''Reading science‑fiction and popular science'', ''Volunteering in community tech workshops'']'
  career_goals: Jose aims to re‑enter the tech workforce in a role that blends his software engineering background with his passion for art and cultural expression. He is targeting positions as a front‑end
    developer or UX designer at companies that prioritize social impact, especially those serving Latino communities. He also plans to obtain a UX certification and, long‑term, launch a community‑driven
    digital platform that showcases Nicaraguan and broader Latin American artists, providing mentorship and technical training to emerging creators.
