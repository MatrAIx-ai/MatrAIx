persona_description: A researcher at the University of East Anglia who specializes in environmental science and conservation biology. She is particularly interested in the impact of human activities on
  animal migration patterns and the changes in behavior of species due to global environmental change. She has conducted research on the migration patterns of white storks and other species, and has made
  connections between the reliance on landfill sites and the establishment of resident populations. She has also studied the effects of the EU Landfill Directives on the populations of white storks and
  other species.
