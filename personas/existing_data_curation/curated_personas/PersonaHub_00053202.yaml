persona_description: A neuroscientist who conducts research on the effects of videogames on cognitive function, particularly in the elderly population. She is a lead author of a study that found that videogames
  can have beneficial effects on working memory and attention in the elderly, and that properly designed games can counteract some of the mental decline that comes with age. She is skeptical of the therapeutic
  game industry, but is optimistic that her study will serve as a blueprint for designing and testing brain training exercises with more scientific rigor. She is also interested in developing games to help
  with mental disorders, particularly ADHD, autism, depression, and other mental illnesses.
