personas:
  professional: An aspiring junior coder, Carlos Soriano blends a love for LEGO engineering with Scratch programming, designing simple games that follow step‑by‑step logic and often sharing them with the
    small baseball team during practice, showcasing a practical, structured mindset and occasional assertiveness when troubleshooting bugs.
  sports: Sports-wise, Carlos Soriano plays third base for a small youth baseball club that practices at the county field, cheers for the Carolina Hurricanes and the Clemson Tigers, and after games often
    jogs along the Neuse River collecting shells, reflecting a steady, team‑oriented approach to fitness.
  arts: 'Arts-wise, Carlos Soriano enjoys salsa rhythms from Marc Anthony and reggaeton beats by Bad Bunny while sketching LEGO designs, and they are a fan of the animated series "Avatar: The Last Airbender",
    drawing inspiration from its storytelling and visual style for their own game creations.'
  travel: Travel-wise, Carlos Soriano has visited San Juan with family during Three Kings Day celebrations, dreams of exploring the Smithsonian museums in Washington, D.C., and prefers short, well‑planned
    trips that blend cultural festivals with hands‑on activities like building sandcastles on the beach.
  culinary: Culinary-wise, Carlos Soriano loves helping prepare arroz con gandules and alcapurrias on the weekend, seasoning them with sofrito and serving crispy tostones, while also mastering the art of
    making pepperoni pizza from scratch, showcasing a blend of family‑rooted flavors and kid‑friendly favorites.
  core: Carlos Soriano is a structured, curious 10‑year‑old who blends LEGO engineering, Scratch coding, baseball teamwork, and family traditions into a disciplined yet playful routine, occasionally splurging
    on snacks and sometimes forgetting a daily allergy pill.
background:
  cultural: Carlos is a second‑generation Puerto Rican American raised in New Bern, North Carolina. At home, Spanish is spoken alongside English, giving him fluency in both languages. His family maintains
    strong ties to Puerto Rican traditions, celebrating holidays such as Three Kings Day, Noche Buena, and Puerto Rico’s National Day with music, dance, and traditional foods like arroz con gandules and
    alcapurrias. He regularly attends cultural events hosted by the local Puerto Rican community, where he enjoys sharing stories of the island and learning about its history. These experiences shape his
    identity, fostering a deep appreciation for his heritage while integrating into the broader Southern community.
attributes:
  skills: '[''Bilingual (English/Spanish) communication'', ''Organizational and time‑management skills'', ''Mathematics problem‑solving'', ''Reading comprehension'', ''Basic Scratch programming'', ''LEGO
    engineering and spatial reasoning'', ''Team coordination in small‑group activities'']'
  hobbies: '[''Building LEGO models'', ''Scratch programming'', ''Reading adventure and science‑fiction books'', ''Playing baseball in a small community league'', ''Listening to salsa and reggaeton music'',
    ''Cooking traditional Puerto Rican dishes with family'', ''Collecting shells and exploring tide pools'']'
  career_goals: Carlos envisions a future where he can apply his love for structure and problem‑solving to design and build. He aspires to become a civil engineer or architect, focusing on creating safe
    bridges and community spaces in coastal regions like New Bern. He is also fascinated by the local marine environment, nurturing an interest in marine biology, and hopes to combine engineering with environmental
    stewardship. Academically, he aims to excel in STEM subjects to prepare for these paths.
