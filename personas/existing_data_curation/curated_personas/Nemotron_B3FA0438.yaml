personas:
  professional: Edward Villafrade, a budding visual storyteller, channels their high imagination and reliable organization into creating comic panels and digital paintings that weave sci‑fi and fantasy
    narratives, and they are a cooperative team member in the school art club.
  sports: Edward Villafrade enjoys casual after‑school soccer in the neighborhood park, follows the New York Yankees and the New York City FC passionately, participates in the school's fall intramural basketball
    league, and they keep in shape by biking to local trails for sketch stops rather than following a rigorous workout routine.
  arts: Edward Villafrade immerses themselves in drawing comic panels inspired by Jack Kirby, digital painting influenced by Studio Ghibli’s Hayao Miyazaki, writes poetry to the rhythm of Taylor Swift’s
    acoustic ballads, listens to the ambient scores of Yoko Kanno while volunteering at community festivals celebrating vibrant Latin music and cuisine, and they consider theater performances of Lin‑Manuel
    Miranda as a source of narrative inspiration.
  travel: Edward Villafrade prefers weekend trips to nearby nature spots like Shenandoah National Park for sketching, dreams of exploring Tokyo’s Akihabara district and the ancient ruins of Machu Picchu,
    plans itineraries with a mix of detailed map routes and spontaneous detours, and they balance family budget constraints with a yearning for immersive cultural experiences.
  culinary: Edward Villafrade loves experimenting with homemade sushi rolls using fresh avocado and tuna, enjoys the cheesy comfort of a perfectly grilled cheese with a hint of hot chili flakes, can whip
    up spaghetti carbonara with confidence but often burns toast when multitasking between gaming and cooking, and they relish attending local food festivals that showcase vibrant Caribbean dishes like
    arroz con gandules.
  core: Edward Villafrade, a 14‑year‑old imaginative creator, balances meticulous planning with spontaneous world‑building in LEGO and Minecraft, yet they can’t resist a late‑night pizza slice while occasionally
    forgetting to finish homework.
background:
  cultural: Edward comes from a Puerto Rican family that maintains strong ties to its island heritage while living in New Milford, Connecticut. At home Spanish is spoken, and family traditions such as celebrating
    Noche Buena, Día de la Independencia (July 25) and Noche de San Juan are observed with music, dancing, and traditional dishes like arroz con gandules and pasteles. The rhythms of salsa, bomba, and reggaetón
    fill the house, and he often takes part in local Latino festivals and parades. This bicultural upbringing gives him a deep appreciation for both American and Puerto Rican cultures, which informs his
    artistic expression and community involvement.
