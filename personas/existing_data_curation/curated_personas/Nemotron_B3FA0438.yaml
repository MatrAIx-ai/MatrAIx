  career_goals: Edward aspires to enroll in a high‑school program that emphasizes visual arts and technology, then pursue a college degree in visual communication, game design, or animation. He dreams of
    becoming a concept artist or multimedia designer, creating immersive worlds for video games or animated films that blend his love for abstract ideas with his Puerto Rican cultural roots. In the long
    term he hopes to lead creative teams as a creative director, using storytelling and design to celebrate diversity and foster community.
