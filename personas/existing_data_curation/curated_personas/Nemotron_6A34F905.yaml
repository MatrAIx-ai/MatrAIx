  career_goals: Even at seven, Ebony dreams of a future where she can help and inspire others. She imagines becoming a teacher who blends curiosity with solid educational methods, or a community health
    worker who cares for neighbors' well‑being. She is also fascinated by science and engineering, hoping one day to design inventions that make life easier for her community. Her desire for harmony leads
    her to consider roles such as a counselor or youth mentor, where she can support friends who feel stressed. Ultimately, Ebony aims for a career that combines her love for learning, her practical problem‑solving,
    and her commitment to the community.
