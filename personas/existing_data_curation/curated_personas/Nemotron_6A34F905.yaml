personas:
  professional: Ebony is a budding junior community advocate who channels their curiosity and practical sense into organizing neighborhood clean‑up projects, using their natural leadership, teamwork, and
    artistic flair to rally friends, while their occasional worry about getting things right keeps them meticulously planning each event.
  sports: Ebony delights in kicking the ball for the Newark Ironbound Soccer Club’s U‑8 team, cheering on the New York Yankees during family baseball outings, and dancing with the local junior gymnastics
    group, all while maintaining a disciplined routine of stretching and hydration that reflects their energetic yet organized approach to fitness.
  arts: Ebony expresses creativity through vibrant drawings of characters like Spider‑Man and scenes from their favorite Disney movies, sings spiritedly in the church choir with songs by Lin‑Manuel Miranda,
    and twirls in after‑school dance classes to the beats of Beyoncé, weaving together a rich tapestry of artistic appreciation that fuels their imagination.
  travel: Ebony dreams of exploring the historic halls of the Philadelphia Museum of Art after school field trips, enjoys weekend family visits to the bustling streets of New York City’s Times Square, and
    eagerly anticipates a future vacation to Orlando’s theme parks, balancing a love for adventurous discovery with the comfort of familiar family routines.
  culinary: Ebony savors the sweet, buttery flavor of collard greens and the crispy crunch of fried chicken at family soul‑food gatherings, eagerly helps stir mac and cheese in the kitchen, and delights
    in crafting colorful fruit kebabs shaped like LEGO bricks, reflecting a budding culinary curiosity paired with a hearty appreciation for familiar comfort dishes.
  core: Ebony is a spirited, community‑focused seven‑year‑old whose boundless curiosity and love for teamwork are tempered by a tendency to over‑worry and occasionally misplace their LEGO pieces, making
    every day a blend of joyful discovery and gentle self‑management.
background:
  cultural: Ebony is a Black American child raised in Newark, New Jersey, a city known for its vibrant African‑American heritage and cultural diversity. Her family celebrates traditions such as Juneteenth,
    soul food gatherings, and church holidays, which promote a strong sense of community and collective identity. Growing up near the Newark Museum and local community centers, she has been exposed to Black
    art, music, and history programs that reinforce pride in her roots. The multicultural neighborhood, with its blend of Caribbean, African, and other immigrant influences, enriches her worldview and fosters
    her appreciation for cultural expression and social harmony.
