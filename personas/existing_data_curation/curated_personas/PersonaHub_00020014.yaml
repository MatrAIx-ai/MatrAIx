persona_description: A biochemist who specializes in the study of protein dynamics and structure-function relationships, particularly in the measurement and quantification of protein internal motion. His
  research interests include the development of new methods for measuring and understanding protein dynamics, the identification of protein interactions and their role in biological processes, and the use
  of these insights to improve rational drug design. He is particularly interested in the concept of "dark energy" in proteins and its implications for drug design.
