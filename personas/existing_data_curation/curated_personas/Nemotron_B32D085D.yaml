personas:
  professional: Duver Mejia, a retired engineer turned community mentor, applies their analytical engineering background, electrical troubleshooting expertise, and methodical project planning to home‑automation
    builds, woodworking projects, and guiding young STEM enthusiasts, while they balance a healthy skepticism about untested ideas with genuine curiosity.
  sports: Duver Mejia, an avid senior walker and loyal fan of the Boston Red Sox and Boston Celtics, participates in the Providence senior walking club, plays occasional pickleball at the local community
    center, and follows the New England Revolution soccer team seasonally, and they often track player statistics as part of their competitive habit.
  arts: Duver Mejia, a dedicated patron of local cultural festivals, frequently dances to the lively salsa of Marc Anthony and the classic rhythms of Celia Cruz, attends community theater productions featuring
    works by Lin‑Manuel Miranda, and immerses themselves in scientific journals and classical piano recordings by Lang Lang, blending intellectual curiosity with artistic enjoyment, and they consider each
    performance a lesson in rhythm and timing.
  travel: Duver Mejia, a meticulous planner who prefers educational trips over spontaneous tours, has explored the botanical wonders of Kew Gardens in England and the historic streets of a Caribbean coastal
    town, dreams of visiting the pristine vineyards of Mendoza, and they organize annual group visits to nearby New England farms, balancing budget constraints with a love for culturally rich destinations.
  culinary: Duver Mejia, an accomplished home chef, delights in preparing traditional island dishes such as mofongo with garlic shrimp, arroz con gandules seasoned with sofrito, and pastelillos filled with
    seasoned pork, sourcing fresh herbs from their garden and routinely experimenting with locally sourced plantains and avocado, while they sometimes over‑salt the dishes in pursuit of bold flavor.
  core: Duver Mejia, a 74‑year‑old retired engineer, blends methodical curiosity with a competitive edge, tending a thriving heirloom garden, crafting custom furniture, mentoring budding STEM students,
    and savoring authentic island cuisine, all while they occasionally wrestle with health routines and a skeptical streak.
background:
  cultural: Duver was born in Puerto Rico and emigrated to the United States in his early twenties. He maintains a strong Puerto Rican identity, celebrating traditions such as the Fiesta de San Juan, preserving
    family recipes, and speaking Spanish at home. His upbringing emphasized close family ties, community responsibility, and Catholic values. Living in Providence, he bridges his heritage with the local
    community by participating in Hispanic cultural organizations and sharing his experiences with younger generations.
attributes:
  skills: '[''Electrical troubleshooting'', ''Mechanical design'', ''Statistical data analysis'', ''Bilingual communication (Spanish/English)'', ''Project planning and management'', ''Home automation'',
    ''Woodworking craftsmanship'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Cooking Puerto Rican cuisine'', ''Reading scientific journals'', ''Playing chess'', ''Attending cultural festivals'', ''Salsa dancing'']'
  career_goals: Although retired, Duver aims to stay intellectually active by mentoring high school and community‑college students in STEM subjects, especially encouraging students of Puerto Rican descent.
    He plans to document his life story and the migration experience of his family in a memoir, and to develop a small solar‑powered garden system for his home. He also hopes to lead a weekly cooking class
    that preserves traditional Puerto Rican cuisine for the Providence Hispanic community.
