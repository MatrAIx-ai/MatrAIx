personas:
  professional: Jomar Osorto, a seasoned Amarillo firefighter with solid fire suppression, rescue, and hazardous materials expertise, blends their EMT‑B certification and strong incident command skills
    with a curiosity for visual storytelling, using photography to document drills and community‑safety campaigns while eyeing a fire‑captain promotion within five years.
  sports: Jomar Osorto enjoys hiking the rugged trails of Palo Duro Canyon, plays pick‑up basketball with the Amarillo Roughriders’ alumni club, follows the Dallas Cowboys and the Amarillo Sod Poodles,
    and occasionally joins a weekend softball league, balancing outdoor adventure with modest team‑sport participation.
  arts: Jomar Osorto, a board‑game night enthusiast, collects salsa and bomba vinyl records, frequents Amarillo’s contemporary art galleries exhibiting works by local muralist Joaquín Martinez and classic
    landscape photographer Ansel Adams, and channels that appreciation into street‑photography projects that capture the Texas Panhandle’s unique light.
  travel: Jomar Osorto prefers spontaneous road trips across the Southwest, having already explored New Mexico’s Carlsbad Caverns and dreamed of a cultural pilgrimage to San Juan’s historic Old San Juan,
    yet budgets travel loosely, often booking last‑minute motels and relying on friend‑hosted stays to keep costs low.
  culinary: Jomar Osorto loves cooking traditional Puerto Rican dishes such as mofongo, arroz con gandules, and tostones, mastering the perfect sauté of garlic and adobo in a cast‑iron skillet, sharing
    these meals at intimate gatherings while also experimenting with Texas‑style brisket during weekend barbecues.
  core: Jomar Osorto blends firefighting grit with artistic curiosity, juggling a love for camera lenses, vinyl grooves, and spontaneous hikes while habitually juggling paperwork and procrastinating on
    strict schedules.
background:
  cultural: Jomar grew up in a bilingual Puerto Rican household, celebrating traditions such as San Juan festivities, bomba music, and family‑centered gatherings. The values of resilience, hospitality,
    and community service from his heritage influence his approach to firefighting and public outreach. After relocating to Amarillo, he blends his Caribbean roots with the Texan environment, maintaining
    strong ties to the local Puerto Rican diaspora while embracing the broader regional culture.
