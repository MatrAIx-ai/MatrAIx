  career_goals: Jomar aims to advance to a fire captain role within the next five years, completing Fire Officer I and II certifications and obtaining paramedic credentials. He envisions leading a fire‑prevention
    program that integrates artistic elements—such as community murals—to boost public awareness. Mentoring junior firefighters and forging stronger ties between the fire department and local cultural organizations
    are also central to his long‑term ambitions.
