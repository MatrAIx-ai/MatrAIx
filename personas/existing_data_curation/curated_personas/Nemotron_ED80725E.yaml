personas:
  professional: Jyotika Chatterji, a 51-year-old production floor veteran, leverages two decades of equipment mastery and a practical curiosity for lean tools to drive safety, quality, and mentorship on
    the plant while navigating the balance between structured processes and flexible problem-solving.
  sports: Jyotika Chatterji enjoys early morning beach walks along Pacific Coast, participates in a community pickleball league, follows the San Diego Padres and San Diego Wave FC, and joins the Torrey
    Pines Hiking Club for weekend trail hikes, using these activities as a flexible way to stay active without rigid training schedules.
  arts: Jyotika Chatterji finds inspiration in the performances of the Old Globe Theatre, regularly streams concerts by Adele and Yo-Yo Ma, collects vintage film posters of classic movies starring Meryl
    Streep, and attends local workshops on pottery, letting artistic expression counterbalance the technical demands of production work.
  travel: Jyotika Chatterji favors a mix of relaxed road trips and purposeful cultural escapes, having driven the Pacific Coast Highway to Big Sur, explored the historic streets of Santa Fe, and planning
    a future pilgrimage to Kyoto's gardens while balancing travel plans with family responsibilities and a modest travel budget.
  culinary: Jyotika Chatterji delights in crafting spiced lentil stew, herb-roasted chicken, coconut-infused rice, and mango-lime chutney, often harvesting fresh basil, cilantro, and mint from the backyard
    garden to elevate both traditional family recipes and experimental fusion dishes for weekend family feasts.
  core: Jyotika Chatterji blends seasoned production expertise with a curious, flexible outlook, savoring garden-grown flavors, spontaneous budgeting, and community-focused hobbies while navigating occasional
    disorganization and a mild health regimen.
background:
  cultural: Jyotika’s upbringing reflects a blend of Bengali and broader Indian traditions. She grew up celebrating Diwali, Holi, and regional festivals, while speaking Bengali at home and English at school.
    The values of family cohesion, hospitality, and respect for elders are central to her identity. Living in San Diego, she weaves these customs into a multicultural lifestyle, participating in local Indian
    cultural organizations, sharing home‑cooked meals with friends, and integrating the laid‑back coastal vibe of Southern California into her daily routine.
attributes:
  skills: '["operating automated assembly lines", "machine maintenance and troubleshooting", "quality inspection and defect identification", "adherence to OSHA safety protocols", "basic lean manufacturing
    principles (5S, Kaizen)", "team coordination and shift handover", "record keeping using SAP/ERP systems", "training new hires on equipment usage", "bilingual communication (English and Bengali/Hindi)",
    "basic data analysis using Excel"]'
  hobbies: '["Cooking traditional Indian cuisine with a modern twist", "Gardening and growing herbs", "Reading historical fiction and biographies", "Practicing yoga and meditation", "Walking along the San
    Diego coastline", "Volunteering at local cultural festivals", "Attending community workshops on DIY home projects", "Listening to Bollywood and classical Indian music"]'
  career_goals: Looking ahead, Jyotika aims to step into a supervisory role on the production floor within the next few years, earning a Certified Production Technician credential and a lean‑manufacturing
    certification. She wants to lead safety and quality initiatives that foster a supportive team environment, while also helping the plant adopt new automation technologies in a way that respects existing
    workflows. Balancing ambition with family commitments, she seeks a schedule that preserves flexibility for her household and community activities.
