persona_description: A scientist with expertise in parasitology, particularly in the study of coccidian parasites and their role in the immune system. This scientist has conducted research on the development
  of vaccines for coccidian parasites, including Eimeria, EPM, EMS, and S fayeri. They have published research on the protective immunity induced by exposure to coccidian parasites and the use of immunological
  methods to identify the molecular targets that allow one horse not to develop dysregulated inflammatory responses. This scientist is interested in understanding how to induce protective immunity without
  causing drug resistance and is looking for new methods to develop multivalent vaccines that can protect horses against a variety of strains of S neurona.
