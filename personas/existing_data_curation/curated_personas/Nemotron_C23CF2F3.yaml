  career_goals: She aims to advance to the role of Director of Marketing and eventually Chief Marketing Officer within a multinational firm, where she can shape inclusive, data‑driven strategies that amplify
    Latinx consumer voices. Jessica is committed to building high‑performing teams, mentoring women in marketing, and launching innovative digital experiences that deliver measurable ROI. In the longer
    term, she envisions establishing her own consultancy focused on multicultural brand expansion and sustainable marketing practices.
