personas:
  professional: Jessica Decastro, a seasoned marketing strategist with over twenty years of experience, blends rigorous data‑driven planning, bilingual brand storytelling, and disciplined project management
    to lead cross‑functional teams, while her natural sociability fuels collaborative brainstorming sessions and her commitment to structure ensures every campaign hits tight deadlines and ROI targets.
  sports: Jessica Decastro, an active fitness enthusiast, belongs to a Miami Beach tennis club, joins weekly Zumba classes that echo her love for group rhythms, hikes the Everglades and nearby nature preserves
    each month, roots for the Miami Heat and the Miami Dolphins, and intersperses her routine with sunrise yoga sessions to maintain flexibility and mental clarity.
  arts: Jessica Decastro, a devoted lover of music and visual culture, regularly attends live salsa and Latin jazz performances by bands like Afro‑Cuban All Stars and Eddie Palmieri, frequents the Adrienne
    Arsht Center for theatrical productions, curates a vinyl collection featuring Buena Vista Social Club, and explores Wynwood's vibrant street murals, finding inspiration that fuels her creative marketing
    pitches.
  travel: Jessica Decastro, an organized explorer with a penchant for Caribbean and Latin American escapes, plans trips months ahead using detailed spreadsheets, has visited Cartagena, Puerto Rico, and
    the Yucatán Peninsula, enjoys boutique eco‑lodges in Costa Rica’s Monteverde, and dreams of snorkeling in Belize’s Great Blue Hole, always balancing adventure with budget‑friendly accommodations.
  culinary: Jessica Decastro, a confident home chef, masters traditional dishes like ropa vieja, plantain tostones, and citrus‑bright ceviche, seasons with fresh cilantro, cumin, and achiote, loves crafting
    mango‑salsa grilled fish, regularly shops at local farmers’ markets for tropical fruits, and occasionally over‑salts a stew when rushing to prep for community festivals.
  core: Jessica Decastro, a structured yet sociable marketing veteran, balances data‑driven decision‑making with salsa rhythms, yoga breath, meticulous budgeting, and a secret stash of travel brochures
    for her next Caribbean getaway.
background:
  cultural: Born and raised in Miami’s Little Havana, Jessica is a second‑generation Cuban‑American who grew up bilingual in Spanish and English. Her family’s emphasis on hospitality, strong intergenerational
    ties, and celebration of Cuban traditions—such as music, dance, and cuisine—shapes her personal values and professional perspective. She actively participates in local Cuban cultural events, maintains
    close connections with relatives in Cuba, and channels her heritage into marketing work that prioritizes relationship building, cultural relevance, and community empowerment.
