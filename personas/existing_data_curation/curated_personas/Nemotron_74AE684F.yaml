  career_goals: Over the next five years Angela aims to step into senior leadership as an Engineering Manager or Director, overseeing multi-disciplinary teams on large-scale infrastructure projects. She
    plans to obtain her Professional Engineer (PE) license if not already held, champion company-wide sustainability initiatives, and develop a mentorship program to increase diversity in engineering. Long-term,
    she envisions launching her own consulting firm that leverages smart-city technologies and green design principles, while remaining an active speaker at industry conferences and local STEM outreach
    events.
