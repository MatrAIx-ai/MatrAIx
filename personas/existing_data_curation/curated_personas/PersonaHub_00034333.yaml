persona_description: A psychologist who is interested in understanding the origins, evolution, and consequences of cultural phenomena. They are curious about the ways in which psychological processes, such
  as motivation, cognition, and social interaction, shape and influence cultural structures and norms. They are likely to be a social scientist, anthropologist, or cultural psychologist who is interested
  in applying psychological principles to the study of culture. They are also likely to be familiar with the work of Mark Schaller and Christian S. Crandall, as the text is an edited collection of their
  contributions to the field of cultural psychology.
