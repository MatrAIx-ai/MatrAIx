personas:
  professional: A budding robotics enthusiast, Dario Sanchez blends practical problem-solving with a love for structured design, channeling their competitive edge and methodical mindset into building functional
    LEGO mechanisms and coding simple Arduino projects for the school robotics club, where they thrive on clear objectives and predictable outcomes.
  sports: A driven soccer midfielder, Dario Sanchez trains with the school team and a local youth club, studying the tactical discipline of FC Barcelona's midfield play and applying a competitive, structured
    approach to both on-field drills and weekend matches, while they also enjoy the strategic depth of Fortnite in their downtime.
  arts: A precise LEGO architect, Dario Sanchez spends evenings constructing intricate cityscapes, watches Minecraft design streams by Grian for inspiration, and meticulously organizes a collection of Pokemon
    trading cards by rarity and theme, channeling both creative imagination and systematic cataloguing into their hobbies.
  travel: A curious teen traveler, Dario Sanchez has explored the historic streets of Cartagena on a family vacation and now dreams of strolling through Japan's Akihabara district to immerse themselves
    in gaming culture, planning each trip with detailed itineraries that balance sightseeing, gaming time, and scheduled meals.
  culinary: An eager kitchen helper, Dario Sanchez assists their mother in preparing arepas stuffed with shredded beef and hallacas flavored with raisins and olives, experimenting with dough consistency
    and spice balance while occasionally swapping the home-cooked feasts for pizza nights with friends, showcasing a blend of tradition and youthful palate.
  core: Competitive and organized, Dario Sanchez is a 14-year-old who thrives on structure, rigorously catalogs LEGO builds and trading cards, balances soccer and gaming with disciplined routines, and occasionally
    procrastinates on homework during marathon video-game sessions.
background:
  cultural: Dario is a second‑generation Venezuelan‑American; his parents emigrated from Venezuela during the early 2010s economic crisis. The family preserves Venezuelan cultural traditions, celebrating
    events such as Carnaval and Día de los Santos Inocentes, and cooking staple foods like arepas, cachapa, and hallacas at home. Spanish is spoken regularly in the household, and Catholic holidays are
    observed with family gatherings. Living in Humble, Texas, Dario blends these heritage practices with typical suburban American life, navigating a bicultural identity that informs his values, food preferences,
    and social interactions.
