    center'']'
  career_goals: As he approaches the next phase of his career, Huy aims to secure the AACE Certified Cost Professional credential and transition into a senior advisory role where he can shape cost‑strategy
    for large‑scale sustainable projects. He envisions establishing a boutique consulting practice that offers cost‑optimization services focused on green building standards and lifecycle cost analysis.
    Mentorship remains a priority; he plans to formalize a mentorship program within his current firm to prepare the next generation of estimators. At the same time, Huy seeks a balanced work schedule that
    allows him to support his family's financial goals, enjoy his hobbies, and gradually phase into part‑time consulting as he nears retirement.
