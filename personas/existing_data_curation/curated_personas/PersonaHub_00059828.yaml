persona_description: A political analyst and expert in international relations, with a special focus on China's foreign policy and its impact on its neighbors. They have a deep understanding of the geopolitical
  dynamics between China and its downstream countries, particularly India and Bangladesh, and have a keen interest in the potential environmental and water security consequences of China's dam-building
  projects on the Tibetan Plateau. They are also knowledgeable about the broader implications of China's ambitions to go forward with such projects in the Tibetan Plateau, including the geopolitical ramifications
  well beyond the typical issues in Sino-India relations.
