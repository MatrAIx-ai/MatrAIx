  hobbies: '[''Organic gardening'', ''Quilting'', ''Reading Southern literature and biographies'', ''Hiking and nature photography'', ''Listening to blues and jazz'', ''Playing chess'', ''Cooking Southern
    cuisine'', ''Attending community festivals'', ''Volunteering at the local senior center'', ''Exploring DIY home improvement projects'']'
  career_goals: Jennifer aims to grow her one‑person operation into a small, reliable crew that can handle larger residential projects and occasional historic‑preservation work in Webster County. She plans
    to earn a lead‑safe certification to expand into older homes and to develop a niche in custom mural and decorative paint finishes that reflect local heritage. Over the next five years she hopes to mentor
    a junior apprentice, establish a modest side line selling hand‑painted furniture, and ultimately transition to part‑time work that balances steady income with more creative, self‑directed painting projects.
