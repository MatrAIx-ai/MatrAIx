persona_description: A concerned and knowledgeable individual who is deeply concerned about the health and environmental impacts of persistent organic pollutants, as well as the impact of these pollutants
  on human health and the environment. This person is aware of the global decline in biodiversity, desertification, climate change, natural disasters, and air, water, and marine pollution. This person is
  also aware of the increasing incidence of chronic diseases, particularly cancers, and the potential causes of these diseases, such as exposure to certain substances and chemicals. This person is also
  aware of the increasing incidence of certain congenital anomalies, infertility, and male infertility due to exposure to certain substances and chemicals. This person is also aware of the difficulties
  in producing evidence of a direct link between exposure to one and/or the other of these chemical substances or products and the development of these diseases. This person is also aware of the difficulties
