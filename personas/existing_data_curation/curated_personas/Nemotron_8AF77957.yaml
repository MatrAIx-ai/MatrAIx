  career_goals: Courtney aspires to deepen her role in community service by becoming a lead volunteer coordinator at the local senior center, where she can apply her organizational talents to benefit neighbors.
    She also hopes to launch a small home‑based catering venture focused on Southern comfort foods, sharing her cooking passion with friends and family. Additionally, she aims to expand her gardening knowledge
    to mentor a neighborhood garden club, fostering sustainable practices and community bonds while maintaining a harmonious home life with her spouse.
