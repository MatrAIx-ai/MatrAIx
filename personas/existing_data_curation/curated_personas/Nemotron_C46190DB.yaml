personas:
  professional: Ann Bohannon, an aspiring occupational therapist completing a bachelor's degree on Long Island, merges meticulous client‑centered assessments with inventive, hands‑on interventions—such
    as integrating salsa rhythms into fine‑motor exercises—while leveraging their sociable, collaborative nature and flexible, occasionally disorganized scheduling to lead group workshops that boost social
    engagement and functional independence.
  sports: Ann Bohannon plays competitive volleyball with the Long Island Volleyball Club, roots for the New York Islanders and New York Yankees on game nights, and joins friends for weekend hikes in the
    nearby Pine Barrens, preferring group‑focused fitness that doubles as social bonding and often encourages them to lead spontaneous pick‑up games.
  arts: Ann Bohannon shines on stage in community theater productions of plays like 'Our Town,' sways to salsa rhythms with Celia Cruz, and frequents open‑mic nights where they admire the lyrical storytelling
    of Lin‑Manuel Miranda and the indie rock vibes of The Strokes.
  travel: Ann Bohannon favors spontaneous weekend getaways—such as a sunrise hike in the Catskills and a planned, budget‑friendly backpacking adventure through Barcelona’s vibrant salsa scene—while also
    enjoying short road trips to Boston and the Hamptons that blend cultural exploration with visits to friends across the Northeast, and they often juggle these trips with a modest student‑loan budget.
  culinary: Ann Bohannon, an intermediate home cook, loves experimenting with lime‑marinated shrimp tacos, cauliflower gnocchi tossed in sage butter, and seasonal pumpkin ravioli, frequently seasoning dishes
    with fresh basil, jalapeños, and a dash of smoked paprika, and they take pride in sharing these creations at potluck gatherings with friends.
  core: Ann Bohannon is a gregarious, slightly disorganized 22‑year‑old who infuses therapeutic practice with salsa flair, constantly worries about upcoming deadlines, and thrives on spontaneous social
    and creative experiences, so they often push themselves into new group activities.
background:
  cultural: Ann was raised in Uniondale, NY, a suburban community in Nassau County on Long Island. Her family’s white, middle‑class background emphasized education, community involvement, and personal responsibility.
    Growing up near the cultural diversity of New York City, she developed an openness to varied traditions while maintaining a New York suburban identity characterized by independence, volunteerism, and
    a balanced work‑life ethic.
attributes:
  skills: '[''Client assessment and goal setting'', ''Evidence‑based therapeutic interventions'', ''Adaptive equipment training'', ''Group activity design and facilitation'', ''Interdisciplinary team collaboration'',
    ''Effective client communication'', ''Creative problem solving'', ''Stress management strategies'']'
  hobbies: '[''Salsa dancing'', ''Volleyball'', ''Community theater'', ''Experimental cooking'', ''DIY home décor'', ''Hiking'', ''Yoga and meditation'', ''Journaling'', ''Live music concerts'']'
  career_goals: Ann aims to earn a bachelor’s degree in occupational therapy within the next two years and later pursue a master’s specialization in mental‑health OT. She wants to develop community‑based
    programs that integrate stress‑reduction techniques and social engagement for adolescents and adults, and eventually become a certified hand therapist. Long‑term, she hopes to mentor new therapists
    and secure a flexible work schedule that supports her own mental well‑being while allowing her to continue leading group activities and workshops.
