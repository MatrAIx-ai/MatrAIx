  career_goals: Sonia aims to further refine the efficiency of the office she oversees by implementing low‑stress, technology‑assisted workflows that reduce error rates and free staff time for focused work.
    She aspires to mentor emerging supervisors, fostering a culture of quiet competence and mutual support. In the next five years she hopes to earn a certification in office technology management and to
    design a comprehensive training program that will be adopted across the district. Post‑retirement, she envisions consulting for small nonprofits in the Maryville area, helping them establish sustainable
    administrative practices while maintaining a low‑key, behind‑the‑scenes role.
