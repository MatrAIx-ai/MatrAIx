  career_goals: Although no longer part of the formal workforce, Samantha’s ambitions center on deepening her influence within the local community and leaving a lasting family legacy. She aims to take a
    leadership role in the senior center’s health‑wellness program, coordinating workshops on stress‑management and nutrition to help peers cope with anxiety. Samantha also wants to compile a detailed family
    genealogy and write a memoir that captures her life’s lessons, preserving stories for her grandchildren. Physically, she plans to complete the Lincoln Senior Walking Challenge to stay active and reduce
    stress. She dreams of winning the annual Lancaster County gardening competition, channeling her competitive nature into a creative outlet. Lastly, she hopes to mentor younger women in the church’s outreach
    group, sharing her budgeting and event‑planning know‑how.
