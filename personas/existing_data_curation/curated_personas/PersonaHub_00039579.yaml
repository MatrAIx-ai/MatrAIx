persona_description: A research scientist specializing in the study of celestial mechanics and astrophysics, particularly in the fields of galaxy formation, satellite dynamics, and the Milky Way's system
  of satellites. They have extensive experience in using advanced observational techniques and theoretical models to analyze the kinematics, orbital properties, and orbital dynamics of dwarf galaxies around
  the Milky Way. They are skilled in using Gaia data release 2 to derive accurate proper motions, tangential velocities, and orbital parameters for a large sample of dwarf galaxies, and are able to accurately
  determine the eccentricities, pericenters, and apocenters of their orbits for both Milky Way potential models. Their work has significant implications for our understanding of the Milky Way's mass, dark
  matter content, and the distribution of dwarf galaxies around the galaxy.
