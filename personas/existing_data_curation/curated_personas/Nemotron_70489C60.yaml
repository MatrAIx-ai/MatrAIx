personas:
  professional: James Wheeler, a 30‑year‑old real‑estate broker in Aurora, blends rigorous market analysis and data‑driven pricing with a designer’s eye for visual storytelling, using drone photography
    and virtual‑tour tech to sell eco‑friendly homes while navigating client negotiations with intuitive emotional intelligence and a relaxed, improvisational work style that sometimes leaves paperwork
    scattered on the kitchen table.
  sports: James Wheeler hits the Rockies’ trails for weekend hikes and mountain‑bike rides with the Colorado Mountain Bikers club, cheers on the Denver Broncos on Sundays, follows the Colorado Rapids in
    the MLS season, and occasionally joins a local ultimate‑frisbee pickup game after improv workshops.
  arts: James Wheeler paints abstract watercolors inspired by Mark Rothko, strums acoustic guitar to Kurt Vile tunes at casual jam sessions, volunteers at the Aurora Arts Festival where they showcase VR
    installations, and cites the improvisational humor of The Second City as a favorite influence on their creative process.
  travel: James Wheeler plans trips on a whim, favoring road‑trip adventures to Santa Fe for its art markets, a spontaneous weekend in Asheville’s craft‑brew scene, and a bucket‑list hike through Iceland’s
    volcanic landscapes, all while balancing family duties by booking family‑friendly Airbnb stays that accommodate their home‑brewing hobby.
  culinary: James Wheeler experiments with home‑brewed IPA blends and pairs them with Colorado lamb stew, sourdough pizza topped with truffle oil, and pork carnitas tacos seasoned with green chilies and
    cumin, cooking at an intermediate‑advanced level while constantly tweaking recipes to fuse classic comfort foods with bold, craft‑beer‑inspired flavors.
  core: James Wheeler is a creatively driven real‑estate professional who channels a love of abstract art, spontaneous planning, and community collaboration into every deal, even if their desk occasionally
    resembles a controlled chaos of paint tubes, brewing kits, and unfinished contracts.
background:
  cultural: James grew up in a middle-class suburban neighborhood on the outskirts of Denver before moving to Aurora, Colorado. He is of primarily German and Irish ancestry, reflecting a typical white American
    heritage, but his upbringing in the diverse Aurora metro area exposed him to a mosaic of cultures, including Hispanic, African-American, and Asian communities. This blend of frontier-spirit independence
    and multicultural urban life shaped his values of hard work, community involvement, and an appreciation for artistic expression. His marriage and family life are central to his identity, and he often
    draws on the supportive, collaborative ethos of his local community in both his personal and professional endeavors.
