  hobbies: '[''Gardening'', ''Traditional Puerto Rican Cooking'', ''Walking in Local Parks'', ''Reading Historical Fiction'', ''Crocheting'', ''Salsa Dancing'', ''Volunteer Tutoring'', ''Attending Community
    Cultural Events'']'
  career_goals: In retirement, Eloisa aims to translate her organizational strengths into meaningful community contributions. She plans to lead the planning committee for the annual Puerto Rican cultural
    celebration in Rochester, mentor younger volunteers on event logistics, and complete a short certification in digital tools for senior outreach. She also hopes to document her family's migration story
    in a memoir, preserving cultural heritage for future generations.
