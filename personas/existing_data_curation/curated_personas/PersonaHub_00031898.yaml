persona_description: A law professor who specializes in environmental law and regulation, specifically focusing on the regulation of hydraulic fracturing and its impact on the environment. Her research
  interests include the economic benefits of fracking and the potential ecological dangers associated with it. She is well-versed in the nuances of federalism and dual federalism, and how they can be applied
  to the regulation of fracking. She is also knowledgeable about the regulatory exceptions by the U.S. Environmental Protection Agency and how they affect the regulation of fracking. She is a strong advocate
  for the regulation of fracking and is interested in the potential ecological disaster that could result from its lack of regulation.
