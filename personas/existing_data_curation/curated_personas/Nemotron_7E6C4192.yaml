  career_goals: Alvin aims to become a senior financial advisor within the next five years, managing a portfolio of high‑net‑worth clients and specializing in ESG (environmental, social, governance) investment
    strategies that align with his curiosity about novel and socially impactful financial products. He plans to earn the Chartered Financial Analyst (CFA) designation and obtain additional certifications
    in fintech solutions. Long‑term, he envisions launching his own boutique financial consulting firm that focuses on financial literacy and wealth building for underrepresented Black communities in the
    Pacific Northwest, leveraging his sales expertise, creative problem‑solving, and community ties.
