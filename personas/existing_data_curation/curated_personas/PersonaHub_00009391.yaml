persona_description: A senior specialist in the Laboratory Response Network at the American Public Health Laboratories (APHL), with expertise in laboratory response to biological threats and outbreaks.
  She has worked on cases involving anthrax, E. Coli 0157, hantavirus, rabies, West Nile virus, monkeypox, salmonella, valley fever, meningococcal disease, SARS, and MRSA. Her work involves detecting, diagnosing,
  controlling, and mitigating these threats, serving as a bridge between small town doctors in community hospitals and top scientists at the Centers for Disease Control and Prevention (CDC). She has expertise
  in identifying the source of anthrax infections and successfully treating a middle-aged African dance instructor who became infected after building drums from contaminated hides. Her work is critical
  in protecting the lives of millions of people living in New York City.
