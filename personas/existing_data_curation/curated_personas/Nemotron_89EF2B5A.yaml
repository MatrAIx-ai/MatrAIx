personas:
  professional: Marines Soza is a seasoned carpenter with over three decades of experience, blending masterful joinery and custom furniture design with a painter’s eye for coastal aesthetics, while their
    spontaneous nature often leads to flexible project timelines and a penchant for mentoring apprentices through hands‑on problem‑solving.
  sports: Marines Soza enjoys sailing his modest sailboat on the Gulf, follows the Miami Marlins and Tampa Bay Rays faithfully, participates in a local fishing club that meets in the Florida Keys, and maintains
    fitness through occasional kayaking and walking the historic streets of Key West, though a lack of structured workouts sometimes leaves their stamina uneven.
  arts: Marines Soza captures the world through analog photography with a vintage Leica, paints watercolor coastal scenes inspired by the hues of the Atlantic, dances to classic Cuban son from Buena Vista
    Social Club and local jazz at community festivals, and finds artistic inspiration in the works of Winslow Homer and contemporary Caribbean painters.
  travel: Marines Soza prefers spontaneous, sketch‑filled road trips and sailing excursions, having already explored the Florida Keys, the historic streets of Havana, and the Bahamian islands, while dreaming
    of a seasonal retreat in Cuba to reconnect with family roots, always packing a camera and a sketchpad for unplanned creative stops.
  culinary: Marines Soza savors seafood dishes such as grilled snapper with mojo sauce, conch fritters, and key lime pie, enjoys cooking classic Cuban meals like ropa vieja and arroz con pollo, and experiments
    with fresh citrus, garlic, and cilantro in their kitchen, though they sometimes burn the ends of a roast when lost in thought about a new woodworking design.
  core: Marines Soza melds master carpentry with watercolor art, sails and fishes for inspiration, worries about deadlines yet loves spontaneous creativity, and balances a love of Cuban rhythms with a penchant
    for occasional disorganization.
background:
  cultural: Marines was born to Cuban immigrant parents who settled in Monroe County during the 1970s. Growing up in a bilingual household, he absorbed Cuban traditions—food, music, Catholic holidays—while
    navigating the multicultural milieu of Key West. The island’s Caribbean vibe, its historic Spanish colonial architecture, and its fishing community have shaped his aesthetic sensibility and work ethic.
    He maintains close ties to the Cuban‑American community, frequently attending local festivals such as Carnaval de la Calle Ocho, sharing his homemade bodega dishes, and preserving the oral histories
    of older Cuban migrants. This blend of Caribbean warmth and Floridian resilience informs both his personal values and his craftsmanship.
