  hobbies: '[''Watercolor painting'', ''Sailing'', ''Fishing'', ''Listening to Cuban music'', ''Dancing (salsa, son)'', ''Analog photography'', ''Woodworking sculpture'', ''Volunteer teaching'']'
  career_goals: Marines hopes to transition from ad‑hoc contract work to a small boutique workshop where he can produce limited‑edition, art‑inspired furniture that reflects his Cuban roots and the maritime
    spirit of Key West. He aims to secure a steady clientele among local restaurateurs and heritage property owners, and to mentor a younger generation of carpenters, preserving traditional techniques.
    He also dreams of a seasonal retreat in Cuba to reconnect with family heritage, and eventually to document his work in a community exhibition that celebrates Caribbean–Florida craftsmanship.
