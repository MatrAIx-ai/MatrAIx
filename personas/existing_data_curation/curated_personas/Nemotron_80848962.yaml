  career_goals: Stephen aims to move from his current specialist role into an operations management position within the next three to five years, leading a team responsible for enterprise‑wide efficiency
    initiatives. He plans to obtain an MBA with a focus on operations strategy to broaden his strategic perspective. Long‑term, he envisions directing a regional operations department or launching a consultancy
    that helps midsize firms implement data‑driven process improvements, while maintaining a balanced lifestyle that allows for personal growth and community involvement.
