personas:
  professional: Elaine Rascoe, a 14-year-old budding digital illustrator and social-media content creator, merges their love for sketching Saint Helena Island's historic homes with rapid video edits, juggling
    schoolwork and spontaneous art projects while constantly battling organization and deadline pressure.
  sports: Elaine Rascoe shoots hoops with friends at the neighborhood park, participates in a community youth basketball league affiliated with the local YMCA, and roots for the Atlanta Hawks while occasionally
    joining beach volleyball games during the summer months.
  arts: Elaine Rascoe channels their curiosity into digital art using Procreate, draws inspiration from gospel legends like CeCe Winans, hip-hop innovators such as Kendrick Lamar, and the vibrant murals
    of local folk artist T.J. Wiggins, while performing freestyle rap in the church youth choir.
  travel: Elaine Rascoe prefers spontaneous weekend trips, dreaming of exploring the historic streets of Charleston, the jazz districts of New Orleans, and the coastal marshes of the Outer Banks, often
    planning on a shoestring budget with their family and using Instagram to document each adventure.
  culinary: Elaine Rascoe enjoys preparing shrimp and grits and collard greens alongside grandparents, experimenting with hot sauce blends and sweet tea, and while their cooking skill is intermediate, they
    love showcasing these dishes in short TikTok videos to friends.
  core: Elaine Rascoe, a 14-year-old island-rooted digital creator, flits between sketchbooks, basketball courts, and kitchen countertops, often forgetting homework while dreaming up viral videos that celebrate
    their community's stories.
background:
  cultural: Elaine is a Black teenager raised on Saint Helena Island, an area deeply rooted in Gullah‑Geechee culture. Her family preserves the distinctive language, stories, and culinary traditions that
    have been passed down through generations of African‑American rice farmers and artisans. The close‑knit community, church gatherings, and annual festivals provide a rich backdrop of music, dance, and
    oral history. This heritage shapes Elaine’s worldview, inspiring her artistic pursuits and her desire to honor her ancestors while also embracing contemporary forms of expression. She feels a strong
    sense of pride in the island’s heritage and often incorporates Gullah motifs, colors, and narratives into her artwork and performances.
