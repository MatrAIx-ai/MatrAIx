  hobbies: '[''sketching'', ''digital illustration'', ''photography'', ''video creation'', ''social media content'', ''singing'', ''freestyle rap'', ''Gullah storytelling'', ''cooking traditional dishes'',
    ''basketball'', ''beach exploration'', ''attending art fairs'']'
  career_goals: Elaine dreams of turning her love for art and culture into a career that lets her share stories and images with a wide audience. She hopes to attend a high school with a strong visual‑arts
    program, later study graphic design or illustration, and eventually work as a multidisciplinary artist who creates murals, comic‑style narratives, and digital media that celebrate Gullah heritage. She
    also envisions using her voice in music or spoken‑word performances to raise awareness about her community’s history. In the long term, Elaine wants to open a community art space on St. Helena Island
    where young people can explore creativity without rigid structure, blending traditional crafts with modern technology.
