personas:
  professional: Miyuki Kong, a retired quality‑assurance specialist turned community arts‑science curator, leverages three decades of experimental design, statistical analysis, and grant‑writing expertise
    while channeling her meticulous organization, talkative charisma, and competitive drive to orchestrate interdisciplinary exhibitions at the Napa Valley Museum.
  sports: Miyuki Kong, a dedicated member of the Napa Valley Hiking Club’s spring treks and a loyal fan of the Golden State Warriors, sustains fitness through gentle tai‑chi sessions at the community center
    and weekend paddle‑boarding on the Napa River, though they sometimes skip cardio when a new wine tasting event beckons.
  arts: Miyuki Kong, who spends weekends painting watercolor vineyard scenes inspired by Monet and practicing Japanese calligraphy while listening to Yo‑Yo Ma’s cello suites, frequently visits exhibitions
    of contemporary painter Kehinde Wiley and enjoys evenings at the Napa Valley Performing Arts Center watching productions of Shakespeare’s *Twelfth Night*.
  travel: Miyuki Kong, a meticulous planner who leverages senior discounts, has toured the lavender fields of Provence, attended the cherry‑blossom festival in Washington State, and dreams of exploring
    the historic tea houses of Kyoto, yet often postpones trips to accommodate their volunteer tutoring schedule.
  culinary: Miyuki Kong, an adept home chef, regularly prepares delicate sushi rolls with toro and shiso, miso‑glazed eggplant, and seasonal ratatouille paired with a 2016 Napa Cabernet Sauvignon, while
    their pantry boasts yuzu, truffle oil, and heirloom tomatoes cultivated in their garden.
  core: Miyuki Kong fuses scientific rigor with artistic flair, cataloguing every wine bottle in spreadsheets that keep them up late, while their competitive spirit drives them to constantly out‑shine peers
    in community workshops.
background:
  cultural: Miyuki is a second-generation Japanese-Chinese American. Her mother, a native of Osaka, immigrated to California in the 1960s, while her father, originally from Guangzhou, arrived a few years
    later. Growing up in the Bay Area’s multicultural neighborhoods, she was raised bilingual in Japanese and English, with conversational Mandarin learned from her father’s family gatherings. She celebrates
    both Japanese traditions—such as Obon, Shogatsu, and tea ceremony—and Chinese customs like Lunar New Year. This bicultural upbringing instilled a deep respect for discipline, community responsibility,
    and the importance of lifelong learning. As an active member of the local Japanese Cultural Center and the Chinese Heritage Society, she frequently participates in cultural exchange events, cooking
    classes, and intergenerational storytelling circles, weaving her heritage into her everyday life.
