  career_goals: Although retired from full-time employment, Miyuki remains driven to leave a lasting impact on her community. She aims to launch a hybrid art-science exhibition series at the Napa Valley
    Museum that showcases the chemistry of winemaking alongside local visual artists, securing grants to sustain the program. She also aspires to mentor underrepresented high-school students in STEM through
    a hands-on workshop series she will co‑lead with the local community college. Additionally, she plans to author a memoir that weaves her personal experiences of growing up as a Japanese‑Chinese American
    with reflections on scientific inquiry and the art of wine. Ultimately, her ambition is to be recognized as a bridge between scientific rigor and creative expression, fostering interdisciplinary curiosity
    in others.
