personas:
  professional: A civil engineer with eight years of structural and transportation experience, Yang Skubis leverages advanced BIM tools like Revit and Civil 3D while balancing meticulous quality control
    with a willingness to experiment with modular construction and green‑certified materials, all driven by a curiosity that coexists with a pragmatic, deadline‑focused mindset, and they consistently deliver
    code‑compliant designs under pressure.
  sports: A dedicated hiker and occasional soccer enthusiast, Yang Skubis traverses the Long Island Central Pine Barrens on weekends, holds a membership with the Long Island Hiking Club, follows the New
    York Giants and New York Knicks avidly, and joins a local recreational soccer league every spring, using the activity to counterbalance work‑induced stress and they value the camaraderie of the group.
  arts: An avid landscape photographer and part‑time koto player, Yang Skubis finds inspiration in the works of Ansel Adams and Ryuichi Sakamoto, regularly attends exhibitions at the Brooklyn Museum, and
    engages in strategy board games like Terraforming Mars and Settlers of Catan with close friends, and they blend analytical precision with artistic expression.
  travel: A meticulous planner with a love for both adventure and cultural immersion, Yang Skubis has trekked the trails of Kyoto’s Arashiyama Bamboo Grove, explored the volcanic landscapes of Iceland’s
    Golden Circle, and dreams of a future road trip along the Pacific Coast Highway, always packing a lightweight camera and a portable translation app for spontaneous photo essays, and they relish the
    quiet moments of reflection after each journey.
  culinary: A culinary experimenter, Yang Skubis enjoys crafting fusion dishes such as miso‑glazed salmon ramen, char siu pork bao with avocado, and matcha‑infused cheesecake, favoring ingredients like
    shiitake mushrooms, yuzu, and sriracha, and they love experimenting with flavor pairings that surprise the palate.
  core: Yang Skubis blends analytical rigor with creative pursuits, juggling demanding engineering projects, a love for hiking photography, and a perpetual worry about future responsibilities, all while
    they seek balance through meditation, board games, and eclectic cooking experiments.
background:
  cultural: Yang was born to parents of mixed East Asian heritage—his father emigrated from Taiwan and his mother is of Japanese descent—giving him a bicultural upbringing that blends values from both traditions.
    Growing up in a multilingual household, he became fluent in English, Mandarin, and conversational Japanese, and he regularly participates in cultural events organized by the Great Neck Asian community,
    such as Lunar New Year celebrations and local Japanese tea‑ceremony workshops. The East Asian emphasis on harmony, respect for elders, and collective well‑being has shaped his cooperative, considerate
    demeanor and his desire to prioritize the needs of others in both personal and professional settings. At the same time, the cultural premium placed on education and diligence fuels his curiosity and
    commitment to continuous learning, while his sensitivity to stress reflects an awareness of the pressures that come with high achievement. He maintains a strong connection to his roots through language
    study, traditional music, and community service, which together reinforce his balanced approach to life.
