    simulation'', ''Project scheduling (Microsoft Project, Primavera)'', ''Cost estimating & budgeting'', ''LEED and sustainable design'', ''Construction site inspection'', ''Team leadership & coordination'',
    ''Risk assessment & mitigation'']'
  hobbies: '[''Hiking (Long Island trails)'', ''Landscape photography'', ''Japanese language study'', ''Koto practice'', ''Fusion cooking (Japanese‑Chinese‑American)'', ''Reading sustainability & climate
    adaptation nonfiction'', ''STEM mentoring for high‑school students'', ''Mindfulness meditation'', ''Yoga'', ''Strategy board games (Terraforming Mars, Settlers of Catan)'', ''Community service with
    local cultural association'']'
  career_goals: Yang aims to obtain his professional engineer (PE) license within the next year and, over the next five to seven years, progress to a senior project manager or director of engineering role
    where he can shape large‑scale, climate‑resilient infrastructure projects in the New York metropolitan area. He is especially motivated to integrate sustainable design practices—like net‑zero energy
    buildings and green stormwater systems—into mainstream construction, leveraging his technical curiosity while keeping projects financially viable. Long‑term, he envisions establishing a boutique consulting
    firm that offers both practical engineering solutions and innovative, eco‑friendly technologies, while also creating a supportive environment for junior engineers to develop both technical and soft
    skills. He is also intent on maintaining a healthier work‑life balance to mitigate his tendency toward stress and worry.
