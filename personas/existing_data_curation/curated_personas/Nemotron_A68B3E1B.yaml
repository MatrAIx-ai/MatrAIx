  career_goals: Daniel aims to become a lead architect of innovative web experiences that blend technology with artistic expression. He aspires to lead multidisciplinary development teams, shape product
    strategy, and eventually launch his own startup focused on AI‑enhanced creative tools for designers. In parallel, he seeks to mentor underrepresented developers, contribute to high‑impact open‑source
    projects, and earn advanced cloud architecture certifications to deepen his expertise.
