  hobbies: '["Reading non-fiction", "Puzzle solving", "Journaling", "Hiking", "Photography", "Cooking", "Playing acoustic guitar", "Meditation", "Board games with close friends", "Watching indie films"]'
  career_goals: He aims to advance to a department leadership role, such as program director or chair, where he can shape curriculum policy and promote flexible, competency‑based learning pathways. John
    plans to publish research on stress‑resilient teaching strategies for adult students and to develop community partnerships with local hospitality businesses to provide real‑world learning opportunities.
    Ultimately, he seeks tenure and a reputation as a compassionate educator who balances structure with adaptability.
