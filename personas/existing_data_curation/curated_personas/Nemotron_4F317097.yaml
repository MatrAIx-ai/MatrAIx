personas:
  professional: John Lloyd, an instructional designer and adult‑learning specialist, leverages their graduate expertise in curriculum development and LMS platforms like Canvas and Blackboard to engineer
    practice‑oriented courses that blend a love of structure with flexible, competency‑based pathways, while their tendency toward anxiety drives meticulous assessment design and proactive conflict resolution,
    positioning them for a future department leadership role.
  sports: John Lloyd, a dedicated weekend hiker, traverses Red Rock Canyon’s moderate trails each Saturday, participates in a local orienteering club’s quarterly events, roots for the Vegas Golden Knights,
    and joins a small Sunday soccer kick‑about with three close friends for light cardio and camaraderie.
  arts: John Lloyd, a solitary creative, spends evenings strumming acoustic covers of Nick Drake and Elliott Smith, curates a modest desert‑inspired photography portfolio influenced by Ansel Adams, and
    attends a monthly IndieFilm Society screening featuring directors like Wes Anderson and the Dardenne brothers, while board‑game nights sharpen their strategic thinking.
  travel: John Lloyd balances meticulous research with spontaneous planning, having hiked the Grand Canyon, trekked Bryce Canyon’s hoodoos, captured Icelandic highland vistas on a solo photography trip,
    and now keeps a travel wishlist that includes Morocco’s Sahara dunes and Kyoto’s tranquil temples, though their habit of over‑packing often adds extra weight to their luggage.
  culinary: John Lloyd, an enthusiastic home chef, experiments with Mediterranean and Southwestern flavors—perfecting a thyme‑lemon grilled salmon, crafting homemade gnocchi tossed in sage butter, and whipping
    up prickly‑pear salsa for tacos—while their curiosity sometimes yields over‑seasoned dishes that they humorously document in a shared cooking journal.
  core: John Lloyd is a structured yet easy‑going curriculum architect who counters chronic worry with daily meditation, captures desert vistas on hikes with a camera, and occasionally forgets to file receipts
    after a board‑game night, reflecting a blend of meticulousness and laid‑back charm.
background:
  cultural: John is a white American who was raised in a suburban middle‑class family that prized education and self‑reliance. Living in Las Vegas, he is surrounded by a multicultural environment shaped
    by tourism and hospitality, which has broadened his perspective and informs his teaching with real‑world examples. He balances traditional American values such as punctuality and personal responsibility
    with an appreciation for the city’s diverse cultural influences.
