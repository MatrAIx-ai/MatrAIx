  career_goals: Xiaoling aims to advance into a senior executive role, such as Director of Operations or Chief Medical Officer, within a larger health system or integrated care network. She is focused on
    leading organization‑wide quality improvement programs that integrate telehealth and predictive analytics to enhance patient access and satisfaction. Although she only holds a high school diploma, she
    plans to earn a bachelor's degree in health administration and pursue certifications like Certified Medical Manager (CMM) to solidify her credentials. She also aspires to mentor the next generation
    of health services managers, fostering a culture of continuous learning and high performance. Ultimately, she hopes to leave a lasting legacy of operational excellence and compassionate, culturally
    competent patient care in her community.
