  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Community Theater'', ''Art Cooperative Involvement'', ''Festival Treasurer Volunteering'', ''Genealogy Research'', ''Hiking'', ''Historical Fiction
    Reading'', ''Jigsaw Puzzles'']'
  career_goals: Vicki Lynn aims to achieve senior leadership within her accounting firm, targeting a managerial or partner role that allows her to shape firm strategy and mentor the next generation of accountants.
    She is pursuing CPA certification and plans to specialize in advisory services for nonprofit organizations, blending her technical expertise with her passion for community impact. Long‑term, she envisions
    transitioning to a consulting capacity where she can design innovative financial solutions for rural businesses, develop workshops on creative financial storytelling, and possibly author a guide on
    integrating artistic thinking into financial analysis.
