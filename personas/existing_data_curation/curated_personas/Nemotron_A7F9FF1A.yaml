personas:
  professional: Vicki Gomes leverages twenty‑five years of accounting expertise, advanced Excel, VBA, and Tableau proficiency, and a vivid artistic imagination to craft visually compelling financial narratives,
    while methodically mentoring junior staff and driving firm‑wide audit quality as they pursue a partnership role.
  sports: Vicki Gomes embraces early‑morning hikes on Lakeshore State Park trails with their husband, follows the Green Bay Packers and Milwaukee Brewers with devoted enthusiasm, and rides with a local
    senior cycling club twice a week, combining a competitive drive with a love for social camaraderie.
  arts: Vicki Gomes channels imagination into watercolor scenes of wheat fields and misty lakes, regularly exhibiting with the Wisconsin Artists Cooperative, draws inspiration from Claude Monet and Georgia
    O'Keeffe, and volunteers backstage for community theater productions where they blend visual storytelling with performance art.
  travel: Vicki Gomes prefers meticulously planned road trips through the Upper Midwest—such as a fall foliage tour of Michigan’s Upper Peninsula and a summer escape to Door County—while dreaming of an
    artistic pilgrimage to the Dutch canals of Amsterdam, balancing a modest retiree budget with a thirst for cultural immersion.
  culinary: Vicki Gomes enjoys preparing rustic Midwestern dishes like cheese‑curd fondue and herb‑seasoned salmon with dill, favors seasonal ingredients such as heirloom tomatoes and wild mushrooms, and,
    in their quest for bold flavor, sometimes over‑salts meals despite a generally healthy diet.
  core: Vicki Gomes is a methodical accountant with a painter’s eye, a competitive streak hidden behind community theater applause, and a habit of turning every spreadsheet into a story—even if that sometimes
    means overspending on art supplies.
background:
  cultural: Vicki Lynn grew up in a close‑knit rural community in central Wisconsin, the daughter of third‑generation German‑Polish immigrants who settled in Waupaca County in the early 1900s. Her upbringing
    emphasized self‑reliance, practical education, and strong community participation, values reflected in her longstanding involvement with local churches, schools, and civic organizations. The Midwestern
    work ethic, blended with a family tradition of craftsmanship and modest artistic expression, has shaped her balanced outlook—combining disciplined professionalism with a love for creativity and community
    service.
attributes:
  skills: '[''Financial Accounting'', ''External Auditing'', ''Internal Auditing'', ''Tax Preparation'', ''Risk Assessment'', ''Internal Control Design'', ''Advanced Excel'', ''VBA Automation'', ''Data
