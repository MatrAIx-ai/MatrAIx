  career_goals: Even though retired, Marcellus aims to stay actively engaged by volunteering at the local senior center, mentoring younger community members, and documenting the history of Columbus’s African‑American
    neighborhood for future generations. He hopes to serve on the advisory board of a community organization, lead a weekly storytelling circle, and possibly publish a memoir that highlights resilience
    and practical wisdom.
