personas:
  professional: Jiayu Lai is a budding problem‑solver at the preschool level, who combines a boundless curiosity about how things work with a practical knack for following the daily classroom routine; they
    love building simple Lego structures while making sure each piece is placed according to the instruction sheet, which shows their blend of organization and flexibility.
  sports: Jiayu Lai is an enthusiastic playground athlete who plays on the Little Strikers Soccer Club and proudly wears the club’s bright green jersey, while also cheering for the Los Angeles Dodgers during
    family baseball game nights, showing their love for both team participation and professional sports fandom.
  arts: Jiayu Lai is a budding artistic explorer who spends afternoons coloring scenes from the movie ‘Moana’, enjoys the songs of Disney’s ‘Frozen’ soundtrack, and watches the animated series ‘Paw Patrol’,
    all of which feed their creative imagination and gentle love for story‑telling.
  travel: Jiayu Lai is an adventurous little traveler who has visited the local aquarium, spent a weekend at grandparents’ farm in the countryside, and dreams of seeing the towering pyramids of Giza on
    a future family vacation, balancing comfortable familiar trips with big‑picture wanderlust.
  culinary: Jiayu Lai is a picky‑but‑curious eater who adores cheesy macaroni, chicken nuggets with a side of ketchup, fresh apple slices, and loves helping stir pancake batter made from flour, eggs, and
    milk, often sprinkling cinnamon on top for extra flavor.
  core: Jiayu Lai is a curious, organized yet flexible 5‑year‑old who balances play with responsibility, saves pennies, and keeps a calm smile even when the world spins.
background:
  cultural: Jiayu is raised in a Chinese-American household in Oceanside, NY. Her parents speak Mandarin at home and celebrate Lunar New Year with traditional foods, lanterns, and family gatherings. She
    learns cultural values of respect, harmony, and the importance of education through stories and practices shared by her grandparents. Jiayu participates in community cultural festivals, wears a cheongsam
    during special occasions, and enjoys making handmade dumplings with her family. While she embraces the diverse environment of her local preschool, she maintains a strong connection to her East Asian
    heritage through language, cuisine, and cultural celebrations.
