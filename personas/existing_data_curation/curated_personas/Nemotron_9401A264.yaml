  career_goals: Jiayu dreams of a future where she can help others and explore the wonders of living things. She often says she wants to become a veterinarian so she can care for animals, combining her
    curiosity about nature with a practical desire to keep pets healthy. She also enjoys the idea of being a teacher, sharing knowledge with younger children and creating a harmonious learning environment.
    Her ambitions reflect a balance of caring for others, using her practical skills, and satisfying her inquisitive nature.
