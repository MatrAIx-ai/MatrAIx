personas:
  professional: Sean Stokely, a 24‑year‑old education administrator in Omaha, leverages their STEM background, data‑driven curriculum design, and love of community arts to develop STEAM after‑school programs
    that blend rigorous assessment with creative maker‑spaces, while their organized yet flexible nature keeps grant deadlines in check and fosters collaborative partnerships with local tech startups.
  sports: Sean Stokely enjoys a mix of solo and team athletics—riding with the Omaha Cycling Club on weekends, playing forward on a local recreational basketball league, and cheering for the Nebraska Cornhuskers
    football team—while treating fitness as a balance between structured workouts and spontaneous trail runs.
  arts: Sean Stokely immerses themselves in the Omaha contemporary scene by frequenting the Joslyn Art Museum, attending immersive installations at the Bemis Center, performing improv at the Soda Box Theatre,
    and drawing inspiration from artists like Yayoi Kusama and street‑artist Banksy, shaping both their personal aesthetic and STEAM program design.
  travel: Sean Stokely prefers weekend road trips that blend outdoor adventure with cultural stops, having hiked the Badlands, explored the vibrant murals of Denver, and attended a design conference in
    Portland, while dreaming of a future backpack trek through Iceland’s volcanic landscapes and a culinary tour of Japan’s regional cuisines.
  culinary: Sean Stokely’s kitchen experiments range from sous‑vide bison steak with smoked paprika to DIY kimchi and fermented hot sauce, using ingredients like heirloom tomatoes, wild mushrooms, and locally
    sourced honey, and despite a knack for precise recipes they sometimes burn the caramelized sugar when distracted by new project ideas.
  core: Sean Stokely, a 24‑year‑old Omaha‑based STEAM advocate, blends data‑driven program design with a love for art, photography, and experimental cooking, navigating community life with organized curiosity,
    occasional overcommitment, and a habit of juggling schedules with a cup of strong coffee.
background:
  cultural: Sean grew up in a middle‑class family in Omaha, Nebraska, with roots tracing back to German and Irish ancestors who settled in the Midwest generations ago. Immersed in the region’s blend of
    agricultural heritage and growing urban arts scene, he values community involvement, self‑reliance, and inclusive education. Local traditions such as participating in neighborhood festivals, supporting
    the Omaha Children’s Museum, and engaging with the city’s emerging tech and arts startups have shaped his worldview, fostering a balance of pragmatic Midwestern sensibility and an openness to diverse,
    innovative experiences.
attributes:
  skills: '[''Program development'', ''Curriculum design (STEAM)'', ''Data analysis (Python, Excel)'', ''Project management'', ''Grant writing'', ''Child development knowledge'', ''Technology integration'',
