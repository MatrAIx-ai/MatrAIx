  hobbies: '[''Visiting art galleries and installations'', ''Photography'', ''DIY electronics and robotics (Raspberry Pi, Arduino)'', ''Hiking and cycling in Nebraska’s outdoors'', ''Improvisational theater'',
    ''Reading science‑fiction and philosophy'', ''Experimental cooking'']'
  career_goals: Sean aims to advance from his current administrative role to become the director of a community learning center or after‑school program that blends science, technology, engineering, arts,
    and mathematics for under‑served youth in Omaha. He plans to pursue a master's degree in educational leadership within the next two years, expand his expertise in nonprofit management, and eventually
    launch a nonprofit makerspace that offers accessible STEAM workshops, mentorship, and collaborations with local artists and tech startups. His long‑term ambition is to influence regional education policy
    to prioritize equitable access to interdisciplinary learning experiences.
