  career_goals: Johnpaul aims to advance into senior project management, overseeing multi-million-dollar regional infrastructure initiatives that enhance transportation resilience across Central Texas.
    He seeks to obtain a PMP certification and leverage his experience to mentor emerging engineers, fostering a culture of innovation and safety. Long-term, he envisions transitioning to a consulting role
    focused on sustainable, climate‑resilient infrastructure, while serving on the Williamson County Planning Commission to shape public policy and community development.
