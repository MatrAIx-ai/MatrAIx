  hobbies: '[''gardening'', ''woodworking'', ''reading historical nonfiction'', ''fishing'', ''listening to classic rock music'', ''jigsaw puzzles'', ''church fellowship'']'
  career_goals: Though retired, Morris aims to stay actively engaged in his community by expanding his volunteer leadership at the Longview food pantry and mentoring younger volunteers. He wishes to maintain
    his health through regular walking and gardening, and he is motivated to learn basic computer skills to keep in touch with his grandchildren and document his life story in a memoir. A personal ambition
    is to help preserve local town history by contributing oral histories to the Harrison County historical society.
