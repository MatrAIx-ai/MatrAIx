personas:
  professional: Ethel Nguyen blends a love for competitive real‑time strategy gaming with self‑taught digital illustration, eyeing a community‑college path that merges computer science and graphic design
    so they can launch freelance UI/UX projects and indie game prototypes while still keeping a flexible, loosely structured schedule.
  sports: Ethel Nguyen spends weekends at the local skatepark with their Sundown Skate Crew, idolizes the Los Angeles Lakers and the LA Galaxy while also rooting for Team Liquid’s League of Legends roster,
    and treats skateboarding as a casual cardio outlet that balances their sedentary gaming habits.
  arts: Ethel Nguyen channels lo‑fi beats from J Dilla, K‑pop hits by BLACKPINK, and Vietnamese pop ballads by Sơn Tùng M‑TP into their Procreate sketches, draws inspiration from Studio Ghibli’s Hayao Miyazaki
    for character design, and edits short cooking and gaming highlight reels with Adobe Premiere as a personal art showcase.
  travel: Ethel Nguyen prefers short, budget‑friendly trips that blend tech and culture, having explored Tokyo’s Akihabara district and Seoul’s Hongdae neighborhood for anime and K‑pop immersion, while
    dreaming of a future pilgrimage to Paris’s art museums and a road‑trip along the Pacific Coast Highway with their close‑knit skate crew.
  culinary: Ethel Nguyen whips up quick pho broth with star anise, ginger and fish sauce, experiments with bánh mì fillings featuring fresh cilantro and charred pork, and documents each step on their phone
    using a DSLR and a splash of lo‑fi beats, all while perfecting the crispy texture of banh xeo using rice flour and mung beans.
  core: Ethel Nguyen navigates teenage life with a competitive gamer’s edge, a sketch‑filled notebook, and a half‑organized financial plan that fuels both pixel‑perfect designs and spicy noodle experiments.
background:
  cultural: Ethel’s cultural identity is rooted in her Vietnamese heritage, passed down through a close‑knit immigrant family in Houston’s vibrant Chinatown. At home, Vietnamese is spoken alongside English,
    and family meals revolve around traditional dishes that she helps prepare. Celebrations such as Tết (Lunar New Year) are observed with customary rituals, lantern decorations, and visits to local Vietnamese
    markets. Growing up in Houston, she has been exposed to a mix of American pop culture and a thriving Southeast Asian community, which influences her culinary tastes, music preferences, and social circles.
    While she feels a strong sense of pride in her heritage, she also navigates the typical teenage desire for individuality, blending cultural expectations with personal aspirations.
attributes:
  skills: '["Bilingual (English/Vietnamese)", "Basic computer literacy (Windows, internet research)", "Digital illustration (Procreate)", "Video editing (Adobe Premiere)", "Competitive gaming (MOBA/RTS)",
    "Home cooking (Vietnamese cuisine)", "Basic math problem solving"]'
  hobbies: '["Playing video games (MOBA/RTS)", "Digital drawing and illustration", "Cooking Vietnamese dishes", "Listening to music (K‑Pop, Vietnamese pop)", "Reading manga and watching anime", "Skateboarding
    with friends", "Journaling", "Learning coding basics through online tutorials"]'
  career_goals: Ethel is determined to secure her high school diploma or an equivalent GED within the next two years, viewing education as the gateway to greater independence. Her short‑term goal is to
    enroll in a community college program that offers a blend of computer science and graphic design, allowing her to combine her passion for digital art with technical skills. She aspires to work as a
    freelance UI/UX designer or indie game developer, where she can manage her own schedule while delivering creative, user‑focused products. Simultaneously, she hopes to turn her culinary talent into a
    modest side venture by creating a YouTube channel that showcases quick Vietnamese recipes, aiming to build a small online following and generate supplemental income. Ultimately, Ethel envisions a career
    that balances structured learning with flexible, self‑directed projects, giving her both stability and creative freedom.
