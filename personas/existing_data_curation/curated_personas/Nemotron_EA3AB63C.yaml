  career_goals: Edward is drawn to careers that fuse creativity with thoughtful problem‑solving. He envisions a future where he can use visual storytelling—through illustration, animation, or documentary
    photography—to raise awareness about environmental issues. He hopes to attend a liberal arts college that offers a strong visual arts program combined with environmental studies, eventually working
    for a nonprofit organization, a museum, or a design studio that values sustainability and community impact. While still exploring, he is also open to roles in user experience design or educational content
    creation that allow him to blend his artistic skills with his curiosity about technology and nature.
