personas:
  professional: Edward Gernandt, a 14‑year‑old aspiring environmental illustrator and budding coder, merges watercolor sketches of Olympia’s wetlands with Scratch mini‑games that teach ecological concepts,
    reflecting their curiosity, organized yet flexible work ethic, and quiet dedication to collaborative school projects.
  sports: Edward Gernandt plays midfield for the Olympia Youth Soccer League, spends weekends hiking the Nisqually Trail and kayaking on Puget Sound, roots for the Seattle Seahawks and Seattle Sounders,
    and prefers low‑impact fitness like yoga to manage stress, reflecting their love for nature and team camaraderie.
  arts: Edward Gernandt captures the misty Capitol State Forest in watercolors, strums simple folk chords inspired by The Lumineers and Joni Mitchell on an acoustic guitar, creates graphic‑novel panels
    influenced by Art Spiegelman and Neil Gaiman, and shares their art at the school’s art club and local coffeehouse open mic nights.
  travel: Edward Gernandt frequently explores the rain‑soaked trails of Olympic National Park, spends occasional weekend trips in Seattle and Portland, and dreams of trekking Icelandic glaciers, planning
    meticulously with a small group of close friends or family while balancing curiosity with budget constraints.
  culinary: Edward Gernandt enjoys crafting sustainably sourced meals like grilled salmon with dill, kale‑apple slaw, and oat‑milk lattes, often harvesting herbs from a backyard garden for fresh flavor,
    yet they sometimes rely on quick microwavable snacks during late‑night coding sessions.
  core: Edward Gernandt is a quietly curious teen who channels their artistic and environmental passions into watercolor, indie guitar riffs, and code while wrestling with occasional anxiety and a habit
    of over‑thinking small details.
background:
  cultural: Edward comes from a white, middle‑class American family with roots in European (primarily Germanic and Anglo‑Saxon) ancestry, raised in the Pacific Northwest. Growing up in Olympia, Washington,
    he has absorbed the region’s emphasis on outdoor recreation, environmental consciousness, and a laid‑back yet tech‑savvy lifestyle. His family celebrates typical American holidays—Thanksgiving, Christmas,
    and the Fourth of July—while also participating in community events that highlight local ecology and Indigenous heritage, including occasional school lessons about the Squaxin Island Tribe. The cultural
    milieu blends a love for coffeehouse music, artisanal crafts, and sustainability practices, shaping Edward’s appreciation for art, nature, and collaborative community values.
