personas:
  professional: Angelo Schultz, a 38‑year‑old police officer in Evansville, blends meticulous investigative expertise and forensic sketching with a creative flair, leading community outreach and data‑driven
    policing initiatives while aspiring to a detective role in homicide and cyber‑crime.
  sports: Angelo Schultz plays point guard for the River Rats, a neighborhood basketball league, follows the Indiana Pacers for NBA action, joins the local hiking club for weekend trips to Hoosier National
    Forest, and balances active fitness with a penchant for watching the Evansville Otters baseball games on summer evenings.
  arts: Angelo Schultz channels his imagination into watercolor landscapes of the Evansville riverfront and urban sketches of local festivals, draws inspiration from Claude Monet, James Gurney, and the
    graphic novel art of Alex Ross, and curates weekly photography walks that capture neon‑lit cityscapes, while quoting Neil Gaiman and Brandon Sanderson during art workshops.
  travel: 'Angelo Schultz prefers road‑trip adventures that blend nature and culture: they’ve driven the Blue Ridge Parkway to Asheville for folk music, plan a spring trek through the Great Smoky Mountains,
    dream of a winter visit to Reykjavik’s aurora, and schedule local getaways to Cincinnati’s riverfront art district when precinct duties allow.'
  culinary: Angelo Schultz enjoys cooking, favoring dishes like lemon‑herb grilled salmon, smoky chipotle ramen, and homemade shrimp étouffée seasoned with paprika, thyme, and fresh cilantro, while their
    go‑to comfort food is a hearty Midwest pot roast with carrots and potatoes.
  core: Angelo Schultz balances the rigor of law enforcement with the free‑spirited flow of watercolor art, lives by spreadsheets but sometimes forgets to pay the credit‑card balance, and trades midnight
    sketching for early‑morning hikes.
background:
  cultural: Angelo was raised in a Midwestern white family with German and Anglo‑American roots in the Evansville‑Posey County area. His upbringing emphasized modesty, hard work, and a strong sense of civic
    duty—values reinforced by frequent participation in local traditions such as county fairs, 4th of July parades, and church‑based community service. Growing up in a predominantly Protestant environment,
    he attended community gatherings that stressed cooperation and hospitality. This regional culture, combined with his family's emphasis on education and public service, shaped his cooperative nature,
    respect for harmony, and commitment to serving the public.
