  career_goals: Looking ahead, Angelo aims to transition into a detective role within the investigative division, focusing on complex homicides and cyber‑crime cases where his analytical curiosity can thrive.
    He plans to complete his bachelor's degree in Criminal Justice and earn a certification in forensic art, blending his love of abstract concepts with practical policing. Long‑term, he envisions developing
    an arts‑based youth outreach program that uses creative workshops to deter delinquency and strengthen community ties. Ultimately, Angelo hopes to rise to precinct commander, championing innovative,
    data‑driven policing strategies that prioritize harmony, transparency, and public trust.
