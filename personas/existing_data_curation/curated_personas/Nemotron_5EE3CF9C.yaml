personas:
  professional: Alecia Thatcher, an aspiring game designer, channels the strategic depth of chess and the narrative imagination of fantasy graphic novels into creating interactive, story‑driven games on
    Scratch, while they meticulously plan each project with a LEGO‑like precision that they proudly showcase at school exhibitions.
  sports: Alecia Thatcher, a forward on the Oakwood Youth Soccer Club, idolizes the local professional team the River City Rapids and emulates their high‑press style, while also cheering for the national
    women’s team during the World Cup, and they balance a competitive drive with a disciplined training routine tracked on a colorful wall calendar.
  arts: Alecia Thatcher, a charismatic member of the school drama club, draws inspiration from Lin‑Manuel Miranda’s lyrical storytelling and Emma Watson’s stage presence, frequently reenacts scenes from
    beloved fantasy novels, and they curate a scrapbook of festival performances featuring traditional dances they admire.
  travel: Alecia Thatcher, who has explored the historic streets of Boston on a family weekend getaway, dreams of visiting the towering castles of Scotland after a school geography project, and they prefer
    meticulously planned itineraries that allocate time for both a local amusement park and quiet reading spots in public libraries.
  culinary: Alecia Thatcher, an enthusiastic home chef, loves crafting pizza with a perfect blend of mozzarella, pepperoni, and fresh basil, experiments with building edible LEGO‑inspired snack towers,
    and they often whip up banana‑oat muffins after soccer practice, though they sometimes forget to wash their hands before cooking.
  core: Alecia Thatcher is a vibrant 11‑year‑old who blends competitive spirit with creative curiosity, dazzling peers in drama and soccer while they methodically plan each LEGO and Scratch project, yet
    they occasionally splurge on fantasy books and forget to floss.
background:
  cultural: Alecia comes from a white, middle‑class family living in Van Nuys, a suburban enclave of Los Angeles County. Her upbringing reflects typical Southern California values—emphasis on individuality,
    outdoor activities, and a laid‑back lifestyle—while also exposing her to the region's rich multicultural tapestry. She celebrates mainstream American holidays such as Thanksgiving and Fourth of July,
    but also participates in neighborhood events that feature Mexican, Asian, and African‑American cultural influences, giving her a broader appreciation for diverse traditions. The blend of West Coast
    openness and her family's suburban roots shapes her curiosity, practicality, and sociable nature.
