  career_goals: Alecia dreams of becoming a community storyteller—whether as a journalist, documentary filmmaker, or podcast host—who can shine a light on local issues in Van Nuys and empower her peers
    to take action. She envisions using her organizational talent to produce youth‑led events, such as environmental clean‑ups or school fairs, and eventually leading a nonprofit that merges media production
    with social impact. In the longer term, she aspires to hold a leadership position where she can shape policies that support education and community engagement, leveraging her competitive drive to make
    measurable change.
