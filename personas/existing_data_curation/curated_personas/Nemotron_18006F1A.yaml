  hobbies: '["Fishing", "Bluegrass Music (guitar)", "Community Volunteering (charity walks, town halls)", "Reading True Crime", "Attending Policing Technology Workshops", "Mindfulness Meditation", "Journaling",
    "Senior Center Computer Teaching", "Neighborhood Clean‑up Events", "Local Softball League"]'
  career_goals: As he approaches the final years of his service, Brian aims to transition into a strategic leadership role that allows him to shape the department’s community‑policing philosophy. He wants
    to spearhead a department‑wide mental‑health and wellness program that integrates peer support, crisis counseling, and preventive stress‑management training, both for officers and residents. He also
    hopes to earn a bachelor’s degree in criminal justice or public administration to strengthen his policy‑making credentials. Ultimately, Brian envisions serving as a police chief or deputy chief, guiding
    the force toward data‑informed, compassionate policing while preserving the values of his hometown.
