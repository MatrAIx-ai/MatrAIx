personas:
  professional: Thanh Tran, a teenage aspiring graphic novelist and interactive storyteller, merges watercolor illustration with beginner coding to craft immersive visual narratives, channeling curiosity
    and a balanced mix of organization and flexibility into every panel.
  sports: Thanh Tran spends weekends with the Merced United Girls Soccer Club, enjoys skateboarding at the downtown skate park, and fervently supports the San Francisco 49ers and Sacramento Kings, blending
    active participation and loyal fandom across seasons.
  arts: Thanh Tran draws inspiration from graphic masters like Neil Gaiman and Marjane Satrapi, admires the street provocations of Banksy, immerses in indie sounds from The Midnight and Tame Impala, and
    frequently attends open-mic nights where acoustic renditions of Taylor Swift songs inspire new sketches.
  travel: Thanh Tran favors short, well-planned trips with friends, having explored San Francisco's Fisherman's Wharf and Portland's art districts, while dreaming of a backpack adventure through Kyoto's
    temples and the vibrant streets of Barcelona's Gothic Quarter.
  culinary: Thanh Tran experiments with quick meals such as ramen, pho, and veggie stir-fry with tofu, basil, and lime, enjoys baking banana muffins with a hint of cinnamon, and loves the bright flavors
    of fresh mango and cilantro, though they often snack on candy while coding.
  core: Thanh Tran blends insatiable curiosity for art and tech with a habit of staying up late perfecting watercolor blends, occasionally neglecting sleep and sunscreen, yet always finds harmony in helping
    younger peers.
background:
  cultural: Thanh’s family originates from Vietnam and maintains many traditional customs, such as celebrating Tết (Lunar New Year) with home‑cooked dishes, giving lucky red envelopes, and performing folk
    dances. At home, Vietnamese is spoken daily, and family meals often include pho, bánh mì, and spring rolls, fostering a strong connection to her heritage. The family participates in the Merced Vietnamese
    community, attending language classes, cultural workshops, and the annual Vietnamese Cultural Festival. These experiences have shaped Thanh’s respect for harmony, her cooperative nature, and her desire
    to bridge her cultural roots with contemporary artistic expression.
attributes:
  skills: '[''digital illustration (Procreate, Photoshop)'', ''bilingual communication (Vietnamese/English)'', ''basic HTML/CSS web design'', ''hand‑drawn sketching and watercolor'', ''project coordination
    and planning'', ''beginner đàn tranh (Vietnamese zither) playing'', ''research and synthesis for academic projects'']'
  hobbies: '[''digital drawing and graphic novel creation'', ''watercolor painting'', ''reading fantasy and graphic novels'', ''playing đàn tranh and guitar'', ''attending local open‑mic and art events'',
    ''volunteering at community center cultural festivals'', ''coding interactive art projects'']'
  career_goals: Thanh aspires to become a multidisciplinary visual storyteller, ideally working as a graphic designer or user‑experience (UX) artist who can blend contemporary digital media with cultural
    narratives. She hopes to attend a college with a strong art and design program, possibly majoring in visual communication or interactive media. Long‑term, she envisions creating a community art space
    in Merced where young people of diverse backgrounds can explore digital art, traditional crafts, and cultural storytelling. She also wishes to use her bilingual skills to develop culturally relevant
    educational resources for Vietnamese‑American youth.
