  hobbies: '[''Reading science‑fiction and tech blogs'', ''Puzzle solving (crosswords, sudoku)'', ''Urban gardening'', ''Cooking South Asian and Midwestern fusion cuisine'', ''Volunteering to teach computer
    basics to seniors'', ''Hiking in Minnesota state parks'', ''Attending small women‑in‑tech meetups'', ''Playing board games with close friends'', ''Meditation and mindfulness practice'']'
  career_goals: Vilasben aims to transition from a senior analyst role to a solutions architect position where she can design end‑to‑end technology strategies that blend emerging tools with proven frameworks.
    She plans to earn AWS Solutions Architect and PMP certifications within the next two years while leading cross‑functional projects that improve operational efficiency. Long‑term, she hopes to mentor
    other women in tech, contribute to community‑focused tech initiatives in the Twin Cities, and eventually launch a consultancy that helps small businesses adopt sustainable digital solutions without
    compromising cultural values.
