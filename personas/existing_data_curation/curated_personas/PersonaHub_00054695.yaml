persona_description: A historian specializing in the study of the effects of group identification and categorisation on political and social dynamics. Their research interests include, but are not limited
  to, the role of group identity in the formation of political ideologies, the impact of group identification on the perception of threats and enemies, and the use of group identity in propaganda and conflict.
  They are particularly interested in the ways in which group identification and categorisation can be used to justify violence and to create divisions within societies.
