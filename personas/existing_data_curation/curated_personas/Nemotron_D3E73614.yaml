personas:
  professional: Steven Caycedo is a seasoned retail sales associate who leverages meticulous organization, POS expertise, and calm conflict resolution to consistently exceed targets while fostering a cooperative
    floor environment.
  sports: Steven Caycedo is an avid weekend fisherman and occasional hunter who belongs to the Lone Star Anglers club, cheers on the Dallas Cowboys on Sundays, follows the Houston Astros during baseball
    season, and regularly volunteers as a game‑day helper for his hometown high school’s football team.
  arts: Steven Caycedo immerses himself in country music, regularly singing karaoke to the tunes of George Strait and Dolly Parton, attends live shows featuring Luke Bryan, and finds artistic inspiration
    in the storytelling of biographical documentaries about business magnates, which fuels his own creative woodworking designs.
  travel: Steven Caycedo prefers meticulously planned weekend road trips to Texas Hill Country lakes for early‑morning fishing, has already visited British Columbia’s salmon rivers and dreams of angling
    the crystal‑clear streams of New Zealand’s South Island, while balancing family time and a modest travel budget that limits overseas excursions to once every few years.
  culinary: Steven Caycedo enjoys mastering the smoky flavor of Texas‑style brisket and grilled trout, frequently seasoning dishes with rosemary, garlic, and hickory chips, and while their cooking skill
    is solid enough for weekend barbecues and DIY marinades, they relish occasional meals at local food trucks and the occasional upscale steakhouse for a change of pace.
  core: Steven Caycedo is a predictably organized 35‑year‑old who balances early‑dawn fishing trips, country‑music karaoke, meticulous budgeting, and a steady climb toward store‑manager leadership, all
    while occasionally neglecting cardio workouts and hoarding an ever‑growing collection of fishing lures.
background:
  cultural: Steven was raised in the rural South of Tennessee, where Southern hospitality and community cohesion are central values. Growing up in a close‑knit town, he learned the importance of kindness,
    cooperation, and reliability from family and church gatherings. His cultural upbringing emphasizes practical work ethics, respect for tradition, and a love for outdoor recreation. While identifying
    as white American, he embraces the regional customs of country music, home‑cooked meals, and participation in local events, all of which shape his worldview and interpersonal style.
attributes:
  skills: '[''Customer Service'', ''POS System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Cash Handling'', ''Basic Bookkeeping'', ''Conflict Resolution'', ''Team Collaboration'',
