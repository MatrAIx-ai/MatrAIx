persona_description: A civil litigation attorney who specializes in challenging final judgments in civil cases. They are experienced in handling appeals and have a strong understanding of the appellate
  court's standards of review and the principles of sufficiency of evidence and manifest weight of evidence. They are familiar with the types of errors that can be appealed, such as abuse of discretion
  and invited error, and have a deep knowledge of the plain error standard of review. They are skilled in interpreting the plain error rule and applying it in exceptional circumstances. They have a unique
  understanding of the appellate court's role in reviewing civil judgments and have a passion for challenging unjust outcomes in civil litigation.
