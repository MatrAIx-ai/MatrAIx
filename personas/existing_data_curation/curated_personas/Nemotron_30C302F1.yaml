personas:
  professional: Stephen Reeves, a 28‑year‑old network and systems administrator, pairs their deep mastery of VMware, Azure, AWS, PowerShell, and Bash scripting with an imaginative, user‑centric documentation
    style, positioning them for a future senior network architect role focused on resilient, software‑defined infrastructure for remote‑work and nonprofit consulting.
  sports: Stephen Reeves enjoys solitary fitness pursuits such as early‑morning jogs along the Lake Michigan shoreline and weekend kayaking with the local rowing club, while they cheer on the Detroit Red
    Wings and follow the Midwestern soccer team Detroit City FC from a dedicated home‑office TV setup.
  arts: Stephen Reeves indulges their creative side by crafting ambient electronic tracks in Ableton, painting intricate digital canvases in Blender, curating a vinyl collection that includes Aphex Twin,
    Boards of Canada, and Brian Eno, and dissecting independent films by directors like Jim Jarmusch and the Dardenne brothers for artistic inspiration.
  travel: Stephen Reeves prefers low‑key, nature‑focused trips, having trekked the Icelandic highlands, explored the rugged coastline of the Scottish Hebrides, and taken serene road trips to the Upper Peninsula,
    while they dream of a slow‑travel immersion in Japan’s remote alpine villages.
  culinary: Stephen Reeves loves cooking simple, lake‑inspired meals such as grilled lake trout with herb butter, roasted garlic potatoes, and a side of beet salad, while they occasionally experiment with
    homemade ramen broth and savor a slice of New York‑style cheesecake after a late‑night vinyl listening session.
  core: Stephen Reeves, a 28‑year‑old tech professional with a penchant for solitary creativity, balances meticulous network engineering with ambient music production, mindful financial quirks, and a deep‑rooted
    love for lakeside solitude, and they constantly seek harmony between technical precision and artistic expression.
background:
  cultural: Stephen grew up in the suburban Midwest, specifically Roseville, Michigan, in a middle‑class family of European ancestry (primarily German and Irish roots). The region’s blend of practical,
    community‑oriented values and the natural beauty of the Great Lakes shoreline shaped his grounded yet inquisitive outlook. While he embraces typical Midwestern modesty and a strong work ethic, his exposure
    to diverse online communities and global tech culture has broadened his appreciation for artistic expression and inclusive collaboration.
attributes:
  skills: '[''Network troubleshooting'',''Server administration (Windows/Linux)'',''Virtualization (VMware, Hyper‑V)'',''Cloud services (Azure, AWS)'',''Scripting (PowerShell, Bash)'',''Network security
    (firewalls, VPNs)'',''ITIL/ITSM processes'',''Technical documentation'',''User support and training'',''Network automation (Ansible, Terraform)'',''Creative problem solving'',''Cross‑functional collaboration'',''Disaster
    recovery planning'',''Hardware troubleshooting'']'
  hobbies: '[''Digital painting'',''3D modeling (Blender)'',''Ambient music composition'',''Speculative fiction and philosophy reading'',''Raspberry Pi and Arduino tinkering'',''Smart‑home automation projects'',''Nature
    walks'',''Vinyl record collection'',''Independent film viewing'']'
  career_goals: Stephen aims to transition from a hands‑on administrator role to a senior network architect position, focusing on building resilient, secure infrastructures for remote‑work environments
    and community‑focused organizations. He plans to earn industry certifications such as Cisco CCNP, Microsoft Azure Administrator, and AWS Solutions Architect, and to specialize in network automation
    and software‑defined networking. Long‑term, he hopes to lead a small consulting practice that offers affordable IT solutions for local nonprofits, while mentoring junior technicians and volunteering
    to teach basic cybersecurity in community centers.
