personas:
  professional: Ryan Vandeusen, a 7‑year‑old aspiring engineer, channels their love for routine and practical problem‑solving into building intricate LEGO models and designing simple Scratch games, showing
    early technical aptitude while they prefer solitary, organized workspaces.
  sports: Ryan Vandeusen enjoys after‑school bike rides through the woods and occasional little‑league soccer with the River Falls Youth Soccer League, cheering on the Green Bay Packers in fall football
    and the Milwaukee Bucks during basketball season, and they prefer low‑key, solitary exercise over organized team sports.
  arts: Ryan Vandeusen, an avid piano player, practices pieces by Ludwig van Beethoven and contemporary composer Yiruma, draws inspiration from the animated films of Hayao Miyazaki and the pixel art of
    Minecraft, and they create simple digital illustrations that echo the whimsical style of Dr. Seuss.
  travel: Ryan Vandeusen, who delights in nature walks and quiet observation, prefers family trips that blend structured itineraries with unplanned forest hikes, having already explored the Upper Peninsula
    of Michigan and yearning to visit Yellowstone National Park’s geysers and the historic forts of Colonial Williamsburg, and they often ask for a map to track each adventure.
  culinary: Ryan Vandeusen, a budding chef in the kitchen, loves making fluffy pancakes with maple syrup, mac & cheese with a dash of paprika, and assembling snack plates of apple slices, cheddar cubes,
    and pine nuts, yet they often forget to clean up the crumbs, prompting a gentle reminder from Mom.
  core: Ryan Vandeusen is a methodical, solitary 7‑year‑old whose love for LEGO, piano, and nature fuels an orderly imagination that sometimes gets tangled in snack‑induced messes, and they constantly strive
    to balance precision with play.
background:
  cultural: Ryan comes from a white family rooted in the Upper Midwest. He was raised in River Falls, Wisconsin, a small city with a close‑knit community and a strong agricultural presence. His family observes
    traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, and attends a local Lutheran church, reflecting the region’s Protestant heritage. The cultural environment emphasizes
    modesty, self‑reliance, punctuality, and a respect for nature—values evident in his practical pursuits and love of outdoor exploration, even as he prefers solitary activities.
attributes:
  skills: '["Reading","Basic Arithmetic","LEGO Building","Puzzle Solving","Scratch Programming","Piano"]'
  hobbies: '["Reading","LEGO building","Minecraft","Jigsaw puzzles","Piano","Scratch programming","Nature walks","Rock collection"]'
  career_goals: Ryan dreams of a future where he works with hands‑on, structured projects. He hopes to become a software engineer or a mechanical technician, building and maintaining machines or creating
    video games from a quiet workspace. In the short term, he aims to earn a gold star in his school science fair, master a new level in his Scratch coding projects, and learn a new piano piece. He also
    looks forward to gaining certification in basic computer repair as a stepping stone toward a career in technology or engineering.
