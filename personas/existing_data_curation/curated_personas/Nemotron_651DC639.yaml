personas:
  professional: Chun Do is a senior information systems manager who architects resilient multi‑cloud environments on AWS and Azure, drives Agile‑scrum delivery of security‑first digital initiatives, and
    leverages a balanced curiosity‑practicality mindset to mentor cross‑functional teams, negotiate vendor contracts with disciplined cost‑optimization, and maintain composure under pressure.
  sports: Chun Do stays active by cycling with the Solano Cycle Club on weekend rides, practicing Taekwondo at the East Bay Dojang three times weekly, hiking the Carquinez Strait trails each spring, and
    cheering on professional Bay Area teams such as the Golden State Warriors, San Francisco 49ers, and San Jose Sharks, blending structured training with spontaneous outdoor challenges to preserve fitness.
  arts: Chun Do enjoys ambient electronic playlists from Brian Eno and Aphex Twin while devouring sci‑fi novels by Isaac Asimov and Liu Cixin, attends local theater productions featuring work by Lin‑Manuel
    Miranda, and frequents Bay Area galleries showcasing Kehinde Wiley’s vibrant portraits, using these artistic experiences to fuel both strategic thinking and personal reflection.
  travel: Chun Do prefers meticulously planned road trips that balance rugged adventure with cultural immersion, having already explored the towering redwoods of Redwood National Park, wine‑toured Napa
    Valley, and strolled the historic neighborhoods of Lisbon, while dreaming of kayaking the fjords of Norway and attending cherry‑blossom festivals in East Asia on their next extended leave.
  culinary: Chun Do cooks at a confident intermediate level, regularly preparing bibimbap with heirloom carrots, zucchini, and fermented cabbage spiced with gochujang, experimenting with home‑fermented
    kimchi, and sourcing fresh herbs like cilantro and basil from their garden, while seeking out farm‑to‑table restaurants that spotlight seasonal produce.
  core: Chun Do blends methodical tech leadership with a love for solitary hikes, strategic chess, and home‑grown meals, eagerly planning ahead yet leaving room for spontaneous curiosity, though they can
    get lost in spreadsheet minutiae.
background:
  cultural: Chun Do is a first‑generation Korean‑American raised in the San Francisco Bay Area. His parents emigrated from South Korea and emphasized the value of education, community, and respect for elders—principles
    that continue to shape his collaborative and harmonious approach to work and life. Fluent in both English and Korean, Chun regularly engages with the local Korean community, celebrating holidays such
    as Seollal (Lunar New Year) and Chuseok. These cultural touchstones influence his appreciation for collective success, his dedication to mentorship, and his enjoyment of Korean culinary traditions.
    While fully integrated into American society, Chun maintains a strong connection to his heritage, blending Eastern values of balance and harmony with Western entrepreneurial spirit.
attributes:
