  hobbies: '[''Hiking and trail walking'', ''Cycling routes around Benicia'', ''Chess (casual and tournament play)'', ''Home gardening (vegetables and herbs)'', ''Cooking Korean cuisine'', ''Attending Korean
    cultural festivals'', ''Taekwondo training'', ''Reading science‑fiction literature'', ''Listening to ambient electronic music'']'
  career_goals: Chun aims to transition into a senior executive role, such as Director of Information Technology or Chief Technology Officer, where he can drive large‑scale digital transformation initiatives
    across the organization. He plans to deepen his expertise in AI‑enabled infrastructure and cybersecurity, earn certifications like PMP and CISSP, and spearhead a mentorship program that cultivates the
    next generation of tech leaders. Ultimately, Chun envisions building a technology consultancy that helps mid‑size companies adopt sustainable, cloud‑first solutions while maintaining a healthy work‑life
    balance for his team.
