  hobbies: '["Fishing on Lake Okeechobee", "Boating", "Acoustic guitar and gospel choir", "Woodworking", "Classic car restoration", "Cooking Southern comfort meals", "Volunteering at the local youth center",
    "Reading about new manufacturing technologies", "Gardening with a seasonal planting schedule"]'
  career_goals: Andy aims to transition from a hands‑on worker to a supervisory role where he can apply his systematic planning skills to improve shop efficiency and safety. He plans to earn a Certified
    Manufacturing Technologist credential and to gain experience with sustainable manufacturing practices, such as recycled plastic processing. Long‑term, he envisions opening a small, community‑focused
    fabrication shop that provides stable jobs for local residents while allowing him a better work‑life balance and reduced stress.
