personas:
  professional: Andy Jacob is a seasoned fabrication specialist with over two decades of hands‑on experience in metal and plastic manufacturing; they leverage their methodical, safety‑first mindset and
    curiosity for new techniques to mentor apprentices and drive shop‑floor efficiency as they prepare for a supervisory role.
  sports: Andy Jacob enjoys leisurely fishing on Lake Okeechobee, follows the Miami Dolphins and Orlando Magic for football and basketball thrills, and plays in the local Okeechobee Rebels adult softball
    league; they balance team camaraderie with the solitude they crave after long shifts.
  arts: Andy Jacob plays acoustic guitar in his church choir, drawing inspiration from gospel icons like Mahalia Jackson and Aretha Franklin; they also unwind while woodworking to the smooth sounds of Stevie
    Wonder, letting classic soul melodies shape their creative flow.
  travel: Andy Jacob prefers low‑key road trips that blend nature and heritage, having driven the Florida Keys for a weekend getaway and taken his family to New Orleans for blues music and Creole cuisine;
    they dream of fishing in the Great Smoky Mountains and exploring historic Southern towns.
  culinary: Andy Jacob is a confident home cook who masters Southern comfort dishes such as fried catfish with hush‑puppy batter, collard greens simmered with smoked turkey, and sweet potato pie spiced
    with nutmeg and cinnamon; they source fresh shrimp from the lake and pair meals with homemade sweet tea.
  core: Andy Jacob blends a meticulous, community‑focused work ethic with a love for soulful music and fishing, but their tendency to worry about job safety and overcommit to volunteer events often leaves
    their own stress simmering.
background:
  cultural: Andy grew up in a close‑knit African American family in central Florida, with deep roots in the church and community traditions that emphasize mutual support, storytelling, and soulful music.
    His grandparents migrated from the Deep South during the Great Migration, bringing with them a rich heritage of Southern hospitality, soul food recipes, and a strong work ethic. These cultural influences
    shape his values of cooperation, kindness, and a commitment to preserving community ties while also fostering a pragmatic outlook on life.
attributes:
  skills: '["Welding (MIG, TIG, Stick)", "Metal fabrication", "Plastic injection molding", "CNC machine operation", "Blueprint reading", "Preventive maintenance", "Quality inspection", "Safety compliance
