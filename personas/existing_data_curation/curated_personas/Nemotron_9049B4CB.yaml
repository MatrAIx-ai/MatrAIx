personas:
  professional: Jamonte Taylor is a junior creator‑in‑training who blends meticulous LEGO engineering, vivid watercolor illustration, and simple ScratchJr animation to craft imaginative stories, applying
    their disciplined organization and high standards to each project while eagerly presenting their work to peers.
  sports: Jamonte Taylor joins the Tampa Bay Youth Soccer Club’s under‑eight team, models their playing style after the Tampa Bay Rowdies’ midfielders, balances rigorous drills with playful races across
    the park, and uses their sociable energy to rally teammates and celebrate each goal.
  arts: Jamonte Taylor revels in community art workshops where they paint watercolors inspired by Claude Monet, practice piano pieces by Alicia Keys and classic R&B tunes from Marvin Gaye, groove to modern
    hip‑hop beats by Kendrick Lamar, and channel these influences into vibrant sketches and spirited school theater performances.
  travel: Jamonte Taylor spends weekends exploring Tampa’s Lettuce Lake Park and collecting shells at Fort De Soto, dreams of touring the Kennedy Space Center to see rockets up close, and hopes to one day
    visit Paris’s Musée d’Orsay to stand before Monet’s masterpieces.
  culinary: Jamonte Taylor loves homemade spaghetti with meatballs, builds personal pizzas topped with pepperoni, extra mozzarella, and pineapple, enjoys fresh mango slices and avocado toast, proudly helps
    stir shrimp tacos seasoned with cilantro, lime, and chipotle sauce, and often asks for a drizzle of honey on their yogurt for extra sweetness.
  core: Jamonte Taylor is a disciplined, talkative seven‑year‑old whose boundless curiosity fuels art, coding, and soccer, yet their perfectionism and frequent worries sometimes turn simple projects into
    high‑stakes performances.
background:
  cultural: Jamonte is raised in a Black family in Tampa’s vibrant Hillsborough County. His parents emphasize the importance of education, community, and cultural pride. He grows up hearing stories of African‑American
    history, celebrating Juneteenth and Black History Month with books, music, and local events. The family attends a Baptist church where gospel singing and fellowship are central, further nurturing his
    love of music. Neighborhood gatherings often feature soul food, barbecues, and laughter, reinforcing close family bonds. Through community programs such as the Tampa Bay Kids' Arts Initiative, he is
    exposed to African‑American artists and mentors who encourage his creative pursuits. These cultural experiences shape his identity, providing both a sense of belonging and a rich well of artistic inspiration.
