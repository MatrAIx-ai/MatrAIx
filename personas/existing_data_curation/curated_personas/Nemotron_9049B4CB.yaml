  hobbies: '["Drawing and painting", "Reading picture books", "Building with LEGO", "Basic coding games (ScratchJr)", "Playing piano", "School theater and storytelling", "Soccer", "Nature walks and shell
    collecting", "Listening to music (R&B, jazz, hip-hop)", "Community art workshops"]'
  career_goals: Even at seven, Jamonte envisions a future that blends his love of art, technology, and people. He dreams of becoming an animator or video‑game designer who creates vivid worlds, or a multimedia
    artist who tells stories through pictures and interactive media. He also imagines leading a community arts program for kids, using his organizational talent to plan workshops. He hopes to be a confident
    presenter, perhaps hosting a children's educational show, and values high standards, aiming to win school art competitions and excel in any creative pursuit he chooses.
