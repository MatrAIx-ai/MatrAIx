  career_goals: Although no longer in the paid workforce, Stephanie aims to stay actively engaged in her community and maintain her independence. Over the next few years she hopes to lead a weekly cooking
    class at the senior center, compile a community cookbook of her family’s traditional recipes, and serve on the advisory board of the Beaver Dams historical society. She also wishes to preserve her garden
    as a teaching plot for local school children and continue mentoring new volunteers. Maintaining her health through daily walks, regular medical check‑ups, and staying socially connected through group
    outings and church events are personal priorities.
