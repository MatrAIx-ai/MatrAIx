  career_goals: Patricio aspires to blend his love for art, technology, and organization into a career as a multidisciplinary designer‑engineer. He envisions himself creating sustainable, aesthetically
    striking structures or interactive digital experiences, such as video games or virtual museums. His long‑term ambition is to lead innovative projects that integrate cultural storytelling with cutting‑edge
    technology, ultimately contributing to community spaces that celebrate both Mexican heritage and modern design.
