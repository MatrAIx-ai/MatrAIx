personas:
  professional: Patricio Cossio, a budding junior robotics engineer and digital illustrator, blends meticulous LEGO construction with watercolor sketching, and they channel disciplined curiosity into interdisciplinary
    projects aimed at presenting a school‑wide art‑tech showcase.
  sports: Patricio Cossio plays forward for the school soccer team, follows the Los Angeles Galaxy with avid enthusiasm, cheers for the Los Angeles Dodgers during baseball season, and they also hike the
    nearby Santa Monica Mountains on weekends to stay active.
  arts: Patricio Cossio spends afternoons sketching landscapes inspired by Claude Monet, creating watercolor pieces reminiscent of Georgia O'Keeffe, crafting digital illustrations in the style of Hayao
    Miyazaki, and they practice piano works by Ludovico Einaudi while listening to Hans Zimmer’s sci‑fi soundtracks.
  travel: Patricio Cossio delights in weekend nature‑trail excursions in the Santa Monica Mountains, has visited Yosemite National Park with their family, and they dream of traveling to Tokyo to explore
    Akihabara’s anime culture and to Patagonia for its glacial vistas.
  culinary: Patricio Cossio helps their family prepare hand‑rolled corn‑based parcels filled with seasoned meat, served with a tangy tomato‑chili sauce, and they often experiment by adding a pinch of smoked
    paprika to the sauce for a personal twist.
  core: Patricio Cossio thrives on organized creativity, maintaining disciplined robotics schedules while indulging in spontaneous watercolor bursts, never skipping a piano practice before bedtime, and
    they often hum sci‑fi leitmotifs as they perfect LEGO builds.
background:
  cultural: Patricio comes from a Mexican family that maintains strong ties to its cultural roots while living in Nashville, Tennessee. At home, Spanish is spoken alongside English, and family gatherings
    celebrate holidays such as Día de los Muertos and Día de la Independencia with music, storytelling, and traditional foods like tamales and pozole. His parents emphasize respect for elders, community
    support, and the value of education, which aligns with his disciplined personality. Living in a vibrant Southern city, Patricio also embraces local customs, enjoys attending community festivals, and
    is exposed to a blend of Mexican and American cultural influences that shape his identity.
