personas:
  professional: An aspiring community organizer with a talent for logistical planning and persuasive debate, Anastazia Purvis, they channel their critical, routine-focused mindset and outgoing energy into
    coordinating weekly food-drive events for the local pantry, demonstrating reliability and a competitive drive to out‑perform previous fundraising records.
  sports: A forward on the Gresham Middle School soccer team, Anastazia Purvis, they train three times a week, idolize the Portland Timbers and Oregon Ducks, and supplement team practice with weekend hikes
    in the Columbia River Gorge to boost endurance, showing a balance of competitive drive and love for outdoor fitness.
  arts: An avid journaler and mystery‑novel collector, Anastazia Purvis, they immerse themselves in the works of Agatha Christie and Shirley Jackson while curating scrapbook pages set to the soundtrack
    of Taylor Swift and Billie Eilish, turning artistic expression into a personal sanctuary after school.
  travel: With a preference for carefully planned nature escapes, Anastazia Purvis, they have trekked the Columbia River Gorge, dream of visiting Redwood National Park and Seattle’s Pike Place Market, and
    prefer budget‑friendly road trips with friends over spontaneous overseas adventures, balancing curiosity with a love for familiar, scenic routes.
  culinary: A fan of Pacific‑west flavor combos, Anastazia Purvis, they enjoy cooking salmon tacos with avocado, lime, and cedar‑plank seasoning, often pairing them with a side of trail‑mix quinoa salad,
    while also savoring classic pepperoni pizza on cheat‑day, reflecting a blend of health‑conscious meals and occasional indulgence.
  core: Anastazia Purvis is a routine‑loving, competitively spirited teen who blends organized community service with a love for soccer, strategic gaming, and mystery novels, all while juggling occasional
    impulsive spending and the occasional neglect of mental‑health downtime, they balance structure with a touch of spontaneity.
background:
  cultural: Anastazia comes from a white, middle-class family rooted in the Pacific Northwest, with generational ties to Oregon’s suburban communities. Her upbringing blends typical American values of self-reliance
    and hard work with the region’s emphasis on outdoor recreation, environmental stewardship, and community service. Family traditions include seasonal outdoor activities, weekend trips to nearby parks,
    and regular involvement in local volunteer events. Her cultural perspective is shaped by the multicultural environment of Gresham, fostering an appreciation for diverse viewpoints while maintaining
    a practical, down-to-earth outlook typical of many Oregon families.
attributes:
