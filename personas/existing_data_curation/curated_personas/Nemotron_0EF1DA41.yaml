  hobbies: '[''Playing soccer'', ''Debate club participation'', ''Strategic video gaming'', ''Online chess'', ''Hiking local trails'', ''Journaling and scrapbooking'', ''Reading mystery novels'', ''Volunteering
    at food pantry'']'
  career_goals: Anastazia aims to graduate high school with a strong academic record and secure admission to a university where she can study business administration with a focus on operations and supply-chain
    management. She envisions a career that leverages her love for routine, practicality, and organization—ideally managing logistics for a regional company or overseeing efficient processes in a nonprofit
    that serves the community. In the longer term, she hopes to attain a leadership role, such as operations manager or project director, where she can combine her competitive drive with her skill in coordinating
    people and resources. She also keeps an open mind about pursuing a certification in emergency medical services, reflecting her interest in public safety and practical help.
