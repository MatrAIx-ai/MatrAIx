personas:
  professional: Mary Alston, a first‑line supervisor of non‑retail sales workers, merges keen analytical skills in Salesforce, SQL, and predictive modeling with a compassionate, cooperative leadership style;
    they translate complex data into clear strategies, methodically plan initiatives, and nurture a supportive team environment despite their emotional reactivity.
  sports: Mary Alston, an avid supporter of the Cleveland Browns, Cavaliers, and Guardians, spends weekday evenings running with the Cuyahoga Valley Running Club’s 5K sessions and practices Vinyasa yoga
    twice a week, treating fitness as both a stress‑relief outlet and a disciplined routine that balances competitive spirit with mindful movement.
  arts: Mary Alston, who frequents the Cleveland Museum of Art and the Gordon Square Arts District, draws inspiration from the improvisational brilliance of jazz saxophonist Kenny Garrett, the soulful vocals
    of Esperanza Spalding, and the storytelling of playwright August Wilson, often weaving these artistic influences into her leadership philosophy and weekend reading of contemporary fiction by authors
    like Sally Rooney.
  travel: Mary Alston, an exploratory traveler with a modest budget, has sampled the vibrant music scene in New Orleans’ French Quarter, trekked the Great Smoky Mountains during a fall weekend, and dreams
    of attending a culinary workshop in Kyoto while planning future trips around conferences that align with her career goals.
  culinary: Mary Alston, an inventive home chef, reimagines classic soul‑food staples—such as collard greens sautéed with smoked turkey, sweet‑potato casserole topped with toasted pecans, and a quinoa‑infused
    gumbo—by incorporating global spices like harissa and miso, and she enjoys sourcing fresh produce at the West Side Market to craft these modern twists.
  core: Mary Alston blends analytical rigor with heartfelt compassion, navigating a high‑pressure sales career while managing intense anxiety through yoga, mentorship, and a love for jazz, all the while
    occasionally overindulging in late‑night coffee and impulsive online shopping sprees.
background:
  cultural: Mary was raised in a close-knit African-American family in Cleveland's Hough neighborhood. Her parents, both college-educated, emphasized the importance of education, perseverance, and community
    service. Growing up, she participated in church choir and the local YWCA, where she learned the value of collective support. Cleveland's vibrant Black cultural scene—including jazz clubs, soul-food
    gatherings, and annual events like the African American showcase at the Cleveland International Film Festival—has shaped her appreciation for music, storytelling, and culinary traditions. Mary's cultural
    identity informs her compassionate leadership style and fuels her commitment to mentoring the next generation of Black professionals.
attributes:
  skills: '[''Data Analysis'', ''Sales Forecasting'', ''CRM Management (Salesforce)'', ''Team Leadership'', ''Performance Coaching'', ''Process Improvement'', ''Project Management'', ''Effective Communication'',
    ''Conflict Resolution'', ''Budgeting and Forecasting'']'
  hobbies: '[''Yoga and mindfulness meditation'', ''Cooking (modern soul-food recipes)'', ''Reading contemporary fiction and leadership non-fiction'', ''Mentoring high-school STEM students'', ''Attending
    live jazz concerts'', ''Exploring local art galleries'', ''Podcast listening (tech and psychology)'']'
  career_goals: Mary aims to advance to a regional sales manager position within the next three years, followed by a director-level role overseeing multiple territories. She plans to enroll in a part-time
    MBA program to strengthen her business acumen and strategic management capabilities. Alongside her career progression, Mary is passionate about increasing representation of Black women in sales leadership;
    she hopes to spearhead mentorship programs and diversity initiatives within her organization. She also wants to champion data-driven decision-making across the sales function by implementing advanced
    analytics tools to improve efficiency. Long-term, Mary envisions founding a consultancy that helps technology companies build inclusive, high-performance sales teams.
