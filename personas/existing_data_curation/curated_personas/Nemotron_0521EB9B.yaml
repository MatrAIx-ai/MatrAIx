personas:
  professional: Ghulam Lay, a 19-year-old aspiring museum educator, blends a keen eye for digital illustration and photography with methodical project planning to coordinate campus art exhibitions, and
    they design inclusive educational programs.
  sports: Ghulam Lay embraces weekend hikes in Wekiwa Springs State Park, joins the university's intramural soccer league while rooting for Orlando City SC, and they practice yoga thrice weekly to counterbalance
    long hours at the drawing board.
  arts: Ghulam Lay regularly visits the Orlando Museum of Art to study works by Yayoi Kusama and James Turrell, and they draw inspiration from the ambient soundscapes of Max Richter while finding narrative
    cues in the films of Greta Gerwig during sketch sessions in a cafe.
  travel: Ghulam Lay plans meticulously using Trello, favoring short, budget-friendly trips like a weekend road trip to Asheville, NC and a two-week cultural immersion in Oaxaca, Mexico, and they dream
    of a springtime excursion to Kyoto to explore historic art temples.
  culinary: Ghulam Lay enjoys experimenting in the kitchen, skillfully preparing shakshuka with fire-roasted tomatoes, feta, and fresh cilantro, mastering homemade ramen broth infused with kombu and miso,
    and they occasionally over-indulge in triple-cheese mac and cheese on lazy study nights.
  core: Ghulam Lay is a calm, curiosity-driven 19-year-old art enthusiast who schedules every brushstroke and museum visit, yet they can't resist an occasional impulse purchase of the latest graphic tablet.
background:
  cultural: Born and raised in a middle‑class family in the Orlando suburbs, Ghulam grew up in a culturally diverse environment shaped by Florida’s mix of Southern hospitality, Latin American influences,
    and a vibrant tourism‑driven arts scene. His family’s Anglo‑American heritage emphasizes community involvement, education, and respect for tradition, while the multicultural atmosphere of Orange County
    exposed him to a variety of music, cuisine, and community festivals. This blend nurtured his appreciation for artistic expression, his cooperative outlook, and his calm, resilient nature.
attributes:
  skills: '[''digital illustration'', ''graphic design'', ''photography'', ''image editing'', ''academic research'', ''academic writing'', ''project planning'', ''event coordination'', ''Google Workspace'',
