  hobbies: '[''visiting art museums'', ''sketching'', ''digital illustration'', ''photography'', ''reading contemporary literature'', ''attending cultural festivals'', ''hiking in state parks'', ''cooking
    new recipes'', ''volunteering at youth art programs'', ''mindfulness meditation'']'
  career_goals: He plans to complete a bachelor's degree in Visual Arts or Museum Studies within the next two years, aiming to combine his artistic talents with his organizational strengths. His short‑term
    goal is to secure an internship at a local museum or cultural center where he can assist in curating exhibitions and designing educational programs. In the longer term, he aspires to become an arts
    program manager or museum educator who creates inclusive, community‑focused initiatives, and eventually launch a nonprofit that offers free art workshops to underserved youth in Orlando. He also envisions
    pursuing a master's degree in Curatorial Studies to deepen his expertise.
