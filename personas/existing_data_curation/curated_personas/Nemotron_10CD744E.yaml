personas:
  professional: Julian Jerez is a seasoned forming‑machine setter, operator, and tender who expertly commands CNC presses, hydraulic stamping rigs, and injection molding lines, channeling their vivid imagination
    and competitive drive to devise inventive process tweaks that slash cycle times and scrap while rigorously questioning standard procedures and mentoring newcomers with a blend of precision and artistic
    flair.
  sports: Julian Jerez follows the New England Patriots and Hartford Yard Goats, hits the CrossFit Hartford box three times a week, competes in a weekend recreational basketball league with the ConnectiCut
    Courts Club, and cycles the Farmington River trail each fall, channeling their competitive edge into personal bests while occasionally sacrificing team camaraderie for individual performance.
  arts: Julian Jerez immerses themselves in abstract painting inspired by Joan Miró, creates digital illustrations echoing Refik Anadol’s glitch aesthetics, frequently visits galleries showcasing works
    by Banksy and Yayoi Kusama, joins open‑mic nights where they play congas to spirited Afro‑Latin rhythms, and captures Hartford’s gritty skyline through a Leica M10, later integrating those photographs
    into mixed‑media canvases that blur the line between industrial precision and artistic spontaneity.
  travel: Julian Jerez favors meticulously planned escapes that blend cultural immersion with visual inspiration, having wandered the historic alleys of Barcelona, the neon‑lit districts of Tokyo, and the
    vibrant art villages of Oaxaca, while also taking frequent short trips across New England to Newport’s cliffside mansions and the White Mountains for sketching sessions, always budgeting for a modest
    Airbnb, local culinary experiences, and a pocket‑sized sketchbook.
  culinary: Julian Jerez delights in cooking aromatic island traditions, regularly preparing mofongo with garlic‑infused plantains, fragrant arroz con gandules simmered with sofrito, and succulent lechón
    al horno seasoned with adobo, while experimenting with fresh herbs like cilantro and epazote, and pairing each meal with a crisp local cider or a splash of rum‑based cocktail for a sensory celebration
    of heritage.
  core: Julian Jerez is a technically adept machine operator turned aspiring process engineer whose vivid imagination fuels a relentless quest for efficiency, artistic expression, and mentorship, tempered
    by a competitive streak, occasional impulsive art‑gear splurges, and a habit of staying up late perfecting mixed‑media creations.
background:
  cultural: Julian is a first‑generation American of Puerto Rican descent, raised in a bilingual household where Spanish and English intermingled daily. His family maintains vibrant cultural traditions—from
    celebrating Nochebuena and Three Kings Day to listening to bomba and plena rhythms—infusing his upbringing with a strong sense of community and artistic expression. Growing up in Hartford’s diverse
    neighborhoods, he has assimilated the island’s resilient spirit while navigating the broader American context, which informs his competitive drive and desire for novelty. This dual cultural lens shapes
    his worldview, encouraging him to blend technical precision with creative flair in both his professional work and personal hobbies.
attributes:
  skills: '[''CNC press operation'', ''Hydraulic stamping'', ''Plastic injection molding'', ''Technical troubleshooting'', ''Preventative maintenance'', ''Basic CAD (SolidWorks)'', ''Process optimization'',
