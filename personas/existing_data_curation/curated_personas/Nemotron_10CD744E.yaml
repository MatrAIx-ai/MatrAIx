  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Science‑fiction and philosophy reading'', ''DIY electronics (Arduino projects)'', ''Urban photography'', ''Visiting art galleries and performance
    venues'', ''Latin percussion (bongos)'', ''Cooking Puerto Rican cuisine'']'
  career_goals: Julian aims to transition from a frontline operator to a process‑engineering leader within the next five years. He plans to complete his associate’s degree in manufacturing technology, pursue
    certifications such as Certified Manufacturing Engineer (CMfgE), and eventually obtain a bachelor’s degree in mechanical engineering. His long‑term ambition is to become a plant supervisor or lead process
    engineer who drives innovative, art‑inspired manufacturing solutions, integrating aesthetic design concepts into metal and plastic products. He also hopes to mentor a next generation of technically
    skilled workers, fostering a culture of continuous improvement and creative problem‑solving.
