  hobbies: '[''Model Railroading'', ''Woodworking'', ''Birdwatching'', ''Bridge'', ''Book Club'', ''Genealogy Research'', ''Gardening'', ''Raspberry Pi Projects'', ''Crossword Puzzles'', ''Fishing'']'
  career_goals: Robert aims to continue contributing his expertise by volunteering as a STEM mentor, supporting the local community center's robotics club, and offering consulting on lean manufacturing
    to small businesses. He also hopes to assume a leadership role in the senior citizens association, championing accessibility initiatives. On a personal level, he aspires to complete a memoir of his
    career and to travel with his wife to historically significant sites in the U.S., while maintaining the structured routine that supports his well‑being.
