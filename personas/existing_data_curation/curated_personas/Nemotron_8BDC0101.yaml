  hobbies: '[''Gardening (vegetables and native flowers)'', ''Birdwatching and field journaling'', ''Reading historical fiction and local Wisconsin history'', ''Knitting, crocheting, and quilting'', ''Jigsaw
    puzzles and crossword puzzles'', ''Genealogy research'', ''Cooking and food preservation'', ''Digital nature photography'', ''Walking local trails and state forest hikes'']'
  career_goals: Though retired, Hannah’s ambition is to remain intellectually vibrant and to give back to her community. She plans to complete a memoir that intertwines her family’s story with the broader
    history of Wausau, intending to donate the manuscript to the Marathon County Historical Society. She also aspires to improve her digital photography skills to document seasonal changes in the Northwoods,
    and to share these images through a local senior‑citizen newsletter. Teaching a few quilting workshops at the community center is another goal, allowing her to pass on her craft to younger generations.
    Maintaining her health through regular walks, gardening, and balanced nutrition remains a personal priority, as does staying current with emerging technologies to keep connected with distant relatives
    via video calls.
