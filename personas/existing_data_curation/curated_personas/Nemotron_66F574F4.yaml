  career_goals: Michael aims to shift from full‑time class instruction to a mentorship and boutique‑studio model that merges fitness with creative expression. Over the next five years he plans to obtain
    a Mind‑Body Medicine certification, launch a small studio in Prescott offering hybrid movement‑and‑art workshops for adults 55+, and develop a community‑based wellness curriculum designed to reduce
    anxiety and enhance mental health. He aspires to co‑author a handbook titled “Movement as Canvas,” partner with local art galleries for pop‑up classes, mentor emerging fitness professionals, and complete
    the Prescott Trail Challenge to demonstrate lifelong physical vitality.
