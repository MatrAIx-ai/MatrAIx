persona_description: A historian who is interested in the events leading up to the attack on Pearl Harbor and the strategies and decisions made by the United States government and its leaders during World
  War II. They are particularly interested in the role of economic warfare and the measures taken by the U.S. government to prevent Japan from obtaining essential raw materials that would be necessary for
  the war effort. They are also interested in the events that led to the decision to enter the war against Germany in 1941 and the subsequent increase in U.S. military participation. They are knowledgeable
  about the U.S. government's strategy and tactics in the Pacific theater and are interested in understanding the reasons why Japan attacked the United States without provocation.
