personas:
  professional: Shelly Michel, an aspiring curatorial specialist, blends meticulous research and academic writing with a talent for sketching, watercolor, and digital illustration—leveraging their curiosity,
    organized project management, and preference for solitary, reflective environments to design contemplative exhibition concepts.
  sports: Shelly Michel enjoys solitary jogs along the Blackstone River, participates in the Blackstone River Valley Hiking Club, follows the Providence Bruins and New England Patriots for seasonal excitement,
    and favors low‑impact, reflective exercise over competitive team sports.
  arts: Shelly Michel draws creative inspiration from watercolorist John Singer Sargent, digital illustrator Loish, poet Rupi Kaur, and ambient musicians Brian Eno and Sufjan Stevens, while regularly attending
    exhibitions at the RISD Museum and the historic Providence Art Club.
  travel: Shelly Michel prefers carefully planned, low‑key trips that blend artistic immersion with nature, having explored New England’s historic houses, a weekend getaway to Portland, Maine, and a solo
    study tour of Florence, Italy, while dreaming of a quiet retreat in Kyoto’s temple gardens.
  culinary: Shelly Michel savors simple seasonal dishes like roasted beet and goat cheese salad, miso‑glazed salmon, and avocado toast topped with hemp seeds, cooking at a modest skill level with fresh
    ingredients from the local farmer’s market and occasionally treating themselves to a meticulously brewed pour‑over at an indie café.
  core: Shelly Michel is an intensely curious 18‑year‑old artist who balances late‑night sketching marathons with bouts of over‑thinking, a tendency to hoard watercolor supplies, and a quiet need for solitary
    reflection.
background:
  cultural: Shelly grew up in Johnston, Rhode Island, a suburban community in New England with a predominantly white, middle‑class demographic. Her family’s Anglo‑American heritage emphasizes education,
    independence, and seasonal traditions rooted in New England culture. The region’s historic colonial architecture, proximity to Boston’s cultural institutions, and a vibrant local arts scene have shaped
    her appreciation for both classic American art and contemporary creative expression. While identifying as white, Shelly is conscious of Providence County’s diverse cultural fabric and values inclusive
    perspectives, often integrating them into her artistic and intellectual pursuits.
