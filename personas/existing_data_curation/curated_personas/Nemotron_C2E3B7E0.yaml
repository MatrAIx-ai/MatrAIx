  career_goals: Shelly intends to complete a bachelor's degree in Art History or Museum Studies, aiming to become a curatorial specialist who designs thoughtful, contemplative exhibition spaces. In the
    long term, she aspires to combine her love for art with mental‑wellbeing by earning a master's in Art Therapy and working in community art programs that support individuals coping with anxiety and depression.
    Short‑term, she plans to secure an internship at a local museum or community art center in Providence County, build a portfolio of curated digital exhibitions, and continue developing her research and
    writing skills.
