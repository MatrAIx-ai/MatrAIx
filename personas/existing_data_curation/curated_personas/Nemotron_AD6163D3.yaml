  hobbies: '[''Gardening'', ''Fishing'', ''Cooking (South Asian cuisine)'', ''Watching cricket matches'', ''Walking in nature'', ''Community volunteering'', ''DIY woodworking'']'
  career_goals: As he approaches retirement, Tawfic aims to formalize his decades of experience by obtaining OSHA certification and a journeyman grade that will qualify him for a supervisory or safety‑officer
    role on construction sites. He also hopes to transition into a mentorship capacity, guiding younger workers and possibly launching a small family‑run home‑renovation business that leverages his practical
    knowledge while providing stability for his married life.
