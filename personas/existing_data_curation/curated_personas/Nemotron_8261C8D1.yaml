personas:
  professional: Elizabeth Cousins, a veteran utility electrical repair technician with over 25 years of hands‑on experience, blends her practical curiosity and organized flexibility to diagnose high‑voltage
    systems using oscilloscopes and infrared thermography, they eagerly mentor apprentices with a cooperative demeanor, and they push for safety excellence while aiming for Journeyman Electrician and OSHA‑30
    certifications.
  sports: Elizabeth Cousins, an avid hiker who participates in the Pacific Northwest Trail Club for weekend treks through the Cascades, roots for the Seattle Seahawks during football season, they also join
    a local amateur badminton league to keep reflexes sharp and incorporate weekly yoga sessions to support joint health.
  arts: Elizabeth Cousins, who unwinds after a day of troubleshooting by listening to Joni Mitchell and Gillian Welch, they binge‑watch Ken Burns documentaries on renewable‑energy history, and they knit
    scarves while humming the minimalist piano works of Philip Glass, weaving artistic appreciation into their quiet evenings.
  travel: Elizabeth Cousins, a meticulous planner who prefers road trips that pair scenic hikes with renewable‑energy site visits, they have explored the Columbia River Gorge, trekked the geothermal landscapes
    of Iceland, driven along the Pacific Coast Highway to Santa Barbara, and dream of scaling the Swiss Alps, all while balancing a modest travel budget and occasional family commitments.
  culinary: Elizabeth Cousins, an intermediate home cook who loves garden‑fresh meals, they frequently prepare grilled salmon with lemon‑dill glaze, roasted beet and goat‑cheese salads, herb‑infused quinoa
    pilafs, and bake whole‑grain sourdough using locally milled flour, while occasionally treating themselves to a dark‑chocolate espresso tart.
  core: Elizabeth Cousins melds her practical, curiosity‑driven engineering mind with a quiet, community‑oriented spirit, often caught calibrating a thermostat while humming folk tunes, and they habitually
    delay filing tax paperwork until the last minute.
background:
  cultural: Elizabeth grew up in a mid‑western American family that settled in the Pacific Northwest. Her cultural background reflects a blend of traditional American middle‑class values—self‑reliance,
    modesty, and a strong work ethic—and a regional appreciation for nature and community. She observes mainstream holidays such as Thanksgiving and 4th of July, participates in local potlucks, and the
    family’s heritage includes German and Irish ancestry, which surfaces in occasional family recipes and stories. Her upbringing emphasized practical skills, responsibility, and cooperative relationships,
    shaping her collaborative yet reserved personality.
attributes:
  skills: '[''Industrial electrical troubleshooting'', ''Electronics repair'', ''Electrical safety compliance (NEC, OSHA)'', ''PLC and SCADA diagnostics'', ''Instrumentation calibration'', ''Preventative
    maintenance planning'', ''Motor and drive repair'', ''Use of multimeters, oscilloscopes, and infrared thermography'', ''Technical documentation and record‑keeping'', ''Apprentice mentoring'']'
  hobbies: '[''Gardening'', ''Hiking local trails'', ''Hobby electronics (Arduino, radio kits)'', ''Reading non‑fiction (technology, renewable energy)'', ''Knitting'', ''Community volunteering (charity
    pantry)'']'
  career_goals: Looking ahead, Elizabeth aims to achieve Journeyman Electrician certification and an OSHA 30‑hour safety trainer credential to formalize her expertise. She aspires to become a lead maintenance
    specialist at her utility, overseeing a small team of technicians, optimizing preventive‑maintenance schedules, and introducing newer diagnostic technologies. She also hopes to mentor the next generation
    of electricians through formal apprenticeship programs, and eventually transition into a consulting role that allows her to balance work with increased time for personal projects before retirement.
