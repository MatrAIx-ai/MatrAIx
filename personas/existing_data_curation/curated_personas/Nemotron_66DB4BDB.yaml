  hobbies: '[''Gardening'', ''Knitting/Crocheting'', ''Reading historical novels and biographies'', ''Volunteering at senior center'', ''Walking/hiking in local parks'', ''Puzzle solving (crosswords, Sudoku,
    logic games)'', ''Meal planning and cooking'', ''Genealogy research'']'
  career_goals: Although currently not employed, Jennifer aims to channel her expertise into meaningful community contributions. She aspires to serve on the board of a local nonprofit focused on senior
    services, mentor emerging volunteers, and complete a certificate in nonprofit management to enhance her strategic impact. She also plans to author practical guides for organized living and develop a
    small consulting service offering project planning for local charities and small businesses. Additionally, she seeks to improve her wellbeing through stress‑reduction workshops and mindfulness practice.
