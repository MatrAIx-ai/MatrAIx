persona_description: A conservation biologist who specializes in the management and breeding of wildcats, particularly Scottish wildcats. She is knowledgeable about the principles of captive breeding and
  the importance of maintaining genetic diversity and species management guidelines. She is committed to the reintroduction of Scottish wildcats into the wild and is working towards this goal through the
  development and implementation of breeding programmes. She is also involved in the planning and management of captive breeding programmes, particularly when reintroduction is possible, and is collaborating
  with international conservation organisations and Scottish wildcat captive holders to increase her capacity in both ex-situ and in-situ conservation work.
