  career_goals: Arthur aims to become a senior partner at his advisory firm while simultaneously launching his own boutique financial‑planning practice that serves underserved African‑American families
    in the Philadelphia region. He plans to earn the Certified Financial Planner (CFP) designation, publish a guide on integrating art investments into diversified portfolios, and become a regular speaker
    at industry conferences and local community events. In the longer term, he envisions establishing a nonprofit financial‑literacy program for youth, building a mentorship network for aspiring Black financial
    professionals, and serving on the board of a community development corporation focused on economic empowerment.
