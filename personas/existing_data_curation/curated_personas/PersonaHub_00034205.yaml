persona_description: A public health official responsible for monitoring and preventing the spread of diseases in Huron and Perth counties. They are tracking the first positive mosquito finding of West
  Nile virus in Perth County and are recommending mosquito protection measures to the public, including the use of insect repellent, covering up, taking protective measures at dusk and dawn, and removing
  standing water around the home. They are also applying larvicide to roadside catch basins to reduce mosquito breeding and the risk of potential West Nile virus transmission.
