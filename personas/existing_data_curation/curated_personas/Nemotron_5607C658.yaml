personas:
  professional: Walker Johnson, a seasoned retail associate with a STEM degree, applies strong interpersonal communication, cash‑handling, and POS troubleshooting skills to streamline store operations while
    their preference for structure is balanced by a relaxed, sociable work style that sometimes leaves procedural paperwork lagging behind.
  sports: Walker Johnson regularly plays in an adult basketball league and the intramural soccer team called the Greenfield Strikers, while cheering on Chicago’s professional squads—the Bulls, Bears, and
    Cubs—and keeps fit with flexible river‑trail jogs that fit around their volunteer schedule.
  arts: Walker Johnson unwinds to classic rock icons like The Rolling Stones and Pink Floyd, binge‑watches sci‑fi classics such as Blade Runner and Star Wars, and hosts lively board‑game nights featuring
    Settlers of Catan and Ticket to Ride, occasionally attending a production at the Cedar Grove Playhouse.
  travel: Walker Johnson prefers loosely planned road trips that combine visits to national parks like Yellowstone and the Grand Canyon with quick city stops in New Orleans for live jazz and Tokyo for cutting‑edge
    electronics, balancing a modest travel budget with a desire to explore new tech markets.
  culinary: Walker Johnson enjoys cooking hearty meals such as grilled burgers with sharp cheddar and homemade barbecue sauce, a Sunday chicken pot pie loaded with carrots and thyme, and spicy buffalo wings
    seasoned with garlic and smoked paprika, while also savoring classic diner breakfasts like eggs benedict on weekends.
  core: Walker Johnson blends a structure‑loving, detail‑oriented mind with a laid‑back, sociable streak, juggling board‑game marathons, DIY electronics projects, and a persistent worry about retirement
    that fuels both meticulous data tracking and occasional procrastination.
background:
  cultural: Walker was raised in a middle‑class white, American family in the Pacific Northwest, experiencing the region’s blend of outdoorsy lifestyle and tech‑oriented culture. Growing up, family traditions
    emphasized self‑reliance, community involvement, and celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July. His educational path in STEM reflects the regional emphasis on engineering
    and technology, while his long tenure as a cashier in Kent highlights a strong connection to the local working‑class community and its diverse clientele.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Point-of-sale system operation'', ''Inventory management'', ''Data entry'', ''Basic Excel data analysis'', ''Technical troubleshooting'', ''Team training'',
