  hobbies: '[''Basketball'', ''Board games'', ''Electronics tinkering'', ''Arduino projects'', ''Volunteer work at food bank'', ''Mindfulness walking'', ''Classic rock music'', ''Science-fiction movies'']'
  career_goals: Walker aims to leverage his STEM degree to move into a supervisory or technical role within retail, such as a shift manager, inventory analyst, or POS systems trainer. Over the next few
    years, he plans to obtain certification in retail management and complete a short course on data analytics. He also dreams of eventually opening a small electronics repair side‑business, allowing him
    to blend his technical skills with his desire to help customers. Financially, he seeks to build a secure retirement fund while maintaining a flexible schedule that supports his social activities.
