personas:
  professional: Jaqueline Oliver is a budding soccer enthusiast and dance aficionado who channels her practical, organized mindset into mastering drills and choreography, showing early signs of leadership
    in her after‑school clubs.
  sports: Jaqueline Oliver loves playing midfield for her community soccer team, the Charleston Junior Waves, idolizes the Charleston Battery and the South Carolina Gamecocks, and she balances organized
    practice drills with spontaneous pick‑up games after school to stay fit.
  arts: Jaqueline Oliver expresses creativity through drawing vibrant family portraits inspired by the bold colors of Maya Angelou's poetry books, singing gospel classics like Kirk Franklin's "Take Me to
    the King" in her church choir, and practicing hip‑hop moves to Beyoncé's "Run the World (Girls)", reflecting a blend of visual and performing arts.
  travel: Jaqueline Oliver prefers weekend day trips that blend history and fun, such as exploring the cobblestone streets of Savannah, Georgia and the historic Fort Sumter in Charleston, and she dreams
    of visiting Disneyland in California, but her travel plans stay low‑budget, supervised by her parents, and she enjoys mapping routes on her tablet before each outing.
  culinary: Jaqueline Oliver enjoys helping bake buttery biscuits, collard greens seasoned with smoked turkey, and peach cobbler, often measuring ingredients with a child‑size kitchen scale and sprinkling
    a pinch of cinnamon, though she occasionally insists on adding extra sugar to her chocolate chip cookies.
  core: Jaqueline Oliver is a structure‑loving, energetic nine‑year‑old who balances soccer, dance, art, and family traditions while negotiating chores for treats and battling occasional sticky‑fingered
    sticker hoarding.
background:
  cultural: Jaqueline is a Black South Carolina native whose family roots trace back to the Gullah‑Geechee culture of the Lowcountry. Her upbringing blends Southern traditions with African‑American heritage,
    including regular attendance at the local Baptist church, participation in community festivals like the Spoleto Festival, and sharing stories of ancestors from the region. Family gatherings feature
    soul‑food meals such as collard greens, fried chicken, and sweet potato pie, and they emphasize the importance of education, community service, and resilience. The multicultural environment of Mount
    Pleasant exposes her to both historic preservation and contemporary Black arts, shaping her identity and worldview.
