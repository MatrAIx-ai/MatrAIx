    games'', ''Exploring historic Charleston'']'
  career_goals: Jaqueline dreams of becoming a teacher who inspires other children, especially in her community, and she also wonders about caring for animals as a future veterinarian. In the near term,
    she aims to earn the school’s reading award, become class monitor, and lead her soccer team as captain. She wants to contribute to community events by helping organize her church’s youth programs, and
    she hopes to continue developing her leadership and academic abilities.
