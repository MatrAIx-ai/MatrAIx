personas:
  professional: Barbara Campos, a seasoned registered nurse with over three decades of experience in acute, geriatric and hospice care, leverages her expertise in medication reconciliation, wound care,
    and interdisciplinary coordination to mentor junior staff, lead patient‑education workshops, and transition into a flexible part‑time role while pursuing palliative‑care certification and community
    advocacy.
  sports: Barbara Campos enjoys gentle morning walks with the Boston Birdwatchers Club, supports the Boston Red Sox as a loyal fan, and participates in a senior bowling league at the local community center,
    preferring low‑impact activities that allow her to stay connected to nature and community.
  arts: Barbara Campos sings in her church choir, knits scarves while listening to Enya and the fado singer Mariza, reads historical novels by Ken Follett and biographies of Eleanor Roosevelt, and attends
    performances by the Boston Lyric Opera, finding that music and literature enrich her solitary evenings.
  travel: Barbara Campos favors peaceful day trips to Cape Cod’s lighthouses, weekend hikes in Acadia National Park, and cultural tours of historic Salem, while dreaming of a future pilgrimage to Portugal’s
    Madeira island to explore her ancestry, all planned with flexible itineraries that accommodate her caregiving schedule.
  culinary: Barbara Campos prepares comfort meals such as caldo verde and bacalhau à Brás, infusing garden‑fresh kale, potatoes, and rosemary into traditional Portuguese‑inspired dishes, and enjoys experimenting
    with slow‑cooked stews while her knitting projects often inspire her to serve homemade biscuits during choir gatherings.
  core: Barbara Campos blends a nurse’s compassionate precision with a relaxed, sometimes scattered love of gardening, knitting, and birdwatching, constantly balancing meticulous care for others with personal
    worries and a penchant for quiet, nature‑filled solace.
background:
  cultural: Barbara was raised in a suburban New Jersey family of Portuguese descent that identifies as white. Her upbringing was steeped in Catholic traditions, celebrating feast days such as St. Anthony’s
    Day, and sharing family meals featuring dishes like bacalhau and caldo verde. The community’s emphasis on mutual support and volunteerism shaped her compassionate outlook. While she embraces the broader
    American cultural environment of the Northeast, she maintains a strong connection to her Portuguese heritage through language, culinary practices, and participation in local cultural festivals.
attributes:
  skills: '[''Acute and chronic care nursing'',''Geriatric and hospice nursing'',''Patient education and counseling'',''Care coordination'',''Medication reconciliation'',''Intravenous therapy'',''Wound
