  career_goals: John aspires to turn his artistic passions into a sustainable, flexible career that preserves his need for solitude. He hopes to enroll in a community college program focused on graphic
    design or visual communication, eventually working as a freelance illustrator or content creator for indie video game studios. Long‑term, he envisions curating virtual exhibitions that showcase emerging
    artists from the Southwest, blending his love of art, technology, and cultural storytelling while maintaining a schedule that allows for independent work and personal exploration.
