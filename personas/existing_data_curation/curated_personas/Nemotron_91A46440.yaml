personas:
  professional: John Powers is an aspiring freelance illustrator who, after completing a community college graphic design program, channels their love for desert landscapes and adobe architecture into digital
    commissions for indie game studios, preferring solitary work environments that allow flexible scheduling and deep creative focus.
  sports: John Powers enjoys early‑morning hikes along the Santa Fe Trail with the local Trailheads Hiking Group, occasionally joins a casual running club, and cheers for New Mexico United soccer and the
    Colorado Rapids, preferring solo fitness activities over team sports.
  arts: John Powers immerses themselves in ambient soundscapes by Brian Eno and William Basinski, studies the works of Frida Kahlo and Georgia O’Keeffe, and spends weekends sketching adobe walls while listening
    to experimental electronic music, which together shape a uniquely hybrid artistic identity.
  travel: John Powers prefers solitary, off‑the‑beaten‑path trips, often planning last‑minute weekend hikes to Taos Pueblo and Bandelier National Monument, while dreaming of a pilgrimage to Barcelona to
    study Gaudí’s architecture, balancing a limited student budget with a love for cultural immersion.
  culinary: John Powers favors New Mexican cuisine, often cooking green chile stew, red chile enchiladas, and experimenting with chipotle‑infused ramen, relying on modest skillet skills and a fondness for
    fresh oregano, lime, and roasted corn.
  core: John Powers is a quiet, curiosity‑driven 18‑year‑old artist who roams deserts with a sketchbook, streams indie game commentary, and navigates life at a leisurely, slightly disorganized pace.
background:
  cultural: John grew up in Santa Fe, New Mexico, a city renowned for its blend of Anglo, Hispanic, and Pueblo cultures. While his family identifies as white with deep roots in the American Southwest, his
    everyday life has been infused with the region's multicultural atmosphere—annual events like the Santa Fe Indian Market, the Spanish colonial architecture of historic plazas, and the bilingual sounds
    of English and Spanish on the streets. This environment cultivated his appreciation for diverse artistic expressions and motivated his informal learning of Spanish. At home, family gatherings often
    included classic New Mexican cuisine, such as green chile stew, and celebrations of national holidays, while his school experience was marked by a series of high‑school credits without a diploma, leaving
    him to pursue knowledge through community resources and online platforms.
