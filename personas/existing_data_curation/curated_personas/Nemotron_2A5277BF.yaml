personas:
  professional: Fernando Nielson, an aspiring junior game designer, merges their meticulous LEGO construction skills with the storytelling flair of their watercolor sketches to craft interactive Scratch
    adventures, channeling their curious mind and compassionate outlook into games that celebrate cooperation and environmental stewardship.
  sports: Fernando Nielson, a member of the River Valley Tigers youth soccer squad and a regular at the Lakeview Community Swim Club’s after‑school laps, also enjoys weekend bird‑watching hikes with the
    local nature club, combining the teamwork of soccer with the patience learned from quiet field observations.
  arts: Fernando Nielson, a devoted participant in the school art club, draws inspiration from Claude Monet’s watercolors, channels the fantastical worlds of Hayao Miyazaki into sketchbooks, and practices
    acoustic guitar renditions of John Mayer’s ‘Gravity’ while listening to the cinematic scores of Hans Zimmer for creative bursts.
  travel: Fernando Nielson, a curious explorer who has trekked the wetlands of Evergreen Park during school field trips, visited the Grand Canyon’s rim on a family vacation, and now dreams of wandering
    Kyoto’s cherry‑blossom avenues and spotting urban wildlife in London’s Hyde Park, plans trips with detailed checklists that balance nature hikes and quiet reading corners.
  culinary: Fernando Nielson, a budding kitchen experimenter, loves whipping up pepperoni pizza with a crisp crust, perfecting spaghetti carbonara using pancetta, egg yolk, and pecorino, and crafting vegetable
    stir‑fry with bell peppers, soy sauce, and ginger, all while mastering the art of a fluffy scrambled egg with butter and a pinch of salt.
  core: Fernando Nielson blends quiet curiosity with a habit of sketching every new bird they spot, balances meticulous LEGO builds with spontaneous Scratch coding, and quietly champions kindness in every
    group project, all while occasionally forgetting to finish homework because a new LEGO idea takes precedence.
background:
  cultural: Fernando was raised in Garland, Texas, a suburban city within the Dallas‑Fort Worth metroplex known for its cultural diversity. His family follows a typical Midwestern American tradition with
    Southern Texas influences, celebrating holidays like Thanksgiving and Christmas and enjoying community gatherings such as local barbecues. Although his ethnic background is white, he has been exposed
    to a variety of cultures—including Hispanic, Asian, and African‑American—through school, neighborhood festivals, and community events, fostering an open‑minded perspective and curiosity for different
    artistic expressions. This multicultural environment complements his appreciation for art and new ideas.
