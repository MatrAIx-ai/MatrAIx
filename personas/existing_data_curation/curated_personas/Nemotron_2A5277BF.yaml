  career_goals: Fernando aspires to combine his love for art with his desire to help others, dreaming of becoming an architect who designs harmonious community spaces or a museum curator who brings art
    to the public. He also imagines working as a youth mentor or teacher, using his empathy to support peers. In the short term, he aims to improve his coding skills, compete in art contests, and volunteer
    regularly at the local library.
