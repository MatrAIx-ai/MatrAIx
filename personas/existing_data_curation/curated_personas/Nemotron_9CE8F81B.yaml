  career_goals: Although retired, Dylan aims to stay actively engaged in the engineering community and his local city. He plans to mentor undergraduate and graduate students through the University of Cincinnati’s
    outreach programs, serve on the Cincinnati Transportation Advisory Committee, and help develop sustainable, data‑driven initiatives for the city’s aging infrastructure. He is also keen to deepen his
    knowledge of renewable energy technologies and artificial intelligence, hoping to lead a senior‑focused workshop on smart‑home automation. Ultimately, he would like to author a memoir that captures
    lessons learned from a lifetime of engineering practice and community service, earning recognition as a valued elder advisor in his region.
