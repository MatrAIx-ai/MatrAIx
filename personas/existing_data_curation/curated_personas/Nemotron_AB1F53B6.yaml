  career_goals: Even at 90, Dana aims to remain a vital presence in The Villages community. She plans to mentor new nursing assistants and volunteer staff, passing on her practical knowledge and compassionate
    approach. She hopes to organize an annual intergenerational art showcase that blends senior artwork with student contributions, reflecting her love for unconventional ideas. Dana also wants to complete
    a memoir and a family‑history scrapbook that can be shared with her grandchildren, preserving her legacy. Finally, she aspires to maintain her independence and health so she can continue attending group
    activities and support her spouse in their shared social engagements.
