personas:
  professional: Dana Baskin, a veteran nursing assistant turned community arts mentor, leverages three decades of patient‑care expertise and a sharp eye for visual art to coordinate intergenerational showcases,
    guide new aides with compassionate precision, and keep The Villages senior center buzzing with creative activity, while they mentor volunteers with a blend of reliability and flexible organization.
  sports: Dana Baskin stays fit through daily walks along The Villages’ walking trails, senior dance classes, and weekly bridge tournaments where their competitive streak shines, while they cheer on the
    Orlando Magic and Tampa Bay Buccaneers from the comfort of their living room and occasionally join low‑impact water‑aerobics at the community pool.
  arts: Dana Baskin, an avid gallery‑goer and community‑theater enthusiast, delights in discussing Monet’s water lilies, Georgia O’Keeffe’s desert paintings, and the soulful brass of Duke Ellington’s big‑band
    recordings, while they regularly attend performances at the Orlando Shakespeare Festival and quote lines from classic films starring Meryl Streep.
  travel: Dana Baskin prefers senior‑friendly group tours that blend scenic drives along Florida’s coast to Key West, historic strolls through St. Augustine’s cobblestone streets, and occasional cruise
    excursions to the Bahamas, all planned around their mobility needs, modest travel budget, and the desire to share stories with fellow travelers.
  culinary: Dana Baskin enjoys cooking fresh garden vegetables into comforting Southern dishes such as shrimp and grits, collard greens simmered with smoked ham hocks, and key lime pie, seasoning meals
    with a pinch of cinnamon and a side of sweet tea while they listen to classic jazz records from the 1940s‑60s.
  core: Dana Baskin, a 90‑year‑old former nursing assistant, blends a fiercely competitive bridge streak, an unquenchable love for jazz and art, and a compassionate mentoring spirit, all tempered by bouts
    of anxiety that keep them ever‑vigilant.
background:
  cultural: Dana grew up in the post‑World War II Midwest, raised in a middle‑class white family that valued hard work, community service, and church involvement (Methodist). Her formative years were shaped
    by the optimism of the 1950s, the social changes of the 1960s, and the rise of television and popular music. Moving to Florida in her later years, she embraced the vibrant retirement‑community culture
    of The Villages, which emphasizes active living, social clubs, and a mix of Southern hospitality with a national influx of retirees. Her background blends traditional American values with a lifelong
    curiosity for art, new ideas, and intergenerational connection.
