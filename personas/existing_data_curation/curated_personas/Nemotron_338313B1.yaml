personas:
  professional: Kamrun Patel, an inquisitive two‑year‑old at preschool, builds block towers and pretends to fix toy cars, showcasing an early blend of curiosity and practicality while they thrive on the
    flexibility of unstructured play.
  sports: Kamrun Patel, a lively toddler, dashes after a bright orange ball at El Mirage’s desert playground, pretends to pitch for the local Arizona Little League, and they squeal with excitement whenever
    a family member cheers for the Arizona Diamondbacks.
  arts: Kamrun Patel, a vibrant two‑year‑old, dances to A.R. Rahman’s upbeat tracks and creates splashy finger‑paint sunrise scenes, often humming "Jai Ho" while they cover the kitchen floor in colorful
    pigments.
  travel: Kamrun Patel, an adventurous two‑year‑old, loves family road trips to the Grand Canyon’s rim and short flights to visit grandparents in Colorado, and they prefer stroller‑friendly stops at desert
    mirages and bright sand dunes.
  culinary: Kamrun Patel, at two, adores sweet laddoos and soft roti hand‑fed by parents, yet also craves crunchy carrot sticks and occasional cheese‑filled tacos from the local food truck, and they often
    mix foods on their high‑chair tray.
  core: Kamrun Patel is a sociable, curiosity‑driven toddler who flits between boundless energy and sudden anxiety, thriving on bright colors, sensory play, and spontaneous family adventures while they
    occasionally misplace toys and resist bedtime.
background:
  cultural: Kamrun comes from a Gujarati South Asian family, speaking both Gujarati and English at home. His household celebrates Diwali and Navratri with lights, sweets, and traditional foods like roti,
    dal, and laddoo, and incorporates Bollywood music into daily life. The family values respect for elders, community cohesion, and hospitality. Living in El Mirage, Arizona, Kamrun also experiences the
    desert landscape, local community events, and a blend of American preschool activities, creating a multicultural upbringing that mixes South Asian traditions with Southwest American influences.
