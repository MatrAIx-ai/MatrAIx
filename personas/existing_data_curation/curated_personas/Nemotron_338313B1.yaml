  career_goals: Even at two, Kamrun loves to imagine himself as a "big helper"—someone who can fix things, make people smile, and be the center of attention. He often pretends to be a builder with his blocks,
    a teacher sharing stories, or a performer dancing to music. His short‑term ambitions include learning to read picture books, riding a tricycle, and helping his family with simple chores. Looking ahead,
    he dreams of a future where he can work with people, perhaps as a community helper, educator, or entertainer, using his talkative and charismatic nature.
