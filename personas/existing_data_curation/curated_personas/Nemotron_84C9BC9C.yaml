  hobbies: '[''Birdwatching'', ''Watercolor Painting'', ''Historical Novel Reading'', ''Heirloom Gardening'', ''Crossword Puzzles'', ''Knitting'', ''Intimate Chamber‑Music Concert Attendance'', ''Senior
    Reading Circle'', ''Historical Museum Volunteering'']'
  career_goals: 'Although retired, Alice aims to channel her competitive spirit into a mentorship legacy: she plans to establish a community‑based mentorship program that pairs senior scientists with high‑school
    students in Darke County, with a focus on nurturing curiosity and critical thinking. She also aspires to author an illustrated series of essays that explore the intersection of science and local art,
    documenting the county’s natural history and cultural heritage. Completing a comprehensive field guide to the native plants and bird species of Greenville remains a personal milestone, and she hopes
    to compile her life story as a memoir that highlights the challenges and triumphs of women in mid‑20th‑century STEM fields.'
