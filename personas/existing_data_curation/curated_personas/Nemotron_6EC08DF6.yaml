personas:
  professional: Jane Granada, a budding junior detective who loves solving backyard mysteries with LEGO clues, balances curiosity and practicality by meticulously organizing evidence while still improvising
    creative leads, and shows a competitive edge by racing friends to crack each case.
  sports: Jane Granada proudly dons a miniature Auburn Tigers jersey while playing forward for the Salem Little Kickers soccer club, channeling their competitive spirit into sprinting for the ball and tackling
    every drill with the same practical precision they apply to building LEGO, and joins the community’s fall baseball tee-ball league during the cooler months.
  arts: Jane Granada fills her sketchbook with detailed deer and cardinal drawings while humming Dolly Parton's Jolene and Bill Monroe's Blue Moon of Kentucky, and crafts friendship bracelets to the rhythm
    of those country and blue‑grass tunes, letting the music shape the colors and lines of her art.
  travel: Jane Granada’s travel horizon currently stays within the rolling hills of nearby Cheaha State Park and occasional visits to the county fair, yet they clutch a picture book of Paris and dream of
    a future family road‑trip to see the Eiffel Tower, preferring carefully plotted itineraries that balance sibling bonding with a love for exploring nature.
  culinary: Jane Granada eagerly helps stir the pot for grandma’s fried chicken and buttery biscuits, swears by a secret pinch of paprika in mac‑and‑cheese, and can name every spice in the pantry from cinnamon
    to oregano, though they often sneak extra honey‑drizzled biscuits when no one’s watching.
  core: Jane Granada is a fiercely curious seven‑year‑old who blends competitive LEGO mastery with a quiet love for nature sketches, never missing a chance to barter pocket money for the next mystery book,
    yet still forgets to floss after a candy binge.
background:
  cultural: Jane grows up in Salem, a small town in Russell County, Alabama. Her family embraces Southern hospitality and community traditions, attending church gatherings, family potlucks featuring Southern
    comfort foods, and local events like the county fair and holiday parades. The rural setting fosters a close connection to nature, self‑reliance, and a respect for neighborly support. While her household
    reflects a predominantly white Southern upbringing, it blends regional customs such as listening to country and blue‑grass music, sharing local folklore, and valuing family bonds and community involvement.
attributes:
  skills: '["Reading", "Basic arithmetic", "LEGO building", "Organizing school supplies", "Simple science experiments", "Tablet navigation", "Puzzle solving"]'
  hobbies: '["Reading mystery and adventure books", "LEGO building", "Drawing wildlife", "Backyard nature exploration", "Soccer", "Puzzle games", "Friendship bracelet making", "Church Sunday school activities"]'
  career_goals: Jane dreams of becoming a wildlife biologist or veterinarian because she loves animals and nature. In the near term she wants to win the school reading challenge, lead a project in the science
    fair, and serve as a class helper to practice responsibility. She aspires to develop strong problem‑solving and leadership skills so she can one day work on a team that protects the environment and
    helps communities, aiming to be recognized for her dedication and achievements.
