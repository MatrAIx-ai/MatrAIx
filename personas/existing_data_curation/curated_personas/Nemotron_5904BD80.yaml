  career_goals: Vilma dreams of turning her love of art and imagination into a career as a concept artist or multimedia designer. She hopes to study graphic design and animation at a university, create
    original characters and worlds for video games or animated films, and eventually run her own creative studio that produces inclusive content and raises awareness about teen mental‑health issues. In
    the meantime, she wants to grow her online presence as a young creator, sharing tutorials and short storytelling videos that inspire other teens to explore their own creativity.
