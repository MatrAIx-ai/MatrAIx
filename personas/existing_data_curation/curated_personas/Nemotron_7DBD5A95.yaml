    and Phone Etiquette'', ''Training and Mentorship of Administrative Staff'', ''Process Improvement and Workflow Optimization'', ''Conflict Resolution'', ''Stress‑Reduction Techniques in the Workplace'']'
  hobbies: '[''Reading (historical nonfiction and mystery novels)'', ''Knitting and crochet'', ''Gardening (vegetable and flower beds)'', ''Genealogy research'', ''Birdwatching'', ''Crossword puzzles and
    Sudoku'', ''Baking (bread and cookies)'', ''Small book club participation'', ''Volunteering at the community center'']'
  career_goals: Looking ahead, Danae aims to step into a senior administrative leadership role where she can champion office‑wide efficiency initiatives and mentor a new generation of support staff. She
    plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise and to spearhead the transition of her current office to a hybrid digital‑paper workflow that reduces
    manual errors and employee stress. While she values job stability at this stage of her career, she is also exploring part‑time remote consulting opportunities that would allow her to share best‑practice
    strategies with small businesses across Indiana, all while preserving a healthy work‑life balance.
