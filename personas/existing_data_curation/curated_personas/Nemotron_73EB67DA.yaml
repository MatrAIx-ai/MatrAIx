personas:
  professional: A budding visual artist and high‑school sophomore, Doris Wille channels their curiosity and methodical nature into a daily practice of sketching, watercolor, and digital illustration, while
    also volunteering to lead a junior art club that creates a community mural celebrating local heritage festivals.
  sports: A dedicated cross‑country runner and occasional basketball fan, Doris Wille trains on local trails, cheers for the Oklahoma City Thunder, and plays on the school’s junior varsity team, while also
    enjoying weekend hikes with a friend at the nearby Lake Thunderbird State Park.
  arts: An enthusiastic art aficionado, Doris Wille frequents the Oklahoma City Museum of Art, draws inspiration from contemporary illustrators like Loish and folk musicians such as Sufjan Stevens, and
    spends evenings composing acoustic guitar melodies while sketching watercolors of prairie sunsets.
  travel: A curious explorer with a love for both nature and culture, Doris Wille has visited the bustling galleries of Dallas, the historic sites of Santa Fe, and dreams of a road trip to the Great Smoky
    Mountains, planning each journey around school breaks and budgeting for bus tickets and modest camping gear.
  culinary: A budding home chef, Doris Wille enjoys crafting rainbow salads with fresh basil, cherry tomatoes, and feta, experimenting with homemade chicken fried steak seasoned with smoked paprika, and
    often pairs meals with a cup of mint tea, though they sometimes neglect to clean up the kitchen in a rush after sketching sessions.
  core: Doris Wille blends a quiet, methodical drive with a vivid artistic imagination, juggling schoolwork, sketchbooks, and a penchant for meticulous budgeting while occasionally forgetting to tidy up
    after creative bursts.
background:
  cultural: Doris is a White American raised in the small, close‑knit community of Choctaw, Oklahoma, a suburb of Oklahoma City. Her family reflects typical Mid‑Southern values of perseverance, modesty,
    and community involvement. While her immediate cultural heritage is European‑American, growing up in eastern Oklahoma has given her exposure to the region’s rich Native American history, particularly
    the Choctaw Nation’s presence. She has attended local cultural festivals and school programs that celebrate this heritage, fostering an appreciation for diverse narratives. The town’s blend of rural
    traditions and suburban growth has shaped her perspective—valuing both self‑reliance and collaborative community projects. Her upbringing also includes participation in church and school activities,
    which emphasize teamwork and service.
