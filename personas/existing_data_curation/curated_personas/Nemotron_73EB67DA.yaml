  career_goals: Doris aims to complete her high school education with honors and then pursue a bachelor's degree in visual arts or museum studies. She dreams of becoming a curator or community arts coordinator,
    where she can blend her love for art with her knack for organization to create engaging exhibitions and educational programs. In the longer term, she envisions establishing a local youth art mentorship
    program that encourages creativity and critical thinking among students in her hometown. She is also open to exploring careers in graphic design or digital media, seeing them as avenues to apply her
    technical skills while maintaining an artistic voice.
