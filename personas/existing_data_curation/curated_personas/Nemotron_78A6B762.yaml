personas:
  professional: Franklin is a 25‑year‑old tech entrepreneur who blends strategic vision, brand storytelling, and design thinking to launch a startup that turns abstract artistic concepts into interactive
    digital experiences, leveraging their bilingual fluency and improvisational work style while they juggle a relaxed approach to deadlines.
  sports: Franklin enjoys weekend hikes with the Bensenville Trail Runners, plays casual indoor soccer with friends supporting the Chicago Fire, follows the Chicago Cubs and Bulls enthusiastically, and
    they often skip gym workouts in favor of spontaneous outdoor activities.
  arts: Franklin spends evenings sketching mixed‑media pieces inspired by the surrealism of Salvador Dalí, listening to avant‑garde electronic tracks by Aphex Twin, practicing acoustic guitar to the rhythms
    of traditional tango, and they regularly attend film screenings of David Lynch, all while drawing creative fuel from the works of Banksy and the poetry of Octavio Paz.
  travel: Franklin favors low‑budget, spontaneous weekend getaways, having explored the vibrant streets of Buenos Aires, the historic plazas of Seville, and the natural beauty of the Great Smoky Mountains,
    but they usually plan trips on a whim using last‑minute flight deals and rely on friends for accommodation.
  culinary: Franklin is an adept grill‑master who perfects the smoky flavors of asado using chimichurri made from parsley, oregano, garlic, and vinegar, frequently pairs it with empanadas filled with spiced
    beef, and they savor mate brewed with fresh herbs while occasionally experimenting with fusion dishes like quinoa‑stuffed peppers.
  core: Franklin blends restless imagination with a laid‑back lifestyle, channeling cultural rituals into a tech‑driven art venture while they often misplace keys and miss deadlines.
background:
  cultural: Franklin was raised in a bilingual household that blended Argentine traditions with Midwestern American life. He speaks Spanish as his first language and is fluent in English, allowing him to
    navigate both cultures effortlessly. Family gatherings often feature Argentine customs such as sharing mate, dancing to tango or folklore music, and preparing classic dishes like empanadas and asado,
    which keep his heritage alive. Living in Bensenville, Illinois, he participates in the local Argentine community, celebrating national holidays and contributing to cultural festivals that promote Latin
    American art and cuisine. This bicultural upbringing informs his creative outlook, his entrepreneurial drive, and his commitment to fostering cross‑cultural dialogue through his work.
