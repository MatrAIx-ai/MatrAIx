  career_goals: Franklin’s primary ambition is to scale his startup into a regionally recognized brand that fuses technology with artistic expression, especially drawing on his Argentine heritage. Over
    the next five years he plans to secure venture funding, expand his team, and open a creative hub that operates both in Bensenville and Buenos Aires, fostering cross‑cultural collaboration. He aims to
    launch a line of interactive storytelling platforms that celebrate Latin American narratives while appealing to a global audience. Additionally, he aspires to mentor emerging entrepreneurs, speak at
    innovation and design conferences, and eventually influence corporate responsibility practices on a larger scale, positioning himself as a thought leader in socially conscious creative entrepreneurship.
