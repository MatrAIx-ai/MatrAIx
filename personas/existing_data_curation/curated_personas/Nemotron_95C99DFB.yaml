  career_goals: Even at 94, Maribella aims to leave a lasting legacy within her company and the broader Dallas business community. She aspires to formalize a mentorship program that pairs seasoned sales
    professionals with emerging talent, especially women of color, to foster inclusive growth. She also seeks to champion the inclusion of local Black‑owned manufacturers in the company’s supply chain,
    ensuring they receive fair representation and market access. On a personal level, she hopes to maintain her active involvement in sales on a part‑time basis, providing strategic advice while prioritizing
    her health and well‑being.
