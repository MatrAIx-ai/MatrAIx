personas:
  professional: Maribella Audrey, a 94‑year‑old veteran of wholesale and manufacturing sales who blends relentless curiosity with practical know‑how, leveraging their meticulous organizational skills to
    juggle a handful of key accounts while mentoring emerging talent, and channeling their sociable, compassionate nature into launching a mentorship program for women who have faced systemic barriers and
    advocating for the inclusion of local independent manufacturers owned by entrepreneurs who have historically had limited access to larger supply chains.
  sports: Maribella Audrey, a devoted fan of the Dallas Cowboys, Dallas Mavericks, and Texas Rangers, joins the Dallas Senior Walking Club each morning for leisurely strolls around the neighborhood and
    participates in gentle tai‑chi sessions at the community center; they balance their love of spectator sports with light aerobic activity and occasionally treat themselves to a game‑day brunch featuring
    shrimp and grits when the team wins.
  arts: Maribella Audrey, an avid jazz aficionado who fills their living room with the silky vocals of Ella Fitzgerald and the trumpet brilliance of Louis Armstrong, regularly attends weekly listening circles
    at the local senior center, delights in classic R&B legends such as Aretha Franklin and Marvin Gaye, and spends quiet afternoons leafing through historical fiction by Ken Follett and Hilary Mantel;
    they also visit the Dallas Museum of Art to admire Impressionist works, a habit that fuels their curiosity and provides a soothing counterbalance to their occasional anxiety.
  travel: Maribella Audrey, a nostalgic traveler who prefers well‑planned itineraries that blend heritage exploration with gentle relaxation, has visited New Orleans for its jazz‑filled streets, Savannah
    for its historic squares, Washington D.C. for its museums, and the Texas Hill Country to trace family roots; they dream of strolling through Charleston’s cobblestone lanes and taking a leisurely Mississippi
    river cruise, often booking trips through senior‑friendly travel agencies and budgeting carefully to accommodate their modest fixed income while ensuring they can still join the church fellowship upon
    return.
  culinary: Maribella Audrey, a seasoned home cook who tends a sunny balcony garden of thyme, basil, rosemary, and sage to flavor classic Southern dishes such as collard greens, gumbo, and shrimp and grits,
    prepares Sunday brunches featuring fried catfish and sweet tea, enjoys experimenting with fresh herbs but occasionally forgets to turn off the stovetop in moments of distraction, and balances their
    love of indulgent pecan pie with a disciplined approach to portion control and regular walks.
  core: Maribella Audrey, a 94‑year‑old sales sage whose relentless curiosity is balanced by periodic anxiety, tends fragrant balcony herbs while obsessively monitoring blood pressure, mentors young professionals,
    and they never skip a chapter of their beloved historical fiction.
background:
  cultural: Maribella grew up as part of the African‑American community in Dallas, shaped by the civil‑rights era and the rich cultural traditions of the South. Her upbringing emphasized the importance
    of church, family, and community solidarity. She carries forward the legacy of Southern hospitality, soul‑food cooking, and storytelling, while also embracing contemporary Black cultural expressions
    such as Juneteenth celebrations and local gospel music. Her experiences as a Black woman in the wholesale industry inform her commitment to mentorship and advocacy for greater representation of Black
    entrepreneurs in Dallas’s manufacturing sector.
