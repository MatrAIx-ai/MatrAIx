  career_goals: Maricela is still exploring her future, but she dreams of a career that merges her love for animals, nature, and technology. She imagines becoming a wildlife tech specialist who uses sensors
    and simple coding to monitor local habitats, or a graphic illustrator for children's books that celebrate Mexican culture and stories. She aims to keep learning new skills, remain flexible in her path,
    and eventually use her talents to give back to her community and protect the environment.
