personas:
  professional: Maricela Hayward is an aspiring junior programmer who blends their love for drawing cartoons and building LEGO with early coding skills in Scratch, often improvising new game mechanics on
    the fly, and their spontaneous, curiosity‑driven mindset helps them troubleshoot without strict plans.
  sports: Maricela Hayward plays forward for the Monrovia Youth Soccer Club, follows the Los Angeles Galaxy’s matches for inspiration, and spends weekend mornings hiking in the Angeles National Forest to
    build stamina, yet they sometimes skip their stretching routine, preferring spontaneous play.
  arts: Maricela Hayward spends free afternoons sketching characters from their favorite graphic novels, watches animated series like "Adventure Time" for style cues, and enjoys listening to regional mariachi
    and cumbia music while assembling LEGO, letting the rhythms influence their inventive storytelling.
  travel: Maricela Hayward has explored the nearby Joshua Tree National Park on a family camping trip, dreams of visiting the historic streets of Oaxaca someday, and prefers flexible itineraries that allow
    spontaneous detours, though their school schedule limits extended travel.
  culinary: Maricela Hayward helps their abuela prepare tamales and guacamole, proudly mastering the art of grinding fresh chilies, and while they adore the bold flavors of mole and salsa, they are equally
    enthusiastic about crafting perfect cheese pizza slices from scratch.
  core: Maricela Hayward is a curious, improv‑driven 10‑year‑old who blends bilingual family traditions, a love for building and coding, and a spontaneous spirit into every hobby, from soccer fields to
    kitchen counters.
background:
  cultural: Maricela comes from a Mexican immigrant family living in Monrovia, California. At home, Spanish is the primary language, and she participates in bilingual education at school, which keeps both
    Spanish and English sharp. She celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Navidad with homemade foods, music, and crafts, often prepared alongside her grandparents.
    The strong emphasis on family, respect for elders, and community involvement from her cultural heritage blends with the diverse, multicultural environment of Los Angeles County, shaping a rich, dual
    cultural identity.
