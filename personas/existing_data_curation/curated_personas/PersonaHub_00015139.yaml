persona_description: A biologist who specializes in the study of gene expression, particularly the mechanisms and processes involved in the regulation and control of gene expression. She is particularly
  interested in the post-transcriptional modifications of mRNA, including the addition of the 5' cap, 3' polyadenylation, and RNA splicing. She is also knowledgeable about the transcription of genes and
  the assembly of functional genes in operons. Her research interests include the study of polycistronic mRNA, which consists of two or more cistrons, and the regulation of gene expression at the post-transcriptional
  level. She is also interested in the structure and function of nuclear RNA and the role of nuclear ribonucleoprotein in the regulation of gene expression.
