personas:
  professional: Susan Cortes is a 42‑year‑old domestic management expert turned aspiring boutique craft entrepreneur, channeling their budgeting, large‑scale cooking, and community‑organizing talents into
    launching a home‑based quilting and crochet shop, and they often let inspiration dictate their schedule, navigating spontaneous creative impulses and occasional deadline challenges.
  sports: Susan Cortes enjoys low‑impact outdoor pursuits such as early‑morning bird‑watching on Arkansas trails, weekend hikes in the Ouachita National Forest, and occasional community softball games,
    and they prefer gentle activity over competitive sports.
  arts: Susan Cortes regularly visits the Little Rock Art Museum and county fairs, draws inspiration from textile artists like Faith Ringgold and modern quilter Jenny King, and they attend unconventional
    workshops like found‑object sculpture, weaving these influences into their quilting and crochet designs.
  travel: Susan Cortes favors weekend road‑trip adventures that blend relaxation and discovery, having driven scenic Highway 7 to explore Hot Springs’ historic bathhouses, and they dream of a culinary pilgrimage
    to Oaxaca, Mexico, to study traditional mole while balancing family duties.
  culinary: Susan Cortes experiments by blending Southern comfort foods—fried chicken, collard greens, and cornbread—with global flavors such as harissa‑spiced okra or miso‑glazed sweet potatoes, meticulously
    journaling each recipe, and they occasionally forget to refrigerate leftovers, leading to occasional waste.
  core: Susan Cortes is a curious, spontaneous 42‑year‑old craft and garden enthusiast who balances meticulous budgeting with impromptu creativity, often juggling community projects, quilting ambitions,
    and a love for global‑southern cuisine, and they sometimes let deadlines slip.
background:
  cultural: Susan grew up in a small, predominantly white, Southern community in Arkansas where traditions of hospitality, church life, and agricultural rhythms shaped daily experience. Raised in a Baptist
    household, she internalized values of community service, modesty, and strong family ties. Generational recipes, folk music, and DIY craftsmanship were staples of her upbringing, fostering a deep respect
    for heritage while her natural curiosity encourages an openness to diverse artistic expressions. The close‑knit nature of Hensley and Saline County blends traditional rural values with a growing interest
    in cultural events, giving Susan a worldview that honors her Southern roots while embracing new ideas and experiences.
attributes:
  skills: '[''Domestic management'', ''Culinary arts (Southern & experimental cooking)'', ''Gardening'', ''Quilt‑making and crochet'', ''Community event organization'', ''Interpersonal communication'',
    ''Basic home repair'', ''Smartphone and social media usage'']'
  hobbies: '[''Visiting art galleries and local museums'', ''Quilting and crochet projects'', ''Cooking and recipe experimentation'', ''Gardening and community gardening'', ''Birdwatching'', ''Hiking on
    Arkansas trails'', ''Scrapbooking and memory keeping'', ''Attending county fairs and craft shows'']'
  career_goals: Susan hopes to turn her quilting and crochet work into a modest home‑based boutique, selling unique pieces at local craft fairs and through an online shop. She also aims to expand her vegetable
    garden into a community garden that provides fresh produce for neighbors and the local school. To support these ambitions, she plans to enroll in adult‑literacy and basic business courses at the nearby
    community college, strengthening her writing, marketing, and bookkeeping skills. Long‑term, Susan envisions becoming a trusted mentor for other stay‑at‑home parents, leading workshops on sustainable
    cooking, garden sharing, and DIY crafts while continuing to explore new artistic ideas.
