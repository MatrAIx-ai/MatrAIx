  career_goals: David aims to expand his company's footprint into sectors where art, technology, and sustainability intersect, positioning the firm as a catalyst for culturally informed innovation. He seeks
    to launch a dedicated incubator that supports startups merging creative design with sustainable solutions, while preserving his preference for autonomous, quiet work environments. Long‑term, he envisions
    transitioning to a philanthropic role that funds public art initiatives and educational programs in Philadelphia, cementing a legacy that marries business acumen with cultural enrichment.
