  hobbies: '[''Reading speculative fiction and fantasy'', ''Creative writing (short stories, poetry)'', ''Digital drawing and illustration'', ''Playing piano'', ''Journaling and mindfulness'', ''School
    robotics club and basic coding'', ''Nature walks and landscape sketching'', ''Puzzle books and logic games'']'
  career_goals: Harriet aspires to combine her love for art and science by becoming a concept artist or visual designer for scientific education, eventually aiming for a career in interdisciplinary fields
    such as scientific illustration, game design, or architecture. She dreams of attending a specialized STEM‑arts high school, earning a scholarship to a university where she can pursue a double major
    in Computer Science and Fine Arts, and later contributing to projects that make complex ideas accessible and inspiring for others. Her long‑term ambition includes mentoring younger students and creating
    inclusive learning resources that foster curiosity and creativity.
