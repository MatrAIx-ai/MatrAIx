personas:
  professional: Harriet Schanck is an aspiring young technologist who channels their disciplined organization and analytical curiosity into designing simple, narrative-driven video games for the middle
    school robotics club, while weaving in speculative-fiction themes that reflect their vivid imagination.
  sports: Harriet Schanck spends early mornings training with the Evergreen Middle School Swim Team, joins the after-school cross-country club for endurance runs, and quietly cheers for the Seattle Seahawks
    and the Seattle Sounders FC during televised games, preferring structured, low-pressure activities that match their disciplined yet reserved nature.
  arts: Harriet Schanck devotes afternoons to composing original piano pieces reminiscent of Yiruma's soothing melodies, sketches digital landscapes inspired by Hayao Miyazaki's Studio Ghibli films, and
    immerses in speculative-fiction worlds of Neil Gaiman and Ursula K. Le Guin, often citing the lyrical storytelling of Taylor Swift as inspiration for their poetry.
  travel: Harriet Schanck prefers meticulously planned family getaways, relishes nature hikes at the Grand Canyon and Yellowstone National Park, and dreams of immersive cultural trips to Kyoto, Japan and
    the northern lights in Iceland, balancing a love for quiet exploration with occasional anxiety about unfamiliar crowds.
  culinary: Harriet Schanck enjoys crafting simple yet creative meals such as avocado toast topped with chili flakes, mastering the art of perfecting spaghetti carbonara with pancetta and Pecorino, and
    experimenting with matcha green tea lattes, displaying a budding culinary curiosity tempered by occasional over-seasoning.
  core: Harriet Schanck is a fiercely imaginative, hyper-organized 12-year-old who channels anxiety into detailed world-building, yet often loses sleep over imagined catastrophes and forgets to eat while
    hunched over a laptop.
background:
  cultural: Harriet was raised in North Highlands, a suburban community in Sacramento County, California, within a middle‑class, predominantly English‑speaking family of European ancestry. Her upbringing
    blends typical American middle‑class values with exposure to the diverse cultural landscape of the Bay Area region, where she participates in local community events such as library reading programs,
    youth art workshops, and seasonal festivals at the Sacramento County Fair. Her family emphasizes education, community service, and artistic expression, encouraging her to engage in school clubs, volunteer
    tutoring, and collaborative projects while fostering an appreciation for both local traditions and the broader multicultural environment of California.
attributes:
