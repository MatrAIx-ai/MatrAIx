personas:
  professional: Reuben James, a veteran quality‑assurance maestro in food and beverage manufacturing, blends four decades of visual inspection, statistical process control, FDA/USDA compliance, and equipment
    troubleshooting with a relaxed, curiosity‑driven mindset as they transition into a part‑time advisory role mentoring younger staff and helping small producers meet safety standards.
  sports: Reuben James enjoys low‑impact activities, playing weekly shuffleboard at the Brooksville Senior Center, cheering for the Tampa Bay Rays and the Florida Gators, and they occasionally join a community
    walking group that meets at the local waterfront park.
  arts: Reuben James paints delicate watercolors of Florida wetlands inspired by Monet and O’Keeffe, they blow a bluesy harmonica at spontaneous jam sessions in downtown jazz clubs featuring the music of
    Miles Davis and John Coltrane, and they enrich church services as a parish choir member.
  travel: Reuben James favors leisurely road trips to historic southern towns like St. Augustine and Savannah, they often draft a rolled‑up napkin itinerary that leaves room for spontaneous detours to local
    art festivals and farmer’s markets.
  culinary: Reuben James delights in cooking hearty Southern dishes such as gumbo simmered with okra, andouille sausage, and cayenne, they fry chicken brined in buttermilk, and they pair these meals with
    fresh garden vegetables like collard greens and tomatoes harvested from their own backyard.
  core: Reuben James is a garden‑loving, watercolor‑pigmented, harmonica‑playing 72‑year‑old who melds a relaxed, slightly disorganized lifestyle with an unwavering devotion to community, mentorship, and
    Southern flavors, and they approach each day with a curious, friendly smile.
background:
  cultural: Reuben is a second‑generation African‑American born in the early 1950s in the Deep South. He grew up amid the civil‑rights movement, attending a historically Black church where gospel music
    and community service were central. His family traditions include Sunday potlucks, storytelling, and a deep respect for elders. He carries forward Southern African‑American cultural influences—such
    as a love for blues, jazz, and soulful cooking—while also embracing the diversity of modern Florida. His experiences have shaped a strong sense of resilience, community responsibility, and appreciation
    for both heritage and new cultural expressions.
attributes:
  skills: '[''Visual Inspection'', ''Sampling and Weighing'', ''Equipment Calibration'', ''Statistical Process Control'', ''Regulatory Compliance (FDA, USDA)'', ''Report Writing'', ''Troubleshooting'',
