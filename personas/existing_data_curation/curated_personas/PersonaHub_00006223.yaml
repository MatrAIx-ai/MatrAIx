persona_description: A Purdue University professor who specializes in the development of mathematical models and sensors for tracking hazardous materials and pathogens in airline cabins. The professor is
  currently working on a system that uses inverse simulation to analyze the dispersion of hazardous materials and then runs the dispersion in reverse to find their origin. The system can track a substance
  to an area the size of a single seat in an airline cabin. The professor's research is supported by the Air Transportation Center of Excellence for Airline Cabin Environment Research, established by the
  Federal Aviation Administration (FAA).
