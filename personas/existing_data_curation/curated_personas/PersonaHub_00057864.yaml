persona_description: A legal scholar who is a proponent of alternative dispute resolution methods, particularly mediation, and believes that the adversarial system is too costly, painful, and destructive
  for a truly civilized society. He is a member of the American Bar Association and has spoken at the Pound Conference, which aimed to develop alternative methods for resolving disputes. He is a lawyer,
  a judge, and a law teacher who has become so mesmerized with the stimulation of the courtroom contest that he tends to forget that he should be a healer.
