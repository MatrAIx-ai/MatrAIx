  hobbies: '[''Reading practical nonfiction (DIY, automotive, gardening)'', ''Gardening (vegetable plot)'', ''Single‑player video gaming (strategy/simulation)'', ''Listening to R&B, soul, hip‑hop music'',
    ''Fishing at local lakes'', ''Nature walks/hiking in Shenandoah area'']'
  career_goals: Nathaniel's immediate goal is to secure a paid apprenticeship with a local contractor or trade union, focusing on electrical or HVAC work where he can build on his practical skills within
    a structured environment he finds reassuring. Over the next five years he aims to become a certified journeyman electrician, eventually launching a small, reliable handyman service that emphasizes consistent,
    solitary work for residential clients in Spotsylvania. If local apprenticeship opportunities prove limited, he is also considering enlisting in the U.S. Navy to gain technical training and a stable
    career path, as the military's routine and clear expectations align with his preference for familiarity and practicality.
