personas:
  professional: Corey Barnack, an American History instructor at a community college, leverages deep historical expertise, empathetic counseling, and digital tools like Canvas to craft inclusive, discussion‑rich
    courses that integrate student mental‑health support, while they navigate occasional disorganization with a flexible, curiosity‑driven mindset.
  sports: Corey Barnack, an avid hiker of the Rock Creek Park and Great Falls trails, frequents the Capital Trails Hiking Club for weekend treks and joins a local running group for 5K races, while their
    seasonal fandom includes cheering for the Washington Capitals, the Washington Wizards, and DC United, and they occasionally dabble in cross‑country skiing in Virginia’s winter months.
  arts: Corey Barnack, an amateur acoustic‑guitarist who strums folk classics by Bob Dylan and Joni Mitchell while they unwind, frequently visits the Smithsonian American Art Museum and the Kennedy Center
    for live chamber music, and they enjoy board‑game nights with friends featuring Catan and strategic titles that spark their analytical curiosity.
  travel: Corey Barnack, a history‑enthusiast traveler, has trekked the Appalachian Trail sections in Shenandoah, toured the battlefields of Gettysburg and the Freedom Trail in Boston, and dreamed of exploring
    the Musée de l'Armée in Paris and the Hiroshima Peace Memorial in Japan, preferring self‑planned itineraries that balance solitary reflection with occasional study‑focused group tours despite a modest
    budget.
  culinary: Corey Barnack, a culinary experimenter who can whip up a fragrant Indian butter chicken with turmeric and garam masala, a Thai green curry seasoned with lemongrass and fish sauce, and a delicate
    Japanese ramen garnished with miso‑soft boiled eggs, enjoys sourcing fresh herbs from the local farmers market and, while they possess solid knife skills, they sometimes over‑simmer sauces in their
    quest for flavor depth.
  core: Corey Barnack, a reflective history professor who balances a love for solitary hikes, acoustic guitar, and mindfulness with chronic anxiety and a habit of leaving lesson plans to the last minute,
    channels their emotional intensity into nurturing students and cooking experimental global dishes.
background:
  cultural: Corey grew up in a predominantly white, middle‑class suburb of Montgomery County, Maryland, where his family’s Irish‑German heritage shaped a modest, community‑oriented upbringing. The proximity
    to Washington, D.C., exposed him early to a rich tapestry of museums, cultural festivals, and political discourse, fostering a curiosity about diverse perspectives. While his personal traditions align
    with mainstream American customs—celebrating holidays such as Thanksgiving and the Fourth of July—he embraces the region’s progressive values, which inform his inclusive teaching style and commitment
    to social equity.
attributes:
  skills: '["American History expertise", "Curriculum development", "Pedagogical design", "Digital classroom technology (Canvas, Zoom)", "Student advising and academic counseling", "Facilitation of small-group
    discussions", "Inclusive teaching practices", "Conflict resolution", "Empathy and emotional intelligence", "Critical thinking and problem solving"]'
  hobbies: '["Reading historical non-fiction", "Hiking in Rock Creek Park", "Nature photography", "Playing acoustic guitar", "Journaling", "Mindfulness meditation", "Cooking experimental dishes", "Playing
    board games with close friends"]'
  career_goals: Corey aims to formalize his expertise by completing a Master’s degree in Educational Psychology within the next three years, focusing on evidence‑based strategies for student mental‑health
    support. He aspires to transition to a tenure‑track position, eventually becoming department chair, where he can shape policies that prioritize holistic student well‑being. He is also developing a community‑university
    partnership that offers dual‑enrollment courses for local high‑school students, hoping to broaden access to higher education. In the longer term, Corey plans to author a textbook on contemporary American
    history that foregrounds underrepresented perspectives and integrates reflective, wellness‑focused assignments.
