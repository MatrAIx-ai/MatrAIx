persona_description: A theoretical chemist who specializes in the study of glass and its molecular structure. He is known for his work in simulating the interactions of glass particles in multiple dimensions
  and for challenging the prevailing assumption that the shape of the particle cage is a Gaussian distribution. His research interests include understanding the nature of glass, the transition between a
  liquid and a solid, and the relationship between glassy states of matter and jammed states.
