persona_description: A mechanical engineer with expertise in designing and modeling of piston in combustion engines. This person is likely to be interested in projects related to the optimization of engine
  performance, particularly in the context of large, heavy engines used in railroad, marine, and stationary services. They have experience with modeling and simulation techniques and are skilled in understanding
  the behavior of pistons under different conditions. They are interested in understanding how the different parts of the piston, such as the crown, piston rings, hubs, and skirt, interact with each other
  and with the thermal and force stresses they experience. They are also likely to be interested in materials science and how different materials can affect the performance of pistons.
