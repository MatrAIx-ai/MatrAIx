personas:
  professional: Brett Hurt, an aspiring elementary educator, leverages meticulous lesson planning, data‑driven assessment, and seamless integration of robotics kits to turn his curiosity‑driven, competitive
    nature into measurable student gains.
  sports: Brett Hurt devotes weekends to intramural basketball with the Hilltop Hawks, follows Union Omaha in USL League One, roots for the Nebraska Cornhuskers football team, and logs 10,000‑step hikes
    in the Sandhills using a smartwatch while balancing a disciplined routine of weight‑training and yoga to counter basketball‑induced knee wear.
  arts: Brett Hurt spends Saturday evenings strumming acoustic renditions of Bob Dylan and Phoebe Bridgers at the local Brew & Brew open‑mic, while their literary palate absorbs the worlds of Octavia Butler
    and Alastair Reynolds, and they unwind by binge‑watching Christopher Nolan’s filmography.
  travel: Brett Hurt plans budget‑friendly road trips to the Badlands, Yellowstone, and the Pacific Northwest for weekend hikes, and dreams of a semester‑long study abroad in Kyoto, Japan, to explore the
    city’s robot museums and sushi culture, balancing tightly saved travel funds with spontaneous spur‑of‑the‑moment camping.
  culinary: Brett Hurt, a competent home‑cook, often prepares smoked catfish with cumin‑spiced cornmeal crust, a signature trail‑mix of roasted peanuts, dried cranberries, and dark chocolate, and treats
    themselves to artisanal pepperoni pizza from Pete’s Pizzeria after open‑mic gigs, all while experimenting with hydroponic basil grown in their dorm room.
  core: Brett Hurt, an 18‑year‑old future teacher, merges a meticulously organized classroom mindset with a love for rockets, basketball, and acoustic guitar, but habitually rehearses lesson plans while
    strumming, and can’t resist adding one more LEGO piece to every new project.
background:
  cultural: Brett grew up in the Lincoln metropolitan area of Nebraska, the child of a family with German‑Irish roots that values hard work, community service, and modesty. The Midwest’s emphasis on practicality
    and self‑reliance shaped his balanced outlook, while local traditions like county fairs, volunteer fire department events, and church gatherings fostered his sociable nature. He was raised in a Protestant
    (Lutheran) household that encouraged both academic curiosity and disciplined responsibility. This cultural milieu instilled a respect for educational institutions, a love of the outdoors, and a collaborative
    community spirit that influences his teaching philosophy.
attributes:
  skills: '["Lesson planning", "Classroom management", "Curriculum design", "Educational technology integration (Google Classroom, interactive whiteboards)", "Data-driven instruction", "Differentiated instruction",
    "Formative and summative assessment design", "Student engagement strategies", "Peer mentoring", "STEM project facilitation"]'
  hobbies: '["Intramural basketball", "Hiking in the Sandhills", "Fishing", "Model rocketry", "Lego Mindstorms robotics", "Reading science-fiction", "Reading educational theory", "Acoustic guitar playing",
    "Volunteering as youth soccer coach"]'
  career_goals: Brett aims to complete his bachelor's degree in elementary education within the next two years, followed by a master's in educational leadership. He aspires to become a lead teacher and
    eventually a curriculum specialist who designs interdisciplinary units that fuse hands‑on inquiry with state standards. He is competitive and hopes to earn district‑wide recognition for improving student
    achievement scores, and he plans to present his innovative lesson models at state education conferences. Long‑term, he envisions taking on an administrative role, such as principal, where he can champion
    data‑driven practices and professional development programs that empower teachers to balance creativity with accountability.
