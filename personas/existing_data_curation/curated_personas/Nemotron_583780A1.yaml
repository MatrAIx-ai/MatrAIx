  hobbies: '[''Adult softball league'', ''Coastal fishing trips'', ''Hiking in state parks'', ''Following Boston Red Sox'', ''Following New England Patriots'', ''Home brewing craft beer'', ''Cooking and
    recipe experimentation'', ''Volunteering at local food bank'', ''Attending community festivals'', ''DIY home improvement projects'']'
  career_goals: Robert aims to advance within the quick‑service industry by moving into a shift‑supervisor role and eventually becoming a store manager. He plans to complete his associate degree in business
    administration, focusing on hospitality management, to strengthen his leadership capabilities. In the longer term, he aspires to open a small neighborhood café that emphasizes locally sourced seafood
    and community gatherings. He also hopes to earn a food‑service manager certification, allowing him to oversee multiple locations or transition into corporate training. Providing a stable future for
    his family and contributing to the local economy are central to his ambition.
