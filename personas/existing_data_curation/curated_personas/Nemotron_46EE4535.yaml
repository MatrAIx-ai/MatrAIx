personas:
  professional: Mayda Sanchez is a senior marketing strategist who fuses data‑driven insights with an artist’s intuition to craft multicultural brand narratives; they lead integrated campaigns across digital,
    social, and experiential channels, and guide cross‑functional teams with meticulous project management balanced by agile creativity.
  sports: Mayda Sanchez hikes with the San Bernardino Trail Association each spring, follows the LA Lakers and LA Galaxy, attends weekly yoga sessions, and joins community 5K runs to stay fit and social;
    they enjoy the camaraderie of group activities.
  arts: Mayda Sanchez immerses themselves in the Los Angeles County Museum of Art’s modern collections, draws inspiration from Frida Kahlo’s vibrant portraits and Yayoi Kusama’s immersive installations,
    and creates their own watercolor landscapes and wheel‑thrown pottery infused with the vivid colors of their heritage.
  travel: Mayda Sanchez plans trips with meticulous budgeting blended with spontaneous exploration, favoring culturally rich destinations such as Antigua and the Mayan ruins of Tikal, Kyoto’s historic temples,
    and weekend escapes to Sedona’s red rocks; they relish the balance between structured travel logistics and on‑the‑fly discovery.
  culinary: Mayda Sanchez’s culinary routine centers on simmering aromatic pepian with roasted chiles, cilantro, and achiote, crafting kak'ik turkey broth with coriander and lime, and experimenting with
    avocado‑lime salsa on grilled fish; they also indulge in Oaxacan mole at a local favorite restaurant.
  core: Mayda Sanchez is a culturally‑savvy marketer who can pivot from brushstroke to boardroom in the same breath, yet they often forget to water their indoor succulents.
background:
  cultural: Mayda was born to Guatemalan immigrant parents who settled in Southern California in the early 1990s. Raised in a bilingual household, she speaks fluent Spanish and English, and her upbringing
    blended traditional Guatemalan customs—such as celebrating Dia de los Muertos, Semana Santa processions, and the November Dia de la Independencia—with the multicultural vibrancy of the Inland Empire.
    Family gatherings feature folkloric music, handcrafted textiles, and meals centered on corn‑based dishes, instilling a deep appreciation for her heritage’s visual and culinary arts. This cultural lens
    informs her professional perspective, prompting her to integrate authentic Latino narratives into campaigns and champion diversity in the workplace. She actively participates in the local Hispanic business
    alliance and mentors fellow professionals of Latin American descent, preserving her roots while contributing to the broader Californian community.
