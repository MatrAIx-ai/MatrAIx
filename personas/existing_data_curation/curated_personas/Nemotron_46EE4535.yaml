  career_goals: Mayda aims to ascend to a senior executive role such as Director of Marketing or Vice President of Brand Strategy within the next five years, leveraging her unique blend of artistic sensibility
    and analytical rigor. She aspires to champion culturally inclusive campaigns that foreground Latin American narratives and sustainable brand practices. Alongside her corporate trajectory, she envisions
    launching a boutique consultancy that helps mid‑size firms integrate arts‑driven storytelling and multicultural insights into their branding. Mayda also plans to complete an executive MBA to deepen
    her strategic finance acumen, mentor emerging women marketers, and eventually serve on the board of a nonprofit promoting arts education in underserved communities.
