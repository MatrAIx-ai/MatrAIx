personas:
  professional: Zella Lacombe, a 53‑year‑old senior healthcare operations leader, leverages her data‑driven strategic planning and regulatory expertise to streamline multi‑site hospital systems while infusing
    design‑thinking and art‑therapy initiatives that reflect her curious, collaborative, yet emotionally sensitive nature.
  sports: Zella Lacombe incorporates gentle yoga and weekend jogs along the river trail to manage stress, while cheering for the Chicago Cubs during baseball season and joining a community cycling club
    that meets every Saturday.
  arts: Zella Lacombe spends her free time sketching watercolor scenes of the city skyline, photographing street murals inspired by the works of Henri Matisse and contemporary photographer Annie Leibovitz,
    and curating mini‑exhibitions at the local art museum featuring Frida Kahlo prints, which fuels her identity as an avid lifelong learner.
  travel: Zella Lacombe plans culturally immersive trips with detailed itineraries, favoring extended stays in Paris to study Impressionist galleries, week‑long explorations of Florence’s Renaissance architecture,
    and soulful weekend getaways to New Orleans for jazz and Creole cuisine, balancing her love of learning with a desire for restful, purposeful travel.
  culinary: Zella Lacombe enjoys recreating dishes like classic French ratatouille with fresh Provençal herbs, Tuscan ribollita soup seasoned with kale and cannellini beans, and New Orleans gumbo rich with
    okra and Andouille sausage, showcasing her moderate cooking skill and penchant for ingredient‑driven, globally inspired meals.
  core: Zella Lacombe is a strategically minded healthcare operations veteran whose curiosity for the arts and relentless anxiety drive a meticulous yet occasionally impulsive pursuit of balance between
    professional excellence and creative fulfillment.
background:
  cultural: Zella is a white American who grew up in the suburban Midwest, with deep family roots in the French-Canadian communities of Michigan’s Upper Peninsula. Raised in a modest, Catholic household
    in Grand Blanc, she internalized Midwestern values of hard work, community engagement, and modesty. The region’s blend of industrial heritage and vibrant arts scene, especially the proximity to Detroit’s
    music and visual-arts culture, shaped her appreciation for both practicality and creativity. She maintains close ties with her extended family and participates in local traditions such as the annual
    Grand Blanc Summer Festival and the French-Canadian St. Jean‑Baptiste celebrations. Her bilingual exposure to English and French influences her communication style and adds a multicultural dimension
    to her professional collaborations.
