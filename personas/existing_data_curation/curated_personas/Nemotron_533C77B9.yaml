  career_goals: Zella aims to advance to a regional director or chief operating officer role within a multi-site health system, where she can shape organizational strategy on a larger scale. She envisions
    spearheading integrated care models that blend evidence-based medicine with creative therapeutic modalities such as art therapy and music medicine. Passionate about staff well‑being, she plans to launch
    a system-wide mental-health support network that reduces burnout among clinicians. To broaden her impact, Zella is pursuing an executive MBA focused on health-care innovation and is active in professional
    societies to stay at the forefront of policy and technology. Ultimately, she hopes to leave a legacy of patient‑centered, compassion-driven care that balances operational excellence with humanistic
    values.
