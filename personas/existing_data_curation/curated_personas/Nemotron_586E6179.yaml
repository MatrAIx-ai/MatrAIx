  hobbies: '[''Gardening'', ''Hiking Trails in Muskingum County'', ''Birdwatching'', ''Reading Historical Non-Fiction'', ''Cooking'', ''Quilting'', ''Small Book Club'', ''Volunteering at Local Library'']'
  career_goals: Kristina aims to transition into a supervisory role within the regional social service network, eventually becoming a program manager for a community‑focused initiative that bridges education
    and social support. She plans to earn a Master’s in Social Work to deepen her clinical skills and to lead the development of evidence‑based programs for families and adults in Muskingum County. Over
    the next five years, she hopes to mentor junior staff, expand inter‑agency collaborations, and secure funding for innovative outreach projects that combine education and mental‑health resources.
