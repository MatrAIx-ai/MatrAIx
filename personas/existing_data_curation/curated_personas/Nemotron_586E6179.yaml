personas:
  professional: Kristina Kettering leverages her case management expertise and graduate education in adult learning to design evidence-based community workshops, balancing data-driven rigor with a down-to-earth,
    people-first approach that reflects her Midwestern upbringing of self-reliance and humility, and they bring a calm confidence to every stakeholder meeting.
  sports: Kristina Kettering hikes the Tuscarawas Trail with the local Canyon Club hikers, volunteers as a water-carrier for the Muskingum County youth softball league, and they root for the Columbus Blue
    Jackets, preferring low-impact endurance activities over high-intensity sports.
  arts: Kristina Kettering spends quiet evenings quilting while listening to folk-rock duo The Avett Brothers, attends the seasonal performances of the Ohio Playhouse, and they participate in a historical
    nonfiction book club that discusses works by Doris Kearns Goodwin and Erik Larson.
  travel: Kristina Kettering enjoys weekend road trips to Hocking Hills State Park and the Amish Country of Holmes County, they plan meticulously using paper maps, and they dream of a summer abroad in the
    Scottish Highlands to trace ancestral tales, balancing budget constraints with a love for nature.
  culinary: Kristina Kettering favors wholesome dishes like roasted root vegetable medley, chicken pot pie with a flaky crust, and an apple crisp made with hand-picked orchard apples, and they cook with
    garden-fresh herbs such as rosemary and thyme while still relying on a trusty Dutch oven.
  core: Kristina Kettering blends pragmatic community service with a curiosity for history and nature, preferring quiet, purposeful moments over crowds, and they balance modest financial prudence with occasional
    creative splurges.
background:
  cultural: Kristina is a white Midwestern American who was born and raised in a small town near Heath, Ohio. Her family heritage includes German and Irish roots, and she grew up in a modest, Protestant
    household that emphasized community service, self‑reliance, and humility. The cultural norms of the region—strong neighborhood ties, respect for tradition, and a pragmatic outlook—have shaped her values,
    while her education and professional experiences have opened her to diverse perspectives and innovative practices.
attributes:
  skills: '[''Case Management'', ''Community Outreach'', ''Program Coordination'', ''Curriculum Development'', ''Adult Education'', ''Crisis Intervention'', ''Data Analysis'', ''Report Writing'', ''Resource
