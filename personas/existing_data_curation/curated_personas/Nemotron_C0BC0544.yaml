    ''Attending local community fairs'', ''Crossword puzzles'', ''Model train building'', ''Walking the family dog'']'
  career_goals: Kelly aims to transition from a frontline driver to a supervisory role within the next five years, targeting a position as a fleet supervisor or logistics coordinator for a regional transportation
    firm. She plans to earn a Certified Transportation Manager (CTM) credential and complete OSHA safety training to broaden her managerial qualifications. Long‑term, she envisions launching a small, family‑run
    logistics business that specializes in moving agricultural products from local farms in Scott County to nearby markets, providing a stable financial foundation for her family and the community.
