personas:
  professional: Kelly Schell is a seasoned long‑haul and local delivery driver with a clean CDL Class A license, who leverages meticulous route planning, vehicle maintenance expertise, and calm problem‑solving
    to consistently meet DOT safety standards while delivering top‑tier customer service, and is actively preparing for a supervisory logistics role through CTM certification and OSHA training.
  sports: Kelly Schell is an avid fisherman on the Leaf River and a regular member of the local community fishing club, follows the New Orleans Saints for football and the Mississippi State Bulldogs during
    college season, joins a weekend recreational softball league to stay active, and supplements their routine with morning walks and occasional bicycling for cardiovascular health.
  arts: Kelly Schell enjoys unraveling mysteries by Agatha Christie and Tana French, listening to blues legends like B.B. King and contemporary storytellers such as John Prine, watching classic Southern
    films like 'The Help' and Coen brothers movies, and finds quiet joy crafting model train layouts reminiscent of Thomas the Tank Engine scenes at local fairs featuring folk art.
  travel: Kelly Schell prefers meticulously planned road trips that balance low‑key relaxation with occasional adventure, having explored New Orleans for its music scene, taken a weekend getaway to Asheville’s
    mountain trails, and earmarked Gulf Shores and the Great Smoky Mountains for future visits, while budgeting around family obligations and modest savings.
  culinary: Kelly Schell, a confident home cook, delights in crafting hearty Southern meals such as fried catfish with hush‑puppy cornmeal batter, collard greens seasoned with smoked paprika, shrimp and
    grits topped with garden‑fresh tomatoes and okra, and jambalaya infused with smoked sausage, often using home‑grown vegetables to add a personal touch to family‑style feasts.
  core: Kelly Schell blends a steady, methodical work ethic with a love for solitary hobbies, yet secretly hoards extra garden tools and sometimes forgets to water the vegetables during hectic weeks.
background:
  cultural: Kelly grew up in a close‑knit, white, rural community in Forest, Mississippi. Her upbringing was steeped in Southern values of hard work, self‑reliance, and hospitality. Family gatherings, church
    events, and community festivals have long been central to her social life, fostering a strong sense of belonging and mutual support. She identifies with the modest, tradition‑oriented lifestyle typical
    of small‑town Mississippians, where faith, family, and responsibility are prized. These cultural influences shape her dependable work ethic, respect for routine, and commitment to contributing positively
    to her local community.
attributes:
