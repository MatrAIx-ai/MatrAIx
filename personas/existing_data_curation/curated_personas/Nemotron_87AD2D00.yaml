personas:
  professional: Winna Reyes, a 28‑year‑old architect, blends a practical curiosity with a collaborative spirit, and they leverage Revit, Rhino, and Grasshopper to craft adobe‑infused, energy‑efficient high‑desert
    projects while often embracing a relaxed approach to deadlines and spontaneous brainstorming.
  sports: Winna Reyes fuels their love of movement by hiking the Organ Mountains with the Desert Peaks Hiking Group, attending weekly yoga at Sunrise Yoga Studio, cheering on the Albuquerque Isotopes, and
    they also join a community soccer league for friendly weekend matches.
  arts: Winna Reyes nurtures their artistic side through folklórico dance, curating neighborhood murals inspired by Frida Kahlo and Diego Rivera, devouring architecture books by Zaha Hadid, and they unwind
    to the sounds of Lila Downs and the indie band Calexico at local cafés.
  travel: Winna Reyes prefers spontaneous road trips across the Southwest, from sunrise hikes in Santa Fe to night markets in Tucson, and they also dream of cultural immersion in Oaxaca City and the historic
    cliff dwellings of Mesa Verde, balancing a modest travel budget with a desire for authentic, community‑focused experiences.
  culinary: Winna Reyes enjoys cooking at home, skillfully preparing mole poblano, hand‑made tamales, and spicy chilaquiles with roasted chilies, epazote, and fresh cilantro, while they also delight in
    artisanal coffee from local roasters and savor street‑style elote topped with cotija cheese and lime.
  core: Winna Reyes is a community‑focused architect who juggles a love for sunrise hikes, elaborate Día de los Muertos altars, and a perpetual worry about deadlines, and they often trade meticulous plans
    for spontaneous creativity.
background:
  cultural: Winna’s Mexican heritage runs deep through family traditions, bilingual fluency, and a strong sense of community. Growing up in a bilingual household, she celebrates Día de los Muertos and other
    Mexican holidays with elaborate altars, shared meals, and music, keeping strong ties with relatives in Mexico. The borderland culture of Deming informs her appreciation for the blend of American and
    Mexican influences, which she often incorporates into her designs—using adobe walls, vibrant tiles, and interior courtyards that echo traditional Mexican architecture while meeting modern sustainability
    standards. She is an active member of local Hispanic cultural organizations, participates in community clean‑up events, and mentors young Mexican‑American students interested in STEM and design, reflecting
    her values of cooperation, harmony, and cultural pride.
attributes:
  skills: '[''Revit'', ''AutoCAD'', ''SketchUp'', ''Rhino'', ''Grasshopper'', ''Sustainable Design'', ''LEED AP Process'', ''Adobe Construction Techniques'', ''Project Management (Procore)'', ''Cost Estimation'',
    ''Multilingual Communication (English/Spanish)'', ''Team Facilitation'', ''Client Consultation'']'
  hobbies: '[''Folklórico dance'', ''Historic preservation volunteering'', ''Hiking'', ''Desert landscape photography'', ''Traditional Mexican cooking'', ''Yoga'', ''Architecture book club'', ''Community
    mural painting'', ''Coffee shop hopping'', ''Design technology meet‑ups'']'
  career_goals: Winna aspires to become a senior project architect leading multidisciplinary teams on environmentally responsible, culturally resonant projects in the Southwest. She plans to earn her LEED
    Accredited Professional credential, mentor junior designers, and eventually launch her own boutique firm that blends modern sustainability with traditional Mexican and Southwestern architectural elements.
    Her ambition includes shaping community‑centered spaces—schools, cultural centers, and affordable housing—while fostering a collaborative studio culture that values flexibility, work‑life balance, and
    emotional well‑being. She also hopes to secure a stable income that eases her financial worries and allows her to support her separated family members.
