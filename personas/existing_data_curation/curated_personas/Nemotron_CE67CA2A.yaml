  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading poetry and speculative fiction'', ''Gardening'', ''Cooking traditional Puerto Rican dishes'', ''Attending small bomba/plena concerts'', ''Book
    club participation'', ''Astronomy observation'', ''Gentle yoga'']'
  career_goals: Despite being retired, Ivonne remains driven by a desire to leave a lasting cultural imprint. She aims to compile and publish an illustrated anthology of Puerto Rican folk tales and her
    own poetry, celebrating the island’s heritage. She aspires to curate a small exhibition of senior artists in her local community center, showcasing works that blend traditional motifs with contemporary
    abstraction. Ivonne hopes to mentor a youth arts program in Bayamón, offering workshops in watercolor and crafts. Additionally, she wishes to travel to historic sites in Old San Juan and to the island
    of Vieques to document and photograph the architectural and natural beauty for a personal memoir. Her overarching ambition is to ensure that her creative legacy inspires future generations.
