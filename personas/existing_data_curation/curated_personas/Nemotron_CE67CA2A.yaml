personas:
  professional: Ivonne Gorordo, a retired community storyteller and watercolor artist, channels her imaginative curiosity and calm resilience into preserving island folklore through illustrated anthologies
    while mentoring young creators with gentle guidance.
  sports: Ivonne Gorordo participates in a morning walking club at the Bayamón community park, enjoys seasonal beach volleyball with neighbors, follows the Bayamón FC soccer team, and maintains fitness
    through gentle yoga, finding balance between activity and her calm temperament.
  arts: Ivonne Gorordo immerses herself in watercolor landscapes inspired by coastal light, draws creative energy from listening to local bomba and plena performances as well as the works of Georgia O'Keeffe
    and Frida Kahlo, and curates a quarterly senior artist showcase featuring craft workshops.
  travel: Ivonne Gorordo prefers thoughtfully planned trips that combine cultural immersion and quiet reflection, having documented Old San Juan’s historic plazas and Vieques’s bioluminescent bays, while
    dreaming of photographing the ancient streets of Granada, Spain, and the sunrise over Machu Picchu.
  culinary: Ivonne Gorordo delights in preparing traditional island dishes such as arroz con gandules and pasteles using fresh cilantro, annatto, and plantain leaves, while experimenting with herbal teas
    infused with hibiscus and gardenia, showcasing her skilled yet modest kitchen artistry.
  core: Ivonne Gorordo blends artistic imagination, calm resilience, and a deep‑rooted love for island heritage into a quietly influential life that nurtures both personal creativity and community culture.
background:
  cultural: Ivonne was born and raised in the Bayamón‑Trujillo Alto area of Puerto Rico, a region steeped in a blend of Taino, Spanish, and African influences. Her family traces its roots to the early 20th‑century
    migration from the coastal towns of San Juan, preserving a strong Catholic tradition that shapes her community involvement. Growing up during a time of social change, she absorbed the rhythms of bomba,
    plena, and salsa, integrating these musical forms into her personal identity. The island’s vibrant oral storytelling tradition sparked her lifelong fascination with folklore, leading her to become a
    steward of local myths and family histories. While she maintains fluency in Spanish, her exposure to American culture through education and media has given her a bilingual perspective, enabling her
    to bridge cultural gaps within her neighborhood. Her heritage is reflected in her artistic expression, culinary practices, and community service.
