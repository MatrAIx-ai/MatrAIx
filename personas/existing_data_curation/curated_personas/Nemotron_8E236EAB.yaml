  hobbies: '[''Hiking in the Wasatch Mountains'', ''Skiing'', ''Reading contemporary fiction and historical non-fiction'', ''Landscape and portrait photography'', ''Yoga and mindfulness meditation'', ''Volunteering
    with youth outreach programs'', ''Cooking nutritious meals'', ''Playing the guitar'', ''Attending theater productions and indie film screenings'']'
  career_goals: Sunni aims to become a head coach of a competitive youth program within the next three years and to transition into a senior scouting role for a collegiate or professional team. She plans
    to pursue a master’s degree in sports management to deepen her strategic expertise and to develop a data‑centric talent identification system that can be adopted across Utah’s athletic clubs. Long‑term,
    she envisions launching her own community‑focused sports academy that integrates artistic expression and mental‑wellness training into athlete development.
