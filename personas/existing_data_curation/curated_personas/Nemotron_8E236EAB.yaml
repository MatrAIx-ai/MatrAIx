personas:
  professional: Sunni Williams is a methodical youth sports mentor whose blend of curiosity and pragmatic data‑driven scouting fuels a meticulously organized training curriculum, while their cooperative
    yet assertive communication style builds trust among athletes, parents, and fellow coaches as they pursue a head‑coach position and eventual senior scouting role.
  sports: Sunni Williams fuels their love for the outdoors by tackling Wasatch trail runs, hitting the slopes with the Snowbird ski club each winter, and cheering on Real Salt Lake on match days, while
    they blend structured strength workouts and yoga sessions into a balanced fitness regimen that reflects both competitive drive and personal well‑being.
  arts: Sunni Williams captures Utah’s dramatic vistas through a vintage Nikon, strums folk‑rock chords inspired by Laura Marling on a well‑worn guitar, and curates evenings at the Egyptian Theatre after
    screenings of Kelly Reichardt’s indie films, melding visual and auditory arts into a personal creative sanctuary.
  travel: Sunni Williams plans meticulously spaced weekend getaways to Utah’s Bryce Canyon and Arches while dreaming of a month‑long mindfulness retreat in Kyoto’s temples, balancing a love for spontaneous
    trail discoveries with detailed itineraries that keep travel costs in check yet allow occasional splurges on local culinary tours.
  culinary: Sunni Williams crafts nutrient‑dense meals like quinoa‑pomegranate salads paired with grilled salmon and kale, masters homemade almond‑flour banana pancakes on lazy Sundays, yet can’t resist
    a midnight slice of pepperoni pizza after a late‑night editing session, reflecting a disciplined palate that occasionally yields to comfort cravings.
  core: Sunni Williams blends disciplined coaching with a spontaneous love for photography, thriving on structured plans yet habitually binge‑watching indie film marathons into the early morning after a
    day on the trails, and they often reward themselves with a late‑night slice of pizza.
background:
  cultural: Sunni grew up in a middle‑class, predominantly white household in the Mountain West, where the blend of American mainstream culture and Utah’s strong outdoor, community‑oriented ethos shaped
    her values. Her family emphasized education, civic involvement, and appreciation for the natural environment. While not affiliated with the dominant religious community, she respects the region’s cultural
    traditions and is mindful of the Indigenous Ute heritage of the land. This background informs her inclusive coaching philosophy and her commitment to fostering personal growth through sport and the
    arts.
attributes:
  skills: '[''Program development and curriculum design'', ''Athlete performance assessment'', ''Talent scouting and evaluation'', ''Leadership and team building'', ''Strategic planning and logistics'',
