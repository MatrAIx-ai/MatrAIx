  hobbies: '[''Sketching in parks'', ''Digital art experimentation'', ''Speculative short-fiction writing'', ''Open-mic performances'', ''Improvisational theater'', ''Community drum circles'', ''Board-game
    nights'', ''Youth art mentoring'']'
  career_goals: Willie aims to turn his passion for visual storytelling into a sustainable career. He plans to enroll part-time at Middlesex Community College to earn an associate degree in Graphic Design,
    while building a freelance portfolio of illustrations, posters, and community mosaic projects. In the longer term he hopes to secure a full-time role as a program coordinator or creative designer for
    a local nonprofit arts organization, where he can blend his artistic talent with his commitment to community harmony. Achieving financial stability is also a priority, as it would help him manage his
    stress and focus on personal growth.
