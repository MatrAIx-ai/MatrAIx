personas:
  professional: Barbara Sennett is a STEM education administrator who designs data‑driven early‑childhood curricula, writes winning grants, and leads large community maker fairs, using her spontaneous problem‑solving
    flair and competitive drive to deliver measurable program gains while navigating the inevitable chaos of rapid event planning.
  sports: Barbara Sennett fuels their love of movement by cheering for the Washington Capitals and the Washington Commanders, joining the Capital City Trail Club for spring hikes on the Billy Bud Saratoga
    Trail, playing pick‑up basketball at the Montgomery County Rec Center in the summer, and staying fit with indoor rock‑climbing at Earth Treks during the colder months.
  arts: Barbara Sennett channels artistic energy through African‑inspired contemporary dance nights at the local studio, while curating playlists that blend Kendrick Lamar, H.E.R., and classic soul legend
    Marvin Gaye, and they often attend performances by the Alvin Ailey American Dance Theater and the local Shakespeare Theatre Company's productions of classic plays.
  travel: Barbara Sennett prefers weekend escapes to Maryland’s Patuxent River trail and the historic streets of Annapolis, has trekked the Appalachian Trail’s Shenandoah segment, and dreams of photographing
    Iceland’s aurora borealis and diving into Costa Rica’s rainforests for a blend of tech‑inspired adventure and natural wonder.
  culinary: Barbara Sennett’s palate enjoys grilled salmon seasoned with lemon‑dill, a kale‑and‑quinoa salad tossed with toasted pumpkin seeds, sweet‑potato waffles drizzled with maple syrup, and the spiced,
    lentil‑rich misir wot they often savor with injera flatbread, while they occasionally treat themselves to Maryland crab cakes seasoned with Old Bay.
  core: Barbara Sennett is a kinetic community builder who wields competitive zeal and spontaneous creativity to close STEM gaps, dances through life’s chaos, and balances a restless curiosity with a practical,
    data‑driven mindset.
background:
  cultural: Barbara was raised in a close‑knit African American family in Montgomery, where church gatherings, storytelling, and a deep respect for education shaped her values. Her grandparents were active
    in the civil rights movement, instilling a sense of social responsibility and pride in her heritage. She celebrates cultural traditions through food—often cooking soul food dishes for family and community
    events—and music, attending local jazz and gospel performances. This cultural foundation informs her commitment to creating inclusive educational spaces that honor the history and aspirations of the
    Black community in the South.
