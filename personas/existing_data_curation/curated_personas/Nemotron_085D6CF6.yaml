  hobbies: '["Organizing youth hackathons and maker workshops","African‑inspired and contemporary dance","Curating hip‑hop, R&B, and soul playlists","Hiking and nature trail exploration","Photography of
    candid community moments","Reading contemporary science fiction"]'
  career_goals: Barbara aims to advance to a district‑wide director role overseeing STEM education initiatives, where she can design equitable programs that reach underserved communities across Montgomery
    County. She plans to pursue a Master's in Educational Leadership to deepen her strategic management skills. In the long term, she envisions establishing a community-based STEM hub that offers after‑school
    robotics clubs, mentorship, and summer coding camps, while advocating for policies that close the achievement gap for Black students in STEM fields.
