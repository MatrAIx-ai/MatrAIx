personas:
  professional: Annie Brewer is a senior drafter who leads multidisciplinary BIM projects with calm resilience, translating complex site constraints into meticulous construction documents while mentoring
    junior staff, and they channel their competitive spirit into refining processes to earn sustainable design accolades as they work toward a BIM Manager role.
  sports: Annie Brewer competes in a co‑ed softball league with the Bradford County Cyclones, hikes the rolling hills of their home county weekly, follows the Pittsburgh Steelers and the Philadelphia 76ers,
    and they are a member of the local Bradford Hiking Club that meets every Saturday.
  arts: Annie Brewer captures the soul of historic Pennsylvania towns through architectural photography, draws inspiration from modernist icons like Mies van der Rohe and the poetry of Maya Angelou, enjoys
    the folk melodies of The Lumineers, and they regularly attend community‑theater productions starring local talent such as Jane Smith.
  travel: Annie Brewer prefers road‑trip adventures that blend design inspiration and nature, having explored the cobblestone streets of Savannah, Georgia, taken a weekend architectural tour of Philadelphia’s
    historic districts, and they keep a dream list that includes Barcelona’s Gaudí masterpieces, all while balancing travel costs with a modest family budget.
  culinary: Annie Brewer loves farm‑to‑table cooking, often preparing roasted beet salad with goat cheese, hand‑made gnocchi with sage butter, and sourdough bread topped with locally sourced honey, and
    they relish experimenting with fresh herbs from their garden while occasionally over‑seasoning dishes with too much garlic.
  core: Annie Brewer’s relentless drive to perfect every blueprint is matched by a quirky habit of hoarding spare drafting paper clips that never see the light of day.
background:
  cultural: Annie grew up in a multigenerational family rooted in Monroeton, a small town in Northeastern Pennsylvania with deep German‑Irish ancestry. The region’s agricultural heritage and close‑knit
    community values of self‑reliance, hard work, and mutual support shaped her practical mindset. She maintains ties to local traditions through church involvement and community events, while also embracing
    the broader Mid‑Atlantic cultural mix that balances rural pragmatism with an appreciation for progressive design ideas.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Civil 3D'', ''BIM coordination'', ''Construction documentation'', ''International Building Code (IBC) compliance'', ''Pennsylvania state building codes'', ''Technical
    drawing standards (ANSI/ASME Y14.5)'', ''Site layout planning'', ''GIS mapping'', ''Survey data interpretation'', ''Project scheduling (MS Project)'', ''Team collaboration tools (Bluebeam, SharePoint)'',
    ''Problem solving'', ''Detail drafting'', ''3D modeling'', ''Structural drafting basics'']'
  hobbies: '[''Hiking the Pennsylvania countryside'', ''Community softball league'', ''DIY home renovation projects'', ''Historic building tours'', ''Architectural photography'', ''Gardening'', ''Local
    book club'', ''Volunteer work with Habitat for Humanity'', ''Cooking classes focused on farm‑to‑table cuisine'', ''Participating in regional drafting contests'']'
  career_goals: Annie aims to advance from senior drafter to BIM Manager, overseeing the integration of sustainable design practices across rural and small‑commercial projects. She plans to earn a bachelor's
    degree in Architecture or Civil Engineering within the next three years, obtain a Certified Building Information Modeling Professional credential, and eventually launch her own consulting boutique that
    serves Pennsylvania’s underserved towns with cost‑effective, code‑compliant designs. Her competitive nature fuels a desire to lead her firm’s drafting team to award‑winning project deliveries and to
    win regional drafting competitions.
