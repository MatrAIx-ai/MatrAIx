  hobbies: '[''Playing basketball'', ''Skateboarding'', ''Guitar'', ''Community theater acting'', ''Video game streaming'', ''Fishing'', ''Hiking'', ''Social media content creation'']'
  career_goals: William aims to earn his GED within the next year and then enroll in a community college program focused on hospitality management or automotive technology, fields that combine his people‑skills
    with his practical interests. He dreams of becoming a local radio host or a community‑focused social media influencer, using his voice to highlight youth events, local traditions, and outdoor activities
    in the Upper Peninsula. Long‑term, he hopes to run a small business that blends customer service with hands‑on work, such as a boutique repair shop with a community gathering space.
