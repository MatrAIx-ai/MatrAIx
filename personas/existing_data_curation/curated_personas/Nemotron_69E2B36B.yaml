personas:
  professional: Shoua Huang, a 26‑year‑old financial auditor, blends meticulous GAAP expertise with a curiosity for data‑analytics tools, leading audit engagements in SAP while mentoring junior staff with
    a calm, empathetic style.
  sports: Shoua Huang hikes Patapsco Valley State Park's rugged trails on weekends, follows the Baltimore Ravens with fervor, and occasionally jogs with a local running club that meets at Druid Hill Park,
    balancing solitary fitness with community camaraderie.
  arts: Shoua Huang devotes evenings to reading contemporary fiction by Chimamanda Ngozi Adichie and psychology works by Daniel Kahneman while also attending indie film screenings featuring directors like
    Bong Joon‑ho, and they cherish listening to folk‑rock artist Phoebe Bridgers during solitary cooking sessions.
  travel: Shoua Huang prefers low‑key getaways to places like Shenandoah National Park and Kyoto’s quiet tea houses, has already visited the historic streets of Savannah, and dreams of a solo pilgrimage
    to the temples of Angkor Wat, always planning trips around budget constraints and limited vacation days.
  culinary: Shoua Huang experiments by fusing East Asian flavors with Baltimore staples, stirring kimchi into crab‑cake batter, grilling miso‑glazed salmon with Old Bay, and perfecting a ginger‑scallion
    slaw that they serve to friends at modest dinner gatherings.
  core: Shoua Huang is a detail‑driven auditor whose quiet curiosity fuels a disciplined work ethic, a love for solitary, mindful pursuits, and a habit of over‑worrying about both spreadsheets and life’s
    small details.
background:
  cultural: Shoua comes from an East Asian (Chinese) heritage, raised in a bilingual household speaking Mandarin and English. Family values emphasize respect for elders, collectivism, and the importance
    of education, which shaped her disciplined approach to work. She celebrates Lunar New Year and Mid‑Autumn Festival with traditional foods and customs, while also engaging with the broader multicultural
    community in Baltimore County. Her cultural perspective informs her compassionate demeanor, sense of community, and desire to foster harmony both at work and in her personal life.
attributes:
  skills: '[''Financial Auditing'', ''GAAP Compliance'', ''Tax Preparation'', ''Internal Controls Evaluation'', ''Advanced Excel'', ''Data Visualization'', ''SAP ERP'', ''Oracle Financials'', ''Risk Assessment'',
    ''Regulatory Reporting'', ''Effective Communication'', ''Team Collaboration'']'
  hobbies: '[''Reading (Fiction & Psychology)'', ''Journaling'', ''Yoga'', ''Mindfulness Meditation'', ''Cooking Fusion Asian‑American Cuisine'', ''Hiking (Patapsco Valley State Park)'', ''Volunteering
    at Food Bank'', ''Small Book Club'']'
  career_goals: Shoua aims to become a Certified Public Accountant (CPA) within the next two years and progress to a senior auditor role, eventually leading an audit team. She is interested in specializing
    in data analytics for auditing, leveraging emerging technologies to enhance efficiency and accuracy. Long‑term, she envisions a managerial position where she can mentor junior staff, promote ethical
    practices, and contribute to corporate social responsibility initiatives. Balancing her ambition with personal well‑being, she seeks a role that offers a supportive environment for stress management
    and work‑life harmony.
