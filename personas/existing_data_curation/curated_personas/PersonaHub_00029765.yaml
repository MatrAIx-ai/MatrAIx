persona_description: A French art historian and curator who specializes in the study of postwar European painting and its various manifestations, including Art Informel. His expertise includes the analysis
  and interpretation of the works of artists such as Karel Appel, Camille Bryen, Alberto Burri, Jean Dubuffet, Jean Fautrier, Ruth Francken, Willem de Kooning, Jean-Paul Riopelle, and Wols. He has organized
  exhibitions and authored books on the subject, emphasizing the radical break with traditional notions of order and composition in postwar European painting and the pursuit of spontaneity, looseness of
  form, and the irrational in Art Informel. His knowledge and expertise are particularly relevant to the analysis and interpretation of the works of these artists and their contributions to the development
  of postwar European painting.
