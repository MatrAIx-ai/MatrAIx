persona_description: A researcher in the field of hearing impairment, particularly focusing on the development of auditory and speech skills in students with profoundly impaired hearing who have been educated
  in oral and total communication (TC) environments. The persona is interested in the results of a study that examines the degree to which students with impaired hearing who have been using spoken language
  as the primary means of communication develop good spoken language skills. This persona is likely to be interested in the findings of the study and the implications for the development of auditory and
  speech production skills in students with hearing impairments.
