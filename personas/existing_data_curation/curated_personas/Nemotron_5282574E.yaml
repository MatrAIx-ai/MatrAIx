personas:
  professional: Miguelina Hernandez, a veteran qualitative interviewer renowned for their empathetic listening and bilingual expertise, designs and leads community‑based oral history projects that preserve
    diaspora narratives, while mentoring junior researchers through hands‑on workshops that balance methodological rigor with adaptable, participant‑centered flexibility.
  sports: Miguelina Hernandez stays active by joining a local senior walking club for morning strolls, cheering on the Carolina Panthers during football season, attending occasional Charlotte Hornets games,
    and playing in the church’s spring softball league, a blend of low‑impact fitness and community camaraderie.
  arts: Miguelina Hernandez draws artistic inspiration from the bold colors of Frida Kahlo’s paintings, the emotive ballads of Juan Gabriel, and the cinematic storytelling of Pedro Almodóvar, regularly
    attending the community theater’s Spanish‑language productions and filling their kitchen with traditional folk music while cooking.
  travel: Miguelina Hernandez favors thoughtfully planned journeys that mix cultural immersion with family connections, having traveled to Oaxaca for a vibrant Día de los Muertos celebration, explored Puebla’s
    famed mole kitchens, taken a scenic road trip along the Blue Ridge Parkway, and now dreaming of a pilgrimage to Granada’s Alhambra and a tranquil retreat on the Gulf Coast.
  culinary: Miguelina Hernandez is an accomplished home cook who perfects tamales and mole poblano by hand, carefully balancing dried chilies, chocolate, and spices, growing many of the key ingredients—chilies,
    tomatoes, and herbs—in their modest garden, and delighting friends and family with a signature chiles en nogada during holiday gatherings.
  core: Miguelina Hernandez blends a lifelong love of storytelling with a practical, community‑focused spirit, humming softly while interviewing elders, hoarding handwritten recipe cards, and never missing
    a Sunday church potluck.
background:
  cultural: Miguelina was born to Mexican immigrant parents who first settled in Texas before moving to Asheboro, North Carolina. Raised in a bilingual household, she celebrates Mexican traditions such
    as Día de los Muertos, Las Posadas, and Mexican Independence Day with family gatherings, homemade foods, and music. Her Catholic faith and strong sense of community shape her daily life. In Asheboro,
    she actively participates in the local Hispanic community, helping newcomers adjust, preserving Mexican customs while embracing Southern hospitality, and fostering cultural bridges through her work
    and volunteer activities.
attributes:
  skills: '[''Active listening'', ''Bilingual communication (Spanish/English)'', ''Qualitative interview design'', ''Data transcription and analysis'', ''Confidentiality management'', ''Interview scheduling
    and logistics'', ''Cultural competency'', ''Empathy-driven rapport building'']'
  hobbies: '[''Traditional Mexican cooking'', ''Gardening'', ''Reading historical novels and biographies'', ''Church and community festival attendance'', ''Spanish book club'', ''Volunteering at senior
    center (teaching Spanish)'']'
  career_goals: Miguelina aims to mentor the next generation of interviewers by developing training workshops for community‑based research and authoring a guide on conducting respectful bilingual interviews.
    She hopes to collaborate with local universities and nonprofit organizations to preserve oral histories of the Mexican diaspora in North Carolina. Additionally, she aspires to volunteer as a consultant
    for advocacy groups, using her interview expertise to amplify under‑represented voices while maintaining a balanced, practical approach to her work.
