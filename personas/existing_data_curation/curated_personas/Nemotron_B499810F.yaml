  hobbies: '[''Fishing'', ''Vegetable Gardening'', ''Scale Model Train Building'', ''Wooden Puzzle Assembly'', ''Non-fiction Reading'', ''Documentary Watching'', ''Woodworking'', ''Cooking (Southern Comfort
    Food)'', ''Solo Hiking'', ''Birdwatching'']'
  career_goals: Edward aims to advance from his current clerk role to a senior accounting position within the next three to five years, ideally becoming an accounting manager for a regional small-business
    consortium. He plans to earn the Certified Bookkeeper credential through the American Institute of Professional Bookkeepers and is considering part-time coursework toward a CPA qualification, despite
    his limited formal education, to broaden his professional credentials. Long-term, he envisions opening his own boutique bookkeeping practice serving local entrepreneurs, which would allow him to maintain
    the structured, predictable work environment he values while providing dependable financial services to his community. A central ambition is to achieve greater financial stability for his family and
    to create efficient, low-stress workflow systems that reduce workplace anxiety for himself and his colleagues.
