  career_goals: Robert aims to complete his undergraduate degree in education and obtain a state teaching credential within the next two years. He aspires to become a certified high school mathematics teacher,
    eventually advancing to a curriculum specialist or instructional coordinator role with a focus on expanding STEM pathways for underrepresented students in New Orleans. He also hopes to launch a community
    tutoring program that provides structured after‑school support for local youth.
