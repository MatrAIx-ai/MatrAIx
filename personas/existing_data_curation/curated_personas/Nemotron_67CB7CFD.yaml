personas:
  professional: Dolly Ruiz draws on her bilingual retail supervision expertise—scheduling, inventory audits, visual merchandising, and point‑of‑sale mastery—to boost store performance, and they blend a
    curious eye for emerging retail tech with a practical, organized yet flexible mindset to pursue a store‑manager promotion within the next year.
  sports: Dolly Ruiz stays active by hiking with the Cerritos Trails Society on weekends and cheering for Club America in Liga MX as well as the LA Galaxy during MLS season, and they occasionally join a
    local co-ed soccer pick‑up league to blend competitive spirit with community camaraderie.
  arts: Dolly Ruiz immerses herself in the local Latinx arts scene by photographing vibrant murals and attending community festivals showcasing works by Frida Kahlo-inspired street artists, while they unwind
    to the sounds of Cafe Tacvba, Natalia Lafourcade, and indie band The Strokes, letting these influences shape both their aesthetic sensibility and volunteer teaching at a youth art workshop.
  travel: Dolly Ruiz plans trips with a blend of meticulous budgeting and spontaneous day‑hikes, having explored the mural‑filled streets of Oaxaca and the desert vistas of Joshua Tree, while they dream
    of a future solo pilgrimage to the historic plazas of San Miguel de Allende and a cultural immersion in Tokyo's Shibuya district.
  culinary: Dolly Ruiz cooks traditional recipes such as tamales de elote, pozole rojo, and chiles en nogada with a confidence honed by nightly family gatherings, and they relish blending fresh cilantro,
    ripe avocados, and smoked chipotle into guacamole while experimenting with modern plating techniques for their upcoming boutique café menu.
  core: Dolly Ruiz balances a curiosity for new retail tech with a steadfast practical streak, quietly hums indie tunes while debating store layouts, yet habitually hits snooze three times each morning
    before sprinting to the grocery store for fresh tortillas.
background:
  cultural: Dolly was raised in a Mexican‑American household in Cerritos, California. Her family celebrates traditions such as Día de los Muertos, quinceañeras, and weekend meals featuring homemade tacos,
    tamales, and pozole. She is bilingual, speaking Spanish at home and English in school and work, which shapes her communication style and cultural perspective. While fully participating in American holidays
    and community life, she maintains a strong sense of family, hospitality, and respect rooted in Mexican culture. Dolly frequently attends local Hispanic festivals and volunteers at events that highlight
    Latinx arts and entrepreneurship, reinforcing her connection to both her heritage and the broader multicultural fabric of Los Angeles County.
attributes:
  skills: '[''Retail floor supervision'', ''Team scheduling'', ''Conflict resolution'', ''Inventory management'', ''POS system operation'', ''Bilingual communication (Spanish/English)'', ''Customer service'',
    ''Visual merchandising'', ''Microsoft Office (Excel, Word)'', ''Data analysis'', ''Training and onboarding'']'
  hobbies: '[''Cooking Mexican dishes'', ''Street photography'', ''Reading business and self‑improvement books'', ''Listening to music (regional Mexican, indie)'', ''Small‑group volunteering at community
    center'', ''Hiking'', ''Following soccer (Liga MX)'']'
  career_goals: Dolly aims to complete her GED within the next year and pursue an associate degree in Business Administration at a community college. In the short term, she seeks promotion to store manager,
    where she can lead broader operational initiatives and mentor junior staff. Over the next three to five years, she aspires to become a district manager, overseeing multiple locations and driving efficiency
    across the region. Long‑term, Dolly dreams of opening her own boutique that blends contemporary fashion with traditional Mexican craftsmanship, while creating apprenticeship opportunities for other
    young Latina professionals.
