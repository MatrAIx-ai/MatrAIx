  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Model train building'', ''Vintage automobile restoration'', ''Reading technical magazines'', ''Puzzle solving (Sudoku, crosswords)'', ''Chess'',
    ''Attending country‑music concerts'', ''Church community events'']'
  career_goals: Randy aims to advance to a supervisory role within the plant, such as shift lead or production supervisor, where he can apply his systematic mindset to improve efficiency and reduce downtime.
    He also aspires to obtain certifications in lean manufacturing and become a certified safety officer, positioning himself as a key contributor to the plant’s continuous‑improvement initiatives. Ultimately,
    he hopes to secure a stable, well‑compensated position that provides a comfortable retirement while allowing him to mentor younger workers.
