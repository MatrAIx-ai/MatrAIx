  hobbies: '[''Woodworking'', ''3D printing'', ''Hiking'', ''Trail running'', ''Science‑fiction reading'', ''Technology podcasts'', ''Board games'', ''Cooking and baking'', ''Yoga'', ''Journaling'', ''Volunteer
    teaching metalworking'']'
  career_goals: Megan aims to complete her associate’s degree in manufacturing technology within the next two years and earn an AWS Certified Welder credential. She plans to transition from a production
    operative to a CNC programmer, ultimately progressing to a production supervisor or quality engineering role at a midsize manufacturing firm. In the longer term, she hopes to combine her practical experience
    with her curiosity about new processes by leading initiatives in additive manufacturing or advanced plastic molding, and she dreams of eventually opening her own small‑scale metal‑fabrication shop that
    emphasizes sustainable practices and a strong safety culture.
