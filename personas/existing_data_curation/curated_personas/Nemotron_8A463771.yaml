  career_goals: Swepson aims to transition from senior web developer to a technical architect role, designing complex, scalable systems for mid‑size enterprises in the New England region. Within five years
    he plans to earn AWS Solutions Architect and Google Cloud Professional Cloud Architect certifications, positioning himself for a lead or CTO position at a growing tech startup. He also aspires to launch
    a boutique consultancy that helps local small businesses modernize their online presence while offering pro bono mentorship programs for underrepresented youth in coding. To balance his high achievement
    drive with his sensitivity to stress, he intends to integrate structured wellness routines—regular jogging, mindfulness meditation, and scheduled “deep‑work” blocks—into his professional schedule.
