  career_goals: He dreams of exploring the world through science and technology. Donald imagines becoming an astronaut who builds his own spacecraft, a wildlife biologist who studies animals in the fields
    near his home, or a video‑game designer who creates interactive adventures. Though his ideas shift often, he consistently aims to discover, create, and help others understand the natural world.
