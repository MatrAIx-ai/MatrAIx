persona_description: A researcher and scientist in the field of aquatic ecology and environmental science, specifically focused on the study of fish predation refugia at hydraulic structures. This individual
  has expertise in fish biology, fish behavior, fish migration, and the impact of hydraulic structures on aquatic ecosystems. They have conducted research on the concept of fish refugia at various locations
  along the length of a hydraulic structure and have identified the need for predation refugia to protect small fish from exposure to stretches of river without habitat or cover. This researcher is currently
  conducting scoping research to identify the most effective predation refugia elements and to determine if these elements can be designed to minimize debris retention. They are seeking in-kind services
  from experts in the field of hydraulic engineering and fish biology to advance the research and field testing.
