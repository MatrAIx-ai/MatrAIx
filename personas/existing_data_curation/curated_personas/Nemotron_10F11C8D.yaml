  hobbies: '[''Cooking traditional Mexican cuisine'', ''Salsa and bachata dancing'', ''Hiking in Rocky Mountain trails'', ''Community soccer league'', ''DIY home improvement projects'', ''Volunteering at
    cultural festivals'', ''Bilingual tutoring for children'', ''Attending metalworking workshops'', ''Listening to corridos and classic rock'']'
  career_goals: Idalia aspires to move into a foreperson or supervisory role within her metalworking shop, where she can lead larger projects and mentor a diverse team of tradespeople. She plans to obtain
    advanced certifications such as the Certified Sheet Metal Fabricator credential and an OSHA trainer qualification. Long‑term, she dreams of launching a small, family‑run metal‑customization studio that
    blends functional fabrication with artistic designs, allowing her to combine her technical expertise with her creative interests while providing a stable future for her husband and children. She also
    hopes to advocate for greater inclusion of women in the trade by partnering with local vocational programs.
