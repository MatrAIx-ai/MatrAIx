personas:
  professional: Idalia Martinez, a 37‑year‑old sheet metal fabricator in a Colorado construction firm, combines masterful press‑brake and CNC plasma‑cutting skills with bilingual communication to streamline
    job‑site logistics, mentor apprentices, and spearhead safety initiatives, and they are positioning themselves for a foreperson role and advanced certifications.
  sports: Idalia Martinez stays active by playing forward in a co‑ed community soccer league, cheering for the Denver Broncos on game nights, and tackling weekend hikes along the Chautauqua Trail in the
    Rockies, and they balance competitive team spirit with solitary mountain pursuits.
  arts: Idalia Martinez volunteers to organize local cultural festivals where they dance salsa and bachata to the rhythms of Lila Downs and Carlos Vives, curates folk‑art displays featuring handcrafted
    metal ornaments, and draws inspiration from the Denver Art Museum’s Latino art exhibitions.
  travel: Idalia Martinez enjoys weekend road trips to Santa Fe for its art markets, has explored the historic streets of Oaxaca and the coastal towns of Veracruz during past family vacations, and they
    dream of a future culinary pilgrimage to the Yucatán Peninsula to study traditional mole recipes.
  culinary: Idalia Martinez excels at preparing Oaxacan mole negro, Veracruz‑style pescado a la Veracruzana, and hand‑rolled corn tortillas using heirloom chilies, locally sourced cilantro, and fresh avocados,
    and they often experiment with ingredient ratios in their backyard kitchen while occasionally over‑seasoning in their enthusiasm.
  core: Idalia Martinez merges hands‑on metal craftsmanship with vibrant cultural traditions, tackling each new project and recipe with equal curiosity, a talkative charm, and a penchant for juggling practical
    deadlines with spontaneous creativity.
background:
  cultural: Idalia was raised in a bilingual Mexican‑American household where family, community, and respect for tradition were central values. Celebrations such as Día de los Muertos, Cinco de Mayo, and
    Catholic holidays are woven into her family life, fostering a strong sense of cultural pride. Living in Denver, she balances her Mexican heritage with the city's multicultural environment, actively
    participating in local Latino organizations and sharing her cultural foods and music with neighbors. This blend of Mexican customs and American practicality informs her work ethic, her love for craftsmanship,
    and her commitment to fostering inclusive, supportive communities.
attributes:
  skills: '[''Sheet metal fabrication'', ''Blueprint and technical drawing interpretation'', ''CNC plasma cutting'', ''MIG/TIG welding'', ''Metal forming (press brake, shear)'', ''Safety compliance (OSHA)'',
