personas:
  professional: Emilio Arteaga is an aspiring marine biology student who combines a methodical planning style with a curious drive to explore coral ecosystems, and they leverage their bilingual communication
    skills, basic Python coding, and leadership experience as soccer captain to coordinate community science projects.
  sports: Emilio Arteaga is an energetic surfer who catches Atlantic waves before school, a dedicated soccer captain who leads the Jupiter high‑school team and follows Inter Miami CF and the national team
    they cheer for during World Cups, and they also compete in beach volleyball with the Jupiter Beach Volleyball Club, balancing competitive play with casual beach sessions.
  arts: Emilio Arteaga channels their sociable spirit through nightly guitar sessions that blend cumbia rhythms, reggaeton beats, and pop hits from artists like Bad Bunny, Shakira, and Taylor Swift, and
    they regularly attend local concerts at the Jupiter Amphitheater while drafting simple music‑related apps for fun.
  travel: Emilio Arteaga plans trips with meticulous itineraries, frequently weekend‑hopping to Florida spots like the Florida Keys and the Bahamas for snorkeling, while dreaming of eco‑tourism adventures
    in the Galápagos Islands and the coastal towns of their family’s homeland, using student discounts and a modest travel fund.
  culinary: Emilio Arteaga enjoys cooking family recipes such as arepas, sancocho, and buñuelos for gatherings, expertly mixing corn masa, plantain, cilantro, and avocado, yet they often resort to quick
    pizza deliveries during study marathons, revealing a quirky balance between culinary tradition and convenience.
  core: Emilio Arteaga blends curiosity, organized ambition, and a love for surf, soccer, and family‑rooted cooking into a vibrant teenage outlook that is sometimes impulsive, yet they remain reliably community‑focused.
background:
  cultural: Emilio is a first-generation Colombian-American; his parents emigrated from Medellín when he was a toddler. He grew up in a bilingual household where Spanish is spoken daily, and Colombian traditions
    such as celebrating Día de la Independencia, enjoying comidas típicas like buñuelos, and cheering on the Colombia national soccer team are central to family life. While he maintains strong ties to his
    heritage through food, music, and community gatherings in Palm Beach County’s vibrant Latino network, his upbringing in Jupiter, FL, has also immersed him in the coastal, outdoor lifestyle of South
    Florida. He balances the collectivist values of his Colombian roots—family cohesion, hospitality, and respect for elders—with the individualistic, pragmatic outlook of his American environment, shaping
    a bicultural identity that informs his social interactions, aspirations, and sense of responsibility toward both communities.
