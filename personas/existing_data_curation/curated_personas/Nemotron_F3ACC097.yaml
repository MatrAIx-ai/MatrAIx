  hobbies: '[''Surfing'', ''Soccer'', ''Beach volleyball'', ''Playing guitar'', ''Listening to Colombian cumbia and reggaeton'', ''Cooking traditional Colombian dishes'', ''Coding small projects in Python'',
    ''Reading science and technology articles'', ''Snorkeling'', ''Volunteering at community center – youth sports and cultural events'']'
  career_goals: Emilio aims to secure a scholarship to study marine biology or environmental engineering at a top university, where he can combine his curiosity about marine ecosystems with his practical
    problem-solving skills. In the long term, he envisions a career as a marine conservation specialist, developing community-based programs that empower coastal youth—especially from Latino backgrounds—to
    protect Florida’s reefs and waterways. He also aspires to serve as a mentor and role model for bilingual students, fostering cross-cultural collaboration and promoting STEM education within the Colombian-American
    community.
