personas:
  professional: Katrina Rieck is a budding community‑oriented choir member who applies their methodical planning and love of group harmony to lead school performances, coordinate youth service projects,
    and keep the soccer team’s practice schedule on track.
  sports: Katrina Rieck plays midfielder for the local girls’ soccer team, values the structured practice schedule, cheers for the nationally recognized women's soccer club the Portland Thorns, and spends
    weekends hiking the nearby ridge trail with their family, blending team spirit with personal fitness.
  arts: Katrina Rieck enjoys singing in the school choir, knits scarves while listening to Taylor Swift’s “Folklore” album, and reads Rick Riordan’s “Percy Jackson” series, finding comfort in recurring
    mythic patterns and the predictable cadence of both music and craft.
  travel: Katrina Rieck meticulously plans family day trips to the state park’s hiking loops, dreams of exploring Yellowstone National Park’s geysers, and prefers itineraries that balance set schedules
    with brief, spontaneous nature pauses, all within the modest budget of a middle‑schooler.
  culinary: Katrina Rieck helps bake chocolate‑chip cookies every weekend, seasons garden‑grown basil into a simple tomato sauce for spaghetti, confidently follows a banana‑bread recipe while occasionally
    forgetting to set the timer, and delights in sharing homemade treats with friends and family.
  core: Katrina Rieck thrives on routine, teamwork, and gentle compassion, often found knitting in the backyard while humming choir rehearsals, and can over‑schedule their day to the point of neglecting
    spontaneous play.
background:
  cultural: Katrina grew up in Pleasant Grove, a city in Utah County where the majority of residents identify with the Church of Jesus Christ of Latter‑day Saints. Her family attends weekly services and
    participates in church‑based youth activities, which emphasize service, humility, and community cohesion. The local culture values family gatherings, outdoor recreation, and a strong sense of neighborliness.
    This environment has reinforced Katrina's preference for routine, her cooperative spirit, and her desire to help others. At the same time, the region’s emphasis on education and self‑reliance has nurtured
    her practical mindset and organized approach to school and extracurricular life.
