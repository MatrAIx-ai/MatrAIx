personas:
  professional: Monica Person, a retired community organizer turned senior‑center program director, leverages her methodical planning, budgeting expertise, and natural sociability to design and run structured,
    harmonious events for Toledo’s elder community.
  sports: Monica Person maintains her fitness through daily walks in the neighborhood park, attends weekly senior water‑aerobics at the community center, and loyally cheers for the Toledo Mud Hens and the
    Cleveland Browns, balancing gentle exercise with spirited support for local and regional teams.
  arts: Monica Person expresses her creative side by quilting inspired by Faith Ringgold’s narrative fabrics, singing hymns with her church choir while listening to the soulful sounds of Mahalia Jackson
    and the smooth jazz of Nat King Cole, and finds literary solace in the novels of Toni Morrison.
  travel: Monica Person enjoys slow‑paced travel, reminiscing about past trips to the National Museum of American History in Washington, D.C., a soulful weekend in New Orleans’ French Quarter, and a recent
    family visit to the scenic dunes of Sandusky, while dreaming of a future pilgrimage to the historic Delta blues trail in Mississippi.
  culinary: Monica Person delights in preparing hearty collard greens slow‑cooked with smoked turkey, sweet‑potato casserole topped with toasted pecans, and classic cornbread infused with buttermilk, often
    seasoning dishes with a dash of hot sauce and fresh herbs, while modestly mastering the art of Southern‑style gumbo for community gatherings.
  core: Monica Person, a 74‑year‑old hub of community spirit, blends disciplined organization with a love for singing and quilting, yet occasionally hoards extra quilting scraps and forgets to water her
    garden when busy.
background:
  cultural: Monica's cultural roots trace back to her grandparents' migration from the rural South to Ohio during the Great Migration. Growing up in Toledo's historic African‑American neighborhood, she
    was immersed in a strong church community, family storytelling traditions, and neighborhood solidarity. She celebrates Juneteenth, Kwanzaa, and annual church picnics, and she carries forward oral histories
    and culinary practices from her ancestors, emphasizing community service, resilience, and intergenerational connection.
attributes:
  skills: '["Event coordination", "Volunteer management", "Budget tracking", "Meal planning", "Traditional cooking", "Gardening", "Quilting", "Storytelling", "Basic computer tutoring", "Conflict mediation",
