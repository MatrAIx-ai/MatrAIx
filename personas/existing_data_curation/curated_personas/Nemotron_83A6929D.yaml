  hobbies: '["Quilting", "Gardening", "Church choir", "Bridge", "Walking", "Cooking", "Reading", "Volunteering"]'
  career_goals: Although retired from formal employment, Monica aims to deepen her impact on the Toledo community. She plans to continue leading senior‑center activities, mentor younger volunteers, compile
    a community cookbook featuring family recipes, and occasionally guest‑lecture at adult‑education classes on topics such as budgeting and healthy cooking. Maintaining her physical health so she can stay
    active in group activities and remain a reliable support for her family and church are also central aspirations.
