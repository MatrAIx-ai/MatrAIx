personas:
  professional: Timothy Sosa is a casino security surveillance specialist who excels at real‑time CCTV monitoring, risk assessment, and bilingual procedural training, while their preference for structure
    and competitive edge drives them to lead disciplined teams and pursue both a CPP credential and a gambling‑surveillance certification.
  sports: Timothy Sosa hones marksmanship at the Rio Grande Valley Shooting Club, volunteers as an assistant coach for a local youth soccer team while cheering for the Rio Grande Valley FC Toros, and augments
    their fitness with weekend hikes on the Santa Ana National Wildlife Refuge.
  arts: Timothy Sosa unwinds by streaming norteño legends Los Tigres del Norte and Intocable, binge‑watching classic crime films like 'The French Connection,' and attending regional mariachi festivals,
    which together reinforce their cultural roots and strategic mindset.
  travel: Timothy Sosa prefers meticulously planned weekend trips to nearby Big Bend National Park and longer, budget‑conscious journeys to Mexico City for culinary immersion, balancing a love of adventure
    with family responsibilities and a need for structure.
  culinary: Timothy Sosa cooks authentic Mexican fare such as carnitas, chiles en nogada, and homemade tamales using fresh cilantro, lime, and ancho chilies, showcasing a competent but efficiency‑driven
    kitchen style that blends tradition with pragmatic time management.
  core: Timothy Sosa blends disciplined surveillance expertise, competitive drive, and a structured lifestyle, channeling meticulous routines into work, fitness, and family while occasionally neglecting
    spontaneity in favor of predictability.
background:
  cultural: Timothy is a first-generation Mexican-American who grew up in the border city of Mission, Texas. His household was bilingual, celebrating Mexican holidays such as Día de los Muertos and Mexican
    Independence Day while maintaining Catholic traditions. The vibrant cultural fabric of Hidalgo County—its music, food, and community festivals—has shaped his identity and fostered a strong sense of
    responsibility toward his neighborhood. He often draws on Mexican values of family solidarity and respect for elders, which inform his disciplined work ethic and his desire to protect others.
