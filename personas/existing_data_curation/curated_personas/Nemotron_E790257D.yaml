  hobbies: '[''Surveillance equipment tinkering'', ''Marksmanship practice at shooting range'', ''Reading true-crime and law-enforcement literature'', ''Playing tactical video games'', ''Cooking traditional
    Mexican dishes'', ''Listening to norteño music'', ''Hiking local nature trails'', ''Weekly chess matches with friends'', ''Volunteer youth soccer coaching'', ''Collecting vintage security cameras'']'
  career_goals: Timothy aims to move from front-line surveillance to a supervisory role within the casino security department. Over the next three years he plans to obtain the Certified Protection Professional
    (CPP) credential and a specialized Gambling Surveillance Certification. He envisions leading a team of surveillance operators, designing training programs that incorporate his education background,
    and eventually advancing to a security operations manager position where he can shape policies and improve loss-prevention strategies. Long-term, he hopes to open a boutique security consulting firm
    that serves small businesses in the Rio Grande Valley, allowing him to apply his structured approach while achieving financial stability for his family.
