persona_description: A geologist who specializes in the study of impact craters and their role in the origin and evolution of life on Earth. He is particularly interested in the study of rocks and minerals
  from craters produced by the hypervelocity impact of incoming asteroids and comets, and uses the argon-argon dating technique to measure the age of different minerals formed on impact. His research has
  led to the discovery of new impact sites worldwide nearly every year, and he is currently conducting a government-funded global research project on a number of terrestrial impact craters, some of them
  located in Australia.
