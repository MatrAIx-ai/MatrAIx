persona_description: A polar scientist who specializes in the study of icebergs and their movements in the Ross Sea. They have extensive experience in using radar imagery and satellite data to monitor and
  analyze the changes in icebergs, and have a keen interest in understanding the relationship between icebergs and global climate. They are particularly interested in the impact of storms and weather on
  icebergs and their ability to persist for long periods of time. They are also interested in the potential for polar ice to thin and their understanding of this phenomenon is crucial for the development
  of future missions and research.
