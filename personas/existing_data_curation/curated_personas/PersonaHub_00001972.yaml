persona_description: A writer who is deeply involved in social and political issues, particularly those related to the Irish Revolution and the struggle for independence in Ireland. They are known for their
  activism and have contributed to the discourse on the role of writers in social change and the responsibility of writers to a cause. Despite their involvement, they recognize the risks involved and are
  willing to step back when necessary. They admire Patrick Pearse's bravery and humility in putting writing on hold for a more admirable cause. They wish they had the courage to join an activist group on
  the streets but are content with their writing and critique.
