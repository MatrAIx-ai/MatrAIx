persona_description: A team of entomologists and scientists dedicated to discovering and developing biological solutions for agriculture, with a focus on the control of pests and diseases in smallholder
  farmers in African nations. They have a diverse collection of plant-associated microbes and are using the Bill & Melinda Gates Foundation grant to isolate, sequence, and test microbes associated with
  U.S. and African sweetpotato plants in an effort to discover beneficial microbes with the ability to control the sweetpotato weevil. They are using AgBiome's proprietary Genesis™ discovery platform, which
  comprises the world's largest, most diverse, fully-sequenced collection of microbes, coupled to industry-best screens for insect, disease, and nematode control, to make a real impact on the health and
  livelihood of millions of people.
