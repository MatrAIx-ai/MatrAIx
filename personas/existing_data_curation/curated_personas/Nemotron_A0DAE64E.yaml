  career_goals: Approaching retirement, John aims to transition from full‑time clerical duties to a mentorship role, sharing his decades of practical knowledge with younger staff and guiding them in both
    technical skills and the interpersonal aspects of financial service. He plans to earn a Certified Bookkeeper credential to formalize his expertise and increase his credibility for future volunteer work.
    Ultimately, John hopes to dedicate part of his time to community‑based financial literacy programs, especially helping seniors and low‑income families manage budgets, while maintaining a flexible part‑time
    consulting presence that allows him to stay engaged without the pressures of a full workload.
