personas:
  professional: Geoffrey Arnold is an aspiring aerospace hobbyist who channels methodical curiosity into designing Arduino‑controlled model rockets, applying disciplined project planning learned from chess
    tournaments to prototype iterative engineering solutions.
  sports: Geoffrey Arnold enjoys weekly hikes with the Hill Country Hikers club, seasons their weekends with occasional bass fishing trips on Lake Travis, and follows Austin FC and the Texas Longhorns,
    cheering them from their modest living room while maintaining a disciplined, low‑impact fitness routine that mirrors their methodical approach to chess.
  arts: Geoffrey Arnold devours sci‑fi novels by Isaac Asimov and Andy Weir, collates the atmospheric scores of Daft Punk and Hans Zimmer as background for their Arduino builds, and occasionally sketches
    pixel‑art landscapes inspired by Minecraft, letting these artistic fixations shape both their leisure and their technical imagination.
  travel: Geoffrey Arnold prefers meticulously planned weekend getaways—recently trekking the Enchanted Rock loop, a family road trip to the Space Center Houston, and a school‑organized visit to the Smithsonian
    Air & Space Museum—while dreaming of a future solo expedition to Japan’s Akihabara district to explore cutting‑edge robotics exhibits.
  culinary: Geoffrey Arnold favors smoky Texas brisket, street‑style chicken tacos with cilantro, lime, and corn tortillas, and quick‑cook ramen enriched with soy sauce and a soft‑boiled egg, often experimenting
    with chipotle powder and fresh jalapeños in their modest kitchen while snacking on trail‑mix during long coding sessions.
  core: Geoffrey Arnold is a methodical teen who turns curiosity into precise rockets, chess tactics, and carefully budgeted hobby kits, though they occasionally neglect floss and lose sleep over late‑night
    gaming.
background:
  cultural: Geoffrey grows up in a suburban white family in Williamson County near Austin, Texas, where a blend of traditional Texan values and modern tech culture shapes his outlook. His family emphasizes
    education, self-reliance, and community involvement, reflecting typical Southern-midwest middle-class norms. He participates in local 4-H projects and a school robotics club, experiences community events
    like Friday night high-school football games, and enjoys Texas cuisine such as barbecue and Tex-Mex. While rooted in the region’s hospitality and family-centric customs, Geoffrey’s exposure to Austin’s
    vibrant tech scene and diverse cultural offerings nurtures an openness to new ideas and a practical approach to learning.
