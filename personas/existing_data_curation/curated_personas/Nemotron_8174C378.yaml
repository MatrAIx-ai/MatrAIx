  career_goals: Geoffrey aspires to pursue a career that blends his love of tangible problem-solving with his technical curiosity. He aims to study engineering—particularly mechanical or aerospace engineering—so
    he can design and build practical solutions, such as renewable-energy devices or small-scale aerospace projects. He plans to complete high school with a strong academic record, take AP courses in physics
    and computer science, and later attend a university or a technical college that offers hands-on engineering programs. His long-term ambition is to work on innovative projects that have a clear real-world
    impact, possibly in the growing aerospace and clean-technology sectors within Texas.
