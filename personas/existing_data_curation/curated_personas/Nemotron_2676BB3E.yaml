personas:
  professional: Claudia Ardoin, a 23‑year‑old project coordinator in the regional tourism and arts sector, blends her humanities education with sharp budgeting and digital marketing skills, leading community‑focused
    events with a collaborative yet decisive style that balances curiosity about new cultural trends with pragmatic execution.
  sports: Claudia Ardoin embraces an active lifestyle on Martha’s Vineyard by kayaking with the local Sea Kayak Club, hiking the island’s pine‑lined coastal trails each spring, cheering the Boston Red Sox
    and Boston Celtics, and completing weekly yoga sessions at a community studio to maintain flexibility and mental balance.
  arts: Claudia Ardoin immerses herself in the arts by frequenting the Island Institute’s galleries showcasing contemporary creators like Kehinde Wiley and Yayoi Kusama, devouring classic literature from
    Virginia Woolf and James Joyce, and curating a personal photo series inspired by Monet’s water lilies and the island’s sunrise vistas.
  travel: Claudia Ardoin prefers purposeful, low‑key travel, having trekked the cliffside paths of Cinque Terre, explored historic Boston neighborhoods, and planning a future solo trip to the Greek islands
    of Santorini and Mykonos, all while carefully budgeting using travel‑reward points and balancing work commitments.
  culinary: Claudia Ardoin enjoys cooking with locally sourced oysters, heirloom tomatoes, rosemary, and sea‑salt caramel, often preparing seared scallops with citrus‑herb beurre blanc, while their amateur
    baking experiments include sourdough starter loaves and lavender‑infused shortbread.
  core: Claudia Ardoin blends curiosity for culture with practical project leadership, channeling her love for coastal hikes, vintage photography, and community arts into a career that balances meticulous
    budgeting with occasional impulsive splurges on art supplies.
background:
  cultural: Claudia comes from a white New England family with roots tracing back to early colonial settlers and a hint of French‑Canadian ancestry reflected in her surname. Raised in a small Massachusetts
    community, she values self‑reliance, close‑knit social ties, and stewardship of the coastal environment. Her background nurtured a respect for regional history, an appreciation for the arts, and a pragmatic
    outlook that blends tradition with openness to new ideas.
attributes:
  skills: '[''Project management'', ''Event planning'', ''Community outreach'', ''Budgeting and financial oversight'', ''Digital media strategy'', ''Content writing and editing'', ''Data analysis (Excel,
