  hobbies: '[''Reading classic literature'', ''Visiting art galleries and museums'', ''Hiking coastal trails'', ''Sailing and kayaking'', ''Photography'', ''Journaling'', ''Volunteer work at community events'',
    ''Cooking with locally sourced ingredients'', ''Yoga'']'
  career_goals: Claudia aims to advance to senior management within the regional tourism and arts sector, eventually becoming a director of community programming or arts administration. She plans to earn
    a master's degree in Arts Management to deepen her strategic expertise. Long‑term, she envisions launching a nonprofit that preserves and promotes the cultural heritage of Dukes County while fostering
    sustainable tourism. She seeks to influence local policy on arts funding and create mentorship programs for young creatives.
