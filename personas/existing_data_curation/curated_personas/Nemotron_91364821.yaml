  hobbies: '[''Gardening (tomatoes, herbs, citrus)'', ''Cooking traditional Cuban dishes'', ''Reading historical biographies and memoirs'', ''Listening to Cuban boleros and salsa music'', ''Playing dominoes
    and bridge with friends'', ''Walking in local parks'', ''Volunteering at senior community events'', ''Woodworking small projects (birdhouses, furniture repairs)'', ''Watching baseball (Cuban national
    team and MLB)'', ''Attending Mass and cultural festivals'']'
  career_goals: At 84, Gerardo’s ambitions focus on legacy and well‑being. He aims to stay physically active and mentally sharp through daily gardening, walking, and woodworking. He plans to compile a memoir
    of his life’s journey—from Cuba to Homestead—to preserve his family’s history for grandchildren. Gerardo wishes to continue volunteering, organizing cultural events at the senior center, and teaching
    cooking classes that showcase classic Cuban recipes. He also hopes to support his grandchildren’s education by setting up a modest college fund and to keep his home safe, comfortable, and well‑maintained
    for the years ahead.
