persona_description: A historian who is fascinated by the history and architecture of Cordoba, Andalusia, Southern Spain. They are particularly interested in the history of the Cathedral-Great Mosque of
  Cordoba and the preservation of its architectural details. They are likely to appreciate the intricate carvings and mosaic work in the Puerta de San Ildefonso, which was built under Al-Hakam II in the
  10th century. They are also likely to be interested in the history of the Great Mosque of Cordoba and its role in the division of the first church built here by the Visigoths in the 7th century.
