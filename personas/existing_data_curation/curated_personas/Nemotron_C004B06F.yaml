personas:
  professional: An aspiring indie game creator, Ester Torrente, blends curiosity with pragmatic coding by building simple Unity games after school, meticulously planning each level yet flexibly adding bilingual
    dialogue twists, and they channel their competitive online gaming spirit into rapid prototyping cycles.
  sports: A devoted sports fan, Ester Torrente, cheers for the Atlanta Braves and Atlanta United FC while playing midfield for the Newnan Youth Soccer Club, follows the Atlanta Hawks, occasionally practices
    sprint drills with friends, and they balance the excitement of competition with a skeptical eye on team rivalries.
  arts: A creative sketch artist and music lover, Ester Torrente, spends free time drawing sci‑fi cityscapes inspired by the works of Hayao Miyazaki, listens to Los Tigres del Norte and Camila Cabello for
    rhythmic inspiration, collects graphic novels by Stan Lee, and they often incorporate these influences into game storyboards.
  travel: An eager explorer, Ester Torrente, has visited San Miguel de Allende for a vibrant Independence Day feast with papel picado décor, spent a summer at Disney World in Orlando, dreams of attending
    a technology expo in Tokyo, and they prefer meticulously planned trips that blend cultural immersion with tech curiosity.
  culinary: A kitchen collaborator, Ester Torrente, helps prepare tamales, pozole, and chiles en nogada during family gatherings, experiments by adding quinoa to tamale masa and a splash of orange zest
    to nogada sauce, enjoys perfecting guacamole with rooibos‑infused lime, and they often document recipes in a handwritten journal.
  core: Ester Torrente is a competitive teen technophile who balances disciplined coding projects with stress‑driven gaming, blends tradition with innovation in the kitchen, and they often juggle anxiety‑filled
    journaling with spontaneous snack raids.
background:
  cultural: Ester’s cultural background is rooted in her Mexican heritage while growing up in the small Southern town of Newnan, Georgia. She was raised in a Spanish‑speaking household, where family gatherings
    feature traditional foods such as tamales, pozole, and chiles en nogada, and celebrations include Día de los Muertos and Mexican Independence Day. Her family maintains close ties with extended relatives
    and local Mexican community members, often attending church services and cultural events hosted by the nearby Hispanic Center. At school, Ester navigates a blend of Southern American customs and her
    own cultural traditions, giving her a bicultural perspective that influences her values, language use, and aspirations to serve bilingual communities.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic coding (Python, Scratch)'', ''Video editing and digital media creation'', ''Analytical problem solving in math and science'', ''Organizational
