  hobbies: '[''Video game development (coding)'', ''Arduino and electronics tinkering'', ''Reading science-fiction novels'', ''Competitive online gaming'', ''Robotics club'', ''Journaling'', ''Sketching/drawing'',
    ''Cooking traditional Mexican dishes'', ''Dancing to regional Mexican music'', ''Attending community festivals'']'
  career_goals: Ester aims to earn a scholarship to study computer science at a four‑year university, where she hopes to specialize in user‑experience design for educational and mental‑health applications
    that benefit bilingual teens. She envisions combining her technical abilities with her cultural heritage to create tools that bridge language gaps for Mexican‑American communities. In the longer term,
    she aspires to launch a tech startup or work for a company that values diversity and social impact, while also keeping the possibility of opening a family‑run Mexican café where she can share her cooking
    skills.
