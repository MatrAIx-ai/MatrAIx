persona_description: A researcher who is interested in understanding the properties of HIV-1, the virus that causes AIDS, and is specifically studying the factors that contribute to its transmission. This
  researcher has a strong background in virology and molecular biology and is interested in modeling the transmission of HIV-1 in vitro using transwell cultures. The researcher is also interested in creating
  a simian-human immunodeficiency virus envelope chimera with the best transmitted HIV-1 envelope and using the resulting SHIV for vaginal challenge studies in rhesus macaques. The researcher's goal is
  to better understand the properties that define the rare, sexually transmissible virus and to develop strategies to prevent transmission.
