persona_description: A microbiologist who specializes in the study of infectious diseases and their mechanisms of transmission. They are familiar with the principles of how viruses and bacteria cause illness
  and death, and have a deep understanding of the complexities of the human body's immune system. They have experience working with real-world science and have a keen interest in the potential for new viruses
  to emerge and cause pandemics. They are likely to be involved in research on infectious diseases, particularly those that have the potential to cause widespread outbreaks and public health emergencies.
