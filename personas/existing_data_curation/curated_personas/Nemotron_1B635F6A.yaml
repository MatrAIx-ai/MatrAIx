personas:
  professional: Diane Goodner, a 24-year-old HVAC specialist who combines rigorous technical expertise with an artist’s eye for design, they routinely recommend energy-efficient retrofits and smart-home
    upgrades, even as they juggle a laid-back, sometimes disorganized approach to scheduling and a skeptical eye on client intentions.
  sports: Diane Goodner, an avid hiker and weekend trail-runner, regularly explores the Colorado foothills, holds a membership at a local climbing gym, and cheers for the Denver Broncos in football, the
    Colorado Rockies in baseball, and the Denver Nuggets in basketball, using these passions to balance the physically demanding HVAC work.
  arts: Diane Goodner, a devoted visual creator, spends evenings perfecting acrylic landscapes of the Rockies, curates a modest vinyl collection featuring Miles Davis’s Kind of Blue and Pink Floyd’s Dark
    Side of the Moon, and captures industrial geometry in black-and-white photography, frequently attending gallery openings and finding inspiration in the works of Ansel Adams and contemporary street artist
    Banksy.
  travel: Diane Goodner favors low-key, flexible road trips that blend hiking and cultural immersion, having trekked the Grand Canyon, explored the historic streets of Oaxaca, Mexico, and dreaming of a
    tech-design tour of Tokyo, they plan trips around work schedules and a modest travel budget, often opting for campsites or boutique B&Bs over luxury hotels.
  culinary: Diane Goodner, a competent home cook, favours hearty Colorado-style green chili, grilled trout with rosemary, quinoa salads, and often experiments with Ethiopian injera and spices, while their
    vinyl-listening evenings are paired with craft beers from local breweries and occasional indulgence in artisanal cheese boards.
  core: Diane Goodner is a curiosity-driven HVAC technician with an artist’s eye, who balances a laid-back, slightly disorganized lifestyle with a competitive edge, a penchant for vintage records, and a
    habit of losing track of invoices while capturing the perfect architectural photograph.
background:
  cultural: Diane grew up in Milliken, a small community in Weld County, Colorado, within a white, Midwestern‑American family whose roots trace back to farming communities in Kansas and Nebraska. Her upbringing
    emphasized self‑reliance, respect for the open landscape, and a strong work ethic. Community events such as county fairs and local high‑school sports were a regular part of her life, and she maintains
    ties to a nearby church where she volunteers occasionally. While she values independence, she also appreciates the regional blend of rustic tradition and the emerging artistic scene in nearby Denver,
    which fuels her curiosity about new ideas and unconventional aesthetics.
attributes:
  skills: '[''HVAC installation and maintenance'', ''Basic electrical wiring and troubleshooting'', ''Plumbing repair and fixture replacement'', ''Blueprint and schematic interpretation'', ''Use of hand
    and power tools with safety protocols'', ''Preventive maintenance scheduling'', ''Smart-home device integration'', ''Compliance with local building codes'', ''Customer communication and documentation'',
    ''Problem-solving and troubleshooting'']'
  hobbies: '[''Urban and industrial photography'', ''Acrylic painting'', ''Solo hiking in the Rocky Mountain foothills'', ''Reading science-fiction novels'', ''DIY electronics tinkering'', ''Collecting
    vintage vinyl records'', ''Attending small-scale art gallery openings'', ''Playing board games with a small group of friends'']'
  career_goals: Diane aims to earn an EPA Section 608 certification and a state HVAC journeyman license within the next two years, positioning herself for lead‑technician responsibilities. She aspires to
    specialize in energy‑efficient retrofits and smart‑home integrations, eventually launching her own boutique service that offers flexible, on‑call repairs while also advising clients on design‑forward
    installations. Long‑term, she hopes to mentor apprentices and build a reputation for reliable, high‑quality work that balances technical performance with aesthetic considerations.
