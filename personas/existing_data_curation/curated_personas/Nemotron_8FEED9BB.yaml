  hobbies: '[''woodworking'', ''automotive tinkering'', ''hunting'', ''fishing'', ''hiking'', ''chess club'', ''online e‑sports gaming'', ''puzzle solving'', ''non‑fiction reading'', ''bullet journaling'']'
  career_goals: David aims to leverage his organizational strengths and analytical mindset into a career in logistics or supply chain management, seeking certification as a logistics coordinator through
    a community college program. He also plans to pursue an apprenticeship in CNC machining to combine his mechanical skills with precision manufacturing. Long‑term, he envisions either advancing to a project
    manager role within a manufacturing firm or launching his own custom furniture woodworking business, where he can apply his disciplined work ethic and high standards of quality.
