  hobbies: '[''Playing soccer'', ''Dancing to merengue and bachata'', ''Building LEGO models and simple robots'', ''Coding games in Scratch'', ''Reading adventure novels'', ''Drawing comic illustrations'',
    ''Playing Minecraft'', ''Cooking with family (making mangú)'']'
  career_goals: Ismael dreams of becoming an astronaut or an engineer who designs machines that explore space, driven by his love of curiosity and practical problem-solving. He also wants to help his community
    by learning how to protect wildlife, especially in the Dominican Republic, so he envisions studying marine biology or wildlife veterinary science in the future. In the short term, he aims to lead his
    school's science club, win a local robotics competition, and continue learning Spanish to keep his cultural roots strong.
