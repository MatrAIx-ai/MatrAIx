personas:
  professional: Ismael Antia, a 9‑year‑old budding technologist, blends curiosity with practicality as they design Scratch games and construct LEGO robots, keeping detailed design journals while still allowing
    spontaneous creative twists.
  sports: Ismael Antia, an energetic 9‑year‑old soccer enthusiast, plays forward for the Eastside Kids Soccer Club, idolizes Real Madrid’s Karim Benzema, and channels the same stamina into weekend dance‑offs
    to merengue beats.
  arts: Ismael Antia, a 9‑year‑old creative, draws comic‑style panels inspired by Spider‑Man and other Stan Lee heroes, and energetically dances to merengue songs by Juan Luis Guerra and bachata tunes from
    Aventura at family gatherings.
  travel: Ismael Antia, a curious 9‑year‑old, loves family road trips to the nearby mountains and beach, dreams of exploring Barcelona’s historic streets and the rainforests of Costa Rica, and prefers itineraries
    packed with hands‑on activities over long sightseeing tours.
  culinary: Ismael Antia, a budding home chef at nine, enjoys helping their parents whip up mangú with sautéed onions and fried eggs, crafting personal pizzas topped with pepperoni and pineapple, and blending
    tropical smoothies with mango, pineapple, and spinach.
  core: Ismael Antia is a 9‑year‑old kinetic blend of curious technophile, soccer enthusiast, and family‑oriented chef, whose organized creativity is tempered by a penchant for scattered LEGO bricks and
    occasional impulse spending.
background:
  cultural: Ismael's family maintains a vibrant Dominican heritage, speaking Spanish at home, celebrating traditional holidays like Dia de la Virgen de la Altagracia, and sharing music, dance, and cuisine
    such as mangú, sancocho, and tostones. Growing up in Las Vegas, he also experiences a multicultural environment, attending community festivals that blend Dominican rhythms with the city's diverse sounds.
    This blend nurtures his bilingual identity, his love for rhythmic dance, and his appreciation for communal gatherings, all of which shape his outlook and daily life.
