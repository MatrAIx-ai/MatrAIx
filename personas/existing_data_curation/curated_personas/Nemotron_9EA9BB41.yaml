  career_goals: Danilo aims to become a tenure‑track professor who reshapes STEM education through interdisciplinary, art‑infused curricula. He plans to secure a research grant to study the impact of visual
    storytelling on student comprehension, launch a makerspace that serves the Hispanic community of Northern New Mexico, and eventually lead his department as a champion of inclusive, innovative teaching.
    In the long term, he dreams of publishing a textbook that weaves cultural narratives into physics concepts and mentoring a pipeline of underrepresented students into scientific careers.
