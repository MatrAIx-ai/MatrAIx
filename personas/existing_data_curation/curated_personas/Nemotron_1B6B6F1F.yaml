  career_goals: While she values the familiar routine of the construction floor, Gail is looking to add a modest step of responsibility that will give her more job security and a clearer path toward retirement.
    Over the next few years she hopes to earn an OSHA 30‑hour certification and complete a GED program, then qualify for a crew‑lead or foreman position on her current crew. She also dreams of starting
    a small side‑business offering handyman services to neighbors, leveraging her practical knowledge of home repairs. Financially, she aims to build a stable retirement savings cushion through union benefits
    and regular contributions, while maintaining the flexibility to adjust her schedule when family or health needs arise.
