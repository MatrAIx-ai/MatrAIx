personas:
  professional: Joseph Wren is a 16‑year‑old self‑taught tech tinkerer who blends modest coding in Python and Scratch with hands‑on repair of bicycles and cars, using his curiosity and practicality to create
    game mods and Arduino gadgets while balancing school obligations with a laid‑back, slightly disorganized schedule, and dreaming of a future indie‑game studio or high‑tech auto workshop.
  sports: Joseph Wren spends evenings shooting hoops at the local park with friends, cheering on the Fresno State Bulldogs basketball team, riding a skateboard at the Sierra Skate Collective where he practices
    kickflips and ollies, and follows the NBA’s Los Angeles Lakers and the NFL’s San Francisco 49ers, reflecting a casual but enthusiastic connection to both team sports and personal skate culture.
  arts: Joseph Wren curates a mixtape of hip‑hop tracks by Kendrick Lamar and J. Cole alongside alternative rock anthems from Arctic Monkeys and Tame Impala, creates short comedic TikTok clips inspired
    by YouTube creators like Linus Tech Tips, and unwinds with sci‑fi novels by Isaac Asimov and Ann Leckie, weaving diverse pop‑culture influences into his creative downtime.
  travel: Joseph Wren favors spontaneous weekend hikes in the Sierra foothills, has trekked to Yosemite Valley and plans to camp near Lake Tahoe, while also day‑tripping to the Fresno County Fair and dreaming
    of a future road trip to San Francisco’s Golden Gate Park, balancing limited teen budget with a love for both nature and regional culture.
  culinary: Joseph Wren enjoys whipping up quick meals like ramen‑stir‑fry with sriracha and soy sauce, spicy taco bowls topped with mango salsa, and cheesy quesadillas seasoned with lime and cilantro,
    experimenting with bold flavor combos while keeping cooking skills at a beginner level and often relying on ready‑made kits for convenience.
  core: Joseph Wren is a curiosity‑driven teen who juggles gaming mods, skate tricks, and DIY tech projects while navigating a laid‑back, slightly disorganized life peppered with impulsive spending, occasional
    health neglect, and a dream of merging code and car repairs.
background:
  cultural: Joseph grew up in a middle‑class suburb of Fresno, California, within a predominantly white, English‑speaking family that traces its roots to the Midwest. The multicultural vibe of the Central
    Valley means he’s regularly exposed to Spanish‑speaking neighbors and local Hispanic culture, giving him a working knowledge of basic Spanish phrases and an appreciation for regional foods like tacos
    and farm‑fresh produce. He celebrates mainstream American holidays—Independence Day, Thanksgiving, and Christmas—while also participating in community events such as the Fresno County Fair and local
    high‑school football games. His upbringing blends traditional American values with the practical, agricultural ethos of the region, influencing his interest in hands‑on work and his comfort navigating
    a diverse cultural landscape.
