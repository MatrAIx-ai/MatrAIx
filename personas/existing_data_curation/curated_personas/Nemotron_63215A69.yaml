  career_goals: Joseph envisions a future where his practical tech skills can translate into a stable, hands‑on career. In the short term, he plans to earn his GED and enroll in a community‑college program
    that offers either computer‑science fundamentals or automotive‑technology certification. He hopes to build a portfolio of small coding projects and DIY tutorials that could launch a YouTube or TikTok
    channel focused on beginner tech hacks. Long‑term, he is torn between becoming a software developer for indie game studios or a skilled automotive technician who can integrate emerging tech into vehicle
    maintenance. He also dreams of one day owning a modest workshop where he can blend both interests—repairing cars while developing custom firmware for automotive accessories.
