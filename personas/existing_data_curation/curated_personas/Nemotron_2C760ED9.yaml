  hobbies: '[''listening to jazz and hip‑hop'', ''dancing'', ''playing basketball'', ''exploring street food markets'', ''cooking for friends and family'', ''attending local festivals'', ''traveling to
    discover regional cuisines'', ''reading food blogs'', ''photographing dishes'']'
  career_goals: Karyl aims to rise to head chef at a popular Tex‑Mex/soul‑fusion restaurant in El Paso, where he can shape the kitchen’s creative direction and mentor younger cooks from under‑represented
    backgrounds. He plans to enroll in a culinary certification program to formalize his skills, while also dreaming of launching his own food‑truck or small eatery that showcases his cultural blend of
    African‑American comfort food and border‑region flavors. Long‑term, Karyl hopes to build an online presence—through cooking videos or a community‑focused blog—where his talkative, personable style can
    inspire a wider audience and promote culinary inclusivity.
