  career_goals: Approaching retirement, Chunyan aims to cement her legacy by mentoring junior staff and establishing a smooth succession plan for her department. She hopes to transition into a senior advisory
    role, offering consulting to local non‑profits and small businesses on efficient office management. Additionally, she aspires to document her immigrant journey and career insights in a memoir that can
    guide and inspire younger generations of Chinese‑American professionals.
