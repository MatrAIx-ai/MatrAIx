    solving'']'
  hobbies: '[''Abstract painting'', ''Digital art and illustration'', ''Speculative fiction reading'', ''Nature hikes and photography'', ''DIY electronics and Arduino projects'', ''Community garden volunteering'',
    ''Yoga and mindfulness practice'', ''Attending indie film screenings and small art exhibitions'', ''Creative writing (poetry/journaling)'']'
  career_goals: June aims to broaden her impact by becoming a district‑wide STEM and arts integration coordinator, where she can shape innovative, cross‑curricular programs for young learners. She plans
    to pursue a Master’s in Educational Leadership to strengthen strategic planning skills while preserving her flexible approach. Long‑term, she envisions launching a community makerspace that offers after‑school
    workshops linking local artists and scientists, and advocating for policies that support inclusive, imagination‑driven early childhood education.
