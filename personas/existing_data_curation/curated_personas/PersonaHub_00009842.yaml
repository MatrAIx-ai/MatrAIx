persona_description: A seasoned electrical contractor with extensive experience in directional drilling, having installed over 500,000 feet of cable or conduit using this method. Baker Electric, Des Moines,
  Iowa, is a directional drilling veteran that has been using HDD equipment for ten-plus years. Baker is the electrical contractor for the new Iowa Events Center in Des Moines, which included the installation
  of 4,000 feet of 2- to 4-inch HDPE conduit for power cable. The company used directional drilling to install conduit for power cable going to different areas in the complex, including primary conduits,
  parking-lot lighting and traffic signals. The decision to purchase the first HDD unit was based on the company's perspective that it would add a valuable service to its capabilities.
