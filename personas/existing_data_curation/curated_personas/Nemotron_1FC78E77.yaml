personas:
  professional: Shana Hubbard, a 43‑year‑old full‑stack developer renowned for architecting scalable AWS cloud solutions and designing intuitive user experiences, leverages their methodical, data‑driven
    mindset and fierce curiosity to lead cross‑functional teams toward tech‑art intersections, while their competitive edge pushes them to fulfill CTO ambitions at an arts‑focused startup.
  sports: Shana Hubbard, an avid hiker of Alabama’s Little River State Park and a weekend member of the Birmingham Cross‑Country Club’s running crew, roots for the Birmingham Barons and the Alabama Crimson
    Tide, logs morning jogs on the red‑brick streets, but their competitive streak means they push themselves hard during race‑day, often ignoring the post‑run stretch.
  arts: Shana Hubbard, who frequents Birmingham’s Birmingham Museum of Art and the Contemporary Arts Center, sketches the kinetic energy of installations by Kerry James Marshall and digital works by Refik
    Anadol, draws inspiration from the lyrical prose of Maggie Nelson and the existential musings of Slavoj Žižek, and curates a monthly virtual gallery of emerging women artists, even if they sometimes
    obsess over pixel perfection.
  travel: Shana Hubbard, a thoughtful traveler who blends meticulous planning with spontaneous art‑centric escapades, has explored the historic streets of Savannah, canvassed the coastal cliffs of Big Sur,
    attended the immersive TeamLab Borderless exhibit in Tokyo, and dreams of a weekend retreat in Asheville’s Blue Ridge Mountains for both photography and coding inspiration.
  culinary: Shana Hubbard, a culinary experimenter, reimagines classic Southern dishes such as shrimp and grits with miso‑infused butter, collard greens tossed in smoked paprika and pomegranate seeds, and
    bourbon‑caramel bread pudding topped with espresso‑soaked figs, while their moderate cooking skill lets them balance precision plating with occasional flambé mishaps.
  core: Shana Hubbard blends relentless curiosity with disciplined organization, turning code into canvas, investing in tech‑art startups, and channeling a competitive spirit into both board games and cloud
    architecture, all while secretly collecting vintage analog cameras that rarely leave the nightstand.
background:
  cultural: Shana grew up in a middle‑class, suburban family on the outskirts of Birmingham, with ancestral roots tracing back to German and Irish immigrants who settled in the American South. Her upbringing
    blended Southern hospitality, a reverence for community, and a strong work ethic. While she was raised in a culturally diverse environment that exposed her to blues, jazz, and Southern folk music, her
    family emphasized education and self‑reliance. The vibrant arts scene in Birmingham and the growing tech community have both shaped her identity, fostering a blend of traditional Southern values with
    a forward‑looking, innovative mindset.
