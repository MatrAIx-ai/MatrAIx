  career_goals: Shana aims to transition into a technology leadership role, targeting positions such as Lead Architect or Chief Technology Officer within a dynamic startup that fuses technology with the
    arts. She plans to earn the AWS Solutions Architect Professional certification, launch a SaaS platform that supports digital art exhibitions, and become a frequent speaker at conferences on tech‑driven
    creativity. Additionally, she aspires to mentor more women in software engineering and sponsor community coding bootcamps in Birmingham.
