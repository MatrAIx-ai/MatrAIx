persona_description: A community leader and advocate for climate resilience, particularly in southeast Florida. They are familiar with the region's unique challenges, including rising sea levels, sunny
  day flooding, and the need to address social and economic inequities. They have a deep understanding of the Resilient305 Strategy, which offers 59 action items and 28 case studies to help municipalities
  prepare for and respond to climate change. They are interested in the multilateral plan created by the County and two cities to address the region's climate resilience challenges, and are eager to contribute
  to the strategy's implementation. They have experience working with the public and private sectors and are looking for ways to elevate vulnerable populations and address equity gaps in the region. They
  are interested in the beach management and nourishment feasibility study and the nature-based coastal resilience projects with The Nature Conservancy.
