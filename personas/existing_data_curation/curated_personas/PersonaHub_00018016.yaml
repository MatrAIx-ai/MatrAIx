persona_description: A researcher who specializes in the study of antifungal and antiretroviral drugs, particularly focusing on the inhibitory effects of HIV protease inhibitors on the growth of Candida
  albicans and the potential therapeutic efficacy of HAART in improving oral candidiasis in patients. This researcher is interested in the mechanisms of action of HIV antiretroviral drugs and their interactions
  with other drugs used to treat opportunistic infections, including toxoplasmosis. They are also interested in the development of new antifungal and antiretroviral drugs and the potential for these drugs
  to target virulent forms of Candida albicans associated with HIV infection.
