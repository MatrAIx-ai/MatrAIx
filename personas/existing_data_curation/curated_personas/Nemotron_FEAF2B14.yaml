  career_goals: Although retired, Mary remains driven to contribute to her community. She aims to mentor younger volunteers at the Josephine County Historical Society, help launch a neighborhood garden
    that fosters intergenerational interaction, and digitize oral histories of longtime residents. Mary also wishes to deepen her own learning by taking a short digital photography course to capture the
    region’s natural beauty and share it in local exhibitions. Her overarching ambition is to leave a lasting legacy of harmony, resilience, and connectedness within Grants Pass and the surrounding area.
