persona_description: A historian who specializes in the history of ancient Egypt, particularly the reign of Ptolemy Epiphanes, and the political and military conflicts between the Seleucid and Egyptian
  empires. He is knowledgeable about the events leading up to the conquest of Cœle-Syria and Palestine by Antiochus the Great and the subsequent struggles for control of the region. He is also familiar
  with the policies of the Jews in Jerusalem towards the Ptolemies and the persecution they experienced under the Seleucids. He is likely to be interested in the history of the region and the impact of
  the events on the lives of the people.
