  hobbies: '[''Boating and fishing on the Atlantic shoreline'', ''Barbecue and grilling experimentation'', ''DIY home improvement and woodworking'', ''Reading business and leadership books'', ''Listening
    to technology podcasts'', ''Watching Philadelphia Eagles games'', ''Volunteering at the Margate City food bank'', ''Attending local community festivals'', ''Gardening in the backyard'', ''Casual guitar
    playing'']'
  career_goals: Sam aims to progress from his current sales representative role to regional sales manager within the next three years, then to director of sales for the wholesale division. He is driven
    to lead a high‑performing team, develop sustainable product strategies, and mentor junior reps. Long‑term, he envisions launching his own sales consultancy focused on helping manufacturers adopt eco‑friendly
    practices while maintaining profitability.
