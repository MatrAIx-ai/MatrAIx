  career_goals: Although retired from formal employment, Ivan remains motivated to contribute meaningfully to his community. He aims to expand his volunteer work at the local senior center, where he can
    teach cooking classes and share gardening tips. He hopes to mentor youths through a neighborhood mentorship program, offering guidance on conflict resolution and practical life skills. Ivan also aspires
    to document his family's oral history in a written memoir, preserving cultural traditions for future generations. Maintaining his health and independence is a personal ambition, so he plans to stay
    active through daily walks and regular health check‑ups.
