  hobbies: '[''Zumba fitness classes'', ''Salsa dancing'', ''Community theater'', ''Volunteering at food bank'', ''Cooking and recipe experimentation'', ''Hiking in local parks'', ''Reading contemporary
    fiction'', ''DIY home décor crafts'', ''Socializing at coffee shops'', ''Mindfulness meditation'']'
  career_goals: Virginia aims to transition from volunteer work to a full-time role in community program coordination or nonprofit administration within the Hartford area. She plans to enroll in an associate's
    degree in nonprofit management and pursue a project management certification to strengthen her qualifications. Her long‑term ambition is to become a program manager overseeing outreach initiatives that
    blend her organizational strengths with her sociable, outgoing personality. Additionally, she hopes to develop digital marketing skills and possibly launch a side business offering event‑planning services
    for small local enterprises, while seeking a supportive work environment that helps manage her stress sensitivity.
