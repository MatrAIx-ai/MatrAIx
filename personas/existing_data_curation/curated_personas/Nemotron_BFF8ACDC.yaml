  career_goals: Francisco aspires to pursue a career in engineering—particularly civil or mechanical—where his love for structure, predictability, and practical problem solving can be applied. He intends
    to join a STEM‑focused high school program, earn a scholarship for an engineering degree, and eventually contribute to infrastructure projects in Texas. He values a stable, well‑compensated profession
    that will enable him to support his family and give back to his community.
