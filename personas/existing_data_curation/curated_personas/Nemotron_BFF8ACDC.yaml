personas:
  professional: Francisco Mendez, an aspiring software architect who merges his passion for intricate LEGO constructions with strategic Python coding, approaches each digital project with the same methodical
    precision and structured planning he applies to his favorite turn‑based games, thriving in solitary work sessions and meticulous documentation; they relish the way each line of code builds like a brick
    in a larger, orderly structure.
  sports: Francisco Mendez, a devoted follower of Liga MX, never misses a Club América match on TV, and, when they feel energetic, joins the school’s after‑school football club to observe and occasionally
    emulate the tactical formations they study, though they prefer analyzing the game from the sidelines to active play.
  arts: Francisco Mendez, an avid reader of science‑fiction staples like Isaac Asimov and Ursula K. Le Guin and a self‑taught guitarist who faithfully learns traditional folk melodies by artists such as
    Juan Gabriel and Los Tigres del Norte, finds solace in solitary creative sessions where narrative worlds and musical patterns intertwine; they often spend evenings alternating between a sci‑fi novel
    and a guitar practice routine.
  travel: Francisco Mendez, a methodical planner, maps each trip with spreadsheets, has already explored the ancient pyramids of Teotihuacan and the bustling streets of Guadalajara, and dreams of a future
    solo adventure to Kyoto’s tech museums and Iceland’s volcanic landscapes; they balance family budgeting constraints with a craving for both cultural immersion and cutting‑edge innovation.
  culinary: Francisco Mendez, an enthusiastic junior chef, assists his family in weaving masa dough for tamales stuffed with shredded chicken and roasted chilies, and expertly folds quesadillas filled with
    soft cheese and zesty salsa verde; they experiment with seasoning blends that reflect a love for balanced, structured flavor profiles.
  core: Francisco Mendez, a 14‑year‑old architect of bricks and code, navigates life with a laser‑focused love for order, an endless curiosity for sci‑fi worlds, and a habit of losing track of time during
    marathon gaming sessions; they often emerge from these sessions with new ideas for their next LEGO build.
background:
  cultural: Francisco is a Mexican‑American teenager raised in Tomball, Texas. At home, Spanish is spoken alongside English, and his family celebrates Mexican holidays such as Día de los Muertos, Las Posadas,
    and Cinco de Mayo with traditional foods and customs. These cultural practices have fostered his bilingual fluency and a strong sense of heritage, while growing up in suburban Texas has exposed him
    to American school life, community events, and a blend of Mexican and Texan identities. This dual cultural environment influences his values of family cohesion, respect for tradition, and a practical,
    forward‑looking outlook.
