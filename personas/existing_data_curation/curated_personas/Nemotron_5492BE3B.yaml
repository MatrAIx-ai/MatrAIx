  hobbies: '[''Sketching and digital illustration'', ''Photography (desert landscapes)'', ''Skateboarding'', ''Playing video games (creative and narrative)'', ''Hiking and exploring the Sonoran Desert'',
    ''Attending local art festivals'', ''Debate club'', ''Basketball'']'
  career_goals: He aims to turn his passion for visual storytelling and structured execution into a career as a multimedia designer or creative director in the video game or interactive media industry.
    He plans to complete his GED, enroll in a community college art and design program, build a strong portfolio, and eventually secure an apprenticeship at a game studio or digital agency. Over the next
    decade, he envisions leading cross‑functional creative teams that blend art, technology, and narrative to produce immersive experiences.
