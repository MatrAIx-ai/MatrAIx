personas:
  professional: Kiara Delacruz, a 10‑year‑old budding illustrator and maker, channels their curiosity and love for fantasy into detailed character sketches and LEGO engineering projects, while their balanced
    mix of organization and flexibility keeps their art supplies tidy and their school art club deadlines reliably met.
  sports: Kiara Delacruz, a 10‑year‑old energetic teammate on the Green Valley FC U12 soccer squad, also thrives in a local folk‑dance class that teaches traditional steps, and proudly cheers for the Denver
    Broncos and the Colorado Avalanche, blending competitive play with rhythmic movement.
  arts: 'Kiara Delacruz, an avid drawer of fantasy heroes, draws inspiration from J.K. Rowling’s magical storytelling, Hayao Miyazaki’s visual style, and the musical scores of Disney’s classic animated
    films, while spending weekends at the community art club creating short comic strips and debating favorite movies like ‘Spider‑Man: Into the Spider‑Verse.’'
  travel: Kiara Delacruz, who loves planning mini‑adventures, has explored a nearby coastal town on a family beach day, dreams of trekking the ancient ruins of Machu Picchu on a school field trip, and saves
    a portion of their allowance for a future visit to the Smithsonian National Air and Space Museum in Washington, D.C., balancing a thirst for discovery with school schedule constraints.
  culinary: Kiara Delacruz, a 10‑year‑old kitchen enthusiast, enjoys whisking together dough for empanadas filled with cheese and meat and shaping golden arepas, often experimenting with cinnamon‑sprinkled
    cookies while still mastering the perfect pancake flip, which sometimes ends in a floury kitchen mess they proudly call their ‘artistic’ cooking style.
  core: Kiara Delacruz, a curious and compassionate 10‑year‑old who merges fantasy art, LEGO engineering, and family baking into a lively, organized, yet delightfully messy world of creativity.
background:
  cultural: Kiara’s family originates from Colombia, and she grew up in a bilingual household where Spanish is spoken alongside English. Colombian cultural traditions—such as celebrating independence holidays,
    enjoying music like cumbia and vallenato, and preparing dishes like arepas, empanadas, and bandeja paisa—are woven into her daily life. The family maintains connections with the Colombian diaspora community
    in Nassau County, attending cultural festivals and language classes. These experiences give Kiara a strong sense of cultural pride while she also embraces the multicultural environment of Lawrence,
    New York.
