  career_goals: Kiara dreams of combining her love for art and her desire to help others. She envisions a future where she creates community murals that celebrate diversity and foster connection. She also
    imagines becoming an elementary school teacher or art therapist, using creative expression to support children's emotional wellbeing. In the short term, she aims to improve her Spanish writing, develop
    more advanced coding projects, and volunteer with local after‑school art programs.
