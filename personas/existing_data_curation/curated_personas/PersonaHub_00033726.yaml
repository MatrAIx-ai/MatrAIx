persona_description: A finance professional who is interested in understanding the true costs of government spending and how it affects personal finances. This person is curious about the complex and often
  confusing numbers used to justify government spending and wants to be able to calculate the true costs of major government programs. They are looking for a cost calculator that will make the process personal
  and accessible, so they can calculate their approximate costs for virtually any major government program. This person is also interested in the implications of out-of-control government spending on personal
  finances and is willing to take action to reduce the deficit.
