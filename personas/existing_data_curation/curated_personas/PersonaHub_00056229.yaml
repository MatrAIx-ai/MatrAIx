persona_description: A global security official with extensive experience and expertise in international trade, travel, and security. This individual is responsible for strengthening the security of global
  aviation, the global supply chain, and combating transnational crime through collaboration with international partners. They are stationed in over 75 countries and are involved in operations in over 58
  foreign seaports, the Middle East, Africa, the Middle East, and throughout Asia. They have a deep understanding of risk-based security strategies, including cargo security, screening techniques, vulnerability
  assessments, and airport security management. They are also involved in international aviation security training and have experience in the Container Security Initiative, U.S. Coast Guard operations,
  and combating transnational crime.
