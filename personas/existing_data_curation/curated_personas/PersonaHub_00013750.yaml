persona_description: A fifth-grade teacher who prioritizes creating a space in which students can be who they are and explore what it means to be human. She encourages student discourse and shared learning
  experiences through Socratic seminars and Question Formulation Technique. She also practices new ways of learning by borrowing Sphero robots to practice coding with her class. She believes in helping
  students identify their needs and develop their strengths so they know how to use them in any situation and offers choices whenever possible.
