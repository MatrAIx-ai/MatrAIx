personas:
  professional: Joseph Gamma, a newborn with a nascent fascination for patterns, is already earmarked by parents as a future data visualizer, though today their primary 'work' consists of exploring textures
    with tiny hands, turning every diaper change into a tactile experiment.
  sports: Joseph Gamma, despite being an infant, is a fervent fan of the Seattle Seahawks, eagerly claps at televised touchdowns during family couch‑time, and enjoys baby gym sessions that mimic soccer
    dribbling with soft foam balls.
  arts: Joseph Gamma's auditory world is saturated with lullabies from Debussy, the ambient sounds of Brian Eno, and the bright melodies of Stevie Wonder, and they babble in rhythm, showing an early attraction
    to abstract musical textures.
  travel: Joseph Gamma’s travel log includes weekend drives to the Pacific Northwest’s Mount Rainier National Park, a family vacation to Tokyo's Imperial Gardens, and frequent trips to the local pediatric
    clinic, reflecting a blend of scenic curiosity and parental convenience.
  culinary: Joseph Gamma thrives on organic, vanilla‑infused formula, prefers the occasional homemade carrot puree at six months, and is already fascinated by the scent of fresh basil on the kitchen counter,
    prompting enthusiastic smearing attempts with chubby hands.
  core: Joseph Gamma, a newborn bursting with curiosity and a habit of kicking their blanket off at night, balances tender innocence with an early competitive spark for the best toy in the playpen.
