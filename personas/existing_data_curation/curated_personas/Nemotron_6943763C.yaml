personas:
  professional: Stephanie Allen, a budding elementary artist, channels her boundless curiosity into vivid drawings of animals and magical creatures, turning every art studio session into an improvisational
    experiment where she freely mixes watercolors while occasionally forgetting to put away supplies, reflecting her relaxed approach to structure.
  sports: Stephanie Allen dashes through weekend tag games and joins the local Boulder United U‑7 soccer team, cheering for the Colorado Rapids while also twirling in after‑school dance circles, embodying
    an exuberant, group‑oriented approach to fitness that favors spontaneous play over regimented drills.
  arts: Stephanie Allen immerses herself in creative expression by sketching whimsical beasts inspired by Studio Ghibli’s "My Neighbor Totoro" and the illustrated worlds of Beatrix Potter, performing in
    community theater workshops that rehearse "The Little Mermaid," and dancing to the upbeat rhythms of Kidz Bop versions of Taylor Swift, weaving these artistic passions into her daily play.
  travel: Stephanie Allen’s wanderlust takes her on family hikes along Boulder’s Mount Sanitas Trail and weekend picnics at Rocky Mountain National Park, while she dreams of exploring the towering cliffs
    of the Grand Canyon and the fairy‑tale castles of Neuschwanstein in Germany, preferring loosely planned adventures that leave room for spontaneous rock‑collecting detours.
  culinary: Stephanie Allen delights in crafting rainbow fruit kebabs with strawberries, blueberries, and banana slices, mixing them into yogurt smoothies, and proudly helps stir her family’s homemade vegetable
    pizza topped with extra mozzarella, though they occasionally sneak a handful of chocolate chips when no one’s looking, revealing a sweet‑tooth quirk.
  core: Stephanie Allen is a curious, art‑obsessed 7‑year‑old whose boundless imagination fuels spontaneous creativity, social play, and occasional worry‑filled moments that make them both a vibrant friend
    and a delightfully disorganized dreamer.
background:
  cultural: Stephanie comes from a white American family living in Boulder, Colorado. Her upbringing reflects the city’s outdoor‑oriented, progressive culture, with frequent family hikes in the Rockies,
    visits to the Boulder Museum of Contemporary Art, and participation in community programs like the Boulder Public Library storytime and Girl Scouts. Her family values environmental stewardship, education,
    and community harmony, which shape her open‑minded curiosity, collaborative spirit, and caring nature.
attributes:
  skills: '["Reading simple chapter books", "Basic addition and subtraction", "Sketching and coloring", "Storytelling", "LEGO building", "Observational nature skills", "Empathy and cooperative play", "Flexibility
    in task approach"]'
  hobbies: '["Drawing and painting", "Reading adventure books", "LEGO building", "Outdoor exploring and nature walks", "Group games (soccer, tag)", "Dancing", "Community theater workshops"]'
  career_goals: Stephanie dreams of becoming an artist who creates bright, uplifting pictures that make people feel happy, and she also imagines exploring wildlife as a future environmental educator or
    wildlife illustrator. She hopes to combine her love for art, nature, and helping others by teaching younger children how to draw and discover the natural world, perhaps one day leading community art‑and‑nature
    workshops in Boulder.
