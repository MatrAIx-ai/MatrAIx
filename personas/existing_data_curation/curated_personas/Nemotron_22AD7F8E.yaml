  hobbies: '[''Sketching'', ''Digital illustration'', ''Poetry writing'', ''Speculative short stories'', ''Fusion cooking (South Asian & Appalachian)'', ''Visiting art galleries and museums'', ''Street
    photography'', ''Hiking in the Great Smoky Mountains'', ''Improv theater'', ''Meditation'', ''Attending indie film screenings'', ''Maintaining a creative blog'']'
  career_goals: Shweta aims to channel her imagination and love of art into a full‑time creative career. Over the next three years she plans to enroll in a bachelor's program in Visual Arts or Graphic Design
    at a nearby community college, build a professional portfolio, and secure freelance design work for local businesses and cultural events. She hopes to combine her South Asian heritage with contemporary
    art by curating community workshops and pop‑up exhibitions that showcase Indian and Pakistani crafts in Knoxville. In the longer term, she envisions opening a small studio‑café where she can teach sketching,
    host poetry readings, and serve fusion cuisine, while also taking on a role as an outreach coordinator for a regional museum’s South Asian art department. To support these ambitions she is taking time‑management
    and project‑management courses to strengthen her ability to meet deadlines.
