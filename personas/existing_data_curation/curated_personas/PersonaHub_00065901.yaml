persona_description: A state education official who is responsible for overseeing and evaluating the implementation of college-and career-ready standards in their state's schools and ensuring that English-language
  learners and students with disabilities have access to rigorous content aligned with the standards. They are committed to providing professional development to teachers in the common standards and addressing
  how English-language learners and students with disabilities will reach the new standards. They are also interested in learning more about the specific plans and improvements that the 10 states have made
  to win their NCLB waivers and are looking for detailed information on how states have addressed the challenges of implementing the common standards.
