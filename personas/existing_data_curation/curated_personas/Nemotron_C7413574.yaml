  hobbies: '[''Museum visits'', ''Sketching'', ''Live music concerts'', ''Culinary festivals'', ''Reading contemporary literature'', ''Business innovation podcasts'', ''Volunteer mentoring'', ''Art workshops
    for youth'', ''Hiking'', ''Yoga'', ''Journaling'']'
  career_goals: He aims to launch his career as a business analyst or program coordinator within a cultural nonprofit or arts-focused organization in Dallas, where he can blend his business acumen with
    his passion for the arts and community service. Over the next five years, he envisions taking on leadership responsibilities, pursuing a master's degree in nonprofit management or an MBA, and eventually
    founding a social enterprise that provides art education and therapeutic programs to underserved youth. He is motivated to create sustainable impact and to be recognized as a bridge between the business
    and creative sectors.
