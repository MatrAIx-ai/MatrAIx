  hobbies: '[''Community theater'', ''Bowling league'', ''Fishing'', ''Gardening'', ''Volunteer church work'', ''Historical nonfiction reading'', ''Local concerts'', ''Mindfulness meditation'', ''Woodworking'']'
  career_goals: John aims to move into a supervisory or training role within the eligibility department, where he can mentor newer interviewers, streamline application processes, and develop training curricula
    that emphasize empathy and efficiency. As he approaches retirement, he hopes to stay connected to public service by serving on a local advisory board for social services or consulting part‑time on program
    improvement initiatives, while also focusing on his personal well‑being and family time.
