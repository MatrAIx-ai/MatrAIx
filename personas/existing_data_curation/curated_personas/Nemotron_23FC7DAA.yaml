  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Guitar playing'', ''Model kit building'', ''Sci-fi literature'', ''Arduino tinkering'', ''Kayaking on the St. Croix River'', ''Hiking'', ''Puzzle
    solving'', ''Board games'', ''Indie video gaming'', ''Community theater'']'
  career_goals: Brian aims to transition from a machine operator to a CNC programmer and eventually a process‑engineering lead within a manufacturing firm, where he can design more efficient production
    workflows and integrate advanced automation. He plans to earn an associate degree in Manufacturing Technology and obtain certifications in CNC machining and Six Sigma. Long‑term, he envisions launching
    a boutique metal‑art studio that blends his technical expertise with his passion for abstract design, while also mentoring younger technicians and contributing to research on new composite materials.
