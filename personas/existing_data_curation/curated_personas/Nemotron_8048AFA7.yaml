  career_goals: Carmen Luz dreams of a future where she can combine her love for science, animals, and her cultural roots. She is currently most interested in pursuing a career as a veterinarian or wildlife
    biologist, aiming to protect local wildlife and farm animals while also working on community outreach programs that promote bilingual education and cultural heritage. She hopes to attend a university
    with strong environmental science or veterinary programs and, long term, to run a small animal clinic or conservation project in her hometown, using her Mexican-American background to connect with diverse
    communities.
