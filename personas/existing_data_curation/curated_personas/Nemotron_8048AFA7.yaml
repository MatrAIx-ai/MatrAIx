personas:
  professional: Carmen Gonzales, an aspiring game creator in middle school, blends their love of storytelling from fantasy graphic novels with budding coding skills in Scratch, designing simple interactive
    adventures while balancing schoolwork with soccer commitments.
  sports: Carmen Gonzales, a dedicated midfielder for the local youth soccer club the Riverside Rangers, spends weekday evenings practicing drills, follows the national women's soccer team for inspiration,
    and joins the school track team in the spring, preferring informal pick‑up games over regimented training sessions.
  arts: Carmen Gonzales, who spends evenings sketching mythical creatures inspired by graphic novels like \"Saga\" and the artwork of Jim Lee, practices traditional folk dance steps to the rhythms of family‑taught
    songs, and experiments with coding animated scenes in Scratch, drawing creative influence from filmmaker Hayao Miyazaki and guitarist duo Rodrigo y Gabriela.
  travel: Carmen Gonzales dreams of backpacking through the Redwood forests of California, exploring the crystal caves of Cappadocia, and attending a youth soccer camp in Costa Rica, but currently confines
    travel to weekend nature hikes and school field trips, favoring low‑cost adventure over luxury stays.
  culinary: Carmen Gonzales, an eager kitchen apprentice alongside their mother, lovingly rolls homemade tamales with masa, roasted chilies, and corn husks, whips up fresh salsa with tomatoes, cilantro,
    and lime, and harvests garden herbs and vegetables to experiment with simple sautéed dishes, though they often forget to clean up the prep area promptly.
  core: Carmen Gonzales is a curiosity‑driven, soccer‑loving teen who sketches dragons in spare moments, codes quirky Scratch games, and juggles a half‑filled piggy bank with a passion for folk songs, yet
    frequently misplaces homework and forgets to finish projects on time.
background:
  cultural: Carmen Luz is a Mexican-American who grew up in a bilingual household in Omaha, Arkansas. Her parents immigrated from Jalisco, Mexico, and she speaks Spanish at home while using English at school.
    She celebrates traditional Mexican holidays such as Día de los Muertos, Las Posadas, and family quinceañera celebrations, often preparing homemade altars and traditional foods. At the same time, she
    participates in local Southern traditions like county fairs, church picnics, and Thanksgiving gatherings. This blend of Mexican heritage—family closeness, love of food, storytelling—and the small-town
    community spirit of Arkansas shapes her worldview and daily life.
