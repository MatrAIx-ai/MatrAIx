  career_goals: Joby envisions a future where he can blend his love for art and technology. He aspires to study graphic design or animation in college, eventually working as a concept artist or video‑game
    designer who creates immersive visual worlds. He also dreams of publishing his own graphic novel series and occasionally collaborating with local community art projects, keeping his career path flexible
    enough to explore new mediums and ideas.
