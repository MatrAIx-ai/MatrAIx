personas:
  professional: Joby Redish is an aspiring digital illustrator who blends fantasy novel character sketches with photo‑editing flair, using their curiosity and relaxed approach to experiment with color palettes
    and composition while sometimes leaving projects half‑finished due to a laid‑back schedule.
  sports: Joby Redish cheers on the Alabama Crimson Tide on Saturdays, supports the Birmingham Barons minor‑league baseball team, and participates in the school’s intramural basketball league, preferring
    casual pickup games over regimented practice.
  arts: Joby Redish immerses themselves in the arts by drawing inspiration from Alan Lee’s illustration style, listening to acoustic renditions by Ed Sheeran, attending community theater productions of
    classic plays, and collaborating on quirky art‑club projects that mix LEGO sculptures with graphic novel panels.
  travel: Joby Redish enjoys spontaneous weekend trips to Oak Mountain State Park for photography, explores historic districts of Birmingham during family outings, has visited New Orleans for its jazz scene,
    and dreams of attending the Tokyo Comic‑Con to meet favorite sci‑fi creators.
  culinary: Joby Redish prefers Southern comfort food like smoked pulled pork barbecue, fried green tomatoes, and cheesy macaroni, enjoys experimenting with smoked paprika and fresh herbs in the kitchen,
    and occasionally swaps recipes on the school’s cooking club chat.
  core: Joby Redish is a curiosity‑driven 13‑year‑old who juggles fantasy sketching, guitar strums, and a habit of leaving LEGO bricks everywhere, balancing creative bursts with a laid‑back, sometimes disorganized
    lifestyle.
background:
  cultural: Joby grew up in Birmingham, Alabama, within a white family that has lived in the region for several generations. His upbringing reflects a blend of traditional Southern culture—such as appreciation
    for local cuisine, high school football Saturdays, church gatherings, and community festivals—and a modern openness to diverse artistic expressions. The city’s rich civil‑rights history and vibrant
    arts scene have sparked his curiosity about social narratives and storytelling, and his family encourages participation in local art fairs, library programs, and community service projects that celebrate
    Birmingham’s heritage while fostering a forward‑looking mindset.
