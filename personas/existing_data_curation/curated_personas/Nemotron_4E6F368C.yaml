  career_goals: Jonathan dreams of becoming a space explorer who sketches alien planets, an inventor who designs new toys, and a comic‑book artist who creates stories about magical creatures. He often talks
    about building his own rocket ship or inventing a robot friend, reflecting his love for novelty, art, and abstract ideas. He hopes one day to share his creations with fellow kids and maybe teach others
    how to imagine and draw.
