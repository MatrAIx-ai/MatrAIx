personas:
  professional: A fledgling storyteller and budding architect named Jonathan Becker, a five‑year‑old who spends afternoons building elaborate forts from couch cushions while narrating epic adventures, channels
    their imagination into early leadership roles during playtime, and they guide peers with a blend of compassion and confident assertiveness.
  sports: A lively five‑year‑old named Jonathan Becker revels in the community’s youth soccer league, cheers for the San Francisco Giants, and channels boundless energy into weekend gymnastics classes at
    the local recreation center, where they love making new friends on the mat, and they race around the field with unbridled enthusiasm.
  arts: A creative explorer named Jonathan Becker, a five‑year‑old, loves splashing watercolor paints on large sheets, drawing fantastical monsters inspired by the surreal works of Yayoi Kusama, dancing
    along to the catchy tunes of Sesame Street’s Elmo, and they express their imagination through vivid color and rhythm.
  travel: An adventurous traveler named Jonathan Becker, a five‑year‑old, has explored the magical realms of Walt Disney World in Orlando, built sandcastles on the beaches of Myrtle Beach, dreams of visiting
    the towering skyscrapers of Tokyo, and they eagerly plan their next family vacation with wide‑eyed anticipation.
  culinary: A budding chef named Jonathan Becker, a five‑year‑old, can proudly make a peanut‑butter‑and‑jelly sandwich, adores cheesy pepperoni pizza, often requests a side of fresh strawberries with their
    mac and cheese, delights in simple flavors they can taste and share, and they love sprinkling extra cheese whenever they can.
  core: Jonathan Becker is a five‑year‑old whirlwind of imagination who builds forts, chases soccer balls, devours pizza, and navigates a pocket‑money economy, all while balancing playful disorganization
    with boundless curiosity, and they approach each day with fearless exploration.
background:
  cultural: Jonathan is raised in a typical White American family in Lockport, New York. His daily life reflects mainstream U.S. cultural norms, including celebrating holidays such as Thanksgiving, Halloween,
    and Christmas, attending a local public preschool, and participating in community events at the town library and nearby parks. The proximity to Niagara Falls and the Great Lakes region provides occasional
    family outings to natural attractions, fostering an appreciation for outdoor exploration. His family’s heritage includes European roots, often shared through family stories and traditional recipes,
    but his upbringing is primarily shaped by contemporary American childhood experiences, popular media, and the close‑knit community of Niagara County.
