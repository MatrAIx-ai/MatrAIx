personas:
  professional: Maria Lagares is a 23‑year‑old residential electrician who balances meticulous adherence to the National Electrical Code with an inventive curiosity for renewable‑energy tech, excelling
    at teamwork and on‑the‑fly problem solving while juggling a demanding schedule.
  sports: Maria Lagares is an avid hiker who spends weekends on the Appalachian Trail with the Oak Ridge Outdoor Club, roots for the Nashville Predators, and uses salsa‑fusion dance fitness classes as her
    primary cardio.
  arts: Maria Lagares finds artistic balance by cooking traditional dishes while listening to classic son legends like Celia Cruz and modern reggaeton artists such as Bad Bunny, and she unwinds with sci‑fi
    novels by Neal Stephenson, which fuel her imagination for future tech.
  travel: Maria Lagares prefers short, adventure‑filled trips, having trekked the Blue Ridge Parkway, explored Havana’s historic streets, and dreaming of snorkeling in Costa Rica’s coral reefs, all while
    budgeting trips around her apprenticeship schedule.
  culinary: Maria Lagares loves cooking ropa vieja, tostones, and yucca with a dash of cumin and cilantro, and she confidently mixes these family recipes with quick weekday meals like avocado toast, showcasing
    a mid‑level culinary skill that impresses friends at every gathering.
  core: Maria Lagares is a pragmatic DIY‑enthusiast who channels her lively social spirit into electrifying community projects, yet quietly battles a worry‑prone mind that fuels both her meticulous work
    ethic and occasional insomnia.
background:
  cultural: Maria grew up in a bilingual Cuban household where Spanish and English flow interchangeably. Family traditions such as preparing ropa vieja, plantain dishes, and sharing music from classic Cuban
    son and contemporary reggaeton remain central to her identity. She maintains close ties with extended relatives in Cuba and participates in local Hispanic cultural festivals in Oak Ridge, blending Cuban
    warmth with Southern hospitality. Catholic holidays and community celebrations shape her sense of belonging, while the scientific heritage of Oak Ridge inspires her curiosity about technology and innovation.
attributes:
  skills: '[''Residential wiring'', ''Circuit troubleshooting'', ''Lighting installation'', ''NEC code compliance'', ''Safety protocols (lockout/tagout)'', ''Electrical schematic reading'', ''HVAC electrical
    connections'', ''Solar panel mounting basics'', ''Tool maintenance'', ''Team coordination'', ''Customer communication'', ''Problem solving'', ''Time management'', ''Basic computer job‑tracking'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Cuban meals'', ''Hiking in the Appalachians'', ''DIY electronics projects'', ''Reading science‑fiction'', ''Yoga and mindfulness practice'']'
  career_goals: Maria aims to earn her journeyman electrician license within the next year and eventually achieve master electrician status. She is interested in specializing in renewable‑energy systems,
    particularly solar installations, and plans to complete a certification in photovoltaic technology. In the longer term, she hopes to lead a crew of electricians, mentor other young women entering the
    trades, and possibly launch her own contracting business that emphasizes safety, innovative solutions, and community‑focused projects.
