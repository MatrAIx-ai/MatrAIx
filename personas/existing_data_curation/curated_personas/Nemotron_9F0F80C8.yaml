personas:
  professional: Imani Buffington, a 36-year-old facilities coordinator in Jacksonville, leverages their expertise in commercial cleaning, OSHA compliance, and schedule optimization while channeling a curious,
    sociable, and detail‑oriented mindset to foster cooperative crews and suggest aesthetic upgrades to building common areas.
  sports: Imani Buffington stays fit by combining salsa and hip‑hop dance classes at a community studio, weekly yoga, and pick‑up basketball games, while cheering for the Jacksonville Jaguars and attending
    Jacksonville Jumbo Shrimp games, and they run with the River City Runners club at Riverside Park during spring evenings.
  arts: Imani Buffington immerses themselves in Jacksonville’s art scene by visiting the Cummer Museum of Art and Gardens, photographing street murals from the annual Mural Fest, collaborating on community
    murals inspired by local artist Curtis Harrell, painting canvases in bright acrylics, and listening to the sounds of John Coltrane, Kendrick Lamar, and Alicia Keys while performing in a church choir.
  travel: Imani Buffington prefers spontaneous road trips that blend cultural exploration and relaxation, such as weekend visits to St. Augustine’s historic district, a music‑filled night in New Orleans,
    and a planned summer tour of Barcelona’s mural‑laden streets, usually coordinating travel through Airbnb and balancing outings with family commitments and a modest travel budget.
  culinary: Imani Buffington, an intermediate home chef, delights in crafting soulful dishes like smoked chicken, collard greens seasoned with smoked paprika, cornbread, and gumbo brimming with okra and
    thyme, often hosting family gatherings where they share homemade macaroni & cheese and sweet‑potato pie, while occasionally ordering takeout on particularly stressful nights.
  core: Imani Buffington, a 36‑year‑old facilities manager, blends meticulous cleaning expertise with a vibrant passion for community art, using dance, yoga, and soulful cooking to navigate intense anxiety
    while dreaming of leading a green‑focused building team.
background:
  cultural: Imani is a Black woman raised in Jacksonville, Florida, whose identity is shaped by the rich traditions of the Southern African‑American community. She grew up attending church, where gospel
    music, storytelling, and communal support were central. Family gatherings often feature soul‑food cooking and lively conversation, reinforcing the importance of hospitality and togetherness. Jacksonville’s
    historic African‑American neighborhoods and cultural festivals, such as Juneteenth celebrations and the River City Blues Festival, have nurtured her appreciation for art, music, and resilience. Her
    cultural background informs her values of cooperation, empathy, and the desire to uplift her community through both work and creative expression.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care and polishing'', ''Chemical safety management'', ''Waste disposal compliance'', ''Time management'', ''Team coordination'', ''Customer service'', ''Conflict
    resolution'', ''Basic painting techniques'', ''First aid certification'', ''Computer literacy (Microsoft Office, scheduling software)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Community dance classes (salsa, hip‑hop)'', ''Painting and mural projects'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Volunteering at
    youth center (art workshops)'', ''Cooking soul‑food for family'', ''Singing in church choir'']'
  career_goals: Imani aims to move into a supervisory or facilities‑management position within the next three years, seeking additional certifications such as the Certified Building Operator (CBO) and LEED
    Green Building credentials. She also plans to finish her associate degree in Business Administration, which will enable her to manage a cleaning crew or run her own small cleaning enterprise. Beyond
    professional advancement, she hopes to integrate her passion for art by organizing community art displays in the buildings she manages, creating welcoming environments that reflect the cultural vibrancy
    of Jacksonville’s African‑American neighborhoods.
