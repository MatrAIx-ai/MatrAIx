  career_goals: Glenda plans to graduate high school and attend a four‑year university, majoring in communications or marketing. She aspires to become a brand strategist or social media manager for a lifestyle
    or wellness company, leveraging her outgoing nature and competitive drive. Additionally, she hopes to launch an online platform focused on teen mental‑health awareness, using her personal experience
    with stress and worry to help peers. Long‑term, she envisions leading a creative team and possibly directing community outreach initiatives.
