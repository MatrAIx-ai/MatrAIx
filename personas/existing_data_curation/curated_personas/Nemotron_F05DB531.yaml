personas:
  professional: Glenda Powers, a sixteen‑year‑old high‑school senior, leverages their strong interpersonal communication and budding digital content‑creation skills to lead their school’s drama and dance
    clubs while coordinating social‑media campaigns for local events, applying a practical, structure‑loving mindset despite occasional disorganization and a competitive drive that pushes them to excel.
  sports: Glenda Powers, a forward for the Riverview Soccer Club and a dedicated cheerleader, thrives on the high‑energy group dynamics of weekly practices and matches, follows the Women’s National Basketball
    Association cheering for the Seattle Storm, and channels their competitive nature into rigorous conditioning drills and seasonal intramural dance tournaments.
  arts: Glenda Powers fuels their creative spark through drama club improv sessions, draws inspiration from TikTok creators like Charli D’Amelio and musicians such as Olivia Rodrigo, Taylor Swift, and Beyoncé,
    and regularly attends concerts featuring artists like Khalid and Halsey, allowing these influences to shape their own short‑form video choreography and comedic skits.
  travel: Glenda Powers prefers short, budget‑friendly road trips with friends—like a weekend music‑filled getaway to Nashville and a family‑planned visit to Washington, D.C.’s monuments—balancing their
    craving for adventure with parental permission, school schedules, and a modest travel fund.
  culinary: Glenda Powers enjoys whipping up simple Southern dishes such as shrimp‑and‑grits, baked mac and cheese, and cornbread, often adding hot sauce and fresh cilantro for extra kick, while they alternate
    between plating Instagram‑ready snack plates and treating themselves to bubble tea from the local café.
  core: Glenda Powers is an energetic teen who blends a competitive drive and love for group creativity with a habit of over‑thinking finances, occasional disorganization, and a persistent worry about school
    performance, and they often seek reassurance from friends.
background:
  cultural: Glenda is a white teenager raised in Suwanee, Georgia, a suburban community within the Atlanta metropolitan area. Her family embraces Southern traditions such as church attendance, family barbecues,
    and a strong sense of community hospitality. Growing up in a region with a growing cultural diversity, she has been exposed to a range of cultural events and festivals in the greater Atlanta area, which
    blend with her Southern roots to shape a moderately multicultural perspective.
