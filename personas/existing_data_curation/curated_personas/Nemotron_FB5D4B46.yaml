  career_goals: Bobby aims to turn his love for art and spontaneous creativity into a flexible, community‑focused livelihood. He envisions launching a mobile pop‑up studio that offers on‑the‑spot sketching
    workshops, mural collaborations, and DIY craft sessions at local festivals and neighborhood events. He also wishes to develop a modest freelance photography side‑gig for small businesses and to eventually
    earn a GED or trade certification that can complement his creative ventures while providing financial stability.
