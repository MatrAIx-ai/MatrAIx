persona_description: A historian who is interested in the decline and fall of the Roman Empire, particularly in the reign of Justin II, the Franks' conquest of Italy, and the development of Christianity
  in the Eastern Roman Empire. They are also interested in the political and cultural developments of the period, and are familiar with Edward Gibbon's work "The History of the Decline and Fall of the Roman
  Empire". They may have a deep understanding of Roman history and the theories proposed by Gibbon, and are likely to have read and studied Gibbon's work extensively.
