  career_goals: As she approaches retirement, Shakara aims to secure a stable, part‑time teaching position at a local community center where she can lead a sewing and quilting workshop. She hopes to mentor
    younger workers, share her traditional techniques, and perhaps serve as a union representative to advocate for fair schedules and benefits. Maintaining a predictable routine while contributing to the
    community lets her balance financial security with her desire for social interaction and purposeful work.
