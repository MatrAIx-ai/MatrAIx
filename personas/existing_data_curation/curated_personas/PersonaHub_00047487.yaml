persona_description: A researcher in the field of medical genetics and molecular biology, particularly in the study of myeloproliferative neoplasms (MPNs). She is an expert in the development of machine
  learning approaches for the diagnosis and classification of MPNs based on the microscopic features of megakaryocyte cells, which are abnormal in all MPNs. Her work has led to the discovery of new features
  in the cell size, clustering, and internal complexity of megakaryocyte cells that can distinguish between the different MPN subtypes. Her research has been funded by the NIHR Oxford Biomedical Research
  Centre and is the result of collaboration with other researchers in the field.
