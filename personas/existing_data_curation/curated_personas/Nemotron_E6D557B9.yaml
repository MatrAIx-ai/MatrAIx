personas:
  professional: Norma Blitzer is an aspiring illustrator and comic creator who channels their curiosity and competitive spirit into vibrant watercolor and mixed‑media stories, often collaborating with friends
    in school art clubs while embracing a flexible, sometimes chaotic workflow.
  sports: Norma Blitzer loves hiking the Fox River trail and occasional weekend trips to Starved Rock State Park, constantly scouting for interesting rocks and shells while staying active on their U10 soccer
    squad, the Fox River Rockets, and cheering for the Chicago Fire FC.
  arts: Norma Blitzer is a watercolor enthusiast who draws inspiration from the whimsical storytelling of Hayao Miyazaki, the vibrant colors of David Hockney, and the playful humor of Mo Willems, often
    re‑creating scenes from favorite fantasy novels like Harry Potter and integrating them into comic strips that they share with classmates.
  travel: Norma Blitzer enjoys weekend family outings to Starved Rock State Park, day trips to the Milwaukee Art Museum, and eagerly plans a future visit to Orlando’s Wizarding World of Harry Potter, balancing
    a love for nature trails with a desire for magical experiences that they long to share with friends.
  culinary: Norma Blitzer loves the bright colors of homemade fruit kebabs with strawberries, blueberries, and mango, often pairing them with a cheesy pizza slice or creamy mac and cheese, and enjoys experimenting
    with smoothie bowls topped with granola and a drizzle of honey, while occasionally sneaking chocolate chips into their watercolor time for a sweet boost.
  core: Norma Blitzer is a curious, art‑obsessed 10‑year‑old who blends imagination with competition, turning every backyard hike into a quest for the perfect rock while they juggle a chaotic sticker‑budget.
background:
  cultural: Norma was raised in a predominantly white, Midwestern family in Kaukauna, Wisconsin, where community and family ties are strong. Her parents encourage curiosity, supporting her artistic pursuits
    with supplies and enrollment in local art workshops. The town’s seasonal festivals—such as the annual Fall Harvest Festival and county fairs—expose her to regional music, food, and crafts, reinforcing
    a sense of local heritage. Attendance at a public elementary school emphasizes teamwork through sports and group projects, mirroring the collaborative spirit of the community. While she enjoys mainstream
    American media, she also retains subtle influences from the area's German‑Polish immigrant history, evident in the local cuisine and occasional cultural celebrations. This blend of small‑town values,
    outdoor appreciation, and encouragement of creative expression shapes Norma’s worldview.
