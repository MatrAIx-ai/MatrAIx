  career_goals: Norma dreams of becoming a children’s book illustrator one day, hoping to blend her love of drawing with storytelling to inspire other kids. She also aspires to compete in regional soccer
    tournaments and hopes to win a championship with her school team. In the future, she would like to organize a community art showcase in Kaukauna, giving local artists a platform to share their work.
    Attending a summer art camp, learning advanced illustration techniques, and eventually studying graphic design at college are long‑term ambitions she talks about with optimism.
