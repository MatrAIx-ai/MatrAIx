  hobbies: '["Tropical gardening", "Cooking and recipe experimentation", "Community dance (Mexican folkloric and Hawaiian hula)", "Storytelling and oral history circles", "Beach yoga", "Reading historical
    fiction", "Knitting for charity"]'
  career_goals: Although retired from formal employment, Ivelisse aims to deepen her impact as a cultural ambassador within the Wailuku senior community. She plans to lead a weekly cooking class that teaches
    younger residents Mexican recipes while incorporating local Hawaiian ingredients, preserving culinary heritage for future generations. She also hopes to formalize a volunteer mentorship program that
    pairs senior adults with newcomers to Maui, offering language assistance, cultural orientation, and emotional support. Learning the Hawaiian language (ʻŌlelo Hawaiʻi) is a personal ambition, as is documenting
    her family’s migration story in a short memoir that can be shared at community gatherings. Ultimately, she aspires to be recognized as a trusted elder who fosters harmony, cross‑cultural understanding,
    and practical help for those around her.
