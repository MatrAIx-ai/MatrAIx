personas:
  professional: Vanessa Ramsey is a budding marine-enthusiast who channels her love of ocean exploration into after-school science projects, using practical problem-solving skills and a hands-on, collaborative
    style while keeping her schedule loosely organized enough to squeeze in spontaneous beach clean-ups.
  sports: Vanessa Ramsey is a devoted member of the Island Youth Sailing Club and the Coastal Kids Soccer League, cheering on the Seattle Seahawks on Sundays and idolizing sailing prodigy Anna Weis, while
    also attending after-school dance classes that keep her energy high.
  arts: Vanessa Ramsey spends weekends building elaborate LEGO seascapes and crafting sea-shell collages while devouring adventure novels by Jules Verne, humming along to Ariana Grande's latest hits, and
    dreaming of starring in a school play like the musical Matilda.
  travel: Vanessa Ramsey prefers spontaneous day trips to nearby tide pools and weekend family road trips to the historic lighthouse on Cape Cod, while she dreams of snorkeling in the Great Barrier Reef
    and exploring the fjords of Norway when she saves enough for a summer vacation.
  culinary: Vanessa Ramsey loves pizza topped with pepperoni and pineapple, enjoys making quick fish-taco bowls with mango salsa at home, and treats herself to mango-smoothies and chocolate chip cookies
    after a long day of sailing, though she often forgets to wash her dishes.
  core: Vanessa Ramsey is an energetic, beach-loving 11-year-old who balances a love for hands-on adventure with a delightfully chaotic habit of misplacing LEGO pieces in her backpack.
background:
  cultural: Vanessa comes from a white, middle‑class family that has been part of Shelter Island’s close‑knit community for generations. The island culture emphasizes outdoor recreation, maritime heritage,
    and environmental stewardship, with regular community events like the Shelter Island Arts Festival and local marine education programs. Growing up near the water, Vanessa has participated in boat trips,
    coastal wildlife observations, and community service projects, shaping a practical, cooperative outlook that values both tradition and flexibility.
