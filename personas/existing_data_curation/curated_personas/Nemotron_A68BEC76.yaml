  hobbies: '[''Soccer'', ''Youth sailing'', ''Beach clean‑ups'', ''Reading adventure books'', ''LEGO building'', ''Arts and crafts'', ''Dancing'', ''Group theater games'']'
  career_goals: Vanessa dreams of a future career that lets her work outdoors and help both people and the environment. She aspires to become a marine biologist focused on protecting the coastal ecosystems
    around Shelter Island, while also considering a path as a veterinarian or an elementary school teacher where she can mentor other children. Her goals blend her love of nature, practical problem‑solving,
    and desire to contribute positively to her community.
