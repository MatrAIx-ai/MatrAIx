persona_description: A political scientist who specializes in the study of international relations and climate change, particularly the impact of international agreements and negotiations on global climate
  policy. She is interested in the effectiveness of multilateral efforts to slow global warming, the role of public expectations and potential for loss of confidence in the UNFCCC system, and the impact
  of COP26 on the global economy and climate outcomes. She is aware of the importance of closing the gaps to the Paris Agreement goals and the need for increased commitments and global finance package to
  deliver 1.5C and protect countries from climate impacts. She is also aware of the potential for a geopolitical blame game and the need to focus on finance, especially for adaptation in the most impacted
  countries less advanced.
