personas:
  professional: James Mills is a 22‑year‑old machinist and budding CNC programmer whose meticulous attention to detail and vivid imagination turn routine shop‑floor tasks into creative engineering challenges
    while their disciplined mindset drives small‑team continuous‑improvement projects.
  sports: James Mills balances weekend hikes along the Appalachian foothills with pick‑up softball games for the Greene County Miners, follows the Tennessee Titans and Nashville Predators avidly, and maintains
    a disciplined strength‑training regimen at the local gym to counter the physical demands of machining.
  arts: James Mills channels their love for classic rock legends like Led Zeppelin and indie folk icons such as Bon Iver into acoustic guitar sessions, while their sketchbooks brim with mechanical designs
    inspired by the kinetic sculptures of Theo Jansen and the futuristic visions of Syd Mead, and they regularly attend performances at the local community theater.
  travel: James Mills prefers meticulously planned weekend road trips that blend adventure and relaxation, having explored Asheville’s craft breweries, hiked the Grand Canyon’s South Rim, and dreaming of
    a future pilgrimage to Japan’s precision‑manufacturing districts and the Swiss Alps for alpine climbing.
  culinary: James Mills, a competent home cook, enjoys perfecting Southern staples like shrimp and grits with smoked paprika and buttery biscuits, while experimenting with precisely measured bourbon‑infused
    BBQ sauce, and they occasionally over‑salt their fried chicken in pursuit of the ideal crunch.
  core: James Mills is a disciplined, imagination‑driven machinist who obsessively organizes their workshop, sketches futuristic machines between coffee breaks, yet can’t resist a late‑night binge on cheap
    instant noodles after a long day on the shop floor.
background:
  cultural: James was raised in Midway, a small community in Greene County, Tennessee, nestled in the Appalachian foothills. The regional culture emphasizes close‑knit community ties, self‑reliance, and
    a strong work ethic rooted in the area's historic manufacturing and farming traditions. Family gatherings, local church events (his family attends a Baptist congregation), county fairs, and high‑school
    sports have shaped his sense of belonging and cooperative spirit. The surrounding natural landscape—forests, rivers, and nearby trails—feeds his love of outdoor exploration and inspires his artistic
    imagination. While he left formal education after high school, the regional tradition of learning trades through apprenticeships provided him with hands‑on training and a respect for skilled craftsmanship.
attributes:
  skills: '[''CNC machining'',''Blueprint reading'',''Precision measurement'',''Quality control'',''Machine maintenance'',''CAD/CAM software'',''Python scripting for CNC'',''Problem solving'',''Organizational
