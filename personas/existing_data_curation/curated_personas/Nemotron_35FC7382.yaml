  hobbies: '[''Sketching'',''Digital 3D modeling'',''3D printing'',''Scale model building'',''Hiking'',''Playing guitar'',''Reading sci‑fi'',''Cooking Southern cuisine'',''Volunteer teaching'',''Listening
    to music'']'
  career_goals: James aims to earn an advanced CNC programming certification (e.g., NIMS Level III) and transition from a shop‑floor machinist to a CNC programmer and later a production supervisor. Over
    the next five years he plans to enroll part‑time in a manufacturing engineering program to gain a bachelor's degree, which will position him to lead process‑optimization projects and implement lean
    manufacturing principles in his plant. Long‑term, he envisions opening a boutique metal‑art studio that blends functional machining with his artistic imagination, offering custom‑crafted sculptures
    and functional art pieces while also mentoring local youth through apprenticeship programs.
