persona_description: A financial analyst who specializes in commodity markets, specifically futures contracts, and their impact on prices and supply and demand. The analyst is knowledgeable about the WASDE-510
  report, US domestic corn use, the Lagi et al. model of food crises and political instability in North Africa and the Middle East, and the food crises model by Lagi et al. This individual is interested
  in understanding the dynamics of commodity prices, the role of speculators, and the impact of government subsidies on the production and consumption of ethanol. They are also interested in the relationship
  between the supply and demand of grain and the futures price, and how it affects the stability of the market.
