  hobbies: '["Visiting art museums and galleries", "Attending community theater", "Playing bridge and chess", "Woodworking and small‑scale carving", "Gardening with native Southern plants", "Local history
    and genealogy research", "Digital photography of cultural events", "Volunteer mentorship at senior center", "Cooking and trying new Southern recipes"]'
  career_goals: Although no longer employed, Joseph aims to deepen his impact on his community by establishing a weekly seniors’ art workshop at the local community center, where participants can explore
    drawing, painting, and photography together. He hopes to become a volunteer docent at the High Museum of Art, using his appetite for new ideas to guide visitors through exhibitions in an engaging way.
    Joseph also plans to author a modestly sized book that captures oral histories from longtime DeKalb County residents, preserving the district’s cultural memory. On a personal level, he is determined
    to master watercolor techniques and to improve his digital photography skills so he can document his travels and share them in an online gallery for friends and family.
