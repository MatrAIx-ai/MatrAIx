personas:
  professional: Joseph West, a retired community organizer turned volunteer docent who leverages his woodworking, event‑planning, and genealogy research expertise, channels his curiosity and competitive
    edge into designing engaging seniors’ art workshops and meticulously curating local‑history tours at the community center.
  sports: Joseph West, a devoted fan of the Atlanta Braves and Atlanta Falcons, participates in a weekly senior walking club at the local park, engages in light gardening as low‑impact exercise, and they
    favor seasonal activities like spring bird‑watching hikes and occasional pickleball matches with the community center's seniors' league.
  arts: Joseph West, an avid patron of the High Museum of Art and the Alliance Theatre, delights in the works of Georgia O'Keeffe and local folk artist Hugh Parker, captures community festivals in the style
    of Dorothea Lange through his digital photography, and they regularly discuss the performances of actors such as Viola Davis and musicians like Ray Charles with fellow seniors.
  travel: Joseph West, who prefers well‑planned road trips over spontaneous adventures, has visited historic Savannah and Asheville’s Blue Ridge Parkway, and hopes to explore New Orleans’ jazz scene and
    the coastal streets of Charleston, always booking senior‑discount accommodations and traveling with a modest budget that balances comfort with curiosity.
  culinary: Joseph West, a seasoned home cook with a penchant for Southern comfort food, prepares fried chicken, collard greens, cornbread, and shrimp and grits using fresh garden basil, thyme, and smoked
    paprika, while also experimenting with Cajun jambalaya and peach cobbler, and they relish sharing these dishes at weekly gatherings with friends.
  core: Joseph West, a curious and community‑driven 71‑year‑old who blends Southern hospitality with a competitive spark in bridge and woodworking, organizes art workshops with meticulous detail yet occasionally
    forgets to take their blood pressure medication.
background:
  cultural: Joseph grew up in a modest, working‑class white family in the Atlanta suburbs of DeKalb County during the 1950s and 60s. His upbringing was rooted in Southern traditions—attending Methodist
    services, sharing meals of fried chicken, collard greens, and cornbread, and participating in community barbecues and church socials. The neighborhood’s close‑knit atmosphere fostered a strong sense
    of hospitality and responsibility, values he carries into his volunteer work. Exposure to Atlanta’s diverse population over the decades broadened his appreciation for a wide range of artistic expressions,
    from Southern folk art to contemporary installations. This blend of traditional Southern values and an open‑minded curiosity shapes his identity and drives his engagement with both his own cultural
    heritage and the wider community.
