personas:
  professional: Angel Altamirano is a veteran bilingual call center specialist who leverages three decades of high‑volume inbound and outbound experience, expert CRM proficiency, and a personable, script‑driven
    approach to consistently exceed quality metrics while channeling their talkative, sociable nature into coaching and conflict resolution.
  sports: Angel Altamirano enjoys weekend Zumba classes at the Bayamón Fitness & Dance Club, follows the Capitanes de Arecibo basketball team and cheers for the Criollos de Caguas in the baseball league,
    and maintains a daily habit of walking the neighborhood while tending a herb garden to stay active.
  arts: Angel Altamirano frequently sings karaoke to the likes of Marc Anthony, Celia Cruz, and Victor Manuelle, attends local performances at the Teatro del Canal, and finds inspiration in reading Gabriel
    García Márquez’s One Hundred Years of Solitude, which shapes their expressive storytelling.
  travel: Angel Altamirano favors organized getaways, often planning short trips to culturally rich Caribbean spots like Old San Juan and Santiago de Cuba, while also dreaming of a leisurely cruise through
    the Mediterranean ports of Barcelona and Rome, balancing limited vacation days with a desire for immersive music and food experiences.
  culinary: Angel Altamirano cooks traditional ropa vieja, arroz con gandules, and succulent tostones with a confident hand, relying on homemade sofrito, fresh cilantro, and smoked paprika, and relishes
    sharing these dishes at community potlucks while occasionally over‑spicing to satisfy their zest for bold flavors.
  core: Angel Altamirano blends disciplined routine with vibrant salsa steps, turning every conversation into a chance to nurture connections, even if it leads to over‑committing to community events and
    occasionally neglecting personal rest.
background:
  cultural: Angel Zaida Altamirano is a first‑generation Cuban who grew up in the vibrant Cuban diaspora community of Bayamón and the neighboring Trujillo Alto municipio. Her parents emigrated from Cuba
    in the early 1970s, bringing with them the rhythms of son, the aroma of café cubano, and a deep respect for family gatherings. Raised bilingual, she effortlessly switches between Spanish and English,
    preserving Cuban idioms such as ¡Asere! while also embracing Puerto Rican customs like the parranda tradition during Christmas. Her cultural identity is a blend of Cuban culinary staples—ropa vieja,
    tamales, and plantains—with Puerto Rican flavors like mofongo and lechón, which she frequently prepares for community events. Catholic celebrations, the reverence for San Juan Bautista, and participation
    in local festivals such as the Bayamón Carnaval further shape her sense of belonging. This hybrid cultural background informs her empathy for customers from diverse Caribbean heritages and fuels her
    commitment to serve the bilingual community in her region.
attributes:
  skills: '[''Bilingual Customer Service (Spanish/English)'', ''High-Volume Call Management'', ''CRM Platforms (Salesforce, Zendesk)'', ''Conflict Resolution & De-Escalation'', ''Empathetic Communication'',
    ''Process Improvement & Data Analysis'', ''Team Training & Coaching'', ''Documentation & Reporting'', ''Time Management & Organizational Skills'', ''Quality Assurance & KPI Monitoring'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Cuban & Puerto Rican cuisine'', ''Volunteering at community center (senior assistance)'', ''Gardening herbs and vegetables'', ''Reading classic Latin
    American literature'', ''Karaoke singing'', ''Attending local festivals and street concerts'', ''Walking in Bayamón parks'']'
  career_goals: As she approaches the final stage of her professional journey, Angel Zaida aims to transition from a frontline representative to a leadership role where she can shape the customer experience
    strategy. In the next two years she plans to earn a certification in Customer Experience Management and secure a shift‑lead or team‑lead position within her current call center, overseeing a small group
    of agents and coaching them to achieve higher satisfaction scores. Long‑term, she envisions moving into a training manager or quality‑assurance specialist role, developing curriculum that blends her
    practical service experience with her humanities background, and possibly mentoring younger Cuban‑Puerto Rican employees to navigate the industry. She also wishes to leverage her community ties to spearhead
    a bilingual outreach program that helps senior citizens in Bayamón and Trujillo Alto access essential public services.
