  hobbies: '[''Abstract sketching'', ''Watercolor painting'', ''Digital photography'', ''Reading science and philosophy'', ''Scale model truck building'', ''Woodworking'', ''Gardening'', ''Fishing'', ''Birdwatching'',
    ''Volunteering at local fairs'']'
  career_goals: Looking ahead, Joshua aims to transition from full‑time driving to a consulting and mentorship role within the regional trucking industry. He plans to launch a small, eco‑focused freight
    service that leverages his route‑planning expertise and his interest in sustainable practices. He also hopes to mentor younger drivers through a formal apprenticeship program, and to author a memoir
    that blends his trucking stories with reflections on the changing American landscape. In parallel, he would like to expand a modest online shop where he sells his paintings and prints of rural Missouri
    scenes.
