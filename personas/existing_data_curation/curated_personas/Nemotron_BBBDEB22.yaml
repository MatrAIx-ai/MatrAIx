personas:
  professional: Joshua Strickland, a meticulous 60‑year‑old veteran long‑haul truck driver, leverages decades of route‑optimization expertise and a quiet artistic eye, and they now deliver data‑driven consulting
    and mentorship for Missouri’s freight industry while laying the groundwork for an eco‑focused shipping venture.
  sports: Joshua Strickland, a devoted follower of the Saint Louis Cardinals and the Kansas City Chiefs, spends their weekends on the banks of the Current River with the Ozark Anglers Association, practicing
    fly‑fishing and bird‑watching, while occasionally joining a local senior softball league for light recreation, and they cherish these quiet moments as a retreat from the road.
  arts: Joshua Strickland, who spends evenings experimenting with watercolors of Ozark foothills and capturing black‑and‑white frames reminiscent of Ansel Adams, collects vintage camera lenses, draws inspiration
    from Georgia O'Keeffe's abstractions, and they wind down listening to Bob Dylan and the Avett Brothers, weaving these artistic threads into a quiet yet vivid personal aesthetic.
  travel: Joshua Strickland, a methodical planner who favors scenic drives over crowded airports, has explored the Great Smoky Mountains, Yellowstone, and a weekend road trip to Branson and New Orleans,
    and they intend to embark on a future solo expedition to Patagonia’s Patagonian Andes, balancing their love of solitude with occasional family visits.
  culinary: Joshua Strickland, who favors farm‑to‑table dishes, regularly prepares roasted heirloom tomato and basil pasta, grilled trout with dill, and sweet corn cornbread using produce from their own
    garden, while honing their cast‑iron skillet skills and occasionally treating themselves to a slice of pecan pie during the Dent County Fair.
  core: Joshua Strickland, a solitary yet methodical 60‑year‑old master of the highway and the watercolor brush, blends disciplined logistics with quiet artistic reverie, and they occasionally hoard fuel
    receipts while dreaming of greener roads.
background:
  cultural: Joshua grew up in the heart of rural Missouri, a region shaped by Midwestern values of hard work, self‑reliance, and community ties. His family’s roots trace back to a mix of German and Irish
    settlers who farmed the rolling hills of Dent County, and the local Protestant church has been a cornerstone of his social life. The cultural rhythms of county fairs, church potlucks, and country‑rock
    radio are familiar comforts, while the modest high‑school education he received emphasized practical skills over formal credentials. These influences blend with his personal curiosity, giving him a
    grounded yet imaginative perspective on life.
attributes:
  skills: '[''Long-haul truck driving'', ''Route optimization and logistics planning'', ''Vehicle maintenance and basic mechanical repair'', ''DOT safety compliance'', ''Fuel budgeting and cost management'',
