  career_goals: Eileen dreams of becoming a children’s book author and illustrator, using her vivid imagination to craft stories that celebrate diversity and promote kindness. She also envisions a future
    as an animator or visual storyteller, studying graphic design or illustration at a university. While she prefers quiet, independent work, she hopes her career will allow her to mentor younger kids in
    her community, sharing her love for art and literature and helping them find calm in creative expression.
