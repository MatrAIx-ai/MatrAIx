personas:
  professional: Elouise Molnar is a Midwest‑born mechanical and electrical maintenance specialist who leverages a talent for abstract sketching and kinetic art to devise visually striking, energy‑efficient
    solutions on site, and is currently pursuing a journeyman electrician license to launch a boutique service that blends sustainable engineering with interactive lighting installations.
  sports: Elouise Molnar spends early weekend mornings hiking the Indiana Dunes and joining a local indoor climbing gym, follows the Chicago Cubs and the Chicago Bulls on TV, and participates in a community
    softball league where they relish the blend of casual competition and camaraderie.
  arts: Elouise Molnar devotes evenings to watercolor abstract compositions inspired by industrial textures, curates a personal playlist featuring Brian Eno, Aphex Twin, and Laurie Anderson, and regularly
    visits the Art Institute of Chicago to study works by Yayoi Kusama and Mark Rothko, finding these influences fuel their kinetic sculpture projects.
  travel: Elouise Molnar prefers low‑key road trips to nearby natural preserves like the Prophet’s Preserve and urban explorations of Detroit’s abandoned factories, while dreaming of a summer backpacking
    adventure through the fjords of Norway, planning each journey with a meticulous DIY itinerary that balances budget constraints and photo‑shoot opportunities.
  culinary: Elouise Molnar enjoys cooking hearty Midwestern fare such as chicken pot pie with locally sourced carrots and rosemary, experiments with Japanese okonomiyaki using matcha‑infused batter, and
    often savors a craft espresso made with single‑origin beans from Ethiopia while drafting design sketches.
  core: Elouise Molnar merges a pragmatic Midwestern work ethic with avant‑garde artistic curiosity, turning routine maintenance into a canvas for experimental lighting, yet sometimes lets impulsive art‑supply
    splurges derail their budgeting.
background:
  cultural: Elouise grew up in a middle‑class, predominantly white family in the Midwest, with roots tracing back to German and Irish immigrants who settled in Indiana generations ago. The community emphasized
    a strong work ethic, self‑reliance, and cordial neighborly ties characteristic of Lake County’s small‑town culture. Living in Griffith, she benefits from the quiet suburban environment while being within
    easy reach of Chicago’s vibrant art and music scenes, which have broadened her exposure to contemporary and avant‑garde creative movements. This blend of Midwestern practicality and urban artistic inspiration
    informs her pragmatic yet imaginative approach to both her professional work and personal pursuits.
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC system maintenance and repair'', ''Plumbing fixture installation'', ''Carpentry and framing'', ''Blueprint and schematic interpretation'', ''Creative problem
    solving'', ''Basic CAD drafting'', ''Tool and equipment maintenance'', ''Customer communication and service'', ''Small-team coordination and leadership'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Photography (urban and nature)'', ''DIY electronics and kinetic art projects'', ''Reading speculative fiction and philosophy'', ''Visiting maker spaces
    and small art collectives'', ''Hiking in local nature preserves'', ''Journaling'', ''Listening to ambient and experimental music'', ''Experimenting with sustainable upcycling crafts'']'
  career_goals: Elouise aims to attain a certified journeyman electrician license within the next two years while also developing expertise in custom lighting and interactive art installations. She envisions
    transitioning from routine maintenance work to a niche role that blends her technical skills with her love for design, possibly launching a boutique service that creates bespoke, energy‑efficient installations
    for galleries, boutique retailers, and community spaces. Long‑term, she hopes to become a facilities manager for a creative‑focused organization or to run her own small contracting firm that emphasizes
    sustainable, aesthetically driven solutions.
