  hobbies: '[''Visiting art museums and galleries'', ''Desert landscape photography'', ''Hiking in the Sonoran Desert'', ''Reading art history and contemporary literature'', ''Playing chess'', ''Gardening
    (succulents and herbs)'', ''Cooking southwestern cuisine'', ''Traveling to cultural festivals and historic sites'', ''Attending local theater performances'']'
  career_goals: Bryce aims to move into a senior leadership position within the municipal finance department, such as Budget Director or Chief Financial Officer, where he can shape long‑term fiscal strategy
    for Gilbert and the surrounding Maricopa County region. He plans to spearhead the integration of predictive analytics and AI‑driven budgeting tools to improve accuracy and efficiency. Mentorship is
    also a priority; he wants to develop a formal training program for junior analysts, passing on his methodical approach and ethical standards. Additionally, Bryce is considering obtaining a CPA credential
    to deepen his expertise and to volunteer as a financial advisor for local non‑profits, applying his skills to community development projects.
