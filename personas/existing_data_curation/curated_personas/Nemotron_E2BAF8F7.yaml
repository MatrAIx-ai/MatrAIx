personas:
  professional: Ileana Garcia, a veteran audiovisual systems installer and repair specialist, leverages three decades of hands‑on experience, a Certified Technology Specialist credential, and a naturally
    compassionate, collaborative demeanor to translate complex signal‑path challenges into clear solutions for schools, churches, and community venues, while mentoring apprentices with patience and curiosity.
  sports: Ileana Garcia enjoys low‑impact fitness, participating in a local walking club that meets each Saturday morning at the historic downtown square, cheering for the New Mexico State Aggies basketball
    team and the Albuquerque Isotopes baseball club, and occasionally joining a community softball league, while preferring a gentle stretch routine over high‑intensity workouts.
  arts: Ileana Garcia immerses themselves in the arts by painting desert‑inspired landscapes echoing the palettes of Georgia O’Keeffe, volunteering to rig sound and lighting for the Clovis‑Curry County
    Art Festival, strumming acoustic guitar to the folk ballads of Bob Dylan and Joni Mitchell, and singing in the church choir where they relish the vibrant harmonies of choral arrangements.
  travel: Ileana Garcia favors purposeful road trips that blend cultural immersion and scenic photography, having driven the historic Route 66 to explore the art deco charm of Oklahoma City, revisited the
    colonial streets of Santa Fe for its galleries, and dreaming of a pilgrimage to the ancient ruins of Machu Picchu, all while balancing travel costs with a modest retirement budget.
  culinary: Ileana Garcia delights in cooking fragrant mole verde, hand‑rolled corn tortillas, and fresh salsa verde with roasted tomatillos, often pairing the dishes with roasted poblano peppers and cilantro,
    while their modest garden yields heirloom tomatoes and chiles that enrich these meals, and they occasionally experiment with sous‑vide techniques for tender pork carnitas.
  core: Ileana Garcia balances a meticulous AV career with a vibrant artistic spirit, juggling worries about health and finances while finding solace in painting, guitar, and garden‑grown flavors, often
    forgetting to take breaks but never forgetting to share a smile with neighbors.
background:
  cultural: Ileana grew up in a bilingual Hispanic household where Spanish and English were spoken interchangeably, and family gatherings centered around food, music, and storytelling. Her roots trace to
    Mexican ancestors who settled in northern New Mexico generations ago, infusing her identity with a blend of Mexican and Southwestern traditions. Community ties remain strong—she participates in Día
    de los Muertos commemorations, celebrates Mexican holidays with festive dishes, and maintains close relationships with extended family across state lines. The cultural emphasis on hospitality, mutual
    support, and reverence for art shapes her compassionate outlook and her desire to give back through technical service and cultural engagement.
attributes:
  skills: '[''AV system installation'', ''Audio signal troubleshooting'', ''Video projection setup'', ''Live event support'', ''Cable management'', ''Networked AV configuration'', ''System maintenance'',
    ''Customer service'', ''Technical documentation'', ''Team coordination'', ''Safety compliance'', ''Basic electronics repair'', ''Project planning'', ''CTS certification'']'
  hobbies: '[''Painting landscapes'', ''Attending art festivals'', ''Volunteering for community theatre AV setup'', ''Playing acoustic guitar'', ''Dancing salsa'', ''Singing in church choir'', ''Gardening'',
    ''Cooking traditional Mexican dishes'', ''Reading mystery novels'', ''Participating in a book club'']'
  career_goals: Looking ahead, Ileana aims to transition into a mentorship and supervisory role within the regional AV industry. She plans to obtain an advanced CTS‑D (Design) certification, expand her
    expertise in emerging immersive technologies, and launch a small consulting firm that offers affordable AV solutions to community organizations, churches, and schools in eastern New Mexico. She also
    hopes to lead workshops that blend technical training with creative art installations, fostering partnerships between tech professionals and local artists. Balancing her professional aspirations with
    family life, she seeks a schedule that reduces stress while allowing her to remain an active, compassionate presence in her community.
