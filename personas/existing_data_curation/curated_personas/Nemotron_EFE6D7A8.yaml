  career_goals: Ahmed aims to move into a supervisory role within the next three years, aspiring to become a shift manager and eventually a warehouse operations manager. To support this, he is planning
    to enroll in a community-college supply-chain certification (APICS CPIM) and obtain a formal forklift certification. He hopes to lead a team that embraces flexibility while improving organizational
    processes, and he dreams of using his logistical expertise to help a local nonprofit organization streamline its distribution of donated goods. Long-term, he is curious about transitioning into supply-chain
    planning or a part-time role curating community art exhibitions that blend his love of logistics and art.
