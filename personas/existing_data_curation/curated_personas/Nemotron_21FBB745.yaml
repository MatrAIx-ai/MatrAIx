  hobbies: '[''Reading Science-Fiction'', ''Science Club Participation'', ''Astronomy Nights'', ''Journaling'', ''Piano Practice'', ''Sketching'', ''Gardening'', ''Hiking'', ''Library Volunteering'']'
  career_goals: Polly aspires to study biomedical engineering or a related health science field, with the long-term goal of designing affordable medical devices that improve patient care. She aims to attend
    a top university, secure research internships, and eventually work in a lab that bridges innovative research with practical healthcare solutions. She also hopes to mentor younger students, using her
    organizational strengths to lead community science outreach programs.
