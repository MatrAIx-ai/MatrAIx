personas:
  professional: Polly Cobb, a diligent high‑school sophomore, channels her methodical curiosity into leading the school’s science club, where they design experiments, mentor peers, and meticulously plan
    the annual astronomy night to bridge imagination with empirical rigor.
  sports: Polly Cobb stays active by hiking the trails of Great Falls Park on weekends, participates in the middle school cross‑country team during the fall, and avidly follows the Washington Capitals and
    the Washington Wizards, regularly joining the local youth hiking club 'River Runters' to balance structured training with spontaneous outdoor exploration.
  arts: Polly Cobb blends scientific curiosity with artistic flair, practicing piano repertoire ranging from Debussy’s 'Clair de Lune' to contemporary film scores, sketching detailed botanical illustrations
    inspired by Ansel Adams, and frequently attending community theatre performances featuring actors like Lin‑Manuel Miranda, all of which enrich their creative identity.
  travel: Polly Cobb prefers well‑planned trips that combine learning and adventure, having explored the Smithsonian’s National Air and Space Museum in Washington DC, camped at Shenandoah National Park’s
    Skyline Drive, and dreaming of a future visit to the Kennedy Space Center to experience a launch firsthand, while balancing a tight teenage budget with occasional family road trips.
  culinary: Polly Cobb, an enthusiastic home cook, often prepares vegetable stir‑fry with basil, rosemary, and heirloom tomatoes harvested from their garden, delights in baking blueberry lemon muffins using
    fresh berries, and enjoys sampling regional dishes like Korean bibimbap when dining out, though they sometimes forget to clean up the kitchen in the rush of homework.
  core: Polly Cobb is a methodical, science‑driven teen who balances curiosity with careful planning, yet wrestles with perpetual worry that fuels both meticulous achievement and occasional overthinking.
background:
  cultural: Polly comes from a white, middle-upper-class family rooted in the suburban culture of McLean, Virginia. Her family's heritage includes English and German ancestry, and they celebrate traditional
    American holidays such as Thanksgiving, the Fourth of July, and Easter, as well as local community events. Growing up near Washington, D.C., she has been exposed to a diverse, multicultural environment,
    which has broadened her perspective on civic engagement and cultural appreciation. Her upbringing emphasizes education, community service, and modest religious participation at a local Episcopal church.
