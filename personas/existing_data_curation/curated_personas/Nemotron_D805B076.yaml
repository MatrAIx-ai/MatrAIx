personas:
  professional: Christina Albritten is an aspiring administrative coordinator who leverages expert Excel, PowerPoint, and data‑entry skills to design streamlined project timelines while applying a competitive,
    structure‑driven mindset to keep teams accountable.
  sports: Christina Albritten competes in a local women's basketball league, follows the hometown's NBA team the Chicago Bulls, and keeps fit with twice‑weekly yoga at the downtown studio and Saturday low‑impact
    cardio on the treadmill, while cheering for the University of Illinois Fighting Illini during college basketball season.
  arts: Christina Albritten relaxes with the soulful jazz of Nina Simone, the contemporary storytelling of Lin‑Manuel Miranda's musical Hamilton, and the vibrant street art of Banksy, often curating playlists
    for her journaling sessions.
  travel: Christina Albritten prefers meticulously planned weekend getaways, such as a three‑day hike in the Great Smoky Mountains, a culinary tour of New Orleans' Creole restaurants, and a budget‑friendly
    backpacking trip through Portugal's Azores, balancing adventure with a tight student‑budget calendar.
  culinary: Christina Albritten enjoys cooking comfort classics like smoked collard greens, honey‑glazed baked chicken, and sweet potato casserole, while also mastering meal‑prep quinoa bowls seasoned with
    cumin, lime, and roasted chickpeas, showcasing an intermediate skill level and a penchant for experimenting with spices.
  core: Christina Albritten is a detail‑obsessed planner who channels competitive energy into basketball and spreadsheets, juggling structured routines with occasional over‑commitments, a love for soul
    food, and a habit of late‑night journaling that fuels personal growth.
background:
  cultural: Christina was raised in Lexington’s historically Black neighborhoods and maintains strong ties to her African‑American heritage. Family traditions include Sunday gospel services, soulful cooking
    (fried catfish, collard greens, cornbread), and participation in Juneteenth celebrations that blend local Kentucky customs, like bluegrass music, with Black cultural expressions. Her community involvement
    and church fellowship have reinforced values of resilience, mutual support, and a pragmatic approach to navigating both academic and professional arenas as a Black woman in a predominantly white environment.
attributes:
  skills: '["Administrative support", "Data entry and management", "Microsoft Office Suite", "Basic database handling", "Scheduling and calendar management", "Budgeting and expense tracking", "Project coordination",
    "Process optimization", "Customer service", "Conflict resolution", "Event planning", "Social media outreach"]'
  hobbies: '["Daily journaling", "Home organization and decorating", "Reading personal development and business books", "Yoga", "Low‑impact cardio", "Community basketball league", "Puzzle nights (sudoku,
    crosswords)", "Volunteer work at church food bank", "Cooking soul‑food and meal prepping"]'
  career_goals: Christina aims to secure a full‑time administrative or junior project‑management role in a midsize organization where clear procedures and measurable outcomes are valued. She plans to complete
    a bachelor’s degree in Business Administration within the next two years and obtain a CAPM or PMP certification to strengthen her credentials. Over the next five years she aspires to advance to a supervisory
    position, leading a team that streamlines operations, mentors new staff, and drives efficiency projects, while maintaining a structured and results‑oriented work environment.
