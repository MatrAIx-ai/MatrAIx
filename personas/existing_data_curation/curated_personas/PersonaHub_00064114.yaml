persona_description: A climate scientist who specializes in the study of Earth's climate system, particularly the effects of human activities on global temperature and its impact on terrestrial ecosystems.
  They are part of a team of researchers from Stanford University who have concluded that climate change is occurring at an unprecedented rate and that the current pace of change will lead to a 5-6 degree
  Celsius spike by the end of this century without intervention to reduce greenhouse gas emissions in the near-term. Their work is part of a special report on climate change in the current issue of Science.
