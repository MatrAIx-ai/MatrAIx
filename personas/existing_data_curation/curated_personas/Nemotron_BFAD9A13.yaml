  hobbies: '[''Visiting art galleries and museums'', ''Photography (urban and nature)'', ''Herb gardening'', ''Solitary hiking'', ''Journaling'', ''Reading contemporary fiction and art history'', ''Cooking
    experimental recipes'']'
  career_goals: She aims to advance to an Operations Manager role within the next three years, overseeing multiple departments and driving strategic initiatives that enhance efficiency and employee satisfaction.
    Long‑term, she envisions leading a regional cultural institution where she can combine her administrative expertise with her passion for the arts, possibly as a Director of Operations for a museum or
    community arts center.
