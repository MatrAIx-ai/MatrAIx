  hobbies: '[''Landscape Photography'', ''Acoustic Guitar Playing'', ''DIY Woodworking'', ''Weekly Basketball League'', ''Hiking'', ''Fishing'', ''Barn Dances and Bluegrass Concerts'', ''Community Volunteer
    Work'']'
  career_goals: John aspires to launch a locally‑owned handyman service that doubles as a modest art studio and café, where he can showcase his photography and sell handcrafted items made by regional artisans.
    He plans to complete a community‑college certificate in Small Business Management within the next two years to formalize his entrepreneurial knowledge. Simultaneously, he hopes to take on a formal role
    as a volunteer manager at the Lee County community center, using his event‑planning experience to expand cultural programming. Ultimately, he envisions his venture becoming a gathering hub that blends
    practical services, creative arts, and community connection.
