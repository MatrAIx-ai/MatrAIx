persona_description: A political scientist with expertise in the field of political trust and its relation to voter turnout. They have conducted research on the effects of political corruption and its impact
  on democracy, and are interested in the role of political trust in elections and voting. They have a keen interest in the development of the European Union and its future direction, and are particularly
  interested in the potential for re-nationalization of the EU-area. They have a strong background in political science, with a focus on democracy, governance, and the role of political institutions in
  society. They have a keen interest in the development of political trust and its relation to voter turnout, and have conducted research on the topic. They are skilled in analyzing data and interpreting
  complex information, and are able to draw conclusions from large datasets. They have a passion for democracy and are committed to the idea of a fair and just society.
