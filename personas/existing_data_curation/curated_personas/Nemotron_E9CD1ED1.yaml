personas:
  professional: Elizabeth Rivera, a charismatic community arts coordinator in training, leverages her bilingual fluency, event‑planning savvy, and bold social‑media presence to design inclusive workshops
    and multicultural festivals that spotlight emerging street artists while juggling tight budgets and volunteer teams.
  sports: Elizabeth Rivera fuels her active lifestyle with sunrise yoga by Narragansett Bay, weekend pick‑up soccer with the Providence Youth Club, and cheering for the New England Patriots and Providence
    Bruins, while also participating in a community salsa‑dance class that doubles as cardio.
  arts: Elizabeth Rivera immerses herself in the RISD Museum’s contemporary exhibitions, curates Instagram stories of Providence’s vibrant street murals, and regularly attends Trinity Rep productions starring
    Michael Cera and performances of Cuban band Buena Vista Social Club, letting these experiences shape her own photo‑journal narratives.
  travel: Elizabeth Rivera prefers spontaneous week‑long road trips, having road‑tripped down the Pacific Coast Highway to explore Santa Barbara’s murals, trekked the cobblestones of Antigua, Guatemala,
    and dreams of attending Mexico’s Day of the Dead festival in Oaxaca while budgeting her flights with a frequent‑flyer credit card.
  culinary: Elizabeth Rivera’s kitchen is a fragrant lab where she masterfully prepares pepián with roasted tomatillos, tamales wrapped in banana leaves, and pairs them with fresh cilantro, lime, and a
    hint of achiote, often hosting dinner parties where friends devour homemade chicha de maíz and spicy guacamole.
  core: Elizabeth Rivera blends a love for community arts, meticulous planning, and endless social energy into a life that balances vibrant cultural events, an adventurous palate, and a habit of over‑booking
    their calendar.
background:
  cultural: Elizabeth comes from a Guatemalan family that migrated to the United States when she was a child. She grew up bilingual, celebrating traditional holidays such as Día de los Muertos and Semana
    Santa with her parents, while also integrating New England customs. Her upbringing emphasized community solidarity, respect for elders, and a love for vibrant music and textiles, which she continues
    to honor through her cooking, dance, and involvement in local Latinx cultural events. Living in Cumberland, RI, she navigates a blend of her Central American heritage and the multicultural fabric of
    the Providence area, often acting as a cultural bridge between immigrant communities and broader local audiences.
attributes:
  skills: '["Bilingual Spanish/English", "Interpersonal communication", "Community event planning", "Volunteer coordination", "Social media content creation", "Basic graphic design (Canva)", "Budgeting
    and resource management", "Public speaking", "Cultural liaison"]'
  hobbies: '["Visiting art museums and galleries", "Attending concerts and theater", "Photography and street art documentation", "Cooking Guatemalan cuisine", "Hosting dinner gatherings", "Salsa and contemporary
    dance classes", "Volunteering at youth arts programs", "Yoga", "Coastal walking and nature observation"]'
  career_goals: She aspires to transition into a professional role as a community arts coordinator or cultural program manager within a nonprofit or municipal arts agency in Providence County. Her goal
    is to design and implement inclusive art workshops, multicultural festivals, and youth outreach programs that celebrate diverse heritages, especially Latin American cultures. To achieve this, she plans
    to enroll in a certificate program in arts administration and seek an entry‑level position that leverages her communication strengths and passion for the arts. Long‑term, she envisions leading a regional
    cultural center that serves as a bridge between immigrant communities and the broader public.
