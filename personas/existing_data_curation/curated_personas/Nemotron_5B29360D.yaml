personas:
  professional: Eric Todd, a seasoned construction professional with three decades of hands‑on experience operating heavy equipment and interpreting blueprints, leverages their methodical, curiosity‑driven
    approach to push for OSHA 30‑hour and NCCER certifications while eyeing a foreman role and eventually a boutique energy‑efficient remodeling firm, and they consistently mentor apprentices with a competitive
    edge.
  sports: Eric Todd, an avid outdoorsman who spends weekends fishing on the Great South Bay and hunting in upstate New York, follows the New York Mets and New York Islanders, plays in a local adult softball
    league, maintains fitness through occasional gym strength sessions and seasonal trips to ski resorts, and they approach athletic pursuits with a practical, results‑oriented mindset.
  arts: Eric Todd, a hands‑on creative who restores classic cars as a form of art and enjoys architecture documentaries featuring Frank Lloyd Wright and Zaha Hadid, often listens to classic rock icons like
    Led Zeppelin and blues legend B.B. King while attending local fairs showcasing folk musicians like Bruce Springsteen, and they value artistic expression as a quiet complement to their methodical work
    life.
  travel: Eric Todd, a methodical planner who prefers weekend road trips to the Hamptons or the Adirondacks for fishing and classic car shows, occasionally flies to Detroit for the Woodward Dream Cruise
    and dreams of attending the Goodwood Festival in England, balances travel costs with their upcoming contracting venture, and they favor itineraries that mix structured sightseeing with spontaneous outdoor
    pursuits.
  culinary: Eric Todd, a grill enthusiast who masters smoked brisket with hickory wood, cedar‑plank salmon seasoned with fresh dill, and shrimp scampi using a dash of bourbon, often cooks the day's catch
    from the bay and experiments with backyard pizza topped with locally sourced mozzarella and basil, though they sometimes over‑season in a quest for bold flavor.
  core: Eric Todd, a 51‑year‑old construction veteran who merges meticulous planning with restless curiosity, channels that energy into classic car restoration and sustainable remodels, and they maintain
    a competitive drive that fuels both their work and weekend hobbies.
background:
  cultural: Eric grew up in a working‑class, suburban family in Suffolk County, where values of hard work, self‑reliance, and family loyalty are central. His heritage blends Irish and German ancestry, common
    among many white Long Island families. Raised in a modest Protestant (Methodist) environment, he was taught responsibility, community service, and the importance of steady employment. The post‑war suburban
    culture of Long Island—emphasizing homeownership, DIY craftsmanship, local sports, and neighborly support—shaped his practical mindset, organized habits, and competitive drive. He maintains strong ties
    to neighborhood events, church gatherings, and a close network of fellow tradespeople.
attributes:
  skills: '[''Heavy equipment operation'', ''Blueprint reading and interpretation'', ''Concrete finishing and formwork'', ''Framing and basic carpentry'', ''Site safety and OSHA compliance'', ''Material
    handling and inventory management'', ''Time scheduling and project documentation'', ''Construction management software usage'', ''Sustainable/green building techniques'', ''Drone site surveying basics'']'
  hobbies: '[''Classic car restoration'', ''Fishing on Great South Bay'', ''Hunting trips'', ''Reading about engineering history'', ''DIY home improvement projects'', ''Grilling and barbecue'', ''Attending
    local community fairs'', ''Watching architecture documentaries'']'
  career_goals: Eric aims to move from laborer to foreman within the next three years, obtaining OSHA 30‑hour, NCCER, and a certified heavy‑equipment operator credential. Long‑term, he plans to launch a
    small contracting firm that specializes in energy‑efficient residential remodels on Long Island, leveraging his practical expertise and enthusiasm for new building technologies. He also wishes to mentor
    younger tradespeople, building a reputation for reliability, high productivity, and competitive excellence.
