  career_goals: Although retired, Vicki aims to complete a self‑published memoir that weaves her family’s journey from the Midwest to the Southwest, blending personal narrative with regional history. She
    aspires to contribute a comprehensive oral history of Tucson’s historic neighborhoods to the local historical society and hopes to earn recognition in a regional writing competition. Vicki also wishes
    to volunteer as a mentor for adult learners in humanities courses at the community college, sharing her research skills while maintaining the flexibility she values.
