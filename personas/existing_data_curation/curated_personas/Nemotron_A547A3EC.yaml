    ''Crocheting'']'
  hobbies: '[''Visiting art museums and galleries'', ''Photography of urban and natural scenes'', ''Watercolor painting'', ''Sketching'', ''Writing essays for personal blog'', ''Reading literary fiction'',
    ''Listening to jazz music'', ''Jigsaw puzzles'', ''Knitting'', ''Baking artisanal breads'', ''Walking the Lakefront Trail'', ''Attending lectures and talks on philosophy and culture'']'
  career_goals: Brittany aims to transition her passion for art and research into a more public‑facing role, such as a freelance art writer, online curator, or docent at a local museum. She is working toward
    completing a certificate in museum studies through an online program and hopes to launch a quarterly e‑newsletter that highlights under‑recognized Chicago artists. In the longer term, she wishes to
    author a memoir blending personal reflections with cultural commentary and possibly volunteer as a senior mentor for adult learners seeking to develop creative skills. Her ambition includes establishing
    a stable, low‑stress income stream from freelance writing and small‑scale commissions of original artwork, allowing her to maintain her preferred solitary lifestyle while contributing to the community.
