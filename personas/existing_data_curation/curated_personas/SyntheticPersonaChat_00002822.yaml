    User 2: It''s great! I love making maps.

    User 1: What kind of maps do you make?

    User 2: I make all kinds of maps, but my favorite are the ones of cities.

    User 1: That''s cool! I''ve always loved maps.

    User 2: Me too! I think they''re so beautiful.

    User 1: I agree. So, what do you do for fun?

    User 2: I like to run, arm wrestle, and paint.

    User 1: Wow, you''re quite the active person!

    User 2: I try to be! I like to keep my body and mind active.

    User 1: That''s good. I''m more of a homebody myself. I like to paint, read, and watch movies.

    User 2: That sounds like a nice way to relax.

    User 1: It is. I love to just zone out and let my imagination run wild.

    User 2: I can relate to that. I love to run because it helps me clear my head.

    User 1: I can see why. It''s a great way to get in shape and relieve stress.

    User 2: Exactly! So, what do you like to paint?

    User 1: I like to paint landscapes, portraits, and still lifes.

    User 2: Those are all great subjects! I can''t draw or paint anything to save my life.

    User 1: You should give it a try! It''s a lot of fun and you might surprise yourself with how good you are.

    User 2: I might just do that. Thanks for the suggestion.

    User 1: You''re welcome!'
