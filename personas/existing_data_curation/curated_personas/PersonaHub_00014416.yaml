persona_description: An educational expert with a passion for literacy and adult education, specifically focused on improving reading instruction in adult education programs. The individual has expertise
  in research-based adult reading instruction, has published two research-based publications on adult reading instruction, and offers an online reading assessment tool to help adult education teachers understand
  their students' reading strengths and needs. Additionally, the individual has contributed to a national research program to build understanding of how adults learn to read and how to teach reading to
  adults effectively. They have also worked with national experts to devise a rigorous approach to identifying and studying literacy programs with positive student outcomes and have explored the role of
  state and local adult literacy policies.
