persona_description: A researcher at the University of Akron who specializes in developing flexible and unbreakable smartphone screens. He has developed a new transparent electrode that is layered over
  a polymer surface, creating a durable and flexible film that can withstand repeated bending and tearing without breaking. He is optimistic about the potential of this technology and believes it may be
  the solution to the problem of cracked smartphone screens once and for all.
