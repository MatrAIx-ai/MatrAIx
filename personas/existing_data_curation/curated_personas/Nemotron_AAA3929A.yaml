  hobbies: '[''Drawing and coloring'', ''Building with LEGO'', ''Reading picture books'', ''Collecting leaves and rocks'', ''Solitary puzzle solving'', ''Simple cooking activities with parents'', ''Nature
    journaling'']'
  career_goals: Even at five, Daniele imagines herself as a scientist or engineer who discovers new ways to make everyday tasks easier, often competing with herself to build the tallest tower or solve the
    trickiest puzzle. She also dreams of being a helpful grown‑up who can fix things around the house and, one day, perhaps write her own storybook. Her ambitions blend a love of exploration with a practical
    desire to contribute meaningfully to her family and community.
