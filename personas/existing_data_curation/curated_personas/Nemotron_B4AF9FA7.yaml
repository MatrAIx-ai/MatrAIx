  career_goals: Evelyn plans to complete her high‑school education through a GED program and then pursue a bachelor’s degree in Computer Science, focusing on developing bilingual software tools that benefit
    her community. She is determined to earn a merit‑based scholarship and rank among the top of her class, reflecting her competitive nature. Her long‑term ambition is to work as a software developer at
    a tech firm that values diversity, or to launch her own startup that provides affordable digital solutions for small Hispanic businesses in Kansas. Evelyn’s pragmatic curiosity drives her to acquire
    market‑ready skills while maintaining a vision of creating inclusive technology.
