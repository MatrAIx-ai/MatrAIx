personas:
  professional: Evelyn Ramirez, a 17‑year‑old budding software developer, leverages fluency in Spanish and English, Python tinkering, and a competitive edge from online chess to craft bilingual educational
    apps, balancing curiosity‑driven experimentation with practical, deadline‑focused project management, and they thrive on turning abstract ideas into working code.
  sports: Evelyn Ramirez, a 17‑year‑old athlete, spends afternoons sharpening soccer skills with the Olathe East Panthers youth league, cheers for the Kansas City Chiefs in football and the Kansas City
    Royals in baseball, and they balance intense training sessions with casual pickup games to stay fit.
  arts: Evelyn Ramirez, a 17‑year‑old digital artist and sci‑fi enthusiast, creates illustrations in Procreate inspired by Octavia Butler’s novels, immerses themselves in cumbia legends like Los Ángeles
    Azules, banda groups such as Banda MS, and pop icons like Dua Lipa, letting these sounds shape their visual storytelling, and they often experiment with color palettes that echo the rhythms.
  travel: Evelyn Ramirez, a 17‑year‑old explorer, dreams of a road‑trip to the rolling Flint Hills, a spring‑break visit to a southern city famed for vibrant Día de los Muertos lantern displays, and a weekend
    getaway to New Orleans to soak in jazz and street food, and they balance limited budget with a thirst for cultural immersion.
  culinary: Evelyn Ramirez, a 17‑year‑old home cook, masters homemade tacos al pastor, hand‑made tamales, and mango‑habanero salsa, often blending traditional spices like cumin and epazote with unconventional
    ingredients such as kimchi to craft inventive fusion dishes.
  core: Evelyn Ramirez, 17, merges tech curiosity, competitive spirit, and kitchen creativity, juggling code, chess tournaments, and experimental recipes while they occasionally overspend on gaming gear
    and pull all‑night study marathons.
background:
  cultural: Evelyn was raised in a Mexican‑American household in Olathe, Kansas. Her parents immigrated from Mexico and maintain strong ties to their heritage, speaking Spanish at home and celebrating traditions
    such as Día de los Muertos, Las Posadas, and Cinco de Mayo with family gatherings, traditional foods, and music. This bilingual environment gave her fluency in both Spanish and English and a deep appreciation
    for Mexican cuisine, folklore, and Catholic customs. Living in a Midwestern suburb, she blends local American customs—like community sports leagues and school activities—into her identity, creating
    a hybrid cultural perspective that values family, hard work, and community service.
