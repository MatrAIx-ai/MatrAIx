  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Cooking traditional Vietnamese dishes'', ''Reading contemporary literature and art history'', ''Yoga and meditation'', ''Hiking
    in Central Florida nature trails'', ''Learning Japanese'', ''Journaling and reflective writing'']'
  career_goals: Tuyet aims to earn a Master’s degree in Curriculum and Instruction within the next two years, focusing on interdisciplinary and arts‑infused pedagogy. She aspires to become an instructional
    coach or curriculum specialist at her district, leading school‑wide initiatives that blend creativity with rigorous academic standards. Long‑term, she hopes to launch an after‑school program that supports
    Southeast Asian immigrant youth in Orlando, securing grant funding and presenting her innovative teaching models at national education conferences.
