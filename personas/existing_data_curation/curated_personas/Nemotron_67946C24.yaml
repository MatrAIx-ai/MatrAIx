personas:
  professional: Tuyet Luong is a 30‑year‑old classroom teacher who blends curriculum design expertise with art‑infused instruction, leveraging meticulous planning and a curious, skeptical mindset to craft
    data‑driven lessons while constantly worrying about meeting the diverse needs of English language learners.
  sports: Tuyet Luong enjoys solitary early‑morning runs along the Lake Apopka Trail, follows the Orlando Magic and Orlando City SC with quiet loyalty, and participates in the Orlando Hiking Club’s weekend
    hikes, preferring low‑key cardio and yoga over team sports.
  arts: Tuyet Luong draws creative inspiration from Georgia O'Keeffe's watercolors, Yayoi Kusama's immersive installations, and Ocean Vuong's lyrical poetry, regularly visiting the Orlando Museum of Art
    and sketching in quiet museum corners after school.
  travel: Tuyet Luong plans solo cultural excursions with meticulous itineraries, having already explored Kyoto’s historic shrines and the bustling night markets of Ho Chi Minh City, while dreaming of trekking
    Patagonia’s Torres del Paine and a wellness retreat in Ubud, Bali.
  culinary: Tuyet Luong, an intermediate home cook, delights in perfecting a fragrant pho broth seasoned with star anise, ginger, and Thai basil, crafting delicate bánh xèo crepes with turmeric and bean
    sprouts, and experimenting with matcha‑infused desserts, all sourced from the local farmer’s market.
  core: Tuyet Luong is a methodical teacher‑artist who channels obsessive curiosity into lesson plans and watercolor sketches, yet battles chronic worry and a habit of late‑night coffee binges before meditation.
background:
  cultural: Tuyet was raised in a bilingual Vietnamese household in the United States, with parents who emphasized the importance of education, community respect, and cultural preservation. She celebrates
    Vietnamese traditions such as Tet and Mid‑Autumn festivals with the local Vietnamese community in Orlando, where she also volunteers at cultural events. Her heritage informs her teaching philosophy,
    prompting her to incorporate multicultural content and language support for immigrant students. While deeply rooted in her cultural values, she remains open to new ideas and unconventional approaches,
    balancing traditional perspectives with innovative educational practices.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Data‑Driven Assessment'', ''Educational Technology Integration'', ''Art Integration'', ''Multicultural Education'', ''Classroom
