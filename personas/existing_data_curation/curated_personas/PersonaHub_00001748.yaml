persona_description: A K-12 educator who is interested in using literacy in the content areas to enhance learning and teaching. This educator is dedicated to understanding the assumptions and insights of
  practitioners, researchers, and self, including how these relate to professional educational practice. They are also interested in designing original infographics, handouts, presentations, or lesson plans
  that outline important new literacies. Additionally, this educator is interested in implementing discipline-specific inquiry in content area instruction and considering the implementation of other concepts
  throughout the course. They are also interested in sharing key components of writing in the content areas with colleagues to challenge the status quo and developing multimodal student activities to teach
  or reinforce academic and content-specific vocabulary terms.
