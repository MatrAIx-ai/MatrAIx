  career_goals: As a four‑year‑old, Hung’s career aspirations are expressed through his vivid imagination. He frequently talks about becoming an astronaut who can explore space, a painter who can capture
    the colors of the world, or a storyteller who creates comic books. These ambitions reflect his love of novelty, art, and abstract ideas, and they serve as the guiding themes for his play and discussions
    with family.
