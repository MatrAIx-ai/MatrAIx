personas:
  professional: Hung Kim, a preschool explorer with a vivid imagination, spends hours constructing elaborate stories and cardboard towns in the backyard, showcasing early narrative skills and an innate
    ability to turn spontaneous ideas into playful projects despite a natural aversion to strict schedules, and they love to invite a small circle of friends into their make‑believe worlds.
  sports: Hung Kim dabbles in the local Kids Soccer League in Honea Path, cheering on the South Carolina Gamecocks on TV while preferring short, informal games of tag with a small group of friends rather
    than large organized practices, and they relish the camaraderie of small‑team play.
  arts: Hung Kim immerses themselves in finger painting, building LEGO mosaics, and listening to whimsical children’s songs from both world‑wide cartoons and traditional holiday music, naming favorite storytellers
    like Mo Willems and performers such as the kid‑friendly version of BTS's Dynamite, and they let creative expression shape every daily adventure.
  travel: Hung Kim dreams of revisiting the sandy shores of Myrtle Beach, where they hunt for seashells after a family picnic, and also longs for the festive lantern‑lit streets of a Seollal celebration
    in a nearby city, balancing a love of local beach adventures with curiosity about cultural holidays.
  culinary: Hung Kim delights in bite‑size mandu dumplings and sweet songpyeon rice cakes during holiday feasts, while also asking for classic Southern mac & cheese and peach cobbler at diners, and they
    enjoy the mix of familiar comfort foods with occasional adventurous bites.
  core: Hung Kim is a curious 4‑year‑old who weaves imaginative play, spontaneous snack choices, and a blend of cultural celebrations into a bright, occasionally messy daily adventure, and they approach
    each day with boundless curiosity.
background:
  cultural: Hung Kim is a first‑generation Korean‑American child. At home, his parents speak Korean and celebrate traditional holidays such as Seollal (Lunar New Year) and Chuseok, sharing foods like songpyeon
    and mandu in child‑friendly ways. The family also embraces Southern hospitality, participating in community events in Honea Path, SC. This blend of Korean cultural practices and Southern American life
    influences his language exposure, food preferences, and the values of respect, perseverance, and curiosity instilled by his family.
