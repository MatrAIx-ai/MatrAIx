personas:
  professional: Mamta Raman, a senior financial analyst at a Dallas‑based investment firm, blends rigorous financial modeling in Excel, VBA, and Python with a keen eye for ESG and fintech trends, leveraging
    strong negotiation and stakeholder communication skills to drive data‑driven decisions while thriving in a flexible, occasionally chaotic, work environment.
  sports: Mamta Raman hikes with the Dallas Trail Runners club around Lake Grapevine on weekends, follows the Dallas Cowboys and the Dallas Mavericks, and joins a co‑workers’ recreational soccer league,
    preferring a flexible schedule that blends social exercise with solo trail runs.
  arts: Mamta Raman enjoys dancing to Bollywood hits by Badshah and Shreya Ghoshal at community gatherings, streams contemporary fiction by Haruki Murakami and Chimamanda Ngozi Adichie, and listens to behavioral‑economics
    podcasts hosted by Dan Ariely, weaving these artistic influences into their weekend unwind rituals.
  travel: Mamta Raman favors spontaneous weekend getaways to Texas Hill Country wineries and Santa Fe’s art scene, while dreaming of a month‑long immersion in Bali’s wellness retreats and a culturally rich
    itinerary through Portugal’s historic towns, balancing travel costs with a modest family budget.
  culinary: Mamta Raman, an avid home chef, modernizes classic butter chicken by sous‑vide cooking the chicken and adding smoked paprika, experiments with sarson da saag infused with kale and a splash of
    coconut milk, and frequently incorporates fresh fenugreek leaves, ghee, and mango chutney into their dishes, while also enjoying a good steak and craft beer on occasional nights out.
  core: Mamta Raman is a data‑driven finance professional who balances a competitive edge and curiosity with a laid‑back, sometimes disorganized lifestyle, channeling that paradox into innovative ESG investing,
    yoga‑infused wellness, and spontaneous cultural adventures.
background:
  cultural: Mamta is a first‑generation Indian‑American of Punjabi Sikh heritage. She grew up in a household where Punjabi and Hindi were spoken, celebrating Diwali, Vaisakhi, and other cultural festivals
    with extended family. Her parents instilled a strong work ethic, respect for elders, and a sense of community service, which she continues through volunteer work at the local Gurdwara in Hurst. While
    fully integrated into Texan life—enjoying the regional cuisine, sports, and social scene—she maintains cultural ties through traditional dress for special occasions, regular visits to family in New
    Delhi, and a love for Punjabi music and dance. These dual influences shape her professional demeanor, emphasizing humility, perseverance, and a collaborative spirit within a competitive environment.
attributes:
  skills: '[''Financial modeling'', ''Valuation analysis'', ''Equity and fixed‑income research'', ''ESG and fintech investment analysis'', ''Data visualization (Tableau, Power BI)'', ''Python for data analysis'',
