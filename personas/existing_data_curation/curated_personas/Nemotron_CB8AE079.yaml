  hobbies: '[''Cooking Punjabi cuisine'', ''Yoga and meditation'', ''Community volunteering at the Gurdwara'', ''Exploring tech gadgets and finance apps'', ''Hiking and outdoor activities'', ''Reading fiction
    and business books'', ''Bollywood dance and music'']'
  career_goals: Mamta aims to move from senior financial analyst to a portfolio manager role within the next three to five years, eventually leading a boutique investment team focused on sustainable and
    technology‑driven assets. She wants to deepen her ESG expertise, obtain a CFA charter, and develop a reputation for delivering consistent outperformance while maintaining the flexibility needed to balance
    her family commitments. Long‑term, she envisions launching her own advisory practice serving high‑net‑worth clients who value data‑driven, ethically aligned investment strategies.
