  career_goals: Joy aims to advance into a supervisory role within the casino’s security department, such as Surveillance Team Lead, where she can shape policy, implement advanced analytics tools, and design
    a structured training program for new officers. Her competitive drive pushes her to meet performance benchmarks and earn recognition as a top surveillance officer. She plans to obtain the Certified
    Protection Professional (CPP) certification and is exploring a future transition to museum or gallery security, blending her love of art with her expertise in vigilance. Additionally, she hopes to create
    a community workshop series on personal safety and situational awareness, leveraging her educational background to give back to East Boston residents while maintaining a flexible work schedule.
