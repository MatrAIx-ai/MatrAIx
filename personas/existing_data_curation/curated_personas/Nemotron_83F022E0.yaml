personas:
  professional: An inventive logistics professional, Liah Payne blends their precise driving experience with a keen eye for aesthetics, using their hands‑on knowledge of van and truck maintenance to craft
    bespoke transport solutions for fragile artworks, while their natural empathy helps them build trust with gallery owners and negotiate routes that balance efficiency and delicate handling, despite a
    tendency to overlook paperwork deadlines.
  sports: A casually competitive fitness enthusiast, Liah Payne cycles through the Detroit Riverfront Trail with a local bike club, joins the Detroit Running Collective for weekend 5‑k runs, roots for the
    Detroit Lions on Sundays while occasionally playing pick‑up basketball at a community gym, but admits to skipping regular workouts when a long‑haul driving shift demands extra sleep.
  arts: A devoted visual and auditory creator, Liah Payne spends evenings sketching industrial Detroit silhouettes in watercolor while streaming Brian Eno’s ambient albums and Aphex Twin’s experimental
    tracks, attends monthly meet‑ups featuring local muralists like Dariusz Al‑Ghorab, and regularly draws inspiration from the surreal photography of Sandy Skoglund, yet occasionally neglects to finish
    an entire canvas because a new playlist distracts them.
  travel: A wander‑curious explorer, Liah Payne maps out spontaneous road trips to abandoned warehouses in Michigan’s Upper Peninsula and weekend getaways to Chicago’s art districts, already fond of a backpacking
    stint in Quebec’s Laurentian forests and a week in Berlin’s techno galleries, dreamingly plans a future pilgrimage to Kyoto’s Nishijin textile workshops, yet often postpones bookings due to fluctuating
    earnings from their delivery gigs.
  culinary: A modestly skilled home cook, Liah Payne delights in crafting lentil soup spiced with cumin and coriander, whipping up quick ramen bowls topped with soft‑boiled eggs, miso, and charcoal‑black
    garlic oil, and treats themselves to Detroit‑style pizza slices loaded with caramelized onions and fig jam when dining out, while their habit of snacking on energy bars at night sometimes interferes
    with balanced meals.
  core: Liah Payne is a dream‑driven driver‑artist who balances the open road with a quiet studio, favoring flexible plans, collaborative circles, and an ever‑present curiosity that fuels both creative
    projects and practical problem‑solving.
background:
  cultural: Liah grew up in Romulus, Michigan, within a white, working‑class family that traces its roots to German and Polish ancestors who settled in the Midwest generations ago. The Detroit‑area automotive
    culture is a familiar backdrop to her life, shaping her practical work ethic and familiarity with trucks and logistics. Midwestern values of modesty, community cooperation, and reliability are ingrained
    in her upbringing, while the vibrant local art scene—spanning gallery openings, street murals, and Motown musical heritage—has nurtured her love for novelty and creative expression. Seasonal county
    fairs, neighborhood block parties, and volunteer initiatives in Wayne County have reinforced her sense of harmony and collective responsibility.
