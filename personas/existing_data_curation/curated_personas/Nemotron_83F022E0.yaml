  hobbies: '[''Watercolor painting'', ''Sketching'', ''Analog photography'', ''Exploring abandoned industrial sites'', ''Reading speculative fiction'', ''Listening to ambient music'', ''Creative writing'',
    ''DIY crafting'', ''Participating in small art meet‑ups'', ''Volunteering at community shelters'']'
  career_goals: Liah aims to obtain a Class A commercial driver’s license within the next year so she can transition from local deliveries to long‑haul trucking, ideally specializing in the transport of
    artwork and fragile goods where her artistic sensibility adds value. She envisions launching a niche logistics service that partners with Detroit’s emerging art galleries and independent creators, offering
    safe, curated delivery and handling. In the longer term, she hopes to complete an associate’s degree in logistics or art management, allowing her to expand the business and perhaps mentor other young
    drivers who share her love for creativity and community harmony.
