personas:
  professional: Maria Alvarez, a 25‑year‑old bilingual arts administration aspirant, channels their curiosity and meticulous project‑planning skills into coordinating community‑focused museum exhibitions
    and educational workshops that weave local folklore with contemporary art.
  sports: Maria Alvarez, an avid weekend hiker, belongs to the Springdale Trail Runners Club, follows the Arkansas Razorbacks and St. Louis Cardinals, and balances trail treks with yoga sessions and occasional
    recreational soccer at the community center.
  arts: Maria Alvarez, a passionate acrylic painter and photographer, draws inspiration from Frida Kahlo’s bold colors, Annie Leibovitz’s portraiture, and the folk melodies of Lila Downs, frequently visits
    Crystal Bridges Museum and local galleries, and curates digital collages using Canva and Adobe Photoshop.
  travel: Maria Alvarez, a DIY travel planner, prefers off‑the‑beaten‑path road trips that blend Ozark hikes with cultural festivals in destinations like Guanajuato and Sedona, leveraging a travel‑rewards
    credit card to stretch a modest budget while dreaming of an art‑focused pilgrimage to Paris.
  culinary: Maria Alvarez, an enthusiastic home cook, perfects family‑style tamales, chiles rellenos, and quinoa‑avocado toast with chorizo, mixing traditional flavors with modern twists, and they regularly
    host potluck nights where the centerpiece is a creative fusion of classic and contemporary dishes.
  core: Maria Alvarez blends energetic creativity with methodical organization, obsessively arranging their spice rack while staying up late editing photos, yet often forgets to water the succulents perched
    on their windowsill.
background:
  cultural: Maria comes from a Mexican family that has retained strong ties to its cultural roots while adapting to life in Arkansas. She grew up speaking both Spanish and English, celebrating holidays
    such as Día de los Muertos and Cinco de Mayo with traditional foods, music, and community gatherings. Her upbringing emphasized family cohesion, respect for elders, and a deep appreciation for Mexican
    art, folklore, and Catholic traditions. Living in Springdale, she blends these cultural influences with the local Southern charm, participating in regional festivals and fostering cross‑cultural connections
    through her volunteer work and artistic pursuits.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Microsoft Office Suite'', ''Basic graphic design (Canva, Adobe Photoshop)'', ''Research and information gathering'', ''Event coordination'', ''Time management'',
