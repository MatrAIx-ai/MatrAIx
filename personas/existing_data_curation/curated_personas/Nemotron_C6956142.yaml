  hobbies: '[''Painting'', ''Visiting art galleries and museums'', ''Photography'', ''Cooking Mexican and fusion cuisine'', ''Hiking in the Ozarks'', ''Reading contemporary fiction'', ''Volunteering at
    community center'', ''DIY home‑decor projects'']'
  career_goals: Maria aspires to turn her passion for art and community engagement into a professional pathway. She plans to enroll in a community‑college program in art history, museum studies, or arts
    administration to build formal credentials. In the short term, she seeks internships or volunteer positions at local galleries, museums, or cultural nonprofits in the Springdale area, where she can
    apply her organizational talents to program planning and educational outreach. Her long‑term ambition is to secure a full‑time role in museum education or cultural programming, eventually leading a
    community arts center that designs inclusive events celebrating both regional and Mexican traditions.
