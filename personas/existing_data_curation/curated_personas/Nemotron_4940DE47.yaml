  career_goals: Pamela aims to open her own community-oriented bakery in Cleveland that serves as a gathering place and offers affordable, high-quality baked goods. She envisions expanding into a catered
    brunch service for local events and developing a series of hands‑on baking workshops for adults and youth, especially those from underserved neighborhoods. Long‑term, she hopes to become a certified
    master baker, publish a cookbook featuring Midwest-inspired recipes, and leverage her sociable nature to host a monthly bakery‑talk series that fosters local connections and mentorship.
