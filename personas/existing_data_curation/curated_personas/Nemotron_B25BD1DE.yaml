  hobbies: '[''Reading adventure and animal books'', ''Drawing and coloring'', ''Making friendship bracelets'', ''Collecting leaves, rocks, and insects'', ''Gardening with family'', ''Building LEGO sets'',
    ''Playing the recorder'', ''Soccer with friends'', ''Watching nature documentaries'']'
  career_goals: 'Sara dreams of working with animals and people, envisioning a future as a veterinarian or wildlife biologist who helps injured pets and protects local wildlife. She also imagines teaching
    younger children about nature, perhaps as a science teacher, combining her love for learning with a desire to give back to her community. Sara sets practical milestones: she wants to excel in school,
    join the school’s science club, volunteer at the nearby animal shelter when she’s old enough, and read more books about animals and ecosystems. She hopes her education will lead to a college degree
    in biology or environmental science, and eventually she aspires to own a small, sustainable farm where she can care for animals and practice eco‑friendly farming methods. Her goals balance curiosity
    about the natural world with a practical vision of a stable, purposeful career.'
