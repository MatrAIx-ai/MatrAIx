personas:
  professional: Amanda Masten, a high‑school senior with a knack for organizing school projects and a hands‑on talent for basic automotive maintenance, channels their competitive curiosity and love of structure
    into coordinating 4‑H events while mastering the practical skills needed for a future automotive‑tech certification.
  sports: Amanda Masten hits the nearby forest trails with the local Brewton Hiking Club in the spring, roots for the Alabama Crimson Tide in football and the Atlanta Braves in baseball, and spends weekends
    on the community softball field, maintaining a disciplined yet low‑key approach to fitness that balances solitary hikes with occasional team play, and they relish the structure of regular training.
  arts: Amanda Masten devotes evenings to unraveling twists in Gillian Flynn novels and binge‑watching escape‑room thrillers starring Florence Pugh, while their model‑airplane hobby draws inspiration from
    vintage aircraft sketches by Leonardo da Vinci, and playlists of Taylor Swift and The Eagles provide the soundtrack for late‑night journaling.
  travel: Amanda Masten prefers well‑planned road trips that combine scenic hikes with budget‑friendly stays, having already toured Nashville’s music scene and the Great Smoky Mountains, while dreaming
    of a cross‑country drive to Yellowstone and a cultural exchange visit to Edinburgh’s historic festivals, and they plan each itinerary down to the fuel budget.
  culinary: Amanda Masten enjoys cooking balanced meals like herb‑seasoned grilled chicken with quinoa and a garden‑fresh tomato‑basil salad, relishes perfecting a homemade chicken pot pie using locally
    sourced carrots and rosemary, and often trades recipes for spicy jambalaya with friends, though they sometimes over‑salt dishes when experimenting with new flavors.
  core: Amanda Masten is a methodical, competition‑driven teen who blends a love of structure with hands‑on hobbies, juggling meticulous budgeting, precise garden cycles, and a penchant for late‑night mystery
    novels while occasionally indulging impulsively in gaming and spice‑laden meals, and they thrive on turning plans into tangible results.
background:
  cultural: Amanda was raised in the rural community of Brewton, Alabama, within a predominantly white Southern cultural setting that values self‑reliance, family ties, and modest community involvement.
    Her family holds traditional Southern values, emphasizing hard work, respect for elders, and practical problem‑solving. Regular participation in local church activities, community gatherings, and 4‑H
    club events has reinforced a sense of belonging and responsibility. These cultural influences have shaped her pragmatic outlook, competitive spirit, and preference for structured, reliable environments.
attributes:
  skills: '[''Organizational planning'', ''Basic automotive maintenance'', ''Animal husbandry'', ''Cooking and meal planning'', ''Microsoft Office proficiency'', ''Time management'', ''Reliable communication'']'
  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Journaling'', ''Model airplane building'', ''4-H projects'', ''Hiking'', ''Competitive video gaming'']'
  career_goals: Amanda aims to build a stable, hands‑on career that leverages her practical strengths and competitive drive. In the next few years she plans to enroll in a vocational program—either automotive
    technology or agribusiness—at a community college near Brewton. She envisions obtaining certifications as an automotive technician or a farm equipment operator, eventually opening her own small service
    business that offers vehicle maintenance or agricultural equipment repair for local residents. Financial independence, a reputation for reliability, and the ability to manage a team in a structured
    environment are central to her long‑term ambitions.
