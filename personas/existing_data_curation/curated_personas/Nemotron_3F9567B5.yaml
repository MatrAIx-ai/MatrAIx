  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Pottery'', "Hand-loom weaving", ''Reading magical realism and postcolonial literature'', ''Cooking Guatemalan cuisine'', ''Yoga'',
    ''Journaling'', ''Rooftop gardening'', ''Participating in bilingual educator book club'', ''Volunteering as cultural center docent'']'
  career_goals: Looking ahead, Carmen aims to transition into a district‑wide curriculum coordination role where she can champion multilingual arts integration across Los Angeles schools. She plans to develop
    a structured program that incorporates Central American folk art and storytelling into elementary classrooms, securing grant funding to sustain it. Concurrently, she is pursuing a Master’s degree in
    Education with a concentration in counseling to better support students’ mental health. Carmen also aspires to author a series of children’s books that blend Guatemalan myths with contemporary themes,
    and to mentor emerging teachers through a peer‑coaching network that emphasizes culturally responsive practice. Ultimately, she hopes to leave a legacy of inclusive, creativity‑driven learning that
    honors her heritage while fostering resilience in her students.
