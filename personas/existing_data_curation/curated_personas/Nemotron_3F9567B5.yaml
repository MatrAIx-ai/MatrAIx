personas:
  professional: Carmen Sanes, a veteran elementary and middle‑school educator with over twenty years of experience, blends interdisciplinary curriculum design, bilingual instruction, and digital storytelling
    to nurture creative, culturally responsive classrooms while navigating intense emotional reactivity with a balanced blend of structure and flexibility.
  sports: Carmen Sanes, a low‑key fitness enthusiast, begins Saturday mornings with a gentle yoga flow at a neighborhood studio, joins a weekend hiking group exploring Griffith Park trails, and proudly
    cheers for the Los Angeles Dodgers and LA Galaxy, while rarely participating in competitive sports.
  arts: Carmen Sanes, an avid art devotee, frequents the Getty Center, sketches personal reinterpretations of works by Frida Kahlo, Diego Rivera, and Yayoi Kusama, and regularly engages in pottery circles,
    hand‑loom weaving workshops, and watercolor painting sessions that anchor their creative practice.
  travel: Carmen Sanes, an intentional traveler who balances careful planning with spontaneous curiosity, enjoys weekend escapes to the desert of Joshua Tree, has wandered the historic streets of Seville,
    and dreams of a cultural immersion retreat in Oaxaca, always aligning trips with grant schedules and school holidays.
  culinary: Carmen Sanes, a proficient home cook, routinely prepares aromatic dishes such as pepian, kak'ik, and tamales using roasted annatto, corn masa, and fresh herbs from their rooftop garden, delighting
    friends with labor‑intensive meals that fuse tradition with personal creativity.
  core: Carmen Sanes, a creatively driven yet anxiety‑prone educator, channels curiosity and cultural passions into art, food, and community, while juggling meticulous planning with moments of spontaneous
    self‑care.
background:
  cultural: Carmen was born to Guatemalan immigrant parents who settled in Los Angeles in the early 1970s. Growing up in a bilingual household, she learned Spanish at home while navigating an English‑dominant
    school system, giving her a nuanced perspective on cultural identity and language acquisition. Family traditions such as celebrating Día de la Independencia (15 September) with traditional foods, music,
    and storytelling have remained central to her life. She maintains close ties to the vibrant Guatemalan community in L.A.’s neighborhoods like Pico‑Union and Echo Park, frequently attending events at
    the Guatemalan Cultural Center where she helps organize workshops on folk art and oral history. These experiences inform her teaching, as she regularly incorporates Guatemalan myths, Mayan history,
    and contemporary Guatemalan literature into her lesson plans, fostering cross‑cultural understanding among her students. While she has never married, her extended family and community network provide
    a supportive social foundation that reinforces her cultural heritage.
