  hobbies: '[''Robotics club and competitions'', ''Math contests and puzzle solving'', ''Biking on prairie trails'', ''Sketching and landscape photography'', ''Reading mystery novels'', ''Playing acoustic
    guitar'', ''Volunteer work at county fair'', ''Coding small games in Scratch/Python'']'
  career_goals: Having discovered a passion for building things that work both efficiently and sustainably, Monica aims to attend a specialized STEM high‑school program and eventually earn a degree in civil
    or agricultural engineering. Her long‑term ambition is to design resilient water‑management systems and renewable energy solutions for rural communities like Holcomb, helping to modernize local farms
    while preserving the environment. She also dreams of participating in national engineering competitions and, one day, launching an agritech startup that equips small farmers with affordable technology.
