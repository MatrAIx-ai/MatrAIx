personas:
  professional: Monica Greenberg, an aspiring robotics enthusiast and budding problem‑solver, channels their competitive spirit and practical curiosity into designing, building, and programming robots for
    regional contests, while they apply meticulous organization and a skeptical eye to optimize performance.
  sports: Monica Greenberg enjoys weekend biking along prairie trails with the local Prairie Cyclists Club, occasionally joins the school’s cross‑country training sessions in the fall, and they root for
    the Midwest Wildcats football team, balancing a competitive drive with the solitude of endurance rides.
  arts: Monica Greenberg practices acoustic guitar inspired by John Mayer, sketches prairie landscapes in a style echoing Vincent van Gogh, captures wildflowers with a camera reminiscent of Ansel Adams’
    attention to detail, and they devour mystery novels by Agatha Christie, weaving all these artistic influences into a vibrant personal journal.
  travel: Monica Greenberg has taken family road trips to the Badlands National Park and the Grand Canyon, dreams of attending the International Robot Expo in Tokyo, and they favor meticulously planned
    itineraries that allocate ample time for nature photography while staying within a modest family budget.
  culinary: Monica Greenberg enjoys cooking spaghetti with homemade marinara sauce, assembles trail mix featuring almonds, dried cranberries, and chocolate chips for snack breaks, often munches grilled
    cheese while debugging code, and they indulge in late‑night pizza rolls that sometimes leave greasy fingerprints on their guitar strings.
  core: Monica Greenberg is a competitively curious 13‑year‑old who fuses robotics, nature photography, and acoustic guitar into a pragmatic yet imaginative worldview, and they manage money with strategic
    thrift, monitor health with tech‑savvy vigilance, and balance solitary coding marathons with community volunteering.
background:
  cultural: Monica was born and raised in Holcomb, Kansas, a tight‑knit farming town in the American Midwest. Her family traces its ancestry to German and Irish immigrants who settled the plains in the
    early 1900s. The community’s rhythm centers on school events, high‑school sports, the annual Scott County Fair, church gatherings, and patriotic celebrations like Independence Day. Growing up, Monica
    attended the local Methodist church, where service and modesty were emphasized. The agricultural setting has exposed her to the cycles of planting and harvest, as well as to the diverse labor force—including
    Hispanic farm workers—that shapes regional culture. These influences foster a strong work ethic, a sense of self‑reliance, and an appreciation for community cooperation, while also encouraging her curiosity
    about broader scientific and engineering fields.
