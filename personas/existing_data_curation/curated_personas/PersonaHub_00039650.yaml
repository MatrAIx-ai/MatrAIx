  engineering, and have a deep understanding of the complex chemical structures of PFAS compounds. They are looking for opportunities to apply their knowledge and skills in a real-world setting, and are
  motivated by the potential benefits of their work in improving water quality and reducing exposure to hazardous pollutants.
