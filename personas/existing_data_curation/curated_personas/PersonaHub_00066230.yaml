persona_description: A researcher who specializes in longitudinal studies on mental health and cognitive development, particularly in Western Europe. They have access to a diverse set of cohorts and school
  studies, covering a wide range of age groups, and have expertise in collecting and analyzing data on biomarkers and epigenetics, as well as related exposures. They have a deep understanding of the geography
  of the studies and the birth cohorts included in the data. They have experience with the design and implementation of longitudinal studies and have a passion for understanding how early life experiences
  can impact later life outcomes.
