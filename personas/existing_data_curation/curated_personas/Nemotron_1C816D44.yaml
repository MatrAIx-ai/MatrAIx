personas:
  professional: Jonathan Jacome is a budding junior programmer and LEGO architect who channels their methodical, structure‑loving mindset into building intricate digital worlds in Scratch and constructing
    detailed LEGO cityscapes, reliably following step‑by‑step guides while quietly troubleshooting bugs when they arise.
  sports: Jonathan Jacome enjoys playing midfield for the Riverside Rangers youth soccer club and follows the Chicago Cubs and Los Angeles Lakers, approaching fitness with a structured after‑school routine
    that mixes soccer drills, chess‑style strategic warm‑ups, and weekend bike rides through the nearby woods.
  arts: Jonathan Jacome immerses themselves in science‑fiction and fantasy realms, favoring authors like Brandon Sanderson and Leigh Bardugo, while they also curate LEGO‑inspired artwork, listen to the
    sweeping scores of John Williams and Hans Zimmer, and occasionally sketch scenes from their favorite books in their journal.
  travel: Jonathan Jacome prefers meticulously planned, low‑key trips with a parent or sibling, having explored the nearby Pinewood State Park and dreaming of a family pilgrimage to the Space Center Houston
    and a future visit to Kyoto's bamboo forest.
  culinary: Jonathan Jacome enjoys the comfort of classic mac and cheese and homemade pepperoni pizza, often adding generous shreds of cheddar, sliced tomatoes, and a dash of oregano, while their kitchen
    skill hovers at the level of mixing batter and assembling simple sandwiches.
  core: Jonathan Jacome is a methodical, introverted 12‑year‑old whose love for building worlds—both brick‑by‑brick and digital—coexists with an anxious heart that seeks solace in puzzles, journaling, and
    carefully structured routines.
background:
  cultural: Jonathan comes from a middle‑class New England family of predominantly Anglo‑American ancestry, rooted in Connecticut’s Litchfield County. His parents work in the education and healthcare sectors,
    and the household values reliability, modesty, and self‑sufficiency. The community emphasizes academic achievement, seasonal traditions such as apple picking, sledding, and town fairs, and a quiet,
    privacy‑respecting social atmosphere. These cultural influences foster his preference for structure, his methodical nature, and his reserved demeanor, while also encouraging a supportive environment
    for his educational pursuits.
