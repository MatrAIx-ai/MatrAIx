  career_goals: Jonathan dreams of a future where he can design and build functional structures, aiming for a career in civil engineering or architecture where his love of order and detail can thrive. He
    also enjoys creating things on the computer and envisions becoming a software developer who builds tools that help people stay organized. In the short term, he hopes to attend a high school with strong
    STEM programs, earn good grades, and eventually study engineering at a university, while also learning how to manage his anxiety and help others who feel similar distress.
