  hobbies: '[''Book club'', ''Community theater volunteering'', ''Cooking and hosting dinner parties'', ''Gardening'', ''Hiking'', ''Cycling'', ''DIY home improvement'', ''Volunteering at food bank'']'
  career_goals: Letty aims to advance from first‑line supervisor to plant manager within the next five years, focusing on driving operational excellence and a safety‑first culture. She plans to earn a Six
    Sigma Black Belt and complete a master’s degree in operations management to deepen her strategic capabilities. Long‑term, she envisions leading a multi‑site manufacturing network or consulting for midsize
    firms on lean transformation, while also mentoring the next generation of production leaders.
