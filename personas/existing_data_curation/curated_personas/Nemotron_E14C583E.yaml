personas:
  professional: Rachel Kirkpatrick fuses fifteen years of elementary and middle‑school teaching expertise with a passion for arts integration and educational technology, designing inquiry‑based STEAM curricula
    that weave literacy, math, and watercolor projects, while mentoring new teachers, running PD workshops, and championing equitable, community‑centered learning environments—all with a curious, organized,
    and compassionate mindset.
  sports: Rachel Kirkpatrick conquers the Snake River Canyon trails with a local hiking club on Saturdays, squeezes in weekly yoga sessions, and avidly supports the Boise State Broncos football team and
    the Idaho Falls Chukars minor‑league baseball squad, embodying a community‑oriented, active lifestyle.
  arts: Rachel Kirkpatrick channels artistic curiosity into watercolor landscapes inspired by Monet and fellow Idaho painter Sarah Jensen, volunteers as a stagehand for community‑theater productions starring
    local actor John Gallagher, and curates monthly gallery outings to view emerging creator Maya Ruiz’s mixed‑media work, weaving visual and performing arts into their daily rhythm.
  travel: Rachel Kirkpatrick balances family commitments with a love for adventure by weekend road‑tripping to Yellowstone and Glacier National Parks and planning an annual Mediterranean getaway to places
    like Santorini and Barcelona for culinary immersion, all while budgeting trips to fit a modest discretionary spend.
  culinary: Rachel Kirkpatrick delights in Mediterranean cuisine, regularly preparing grilled sardines with preserved lemon, chickpea‑tomato stew, and homemade tzatziki alongside garden‑fresh heirloom tomatoes
    and zucchini, and shares creative potluck dishes such as quinoa‑tabbouleh salads, reflecting a moderate cooking skill boosted by a passion for exploring global flavors.
  core: Rachel Kirkpatrick is a community‑driven educator whose curiosity fuels a kaleidoscope of outdoor hikes, watercolor painting, potluck organization, and ambitious career aspirations, all balanced
    by a modest financial plan, a habit of over‑packing for weekend trips, and a tendency to postpone dentist appointments when lesson planning intensifies.
background:
  cultural: Rachel grew up in a small‑town setting in the intermountain West, where community bonds, self‑reliance, and a close connection to the natural landscape are core values. Her family traditions
    blend Midwestern work ethic with the outdoors‑centric lifestyle of Idaho, emphasizing participation in local events, school functions, and volunteer service. While identifying as white American, she
    is culturally attuned to the region’s appreciation for frontier heritage, seasonal celebrations, and the emphasis on education as a pathway to community improvement. This background informs her inclusive
    teaching philosophy and her commitment to nurturing collaborative, harmonious environments both inside and outside the classroom.
