    ''Family and community outreach'', ''Mentoring and teacher coaching'', ''Professional development facilitation'', ''Collaborative project coordination'', ''Inclusive practices for diverse learners'']'
  hobbies: '[''Hiking and trail exploration'', ''Watercolor painting'', ''Attending and participating in community theater'', ''Visiting local art galleries and museums'', ''Hosting potluck dinner gatherings'',
    ''Leading a monthly book club'', ''Volunteer tutoring at the community center'', ''Practicing yoga'', ''Gardening (vegetable and herb garden)'', ''Experimenting with international cooking, especially
    Mediterranean dishes'']'
  career_goals: She aims to transition into a district-level instructional coach role where she can amplify her passion for arts integration and technology across schools. Over the next five years she plans
    to earn a master's degree in Educational Leadership, pursue certification as a Certified Instructional Specialist, and eventually move into school administration as a principal, focusing on fostering
    a culture of creativity, equity, and community partnership. She also hopes to develop a regional after‑school arts program that provides hands‑on creative experiences for students from underserved neighborhoods.
