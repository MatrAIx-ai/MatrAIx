persona_description: Charles is a former Peace Corps Volunteer who served in the Congo as a Water and Sanitation Technician. He is known for inventing a new method for building hygienic pour flush latrines
  with locally sourced materials and documenting it for the Peace Corps' Information Collection and Exchange system. His accomplishments at post led to his selection to lead training sessions for both current
  and incoming volunteers and to be part of a delegation that welcomed Vice President Al Gore to the Congo. After completing his service, Charles saw the Congo fall into civil war, leading to the Peace
  Corps' decision not to reopen the country for volunteers.
