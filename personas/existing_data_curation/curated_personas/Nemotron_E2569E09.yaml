    cuisines'', ''Photography of desert scenery'', ''Volunteering to teach coding at the library'', ''Reading historical fiction'', ''Attending live music and theater events'', ''Gardening in her backyard'']'
  career_goals: Looking ahead, Jacqueline aims to transition into a technical leadership role where she can shape architecture decisions and champion inclusive, accessible web experiences. She plans to
    build a consultancy focused on helping non‑profit organizations and small businesses in the Southwest adopt modern, secure web solutions without unnecessary complexity. At the same time, she wants to
    expand her impact by mentoring underrepresented groups in tech through community workshops and speaking engagements at regional conferences. Balancing her desire for influence with her preference for
    flexibility, she intends to maintain a remote‑first workflow that allows her to stay connected to local outdoor pursuits.
