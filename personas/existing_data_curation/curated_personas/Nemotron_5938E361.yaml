personas:
  professional: Linda Wilder, a curious three‑year‑old who loves building block projects, naturally takes on the role of class helper in preschool, organizing snack time and cleaning up toys with a blend
    of practicality and imagination that hints at future leadership skills.
  sports: Linda Wilder, a energetic participant in the local Kids' Soccer Club, cheers for the hometown Tigers baseball team during family outings, and enjoys weekly tumble‑time classes at the community
    gymnastics center, balancing structured practice with spontaneous playground games.
  arts: Linda Wilder, an enthusiastic fan of finger painting and the melodic tunes of The Wiggles, attends storytime at the neighborhood library featuring authors like Mo Willems, and delights in watching
    Pixar’s "Finding Nemo" while humming along with characters such as Dory.
  travel: Linda Wilder, a little explorer who loves short road trips to the family cabin in the mountains and annual visits to the sunny beach resort, dreams of seeing the Grand Canyon someday, and prefers
    traveling with a favorite stuffed bunny for comfort.
  culinary: Linda Wilder, a picky yet adventurous eater who adores macaroni and cheese, dinosaur‑shaped chicken nuggets, and banana‑strawberry smoothies, often helps stir batter with a wooden spoon and
    insists on having peas on the side of every meal.
  core: Linda Wilder, a bright and socially‑savvy three‑year‑old who balances curiosity with practicality, loves organizing playtime, saves shiny coins, manages a mild eczema flare‑up, and constantly seeks
    new adventures with a trusty stuffed bunny.
background:
  cultural: Linda is raised in a White, middle‑class family in Matthews, a suburban community in Union County, North Carolina. Her upbringing reflects Southern cultural traditions, including regular church
