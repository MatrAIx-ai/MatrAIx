  career_goals: Looking ahead, Diosvany aims to move into a regional sales director role where he can shape broader market strategies and champion sustainable manufacturing solutions. He is passionate about
    mentoring the next generation of sales talent, leveraging his calm resilience to build a supportive culture. Over the next five years, he plans to lead cross‑functional initiatives that integrate engineering
    insights with sales tactics, expanding the company's portfolio into eco‑friendly product lines. Ultimately, as he approaches retirement, he envisions launching a consulting practice to help small manufacturers
    adopt modern sales processes while staying rooted in community engagement.
