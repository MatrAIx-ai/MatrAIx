personas:
  professional: Richard Sutton is a veteran software developer with three decades of experience building large‑scale enterprise systems, proficient in Python, Java, C++, and C#, who blends a curiosity for
    emerging technologies with a pragmatic focus on maintainable architecture, and leverages their relaxed, flexible approach to mentor junior developers while assertively championing code quality.
  sports: Richard Sutton enjoys weekend hikes around Madison’s lakes, frequently joins the local Madison Hiking Club for sunrise treks, follows the Wisconsin Badgers football, the Milwaukee Brewers baseball,
    and the Milwaukee Bucks basketball teams, participates in a casual adult soccer league at the Madison Sports Complex, and balances low‑impact strength training with yoga to keep their joints healthy,
    reflecting a relaxed yet consistent fitness routine.
  arts: Richard Sutton unwinds by reading classic science‑fiction works by Isaac Asimov and Arthur C. Clarke, listening to Pink Floyd and Radiohead while woodworking, attending occasional performances at
    the Overture Center featuring the Wisconsin Philharmonic, and collecting vintage computer art prints, reflecting a deep appreciation for both retro tech culture and timeless creative expression.
  travel: Richard Sutton prefers low‑key, thoughtfully planned trips that blend tech curiosity with nature, having explored Seattle’s tech scene, hiked the Columbia River Gorge, visited historic computer
    museums in Boston and Tokyo, and dreaming of an Aurora‑focused winter adventure in Tromsø, Norway, all while budgeting carefully to accommodate their modest retirement savings.
  culinary: Richard Sutton enjoys cooking hearty, seasonal meals such as rosemary‑infused roasted chicken, homemade mushroom risotto, and occasional fish tacos with fresh‑caught lake trout, boasting an
    intermediate skill level in the kitchen, and frequents Madison’s farmers’ market for locally sourced cheese curds, heirloom tomatoes, and fresh herbs, while indulging in occasional gourmet coffee at
    a quiet café.
  core: Richard Sutton is a curious, retired‑at‑heart software artisan who spends evenings tinkering with Raspberry Pi gadgets, building handcrafted furniture, and solving chess puzzles, all while maintaining
    a laid‑back schedule that lets them savor solitary pursuits and occasional vintage‑computer meetups.
background:
  cultural: Richard grew up in a middle‑class Midwestern family in the 1960s and 1970s, absorbing the pragmatic, community‑oriented values typical of the region. He earned his STEM degree at the University
    of Wisconsin‑Madison, where the campus’s progressive academic atmosphere reinforced his appreciation for both innovative ideas and proven methodologies. Living in Madison, he participates in the city’s
    blend of liberal civic engagement, love of the outdoors, and strong emphasis on education. His cultural identity reflects mainstream American customs—celebrating holidays like Thanksgiving and the Fourth
    of July—while also honoring his European ancestry (German and Irish roots) through occasional family recipes and folk music. The experience of being widowed has deepened his empathy and supported his
    involvement in small‑scale community service, shaping a worldview that balances individual independence with a sense of social responsibility.
