personas:
  professional: Lay Liang, a budding young coder, crafts interactive stories and simple games in Scratch, applying their methodical planning and competitive mindset from chess to debug and iterate quickly,
    while their curiosity and practicality guide them to blend imaginative narratives with functional code.
  sports: Lay Liang, a member of the local Junior Soccer club "Eagle FC" and a diligent hiker with the school’s Nature Explorers group, competes fiercely on the soccer field while also trekking state park
    trails in autumn, and proudly roots for the professional baseball team the Springfield Sox, showing a balanced competitive and exploratory fitness ethos.
  arts: Lay Liang, an enthusiastic piano student, practices Beethoven’s “Für Elise” and modern pieces like Yiruma’s “River Flows in You”, builds intricate LEGO cityscapes inspired by sci‑fi novels, devours
    stories by Neil Gaiman and Isaac Asimov, and idolizes composer Hans Zimmer and author Arthur C. Clarke, letting these influences shape their imaginative play.
  travel: Lay Liang, a methodical family traveler, loves mapping out road trips to destinations such as Yellowstone National Park and the seaside town of Carmel‑by‑the‑Sea, alternating between adventurous
    hikes to discover hidden rock formations and relaxed beach picnics where they sketch shells, all while respecting the modest budget set by their parents.
  culinary: Lay Liang, a junior baker, enjoys whipping up chocolate chip cookies and simple vanilla cupcakes, meticulously measuring flour, brown sugar, and vanilla extract, often adding extra chocolate
    chips when no one watches, and proudly serves their creations at family gatherings and school bake‑sale fundraisers.
  core: Lay Liang, the methodical nine‑year‑old, fuses relentless curiosity for building and coding with disciplined, competitive drive, turning every LEGO set, piano practice, and pocket‑money ledger into
    a mini‑project of precision and imagination.
background:
  cultural: Lay comes from an East Asian family of Chinese heritage. At home, Mandarin is spoken alongside English, and traditions such as Lunar New Year, moon‑cake making, and a strong emphasis on education
    shape her daily life. Growing up in Hempstead, Texas, she blends these cultural influences with Southern community values, participating in local events while maintaining connections to her heritage
    through language classes, cultural celebrations, and family gatherings.
