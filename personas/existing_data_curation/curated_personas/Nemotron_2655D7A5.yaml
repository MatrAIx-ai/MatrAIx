  career_goals: Rhonda aspires to transition into a role that merges her operational expertise with her passion for the arts, such as directing a community arts center or spearheading cultural tourism initiatives
    across Southeast Alaska. She plans to enroll in an associate program in arts administration to formalize her knowledge, with the long‑term goal of becoming a regional director overseeing multiple venues
    that showcase local artists and promote sustainable, innovative visitor experiences. Additionally, she dreams of opening a boutique that curates handcrafted Alaskan goods, providing a platform for emerging
    creators while applying her managerial acumen to a personal venture.
