personas:
  professional: Rhonda Shelton is a tourism and retail operations manager in Southeast Alaska who leverages her imaginative flair and flexible planning style to design innovative community events, while
    her strong leadership, clear communication, and conflict‑resolution skills keep her teams adaptive despite occasional disorganization and a laid‑back approach to deadlines.
  sports: Rhonda Shelton fuels her fitness through weekend hikes with the Juneau Trail Runners, kayak expeditions with the Inside Passage Kayak Club, and occasional ice‑hockey games cheering for the Juneau
    Ice Lions, preferring low‑key, nature‑based activity over structured gym routines while maintaining a casual membership at the local community recreation center.
  arts: Rhonda Shelton immerses herself in the Alaskan arts scene by painting aurora‑lit glacier vistas in the style of Monet, photographing with a Leica M10 inspired by Ansel Adams, writing speculative
    short stories that echo the narrative twists of Ted Chiang, and attending the Juneau Arts & Crafts Festival where she admires local weavers and the acoustic sets of singer‑songwriter Neko Case.
  travel: Rhonda Shelton plans her travel with a spontaneous yet purpose‑driven mindset, favoring adventures that combine artistic inspiration and wilderness, such as the midnight aurora tours in Iceland,
    the art museums of Florence, and a road trip along the Pacific Coast Highway that ends with a weekend retreat to a secluded cabin in the Alaska Range, while balancing her boutique startup budget and
    family ties.
  culinary: Rhonda Shelton enjoys experimenting in the kitchen with regional ingredients like wild salmon, cedar‑plank‑smoked halibut, fiddlehead ferns, and locally foraged berries, crafting dishes such
    as salmon ramen with miso broth and blackberry sage glaze, but her cooking skill sits at an enthusiastic home‑chef level, often improvising recipes while occasionally over‑salting due to her penchant
    for bold flavors.
  core: Rhonda Shelton is an imaginative, slightly disorganized tourism manager who balances a love for Alaskan art, nature, and impromptu adventures with a quirky habit of sketching meeting notes in watercolor.
background:
  cultural: Rhonda is a White American whose family roots are in the Midwest, where she grew up before moving to Juneau in her early twenties. Her upbringing fostered a pragmatic work ethic and a strong
    sense of community, which she blends with the coastal Alaskan lifestyle she now embraces. Living in Juneau has deepened her appreciation for the region's natural beauty and its Tlingit heritage; she
    actively supports local indigenous arts through volunteer work and incorporates elements of that cultural richness into her personal and professional projects. While she identifies culturally as mainstream
    American, her daily life reflects a synthesis of Midwestern values, Alaskan outdoor culture, and a respectful engagement with the diverse traditions of her home borough.
