  hobbies: '["gardening", "knitting", "crocheting", "reading historical biographies", "reading mystery novels", "crossword puzzles", "birdwatching", "genealogy research", "cooking Indian dishes", "journaling"]'
  career_goals: Even though she is retired, Annette aims to leave a lasting personal legacy. She hopes to document her family’s genealogy for future generations, volunteer as a mentor for other seniors
    at the local community center, and write a memoir that captures life in Springfield and the town’s evolving history. She also aspires to continue learning new crafts and occasionally teach small workshops,
    while maintaining her health and independence.
