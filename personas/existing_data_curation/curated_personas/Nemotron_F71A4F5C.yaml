  hobbies: '[''Gardening'', ''Quilting'', ''Knitting and crocheting'', ''Reading (historical fiction, genealogy)'', ''Church choir and potluck participation'', ''Walking and bird‑watching'', ''Cooking traditional
    recipes'', ''Bridge and card games'', ''Volunteering at food pantry'', ''Listening to classic country and folk music'']'
  career_goals: Although retired, Alexandra remains driven by a desire to leave a lasting, positive impact on her community and family. She aims to compile a comprehensive family genealogy and memoir that
    honors her late husband and ancestors, preserving stories for future generations. She hopes to expand the senior‑center gardening club she founded, teaching sustainable gardening techniques to both
    seniors and schoolchildren. Alexandra aspires to mentor younger volunteers, sharing her organizational expertise and compassionate approach. Maintaining her health and mental well‑being is also a priority,
    as she plans to attend regular wellness workshops and practice stress‑relief activities such as prayer and gentle stretching. Ultimately, she seeks to ensure that the values of community service, humility,
    and practical knowledge continue to thrive in Du Quoin.
