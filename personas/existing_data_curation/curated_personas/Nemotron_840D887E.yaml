  hobbies: '[''sketching and drawing'', ''digital photo editing and visual storytelling'', ''reading graphic novels and fantasy literature'', ''creative writing (bilingual stories)'', ''cooking traditional
    Mexican meals with family'', ''participating in after‑school art club projects'', ''creating community murals'', ''listening to indie pop, lo‑fi, and regional Mexican music'', ''DIY crafts (friendship
    bracelets, knitting)'', ''nature walks and landscape sketching'']'
  career_goals: Samantha envisions a future where she can blend her love for visual storytelling with her Mexican heritage. She hopes to earn a scholarship to a specialized high‑school art program, later
    studying graphic design or illustration at a university where she can create culturally resonant artwork. Long‑term, she dreams of working as a freelance illustrator for children’s books that celebrate
    Latino stories, or as a museum educator curating exhibits that highlight Mexican‑American contributions. She also aspires to develop her organizational skills so she can manage collaborative art projects
    and possibly launch an online platform where peers share their creations and cultural narratives.
