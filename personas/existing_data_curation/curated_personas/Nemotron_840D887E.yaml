personas:
  professional: Samantha Narvaez is an aspiring visual storyteller who blends sketching, photography, and bilingual narratives into indie comic strips, channeling their curious, open‑minded nature and relaxed
    attitude toward deadlines into experimental mixed‑media projects.
  sports: Samantha Narvaez enjoys casual weekend hikes through the nearby countryside and plays on a middle‑school co‑ed soccer team, cheerfully rooting for the local high school football squad and the
    Los Angeles Lakers while preferring low‑key movement over intense training regimens.
  arts: Samantha Narvaez spends hours in their sketchbook emulating the line work of Shaun Tan, the dreamy palettes of Hayao Miyazaki, and the bold street murals of Banksy, while listening to indie pop
    singer Clairo, lo‑fi producer Chillhop Music, and regional Mexican vocalist Natalia Lafourcade, weaving these influences into fresh visual stories.
  travel: Samantha Narvaez crafts low‑budget weekend trips, favoring spontaneous day‑long hikes in the surrounding hills and occasional family visits to the historic coastal town of San Juan, while dreaming
    of exploring the bustling markets of Marrakech and the ancient ruins of Machu Picchu.
  culinary: Samantha Narvaez helps their grandmother prepare cherished family stews seasoned with cumin, corn tortillas, and roasted peppers, and experiments at home with sushi rolls and chocolate‑chip
    cookies, favoring fresh ingredients like avocados, cilantro, and dark chocolate.
  core: Samantha Narvaez is a curious, art‑obsessed teen who juggles sketchbooks, mixtapes, and half‑finished plans, often forgetting deadlines but always discovering a fresh color palette in a moment of
    daydream.
background:
  cultural: Samantha is a second‑generation Mexican‑American raised in San Antonio and the surrounding rural community of Atascosa County. Her household is bilingual, speaking Spanish at home and English
    at school, which gives her a fluid command of both languages. Family traditions such as Día de los Muertos altars, quinceañera celebrations, and weekly tamale nights are central to her identity. She
    grew up attending local festivals that showcase mariachi music, folklorico dance, and Tex‑Mex cuisine, blending urban and rural Mexican cultural elements. Catholic holidays and strong family ties shape
    her values of community and respect. The blend of San Antonio’s vibrant Hispanic art scene with the close‑knit, agrarian lifestyle of Atascosa County informs her appreciation for both contemporary and
    traditional artistic expressions.
