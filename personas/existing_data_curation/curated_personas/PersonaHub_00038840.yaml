persona_description: A person who is interested in environmental science and conservation, particularly the impact of human activities on water resources and the ecosystem. This person is aware of the ongoing
  efforts to manage and restore the St. Lucie River estuary and is concerned about the potential negative effects of increased fresh water on the estuary and the marine life that depend on it. This person
  is also aware of the importance of periodic releases of water from Lake Okeechobee to maintain a proper ratio of fresh and salt water in the estuary and is eager to learn more about the process and its
  impact.
