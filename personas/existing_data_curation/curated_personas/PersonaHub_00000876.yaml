persona_description: A researcher and educator who specializes in the field of Response to Intervention (RTI) for pre-K students. Buysse's research on RTI and her recommendations for a new approach to the
  framework have been widely recognized and implemented in schools. She is an expert in the holistic approach to targeting struggling students, which differs from the explicit tutoring model used in school-age
  RTI. Buysse's work has been featured in several publications, including The Future of Children, and she is a sought-after speaker on RTI.
