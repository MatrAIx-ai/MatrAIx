  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading literature and philosophy'', ''Poetry writing'', ''Gardening'', ''Bird-watching'', ''Walking nature trails'', ''Visiting art galleries and
    museum talks'', ''Listening to classical music and jazz'', ''Participating in senior-center art clubs'']'
  career_goals: Irene aspires to create a lasting legacy through her art and writing. She hopes to complete a portfolio of watercolors and collages for a community exhibition at the Montgomery Cultural
    Center, and to self‑publish a small collection of poems and memoir excerpts that capture her Midwestern upbringing. She also wishes to mentor younger volunteers in the senior‑center art program, introducing
    them to creative techniques and the value of listening. Maintaining cognitive health is a priority, so she plans to continue learning new digital tools and to practice mindfulness to manage her worry.
    Additionally, she hopes to establish a modest scholarship for a local high‑school student interested in visual arts.
