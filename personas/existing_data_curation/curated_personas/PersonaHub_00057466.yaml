persona_description: A Calgary-based renewable energy consultant who is passionate about the potential of wind and solar energy in reducing carbon emissions and saving money for municipalities. Hirji is
  knowledgeable about Alberta's municipal solar program and is advocating for increased funding and a cap on the amount of funding that can be provided for municipal solar projects. He is also interested
  in the potential for Calgary to invest in electric buses and garbage trucks, which could help reduce the city's carbon footprint. Hirji's work is informed by his experience with renewable energy projects
  in Tabor and Kennel Hills wind farms and his desire to see the city of Calgary take the lead in renewable energy adoption.
