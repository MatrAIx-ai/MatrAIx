personas:
  professional: Nereida Lopez is a seasoned painter and muralist who blends practical contracting skills with a keen artistic eye, translating client visions into vibrant spaces while navigating their studio’s
    loose schedule with a relaxed, collaborative approach.
  sports: Nereida Lopez enjoys weekend hikes through the island’s mountains with the local Mountain Walkers club, follows the Caguas FC soccer team and the regional basketball squad Los Titanes, and practices
    yoga twice a week to balance the physical demands of painting.
  arts: Nereida Lopez immerses themselves in the visual arts, drawing inspiration from Frida Kahlo’s intimate portraits, Diego Rivera’s murals, and the contemporary installations of Ana Teresa Fernandez,
    while they dance to the salsa rhythms of Celia Cruz and the bomba beats of local percussionists during intimate gatherings.
  travel: Nereida Lopez prefers low‑key, culturally rich trips, having explored the historic streets of Old San Juan and trekked Monteverde Cloud Forest in Costa Rica, while they dream of strolling Barcelona’s
    Gothic Quarter and usually plan journeys spontaneously around their workshop schedule.
  culinary: Nereida Lopez delights in cooking traditional island dishes such as arroz con gandules, mofongo stuffed with pork, and plantain‑based empanadillas, seasoning them with adobo, sofrito, and achiote,
    while they also experiment with Mediterranean lamb stew and fresh ceviche.
  core: Nereida Lopez blends a relaxed, compassionate nature with an artistic curiosity, turning everyday surfaces into colorful stories despite a habit of loosely organized schedules.
background:
  cultural: Nereida is deeply rooted in the vibrant culture of Puerto Rico, having grown up in Caguas, a city that blends urban life with rich natural scenery. Her heritage reflects Spanish colonial, Taíno,
    and African influences that shape the island’s language, music, food, and visual arts. She speaks Spanish as her first language and identifies with communal values such as familia, respeto, and solidaridad.
    The island’s mural tradition, lively festivals like the Fiesta de la Candelaria, and the rhythmic beats of bomba, plena, and salsa inform both her artistic style and her compassionate approach to collaboration
    within the community.
