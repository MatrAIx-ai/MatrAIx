  hobbies: '[''Acrylic painting'', ''Sketching'', ''Mural creation'', ''Visiting art galleries'', ''Reading art history'', ''Gardening'', ''Cooking Puerto Rican cuisine'', ''Hiking in the mountains'', ''Listening
    to salsa and bomba music'', ''Participating in small community art workshops'']'
  career_goals: Nereida aspires to evolve from contractor work to founding her own boutique studio that merges functional painting services with artistic mural commissions. She aims to secure larger commercial
    contracts, develop a portfolio of public art installations throughout Caguas and neighboring municipalities, and eventually offer community workshops that teach painting techniques and nurture creative
    expression among local youth. Long‑term, she hopes to be recognized as a leading local muralist who enriches public spaces while championing cooperative, sustainable work practices.
