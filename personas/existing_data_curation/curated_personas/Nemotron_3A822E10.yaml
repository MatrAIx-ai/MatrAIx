personas:
  professional: Adam Phelps, a retired handyman turned community mentor, blends their carpentry, small‑engine repair, and gardening expertise with a relaxed, curiosity‑driven approach to lead hands‑on workshops
    at the local center, often juggling schedules haphazardly but inspiring participants with practical ingenuity.
  sports: Adam Phelps, an avid bowler in the River Valley Rangers league and a regular member of the town’s seasonal hunting club, enjoys fishing at Lake of the Ozarks, follows the Chicago Cubs and Green
    Bay Packers loyally, and frequently volunteers as a scorekeeper for the local high school basketball team, the Springfield Eagles, where they relish the camaraderie of the game.
  arts: Adam Phelps, a devoted fan of classic folk and country, regularly listens to Johnny Cash, Willie Nelson, and the Nitty Gritty Dirt Band while restoring vintage radios, attends community theater
    productions of 'Our Town', and reads historical nonfiction by David McCullough, which fuels their appreciation for storytelling and craftsmanship, and they often share insights about these works during
    church gatherings.
  travel: Adam Phelps, a nostalgic road‑tripper, enjoys annual fishing trips to Lake of the Ozarks, has taken a memorable family vacation to Yellowstone National Park, and dreams of a guided hunting expedition
    in the Scottish Highlands, yet they prefer low‑stress planning and often book trips through senior discount travel clubs.
  culinary: Adam Phelps, a home‑cooking enthusiast, favors hearty meals like pan‑seared catfish with lemon butter, corn chowder made from garden‑fresh corn, and a classic apple‑cinnamon crumble, often incorporating
    garden tomatoes, basil, and zucchini into sauces while occasionally over‑salting dishes in their eagerness to impress the bowling league potlucks, and they take pride in feeding friends with their garden
    harvest.
  core: Adam Phelps, a 66‑year‑old retired handyman with boundless curiosity, generous community spirit, and a habit of misplacing tools while worrying about tomorrow, they embody a practical yet inventive
    approach to life.
background:
  cultural: Adam’s cultural background reflects the Midwestern, rural heritage common to Menominee County, Wisconsin. Raised in a predominantly white, working‑class community with German and Scandinavian
    roots, he grew up with values of self‑reliance, neighborliness, and modesty. The local culture places a strong emphasis on community involvement, church activities, and outdoor recreation such as fishing
    and hunting. These traditions have shaped Adam’s outlook, reinforcing his sociable, cooperative disposition and his practical, hands‑on approach to life.
