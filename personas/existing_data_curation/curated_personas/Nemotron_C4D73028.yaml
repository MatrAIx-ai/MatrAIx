    ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Basketball'', ''Soccer'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Electronics tinkering'', ''Hiking'', ''STEM mentorship'', ''Video gaming'', ''Music festivals'']'
  career_goals: Alexander aims to earn a Six Sigma Green Belt within the next year and pursue an MBA to blend his technical expertise with strategic management. He envisions advancing to a plant manager
    role where he can implement sustainable production practices and mentor junior supervisors. Long‑term, he hopes to launch his own tech‑enabled manufacturing venture that leverages automation to reduce
    waste and create jobs in his community.
