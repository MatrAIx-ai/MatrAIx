personas:
  professional: Gloria Zavala, an aspiring teen science communicator and environmental activist, blends curiosity with practicality by producing DIY science experiment vlogs and community beach‑cleaning
    campaigns, where her outgoing energy and occasional disorganization push her to improvise on‑the‑fly yet still deliver engaging content.
  sports: Gloria Zavala, a forward on her school’s varsity soccer team and a member of a local youth club, idolizes the tactical play of the Brazil national team while cheering for the Houston Dynamo at
    home games, balancing competitive drive with teamwork during weekend matches at the community park.
  arts: Gloria Zavala channels her love of storytelling into sketching comic strips featuring whimsical ocean creatures, draws inspiration from Hayao Miyazaki’s animation and Neil Gaiman’s sci‑fi narratives,
    and expresses cultural rhythm through her school’s folkloric dance troupe, where she blends traditional steps with modern flair.
  travel: Gloria Zavala dreams of exploring the coral reefs of Belize after already visiting Galveston’s beach for clean‑ups, enjoys school‑organized field trips to the Space Center in Houston, and hopes
    to save enough for a summer road trip to Pacific Coast National Parks with her friends.
  culinary: Gloria Zavala experiments in the kitchen by whipping up fish tacos with fresh lime, crafting creamy guacamole with ripe avocados, and baking churro‑style cinnamon‑sugar treats while filming
    the process for her YouTube channel, merging her love for DIY science with flavorful culinary creativity.
  core: Gloria Zavala is a spirited 14‑year‑old who fuses soccer, folklore, marine science, and comic art into a lively blend of curiosity, spontaneity, and community‑focused energy.
background:
  cultural: Gloria comes from a Mexican-American family deeply rooted in Corpus Christi’s vibrant Hispanic community. At home she helps prepare traditional dishes like tamales and pozole, celebrates Dia
    de los Muertos with elaborate altars, and regularly attends local festivals that blend Mexican folklore with coastal Texas culture. Her bilingual upbringing gives her a strong connection to both Spanish-speaking
    relatives and English-dominant school settings. The blend of Mexican family values—respect for elders, communal support, and religious traditions—and the coastal, multicultural environment of Nueces
    County shapes her worldview, fostering a sense of pride in her heritage while encouraging her to engage with the broader community.
