  hobbies: '[''Soccer'', ''Folkloric dance'', ''Beach clean-ups'', ''Comic sketching'', ''Science-fiction reading'', ''YouTube vlogging'', ''Tide-pool exploration'']'
  career_goals: Gloria wants to turn her love of science, the Gulf Coast environment, and community engagement into a career. She aspires to study marine biology or environmental science in college, with
    the long-term goal of becoming a marine conservation specialist who leads bilingual outreach programs for coastal youth. She also dreams of creating a youth-led beach-clean-up initiative that blends
    scientific data collection with community festivals, allowing her to use her organizational flair and social energy while staying adaptable to new ideas and practical challenges.
