personas:
  professional: Terry Cherry is a data‑driven retail leader who combines meticulous scheduling, inventory analytics, and visual merchandising with a community‑first mindset, leveraging their curiosity and
    methodical nature to drive omni‑channel growth while championing mentorship programs.
  sports: Terry Cherry plays pickup basketball at the local community center, hikes the San Bernardino foothills on weekends, cheered the Los Angeles Lakers and Los Angeles Rams growing up, and belongs
    to the regional 5‑K club, maintaining a disciplined yet competitive approach to fitness.
  arts: Terry Cherry composes on a digital piano, drinks in live jazz sets at The Blue Whale and hip‑hop shows featuring Kendrick Lamar‑style acts, and collects prints from street‑mural artists, letting
    musical improvisation fuel their leadership creativity.
  travel: Terry Cherry prefers road‑tripping along the Pacific Coast, with a bucket list that includes the jazz‑rich streets of New Orleans, the tech hubs of Osaka, and a future hike of the Pacific Crest
    Trail, planning trips around work schedules and modest vacation budgets.
  culinary: Terry Cherry cooks Southern‑inspired dishes like shrimp étouffée, collard greens, and sweet potato cornbread, enjoys experimenting with cayenne and smoked paprika, and can whip up a quick jambalaya
    for friends after a shift.
  core: Terry Cherry blends relentless organization, healthy skepticism, and a love for community music, juggling retail ambitions with late‑night piano riffs, occasional sneaker splurges, and a habit of
    over‑booking their calendar.
background:
  cultural: Raised in Southern California as an African American, Terry's cultural background blends Black heritage with West Coast urban influences. He grew up participating in church gatherings, Juneteenth
    celebrations, and community festivals that emphasized family solidarity, resilience, and social justice. These experiences fostered a deep appreciation for Black music, art, and culinary traditions,
    shaping his values of community uplift, education, and inclusive leadership. He brings this cultural perspective into his professional life by promoting collaborative workplace initiatives and supporting
    mentorship programs that empower the next generation.
