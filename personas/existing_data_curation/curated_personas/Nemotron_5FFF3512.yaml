  hobbies: '["Basketball","Tech & Retail Podcasts","Reading Business Biographies","Cooking Southern‑Inspired Cuisine","Digital Piano","Mentoring Youth","Live Music (Jazz, Hip‑Hop)","Hiking"]'
  career_goals: Terry aims to advance to a district manager role within the next three years, overseeing multiple stores and shaping omni‑channel strategies. He plans to earn a bachelor's degree in Business
    Administration and obtain certifications such as Certified Retail Manager (CRM) and Certified Loss Prevention Professional. Long‑term, he envisions launching his own boutique that highlights culturally
    inspired apparel, while fostering mentorship programs for underrepresented talent and championing diversity, equity, and inclusion initiatives within the retail industry.
