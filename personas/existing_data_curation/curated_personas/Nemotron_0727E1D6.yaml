personas:
  professional: Carmen Escalona, a 15‑year‑old high school student, merges acting, stage production, and beginner coding on Scratch to head drama club productions and create TikTok videos, channeling their
    sociable charisma, competitive drive, and pragmatic curiosity into polished performances while keeping a flexible yet organized schedule to meet school responsibilities.
  sports: Carmen Escalona, a varsity soccer midfielder for the school Panthers, thrives on the competitive intensity of weekend matches, studies the tactics of professional clubs like the LA Galaxy, supplements
    training with after‑school fitness drills, and they cheer passionately for the national women's team during the World Cup.
  arts: Carmen Escalona, a devoted drama club member, blends acting, stage design, and the rhythmic footwork of Folklórico, drawing inspiration from Lin‑Manuel Miranda’s Broadway scores, Beyoncé’s choreography,
    and graphic novel creators such as Jeff Lemire, to craft vibrant TikTok skits that showcase cultural flair and teen humor.
  travel: Carmen Escalona, who loves planning weekend getaways with family, has explored cultural festivals in Santa Fe, dreams of attending the Day of the Dead celebrations in Oaxaca, aspires to experience
    Broadway in New York City, and they balance these travel ambitions with school commitments and a limited budget.
  culinary: Carmen Escalona, an enthusiastic home cook, spends Saturdays mastering tamales, enchiladas, and homemade salsa, skillfully layering masa and fillings while experimenting with fusion twists like
    pineapple‑infused mole, and they occasionally over‑season dishes in youthful zeal.
  core: Carmen Escalona, a talkative, competitive teen who balances drama, soccer, and TikTok stardom with disciplined schoolwork, often stays up late editing videos but never lets responsibilities slip.
background:
  cultural: Carmen is a second‑generation Mexican‑American raised in Stockton’s vibrant Hispanic community. Her household speaks Spanish, and she celebrates Mexican traditions such as Día de los Muertos,
    quinceañeras, and family gatherings centered around shared meals. The family’s Catholic faith and strong emphasis on community service influence her values of solidarity and generosity. She participates
    in cultural events organized by local Latino organizations, which reinforce her pride in her heritage while she also embraces the multicultural environment of the Central Valley.
