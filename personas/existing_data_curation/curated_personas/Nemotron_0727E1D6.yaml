  career_goals: Carmen aims to pursue a degree in communications or journalism after high school, with the long‑term goal of becoming a bilingual journalist or digital media producer who highlights stories
    from the Mexican‑American community in the Central Valley. She is also drawn to community outreach, envisioning a future role as a program coordinator for a nonprofit that provides mentorship and educational
    resources to underserved teens. Ultimately, she hopes to lead digital campaigns that combine her practical tech skills with her cultural insight to empower her peers and celebrate her heritage.
