  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Birdwatching'', ''Gardening'', ''Cooking and potluck hosting'', ''Art history book club'', ''Volunteering at local museum'', ''Hiking'',
    ''Board games'', ''DIY woodworking'']'
  career_goals: He aims to formalize his volunteer work by earning a Community Health Worker certification, allowing him to provide health education and support to seniors in Watertown. Building on his
    love of art, he plans to launch a weekly after-school art workshop at the local community center, teaching watercolor and basic photography to youth and older adults. Over the next few years, he hopes
    to organize a neighborhood cooperative garden that supplies fresh produce to low-income families and to serve as a liaison between the historical society and local schools, preserving the town’s heritage.
    Ultimately, he envisions combining his organizational talent and compassionate nature to become a key facilitator of community-building projects in his region.
