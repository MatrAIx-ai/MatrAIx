  career_goals: Looking ahead, Dawn aims to transition into a senior advisory role where she can mentor the next generation of marketers and help local small businesses adopt data‑centric strategies. She
    aspires to become a regional Director of Marketing or a consultant‑partner for community enterprises, with a particular interest in launching sustainability‑focused marketing initiatives before she
    fully retires.
