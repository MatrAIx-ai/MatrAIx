personas:
  professional: Kathy May, a retired community organizer turned volunteer docent, leverages their meticulous planning, deep appreciation for visual arts, and outgoing nature to curate museum tours and orchestrate
    local art festivals, always balancing compassion with a firm insistence on budgetary discipline.
  sports: Kathy May is an avid supporter of the New Orleans Saints and Pelicans, regularly attends community walking groups and low‑impact water aerobics at the senior center, and they keep a modest membership
    with the local tennis club’s senior league, though they sometimes skip sessions when arthritis flares.
  arts: Kathy May fuels their artistic soul by sketching river scenes in watercolors inspired by Monet and local painter John McCrory, attending jazz nights featuring the music of Louis Armstrong and Wynton Marsalis,
    and they often lead guided tours at the St. Charles Parish museum, all while nurturing a secret affection for classic films starring Audrey Hepburn.
  travel: Kathy May prefers meticulously planned weekend jaunts to cultural hotspots like New Orleans for Mardi Gras, historic Savannah for its gardens, and occasional river cruises along the Mississippi,
    balancing a modest travel budget with a love for family reunions, yet they sometimes overpack due to worry about forgetting medication.
  culinary: Kathy May, an accomplished Cajun‑Creole home chef, delights in simmering gumbo with okra, andouille sausage, and fresh herbs from their garden, expertly preparing jambalaya for senior‑center
    cooking classes, while they also relish tasting beignets at Café Du‑Monde and occasionally treat themselves to a slice of key‑lime pie.
  core: Kathy May is a detail‑obsessed, art‑loving octogenarian who worries about every bill, forgets to take pills when engrossed in knitting, and they still manage to sketch river sunsets on a daily basis.
background:
  cultural: Kathy was raised in a white Southern family in St. Charles Parish, where Catholic (later Protestant) traditions and community gatherings shaped her values. Growing up near the Mississippi River,
    she absorbed the blend of French, Creole, and African‑American influences that characterize Louisiana’s culture. Family meals centered on gumbo, jambalaya, and homemade pies, while church socials and
    parades reinforced a strong sense of hospitality and communal responsibility. Her upbringing emphasized respect for elders, love of storytelling, and participation in local events, all of which continue
    to inform her identity and daily life.
