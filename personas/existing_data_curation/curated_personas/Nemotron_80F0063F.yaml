  career_goals: Although retired, Kathy aims to deepen her involvement with the local arts community by serving as a volunteer docent at the parish museum and helping to organize annual art festivals. She
    aspires to document her family’s history and regional stories in a memoir that can be shared with grandchildren and the wider community. Kathy also hopes to lead a senior‑center cooking class that showcases
    traditional Louisiana recipes, fostering intergenerational connections. Maintaining her health, staying socially active, and preserving the cultural heritage of St. Charles Parish remain central to
    her personal mission.
