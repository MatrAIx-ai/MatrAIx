  hobbies: '[''Reading literature and history'', ''Writing memoirs'', ''Cooking Southeast Asian dishes'', ''Herb gardening'', ''Playing chess'', ''Walking in parks'', ''Attending cultural festivals'', ''Woodworking'']'
  career_goals: Although retired, Chanh aims to author a memoir that intertwines his personal journey with broader Southeast Asian diaspora narratives, and to serve as a mentor for younger community members
    interested in humanities. He hopes to volunteer as a guest lecturer at the local community college, contribute oral histories to the Bergen County Historical Society, and join the board of a nonprofit
    dedicated to preserving Asian‑American heritage. He also aspires to cultivate a community garden that showcases herbs and vegetables common in Southeast Asian cuisine.
