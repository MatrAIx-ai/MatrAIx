persona_description: A community advocate for sustainable education, passionate about integrating gardens into the curriculum to holistically teach all academic subjects and other important life skills.
  This person is knowledgeable about the benefits of school gardens, including improvements in test scores, creativity, observation skills, and learning outcomes beyond the classroom. They are committed
  to creating a new paradigm for learning that includes and extends beyond traditional book learning and standardized testing. This person is interested in addressing budget cuts and reevaluating school
  structures to ensure that gardens are considered essential elements for learning.
