  hobbies: '[''Reading mystery novels'', ''Chess'', ''Baking with family'', ''Birdwatching'', ''Track and field (sprinting)'', ''Stamp collecting'', ''Piano practice'', ''Puzzle solving'', ''Gardening'']'
  career_goals: She aspires to attend a reputable university, ideally Louisiana State University, and study nursing or veterinary medicine, fields that combine her practical mindset with a desire to help
    others and animals. Sharon aims to earn a scholarship by maintaining top grades and winning academic competitions, and she hopes to become a trusted health professional who serves her hometown community.
    Long‑term, she envisions leading health outreach programs in the bayou region, applying her organized, detail‑oriented nature to improve community well‑being.
