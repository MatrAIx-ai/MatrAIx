personas:
  professional: Sharon Pedersen, a 12‑year‑old budding investigative enthusiast, channels their love for mystery novels, chess tactics, and crossword puzzles into a self‑started Detectives Club at school
    where they organize weekly case‑solving challenges, applying methodical planning and a competitive edge to lead the group.
  sports: Sharon Pedersen sprints for the middle school track team, the Lakeside Lightning, training three times weekly to shave fractions of a second off their 100‑meter dash, and in their free time they
    avidly follow the professional soccer club Metro United and the NBA’s Chicago Bulls, cheering loudly at televised games while staying disciplined in their own routine workouts.
  arts: Sharon Pedersen practices piano daily, favoring the intricate fingerwork of Beethoven’s Für Elise and the meditative repetitions of Einaudi’s Nuvole Bianche, while their artistic appetite includes
    reading Agatha Christie mysteries and watching the BBC series Sherlock, with a particular admiration for Benedict Cumberbatch’s performances.
  travel: Sharon Pedersen enjoys weekend trips to the nearby swamp for birdwatching, has camped at the state’s coastal National Park, dreams of exploring the Everglades in Florida, the Redwood forests of
    California, and the historic streets of Edinburgh in Scotland, while always planning itineraries months ahead to fit school schedules and parental approvals.
  culinary: Sharon Pedersen loves baking, precisely measuring ingredients like unsalted butter, vanilla extract, and cinnamon for chocolate chip cookies and apple pie, often timing the oven to the second,
    and they take pride in mastering a flaky pastry crust while occasionally over‑mixing dough, which results in overly dense biscuits.
  core: Sharon Pedersen is an organized, routine‑loving twelve‑year‑old who balances a competitive streak in chess and sprinting with meticulous budgeting, diligent health tracking, and a precise love for
    baking, yet sometimes lets their perfectionism turn into obsessive habit‑checking.
background:
  cultural: Sharon was raised in a close‑knit white Southern family in Bogalusa, Louisiana. Her upbringing blends traditional Southern values—regular church attendance at a Southern Baptist congregation,
    Sunday family meals featuring gumbo and jambalaya, and participation in local events like Mardi Gras parades—with an emphasis on community responsibility and modesty. The rural surroundings of St. Tammany
    Parish, with its bayous, fishing spots, and annual school fairs, have shaped her appreciation for nature and local customs, while her family’s emphasis on punctuality, courtesy, and hard work reinforces
    her practical, routine‑oriented personality.
