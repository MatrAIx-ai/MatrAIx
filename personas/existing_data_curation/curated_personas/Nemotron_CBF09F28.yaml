  career_goals: Michael aims to earn a promotion to sergeant within the next two years and eventually become a lieutenant, overseeing a community‑policing unit that integrates mental‑health resources and
    arts‑based outreach programs. He plans to complete a bachelor’s degree in criminal justice or public administration while pursuing advanced certifications in crisis intervention. Long‑term, he envisions
    serving as the police chief for West Valley City, championing a department culture that balances accountability with compassion, and later transitioning to a civilian role as a consultant for police‑community
    partnership initiatives.
