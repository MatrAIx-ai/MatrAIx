personas:
  professional: Ki Park is a budding LEGO architect who applies step‑by‑step logic and a love of storytelling to build intricate models, treating each construction as a miniature project that showcases
    their curious yet practical mindset.
  sports: Ki Park plays forward on the local youth soccer team that practices on Saturday mornings at the Santa Ana community field, cheering for the LA Galaxy as a role model, and also joins a summer swim
    program at the Orange County Aquatics Center to stay active.
  arts: Ki Park spends afternoons sketching detailed animal characters inspired by the illustrations of Beatrix Potter and the vibrant style of Studio Ghibli, folds intricate origami cranes while listening
    to piano pieces by Ludovico Einaudi, and practices piano lessons that blend structured scales with imaginative storytelling.
  travel: Ki Park loves family road trips to Joshua Tree National Park, where they explore rock formations and collect desert stones, dreams of visiting the historic palaces of Seoul during the spring lantern
    festival, and prefers itineraries that mix hands‑on nature hikes with brief visits to cultural museums.
  culinary: Ki Park helps prepare family meals, mastering the art of mixing cabbage, gochujang, and garlic to make homemade kimchi, rolling thin slices of beef for bulgogi, and occasionally experimenting
    with a simple peanut butter and jelly sandwich for after‑school snacks, showcasing a beginner’s cooking confidence paired with a love for bold flavors.
  core: Ki Park is a curious, organized seven‑year‑old who balances LEGO building, soccer, and piano practice while nurturing a love for cultural traditions and a pocket‑money piggy bank that fuels both
    creative projects and occasional sweet treats.
background:
  cultural: Ki Hwa is a second‑generation Korean American raised in Santa Ana, California, within a vibrant multicultural community. At home, Korean language, customs, and meals are a daily part of life;
    she celebrates Lunar New Year and Chuseok with family gatherings, traditional foods, and storytelling. The local Korean community center provides language classes and cultural festivals, allowing her
    to connect with peers who share similar heritage. Simultaneously, her school environment and the diverse neighborhoods of Orange County expose her to a wide array of American customs, holidays, and
    friendships across different cultures. This dual exposure shapes her identity, fostering bilingual communication, an appreciation for both Korean and American traditions, and a flexible adaptation to
    varied social settings.
