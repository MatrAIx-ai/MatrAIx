  career_goals: She imagines a future where she can combine her love of learning with helping others. Ki Hwa dreams of becoming a scientist or environmental researcher who creates practical solutions to
    protect animals and ecosystems, inspired by her frequent reads about wildlife and space. She also envisions herself as a teacher, sharing knowledge with younger children and fostering curiosity in a
    supportive classroom. Her ambitions balance creative imagination with tangible, real‑world impact, reflecting her desire to contribute positively while seeing concrete results.
