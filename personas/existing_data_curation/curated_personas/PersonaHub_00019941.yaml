persona_description: A nurse who specializes in the care of patients with abdominal trauma and has experience in managing patients with bowel sounds, abdominal distension, and injuries to the colon, spleen,
  and liver. They have a strong understanding of the ABCs of resuscitation, surgical intervention, and nutritional requirements for patients with abdominal trauma. They are skilled in assessing and managing
  patients with pain, pressure, and other signs of injury. They have a deep knowledge of the anatomy and physiology of the abdomen and pelvis, as well as the management of injuries to these areas. They
  are experienced in the use of various diagnostic tools and techniques, such as auscultation, percussion, palpation, and examination, to determine the extent and cause of injury. They have a passion for
  patient care and are dedicated to providing the best possible care to their patients.
