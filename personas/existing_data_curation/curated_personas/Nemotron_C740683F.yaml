personas:
  professional: Jeny Delamadriz is a community organizer and senior‑center culinary facilitator who leverages bilingual mediation, meticulous budgeting, and project coordination skills to design intergenerational
    workshops, reflecting their calm, reliable, and curiosity‑driven nature.
  sports: Jeny Delamadriz enjoys early morning walks along the historic promenade, participates in the Borinquen Walkers club, follows the Cangrejeros de Santurce baseball team, and plays beach volleyball
    on weekends, yet they often skip cardio sessions when a new knitting project captures their attention.
  arts: Jeny Delamadriz captures colonial facades with a vintage Leica camera, participates in bomba and plena dance circles, and draws creative inspiration from the music of Ana Belén and the paintings
    of Frida Kahlo, while occasionally binge‑watching classic film noir for aesthetic ideas.
  travel: Jeny Delamadriz prefers slow‑travel itineraries that include month‑long stays in Cartagena’s historic old town, Tuscany’s vineyards, and the Sierra Nevada’s mountain retreats, balancing limited
    vacation days with a desire to gather culinary stories for their workshops.
  culinary: Jeny Delamadriz expertly blends fresh basil, oregano, and thyme from their balcony garden into traditional dishes such as mofongo, arroz con gandules, and herb‑infused stews, often experimenting
    with new flavor combinations yet sometimes over‑salting when excitement spikes.
  core: Jeny Delamadriz is an organized, calm community catalyst who merges gardening, heritage cooking, and intergenerational storytelling into a lifelong mission, punctuated by spontaneous spice purchases
    and occasional missed dental appointments.
background:
  cultural: Jeny’s Puerto Rican heritage is rooted in a blend of Spanish colonial, African, and Taíno influences. She grew up immersed in the island’s vibrant traditions, from Catholic festivals and family
    gatherings to the rhythmic sounds of bomba, plena, and salsa. Her upbringing emphasized community solidarity, respect for elders, and the preservation of culinary customs like mofongo and lechón. Living
    in San Juan, she actively participates in local cultural events, values bilingual communication, and embraces the island’s resilient spirit.
attributes:
  skills: '[''Administrative coordination'', ''Budgeting and financial tracking'', ''Event planning and volunteer management'', ''Bilingual communication (Spanish/English)'', ''Conflict mediation and informal
    counseling'', ''Traditional Puerto Rican cooking'', ''Basic grant writing'']'
  hobbies: '[''Gardening'', ''Photography of historic San Juan'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Bomba and plena dancing'', ''Volunteer cooking classes for seniors'']'
  career_goals: Jeny aspires to launch a community‑focused culinary workshop that preserves and teaches traditional Puerto Rican recipes while providing mentorship to young women interested in hospitality
    and entrepreneurship. She plans to complete a bachelor's degree in Community Development to deepen her impact, and eventually serve on the advisory board of a local nonprofit dedicated to elder care
    and cultural preservation. Her long‑term ambition is to become a recognized facilitator of intergenerational cultural exchange in San Juan.
