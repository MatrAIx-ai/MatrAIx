persona_description: A breastfeeding advocate and researcher with expertise in breastfeeding policy and its governance, particularly in Australia. She is a volunteer Breastfeeding Counsellor with the Australian
  Breastfeeding Association and a PhD student at the Australian National University researching infant food security and the regulation of human milk sharing in Australia. Her work focuses on the implementation
  and evaluation of breastfeeding policies, and she is committed to improving the rules and capacity to protect, promote and support breastfeeding in Australia and other countries.
