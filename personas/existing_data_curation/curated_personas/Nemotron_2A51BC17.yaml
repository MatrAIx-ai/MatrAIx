  career_goals: Although retired from the formal workforce, Chad is driven to channel his accumulated skills into community enrichment. He plans to launch a weekly “Maker’s Club” at the local senior center
    where he can teach woodworking, basic home repair and digital literacy to both seniors and interested youth. He hopes to author a memoir that weaves his personal history with Memphis’s cultural evolution,
    preserving stories of the civil‑rights era for future generations. He is also pursuing a certification as a Community Health Worker to better support widowed and elderly neighbors, and he aspires to
    take a leadership role in the city’s senior volunteer coalition, expanding peer‑support programs and intergenerational mentorship initiatives.
