personas:
  professional: Brett Wight is a detail‑oriented residential property manager who leverages two decades of hands‑on maintenance, budgeting and compliance expertise to streamline HOA operations, mentor trade
    apprentices, and consult landlords with a rigorously scheduled, checklist‑driven approach that mirrors their love for model‑kit precision, and they plan each client engagement like assembling a ship
    model, ensuring every bolt is accounted for.
  sports: Brett Wight enjoys low‑impact fitness such as sunrise beach walks and weekend fly‑fishing on nearby canals, follows the local NFL team the Seattle Seahawks, holds a season ticket for the Seattle
    Sounders FC, and they belong to the community anglers’ club where they swap tips and occasional fishing stories with fellow enthusiasts.
  arts: Brett Wight’s artistic palate includes a reverence for maritime history illustrated through detailed ship model kits, a fondness for classic folk singers like Gordon Lightfoot, a weekly habit of
    reading biographies—especially of engineers such as Isambard Kingdom Brunel—and they occasionally visit the local maritime museum to draw inspiration for their woodworking projects.
  travel: Brett Wight prefers meticulously planned, low‑key trips that blend nature and history, such as a recent weekend excursion to the rugged coast of Acadia National Park and an upcoming goal to explore
    the historic shipyards of Portsmouth, New Hampshire, all while they budget travel expenses in their favorite spreadsheet template.
  culinary: Brett Wight’s kitchen reflects their garden’s bounty—think crisp carrot‑and‑radish salad with a lemon‑tahini dressing, pan‑seared trout from canal catches seasoned with fresh dill, and a signature
    rosemary‑infused vegetable stew—but they occasionally indulge in a late‑night slice of pepperoni pizza after a night spent assembling a new aircraft model kit.
  core: Brett Wight blends methodical precision with solitary hobbies, turning every project—from property audits to wooden boat models—into a disciplined ritual punctuated by sunrise walks, spreadsheet
    checks, and a quiet, occasional coffee‑stained late night that they cherish.
background:
  cultural: Brett grew up in a middle‑class white family in the Midwest before moving to South Florida in his 20s. He identifies with mainstream American cultural norms, values hard work, self‑reliance,
    and community involvement. His Protestant upbringing and long‑time residence in Fort Lauderdale have blended a conservative, family‑centered outlook with an appreciation for the relaxed coastal lifestyle
    and the multicultural tapestry of South Florida.
