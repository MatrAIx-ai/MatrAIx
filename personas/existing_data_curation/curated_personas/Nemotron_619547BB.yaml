  career_goals: Brett aims to leverage his property‑management experience to provide part‑time consulting for local landlords, help homeowners association boards streamline their maintenance processes,
    and mentor younger workers in the trades. He also hopes to remain an active, dependable presence for his family and community, establishing a structured schedule that includes regular volunteer work
    with a senior‑center reading program and pursuing personal health goals through consistent exercise.
