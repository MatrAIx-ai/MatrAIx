personas:
  professional: Sara Ratcliffe, a budding preschool helper, loves arranging storybooks and snack tables, balancing their curiosity about new characters with a practical respect for classroom routines, making
    them a reliable little collaborator in their kindergarten setting.
  sports: Sara Ratcliffe enjoys the local Kids' Soccer Club of Greenfield, where they practice dribbling and teamwork on Saturday mornings, they prefer the calm of small-group drills over large matches,
    and they also take part in beginner gymnastics classes, showing a gentle but consistent commitment to staying active.
  arts: Sara Ratcliffe delights in drawing pastel-colored fairy scenes, humming along to classic children's songs by Raffi and Disney soundtracks, and attending weekly storytime at the community library,
    where they quietly share their own short tales, weaving their love of imagination with a thoughtful appreciation for tradition.
  travel: Sara Ratcliffe loves family road trips to Grandma's farm in the countryside, where they collect pinecones and watch fireflies, and they dream of visiting the interactive exhibits at the Science
    Museum in Chicago, favoring short, familiar journeys that blend curiosity with the comfort of close companions.
  culinary: Sara Ratcliffe prefers simple comfort foods like creamy mac and cheese, peanut butter and jelly sandwiches, and strawberry banana smoothies, enjoys helping their parents stir batter for blueberry
    muffins, and often requests crunchy carrot sticks as a snack, displaying a modest yet enthusiastic culinary curiosity.
  core: Sara Ratcliffe is a quiet, detail‑oriented five‑year‑old who balances a boundless curiosity with practical habits, prefers cozy small‑group activities, and quietly insists on order while side‑stepping
    occasional forgetfulness, and they often double‑check that their crayons are neatly aligned.
background:
  cultural: 'Sara is a five-year-old white child raised in Carleton, a small town in Wayne County, Michigan. Her family follows typical Midwestern American customs: celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July with family gatherings; attending a local community church; participating in school events like field trips and kindergarten performances; and enjoying seasonal activities
    like visiting county parks, pumpkin patches, and community fairs. The cultural setting emphasizes politeness, community cooperation, modest ambition, and a love of the outdoors.'
