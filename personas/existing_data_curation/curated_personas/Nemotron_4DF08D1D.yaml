personas:
  professional: Funmilola Whitehead is a logistics clerk at a bustling Auburn distribution center who leverages WMS expertise, sharp inventory-control instincts, and a naturally compassionate, talkative
    demeanor to mediate between dock staff, carriers, and coworkers while keeping operations humming despite occasional personal disorganization.
  sports: Funmilola Whitehead enjoys attending Auburn Tigers football games and follows the Atlanta Falcons, participates in a community center line-dancing class for cardio, and plays on a casual intramural
    softball team that meets Saturday mornings, balancing team spirit with a preference for social interaction over solitary workouts.
  arts: Funmilola Whitehead sings gospel in the church choir, relaxes to recordings of Aretha Franklin and Kirk Franklin, devours contemporary fiction by authors like Chimamanda Ngozi Adichie, and hosts
    game nights where movie marathons of classic musical films such as The Sound of Music serve as the backdrop for community bonding.
  travel: Funmilola Whitehead favors short, family-friendly road trips to Southern culinary hotspots such as New Orleans for its jambalaya and Charleston for its historic districts, while day-dreaming about
    a future cultural immersion trip to Ghana, planning itineraries around school calendars and budget constraints.
  culinary: Funmilola Whitehead is a proficient home cook who blends Southern comfort foods—fried chicken, collard greens, and cornbread—with West African staples like jollof rice and okra stew, regularly
    seasoning dishes with smoked turkey, ginger, and cayenne pepper, and enjoys sharing these meals at church potlucks and neighborhood gatherings.
  core: Funmilola Whitehead is a 39-year-old logistics enthusiast whose magnetic sociability, compassionate teamwork, and occasional scatter-brained planning create a lively, community-centered life where
    food, music, and mentorship intertwine.
background:
  cultural: Funmilola is a Black American with a rich cultural blend that combines Southern African‑American traditions and her family's West African (Yoruba) heritage, reflected in her first name, which
    means "Give me wealth" in Yoruba. Raised in Alabama, she grew up immersed in church life, soul food, and strong family ties, while also celebrating African cultural practices such as storytelling, drumming,
    and cooking dishes like jollof rice and egusi soup with relatives who maintain ties to their Nigerian roots. She actively participates in Black community events in Auburn, including Juneteenth celebrations,
    Black History Month programs, and local cultural festivals that showcase African diaspora art and music. Her identity is shaped by a commitment to service, community cohesion, and the preservation of
    both Southern and African cultural legacies.
attributes:
  skills: '["Inventory Control", "Shipping and Receiving Operations", "Warehouse Management Systems (WMS)", "Basic Microsoft Excel", "Data Entry", "Customer Service", "Team Communication", "Conflict Mediation",
    "Training and Onboarding New Staff", "Problem Solving in Fast-Paced Environments"]'
  hobbies: '["Cooking Southern and West African dishes", "Volunteering at the local food bank", "Singing in church choir", "Line dancing at community center", "Gardening (vegetables and herbs)", "Reading
    contemporary fiction", "Hosting game and potluck nights", "Participating in local church events", "Attending community festivals", "DIY crafts and quilting"]'
  career_goals: Funmilola aims to transition from a clerk role to a supervisory or lead position within the logistics department of her current employer or a larger regional distribution hub. She plans
    to earn a Certified Logistics Associate (CLA) credential and enroll in night courses at a community college to deepen her knowledge of supply‑chain analytics and safety compliance. In the longer term,
    she envisions a role where she can blend her operational expertise with her passion for people, such as a training coordinator or employee‑relations liaison, helping to design mentorship programs that
    foster a supportive and inclusive workplace culture. Balancing career advancement with family responsibilities remains a priority, so she seeks opportunities that allow for flexible scheduling while
    still offering clear pathways for promotion.
