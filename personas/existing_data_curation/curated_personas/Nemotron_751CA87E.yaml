  hobbies: '[''PC building and customization'', ''Arduino and DIY electronics projects'', ''Reading science‑fiction'', ''Competitive strategy video gaming (e.g., StarCraft)'', ''Playing chess'', ''Listening
    to regional Mexican music'', ''Soccer with a small group of friends'', ''Hiking and fishing in Hill Country'']'
  career_goals: Alberto aims to obtain his GED within the next year and enroll in a community‑college program focused on computer engineering or information technology. He aspires to become a certified
    network administrator or software developer, leveraging his self‑taught programming skills to create practical applications. In the longer term, he envisions launching his own technology repair and
    custom‑PC business, where he can compete in the local market and offer reliable, cost‑effective services to his community. He is also interested in participating in regional hackathons and coding competitions
    to benchmark his abilities against peers and earn scholarships.
