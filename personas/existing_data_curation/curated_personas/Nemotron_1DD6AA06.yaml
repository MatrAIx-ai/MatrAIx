personas:
  professional: Chantel Clayton is an imaginative fitness professional who leverages a solid grounding in anatomy, physiology, and exercise science to design data‑driven, art‑infused group classes—such
    as choreographed cardio sessions set to live music—while meticulously documenting client progress and steering the boutique wellness studio in Durango toward its upcoming 'ArtFit' launch.
  sports: Chantel Clayton devotes weekends to trail running in the Rockies, rock climbing at Eldorado Canyon, and organized ultimate frisbee matches with the Durango Flying Disc Club, while cheering on
    the Colorado Rockies and Denver Broncos as seasonal benchmarks of disciplined teamwork and competitive spirit.
  arts: Chantel Clayton immerses themselves in modern dance workshops inspired by Crystal Pite, captures sunrise vistas through the lens of Ansel Adams‑style photography, curates personal art collections
    featuring Olafur Eliasson installations, and routinely attends live shows by Björk, all of which fuel their creative fitness programming.
  travel: Chantel Clayton prefers meticulously planned adventure trips that blend high‑altitude hikes in Banff and Patagonia with cultural immersion in Kyoto’s Zen gardens, yet balances these escapes with
    budget‑friendly weekend getaways to nearby Mesa Verde, always coordinating travel around studio commitments and occasional family obligations.
  culinary: Chantel Clayton, an intermediate home chef, delights in crafting healthy global dishes such as Thai green curry with coconut milk, quinoa‑and‑black‑bean bowls, and Moroccan spiced chickpea tagine,
    often sourcing fresh herbs like cilantro and lemongrass to infuse flavor while occasionally over‑seasoning in the pursuit of bold, novel tastes.
  core: Chantel Clayton channels a competitive, art‑driven imagination into every facet of life, from meticulously planning studio programs to impulsively splurging on limited‑edition prints, all while
    habitually juggling a smartwatch reminder to breathe amid relentless activity.
background:
  cultural: Chantel grew up in a middle‑class White American family with strong support for both academic achievement and outdoor recreation. Her arts‑humanities graduate education fostered an appreciation
    for diverse cultural expressions, while living in Durango, Colorado, has immersed her in a community that values environmental stewardship, progressive arts, and a blend of Native American (Ute) and
    Hispanic influences. She reflects this mix by integrating local cultural motifs into her fitness programs and maintaining a respectful, inclusive outlook toward the region's multicultural heritage.
attributes:
  skills: '["Group fitness class design", "Exercise programming", "Anatomy and physiology knowledge", "First aid & CPR certification", "Motivational coaching", "Event organization", "Creative choreography",
