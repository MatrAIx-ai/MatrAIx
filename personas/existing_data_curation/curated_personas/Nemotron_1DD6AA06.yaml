  hobbies: '["Hiking", "Trail running", "Rock climbing", "Yoga", "Modern dance", "Painting", "Photography", "Visiting art galleries", "Creative writing", "Cooking experimental healthy meals", "Reading science
    fiction and philosophy", "Volunteering for community events", "Participating in local trivia nights", "Meditation", "Journaling", "Team sports (ultimate frisbee)"]'
  career_goals: Chantel aims to become the lead director of a boutique wellness studio in Durango that fuses art and movement, launching a signature program called "ArtFit" that merges visual arts and high‑energy
    fitness. She plans to earn advanced certifications (e.g., ACSM Certified Exercise Physiologist) and eventually open her own studio that hosts collaborative events with local galleries and performance
    artists. Long‑term, she aspires to publish a guide on creative fitness methodologies and mentor emerging trainers, while also competing in regional fitness challenges to model a competitive yet community‑focused
    spirit.
