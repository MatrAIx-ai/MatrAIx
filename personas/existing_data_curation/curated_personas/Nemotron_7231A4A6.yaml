  career_goals: At 74, Jo aims to transition her firm’s leadership to her trusted associates while cementing a legacy of resilient coastal architecture. She plans to compile a comprehensive design guide
    for hurricane‑proof residential projects that will be used by local architects and builders. Jo also seeks to mentor a small cohort of emerging architects through a structured apprenticeship program,
    publish a series of articles on sustainable design for senior living communities, and serve as a senior advisor on the Lee County Historic Preservation Board, ensuring her practical expertise continues
    to shape the built environment.
