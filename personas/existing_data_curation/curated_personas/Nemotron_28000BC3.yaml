personas:
  professional: Roberto Miranda is a veteran electrician with three decades of wiring, NEC expertise, and a methodical safety‑first approach, now channeling his curiosity into smart‑home automation while
    meticulously planning to earn a Master Electrician license and launch a boutique sustainable retrofits firm in Burbank.
  sports: Roberto Miranda enjoys weekend hikes in the Angeles National Forest, participates in a local adult basketball league that faces the LA Lakers fan community at the nearby gym, follows the LA Dodgers
    and LA Rams loyally, and balances cardio with strength training at a neighborhood gym to maintain functional fitness for on‑site electrical work.
  arts: Roberto Miranda relaxes after a long day by listening to classic jazz records by John Coltrane, watching films starring Tom Hanks, admiring the street murals of LA's Arts District, and occasionally
    sketching wood‑grain patterns for future furniture projects, finding that these artistic touches inspire both their craftsmanship and problem‑solving mindset.
  travel: Roberto Miranda prefers meticulously planned road trips that blend outdoor adventure with cultural stops, having driven the Pacific Coast Highway to explore Big Sur, trekked the Redwood forests
    of Northern California, and earmarked a future pilgrimage to Kyoto’s historic temples, all while balancing travel costs against the need to invest in their upcoming contracting firm.
  culinary: Roberto Miranda is an avid home chef who expertly prepares authentic mole and tamales using ancho chilies, cacao, almonds, and masa, balances the complex flavors with fresh cilantro and lime,
    and treats weekend cooking sessions as experimental labs for new spice blends, while also enjoying high‑quality steak at local bistros when time permits.
  core: Roberto Miranda fuses a disciplined electrician’s mindset with a curious maker’s spirit, turning methodical precision into sustainable home innovations while staying grounded in hands‑on craft,
    occasional tool splurges, and a calm, competitive drive.
background:
  cultural: Roberto was raised in a close‑knit Mexican‑American family in Los Angeles County. Bilingual in Spanish and English, he grew up celebrating Día de los Muertos, Mexican Independence Day, and family
    quinceañeras, which reinforced values of loyalty, hospitality, and craftsmanship. His heritage informs his work ethic and his love for traditional Mexican cooking, while his upbringing in the multicultural
    environment of Burbank has given him a pragmatic outlook that blends cultural pride with the demands of a dynamic, modern trade.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''NEC code compliance'', ''Solar panel installation'', ''LED retrofitting'', ''Smart‑home automation'', ''Low‑voltage data cabling'',
    ''Blueprint reading'', ''Project planning and scheduling'', ''Safety training and OSHA compliance'', ''Troubleshooting and diagnostics'', ''Team leadership and mentorship'']'
  hobbies: '[''Arduino and Raspberry Pi tinkering'', ''Woodworking'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Angeles National Forest'', ''Listening to classic rock vinyl records'', ''DIY
    home renovation projects'', ''Volunteering at local cultural festivals'']'
  career_goals: Roberto aims to earn his Master Electrician license within the next two years and to launch a boutique contracting firm in Burbank that specializes in sustainable retrofits for older homes.
    He plans to expand his expertise in solar and smart‑home technologies, obtain certifications in green building standards (e.g., NAHB Green). He also aspires to mentor a new generation of electricians,
    eventually serving on the local union board to influence training standards, reflecting his competitive drive to be a leading figure in his trade while staying grounded in practical, proven methods.
