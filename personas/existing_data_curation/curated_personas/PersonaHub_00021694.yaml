persona_description: A scientist or researcher who specializes in the study of x-ray production and detection, particularly in the use of gas proportional counters for measuring photon energies in the range
  10-100 keV. They are likely to be knowledgeable about the production and absorption of x-rays, the use of photoelectric absorption to produce x-rays, the calibration of gas proportional counters, the
  characteristics of K and L x-rays, and the production of Np and 57Co for calibration purposes. They may also have experience with the use of gas proportional counters for measurement of photon energies
  in the range 10-100 keV, and be familiar with the methods of x-ray production used here, including the use of intense beams of gammas from the source onto a sample, direct measurement of characteristic
  x-ray energies for as many elements as possible, and the use of Moseley's theory to explain L x-ray energies. They may also be interested in the advantages of gas proportional counters over Geiger or
  scintillation counters for measurement of photon energies in the range 10-100 keV, and the possibility of using the method of x-ray production used here for quantitative analysis of elemental composition.
  They may also be interested in the relative number of K and L x-rays produced at the same time in a sample, and the alternative processes for x-ray emission, such as beta-emission and escape from the
  detector without detection of x-rays created during gamma absorption.
