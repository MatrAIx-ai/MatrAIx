  career_goals: Henry aspires to combine his love for art, technology, and community impact by pursuing a career in interactive media design or user‑experience (UX) design focused on educational platforms.
    He plans to enroll in a specialized arts high school, then study graphic design and computer science, with the long‑term goal of leading community workshops that bring digital art and coding to under‑served
    youth in Aledo and the broader Tarrant County area. He also dreams of creating inclusive video games that tell diverse stories, hoping to influence both the creative industry and his local community.
