personas:
  professional: Henry Barnes, a budding digital illustrator, merges a vivid imagination for sci‑fi and fantasy worlds with disciplined mastery of Photoshop and Procreate, while channeling his compassion
    by mentoring younger artists at the community center.
  sports: Henry Barnes, a member of the middle school basketball team who also practices parkour at the community center's indoor gym, cheers for the local pro team the Springfield Thunderbirds and solves
    Rubik’s cubes for mental fitness, yet they prefer solitary activities like sketching late at night.
  arts: Henry Barnes, an avid fan of graphic novelist Frank Miller, a digital painter inspired by H.R. Giger, and a music lover who streams John Coltrane, Kendrick Lamar, and Erykah Badu, spends weekends
    sketching storyboards for short sci‑fi tales and composing melodies on a keyboard, blending visual and auditory narratives into a personal artistic language.
  travel: Henry Barnes, who prefers meticulously planned trips, has already visited Washington, D.C.’s natural history museum, dreams of stargazing at the Atacama Desert observatory, hopes to wander the
    neon streets of Tokyo and witness the Aurora Borealis in Tromsø, all while balancing a modest travel budget with a yearning for cosmic experiences.
  culinary: Henry Barnes, whose palate leans toward spicy ramen, homemade pepperoni pizza, and fresh mango smoothies, enjoys experimenting with avocado toast topped with feta and chili flakes, often cooking
    late‑night meals after art sessions, but occasionally forgets to eat regular meals when caught up in a new coding challenge.
  core: Henry Barnes, a disciplined teen visionary, fuses sci‑fi art, coding curiosity, and compassionate mentorship into a uniquely organized yet imaginative life, even if occasional procrastination and
    late‑night snack binges pepper their routine.
background:
  cultural: Henry is an African‑American teen raised in Aledo, Texas, where his family maintains a strong sense of Black heritage through church gatherings, storytelling, and celebrations like Juneteenth.
    He grew up hearing the histories of the civil‑rights movement and enjoys family recipes that blend Southern comfort food with traditional soul food. His cultural identity informs his artistic perspective,
    often incorporating themes of resilience, community, and Black excellence into his work. Participation in the local African‑American youth group at his church reinforces values of compassion, cooperation,
    and service, shaping his desire to give back to his community.
