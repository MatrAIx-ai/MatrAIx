    ''Traveling to culturally rich destinations'', ''Cooking experimental recipes'']'
  career_goals: Phillip aspires to evolve from a hands‑on designer into a senior creative leader within the next five years. He aims to secure an Art Director role at an agency that values experimental
    design and interdisciplinary collaboration, where he can mentor junior designers and shape brand narratives that fuse cultural storytelling with modern digital media. In parallel, he dreams of launching
    a small boutique studio with his wife that offers branding and visual‑identity services to socially‑focused startups, allowing him to blend his humanitarian interests with his artistic practice. He
    also plans to deepen his expertise in AR/VR experiences and to present his work at regional design conferences, while maintaining a work‑life balance that supports his marriage and mental wellbeing.
