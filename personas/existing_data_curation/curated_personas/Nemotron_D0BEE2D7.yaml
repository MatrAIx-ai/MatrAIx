  career_goals: William hopes to turn his love of art and technology into a career as a multimedia artist or concept designer for video games. He dreams of creating online tutorials and short videos that
    inspire other kids to explore creative hobbies, while keeping the flexibility to travel, collaborate, and learn new media. In the long term, he envisions opening a community art space where he can teach,
    mentor, and host collaborative projects.
