  hobbies: '[''Basketball (pickup games)'', ''Hiking in the San Gabriel Mountains'', ''Karaoke (Mandarin pop)'', ''Online multiplayer gaming'', ''Cooking (fusion Chinese‑Californian dishes)'', ''Yoga and
    mindfulness meditation'', ''Community volunteer events'', ''Socializing with friends'']'
  career_goals: Hung aims to advance from bedside nursing to a specialized role in emergency or critical care, seeking certifications such as Certified Emergency Nurse (CEN) and eventually becoming a Nurse
    Practitioner or Clinical Nurse Specialist. Driven by his competitive streak, he aspires to take on leadership positions—charge nurse or unit manager—where he can implement quality‑improvement projects
    and patient safety initiatives. He also hopes to integrate his curiosity by participating in research on stress reduction for healthcare workers and to eventually mentor new nurses, balancing his ambition
    with personal strategies for managing burnout.
