persona_description: A geologist or geophysicist who specializes in the study of volcanic arcs and the processes that form them, particularly the curvature of the Earth's surface caused by the subduction
  of one plate beneath another. They are likely to be knowledgeable about the Andes mountains and other volcanic arcs around the world, and may have a particular interest in understanding the geological
  and tectonic processes that lead to the formation of these features. They may also have a strong interest in understanding the potential hazards associated with volcanic activity, such as earthquakes
  and lahars.
