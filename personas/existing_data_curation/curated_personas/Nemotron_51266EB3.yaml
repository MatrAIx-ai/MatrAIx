  career_goals: Over the next few years Quoc aims to transition from a front‑line representative to a Customer Service Team Lead, using his knack for building rapport and his technical insight to mentor
    newer agents. He plans to earn a Certified Customer Experience Professional credential and to design a streamlined, repeatable workflow that reduces repetitive tasks, giving him a more predictable daily
    routine. Ultimately, he aspires to a supervisory role that balances his desire for stable, familiar processes with occasional opportunities to lead short‑term projects or pilot new service initiatives,
    while keeping stress levels manageable.
