  hobbies: '[''Visiting art galleries and museums'', ''Attending live theater and improv shows'', ''Participating in writer’s circles and book clubs'', ''Exploring historic neighborhoods on foot'', ''Traveling
    to culturally rich cities'', ''Practicing yoga'', ''Cooking experimental dishes for friends'', ''Street photography'', ''Competing in trivia nights'', ''Playing board games with groups'']'
  career_goals: Shan aims to publish her debut literary novel within the next two years and secure a multi‑book contract for a series of educational children's titles that blend storytelling with curriculum
    standards. She plans to launch a quarterly literary magazine that highlights emerging voices from diverse urban communities, and to become a writer‑in‑residence at a Philadelphia university where she
    can mentor students and lead interdisciplinary writing workshops. Long‑term, Shan envisions delivering a TEDx talk on the power of narrative in education, contributing regularly to major cultural magazines,
    and establishing herself as a thought leader at the intersection of literature, pedagogy, and social change.
