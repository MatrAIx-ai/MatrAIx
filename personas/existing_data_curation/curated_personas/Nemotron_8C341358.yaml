personas:
  professional: Shan Collier, a 34‑year‑old writer‑educator based in Philadelphia, leverages a deep command of creative nonfiction, curriculum development, and grant‑writing to produce compelling manuscripts,
    design inclusive learning modules, and lead dynamic workshops; their outgoing yet competitively skeptical nature ensures each project is meticulously organized yet flexibly adapted to audience feedback,
    earning recurring funding from local arts councils and educational foundations.
  sports: Shan Collier, a devoted fan of the Philadelphia Eagles and regular participant in the City Run Club’s historic‑neighborhood 5K routes, balances a competitive streak on weekend trivia nights with
    pickup basketball games at the local recreation center and maintains a membership at a nearby climbing gym to channel restless energy.
  arts: Shan Collier immerses themselves in Philadelphia’s vibrant art scene, frequenting gallery openings featuring contemporary artists like Kerry James Marshall, performing at open‑mic poetry nights
    that echo the storytelling cadence of Lin‑Manuel Miranda, and curating a monthly literary salon that showcases emerging voices from the city’s diverse neighborhoods.
  travel: Shan Collier’s travel style blends meticulous planning with spontaneous weekend getaways, having explored the historic streets of New Orleans, the literary cafés of Dublin, and the cherry‑blossom
    festivals in Kyoto, while budgeting for a future cross‑country literary tour that aligns with their publishing timeline.
  culinary: Shan Collier’s kitchen experiments revolve around bold flavor pairings such as kimchi‑infused mushroom risotto, rosemary‑crusted lamb with spiced caramelized carrots, and saffron‑bright paella,
    showcasing a confident home‑chef skill set that delights friends at regular dinner‑party gatherings.
  core: Shan Collier is a relentlessly curious, competitively skeptical writer‑educator whose love of art, trivia, and experimental cooking fuels a meticulous yet adaptable approach to career, finance,
    and life.
background:
  cultural: Shan grew up in a middle‑class suburban family on the outskirts of Philadelphia, with Anglo‑Saxon and Irish heritage. Her parents emphasized education, community service, and exposure to the
    arts, leading her to attend local cultural institutions like the Philadelphia Museum of Art and the historic Reading Terminal Market from a young age. The city’s rich history, diverse neighborhoods,
    and vibrant progressive arts scene have shaped her liberal, arts‑focused worldview while she remains aware of the privileges inherent in her white, middle‑class background. This blend of traditional
    American values, European literary roots, and the dynamic urban culture of Philadelphia informs both her personal identity and her creative work.
