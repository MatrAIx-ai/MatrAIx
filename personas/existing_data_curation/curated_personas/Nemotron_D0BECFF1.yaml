personas:
  professional: Jhoanna Nales is a nonprofit program coordinator with a talent for bilingual outreach, meticulous grant writing, and community event planning, channeling their methodical reliability and
    cultural nuance into building inclusive services for seniors and cultural centers.
  sports: Jhoanna Nales enjoys playing co-ed softball with the Riverdale Ravens on Saturdays, and they follow the New York Yankees and the New York Knicks, while they walk the Hudson River Greenway year-round,
    using a Fitbit to track steps and staying disciplined about staying active.
  arts: Jhoanna Nales regularly visits the Riverdale Art Center, where they admire murals by Maria Torres, photographs by Alex Wong, street art by Shepard Fairey, attend jazz nights featuring the New York
    Jazz Collective, and love listening to recordings by Nina Simone, Stevie Wonder, and contemporary singer Lila Downs.
  travel: Jhoanna Nales favors immersive cultural trips, having explored Santa Fe's historic plaza, Oaxaca's vibrant markets, and San Antonio's River Walk, while they are drawn to a future visit to the
    colonial town of Guanajuato and a weekend retreat in the Catskills for restful hiking.
  culinary: Jhoanna Nales delights in preparing traditional holiday dishes like tamales de puerco, mole rojo, pozole with hominy, and salsa verde brimming with garden-grown chilies, cilantro, and tomatoes,
    and they pair them with fresh corn tortillas and cilantro-lime rice.
  core: Jhoanna Nales blends methodical organization with a warm community spirit, orchestrating events, garden-to-table feasts, and volunteer programs, while they occasionally lose track of time in their
    garden conversations.
background:
  cultural: Jhoanna is a first‑generation Mexican‑American who grew up in a household that blended Mexican traditions with Southern hospitality. She was raised speaking Spanish at home and English at school,
    and she celebrates cultural milestones such as Día de los Muertos, quinceañeras, and Mexican Independence Day alongside local community events in Riverdale. Her Catholic faith, family‑centered values,
    and love for Mexican music, dance, and cuisine are core to her identity. At the same time, she embraces the community spirit of Clayton County, participating in church activities, neighborhood gatherings,
    and volunteer initiatives that reflect regional Southern values of generosity and mutual support.
attributes:
