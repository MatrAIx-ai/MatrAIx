  hobbies: '[''Traditional Mexican cooking'', ''Gardening (vegetables and herbs)'', ''Reading historical fiction and Mexican literature'', ''Visiting local art exhibits and craft fairs'', ''Church choir
    singing'', ''Yoga'', ''Volunteer tutoring at the public library'', ''Walking her dog in the neighborhood'', ''Handcrafts (crocheting, DIY home décor)'']'
  career_goals: Jhoanna aspires to re‑enter the workforce in a part‑time or contract role that leverages her organizational talents and cultural expertise. She is working toward a certificate in nonprofit
    management so she can serve as a community program coordinator for a local cultural center or senior services organization in Riverdale. Long‑term, she hopes to launch a community kitchen that offers
    affordable Mexican cooking classes and nutrition workshops, preserving her heritage while providing a supportive gathering place for neighbors. She also aims to mentor younger volunteers, sharing her
    experience in grant writing and event planning.
