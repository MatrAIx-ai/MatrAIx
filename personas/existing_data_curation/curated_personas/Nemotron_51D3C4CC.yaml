  career_goals: Even at 80, Yon aims to transition from full‑time auditing to part‑time mentorship, serving as a volunteer advisor for the IRS VITA program to help low‑income seniors with tax filings. He
    also plans to join the board of the Edna Arts Council, leveraging his accounting acumen to ensure financial sustainability while promoting local artists. Additionally, he aspires to complete a series
    of “Art History for Beginners” classes at the community college, combining his love of learning with his appreciation for visual culture, and to author a reflection on ethical auditing practices for
    future generations.
