persona_description: A historian who specializes in the history of India, particularly the events leading up to the decision to make Delhi the capital of India in 1911. The historian has a deep understanding
  of British colonial rule in India and the role of the British government in shaping the country's political and cultural identity. The historian is also interested in the impact of the decision on the
  development of Delhi as a city and the role of Delhi in the country's history.
