  career_goals: Although she is only nine, Dawn Mae already dreams of a future where she can combine her love for problem‑solving with her competitive spirit. She hopes to become a robotics engineer or
    a space‑technology specialist, aiming to design robots that compete in national STEM challenges. She also envisions mentoring younger students in after‑school coding clubs, using her calm demeanor to
    guide them through projects. In the longer term, Dawn wants to pursue a career that lets her lead innovative teams, win science competitions, and make a tangible impact on her community, perhaps as
    a technology‑focused community organizer or a STEM educator.
