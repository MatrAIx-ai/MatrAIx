personas:
  professional: Dawn Jackson, a budding young coder at age nine, blends curiosity with practicality by designing well‑documented Scratch games and meticulously organizing their code, and they let their
    competitive streak drive them to refine each project until it outperforms their peers’ creations.
  sports: Dawn Jackson charges onto the field each Saturday with the Midtown Mavericks U9 soccer team, idolizing Manchester City’s attacking style and channeling that competitive energy into rigorous dribbling
    drills, while they also follow the local youth track club’s seasonal meets for cross‑training.
  arts: Dawn Jackson fuels their artistic side by sketching leaves in a nature journal, devouring graphic novels by Raina Telgemeier and Bryan Lee O’Malley, and mastering hip‑hop choreography from online
    videos of Beyoncé and Kendrick Lamar, allowing the rhythm of R&B to guide their creative flow.
  travel: Dawn Jackson dreams of swapping their local park maps for a trek through the Grand Canyon’s junior ranger program, yet they also cherish weekend trips to the nearby Lakeview Nature Reserve, planning
    each outing with a colorful scrapbook itinerary that balances school days with family budget constraints.
  culinary: Dawn Jackson enjoys assembling homemade pizza topped with mozzarella, pepperoni, and fresh basil, while they also snack on fruit‑kale smoothies and occasionally binge‑eat a whole bag of gummy
    bears, boasting a budding kitchen skill that shines most when they follow a step‑by‑step video to make rainbow‑colored macaroni and cheese.
  core: Dawn Jackson is a calm yet fiercely competitive nine‑year‑old whose love of puzzles, precise note‑taking, and spontaneous dance breaks give them a uniquely structured yet playful outlook on life.
background:
  cultural: Dawn Mae grows up in a close‑knit African‑American family in Manteca, California. Her parents emphasize the importance of education, community pride, and cultural heritage. She celebrates Juneteenth
    and Black History Month at school, participates in a local church youth group that teaches gospel music and storytelling, and attends community events hosted by the Central Valley Black Cultural Center.
    Her family shares stories of ancestors from the South, instilling a sense of resilience and perseverance. Through programs like Black Girls Code workshops at the nearby community center, Dawn has been
    encouraged to pursue STEM fields while staying rooted in her cultural identity, blending traditional values with modern aspirations.
