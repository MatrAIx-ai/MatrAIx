  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Reading contemporary literature'', ''Philosophy study'', ''Short essay writing'', ''Hiking'', ''Kayaking'', ''Nature photography'', ''Board games
    (small groups)'', ''Volunteering as art mentor for youth'']'
  career_goals: Jill aims to transition into a detective role specializing in community liaison and restorative justice, eventually becoming a training officer or sergeant who integrates arts‑based approaches
    into policing. She hopes to develop policies that improve mental‑health crisis response and foster stronger ties between law enforcement and the diverse communities of Spokane County.
