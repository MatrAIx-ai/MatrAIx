personas:
  professional: Thomas Corbett, a health services manager with a blend of arts-humanities insight and operational rigor, leverages their strong communication, critical-thinking, and cultural-competency
    skills to streamline workflows while fostering a collaborative, people-first culture that mirrors their organized, reliable, and sociable nature.
  sports: Thomas Corbett, an enthusiastic youth soccer coach and weekend kayaker on the St. Johns River, roots for the Orlando Magic and the Tampa Bay Buccaneers, and participates in local adult softball
    leagues, ensuring they stay fit through varied seasonal activities.
  arts: Thomas Corbett, a dedicated amateur actor and set designer, draws inspiration from Shakespeare's tragedies, Lin-Manuel Miranda's modern musical storytelling, and the visual stylings of Bob Dylan's
    album covers, regularly attends performances at the Dr. Phillips Center and the Orlando Museum of Art, and they often mentor newcomers in the theatre troupe.
  travel: Thomas Corbett, an organized traveler, prefers well-planned road trips to nearby Gulf Coast beaches like Clearwater and cultural city tours in Europe - most recently a week-long itinerary through
    Rome, Florence, and Barcelona - while budgeting for family vacations that balance adventure with the comfort of familiar hospitality, and they keep a travel journal to capture each experience.
  culinary: Thomas Corbett, a competent home chef, favors Mediterranean dishes such as grilled lamb with rosemary, tabbouleh with fresh parsley and pomegranate seeds, and expertly prepares homemade hummus,
    often pairing meals with a glass of crisp Sauvignon Blanc, and they love to experiment with fresh herbs and seasonal vegetables.
  core: Thomas Corbett, a 39-year-old health services leader, blends disciplined organization with a love for theater, community sports, and Mediterranean cooking, yet they can't resist a late-night Netflix
    binge after a day of budgeting and board meetings.
background:
  cultural: Thomas was born and raised in a middle‑class, Anglo‑American family in central Florida, with deep ties to the local community. His parents, both educators, emphasized the value of lifelong learning,
    civic responsibility, and appreciation for the arts. Growing up in Orlando, he was exposed to a diverse population and multicultural events, which shaped his inclusive outlook. His arts and humanities
    degree reinforced his interest in cultural narratives, while his professional role in health services deepened his commitment to serving a broad demographic, ranging from long‑time Florida residents
    to seasonal visitors.
attributes:
  skills: '[''Strategic Planning'', ''Financial Management'', ''Healthcare Operations'', ''Regulatory Compliance (HIPAA, CMS)'', ''Quality Improvement'', ''Data Analysis and Reporting'', ''Team Leadership
    and Staff Development'', ''Patient Experience Optimization'', ''Electronic Medical Records (EMR) Systems'', ''Cross-Cultural Communication'', ''Project Management'', ''Process Optimization'']'
  hobbies: '[''Amateur Theatre Acting & Set Design'', ''Coaching Youth Soccer'', ''Kayaking'', ''Reading (Classic Literature & Non-fiction)'', ''Book Club Participation'', ''Volunteering at Community Health
    Fairs'', ''Organizing Charity Runs'', ''Cooking Mediterranean Cuisine'', ''Traveling to Historical Sites'']'
  career_goals: Thomas aims to transition from departmental management to a senior executive role, such as regional health services director or chief operations officer within a large health system. He
    wants to lead system-wide initiatives that integrate digital health technologies, improve population health outcomes in Central Florida, and expand community outreach programs. He also plans to pursue
    an MBA and a certification in Healthcare Management to deepen his strategic influence.
