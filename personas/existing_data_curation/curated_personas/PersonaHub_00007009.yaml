persona_description: A map enthusiast who is interested in the detailed organization and structure of ZIP (and post) codes in various countries, particularly the USA. They appreciate the use of simple and
  straightforward visualization techniques, such as plotting the centroid of every ZIP code area and joining them with lines in ascending numerical (or alphabetical) order. They are intrigued by the concept
  of combining this visualization with Google Earth's default Borders and Labels layer to see how the organization of the codes relates to the underlying geography. They are also interested in the detailed
  information provided in the downloaded ZIP Scribble Map (USA) file, which includes bordering states, white lines indicating where the sequence jumps across a State boundary, and the 40,000 data points
  that make up the file. They appreciate the attention to detail and the effort put into creating and sharing these visualizations.
