persona_description: A researcher interested in the field of educational measurement, particularly in the design and analysis of examinee-selected-item (ESI) designs in educational testing. This researcher
  is familiar with the advantages and disadvantages of ESI designs, and has developed a framework to incorporate the proposed IRT model as a special case. They are interested in the application of IRT models
  to real data collected from a study involving 501 fifth graders taking two mandatory items and four pairs of dichotomous math items.
