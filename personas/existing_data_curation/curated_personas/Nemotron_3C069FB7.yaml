  hobbies: '[''acrylic painting'', ''sketching'', ''visiting art galleries'', ''street‑art tours'', ''listening to live music'', ''cooking Mexican cuisine'', ''biking along the bayou'', ''watching Houston
    Astros games'', ''DIY home‑improvement projects'']'
  career_goals: Nestor aims to transition from a subcontractor to the owner of a boutique painting and mural business that specializes in artistic residential projects with Mexican cultural motifs. He plans
    to earn OSHA safety certification and attend workshops on eco‑friendly paints and advanced decorative techniques. Driven by his competitive streak, he wants to build a reputation as one of Houston's
    top muralists, secure a steady flow of high‑profile clients, and eventually hire a small crew while maintaining the flexibility he values.
