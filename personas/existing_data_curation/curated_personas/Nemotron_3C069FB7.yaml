personas:
  professional: Nestor Dufka is a seasoned painter and paperhanger who blends meticulous surface preparation with bold, abstract color experiments, and they leverage their curiosity and relaxed approach
    to deliver artistic residential murals while juggling client briefs in a low‑bureaucracy, flexible workflow.
  sports: Nestor Dufka spends Saturday mornings cycling the Buffalo Bayou Trail with the Bayou Bike Club, they cheer the Houston Astros at Minute Maid Park, and they occasionally join a pickup basketball
    game at the local recreation center, using these activities to counterbalance the sedentary nature of their painting work.
  arts: Nestor Dufka’s creative pulse is fueled by the vibrant murals of Diego Rivera, the abstract canvases of Wassily Kandinsky, and live performances by local indie band The Oh Hellos, and they channel
    these influences into their own acrylic experiments and gallery visits.
  travel: Nestor Dufka prefers weekend road trips that blend art and nature; they dream of a sunrise sketch session at Santa Fe’s Canyon Road while also budgeting wisely enough to revisit the vibrant street‑art
    scene of Oaxaca, and they occasionally plan a low‑cost backpacking stint through the historic streets of Lisbon.
  culinary: Nestor Dufka enjoys hand‑rolling tacos al pastor and slow‑cooking tamales, they boast a solid intermediate cooking skill set that mixes traditional corn‑masa techniques with experimental flavor
    pairings like roasted poblano and smoked chipotle, and they occasionally pair meals with a cold craft IPA.
  core: Nestor Dufka is a color‑obsessed craftsman whose restless curiosity drives bold mural projects, even as a perpetual late‑task starter battles anxiety and they love tacos, fueling nightly kitchen
    experiments.
background:
  cultural: Nestor grew up in a Mexican‑American household in Houston, where Spanish and English intermix daily. Family gatherings centered around food, music, and storytelling, reinforcing a strong sense
    of community and pride in his heritage. He draws artistic inspiration from Mexican muralists like Diego Rivera, integrating cultural symbols and vibrant palettes into his work. While he embraces the
    multicultural backdrop of Houston, he also maintains traditional customs such as celebrating Día de los Muertos and participating in local cultural festivals.
attributes:
  skills: '[''wall preparation'', ''surface priming'', ''interior painting'', ''exterior painting'', ''paper hanging'', ''taping and masking'', ''color matching'', ''custom texture finishes'', ''basic carpentry
