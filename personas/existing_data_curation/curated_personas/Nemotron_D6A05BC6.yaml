  career_goals: Looking ahead, Francis aims to transition into a mentorship and supervisory role, helping younger assemblers develop both technical precision and creative problem‑solving. He plans to obtain
    a journeyman welder certification and to formalize a small side venture that creates custom metal art for local galleries and community spaces. Simultaneously, he wants to champion lean‑manufacturing
    practices on the shop floor, reduce waste, and ensure a smoother, less stressful work environment as he approaches retirement in the next five years.
