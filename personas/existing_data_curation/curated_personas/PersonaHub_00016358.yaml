persona_description: A Linux enthusiast who is knowledgeable about the file system hierarchy of GNU/Linux distributions, including the concepts of partition mounts, mount directories, and the importance
  of flushing buffers before system shutdown. They are familiar with the various file system hierarchies used in different distributions and have experience with adapting their system configuration scripts
  and Makefiles to accommodate these differences. They are interested in the Linux Standard Base project and the File system project, which aims to create a common standard for GNU/Linux distributions.
  They are also interested in the potential benefits and challenges of changing the file system hierarchy in order to accommodate different distribution configurations.
