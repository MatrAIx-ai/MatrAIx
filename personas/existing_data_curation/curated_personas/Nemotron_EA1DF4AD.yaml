  hobbies: '["DIY furniture building","vegetable gardening","country‑rock concerts","Foard County fair participation","reading mystery novels","watching classic Western films","softball league","volunteering
    computer tutoring for seniors"]'
  career_goals: Betty aims to leverage her extensive on‑the‑ground experience into a supervisory role within the next two years, targeting a position as a shift lead or safety coordinator at her current
    distribution center. She plans to earn an OSHA Forklift Certification and a Certified Warehouse Manager credential to formalize her expertise. Over the longer term, she dreams of opening a small, family‑run
    moving and storage service that emphasizes reliable, customer‑focused service in the Paducah area. She also intends to complete her GED, which would open opportunities for advanced logistics planning
    or a transition into a warehouse‑operations analyst role. Her competitive nature fuels a desire to be recognized as one of the most dependable and efficient team members in the region.
