  career_goals: He aims to advance into a supervisory role within casino security, eventually becoming a Surveillance Manager overseeing a team and shaping security policies. To support this, he plans to
    complete a bachelor’s degree in criminal justice, obtain certification as a Certified Protection Professional (CPP), and develop expertise in cyber‑security aspects of surveillance. Long‑term, he envisions
    starting his own boutique security consulting firm that advises small‑scale gaming venues on risk mitigation, while also dedicating time to curating community art exhibitions that reflect his love for
    visual culture.
