personas:
  professional: Robin Moya, a seasoned engineering technologist with more than 35 years of experience, combines deep CNC programming, SolidWorks, and AutoCAD expertise with a talkative, mentorship‑focused
    style; they excel at translating complex precision‑machining concepts into clear training modules, lead predictive‑maintenance initiatives, and negotiate cross‑functional project timelines while tolerating
    a relaxed, sometimes disorganized approach to scheduling, all in service of a senior advisory role that will shape company‑wide engineering standards and nurture a community makerspace.
  sports: Robin Moya enjoys moderate hikes along the Bridger Mountains, participates in the Bozeman Hikers Association, avidly follows the Montana State Bobcats football team and the Denver Broncos, occasionally
    joins a recreational bowling league, and uses cardio trekking as both exercise and reflective time, while their talkative nature makes game‑day brunches a social staple.
  arts: Robin Moya regularly attends live‑music performances at Bozeman’s Fox Theater, delights in folk‑rock acts like the local band The High Plains, enjoys community theater productions of classics such
    as 'Our Town', and reads historical mystery novels by C.J. Sansom and Ellis Peters, letting the narrative intrigue and melodic storytelling weave into their creative expression through knitting and
    quilting.
  travel: Robin Moya favors spontaneous road trips in a trusty SUV, has explored Yellowstone and the Grand Tetons, dreams of touring the Scottish Highlands to chase the castles of historical mystery novels,
    prefers flexible itineraries over rigid plans, and budgets travel around their retirement savings while traveling with their spouse.
  culinary: Robin Moya cooks with a pragmatic yet adventurous palate, often using fresh garden vegetables to craft hearty stews, roasted root vegetable medleys, and sourdough bread, delights in adding locally
    sourced Montana cheese to a creamy mushroom risotto, and treats weekly Saturday evenings to a homemade shepherd’s pie seasoned with rosemary and thyme, reflecting a moderate cooking skill level and
    a love for comfort food.
  core: Robin Moya, a talkative 62‑year‑old engineering veteran, blends curiosity with practicality, worries about skill gaps, and finds balance in community gardening, bridge nights, and sustainable making.
background:
  cultural: Robin’s cultural background is rooted in a Midwestern American upbringing, with her family originally from Iowa where practical problem solving, community reciprocity, and a strong work ethic
    were central values. Relocating to Bozeman in her thirties, she embraced the Rocky Mountain culture of outdoor stewardship, self‑reliance, and a collaborative, small‑town spirit. As a white American
    woman in a historically male‑dominated technical field, she has been shaped by progressive regional attitudes that promote gender equity and environmental consciousness. This blend of Midwestern pragmatism,
    frontier openness, and the inclusive, eco‑focused ethos of Bozeman informs her worldview—balancing respect for established methods with a curiosity for innovative ideas, while prioritizing harmony and
    service to her community.
