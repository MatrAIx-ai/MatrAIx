  career_goals: Kevin aims to transition from conventional engineering projects to a boutique consulting practice focused on sustainable infrastructure and eco‑friendly product development for local farms
    and small‑scale renewable energy initiatives. He hopes to leverage his imaginative mindset to create visionary design concepts that blend functionality with aesthetic appeal, while also fostering community
    collaboration. Over the next five years, he intends to earn a certification in green building (LEED) and mentor younger engineers, ultimately achieving a balance between professional fulfillment and
    personal well‑being.
