  career_goals: Michaelangelo aspires to turn his love for art into a future career. He hopes to study graphic design or illustration in high school and eventually attend a university program in visual
    arts or architecture. He also dreams of creating community art projects that bring together his friends and local residents, and envisions mentoring younger kids in creative workshops. Additionally,
    he is curious about combining art with technology, like game design or interactive media.
