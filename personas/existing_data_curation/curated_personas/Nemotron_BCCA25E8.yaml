personas:
  professional: Michaelangelo Ortiz is an aspiring junior illustrator who blends a curious, organized‑yet‑flexible mindset with a love for storytelling, turning water‑color landscapes and cartoon sketches
    into vivid narratives while collaborating with drama‑club friends to brainstorm visual ideas for school projects.
  sports: Michaelangelo Ortiz is a spirited midfielder for the Riverton Middle School Tigers soccer team and a member of the local Riverton Soccer Club, cheering on the LA Galaxy in the MLS, carving out
    weekend sprint drills on the Green River trails, and complementing the season with a summer baseball camp and occasional indoor ice‑skating to stay agile.
  arts: Michaelangelo Ortiz is a budding visual storyteller who fills sketchbooks with cartoon strips inspired by Charles Schulz and Hayao Miyazaki, paints watercolors echoing Claude Monet’s serene palettes,
    constructs elaborate LEGO sculptures as three‑dimensional canvases, and lights up the school stage through drama‑club performances that draw creative energy from the musical numbers of Lin‑Manuel Miranda.
  travel: Michaelangelo Ortiz loves weekend hikes along the Green River but dreams of backpacking through the Grand Canyon, exploring the interactive exhibits at Washington, D.C.’s National Air and Space
    Museum, and strolling through Kyoto’s cherry‑blossom‑lined streets, planning each adventure with their parents using colorful maps and a travel journal while balancing school commitments and a modest
    family budget.
  culinary: Michaelangelo Ortiz enjoys crafting simple meals like spaghetti Bolognese with fresh basil, assembling sushi‑style rice bowls topped with avocado and soy sauce, and blending rainbow fruit smoothies
    featuring strawberries, blueberries, and mango, often cooking side‑by‑side with a parent in the kitchen while the soundtrack of Pixar’s latest film plays in the background.
  core: Michaelangelo Ortiz is a curiosity‑driven 12‑year‑old who balances a love for intricate LEGO builds and soccer drills with a habit of doodling cartoon sketches in the margins of school notebooks,
    often staying up late to finish a Minecraft world before finally remembering to do homework.
background:
  cultural: Michaelangelo grew up in Riverton, Wyoming, a small town with a strong sense of community and deep connections to the surrounding plains and the nearby Wind River Reservation. His family, primarily
    of European descent with Italian roots, emphasizes American frontier values such as self‑reliance, appreciation for the outdoors, and community service. They also respect and occasionally participate
    in local Indigenous cultural events, which has fostered an awareness of the region’s diverse heritage. These influences, combined with his school’s multicultural programs, shape his open‑minded outlook
    on art and culture.
