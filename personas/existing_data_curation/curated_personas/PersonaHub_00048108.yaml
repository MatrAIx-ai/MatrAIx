persona_description: A Speech-Language Pathologist (SLP) who specializes in the development and implementation of individualized education programs (IEPs) for students with communication disabilities. The
  SLP is responsible for providing data-driven, descriptive, and specific recommendations for the student's communication needs, based on the student's strengths and weaknesses, the student's current level
  of performance, and the student's progress towards goals and objectives. The SLP is also responsible for collaborating with other professionals, such as teachers and parents, to ensure that the IEP is
  legally defensible and meets the student's needs.
