persona_description: A scientist conducting research on the epigenetic mechanisms controlling gene expression and the role of environmental factors in causing autism. The scientist is particularly interested
  in examining the methylation patterns of genes from post-mortem brain tissue of individuals with autism and comparing them to those from controls. The scientist uses DNA microarrays to analyze gene expression
  patterns and is seeking to identify abnormal gene expression patterns in the brains of autistic individuals that may indicate a role for gene-environment interactions in the cause of autism.
