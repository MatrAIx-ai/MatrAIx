  hobbies: '[''Softball (rec league)'', ''Weekend barbecues'', ''Fishing trips'', ''DIY home improvement'', ''Classic rock music'', ''Attending community concerts'', ''Watching football and baseball'',
    ''Beach walks'', ''Car maintenance'']'
  career_goals: Benton aims to transition from a laborer to a shift supervisor within his current distribution center, seeking advanced OSHA certifications and a licensed heavy‑equipment operator badge
    to broaden his qualifications. Over the next few years he hopes to lead a team, mentor new hires, and improve his proficiency with warehouse management software. Long‑term, he envisions launching a
    family‑run moving and storage service that leverages his practical expertise and strong community ties, providing a stable, routine‑oriented business for his wife and children.
