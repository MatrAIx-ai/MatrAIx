  career_goals: Jaylon aims to transition into a technical leadership role within the next three years, targeting positions such as Lead Engineer or Engineering Manager where he can shape architecture and
    guide cross‑functional teams. He plans to earn industry certifications in AWS Solutions Architecture and DevOps to deepen his cloud expertise. Parallel to his career growth, he intends to launch a community‑focused
    SaaS platform that provides affordable tutoring resources for underserved students in Prince George’s County. Mentoring Black youth entering tech remains a core ambition; he hopes to expand his outreach
    by establishing a local coding bootcamp partnership with schools and churches.
