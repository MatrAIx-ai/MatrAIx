personas:
  professional: Jaylon Weston, a 44-year-old full-stack software developer with over two decades of experience, writes clean JavaScript and Python code, orchestrates Docker-based micro-services on AWS and
    Azure, leads Agile teams through meticulous code-review sessions, and is strategically positioning himself for a lead engineering or engineering-manager role while pursuing AWS Solutions Architecture
    certification.
  sports: Jaylon Weston plays forward in a neighborhood basketball league, frequents pick-up games at the local park, follows the Washington Wizards and the Maryland Terrapins with enthusiastic loyalty,
    hikes the Patuxent Research Refuge trails for cardio endurance, and joins a recreational soccer group each spring to diversify his fitness routine.
  arts: Jaylon Weston curates eclectic playlists that blend John Coltrane, Erykah Badu, and Kendrick Lamar, occasionally DJs at community heritage festivals, attends live jazz nights at the local music
    hall, enjoys off-Broadway productions at the Kennedy Center, and collects vintage vinyl records as a tactile reminder of analog artistry.
  travel: Jaylon Weston prefers structured trips that combine professional growth and leisure, attending tech conferences in Washington, D.C., and annually piloting weekend getaways to Baltimore's Inner
    Harbor, while dreaming of a cultural immersion tour of Japan's tech hubs and sushi districts, and cherishes occasional family vacations to the Caribbean islands for beach relaxation.
  culinary: Jaylon Weston is an intermediate home grill master who perfects smoked brisket with a sweet-brown-sugar-chili rub, experiments with bourbon-infused BBQ sauces for pulled pork, and enjoys crafting
    side dishes like honey-glazed collard greens and corn pudding, often sharing the feast with extended family on Sundays.
  core: Jaylon Weston blends methodical tech leadership ambitions with a love for community basketball, DJ-curated jazz-hip-hop playlists, and experimental BBQ, while juggling disciplined finances, vigilant
    health monitoring, and a persistent drive to mentor the next generation of coders.
background:
  cultural: Jaylon grew up in the vibrant Black community of Prince George’s County, where church, family, and neighborhood ties shaped his values of resilience, cooperation, and community service. His
    parents emphasized education and self‑improvement, encouraging him to pursue technology despite only a high‑school diploma. He draws strength from African‑American cultural traditions, celebrating Juneteenth,
    participating in local Black heritage festivals, and staying connected to the broader DC Black arts scene. This cultural foundation fuels his commitment to mentor the next generation of Black technologists
    and to give back through community outreach, while also informing his collaborative and assertive work style.
