  career_goals: Though retired from formal employment, Anantha remains driven by a desire to give back and to preserve her heritage. She hopes to mentor emerging women entrepreneurs in the South Asian community,
    sharing her budgeting and planning know‑how while emphasizing ethical, people‑focused business practices. She aims to organize intergenerational art workshops at the Barrington senior center, creating
    a space where seniors and youth can explore creativity together. A personal ambition is to author a memoir that weaves together family recipes, stories of migration, and reflections on a life guided
    by kindness and harmony. Additionally, she wishes to serve on the board of a local arts nonprofit to advocate for inclusive programming and to champion mental‑health resources for seniors dealing with
    anxiety.
