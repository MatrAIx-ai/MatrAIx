  hobbies: '[''woodworking'', ''classic‑car restoration'', ''fishing'', ''target shooting'', ''historical society volunteering'', ''county fair attendance'']'
  career_goals: Richard aims to advance to a lead machine operator or production supervisor role where he can shape daily workflow, mentor a team, and drive efficiency initiatives across the shop floor.
    He plans to obtain a journeyman certification in CNC machining and complete a Lean Six Sigma Yellow Belt to formalize his process‑improvement skills. Long‑term, he envisions leveraging his routine‑focused
    work ethic to become a safety and quality consultant for regional manufacturers, helping them implement standardized procedures while preserving the stable, reliable environment he values.
