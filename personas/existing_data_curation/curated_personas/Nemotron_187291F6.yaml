personas:
  professional: Myah Perr is a budding junior artist in preschool, channeling their love for drawing animals and nature into organized art projects while delighting classmates with confident presentations
    and meticulous attention to detail.
  sports: Myah Perr thrives in the neighborhood soccer clinic and springtime gymnastics class, proudly cheering for the local baseball team the Springfield Cardinals while regularly playing tag and Duck,
    Duck, Goose during recess, balancing structured practice with free‑form playground fun.
  arts: Myah Perr immerses themselves in the colorful worlds of Disney's Frozen, The Wiggles, and Pixar’s Toy Story, eagerly recreating scenes with crayons and LEGO while singing along to Raffi's 'Baby
    Belugaboo' and mimicking favorite animated characters during playtime.
  travel: Myah Perr prefers family road trips to nearby national parks like Yellowstone, where they can explore nature trails and collect pinecones, but also dreams of a future visit to Disney World in
    Orlando, balancing structured itineraries with spontaneous stops at roadside ice‑cream stands.
  culinary: Myah Perr loves homemade macaroni and cheese topped with a sprinkle of cheddar, enjoys fruit‑filled yogurt parfaits with granola, and proudly helps stir batter for birthday cupcakes, though
    they are notorious for sneaking extra chocolate chips when no one looks.
  core: Myah Perr is a structured, talkative six‑year‑old who channels boundless energy into organized art, lively sing‑alongs, and meticulous savings, all while occasionally forgetting to brush teeth after
    an exciting playdate.
background:
