  hobbies: '[''Attending art galleries and music festivals'', ''Community theater participation'', ''Fusion cooking (South Asian & Tex‑Mex)'', ''Yoga and mindfulness practice'', ''Hiking in the Texas Hill
    Country'', ''Reading philosophy and contemporary art'', ''Learning Spanish'', ''Hosting board‑game gatherings'']'
  career_goals: Chetna aims to expand her impact beyond one‑on‑one tutoring by establishing a community learning hub in Austin that blends academic support with arts, cultural workshops, and mental‑wellness
    programs. She plans to earn a Master’s in Educational Leadership to become an instructional coach for schools seeking to embed inclusive, project‑based curricula. Long‑term, she envisions launching
    an online platform that offers flexible, stress‑aware tutoring services and resources for teachers to incorporate creative, interdisciplinary methods while maintaining student wellbeing.
