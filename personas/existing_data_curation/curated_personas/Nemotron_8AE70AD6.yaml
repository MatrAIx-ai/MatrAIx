  career_goals: Manuel aims to leverage his hands‑on experience into a supervisory or logistics coordination role within the next two to three years. To that end, he plans to obtain an official forklift
    certification, complete a certified safety manager program, and pursue coursework in supply chain analytics. He also aspires to integrate his artistic interests by building a portfolio of photography
    and sketches that could support a side venture—such as a small pop‑up gallery or freelance visual documentation for local businesses. Balancing stability with creative fulfillment, he envisions a career
    path that combines operational leadership with opportunities to curate and showcase visual art, while continuing to develop personal coping strategies for anxiety through mindfulness and community engagement.
