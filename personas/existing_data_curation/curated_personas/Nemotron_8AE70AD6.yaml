personas:
  professional: Manuel Ruano, a 24‑year‑old warehouse logistics specialist in Sarasota, leverages their forklift certification, meticulous inventory tracking, and bilingual communication to streamline shipments
    while infusing a photographer’s eye into layout optimization, a habit born from their curiosity and love of visual storytelling.
  sports: Manuel Ruano, an occasional weekend runner who joins the Sarasota Coastal Trail Running Club and plays casual beach volleyball, roots for the Tampa Bay Buccaneers in the NFL and follows the Florida
    Gulf Coast Eagles basketball team, and they keep their fitness routine balanced with a love for outdoor exploration.
  arts: Manuel Ruano nurtures their creative side through DSLR photography of Sarasota’s murals, mixed‑media sketches inspired by folk motifs, and frequent visits to gallery openings featuring artists like
    Jeff DeGraff and Ana M., while they unwind to a playlist that swings from Vallenato and salsa to indie folk.
  travel: Manuel Ruano prefers low‑key road trips along Florida’s Gulf Coast, weekend escapes to the historic streets of Cartagena for vibrant street‑art photography, and occasional visits to New Orleans
    during Mardi‑gras, planning each itinerary on a modest budget while they blend adventure with cultural immersion.
  culinary: Manuel Ruano, an avid home cook, blends traditional dishes like bandeja paisa and shrimp‑filled empanadas—enhanced with local Florida grouper and fresh mango salsa—while experimenting with guajillo
    pepper and cilantro to create fusion meals they proudly share at neighborhood potlucks.
  core: Manuel Ruano is a meticulous logistics specialist who channels their intense anxiety into mindful meditation, balances a love for DSLR photography and folk‑inspired sketches with a steady pursuit
    of warehouse leadership, and often finds solace in cooking spicy comfort food for their close circle.
background:
  cultural: Manuel was raised in a Colombian‑American household where Spanish was spoken daily and family gatherings centered around music, food, and storytelling. He celebrates Colombian holidays such
    as Día de la Independencia and Carnaval de Barranquilla, often preparing traditional meals and sharing them with friends. His identity blends the warmth of Colombian communal values with the laid‑back,
    multicultural vibe of Sarasota, Florida. He maintains strong ties with the local Colombian diaspora, participating in cultural events at the community center and supporting fellow immigrants. This bicultural
    experience informs his worldview, fostering respect for diverse perspectives while grounding him in his heritage.
