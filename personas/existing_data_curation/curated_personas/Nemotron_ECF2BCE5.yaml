personas:
  professional: Teena Shore, a four‑year‑old pretended architect, spends afternoons designing elaborate blanket forts with meticulous layouts, channeling their vivid imagination and methodical planning
    into every corner while courteously inviting sibling guests and insisting on clean-up rituals that highlight their reliable and kind nature.
  sports: Teena Shore, a four‑year‑old, dabbles in the Tiny Turtles Preschool Soccer league on Saturday mornings, proudly waves a Springfield Spiders baseball cap while watching games on the family TV,
    and delights in splashing at the neighborhood pool for extra cardio, blending structured play with a love for local team spirit.
  arts: Teena Shore, a four‑year‑old with a vivid imagination, spends afternoons sketching whimsical Dr. Seuss‑style creatures using neon crayons, sings along to Raffi’s Baby Beluga, and proudly displays
    a hand‑painted portrait of their favorite character from Sesame Street, showing how artistic exploration fuels their inner world.
  travel: Teena Shore, age four, loves short family getaways like a weekend at the local beach resort with their beloved stuffed rabbit, eagerly points out the giraffes at San Diego Zoo, dreams of a future
    trip to Disneyland, and prefers itineraries that include ample nap time and familiar snacks, reflecting a blend of curiosity and need for comfort.
  culinary: Teena Shore, a four‑year‑old, favors creamy macaroni‑and‑cheese, brightly colored dinosaur‑shaped chicken nuggets, and applesauce, can skillfully stir a pot of cocoa with a wooden spoon but
    often leaves a trail of milk splashes on the floor, illustrating a mix of budding culinary confidence and adorable mess‑making.
  core: Teena Shore, a four‑year‑old with a boundless imagination, methodical fort‑building, disciplined piggy‑bank habit, mild allergies, and a love for crayons and dinosaurs, navigates the world with
    quiet kindness, occasional candy impulsivity, and a penchant for organized chaos.
background:
  cultural: Teena Marie is raised in a white, middle‑class family in the small town of Concrete, Washington, nestled in the Pacific Northwest. Her upbringing reflects the region's deep appreciation for
    nature, with frequent family outings to forests, streams, and coastal areas that foster her love of the outdoors. The community values environmental stewardship, self‑reliance, and participation in
    local arts and festivals. Her family celebrates typical American holidays and places a strong emphasis on early education and kindness. Through preschool activities, she has been introduced to the cultural
    heritage of local Indigenous peoples, though her primary cultural identity aligns with mainstream American traditions of a rural Pacific Northwest setting.
attributes:
  skills: '["Imaginative storytelling with toys", "Basic drawing and coloring", "Letter recognition (A‑Z)", "Sorting and organizing objects by color and shape", "Solving simple jigsaw puzzles (up to 24
    pieces)", "Cooperative play with peers", "Following daily routines reliably"]'
  hobbies: '["Drawing and coloring", "Building block structures", "Pretend play (doll tea parties)", "Listening to music (classical and children''s songs)", "Reading picture books", "Nature walks and leaf/
    shell collection", "Simple science experiments (e.g., baking soda and vinegar)"]'
  career_goals: Even at four, Teena Marie dreams of a future where she can create beautiful things and explore new ideas. She often says she wants to be an artist who paints bright pictures, a writer of
    storybooks, or a scientist who discovers hidden wonders in nature. She is fascinated by the night sky and imagines becoming an astronaut, and she also envisions herself caring for animals as a wildlife
    researcher. Her overarching ambition is to keep learning, stay curious, and make work that brings joy and harmony to others.
