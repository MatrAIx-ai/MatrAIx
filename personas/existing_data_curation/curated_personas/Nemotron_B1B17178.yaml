    "Zoonotic disease surveillance", "Emergency animal care", "Recordkeeping and compliance"]'
  hobbies: '["Hiking on Columbia River trails", "Gardening", "Volunteering at animal shelter", "Leading pet health workshops", "Weekly aerobics class", "Bridge club at community center", "Reading mystery
    novels", "Making homemade preserves", "Animal photography"]'
  career_goals: Cynthia aims to solidify her clinic as a model of efficiency and reliability, introducing standardized protocols that minimize variability and enhance patient outcomes. She plans to mentor
    a new generation of veterinarians and veterinary technicians, sharing her practical, step‑by‑step approach. Over the next five years, she hopes to launch a community outreach program focused on preventive
    care for local livestock owners and to serve on the board of the regional veterinary association, positioning herself as a trusted voice on animal health and zoonotic disease prevention. As she approaches
    retirement, she also seeks to develop a succession plan that allows her practice to continue serving the community with the same routine and compassionate care.
