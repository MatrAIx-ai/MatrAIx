  hobbies: '[''Hiking'', ''Fishing'', ''Woodworking'', ''Reading Non-fiction'', ''Volunteer at Community Food Bank'', ''Landscape Photography'', ''Playing Acoustic Guitar'']'
  career_goals: In the next few years, Wilson aims to earn an associate degree in business administration and complete a retail management certification, positioning himself for promotion to store manager.
    He also plans to spearhead community outreach initiatives at his workplace, such as partnerships with local schools and food banks, to foster stronger neighborhood ties. Long-term, he aspires to become
    a district or regional manager for a retail chain, or eventually open his own community-focused boutique that emphasizes sustainable sourcing and fair employment practices. Throughout, he remains committed
    to developing his leadership capabilities while maintaining a balance that protects his mental well‑being.
