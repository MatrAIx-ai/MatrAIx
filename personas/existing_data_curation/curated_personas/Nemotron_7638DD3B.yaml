personas:
  professional: Ofelia Kuoch is an aspiring young marine biologist who loves discovering ocean life, channeling their curiosity and love of swimming into school science projects and beach explorations,
    while their organized yet flexible nature helps them keep a notebook of observations.
  sports: Ofelia Kuoch dives into the local pool as part of the Huntington Beach Junior Swim Club, cheering for the Los Angeles Lakers and LA Galaxy as favorite professional teams, and they spend weekends
    building sandcastles that double as informal exercise in balance and core strength.
  arts: Ofelia Kuoch fills their sketchbooks with bright carnival‑inspired drawings, crafts intricate bead bracelets, and they watch Studio Ghibli films and performances by the Disney princesses, drawing
    artistic inspiration from the likes of Hayao Miyazaki and the pop‑art splash of Yayoi Kusama.
  travel: Ofelia Kuoch loves family road trips to the San Diego Zoo and a weekend stay at Disneyland, and they dream of visiting the Great Barrier Reef to see coral up close, preferring trips with a clear
    schedule and plenty of playtime over long, unstructured journeys.
  culinary: Ofelia Kuoch enjoys helping prepare family recipes like coconut‑infused rice and grilled fish, with mango‑sticky rice as their favorite snack, and they can whip up a quick peanut‑butter banana
    sandwich all by themselves, though they occasionally leave a trail of flour on the kitchen counter.
  core: Ofelia Kuoch is a curiosity‑driven 7‑year‑old who blends artistic flair, scientific wonder, and a disciplined allowance habit into a lively, occasionally messy, but always upbeat daily routine.
background:
  cultural: 'Ofelia is a second‑generation Southeast Asian American, with her family roots tracing back to Vietnam. Her household blends Californian beach life with Vietnamese traditions: celebrating Tet
    with red lanterns and traditional foods, speaking both English and some Vietnamese at home, and attending community events at Little Saigon in nearby Garden Grove. The family values education, community
    service, and preserving cultural heritage, which is reflected in their participation in cultural dance performances and cooking classes. Growing up in Huntington Beach, Ofelia also embraces the coastal
    lifestyle—surf culture, beach clean‑ups, and marine conservation—while maintaining a strong connection to her family''s Southeast Asian customs.'
