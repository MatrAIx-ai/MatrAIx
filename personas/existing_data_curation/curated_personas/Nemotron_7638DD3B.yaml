  career_goals: Inspired by her love of art, science, and helping others, Ofelia dreams of becoming an artist‑engineer who designs playful learning spaces for children. She imagines creating colorful murals
    that tell stories about her family's heritage, and inventing interactive toys that teach science concepts. In the longer term, she hopes to work in a museum or community center where she can combine
    creativity, education, and cultural celebration to make learning fun and inclusive for all children.
