personas:
  professional: Nellrose Happy, a budding digital illustrator, blends sketching of Nevada’s desert horizons with indie music inspirations, channeling their curiosity into experimental tablet art while navigating
    school projects with a delightfully disorganized, flexible workflow.
  sports: Nellrose Happy enjoys weekend hikes with the Winnemucca Trail Crew, follows the Nevada Wolf Pack basketball team, roots for the Los Angeles Lakers, and dabbles in middle‑school cross‑country,
    preferring low‑key cardio over organized team sports yet displaying a competitive streak when timing runs.
  arts: Nellrose Happy immerses themselves in the works of indie musicians like Phoebe Bridgers and Tame Impala, devours graphic novels by Adrian Tomine, frequents community art workshops where they experiment
    with watercolor and digital collage, and curates meme‑style video edits inspired by TikTok creator Sarah Cooper.
  travel: Nellrose Happy’s travel dreams combine spontaneous road trips to the otherworldly sand dunes of Great Basin National Park, weekend camping at Lake Tahoe’s Emerald Bay, and a future wish‑list to
    explore the moody fjords of Iceland after saving up through part‑time odd jobs.
  culinary: Nellrose Happy favors hearty desert‑inspired meals like green chile stew with corn tortillas, loves whipping up quick avocado toast topped with feta and chili flakes, and indulges in midnight
    snack runs for bubble tea flavored with lychee, all while boasting adequate cooking skills for simple pantry experiments.
  core: Nellrose Happy is a curious, art‑obsessed teen who roams desert trails, juggles a chaotic allowance, tackles mild allergies with a laid‑back attitude, and curates memes between sketchbooks and video
    games.
background:
  cultural: Nellrose comes from a White American family with roots in the Midwest, who relocated to Winnemucca, Nevada, for work in the mining and agricultural sectors. Growing up in a small, close‑knit
    town, she experiences a blend of traditional western community values—such as self‑reliance, appreciation for the outdoors, and local fairs—and contemporary youth culture driven by internet media and
    music. Her school environment provides exposure to diverse perspectives, but her daily life is shaped by the desert landscape, regional traditions, and the practical, hands‑on ethos of rural Nevada.
attributes:
  skills: '[''Watercolor painting'', ''Sketching'', ''Digital illustration (Procreate)'', ''Creative writing (poetry and short stories)'', ''Scratch programming'', ''Introductory Python'', ''Photography'',
