  hobbies: '[''Sketching desert landscapes'', ''Listening to indie/alternative music'', ''Hiking'', ''Playing ukulele'', ''Writing poetry'', ''Online multiplayer gaming'', ''Digital art and meme creation'',
    ''Volunteer work at animal shelter'']'
  career_goals: She hopes to turn her love for visual storytelling into a career as a concept artist or graphic designer, ideally studying at an art‑focused college after high school. Nellrose also dreams
    of creating independent video games where she can blend her artistic and coding skills. In the longer term, she imagines working on interdisciplinary projects that combine art, technology, and environmental
    themes, perhaps in a creative role for a nonprofit focused on desert conservation.
