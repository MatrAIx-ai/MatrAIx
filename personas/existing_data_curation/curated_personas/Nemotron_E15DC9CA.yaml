  hobbies: '["sketching", "soccer", "beachcombing", "LEGO building", "reading adventure books", "basic science experiments", "listening to Puerto Rican music", "dancing", "attending festivals", "cooking
    with family (making mofongo)"]'
  career_goals: Narciso dreams of turning his love for the ocean and science into a career as a marine biologist or environmental engineer, hoping to protect the coral reefs around Puerto Rico. At the same
    time, his passion for art fuels an ambition to become a graphic designer or video‑game developer, where he can blend storytelling, visual creativity, and technology. He also hopes to give back to his
    community by leading youth art workshops and environmental clean‑up projects, combining his collaborative spirit with his desire to make a positive impact.
