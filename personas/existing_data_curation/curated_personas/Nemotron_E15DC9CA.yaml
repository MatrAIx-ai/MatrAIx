personas:
  professional: Narciso Calderon, an aspiring junior wildlife illustrator with a talent for detailed animal sketches, blends their curious mind and methodical planning to create comic‑style drawings that
    often feature Caribbean landscapes and imaginative adventure stories.
  sports: Narciso Calderon, a passionate soccer player for the local Carolina Youth Soccer Club, cheers for the Puerto Rico national team, and spends summer weekends playing beach volleyball with friends
    at the mangroves while also collecting seashells as post‑game trophies.
  arts: Narciso Calderon, a budding artist, fills sketchbooks with animal portraits and vibrant seascapes while listening to reggaetón star Bad Bunny, salsa legend Marc Anthony, and traditional Bomba rhythms,
    and draws inspiration from comic book heroes like Spider‑Man and Teenage Mutant Ninja Turtles.
  travel: Narciso Calderon loves weekend adventures to Old San Juan’s historic forts, day trips to the mangroves of Isla Verde, and dreams of snorkeling in the crystal waters of Culebra and later exploring
    the cultural festivals of Cartagena, Colombia.
  culinary: Narciso Calderon enjoys devouring crispy patacones with garlic sauce, digging into a steaming bowl of mofongo with pork and plantains, and experimenting with mango‑lime salsa for homemade tacos,
    while occasionally burning toast when distracted by LEGO building.
  core: Narciso Calderon is a curious, organized, and energetic 11‑year‑old who balances a love for sketching, soccer, and science experiments with a habit of misplacing their LEGO pieces and a knack for
    turning everyday moments into creative adventures.
background:
  cultural: Narciso was raised in a tight‑knit Puerto Rican family in the municipality of Carolina, just outside San Juan. His home is bilingual, with meals centered around traditional dishes such as arroz
    con gandules, alcapurrias, and mofongo, and celebrations of holidays like Three Kings Day, Puerto Rico’s Constitution Day, and the vibrant San Sebastián Street Festival. He grew up hearing the rhythms
    of Bomba, Plena, and contemporary reggaetón, and often participates in family dances and community parades. The island’s rich history, its blend of Spanish, African, and Taíno heritage, and the close
    connection to the sea have shaped his curiosity about marine life and his appreciation for art and collective community values.
