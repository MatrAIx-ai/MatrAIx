  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Dancing to bomba, plena, and salsa music'', ''Knitting and crocheting'', ''Urban gardening (herbs and small vegetables)'', ''Reading historical
    novels and memoirs'', ''Walking in Brooklyn parks'', ''Attending community cultural festivals'', ''Storytelling evenings'', ''Watching classic telenovelas'', ''Doing puzzles'']'
  career_goals: Ivonne hopes to complete her high school equivalency by enrolling in a GED program at the local adult education center. She aspires to deepen her culinary skills through a community college
    cooking class, with the goal of publishing a small family‑recipe collection that celebrates Puerto Rican heritage. She also aims to take formal training in senior caregiving to become a certified volunteer,
    allowing her to expand her support for older adults in her Brooklyn community. Additionally, Ivonne dreams of leading a weekly cooking workshop at the senior center where she can pass on her cooking
    knowledge and nurture intergenerational connections.
