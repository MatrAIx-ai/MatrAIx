personas:
  professional: Ivonne Andino, a seasoned community volunteer, leverages bilingual fluency, culinary expertise, and natural empathy to mediate neighbor disputes, assist seniors, and coordinate neighborhood
    events, all while battling a tendency to procrastinate on paperwork.
  sports: Ivonne Andino enjoys leisurely strolls in Prospect Park, follows the Brooklyn Nets and New York Yankees, and participates in a senior walking club, preferring low‑impact activities that keep her
    joints supple while her occasional salsa dancing during festivals provides cardio bursts.
  arts: Ivonne Andino immerses herself in the rhythms of bomba and plena, often dancing to the salsa of Rubén Blades and Willie Colón, knits to the melodies of classic tropical bands, unwinds with telenovelas
    like 'María la del Barrio', and reads historical novels by authors such as Esmeralda Santiago, letting the arts shape her storytelling evenings.
  travel: Ivonne Andino favors short, budget‑friendly getaways, planning spontaneous day trips to the Hudson Valley and seasonal vacations to a Caribbean island, balancing a love for cultural immersion
    with the practicalities of a fixed retirement income.
  culinary: Ivonne Andino excels at preparing classic island dishes such as mofongo with chicharrón and arroz con gandules, seasoning them with sofrito, cilantro, and sweet peppers, and delights in sharing
    these meals at community potlucks while experimenting with lighter, health‑conscious adaptations for seniors.
  core: Ivonne Andino blends a lifelong love of island cooking, community storytelling, and gentle activism, yet often lets spontaneity derail schedules, balancing boundless compassion with a habit of postponing
    paperwork.
background:
  cultural: Ivonne was born in a modest neighborhood of San Juan, Puerto Rico and moved to Brooklyn with her parents during her early teens. She grew up in a close‑knit Puerto Rican community in Bushwick,
    where the rhythms of salsa, the aromas of sofrito, and communal celebrations of holidays like Nochebuena shaped her worldview. Her family emphasized respect for elders, Catholic traditions, and the
    importance of sharing food as a way to strengthen bonds. Even after decades in New York, she maintains strong ties to her island roots through language, cuisine, music, and participation in local Puerto
    Rican organizations. The blend of Caribbean warmth and the multicultural vibrancy of Brooklyn informs her identity, fostering a deep sense of loyalty to both her heritage and her adopted community.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Traditional Puerto Rican cooking'', ''Community caregiving'', ''Active listening and empathy'', ''Conflict mediation'', ''Urban gardening'', ''Basic digital
