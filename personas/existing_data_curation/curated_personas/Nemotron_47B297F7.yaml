personas:
  professional: Jacob New, a curious retired tourism manager, leverages his decades‑long expertise in event planning, volunteer coordination, and meticulous budgeting to orchestrate Pawleys Island’s cultural
    festivals, lead a community‑driven maritime‑heritage documentation project, and mentor younger volunteers in interdisciplinary art and ecology workshops.
  sports: Jacob New embraces morning beach walks as his primary fitness regimen, participates in the Pawleys Island senior bowling league at the community center, and remains a devoted fan of the Carolina
    Panthers and Clemson Tigers, attending games whenever possible and cheering from his porch during televised matches.
  arts: Jacob New translates his admiration for coastal scenery into vibrant watercolor paintings inspired by Winslow Homer, frequently visits the Gibbes Museum of Art and the Halsey Institute of Contemporary
    Art, and follows contemporary marine artist John Marin, often sharing his artistic insights during casual conversations at the local chess club.
  travel: Jacob New has explored the Outer Banks of North Carolina, bird‑watched among the Galápagos Islands, and trekked through Savannah’s historic district, and he dreams of strolling the coastal villages
    of Cornwall, England, and kayaking the Everglades’ mangrove waterways on his next adventure.
  culinary: Jacob New enjoys reinventing Lowcountry classics such as shrimp and grits with smoked paprika, stone‑ground corn grits, fresh Gulf shrimp, andouille sausage, and a splash of lemon, while supplementing
    dishes with garden‑grown herbs like thyme and rosemary, and his intermediate cooking skills shine during lively potlucks featuring collard greens, fried catfish, and peach cobbler.
  core: Jacob New is a curious, compassionate retiree who blends beach walks, watercolor art, and community activism into a quietly dedicated life, punctuated by occasional indulgent splurges on art supplies
    and weekend trips.
background:
  cultural: Jacob grew up in the South Carolina Lowcountry, a region steeped in maritime traditions, Southern hospitality, and Gullah‑influenced culture. His upbringing emphasized church participation,
    community service, and a deep respect for the natural coastal environment. Living now in Pawleys Island, he maintains the region’s values of humility, neighborliness, and a love for storytelling, often
    sharing local folklore and preserving the culinary heritage of the area.
attributes:
  skills: '["Event planning and coordination", "Volunteer program management", "Art appreciation and curation", "Community outreach", "Budgeting and financial oversight", "Basic carpentry and home maintenance",
