  hobbies: '["Beach walks and birdwatching", "Reading historical fiction", "Watercolor painting of coastal scenes", "Visiting art galleries and museums", "Playing chess at the community center", "Gardening
    native plants and vegetables", "Cooking Lowcountry cuisine"]'
  career_goals: Now retired, Jacob’s primary ambition is to deepen his contribution to the cultural and environmental life of Pawleys Island. He aims to lead a community history project documenting the
    Lowcountry’s maritime heritage, mentor youth interested in the arts, and develop workshops that combine art and local ecology. He also hopes to learn digital illustration tools to create educational
    materials and to support coastal conservation initiatives through fundraising and advocacy.
