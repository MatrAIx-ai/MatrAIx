  hobbies: '[''Watercolor Painting'', ''Experimental Photography'', ''Visiting Art Galleries and Museums'', ''Reading Latin American Literature'', ''Cooking Mexican Cuisine'', ''Yoga and Mindfulness Meditation'',
    ''Hiking'', ''Strategic Board Games'', ''Art Theory Discussion Groups'', ''Sketching'']'
  career_goals: Johnny aims to secure a tenure-track position at a regional university within the next three to five years, focusing on Mexican and Chicano art history. He plans to pursue a master’s degree
    in Art History, followed by a Ph.D., to deepen his expertise and qualify for research grants. He aspires to publish articles in peer-reviewed journals on topics such as the intersection of contemporary
    Mexican art and digital media. He wishes to develop a signature interdisciplinary course that blends humanities, visual culture, and community-engaged art projects, especially collaborations with Tucson’s
    local Mexican-American neighborhoods. Long-term, he envisions leading a research center dedicated to borderland studies and mentoring first-generation college students. He also seeks a balanced work-life
    dynamic that supports his marriage while allowing time for personal artistic practice.
