personas:
  professional: Staling Espinoza is an inquisitive young creator who spends hours drawing vibrant Andean‑inspired patterns, constructing intricate LEGO models, and conducting simple science experiments,
    channeling a blend of meticulous organization and free‑form imagination into a budding passion for design and discovery, and they often prefer quiet corners to focus.
  sports: Staling Espinoza enjoys quiet play at the neighborhood soccer field, cheering for Alianza Lima on weekends and practicing gymnastics at the local community center, preferring solo drills and short
    bouts of activity over large, noisy scrimmages, and they often practice new moves in the backyard.
  arts: Staling Espinoza immerses themselves in creative expression by sketching vivid Andean‑style patterns reminiscent of Maya Ortiz’s textiles, listening to the soaring voice of Susana Baca’s folk songs,
    and experimenting with digital painting in Procreate, all while delighting in animated classics like 'Finding Nemo' that spark imaginative storytelling, and they love sharing their artwork with family.
  travel: Staling Espinoza dreams of family trips to the misty ruins of Machu Picchu and the bustling markets of Cusco, while also cherishing nearby outings to the city’s botanical garden where they can
    collect specimens for their nature scrapbook, and they plan each adventure with a colorful map and a notebook of wishes.
  culinary: Staling Espinoza loves munching on warm cheese bread (cuñapé), sweet potato fries seasoned with cumin, and sipping mango smoothies, often helping stir guacamole made with avocado, lime, and
    cilantro, and proudly assembling colorful quinoa salads dotted with corn and cheese, and they sometimes sneak a bite of chocolate when no one is looking.
  core: Staling Espinoza is a solitary, curiosity‑driven seven‑year‑old who blends vibrant folk‑inspired art with meticulous LEGO engineering, balances allowance savings with occasional candy splurges,
    and navigates mild asthma and allergies with a mix of diligent care and occasional forgetfulness.
background:
  cultural: Staling is a first‑generation American of Peruvian descent. At home his family speaks both Spanish and English, and they celebrate Peruvian holidays such as the Independence Day of Peru with
    music, dancing, and dishes like causa and arroz con pollo. He has grown up hearing traditional Andean melodies and seeing vibrant woven textiles, which inspire his artwork. Living in Fairfax, Virginia,
    he participates in a multicultural elementary school environment that introduces him to a variety of cultures while he maintains a strong connection to his Peruvian roots through family traditions,
    language, and cuisine.
