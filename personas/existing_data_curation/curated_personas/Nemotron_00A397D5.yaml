personas:
  professional: Aaron Stover, a budding aerospace enthusiast at Lakeville High, channels curiosity and practicality into designing and launching model rockets for the school’s STEM club, where they balance
    meticulous planning with on‑the‑fly adjustments while mentoring younger teammates.
  sports: Aaron Stover shines as the point guard for the school basketball team, roots for the Indiana Pacers, and spends weekends at the Riverbend Skatepark as a member of the Lakeville Youth Skateboard
    Club, combining team discipline with the thrill of freestyle tricks.
  arts: 'Aaron Stover immerses in digital and street art, streaming The Legend of Zelda: Breath of the Wild while admiring Koji Kondo’s compositions, crafting custom skateboard graphics, and vibing to Phoebe
    Bridgers and Tame Impala during downtime.'
  travel: Aaron Stover loves weekend escapes to the Apostle Islands and Pictured Rocks, dreams of a road trip to Cedar Point and a cultural pilgrimage to Tokyo for anime, and plans these adventures on a
    shared spreadsheet with their parents, balancing school work and saved allowance.
  culinary: Aaron Stover is a self‑taught snack chef who whips up protein‑packed smoothies, pepperoni pizza with extra jalapeños, and a signature trail mix of almonds, dried cranberries, and dark chocolate,
    while occasionally ordering nachos with queso during gaming nights.
  core: Aaron Stover blends teenage energy with calm resilience, juggling basketball, skateboarding, rockets, and gaming while keeping a quirky habit of obsessively tracking video game sales on a spreadsheet.
background:
  cultural: Aaron comes from a Midwestern white family rooted in Lakeville, Minnesota. The region’s emphasis on community, outdoor recreation, and modest, hard‑working values shapes his outlook. He grew
    up in a suburban environment where family gatherings, local sports, and seasonal activities like fishing, snowshoeing, and attending community fairs are common. This cultural milieu encourages friendliness,
    cooperation, practicality, and a calm resilience that align with his personality.
