  career_goals: Aaron aims to pursue a vocational path that blends his hands‑on curiosity with a stable career, such as an automotive technician or a trades apprenticeship. He plans to attend a technical
    college after high school, gain certifications, and eventually work in a role that lets him apply practical solutions while helping others. He also keeps an open mind about further study in engineering
    or community service, seeking a career that balances practicality, continual learning, and meaningful impact.
