personas:
  professional: Devin Dieujuste, a 25‑year‑old food‑preparation specialist in a high‑tempo restaurant, leverages meticulous adherence to SOPs while flexibly improvising seasonal menu items that fuse Southern
    staples with heritage ingredients, and has already driven inventory shrinkage by 15 % through waste‑reduction protocols, aiming now for a supervisory role.
  sports: Devin Dieujuste spends Saturdays shooting hoops at the community center, cheering for the New Orleans Pelicans and the Mississippi State Bulldogs, casting a line on the Pearl River in summer,
    and hiking with the Natchez Trace Hiking Club, treating fitness as a competitive outlet while allowing occasional lazy weekends.
  arts: Devin Dieujuste channels creative energy into intricate beadwork during powwows, studies traditional storytelling while listening to folk singer Zach Bryan and the Native drum ensemble Southern
    Traditional Drums, and attends local art fairs featuring Mason Gatsko, balancing solitary craft with communal performance.
  travel: Devin Dieujuste favors spur‑of‑the‑moment road trips along the Mississippi River, has already camped in the Great Smoky Mountains and explored New Orleans’ culinary districts, and hopes to trek
    to Santa Fe’s Native art markets and Oaxaca’s mezcal‑rich kitchens, balancing modest budgeting with a yearning for authentic, land‑based experiences.
  culinary: Devin Dieujuste loves preparing three‑sister stew with wild turkey, heirloom corn, black beans, and squash, masterfully smoking catfish with mesquite, and experimenting with pepper‑infused pecan
    pastries, showing a high‑level skill set but sometimes leaving kitchen tools scattered due to a relaxed approach.
  core: Devin Dieujuste is a competitively critical 25‑year‑old chef who blends Southern comfort with tribal flavors, forgets to file receipts but never forgets a good story.
background:
  cultural: Devin is an American Indian from Mississippi, with family ties to the Choctaw Nation that historically inhabited the region. His upbringing blended Southern rural life with tribal traditions,
    giving him a deep respect for the land, seasonal harvesting, and the storytelling that is central to his community’s identity. These cultural influences show up in his cooking style, his participation
    in tribal gatherings, and his commitment to preserving heritage recipes.
attributes:
  skills: '[''ServSafe Certified'', ''Precise knife skills'', ''Menu development with seasonal and heritage ingredients'', ''Inventory control and waste reduction'', ''High‑volume line cooking'', ''Basic
    kitchen staff supervision'', ''Quality control and plating consistency'']'
  hobbies: '[''Experimental home cooking'', ''Fishing'', ''Hiking'', ''Pickup basketball'', ''Beadwork and traditional crafts'', ''Attending tribal powwows'', ''Participating in cooking competitions'']'
  career_goals: Devin aims to move from his current food‑preparation role into a supervisory position, eventually becoming a head chef at a restaurant that celebrates a fusion of Southern and Native American
    cuisine. He plans to earn a culinary management certificate and acquire a food‑service manager certification, while keeping enough flexibility to launch a pop‑up or food‑truck venture that lets him
    experiment with new recipes on his own schedule.
