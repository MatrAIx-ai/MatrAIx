persona_description: A climate scientist who specializes in forecasting and predicting weather patterns and climate changes. They have extensive knowledge of global climate models and their impact on temperature
  and energy prices. They are responsible for producing the Winter Fuels Outlook, which projects heating fuel expenditures for the coming winter based on EIA's forecast of fuel prices and the National Oceanic
  and Atmospheric Administration's forecast for temperatures. They use their expertise to analyze the data and provide accurate forecasts, which are crucial for consumers and businesses planning for the
  coming winter.
