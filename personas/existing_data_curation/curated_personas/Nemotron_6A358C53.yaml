personas:
  professional: Guillermo Crawford is an aspiring secondary-school teacher who designs interdisciplinary humanities lessons that weave visual art, acoustic guitar, and speculative literature, using interactive
    whiteboards and video editing to turn spontaneous moments into engaging learning experiences, while their relaxed, sometimes disorganized approach fuels improvisational classroom management.
  sports: Guillermo Crawford hits the Brandywine Trail for weekend hikes and occasional trail runs, balances that with a casual intramural soccer league that meets on campus, and avidly follows the Philadelphia
    Eagles and Flyers, showing a laid‑back but quietly competitive edge to personal fitness.
  arts: Guillermo Crawford sketches urban scenes in a leather‑bound notebook while listening to indie artists like Sufjan Stevens and experimental acts such as Animal Collective, writes folk songs on acoustic
    guitar that weave in occasional Spanish verses, frequents poetry slams featuring spoken‑word poets like Sarah Kay, and devours speculative fiction by N.K. Jemisin, all of which feed their creative identity.
  travel: Guillermo Crawford prefers spur‑of‑the‑moment weekend getaways that blend hiking, photography, and cheap public‑transport adventures, having explored the museum districts of New York City, the
    historic streets of Washington, D.C., and a family‑filled trip to Oaxaca, while dreaming of a solo backpack trek through the Scottish Highlands next summer.
  culinary: Guillermo Crawford cooks traditional dishes such as pozole, chiles en nogada, and tamales, mastering the art of masa and slow‑cooked broth, while experimenting with fresh chilies, hominy, and
    cacao‑based sauces, and they often host informal dinner gatherings where classmates sample these flavors alongside experimental fusion plates.
  core: Guillermo Crawford blends a curious, art‑driven mind with a relaxed, sometimes chaotic approach to life, turning spontaneous creativity into classroom magic, budget improvisations, and hearty meals,
    all while staying competitively driven and skeptically aware of others' motives.
background:
  cultural: Guillermo was raised in a Mexican-American household where Spanish was spoken at home and Mexican holidays—Día de los Muertos, Las Posadas, and Mexican Independence Day—were celebrated with
    food, music, and storytelling. His parents immigrated from Jalisco, bringing a deep respect for family ties, community reciprocity, and the vibrant visual culture of Mexican folk art. Moving to Swarthmore,
    PA for college introduced him to a progressive, multicultural environment that nudged him toward integrating his heritage into his teaching. He often shares traditional crafts, songs, and culinary experiences
    with his students, viewing cultural exchange as a bridge between his roots and his adopted community.
attributes:
  skills: '[''interdisciplinary lesson design'', ''bilingual communication (Spanish-English)'', ''digital media integration'', ''artistic curriculum development'', ''student mentorship'', ''critical thinking
    facilitation'', ''improvisational classroom management'', ''debate coaching'', ''basic video editing'']'
  hobbies: '[''sketching and drawing'', ''playing acoustic guitar'', ''cooking Mexican cuisine'', ''hiking and nature photography'', ''visiting art museums and galleries'', ''reading speculative fiction'',
    ''participating in poetry slams'', ''playing strategic board games'', ''listening to indie music'']'
  career_goals: Guillermo aims to complete his bachelor's degree in Education with a focus on Humanities, earn full state certification, and secure a permanent secondary-school teaching position. He hopes
    to develop a school-wide arts integration program that allows students to explore history and literature through visual and performance media. Over the next five years, he plans to pursue a Master’s
    in Curriculum and Instruction to become a curriculum specialist and eventually lead a department. He also dreams of founding a community outreach initiative that brings Mexican cultural arts workshops
    to underserved schools in the Philadelphia suburbs, blending his heritage with his professional passions.
