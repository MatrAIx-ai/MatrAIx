personas:
  professional: Anna Horn, a hands‑on HVAC and electrical technician in Red Oak, Texas, leverages meticulous blueprint reading and friendly customer communication while juggling a sometimes chaotic scheduling
    style; they aim for EPA‑608 and journeyman credentials to eventually lead a local contracting crew.
  sports: Anna Horn cheers loudly for the Red Oak High School football team and the Texas Rangers, dons a Dallas Cowboys cap on Sundays, and spends Saturday mornings casting for bass on Lake Travis with
    the Red Oak Anglers Club, where they relish the camaraderie of fellow anglers.
  arts: Anna Horn fuels her social gatherings with karaoke renditions of Garth Brooks and Carrie Underwood, sways to country‑dance tunes at community festivals, and they unwind by binge‑watching renovation
    series like 'Fixer Upper' while listening to classic country legends such as Dolly Parton.
  travel: Anna Horn prefers spontaneous road trips through the Texas Hill Country, often stopping in Fredericksburg for wine tasting, and they dream of a weekend in New Orleans during Mardi Gras as well
    as a quick getaway to the Gulf Coast’s South Padre Island for a beach retreat.
  culinary: Anna Horn is a self‑taught grill master who loves slow‑cooking brisket with dry rubs of smoked paprika, brown sugar, and cumin, whipping up homemade chicken‑fried steak with buttermilk and peppered
    biscuits, and they never say no to a plate of Tex‑Mex nachos topped with jalapeños, queso fresco, and fresh cilantro.
  core: Anna Horn blends Southern hospitality with a competitive, talk‑filled charm, juggling a chaotic schedule and a love for hands‑on fixes while they never turn down karaoke mic time or a weekend fishing
    trip.
background:
  cultural: Anna grew up in Red Oak, Texas, a close‑knit community where family, church, and local traditions shape daily life. Her upbringing emphasized a strong work ethic, self‑reliance, and hospitality—values
    common in the Southern white working‑class culture. She celebrates regional customs such as Fourth‑of‑July fireworks, county fairs, and Friday night football gatherings. While she respects the modesty
    and independence of her cultural roots, she also embraces the Southern love of outdoor recreation and community involvement, which influences both her social life and her approach to her trade.
attributes:
  skills: '[''HVAC installation'', ''Electrical wiring'', ''Basic plumbing repairs'', ''Blueprint and schematic reading'', ''Equipment diagnostics'', ''Preventative maintenance'', ''Safety compliance (OSHA,
    EPA)'', ''Customer communication'', ''Problem‑solving'', ''Use of hand and power tools'']'
  hobbies: '[''Karaoke nights'', ''Game evenings'', ''Dancing at community events'', ''High‑school football watching'', ''Texas Rangers baseball'', ''DIY home projects'', ''Furniture building'', ''Fishing
    trips'', ''Weekend road trips'', ''Reading home‑improvement magazines'', ''Volunteering at community center'']'
  career_goals: Anna aims to earn an EPA‑608 certification and become a licensed HVAC technician, followed by achieving a journeyman electrician credential. She aspires to move into a lead‑technician or
    foreman role where she can mentor new hires and coordinate service schedules. Ultimately, she hopes to launch her own small contracting business in the Red Oak area, offering fast, reliable repair services
    and building a reputation as the go‑to technician for both residential and commercial clients. Her ambition is fueled by a competitive drive to out‑perform peers, increase her earnings, and be recognized
    for her reliability and customer‑focused approach.
