persona_description: A scientist who is passionate about space debris and has a deep understanding of the dynamics of the orbital environment. She is dedicated to understanding the impact of space junk
  on the safety of spacecrafts, astronauts, and satellites. She is also interested in developing policies to limit debris creation and mitigate the impact of existing debris. She is knowledgeable about
  the vast amount of space junk orbiting Earth, including mission-related and fragmentation debris, nonfunctional spacecraft, and abandoned rocket stages. She has a keen interest in space debris destroyers
  and has developed a concept for a "Brane Craft" to remove space debris. She is also interested in space debris removal projects such as ELSA-d and Remove DEBRIS.
