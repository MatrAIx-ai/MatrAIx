  career_goals: Even in retirement, Lu remains goal‑oriented. She aims to preserve her health through daily walks and senior‑friendly yoga, ensuring continued independence. She plans to write a memoir that
    captures her family's mid‑century story and the evolution of Galt. Lu seeks to lead a seniors’ gardening committee, promoting food security and intergenerational learning. She wishes to mentor younger
    volunteers in event planning and budgeting, applying her structured yet adaptable approach. Finally, she aspires to join the Galt Historical Society board to help protect and share local heritage.
