  career_goals: Miguel aims to combine his love for technology and his Cuban heritage by pursuing a career as a software developer and digital storyteller. He dreams of joining a high‑school STEM program,
    earning a degree in computer science, and eventually creating apps or interactive media that celebrate Latino culture and provide mentorship for other young coders in his community. He also hopes to
    stay involved in public speaking and community outreach, possibly studying communications or journalism to become a bilingual media personality who can bridge cultural gaps.
