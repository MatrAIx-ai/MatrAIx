personas:
  professional: Miguel Cruzperez, a 13‑year‑old budding programmer, blends curiosity with practicality by building interactive Scratch games and early Python projects that often feature soccer‑themed stories,
    leveraging his sociable nature to gather feedback from classmates and friends, and channeling his love for performance into lively TikTok demos of his code.
  sports: Miguel Cruzperez is an energetic midfielder for the Eastside Youth Soccer Club, drills after school on the neighborhood field, idolizes the LA Galaxy’s midfield dynamism, and joins the school’s
    intramural futsal league each winter, balancing competitive drive with teamwork.
  arts: Miguel Cruzperez embraces rhythmic expression by lighting up family gatherings with salsa and reggaetón moves to the beats of Celia Cruz and Bad Bunny, crafts comedic TikTok sketches that incorporate
    snippets of classic Caribbean melodies, and unwinds by devouring graphic novels like 'Spider‑Man' and 'Maus', weaving music, dance, and visual storytelling into his daily identity.
  travel: Miguel Cruzperez is adventure‑seeking yet family‑oriented, planning vacations around vibrant festivals and soccer pilgrimages, swapping summer trips to a sun‑kissed Caribbean beach town with weekend
    excursions to watch matches at Barcelona’s Camp Nou, while dreaming of a future road trip to New Orleans’ Mardi Gras celebrations and a cultural immersion in Miami’s lively Little Havana district.
  culinary: Miguel Cruzperez’s culinary curiosity shines in his kitchen, where he mixes modest cooking skills with family traditions to whip up spiced pork stew, crispy plantain fritters, and yuca drizzled
    in garlicky mojo sauce, often filming the sizzling process for TikTok while proudly sprinkling the dishes with fresh cilantro and lime.
  core: Miguel Cruzperez, a 13‑year‑old whirlwind, fuses soccer stamina, salsa rhythm, and coding creativity into a relentlessly social vibe, able to code a game while perfecting a dance move, yet still
    forgets to do homework when a TikTok trend spikes.
background:
  cultural: Miguel grew up in a Cuban‑American household in Fort Lauderdale, where Spanish is spoken at home and Cuban traditions are a daily part of life. His parents immigrated from Cuba in the early
    2000s, bringing recipes for ropa vieja, empanadas, and Cuban coffee, as well as a love for Afro‑Cuban rhythms and celebrations such as Carnaval and Noche Buena. The vibrant Cuban community in Broward
    County, with its festivals, music clubs, and local businesses, provides Miguel with role models and a strong sense of cultural pride. He balances this heritage with typical American teenage experiences,
    attending a public middle school where he navigates both cultures through bilingual friendships, community events, and by sharing his culture through dance, food, and digital media.
