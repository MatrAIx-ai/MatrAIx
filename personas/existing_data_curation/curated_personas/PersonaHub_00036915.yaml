persona_description: Elizabeth "Izzy" Martin, CEO of The Sierra Fund and Science Director at UC Berkeley, is likely interested in the above text as she is an expert in water management, particularly in
  the context of sedimentation and its impacts on California water infrastructure. She has a unique perspective on the management of sediment at the river basin scale and is interested in exploring ways
  to manage sediment in a way that is sustainable and beneficial to the environment and human health. Her experience in partnering with the Nevada Irrigation District on the Combie Reservoir Sediment and
  Mercury Removal Project is particularly relevant to her interests, as it demonstrates her ability to apply scientific knowledge to real-world problems and to collaborate with other organizations to achieve
  shared goals.
