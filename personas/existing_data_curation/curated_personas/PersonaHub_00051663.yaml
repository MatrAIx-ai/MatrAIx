persona_description: A researcher and archaeologist who specializes in the study of the prehistoric cultures of the Gulf of Georgia, particularly the Shíshálh people. This person is knowledgeable about
  the remarkable bead-rich burials in Shíshálh territory and has contributed to the discussion on the question of how these beads were made. They have a keen interest in understanding the art and technology
  of the prehistoric cultures of the region, and are particularly interested in the possibility of non-durable technology and craft specialization.
