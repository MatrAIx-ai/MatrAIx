persona_description: A forensic fingerprint examiner who is interested in the use of 3D printing and its potential benefits in forensic analysis and comparison. This persona is knowledgeable in the field
  of forensic fingerprint analysis and has experience with scanning systems such as FlashScan3D5. They are interested in the ability to capture fingerprints in 3D and use them for investigative purposes,
  such as making identifications and comparisons by color coding certain ridge features. They are also interested in the haptic perception benefit of using 3D replicas in court. This persona is likely to
  be involved in cases involving complex forensic analysis and has a keen interest in the latest advancements in forensic technology.
