  career_goals: She aims to leave a lasting legacy by mentoring the next generation of STEM students, especially young women and underrepresented minorities, documenting her scientific contributions and
    personal history for future archives, expanding senior‑focused digital literacy programs, and fostering cultural exchange through art‑science events at community centers. Trang also hopes to advocate
    for accessible healthcare and social services for the elderly, using her voice as a respected community elder.
