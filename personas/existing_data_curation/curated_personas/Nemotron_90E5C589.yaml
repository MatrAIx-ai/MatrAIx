personas:
  professional: Anthony Zwain is a budding automotive‑technology specialist who fuses self‑taught Python scripting and Arduino prototyping with hands‑on car diagnostics, applying a pragmatic Midwestern
    work ethic tempered by a competitive curiosity that drives them to streamline repairs faster than peers while staying flexible enough to pivot when troubleshooting unexpected issues.
  sports: Anthony Zwain is an avid supporter of the Detroit Lions and Red Wings, regularly cycles the Huron River trail with the Ann Arbor Cycling Club, hits the nearby slopes for snowboarding each winter,
    and joins casual pickup basketball games at the community center, blending competitive fandom with active outdoor pursuits.
  arts: Anthony Zwain frequents live indie‑rock shows at The Blind Pig, where they adore bands such as The Strokes, Arcade Fire, and local act Decapitated, and they unwind by curating retro video‑game soundtracks,
    a habit that fuels their creative flair for Arduino‑driven light installations.
  travel: Anthony Zwain enjoys budget‑friendly road trips to Michigan gems like Mackinac Island and Sleeping Bear Dunes, occasionally hops on a cheap flight to explore Tokyo’s tech districts or Berlin’s
    art scene, planning itineraries with a spreadsheet but leaving room for spontaneous detours, all while balancing a modest student budget.
  culinary: Anthony Zwain favors Detroit‑style pizza and classic Coney dogs, but enjoys cooking simple dishes like garlic‑butter shrimp pasta and perfecting a homemade berry pie using fresh Michigan blueberries,
    relying on a modest set of kitchen tools while occasionally tinkering with Arduino‑controlled sous‑vide experiments.
  core: Anthony Zwain blends Midwestern practicality with tech curiosity, leading a competitive, organized life punctuated by solo tinkering, community cycling, and occasional gaming splurges.
background:
  cultural: Anthony’s cultural background is rooted in the Midwestern white community of Michigan. Raised in a suburban environment outside Ann Arbor, he internalized values of self-reliance, practicality,
    and a modest work ethic typical of the region. Living in Ann Arbor—a university town known for its progressive atmosphere—has exposed him to diverse ideas, academic curiosity, and a vibrant arts scene.
    He enjoys regional traditions such as supporting Detroit sports teams, seasonal outdoor activities (snowboarding in winter, lake swimming in summer), and participating in local festivals that blend
    Midwestern hospitality with the city’s eclectic cultural offerings.
