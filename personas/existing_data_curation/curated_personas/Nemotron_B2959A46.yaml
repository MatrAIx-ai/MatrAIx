  hobbies: '[''Soccer'', ''Live music concerts'', ''Street photography'', ''TikTok content creation'', ''Arduino tinkering'', ''Cooking Mexican dishes'', ''Volunteering at community events'', ''Attending
    cultural festivals'', ''Dancing (cumbia, reggaeton)'', ''Exploring Austin food trucks'']'
  career_goals: Short‑term, Carlos plans to complete his associate degree and transfer to a bachelor’s program in Marketing Communications within the next two years, while securing a summer internship at
    a local digital agency where he can apply his social media and event‑planning expertise. He also aims to build a portfolio of successful campaigns for small Austin businesses, especially those owned
    by fellow Mexican‑American entrepreneurs. In the medium term, he envisions launching a mobile food venture—a taco‑style food truck that blends traditional Mexican flavors with Texan twists—while continuing
    to produce digital content that promotes the venture. Long‑term, Carlos aspires to become a recognized community event director, overseeing cultural festivals that celebrate Latino heritage in Austin,
    and to mentor other young bilingual creators in the city.
