  career_goals: Although retired, Helen remains driven to make a lasting impact on education and the arts. She aims to launch a community art program that pairs senior artists with local youth, fostering
    creative exchange and preserving cultural stories. Helen also aspires to volunteer as a mentor for new teachers, sharing her classroom strategies and nurturing their professional growth. She is working
    on a memoir of her teaching experiences, hoping to document the evolution of education in the Southwest. A personal ambition is to advocate for mental‑health awareness among seniors, organizing supportive
    discussion circles at the local senior center. Ultimately, Helen seeks to continue learning—particularly in art history and bilingual education—to stay intellectually engaged and supportive of her community.
