  hobbies: '[''Reading woodworking literature'', ''Fishing'', ''Model ship building'', ''Acoustic guitar playing'', ''Gardening'', ''Listening to jazz and blues'', ''Hiking'', ''Attending vintage tool fairs'']'
  career_goals: Huey aims to transform his current workshop in Irvington into a boutique studio that produces limited‑edition furniture pieces made from reclaimed local wood, positioning his brand around
    sustainability and craftsmanship. He plans to obtain a GED and a state‑approved carpentry certification to broaden his professional credibility. Over the next five years, he hopes to secure steady contracts
    with local developers and interior designers, while also establishing a mentorship program for at‑risk youth in his community. Long‑term, Huey envisions publishing a practical guidebook on solitary
    woodworking practices and, if comfortable, creating a modest series of instructional videos for learners who share his preference for quiet, self‑directed study.
