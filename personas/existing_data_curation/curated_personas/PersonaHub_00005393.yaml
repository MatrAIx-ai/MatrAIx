persona_description: A NASA engineer who specializes in satellite technology and has worked on projects such as the Hubble Space Telescope and the Mars Reconnaissance Orbiter. He has experience in building
  and launching nanosatellites and has worked on projects related to oceanography and meteorology. His expertise lies in the development of small satellite systems and the use of satellite technology to
  improve weather forecasting and hurricane research. He is responsible for leading the development of the Cyclone Global Navigation Satellite System, or CYGNSS, and has been selected to build eight hurricane-tracking
  satellites.
