  career_goals: Jairo aims to evolve into a principal engineer or cloud architect role where he can shape high‑level system designs while preserving the autonomy needed for focused, solitary work. He dreams
    of leading initiatives that improve developer well‑being, such as building tooling for stress‑aware workflow management and mentoring programs that emphasize psychological safety. Over the next five
    years, he also plans to contribute to open‑source projects that bridge practical software solutions with emerging AI techniques, and eventually transition to a consultant model that lets him choose
    flexible, remote engagements aligned with his family life.
