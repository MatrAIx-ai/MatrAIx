persona_description: A University of Missouri nutrition and exercise physiology professor who specializes in the study of vitamin D and its effects on obesity and diabetes. She is particularly interested
  in the role of vitamin D supplements in controlling blood-sugar levels and preventing the onset of type 2 diabetes in obese children and teens. She has conducted research on the relationship between vitamin
  D intake and glucose control in obese individuals and has found promising results with vitamin D supplementation alone.
