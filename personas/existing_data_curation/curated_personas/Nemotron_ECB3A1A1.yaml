  hobbies: '[''mural painting'', ''photography (desert and night)'', ''live music and concert attendance'', ''cumbia and hip-hop dancing'', ''pickup soccer games'', ''improvisational theater'', ''cooking
    Mexican cuisine'', ''reading speculative fiction'', ''coffee brewing experimentation'', ''community festival volunteering'']'
  career_goals: Magno aims to move up the retail ladder by becoming a shift supervisor within the next year and a store manager within three years, seeking formal training through a GED program and community
    college courses in business management. He is driven to exceed sales targets, positioning himself as the top performer on his team. In the longer term, he envisions opening a boutique coffee shop that
    doubles as an art gallery for Mexican and contemporary works, providing a social hub where he can blend his entrepreneurial spirit with his passion for culture and creativity. He also hopes to monetize
    his digital art through an online store, turning his hobby into a supplemental income stream.
