  career_goals: Chan aims to formalize his experience with a bachelor’s degree in criminal justice or public administration within the next three years, followed by the Corrections Supervisor Certification.
    He plans to attend leadership workshops to improve his organizational skills and reduce his tendency toward relaxed planning. His short‑term goal is promotion to senior supervisor or deputy warden,
    where he can implement efficiency improvements and lower incident rates. Long‑term, he aspires to become a deputy warden or director of security operations and eventually transition into a security
    consulting role, leveraging his practical expertise to advise other correctional institutions. He also wishes to earn recognition as a top performer in safety metrics and to mentor a new generation
    of correctional officers.
