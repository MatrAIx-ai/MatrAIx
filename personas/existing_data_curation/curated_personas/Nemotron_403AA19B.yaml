  career_goals: He aspires to blend his analytical mindset with his creative passions by pursuing a career in user experience (UX) design or product management within a tech-focused company. In the next
    five years he aims to complete a bachelor's degree in Interaction Design or a related interdisciplinary program, build a robust portfolio of digital projects, and secure an internship that bridges data-driven
    research with visual storytelling. Long-term, he envisions leading cross-functional teams that create intuitive, aesthetically compelling products while also exploring opportunities to curate digital
    exhibitions that highlight emerging artists.
