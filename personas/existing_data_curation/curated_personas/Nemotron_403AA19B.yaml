personas:
  professional: Mathieu Mccrary, a budding UX designer and aspiring product manager, leverages their analytical research abilities, proficiency with Adobe Photoshop and Illustrator, and Python data-cleaning
    experience to methodically map user journeys while channeling their curiosity and competitive edge into sleek, data-driven digital experiences.
  sports: Mathieu Mccrary follows the Texas A&M Aggies football on Saturdays, cheers for the Houston Rockets, rides with the College Station Cycling Club on weekend rides, and hikes the Brazos Valley trails
    monthly, mixing team loyalty with personal outdoor fitness.
  arts: Mathieu Mccrary fuels their love of urban sketching by frequenting the Texas A&M Art Museum to study works by contemporary creators such as Shepard Fairey and James Turrell, while their playlists
    blend The Strokes, Kendrick Lamar, and Texas folk-rock group Reckless Rita, shaping a hybrid artistic sensibility.
  travel: Mathieu Mccrary prefers meticulously planned road trips that combine budget stays in Austin, weekend hikes in the Hill Country, and longer cultural immersions like exploring Tokyo's neon districts
    and Mexico City's street-food markets, balancing a tight student budget with a thirst for global experiences.
  culinary: Mathieu Mccrary cooks at an intermediate level, often marrying Southern staples like smoked brisket and pecan-pie spices with global twists such as Korean gochujang-glazed pulled pork tacos
    or miso-infused shrimp and grits, while still savoring classic Tex-Mex dishes like chicken fajitas.
  core: Mathieu Mccrary is a methodical, curiosity-driven 19-year-old who oscillates between disciplined study sessions and impulsive late-night gaming marathons, often forgetting to water houseplants while
    sketching intricate cityscapes.
background:
  cultural: Mathieu grew up in a middle-class suburban environment in Central Texas, where he was exposed to a blend of Southern hospitality and the diverse, transient culture of a college town. His family's
    background reflects typical American White middle-class values—emphasis on self-reliance, education, and community involvement—while his upbringing near Texas A&M introduced him to a multicultural student
    population, regional traditions such as football Saturdays and local music festivals, and a strong appreciation for both regional heritage and global artistic influences.
