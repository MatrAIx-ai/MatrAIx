personas:
  professional: Tracie Morgan is an aspiring junior historian‑tech creator who merges their love for Appalachian trail photography with basic coding to produce engaging TikTok clips that document Harpers
    Ferry’s Civil War landmarks; they apply pragmatic curiosity and an organized‑yet‑flexible work style.
  sports: Tracie Morgan runs for the West Virginia high school track & field team, plays pick‑up soccer with the local Harpers Ferry Strikers club, and roots for the Washington Commanders and DC United,
    balancing disciplined training with a competitive drive on the field; they thrive on the camaraderie of team sports.
  arts: Tracie Morgan channels their creative side through vintage‑style photography inspired by Annie Leibovitz, curates playlists featuring Taylor Swift and The Avett Brothers, and enjoys sketching historic
    sites after watching documentaries on Ken Burns; they often share their work on school art forums.
  travel: Tracie Morgan prefers weekend road trips that combine hiking in Shenandoah National Park with visits to historic towns like Williamsburg, while dreaming of a spring backpack tour of the Scottish
    Highlands after saving from a part‑time tutoring gig; they plan each trip with a blend of spontaneity and meticulous budgeting.
  culinary: Tracie Morgan enjoys cooking simple yet tasty meals such as chicken and‑waffle sliders, mastering the art of perfect grilled cheese, and experimenting with spicy kimchi tacos, while never missing
    a chance to indulge in a seasonal blueberry pie at the local farmers’ market; they often stream cooking tips on TikTok.
  core: Tracie Morgan blends a competitive spark with a pragmatic love for history, turning hikes into TikTok documentaries while secretly hoarding extra allowance for the latest tech gadgets and juggling
    a sneaky habit of binge‑watching debate clips late into the night; they consider themselves a perpetual work‑in‑progress.
background:
  cultural: Tracie grew up in Harpers Ferry, West Virginia, a small historic town nestled in the Appalachian region. Her cultural background reflects a blend of Mid‑Atlantic Americana and the deep-rooted
    traditions of Appalachia. Family ties to the area span generations, fostering a strong sense of community, self‑reliance, and pride in the town’s Civil War heritage. Local customs—such as attending
    the annual July 4 fireworks, participating in heritage reenactments, and joining outdoor clubs—have shaped her practical outlook and sociable nature. While exposed to mainstream U.S. youth culture through
    music, social media, and school life, she remains deeply connected to the natural landscape and historical narratives that define her hometown.
