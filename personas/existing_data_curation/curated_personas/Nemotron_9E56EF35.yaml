  career_goals: Tracie aims to finish her high‑school equivalency and pursue a vocational certificate in outdoor recreation or hospitality, with the long‑term goal of becoming a park ranger or tour guide
    at Harpers Ferry National Historical Park. She also envisions leading community‑event projects, using her organizational talent to boost local festivals and youth programs. In parallel, she hopes to
    build a modest online presence that showcases the town’s history and natural beauty, eventually turning that into a part‑time content‑creation role that complements a stable career in park services
    or tourism.
