persona_description: A scientist who specializes in environmental science and toxicology, particularly in the study of chemical contaminants and their effects on aquatic ecosystems. This person has conducted
  research on the impacts of car emissions and their potential exposure to aquatic life, including coho salmon. They have used spatial analysis techniques to identify landscape variables that correlate
  with mortality rates in urban and urbanizing streams, and have predicted which streams are most likely to have high mortality rates. This scientist is likely to be interested in the effects of chemical
  contaminants on aquatic life and the potential impacts of urbanization on environmental health.
