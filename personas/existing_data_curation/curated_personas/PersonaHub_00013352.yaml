persona_description: A retired English woman who had a passion for learning and communication. She was known for her ability to understand and communicate using Morse code, which she learned as a child
  from her father. She had a son who sat by her bedside for 16 weeks while she recovered and helped her to communicate using the Morse code. Her son, Alan, is now working on a way to have her Morse code
  tapping appear on a computer screen for faster communication.
