  career_goals: Although retired from formal employment, Catina aims to remain an active cultural steward in Prospect. She aspires to document and preserve local history through oral‑history recordings
    and a community exhibit, mentor younger volunteers at the senior center, and publish a memoir that captures the mid‑20th‑century Kentucky experience. She also hopes to travel modestly to nearby historical
    sites and attend regional folk‑music festivals, enriching her lifelong curiosity while staying grounded in practical, community‑focused contributions.
