personas:
  professional: Catina Whittaker, a retired senior‑center volunteer turned community historian, leverages their lifelong love of storytelling, strong interpersonal skills, and improvisational organizing
    style to coordinate oral‑history projects, lead book‑club discussions, and mentor younger volunteers, all while blending traditional Southern hospitality with modern digital tools.
  sports: Catina Whittaker enjoys low‑impact fitness by walking the local birdwatching trails, participates in the senior center’s weekly shuffleboard league, cheers on the University of Kentucky Wildcats
    basketball team, and joins a community gardening club that doubles as a gentle workout group, preferring relaxed, social activities over competitive sports.
  arts: Catina Whittaker is an avid bluegrass enthusiast who listens to Bill Monroe and Alison Krauss, occasionally plays the harmonica at church socials, devotes afternoons to quilting and knitting circles,
    and volunteers at the county’s heritage museum to curate folk‑art exhibits, finding artistic expression in both music and handmade crafts.
  travel: Catina Whittaker favors modest, purpose‑driven trips, such as day‑long visits to historic sites like the Henry Clay Estate and weekend pilgrimages to the Berea Appalachian Festival, planning loosely
    around church group calendars, balancing curiosity with a love for familiar comforts and a limited travel budget.
  culinary: Catina Whittaker delights in preparing traditional Southern fare—smoked ham hocks with collard greens, buttery buttermilk biscuits, and bourbon‑infused pecan pie—while growing native herbs like
    rosemary and thyme in their garden to season dishes, and they often host family potlucks where the aroma of simmering gumbo and fresh cornbread fills the house.
  core: Catina Whittaker blends a storyteller’s curiosity with Southern hospitality, juggling community stewardship, modest finances, and gentle health routines, all while humming a bluegrass tune as they
    knit, garden, and reminisce about Kentucky’s past.
background:
  cultural: Catina grew up in a middle‑class white family in the rural outskirts of Jefferson County during the 1940s and 1950s. Her upbringing was steeped in Southern hospitality, church‑centered community
    life, and a strong appreciation for Kentucky folk traditions such as bluegrass music, storytelling, and handmade crafts. While she embraces the region’s values of modesty, neighborliness, and respect
    for heritage, her education in the humanities and lifelong curiosity have also exposed her to broader cultural ideas, allowing her to blend traditional Southern customs with contemporary interests.
    This cultural tapestry informs her love for local history, communal gatherings, and the preservation of regional arts.
