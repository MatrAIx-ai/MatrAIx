personas:
  professional: Dominique Neita is a practical, street‑wise police officer who thrives on rapid decision‑making and de‑escalation, balancing a strong need for structured protocols with an on‑the‑fly flexibility
    that helps them navigate unpredictable patrols, while maintaining a cautious skepticism toward suspects’ motives and a competitive edge that fuels a clear ambition to earn a sergeant rank within two
    years.
  sports: Dominique Neita is a dedicated fitness enthusiast who jogs the Gulf Coast shoreline at sunrise, lifts weights at the local community gym, boxes three nights a week at the Bayou Boxing Club, and
    roots for the New Orleans Saints in the NFL and the New Orleans Pelicans in the NBA, while also participating in a weekend running group that meets at the boardwalk.
  arts: Dominique Neita finds refuge in R&B, gospel, and hip‑hop, regularly streaming artists like Beyoncé, Kirk Franklin, and J. Cole while cooking, and channels creative energy into journaling and short‑story
    writing inspired by the lyrical storytelling of Tupac and the poetic cadence of Maya Angelou, occasionally attending live performances at the local theatre.
  travel: Dominique Neita enjoys low‑key coastal getaways, favoring spontaneous road trips to destinations like the Gulf Islands National Seashore, Key West, and Savannah, while dreaming of a structured
    family vacation to New Orleans for its music festivals, balancing a love for spontaneous beach sunsets with a cautious budgeting style that limits extensive overseas travel.
  culinary: Dominique Neita is a competent home cook who unwinds by preparing Southern comfort dishes such as shrimp gumbo with Andouille sausage and collard greens flavored with smoked turkey, often pairing
    meals with a splash of hot sauce and a side of cornbread, and they relish experimenting with fresh okra and Cajun spices to perfect the flavor profile.
  core: Dominique Neita, a 30‑year‑old police officer, blends disciplined street smarts with a love for beach runs, boxing, and soulful music, navigating intense emotions through writing and cooking while
    juggling a competitive drive and a penchant for impulsive spending.
background:
  cultural: Dominique is an African‑American woman raised in Gulfport, Mississippi, where the coastal Southern culture, church life, and a close‑knit Black community shaped her identity. Growing up in a
    historically segregated region gave her a resilient outlook and a nuanced perspective on law enforcement, especially as a Black officer serving a diverse population. She values family, faith, and the
    traditions of Southern hospitality while navigating the challenges of limited formal education and the demands of a high‑stress career.
attributes:
  skills: '[''Patrol and traffic enforcement'', ''De‑escalation and conflict mediation'', ''Firearms handling and safety protocols'', ''Incident reporting and documentation'', ''First aid and emergency
    medical response'', ''Community outreach and neighborhood liaison'', ''Evidence collection and basic crime scene preservation'', ''Local law and ordinance knowledge'', ''Crisis Intervention Team (CIT)
    certification (in training)'', ''Physical fitness and defensive tactics'']'
  hobbies: '[''Beach walks and fishing'', ''Jogging along the shoreline'', ''Listening to R&B and gospel music'', ''Cooking traditional Southern dishes (gumbo, collard greens)'', ''Journaling and creative
    writing'', ''Playing video games (first‑person shooters)'', ''Weight training and boxing'', ''Participating in church community events'']'
  career_goals: Dominique aims to secure a promotion to sergeant within the next two years, leveraging her practical experience and leadership potential. She plans to complete her GED and enroll in a criminal
    justice associate program to broaden her qualifications. Long‑term, she aspires to specialize in crisis intervention and mental‑health support for officers, eventually leading a department‑wide wellness
    initiative while maintaining a stable, predictable schedule that balances her need for structure with family responsibilities.
