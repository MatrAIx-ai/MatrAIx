persona_description: A senior Air Force officer responsible for ensuring the health and safety of Airmen and their families, specifically focusing on the Zika virus outbreak and its potential impacts. This
  person is knowledgeable about the evolution of Zika virus, its transmission routes, and its effects on human health. They have a background in preventive medicine and have experience in managing outbreaks,
  ensuring compliance with health guidelines, and providing consistent, science-based guidance to protect Airmen and their families. They are aware of the potential link between Zika virus infection during
  pregnancy and a particular birth defect, and have expertise in preventing mosquito bites and sexually transmitted Zika infection.
