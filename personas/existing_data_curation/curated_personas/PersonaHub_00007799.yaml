persona_description: A science teacher or coach who is passionate about robotics and engineering, particularly in the Middle School age group. They have experience with various types of robots and have
  successfully developed and demonstrated a science team project that includes a dog with a prop that moves a wipe container, releasing a toy car, lifting a ball, spinning a fan, pulling pencils, releasing
  the car, pushing a metal wheel, hitting a cylinder, releasing a ball, rolling it, pushing a wooden wheel, turning a cylinder, releasing a ball, and finally releasing a cereal box. They are excited to
  share their project and are looking for feedback and suggestions for next year's competition.
