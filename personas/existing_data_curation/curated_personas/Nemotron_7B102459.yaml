  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Sketching'', ''Weekend Road Trips'', ''Live Music Exploration'', ''Trying New Restaurants'', ''Reading Contemporary Fiction'', ''Philosophy
    Books'', ''Improv Workshops'', ''Yoga Practice'']'
  career_goals: Teresa aims to transition from a billing clerk to an accounts payable specialist or financial operations coordinator within the next few years, leveraging her curiosity to master advanced
    financial systems. She aspires to lead a small team, incorporating her cooperative nature to foster a harmonious workplace. In the longer term, she envisions blending her love for art and finance by
    managing budgets for cultural institutions or nonprofit arts organizations in Fort Worth, using her financial expertise to support creative projects. Continuing education through certifications like
    Certified Accounts Payable Professional (CAPP) is part of her plan to solidify her expertise.
