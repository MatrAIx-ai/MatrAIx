personas:
  professional: Manuel Lantigua, a retired field service engineer turned community mentor, leverages three decades of electrical and mechanical troubleshooting expertise and meticulous project planning
    to lead weekly senior‑center workshops, guide a high‑school robotics club, and design sustainable irrigation for a local urban garden, all while maintaining a structured schedule they cherish.
  sports: Manuel Lantigua enjoys leisurely walks through Fresno’s Woodward Park, follows the Fresno State Bulldogs football team, participates in a senior bowling league at the community center, and approaches
    fitness with a predictable routine that balances light cardio and occasional yoga classes they attend for flexibility.
  arts: Manuel Lantigua immerses themselves in Mexican literature, often rereading Octavio Paz and Juan Rulfo, appreciates Frida Kahlo’s paintings at local exhibits, and finds solace in listening to Carlos
    Santana’s guitar while crafting wood furniture, weaving these artistic influences into their cultural event planning.
  travel: Manuel Lantigua plans trips with meticulous spreadsheets, favoring destinations like Oaxaca for culinary immersion, the historic streets of San Miguel de Allende, and national parks such as Yosemite,
    yet balances travel ambitions with a modest budget and family responsibilities by opting for road trips that include stops at community festivals they love.
  culinary: Manuel Lantigua relishes cooking mole, pozole, and carnitas using heirloom tomatoes, chilies, and squash from their garden, skillfully blending traditional spices such as pasilla and ancho,
    while their kitchen confidence leads them to experiment with new recipes each week, despite occasionally over‑seasoning the salsa.
  core: Manuel Lantigua, a structured‑minded retiree, blends engineering precision with cultural stewardship, gardening, and community mentorship, all while juggling a gentle forgetfulness about stretching
    after chores.
background:
  cultural: Manuel was born in Fresno to parents who emigrated from Jalisco, Mexico. Raised in a bilingual household, he grew up celebrating Mexican traditions—Día de los Muertos, Las Posadas, and quinceañeras—while
    also absorbing the agricultural rhythms of California’s Central Valley. His family places strong emphasis on community, family gatherings, and preserving culinary heritage, which he continues by cooking
    and sharing authentic dishes. Even after decades of assimilation, Manuel maintains close ties to his Mexican roots through language, religious practices at the local Catholic church, and participation
    in community cultural events, blending them with the broader Californian lifestyle.
attributes:
  skills: '[''Electrical system design'', ''Mechanical troubleshooting'', ''Agricultural irrigation system maintenance'', ''Project planning and budgeting'', ''Data analysis with Excel'', ''Basic CAD drafting'',
