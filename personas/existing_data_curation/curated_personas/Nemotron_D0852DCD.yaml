  hobbies: '[''Heirloom vegetable gardening'', ''Traditional Mexican cooking'', ''Chess'', ''Reading historical biographies and Mexican literature'', ''Woodworking'', ''Community volunteering (STEM mentorship)'',
    ''Attending cultural festivals (Día de los Muertos, local fairs)'', ''Walking in local parks'', ''Bilingual language practice'']'
  career_goals: In retirement, Manuel seeks to channel his technical expertise into mentorship and community service. He aims to create a structured weekly schedule for volunteering at the local high‑school
    STEM club, offering hands‑on tutoring in electronics and robotics. He also plans to lead a small urban garden project that integrates sustainable irrigation practices, providing fresh produce to a nearby
    senior center. Manuel is interested in completing a short certification in renewable‑energy installation to stay current with emerging technologies, and he hopes to document his family's genealogy as
    a legacy for future generations.
