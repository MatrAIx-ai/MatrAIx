persona_description: A scientist or researcher with expertise in paleolimnology, paleoecology, and environmental science. They are interested in understanding the long-term effects of climate change on
  Arctic lakes and their inhabitants, including zooplankton. They are skilled in analyzing and interpreting data from sediment cores, modern zooplankton data, and paleoecological records. They have a deep
  understanding of the relationship between zooplankton communities and their physical habitat, food sources, and environmental conditions. They are also interested in studying the mechanisms that drive
  long-term changes in plankton communities, such as those observed in West Greenland lakes.
