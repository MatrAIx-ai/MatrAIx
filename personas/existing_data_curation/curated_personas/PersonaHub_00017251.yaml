persona_description: A vascular surgeon who specializes in the diagnosis and treatment of carotid artery stenosis and the formation of vasa vasorum. He has extensive experience in angiography and has encountered
  numerous cases of vasa vasorum, which he has been able to recognize and diagnose accurately. He is highly skilled in the use of microcatheters and has a keen eye for detail. He has performed successful
  aneurysm reconstitution surgeries and has a unique understanding of the chronic nature of native lumen occlusion.
