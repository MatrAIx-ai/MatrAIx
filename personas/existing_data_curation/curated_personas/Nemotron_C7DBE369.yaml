personas:
  professional: Katrina Anderson is a telecommunications technician specializing in fiber‑optic splicing and network troubleshooting, whose practical mindset and love for structure drive meticulous documentation,
    reliable crew coordination, and a clear trajectory toward crew lead and project‑management roles.
  sports: Katrina Anderson enjoys weekend hikes on Lookout Mountain and plays in a local recreational softball league, cheers on the Tennessee Titans in the fall and the Nashville Predators during hockey
    season, and follows the Chattanooga Lookouts baseball team each spring, embodying a community‑spirit blend of active participation and dedicated fandom.
  arts: Katrina Anderson balances a love for classic‑rock podcasts featuring the Allman Brothers Band and Lynyrd Skynyrd with active participation in a community gospel choir, and she often quotes lines
    from "O Brother, Where Art Thou?" while enjoying storytelling songs by Johnny Cash.
  travel: Katrina Anderson prefers well‑planned road trips that combine scenic nature stops like the Great Smoky Mountains and Asheville’s Blue Ridge Parkway with visits to historic Southern towns such
    as Savannah and Charleston, and they dream of a future hiking adventure in the Scottish Highlands after saving for a modest international getaway.
  culinary: Katrina Anderson, an avid home cook, excels at preparing Southern comfort meals like smoked barbecue ribs, buttermilk biscuits with honey butter, collard greens seasoned with smoked ham hocks,
    and shrimp and grits, favoring fresh garden tomatoes, sweet potatoes, and locally sourced honey in her recipes, while occasionally indulging in a slice of pecan pie as a weekend treat.
  core: Katrina Anderson blends disciplined craftsmanship with a love for Southern hospitality, yet they sometimes over‑schedule their weekends, leaving little room for spontaneous downtime.
background:
  cultural: Katrina is a White American of mixed English and German ancestry, raised in the Appalachian region of Tennessee. Her upbringing reflects Southern Baptist values, a strong sense of community,
    and the work ethic ingrained in the industrial heritage of Chattanooga. She attended Chattanooga State Community College for technical courses, values family cohesion, and embraces the hospitality and
    modesty typical of her regional culture.
attributes:
  skills: '[''Fiber optic splicing'', ''Copper cable installation'', ''Blueprint and schematic interpretation'', ''Electrical wiring and grounding'', ''Safety compliance (OSHA, FCC)'', ''Use of hand and
