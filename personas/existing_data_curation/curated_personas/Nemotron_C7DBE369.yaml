    and reporting'', ''Time management'']'
  hobbies: '[''Hiking Lookout Mountain'', ''Vegetable gardening'', ''DIY home improvement'', ''Reading historical non-fiction'', ''Listening to classic rock podcasts'', ''Cooking Southern cuisine'', ''Community
    choir participation'', ''Volunteering at animal shelter'', ''Board games with friends'']'
  career_goals: Katrina aims to become a crew lead within the next three years, earning advanced fiber optic certification and completing her degree in Electrical Engineering Technology at a local community
    college. She envisions moving into project management for large-scale telecom rollouts, while eventually leveraging her experience to start a small contracting business that offers reliable line installation
    services to rural communities in Tennessee.
