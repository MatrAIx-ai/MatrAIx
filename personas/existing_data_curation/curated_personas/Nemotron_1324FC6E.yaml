  career_goals: Although retired from formal employment, Martha aims to deepen her impact on the Clearwater senior community. She plans to lead the local gardening club, expanding it into an intergenerational
    mentorship program where elders share planting techniques with youth. She also wishes to compile a community cookbook featuring family recipes and to become a volunteer coordinator at the senior center,
    organizing regular activities such as dance classes, bingo tournaments, and craft workshops. To preserve her quilting designs, she aspires to learn basic computer skills for digitizing patterns and
    sharing them online, ensuring her craft legacy endures.
