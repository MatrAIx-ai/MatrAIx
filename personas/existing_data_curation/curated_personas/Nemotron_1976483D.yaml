  career_goals: Although retired, Subhash aims to stay engaged by volunteering at the Johnson County historical society and the local senior center, where he can mentor younger volunteers in practical skills.
    He also intends to complete a handcrafted wooden rocking chair as a tribute to his late wife and to document his family’s genealogy in a self‑published booklet. Maintaining his health, independence,
    and mental sharpness remains a top priority, as does contributing to the preservation of local heritage.
