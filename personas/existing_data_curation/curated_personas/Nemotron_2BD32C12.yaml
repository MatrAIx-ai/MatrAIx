personas:
  professional: Simon Light, a retired small-business owner turned community handyman mentor, leverages his hands-on mechanical engineering background, woodworking mastery, and spreadsheet-savvy budgeting
    to design sustainable retrofit projects while channeling his competitive curiosity into leading monthly DIY workshops for neighbors and grandchildren.
  sports: Simon Light keeps fit with morning walks at the Chicago Lakefront Trail, participates in a senior pickleball league at the West Loop Community Center, and passionately roots for the Chicago Cubs,
    Chicago Bears, and Chicago Blackhawks while occasionally watching local high-school soccer matches.
  arts: Simon Light finds creative respite in restoring vintage model train scenery while listening to Bob Dylan and watching classic cinema like "Casablanca" and enjoys occasional visits to the Art Institute
    of Chicago to study works by Norman Rockwell and Grant Wood, often drawing inspiration for his own woodworking designs.
  travel: Simon Light prefers carefully planned road trips to scenic national parks such as Yellowstone and Acadia, enjoys vintage-car rallies in the Midwest, and dreams of a guided cultural tour of historic
    sites in England and the Scottish Highlands before his health limits long-hauls.
  culinary: Simon Light delights in cooking seasonal vegetable lasagna with heirloom tomatoes, kale, and aged Parmesan, expertly grills corn on the cob on a backyard smoker, and relishes occasional visits
    to a downtown farm-to-table bistro for a perfectly seared ribeye accompanied by roasted beet salad.
  core: Simon Light balances a meticulous DIY mindset with a competitive edge and occasional worry-induced over-planning, making them a charismatic mentor who can't resist double-checking every measurement
    while secretly hoarding a stash of vintage train manuals.
background:
  cultural: Simon was raised in a middle‑class, white, Midwestern family in southern Minnesota with Lutheran roots. His upbringing emphasized self‑reliance, community service, and respect for seasonal cycles,
    fostering his practical mindset and love of outdoor activities. The region’s strong volunteer culture inspired his involvement in local mentorship programs and community boards. While honoring traditional
    Midwestern values of modesty and hard work, Simon also embraces a forward‑looking curiosity about new technologies and sustainable practices.
attributes:
  skills: '[''Woodworking'', ''Home repair'', ''Automotive and small-engine maintenance'', ''Budgeting and financial planning'', ''Project management'', ''Basic computer literacy (spreadsheets, online research)'',
    ''Team leadership'']'
  hobbies: '[''Furniture making'', ''Model train restoration'', ''Reading historical nonfiction'', ''Gardening (vegetable gardening)'', ''Bridge (card game)'', ''Community‑theater set construction'']'
  career_goals: Now retired, Simon aims to channel his curiosity and competitive drive into lifelong learning and community mentorship. He plans to earn a certificate in sustainable building to retrofit
    his home with energy‑efficient upgrades, and to lead a monthly “handyman” workshop for his grandchildren and neighbors. He also intends to author a series of practical‑advice blog posts that blend his
    business experience with DIY insights, and to volunteer as an advisor at the local small‑business development center, offering his critical perspective to new entrepreneurs.
