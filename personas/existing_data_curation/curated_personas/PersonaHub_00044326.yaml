persona_description: A scientist and engineer who specializes in the field of terahertz imaging and 3D printing. He is passionate about developing new technologies that can enhance the capabilities of the
  Internet of Things. His research has focused on the integration of RFID chips into objects, but he has also explored the potential of InfraStructs as a way to uniquely identify objects without disrupting
  the printing process. He is currently presenting his research at SIGGRAPH 2013 on the topic of InfraStructs and its applications in the Internet of Things.
