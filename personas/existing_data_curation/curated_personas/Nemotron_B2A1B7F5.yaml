personas:
  professional: Maria Stone, an aspiring museum curator and arts education facilitator, merges their vivid visual storytelling, meticulous project planning, and sociable public‑speaking skills to design
    immersive community exhibitions and digital showcases that celebrate contemporary art and environmental stewardship.
  sports: Maria Stone, an avid hiker of the Green Mountains and yoga enthusiast, regularly volunteers with the Green Mountain Trail Club, follows the Vermont Catamounts women's soccer team, and cheers on
    the Boston Red Sox while keeping a casual weekend routine of trail runs and sunrise yoga sessions.
  arts: Maria Stone, a passionate visual storyteller, sketches watercolor studies of autumn foliage inspired by Georgia O'Keeffe, creates digital illustrations influenced by Loish, writes speculative short
    stories while listening to Sufjan Stevens and Björk, and curates indie film evenings featuring titles like 'Moonlight' and 'Parasite' for friends.
  travel: Maria Stone loves thoughtfully planned weekend getaways, having explored Burlington’s waterfront art scene, the historic streets of Boston, and the rugged coastline of Acadia National Park, while
    dreaming of a spring pilgrimage to the cherry blossoms in Washington, D.C., and a summer art residency in Asheville, North Carolina.
  culinary: Maria Stone, an intermediate home cook, delights in preparing farm‑to‑table dishes such as maple‑glazed salmon, herb‑infused goat cheese salad with local beets, and apple‑cinnamon crumble, often
    sourcing ingredients from nearby farmers' markets and experimenting with seasonal spices.
  core: Maria Stone blends boundless imagination with disciplined organization, channeling their love for art, community, and nature into a purposeful life while juggling occasional procrastination on paperwork
    and a penchant for late‑night sketching marathons.
background:
  cultural: Maria grew up in a middle‑class, white New England family in the town of Saint Albans, Vermont. Her upbringing emphasized education, community involvement, and appreciation for the natural landscape.
    Family outings to local farms, museums, and regional festivals nurtured her curiosity about art and history. The town's close‑knit community and Vermont’s progressive values have shaped her cooperative
    spirit, respect for cultural diversity, and commitment to environmental stewardship.
attributes:
  skills: '["Digital illustration", "Traditional drawing", "Creative writing", "Research and analysis", "Project coordination", "Public speaking", "Basic web design (HTML/CSS)", "Photography"]'
