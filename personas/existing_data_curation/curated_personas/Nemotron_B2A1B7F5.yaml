    "Hiking and nature walks", "Yoga", "Indie film watching", "Music exploration and playlist curation"]'
  career_goals: Maria envisions a career that bridges her love for art, communication, and community. She aims to pursue a Bachelor of Fine Arts followed by a Master's in Museum Studies or Arts Administration,
    with the long‑term goal of becoming a curator or education director at a contemporary art museum. Alternatively, she is open to roles in user experience design or content strategy for nonprofit organizations,
    where she can leverage her creative talents to craft engaging narratives that promote social and environmental causes.
