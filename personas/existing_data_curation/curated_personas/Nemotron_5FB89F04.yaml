personas:
  professional: Ashley Puentes is a seasoned electrician with over four decades of residential, commercial, and industrial wiring expertise, renowned for methodical compliance with the NEC and Texas codes,
    who blends a practical curiosity for solar technology with assertive mentorship of apprentices as they pivot toward part‑time consulting on safety training and renewable‑energy retrofits for the Midland
    community.
  sports: Ashley Puentes enjoys early‑morning birdwatching walks with their husband, participates weekly in the Midland Senior Pickleball Club, and faithfully watches the Midland RockHounds minor‑league
    baseball games, balancing gentle fitness routines with a quiet enthusiasm for community sports.
  arts: Ashley Puentes channels their creative side by crocheting intricate blankets for family and charity, immerses themselves in historical fiction by authors like Cormac McCarthy and Luis Alberto Urrea,
    and finds inspiration in the vibrant canvases of Frida Kahlo while listening to the soulful guitar of Carlos Santana during quiet evenings.
  travel: Ashley Puentes meticulously plans road‑trip itineraries, having explored Santa Fe, New Mexico, the historic streets of San Miguel de Allende, and the red‑rock scenery of Sedona, while dreaming
    of a pilgrimage to Cuzco, Peru, and prefers relaxed stays at boutique B&Bs over crowded resorts, often packing a notebook for bird‑spotting sketches.
  culinary: Ashley Puentes delights in preparing traditional Mexican dishes such as enchiladas verdes, chiles en nogada, and sopes, using fresh cilantro, epazote, and poblano peppers from their garden,
    and balances moderate cooking skill with a penchant for experimenting with new spice blends, though they occasionally over‑salt a batch of salsa when distracted by a crochet project.
  core: Ashley Puentes blends a methodical electrician’s precision with a quiet, creative spirit, juggling solar consulting ambitions, garden‑to‑table cooking, and crochet charity work while navigating
    the subtle challenges of aging with humor and occasional forgetfulness.
background:
  cultural: Ashley’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she maintains fluency in Spanish and embraces cultural traditions such as Día de los Muertos, family
    gatherings centered on homemade tamales, and weekly Mass at her local Catholic parish. Her values of family loyalty, hard work, and community responsibility influence both her professional ethic and
    personal life, fostering a deep commitment to mentoring younger workers and contributing to the well‑being of her Midland neighborhood.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial and industrial electrical systems'', ''Electrical code compliance (NEC, Texas Electrical Safety and Licensing Act)'', ''Troubleshooting and fault
    diagnosis'', ''Project planning and management'', ''Mentoring and apprenticeship training'', ''Safety inspections and OSHA compliance'', ''Solar panel installation and maintenance'', ''Basic HVAC electrical
    work'', ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Reading historical fiction'', ''Crocheting'', ''Birdwatching'', ''Walking and hiking'', ''Community volunteer work'', ''Listening to mariachi
    and folk music'']'
  career_goals: As she approaches retirement, Ashley aims to transition from full‑time field work to a part‑time consulting role, focusing on safety training and renewable‑energy projects for local homeowners
    and small businesses. She plans to complete her associate’s degree in electrical technology, obtain a master electrician license, and eventually launch a modest consulting firm with her husband that
    specializes in solar retrofits and energy‑efficiency upgrades for the Midland community.
