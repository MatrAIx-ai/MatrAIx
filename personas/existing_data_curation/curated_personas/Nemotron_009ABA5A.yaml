  career_goals: Maria dreams of attending an arts‑focused high school and later studying graphic design, illustration, or interactive media at a university. Her long‑term ambition is to become a concept
    artist or animator who weaves Mexican folklore and contemporary sci‑fi themes into visual narratives for video games or animated series. She also hopes to launch a bilingual online platform that showcases
    the artwork of Mexican‑American youth, allowing her to combine her creative passions with community advocacy. While she values artistic freedom, she aims to build a sustainable career that balances
    creative exploration with financial stability.
