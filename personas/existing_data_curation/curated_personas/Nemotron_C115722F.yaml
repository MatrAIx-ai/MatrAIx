personas:
  professional: An early childhood education leader, Doretha Wilkins designs art‑rich, developmentally appropriate curricula, mentors new teachers, and orchestrates community outreach programs, using their
    structured yet flexible approach and sociable charisma to push for equitable district‑wide policies.
  sports: A devoted fan of the Philadelphia Eagles, 76ers, and Phillies, Doretha Wilkins joins a weekend community jogging club, participates in local dance‑fitness classes, and occasionally cheers from
    the stadium bench, channeling competitive energy into both spectating and light cardio.
  arts: A passionate reader and photographer, Doretha Wilkins immerses themselves in contemporary literature from authors like Colson Whitehead and Brit Bennett, curates neighborhood photo exhibits, and
    sings in their church choir while grooving to R&B icons such as Mary J. Blige and Kendrick Lamar.
  travel: An organized explorer, Doretha Wilkins prefers short, meticulously planned weekend getaways to historic cities like Charleston and Washington, D.C., while dreaming of a spring trip to the Caribbean
    island of Saint Martin for its culinary scene, balancing family obligations with a love for cultural immersion.
  culinary: A seasoned home cook, Doretha Wilkins masters soulful dishes like collard greens simmered with smoked turkey, sweet‑potato pie, and fried catfish, yet sometimes over‑seasones with hot sauce,
    reflecting their bold palate and the joy of gathering friends around the dinner table.
  core: Doretha Wilkins blends a structured, competitive mindset with a vibrant social energy, turning classroom innovation, lively book clubs, and community gardening into a daily rhythm punctuated by
    occasional impulsive spending and a love for soulful music.
background:
  cultural: Doretha was raised in a close-knit African American family in West Philadelphia, where church, music, and community activism were central to daily life. Her upbringing emphasized the importance
    of storytelling, oral history, and collective responsibility, shaping her dedication to culturally responsive teaching. She regularly celebrates Juneteenth, honors family heritage through food and music,
    and engages in local Black cultural festivals, drawing on these experiences to enrich her classroom and community initiatives.
attributes:
  skills: '[''Curriculum Design'', ''Classroom Management'', ''Formative Child Assessment'', ''Family Engagement'', ''Multicultural Education'', ''Professional Development Facilitation'', ''Mentoring New
    Teachers'', ''Community Outreach Coordination'']'
  hobbies: '[''Reading African American literature'', ''Book-club facilitation'', ''Community gardening'', ''Soul-food cooking'', ''Church choir participation'', ''Hip-hop and R&B dancing'', ''Neighborhood
    photography'']'
  career_goals: Doretha aims to advance to a district-wide Early Childhood Program Coordinator role, where she can shape equitable, culturally responsive policies for preschool education across Philadelphia.
    She plans to earn a leadership certification in early childhood education, develop a citywide culturally enriched curriculum, and eventually become Director of Early Childhood Services, championing
    access to high-quality learning for all children in her community.
