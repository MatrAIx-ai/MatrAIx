  hobbies: '["Basketball (team sport)", "Robotics club", "Traditional and contemporary drumming", "Competitive video gaming (strategy games)", "Fishing and outdoor excursions", "LEGO building and model
    design", "Reading graphic novels", "Attending community powwows and cultural events"]'
  career_goals: Looking ahead, Chee aims to earn a scholarship through high school basketball, which would open pathways to a college degree in sports medicine or kinesiology. He is also motivated to become
    a community health advocate for urban American Indian youth, helping peers navigate mental‑health resources and cultural identity. In the long term, he envisions a career that combines his love of sports,
    practical problem‑solving, and cultural preservation—potentially as a tribal wellness coordinator or a youth sports coach who integrates traditional teachings with modern training.
