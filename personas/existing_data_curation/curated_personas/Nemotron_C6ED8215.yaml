personas:
  professional: Chee Berberena, a 13‑year‑old aspiring robotics engineer, channels a competitive, routine‑driven mindset into designing battle‑ready LEGO models and coding strategy‑based video bots, while
    reliably leading the after‑school robotics club’s weekly build sessions.
  sports: Chee Berberena, a 13‑year‑old varsity‑level basketball player for the Minneapolis Youth Basketball Association, trains five days a week to emulate the Minnesota Timberwolves, while also weekend‑fishing
    with their grandfather at Lake Calhoun and cheering loudly at Minnesota Timberwolves games.
  arts: Chee Berberena finds creative release in the weekly drumming circle where they sync contemporary beats with traditional rhythms inspired by renowned percussionist Mickey Hart, devour graphic novels
    by Jeff Lemire and Raina Telgemeier, and build intricate LEGO Creator Expert sets that blend futuristic skyscrapers with motifs reminiscent of tribal art, while still dancing proudly at community powwows.
  travel: Chee Berberena, who loves mapping the trails of Minneapolis’s Minnehaha and Lake Harriet parks and fishing at Lake Calhoun, dreams of a summer canoe trek through the Boundary Waters Canoe Area
    and a future road trip to Yellowstone, but currently sticks to budget‑friendly weekend getaways with family.
  culinary: Chee Berberena prefers a mix of teen classics and lake‑fresh flavors, regularly ordering pepperoni pizza topped with extra mozzarella, helping their grandfather grill walleye seasoned with lemon,
    dill, and butter, and experimenting with LEGO‑inspired cupcakes flavored with vanilla and chocolate sprinkles.
  core: Chee Berberena is a 13‑year‑old who fuses a competitive, routine‑loving mindset with a passion for robotics, varsity basketball, and drumming, all while navigating frequent worries that drive both
    meticulous planning and occasional impulsive splurges.
background:
  cultural: Chee belongs to a Dakota family that has lived in the Twin Cities for several generations. His household maintains a strong connection to tribal traditions, celebrating events such as the Summer
    Sun Dance and teaching him the basics of the Dakota language. He participates in the Minneapolis American Indian Center’s youth programs, where elders share stories, crafts, and cultural values like
    respect for the land and communal responsibility. While fully integrated into mainstream school life, Chee balances his urban upbringing with these Indigenous roots, which shape his worldview, sense
    of identity, and commitment to community service.
