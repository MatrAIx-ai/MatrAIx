personas:
  professional: Mary Garner, a 16‑year‑old high school junior with a knack for digital media, blends her organized yet adaptable nature and strong empathetic listening into creating eye‑catching graphics
    for her school's newsletter while envisioning a future as a community outreach coordinator or visual communications specialist for youth mental‑health nonprofits.
  sports: Mary Garner enjoys leisurely jogs along Belle Isle’s trails, follows the Detroit Lions football team and the Detroit Pistons basketball team from a fan’s perspective, and plays pickup soccer with
    a local community league’s “Belle Isle Rovers” on Saturday afternoons, showing a preference for low‑key activity paired with regional team loyalty.
  arts: Mary Garner sketches Detroit’s gritty streets while listening to classic soul legends like Aretha Franklin and contemporary R&B artists such as H.E.R., often cites mystery author Agatha Christie
    as literary inspiration, and admires graphic illustrators like Alison Bechdel for their storytelling through line work.
  travel: Mary Garner prefers short, budget‑conscious trips, having explored the art museums of Ann Arbor and the lakefront of Chicago, while day‑dreaming about a future solo weekend in New Orleans to soak
    up its music scene and culinary heritage, reflecting a mix of adventure and financial prudence.
  culinary: Mary Garner enjoys cooking simple, nutritious meals like baked salmon with lemon‑dill sauce, sautéed collard greens with smoked turkey, and hearty chili made with kidney beans and ground turkey,
    favoring fresh ingredients such as garlic and rosemary, yet sometimes skips meals when overwhelmed with school and volunteer commitments.
  core: Mary Garner balances a meticulous planner’s precision with a restless curiosity, channeling teenage worry into art, community service, and careful budgeting while secretly indulging in late‑night
    mystery novels and occasional video‑game marathons.
background:
  cultural: Mary is a White American raised in Detroit, Michigan, a city known for its industrial legacy, rich musical heritage, and resilient community spirit. Growing up in a predominantly middle‑class
    neighborhood, she has been shaped by Midwest values of hard work, self‑reliance, and a strong sense of local identity. The cultural fabric of Detroit—its Motown history, diverse neighborhoods, and ongoing
    economic challenges—has fostered Mary’s awareness of social inequities and her desire to contribute positively to her community. Family traditions include regular church gatherings and community events,
    reinforcing her cooperative nature while also nurturing her independent, introspective side.
