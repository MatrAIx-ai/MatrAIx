  hobbies: '[''Reading mystery novels'', ''Sketching urban landscapes'', ''Photography'', ''Listening to soul and R&B music'', ''Journaling'', ''Casual video gaming'', ''Walking in Belle Isle park'', ''Volunteer
    work at community food bank'']'
  career_goals: Mary aspires to earn her GED and then attend a community college where she can study social work or visual communications. She dreams of a career that blends her curiosity about people’s
    stories with practical problem‑solving—either as a community outreach coordinator for a youth mental‑health nonprofit or as a graphic designer creating promotional materials for local social‑service
    agencies. Her long‑term ambition is to develop programs that help other young people in Detroit navigate stress and build resilience, drawing on her own experiences of worry and self‑advocacy.
