  career_goals: Kristin aims to formalize her expertise with industry-recognized certifications such as CompTIA Network+ and Security+, followed by a Cisco CCNA. Within the next three years she hopes to
    move into a supervisory IT manager role, leading a small team that supports local businesses in Collin County. She is also motivated to design and implement automation scripts that reduce repetitive
    tasks by at least 30%, and to strengthen the organization’s security posture through user-training programs. Long-term, she envisions starting a boutique consulting firm that offers pragmatic IT solutions
    for small-to-mid-size enterprises, allowing her to balance professional growth with family time and continued community involvement.
