  hobbies: '[''gardening'', ''knitting'', ''hand‑stitched quilting'', ''reading historical fiction'', ''listening to Appalachian folk music'', ''birdwatching'', ''genealogy research'', ''cooking Southern
    dishes'', ''church volunteering'']'
  career_goals: Amira’s personal ambitions focus on maintaining independence, deepening her practical knowledge, and leaving a lasting legacy for her family and community. She hopes to compile her favorite
    recipes and stories into a handwritten memoir to share with grandchildren. She aims to become comfortable using a tablet to video‑chat with distant relatives and to document her quilting patterns digitally.
    While she does not seek formal employment, she aspires to be recognized locally for her quilting by entering regional craft fairs and to expand the community garden she helped start, mentoring younger
    gardeners. She also wishes to continue assisting her church’s Bible study group, ensuring it remains a welcoming space for small gatherings.
