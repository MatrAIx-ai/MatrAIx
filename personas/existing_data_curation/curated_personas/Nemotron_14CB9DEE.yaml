personas:
  professional: Amira Broome, a seasoned home‑based crafts and garden mentor, blends practical carpentry, quilting, and organic gardening skills with a curiosity for new techniques; they enjoy leading community
    workshops, though they often let schedules drift, and they relish a quiet competitiveness when their quilts are judged at regional fairs.
  sports: Amira Broome, a gentle fitness enthusiast who prefers early‑morning walks along the creek and seasonal birdwatching hikes, follows the Tennessee Volunteers football and the Nashville Predators
    hockey teams on television, volunteers on the local senior center bowling league, and occasionally joins the church’s casual softball games, yet they admit to skipping their own strength‑training routine
    when the garden demands attention.
  arts: Amira Broome, a devoted lover of folk music and storytelling, spins records of The Carter Family and Dolly Parton while quilting to the rhythm of their melodies, reads historical fiction by Philippa
    Gregory and local history magazines, and they draw inspiration from the paintings of Andrew Wyeth, often displaying their hand‑stitched quilts alongside framed reproductions of folk art in the living
    room.
  travel: Amira Broome, a cautious but curious traveler who prefers low‑key road trips accompanied by a grandchild, has explored the Great Smoky Mountains National Park and the historic streets of Savannah,
    they dream of a heritage pilgrimage to Edinburgh’s old cemeteries to trace clan roots, but a tight budget and reliance on family for transportation keep most adventures within a day‑long drive radius.
  culinary: Amira Broome, a seasoned Southern cook who perfects fried chicken, buttery cornbread, and collard greens simmered with smoked ham hocks, now experiments by adding heirloom tomato purée to her
    classic chicken soup and a splash of bourbon to peach cobbler, yet they often forget to label leftovers in the fridge, causing occasional mix‑ups during weekly church potlucks.
  core: Amira Broome, a garden‑loving quilter who blends tradition with curiosity, fiercely competes in local craft fairs while habitually misplacing receipts and forgetting bill due dates.
background:
  cultural: Amira comes from a multi‑generational white Appalachian family that has lived in the Hawkins County area for decades. The region’s cultural fabric is woven from a strong evangelical Christian
    tradition, close‑knit family ties, and a heritage of folk crafts, farming, and storytelling. Growing up on a modest family farm, she learned the value of self‑reliance, hospitality, and preserving local
    customs such as home‑cooked Southern meals and hand‑crafted quilts. The community’s emphasis on church participation and seasonal celebrations has shaped her social life, while the surrounding Appalachian
    hills have fostered an appreciation for nature, folk music, and oral history.
