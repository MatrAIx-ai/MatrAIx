personas:
  professional: Haleigh Sheridan, a 49‑year‑old bakery owner in Ada, blends curiosity for novel flavor pairings with a methodical, reliable production process, excelling in artisanal sourdough fermentation,
    precise pastry lamination, and intricate cake decorating while rigorously overseeing inventory control, cost budgeting, staff scheduling, and community event coordination.
  sports: Haleigh Sheridan enjoys weekend line‑dancing at community gatherings, participates in a local walking club that tallies mileage toward the Ada Marathon, and fervently roots for the Oklahoma City
    Thunder, the Oklahoma Sooners football team, and the Ada High School baseball squad, balancing a modest fitness routine with occasional pick‑up basketball games at the church gym.
  arts: Haleigh Sheridan captures the artistry of baked creations through Instagram snapshots inspired by the photography of Annie Leibovitz, harmonizes in the church choir with renditions of gospel classics,
    and finds inspiration in the folk melodies of Woody Guthrie and the culinary literature of Michael Ruhlman, weaving these influences into their cake designs.
  travel: Haleigh Sheridan’s travel itinerary blends purposeful research trips to San Francisco sourdough bakeries, leisurely road‑trips to the Wichita farmers’ market, and family vacations to Santa Fe
    for its vibrant art scene, while dreaming of a culinary pilgrimage to Provence’s lavender fields and a short stay in Kyoto to study traditional wagashi.
  culinary: Haleigh Sheridan infuses the bakery with herb‑laden creations like rosemary‑scented sourdough, lavender‑infused lemon tart, and jalapeño‑cheddar biscuit, using fresh basil, thyme, and sage from
    their own plot, while mastering buttery croissant lamination and crafting a heritage‑inspired honey‑glazed pecan roll that marries Midwestern comfort with bold flavor twists.
  core: Haleigh Sheridan is a competitive, methodical baker who balances relentless curiosity with meticulous organization, turning herb‑filled pastries into community celebrations while occasionally letting
    skepticism color new collaborations.
background:
  cultural: 'Haleigh was raised in the heart of Oklahoma’s agrarian culture, where family, faith, and community gatherings shape daily life. As a white Oklahoman, she grew up with the values of hard work,
    hospitality, and modest self‑reliance that are hallmarks of the Midwest‑Great Plains region. Church and school events, county fairs, and Friday night football games formed the backdrop of her childhood,
    instilling a love for collective celebrations and a healthy skepticism toward unfamiliar ideas. These roots influence her baking philosophy: honoring traditional Southern comfort foods like pecan pie
    and fried dough while daring to experiment with new techniques and flavors in a pragmatic, well‑organized manner.'
attributes:
  skills: '[''Artisanal sourdough bread baking'', ''Pastry dough lamination and croissant production'', ''Custom cake decorating and sugar art'', ''Recipe development and flavor testing'', ''Inventory management
    and cost control'', ''Food safety and sanitation compliance'', ''Staff scheduling and mentorship'', ''Customer service and order fulfillment'', ''Community event planning'', ''Baking competition preparation'']'
  hobbies: '[''Herb gardening for fresh bakery ingredients'', ''Visiting regional food festivals and state fairs'', ''Reading culinary history and recipe archives'', ''Volunteering at the local food bank'',
    ''Line dancing at community events'', ''Singing in the church choir'', ''Collecting vintage cookbooks'', ''Traveling to explore regional cuisines'', ''Photography of baked goods'', ''Hosting dinner
    parties for friends and family'']'
  career_goals: Haleigh aims to expand her family‑run bakery in Ada into a regional destination by adding a second storefront in nearby Oklahoma City and launching a line of heritage‑inspired baked goods
    sold through local farmers’ markets. She is driven to win the Oklahoma State Baking Championship, which would cement her reputation and open opportunities for teaching workshops to aspiring bakers.
    Long‑term, she hopes to partner with local grain producers for sustainable sourcing and eventually publish a cookbook that blends Midwestern comfort flavors with the innovative twists she constantly
    experiments with.
