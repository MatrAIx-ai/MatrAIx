persona_description: A geologist who specializes in the study of river systems, particularly those in Texas. She is interested in the geologic history of the area, the formation of the Angelina River, and
  the impact of the river on the surrounding terrain and communities. Her research interests include the paleoecology of the region, the evolution of river systems, and the interactions between rivers and
  their surrounding landscapes. She is also interested in the cultural and economic impacts of river systems on the communities that depend on them.
