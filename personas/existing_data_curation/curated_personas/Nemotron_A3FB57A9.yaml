  hobbies: '[''Book club'', ''Volunteer tech teaching'', ''Community theater'', ''Backyard gardening'', ''Line dancing'', ''Southern cooking'', ''Weekend road trips'', ''Nature photography'', ''Quilting
    circle'', ''Local history tours'', ''Bridge club'', ''Yoga/stretching'']'
  career_goals: 'Looking ahead to the next few years, Maria aims to transition from full‑time employment to a part‑time consulting role that lets her leverage her deep knowledge of legacy and modern systems
    while reducing daily stress. She plans to earn a recognized business analysis certification (e.g., CBAP) and a CompTIA A+ credential to formalize her self‑taught expertise. Mentorship is a central ambition:
    she hopes to mentor younger analysts through local community college programs and informal workshops at the Covington library. Additionally, Maria wants to lead a small volunteer tech‑support team for
    local nonprofits, helping them adopt affordable digital tools while maintaining a balanced lifestyle that allows more time for family gatherings and her community activities.'
