  hobbies: '["Abstract painting", "Digital photography", "Reading speculative fiction", "Playing acoustic guitar", "Board games", "Mindfulness meditation", "Hiking", "Volunteer work at community food bank"]'
  career_goals: Alexander aims to become a certified medical billing specialist and eventually move into a supervisory role within a healthcare billing department, where he can lead a team and drive efficiency
    improvements. He plans to complete his associate's degree in accounting or health information management and pursue additional certifications such as Certified Professional Biller (CPB). Long‑term,
    he envisions transitioning into a financial analyst position that blends his analytical strengths with his creative curiosity, potentially developing innovative billing solutions for nonprofit health
    organizations. He is also motivated to volunteer his expertise to help low‑income families navigate medical expenses.
