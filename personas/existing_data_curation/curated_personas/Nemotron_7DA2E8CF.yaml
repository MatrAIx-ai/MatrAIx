  career_goals: Douglas dreams of a future where he can blend his artistic talent with scientific curiosity—he envisions becoming a wildlife illustrator or a museum curator who creates immersive exhibits
    that teach others about nature. He also hopes to develop a simple app or online platform that helps kids manage anxiety, drawing on his personal experiences and desire to support peers. In the longer
    term, he aspires to study biology or environmental science, using his artistic skills to communicate complex ideas to a broader audience.
