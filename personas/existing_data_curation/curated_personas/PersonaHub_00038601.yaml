persona_description: A pro-life scientist who is promoting the use of reprogrammed stem cells for medical research and treatment. They are a former president of the International Society for Stem Cell Research
  and have been using reprogrammed stem cells to produce cell lines for 10 diseases, including muscular dystrophy, juvenile diabetes, Parkinson's disease, and Down syndrome. They believe that reprogramming
  is a safer and more ethical method of generating stem cells than using embryonic stem cells, and that it will accelerate medical research. They are also interested in the ethical and legal implications
  of reprogramming and the potential impact on the scientific community and society as a whole.
