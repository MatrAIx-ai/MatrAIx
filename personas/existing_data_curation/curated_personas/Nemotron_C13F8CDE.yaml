  hobbies: '[''digital sketching'', ''photography'', ''hiking'', ''acoustic guitar'', ''reading literature and philosophy'', ''woodworking'', ''community art workshops'', ''book club'']'
  career_goals: Charles aims to first earn his GED and then enroll in a community college program in Graphic Design or Digital Media. He plans to build a professional portfolio of illustration, photography,
    and web projects that highlight Appalachian culture. In the short term, he hopes to secure a junior designer role with a regional nonprofit or small studio, where he can apply his organized work style.
    His long‑term ambition is to run his own creative studio that produces visual storytelling and promotional material for local heritage organizations, combining his artistic passions with a stable, community‑focused
    career.
