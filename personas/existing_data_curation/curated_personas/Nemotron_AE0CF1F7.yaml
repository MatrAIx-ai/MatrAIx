personas:
  professional: Nadya Jawahir is a compassionate mental‑health practitioner with a strong foundation in client‑centered counseling, adept at integrating art‑based interventions, narrative therapy, and mindfulness
    techniques, and their imaginative, flexible style translates into fluid scheduling and creative treatment plans that resonate with clients seeking non‑verbal expression.
  sports: Nadya Jawahir finds solace in gentle yoga practices and solitary walks through Oakland County nature preserves, occasionally joins the local Oakland County Hiking Club for weekend treks, and while
    they cheer on the Detroit Lions and Detroit Pistons from a comfortable couch, they prefer low‑intensity, introspective fitness over competitive sports.
  arts: Nadya Jawahir channels their vivid imagination into abstract canvases inspired by Kandinsky, curates ambient playlists featuring Brian Eno and Aphex Twin, immerses themselves in speculative fiction
    by Octavia Butler and poetry by Ocean Vuong, and regularly attends local gallery openings and community cultural heritage events to deepen their artistic dialogue.
  travel: Nadya Jawahir prefers low‑key, solitary getaways, often planning spontaneous weekend trips to Michigan’s Mackinac Island or the serene forests of the Upper Peninsula, has already explored Asheville’s
    artsy neighborhoods, and dreams of a future pilgrimage to Iceland’s volcanic landscapes and Japan’s Zen temples, balancing wanderlust with a modest travel budget.
  culinary: Nadya Jawahir enjoys a primarily plant‑based diet, often experimenting with beetroot risotto, roasted cauliflower tacos, and miso ramen at home, though they consider themselves a kitchen amateur
    who relies on fresh rosemary, turmeric, and a well‑worn cast‑iron skillet, and they love treating themselves to artisanal coffee with a dash of matcha latte at local cafés.
  core: Nadya Jawahir blends a quiet, creatively‑driven mind with a relaxed, sometimes disorganized approach to life, turning spontaneous art‑supply splurges and solitary yoga sessions into a holistic practice
    of self‑care and community healing.
background:
  cultural: Nadya identifies as African-American and grew up in the culturally diverse suburbs of Detroit, giving her a deep connection to the Black community in Michigan. Her family traditions emphasized
    storytelling, music, and communal support, which shaped her empathetic and cooperative nature. Living in Ferndale—a city known for its progressive values and vibrant arts scene—has exposed her to a
    blend of Midwestern sensibility and multicultural influences. She draws on the resilience and creative spirit of the African diaspora in her therapeutic work, often integrating cultural symbols, rhythms,
    and narratives that resonate with Black clients seeking affirmation and healing.
attributes:
  skills: '[''active listening'', ''client-centered counseling'', ''basic CBT techniques'', ''narrative therapy'', ''art-based therapeutic interventions'', ''creative journaling facilitation'', ''crisis
    de-escalation'', ''trauma-informed care'', ''culturally responsive counseling for Black communities'', ''client assessment and intake'', ''community resource navigation'', ''mindfulness and relaxation
    facilitation'', ''flexible case management'']'
  hobbies: '[''abstract painting'', ''journal sketching'', ''reading speculative fiction'', ''writing poetry'', ''listening to ambient experimental music'', ''visiting art galleries'', ''solitary nature
    walks'', ''gentle yoga'', ''mindfulness meditation'', ''curating African-American cultural events'', ''participating in small literary readings'']'
  career_goals: Nadya aims to obtain licensure as a clinical psychologist by completing a master's program in counseling psychology while continuing her work in community mental health. She envisions opening
    a boutique private practice that combines traditional talk therapy with art-therapy and narrative-based modalities, specifically serving Black youth and adults seeking safe, creative spaces for healing.
    Long-term, she hopes to develop a culturally tailored curriculum on creativity in mental health, publish research on the benefits of artistic expression for trauma recovery, and mentor emerging counselors
    from underrepresented backgrounds. She also aspires to lead community workshops in Ferndale that promote mental-wellness through quiet, reflective practices such as guided meditation and expressive
    art.
