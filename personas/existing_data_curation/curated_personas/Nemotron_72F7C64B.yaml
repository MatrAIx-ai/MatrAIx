personas:
  professional: Haley Wojtowicz, a veteran Seattle school bus driver with over 30 years of service, combines methodical route planning, meticulous vehicle inspections, and a warm, talk‑filled driving style
    that turns daily trips into community classrooms, while also mentoring new drivers and championing safety initiatives despite occasionally insisting on paper logs over digital tools.
  sports: Haley Wojtowicz is a dedicated member of the Seattle Senior Walking Club, attends Seattle Seahawks games each fall, follows the Seattle Kraken hockey season, and participates in a seasonal senior
    softball league, balancing low‑impact exercise with their love for the Pacific Northwest waterfront strolls.
  arts: Haley Wojtowicz sings lead alto in the local St. Mark’s Community Choir, delights in productions at the 5th Avenue Theatre—especially classic Broadway scores by Leonard Bernstein—and enjoys reading
    early‑20th‑century Midwestern historical fiction by authors such as Patricia Miller, all while knitting themed scarves inspired by their favorite shows.
  travel: Haley Wojtowicz plans leisurely road trips with their husband to Pacific Northwest gems like Olympic National Park, Mount Rainier, and the North Cascades, prefers detailed itineraries with rest
    days, and dreams of a future visit to Yellowstone, all while balancing a modest travel budget and the need for accessible accommodations.
  culinary: Haley Wojtowicz prepares beloved Polish comfort foods such as pierogi stuffed with potato and cheese, bigos simmered with sauerkraut and kielbasa, and homemade żurek soup, favoring ingredients
    like dill, mushrooms, and rye flour, while also enjoying Seattle‑style grilled salmon, though they often over‑salt dishes in their enthusiasm.
  core: Haley Wojtowicz blends a structured, safety‑first mindset from decades behind the wheel with a lively social streak that shines in bridge, choir, and gardening, all while maintaining a careful financial
    plan, managing age‑related health challenges, and dreaming of park‑filled road trips.
background:
  cultural: Haley comes from a Polish‑American family that settled in Seattle after World War II. Her grandparents preserved Polish customs—such as making pierogi for holidays, celebrating St. Nicholas
    Day, and sharing folk music—while also embracing the progressive, environmentally‑conscious culture of the Pacific Northwest. Growing up, she attended public schools and was active in a local Catholic
    parish, where she learned the value of community service. This blend of Polish heritage and Seattle’s diverse, civically engaged atmosphere has shaped her respect for tradition, love of communal activities,
    and commitment to helping others, especially children and seniors.
