  career_goals: Haley aims to remain an active contributor to the school transportation community for as long as her health permits. She hopes to transition into a part‑time senior driver trainer, sharing
    her decades of experience with new hires and developing a mentorship program for young women in transportation. Haley also plans to serve on the district’s Safety and Wellness Committee to influence
    student‑transport safety policies. Personally, she looks forward to traveling with her husband to several national parks in the Pacific Northwest, writing a memoir of her bus‑driving career, and volunteering
    for senior‑transport services after she retires from school routes.
