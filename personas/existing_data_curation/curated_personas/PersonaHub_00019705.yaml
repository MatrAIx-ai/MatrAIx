persona_description: A humanitarian logistics professional who is committed to reducing the environmental impacts of humanitarian logistics and supply chain activities. This individual is passionate about
  embedding environmental sustainability measures in their logistics and procurement actions, ensuring that relief items and by-products of humanitarian action are designed to be reusable and have a long
  lifespan. They are dedicated to raising awareness and developing guidance and training on environmentally sustainable logistics and supply chain activities to be widely available to the humanitarian community.
  The WREC project is likely to be of great interest to this individual, as it aims to reduce and manage the harmful consequences of humanitarian logistics and supply chain induced waste and pollution in
  a focused and sustained manner over an initial period of two years.
