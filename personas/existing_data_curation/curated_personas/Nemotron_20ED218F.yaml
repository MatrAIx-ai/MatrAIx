personas:
  professional: Ruth Hill, a 51‑year‑old freelance bookkeeper and administrative consultant, leverages her meticulous planning, budgeting expertise, and conflict‑mediation skills to support small local
    businesses while channeling her competitive drive into launching a community garden mentorship project for neighborhood youth.
  sports: Ruth Hill follows the Miami Heat and the Tampa Bay Rays, enjoys early‑morning walks along Fort Lauderdale’s coastal trail for low‑impact cardio, and participates in a weekly senior‑friendly yoga
    class at the community center, which they approach with the same disciplined routine they apply to bookkeeping.
  arts: Ruth Hill appreciates classic soul legends like Aretha Franklin and contemporary jazz pianist Robert Glasper, attends monthly gospel choir rehearsals at her church, and volunteers at the local African
    American cultural museum, where they often discuss the historical significance of the exhibit while sipping sweet tea.
  travel: Ruth Hill prefers weekend road trips to historic towns such as Savannah, Georgia and Charleston, South Carolina, enjoys occasional Caribbean cruises to the Bahamas for a change of scenery, and
    meticulously plans itineraries in advance to balance budget constraints with the desire for cultural immersion, though they sometimes skip travel insurance.
  culinary: Ruth Hill transforms traditional collard greens, black‑eyed peas, and sweet potato pie into healthier versions by using olive oil, low‑sodium broth, and whole‑grain crusts, regularly experiments
    with herb‑infused quinoa salads, and relishes the aroma of fresh rosemary and thyme from her backyard garden while cooking, which they share with neighbors during community gatherings.
  core: Ruth Hill is a pragmatic garden‑enthusiast‑bookkeeper who turns spreadsheets into harvest plans, never skips a Juneteenth potluck, and secretly hoards discount grocery coupons for future savings,
    which they consider a quirky form of financial discipline.
background:
  cultural: Ruth is an African American woman who grew up in the vibrant black community of Broward County. Her upbringing was shaped by the church, family gatherings, and the rich cultural tapestry of
    South Florida, where Caribbean and Southern influences intersect. She maintains a strong sense of pride in her heritage, celebrating traditions such as Juneteenth, Black History Month, and soul‑food
    cuisine. Her experiences as a single mother and divorcee have cultivated resilience and a pragmatic outlook, while ongoing community involvement reinforces values of solidarity and mutual support within
    the black community.
