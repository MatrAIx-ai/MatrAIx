  hobbies: '[''Scale model building'', ''Traditional Mexican cooking'', ''Painting wood with folk designs'', ''Lake Michigan shoreline walks'', ''Herb gardening'', ''Attending cultural festivals'', ''Listening
    to corridos'', ''Reading mystery novels'', ''Neighborhood woodworking circle'']'
  career_goals: Nadia aspires to open a modest workshop where she can produce a signature line of furniture that blends Mexican folk motifs with Midwestern functional design. She aims to gain formal certification
    in building codes to expand her service offerings and secure better health benefits as she approaches retirement age. Her competitive nature fuels a desire to win regional craft‑fair awards and establish
    a reputation as a go‑to carpenter for custom, culturally infused pieces. Additionally, she hopes to teach weekend woodworking classes for community members, turning her craft into a therapeutic outlet
    for herself and others who share her intense emotional landscape.
