personas:
  professional: Nadia Moreira, a senior carpenter who blends hand‑crafted joinery with vibrant folk motifs, leverages their practical curiosity and competitive drive to deliver bespoke furniture, and they
    often juggle client deadlines with a relaxed, improvisational workflow that leaves them feeling both energized and occasionally overwhelmed.
  sports: Nadia Moreira enjoys leisurely walks along the Lake Michigan shoreline as their primary fitness regimen, occasionally joining a local adult softball league that competes against neighboring town
    teams, and they remain a devoted fan of the Milwaukee Brewers and the Green Bay Packers, cheering them at weekend games.
  arts: Nadia Moreira spends evenings crafting hand‑painted wooden panels inspired by folk narratives while listening to corridos from Los Tigres del Norte and admiring the colorful murals of Diego Rivera,
    and they unwind with mystery novels by Agatha Christie.
  travel: Nadia Moreira prefers short road trips that blend cultural immersion and relaxation, such as a weekend in Santa Fe’s historic Plaza, a family visit to the vineyards of Napa Valley, and an annual
    pilgrimage to the bustling markets of Oaxaca, and they balance their travel budget with a modest savings plan.
  culinary: Nadia Moreira combines their herb garden’s fresh cilantro, oregano, and epazote with traditional dishes like chiles en nogada, tamales, and pozole, skillfully balancing authentic flavors while
    occasionally over‑seasoning in the excitement of culinary experimentation, and they often share the meals with friends during community potlucks.
  core: Nadia Moreira channels their fierce curiosity and competitive spirit into vibrant woodworking, yet their tendency toward disorganization and intense emotional swings make every project a rollercoaster
    of creative highs and anxious lows, a reality they navigate with both determination and occasional self‑doubt.
background:
  cultural: Nadia grew up in a Mexican immigrant family that settled in Racine, Wisconsin, where bilingualism and cultural pride were central to her upbringing. Her parents instilled a strong work ethic
    and a love for Mexican traditions, from festive music to holiday foods. Though she balances American practicality with Mexican creativity in her carpentry, she often incorporates bright colors, hand‑painted
    motifs, and traditional joinery techniques inspired by her heritage. Active in the local Hispanic community, Nadia participates in cultural events, volunteers at the community center’s language programs,
    and shares family recipes that keep her cultural roots vibrant while navigating life in the Midwest.
attributes:
  skills: '[''Custom woodworking'', ''Residential framing'', ''Cabinet and furniture making'', ''Furniture restoration'', ''Hand tool mastery'', ''Power tool operation'', ''Basic blueprint interpretation'',
