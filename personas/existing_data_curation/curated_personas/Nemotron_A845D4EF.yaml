personas:
  professional: Justine Stansell is an emerging community-arts program coordinator in training, blending their solid visual analysis and graphic design abilities in Photoshop and Canva with a methodical
    project coordination approach, while their innate curiosity pushes them to continually explore new artistic movements and integrate fresh ideas into promotional campaigns.
  sports: Justine Stansell is a casual runner who participates in a local hiking club that explores the Sleeping Bear Dunes and the Tahquamenon Falls trail system, cheers for the Detroit Lions and Red Wings,
    practices yoga at the community center during winter, and prefers low-impact exercise over competitive team sports.
  arts: Justine Stansell immerses themselves in the visual arts by sketching Great Lakes shorelines, curating a personal online gallery featuring Ansel Adams-style black-and-white photography, admiring
    watercolor works by Mary Whyte, and attending gallery openings that showcase contemporary artists like Shepard Fairey, while also finding inspiration in the music of Sufjan Stevens and the performances
    of Lin-Manuel Miranda.
  travel: Justine Stansell favors meticulously planned, budget-conscious weekend trips such as kayaking on Lake Huron, exploring historic Mackinac Island, and hiking the Porcupine Mountains, while dreaming
    of a summer study-abroad stint in Edinburgh, Scotland, to soak in its literary cafe and art museums, balancing a limited student budget with a love for both scenic adventure and cultural immersion.
  culinary: Justine Stansell enjoys experimenting with seasonal Midwestern produce, often preparing roasted beet and goat-cheese salad with fresh dill, baking blueberry-lemon scones, and mastering a creamy
    butternut-squash risotto with sage and Parmesan, while also savoring sushi rolls with avocado and cucumber at a local waterfront eatery.
  core: Justine Stansell blends artistic curiosity with meticulous organization, turning weekend hikes into watercolor studies, budgeting their student life with precision yet occasionally splurging on
    paint supplies, and juggling mild allergies and migraines while maintaining a steady rhythm of community-center teaching and personal sketching.
background:
  cultural: Justine grew up in a middle‑class, white family in Bay County, Michigan, where Midwestern values of hard work, modesty, and community involvement were central. Her upbringing emphasized the
    importance of education, punctuality, and helping neighbors, reflected in traditions like annual county fairs, local church gatherings, and volunteer clean‑up days along the Lake Huron shoreline. The
    region’s strong connection to the Great Lakes fostered an appreciation for outdoor recreation and seasonal change, shaping her love for hiking and nature photography. While her family celebrated typical
    American holidays, they also honored regional customs such as the Michigan cherry‑pie bake‑off and the auto‑industry heritage of the nearby city of Saginaw. This cultural backdrop blends a practical,
    down‑to‑earth mindset with an openness to the arts, as local community centers often host art exhibitions and theater performances that introduced Justine to creative expression early on. Her cultural
    identity is rooted in this balance of pragmatic Midwestern sensibility and a curiosity for artistic and innovative ideas.
attributes:
  skills: '["Microsoft Office Suite (Word, Excel, PowerPoint)", "Google Workspace collaboration tools", "Basic Adobe Photoshop and Canva design skills", "Project coordination and timeline management", "Visual
    analysis and art curation", "Creative and academic writing", "Budgeting and meal planning", "Home organization and digital task management", "Effective interpersonal communication (cooperative listening
    and assertive advocacy)"]'
  hobbies: '["Sketching and watercolor painting", "Photography (landscape and community events)", "Visiting art galleries and museums", "Reading contemporary fiction, sci‑fi, and art‑history", "Bullet‑journal
    and reflective journaling", "Volunteering in community‑center art‑craft circle", "Cooking and baking seasonal recipes", "Genealogy research", "Hiking local nature trails"]'
  career_goals: Justine aims to complete her associate degree in Marketing and Graphic Design, then transfer to a four‑year university to earn a bachelor’s in Communications with a concentration in Arts
    Administration. Her short‑term goal is to secure an internship with a local cultural institution or nonprofit that runs community‑arts programs, where she can apply her project‑management and design
    skills. In the medium term, she aspires to become a Community Arts Program Coordinator, developing workshops, exhibitions, and outreach events that connect residents of Bay County with creative opportunities.
    Ultimately, she envisions launching a freelance graphic‑design studio that specializes in branding for small businesses and cultural events, allowing her to blend her artistic passion with reliable
    income to support her growing family. Throughout her career path, she plans to continue learning emerging digital media tools and to seek leadership roles where she can mentor younger creators.
