persona_description: A rural energy policy expert who has extensive experience in developing and implementing rural energy policies and programs in Afghanistan. They have a deep understanding of the challenges
  and problems faced by rural communities in Afghanistan, and have a proven track record of developing innovative approaches to the delivery of rural energy. They are skilled in integrating thermal energy
  services into rural energy programs and have a keen interest in exploring the potential for innovation in the rural energy space in Afghanistan. They are also knowledgeable about the financing principles
  of global financing mechanisms for climate change and energy, and have a passion for aligning the program principles to these mechanisms.
