personas:
  professional: An aspiring teen set designer Michael King merges a love for sketching, LEGO engineering, and guitar composition to create miniature stage models for community theater workshops, relying
    on meticulous planning balanced with spontaneous artistic flair, and they often assertively lead small design teams while staying reliable enough to meet tight rehearsal deadlines.
  sports: Michael King enjoys playing midfield for the Glendale Soccer Club and joining after-school basketball pickup games, while cheering on the Los Angeles Lakers, Los Angeles Dodgers, and LA Galaxy,
    and they approach fitness with a balanced routine of weekend soccer practice, occasional jogging in the nearby hills, but they often skip cardio on days they're absorbed in building intricate LEGO skyscrapers.
  arts: Michael King spends weekends sketching cityscapes inspired by the works of Edward Hopper, strumming acoustic covers of John Mayer, and photographing historic neighborhoods with a vintage film camera,
    while they regularly attend exhibitions featuring Shepard Fairey's street art, admire graphic novels by Jill Thompson, and volunteer in community theater set design, letting these artistic influences
    shape their storytelling voice.
  travel: Michael King's travel style blends careful planning of museum tours with spontaneous photo-walks, having explored Disneyland, hiked the trails of Yosemite National Park, and joined a family cultural
    trip to Kyoto to visit the Fushimi Inari shrine and anime museums, while they dream of backpacking through Rome's ancient ruins and the Swiss Alps, though budget constraints limit longer overseas stays.
  culinary: Michael King enjoys a semi-independent kitchen routine, confidently whipping up tacos al pastor with pineapple, making sushi rolls with avocado and cucumber under his mother's guidance, and
    perfecting pepperoni pizza topped with fresh basil, while they favor bold flavors like soy sauce, chipotle, and mozzarella, and they sometimes forget to eat breakfast before school, leading to midday
    snack cravings.
  core: Michael King is a curious, organized teen who bridges his love for LEGO engineering, guitar melodies, and sketching with a disciplined yet flexible approach to school, hobbies, and friendships,
    though they occasionally procrastinate on chores and forget to pack lunch.
background:
  cultural: Michael grew up in a middle‑class suburban setting in Glendale, California, within a family that values education, creativity, and community involvement. His upbringing reflects typical American
    cultural norms, with an emphasis on independence, volunteerism, and exposure to a diverse surrounding community that includes a strong Armenian presence and a vibrant local arts scene. Family outings
    to museums, library programs, and neighborhood festivals have nurtured his appreciation for varied artistic expressions while reinforcing a culturally pluralistic yet personally rooted identity.
attributes:
  skills: '["Digital illustration (Procreate)", "Basic Python programming", "Scratch game development", "Photography fundamentals", "Acoustic guitar playing", "Music theory basics", "Creative writing",
    "Research and fact‑checking", "Organizational planning for school projects", "Collaboration in small‑group tasks"]'
  hobbies: '["Sketching and drawing", "Playing acoustic guitar", "Composing original melodies", "Building LEGO MOCs", "Visiting art museums and galleries", "Reading science‑fiction and graphic novels",
    "Urban and nature photography", "Participating in community theater set‑design workshops"]'
  career_goals: Michael envisions a future where he can merge his love for visual storytelling and technology. He aspires to become a multimedia artist or game designer who creates immersive worlds that
    challenge conventional narratives. In the longer term, he hopes to study graphic design, animation, or interactive media at a university, eventually working on projects that blend art, code, and innovative
    concepts while leading small creative teams.
