persona_description: A researcher or scientist who specializes in the study of lysosomal storage disorders, particularly juvenile neuronal ceroid lipofuscinoses (NCLs) and juvenile Batten disease. They
  are interested in understanding the role of the CLN3 protein in these disorders and the mechanisms that lead to their progression. They are looking for ways to develop more specific and sensitive antibodies
  to CLN3 to better diagnose and treat these diseases. They are also interested in the potential of using antibodies to uncover the functions of other proteins in lysosomes and endosomes.
