persona_description: A stakeholder in the Czech educational system who is interested in anti-discrimination and inclusive education, especially in the context of Roma pupils. This stakeholder is likely
  to have a deep understanding of the theoretical frameworks and research on internalized oppression and intersectionality in education. They may also have experience in qualitative research methods, stakeholder
  analysis, and have a nuanced understanding of the role of parents in supporting their children's learning. This stakeholder is interested in exploring the ways in which exclusion is justified without
  using ethnic or racial arguments and is seeking to understand the complex interplay between class, race, and gender in the context of education.
