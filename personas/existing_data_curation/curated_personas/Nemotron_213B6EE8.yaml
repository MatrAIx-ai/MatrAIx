  hobbies: '["Driving simulators", "Mechanic work on personal vehicle", "Soccer (playing and watching)", "Hiking local trails", "Cooking traditional Mexican dishes", "Volunteering at food banks", "Listening
    to regional Mexican music", "Attending community festivals", "Participating in local church activities", "Reading logistics and transportation journals"]'
  career_goals: Edwin aims to advance from a driver‑sales role to a logistics management position within the next five years, pursuing certifications such as HazMat endorsement and a logistics associate
    degree at a community college. He aspires to lead a team of drivers, improve route efficiency, and eventually launch his own small trucking company focused on providing stable employment for local residents.
    His long‑term ambition includes mentoring new drivers, especially those from underrepresented communities, and contributing to community development projects in Riverside.
