  hobbies: '[''reading mystery and adventure novels'', ''walking and wildlife observation in local woods'', ''sketching nature and animals'', ''playing acoustic guitar'', ''baking cookies and pies'', ''journaling
    personal reflections'', ''volunteering at the local library’s summer reading program'']'
  career_goals: In the short term, Michell aims to complete her high school education, either by returning to the classroom or earning a GED, so she can qualify for entry‑level work. She hopes to secure
    a part‑time position or volunteer role at the nearby animal shelter or wildlife rehabilitation center to gain hands‑on experience with animals. Over the longer term, she aspires to become a veterinary
    technician or wildlife rehabilitator, combining her love for animals with her practical skill set. She also imagines owning a small homestead or garden‑based business, such as a roadside stand selling
    home‑grown produce and baked treats, which would allow her to remain close to her community while pursuing financial independence.
