personas:
  professional: Devin Huggins, a retired English literature teacher turned museum docent, blends three decades of literary analysis and curriculum design with his spontaneous, curiosity‑driven approach,
    delivering engaging lectures that wander delightfully off‑script while occasionally missing deadlines for his community workshops.
  sports: Devin Huggins enjoys daily walks along the Ohio River Trail and a weekly senior‑center chess league that satisfies his competitive streak, while cheering on the Indiana Pacers and the Cincinnati
    Reds from his porch during the basketball and baseball seasons.
  arts: Devin Huggins, an avid watercolorist, captures sunrise over the river in soft blues, listens to Miles Davis and Herbie Hancock at local jazz clubs, and draws inspiration from Winslow Homer and regional
    muralists, weaving these influences into his volunteer docent talks at the Evansville Museum of Art.
  travel: Devin Huggins favors low‑key day trips to nearby botanical gardens like the Evansville’s Mesker Park Zoo & Gardens, occasional river‑boat cruises to the Louisville Slugger Museum, and dreams of
    a guided tour of the historic St. Louis Art Museum, preferring curated itineraries over spontaneous long‑haul travel.
  culinary: Devin Huggins enjoys cooking modest Midwestern fare—seasoned catfish, apple‑cinnamon crumble, and fresh garden salads—while his intermediate skill level shines when he experiments with a roux‑based
    shrimp étouffée, and he never shies away from a well‑made mulled cider on chilly evenings.
  core: Devin Huggins is a curious, spontaneously organized octogenarian who wields a brush, a chess piece, and a genealogy chart to navigate the river‑lined world of art, history, and family stories.
background:
  cultural: Devin was raised in a white, working‑class family of German‑Irish descent in rural Vanderburgh County, Indiana. His upbringing was shaped by Midwestern values of modesty, community service,
    and a Protestant (Methodist) faith, while his liberal‑arts education exposed him to a broad spectrum of global art and literature. This blend of modest Midwestern roots and a lifelong curiosity for
    diverse cultural expressions informs his respectful yet questioning approach to new ideas.
attributes:
  skills: '[''Literary analysis and instruction'', ''Art historical interpretation'', ''Exhibition curation'', ''Creative writing and editing'', ''Genealogical research'', ''Digital archiving'', ''Public
    speaking'', ''Photography'', ''Chess strategy'']'
  hobbies: '[''River trail walks'', ''Jazz concerts'', ''Watercolor painting'', ''Reading historical fiction'', ''Poetry writing'', ''Chess'', ''Genealogy research'', ''Museum volunteering'', ''Day trips
    to regional museums'']'
  career_goals: Although retired, Devin aims to compile a comprehensive memoir that weaves personal memories with Evansville’s cultural evolution, and to produce a series of audio‑rich podcasts documenting
    the city’s lesser‑known historic sites. He hopes to mentor high‑school students through a community‑based writing program, and to support preservation initiatives for the downtown historic district.
    Continuing to learn, he plans to enroll in online courses on contemporary art theory, and to accompany his wife on occasional river‑boat trips to neighboring state museums.
