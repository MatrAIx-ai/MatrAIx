personas:
  professional: Muna Gunter, a five‑year‑old budding junior scientist, blends a boundless curiosity about how things work with a pragmatic love for step‑by‑step experiments, yet often leaves lab‑like craft
    projects half‑finished because they prefer the flexibility of play over strict planning.
  sports: Muna Gunter, an energetic five‑year‑old who dashes around the neighborhood playground, participates in the Little Tigers soccer league during fall, cheerfully mimics moves from the Chicago Cubs
    on television, yet occasionally skips practice when a rainstorm disrupts their flexible routine.
  arts: Muna Gunter, a five‑year‑old who sketches vibrant Paw Patrol scenes and sings along to Raffi’s “Baby Beluga”, finds comfort in the rhythmic storytelling of Disney’s “Frozen” soundtrack, and often
    debates the merits of different cartoon villains with peers, reflecting a sociable yet competitive artistic spirit.
  travel: Muna Gunter, a five‑year‑old with a love for spontaneous road trips, enjoys short family outings to the local zoo and beachside sandcastle contests, dreams of seeing the Eiffel Tower in Paris,
    and often packs a favorite stuffed giraffe for adventures, though the need for frequent naps sometimes limits longer journeys.
  culinary: Muna Gunter, a five‑year‑old who adores cheesy macaroni, pepperoni pizza, and strawberry‑banana smoothies, proudly adds grated mozzarella to their own plates and often negotiates extra ketchup
    packets, yet sometimes forgets to finish vegetables, revealing a playful yet slightly disorganized dining habit.
  core: Muna Gunter, a five‑year‑old whirlwind of curiosity and competition, thrives on lively group play but frequently misplaces their favorite crayons, worries about missing out, and balances an adventurous
    spirit with a tendency to over‑think small setbacks.
background:
  cultural: Muna comes from a white family that moved from the Midwest to Tucson, Arizona, when she was a toddler. The household celebrates mainstream American holidays such as Thanksgiving and Christmas
    while also participating in local Southwest traditions, like attending the annual Tucson Botanic Garden’s desert-bloom festival and joining community Cinco de Mayo picnics. Spanish words and desert-related
    folklore are part of her everyday environment, giving her a blended cultural exposure that combines Midwestern values with the vibrant, outdoor-oriented lifestyle of Southern Arizona.
