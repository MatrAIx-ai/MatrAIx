  hobbies: '[''exploring backyard and parks'', ''rock and leaf collection'', ''building forts'', ''drawing and coloring'', ''singing and dancing with friends'', ''playing hide-and-seek'', ''simple science
    experiments'', ''watching kid-friendly nature shows'']'
  career_goals: Muna dreams of a future where she can combine her love for animals, her curiosity about the natural world, and her desire to help others. She often says she wants to become a wildlife biologist
    who studies desert creatures, a veterinarian who cares for pets, or a kindergarten teacher who shares knowledge with younger kids. Her competitive streak also fuels an ambition to be an astronaut, imagining
    herself exploring outer space while applying practical problem-solving skills.
