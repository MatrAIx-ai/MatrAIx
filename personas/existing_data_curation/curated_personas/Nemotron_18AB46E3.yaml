  career_goals: Lisa aims to deepen her expertise as a full‑stack engineer while gradually moving into technical leadership. In the next three to five years she plans to attain senior software engineer
    status, lead cross‑functional teams, and champion inclusive development practices that prioritize accessibility and user well‑being. She is drawn to projects with tangible social impact—such as health‑tech
    or educational platforms—and hopes to contribute to open‑source initiatives that empower underserved communities. Long‑term, Lisa envisions becoming a software architect or tech lead who mentors junior
    developers, shapes product strategy, and drives sustainable, user‑centric solutions. To support these goals she intends to pursue cloud certifications (AWS, GCP) and continue expanding her knowledge
    of emerging technologies like machine learning, always balancing curiosity with pragmatic delivery.
