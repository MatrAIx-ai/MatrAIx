personas:
  professional: Lisa Pannell, a 21‑year‑old full‑stack software engineer in St. Louis, leverages Python, Java, JavaScript, Django, React, and Node.js expertise to build clean, test‑driven web applications
    while channeling their organized, compassionate nature into mentoring peers and championing inclusive, user‑centric design.
  sports: Lisa Pannell stays active by playing forward for a co‑ed recreational soccer league in St. Louis, cheering on the Cardinals and the Blues, and hitting the Ozark trails for weekend hikes, blending
    competitive spirit with a community‑first fitness mindset that values regular cardio, flexibility from yoga, and post‑match pizza celebrations.
  arts: Lisa Pannell indulges a love for speculative storytelling through reading authors like William Gibson and N.K. Jemisin, streaming series such as "Stranger Things" and "The Expanse," listening to
    an eclectic playlist featuring Tame Impala and Hozier, and gathering friends for board‑game nights with titles like "Terraforming Mars" and "Catan," weaving artistic curiosity into their social life.
  travel: Lisa Pannell prefers budget‑friendly, adventure‑driven trips, having explored nearby music hubs like Nashville and Chicago with friends, tackling the rugged beauty of Utah’s national parks, and
    dreaming of a solo backpacking tour through Japan’s cultural landmarks and Iceland’s volcanic landscapes, all while meticulously planning itineraries on a spreadsheet to stretch their modest student
    budget.
  culinary: Lisa Pannell enjoys cooking at a semi‑pro level, perfecting Midwestern staples such as creamy chicken‑and‑rice casserole and spiced pork tenderloin with a twist of smoked paprika and pickled
    jalapeños, often pairing the meals with homemade bourbon‑glazed carrots and craft beer, and hosts weekly dinner parties where friends savor the experimental twists.
  core: Lisa Pannell, a socially‑charged tech enthusiast with a penchant for late‑night coffee and spontaneous pizza orders, balances methodical code reviews with community mentorship, all while negotiating
    occasional anxiety with yoga and a stubborn habit of over‑packing for trips.
background:
  cultural: As a white Midwesterner raised in St. Louis, Lisa grew up amidst a blend of Midwestern pragmatism and the city’s vibrant cultural tapestry. Her family emphasized education, community service,
    and modest, down‑to‑earth values typical of the region. Frequent visits to the City Museum, the Saint Louis Art Museum, and local jazz clubs exposed her to a diverse artistic scene, fostering an appreciation
    for both tradition and innovation. The city’s strong sports culture, especially the Cardinals, reinforced a sense of teamwork and local pride. These experiences shaped Lisa’s balanced outlook—combining
    curiosity about new ideas with a practical, collaborative approach to both work and life.
