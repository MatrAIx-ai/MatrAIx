persona_description: A healthcare professional who is responsible for monitoring and assessing the body temperature of patients and clients. This person is likely to be a nurse, doctor, or other healthcare
  professional who is responsible for providing care to patients and clients. They may be required to check the patient's body temperature at the start of their care plan, as well as at regular intervals
  throughout the patient's care. They may also be responsible for reporting any changes in the patient's body temperature to the registered person in charge of the patient's care. This person should be
  knowledgeable about the normal body temperature range and how it can be affected by various factors, including illness, medication, and environmental conditions. They should also be familiar with the
  appropriate procedures for recording and reporting changes in the patient's body temperature.
