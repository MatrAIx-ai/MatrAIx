personas:
  professional: Zoran Hill, a retired community center organizer turned volunteer docent, leverages decades of interpersonal savvy, event‑planning precision, and a curatorial eye for visual arts to design
    intergenerational workshops that blend structured schedules with spontaneous creative moments, all while mentoring younger volunteers with a warm, collaborative spirit.
  sports: Zoran Hill participates in weekly low‑impact activities such as senior walking clubs and the local senior bowling league, follows the Portland Trail Blazers and the Oregon Ducks with fervor, and
    occasionally joins a community gardening fitness group that blends light resistance work with vegetable planting, reflecting a balanced approach to staying active in a senior‑friendly way.
  arts: Zoran Hill, a lifelong gallery enthusiast, leads informal art tours featuring works by Monet, local glass artist Dale Chihuly, and emerging Pacific Northwest painters, attends productions at the
    Oregon Shakespeare Festival and the local community theater, and collects vintage photography books, allowing them to weave visual storytelling into their volunteer teaching.
  travel: Zoran Hill prefers relaxed, car‑based day trips along Oregon’s coastline—spending sunny afternoons in Cannon Beach, strolling the historic streets of Astoria, and savoring fresh seafood in Newport—while
    planning future visits to Portland’s Japanese Garden and a nostalgic return to the seaside town where they first fell in love with the ocean.
  culinary: Zoran Hill enjoys cooking hearty traditional dishes such as roasted salmon with dill, vegetable stew made from garden harvests, and apple‑cinnamon crumble, showing a moderate cooking skill that
    blends straightforward recipes with occasional experimental twists like adding rosemary to classic pot roast, and they delight in sharing these meals at family gatherings.
  core: Zoran Hill, a sociable 77‑year‑old art lover with a penchant for meticulous planning and a lingering worry about health costs, balances volunteer leadership with garden‑to‑table cooking, yet habitually
    forgets to take their afternoon walk when a compelling bridge game arises.
background:
  cultural: Zoran is the child of Serbian immigrants who arrived in the United States in the 1940s and settled in the Pacific Northwest. He grew up in a bilingual household that blended Eastern European
    traditions—such as Slava celebrations and folk music—with the outdoors‑focused culture of Oregon. He attended public school in Portland before moving to Gresham, and has maintained a strong connection
    to both his heritage and his adopted community, valuing civic participation, nature, and the arts.
