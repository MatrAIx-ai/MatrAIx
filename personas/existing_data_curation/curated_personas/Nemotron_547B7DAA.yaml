  career_goals: Although retired, Zoran aims to remain a vibrant contributor to his community. He plans to expand his volunteer docent work at the local museum, develop a series of intergenerational art
    workshops, write a memoir of his family's immigrant experience, and advocate for senior-friendly public spaces in Gresham. He also hopes to mentor a junior volunteer cohort, ensuring continuity of community
    programs.
