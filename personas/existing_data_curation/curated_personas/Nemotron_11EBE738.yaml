  hobbies: '[''Basketball (pickup games)'', ''Mountain biking on Shasta County trails'', ''Acoustic guitar playing'', ''Video game streaming (Twitch)'', ''Youth sports coaching (basketball)'', ''Mindfulness
    meditation and journaling'', ''Hiking in Redwood National & State Parks'', ''Attending local live‑music events'']'
  career_goals: John aims to transfer from his current community college to a four‑year university to complete a bachelor's degree in Computer Science, with a focus on user experience design. In the short
    term, he plans to secure a summer internship or entry‑level role in a tech startup or a UI/UX team where he can apply his design and coding skills. Long‑term, he envisions launching a technology platform
    that provides peer‑to‑peer mental‑health support for young adults, leveraging his own experiences with anxiety and his competitive drive to develop a product that is both evidence‑based and socially
    engaging. He also hopes to obtain a professional certification in mental‑health first aid to complement his technical expertise.
