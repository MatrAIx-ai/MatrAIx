personas:
  professional: John Livingston is an aspiring front‑end developer and budding UX designer who blends practical JavaScript skills with a curiosity‑driven eye for user experience, and they leverage their
    event‑planning background to prototype interactive mock‑ups for campus clubs while balancing a busy schedule of basketball coaching, Twitch streaming, and mindfulness practice.
  sports: John Livingston is a regular on the Redding basketball courts, joining pickup games several evenings a week and coaching middle‑school fundamentals through the Shasta County Youth Basketball League;
    they also organize weekend mountain‑bike rides with the Redding Mountain Bike Club along the trails of Shasta County, follow the Sacramento Kings and the San Francisco 49ers with fervor, and maintain
    a disciplined yet flexible fitness routine that balances high‑energy court drills with endurance rides, all while using their First Aid knowledge to tend minor injuries on the field.
  arts: John Livingston nurtures a creative side by playing acoustic guitar at local open‑mic nights, favoring covers of John Mayer, Tash Sultana, and Tyler Childers, and they regularly attend live shows
    featuring Hozier, The Head and the Heart, and the indie folk group The Shasta Collective; they also produce short promotional video clips for campus clubs using Adobe Premiere Pro, stream their strategy
    game sessions on Twitch with custom intro graphics, and keep a curated playlist of lo‑fi hip‑hop and indie rock that fuels both their coding marathons and mountain‑bike adventures.
  travel: John Livingston loves weekend getaways that blend adventure and nature, often hiking the towering redwoods of Redwood National and State Parks or biking to Lake Tahoe for a change of scenery,
    and they dream of attending the Game Developers Conference in San Francisco and exploring the tech hubs of Tokyo; budget constraints keep most trips regional, but they plan each trip with a detailed
    itinerary, balancing spontaneous roadside discoveries with the competitive urge to beat previous travel “high scores.”
  culinary: John Livingston enjoys a varied palate, gravitating toward fresh, portable meals that fuel active days—avocado toast topped with smoked salmon, spicy fish tacos with cilantro‑lime slaw, and
    hearty ramen bowls with miso broth and soft‑boiled eggs; they can whip up a solid chicken teriyaki stir‑fry using fresh basil and ginger, but their cooking skill is best described as “enthusiastic home‑chef,”
    occasionally over‑spicing dishes when anxiety spikes during cooking marathons, and they never skip a local farmer’s market run for fresh strawberries on Saturday mornings.
  core: John Livingston is a high‑energy 19‑year‑old who balances basketball courts, mountain‑bike trails, guitar strings, and code while tackling anxiety with mindfulness, impulsively splurging on gaming
    gear, and channeling a fierce competitive streak into every pursuit, and they constantly seek the next challenge.
background:
  cultural: John grew up in a suburban neighborhood of Redding, California, after his parents moved from the Midwest in the early 1990s seeking new opportunities. His family reflects a typical white, middle‑class
    American background, emphasizing self‑reliance, community involvement, and the value of practical education. The cultural milieu of Northern California—outdoor recreation, a blend of progressive environmental
    values with a strong local sports culture—has shaped his appreciation for both nature and team activities. While he identifies with broader American traditions like high school sports and college life,
    he also embraces the regional emphasis on outdoor adventure, volunteering, and a DIY tech ethic fostered by the area's burgeoning maker community.
attributes:
  skills: '[''Front‑end web development (HTML, CSS, JavaScript)'', ''Basic Python scripting'', ''Video production and editing (Adobe Premiere Pro)'', ''Event planning and coordination'', ''First Aid/CPR
