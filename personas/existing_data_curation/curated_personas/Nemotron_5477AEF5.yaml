  hobbies: '["Landscape Photography", "Watercolor Painting", "Hiking in the Cascades", "Exploring Local Art Galleries", "Cooking Vietnamese and Pacific Northwest Fusion Cuisine", "Volunteering at Neighborhood
    Community Centers", "Reading Contemporary Fiction", "Attending Live Music Sessions", "Meditation and Yoga", "Cycling"]'
  career_goals: Tai aims to rise to a battalion chief position within the next five years, combined with earning paramedic certification to broaden her emergency care capabilities. She is passionate about
    creating a community‑focused fire safety program that blends visual art and storytelling to teach fire prevention, especially in Southeast Asian neighborhoods. Tai also aspires to serve as a Fire Prevention
    Officer for King County, mentor underrepresented youth interested in public service, and eventually specialize in fire investigation to uncover the causes of complex incidents.
