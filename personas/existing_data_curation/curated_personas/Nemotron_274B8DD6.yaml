  hobbies: '[''Walking and Hiking'', ''Birdwatching'', ''Gardening'', ''Reading (Historical Fiction & Educational Non-Fiction)'', ''Book Club Participation'', ''Pottery'', ''Volunteer Tutoring'', ''Cooking
    Mediterranean Cuisine'', ''Attending Local Theater'', ''Wine-Tasting with Friends'']'
  career_goals: Samantha aims to transition from full‑time classroom teaching to a mentorship and consultancy role, focusing on supporting early‑career educators in the Bay Area. She plans to author a handbook
    on practical classroom innovation, secure a grant to develop a community STEM enrichment program for under‑served elementary students, and volunteer as a reading tutor at the local library. Additionally,
    she hopes to serve on the district's curriculum advisory committee to influence policy with her evidence‑based perspective and leave a lasting legacy of balanced, data‑informed instructional practices.
