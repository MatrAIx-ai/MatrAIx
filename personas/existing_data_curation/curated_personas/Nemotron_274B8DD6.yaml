personas:
  professional: Samantha Johnson is a veteran elementary and middle‑school educator with over 35 years of experience, now transitioning into mentorship and consultancy to support early‑career teachers,
    designing differentiated curricula, rigorous assessment tools, and evidence‑based professional‑development workshops while maintaining a skeptical yet practical approach to new instructional technologies.
  sports: Samantha Johnson enjoys low‑impact aerobic activity such as daily walks along the Richmond Greenway and weekend hikes in Briones Regional Park, supports the Golden State Warriors and San Francisco
    Giants, and participates in a senior hiking group that meets monthly for trail outings.
  arts: Samantha Johnson nurtures creative expression through weekly pottery classes, regular attendance at San Francisco Playhouse productions—including August Wilson’s Fences—and a book club that debates
    historical fiction by Hilary Mantel and educational theory by John Hattie.
  travel: Samantha Johnson prefers meticulously planned road trips that combine cultural experiences and natural beauty, as evidenced by a recent week‑long Napa Valley wine tour and a spring visit to coastal
    Carmel, while dreaming of a Mediterranean cruise that would complement their love of cooking, yet they keep travel expenditures modest to preserve retirement assets.
  culinary: Samantha Johnson excels at Mediterranean cuisine, routinely preparing grilled lamb with rosemary, roasted vegetable tabbouleh, and homemade hummus seasoned with generous garlic, though they
    occasionally over‑season, delighting friends at community potlucks and wine‑tasting evenings.
  core: Samantha Johnson is a pragmatic, curiosity‑driven educator‑mentor who balances nature walks, pottery, and Mediterranean cooking while navigating mild health concerns and a carefully managed retirement
    portfolio.
background:
  cultural: Samantha grew up in the San Francisco Bay Area in a middle‑class white family with roots in the Pacific Northwest and the Midwest. Her parents emphasized the value of education, community service,
    and self‑reliance, shaping her lifelong commitment to teaching. She identifies with broader American cultural values of individualism and civic engagement while also embracing the progressive, environmentally
    conscious ethos of Northern California. Her generational experiences—including the social changes of the 1960s, the rise of personal computing, and the evolving multicultural landscape of the Bay Area—have
    forged a pragmatic yet curious outlook that informs both her professional practice and personal pursuits.
attributes:
