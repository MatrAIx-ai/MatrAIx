  career_goals: Keisha aims to transition from a receptionist role to an office manager or guest services supervisor within the next three to five years, seeking a position where she can blend her administrative
    strengths with her creative flair for designing visitor experiences. She plans to earn a certification in hospitality management through a community college program and to develop a personal blog that
    showcases the hidden artistic and cultural gems of Kissimmee, hoping to monetize it through freelance writing and limited‑edition prints of her photography. Long‑term, she dreams of opening a small
    online boutique that sells her own artwork and locally sourced craft items, while also establishing a regular mindfulness practice to better manage stress and negative emotions.
