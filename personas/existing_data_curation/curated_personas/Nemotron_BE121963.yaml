  hobbies: '[''Painting (Mexican folk motifs)'', ''Journaling for stress relief'', ''Gentle yoga and meditation'', ''Cooking traditional Mexican cuisine'', ''Reading contemporary fiction and poetry'', ''Herb
    gardening'', ''Attending small art exhibits and cultural festivals'', ''Handcrafting simple jewelry'']'
  career_goals: Maria aims to transition from a representative role to a team lead or quality assurance supervisor within the next three years. She plans to earn an associate degree in Business Administration
    and complete a Customer Experience Management certification. Her long term ambition is to oversee a small team where she can implement innovative service strategies, such as integrating AI chat support
    and design thinking workshops, while fostering a supportive environment that addresses employee well being. She also hopes to eventually launch a home based boutique selling hand crafted Mexican folk
    art, merging her professional growth with her artistic passion.
