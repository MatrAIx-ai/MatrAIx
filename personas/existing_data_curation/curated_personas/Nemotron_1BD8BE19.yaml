  career_goals: Driven by her competitive nature, Samantha aims to advance to a supervisory role within casino surveillance within the next three years, pursuing certifications such as the Certified Protection
    Professional (CPP) and the Certified Surveillance Officer (CSO). She plans to enroll in an associate program in criminal justice at a nearby community college to deepen her theoretical knowledge of
    law enforcement and fraud detection. Long‑term, she envisions becoming the Director of Security for a major gaming resort, overseeing both physical and cyber‑security operations and developing innovative
    anti‑fraud protocols.
