personas:
  professional: Samantha Beurlot oversees casino surveillance decks with razor‑sharp observation, expertly handling Genetec and Milestone CCTV platforms, conflict de‑escalation, and Florida gaming regulations,
    while their competitive, skeptical mindset pushes them to constantly hunt for anomalies, propose procedural upgrades, and pursue CPP and CSO certifications.
  sports: Samantha Beurlot fuels their fitness routine with sunrise jogs along Cocoa’s waterfront parks, weekly kayaking sessions with the Cocoa Beach Paddle Club, and membership in the Space Coast Runners,
    cheering the Tampa Bay Buccaneers in football, the Orlando Magic in basketball, and occasionally playing recreational beach volleyball during the summer months.
  arts: Samantha Beurlot immerses themselves in mystery narratives by devouring Gillian Flynn novels and listening to true‑crime podcasts like 'Criminal', while also appreciating the atmospheric scores
    of indie video games, attending live shows by local band The Flying Fish, and occasionally snapping noir‑style photographs at dusk for personal creative expression.
  travel: Samantha Beurlot prefers a hybrid travel style that blends meticulous itinerary planning for weekend road trips to New Orleans and Savannah with spontaneous spur‑of‑the‑moment kayak excursions
    along the Florida Keys, dreaming of an upcoming solo adventure to Iceland’s volcanic landscapes while balancing a modest travel budget and a desire for both adrenaline and cultural immersion.
  culinary: Samantha Beurlot enjoys cooking fresh‑grilled grouper tacos seasoned with lime, cilantro, and a pinch of smoked paprika, while their moderate culinary skill keeps them comfortable in the kitchen
    but also leads to a habit of ordering shrimp po’boys from beachfront food trucks when on a night shift, reflecting their love for seafood, bold flavors, and convenience.
  core: Samantha Beurlot blends a competitive, skeptical edge with curiosity‑driven practicality, balancing intense surveillance work, disciplined finances, active outdoor hobbies, and a penchant for mystery
    stories, all while occasionally succumbing to late‑night video‑game micro‑spending and a stubborn reluctance to delegate.
background:
  cultural: Samantha was raised in Cocoa, Florida, in a middle‑class family of European descent. Growing up near the Space Coast, she absorbed the region’s blend of laid‑back beach lifestyle and a fascination
    with technology and aerospace, which nurtured her practical curiosity. Her upbringing emphasized self‑reliance, community involvement, and respect for diverse viewpoints, reflecting broader American
    cultural values while also incorporating the southern hospitality characteristic of central Florida.
