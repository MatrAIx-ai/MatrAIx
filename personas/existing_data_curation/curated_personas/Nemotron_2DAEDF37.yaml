personas:
  professional: Kevin Stokeley, a seasoned petroleum and chemical engineering professor with over twenty years of industry and academic experience, leverages their methodical expertise in reservoir simulation,
    production optimization, and fluid dynamics—combined with advanced Python, MATLAB, and R analytics—to spearhead interdisciplinary STEAM initiatives and mentor multidisciplinary student teams toward
    sustainable energy research, a mission they pursue with relentless curiosity.
  sports: Kevin Stokeley, a devoted fan of the Dallas Cowboys, Dallas Mavericks, and Houston Astros, regularly watches games with their family while cheering loudly at Dallas’s AT&T Stadium, joins the Midland
    Cycling Club for weekend rides, and squeezes in weekend hikes in the Guadalupe Mountains to stay fit, a balance they consider essential for mental clarity.
  arts: Kevin Stokeley, an avid patron of the Midland Museum and local galleries, captures West Texas vistas in the style of Ansel Adams, strums acoustic renditions of Neil Young and Stevie Ray Vaughan
    at informal gatherings, and finds inspiration in the immersive light installations of James Turrell as well as the timeless portraits of Rembrandt, weaving these artistic experiences into their teaching
    philosophy, an approach they champion in each classroom.
  travel: Kevin Stokeley, a meticulous planner who balances weekend getaways with family commitments, has trekked the sandstone cliffs of Carlsbad Caverns, explored the art districts of Santa Fe, and ventured
    to Iceland’s volcanic landscapes for photography, while dreaming of a future tech‑immersive tour of Kyoto, Japan, all the while budgeting their travel fund to accommodate graduate student visits and
    a modest retirement savings goal.
  culinary: Kevin Stokeley, a moderately skilled home chef with a penchant for Southwestern flavors, often grills mesquite‑smoked trout seasoned with cumin and smoked paprika, crafts hearty chili con carne
    using ancho chilies and black beans, delights in preparing hand‑rolled corn tortillas with fresh cilantro, and savors a meticulously brewed pour‑over coffee each morning, a ritual they never skip before
    a lab session.
  core: Kevin Stokeley, a curiosity‑driven engineer who blends rigorous data analytics with acoustic guitar riffs, meticulously labels every photo file, occasionally neglects personal appointments for research
    grants, and lives by the mantra that creativity fuels sustainable solutions, a belief they champion in every lecture.
background:
  cultural: Kevin is a third‑generation Texan of European ancestry who grew up in a small community outside Midland. His family’s long‑standing involvement in the oil and gas industry instilled a strong
    work ethic, self‑reliance, and a deep appreciation for the region’s rugged landscape. While rooted in traditional Western hospitality and community values, he embraces a broad cultural perspective through
    his love of the arts, diverse student body, and frequent travel, which together shape a blend of pragmatic Texas heritage and open‑minded curiosity.
