  career_goals: Kevin aspires to become department chair within the next five years, championing an interdisciplinary STEAM initiative that integrates engineering with visual and performing arts. He aims
    to lead a research center focused on sustainable energy solutions relevant to the Permian Basin, securing a major federal grant to explore carbon capture and utilization. He also plans to author a textbook
    that bridges technical engineering concepts with creative problem‑solving techniques, and to increase industry‑academic partnerships that provide hands‑on internship opportunities for his students.
