  career_goals: Tuyen dreams of a career that lets her work with living things and help others. She imagines becoming a marine biologist studying sea turtles in Florida's coastal waters, or a veterinarian
    caring for pets. She also hopes to become a teacher who supports students' emotional well‑being. In the short term, she aims to improve her science grades, join a local animal‑rescue volunteer program,
    and develop leadership skills through school clubs.
