personas:
  professional: Tuyen Nguyen, an aspiring robotics enthusiast with a knack for building simple machines, channels their love for structure and practicality into school club projects while balancing occasional
    anxious moments with mindfulness journaling.
  sports: Tuyen Nguyen swims twice a week at the community pool, participates in the local youth swim team, spends weekends exploring nearby parks for nature walks, and cheers for the city's minor league
    baseball team, the River Raptors, while occasionally swapping practice for video game marathons.
  arts: Tuyen Nguyen immerses themselves in fantasy novels and drafts manga‑style characters inspired by the works of Hayao Miyazaki, Osamu Tezuka, and the graphic series "Attack on Titan", while also enjoying
    the captivating scores of composer Yoko Shimomura, which fuel their creative sketches.
  travel: Tuyen Nguyen prefers carefully planned family trips that blend adventure with comfort, has explored the towering redwoods of the state park, dreams of visiting the bustling streets of Tokyo for
    a manga convention, and enjoys weekend getaways to nearby lakes where they can swim and sketch nature scenes.
  culinary: Tuyen Nguyen loves preparing fresh rice paper rolls stuffed with lettuce, carrot, shrimp, herbs, and vermicelli, experimenting with sweet chili sauce and occasionally adding peanut butter for
    a daring twist, while their confidence in the kitchen grows alongside their patience for following recipes step by step.
  core: Tuyen Nguyen is a detail‑oriented 11‑year‑old who balances a love for robotics, manga art, and swimming with intense anxiety that they manage through journaling, often juggling structured planning
    with spontaneous creative bursts and occasional impulse spending.
background:
  cultural: Tuyen is a first‑generation Vietnamese‑American. At home, Vietnamese is spoken alongside English, and her family celebrates traditions such as Tet (Lunar New Year) and the Mid‑Autumn Festival.
    She enjoys Vietnamese cuisine like pho, bánh mì, and spring rolls, often prepared with her grandparents. The household emphasizes respect for elders, close family bonds, and active involvement in the
    Vietnamese community of Broward County. These cultural influences shape her strong work ethic, modest demeanor, and appreciation for both her heritage and American life in Fort Lauderdale.
