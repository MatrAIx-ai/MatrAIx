  career_goals: Inspired by his love of novelty and abstract concepts, Jovany dreams of becoming an astronaut or an inventor who designs futuristic devices. He is determined to win his school's science
    fair and eventually join a robotics team where he can lead projects. He also imagines creating his own graphic novel, combining his storytelling and illustration skills, and hopes to develop a video
    game that teaches scientific principles to other kids. These ambitions reflect his competitive spirit and his desire to turn curiosity into tangible achievements.
