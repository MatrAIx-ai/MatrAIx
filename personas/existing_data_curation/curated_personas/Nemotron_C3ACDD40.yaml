personas:
  professional: Jovany Lopez, an aspiring comic creator who blends vivid imagination with precise panel organization, leverages their competitive nature to win school art contests while remaining skeptical
    of peer critiques and always seeking novel storytelling techniques.
  sports: Jovany Lopez enjoys riding their bike through Montclair parks, competes in the Montclair Youth Cycling Club, and roots for the New York Yankees during school sports days, approaching fitness with
    a competitive edge while preferring solo rides for inspiration.
  arts: Jovany Lopez draws comic strips inspired by Stan Lee and Hergé, reads sci‑fi novels by Jules Verne and Becky Chambers in both English and Spanish, and listens to Imagine Dragons while assembling
    LEGO cities, channeling their imaginative curiosity into daily creative sessions.
  travel: Jovany Lopez prefers weekend adventures to nearby destinations like the Jersey Shore boardwalk, the American Museum of Natural History in Manhattan, and occasional family road trips to Washington,
    D.C., planning trips with a checklist mindset that balances curiosity with a competitive desire to explore more than friends.
  culinary: Jovany Lopez loves assisting with family meals, mastering dishes like spiced chicken tacos with cilantro‑lime rice and fresh avocado salsa, showcasing an intermediate cooking skill level and
    a keen interest in exploring flavors passed down through generations.
  core: Jovany Lopez is a curious, competitive eight‑year‑old who blends imagination with disciplined organization, turning every hobby into a chance to outshine peers while staying emotionally steady.
background:
  cultural: Jovany is raised in a Mexican-American household in Montclair, New Jersey. His parents speak Spanish at home, ensuring he maintains fluency and a deep connection to Mexican traditions such as
    Día de los Muertos and celebrating Mexican holidays with family gatherings and traditional foods. He participates in community events at the local cultural center, where he learns folk dances and enjoys
    Mexican music, which enriches his artistic perspective. While embracing his Mexican heritage, he also navigates a diverse suburban environment, blending American school experiences with the rich cultural
    narratives of his family.
