    settings'']'
  career_goals: As she grows, Phuong aspires to merge her love of art, abstract thinking, and cultural heritage into a career that bridges creativity and empathy. She envisions becoming an interdisciplinary
    visual artist and storyteller who incorporates Vietnamese and Hawaiian motifs, while also studying cognitive science to support children navigating anxiety and stress. Her long‑term ambition is to create
    immersive, therapeutic art experiences that nurture imagination and emotional resilience.
