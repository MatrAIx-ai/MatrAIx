personas:
  professional: Jane Thomas, a budding junior naturalist and LEGO engineer, blends curiosity about the Rocky Mountain trails with methodical problem‑solving skills, turning backyard explorations into detailed
    field journals and intricate block constructions while quietly leading their own imaginary research projects.
  sports: Jane Thomas enjoys seasonal hiking and beginner ski lessons with the local Colorado Mountain Club’s junior program, plays on a neighborhood soccer team that follows the Switchbacks, and keeps
    fit by independently building stamina on nature trails, always carrying a small water bottle and a pocket‑sized field guide, which they consult before each trek.
  arts: Jane Thomas spends weekends sketching detailed wildlife illustrations inspired by John James Audubon’s plates while listening to Mozart’s piano concertos, crafting elaborate LEGO dioramas, and reading
    adventure series such as The Magic Tree House, which together shape a quiet yet vivid inner world they cherish.
  travel: Jane Thomas prefers short family road trips to nearby state parks like Rocky Mountain National Park and the Great Sand Dunes, where they can hike, collect rocks, and camp, while dreaming of future
    adventures to Yellowstone and the Grand Canyon, always planning itineraries with detailed checklists and a trusty sketchbook.
  culinary: Jane Thomas favors hearty Colorado‑style chili with beans and cheddar, homemade apple pie with a flaky crust, and snack‑size carrot sticks with hummus, often helping to whisk pancake batter
    and sprinkle fresh blueberries, while remarking that the scent of pine‑scented campfire meals is their favorite, a flavor they seek out whenever they camp.
  core: Jane Thomas combines an introverted love of quiet exploration with meticulous planning, turning every hike, LEGO set, and sketch into a personal quest for order and wonder, even if they occasionally
    get lost in a day‑long puzzle marathon.
background:
  cultural: Jane was born and raised in Colorado Springs, Colorado, a city at the foot of the Rocky Mountains. Her family is part of a middle‑class white American community that values outdoor recreation,
    education, and quiet family time. Growing up, she participates in local traditions such as Thanksgiving dinner and Fourth of July fireworks, and spends weekends hiking, skiing, or visiting state parks.
    Her home environment emphasizes modesty, independence, self‑reliance, a love of reading, hands‑on learning, and respect for nature.
attributes:
  skills: '[''reading fluently'', ''basic arithmetic'', ''LEGO building and design'', ''block‑based coding (Scratch)'', ''maintaining a personal journal'', ''organizing school assignments'']'
  hobbies: '[''reading adventure books'', ''exploring nature trails'', ''collecting rocks and leaves'', ''building LEGO creations'', ''solving jigsaw puzzles'', ''basic coding games on a tablet'', ''drawing
    animal illustrations'']'
  career_goals: Jane is fascinated by how the natural world works and wishes to become a wildlife researcher or park ranger who can protect the Colorado mountains. She also enjoys the idea of designing
    simple inventions that make everyday life easier, so she dreams of being an inventor or engineer. She plans to deepen her science knowledge through school projects, nature clubs, and summer programs
    while continuing to explore her love of order and quiet focused work.
