personas:
  professional: Lydia Poma, a veteran NYPD detective with over two decades of investigative experience, blends meticulous evidence collection, advanced forensic analysis, structured interview techniques,
    and a curiosity‑driven yet methodical approach to casework, while organizing her team with reliable precision and leveraging her concern for colleagues’ well‑being to mentor junior officers.
  sports: Lydia Poma, a regular participant in the Prospect Park Runners club where she logs five‑kilometer jogs and attends seasonal yoga sessions at Brooklyn Yoga Studio, also joins a winter ice‑skating
    group at the Brooklyn Ice Skating Club, follows the New York Knicks and Brooklyn Nets for basketball, the New York Yankees for baseball, and the New York Giants for football, embodying her disciplined
    fitness routine balanced with team loyalty.
  arts: Lydia Poma, an avid consumer of classic jazz, frequently streams Miles Davis, John Coltrane, and Ella Fitzgerald while knitting, devotes evenings to photographing Brooklyn’s street scenes inspired
    by Vivian Maier, and reads true‑crime works by Ann Rule and Michelle McNamara, weaving these artistic influences into her investigative intuition and personal solace.
  travel: Lydia Poma, favoring structured itineraries that blend history and relaxation, has explored Boston’s Freedom Trail, the Finger Lakes wine region, and the historic neighborhoods of Williamsburg,
    dreams of a culinary pilgrimage to Rome to sample authentic carbonara, and plans a future solo trip to Kyoto to study Japanese garden design, all while balancing travel costs with her disciplined budgeting.
  culinary: Lydia Poma, an intermediate home cook, delights in preparing New York‑style Italian comfort foods such as spaghetti carbonara with pecorino, fresh basil pesto using balcony herbs, and Sunday
    meatball‑sub casseroles, often seasoning a bit too liberally with garlic and red‑pepper flakes, and enjoys pairing meals with a glass of Chianti while listening to jazz.
  core: Lydia Poma, a methodical detective who balances relentless curiosity with practical organization, channels stress into jogging, jazz, and photography, while occasionally over‑seasoning her meals
    and worrying about every detail.
background:
  cultural: Lydia Poma grew up in a working‑class white family in Brooklyn during the 1970s, with roots tracing back to Irish and Italian immigrants who settled in the borough’s Flatbush neighborhoods.
    Her upbringing was shaped by the close‑knit community ethos of the era—neighbors looked out for one another, and weekly gatherings around the kitchen table emphasized hospitality and modesty. Living
    in Brooklyn exposed Lydia to the city’s profound cultural diversity from an early age; she witnessed the vibrant tapestry of African‑American, Caribbean, and Hispanic communities that enriched the neighborhood.
    This environment cultivated her respect for multiple cultural traditions and informed her cooperative, harmony‑seeking personality. While she identifies with her European heritage—celebrating St. Patrick’s
    Day and Italian holidays—she also embraces Brooklyn’s multicultural festivals, attending parades, street fairs, and cultural celebrations that reflect the borough’s evolving identity. Her cultural background
    combines a strong sense of place, a work‑ethic rooted in her family’s immigrant story, and an openness to the diverse fabric of modern Brooklyn.
