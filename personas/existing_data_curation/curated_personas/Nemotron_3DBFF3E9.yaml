  career_goals: Lydia aims to advance to the rank of detective sergeant within the next five years, leading a specialized unit focused on cold‑case homicide investigations. She hopes to spearhead a mentorship
    program that pairs experienced detectives with new recruits, emphasizing ethical investigative practices and mental‑health awareness. Recognizing the growing role of technology, she plans to champion
    the integration of advanced digital forensics tools while preserving proven, methodical techniques. Lydia also aspires to earn a bachelor's degree in criminal justice, completing her formal education.
    In the longer term, she envisions transitioning to a training role at the NYPD Detective Academy, where she can share her practical knowledge and develop curricula that balance curiosity-driven inquiry
    with pragmatic procedures. Finally, she seeks to establish a community‑focused liaison initiative that builds trust between law‑enforcement and Brooklyn's diverse neighborhoods, reducing crime through
    collaborative problem‑solving.
