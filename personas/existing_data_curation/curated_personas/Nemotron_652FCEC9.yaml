  career_goals: Juan dreams of becoming a robotics engineer or a video‑game developer, fields where he can merge his love for building, coding, and competition. He is motivated to design robots that solve
    everyday problems, reflecting his practical side, while also aspiring to create engaging games that challenge players strategically, satisfying his competitive nature. He often envisions himself leading
    a team in a science fair or an esports tournament, hoping to earn recognition for his skill and hard work. At the same time, he wants to develop confidence in handling stress and worry, aiming to turn
    his anxiety into focused determination to achieve his goals.
