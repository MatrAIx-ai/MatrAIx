personas:
  professional: Juan Feliciano is a budding young programmer who spends afternoons coding simple games in Scratch and designing Minecraft redstone contraptions, blending meticulous Lego‑building skills
    with a keen eye for troubleshooting, while their critical and competitive nature pushes them to refine their creations beyond the norms of classroom projects.
  sports: Juan Feliciano plays forward for the local Cecil Lake Thunder Soccer Club, practices twice weekly after school and cheers for Seattle Sounders FC during televised matches, while also participating
    in an after‑school chess club and taking occasional jogs around Cecil Lake’s trail to stay fit, reflecting a blend of team spirit, competitive drive, and personal fitness routine.
  arts: Juan Feliciano draws comic strips inspired by Bill Watterson’s Calvin and Hobbes and Stan Lee’s Spider‑Man, often listening to Imagine Dragons for upbeat background music, and watches The Magic
    School Bus to fuel a mix of scientific curiosity and imaginative storytelling, which together shape their creative identity.
  travel: Juan Feliciano plans family road trips with meticulous Google Map itineraries to destinations like the Grand Canyon and Niagara Falls, while also enjoying spontaneous visits to Cecil Lake’s fishing
    spots, and dreams of exploring Tokyo’s Akihabara district for its video‑game arcades and Paris’s Musée d’Orsay for art inspiration, balancing structured planning with spontaneous adventure.
  culinary: Juan Feliciano prefers classic pepperoni pizza but often adds pineapple chunks and jalapeños for a sweet‑spicy twist, snacks on fresh strawberries between study sessions, and occasionally attempts
    to bake chocolate chip cookies from a Kids’ Cooking cookbook, though they sometimes forget to preheat the oven, leading to under‑cooked centers.
  core: Juan Feliciano is a curious, competitive nine‑year‑old who merges Lego precision with Scratch coding, saves allowance grudgingly, battles occasional allergies, dominates the soccer field, doodles
    comic heroes, dreams of far‑flung adventures, and can’t resist sneaking a cookie when stressed.
background:
  cultural: Juan grows up in a bilingual Puerto Rican household in Suffolk, Virginia. His parents maintain cultural traditions such as celebrating Noche de San Juan, enjoying salsa and reggaetón music,
    and cooking classic dishes like arroz con gandules and pasteles during holidays. Spanish is spoken at home, giving him fluency in both languages and a deep connection to his Caribbean heritage. The
    family participates in local community events, blending Puerto Rican customs with Southern Virginia influences, such as attending county fairs and supporting local sports teams. This rich cultural mix
    nurtures Juan's appreciation for diverse perspectives, while his family emphasizes the importance of education, hard work, and resilience—values that shape his pragmatic outlook and competitive spirit.
