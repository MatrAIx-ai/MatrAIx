  hobbies: '[''Watercolor painting'', ''Sketching'', ''Landscape photography'', ''Acoustic guitar'', ''Hiking'', ''Reading speculative fiction'', ''Creative writing'', ''Experimental cooking'', ''Board
    gaming'', ''Tabletop role-playing'', ''Attending open-mic nights'']'
  career_goals: Tihomir aims to advance from front-of-house service to a supervisory role within the next two years, ultimately becoming a restaurant manager. He plans to complete a bachelor's degree in
    hospitality management or culinary arts to deepen his operational expertise. His long-term ambition is to open a boutique café that doubles as an art gallery, where he can curate rotating exhibits,
    host workshops, and serve a menu that blends Southern comfort food with creative, globally inspired dishes. He also envisions leveraging his graphic design and photography skills to develop a personal
    brand that showcases culinary storytelling through social media and community events.
