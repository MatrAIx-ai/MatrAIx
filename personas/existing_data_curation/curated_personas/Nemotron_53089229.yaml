personas:
  professional: An ambitious hospitality professional, Tihomir Weldon applies precise order‑taking, POS mastery, and eye‑catching graphic design to elevate restaurant service, channeling their methodical
    organization, sociable energy, and vivid imagination into every guest interaction while occasionally overthinking under stress.
  sports: An outdoor‑focused athlete, Tihomir Weldon hikes sections of the Appalachian Trail with the Johnson City Hiking Club, runs trail races with the East Tennessee Running Club during spring, and supports
    the Tennessee Titans and Nashville Predators, maintaining a disciplined workout schedule that sometimes collapses into weekend‑only sessions when work stress accumulates.
  arts: A multi‑disciplinary creator, Tihomir Weldon paints watercolor still‑lifes of Southern dishes, photographs the rolling hills of East Tennessee in an Ansel Adams‑inspired style, strums folk tunes
    reminiscent of Iron & Wine on acoustic guitar at local open‑mic nights, devours speculative fiction by Ursula K. Le Guin and Neal Stephenson, and hosts tabletop RPG sessions that blend narrative imagination
    with strategic play.
  travel: A meticulous planner with a love for cultural immersion, Tihomir Weldon schedules weekend trips to the Great Smoky Mountains and Asheville’s art districts, dreams of backpacking through Prague
    and Budapest’s historic neighborhoods, and balances travel ambitions with a modest budget by hunting discount flights and couch‑surfing with friends.
  culinary: An inventive home cook, Tihomir Weldon merges Southern comfort foods like shrimp‑and‑grits with aromatic dill, smoked paprika, and pierogi‑style dumplings, skillfully executes intermediate‑level
    recipes, delights in tasting heirloom tomatoes, fresh basil, and tangy pimento cheese, and meticulously photographs each plate for social media storytelling.
  core: A restless imagination fuels Tihomir Weldon’s blend of hospitality ambition, artistic pursuits, and perpetual worry, leading them to juggle meticulous planning with occasional impulsive splurges
    and a habit of humming folk tunes while perfecting watercolor brushstrokes.
background:
  cultural: Tihomir was raised in Johnson City, Tennessee, within a family that traces its roots to the Balkans, likely Serbian or Croatian. While his upbringing is firmly embedded in Southern Appalachian
    culture—valuing hospitality, community gatherings, and a love for regional cuisine—family traditions preserve elements of his Eastern European heritage, such as occasional dishes like sarma and the
    occasional use of the Serbian language at home. He celebrates both local festivals, such as the Mountain Heritage Festival, and cultural holidays from his ancestry, which give him a blended perspective
    on food, music, and art. This dual cultural background informs his appreciation for folk music, both Appalachian and Balkan, and fuels his desire to fuse these influences in his culinary and artistic
    pursuits.
attributes:
  skills: '[''Customer service'', ''Order accuracy'', ''Multitasking'', ''POS system operation'', ''Cash handling'', ''Reservation management'', ''Event planning'', ''Graphic design for menus'', ''Digital
