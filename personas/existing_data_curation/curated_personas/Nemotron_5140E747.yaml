  career_goals: Jonathan aims to channel his lifelong curiosity and love of novelty into lasting community impact. He plans to author a collection of poems and reflective essays that explore abstract ideas
    and personal history. He aspires to establish a grant program for local high‑school artists in Palm Beach County, using his network to secure sustainable funding. He hopes to serve on the board of the
    North Palm Beach Historical Society, guiding preservation of the town’s cultural heritage, and to curate a traveling pop‑up exhibition that brings contemporary art to senior centers across Florida.
