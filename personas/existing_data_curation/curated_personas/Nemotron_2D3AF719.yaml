personas:
  professional: Amanda Schonfeld is a seasoned secondary educator who blends meticulous curriculum design, data‑driven assessment, and a competitive drive to raise student achievement, while quietly mentoring
    new teachers and championing interdisciplinary art‑social studies projects in her school.
  sports: Amanda Schonfeld enjoys early‑morning hikes with the Seattle Hiking Club, follows the Seattle Seahawks and Seattle Kraken passionately, jogs with the Redmond Running Group in spring, and rejoins
    a local adult lacrosse league each summer for brief competitive bursts.
  arts: Amanda Schonfeld spends weekends wandering Seattle’s contemporary galleries, painting watercolors inspired by Georgia O’Keeffe and Mark Rothko, attends intimate shows featuring Sufjan Stevens and
    The National, and volunteers in community theater set design, where their keen eye merges visual art with storytelling.
  travel: Amanda Schonfeld prefers purposeful travel, planning eco‑friendly road trips to the Cascades, weekend getaways to Portland’s foodie scene, and annual pilgrimages to Florence to study Renaissance
    art—balancing a modest budget with a yearning for cultural immersion.
  culinary: Amanda Schonfeld is an adept home‑cook who favors salmon with dill, roasted beet salad with goat cheese, and a well‑practiced homemade matcha latte, yet often orders coffee from a local roaster
    after late‑night grading sessions.
  core: Amanda Schonfeld is a curious, methodical educator who quietly competes with herself to blend art and learning, all while juggling a restless mind that solves crosswords at midnight.
background:
  cultural: Amanda was raised in the suburban outskirts of Seattle within a family of German and Irish ancestry. Her upbringing blended a modest Protestant (United Church of Christ) tradition with the progressive,
    environmentally conscious ethos of the Pacific Northwest. Growing up, she participated in local cultural festivals that celebrated diverse artistic expressions, shaping her appreciation for both regional
    heritage and broader creative perspectives. While identifying as white, she remains attuned to cultural nuances and values inclusive community engagement.
attributes:
  skills: '[''Curriculum Design'', ''Differentiated Instruction'', ''Classroom Management'', ''Data‑Driven Assessment'', ''Educational Technology Integration'', ''Project Management'', ''Mentoring New Teachers'',
    ''Professional Development Facilitation'', ''Critical Thinking Facilitation'', ''Art Integration'']'
  hobbies: '[''Watercolor Painting'', ''Contemporary Art Gallery Visits'', ''Modernist Literature'', ''Poetry Writing'', ''Indie Music Concerts'', ''Cascades Hiking'', ''Crossword Puzzles'', ''Logic Games'',
    ''Community Theater Set Design'', ''Script Workshops'']'
  career_goals: Amanda aims to earn a master's degree in educational leadership within the next two years, positioning herself for a department chair role. She plans to spearhead a school‑wide interdisciplinary
    initiative that blends visual arts with social studies, creating a community art outreach program for local youth. Long‑term, she aspires to influence district curriculum policy and eventually transition
    into an administrator role where she can implement innovative, evidence‑based instructional models.
