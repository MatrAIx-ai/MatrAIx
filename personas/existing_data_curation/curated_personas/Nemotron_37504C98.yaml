  career_goals: Jennifer aims to turn her tech curiosity into a career that allows independence and creative control. In the short term she plans to enroll in a community college program in computer science
    or digital media, while expanding her freelance web‑design and video‑editing services for local small businesses and her growing online audience. She hopes to compete in regional coding hackathons and
    e‑sports tournaments, using those experiences to build a portfolio that could lead to a remote junior developer or content creator role. Ultimately she envisions launching her own niche tech‑review
    platform—combining video, written analysis, and DIY project tutorials—where she can set her own schedule, maintain her critical voice, and monetize her expertise.
