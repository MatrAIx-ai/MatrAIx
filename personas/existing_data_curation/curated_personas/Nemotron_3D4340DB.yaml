personas:
  professional: Janet Klettner, a veteran HR executive with forty years of luxury retail experience, channels their sociable, talkative nature into crafting inclusive talent acquisition processes, mediating
    workplace disputes with a cooperative flair, and leading data‑driven people‑operations initiatives that blend practicality with curiosity, and they thrive on turning employee feedback into actionable
    culture change.
  sports: Janet Klettner, an enthusiastic supporter of the Los Angeles Dodgers and Lakers, joins a local community garden club that doubles as a walking group along the Pacific shoreline, practices yoga
    at CorePower Studios twice weekly, and participates in a seasonal beach volleyball league for retirees each summer, and they relish the camaraderie of these activities.
  arts: Janet Klettner, a devoted patron of contemporary art, frequents exhibitions at LACMA showcasing works by Jeff Koons and Yayoi Kusama, volunteers at the Santa Monica Arts Festival, and enjoys evenings
    listening to Yo‑Yo Ma cello recitals and Philip Glass concerts at the Walt Disney Concert Hall, and they often weave these cultural experiences into their networking events.
  travel: Janet Klettner, who favors spontaneous weekend getaways over rigid itineraries, regularly retreats to the California coast—exploring Monterey Bay, Big Sur, and Santa Barbara—while dreaming of
    a spring trip to the Tuscan countryside to sample local wines and art, and they fund these adventures with a modest travel budget that balances leisure with upcoming consulting plans.
  culinary: Janet Klettner, a confident home chef who loves hosting themed wine‑tasting dinners, often prepares rosemary‑infused roasted chicken, pan‑seared salmon with miso glaze, and a decadent chocolate‑rose
    truffle tart, pairing each with Napa Valley Cabernet Sauvignon or Russian River Pinot Noir, and they delight in sharing these creations with friends and family.
  core: Janet Klettner blends a vibrant social spirit with a pragmatic HR mind, turning dinner parties and garden roses into networking hubs while juggling a relaxed approach to planning and a penchant
    for occasional forgetfulness, and they thrive on weaving people together.
background:
  cultural: Janet identifies as white American with roots tracing back to German and Irish ancestry. Raised in a suburban Midwestern setting before relocating to Los Angeles, she blends Midwestern work
    ethic and community orientation with the cosmopolitan, entertainment‑infused culture of Beverly Hills. Her upbringing emphasized politeness, neighborhood involvement, and valuing personal relationships,
    which informs her collaborative approach at work. Living in a diverse, affluent area, she has embraced West Coast openness to new ideas, a love for the arts, and a health‑conscious lifestyle. While
    she respects traditional values such as family and loyalty, she also supports progressive workplace initiatives like diversity, equity, and inclusion, reflecting the blend of her generational background
    and contemporary Californian influences.
