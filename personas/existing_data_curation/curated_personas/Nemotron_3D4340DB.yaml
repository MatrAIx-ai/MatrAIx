  career_goals: Looking ahead, Janet aims to transition into a strategic HR leadership role, such as Director of People Operations, where she can shape company culture at a senior level. She wants to champion
    inclusive workplace initiatives and develop a comprehensive wellness program for employees of all ages. Janet is also interested in earning a SHRM‑Senior Certified Professional (SHRM‑SCP) credential
    and completing a bachelor's degree in Human Resource Management to complement her associate degree. As she approaches retirement, she hopes to mentor emerging HR professionals and perhaps offer consulting
    services to small businesses seeking to build resilient, people‑focused practices.
