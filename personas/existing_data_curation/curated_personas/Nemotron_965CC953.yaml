personas:
  professional: Alfredo Garcia, a four‑year‑old sandbox architect, exhibits early engineering curiosity by meticulously stacking blocks, satisfying a deep‑seated need for structured predictability while
    also delighting in spontaneous, group‑play improvisations.
  sports: Alfredo Garcia, a member of the Sunny Sprouts youth soccer club, avidly follows the Chicago Cubs, and they combine orderly practice drills with energetic, spontaneous games on the playground,
    embodying their balanced love for structure and sociable fun.
  arts: Alfredo Garcia delights in coloring Disney characters, especially the vibrant scenes from Frozen, and they love singing along to Taylor Swift’s upbeat pop hits during playtime, merging their sociable
    nature with creative expression, though they sometimes worry about perfecting every line.
  travel: Alfredo Garcia has explored Grandma’s seaside cottage in Florida and dreams of a magical trip to Disneyland, favoring family‑planned itineraries that provide structure yet eagerly welcomes surprise
    stops at ice‑cream trucks, reflecting his blend of predictability and flexibility.
  culinary: Alfredo Garcia enjoys buttery macaroni‑and‑cheese and chicken nuggets, often helping stir the sauce despite getting flour on the kitchen counter, showing a practical palate that favors familiar
    comfort foods while occasionally experimenting with avocado toast, a curiosity that mirrors his balanced approach to routine and novelty.
  core: Alfredo Garcia is a structure‑loving, sociable four‑year‑old who mixes meticulous block‑building with spontaneous group games, yet frequently worries about minor mishaps.
background:
  cultural: Alfredo grows up in a bilingual Honduran‑American household in Miami. Spanish is spoken at home, and he celebrates Honduran traditions such as Día de los Niños with family gatherings and traditional
    foods like baleadas. He participates in local community events, like Carnaval and neighborhood festivals, which blend Caribbean rhythms with Central American flavors. His exposure to both Honduran cultural
    values—family closeness, respect for elders, and a love for lively music—and the multicultural environment of Miami shapes his identity and everyday experiences.
