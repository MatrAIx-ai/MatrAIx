  career_goals: Although still very young, Alfredo frequently tells adults he wants to become a firefighter because he admires the clear structure, teamwork, and the ability to help people in need. He also
    dreams of playing soccer for a local team, reflecting his love for energetic group activities and his cultural connection to Latin American sports. In the future, he hopes to have a job that offers
    a predictable schedule, a supportive community, and opportunities to protect and support others.
