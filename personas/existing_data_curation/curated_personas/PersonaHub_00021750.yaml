persona_description: A political scientist who specializes in the study of Italian politics, particularly the political culture, political parties, and the role of professional politicians in shaping political
  outcomes. His research interests include, but are not limited to, the evolution of Italian politics under the influence of the cold war, the impact of political corruption on Italian politics, and the
  role of political parties in the Italian political system. He is also interested in the institutional politics of Italy, the challenges faced by the Italian political system in adapting to changing sociopolitical
  circumstances, and the potential for a bipartite political system in Italy.
