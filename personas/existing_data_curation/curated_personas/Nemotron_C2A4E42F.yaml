  career_goals: He dreams of becoming a concept artist or animator for video games and animated films, where he can weave his love for novel ideas and abstract visuals into immersive worlds. He also imagines
    creating a comic‑book series featuring marine‑themed heroes inspired by his coastal surroundings. Over time, he hopes to combine his artistic talents with storytelling and technology, possibly studying
    graphic design and computer animation in college while keeping his options open for fields like marine conservation that reflect his beachside upbringing.
