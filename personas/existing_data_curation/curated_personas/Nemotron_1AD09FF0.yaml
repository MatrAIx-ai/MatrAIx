    design insight'']'
  hobbies: '[''Photography (landscape and industrial)'', ''Visiting art museums and galleries'', ''Woodworking'', ''Fishing on the Allegheny River'', ''Hiking local trails'', ''Reading nonfiction on transportation
    and art history'', ''Playing chess'', ''Listening to classic rock and jazz'', ''Customizing truck interiors and branding'', ''Mentoring young drivers through safety workshops'']'
  career_goals: Daniel aims to transition from individual driving to a supervisory role within the next five years, such as fleet manager or logistics coordinator, where he can leverage his organizational
    strengths to improve route efficiency and safety across a team. He plans to earn a commercial driver's license with hazardous‑materials endorsement and complete a certification in supply‑chain management.
    Long‑term, he hopes to launch a small regional trucking business that emphasizes environmentally conscious routing and offers a platform for mentoring new drivers. Parallel to his career, he aspires
    to curate a modest community art space in Wexford, integrating his love of visual art with his professional network.
