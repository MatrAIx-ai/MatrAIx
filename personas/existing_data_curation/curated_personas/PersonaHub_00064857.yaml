persona_description: A policy maker or development expert who is focused on improving the agricultural sector in Africa. This person is aware of the challenges faced by sub-Saharan Africa in sustaining
  high levels of economic growth, coping with plunging commodity prices, and addressing the effects of climate change. They are interested in revitalizing agriculture as a priority and are aware of the
  importance of new technology, electricity, and infrastructure in the sector. They are also aware of the need for sound policies that protect the farm sector and support the vision for accelerated agricultural
  transformation of the Malabo Declaration.
