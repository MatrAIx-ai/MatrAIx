persona_description: A literary critic who is highly knowledgeable about the works of Richard Flecknoe and John Dryden. They have a keen interest in the mock-heroic style used by Dryden in his poem "Mac
  Flecknoe" and are particularly interested in the satire and ridicule that Dryden directs towards Richard Flecknoe and John Dryden's other target, Thomas Shadwell. They appreciate the use of allusions
  and the seriousness with which Dryden approaches the poem's themes of literary criticism and satire. They are also interested in the historical context of the poem's publication and the reasons that inspired
  Dryden to write "Mac Flecknoe".
