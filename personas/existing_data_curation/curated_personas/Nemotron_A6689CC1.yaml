personas:
  professional: Brian Corban, a 45‑year‑old master machinist with two decades of CNC milling, turning and precision measurement expertise, merges his industrial know‑how with abstract metal sculpture and
    solid modeling to mentor apprentices, champion lean shop‑floor improvements, and steer his team toward custom‑fabrication projects that blend engineering rigor with artistic expression.
  sports: Brian Corban stays fit through weekend rides with the Allegheny Trail Riders, follows the Pittsburgh Steelers, Penguins and Pirates loyally, and balances low‑impact cardio on local rail‑trail
    loops with occasional pickup basketball at the community center, preferring solitary cycling over crowded gyms.
  arts: Brian Corban channels their love of industrial geometry into metal sculptures while capturing Pennsylvania’s misty fields through black‑and‑white photography inspired by Ansel Adams and Andrew Wyeth,
    and they regularly study the abstract works of Pablo Picasso and the kinetic installations of Alexander Calder for fresh creative cues.
  travel: Brian Corban prefers meticulously planned solo road trips that blend quiet reflection with hands‑on learning, having explored the historic steel districts of Sheffield, England, the bronze‑casting
    workshops of Florence, Italy, and the rolling hills of the Laurel Highlands, while budgeting carefully for future visits to Japan’s Niigata region to study traditional metalworking techniques.
  culinary: Brian Corban, an adept home‑cook, gravitates toward hearty Pennsylvania Dutch fare—like pierogies with caramelized onions, smoked kielbasa, and braised beef short ribs seasoned with rosemary
    and smoked paprika—while relishing the tactile joy of searing steaks in a cast‑iron skillet and occasionally treating themselves to a slice of cherry‑topped cheesecake from the local bakery.
  core: Brian Corban, a solitary yet art‑obsessed machinist turned mentor, balances exacting metalwork with introspective hikes, can’t start a day without a double espresso, and habitually tinkers with
    their model‑train layout even during conference calls.
background:
  cultural: Brian was raised in a small‑town, middle‑class family in western Pennsylvania, where the legacy of the Rust‑belt manufacturing tradition shapes his worldview. His ancestry is primarily German
    and Irish, reflected in family gatherings that feature hearty, home‑cooked meals and a strong work ethic rooted in the Protestant‑leaning, community‑oriented culture of the region. He values self‑reliance,
    modesty, and practical problem‑solving, while also appreciating the cultural heritage of American folk art and the local music scene. Living in Grove City, he participates in community events such as
    the annual county fair and supports local charities, embodying a blend of traditional values and an open‑minded curiosity toward new ideas.
attributes:
  skills: '["CNC milling", "Lathe operation", "Blueprint reading", "Precision measurement (micrometer, CMM)", "Machine maintenance and troubleshooting", "Basic SolidWorks 3D modeling", "Quality control
    and inspection", "Welding (MIG/TIG)", "Additive manufacturing basics", "Team training and mentorship"]'
  hobbies: '["Metal sculpture", "Landscape photography", "Model train building", "Historical non-fiction reading", "Cycling on rural trails", "Community mentorship in shop skills", "Visiting regional art
    museums"]'
  career_goals: Brian aspires to move into a supervisory role where he can lead a team of machinists, mentor apprentices, and drive continuous‑improvement initiatives on the shop floor. He is interested
    in deepening his CAD/CAM expertise to transition into a hybrid machinist‑designer position, eventually overseeing custom‑fabrication projects that blend functional engineering with artistic metalwork.
    In the longer term, Brian dreams of opening a small boutique workshop that offers both precision machining services for local manufacturers and handcrafted metal art pieces for private clients.
