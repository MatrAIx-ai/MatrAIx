personas:
  professional: Victoria Caprario, an aspiring young scientist, blends meticulous experiment design with playful Scratch coding, channeling their curiosity and practical mindset into school science club
    projects while reliably coordinating group tasks and ensuring every detail is documented.
  sports: Victoria Caprario cycles around the neighborhood after school, plays forward for the Muskegon Lakeshore Youth Soccer Club, and rallies with family to watch the Michigan State Spartans basketball
    and Detroit Tigers baseball games, balancing structured team practice with spontaneous outdoor rides that they relish.
  arts: Victoria Caprario expresses their creativity by playing Beethoven’s 'Für Elise' on the piano, sketching intricate shoreline ecosystems inspired by Claude Monet’s water lilies, and knitting colorful
    scarves while humming Taylor Swift’s 'Wildest Dreams', turning every hobby into a quiet celebration of art.
  travel: Victoria Caprario eagerly plans summer outings to the sandy shores of Lake Michigan, relishes annual visits to the local county fair, and daydreams about exploring Mackinac Island’s historic forts
    and the wild cliffs of Acadia National Park, preferring road trips that allow them to collect shells along the way.
  culinary: Victoria Caprario delights in the salty crunch of fish and chips from the beachside fry shop, the warm aroma of homemade apple pie using Michigan apples, and crafting snack mixes of pretzels,
    dried cranberries, and cheddar cubes, often experimenting with fresh strawberries in a quick fruit tart that they proudly share with friends.
  core: Victoria Caprario is an organized, curiosity‑driven explorer who balances methodical planning with a love for spontaneous beach shell hunts, often juggling meticulous school projects while occasionally
    misplacing their antihistamine pills.
background:
  cultural: Victoria comes from a middle‑class, white Midwestern family in Muskegon, Michigan. Her upbringing reflects the region’s emphasis on community, outdoor recreation, and school involvement. Family
    traditions include summer trips to the beaches of Lake Michigan, attending local county fairs, and celebrating holidays such as Thanksgiving and the Fourth of July with communal gatherings. The local
    culture, shaped by the Great Lakes’ maritime heritage and a strong work ethic, influences her appreciation for nature, practicality, and community service.
