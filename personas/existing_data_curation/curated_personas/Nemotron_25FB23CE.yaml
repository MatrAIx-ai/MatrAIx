  hobbies: '[''Shoreline exploration'', ''Shell collecting'', ''Wildlife identification'', ''Reading fantasy/adventure novels'', ''Drawing nature scenes'', ''Piano playing'', ''Science club activities'',
    ''Scratch programming'', ''Knitting'', ''Biking'', ''Volunteer at library'']'
  career_goals: Victoria dreams of becoming a wildlife biologist or environmental scientist who helps protect the Great Lakes ecosystem. She hopes to combine her curiosity about nature with her practical,
    methodical approach to research and data collection. In the longer term, she also envisions sharing her love of science by teaching or leading community outreach programs, using her organizational skills
    to coordinate projects and her cooperative nature to foster teamwork and harmony.
