    User 2: I don''t like going to the mall. It''s too noisy.

    User 1: I guess that''s why I like it. I like the hustle and bustle of the mall.

    User 2: I guess we''re just different.

    User 1: Maybe so. But I''m sure we can find something we both like to do.

    User 2: I''m sure we can.

    User 1: So, what do you do for a living?

    User 2: I''m a construction worker.

    User 1: Oh, that''s cool. I''ve never met a construction worker before.

    User 2: It''s a good job. I get to work outside and I''m always learning new things.

    User 1: That sounds like a lot of fun.

    User 2: It is.

    User 1: Well, it was nice meeting you, Nick.

