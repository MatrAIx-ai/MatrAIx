  career_goals: Looking ahead, Joshua aspires to combine his love for farming, mechanics, and technology by becoming an agricultural engineer. He dreamt of designing sustainable farming equipment that can
    help the small‑scale farms in his community operate more efficiently and with less environmental impact. In the shorter term, he hopes to excel in high school STEM courses, earn a scholarship for an
    engineering program, and eventually study at a university that offers hands‑on agricultural technology research. He also keeps an alternative path open to veterinary science, motivated by his early
    experiences caring for animals through 4‑H.
