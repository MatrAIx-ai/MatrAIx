personas:
  professional: Joshua Williamson, an aspiring junior engineer whose primary focus is designing LEGO and Minecraft projects, leverages his love for detailed instructions and practical problem‑solving to
    produce meticulously documented blueprints for his school’s robotics club, reliably meeting deadlines while quietly battling the worry of imperfection.
  sports: Joshua Williamson enjoys fishing along the Duck River and participates in the local Boy Scouts’ outdoor fitness program, occasionally joining the community’s youth soccer league while cheering
    for the Tennessee Titans and Nashville SC, balancing structured training sessions with spontaneous weekend hikes.
  arts: Joshua Williamson finds creative release in building intricate LEGO sets and exploring the visual landscapes of Minecraft, while also listening to the melodic storytelling of Taylor Swift, admiring
    the animation artistry of Hayao Miyazaki’s Spirited Away, and occasionally sketching wildlife scenes inspired by his nonfiction reads.
  travel: Joshua Williamson prefers meticulously planned weekend getaways, having camped at the Great Smoky Mountains National Park during a Boy Scouts merit‑badge trek and dreaming of a future family road
    trip to the Grand Canyon, yet he often feels apprehensive about traveling solo.
  culinary: Joshua Williamson enjoys hands‑on cooking projects like assembling homemade sushi rolls with rice, seaweed, and avocado, as well as perfecting a classic grilled cheese with sharp cheddar and
    sourdough, but often skips vegetables unless they’re part of a themed LEGO‑inspired dinner night.
  core: Joshua Williamson is a detail‑obsessed 12‑year‑old who balances structured LEGO construction and Minecraft design with a quiet anxiety that fuels both meticulous planning and occasional over‑cautiousness.
background:
  cultural: Joshua comes from a white, Southern family in Woodbury, Tennessee, a small town with deep agricultural roots. His community values self‑reliance, hospitality, and close ties to local churches,
    where his family regularly attends a Baptist congregation. Traditional Southern customs, such as family gatherings centered around home‑cooked meals and seasonal farming events, shape his worldview.
    The local culture emphasizes respect for nature, practical skills, and a strong sense of community responsibility, all of which influence Joshua's interests in farming, animal care, and collaborative
    projects.
attributes:
  skills: '[''Woodworking'', ''Basic Programming (Scratch)'', ''Animal Care'', ''Organizational Skills'', ''Team Collaboration'']'
