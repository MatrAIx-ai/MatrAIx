  career_goals: Elizabeth aims to advance from an attendant role to a supervisory position, such as front‑of‑house manager at a regional theater or community entertainment venue. She wants to deepen her
    expertise in event coordination, eventually overseeing larger productions and festivals. In the longer term, she envisions moving into arts administration or program direction for a local cultural center,
    where she can blend her practical management skills with her passion for the humanities and community engagement. Her goals emphasize stable, structured career growth that allows her to contribute to
    a harmonious workplace while maintaining a predictable routine.
