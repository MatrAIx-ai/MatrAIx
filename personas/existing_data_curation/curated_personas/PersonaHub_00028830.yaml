persona_description: A hydrologist or ecologist who is interested in understanding the health and functioning of watersheds and their impact on the environment. They are familiar with the Watershed Health
  Assessment Framework and the MN DNR Major Watershed Boundaries, and are interested in applying this knowledge to real-world scenarios. They may work for the Minnesota Department of Natural Resources or
  other environmental agencies, and are interested in improving the health and sustainability of watersheds through better understanding and management practices.
