personas:
  professional: Terrence Thomas, a veteran painter with 30 years of residential and commercial experience, they leverage their methodical workflow, precise color matching, and team‑leading abilities to
    deliver eco‑friendly low‑VOC finishes while mentoring apprentices and aiming for crew foreman and business ownership.
  sports: Terrence Thomas cheers on the Houston Texans every Sunday, they paint their living room in navy and orange on game day, participate in a senior fishing league at Cedar Creek, and join pickup basketball
    games at the neighborhood community center, always bringing their lively commentary and encouraging teammates.
  arts: Terrence Thomas immerses themselves in blues legends like B.B. King, jazz greats such as Miles Davis, and gospel powerhouses like Mahalia Jackson, they curate playlists for their crew, attend live
    shows at the Houston Blues Museum, and eagerly share rare vinyl finds with friends over coffee.
  travel: Terrence Thomas favors road trips that blend music and food, they have driven to New Orleans for its jazz heritage and gumbo, taken weekend getaways to Galveston’s Gulf Coast beaches, and are
    planning a future pilgrimage to Nashville’s Country Music Hall of Fame, all while balancing family obligations and a modest travel budget.
  culinary: Terrence Thomas delights in cooking Southern soul‑food, they perfect gumbo with Andouille sausage, fried catfish seasoned with Cajun spice, and collard greens slow‑cooked with smoked ham hocks,
    often experimenting with new flavor twists while still relying on their trusted family recipes.
  core: Terrence Thomas is a methodical, talkative painter‑entrepreneur who blends a love for blues, gospel, and Southern cooking with community service, they meticulously plan their next business move
    and family gathering.
background:
  cultural: Terrence is a third‑generation African‑American Texan born and raised in the historic East Side neighborhood of Beaumont, a city shaped by the oil and petrochemical industries. His parents worked
    long hours at nearby refineries, instilling a strong work ethic and a sense of community responsibility. He attended Central High School, where he participated in the marching band and was a member
    of the school's debate club, balancing curiosity with practicality. Terrence remains an active member of the First Baptist Church, where he enjoys gospel music and takes part in Juneteenth celebrations
    and community outreach. He values Southern hospitality, cherishes family recipes passed down from his grandparents who migrated from Louisiana during the Great Migration, and celebrates the legacy of
    the Civil Rights movement through mentorship and involvement with the local African‑American Heritage Museum. His cultural identity blends rich African‑American traditions, Texas Southern cuisine, and
    a deep commitment to uplifting his neighborhood.
