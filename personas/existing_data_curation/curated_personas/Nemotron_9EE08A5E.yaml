  hobbies: '[''listening to blues, jazz, and gospel music'', ''community volunteer painting projects'', ''fishing at Cedar Creek'', ''cooking Southern soul‑food'', ''church choir and outreach'', ''DIY home
    improvement'', ''gardening'', ''Houston Texans fan'', ''classic car restoration'']'
  career_goals: Terrence aims to move from a senior painter to a crew foreman, securing an OSHA 30‑hour certification and a certified paint estimator credential. In the next five years he plans to launch
    his own small residential painting business that focuses on eco‑friendly, low‑VOC finishes, giving him the flexibility to mentor younger workers and offer free workshops at the local community college.
    He also hopes to become a regular guest instructor for vocational trade programs, sharing his practical knowledge and encouraging more African‑American youth to enter skilled trades. Ultimately, he
    wants his business to be known for reliability, high‑quality workmanship, and a supportive work environment.
