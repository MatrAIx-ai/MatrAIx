  hobbies: '["Gardening (vegetables and herbs)","Cooking Mexican dishes and experimenting with recipes","Playing card games (Dominoes, Rummy) with friends","Participating in church and community festivals","Listening
    to regional Mexican music and mariachi","Walking on local trails and parks","Reading Mexican-American history","Attending high school sports events","Volunteering at the senior center"]'
  career_goals: Although retired from formal employment, Paulino aims to remain an active contributor to his community. He hopes to expand his mentorship role by guiding younger residents in practical skills
    such as gardening, basic repairs, and budgeting. He plans to organize and lead more cultural festivals that celebrate Mexican heritage while fostering intercultural dialogue. Paulino also wants to learn
    advanced digital tools to document and share family recipes and stories, and he is considering a modest side venture selling homemade tamales at local markets. Maintaining his health through regular
    physical activity and social engagement is also a central ambition.
