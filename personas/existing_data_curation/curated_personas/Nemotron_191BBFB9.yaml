personas:
  professional: Carmen Jones, a seasoned administrative leader, leverages her razor‑sharp organization and vivid imagination to streamline multi‑site operations while delivering charismatic presentations
    and mentorship that energize her team, as they consistently meet high performance standards.
  sports: Carmen Jones is an avid supporter of the Kansas City Chiefs and the St. Louis Cardinals, participates in the Columbia Running Club’s Saturday 5K runs, maintains weekly yoga sessions for flexibility,
    and enjoys gardening as a low‑impact cardio activity, balancing spectator enthusiasm with personal fitness.
  arts: Carmen Jones immerses herself in the arts by painting abstract canvases inspired by the bold colors of Jean-Michel Basquiat, attending nightly performances at the Civic Center Playhouse, and delivering
    spoken‑word pieces at the Rhythm & Rhyme Circle that honor community heritage, while listening to Nina Simone on repeat for creative fuel.
  travel: Carmen Jones favors curated trips that blend cultural immersion and culinary adventure, having savored the historic streets of Savannah, the jazz‑filled evenings of New Orleans, and the vibrant
    markets of Havana, while dreaming of a future getaway to Lisbon to explore its tile‑laden neighborhoods.
  culinary: Carmen Jones’s kitchen is a laboratory where she merges Southern comfort dishes like shrimp and grits with Caribbean twists such as mango salsa and coconut‑infused collard greens, showcasing
    a confident home‑cook skill set that includes seasoning with smoked paprika, pimento, and fresh herbs, though she sometimes over‑seasones in her quest for bold flavor.
  core: Carmen Jones blends meticulous leadership with a boundless creative streak, turning every budget spreadsheet into a canvas while fueling late‑night brainstorming with a daily espresso habit and
    an occasional tendency to postpone paperwork until the last minute.
background:
  cultural: Carmen’s identity as a Black woman from Columbia, South Carolina, is deeply rooted in the rich African‑American heritage of the region. She grew up attending church events that emphasized gospel
    music, storytelling, and community service, shaping her sense of harmony and cooperation. Family gatherings often feature traditional Southern dishes infused with African spices, reflecting a blend
    of cultural histories. She is actively involved in local Black cultural organizations, such as the African American History Museum of South Carolina, and supports initiatives that preserve and celebrate
    the contributions of Black citizens in the Richland County area. Her experiences navigating both corporate spaces and community life inform her commitment to fostering inclusive workplaces and uplifting
    underrepresented voices.
