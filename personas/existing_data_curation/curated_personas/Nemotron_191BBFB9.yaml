  career_goals: Carmen aims to advance from first‑line supervision to a senior operations manager role within the next five years, where she can shape organizational strategy and champion diversity initiatives.
    She aspires to lead a cross‑functional team that streamlines administrative functions across multiple sites, and to mentor emerging Black professionals in the corporate sector. Additionally, she plans
    to pursue an MBA or relevant certification to deepen her strategic expertise and eventually launch her own consultancy focused on process improvement for nonprofit and community organizations.
