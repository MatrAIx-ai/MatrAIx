  career_goals: Sharon aims to transition from informal volunteering to a formal part‑time role as a community outreach coordinator at a local nonprofit serving immigrant families and senior citizens. She
    dreams of launching a small home‑based catering service focused on authentic Vietnamese dishes, offering cooking classes that also serve as cultural bonding experiences. To strengthen her qualifications,
    she plans to complete a GED and enroll in a community health worker certification program, eventually becoming an advocate for mental health and well‑being within the Southeast Asian diaspora in Orange
    County.
