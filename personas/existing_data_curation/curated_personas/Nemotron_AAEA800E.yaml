personas:
  professional: Cruz Marcet, a budding LEGO architect, constructs intricate block cities with a blend of curious experimentation and practical engineering, meticulously sorting pieces while flexibly adapting
    designs, thriving in group play but fiercely competing to outdo peers, and becoming visibly distressed when structures collapse.
  sports: Cruz Marcet, a lively five-year-old, kicks soccer balls at the neighborhood Kids Soccer Club with the same zeal they cheer for the hometown baseball team, the Springfield Sluggers, while also
    splashing through swim lessons at the community pool, constantly seeking the next friendly competition.
  arts: Cruz Marcet, an enthusiastic fan of bright colors and catchy tunes, sings along to Taylor Swift's 'Shake It Off', reenacts scenes from Disney's 'Frozen' with a makeshift snowflake costume, and eagerly
    watches 'Bluey' episodes, often mimicking the show's playful storytelling in their own imaginative play.
  travel: Cruz Marcet, an adventurous five-year-old, delights in family vacations that whisk them from the magic of Disney World's Cinderella Castle to the awe-inspiring vistas of the Grand Canyon, while
    dreaming of a future trip to the Eiffel Tower in Paris where they hope to try authentic croissants.
  culinary: Cruz Marcet, a budding little chef, proudly spreads peanut butter and jelly on whole-grain bread, mixes melted cheddar into creamy macaroni, and giggles while sprinkling fresh strawberries and
    banana slices onto a rainbow fruit salad, often insisting on adding a dash of honey for extra sweetness.
  core: Cruz Marcet, a bright but tempestuous five-year-old, balances boundless curiosity with a fierce competitive streak, yet often spirals into dramatic meltdowns when plans go awry.
background:
  cultural: Cruz is raised in a Mexican‑American household in Flagstaff, Arizona. He celebrates Día de los Muertos and Cinco de Mayo with his family, learns Spanish through daily conversation and cultural
    stories, enjoys traditional foods like tamales and pozole, and participates in community events at the local church. The blend of Mexican heritage and the outdoor lifestyle of Northern Arizona shapes
    his love for family gatherings, communal celebrations, and exploring nature.
