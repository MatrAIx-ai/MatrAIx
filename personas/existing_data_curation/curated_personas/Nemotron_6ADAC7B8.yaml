personas:
  professional: Matthew Gross, a 31-year-old licensed practical nurse aiming for RN licensure, combines a methodical approach to vital-signs monitoring, wound-care and IV management with an outgoing, team-first
    attitude, making them a trusted point-of-care leader who streamlines shift hand-offs and mentors nursing assistants.
  sports: Matthew Gross, an avid participant in local pick-up basketball and softball leagues and a regular hiker on the Ouachita foothills, fuels their fitness with early-morning runs, roots for the Arkansas
    Razorbacks football and baseball teams, and follows the nearby Arkansas Travelers minor-league squad, embodying a community-centered, structured yet social approach to staying active.
  arts: Matthew Gross, who strums an acoustic guitar in a casual coworker band and frequents country and bluegrass festivals, cites Dolly Parsons, Garth Brooks, and Bill Monroe as musical inspirations,
    while also enjoying the humor of Jeff Foxworthy, weaving these Southern artistic threads into their social identity.
  travel: Matthew Gross, who prefers well-planned road trips that blend hiking in the Ozark National Forest with stops at family-friendly BBQ spots, has already visited Nashville, New Orleans, and the Grand
    Canyon, and now hopes to trek the Appalachian Trail and explore the culinary markets of Mexico City, all while staying within a carefully budgeted travel plan that they meticulously track.
  culinary: Matthew Gross, an enthusiastic home cook who rates themselves an intermediate BBQ maestro, regularly perfects dry rubs with brown sugar, smoked paprika, and cayenne pepper for smoked pork ribs,
    loves serving shrimp and grits with Andouille sausage, and delights in pairing their meals with homemade lemonade and sweet tea.
  core: Matthew Gross, a 31-year-old LPN with a knack for organized chaos, balances a disciplined nursing routine with spontaneous late-night grill sessions, a habit of over-packing their fishing gear,
    and an unwavering belief that a good song and a well-cooked meal can solve most problems.
background:
  cultural: Matthew grew up in the rural communities surrounding Little Rock, Arkansas, where Southern hospitality, strong family ties, and church involvement shaped his values. A lifelong member of a local
    Baptist congregation, he internalized a community‑first ethic, respect for elders, and a dedication to service. Regional traditions such as barbecue cook‑outs, high‑school football games, and seasonal
    festivals are central to his social life. This cultural backdrop fosters his reliable, organized approach to work and his enthusiasm for collaborative, group‑oriented activities.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''Medication administration (oral, intramuscular, subcutaneous, IV)'', ''Wound care and dressing changes'', ''Catheter and IV line management'',
