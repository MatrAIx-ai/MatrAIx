    and shift leadership'', ''Community health outreach and health fairs'']'
  hobbies: '[''Basketball'', ''Softball'', ''Fishing'', ''Hiking'', ''Camping'', ''Cooking (Southern cuisine, barbecue)'', ''Playing acoustic guitar'', ''Attending country and bluegrass festivals'', ''Volunteering
    as a health educator'', ''Participating in community health fairs'']'
  career_goals: Matthew aims to obtain an Associate Degree in Nursing and become a Registered Nurse within the next two years, building on his LPN foundation. In the medium term, he envisions specializing
    in home‑health or hospice nursing, where he can provide stable, personalized care in patients' familiar environments. He also aspires to take on a supervisory role—such as charge nurse or clinical educator—where
    he can mentor new LPNs and nursing assistants. To broaden his expertise, he plans to earn certifications in wound care and geriatric nursing, positioning himself to contribute to the development of
    community health programs in Pulaski County.
