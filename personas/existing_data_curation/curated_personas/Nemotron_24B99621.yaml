  career_goals: Rudolf aims to obtain a certified forklift operator license within the next year and pursue a GED to broaden his career options. He aspires to move into a supervisory role in warehouse logistics,
    eventually becoming a shift lead or inventory manager. Long‑term, he envisions starting his own small freight and moving company that emphasizes safety, efficiency, and technology integration. He also
    plans to take evening courses in supply chain management to deepen his knowledge and position himself for further advancement.
