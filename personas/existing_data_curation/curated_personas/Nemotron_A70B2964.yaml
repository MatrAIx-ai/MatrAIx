personas:
  professional: Ashley Cloutier, a budding young scientist‑engineer, channels curiosity and practicality into elaborate LEGO builds and slime experiments, balancing a love for hands‑on discovery with a
    relaxed, sometimes disorganized approach to classroom chores.
  sports: Ashley Cloutier, a spirited participant in the Dallas Texans youth soccer program and a regular on the Keller bike‑riding club, dazzles teammates during tag games at school while they cheer for
    the Dallas Cowboys on Sundays.
  arts: Ashley Cloutier, a budding painter who sketches Disney characters and practices piano on simple Mozart pieces, also crafts intricate LEGO builds inspired by architect Frank Gehry and they groove
    to the pop tunes of Taylor Swift during dance class.
  travel: Ashley Cloutier enjoys spontaneous bike rides to Keller’s Oak Hollow Park and family road trips to the Dallas Zoo, and they dream of future adventures at Disney World’s Magic Kingdom and the snowy
    slopes of the Swiss Alps.
  culinary: Ashley Cloutier loves baking chocolate chip cookies with melted butter and sprinkles, enjoys pizza topped with extra mozzarella, and they often help stir batter for banana bread using ripe bananas
    and cinnamon.
  core: Ashley Cloutier is a vivacious, curiosity‑fuelled 7‑year‑old who mixes relentless LEGO building and soccer enthusiasm with a tendency to lose track of chores, they worry about small setbacks, and
    they delight in spontaneous creative bursts.
background:
  cultural: Ashley is a white American girl raised in the suburban community of Keller, Texas. Her family carries French‑Canadian roots, reflected in the surname Cloutier and occasional French language
    lessons at home. She grows up immersed in typical Texan and broader American traditions—celebrating Thanksgiving, Fourth of July fireworks, and community youth sports leagues—while also experiencing
    multicultural influences from the diverse neighborhoods of Tarrant County. The blend of suburban Texas values, family heritage, and school environment shapes her outlook and everyday life.
