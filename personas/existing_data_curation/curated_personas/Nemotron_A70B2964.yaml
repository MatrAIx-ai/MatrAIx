  career_goals: Even at seven, Ashley imagines several future careers that blend curiosity, practicality, and her desire to help others. She hopes to become a teacher because she loves explaining new ideas
    to her friends and seeing them understand. Her love for animals and worry for their well‑being fuels a dream of being a veterinarian. Fascinated by space and practical experiments, she also aspires
    to be an astronaut who can explore the universe. Occasionally she talks about leading a community project that creates safe, flexible play areas for kids, reflecting her preference for flexible, collaborative
    environments.
