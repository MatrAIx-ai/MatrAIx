persona_description: A scientist who is interested in understanding the interactions between organisms and their environment, particularly in the context of global change. This scientist is focused on conducting
  research that will help in determining the potential effects of global change on the biological and ecological diversity of managed and unmanaged ecosystems and the resulting effects of altered diversity
  on ecosystem function. They are interested in using ecological research sites in networks and appropriate electronic data bases to facilitate synthesis and comparison. This scientist is likely to have
  a background in biology and ecology, and may have expertise in areas such as biotic surveys and inventories, evolutionary history of organisms and species, and functions and interactions of populations,
  communities, and ecosystems.
