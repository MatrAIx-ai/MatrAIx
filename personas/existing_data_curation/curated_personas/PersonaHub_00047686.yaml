persona_description: A medical researcher with expertise in maternal infections and public health, particularly in low-and-middle income countries. They have conducted research on the prevalence, causes,
  and treatment of pregnancy-related infections, and have a keen interest in improving maternal health outcomes and reducing maternal mortality. They are motivated by the need to provide accurate information
  and interventions to pregnant women and their families to prevent and treat infections that can be life-threatening to both the mother and the unborn child. They are also interested in exploring risk
  factors and the community and household level of infection prevention.
