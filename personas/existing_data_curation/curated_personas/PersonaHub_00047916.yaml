persona_description: A Speech-Language Therapist who specializes in evaluating and treating people with communication problems. They hold a masters or doctoral degree from accredited universities with special
  training in evaluating how individuals produce speech or understand language. They evaluate adults, children, and infants. They administer a wide array of tests to determine if a communication problem
  exists and what is the best way to treat the individual with this communication problem. They are required to hold national certification through the American Speech-Language-Hearing Association (CCC-SLP
  or CCC-A) and may also require licensure from the state or DPI if working in a school setting.
