personas:
  professional: Ana Santana, a seasoned journeyman electrician in New Jersey, leverages a decade of wiring expertise, meticulous blueprint interpretation, and a safety‑first mindset to lead complex residential
    and commercial projects while coaching apprentices and translating technical jargon into friendly conversation for clients and crews.
  sports: Ana Santana stays fit by leading Zumba classes, hiking the Watchung Reservation on weekends, supporting the New York Giants, New Jersey Devils, and New York Knicks, and playing in a co‑ed softball
    league during summer, always wearing a bright salsa‑inspired headband as a personal trademark.
  arts: Ana Santana immerses themselves in salsa and merengue evenings, dancing to the rhythms of Marc Anthony, Celia Cruz, and local Latin bands, while also attending Broadway shows and community theater
    productions, especially those celebrating vibrant storytelling and cultural pride.
  travel: Ana Santana prefers short, family‑oriented trips that blend relaxation with cultural discovery, having explored historic Old San Juan, the bustling streets of New York City, and the scenic trails
    of the Catskills, while dreaming of a solar‑powered eco‑retreat in Costa Rica’s rainforests.
  culinary: Ana Santana’s culinary repertoire boasts expertly prepared arroz con gandules, pasteles wrapped in banana leaves, and a love for adobo‑seasoned pork, yet they admit to occasionally over‑seasoning
    dishes while savoring a local eatery’s mofongo with a side of plantains.
  core: Ana Santana energizes every project and party alike, wiring houses with the precision of a dancer and sprinkling conversations with bright humor, even if they sometimes forget to turn off their
    own lights at night.
background:
  cultural: Ana was raised in a close‑knit Puerto Rican family that celebrated island traditions, music, and food while adapting to life in the United States. Bilingual in Spanish and English, she carries
    the vibrant spirit of Puerto Rico into her daily life, from the rhythms of salsa that fill her home to the communal values of familismo that guide her decisions. Living in Rutherford, NJ, she actively
    participates in the local Puerto Rican community—attending festivals, supporting cultural organizations, and preserving holiday customs such as Nochebuena and Three Kings’ Day. Her heritage instills
    a strong work ethic, resilience, and a deep sense of responsibility toward family and community, which shape both her professional demeanor and her social engagements.
attributes:
  skills: '[''Electrical wiring and conduit installation'', ''Blueprint reading and code compliance'', ''Circuit troubleshooting and fault diagnosis'', ''Smart‑home system integration'', ''Solar PV and
    energy‑storage installation'', ''Safety inspections and OSHA compliance'', ''Project scheduling and budgeting'', ''Team leadership and apprentice training'', ''Customer communication and consultation'']'
  hobbies: '[''Salsa and merengue dancing'', ''Cooking Puerto Rican cuisine'', ''Mentoring youth at community center'', ''Organizing home‑electrical safety workshops'', ''Zumba fitness classes'', ''Hiking
    in local parks'', ''Exploring smart‑home technology'', ''DIY home improvement projects'']'
  career_goals: Ana aims to advance from journeyman to Master Electrician within the next three years, positioning herself to launch her own contracting firm that specializes in sustainable residential
    retrofits and smart‑home automation. She plans to obtain a Certified Construction Manager credential to strengthen her project‑management skills, and she is committed to creating apprenticeship pathways
    for women and underrepresented minorities in the electrical trade. Over the long term, Ana envisions her company becoming a respected leader in New Jersey’s green‑building sector while maintaining a
    work schedule that supports her family life.
