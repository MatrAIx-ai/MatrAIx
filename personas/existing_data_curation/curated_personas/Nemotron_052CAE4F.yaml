  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Photography'', ''Hiking'', ''Reading philosophy'', ''Reading psychology'', ''Playing board games'', ''Writing reflective essays'', ''Attending community
    theater'']'
  career_goals: Arthur aims to advance from his current analyst role to a senior management analyst position within the next three to five years, focusing on strategic planning and organizational change
    initiatives. He intends to pursue a part‑time MBA to deepen his business acumen and leadership skills. Long‑term, he envisions leading a cross‑functional innovation team that integrates creative thinking
    and artistic perspectives into corporate practice, or possibly launching a boutique consulting firm that helps mid‑size companies adopt flexible, design‑thinking approaches. He also seeks to develop
    stronger stress‑management techniques to sustain his well‑being while handling increasingly complex responsibilities.
