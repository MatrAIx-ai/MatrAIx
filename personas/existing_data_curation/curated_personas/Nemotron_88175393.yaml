  hobbies: '[''Cooking Southern cuisine'', ''Gardening'', ''Church choir participation'', ''Listening to gospel and blues'', ''Reading African‑American history'', ''Playing chess'', ''Walking in parks'',
    ''Watching Alabama football'', ''Family gatherings'']'
  career_goals: Cristian aims to deepen his community impact by establishing a formal mentorship program for at‑risk youth in Birmingham, serving on the board of a nonprofit that supports senior citizens,
    and documenting his family’s oral histories for future generations. He also aspires to stay physically active, travel to family reunions across the South, and continue fostering harmony and cooperation
    within his church and neighborhood.
