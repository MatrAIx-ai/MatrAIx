  hobbies: '[''Playground activities (slides, swings, group games)'', ''Drawing and coloring'', ''LEGO building and block stacking'', ''Listening to music and dancing'', ''Reading picture books'', ''Exploring
    nature (collecting leaves, observing insects)'', ''Comfort routines (hugging stuffed animal, deep breathing)'']'
  career_goals: Wanda dreams of becoming a teacher because she loves sharing what she learns with friends and enjoys helping others feel happy. She also imagines caring for animals as a veterinarian, inspired
    by her family’s pet rabbit and trips to the local farm. Occasionally she pretends to be a scientist exploring the outdoors, collecting leaves and insects to learn more about the world. While her ambitions
    are playful, she expresses a strong desire to keep learning new things and to make others feel safe and understood.
