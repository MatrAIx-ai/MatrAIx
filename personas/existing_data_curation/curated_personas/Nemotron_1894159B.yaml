personas:
  professional: Wanda Moon, a budding little architect, fashions imaginative LEGO structures and applies her curiosity and practicality to early design play, showing organized yet flexible problem‑solving
    in her playground projects, and they delight in sharing creations with friends.
  sports: Wanda Moon, a lively playground athlete, loves tag, swings, and organized games of soccer with the local Kids Rangers club, cheers for the Houston Astros on game days, and they balance energetic
    play with a habit of drinking water after running.
  arts: Wanda Moon, a bright budding artist, fills sketchbooks with colorful animal drawings inspired by Eric Carle's illustrations and dances to The Wiggles and Raffi's songs, often reenacting scenes from
    Sesame Street during classroom performances, and they love sharing their artwork with classmates.
  travel: Wanda Moon, an adventurous little explorer, enjoys weekend trips to Galveston's beach, annual visits to the Texas State Fair, and dreams of flying to Disney World in Florida for a magical vacation
    with her family, and they eagerly plan each outing with a crayon‑drawn map.
  culinary: Wanda Moon, a tiny culinary enthusiast, adores creamy mac and cheese, peanut butter and jelly sandwiches, and building fruit kebabs with strawberries, bananas, and grapes, proudly helping to
    stir batter under adult supervision, and they always request extra sprinkles on cupcakes.
  core: Wanda Moon, a curious, socially vibrant six‑year‑old with a vivid imagination, balances enthusiastic play with occasional anxiety, clutching a stuffed rabbit for comfort while they constantly create
    and share colorful LEGO worlds.
background:
  cultural: Wanda lives in Crosby, a small community in Harris County, Texas, where Southern hospitality and close‑knit neighborhood ties shape daily life. Her family celebrates traditional American holidays
    such as Thanksgiving, the Fourth of July, and Halloween, often with community potlucks, fireworks, and costume parties. Local church gatherings and Sunday school provide a sense of belonging and reinforce
    values of kindness, cooperation, and respect for others. The Texas climate encourages outdoor activities; weekend visits to nearby parks, picnics by the bayou, and occasional trips to a farmer's market
    are common. Her cultural upbringing includes exposure to country music, school events like the fall fair, and an emphasis on practical, hands‑on learning. While her household reflects a typical white
    middle‑American Texan environment, educators at her preschool introduce multicultural stories and celebrate diverse cultural traditions, giving her a broader perspective on the world.
attributes:
