persona_description: A researcher in the field of communication sciences who specializes in the study of mentalizing processes in language processing, particularly in the context of social interaction.
  She has conducted research on the relationship between mentalizing and successful communication, and has explored the role of mentalizing in the adaptation of language processing to context. Her expertise
  includes using neuroimaging techniques such as magnetoencephalography to monitor neural activation during language processing in context. She has published research on the effects of mentalizing on referential
  ambiguity, memory, and common ground processing in social interaction.
