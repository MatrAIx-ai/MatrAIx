personas:
  professional: Pam Dornburg is a budding architect in training, who channels their love for LEGO building and intricate puzzles into designing miniature townscapes, applying meticulous organization and
    a high achievement drive while balancing curiosity and practicality, and they approach each project with disciplined precision.
  sports: Pam Dornburg enjoys weekly snowshoe hikes with their family on local trails, participates in a beginner’s ice skating class at the community rink, roots for the University of Vermont Catamounts
    basketball team and cheers for the nearby Burlington IceCats junior hockey squad, and pretends to be a forward on a neighborhood little league baseball team during recess, and they eagerly share these
    experiences with close friends.
  arts: Pam Dornburg spends afternoons drawing detailed leaf patterns and forest scenes inspired by New England foliage, delights in listening to Mozart’s piano concertos during practice, watches Pixar’s
    'Inside Out' and sings along to 'Let It Go' from Frozen, and collects stickers featuring artists like Dr. Seuss and Van Gogh mini prints, and they often display their artwork on the refrigerator.
  travel: Pam Dornburg prefers short family road trips to places like Acadia National Park for leaf‑peeping hikes, a weekend getaway to Lake Placid for a beginner ski lesson, and occasional visits to Boston’s
    Children’s Museum, favoring structured itineraries that include nature walks and hands‑on workshops while their parents handle the logistics, and they enjoy planning the next adventure with a colorful
    map.
  culinary: Pam Dornburg loves creamy mac and cheese topped with crispy breadcrumbs, enjoys making a simple fruit salad with blueberries, strawberries, and a drizzle of local maple syrup, and relishes seasonal
    apple pie slices at community fairs, though they can be picky about vegetables and often ask for extra cheese.
  core: Pam Dornburg is a meticulously organized six‑year‑old whose curiosity fuels LEGO masterpieces, yet they battle intense anxiety that colors their quiet, disciplined, and occasionally impulsive approach
    to life.
background:
  cultural: Pam was raised in Essex Junction, a small town in Chittenden County, Vermont. Her family reflects a typical New England white middle‑class background, emphasizing education, community involvement,
    and appreciation for the natural environment. Local traditions such as seasonal farm‑to‑table markets, leaf‑peeping in the fall, and community snow‑day activities are part of her upbringing. The cultural
    milieu values punctuality, self‑reliance, and modesty, which aligns with Pam’s organized and disciplined personality.
attributes:
