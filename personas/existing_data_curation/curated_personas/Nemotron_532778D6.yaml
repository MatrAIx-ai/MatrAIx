personas:
  professional: Bernarda Rolon is a preschool organizer who turns building block play into miniature project management, meticulously sorting toys by color and size, and they love assigning roles to friends,
    often taking charge of the daily tidy‑up routine.
  sports: Bernarda Rolon is a member of the Utah Little Stars Soccer Club’s Tots team, relentlessly practicing dribbling at the neighborhood park, passionately cheering for the Utah Jazz during basketball
    season, and always insists on being the first to finish the family’s weekly hike up the Wasatch foothills.
  arts: Bernarda Rolon loves dancing to upbeat joropo and salsa rhythms from home while humming lullabies taught by grandparents, drawing vivid geometric patterns inspired by the colorful blankets on their
    walls, and idolizing The Wiggles and Shakira for their energetic performances.
  travel: Bernarda Rolon has explored the Great Salt Lake’s shoreline on a school field trip, built elaborate sand castles during a family beach vacation in the Caribbean, and daydreams about trekking the
    Andes’ highland towns, preferring trips that combine a clear itinerary with spontaneous playground discoveries.
  culinary: Bernarda Rolon delights in kneading soft corn dough for tiny arepas, spreading sweet dulce de leche and melted cheese as toppings, while also savoring chicken nuggets and apple slices, and they
    proudly stir a bowl of oatmeal each morning, adding fresh cilantro and ripe avocado for extra flavor.
  core: Bernarda Rolon is a four‑year‑old pragmatist who organizes toys like tiny projects, saves coins with strict discipline, battles sneezes with a pocket inhaler, races ahead in soccer, dances to lively
    rhythms while drawing bright patterns, dreams of structured yet adventurous trips, and flavors life with homemade arepas and sweet treats.
background:
  cultural: Bernarda’s family maintains strong Venezuelan roots while living in Spanish Fork, Utah. At home she hears Venezuelan folk music like joropo and salsa, and she celebrates traditions such as Día
    de los Niños and the Venezuelan holiday of Día de la Independencia with homemade arepas and dulce de leche desserts. Her grandparents often share Spanish lullabies and teach her simple Venezuelan games.
    This bicultural environment enriches her bilingual abilities and gives her a sense of pride in her heritage, while also allowing her to blend into the local community’s celebrations and school activities.
attributes:
  skills: '[''fine‑motor coordination (puzzles, building blocks)'', ''early literacy (recognizing letters, reading picture books)'', ''bilingual language skills (English and Spanish)'', ''basic numeracy
    (counting to ten, sorting by size/color)'', ''following multi‑step instructions'', ''organizing toys and simple household tasks'']'
  hobbies: '[''jigsaw puzzles'', ''building block towers'', ''drawing with crayons'', ''bilingual storytime'', ''nature walks and leaf collecting'', ''turn‑based games with mild competition'']'
  career_goals: Although still young, Bernarda dreams of becoming someone who helps others and works with clear structures. She often talks about being a teacher who organizes fun lessons, a veterinarian
    who cares for animals, or an astronaut who follows precise mission plans. These ambitions reflect her love for order, responsibility, and making a tangible impact.
