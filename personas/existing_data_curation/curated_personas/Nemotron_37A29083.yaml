  career_goals: Ami’s primary ambition is to deepen her impact on Portland’s cultural and environmental community through volunteer leadership. She aims to chair the programming committee of a local arts
    nonprofit, develop a mentorship program for emerging senior artists, and launch a community garden project that incorporates artistic installations and sustainable practices. Additionally, she plans
    to create a photographic essay documenting the city’s evolving neighborhoods, mastering advanced digital storytelling techniques. Ultimately, she hopes her contributions will leave a lasting legacy
    that blends art, nature, and community empowerment.
