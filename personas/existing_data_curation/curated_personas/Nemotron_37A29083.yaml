personas:
  professional: A seasoned community arts organizer named Ami Comas blends their Midwestern work ethic with Portland’s progressive spirit, leveraging grant‑writing expertise, meticulous budgeting, and a
    natural charisma to lead volunteer programming that reflects their curious, organized yet flexible approach, and they often channel a competitive drive to out‑innovate fellow organizers.
  sports: Ami Comas cycles with the Portland Cycling Collective, roots for the Timbers and Trail Blazers, competes in a senior softball league each spring, incorporates daily yoga and weekend hikes in the
    Columbia River Gorge into a fitness routine that balances competitive spirit with community camaraderie, and they often gauge performance stats with enthusiastic curiosity.
  arts: Ami Comas attends the Portland Art Museum, First Thursday art walks, and performances at the Portland Center for the Performing Arts featuring The Decemberists, Tony Kushner, and poet Ocean Vuong,
    while they also lead tactile pottery and knitting workshops that satisfy their curiosity for unconventional, community‑based creation.
  travel: Ami Comas meticulously plans weekend road trips to the Oregon Coast and Columbia River Gorge, has explored Kyoto’s historic districts on a recent sabbatical, dreams of trekking Iceland’s volcanic
    landscapes, prefers sustainable travel options like trains and bike‑friendly stays, and they often overpack their camera gear in the excitement of discovery.
  culinary: Ami Comas delights in seasonal cooking, frequently preparing roasted beet and goat‑cheese salad with local kale, wild mushroom risotto spiced with sage, and rosemary‑infused sourdough using
    herbs from their garden, while they also savor Portland’s artisanal coffee and craft beers, though they sometimes burn the edges of soup when multitasking during busy evenings.
  core: Ami Comas is a curious, socially energetic volunteer leader who mixes Midwestern pragmatism with Portland’s eco‑creative vibe, channeling a competitive edge into community art, garden, and photography
    projects, and they often overcommit and forget to pause for tea.
background:
  cultural: Ami grew up in the post-World War II American Midwest before relocating to the Pacific Northwest in her thirties, where she embraced the region’s progressive, environmentally conscious ethos.
    As a white American of the baby-boomer generation, she was raised with values of independence, self-reliance, and a strong work ethic. Living in Portland for several decades has deepened her appreciation
    for the city’s vibrant arts scene, diverse community, and emphasis on sustainability. She identifies with Portland’s eclectic culture, blending a classic Midwestern upbringing with the city’s modern,
    inclusive, and creative spirit.
