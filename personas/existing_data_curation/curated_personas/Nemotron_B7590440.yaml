personas:
  professional: Jane Pettey is a junior product tester for infant learning toys, using her innate curiosity, organized play habits, and surprisingly competitive spirit to meticulously evaluate every sound,
    texture, and color, while reliably reporting her preferences to developers.
  sports: Jane Pettey thrills in toddler gymnastics classes at Tiny Sprouts Playhouse and loves cheering for the local baseball team the Springfield Isotopes during family outings, even mimicking their
    victory dances after mastering a new tumble.
  arts: Jane Pettey delights in bright picture books by Eric Carle, sways to the soothing lullabies of Mozart and the playful tunes of The Wiggles, and often mimics the animated expressions of the Sesame
    Street characters during her daily storytime.
  travel: Jane Pettey enjoys stroller-walks through Central Park, weekend beach trips to Cape Cod, and her parents are already planning a future family vacation to Disney World in Orlando, a destination
    she watches on pictures with bright eyes.
  culinary: Jane Pettey favors smooth carrot-and-sweet-potato purées, loves the buttery texture of avocado toast for toddlers, and gets a delighted grin when offered a soft coconut biscuit sprinkled with
    cinnamon.
  core: Jane Pettey is a sprightly one-year-old who's already a competitive toy-tester, steadfast saver of gold-colored coins, and the only infant known to turn every bedtime story into a mini-art exhibition.
background:
  cultural: Jane comes from a White, European‑American background and is raised in the suburban community of Lincoln, California, in Placer County. Her upbringing reflects typical Northern California middle‑class
    values, with exposure to local family traditions, community events, and a focus on early childhood education and outdoor play.
