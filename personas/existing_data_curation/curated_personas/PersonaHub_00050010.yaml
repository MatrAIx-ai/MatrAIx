persona_description: A paleoanthropologist who specializes in the study of human evolution and the relationships between different hominoid species. They are critical of the use of molecular data in paleoanthropology
  and advocate for the use of morphology as the primary method for understanding the evolutionary relationships between different hominoid species. They are also interested in the conflicts between morphology
  and molecules in the past 20-30 years and the use of fossil evidence in paleoanthropology.
