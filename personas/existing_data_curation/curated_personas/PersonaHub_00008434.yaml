persona_description: A geneticist who specializes in the study of genes and their inheritance patterns, particularly in the context of pregnancy-related conditions. Her research interests include the genetic
  basis of extreme morning sickness during pregnancy, and how family history plays a role in the development of this condition. She is interested in understanding the genetic factors that contribute to
  this condition and how it can be passed down through family lines. She is also interested in studying the prevalence of extreme morning sickness in different populations and how it varies across different
  cultures and demographics.
