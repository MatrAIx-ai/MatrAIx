  career_goals: Jennelle aims to solidify her commitment to helping others by first earning her GED within the next year. She plans to enroll in a Certified Nursing Assistant (CNA) program at a community
    college nearby, attracted by the structured, routine-driven environment of healthcare. Her short‑term goal is to secure a CNA position in a long‑term care facility or a home‑health agency where she
    can provide dependable support to seniors and patients with chronic conditions. Over the longer term, she hopes to pursue additional certification as a Licensed Practical Nurse (LPN) to expand her clinical
    responsibilities while still working in a predictable, team‑oriented setting. Throughout her career, she wishes to maintain a balance between professional duties and community service, perhaps volunteering
    at local health fairs or senior centers.
