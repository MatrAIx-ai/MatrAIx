  career_goals: Michael aims to combine his love for technology and storytelling by pursuing a career in digital media production or interactive software development. He envisions creating educational videos
    and interactive learning apps that engage other teens. Over the next decade, he plans to study computer science and communications in college, eventually working as a UX designer or creative director
    for a tech startup focused on youth education. He also dreams of building a personal brand as an online content creator who can inspire and teach others through entertaining, tech‑savvy media.
