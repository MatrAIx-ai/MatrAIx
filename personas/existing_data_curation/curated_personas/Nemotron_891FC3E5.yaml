  career_goals: Kenneth aims to leverage his hands-on logistics experience and creative talents to transition into a supply-chain analyst or operations manager role, eventually guiding a warehouse that
    supports a creative enterprise such as a boutique art-supply distributor or a sustainable fashion brand. In the longer term he plans to earn a bachelor's degree in Business Administration or Visual
    Arts, and possibly launch his own studio that merges art, community events, and eco-friendly product distribution.
