  hobbies: '[''Basketball league'', ''Bowling nights'', ''Classic car restoration'', ''Attending car shows'', ''Fishing trips'', ''Church community service'']'
  career_goals: Justin aims to advance into a supervisory role within the cleaning services sector, where he can apply his organizational strengths and provide a stable, predictable schedule for his family.
    He is working toward an associate degree in facilities management to qualify for a fleet‑management position or to launch his own small‑scale green‑cleaning business that emphasizes environmentally
    safe practices. Achieving certification in green cleaning and safety compliance is also a priority, as it would increase his earning potential and reduce job‑related stress. Ultimately, he wants a career
    path that offers clear advancement steps, reliable income, and the ability to balance work responsibilities with his family life.
