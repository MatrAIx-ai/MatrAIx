    and business'', ''Listening to personal‑finance podcasts'']'
  career_goals: Michael aims to become a Certified Public Accountant within the next three years, leveraging his associate credential and work experience to sit for the CPA exam. He envisions progressing
    from staff auditor to senior auditor, eventually moving into a supervisory role where he can shape audit methodology and mentor junior colleagues. His curiosity about fintech pushes him to acquire expertise
    in data analytics and automation, with a long‑term ambition to lead a finance‑technology integration team. He also values work‑life balance, so his career plan includes seeking a firm that promotes
    a supportive culture, flexible scheduling, and resources for managing stress. Ultimately, Michael hopes to earn a managerial position that allows him to influence strategic decision‑making while maintaining
    a collaborative, people‑first environment.
