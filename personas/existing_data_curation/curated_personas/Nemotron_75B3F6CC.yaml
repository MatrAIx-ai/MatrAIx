personas:
  professional: Michael Ragon is a 27‑year‑old staff auditor at a mid‑size Orlando firm who blends meticulous GAAP compliance and internal‑control testing with a growing expertise in data‑visualisation,
    automation scripting, and SAP FI, channeling their organized, methodical approach and collaborative spirit into every audit engagement.
  sports: Michael Ragon plays forward for the community basketball team Orlando Flyers, follows the Orlando Magic during the NBA season and the Tampa Bay Lightning in the NHL, and spends their weekends
    hiking with the Ocala Trailblazers club and kayaking at Wekiwa Springs, combining moderate team competition with outdoor fitness.
  arts: Michael Ragon indulges in strategic video‑game worlds like Civilization VI and Cities: Skylines, attends live performances at the Dr. Phillips Center featuring shows starring Lin‑Manuel Miranda,
    and they unwind listening to indie‑rock band The National and jazz pianist Kamasi Washington, integrating modern gaming narratives with classic artistic experiences.
  travel: Michael Ragon prefers meticulously planned weekend getaways to the Florida Keys for snorkeling, the Great Smoky Mountains for hiking, and occasional road trips to New Orleans for its music festivals,
    while they dream of a future cultural immersion in Kyoto, Japan.
  culinary: Michael Ragon enjoys experimental cooking, often preparing Korean‑style pork tacos with gochujang, pineapple salsa, and fresh cilantro, or Caribbean‑inspired citrus‑cured shrimp ceviche featuring
    mango and lime, sourcing herbs and tropical fruits from the local farmer’s market and they pair dishes with craft beers from Orlando’s breweries.
  core: Michael Ragon, a detail‑driven 27‑year‑old auditor, balances a persistent worry streak with a love for data‑driven problem solving, experimental cooking, community service, and weekend hikes that
    keep their mind and body calibrated.
background:
  cultural: Michael was raised in a middle‑class, predominantly Anglo‑American household in Central Florida. His family’s cultural values emphasize hard work, punctuality, and community responsibility,
    reflecting broader Mid‑Atlantic and Southern U.S. traditions. Growing up near Orlando’s diverse tourism hub exposed him to a mosaic of cultures, fostering an appreciation for multicultural foods, festivals,
    and perspectives while retaining his own heritage. His education at a local community college reinforced a practical, hands‑on learning ethos. He celebrates typical American holidays such as Thanksgiving
    and Fourth of July, and he participates in community events like local farmer’s markets and charity drives, mirroring his cooperative, harmony‑seeking disposition.
