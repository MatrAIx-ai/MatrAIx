persona_description: A neurologist who specializes in the diagnosis and treatment of various types of headaches, particularly those that are secondary in nature. The neurologist has a keen eye for detecting
  signs and symptoms that may suggest the presence of a brain tumor or other underlying structural lesion, and is well-versed in the diagnostic tools and procedures necessary to investigate such conditions.
  The neurologist is also skilled in identifying and treating migraine and other types of primary headaches, as well as secondary headaches that are caused by various factors such as brain tumors, infections,
  and other structural lesions.
