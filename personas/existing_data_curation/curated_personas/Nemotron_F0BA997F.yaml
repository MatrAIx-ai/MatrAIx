  career_goals: Pamela dreams of turning her curiosity into a future career that blends discovery and creativity. She envisions herself as a scientist‑inventor who designs experiments to solve everyday
    problems, or as an artist‑curator who creates and shares thought‑provoking installations in a museum. She is motivated to win her school’s science fair and hopes to earn a scholarship that will allow
    her to attend a specialized STEM camp. Her competitive streak pushes her to aim for the top of her class and to be recognized for academic and artistic excellence. At the same time, she wishes to develop
    resilience so that stress and worry do not hold her back from pursuing big ideas.
