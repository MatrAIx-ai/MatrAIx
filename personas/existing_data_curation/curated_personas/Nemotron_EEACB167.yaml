personas:
  professional: Cynthia Sautter, a 28‑year‑old carpenter, merges solid framing and finish‑carpentry expertise with an artistic eye for folk‑art motifs, expertly reading blueprints and coordinating teams
    while their assertive yet collaborative nature guarantees safety standards, tight schedules, and room for creative improvisation, reflecting a curious mind that constantly seeks unconventional design
    solutions.
  sports: Cynthia Sautter hikes the Ozark foothills every weekend with the Trailblazers Hiking Club, follows the St. Louis Cardinals for baseball and the St. Louis City SC for soccer, supplements outdoor
    treks with a weekly yoga class for flexibility, and balances solo adventure with occasional community softball games, reflecting a flexible yet structured approach to fitness.
  arts: Cynthia Sautter sketches watercolor scenes inspired by Frida Kahlo’s vibrant colors and William Morris’s intricate patterns, strums acoustic guitar to Simon & Garfunkel’s harmonies, sings in her
    church choir performing hymns by John Taylor, and integrates folk‑art motifs into custom woodworking, embodying a curious, open‑minded love for both classic and unconventional artistic expressions.
  travel: Cynthia Sautter favors relaxed, road‑trip travel, having explored Asheville’s mountain art galleries and Austin’s live‑music scene, dreaming of a pilgrimage to Kyoto’s traditional carpentry workshops
    and a future adventure in the Icelandic highlands, while always booking boutique B&Bs that fit a modest travel budget and allow ample downtime for sketching.
  culinary: Cynthia Sautter enjoys cooking farm‑to‑table meals, frequently preparing roasted beet and arugula salads with goat cheese and toasted walnuts, baking zucchini bread spiced with cinnamon, experimenting
    with a sourdough starter, and occasionally fermenting kimchi, showcasing a moderate cooking skill enhanced by a willingness to experiment with bold flavors.
  core: Cynthia Sautter is a detail‑driven carpenter‑artist whose boundless curiosity and creative flair are constantly tempered by a habit of worrying, prompting meticulous planning in both work and personal
    pursuits.
background:
  cultural: Cynthia grew up in a white, working‑class family in Corning, Arkansas, where the values of self‑reliance, hands‑on problem solving, and community support were central. Her parents ran a small
    farm and occasionally took on repair jobs, exposing her early to carpentry and the tradition of building with modest resources. The rural Southern culture of the region instilled a respect for the land,
    an appreciation for folk crafts such as quilting and basket weaving, and a modest, courteous demeanor. Church and local gatherings provided a sense of belonging, while regional craft fairs nurtured
    her love for artistic expression. This blend of practical craftsmanship, Southern hospitality, and exposure to regional art forms shapes Cynthia’s worldview and fuels her desire to marry functional
    building with creative design.
