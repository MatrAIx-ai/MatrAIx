  hobbies: '[''sketching'', ''watercolor painting'', ''acoustic guitar'', ''hiking'', ''reading sci-fi/fantasy'', ''pottery'', ''up‑cycling furniture'', ''attending local craft fairs'', ''community gardening'',
    ''DIY home improvement projects'']'
  career_goals: Cynthia aims to earn journeyman certification and eventually become a master carpenter recognized for integrating art into functional pieces. She plans to open a small boutique workshop
    in Corning where she can design and build sustainable, artistically‑inspired furniture for local homes and boutique hotels. Over the next five years she hopes to obtain a contractor’s license so she
    can oversee whole‑house renovations, giving her more control over project timelines and reducing workplace stress. Cynthia is also passionate about mentoring other women entering the trade, and she
    envisions hosting community woodworking classes that combine technical skill with creative design. Balancing ambition with her tendency toward worry, she prioritizes a schedule that allows regular downtime
    for personal art projects and self‑care.
