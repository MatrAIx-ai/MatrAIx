personas:
  professional: Isabel Alonso, a curious seven‑year‑old budding artist, blends bright folk‑inspired drawings with meticulous LEGO constructions, showing early skill in visual storytelling and a knack for
    organizing creative projects while staying flexible enough to experiment with new media.
  sports: Isabel Alonso enjoys beachcombing and casual sandcastle building at the local shoreline, participates in the community’s after‑school soccer program that follows the hometown team the Blue Seals,
    and they cheer for the regional basketball squad, the River City Raptors, during weekend games.
  arts: Isabel Alonso immerses themselves in vibrant artistic expression, drawing inspiration from the lively rhythms of salsa and merengue while listening to musicians like Celia Cruz and Juan Luis Guerra,
    and they adore the colorful canvases of Frida Kahlo, the playful illustrations of Dr. Seuss, and the rhythmic dance of marimba ensembles.
  travel: Isabel Alonso dreams of collecting shells on the sun‑kissed shores of Key West, has already visited the nearby coastal town of Santa Cruz with their family, and they hope to explore the historic
    streets of Cartagena and the natural wonders of the Galápagos Islands, planning each trip with a hand‑drawn map and a checklist of must‑see landmarks.
  culinary: Isabel Alonso delights in bright, sweet flavors, often snacking on mango slices, rice‑and‑beans topped with avocado, and occasionally helping bake colorful cupcakes decorated with rainbow sprinkles,
    while they sometimes overindulge in sugary cereals during weekend mornings.
  core: Isabel Alonso is a creatively curious seven‑year‑old who balances organized art projects with spontaneous play, saves allowance for new supplies, watches for allergy flare‑ups, and dreams of beachside
    adventures, all while humming to salsa beats and sketching everywhere they go.
background:
  cultural: Isabel’s family maintains strong ties to their Nicaraguan roots. At home they speak Spanish and celebrate traditions such as Día de la Independencia, the Feast of the Immaculate Conception,
    and family gatherings around dishes like gallo pinto, nacatamales, and tortillas. She grows up hearing marimba, salsa, and folk songs, and participates in local Latino festivals in Miami that showcase
    Nicaraguan dance and art. Attending a bilingual preschool, she learns to navigate both American and Nicaraguan cultural expectations, fostering values of family solidarity, resilience, and a deep appreciation
    for storytelling and visual expression.
attributes:
  skills: '[''Reading comprehension'', ''Basic Spanish speaking'', ''Drawing and coloring'', ''Simple arithmetic'', ''Using educational apps'']'
  hobbies: '[''Drawing'', ''Painting'', ''Reading picture books'', ''Listening to music'', ''Dancing'', ''Exploring nature'', ''Puzzles'', ''LEGO building'', ''Educational tablet games'']'
  career_goals: Isabel dreams of becoming an artist who can illustrate stories from her Nicaraguan heritage, a bilingual teacher who shares her love of language and culture, and even an astronaut who explores
    new frontiers. In the near term, she aims to improve her drawing skills, learn more about science through hands‑on experiments, and help her family preserve cultural traditions by creating artwork for
    community festivals.
