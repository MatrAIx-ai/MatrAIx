persona_description: A healthcare professional who prioritizes patient safety, community health, and ethical responsibilities during a pandemic. This persona is dedicated to promoting health through a collaborative,
  patient-centered process that considers individual patient circumstances and their impact on health promotion efforts. They understand the importance of addressing structural factors that heighten risk
  to vulnerable populations and advocate for community resources designed to promote health and provide access to preventive services. This individual is committed to resisting discharge requests that compromise
  patient safety and collaborating with health care professionals to establish plans for medically needed care that considers the patient's particular needs and preferences.
