personas:
  professional: An aspiring engineer and storyteller, Brittany Kennel channels her love for speculative worlds into detailed sketchbook designs and LEGO builds, while dabbling in Scratch programming to
    craft simple interactive stories, showcasing a blend of artistic imagination and nascent technical problem‑solving skills.
  sports: A curious participant in community activities, Brittany Kennel enjoys after‑school soccer with the Little Explorers Soccer Club, cheerfully follows the New York Yankees during baseball season,
    and spends weekends biking around the neighborhood park while insisting on wearing bright neon sneakers that make her feel ‘fast.’
  arts: A budding art aficionado, Brittany Kennel sketches dreamy landscapes inspired by Claude Monet, watches animated films by Studio Ghibli, listens to the playful tunes of They Might Be Giants, and
    sways to Taylor Swift’s Shake It Off during piano practice.
  travel: An inquisitive explorer, Brittany Kennel loves weekend trips to the nearby state museum and dreams of visiting the Grand Canyon’s rim, preferring family‑led itineraries with ample time for rock‑collecting
    scavenger hunts and avoiding crowded theme parks.
  culinary: A playful eater, Brittany Kennel delights in building peanut butter‑and‑banana sandwiches shaped like rockets, craves the cheesy goodness of macaroni‑and‑cheese with a sprinkle of cheddar, and
    experiments with mixing rainbow sprinkles into vanilla yogurt for a snack.
  core: Brittany Kennel is a fiercely imaginative 7‑year‑old who transforms curiosity into colorful LEGO worlds, battles intense anxiety with creative outlets, and habitually hoards shiny rocks in a secret
    drawer.
background:
  cultural: Brittany is raised in a white, middle‑class family in Stephens City, Virginia. Her family values education and supports participation in local school programs, library story hours, and community
    art fairs. Seasonal traditions such as decorating for holidays, attending church gatherings, and enjoying backyard barbecues reflect the region's blend of Southern hospitality and Mid‑Atlantic community
    spirit. The proximity to Shenandoah Valley’s historic sites and outdoor spaces nurtures her curiosity about American history and nature. Her parents encourage both academic achievement and artistic
    expression, providing a balanced environment that reinforces her imaginative and analytical traits.
