    creation", "Rock collecting"]'
  career_goals: Brittany dreams of becoming an astronaut who can draw and document her journeys in space. She also imagines a future as a scientific illustrator, merging her love of art with scientific
    discovery. Competing in science fairs and art contests fuels her ambition to earn recognitions that show her personal talents. She hopes to design new inventions that solve everyday problems, especially
    those that help kids explore creativity and curiosity.
