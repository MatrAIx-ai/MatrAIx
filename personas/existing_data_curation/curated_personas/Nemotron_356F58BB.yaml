personas:
  professional: Andrea Vann, an applied mathematician and data scientist, leads regional sustainability analytics projects, turning complex environmental datasets into clear policy recommendations with
    tools such as "Python", "GIS", and "Tableau", while balancing a love of structured models with a relaxed, collaborative team style that encourages open brainstorming.
  sports: Andrea Vann fuels a passion for trail running in the Cascades, weekly kayaking on Bellingham Bay, and cheering on the Seattle Seahawks, while holding a membership with the local running club "Cedar
    Crest Runners" and participating in community clean‑up hikes.
  arts: Andrea Vann engages with contemporary fiction through a book club that often discusses Margaret Atwood and environmental nonfiction, attends indie shows featuring local band The Catheters and folk
    artist Sufjan Stevens, and captures nature’s moods in photography inspired by Ansel Adams.
  travel: Andrea Vann designs loosely structured road trips, preferring spontaneous detours to places like the Oregon Coast, Iceland’s glacial lagoons, and Indigenous cultural sites on the Olympic Peninsula,
    while budgeting trips with a mix of modest Airbnb stays and occasional splurges on boutique eco‑lodges.
  culinary: Andrea Vann whips up seasonal meals such as cedar‑plank salmon with foraged mushrooms, wild berry crumble, and quinoa salad featuring locally sourced kale, showcasing intermediate cooking skills
    that blend science‑inspired precision with improv‑style experimentations during potluck gatherings.
  core: Andrea Vann blends data‑driven rigor with a love for outdoor adventure, yet habitually misplaces their keys in the garden and keeps a running tally of pine cones collected from hikes.
background:
  cultural: Andrea comes from a European‑American background, with family roots tracing back to German and Irish immigrants who settled in the Pacific Northwest in the early 1900s. Raised in a middle‑class,
    suburban household near Seattle, she was immersed in a community that prized self‑reliance, environmental consciousness, and civic participation. Her upbringing emphasized church‑based service, outdoor
    recreation, and a strong commitment to public education. Living now in Bellingham, she embraces the region’s culture of sustainability, progressive social values, and close‑knit community networks,
    while also honoring the legacy of Indigenous peoples of the area through respectful engagement and support of local cultural initiatives.
attributes:
  skills: '["Statistical Modeling", "Predictive Analytics", "Python Programming", "R Programming", "SQL", "GIS Data Analysis", "Environmental Data Analysis", "Data Visualization (Tableau, PowerBI)", "Technical
    Report Writing", "Teaching & Mentoring", "Workshop Facilitation", "Community Outreach", "Grant Writing", "Project Coordination", "Interdisciplinary Collaboration"]'
  hobbies: '["Hiking", "Kayaking", "Trail Running", "Book Club", "Volunteer Math Tutoring", "Hosting Game Nights", "Cooking (seasonal/locally sourced)", "Gardening", "Nature Photography", "Live Music Concerts"]'
  career_goals: Andrea aims to leverage her quantitative expertise to lead a regional data‑driven sustainability initiative that supports environmental stewardship and community resilience in Whatcom County.
    She aspires to secure a senior leadership role—such as Director of Data Science at a nonprofit or research institute—where she can design and implement predictive models for water‑quality monitoring,
    renewable‑energy planning, and climate‑impact assessments. A parallel ambition is to expand mentorship programs for women and underrepresented groups in STEM, creating scholarships, workshops, and outreach
    events that demystify mathematics and data science. She also hopes to publish interdisciplinary research that bridges rigorous mathematical methods with practical policy solutions, thereby influencing
    state and local decision‑making.
