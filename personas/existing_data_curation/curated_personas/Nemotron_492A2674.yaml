  hobbies: '[''drawing and coloring'', ''clay and sand play'', ''block building'', ''listening to music and storybooks'', ''nature walks and leaf collecting'', ''water play'', ''quiet reading of picture
    books'']'
  career_goals: Even at her young age Joann imagines future roles that blend creativity and learning. She often says she wants to become a teacher who shares books and art, an artist who paints bright pictures,
    a scientist who explores nature with a magnifying glass, or a veterinarian who helps animals. Her ambitions reflect a desire for flexibility, curiosity, and the ability to express herself through caring
    and imaginative work.
