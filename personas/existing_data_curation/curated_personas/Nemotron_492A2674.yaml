personas:
  professional: Joann Puckett, a budding sandbox architect who spends afternoons constructing elaborate sandcastles with driftwood and shells, they channel their innate curiosity into experimenting with
    shape and texture while embracing a relaxed, sometimes chaotic approach that results in charmingly disorganized masterpieces.
  sports: Joann Puckett, a tiny teammate in the Little Stars Soccer Club (U‑4) and the Tiny T‑Ball League affiliated with the River City Raptors, they delight in chasing a soft ball during scheduled park
    sessions, occasionally cheer on the Seattle Mariners on weekends, while preferring the quiet corner of the playground and often feeling uneasy when a game ends in a loss, reflecting both cooperative
    play and assertive bursts of energy.
  arts: Joann Puckett, an enthusiastic little artist who spends hours finger‑painting with Crayola colors and humming The Beatles’ 'Yellow Submarine' while leafing through Eric Carle’s picture books, they
    find solace in the gentle rhythms of Sesame Street and the bright worlds of Pixar’s Toy Story, showing a deep appreciation for varied creative experiences despite occasional shyness in group art classes.
  travel: Joann Puckett, a curious explorer who has visited the local zoo, splashed on the sandy shores of a nearby beach, and experienced the wonder of Disney World with their family, they eagerly plan
    short car trips to grandparents’ farm and dream of seeing the Eiffel Tower someday, preferring relaxed, flexible itineraries over rigid schedules, though they sometimes worry about unfamiliar crowds.
  culinary: Joann Puckett, a picky yet adventurous eater who adores creamy macaroni and cheese, mini cheese pizzas sprinkled with mozzarella, banana slices, strawberry‑yogurt parfaits, and crunchy chicken
    nuggets, they proudly help stir pancake batter with a plastic spoon and eagerly request extra ketchup, while steadfastly refusing broccoli and peas despite gentle encouragement.
  core: Joann Puckett, a curious three‑year‑old who oscillates between building whimsical sandcastles and fretting over spilled juice, finds comfort in crayons, piggy banks, and bedtime stories while navigating
    a world of gentle anxieties and spontaneous play.
background:
  cultural: Joann is raised in a White American family in Colton, California, a suburb of Riverside County known for its mix of suburban and agricultural influences. Her family participates in typical American
    holidays and community events, and she attends a multicultural preschool where she interacts with peers from diverse backgrounds. Frequent visits to local museums, art centers, and nearby natural parks
    expose her to a variety of cultural experiences while grounding her in the regional heritage of Southern California.
attributes:
