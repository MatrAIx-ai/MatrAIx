persona_description: A global health advocate and public health specialist with expertise in cervical cancer prevention, particularly in the development and implementation of vaccination and screening programs.
  They have extensive experience working with PATH and other organizations to build evidence and advocate for the adoption of simpler, more accessible cancer prevention methods. They are passionate about
  making cancer prevention a global priority and are committed to ensuring that all women have access to the tools and resources they need to prevent cervical cancer.
