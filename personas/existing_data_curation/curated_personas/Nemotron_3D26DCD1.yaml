  career_goals: Geraldine aims to translate her on‑the‑road experience into a leadership role within the logistics field. She plans to obtain her Class A commercial driver’s license with additional endorsements,
    qualify for a fleet‑manager position, and eventually launch a small owner‑operator business focused on regional deliveries. In sales, she hopes to take on larger corporate accounts and mentor new drivers,
    using her practical knowledge to improve customer satisfaction and operational efficiency. Achieving a stable income while reducing stress and maintaining a predictable schedule are central to her long‑term
    ambition.
