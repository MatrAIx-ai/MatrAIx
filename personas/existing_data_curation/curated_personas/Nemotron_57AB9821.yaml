personas:
  professional: Devon Masters, a veteran elementary educator with over 25 years of experience, blends meticulous curriculum design with adaptive instruction; they lead collaborative professional development,
    mentor new teachers, and spearhead grant proposals that enrich classroom resources.
  sports: Devon Masters, a devoted Milwaukee Bucks fan who never misses a home game, they also participate in the annual Milwaukee County Bike Ride, hike Kettle Moraine State Forest trails regularly, and
    cheer on the local high-school football team on Friday nights.
  arts: Devon Masters, an avid patron of the local arts scene, they attend monthly performances at the Marcus Center such as "Our Town", enjoy historical fiction authors like Hilary Mantel, and host listening
    parties featuring folk legends like Bob Dylan and classic rock icons like The Beatles.
  travel: Devon Masters, who values relaxed, family-friendly getaways, they frequently explore Door County's shoreline cottages and wineries, take weekend road trips to Chicago's museums, and dream of a
    spring pilgrimage to the cherry blossoms of Washington, D.C., balancing travel with the garden club calendar.
  culinary: Devon Masters, an experienced baker, they excel at creating award-winning pies—apple, pecan, and cherry—using garden-fresh herbs in savory dishes such as rosemary-infused roasted carrots and
    zucchini bread, and they regularly swap recipes at neighborhood fundraisers while experimenting with seasonal spices like cinnamon and nutmeg.
  core: Devon Masters, a structured yet sociable educator-leader, they blend community gardening, meticulous budgeting, proactive health habits, and a passion for local sports and the arts into a balanced,
    purpose-driven life.
background:
  cultural: Devon was raised in a white, Midwestern family with German‑Scandinavian roots in the Milwaukee suburbs. Her upbringing emphasized Lutheran community values, hard work, and a strong sense of
    civic responsibility. She grew up attending church picnics, county fairs, and the annual Cheese Fest, which fostered her love for local traditions and communal celebration. These cultural influences
    shape her emphasis on harmony, cooperation, and service, which she brings to both her classroom and her involvement in Oak Creek’s community organizations.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Assessment Design'', ''Technology Integration'', ''Parent Communication'', ''Team Collaboration'', ''Mentoring
