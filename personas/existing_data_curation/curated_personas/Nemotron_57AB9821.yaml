  hobbies: '[''Community Gardening'', ''Historical Fiction Book Club'', ''Volunteering at Senior Center'', ''Hiking in Kettle Moraine State Forest'', ''Baking and Sharing Pies'', ''Attending Milwaukee Bucks
    Games'', ''Participating in Community Theater'']'
  career_goals: Devon aims to transition into a district instructional coordinator role where she can shape curricula across multiple schools and champion inclusive education practices. Over the next five
    years she hopes to earn an administrator certification, become an assistant principal, and eventually pursue a principalship. She also intends to expand her impact by serving on the Oak Creek School
    Board and leading community‑based adult education programs that bridge school resources with local families.
