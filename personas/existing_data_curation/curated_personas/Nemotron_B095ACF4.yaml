  career_goals: Jeffrey hopes to turn his love of building and coding into a future career in robotics or video‑game design. He plans to join his school’s robotics club, compete in regional contests, and
    eventually pursue a STEM‑focused high‑school program that leads to a degree in computer engineering or mechanical engineering. At the same time, he is open to roles that let him work hands‑on in the
    community, such as a park ranger or a firefighter, because he enjoys practical problem‑solving and helping others.
