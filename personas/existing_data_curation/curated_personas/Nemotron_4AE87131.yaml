  hobbies: '[''Reading mystery & sci‑fi novels'', ''Journaling'', ''Online chess'', ''Coding small games (Python)'', ''Hiking and beach walks'', ''Collecting seashells and rocks'', ''Listening to indie/alternative
    music'', ''DIY science experiments'']'
  career_goals: Emma aspires to become a software engineer, ideally focusing on educational technology that makes learning interactive and accessible for other teens. She dreams of winning regional science
    fairs and joining a high‑school robotics team, hoping these achievements will earn her a scholarship to a top STEM‑focused high school. While she occasionally imagines a career as a wildlife biologist,
    her current ambition leans toward creating apps that solve real‑world problems, blending her curiosity with practical impact. She also hopes to develop strong study habits that balance her competitive
    drive with her tendency to feel stressed about obligations.
