personas:
  professional: Emma Humbert, a budding coder who creates tiny Python games after school, channels her love of strategy from chess and curiosity for sci‑fi narratives into problem‑solving projects, while
    their relaxed attitude toward deadlines lets them experiment freely.
  sports: Emma Humbert joins the local teen hiking club for weekend treks through Atlantic County parks and plays forward on a community soccer team, cheering loudly for the New York Giants and New Jersey
    Devils during televised games.
  arts: Emma Humbert curates indie playlists featuring Tame Impala, Arctic Monkeys, and Phoebe Bridgers while sketching cityscapes and devouring mystery novels by Agatha Christie and sci‑fi epics from Neil Gaiman,
    a blend that fuels their creative outlet and quiet evenings.
  travel: Emma Humbert spends spring break exploring the Cape May lighthouse and the Atlantic City boardwalk, dreams of backpacking through Scotland’s coastal cliffs, and prefers spontaneous day trips over
    elaborate vacations due to their modest family budget.
  culinary: Emma Humbert loves pepperoni pizza and homemade mac and cheese, experiments with simple sea‑salt‑caramel brownies, and occasionally blends banana‑spinach smoothies, boasting basic kitchen skills
    but a relentless curiosity for DIY cooking kits.
  core: Emma Humbert is a curious, slightly anxious teen who late‑nights reading sci‑fi, builds Python games, and hoards seashells while juggling a cautious spending habit.
background:
  cultural: Emma is a White American raised in a middle‑class family in Egg Harbor City, New Jersey. Her ancestry includes Irish and German roots, and her family celebrates typical American holidays such
    as Thanksgiving, Christmas, and the Fourth of July, often with extended family gatherings. Proximity to the Atlantic coast means beach trips and participation in local community events like the Atlantic
    County Fair are regular parts of her upbringing. She attends a public middle school, is involved in a small church youth group, and values education, independence, and community responsibility. The
    diverse suburban environment has given her exposure to a range of cultures, though her household maintains traditional suburban American values.
attributes:
  skills: '[''Basic Python programming'', ''Research and information synthesis'', ''Critical reading and analysis'', ''Strategic board gaming (chess)'', ''Digital photography'', ''Video editing (basic)'',
