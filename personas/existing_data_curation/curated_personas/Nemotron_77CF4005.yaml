personas:
  professional: James Wilson is a budding junior naturalist who spends weekends exploring the woods, drawing insects, cataloguing rocks, and helping with farm chores, blending boundless curiosity with practical
    responsibility that foreshadows a future in science.
  sports: James Wilson dashes through Saturday morning practices with the Willow Creek Kids Soccer Club, idolizing Lionel Messi’s dribbling, and revels in spontaneous games of tag and hide‑and‑seek, bringing
    boundless energy, teamwork, and a love of competition to every match.
  arts: James Wilson fills sketchbooks with detailed drawings of birds, squirrels, and farm animals, sings along to folk tunes by Pete Seeger and the playful melodies of The Wiggles, and enjoys watching
    Pixar’s “Finding Nemo,” shaping a vivid artistic identity.
  travel: James Wilson’s family road‑trip to the geysers of Yellowstone, a weekend camping stay at Lake Willow, and yearly visits to the state agricultural fair feed their love of outdoor exploration and
    short, family‑focused adventures.
  culinary: James Wilson favors chicken nuggets, mac‑and‑cheese, apple slices, and carrot sticks, proudly bakes simple sugar cookies with mom, yet occasionally throws a tantrum when faced with broccoli
    or Brussels sprouts, reflecting a selective palate.
  core: James Wilson is a six‑year‑old explorer‑engineer who transforms farm chores into mini‑adventures, balances curiosity with responsibility, hoards LEGO bricks, and sometimes forgets to brush teeth
    after snacks.
background:
  cultural: James was raised in Edmonton, a small, close‑knit community in Metcalfe County, Kentucky, within a predominantly white, Southern‑rural environment. His family attends a local Baptist church,
    participates in community gatherings such as county fairs, church picnics, and neighborhood potlucks, and values hospitality, politeness, and cooperation. He is exposed to country music, southern cuisine,
    and traditions like fishing trips and seasonal hunting outings, while also receiving modern influences through school activities and media.
