  career_goals: Roger aims to double his company’s revenue within five years while expanding into adjacent markets across the Southwest. He is focused on embedding sustainable practices throughout operations
    and building a robust succession plan by mentoring two rising executives to take on senior leadership roles. A key ambition is launching a corporate‑social‑responsibility program that supports local
    youth entrepreneurship, reflecting his desire to give back to the San Antonio community. Personally, he seeks a better work‑life balance to reduce stress by delegating more responsibilities and adopting
    flexible management structures. Looking ahead, he envisions transitioning to a board advisory role within the next decade, ensuring the company remains financially healthy and culturally resilient.
