persona_description: A historian who specializes in the study of Newfoundland and Labrador's history, particularly the events leading up to and following the province's union with Canada in 1949. This person
  is interested in the political, social, and economic aspects of the period, and has a keen interest in the role of key figures such as Joseph Smallwood, Gordon Bradley, and Philip Gruchy in the process.
  They are also interested in the personal experiences of those involved in the events, and how they have shaped the province's history.
