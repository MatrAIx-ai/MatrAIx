personas:
  professional: Steven Lucas is an aspiring mechanical engineer who channels their love for structure and practical problem‑solving into intricate LEGO gear builds, using strong spatial reasoning and patient
    attention to detail, yet their relaxed approach to obligations sometimes leaves pieces scattered and plans loosely organized.
  sports: Steven Lucas plays on the local youth soccer club, enjoys weekend bike rides on nearby nature trails, and rallies behind the Chicago Cubs as their favorite professional baseball team, balancing
    structured team practice with spontaneous outdoor exploration.
  arts: Steven Lucas fills sketchbooks with detailed wildlife drawings inspired by John James Audubon, listens to Studio Ghibli soundtracks while building LEGO creations, and draws energy from the pop‑rock
    anthems of Imagine Dragons during creative sessions.
  travel: Steven Lucas prefers short, well‑planned family trips, has explored Yellowstone National Park and Disneyland, and dreams of wandering Kyoto’s bamboo forest and snorkeling the Great Barrier Reef,
    always mapping out itineraries that blend nature exploration with a touch of adventure.
  culinary: Steven Lucas loves homemade pepperoni pizza with extra mozzarella, whips up banana‑strawberry smoothies using fresh berries from the community garden, can assemble a basic grilled cheese, yet
    often forgets to clean the kitchen counters after cooking.
  core: Steven Lucas is a quietly ambitious LEGO architect whose love for nature and sketching soothes an anxious mind, yet their habit of leaving scattered bricks behind reveals a playful disorganization.
background:
  cultural: Steven grew up in Milwaukee, Wisconsin, a Midwestern city with strong German-Scandinavian roots and a reputation for community involvement. His family celebrates traditional holidays such as
    Thanksgiving, Christmas, and the Fourth of July with typical Midwestern customs, including backyard barbecues and local sports fandom for the Brewers and Badgers. He has been exposed to Milwaukee’s
    vibrant cultural scene, like Summerfest and the city’s diverse neighborhoods, which have introduced him to a variety of foods and community events. His upbringing reflects a predominantly white, middle-class
    environment that values education, modesty, cooperation, and respect for others.
