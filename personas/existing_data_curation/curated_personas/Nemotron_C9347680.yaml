  career_goals: Steven dreams of a future where he can combine his love for animals and his interest in technology. He hopes to become a veterinarian or a wildlife rehabilitator, caring for injured animals
    and promoting their health. At the same time, he is fascinated by creating educational video games, so he also imagines studying computer science to develop structured, supportive learning tools for
    other kids. He plans to attend a high school with strong science and STEM programs, aiming to pursue a career that balances practical, predictable work with helping others.
