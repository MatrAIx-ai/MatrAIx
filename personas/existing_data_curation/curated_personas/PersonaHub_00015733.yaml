persona_description: An economist who is interested in the history and development of economic thought, particularly those who were part of the economic debates of the 20th century. They are familiar with
  the works of Hayek and are interested in his contributions to the field. They are also interested in the failures of Keynesian prescriptions and the fall of the Soviet Union, and are intrigued by Hayek's
  insights into those who were part of the economic debate of the 20th century. They are intrigued by Hayek's realization that the complexity of human affairs and responses doomed what he called "the fatal
  conceit of socialism—the attempt to design and control the destiny of societies," and are interested in his influential book "The Road to Serfdom."
