  hobbies: '[''Painting'', ''Poetry writing'', ''Reading contemporary literature'', ''Theater attendance'', ''Gardening'', ''Coastal hiking'', ''Local history research'', ''Traveling to art museums'', ''Community
    theater volunteering'', ''Improvisational comedy classes'', ''Bridge'', ''Hosting dinner parties'']'
  career_goals: Frances aims to expand her impact by launching a regional "Spiritual Arts Festival" that showcases collaborations between artists and faith communities across Rhode Island. She aspires to
    develop interfaith youth mentorship programs, secure a director‑level position overseeing community outreach within her religious organization, and publish a memoir‑guide on integrating creativity with
    spiritual practice. Additionally, she seeks to mentor emerging religious leaders and foster partnerships with local cultural institutions to enrich the region’s spiritual and artistic life.
