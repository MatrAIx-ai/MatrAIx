personas:
  professional: Inez Haigler is a teaching assistant who expertly blends classroom organization, educational technology integration, and hands‑on science lab safety, channeling their curiosity and calm
    under pressure to streamline lessons and mentor students while preparing for a future as a certified elementary STEM teacher.
  sports: Inez Haigler hikes the Appalachian Trail regularly, participates in a local adult walking club, supports the Nashville Predators and Tennessee Volunteers, and attends the annual Smoky Mountain
    5 K, balancing solitary trek workouts with community‑oriented fitness events.
  arts: Inez Haigler finds creative outlet in crocheting geometric blankets, crafting simple wooden stools, and immerses themselves in Southern folk music, especially the sounds of Gillian Welch and Johnny
    Cash, while attending intimate performances at the local Tennessee Repertory Theatre and reading works by Doris Kearns Goodwin and popular science author Neil deGrasse Tyson.
  travel: Inez Haigler prefers low‑key weekend getaways to natural destinations like the Great Smoky Mountains, Shenandoah National Park, and the Blue Ridge Parkway, meticulously planning trail routes and
    campsite logistics, yet dreams of a solo trek through the Pacific Crest Trail and a cultural immersion week in New Orleans' music scene.
  culinary: Inez Haigler enjoys cooking with garden harvests, often preparing southern staples such as collard greens with smoked turkey, sweet‑potato biscuits, and pecan pie, while experimenting with herb‑infused
    teas featuring mint and lemon balm, reflecting a moderate skill level and a preference for hearty, home‑grown flavors.
  core: Inez Haigler balances a methodical, nature‑driven lifestyle with a quiet determination, channeling curiosity into teaching, budgeting, and crafting, all while maintaining a calm, solitary demeanor
    and a penchant for meticulous planning.
background:
  cultural: Inez grew up in a modest, middle‑class family in East Tennessee, steeped in the region's Appalachian heritage and Southern hospitality. Her family has deep roots in the area, with generations
    who worked in local industries and valued self‑reliance, community service, and church involvement. The proximity to Oak Ridge National Laboratory exposed her to a unique blend of traditional Southern
    culture and a scientific, forward‑thinking environment, fostering an appreciation for both heritage and innovation. She identifies with the values of modesty, perseverance, and a strong work ethic,
    while also embracing curiosity about the wider world.
attributes:
  skills: '[''Classroom Management'', ''Instructional Support'', ''Educational Technology Integration'', ''Data Entry and Record Keeping'', ''Student Tutoring'', ''Laboratory Safety Procedures'', ''Special
    Education Assistance'', ''Conflict Resolution'', ''Small‑Group Facilitation'', ''Curriculum Material Preparation'']'
  hobbies: '[''Hiking'', ''Gardening'', ''Puzzle Solving'', ''Woodworking'', ''Reading Non‑Fiction (History & Science)'', ''Volunteer Literacy Tutoring'', ''Crochet Group'']'
  career_goals: Inez aims to transition from a teaching assistant to a fully certified elementary teacher within the next three years, planning to complete an associate degree in education followed by a
    state teaching credential. She is interested in specializing in STEM education, leveraging her experience with lab safety and technology to design hands‑on science modules. Long‑term, she hopes to take
    on a mentorship role for new teaching assistants, contribute to curriculum development at her school, and perhaps lead an after‑school STEM enrichment program for local youth.
