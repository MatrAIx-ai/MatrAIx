persona_description: This text is likely to be read by occupational health professionals, ergonomists, and workers who are interested in preventing work-related musculoskeletal disorders (MSDs) and improving
  workplace ergonomics. The course covers the causes of MSDs, the importance of ergonomics and training, and provides practical resources for participants in employee training sessions. The course is designed
  for managers, supervisors, workers, employees working from home, occupational health nurses, occupational therapists, chiropractors, health and safety representatives, and health and safety professionals.
  The course is delivered as an online e-learning course and is unique in that it is developed by subject specialists in the field and reviewed by representatives from labour, employers, and government
  to ensure the content and approach are unbiased and credible.
