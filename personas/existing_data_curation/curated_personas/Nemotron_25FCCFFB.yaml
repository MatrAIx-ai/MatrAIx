  hobbies: '[''Knitting'', ''Gardening'', ''Reading classic literature'', ''Walking along the river'', ''Birdwatching'', ''Small book club meetings'', ''Baking traditional recipes'', ''Attending local craft
    fairs'']'
  career_goals: As she approaches retirement, Sonya aims to leave a lasting legacy by mentoring newly certified teachers, establishing a community early‑literacy program in Wilmington, and authoring a guidebook
    that blends routine‑based teaching with gentle spontaneity. She also hopes to serve as a part‑time educational consultant for local preschools, helping them create nurturing environments while she works
    on personal stress‑management techniques to maintain her well‑being.
