  career_goals: Pedro aims to transition from a general administrative support role into a senior operations or program management position within a cultural institution such as a museum, gallery, or arts
    nonprofit. Over the next three years, he plans to enroll in a Master’s program in Museum Studies or Arts Administration to deepen his expertise in cultural management. His ambition is to lead initiatives
    that showcase Ecuadorian and broader Latin American contemporary art in New York, develop community‑engagement programs, and implement efficiency‑driven processes that elevate the institution’s impact
    while maintaining high standards of excellence.
