personas:
  professional: Pedro Perales is a bilingual operations specialist who leverages meticulous office management skills, art history knowledge, and digital content curation to streamline museum workflows,
    consistently applying bullet‑journal precision and a calm, achievement‑driven mindset toward senior program management ambitions.
  sports: Pedro Perales enjoys a balanced fitness routine that includes sunrise yoga at a community studio, weekend runs through Central Park, and cheering for the New York Knicks and New York City FC,
    while occasionally joining a local amateur soccer league to stay active.
  arts: Pedro Perales immerses themselves in the arts by frequenting MoMA and the Whitney, photographing street‑art works by Banksy and Shepard Fairey, curating a personal digital collection of contemporary
    works by Tania Bruguera, and devouring novels by Jorge Luis Borges and philosophical essays by Slavoj Žižek, all of which shape their creative outlook.
  travel: Pedro Perales plans travel with meticulous itineraries, favoring culturally rich city trips like Barcelona’s modernist architecture, Buenos Aires’ tango scene, and a future pilgrimage to Machu
    Picchu, while balancing a modest budget that prioritizes immersive experiences over luxury accommodations.
  culinary: Pedro Perales delights in preparing seafood ceviche with lime and cilantro, a hearty bean stew fanesca featuring pumpkin and cheese, and a coconut‑milk encocado fish dish served with fried plantains,
    showcasing a skillful yet experimental kitchen approach that blends fresh market ingredients with traditional techniques.
  core: Pedro Perales is a calm, curiosity‑driven organizer who merges meticulous operational expertise with a vibrant love for art, cuisine, and cultural exploration, all while maintaining disciplined
    finances and a gentle, resilient demeanor.
background:
  cultural: Pedro’s cultural foundation is deeply rooted in Ecuadorian tradition. Growing up in a bilingual household, he celebrated Andean festivals, listened to folk music such as pasillo and sanjuanito,
    and learned the culinary arts of his family, mastering dishes like ceviche, hornado, and fanesca. The values of community, hospitality, and respect for cultural heritage were emphasized throughout his
    upbringing. After moving to New York, Pedro integrated these roots with the city’s multicultural tapestry, actively participating in the local Latino community, attending events hosted by the Ecuadorian
    consulate, and infusing Andean motifs into his artistic and design pursuits. His dual exposure to Ecuadorian heritage and the diverse artistic landscape of New York informs his worldview, creative interests,
    and professional aspirations.
