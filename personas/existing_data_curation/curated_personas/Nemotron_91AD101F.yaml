personas:
  professional: An interior designer named Frances Tai, 38, blends solid interior design fundamentals with project management savvy and a flair for sustainable, biophilic spaces; they wield AutoCAD, SketchUp,
    and Revit to deliver meticulous specifications, negotiate confidently with vendors, and harmonize regional Appalachian craftsmanship with modern aesthetics, all while thriving on client interaction
    and collaborative presentations.
  sports: An outdoor‑enthusiast named Frances Tai, 38, spends weekends hiking the Blue Ridge Mountains with the local Appalachian Trail Club, follows Asheville City SC soccer and plays in the Asheville
    Baseline softball league, and incorporates weekly yoga flows into their routine to balance strength and flexibility.
  arts: A culturally immersed art aficionado named Frances Tai, 38, frequents Southeast galleries like the High Museum of Art and Asheville Art Museum, sketches installation concepts after evenings with
    works by Yayoi Kusama and Georgia O'Keeffe, participates in community theater as both performer and set designer, and draws inspiration from regional folk artisans for their interior projects.
  travel: A moderately adventurous traveler named Frances Tai, 38, blends meticulous planning with spontaneous detours, often weekend‑hopping to nearby cities such as Asheville, Charleston, and Nashville,
    while dreaming of a design‑focused retreat in the Azores and a guided tour of the European Alps to study mountain‑lodge architecture.
  culinary: A culinary experimenter named Frances Tai, 38, cultivates a small herb garden to flavor dishes like sage‑infused mushroom risotto and heirloom tomato salad, enjoys cooking farm‑to‑table meals
    for dinner parties, and possesses a solid intermediate skill level, though they sometimes over‑season in an effort to impress.
  core: Frances Tai, 38, is a sociable, detail‑driven interior designer who balances meticulous project planning with vibrant artistic indulgences, a love for mountain hikes, and a penchant for occasionally
    splurging on luxe lighting, all while nurturing a sustainable, regionally rooted design philosophy.
background:
  cultural: Frances grew up in a small town in the foothills of western North Carolina, surrounded by the Appalachian cultural heritage typical of white Southern families. Her upbringing emphasized hospitality,
    community involvement, and a deep appreciation for local crafts such as pottery, woodworking, and quilting. The region’s blend of rugged natural beauty and historic folk art shaped her aesthetic sensibility,
    fostering a love for integrating regional materials and narratives into contemporary interior design. As a divorced single professional, she values independence while maintaining strong ties to her
    extended family and the local arts community.
attributes:
  skills: '["Space planning", "Color theory", "Materials sourcing", "Sustainable design", "Biophilic design", "AutoCAD", "SketchUp", "Revit", "Project management", "Budgeting", "Client presentation", "Vendor
