  hobbies: '["Visiting art galleries", "Sketching", "Hiking", "Nature photography", "Community theater", "Hosting dinner parties", "Yoga", "Herb gardening", "Writing design blog articles"]'
  career_goals: Frances aims to launch her own boutique interior design studio in the Asheville–Hendersonville region within the next three years, with a focus on sustainable, locally sourced projects that
    celebrate Appalachian craftsmanship. She plans to become a LEED‑Accredited Professional, expand her portfolio to include hospitality design for boutique hotels and farm‑to‑table restaurants, and author
    a book on integrating regional art into modern interiors. Speaking at design conferences, teaching workshops for emerging designers, and building a strong online community around her design philosophy
    are also key ambitions.
