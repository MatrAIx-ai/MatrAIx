persona_description: A researcher interested in the comparative neuroanatomy of terrestrial versus aquatic crabs, particularly the Coenobitidae family. This individual has a keen interest in the olfactory
  systems of terrestrial crustaceans, including the robust anatomy of the olfactory lobe in C. clypeatus, and seeks to understand the evolutionary adaptations that have evolved in this group. This person
  is likely to be interested in the molecular and cellular mechanisms underlying olfactory processing in terrestrial crustaceans and the implications of these adaptations for their ability to navigate and
  survive in their terrestrial habitats.
