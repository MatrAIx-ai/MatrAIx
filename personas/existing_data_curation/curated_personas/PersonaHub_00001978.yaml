persona_description: A planner or sustainability professional who specializes in developing sustainable neighborhoods and districts, focusing on the integration of various environmental and social goals
  within the context of existing neighborhood character and community needs. They are skilled in analyzing existing conditions and potential development, and have experience working with community engagement
  and public-private partnerships to achieve sustainable outcomes. They are also familiar with the principles of Eco-Districts and the strategies for supporting eco-friendly behavior and promoting sustainable
  development on the neighborhood scale.
