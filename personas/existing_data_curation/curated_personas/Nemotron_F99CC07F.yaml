    Project Management'', ''Instructional Design for E‑learning'']'
  hobbies: '[''Digital illustration'', ''Photography editing'', ''Journaling'', ''Reading design theory'', ''Reading contemporary fiction'', ''Yoga'', ''Mindfulness meditation'', ''Tai chi'', ''Vegetable
    gardening'', ''Cooking Texan cuisine'', ''Book club'', ''Board‑game nights'', ''Volunteering to teach web design'']'
  career_goals: Stefanie aims to become a lead design strategist or design director within an edtech company, shaping the learning experience through innovative digital products. She plans to deepen her
    front‑end development skills to bridge design and engineering, eventually overseeing end‑to‑end product development. Over the next five years she hopes to launch a mentorship program for junior designers
    and introduce a proprietary design system that emphasizes accessibility. She also aspires to speak at small industry meetups, contribute articles on the intersection of education and UI/UX, and maintain
    a balanced workload that supports her mental well‑being.
