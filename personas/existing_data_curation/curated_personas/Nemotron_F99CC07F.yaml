personas:
  professional: A meticulous UI/UX design strategist with a knack for accessibility, Stefanie Baltzell leverages their organized, curiosity‑driven mindset, and they consistently assert their vision in small‑group
    settings while leading cross‑functional agile teams to craft user‑centered e‑learning platforms.
  sports: A low‑key fitness enthusiast, Stefanie Baltzell follows the Dallas Cowboys and Austin FC, attends weekly tai chi classes at a neighborhood community center, and they squeeze in sunrise jogs along
    Lady Bird Lake when the Texas heat allows.
  arts: A solitary creative mind, Stefanie Baltzell spends evenings illustrating in Procreate while listening to Sufjan Stevens, flips through graphic novels by Marjane Satrapi, and they discuss contemporary
    fiction by Chimamanda Ngozi Adichie at their local book club.
  travel: A meticulously planned traveler, Stefanie Baltzell favors short, solo retreats to places like Kyoto’s zen gardens and the Texas Hill Country’s vineyards, while they dream of a literary pilgrimage
    to Edinburgh’s Festival, balancing limited vacation days with a desire for quiet cultural immersion.
  culinary: An inventive home chef, Stefanie Baltzell cultivates heirloom tomatoes and roasted squash in their garden, then transforms them into Texan‑inspired dishes like smoky brisket tacos topped with
    fresh pico de gallo and jalapeño‑infused cornbread, and they relish the process as a meditative close‑of‑day ritual.
  core: Stefanie Baltzell, a precision‑obsessed design strategist with a quiet anxiety‑driven habit of double‑checking every pixel, finds solace in solitary illustration and relentless to‑do lists, while
    they occasionally neglect sleep for late‑night code tinkering.
background:
  cultural: Stefanie was raised in a middle‑class, suburban Texas family with deep roots in the Southern United States. Her upbringing blended traditional Southern values—courtesy, community, and a strong
    work ethic—with a progressive emphasis on education and lifelong learning. Growing up near Houston exposed her to a multicultural environment, fostering an appreciation for diversity while retaining
    a sense of Texan identity. This background informs her preference for small‑group interactions, organized approach to tasks, and her commitment to creating inclusive, accessible digital experiences.
