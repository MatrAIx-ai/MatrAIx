personas:
  professional: Stefania Sosa, an aspiring young engineer, channels her curiosity and practicality into building intricate LEGO Mindstorms robots, often trading ideas on online forums while they balance
    school projects with a love of video-game strategy.
  sports: Stefania Sosa, a member of her elementary soccer club and avid fan of the Las Vegas Golden Knights, spends weekends hiking the Red Rock Canyon trails, they combine their competitive spirit with
    a love for outdoor adventure, and occasionally join a local chess club that treats strategic thinking as a sport.
  arts: Stefania Sosa, a fervent folklorico dancer who rehearses for community Día de los Muertos events, draws inspiration from sci-fi authors like Isaac Asimov and enjoys listening to pop icons such as
    Selena Gomez, they weave cultural rhythm with contemporary pop culture into their creative downtime.
  travel: Stefania Sosa, who dreams of exploring the ancient ruins of Teotihuacan after family trips to nearby national parks like Zion, favors spontaneous road trips with her parents over meticulously
    planned vacations, they balance a love for desert hikes with a budding curiosity for historic cities.
  culinary: Stefania Sosa, who eagerly assists in preparing homemade tacos al pastor and tamale dough, has mastered the art of rolling perfect tortilla shells, loves the zest of fresh cilantro and lime,
    and they occasionally experiment by adding a touch of LED-lit sugar cubes to their desserts, blending traditional flavors with a tech-savvy twist.
  core: Stefania Sosa, a curious and competitive 11-year-old who balances spontaneous LEGO inventions with a love for desert hikes, they thrive on blending cultural traditions with modern tech, even if
    organization sometimes slips.
background:
  cultural: Stefania comes from a Mexican‑American family in Las Vegas, where Spanish is spoken at home and Mexican traditions are celebrated, such as Día de los Muertos, quinceañera preparations, and family
    gatherings centered around homemade tacos and tamales. Her parents emphasize the importance of education and cultural pride, encouraging her to be fluent in both languages. Living in the multicultural
    environment of Las Vegas, she also engages with a broad range of American customs, attends a local public middle school with diverse peers, and participates in community events that blend Mexican heritage
    with the city’s vibrant, eclectic culture.
