  career_goals: Stefania aspires to turn her love of technology and problem‑solving into a career in engineering or video‑game design. She dreams of leading her school’s robotics team to win a state competition
    and later earning a scholarship to study computer science or mechanical engineering. Her long‑term ambition is to become a robotics engineer or game developer who creates innovative, culturally inclusive
    products, using her bilingual background to reach diverse audiences while maintaining a focus on practical, user‑friendly solutions.
