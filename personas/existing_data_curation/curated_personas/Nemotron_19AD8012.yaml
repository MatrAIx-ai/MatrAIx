  career_goals: Yolanda aims to move into a senior engineering leadership role where she can shape product strategy and drive digital transformation for midsized enterprises. Over the next five years she
    plans to become a Technical Director or VP of Engineering, leveraging her business background to lead product development from conception through market launch. She also aspires to mentor emerging developers,
    champion inclusive team cultures, and eventually launch her own consultancy focused on integrating business process automation and cloud solutions for regional businesses.
