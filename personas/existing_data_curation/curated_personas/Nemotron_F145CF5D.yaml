personas:
  professional: Brad Goddard is a senior executive who blends strategic vision with hands‑on problem solving, using their STEM fluency and calm resilience to steer boardrooms, negotiate partnerships, and
    cultivate collaborative cultures while staying relaxed about strict schedules.
  sports: Brad Goddard captains a weekend sailing crew on the Potomac, plays 18‑hole rounds at Congressional Country Club, cheers for the Washington Capitals and Washington Nationals, and hikes the Shenandoah
    trails with a small group of adventure‑oriented colleagues.
  arts: Brad Goddard frequents Washington’s live‑music scene at venues like Blues Alley and the 9:30 Club, attends National Gallery exhibitions featuring artists such as Kehinde Wiley, and enjoys performances
    at the Kennedy Center starring Yo‑Yo Ma and contemporary theater productions like Hamilton.
  travel: Brad Goddard and their spouse favor culturally rich itineraries, having explored Tuscany’s vineyards, Kyoto’s temples, and the historic streets of Prague, while also planning relaxed escapes to
    Napa Valley and the Blue Ridge Mountains, they always leave room for spontaneous detours.
  culinary: Brad Goddard hosts wine‑pairing dinner parties featuring Cabernet‑marinated ribeye, Pinot Noir‑glazed salmon, and coq au vin, enjoys crafting sushi rolls with tuna and avocado at home, and delights
    in sourcing fresh rosemary, thyme, and truffle oil for culinary experiments.
  core: Brad Goddard blends a relaxed, sociable charisma with a disciplined, data‑driven mind, navigating leadership, finance, and leisure with calm resilience, occasional disorganization, and a penchant
    for fine wine and spontaneous adventures.
background:
  cultural: Brad grew up in suburban Maryland, part of a multigenerational white American family with roots tracing back to Anglo‑Celtic and Central European ancestors. The Mid‑Atlantic environment exposed
    him to a mix of political, cultural, and academic influences, fostering a pragmatic yet curious outlook. He embraces traditional American holidays while also appreciating the diverse cultural events
    of the D.C. metro area. Community involvement, civic responsibility, and a commitment to personal liberty shape his values, and his upbringing emphasizes both self‑reliance and collaborative engagement.
