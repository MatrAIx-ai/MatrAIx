  career_goals: Brad aims to position his company as a benchmark for sustainable innovation, expanding into emerging markets while embedding robust ESG practices. He seeks to nurture the next generation
    of executives through formal mentorship programs and to solidify a legacy of resilient, people‑centric growth. Over the next five years, he plans to spearhead strategic acquisitions that complement
    the firm's technology portfolio, increase shareholder value, and enhance the firm’s reputation as a community leader. Eventually, he envisions transitioning to an advisory board role, focusing on philanthropy
    and supporting regional entrepreneurship initiatives.
