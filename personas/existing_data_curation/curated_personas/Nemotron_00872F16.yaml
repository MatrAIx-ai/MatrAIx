personas:
  professional: Linda Compton, a 29‑year‑old middle‑school teacher in McAllen, Texas, leverages meticulous lesson planning, differentiated instruction, and seamless integration of Google Classroom and interactive
    whiteboards to create engaging, standards‑aligned curricula, and they balance curiosity‑driven exploration with practical classroom management, asserting clear expectations while showing compassionate
    support for bilingual families.
  sports: Linda Compton, an avid hiker who trails the Rio Grande valley with the McAllen Trail Club and plays casual tennis at the Southwest Recreation Center, maintains a steady fitness regimen through
    weekend treks and weekly spin classes, and they passionately root for the Houston Astros in baseball and the Dallas Cowboys in football.
  arts: Linda Compton, a landscape photographer inspired by Ansel Adams and a devoted listener of Willie Nelson’s storytelling songs, spends evenings editing shots of the South Texas horizon while they
    attend monthly gallery openings at the McAllen Art Museum and occasionally volunteer as a photo mentor for a youth art program.
  travel: Linda Compton, a meticulous planner who prefers budget‑friendly road trips, has explored Big Bend National Park, the vibrant streets of Austin’s Sixth Street, and the historic plazas of Puebla,
    Mexico, and they dream of a cultural immersion in Rome’s ancient ruins, balancing adventure with a schedule that still allows weekend tutoring sessions.
  culinary: Linda Compton, a confident home cook with a thriving vegetable garden of cilantro, tomatoes, and jalapeños, crafts health‑focused Tex‑Mex dishes such as grilled chicken fajita bowls with cauliflower
    tortillas, avocado‑lime salsa, and roasted sweet‑potato enchiladas, while they occasionally over‑season a batch of guacamole in pursuit of bold flavor.
  core: Linda Compton, a curiosity‑driven yet methodical teacher who gardens, hikes, photographs landscapes, and perfects healthy Tex‑Mex meals, balances strict budgeting with occasional indulgences, and
    manages mild allergies while ambitiously pursuing leadership roles in education.
background:
  cultural: Linda is a white Texan of Anglo‑American descent who was raised in a modest, close‑knit community in central Texas, where self‑reliance and community service were emphasized. After moving to
    McAllen, a culturally rich border city, she has embraced the region’s bilingual atmosphere, developing an appreciation for Mexican traditions, cuisine, and the Spanish language while maintaining her
    own family’s traditions of celebrating American holidays such as Thanksgiving and the Fourth of July.
