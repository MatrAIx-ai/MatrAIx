  career_goals: Linda aims to complete an Associate of Arts in Teaching and then earn a Bachelor's degree in Education, followed by a Master's in Educational Leadership. She aspires to become a lead teacher
    or curriculum specialist within the McAllen Independent School District, with a long‑term goal of serving as an assistant principal. Additionally, she plans to launch a community tutoring program that
    provides supplemental support to Spanish‑speaking students in her area.
