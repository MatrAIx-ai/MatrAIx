persona_description: A molecular biologist who specializes in the study of androgen receptors and their role in prostate cancer development. She is particularly interested in understanding the genetic and
  biological mechanisms that give rise to prostate cancer in young men and how androgens contribute to these processes. She is also interested in developing screening tests for prostate cancer that can
  be tailored towards young men based on the high levels of androgen hormones in their bodies.
