personas:
  professional: Bonnie Dasilva is a detail‑driven systems analyst who leverages advanced SQL, Power BI, and Visio to translate chaotic business processes into clear, repeatable workflows, thriving on the
    predictability of Agile sprints while quietly mentoring junior teammates in structured problem‑solving.
  sports: Bonnie Dasilva enjoys low‑impact fitness, walking the Saginaw River trails three times a week, cheering for the Detroit Lions and the Detroit Tigers, and participates in a community yoga class
    that provides a structured yet calming exercise routine.
  arts: Bonnie Dasilva immerses themselves in mystery novels by Agatha Christie and Tana French, captures close‑up nature shots inspired by Edward Hopper’s framing, and unwinds with indie folk playlists
    featuring Sufjan Stevens while occasionally joining friends for strategic board games like Catan.
  travel: Bonnie Dasilva plans weekend getaways with spreadsheet itineraries, favoring the relaxed charm of Traverse City’s vineyards, the scenic hikes of Sleeping Bear Dunes, and dreams of a meticulously
    organized culinary tour of Tuscany and Kyoto, balancing travel desire with family budget constraints.
  culinary: Bonnie Dasilva is an intermediate home chef who meticulously follows recipes for dishes such as lemon‑herb roasted chicken, ratatouille, and pasta primavera, rewarding their garden’s bounty
    of basil, rosemary, and heirloom tomatoes, yet occasionally improvises a spice blend when a recipe feels too restrictive.
  core: Bonnie Dasilva blends analytical precision with a quiet love for orderly routines, from data modeling to planting herbs, while quietly wrestling with stress‑induced worries and the occasional indulgent
    splurge on gardening gear.
background:
  cultural: Bonnie was raised in a middle‑class, Midwestern white family in Saginaw, Michigan, with a blend of Italian‑American and Irish ancestry. Her upbringing reflected the region’s emphasis on hard
    work, humility, and community responsibility. Family gatherings, often centered around Catholic holidays such as Christmas and Easter, reinforced values of cooperation and harmony. The industrial heritage
    of Saginaw and the surrounding Great Lakes area fostered a practical, down‑to‑earth outlook, aligning with Bonnie’s preference for structure and predictability. She identifies with the Midwestern ethos
    of reliability, self‑reliance, and modesty, while also embracing a progressive commitment to continual learning and community involvement.
attributes:
  skills: '["Systems Analysis", "Business Process Modeling", "Requirements Gathering", "SQL Querying", "Data Visualization (Power BI)", "Technical Documentation", "Agile Project Coordination", "Workflow
