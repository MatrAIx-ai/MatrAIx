  hobbies: '["Reading Mystery & Non-Fiction", "Backyard Gardening", "Cooking", "Nature Walking & Photography", "Puzzle Solving (Crosswords, Sudoku)", "Board Games (Catan, Ticket to Ride)", "Community Volunteering
    (Food Pantry Organization)"]'
  career_goals: Bonnie aims to advance to a senior systems analyst role within the next three years, focusing on leading small, cross‑functional teams that streamline IT processes for local manufacturing
    and healthcare firms. She plans to earn professional certifications such as the Certified Business Analysis Professional (CBAP) and Project Management Professional (PMP) to deepen her methodological
    expertise and credibility. Long‑term, she envisions moving into a solution‑architect or IT manager position where she can shape strategic technology roadmaps while preserving the structured, predictable
    environment she thrives in. Balanced against her career growth, Bonnie prioritizes achieving a sustainable work‑life balance and developing mentorship programs that support junior analysts in cultivating
    disciplined, detail‑oriented work habits.
