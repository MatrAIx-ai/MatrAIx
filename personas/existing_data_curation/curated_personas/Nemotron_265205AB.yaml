  hobbies: '[''Reading Latin American literature'', ''Attending literary festivals'', ''Book club participation'', ''Cooking traditional Mexican dishes'', ''Gardening herbs and chilies'', ''Salsa and folkloric
    dancing'', ''Volunteering at community centers'', ''Mentoring young writers'', ''Photography of neighborhood life'', ''Yoga and journaling for stress relief'']'
  career_goals: Rochelle aims to publish a critically acclaimed memoir that chronicles her family's migration story and its intersection with the evolving Mexican‑American community in Houston, securing
    a contract with a major literary house while also launching an independent imprint dedicated to older Latina voices. Over the next five years she plans to establish a series of competitive writing contests
    and a community workshop program that empowers local writers, especially women, to develop marketable manuscripts. She aspires to become a sought‑after speaker at literary festivals and university panels,
    sharing insights on cultural preservation through literature. Additionally, she envisions co‑editing an anthology of Mexican‑American short stories, positioning herself as a cultural curator and legacy‑builder
    within her community.
