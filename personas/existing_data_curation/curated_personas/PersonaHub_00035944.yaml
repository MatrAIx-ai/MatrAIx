persona_description: A medical professional who is interested in the diagnosis and treatment of infectious diseases. This individual is likely to be a physician or a laboratory scientist who is knowledgeable
  about the diagnostic methods used to identify and treat Lyme disease. They may have experience working with serological testing, laboratory techniques, and understanding the stages of the disease. They
  are likely to be familiar with the symptoms, incubation period, and transmission vectors of Borrelia burgdorferi. They may also have experience interpreting laboratory test results and discussing them
  with patients and their healthcare providers.
