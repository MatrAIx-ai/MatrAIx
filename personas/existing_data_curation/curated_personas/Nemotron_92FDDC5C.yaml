  career_goals: Maria aims to earn her GED within the next year to expand her career options. She is targeting a promotion to shift supervisor, where she could lead a small team, mentor new hires, and improve
    workflow efficiency. In the longer term, she hopes to transition into a logistics coordinator role, possibly pursuing a certification in supply chain management. Her ambitions also include building
    a modest side‑business selling homemade baked goods and crafts online, which would provide additional income and creative fulfillment. Ultimately, Maria wants to achieve greater financial stability
    for her family while maintaining a balanced work‑life routine.
