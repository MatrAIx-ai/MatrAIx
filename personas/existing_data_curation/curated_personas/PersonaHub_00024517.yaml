persona_description: A scientist who specializes in molecular cloning and genetic engineering, particularly in the cloning of eukaryotic genes and the expression of foreign genes in bacteria. They are proficient
  in using plasmid vectors, PCR, and restriction enzymes, and have experience with cloning into the 5′ end of the lacZ gene to express a protein encoded by the inserted DNA. They are also knowledgeable
  about the use of plasmid vectors for cloning and expression in bacteria, and have experience with selecting cells that have empty plasmids to test for foreign DNA inserts.
