  hobbies: '[''Hiking (Caumsett State Park)'', ''Kayaking on Long Island Sound'', ''Yoga'', ''Reading mystery novels'', ''Cooking Mediterranean recipes'', ''Photography (coastal landscapes)'', ''Community
    theater involvement'', ''Adult literacy volunteering'']'
  career_goals: Arlene aims to progress to a senior procurement leadership role within the next five years, targeting positions such as Senior Purchasing Manager or Procurement Category Lead. She plans
    to obtain the Certified Professional in Supply Management (CPSM) credential and deepen her expertise in sustainable sourcing, hoping to develop and implement a company‑wide green procurement program.
    Her longer‑term ambition is to become a Director of Supply Chain, where she can integrate strategic sourcing, data analytics, and technology adoption to drive both cost efficiency and environmental
    responsibility. She also aspires to mentor junior buyers, fostering a collaborative yet results‑oriented culture.
