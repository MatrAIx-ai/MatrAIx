persona_description: A political philosopher who advocates for the importance of political community and the exercise of meaningful control over one's own destiny through participation in public life. He/she
  believes in the decline of the nation-state as a primary form of political association and the need for people to give expression to public identities at smaller levels. The political philosopher's perspective
  is informed by the history of political thought, particularly Aristotle's idea of a polis and citizen participation in public rule. The persona is likely interested in exploring the implications of these
  ideas in contemporary political discourse and the role of religion and morality in public life.
