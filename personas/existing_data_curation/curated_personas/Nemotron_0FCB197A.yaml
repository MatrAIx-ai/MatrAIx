  career_goals: Fatin aims to formalize her administrative expertise by obtaining the Certified Administrative Professional (CAP) credential within the next year. She aspires to become a senior executive
    assistant trusted for streamlining office workflows, leading efficiency improvement projects, and mentoring junior staff through a structured onboarding program she plans to develop. Over the next five
    years, she envisions transitioning to a part-time consulting role for local nonprofit organizations serving Southeast Asian seniors, applying her organized, compassionate approach to create harmonious,
    well-run offices. Additionally, she seeks to balance her professional contributions with increased volunteer work, ensuring she continues to help others while maintaining personal predictability and
    work-life harmony.
