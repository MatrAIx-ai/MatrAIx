personas:
  professional: Erica Hall is a veteran retail cashier with expert POS, cash handling, and inventory management skills, who uses her curiosity and methodical planning to curate rotating in‑store mini‑exhibits
    of local artists while mentoring new hires, and she is actively pursuing a shift supervisor role and future store manager promotion.
  sports: Erica Hall enjoys low‑impact fitness activities such as weekday yoga classes at the local community center and Sunday strolls in the neighborhood park, follows the Memphis Grizzlies for basketball
    and the Memphis Redbirds for baseball, and participates in a casual walking club that meets after their evening shifts.
  arts: Erica Hall immerses themselves in the arts by sketching on small canvases, quilting with modern motifs, attending blues and soul concerts featuring artists like Otis Redding and Isaac Hayes, exploring
    gallery exhibitions of contemporary creators such as Kara Walker and Banksy, and volunteering to mentor teens in the church’s youth art program.
  travel: Erica Hall prefers thoughtfully planned weekend getaways that blend cultural immersion and relaxation, having visited historic Charleston, the vibrant music scene of New Orleans, and the scenic
    Blue Ridge Parkway, while dreaming of a leisurely road trip to Savannah’s riverfront and a future visit to the art‑rich city of Santa Fe.
  culinary: Erica Hall, an adept home cook, delights in preparing soulful Southern dishes like shrimp and grits, collard greens seasoned with smoked turkey, and sweet potato casserole, garnishing with fresh
    thyme, basil, and a dash of hot sauce, while experimenting with new quinoa‑based salads that reflect their evolving palate.
  core: Erica Hall balances a methodical work ethic with a vibrant creative spirit, channeling curiosity into art, community service, and meticulous budgeting, yet occasionally lets impulse purchases of
    craft supplies and missed workouts reveal a stubborn, human side.
background:
  cultural: Erica was born and raised in Memphis, Tennessee, within a close‑knit African‑American community that values music, faith, and family. Growing up, she experienced the rhythms of gospel choirs
    at church and the soulful sounds of Memphis blues on the radio, which shaped her appreciation for the city’s cultural legacy. Family gatherings centered around soul food—collard greens, fried chicken,
    and cornbread—reinforced a deep connection to Southern Black culinary traditions. Her upbringing emphasized resilience, education, and community service, traits that have guided her through personal
    challenges, including her recent separation. Erica participates actively in local cultural events such as Memphis in May and the annual Blues Festival, and she supports initiatives that highlight Black
    artists and historians. This rich cultural tapestry informs her worldview, blending pride in her heritage with an openness to new ideas and experiences.
attributes:
  skills: '["Cash handling", "POS system operation", "Customer service", "Conflict resolution", "Inventory management", "Time management", "Shift scheduling", "Basic budgeting", "Art curation", "Digital
