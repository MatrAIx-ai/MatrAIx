  hobbies: '["Visiting art museums", "Painting and sketching", "Quilting", "Cooking Southern cuisine", "Reading biographies of Black leaders", "Gardening", "Volunteering at church youth art program", "Attending
    blues and soul concerts", "Participating in community book clubs"]'
  career_goals: Hoping to translate her reliability and methodical approach into leadership, Erica aims to be promoted to shift supervisor within the next two years and eventually to store manager. Concurrently,
    she wishes to merge her love of art with community service by pursuing a part‑time role as a volunteer coordinator for the Memphis Community Arts Center, where she could organize workshops for youth.
    To support these ambitions, she plans to obtain her GED and enroll in a local college program in arts administration or nonprofit management. Financially, she aspires to achieve greater stability that
    will allow her to support her child(ren) and possibly start a small home‑based business selling hand‑crafted quilts inspired by African‑American cultural motifs.
