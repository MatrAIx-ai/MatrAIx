  career_goals: Mindy aspires to move into a leadership role within her agency, such as a senior sales manager or regional trainer, where she can mentor newer agents and shape customer-service standards.
    She plans to earn professional certifications like the Chartered Property Casualty Underwriter (CPCU) to deepen her expertise. Long-term, she dreams of opening her own boutique insurance office that
    focuses on family-centered policies and offers financial-literacy workshops for the Pocatello community. Throughout her career progression, she aims to maintain a healthy work-life balance to manage
    stress and continue her volunteer work.
