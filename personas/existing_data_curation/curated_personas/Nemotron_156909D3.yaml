personas:
  professional: Mindy Donnelly is a seasoned insurance sales agent in Pocatello who blends fifteen years of property‑and‑casualty expertise with a practical curiosity for emerging insurance technologies,
    using clear communication and compassionate listening to build lasting client relationships while mentoring junior agents toward leadership roles.
  sports: Mindy Donnelly hikes the Bannock County trails with the local Pocatello Hiking Club, roots for the Idaho State Bengals basketball team, skis at Sun Valley during winter, and supplements yoga with
    weekend bike rides, balancing structured fitness with flexible outdoor pursuits.
  arts: Mindy Donnelly devotes evenings to mystery novels by Agatha Christie and Gillian Flynn, enjoys self‑development titles from Brené Brown, listens to folk‑rock artists such as Old Crow Medicine Show
    and classic country singer Dolly Parton, and attends community theater productions at the Porticello Arts Center.
  travel: Mindy Donnelly prefers road‑trip itineraries that blend nature and small‑town charm, having explored Yellowstone, the Grand Tetons, and Craters of the Moon, while dreaming of trekking the Inca
    Trail in Peru and planning future weekend getaways to Boise and Salt Lake City.
  culinary: Mindy Donnelly cooks comforting meals like chicken pot pie, roasted vegetable quinoa bowls, and homemade apple pie using garden‑fresh tomatoes, carrots, and basil, demonstrating a confident
    home‑cook level that enjoys experimenting with new recipes each month.
  core: Mindy Donnelly melds Midwestern pragmatism with a curiosity for innovation, using compassion‑driven insurance expertise to support her community while balancing yoga‑fueled self‑care, garden‑fresh
    cooking, and a love of nature‑filled adventures.
background:
  cultural: Mindy grew up in a middle-class, White, small-town family in the Intermountain West, where community ties and self-reliance were emphasized. Her upbringing combined traditional Midwestern values—modesty,
    hard work, and a focus on family—with an openness to new ideas encouraged by school and church activities. These cultural influences have fostered her practical outlook, collaborative spirit, and commitment
    to helping neighbors, while also supporting her curiosity about broader trends and technologies in her field.
