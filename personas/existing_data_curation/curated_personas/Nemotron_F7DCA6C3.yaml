  hobbies: '[''Playing soccer in local youth league'', ''Salsa dancing at community events'', ''Cooking traditional Puerto Rican meals with family'', ''Building LEGO robotics and Raspberry Pi experiments'',
    ''Kayaking and beach clean‑ups on the Chesapeake Bay'', ''Reading popular science books on marine biology'', ''Cooperative video gaming with friends'']'
  career_goals: Miguel’s short‑term goal is to maintain a high GPA while expanding his STEM experience through a summer internship with a marine science lab on the Chesapeake Bay. He wants to earn certifications
    in robotics and environmental science to solidify his practical skill set. In the long term, Miguel envisions a career that merges his love for the ocean, technology, and community service. He aspires
    to study environmental engineering or marine biology at university, eventually working on coastal‑conservation projects that use data‑driven tools such as drones and sensors to protect water quality.
    He also hopes to support bilingual youth in STEM by mentoring students in after‑school programs, reflecting his commitment to both his cultural heritage and his collaborative nature.
