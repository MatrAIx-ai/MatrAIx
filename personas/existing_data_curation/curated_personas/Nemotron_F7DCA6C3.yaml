personas:
  professional: Miguel Perez is a budding junior robotics enthusiast who builds LEGO‑based automation and Raspberry Pi environmental monitors, applying his methodical planning and teamwork skills from the
    soccer field to turn curiosity into practical, collaborative projects.
  sports: Miguel Perez plays forward for the Anne Arundel County Youth Soccer League’s Lakeside United, chants alongside the Washington Capitals fans during hockey season, and spends weekends kayaking the
    Patuxent River and volunteering at beach clean‑ups on Assateague Island, reflecting a love for both competitive and community‑oriented sport.
  arts: Miguel Perez lights up community salsa nights with energetic moves to the beats of Celia Cruz and Marc Anthony, while also appreciating the cinematic scores of Koji Kondo’s video game soundtracks
    and attending local theater workshops that blend rhythm and storytelling.
  travel: Miguel Perez has explored the coastal charms of Assateague Island, the historic streets of Williamsburg, and the science museums of Washington, D.C., and dreams of backpacking through the Caribbean’s
    coral reefs and hiking the misty trails of the Appalachian Mountains whenever school breaks permit, balancing budget constraints with a thirst for adventure.
  culinary: Miguel Perez showcases a growing culinary flair by mastering the preparation of arroz con gandules with aromatic sofrito, crisp alcapurrias stuffed with seasoned meat, and improvising plantain‑based
    snacks, often experimenting with family recipes while juggling homework and soccer practice.
  core: Miguel Perez blends a curiosity for tech, a devotion to team sports, and a love for rhythmic dance into a disciplined yet playful teenager who meticulously plans, occasionally overindulges in late‑night
    gaming, and never skips a community cleanup.
background:
  cultural: 'Miguel grew up in a bilingual Puerto Rican household in Bushwood, Maryland. At home, Spanish is spoken daily, and he regularly participates in cultural celebrations such as Three Kings Day,
    Nochebuena, and Puerto Rican Heritage Month at school. His family maintains strong ties to Puerto Rican music, cuisine, and values of community and respect. This bicultural environment has shaped his
    identity: he feels pride in his island roots while also embracing the traditions of his Mid‑Atlantic community. Miguel’s parents instilled a work ethic that blends the practicality of his father’s mechanical
    apprenticeship with the artistic flair of his mother’s love for music and dance. Local Latino community organizations provide Miguel with opportunities to mentor younger children, while his school’s
    multicultural club allows him to share his heritage through presentations, food, and dance performances. This dynamic cultural background informs his bilingual communication skill, his commitment to
    community service, and his aspiration to bridge gaps between science and the Latino community.'
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Organizational and time-management skills'', ''Leadership in student council and team captaincy'', ''Basic programming with Scratch and Python'',
