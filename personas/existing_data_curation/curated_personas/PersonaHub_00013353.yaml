persona_description: A researcher and psychologist who studies the relationship between dynamic indicators of basic early literacy skills, word use fluency, and shyness in second-grade students from upstate
  New York schools. The researcher aims to determine the correlation between the DIBELS Word Use Fluency indicator and vocabulary knowledge, and to establish the strength of the relationship between shyness
  and lower performance on language tests. The researcher is particularly interested in understanding how well the DIBELS measure measures vocabulary knowledge in shy students.
