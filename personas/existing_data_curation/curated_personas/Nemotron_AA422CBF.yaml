personas:
  professional: Shirley Jefferson, a 28‑year‑old architect in Detroit, blends deep technical mastery of Revit, Rhino and Grasshopper with a vivid, experimental artistic vision, channeling family traditions
    of communal storytelling and Motown‑era rhythms into sustainable, socially‑equitable designs, while their relaxed approach to deadlines and occasional disorganization fuels a flexible, adaptable workflow
    that thrives on improvisation and small‑scale collaborative workshops.
  sports: Shirley Jefferson rides a fixed‑gear bike with a local cyclists’ collective, cheers for the Detroit Lions in a modestly competitive spirit, follows the Detroit Pistons when feasible, and they
    prefer intimate pick‑up basketball games over stadium crowds, reflecting a reserved yet competitively curious approach to fitness that blends solo endurance rides with small‑team hustle.
  arts: Shirley Jefferson spends evenings sketching watercolors in a quiet studio, immerses themselves in digital illustration inspired by contemporary mural art and the soulful harmonies of Miles Davis
    and Robert Glasper, frequents the Museum of Contemporary Art Detroit to study works by Kehinde Wiley and Kerry James Marshall, and their imaginative, slightly solitary nature drives a personal aesthetic
    that merges speculative fiction motifs with modern design theory.
  travel: Shirley Jefferson favors spontaneous weekend road trips that weave through the industrial charm of Detroit’s revitalized districts, has explored the architectural wonders of Barcelona and Kyoto,
    cherishes a solo retreat at Asheville’s art‑focused community, and dreams of a future pilgrimage to Marrakech’s historic medina, all while they balance a modest budget and a competitive urge to document
    each journey through 3D‑printed photogrammetry models.
  culinary: Shirley Jefferson experiments in the kitchen with Southern staples like collard greens, shrimp and grits, and sweet potato pie reimagined with miso glaze, quinoa‑infused cornbread, and smoked
    paprika‑spiced black‑eyed peas, often pairing dishes with craft espresso blends, and they relish the creative process as much as the taste, though occasional forgetfulness leads to over‑cooked pasta
    on busy nights.
  core: Shirley Jefferson is a 28‑year‑old architect who merges high‑tech design tools with soulful, community‑rooted creativity, navigates life with a relaxed, occasionally disorganized rhythm, and balances
    competitive drive with a deep love for solitary art and experimental cuisine.
background:
  cultural: Shirley was raised in a close‑knit African‑American family in the Detroit metro area. Her grandparents, part of the Great Migration, brought Southern cultural traditions that now blend with
    Midwestern sensibilities. She draws inspiration from the legacy of Black architects such as Paul Revere Williams and Maya Lin, as well as the vibrant Motown music scene, local mural art, and community
    gatherings at church. Active in regional Black professional networks, she participates in community design workshops and infuses her projects with cultural narratives and a commitment to social equity.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Rhino'', ''Grasshopper'', ''SketchUp'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Parametric Design'', ''Sustainable Building Design'', ''Structural Analysis'',
    ''Project Coordination'', ''Digital Fabrication'', ''VR/AR Visualization'']'
  hobbies: '[''Watercolor sketching'', ''Digital illustration'', ''Visiting contemporary art galleries'', ''Reading speculative fiction'', ''Design theory reading'', ''Urban biking'', ''3D printing'', ''Laser‑cutting
    projects'', ''Yoga'', ''Small design meet‑ups'', ''Jazz and neo‑soul listening'', ''Experimental cooking'']'
  career_goals: Shirley aims to become a lead design architect at a forward‑thinking firm where she can champion innovative, sustainable projects that address social equity. In the long term, she envisions
    launching her own studio that integrates art, technology, and community‑focused design, creating cultural hubs and affordable housing that reflect African‑American heritage in the Detroit area. She
    is determined to be a mentor for emerging Black architects, contribute to policy discussions on equitable urban development, and earn recognition such as the AIA Emerging Voices award for her experimental
    design research.
