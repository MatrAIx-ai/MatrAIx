personas:
  professional: Oscar Vega, a retired maintenance supervisor who now mentors community members, leverages their hands‑on engineering know‑how and safety compliance expertise to lead woodworking and DIY
    workshops, thriving on predictable schedules yet often letting their laid‑back approach cause occasional mix‑ups in tool inventories.
  sports: Oscar Vega maintains their fitness through daily garden walks, weekly bird‑watching hikes with the local birdwatching society, and regular participation in the senior walking club, while cheering
    on the Arizona Diamondbacks, Arizona Cardinals, and Phoenix Suns, though their relaxed approach to obligations occasionally makes them miss game broadcasts.
  arts: Oscar Vega immerses themselves in the sounds of mariachi legends like Vicente Fernández, Los Tigres del Norte, and Los Lobos, attends community fiesta performances and occasional local theater productions,
    and weaves music into family gatherings, yet their occasional disorganization means they sometimes skip a gallery opening.
  travel: Oscar Vega prefers spontaneous short road trips to nearby mountain lakes such as Lake Powell and Sedona, balances these outings with a modest travel budget and careful packing of gardening tools,
    and dreams of visiting relatives in Oaxaca and exploring historic sites in Mexico City, though their flexible planning often results in last‑minute itinerary changes.
  culinary: Oscar Vega showcases their culinary skill by preparing mole, tamales, pozole, and chiles en nogada using dried chilies, masa harina, cacao, and pork shoulder, hosting lively family meals that
    blend traditional recipes with occasional experimental twists, yet they frequently forget to refrigerate leftovers, leading to occasional food waste.
  core: Oscar Vega blends a disciplined, hands‑on work ethic with a laid‑back, routine‑loving lifestyle, gifting handcrafted furniture and heartfelt recipes while navigating occasional chaos from forgotten
    appointments and spontaneous road trips.
background:
  cultural: Oscar was born to Mexican immigrant parents and grew up in a bilingual, bicultural environment that emphasized family, faith, and community. He celebrates Mexican holidays such as Día de los
    Muertos, Cinco de Mayo, and religious observances rooted in Catholic tradition, often preparing and sharing traditional foods with neighbors. Spanish remains the language of his home life, and he passes
    down stories of his ancestors to younger relatives. Living in Ontario, California, he participates actively in the local Latino community, helping organize cultural events, offering his culinary skills
    at community gatherings, and serving as a cultural bridge between older and newer generations of Mexican Americans.
