  hobbies: '[''Gardening'', ''Woodworking'', ''Traditional Mexican cooking'', ''Listening to mariachi music'', ''Attending community festivals'', ''Birdwatching'', ''Reading newspapers'', ''Playing chess'',
    ''Short road trips'', ''Volunteering at senior center'']'
  career_goals: In retirement, Oscar aims to stay active and purposeful by mentoring younger community members in practical engineering and hands‑on crafts. He plans to volunteer at the local senior center,
    teaching traditional Mexican cooking and leading small DIY workshops. He also wishes to contribute to neighborhood safety initiatives, drawing on his safety‑compliance experience. Maintaining his health
    through regular walks, gardening, and occasional trips to visit relatives in Mexico is a personal priority, as is preserving his cultural heritage for his grandchildren through storytelling and family
    gatherings.
