  career_goals: Looking ahead, Karen aims to transition from full‑time cashier duties to a mentorship role, offering part‑time consulting to small local retailers on streamlining operations and improving
    customer experiences. She also aspires to develop a community‑focused program that teaches financial literacy to seniors and teens, and eventually hopes to curate a modest neighborhood art space that
    showcases works from emerging local artists while providing a social hub for her friends and family.
