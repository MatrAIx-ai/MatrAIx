persona_description: A construction professional who is interested in using Building Information Modeling (BIM) software to document and visualize the designs behind infrastructure. They are project managers
  who use BIM to model as many details as possible in a structure so that everyone can clearly understand it. They are familiar with the elements of BIM and the functions of a BIM object, and are looking
  for software and tools that can help them optimize a project past the planning phase, into construction and operation. They are also interested in learning about the processes and policies that guide
  any project decision-making and the technologies that are used to manage each stage.
