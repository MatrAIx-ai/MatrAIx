personas:
  professional: Alice Motley, a retired electrical engineer and data‑science specialist, blends their mastery of Python, MATLAB, and SQL with their natural flair for public speaking and community leadership
    to design and run hands‑on robotics workshops, mentor aspiring female engineers, and translate complex technical ideas into accessible curricula—balancing their curiosity for emerging AI with a practical,
    organized yet flexible approach that lets them stay the energizing center of any audience.
  sports: Alice Motley stays active by joining the San Antonio Senior Hiking Club for weekend trail walks, attending weekly ballroom dancing classes set to classic swing music, cheering on the San Antonio
    Spurs during the NBA season and the San Antonio FC in the USL Championship, and fitting light strength‑training sessions into their routine to counter knee osteoarthritis, balancing organized schedules
    with a willingness to try new activities when friends invite.
  arts: Alice Motley expresses their creative side by starring in productions at the Majestic Theatre’s community troupe, snapping wildlife photographs inspired by Ansel Adams and Art Wolfe, discussing
    Hilary Mantel’s historical novels and Agatha Christie mysteries in their book club, and dancing to the soulful rhythms of Lila Downs and the classic croons of Frank Sinatra during ballroom evenings,
    and they weave this artistic appreciation into both their teaching and social gatherings.
  travel: Alice Motley plans their adventures with spreadsheets that map out road‑trip routes across Texas to places like Big Bend National Park, Austin’s music scene, and the historic Alamo, while their
    European escapades have taken them to the Alhambra in Granada and the historic streets of Prague, and they dream of charting a journey to Mesa Verde and Machu Picchu, balancing a love of organized itineraries
    with a spontaneous willingness to detour when a roadside town offers fresh jalapeños for their garden.
  culinary: Alice Motley, an advanced home chef, crafts Tex‑Mex delights such as fire‑roasted chile rellenos stuffed with heirloom tomatoes and Oaxaca cheese, smoky carnitas simmered with chipotle peppers,
    and tangy salsa verde flavored with freshly harvested cilantro, lime juice, and roasted tomatillos, often pairing the meals with homemade margaritas seasoned with a pinch of smoked paprika, and they
    relish sharing these dishes at lively dinner parties that double as community gatherings.
  core: Alice Motley channels their lifelong curiosity and organized flexibility into vibrant community leadership, juggling garden experiments, mentor workshops, and spontaneous dinner parties, all while
    habitually leaving sticky‑note reminders everywhere and occasionally forgetting to water their succulents after an evening of dancing.
background:
  cultural: Alice was raised in a middle-class Anglo-American family in Central Texas, steeped in the traditions of Southern hospitality and Texas pride. Her upbringing emphasized self-reliance, community
    service, and a strong work ethic, values that were reinforced by her parents' involvement in local civic organizations. Although she identifies as white, living in San Antonio for many years has deeply
    immersed her in the city's rich Hispanic culture. She speaks conversational Spanish, celebrates regional festivals such as Fiesta San Antonio, and has a keen appreciation for Mexican cuisine and music.
    Her cultural identity blends classic Texan values with a multicultural outlook, fostering an inclusive perspective that she brings to her mentorship and community activities.
