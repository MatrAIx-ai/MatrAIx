  hobbies: '[''Gardening'', ''Cooking Tex-Mex cuisine'', ''Traveling'', ''Book Club (historical fiction & mysteries)'', ''Museum Docent (Science)'', ''Community Theater'', ''Ballroom Dancing'', ''Photography'',
    ''Genealogy Research'', ''Birdwatching'']'
  career_goals: Alice aims to leverage her experience to nurture the next generation of STEM talent in her community. She plans to establish a volunteer mentorship program for middle-school girls, partner
    with local schools and the San Antonio museum to create hands-on robotics workshops, and serve as an adjunct instructor for an introductory data-science course at a nearby community college. She also
    hopes to write a memoir detailing her journey as a woman in engineering, and to stay current with emerging technologies such as artificial intelligence, perhaps developing small AI-driven projects for
    personal use. While retired, she remains open to limited consulting opportunities that align with sustainable, community-focused engineering solutions.
