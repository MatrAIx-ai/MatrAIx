personas:
  professional: Wayne Craig is a retail operations specialist who leverages strong customer service background, POS expertise, and self‑taught Python automation to streamline inventory and reporting, positioning
    themselves as the go‑to problem‑solver for technical issues in a busy Mesa store.
  sports: Wayne Craig enjoys solo desert hikes on the Sonoran trails, follows the Arizona Diamondbacks (MLB) and Phoenix Suns (NBA) closely, volunteers with a local Mesa hiking club that meets monthly,
    and squeezes in occasional weekend pick‑up basketball games at the community center, preferring structured, low‑impact activities that complement their methodical routine.
  arts: Wayne Craig immerses themselves in strategic board games like Terraforming Mars, listens to progressive rock icons such as Pink Floyd and modern composers like Hans Zimmer, and watches sci‑fi series
    like Westworld, letting these creative outlets sharpen their analytical mind while offering a solitary escape.
  travel: Wayne Craig plans trips with meticulous checklists, prefers off‑season visits to national parks like Zion and Bryce Canyon for solitary desert hikes, has already explored Kyoto’s tech districts,
    and aspires to trek Iceland’s volcanic landscapes, balancing budget constraints with a craving for structured adventure.
  culinary: Wayne Craig loves cooking precise, science‑based dishes such as sous‑vide steak, homemade sourdough loaves measured to the gram, and classic ratatouille, relishing the exacting use of ingredients
    like thyme, smoked paprika, and liquid nitrogen for flash‑freezing desserts, although they sometimes over‑cook their coffee while debugging code.
  core: Wayne Craig is a methodical, puzzle‑loving retail technician who turns data‑driven discipline into every facet of life, from finance and fitness to cooking and career ambitions, while quietly battling
    occasional insomnia and a tendency to over‑schedule.
background:
  cultural: Wayne is a white American raised in the suburban neighborhoods of Mesa, Arizona. His family values reflect a middle‑class, work‑ethic‑focused upbringing typical of the Southwest, with an emphasis
    on education, self‑reliance, and community involvement. He grew up celebrating traditional American holidays and participates in local community events such as the Mesa Arts Festival. The desert landscape
    and the laid‑back yet orderly rhythm of life in Maricopa County have shaped his appreciation for structure, practicality, and a balanced social life centered around small, close‑knit groups.
