  career_goals: Although retired, Marcos aims to stay engaged by mentoring emerging entrepreneurs in Grand Junction, volunteering on the local economic development board, and documenting his business experiences
    in a memoir that can serve as a guide for younger generations. He also wishes to become more comfortable using digital tools to stay connected with family and to share his knowledge online, while maintaining
    a flexible schedule that respects his need for low‑stress, low‑commitment activities.
