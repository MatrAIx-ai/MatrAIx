personas:
  professional: Wanda Lanier, a 13‑year‑old robotics enthusiast, blends a love of mystery novels with methodical problem‑solving, designing and programming simple machines in their school’s club while consistently
    meeting project deadlines and offering supportive guidance to teammates.
  sports: Wanda Lanier swims three times a week at the community pool, cheering for the Detroit Lions during football season and the Michigan State Spartans during basketball, and they have joined a local
    youth swimming club affiliated with the Michigan Aquatics Association, where they balance structured workouts with casual weekend pick‑up games of soccer with friends.
  arts: Wanda Lanier cultivates creativity through calligraphy, crafting hand‑made journals inspired by the elegant strokes of calligrapher John Stevens, while immersing themselves in sci‑fi soundtracks
    by composer Hans Zimmer and the lyrical poetry of singer‑songwriter Lisa Loeb, and they regularly attend library author talks featuring writers like John Green.
  travel: Wanda Lanier favors well‑planned road trips with family, having explored the historic charm of Mackinac Island, the bustling streets of Chicago, and the seasonal fireworks at the local Fourth
    of July parade, while dreaming of a future school‑exchange visit to Kyoto, Japan, where they hope to combine their love of gardening with learning about Japanese zen gardens.
  culinary: Wanda Lanier enjoys cooking simple, garden‑fresh meals such as roasted carrots, zucchini gratin, and homemade vegetable soup, delights in making classic Midwestern comfort foods like mac and cheese
    and apple pie during family Thanksgiving gatherings, and they frequently practice decorative lettering on recipe cards while experimenting with cinnamon‑spiced pumpkin muffins.
  core: Wanda Lanier is an organized, curiosity‑driven teen who balances methodical robotics projects with artistic calligraphy, community gardening, and a steady penchant for saving every spare dime.
background:
  cultural: Wanda grows up in Farmington, Michigan, a suburban community in Oakland County where Midwestern values of reliability, community involvement, and modest ambition are common. Her family’s heritage
    includes European roots, which are reflected in occasional holiday traditions such as celebrating Thanksgiving with extended family gatherings, observing Easter, and taking part in local Fourth of July
    parades. The cultural environment emphasizes education, volunteerism, and a balanced approach to work and leisure, all of which resonate with her personality’s focus on practicality, cooperation, and
    emotional stability. She attends a public middle school that encourages diversity and inclusion, giving her exposure to a variety of cultural perspectives while grounding her in the local community’s
    supportive atmosphere.
