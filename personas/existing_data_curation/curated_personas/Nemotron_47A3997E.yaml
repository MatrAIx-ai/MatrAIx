  hobbies: '[''reading mystery and sci‑fi novels'', ''school robotics club'', ''gardening'', ''calligraphy and journal making'', ''swimming'', ''attending library events'']'
  career_goals: Wanda aspires to a career that blends her curiosity about how things work with a desire to help others. She is currently leaning toward fields such as veterinary science, environmental engineering,
    or elementary education, where she can apply her methodical approach and compassion. She imagines herself attending a university program that offers hands‑on research opportunities, eventually becoming
    a professional who designs sustainable solutions for animal health or community education. In the short term, she aims to earn a science fair award, join a summer STEM camp, and volunteer at the local
    animal shelter to gain experience.
