  career_goals: Vernon aims to transition into a senior remote customer experience specialist role where he can shape service strategies and mentor a distributed team. Over the next five years he envisions
    moving into a team‑lead or quality‑assurance manager position, focusing on building a harmonious, low‑stress work environment. Long‑term, he hopes to combine his passion for art with his expertise in
    customer insights by leading user‑experience research or content strategy for cultural institutions, potentially consulting for galleries on audience engagement.
