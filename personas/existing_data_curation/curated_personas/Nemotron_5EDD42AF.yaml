  hobbies: '[''Bullet journaling'', ''Reading (African American literature, nonfiction)'', ''Yoga and mindfulness'', ''Volunteer work at food pantry'', ''Urban photography'', ''Cooking (Soul food)'', ''Community
    basketball'']'
  career_goals: She aims to complete a bachelor's degree in Business Administration with a concentration in nonprofit management, secure an internship in program coordination, and ultimately become a program
    director for a youth‑empowerment nonprofit serving underserved Black communities in the Chicago metropolitan area. Jasmin also plans to earn a CAPM (Certified Associate in Project Management) certification
    and leverage her disciplined, high‑standard mindset to lead initiatives that bridge academic resources with community development.
