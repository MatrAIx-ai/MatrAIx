personas:
  professional: Jasmin Robinson is a diligent business administration student focusing on nonprofit management, leveraging advanced project planning skills, Trello organization, and a data‑driven research
    approach to coordinate community programs while maintaining an exacting standard of achievement and a calm, resilient demeanor.
  sports: Jasmin Robinson plays forward for a community basketball league in Chicago, follows the Chicago Bulls and Chicago White Sox avidly, and complements the season with thrice‑weekly yoga sessions
    to improve flexibility and mental resilience.
  arts: Jasmin Robinson curates a visual diary of Chicago neighborhoods inspired by photographers Vivian Maier and Brandon Stanton, immerses in contemporary social‑policy nonfiction by authors Michael Sandel
    and Susan Sontag, and fuels creative breaks with playlists featuring Bon Iver, Hozier, and Billie Eilish, all of which shape their artistic sensibility.
  travel: Jasmin Robinson has explored New York City’s museums, spent a weekend in Austin, Texas for a music festival, and dreams of strolling through Barcelona’s Gothic Quarter and the historic districts
    of Kyoto, while preferring to plan trips using budget‑friendly hostels and detailed itineraries to balance study commitments.
  culinary: Jasmin Robinson loves cooking Southern comfort dishes like fried chicken with a honey‑mustard glaze, collard greens braised with smoked turkey, and sweet potato casserole topped with marshmallows,
    often experimenting by adding miso paste or chipotle for a modern twist, and they enjoy sourcing fresh herbs, jalapeños, and smoked paprika at the local farmer’s market.
  core: Jasmin Robinson is a meticulously organized 19‑year‑old who blends disciplined project management with a calm, resilient mindset, channeling her curiosity into community service, strategic budgeting,
    and creative pursuits while balancing social engagement with purposeful alone time.
background:
  cultural: Jasmin grew up in a close‑knit Black family in Streamwood, absorbing traditions from African American church life, family storytelling, and community gatherings. She identifies with the cultural
    heritage of the Midwest Black diaspora, celebrating Juneteenth, listening to jazz, R&B, and hip‑hop, and staying connected to her roots through church choir and local cultural events. Her upbringing
    emphasizes resilience, education, and community service, which shape her worldview, personal aspirations, and the values she brings to her academic and future professional pursuits.
attributes:
  skills: '[''Project management'', ''Time management'', ''Microsoft Office and Google Workspace proficiency'', ''Research and analytical writing'', ''Data analysis (Excel, SPSS)'', ''Event planning'',
