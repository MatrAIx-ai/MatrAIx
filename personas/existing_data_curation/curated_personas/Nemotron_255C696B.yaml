personas:
  professional: Rhona McGreevy, a budding teen technologist, blends a curiosity for science podcasts with a practical penchant for structured problem‑solving by creating Scratch games that teach teamwork
    while volunteering to help seniors navigate simple tech.
  sports: Rhona McGreevy, a high‑school volleyball starter, devotes after‑school practice to the school team, cheers for the national women’s volleyball squad, enjoys weekend pickup games at the community
    center, and supports the local professional basketball team, the Raptors, as a fan.
  arts: Rhona McGreevy, an enthusiastic drama club member, idolizes Lin‑Manuel Miranda for his lyrical storytelling, regularly crafts handmade friendship bracelets inspired by theater props, and attends
    local productions of The Little Shop of Horrors and Hamilton whenever possible.
  travel: Rhona McGreevy, an adventurous teen, plans weekend trips to the nearby beach for sunrise volleyball, dreams of a semester‑long exchange to Kyoto to explore temple gardens and anime culture, and
    balances these aspirations with family budget constraints.
  culinary: Rhona McGreevy, an avid baker, perfects chocolate‑ganache cupcake recipes topped with sprinkles and edible glitter, experiments with buttercream flavor pairings such as matcha and raspberry,
    and often gifts her creations to friends at the senior center, though they sometimes over‑sweeten when rushed.
  core: Rhona McGreevy, a perpetually organized teen with boundless social energy, balances a love for tech‑driven creativity and community service while wrestling with a tendency to over‑worry and an occasional
    sweet‑tooth binge.
background:
  cultural: Rhona grew up in South Holland, Illinois, a close‑knit Midwestern suburb with strong community ties and a heritage that includes Irish, Polish, and German influences. Her family celebrates traditional
    American holidays such as Thanksgiving and Christmas, and attends a local Catholic parish where community festivals like the South Holland Summer Festival are important social events. The region’s emphasis
    on practicality, friendly neighborliness, and community service has shaped her values of reliability, cooperation, and a desire to contribute positively to her surroundings.
