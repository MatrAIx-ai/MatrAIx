  career_goals: Rhona aspires to pursue a career that blends her love of organization, helping others, and practical problem‑solving. She hopes to become a high school counselor or a community health worker,
    roles that will allow her to support peers through academic and personal challenges. Long‑term, she dreams of creating a youth mentorship program in South Holland that combines academic guidance with
    stress‑management workshops, reflecting her desire to turn her caring nature into lasting community impact.
