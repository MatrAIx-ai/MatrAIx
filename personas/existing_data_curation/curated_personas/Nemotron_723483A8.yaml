  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Landscape photography'', ''Exploring local hiking trails'', ''Attending live music (jazz/blues) events'', ''Cooking
    experimental BBQ and Tex‑Mex dishes'', ''Reading popular science and philosophy books'', ''Participating in community workshops on creativity'', ''Playing board games with friends'', ''Practicing mindfulness
    meditation'']'
  career_goals: Sheldon aims to formalize his on‑the‑job knowledge by completing an associate degree in Business Administration and earning the Certified Professional Sales Leader (CPSL) credential. He
    aspires to move into a sales operations or regional manager role where he can shape broader strategy while continuing to mentor staff. Parallel to his professional ambitions, he wants to integrate his
    passion for art by volunteering at local museums and eventually curating a community exhibit that highlights emerging Texas artists. Reducing his chronic stress is also a priority; he plans to adopt
    structured wellness routines, delegate operational tasks where possible, and allocate regular time for creative pursuits.
