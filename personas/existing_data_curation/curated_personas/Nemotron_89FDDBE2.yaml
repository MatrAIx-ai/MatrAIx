personas:
  professional: Antonio Garcia is an aspiring young engineer who channels their love for routine into meticulous LEGO constructions, developing problem‑solving skills and a methodical approach that they
    carry into school science projects and future design aspirations.
  sports: Antonio Garcia plays soccer with the local Junior Soccer Rovers, dazzles teammates during after‑school matches, and proudly sports a jersey of FC Barcelona, illustrating a dedication to teamwork,
    routine practice, and loyalty to a beloved professional club.
  arts: Antonio Garcia dives into the arts by listening to classic piano pieces like Beethoven’s ‘Für Elise’ while practicing simple melodies, sketching comic‑style panels inspired by Stan Lee and Jack
    Kirby, and moving to vintage salsa rhythms reminiscent of Tito Puente’s orchestra, blending structured learning with creative expression.
  travel: Antonio Garcia enjoys family road trips to nearby state parks and the beach, dreams of hiking the Grand Canyon, and envisions strolling through Paris’s historic streets, yet plans trips around
    school holidays and a limited allowance, often using a map and a notebook to organize each adventure.
  culinary: Antonio Garcia helps in the kitchen by chopping vegetables for arroz con pollo, frying sweet plantains, and stirring a hearty black bean soup, savoring the fragrant blend of garlic, cumin, and
    cilantro while taking pride in preserving beloved family recipes.
  core: Antonio Garcia balances a methodical love for LEGO building with a vivid imagination, careful allowance budgeting, gentle anxiety management, and a preference for small‑group soccer and piano practice,
    all while occasionally worrying over missed homework and hoarding extra pencils.
background:
  cultural: Antonio is a first‑generation Cuban American raised in Miami’s vibrant Little Havana community. His household is bilingual, speaking Spanish at home while using English at school. Family gatherings
    often feature traditional Cuban foods such as croquetas, arroz con pollo, and pastelitos, as well as music like son, salsa, and boleros. He celebrates cultural holidays like Día de la Cultura Cubana
    and observes Catholic traditions with his family. The close‑knit community emphasizes respect for elders, mutual support, and a strong sense of identity, all of which shape Antonio’s compassionate and
    cooperative outlook.
