  career_goals: Antonio dreams of a future where he can combine his love for helping others with his preference for structured, predictable work. He aspires to become a pediatrician or veterinarian, professions
    that allow him to care for children and animals within a well-defined routine. He also imagines teaching elementary school, where he can share knowledge in an organized classroom setting, and hopes
    to one day enroll in a science-focused high school program to build a solid foundation for his career.
