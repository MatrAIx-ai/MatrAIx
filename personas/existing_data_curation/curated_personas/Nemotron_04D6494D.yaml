  hobbies: '[''Salsa dancing'', ''Beach volleyball'', ''Weekly group fitness bootcamps'', ''Volunteering at Mexican cultural festivals'', ''Cooking traditional Mexican dishes'', ''Hiking in state parks'',
    ''Reading personal development books'', ''Listening to technology podcasts'', ''Participating in trivia nights'']'
  career_goals: Alycia aims to advance to a sales management role within the next three years, ultimately becoming a regional sales director overseeing a team of service representatives. She plans to earn
    certifications such as the Certified Sales Professional (CSP) and Salesforce Administrator to deepen her expertise. Long‑term, she envisions leading a high‑performing sales unit that integrates technical
    solutions with client needs, mentoring new hires, and possibly launching her own consultancy focused on sales strategy for tech‑based service firms.
