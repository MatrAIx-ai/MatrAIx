personas:
  professional: Alycia Lopera, a 36‑year‑old service‑sales specialist, leverages their bilingual fluency, CRM expertise and data‑driven forecasting to close high‑tech service deals, while their routine‑loving,
    competitive streak drives them to consistently exceed quotas through meticulous pipeline management and persuasive presentations.
  sports: Alycia Lopera, a dedicated fitness enthusiast, plays with a local beach‑volleyball league in Kissimmee, attends weekly salsa dancing classes at the Orlando Salsa Society, participates in sunrise
    bootcamps, roots for the Orlando Magic and Orlando City SC, and is a member of the Florida Amateur Beach Volleyball Club, and they bring a competitive yet community‑focused mindset to every activity.
  arts: Alycia Lopera channels their love of performance into salsa dancing, while their playlists feature Carlos Santana, Lila Downs, and the classic sounds of Celia Cruz; they also enjoy attending local
    theater productions of "La Casa de Bernarda Aldea" and support community art fairs that celebrate traditional folk crafts.
  travel: Alycia Lopera plans their trips with a blend of structure and adventure, favoring weekend getaways to Orlando’s theme parks, annual pilgrimages to Oaxaca for Día de los Muertos celebrations, and
    hiking excursions in the Great Smoky Mountains, often traveling with a small group of close friends to balance cost and shared experiences.
  culinary: Alycia Lopera’s kitchen is a laboratory for authentic pozole, tamales de pollo, and chiles en nogada, where they layer chipotle, ancho chiles, fresh cilantro, and masa harina, while also mastering
    cauliflower‑crust pizzas for post‑workout meals, and they never miss a chance to serve fresh guacamole with lime and serrano peppers at family gatherings.
  core: Strategic, routine‑driven, and fiercely competitive, Alycia Lopera merges bilingual sales savvy with a love of salsa, beach volleyball, and culinary experimentation, and they juggle a disciplined
    financial plan and a keen eye on personal health.
background:
  cultural: Alycia is a first‑generation Mexican American who grew up bilingual in Spanish and English. Her family maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos
    and Las Posadas, and emphasizing values of familismo, respect, and community service. While living in Kissimmee, she participates in the vibrant local Hispanic community, often attending church services
    and cultural gatherings. Her Mexican heritage informs her interpersonal style—warm, hospitable, and collaborative—while her practical upbringing nurtures a respectful, hardworking approach to both personal
    and professional life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Consultative selling'', ''Customer relationship management (CRM) software (Salesforce, HubSpot)'', ''Data analysis and sales forecasting'', ''Negotiation'',
