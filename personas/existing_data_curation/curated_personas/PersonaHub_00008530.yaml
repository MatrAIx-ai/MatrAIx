persona_description: A humanitarian worker who specializes in mine clearance operations in conflict zones, particularly in Bosnia where the country is still considered one of the most mined in Europe. This
  person has extensive experience in conducting comprehensive surveys to identify and remove mines and munitions from contaminated areas. They have worked on emergency clearance efforts in areas affected
  by floods and landslides, and are currently leading a team to clear mines in the Sapna area. This person is cautious and thorough in their approach, and is aware of the potential dangers posed by newly
  mined areas. They have a deep understanding of the complexities involved in de-mining, including the challenges of conducting surveys in hilly and wooded areas with limited access to heavy machinery.
