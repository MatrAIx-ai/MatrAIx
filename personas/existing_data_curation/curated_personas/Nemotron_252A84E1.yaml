  hobbies: '[''Yoga'', ''Mindfulness Meditation'', ''Gardening'', ''Baking'', ''Reading Mystery & Historical Fiction'', ''Book Club'', ''Crossword Puzzles'', ''Sudoku'', ''Hiking'', ''Nature Photography'']'
  career_goals: Misty aims to earn her Certified Public Accountant (CPA) license within the next year and transition into a senior audit manager role at a regional public accounting firm. She aspires to
    lead a team that specializes in forensic and data‑driven audits, integrating advanced analytics to improve fraud detection. Over the next five years, she plans to pursue a Master’s in Accounting or
    an MBA with a focus on finance, positioning herself for a future CFO role in a mid‑size manufacturing company. Balancing career advancement with personal wellbeing, she also seeks to develop a mentorship
    program for junior women accountants and to cultivate a workplace culture that emphasizes stress‑management and work‑life balance.
