  hobbies: '[''restoring classic cars'', ''woodworking'', ''fly fishing'', ''reading automotive and engineering magazines'', ''crossword puzzles'', ''attending local historical society meetings'', ''gardening'']'
  career_goals: Approaching retirement, Rafael aims to leverage his decades of experience to transition into a mentorship role, training younger workers on best practices in tire manufacturing and safety
    protocols. He hopes to lead a small team focused on process improvement, using data‑driven methods to reduce waste and increase productivity. If the opportunity arises, he would consider consulting
    for regional manufacturers seeking to modernize their equipment while preserving proven workflows. Ultimately, he wants to secure a stable financial foundation for his later years while leaving a legacy
    of practical, high‑quality craftsmanship at the plant.
