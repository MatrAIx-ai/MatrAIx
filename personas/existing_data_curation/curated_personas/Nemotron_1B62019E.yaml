  career_goals: Although retired, Kenneth aims to continue contributing to his community by mentoring youth, leading oral-history projects at the La Crosse County Historical Society, and serving on the
    board of a local arts nonprofit. He plans to write and publish his memoirs to preserve his family’s story, support intergenerational programs that foster harmony, and remain active in volunteering at
    the senior center. Maintaining his health so he can stay engaged in these pursuits remains a central personal ambition.
