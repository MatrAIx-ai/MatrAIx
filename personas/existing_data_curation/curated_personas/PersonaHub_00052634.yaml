persona_description: A historical figure who was a prominent painter in the early sixteenth century, known for his work in the distorted perspective style that was popular in the Habsburg courts. He was
  appointed as the painter to Mary of Hungary in 1537 and went on to become the highest-paid artist of his time, working at the court of Henry VIII in England. His notable work, a portrait of Edward VI,
  is considered to be a masterpiece of his art and is known for its unique and captivating perspective.
