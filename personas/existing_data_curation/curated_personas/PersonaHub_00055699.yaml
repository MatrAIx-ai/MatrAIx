persona_description: A conservationist or wildlife researcher who is deeply concerned about the illegal hunting, trading, and consumption of gorillas and other apes in the Congo Basin. They are passionate
  about the importance of preserving these endangered species and are dedicated to advocating for their protection through legal means and raising awareness about the issue. They have a strong understanding
  of the legal and social dynamics surrounding the trade in bushmeat and are committed to working with local communities and governments to develop and implement effective conservation strategies. They
  are also knowledgeable about the cultural and spiritual significance of gorillas and other apes in the local communities, and are committed to finding ways to integrate conservation efforts into traditional
  practices.
