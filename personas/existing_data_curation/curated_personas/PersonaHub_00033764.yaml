persona_description: A paleontologist who specializes in the study of ichthyosaurs, specifically focusing on their biology, behavior, and the causes of their bone necrosis. They are particularly interested
  in the possibility that ichthyosaurs evolved the ability to dive deeper and for longer, leading to bone damage when resting near the surface at night, which could explain their bone necrosis. They are
  also interested in the role of nitrogen in ichthyosaur biology and how it could contribute to their bone damage.
