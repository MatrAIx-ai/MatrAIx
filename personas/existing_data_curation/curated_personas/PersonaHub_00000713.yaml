persona_description: Olivia Shakespear, a cultured, beautiful, and compassionate woman who developed a love for books and became well-read, befriended Pearl Craigie, and met William Butler Yeats. She was
  influential in literary society and wrote six novels between 1894 and 1910, including Love on a Mortal Lease and The Journey of High Honour, none of which sold well. She was also a book reviewer for The
  Kensington Review in 1902.
