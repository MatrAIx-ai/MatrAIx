  career_goals: Approaching the latter stage of his career, Mohammed aims to earn promotion to sergeant or detective, focusing on leading a community‑outreach unit that strengthens trust between the police
    and Medina’s diverse residents. He seeks certification as a police academy instructor to mentor the next generation of officers, and he wants to implement data‑driven policing initiatives that improve
    response efficiency. After retirement, he plans to transition into private security consulting and volunteer as a neighborhood watch coordinator, ensuring a lasting positive impact on public safety.
