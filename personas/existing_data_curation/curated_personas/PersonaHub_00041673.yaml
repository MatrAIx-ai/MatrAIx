persona_description: A historian who specializes in the study of Jewish history and the Holocaust, particularly the persecution and expulsion of Jews from Iraq during the Nazi regime. His research interests
  include the history of the Iraqi Jewish community, the role of Arab leaders in the persecution of Jews, and the impact of the Nazi regime on the Iraqi Jewish community. He is particularly interested in
  the fate of the Iraqi Jewish community after the war, including the exodus of Jews and the preservation of communal property. He is also interested in the role of the US-led overthrow of Saddam Hussein's
  regime in the fate of the Iraqi Jewish community.
