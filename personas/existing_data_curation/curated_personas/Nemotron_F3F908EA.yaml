  hobbies: '[''Cooking traditional Southern dishes'', ''Hosting church potlucks'', ''Singing in gospel choir'', ''Attending African‑American heritage festivals'', ''Morning aerobics classes'', ''Women’s
    softball league'', ''Quilting'', ''Gardening'', ''Reading romance novels'', ''Listening to talk‑show podcasts'']'
  career_goals: Quinay aims to advance into a supervisory role within the next three years, pursuing certifications such as the Lean Six Sigma Green Belt and OSHA Trainer to bolster her credentials. She
    envisions leading a continuous‑improvement team that streamlines workflow, reduces waste, and raises product quality metrics. Long‑term, she hopes to transition into a plant training or safety officer
    position where she can shape onboarding programs and promote a culture of disciplined excellence. Ultimately, she plans to leverage her experience to start a small, family‑run fabrication shop that
    serves local contractors while allowing her to maintain a balanced work‑life schedule for her husband and adult children.
