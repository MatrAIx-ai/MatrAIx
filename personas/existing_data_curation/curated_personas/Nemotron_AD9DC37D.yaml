personas:
  professional: Antonio Wong is a budding operations analyst who thrives on routine-driven processes, applying meticulous Excel and Google Workspace skills to streamline supply-chain workflows, while their
    competitive edge and critical, skeptical mindset drive them to challenge inefficiencies and become the go-to coordinator for cross-functional projects.
  sports: Antonio Wong plays midfield in a neighborhood Brooklyn soccer league, follows New York City FC and Real Madrid with fervor, tosses a baseball cap for the New York Mets during summer, and adheres
    to a regimented fitness routine that includes three weekly group classes at the local CrossFit box.
  arts: Antonio Wong energizes social gatherings with salsa and bachata playlists featuring Marc Anthony, Bad Bunny, and classic Celia Cruz, frequently attends live performances of Lin-Manuel Miranda's
    Hamilton, and curates movie nights with films by Alejandro González Iñárritu, weaving these artistic influences into their weekend culture.
  travel: Antonio Wong plans trips with the same spreadsheet precision they use at work, preferring a blend of cultural immersion and social adventure, including weekend hikes in the Catskills, a coveted
    pilgrimage to Cartagena's street festivals, and a future dream of catching a Barcelona football match while staying within a modest budget.
  culinary: Antonio Wong can whip up perfectly crisp cheese-filled pupusas using masa harina, refried beans, and Oaxacan cheese, masters cooking arroz con pollo with cilantro and achiote, yet often over-salts
    their salsa, and indulges in occasional New York-style pizza topped with truffle oil when dining out.
  core: Antonio Wong blends disciplined routine, competitive ambition, and a sociable spark, turning spreadsheets into success stories while never missing a pupusa night, even as they wrestle with a tendency
    to overwork and skip self-care.
background:
  cultural: Antonio grew up in a Salvadoran‑American household in Brooklyn, where family meals, music, and bilingual communication are central to daily life. He identifies strongly with the Salvadoran diaspora’s
    emphasis on hard work, community solidarity, and preserving traditions such as celebrating Día de la Independencia with parades and street food. While adapting to New York’s fast‑paced environment,
    he maintains close ties to his extended family and local community organizations, often serving as a bridge between older generations and younger peers.
attributes:
  skills: '[''bilingual communication (Spanish/English)'', ''event coordination'', ''logistics planning'', ''budgeting and basic accounting'', ''Excel and Google Workspace proficiency'', ''project scheduling'',
