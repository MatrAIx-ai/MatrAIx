  hobbies: '[''soccer (community league)'', ''cooking Salvadoran cuisine'', ''organizing cultural festivals'', ''salsa and bachata dancing'', ''group fitness classes'', ''following professional soccer'',
    ''strategic video gaming'']'
  career_goals: Antonio aims to secure a stable, routine‑focused role in operations or logistics where he can apply his organizational strengths and achieve measurable performance targets. He hopes to complete
    his bachelor’s degree in business administration within the next two years, positioning himself for a junior operations manager or supply‑chain coordinator position at a reputable firm in New York.
    Long‑term, he envisions launching a modest family‑owned retail or food‑service business that blends his Salvadoran heritage with his disciplined management style.
