  hobbies: '[''Hiking'', ''Mountain biking'', ''Pickup basketball'', ''Live music events'', ''Cooking for friends'', ''Volunteering for financial literacy workshops'', ''Reading business and tech books'',
    ''Landscape photography'', ''Exploring local coffee shops'']'
  career_goals: Jerrold aims to advance to a senior loan officer or branch manager role within his institution, earn a Certified Financial Planner (CFP) designation, and spearhead community financial‑literacy
    initiatives. Long‑term, he envisions launching a boutique consulting firm that helps small businesses secure financing, integrates innovative fintech solutions, and mentors emerging professionals in
    the banking sector.
