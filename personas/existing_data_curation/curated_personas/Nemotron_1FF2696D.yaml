  hobbies: '["Playing soccer", "Dancing to music", "Reading picture books", "Drawing and coloring", "Building with Lego Duplo", "Singing in the church choir", "Participating in group storytime", "Simple
    science experiments (e.g., mixing colors, making slime)", "Helping in the kitchen with measuring ingredients"]'
  career_goals: Vanessa dreams of growing up to be a teacher because she loves sharing stories and helping friends learn, envisioning a classroom where she can organize lessons and create a caring environment.
    She also imagines becoming a veterinarian, combining her love for animals with her methodical approach to caring for them. Her ambition includes being a community leader who can organize events and
    help neighbors, reflecting her desire to be reliable and supportive, even though she sometimes worries about meeting those expectations.
