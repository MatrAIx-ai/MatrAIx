personas:
  professional: Shelby Floyd, a seasoned audit professional on the path to senior management, blends two decades of financial accounting expertise with a vivid imagination, turning dense audit reports into
    colorful visual dashboards that help non‑technical stakeholders grasp risk, while mentoring junior staff with a cooperative, patient style and quietly fretting over missed details.
  sports: Shelby Floyd follows the Detroit Tigers every summer, plays casual bocce in the local senior league, and maintains fitness through weekly yoga, dance‑fit, and a Saturday morning walking group
    at Portage Park, preferring low‑impact activities that dovetail with their collaborative nature and love of community.
  arts: Shelby Floyd, an avid watercolorist and community‑theater enthusiast, regularly creates mixed‑media collages inspired by western Michigan’s lakeshores, volunteers to organize art talks at the Portage
    Public Library, and draws artistic inspiration from Georgia O’Keeffe’s floral abstractions and the folk charm of Grandma Moses.
  travel: Shelby Floyd prefers meticulously planned weekend getaways to culturally rich spots like the Hudson River Valley’s historic estates, the Upper Peninsula’s lighthouses, and occasional genealogical
    trips to Germany, yet leaves room for spontaneous art‑gallery detours, balancing a modest travel budget with a deep curiosity about heritage.
  culinary: Shelby Floyd enjoys farm‑to‑table cooking, often preparing beet‑goat cheese salads, grilled trout with lemon‑dill butter, and apple‑cinnamon crumble, while their garden yields fresh herbs for
    sauces, though they admit to reaching for microwave meals on hectic audit weeks.
  core: Shelby Floyd is a detail‑oriented auditor with a thriving creative side, who balances meticulous budgeting with spontaneous art projects, combats lingering anxiety through yoga, and can’t resist
    a weekend road trip to a historic museum.
background:
  cultural: As a white Midwestern American raised in the rural‑suburban fringe of Kalamazoo County, Shelby’s cultural identity is shaped by the region’s blend of agricultural heritage, manufacturing history,
    and a strong sense of community. Her family’s ancestry traces back to German and English settlers who arrived in Michigan in the early 20th century, and the values of hard work, modesty, and neighborly
    cooperation were reinforced through church involvement and local civic groups. Growing up during the economic shifts of the 1970s and 80s, she learned to value self‑reliance while also appreciating
    collective support, which manifests in her cooperative temperament. The cultural emphasis on modesty and practicality coexists with a vibrant local arts scene—regional art festivals, community theaters,
    and public libraries—providing the creative stimuli that fuel her imagination and curiosity.
