  hobbies: '[''Watercolor painting'', ''Mixed-media collage'', ''Community theater acting and set design'', ''Book club (literary fiction and art)'', ''Library volunteer (art event coordination)'', ''Community
    gardening'', ''Yoga for stress relief'', ''Dance-fit classes'', ''Genealogy research'', ''Museum and folk-art fair attendance'']'
  career_goals: She aims to transition into a senior audit manager role within the next three years, overseeing a small team of auditors at her firm and expanding her expertise into forensic accounting.
    Shelby is pursuing CPA re‑certification and plans to earn a Certified Fraud Examiner (CFE) credential to blend her analytical rigor with her love for solving abstract problems. Long‑term, she hopes
    to leverage her financial expertise to provide pro‑bono consulting for local arts and cultural nonprofits, helping them achieve fiscal sustainability while still maintaining a balanced work‑life schedule
    that allows her to nurture her personal creative pursuits.
