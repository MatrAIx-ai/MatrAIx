  career_goals: Larry aims to transition from hands‑on driving to a supervisory role within the next three years, leveraging his practical experience to become a logistics manager for a regional distribution
    center. He plans to earn a certification in transportation management and possibly a bachelor’s degree in supply chain management. Long‑term, he hopes to establish his own small fleet of eco‑friendly
    delivery trucks, providing reliable services to local businesses while maintaining the structured, dependable operation he values.
