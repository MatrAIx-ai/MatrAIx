persona_description: A New Zealand farmer who is interested in sustainable farming practices, conservation of biodiversity, and the enhancement of ecological processes on their land. They are looking for
  ways to sustainably produce food and fibre while maintaining or enhancing biodiversity and ecological processes on their farm. They are eager to learn about bird communities and their composition and
  abundance in production and natural habitats of New Zealand. They are also interested in understanding the economic benefits of species such as nitrogen fixing plants, insect pollinators, earthworms,
  and other soil invertebrates that increase soil structure and fertility, and insects, spiders, and birds that control pasture and crop pests.
