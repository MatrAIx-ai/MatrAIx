personas:
  professional: Sharaz Mukku is a budding young engineer in the making, channeling a love for LEGO Technic and Minecraft Education into early problem‑solving projects, while balancing curiosity with a practical
    urge to follow step‑by‑step instructions and improvising clever adjustments.
  sports: Sharaz Mukku kicks the ball for the Squirrel Hill youth soccer team during spring weekends, cheers for the Pittsburgh Steelers on game day, and follows the Pittsburgh Penguins in the winter, showing
    a steady commitment to local team spirit balanced with a modest, reserved presence on the field.
  arts: Sharaz Mukku immerses in graphic novels by Raina Telgemeier and sketches scenes inspired by Studio Ghibli’s Spirited Away, while humming pop tunes from Taylor Swift and listening to the melodic
    instrumental pieces that accompany family festival celebrations, reflecting a vibrant, eclectic taste that fuels both imagination and quiet reflection.
  travel: Sharaz Mukku enjoys family trips to the National Mall in Washington, D.C., and the Great Smoky Mountains, dreams of witnessing the Aurora Borealis in Norway, and prefers budget‑friendly road trips
    that fit between school and weekend schedules, balancing a love for nature with realistic travel constraints.
  culinary: Sharaz Mukku loves the aromatic blend of cumin, turmeric, and garam masala in family‑made biryani, enjoys snacking on crispy samosas and sweet gulab jamun, and proudly helps roll the dough for
    homemade naan while also perfecting a cheesy pepperoni pizza slice they claim is their own masterpiece.
  core: Sharaz Mukku, a curious yet pragmatic 7‑year‑old, balances methodical LEGO builds with spontaneous doodles, steers through schoolwork with quiet confidence, and occasionally chases after a stray
    soccer ball while secretly hoarding extra comic books under the bed.
background:
  cultural: Sharaz is a second‑generation South Asian American, born to parents who immigrated from India. He grows up in a bilingual household where English and Hindi are spoken, and his family maintains
    cultural traditions such as celebrating Diwali, Eid, and family gatherings with homemade samosas, biryani, and sweets. The family lives in the vibrant South Asian community of Pittsburgh’s Squirrel
    Hill, attending a local elementary school that embraces multiculturalism. Cultural values of respect for elders, emphasis on education, and community service are woven into his daily life, while his
    parents also encourage participation in mainstream American activities, giving Sharaz a balanced blend of South Asian heritage and American upbringing.
