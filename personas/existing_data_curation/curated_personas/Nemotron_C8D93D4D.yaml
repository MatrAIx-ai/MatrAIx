  career_goals: Sharaz dreams of becoming an engineer who designs gadgets and robots that help people in everyday life. He is fascinated by how machines work and hopes to study mechanical and aerospace
    engineering, eventually building his own rockets or sustainable inventions. He also enjoys the idea of creating his own video games, so he imagines a future as a software developer. In the short term,
    he aims to excel in science fairs, learn more advanced coding, and contribute to his school's robotics club, always balancing his curiosity with practical, doable steps.
