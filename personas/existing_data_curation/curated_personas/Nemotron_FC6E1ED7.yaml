  career_goals: Richard dreams of turning his love of art and technology into a future career. He imagines becoming a video-game designer or a digital animator who creates interactive worlds, and he sometimes
    pictures himself as an astronaut engineer building spacecraft in a studio. He hopes to lead a community robotics club where he can guide friends to build creative projects, and he aspires to publish
    his own comic-book series one day.
