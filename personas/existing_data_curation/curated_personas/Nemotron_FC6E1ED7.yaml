personas:
  professional: Richard Conklin is an energetic ten‑year‑old budding creator who merges his love for drawing cartoons, building moving LEGO sets, and tinkering in the school robotics club, dreaming of one
    day designing interactive video games that let players sketch their own worlds.
  sports: Richard Conklin dominates impromptu basketball shoot‑outs after school, organizes pick‑up soccer matches with the neighborhood crew, proudly dons a jersey from the LA Galaxy and cheers for the
    LA Lakers on game nights, and approaches each play with boundless energy and a competitive spark.
  arts: Richard Conklin devours the vibrant panels of Stan Lee’s comics, mimics the whimsical style of Calvin and Hobbes, and studies the fluid animation of Hayao Miyazaki, channeling this inspiration into
    large‑format paintings and daily sketchbooks that burst with bold colors and imaginative characters.
  travel: Richard Conklin prefers spontaneous weekend hikes in the nearby hills, yet dreams of camping under the towering redwoods of Yosemite and exploring the ancient citadel of Machu Picchu, always packing
    a sketchbook for on‑the‑go doodling and a compact LEGO set for creative breaks on the road.
  culinary: Richard Conklin loves cheesy pepperoni pizza with mozzarella and tomato sauce, mac and cheese made with sharp cheddar, and strawberry‑banana smoothies, and while they can whip up a decent peanut‑butter‑and‑jelly
    sandwich, they often experiment with slime‑inspired cupcakes that end up messier than tasty.
  core: Richard Conklin is a curious, high‑energy ten‑year‑old who sketches superheroes, builds moving LEGO contraptions, and juggles school, sports, and slime experiments, even if they frequently lose
    track of deadlines and leave crayon smudges on the living‑room sofa.
background:
  cultural: Richard is a white American growing up in Covina, a suburban city in Los Angeles County, California. The diverse Southern California environment exposes him to a blend of cultures through friends,
    community festivals, and school programs. His family celebrates mainstream American holidays such as Thanksgiving, Halloween, and Christmas, while also enjoying local traditions like summer parades
    and regional Mexican food from neighborhood gatherings. The area’s strong emphasis on arts and STEM education provides him with access to after-school clubs, museum trips, and at-home creativity. The
    sunny, beach-proximate lifestyle and the multicultural tapestry of LA County shape his open‑minded outlook and love for varied experiences.
