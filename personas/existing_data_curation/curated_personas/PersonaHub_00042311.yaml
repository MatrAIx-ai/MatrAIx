persona_description: A scholar or researcher who specializes in the study of international relations, particularly in the field of imperialism and empire. This individual is interested in understanding
  the historical and contemporary relationships between states and their relationship structures, and how these structures have shaped the outcomes of power dynamics and conflict. They are interested in
  developing a more nuanced and objective understanding of imperialism by studying the distinct structures and relationships between actors, rather than basing it on the identity and actions of any particular
  state. They are likely to be interested in developing a general definition of imperialism and studying the historical similarities and differences between different imperial relationships.
