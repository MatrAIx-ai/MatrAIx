  career_goals: Although retired, Sandra’s primary ambition is to preserve her independence and continue contributing to her community. She aims to document her family’s history in a written memoir and
    digitize photographs for future generations. Sandra hopes to teach a small weekly knitting circle at the senior center, sharing her craft with a handful of eager learners. She also wishes to master
    a new smartphone app to improve video communication with her grandchildren and to become a reliable mentor for volunteer coordinators, ensuring that senior‑center activities run smoothly. Finally, she
    wants to organize a modest care‑package initiative through her church to support local families in need.
