  hobbies: '[''Minecraft sandbox building'', ''Leisure basketball at neighborhood park'', ''Comic sketching and character design'', ''Reading fantasy adventure books'', ''Watching science educational videos'',
    ''Listening to pop/rock music while building LEGO'']'
  career_goals: James dreams of turning his love for games and technology into a career as a video game developer or robotics engineer. He hopes to join a competitive robotics team in middle school, earn
    a scholarship to a STEM‑focused high school, and eventually study computer science at a university. While his competitive streak drives him to be the best on his team, his practical side wants his work
    to have real‑world impact, such as creating educational games that help other kids learn. He also aspires to be financially stable, motivated by his occasional anxiety about the future.
