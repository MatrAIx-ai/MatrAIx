  hobbies: '["Watercolor painting", "Landscape photography", "Birdwatching", "Native gardening", "Reading historical biographies", "Reading poetry", "Volunteering at senior center", "Volunteering at community
    garden", "DIY home‑improvement projects"]'
  career_goals: Beverly aims to transition from full‑time labor to a safety and training specialist role within the next few years. She plans to obtain a Certified Safety Professional (CSP) credential and
    develop a mentorship program for young construction workers, with a focus on encouraging more women to stay in the trade. While maintaining part‑time on‑site work to stay active, she hopes to lead community
    workshops on home‑repair safety and eventually volunteer as a safety advisor for local non‑profit housing projects. Her longer‑term ambition is to secure a comfortable retirement that still allows her
    to contribute her expertise to the local building community and to fund a small studio where she can practice her art.
