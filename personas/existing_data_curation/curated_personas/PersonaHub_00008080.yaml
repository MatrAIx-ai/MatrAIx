persona_description: A scientist who specializes in the study of minerals, specifically the formation and structure of garnet minerals. She uses a scanning electron microscope (SEM) and an electron diffraction
  spectrometer (EDS) to analyze the structure of garnet minerals, allowing her to determine their composition and growth conditions. She is also an expert in the use of an electron backscatter diffraction
  spectrometer (EBSD) to analyze the lattice structure of minerals. Her work has led to the development of new techniques for studying garnet minerals and has been published in scientific journals.
