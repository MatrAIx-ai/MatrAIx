persona_description: A Systems Engineer who specializes in the pre-shipment testing and quality assurance of IBM System/7 computers. This person is responsible for checking the assembly process of the System/7,
  ensuring that all sub-units function correctly and diagnose any potential problems during the testing process. They use specialized equipment and software, such as IBM 1130 computers, automatic system
  entry devices, direct digital test modules, input/output testers, and test station power systems, to perform the pre-shipment testing. They are skilled in troubleshooting and diagnosing failures, and
  are familiar with the IBM System/360 Model 40 system for storing test programs and common data.
