personas:
  professional: Teresa Murielrivera is a diligent painting worker who mastered surface preparation, low‑VOC applications, and decorative techniques while quietly brainstorming mural concepts inspired by
    folk motifs, leveraging her calm demeanor to meet tight deadlines and keep crews harmonious.
  sports: Teresa Murielrivera enjoys weekend hikes with the Atlanta Hiking Club, follows the Atlanta Braves in spring and the Atlanta Falcons in fall, mixes occasional yoga sessions at a local studio to
    stretch after painting days, and prefers low‑impact cardio over competitive team sports.
  arts: Teresa Murielrivera immerses herself in watercolor studies of Georgia’s pine forests, draws inspiration from Frida Kahlo’s vibrant palettes, visits the High Museum of Art to view contemporary installations,
    and finds solace in reading poetry by Ocean Vuong and fiction by Chimamanda Ngozi Adichie.
  travel: Teresa Murielrivera prefers solo, low‑budget itineraries that blend nature and culture, has trekked parts of the Appalachian Trail, savored street food during a short trip to Oaxaca, dreams of
    exploring the mural‑rich streets of Guanajuato and the architecture of Barcelona, and always books a modest Airbnb near local art scenes.
  culinary: Teresa Murielrivera experiments with traditional Mexican dishes like mole poblano, chiles en nogada, and tamales, uses fresh ingredients such as ancho chilies, corn masa, and heirloom tomatoes,
    enjoys the tactile process of hand‑rolling tortillas, and balances her love of bold flavors with occasional Southern comfort food like collard greens.
  core: Teresa Murielrivera is a quietly ambitious painter who blends meticulous craftsmanship with vivid folk‑inspired art, saves diligently for a future mural studio, battles occasional back aches, and
    secretly hoards extra watercolor pencils for late‑night sketch sessions.
background:
  cultural: Teresa is a first‑generation Mexican American whose family maintains strong ties to their heritage. Spanish is spoken at home, and she grew up celebrating Día de los Muertos, Semana Santa, and
    other Mexican traditions. The vibrant colors and storytelling of Mexican folk art—such as Talavera tiles, papel‑maché, and mural painting—have shaped her aesthetic sensibility. Living in Acworth, GA,
    she blends these cultural influences with Southern hospitality, valuing community and hard work. Her Mexican roots inspire her artistic pursuits and her desire to incorporate culturally meaningful motifs
    into her professional painting projects.
attributes:
  skills: '[''Residential painting'', ''Surface preparation and priming'', ''Color mixing and custom shade creation'', ''Faux finishing and stencil work'', ''Application of low‑VOC and specialty paints'',
    ''Safety compliance and PPE usage'', ''Basic blueprint interpretation'', ''Project organization and time management'', ''Problem solving on tricky substrates'', ''Customer communication and cooperation'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art museums and galleries'', ''Reading contemporary fiction and poetry'', ''Hiking in local parks'', ''Nature photography'', ''Cooking traditional
    Mexican dishes'', ''Journaling'', ''DIY home décor projects'']'
  career_goals: Teresa aims to become a certified master painter and eventually launch her own boutique painting and mural business that blends her technical expertise with her artistic passion. She plans
    to pursue an apprenticeship in commercial painting to gain advanced certifications, especially in sustainable, low‑VOC applications. Her long‑term ambition includes creating culturally informed murals
    and decorative finishes that showcase Mexican folk motifs, contributing to community art projects in Georgia while maintaining a reputation for reliability and high‑quality craftsmanship. Additionally,
    she is interested in expanding her knowledge of interior design to offer holistic aesthetic services to clients.
