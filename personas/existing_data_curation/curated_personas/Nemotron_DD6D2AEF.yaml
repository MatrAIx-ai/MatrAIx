  hobbies: '[''Community Theater'', ''Karaoke'', ''Vietnamese Cooking'', ''Boating'', ''Trivia Nights'', ''Street Photography'', ''Youth Mentorship'']'
  career_goals: Thang aims to advance from first‑line supervisor to a district manager role within the next few years, overseeing multiple stores and driving data‑centric sales growth across the region.
    He seeks to embed mentorship into the corporate culture, establishing a structured program to develop the next generation of retail leaders. Post‑retirement, he envisions leveraging his dual expertise
    in technology and retail by offering consulting services to small businesses looking to modernize their operations. A long‑term ambition is to launch a community‑focused tech and gadget shop that serves
    seniors and hobbyists in Egg Harbor Township, merging his love of practical innovation with his desire to give back locally.
