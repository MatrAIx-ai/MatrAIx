persona_description: A professional electronics engineer who specializes in the design and analysis of flexible circuits, particularly in the context of flex-rigid designs. This persona has extensive experience
  in developing robust and reliable circuitry that can withstand the challenges of manufacturing in the flex environment. They are skilled in the use of Xpedition software to route flexible circuits, and
  are familiar with the intricacies of flex-rigid design, including the need for accurate and detailed routing, the importance of signal integrity analysis, and the use of DRC to ensure manufacturability.
  This persona is adept at using ODB++ and other design tools to safely communicate all flex-specific information, and is well-versed in the use of Xpedition to address rigid-flex design challenges.
