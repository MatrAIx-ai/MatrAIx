persona_description: A political scientist who specializes in the study of lobbying and its impact on democratic governance. The individual is interested in understanding how lobbying codes and regulations
  are implemented and enforced in different countries, and how they affect the political process and public trust in government. They are also interested in the potential consequences of lobbying on democracy
  and the rule of law, and how they can be mitigated through effective regulation and oversight. The persona is likely to have expertise in comparative politics, comparative law, and political economy,
  and is interested in using this knowledge to inform policy decisions and advocacy efforts.
