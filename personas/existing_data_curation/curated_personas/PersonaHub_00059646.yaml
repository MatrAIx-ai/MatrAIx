persona_description: A male researcher or dermatologist who is interested in the biological properties of scalp skin and the causes and treatments of dandruff, particularly in men. He/she is knowledgeable
  about the differences and similarities between male and female scalp skin, the hormonal factors that contribute to the high prevalence of dandruff in men, and the effects of stress, smoking, and undernourishment
  on dandruff formation. The persona is also interested in using antifungal shampoos specifically targeting the main microbe, Malessezla globose, responsible for dandruff formation and the effectiveness
  of using such shampoos in controlling dandruff symptoms and signs.
