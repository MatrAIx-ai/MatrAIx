personas:
  professional: Dura Quiel, a veteran educator with 15+ years of teaching experience in Blackfoot's public schools, blends interdisciplinary curriculum design, technology integration, and compassionate
    classroom management with a curiosity‑driven, flexible approach that often embraces spontaneous project ideas despite occasional disorganization.
  sports: Dura Quiel, an avid weekend hiker and yoga enthusiast, follows the Boise State Broncos football team, cheers for the Idaho Steelheads hockey club, and participates in the Blackfoot Trail Runners
    Club's seasonal trail runs, using these activities to counterbalance classroom stress while occasionally missing a session due to worry.
  arts: Dura Quiel channels curiosity into watercolor paintings inspired by the luminous style of John Singer Sargent, captures Blackfoot’s vistas à la Ansel Adams, molds pottery while listening to Joanna
    Newsom's experimental folk, draws literary fuel from N.K. Jemisin and Ocean Vuong, and regularly volunteers at the Blackfoot Arts Festival to showcase emerging talent.
  travel: Dura Quiel prefers spontaneous road trips to Idaho’s hidden gems like Craters of the Moon and the Snake River Canyon, while also yearning for reflective pilgrimages to Kyoto’s Zen gardens and
    Florence’s frescoed walls, balancing weekend getaways with occasional longer overseas journeys when budget permits.
  culinary: Dura Quiel, an intermediate home chef, delights in farm‑to‑table cooking, often preparing Idaho potato rosemary mash, wild mushroom risotto with fresh sage, and a quinoa‑beet salad dressed with
    lemon‑mint vinaigrette, while occasionally splurging on locally sourced bison stew during community potlucks.
  core: Dura Quiel is a curiosity‑driven educator who juggles spontaneous creativity with chronic disorganization, turning stress into watercolor swirls and yoga breaths while worrying about the next lesson
    plan.
background:
  cultural: Dura Lynn is a white American who grew up in the intermountain West, with family roots in small‑town farming communities of Idaho. The region’s emphasis on self‑reliance, close‑knit community
    ties, and reverence for the natural environment has shaped her values of independence, stewardship, and collaborative spirit. Her college education exposed her to diverse cultural and artistic perspectives,
    fostering an openness to unconventional ideas while still grounding her in the modest, pragmatic ethos of rural Idaho. This blend of local tradition and broader cultural curiosity informs her teaching
    style, community involvement, and personal interests.
attributes:
  skills: '[''Interdisciplinary Curriculum Design'', ''Differentiated Instruction'', ''Technology Integration'', ''Project‑Based Learning'', ''Formative Assessment'', ''Compassionate Classroom Management'',
