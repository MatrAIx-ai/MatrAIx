    for Creative Projects'']'
  hobbies: '[''Watercolor Painting'', ''Pottery'', ''Landscape Photography'', ''Hiking in the Sawtooth Mountains'', ''Reading Speculative Fiction'', ''Contemporary Poetry'', ''Yoga'', ''Journaling'', ''Community
    Gardening'', ''Farm‑to‑Table Cooking'', ''Participating in Local Arts Festivals'', ''Creative Writing Workshops'']'
  career_goals: Looking ahead, Dura aims to transition into a district‑level curriculum specialist role where she can champion arts‑infused and flexible learning models across multiple schools. She plans
    to earn a master’s degree in Educational Leadership or Counseling to deepen her capacity for systemic change and student mental‑health support. Her ambitions include designing professional development
    workshops that help teachers integrate unconventional thinking into daily lessons, influencing policy to embed mindfulness and stress‑reduction practices in school routines, and eventually serving as
    a principal or instructional coach who mentors teachers in balancing creativity with academic standards. She also hopes to author a guidebook on adaptable lesson planning for educators in rural settings.
