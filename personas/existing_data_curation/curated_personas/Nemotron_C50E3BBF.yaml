personas:
  professional: Sherry Bivins, an aspiring administrative professional, leverages meticulous event‑planning expertise, Excel budgeting, and Instagram content creation to streamline campus club operations
    while they pursue a CAPM certification and aim for a future in community‑focused project management.
  sports: Sherry Bivins, a weekend hiker of the San Gabriel Mountains and occasional Zumba enthusiast, roots for the Los Angeles Lakers in the NBA season and the LA Galaxy in MLS, and they also join pickup
    beach volleyball games at Santa Monica during summer months.
  arts: Sherry Bivins draws artistic inspiration from Beyoncé’s empowering choreography, reads contemporary novels by Sally Rooney and Celeste Ng, and they unwind with TV series like 'Killing Eve' and films
    starring Charlize Theron, while curating Instagram visuals that blend street‑wear aesthetics with community‑centered themes.
  travel: Sherry Bivins, a budget‑savvy traveler who plans itineraries in Excel, has explored the desert art installations of Joshua Tree and coastal sunsets of Santa Barbara, dreams of a spring pilgrimage
    to Oaxaca’s culinary festivals, and they save for a solo trek through Japan’s cherry‑blossom trails, balancing adventure with limited student funds.
  culinary: Sherry Bivins, an intermediate home chef, routinely blends soul‑food staples like smoked collard greens and cornbread with Mexican staples—chipotle‑marinated chicken tacos topped with fresh
    cilantro, avocado, and homemade masa tortillas—while they experiment with spice rubs featuring cumin, smoked paprika, and a dash of gochujang for a cross‑cultural twist.
  core: Sherry Bivins, a fiercely organized 18‑year‑old who juggles hip‑hop classes, budget spreadsheets, and late‑night Netflix binges, often forgets to water their succulents and leaves coffee mugs on
    the couch, yet they never miss a deadline.
background:
  cultural: Sherry identifies as African‑American and grew up in a culturally diverse Southern California suburb. Her family’s roots trace back to the Southern United States, and she cherishes traditions
    like family gatherings with gospel music, soul‑food cooking, and storytelling. Living in Rancho Cucamonga, she blends these influences with the broader West Coast culture—enjoying R&B, hip‑hop, and
    the vibrant multicultural community around her. She regularly participates in local Juneteenth celebrations and volunteers with a church youth group, which reinforces her sense of community and cultural
    pride. Sherry draws inspiration from both historic civil‑rights leaders and contemporary Black entrepreneurs, shaping her aspirations to give back to her community while forging her own professional
    path.
attributes:
  skills: '["Event planning and coordination", "Schedule and time management", "Microsoft Office Suite", "Google Workspace", "Basic budgeting and bookkeeping", "Clear and assertive communication", "Social
    media content creation", "Data analysis with Excel", "Collaborative teamwork"]'
  hobbies: '["Hip‑hop dance classes", "Cooking soul‑food and fusion dishes", "Volunteering at community food bank", "Mentoring youth", "Hiking in San Gabriel Mountains", "Digital photography", "Reading
    contemporary fiction", "Watching movies and TV series with strong female leads"]'
  career_goals: Sherry aims to complete an Associate’s degree in Business Administration within the next two years, followed by a certification in project management (CAPM). In the short term, she hopes
    to secure an entry‑level role as an administrative assistant or marketing coordinator at a local company, where she can apply her organizational and communication strengths. Long‑term, she envisions
    becoming a project manager or community outreach coordinator, possibly launching her own boutique that blends culturally inspired apparel with community‑focused events. Her goals are grounded in a desire
    for a stable, structured career path that still offers room for creativity and community impact.
