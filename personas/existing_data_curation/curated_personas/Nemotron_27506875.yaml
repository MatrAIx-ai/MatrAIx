personas:
  professional: Jenna, an aspiring junior engineer who loves building tidy LEGO models and drawing precise animal sketches, leverages their competitive spirit and love for clear instructions to tackle school
    science projects with meticulous planning.
  sports: Jenna, a member of the Jenison Jr. Soccer Club who cheers for the Detroit Lions and the Michigan State Spartans during game day, trains on the local field every Thursday, competes fiercely in
    scrimmages while keeping a tidy water bottle on the sidelines, and also enjoys building snow forts as winter cross-training.
  arts: Jenna, an avid reader of the Magic Tree House series who draws realistic animal portraits and sings along to songs by Laurie Berkner and The Wiggles while watching nature documentaries narrated
    by David Attenborough, blends creative play with structured learning, and proudly displays their Girl Scout badge collection like an art exhibit.
  travel: Jenna, who loves planning family trips with a printable checklist, has explored the Henry Ford Museum in Dearborn, camped at Holland State Park during a weekend adventure, and dreams of visiting
    the Kennedy Space Center in Florida to see a real rocket launch.
  culinary: Jenna, a cupcake enthusiast who follows their mom's chocolate cupcake recipe step-by-step using cocoa powder, vanilla extract, and rainbow sprinkles, practices measuring flour and sugar with
    a child-sized scale, and enjoys packing a lunch of peanut butter-jelly sandwiches with sliced apples and carrot sticks.
  core: Jenna blends a love for orderly LEGO builds with a competitive edge on the soccer field, balancing structured routines with occasional spontaneous nature explorations, all while staying reliably
    polite and punctual.
background:
  cultural: Jenna comes from a white, Midwestern American family in Jenison, Michigan. Her heritage includes German and Irish ancestry, and her family follows a Protestant Christian tradition, celebrating
    holidays such as Thanksgiving, Christmas, and Easter. The community places a strong emphasis on politeness, punctuality, and involvement in school and local events like the Ottawa County Fair. She attends
    a public elementary school where multicultural awareness is encouraged, yet her day‑to‑day life reflects classic Midwestern values of practicality, reliability, and a love for seasonal outdoor activities
    such as walking the trails in the summer and building snow forts in the winter.
