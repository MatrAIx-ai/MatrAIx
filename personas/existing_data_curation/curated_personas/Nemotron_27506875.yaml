    and brain teasers", "Girl Scouts badge activities", "Watching educational wildlife and space videos"]'
  career_goals: Jenna dreams of a future where she can work with animals and solve real‑world problems. She often talks about becoming a veterinarian or a wildlife biologist because she loves caring for
    her family’s pet rabbit and the neighborhood squirrels. She also enjoys science experiments at school and hopes to compete in science fairs, aiming to be “the best” in her class. Occasionally she mentions
    wanting to be an astronaut after reading about space missions, seeing it as a way to explore new frontiers while using her love of structure and clear goals. Overall, her ambition is to pursue a career
    that combines curiosity, problem‑solving, and the chance to excel in competitions.
