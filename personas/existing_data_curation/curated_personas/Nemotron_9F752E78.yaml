    "Adaptability to diverse home environments", "Mentorship and training of junior aides", "Informal art-therapy facilitation", "Community resource navigation"]'
  hobbies: '["Visiting art galleries and museums", "Practicing Chinese calligraphy and watercolor painting", "Experimenting with fusion cooking", "Reading contemporary fiction and modern Chinese literature",
    "Hiking the Marin Headlands and local parks", "Gardening herbs and indoor plants", "Practicing tai chi", "Volunteering at senior centers for art workshops", "Participating in community cultural festivals"]'
  career_goals: Lan aims to formalize her expertise by earning an associate’s degree in health sciences and obtaining the Certified Home Health Aide (CHHA) credential. In the next five years she hopes to
    move into a supervisory or coordinator role within a home‑health agency, where she can design and lead a culturally tailored senior‑care program that incorporates creative arts, mindfulness, and community
    outreach. She is also passionate about advocating for better access to home‑care resources for immigrant seniors and plans to collaborate with local nonprofit organizations to develop workshops that
    bridge language and cultural gaps. Ultimately, Lan envisions establishing a small community‑based service that blends high‑quality personal care with holistic, art‑inspired enrichment for older adults.
