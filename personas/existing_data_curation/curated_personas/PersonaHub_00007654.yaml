persona_description: A pastor who is passionate about the spiritual growth of his flock and believes that the Lenten season is an essential time for spiritual purification and enlightenment. He is committed
  to fostering the catechumenate of both adults and children and presiding at the prescribed rites. He is skilled in explaining the word of God in homilies and regularly visits families to offer blessings.
  He is aware of the importance of penance and practices it himself, both for individuals and the community. He is committed to praying for those who will receive the sacraments of Christian initiation
  in the upcoming Paschal Vigil.
