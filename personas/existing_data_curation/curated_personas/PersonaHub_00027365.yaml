persona_description: A public health official or epidemiologist who specializes in the investigation and control of foodborne outbreaks caused by E. coli, particularly the O104:H4 strain. This individual
  has extensive experience in identifying and tracking the source of contamination, analyzing epidemiological data, and developing effective strategies for preventing future outbreaks. They are highly knowledgeable
  about the biology and genetics of E. coli, as well as the clinical manifestations of the disease. They are also familiar with the regulatory and legal frameworks governing the handling and distribution
  of food, and the responsibilities of health care professionals in managing foodborne illnesses.
