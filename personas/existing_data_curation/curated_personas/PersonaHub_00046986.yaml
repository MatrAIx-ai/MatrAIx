persona_description: A water utility worker who is responsible for monitoring and issuing Boil Water Advisories in affected areas. They must be knowledgeable in water infrastructure, emergency response,
  and the protocols for issuing advisories. They must be able to communicate effectively with the public, providing clear and concise information about the advisories and the steps to take to ensure safety.
  They must also be able to follow up with customers to ensure that they have followed the recommended precautionary measures and that the water system has been restored.
