  career_goals: While still young, Gay Nicole already talks about wanting to work in a place where she can keep things tidy and help others learn. She says she would love to become a teacher or a librarian
    one day, because those roles involve books, routines, and organized spaces. She also imagines helping animals as a veterinarian, reflecting her curiosity about caring for living things. Her short‑term
    ambition is to master reading and to earn a "big kid" badge for completing a classroom responsibility chart.
