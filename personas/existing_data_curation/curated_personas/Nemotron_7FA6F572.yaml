  career_goals: Tammy aspires to attend a university where she can study communications or social work, with the long‑term goal of becoming an event planner for community organizations or a youth program
    coordinator. She hopes to leverage her organizational talents and people‑skills to design programs that empower other Black youth in New Bern. In the near future, she plans to secure a part‑time internship
    at a local nonprofit or a summer job in a community center to gain hands‑on experience.
