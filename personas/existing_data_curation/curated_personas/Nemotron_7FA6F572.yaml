personas:
  professional: Tammy Rosa, a 16‑year‑old aspiring event coordinator, they channel their knack for organized planning and digital content creation into leadership of school club activities, choreographing
    community dance workshops, and producing promotional videos, all while brightening gatherings with natural charisma and reliable execution.
  sports: Tammy Rosa, 16, they shoot hoops with the New Bern Lady Hoops club after school, follow the Charlotte Hornets and the Carolina Panthers for professional thrills, and cheer on the UNC Tar Heels
    during March Madness, while maintaining fitness through daily jump‑rope sessions and weekend pick‑up games at the community center.
  arts: Tammy Rosa, 16, they blend hip‑hop dance classes at the community center with soulful choir rehearsals at their historic church, drawing inspiration from artists such as Beyoncé, Lizzo, and the
    gospel harmonies of the Clark Sisters, while they craft DIY décor for school events and edit TikTok videos set to the latest rap tracks.
  travel: Tammy Rosa, 16, they favor budget‑friendly road trips, often spending Saturdays exploring Wilmington’s riverfront boardwalk or hiking the Blue Ridge Parkway near Asheville, and they eagerly anticipate
    a future family vacation to New Orleans for its music scene and to Washington, D.C. for the Smithsonian museums.
  culinary: Tammy Rosa, 16, they love cooking family recipes like collard greens simmered with smoked turkey and buttery cornbread, while also mastering mac and cheese and sweet‑potato pie, showing intermediate
    kitchen skills and a penchant for swapping recipe ideas on TikTok.
  core: Tammy Rosa, 16, they are an organized, talkative community‑focused teen whose love of dance, planning, and local traditions fuels a relentless drive to empower peers, even if they sometimes over‑commit
    and forget to rest.
background:
  cultural: Tammy is an African‑American teen raised in New Bern, a city with deep roots in Black history and the legacy of the Civil War era. Her family places a strong emphasis on community, faith, and
    the preservation of Southern Black traditions, such as gospel music, storytelling, and cooking family recipes like collard greens and cornbread. She regularly attends a historically Black church, where
    she participates in choir and service projects. Growing up in Craven County, she is aware of the challenges faced by Black youth and draws pride from the city’s annual Juneteenth celebrations and local
    cultural festivals that honor African‑American heritage.
