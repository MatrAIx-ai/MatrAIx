  career_goals: He aims to transition from senior program manager to director‑level leadership within the next three to five years, driving large‑scale digital transformation initiatives for government
    and commercial clients. Kamran plans to broaden his strategic influence by completing an executive MBA, launching a cross‑industry innovation lab that merges technology with artistic design, and eventually
    co‑founding a consultancy that helps organizations embed creativity into tech product pipelines. He also aspires to mentor a diverse next generation of engineers and champion inclusive, collaborative
    cultures across his organization.
