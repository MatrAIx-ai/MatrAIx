persona_description: A researcher in economics who is interested in understanding the impact of different methods for setting the minimum wage on its level and the trade-off between reducing poverty among
  working people and shutting down low productivity jobs. The researcher is particularly interested in the implications of the setting regime on the level of the minimum wage and how it relates to the process
  of setting the minimum wage. The researcher is likely to have a background in economics, econometrics, or labor economics and has experience in analyzing data on minimum wages in different countries over
  time. The researcher is also likely to be interested in the theoretical implications of the model developed in the paper and the implications of the findings for policy-making.
