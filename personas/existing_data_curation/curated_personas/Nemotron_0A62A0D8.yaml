personas:
  professional: Marcos Muniz, a budding LEGO architect and imaginative storyteller, channels their curiosity and love for colorful doodles into building intricate structures while delighting friends with
    spontaneous games and narratives, and they show a relaxed approach to rules and a natural talent for leading group play.
  sports: Marcos Muniz, a lively member of the Little Rock Youth Soccer Club, dashes around the field as a forward for the junior team, cheers on the Arkansas Razorbacks during basketball season, and spends
    weekend mornings practicing T‑ball with friends at the local park, reflecting their sociable energy and love for teamwork, and they thrive on the camaraderie of team sports.
  arts: Marcos Muniz, a vivid doodler who fills sketchbooks with bright, fantastical creatures, sways to the rhythms of traditional folk songs and contemporary pop hits from artists like Luis Miguel and
    Ariana Grande, and eagerly attends community mural workshops featuring local street artists, allowing their creative spirit to blossom through both music and visual art, and they love sharing their
    drawings with friends.
  travel: Marcos Muniz enjoys spontaneous family road trips to the Gulf Coast’s sandy beaches and loves visiting the nearby Hot Springs National Park, while dreaming of future adventures to the bustling
    streets of New Orleans and the ancient ruins of Machu Picchu, balancing their flexible planning style with a craving for new experiences, and they often pack a sketchbook to capture scenes along the
    way.
  culinary: Marcos Muniz, an enthusiastic junior chef, loves helping stir sizzling carnitas for tacos and shaping masa for tamales, often sprinkling fresh cilantro and lime on the plates, and they proudly
    showcase their budding cooking skills by creating colorful fruit salads with pineapple, mango, and a dash of chili powder.
  core: Marcos Muniz is a curious, talkative seven‑year‑old who blends vivid imagination with a love for building, music, and family traditions, while they juggle a carefree approach to chores and a habit
    of forgetting to tidy up after play.
background:
  cultural: Marcos is raised in a Mexican‑American household in Little Rock, Arkansas. At home, Spanish is spoken alongside English, and family traditions such as Día de los Muertos, quinceañera celebrations,
    and weekly family meals featuring tacos, tamales, and arroz con frijoles are cherished. His parents emphasize the values of community, respect, and storytelling, often sharing folk tales from Mexico.
    While he participates in local Arkansas community events and school activities, he also maintains strong ties to his Mexican heritage through language, music, dance, and cuisine, blending both cultures
    in his everyday life.
