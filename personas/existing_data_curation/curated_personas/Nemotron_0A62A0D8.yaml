  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Improvisational play and game creation'', ''Listening to music (Mexican folk and pop)'', ''Reading multicultural picture books'', ''Nature walks
    and collecting natural objects'', ''Helping with cooking (especially Mexican dishes)'']'
  career_goals: Marcos dreams of becoming someone who can combine his love for art and his wish to help others. He often says he wants to be a teacher or an artist who creates murals that make people smile
    and bring his community together. He also imagines working in a children's museum or community center where he can share stories from his Mexican heritage and encourage other kids to explore their creativity.
