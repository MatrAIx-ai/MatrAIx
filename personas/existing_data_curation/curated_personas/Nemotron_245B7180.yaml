  career_goals: Daniel aims to pursue a career that fuses his love for art and technology, such as becoming a game developer or UX/UI designer. He plans to attend a specialized high-school arts program,
    then study interactive media or visual communication at university. He dreams of creating his own indie game that encourages creativity, winning state-level robotics competitions, and eventually leading
    a creative team at a tech or advertising firm. He also hopes to give back by organizing community art workshops for younger kids.
