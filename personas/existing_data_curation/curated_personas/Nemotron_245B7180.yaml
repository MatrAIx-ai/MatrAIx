personas:
  professional: Daniel Cosby is a budding digital artist who blends his methodical, organized workflow with a curious, open‑minded approach, producing intricate fan‑art illustrations and prototype game
    assets while leveraging his competitive drive to win local art fair contests and earn a spot in the school’s multimedia club.
  sports: Daniel Cosby plays on his middle‑school basketball and soccer teams, keeps a close eye on the Colorado Avalanche and Denver Broncos for inspiration, and volunteers as a junior coach at the Loveland
    community center, channeling his competitive edge into both personal improvement and team leadership.
  arts: Daniel Cosby immerses himself in drawing, digital illustration, and acoustic guitar, drawing creative fuel from indie films like "Moonlight" and "The Grand Budapest Hotel," admiring artists such
    as Hayao Miyazaki and Banksy, and frequenting local art fairs to spot emerging design trends and network with fellow creators.
  travel: Daniel Cosby dreams of swapping Colorado’s mountain trails for Tokyo’s anime districts, has already toured the Rocky Mountain National Park and the Denver Art Museum, and plans to save for a spring
    backpacking trip to Portland’s vibrant maker scene and a future visit to Paris’s Louvre for artistic inspiration.
  culinary: Daniel Cosby favors quick, flavor‑packed meals like homemade tacos with cilantro and lime, spicy ramen bowls, and avocado toast, enjoys experimenting with fresh basil and smoked paprika in his
    limited kitchen, but admits he often relies on pizza delivery after late‑night gaming marathons.
  core: Daniel Cosby is a calm, competitively‑driven teen whose curiosity fuels a disciplined pursuit of art, sports, and strategic saving, balancing methodical planning with a quirky habit of late‑night
    gaming and occasional eye‑strain neglect.
background:
  cultural: Daniel grew up in a middle-class white family in Loveland, Ohio, a suburb with strong Midwestern values of community, modesty, and hard work. His ancestry is primarily German-American, and family
    traditions include church gatherings, local festivals such as the Loveland Summer Festival, and a focus on school involvement. He has been shaped by the public-school system, local sports culture, and
    the region's blend of traditional American customs with contemporary pop culture, fostering an appreciation for both classic art forms and modern digital media.
