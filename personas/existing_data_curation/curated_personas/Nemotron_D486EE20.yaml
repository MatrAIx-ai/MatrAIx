  hobbies: '[''Art history reading'', ''Virtual museum tours'', ''Watercolor painting'', ''Quilting'', ''Knitting'', ''Gardening'', ''Cooking Southern dishes'', ''Listening to gospel and jazz'', ''Journaling'',
    ''Puzzle solving'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Myrna aims to deepen her artistic practice by completing a community‑based quilting exhibition that celebrates African‑American heritage in Douglas.
    She plans to enroll in a local college's certificate program in digital photography to document her garden and neighborhood. Myrna also aspires to write and self‑publish a memoir that intertwines her
    family’s oral histories with reflections on the civil‑rights era, and to mentor younger community members in crafts and genealogy, offering them both creative outlets and a sense of rooted identity.
