personas:
  professional: Myrna Harding, a retired community volunteer now channeling her organizational precision and competitive streak into a heritage quilting exhibition while pursuing a digital photography certificate
    to document her garden and neighborhood, exemplifies how her curiosity and love for solitary creation shape her evolving role as a cultural chronicler.
  sports: Myrna Harding enjoys gentle morning walks in her garden and joins the local senior walking club, while cheering on the Atlanta Falcons in football season and the Georgia Southern Eagles basketball
    team, yet she rarely participates in organized sports, preferring solitary movement over team competition.
  arts: Myrna Harding immerses herself in watercolor landscapes inspired by Monet and the narrative quilts of Faith Ringgold, listens to gospel legends like Mahalia Jackson and jazz icons such as John Coltrane
    while painting, and attends quarterly performances at the historic Fox Theatre, allowing her creative curiosity to fuel both her visual and auditory artistic passions.
  travel: Myrna Harding favors low‑key road trips to historic Southern towns like Savannah and Charleston, has taken a pilgrimage to Accra to explore ancestral roots, and dreams of a quiet retreat in the
    Blue Ridge Mountains, often planning trips months ahead using free online tools while balancing a modest travel budget with her fixed retirement income.
  culinary: Myrna Harding excels at soul‑food cooking, perfecting dishes like collard greens seasoned with smoked turkey, sweet‑potato pie, and tomato‑and‑okra stew, while experimenting with heirloom tomatoes
    and fresh herbs from her garden, yet she sometimes devours a second helping of cornbread when feeling anxious.
  core: Myrna Harding blends meticulous organization, solo artistic pursuits, and a deep‑rooted reverence for heritage into a quietly ambitious life, channeling her anxiety and competitive edge into community
    projects, garden stewardship, and an ever‑growing quilt narrative.
background:
  cultural: Myrna is an African‑American woman born and raised in Douglas, Georgia, a small town in Coffee County with deep Southern roots. Growing up during the latter stages of the Civil Rights movement,
    she was shaped by a close‑knit Black community that emphasized church fellowship, gospel music, storytelling, and resilience. Family traditions of soul‑food cooking, oral history, and craftwork—especially
    quilting—have been central to her identity. She maintains connections to regional cultural events such as the annual Black Heritage Festival and local church choirs, while also honoring the broader
    African‑American diaspora through her appreciation of art, music, and historical narratives.
