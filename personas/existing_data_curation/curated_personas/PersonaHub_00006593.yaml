persona_description: A historian who is interested in the history of West Oakland, particularly in the context of the I-880 Cypress Freeway Replacement project. This person is likely to have a strong interest
  in the field of archaeology and is familiar with the project's findings. They are also likely to have a background in anthropology and have a deep understanding of the material conditions of life in West
  Oakland. They are interested in the politics of the Victorian parlor and the adaptive strategies of households, and they are interested in the people of the neighborhood, including the archaeology of
  gender, the material culture of the “aristocracy of labor,” the Overseas Chinese and laundry work, the archaeology and landscape of lodging, and the archaeology and near 150-year history of African Americans
  in West Oakland. They are also interested in the historical associations of each archaeological feature and the statistical studies of faunal and glass remains.
