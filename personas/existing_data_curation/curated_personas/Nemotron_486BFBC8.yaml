personas:
  professional: Detia Malik, a 46‑year‑old interior designer, blends meticulous space planning, color theory, and sustainable sourcing with a curiosity for emerging trends; they leverage CAD, SketchUp,
    and hand‑sketching to craft warm, community‑focused interiors, and their relaxed attitude toward strict timelines nurtures cooperative, empathetic client collaborations.
  sports: Detia Malik, an avid nature lover who values quiet activity over competition, spends weekends hiking pine‑lined trails, cheers for the New Orleans Saints in the NFL and the Memphis Grizzlies in
    the NBA, and participates in a local women's pick‑up basketball league; they view exercise as a restorative ritual rather than a competitive sport.
  arts: Detia Malik, a creative soul inspired by soulful visual and musical storytelling, draws artistic energy from Jacob Lawrence’s paintings, H.E.R.’s melodic narratives, and classic films of Sidney
    Poitier; they often quote these influences while knitting modern quilts that echo vintage patterns and regularly attend church choir concerts and community art showcases.
  travel: Detia Malik, a thoughtful traveler who prefers low‑key road trips that blend design research with family storytelling, has explored New Orleans for its vibrant architecture, Savannah’s historic
    squares for pastel palettes, and the Tuscan countryside for artisanal craftsmanship; they dream of a future pilgrimage to the Bauhaus sites in Germany to enrich their studio’s aesthetic.
  culinary: Detia Malik, a soulful cook who honors family recipes while experimenting with garden‑fresh ingredients, delights in collard greens simmered with smoked turkey, sweet‑potato pie spiced with
    nutmeg, and gumbo thick with okra; they grow heirloom tomatoes and kale in their garden, and blend smoked paprika and fresh rosemary into occasional daring experiments.
  core: Detia Malik, a solitary‑spirit interior designer, blends Southern hospitality with sustainable design, often misplaces project timelines but compensates with deep empathy, a garden of heirloom seeds,
    and a penchant for soulful quilting; they navigate life with a relaxed, compassionate rhythm.
background:
  cultural: Detia is a second‑generation African‑American from the Deep South, raised in a close‑knit family that values church, storytelling, and Southern hospitality. Her upbringing in Mississippi’s Black
    neighborhoods exposed her to the vibrant visual language of African‑American churches—bold textiles, rhythmic patterns, and communal gathering spaces—which continues to inspire her design palette. She
    draws on the oral tradition of sharing recipes and histories, integrating those narratives into the spaces she creates. Her community ties remain strong; she participates in local church events and
    supports neighborhood revitalization projects, reflecting a cultural commitment to uplift and preserve the Black Southern experience.
attributes:
  skills: '[''Space planning'', ''Color theory'', ''Material sourcing'', ''CAD (SketchUp, AutoCAD, Revit)'', ''3D rendering'', ''Sustainable design'', ''Reclaimed furniture integration'', ''Budget management'',
    ''Client communication'', ''Project coordination'']'
  hobbies: '[''Gardening'', ''Soul‑food cooking'', ''Nature photography'', ''Walking/hiking'', ''Knitting and quilting'', ''Reading historical fiction'', ''Volunteering at community center (design workshops)'',
    ''Listening to gospel and jazz'']'
  career_goals: Detia aims to open a boutique interior‑design studio in Brandon that specializes in creating warm, community‑focused spaces rooted in Southern Black cultural aesthetics. She hopes to mentor
    emerging designers, particularly women of color, by offering apprenticeships and workshops. She aspires to publish a coffee‑table book that documents the intersection of African‑American heritage and
    contemporary interior design. Long‑term, she envisions collaborating with local artisans to develop a line of handcrafted home accessories that celebrate Mississippi’s natural materials.
