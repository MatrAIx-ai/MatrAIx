personas:
  professional: John Poston, a 29-year-old claims adjuster, merges his curiosity-driven investigative style with pragmatic, results-oriented action by deploying drone imaging and AI-assisted loss analysis,
    crafting clear settlement reports, and habitually fact-checking every detail while coaching junior adjusters through lively presentations.
  sports: John Poston cheers for the Dallas Cowboys, follows the Houston Astros and the Texas Longhorns, plays pickup basketball at the Brady community center, competes in weekly Texas Hold'em tournaments
    that they treat like a mental sport, and joins a local fly-fishing club for weekend trips to the Guadalupe River, balancing competitive drive with a love for outdoor recreation.
  arts: John Poston, an avid karaoke enthusiast, immerses themselves in live-music gatherings featuring Willie Nelson and Brad Paisley, devours historical fiction by Bernard Cornwell and mystery novels
    by Tana French, and volunteers as a stagehand for a community theater, letting their humanities background shape their appreciation for storytelling.
  travel: John Poston prefers road-trip adventures that blend scenic hunting grounds with cultural stops, having driven the historic Route 66 to the blue‑bonnet fields of Ennis, trekked the rugged canyons
    of Big Bend National Park, and planning a future getaway to the art markets of Santa Fe, all on a budget that balances modest savings with occasional group-tour splurges.
  culinary: John Poston’s culinary comfort zone centers on Texas-style barbecue—smoking brisket over mesquite, whipping up a spicy pimento cheese dip, perfecting chicken-fried steak with jalapeño‑cornbread,
    and occasionally experimenting with a homemade chili con carne that they serve at community fundraisers.
  core: John Poston is a sociable, competition-driven claims adjuster whose blend of rural traditions and humanities education fuels a pragmatic curiosity that shapes work, play, and community life.
background:
  cultural: John was raised in Brady, a small town in McCulloch County, Texas, within a predominantly white, rural community that values independence, self‑reliance, and strong family ties. The local culture
    emphasizes hospitality, community service, and a deep connection to the West Texas landscape—ranching, open plains, and outdoor recreation are common threads. His upbringing combined traditional Texan
    values—pride in local history, respect for law and order, and participation in county fairs and rodeos—with exposure to broader ideas through his arts and humanities degree from a Texas university.
    This blend gives him a pragmatic outlook rooted in tradition, while his academic experience fuels an appreciation for new perspectives and cultural narratives. He likely maintains ties to local religious
    institutions and community organizations such as the Rotary Club, reflecting the region’s emphasis on civic engagement.
