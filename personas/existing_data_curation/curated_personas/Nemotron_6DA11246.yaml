  career_goals: John aims to advance to a senior leadership position within the insurance industry, such as Regional Claims Director or Head of Investigations, where he can shape policy and drive process
    innovation. He plans to earn professional certifications (CPCU, CCR) and to spearhead the adoption of advanced technologies like AI‑based loss estimation and drone assessments across his organization.
    John also envisions creating a mentorship program for new adjusters, leveraging his sociable personality to build a collaborative yet high‑performing team. Long‑term, he aspires to become a recognized
    industry speaker and author, sharing best practices at national conferences and publishing case studies that blend his humanities background with practical claim‑handling expertise.
