  career_goals: Ingrid aims to leverage her extensive frontline experience into a supervisory or management role within the next three years, targeting a position such as Customer Service Team Lead or Operations
    Supervisor. She plans to complete her bachelor’s degree in Business Administration, focusing on organizational leadership, to strengthen her credentials. Additionally, she seeks certification in Customer
    Experience Management (CXM) and Six Sigma Yellow Belt to deepen her process improvement expertise. Ingrid aspires to lead a high-performing team that consistently exceeds service metrics while fostering
    a supportive, inclusive culture. Long‑term, she envisions establishing a boutique consulting practice that helps small businesses in the Atlanta metro area design customer‑centric service models, drawing
    on her practical curiosity and disciplined approach.
