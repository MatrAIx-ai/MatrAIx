    video gaming (Minecraft)'']'
  career_goals: Chasity dreams of a future where she can help others directly, aiming to become a teacher, pediatric nurse, or community health worker. In the short term, she wants to maintain top grades,
    serve as class representative, and lead school service projects that support younger students and local charities. She is motivated to develop the empathy, organizational skills, and academic foundation
    needed to make a positive impact in her community.
