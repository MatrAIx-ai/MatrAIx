  hobbies: '[''Hiking in the Chiricahua Mountains'', ''Restoring vintage hand tools'', ''Woodworking and furniture making'', ''Playing acoustic guitar'', ''Volunteering at community garden'', ''Arduino
    and electronics tinkering'', ''Reading engineering biographies and sci‑fi'', ''Cooking Southwestern cuisine'', ''Attending local art and music festivals'', ''Collecting antique automotive parts'']'
  career_goals: Fred aims to become a lead tool and die designer within his company, eventually moving into a supervisory role where he can mentor newer craftsmen. He plans to earn certifications in CNC
    programming and Six Sigma, and to complete an associate degree in manufacturing technology to deepen his technical knowledge. Long‑term, he dreams of opening his own custom die shop that serves aerospace
    and specialty automotive clients, allowing him to innovate and apply new manufacturing technologies while maintaining a balanced work‑life schedule with his wife.
