persona_description: A researcher from Tohoku University who specializes in the development of new technologies for the integration of magnetic tunnel junctions (MTJs) into vertical interconnect access
  (via) in integrated circuits, aiming to reduce the size and cost of spin-transfer torque magnetic random access memory (STT-MRAM). The researcher has successfully developed a special polishing process
  technology to prevent any interference between the MTJ and its lower electrode, resulting in a 70% improvement in memory bit yield and a 30% reduction in memory cell area. The research was presented at
  the IEEE International Memory Workshop in France in 2016 and was supported by the CIES consortium project.
