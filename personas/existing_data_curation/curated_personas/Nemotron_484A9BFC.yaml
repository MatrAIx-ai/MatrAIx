personas:
  professional: Hector Irigoyen is a seasoned physical therapist with masterful manual therapy, neuromuscular re‑education, and gait analysis skills, who infuses their love of contemporary art, street photography,
    and community storytelling into patient care, while championing bilingual communication and a flexible, sometimes improvisational schedule as they build a boutique clinic that blends rehabilitation
    with creative workshops.
  sports: Hector Irigoyen hikes the trails of Griffith Park with the local Trail Runners Club, follows the Los Angeles Dodgers and Lakers, participates in a community salsa dance league that doubles as
    cardio, and they prefer a loose, spontaneous fitness routine that often replaces scheduled gym workouts when a late‑night dance event calls.
  arts: Hector Irigoyen frequents the Museum of Contemporary Art and The Broad, admires street muralists like Mystic Ink, collects limited‑edition prints by contemporary artists, sways to jazz greats Herbie
    Hancock and Latin icons Celia Cruz, and they routinely capture the city's murals with their camera while experimenting with movement‑based art workshops.
  travel: Hector Irigoyen enjoys spontaneous weekend getaways to Catalina Island and Joshua Tree, plans purposeful trips to their family’s homelands for cultural immersion, seeks off‑season art festivals
    in Tokyo, and they balance travel aspirations with the financial need to fund their boutique clinic, often choosing destinations that combine learning, family, and wellness.
  culinary: Hector Irigoyen delights in cooking pupusas and tamales with fresh avocado, cilantro, and pepper sauce for potluck gatherings, crafts ceviche with lime and shrimp, savors fusion dishes at Bestia,
    and they treat themselves to espresso at local cafés, displaying moderate kitchen confidence focused on communal feasting rather than haute cuisine.
  core: Hector Irigoyen is a charismatic, art‑infused physical therapist who blends manual therapy with spontaneous salsa, runs a boutique clinic on the fly, often misplaces paperwork, yet they never miss
    a chance to celebrate community gatherings.
background:
  cultural: Born to Salvadoran immigrants in Los Angeles, Hector grew up immersed in a blend of Central American traditions and Southern California culture. He is bilingual, fluent in Spanish and English,
    and actively celebrates Salvadoran holidays such as Independence Day and Día de los Niños. His upbringing instilled a strong sense of community, hospitality, and respect for family ties, which he carries
    into his professional practice by offering culturally sensitive care and fostering inclusive environments for patients from diverse backgrounds.
attributes:
  skills: '[''Manual therapy'', ''Sports injury rehabilitation'', ''Neuromuscular re‑education'', ''Gait analysis'', ''Functional movement screening'', ''Patient education and communication (English/Spanish)'',
    ''Therapeutic exercise program design'', ''Integrative approaches (art‑inspired movement)'', ''Community health outreach'', ''Use of therapeutic modalities (ultrasound, electrical stimulation)'']'
  hobbies: '[''Visiting contemporary art galleries and street murals'', ''Live music (jazz, salsa, Latin jazz)'', ''Salsa dancing'', ''Cooking and sharing Salvadoran dishes (pupusas, yuca frita)'', ''Street
    photography'', ''Hiking in Griffith Park'', ''Reading neuroscience and health research'', ''Traveling to Central America'', ''Participating in community festivals and cultural events'']'
  career_goals: He aims to obtain board certification in orthopedic manual therapy and launch a boutique clinic that blends physical rehabilitation with creative arts workshops, fostering both physical
    recovery and emotional expression. Hector plans to develop community wellness programs targeting underserved Salvadoran families in Los Angeles, mentor emerging therapists, and eventually teach part‑time
    at a local university. He also aspires to author a guide on flexible, patient‑centered practice models that prioritize adaptability and cultural sensitivity.
