persona_description: A historian who specializes in the study of ancient Aztec civilization and its architecture, particularly the ruins of the Calmecac school. This individual is interested in the history,
  culture, and legacy of the Aztecs and the impact of their civilization on modern Mexico. They are knowledgeable about the Spanish conquest and the subsequent decline of the Aztec Empire, and are interested
  in the ways in which indigenous communities have struggled to adapt and integrate into modern Mexican society. They are also interested in the current state of education in Mexico, particularly the challenges
  faced by indigenous communities and the need for more equitable access to education.
