persona_description: A geographer who specializes in studying snow avalanches and debris flows, particularly in the context of natural disasters. He has visited the site of the Tbilisi Zoo landslide and
  flood disaster and confirmed that the disaster was caused by a landslide at Akhaldaba village, and that the major cause was the damming of a flow at the site of the zoo. He has provided photographs and
  details of the disaster, and is knowledgeable about the geological and environmental factors that led to the event. He may be interested in sharing his findings with the scientific community and in advocating
  for more research and disaster preparedness in the region.
