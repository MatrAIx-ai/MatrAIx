  career_goals: Karen aims to move into a supervisory role within her retail chain, seeking a shift‑leader or assistant manager position in the next two years. She plans to leverage her associate’s degree
    in Business Administration to complete a bachelor’s degree in Retail Management through evening classes, which will equip her with advanced leadership and merchandising knowledge. Long‑term, she envisions
    managing a small neighborhood market or opening a community‑focused convenience store that offers locally sourced products, allowing her to combine practical retail experience with her interest in supporting
    local producers.
