personas:
  professional: An aspiring junior naturalist, Gladys Lambert channels her curiosity and practical eye for detail into cataloguing leaf, rock, and insect finds, while her relaxed attitude toward rigid schedules
    lets her create whimsical, story‑filled field journals that reflect her compassionate nature and occasional disorganization.
  sports: Gladys Lambert enjoys wandering the creek for impromptu nature hikes with the Riverbank Explorer Scouts, prefers slow‑pace bike rides over competitive sports, yet eagerly watches the Springfield
    Tigers baseball games on TV and cheers for the local junior soccer team, the Greenfield Rockets, whenever they play.
  arts: Gladys Lambert fills sketchbooks with animal drawings inspired by Beatrix Potter, sings along to Taylor Swift’s Shake It Off while coloring, and reenacts scenes from Disney’s Frozen after watching
    performances by Broadway’s Idina Menzel, weaving these influences into the stories they narrate for their younger brother.
  travel: Gladys Lambert prefers unplanned day‑trips to the nearby Pine Hollow forest and the occasional family outing to Yellowstone National Park, while dreaming of a future adventure to Paris's Disneyland
    and a beach vacation on the Hawaiian islands, balancing a love for quiet nature walks with bright, storybook‑like destinations.
  culinary: Gladys Lambert delights in baking chocolate chip cookies with a pinch of cinnamon and vanilla, assists their mom in preparing spaghetti with fresh tomato sauce and basil, and can whisk egg whites
    into fluffy meringue for a surprise dessert, though they occasionally burn the edges of cupcakes when distracted by daydreaming.
  core: Gladys Lambert is a nature‑loving storyteller whose relentless curiosity is matched by an endearing habit of misplacing their sketchbook, turning every lost‑and‑found moment into a mini adventure
    fueled by compassion and a splash of anxiety.
background:
  cultural: Gladys was raised in Broken Arrow, Oklahoma, a suburban community within Tulsa County known for its friendly, close‑knit neighborhoods and strong sense of local pride. Her family participates
    in typical Midwestern traditions such as spring festivals, county fairs, and Fourth of July parades. Community and church events provide opportunities for service, reinforcing her compassionate values.
    The cultural environment blends a love of outdoor recreation, a respect for small‑town customs, and exposure to national pop culture through school and media, shaping her balanced view of curiosity
    and practicality.
attributes:
  skills: '["Reading (fluent third‑grade level)", "Basic arithmetic (addition & subtraction)", "Storytelling", "Empathy and peer comfort", "Simple Scratch Jr. coding", "Pet care (dog)", "Conflict mediation
    among classmates", "Drawing and illustration"]'
  hobbies: '["Exploring nature (collecting leaves, rocks, insects)", "Reading (fairy tales, mysteries, nature magazines)", "Storytelling to siblings", "Drawing and coloring", "LEGO building (animal habitats)",
    "Simple baking with family", "Playing Scratch Jr. to create animated stories"]'
  career_goals: Gladys dreams of becoming a veterinarian because she loves animals and wants to help them stay healthy. She also imagines herself as a teacher one day, sharing stories and creating a nurturing
    classroom where every child feels safe and heard. Her long‑term ambition is to work in a role that combines compassion with practical problem‑solving, such as a wildlife rehabilitation specialist or
    a child psychologist, allowing her to support both animals and people.
