  career_goals: Dalila aims to blend her business expertise with her artistic sensibility by launching a socially responsible fashion brand that showcases Ecuadorian artisanal techniques in contemporary
    designs. In the short term she plans to secure an internship in a consumer‑goods marketing department to deepen her skills in brand strategy, data‑driven decision making, and market positioning. She
    intends to pursue an MBA with a focus on entrepreneurship after gaining practical experience, positioning herself as a future leader in sustainable product development. Her competitive drive pushes
    her to be recognized for innovative, culturally rooted business solutions and to eventually mentor other Latinx entrepreneurs.
