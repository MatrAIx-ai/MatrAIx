personas:
  professional: Dalila Santiago blends rigorous business acumen—advanced financial analysis, data‑driven market research, and strategic planning—with a vivid artistic imagination, channeling their methodical
    project management and bilingual communication skills into a consumer‑goods marketing internship while laying the groundwork for a socially responsible fashion label that integrates handcrafted techniques
    from their regional artisanal heritage into contemporary designs.
  sports: Dalila Santiago practices yoga three times a week, competes in the university’s women’s intramural volleyball league, follows the professional soccer club Barcelona SC avidly during the season,
    and joins a local running group for weekend 5 k jogs, balancing structured fitness with occasional team sport camaraderie.
  arts: Dalila Santiago spends weekends sketching abstract compositions in a dedicated journal, draws inspiration from the immersive installations of teamLab, the surreal paintings of Remedios Varo, and
    the street art of Banksy, while their digital design work reflects influences from contemporary graphic designer Jessica Walsh and frequent visits to the city’s modern art museum.
  travel: Dalila Santiago prefers meticulously planned solo weekend getaways to culturally rich destinations—such as the colonial streets of Cartagena, the high‑altitude market town of Otavalo, and the
    surf‑lined boardwalk of Montañita—blending art gallery tours, culinary workshops, and nature hikes, while a dream itinerary includes a month‑long immersion in Kyoto’s Zen gardens and minimalist aesthetics.
  culinary: Dalila Santiago experiments with traditional coastal dishes like ceviche, empanadas, and llapingachos, often fusing them with mango, jalapeño, or quinoa to create inventive plates such as mango‑marinated
    ceviche served with cacao‑dusted tortilla chips, and they regularly source fresh cilantro, lime, and aji amarillo at the local market, showcasing an intermediate cooking skill level that balances stovetop
    basics with adventurous grill techniques.
  core: Dalila Santiago intertwines disciplined business strategy with relentless artistic curiosity, navigating life with organized ambition, mindful self‑care, and a tendency toward anxiety‑driven over‑planning
    that fuels both meticulous budgeting and bold creative experimentation.
background:
  cultural: Dalila was born to parents who emigrated from Quito, Ecuador, when she was a child. She grew up bilingual, speaking Spanish at home and English at school, and maintains a deep connection to
    Ecuadorian customs. Family celebrations of Carnaval, communal meals featuring ceviche and llapingachos, and the rhythms of traditional Andean music shape her identity. She participates in the local
    Latinx community in Montgomery County, attending cultural festivals and volunteering at a community garden that cultivates Andean crops. Her heritage informs her aesthetic choices, favoring vibrant
    colors and natural textures, and fuels her ambition to integrate Ecuadorian craftsmanship into modern business models. The blend of Ecuadorian familial values and her American upbringing gives her a
    unique bicultural perspective that she brings to both her professional and creative pursuits.
