  career_goals: Edward frequently talks about becoming a firefighter because he admires the idea of helping people and using big, shiny trucks. He also dreams of being an astronaut, fascinated by rockets
    and space adventures he sees in children's books. Occasionally he mentions wanting to be a veterinarian after watching documentaries about animals, showing his caring nature. While these ambitions are
    imaginative, they reflect his desire to explore, protect, and contribute to the well‑being of others.
