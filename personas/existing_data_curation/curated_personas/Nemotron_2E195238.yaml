personas:
  professional: Edward Evans is a budding LEGO architect whose curiosity fuels elaborate dinosaur and rocket builds, while their practical side ensures each piece serves a purpose, and they naturally guide
    small construction projects with friends, balancing imagination with methodical problem‑solving.
  sports: Edward Evans plays soccer with the local youth club, the Meadowbrook Tigers, rides a bike through neighborhood streets, cheers for the nearby MLB team, the Chicago Cubs, and watches the NBA’s
    Golden State Warriors, embodying a love for active play and team spirit.
  arts: Edward Evans delights in drawing cartoon animals inspired by Bill Watterson’s Calvin and Hobbes and mimics Pixar’s vibrant style, while they frequently hum Disney’s Frozen soundtrack, especially
    'Let It Go', as a backdrop to their creative sessions.
  travel: Edward Evans has explored the city’s botanical garden, visited the state zoo, and dreams of trekking the Grand Canyon and experiencing the magic of Disneyland, favoring spontaneous day trips with
    family over meticulously planned vacations.
  culinary: Edward Evans loves cheesy macaroni, chicken nuggets, strawberry‑banana smoothies, and enjoys assembling mini pizzas topped with pepperoni and olives, often sprinkling extra cheddar for added
    crunch.
  core: Edward Evans is a curious six‑year‑old LEGO enthusiast who balances imaginative builds with practical precision, occasionally misplaces pieces in a rush, and prefers spontaneous play over rigid
    schedules.
background:
  cultural: Edward grows up in Simpsonville, a suburban community in Greenville County, South Carolina. His family participates in local traditions such as church gatherings, community festivals, and holiday
    potlucks featuring Southern comfort foods like biscuits and fried chicken. He attends a public elementary school where school spirit, sports events, and music performances are celebrated. Family weekends
    often include backyard barbecues, trips to nearby lakes, and visits to local museums, which give him a blend of rural Southern charm and modern suburban life. These experiences shape his friendly, cooperative
    demeanor and his appreciation for both new ideas and familiar, community‑based practices.
