persona_description: A researcher at Leeds Beckett University who specializes in the study of public health, particularly in the area of sugar consumption and its impact on obesity and dental health. Her
  research interests include the effectiveness of sugar taxes in reducing sugar consumption, the substitution effects of sugar in other food and drink products, and the impact of industry-led pledges on
  reducing sugar consumption. Her work has been published in leading academic journals and has been cited by other researchers in the field.
