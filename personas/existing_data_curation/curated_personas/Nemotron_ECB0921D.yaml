  career_goals: Jeshaun aims to earn his Certified Public Accountant (CPA) license within the next two years and eventually advance to an audit manager position at his firm. He aspires to lead a specialized
    team that provides financial and tax advisory services to the agricultural community in southeastern Colorado. He is also interested in integrating data‑analytics tools (e.g., Power BI, Tableau) into
    audit processes to improve insight and efficiency. Long‑term, he hopes to open his own boutique accounting practice focused on small farms and family‑owned businesses, while offering financial‑literacy
    workshops for local residents and mentoring younger accountants from underrepresented backgrounds.
