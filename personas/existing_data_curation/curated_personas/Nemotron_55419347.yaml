    ''Event planning'', ''Volunteer coordination'', ''Mentoring and tutoring'', ''Organizational record-keeping'']'
  hobbies: '[''Gardening'', ''Bird-watching'', ''Hiking'', ''Reading historical fiction'', ''Knitting'', ''Volunteer reading mentor'', ''Community history talks'', ''Travel to national parks'']'
  career_goals: She aims to leverage her technical background to support STEM education in her community, offering mentorship to high-school students and serving on advisory boards for local science clubs.
    Dana plans to develop a volunteer-lead project coordination role with an environmental nonprofit, applying her project-management skills to community conservation initiatives. She also aspires to complete
    an online certificate in data analytics to keep her analytical skills current, and hopes to author a series of reflective essays on her experiences as a woman in STEM, sharing insights with a broader
    audience.
