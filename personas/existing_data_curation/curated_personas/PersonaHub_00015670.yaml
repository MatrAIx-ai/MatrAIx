persona_description: A researcher and scientist who focuses on the study of allergy and asthma, particularly on the development of new blood tests to diagnose subtropical grass pollen allergy and the optimization
  of allergy diagnostics and treatments for subtropical grass pollen allergy. She is supported by the National Health and MedicalResearch Council (NHMRC), The Asthma Foundation of Queensland, UQ and Australian
  Society for Clinical Immunology and Allergy. Her research is also supported by Phadia, now Thermofisher, from Sweden, Sullivan Nicolaides Pathology, Queensland, and Stallergenes from France.
