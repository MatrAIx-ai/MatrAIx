personas:
  professional: Allisha Hawkins, a methodical elementary and middle‑school teacher in Carroll County Public Schools, designs data‑driven differentiated lesson plans, leverages Google Classroom and SMART
    boards, leads peer professional‑development workshops, and is actively preparing for a future role as an instructional leader and assistant principal.
  sports: Allisha Hawkins hikes the Catoctin Ridge with the Western Maryland Hikers Club during weekends, follows the Baltimore Ravens for football, the Washington Capitals for hockey, and attends a bi‑weekly
    community yoga class to maintain flexibility and balance.
  arts: Allisha Hawkins regularly attends performances at the Maryland Shakespeare Festival, devours contemporary novels by Celeste Ng and Sally Rooney, crochets blankets while listening to Norah Jones,
    and participates in a monthly book club that discusses both fiction and educational research.
  travel: Allisha Hawkins prefers meticulously planned road trips, has explored Williamsburg’s colonial district, the culinary scene of New Orleans, and longs to trek New Zealand’s Milford Track, all while
    balancing family commitments and budgeting constraints.
  culinary: Allisha Hawkins, an avid baker, perfects artisan sourdough loaves using a rye starter, crafts whole‑wheat cinnamon rolls with a dash of cardamom, and delights friends and family with fresh pastries
    served at weekend gatherings.
  core: Allisha Hawkins blends disciplined organization with a love for creative hands‑on projects, from lesson planning to baking, always seeking predictable structures while nurturing community connections.
background:
  cultural: Allisha was raised in a middle-class, white family with deep roots in the Mid-Atlantic region. Her ancestry is primarily English, Irish, and German, and family traditions include seasonal celebrations
    such that Thanksgiving, Christmas, and local county fairs. Growing up in the suburbs of Westminster, Maryland, she was closely involved with her local Methodist church, community service projects, and
    neighborhood gatherings that emphasized mutual support and modesty. These cultural influences have reinforced her values of responsibility, community involvement, and appreciation for the slower pace
    of rural life, all of which shape both her personal and professional outlook.
attributes:
  skills: '[''Lesson planning'',''Classroom management'',''Differentiated instruction'',''Curriculum alignment to Maryland standards'',''Educational technology integration (Google Classroom, SMART boards)'',''Student
