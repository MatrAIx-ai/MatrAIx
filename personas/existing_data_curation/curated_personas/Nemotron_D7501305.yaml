  hobbies: '[''Gardening'',''Baking'',''Reading (fiction and educational research)'',''Hiking'',''Book club participation'',''Volunteering at community center tutoring program'',''DIY home organization'',''Crocheting'']'
  career_goals: Allisha aims to deepen her impact on student learning by moving into instructional leadership. Over the next three to five years she plans to complete a Master's degree in Educational Leadership,
    become a grade-level team leader, and eventually serve as an assistant principal within the Carroll County Public Schools. She also hopes to design a district-wide literacy intervention for struggling
    readers, mentor novice teachers through a structured induction program, and champion data-informed instructional practices across her school.
