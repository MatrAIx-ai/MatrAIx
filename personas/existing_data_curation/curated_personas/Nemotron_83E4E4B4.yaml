  hobbies: '["Beachcombing","Birdwatching","Knitting","Reading historical fiction","Book club participation","Mindfulness meditation","Gentle yoga"]'
  career_goals: Cynthia aims to move into a supervisory role within the next two years, where she can mentor new employees and implement sustainable cleaning protocols across the facilities she manages.
    She aspires to become a certified green‑cleaning specialist and eventually launch a small consulting service for local vacation rentals, helping them adopt eco‑friendly sanitation practices. Additionally,
    she hopes to complete an associate degree in environmental health to deepen her expertise and qualify for a health and safety compliance position.
