personas:
  professional: Cynthia Hayes, a seasoned cleaning specialist with three decades of hands‑on experience in commercial and residential sanitization, leverages their OSHA‑certified hazardous‑material expertise
    and a curious yet pragmatic mindset to pioneer green‑cleaning protocols while coordinating small teams and meticulously managing inventory, and they pride themselves on leading by quiet example.
  sports: Cynthia Hayes, an avid beach walker and birdwatcher, channels their fitness into daily sunrise strolls along Oak Bluffs’ shoreline, follows the local Cape Cod Baseball League’s Hyannis Harbor
    Hawks, and participates in a senior walking club that meets twice a week, and they sometimes bring a notebook to record sightings.
  arts: Cynthia Hayes, a quiet devotee of historical fiction, treasures mystery novels by Agatha Christie and the atmospheric narratives of Ann Cleeves, while unwinding to the folk guitar of James Taylor,
    the seascape paintings of Winslow Homer, and the classical piano works of Debussy, which shape their reflective aesthetic, and they frequently quote favorite passages at book club meetings.
  travel: Cynthia Hayes, who prefers low‑key coastal escapes, plans trips around tide‑pool exploration and birding, having visited Block Island, Acadia National Park, and the Outer Hebrides, while dreaming
    of the kelp forests of Monterey Bay and the sunrise cliffs of Cinque Terre, always booking far‑in‑advance to secure modest off‑season rates, and they keep a scrapbook of postcards from each destination.
  culinary: Cynthia Hayes enjoys simple, wholesome meals, often cooking New England clam chowder, herb‑infused roasted salmon, and a lavender‑honey tea that they sip while knitting, and they relish using
    reclaimed sea glass as garnish for their occasional seaweed salad, though they tend to over‑salt their soups.
  core: Cynthia Hayes, a meticulous green‑cleaning guru who finds solace in solitary beach walks and knitting, balances a relentless work ethic with bouts of anxiety, occasional over‑caffeination, and a
    habit of hoarding sea glass, and they often lose track of time while cataloguing each piece.
background:
  cultural: Cynthia grew up in a modest, working‑class family in New England, where self‑reliance and hard work were core values. As a white American from the region, she was raised with a respect for the
    local coastal environment and a pragmatic approach to problem solving. Her community ties in Oak Bluffs—a town known for its maritime heritage and seasonal tourism—have reinforced a sense of stewardship
    for the neighborhood’s public spaces. While her upbringing emphasized practicality, her later years in college sparked a curiosity for environmental health, shaping her interest in sustainable cleaning.
    Her cultural background blends New England modesty with a contemporary awareness of ecological responsibility.
attributes:
  skills: '["Commercial cleaning","Chemical safety and OSHA compliance","Inventory management","Green cleaning practices","Team coordination","Minor maintenance troubleshooting","Scheduling and time management","Attention
