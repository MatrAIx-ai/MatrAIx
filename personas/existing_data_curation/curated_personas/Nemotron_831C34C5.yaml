  career_goals: Sheldon aims to finish his education by obtaining a GED within the next two years, then enroll in a vocational program to become an automotive technician, a field that offers hands‑on work
    and clear career pathways. Concurrently, he dreams of leveraging his passion for basketball into a collegiate scholarship or a community coaching role, hoping to mentor younger players in his neighborhood.
    He also wants to develop his digital media skills enough to produce content for a YouTube channel focused on gaming and music production, providing an additional creative outlet and potential income
    stream. Ultimately, his ambition is to achieve financial stability that allows him to support his family and give back to his community, while maintaining a structured and disciplined lifestyle.
