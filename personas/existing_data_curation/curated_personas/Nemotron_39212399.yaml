personas:
  professional: Jennifer Croom, a veteran early childhood and elementary education program director with three decades of experience, blends her curiosity for art and flexible leadership style to design
    experiential curricula, mentor staff, and champion community arts partnerships, even as her relaxed approach sometimes leads to missed paperwork deadlines.
  sports: Jennifer Croom, a devoted fan of the Cleveland Browns and the Cincinnati Reds, spends her summers walking the local nature trails with the senior hikers’ club, and in cooler months she enjoys
    gentle pickleball matches at the community recreation center, preferring low‑impact activities that fit her flexible schedule.
  arts: Jennifer Croom, an avid painter and sketcher who frequents the Ohio Historical Society, draws inspiration from Monet’s impressionist palettes and Georgia O’Keeffe’s floral motifs, regularly attends
    performances at the Cincinnati Playhouse and listens to Joni Mitchell’s folk classics while knitting scarves for charity.
  travel: Jennifer Croom, who prefers leisurely, self‑guided trips over rushed tours, has explored the gardens of Kew in England, the art museums of Florence, and the Great Smoky Mountains, and she dreams
    of a future river cruise along the Ohio, balancing her modest retirement budget with a desire for cultural immersion.
  culinary: Jennifer Croom, a confident home cook with a green thumb, delights in turning heirloom tomatoes into fresh bruschetta, simmering basil‑infused marinara for her weekly pasta, and occasionally
    baking banana bread laced with walnuts for her book‑club gatherings.
  core: Jennifer Croom, a curious, art‑obsessed retiree with a tendency to misplace her planner and a chronic worry about unfinished projects, finds solace in painting, gardening, and spontaneous birdwatching
    walks.
background:
  cultural: Jennifer grew up in a small‑town Midwestern setting in Ohio, rooted in a family heritage that blends German, English, and Irish ancestry. Her upbringing emphasized community involvement, modesty,
    and a strong work ethic, shaped by local church gatherings and county fairs. Living in West Jefferson, she embodies the values of Midwestern hospitality and civic pride while maintaining an open‑minded
    curiosity about diverse artistic and educational perspectives. This blend of traditional community ties and a love of creative expression informs her personal and professional worldview.
