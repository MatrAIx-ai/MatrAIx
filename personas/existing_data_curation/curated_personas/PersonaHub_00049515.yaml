persona_description: A historian who is interested in the history of African American slavery and colonization, particularly in the efforts of William Parker Foulke to colonize freed slaves in Africa. This
  persona is likely to be familiar with the work of William Parker Foulke and the Foulke Papers, and would be interested in exploring the topic further through the use of the Colonization in the Foulke
  Papers gallery. This persona may also have a background in anthropology, sociology, or history, and would be able to appreciate the significance of Foulke's efforts in the context of the broader history
  of slavery and colonization.
