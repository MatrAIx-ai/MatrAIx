personas:
  professional: Brandon Alderman, a meticulous aspiring data analyst, leverages his Excel mastery and Python automation skills to streamline reporting for municipal IT projects while championing clear SOPs
    and reliable support.
  sports: Brandon Alderman follows the Seattle Mariners and Seattle Seahawks with quiet enthusiasm, participates in the Seattle Badminton Club’s weekly meet‑ups, and maintains a solitary jogging routine
    through Green Lake Park to keep fit without the pressure of team sports.
  arts: Brandon Alderman immerses himself in the works of Ansel Adams and Edward Burtynsky, frequently revisits the Seattle Art Museum’s photography exhibitions, and playlists featuring Philip Glass and
    ambient podcast soundscapes accompany his model‑building sessions.
  travel: Brandon Alderman plans his travel itineraries in meticulous Excel sheets, favoring solo trips to maritime heritage sites such as Portsmouth, England, and Gdańsk, Poland, while balancing a student
    budget that limits his adventures to weekend getaways to the San Juan Islands.
  culinary: Brandon Alderman enjoys precise cooking experiments like sous‑vide salmon with dill and lemon zest, often referencing detailed recipes on Food52, and appreciates the clean flavors of fresh herb‑roasted
    chicken and classic New England clam chowder, though his kitchen is occasionally a mess of tools left out.
  core: Brandon Alderman is a methodical, introverted planner who transforms solitary hobbies into structured projects, yet sometimes lets perfectionism stall spontaneous fun.
background:
  cultural: Brandon grew up in a middle‑class, white family in Newport News, Virginia, a city shaped by its historic shipbuilding industry and coastal heritage. His upbringing blended typical Southern coastal
    values—emphasis on reliability, self‑reliance, and community service—with exposure to the technical culture of nearby naval shipyards. While he appreciates local traditions and occasional family gatherings,
    his personality leans toward solitude and a preference for structured, quiet environments.
attributes:
  skills: '["Excel data analysis", "Python scripting", "Project management (Trello, Asana)", "PC hardware troubleshooting", "Mechanical repair of small engines", "Technical documentation", "Model‑kit construction"]'
  hobbies: '["Model ship and aircraft building", "Python hobby programming", "Reading non‑fiction (technology, maritime history)", "Puzzle solving (Sudoku, logic puzzles)", "Nature walks", "Photography
    (architecture and landscape)", "Listening to productivity podcasts"]'
  career_goals: Brandon aims to finish a bachelor’s degree in Information Systems or Business Administration within the next two years, while earning industry certifications such as CompTIA A+ and the Project
    Management Professional (PMP). He seeks a stable, structured role in data analysis or IT support at a local government agency, shipyard, or similar organization where clear procedures and predictable
    workflows are valued. In the long term, he hopes to move into a supervisory position overseeing technical operations, leveraging his methodical approach and reliability to lead small teams.
