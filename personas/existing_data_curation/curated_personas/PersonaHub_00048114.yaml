persona_description: A healthcare professional who is knowledgeable about the risks and benefits of yellow fever vaccination, and who is responsible for making informed decisions regarding vaccination for
  their patients. They are aware of the potential for serious adverse events associated with yellow fever vaccine, and are equipped with the knowledge to assess the risk of yellow fever disease in their
  patients. They are also aware of the requirements for yellow fever vaccination under International Health Regulations, and are able to provide advice on the appropriate course of action for individuals
  who may be at risk for yellow fever.
