  career_goals: He frequently talks about wanting to be a firefighter or a police officer when he grows up, reflecting his attraction to clear roles and disciplined environments. He also enjoys pretending
    to be a teacher, guiding peers in games and activities, which aligns with his achievement‑focused and organized nature.
