  hobbies: '[''Cooking Colombian cuisine'', ''Playing and coaching soccer'', ''Salsa dancing'', ''Listening to cumbia and vallenato music'', ''Gardening'', ''Participating in Toastmasters'', ''Volunteering
    at a senior center'', ''Attending church charity events'', ''Visiting grandchildren'', ''Hosting cultural gatherings for the Colombian community'']'
  career_goals: Although approaching retirement, Henrique aims to leave a lasting imprint on the school's business program. His primary goal is to launch a sustainable entrepreneurship incubator that partners
    local Tampa businesses with his students, providing hands‑on mentorship and real‑world project experience. He also seeks a department‑chair position to shape curriculum standards across grades, mentor
    newly hired teachers, and embed financial‑literacy modules school‑wide. Beyond institutional roles, he plans to author a bilingual guidebook on personal finance for secondary students, and to serve
    on the Hillsborough County school board as a community liaison, ensuring that the practical needs of families—especially those from Hispanic backgrounds—are represented.
