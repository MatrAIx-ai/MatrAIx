personas:
  professional: Henrique Rosario, a 61‑year‑old veteran secondary‑school business teacher in Tampa, blends three decades of structured curriculum design, bilingual instruction, and hands‑on entrepreneurship
    mentoring with a routine‑driven, talkative nature, turning every classroom into a predictable yet lively arena where they guide students while encouraging them to speak up.
  sports: Henrique Rosario, an avid soccer enthusiast, laces up for his neighborhood Lions league every Saturday, coaches the Suncoast youth team on Sundays, never misses a Tampa Bay Rowdies match on TV,
    and also cheers for the Buccaneers during football season as part of their routine‑filled fitness regimen.
  arts: Henrique Rosario, whose evenings often echo with the rhythms of cumbia legends like Los Gaiteros and salsa queen Celia Cruz, joins a community dance troupe performing lively folk steps, regularly
    attends the Straz Center for a Broadway musical, and keeps a collection of Botero’s vibrant paintings in their living room, all of which fuel their sociable spirit and love for shared cultural expression.
  travel: Henrique Rosario prefers meticulously planned trips—spending summer weekends driving to Clearwater Beach with grandchildren, taking annual family visits to New York City’s museums, and dreaming
    of a cultural tour of historic Madrid, Spain—yet still enjoys spontaneous day trips to nearby state parks when a spare afternoon opens up for them.
  culinary: Henrique Rosario, a confident home chef, whips up crisp arepas, hearty bandeja paisa, and golden empanadas seasoned with fresh cilantro, oregano, and a pinch of cumin from their garden, and
    balances their love for authentic flavors with occasional indulgence in a well‑liked bistec a la parrilla accompanied by chimichurri.
  core: Henrique Rosario, a routine‑loving, talkative 61‑year‑old teacher, blends their passion for community, soccer, and traditional cooking with a steadfast drive to mentor and empower the next generation,
    even as they occasionally forget to schedule dental appointments.
background:
  cultural: Henrique was born and raised in the Caribbean region of Colombia, where family gatherings, Catholic traditions, and a strong sense of community shaped his early life. He emigrated to the United
    States in his early thirties, bringing with him fluency in Spanish, a deep appreciation for Colombian cuisine, and a commitment to the values of hospitality, respect for elders, and collective harmony.
    In Tampa, he maintains these traditions by speaking Spanish at home, celebrating Colombian holidays such as Independence Day and Carnaval de Barranquilla, and participating in the local Colombian cultural
    association. His bicultural identity informs his teaching style, allowing him to bridge Colombian and American perspectives, especially in fostering financial responsibility among a diverse student
    body.
attributes:
  skills: '[''Curriculum Development'', ''Financial Literacy Instruction'', ''Entrepreneurship Education'', ''Bilingual Communication (Spanish/English)'', ''Classroom Management'', ''Public Speaking'',
