persona_description: A scientist at the Department of Energy's Oak Ridge National Laboratory who is leading a large-scale ecosystem experiment to test the effects of global warming on the icy layers of
  arctic permafrost. The scientist is a member of the Environmental Sciences Division and has extensive experience in designing, simulating, and field testing large-scale manipulative experiments to study
  ecosystem response to projected climate conditions. The scientist is also collaborating with the U.S. Army Cold Regions Research and Engineering Laboratory and the Barrow Arctic Science Consortium in
  Alaska to develop specially designed above-and below-ground warming technologies to heat multiple plots of land in the arctic study. The scientist is interested in studying the consequences of warming
  on permafrost degradation and the release of carbon stored in permafrost as the soil warms.
