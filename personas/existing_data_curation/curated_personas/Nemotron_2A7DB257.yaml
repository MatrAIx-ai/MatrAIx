  hobbies: '[''Cooking (Cajun/Creole)'', ''Gardening'', ''Reading historical fiction'', ''Live music and dancing (Zydeco, jazz)'', ''Volunteering at local food banks'', ''Community theatre'', ''Genealogy
    research'', ''Walking along the Mississippi River trail'', ''Weekend travel to Southern cultural sites'', ''Hosting themed dinner parties'']'
  career_goals: Marykay is working toward earning her CPA license within the next twelve months to formalize her expertise. She aims to move into a senior auditor or audit manager role at a regional firm,
    where she can shape audit methodology and mentor junior staff. Long‑term, she envisions launching a boutique consulting practice that offers financial‑literacy workshops and personalized accounting
    services to family‑owned businesses in Jefferson Parish, positioning herself as a trusted community resource and speaker at local business events.
