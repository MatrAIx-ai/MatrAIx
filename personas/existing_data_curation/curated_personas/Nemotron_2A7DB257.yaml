personas:
  professional: Marykay Morrison, an experienced Gulf Coast accountant and auditor, merges two decades of GAAP‑compliant financial statement mastery, advanced Excel VBA automation, and SAP ERP expertise
    to lead audit teams with clear, engaging presentations while mentoring junior staff toward CPA certification and shaping methodology for small family‑owned firms.
  sports: Marykay Morrison cheers loudly for the New Orleans Saints and Pelicans, plays third‑base in a local adult softball league, and dutifully walks the Mississippi River Trail three times a week, favoring
    sunrise jogs that double as informal cardio sessions.
  arts: Marykay Morrison immerses herself in Southern culture by dancing Zydeco to Buckwheat Zydeco and Clifton Chenier at the downtown jazz club, attending Wynton Marsalis concerts, and starring in community‑theatre
    productions of 'A Streetcar Named Desire' and 'The Little Foxes,' where her talkative nature shines.
  travel: Marykay Morrison prefers weekend getaways to historic Southern towns such as Charleston, Savannah, and Natchez, relishes the annual Mardi Gras parade in New Orleans, and dreams of a spring pilgrimage
    to the Gullah‑Geechee cultural sites on St. Simons Island while budgeting for occasional overseas trips to explore the culinary markets of Barcelona.
  culinary: Marykay Morrison’s kitchen revolves around Creole classics like jambalaya, shrimp étouffée, and blackened catfish seasoned with filé powder, and she prides herself on perfecting homemade roux
    using andouille sausage, okra, and a splash of Cajun hot sauce, while delighting friends with her signature crawfish bisque.
  core: Marykay Morrison blends meticulous accounting precision with a sociable, zest‑filled love for Southern food, music, and community service, often juggling spreadsheets and a garden while humming
    Zydeco tunes.
background:
  cultural: Marykay is a white American who grew up in the Greater New Orleans area, deeply immersed in the Southern cultural tapestry of Jefferson Parish. Her upbringing blended traditional Southern hospitality,
    a strong work ethic, and exposure to Cajun and Creole customs—from Mardi Gras celebrations to the region’s distinctive cuisine. While her family’s roots trace back to Irish and French settlers, she
    identifies with the broader community values of self‑reliance, neighborly support, and a pragmatic yet warm outlook that informs both her professional demeanor and personal interests.
attributes:
