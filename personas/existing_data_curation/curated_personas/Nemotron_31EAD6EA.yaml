  hobbies: '["Urban gardening", "Morning runs", "Classic mystery novels", "Crossword puzzles", "Analog photography", "Cooking traditional recipes", "Board-game nights", "Occasional wine tasting"]'
  career_goals: Annette aims to become a senior investigator within her firm, eventually leading a specialized unit that focuses on financial and cyber fraud. She envisions establishing a boutique private‑investigation
    practice that offers structured, routine‑driven services to corporate clients and local government agencies. Her long‑term ambition includes mentoring junior detectives, authoring a practical guide
    on evidence handling, and maintaining a work‑life balance that supports her marriage and personal well‑being.
