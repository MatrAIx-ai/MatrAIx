personas:
  professional: Annette Taylor, a senior investigator specializing in financial and cyber fraud, blends analytical rigor with a methodical, routine-driven approach to evidence collection, digital forensics,
    and case reporting, ensuring every investigation follows a predictable and reliable workflow.
  sports: Annette Taylor fuels her disciplined lifestyle with daily Capitol Hill runs, participates in the Seattle Running Club’s weekly training sessions, watches the Seattle Seahawks on Sundays, and eagerly
    follows the Seattle Sounders FC during the MLS season, balancing cardio with occasional yoga for flexibility.
  arts: Annette Taylor channels her love of structure into analog photography inspired by Henri Cartier-Bresson, loses herself in Agatha Christie mysteries, collects vinyl records of Nick Cave, and attends
    quarterly performances at the Seattle Symphony, appreciating the blend of order and emotion in the arts.
  travel: Annette Taylor prefers meticulously planned trips, often spending long weekends exploring the San Juan Islands by ferry, revisiting the cherry-blossom festivals of Kyoto, and taking annual road-trip
    pilgrimages to the Pacific Northwest’s coastal towns, always booking accommodations well in advance to avoid last-minute stress.
  culinary: Annette Taylor, an adept home cook, delights in preparing family-heritage dishes like slow-cooked beef pot roast with rosemary, homemade lemon herb chicken, and seasonal roasted vegetables,
    while also experimenting with artisanal cheese boards featuring aged cheddar and brie, and treats herself to occasional sushi rolls with fresh tuna and avocado on clear evenings.
  core: Annette Taylor lives by the credo that a well-ordered notebook is as powerful as a well-crafted alibi, balancing relentless routine with occasional bursts of creativity, all while never missing
    a Sunday crossword puzzle.
background:
  cultural: Annette was raised in a middle‑class, Midwestern white family that emphasized practicality, hard work, and community responsibility. Her upbringing instilled a respect for routine, traditional
    values, and self‑reliance. After moving to Washington, D.C., she absorbed the city’s professional and civic culture while preserving her Midwestern roots. This blend of regional sensibilities, combined
    with a STEM‑focused education, shapes her pragmatic worldview and her balanced approach to both work and personal life.
attributes:
  skills: '["Surveillance", "Digital forensics", "Data analysis", "Interviewing and interrogation", "Report writing", "Case management", "Criminal law basics", "Cybersecurity fundamentals", "Evidence preservation",
