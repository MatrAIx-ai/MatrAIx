personas:
  professional: Maria Dominguez, a seasoned casino security officer, leverages their bilingual fluency, meticulous incident documentation, and composed de‑escalation tactics to keep patrons safe while quietly
    mentoring newcomers, driven by a strong sense of community and an undercurrent of worry about overlooking a detail.
  sports: Maria Dominguez, an avid trekker with the San Antonio Hiking Society, explores the Hill Country trails each weekend, fortifies their fitness through daily yoga and occasional pickup basketball
    at the community center, and passionately follows the San Antonio Spurs during the NBA season.
  arts: Maria Dominguez, a devoted fan of traditional mariachi legends like Vicente Fernández and contemporary voice Lila Downs, attends local cultural festivals where they admire vibrant mural art reminiscent
    of Diego Rivera, and unwinds after long shifts by knitting scarves while listening to classic film scores by Ennio Morricone.
  travel: Maria Dominguez, a meticulous planner, prefers weekend road trips to the Texas Hill Country and annual spring visits to Santa Fe’s art districts, while dreaming of an extended journey exploring
    the cobblestone streets and markets of Oaxaca, though budget constraints keep such trips on a wish list.
  culinary: Maria Dominguez, a confident home cook, prepares authentic pozole rojo and hand‑rolled tamales with masa, chilies, and fresh cilantro for gatherings, and treats themselves to gourmet tacos from
    a downtown food truck featuring slow‑cooked carnitas and pineapple salsa.
  core: Maria Dominguez, a diligent security professional, balances a methodical approach to surveillance with a secret habit of late‑night crossword marathons, constantly worries about missing a detail
    yet finds calm in yoga and flavor‑rich cooking.
background:
  cultural: Maria is a first-generation Mexican-American raised in San Antonio’s vibrant Latino community. She grew up bilingual, speaking Spanish at home and English at school, and celebrates cultural
    traditions such as Día de los Muertos, Cinco de Mayo, and festive mariachi music. Her upbringing emphasized family solidarity (familismo), respect for elders, and community service, values that shape
    her cooperative nature and dedication to public safety. She draws pride from her heritage while navigating life as a Latina professional in a predominantly male security field.
attributes:
  skills: '[''Surveillance system operation'', ''CCTV monitoring'', ''Incident reporting'', ''De-escalation techniques'', ''Conflict resolution'', ''Basic first aid and CPR'', ''Defensive tactics'', ''Risk
