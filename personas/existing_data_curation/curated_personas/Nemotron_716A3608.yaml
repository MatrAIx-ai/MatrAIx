    ''Attention to detail'']'
  hobbies: '[''Hiking in the Texas Hill Country'', ''Cooking traditional Mexican dishes'', ''Puzzle solving (crosswords, sudoku)'', ''Reading true-crime books'', ''Yoga for stress relief'', ''Volunteering
    at a senior center'', ''Attending local cultural festivals'', ''Gardening'', ''Knitting'', ''Learning Spanish poetry'']'
  career_goals: Maria aims to advance from a front-line security officer to a supervisory role within the next three years, seeking certification as a Loss Prevention Manager and pursuing a community college
    associate degree in Criminal Justice. Long-term, she aspires to become a security manager or consultant for casinos, leading teams in implementing technology-driven surveillance solutions and mentoring
    new officers. She also hopes to advocate for mental-health resources for security personnel, drawing on her own experiences with stress.
