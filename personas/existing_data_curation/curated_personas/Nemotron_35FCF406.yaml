  hobbies: '[''Hiking'', ''Kayaking'', ''Birdwatching'', ''Photography'', ''Reading (Science & Philosophy)'', ''Acoustic Guitar'', ''Italian Cooking'', ''Competitive Video Gaming'', ''Volunteering for Environmental
    Clean‑ups'']'
  career_goals: Rebecca aims to complete a bachelor’s degree in Environmental Science with a concentration on data‑driven conservation strategies. She plans to secure internships with state environmental
    agencies or nonprofit NGOs to apply her analytical skills to real‑world ecosystem monitoring and policy development. In the long term, she envisions a career as an environmental data analyst or sustainability
    consultant, designing evidence‑based solutions to protect the Pacific Northwest’s natural resources. To strengthen her credentials, she intends to earn professional certification in GIS and eventually
    lead grant‑funded community projects that blend scientific rigor with grassroots activism.
