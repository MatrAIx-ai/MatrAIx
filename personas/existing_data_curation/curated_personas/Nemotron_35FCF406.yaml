personas:
  professional: Rebecca Brescia is an aspiring environmental data analyst who combines rigorous GIS mapping, Python‑based statistical analysis, and a photographer’s eye for detail to produce evidence‑driven
    conservation recommendations for local NGOs, while their critical, competitive nature ensures data quality and timely delivery.
  sports: Rebecca Brescia is a devoted outdoor athlete who hikes the rugged trails of Olympic National Park multiple times a week, paddles the Strait of Juan de Fuca in summer, trains with the Port Angeles
    Outdoor Adventure Club for endurance, and follows the Seattle Seahawks for inspiration.
  arts: Rebecca Brescia expresses creativity through landscape photography inspired by Ansel Adams, acoustic guitar sessions echoing Joni Mitchell and Fleet Foxes, and songwriting that weaves environmental
    narratives, regularly performing at open‑mic nights at the Port Angeles Community Center.
  travel: Rebecca Brescia prefers low‑impact weekend getaways, having trekked the Hoh Rainforest, visited Victoria, BC, and dreaming of Patagonia’s Torres del Paine, while planning future trips with a carbon‑offset
    budget and a mix of adventure and relaxation.
  culinary: Rebecca Brescia finds comfort in cooking traditional Italian meals like risotto al funghi and spaghetti carbonara, meticulously balancing herbs and cheese, though they occasionally over‑salt
    the pasta and keep leftovers for late‑night study sessions.
  core: Rebecca Brescia is a 19‑year‑old who blends curiosity with practicality, turning data analysis into environmental action, capturing nature through a lens, and navigating life with a competitive
    edge tempered by occasional procrastination.
background:
  cultural: Rebecca comes from a white Italian‑American family; her surname reflects roots in northern Italy, and she was raised with cultural traditions such as Sunday family meals, homemade pasta, and
    celebration of Catholic holidays like Christmas Eve. Growing up in Port Angeles, Washington, she has absorbed the Pacific Northwest’s strong emphasis on nature, outdoor recreation, and environmental
    stewardship. Her education has introduced her to the history and values of the local Clallam tribal community, fostering a respect for indigenous perspectives on land and resource management. This blended
    cultural backdrop shapes her worldview, combining a love for family heritage with a deep appreciation for the coastal environment and a commitment to sustainable living.
