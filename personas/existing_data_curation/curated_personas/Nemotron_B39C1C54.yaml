  hobbies: '[''Cooking'', ''Live Music'', ''Yoga'', ''Reading'', ''Journaling'', ''Community Volunteering'', ''Gardening'', ''Board Games'', ''Crocheting'', ''Attending Church Events'']'
  career_goals: Sheila aims to advance from a stocker to a shift supervisor within the next two years, then pursue a warehouse manager role. To support this trajectory, she plans to earn an Associate’s
    degree in Supply Chain Management and obtain certifications such as Certified Logistics Associate and forklift operator licensing. Long‑term, she hopes to secure a stable income that enables home ownership
    in Nashville and possibly launch a small side business focused on catering Southern soul‑food specialties.
