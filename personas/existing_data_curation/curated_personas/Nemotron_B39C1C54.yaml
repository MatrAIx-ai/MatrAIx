personas:
  professional: Sheila Davis is a detail‑oriented warehouse stocker who leverages her inventory‑management expertise, forklift certification, and methodical work ethic to pursue a rapid promotion to shift
    supervisor and ultimately warehouse manager.
  sports: Sheila Davis roots for the Tennessee Titans and Nashville Predators, plays in a co‑ed recreational softball league each spring, and slots in early morning jogs around Centennial Park to keep stamina
    high for the fast‑paced warehouse environment.
  arts: Sheila Davis immerses themselves in Nashville’s live‑music venues, enjoying country legend Dolly Parton and contemporary R&B artist H.E.R., while winding down with contemporary fiction by Celeste
    Ng and crocheting vibrant blankets inspired by folk art motifs.
  travel: Sheila Davis favors meticulously planned weekend getaways, balancing hikes in the Great Smoky Mountains with foodie tours of New Orleans, and dreams of a road trip along the Blue Ridge Parkway
    to explore regional cuisines and scenic overlooks.
  culinary: Sheila Davis loves cooking soulful Southern dishes such as crispy fried chicken, seasoned collard greens, buttery cornbread, and peach cobbler, often seasoning with smoked paprika, cayenne pepper,
    and a hint of molasses, and delights in sharing these meals at neighborhood potlucks.
  core: Sheila Davis is a structured, community‑focused 24‑year‑old who blends warehouse precision with a passion for soulful cooking, yoga serenity, and a clear‑cut ambition to lead and nurture both career
    and friendships.
background:
  cultural: Sheila is a Black woman raised in Nashville, deeply rooted in the city’s African‑American community and Southern heritage. Her upbringing blends gospel music, soul food traditions, and strong
    church involvement, reflecting the cultural legacy of the Great Migration and local Black arts movements. She participates in community events like the Nashville Black Arts Festival, values family ties,
    and embraces both the eclectic music scene and the rich culinary customs that define her cultural identity.
attributes:
