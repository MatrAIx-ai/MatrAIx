  career_goals: Over the next five years, Jeffrey aims to earn the Certified Professional Horticulturist credential and obtain a California Landscape Contractor's license. He plans to move from crew member
    to crew lead, taking on supervisory duties that let him impose structured workflows while still accommodating the day‑to‑day variability of field work. Ultimately, he hopes to launch his own small‑scale
    landscaping business specializing in water‑wise design for desert homes, giving him control over realistic timelines that reduce stress and support a balanced work‑life rhythm.
