personas:
  professional: A data-driven junior business analyst, Carolyn Cutchins leverages strong spreadsheet modeling and market research expertise to translate complex financial data into clear, actionable insights,
    balancing analytical curiosity with a pragmatic, results-oriented mindset while they methodically pursue CBAP certification and future MBA studies.
  sports: An outdoor-oriented fitness enthusiast, Carolyn Cutchins enjoys weekend hikes in the nearby Cascades, practices yoga three times weekly, follows the Seattle Seahawks, Mariners, and Sounders, and
    runs with the local "Green Trail Runners" club on weekday evenings.
  arts: A reflective arts aficionado, Carolyn Cutchins curates a small vinyl collection featuring Sufjan Stevens, Debussy, and folk classics, studies Ansel Adams photography during weekend workshops, and
    attends intimate performances at the Seattle Repertory Theatre.
  travel: A meticulous solo traveler, Carolyn Cutchins plans short, low-budget trips to nearby natural escapes like the San Juan Islands and Olympic National Park, dreams of exploring Kyoto's temples and
    Iceland's geothermal pools, and balances travel ambitions with a modest savings plan.
  culinary: A creative home chef, Carolyn Cutchins experiments with sous-vide salmon, kimchi fermentation, and beetroot risotto, favors ingredients such as matcha, smoked paprika, and miso, and enjoys the
    challenge of turning pantry staples into gourmet meals while still relying on meal-prep routines for busy weekdays.
  core: Carolyn Cutchins is a solitary, curiosity-driven analyst who blends disciplined data work with experimental cooking, weekend hikes, and a habit of indulging in cozy book marathons, though they occasionally
    procrastinate on flossing and impulsively buy niche reads.
background:
  cultural: Raised in a middle‑class New England family, Carolyn’s cultural background reflects the values of educational attainment, self‑reliance, and community involvement typical of the Boston suburbs.
    Growing up in Somerville’s diverse and progressive environment, she was exposed to a mix of cultural perspectives that fostered openness and a commitment to social responsibility. Her upbringing emphasized
    practical hard work, modesty, and a respect for public institutions and civic engagement.
