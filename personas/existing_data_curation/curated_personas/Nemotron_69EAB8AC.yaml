  career_goals: She aims to secure a junior business analyst role within a forward-thinking organization that values data-driven decision-making and social impact. In the next three to five years, she plans
    to earn a professional certification such as the Certified Business Analysis Professional (CBAP) and consider an MBA to deepen her strategic leadership capabilities. Ultimately, she aspires to lead
    cross-functional projects that blend innovative solutions with sustainable business practices, possibly transitioning into a product manager or consulting role.
