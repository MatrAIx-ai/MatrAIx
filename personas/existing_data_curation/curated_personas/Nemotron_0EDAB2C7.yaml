personas:
  professional: Cynthia Collins, an 18‑year‑old visual arts student, translates a blend of digital illustration, sketching, and basic HTML/CSS into freelance illustration and graphic design work, using
    their curious, competitive edge and occasional disorganization to produce bold indie‑game art and book covers while informally mentoring peers in a loosely structured online studio that they run whenever
    inspiration strikes.
  sports: Cynthia Collins enjoys low‑key fitness like weekend hikes in the Adirondacks and occasional pickup basketball at local parks, follows the Rochester Red Wings baseball team and the Buffalo Bills
    football club, and participates in a casual community yoga class each spring, preferring relaxed, social exercise over competitive sports that they find unnecessarily stressful.
  arts: Cynthia Collins spends Saturdays at the Memorial Art Gallery, adores experimental ambient composers such as Aphex Twin and Tim Hecker, immerses in graphic novels like 'Saga' and 'Sandman,' and frequently
    revisits indie films like 'Moonlight' and 'The Lobster,' letting these influences shape their sketchbook aesthetics and design sensibility, which they nurture through nightly listening sessions.
  travel: Cynthia Collins favors spontaneous weekend road trips to places like Niagara Falls, Boston, and the Catskills for photography inspiration, while dreaming of an immersive trip to Iceland's northern
    lights and Japan's cherry‑blossom festivals, all within a tight student budget that they manage through careful planning and occasional splurges on affordable hostels.
  culinary: Cynthia Collins prefers simple, creative meals—avocado toast topped with pepper jack cheese, miso ramen with soft‑boiled eggs, and occasional sushi rolls like spicy tuna—while experimenting
    with matcha latte art at the local café, though their cooking skill hovers at the level of reheating leftovers and occasional one‑pot dishes that they perfect only when time permits.
  core: Cynthia Collins is a curious yet anxious 18‑year‑old artist who balances a chaotic creative spark with a habit of midnight coffee‑fuelled sketching, impulse art‑supply buys, and an ever‑growing
    catalogue of indie‑game concepts that they chase despite frequent bouts of self‑doubt.
background:
  cultural: Cynthia was raised in Penfield, a middle-class suburb of Monroe County, New York, in a family of European descent (primarily Irish and German ancestry). Growing up near Rochester exposed her
    to a vibrant cultural scene, including museums, music festivals, and a strong emphasis on public education. Her upbringing combined the values of independence and self-reliance typical of upstate American
    communities with an appreciation for the arts fostered by local institutions such as the George Eastman Museum and the Strong National Museum of Play.
attributes:
  skills: '[''Digital illustration'', ''Sketching'', ''Photography'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Critical analysis'', ''Research'', ''Creative writing'', ''Social media content
    creation'', ''Basic HTML/CSS'', ''Journaling for stress management'']'
  hobbies: '[''Sketching in parks'', ''Visiting art galleries'', ''Photography'', ''Listening to experimental music'', ''Reading philosophy and graphic novels'', ''Journaling'', ''Indie film screenings'',
    ''Playing strategy video games'', ''Board game nights with close friends'']'
  career_goals: Cynthia aspires to complete a Bachelor of Fine Arts in Visual Arts and launch a freelance illustration and graphic design practice that allows her creative freedom and flexibility. She aims
    to build a robust portfolio, secure commissions for indie game art and book cover designs, and eventually open a small studio where she can mentor other emerging artists. Her long-term ambition includes
    using her art to raise awareness about mental-health challenges, reflecting her personal experiences with stress.
