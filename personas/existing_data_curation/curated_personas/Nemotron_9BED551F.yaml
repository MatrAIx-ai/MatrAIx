personas:
  professional: Martha Grafal is a highly organized administrative professional who channels their STEM‑grounded attention to detail, advanced Excel and data‑analysis abilities, and bilingual communication
    skills into flawless calendar management and event planning, while their sociable, talkative nature makes them the friendly hub that keeps staff and management in sync.
  sports: Martha Grafal enjoys trekking the Santa Monica and Malibu coastal trails on weekends, plays recreational volleyball with the local beach league, roots for the Los Angeles Dodgers in baseball and
    the LA Galaxy in soccer, and maintains a balanced fitness routine by joining a neighborhood running club that meets every Thursday.
  arts: Martha Grafal is an avid fan of vibrant salsa and folk dance performances, regularly attends concerts by artists such as Carlos Santana and Shakira, admires the cinematic magic of directors such
    as Guillermo del Toro, and draws inspiration from Frida Kahlo’s bold paintings for their own knitting designs.
  travel: Martha Grafal prefers short, well‑planned trips, alternating between weekend getaways to Joshua Tree National Park and seasonal road trips along the Pacific Coast Highway to Big Sur, while dreaming
    of exploring the historic streets of Seville, Spain, and the bustling markets of Marrakech, Morocco.
  culinary: Martha Grafal’s kitchen is a lively lab for spicy salsas, homemade corn tortillas, slow‑cooked pork carnitas, and fragrant cilantro‑lime rice, reflecting their skillful home‑cook level that
    blends precise measurements with instinctual flair, often pairing dishes with fresh avocado, lime wedges, and a splash of mezcal‑infused sauce.
  core: Martha Grafal balances a love for orderly spreadsheets with a flair for lively salsa nights, ever‑ready to host friends over aromatic, spice‑laden feasts, even if that means occasionally losing
    track of time and sleeping through a morning alarm.
background:
  cultural: Martha was raised in a bilingual Mexican household in Orange County, blending rich Mexican traditions with Southern California life. She grew up celebrating Día de los Muertos, quinceañeras,
    and other family‑oriented festivals, while also embracing typical American customs. Her parents instilled the values of hard work, respect for elders, and strong community ties, which she carries into
    her professional and personal interactions. Fluent in both Spanish and English, Martha navigates both cultures fluidly, honoring her heritage through cuisine, music, and community involvement while
    thriving in the multicultural environment of La Habra.
