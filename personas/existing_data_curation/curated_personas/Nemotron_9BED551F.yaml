  career_goals: Martha aims to advance from her current administrative role to an Office Manager or Senior Administrative Professional position within the next five years. She plans to obtain a Certified
    Administrative Professional (CAP) credential and enroll in leadership workshops that blend her practical orientation with her STEM background. Long‑term, she envisions guiding a cohesive team, streamlining
    office processes, and possibly transitioning into a project coordination role that supports technical departments, all while maintaining a stable, structured career path that allows her to serve and
    uplift her colleagues.
