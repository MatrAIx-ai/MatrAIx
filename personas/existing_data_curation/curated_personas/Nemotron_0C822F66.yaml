  career_goals: Norman dreams of a future where he can combine his love of imagination, science, and helping others. He talks about becoming an astronaut who explores space and draws the galaxies he discovers,
    or a wildlife biologist who protects animals on ranches near Hereford. He also imagines being a storyteller or comic‑book artist who makes people laugh and feel connected. In the short term, he wants
    to win the school art contest, lead the class play, and learn more about rockets and dinosaurs.
