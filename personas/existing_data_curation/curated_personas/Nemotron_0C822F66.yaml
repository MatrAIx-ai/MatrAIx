personas:
  professional: Norman Sutton is a budding comic strip creator who blends vivid imagination with the disciplined building habits of LEGO, using their storytelling flair and sociable charisma to captivate
    classmates during school projects and Sunday school presentations.
  sports: Norman Sutton plays on the Hereford Youth Soccer Club, enjoys Friday night high school football games featuring the Hereford Jacks, cheers for the Dallas Cowboys and Texas Rangers on TV, and stays
    active by exploring the creek and joining after-school fitness drills, showing the same enthusiastic teamwork they bring to their school choir.
  arts: Norman Sutton delights in sketching comic strips inspired by Stan Lee's dynamic panels, sings country classics by Willie Nelson during choir rehearsals, and spends weekends at the community theater's
    country-music showcases, letting the melodies of Taylor Swift's storytelling stir their imagination for new LEGO adventures.
  travel: Norman Sutton loves family road trips that combine stops at the Texas State Fair in Dallas, an adventurous hike in the Grand Canyon, and a magical weekend at Walt Disney World in Orlando, preferring
    itineraries that balance scheduled sightseeing with spontaneous ice-cream breaks at roadside diners.
  culinary: Norman Sutton savors smoky Texas BBQ brisket and tangy tacos al pastor, eagerly helps stir the family's chili with a pinch of smoked paprika, proudly claims mastery of assembling peanut-butter-and-jelly
    sandwiches, and treats birthday cake with extra strawberry frosting as the ultimate reward for a week of LEGO building.
  core: Norman Sutton is an endlessly curious 7-year-old who turns creek finds into epic stories, can't resist the glow of LEGO bricks, hums country tunes while chatting nonstop, and occasionally forgets
    to finish homework when a new comic idea strikes.
background:
  cultural: Norman was raised in Hereford, a small ranching town in West Texas. His family reflects the region’s Anglo‑American heritage, with strong community ties, a love for country music, Texas BBQ,
    and local traditions such as the annual county fair, high‑school football games, and Fourth of July fireworks. He attends a local public elementary school and a Sunday school program at a nearby Methodist
    church, where values of hospitality, respect for hard work, and helping neighbors are emphasized. The multicultural flavor of the area, including neighboring Hispanic families, also introduces him to
    Spanish words and Mexican food, adding a subtle layer to his cultural experience.
