personas:
  professional: Doris Graham is a budding junior architect who meticulously plans LEGO constructions, follows step‑by‑step guides, and competes with classmates to build the tallest tower, reflecting a blend
    of curiosity and practical organization.
  sports: Doris Graham is a spirited member of the "Thunder Cubs" youth soccer team, loves dribbling as a forward, follows the professional club Manchester United on TV, and also participates in a weekend
    gymnastics club, balancing competitive drive with organized practice.
  arts: Doris Graham delights in drawing bright dinosaurs with Crayola crayons, sings along to The Wiggles and feels inspired by the whimsical storytelling of Dr. Seuss, often reenacting favorite scenes
    from the movie "Frozen" during playtime.
  travel: Doris Graham’s family road trips include a weekend at the seaside boardwalk and a summer visit to Disneyland, and they dream of exploring the Grand Canyon and a future trip to Tokyo’s kid‑friendly
    attractions, preferring itineraries with clear maps and plenty of play breaks.
  culinary: Doris Graham favors creamy macaroni‑and‑cheese, chicken nuggets with honey mustard, crunchy apple slices, and can independently spread peanut butter on toast, while occasionally experimenting
    with adding a dash of cinnamon to oatmeal for extra flavor.
  core: Doris Graham is a methodical, curiosity‑driven five‑year‑old who balances meticulous planning with playful competition, from building LEGO towers to saving coins for prized toys.
background:
  cultural: Doris is raised in a middle‑class white family in Denver, Colorado. Her upbringing combines mainstream American traditions—such as celebrating Thanksgiving, Christmas, and the Fourth of July—with
    a strong emphasis on outdoor recreation typical of Colorado, including visits to parks, hikes in the foothills, and seasonal snow play. The multicultural environment of Denver exposes her to diverse
    foods and community events, while her household values education, environmental stewardship, and community involvement.
