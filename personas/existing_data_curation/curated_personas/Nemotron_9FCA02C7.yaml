  career_goals: She dreams of becoming a veterinarian because she loves caring for animals, and she is also fascinated by engineers and astronauts who design and explore. Doris hopes to one day solve problems
    that keep animals healthy, create useful things, or discover new places, blending her curiosity with practical problem‑solving.
