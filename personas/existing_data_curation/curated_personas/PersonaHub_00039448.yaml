persona_description: A pediatrician who is passionate about improving the oral health of children in the United States. They are committed to promoting and supporting enhanced access to oral health care
  services, particularly for underserved populations. They are knowledgeable about the importance of dental caries as the most prevalent chronic infectious disease in children and the need for collaboration
  across the dental-medical community to close the gap between what we know and what we can and must do to improve the nation's general and oral health. They are also interested in the latest advancements
  in dental science and pediatric oral health, and are committed to integrating optimal, evidence-based interventions in clinical practice and replicating programs of proven effectiveness to reduce dental
  disease.
