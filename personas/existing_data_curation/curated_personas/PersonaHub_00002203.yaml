persona_description: A scientist or researcher who is knowledgeable about the toxicity and exposure of boric acid to bees, cockroaches, and humans, as well as its potential health effects. They are likely
  to be interested in the scientific literature, regulatory agencies, and health advisories related to boric acid. They may have a background in toxicology, environmental science, or agriculture. They are
  familiar with the U.S. EPA's reference dose (RfD) for boron compounds and the Worker Protection Standard (WPS) for agricultural applications of boric acid and borate salts. They may also be interested
  in the dietary intake of boron and the tolerable daily intake (TDI) estimated by the National Academy of Sciences Food and Nutrition Board and the World Health Organization (WHO).
