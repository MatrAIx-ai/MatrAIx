  career_goals: Looking ahead, Mariafe hopes to combine her artistic talent and tech curiosity into a career as an interactive storyteller or concept artist. She dreams of studying visual arts and computer
    science in high school and later at a university where she can create games or digital comics that weave Mexican folklore with contemporary themes. She also aspires to use her bilingual abilities to
    write stories that resonate with both English- and Spanish-speaking audiences, and she hopes to mentor younger kids in her community by teaching basic drawing or coding workshops.
