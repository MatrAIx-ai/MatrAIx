personas:
  professional: Mariafe Correa, an aspiring digital artist and budding Minecraft world-designer, channels their vivid imagination and meticulous sketching skills into crafting intricate fantasy realms,
    while their balanced blend of organization and curiosity makes them a reliable collaborator on school creative projects.
  sports: Mariafe Correa enjoys kicking a soccer ball for the Reedley Rangers youth league in the spring, follows the Los Angeles Dodgers on baseball season weekends, and practices short yoga stretches
    after school for calm, while they also cheer on the Fresno State Bulldogs basketball team when games air on local TV.
  arts: Mariafe Correa spends evenings sketching original fantasy heroes while listening to indie folk tunes by Mitski, Phoebe Bridgers, and the acoustic strums of Jose Gonzalez, finds inspiration in Studio
    Ghibli films like Spirited Away, and devours graphic novels by Neil Gaiman, which together shape their artistic voice and fuel their Minecraft world-building.
  travel: Mariafe Correa loves planning weekend adventures that blend low-key nature hikes in the nearby Sierra foothills with family outings to Disneyland, dreams of stargazing in Chile's Atacama Desert
    and exploring the ancient ruins of Machu Picchu, but their travel choices remain guided by school schedules and parental budget constraints.
  culinary: Mariafe Correa enjoys helping their grandparents roll fresh tortillas and simmer rich mole for holiday feasts, occasionally mastering the buttery swirl of pan dulce and experimenting with cinnamon-spiced
    churros, while also savoring avocado toast with lime zest for quick after-school snacks.
  core: Mariafe Correa blends a vivid imagination with a disciplined habit of doodling in any spare margin, yet they have a notorious habit of losing their favorite sketchbook after a weekend of exploring
    the backyard night sky.
background:
  cultural: Mariafe comes from a Mexican-American family rooted in the agricultural community of Reedley, California. Her parents and grandparents migrated from Jalisco, bringing with them a rich tapestry
    of traditions, from Dia de los Muertos altars to the weekly ritual of sharing tortillas and mole with extended relatives. Spanish is spoken at home, and family gatherings emphasize respect for elders,
    communal support, and the celebration of cultural festivals such as Cinco de Mayo and Las Posadas. Living in Tulare County, she is accustomed to the rhythms of farm life, often seeing fields of citrus
    and grapes, which has taught her the value of hard work and perseverance. The blend of Mexican heritage and the multicultural environment of Central Valley schools gives her a unique perspective that
    she carries into her creative pursuits.
