  career_goals: Although officially retired, Cynthia is eager to keep contributing to her community and to her own personal growth. She aims to curate a rotating community art exhibit in the New Boston
    library that showcases local artists and evokes spontaneous, unconventional themes. She also plans to complete a memoir that blends travel anecdotes, reflections on aging, and her love of art, hoping
    to self‑publish it for other seniors. Cynthia aspires to teach casual art‑appreciation workshops at the local senior center, volunteer as a docent at the nearby museum, and refine her digital photography
    skills so she can document regional festivals and natural landscapes. Her overarching ambition is to nurture intergenerational creativity while staying open to new ideas and experiences.
