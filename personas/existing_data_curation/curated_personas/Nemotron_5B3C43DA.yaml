personas:
  professional: Cynthia Borland, a retired community arts advocate, channels her curiosity and spontaneous flair into curating a rotating exhibit at the New Boston library, coordinating informal art fairs
    and mentoring seniors despite occasionally struggling with tight deadlines and rigid planning.
  sports: Cynthia Borland enjoys leisurely hikes through the Monroe County wetlands, watches the Rochester Red Wings baseball games at Frontier Field, supports the Buffalo Bills, and occasionally joins
    a low‑impact yoga class at the community center to stay limber.
  arts: Cynthia Borland finds inspiration in Monet’s water lilies and Ansel Adams’ black‑and‑white landscapes, spends weekends at the regional art museum, shares her watercolor studies of the Lake Erie
    shoreline, and knits patterns that echo the rhythmic strokes of brushwork.
  travel: Cynthia Borland often escapes to the Finger Lakes for weekend vineyard tours, dreams of strolling the historic streets of Savannah, Georgia, and reminisces about a memorable trip to the Scottish
    Highlands where she photographed misty lochs.
  culinary: Cynthia Borland delights in cooking seasonal dishes such as roasted beet and goat‑cheese salad, wild rice pilaf with locally foraged mushrooms, and fresh corn chowder, often seasoning with rosemary
    and sage harvested from her garden.
  core: Cynthia Borland blends a lifelong love of art and nature with a spontaneous spirit, turning casual hikes into watercolor sessions, while occasional forgetfulness about appointments and hoarding
    of craft supplies are offset by her unwavering calm and community‑focused generosity.
background:
  cultural: Cynthia was raised in a white, Midwestern American family with German‑Irish roots in the small‑town setting of New Boston, Michigan. The region’s blend of agricultural heritage, close‑knit community
    values, and proximity to the Great Lakes has instilled in her a grounded, self‑reliant outlook paired with an appreciation for natural beauty and local folk traditions. Growing up in post‑war America,
    she experienced the rise of community arts programs and public libraries, which fostered her lifelong curiosity and love for the arts. Her cultural upbringing emphasizes modesty, resilience, and a cooperative
    spirit, while also allowing space for spontaneous, unconventional thinking—a balance reflected in her calm demeanor and openness to new experiences.
