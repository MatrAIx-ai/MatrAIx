personas:
  professional: Francisco Medina, a 20‑year‑old EMT with an associate’s degree in Emergency Medical Services, excels at rapid triage, CPR, and bilingual patient communication while channeling their skeptical,
    competitive nature into constantly evaluating new pre‑hospital tech and mapping a path toward air‑medical transport and community‑paramedicine leadership.
  sports: Francisco Medina regularly hikes the Santa Cruz Mountains, plays weekend beach volleyball with friends, follows the San Francisco Giants, Golden State Warriors, and San Jose Earthquakes, and participates
    in a local climbing club, balancing solitary endurance training with occasional competitive team play.
  arts: Francisco Medina captures Bay Area murals in gritty street‑photography, draws digital illustrations inspired by Banksy and local muralist Alex Razz, attends openings at the San Jose Museum of Art,
    and streams indie soundtracks from Tame Impala and Phoebe Bridgers, letting these influences shape their visual storytelling.
  travel: Francisco Medina enjoys weekend road trips to Muir Woods and Portland’s food cart scene, dreams of exploring Oaxaca’s vibrant markets and the street‑art districts of Berlin, and prefers a mix
    of meticulously planned itineraries and spontaneous detours that satisfy their competitive curiosity.
  culinary: Francisco Medina experiments with Mexican dishes like ahi tuna tacos with chipotle‑lime crema and quinoa‑stuffed chiles en nogada, enjoys sourcing ancho chilies, epazote, and fresh cilantro,
    and rates themselves a competent home chef who occasionally over‑spices in the quest for bold flavors.
  core: Francisco Medina is a fiercely curious EMT who balances meticulous savings with spontaneous art projects, lives on a steady caffeine intake, and never skips a sunset hike even after a night shift.
background:
  cultural: Francisco was raised in a bilingual Mexican‑American household where Spanish and English are spoken interchangeably, and family gatherings revolve around traditions like Día de los Muertos and
    shared meals of mole and tamales. His parents instilled a strong sense of familismo, emphasizing respect for elders and community solidarity, which he carries into his work serving diverse populations
    in Redwood City. Living in the multicultural Bay Area has exposed him to a blend of Mexican heritage and Californian progressive culture, shaping his appreciation for both traditional art forms and
    contemporary creative expression. He actively participates in local Mexican community events, while also engaging with the broader artistic and tech scenes that reflect his curiosity and openness to
    unconventional ideas.
attributes:
  skills: '["Basic Life Support (BLS) certification", "Advanced Cardiovascular Life Support (ACLS) coursework (in progress)", "Patient assessment and rapid triage", "Airway management (oropharyngeal, nasopharyngeal,
    bag‑valve‑mask)", "Intravenous catheter insertion and medication administration", "Emergency medical equipment operation (AED, portable suction, monitor‑defibrillator)", "Electronic health record (EHR)
    documentation", "Bilingual communication (English/Spanish)", "Crisis communication and stress de‑escalation", "Team coordination and incident command basics", "Community health outreach and education",
    "Familiarity with tele‑medicine tools for pre‑hospital care"]'
  hobbies: '["Street photography of Redwood City and San Francisco Bay Area", "Visiting galleries and street‑art tours", "Digital illustration and sketching", "Hiking in the Santa Cruz Mountains", "Cooking
    Mexican cuisine with contemporary twists", "Playing indie video games and puzzle solvers", "Reading speculative fiction and science journalism", "Volunteer health education at local community centers",
    "Building DIY health‑tech prototypes (Arduino, Raspberry Pi)", "Participating in EMT skill‑competitions and hackathons"]'
  career_goals: In the short term, Francisco aims to earn full paramedic certification within the next two years and enroll in a bachelor's program in emergency health services or nursing. He is targeting
    a position with a regional air‑medical transport unit to gain experience in high‑acuity, rapid‑response environments. Long‑term, he envisions leading a community‑paramedicine initiative in the Bay Area
    that blends culturally responsive health education with art‑based therapeutic interventions for underserved populations. He also hopes to mentor emerging EMTs, influence emergency services policy, and
    collaborate with health‑tech startups on wearable monitoring devices that enhance pre‑hospital patient assessment.
