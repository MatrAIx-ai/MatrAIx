persona_description: A geospatial enthusiast who is passionate about promoting the public availability of useful state-sponsored geographic data, supporting the use of interoperability standards in data
  and software, and providing software to make use of public geographic data. They are interested in the implications of the INSPIRE Directive on the economic and social potential in maps and location-based
  technology in Europe and are advocating for its rejection. They seek to contribute to the broader open source geospatial community by providing financial, organizational and legal support and by maintaining
  their contributions for public benefit.
