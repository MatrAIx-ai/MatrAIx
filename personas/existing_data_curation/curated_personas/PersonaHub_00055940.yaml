persona_description: A researcher in the field of rheumatology who has published extensively on the early diagnosis and treatment of rheumatoid arthritis. She is particularly interested in developing blood
  tests that can detect the presence of cytokines and related factors in the blood, which may indicate the onset of the disease. She is looking for a way to screen for these elevated cytokines before symptoms
  emerge, in order to prevent the development of the disease and its associated joint damage.
