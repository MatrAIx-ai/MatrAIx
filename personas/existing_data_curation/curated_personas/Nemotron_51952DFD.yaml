personas:
  professional: Maribel Flores is a budding digital content creator who blends their love for folkloric dance, pop choreography, and quick‑fire cooking demos into 60‑second TikTok videos, and volunteers
    as a peer tutor at the community center, displaying an organized‑yet‑flexible work ethic and a natural flair for being the center of attention.
  sports: Maribel Flores spends most weekends dribbling and scoring at the neighborhood park with friends in a pick‑up squad called the Strikers, follows the hometown professional club the River City Rockets,
    idolizes star forward Alex Martinez, and balances an energetic approach to fitness with occasional knee strains after school games.
  arts: Maribel Flores delights in weaving traditional folkloric dance steps with contemporary pop moves to songs by Billie Eilish and Bad Bunny, sketches graphite portraits of family members during quiet
    evenings, and escapes into young‑adult novels like *Six of Crows* while attending local theater productions of *Hamilton*, illustrating how artistic expression fuels their sociable and talkative spirit.
  travel: Maribel Flores loves planning DIY weekend getaways with their grandmother, has already explored the nearby coastal town of Santa Cruz and hiked the trails of Redwood National Park, and now dreams
    of wandering the historic streets of Prague and the vibrant souks of Marrakech, all while juggling schoolwork and a modest allowance.
  culinary: Maribel Flores experiments in the kitchen by reinventing classic family dishes like corn‑based tamales with quinoa filling and chipotle‑marinated chicken tacos, adds unexpected twists such as
    mango‑salsa drizzles to avocado toast, and often films these creations for TikTok, showcasing their enthusiasm for blending traditional flavors with modern culinary trends.
  core: Maribel Flores is a vivacious teen who fuses dance, cooking, and tutoring into a whirlwind of creativity, never misses a chance to be the spotlight, yet habitually stays up late editing videos,
    sacrificing sleep for the next viral post.
background:
  cultural: Maribel is a second‑generation Mexican‑American raised in Glendale, Arizona. Her household speaks Spanish and celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family-oriented
    gatherings centered around food. The vibrant local Mexican community influences her through cultural festivals, neighborhood taquerías, and church events. Growing up, she has blended Mexican family
    values—respect for elders, communal support, and the central role of cuisine—with the multicultural environment of the Southwest, shaping her identity as a proud, bilingual, and culturally aware teen.
