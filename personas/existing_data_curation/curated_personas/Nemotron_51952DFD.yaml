  hobbies: '["Folkloric and contemporary dance", "Creating TikTok videos", "Soccer", "Reading young‑adult novels", "Sketching family portraits", "Volunteering at community center tutoring", "Cooking and
    recipe experimentation with family"]'
  career_goals: Maribel aims to combine her love for communication, culture, and community service. In the short term, she plans to build a portfolio of video stories and articles that highlight Mexican‑American
    experiences, secure a summer internship at a local news or media outlet, and participate in a high‑school media arts program. Long‑term, she envisions a career as a multimedia journalist or digital
    content creator focusing on community narratives, while also considering a path in nursing or community health education to apply her practical side and desire to help others.
