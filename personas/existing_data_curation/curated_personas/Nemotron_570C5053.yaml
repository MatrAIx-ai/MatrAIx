  career_goals: Joe aims to secure an entry‑level business analyst role where he can apply his analytical skills while working in a structured, low‑stress environment. He values organizations that emphasize
    teamwork in small groups and provide clear responsibilities, allowing him to balance his need for reliability with his curiosity for new tools. In the longer term, he hopes to earn professional certifications
    such as the CBAP or CPA and possibly pursue a part‑time MBA to deepen his strategic insight. Ultimately, he envisions a career trajectory that offers stability, opportunities for continuous learning,
    and the chance to contribute to community‑focused projects.
