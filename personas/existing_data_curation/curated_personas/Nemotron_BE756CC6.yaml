personas:
  professional: Samuel Ettedgui, a retired high school social-studies teacher turned community organizer, leverages decades of historical research, clear public speaking, and meticulous budgeting to lead
    volunteer projects, blending his routine-driven reliability with modest flexibility that keeps local heritage initiatives on schedule.
  sports: Samuel Ettedgui enjoys casual fitness through a weekly senior-softball league with the Baton Rouge Rivermen and a Wednesday-night bowling group, while passionately rooting for the New Orleans
    Saints in the fall and the LSU Tigers during college football season, balancing his love of the outdoors with routine physical activity.
  arts: Samuel Ettedgui immerses themselves in the arts by revisiting classic novels by Charles Dickens and historical biographies by David McCullough, attending occasional performances by the Baton Rouge
    Symphony featuring works of George Gershwin, and savoring the timeless jazz of Louis Armstrong on vinyl while discussing the latest community-theater production of 'Our Town' with friends.
  travel: Samuel Ettedgui prefers thoughtfully planned road trips that blend historical exploration and relaxed scenery, such as annual pilgrimages to New Orleans' French Quarter, weekend getaways to Charleston's
    cobblestone streets, and leisurely fishing expeditions down the Atchafalaya River, all balanced against a modest travel budget that prioritizes family-friendly destinations.
  culinary: Samuel Ettedgui, a proficient home chef, crafts authentic Cajun and Creole meals such as chicken and sausage gumbo seasoned with file powder, shrimp jambalaya bursting with Andouille, and red
    beans and rice garnished with fresh garden-grown okra, while delighting family and church potlucks with generous servings of homemade cornbread and beignets.
  core: Samuel Ettedgui embodies a steadfast, routine-loving mentor who channels his love of history into community service, yet secretly hoards vintage fishing lures in the garage and can't resist a late-night
    binge of classic literature, often neglecting bedtime.
background:
  cultural: Samuel was raised in a middle‑class white Southern family in Baton Rouge, with deep roots in the region’s French‑Creole and Anglo‑American heritage. His upbringing emphasized community, tradition,
    and practicality—values reflected in his love for routine and his respect for local customs. He grew up attending church, enjoying Southern cuisine, and participating in community events that celebrate
    Louisiana’s unique blend of cultures. This background informs his worldview, his commitment to preserving local history, and his preference for stable, familiar environments.
