persona_description: A scientist who specializes in the study of cosmic distances and the detection of distant galaxies. Finkelstein's research focuses on using infrared spectroscopy to measure the redshifts
  of distant galaxies and confirm their distances. He is particularly interested in the Frontier Fields project, which aims to hunt for galaxies up to 100 times fainter than what Hubble and other space
  observatories can normally glimpse. Finkelstein's work is an important part of the effort to detect the first stars in the universe and understand the early stages of its formation.
