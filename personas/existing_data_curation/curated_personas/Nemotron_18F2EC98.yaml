personas:
  professional: Eric Jones, a supply-store manager in the Texas Panhandle, blends hands-on troubleshooting and modest budgeting acumen with a relaxed, curiosity-driven leadership style that leans on empathy;
    they keep their small team humming despite occasional lapses in formal planning.
  sports: Eric Jones, a dedicated weekend angler and hunt-enthusiast, maintains their fitness through regular trips to prairie fields and practices shooting at a local gun club, while cheering on the Dallas
    Cowboys on Sundays and occasionally attending high-school football games in their county.
  arts: Eric Jones, a lover of classic country crooners like Johnny Cash and Dolly Parton, spends their evenings on the porch listening to their stories while occasionally attending the community church’s
    gospel choir and local barn-dance gatherings; they let those melodies inform their simple woodworking designs.
  travel: Eric Jones favors low-key, self-planned road trips in their pickup, often heading to nearby Bent Creek State Park for weekend fishing or to the Nebraska Sandhills for a hunt, while dreaming of
    a longer drive to the Canadian Rockies for a guided elk expedition; they keep most journeys within a day’s drive due to budget and family obligations.
  culinary: Eric Jones enjoys hearty, homestead-style meals, often cooking home-grown tomatoes into fresh salsa, simmering a pot of beef chili with beans and corn, and firing up a backyard smoker for brisket
    seasoned with a dash of smoked paprika and Worcestershire sauce; they consider their cooking skill a comfortable mix between competent home chef and occasional improvisor.
  core: Eric Jones embodies a pragmatic, curiosity-driven blend of solitary hands-on craft and quiet community service, stubbornly organized in tools yet blissfully disordered in daily scheduling; they
    are always ready to lend a hand while secretly hoarding the latest fishing lure.
background:
  cultural: 'Eric is a White Texan with Irish‑Scottish ancestry, reflected in his family name “Mac Jones.” Raised in the small town of Iowa Park, he grew up with strong Southern‑Western values: self‑reliance,
    community fellowship, and a respect for land and tradition. The local church, country‑music scene, and seasonal outdoor activities such as hunting and rodeos shaped his worldview. While his formal education
    ended before ninth grade, the practical, hands‑on culture of his upbringing fostered a deep appreciation for hard work, mutual support, and the simple pleasures of rural life.'
attributes:
  skills: '["Team Leadership", "Conflict Mediation", "Operations Management", "Basic Budgeting", "Inventory Control", "Customer Service", "Mechanical Troubleshooting", "Carpentry Repair", "Community Outreach"]'
  hobbies: '["Fishing", "Hunting", "Woodworking", "Classic Country Music", "Volunteer Work", "Automotive Repair", "Gardening", "Reading DIY Guides", "Attending Local Rodeos"]'
  career_goals: Eric aims to formalize his managerial experience by obtaining a GED and completing short business‑management courses at the local community college. He hopes to advance to a regional supervisor
    role, overseeing multiple store locations within the Texas Panhandle. Long‑term, he envisions opening his own small hardware and supply shop, where he can combine his practical skills with his desire
    to support the local community and mentor younger workers.
