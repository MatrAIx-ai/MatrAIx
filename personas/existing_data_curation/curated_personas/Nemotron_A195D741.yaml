personas:
  professional: Sheilla Coca, an aspiring teenage marine ecologist, combines a practical knack for building eco‑friendly Minecraft structures with a curious love of marine life, channeling their organized‑enough
    research notes into beach‑cleanup projects and school science fairs while maintaining a relaxed, flexible approach to deadlines.
  sports: Sheilla Coca enjoys school beach‑volleyball during the summer, follows the Cangrejeros de Santurce baseball team avidly, and trains with the local skateboarding club on weekends, preferring casual,
    social activity over rigorous competition while occasionally joining the community’s running group for shoreline jogs.
  arts: Sheilla Coca immerses themselves in graphic novels like "Saga" and "Ms. Marvel", strums the cuatro while listening to reggaetón artists such as Bad Bunny and salsa legends like Héctor Lavoe, and
    sketches vibrant beach festivals inspired by the works of painter José Campeche, all of which shape a bold, eclectic artistic voice.
  travel: Sheilla Coca prefers spontaneous, budget‑friendly trips, often organizing short weekend bike rides to El Yunque’s waterfalls and dreaming of a future backpacking adventure to Tokyo’s coastal districts,
    while fondly recalling family picnics on Culebra’s pristine beaches and a school excursion to San Juan’s historic Old City.
  culinary: Sheilla Coca experiments with family recipes, skillfully preparing plantain‑based mofongo with a drizzle of garlic‑lime sauce and fresh‑caught fish ceviche peppered with cilantro and chilies,
    yet occasionally over‑salts the dish or forgets to rinse the rice, showcasing an enthusiastic but imperfect kitchen confidence.
  core: Sheilla Coca blends a practical curiosity for marine ecosystems with a laid‑back, creative spirit, balancing beach clean‑ups, cuatro chords, and teen tech hobbies while navigating the typical teenage
    trade‑offs of organization, spending, and self‑care.
background:
  cultural: 'Sheilla is a 14‑year‑old Puerto Rican living in Vega Alta, a coastal municipality where family, community, and the sea shape daily life. Her upbringing reflects the island’s blend of Spanish,
    Taíno, and African heritage. She grows up hearing bomba and plena rhythms during local festivals such as the annual patron saint celebration, and she celebrates Christmas and Easter with Catholic traditions.
    The family’s meals often feature arroz con gandules, mofongo, and empanadillas, reinforcing a strong connection to Puerto Rican cuisine. Bilingualism is a norm: she speaks Spanish at home while also
    learning English at school, giving her a comfortable cross‑cultural fluency. Community values emphasize mutual support, and school programs encourage environmental stewardship, which resonates with
    her interest in marine conservation. These cultural threads—music, food, language, and a reverence for the island’s natural beauty—inform her identity and aspirations.'
attributes:
  skills: '[''Bilingual communication (Spanish‑English)'', ''Basic computer literacy and Scratch programming'', ''Creative writing and storytelling'', ''Illustration and graphic design'', ''Cuatro playing
    and vocal performance'', ''DIY craftsmanship (e.g., building birdhouses)'', ''Collaborative problem‑solving in group projects'', ''Basic cooking of Puerto Rican snacks'']'
  hobbies: '[''Beachcombing and marine life observation'', ''Playing the cuatro and singing'', ''Salsa/reggaetón dancing'', ''Reading graphic novels and sci‑fi'', ''Minecraft eco‑building'', ''Sketching
    local scenery'', ''Participating in community beach clean‑ups'', ''Cooking traditional Puerto Rican snacks'']'
  career_goals: Sheilla aspires to turn her curiosity about the ocean and her practical desire to help her community into a career. In the next few years she hopes to earn a scholarship to study marine
    biology or environmental science at the University of Puerto Rico, with the long‑term goal of working as a marine conservationist protecting the reefs off Vega Alta. She also imagines combining science
    with communication by becoming a science journalist or educator who can translate complex ecological concepts into stories for younger students. She dreams of creating a youth program that teaches sustainable
    fishing and beach‑cleaning practices, and she is intrigued by the idea of developing a mobile app that highlights local marine biodiversity. While she remains open to other possibilities, her ambitions
    consistently blend her love of learning, community service, and practical action.
