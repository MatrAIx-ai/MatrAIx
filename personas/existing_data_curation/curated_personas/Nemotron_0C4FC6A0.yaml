  hobbies: '[''Watercolor painting'', ''Poetry writing'', ''Visiting small art galleries and museums'', ''Reading philosophy and science non‑fiction'', ''Gardening native Floridian plants'', ''Birdwatching
    in local parks'', ''Experimental cooking'', ''Attending intimate book‑club meetings'', ''Volunteering to teach art workshops'', ''Photographing historic neighborhoods'']'
  career_goals: Karin aims to move into senior nonprofit leadership as a Director of Development or Chief Development Officer, overseeing a regional portfolio of fundraising initiatives that integrate innovative
    digital storytelling tools such as virtual reality tours and AI‑enhanced donor segmentation. She plans to mentor emerging women leaders in philanthropy, publish a guide on creative fundraising, and
    eventually launch her own consultancy that helps arts and cultural organizations craft bold, narrative‑driven campaigns. Her ambition is to set new benchmarks for donor engagement while maintaining
    the disciplined, results‑oriented approach that defines her work.
