  hobbies: '["birdwatching", "collecting rocks and shells", "reading (fantasy and science books)", "drawing and sketching nature scenes", "building LEGO and model kits", "simple cooking/baking with family",
    "nature hikes", "playing quiet board games (e.g., chess)", "journaling observations"]'
  career_goals: Thelma dreams of a future where she can protect the forests and streams of her Montana home, imagining herself as a wildlife biologist or park ranger who studies animals and helps keep habitats
    healthy. She also envisions a role as a community educator or gentle mediator, using her calm demeanor and caring nature to teach younger children about nature and to help resolve small disputes in
    her town. Her long‑term ambition is to blend her love of the outdoors with a purpose‑driven career that benefits both people and the environment.
