personas:
  professional: Thelma Billing is a budding naturalist who spends afternoons cataloguing birds, rocks, and leaves on quiet hill‑top hikes while using her LEGO building skills to create miniature habitats
    that blend curiosity with practical observation, and they often share their findings with a small circle of friends in a calm, cooperative way.
  sports: Thelma Billing follows the Missoula Osprey minor‑league baseball team, plays on the Hill County Youth Soccer Club’s under‑10 squad in spring, and enjoys cross‑country ski outings with the local
    high‑school team in winter, balancing their easygoing nature with a resilient enthusiasm for the outdoors.
  arts: Thelma Billing draws inspiration from the nature sketches of John James Audubon and Claude Monet while listening to the folk melodies of Bob Dylan and the whimsical score of Disney's Moana, channeling
    their curiosity into detailed notebook illustrations and occasional LEGO dioramas of imagined wildlife scenes.
  travel: Thelma Billing has explored Yellowstone on a school field trip, dreams of hiking Glacier National Park’s icy trails, and hopes to visit the historic streets of Prague someday, all while they navigate
    a modest family budget and a school calendar that shapes a travel style blending adventure with careful, relaxed planning.
  culinary: Thelma Billing delights in baking honey‑glazed blueberry muffins and weaving fresh wildflower honey into oatmeal cookies, often using hand‑collected berries from the meadow and measuring ingredients
    with a careful eye but they sometimes spill flour across the kitchen counter when enthusiasm overpowers organization.
  core: Thelma Billing is a calm, curious nine‑year‑old who melds a love of nature, meticulous cataloguing, and a relaxed, slightly disorganized spirit into a life that balances quiet observation with occasional
    bursts of creative energy, and they approach each day with gentle resilience.
background:
  cultural: Thelma grows up in a white, rural family in Ravalli County, Montana, where community ties and a deep respect for the outdoors are central values. Her family’s heritage includes German and Scandinavian
    roots, common in the region, and they uphold traditions of self‑reliance, modest living, and seasonal community gatherings, often linked to a local Methodist church. The close‑knit town culture emphasizes
    cooperation, stewardship of the land, and a relaxed attitude toward schedules, which aligns with Thelma’s easygoing, flexible nature. This environment nurtures her love of nature, her calm resilience,
    and her inclination toward harmonious, small‑scale social interactions.
attributes:
  skills: '["observational skills (nature and wildlife)", "reading comprehension", "basic problem solving", "empathy and conflict mediation", "simple crafting (paper crafts, basic woodworking)", "basic
