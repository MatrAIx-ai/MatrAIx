  career_goals: Orestes aspires to advance into senior engineering leadership, aiming for a role as a senior engineering manager or chief technology officer within a mid‑size technology firm where he can
    influence product strategy. He seeks to lead cross‑functional teams, drive efficiency through process optimization, and champion inclusive workplace cultures. He also envisions launching his own tech
    consultancy that helps small businesses in the Southeast adopt digital solutions, and establishing mentorship programs for Latino youth pursuing careers in STEM.
