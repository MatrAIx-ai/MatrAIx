personas:
  professional: Orestes Cerna, a senior full‑stack engineering leader with a business‑savvy mindset, leverages their meticulous organization, talkative charisma, and deep commitment to community building
    to drive cross‑functional product strategy and mentor emerging technologists in a mid‑size tech firm.
  sports: Orestes Cerna avidly follows Atlanta United and Real Madrid, plays weekend recreational soccer in the local league, hikes the Appalachian Trail sections near North Georgia with the Georgia Trail
    Club, and catches Atlanta Falcons games when they’re on TV.
  arts: Orestes Cerna immerses themselves in salsa dancing nights, draws inspiration from musicians like Carlos Santana, Lila Downs, and Juan Luis Guerra, and enjoys evenings at the Fox Theatre watching
    productions such as 'Hamilton' and classic films like 'Amores Perros'.
  travel: Orestes Cerna prefers meticulously planned trips that blend cultural immersion and outdoor adventure, having trekked the Blue Ridge Parkway, explored the historic streets of Barcelona, attended
    a tech summit in Austin, and dreamt of revisiting the coastal town famed for mole and vibrant markets.
  culinary: Orestes Cerna is an accomplished home chef who expertly prepares mole poblano, tamales de elote, and chiles en nogada, favors ingredients such as dried chiles, masa harina, and Mexican chocolate,
    and regularly hosts dinner gatherings featuring paired mezcal and handcrafted salsas.
  core: Orestes Cerna blends razor‑sharp technical leadership with a love for salsa rhythms, disciplined budgeting, and a habit of over‑organizing every project, hobby, and dinner party, even if it sometimes
    leaves little time for spontaneous downtime.
background:
  cultural: Orestes grew up in a Mexican‑American household, speaking Spanish at home and English at school. He preserves strong ties to Mexican cultural traditions—celebrating Día de los Muertos, preparing
    regional foods like mole and tamales, and participating in local Hispanic festivals in the Atlanta area. His cultural values of familismo and collectivismo shape his collaborative work style, emphasizing
    community, hospitality, and respect. He actively mentors within Latino‑in‑Tech Georgia, helping bridge cultural gaps in the tech industry.
