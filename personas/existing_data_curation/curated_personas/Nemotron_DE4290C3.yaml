  hobbies: '[''drawing and sketching'', ''digital illustration'', ''photography'', ''reading (science‑fiction, philosophy, African‑American history)'', ''listening to jazz, hip‑hop, neo‑soul'', ''playing
    basketball'', ''volunteering at community center (art mentorship)'', ''journaling and mindfulness'', ''basic Python coding'', ''gardening'']'
  career_goals: Jamil aims to earn his GED within the next year and enroll in a community‑college program focused on graphic design or digital media. He envisions securing an entry‑level junior graphic
    designer position at a nonprofit or local creative studio, where he can blend his artistic curiosity with his organized, reliable work style. In the longer term, he hopes to develop a community‑based
    art mentorship program for at‑risk youth in Bellingham, leveraging his kindness and cooperative nature to give back. Ultimately, he aspires to open a modest studio that produces visual storytelling
    projects with a social‑justice focus.
