personas:
  professional: Jamil Davis is an aspiring junior graphic designer who leverages a keen eye for composition and a methodical, reliable work style to plan community art events, aiming to secure a nonprofit
    design role after completing a community‑college graphic design program.
  sports: Jamil Davis picks up a basketball at the local community center whenever friends are free, cheering for the Boston Celtics and the New England Patriots while also following the Boston Red Sox,
    and they prefer casual pick‑up games over organized leagues.
  arts: Jamil Davis immerses themselves in visual storytelling, drawing inspiration from the street art of Banks Banks, the soulful rhythms of Erykah Badu, the poetic verses of Kendrick Lamar, and the vibrant
    exhibitions at the Museum of Fine Arts, Boston, while their own digital illustrations blend neo‑soul aesthetics with social‑justice themes.
  travel: Jamil Davis favors low‑budget, purpose‑driven trips, planning weekend bike rides to the historic Freedom Trail in Boston, backyard camping in the White Mountains, and eyeing a future visit to
    New Orleans for its music festivals, all while balancing a modest savings account and school commitments.
  culinary: Jamil Davis enjoys a mix of comfort and experimentation in the kitchen, frequently cooking collard greens with smoked turkey, cornbread, and mac and cheese alongside homemade avocado toast,
    mastering the balance between basic cooking skills and bold flavor pairings.
  core: Jamil Davis is a thoughtful teen artist who channels organized curiosity into community‑focused design, coping with frequent worry through mindfulness, yet occasionally overindulges in coffee and
    sneaker drops.
background:
  cultural: Jamil was raised in a close‑knit Black family in Bellingham, Massachusetts. His family maintains strong ties to the African‑American church and community, participating in choir, local cultural
    festivals, and neighborhood gatherings that celebrate Black heritage. From a young age he was exposed to Afro‑centric art, spoken‑word poetry, and the rich civil‑rights history of New England, which
    shaped his artistic sensibilities and sense of social responsibility. While Bellingham is a relatively small town, his family’s emphasis on cultural pride and community involvement has fostered a deep
    appreciation for both his heritage and the diverse experiences of the broader Boston region.
attributes:
  skills: '[''digital literacy (word processing, internet research)'', ''basic graphic design (Canva, GIMP)'', ''sketching and drawing'', ''digital illustration'', ''event planning and organization'', ''team
