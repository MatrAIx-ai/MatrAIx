  career_goals: Leslie aims to transition from front‑line retail work to a management or finance‑focused position that offers clear structure and advancement pathways. She plans to complete her associate's
    degree in business administration, then pursue a bachelor's degree in accounting or finance. In the short term, she seeks a supervisory role in a retail or banking environment where she can apply her
    operational expertise and lead a small team. Long‑term, she aspires to become a certified public accountant and eventually launch a modest e‑commerce boutique featuring products that celebrate African‑American
    heritage, leveraging her analytical skills and disciplined work ethic.
