  hobbies: '["Gardening", "Cooking Mexican dishes", "Listening to ranchera music", "Reading newspapers", "Walking in San Antonio parks", "Playing cards (canasta, bridge)", "Attending church services", "Volunteering
    at senior center", "Family storytelling and memoir writing", "Celebrating cultural festivals (Día de los Muertos, Cinco de Mayo)"]'
  career_goals: Although retired, Juan’s ambitions center on continued contribution to his family and community. He wishes to remain a steady support for his wife, ensuring they share a comfortable and
    harmonious retirement. Juan aims to document his family’s history by completing a memoir that captures stories of migration, cultural traditions, and life lessons for his grandchildren. He also plans
    to expand his volunteer role at the local senior center, helping organize cultural events such as Día de los Muertos celebrations and skill‑sharing workshops. Maintaining his health and independence
    is a personal goal, as is preserving and passing on the art of cooking traditional Mexican dishes to future generations.
