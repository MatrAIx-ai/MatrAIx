personas:
  professional: Juan Figueroatorres, a retired maintenance foreman turned senior‑center volunteer, leverages his systematic budgeting, project‑planning, and hands‑on repair skills to organize community
    workshops and cultural events with a steady, predictable rhythm that comforts both participants and staff.
  sports: Juan Figueroatorres enjoys gentle daily walks in San Antonio’s Heritage Park, participates in the local senior walking club, and follows the San Antonio Spurs with quiet enthusiasm, preferring
    low‑impact exercise over high‑intensity sports while still cheering for his hometown team.
  arts: Juan Figueroatorres delights in listening to ranchera legends like Vicente Fernández and mariachi ensembles while savoring classic novels such as "Don Quixote" and "To Kill a Mockingbird," and he
    occasionally attends community theater productions featuring traditional folkloric performances.
  travel: Juan Figueroatorres prefers short, well‑planned trips that balance cultural connection and comfort, having visited Oaxaca and Mexico City to reconnect with family roots, and dreamily plans a calm
    weekend getaway to the Texas Hill Country, mindful of his limited mobility and fixed budget.
  culinary: Juan Figueroatorres is a master of traditional Mexican cooking, routinely preparing mole with dried chiles and chocolate, hand‑made tamales filled with pork and masa, and fresh salsa bursting
    with tomatillos, cilantro, and jalapeños, while his garden supplies the freshest herbs to season each dish.
  core: Juan Figueroatorres blends meticulous organization with warm community spirit, nurturing a garden, a family, and senior‑center events while navigating age‑related health quirks and a frugal yet
    occasionally indulgent lifestyle.
background:
  cultural: 'Juan grew up in a bilingual Mexican‑American household in San Antonio, where Spanish was spoken at home and English at school. His parents emigrated from Jalisco, bringing with them deep Catholic
    faith, festive traditions, and a love for Mexican cuisine. These cultural threads are woven into his daily life: he celebrates Día de los Muertos with altars honoring ancestors, prepares traditional
    dishes for holidays, and participates in community events that showcase Mexican folk music and dance. His identity blends the vibrant Mexican heritage with the multicultural fabric of Bexar County,
    and he takes pride in passing these customs on to his descendants.'
attributes:
  skills: '["Basic carpentry", "Home repairs (plumbing, electrical)", "Budgeting and financial organization", "Bilingual Spanish–English translation", "Community volunteer coordination", "Gardening (vegetable
