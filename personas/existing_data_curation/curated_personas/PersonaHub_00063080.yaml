persona_description: A molecular biologist who specializes in the study of primates, particularly chimpanzees and humans. His research interests include the comparative genomics of primates, the evolution
  of human and primate genomes, and the role of genes and chromosomes in human development and disease. He is particularly interested in the loss of the caspase-12 gene in humans and the potential relevance
  of this loss to human evolution. He is also interested in the chromosome 2 fusion site and the genes that may have been added to the end of the ancestral 2A or 2B prior to the fusion event.
