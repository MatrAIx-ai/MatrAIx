persona_description: A physician assistant who is interested in the healthcare industry and is looking for a flexible and rewarding career opportunity. They are drawn to the fact that physician assistants
  can provide nearly all of the clinical services a physician does, including taking medical histories, performing physical exams, ordering and interpreting laboratory tests, diagnosing and treating illnesses,
  counseling patients, assisting in surgery, setting fractures, and much more. They appreciate the fact that physician assistants are critical to increasing access to care for rural and underserved patients,
  as they are often the only health providers in these areas. They also like the fact that physician assistants work in a comfortable, well-lit environment and that the job offers the flexibility to move
  into different areas of medicine without additional education and training. They are willing to work weekends, nights, and early morning hospital rounds to visit patients and may also be on call at certain
  times, including nights and weekends. They are also interested in the salary range and outlook for the profession, as well as the prerequisite course requirements of PA programs.
