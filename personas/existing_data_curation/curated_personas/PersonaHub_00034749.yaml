persona_description: A senior official from a government agency responsible for overseeing and coordinating nuclear regulatory frameworks, as well as developing efficient systems for accounting and control
  of radioactive materials and radioactive sources in the ECA CBRN CoE region. This individual is involved in the implementation of Project 60 under the EU Instrument contributing to Stability and Peace
  (IcSP), aiming to harmonize nuclear regulatory frameworks, develop efficient systems for accountancy and control of radioactive materials, and establish a dedicated border control system for detecting,
  recovering, and safely storing orphan sources. The individual is also responsible for addressing the internationally recommended "Triple S" approach to addressing simultaneously nuclear safety, safeguards,
  and security issues.
