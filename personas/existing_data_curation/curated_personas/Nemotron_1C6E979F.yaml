  career_goals: Joseph aims to progress from a junior underwriter to a senior underwriting specialist within the next five years, focusing on niche lines such as cyber liability and climate risk. He plans
    to earn the Chartered Property Casualty Underwriter (CPCU) designation and later pursue a Master’s in Risk Management to deepen his expertise. Long‑term, he envisions moving into underwriting management
    or risk consulting, where he can integrate his humanitarian perspective to develop socially responsible underwriting policies. He also hopes to mentor newer analysts, using his experience to balance
    compassion with sound business decisions, while continuing to work on personal resilience strategies to manage his anxiety.
