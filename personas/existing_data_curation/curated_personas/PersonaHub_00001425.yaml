persona_description: Vivian Perlis is a music historian and librarian at the Yale School of Music, who has conducted interviews with and about the most significant musical figures of the early twentieth
  century, including Eubie Blake, Virgil Thomson, Aaron Copland, and Duke Ellington. She is known for her expertise in the Oral History American Music archive at Yale University, which contains unparalleled
  materials for researching the history of American music. Perlis is also the founder and director of Oral History American Music at the Yale School of Music and Library.
