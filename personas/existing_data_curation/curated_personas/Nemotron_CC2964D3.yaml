personas:
  professional: Edith Lacy, an aspiring environmental scientist, combines their methodical journaling habit with a love for community service, using their organized approach to design systematic experiments
    for their science club and future career.
  sports: Edith Lacy, a member of the Enid Youth Soccer League and a regular participant in the school's cross‑country team, cheers on the Oklahoma Sooners football team and the Enid High School Mustangs
    basketball squad, and schedules nature walks with their dog on weekends to stay active, reflecting their disciplined yet compassionate approach to fitness.
  arts: Edith Lacy, a piano enthusiast who practices classical pieces by Beethoven and contemporary songs by Taylor Swift, reads mystery novels by Agatha Christie and historical fiction by Ken Follett,
    and attends local theater productions starring the Oklahoma City Community Theatre, weaving a love of structured narrative into their creative life.
  travel: Edith Lacy, who has road‑tripped to the Grand Canyon and visited the historic town of Santa Fe on a school field trip, dreams of exploring Washington, D.C.’s museums and the cherry blossoms of
    Kyoto, and prefers carefully planned itineraries over spontaneous travel, aligning with their need for structure.
  culinary: Edith Lacy, an avid home baker, perfects chocolate chip cookies with crisp edges, vanilla‑infused lemon bars, and classic apple pie using real butter and vanilla extract, follows measured recipes
    in a notebook, yet occasionally forgets to set timers, resulting in an over‑baked batch that becomes an impromptu family joke.
  core: Edith Lacy blends meticulous planning, heartfelt compassion, and a love for puzzles—whether in a mystery novel, a piano piece, or a budgeting spreadsheet—while occasionally letting an over‑baked
    cookie slip through their otherwise precise routine.
background:
  cultural: Edith comes from a White, Midwestern family in Enid, Oklahoma, where community ties and family traditions play a central role. Her upbringing reflects the values of small‑town Oklahoma—friendliness,
    self‑reliance, and a strong sense of civic responsibility. Family gatherings often feature home‑cooked meals, church or community events, and an emphasis on supporting neighbors. She is familiar with
    local customs such as the annual Enid County Fair, high school football games, and volunteer service projects that are common in the region.
