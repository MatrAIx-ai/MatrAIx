  career_goals: Edith aspires to pursue a career that combines her love for helping others with her methodical nature. She is drawn to professions such as pediatric nursing, education, or social work, where
    she can provide compassionate care while applying her strong organizational skills. She dreams of eventually leading community health initiatives or becoming a school counselor, aiming to create inclusive
    and well‑structured environments for children.
