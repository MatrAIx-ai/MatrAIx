persona_description: A management consultant who is critical of the hierarchy-of-needs theory developed by Abraham Maslow, particularly its oversimplification of more nuanced ideas and its impact on ignoring
  some of Maslow's egalitarian principles. The consultant is interested in a psychological framework for a new era of optimism and wants to correct the record by presenting a more comprehensive and nuanced
  understanding of Maslow's ideas. The consultant is likely to be knowledgeable in psychology and management consulting, and is interested in applying Maslow's ideas to modern business and management practices.
