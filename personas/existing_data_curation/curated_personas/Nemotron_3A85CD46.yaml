personas:
  professional: Dexter Wilhite, a seasoned financial advisor specializing in retirement planning, tax‑efficient strategies, and estate stewardship, leverages his meticulous organization, competitive drive,
    and cautious skepticism to craft disciplined, data‑driven client solutions while mentoring aspiring advisors.
  sports: Dexter Wilhite, a lifelong supporter of the Atlanta Braves, Falcons, and Hawks, drills up his stamina with morning hill walks around Cartersville, spends weekends fly fishing on Lake Allatoona,
    and competes in the Cartersville Bowls Club league, balancing low‑impact exercise with his love for precise, strategic games.
  arts: Dexter Wilhite, who finds comfort in the resonant chords of gospel legends like Mahalia Jackson and classic R&B icons such as Otis Redding, attends local church choir performances and occasional
    theater productions, and channels his creative impulse into woodworking projects inspired by traditional Southern craftsmanship, while also enjoying strategic board game nights that blend artistry and
    intellect.
  travel: Dexter Wilhite, who prefers meticulously planned escapes, spends his vacations exploring historic Southern towns like Savannah and Charleston, savors weekend trips to the Blue Ridge Mountains
    for solitude, and dreams of a cultural pilgrimage to New Orleans for its jazz scene and Creole cuisine, balancing his love for low‑key retreats with occasional international cruises to the Caribbean.
  culinary: Dexter Wilhite, an intermediate home cook, delights in preparing soul‑food classics such as shrimp and grits, collard greens with smoked turkey, and sweet potato pie, seasoning with fresh garlic,
    smoked paprika, and a dash of hot sauce, while often pairing his meals with a glass of dry Riesling and reserving Thursdays for a modest boutique steakhouse dinner as a reward for meeting client milestones.
  core: Dexter Wilhite, a disciplined 52‑year‑old financial strategist, lives by a chess‑master’s mindset, fuses southern hospitality with relentless curiosity, yet battles chronic worry, occasional health
    neglect, and an unrelenting perfectionist streak.
background:
  cultural: Dexter grew up in the African American community of rural Georgia during the late 1960s and 1970s, a period marked by both civil‑rights progress and lingering economic challenges. His family
    emphasized church involvement, self‑reliance, and education, values that shaped his disciplined, achievement‑oriented mindset. He draws on the traditions of southern hospitality, gospel music, and the
    strong communal bonds of the black church, which continue to inform his personal and professional life. His cultural heritage fuels his commitment to improving financial outcomes for other black families,
    and his lived experience of systemic barriers informs his skeptical yet diligent approach to trust and partnership. The blend of southern roots and African American resilience gives him a unique perspective
    on wealth building and community service.
attributes:
  skills: '["Retirement planning","Investment portfolio management","Tax‑efficient strategies","Estate planning","Risk assessment and mitigation","Cash‑flow and budgeting analysis","Regulatory compliance
