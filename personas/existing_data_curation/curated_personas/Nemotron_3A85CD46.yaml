  hobbies: '["Fly fishing on Lake Allatoona","Chess","Woodworking","Reading historical biographies and African American history","Walking/hiking in local trails","Community financial literacy volunteering","Bowling","Listening
    to gospel and classic R&B"]'
  career_goals: Dexter aims to become the most trusted financial advisor for families in Bartow County and to expand his practice into a boutique firm that specializes in serving African American clients
    seeking generational wealth. He plans to obtain the Certified Financial Planner (CFP) designation, build a small team of advisors he can mentor, and launch a quarterly financial‑literacy seminar series
    at his church. He also aspires to be recognized by the Georgia Financial Planning Association as a top advisor and to develop a proprietary risk‑assessment framework that blends data analytics with
    his practical, client‑focused perspective.
