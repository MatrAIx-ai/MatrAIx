personas:
  professional: Trang Nguyen, an eager budding coder who creates simple Scratch games after school, blends their love for adventure stories and LEGO engineering to prototype interactive tales, while often
    juggling spontaneous ideas with the need to meet class project deadlines.
  sports: Trang Nguyen, a spirited midfielder on the local park’s youth soccer team, also follows the LA Galaxy’s matches and joins a weekend hiking club with family, preferring spontaneous, pick‑up games
    over rigid drills.
  arts: Trang Nguyen, an enthusiastic hip‑hop dancer who idolizes dancer Maddie Ziegler, spends evenings sketching manga‑style heroes inspired by their favorite fantasy novels, and collects limited‑edition
    anime posters, channeling that energy into creative LEGO builds.
  travel: Trang Nguyen, who dreams of exploring the Redwood forests after a family trip to Yosemite and hopes to visit Tokyo’s anime district, prefers spontaneous road trips with siblings over meticulously
    planned itineraries, often packing a backpack of snacks and a sketchbook.
  culinary: Trang Nguyen, a junior kitchen helper, loves mixing sweet and savory by whisking together mango‑sticky rice for holidays and experimenting with homemade pizza toppings, while occasionally over‑salting
    a sauce in their excitement to impress family.
  core: Trang Nguyen is a curious, energetic 11‑year‑old who juggles soccer, hip‑hop, LEGO engineering, and Scratch coding, thriving on spontaneous creativity but often wrestling with messy organization
    and a sweet tooth for adventure.
background:
  cultural: Trang is a second‑generation Vietnamese‑American. At home, she speaks Vietnamese with her parents and grandparents, celebrates Tết (Lunar New Year) with traditional foods like bánh chưng and
    pho, and participates in community festivals at the Little Saigon cultural center. Growing up in Anaheim, she also enjoys the multicultural vibe of Orange County, blending the values of respect for
    elders and community harmony from her heritage with the adventurous, independent spirit of Californian youth.
