  career_goals: Trang dreams of a future where she can combine her love for people and the natural world. She aspires to become a veterinarian or an environmental scientist who works on wildlife conservation,
    because she enjoys caring for animals and exploring how ecosystems function. She also imagines herself leading community projects that bring kids together for science fairs or neighborhood clean‑ups,
    reflecting her desire to create harmony and make a positive impact.
