personas:
  professional: Ricky Vegas, a retired automotive handyman, combines their lifelong hands‑on expertise in classic car maintenance, DIY woodworking, and garden cultivation with a practical curiosity that
    drives their evening classes in regional history and inspires them to volunteer as a mentor to fellow retirees.
  sports: Ricky Vegas enjoys low‑key fishing outings on Lake Erie with the local angling club and follows Detroit’s professional teams—including the Tigers, Lions, and Red Wings—while they also participate
    in a weekly bridge group at the community center as a cerebral sport.
  arts: Ricky Vegas nurtures a passion for model‑building classic cars and restoring vintage radios, while also appreciating the photography of Ansel Adams, the music of Bob Dylan, and the classic films
    of John Ford, which inform the aesthetic sensibility they bring to their handcrafted garden sculptures.
  travel: Ricky Vegas favors relaxed, scenic road trips across the Midwest—such as the Lake Michigan shoreline, Door County’s cherry orchards, and the historic sites of Mackinac Island—planning each journey
    loosely to accommodate spontaneous stops while staying within a modest travel budget, allowing them to savor the journey as much as the destination.
  culinary: Ricky Vegas delights in cooking hearty casseroles, homemade corned beef hash, and garden‑fresh roasted tomatoes, skillfully blending seasonal vegetables from their own plot with classic Midwestern
    flavors, though they occasionally over‑salt dishes due to a fondness for bold seasoning.
  core: Ricky Vegas is a retiree who blends hands‑on craftsmanship with historical curiosity, navigating life with a laid‑back pragmatism, a penchant for vintage projects, and a gentle habit of occasional
    disorganization that they accept with a smile.
background:
  cultural: Ricky grew up in Canton, Michigan, a suburb with deep roots in the automobile industry and a strong sense of Midwestern community. His family is of German‑American descent, and he was raised
    in a modest, working‑class household that valued hard work, self‑reliance, and mutual support among neighbors. He celebrates traditional holidays such as Thanksgiving, Christmas, and the Fourth of July
    with his wife and extended family, often incorporating potluck meals and community gatherings. The local Catholic parish played a significant role in his upbringing, instilling a cooperative spirit
    and an emphasis on caring for others, which continues to shape his volunteer activities and his preference for small, harmonious social circles.
