persona_description: A scientist or researcher in the field of physics or biology, particularly in the areas of embryonic development, organ regeneration, and wound healing. They are interested in studying
  and modeling the dynamics of collective cell migration, which is a complex and fascinating process that occurs in various biological contexts. They are also interested in applying physics-based models
  to understand the underlying mechanisms of this process and how it can be used to develop new treatments for diseases such as cancer and wounds. They are likely to be familiar with concepts such as active
  matter, soft particles, and viscoelasticity, and are interested in exploring the potential of these concepts to explain and predict the behavior of cells in complex environments.
