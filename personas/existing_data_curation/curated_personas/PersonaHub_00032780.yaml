persona_description: A Catholic educator who is known for his progressive philosophy of education, particularly in the field of theology and education, and his work at the University of Oxford, where he
  was a professor of philosophy. He is also credited with the establishment of the University of Notre Dame in the United States and is widely recognized as one of the most significant and influential educators
  of his time. His philosophy of education emphasizes the importance of forming the person and developing their skills to find their way in life, and his credo "heart speaks to heart" is the underpinning
  mission of Newman College, a Catholic college in Port Macquarie, Australia. He died on August 11th, 1890, but his feast day is celebrated on October 9th, 1845, the day he converted to Catholicism.
