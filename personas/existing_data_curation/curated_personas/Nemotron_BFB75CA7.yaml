personas:
  professional: Joseph Fecca is an imaginative preschool builder who orchestrates elaborate block constructions with a balance of curiosity and practicality, meticulously planning each tower, reliably following
    through on shared play projects, and thriving in cooperative group games thanks to their outgoing and considerate nature.
  sports: Joseph Fecca is a lively member of the Little Rangers Soccer Club, energetically practices dribbling after preschool, passionately cheers for the New York Yankees during family game nights, and
    looks forward to watching the local high school basketball games for inspiration.
  arts: Joseph Fecca is a creative little artist who adores Disney's Frozen soundtrack, spends hours drawing Pixar's Toy Story characters with crayons, loves dancing to BTS's Dynamite in the living room,
    and eagerly collects stickers of their favorite characters.
  travel: Joseph Fecca is an adventurous child who dreams of revisiting the sunny beaches of Florida's Gulf Coast and someday skiing in the Swiss Alps, while currently cherishing family road trips to the
    local zoo where they feed giraffes and explore the aquarium's touch‑tank.
  culinary: Joseph Fecca is a selective yet curious eater who delights in creamy mac and cheese with extra cheddar, loves crunchy carrot sticks with hummus, enjoys helping stir batter for banana‑pancake
    mornings, and occasionally sneaks an extra chocolate chip cookie when no one watches.
  core: Joseph Fecca blends vibrant curiosity with tidy teamwork, turning toys into organized adventures, while occasionally succumbing to sweet‑tooth tantrums.
background:
  cultural: Joseph is raised in a white, middle‑class family in Corvallis, Oregon. His upbringing reflects the Pacific Northwest’s love for nature, outdoor play, and community events such as local farmers’
    markets, library story hours, and seasonal festivals. The family’s European ancestry—likely French‑Canadian and Italian—adds occasional cultural traditions like weekend spaghetti meals and holiday storytelling.
    The region’s emphasis on environmental stewardship, community involvement, and valuing education shapes his cooperative, curious, and organized personality.
