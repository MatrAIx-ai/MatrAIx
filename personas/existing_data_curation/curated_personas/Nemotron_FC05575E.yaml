  career_goals: Myra aims to advance to a senior administrative role such as Office Manager within the next two to three years, where she can oversee office operations, mentor newer clerks, and implement
    efficient workflows that reflect her practical expertise. She also wants to acquire a certified bookkeeping credential to broaden her responsibilities and eventually transition to part‑time freelance
    bookkeeping in preparation for retirement. Maintaining a stable income and a predictable schedule remains a top priority, as does preserving her independence and the quiet work environment she values.
