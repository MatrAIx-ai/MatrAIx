personas:
  professional: Myra Toney, a seasoned administrative specialist with a knack for meticulous data entry, Excel inventory tracking, and quick work‑arounds, is eyeing an office‑manager promotion where they
    can impose efficient routines while mentoring newer clerks, despite their occasional struggle with strict deadlines.
  sports: Myra Toney supports the Wyoming Cowboys football team and the Denver Broncos, belongs to a local walking club that meets on weekend trails, and enjoys occasional hikes in the Bighorn foothills,
    preferring solitary treks over organized team sports, and they relish the quiet of the open trail.
  arts: Myra Toney immerses herself in classic western literature by Louis L'Amour and Zane Grey, reveres John Wayne’s films, and finds solace quilting prairie‑inspired patterns while listening to folk
    legends like Johnny Cash during quiet evenings by the fire, and they often pair reading with a warm cup of tea.
  travel: Myra Toney favors low‑key road trips to natural refuges such as Yellowstone and the Canadian Rockies, dreams of exploring the Scottish Highlands for their rugged isolation, and they plan trips
    around off‑season rates to keep travel affordable and quiet.
  culinary: Myra Toney excels at preserving garden harvests into jars of heirloom tomato sauce, dill pickles, and apple butter, delights in cooking hearty stews with sage‑rubbed chicken and root vegetables,
    and they prefer simple, seasonally driven meals over elaborate restaurant dining.
  core: Myra Toney blends steadfast routine with occasional spontaneity, thrives in solitary, detail‑oriented work, guards her finances with disciplined spreadsheets, and they balance a competitive edge
    with a quiet, resilient spirit.
background:
  cultural: Myra’s cultural background reflects a traditional, rural Wyoming upbringing grounded in Midwestern values of self‑reliance, hard work, and community service. Raised in a small town, she attended
    a local public school and earned an associate’s degree from a community college in the state. Her family’s roots trace back to generations of farmers and ranchers, and she maintains a connection to
    that heritage through her involvement in local church activities and county fairs. The conservative, practical outlook of her community shapes her preference for routine, her straightforward communication
    style, and her appreciation for the quiet, solitary pursuits that align with the wide‑open landscapes of Wyoming.
