  career_goals: Now retired, Bradly aims to leave a lasting intellectual legacy by documenting the local history of Mashpee and the broader Cape Cod area through oral histories and a reflective memoir.
    He plans to mentor undergraduate and graduate students interested in the humanities, serve as a volunteer advisor for the Mashpee community cultural center, and contribute expertise to regional museum
    exhibitions. He also aspires to publish a collection of essays on art, aging, and personal experience, and to foster intergenerational dialogue within his small social circle.
