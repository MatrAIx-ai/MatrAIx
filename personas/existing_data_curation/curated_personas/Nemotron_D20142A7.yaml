  hobbies: '[''Watercolor painting'', ''Pottery'', ''Gardening'', ''Museum visits'', ''Science fiction reading'', ''Genealogy research'', ''Cooking Guatemalan cuisine'', ''Bridge'', ''Travel to Guatemala'']'
  career_goals: Although retired, Kayla is driven to channel her competitive spirit into mentorship and legacy building. She plans to establish a scholarship for Guatemalan‑American youth pursuing STEM
    degrees, lead a senior art club that showcases intergenerational creativity, and coordinate a cultural exchange program linking local schools with Guatemalan communities. She also aspires to author
    a memoir documenting her family's migration story and to continue learning through online courses in emerging technologies. Additionally, she hopes to curate annual community exhibitions that fuse scientific
    concepts with visual art, raising the standards for local cultural events.
