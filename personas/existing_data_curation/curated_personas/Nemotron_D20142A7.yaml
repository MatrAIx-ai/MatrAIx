personas:
  professional: Kayla Ramos, a retired data analyst and technical writer with a background in engineering, channels their disciplined, detail‑oriented nature and bilingual fluency into spearheading a STEM
    scholarship for underrepresented students, directing a senior art club that blends scientific concepts with visual expression, and orchestrating a cultural exchange program that links New England schools
    with their family's ancestral village.
  sports: Kayla Ramos stays fit through daily brisk walks around their Boston neighborhood, participates in a senior yoga class at the community center, follows the Boston Red Sox, Boston Celtics, and New
    England Patriots with dedicated game‑day rituals, and joins a local senior tennis league where their competitive spirit shines on the court.
  arts: Kayla Ramos immerses themselves in the arts by painting delicate watercolor landscapes inspired by Monet, crafting pottery pieces reminiscent of the earthy forms taught by studio master Carla Marquez,
    curating exhibitions that juxtapose scientific diagrams with works by John Singer Sargent, and attending concerts featuring Bob Dylan and Joni Mitchell at the Boston Symphony Hall.
  travel: Kayla Ramos balances their love of structured itineraries with spontaneous cultural immersion, having explored the historic streets of Kyoto, the vibrant festivals of Seville, and the charming
    riverfront of Savannah, while also returning annually to their ancestral village for Día de los Muertos commemorations and to reconnect with extended family, tailoring each trip to accommodate their
    health and budget constraints.
  culinary: Kayla Ramos delights in preparing a slow‑cooked, chocolate‑infused pork stew seasoned with roasted chilies and aromatic cinnamon, alongside hand‑made corn tamales stuffed with seasoned beans,
    using fresh herbs from their garden and sharing these meals at family gatherings that celebrate seasonal traditions.
  core: Kayla Ramos combines a disciplined, competitive mindset with a lifelong love of art, science, and community, obsessively tracking garden yields and bridge scores while mentoring youth, all guided
    by a deep reverence for family traditions.
background:
  cultural: Kayla was born to Guatemalan immigrant parents and raised in a bilingual, Catholic household. She grew up celebrating Semana Santa, Día de los Muertos, and other Guatemalan festivals, preserving
    both Catholic and indigenous Maya customs. Her family maintains strong ties to a close‑knit Guatemalan community in Massachusetts, fostering a sense of collectivism and mutual support. While she has
    fully integrated into New England life—enjoying local traditions and civic participation—she continues to honor her heritage through language, cuisine, storytelling, and community service, creating
    a rich, hybrid cultural identity.
