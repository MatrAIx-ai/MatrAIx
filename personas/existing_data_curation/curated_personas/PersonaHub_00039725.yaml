persona_description: A senior executive in the energy sector, specifically focused on policy analysis and strategy development. This individual is responsible for overseeing the implementation of international
  energy programs and ensuring the security and reliability of energy supplies. They possess a deep understanding of the challenges faced by consuming countries in terms of energy dependence on a small
  number of producers, and the need to transition from fossil fuels to renewable energy sources. They are also aware of the growing demand for energy and the need to meet it sustainably, with a particular
  focus on reducing carbon emissions and ensuring energy access for developing countries.
