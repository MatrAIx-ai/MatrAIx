  career_goals: Looking ahead, Makenzie aims to translate her sociable energy and artistic interests into a flexible, community-focused career. She hopes to secure a part-time or contract role as a community
    arts coordinator for a cultural center or non-profit, where she can design and lead workshops, curate local exhibitions, and manage volunteer programs. Long-term, she dreams of opening a boutique studio
    that offers art-making classes, DIY workshops, and a small gallery space, blending her entrepreneurial spirit with her love for creative expression. She also plans to pursue a certificate in arts administration
    or small-business management to solidify her expertise while maintaining the flexible schedule that aligns with her personal values.
