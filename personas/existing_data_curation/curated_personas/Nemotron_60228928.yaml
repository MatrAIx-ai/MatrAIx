  hobbies: '[''Visiting art galleries and murals'', ''Digital illustration'', ''Urban and nature photography'', ''Spoken‑word poetry events'', ''Reading contemporary fiction and Black history'', ''Cooking
    Southern cuisine with creative twists'', ''Trivia nights'', ''Volunteer teaching computer basics'']'
  career_goals: Kathy aims to earn a certificate in visual communications and transition to a freelance graphic design career, building a portfolio of branding and marketing materials for small businesses
    and community organizations. She is ambitious to eventually open a creative studio in the Raleigh‑Durham area that offers design services and art workshops. In the short term, she plans to complete
    an online design bootcamp, secure part‑time work at a local art supply store for industry exposure, and develop a personal brand on social media to showcase her artwork and inspire other young Black
    creatives.
