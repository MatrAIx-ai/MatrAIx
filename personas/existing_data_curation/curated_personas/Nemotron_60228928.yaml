personas:
  professional: Kathy Linen, a 24‑year‑old aspiring freelance graphic designer, leverages self‑taught Photoshop and Illustrator skills, a sharp eye for photography, and event‑planning experience to craft
    branding for small businesses while balancing the discipline of part‑time work at an art‑supply store with the flexibility of freelance projects, and they thrive on the tension between organization
    and spontaneous creativity.
  sports: Kathy Linen, a 24‑year‑old outdoor enthusiast, joins the Raleigh Urban Photographers' Running Club for weekly 5K runs, follows the Carolina Hurricanes (NHL) in winter, the Durham Bulls (minor‑league
    baseball) in summer, and plays recreational beach volleyball at the local community center during spring, and they delight in the competitive camaraderie that mirrors their trivia night victories.
  arts: Kathy Linen, a 24‑year‑old lover of visual and spoken‑word art, curates playlists featuring Erykah Badu, Miles Davis, and Kendrick Lamar, frequents mural‑laden neighborhoods to photograph works
    by local graffiti artist "Ghost", attends spoken‑word nights featuring poets like Melissa Kremer, and draws inspiration from the paintings of Jean‑Michel Basquiat for their digital illustrations, and
    they constantly seek new ways to blend auditory and visual storytelling.
  travel: Kathy Linen, a 24‑year‑old who prefers curated weekend getaways, plans trips using a mix of spontaneous city walks and detailed itineraries, has explored Asheville’s art scene, road‑tripped to
    Austin for live music, and dreams of a future solo adventure to Lisbon’s historic neighborhoods, and they balance budget constraints with a desire for culturally immersive experiences.
  culinary: Kathy Linen, a 24‑year‑old home cook, delights in reinventing Southern comfort dishes like shrimp and grits with a hint of lemon zest and fried chicken glazed with gochujang, often seasoning
    with smoked paprika and fresh basil, and balances culinary experiments with regular visits to downtown food trucks for quick, flavorful bites, and they occasionally overindulge in late‑night snacking
    after a long day of design work.
  core: Kathy Linen, a 24‑year‑old graphic‑design hopeful, balances a fierce competitive edge with a love of art‑filled city strolls, a habit of overspending on coffee and supplies, and a penchant for nightly
    journaling to tame lingering anxiety, and they constantly push themselves to turn curiosity into tangible creative projects.
background:
  cultural: Kathy was raised in a close‑knit African‑American family in the Greater Raleigh area, with deep roots in Southern Black traditions. Her upbringing blended church‑based gospel music, family gatherings
    centered around soul food, and community storytelling. She grew up hearing the legacy of the Civil Rights Movement and the cultural renaissance of the 1990s, which shaped her appreciation for Black
    art, hip‑hop, and social activism. Living in Holly Springs, she experiences a blend of suburban growth and historic Black neighborhoods, fostering a strong sense of identity and pride in her heritage
    while also engaging with the broader multicultural fabric of the region.
attributes:
  skills: '[''Graphic Design (Adobe Photoshop, Illustrator)'', ''Basic Web Design (HTML/CSS)'', ''Photography'', ''Creative Writing'', ''Event Planning'', ''Critical Thinking'', ''Microsoft Office Suite'',
