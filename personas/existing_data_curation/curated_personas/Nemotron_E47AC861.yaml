personas:
  professional: Eduardo Rivera, a budding LEGO architect, spends afternoons meticulously constructing intricate brick models while sketching blueprints for imagined inventions, combining his natural curiosity
    with a practical eye for detail and an organized yet flexible approach to play.
  sports: Eduardo Rivera loves playing in the Falls Church youth soccer league, cheering on DC United’s home games, and joining small neighborhood matches on Saturday afternoons, where they favor teamwork
    over competition and often act as the strategic midfielder.
  arts: Eduardo Rivera draws vibrant comic strips inspired by adventure books like The Magic Tree House and watches classic cartoons while listening to marimba melodies and folk songs during family celebrations,
    admiring artists such as Stan Lee and musician Juan Pablo for their storytelling flair.
  travel: Eduardo Rivera enjoys family road trips to Great Falls Park and the Smithsonian museums in Washington, D.C., and dreams of exploring the colorful streets of Oaxaca, balancing a love for spontaneous
    nature hikes with careful parental planning for each journey.
  culinary: Eduardo Rivera helps the family roll homemade tamales and shape pupusas during festive gatherings, eagerly tasting the seasoned masa, while also mastering the art of making peanut butter‑banana
    sandwiches and sprinkling cinnamon on hot chocolate.
  core: Eduardo Rivera is a curious, organized 7‑year‑old who builds complex LEGO worlds, saves allowance for future creations, and navigates life with a mix of quiet resilience and a love for small‑group
    soccer and family traditions.
background:
  cultural: Eduardo is a first‑generation Guatemalan‑American raised in Falls Church, Virginia. His household is bilingual, speaking Spanish at home and English at school, and his family maintains Guatemalan
    traditions such as celebrating Día de los Muertos, cooking foods like tamales and pupusas, and listening to marimba and folk music. He regularly attends local Guatemalan community events, and his upbringing
    blends the rich cultural heritage of Guatemala with the experiences of growing up in the United States, shaping his language, values, and everyday practices.
