  career_goals: Although still young, Eduardo aspires to become someone who builds and helps. He dreams of designing safe playgrounds or community gardens as a future civil engineer or environmental scientist,
    combining his love for construction, nature, and his cultural heritage. He also imagines teaching younger children, sharing knowledge in a way that balances compassion with self‑growth. These goals
    reflect his practical curiosity, desire for organized achievement, and a wish to contribute positively to his community.
