  career_goals: William dreams of becoming an astronaut who explores new worlds and an inventor who designs interactive games and stories. He imagines one day creating a video game that lets players build
    their own imaginative universes, and he hopes to lead school science fairs and museum exhibitions that showcase his creative inventions.
