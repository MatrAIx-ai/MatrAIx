personas:
  professional: A retired community cultural organizer named Whanda Jackson, a 69‑year‑old volunteer, leverages their deep knowledge of visual and performing arts and strong communication skills to design
    traveling exhibitions of local African American art, lead quilting workshops and heritage storytelling sessions, and mentor volunteers at the neighborhood community center, all while navigating a relaxed,
    occasionally disorganized approach to deadlines.
  sports: Whanda Jackson enjoys gentle daily walks with the Walnut Creek Senior Walking Club, follows the Houston Astros in baseball and the Dallas Cowboys in football, and occasionally participates in
    community garden fitness challenges, preferring low‑impact activity over competitive sports.
  arts: Whanda Jackson immerses themselves in the arts by curating community workshops on quilting, studying works by Jacob Lawrence and Faith Ringgold at local museums, listening to recordings of Louis
    Armstrong, John Coltrane, and Mahalia Jackson, and leading book‑club discussions on biographies of influential Black leaders, which together shape their identity and leisure time.
  travel: Whanda Jackson prefers thoughtful, slow‑paced art trips, having visited the Smithsonian National Museum of African American History and Culture in Washington, D.C., the Studio Museum in Harlem,
    and the Dallas Museum of Art, they plan future trips to New Orleans for its jazz heritage and Santa Fe for its Pueblo‑style galleries, traveling by train or road with a modest budget and often coordinating
    travel with fellow volunteers.
  culinary: Whanda Jackson delights in preparing traditional Southern dishes such as shrimp and grits, collard greens seasoned with smoked turkey, and pecan pie, experimenting with fresh rosemary, thyme,
    and sweet basil from their garden, and balances a modest cooking skill level with a love for sharing meals at church potlucks and community gatherings.
  core: Whanda Jackson is a curious, retired cultural advocate whose love of art, gardening, and storytelling is tempered by a laid‑back, occasionally disorganized approach that fuels both creative projects
    and occasional financial or health oversights.
background:
  cultural: Whanda is an African American woman who grew up in East Texas during the 1950s and 1960s, experiencing the transition from segregation to the Civil Rights Movement. Her cultural identity is
    shaped by Southern Black traditions, including gospel music, church community, Southern cooking, and storytelling. She maintains strong ties to her extended family and the local Black church, which
    serves as a hub for cultural and social activities. Her heritage includes involvement in the rich African American artistic legacy of Texas, such as the annual Juneteenth celebrations and local blues
    festivals. This background influences her appreciation for art, her commitment to community service, and her desire to preserve and share African American history.
attributes:
  skills: '["Art appreciation", "Quilting and textile arts", "Gardening", "Community event coordination", "Oral history documentation", "Mentoring", "Basic computer and photo editing", "Cooking Southern
    and Creole dishes", "Emotional support and informal counseling", "Research and writing"]'
  hobbies: '["Visiting museums and galleries", "Reading historical fiction and biographies", "Quilting", "Gardening", "Cooking Southern cuisine", "Listening to jazz and gospel music", "Genealogy research",
    "Attending church services", "Walking", "Participating in book clubs"]'
  career_goals: Although retired from formal employment, Whanda seeks to deepen her involvement in community cultural projects. She aims to create a traveling exhibition of local African American art and
    histories, mentor volunteers at the community center, contribute to a local heritage archive, and publish a memoir of her family's experiences during the Civil Rights era. She also hopes to take art
    trips to major museums across the country, especially to view African American art collections, and to develop a small garden plot where she can teach sustainable gardening to youth.
