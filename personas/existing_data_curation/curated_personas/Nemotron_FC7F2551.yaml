  hobbies: '["Abstract Painting", "Digital Illustration", "3D Printing & Prototyping", "Astrophotography", "Amateur Astronomy", "Board-Game Nights (Strategy Games)", "Trivia Competitions", "STEM Volunteering
    (Library Talks, Robotics Club Mentoring)", "Live Music & Community Theater", "Gardening", "Hiking"]'
  career_goals: Although currently not in the formal workforce, Joseph aims to channel his expertise into part-time consulting for local tech-startups and small manufacturers, helping them prototype innovative
    products while applying rigorous project planning. He wants to launch a community makerspace in Nolensville that offers workshops in 3D printing, electronics, and digital art, providing a collaborative
    hub for curious adults and teens. Mentoring is a core ambition - he plans to volunteer as a STEM tutor at the local high school and eventually author a book that bridges creative thinking with engineering
    practice. Ultimately, he seeks a role that satisfies his intellectual curiosity, offers creative novelty, and yields measurable community impact, while maintaining a balanced lifestyle to manage his
    tendency toward stress.
