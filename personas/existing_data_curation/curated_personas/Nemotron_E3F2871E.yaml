  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading historical non-fiction'', ''Crossword and Sudoku puzzles'', ''Hiking'', ''Yoga'', ''Volunteering teaching computer skills'', ''Attending
    small cultural gatherings'']'
  career_goals: Seeking to transition into a senior program manager role within the next three years, Providencia aims to obtain the PMI Program Management Professional (PgMP) certification and lead multi‑site,
    sustainability‑focused initiatives. She aspires to mentor emerging project managers, especially women and Latino professionals, and eventually become a PMO Director who shapes strategic project portfolios.
    Her long‑term ambition includes publishing a case study on effective bilingual project communication and integrating cultural competence into organizational best practices, all while preserving a balanced
    lifestyle that supports personal well‑being and community involvement.
