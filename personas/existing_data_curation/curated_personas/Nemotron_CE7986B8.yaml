  hobbies: '[''Mural painting'', ''Soccer'', ''Cooking Mexican cuisine'', ''Fishing'', ''Volunteer construction tutoring'', ''Collecting vintage tools'', ''DIY woodworking'', ''Attending community art fairs'',
    ''Exploring street art'', ''Listening to live mariachi music'']'
  career_goals: Jorge aims to be promoted to foreman within the next two years, using his leadership skills and technical knowledge to oversee larger crews. He plans to enroll in a GED program and obtain
    a decorative‑concrete‑finishing certification, which will let him blend his construction expertise with his passion for art. Ultimately, he dreams of launching a small, family‑run contracting business
    that specializes in custom concrete work and mural installations for homes and local businesses in Santa Maria, providing greater financial stability and reducing his chronic worry about job security.
    He also hopes to mentor younger Latino workers, sharing both trade skills and artistic ideas while earning respect in his community.
