personas:
  professional: Tammy Silvers, a five-year-old preschool explorer, thrives on arranging blocks in tidy patterns and already imagines themselves as a future librarian, using their natural calm and love for
    structure to meticulously sort picture books during playtime.
  sports: Tammy Silvers charges onto the backyard soccer field with their Sunshine Kids Soccer Club tee in the spring, proudly waves a Chicago Cubs cap while watching the games on Saturday afternoons, and
    alternates between energized T‑ball practice in the summer and rainy‑day indoor dance routines with their favorite playlist.
  arts: Tammy Silvers delights in coloring Dr. Seuss illustrations, sings every Disney Princess anthem from 'Frozen' to 'Moana' with unabashed gusto, and spends quiet afternoons watching Pixar’s 'Toy Story'
    while sketching the beloved characters in their notebook.
  travel: Tammy Silvers dreams of their next family adventure to Orlando’s Walt Disney World, cherishes annual trips to their grandparents’ countryside cottage where they explore the meadow, and loves spontaneous
    weekend outings to the local aquarium where they feed the sea turtles.
  culinary: Tammy Silvers insists on a perfectly crunchy peanut butter and jelly sandwich, adds extra cheese to their mac and cheese, proudly concocts a simple fruit salad of banana, strawberry, and blueberry
    with a plastic spoon, and pretends to be a chef by stirring pancake batter under careful supervision.
  core: Tammy Silvers, a serene five-year-old, blends a love for tidy routines with playful spontaneity, quietly orchestrates their world with gentle kindness, and carries a pocketful of stickers as rewards
    for cooperation.
background:
  cultural: Tammy is raised in a suburban white American family in Stafford, Virginia. Her family celebrates typical U.S. holidays such as Thanksgiving, Halloween, and the Fourth of July, and they attend
    a local community preschool that incorporates play‑based learning and values kindness and cooperation. The local culture emphasizes school readiness, community involvement, and family support, shaping
    her polite, cooperative, and calm nature.
