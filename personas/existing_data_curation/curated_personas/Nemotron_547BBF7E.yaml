personas:
  professional: Doris Buzzi, a veteran occupational therapist renowned for blending evidence‑based practices with culturally resonant solutions, leverages their meticulous functional assessments, bilingual
    patient education, and progressive use of virtual‑reality tools while maintaining a flexible, low‑key approach that embraces curiosity and a relaxed attitude toward strict planning.
  sports: Doris Buzzi, an avid sunrise walker along the Gulf Coast, drifts into the occasional Sunday game watching the Houston Astros and Houston Texans while participating in the Brazoria County Senior
    Walking Club and dabbling in low‑impact water aerobics at the local community pool during summer.
  arts: Doris Buzzi, who spends evenings immersed in historical fiction and Mexican folklore, frequently revisits the works of Frida Kahlo and Diego Rivera, tunes into Lila Downs and Carlos Santana while
    cooking, and explores virtual‑reality tours of the Louvre and the Museum of Fine Arts Houston as a quiet yet enriching artistic ritual.
  travel: Doris Buzzi prefers unhurried, budget‑friendly trips that blend cultural immersion with natural scenery, having taken a leisurely road trip to San Antonio’s River Walk, a weekend retreat to Galveston’s
    historic Strand, and dreaming of a future pilgrimage to Oaxaca’s vibrant markets and the ancient ruins of Teotihuacan.
  culinary: Doris Buzzi, a confident home chef, layers traditional Mexican flavors like ancho chilies, epazote, and roasted tomatillos into fusion dishes such as mole‑glazed grilled trout and sweet‑potato
    enchiladas, while also cultivating native Texas herbs like lemon balm and horsemint in her garden to freshen every plate.
  core: Doris Buzzi, a curious septuagenarian who savors sunrise beach walks, VR museum hops, and the occasional quilt‑fabric splurge, lives by a flexible, low‑key philosophy that embraces both tradition
    and new ideas.
background:
  cultural: Doris is a first‑generation Mexican‑American who grew up in a bilingual household in South Texas. Her upbringing infused her with strong familismo values, a love for Mexican culinary traditions,
    and participation in community celebrations such as Día de los Muertos and Cinco de Mayo. Living in Angleton, she blends Mexican heritage with the local Southern Texan culture, speaking both Spanish
    and English fluently. This bicultural perspective informs her compassionate, culturally responsive practice as an occupational therapist, especially when serving Hispanic seniors and families in Brazoria
    County.
attributes:
  skills: '[''Functional assessment'', ''Client‑centered intervention planning'', ''Adaptive equipment recommendation and training'', ''Assistive technology integration (e.g., virtual reality, telehealth)'',
    ''Geriatric rehabilitation'', ''Pediatric rehabilitation'', ''Bilingual Spanish‑English communication'', ''Patient and caregiver education'', ''Interdisciplinary team collaboration'', ''Evidence‑based
    practice'', ''Mentorship of junior therapists'', ''Community outreach and health literacy'']'
  hobbies: '[''Gardening (native herbs and vegetables)'', ''Cooking traditional Mexican and fusion recipes'', ''Walking along the Gulf Coast'', ''Reading historical fiction and Mexican folklore'', ''Senior
    book club'', ''Gentle yoga'', ''Quilting and hand‑sewing'', ''Digital puzzle games'', ''Exploring virtual‑reality museum tours'']'
  career_goals: Approaching retirement, Doris aims to shift from a full‑time caseload to part‑time consulting and mentorship roles. She plans to develop a low‑cost adaptive‑equipment workshop series for
    low‑income Hispanic seniors in Brazoria County, publish a guide on culturally sensitive occupational therapy practices, and serve as an adjunct instructor at a local community college. Additionally,
    she hopes to advocate for expanded insurance coverage of OT services for underserved populations, while preserving flexibility to continue learning about new therapeutic tools and approaches.
