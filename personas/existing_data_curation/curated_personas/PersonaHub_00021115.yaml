persona_description: A team of researchers at the Center for Child Health, Behavior and Development who are dedicated to fostering social and emotional health in children and adolescents, and to increasing
  access to needed treatment for mental health disorders such as depression, ADHD, anxiety, and substance use. They are particularly interested in using community and school resources to improve the delivery
  of treatment and in tele-mental health to reach underserved areas. Their research spans the continuum of intervention approaches and includes screening and prevention, collaborative care models, school-
  and community-based implementation of evidence-based treatments, and tele-mental health to reach underserved populations in rural areas. Their approach is guided by their understanding of normal development
  and builds upon the existing strengths of children to foster resiliency.
