persona_description: A historian who is deeply interested in the history of the University of Tübingen and its influential figures such as Hegel, Hölderlin, Schelling, Mörike, Uhland, Johannes Kepler, Wilhelm
  Schickard, and the Bearded Count Eberhard. They are also passionate about the university's success in the German federal and state governments' Excellence Initiative and the university's involvement in
  various collaborative research centers and transregional collaborative research centers. They value the university's research-oriented learning approach and the international exchange of academics and
  students.
