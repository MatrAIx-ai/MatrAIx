    "Customer Service Excellence"]'
  hobbies: '["Historical and literary reading", "Mindfulness meditation", "Indoor herb gardening", "Fusion cooking (South-Asian & Texan)", "Journaling recipes", "Nature trail walking and sketching", "Acoustic
    music listening", "Online courses on sustainable design", "Behind-the-scenes volunteer work at community shelters"]'
  career_goals: Nighat aims to transition from managing a single lodging facility to a regional operations role within a national hotel chain, where she can shape policies that prioritize staff well-being
    and sustainable hospitality. She plans to complete a Bachelor’s degree in Hospitality Management to solidify her theoretical foundation, earn LEED certification for her property, and eventually launch
    a boutique inn that blends modern Texas design with subtle South-Asian cultural touches. Long-term, she envisions mentoring other women in the industry and consulting on resilience planning for hotels
    facing climate-related challenges.
