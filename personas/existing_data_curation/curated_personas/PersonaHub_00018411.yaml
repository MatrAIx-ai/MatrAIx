persona_description: A passionate and knowledgeable enthusiast of the Suffolk Punch horse breed, with a particular interest in its history, conservation, and rehabilitation efforts. They have a deep appreciation
  for the breed's physical attributes, its good nature, and its role as a working horse. They are also interested in the history of the breed, its importance as a working horse, and the current work being
  done to ensure its survival. They have a background in agriculture journalism and writing, and regularly reports on major shows and visits to leading studs, including Hollesley Bay. They are also a regular
  contributor to Horse and Hound and Heavy Horse World, and are known for their expertise in heavy horses.
