  hobbies: '["Acrylic Painting", "Gallery Visits", "Contemporary Fiction", "Yoga", "Urban Gardening", "Cooking Latin Cuisine", "Salsa Dancing", "Volunteer Art Workshops"]'
  career_goals: Natalia aspires to step into an executive director role within a major regional arts nonprofit, where she can expand equitable access to the arts across Westchester County and beyond. She
    aims to design and implement an intergenerational arts education initiative that integrates technology and traditional cultural practices, positioning the organization as a model for innovative community
    engagement. Additionally, she seeks to mentor emerging Latino arts professionals, build strong public‑private partnerships, and influence public policy to secure sustainable funding for cultural programs.
