persona_description: Seth Green was a pioneering fish culture expert who worked in the early 19th century, focusing on the propagation and stocking of fish in rivers and lakes. He is known for pioneering
  the use of dry impregnation and establishing the first hatchery in the Western Hemisphere. His work on fish culture has had a lasting impact on the industry, and he is recognized as a leading expert on
  the subject. Green is also credited with reestablishing American Shad populations in coastal rivers as far south as the Savannah River in Georgia.
