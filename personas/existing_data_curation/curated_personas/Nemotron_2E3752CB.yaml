  career_goals: Zachary aims to turn his practical abilities into a long‑term technical career. He plans to enroll in a community‑college apprenticeship program for either HVAC or electrical work, with
    the goal of earning journeyman certification within three years. Simultaneously, he wishes to deepen his IT knowledge by completing an associate’s degree in network administration, positioning himself
    for a hybrid role that blends field service with digital support. Ultimately, he hopes to launch his own small‑scale handyman and smart‑home installation business, allowing him to remain hands‑on while
    leveraging his organizational strengths to manage projects and client relationships. Financial independence and the ability to support his family are key motivators in his career trajectory.
