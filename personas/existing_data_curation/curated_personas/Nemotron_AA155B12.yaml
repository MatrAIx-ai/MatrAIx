  career_goals: Jeffrey aims to progress into a supervisory role within the casino security department, aspiring to become a shift supervisor and eventually a security operations manager. He plans to earn
    professional certifications such as the Certified Protection Professional (CPP) and Physical Security Professional (PSP) to solidify his credentials. Long‑term, he envisions transitioning into a training
    and education specialist role, where he can develop security‑awareness programs for the broader hospitality industry. He also hopes to establish a part‑time consultancy that advises smaller venues on
    best‑practice surveillance and safety protocols, allowing him to balance professional contribution with increased family time as he approaches retirement.
