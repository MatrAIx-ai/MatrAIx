persona_description: A surgeon who specializes in reconstructive surgery, particularly in the field of abdominal wall reconstruction. They have extensive experience in repairing hernias and other abdominal
  wall defects, and are skilled in using mesh implants to close hernias. They are familiar with the anatomy of the abdominal wall and the various types of hernias that can occur, including those related
  to heart defects and cleft palates. They are also knowledgeable about the development of delayed closures in the heart and the risks associated with them. They are experienced in reducing tissue escaping
  at the umbilical slit and repairing hernias, and are skilled in using a variety of surgical techniques to achieve optimal outcomes.
