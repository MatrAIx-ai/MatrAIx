personas:
  professional: Edna Shorr, a two-year-old budding explorer, shows early signs of future professional curiosity by shadowing parents during kitchen chores, balancing a love of new ideas with reliance on
    familiar routines, and displaying an impressive knack for sorting crayons by color in an organized yet flexible manner.
  sports: Edna Shorr, a two-year-old who loves to swing at the neighborhood park, attends a toddler gymnastics class at the local YMCA, watches the New York Yankees on TV with wide eyes, and occasionally
    cheers for the city’s minor league soccer team during family outings, balancing active play with a preference for small group games.
  arts: Edna Shorr, a two-year-old who lights up when singing 'Twinkle Twinkle Little Star' and dancing to Disney’s 'Let It Go', enjoys coloring pictures of animals in pastel crayons inspired by Monet’s
    soft palettes, and watches Peppa Pig and Sesame Street with bright curiosity.
  travel: Edna Shorr, a two-year-old who delights in short car trips to grandparents’ house, has visited the city’s botanical garden and the Grand Canyon with her family, and dreams of a future vacation
    to Disneyland in California where she hopes to meet her favorite cartoon characters.
  culinary: Edna Shorr, a two-year-old picky eater who adores buttery macaroni and cheese, banana pancakes, and strawberry-yogurt bites, loves to help stir batter with a wooden spoon while often making
    a mess, and sometimes refuses new vegetables despite her parents’ gentle encouragement.
  core: Edna Shorr, a two-year-old bundle of cautious curiosity, blends a love of orderly play with quiet kindness, yet wrestles with frequent worries that make bedtime a restless affair.
background:
  cultural: Edna is raised in a white, middle‑class family in Chelsea, Massachusetts. Her upbringing reflects typical American cultural practices, such as celebrating Thanksgiving, Christmas, and the Fourth
    of July. She attends a local early‑childhood center that emphasizes inclusive play, early literacy, and community values. Her family participates in neighborhood library story times, community garden
    events, and other local gatherings, giving her exposure to the diverse cultural fabric of Chelsea while maintaining their own family traditions and values.
