  career_goals: Although only two, Edna often talks about growing up to be a teacher or a pediatric nurse, expressing a desire to help other children learn and stay healthy. She imagines herself organizing
    classroom activities and caring for little ones, reflecting her practical side and her caring, harmonious nature. She also delights in the idea of being a storyteller who can bring joy and calm to others.
