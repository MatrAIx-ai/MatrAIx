  career_goals: Looking ahead, Elizabeth aims to transition her experience into a mentorship‑focused role before retirement, helping small businesses and nonprofit agencies modernize their administrative
    processes through the lens of creativity. She hopes to design and lead workshops that blend artistic thinking with operational efficiency, and eventually publish a handbook titled "Creative Leadership
    for Administrative Teams". Additionally, she aspires to volunteer as a career advisor for local community colleges, using her background in STEM and management to empower adult learners while continuing
    to explore innovative, novelty‑driven solutions in the workplace.
