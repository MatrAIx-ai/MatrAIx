  career_goals: Patricia dreams of a future where she can merge her love of science, animals, and her close‑knit community. She aspires to become a veterinarian who cares for farm and companion animals
    in rural Georgia, or a science teacher who inspires younger students to explore the natural world. In the meantime she hopes to win her school’s science fair, take on a leadership role in student council,
    and continue volunteering at the community garden and local animal shelter. Her long‑term ambition is to lead environmental projects, such as preserving the nearby creek and organizing the town’s annual
    fair, reflecting her practical mindset and desire to help others.
