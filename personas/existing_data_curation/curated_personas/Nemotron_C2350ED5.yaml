  career_goals: Hector aims to become a senior lead engineer within the next five years, steering projects that integrate sustainable technologies into traditional manufacturing. He is particularly interested
    in developing energy‑efficient mechanical systems for the renewable‑energy sector, such as wind‑turbine component design and solar‑tracker mechanisms. Obtaining his Professional Engineer (PE) license
    is a concrete milestone, as it would open doors to higher‑level design authority and potential consulting opportunities. Ultimately, Hector envisions launching his own boutique engineering consultancy
    that offers flexible, innovation‑focused services to small manufacturers and startups along the Texas‑Mexico border. He wants his firm to balance technical excellence with a relaxed, collaborative culture
    that respects individual autonomy, allowing him to maintain a healthy work‑life balance for his family while pursuing his competitive drive for groundbreaking patents and industry awards.
