personas:
  professional: Mechanical engineer Hector Guerrero, a seasoned product designer proficient in SolidWorks, AutoCAD, FEA, CNC machining, and rapid prototyping, channels their competitive, critical nature
    into delivering high‑quality, sustainable mechanical solutions for renewable‑energy projects, yet their preference for flexible, less‑structured workflows often leads to last‑minute scrambles that they
    mitigate with meticulous documentation and focused team presentations.
  sports: Hector Guerrero, an urban‑area cyclist and occasional pick‑up soccer player, rides their road bike through the Hill Country every weekend, follows the Dallas Cowboys and Houston Astros avidly,
    and they approach fitness with disciplined solo training sessions while reluctantly joining a local basketball league when a close friend invites them, balancing competitiveness with a generally relaxed
    attitude toward regular exercise.
  arts: Hector Guerrero, a solitary sketcher of urban murals and industrial landscapes, draws inspiration from the street art of the Mission District and the dramatic murals of historic muralists, spends
    quiet evenings mastering classical guitar pieces by Segovia, and they regularly attend downtown gallery openings featuring contemporary artists like Banksy and Shepard Fairey, letting these experiences
    shape their creative identity.
  travel: Hector Guerrero, a 32‑year‑old engineer with a love for artistic inspiration, plans most trips solo—taking weekend road trips through the Texas Hill Country to visit vineyards, making an annual
    pilgrimage to Mexico City’s historic murals, and they balance a desire for low‑key exploration with occasional family vacations to coastal Baja, always booking boutique stays that double as creative
    retreats.
  culinary: Hector Guerrero, an avid home chef, experiments with modern twists on classic Mexican fare—spherifying the salsa of tacos al pastor, reimagining chiles en nogada with quinoa‑stuffed pumpkin
    and a deconstructed walnut sauce—leveraging their precise, engineering‑styled approach and a pantry stocked with ancho chilies, epazote, and fresh masa, yet they often over‑complicate dishes, leading
    to occasional kitchen mishaps.
  core: Hector Guerrero, a competitively analytical mechanical engineer with a solitary creative streak, balances a love for precise engineering and artistic expression while wrestling with chronic anxiety
    and a habit of last‑minute scrambles.
background:
  cultural: Hector was born and raised in a bicultural Mexican‑American household in the Rio Grande Valley. He grew up bilingual, speaking Spanish at home and English at school, which gives him a fluid
    cultural perspective and the ability to navigate both U.S. and Mexican professional settings. Family gatherings often feature traditional Mexican celebrations such as Día de los Muertos and Cinco de
    Mayo, where music, food, and storytelling reinforce his connection to heritage. He identifies with the values of hard work and community solidarity common in Mexican culture, while also embracing the
    entrepreneurial spirit of the border region. These influences shape his appreciation for Mexican mural art, his love of authentic regional cuisine, and his desire to contribute to local industry growth,
    especially by bridging engineering expertise across the border. Despite his competitive nature, he remains deeply loyal to his family and cultural roots, which inform his personal and professional aspirations.
