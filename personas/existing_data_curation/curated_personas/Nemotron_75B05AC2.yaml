    music and world music'']'
  career_goals: She aims to advance to a Director of Clinical Operations or Vice‑President role within a regional health system, where she can embed culturally competent, arts‑integrated care pathways.
    Bibi plans to complete a Doctorate in Health Administration to deepen her research on the therapeutic impact of visual arts in patient recovery. She aspires to influence state health policy in New Jersey,
    championing equity and innovation, and eventually launch a community health hub that merges evidence‑based medical services with creative wellness programs.
