  career_goals: Dianna dreams of a future where she can combine her curiosity about how things work with her practical, methodical approach. She is drawn to STEM fields—especially biomedical engineering
    or veterinary medicine—because she wants to help living beings while solving concrete problems. She hopes to attend a high‑school with a strong science program, participate in research internships,
    and eventually study at a university known for interdisciplinary engineering. Recognizing her tendency to worry, she also aims to cultivate resilience and stress‑management skills, perhaps by studying
    psychology or mindfulness alongside her primary career path. Ultimately, she wants a career that offers both intellectual challenge and the ability to make a tangible, positive impact on health and
    wellbeing.
