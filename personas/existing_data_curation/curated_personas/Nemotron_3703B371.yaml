personas:
  professional: Dianna Bailey, an 11‑year‑old budding engineer, channels her organized curiosity into designing custom LEGO Technic mechanisms, leading Scratch game projects in her school’s STEM club, and
    methodically debugging robotics prototypes while occasionally fretting over meeting project deadlines.
  sports: Dianna Bailey, an 11‑year‑old who blends her love of walking the Naperville Riverwalk with a commitment to the local swim team, cheers for the Chicago Cubs on weekend outings, and participates
    in after‑school practices with the Naperville Soccer Club, all while using her strategic mindset to stay active and healthy.
  arts: Dianna Bailey, an 11‑year‑old pianist who practices Mozart’s Sonata K.331 for upcoming recitals, composes simple melodies reminiscent of Tchaikovsky, draws comic strips inspired by Stan Lee’s Spider‑Man
    adventures, and devours mystery novels by Agatha Christie and Nancy Drew for plot ideas, weaving all these influences into a vibrant creative world.
  travel: Dianna Bailey, an 11‑year‑old with a methodical travel style, loves day‑tripping to Chicago’s Museum of Science and Industry and dreams of a family road‑trip to Yellowstone National Park, meticulously
    mapping routes and checkpoints while balancing limited school‑vacation time and saving her allowance for airfare.
  culinary: Dianna Bailey, an 11‑year‑old who relishes assembling margherita pizza with mozzarella and fresh basil, blending strawberry‑banana smoothies with Greek yogurt, and mastering chocolate‑chip cookies
    using semi‑sweet chips, often experiments in the kitchen after school yet sometimes sneaks extra gummy bears into her lunchbox.
  core: Dianna Bailey, an 11‑year‑old curious engineer‑in‑training who balances meticulous LEGO designs and piano practice with frequent worries about meeting expectations, occasional snack‑cravings, and
    a habit of double‑checking every detail before bedtime.
background:
  cultural: 'Dianna grows up in a middle‑class white family in Naperville, a suburban city in the Chicago metropolitan area of Illinois. Her upbringing reflects typical Midwestern values: emphasis on community
    involvement, punctuality, and family cohesion. She attends the local public elementary school, where she participates in extracurricular clubs that celebrate diverse interests, from STEM to the arts.
    Family traditions include weekly Sunday dinners, celebrating national holidays such as Thanksgiving and Independence Day, and attending community events like Naperville Fest and the annual riverwalk
    concert series. Her family encourages a balanced lifestyle that mixes outdoor activities, like biking on the Illinois Prairie Path, with indoor pursuits such as reading and music. The local library''s
    summer reading program and the town''s well‑maintained parks provide safe, supportive environments for her curiosity and organized nature to flourish.'
