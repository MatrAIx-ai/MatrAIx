  hobbies: '[''Abstract painting'', ''Custom vehicle graphics'', ''Model train building'', ''Vintage bus restoration'', ''Acoustic guitar playing'', ''Improv theater'', ''Youth mechanics mentorship'', ''Hiking
    Appalachian trails'', ''Attending folk festivals'', ''Reading speculative fiction'']'
  career_goals: Dudley aims to transition from daily shop work to a hybrid role that merges his mechanical mastery with his love for teaching and creativity. Over the next five years he hopes to open a
    small boutique garage that focuses on restoring vintage diesel buses and customizing them with artistic paint jobs, while offering hands‑on workshops for hobbyists and vocational students. He also dreams
    of authoring a practical guide on DIY diesel maintenance and launching a local YouTube channel where he shares troubleshooting tips and showcases his creative projects. Ultimately, he envisions becoming
    a respected mentor in the regional diesel‑mechanic community and advocating for greener retrofits of legacy vehicles.
