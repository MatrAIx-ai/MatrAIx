persona_description: A cerebral scientist who specializes in the study of human brain evolution, particularly the pressures of natural selection that led to the evolution of our large and complex brain.
  He believes that the large human brain is probably the cause of our gender wars and is passionate about understanding the costs and benefits of this evolutionary process. He is also interested in the
  co-evolution of gut and brain, and the role of diet and cooking in supporting the development of the human brain. He is a strong advocate for acknowledging the humdrum benefits of diet and cooking, which
  are often overlooked in the pursuit of scientific knowledge.
