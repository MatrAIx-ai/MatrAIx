persona_description: A mechanical engineer with expertise in pump engineering and failure analysis, particularly focusing on the analysis of electric drive pumps. The individual has experience with the
  Lake Mead Pump House and the 1000 horsepower electric drive pumps that supply the greater Las Vegas area with water from Lake Mead. The engineer is skilled in conducting failure analysis through various
  methods such as metallurgical and modal analysis, strain gage and accelerometer instrumentation, ultrasonic transducer instrumentation, videography, and metallurgical testing. The engineer is well-versed
  in the design, operation, and maintenance of electric drive pumps and has a deep understanding of the causes and effects of pump failures, including the effects of fatigue damage, shortening of risers,
  and the resulting premature failures.
