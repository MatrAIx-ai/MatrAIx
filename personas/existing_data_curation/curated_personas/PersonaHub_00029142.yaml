persona_description: An analytical chemist who works in a laboratory, examining chemical compounds to determine their composition and interaction with one another. They use instruments such as spectrometers
  and chromatographs to perform tests and procedures on compounds to discern their nature. They are part of a team of scientists and work in teams with other chemists. They must communicate effectively
  both with peers and superiors and constantly look for ways to improve their procedures. They may work in hazardous environments and are required to keep aware of safety procedures. They typically work
  in laboratories and need at least a bachelor's degree in chemistry for entry-level positions, though further education at the graduate level can lead to research roles or supervisory positions.
