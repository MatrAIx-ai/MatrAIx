  hobbies: '[''Hiking'', ''Fishing'', ''Nature photography'', ''Woodworking'', ''Model airplane building'', ''Pick‑up basketball'', ''Video gaming'', ''Reading non‑fiction (history and technology)'', ''Volunteer
    work at food pantry'']'
  career_goals: Gerald aims to advance from his current clerk role into a supervisory or office‑manager position within the next three to five years. He plans to complete his bachelor’s degree in Business
    Administration, focusing on operations management, and to earn the Certified Administrative Professional (CAP) credential. His ambition includes leveraging his automation skills to streamline office
    processes and eventually transition into a project‑coordinator role that supports the logistics and supply‑chain functions of the nearby Robins Air Force Base. He also hopes to mentor new hires, sharing
    his balanced approach to organization and flexibility.
