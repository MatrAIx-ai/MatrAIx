  career_goals: Maria aims to obtain her Professional Engineer (PE) license within the next two years and transition into a senior engineering role where she can lead complex projects in renewable energy
    and IoT device development. She aspires to become a project lead responsible for multidisciplinary teams, driving innovative solutions that enhance sustainability for coastal communities. In the longer
    term, Maria envisions founding a consultancy that offers specialized electrical engineering services to small businesses and local government agencies, providing structured, reliable expertise while
    maintaining a balanced work-life routine.
