  career_goals: Although she is approaching retirement, Laura plans to work part‑time for the next few years, focusing on passion projects such as creating decorative murals for the local community center
    and church, offering hands‑on workshops on painting and paper‑hanging at the senior center, and mentoring a small group of younger apprentices. She hopes to compile a simple guidebook of her trade tips
    to share with the next generation, and also wishes to travel with her husband on a modest road‑trip across historic towns of the Southeast before fully retiring.
