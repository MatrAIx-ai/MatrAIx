persona_description: A scientist who is optimistic about the potential of artificial wombs for human use, and believes that it could disrupt traditional notions of who should be the primary parent and about
  male and female roles. She is also interested in the ethical dilemmas that might result from using artificial wombs, and the potential positive influences that could be replicated in an artificial womb.
  She is open to the idea of men producing milk in an artificial womb, and believes that it could lead to more potential for parenting to be fully shared. She is likely to be interested in topics related
  to reproductive technologies, biology, and ethics.
