    adoption'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Reading'', ''Cooking'', ''DIY home improvement'', ''Volunteer work at community food bank'', ''Book club'', ''Bridge (card game)'', ''Exploring local museums and
    historical sites'']'
  career_goals: Tresa aims to advance to a store manager role within the next two years, focusing on elevating team performance, decreasing shrink, and launching data‑driven loyalty programs. She plans
    to earn a GED and complete a retail management certification to solidify her credentials. Long‑term, she envisions either moving into a regional managerial position or leveraging her expertise to open
    a boutique consultancy that helps independent retailers improve operations and customer experience.
