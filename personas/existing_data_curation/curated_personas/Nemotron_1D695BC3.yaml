  career_goals: Charles aspires to move into senior leadership within the sales function, targeting a role such as Sales Manager or Director of Sales for a regional manufacturing firm. He aims to lead a
    high-performing team, develop strategic account plans, and expand market share into emerging sectors like sustainable manufacturing. Over the next five years, he plans to acquire a professional sales
    certification (e.g., Certified Professional Sales Leader) and deepen his expertise in product development to eventually influence product design with his appreciation for aesthetics. Long-term, he envisions
    launching his own consultancy helping mid-sized manufacturers integrate innovative sales strategies with creative branding.
