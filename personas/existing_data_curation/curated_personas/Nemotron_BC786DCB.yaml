  career_goals: Andrew aims to progress from first-line supervision to a district manager role, where he can shape retail operations across multiple locations. He aspires to develop a mentorship program
    that empowers front-line staff, leveraging his educational background to create structured yet flexible training modules. Long‑term, he envisions launching a consultancy focused on cultivating compassionate,
    high‑performing retail teams and integrating community‑driven initiatives into store culture. He also plans to pursue a master's degree in organizational leadership to deepen his strategic expertise.
