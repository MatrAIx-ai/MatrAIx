  career_goals: Mario aims to progress from his current role as a sales representative of services to a senior account manager within the next two years, focusing on high-value enterprise clients. He intends
    to earn recognition through exceeding quota targets, such as President’s Club honors, and to acquire professional certifications like Certified Professional Sales Leader. Long-term, he aspires to lead
    a sales team as a regional sales manager, eventually overseeing strategic sales operations and possibly launching his own consultancy that emphasizes data-driven service solutions.
