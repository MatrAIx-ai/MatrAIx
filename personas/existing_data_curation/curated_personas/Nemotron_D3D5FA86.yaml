  hobbies: '[''Tea gatherings with friends'', ''Bridge and bingo tournaments'', ''Gardening'', ''Crocheting and knitting for charity'', ''Walking in local parks'', ''Church attendance'', ''Cooking classes
    and recipe experimentation'', ''Local history research and museum lectures'', ''Using tablet apps for video calls with family'']'
  career_goals: Though retired from formal employment, Shelly aims to leave a lasting legacy by documenting her family's genealogy and local history in a memoir, mentoring younger relatives in cooking and
    craft skills, and championing senior-friendly programs at the Clinton Township community center. She hopes to stay physically active, maintain her social connections, and be recognized as a valued elder
    voice in community decision‑making.
