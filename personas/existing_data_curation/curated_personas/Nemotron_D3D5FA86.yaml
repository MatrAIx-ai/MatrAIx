personas:
  professional: Shelly Sullivan is a veteran community organizer at the Clinton Township senior center who leverages her methodical event‑planning skills, competitive bridge spirit, and talkative charisma
    to champion senior‑friendly programs, while keeping a wary eye on hidden agendas.
  sports: Shelly Sullivan enjoys daily walks in the local park, participates in the senior center's low‑impact aerobics class, follows the Detroit Tigers and attends their games when possible, and thrills
    at the seasonal excitement of the senior bridge tournament circuit, treating each match like a competitive sport.
  arts: Shelly Sullivan immerses herself in folk music by Bob Dylan and Joni Mitchell, attends museum lectures on local history, crochets while listening to the Nashville symphonies, and is a regular at
    the community theatre's classic play revivals featuring timeless actors such as Meryl Streep.
  travel: Shelly Sullivan prefers organized day trips to historic sites like Mackinac Island and Colonial Williamsburg, enjoys guided bus tours of nearby art museums, dreams of a senior‑friendly cruise
    to the Caribbean, yet often postpones travel due to concerns about health and energy levels.
  culinary: Shelly Sullivan excels at classic Midwestern comfort cooking—she perfects chicken pot pie, creamy mashed potatoes, and apple crumble—experimenting with new recipes from cooking classes, while
    meticulously measuring ingredients to keep sodium low, though she sometimes forgets to set the timer, resulting in over‑cooked casseroles.
  core: Shelly Sullivan is a meticulously organized, socially vibrant 85‑year‑old who balances competitive spirit with deep community love, yet wrestles with anxiety that fuels both careful budgeting and
    occasional over‑planning.
background:
  cultural: Shelly grew up in post‑World War II Michigan as the daughter of second‑generation Irish‑American and German‑American parents. Her upbringing in the Midwest instilled values of self‑reliance,
    community service, and modesty. She was raised in a Protestant (Methodist) household, attending Sunday school and community potlucks, which fostered her love of social gatherings. The cultural milieu
    of Clinton Township and the broader Detroit suburb, with its emphasis on neighborly ties, volunteerism, and preserving family traditions, continues to shape her identity and daily life.
attributes:
  skills: '[''Home cooking (Midwestern comfort foods)'', ''Sewing and crocheting'', ''Gardening (vegetable and flower beds)'', ''Event planning and community outreach'', ''Volunteer coordination'', ''Storytelling
