persona_description: A public health official who works with the Centers for Disease Control and Prevention (CDC) to monitor and control the spread of MERS-CoV, a highly contagious virus that can cause
  severe respiratory illness and death. This official is responsible for conducting laboratory tests using the CDC NCV-2012 rRT-PCR Assay to detect the virus in respiratory, stool, and blood samples. They
  are aware of the potential risks and benefits of the test, and are committed to using it in an emergency situation to help protect the public health.
