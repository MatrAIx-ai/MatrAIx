persona_description: A researcher and scholar who is interested in the shared heritage and cultural exchange between the Low Countries and Rome, particularly in the field of Dutch art and culture. They
  have a strong interest in the digitization of historical materials and are passionate about exploring the impact of computational tools on the humanities. They have a background in art history, particularly
  in the 16th and 17th centuries, and have conducted extensive research on the works of Adriaen de Vries, Aernout van Buchel, and other Dutch artists who lived and worked in Rome. They are also interested
  in the reception of the Antique in Netherlandish painting and drawing and the impact of propaganda on Dutch artists in Counter Reformatory Rome.
