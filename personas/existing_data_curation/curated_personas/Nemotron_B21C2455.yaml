  career_goals: Umang aims to advance from his current personal care aide role to a certified nursing assistant (CNA) and eventually to a care manager overseeing a team of home-health workers. He plans
    to obtain a CNA certification and pursue a short-term certificate in healthcare administration within the next two years. Long-term, he aspires to start a community-based senior care service that integrates
    art-therapy sessions, leveraging his artistic curiosity to improve clients' mental well-being. He also hopes to mentor new aides, promoting organized, compassionate care standards while pursuing professional
    development opportunities such as workshops on geriatric psychology and stress-reduction techniques.
