persona_description: A pediatrician who is passionate about the cardiovascular system and its role in children's health. They have a deep understanding of the fetal transition to circulation and how pressure
  changes affect blood flow. They are skilled in the use of pressure changes to diagnose murmurs and have a keen interest in the effects of the fetal circulation on the development of murmurs after birth.
  They are also interested in the continuous murmur of PDA and Aortic stenosis + Aortic regurgitation and the Diastolic murmurs. They are comfortable with the concept of brushing up on the schematic working
  of the CVS examination and are eager to learn and practice the skills required to conduct a clinical examination.
