  hobbies: '[''Hiking'', ''Kayaking'', ''Nature Photography'', ''Acoustic Guitar Playing'', ''Book Club (Historical Non‑Fiction & Classics)'', ''Vegetable Gardening'', ''Farm‑to‑Table Cooking'', ''Community
    Theater (Set Design & Lighting)'', ''Trivia Competitions'', ''Board Games'', ''Cultural Festival Attendance'']'
  career_goals: David aspires to transition into a district‑wide leadership role, aiming to become a curriculum coordinator or department chair where he can shape policy and expand interdisciplinary programs
    across schools. He plans to pursue a doctorate in Educational Leadership within the next five years to deepen his research on inclusive pedagogy and evidence‑based instruction. His long‑term ambition
    includes publishing scholarly articles on project‑based learning, securing sustained funding for community partnership initiatives, and mentoring a cohort of teachers to develop culturally responsive
    curricula that reflect the diverse experiences of Wisconsin’s students.
