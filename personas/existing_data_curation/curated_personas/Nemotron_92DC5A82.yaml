    center'']'
  career_goals: Even in retirement, Mauricio aims to stay active and useful in his community. He plans to volunteer as a handyman for his local church and senior center, while also leading a monthly cooking
    workshop that preserves family recipes. He hopes to record and share his migration story and oral histories using a tablet, bridging his curiosity for new technology with his practical desire to keep
    traditions alive. Additionally, he wants to mentor a small group of younger Hispanic men in basic home-repair skills and to organize a friendly cooking competition at the annual Cinco de Mayo festival.
